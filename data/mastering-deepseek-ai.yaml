- en: Introduction
  id: totrans-50
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 引言
- en: '![](image_rsrc126.jpg)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc126.jpg)'
- en: 'DeepSeek (Chinese: 深度求索; pinyin: Shēndù Qiúsuǒ) is an ambitious Chinese'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek (中文：深度求索；拼音：Shēndù Qiúsuǒ) 是一个雄心勃勃的中国
- en: AI company that has rapidly risen to prominence with its open-source large language
    models (LLMs), particularly its flagship product, DeepSeek-R1. Founded in 2023
    by Liang Wenfeng and wholly funded by the hedge fund High-Flyer, DeepSeek is a
    game-changer in the global AI landscape, challenging dominant players like OpenAI
    and Google while offering a new vision for AI development in the 21st century.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 一家快速崛起并因其开源的大语言模型（LLMs）而闻名的人工智能公司，特别是其旗舰产品 DeepSeek-R1。DeepSeek 由梁文峰于 2023 年创立，并由
    High-Flyer 对冲基金全额资助，是全球 AI 领域的颠覆者，挑战着 OpenAI 和 Google 等主导者，并为 21 世纪的人工智能发展提供了一个新的视角。
- en: The Genesis of DeepSeek
  id: totrans-54
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: DeepSeek 的起源
- en: The origins of DeepSeek can be traced back to Liang Wenfeng, who co-founded
    the High-Flyer hedge fund in February 2016. Liang’s background in AI trading algorithms
    played a pivotal role in shaping DeepSeek’s vision. After several years of developing
    AI for quantitative trading, High-Flyer began expanding into AI research, which
    ultimately led to the founding of DeepSeek in May 2023. Unlike traditional companies,
    DeepSeek was created with a singular focus on AI research rather than immediate
    commercialization, allowing it to prioritize cost-efficiency and open-source accessibility
    from the outset.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的起源可以追溯到梁文峰，他在 2016 年 2 月共同创立了 High-Flyer 对冲基金。梁文峰在 AI 交易算法方面的背景在塑造
    DeepSeek 视野方面发挥了关键作用。经过几年的 AI 量化交易开发，High-Flyer 开始拓展到 AI 研究，这最终导致了 DeepSeek 在
    2023 年 5 月的成立。与传统的公司不同，DeepSeek 是以单一的关注点——AI 研究而非即时商业化而创建的，这使得它从一开始就优先考虑成本效益和开源的易用性。
- en: DeepSeek’s AI models were trained using an extraordinary amount of hardware,
    including Nvidia A100 GPUs, with estimates ranging from 10,000 to 50,000 units.
    This powerful hardware setup was critical for developing DeepSeek-R1, which rivals
    some of the most advanced AI models like GPT-4—but at a fraction of the cost.
    Despite U.S. sanctions on the export of Nvidia chips to China, DeepSeek managed
    to build an effective, powerful AI model using these chips, creating a technological
    breakthrough against the backdrop of geopolitical tension.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的 AI 模型使用了大量的硬件进行训练，包括 Nvidia A100 GPU，估计数量从 10,000 到 50,000 台。这个强大的硬件配置对于开发
    DeepSeek-R1 至关重要，它可与一些最先进的 AI 模型如 GPT-4 相媲美——但成本却低得多。尽管美国对中国出口 Nvidia 芯片实施了制裁，DeepSeek
    仍然设法使用这些芯片构建了一个有效、强大的 AI 模型，在政治地缘紧张局势的背景下创造了一个技术突破。
- en: The Cost-Efficiency Factor
  id: totrans-57
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 成本效益因素
- en: One of DeepSeek’s standout features is its exceptional cost-efficiency. The
    development of DeepSeek-R1 was completed at a fraction of the cost of competing
    models, with an estimated development price tag of $6 million, compared to the
    $100 million spent by OpenAI to build GPT-4. This affordable development model
    is a defining characteristic of DeepSeek, allowing the company to provide powerful
    AI capabilities at an accessible price point. Additionally, the operating costs
    of DeepSeek models are considerably lower, consuming only about a tenth of the
    computing power required for comparable LLMs, which further contributes to its
    cost-effective appeal.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 深度探索公司的一大亮点是其卓越的成本效益。DeepSeek-R1的开发成本仅为竞争对手模型成本的一小部分，估计开发成本为600万美元，而OpenAI为构建GPT-4花费了1亿美元。这种经济实惠的开发模式是深度探索公司的显著特征，使得公司能够以可负担的价格点提供强大的AI功能。此外，深度探索模型的操作成本也相对较低，仅消耗了与类似LLMs相当的十分之一的计算能力，这进一步增强了其成本效益的吸引力。
- en: This low-cost model allows DeepSeek to pass on savings to end-users while maintaining
    profitability. By underpricing its rivals—many of whom are losing money on their
    AI models—DeepSeek has made a significant mark on the global AI industry, forcing
    competitors to reassess their business strategies.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这种低成本模式使得深度探索公司能够将节省下来的成本传递给最终用户，同时保持盈利能力。通过低于竞争对手的价格——其中许多竞争对手在他们的AI模型上正在亏损——深度探索公司在全球人工智能产业中留下了显著的影响，迫使竞争对手重新评估他们的商业策略。
- en: Open-Source Advantage
  id: totrans-60
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 开源优势
- en: Perhaps the most radical departure from traditional AI companies is DeepSeek’s
    open-source approach. Unlike proprietary models like ChatGPT and Google Gemini,
    where access to the underlying code is restricted, DeepSeek makes its generative
    AI algorithms and training details open-source. This openness allows developers
    around the world to freely modify, contribute to, and build upon the code, creating
    a dynamic ecosystem of collaboration and innovation.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 深度探索公司（DeepSeek）与传统人工智能公司最大的不同之处可能就是其开源的方针。与ChatGPT和Google Gemini等专有模型不同，这些模型的底层代码访问受限，而深度探索公司将其生成式人工智能算法和训练细节开源。这种开放性使得全球的开发者可以自由地修改、贡献并在此基础上构建代码，从而形成了一个充满协作和创新的动态生态系统。
- en: By offering its code freely, DeepSeek fosters a culture of continuous improvement
    and global collaboration, where developers from different regions and disciplines
    can contribute to the growth and enhancement of its AI models. The company’s open-source
    strategy is intended to democratize AI access, ensuring that the technology is
    not limited to a few powerful players but is available to anyone with the capability
    to contribute.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 通过免费提供其代码，深度探索公司培养了一种持续改进和全球协作的文化，来自不同地区和学科的开发商可以为其AI模型的增长和改进做出贡献。公司的开源策略旨在实现人工智能访问的民主化，确保这项技术不仅仅局限于少数几个强大的玩家，而是对任何有能力做出贡献的人开放。
- en: 'Surpassing Rivals: DeepSeek''s Meteoric Rise'
  id: totrans-63
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 超越竞争对手：深度探索公司的飞速崛起
- en: In January 2025, DeepSeek made a bold move by releasing the DeepSeek-R1 AI chatbot
    app for both iOS and Android. Within just a few weeks, DeepSeek-R1 outpaced ChatGPT
    as the most-downloaded free app on the iOS App Store in the United States. This
    rapid rise was a signal of DeepSeek’s competitive strength, with many industry
    analysts attributing its success to its affordable pricing and cutting-edge technology.
    By 27 January 2025, the app had caused Nvidia’s stock price to plummet by 18%,
    as the implications of DeepSeek’s success began to ripple through the AI industry.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 2025年1月，深度探索公司大胆地推出了适用于iOS和Android的DeepSeek-R1人工智能聊天机器人应用程序。仅仅几周内，DeepSeek-R1就超越了ChatGPT，成为美国iOS应用商店下载量最大的免费应用程序。这种快速崛起是深度探索公司竞争实力的信号，许多行业分析师将其成功归因于其合理的定价和尖端技术。到2025年1月27日，该应用程序导致英伟达的股价下跌了18%，因为深度探索公司成功的余波开始波及整个AI行业。
- en: This victory over established AI giants such as OpenAI and Google is seen as
    the beginning of a global AI space race, where Chinese companies are stepping
    up to challenge the dominance of the United States in this critical field. DeepSeek’s
    free-to-use model further adds to its appeal, as it eliminates the paywall that
    often limits access to advanced features in other AI systems.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在OpenAI和谷歌等传统AI巨头中取得胜利被视为全球AI空间竞赛的开始，其中中国公司正在崛起，挑战美国在这一关键领域的统治地位。深度探索公司免费使用的模式进一步增加了其吸引力，因为它消除了限制其他AI系统高级功能访问的付费墙。
- en: The Role of China in the AI Revolution
  id: totrans-66
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 中国在人工智能革命中的作用
- en: DeepSeek’s rise is also a critical milestone in China’s quest for technological
    independence. By developing a cutting-edge AI system that rivals U.S. companies
    without relying on Western technology, DeepSeek is contributing to China’s broader
    efforts to reduce its dependency on foreign tech companies, particularly in the
    AI and semiconductor sectors. This move aligns with China’s ongoing push to develop
    homegrown technologies that can compete on the global stage, and DeepSeek is seen
    as a key player in this technological evolution.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的崛起也是中国追求技术独立的关键里程碑。通过开发一个与西方技术无关、与美国公司相媲美的尖端人工智能系统，DeepSeek 正在为中国减少对外国技术公司的依赖做出贡献，尤其是在人工智能和半导体领域。这一举措与中国持续推动发展本土技术、在全球舞台上竞争的努力相一致，DeepSeek
    被视为这一技术演变中的关键参与者。
- en: Moreover, DeepSeek’s development team is entirely Chinese, unlike many Silicon
    Valley AI companies, where teams often include engineers from various countries.
    By keeping the talent pool domestically sourced, DeepSeek represents a critical
    step towards retaining local talent and curbing the brain drain that often sees
    top researchers leaving for opportunities in the U.S. or Europe.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，DeepSeek 的开发团队完全由中国人组成，与许多硅谷人工智能公司不同，这些公司的团队通常包括来自不同国家的工程师。通过保持人才池的国内来源，DeepSeek
    代表了保留当地人才和遏制顶尖研究人员为美国或欧洲的机会而流失的关键一步。
- en: Impact on the AI Industry
  id: totrans-69
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 对人工智能行业的影响
- en: DeepSeek’s success has already begun to disrupt the competitive dynamics within
    the AI space. In May 2024, after the release of DeepSeek-V2, the company catalyzed
    a price war in China’s AI market. Competing companies such as ByteDance, Tencent,
    Baidu, and Alibaba were forced to cut the prices of their own models to keep up
    with DeepSeek’s aggressive pricing strategy. Despite its lower pricing, DeepSeek
    has managed to remain profitable, while its competitors struggle to break even.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的成功已经开始颠覆人工智能领域内的竞争动态。2024年5月，在DeepSeek-V2发布后，该公司在中国人工智能市场引发了一场价格战。字节跳动、腾讯、百度和阿里巴巴等竞争公司被迫降低自己模型的售价，以跟上DeepSeek激进的定价策略。尽管价格较低，DeepSeek仍然保持了盈利，而其竞争对手则难以实现收支平衡。
- en: The company’s influence in the AI industry extends beyond pricing; DeepSeek
    has also been praised for its inclusive hiring practices, which focus on technical
    abilities rather than previous work experience. As a result, the company recruits
    young AI researchers from top Chinese universities, as well as individuals from
    non-technical backgrounds, helping to broaden the scope of DeepSeek’s capabilities.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 该公司在人工智能行业的影响力不仅限于定价；DeepSeek 还因其包容性的招聘实践而受到赞誉，这些实践侧重于技术能力而非以往的工作经验。因此，公司从中国顶尖大学招募年轻的AI研究人员，以及来自非技术背景的个人，帮助扩大DeepSeek的能力范围。
- en: DeepSeek's strategic hiring approach also allows it to develop diverse models
    that can perform well across a wide range of tasks, including areas traditionally
    underrepresented in AI research, such as Chinese poetry and Gaokao (Chinese college
    admissions exams). This focus on diversifying talent and knowledge makes DeepSeek’s
    models adaptable to a variety of fields and applications, further setting it apart
    from its competitors.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的战略招聘方法还使其能够开发出能够在广泛任务中表现良好的多样化模型，包括在人工智能研究中传统上代表性不足的领域，如中国诗歌和高考（中国大学入学考试）。这种关注人才和知识的多样化使DeepSeek的模型能够适应各种领域和应用，进一步将其与竞争对手区分开来。
- en: 'Looking Forward: The Global AI Race'
  id: totrans-73
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 展望未来：全球人工智能竞赛
- en: DeepSeek’s rise signals a dramatic shift in the global AI landscape. The company’s
    success represents China’s growing influence in the AI space, challenging the
    dominance of U.S. tech giants and introducing a new era of global AI competition.
    As DeepSeek continues to innovate and disrupt the industry, the world will be
    watching closely to see how this open-source, cost-efficient approach to AI evolves.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的崛起标志着全球人工智能格局的巨大转变。该公司的成功代表着中国在人工智能领域的日益增长的影响力，挑战了美国科技巨头的统治地位，并引入了一个新的全球人工智能竞争时代。随着DeepSeek继续创新和颠覆行业，全世界都将密切关注这一开源、高效的人工智能方法如何演变。
- en: With its innovative models, affordable pricing, and commitment to global collaboration,
    DeepSeek is poised to remain at the forefront of the AI revolution—and may very
    well shape the future of technology for years to come.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 凭借其创新模型、合理的定价和对全球合作的承诺，DeepSeek 有望继续处于人工智能革命的尖端——并且很可能在未来几年塑造技术发展的未来。
- en: 'Chapter 1: Introduction - The DeepSeek Phenomenon'
  id: totrans-76
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一章：引言 - DeepSeek 现象
- en: 'The Global AI Landscape: A Shift in Power'
  id: totrans-77
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 全球人工智能格局：权力转移
- en: In the past decade, artificial intelligence (AI) has revolutionized industries,
    from healthcare and education to finance and entertainment. With the explosion
    of generative AI models such as OpenAI’s ChatGPT, Google’s Gemini, and others,
    the field has seen rapid innovation, opening up new possibilities for human-machine
    interaction. These AI models have become integral to the tech landscape, shifting
    the ways businesses operate, content is created, and personal assistance is delivered.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去十年中，人工智能（AI）已经彻底改变了医疗保健、教育、金融和娱乐等行业。随着 OpenAI 的 ChatGPT、谷歌的 Gemini 等生成式人工智能模型的爆炸式增长，该领域经历了快速创新，为人机交互开辟了新的可能性。这些人工智能模型已成为技术格局的组成部分，改变了企业运营、内容创作和个人辅助服务的方式。
- en: However, despite the breakthroughs in the West, the AI race is far from one-sided.
    In the last few years, Chinese tech companies have made impressive strides, quietly
    developing cutting-edge AI technologies that challenge the U.S.-dominated landscape.
    At the forefront of this push is DeepSeek, a Chinese AI-powered chatbot that has
    taken the tech world by surprise, rapidly rising through the ranks to challenge
    established models like ChatGPT and Google Gemini.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，尽管西方取得了突破，人工智能竞赛远非一边倒。在过去的几年里，中国科技公司取得了令人印象深刻的进步，悄然开发出挑战美国主导格局的尖端人工智能技术。在这一推动力最前沿的是
    DeepSeek，这是一款中国人工智能驱动的聊天机器人，它出人意料地迅速崛起，挑战了 ChatGPT 和谷歌 Gemini 等既定模型。
- en: 'DeepSeek''s Emergence: A New Challenger in the AI Space'
  id: totrans-80
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: DeepSeek 的崛起：人工智能领域的新挑战者
- en: DeepSeek's development, spearheaded by Chinese entrepreneur Liang Wenfeng, marks
    a critical turning point in the global AI race. Launched in January 2025, the
    platform quickly garnered attention not just for its technological capabilities,
    but also because of its ability to compete on a financial level that others have
    struggled to achieve. Where OpenAI’s GPT-4 reportedly cost more than $100 million
    to develop, DeepSeek’s R1 model was trained at a cost of just $6 million. This
    staggering difference in development costs, paired with its similarly impressive
    performance, makes DeepSeek an attractive option for developers, businesses, and
    consumers alike.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的发展，由中国企业家梁文峰领导，标志着全球人工智能竞赛的一个关键转折点。该平台于2025年1月启动，不仅因其技术能力而迅速引起关注，还因为它能够在金融层面上与其他人难以达到的水平竞争。据报道，OpenAI
    的 GPT-4 开发成本超过1亿美元，而 DeepSeek 的 R1 模型仅以600万美元的成本进行训练。这种惊人的开发成本差异，加上其同样令人印象深刻的性能，使
    DeepSeek 成为开发者、企业和消费者都感兴趣的选择。
- en: DeepSeek’s rise is particularly notable because it does not merely replicate
    the achievements of its Western counterparts; it fundamentally challenges them.
    The most striking difference between DeepSeek and its competitors is its open-source
    nature. Unlike ChatGPT or Google's Gemini, which are proprietary technologies,
    DeepSeek provides access to its codebase, allowing developers to modify, build
    upon, and tailor the model to their specific needs. This level of accessibility
    empowers the global AI community and fosters an environment of collaboration and
    continuous improvement.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的崛起尤其引人注目，因为它不仅仅复制了其西方竞争对手的成就；它从根本上挑战了它们。DeepSeek 与其竞争对手之间最显著的区别是其开源性质。与
    ChatGPT 或谷歌的 Gemini 这样的专有技术不同，DeepSeek 提供对其代码库的访问权限，允许开发者修改、在此基础上构建，并针对其特定需求定制模型。这种可访问性赋予了全球人工智能社区权力，并营造了一个协作和持续改进的环境。
- en: 'Cost-Efficiency: Changing the Paradigm'
  id: totrans-83
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 成本效益：改变范式
- en: Another factor behind DeepSeek's rapid adoption is its affordability. In a world
    where access to advanced AI tools often comes with a hefty price tag, DeepSeek
    presents a significant disruption. Many companies and developers have been locked
    out of using AI models due to the prohibitive costs involved in running and maintaining
    these systems. OpenAI’s subscription model for ChatGPT—with premium features requiring
    an ongoing payment—has created a divide between those who can afford it and those
    who cannot. DeepSeek, on the other hand, operates on a free-to-use model, with
    an option for advanced features available at a low cost, compared to the $20-per-month
    price of ChatGPT’s premium version.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek快速普及的另一个因素是其性价比。在一个先进AI工具的访问往往伴随着高昂价格标签的世界里，DeepSeek带来了重大的颠覆。许多公司和开发者由于运行和维护这些系统涉及的成本过高而被排除在AI模型的使用之外。OpenAI为ChatGPT提供的订阅模式——需要持续支付的高级功能——在能够负担得起的人和不能负担得起的人之间造成了分歧。另一方面，DeepSeek采用免费使用模式，高级功能以低廉的价格提供，与ChatGPT高级版每月20美元的价格相比。
- en: Furthermore, DeepSeek's pricing structure makes it an appealing choice for developers
    who wish to integrate AI into their applications without breaking the bank. API
    access for DeepSeek R1 starts at $0.14 per one million tokens—around 750,000 words—while
    OpenAI charges $7.50 for the same token volume. This disparity in pricing makes
    DeepSeek an attractive option, especially for smaller companies or individuals
    looking to harness the power of AI at a fraction of the cost.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，DeepSeek的定价结构使其成为希望在不破费的情况下将AI集成到其应用程序中的开发者的一个有吸引力的选择。DeepSeek R1的API访问费用起价为每100万个令牌0.14美元——大约750,000个单词——而OpenAI对相同令牌量的收费为7.50美元。这种价格差异使DeepSeek成为一个有吸引力的选择，特别是对于希望以较低成本利用AI的小公司或个人来说。
- en: 'An Open-Source Revolution: Empowering Developers Worldwide'
  id: totrans-86
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 开源革命：赋予全球开发者力量
- en: One of the most powerful aspects of DeepSeek is its open-source approach. The
    company has made its code available to anyone who wishes to use, adapt, or improve
    it. In the competitive world of AI, this is a radical move, as most leading models
    like GPT-4 are closed-source, meaning they are proprietary and their inner workings
    are not accessible to the general public. DeepSeek’s transparency empowers developers,
    researchers, and businesses to gain a deeper understanding of how the model works,
    make customizations, and potentially create new solutions that could accelerate
    innovation in the AI space.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek最强大的特点之一是其开源方法。该公司已将其代码对任何希望使用、修改或改进它的人开放。在竞争激烈的AI领域，这是一个激进的举动，因为大多数领先模型如GPT-4都是闭源，这意味着它们是专有的，其内部运作对公众不可访问。DeepSeek的透明度赋予开发者、研究人员和企业更深入理解模型工作原理、进行定制以及可能创造新解决方案的能力，这些新解决方案有可能加速AI领域的创新。
- en: The ability to download and modify an AI model provides developers the flexibility
    to optimize the chatbot for specific use cases. Whether it’s creating an AI for
    customer service, an assistant for programming, or a tutor for education, DeepSeek
    gives users the tools to mold the AI to their needs. This open-source model also
    drives collaborative development, encouraging contributions from experts and hobbyists
    alike. In turn, this model fosters community-driven growth, ensuring that DeepSeek
    continues to evolve rapidly, benefiting from collective intelligence and expertise.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 下载和修改AI模型的能力为开发者提供了优化聊天机器人以适应特定用例的灵活性。无论是创建用于客户服务的AI、编程助手还是教育辅导，DeepSeek都为用户提供工具来塑造AI以满足他们的需求。这种开源模式还推动了协作开发，鼓励专家和爱好者
    alike的贡献。反过来，这种模式促进了社区驱动的增长，确保DeepSeek继续快速进化，从集体智慧和专业知识中受益。
- en: 'Challenging the U.S. Tech Giants: DeepSeek’s Global Impact'
  id: totrans-89
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 挑战美国科技巨头：DeepSeek的全球影响力
- en: The rise of DeepSeek has serious implications for the global AI industry. For
    years, the West—particularly the United States—has dominated the AI sector. Companies
    like OpenAI, Google, Microsoft, and Nvidia have led the way in developing cutting-edge
    AI models that have set the standard for the industry. However, DeepSeek’s rapid
    ascent signals a shift in the balance of power. It demonstrates that China, once
    seen as a follower in the AI race, is now emerging as a formidable challenger.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的崛起对全球AI产业产生了重大影响。多年来，西方——尤其是美国——一直主导着AI领域。像OpenAI、谷歌、微软和英伟达这样的公司一直在开发前沿AI模型，为行业设定了标准。然而，DeepSeek的快速崛起标志着力量平衡的转变。它表明，曾经被视为AI竞赛中的追随者，中国现在正崛起为一个强大的挑战者。
- en: '![](image_rsrc127.jpg)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc127](image_rsrc127.jpg)'
- en: ––––––––
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: ––––––––
- en: DeepSeek’s impact is already being felt in Silicon Valley, where established
    companies are facing increased pressure to innovate and reduce costs. Nvidia,
    a key supplier of chips for AI model training, saw a 17% drop in its stock price
    following DeepSeek’s rise to prominence. This drop highlights the uncertainty
    now facing companies that once seemed invincible. DeepSeek has proven that cutting-edge
    AI models do not necessarily require the most advanced hardware or the largest
    budgets. Instead, innovation can thrive on efficiency, affordability, and creative
    problem-solving—factors that have historically been overshadowed by sheer financial
    power.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的影响已经在硅谷感受到，那里的传统公司正面临更大的创新和降低成本的压力。作为人工智能模型训练的关键芯片供应商，Nvidia 在 DeepSeek
    获得关注后，其股价下跌了 17%。这一下跌凸显了那些曾经看似不可战胜的公司现在所面临的不确定性。DeepSeek 已经证明，最前沿的人工智能模型并不一定需要最先进的硬件或最大的预算。相反，创新可以在效率、成本效益和创造性问题解决中蓬勃发展——这些因素在历史上一直被纯粹的经济实力所掩盖。
- en: 'China’s Technological Ambitions: A Growing Self-Reliance'
  id: totrans-94
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 中国的技术雄心：日益增强的自力更生
- en: DeepSeek’s emergence is not just a technical breakthrough but also a symbol
    of China’s broader technological ambitions. The country has long sought to become
    a global leader in AI, reducing its dependence on Western technology and fostering
    a homegrown innovation ecosystem. The Chinese government has been actively supporting
    the development of AI, with initiatives designed to encourage investment and talent
    in this critical field.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的出现不仅是一个技术突破，也是中国更广泛技术雄心的象征。这个国家长期以来一直寻求成为人工智能领域的全球领导者，减少对西方技术的依赖，并培养本土创新生态系统。中国政府一直在积极支持人工智能的发展，推出了旨在鼓励投资和人才进入这一关键领域的计划。
- en: DeepSeek fits perfectly into this vision. The company’s success is seen as a
    testament to China’s growing technological self-reliance. By developing its AI
    capabilities independently of Western technology, China can build a more resilient
    and autonomous AI ecosystem. DeepSeek’s growth is also emblematic of the new generation
    of entrepreneurs in China—young, ambitious, and focused on creating the next big
    thing in AI.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 完美地融入了这一愿景。公司的成功被视为中国日益增长的技术自力更生的证明。通过独立于西方技术发展其人工智能能力，中国可以构建一个更具弹性和自主性的人工智能生态系统。DeepSeek
    的增长也象征着中国新一代企业家——他们年轻、雄心勃勃，专注于创造人工智能领域的下一个重大突破。
- en: Liang Wenfeng, the founder of DeepSeek, is part of this emerging wave of Chinese
    tech innovators. With a background in finance and quantitative trading, Liang’s
    approach to AI is pragmatic and results-oriented. Unlike many Western entrepreneurs
    who focus on Silicon Valley as the epicenter of innovation, Liang’s vision for
    DeepSeek is global, with a focus on providing affordable, accessible AI to anyone,
    anywhere. His success proves that innovation can come from anywhere and that the
    AI race is becoming increasingly multi-polar.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的创始人梁文峰是这一新兴的中国科技创新浪潮的一部分。拥有金融和量化交易背景的梁，对人工智能的方法是务实的、以结果为导向的。与许多将硅谷视为创新中心的西方企业家不同，梁对
    DeepSeek 的愿景是全球性的，专注于为任何地方、任何人提供负担得起、易于获取的人工智能。他的成功证明创新可以来自任何地方，人工智能竞赛正变得越来越多极化。
- en: The Future of DeepSeek and the AI Landscape
  id: totrans-98
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: DeepSeek 和人工智能领域的未来
- en: Looking ahead, DeepSeek is poised to become a significant player in the AI landscape.
    The company’s commitment to being open-source and affordable has won it a devoted
    following, and its potential for continued growth is vast. As AI technology continues
    to evolve, DeepSeek is likely to adapt and refine its offerings, adding new features
    and capabilities to stay competitive.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 展望未来，DeepSeek 有望成为人工智能领域的重要参与者。公司致力于开源和性价比，赢得了忠实的追随者，其持续增长潜力巨大。随着人工智能技术的持续发展，DeepSeek
    很可能适应和改进其产品，增加新的功能和能力，以保持竞争力。
- en: However, the future is not without challenges. One of the major hurdles DeepSeek
    will face is navigating geopolitical tensions. As a Chinese company, DeepSeek
    is operating in a landscape where political considerations could impact its access
    to markets, funding, and partnerships. The company’s open-source nature could
    also attract scrutiny, particularly from governments concerned about security
    and data privacy.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，未来并非没有挑战。DeepSeek 将面临的主要障碍之一是应对地缘政治紧张局势。作为一家中国公司，DeepSeek 在一个政治考量可能影响其进入市场、获得资金和合作伙伴关系的环境中运营。公司的开源性质也可能吸引审查，尤其是那些对安全和数据隐私感到担忧的政府。
- en: Additionally, while DeepSeek has made significant strides, it is still in the
    early stages of its development. Competitors like OpenAI and Google have a head
    start in terms of brand recognition and market penetration. The coming years will
    be critical for DeepSeek as it seeks to expand its user base, increase its technological
    capabilities, and establish itself as a dominant force in the AI industry.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，尽管DeepSeek取得了重大进展，但它仍处于发展的早期阶段。像OpenAI和Google这样的竞争对手在品牌认知和市场渗透方面有先发优势。在接下来的几年里，对于DeepSeek来说，寻求扩大用户基础、增强其技术能力并确立其在人工智能行业中的主导地位将是关键。
- en: 'Conclusion: The Dawn of a New Era in AI'
  id: totrans-102
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结论：人工智能新时代的曙光
- en: In conclusion, DeepSeek’s rise represents more than just a technological achievement—it
    is a symbol of the changing dynamics in the AI industry. By offering an open-source,
    cost-effective alternative to established players like ChatGPT and Google Gemini,
    DeepSeek has proven that innovation is no longer constrained by budgets or geography.
    As the world enters a new phase of the AI revolution, DeepSeek’s influence is
    set to continue growing, reshaping the way we think about artificial intelligence
    and its potential to transform the world.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，DeepSeek的崛起不仅仅是一个技术成就的象征，它代表了人工智能行业动态的变化。通过提供开源、成本效益高的替代方案，DeepSeek证明了创新不再受预算或地理的限制。随着世界进入人工智能革命的新的阶段，DeepSeek的影响力预计将继续增长，重塑我们对人工智能及其改变世界的潜力的看法。
- en: In the coming chapters, we will delve deeper into DeepSeek’s technology, the
    company’s development process, and its potential impact on industries, as well
    as the broader geopolitical implications of China’s rise as a technological powerhouse.
    The DeepSeek phenomenon is just beginning, and its story is one of innovation,
    disruption, and global competition that will shape the future of AI for years
    to come.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将更深入地探讨DeepSeek的技术、公司的发展过程以及其对行业的影响，以及中国作为技术强国崛起的更广泛的地缘政治影响。DeepSeek现象才刚刚开始，其故事是关于创新、颠覆和全球竞争的，这将塑造未来多年的AI发展。
- en: 'Chapter 2: What Makes DeepSeek Special?'
  id: totrans-105
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章：是什么让DeepSeek与众不同？
- en: DeepSeek’s rapid rise to prominence in the AI industry has caught the attention
    of developers, researchers, and tech enthusiasts worldwide. The AI model has not
    only garnered praise for its impressive performance but also for the distinctive
    features that set it apart from its competitors. In this chapter, we’ll explore
    the key characteristics that make DeepSeek a truly revolutionary AI platform.
    From its cost efficiency to its open-source nature, these unique aspects are central
    to its success and its growing influence in the AI ecosystem.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek在人工智能行业中的迅速崛起引起了全球开发者、研究人员和科技爱好者的关注。这个AI模型不仅因其令人印象深刻的性能而受到赞誉，还因其独特的特性而脱颖而出。在本章中，我们将探讨使DeepSeek成为真正革命性AI平台的关键特征。从其成本效益到其开源性质，这些独特的方面是其成功及其在人工智能生态系统中日益增长的影响力之核心。
- en: 'Cost Efficiency: A Game Changer in AI Development'
  id: totrans-107
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 成本效益：人工智能开发中的游戏改变者
- en: One of the most notable features of DeepSeek is its cost efficiency. The traditional
    approach to developing large language models has been incredibly expensive. For
    instance, OpenAI’s GPT-4, widely regarded as one of the most powerful AI models
    to date, reportedly cost over $100 million to develop and train. This astronomical
    price tag reflects the immense computing power and resources required to build
    such sophisticated models, often creating a barrier to entry for smaller companies
    and independent developers.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek最显著的特征之一是其成本效益。传统开发大型语言模型的方法成本极高。例如，OpenAI的GPT-4，被认为是迄今为止最强大的AI模型之一，据报道其开发和训练成本超过1亿美元。这个天文数字的价格标签反映了构建如此复杂模型所需的巨大计算能力和资源，这通常为小型公司和独立开发者设置了进入门槛。
- en: In stark contrast, DeepSeek’s R1 model was trained at a fraction of the cost—an
    estimated $6 million. This dramatic difference in development expenses is largely
    attributed to a variety of factors, including efficiency in design, optimization
    techniques, and innovative resource management.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，DeepSeek的R1模型仅以一小部分成本进行训练——估计为600万美元。这种在开发费用上的巨大差异主要归因于多种因素，包括设计效率、优化技术和创新资源管理。
- en: The cost savings achieved by DeepSeek are not just an impressive feat in themselves—they
    represent a major shift in the AI development paradigm. Reducing the financial
    burden of training large-scale models allows for more widespread access to powerful
    AI tools. Developers and businesses that previously could not afford to integrate
    AI solutions into their products can now leverage DeepSeek’s technology without
    the same financial strain.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek实现的成本节约不仅仅是一项令人印象深刻的成就——它代表了AI开发范式的一个重大转变。降低大规模模型训练的财务负担，使得更广泛地访问强大的AI工具成为可能。以前无法承担将AI解决方案集成到其产品中的开发和商业公司现在可以无相同财务压力地利用DeepSeek的技术。
- en: Moreover, the lower development cost also allows DeepSeek to operate with a
    more affordable pricing structure for consumers. Many AI models, including OpenAI’s
    ChatGPT and Google’s Gemini, charge substantial fees for premium features or API
    access. DeepSeek, on the other hand, offers a free-to-use platform for many of
    its basic functions, with paid options available at a much lower cost. This approach
    has democratized access to cutting-edge AI, making it accessible to a larger global
    audience, from startups to students and hobbyists.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，较低的开发成本也使得DeepSeek能够以更实惠的价格结构为消费者提供服务。许多AI模型，包括OpenAI的ChatGPT和谷歌的Gemini，都对其高级功能或API访问收取高额费用。另一方面，DeepSeek为其许多基本功能提供了一个免费使用的平台，而付费选项的成本则低得多。这种做法使尖端AI的访问权民主化，使其对从初创公司到学生和爱好者的更广泛的全球受众变得可及。
- en: 'Lower Computing Requirements: Streamlining Efficiency'
  id: totrans-112
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 降低计算需求：简化效率
- en: Another groundbreaking feature of DeepSeek is its lower computing requirements
    compared to its competitors. Training a model like GPT-4 or Google’s Gemini demands
    an enormous amount of computational power. These models are often run on powerful
    servers using high-performance GPUs and require vast amounts of energy to function.
    As the demand for AI continues to grow, the computing requirements of traditional
    large language models have become a significant concern for both businesses and
    the environment.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 与其竞争对手相比，DeepSeek的另一个突破性特点是其较低的计算需求。训练GPT-4或谷歌的Gemini这样的模型需要巨大的计算能力。这些模型通常在配备高性能GPU的强大服务器上运行，并且需要消耗大量能量才能运行。随着对AI需求的持续增长，传统大型语言模型的计算需求已经成为企业和环境的一个重大问题。
- en: DeepSeek has found ways to minimize the computing power required without compromising
    on the performance of the model. The company’s team of engineers focused on optimizing
    the architecture and refining the model’s efficiency. By implementing advanced
    compression techniques, parameter sharing, and other innovations, DeepSeek’s R1
    model can run on fewer resources while still delivering high-quality responses
    and maintaining a competitive level of sophistication.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek找到了一种方法，在不过度牺牲模型性能的情况下，最小化所需的计算能力。该公司的工程师团队专注于优化架构和改进模型的效率。通过实施先进的压缩技术、参数共享和其他创新，DeepSeek的R1模型可以在更少的资源上运行，同时仍然提供高质量的响应并保持具有竞争力的复杂程度。
- en: This reduction in computational demand has several important implications. First,
    it significantly reduces operational costs, making it more affordable for companies
    to run DeepSeek’s models at scale. For example, deploying a chatbot service using
    DeepSeek would be much less resource-intensive than running similar services with
    other models. Second, it has environmental benefits—since less computing power
    means less energy consumption, DeepSeek’s technology is far more sustainable than
    that of many competitors.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 这种计算需求的减少具有几个重要的意义。首先，它显著降低了运营成本，使得公司以规模运行DeepSeek的模型变得更加经济。例如，使用DeepSeek部署聊天机器人服务将比使用其他模型运行类似服务消耗的资源少得多。其次，它具有环境效益——由于计算能力较低意味着能耗较低，DeepSeek的技术比许多竞争对手的技术更具可持续性。
- en: For developers, the ability to deploy a powerful AI model with lower hardware
    requirements opens up a world of new possibilities. Smaller startups, universities,
    and independent researchers, who often lack the resources to access the high-end
    computing systems required for other models, can now use DeepSeek without worrying
    about expensive infrastructure or cloud computing fees. This has created a level
    playing field in AI development, where innovation is no longer solely dependent
    on the size of a company’s budget.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 对于开发者来说，能够部署具有较低硬件要求的强大AI模型开辟了新的可能性。小型初创公司、大学和独立研究人员，他们通常缺乏访问其他模型所需的高端计算系统的资源，现在可以使用DeepSeek而无需担心昂贵的基础设施或云计算费用。这已经在AI开发中创造了一个公平的竞争环境，创新不再仅仅依赖于公司预算的大小。
- en: 'Open-Source: A Collaborative Revolution'
  id: totrans-117
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 开源：一场协作革命
- en: Perhaps the most radical aspect of DeepSeek’s offering is its open-source nature.
    While many leading AI models, including ChatGPT, are proprietary and closed-source,
    DeepSeek has chosen a fundamentally different path. The entire DeepSeek R1 codebase
    is available to the public, enabling developers, researchers, and enthusiasts
    to access, modify, and contribute to the AI model.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek提供的最激进的方面可能是其开源的本质。虽然许多领先的AI模型，包括ChatGPT，都是专有和封闭源代码的，但DeepSeek选择了根本不同的路径。DeepSeek
    R1的整个代码库对公众开放，使得开发者、研究人员和爱好者能够访问、修改和为AI模型做出贡献。
- en: This open-source approach has transformed the way AI development works. In traditional
    proprietary models, users are limited to the pre-configured capabilities provided
    by the company behind the model. They cannot inspect the inner workings of the
    AI, customize its architecture, or build upon it to suit specific needs. DeepSeek,
    on the other hand, allows anyone to dive into the code, explore how the model
    was constructed, and make improvements.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这种开源方法改变了AI开发的方式。在传统的专有模型中，用户仅限于模型背后的公司提供的预配置功能。他们无法检查AI的内部运作，无法自定义其架构，也无法在此基础上构建以满足特定需求。另一方面，DeepSeek允许任何人深入代码，探索模型是如何构建的，并对其进行改进。
- en: The open-source model fosters collaboration and community-driven innovation.
    Developers from around the world are encouraged to experiment with DeepSeek’s
    model, propose changes, and contribute new features. This collaborative approach
    not only accelerates the pace of innovation but also ensures that the technology
    evolves in ways that might not be possible under a closed-source, top-down model.
    The collective knowledge and expertise of the global developer community can be
    harnessed to make DeepSeek even more powerful and versatile.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 开源模式促进了协作和社区驱动的创新。来自世界各地的开发者被鼓励尝试DeepSeek的模型，提出更改，并贡献新功能。这种协作方法不仅加速了创新的速度，而且还确保了技术以可能无法在封闭源代码、自上而下的模式下实现的方式发展。全球开发者社区的集体知识和专业知识可以用来使DeepSeek更加强大和多功能。
- en: For businesses, the ability to modify DeepSeek’s code to suit their specific
    use cases is a significant advantage. Whether it’s adapting the model to handle
    industry-specific jargon, fine-tuning it for a particular type of customer interaction,
    or creating new capabilities entirely, the possibilities are nearly limitless.
    In contrast, proprietary models require users to work within the constraints set
    by the company, which can limit creativity and customization.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 对于企业来说，能够修改DeepSeek的代码以适应其特定用例是一个重大优势。无论是将模型适应处理行业特定术语，针对特定类型的客户互动进行微调，还是完全创建新的功能，可能性几乎是无限的。相比之下，专有模型要求用户在公司设定的限制内工作，这可能会限制创造性和定制化。
- en: The open-source nature of DeepSeek also promotes transparency. As AI models
    grow in power and complexity, concerns about bias, data privacy, and ethics become
    more pronounced. By making the code available for public scrutiny, DeepSeek ensures
    that its technology remains accountable and that its development aligns with the
    values of the wider AI community. If any issues arise, they can be quickly identified
    and addressed by contributors, improving the trustworthiness and safety of the
    model.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的开源性质也促进了透明度。随着AI模型在力量和复杂性上的增长，关于偏见、数据隐私和伦理的关注变得更加明显。通过使代码可供公众审查，DeepSeek确保其技术保持问责制，并且其发展符合更广泛AI社区的价值。如果出现任何问题，它们可以由贡献者迅速识别和解决，从而提高模型的可信度和安全性。
- en: 'Why Open-Source Matters: The Larger Implications'
  id: totrans-123
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 开源的重要性：更广泛的影响
- en: DeepSeek’s decision to embrace an open-source model is not just a strategic
    business move—it's a reflection of a larger philosophical shift within the AI
    community. Open-source AI has the potential to level the playing field, giving
    developers from less-resourced regions or companies the opportunity to contribute
    to the global conversation on artificial intelligence. This inclusive approach
    helps to bridge gaps in access to cutting-edge technologies, fostering a diverse
    and representative ecosystem of AI development.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 选择拥抱开源模式不仅仅是一个战略性的商业决策——它反映了人工智能社区内更大哲学转变的反映。开源人工智能有潜力使竞争更加公平，为资源较少地区的开发者或公司提供参与全球人工智能对话的机会。这种包容性方法有助于弥合获取尖端技术方面的差距，培养一个多元化和具有代表性的人工智能开发生态系统。
- en: Additionally, DeepSeek’s open-source model allows the AI community to be more
    agile in responding to emerging challenges. Whether it’s adapting to regulatory
    changes, improving language support for different regions, or addressing new ethical
    concerns, an open-source model enables faster and more responsive development.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，DeepSeek 的开源模式允许人工智能社区更加敏捷地应对新兴挑战。无论是适应监管变化、改善对不同地区的语言支持，还是解决新的伦理问题，开源模式能够促进更快、更灵活的开发。
- en: The open-source movement in AI is also contributing to a broader trend toward
    transparency in the tech industry. As consumers and businesses demand more accountability
    and ethical considerations in AI systems, DeepSeek’s approach sets an example
    for other companies to follow. By choosing to be transparent with its code, DeepSeek
    demonstrates that openness and innovation can go hand in hand.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能领域的开源运动也在推动科技行业向透明度更广泛的趋势发展。随着消费者和企业在人工智能系统中要求更多的责任感和伦理考量，DeepSeek 的方法为其他公司树立了榜样。通过选择对其代码保持透明，DeepSeek
    表明开放性和创新可以相辅相成。
- en: 'Conclusion: The Future of DeepSeek and Its Unique Edge'
  id: totrans-127
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结论：DeepSeek 的未来及其独特的优势
- en: DeepSeek’s unique characteristics—the combination of cost efficiency, lower
    computing requirements, and open-source accessibility—make it an exceptional and
    revolutionary force in the AI space. The model’s affordability and sustainability
    represent a clear departure from the traditional, resource-intensive models of
    AI, offering a more inclusive and accessible future for developers, businesses,
    and researchers alike.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的独特特征——成本效益、较低的计算需求和开源可访问性的结合——使其成为人工智能领域的一个非凡和革命性的力量。该模型的可负担性和可持续性明显区别于传统的、资源密集型的人工智能模型，为开发者、企业和研究人员提供了一个更包容和可访问的未来。
- en: As DeepSeek continues to evolve, it is likely to push the boundaries of what
    is possible in AI, both technologically and socially. Its focus on collaboration
    and community-driven development ensures that the platform will remain dynamic
    and innovative, while its affordable pricing and efficient operation will help
    redefine the role of AI in the global tech ecosystem.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 随着 DeepSeek 的持续发展，它很可能会推动人工智能在技术和社会层面上的可能性边界。它对协作和社区驱动的开发的关注确保了平台将保持活力和创新，而其合理的定价和高效运作将有助于重新定义人工智能在全球科技生态系统中的作用。
- en: The impact of DeepSeek extends beyond just the capabilities of its model—it
    is reshaping the very philosophy of AI development. By embracing openness, sustainability,
    and collaboration, DeepSeek has not only positioned itself as a leader in AI technology
    but also set the stage for a more inclusive and diverse future in the world of
    artificial intelligence.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的影响不仅限于其模型的能力——它正在重塑人工智能开发的哲学。通过拥抱开放性、可持续性和协作，DeepSeek 不仅将自己定位为人工智能技术的领导者，也为人工智能世界的更包容和多元化的未来奠定了基础。
- en: In the next chapter, we will dive deeper into the specific technological innovations
    that have enabled DeepSeek to achieve such impressive results and examine how
    these innovations continue to drive the platform’s success.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将更深入地探讨使 DeepSeek 取得如此令人印象深刻的成果的具体技术创新，并检查这些创新如何继续推动平台的成功。
- en: 'Chapter 3: The Technology Behind DeepSeek'
  id: totrans-132
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 3 章：DeepSeek 背后的技术
- en: DeepSeek’s rise to prominence has not only been a result of its unique business
    model and accessibility but also due to the cutting-edge technology and innovative
    strategies used to build its base model—DeepSeek-R1. This chapter explores the
    technological foundation of DeepSeek, the strategic decisions that allowed it
    to achieve a competitive edge, and the role that Liang Wenfeng, the founder, played
    in shaping its success.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的崛起不仅得益于其独特的商业模式和易用性，还归功于构建其基础模型DeepSeek-R1所使用的尖端技术和创新策略。本章探讨了DeepSeek的技术基础、使其获得竞争优势的战略决策以及创始人梁文峰在塑造其成功中所扮演的角色。
- en: The Vision of Liang Wenfeng and High-Flyer
  id: totrans-134
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 梁文峰的愿景与高飞者
- en: DeepSeek was created by Liang Wenfeng, a prominent figure in the world of finance
    and technology. Before venturing into AI development, Liang was the head of High-Flyer,
    a hedge fund that focused on AI-driven quantitative trading strategies. His background
    in finance and algorithmic trading greatly influenced his approach to building
    DeepSeek, as he understood the immense potential of AI models to solve complex
    problems while driving efficiencies in various industries.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek是由梁文峰创建的，他是金融和技术界的杰出人物。在涉足AI开发之前，梁文峰是High-Flyer的对冲基金负责人，该基金专注于AI驱动的量化交易策略。他在金融和算法交易方面的背景极大地影响了他的DeepSeek构建方法，因为他理解AI模型解决复杂问题的巨大潜力，同时推动各个行业的效率提升。
- en: Liang’s experience with quantitative trading involved designing models that
    could handle massive amounts of data, optimize for specific goals, and deliver
    high returns with minimal resource usage. These principles—efficiency, optimization,
    and cost-effectiveness—became the guiding philosophy for the development of DeepSeek.
    He realized early on that while AI could revolutionize a wide range of fields,
    its potential was often stifled by the high costs associated with developing and
    running large models.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 梁文峰在量化交易方面的经验包括设计能够处理大量数据、针对特定目标进行优化并以最小资源使用实现高回报的模型。这些原则——效率、优化和成本效益——成为DeepSeek开发的指导哲学。他早期就意识到，尽管AI可以革命性地改变众多领域，但其潜力往往受到开发和大模型运行的高成本的限制。
- en: With this in mind, Liang set out to create a powerful yet cost-efficient AI
    platform that could compete with industry giants such as OpenAI’s GPT-4 and Google’s
    Gemini, without the exorbitant development costs that typically accompany such
    models. The result of this vision is DeepSeek—an AI chatbot that rivals the capabilities
    of the most advanced models but remains affordable and accessible to a much broader
    audience.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个想法的指导下，梁文峰着手创建一个强大且成本效益高的AI平台，能够在不伴随典型模型的高昂开发成本的情况下，与OpenAI的GPT-4和Google的Gemini等行业巨头竞争。这一愿景的结果是DeepSeek——一个与最先进模型能力相媲美的AI聊天机器人，但价格合理且对更广泛的受众可及。
- en: 'Building the DeepSeek-R1 Model: Combining Power and Efficiency'
  id: totrans-138
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 构建DeepSeek-R1模型：结合力量与效率
- en: At the core of DeepSeek’s success is the DeepSeek-R1 model, which serves as
    the foundation of the platform. The DeepSeek-R1 model offers competitive performance
    in natural language processing, rivaling models like GPT-4 in terms of capabilities,
    despite being built at a significantly lower cost. This impressive performance
    was achieved through a combination of advanced engineering, resource optimization,
    and strategic hardware choices.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek成功的核心是其DeepSeek-R1模型，该模型作为平台的基础。DeepSeek-R1模型在自然语言处理方面表现出色，尽管其构建成本显著低于GPT-4等模型，但在能力上与GPT-4相媲美。这种令人印象深刻的性能是通过结合高级工程、资源优化和战略硬件选择实现的。
- en: The development of DeepSeek-R1 was accomplished through the use of an expansive
    store of Nvidia A100 GPUs—a key component in the training of many large language
    models. These high-performance chips are renowned for their ability to handle
    the massive parallel computations required by AI models like DeepSeek. It’s estimated
    that DeepSeek used up to 50,000 Nvidia A100 GPUs during the training process,
    a staggering amount of computational power that underscores the scale at which
    the model was developed.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek-R1的开发是通过使用大量的Nvidia A100 GPU完成的——这是许多大型语言模型训练的关键组件。这些高性能芯片以其处理AI模型如DeepSeek所需的巨大并行计算能力而闻名。据估计，DeepSeek在训练过程中使用了高达50,000个Nvidia
    A100 GPU，这一惊人的计算能力凸显了模型开发的规模。
- en: However, acquiring such a large number of high-end GPUs was not without its
    challenges. In particular, U.S. export restrictions on chip technology to China
    created a significant hurdle for DeepSeek’s development. As part of its efforts
    to circumvent these restrictions, DeepSeek strategically acquired these GPUs in
    advance of the restrictions being imposed. This foresight allowed the team to
    amass the necessary computational power to build DeepSeek-R1 without being hindered
    by the global chip supply chain disruptions that followed.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，获取如此大量的高端 GPU 并非没有挑战。特别是，美国对中国芯片技术的出口限制为 DeepSeek 的发展设置了重大障碍。作为规避这些限制的一部分，DeepSeek
    在限制实施之前战略性地提前购买了这些 GPU。这种远见使得团队能够积累必要的计算能力来构建 DeepSeek-R1，而不会受到随后全球芯片供应链中断的阻碍。
- en: Despite the large number of Nvidia A100 GPUs, DeepSeek employed a strategy of
    resource optimization by pairing them with cheaper alternatives, such as mid-range
    GPUs. This hybrid approach allowed DeepSeek to maximize the computational power
    provided by the more expensive Nvidia A100 chips, while minimizing the overall
    cost of the infrastructure required to train the model.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管拥有大量的 Nvidia A100 GPU，DeepSeek 通过将它们与更便宜的替代品（如中端 GPU）配对，采用了资源优化的策略。这种混合方法使
    DeepSeek 能够最大化更昂贵的 Nvidia A100 芯片提供的计算能力，同时最小化训练模型所需的基础设施的整体成本。
- en: By using a combination of high-end and budget GPUs, DeepSeek managed to develop
    a model that is both powerful and cost-efficient. This hybrid model of GPU utilization
    was one of the key innovations that allowed DeepSeek to maintain competitive performance
    while keeping development costs low—something that would not have been possible
    with a purely high-end GPU approach.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用高端和预算 GPU 的组合，DeepSeek 成功开发出既强大又经济的模型。这种 GPU 利用的混合模型是 DeepSeek 保持竞争优势同时保持开发成本低的几个关键创新之一——这在仅使用高端
    GPU 方法的情况下是不可能的。
- en: Optimizing Model Architecture for Efficiency
  id: totrans-144
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 优化模型架构以提高效率
- en: The success of DeepSeek-R1 also lies in the architecture of the model itself.
    Building on the foundational principles that Liang Wenfeng applied in his work
    with AI-driven quantitative trading, the DeepSeek team focused heavily on optimizing
    every aspect of the model’s design and training process.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek-R1 的成功也在于其模型本身的架构。基于梁文峰在 AI 驱动的量化交易工作中应用的坚实基础，DeepSeek 团队高度重视优化模型设计的各个方面以及训练过程。
- en: DeepSeek-R1 employs an advanced form of sparse modeling, a technique that enables
    the model to focus its attention on the most relevant parameters for a given task.
    This reduces the computational burden while retaining a high level of performance.
    Unlike traditional models, which require large amounts of data to be processed
    across a wide range of parameters, DeepSeek-R1 selectively processes only the
    most critical data, allowing it to be more resource-efficient without sacrificing
    accuracy.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek-R1 采用了一种高级的稀疏建模形式，这是一种使模型能够专注于给定任务中最相关参数的技术。这减少了计算负担，同时保持了高性能。与传统模型不同，传统模型需要处理大量数据，跨越广泛的参数，而
    DeepSeek-R1 只选择性地处理最关键的数据，使其在保持准确性的同时更加资源高效。
- en: In addition, DeepSeek also integrates adaptive algorithms that allow the model
    to fine-tune itself over time based on user interactions. By employing machine
    learning techniques like reinforcement learning and self-supervised learning,
    DeepSeek-R1 is able to continually improve its performance and efficiency. This
    dynamic learning approach allows the model to learn from both the data it is trained
    on and the real-world interactions it has with users, making it a highly adaptable
    and scalable system.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，DeepSeek 还集成了自适应算法，这些算法允许模型根据用户交互随着时间的推移进行微调。通过采用强化学习、自监督学习等机器学习技术，DeepSeek-R1
    能够持续改进其性能和效率。这种动态学习方法使模型能够从其训练数据以及与用户的真实世界交互中学习，使其成为一个高度适应性和可扩展的系统。
- en: Strategic Hardware Choices and Their Impact on Cost Efficiency
  id: totrans-148
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 策略性硬件选择及其对成本效率的影响
- en: While the use of Nvidia A100 GPUs was essential for DeepSeek’s performance,
    the real innovation came in the hybridization of hardware. DeepSeek’s team made
    a calculated decision to use not only high-end Nvidia A100 GPUs but also lower-cost
    alternatives such as AMD GPUs and lesser-known chip models. This allowed DeepSeek
    to significantly reduce its overall hardware expenses, particularly in comparison
    to the likes of OpenAI and Google, which predominantly use high-end, single-brand
    GPU systems for their models.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然使用Nvidia A100 GPU对于DeepSeek的性能至关重要，但真正的创新在于硬件的混合化。DeepSeek团队做出了一个有计划的决策，不仅使用高端的Nvidia
    A100 GPU，还使用了成本较低的替代品，如AMD GPU和不太知名的芯片型号。这使得DeepSeek能够显著降低其整体硬件成本，尤其是在与OpenAI和Google等主要使用高端、单一品牌GPU系统的公司相比时。
- en: The cost-efficiency of this hybrid hardware approach cannot be overstated. Training
    a model like DeepSeek-R1 on the scale required for global deployment would have
    been financially prohibitive if the team had relied solely on top-tier Nvidia
    chips. By using less expensive hardware options without sacrificing performance,
    DeepSeek managed to keep its training costs around $6 million, an incredible feat
    considering the costs incurred by similar models in the market. This strategy
    played a key role in DeepSeek’s ability to offer free or low-cost access to users,
    a major selling point for the platform.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 这种混合硬件方法的成本效益不容小觑。如果团队仅依赖顶级Nvidia芯片，那么在所需规模上进行DeepSeek-R1模型的训练在财务上将是不可行的。通过使用成本较低的硬件选项而不牺牲性能，DeepSeek设法将训练成本保持在约600万美元，考虑到市场上类似模型的成本，这是一个了不起的成就。这种策略在DeepSeek能够向用户提供免费或低成本访问方面发挥了关键作用，这是该平台的一个主要卖点。
- en: The Role of Data and Preprocessing
  id: totrans-151
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据和预处理的作用
- en: Another key component in DeepSeek’s technological success lies in the way the
    model was trained on massive amounts of data. Similar to other large language
    models, DeepSeek-R1 was trained using vast datasets gathered from a wide range
    of sources, including books, academic papers, websites, and other forms of public
    text data. However, DeepSeek’s team placed a strong emphasis on data quality over
    quantity. By curating high-quality datasets and focusing on data preprocessing,
    they ensured that DeepSeek’s model was not only trained on diverse and relevant
    data but also optimized for accuracy.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek技术成功的关键因素之一在于其模型在大量数据上的训练方式。与其他大型语言模型类似，DeepSeek-R1使用从书籍、学术论文、网站和其他形式的公共文本数据中收集的大量数据集进行训练。然而，DeepSeek团队更加强调数据质量而非数量。通过精心挑选高质量的数据集并专注于数据预处理，他们确保DeepSeek的模型不仅基于多样且相关的数据，而且为了准确性进行了优化。
- en: The preprocessing pipeline involved data cleaning, removal of biases, and the
    standardization of input formats to improve the model's ability to understand
    and process complex language. The focus on data quality ensured that DeepSeek
    could produce responses that were both contextually accurate and culturally aware,
    making it a valuable tool for a wide range of applications.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 预处理流程包括数据清理、去除偏见和标准化输入格式，以提高模型理解和处理复杂语言的能力。对数据质量的关注确保了DeepSeek能够生成既符合语境又具有文化意识的响应，使其成为广泛应用的宝贵工具。
- en: 'Conclusion: The Technological Edge of DeepSeek'
  id: totrans-154
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结论：DeepSeek的技术优势
- en: The technology behind DeepSeek is a product of both innovative hardware choices
    and advanced AI techniques. Through the use of a hybrid GPU setup, the application
    of efficient algorithms, and a focus on data quality, DeepSeek has been able to
    create a powerful and cost-effective AI model that challenges the dominance of
    established players in the AI space.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek背后的技术是创新硬件选择和先进人工智能技术的产物。通过使用混合GPU配置、应用高效算法和关注数据质量，DeepSeek能够创建一个强大且成本效益高的AI模型，挑战AI领域现有玩家的主导地位。
- en: Liang Wenfeng’s background in finance and quantitative trading has heavily influenced
    the development of DeepSeek, instilling an ethos of efficiency, optimization,
    and cost-effectiveness into the model’s design. By combining powerful hardware,
    cutting-edge algorithms, and a collaborative approach to development, DeepSeek
    has created a model that competes with the best in the industry while maintaining
    accessibility for a global audience.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 梁文峰在金融和量化交易方面的背景对DeepSeek的发展产生了重大影响，将效率、优化和成本效益的理念融入模型设计。通过结合强大的硬件、尖端算法和协作的开发方法，DeepSeek创造了一个能够与行业最佳产品竞争的模型，同时保持了全球受众的易用性。
- en: In the next chapter, we will explore the business implications of DeepSeek’s
    success, examining how its affordable pricing, open-source nature, and innovative
    model are reshaping the AI landscape and impacting the global technology market.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨DeepSeek成功的商业影响，分析其可负担的价格、开源性质和创新模式如何重塑AI格局并影响全球科技市场。
- en: 'Chapter 4: DeepSeek vs. ChatGPT: A Comparison'
  id: totrans-158
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四章：DeepSeek与ChatGPT：比较
- en: As artificial intelligence continues to evolve, one of the most significant
    battles in the AI space is the competition between cutting-edge models like DeepSeek-R1
    and ChatGPT. Both are highly capable large language models, but each has distinct
    features, strengths, and business models that make them unique. In this chapter,
    we will compare DeepSeek and ChatGPT across several key areas—cost, subscription
    models, privacy, open-source nature, and use cases—to understand what sets these
    two AI giants apart.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能的不断发展，AI领域最重大的战斗之一是DeepSeek-R1和ChatGPT等尖端模型之间的竞争。这两个都是高度能干的大型语言模型，但它们各自具有独特的特征、优势和商业模式，使它们与众不同。在本章中，我们将从成本、订阅模式、隐私、开源性质和用例等几个关键领域比较DeepSeek和ChatGPT，以了解这两大AI巨头有何不同。
- en: '1\. Cost: Affordability vs. Premium'
  id: totrans-160
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1. 成本：可负担性与高级选项
- en: One of the standout features that distinguishes DeepSeek from ChatGPT is its
    cost efficiency. DeepSeek’s development cost, which is estimated at around $6
    million, is a fraction of the price of GPT-4, which cost more than $100 million
    to develop. This cost disparity has significant implications for both users and
    developers.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek与ChatGPT区别显著的突出特点之一是其成本效益。DeepSeek的开发成本估计约为600万美元，仅为GPT-4开发成本的零头，GPT-4的开发成本超过1亿美元。这种成本差异对用户和开发者都具有重要意义。
- en: For users, the lower cost of development for DeepSeek translates into affordable
    access to cutting-edge AI technology. DeepSeek’s free access to its base features
    is a notable advantage, allowing users to leverage the power of an AI chatbot
    without a subscription fee.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 对于用户来说，DeepSeek较低的开发成本意味着他们可以以负担得起的价格访问尖端AI技术。DeepSeek对其基础功能的免费访问是一个显著的优势，使用户能够在不支付订阅费的情况下利用AI聊天机器人的功能。
- en: Conversely, ChatGPT, developed by OpenAI, requires a paid subscription for advanced
    features such as access to GPT-4 (as opposed to GPT-3.5) and enhanced capabilities
    like longer context windows. The subscription model, which charges users for premium
    features, makes ChatGPT a more expensive option, especially for users who require
    frequent access to the most advanced features.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，由OpenAI开发的ChatGPT需要付费订阅才能使用高级功能，如访问GPT-4（而非GPT-3.5）和增强功能，如更长的上下文窗口。这种按高级功能收费的订阅模式使得ChatGPT成为一个更昂贵的选项，尤其是对于那些需要频繁访问最先进功能的用户。
- en: The affordability of DeepSeek is part of its broader appeal, especially in emerging
    markets where access to AI is often restricted by high costs. For developers,
    the lower development costs for DeepSeek also make it a more appealing option
    for building applications that rely on AI.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的性价比是其更广泛吸引力的一部分，尤其是在AI访问通常受高成本限制的新兴市场中。对于开发者来说，DeepSeek较低的开发成本也使其成为构建依赖AI的应用程序的一个更具吸引力的选择。
- en: '2\. Subscription Model: Free vs. Paid Access'
  id: totrans-165
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2. 订阅模式：免费与付费访问
- en: Another critical difference between the two models is the subscription structure.
    While ChatGPT relies heavily on its paid subscription model for users to unlock
    premium features, DeepSeek has adopted a freemium model where the base model is
    available for free, with advanced features, such as image generation and detailed
    reasoning, still under development.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种模型之间的另一个关键区别是订阅结构。虽然ChatGPT严重依赖其付费订阅模式来解锁高级功能，但DeepSeek采用了免费增值模式，其中基础模型免费提供，而高级功能，如图像生成和详细推理，仍在开发中。
- en: ChatGPT’s subscription model, known as ChatGPT Plus, offers users access to
    the latest version of the model (currently GPT-4) for a monthly fee. This model
    helps OpenAI generate revenue to sustain its development and scale its operations.
    While this system works well for OpenAI, especially with a substantial user base
    willing to pay for access to cutting-edge features, it may be a barrier to entry
    for some potential users who cannot justify the expense.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的订阅模式，称为ChatGPT Plus，以月费的形式为用户提供访问最新版本模型（目前为GPT-4）的权限。这种模式帮助OpenAI产生收入以维持其发展和扩大其运营规模。虽然这个系统对OpenAI来说效果很好，特别是对于愿意为访问尖端功能付费的庞大用户群来说，但它可能成为一些潜在用户进入的障碍。
- en: On the other hand, DeepSeek’s decision to make its base model free of charge
    helps democratize access to advanced AI tools. Users can leverage DeepSeek for
    a wide range of tasks without a financial commitment, which is especially beneficial
    for developers, educators, and small businesses looking to adopt AI without the
    risk of ongoing costs.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，深度探索决定使其基础模型免费，有助于民主化高级AI工具的访问。用户可以在不承担财务承诺的情况下利用深度探索进行各种任务，这对于希望采用AI而无需承担持续成本的开发者、教育者和小型企业来说特别有益。
- en: However, it’s important to note that DeepSeek’s advanced features (such as image
    generation or highly specialized models) are still under development and will
    likely require premium access in the future. As DeepSeek continues to evolve,
    it may explore the introduction of paid tiers for more advanced capabilities.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，重要的是要注意，深度探索的高级功能（如图像生成或高度专业化的模型）仍在开发中，未来可能需要付费访问。随着深度探索的持续发展，它可能会探索引入付费层以提供更高级的功能。
- en: '3\. Privacy: Local Hosting vs. Cloud Dependence'
  id: totrans-170
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3. 隐私：本地托管与云依赖
- en: Privacy is a growing concern for users of AI models, especially in light of
    recent debates about data security and user control. Here, DeepSeek has a clear
    advantage in offering privacy-focused features that ChatGPT cannot match.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 隐私是AI模型用户日益关注的问题，尤其是在最近关于数据安全和用户控制的辩论之后。在这里，深度探索在提供以隐私为重点的功能方面具有明显优势，这是ChatGPT无法比拟的。
- en: DeepSeek provides users with the ability to run the model locally on their own
    hardware using a tool called Ollama. Ollama allows users to host large language
    models on local servers, meaning all interactions with the model can take place
    entirely offline, ensuring that user data does not need to be processed by a third-party
    cloud service. This level of privacy is invaluable for users who are concerned
    about the sensitive nature of the data they are sharing with AI systems.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 深度探索通过一个名为Ollama的工具为用户提供在自有硬件上本地运行模型的能力。Ollama允许用户在本地服务器上托管大型语言模型，这意味着所有与模型的交互都可以完全离线进行，确保用户数据不需要由第三方云服务处理。这种隐私级别对于担心与AI系统共享的数据敏感性的用户来说是无价的。
- en: For developers, the ability to run DeepSeek locally also allows them to customize
    the model for specialized tasks and ensure compliance with local data protection
    regulations. This feature positions DeepSeek as an attractive solution for enterprises
    that require greater control over their data and AI infrastructure.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 对于开发者来说，能够在本地运行深度探索也允许他们为特定任务定制模型，并确保符合当地数据保护法规。这一特性使深度探索成为那些需要对其数据和AI基础设施有更多控制权的企业的一个有吸引力的解决方案。
- en: In contrast, ChatGPT operates entirely in the cloud, and while OpenAI does take
    steps to protect user data, users must still rely on cloud infrastructure to interact
    with the model. This raises concerns for those who prefer not to store sensitive
    information in the cloud. While OpenAI has implemented various privacy protections,
    it is unlikely that users will ever have the same level of control over their
    data as they do with DeepSeek’s local hosting option.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，ChatGPT完全在云端运行，尽管OpenAI已经采取措施保护用户数据，但用户仍然必须依赖云基础设施来与模型交互。这引起了那些不愿意在云端存储敏感信息的人的关注。虽然OpenAI已经实施了各种隐私保护措施，但用户不太可能像使用深度探索的本地托管选项那样对其数据拥有相同级别的控制。
- en: '4\. Open-Source vs. Closed-Source: A Collaborative Approach vs. Proprietary
    Control'
  id: totrans-175
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4. 开源与闭源：协作方法与专有控制
- en: Perhaps one of the most significant differences between DeepSeek and ChatGPT
    lies in their open-source nature. DeepSeek has chosen to make its model open-source,
    which means that its underlying code and architecture are freely available to
    the public. This decision fosters innovation, as developers around the world can
    collaborate, modify, and enhance the model to suit their needs. It encourages
    a global community of AI developers to contribute, potentially accelerating the
    model’s development and expanding its capabilities in novel ways.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 深度探索（DeepSeek）与ChatGPT之间最显著的差异之一可能在于它们的开源性质。深度探索选择将其模型开源，这意味着其底层代码和架构对公众免费开放。这一决定促进了创新，因为世界各地的开发者可以协作、修改和增强模型以满足他们的需求。它鼓励全球的AI开发者贡献力量，可能加速模型的发展并以新颖的方式扩展其功能。
- en: DeepSeek’s open-source model also ensures transparency, which is a critical
    aspect of fostering trust in AI systems. Users and developers can inspect the
    model's code, understand its design principles, and ensure that there are no hidden
    biases or harmful components embedded in the system.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的开源模式还确保了透明度，这是培养对人工智能系统信任的关键方面。用户和开发者可以检查模型的代码，理解其设计原则，并确保系统中没有嵌入隐藏的偏见或有害组件。
- en: In contrast, ChatGPT remains a closed-source model. While OpenAI has made some
    elements of their work publicly available—such as papers and research on their
    models—the core of ChatGPT is proprietary. This approach gives OpenAI more control
    over the system’s development, preventing others from modifying or redistributing
    the model. While this allows OpenAI to maintain more direct oversight over the
    evolution of ChatGPT, it limits the opportunities for outside developers to contribute
    or improve the system.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，ChatGPT仍然是一个封闭源代码模型。虽然OpenAI已经将其工作的一些元素公开——例如论文和对其模型的研究——但ChatGPT的核心是专有的。这种方法使OpenAI在系统开发上拥有更多控制权，防止他人修改或重新分发模型。虽然这允许OpenAI对ChatGPT的演变保持更直接的监督，但它限制了外部开发者贡献或改进系统的机会。
- en: The open-source nature of DeepSeek has the potential to make it a more flexible
    and community-driven tool than ChatGPT, which is primarily shaped by OpenAI’s
    internal development efforts.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的开源特性使其有可能成为一个比ChatGPT更灵活、更具社区驱动力的工具，而ChatGPT主要是由OpenAI的内部开发努力塑造的。
- en: '5\. Use Cases: Strengths in Different Domains'
  id: totrans-180
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 5. 应用场景：不同领域的优势
- en: When it comes to specific use cases, both DeepSeek and ChatGPT excel in different
    areas, each carving out a niche for itself in the AI ecosystem.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 在具体应用场景方面，DeepSeek和ChatGPT在各自领域都表现出色，每个都在人工智能生态系统中为自己开辟了一片天地。
- en: DeepSeek has garnered a reputation as a particularly strong tool for developers
    due to its code generation capabilities. Developers appreciate DeepSeek’s ability
    to generate high-quality code, help debug programs, and provide solutions to complex
    coding problems. This makes DeepSeek a preferred tool for software development,
    particularly for those who need a reliable assistant for coding and technical
    queries. DeepSeek’s efficiency and ability to generate useful code quickly make
    it an ideal solution for programmers looking for AI assistance in their workflows.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 由于其代码生成能力，DeepSeek因其特别强大的工具而获得了开发者的声誉。开发者欣赏DeepSeek生成高质量代码、帮助调试程序和解决复杂编码问题的能力。这使得DeepSeek成为软件开发的首选工具，尤其是对于那些需要可靠的编码和技术查询助手的人来说。DeepSeek的高效性和快速生成有用代码的能力，使其成为寻找AI辅助以优化工作流程的程序员理想的解决方案。
- en: ChatGPT, on the other hand, shines in creative fields. It excels in generating
    storytelling, humor, marketing content, and other types of creative writing. Its
    ability to craft engaging narratives, produce humorous content, and generate copy
    for marketing materials has made it a go-to tool for writers and content creators.
    ChatGPT’s more flexible conversational style and ability to craft compelling responses
    have made it a popular choice for users working in creative industries.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，ChatGPT在创意领域大放异彩。它在生成故事、幽默、营销内容和其他类型的创意写作方面表现出色。它能够编织引人入胜的故事，制作幽默内容，并为营销材料生成文案，这使得它成为作家和内容创作者的首选工具。ChatGPT更灵活的对话风格和构建引人入胜回应的能力，使其成为创意产业中用户的流行选择。
- en: Thus, while DeepSeek is a powerful tool for technical, development-oriented
    tasks, ChatGPT continues to dominate areas where creativity and emotional intelligence
    are essential, such as advertising, storytelling, and entertainment.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，尽管DeepSeek是技术导向任务的有力工具，但ChatGPT继续在需要创造力和情商的关键领域占据主导地位，如广告、故事讲述和娱乐。
- en: 'Conclusion: Different Approaches to AI Innovation'
  id: totrans-185
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结论：人工智能创新的多种方法
- en: DeepSeek and ChatGPT represent two distinct approaches to the future of artificial
    intelligence. DeepSeek’s focus on cost-efficiency, privacy, and open-source collaboration
    sets it apart as an accessible tool for a wide range of users, particularly developers
    and those who value control over their AI systems. ChatGPT, with its premium subscription
    model and strong focus on creative applications, continues to dominate in the
    creative space, offering users access to a premium service for those willing to
    pay for enhanced features.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek和ChatGPT代表了人工智能未来的两种不同方法。DeepSeek对成本效益、隐私和开源协作的重视使其成为一款易于访问的工具，特别适合开发人员和那些重视对其人工智能系统控制权的人。ChatGPT凭借其高级订阅模式和强大的创意应用焦点，继续在创意领域占据主导地位，为愿意为增强功能付费的用户提供高级服务。
- en: As the AI landscape evolves, both models will continue to push the boundaries
    of what’s possible, with DeepSeek offering a more affordable, flexible, and privacy-conscious
    alternative to the commercial model of ChatGPT. Ultimately, the competition between
    these two models will likely lead to a diverse ecosystem where users can choose
    the tools that best meet their specific needs.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能领域的不断发展，这两个模型将继续推动可能性的边界，DeepSeek提供了一种更经济、更灵活且注重隐私的替代方案，以ChatGPT的商业模式。最终，这两个模型之间的竞争可能会导致一个多样化的生态系统，用户可以选择最适合他们特定需求的工具。
- en: 'Chapter 5: How to Use DeepSeek on Mobile and Desktop'
  id: totrans-188
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第五章：如何在移动和桌面设备上使用DeepSeek
- en: DeepSeek’s accessibility across both mobile and desktop platforms ensures that
    users can take full advantage of its capabilities, whether they are on the go
    or working from their computers. In this chapter, we’ll guide you through how
    to download, install, and interact with DeepSeek on mobile devices and desktop
    computers. Whether you’re using it for personal or professional purposes, we’ll
    cover everything you need to know to make the most out of DeepSeek on these platforms.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek在移动和桌面平台上的可访问性确保了用户可以充分利用其功能，无论他们是在路上还是在电脑前工作。在本章中，我们将指导您如何在移动设备和桌面电脑上下载、安装和与DeepSeek互动。无论您是用于个人还是专业用途，我们都会涵盖您在这两个平台上充分利用DeepSeek所需了解的一切。
- en: 'On Mobile Devices: Stay Connected to AI Anywhere'
  id: totrans-190
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在移动设备上：随时随地保持与人工智能的连接
- en: 'DeepSeek’s mobile app brings the power of its AI-driven chatbot to the palm
    of your hand. Whether you''re using an iPhone or an Android device, DeepSeek offers
    an intuitive mobile experience, allowing you to interact with the model seamlessly.
    Here''s how to get started on your mobile device:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的移动应用将其AI驱动的聊天机器人的力量带到了您的掌心。无论您使用的是iPhone还是Android设备，DeepSeek都提供直观的移动体验，让您可以无缝地与模型互动。以下是您如何在移动设备上开始使用的方法：
- en: 'Search and Install:'
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 搜索和安装：
- en: 'iOS (Apple): Head to the Apple App Store and search for “DeepSeek R1”. Once
    you find the app, tap Install to download it to your device.'
  id: totrans-193
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'iOS (Apple): 访问苹果应用商店，搜索“DeepSeek R1”。找到应用后，点击安装将其下载到您的设备上。'
- en: 'Android: Go to the Google Play Store, search for “DeepSeek R1”, and tap Install
    to download the app to your Android device.'
  id: totrans-194
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Android：前往谷歌应用商店，搜索“DeepSeek R1”，然后点击安装将应用下载到您的Android设备上。
- en: 'Log In:'
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 登录：
- en: After installation, open the DeepSeek R1 app on your mobile device.
  id: totrans-196
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装完成后，在您的移动设备上打开DeepSeek R1应用。
- en: You’ll be prompted to log in using either your email address or Google account.
    Choose your preferred login method, enter your credentials, and proceed to access
    the app.
  id: totrans-197
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您将被提示使用电子邮件地址或Google账户登录。选择您首选的登录方式，输入您的凭证，然后继续访问应用。
- en: 'Interact with the AI:'
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与人工智能互动：
- en: Once you’ve successfully logged in, you can start interacting with DeepSeek
    immediately. The app features an intuitive chat interface, where you can ask questions,
    explore various topics, or get assistance with tasks like code generation, content
    creation, or research.
  id: totrans-199
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 登录成功后，您可以立即开始与DeepSeek互动。该应用具有直观的聊天界面，您可以在其中提问、探索各种主题或获得代码生成、内容创作或研究等任务的协助。
- en: For users who need more advanced features, such as the DeepThink (R1) model,
    you can manually enable these through the app’s settings. These features will
    unlock even more sophisticated functionalities, like deep reasoning or complex
    image generation.
  id: totrans-200
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于需要更高级功能（如DeepThink (R1)模型）的用户，您可以通过应用设置手动启用这些功能。这些功能将解锁更复杂的特性，如深度推理或复杂图像生成。
- en: 'Customization and Settings:'
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定制和设置：
- en: The app provides options to customize your user experience, such as enabling
    notifications for updates or adjusting the appearance of the interface to suit
    your preferences. You can also explore additional tools and settings by navigating
    through the app’s menu.
  id: totrans-202
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用程序提供了自定义用户体验的选项，例如启用更新通知或调整界面外观以符合您的偏好。您还可以通过在应用菜单中导航来探索额外的工具和设置。
- en: With the DeepSeek R1 app on your mobile device, you have a powerful AI assistant
    at your fingertips, whether you’re traveling, working remotely, or simply need
    quick access to answers and solutions.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的移动设备上安装DeepSeek R1应用后，无论您是在旅行、远程工作还是只需要快速访问答案和解决方案，您都将拥有一个强大的AI助手。
- en: 'On Desktop: Seamless Integration for Professional Use'
  id: totrans-204
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在桌面端：专业使用的无缝集成
- en: 'For users who prefer working on a larger screen or need the power of DeepSeek
    for more intensive tasks, the desktop version of DeepSeek is a great option. Whether
    you''re using a Windows PC, Mac, or even a Linux system, the web-based version
    of DeepSeek provides a user-friendly interface that mirrors the experience of
    using the mobile app. Here’s how to get started on your desktop:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更喜欢在更大屏幕上工作或需要DeepSeek进行更密集任务的用户，DeepSeek的桌面版本是一个很好的选择。无论您使用的是Windows PC、Mac还是Linux系统，基于Web的DeepSeek版本提供了一个用户友好的界面，它反映了使用移动应用时的体验。以下是您在桌面端开始使用的方法：
- en: 'Visit the Website:'
  id: totrans-206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问网站：
- en: Open your preferred web browser (e.g., Chrome, Safari, Firefox) and go to the
    official DeepSeek R1 website (insert the URL here).
  id: totrans-207
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开您喜欢的网络浏览器（例如，Chrome、Safari、Firefox）并访问DeepSeek R1官方网站（在此处插入网址）。
- en: The website will automatically detect your device type, whether it’s a desktop
    or laptop, and present you with the appropriate interface.
  id: totrans-208
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站将自动检测您的设备类型，无论是桌面还是笔记本电脑，并为您提供相应的界面。
- en: 'Log In:'
  id: totrans-209
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 登录：
- en: Just like the mobile app, you’ll be asked to log in using either your email
    address or phone number. You can also choose to sign in using your Google account
    for quicker access.
  id: totrans-210
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 就像移动应用一样，您将被要求使用电子邮件地址或电话号码登录。您还可以选择使用Google账户登录以获得更快的访问。
- en: Enter your credentials and press Log In to proceed.
  id: totrans-211
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入您的凭据并按登录继续。
- en: 'Interface:'
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 界面：
- en: Once logged in, you’ll be greeted with a clean and intuitive web interface,
    which includes a text box where you can input your queries or commands. The layout
    is similar to that of ChatGPT, making it familiar to those who have used other
    AI chat services.
  id: totrans-213
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 登录后，您将看到一个干净直观的Web界面，其中包含一个文本框，您可以在其中输入您的查询或命令。布局类似于ChatGPT，对于那些使用过其他AI聊天服务的人来说非常熟悉。
- en: The main screen displays your previous conversations and allows you to easily
    scroll through past interactions. This is helpful if you want to refer back to
    previous discussions or continue a conversation from earlier.
  id: totrans-214
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主屏幕显示您之前的对话，并允许您轻松滚动查看过去的互动。如果您想回顾之前的讨论或继续之前的对话，这将非常有帮助。
- en: On the left-hand side of the interface, you’ll find a navigation menu that provides
    quick access to features like your profile, settings, and advanced tools (e.g.,
    DeepThink (R1) model). You can quickly switch between different sections, such
    as accessing saved chats or adjusting your user settings.
  id: totrans-215
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在界面的左侧，您会发现一个导航菜单，它提供了快速访问您的个人资料、设置和高级工具（例如，DeepThink (R1) 模型）的功能。您可以快速在不同的部分之间切换，例如访问保存的聊天或调整您的用户设置。
- en: 'Advanced Features and Customization:'
  id: totrans-216
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 高级功能和定制：
- en: DeepSeek’s desktop interface offers flexibility in how you use the model. You
    can enable advanced features, like DeepThink (R1), directly from the settings
    menu to access deeper, more complex reasoning capabilities.
  id: totrans-217
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: DeepSeek的桌面界面在如何使用模型方面提供了灵活性。您可以直接从设置菜单启用高级功能，如DeepThink (R1)，以访问更深、更复杂的推理能力。
- en: Users can also save and organize conversations for later reference. This can
    be particularly useful for those who use DeepSeek for research, development, or
    content creation, as it allows you to keep track of ongoing projects and easily
    pick up where you left off.
  id: totrans-218
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户还可以保存和组织对话以供以后参考。这对于使用DeepSeek进行研究、开发或内容创作的人来说尤其有用，因为它允许您跟踪正在进行的项目，并轻松地继续未完成的工作。
- en: 'Accessing Code Generation or Content Creation Tools:'
  id: totrans-219
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问代码生成或内容创作工具：
- en: If you’re using DeepSeek for code generation, the desktop version offers a larger
    screen and better multitasking capabilities, allowing you to work efficiently
    with longer code snippets or detailed explanations. The text editor is also equipped
    with helpful features like syntax highlighting for developers.
  id: totrans-220
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您使用DeepSeek进行代码生成，桌面版本提供更大的屏幕和更好的多任务处理能力，让您能够高效地处理较长的代码片段或详细的说明。文本编辑器还配备了如语法高亮等对开发者有帮助的功能。
- en: With the desktop version of DeepSeek, users get a more immersive experience
    with additional tools and customization options, making it ideal for work-related
    tasks, deep technical inquiries, and other professional applications.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 使用DeepSeek的桌面版本，用户可以获得更沉浸式的体验，以及额外的工具和定制选项，使其非常适合与工作相关的任务、深入的技术查询和其他专业应用。
- en: 'Conclusion: Multi-Platform Access for Every Need'
  id: totrans-222
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结论：满足各种需求的跨平台访问
- en: DeepSeek’s availability on both mobile devices and desktop computers ensures
    that users can seamlessly integrate AI-powered assistance into their daily lives,
    whether they are on the go or working from a more traditional setup. The process
    of getting started is simple on both platforms, with clear instructions for logging
    in, interacting with the AI, and enabling advanced features like the DeepThink
    (R1) model.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek在移动设备和桌面计算机上的可用性确保用户可以无缝地将AI辅助工具集成到他们的日常生活中，无论他们是在路上还是在传统的办公环境中。在两个平台上开始的过程都很简单，都有明确的登录、与AI交互和启用高级功能（如DeepThink
    (R1) 模型）的说明。
- en: On mobile devices, DeepSeek offers convenience and portability, allowing you
    to tap into its capabilities anytime, anywhere. On desktop, users gain access
    to a richer, more customizable interface that’s perfect for professional use or
    when engaging with more complex tasks.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 在移动设备上，DeepSeek提供便利性和便携性，让您随时随地利用其功能。在桌面，用户可以访问更丰富、更可定制的界面，非常适合专业使用或处理更复杂的任务。
- en: Regardless of the device you’re using, DeepSeek ensures that AI-powered assistance
    is always at your fingertips, ready to help you tackle everything from code generation
    to content creation, all while offering advanced privacy features and customizability.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您使用什么设备，DeepSeek都确保AI辅助工具始终触手可及，随时准备帮助您处理从代码生成到内容创作的一切，同时提供高级隐私功能和可定制性。
- en: This chapter should provide users with everything they need to get started using
    DeepSeek on both mobile and desktop platforms. Let me know if you'd like to explore
    any additional features or require more details!
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 本章应向用户提供他们开始使用DeepSeek在移动和桌面平台上的所有必要信息。如果您想探索任何附加功能或需要更多详细信息，请告知我！
- en: 'Chapter 6: The DeepSeek-R1 Model and Its Open-Source Advantage'
  id: totrans-227
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第六章：DeepSeek-R1模型及其开源优势
- en: The DeepSeek-R1 model represents a monumental shift in the way AI technology
    is developed and accessed. As one of the first AI models to fully embrace the
    open-source philosophy, DeepSeek has disrupted traditional approaches to AI by
    making its underlying code freely available to developers and innovators around
    the world. This chapter explores the significance of DeepSeek’s open-source nature
    and delves into the technical marvels of its DeepThink (R1) reasoning model, highlighting
    how this combination of open access and advanced capabilities has created a powerful
    tool for developers, businesses, and researchers alike.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek-R1模型代表了AI技术发展和获取方式的一次重大转变。作为第一个完全拥抱开源哲学的AI模型之一，DeepSeek通过将其底层代码免费提供给世界各地的开发者和创新者，颠覆了传统的AI方法。本章探讨了DeepSeek开源性质的重要性，深入探讨了其DeepThink
    (R1) 推理模型的技术奇迹，突出了这种开放访问和高级能力的结合如何为开发者、企业和研究人员 alike创造了一个强大的工具。
- en: 'The Power of Open-Source: Revolutionizing AI Development'
  id: totrans-229
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 开源的力量：革命性的AI开发
- en: 'At the core of DeepSeek’s success is its open-source architecture. Unlike proprietary
    models such as ChatGPT or Google Gemini, which keep their source code closed to
    the public, DeepSeek allows anyone to access and modify its code. This transparency
    fosters an ecosystem where collaboration and innovation thrive, enabling developers
    to:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek成功的核心是其开源架构。与像ChatGPT或Google Gemini这样的专有模型不同，这些模型将它们的源代码对公众保密，DeepSeek允许任何人访问和修改其代码。这种透明度促进了一个合作和创新繁荣的生态系统，使开发者能够：
- en: 'Contribute to the Code:'
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为代码做出贡献：
- en: Developers can freely download the DeepSeek-R1 model and contribute to its improvement
    by offering fixes, updates, and additional features. This collaborative model
    ensures that the chatbot continues to evolve rapidly, driven by real-world feedback
    from developers and researchers.
  id: totrans-232
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发者可以自由下载DeepSeek-R1模型，通过提供修复、更新和附加功能来贡献其改进。这种协作模式确保聊天机器人能够持续快速地发展，由开发者和研究者的真实世界反馈驱动。
- en: With the open-source nature of DeepSeek, anyone can work on customizing the
    model to suit specific use cases, whether for niche industries, educational tools,
    or specialized AI tasks.
  id: totrans-233
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于DeepSeek的开源性质，任何人都可以对模型进行定制，以适应特定的用例，无论是针对利基行业、教育工具还是专业AI任务。
- en: 'Adapt the Code to Specific Needs:'
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 适应特定需求的代码：
- en: One of the primary advantages of open-source software is the flexibility it
    offers. Developers can tweak DeepSeek’s algorithms to better align with their
    business requirements or personal goals. Whether it’s enhancing natural language
    processing capabilities or developing new functionalities, open access to DeepSeek’s
    code allows for a high degree of customization.
  id: totrans-235
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开源软件的主要优势之一是其提供的灵活性。开发者可以调整DeepSeek的算法，以更好地符合他们的业务需求或个人目标。无论是增强自然语言处理能力还是开发新功能，对DeepSeek代码的开放访问允许高度定制。
- en: Businesses can even deploy DeepSeek on their own servers or local environments,
    ensuring full control over the AI and its data, which is especially appealing
    for data-sensitive industries or enterprises with specific security needs.
  id: totrans-236
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 企业甚至可以在自己的服务器或本地环境中部署DeepSeek，确保对AI及其数据的完全控制，这对于对数据敏感的行业或具有特定安全需求的企业尤其有吸引力。
- en: 'Cost-Effective Innovation:'
  id: totrans-237
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成本效益创新：
- en: The fact that DeepSeek is open-source and free to use (at least in its base
    form) means that developers can experiment with the technology without significant
    financial barriers. This contrasts sharply with proprietary AI systems that often
    require expensive subscription fees for access to advanced features.
  id: totrans-238
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: DeepSeek是开源的，并且免费使用（至少在其基本形式上），这意味着开发者可以在没有重大财务障碍的情况下进行技术实验。这与通常需要昂贵订阅费才能访问高级功能的专有AI系统形成鲜明对比。
- en: The free availability of DeepSeek encourages experimentation and creativity,
    empowering developers to experiment with advanced applications and integrations
    that may have otherwise been out of reach due to high licensing costs.
  id: totrans-239
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: DeepSeek的免费可用性鼓励了实验和创造力，赋予开发者实验高级应用和集成的权力，这些应用和集成可能由于高昂的许可费用而无法触及。
- en: In essence, DeepSeek’s open-source nature represents a democratization of artificial
    intelligence, opening up new possibilities for developers, startups, academic
    researchers, and even hobbyists to harness the power of cutting-edge AI technology
    without facing the constraints imposed by traditional closed-source models.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，DeepSeek的开源性质代表了人工智能的民主化，为开发者、初创企业、学术研究人员甚至爱好者打开了利用尖端AI技术的可能性，而无需面对传统封闭源代码模型施加的限制。
- en: 'The DeepThink (R1) Model: Advanced Reasoning at a Fraction of the Cost'
  id: totrans-241
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 深思（R1）模型：以极低成本的先进推理
- en: Another defining feature of DeepSeek is its DeepThink (R1) model, which has
    been specifically designed to offer advanced reasoning capabilities comparable
    to top-tier models like GPT-4, but at a significantly lower operational cost.
    This makes DeepSeek an affordable alternative for businesses, developers, and
    individuals who want to take advantage of sophisticated AI but cannot justify
    the high costs of other models.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的另一个显著特点是它的深思（R1）模型，该模型专门设计用于提供与GPT-4等顶级模型相当的高级推理能力，但运营成本显著更低。这使得DeepSeek成为希望利用复杂AI但无法承担其他模型高成本的企业、开发者和个人的经济实惠的选择。
- en: 'Here’s an overview of the DeepThink (R1) model’s capabilities and why it stands
    out:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 深思（R1）模型的概述及其独特之处如下：
- en: 'Competitive Performance:'
  id: totrans-244
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 竞争性能：
- en: The DeepThink (R1) model delivers exceptional performance across a wide range
    of AI tasks, including natural language understanding, text generation, and problem-solving.
    When compared to models like GPT-4, DeepSeek demonstrates a similar level of accuracy,
    coherence, and contextual understanding in responses, even when handling complex
    or abstract inquiries.
  id: totrans-245
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深思（R1）模型在广泛的AI任务上表现出色，包括自然语言理解、文本生成和问题解决。与GPT-4等模型相比，DeepSeek在处理复杂或抽象查询时，在响应的准确性、连贯性和上下文理解方面表现出类似水平。
- en: However, the DeepThink (R1) model differentiates itself by offering these high-level
    capabilities without requiring the immense computational resources that other
    advanced models demand. This makes it particularly appealing to organizations
    that need reliable AI at scale but without the hefty operational overhead.
  id: totrans-246
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然而，DeepThink (R1) 模型通过提供这些高级功能而不需要其他高级模型所要求的巨大计算资源而脱颖而出。这使得它对那些需要可靠AI且无需高昂运营成本的组织特别有吸引力。
- en: 'Affordable Cost Structure:'
  id: totrans-247
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 优惠的成本结构：
- en: The development of the DeepSeek-R1 model was completed at an estimated $6 million—a
    fraction of the cost of GPT-4, which cost over $100 million to build. This remarkable
    cost efficiency translates directly into lower operational expenses for users,
    enabling businesses to leverage cutting-edge AI without breaking the bank.
  id: totrans-248
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: DeepSeek-R1模型的开发完成估计花费了600万美元——这仅仅是GPT-4成本的零头，GPT-4的建设成本超过1亿美元。这种非凡的成本效率直接转化为用户较低的运营费用，使企业能够在不破财的情况下利用尖端AI。
- en: Lower operational costs also mean that startups and small businesses can integrate
    AI into their workflows without needing massive investments. Developers can use
    the DeepThink (R1) model for tasks like code generation, content creation, or
    even data analysis without incurring the same level of expenses that would be
    associated with other AI solutions.
  id: totrans-249
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 降低了运营成本，也意味着初创企业和中小企业可以在不进行巨额投资的情况下将AI集成到他们的工作流程中。开发者可以使用DeepThink (R1) 模型进行代码生成、内容创作或甚至数据分析，而无需承担与其他AI解决方案相关的相同水平的费用。
- en: 'Optimized for Efficient Use:'
  id: totrans-250
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 优化高效使用：
- en: The DeepThink (R1) model is optimized for both accuracy and resource efficiency.
    Through strategic use of specialized hardware (such as Nvidia A100 GPUs), DeepSeek
    has managed to build a powerful AI model that performs with high speed and low
    latency while keeping energy and hardware demands relatively low.
  id: totrans-251
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: DeepThink (R1) 模型在准确性和资源效率方面进行了优化。通过战略性地使用专用硬件（如Nvidia A100 GPU），DeepSeek已经成功构建了一个功能强大的AI模型，该模型以高速和低延迟运行，同时保持能源和硬件需求相对较低。
- en: This computational efficiency allows DeepSeek to scale effectively for a wide
    variety of applications, from personal use to enterprise-level operations, all
    while keeping energy consumption and infrastructure costs at a minimum.
  id: totrans-252
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这种计算效率使DeepSeek能够有效地扩展到各种应用，从个人使用到企业级运营，同时将能耗和基础设施成本保持在最低。
- en: 'Reasoning Capabilities:'
  id: totrans-253
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 推理能力：
- en: DeepThink (R1) is particularly known for its advanced reasoning capabilities,
    which allow it to tackle complex, multi-step tasks such as logical problem-solving,
    data interpretation, and decision-making.
  id: totrans-254
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: DeepThink (R1) 特别以其先进的推理能力而闻名，这使得它能够处理复杂的、多步骤的任务，如逻辑问题解决、数据解释和决策制定。
- en: It can handle tasks like legal document analysis, medical research, and scientific
    simulations, where understanding nuances and drawing inferences from vast amounts
    of data is crucial. By offering such capabilities at a fraction of the cost of
    more resource-intensive models, DeepSeek makes it easier for users to leverage
    AI for these types of advanced applications.
  id: totrans-255
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可以处理诸如法律文件分析、医学研究和科学模拟等任务，在这些任务中，理解细微差别和从大量数据中得出推论至关重要。通过以更少资源密集型模型成本的一小部分提供这些功能，DeepSeek使用户能够更轻松地利用AI进行这些高级应用。
- en: 'The Open-Source Advantage: Building a Global Community'
  id: totrans-256
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 开源优势：构建全球社区
- en: 'By providing open-source access to DeepSeek’s code, Liang Wenfeng and his team
    at High-Flyer have invited the global developer community to actively shape the
    future of the model. Open-source AI systems not only benefit from collective innovation
    but also foster a culture of transparency and accountability that proprietary
    models can’t match. Here’s why the open-source advantage of DeepSeek is so significant:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供对DeepSeek代码的开源访问，李文峰和他的High-Flyer团队邀请了全球开发者社区积极参与塑造该模型的未来。开源AI系统不仅受益于集体创新，而且培养了一种透明度和责任感的文化，这是专有模型所无法比拟的。以下是DeepSeek开源优势之所以如此重要的原因：
- en: 'Community Contributions:'
  id: totrans-258
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 社区贡献：
- en: Developers from all over the world can contribute new features, fix bugs, and
    optimize the model for specific use cases. This results in rapid iteration and
    the ability to adapt the AI to a variety of industries and applications. The global
    developer community ensures that DeepSeek’s development is continually evolving
    based on real-world needs.
  id: totrans-259
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来自世界各地的开发者可以贡献新的功能、修复错误并针对特定用例优化模型。这导致快速迭代并能够将AI适应各种行业和应用。全球开发者社区确保DeepSeek的开发持续根据现实世界的需求演变。
- en: Community contributions also foster knowledge sharing and collaboration, with
    users often exchanging best practices, tutorials, and enhancements that benefit
    everyone involved.
  id: totrans-260
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社区贡献还促进了知识共享和协作，用户经常交流最佳实践、教程和增强功能，这些对所有人都有益。
- en: 'Customization for Unique Use Cases:'
  id: totrans-261
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为独特用例定制：
- en: Open-source access allows organizations to modify the DeepSeek model to suit
    their specific needs. Whether it’s for a multilingual AI solution, a specialized
    domain like healthcare or law, or an industry-specific application like e-commerce
    or finance, the ability to modify and adapt DeepSeek’s algorithms ensures that
    businesses can tailor the technology to meet their unique challenges.
  id: totrans-262
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开源访问权限允许组织根据其特定需求修改DeepSeek模型。无论是多语言AI解决方案、医疗或法律等特定领域，还是电子商务或金融等行业特定的应用，修改和适应DeepSeek算法的能力确保企业能够定制技术以满足其独特的挑战。
- en: 'Security and Privacy:'
  id: totrans-263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安全和隐私：
- en: For organizations that require data privacy, the open-source nature of DeepSeek
    allows them to audit the code and run the model on their own hardware, giving
    them full control over the data and the way the AI interacts with it. This added
    layer of transparency makes DeepSeek an attractive option for security-conscious
    enterprises.
  id: totrans-264
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于需要数据隐私的组织，DeepSeek的开源特性允许它们审计代码并在自己的硬件上运行模型，从而对数据和AI与之交互的方式拥有完全的控制权。这一额外的透明度使得DeepSeek成为对安全敏感的企业的一个有吸引力的选择。
- en: 'Conclusion: A Future Powered by Open Innovation'
  id: totrans-265
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结论：由开放创新驱动的未来
- en: DeepSeek’s open-source framework and the DeepThink (R1) reasoning model make
    it one of the most accessible, powerful, and cost-efficient AI tools available
    today. By combining the advantages of community-driven development with state-of-the-art
    AI technology, DeepSeek offers a unique opportunity for developers and businesses
    alike to tap into the power of advanced AI without the prohibitive costs associated
    with proprietary systems.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的开源框架和DeepThink（R1）推理模型使其成为当今最易于访问、功能强大且成本效益最高的AI工具之一。通过结合社区驱动开发的优点和最先进的AI技术，DeepSeek为开发者和企业
    alike提供了独特的机遇，以利用高级AI的力量，而无需承担专有系统的昂贵成本。
- en: As DeepSeek continues to evolve and attract contributions from around the world,
    it stands as a testament to the power of open-source AI and the transformative
    potential of collaborative innovation. Whether you are a developer, a business
    owner, or a researcher, DeepSeek’s open-source model provides a pathway for affordable
    and customizable AI solutions that are built with transparency, innovation, and
    efficiency at their core.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 随着DeepSeek继续发展和吸引来自世界各地的贡献，它成为开源AI的力量和协作创新变革潜力的见证。无论你是开发者、企业主还是研究人员，DeepSeek的开源模式为提供透明、创新和高效的AI解决方案的途径，这些解决方案价格合理且可定制。
- en: 'Chapter 7: The Impact on Global AI and the Tech Industry'
  id: totrans-268
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第七章：对全球AI和科技行业的影响
- en: The rapid rise of DeepSeek has already had profound and far-reaching effects
    on the global artificial intelligence (AI) landscape, reshaping expectations around
    what constitutes cutting-edge AI innovation. By achieving exceptional performance
    with limited resources, DeepSeek has forced the industry to rethink the relationship
    between cost, performance, and accessibility in AI development. This chapter examines
    the broader impacts of DeepSeek’s emergence on the global AI ecosystem, its potential
    to disrupt major players in the tech industry, and the ways in which it signals
    a shift in global technological power, particularly in relation to China’s growing
    role in the AI space.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的快速崛起已经在全球人工智能（AI）格局中产生了深远和广泛的影响，重塑了人们对尖端AI创新构成的认识。通过有限的资源实现卓越的性能，DeepSeek迫使行业重新思考AI开发中成本、性能和可访问性之间的关系。本章探讨了DeepSeek出现对全球AI生态系统更广泛的影响，其颠覆科技行业主要玩家的潜力，以及它如何标志着全球技术力量的转变，尤其是在中国AI领域日益增长的作用方面。
- en: 'Revolutionizing AI Development: Breaking the Myth of Massive Budgets'
  id: totrans-270
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 革新AI开发：打破巨额预算的神话
- en: For years, the conventional wisdom in AI development has held that creating
    state-of-the-art models requires massive investments in both financial resources
    and cutting-edge hardware. Models like GPT-4 and Google’s Gemini have been touted
    as products of this paradigm, with development costs running into the hundreds
    of millions of dollars, and their deployment dependent on high-performance computing
    resources such as Nvidia’s A100 GPUs and other specialized hardware.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 多年来，在AI开发中占主导地位的传统观念是，创建最先进的模型需要大量金融资源和尖端硬件的投资。像GPT-4和谷歌的Gemini这样的模型被吹捧为这种范例的产物，其开发成本高达数亿美元，其部署依赖于Nvidia的A100
    GPU和其他专用硬件等高性能计算资源。
- en: However, DeepSeek has shattered this myth. With an estimated development cost
    of just $6 million—a mere fraction of what it cost to create GPT-4—DeepSeek has
    demonstrated that it is possible to create competitive, high-performance AI models
    without relying on massive funding or state-of-the-art chips. Instead, the DeepSeek
    team capitalized on resourceful solutions and an innovative approach, utilizing
    a combination of Nvidia A100 GPUs and more affordable alternatives to achieve
    impressive results.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，DeepSeek打破了这一神话。据估计，其开发成本仅为6000万美元——仅为创建GPT-4所需成本的一小部分——DeepSeek已经证明，在不依赖巨额资金或尖端芯片的情况下，可以创建具有竞争力的、高性能的AI模型。相反，DeepSeek团队利用资源丰富的解决方案和创新方法，结合使用Nvidia
    A100 GPU和更经济的替代方案，取得了令人印象深刻的成果。
- en: This groundbreaking achievement sends shockwaves through the industry, particularly
    within the ranks of AI giants like OpenAI and Google. DeepSeek’s success proves
    that AI does not have to come with a hefty price tag and that smaller companies
    and emerging markets can also participate in creating impactful, world-class AI
    models.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 这项开创性的成就对行业产生了冲击波，尤其是在像OpenAI和Google这样的AI巨头中。DeepSeek的成功证明，AI不必带有高昂的价格标签，小型公司和新兴市场也可以参与创建有影响力的世界级AI模型。
- en: As a result, there’s been a noticeable shift in market sentiment. Companies
    that once viewed AI development as an expensive, exclusive venture are now reconsidering
    their approach. This democratization of AI, made possible by DeepSeek’s affordable
    development and operational model, could lead to a proliferation of AI startups
    and smaller players in the tech industry, ultimately broadening the scope of AI
    applications across industries and regions.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，市场情绪发生了明显的转变。曾经将AI开发视为昂贵且专属领域的公司现在正在重新考虑他们的方法。DeepSeek的经济型开发和运营模式带来的AI民主化，可能导致AI初创公司和科技行业中的小型玩家激增，最终扩大AI在各个行业和地区的应用范围。
- en: 'Disrupting the Tech Industry: Impact on Major Companies'
  id: totrans-275
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 打破科技行业格局：对主要公司的影响
- en: DeepSeek’s affordable development model and success story have had immediate
    financial consequences for established players in the AI and semiconductor industries.
    In particular, the company’s success has begun to disrupt Nvidia, a major supplier
    of the specialized hardware that powers many of the top AI models, including GPT-4
    and other large language models.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的经济型开发模式和成功案例对AI和半导体行业的传统玩家产生了直接的财务影响。特别是，该公司的成功已经开始对Nvidia造成冲击，Nvidia是许多顶级AI模型（包括GPT-4和其他大型语言模型）所依赖的专业硬件的主要供应商。
- en: 'Stock Price Decline at Nvidia:'
  id: totrans-277
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: Nvidia股价下跌：
- en: Nvidia, once the go-to company for high-performance GPUs crucial to AI development,
    has seen declines in stock prices following DeepSeek’s rise. The primary reason
    behind this is the realization that models like DeepSeek-R1 can achieve cutting-edge
    performance while operating on significantly lower-cost hardware compared to Nvidia’s
    high-end GPUs. For investors, this creates a potential long-term risk for Nvidia’s
    dominance in the AI space.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 曾经是AI开发高性能GPU首选公司的Nvidia，在DeepSeek崛起后股价出现了下跌。背后的主要原因是意识到像DeepSeek-R1这样的模型可以在与Nvidia高端GPU相比成本显著更低的情况下实现尖端性能。对于投资者来说，这为Nvidia在AI领域的统治地位带来了潜在的长远风险。
- en: Moreover, DeepSeek’s cost-effective development shows that a growing number
    of AI developers might opt for more affordable alternatives to Nvidia’s products,
    especially as the open-source nature of DeepSeek’s platform enables greater flexibility
    in selecting hardware.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，DeepSeek的高性价比开发模式表明，越来越多的AI开发者可能会选择更经济的Nvidia产品替代方案，尤其是在DeepSeek平台的开源特性使得在硬件选择上具有更大的灵活性。
- en: 'Pressure on Traditional AI Giants:'
  id: totrans-280
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 对传统AI巨头的压力：
- en: In addition to Nvidia, other tech giants in the AI space, such as Microsoft
    and Google, have also felt the heat. While companies like Microsoft have made
    large investments in AI and developed proprietary models like OpenAI’s GPT series,
    DeepSeek’s success challenges the need for massive investments in both computing
    resources and development budgets. As these giants look to maintain their leadership
    in the AI field, they may need to reconsider their development strategies, particularly
    regarding their reliance on expensive hardware and subscription-based business
    models.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 除了Nvidia之外，AI领域的其他科技巨头，如微软和谷歌，也感受到了压力。虽然像微软这样的公司已经在AI领域进行了大量投资并开发了如OpenAI的GPT系列等专有模型，但DeepSeek的成功挑战了在计算资源和开发预算方面进行巨额投资的需求。随着这些巨头寻求在AI领域保持领导地位，他们可能需要重新考虑其开发策略，特别是关于他们依赖昂贵硬件和基于订阅的商业模式。
- en: DeepSeek’s open-source nature also poses a direct challenge to the business
    models of companies that rely on closed-source AI, particularly those like ChatGPT,
    which has become known for its premium paid subscriptions. DeepSeek’s free offerings—and
    its ability to be deployed locally for enhanced privacy—are likely to attract
    developers and businesses looking for more affordable and transparent alternatives.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的开源性质也对依赖封闭源代码AI的公司商业模式构成了直接挑战，尤其是像ChatGPT这样的公司，因其高端付费订阅而闻名。DeepSeek的免费提供及其本地部署以增强隐私的能力，可能会吸引寻求更经济、更透明替代方案的开发商和企业。
- en: Overall, DeepSeek is changing the competitive landscape of AI development by
    offering a highly capable product at a fraction of the cost, forcing established
    players to adapt their strategies and rethink the traditional boundaries of AI
    development.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，DeepSeek通过提供一款高度功能的产品，成本仅为一小部分，正在改变AI开发的竞争格局，迫使现有玩家调整其策略并重新思考AI开发的传统边界。
- en: DeepSeek and the Rise of China’s Technological Power
  id: totrans-284
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: DeepSeek与中国科技力量的崛起
- en: While DeepSeek’s success has created ripples across the AI sector globally,
    its impact on China’s technology sector cannot be understated. For years, China
    has sought to develop homegrown technologies that can rival those produced by
    the U.S. and other Western nations. DeepSeek’s rise represents a tangible victory
    for China in its push for technological independence, marking a significant step
    forward in the country’s aspirations to become a global leader in AI.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管DeepSeek的成功在全球AI领域引起了波澜，但其对中国科技行业的影响不容小觑。多年来，中国一直在寻求开发能够与美国和其他西方国家产品相媲美的本土技术。DeepSeek的崛起代表了中国在追求技术独立方面的实际胜利，标志着该国在成为全球AI领导者雄心壮志方面迈出的重要一步。
- en: 'Strategic Shift in Chinese Tech Policy:'
  id: totrans-286
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 中国科技政策的战略转变：
- en: In recent years, China has faced increasing pressure and restrictions from the
    U.S. government, particularly in relation to access to semiconductors and advanced
    AI hardware. The U.S. has implemented export controls on critical components such
    as Nvidia’s A100 GPUs, which are essential for training advanced AI models. These
    restrictions have hindered the growth of Chinese AI startups and companies that
    rely on Western technology.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，中国面临着来自美国政府日益增加的压力和限制，尤其是在半导体和先进AI硬件的访问方面。美国已经对Nvidia的A100 GPU等关键组件实施了出口管制，这对于训练高级AI模型至关重要。这些限制阻碍了中国AI初创公司和依赖西方技术的公司的增长。
- en: Despite these challenges, DeepSeek’s ability to develop a competitive AI model
    without relying on cutting-edge, Western-sourced chips demonstrates that China
    can build powerful, independent AI technologies. DeepSeek’s success represents
    China’s resilience in the face of external pressures and highlights its growing
    capabilities in the field of AI innovation.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管面临这些挑战，DeepSeek能够在不依赖尖端、西方来源的芯片的情况下开发出具有竞争力的AI模型，这表明中国能够构建强大、独立的AI技术。DeepSeek的成功体现了中国在面临外部压力时的韧性，并突显了其在AI创新领域的日益增长的能力。
- en: 'The Shift in Global Technological Leadership:'
  id: totrans-289
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 全球科技领导权的转变：
- en: DeepSeek’s rise is also symbolic of a broader shift in the global balance of
    technological power. Traditionally dominated by the U.S. and Europe, the AI space
    is now seeing the emergence of China as a formidable force in AI development.
    DeepSeek is not just an AI model; it is a statement about China’s growing role
    as a technological powerhouse.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的崛起也象征着全球技术力量平衡的更广泛转变。传统上由美国和欧洲主导，现在人工智能领域正看到中国作为人工智能发展中的强大力量出现。DeepSeek不仅仅是一个人工智能模型；它是对中国作为技术强国日益增长角色的声明。
- en: For the West, this presents a challenge—not only in terms of technological innovation
    but also in terms of geopolitical competition. As China’s AI capabilities continue
    to evolve, the global competition for AI supremacy will likely intensify, with
    nations racing to develop the next-generation models that can propel them to the
    forefront of the global economy.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 对于西方来说，这既是一个技术创新方面的挑战，也是一个地缘政治竞争方面的挑战。随着中国的人工智能能力不断发展，全球对人工智能霸权的竞争可能会加剧，各国竞相开发下一代模型，以推动它们在全球经济的前沿。
- en: This shift also underscores the importance of international collaboration and
    the growing recognition that AI is no longer the domain of a few dominant players.
    With models like DeepSeek, the landscape is becoming more diversified, with different
    regions and countries contributing to the global AI ecosystem in meaningful ways.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转变也强调了国际合作的重要性，以及人工智能不再是少数主导玩家领域的日益增长的认可。有了像DeepSeek这样的模型，格局正在变得更加多元化，不同地区和国家以有意义的方式为全球人工智能生态系统做出贡献。
- en: 'Conclusion: A New Era of AI Innovation'
  id: totrans-293
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结论：人工智能创新的新时代
- en: DeepSeek’s emergence as a cost-effective, open-source alternative to traditional
    proprietary AI models marks a significant milestone in the history of artificial
    intelligence. By challenging established notions about the resources required
    for cutting-edge AI development, DeepSeek has reshaped the expectations surrounding
    both AI cost and accessibility, making powerful AI technology more affordable
    and available to a wider audience of developers, businesses, and consumers.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek作为传统专有AI模型的低成本、开源替代品出现，标志着人工智能历史上的一个重要里程碑。通过挑战关于尖端人工智能发展所需资源的既定观念，DeepSeek重塑了围绕人工智能成本和可访问性的预期，使强大的AI技术对更广泛的开发者、企业和消费者更加经济实惠和可获取。
- en: Moreover, the rise of DeepSeek is symbolic of a broader global shift, with China
    positioning itself as a growing force in the AI space, challenging the West’s
    long-standing dominance. As DeepSeek continues to evolve and disrupt the industry,
    its impact will likely be felt for years to come, reshaping the future of AI development,
    competition, and collaboration on a global scale.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，DeepSeek的崛起象征着更广泛的全球转变，中国将自己定位为人工智能领域日益增长的力量，挑战西方长期以来的主导地位。随着DeepSeek持续发展和颠覆行业，其影响可能会在未来几年内感受到，重塑人工智能发展的未来，以及全球范围内的竞争和合作。
- en: 'In the next chapters, we will explore DeepSeek’s future in more detail, as
    well as its potential applications across various industries. But one thing is
    certain: DeepSeek’s rise has firmly established that AI development can be driven
    by innovation and resourcefulness, not just deep pockets and cutting-edge hardware.'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将更详细地探讨DeepSeek的未来，以及其在各个行业中的潜在应用。但有一点是肯定的：DeepSeek的崛起已经坚定地确立，人工智能的发展可以由创新和资源驱动，而不仅仅是深厚的资金和尖端硬件。
- en: 'Chapter 8: DeepSeek: The Chinese AI Revolution'
  id: totrans-297
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第8章：DeepSeek：中国人工智能革命
- en: DeepSeek’s meteoric rise is not just a technological achievement; it marks a
    significant geopolitical shift in the world of artificial intelligence (AI). For
    years, the AI sector has been dominated by companies based in the United States,
    such as OpenAI, Google, and Microsoft, all of which have shaped the way AI is
    developed, deployed, and monetized. However, the launch of DeepSeek has introduced
    a new competitor that is reshaping the landscape. DeepSeek’s open-source, cost-effective
    approach has positioned it as a force to be reckoned with in the global AI race,
    and it is having far-reaching implications beyond just the technology itself.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的迅速崛起不仅仅是一个技术成就；它标志着人工智能世界中一个重大的地缘政治转变。多年来，人工智能领域一直由美国公司主导，如OpenAI、谷歌和微软，它们塑造了人工智能的开发、部署和货币化的方式。然而，DeepSeek的推出引入了一个新的竞争对手，正在重塑格局。DeepSeek的开源、低成本方法使其在全球人工智能竞赛中成为一个不可忽视的力量，并且它对技术本身之外产生了深远的影响。
- en: This chapter delves into the Chinese AI revolution ignited by DeepSeek’s success.
    It explores how DeepSeek is contributing to China’s technological independence,
    its ability to disrupt the traditional Western-dominated AI space, and its potential
    to change the way the world views AI development in the years to come.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 本章深入探讨由DeepSeek的成功引发的中国的AI革命。它探讨了DeepSeek如何促进中国的技术独立，其颠覆传统西方主导的AI空间的能力，以及其改变未来世界看待AI发展的方式的可能性。
- en: 'The Rise of DeepSeek: A Symbol of China''s Tech Ambitions'
  id: totrans-300
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: DeepSeek的崛起：中国技术雄心的象征
- en: For decades, China has been on a mission to assert its technological dominance
    and reduce its dependency on foreign-made technology. The push for homegrown innovation
    has been one of the cornerstones of China’s economic and industrial strategy,
    and DeepSeek’s success is the culmination of years of effort in building self-sufficiency
    in critical technologies. AI, being one of the most transformative technologies
    of the 21st century, has been a particular focus of this initiative.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 几十年来，中国一直在努力确立其技术主导地位，减少对外国技术的依赖。推动本土创新一直是中国的经济和工业战略的基石，而DeepSeek的成功是多年努力在关键技术上实现自给自足的成果。作为21世纪最具变革性的技术之一，人工智能一直是这一倡议的重点。
- en: DeepSeek’s impressive rise in the AI world signals a new chapter in this broader
    effort. China’s growing influence in AI development is increasingly becoming undeniable,
    and DeepSeek serves as an example of what’s possible when homegrown talent, resources,
    and innovation are brought to the forefront. As the first Chinese-developed AI
    chatbot to challenge U.S.-based models, DeepSeek has generated global attention,
    both for its technical performance and the strategic implications it carries.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek在人工智能领域的显著崛起标志着这一更广泛努力的崭新篇章。中国在人工智能发展中的影响力日益增长，越来越不容忽视，而DeepSeek就是本土人才、资源和创新被推向前台的例证。作为第一个挑战美国模型的本土开发的人工智能聊天机器人，DeepSeek因其技术性能和所携带的战略意义而引起了全球关注。
- en: DeepSeek is not just another entry in the crowded AI space; it is a statement—a
    manifestation of China’s growing technological independence. By proving that cutting-edge
    AI models can be developed without reliance on Western technology, DeepSeek has
    become a symbol of China’s ability to create world-class innovations from within
    its own borders.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek不仅仅是人工智能领域众多参与者之一；它是一种宣言——中国日益增长的技术独立性的体现。通过证明尖端人工智能模型可以在不依赖西方技术的情况下开发，DeepSeek已成为中国能够在其国内创造世界级创新的象征。
- en: 'A New Era of Cost-Efficient AI: DeepSeek’s Competitive Advantage'
  id: totrans-304
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 成本效益人工智能的新时代：DeepSeek的竞争优势
- en: One of the defining features of DeepSeek is its cost-efficiency, which sets
    it apart from many of its competitors in the AI industry. While models like GPT-4
    and Google Gemini have required massive investments—estimated to be over $100
    million each—DeepSeek was developed for a fraction of that cost, with estimates
    putting its total development at around $6 million.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的一个显著特点是它的成本效益，这使得它在人工智能行业中与其他许多竞争对手区分开来。虽然像GPT-4和Google Gemini这样的模型需要巨额投资——据估计每款超过1亿美元——但DeepSeek的开发成本仅为其中的一小部分，其总开发成本估计约为600万美元。
- en: This cost-effectiveness is achieved through a combination of strategic decisions
    that prioritize affordable hardware and an innovative development model. For example,
    DeepSeek was built using a mix of Nvidia A100 GPUs and more budget-friendly alternatives,
    allowing it to deliver performance competitive with top-tier models at a fraction
    of the price.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 这种成本效益是通过一系列优先考虑经济实惠的硬件和创新开发模式的战略决策实现的。例如，DeepSeek是使用Nvidia A100 GPU和更经济的替代品混合构建的，这使得它能够在价格的一小部分内提供与顶级模型相媲美的性能。
- en: For developers and businesses around the world, this makes DeepSeek an attractive
    option. In a landscape where AI development costs are often prohibitive, DeepSeek’s
    ability to provide high-quality AI capabilities at an affordable price point is
    a game-changer. By providing an open-source platform, it is also allowing a wider
    range of developers to contribute to and build upon the model, further driving
    innovation in AI technology.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 对于世界各地的开发者和企业来说，这使得DeepSeek成为一个有吸引力的选择。在一个人工智能开发成本往往高昂的环境中，DeepSeek能够以合理的价格提供高质量的AI能力，这是一个颠覆性的变化。通过提供一个开源平台，它还允许更广泛的开发者参与并在此基础上构建模型，进一步推动人工智能技术的创新。
- en: 'The Open-Source Revolution: Democratizing AI Access'
  id: totrans-308
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 开源革命：民主化人工智能的获取
- en: A key differentiator of DeepSeek is its open-source nature, which fosters collaboration,
    transparency, and innovation. Unlike proprietary models like ChatGPT, which limit
    access to their underlying code and require paid subscriptions for advanced features,
    DeepSeek’s open-source approach has democratized access to advanced AI capabilities.
    Developers around the world can download, modify, and build upon DeepSeek’s code,
    contributing to its evolution and expansion.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的一个关键区别是其开源特性，它促进了协作、透明度和创新。与像ChatGPT这样的专有模型不同，这些模型限制了对其底层代码的访问，并要求支付订阅费才能获得高级功能，DeepSeek的开源方法使高级AI能力民主化。世界各地的开发者都可以下载、修改和基于DeepSeek的代码进行构建，为其演变和扩展做出贡献。
- en: This open-source model has resonated with developers, particularly those from
    countries outside the traditional tech giants like the U.S. and Europe. The ability
    to use DeepSeek’s code freely and adapt it to their needs has been a major draw
    for independent developers and startups. It has also attracted developers who
    are particularly interested in privacy, as DeepSeek offers local deployment options
    through tools like Ollama, allowing users to run the model on their own hardware
    instead of relying on centralized cloud services.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 这个开源模型受到了开发者的共鸣，尤其是来自美国和欧洲等传统科技巨头以外的国家的开发者。能够自由使用DeepSeek的代码并根据自己的需求进行适配，这对独立开发者和初创公司来说是一个主要的吸引力。它还吸引了特别关注隐私的开发者，因为DeepSeek通过Ollama等工具提供了本地部署选项，使用户能够在自己的硬件上运行模型，而不是依赖集中的云服务。
- en: Moreover, DeepSeek’s open-source nature has fostered a global community of developers
    who are contributing to its development, resulting in a highly collaborative environment.
    This community-driven development model stands in stark contrast to closed ecosystems
    like those of Google or Microsoft, where access to AI models is often restricted,
    and users are at the mercy of the company’s terms.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，DeepSeek的开源特性培养了一个全球开发者社区，他们正在为其发展做出贡献，从而形成了一个高度协作的环境。这种社区驱动的开发模式与谷歌或微软等封闭生态系统形成了鲜明对比，在这些生态系统中，访问AI模型通常受到限制，用户完全受制于公司的条款。
- en: The rise of open-source AI platforms like DeepSeek is a critical shift in the
    industry. It enables a broader spectrum of voices and talent to influence the
    direction of AI research and development, making AI innovation more inclusive
    and accessible to developers worldwide.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 开源AI平台如DeepSeek的兴起是行业中的一个关键转变。它使更广泛的观点和人才能够影响AI研究和开发的方向，使AI创新更具包容性和全球开发者可及性。
- en: China's Strategic Push for AI Independence
  id: totrans-313
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 中国对AI独立性的战略推动
- en: DeepSeek’s success is indicative of China’s growing efforts to achieve technological
    self-sufficiency, especially in the AI sector. Over the past decade, China has
    invested heavily in AI research, pouring billions of dollars into the development
    of homegrown AI technologies. At the same time, China has faced mounting pressure
    from the U.S. and other Western nations to limit its access to key technologies
    like semiconductors and AI-related hardware.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的成功表明中国正在努力实现技术自给自足，特别是在AI领域。在过去十年中，中国大力投资AI研究，投入数十亿美元用于本土AI技术的发展。同时，中国面临着来自美国和其他西方国家日益增加的压力，限制其获取关键技术，如半导体和AI相关硬件。
- en: In the face of these challenges, DeepSeek has proven that China does not need
    to rely on foreign companies like Nvidia to create world-class AI models. By utilizing
    a mix of available hardware and innovative development strategies, China has been
    able to create an AI system that rivals those developed in the West, both in terms
    of performance and cost efficiency.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 面对这些挑战，DeepSeek已经证明中国不需要依赖像英伟达这样的外国公司来创建世界级的AI模型。通过利用可用的硬件和创新的发展策略，中国已经能够创建一个在性能和成本效率方面与西方开发的模型相媲美的AI系统。
- en: This is not just a technological achievement but a strategic win for China.
    By developing its own AI capabilities, China is reducing its dependency on Western
    technology and paving the way for a more self-reliant tech ecosystem. This is
    particularly important in light of the trade tensions and geopolitical conflicts
    that have led to increasing restrictions on the flow of critical technologies
    between China and the West.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是一个技术成就，也是中国的一个战略胜利。通过发展自己的AI能力，中国正在减少对西方技术的依赖，并为一个更具自给自足的科技生态系统铺平道路。鉴于贸易紧张局势和地缘政治冲突导致中国与西方之间关键技术流动日益受限，这一点尤为重要。
- en: DeepSeek is the latest example of China’s commitment to creating homegrown tech
    that can compete on the world stage. It’s part of a broader effort to develop
    a full spectrum of advanced technologies that can drive China’s future economic
    growth and global influence.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek是中国致力于创造能够在世界舞台上竞争的本土技术的最新例证。它是为了开发一系列能够推动中国未来经济增长和全球影响力的先进技术而做出的更广泛努力的一部分。
- en: 'The Global Implications: A New Competitive Landscape'
  id: totrans-318
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 全球影响：新的竞争格局
- en: DeepSeek’s success also signals a broader shift in the global tech landscape.
    For years, U.S.-based companies like OpenAI, Google, and Microsoft have dominated
    the AI space, with their models setting the standard for AI development worldwide.
    However, the rise of DeepSeek is forcing the industry to rethink how AI models
    are built, deployed, and used.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的成功也标志着全球科技格局的更广泛转变。多年来，像OpenAI、谷歌和微软这样的美国公司一直主导着人工智能领域，其模型设定了全球人工智能发展的标准。然而，DeepSeek的崛起迫使行业重新思考人工智能模型的建设、部署和使用方式。
- en: By offering free access to powerful AI tools, DeepSeek is creating a more competitive
    environment where companies, developers, and researchers can collaborate across
    borders. DeepSeek’s emphasis on cost efficiency and privacy is also forcing established
    companies to reassess their business models. For example, OpenAI’s paid subscription
    model is increasingly being seen as less appealing in comparison to DeepSeek’s
    open-source and free alternatives.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供强大的AI工具的免费访问，DeepSeek正在创造一个更具竞争力的环境，公司、开发者和研究人员可以跨国界合作。DeepSeek对成本效益和隐私的重视也迫使传统公司重新评估其商业模式。例如，与DeepSeek的开源和免费替代方案相比，OpenAI的付费订阅模式越来越不受欢迎。
- en: The introduction of DeepSeek as a serious competitor to Western AI models is
    a wake-up call for companies that have long dominated the AI space. It highlights
    the potential for new players, particularly from regions like China, to rise up
    and challenge the existing order. As AI continues to evolve, we can expect new
    innovations and new players to emerge, leading to a more diverse and globalized
    AI ecosystem.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek作为西方人工智能模型的严肃竞争对手的出现，是对长期主导人工智能领域的公司的警钟。它突显了新参与者，尤其是来自中国等地区的新参与者崛起并挑战现有秩序的潜力。随着人工智能的不断发展，我们可以期待新的创新和新参与者出现，这将导致一个更加多元化和全球化的AI生态系统。
- en: 'Conclusion: A New Dawn for AI Innovation'
  id: totrans-322
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结论：人工智能创新的新曙光
- en: DeepSeek’s success represents the dawn of a new era in AI development. Not only
    has it proven that cutting-edge AI can be developed affordably, but it has also
    shown that open-source models can foster global collaboration and democratize
    access to AI technology. Furthermore, DeepSeek’s rise signifies the growing strength
    of China as a player in the global AI race, positioning the country as a formidable
    force in the world of advanced technologies.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek的成功标志着人工智能发展新时代的曙光。它不仅证明了尖端人工智能可以以可负担的价格开发，而且还表明开源模型可以促进全球合作并使人工智能技术普及化。此外，DeepSeek的崛起也标志着中国在全球人工智能竞赛中的实力不断增强，使该国在先进技术领域成为一个强大的力量。
- en: As DeepSeek continues to evolve, it will undoubtedly inspire other countries
    and organizations to push the boundaries of what’s possible in AI. For now, DeepSeek
    stands as a powerful symbol of technological independence and innovation in China,
    and its influence on the global tech industry will likely be felt for many years
    to come.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 随着DeepSeek的不断进化，它无疑将激励其他国家和组织挑战人工智能的极限。目前，DeepSeek作为中国技术独立和创新的有力象征，其全球科技行业的影响预计将持续多年。
- en: 'Chapter 9: DeepSeek vs. ChatGpt'
  id: totrans-325
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第9章：DeepSeek 与 ChatGpt
- en: Is DeepSeek AI Free?
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek AI是否免费？
- en: Yes, DeepSeek offers a free AI chatbot that’s available globally. Powered by
    the DeepSeek-V3 model, the AI is highly capable and can handle a variety of tasks.
    Recently, DeepSeek also introduced its DeepSeek-R1 model, a reasoning model on
    par with OpenAI’s GPT-4. What’s even better is that you can access this DeepThink
    (R1) mode for free—just toggle the option in the app.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，DeepSeek提供全球通用的免费AI聊天机器人。由DeepSeek-V3模型驱动，这个AI功能强大，可以处理各种任务。最近，DeepSeek还推出了其DeepSeek-R1模型，这是一个与OpenAI的GPT-4相媲美的推理模型。更好的是，你可以免费访问这个DeepThink（R1）模式——只需在应用中切换选项即可。
- en: 'How to Use DeepSeek Right Now:'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 如何立即使用DeepSeek：
- en: 'DeepSeek is accessible worldwide, including in India, and there are multiple
    ways to use the AI chatbot. Here’s how to get started:'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek在全球范围内都可用，包括印度，使用这个AI聊天机器人的方式有多种。以下是开始使用的方法：
- en: 'Step 1: Search for the DeepSeek app on the Apple App Store for iPhones or the
    Google Play Store for Android devices.'
  id: totrans-330
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第 1 步：在苹果应用商店（针对 iPhone）或谷歌应用商店（针对 Android 设备）中搜索 DeepSeek 应用。
- en: 'Step 2: Install the app and sign up by following the on-screen instructions.'
  id: totrans-331
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第 2 步：按照屏幕上的说明安装应用程序并注册。
- en: 'Step 3: Once signed up, you’re all set to start using the chatbot, just like
    any other AI assistant. You can type queries ranging from simple to complex in
    the search bar.'
  id: totrans-332
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第 3 步：一旦注册，你就可以开始使用聊天机器人了，就像使用任何其他 AI 助手一样。你可以在搜索栏中输入从简单到复杂的问题。
- en: To access the DeepThink (R1) reasoning model, simply tap on the DeepThink (R1)
    option beneath the search bar.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问 DeepThink (R1) 推理模型，只需在搜索栏下轻触 DeepThink (R1) 选项。
- en: That’s it! Now you can use DeepSeek for free in India and many other regions.
    What do you think about this new Chinese alternative to ChatGPT? Let us know your
    thoughts in the comments below.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！现在你可以在印度和其他许多地区免费使用 DeepSeek。你对这个 ChatGPT 的新中文替代品有什么看法？请在下面的评论中告诉我们你的想法。
- en: 'DeepSeek R1 vs. ChatGPT: Price and Training Costs'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek R1 与 ChatGPT：价格和训练成本
- en: While OpenAI’s training costs for models like GPT-4 run into tens of millions
    of dollars, DeepSeek claims it trained its DeepSeek-R1 model for just $5.5 million.
    When it comes to API access, DeepSeek charges $0.14 for one million tokens (about
    750,000 words), compared to OpenAI's $7.50 for the same volume.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 OpenAI 为 GPT-4 等模型训练的成本高达数千万美元，但 DeepSeek 声称其 DeepSeek-R1 模型的训练成本仅为 550 万美元。在
    API 访问方面，DeepSeek 对每百万个标记收费 0.14 美元（约 750,000 个单词），而 OpenAI 对相同数量的收费为 7.50 美元。
- en: Both platforms offer premium subscription plans. ChatGPT starts at $20 per month,
    while DeepSeek offers a much more affordable option, starting at just $0.50 per
    month.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 两个平台都提供高级订阅计划。ChatGPT 的起价为每月 20 美元，而 DeepSeek 提供一个更实惠的选择，起价仅为每月 0.50 美元。
- en: Not only is DeepSeek budget-friendly for individual users, but it’s also much
    more cost-effective for developers and businesses. It’s reported that DeepSeek
    R1 costs approximately 27 times less per token compared to OpenAI’s GPT-4, making
    it a great choice for those looking to save on AI usage costs.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 不仅对个人用户来说价格合理，而且对开发者和企业来说成本效益更高。据报道，DeepSeek R1 的每个标记成本大约比 OpenAI 的
    GPT-4 低 27 倍，这使得它成为那些希望节省 AI 使用成本的人的理想选择。
- en: 'DeepSeek vs. ChatGPT: Features'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 与 ChatGPT：功能比较
- en: DeepSeek excels in technical tasks, particularly in code generation (such as
    in Python and Java) and solving complex equations. These strengths make it an
    ideal choice for developers and students working on technical projects.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 在技术任务中表现出色，尤其是在代码生成（如 Python 和 Java）和解决复杂方程式方面。这些优势使其成为开发者和学生进行技术项目的理想选择。
- en: On the other hand, ChatGPT is known for its creative abilities, such as generating
    stories, jokes, and marketing copy. It’s also highly adept at producing engaging,
    human-like content, which makes it perfect for casual conversations and creative
    writing tasks.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，ChatGPT 以其创造力而闻名，例如生成故事、笑话和营销文案。它还非常擅长制作引人入胜、类似人类的内容，这使得它非常适合日常对话和创意写作任务。
- en: How to Use DeepSeek R1 on Mobile Devices
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 如何在移动设备上使用 DeepSeek R1
- en: Search for the DeepSeek R1 app in the Apple App Store or Google Play Store.
  id: totrans-343
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在苹果应用商店或谷歌应用商店中搜索 DeepSeek R1 应用。
- en: Log in using your email, Gmail, or other supported credentials.
  id: totrans-344
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用你的电子邮件、Gmail 或其他支持的凭证登录。
- en: The mobile app provides the same robust features as the web version, so you
    can take DeepSeek with you wherever you go!
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 移动应用提供了与网页版本相同的强大功能，所以你可以随时随地携带 DeepSeek！
- en: How to Use DeepSeek R1 on Your Computer
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 如何在您的计算机上使用 DeepSeek R1
- en: Visit the DeepSeek R1 website and log in with your email, Gmail, or phone number.
  id: totrans-347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问 DeepSeek R1 网站，并使用你的电子邮件、Gmail 或电话号码登录。
- en: Once logged in, you’ll see an interface similar to ChatGPT, where you can easily
    start exploring the AI's capabilities.
  id: totrans-348
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 登录后，你会看到一个类似于 ChatGPT 的界面，你可以轻松开始探索 AI 的功能。
- en: 'DeepSeek vs. ChatGPT: Which AI Chatbot Should You Use?'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 与 ChatGPT：你应该使用哪个 AI 聊天机器人？
- en: 'Both DeepSeek and ChatGPT excel in different areas. Here’s a quick breakdown:'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 和 ChatGPT 在不同领域都表现出色。以下是一个简要的分析：
- en: DeepSeek is best for coding, technical problem-solving, and logical reasoning.
    It’s an excellent tool for developers and students working on complex tasks.
  id: totrans-351
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DeepSeek 适用于编码、技术问题解决和逻辑推理。它是开发者和学生进行复杂任务的优秀工具。
- en: ChatGPT excels in creativity, including storytelling, jokes, and crafting engaging
    content. It’s also more up-to-date on current events and works well for everyday
    users who seek conversational AI.
  id: totrans-352
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT 在创意方面表现出色，包括讲故事、讲笑话和制作引人入胜的内容。它也紧跟时事，非常适合寻求对话式 AI 的日常用户。
- en: 'Which one should you use? It depends on your needs:'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 您应该使用哪一个？这取决于您的需求：
- en: Use DeepSeek for technical queries, coding, or logical problems.
  id: totrans-354
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 DeepSeek 查询技术问题、编码或逻辑问题。
- en: Use ChatGPT if you want creativity, engaging conversations, and up-to-date news.
  id: totrans-355
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您想要创意、引人入胜的对话和最新的新闻，请使用 ChatGPT。
- en: Neither tool is objectively "better"—they each serve different purposes, so
    the best choice comes down to what you need from the AI.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 两个工具都不是客观上“更好”——它们各自服务于不同的目的，所以最佳选择取决于您从 AI 那里需要什么。
- en: Ethics and Privacy
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理与隐私
- en: Both DeepSeek and ChatGPT face ethical and privacy concerns. DeepSeek has made
    its models open-source, promoting transparency, but it has been criticized for
    censorship related to politically sensitive topics, particularly in relation to
    China. For example, when asked about Chinese President Xi Jinping and Russian
    President Vladimir Putin, DeepSeek promptly redirected the conversation to more
    neutral topics like math and coding.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 和 ChatGPT 都面临着伦理和隐私问题。DeepSeek 已经使其模型开源，促进了透明度，但它因与政治敏感话题相关的审查而受到批评，尤其是在中国。例如，当被问及中国国家主席习近平和俄罗斯总统弗拉基米尔·普京时，DeepSeek
    立即将对话转向更中性的话题，如数学和编码。
- en: Meanwhile, ChatGPT has also faced issues, such as generating biased responses
    and sparking debates over its handling of sensitive issues. OpenAI has found itself
    embroiled in copyright lawsuits and regulatory challenges globally.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，ChatGPT 也面临了一些问题，例如生成有偏见的回应，以及引发关于其处理敏感问题的辩论。OpenAI 发现自己在全球范围内陷入版权诉讼和监管挑战。
- en: Ultimately, both AI systems have strengths and weaknesses, but as an end user,
    the choice depends on whether you prioritize technical performance or creativity.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，这两个 AI 系统都有优点和缺点，但作为最终用户，选择取决于您是否更重视技术性能还是创意。
- en: Conclusion
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Whether you go with DeepSeek or ChatGPT depends largely on your use case. DeepSeek
    is an outstanding choice for developers and anyone needing a cost-effective, powerful
    AI model for technical tasks, while ChatGPT continues to be a top pick for more
    casual or creative interactions. Both platforms are continually improving, so
    you can expect even more exciting features from both in the future!
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您选择 DeepSeek 还是 ChatGPT，很大程度上取决于您的使用场景。DeepSeek 是开发人员和需要经济高效、强大 AI 模型进行技术任务的人的绝佳选择，而
    ChatGPT 仍然是更休闲或创意互动的首选。这两个平台都在不断改进，因此您可以期待未来从两者那里获得更多令人兴奋的功能！
- en: 'Chapter 10: How to Use DeepSeek AI: Step-by-Step Guide (2025)'
  id: totrans-363
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 10 章：如何使用 DeepSeek AI：分步指南（2025）
- en: DeepSeek is the number one AI tool everyone talks about right now.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 是目前大家都在谈论的 No.1 AI 工具。
- en: Let me show you how it works and how to make the most out of it.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 让我向您展示它是如何工作的，以及如何充分利用它。
- en: This is a step-by-step beginner-friendly guide.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个循序渐进、适合初学者的指南。
- en: What Is DeepSeek AI?
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是 DeepSeek AI？
- en: '![](image_rsrc128.jpg)'
  id: totrans-368
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc128.jpg)'
- en: .
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: .
- en: How to Use DeepSeek?
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用 DeepSeek？
- en: To start using DeepSeek AI, head over to this page: [chat.deepseek.com](https://chat.deepseek.com/).
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用 DeepSeek AI，请访问这个页面：[chat.deepseek.com](https://chat.deepseek.com/).
- en: It will prompt you to create an account.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 它会提示您创建一个账户。
- en: '![](image_rsrc129.jpg)'
  id: totrans-373
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc129.jpg)'
- en: 'Once you’re in, you will see a chat view like this:'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您进入，您将看到这样的聊天视图：
- en: '![](image_rsrc12A.jpg)'
  id: totrans-375
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc12A.jpg)'
- en: To start a conversation with the program, just type in a message to the message
    box and hit enter to send it.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 要与程序开始对话，只需在消息框中输入一条消息，然后按回车键发送。
- en: 'For example, here I’ve asked DeepSeek to create a song about squirrels:'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我让 DeepSeek 创作了一首关于松鼠的歌曲：
- en: '![](image_rsrc12B.jpg)'
  id: totrans-378
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc12B.jpg)'
- en: That’s pretty cool, huh? The AI created a completely original song about squirrels
    in just seconds.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 这真的很酷，不是吗？AI 只在几秒钟内就创作了一首关于松鼠的原创歌曲。
- en: 'Here’s the full song:'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是完整的歌曲：
- en: '![](image_rsrc12C.jpg)'
  id: totrans-381
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc12C.jpg)'
- en: If you’re new to AI, this is probably mind-blowing, right?
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您是 AI 新手，这可能会让您感到震惊，对吧？
- en: Everything that the DeepSeek AI generates is unique and original. There’s no
    human involved anywhere in the process.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek AI 生成的所有内容都是独特和原创的。在整个过程中没有任何人类参与。
- en: That’s how you use DeepSeek in a nutshell.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是您如何简洁地使用 DeepSeek。
- en: Feel free to send it messages but don’t include personal details or private
    information. (Later, I will show you how to run this program on your computer
    privately.)
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 随意发送消息，但不要包含个人信息或隐私信息。（稍后，我会向你展示如何在你的电脑上私密地运行这个程序。）
- en: Tips for Using DeepSeek
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 DeepSeek 的技巧
- en: Let me show you the best tips, tricks, and practices to use DeepSeek AI.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 让我向你展示使用 DeepSeek AI 的最佳技巧、窍门和实践。
- en: 'Tip 1: Get the App'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 1：获取应用
- en: DeepSeek has a mobile app for iOS and Android. Make sure to install it.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 为 iOS 和 Android 提供了移动应用。请确保安装它。
- en: 'You can do so in the [chat.deepseek.com](https://chat.deepseek.com/) chat view:'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在 [chat.deepseek.com](https://chat.deepseek.com/) 的聊天视图中这样做：
- en: '![](image_rsrc12D.jpg)'
  id: totrans-391
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12D.jpg)'
- en: Or you can search for the app in the App Store/Google Play Store. But if you
    search for it, make sure to download the right app, not a scam version.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 或者你可以在 App Store/Google Play Store 中搜索该应用。但如果你搜索它，请确保下载正确的应用，而不是诈骗版本。
- en: '[Get DeepSeek for iOS](https://apps.apple.com/sa/app/deepseek-ai-assistant/id6737597349)'
  id: totrans-393
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[获取 DeepSeek for iOS](https://apps.apple.com/sa/app/deepseek-ai-assistant/id6737597349)'
- en: '[Get DeepSeek for Android](https://play.google.com/store/apps/details?id=com.deepseek.chat)'
  id: totrans-394
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[获取 DeepSeek for Android](https://play.google.com/store/apps/details?id=com.deepseek.chat)'
- en: Now you can send messages to AI with your mobile device.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以使用你的移动设备向 AI 发送消息。
- en: 'Tip 2: Use the search mode'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 2：使用搜索模式
- en: DeepSeek is not just a chatbot. It also has access to the internet for the latest
    events and news.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 不仅仅是一个聊天机器人。它还可以访问互联网获取最新的事件和新闻。
- en: To access AI search, open up a new chat.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问 AI 搜索，打开一个新的聊天。
- en: '![](image_rsrc12E.jpg)'
  id: totrans-399
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12E.jpg)'
- en: 'Then activate the search feature:'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 然后激活搜索功能：
- en: '![](image_rsrc12F.jpg)'
  id: totrans-401
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12F.jpg)'
- en: Then ask about any recent events.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 然后询问任何最近的事件。
- en: 'For example, here I’m asking about a soccer game that took place yesterday:'
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这里我询问的是昨天发生的一场足球比赛：
- en: '![](image_rsrc12G.jpg)'
  id: totrans-404
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12G.jpg)'
- en: 'After about 10 seconds, the AI gave me the answer:'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 大约 10 秒后，AI 给了我答案：
- en: '![](image_rsrc12H.jpg)'
  id: totrans-406
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12H.jpg)'
- en: 'Now, let’s check the score from [sofascore.com](https://www.sofascore.com/football/2025-01-27) to
    see if the AI got it right:'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们查看 [sofascore.com](https://www.sofascore.com/football/2025-01-27) 上的比分，看看
    AI 是否判断正确：
- en: '![](image_rsrc12J.jpg)'
  id: totrans-408
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12J.jpg)'
- en: The AI nailed it.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: AI 准确地完成了任务。
- en: 'Tip 3: Continue chat'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 3：继续聊天
- en: I noticed that sometimes DeepSeek gets stuck when searching for information.
    If this happens, just click “Continue” and it will keep on searching.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 我注意到有时 DeepSeek 在搜索信息时会卡住。如果发生这种情况，只需点击“继续”并继续搜索。
- en: '![](image_rsrc12K.jpg)'
  id: totrans-412
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12K.jpg)'
- en: You can do this until the AI finds the right information.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以这样做，直到 AI 找到正确的信息。
- en: 'Tip 4: Read files'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 4：读取文件
- en: 'Privacy alert: Don’t share private information!'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 隐私警告：不要分享个人信息！
- en: The current version of DeepSeek can also extract text from files.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 的当前版本还可以从文件中提取文本。
- en: As you can imagine, this is very useful in many situations.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所想，这在许多情况下都非常有用。
- en: 'For example, here’s an image I have about the pros and cons of bananas:'
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这是我关于香蕉优缺点的图片：
- en: '![](image_rsrc12M.jpg)'
  id: totrans-419
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12M.jpg)'
- en: I want to turn that into text.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 我想把它转换成文本。
- en: Traditionally, I’d have to type that all manually.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，我不得不手动输入所有这些内容。
- en: But thanks to DeepSeek, that’s no longer a problem. Now I can just drag and
    drop the image to DeepSeek.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 但多亏了 DeepSeek，这不再是问题。现在我可以直接将图片拖放到 DeepSeek 中。
- en: '![](image_rsrc12N.jpg)'
  id: totrans-423
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12N.jpg)'
- en: Then I can just tell the AI that I want to create a table from the information
    on that image.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我可以告诉 AI 我想要从该图片上的信息创建一个表格。
- en: '![](image_rsrc12P.jpg)'
  id: totrans-425
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12P.jpg)'
- en: 'After 5 seconds, here’s the result:'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 5 秒后，这是结果：
- en: '![](image_rsrc12R.jpg)'
  id: totrans-427
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12R.jpg)'
- en: Pretty cool, huh?
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 真的很酷，不是吗？
- en: 'Tip 5: Write code'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 5：编写代码
- en: You can also use DeepSeek to write codesimilar to how ChatGPT works.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以使用 DeepSeek 编写代码，类似于 ChatGPT 的工作方式。
- en: 'For example, here I’ve told the AI to write a snake game:'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这里我告诉 AI 编写一个贪吃蛇游戏：
- en: '![](image_rsrc12S.jpg)'
  id: totrans-432
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12S.jpg)'
- en: That’s a lot of code that looks promising... But let’s see if it works.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一段看起来很有希望的大量代码... 但让我们看看它是否真的能工作。
- en: 'I copy-pasted the code to an [HTML editor](https://www.w3schools.com/html/tryit.asp?filename=tryhtml_basic) to
    verify:'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 我将代码复制粘贴到一个 [HTML 编辑器](https://www.w3schools.com/html/tryit.asp?filename=tryhtml_basic)
    中以验证：
- en: '![](image_rsrc12T.jpg)'
  id: totrans-435
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12T.jpg)'
- en: Surprise surprise, it works fine.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 惊喜惊喜，它运行得很好。
- en: You don’t need to find a separate code editor to test it. DeepSeek also has
    an HTML editor directly.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要找到单独的代码编辑器来测试它。DeepSeek 还有一个直接的 HTML 编辑器。
- en: 'Just hit “Run HTML” and you’re good to go:'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 只需点击“运行 HTML”即可：
- en: '![](image_rsrc12U.jpg)![](image_rsrc12V.jpg)'
  id: totrans-439
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12U.jpg)![图片](image_rsrc12V.jpg)'
- en: Well, that’s handy, to say the least.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 至少可以说，这很方便。
- en: Incredibly, the DeepSeek team has pulled this off with a small team in such
    a short time. I’m a bit mind-blown right now. I was just paying for ChatGPT and
    now I get just as good a service for free.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 令人难以置信的是，DeepSeek 团队以如此小的团队在如此短的时间内完成了这项工作。我现在有点儿目瞪口呆。我之前只是付费使用 ChatGPT，现在我可以免费获得同样优质的服务。
- en: 'Tip 6: Rephrase text'
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 6：改写文本
- en: DeepSeek is good for rephrasing text.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: DeepSeek 很适合改写文本。
- en: If you ever feel like you say something simple in way too complicated terms,
    it’s time to ask DeepSeek to fix the problem.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你觉得自己用过于复杂的方式表达了一些简单的事情，那么是时候让 DeepSeek 来解决这个问题了。
- en: 'For example, here I’m asking the AI to shorten my paragraph that’s way too
    verbose:'
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这里我要求 AI 缩短我那过于冗长的段落：
- en: '![](image_rsrc12W.jpg)'
  id: totrans-446
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc12W.jpg)'
- en: 'If you can’t see it well enough, here’s the original sentence:'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看不清楚，这里是有原句：
- en: This is the time of the day when I go outside for a walk because I want to not
    just work all day but also enjoy the sunshine and temperature. After all, here
    it’s a rare phenomenon, especially during winter times when it’s mostly cold and
    dark outside.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我每天出去散步的时候，因为我不仅想整天工作，还想享受阳光和温度。毕竟，这里这种现象很少见，尤其是在冬天，外面大部分时间都是寒冷和黑暗的。
- en: 'Here’s the AI-generated shorter version:'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是 AI 生成的简短版本：
- en: This is when I take a walk to enjoy the rare sunshine and warmth, especially
    in winter when it’s usually cold and dark.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我散步享受罕见阳光和温暖的时候，尤其是在通常寒冷和黑暗的冬天。
- en: That’s a lot better and shorter while keeping all the information and messages
    in place.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 这样做既好又短，同时保留了所有信息和消息。
- en: 'Tip 7: Write emails'
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士 7：写电子邮件
- en: If you aren’t good at writing emails or if they lack a professional touch, DeepSeek
    is there to help you.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不会写电子邮件，或者它们缺乏专业感，DeepSeek 就在那里帮助你。
- en: 'For example, here’s what I told it to do:'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这是我让它做的事情：
