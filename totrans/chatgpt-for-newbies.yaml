  type: TYPE_NORMAL
  zh: 按营销渠道拆分的收入。
- en: Total expected revenue for the upcoming year.
  id: totrans-886
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预计下一年度的总收入。
- en: '| • | Constraints: |'
  id: totrans-887
  prefs: []
  type: TYPE_TB
  zh: '| • | 约束条件：'
- en: Marketing budget is fixed at $100,000 for the next year.
  id: totrans-888
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下一年度的营销预算固定为100,000美元。
- en: '| • | Additional Considerations: |'
  id: totrans-889
  prefs: []
  type: TYPE_TB
  zh: '| • | 其他考虑因素：'
- en: Account for potential fluctuations due to external factors (e.g., economic downturn,
