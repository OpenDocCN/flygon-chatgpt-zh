  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 科幻小说是公众首次熟悉到人工智能机器人可能在未来不久就会出现在卡片上的想法的第一种方式。它可能比这些早期的科幻小说作家所想象的要快得多，他们可能认为要达到行走、说话机器人的阶段还需要更长的时间，但我们今天已经到了这个阶段。此外，今天世界上的标准人工智能形式，如ChatGPT和其他形式的人工智能，它们所能做到的事情，可能会让这些早期的先驱们感到震惊。
