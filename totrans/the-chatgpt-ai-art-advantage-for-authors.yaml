- en: Keeping Your Brand’s Visual Identity Consistent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: From a marketing perspective, you want consistency for your graphics across
    all platforms. That may mean keeping it consistent in terms of the colour palette,
    for example. You have to be very specific with ChatGPT 4o when doing this.
  prefs: []
  type: TYPE_NORMAL
- en: You may already know not to say something like, “make it colourful.” That gives
    AI the ability to pull any colour under the sun into your image, which may not
    be what you want. But it's still not enough to simply say, “Use greens and blues”
    if you have a specific colour palette that needs to be used.
  prefs: []
  type: TYPE_NORMAL
- en: If you want it to use Forest Green, tell it to use Hex# 228B22\. If you want
    dark blue, you might tell it to use Hex# 1B2D48\. These specifics give you exactly
    what you want without question, and ensures the graphics are consistent at all
    times.
  prefs: []
  type: TYPE_NORMAL
- en: In some cases, you might even have a character or some sort of cartoon image
    that you want consistently used. This is somewhere that AI might veer off course.
    Sometimes, you can tell it to use the same person in an image, and it will maintain
    that character's exact look.
  prefs: []
  type: TYPE_NORMAL
- en: But if it ever changes things, you can always upload the image you want replicated
    as part of your prompt so that it knows exactly which character you're referring
    to.
  prefs: []
  type: TYPE_NORMAL
- en: One thing that might help is for you to keep a library or checklist of these
    specific prompts and images so that you can pull them up at any time and quickly
    feed them into ChatGPT 4o whenever you need something maintained in a consistent
    manner.
  prefs: []
  type: TYPE_NORMAL
