    ****ac**ros**s ****dev**ice**s.'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 看得更远一些，ChatGPT和类似模型可能会成为更大AI生态系统的一部分，无缝地在平台和应用之间工作。想象一下由AI驱动的未来的一天，其中ChatGPT不仅仅是一个网络工具，而是一个完全集成的助手，跨越你的设备帮助你规划你的日子、监控你的健康，甚至参与创意项目的协作。例如，一个作家可以在他们的笔记本电脑上与ChatGPT进行头脑风暴，在通勤期间无缝地将会话继续到他们的手机上，并接收与项目相一致的内容推荐，所有这些都在保持设备间的一致上下文的同时进行。
- en: '****I**n** ****t**he** ****work**plac**e, ****th**ese** ****inte**lligen**t
