- en: 'Step 1: What Makes a Prompt Effective?'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：什么使提示有效？
- en: 'Key principles of a good prompt:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 良好提示的关键原则：
- en: Be specific
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要具体
- en: Provide context
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供上下文
- en: State the format you want
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 说明你想要的格式
- en: Limit or guide the scope
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 限制或引导范围
- en: Use examples when needed
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要时使用示例
- en: 'Example:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “Summarize this paragraph in 3 bullet points for a presentation.”
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: “将此段落总结为3个要点以供演示。”
- en: “Write a polite customer service email apologizing for late delivery.”
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: “写一封礼貌的客户服务电子邮件，为延迟交付道歉。”
