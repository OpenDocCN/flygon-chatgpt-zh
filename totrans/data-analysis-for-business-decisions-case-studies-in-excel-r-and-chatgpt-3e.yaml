  type: TYPE_NORMAL
- en: Analysis with Excel
  prefs: []
  type: TYPE_NORMAL
- en: Use the Case Dataset files provided in the [Chapter 13](22_ch13.xhtml) folder,
    and find the file
  prefs: []
  type: TYPE_NORMAL
- en: 2016_SFO_Customer_Survey_Data.xls. Open the data dictionary and have it available
    to consult as you work with the data.
  prefs: []
  type: TYPE_NORMAL
- en: 'We are going to answer several questions using contingency analysis:'
  prefs: []
  type: TYPE_NORMAL
- en: How does the overall satisfaction level with the SFO Airport vary by gender?
  prefs: []
  type: TYPE_NORMAL
- en: How does the overall satisfaction level vary by income level?
  prefs: []
  type: TYPE_NORMAL
- en: How does the overall satisfaction level vary by age?
  prefs: []
  type: TYPE_NORMAL
- en: Open the data file using Excel. Create a pivot table of Q7ALL by Q22GENDER ([Figure
    13.11](#fig13-11)). Make sure to remove the “0” and “6” response rows for Q7 and
    the blank and “3” responses for Q22\. Perform a chi-squared test to ensure that
    the variables are dependent. Check the percentage approval using the sum of the
    numbers of “4” and “5” ratings.
  prefs: []
  type: TYPE_NORMAL
