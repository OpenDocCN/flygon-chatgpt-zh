  type: TYPE_NORMAL
  zh: '[列表 3.2](#list3-2) 显示了 pandas_df_describe.py 的内容，该内容说明了如何定义包含 3x3 整数 NumPy
    数组的 Pandas DataFrame，其中 DataFrame 的行和列有标签。DataFrame 的其他方面也进行了显示。'
- en: '***LISTING 3.2: pandas_df_describe.py***'
  id: totrans-1134
  prefs: []
  type: TYPE_NORMAL
  zh: '***列表 3.2: pandas_df_describe.py***'
