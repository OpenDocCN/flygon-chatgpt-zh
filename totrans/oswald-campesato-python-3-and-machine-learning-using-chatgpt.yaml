  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: computational cost can be high for large datasets
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Davies-Bouldin Index
  prefs: []
  type: TYPE_NORMAL
- en: Advantages
  prefs: []
  type: TYPE_NORMAL
- en: measures the average similarity between each cluster and its most similar cluster
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A lower value indicates better clustering.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Disadvantages
  prefs: []
  type: TYPE_NORMAL
- en: It assumes that clusters are convex and isotropic, which is not always the case.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calinski-Harabasz Index
  prefs: []
  type: TYPE_NORMAL
- en: Advantages
  prefs: []
  type: TYPE_NORMAL
- en: computes the ratio of the between-cluster dispersion mean and the within-cluster
