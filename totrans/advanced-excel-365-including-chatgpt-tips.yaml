- en: CHAPTER  10
  prefs: []
  type: TYPE_NORMAL
- en: Conditional Formatting
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs: []
  type: TYPE_NORMAL
- en: Conditional formatting in Excel allows us to apply formatting rules to cells
    or ranges based on specific conditions. It helps us highlight important information,
    visualize data trends, and make our worksheets more visually appealing. In this
    chapter, we will explore the different types of conditional formatting, such as
    formatting based on cell values or formulas, working with icon sets, and applying
    conditional formatting to real-world scenarios using a database case study. By
    the end of this chapter, you will have a solid understanding of how to use conditional
    formatting effectively to enhance your data analysis in Excel.
  prefs: []
  type: TYPE_NORMAL
- en: Structure
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will go over the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: ■Conditional formatting
  prefs: []
  type: TYPE_NORMAL
- en: •Conditional formatting using cell values (column-based conditional formatting)
  prefs: []
  type: TYPE_NORMAL
- en: •Conditional formatting using formulas (record-based conditional formatting)
  prefs: []
  type: TYPE_NORMAL
- en: ■Icon Set
  prefs: []
  type: TYPE_NORMAL
- en: ■Formulas with multiple conditions
  prefs: []
  type: TYPE_NORMAL
- en: Objectives
  prefs: []
  type: TYPE_NORMAL
- en: After studying this chapter, the reader will be able to define conditional formatting
    and identify the ways to apply conditional formatting. They will also learn how
    to apply formulas with multiple conditions.
  prefs: []
  type: TYPE_NORMAL
- en: Conditional Formatting
  prefs: []
  type: TYPE_NORMAL
- en: When data needs to be formatted based on certain conditions, we may use conditional
    formatting. It is easy to highlight cells or a range of cells, emphasize unusual
    values, and visualize data by using data bars, color scales, or icon sets. Conditional
    Formatting changes the appearance of a cell range, based on a condition (or criterion).
    If the condition is true, the cell range is formatted based on that condition.
    If the conditional is false, the cell range is not formatted. Refer to [Figure
    10.1](#fig10-1).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_10.1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.1 Conditional Formatting
  prefs: []
  type: TYPE_NORMAL
- en: 'You can select any of the following types of formatting, as required:'
  prefs: []
  type: TYPE_NORMAL
- en: ■Format all cells by using a two-color scale.
  prefs: []
  type: TYPE_NORMAL
- en: ■Format all cells by using a three-color scale.
  prefs: []
  type: TYPE_NORMAL
- en: ■Format all cells by using data bars.
  prefs: []
  type: TYPE_NORMAL
- en: ■Format all cells by using an icon set.
  prefs: []
  type: TYPE_NORMAL
- en: ■Format only cells that contain text, number, or date or time values.
  prefs: []
  type: TYPE_NORMAL
- en: ■Format only top- or bottom-ranked values.
  prefs: []
  type: TYPE_NORMAL
- en: ■Format only values that are above or below average.
  prefs: []
  type: TYPE_NORMAL
- en: ■Format only unique or duplicate values.
  prefs: []
  type: TYPE_NORMAL
- en: ■Compare table columns to determine which cells to format.
  prefs: []
  type: TYPE_NORMAL
- en: ■Use a formula to determine which cells to format.
  prefs: []
  type: TYPE_NORMAL
- en: ■Clear conditional formats.
  prefs: []
  type: TYPE_NORMAL
- en: For example, you can highlight in green all sales figures that exceed 75,000\.
    Conditional Formatting can be applied based on a cell value or a formula.
  prefs: []
  type: TYPE_NORMAL
- en: Note The area that you select before applying Conditional Formatting determines
    the area in the worksheet to which the format will be applied.
  prefs: []
  type: TYPE_NORMAL
- en: Conditional Formatting Using Cell Values (Column-based Conditional Formatting)
  prefs: []
  type: TYPE_NORMAL
- en: To use conditional formatting to apply shading based on cell values, follow
    the steps below.
  prefs: []
  type: TYPE_NORMAL
- en: 1. Select the cells to which you want to apply the Conditional Shading.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Activate the Sheet ribbon tab.
  prefs: []
  type: TYPE_NORMAL
- en: 3. In the Style group, click Conditional Formatting.
  prefs: []
  type: TYPE_NORMAL
- en: 4. From the gallery that appears, select Highlight Cell Rules.
  prefs: []
  type: TYPE_NORMAL
- en: 5. From the menu, select a condition for the value in the cell or select More
    Rules.
  prefs: []
  type: TYPE_NORMAL
- en: 6. Specify a condition and cell shading.
  prefs: []
  type: TYPE_NORMAL
- en: 7. Click OK to apply the format.
  prefs: []
  type: TYPE_NORMAL
- en: Conditional Formatting Using Formula (Record-based Conditional Formatting)
  prefs: []
  type: TYPE_NORMAL
- en: To apply conditional formatting based on formulas, follow the steps below.
  prefs: []
  type: TYPE_NORMAL
- en: 1. Select the cells to which you want to apply the formatting.
  prefs: []
  type: TYPE_NORMAL
- en: 2. In the Style ribbon group, click Conditional Formatting.
  prefs: []
  type: TYPE_NORMAL
- en: 3. From the menu, select Conditional Formatting Rules Legend to open the Formatting
    Rules Legend dialog box.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Click New Rule to open the Add Formatting Rule dialog box.
  prefs: []
  type: TYPE_NORMAL
- en: 5. In the Select a Rule Type box, select Use a formula to determine which cells
    to format.
  prefs: []
  type: TYPE_NORMAL
- en: 6. In the Format Values Where This Formula is True box, enter a formula that
    evaluates a value to be True or False.
  prefs: []
  type: TYPE_NORMAL
- en: 7. Click Format to open the Format Cells dialog box, as shown in [Figure 10.2](#fig10-2).
  prefs: []
  type: TYPE_NORMAL
- en: 8. In the Format Cells dialog box, specify the format in which the cells satisfying
    the condition should appear, and click OK.
  prefs: []
  type: TYPE_NORMAL
- en: 9. Click OK to close the Add Formatting Rule dialog box.
  prefs: []
  type: TYPE_NORMAL
- en: 10. Click OK to close the Formatting Rules Legend dialog box and apply the format.
  prefs: []
  type: TYPE_NORMAL
- en: Note If the format needs to be applied to the entire database, select the database
    with or without the header before applying conditional formatting. The formula
    should be applied to the first row in the selection, however.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 10.2](#fig10-2) depicts the formula to highlight the records of everyone
    in the sales department if the selection is made along with the column headers.'
  prefs: []
  type: TYPE_NORMAL
- en: 'If we have selected the database without the header, and want to highlight
    the records of the person who earns the highest salary, we need to use the following
    formula:'
  prefs: []
  type: TYPE_NORMAL
- en: =$h2=max($H$2:$H$101)
  prefs: []
  type: TYPE_NORMAL
- en: Refer to [Figure 10.2](#fig10-2).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_10.2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10.2 New Formatting Rules
  prefs: []
  type: TYPE_NORMAL
- en: Icon Set
  prefs: []
  type: TYPE_NORMAL
- en: In Excel, you have access to more icon sets, including triangles, stars, and
    boxes. You can also mix and match icons from different sets and more easily hide
    icons from view. For example, you might choose to show icons only for high profit
    values and omit them for middle and lower values.
  prefs: []
  type: TYPE_NORMAL
- en: Formulas with Multiple Conditions
  prefs: []
  type: TYPE_NORMAL
- en: 'If we want to highlight only the Sales Department from the East region, we
    can change the formula by following these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Select the range without the heading.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Click on the Home tab.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Select Conditional Formatting.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Click on New Rule.
  prefs: []
  type: TYPE_NORMAL
- en: 5. Type the formula =AND($D2=”Sales”,$E2=”East”)
  prefs: []
  type: TYPE_NORMAL
- en: 6. Choose the desired format.
  prefs: []
  type: TYPE_NORMAL
- en: 7. Click OK to apply and close.
  prefs: []
  type: TYPE_NORMAL
- en: Apply a Conditional Formula Based on a Different Sheet’s Cell Reference
  prefs: []
  type: TYPE_NORMAL
- en: 'Suppose we want to highlight the records by using the cell reference of another
    sheet. In that case, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. Select the entire data without the heading.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Click on Home Tab | Conditional Formatting | Manage Rule.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Click on New Rule.
  prefs: []
  type: TYPE_NORMAL
- en: 4. Select the Rule types as Use a formula to determine which cell to format.
  prefs: []
  type: TYPE_NORMAL
- en: '5. In the Edit Rule description, type the formula as: =$D2=’cross sheet’!$B$'
  prefs: []
  type: TYPE_NORMAL
- en: 6. Choose the desired format.
  prefs: []
  type: TYPE_NORMAL
- en: 7. Click OK to apply and close the dialog box.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs: []
  type: TYPE_NORMAL
- en: In summary, conditional formatting in Excel is a valuable feature that allows
    us to apply formatting based on specific conditions. It helps us highlight important
    data, visualize trends, and enhance the presentation of our worksheets. By mastering
    conditional formatting techniques, we can make our data more visually appealing
    and gain valuable insights.
  prefs: []
  type: TYPE_NORMAL
- en: Exercises
