- en: 'Desired Output:'
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 所需输出：
- en: '*Generate a detailed list of recommended computer components, including links
    to purchase.*'
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: '*生成一份包括购买链接的推荐电脑组件的详细清单。*'
- en: 'Multi-Step Complex Task Prompt:'
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 多步骤复杂任务提示：
- en: 'Context:'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文：
- en: '*You are an entrepreneur planning to launch a sustainable fashion brand.*'
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: '*你是一位计划推出可持续时尚品牌的创业者。*'
- en: 'Assistant Role:'
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 助理角色：
- en: '*GPT Assistant, act as a business consultant.*'
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: '*GPT 助手，扮演商业顾问。*'
- en: 'Assistant Task:'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 助理任务：
- en: '*Outline a step-by-step business plan for establishing and marketing the brand.*'
