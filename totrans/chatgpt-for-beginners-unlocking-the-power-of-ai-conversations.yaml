  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 长篇文章、学术论文或报告可能会令人不知所措。ChatGPT将它们总结成简洁的摘要：
- en: '“****Summ**ariz**e ****t**he** ****k**ey** ****po**int**s ****o**f** ****th**is**
    ****art**icl**e: [****Pa**ste** ****te**xt** ****he**re**].”'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: “****总结这篇文章的关键点：[****粘贴文本****here**].”
- en: “****Wh**at** ****a**re** ****t**he** ****ma**in** ****th**eme**s ****o**f**
    ‘****Pr**ide** ****a**nd** ****Prej**udic**e’ ****b**y** ****Ja**ne** ****Au**ste**n?”
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
