- en: '**Introduction**'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Imagine having a virtual assistant that does not just remind you of appointments
    or send you weather updates, but one that writes essays, codes software, and even
    helps your business grow. And how would you feel if this virtual assistant could
    not only automate tasks, but also have conversations with you, generate ideas
    and emotional support, and even crack the occasional joke? Welcome to the future.
    It is called ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Let me share a story that captures my "wow" moment with ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: My daughter had just wrapped up a conference in Crete and found herself with
    a six-hour layover in Athens on her way back home. She called me up and asked,
    "Dad, I've got some time here in Athens. You've visited several times before.
    Do you think six hours is enough to explore the major highlights?"
  prefs: []
  type: TYPE_NORMAL
- en: Now, Athens is not just any city. As a cradle of Western civilization, it brims
    with historic landmarks. But only six hours? It seemed like a tall order.
  prefs: []
  type: TYPE_NORMAL
- en: This is where ChatGPT entered the picture. I asked it to identify Athens' must-see
    landmarks and rank them by importance. ChatGPT provided a tailored list based
    on my daughter's interests. Then I requested an optimal route to visit these sites
    efficiently. ChatGPT mapped out a walkable tour with time and distance estimates
    between each destination.
  prefs: []
  type: TYPE_NORMAL
- en: I sent my daughter the personalized itinerary. She quickly made her way to the
    city uptown using ChatGPT's suggested transportation. As she explored, we messaged
    updates, and she stayed right on schedule. A few hours later, things took an unexpected
    turn as rain disrupted the original plan.
  prefs: []
  type: TYPE_NORMAL
- en: No problem. I turned back to ChatGPT, adjusted for the new circumstances, and
    rapidly generated an alternate route. My daughter pivoted to the revised itinerary
    and made it back to catch her flight with time to spare, thanks to ChatGPT's real-time
    adaptations.
  prefs: []
  type: TYPE_NORMAL
- en: This experience captured ChatGPT's capabilities. It transformed a potential
    inconvenience into a mini adventure, overcoming obstacles and constraints despite
    my physical distance. Just imagine what it could do for you in many complex, time-pressuring
    situations that might arise.
  prefs: []
  type: TYPE_NORMAL
- en: The story sparked the idea for this book. The following pages will provide an
    overview of ChatGPT, how it operates, and most importantly, how you can harness
    AI technology to accomplish more with less. Less time, mental effort, and money.
    While we focus on ChatGPT specifically, the techniques covered will transfer to
    other similar AI applications known as Large Language Models.
  prefs: []
  type: TYPE_NORMAL
- en: The book begins by demystifying ChatGPT, the most advanced language model available
    today. We will outline its architecture and mechanics at a fundamental level.
    From there, we will guide you through the initial setup, decode tech jargon into
    straightforward steps, and explore the art of asking the right questions through
    effective "prompting."
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will introduce plugins that expand ChatGPT's capabilities, like browsing
    the web and connecting with external resources. We will also dive into ChatGPT's
    strengths and weaknesses across areas such as accuracy, reasoning, and limitations.
  prefs: []
  type: TYPE_NORMAL
- en: Much of the book focuses on real-world applications to supercharge productivity.
    We will provide a playbook for incorporating ChatGPT into your daily workflows.
    We will also cover more advanced use cases like data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: In the last chapter, we will have a look at the future of AI, upcoming trends,
    and how they might transform our everyday lives.
  prefs: []
  type: TYPE_NORMAL
- en: So, are you ready to change how you work and live with ChatGPT? There is no
    time like the present. Let's dive in and start exploring the possibilities! The
    future waits for no one!
  prefs: []
  type: TYPE_NORMAL
- en: '**1\. ChatGPT – Your New AI Assistant**'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**1.1 Overview**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Welcome to the future! Dive into the world of ChatGPT, the latest innovation
    capturing global attention! ChatGPT is not just any AI assistant; it is founded
    on the groundbreaking technology of Generative AI. This technology harnesses unstructured
    data (such as texts, images, and sounds) to discern intricate patterns, which
    it stores as statistical values. When prompted by a user via a simple interface
    (Figure 1.1), Generative AI leverages these patterns to generate new content,
    either text, sound, 2D images, or 3D objects. It is a harmonious fusion of art
    and science, underpinned by advanced algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: '![Picture5-CMYK.tif](../Images/Picture5-CMYK_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 1.1 ChatGPT user interface*'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT stands out as a unique application within the Generative AI domain.
    It is specifically designed for generating and processing text and is primed for
    conversational interaction. Such tools are broadly termed Large Language Models,
    or LLMs for short, and they evolve at an astonishing rate.
  prefs: []
  type: TYPE_NORMAL
- en: This book primarily delves into ChatGPT LLM and the DALL-E image generator,
    both luminaries in the world of Generative AI. ChatGPT was unveiled by OpenAI
    in November 2022\. Made freely available to the public, its reception was overwhelmingly
    positive, amassing one hundred million users in merely two months.
  prefs: []
  type: TYPE_NORMAL
- en: What makes Generative AI so transformative? It is the first technology that
    allows us to delegate tasks requiring human-like intelligence. This ushers in
    an era where machines not only execute predefined actions but also conceive original
    ideas, making informed decisions and sparking innovations.
  prefs: []
  type: TYPE_NORMAL
- en: '**1.2 Architecture**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To learn human talk patterns, ChatGPT reads a lot of text from books, websites,
    chats, encyclopedias, and other text resources. It keeps these patterns in a computer
    brain called a neural network. It is like a sponge soaking up tons of text. This
    learning stage helps it learn the words, the rules of grammar, and some facts
    about the world. As it learns how words and sentences are structured, it is able
    to predict how the sentence will continue. Then it goes through more training
    where it sees lots of questions and answers back-and-forth. This helps ChatGPT
    to improve its responses to questions (guessing word by word) in a way that "feels"
    more human. This part of the training is like having a teacher who gives detailed
    feedback.
  prefs: []
  type: TYPE_NORMAL
- en: How is this done?
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT is built on a blueprint called the Transformer Architecture^([1](#footnote-12755-1))
    (Figure 1.2). This architecture has two main components: an Encoder and a Decoder.
    The Encoder delves into the text input, analyzing and understanding the meaning
    of the words. A built-in mechanism, called "Attention"^([2](#footnote-12755-2))
    helps the Encoder focus on the proper parts of the text and empowers the language
    model to home in on pertinent parts of the input and to discern the relations
    between words and phrases:'
  prefs: []
  type: TYPE_NORMAL
- en: – The domain of discourse and context of the discussion,
  prefs: []
  type: TYPE_NORMAL
- en: – The position of words in the sentence, and
  prefs: []
  type: TYPE_NORMAL
- en: – The relation of every word to the other words in the sentence.
  prefs: []
  type: TYPE_NORMAL
- en: '![GlosarLipsa1.tif](../Images/GlosarLipsa1_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 1.2 Simplified representation of the interaction with a Language Model*'
  prefs: []
  type: TYPE_NORMAL
- en: Word position in a sentence is important, like the order of ingredients in a
    recipe. The relationship between words (weak or strong) is also important as it
    can change the meaning of the sentence. The Decoder has a record of words, grammar
    patterns, and authorial style acquired during training. It crafts responses based
    on these insights, mirroring the language patterns evident in your text input.^([3](#footnote-12755-3))
  prefs: []
  type: TYPE_NORMAL
- en: '**1.3 Capabilities**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ChatGPT's generative potential extends far beyond simple Q&As, making it a valuable
    tool for a plethora of creative and innovative tasks.
  prefs: []
  type: TYPE_NORMAL
- en: For writers, it serves as an ideation partner, suggesting story arcs, and character
    developments, and even crafting poetry or prose snippets.
  prefs: []
  type: TYPE_NORMAL
- en: Bloggers and journalists can leverage it for headline generation, lead paragraph
    optimization, or even for brainstorming article topics.
  prefs: []
  type: TYPE_NORMAL
- en: Teachers can utilize ChatGPT to create tailored lesson plans, exam questions,
    or inventive educational scenarios to engage students.
  prefs: []
  type: TYPE_NORMAL
- en: Researchers, on the other hand, can employ it to synthesize abstracts or summaries
    from dense academic texts.
  prefs: []
  type: TYPE_NORMAL
- en: Business professionals can harness its power for brainstorming sessions, generating
    product names, and taglines, or even formulating business strategies based on
    provided data.
  prefs: []
  type: TYPE_NORMAL
- en: Designers and artists are not left out either; with a textual prompt, ChatGPT
    proposes design concepts, art themes, or even music lyrics.
  prefs: []
  type: TYPE_NORMAL
- en: In coding and development, it aids in suggesting code snippets, debugging solutions,
    or proposing algorithmic structures.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, its ability to simulate diverse conversational styles makes it an
    ideal tool for scriptwriters, enabling drafting dialogues for plays, movies, or
    video games.
  prefs: []
  type: TYPE_NORMAL
- en: In essence, ChatGPT's generative prowess offers unparalleled versatility, transforming
    how professionals across sectors ideate, create, and innovate.
  prefs: []
  type: TYPE_NORMAL
- en: But, since language models learn from text and not real events, their knowledge
    is a mix of real and made-up stuff. They do not know the difference between right
    and wrong. They might sound like they understand, but they do not. They just give
    back text that fits the one we provide.
  prefs: []
  type: TYPE_NORMAL
- en: '**1.4 Limitations**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We, as humans, have invented a machine that mimics the way we talk. This is
    huge because text is still the primary form in which human experience, knowledge,
    and feedback are stored. And now, it seems we finally have access to machines
    with the ability to analyze, interpret, and generate language.
  prefs: []
  type: TYPE_NORMAL
- en: How cool is that? And how cool is to work with such a machine?
  prefs: []
  type: TYPE_NORMAL
- en: Before we go any further, it is time to discuss ChatGPT's temporary limitations.
  prefs: []
  type: TYPE_NORMAL
- en: Like all LLMs, ChatGPT does not truly "understand," or "reason," it does not
    really "process" information the way we, as humans, do. We train an LLM with vast
    amounts of textual data, but we give it no mechanism to distinguish between opinions
    and scientific facts expressed in those texts. Unlike humans, LLMs do not possess
    a consistent "worldview" or a definite "source of truth."
  prefs: []
  type: TYPE_NORMAL
- en: We can consider ChatGPT a storybook character, a "Keeper of Knowledge," who
    have read and now remembers tons of texts. It may suggest the books he have read,
    now summarizing them, answering questions, and acting like the characters from
    the books. However, he does not have access to those books anymore and most of
    the time, when discussing a subject, he combines ideas read in different writings,
    having difficulties remembering exactly which idea is from what book or even if
    the idea is an opinion or a real fact. So, we need to verify everything he says.
  prefs: []
  type: TYPE_NORMAL
- en: But the "Keeper of Knowledge" is still useful because he can pull out tiny details
    from a huge pile of information, finding links that even smart humans might miss.
    The trick of getting those hidden insights that even human experts might miss
    is to ask proper questions.
  prefs: []
  type: TYPE_NORMAL
- en: This book is about how to ask those questions, and how to talk to AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'When OpenAI introduced ChatGPT, its impact was profound. The nuanced, human-like
    interaction resonated with millions, echoing the dream of interactions like those
    with Commander Data from "Star Trek: The Next Generation" (Figure 1.3). The fluency
    of such LLMs might lead one to anticipate capabilities beyond mere language comprehension
    and generation. We might yearn for genuine reasoning, dynamic learning, and external
    resource access. However, linguistic prowess does not guarantee accuracy.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Technologies that mimic Commander Data would possess:'
  prefs: []
  type: TYPE_NORMAL
- en: – A comprehensive world model, equipped with learning dynamics,
  prefs: []
  type: TYPE_NORMAL
- en: – Capability for intelligent processes, inclusive of causal rules and algorithms,
    and
  prefs: []
  type: TYPE_NORMAL
- en: – Real-time access to diverse real-world data.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure_1.3.tif](../Images/Figure_1.3_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 1.3 Simplified representation of the use of language with AI reasoning
    machines. It is scientifically proven that language plays a role in thinking,
    although the exact relationship between language and thought is still a topic
    of debate*'
  prefs: []
  type: TYPE_NORMAL
- en: Yet, our current technology has not reached this zenith. LLMs, sophisticated
    as they are, primarily operate on numerical understanding, conducting statistical
    analysis on input text. Subsequent mathematical operations produce contextually
    relevant outputs. LLMs nowadays, including ChatGPT, remain tools rather than sentient
    entities like Commander Data (Figure 1.4).
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure_1.4.tif](../Images/Figure_1.4_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 1.4 Simplified representation of the use of language with a Language
    Model like ChatGPT*'
  prefs: []
  type: TYPE_NORMAL
- en: So why the predilection to anthropomorphize?
  prefs: []
  type: TYPE_NORMAL
- en: '"Humans are wired to anthropomorphize things. […] We''re ready to love and
    fear things that aren''t even alive." (Ben Sawyer, Psychology program professor
    at the University of Central Florida)'
  prefs: []
  type: TYPE_NORMAL
- en: It is imperative not to anthropomorphize machines, regardless of humanoid appearances.
    These devices do not "think" but "recite" learnings from their training, using
    statistics to determine apt responses.
  prefs: []
  type: TYPE_NORMAL
- en: All right then. Now we know that ChatGPT, the "Keeper of Knowledge," is a machine,
    not a human.
  prefs: []
  type: TYPE_NORMAL
- en: What is so appealing in ChatGPT?
  prefs: []
  type: TYPE_NORMAL
- en: Its prowess in illuminating connections across vast data sources is unique.
    The tool blends human-generated content seamlessly, revealing unexpected parallels
    between diverse human works. Such AI tools exemplify original social collaboration.
    And this is the real performance.
  prefs: []
  type: TYPE_NORMAL
- en: AI's tools we are building today have become an innovative form of social collaboration.
    Therefore, learning to work with AI is probably the highest leverage skill you
    can develop this decade.
  prefs: []
  type: TYPE_NORMAL
- en: In the end, this is what civilization is all about, a way of working together.
  prefs: []
  type: TYPE_NORMAL
- en: '![22_Close-up_portrait_of_a_Scottish_clan_leader.tif](../Images/22_Close-up_portrait_of_fmt.png)'
  prefs: []
  type: TYPE_IMG
