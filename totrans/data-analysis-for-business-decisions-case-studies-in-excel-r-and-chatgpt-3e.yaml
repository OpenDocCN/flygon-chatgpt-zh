- en: CHAPTER 8
  prefs: []
  type: TYPE_NORMAL
- en: SCATTERPLOTS
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg165.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'In this chapter, we discuss a business data analysis technique for comparing
    two continuous variables. This technique involves examining three columns in a
    data table, with one column representing a categorical variable and the other
    two columns representing related numerical values. We then use these two numerical
    variables to determine which category optimizes the other two. The question we
    will answer is as follows: “Which category performs the best along these two dimensions?”
    To aid in our decision-making, we utilize a powerful visualization technique called
    a 2X2 diagram. This diagram is a scatterplot where the coordinates of the “best”
    categories consistently appear in the upper right quadrant.'
  prefs: []
  type: TYPE_NORMAL
- en: When we are considering buying a car, we have various models and brands to choose
    from. These options can be considered as categories. To help us make the best
    choice, we have created a detailed table with many features for these different
    options. Then, we pick two numerical columns from the table, such as gas mileage
    and cost, to aid in our decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: We use these two columns to create a scatterplot, with gas mileage on the x-axis
    and cost on the y-axis. Each data point on the graph is labeled with the corresponding
    category or brand. To make the decision-making process easier, we manipulate the
    display and ensure that the cost variable is plotted in reverse order. This way,
    lower cost is displayed in the upper right-hand quadrant of the plot, making it
    easier to identify the “best” choices.
  prefs: []
  type: TYPE_NORMAL
- en: 'This approach addresses the following business question: “What are the optimal
    choices?” Scatterplots are fundamental graphical tools in data analysis, used
    to visualize the relationship between two continuous variables. These plots display
    individual data points on a two-dimensional graph, with each axis representing
    one of the variables. The resulting pattern of points can reveal important insights
    about the nature and strength of the relationship between the variables.'
  prefs: []
  type: TYPE_NORMAL
- en: Scatterplots
  prefs: []
  type: TYPE_NORMAL
- en: What are Scatterplots?
  prefs: []
  type: TYPE_NORMAL
- en: Scatterplots are a type of data visualization that display the relationship
    between two numerical variables. Each point on the scatterplot represents an observation
    from the dataset, with the position determined by the values of the two variables.
    The x-axis represents one variable, and the y-axis represents the other. Scatterplots
    are particularly useful for identifying patterns or trends in data, such as correlations
    or clusters. By visually depicting how one variable relates to another, scatterplots
    can suggest the nature of the relationship, whether it is positive, negative,
    or non-existent.
  prefs: []
  type: TYPE_NORMAL
- en: In data analysis, scatterplots serve multiple crucial functions. First, they
    allow researchers to identify patterns or trends in the data, such as linear relationships,
    curvilinear patterns, or clusters. This visual representation can quickly highlight
    whether variables are positively correlated, negatively correlated, or show no
    apparent relationship.
  prefs: []
  type: TYPE_NORMAL
- en: Second, scatterplots help in detecting outliers or anomalous data points that
    deviate significantly from the overall pattern. These outliers may represent errors
    in data collection, unique cases worthy of further investigation, or indicators
    of complex underlying phenomena.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, scatterplots are invaluable in assessing the appropriateness of
    various statistical models. For instance, the shape of a scatterplot can suggest
    whether a linear regression model is suitable or if more complex models are needed.
  prefs: []
  type: TYPE_NORMAL
- en: In exploratory data analysis, scatterplots often serve as a starting point,
    guiding researchers toward more sophisticated analytical techniques. They can
    also be enhanced with additional features like color coding, size variations,
    or trend lines to represent extra dimensions of data, making them powerful tools
    for communicating complex relationships in an intuitive visual format.
  prefs: []
  type: TYPE_NORMAL
- en: One of the strengths of scatterplots is their ability to reveal correlations
    between variables. If the points on the scatterplot tend to rise together, it
    suggests a positive correlation; if one variable increases as the other decreases,
    it implies a negative correlation. However, it is important to note that correlation
    does not imply causation; scatterplots can indicate a relationship but not whether
    one variable causes the change in another. Scatterplots can also show the strength
    and direction of the relationship, with tighter clustering of points indicating
    a stronger relationship. They are invaluable in fields like statistics, economics,
    and the natural sciences, where understanding relationships between variables
    is crucial.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to identifying correlations, scatterplots can also be used to detect
    outliers or unusual observations in data. Points that fall far from the main cluster
    can indicate anomalies that may warrant further investigation. Furthermore, scatterplots
    can be enhanced with trend lines or curves that mathematically describe the relationship
    between the variables. These enhancements make scatterplots a versatile tool,
    not just for exploratory data analysis but also for presenting findings in a clear,
    visually appealing manner. They are an essential component of any data analyst’s
    toolkit, providing a straightforward yet powerful means of understanding and communicating
    the relationships within data.
  prefs: []
  type: TYPE_NORMAL
- en: What Are the Elements of Scatterplots?
  prefs: []
  type: TYPE_NORMAL
- en: 'Scatterplots are composed of several important elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1.**Data points: These are the most fundamental components of a scatterplot,
    and each data point represents an individual observation in the dataset. The position
    of a data point on the plot corresponds to the values of two variables, with one
    plotted along the x-axis and the other along the y-axis.'
  prefs: []
  type: TYPE_NORMAL
- en: '**2.**Axes: Scatterplots have two axes, the horizontal (x-axis) and the vertical
    (y-axis). Each axis represents a different variable from the dataset. The scale
    and range of these axes must be carefully selected to accurately reflect the data.'
  prefs: []
  type: TYPE_NORMAL
- en: '**3.**Labels and title: Clear labels for the x-axis and y-axis are crucial
    for interpreting a scatterplot. They indicate what each axis represents. Additionally,
    a descriptive title helps to contextualize the data and the relationship it is
    showing.'
  prefs: []
  type: TYPE_NORMAL
- en: '**4.**Scale and units: The scale (the range of values) and the units of measurement
    used on both axes are critical for interpreting the scatterplot correctly. These
    should be chosen based on the data range and the level of detail required for
    the analysis.'
  prefs: []
  type: TYPE_NORMAL
- en: '**5.**Trend line (optional): Often, a trend line (or line of best fit) is added
    to a scatterplot to indicate the overall direction or pattern of the data. This
    can help in identifying the nature of the relationship between the variables,
    such as linear, quadratic, or no correlation.'
  prefs: []
  type: TYPE_NORMAL
- en: '**6.**Grid lines (optional): Grid lines can be added to a scatterplot to make
    it easier to determine the values of individual data points relative to the axes.'
  prefs: []
  type: TYPE_NORMAL
- en: '**7.**Color and markers: Different colors or styles of markers can be used
    to represent different categories or groups within the data, making it easier
    to compare and contrast different subsets.'
  prefs: []
  type: TYPE_NORMAL
- en: '**8.**Annotations and text (optional): Annotations or additional text can be
    used to highlight specific points, provide explanations, or add context to the
    data being presented.'
  prefs: []
  type: TYPE_NORMAL
- en: An Example of Creating Scatterplots for a Dataset
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 8.1](#fig8-1) shows an example of a scatterplot for the Companies.xlsx
    dataset found in the Case Data folder.'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg170.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 8.1 Example of a scatterplot showing the distribution associated with
    sales and profit per employe
  prefs: []
  type: TYPE_NORMAL
- en: In this example from the Companies’ dataset, we use a scatterplot ([Figure 8.1](#fig8-1))
    to explore the relationship between Sales and Profit per Employee, illustrating
    an application of scatterplots in data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Each point on the scatterplot represents a company, with its Sales value on
    the x-axis and its Profit per Employee value on the y-axis. The spread of these
    points helps us understand how these two variables are related. For instance,
    if points are higher on the y-axis for higher x-axis values, it suggests that
    companies with higher sales might also have higher profits per employee. This
    visual pattern can be crucial for insights showing whether larger sales figures
    are associated with greater efficiency in terms of profit per employee.
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 8.1: Scatterplots and 2x2 for “The Best” Analysis'
  prefs: []
  type: TYPE_NORMAL
- en: Which Are the “Best”?
  prefs: []
  type: TYPE_NORMAL
- en: A 2x2 scatterplot matrix is a powerful decision support tool that displays four
    related scatterplots in a grid format. Each plot represents the relationship between
    two variables, allowing for simultaneous comparison of multiple variable pairs.
    This arrangement is particularly useful for identifying complex relationships
    and patterns across different dimensions of data.
  prefs: []
  type: TYPE_NORMAL
- en: In decision-making contexts, 2x2 scatterplots can reveal correlations, clusters,
    or trends that might not be apparent when examining variables in isolation. They
    enable decision-makers to quickly assess trade-offs, identify optimal solutions,
    and spot anomalies. By visualizing multiple relationships at once, these plots
    facilitate a more comprehensive understanding of the data, supporting informed
    and data-driven decisions in various fields such as business strategy, product
    development, and resource allocation.
  prefs: []
  type: TYPE_NORMAL
- en: The 2x2 scatterplots aid in identifying “best” options by visually highlighting
    data points that Excel has across multiple criteria. By plotting different performance
    measures against each other, decision-makers can quickly spot items in the top-right
    quadrant, representing superior performance on both axes. This visual approach
    simplifies complex comparisons, enabling efficient identification of top performers
    or optimal choices.
  prefs: []
  type: TYPE_NORMAL
- en: Analysis with Excel
