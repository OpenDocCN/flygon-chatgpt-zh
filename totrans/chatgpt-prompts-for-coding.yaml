  id: totrans-1413
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写Python代码以解决一个常见的位操作问题：在一个数组中找到只出现一次的数字。包括如何使用XOR高效解决这个问题。"'
- en: '13: Solving Matrix Problems'
  id: totrans-1414
  prefs: []
  type: TYPE_NORMAL
  zh: '13: 解决矩阵问题'
- en: 'Prompt:'
  id: totrans-1415
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write Python code to rotate a matrix 90 degrees clockwise in place. Include
