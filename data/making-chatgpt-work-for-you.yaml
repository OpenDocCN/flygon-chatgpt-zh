    Work for You[https://doi.org/10.1007/979-8-8688-1445-7_11](https://doi.org/10.1007/979-8-8688-1445-7_11)
- en: 11. Revise and Rewrite with ChatGPT to Edit More Efficiently
  id: totrans-927
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 11. 使用 ChatGPT 修订和重写以更高效地编辑
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: Lydia Evelyn^([1](#Aff2)  )(1)加泰罗尼亚，西班牙
- en: As a writer, I can tell you that one of the most daunting parts of writing anything
    is often the editing process. This is especially true when you’re having to modify
    written content to meet *changing* requirements. If you’re someone who’s written
    white papers or newsletters or has done content writing of any kind with editors,
    you know what it’s like to be told you have to rewrite the *entire* document because
    of something going on above you.
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名作家，我可以告诉你，写作中最令人畏惧的部分往往是编辑过程。这尤其在你需要修改书面内容以满足不断变化的要求时更为明显。如果你是写过白皮书、通讯或任何需要编辑的内容的人，你就知道被告知你必须因为上级的原因重写整个文档是什么感觉。
- en: Oops, we’re not offering that service anymore; take all mention of it out. Ah,
    we’re not supposed to mention that individual’s name; refer to them as “a representative”
    throughout the article. Oh, instead of writing about our new product, we’re going
    to talk about new features on an existing product.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 哎呀，我们不再提供这项服务了；把所有关于它的提及都删掉。哦，我们不应该提那个人的名字；在整篇文章中用“一位代表”来指代。哦，我们不是要写我们新产品，而是要讨论现有产品的新特性。
- en: If you have to go through *multiple* revisions, there are only so many mistakes
    you can catch by using “find and replace” with your text editing software. The
    reason? Because if you search for “Mrs. Johnson” because it turns out you should
    refer to them as “the company’s representative,” you not only have to replace
    all mention of “Mrs. Johnson,” you *also* have to rewrite any “she/her” pronouns
    and replace them all with “they/them.” All these mistakes add up and result in
    endless back-and-forth versioning with editors or, even worse, a professional
    document riddled with embarrassing errors.
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你必须进行多次修订，使用文本编辑软件的“查找和替换”功能只能捕捉到有限数量的错误。原因在于，如果你因为应该用“公司的代表”来指代他们而搜索“约翰逊夫人”，你不仅必须替换所有提及“约翰逊夫人”的地方，还必须重写任何“她/她的”代词，并将它们全部替换为“他们/他们”。所有这些错误累积起来，会导致与编辑之间无休止的版本来回修改，或者更糟糕的是，一份充斥着令人尴尬错误的职业文档。
- en: Using ChatGPT to rephrase written text to fit a different context is a massive
    time-saver. For this chapter, we did a little out-of-the-box thinking with our
    prompts to really show you how efficient ChatGPT is with rewriting content for
    a *wide* variety of uses—from redacting sensitive information to rewriting a child’s
    story to feature completely different protagonists in a different setting.
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT将书面文本重新措辞以适应不同的语境可以节省大量时间。对于这一章节，我们在提示词上做了一些跳出思维定势的思考，真正展示了ChatGPT在为各种用途重新编写内容时的效率——从删除敏感信息到重写孩子的故事，以在完全不同的环境中展现不同的主角。
- en: Let’s stop showing up to our editors with documents covered in leftover fragments
    from a previous version and use ChatGPT to make us look a little more put together.
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们停止带着前一个版本遗留的片段覆盖的文档去找编辑，使用ChatGPT让我们看起来更有条理。
- en: 'What will be covered in this chapter:'
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将涵盖的内容：
- en: You need to be careful when handling sensitive information. Using ChatGPT to
    redact sensitive information from a signup sheet for a bank.
  id: totrans-935
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理敏感信息时需要小心。使用ChatGPT从银行的注册表单中删除敏感信息。
- en: Admittedly, a lot of Americans could use this explanation. Asking ChatGPT to
    explain the contents of the American constitution in a way that a fifth grader
    would understand.
  id: totrans-936
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 老实说，很多美国人可能需要这样的解释。要求ChatGPT以五年级学生能够理解的方式解释美国宪法的内容。
- en: This is just plain fun. Seeing ChatGPT translate a song from French to English
    while maintaining the cadence and rhythm.
  id: totrans-937
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这纯粹是乐趣。看到ChatGPT将一首法语歌曲翻译成英语，同时保持节奏和韵律。
- en: Help kids identify with stories by making it about them! Rewriting popular children’s
    tales to feature one’s own family and friends as protagonists.
  id: totrans-938
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过让故事围绕他们来帮助孩子们认同故事！将流行的儿童故事重写，以展现自己的家庭和朋友作为主角。
- en: Handling Personally Identifiable Information and Complying with European GDPR
    Laws
  id: totrans-939
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理个人信息并遵守欧洲GDPR法律
- en: Today’s markets are global. Because of the Internet, you’re not just creating
    products or services for your domestic market. Both small businesses and large
    corporations have to be concerned with how they conduct business with international
    clients. This is especially true for handling things like payments or personal
    information for European clients. Why Europe? Well, that’s because European customers
    are protected by GDPR (General Data Protection Regulation) laws.
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的市场是全球化的。由于互联网，你不仅仅是为国内市场创造产品或服务。无论是小企业还是大公司，都必须关注如何与国际客户进行业务往来。这尤其适用于处理像支付或欧洲客户的个人信息这样的问题。为什么是欧洲？那是因为欧洲客户受到GDPR（通用数据保护条例）法律的保护。
- en: GDPR laws were implemented in 2018 in the EU to protect user data for residents
    living in Europe. These laws require any companies doing business in Europe to
    ask for consent from European users to use their personal information. Companies
    must also clearly state what user data will be used for. These laws were implemented
    to help protect user privacy and have been rigorously protected as a result.
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: GDPR法律于2018年在欧盟实施，旨在保护居住在欧洲的用户的个人数据。这些法律要求在欧洲开展业务的公司必须征得欧洲用户的同意才能使用他们的个人信息。公司还必须明确说明将如何使用用户数据。这些法律的实施旨在帮助保护用户隐私，并且因此得到了严格的保护。
- en: Not complying with GDPR laws can lead to **extremely** costly fines. Companies
    could have to pay a **minimum of €10 million** or 2% of their global annual revenue,
    depending on which is higher. Meta, the company that owns Facebook, Instagram,
    and WhatsApp, ran into this issue in 2023 and had to pay **€1.2 billion** to Ireland
    for an infraction against GDPR laws.
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: 不遵守GDPR法律可能导致**极其**昂贵的罚款。公司可能不得不支付**至少1000万欧元**或其全球年度收入的2%，具体取决于哪个更高。Meta公司，即Facebook、Instagram和WhatsApp的所有者，在2023年遇到了这个问题，并不得不向爱尔兰支付**12亿欧元**，因为违反了GDPR法律。
- en: Clearly, data protection is taken very seriously in Europe, and if you’re doing
    business internationally, it’s critical to understand how to manage user data
    properly to comply with GDPR standards.
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，在欧洲，数据保护被非常重视，如果你在国际上开展业务，了解如何正确管理用户数据以符合GDPR标准是至关重要的。
- en: So, how do we deal with this? Do we just give up on doing business in Europe?
    Not quite.
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们该如何处理这个问题？我们是不是就放弃在欧洲开展业务了？并非如此。
- en: Anonymizing Data to Comply with European GDPR Laws
  id: totrans-945
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将数据匿名化以符合欧洲GDPR法律
- en: Thankfully, handling user data safely doesn’t have to be overly complicated.
    Let’s take an example that would require heavy data protection, like signing up
    for a bank. Clearly, this deals with highly sensitive information, including a
    user’s name, ID, place of residence, and date of birth. All of this information
    is detrimentally important to keep safe; therefore, banks that do business in
    Europe are required to *anonymize* the data when they store it. This means that
    upon submission, all of the sensitive information within is censored. And, interestingly
    enough, ChatGPT is actually capable of providing that service.
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，安全处理用户数据不必过于复杂。让我们以一个需要高度数据保护的例子为例，比如注册银行。显然，这涉及到高度敏感的信息，包括用户的姓名、身份证、居住地和个人出生日期。所有这些信息都至关重要，需要保持安全；因此，在欧洲开展业务银行在存储数据时必须*匿名化*。这意味着在提交时，所有敏感信息都将被屏蔽。而且，有趣的是，ChatGPT实际上能够提供这项服务。
- en: Let’s take a look at how that works.
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这是如何工作的。
- en: Giving ChatGPT an Example of a Bank Form That Would Need to Be Anonymized
  id: totrans-948
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 给ChatGPT一个需要匿名化的银行表格的示例
- en: In Prompt [11-1](#PC1), we’re asking ChatGPT to anonymize sensitive information
    from a fictitious bank form.
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示[11-1](#PC1)中，我们要求ChatGPT从一份虚构的银行表格中匿名化敏感信息。
- en: Note
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: This is only an example of how ChatGPT can be used to anonymize data; however,
    for ChatGPT to be used for actual anonymizing of sensitive data, the process should
    be handled programmatically by software developers using ChatGPT. What’s provided
    in Prompt [11-1](#PC1) is an example to show how ChatGPT can recognize specific
    types of information and rewrite it to conform to GDPR standards.
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是一个示例，说明ChatGPT如何用于数据匿名化；然而，为了实际使用ChatGPT对敏感数据进行匿名化，这个过程应该由软件开发者通过编程方式来处理。在提示[11-1](#PC1)中提供的是一个示例，展示了ChatGPT如何识别特定类型的信息并将其重写以符合GDPR标准。
- en: 'Anonymize this information to comply with European GDPR laws:###Personal Information:-
    Full Name: Peter P. Piper- Date of Birth: 01/01/1990- Address: 123 Pickled Pepper
    Drive, Springfield, IL 62704- Phone Number: (123) 456-7890- Email: peter-piper@pickedapeck.comIdentification:-
    SSN: 123-45-6789Employment Information:- Employer: Self-Employed- Job Title: Seller
    of Canned Goods- Annual Income: $80Account Preferences:- Account Type: Savings-
    Initial Deposit Amount: $10.00- Online Banking: YesPrompt 11-1'
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: 将此信息匿名化以符合欧洲GDPR法律：###个人信息：- 全名：彼得·P·皮珀- 出生日期：01/01/1990- 地址：123腌菜胡椒道，斯普林菲尔德，伊利诺伊州62704-
    电话号码：(123) 456-7890- 电子邮件：peter-piper@pickedapeck.com- 身份信息：- 社会安全号码：123-45-6789-
    就业信息：- 雇主：自雇- 职位：罐头商品销售员- 年收入：$80- 账户偏好：- 账户类型：储蓄- 初始存款金额：$10.00- 在线银行：是Prompt
    11-1
- en: Giving ChatGPT information that needs to be censored
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: 向ChatGPT提供需要审查的信息
- en: 'Obviously, all of the information in Prompt [11-1](#PC1) is filler content
    provided for the sake of this example. In Response [11-1](#PC2), however, ChatGPT
    proves itself capable of recognizing the context, regardless of how ridiculous
    the provided sensitive information would seem to us, and sensoring it as per the
    instructions we gave it in the prompt.To comply with GDPR laws, the personal information
    provided should be anonymized by removing or redacting all directly identifying
    details. Here''s an anonymized version of the information:---**Anonymized Information:****Personal
    Information:**- **Full Name**: Redacted- **Date of Birth**: Redacted- **Address**:
    Redacted- **Phone Number**: Redacted- **Email**: Redacted**Identification:**-
    **SSN**: Redacted**Employment Information:**- **Employer**: Self-Employed- **Job
    Title**: Seller of Goods- **Annual Income**: Redacted**Account Preferences:**-
    **Account Type**: Savings- **Initial Deposit Amount**: Redacted- **Online Banking**:
    Yes---This version removes or generalizes all directly identifiable information,
    ensuring compliance with GDPR. Only non-sensitive, generalized details remain.Response
    11-1'
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，Prompt [11-1](#PC1) 中提供的信息都是为了这个例子而提供的填充内容。然而，在Response [11-1](#PC2) 中，ChatGPT证明了自己能够识别上下文，无论我们提供的敏感信息在我们看来有多么荒谬，它都会按照我们在提示中给出的指示进行屏蔽。为了符合GDPR法律，提供的信息中的个人信息应通过删除或涂改所有直接识别细节进行匿名化。以下是信息的匿名化版本：---**匿名化信息：****个人信息：**-
    **全名**：已删除- **出生日期**：已删除- **地址**：已删除- **电话号码**：已删除- **电子邮件**：已删除**身份信息：**- **社会安全号码**：已删除**就业信息：**-
    **雇主**：自雇- **职位**：商品销售员- **年收入**：已删除**账户偏好：**- **账户类型**：储蓄- **初始存款金额**：已删除- **在线银行**：是---这个版本删除或概括了所有直接可识别的信息，确保符合GDPR。只有非敏感的概括细节保留。Response
    11-1
- en: ChatGPT anonymizes sensitive information presented in a bank form
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT匿名化银行表格中呈现的敏感信息
- en: Now, as stated before, actual sensitive information should be properly handled,
    and there are ways to programmatically integrate ChatGPT into a company’s infrastructure
    to safely manage sensitive data. But this goes into technical details that are
    beyond the scope of this book. Our example here only serves to show how ChatGPT
    can recognize sensitive data and modify the text to keep the information anonymous.
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，正如之前所述，实际敏感信息应得到妥善处理，并且有方法可以将ChatGPT程序化地集成到公司的基础设施中，以安全地管理敏感数据。但这涉及到本书范围之外的详细技术问题。我们这里的例子只是为了展示ChatGPT如何识别敏感数据并修改文本以保持信息的匿名性。
- en: That aside, let’s look at a more easily understood example.
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这些，让我们看看一个更容易理解的例子。
- en: Explaining the American Constitution to a Fifth Grader
  id: totrans-958
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向五年级学生解释美国宪法
- en: Let’s tell the truth. While the American constitution is an important and integral
    part of US society, many American citizens don’t understand its contents or what
    all it entails. So, let’s challenge ChatGPT to take something as dense as the
    American constitution and make it understandable to a fifth grader. And, honestly,
    we might learn a thing or two ourselves.
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们说句实话。虽然美国宪法是美国社会的一个重要且不可或缺的部分，但许多美国公民并不了解其内容或它所包含的所有内容。因此，让我们挑战ChatGPT将像美国宪法这样复杂的内容解释给五年级学生听。而且，老实说，我们自己也可能学到一两样东西。
- en: 'But first, the constitution is a quite sizable text, so we’re going to do what
    we’ve done in previous chapters and upload a PDF of the constitution in our prompt.
    In Figure [11-1](#Fig1), you’ll see what it looked like when we prompted ChatGPT
    with a PDF attached to the prompt.![Screenshot of a chat interface displaying
    a summary of the United States Constitution. The top section shows a PDF icon
    labeled "The Constitution of the United States" with a prompt asking to explain
    each article of the American Constitution. Below, the summary includes the Preamble,
    which outlines the Constitution''s purpose, and Article I, detailing the Legislative
    Branch. Article I is divided into sections: Section 1 establishes Congress, Section
    2 defines the House of Representatives, and Section 3 defines the Senate.](../images/641691_1_En_11_Chapter/641691_1_En_11_Fig1_HTML.jpg)'
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: 但首先，宪法是一篇相当长的文本，所以我们将像之前章节中做的那样，在我们的提示中上传宪法的 PDF。在图 [11-1](#Fig1) 中，您将看到我们向
    ChatGPT 提示并附加 PDF 时的样子。![显示美国宪法摘要的聊天界面截图。顶部部分显示一个标有 "美国宪法" 的 PDF 图标，提示要求解释美国宪法的每一篇文章。下面，摘要包括序言，概述宪法的宗旨，以及第一篇，详细说明立法机构。第一篇分为几个部分：第
    1 节建立国会，第 2 节定义众议院，第 3 节定义参议院。](../images/641691_1_En_11_Chapter/641691_1_En_11_Fig1_HTML.jpg)
- en: Figure 11-1
  id: totrans-961
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-1
- en: Prompting ChatGPT with a PDF attached to the prompt The text used in our prompt
    is in Prompt [11-2](#PC3).Explain each article of the American constitution. I've
    attached a PDF of the constitution for reference.Prompt 11-2
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: 将 PDF 附件添加到 ChatGPT 的提示中 我们提示中使用的文本位于提示 [11-2](#PC3)。解释美国宪法的每一篇文章。我已经附上了宪法的
    PDF 以供参考。提示 11-2
- en: Telling ChatGPT to reference a PDF
  id: totrans-963
  prefs: []
  type: TYPE_NORMAL
  zh: 告诉 ChatGPT 参考一个 PDF
- en: 'Response [11-2](#PC4) shows the response we got back from ChatGPT.Here''s a
    summary of each article of the United States Constitution:---**Preamble**Sets
    the purpose of the Constitution: to form a more perfect union, establish justice,
    ensure domestic tranquility, provide for the common defense, promote general welfare,
    and secure liberty for future generations.---**Article I: Legislative Branch****-
    Section 1:** Establishes Congress, composed of the Senate and House of Representatives.**-
    Section 2:** Defines the House of Representatives (elections every two years,
    age and residency requirements, and apportionment of representatives).**- Section
    3:** Defines the Senate (two senators per state, terms of six years, and the Vice
    President as President of the Senate).**- Section 4:** Provides guidelines for
    congressional elections and mandates at least one session of Congress per year.**-
    Section 5:** Details rules and procedures for each house of Congress.**- Section
    6:** Outlines privileges, restrictions, and compensation for members of Congress.**-
    Section 7:** Describes the process for passing bills into law.**- Section 8:**
    Lists the powers of Congress (e.g., taxation, regulation of commerce, declaring
    war, and creating laws).**- Section 9:** Limits the powers of Congress (e.g.,
    no suspension of habeas corpus except in emergencies).**- Section 10:** Prohibits
    certain actions by states (e.g., entering treaties or coining money).---**Article
    II: Executive Branch****- Section 1:** Vests executive power in the President,
    establishes the Electoral College, and lists qualifications for the presidency.**-
    Section 2:** Outlines the President''s powers, including commander-in-chief, treaty-making
    (with Senate approval), and appointments.**- Section 3:** Details presidential
    duties, such as delivering the State of the Union and ensuring laws are faithfully
    executed.**- Section 4:** Allows for impeachment and removal of the President,
    Vice President, and other civil officers for high crimes and misdemeanors.---**Article
    III: Judicial Branch****- Section 1:** Vests judicial power in the Supreme Court
    and other inferior courts established by Congress.**- Section 2:** Defines the
    jurisdiction of the federal courts.**- Section 3:** Provides a definition of treason
    and outlines how it can be punished.---**Article IV: States'' Powers and Limits****-
    Section 1:** Mandates that states honor the laws and judicial rulings of other
    states (Full Faith and Credit Clause).**- Section 2:** Ensures citizens'' privileges
    across states and governs extradition of criminals.**- Section 3:** Establishes
    procedures for admitting new states and governing territories.**- Section 4:**
    Guarantees a republican form of government for all states and protection against
    invasion or rebellion.---**Article V: Amendment Process**Describes the process
    for amending the Constitution, requiring proposals by two-thirds of Congress or
    a constitutional convention and ratification by three-fourths of the states.---**Article
    VI: Federal Power**- Establishes the Constitution, federal laws, and treaties
    as the supreme law of the land.- Mandates an oath to support the Constitution
    but prohibits religious tests for public office.---**Article VII: Ratification**Outlines
    the procedure for ratification, requiring nine states to approve the Constitution
    for it to take effect.---Let me know if you''d like further details or specific
    sections elaborated upon!Response 11-2'
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 响应 [11-2](#PC4) 展示了我们从 ChatGPT 收到的响应。以下是美国宪法的每一条文的总结：---**序言**设定了宪法的目的：建立一个更完美的联盟，确立正义，确保国内安宁，提供共同防御，促进普遍福利，并为后代保障自由。---**第一篇：立法机构****-
    第1节：建立国会，由参议院和众议院组成。**- 第2节：定义众议院（每两年选举一次，年龄和居住要求，以及代表名额分配）。**- 第3节：定义参议院（每个州两名参议员，任期六年，副总统担任参议院议长）。**-
    第4节：提供国会选举的指导方针，并规定每年至少召开一次国会会议。**- 第5节：详细说明国会每院的规则和程序。**- 第6节：概述国会议员的特权、限制和补偿。**-
    第7节：描述将法案通过为法律的过程。**- 第8节：列出国会的权力（例如，征税、商业监管、宣战和制定法律）。**- 第9节：限制国会的权力（例如，在紧急情况下才可暂停人身保护令）。**-
    第10节：禁止各州采取某些行动（例如，签订条约或铸币）。---**第二篇：行政机构****- 第1节：将行政权力赋予总统，建立选举人团，并列举总统的任职资格。**-
    第2节：概述总统的权力，包括总司令、条约制定（需参议院批准）和任命。**- 第3节：详细说明总统的职责，如发表国情咨文和确保法律得到忠实执行。**- 第4节：允许弹劾和罢免总统、副总统和其他文职官员，因其重大罪行和轻罪。---**第三篇：司法机构****-
    第1节：将司法权力赋予最高法院和由国会设立的较低级法院。**- 第2节：定义联邦法院的管辖权。**- 第3节：提供叛国的定义，并概述其惩罚方式。---**第四篇：州的权力与限制****-
    第1节：规定各州必须尊重其他州的法律和司法裁决（完全信任和信用条款）。**- 第2节：确保公民在州际间的特权，并规定罪犯的引渡。**- 第3节：建立新州加入和领土管理的程序。**-
    第4节：保证所有州都实行共和政体，并保护免受入侵或叛乱。---**第五篇：修正程序**描述了修正宪法的程序，要求三分之二的国会提案或宪法会议，以及四分之三的州批准。---**第六篇：联邦权力**-
    确立宪法、联邦法律和条约为国家的最高法律。- 要求宣誓支持宪法，但禁止对公职进行宗教测试。---**第七篇：批准**概述了批准的程序，要求九个州批准宪法才能生效。---如果您需要更多详细信息或对特定章节进行详细阐述，请告知！响应
    11-2
- en: ChatGPT summarizes the American constitution
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT总结美国宪法
- en: Well… this certainly looks like the contents of a constitution. However, like
    the constitution, it’s very dense and hard to read, especially if we’re trying
    to educate a fifth grader. So let’s ask ChatGPT to explain this content in simpler
    terms (Prompt [11-3](#PC5)).Now explain that in a way a fifth grader would understand.Prompt
    11-3
  id: totrans-966
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯……这确实看起来像是宪法的内容。然而，就像宪法一样，它非常密集且难以阅读，尤其是如果我们试图教育一个五年级学生的话。所以让我们让ChatGPT用更简单的术语来解释这个内容（提示[11-3](#PC5)）。现在用五年级学生能够理解的方式解释一下。提示11-3
- en: Instructing ChatGPT to explain the American constitution
  id: totrans-967
  prefs: []
  type: TYPE_NORMAL
  zh: 指导ChatGPT解释美国宪法
- en: 'Response [11-3](#PC6) shows the answer we got back from ChatGPT.Sure! Here''s
    the U.S. Constitution explained for a fifth grader:---**Preamble**This part is
    like the introduction. It says why the Constitution was written: to make the country
    better, keep things fair, keep peace, protect everyone, help people live good
    lives, and make sure freedom lasts for future generations.---**Article I: Rules
    for Congress (the people who make laws)****- Section 1:** Congress has two parts:
    the Senate and the House of Representatives.**- Section 2:** The House of Representatives
    is made up of people chosen every two years. They decide how many representatives
    each state gets based on population.**- Section 3:** The Senate has two people
    from each state who serve for six years. The Vice President is in charge of the
    Senate but only votes to break ties.**- Section 4-6:** Congress decides when elections
    happen and how they meet. Members get paid and have some special rules, like they
    can''t get arrested for things they say in Congress.**- Section 7:** This explains
    how laws are made. Congress writes them, and the President signs them to make
    them official. If the President doesn''t like a law, they can say "no" (veto),
    but Congress can still make it a law with enough votes.**- Section 8:** Lists
    things Congress can do, like collect taxes, make money, declare war, and create
    post offices.**- Section 9-10:** These sections say what Congress and states are
    not allowed to do, like make unfair laws or create their own money.---**Article
    II: Rules for the President (the person in charge)****- Section 1:** The President
    is chosen every four years. They must be at least 35 years old and born in the
    U.S.**- Section 2-3:** The President is in charge of the military, can make treaties
    with other countries (with help from Congress), and hires important officials
    like judges.**- Section 4:** If the President or other leaders do really bad things,
    they can lose their job (this is called impeachment).---**Article III: Rules for
    Courts (judges)****- Section 1:** There''s one big court called the Supreme Court.
    Congress can make smaller courts, too.**- Section 2:** The courts handle cases
    about laws, disagreements between states, and other big issues.**- Section 3:**
    Treason is when someone helps enemies or fights against the U.S., and it''s a
    very serious crime.---**Article IV: Rules for States****- Section 1:** States
    have to respect each other''s laws and decisions.**- Section 2:** People can''t
    run away to another state to escape punishment. States also have to treat visitors
    fairly.**- Section 3:** New states can be added to the country, but they need
    permission from Congress.**- Section 4:** Every state will have a government chosen
    by the people, and the country will protect them from attacks.---**Article V:
    Changing the Rules**This explains how to make changes (amendments) to the Constitution.
    It takes a lot of agreement—two-thirds of Congress and three-fourths of the states
    must say yes.---**Article VI: The Constitution is the Boss**This part says the
    Constitution is the highest law in the country. Everyone in government must follow
    it. People can have any religion they want, and no one has to follow a religion
    to get a government job.---**Article VII: Starting the Constitution**This part
    says the Constitution would start once nine states agreed to it.---It''s like
    a set of rules for how the country works, so everything is fair and everyone knows
    their job! Let me know if there''s a part you want to talk about more.Response
    11-3'
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: 响应 [11-3](#PC6) 展示了我们从 ChatGPT 收到的答案。当然！以下是针对五年级学生解释的美国宪法：---**序言**这部分就像一个引言。它说明了宪法为何被撰写：为了让国家变得更好，保持公平，保持和平，保护每个人，帮助人们过上好生活，并确保自由对未来世代延续。---**第一篇：国会的规则（制定法律的那些人）****-
    第1节：国会分为两部分：参议院和众议院。**- 第2节：众议院由每两年选出的人组成。他们根据人口决定每个州有多少代表。**- 第3节：参议院由每个州的两名成员组成，他们任职六年。副总统负责参议院，但只有打破僵局的投票权。**-
    第4-6节：国会决定何时举行选举以及如何开会。议员们会得到报酬，并有一些特殊规定，比如他们在国会中说的话不能被逮捕。**- 第7节：这部分解释了法律的制定过程。国会起草法律，总统签署它们以使其正式生效。如果总统不喜欢一项法律，他们可以说“不”（否决），但国会仍然可以通过足够的票数使其成为法律。**-
    第8节：列出国会可以做的事情，如征税、造币、宣战和建立邮局。**- 第9-10节：这些章节说明国会和各州不允许做的事情，如制定不公平的法律或创造自己的货币。---**第二篇：总统的规则（负责人）****-
    第1节：总统每四年选举一次。他们必须至少35岁，并且在美国出生。**- 第2-3节：总统负责军队，可以与其他国家签订条约（在国会的帮助下），并任命重要官员，如法官。**-
    第4节：如果总统或其他领导人做了非常糟糕的事情，他们可能会失去工作（这被称为弹劾）。---**第三篇：法院的规则（法官）****- 第1节：有一个大法院叫做最高法院。国会也可以建立较小的法院。**-
    第2节：法院处理关于法律、州之间的分歧和其他重大问题。**- 第3节：叛国罪是指有人帮助敌人或反对美国，这是一项非常严重的罪行。---**第四篇：州的规则****-
    第1节：各州必须尊重彼此的法律和决定。**- 第2节：人们不能逃到另一个州以逃避惩罚。各州还必须公平对待游客。**- 第3节：新州可以加入国家，但他们需要国会的许可。**-
    第4节：每个州都将有一个由人民选择的政府，国家将保护他们免受攻击。---**第五篇：修改规则**这部分解释了如何对宪法进行修改（修正案）。这需要很多同意——三分之二的国会和四分之三的州必须说“是”。---**第六篇：宪法是老大**这部分说明宪法是国家最高的法律。政府中的每个人都必须遵守它。人们可以拥有任何宗教信仰，而且没有人必须信仰宗教才能获得政府工作。---**第七篇：宪法的开始**这部分说明宪法一旦九个州同意，就会开始生效。---它就像一套关于国家如何运作的规则，所以一切都很公平，每个人都清楚自己的职责！如果有什么部分你想了解更多，请告诉我。响应
    11-3
