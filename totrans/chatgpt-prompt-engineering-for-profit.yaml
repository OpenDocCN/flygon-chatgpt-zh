    ****mo**re** ****emot**iona**l ****a**nd** ****per**sona**l ****con**tex**t ****ab**out**
    ****t**he** ****pat**ien**t. "'
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: '○ ****反转响应 : "****作为一个病人，我可能对我的数据隐私和由机器做出的关键健康决策有所顾虑。也存在这样的担忧，即一个AI可能会犯下人类医生通过更多情感和个人背景了解病人可以避免的错误。"'
