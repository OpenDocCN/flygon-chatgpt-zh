  zh: 这个选项是不确定的，并取决于未来的价格趋势。根据图表，如果趋势继续上升，这可能会成为最昂贵的选项。
- en: Given that we have a trend line for the current year (CY Price) which has been
    increasing over the time period in the graph, we can anticipate that prices may
    continue to rise. This would suggest that locking in a price now could be more
    economical if the trend holds.
  id: totrans-1778
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们有一个表示当前年份（CY 价格）的趋势线，该趋势线在图表的时间段内一直在上升，我们可以预测价格可能会继续上涨。这表明，如果趋势持续，现在锁定价格可能会更加经济。
- en: Let’s calculate the exact costs for options B and C. Option D cannot be calculated
    exactly without future prices, but the trend suggests higher prices. If the trend
    continues, locking in a lower price now might be advantageous.
  id: totrans-1779
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们计算选项 B 和 C 的确切成本。选项 D 没有未来价格无法精确计算，但趋势表明价格会更高。如果趋势持续，现在锁定较低的价格可能是有利的。
- en: Based on these calculations and considering the upward trend in propane prices
    from the graph, Option A appears to be the most economically advantageous. It
    offers the lowest total price for propane, and paying upfront secures this price,
    which protects you from potential future price increases that are suggested by
    the trend line.
  id: totrans-1780
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这些计算，并考虑到图表中丙烷价格的上升趋势，选项 A 似乎是最经济的选择。它提供了丙烷的最低总价格，并且预付费用确保了这一价格，这可以保护您免受趋势线所暗示的潜在未来价格上涨的影响。
- en: CHAPTER 12
  id: totrans-1781
  prefs: []
  type: TYPE_NORMAL
  zh: 第 12 章
- en: INFERENTIAL STATISTICS
  id: totrans-1782
  prefs: []
  type: TYPE_NORMAL
  zh: 推断统计
- en: '![image](images/pg269.jpg)'
  id: totrans-1783
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg269.jpg)'
- en: This chapter introduces the fundamental concepts and applications of inferential
    statistics, a crucial branch of statistical analysis that allows us to draw conclusions
    about populations based on sample data. This chapter builds upon the descriptive
    statistics and data visualization techniques explored in earlier chapters so that
    we can perform probability-based decision-making and hypothesis testing.
  id: totrans-1784
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了推断统计的基本概念和应用，这是统计分析的一个关键分支，它使我们能够根据样本数据对群体进行推断。本章建立在前面章节中探讨的描述性统计和数据可视化技术之上，以便我们能够进行基于概率的决策和假设检验。
- en: Inferential statistics provide a framework for making educated guesses about
    large populations using information from smaller, representative samples. This
    approach is essential in many real-world scenarios where examining an entire population
    is impractical or impossible due to time, cost, or logistic constraints.
  id: totrans-1785
  prefs: []
  type: TYPE_NORMAL
  zh: 推断统计提供了一个框架，用于使用来自较小、具有代表性的样本的信息，对大量人群进行有根据的猜测。这种方法在许多现实场景中是必不可少的，在这些场景中，由于时间、成本或物流限制，检查整个群体是不切实际或不可能的。
- en: We begin by explaining the core principles of inferential statistics, including
    the concepts of sampling distributions, standard error, and confidence intervals.
    You will learn how these tools help quantify the uncertainty inherent in making
    inferences from sample data to broader populations.
  id: totrans-1786
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先解释了推断统计的核心原则，包括抽样分布、标准误差和置信区间的概念。您将学习这些工具如何帮助量化从样本数据到更广泛群体的推断中固有的不确定性。
- en: A significant portion of the chapter is devoted to hypothesis testing, a fundamental
    technique in inferential statistics. We discuss how to formulate null and alternative
    hypotheses, choose appropriate statistical tests, and interpret the results of
    these tests. The chapter covers various common tests, including t-tests for comparing
    means, chi-square tests for categorical data, and analysis of variance (ANOVA)
    for comparing multiple groups.
  id: totrans-1787
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的大部分内容致力于假设检验，这是推断统计中的一个基本技术。我们讨论了如何制定零假设和备择假设，选择适当的统计测试，以及如何解释这些测试的结果。本章涵盖了各种常见的测试，包括用于比较平均值的
    t 测试，用于分类数据的卡方测试，以及用于比较多个组的方差分析（ANOVA）。
- en: The concept of statistical significance is thoroughly explored, with a focus
    on understanding p-values and their role in decision-making. You will learn how
    to set significance levels and interpret the outcomes of statistical tests in
    the context of their specific research questions or business problems.
  id: totrans-1788
  prefs: []
  type: TYPE_NORMAL
  zh: 统计显著性的概念得到了彻底的探讨，重点是理解 p 值及其在决策中的作用。您将学习如何设定显著性水平，并在其具体的研究问题或商业问题的背景下解释统计测试的结果。
- en: We address the important distinction between statistical significance and practical
    significance, emphasizing that while a result may be statistically significant,
    it may not always have meaningful real-world implications. This discussion aims
    to develop your critical thinking skills when interpreting statistical results.
  id: totrans-1789
  prefs: []
  type: TYPE_NORMAL
  zh: 我们讨论了统计显著性和实际显著性之间的重要区别，强调虽然一个结果可能是统计显著的，但它可能并不总是有意义的现实世界影响。这次讨论旨在培养您在解释统计结果时的批判性思维能力。
- en: Practical applications of inferential statistics in various fields such as marketing,
    finance, and operations management are presented throughout the chapter. These
    examples demonstrate how inferential techniques can be used to make data-driven
    decisions, test the effectiveness of interventions, and forecast future trends
    based on historical data.
  id: totrans-1790
  prefs: []
  type: TYPE_NORMAL
  zh: 本章展示了推论统计学在营销、金融和运营管理等各种领域的实际应用。这些例子说明了如何使用推论技术做出基于数据的决策，测试干预措施的有效性，并根据历史数据预测未来趋势。
- en: The chapter also introduces the concept of statistical power and its importance
    in experimental design. We discuss how factors such as sample size and effect
    size influence the ability to detect significant differences when they exist.
  id: totrans-1791
  prefs: []
  type: TYPE_NORMAL
  zh: 本章还介绍了统计功效的概念及其在实验设计中的重要性。我们讨论了样本大小和效应量等因素如何影响检测到显著差异的能力。
- en: Throughout the chapter, emphasis is placed on the assumptions underlying different
    statistical tests and the importance of checking these assumptions before drawing
    conclusions. You will learn techniques for assessing whether their data meets
    the necessary criteria for various inferential methods.
  id: totrans-1792
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，强调了不同统计测试的潜在假设及其在得出结论之前检查这些假设的重要性。你将学习评估数据是否符合各种推论方法所需必要标准的技术。
- en: The chapter concludes with a discussion of common pitfalls and limitations in
    inferential statistics, including the risks of multiple comparisons, the importance
    of considering effect sizes alongside p-values, and the potential for Type I and
    Type II errors.
  id: totrans-1793
  prefs: []
  type: TYPE_NORMAL
  zh: 本章以讨论推论统计学中的常见陷阱和局限性结束，包括多重比较的风险、考虑效应量与p值的重要性，以及I型和II型错误的潜在可能性。
- en: By the end of this chapter, you will have a solid foundation in inferential
    statistics, enabling you to choose appropriate statistical methods, conduct analyses,
    and interpret results with confidence. You will be equipped to apply these techniques
    to real-world data analysis problems, enhancing your ability to draw meaningful
    conclusions from data and support evidence-based decision-making in your organization.
  id: totrans-1794
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，你将具备坚实的推论统计学基础，使你能够选择合适的统计方法，自信地进行分析和解释结果。你将能够将这些技术应用于现实世界的数据分析问题，提高你从数据中得出有意义的结论以及支持你组织中基于证据的决策的能力。
- en: 'This method is crucial for testing hypothetical outcomes and is commonly employed
    in research that follows the scientific method by conducting experiments. In business,
    it is utilized to determine whether averages are statistically significantly different.
    This method helps to answer the business question: “Are the means of two related
    distributions statistically significantly different or not?”'
  id: totrans-1795
  prefs: []
  type: TYPE_NORMAL
  zh: 此方法对于测试假设结果至关重要，通常在遵循科学方法进行实验的研究中被广泛采用。在商业领域，它被用来确定平均值是否在统计上显著不同。此方法有助于回答商业问题：“两个相关分布的均值在统计上是否显著不同？”
- en: Inferential Statistics
  id: totrans-1796
  prefs: []
  type: TYPE_NORMAL
  zh: 推论统计学
- en: What are Inferential Statistics?
  id: totrans-1797
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是推论统计学？
- en: Inferential statistics is a branch of statistics that enables us to make predictions
    or inferences about a population based on a sample of data taken from that population.
    It uses various methods to determine the probability that an observed difference
    between groups is reliable or one that might have occurred by chance in this study.
    Inferential statistics are crucial for hypothesis testing, helping to decide whether
    a certain hypothesis about a population is true based on sample data. This branch
    of statistics uses techniques such as confidence intervals and hypothesis tests,
    including t-tests and chi-squared tests to draw conclusions. The main goal of
    inferential statistics is to analyze the data being evaluated and draw conclusions
    about a larger group.
  id: totrans-1798
  prefs: []
  type: TYPE_NORMAL
  zh: 推论统计学是统计学的一个分支，使我们能够根据从该总体中抽取的样本数据对该总体进行预测或推断。它使用各种方法来确定观察到的组间差异是否可靠或可能是由于本研究的偶然性而发生的。推论统计学对于假设检验至关重要，有助于根据样本数据决定关于总体的某个假设是否为真。这个统计学分支使用诸如置信区间和假设检验（包括t检验和卡方检验）等技术来得出结论。推论统计学的主要目标是分析被评估的数据并得出关于更大群体的结论。
- en: The foundation of inferential statistics is the concept of a random sample,
    which is a sample chosen from the population in such a way that each member of
    the population has an equal chance of being included. From this sample, statisticians
    calculate statistics, such as the mean and standard deviation, which are used
    to make inferences about the population’s parameters. The accuracy of these inferences
    depends largely on the size and representativeness of the sample. Inferential
    methods are commonly used in fields like biology, economics, psychology, and social
    sciences to make generalizations from sample data to a broader context. The power
    of inferential statistics lies in its ability to provide an estimate of the uncertainty
    associated with these generalizations.
  id: totrans-1799
  prefs: []
  type: TYPE_NORMAL
  zh: 推断统计的基础是随机样本的概念，这是一个从总体中选取的样本，其方式是使总体中的每个成员都有同等的机会被选中。从这个样本中，统计学家计算统计数据，如均值和标准差，这些数据用于对总体参数进行推断。这些推断的准确性在很大程度上取决于样本的大小和代表性。推断方法在生物学、经济学、心理学和社会科学等领域被广泛使用，用于从样本数据中推广到更广泛的背景。推断统计的力量在于其能够提供与这些推广相关的不确定性的估计。
- en: Inferential statistics have limitations and assumptions that need to be recognized.
    One crucial assumption is that the sample data accurately represents the population,
    which can be a significant limitation if the sample is biased or too small. Statistical
    significance, an important concept in inferential statistics, does not always
    imply practical significance, meaning that the findings might not have meaningful
    real-world implications despite being statistically significant. Furthermore,
    interpreting results requires careful consideration of the context and potential
    confounding factors. Despite these challenges, inferential statistics remains
    an essential tool in research, enabling us to make informed conclusions about
    a population based on a sample.
  id: totrans-1800
  prefs: []
  type: TYPE_NORMAL
  zh: 推断统计有局限性和假设需要被认识到。一个关键假设是样本数据准确地代表了总体，如果样本有偏差或太小，这可能是一个重大的限制。在推断统计中，统计显著性是一个重要概念，它并不总是意味着实际意义，这意味着尽管统计上显著，但研究结果可能没有有意义的世界影响。此外，解释结果需要仔细考虑背景和潜在的混杂因素。尽管存在这些挑战，推断统计仍然是研究中的一个基本工具，它使我们能够根据样本对总体做出有根据的结论。
- en: What are the Elements of Inferential Statistics?
  id: totrans-1801
  prefs: []
  type: TYPE_NORMAL
  zh: 推断统计的要素有哪些？
- en: Inferential statistics consists of several key elements that work together to
    enable researchers to make predictions or inferences about a larger population
    from sample data.
  id: totrans-1802
  prefs: []
  type: TYPE_NORMAL
  zh: 推断统计由几个关键要素组成，这些要素共同作用，使研究人员能够从样本数据中对更大的总体进行预测或推断。
- en: '**1.**Population and sample: The population is the entire group that the researcher
    wants to draw conclusions about, while a sample is a subset of that population.
    A crucial aspect of inferential statistics is using data from the sample to infer
    characteristics about the population.'
  id: totrans-1803
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**总体和样本：总体是研究者想要从中得出结论的整个群体，而样本是该群体的一部分。推断统计的一个关键方面是使用样本数据来推断关于总体的特征。'
- en: '**2.**Random sampling: This is a method of selecting a sample from a population
    in such a way that every individual has an equal chance of being chosen. Random
    sampling is vital for reducing bias and ensuring that the sample represents the
    population accurately, making the findings more generalizable.'
  id: totrans-1804
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**随机抽样：这是一种从总体中选择样本的方法，使得每个个体都有同等的机会被选中。随机抽样对于减少偏差并确保样本准确地代表总体至关重要，从而使研究结果更具普遍性。'
- en: '**3.**Estimation: Estimation involves using sample data to estimate population
    parameters (like mean, proportion, or variance). This includes point estimation,
    which gives a single value estimate of a parameter, and interval estimation, which
    provides a range (interval) of values within which the parameter is expected to
    fall.'
  id: totrans-1805
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**估计：估计涉及使用样本数据来估计总体参数（如均值、比例或方差）。这包括点估计，它给出参数的单个值估计，以及区间估计，它提供一个参数预期会落在其中的值范围（区间）。'
- en: '**4.**Hypothesis testing: Hypothesis testing is a method used to decide whether
    there is enough evidence to reject a null hypothesis about a population parameter.
    This involves comparing the observed sample statistic to what would be expected
    under the null hypothesis and determining whether the observed difference is statistically
    significant.'
  id: totrans-1806
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.**假设检验：假设检验是一种用于决定是否有足够的证据拒绝关于总体参数的零假设的方法。这涉及到比较观察到的样本统计量与在零假设下预期的值，并确定观察到的差异是否具有统计学意义。'
- en: '**5.**Confidence intervals: A confidence interval gives an estimated range
    of values which is likely to include an unknown population parameter. The interval
    has an associated confidence level that quantifies the level of confidence that
    the parameter lies within the interval.'
  id: totrans-1807
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.**置信区间：置信区间提供了一个可能包含未知总体参数的估计值范围。该区间有一个相关的置信水平，它量化了参数位于区间内的置信程度。'
- en: '**6.**Error types: In inferential statistics, two types of errors are particularly
    significant. Type I errors (false positives) occur when the null hypothesis is
    wrongly rejected. Type II errors (false negatives) occur when the null hypothesis
    is wrongly not rejected. Understanding these errors is crucial in the interpretation
    of results.'
  id: totrans-1808
  prefs: []
  type: TYPE_NORMAL
  zh: '**6.**错误类型：在推断统计中，两种类型的错误尤其重要。I型错误（假阳性）发生在错误地拒绝零假设时。II型错误（假阴性）发生在错误地没有拒绝零假设时。理解这些错误对于结果的解释至关重要。'
- en: '**7.**Significance level and p-values: The significance level (denoted as alpha)
    is a threshold set by the researcher to decide whether to reject the null hypothesis.
    The p-value is the probability of observing the sample statistic, or something
    more extreme, if the null hypothesis is true. A small p-value (usually less than
    alpha) indicates strong evidence against the null hypothesis.'
  id: totrans-1809
  prefs: []
  type: TYPE_NORMAL
  zh: '**7.**显著性水平和p值：显著性水平（表示为alpha）是研究人员设定的一个阈值，用于决定是否拒绝零假设。p值是在零假设为真的情况下观察样本统计量或更极端值的概率。小的p值（通常小于alpha）表明有强烈的证据反对零假设。'
- en: '**8.**Statistical power: This refers to the probability that the test will
    correctly reject a false null hypothesis. Higher statistical power means a lower
    chance of making a Type II error.'
  id: totrans-1810
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.**统计功效：这指的是测试正确拒绝错误零假设的概率。更高的统计功效意味着犯II型错误的概率更低。'
- en: '**9.**Assumptions: Different inferential statistical methods have their own
    set of assumptions (like normality, independence, and homoscedasticity). Violation
    of these assumptions can lead to inaccurate inferences.'
  id: totrans-1811
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.**假设：不同的推断统计方法都有自己的假设集（如正态性、独立性和同方差性）。违反这些假设可能导致推断不准确。'
- en: '**10.**Statistical models and techniques: Various models and techniques like
    t-tests, ANOVA, regression analysis, and chi-squared tests are used in inferential
    statistics, depending on the type of data and the research questions.'
  id: totrans-1812
  prefs: []
  type: TYPE_NORMAL
  zh: '**10.**统计模型和技术：在推断统计中，根据数据类型和研究问题，使用各种模型和技术，如t检验、方差分析、回归分析和卡方检验。'
- en: An Example of Computing the Inferential Statistics for a Dataset
  id: totrans-1813
  prefs: []
  type: TYPE_NORMAL
  zh: 计算数据集推断统计的一个例子
- en: 'Here is an example of creating inferential statistics for the StartupCosts.xlsx
    dataset in the Case Data folder. In this example of inferential statistics, we
    use a dataset containing startup costs for different types of businesses (pizza,
    bakery, shoes, gifts, and pets). By using ANOVA (Analysis of Variance), we compare
    the means of these groups to determine if there are statistically significant
    differences between them (See [Figure 12.2](#fig12-2)). This is an important concept
    in inferential statistics: using sample data (in this case, the startup costs
    for a selection of businesses) to make inferences about a larger population (all
    such businesses in general).'
  id: totrans-1814
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个在案例数据文件夹中的StartupCosts.xlsx数据集创建推断统计的例子。在这个推断统计的例子中，我们使用了一个包含不同类型企业（比萨、面包店、鞋子、礼物和宠物）创业成本的数据库。通过使用方差分析（ANOVA），我们比较这些组的均值，以确定它们之间是否存在统计上显著的不同（见[图12.2](#fig12-2)）。这是推断统计中的一个重要概念：使用样本数据（在这种情况下，选定企业的创业成本）对更大群体（所有此类企业总体）进行推断。
- en: Based on the ANOVA results, we can see that the F-statistic is 3.246 with a
    p-value of 0.018 ([Figure 12.1](#fig12-1)). Since the p-value is less than the
    common alpha level of 0.05, it indicates that there are significant differences
    in startup costs among at least some of the business types. In other words, this
    result suggests that the average startup cost varies across different business
    types, and the differences we observed in our sample data are unlikely to be random.
  id: totrans-1815
  prefs: []
  type: TYPE_NORMAL
  zh: 根据方差分析的结果，我们可以看到F统计量为3.246，p值为0.018 ([图12.1](#fig12-1))。由于p值小于常见的α水平0.05，这表明至少在某些商业类型之间存在显著的启动成本差异。换句话说，这个结果表明不同商业类型的平均启动成本是不同的，我们在样本数据中观察到的差异不太可能是随机的。
- en: '![image](images/pg275.jpg)'
  id: totrans-1816
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg275.jpg)'
- en: FIGURE 12.1 Example of inferential statistics showing the descriptive analysis
    result of the costs
  id: totrans-1817
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.1 展示成本描述性分析结果的推理统计示例
- en: '![image](images/pg275_1.jpg)'
  id: totrans-1818
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg275_1.jpg)'
- en: FIGURE 12.2 Example of inferential statistics showing significant differences
    between the median of various costs
  id: totrans-1819
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.2 展示不同成本中位数之间显著差异的推理统计示例
