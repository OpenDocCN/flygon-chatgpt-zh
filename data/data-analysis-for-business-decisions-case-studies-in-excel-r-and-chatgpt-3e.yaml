- en: Specific survey question scores relating to individual airport areas were identified
    to possess notable correlations with each other. For instance, the scores from
    questions “Q7FOOD” and “Q7STORE” exhibit a substantial correlation, indicating
    a mutual relationship between customer satisfaction in airport food services and
    retail stores. Similarly, there are meaningful correlations between the scores
    of “Q7SIGN,” “Q7WALKWAYS,” and “Q7SCREENS,” suggesting an interconnected influence
    among signage, walkways, and information screens in shaping the customer experience
    at different airport areas.
  id: totrans-1439
  prefs: []
  type: TYPE_NORMAL
  zh: 与个别机场区域相关的特定调查问题评分被发现彼此之间具有显著的关联性。例如，“Q7FOOD”和“Q7STORE”问题的评分显示出显著的关联性，表明机场食品服务和零售店顾客满意度之间存在相互关系。同样，“Q7SIGN”、“Q7WALKWAYS”和“Q7SCREENS”的评分之间也存在有意义的关联性，表明在塑造不同机场区域的客户体验中，标识、通道和信息屏幕之间存在相互影响。
- en: When considering the correlation of individual area scores with the overall
    airport satisfaction score (“Q7ALL”), certain areas such as “Q7SIGN,” “Q7WALKWAYS,”
    and “Q7SCREENS” show more significant correlations. This implies that these specific
    areas exert a more pronounced influence on the passengers’ overall satisfaction
    with the airport, signifying their importance in the holistic airport customer
    experience.
  id: totrans-1440
  prefs: []
  type: TYPE_NORMAL
  zh: 当考虑个别区域评分与整体机场满意度评分（“Q7ALL”）的相关性时，某些区域如“Q7SIGN”、“Q7WALKWAYS”和“Q7SCREENS”显示出更显著的相关性。这表明这些特定区域对乘客对机场整体满意度的显著影响更为明显，标志着它们在整体机场客户体验中的重要性。
- en: CHAPTER 10
  id: totrans-1441
  prefs: []
  type: TYPE_NORMAL
  zh: 第10章
- en: MULTIVARIATE REGRESSION
  id: totrans-1442
  prefs: []
  type: TYPE_NORMAL
  zh: 多元回归
- en: '![image](images/pg213.jpg)'
  id: totrans-1443
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg213.jpg)'
- en: This chapter builds upon the concepts introduced in the previous chapter, expanding
    our exploration of predictive analytics to encompass multivariate linear regression.
    This powerful technique allows us to analyze and model relationships between multiple
    independent variables and a single dependent variable, providing a more comprehensive
    approach to understanding complex data relationships.
  id: totrans-1444
  prefs: []
  type: TYPE_NORMAL
  zh: 本章在上一章介绍的概念基础上进行扩展，将预测分析的范围扩展到多元线性回归。这项强大的技术使我们能够分析并建模多个自变量与单个因变量之间的关系，为理解复杂的数据关系提供了一种更全面的方法。
- en: Multivariate linear regression is an extension of simple linear regression,
    where instead of using just one predictor variable, we incorporate multiple predictors
    to explain variations in the outcome variable. This approach is particularly valuable
    in real-world scenarios, where outcomes are often influenced by numerous factors
    simultaneously.
  id: totrans-1445
  prefs: []
  type: TYPE_NORMAL
  zh: 多元线性回归是简单线性回归的扩展，我们不是只使用一个预测变量，而是引入多个预测变量来解释结果变量的变化。这种方法在现实世界的场景中尤其有价值，因为结果往往同时受到多个因素的影响。
- en: 'This technique addresses the following two business questions: “How are multiple
    input numerical variables linked to a numerical outcome variable?” and “Can we
    utilize several input variables to predict the outcome?”'
  id: totrans-1446
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术解决了以下两个商业问题：“多个输入数值变量如何与数值结果变量相关联？”和“我们能否利用多个输入变量来预测结果？”
- en: The chapter begins by introducing the fundamental principles of multivariate
    regression, explaining how it differs from simple linear regression and why it
    is a crucial tool in data analysis. We discuss the underlying assumptions of the
    model, including linearity, independence of errors, homoscedasticity, and normality
    of residuals. Understanding these assumptions is critical for proper model interpretation
    and application.
  id: totrans-1447
  prefs: []
  type: TYPE_NORMAL
  zh: 本章首先介绍了多元回归的基本原理，解释了它与简单线性回归的区别以及为什么它是数据分析中的关键工具。我们讨论了模型的潜在假设，包括线性、误差独立性、同方差性和残差的正态性。理解这些假设对于正确解释和应用模型至关重要。
- en: We examine the mathematics behind multivariate regression, exploring how the
    model is constructed and interpreted. This includes an examination of the regression
    equation, which now includes multiple terms, each representing the contribution
    of a different independent variable. We interpret regression coefficients, understanding
    what they mean in the context of our data and how they help us quantify the relationship
    between each predictor and the outcome variable.
  id: totrans-1448
  prefs: []
  type: TYPE_NORMAL
  zh: 我们探讨了多元回归背后的数学原理，研究了模型的构建和解释。这包括对回归方程的检查，现在它包括多个项，每一项代表不同自变量的贡献。我们解释回归系数，理解它们在我们数据中的含义以及它们如何帮助我们量化每个预测变量与结果变量之间的关系。
- en: The chapter guides readers through the process of building and evaluating multivariate
    regression models. We cover techniques for selecting appropriate variables, addressing
    multicollinearity (when independent variables are highly correlated with each
    other), and assessing model fit using metrics such as R-squared and adjusted R-squared.
    We also explore the importance of statistical significance and how to interpret
    p-values in the context of multivariate models.
  id: totrans-1449
  prefs: []
  type: TYPE_NORMAL
  zh: 本章引导读者通过构建和评估多元回归模型的过程。我们涵盖了选择适当变量的技术、处理多重共线性（当自变量之间高度相关时）以及使用如R平方和调整R平方等指标来评估模型拟合的技术。我们还探讨了统计显著性以及如何在多元模型背景下解释p值。
- en: Practical applications are the focus, with examples drawn from various fields
    to illustrate how multivariate regression can be used to solve real-world problems.
    We work through case studies that demonstrate the entire process, from data preparation
    and exploratory analysis to model building, validation, and interpretation of
    results.
  id: totrans-1450
  prefs: []
  type: TYPE_NORMAL
  zh: 实际应用是重点，通过从各个领域抽取的例子来说明多元回归如何用于解决现实世界的问题。我们通过案例研究来展示整个过程，从数据准备和探索性分析到模型构建、验证和结果解释。
- en: The chapter also introduces readers to the challenges and limitations of multivariate
    regression. We discuss issues such as overfitting, the importance of model parsimony,
    and the dangers of extrapolating beyond the range of observed data. These discussions
    will help readers develop a critical approach to model building and interpretation.
  id: totrans-1451
  prefs: []
  type: TYPE_NORMAL
  zh: 本章还向读者介绍了多元回归的挑战和局限性。我们讨论了诸如过拟合、模型简约性的重要性以及超出观察数据范围外推的危险等问题。这些讨论将帮助读者发展对模型构建和解释的批判性方法。
- en: Throughout the chapter, we emphasize the importance of visualization in understanding
    multivariate relationships. Readers will learn how to create and interpret scatter
    plots, partial regression plots, and other visual tools that can provide insights
    into complex relationships between variables.
  id: totrans-1452
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们强调了可视化在理解多元关系中的重要性。读者将学习如何创建和解释散点图、部分回归图以及其他可以提供变量之间复杂关系洞察力的视觉工具。
- en: By the end of the chapter, readers will have a solid foundation in multivariate
    linear regression, understanding both its power and its limitations as a predictive
    tool. They will be equipped with the skills to apply this technique to their own
    data analysis projects, making informed decisions about when and how to use multivariate
    regression.
  id: totrans-1453
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，读者将具备多元线性回归的坚实基础，理解其作为预测工具的强大功能和局限性。他们将掌握将此技术应用于自己的数据分析项目的技能，并能够就何时以及如何使用多元回归做出明智的决定。
- en: We use a combination of theoretical explanations, practical examples, and hands-on
    exercises to reinforce learning. Readers have opportunities to work with real
    datasets, using statistical software to build and interpret multivariate regression
    models. This practical experience is invaluable in preparing analysts for real-world
    data analysis challenges.
  id: totrans-1454
  prefs: []
  type: TYPE_NORMAL
  zh: 我们结合理论解释、实际例子和动手练习来强化学习。读者有机会使用真实数据集，利用统计软件构建和解释多元回归模型。这种实践经验对于为分析师准备现实世界的数据分析挑战非常有价值。
- en: Multivariate Linear Regression
  id: totrans-1455
  prefs: []
  type: TYPE_NORMAL
  zh: 多元线性回归
- en: What is Multivariate Linear Regression?
  id: totrans-1456
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是多元线性回归？
- en: Multivariate linear regression extends simple linear regression to predict a
    dependent variable using multiple independent variables. While simple linear regression
    deals with one predictor and one response variable, multivariate linear regression
    handles situations where the outcome is influenced by more than one factor. This
    technique is particularly useful in real-world scenarios where the outcome is
    typically affected by a combination of factors. For example, predicting a house’s
    price could depend on various factors such as size, location, and age, all of
    which multivariate regression can simultaneously account for. The model estimates
    a separate coefficient for each independent variable, indicating the strength
    and direction of its relationship with the dependent variable.
  id: totrans-1457
  prefs: []
  type: TYPE_NORMAL
  zh: 多元线性回归将简单线性回归扩展到使用多个自变量预测因变量。虽然简单线性回归处理一个预测变量和一个响应变量，但多元线性回归处理结果受多个因素影响的情况。这种技术在结果通常受多种因素影响的真实世界场景中特别有用。例如，预测房屋价格可能取决于大小、位置和年龄等因素，所有这些因素多元回归都可以同时考虑。模型为每个自变量估计一个单独的系数，表示其与因变量之间关系的强度和方向。
- en: The core concept of multivariate linear regression lies in understanding how
    multiple independent variables collectively influence the dependent variable.
    It involves fitting a linear equation to the observed data, where the equation
    represents a hyperplane in multidimensional space instead of a line in two-dimensional
    space. This hyperplane is the best fit that minimizes the sum of squared differences
    between the predicted and actual values of the dependent variable. The coefficients
    in the equation quantify the impact of each independent variable, adjusting for
    the presence of other variables. This allows for more comprehensive and nuanced
    predictions and analyses than what simple linear regression can provide.
  id: totrans-1458
  prefs: []
  type: TYPE_NORMAL
  zh: 多元线性回归的核心概念在于理解多个自变量如何共同影响因变量。它涉及将线性方程拟合到观察到的数据中，其中方程代表多维空间中的超平面，而不是二维空间中的直线。这个超平面是使因变量的预测值和实际值之间的平方差之和最小的最佳拟合。方程中的系数量化了每个自变量的影响，并调整了其他变量的存在。这比简单线性回归能提供更全面和细致的预测和分析。
- en: Multivariate linear regression is widely used in various fields such as economics,
    social sciences, and natural sciences. Data analysts and researchers need to check
    the assumptions of linear regression, like linearity, independence, and homoscedasticity,
    to ensure the model’s validity. The technique also requires careful consideration
    of potential multicollinearity, where independent variables are highly correlated,
    which can skew the results. Multivariate linear regression, thus, offers a more
    robust and detailed framework for prediction and analysis, enabling a deeper understanding
    of complex, real-world phenomena.
  id: totrans-1459
  prefs: []
  type: TYPE_NORMAL
  zh: 多元线性回归在经济、社会科学和自然科学等各个领域得到广泛应用。数据分析师和研究人员需要检查线性回归的假设，如线性、独立性和同方差性，以确保模型的有效性。该技术还需要仔细考虑潜在的共线性问题，即自变量高度相关，这可能会扭曲结果。因此，多元线性回归为预测和分析提供了一个更稳健和详细的框架，使人们能够更深入地理解复杂、现实世界现象。
- en: What are the Elements of Multivariate Linear Regression?
  id: totrans-1460
  prefs: []
  type: TYPE_NORMAL
  zh: 多元线性回归的要素有哪些？
- en: Multivariate linear regression, a staple in statistical modeling, involves several
    key elements that collectively enable it to predict a dependent variable based
    on multiple independent variables.
  id: totrans-1461
  prefs: []
  type: TYPE_NORMAL
  zh: 多元线性回归，作为统计建模的基石，涉及几个关键元素，这些元素共同使模型能够根据多个自变量预测因变量。
- en: 'Here are the main components:'
  id: totrans-1462
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是主要组成部分：
- en: '**1.**Dependent variable: This is the outcome or response variable that the
    model aims to predict or explain. It is a quantitative variable whose variations
    are being studied in relation to changes in independent variables.'
  id: totrans-1463
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.** 因变量：这是模型旨在预测或解释的结果或响应变量。它是一个定量变量，其变化与自变量的变化相关联。'
- en: '**2.**Independent variables: These are the predictor variables used to explain
    variations in the dependent variable. In multivariate linear regression, there
    are two or more independent variables, each believed to have some influence on
    the dependent variable.'
  id: totrans-1464
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.** 自变量：这些是用于解释因变量变化的预测变量。在多元线性回归中，有两个或更多的自变量，每个自变量都认为对因变量有一定的影响。'
- en: '**3.**Regression coefficients: For each independent variable, the model calculates
    a coefficient. This coefficient quantifies the strength and direction of the relationship
    between the independent variable and the dependent variable. It indicates how
    much the dependent variable is expected to change when the independent variable
    increases by one unit, while other variables are held constant.'
  id: totrans-1465
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.** 回归系数：对于每个自变量，模型计算一个系数。这个系数量化了自变量与因变量之间关系的强度和方向。它表明当自变量增加一个单位时，在保持其他变量不变的情况下，因变量预期会变化多少。'
- en: '**4.**Intercept: Also known as the constant term, the intercept is a coefficient
    that represents the expected value of the dependent variable when all independent
    variables are zero. It is an important part of the regression equation, anchoring
    the line or plane in the response space.'
  id: totrans-1466
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.** 截距：也称为常数项，截距是当所有自变量为零时，代表因变量预期值的系数。它是回归方程的重要组成部分，在响应空间中固定直线或平面。'
- en: '**5.**Error term: This component accounts for the variability in the dependent
    variable that cannot be explained by the independent variables. It is an essential
    part of the model, reflecting the fact that not all factors influencing the outcome
    can be captured or are known.'
  id: totrans-1467
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.** 误差项：这一部分解释了因变量中无法由自变量解释的变异性。它是模型的一个基本组成部分，反映了影响结果的所有因素不可能都被捕捉到或被知晓的事实。'
- en: '**6.**Fitting the model: This involves finding the best line or hyperplane
    that minimizes the differences between observed values and values predicted by
    the linear equation. Techniques such as Ordinary Least Squares (OLS) are commonly
    used for this purpose.'
  id: totrans-1468
  prefs: []
  type: TYPE_NORMAL
  zh: '**6.** 拟合模型：这涉及到找到最佳直线或超平面，以最小化观察值与线性方程预测值之间的差异。为此目的，通常使用普通最小二乘法（OLS）等技术。'
- en: '**7.**Assumptions: Multivariate linear regression relies on several assumptions,
    including linearity (the relationship between independent and dependent variables
    is linear), independence (observations are independent of each other), homoscedasticity
    (constant variance of errors), and normal distribution of error terms.'
  id: totrans-1469
  prefs: []
  type: TYPE_NORMAL
  zh: '**7.** 假设：多元线性回归依赖于几个假设，包括线性（自变量和因变量之间的关系是线性的）、独立性（观测值相互独立）、同方差性（误差的常数方差）和误差项的正态分布。'
- en: '**8.**Multicollinearity assessment: In multivariate settings, it is crucial
    to assess multicollinearity, where two or more independent variables are highly
    correlated. High multicollinearity can make it difficult to discern the individual
    impact of each independent variable.'
  id: totrans-1470
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.** 多重共线性评估：在多元设置中，评估多重共线性至关重要，其中两个或多个自变量高度相关。高多重共线性可能难以辨别每个自变量的单独影响。'
- en: '**9.**Model evaluation metrics: Various metrics like R-squared, adjusted R-squared,
    F-statistic, and p-values for coefficients are used to evaluate the performance
    and relevance of the model and its variables.'
  id: totrans-1471
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.** 模型评估指标：使用各种指标，如R平方、调整R平方、F统计量和系数的p值，来评估模型及其变量的性能和相关性。'
- en: '**10.**Residual analysis: Analyzing the residuals, the differences between
    observed and predicted values, is crucial for validating the assumptions of the
    model and its appropriateness for the data.'
  id: totrans-1472
  prefs: []
  type: TYPE_NORMAL
  zh: '**10.** 残差分析：分析残差，即观察值与预测值之间的差异，对于验证模型的假设及其对数据的适用性至关重要。'
- en: An Example of Creating a Multivariate Linear Regression for a Dataset
  id: totrans-1473
  prefs: []
  type: TYPE_NORMAL
  zh: 创建数据集的多元线性回归示例
- en: '[Figure 10.1](#fig10-1) in the Case Data folder illustrates the creation of
    Multivariate Linear Regression for the Franchises.xlsx dataset.'
  id: totrans-1474
  prefs: []
  type: TYPE_NORMAL
  zh: '[图10.1](#fig10-1) 在案例数据文件夹中说明了为Franchises.xlsx数据集创建多元线性回归的过程。'
- en: '![image](images/pg219.jpg)'
  id: totrans-1475
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg219.jpg)'
- en: FIGURE 10.1 Example of multivariate regression with scatterplots for each independent
    variable
  id: totrans-1476
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.1 多元回归示例，每个自变量都有散点图
- en: Consider our Franchises dataset, where we aim to predict sales based on variables
    like SQFT, INVENTORY, ADVERTISING, FAMILIES, and STORES ([Figure 10.1](#fig10-1)).
    This method involves constructing a model that assigns coefficients to each of
    these variables, quantifying their individual impact on sales while simultaneously
    considering their collective influence. For instance, the model might reveal that
    while larger SQFT and higher ADVERTISING significantly boost SALES, an increase
    in STORES might have a contrasting effect. Multivariate linear regression is thus
    a powerful tool, enabling the dissection of intricate relationships in data to
    make informed predictions and offering invaluable insights in fields ranging from
    business analytics to scientific research.
  id: totrans-1477
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑我们的特许经营数据集，我们旨在根据 SQFT、INVENTORY、ADVERTISING、FAMILIES 和 STORES 等变量预测销售额（[图
    10.1](#fig10-1)）。这种方法涉及构建一个模型，为这些变量中的每一个分配系数，量化它们对销售额的个体影响，同时考虑它们的集体影响。例如，模型可能会揭示，尽管较大的
    SQFT 和较高的 ADVERTISING 显著提高了 SALES，但 STORES 的增加可能产生相反的效果。多元线性回归因此是一个强大的工具，它能够剖析数据中的复杂关系，进行有根据的预测，并在从商业分析到科学研究等众多领域提供宝贵的见解。
- en: 'Analysis Case 10.1: Analysis Case for the Franchises Data'
  id: totrans-1478
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 10.1：特许经营数据分析案例
- en: Analysis with Excel
  id: totrans-1479
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Excel 进行分析
- en: Using the Case Dataset files provided, open the Case Data folder and find the
    file Franchises.xlsx. Open Franchises.xlsx using Excel.
  id: totrans-1480
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，打开案例数据文件夹，找到文件 Franchises.xlsx。使用 Excel 打开 Franchises.xlsx。
- en: 'We are going to answer these questions:'
  id: totrans-1481
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将回答以下问题：
- en: What factors affect sales in the franchises, and how?
  id: totrans-1482
  prefs: []
  type: TYPE_NORMAL
  zh: 哪些因素影响特许经营中的销售额，以及它们是如何影响的？
- en: Can we create a model to design a store size given certain demographics that
    allow us to achieve a certain level of sales?
  id: totrans-1483
  prefs: []
  type: TYPE_NORMAL
  zh: 我们能否创建一个模型，根据某些人口统计数据设计店面大小，从而实现一定的销售额水平？
- en: In accordance with our practice of not altering the raw data, please select
    the entire file and copy it into a new spreadsheet, labeling the tab as “Model.”
    Ensure that the dependent variable (SALES) is positioned to the left of the independent
    variables (SQFT, INVENTORY, ADVERTISING, FAMILIES, and STORES), and that the independent
    variable columns are adjacent. This formatting is necessary for performing the
    regression analysis in Excel.
  id: totrans-1484
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们不修改原始数据的惯例，请选择整个文件并将其复制到一个新的工作表中，将标签命名为“模型”。确保因变量（SALES）位于自变量（SQFT、INVENTORY、ADVERTISING、FAMILIES
    和 STORES）的左侧，并且自变量列是相邻的。这种格式对于在 Excel 中进行回归分析是必要的。
- en: From the Excel “Data” ribbon, use the Analysis ToolPak and select the “Regression”
    function. For the y-variable, use the SALES data (make sure to include the column
    header and checkmark the “My data has headers” box). For the x-variable, use all
    the data in the independent variable columns (also include headers). You will
    want to checkmark the “My data has headers” box, as well. You can put the results
    on another spreadsheet or right next to our data table. For now, select a cell
    next to the table, as shown in [Figure 10.12](#fig10-12).
  id: totrans-1485
  prefs: []
  type: TYPE_NORMAL
  zh: 从 Excel 的“数据”选项卡中使用 Analysis ToolPak 并选择“回归”功能。对于 y 变量，使用 SALES 数据（确保包括列标题并勾选“我的数据有标题”框）。对于
    x 变量，使用所有自变量列中的数据（也包括标题）。您同样需要勾选“我的数据有标题”框。您可以将结果放在另一个工作表中或紧挨着我们的数据表。目前，请选择表格旁边的单元格，如图[图
    10.12](#fig10-12)所示。
- en: '![image](images/pg221.jpg)'
  id: totrans-1486
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg221.jpg)'
- en: FIGURE 10.2 Steps in a multivariate linear regression analysis to predict the
    sales from the other franchise store factors
  id: totrans-1487
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.2 多元线性回归分析步骤，用于预测其他特许经营店因素的销售
- en: Let’s analyze the results by referring to the output shown in [Figure 10.4](#fig10-4).
    We can answer questions such as How much of the variation in the sales data can
    be explained by the model? (see R-squared); How confident are you in the validity
    of this model? (see Significance F); and What are the relationships between sales
    and the other factors? (see Coefficients).
  id: totrans-1488
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过参考[图 10.4](#fig10-4)所示的输出结果来分析结果。我们可以回答诸如销售数据中的多少变化可以用模型解释？（见 R 平方）；你对这个模型的效度有多大的信心？（见显著性
    F）；以及销售与其他因素之间的关系是什么？（见系数）等问题。
- en: Build a linear model using the intercept and the coefficients under the data
    on the spreadsheet. How confident are we on each coefficient? (see the P-value.)
    What does the model predict the sales for the first store will be, and how far
    off is it compared to the actual data?
  id: totrans-1489
  prefs: []
  type: TYPE_NORMAL
  zh: 使用工作表上的截距和系数构建一个线性模型。我们对每个系数有多大的信心？（见 P 值。）模型预测的第一家店的销售额是多少，与实际数据相比偏差有多大？
- en: '![image](images/pg222.jpg)'
  id: totrans-1490
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg222.jpg)'
- en: FIGURE 10.3 Steps in creating a linear regression model to predict SALES
  id: totrans-1491
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.3 创建线性回归模型以预测销售额的步骤
- en: '![image](images/pg222_1.jpg)'
  id: totrans-1492
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg222_1.jpg)'
- en: FIGURE 10.4 Line fit plots of SALES against each of the other variables to visualize
    dependencies
  id: totrans-1493
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.4 销售额与其他变量之间的拟合线图，以可视化依赖关系
- en: 'Let’s use the model to do some analysis. We are going to answer this question
    ([Figure 10.5](#fig10-5), Answer A):'
  id: totrans-1494
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用模型进行一些分析。我们将回答以下问题 ([图10.5](#fig10-5)，答案A)：
- en: 'We just opened a store in a neighborhood with 5,000 families. The store is
    5,000 square feet. We are planning to spend $5,000 a month on advertising. We
    carry $250,000 in inventory, and five competing stores are in the neighborhood.
    What are the projected sales? (Hint: Use the information in the data dictionary
    to normalize the variables properly and use the model equation.)'
  id: totrans-1495
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在拥有5,000个家庭的社区中刚刚开了一家商店。商店面积为5,000平方英尺。我们计划每月在广告上花费5,000美元。我们持有250,000美元的库存，并且社区内有五家竞争商店。预计销售额是多少？（提示：使用数据字典中的信息正确归一化变量，并使用模型方程。）
- en: 'Let’s do it again in reverse. Build a linear regression model to predict the
    level of advertising needed, given all the other parameters as input. Then, answer
    the following question ([Figure 10.5](#fig10-5), Answer B in the table):'
  id: totrans-1496
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再次进行逆向操作。构建一个线性回归模型来预测所需的广告水平，将所有其他参数作为输入。然后，回答以下问题 ([图10.5](#fig10-5)，表格中的答案B)：
- en: 'We want to open a 10,000 square-foot store and realize $500,000 a month in
    sales in a neighborhood with 10,000 families. We are planning to spend $10,000
    a month in advertising. We carry $500,000 in inventory, and there are 10 competing
    stores in the neighborhood. How much should we spend monthly on advertising to
    realize our expected sales? (Hint: Use the model equation in reverse.)'
  id: totrans-1497
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望在拥有10,000个家庭的社区中开设一家10,000平方英尺的商店，并实现每月500,000美元的销售额。我们计划每月在广告上花费10,000美元。我们持有500,000美元的库存，社区内有10家竞争商店。我们每月应该花费多少广告费用来实现预期的销售额？（提示：使用模型方程进行逆向计算。）
- en: '![image](images/pg223.jpg)'
  id: totrans-1498
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg223.jpg)'
- en: FIGURE 10.5 Results of implementing the prediction models and using it to predict
    SALES (A) and the ADVERTISING budget (B)
  id: totrans-1499
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.5 实施预测模型的结果以及用它来预测销售额（A）和广告预算（B）
