- en: Objectives
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, the reader should be able to understand the new
    layout of MS Excel, figure out how to change the default settings, understand
    the tool in general, and identify the different types of references, as well as
    the Named Ranges.
  id: totrans-536
  prefs: []
