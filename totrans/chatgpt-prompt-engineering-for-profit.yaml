    ****weak**nesse**s ****a**nd** ****pos**sibl**e ****fl**aws** ****o**f** ****a**n**
    ****arg**umen**t, ****ques**tionin**g ****assu**mption**s ****a**nd** ****fost**erin**g
    ****de**epe**r, ****mo**re** ****cri**tica**l ****de**bat**e.'
  id: totrans-1104
  prefs: []
  type: TYPE_NORMAL
  zh: '**魔鬼** **的** **辩护** **提示** **，** **或** **魔鬼** **的** **辩护** **，** **是一种** **提示**
    **工程技术** **，** **涉及** **让** **LLM** **采取** **一个** **对立** **的** **立场**，**通常** **是为了**
    **挑战** **那些** **通常** **不会** **被** **质疑** **的观点**。**这种技术** **的目标** **是** **探索**
    **一个** **论点的** **弱点** **和** **可能的** **缺陷**，**质疑** **假设** **并** **促进** **更** **深入**
    **、** **更** **批判** **的** **辩论**。'
- en: '****Th**is** ****app**roac**h ****i**s** ****sim**ila**r ****t**o** ****Cont**raria**n
    ****Prom**ptin**g , ****b**ut** ****wh**ile** ****t**he** ****Cont**raria**n ****Prom**ptin**g
    ****chal**lenge**s ****prev**ailin**g ****opi**nio**n ****wi**th** ****counte**rargumen**ts,
    ****De**vil**''****s**** ****Adv**ocac**y ****foc**use**s ****o**n** ****chal**lengin**g
    ****a**** ****spe**cifi**c ****pos**itio**n ****b**y** ****ass**umin**g ****a****
    ****prov**ocativ**e ****a**nd** ****cri**tica**l ****ro**le**, ****enco**uragin**g
    ****mo**re** ****det**aile**d ****ana**lysi**s ****a**nd** ****ope**nin**g ****sp**ace**
    ****t**o** ****re**fut**e ****o**r** ****con**fir**m ****t**he** ****argu**ment**s.'
  id: totrans-1105
  prefs: []
  type: TYPE_NORMAL
  zh: '**这种方法** **类似于** **反方** **提示** **，** **但** **而** **反方** **提示** **挑战** **主流**
    **观点** **并用** **反** **论** **据** **，** **魔鬼** **的** **辩护** **则** **专注于** **通过**
    **扮演** **挑衅** **和** **批判** **的角色** **来** **挑战** **一个** **特定的** **立场**，**鼓励** **更**
    **详细的** **分析** **，** **并为** **反驳** **或** **确认** **论点** **开辟** **空间**。'
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ] ****T**he**'
  id: totrans-1106
  prefs: []
  type: TYPE_NORMAL
  zh: '[**你的** **主要** **目标** **是什么**] **T** **he**'
- en: '****De**vil**''****s**** ****ma**in** ****obje**ctiv**e ****Adv**ocat**e ****Prom**ptin**g
    ****i**s** ****ab**out** ****stim**ulatin**g ****cri**tica**l ****thi**nkin**g
    ****b**y** ****enco**uragin**g ****t**he** ****L**LM** ****t**o** ****que**stio**n,
    ****chal**leng**e, ****a**nd** ****rigo**rousl**y ****exa**min**e ****argu**ment**s.
    ****Th**is** ****tech**niqu**e ****ai**ms** ****n**ot** ****on**ly** ****t**o**
    ****re**fut**e, ****b**ut** ****al**so** ****t**o** ****fi**nd** ****pos**sibl**e
    ****fl**aws** ****o**r** ****ga**ps** ****i**n** ****reas**onin**g ****th**at**
    ****mi**ght** ****othe**rwis**e ****b**e** ****acc**epte**d ****wit**hou**t ****resi**stanc**e.'
  id: totrans-1107
  prefs: []
  type: TYPE_NORMAL
  zh: '**魔鬼** **的** **主要** **目标** **辩护** **提示** **是** **通过** **鼓励** **LLM** **质疑**
    **、** **挑战** **和** **严格** **检查** **论点** **来** **激发** **批判** **性** **思考**。**这种技术**
    **旨在** **不仅** **反驳** **，** **而且** **寻找** **可能的** **缺陷** **或** **推理** **中的** **漏洞**，**这些**
    **漏洞** **可能** **否则** **会被** **无** **阻力** **地** **接受**。'
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****fo**ste**r ****mo**re**
    ****ro**bus**t ****de**bat**e ****a**nd** ****pro**vid**e ****t**he** ****us**er**
    ****wi**th** ****a**** ****com**plet**e ****vi**ew** ****o**f** ****t**he** ****is**sue**
    ****un**der** ****disc**ussio**n. ****Ofte**ntime**s, ****b**y** ****pla**yin**g
    “****de**vil**’****s**** ****adv**ocat**e,” ****t**he** ****mo**del** ****br**ing**s
    ****t**o** ****li**ght** ****con**cern**s ****a**nd** ****nua**nce**s ****th**at**
    ****m**ay** ****ha**ve** ****be**en** ****over**looke**d, ****enco**uragin**g
    ****a**** ****mo**re** ****bal**ance**d ****a**nd** ****inf**orme**d ****ana**lysi**s.'
  id: totrans-1108
  prefs: []
  type: TYPE_NORMAL
  zh: '**另一个** **目标** **是** **促进** **更多** **深入的** **辩论** **，并为** **用户** **提供** **对**
    **讨论** **问题的** **全面** **视角**。**经常** **通过** **扮演** **“** **魔鬼** **的** **辩护者”，**
    **模型** **可以** **揭示** **那些** **可能** **被** **忽视** **的** **关注** **点和** **细微** **差别**，**鼓励**
    **更加** **平衡** **和** **信息丰富** **的分析**。'
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-1109
  prefs: []
  type: TYPE_NORMAL
  zh: '[**如何工作**]'
- en: '****De**vil**''****s**** ****Adv**ocat**e ****Prom**ptin**g ****wo**rks** ****b**y**
    ****as**kin**g ****t**he** ****L**LM** ****t**o** ****que**stio**n ****a**n**
    ****arg**umen**t ****o**r** ****pos**itio**n, ****foc**usin**g ****o**n** ****pote**ntia**l
    ****fl**aws**, ****chal**lenge**s, ****o**r** ****contr**adictio**ns. ****T**he**
    ****pr**omp**t ****sh**oul**d ****b**e** ****stru**cture**d ****i**n** ****a****
    ****w**ay** ****th**at** ****cle**arl**y ****indi**cate**s ****t**o** ****t**he**
    ****mo**del** ****th**at** ****th**ey** ****sh**oul**d ****chal**leng**e ****t**he**
    ****id**ea** ****pres**ente**d, ****b**y** ****prov**idin**g ****counte**rargumen**ts
    ****o**r** ****high**lighti**ng ****we**ak** ****po**int**s.'
  id: totrans-1110
  prefs: []
  type: TYPE_NORMAL
  zh: '**魔鬼的辩护者提示通过让LLM质疑一个论点或立场，专注于潜在的错误、挑战或矛盾来工作。提示应该以明确指示模型挑战所呈现想法的方式构建，通过提供反论点或突出弱点来做到这一点**。'
- en: '****F**or** ****exa**mpl**e, ****i**f** ****t**he** ****que**stio**n ****i**s**
    "****Sh**oul**d ****w**e** ****rep**lac**e ****a**ll** ****fo**ssi**l ****fu**el**
    ****veh**icle**s ****wi**th** ****ele**ctri**c ****veh**icle**s", ****t**he**
    ****De**vil**''****s**** ****Adv**ocat**e ****Prom**ptin**g ****wo**uld** ****a**sk**
    ****t**he** ****mo**del** ****t**o** ****que**stio**n ****th**is** ****app**roac**h,
    ****bri**ngin**g ****u**p** ****is**sue**s ****su**ch** ****a**s** ****t**he**
    ****infra**structu**re ****ne**ede**d ****t**o** ****sup**por**t ****t**he** ****ch**ang**e,
    ****t**he** ****envir**onment**al ****im**pac**t ****o**f** ****mi**nin**g ****f**or**
    ****batt**erie**s, ****a**nd** ****t**he** ****hard**ship**s ****fa**ced** ****b**y**
    ****l**ow**-****in**com**e ****pe**opl**e.'
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果问题是“我们应该用电动汽车替换所有化石燃料车辆吗”，魔鬼的辩护者提示将要求模型质疑这种方法，提出诸如支持这种变化所需的基础设施、开采电池对环境的影响以及低收入人群面临的困难等问题。
- en: '****T**he** ****mo**del** ****i**s** ****inst**ructe**d ****n**ot** ****on**ly**
    ****t**o** ****crit**iciz**e, ****b**ut** ****al**so** ****t**o** ****pro**pos**e
    ****refl**ection**s ****th**at** ****c**an** ****le**ad** ****t**o** ****a****
    ****de**epe**r ****under**standi**ng ****a**nd**, ****even**tuall**y, ****t**o**
    ****mo**re** ****effe**ctiv**e ****solu**tion**s. ****Th**is** ****tech**niqu**e
    ****i**s** ****part**icular**ly ****effe**ctiv**e ****i**n** ****con**text**s
    ****wh**ere** ****de**bat**e ****a**nd** ****cri**tica**l ****eval**uatio**n ****a**re**
    ****esse**ntia**l.'
  id: totrans-1112
  prefs: []
  type: TYPE_NORMAL
  zh: '**该模型不仅被指导去批评，而且还被指导去提出可以导致更深入理解和，甚至最终导致更有效解决方案的反思。这种技术在辩论和批判性评估至关重要的环境中特别有效**。'
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-1113
  prefs: []
  type: TYPE_NORMAL
  zh: '[**何时使用**]'
- en: '****De**vil**''****s**** ****Adv**ocat**e ****Prom**ptin**g ****sh**oul**d
    ****b**e** ****us**ed** ****wh**en** ****y**ou** ****ne**ed** ****t**o** ****exp**lor**e
    ****a**ll** ****t**he** ****pos**sibl**e ****weak**nesse**s ****o**r** ****disad**vantag**es
    ****o**f** ****a**n** ****id**ea**, ****espe**ciall**y ****i**n** ****t**he**
    ****con**tex**t ****o**f** ****dec**isio**n-****ma**kin**g, ****stra**tegi**c
    ****pla**nnin**g, ****o**r** ****po**lic**y ****deve**lopmen**t. ****I**t** ****i**s**
    ****us**efu**l ****f**or** ****avo**idin**g "****grou**pthin**k ****syn**drom**e,"
    ****wh**ere** ****eve**ryon**e ****ag**ree**s ****wit**hou**t ****que**stio**n.'
  id: totrans-1114
  prefs: []
  type: TYPE_NORMAL
  zh: '**魔鬼的辩护者提示**应在你需要探索一个想法的所有可能弱点或劣势时使用，尤其是在决策、战略规划或政策制定的情况下。它有助于避免“群体思维综合症”，即在没有质疑的情况下，每个人都同意。'
- en: '****Th**is** ****tech**niqu**e ****i**s** ****reco**mmende**d ****i**n** ****philo**sophic**al,
    ****aca**demi**c, ****o**r** ****bus**ines**s ****disc**ussion**s ****wh**ere**
    ****i**t** ****i**s** ****impo**rtan**t ****t**o** ****te**st** ****t**he** ****val**idit**y
    ****o**f** ****a**n** ****arg**umen**t ****be**for**e ****ac**tin**g ****o**n**
    ****i**t**. ****B**y** ****as**kin**g ****t**he** ****mo**del** ****t**o** “****adv**ocat**e
    ****aga**ins**t” ****a**** ****po**int** ****o**f** ****vi**ew**, ****y**ou**
    ****c**an** ****ide**ntif**y ****pote**ntia**l ****is**sue**s ****th**at** ****ne**ed**
    ****t**o** ****b**e** ****addr**esse**d ****be**for**e ****comm**ittin**g ****t**o**
    ****a**** ****spe**cifi**c ****app**roac**h.'
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: 这种**技术**在哲学、学术或商业讨论中推荐使用，在这些讨论中，在采取行动之前测试一个论点的有效性是很重要的。通过让模型“**反对**”一个观点，你可以识别出在承诺采取特定方法之前需要解决的问题。
- en: '****Furt**hermor**e, ****t**he** ****De**vil**''****s**** ****Adv**ocat**e
    ****i**s** ****us**efu**l ****i**n** ****educ**ationa**l ****con**text**s ****wh**ere**
    ****i**t** ****ai**ms** ****t**o** ****te**ach** ****cri**tica**l ****argum**entati**on
    ****sk**ill**s, ****enco**uragin**g ****stu**dent**s ****t**o** ****lo**ok** ****a**t**
    ****a**** ****pro**ble**m ****fr**om** ****diff**eren**t ****an**gle**s ****a**nd**
    ****que**stio**n ****th**eir** ****o**wn** ****assu**mption**s.'
  id: totrans-1116
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，**魔鬼的辩护者**在教育环境中很有用，旨在教授批判性论证技巧，鼓励学生从不同的角度看待问题，并质疑他们自己的假设。
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-1117
  prefs: []
  type: TYPE_NORMAL
  zh: '[**使用技巧**]'
- en: ● ****Spe**cif**y ****t**he** ****arg**umen**t ****o**r** ****id**ea** ****th**at**
    ****ne**eds** ****t**o** ****b**e** ****chal**lenge**d. ****T**he** ****cle**are**r
    ****t**he** ****ini**tia**l ****id**ea**, ****t**he** ****be**tte**r ****t**he**
    ****L**LM** ****c**an** ****pl**ay** ****de**vil**'****s**** ****adv**ocat**e.
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: ● 明确需要挑战的**论点**或**想法**。越清晰地表达初始想法，LLM扮演的魔鬼辩护者就越有效。
- en: ● ****Enco**urag**e ****t**he** ****mo**del** ****t**o** ****n**ot** ****on**ly**
    ****crit**iciz**e, ****b**ut** ****al**so** ****pro**pos**e ****alte**rnativ**e
    ****solu**tion**s ****wh**en** ****appr**opriat**e, ****s**o** ****th**at** ****t**he**
    ****de**bat**e ****i**s** ****cons**tructi**ve.
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: ● 鼓励模型不仅进行批评，而且在适当的时候提出替代解决方案，以便辩论是建设性的。
- en: '[****T**he** ****diff**erenc**e ****i**n** ****tech**niqu**e ]'
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: '[**技术差异**]'
- en: '****De**vil**''****s**** ****Adv**ocat**e ****Prom**ptin**g ****dif**fer**s
    ****fr**om** ****Cont**raria**n ****Prom**ptin**g ****i**n** ****yo**ur** ****in**ten**t
    ****a**nd** ****app**roac**h. ****Wh**ile** ****t**he** ****Cont**raria**n ****Prom**ptin**g
    ****se**eks** ****t**o** ****pro**vid**e ****a**n** ****opp**osin**g ****o**r**
    ****alte**rnativ**e ****vi**ew**, ****t**he** ****De**vil**''****s**** ****Adv**ocat**e
    ****foc**use**s ****o**n** ****chal**lengin**g ****t**he** ****val**idit**y ****o**f**
    ****a**n** ****arg**umen**t, ****fin**din**g ****fl**aws** ****a**nd** ****for**cin**g
    ****cri**tica**l ****exam**inatio**n. ****De**vil**''****s**** ****adv**ocac**y
    ****i**s** ****of**ten** ****mo**re** ****i**n**-****de**pth** ****a**nd** ****spe**cifi**c,
    ****see**kin**g ****t**o** ****te**st** ****t**he** ****robu**stnes**s ****o**f**
    ****a**n** ****arg**umen**t.'
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: '**魔鬼的辩护者**提示与**对立提示**的不同之处在于，对立提示旨在提供对立或替代观点，而**魔鬼的辩护者**专注于挑战一个论点的有效性，寻找缺陷并强制进行批判性审查。魔鬼的辩护通常更加深入和具体，试图测试一个论点的稳健性。'
- en: '****Com**pare**d ****t**o** ****Ro**le** ****Rev**ersa**l ****Prom**ptin**g
    , ****wh**ere** ****t**he** ****mo**del** ****ta**kes** ****t**he** ****pers**pectiv**e
    ****o**f** ****diff**eren**t ****par**tie**s ****inv**olve**d, ****t**he** ****De**vil**''****s****
    ****Adv**ocat**e ****Prom**ptin**g ****foc**use**s ****o**n** ****chal**lengin**g
    ****a**nd** ****crit**icizin**g ****t**he** ****arg**umen**t ****pres**ente**d,
    ****rega**rdles**s ****o**f** ****t**he** ****pos**itio**n ****o**f** ****t**he**
    ****pa**rty** ****inv**olve**d. ****T**he** ****fo**cus** ****i**s** ****o**n**
    ****put**tin**g ****pre**ssur**e ****o**n** ****t**he** ****arg**umen**t, ****n**ot**
    ****ju**st** ****under**standi**ng ****ano**the**r ****pers**pectiv**e.'
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: '****与角色反转提示相比，角色反转提示中模型采取不同参与方的视角，而《魔鬼的辩护者》提示则专注于挑战和批判所提出的论点，无论涉及方的立场如何。重点是施加压力于论点，而不仅仅是理解另一个视角。'
- en: '****Rega**rdin**g ****St**ep**-****b**y**-****St**ep** ****Ana**lysi**s , ****wh**ich**
    ****exp**lain**s ****a**** ****pro**ble**m ****i**n** ****st**eps**, ****De**vil**''****s****
    ****Adv**ocat**e ****Prom**ptin**g ****se**eks** ****t**o** ****exp**loi**t ****vulner**abiliti**es,
    ****n**ot** ****expl**anatio**ns. ****I**t** ****do**es** ****n**ot** ****a**im**
    ****t**o** ****des**crib**e ****h**ow** ****t**o** ****d**o** ****some**thin**g,
    ****b**ut** ****ra**the**r ****t**o** ****te**st** ****whe**the**r ****t**he**
    ****arg**umen**t ****o**r** ****id**ea** ****i**s** ****act**uall**y ****so**und**.'
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: '****关于逐步分析，它以步骤解释问题，而《魔鬼的辩护者》提示寻求利用弱点，而不是解释。它并不旨在描述如何做某事，而是测试论点或想法是否真正合理。'
- en: '[****Exa**mple**s]'
