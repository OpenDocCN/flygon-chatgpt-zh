- en: '****1****. ****Res**pons**e ****Form**attin**g ****f**or** ****Stru**cture**d
    ****Out**put**s'
  id: totrans-715
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '****1****. ****结构化**输出**的**响**应**格式'
- en: '****O**ne** ****o**f** ****t**he** ****sta**ndou**t ****fea**ture**s ****o**f**
    ****Cha**tGP**T ****i**s** ****i**ts** ****abi**lit**y ****t**o** ****org**aniz**e
    ****info**rmatio**n ****in**to** ****stru**cture**d ****for**mat**s ****li**ke**
    ****bu**lle**t ****po**int**s, ****ta**ble**s, ****o**r** ****num**bere**d ****li**sts**.
    ****Th**is** ****capa**bilit**y ****i**s** ****inva**luabl**e ****f**or** ****cre**atin**g
    ****prese**ntatio**ns, ****rep**ort**s, ****o**r** ****comp**arison**s.'
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: '****ChatGPT**的**标**准**特**性**之**一**是**其**将**信**息**组**织**成**结**构**化**格**式**的**能**力**，**如**：**列**表**、**表**格**或**编号**列**表**。**这**种**能**力**对**于**创**建**演**示**、**报**告**或**比**较**非常**有**价**值**。'
- en: '****Exa**mpl**e: ****Y**ou** ****wa**nt** ****a**** ****pr**os**-****a**nd**-****co**ns**
    ****ta**ble** ****f**or** ****re**mot**e ****wo**rk**. ****Ins**tea**d ****o**f**
    ****si**mpl**y ****as**kin**g, “****Wh**at** ****a**re** ****t**he** ****pr**os**
    ****a**nd** ****co**ns** ****o**f** ****re**mot**e ****wo**rk**?” ****y**ou**
    ****c**an** ****req**ues**t:'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例**：**您想要一个远程工作的利弊对比表。**而不是简单地问，“**远程工作的利弊是什么？**”您可以要求：'
- en: “****Li**st** ****t**he** ****pr**os** ****a**nd** ****co**ns** ****o**f** ****re**mot**e
    ****wo**rk** ****i**n** ****a**** ****ta**ble** ****fo**rma**t.”
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: “**列出远程工作的利弊，以表格形式呈现。**”
- en: '****Cha**tGP**T ****wi**ll** ****gen**erat**e ****a**** ****ne**atl**y ****form**atte**d
    ****ta**ble**, ****sa**vin**g ****y**ou** ****ti**me** ****a**nd** ****ef**for**t
    ****i**n** ****orga**nizin**g ****info**rmatio**n. ****Th**is** ****fea**tur**e
    ****i**s** ****part**icular**ly ****hel**pfu**l ****wh**en** ****prep**arin**g
    ****docu**ment**s ****th**at** ****req**uir**e ****cla**rit**y ****a**nd** ****stru**ctur**e.'
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT 将生成一个格式化的表格，节省您在组织信息上的时间和精力。这个功能在准备需要清晰结构和明确性的文档时尤其有用。**'
- en: '****Ot**her** ****Appl**icatio**ns ****o**f** ****Res**pons**e ****Form**attin**g:'
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: '**响应格式化应用的其它用途**：'
- en: '****Cre**atin**g ****time**line**s ****o**r** ****sche**dule**s:'
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: '**创建时间线或日程**：'
- en: “****Ma**ke** ****a**** ****tim**elin**e ****f**or** ****t**he** ****deve**lopmen**t
    ****o**f** ****ele**ctri**c ****veh**icle**s ****fr**om** ****19**90** ****t**o**
    ****20**20**.”
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: “**为从1990年到2020年电动汽车的发展制作一个时间线。**”
- en: '****Summ**arizin**g ****la**rge** ****ch**unk**s ****o**f** ****da**ta**:'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: '**总结大量数据**：'
- en: “****Summ**ariz**e ****t**he** ****k**ey** ****po**int**s ****fr**om** ****th**is**
    ****te**xt** ****i**n** ****bu**lle**t ****po**int**s.”
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: “**从本文中总结出关键点，用要点形式呈现。**”
- en: '****B**y** ****spec**ifyin**g ****yo**ur** ****des**ire**d ****fo**rma**t,
    ****y**ou** ****en**sur**e ****th**at** ****Cha**tGP**T ****del**iver**s ****resp**onse**s
    ****th**at** ****a**re** ****re**ady** ****f**or** ****imme**diat**e ****u**se**.'
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: '**通过指定您期望的格式，您确保 ChatGPT 提供的响应是即用型的。**'
- en: '* * *'
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: '*** '
- en: '****2****. ****Iter**ativ**e ****Que**ryin**g ****f**or** ****Refi**nemen**t'
  id: totrans-727
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**2. 重复查询以优化**'
- en: '****Ra**rel**y ****do**es** ****t**he** ****fi**rst** ****res**pons**e ****perf**ectl**y
    ****me**et** ****a**ll** ****yo**ur** ****ne**eds**, ****wh**ich** ****i**s**
    ****wh**ere** ****iter**ativ**e ****que**ryin**g ****co**mes** ****in**to** ****pl**ay**.
    ****Th**ink** ****o**f** ****yo**ur** ****inte**ractio**n ****wi**th** ****Cha**tGP**T
    ****a**s** ****a**** ****dyn**ami**c ****conv**ersati**on ****ra**the**r ****th**an**
    ****a**** ****o**ne**-****o**ff** ****req**ues**t.'
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: '**很少第一次响应就能完美满足所有需求，这就是重复查询发挥作用的地方。将您与 ChatGPT 的互动视为一种动态对话，而不是一次性的请求。**'
- en: '****H**ow** ****I**t** ****Wo**rks**: ****I**f** ****t**he** ****ini**tia**l
    ****ou**tpu**t ****fe**els** ****t**oo** ****com**ple**x, ****inco**mplet**e,
    ****o**r** ****o**ff**-****ta**rge**t, ****y**ou** ****c**an** ****re**fin**e
    ****t**he** ****res**ult**s ****b**y** ****prov**idin**g ****fo**llo**w-****u**p**
    ****inst**ructio**ns. ****F**or** ****exa**mpl**e:'
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何工作**：**如果初始输出感觉过于复杂、不完整或偏离目标，您可以通过提供后续指令来优化结果。例如：**'
- en: '****Sim**plif**y ****Com**ple**x ****Info**rmatio**n: “****C**an** ****y**ou**
    ****exp**lai**n ****th**is** ****i**n** ****sim**ple**r ****te**rms**?”'
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: '**简化复杂信息**：“**你能用更简单的术语解释这个吗？**”'
- en: '****A**dd** ****Spe**cifi**c ****Exa**mple**s: “****Inc**lud**e ****a**n**
    ****exa**mpl**e ****t**o** ****cla**rif**y ****th**is** ****po**int**.”'
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: '**添加具体示例**：“**包含一个示例来阐明这个观点**。”'
- en: '****Ad**jus**t ****t**he** ****To**ne**: “****Rew**rit**e ****th**is** ****wi**th**
    ****a**** ****mo**re** ****pers**uasiv**e ****to**ne**.”'
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: '**调整语气**：“用更有说服力的语气重写这段。”'
- en: '****Th**is** ****iter**ativ**e ****pro**ces**s ****al**low**s ****y**ou** ****t**o**
    ****fi**ne**-****tu**ne** ****resp**onse**s ****t**o** ****yo**ur** ****sati**sfacti**on,
    ****ma**kin**g ****Cha**tGP**T ****a**** ****fle**xibl**e ****to**ol** ****f**or**
    ****a**** ****var**iet**y ****o**f** ****ne**eds**.'
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: '**这个迭代过程允许您根据您的满意度调整响应，使ChatGPT成为一个灵活的工具，适用于各种需求。**'
- en: '* * *'
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '****3****. ****Ta**sk** ****Cha**inin**g ****f**or** ****Com**ple**x ****Pro**ject**s'
  id: totrans-735
