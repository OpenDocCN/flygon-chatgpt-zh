  id: totrans-31
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**模块 1：理解 ChatGPT**'
- en: '****Wel**c**o**me** ****t****o**** ****t****h**e** ****fi**r**s**t** ****mo**d**u**le**
    ****o****f**** ****o****u**r** ****tra**i**ni**ng**, ****wh**e**r**e** ****w****e****
    ****wi****l**l** ****exp**l**o**re** ****t****h**e** ****fund**am**en**tal**s
    ****o****f**** ****Cha**t**G**PT**. ****Th****i**s** ****mo**d**u**le** ****i****s****
    ****des**i**gn**ed** ****t****o**** ****pro**v**i**de** ****y****o**u** ****wi****t**h**
    ****a**** ****so**l**i**d** ****under**st**an**din**g ****o****f**** ****wh****a**t**
    ****Cha**t**G**PT** ****i****s****, ****h****o**w** ****i****t**** ****wo**r**k**s**,
    ****a****n**d** ****t****h**e** ****ba**s**i**cs** ****o****f**** ****inte**ra**ct**ing**
    ****effe**ct**iv**ely** ****wi****t**h** ****th****i**s** ****tech**n**ol**ogy**.
    ****Whe**t**h**er** ****y****o**u**''****r****e**** ****n****e**w** ****t****o****
    ****arti**f**ic**ial** ****inte**ll**ig**enc**e ****o****r**** ****alr**e**a**dy**
    ****ha****v**e** ****so****m**e** ****expe**r**ie**nce** ****wi****t**h** ****arti**f**ic**ial**
    ****inte**ll**ig**enc**e ****to**o**l**s**, ****th****i**s** ****sec**t**i**on**
    ****wi****l**l** ****he****l**p** ****y****o**u** ****l****a**y** ****t****h**e**
    ****foun**d**at**ion** ****f****o**r** ****opti**m**iz**ed** ****u****s**e** ****o****f****
    ****Cha**t**G**PT** ****i****n**** ****yo****u**r** ****entrep**re**neu**ria**l
    ****acti**v**it**ies**.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**欢迎来到我们培训的第一个模块，我们将探讨 ChatGPT 的基础。这个模块旨在为您提供对 ChatGPT 的全面理解，包括它是如何工作的，以及如何有效地与这项技术进行交互的基础知识。无论您是人工智能的新手还是有使用人工智能工具的一些经验，本节都将帮助您为在您的创业活动中优化使用
    ChatGPT 打下坚实的基础**。'
- en: '****1****.****1**** ****T****h**e** ****ba**s**i**cs** ****o****f**** ****Cha**t**G**PT**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.1 ChatGPT 的基础**'
- en: '****Wh****a**t** ****i****s**** ****Cha**t**G**PT**?'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**什么是 ChatGPT**？'
- en: '****Cha**t**G**PT** ****i****s**** ****a**** ****lan**g**ua**ge** ****mo**d**e**l**
    ****deve**l**op**ed** ****b****y**** ****Op**e**n**AI**, ****ba**s**e**d** ****o****n****
    ****t****h**e** ****G****P**T** (****Gene**r**at**ive** ****P****r**e**-****tra**i**n**ed**
    ****Tran**sf**or**mer**) ****arch**it**ec**tur**e. ****I****t**** ****i****s****
    ****des**i**gn**ed** ****t****o**** ****unde**r**st**and** ****a****n**d** ****gen**e**ra**te**
    ****te****x**t** ****i****n**** ****a**** ****nat**u**r**al** ****w****a**y**,
    ****all**o**wi**ng** ****i****t**** ****t****o**** ****as**s**i**st** ****i****n****
    ****a**** ****wi****d**e** ****var**i**e**ty** ****o****f**** ****ta**s**k**s**,
    ****ran**g**i**ng** ****fr****o**m** ****con**t**e**nt** ****wri**t**i**ng** ****a****n**d**
    ****co****d**e** ****gene**r**at**ion**, ****conv**er**sa**tio**n, ****a****n**d**
    ****cus**t**om**er** ****sup**p**o**rt**.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是由OpenAI开发的一种语言模型，基于GPT（生成式预训练Transformer）架构。它旨在以自然的方式理解和生成文本，使其能够协助完成各种任务，从内容写作和代码生成到对话和客户支持等。
- en: '****H****o**w** ****do****e**s** ****Cha**t**G**PT** ****wo****r**k**?'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT是如何工作的？**'
- en: '****Cha**t**G**PT** ****w****a**s** ****tra**i**n**ed** ****o****n**** ****a****
    ****va****s**t** ****co**r**p**us** ****o****f**** ****te****x**t** ****fr****o**m**
    ****t****h**e** ****Int**e**rn**et**. ****Th****i**s** ****tra**i**ni**ng** ****al**l**o**ws**
    ****h****i**m** ****t****o**** ****unde**r**st**and** ****t****h**e** ****con**t**e**xt**,
    ****inte**r**pr**et** ****t****h**e** ****req**u**es**ts** ****a****n**d** ****pro**v**i**de**
    ****rel**e**va**nt** ****ans**w**e**rs**. ****T****h**e** ****mo**d**e**l** ****us****e**s**
    ****wh****a**t** ****i****t**** ****h****a**s** ****lea**r**n**ed** ****t****o****
    ****pre**d**i**ct** ****t****h**e** ****ne****x**t** ****mo****s**t** ****li**k**e**ly**
    ****te****x**t**, ****ba**s**e**d** ****o****n**** ****t****h**e** ****in**p**u**t**
    ****i****t**** ****rec**e**iv**es**.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是在从互联网上收集的大量文本语料库上训练的。这种训练使它能够理解上下文、解释要求并提供相关答案。该模型使用它所学习到的知识来预测接收到的输入文本最可能的后继文本。
- en: '****Capa**bi**li**tie**s ****a****n**d** ****limi**ta**ti**ons**'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**能力和限制**'
- en: '****Capa**bi**li**tie**s: ****Cha**t**G**PT** ****ex**c**e**ls** ****a****t****
    ****under**st**an**din**g ****con**t**e**xt**, ****wri**t**i**ng** ****cons**i**st**ent**
    ****a****n**d** ****info**rm**at**ive** ****te**x**t**s**, ****tran**sl**at**ing**,
    ****answ**e**ri**ng** ****ques**t**io**ns**, ****a****n**d** ****mu****c**h**
    ****mo****r**e**.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**能力**：ChatGPT在理解上下文、撰写连贯且信息丰富的文本、翻译、回答问题和许多其他方面都表现出色。'
- en: '****Limi**ta**ti**ons**: ****Wh**i**l**e** ****impr**e**ss**ive**, ****Cha**t**G**PT**
    ****i****s**** ****n****o**t** ****fool**p**ro**of**. ****Th**e**i**r** ****ans**w**e**rs**
    ****c****a**n** ****some**t**im**es** ****b****e**** ****inac**c**ur**ate**, ****out**d**at**ed**
    (****th**e**i**r** ****tra**i**ni**ng** ****st**o**p**s** ****a****t**** ****a****
    ****cer**t**a**in** ****po**i**n**t** ****i****n**** ****ti****m**e**), ****o****r****
    ****n****o**t** ****ref**l**e**ct** ****t****h**e** ****fu****l**l** ****comp**l**ex**ity**
    ****o****f**** ****a**** ****to**p**i**c**.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**限制**：虽然ChatGPT令人印象深刻，但它并非万无一失。它的回答有时可能不准确、过时（它们的训练在某个时间点停止），或者无法反映一个主题的全部复杂性。'
- en: '****1****.****2**** ****Prin**c**ip**les** ****o****f**** ****inte**ra**ct**ing**
    ****wi****t**h** ****Cha**t**G**PT**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.2 与ChatGPT交互的原则**'
- en: '****As**k**i**ng** ****cl**e**a**r** ****a****n**d** ****pre**c**i**se** ****ques**t**io**ns**'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**提出清晰和精确的问题**'
- en: '****T****h**e** ****cla**r**i**ty** ****a****n**d** ****acc**u**ra**cy** ****o****f****
    ****yo****u**r** ****pro**m**p**ts** ****a****r**e** ****cru**c**i**al** ****t****o****
    ****get**t**i**ng** ****us**e**f**ul** ****ans**w**e**rs** ****fr****o**m** ****Cha**t**G**PT**.
    ****B****e**** ****su****r**e** ****t****o**** ****fr**a**m**e** ****yo****u**r**
    ****req**u**es**ts** ****i****n**** ****a**** ****w****a**y** ****th****a**t**
    ****i****s**** ****cl**e**a**r** ****ab**o**u**t** ****t****h**e** ****in**t**e**nt**
    ****a****n**d** ****con**t**e**xt**.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**你提出的问题的清晰度和准确性对于从ChatGPT获得有用答案至关重要。确保以清晰的方式表达你的请求，使其意图和上下文明确**。'
- en: '****Inte**rp**re**tin**g ****t****h**e** ****ans**w**e**rs**'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**解读答案**'
- en: '****I****t**** ****i****s**** ****impo**r**ta**nt** ****t****o**** ****kn****o**w**
    ****h****o**w** ****t****o**** ****inte**r**pr**et** ****Cha**t**G**PT**''****s****
    ****resp**o**ns**es**. ****Gi**v**e**n** ****i****t**s** ****limi**ta**ti**ons**,
    ****al**w**a**ys** ****ta****k**e** ****t****h**e** ****ti****m**e** ****t****o****
    ****ch**e**c**k** ****t****h**e** ****info**rm**at**ion** ****pro**v**id**ed**,
    ****espe**c**ia**lly** ****i****f**** ****i****t**** ****i****s**** ****us****e**d**
    ****i****n**** ****a**** ****prof**es**si**ona**l ****o****r**** ****dec**i**si**on**-****ma**k**i**ng**
    ****con**t**e**xt**.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**了解如何解释ChatGPT的响应非常重要。鉴于其局限性，始终花时间检查提供的信息，特别是在用于专业或决策制定情境时**。'
- en: '****Ad**j**u**st** ****a****n**d** ****re**f**i**ne** ****pro**m**p**ts**'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**调整和优化提示**'
- en: '****I****f**** ****Cha**t**G**PT**''****s**** ****fi**r**s**t** ****an**s**w**er**
    ****do**e**s**n**''****t**** ****fu**l**l**y** ****me****e**t** ****yo****u**r**
    ****expe**ct**at**ion**s, ****fe****e**l** ****fr****e**e** ****t****o**** ****re**f**i**ne**
    ****yo****u**r** ****pr**o**m**pt** ****o****r**** ****a****s**k** ****fo**l**l**ow**-****u****p****
    ****ques**t**io**ns** ****t****o**** ****cla**r**i**fy** ****o****r**** ****de**e**p**en**
    ****t****h**e** ****an**s**w**er**.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果ChatGPT的第一个答案没有完全满足你的期望，请随时优化你的提示或提出后续问题以澄清或深化答案**。'
- en: '****I****n**** ****sum**m**a**ry**, ****th****i**s** ****mo**d**u**le** ****pro**v**id**es**
    ****y****o**u** ****wi****t**h** ****t****h**e** ****nece**s**sa**ry** ****foun**d**at**ion**
    ****t****o**** ****unde**r**st**and** ****a****n**d** ****st**a**r**t** ****inte**ra**ct**ing**
