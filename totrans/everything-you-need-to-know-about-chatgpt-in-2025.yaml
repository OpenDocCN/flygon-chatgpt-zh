    ****b****u**t** ****al****s**o** ****t****o**** ****en**s**u**re** ****th****a**t**
    ****i****t**** ****i****s**** ****us****e**d** ****ethi**c**al**ly** ****a****n**d**
    ****f****o**r** ****t****h**e** ****ben**e**f**it** ****o****f**** ****a****l**l**.
    ****Th****i**s** ****app**r**oa**ch** ****cont**r**as**ts** ****wi****t**h** ****deve**lo**pm**ent**
    ****dr**i**v**en** ****b****y**** ****pu**r**e**ly** ****eco**n**om**ic** ****o****r****
    ****comp**et**it**ive** ****obje**c**ti**ves**, ****put**t**i**ng** ****a****t****
    ****t****h**e** ****ce**n**t**er** ****t****h**e** ****id****e**a** ****o****f****
    ****pro**g**re**ss** ****ali**g**n**ed** ****wi****t**h** ****hu**m**a**n** ****va**l**u**es**.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**OpenAI** **的** **使命** **核心** **是** **安全** **和** **有益** **的** **通用** **人工智能**
    **（** **AGI** **）** **的概念** **。** **AGI** **是一种** **能够** **以** **与** **人类** **认知**
    **任务** **相当** **或** **更** **优越** **的方式** **执行** **任何** **人类** **认知** **任务** **的**
    **智能** **，** **它** **既** **是一个** **梦想** **，** **也是一个** **挑战** **。** **OpenAI**
    **不仅** **寻求** **构建** **先进** **技术** **，** **还** **致力于** **确保** **它** **被** **道德**
    **地** **使用** **，** **并且** **为** **所有人** **带来** **好处** **。** **这种** **方法** **与**
    **仅** **由** **经济** **或** **竞争** **目标** **驱动的** **开发** **形成** **对比** **，** **将**
    **人类** **价值观** **与** **进步** **的理念** **相结合** **。**'
