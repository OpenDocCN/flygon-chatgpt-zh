  prefs: []
  type: TYPE_NORMAL
- en: What are the AI prompts for social media?
  prefs: []
  type: TYPE_NORMAL
- en: An AI prompt for social media instructs a tool to generate social media content.
    AI prompts help social media marketers brainstorm new post ideas, see alternative
    drafts, or even create entire posts.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, Plantable''s new AI feature offers four preset prompts for rewriting
    posts:'
  prefs: []
  type: TYPE_NORMAL
- en: Shorten for clarity and conciseness.
  prefs: []
  type: TYPE_NORMAL
- en: Make your text more concise and attention-grabbing.
  prefs: []
  type: TYPE_NORMAL
- en: Expanding on a concept allows for deeper exploration and additional information.
  prefs: []
  type: TYPE_NORMAL
- en: Surprise me to get a completely new perspective on your post.
  prefs: []
  type: TYPE_NORMAL
- en: All four of these are AI prompts because you are (literally) prompting the tool
    to follow the instructions.
  prefs: []
  type: TYPE_NORMAL
