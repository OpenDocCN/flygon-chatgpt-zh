- en: Story-driven
  id: totrans-1927
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以故事驱动
- en: Humorous or edgy
  id: totrans-1928
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 幽默或尖锐
- en: Formal or academic
  id: totrans-1929
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正式或学术
- en: 'Prompt example:'
  id: totrans-1930
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
