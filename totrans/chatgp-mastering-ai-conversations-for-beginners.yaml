  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅数字营销可以帮助你个性化广告并扩大你的覆盖范围，而且它还能以比传统路线提供的非个性化、小众市场营销更低的价格做到这一点。在报纸上购买广告空间来放置你的广告，即使是想要在电视上获得一些时间来向你的受众讲话，也是相当昂贵的。传统营销通常带有相当高的价格标签，而且它还从你手中夺走了对营销过程的大部分控制权。一旦你将你的广告提交给报纸、广播电台或电视台等，那就结束了。你只能坐下来等待你的广告出现。
