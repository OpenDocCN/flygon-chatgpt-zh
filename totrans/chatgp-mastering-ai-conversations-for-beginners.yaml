    ****pred**ictiv**e ****fea**tur**e, ****y**ou** ****d**on**’****t**** ****ev**en**
    ****ha**ve** ****t**o** ****ty**pe** ****i**n** ****t**he** ****fu**ll** ****ph**ras**e
    ****be**for**e ****i**t** ****st**art**s ****sugg**estin**g ****opt**ion**s ****wit**hou**t
    ****ev**er** ****fee**lin**g ****li**ke** ****i**t**’****s**** ****be**ing** ****intr**usiv**e
    ****o**r** ****inte**rrupti**ng ****y**ou**. ****Th**is** ****i**s** ****w**hy**
    ****Go**ogl**e ****Se**arc**h ****i**s** ****of**ten** ****cons**idere**d ****t**he**
    ****sta**ndar**d ****i**n** ****tu**rn**-****ba**sed** ****conve**rsation**al
    ****de**sig**n (****Ham**pto**n, ****20**19**).'
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: '****一场对话并不仅仅是关于两方各自说话，而是涉及一个人说话，至少有另一个人在听，在他们说话之前。如果多于一个人试图同时说话，就会陷入混乱，对话就会破裂，通常以一场争吵结束。虽然AI当然不会一直对你大喊大叫，但人类对AI的喊叫，甚至因为挫败而对机器大喊，这种情况是时有发生的。为了防止这种情况发生，请确保你的聊天机器人的响应和指令快速且清晰，避免任何冗长的独白，并始终清楚地表明轮到谁说话，轮到谁回答。AI获得基于轮询的对话设计正确的最佳例子之一是谷歌搜索。你输入你想要的搜索词，搜索机器人立即为你提供最相关的结果。甚至更好，有了谷歌搜索的预测功能，你甚至不需要在它开始建议选项之前输入完整的短语，而不会感到它是在侵犯你的隐私或打断你。这就是为什么谷歌搜索经常被认为是基于轮询的对话设计的标准（Hampton,
    2019）。'
