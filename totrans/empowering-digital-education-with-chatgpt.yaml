  type: TYPE_NORMAL
- en: '**Mohamed Lahby** is Associate Professor at the Higher Normal School (ENS),
    Hassan II University of Casablanca, Morocco. He received a PhD in Computer Science
    from the Hassan II University of Casablanca in 2013\. He is a senior member of
    IEEE and Director of Laboratory of Applied Mathematics and Computer Sciences,
    Higher Normal School, Hassan II University of Casablanca, Morocco. His research
    interests are wireless communication and network mobility management, QoS/QoE,
    Internet of Things, Smart Cities, Optimization, Machine Learning, and Generative
    AI. He has published more than 60 papers and has edited more than 10 books published
    by Springer and Taylor and Francis. He has served and continues to serve on executive
    and technical program committees of numerous international conferences such as
    IEEE PIMRC, ICC, NTMS, IWCMC, WINCOM, ISNCC. He also serves as a referee of many
    prestigious Elsevier journals: *Ad Hoc Networks*, *Applied Computing and Informatics*,
    and *International Journal of Disaster Risk Reduction*. He organized and participated
    in more than 20 conferences and workshops. He is the chair of many international
    workshops and special sessions such as MLNGSN’19, CSPSC’19, MLNGSN’20, MLNGSN’21,
    AI2SC ’20, and WCTCP’20, CIOT’22, ISGTA’2023, and ISGTA’2025.'
