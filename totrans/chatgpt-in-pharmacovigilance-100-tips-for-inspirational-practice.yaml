- en: '| Saudi Arabi | Varies | Saudi Arabia''s AI Ethics Principles align with its
    national vision, fostering AI for development and economic growth. These involve
    key stakeholders, set behavioral guidelines, and focus on data privacy and responsible
    AI use, covering integrity, privacy, societal benefits, and transparency. They
    guide national and organizational roles in AI ethics implementation.[https://istitlaa.ncc.gov.sa/ar/Transportation/NDMO/AIEthicsPrinciples/Pages/default.aspx#](https://istitlaa.ncc.gov.sa/ar/Transportation/NDMO/AIEthicsPrinciples/Pages/default.aspx)
    |'
  id: totrans-324
  prefs: []
  type: TYPE_TB
  zh: '| 沙特阿拉伯 | 多种 | 沙特阿拉伯的人工智能伦理原则与其国家愿景相一致，促进人工智能的发展和经济增长。这些原则涉及关键利益相关者，设定行为准则，并关注数据隐私和负责任的人工智能使用，包括诚信、隐私、社会效益和透明度。它们指导国家组织和人工智能伦理实施中的角色。[https://istitlaa.ncc.gov.sa/ar/Transportation/NDMO/AIEthicsPrinciples/Pages/default.aspx#](https://istitlaa.ncc.gov.sa/ar/Transportation/NDMO/AIEthicsPrinciples/Pages/default.aspx)
