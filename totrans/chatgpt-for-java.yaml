  type: TYPE_NORMAL
  zh: 使用Java创建一个问答机器人应用程序以回答频道的提问
- en: Of course, now that we’ve done all the prerequisites necessary and we know the
    name of the channel that we want to monitor for questions from our users, let’s
    get to the code in Java that joins our server and accesses all the messages from
    a specific Discord channel.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，现在我们已经完成了所有必要的先决条件，并且知道了我们想要监控以获取用户问题的频道的名称，让我们来看看Java代码，该代码将加入我们的服务器并访问特定Discord频道的所有消息。
