  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●      ChatGPT asks:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: ●      ChatGPT提问：
- en: What is your niche or industry?
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的细分市场或行业是什么？
- en: Who is your primary TikTok audience (age, interests, demographics)?
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的主要TikTok受众是谁（年龄、兴趣、人口统计）？
- en: What type of content does your audience engage with most?
  id: totrans-189
  prefs:
