- en: '**10\. Data Analysis**'
  id: totrans-1535
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**10. 数据分析**'
- en: Too often, we work through mounds of data, merge data, transform files from
    one format to another, put data into graph form, and do other more time-consuming
    tasks.
  id: totrans-1536
  prefs: []
  type: TYPE_NORMAL
  zh: 太常了，我们处理大量数据，合并数据，将文件从一种格式转换为另一种格式，将数据放入图表形式，并执行其他更多耗时的工作。
- en: The good news is that all these can be done quickly and efficiently, without
    deep knowledge of data science, using ChatGPT Data Analysis.
  id: totrans-1537
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，所有这些都可以通过使用ChatGPT数据分析快速高效地完成，无需深入了解数据科学。
- en: In this chapter, we delve into this revolutionary way you interact with your
    data provided by ChatGPT Data Analysis. We will begin by comparing ChatGPT and
    ChatGPT Data Analysis, shedding light on the transformative shift that empowers
    you to work with your data. Then, we will dive deep into the capabilities of Data
    Analysis.
  id: totrans-1538
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将深入探讨ChatGPT数据分析提供给您与数据交互的革命性方式。我们将首先比较ChatGPT和ChatGPT数据分析，揭示赋予您与数据工作的变革性转变。然后，我们将深入探讨数据分析的能力。
- en: Throughout this chapter, we have crafted exercises that allow you to put your
    newfound knowledge to the test.
  id: totrans-1539
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们设计了练习，让您可以将新获得的知识付诸实践。
- en: A word of caution, though. While ChatGPT Plus can assist with data analysis,
    we must exercise critical thinking and validate the results. It is a tool that
    provides insights but works best when combined with human expertise and rigorous
    analysis.
  id: totrans-1540
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT Plus可以帮助进行数据分析，但我们必须进行批判性思考并验证结果。这是一个提供洞察力的工具，但与人类专业知识及严谨分析相结合时效果最佳。
- en: Advanced Data Analysis can be a game-changer.
  id: totrans-1541
  prefs: []
  type: TYPE_NORMAL
  zh: 高级数据分析可能是一个颠覆性的变革。
- en: '**10.1 What is Advanced Data Analysis?**'
  id: totrans-1542
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**10.1 高级数据分析是什么？**'
- en: If we compare ChatGPT to a "Knowledge Keeper," a wizard of words, we can compare
    Data Analysis to a capable "Data Scientist" assistant.
  id: totrans-1543
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将ChatGPT比作“知识守护者”，一个文字的巫师，那么我们可以将数据分析比作一个能干的“数据科学家”助手。
- en: 'The "Data Scientist" is knowledgeable but needs specific instructions and some
    oversight. It excels in tasks like coding, interpreting documents, and visualizing
    data. It is skilled in computer programming and adept at using specialized tools.
    With some observations:'
  id: totrans-1544
  prefs: []
  type: TYPE_NORMAL
  zh: “数据科学家”知识渊博，但需要具体的指令和一些监督。它在编码、解读文档和可视化数据等任务上表现出色。它擅长计算机编程，并熟练使用专业工具。以下是一些观察结果：
- en: – It is confined to its super powerful computer but has no internet access.
    So, for any task you assign, you must hand over all necessary files and data directly.
  id: totrans-1545
  prefs: []
  type: TYPE_NORMAL
  zh: – 它受限于其超级强大的计算机，但没有互联网访问。因此，对于您分配的任何任务，您必须直接提交所有必要的文件和数据。
- en: – It can write Python code to accomplish complex tasks, with no need to understand
    the code to benefit from it.
  id: totrans-1546
  prefs: []
  type: TYPE_NORMAL
  zh: – 它可以编写Python代码来完成复杂任务，无需理解代码即可从中受益。
- en: – Its memory is limited. It remembers only the tasks and instructions during
    the current interaction. It does not remember anything about past interactions
    or unfinished tasks. When you start a new chat, it is like meeting you for the
    first time.
  id: totrans-1547
  prefs: []
  type: TYPE_NORMAL
  zh: – 它的记忆有限。它只记得当前交互中的任务和指令。它不会记住关于过去交互或未完成的任务任何事情。当您开始新的聊天时，就像第一次见到您一样。
- en: – It is skilled but not infallible. It often does not check its output unless
    is requested. You must review and double-check every work for any errors or oversights.
    This vigilance ensures that the output you receive is accurate and reliable.
  id: totrans-1548
  prefs: []
  type: TYPE_NORMAL
  zh: – 它很擅长但并非完美无缺。它通常不会检查其输出，除非被要求。您必须审查并双重检查每一项工作，以确保没有错误或疏忽。这种警惕性确保您收到的输出是准确可靠的。
- en: '![Figure10-1_CMYK.tif](../Images/Figure10-1_CMYK_fmt.png)'
  id: totrans-1549
  prefs: []
  type: TYPE_IMG
  zh: '![图10-1_CMYK.tif](../Images/Figure10-1_CMYK_fmt.png)'
- en: '*Figure 10.1 LLM''s* vs. *Data Analysis Capabilities*'
  id: totrans-1550
  prefs: []
  type: TYPE_NORMAL
  zh: '*图10.1 LLM与数据分析能力*'
- en: The best advice is to be very specific about your goals, constraints, needs,
    etc. Be explicit in your instructions. For instance, if you need files organized,
    specify how you want them named and what folder structure you prefer.
  id: totrans-1551
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的建议是关于您的目标、限制、需求等要非常具体。在您的指令中要明确。例如，如果您需要文件组织，请指定您希望它们如何命名以及您偏好的文件夹结构。
- en: Always confirm if the "Data Scientist" understood your task correctly. It will
    often mirror what it is about to do, offering a chance for adjustments (Figure
    10.1).
  id: totrans-1552
  prefs: []
  type: TYPE_NORMAL
  zh: 总是确认“数据科学家”是否正确理解了您的任务。它通常会反映它即将要做的事情，提供调整的机会（图10.1）。
- en: You can enable it if you have a ChatGPT Plus subscription.
  id: totrans-1553
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以启用它，如果您有ChatGPT Plus订阅。
- en: The fundamental difference between the "Knowledge Keeper" and the "Data Scientist"
    lies in their ability to interact with data files.
  id: totrans-1554
  prefs: []
  type: TYPE_NORMAL
  zh: “知识守护者”与“数据科学家”之间的基本区别在于它们与数据文件交互的能力。
- en: 'While both allow you to send chat messages and receive responses, ChatGPT Data
    Analysis offers an additional feature: an "Upload file" button. This feature allows
    users to upload their data files: sales data, documents or images, and videos.'
  id: totrans-1555
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然两者都允许您发送聊天消息并接收回复，但ChatGPT数据分析提供了一个额外的功能：“上传文件”按钮。此功能允许用户上传他们的数据文件：销售数据、文档或图像和视频。
- en: When dealing with text-based tasks, "Master Librarian" alone is often enough.
    For data manipulation, numerical calculations, or file operations, expect a "Data
    Scientist" to be involved.
  id: totrans-1556
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理基于文本的任务时，通常只需要“图书管理员”。对于数据处理、数值计算或文件操作，预期将涉及“数据科学家”。
- en: Data Analysis in the context of ChatGPT allows the usage of various file formats
    for data import, export, and manipulation. Here is a simple table that outlines
    the supported file formats and file sizes up to 512 MB:^([1](#footnote-10801-1))
  id: totrans-1557
  prefs: []
  type: TYPE_NORMAL
  zh: 在 ChatGPT 的上下文中进行数据分析允许使用各种文件格式进行数据导入、导出和处理。以下是一个简单的表格，概述了支持的文件格式和最大 512 MB
    的文件大小：^([1](#footnote-10801-1))
- en: '| **File Format** | **Extension** | **Purpose** | **Notes** |'
  id: totrans-1558
  prefs: []
  type: TYPE_TB
  zh: '| **文件格式** | **扩展名** | **用途** | **备注** |'
- en: '| CSV | .csv | Data Import/Export | Comma-separated values |'
  id: totrans-1559
  prefs: []
  type: TYPE_TB
  zh: '| CSV | .csv | 数据导入/导出 | 以逗号分隔的值 |'
- en: '| JSON | .json | Data Import/Export | JavaScript Object Notation |'
  id: totrans-1560
  prefs: []
  type: TYPE_TB
  zh: '| JSON | .json | 数据导入/导出 | JavaScript 对象表示法 |'
- en: '| Excel | .xls, .xlsx | Data Import/Export | Microsoft Excel formats |'
  id: totrans-1561
  prefs: []
  type: TYPE_TB
  zh: '| Excel | .xls, .xlsx | 数据导入/导出 | 微软 Excel 格式 |'
- en: '| XML | .xml | Data Import/Export | eXtensible Markup Language |'
  id: totrans-1562
  prefs: []
  type: TYPE_TB
  zh: '| XML | .xml | 数据导入/导出 | 可扩展标记语言 |'
- en: '| SQL | .sql | Data Export | Structured Query Language |'
  id: totrans-1563
  prefs: []
  type: TYPE_TB
  zh: '| SQL | .sql | 数据导出 | 结构化查询语言 |'
- en: '| HTML | .html | Data Export | HyperText Markup Language |'
  id: totrans-1564
  prefs: []
  type: TYPE_TB
  zh: '| HTML | .html | 数据导出 | 超文本标记语言 |'
- en: '| PDF | .pdf | Data Export | Portable Document Format |'
  id: totrans-1565
  prefs: []
  type: TYPE_TB
  zh: '| PDF | .pdf | 数据导出 | 可移植文档格式 |'
- en: '| TXT | .txt | Data Import/Export | Plain Text |'
  id: totrans-1566
  prefs: []
  type: TYPE_TB
  zh: '| TXT | .txt | 数据导入/导出 | 纯文本 |'
- en: These file formats are supported by data analysis tools and libraries like Pandas,
    Numpy, and various SQL databases, making them compatible with advanced data analysis
    tasks you might perform in conjunction with ChatGPT.
  id: totrans-1567
  prefs: []
  type: TYPE_NORMAL
  zh: 这些文件格式由数据分析工具和库（如 Pandas、Numpy 和各种 SQL 数据库）支持，使它们与你在 ChatGPT 的辅助下可能执行的先进数据分析任务兼容。
- en: Once the task is complete, ask the ChatGPT to compile the work into a downloadable
    format, like a zip file, so you can easily retrieve it.
  id: totrans-1568
  prefs: []
  type: TYPE_NORMAL
  zh: 任务完成后，请要求 ChatGPT 将工作编译成可下载的格式，如 zip 文件，以便你轻松检索。
- en: Data Analysis is exclusively available to ChatGPT Plus subscribers.
  id: totrans-1569
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析仅对 ChatGPT Plus 订阅者开放。
- en: '**10.2 Advanced Data Analysis: The User Guide**'
  id: totrans-1570
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**10.2 高级数据分析：用户指南**'
- en: 'The new capabilities of Data Analysis for ChatGPT aim to enhance the analysis
    of text-rich documents:'
  id: totrans-1571
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 数据分析的新功能旨在增强对文本丰富文档的分析：
- en: '– Synthesis: Analyze information from documents to generate content or insights.'
  id: totrans-1572
  prefs: []
  type: TYPE_NORMAL
  zh: – 综合分析：从文档中分析信息以生成内容或见解。
- en: '– Transformation: Alter the presentation of information without changing its
    underlying essence.'
  id: totrans-1573
  prefs: []
  type: TYPE_NORMAL
  zh: – 转换：在不改变信息本质的情况下改变信息的呈现方式。
- en: '– Extraction: Identify and pull out specific pieces of data from a document.'
  id: totrans-1574
  prefs: []
  type: TYPE_NORMAL
  zh: – 提取：从文档中识别并提取特定的数据片段。
- en: '**Step 1: Define Your Objective**'
  id: totrans-1575
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1：定义你的目标**'
- en: Begin by clarifying what you want to achieve with your data analysis. Are you
    looking for trends, patterns, or specific insights? It will guide your interactions
    with ChatGPT.
  id: totrans-1576
  prefs: []
  type: TYPE_NORMAL
  zh: 首先明确你希望通过数据分析实现什么目标。你是想寻找趋势、模式还是特定的见解？这将指导你与 ChatGPT 的互动。
- en: For example, for a fast-moving consumer goods (FMCG) distributor, the objective
    could be to analyze sales and identify the top-selling products. Or explore whether
    there is any correlation between the sales of these products and other items.
  id: totrans-1577
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，对于一个快速消费品（FMCG）分销商来说，目标可能是分析销售情况并确定最畅销的产品。或者探索这些产品的销售与其他商品之间是否存在任何相关性。
- en: '**Step 2: Prepare Your Data**'
  id: totrans-1578
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 2：准备你的数据**'
- en: Before interacting with ChatGPT, organize your data into a format that is easy
    to understand. It could be in tables, spreadsheets, or any other structured data
    format.
  id: totrans-1579
  prefs: []
  type: TYPE_NORMAL
  zh: 在与 ChatGPT 互动之前，将你的数据组织成易于理解的形式。它可以是表格、电子表格或任何其他结构化数据格式。
- en: Let's assume the real dataset of the small distribution company includes columns
    such as "Product Name," "Sales," and "Date."
  id: totrans-1580
  prefs: []
  type: TYPE_NORMAL
  zh: 假设小型分销公司的实际数据集包括“产品名称”、“销售”和“日期”等列。
- en: '**Step 3: Start a Conversation**'
  id: totrans-1581
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 3：开始对话**'
- en: 'Open up a conversation with ChatGPT and introduce the context of your data
    analysis project. For instance: "I have a dataset of sales data for various fast-moving
    consumer goods. I want to analyze the sales and identify the top-selling products.
    Additionally, I''m curious to know if there''s any correlation between the sales
    of these products and other items. Could you help me with this analysis?"'
  id: totrans-1582
  prefs: []
  type: TYPE_NORMAL
  zh: 与 ChatGPT 开始对话，并介绍你的数据分析项目背景。例如：“我有一组各种快速消费品销售数据的数据集。我想分析销售情况并确定销量最高的产品。此外，我还想了解这些产品的销售与其他商品之间是否存在任何相关性。你能帮我进行这项分析吗？”
- en: '**Step 4: Ask Specific Questions**'
  id: totrans-1583
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 4：提出具体问题**'
- en: 'Proceed with specific questions related to the analysis:'
  id: totrans-1584
  prefs: []
  type: TYPE_NORMAL
  zh: 提出与分析相关的具体问题：
- en: '*Can you tell me which products are the top sellers based on the sales data?*'
  id: totrans-1585
  prefs: []
  type: TYPE_NORMAL
  zh: '*你能告诉我哪些产品是根据销售数据确定的销量最高的吗？*'
- en: '*Is there any noticeable pattern or trend in the sales figures of these top-selling
    products?*'
  id: totrans-1586
  prefs: []
  type: TYPE_NORMAL
  zh: '*这些顶级产品的销售数据中是否存在明显的模式或趋势？*'
- en: '*Could you explore whether there''s any correlation between the sales of the
    top products and the sales of other items in the dataset?*'
  id: totrans-1587
  prefs: []
  type: TYPE_NORMAL
  zh: '*你能探索一下顶级产品的销售与其他数据集中的商品销售之间是否存在任何相关性吗？*'
- en: '**Step 5: Seek Explanations**'
  id: totrans-1588
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 5：寻求解释**'
- en: 'Do not just ask for results—ask ChatGPT to explain its reasoning. For example:'
  id: totrans-1589
  prefs: []
  type: TYPE_NORMAL
  zh: 不要只要求结果——要求 ChatGPT 解释其推理。例如：
- en: '*Could you explain the factors contributing to the increase in sales during
    a certain month?*'
  id: totrans-1590
  prefs: []
  type: TYPE_NORMAL
  zh: '*你能解释一下导致某个月份销售增加的因素吗？*'
- en: '*Why do you think these particular products are the top sellers?*'
  id: totrans-1591
  prefs: []
  type: TYPE_NORMAL
  zh: '*你认为为什么这些特定产品是销量最高的？*'
- en: '*Could you explain any factors contributing to the observed sales pattern?*'
  id: totrans-1592
  prefs: []
  type: TYPE_NORMAL
  zh: '*你能解释一下导致观察到的销售模式的因素吗？*'
- en: '**Step 6: Visualize Insights**'
  id: totrans-1593
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 6：可视化洞察**'
- en: 'If your data includes numerical values, ask ChatGPT to help create visualizations.
    For instance:'
  id: totrans-1594
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的数据包括数值，请 ChatGPT 帮助创建可视化。例如：
- en: '*Please generate a line graph to display the sales trends over the past year.*'
  id: totrans-1595
  prefs: []
  type: TYPE_NORMAL
  zh: '*请生成一个折线图，以显示过去一年的销售趋势。*'
- en: '*Can you generate a bar chart illustrating the sales distribution of the top-selling
    products?*'
  id: totrans-1596
  prefs: []
  type: TYPE_NORMAL
  zh: '*你能生成一个条形图，展示顶级产品的销售分布吗？*'
- en: '*Please create a scatter plot to show the relationship between the sales of
    the top products and the sales of other items.*'
  id: totrans-1597
  prefs: []
  type: TYPE_NORMAL
  zh: '*请创建一个散点图，以显示顶级产品销售与其他商品销售之间的关系。*'
- en: '**Step 7: Refine and Iterate**'
  id: totrans-1598
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 7：精炼和迭代**'
- en: Based on the initial insights, continue refining your questions and iterating
    the conversation with ChatGPT to delve deeper into the analysis.
  id: totrans-1599
  prefs: []
  type: TYPE_NORMAL
  zh: 根据初步洞察，继续完善你的问题，并与 ChatGPT 进行迭代对话，以深入分析。
- en: '**Step 8: Summarize Findings**'
  id: totrans-1600
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 8：总结发现**'
- en: Toward the end of your interaction, ask ChatGPT to summarize the key findings
    from the data analysis. It will help you consolidate the information for reporting
    or decision-making.
  id: totrans-1601
  prefs: []
  type: TYPE_NORMAL
  zh: 在互动的尾声，请 ChatGPT 总结数据分析的关键发现。这将有助于你为报告或决策整合信息。
- en: Throughout the process, remember that ChatGPT Plus aids the analysis, but your
    critical thinking and domain knowledge are essential for interpreting the results
    accurately. Feel free to modify the questions or instructions based on the specific
    dataset and nuances you encounter.
  id: totrans-1602
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个过程中，请记住 ChatGPT Plus 帮助分析，但你的批判性思维和领域知识对于准确解释结果至关重要。根据你遇到的具体数据集和细微差别，请随意修改问题或指令。
- en: Following these steps, you can effectively leverage ChatGPT Plus to analyze
    sales data and uncover valuable insights that drive informed decisions.
  id: totrans-1603
  prefs: []
  type: TYPE_NORMAL
  zh: 按照这些步骤，你可以有效地利用 ChatGPT Plus 分析销售数据并揭示有价值的见解，从而驱动明智的决策。
- en: Happy data analyzing!
  id: totrans-1604
  prefs: []
  type: TYPE_NORMAL
  zh: 喜欢数据分析！
- en: Example
  id: totrans-1605
  prefs: []
  type: TYPE_NORMAL
  zh: 示例
- en: Data set
  id: totrans-1606
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集
- en: '| **Product Name** | **Sales April** | **Sales May** | **Sales June** | **Sales
    July** | **Sales August** |'
  id: totrans-1607
  prefs: []
  type: TYPE_TB
  zh: '| **产品名称** | **4月销售** | **5月销售** | **6月销售** | **7月销售** | **8月销售** |'
- en: '| Soap | 131.00 | 141.00 | 154.00 | 167.00 | 175.00 |'
  id: totrans-1608
  prefs: []
  type: TYPE_TB
  zh: '| 肥皂 | 131.00 | 141.00 | 154.00 | 167.00 | 175.00 |'
- en: '| Shampoo | 138.00 | 139.00 | 146.00 | 152.00 | 160.00 |'
  id: totrans-1609
  prefs: []
  type: TYPE_TB
  zh: '| 洗发水 | 138.00 | 139.00 | 146.00 | 152.00 | 160.00 |'
- en: '| Dish Soap | 157.00 | 153.00 | 149.00 | 151.00 | 152.00 |'
  id: totrans-1610
  prefs: []
  type: TYPE_TB
  zh: '| 洗洁精 | 157.00 | 153.00 | 149.00 | 151.00 | 152.00 |'
- en: '| Laundry Detergent |   84.00 |   86.00 |   80.00 |   81.00 |   83.00 |'
  id: totrans-1611
  prefs: []
  type: TYPE_TB
  zh: '| 洗衣液 | 84.00 | 86.00 | 80.00 | 81.00 | 83.00 |'
- en: 'Prompt:'
  id: totrans-1612
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '*The dataset is from a small FMCG distribution company. The dataset has six
    columns: Product Name, Sales April, Sales May, Sales June, Sales July, and Sales
    August. The first row of the dataset contains header names. Please:*'
  id: totrans-1613
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据集来自一家小型快速消费品分销公司。数据集有六个列：产品名称、4月销售、5月销售、6月销售、7月销售和8月销售。数据集的第一行包含标题名称。请：*'
- en: 'Step 1:'
  id: totrans-1614
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：
- en: '*Analyze the data structure.*'
  id: totrans-1615
  prefs: []
  type: TYPE_NORMAL
  zh: '*分析数据结构。*'
- en: 'Step 2:'
  id: totrans-1616
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：
- en: '*Calculate the correlation between all product pairs.*'
  id: totrans-1617
  prefs: []
  type: TYPE_NORMAL
  zh: '*计算所有产品对之间的相关性。*'
- en: 'Step 3:'
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：
- en: '*Visualize the sales and write the correlation factors on the graph.*'
  id: totrans-1619
  prefs: []
  type: TYPE_NORMAL
  zh: '*可视化销售并将在图上写上相关系数。*'
- en: 'Step 4:'
  id: totrans-1620
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：
- en: '*Find the top seller product, extract data, and visualize the sales of the
    top seller using different colors.*'
  id: totrans-1621
  prefs: []
  type: TYPE_NORMAL
  zh: '*找到销量最高的产品，提取数据，并使用不同的颜色可视化销量最高的产品。*'
- en: 'Step 5:'
  id: totrans-1622
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：
- en: '*Find the best method to estimate sales for each product for September and
    visualize the sales of all products for April through September, included.*'
  id: totrans-1623
  prefs: []
  type: TYPE_NORMAL
  zh: '*找到估计9月份每个产品销售的最佳方法，并可视化4月到9月所有产品的销售情况，包括在内。*'
- en: The first observation is that you can phrase the prompt in simple language,
    nothing technical, and ChatGPT will understand what you need.
  id: totrans-1624
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个观察结果是您可以用简单的语言表述提示，没有任何技术性，ChatGPT就会理解您的需求。
- en: '![Screenshot_1.tif](../Images/Screenshot_1_fmt.png)'
  id: totrans-1625
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshot_1.tif](../Images/Screenshot_1_fmt.png)'
- en: '![Screenshot_1.tif](../Images/Screenshot_1_fmt1.png)'
  id: totrans-1626
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshot_1.tif](../Images/Screenshot_1_fmt1.png)'
- en: The second observation is that Data Analysis can manage structured data exceptionally
    well. You upload CSV files or Excel spreadsheets and then instruct it to process,
    analyze, and visualize the data. Data Analysis will check for errors, deal with
    inaccurate data, detect outliers, and more. You can also ask it to organize your
    data. If you know what you are doing, it can become your data analysis assistant.
  id: totrans-1627
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个观察结果是数据分析可以非常出色地管理结构化数据。您可以上传CSV文件或Excel表格，然后指示它处理、分析和可视化数据。数据分析将检查错误、处理不准确的数据、检测异常值等。您还可以要求它组织您的数据。如果您知道自己在做什么，它可以成为您的数据分析助手。
- en: '![Screenshot_2.tif](../Images/Screenshot_2_fmt.png)'
  id: totrans-1628
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshot_2.tif](../Images/Screenshot_2_fmt.png)'
- en: It is a simple example of what you can do with Data Analysis. To process data,
    ChatGPT will generate code, execute it, display it, and comment on how well it
    performed. To check the code (copy and execute) click on the [>_] sign.
  id: totrans-1629
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个使用数据分析可以做什么的简单例子。为了处理数据，ChatGPT将生成代码，执行它，显示它，并评论其表现如何。要检查代码（复制并执行），请点击[>_]标志。
- en: '![Screenshot3.tif](../Images/Screenshot3_fmt.png)'
  id: totrans-1630
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshot3.tif](../Images/Screenshot3_fmt.png)'
- en: 'The process of data visualization involves several steps:'
  id: totrans-1631
  prefs: []
  type: TYPE_NORMAL
  zh: 数据可视化的过程涉及几个步骤：
- en: – Understanding the data, its structure, variables, and the relationship between
    them;
  id: totrans-1632
  prefs: []
  type: TYPE_NORMAL
  zh: – 理解数据、其结构、变量以及它们之间的关系；
- en: – Choosing the best visualization, depending on the data's nature and the insights
    we want to communicate;
  id: totrans-1633
  prefs: []
  type: TYPE_NORMAL
  zh: – 根据数据的性质和我们想要传达的见解选择最佳的可视化方式；
- en: – Preparing and cleaning data, handling missing values and outliers, or converting
    data into a format that can be plotted,
  id: totrans-1634
  prefs: []
  type: TYPE_NORMAL
  zh: – 准备和清理数据，处理缺失值和异常值，或将数据转换为可绘制的格式；
- en: – Creating the visualization using Python and its libraries (like Matplotlib,
    Seaborn, and Plotly);
  id: totrans-1635
  prefs: []
  type: TYPE_NORMAL
  zh: – 使用Python及其库（如Matplotlib、Seaborn和Plotly）创建可视化；
- en: – Adjusting the layout, annotation, and style to make the visualization accessible;
  id: totrans-1636
  prefs: []
  type: TYPE_NORMAL
  zh: – 调整布局、注释和样式，使可视化易于理解；
- en: – Interpreting the visualized data.
  id: totrans-1637
  prefs: []
  type: TYPE_NORMAL
  zh: – 解释可视化的数据。
- en: For step 4, Data Analysis, choose a different visualization.
  id: totrans-1638
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第4步，数据分析，选择不同的可视化方式。
- en: '![Screenshot4.tif](../Images/Screenshot4_fmt.png)'
  id: totrans-1639
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshot4.tif](../Images/Screenshot4_fmt.png)'
- en: ChatGPT Data Analysis can and will make mistakes. Even though it generates Python
    code to perform many operations, it can make mistakes within the code.
  id: totrans-1640
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT数据分析可能会犯错。尽管它生成Python代码来执行许多操作，但它可能在代码中犯错。
- en: In this example, it is simple to check the results only if you want to solve
    critical problems. A better approach is to break the problem into manageable chunks
    and deal with it step by step.
  id: totrans-1641
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，如果您只想解决关键问题，检查结果很简单。更好的方法是把问题分解成可管理的部分，并逐步解决。
- en: '![Screenshot5.tif](../Images/Screenshot5_fmt.png)'
  id: totrans-1642
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshot5.tif](../Images/Screenshot5_fmt.png)'
- en: '**10.3 Best Practices**^([2](#footnote-10801-2))'
  id: totrans-1643
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**10.3 最佳实践**^([2](#footnote-10801-2))'
- en: – Choose problems where the correctness of a solution is easily verifiable.
    Creating solutions is not a difficult task, yet verifying their accuracy can be
    challenging. ChatGPT Data Analysis, while producing Python code, can still err.
    Therefore, the problems suitable for Data Analysis are those that tolerate errors
    or where mistakes are quickly spotted. For instance, visualizing sales data is
    error-tolerant, while deciding loan approvals is not.
  id: totrans-1644
  prefs: []
  type: TYPE_NORMAL
  zh: – 选择那些解决方案的正确性容易验证的问题。创建解决方案并不困难，但验证其准确性可能具有挑战性。ChatGPT数据分析在生成Python代码时仍然可能出错。因此，适合数据分析的问题是可以容忍错误或错误可以迅速被发现的问题。例如，可视化销售数据是容错的，而决定贷款批准则不是。
- en: – Opt for problems where even an incomplete or partial solution adds value or
    aids in taking a decision. For instance, start with cleaning your data. ChatGPT
    Advanced Data Analysis thrives on problems where even an imperfect solution holds
    worth due to its iterative development, debugging, and rapid prototyping capabilities.
    Users can experiment with varied strategies, make modifications, and gain from
    errors, leading to solutions.
  id: totrans-1645
  prefs: []
  type: TYPE_NORMAL
  zh: – 选择那些即使是不完整或部分解决方案也能增加价值或帮助做出决策的问题。例如，从清理你的数据开始。ChatGPT高级数据分析在那些即使是不完美的解决方案也因其迭代开发、调试和快速原型设计能力而具有价值的问题上茁壮成长。用户可以尝试不同的策略，进行修改，并从错误中学习，从而找到解决方案。
- en: – Data Analysis is designed to aid human reasoning, not to replace it. Use it
    to enhance your skills, offer new insights, or provide perspectives that help
    decision-making. Avoid relying on the tool for tasks that exclude critical thinking.
    This support may vary from automating mundane tasks to presenting multiple problem-solving
    methods.
  id: totrans-1646
  prefs: []
  type: TYPE_NORMAL
  zh: – 数据分析旨在辅助人类推理，而不是取代它。用它来提高你的技能，提供新的见解，或提供有助于决策的视角。避免依赖工具完成排除批判性思考的任务。这种支持可能从自动化日常任务到展示多种解决问题的方法。
- en: – Do not share with AI content that includes non-public data such as sensitive
    information (e.g., social security numbers, credit card information, or hiring
    materials) and personally identifiable information.
  id: totrans-1647
  prefs: []
  type: TYPE_NORMAL
  zh: – 不要与AI分享包含非公开数据的内容，例如敏感信息（例如，社会保障号码、信用卡信息或招聘材料）以及个人信息。
