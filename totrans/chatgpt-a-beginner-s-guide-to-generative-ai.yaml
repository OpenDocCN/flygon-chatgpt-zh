  prefs: []
  type: TYPE_NORMAL
  zh: 使用SALT框架是制定提示的好方法。它考虑了风格、受众、长度和语气。此外，零样本、单样本和少样本学习等技术可以提高回应质量。交互式AI助手教程也可以帮助你学习提示工程。
