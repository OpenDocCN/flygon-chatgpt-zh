  zh: 将 [代码列表 2.24](#list2-24) 的新内容（以粗体显示）与 [代码列表 2.23](#list2-23) 的内容进行比较：更改很小，主要区别是对于外层循环的每次迭代执行内层循环
    100 次，外层循环也执行 100 次。以下是 [代码列表 2.24](#list2-24) 的输出：
