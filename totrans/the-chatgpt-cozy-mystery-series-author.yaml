  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Claire
- en: Nicola
  id: totrans-981
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Nicola
- en: I rather like the name Laura for our sleuth, but Rebecca (Bex) and Amy could
    be used for female secondary characters.
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: 我比较喜欢劳拉这个名字作为我们的侦探，但丽贝卡（贝克斯）和艾米可以用作女性配角。
- en: As for a surname? Let’s go with the one suggested. Marsh.
  id: totrans-983
  prefs: []
  type: TYPE_NORMAL
  zh: 至于姓氏？让我们采用建议的那个。马什。
- en: I now have a name for my sleuth – Laura Marsh.
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在给我的侦探起了一个名字——劳拉·马什。
- en: '![](image_rsrc43H.jpg)'
  id: totrans-985
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc43H.jpg)'
- en: I like Laura. So my sleuth is called Laura Marsh. Can you now summarize the
    character profile for Laura Marsh as above in about 150 words
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢劳拉。所以我的侦探名叫劳拉·马什。你能现在用大约150字总结劳拉·马什的角色档案，如上所述吗？
- en: '![](image_rsrc43J.jpg)'
  id: totrans-987
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc43J.jpg)'
- en: Laura Marsh is a determined and resourceful sleuth with a deep passion for uncovering
    the truth.
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉·马什是一位坚定而有资源的侦探，对揭示真相有着深厚的热情。
- en: After resigning from her position as head chef at a prestigious London restaurant,
    Laura finds herself at a crossroads, grappling with feelings of betrayal and disillusionment.
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: 在辞去伦敦一家著名餐厅主厨职位后，劳拉发现自己站在十字路口，挣扎着处理背叛和幻灭的感觉。
- en: Her former partner, Marco, reneged on his promise to make her head chef at his
    new restaurant, opting instead for his inexperienced girlfriend.
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 她的前任搭档马可违背了承诺，没有让她成为他新餐厅的主厨，而是选择了他的不经验的女友。
- en: This betrayal has left Laura questioning her worth and abilities, but she refuses
    to let it define her.
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: 这次背叛让劳拉开始质疑自己的价值和能力，但她拒绝让它定义自己。
- en: With a keen intellect and sharp intuition, Laura navigates the murky waters
    of mystery with confidence and grace.
  id: totrans-992
  prefs: []
  type: TYPE_NORMAL
  zh: 以敏锐的智力和敏锐的直觉，劳拉自信而优雅地航行在神秘的浑水中。
- en: Despite her vulnerabilities, she draws strength from her connection to her coastal
    hometown of Polperran and her loving aunt, finding solace in the simple joys of
    family and community.
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管她有脆弱之处，但她从与她的沿海家乡波尔珀兰和她的慈爱的阿姨的联系中汲取力量，在家庭和社区的简单快乐中找到慰藉。
- en: As she delves deeper into the investigation, Laura embarks on a journey of self-discovery,
    determined to reclaim her identity, and uncover the truth at any cost.
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: 随着她深入调查，劳拉开始了一段自我发现的旅程，决心恢复她的身份，不惜一切代价揭示真相。
- en: What to Do Next?
  id: totrans-995
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接下来要做什么？
- en: Carry on developing your ideas and working with these sort of What If? Scenarios
    until you have a solid working character profile for your sleuth.
  id: totrans-996
  prefs: []
  type: TYPE_NORMAL
  zh: 继续发展你的想法，并使用这类“如果？”情景进行工作，直到你有一个稳固的工作角色档案为你的侦探。
- en: If you plan to create a series of linked novels in the same storyworld, the
    sleuth will drive this book and other books. Therefore, it is imperative that
    you spend time developing the character's background and understanding what she
    wants to achieve at the moment the story opens, her long-held desires that have
    yet to be fulfilled, and her fears and conflicts.
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你计划创作一系列在同一故事世界中相互关联的小说，侦探将推动这本书和其他书籍。因此，花时间发展角色的背景，了解故事开始时她想要实现的目标，她尚未实现的长期愿望，以及她的恐惧和冲突，这是至关重要的。
- en: At this point, you could ask ChatGPT to describe every aspect of this character's
    backstory and psychology in much more detail, but I recommend holding back and
    working on a basic profile as above.
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，你可以要求ChatGPT详细描述这个角色的背景和心理学的各个方面，但我建议暂时保持克制，并专注于上述基本档案。
- en: In this way, you provide your creativity with the core information it needs
    to develop the sleuth's character without setting any pre-established constraints
    on how that character will act and react when they are on the page.
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式，你为你的创造力提供了核心信息，以便在没有设定任何预先设定的约束条件下，发展侦探角色的性格特征，即这个角色在页面上如何行动和反应。
- en: Free Writing Exercises for the Sleuth
  id: totrans-1000
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为侦探提供的自由写作练习
- en: Have fun and come up with ideas on introducing the sleuth character and their
    story world into this story.
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: 享受乐趣，并想出如何将侦探角色及其故事世界引入这个故事中的想法。
- en: Jot down ideas as bullet points that can be expanded later.
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: 将想法以项目符号的形式记下来，稍后可以扩展。
- en: How do you get inside their heads?  By working through a series of questions
    and answers, building up a profile of this character by adding layers onto layers.
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: 如何进入他们的头脑？通过一系列的问题和答案，通过层层叠加来构建这个角色的档案。
- en: The goal is to have a character profile of the sleuth that will inform how he
    or she investigates this murder and engages with the reader.
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是拥有一个侦探角色档案，这将指导他或她如何调查这起谋杀案，并与读者互动。
- en: You could work through these questions online through ChatGPT or manually in
    your workbook or documents.
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过ChatGPT在线处理这些问题，或者手动在你的工作簿或文档中处理。
- en: Question Tree
  id: totrans-1006
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题树
- en: WHO is our Sleuth? Laura Marsh.
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的侦探是谁？劳拉·马什。
- en: What does she do for a living? Laura is a trained chef.
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: 她是做什么工作的？劳拉是一名受过训练的厨师。
- en: How old is she? 35\. She left her hometown at 17.
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: 她多大了？35岁。她在17岁时离开了家乡。
- en: What are her unique talents? She has to be intelligent and a match for the villain.
    Laura is an assertive, independent, and strong character who will not be told
    what to do. She has cooked for Hollywood stars and business leaders.
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: 她有什么独特的才能？她必须聪明，能够与反派匹敌。劳拉是一个自信、独立、坚强的角色，不会被告知该做什么。她为好莱坞明星和商业领袖烹饪。
- en: What does she want in life? The internal conflicts from her backstory. To work
    out what she wants to do next in her life.
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 她在生活中想要什么？她背景故事中的内心冲突。弄清楚她接下来在生活中想做什么。
- en: The reader should feel sympathy and empathy with the main character. Laura is
    on holiday from her job after her chef manager let her down and gave the job he
    had promised her to his current newbie girlfriend.
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: 读者应该对主要角色产生同情和共鸣。劳拉在厨师经理让她失望，把原本承诺给她的工作给了他的新女友后，休假离开了她的工作。
- en: What are her immediate and long-term goals? What is blocking her? She wants
    to spend a few weeks with her aunt. She is exhausted. Cooking is all that she
    has known. What does she want to do now? The first real break Laura has had in
    over a year.
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: 她的短期和长期目标是什么？什么阻碍了她？她想要和她的阿姨一起度过几周时间。她已经筋疲力尽。烹饪是她所知道的一切。她现在想做什么？这是劳拉一年多来第一次真正休息。
- en: How is she able to talk to suspects? Laura’s aunt has a very popular yarn and
    craft store that has become a local hang-out and gossip central for customers.
    She rents it out at night to community groups and gives craft tutorials. There
    are big tables and comfy chairs.
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 她是如何与嫌疑人交谈的？劳拉的阿姨经营着一家非常受欢迎的毛线编织和手工艺品店，这已经成为顾客的当地聚会和八卦中心。她晚上出租给社区团体，并提供手工艺教程。有宽敞的桌子和舒适的椅子。
- en: Does she have a pet? Laura loves cats but cannot have one since she works crazy
    chef hours.
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: 她有没有宠物？劳拉喜欢猫，但由于她工作时间疯狂，无法养一只。
- en: 'PART THREE: THE SERIES CHARACTER ARC'
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: 第三部分：系列人物弧线
- en: The Series Character Arc for Your Sleuth
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: 您侦探角色的系列人物弧线
- en: Mapping the character arc of your sleuth (and cast of sidekicks), over an entire
    cozy mystery series takes strategic planning.
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 为您的侦探（和配角）在整个温馨悬疑系列中绘制人物弧线需要战略规划。
- en: The objective is to make the reader eager for the next installment in your sleuth’s
    personal life, as well as diving into the next murder mystery plot.
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是让读者对侦探个人生活的下一部分以及下一部谋杀悬疑情节感到期待。
- en: This engages the reader’s emotions as they vicariously enjoy the rollercoaster
    ups and downs of the character's interaction with the mystery they are investigating.
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: 这激发了读者的情感，让他们在角色与正在调查的神秘事件互动的过山车起伏中，间接享受乐趣。
- en: Most often, the characters draw readers to cozy crime, not the crimes alone.
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，人物吸引读者阅读温馨犯罪小说，而不仅仅是犯罪本身。
- en: 'Character Development: Mapping the Journey'
  id: totrans-1022
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人物发展：绘制旅程
- en: Character development is at the heart of any series, providing the emotional
    core and driving the narrative forward. In a cozy mystery series, the protagonist's
    growth is particularly crucial as readers invest in their journey from the first
    page of the first book to the last page of the final installment.
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: 人物发展是任何系列的核心，提供情感核心并推动叙事前进。在温馨悬疑系列中，主角的成长尤其关键，因为读者从第一本书的第一页到最后一本书的最后一页都投入到了他们的旅程中。
- en: Where is your sleuth starting from?
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: 你的侦探从哪里开始？
- en: Introduce your protagonist and key characters with clear, defined traits and
    motivations. These initial characteristics form the baseline from which their
    growth will be measured.
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: 用清晰、明确的特征和动机介绍你的主角和关键人物。这些初始特征构成了衡量他们成长的基础。
- en: 'Book-by-Book Development: In each book, the protagonist should face challenges
    that test and reveal their character, leading to personal growth or change. These
    developments can be tied to the mystery plot, personal relationships, or internal
    conflicts, providing a clear arc within each book.'
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: 按书发展：在每一本书中，主角应该面对挑战，这些挑战考验并揭示他们的性格，导致个人成长或变化。这些发展可以与神秘情节、个人关系或内心冲突联系起来，为每一本书提供一个清晰的弧线。
- en: In each book, have your protagonist realize something new about themselves to
    add emotional depth.
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: 在每一本书中，让你的主角对自己有新的认识，以增加情感深度。
- en: How are they going to change over the series?  Overcome flaws?  Level up sleuthing
    skills? Find love?  Or remain a delightful curmudgeon?
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: 他们将在系列中如何改变？克服缺点？提升侦探技能？找到爱情？或者保持一个愉快的古怪性格？
- en: Identify types of small wins for each book followed by a few steps back in others
    to sustain tension as desires build across the series.
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: 确定每本书的小胜利类型，然后在其他书中退后几步，以维持紧张感，同时在整个系列中建立欲望。
- en: 'The Overarching Character Arc: Over the course of the series, the protagonist
    undergoes a more profound and sometimes subtler transformation. This long-term
    growth reflects their cumulative experiences, lessons learned, and the ways in
    which the people and events around them have shaped them. By the series'' end,
    they emerge as a markedly different person—more nuanced, mature, or changed in
    significant ways.'
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: 总体人物弧线：在整个系列中，主角经历了更深刻、有时也更微妙的变化。这种长期成长反映了他们的累积经验、学到的教训以及周围的人和事件如何塑造了他们。到系列结束时，他们变成了一个明显不同的人——更加细腻、成熟，或是在重要方面发生了显著的变化。
- en: 'Incremental Growth: The series should depict incremental growth that, while
    subtle in individual books, results in significant change over time. This could
    involve the protagonist coming to terms with personal flaws, overcoming fears,
    or changing their outlook on life.'
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: 逐步增长：系列应该描绘逐步增长，虽然每本书中都很微妙，但最终会导致显著的变化。这可能包括主角接受个人缺点、克服恐惧或改变他们对生活的看法。
- en: 'Cumulative Challenges: Each book’s challenges should contribute to the protagonist’s
    overarching growth, building on previous developments and setting the stage for
    future arcs.'
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: 累积挑战：每本书的挑战都应有助于主角的整体成长，建立在之前的发展之上，并为未来的弧线奠定基础。
- en: 'Reflecting Change in Relationships: The protagonist’s evolving relationships
    with recurring characters can serve as a mirror to their growth, highlighting
    changes in dynamics, power, and mutual understanding. A developing love interest
    is a familiar subplot that can be tracked across all the series books.'
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 反映关系变化：主角与反复出现的人物之间不断变化的关系可以作为他们成长的镜子，突出动态、权力和相互理解的变化。逐渐发展的爱情线索是一个常见的副线，可以在整个系列书籍中追踪。
- en: 'Resolution and Realization: The series climax should resolve the central conflict
    and catalyze the protagonist’s final transformation, leading to a moment of realization
    or acceptance that signifies the culmination of their journey.'
  id: totrans-1034
  prefs: []
  type: TYPE_NORMAL
  zh: 解决和领悟：系列的高潮应该解决主要冲突，催化主角的最终转变，导致一个领悟或接受的瞬间，这标志着他们旅程的终结。
- en: The protagonist’s journey from the person they are in book one to the person
    they become in the final book offers a gratifying experience for readers, who
    invest not just in the mysteries to be solved but in the characters themselves.
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: 从第一本书中的那个人到最后一本书中成为的那个人，主角的旅程为读者提供了一个令人满意的体验，读者不仅投资于要解决的谜题，也投资于角色本身。
- en: Do You Need A Character Arc In Each Book And Over A Series?
  id: totrans-1036
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你需要在每本书和整个系列中都有人物弧线吗？
- en: In commercial modern genre fiction, such as cozy mysteries, it is unusual to
    see main characters who do not have transformational character arcs over a series
    of linked books.
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业现代类型小说中，如温馨悬疑小说，看到在一系列相关书籍中没有转型人物弧线的主要角色是不寻常的。
- en: Incorporating character arcs in each book and across your cozy mystery series
    transforms your sleuth from a mere puzzle-solver to a multi-dimensional character
    who captures and holds the readers' attention through their actions and decisions.
  id: totrans-1038
  prefs: []
  type: TYPE_NORMAL
  zh: 在每本书以及整个温馨悬疑系列中融入人物弧线，将你的侦探角色从单纯的谜题解决者转变为一个多维度的人物，通过他们的行动和决策吸引并保持读者的注意力。
- en: Readers seem to be more invested in the sleuth’s personal journey when that
    character faces adversity and develops as a character.
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: 当侦探角色面对逆境并作为人物发展时，读者似乎对他们的个人旅程投入得更多。
- en: We see parts of our struggles and growth in them, making their victories and
    setbacks resonate with us.
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在他们身上看到了我们自己的斗争和成长，使他们的胜利和挫折与我们产生共鸣。
- en: Cozy Detectives Who Do Not Have Character Arcs
  id: totrans-1041
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 没有人物弧线的温馨侦探：
- en: There are instances, especially in older or more traditional series, where the
    detective's personal development is minimal or very subtle across books. These
    characters maintain consistent traits and skills that don't change significantly
    from book to book.
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: 在一些较老或更传统的系列中，侦探的个人发展在书中可能是微不足道的或非常微妙。这些角色保持一致的特性和技能，从一本书到另一本书变化不大。
- en: Instead, the focus is more on the puzzle of the mystery itself rather than on
    the character's personal growth or emotional journey.
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，重点更多地放在谜案的本身上，而不是角色的个人成长或情感旅程。
- en: 'Examples of Detectives with Minimal Character Arcs:'
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: 具有最少人物弧线的侦探示例：
- en: Hercule Poirot by Agatha Christie.
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: 阿加莎·克里斯蒂的Hercule Poirot。
- en: Miss Marple, also by Agatha Christie.
  id: totrans-1046
  prefs: []
  type: TYPE_NORMAL
  zh: 阿加莎·克里斯蒂笔下的Miss Marple。
- en: Brother Cadfael from The Chronicles of Brother Cadfael series by Ellis Peters.
  id: totrans-1047
  prefs: []
  type: TYPE_NORMAL
  zh: 来自艾利斯·彼得斯的《Cadfael兄弟系列》中的Cadfael兄弟。
- en: Hannah Swenson from The Hannah Swenson Mysteries  by Joanne Fluke.
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: Joanne Fluke的《Hannah Swenson神秘事件》中的Hannah Swenson。
- en: Jessica Fletcher from the Murder She Wrote TV series and books.
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: 来自《Murder She Wrote》电视剧和书籍的Jessica Fletcher。
- en: Father Brown from The Father Brown Mysteries series by G.K. Chesterton.
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: G.K.切斯特顿的《Father Brown神秘事件系列》中的Father Brown。
- en: And there are many more, especially in period dramas.
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 并且还有很多，尤其是在历史剧中。
- en: Readers know what to expect. The focus remains on the puzzle and resolution
    of the mystery, with the detective acting as a steady hand guiding the reader
    through the twists and turns.
  id: totrans-1052
  prefs: []
  type: TYPE_NORMAL
  zh: 读者知道他们可以期待什么。重点始终放在谜题和谜案的解决上，侦探作为稳定的手引导读者通过曲折和转折。
- en: Readers return to the series not to discover how the character has changed but
    to enjoy their familiar, reliable approach to solving new mysteries.
  id: totrans-1053
  prefs: []
  type: TYPE_NORMAL
  zh: 读者们回归这个系列，不是为了发现角色如何改变，而是为了享受他们熟悉的、可靠的解决新谜题的方法。
- en: The sidekicks and secondary characters are often given character arcs to maintain
    interest across a series.
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: 配角和次要角色经常被赋予角色弧线，以保持整个系列中的兴趣。
- en: Perhaps a sidekick starts working with a local police officer in book one, is
    asked out on a date in book two, and ends up engaged and planning a wedding in
    book ten.
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: 也许在第一本书中，配角开始与当地警察合作，在第二本书中被邀请出去约会，并在第十本书中订婚并计划婚礼。
- en: In contemporary cozy mysteries, readers look for a blend of intriguing puzzles
    and character development, but strong, distinctive characters can engage audiences
    without profound personal growth arcs.
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: 在当代的温馨悬疑小说中，读者寻找有趣谜题和角色发展的结合，但强大、独特的角色可以吸引观众，即使没有深刻的个人成长弧线。
- en: So Why Is Character Arc So Important For Our Sleuth?
  id: totrans-1057
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 所以为什么角色弧线对我们侦探来说如此重要？
- en: For me, it comes down to the relationship between the reader and the character.
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，这归结于读者和角色之间的关系。
- en: I want to feel empathy and sympathy for this character’s situation when the
    story starts in the ordinary world of book one.
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: 当故事从第一本书的普通世界开始时，我希望感受到对这个角色情况的同情和同情。
- en: That emotional connection is so unique that it will keep me reading a book to
    discover what happens to this person.
  id: totrans-1060
  prefs: []
  type: TYPE_NORMAL
  zh: 这种情感联系如此独特，以至于它会让我继续阅读一本书，以了解这个人的遭遇。
- en: This is why many modern cozy mysteries begin with a sleuth whose life is in
    turmoil somehow, and they are desperately looking for ways to resolve their problems.
  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么许多现代的温馨悬疑小说开始于一个生活陷入混乱的侦探，他们正绝望地寻找解决问题的方法。
- en: Readers want a main character to root for!
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: 读者想要一个值得支持的主角！
- en: 'Personal Growth: Modern cozy sleuths often experience significant personal
    growth throughout a series. They may develop new skills, form new relationships,
    or change their personal lives.'
  id: totrans-1063
  prefs: []
  type: TYPE_NORMAL
  zh: 个人成长：现代的温馨侦探小说中，角色往往在整个系列中经历显著的个人成长。他们可能会发展新技能，建立新关系，或者改变个人生活。
- en: The journey this character has to take is added as an extra layer below the
    central murder mystery plot so that the resolution of the murder supports the
    character development of the sleuth.
  id: totrans-1064
  prefs: []
  type: TYPE_NORMAL
  zh: 这个角色必须经历的旅程被添加为中央谋杀神秘情节之下的额外层次，这样谋杀的解决就支持了侦探的角色发展。
- en: '![](image_rsrc43K.jpg)'
  id: totrans-1065
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc43K.jpg)'
- en: What are the ten biggest mistakes a cozy mystery author could make when planning
    a character arc for the sleuth over a five-book cozy mystery series? Use a simple
    and conversational tone. Use 17 words or less.
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个五本书的温馨悬疑系列中，为侦探规划角色弧线时，一个温馨悬疑小说作家可能会犯的十个最大错误是什么？使用简单、对话的语气。使用17个词或更少。
- en: '![](image_rsrc43M.jpg)'
  id: totrans-1067
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc43M.jpg)'
- en: Making the sleuth perfect; no flaws or fears.
  id: totrans-1068
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使侦探完美；没有缺点或恐惧。
- en: Not evolving the sleuth; static through series.
  id: totrans-1069
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不让侦探发展；在整个系列中保持静态。
- en: Overcomplicating the sleuth's backstory; keep it simple.
  id: totrans-1070
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过度复杂化侦探的背景故事；保持简单。
- en: Ignoring the sleuth's personal growth; needs change.
  id: totrans-1071
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视侦探的个人成长；需要改变。
- en: Making every book's climax predictable; vary outcomes.
  id: totrans-1072
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使每本书的高潮都可预测；变化结果。
- en: Skipping emotional depth; explore feelings, failures.
  id: totrans-1073
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 跳过情感深度；探索感受、失败。
- en: Forgetting side characters' impact; they shape the sleuth.
  id: totrans-1074
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视配角的影响；他们塑造了侦探。
- en: Neglecting the setting's influence; it's a character too.
  id: totrans-1075
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视环境的影响；它也是一个角色。
- en: Rushing the sleuth's relationships; let them develop.
  id: totrans-1076
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 赶快发展侦探的关系；让他们发展。
- en: Losing the mystery's fun; maintain humor and lightness.
  id: totrans-1077
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 失去谜题的乐趣；保持幽默和轻松。
- en: '![](image_rsrc43N.jpg)'
  id: totrans-1078
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc43N.jpg)'
- en: 'Great. Remember that I want to plan the character arc for the sleuth and write
    a bestselling cozy mystery series. I want to compare examples of the “bad” and
    the “good” for the following mistakes: Mistake 1: No personal growth; static character.
    Mistake 2: Making them too perfect; no flaws. Mistake 3: Lack of personal stakes
    or motivation. Point out the differences between the wrong and the right. Give
    a clear example of character arcs that help the writer see where they can veer
    off track and what it looks like.'
  id: totrans-1079
  prefs: []
  type: TYPE_NORMAL
  zh: 很好。记住，我想为侦探规划角色弧线，并写一部畅销的温馨悬疑系列。我想比较以下错误的“坏”与“好”的例子：错误1：没有个人成长；性格静态。错误2：让他们过于完美；没有缺点。错误3：缺乏个人利益或动机。指出对与错之间的区别。给出有助于作家看到他们可能偏离轨道以及那会是什么样子的角色弧线例子。
- en: '![](image_rsrc43P.jpg)'
  id: totrans-1080
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc43P.jpg)'
- en: Certainly! Let's delve into the examples of "bad" versus "good" practices for
    these mistakes to guide cozy mystery authors towards crafting engaging and dynamic
    character arcs for their sleuths.
  id: totrans-1081
  prefs: []
  type: TYPE_NORMAL
  zh: 当然！让我们深入探讨“坏”与“好”的实践例子，以指导温馨悬疑小说作家为他们的侦探创作出引人入胜且动态的角色弧线。
- en: 'Mistake 1: No personal growth; static character.'
  id: totrans-1082
  prefs: []
  type: TYPE_NORMAL
  zh: 错误1：没有个人成长；性格静态。
- en: 'Bad Example: Your sleuth solves every mystery using the same set of skills,
    never faces personal challenges, and ends the series exactly as they began. They
    don''t learn from their experiences, nor do they evolve emotionally or professionally.'
  id: totrans-1083
  prefs: []
  type: TYPE_NORMAL
  zh: 差例：你的侦探总是用同一套技能解决每一个谜题，从未面临个人挑战，并在系列结束时与开始时一模一样。他们没有从经验中学习，也没有在情感或专业上成长。
- en: 'Good Example: Your sleuth starts as a timid librarian who lacks confidence
    in her detective skills. Over the series, she faces increasingly challenging mysteries
    that force her out of her comfort zone, learns to trust her instincts, and gains
    confidence. By the end, she''s a respected amateur detective in her community,
    demonstrating significant personal growth.'
  id: totrans-1084
  prefs: []
  type: TYPE_NORMAL
  zh: 好例：你的侦探最初是一个缺乏自信的图书管理员，她的侦探技能缺乏信心。在系列中，她面对越来越具有挑战性的谜题，迫使她走出舒适区，学会信任自己的直觉，并建立自信。到故事结束时，她已经成为了社区中受人尊敬的业余侦探，展示了显著的个人成长。
- en: 'Mistake 2: Making them too perfect; no flaws.'
  id: totrans-1085
  prefs: []
  type: TYPE_NORMAL
  zh: 错误2：让他们过于完美；没有缺点。
- en: 'Bad Example: The sleuth is brilliant, charming, and athletic, with no personal
    weaknesses. They solve mysteries effortlessly,  without making mistakes or facing
    personal dilemmas, making them unrelatable and unrealistic.'
  id: totrans-1086
  prefs: []
  type: TYPE_NORMAL
  zh: 差例：侦探聪明、迷人、健壮，没有个人弱点。他们轻松解决谜题，从不犯错或面临个人困境，这使得他们难以引起共鸣，也不够真实。
- en: 'Good Example:  The sleuth is a skilled puzzle-solver but is also overly trusting,
    leading to several misjudgments of character throughout the series. This flaw
    gets them into trouble but also teaches valuable lessons, making them more cautious
    and discerning. Their journey includes learning to balance trust with skepticism,
    adding depth to their character.'
  id: totrans-1087
  prefs: []
  type: TYPE_NORMAL
  zh: 好例：侦探是一个有技巧的谜题解决者，但同时也过于信任，导致在整个系列中出现了几次对人物性格的误判。这个缺点让他们陷入麻烦，但也教会了他们宝贵的教训，使他们更加谨慎和有洞察力。他们的旅程包括学会在信任和怀疑之间取得平衡，这增加了他们角色的深度。
- en: 'Mistake 3: Lack of personal stakes or motivation.'
  id: totrans-1088
  prefs: []
  type: TYPE_NORMAL
  zh: 错误3：缺乏个人利益或动机。
- en: 'Bad Example: The sleuth solves mysteries out of sheer boredom or for the thrill,
    with no personal connection to the cases. This makes their involvement feel contrived
    and the story less engaging.'
  id: totrans-1089
  prefs: []
  type: TYPE_NORMAL
  zh: 差例：侦探纯粹出于无聊或寻求刺激来解决谜题，与案件没有个人联系。这使得他们的参与感显得做作，故事也显得不那么吸引人。
- en: 'Good Example: The sleuth''s best friend is the first book''s victim, driving
    them to solve that mystery out of a deep personal need for justice. As the series
    progresses, they become motivated by a sense of duty to their community and a
    desire to prevent others from experiencing loss, making their journey more compelling
    and emotionally resonant.'
  id: totrans-1090
  prefs: []
  type: TYPE_NORMAL
  zh: 好例：侦探最好的朋友是第一本书的受害者，这驱使他们出于对正义的深切个人需求来解决这个谜题。随着系列的推进，他们被对社区的义务感和防止他人遭受损失的需求所激励，这使得他们的旅程更加引人入胜和情感共鸣。
- en: In summary, avoiding these mistakes involves creating a sleuth who grows personally
    and professionally over time, has relatable flaws that they work to overcome,
    and possesses a deep personal motivation for solving mysteries. This approach
    will lead to a more engaging and satisfying character arc that readers can invest
    in throughout the series.
  id: totrans-1091
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，避免这些错误涉及创造一个随着时间的推移在个人和专业上都有所成长的侦探，他们有可以克服的、引人共鸣的缺点，并且有解决谜题的深刻个人动机。这种方法将导致一个更吸引人且令人满意的、读者可以在整个系列中投入其中的角色弧线。
- en: Creating a Transformational Character Arc for the Sleuth over a Five-Book Series
  id: totrans-1092
  prefs: []
  type: TYPE_NORMAL
  zh: 在五本书系列中为侦探创造一个变革性的角色弧线
- en: Crafting a five-book, cozy mystery series will stretch your creativity and imagination.
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: 制作一本五本书的温馨悬疑系列将考验您的创造力和想象力。
- en: You start with your sleuth, place them into a perfect setting for your niche,
    challenge them with several layers of conflict with your secondary characters,
    and then make them work hard through five murder mystery investigations.
  id: totrans-1094
  prefs: []
  type: TYPE_NORMAL
  zh: 您从您的侦探开始，将他们置于您利基市场的完美环境中，用次要角色的多层冲突挑战他们，然后让他们在五起谋杀谜案调查中努力工作。
- en: The sleuth is forced to grow and dig deep to adapt, survive, and thrive through
    everything you will throw at them regarding plot and personal relationships.
  id: totrans-1095
  prefs: []
  type: TYPE_NORMAL
  zh: 侦探被迫成长和深入挖掘，以适应、生存和繁荣，无论你将关于情节和个人关系的一切都抛向他们。
- en: How are you going to do this?
  id: totrans-1096
  prefs: []
  type: TYPE_NORMAL
  zh: 你打算如何做到这一点？
- en: Work on the character arc, setting, conflicts, and challenges in book one, then
    build out how you want this character to develop in the following books in the
    series.
  id: totrans-1097
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一本书中，专注于角色弧线、背景、冲突和挑战，然后构建您希望这个角色在系列后续书籍中如何发展的计划。
- en: START WITH A HIGH-LEVEL VIEW OF THE CHARACTER DEVELOPMENT YOU WANT TO SEE
  id: totrans-1098
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从您想要看到的高层次的角色发展视角开始
- en: Where do they start from at the beginning of book one?
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: 第一本书的开头他们从哪里开始？
- en: What is their ordinary world? What kind of life are they leading? How is it
    in turmoil?
  id: totrans-1100
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的普通世界是什么？他们过着什么样的生活？它是如何陷入混乱的？
- en: You don’t need a lot of detail here. Bullet point notes are fine when you are
    planning the first few books.
  id: totrans-1101
  prefs: []
  type: TYPE_NORMAL
  zh: 这里不需要很多细节。当您计划前几本书时，项目符号笔记就足够了。
- en: But you need to know your sleuth's backstory well enough to bring them onto
    the page in the first book, acting and reacting and revealing more about themselves.
  id: totrans-1102
  prefs: []
  type: TYPE_NORMAL
  zh: 但您需要足够了解侦探的背景故事，以便在第一本书中将他们呈现在页面上，让他们行动、反应并更多地揭示自己。
- en: How will they be different at the end of book five?
  id: totrans-1103
  prefs: []
  type: TYPE_NORMAL
  zh: 到第五本书结束时，他们会有什么不同？
- en: How will their character have changed?
  id: totrans-1104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们的角色将如何改变？
- en: What happens in book one, linked to the engaging story hook you developed, that
    sparks a remarkable transformation?
  id: totrans-1105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在第一本书中，与您开发的引人入胜的故事钩子相关联，会发生什么，从而引发显著的变革？
- en: 'For example. Using the Universal Hook concept. By the end of The Psychic Mystery
    series, Laura will have moved from:'
  id: totrans-1106
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，使用通用钩子概念。到《心灵之谜》系列结束时，劳拉将从：
- en: '| Book One | End of the Series |'
  id: totrans-1107
  prefs: []
  type: TYPE_TB
  zh: '| 第一本书 | 系列结束 |'
- en: '| It is being alone.Perhaps she has just ended a long relationship and is at
    a turning point in her life. | Finding love and a lasting romantic relationship
    or welcoming community she can call home. |'
  id: totrans-1108
  prefs: []
  type: TYPE_TB
  zh: '| 孤独。也许她刚刚结束了一段长期的关系，正处于人生的转折点。 | 找到爱情和持久的浪漫关系，或者欢迎她称之为家的社区。|'
- en: '| Regret and loss. | Self-forgiveness for past mistakes and relationships.
    |'
  id: totrans-1109
  prefs: []
  type: TYPE_TB
  zh: '| 悔恨与失落。 | 对过去的错误和关系的自我宽恕。|'
- en: '| Refusing to accept her new situation – she wants out! | Self-acceptance of
    her skills and acceptance of her family. |'
  id: totrans-1110
  prefs: []
  type: TYPE_TB
  zh: '| 拒绝接受她新的情况——她想要离开！ | 对自己技能的自我接受和对家庭的接受。|'
- en: '| Unsure about the psychic abilities she has just been given. | Faith in herself
    and her abilities. |'
  id: totrans-1111
  prefs: []
  type: TYPE_TB
  zh: '| 对她刚刚获得的心理能力感到不确定。 | 对自己和能力的信心。|'
- en: '| Scared to make decisions and make changes. | Courage to make decisions. |'
  id: totrans-1112
  prefs: []
  type: TYPE_TB
  zh: '| 害怕做决定和改变。 | 做决定的勇气。|'
- en: '| Lack of trust in others directly results from being betrayed or let down
    by others. | Trust in her aunt and the small community that has become her extended
    family. |'
  id: totrans-1113
  prefs: []
  type: TYPE_TB
  zh: '| 由于被背叛或失望而直接导致对他人缺乏信任。 | 对她阿姨和已经成为她大家庭的小社区有信任。|'
- en: '| Unsure about her new psychic talents and this new town. | She knows now that
    she can survive any situation. |'
  id: totrans-1114
  prefs: []
  type: TYPE_TB
  zh: '| 对她新获得的心理能力以及这个新镇感到不确定。 | 她现在知道她可以应对任何情况。|'
- en: '| Lack of confidence. | Confidence in herself and her abilities. |'
  id: totrans-1115
  prefs: []
  type: TYPE_TB
  zh: '| 缺乏自信。 | 对自己和能力的信心。|'
- en: '| Some selfish behavior due to her vulnerability and loss. | Laura has been
    taught to be kind and generous. |'
  id: totrans-1116
  prefs: []
  type: TYPE_TB
  zh: '| 由于她的脆弱和损失而表现出一些自私行为。 | 劳拉被教导要善良和慷慨。|'
- en: What to Do Next?
  id: totrans-1117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接下来要做什么？
- en: 'Collect together:'
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: 收集起来：
- en: '#All of your notes for the complete character profile of the sleuth generated
    by AI earlier and edited to match your ideas.'
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: '# 所有您之前由AI生成的关于侦探的完整角色档案的笔记，并编辑以符合您的想法。'
- en: '#Your “What-If” Ideas for the character and the plot of book one that will
    start the character arc.'
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: '# 关于第一本书中角色和情节的“如果”想法，这将开始角色弧线。'
- en: In my case study, I am using the first experiment where Laura touches the victim,
    and he gifts her his psychic powers.
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的案例研究中，我使用的是劳拉触摸受害者的第一个实验，他赠予她心灵感应能力。
- en: 'The goal is this: To create a very broad outline of the character development
    changes in each of the five books that will track from when we first meet the
    sleuth to when the overall character arc has been completed.'
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是这样的：为每本书中角色的性格发展变化创建一个非常广泛的概述，从我们第一次遇到侦探开始，到整体性格弧线完成为止。
- en: 'When you have written the first book in the series, you will go back and edit
    the prompt and regenerate the plan, incorporating the following:'
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: 当你写完这个系列的 第一本书后，你将回过头来编辑提示并重新生成计划，包括以下内容：
- en: the new information you now have about this character
  id: totrans-1124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你现在对这个角色所拥有的新信息
- en: your new ideas about where you want the character to go in the next book or
    two.
  id: totrans-1125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你关于下一本书或两本书中你想让角色去往何方的新的想法。
- en: By recognizing that this is a working draft of the character arc map, you have
    your notes to hand and can update them at any time to create your story outline
    for the next book or two in the series.
  id: totrans-1126
  prefs: []
  type: TYPE_NORMAL
  zh: 通过认识到这是一个角色弧线图的工作草案，你手头有笔记，可以随时更新它们，为系列中的下一本书或两本书创建故事大纲。
- en: We will paste the detailed character profile and plot idea for book one into
    one large prompt and ask ChatGPT to break the character arc down over the five-book
    series.
  id: totrans-1127
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将把第一本书的详细角色档案和情节想法粘贴到一个大提示中，并要求ChatGPT将角色弧线分解为五本书系列。
- en: '![](image_rsrc43R.jpg)'
  id: totrans-1128
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc43R.jpg)'
- en: You are a very experienced, cozy mystery author who is an expert at crafting
    character arcs that cozy mystery readers love.
  id: totrans-1129
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一位经验丰富的温馨悬疑作家，擅长制作读者喜爱的角色弧线。
- en: 'Here is the backstory character profile for my sleuth, Laura Marsh: [ copy
    the complete character profile developed earlier and paste it here]'
  id: totrans-1130
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我侦探劳拉·马什的背景角色档案：[复制之前开发的完整角色档案并粘贴到这里]
- en: 'Here is what happens in book one of the series: [ copy the draft What-If notes
    about your story idea and paste it here]'
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是这个系列第一本书中发生的事情：[复制你关于故事想法的草稿“如果笔记”并粘贴到这里]
- en: I need you to develop a character arc for Laura Marsh for a five-book cozy mystery
    series. Show in detail how Laura’s character will grow and develop in specific
    aspects of her character.
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要你为劳拉·马什开发一个五本温馨悬疑系列书的角色弧线。详细展示劳拉的性格在特定方面如何成长和发展。
- en: '![](image_rsrc43S.jpg)'
  id: totrans-1133
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc43S.jpg)'
- en: BOOK ONE OF FIVE
  id: totrans-1134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 五本书中的第一本
- en: 'Book One: Gift of Insight'
  id: totrans-1135
  prefs: []
  type: TYPE_NORMAL
  zh: 第一本书：洞察力之礼
- en: Laura Marsh's journey begins with a shocking murder at her aunt's yarn store
    studio, thrusting her into a world of paranormal intrigue and danger.
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉·马什的旅程始于她在阿姨的毛线店工作室发生的一起震惊的谋杀案，将她推入了一个超自然阴谋和危险的世界。
- en: As Laura grapples with her newfound psychic abilities inherited from the victim,
    she leans on her aunt and close friends for guidance, gradually learning to trust
    her intuition and embrace her role as a paranormal investigator.
  id: totrans-1137
  prefs: []
  type: TYPE_NORMAL
  zh: 当劳拉与从受害者那里继承的新的心灵感应能力作斗争时，她依靠阿姨和亲密朋友寻求指导，逐渐学会信任自己的直觉，并接受她作为超自然调查者的角色。
- en: Through her investigation into the medium's murder, Laura begins to unravel
    the tangled web of secrets surrounding her family's past, uncovering long-buried
    truths that challenge her perception of reality.
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对灵媒谋杀案的调查，劳拉开始揭开围绕她家族过去的错综复杂的秘密，揭示被长期埋藏的真相，挑战她对现实的认知。
- en: Throughout the investigation, Laura learns to trust in her intuition and embrace
    her unique gifts, discovering a newfound sense of purpose and resilience within
    herself.
  id: totrans-1139
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个调查过程中，劳拉学会了信任自己的直觉，并拥抱自己的独特天赋，发现自己内心深处的新发现：目的感和韧性。
- en: 'Establish the Core Foundation for the Series: Make the sleuth feel real and
    relatable. They''re curious but inexperienced and perhaps a tad naive. Lay out
    their personality, strengths, weaknesses, and a hint of the personal journey to
    come.'
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: 为系列建立核心基础：让侦探显得真实和亲切。他们好奇但缺乏经验，也许有点天真。展示他们的个性、优点、缺点，以及即将到来的个人旅程的一丝线索。
- en: 'Kickstart the Growth: Challenge your sleuth with a mystery that pushes them
    out of their comfort zone.  This first book should test their resolve and hint
    at their potential for change.'
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: 激活成长：挑战侦探，让他们走出舒适区。这本书应该考验他们的决心，并暗示他们改变的可能性。
- en: The resolution of the mystery should leave them slightly altered, perhaps more
    curious, braver, or more aware of their shortcomings. They have taken a couple
    of steps out of that nice safe comfort zone or settled way of existence.
  id: totrans-1142
  prefs: []
  type: TYPE_NORMAL
  zh: 神秘的解决应该让他们略有改变，也许更加好奇、勇敢或更意识到自己的不足。他们已经走出那个舒适的安全区或固定的生活方式，迈出了几步。
- en: BOOK TWO OF FIVE
  id: totrans-1143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 五本书中的第二本
- en: 'Book Two: Stitches of Truth'
  id: totrans-1144
  prefs: []
  type: TYPE_NORMAL
  zh: 第二本书：真相的针线
- en: 'Digging Deeper: Now, reveal secrets.'
  id: totrans-1145
  prefs: []
  type: TYPE_NORMAL
  zh: 深入挖掘：现在，揭露秘密。
- en: With her psychic abilities growing stronger, Laura embarks on a new mystery
    in Polperran. When a local historian is found dead under mysterious circumstances,
    Laura's psychic abilities prove invaluable in unraveling the truth behind the
    murder. As she delves deeper into the case, Laura confronts her own fears and
    insecurities, learning to harness her powers to uncover the truth and bring justice
    to the victims.
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: 随着她的心灵感应能力越来越强，劳拉在波尔佩兰开始了新的神秘之旅。当一位当地历史学家在神秘的情况下被发现死亡时，劳拉的心灵感应能力在揭开谋杀背后的真相方面证明是无价的。随着她深入调查案件，劳拉面对自己的恐惧和不安全感，学会利用她的力量揭露真相，为受害者伸张正义。
- en: Along the way, she forges stronger bonds with her aunt and friends in the process.
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: 在旅途中，她与她的阿姨和朋友们建立了更牢固的联系。
- en: 'Deepen the Backstory: Now that readers are familiar with your protagonist,
    unveil deeper elements of their backstory. Perhaps a personal loss or a failure
    that''s shaped their approach to solving mysteries. Use this backstory to introduce
    the book''s central conflict, linking it directly to the protagonist''s past.'
  id: totrans-1148
  prefs: []
  type: TYPE_NORMAL
  zh: 深化背景故事：现在读者已经熟悉了你的主人公，揭示他们背景的更深层元素。也许是一个个人损失或失败，塑造了他们解决谜题的方法。使用这个背景故事来介绍书的中心冲突，将其直接与主人公的过去联系起来。
- en: Everyone has skeletons in their closet. This round, our sleuth faces a ghost
    from their past. New faces appear. A friend? A foe?
  id: totrans-1149
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都有藏匿在衣橱里的秘密。这一轮，我们的侦探面对他们过去的幽灵。新面孔出现了。是一个朋友？还是一个敌人？
- en: This time, the mystery hits close to home. It's personal.
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，神秘事件与主人公息息相关。这是个人的。
- en: 'Introduce New Relationships: Bring in secondary characters that challenge or
    support your protagonist in new ways. A rival, a mentor, or a love interest can
    add tension and encourage growth.'
  id: totrans-1151
  prefs: []
  type: TYPE_NORMAL
  zh: 介绍新的关系：引入以新的方式挑战或支持你的主人公的次要角色。一个对手、一个导师或一个爱情兴趣可以增加紧张感并鼓励成长。
- en: By the end of Book two, your protagonist should start questioning their beliefs
    or methods, setting the stage for deeper evolution. Our sleuth ends this book
    peeking into the mirror, questioning who's staring back.
  id: totrans-1152
  prefs: []
  type: TYPE_NORMAL
  zh: 到了第二本书的结尾，你的主人公应该开始质疑他们的信仰或方法，为更深层次的进化奠定基础。我们的侦探在这本书的结尾透过镜子窥视，质疑谁在回望。
- en: BOOK THREE OF FIVE
  id: totrans-1153
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 五本书中的第三本
- en: 'Book Three: Weaving Shadows'
  id: totrans-1154
  prefs: []
  type: TYPE_NORMAL
  zh: 第三本书：编织阴影
- en: When a close friend is accused of a crime they didn't commit, Laura vows to
    clear their name and uncover the true culprit. As she navigates the twists and
    turns of the investigation, Laura grapples with feelings of doubt and betrayal,
    questioning the motives of those closest to her. However, through perseverance
    and determination, she unravels the complex web of lies and deceit, proving once
    again that justice will always prevail.
  id: totrans-1155
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个亲密的朋友被指控犯下他们未犯的罪行时，劳拉发誓要洗清他们的名誉，揭露真正的罪犯。在调查过程中，劳拉在与她的亲近之人动机的怀疑和背叛感中挣扎，质疑她最亲近的人的动机。然而，通过坚持不懈和决心，她揭开了复杂的谎言和欺骗网络，再次证明正义终将胜利。
- en: Along the way, she confronts her own inner demons and learns to embrace her
    unique place in the world, finding strength in her newfound sense of purpose and
    identity.
  id: totrans-1156
  prefs: []
  type: TYPE_NORMAL
  zh: 在旅途中，她面对自己内心的恶魔，学会拥抱自己在世界中的独特位置，在新的目标和身份中找到力量。
- en: Midway through, things get real. Introduce a personal stake or a mystery that
    digs into the protagonist's deepest fears or desires.
  id: totrans-1157
  prefs: []
  type: TYPE_NORMAL
  zh: 中途，事情变得真实。引入一个个人利益或一个深入主人公最深恐惧或欲望的神秘事件。
- en: The case hits close to home, challenging our hero like never before. They must
    face their fears head-on. By the end, they're not the same. They've grown, significantly
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: 这个案件与我们的英雄息息相关，以前所未有的方式挑战他们。他们必须直面恐惧。到头来，他们不再是原来的样子。他们成长了，意义重大
- en: The mission? Terrifyingly personal. Here, our protagonist faces their Goliath.
    It's do or die, sink or swim. They must marshal every ounce of wit, will, and
    wisdom gained. This trial by fire forges them, hardening resolve, sharpening instincts.
    They emerge reborn, ready for more.
  id: totrans-1159
  prefs: []
  type: TYPE_NORMAL
  zh: 任务？令人恐惧地个人化。在这里，我们的主人公面对他们的歌利亚。这是生死存亡，沉浮未定。他们必须调动所获得的所有智慧、意志和智慧。这场烈火般的考验锻造了他们，坚定了决心，锐化了本能。他们重生归来，准备迎接更多挑战。
- en: This book should force a significant change in them, perhaps a shift in their
    motivation, a reevaluation of their relationships, or a confrontation with their
    past.
  id: totrans-1160
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书应该促使他们发生显著的变化，也许是对他们动机的转变，对关系的重新评估，或是对他们过去的直面。
- en: 'Show Real Growth: Highlight how your protagonist is different from Book One.
    They should make decisions or take actions that would have been impossible for
    them at the series'' start. This growth should be a direct result of their experiences
    and the relationships developed up to this point.'
  id: totrans-1161
  prefs: []
  type: TYPE_NORMAL
  zh: 展示真实成长：突出你的主角与第一本书的不同。他们应该做出或采取在系列开始时对他们来说不可能的决定或行动。这种成长应该是他们经历和到目前为止建立的关系的直接结果。
- en: BOOK FOUR OF FIVE
  id: totrans-1162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 五本书中的第四本
- en: 'Book 4: Knotted Secrets'
  id: totrans-1163
  prefs: []
  type: TYPE_NORMAL
  zh: 第四本书：《结的秘密》
- en: As Laura's reputation as a paranormal investigator grows, she finds herself
    drawn into a case involving a haunted house on the outskirts of Polperran. As
    she delves deeper into the mystery, Laura confronts her own demons and past traumas,
    learning to confront her fears and embrace her destiny as a guardian of the supernatural.
    With the help of her aunt and friends, she unravels the dark secrets hidden within
    the walls of the haunted house, bringing closure to the restless spirits trapped
    within.
  id: totrans-1164
  prefs: []
  type: TYPE_NORMAL
  zh: 随着劳拉作为灵异调查员的名声越来越大，她发现自己被卷入了一个涉及波尔佩兰郊外一座闹鬼房子的案件。随着她深入调查这个谜团，劳拉面对自己的恶魔和过去的创伤，学会了面对她的恐惧，拥抱她作为超自然守护者的命运。在她的阿姨和朋友们的帮助下，她揭开了隐藏在闹鬼房子墙壁中的黑暗秘密，为那些被困其中的不安灵魂带来了归宿。
- en: Along the way, she learns to let go of the past and embrace the possibilities
    of the future, finding closure and healing in the process.
  id: totrans-1165
  prefs: []
  type: TYPE_NORMAL
  zh: 在旅途中，她学会了放下过去，拥抱未来的可能性，在这个过程中找到归宿和治愈。
- en: 'Testing Mettle: Introduce conflicts or dilemmas that directly challenge the
    changes they''ve undergone. This book''s mystery should force them to apply their
    new skills, beliefs, or relationships in ways they haven''t before.'
  id: totrans-1166
  prefs: []
  type: TYPE_NORMAL
  zh: 测试意志：引入直接挑战他们所经历变化的冲突或困境。这本书的谜团应该迫使他们以前所未有的方式应用他们的新技能、信念或关系。
- en: This book throws everything at them. It's the ultimate test of their new self.
    There will be moments of doubt. Failures even. But these trials only sharpen their
    resolve.
  id: totrans-1167
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书将一切抛向他们。这是对他们新自我的终极考验。会有怀疑的时刻。甚至失败。但这些考验只会磨砺他们的决心。
- en: Our sleuth stumbles, falls, but gets back up, dusts off, and stares down the
    barrel of their final challenge.
  id: totrans-1168
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的侦探跌跌撞撞，摔倒，但总是爬起来，拍掉灰尘，直面他们最后的挑战。
- en: 'Introspection and Setbacks: Allow for setbacks or failures that lead to introspection.
    These moments are crucial for deepening character development and making the growth
    feel earned.'
  id: totrans-1169
  prefs: []
  type: TYPE_NORMAL
  zh: 反省和挫折：允许出现挫折或失败，导致反省。这些时刻对于深化人物发展和使成长感觉值得至关重要。
- en: By the end of Book Four, your sleuth should have a clear understanding of who
    they are and what they stand for, but with one final challenge looming on the
    horizon.
  id: totrans-1170
  prefs: []
  type: TYPE_NORMAL
  zh: 到了第四本书的结尾，你的侦探应该对自己的身份和他们所代表的东西有一个清晰的理解，但还有一个最后的挑战在远方等待着。
- en: BOOK FIVE OF FIVE
  id: totrans-1171
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 五本书中的第五本
- en: 'Book Five: Tangled Destinies.'
  id: totrans-1172
  prefs: []
  type: TYPE_NORMAL
  zh: 第五本书：《错综的命运》。
- en: In the final installment of the series, Laura faces her greatest challenge yet
    as she races against time to stop a ruthless killer from striking again. With
    the fate of Polperran hanging in the balance, Laura must draw upon all of her
    strength and courage to bring the killer to justice and protect those she holds
    dear. Along the way, she discovers the true meaning of redemption and forgiveness,
    finding peace in the knowledge that she has made a difference in the lives of
    those around her.
  id: totrans-1173
  prefs: []
  type: TYPE_NORMAL
  zh: 在系列的最后一部作品中，劳拉面临着她迄今为止最大的挑战，她与时间赛跑，阻止一个无情的杀手再次作案。随着波尔佩兰的命运悬于一线，劳拉必须调动她所有的力量和勇气，将凶手绳之以法，保护她所珍视的人。在这个过程中，她发现了救赎和宽恕的真正含义，在知道她对周围人的生活产生了影响的知识中找到了平静。
- en: 'The Final Showdown: Everything leads to this. The last case is the most personal,
    the most challenging. It''s their chance to shine, to show how much they''ve changed.
    And in the end, we reflect. We see how far they''ve come.'
  id: totrans-1174
  prefs: []
  type: TYPE_NORMAL
  zh: 最终对决：一切皆由此而来。最后一个案件是最私人的，最具挑战性的。这是他们展示自己的机会，展示他们变化有多大。最后，我们反思。我们看到他们走了多远。
- en: 'The Resolution: The mystery here should be deeply personal, challenging them
    to use everything they''ve learned about themselves across the series. It''s their
    moment to shine, showcasing their transformation.'
  id: totrans-1175
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案：这里的谜团应该是深个人化的，挑战他们利用整个系列中学到的关于自己的所有知识。这是他们展示自己的时刻，展示他们的转变。
- en: 'Resolve and Reflect: Wrap up any loose threads, including personal relationships
    and lingering questions about the protagonist''s past or future. Include a reflection
    on their journey, highlighting how they''ve changed and what they''ve learned
    about themselves.'
  id: totrans-1176
  prefs: []
  type: TYPE_NORMAL
  zh: 解决和反思：整理任何未完成的线索，包括人际关系以及关于主角过去或未来的遗留问题。包括对他们旅程的反思，突出他们如何改变以及他们对自己了解到了什么。
- en: Bringing It All Together
  id: totrans-1177
  prefs: []
  type: TYPE_NORMAL
  zh: 将一切整合在一起
- en: Across five books, your protagonist should evolve from a curious amateur sleuth
    into a seasoned detective, deeply changed by their experiences and the mysteries
    they've unraveled.
  id: totrans-1178
  prefs: []
  type: TYPE_NORMAL
  zh: 在五本书中，你的主角应该从好奇的业余侦探成长为经验丰富的侦探，他们的经历和解决的谜团深刻地改变了他们。
- en: Each book adds a layer to their character, challenging them in new ways and
    pushing them towards the person they're meant to become.
  id: totrans-1179
  prefs: []
  type: TYPE_NORMAL
  zh: 每本书都会为他们的角色增加一层，以新的方式挑战他们，并推动他们成为他们注定要成为的人。
- en: When a reader turns the last page of the final book in the series, they should
    feel that they've been on a journey with an old friend.
  id: totrans-1180
  prefs: []
  type: TYPE_NORMAL
  zh: 当读者翻到系列最后一本书的最后一页时，他们应该感觉到他们与一位老朋友一起经历了一段旅程。
- en: That journey has come to a satisfying conclusion, yet there is room for the
    characters to live on in their imagination.
  id: totrans-1181
  prefs: []
  type: TYPE_NORMAL
  zh: 那段旅程已经得到了令人满意的结局，但仍有空间让角色在想象中继续生活。
- en: What to Do Next?
  id: totrans-1182
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接下来做什么？
- en: Record the suggestions for each book in a text document. You are going to come
    back to these later.
  id: totrans-1183
  prefs: []
  type: TYPE_NORMAL
  zh: 将每本书的建议记录在文本文档中。你稍后会回到这些内容。
- en: You will notice that ChatGPT has generated ideas for not only the character
    arc but also suggested story ideas for the plots of each of the five books in
    this series.
  id: totrans-1184
  prefs: []
  type: TYPE_NORMAL
  zh: 你会发现，ChatGPT不仅为角色弧提供了想法，还为这个系列五本书的情节提出了故事想法。
- en: Carefully review the response.
  id: totrans-1185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仔细审查响应。
- en: Do these book ideas make sense?
  id: totrans-1186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些书想法合理吗？
- en: Are they cool and exciting or a little bland?
  id: totrans-1187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们是否酷炫和令人兴奋，或者有点平淡？
- en: These are very broad suggestions based on the information you provided in the
    prompt—both for the character profile and the story ideas.
  id: totrans-1188
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是非常宽泛的建议，基于你在提示中提供的信息——无论是角色档案还是故事想法。
- en: In the case study I included, Laura’s character arc will focus on working through
    her issues when she walked away from her old job. By the end of book five, Laura
    has to decide whether she wants to return to her old lifestyle now that she has
    been gifted psychic powers.
  id: totrans-1189
  prefs: []
  type: TYPE_NORMAL
  zh: 在我包含的案例研究中，劳拉的角色弧将集中在她离开旧工作时的问题处理上。到第五本书的结尾，劳拉必须决定是否要在获得超能力后回到她以前的生活方式。
- en: Your character, story idea, and niche will be completely different.
  id: totrans-1190
  prefs: []
  type: TYPE_NORMAL
  zh: 你的角色、故事想法和细分市场将完全不同。
- en: These are working documents, and I recommend making notes and adding your ideas
    to them so that you slowly build up a much more comprehensive character arc for
    your sleuth as you write the first and second books of the series.
  id: totrans-1191
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是工作文档，我建议做笔记并添加你的想法，这样你就可以在撰写系列的第一本书和第二本书时，逐渐构建一个更全面的侦探角色弧。
- en: Creating a Character Arc for the Sleuth over a Long Series
  id: totrans-1192
  prefs: []
  type: TYPE_NORMAL
  zh: 为长篇系列中的侦探创建角色弧
- en: If you are familiar with story structure, you may have noticed a pattern in
    the five-book series character arc.
  id: totrans-1193
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你熟悉故事结构，你可能会注意到五本书系列角色弧中的模式。
- en: The growth of the sleuth tracks in the same way as the plot points in a single
    book over a Four-Act story structure.
  id: totrans-1194
  prefs: []
  type: TYPE_NORMAL
  zh: 神探追踪的增长方式与一部四幕故事结构中单一书籍的情节点相似。
- en: '![A diagram of a diagram of a business  Description automatically generated
    with medium confidence](image_rsrc43T.jpg)'
  id: totrans-1195
  prefs: []
  type: TYPE_IMG
  zh: '![一个业务流程图的流程图，自动生成，中等置信度](image_rsrc43T.jpg)'
- en: You can apply the same approach to building a character arc for the sleuth over
    a more extended series than five books.
  id: totrans-1196
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将相同的方法应用于构建超过五本书的更长系列中的侦探角色弧。
- en: For example, I shall work through the 24-chapter cozy mystery novel outline
    later in this guide.
  id: totrans-1197
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我将在本指南的后面部分处理24章轻松悬疑小说的大纲。
- en: 'The steps of this plot outline are:'
  id: totrans-1198
  prefs: []
  type: TYPE_NORMAL
  zh: 这个情节大纲的步骤是：
- en: 'Act 1: Setting Up the Sleuth in Their Ordinary World'
  id: totrans-1199
  prefs: []
  type: TYPE_NORMAL
  zh: 第一幕：在侦探的普通世界中设定侦探
- en: 'Chapter 2: The Shocking Return'
  id: totrans-1200
  prefs: []
  type: TYPE_NORMAL
  zh: 第2章：令人震惊的回归
- en: 'Chapter 3: The Inciting Incident'
  id: totrans-1201
  prefs: []
  type: TYPE_NORMAL
  zh: 第3章：触发事件
- en: 'Chapter 4: A Personal Connection'
  id: totrans-1202
  prefs: []
  type: TYPE_NORMAL
  zh: 第4章：个人联系
- en: 'Chapter 5: Hesitation and Decision'
  id: totrans-1203
  prefs: []
  type: TYPE_NORMAL
  zh: 第5章：犹豫和决定
- en: 'Chapter 6: Committing to the Case'
  id: totrans-1204
  prefs: []
  type: TYPE_NORMAL
  zh: 第6章：致力于案件
- en: 'Act 2: The Sleuth Begins the Investigation'
  id: totrans-1205
  prefs: []
  type: TYPE_NORMAL
  zh: 第二幕：侦探开始调查
- en: 'Chapter 7: Forming the Team'
  id: totrans-1206
  prefs: []
  type: TYPE_NORMAL
  zh: 第7章：组建团队
- en: 'Chapter 8: The Initial Clues'
  id: totrans-1207
  prefs: []
  type: TYPE_NORMAL
  zh: 第8章：初步线索
- en: 'Chapter 9: A Balancing Sub-plot'
  id: totrans-1208
  prefs: []
  type: TYPE_NORMAL
  zh: 第9章：平衡的副情节
- en: 'Chapter 10: Unraveling Motives'
  id: totrans-1209
  prefs: []
  type: TYPE_NORMAL
  zh: 第10章：揭示动机
- en: 'Chapter 11: New Complications'
  id: totrans-1210
  prefs: []
  type: TYPE_NORMAL
  zh: 第十一章：新的复杂情况
- en: 'Chapter 12: The Midpoint Revelation'
  id: totrans-1211
  prefs: []
  type: TYPE_NORMAL
  zh: 第十二章：中点揭示
- en: 'Act 3: Increased Danger and Pressure on the Sleuth'
  id: totrans-1212
  prefs: []
  type: TYPE_NORMAL
  zh: 第三幕：侦探面临的风险和压力增加
- en: 'Chapter 13: A Change in Direction'
  id: totrans-1213
  prefs: []
  type: TYPE_NORMAL
  zh: 第十三章：方向的改变
- en: 'Chapter 14: Obstacles and Threats'
  id: totrans-1214
  prefs: []
  type: TYPE_NORMAL
  zh: 第十四章：障碍和威胁
- en: 'Chapter 15: Following New Leads'
  id: totrans-1215
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十五章：跟随新的线索
- en: 'Chapter 16: Secrets Unveiled'
  id: totrans-1216
  prefs: []
  type: TYPE_NORMAL
  zh: 第十六章：揭露的秘密
- en: 'Chapter 17: Escalating Dangers'
  id: totrans-1217
  prefs: []
  type: TYPE_NORMAL
  zh: 第十七章：危险升级
- en: 'Chapter 18: Apparent Defeat'
  id: totrans-1218
  prefs: []
  type: TYPE_NORMAL
  zh: 第十八章：明显的失败
- en: 'Act 4: Confrontation and Resolution'
  id: totrans-1219
  prefs: []
  type: TYPE_NORMAL
  zh: 第四幕：对抗与解决
- en: 'Chapter 19: Regrouping'
  id: totrans-1220
  prefs: []
  type: TYPE_NORMAL
  zh: 第十九章：重组
- en: 'Chapter 20: A Secret Uncovered'
  id: totrans-1221
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十章：揭露的秘密
- en: 'Chapter 21: The Final Pieces'
  id: totrans-1222
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十一章：最后的拼图
- en: 'Chapter 22: A New Plan'
  id: totrans-1223
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十二章：新的计划
- en: 'Chapter 23: The Grand Finale'
  id: totrans-1224
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十三章：大结局
- en: 'Chapter 24: The Resolution'
  id: totrans-1225
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十四章：解决
- en: 'NOTE: I am definitely NOT suggesting that you try and plan a character arc
    for the sleuth over a 24-book series!'
  id: totrans-1226
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：我绝对不是建议你尝试在一个24本书的系列中为侦探规划角色弧线！
- en: You could use plot outlines like this to spark ideas about how you want the
    character to develop.
  id: totrans-1227
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用这样的情节大纲来激发关于你希望角色如何发展的想法。
- en: 'The challenge is this: as you write the first books in the series, the characters
    will reveal more of their backstories, dreams, and unspoken wishes.'
  id: totrans-1228
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战在于：当你写系列的第一本书时，角色将更多地揭示他们的背景故事、梦想和未说出口的愿望。
- en: This will impact the direction their character development takes in the book
    you are writing and the following books in the series.
  id: totrans-1229
  prefs: []
  type: TYPE_NORMAL
  zh: 这将影响你在写的书中以及系列后续书籍中角色的成长方向。
- en: You will also introduce new characters, subplots with recurring characters,
    and fresh murder investigations.
  id: totrans-1230
  prefs: []
  type: TYPE_NORMAL
  zh: 你还将引入新角色、有重复角色的副情节和新的谋杀调查。
- en: Combining all these factors makes planning a character arc for a long series
    tough.
  id: totrans-1231
  prefs: []
  type: TYPE_NORMAL
  zh: 结合所有这些因素，为长系列规划角色弧线是困难的。
- en: Yes, you will have an overarching goal for the sleuth, but how they get there
    could take ten or twenty books. You don’t know when you are writing book one.
  id: totrans-1232
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，你将为侦探设定一个总目标，但他们如何达到这个目标可能需要十到二十本书。你在写第一本书时并不知道。
- en: My recommendation is to focus on the first five books.
  id: totrans-1233
  prefs: []
  type: TYPE_NORMAL
  zh: 我的建议是专注于前五本书。
- en: Learn from where the writing takes you, then note your ideas about how you see
    your sleuth developing.
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
  zh: 从写作过程中学习，然后记录下你关于如何看到你的侦探发展的想法。
- en: It is going to be a working document!
  id: totrans-1235
  prefs: []
  type: TYPE_NORMAL
  zh: 这将是一个工作文档！
- en: 'PART FOUR: PLOTTING THE SERIES'
  id: totrans-1236
  prefs: []
  type: TYPE_NORMAL
  zh: 第四部分：规划系列
- en: Combining the Story Plot Arc and Character Arc
  id: totrans-1237
  prefs: []
  type: TYPE_NORMAL
  zh: 结合故事情节弧线和角色弧线
- en: The interplay between the overarching story plot arc and the development of
    character arcs is crucial to crafting a compelling cozy mystery series.
  id: totrans-1238
  prefs: []
  type: TYPE_NORMAL
  zh: 主故事情节弧线与角色弧线之间的相互作用对于制作一个引人入胜的温馨神秘系列至关重要。
- en: Each book should stand alone as a satisfying murder mystery investigation and
    contribute to the broader journey unfolding across the series.
  id: totrans-1239
  prefs: []
  type: TYPE_NORMAL
  zh: 每本书都应该作为一个令人满意的谋杀谜案调查独立存在，并为整个系列中展开的更广泛旅程做出贡献。
- en: This chapter explores how to weave these two arcs together, ensuring a rich
    and evolving narrative that resonates deeply with readers.
  id: totrans-1240
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了如何将这两个弧线交织在一起，确保一个丰富且不断发展的叙事，与读者产生深刻的共鸣。
- en: The Series Plot Arc
  id: totrans-1241
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 系列情节弧线
- en: This is the backbone of the entire series. It should provide a sense of cohesion
    and direction across five or more books.
  id: totrans-1242
  prefs: []
  type: TYPE_NORMAL
  zh: 这是整个系列的骨架。它应该为五本或更多书籍提供一种连贯性和方向感。
- en: Readers love tracking these big-picture story ideas across multiple books as
    they enjoy individual story plots.
  id: totrans-1243
  prefs: []
  type: TYPE_NORMAL
  zh: 读者喜欢追踪这些跨多本书的大故事想法，同时享受单个故事情节。
- en: The series arc encompasses the main themes, central conflicts, and ultimate
    resolution that tie the series together and feed into the plot development for
    each book and character development.
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: 系列弧涵盖了主要主题、中心冲突和最终解决方案，这些将系列联系在一起，并为每本书的情节发展和角色成长提供动力。
- en: How to Get Started
  id: totrans-1245
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何开始
- en: Begin with your plot idea for book one of the series.
  id: totrans-1246
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从系列第一本书的情节想法开始。
- en: Then, get to work and brainstorm ideas about how you can expand and develop
    that plot idea into a five-book series.
  id: totrans-1247
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然后，开始工作，并头脑风暴如何将这个情节想法扩展和开发成一个五本书的系列。
- en: Identify the Central Themes of this Series.
  id: totrans-1248
  prefs: []
  type: TYPE_NORMAL
  zh: 确定这个系列的中心主题。
- en: You could explore themes such as the search for justice, community, or self-discovery
    for this series.
  id: totrans-1249
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以为这个系列探索诸如正义、社区或自我发现等主题。
- en: Establish One Central Conflict.
  id: totrans-1250
  prefs: []
  type: TYPE_NORMAL
  zh: 建立一个中心冲突。
- en: The series plot arc should introduce a central conflict or mystery thread that
    deepens and evolves throughout the series, offering readers a reason to stay engaged
    from book to book.
  id: totrans-1251
  prefs: []
  type: TYPE_NORMAL
  zh: 系列情节弧应该引入一个中心冲突或神秘线索，在整个系列中深化和发展，为读者提供从一本书到另一本书保持参与的理由。
- en: For example. Will the sleuth be safe inside witness protection, or will her
    detective work reveal her new home to the criminals and put her life in danger?
  id: totrans-1252
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，侦探在证人保护下是否安全，还是她的侦探工作会揭露她的新家给罪犯，从而危及她的生命？
- en: For example, what if Laura’s new psychic powers make her the target of a secret
    group that wants to silence her, and the threat increases as she develops her
    abilities?
  id: totrans-1253
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果劳拉的新精神力量使她成为想要让她闭嘴的秘密组织的目标，并且随着她能力的提升，威胁也在增加？
- en: Planning the Climax and Resolution of the Series Plot Arc
  id: totrans-1254
  prefs: []
  type: TYPE_NORMAL
  zh: 规划系列情节弧的高潮和解决
- en: The murder mystery story should be complete in each book. Still, the series
    should build towards a final, most compelling conflict resolution of the series
    plot arc, tying up the overarching narrative threads and the character arc in
    a satisfying conclusion.
  id: totrans-1255
  prefs: []
  type: TYPE_NORMAL
  zh: 每本书的谋杀悬疑故事应该是完整的，但整个系列应该朝着最终、最引人入胜的冲突解决方向发展，将整个系列情节弧和角色弧的叙事线索和弧线在令人满意的结论中收尾。
- en: Sketch your ideas and build them into a prompt you can use with ChatGPT or other
    AI tools.
  id: totrans-1256
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制你的想法，并将它们构建成可以与ChatGPT或其他AI工具一起使用的提示。
- en: You will create a large prompt that is very specific to your story idea and
    the character profile for your sleuth, then ask the AI to develop the character
    arc and plot arc for a five-book series.
  id: totrans-1257
  prefs: []
  type: TYPE_NORMAL
  zh: 你将创建一个针对你的故事想法和侦探劳拉·马什的角色档案的非常具体的提示，然后要求AI为五本书系列开发角色弧和情节弧。
- en: In the previous section, we examined how the character develops over five books.
  id: totrans-1258
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们探讨了角色如何在五本书中发展。
- en: The goal is to generate many ideas for a series that you can quickly review,
    tell the AI the ideas you like, and then ask the AI to create more like those.
  id: totrans-1259
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是生成许多系列想法，你可以快速审查，告诉AI你喜欢的想法，然后要求AI创建更多类似的想法。
- en: In this prompt, we will ask for a high-level overview of the combined character
    arc and plot arc so that you can quickly generate the five story ideas.
  id: totrans-1260
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个提示中，我们将要求一个综合的角色弧和情节弧的高级概述，以便你可以快速生成五个故事想法。
- en: Then, you can work on each story in more depth and outline each book's plot
    and character arc in more detail.
  id: totrans-1261
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以更深入地处理每个故事，并更详细地概述每本书的情节和角色弧。
- en: Let’s see what ChatGPT can do with this long prompt for The Psychic Fair Mystery
    idea combined with the character profile generated earlier for my sleuth, Laura
    Marsh.
  id: totrans-1262
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看ChatGPT能如何处理这个针对《心灵感应集市之谜》想法的长期提示，并结合之前为我的侦探劳拉·马什生成的角色档案。
- en: I won’t repeat these long amounts of text to save space, and will use placeholders
    in the prompt instead.
  id: totrans-1263
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会重复这些大量的文本以节省空间，而是在提示中使用占位符。
- en: '![](image_rsrc43U.jpg)'
  id: totrans-1264
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc43U.jpg](image_rsrc43U.jpg)'
- en: I need you to plan the character and plot arc for a five-book cozy mystery series.
  id: totrans-1265
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要你为我规划一个五本温馨悬疑系列小说的角色和情节弧。
- en: At the start of book one, the sleuth is gifted with paranormal psychic abilities.
    A compelling series arc should effectively combine paranormal and mystery elements.
  id: totrans-1266
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一本书的开头，侦探被赋予了超自然的通灵能力。一个引人入胜的系列弧应该有效地结合超自然和悬疑元素。
- en: Identify the core mystery or paranormal conflict that will span the entire series.
  id: totrans-1267
  prefs: []
  type: TYPE_NORMAL
  zh: 确定贯穿整个系列的核心理谜或超自然冲突。
- en: Develop the character arc for a paranormal sleuth whose personal journey and
    development are intertwined with the resolution of this central conflict.
  id: totrans-1268
  prefs: []
  type: TYPE_NORMAL
  zh: 为一个个人旅程和发展与这个中心冲突解决交织的超自然侦探开发角色弧。
- en: Plan key milestones that mark progress in the series arc across each of the
    five individual books, ensuring that each installment moves the overarching story
    forward.
  id: totrans-1269
  prefs: []
  type: TYPE_NORMAL
  zh: 制定关键里程碑，标记系列故事弧在每本独立书籍中的进展，确保每一部作品都能推动整体故事向前发展。
- en: Introduce subplots that tie into the larger narrative but are resolved within
    a single book.
  id: totrans-1270
  prefs: []
  type: TYPE_NORMAL
  zh: 引入与更大叙事相关但仅在单本书中解决的副情节。
- en: Develop characters’ relationships in ways that contribute to both the standalone
    story and their overall arcs across the series.
  id: totrans-1271
  prefs: []
  type: TYPE_NORMAL
  zh: 以有助于独立故事和整个系列中角色整体弧的方式发展角色关系。
- en: Layer in clues or revelations about the overarching mystery plot in each book,
    rewarding readers for following the series while still providing closure within
    each installment.
  id: totrans-1272
  prefs: []
  type: TYPE_NORMAL
  zh: 在每本书中逐步加入关于整体神秘情节的线索或揭示，让读者在跟随系列的同时，仍能在每个部分中找到满足感。
- en: 'Here is the backstory character profile for my sleuth, Laura Marsh: [ copy
    the complete character profile developed earlier and paste it here]'
  id: totrans-1273
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我的侦探劳拉·马什的背景人物简介：[复制之前开发的完整人物简介并粘贴在此处]
- en: 'Here is what happens in book one of the series: [ copy the edited What-If notes
    about your story idea and paste it here]'
  id: totrans-1274
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是这个系列第一本书中发生的事情：[复制关于你的故事想法的编辑过的“如果”笔记并粘贴在此处]
- en: I need you to develop a character arc for Laura Marsh for a five-book cozy mystery
    series. Show in detail how Laura’s character will grow and develop in specific
    aspects of her character.
  id: totrans-1275
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要你为劳拉·马什这个角色开发一个五本温馨悬疑系列书的角色弧线。详细展示劳拉的性格在特定方面如何成长和发展。
- en: '![](image_rsrc43V.jpg)'
  id: totrans-1276
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc43V.jpg)'
- en: Building on the detailed backstory and events of Book One, let's develop the
    overarching series arc for Laura Marsh's journey through five cozy mystery books.
    Her newly acquired psychic abilities, coupled with her natural detective skills,
    set the stage for a compelling narrative intertwining paranormal elements and
    traditional mystery-solving.
  id: totrans-1277
  prefs: []
  type: TYPE_NORMAL
  zh: 建立在第一本书的详细背景和事件之上，让我们为劳拉·马什在五本温馨悬疑书中旅程的总体系列弧线进行开发。她新获得的心理能力加上她天生的侦探技能，为将灵异元素和传统解谜相结合的引人入胜的叙事奠定了基础。
- en: 'Series Overview: The Enigma of Polperran'
  id: totrans-1278
  prefs: []
  type: TYPE_NORMAL
  zh: 系列概述：波普兰之谜
- en: The core mystery or paranormal conflict spanning the series involves an ancient
    secret deeply rooted in Polperran's history.
  id: totrans-1279
  prefs: []
  type: TYPE_NORMAL
  zh: 系列的核心谜团或灵异冲突深深植根于波普兰的历史中。
- en: This secret is tied to a series of mystical artifacts scattered throughout the
    town, each holding a piece of a larger puzzle that, when assembled, could either
    protect or doom Polperran and its inhabitants.
  id: totrans-1280
  prefs: []
  type: TYPE_NORMAL
  zh: 这个秘密与散布在镇上的一个系列神秘文物有关，每个文物都包含着更大谜团的一部分，当拼凑在一起时，可能会保护或毁灭波普兰及其居民。
- en: Laura's personal journey of self-discovery and empowerment is intertwined with
    her quest to uncover this mystery, as she learns that her family lineage is connected
    to the guardianship of these artifacts.
  id: totrans-1281
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉的个人自我发现和赋权之旅与她揭开这个谜团的追求交织在一起，因为她了解到她的家族血统与这些文物的守护有关。
- en: 'Character Arc: Laura Marsh'
  id: totrans-1282
  prefs: []
  type: TYPE_NORMAL
  zh: 角色弧线：劳拉·马什
- en: Starting as a chef disillusioned by betrayal, Laura transforms into a confident
    and skilled psychic detective.
  id: totrans-1283
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉从一个因背叛而幻灭的厨师转变为一个自信且技艺高超的灵异侦探。
- en: Her personal growth is marked by her acceptance of her psychic abilities, her
    struggles to reconcile with her family's secretive past, and her determination
    to protect her community.
  id: totrans-1284
  prefs: []
  type: TYPE_NORMAL
  zh: 她的个人成长体现在她接受自己的通灵能力，努力与家族的秘密过去和解，以及她保护社区的决心。
- en: Along the way, she learns to trust in her own worth, finds strength in her connections,
    and embraces her role in the larger destiny of Polperran.
  id: totrans-1285
  prefs: []
  type: TYPE_NORMAL
  zh: 在旅途中，她学会了相信自己内在的价值，从她的联系中找到力量，并接受她在波普兰更大命运中的角色。
- en: Book-by-Book Breakdown
  id: totrans-1286
  prefs: []
  type: TYPE_NORMAL
  zh: 一书一分析
- en: 'BOOK 1: "ECHOES OF THE PAST"'
  id: totrans-1287
  prefs: []
  type: TYPE_NORMAL
  zh: 第1本书：《过去的回声》
- en: 'Plot Introduction: As outlined, Laura investigates the murder of a psychic
    medium and an antique dealer, uncovering her psychic abilities and a hidden world
    of paranormal activity in Polperran.'
  id: totrans-1288
  prefs: []
  type: TYPE_NORMAL
  zh: 情节简介：正如概述的那样，劳拉调查了一位灵媒和古董商的谋杀案，揭露了她在波普兰的通灵能力和一个隐藏的灵异活动世界。
- en: 'Series Arc Milestone: Discovery of the first mystical artifact, hinting at
    the larger secret of Polperran.'
  id: totrans-1289
  prefs: []
  type: TYPE_NORMAL
  zh: 系列弧线里程碑：发现第一个神秘文物，暗示波普兰更大的秘密。
- en: 'Subplot: Laura''s struggle with her new abilities and the initial conflict
    with her mother over her newfound path.'
  id: totrans-1290
  prefs: []
  type: TYPE_NORMAL
  zh: 副情节：劳拉在与她新获得的能力作斗争以及与她母亲在她新发现的路径上产生的初步冲突。
- en: 'Character Relationships: Introduction of Laura''s aunt and her team of paranormal
    investigators. Building trust and camaraderie with them and beginning to form
    a deep bond with a local historian, James, who shares an interest in Polperran''s
    mysteries.'
  id: totrans-1291
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：介绍劳拉的阿姨和她的一队灵异调查员。与他们建立信任和友谊，并开始与一位对波普兰之谜感兴趣的当地历史学家詹姆斯建立深厚的联系。
- en: 'BOOK 2: "THE GUARDIAN''S LEGACY"'
  id: totrans-1292
  prefs: []
  type: TYPE_NORMAL
  zh: 第2本书：《守护者的遗产》
- en: 'Plot: Investigating a series of thefts of historical documents leads Laura
    to discover another artifact and a society sworn to protect Polperran''s secrets.'
  id: totrans-1293
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：调查一系列历史文件的盗窃案，将劳拉引向发现另一个文物和一个誓言保护波普兰秘密的社会。
- en: 'Series Arc Milestone: Laura learns of her family''s historical role as guardians
    of the artifacts and begins to understand the significance of her psychic abilities.'
  id: totrans-1294
  prefs: []
  type: TYPE_NORMAL
  zh: 系列弧线里程碑：劳拉了解到她家族历史上作为文物的守护者的角色，并开始理解她心理能力的意义。
- en: 'Subplot: Laura navigates her growing feelings for James while dealing with
    a competitive rival investigator.'
  id: totrans-1295
  prefs: []
  type: TYPE_NORMAL
  zh: 副情节：劳拉在处理与一位竞争性调查员的关系的同时，探索自己对詹姆斯日益增长的感情。
- en: 'Character Relationships: Strengthening of bonds with her aunt and the paranormal
    team, and the deepening of Laura''s relationship with James.'
  id: totrans-1296
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：与阿姨和超自然团队的纽带加强，以及劳拉与詹姆斯关系的深化。
- en: 'BOOK 3: "SHADOWS OVER POLPERRAN"'
  id: totrans-1297
  prefs: []
  type: TYPE_NORMAL
  zh: 第3本书：《波尔珀兰的阴影》
- en: 'Plot: A mysterious figure is sabotaging efforts to protect Polperran''s artifacts.
    Laura must identify and stop them before an artifact falls into the wrong hands.'
  id: totrans-1298
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：一个神秘人物正在破坏保护波尔珀兰文物的努力。劳拉必须在文物落入错误之手之前识别并阻止他们。
- en: 'Series Arc Milestone: The discovery of an ancient ritual that could either
    safeguard or destroy Polperran, depending on who wields the artifacts.'
  id: totrans-1299
  prefs: []
  type: TYPE_NORMAL
  zh: 系列发展里程碑：发现一个古老的仪式，它可以保护或摧毁波尔珀兰，这取决于谁掌握文物。
- en: 'Subplot: Laura''s aunt faces a crisis of faith in their mission, and Laura
    must help restore her confidence.'
  id: totrans-1300
  prefs: []
  type: TYPE_NORMAL
  zh: 副情节：劳拉的阿姨在他们的使命上面临信仰危机，劳拉必须帮助她恢复信心。
- en: 'Character Relationships: Laura''s leadership skills emerge, drawing her closer
    to her team and James, who reveals a secret connection to Polperran''s history.'
  id: totrans-1301
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：劳拉的领导能力显现，使她与团队和詹姆斯的关系更加紧密，詹姆斯揭示了与波尔珀兰历史的秘密联系。
- en: 'BOOK 4: "WHISPERS OF THE TIDE"'
  id: totrans-1302
  prefs: []
  type: TYPE_NORMAL
  zh: 第4本书：《潮声低语》
- en: 'Plot: An artifact linked to the sea brings a tidal wave of paranormal activity
    to Polperran. Laura must unravel the artifact''s history to restore peace.'
  id: totrans-1303
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：与海洋相关的文物给波尔珀兰带来了大量的超自然活动。劳拉必须揭开文物的历史，以恢复和平。
- en: 'Series Arc Milestone: Laura discovers that the artifacts, when combined, have
    the power to open a gateway to another realm.'
  id: totrans-1304
  prefs: []
  type: TYPE_NORMAL
  zh: 系列发展里程碑：劳拉发现，当这些文物结合在一起时，它们具有开启另一个领域门户的力量。
- en: 'Subplot: An old rival of Laura''s aunt returns, challenging Laura''s beliefs
    about her mission and her abilities.'
  id: totrans-1305
  prefs: []
  type: TYPE_NORMAL
  zh: 副情节：劳拉的阿姨的一位老对手回归，挑战劳拉对其使命和能力信念的看法。
- en: 'Character Relationships: Conflict and reconciliation with her mother, who finally
    accepts Laura''s path and reveals more about Laura''s late uncle''s intentions.'
  id: totrans-1306
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：与母亲的冲突和和解，母亲最终接受劳拉的道路，并透露了关于劳拉已故叔叔意图的更多信息。
- en: 'BOOK 5: "THE FINAL GUARDIAN"'
  id: totrans-1307
  prefs: []
  type: TYPE_NORMAL
  zh: 第5本书：《最后的守护者》
- en: 'Plot: With all artifacts in danger of being assembled by a malevolent force,
    Laura leads the effort to protect Polperran, culminating in a final showdown.'
  id: totrans-1308
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：随着所有文物都面临被邪恶力量组装的危险，劳拉领导了保护波尔珀兰的努力，最终在一场决战中达到高潮。
- en: 'Series Arc Milestone: Laura fulfills her destiny as the final guardian, performing
    a ritual that safeguards Polperran''s future while also allowing her to fully
    embrace her psychic legacy.'
  id: totrans-1309
  prefs: []
  type: TYPE_NORMAL
  zh: 系列发展里程碑：劳拉履行了作为最后守护者的命运，进行了一个仪式，保护了波尔珀兰的未来，同时让她完全接受自己的精神遗产。
- en: 'Subplot: Laura must decide between her life in Polperran and a tempting offer
    elsewhere, reflecting on her journey and what she truly values.'
  id: totrans-1310
  prefs: []
  type: TYPE_NORMAL
  zh: 副情节：劳拉必须在波尔珀兰的生活和另一个地方的诱惑性提议之间做出选择，反思她的旅程以及她真正珍视的东西。
- en: 'Character Relationships: Resolution and deepening of relationships with her
    team, her aunt, James, and her community. Laura and James make decisions about
    their future together.'
  id: totrans-1311
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：与团队、阿姨、詹姆斯和社区的和解与关系深化。劳拉和詹姆斯一起做出了关于他们未来的决定。
- en: Series Themes and Progression
  id: totrans-1312
  prefs: []
  type: TYPE_NORMAL
  zh: 系列主题和进展
- en: The series explores themes of identity, belonging, and the balance between duty
    and personal desires.
  id: totrans-1313
  prefs: []
  type: TYPE_NORMAL
  zh: 该系列探讨了身份、归属以及责任与个人欲望之间的平衡。
- en: Laura's journey from a chef to a psychic detective serves as a metaphor for
    self-discovery and embracing one's destiny.
  id: totrans-1314
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉从厨师到灵媒侦探的转变是对自我发现和接受命运的一种隐喻。
- en: Each book offers a satisfying standalone mystery while contributing to the overarching
    narrative.
  id: totrans-1315
  prefs: []
  type: TYPE_NORMAL
  zh: 每本书都提供了一个令人满意的独立谜团，同时为整个叙事做出了贡献。
- en: The development of Laura's relationships, both familial and romantic, alongside
    her growing acceptance and mastery of her psychic abilities, provide a compelling
    character arc that mirrors the unfolding of the series' central mystery.
  id: totrans-1316
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉的人际关系发展，包括家庭和浪漫关系，以及她对自身精神能力日益增长的接受和掌握，构成了一条引人入胜的角色发展轨迹，反映了系列剧中心谜的展开。
- en: The conclusion of the series not only resolves the immediate threat to Polperran
    but also sets Laura up for future adventures, leaving room for continuation or
    spin-offs in this richly imagined world.
  id: totrans-1317
  prefs: []
  type: TYPE_NORMAL
  zh: 系列的结局不仅解决了对波尔珀兰的即时威胁，还为劳拉的未来冒险奠定了基础，为在这个丰富想象的世界中继续或衍生作品留下了空间。
- en: There are some great ideas here for the plot arc involving mystical objects.
  id: totrans-1318
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里有一些关于神秘物体情节弧的精彩想法。
- en: I like the idea of the plot arc being driven by a series of mystical artifacts
    scattered throughout the town, each holding a piece of a larger puzzle that, when
    assembled, could either protect or doom Polperran and its inhabitants.
  id: totrans-1319
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢这个想法，即情节弧由散布在整个城镇的一系列神秘文物驱动，每个文物都持有更大拼图的一部分，当拼凑在一起时，可能会保护或毁灭波尔佩兰及其居民。
- en: This ties in very well with Laura's character arc as she accepts her new psychic
    abilities as a guardian of the artifacts.
  id: totrans-1320
  prefs: []
  type: TYPE_NORMAL
  zh: 这与劳拉的角色弧非常吻合，因为她接受了她作为文物守护者的新心灵感应能力。
- en: But perhaps you need more creative ideas for the overall plot arc for this series.
  id: totrans-1321
  prefs: []
  type: TYPE_NORMAL
  zh: 但也许你需要更多关于这个系列整体情节弧的创意想法。
- en: '![](image_rsrc43W.jpg)'
  id: totrans-1322
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc43W.jpg]'
- en: Can you give me five alternative ideas for the overarching series plot arc for
    Laura Marsh's journey through five cozy mystery books?
  id: totrans-1323
  prefs: []
  type: TYPE_NORMAL
  zh: 你能给我提供五个关于劳拉·马什五本温馨悬疑书旅程的总体系列情节弧的替代想法吗？
- en: '![](image_rsrc43X.jpg)'
  id: totrans-1324
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc43X.jpg]'
- en: Certainly! Here are five alternative overarching plot arcs for Laura Marsh's
    journey through a five-book cozy mystery series. Each arc combines paranormal
    elements with mystery-solving, providing a unique backdrop for Laura's personal
    and detective growth.
  id: totrans-1325
  prefs: []
  type: TYPE_NORMAL
  zh: 当然可以！以下是劳拉·马什五本温馨悬疑系列旅程中五个替代的总体情节弧。每个情节弧将超自然元素与解谜相结合，为劳拉的个性和侦探成长提供了一个独特的背景。
- en: 1\. The Cursed Heirlooms Series
  id: totrans-1326
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 诅咒遗产系列
- en: 'Series Concept: Laura discovers that her family is linked to cursed heirlooms
    scattered across Polperran. Each book involves her tracking down one of these
    objects, causing paranormal disturbances and endangering the town''s residents.'
  id: totrans-1327
  prefs: []
  type: TYPE_NORMAL
  zh: 系列概念：劳拉发现她的家族与散布在波尔佩兰的诅咒遗产有关联。每一本书都涉及她追踪这些物品之一，造成超自然事件并危及城镇居民的安全。
- en: 'Book 1: Laura stumbles upon the first cursed object after inheriting a mysterious
    locket from her aunt. She learns of its dark history and must break its curse
    to save a friend.'
  id: totrans-1328
  prefs: []
  type: TYPE_NORMAL
  zh: 第1本书：劳拉在继承她阿姨留下的一个神秘的护身符后，意外地发现了第一个诅咒物品。她了解到它的黑暗历史，并必须打破它的诅咒来拯救一个朋友。
- en: 'Book 2: A haunted painting in a local gallery draws Laura into the story of
    a vengeful artist whose work captures more than just images.'
  id: totrans-1329
  prefs: []
  type: TYPE_NORMAL
  zh: 第2本书：当地一家画廊的一幅被诅咒的画作将劳拉带入一个复仇艺术家的故事，他的作品捕捉的不仅仅是图像。
- en: 'Book 3: Laura investigates an ancient book that whispers past secrets, leading
    her to uncover hidden truths about Polperran’s founding families.'
  id: totrans-1330
  prefs: []
  type: TYPE_NORMAL
  zh: 第3本书：劳拉调查一本古代书籍，它低语着过去的秘密，引领她揭示波尔佩兰奠基家族的隐藏真相。
- en: 'Book 4: A series of ghostly sightings at an old theater are traced back to
    a cursed script that Laura must find and neutralize.'
  id: totrans-1331
  prefs: []
  type: TYPE_NORMAL
  zh: 第4本书：在一家老剧院的一系列鬼魂目击事件被追溯到劳拉必须找到并中和的诅咒剧本。
- en: 'Book 5: The final heirloom, a clock that manipulates time, threatens to unravel
    the fabric of reality. Laura must gather all she has learned to break the ultimate
    curse and protect the future of Polperran.'
  id: totrans-1332
  prefs: []
  type: TYPE_NORMAL
  zh: 第5本书：最后的遗产，一个操纵时间的时钟，威胁要撕裂现实的织锦。劳拉必须集结她所学的一切来打破最终的诅咒，并保护波尔佩兰的未来。
- en: 2\. The Elemental Guardians Series
  id: totrans-1333
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 元素守护者系列
- en: 'Series Concept: Laura learns she is descended from a line of guardians who
    protect Polperran from the imbalance of elemental forces. Each book focuses on
    a mystery involving one of the elements: Earth, Air, Fire, Water, and Spirit.'
  id: totrans-1334
  prefs: []
  type: TYPE_NORMAL
  zh: 系列概念：劳拉了解到她出身于一个守护者世家，他们保护波尔佩兰免受元素力量的失衡。每一本书都聚焦于一个涉及元素的谜团：地球、空气、火、水和精神。
- en: 'Book 1: Earth - A series of mysterious sinkholes leads Laura to discover an
    ancient earth spirit disturbed by modern developments.'
  id: totrans-1335
  prefs: []
  type: TYPE_NORMAL
  zh: 第1本书：地球 - 一系列神秘的塌陷坑将劳拉引向一个被现代发展打扰的古老地球神。
- en: 'Book 2: Air - Laura investigates a string of unexplained storms and uncovers
    a connection to a long-lost air talisman.'
  id: totrans-1336
  prefs: []
  type: TYPE_NORMAL
  zh: 第2本书：空气 - 劳拉调查一系列无法解释的暴风雨，并揭示与一个失落已久的空气护符的联系。
- en: 'Book 3: Fire - A series of arson attacks reveal a fire spirit seeking revenge.
    Laura must find a way to appease it before more damage is done.'
  id: totrans-1337
  prefs: []
  type: TYPE_NORMAL
  zh: 第3本书：火 - 一系列纵火攻击揭示了一个寻求复仇的火神。劳拉必须找到一种方法来安抚它，以免造成更多损害。
- en: 'Book 4: Water - Mysterious drownings near the coast lead Laura to a water spirit
    entangled with a family curse she must break.'
  id: totrans-1338
  prefs: []
  type: TYPE_NORMAL
  zh: 第4本书：水 - 沿海岸边的一系列神秘溺水事件将劳拉引向一个与家族诅咒纠缠的水神，她必须打破这个诅咒。
- en: 'Book 5: Spirit - Laura faces her greatest challenge when a rift between the
    spirit world and Polperran threatens. She must unite the elements to restore balance
    and protect her town.'
  id: totrans-1339
  prefs: []
  type: TYPE_NORMAL
  zh: 第5本书：精神 - 当灵界与波尔佩兰之间的裂痕威胁时，劳拉面临着她最大的挑战。她必须团结元素，恢复平衡，并保护她的城镇。
- en: 3\. The Psychic Network Series
  id: totrans-1340
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 心灵感应网络系列
- en: 'Series Concept: Laura uncovers a secret network of psychics who have been protecting
    Polperran from a dark force for centuries. Each book reveals a piece of the network''s
    history and a new threat that must be countered.'
  id: totrans-1341
  prefs: []
  type: TYPE_NORMAL
  zh: 系列概念：劳拉揭露了一个秘密的灵媒网络，这些灵媒已经保护波尔珀兰免受黑暗力量数百年的侵袭。每一本书都揭示了网络的历史片段和必须应对的新威胁。
- en: 'Book 1: Laura''s induction into the network after receiving her psychic abilities,
    facing her first test against a malevolent spirit.'
  id: totrans-1342
  prefs: []
  type: TYPE_NORMAL
  zh: 第1本书：劳拉在获得灵媒能力后加入网络，面对她与邪恶精神体的第一次考验。
- en: 'Book 2: A psychic thief using their powers for personal gain draws Laura into
    a moral dilemma and a battle of wits.'
  id: totrans-1343
  prefs: []
  type: TYPE_NORMAL
  zh: 第2本书：一个利用自己的力量谋取私利的灵媒盗贼将劳拉卷入了一个道德困境和智慧之战。
- en: 'Book 3: The discovery of an ancient psychic prophecy puts Laura on the trail
    of a powerful artifact.'
  id: totrans-1344
  prefs: []
  type: TYPE_NORMAL
  zh: 第3本书：发现一个古老的灵媒预言将劳拉引向一个强大的神器。
- en: 'Book 4: Laura must resolve a feud within the psychic network that threatens
    to expose them all to greater danger.'
  id: totrans-1345
  prefs: []
  type: TYPE_NORMAL
  zh: 第4本书：劳拉必须解决灵媒网络内部的纷争，这场纷争威胁着要让他们所有人面临更大的危险。
- en: 'Book 5: A culmination of the dark force''s power requires Laura and the network
    to stand together to prevent a catastrophe.'
  id: totrans-1346
  prefs: []
  type: TYPE_NORMAL
  zh: 第5本书：黑暗力量的力量达到顶峰，需要劳拉和这个网络团结一致，防止灾难发生。
- en: 4\. The Haunted Polperran Series
  id: totrans-1347
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 被诅咒的波尔珀兰系列
- en: 'Series Concept: Laura discovers that Polperran is built on a nexus of ley lines
    that attract supernatural activity. Each book deals with a different aspect of
    the town''s haunted history, unraveling a century-old mystery.'
  id: totrans-1348
  prefs: []
  type: TYPE_NORMAL
  zh: 系列概念：劳拉发现波尔珀兰建立在一条条吸引超自然活动的法线交汇处。每一本书都处理城镇被诅咒历史的不同方面，解开一个世纪前的谜团。
- en: 'Book 1: A ghostly figure is seen in the windows of the town''s oldest building,
    leading Laura to a hidden diary that holds the key to a tragic love story.'
  id: totrans-1349
  prefs: []
  type: TYPE_NORMAL
  zh: 第1本书：在城镇最古老的建筑窗户中看到一个幽灵身影，将劳拉引向一个隐藏的日记，这个日记掌握着一个悲剧爱情故事的关键。
- en: 'Book 2: The discovery of ancient ruins beneath Polperran sparks a series of
    spectral visions that Laura must interpret to prevent a vengeful spirit’s return.'
  id: totrans-1350
  prefs: []
  type: TYPE_NORMAL
  zh: 第2本书：在波尔珀兰下方的古老遗迹的发现引发了一系列幽灵幻象，劳拉必须解读这些幻象以防止复仇之灵的回归。
- en: 'Book 3: A local legend about a phantom ship becomes all too real as Laura investigates
    the spectral sightings along the coast.'
  id: totrans-1351
  prefs: []
  type: TYPE_NORMAL
  zh: 第3本书：劳拉调查沿海地区的幽灵目击事件时，一个关于幽灵船的当地传说变得过于真实。
- en: 'Book 4: The renovation of a historic hotel unleashes poltergeist activity,
    and Laura must delve into its past to find the cause.'
  id: totrans-1352
  prefs: []
  type: TYPE_NORMAL
  zh: 第4本书：一座历史悠久的酒店的翻新引发了鬼魂活动，劳拉必须深入其过去以找到原因。
- en: 'Book 5: The nexus of ley lines under Polperran becomes unstable, threatening
    to release a flood of supernatural chaos. Laura must solve the mystery of the
    town''s founding to restore balance.'
  id: totrans-1353
  prefs: []
  type: TYPE_NORMAL
  zh: 第5本书：《波尔珀兰下方的法线交汇处变得不稳定，威胁着要释放一股超自然混乱的洪水。劳拉必须解开城镇创立的谜团以恢复平衡。》
- en: 5\. The Forgotten Ones Series
  id: totrans-1354
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 被遗忘者系列
- en: 'Series Concept: Laura discovers that Polperran''s history is intertwined with
    "The Forgotten Ones," spirits who were wronged and seek justice. Each book centers
    on helping one of these spirits find peace, uncovering pieces of a larger puzzle.'
  id: totrans-1355
  prefs: []
  type: TYPE_NORMAL
  zh: 系列概念：劳拉发现波尔珀兰的历史与“被遗忘者”交织在一起，这些精神体受到了不公正的对待，寻求正义。每一本书都集中在帮助这些精神体找到安宁，揭开更大谜团的一块块碎片。
- en: 'Book 1: Laura helps the spirit of a wrongfully accused witch from Polperran''s
    early days to clear her name and rest in peace.'
  id: totrans-1356
  prefs: []
  type: TYPE_NORMAL
  zh: 第1本书：劳拉帮助一个在波尔珀兰早期被错误指控的女巫的灵魂，为她洗清罪名，让她得以安息。
- en: 'Book 2: The ghost of a lighthouse keeper who died in mysterious circumstances
    signals Laura to uncover a hidden truth.'
  id: totrans-1357
  prefs: []
  type: TYPE_NORMAL
  zh: 第2本书：一个灯塔看守人在神秘情况下去世的幽灵向劳拉发出信号，让她揭露一个隐藏的真相。
- en: 'Book 3: A soldier from the English Civil War haunts a local pub, and Laura
    must piece together his story to fulfill his last wish.'
  id: totrans-1358
  prefs: []
  type: TYPE_NORMAL
  zh: 第3本书：一位英国内战时期的士兵在当地的酒吧中徘徊，劳拉必须拼凑他的故事以完成他的最后愿望。
- en: 'Book 4: The spirit of a Victorian doctor refuses to leave the old hospital
    building, leading Laura to a scandal that rocked the town.'
  id: totrans-1359
  prefs: []
  type: TYPE_NORMAL
  zh: 第4本书：一个维多利亚时代的医生的灵魂拒绝离开旧医院大楼，将劳拉引向一场震撼城镇的丑闻。
- en: 'Book 5: Realizing that these spirits were all connected in life, Laura uncovers
    a centuries-old injustice that ties back to Polperran''s founding families, leading
    to a final act of restitution and healing.'
  id: totrans-1360
  prefs: []
  type: TYPE_NORMAL
  zh: 第5本书：意识到这些精神体在生前都相互联系，劳拉揭露了一个与波尔珀兰创立家族有关的几个世纪的冤情，导致最后的赔偿和治愈行为。
- en: Each of these arcs offers a framework for Laura's growth from a disillusioned
    chef to a confident, psychic detective. Through her investigations, she not only
    solves mysteries but also learns about herself, her family's legacy, and the rich
    tapestry of her hometown's history.
  id: totrans-1361
  prefs: []
  type: TYPE_NORMAL
  zh: 这些弧线为劳拉从一名失望的厨师成长为自信、有预知能力的侦探提供了一个框架。通过她的调查，她不仅解决了谜题，还了解了自己、家族的遗产以及她家乡历史的丰富织锦。
- en: I hope you can recognize the power of these simple prompts.
  id: totrans-1362
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你能认识到这些简单提示的力量。
- en: These story ideas can be expanded and developed into a full working synopsis.
  id: totrans-1363
  prefs: []
  type: TYPE_NORMAL
  zh: 这些故事想法可以扩展并发展成为完整的工作概要。
- en: Once you have given the AI the information it needs in the large prompt that
    contains the character profile and the plot idea for the first book, you can continue
    asking questions and developing the plot and character arc ideas for the five-book
    series until you have five ideas that you can't wait to start writing!
  id: totrans-1364
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你向AI提供了包含角色档案和第一本书情节想法的大提示中所需要的信息，你就可以继续提问，并发展五本书系列中的情节和角色弧线想法，直到你有五个你迫不及待想要开始写作的想法！
- en: Iteration is the key hack to creating the best story arcs.
  id: totrans-1365
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代是创造最佳故事弧线的关键技巧。
- en: Important. When you use ChatGPT, Claude, or other AI tools to generate these
    story ideas, be sure to stay on the same page as the other prompts that you have
    been working on for this story.
  id: totrans-1366
  prefs: []
  type: TYPE_NORMAL
  zh: 重要。当你使用ChatGPT、Claude或其他AI工具生成这些故事想法时，确保与其他你为这个故事正在工作的提示保持一致。
- en: The system will remember the responses and add layers to the suggestions based
    on your previous questions.
  id: totrans-1367
  prefs: []
  type: TYPE_NORMAL
  zh: 系统会记住你的回应，并根据你之前的问题为建议添加层次。
- en: If you want to start a new conversation from scratch, go to the top of the viewing
    window and click on the ChatGPT Icon. The previous conversations are stored in
    the sidebar, so you can always go back and restart any discussion about a particular
    story.
  id: totrans-1368
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要从头开始新的对话，请转到查看窗口的顶部并点击ChatGPT图标。之前的对话存储在侧边栏中，所以你可以随时返回并重新开始任何关于特定故事的讨论。
- en: What to Do Next?
  id: totrans-1369
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接下来要做什么？
- en: At this point, you should have created at least five, and probably a lot more,
    ideas for a five-book series that fits your niche and story ideas.
  id: totrans-1370
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你应该至少创建了五个，可能还有很多更多，适合你细分市场和故事想法的五本书系列的想法。
- en: 'NOTE. I am suggesting five books. You may prefer three books or seven: your
    stories, books, and ideas.'
  id: totrans-1371
  prefs: []
  type: TYPE_NORMAL
  zh: 注意。我建议写五本书。你可能更喜欢三本或七本：你的故事、书籍和想法。
- en: Copy all of the responses from ChatGPT over to a text document.
  id: totrans-1372
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT的所有回应复制到一个文本文档中。
- en: Now is the time to stand back and review the information you have generated.
  id: totrans-1373
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候退后一步，回顾你所生成的信息了。
- en: Do you have a character profile for your sleuth?
  id: totrans-1374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你为你的侦探有一个角色档案吗？
- en: Do you have a broad character arc for your sleuth over a five-book series?
  id: totrans-1375
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你在你的五本书系列中为你的侦探设定了一个广泛的角色弧线吗？
- en: Have you a solid plot idea for book one that is part of a plot arc for the entire
    series?
  id: totrans-1376
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你为第一本书有一个稳固的情节想法，它是整个系列情节弧线的一部分吗？
- en: Can you combine the character arc and plot arc to create a short outline for
    each book in the series?
  id: totrans-1377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你能将角色弧线和情节弧线结合起来，为系列中的每一本书创建一个简短的概述吗？
- en: The goal is to write with AI to cut down the story development time and develop
    plot and character arcs for your series faster than you thought possible. If you
    are unhappy with the suggestions, keep editing the prompt and feed the AI the
    detail it needs.
  id: totrans-1378
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是使用AI来减少故事发展时间，并比想象中更快地为你的一系列故事开发情节和角色弧线。如果你对建议不满意，继续编辑提示，并向AI提供它需要的详细信息。
- en: Challenge the responses until the AI has generated a complete plan that gets
    you excited and intrigued about the journey your sleuth and the reader will take
    from book one to the end of book five. Once you have these foundations in place,
    you can start building the cast list and adding the extra layers that will make
    your work special and unique.
  id: totrans-1379
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战这些回应，直到AI生成一个完整的计划，让你对侦探和读者从第一本书到第五本书的旅程感到兴奋和好奇。一旦你有了这些基础，你就可以开始构建角色名单，并添加那些会使你的作品独特和特别的多层次内容。
- en: 'PART FIVE: PARANORMAL AND HISTORICAL SERIES'
  id: totrans-1380
  prefs: []
  type: TYPE_NORMAL
  zh: 第五部分：超自然和历史系列
- en: Creating a Paranormal Sleuth
  id: totrans-1381
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个超自然侦探
- en: Paranormal Mysteries
  id: totrans-1382
  prefs: []
  type: TYPE_NORMAL
  zh: 超自然悬疑小说
- en: If you are writing paranormal or supernatural cozy mysteries, record all the
    magical rules of this story world, the words the characters use to create spells,
    and any magical systems and symbols.
  id: totrans-1383
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在写超自然或超自然轻松悬疑小说，记录下这个故事世界的所有魔法规则，角色使用的创造咒语的词语，以及任何魔法系统和符号。
- en: Are there new races and cultures to explore?
  id: totrans-1384
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是否有新的种族和文化需要探索？
- en: How are they different from humans?
  id: totrans-1385
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们与人类有何不同？
- en: How do they dress and speak?
  id: totrans-1386
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们如何着装和说话？
- en: In many cases, these differences will be subtle and invisible to members of
    the public, but other paranormal beings will recognize them instantly.
  id: totrans-1387
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多情况下，这些差异将非常微妙，对公众成员来说是看不见的，但其他超自然生物会立刻识别出来。
- en: Once you create the rules for this society, you must ensure that they are followed
    through in every book in the series.
  id: totrans-1388
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦为这个社会制定了规则，就必须确保它们在系列中的每一本书中都得到执行。
- en: Consistency is key. The rules must make sense to the characters in this world
    and to the readers!
  id: totrans-1389
  prefs: []
  type: TYPE_NORMAL
  zh: 一致性是关键。规则必须对这个世界中的角色和读者都有意义！
- en: Developing a Relatable Character
  id: totrans-1390
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 发展一个可亲的角色
- en: Backstory and Motivation. How do the paranormal abilities of the sleuth affect
    their daily life and relationships? Building a powerful backstory about how the
    sleuth acquired these abilities can help deepen the character's complexity. Were
    they gifted, inherited, or acquired by chance, for example?
  id: totrans-1391
  prefs: []
  type: TYPE_NORMAL
  zh: 背景 和 动机。侦探的超自然能力如何影响他们的日常生活和人际关系？构建一个强大的背景故事，讲述侦探如何获得这些能力，可以帮助加深角色的复杂性。例如，他们是被赋予的、继承的还是偶然获得的？
- en: Personality Traits. Balancing strengths with vulnerabilities, especially in
    relation to their paranormal abilities, can make the sleuth more human and engaging.
  id: totrans-1392
  prefs: []
  type: TYPE_NORMAL
  zh: 性格特征。平衡优点和弱点，尤其是在与他们的超自然能力相关的情况下，可以使侦探更加人性化且引人入胜。
- en: The sleuth’s internal struggle with their paranormal abilities can add to the
    suspense. This might involve the character grappling with the ethics of using
    their powers, fearing the consequences of their abilities, or struggling to control
    them effectively.
  id: totrans-1393
  prefs: []
  type: TYPE_NORMAL
  zh: 侦探与他们的超自然能力之间的内心斗争可以增加悬念。这可能涉及角色在利用他们的力量的道德问题上挣扎，害怕他们能力带来的后果，或者努力有效地控制它们。
- en: Character Voice and Supernatural Elements
  id: totrans-1394
  prefs: []
  type: TYPE_NORMAL
  zh: 角色声音和超自然元素
- en: Your book may have a diverse cast that may include humans, ghosts, witches,
    or other supernatural beings.
  id: totrans-1395
  prefs: []
  type: TYPE_NORMAL
  zh: 你的书可能有一个多元化的角色阵容，可能包括人类、鬼魂、女巫或其他超自然生物。
- en: Each character's background, experiences, and abilities should influence their
    speech patterns, vocabulary, and perspectives.
  id: totrans-1396
  prefs: []
  type: TYPE_NORMAL
  zh: 每个角色的背景、经历和能力都应该影响他们的说话方式、词汇量和视角。
- en: For example, a centuries-old ghost might use outdated slang or formal speech,
    while a modern-day witch could blend arcane terms with contemporary language.
  id: totrans-1397
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个世纪之久的鬼魂可能会使用过时的俚语或正式的言辞，而一个现代女巫可能会将古老术语与当代语言混合。
- en: Have fun developing these unique voices to ensure they are consistent and believable.
  id: totrans-1398
  prefs: []
  type: TYPE_NORMAL
  zh: 享受发展这些独特声音的过程，确保它们一致且可信。
- en: Integrating Paranormal Abilities
  id: totrans-1399
  prefs: []
  type: TYPE_NORMAL
  zh: 整合超自然能力
- en: Defining their Abilities. Clearly define the sleuth's paranormal abilities,
    including their limitations and how they grow or change over time. Limitations
    are particularly important, as they prevent the sleuth from appearing too powerful,
    keeping mysteries challenging and the story engaging.
  id: totrans-1400
  prefs: []
  type: TYPE_NORMAL
  zh: 定义他们的能力。明确界定侦探的超自然能力，包括它们的限制以及它们随时间如何增长或变化。限制尤其重要，因为它们可以防止侦探显得过于强大，保持神秘事件的挑战性和故事的吸引力。
- en: For example. Perhaps the sleuth’s psychic powers only extend to physical items
    they can touch, and there are limits on how often they can use these powers and
    the toll they take on the character.
  id: totrans-1401
  prefs: []
  type: TYPE_NORMAL
  zh: 例如。也许侦探的心灵感应能力仅限于他们能触摸到的物理物品，并且他们对这些能力的使用频率有限，以及这些能力对角色造成的负担。
- en: Do Paranormal Elements Make Solving Mysteries Easier?
  id: totrans-1402
  prefs: []
  type: TYPE_NORMAL
  zh: 超自然元素是否使解决神秘事件变得更容易？
- en: Balancing the abilities of the paranormal with the need to keep readers guessing
    can be a challenge.
  id: totrans-1403
  prefs: []
  type: TYPE_NORMAL
  zh: 平衡超自然能力与保持读者猜测的需求可能是一个挑战。
- en: Use your creativity to devise clever ways to complement traditional detective
    work by utilizing the sleuth's paranormal abilities to solve mysteries.
  id: totrans-1404
  prefs: []
  type: TYPE_NORMAL
  zh: 利用侦探的超自然能力，通过创意性地补充传统侦探工作，来解决神秘事件。
- en: This might involve interpreting supernatural clues, using magical insight to
    uncover hidden truths, or communicating with non-human entities while ensuring
    the paranormal aspect doesn't overshadow the mystery.
  id: totrans-1405
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能包括解读超自然线索，使用魔法洞察力揭示隐藏的真相，或者在确保超自然方面不会掩盖神秘事件的同时与非人类实体进行交流。
- en: Complex Mysteries. Consider making the sleuth's paranormal abilities a major
    subplot, but human intuition, detective work, and interaction with other characters
    are required to resolve the mystery fully.
  id: totrans-1406
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂的神秘事件。考虑将侦探的超自然能力作为主要副线，但需要人类的直觉、侦探工作和与其他角色的互动来完全解决神秘事件。
- en: This includes collecting physical evidence, interviewing suspects, and using
    logic and reasoning to piece together clues, ensuring that the paranormal aspects
    complement rather than replace these traditional methods.
  id: totrans-1407
  prefs: []
  type: TYPE_NORMAL
  zh: 这包括收集物理证据、审问嫌疑人、使用逻辑和推理来拼凑线索，确保超自然方面补充而不是取代这些传统方法。
- en: Balancing the Paranormal with the Cozy. The paranormal aspects of the story
    should not detract from the warm, community-focused atmosphere of cozy mysteries.
  id: totrans-1408
  prefs: []
  type: TYPE_NORMAL
  zh: 平衡超自然与温馨。故事中的超自然方面不应削弱温馨、以社区为中心的神秘小说的氛围。
- en: This could involve the sleuth using their abilities to help their community
    or finding support among friends and family who accept their unique talents.
  id: totrans-1409
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能涉及侦探使用他们的能力来帮助他们的社区或在他们接受他们独特才能的朋友和家人中找到支持。
- en: Making the Sleuth Stand Out
  id: totrans-1410
  prefs: []
  type: TYPE_NORMAL
  zh: 使侦探脱颖而出
- en: Unique Character Hooks. Their paranormal abilities are only one aspect of what
    makes a character truly distinctive. Get creative and give the sleuth unique character
    hooks that make them memorable. This could be a quirky hobby, an unusual pet,
    or a reason they became sleuths.
  id: totrans-1411
  prefs: []
  type: TYPE_NORMAL
  zh: 独特的性格钩子。他们的超自然能力只是使角色真正独特的一个方面。发挥创意，为侦探创造独特的性格钩子，使他们令人难忘。这可以是一个古怪的兴趣爱好，一个不寻常的宠物，或者他们成为侦探的原因。
- en: Relationships. Highlight the importance of the sleuth's relationships with other
    characters, including allies, mentors, and antagonists. These dynamics can add
    layers to the sleuth's character, provide opportunities for humor and conflict,
    and make the paranormal elements more accessible and grounded in the story's world.
  id: totrans-1412
  prefs: []
  type: TYPE_NORMAL
  zh: 关系。强调侦探与其他角色（包括盟友、导师和对手）的关系的重要性。这些动态可以为侦探的角色增添层次，提供幽默和冲突的机会，并使超自然元素在故事世界中更加易于接受和扎根。
- en: Community Integration. The sleuth is part of a community that reacts to their
    paranormal abilities in various ways. This can add tension, conflict, support,
    and depth to the story, making the sleuth's role in their community a key part
    of their likability and relatability.
  id: totrans-1413
  prefs: []
  type: TYPE_NORMAL
  zh: 社区融合。侦探是社区的一部分，社区以各种方式对他们超自然的能力做出反应。这可以为故事增添紧张、冲突、支持和深度，使侦探在社区中的角色成为他们受欢迎和容易亲近的关键部分。
- en: Paranormal or supernatural abilities add another layer to the character-building
    process for the sleuth and major characters in any mystery. They need to be woven
    into the plot of the story seamlessly and organically.
  id: totrans-1414
  prefs: []
  type: TYPE_NORMAL
  zh: 超自然或超能力为侦探以及任何神秘故事中的主要角色的角色塑造过程增添了另一层。它们需要无缝且自然地融入故事情节。
- en: The reader should totally accept that this is part of the storyworld and believe
    in an amateur sleuth with paranormal abilities who is not only capable and intriguing
    but also deeply human and relatable.  Such a character can carry a cozy mystery
    series, engaging readers book after book with their unique perspective on solving
    mysteries and navigating the challenges of their abilities.
  id: totrans-1415
  prefs: []
  type: TYPE_NORMAL
  zh: 读者应该完全接受这是故事世界的一部分，并相信一个拥有超自然能力的业余侦探，他不仅能力出众、引人入胜，而且非常人性化、容易亲近。这样一个角色可以支撑起温馨神秘系列，通过他们独特的解决谜题和应对能力挑战的视角，让读者一本书接一本书地被吸引。
- en: The goal is to craft stories where paranormal elements add richness and complexity
    to the mystery, engaging readers with both the supernatural and the human aspects
    of solving crimes.
  id: totrans-1416
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是创作故事，其中超自然元素为神秘增添了丰富性和复杂性，通过超自然和人类解决犯罪方面的元素吸引读者。
- en: Next Steps
  id: totrans-1417
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下一步
- en: Take the basic story idea for book one, expand it into a synopsis, and then
    start working on building a chapter-by-chapter plot outline using ChatGPT. Copy
    the ideas for the other four books into a text document. You will work on these
    after writing book one.
  id: totrans-1418
  prefs: []
  type: TYPE_NORMAL
  zh: 从第一本书的基本故事想法开始，扩展成一个概要，然后开始使用ChatGPT构建章节章节的情节大纲。将其他四本书的想法复制到文本文档中。你将在写完第一本书后处理这些内容。
- en: Don’t be scared to change the prompt or ask the AI for more information about
    any specific book or the overall plot arc for the series. This is meant to be
    a two-way conversation with your writing partner.
  id: totrans-1419
  prefs: []
  type: TYPE_NORMAL
  zh: 不要害怕更改提示或向AI询问关于任何特定书籍或整个系列情节弧线的更多信息。这应该是一个与你的写作伙伴的双向对话。
- en: Planning a Paranormal Series
  id: totrans-1420
  prefs: []
  type: TYPE_NORMAL
  zh: 规划超自然系列
- en: A compelling series arc that effectively combines paranormal and mystery elements
    requires careful planning and creativity.
  id: totrans-1421
  prefs: []
  type: TYPE_NORMAL
  zh: 一个引人入胜的系列情节弧线，有效地结合了超自然和神秘元素，需要仔细规划和创造力。
- en: Let’s leverage the power of ChatGPT to combine these story elements and create
    a plan for a five-book paranormal series.
  id: totrans-1422
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们利用ChatGPT的力量，结合这些故事元素，为五本超自然系列小说制定一个计划。
- en: '![](image_rsrc43Y.jpg)'
  id: totrans-1423
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc43Y.jpg](image_rsrc43Y.jpg)'
- en: I need you to plan the character arc and plot arc for a five-book cozy mystery
    series.
  id: totrans-1424
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要你为这个五本温馨悬疑系列规划角色弧线和情节弧线。
- en: The sleuth has paranormal abilities at the start of book one.
  id: totrans-1425
  prefs: []
  type: TYPE_NORMAL
  zh: 侦探在第一本书的开始就拥有超自然能力。
- en: A compelling series arc should effectively combine paranormal and mystery elements.
  id: totrans-1426
  prefs: []
  type: TYPE_NORMAL
  zh: 一个引人入胜的系列弧线应该有效地结合超自然和悬疑元素。
- en: Identify the core mystery or paranormal conflict that will span the entire series.
  id: totrans-1427
  prefs: []
  type: TYPE_NORMAL
  zh: 确定贯穿整个系列的中心谜团或超自然冲突。
- en: Develop the character arc for a paranormal sleuth whose personal journey and
    development are intertwined with the resolution of this central conflict.
  id: totrans-1428
  prefs: []
  type: TYPE_NORMAL
  zh: 为一个超自然侦探的角色弧线发展，其个人旅程和发展与解决这个中心冲突交织在一起。
- en: Plan key milestones that mark progress in the series arc across each of the
    individual five books, ensuring that each installment moves the overarching story
    forward.
  id: totrans-1429
  prefs: []
  type: TYPE_NORMAL
  zh: 规划关键里程碑，标志着系列弧线在每本单独的五本书中的进展，确保每个分册都将整体故事向前推进。
- en: Introduce subplots that tie into the larger narrative but are resolved within
    a single book.
  id: totrans-1430
  prefs: []
  type: TYPE_NORMAL
  zh: 引入与更大叙事相关但仅在单本书中解决的副线剧情。
- en: Develop characters’ relationships in ways that contribute to both the standalone
    story and their overall arcs across the series.
  id: totrans-1431
  prefs: []
  type: TYPE_NORMAL
  zh: 以一种有助于独立故事和整个系列中角色整体弧线的方式发展角色关系。
- en: Layer in clues or revelations about the overarching mystery in each book, rewarding
    readers for following the series while still providing closure within each installment.
  id: totrans-1432
  prefs: []
  type: TYPE_NORMAL
  zh: 在每本书中逐步加入关于整体谜团的线索或揭示，奖励读者跟随系列的同时，仍为每个分册提供结局。
- en: You can choose the paranormal ability and character profile for the sleuth.
  id: totrans-1433
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以选择侦探的超自然能力和角色档案。
- en: '![](image_rsrc43Z.jpg)'
  id: totrans-1434
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc43Z.jpg)'
- en: 'For this five-book cozy mystery series, we''ll create a compelling narrative
    that blends paranormal elements with traditional mystery-solving. Our sleuth,
    whom we''ll name Cassidy, possesses the paranormal ability to communicate with
    ghosts. This unique talent sets the stage for both the overarching series arc
    and Cassidy''s personal development journey. Here''s a detailed plan that outlines
    the character arc, series arc, key milestones, subplots, and character relationships:'
  id: totrans-1435
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个五本温馨悬疑系列，我们将创造一个引人入胜的叙事，将超自然元素与传统解谜相结合。我们的侦探，我们将她命名为凯西迪，拥有与鬼魂交流的超自然能力。这种独特才能为整体系列弧线和凯西迪的个人发展旅程奠定了基础。以下是一个详细的计划，概述了角色弧线、系列弧线、关键里程碑、副线剧情和角色关系：
- en: Series and Character Overview
  id: totrans-1436
  prefs: []
  type: TYPE_NORMAL
  zh: 系列和角色概述
- en: 'Sleuth''s Profile: Cassidy, in her early 30s, is initially skeptical of her
    abilities. She inherits an old bookstore in a small, seemingly quaint town with
    a rich and mysterious history. Cassidy discovers her ability to communicate with
    ghosts shortly after moving to town, starting with the bookstore''s former owner
    who becomes her mentor in using her powers.'
  id: totrans-1437
  prefs: []
  type: TYPE_NORMAL
  zh: 侦探档案：凯西迪，三十多岁，最初对她自己的能力持怀疑态度。她继承了一家位于一个看似宁静的小镇上的老书店，这个小镇有着丰富而神秘的历史。凯西迪在搬到小镇后不久就发现了她与鬼魂交流的能力，这始于书店的前任老板，他成为了她使用自己力量的导师。
- en: 'Core Series Arc: The central conflict involves an ancient curse placed upon
    Cassidy''s town, which not only affects the living but also traps spirits between
    worlds. This curse is directly tied to Cassidy''s lineage and her paranormal abilities.
    Solving the mysteries behind the curse while helping spirits find peace will form
    the crux of the series.'
  id: totrans-1438
  prefs: []
  type: TYPE_NORMAL
  zh: 核心系列弧线：中心冲突涉及一个古老的诅咒，这个诅咒施加在凯西迪的小镇上，不仅影响了活人，还将灵魂困在了两个世界之间。这个诅咒直接与凯西迪的家族和她的超自然能力有关。解决诅咒背后的谜团，同时帮助灵魂找到安宁，将成为系列的核心。
- en: 'Character Arc: Cassidy transforms from a skeptic into a confident sleuth who
    embraces her abilities. Her journey involves uncovering her family''s past, understanding
    the extent of her powers, and ultimately playing a crucial role in breaking the
    town''s curse.'
  id: totrans-1439
  prefs: []
  type: TYPE_NORMAL
  zh: 角色弧线：凯西迪从一个怀疑论者转变为一个自信的侦探，她接受了自己的能力。她的旅程包括揭开她家族的过去，了解她能力的范围，并最终在打破小镇的诅咒中扮演关键角色。
- en: Book-by-Book Breakdown
  id: totrans-1440
  prefs: []
  type: TYPE_NORMAL
  zh: 按书划分
- en: 'BOOK 1: "WHISPERS FROM THE SHELVES"'
  id: totrans-1441
  prefs: []
  type: TYPE_NORMAL
  zh: 第1本书：《书架低语》
- en: 'Plot: Cassidy moves to town and takes over the bookstore. She solves her first
    mystery involving a ghost haunting her shop, related to a decades-old unsolved
    murder.'
  id: totrans-1442
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：凯西迪搬到了这个小镇，接管了书店。她解决了第一个涉及一个鬼魂纠缠她店铺的谜案，这个谜案与几十年前的一起未解决的谋杀案有关。
- en: 'Series Arc Milestone: Cassidy learns of the ancient curse and her ability.
    She also uncovers a piece of the curse''s history tied to her family.'
  id: totrans-1443
  prefs: []
  type: TYPE_NORMAL
  zh: 系列弧线里程碑：凯西迪了解到古老的诅咒和她自己的能力。她还发现了一块与家族有关的诅咒历史。
- en: 'Subplot: Adapting to her new life and the skepticism from the local community
    regarding her abilities.'
  id: totrans-1444
  prefs: []
  type: TYPE_NORMAL
  zh: 分支剧情：适应新的生活，以及当地社区对她能力的怀疑。
- en: 'Character Relationships: Cassidy befriends a local detective, Alex, and a history
    professor, Jordan, who share an interest in the paranormal and help with her investigations.'
  id: totrans-1445
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：凯西迪与一位对超自然现象感兴趣的当地侦探亚历克斯和一位历史教授乔丹成为朋友，他们帮助她进行调查。
- en: 'BOOK 2: "THE SECRET OF THE OLD MILL"'
  id: totrans-1446
  prefs: []
  type: TYPE_NORMAL
  zh: '书籍 2: "旧磨坊的秘密"'
- en: 'Plot: Cassidy investigates a ghost at an abandoned mill, leading to revelations
    about the town''s industrial past and another piece of the curse''s puzzle.'
  id: totrans-1447
  prefs: []
  type: TYPE_NORMAL
  zh: 故事主线：凯西迪调查一个废弃磨坊中的鬼魂，揭示了镇上工业过去和诅咒谜团的一部分。
- en: 'Series Arc Milestone: Cassidy discovers her family''s direct connection to
    the mill''s history and a tragic event that fueled part of the curse.'
  id: totrans-1448
  prefs: []
  type: TYPE_NORMAL
  zh: 系列剧情里程碑：凯西迪发现她的家族与磨坊历史和部分诅咒事件的直接联系。
- en: 'Subplot: Cassidy''s relationship with the local community improves as she helps
    more spirits find peace.'
  id: totrans-1449
  prefs: []
  type: TYPE_NORMAL
  zh: 分支剧情：随着她帮助更多灵魂找到安宁，凯西迪与当地社区的关系得到改善。
- en: 'Character Relationships: Deepening friendships and a potential romantic interest
    develops between Cassidy and Alex.'
  id: totrans-1450
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：凯西迪和亚历克斯之间的友谊加深，并可能发展出浪漫兴趣。
- en: 'BOOK 3: "ECHOES OF THE FOUNDERS"'
  id: totrans-1451
  prefs: []
  type: TYPE_NORMAL
  zh: '书籍 3: "创始人回声"'
- en: 'Plot: The town''s founding day celebration awakens multiple spirits. Cassidy
    must uncover the founders'' original intentions and how they''re linked to the
    curse.'
  id: totrans-1452
  prefs: []
  type: TYPE_NORMAL
  zh: 故事主线：镇上的成立日庆典唤醒了多个灵魂。凯西迪必须揭开创始人的原始意图以及它们如何与诅咒相联系。
- en: 'Series Arc Milestone: Cassidy finds an old artifact related to the curse and
    learns more about her ancestors'' role in the town''s history.'
  id: totrans-1453
  prefs: []
  type: TYPE_NORMAL
  zh: 系列剧情里程碑：凯西迪发现与诅咒相关的一个古老文物，并更多地了解了她的祖先在镇上历史中的角色。
- en: 'Subplot: A rivalry with another paranormal investigator who has dubious intentions.'
  id: totrans-1454
  prefs: []
  type: TYPE_NORMAL
  zh: 分支剧情：与一个意图可疑的另一位超自然调查者的竞争。
- en: 'Character Relationships: Cassidy and Jordan''s friendship is tested but ultimately
    strengthened by the investigation.'
  id: totrans-1455
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：凯西迪和乔丹的友谊受到考验，但最终通过调查而加强。
- en: 'BOOK 4: "THE LIBRARIAN''S LEGACY"'
  id: totrans-1456
  prefs: []
  type: TYPE_NORMAL
  zh: '书籍 4: "图书管理员遗产"'
- en: 'Plot: Investigating the mysterious death of the town''s first librarian, Cassidy
    uncovers a secret society dedicated to protecting the town''s paranormal secrets.'
  id: totrans-1457
  prefs: []
  type: TYPE_NORMAL
  zh: 故事主线：调查镇上第一位图书管理员神秘死亡的真相，凯西迪揭露了一个致力于保护镇上超自然秘密的秘密社团。
- en: 'Series Arc Milestone: Cassidy is invited to join the society, gaining access
    to knowledge and resources about the curse.'
  id: totrans-1458
  prefs: []
  type: TYPE_NORMAL
  zh: 系列剧情里程碑：凯西迪被邀请加入该社团，获得了关于诅咒的知识和资源。
- en: 'Subplot: Cassidy mentors a young girl who shows signs of having paranormal
    abilities, reflecting on her journey.'
  id: totrans-1459
  prefs: []
  type: TYPE_NORMAL
  zh: 分支剧情：凯西迪辅导一个显示出超自然能力迹象的年轻女孩，反思她的旅程。
- en: 'Character Relationships: Cassidy and Alex''s relationship faces challenges
    as they navigate their personal and professional boundaries.'
  id: totrans-1460
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：凯西迪和亚历克斯的关系在处理他们个人和专业界限时面临挑战。
- en: 'BOOK 5: "BREAKING THE CURSE"'
  id: totrans-1461
  prefs: []
  type: TYPE_NORMAL
  zh: '书籍 5: "打破诅咒"'
- en: 'Plot: Armed with knowledge and allies, Cassidy confronts the source of the
    curse, leading to a final showdown that involves the entire town and the spirit
    world.'
  id: totrans-1462
  prefs: []
  type: TYPE_NORMAL
  zh: 故事主线：凭借知识和盟友，凯西迪面对诅咒的源头，导致一场涉及整个镇和灵界的最终对决。
- en: 'Series Arc Milestone: Cassidy plays a key role in performing a ritual to break
    the curse, freeing the trapped spirits, and preventing future hauntings.'
  id: totrans-1463
  prefs: []
  type: TYPE_NORMAL
  zh: 系列剧情里程碑：凯西迪在执行一个仪式以打破诅咒、释放被困的灵魂并防止未来的鬼魂出没中扮演关键角色。
- en: 'Subplot: The town comes together to support Cassidy, showing how much she has
    changed their perceptions of the paranormal.'
  id: totrans-1464
  prefs: []
  type: TYPE_NORMAL
  zh: 分支剧情：镇上团结起来支持凯西迪，展示了她如何改变他们对超自然现象的看法。
- en: 'Character Relationships: Resolution of Cassidy and Alex''s relationship, solidifying
    their bond. Cassidy''s role in the town is fully embraced, and she plans to continue
    her work as a paranormal investigator.'
  id: totrans-1465
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：凯西迪和亚历克斯的关系得到解决，巩固了他们的关系。凯西迪在镇上的角色得到完全接受，她计划继续作为超自然调查员的工作。
- en: Series Themes and Progression
  id: totrans-1466
  prefs: []
  type: TYPE_NORMAL
  zh: 系列主题和进展
- en: Across the series, themes of acceptance, community, and understanding one's
    purpose weave through the mysteries and character interactions. Each book resolves
    its main mystery and subplot while contributing to the overarching narrative of
    breaking the curse. Cassidy's growth as a character is mirrored by the evolving
    relationships and attitudes of the town's residents towards her and the paranormal.
    The series concludes with the town freed from its curse, Cassidy fully embracing
    her role, and the promise of new adventures on the horizon, leaving room for potential
    spin-offs or continuation.
  id: totrans-1467
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个系列中，接受、社区和了解自己目的的主题贯穿于谜团和角色互动之中。每一本书都解决了其主要谜团和副情节，同时为打破诅咒的总体叙事做出了贡献。凯西迪作为角色的成长与镇上居民对她和超自然现象的态度和关系的演变相呼应。系列以镇子摆脱诅咒、凯西迪完全接受她的角色，以及新的冒险即将到来的承诺结束，为可能的衍生作品或续集留下了空间。
- en: There are some great ideas here, and the AI has followed the instructions and
    generated a book-by-book series arc with milestones.
  id: totrans-1468
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些很好的想法，AI已经遵循指示，为每一本书生成了一系列的系列弧线和高潮。
- en: Perhaps you want the sleuth to be a vampire or shapeshifter? Your book. Your
    story idea.
  id: totrans-1469
  prefs: []
  type: TYPE_NORMAL
  zh: 也许你希望侦探是一个吸血鬼或变形者？这是你的书，你的故事想法。
- en: You can add additional layers specific to your plot and character ideas by editing
    the prompt.
  id: totrans-1470
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过编辑提示来添加与你的情节和角色想法相关的额外层次。
- en: Next Steps
  id: totrans-1471
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下一步
- en: Take the basic story idea for book one, expand it into a synopsis, and start
    building a chapter-by-chapter plot outline using ChatGPT.
  id: totrans-1472
  prefs: []
  type: TYPE_NORMAL
  zh: 以第一本书的基本故事想法为基础，扩展成一个概要，并开始使用ChatGPT构建章节章节的情节大纲。
- en: Copy the ideas for the other four books into a text document. You are going
    to work on these after writing book one.
  id: totrans-1473
  prefs: []
  type: TYPE_NORMAL
  zh: 将其他四本书的想法复制到文本文档中。你将在写完第一本书后开始处理这些。
- en: Creating a Historical Sleuth
  id: totrans-1474
  prefs: []
  type: TYPE_NORMAL
  zh: 创建历史侦探
- en: This presents a unique set of challenges and opportunities.
  id: totrans-1475
  prefs: []
  type: TYPE_NORMAL
  zh: 这带来了一系列独特的挑战和机遇。
- en: A character living in a specific period has developed their personality in response
    to the era’s distinct social, cultural, and economic rules and constraints.
  id: totrans-1476
  prefs: []
  type: TYPE_NORMAL
  zh: 某个特定时期生活的角色已经根据那个时代独特的社交、文化和经济规则和限制发展了自己的个性。
- en: Let’s Use A 1920s Mystery As A Working Example Of A Historical Cozy Mystery.
  id: totrans-1477
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让我们以1920年代的神秘故事作为一个历史轻松神秘故事的示例。
- en: The same principles and strategies can be applied to mysteries written in any
    time period.
  id: totrans-1478
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的原则和策略可以应用于任何时期的神秘故事。
- en: Perhaps you love to read the very popular English Victorian (1837–1901) or Edwardian
    (1901–1914) mysteries featuring aristocratic and adventurous lady sleuths rather
    than Sherlock Holmes-style detectives?
  id: totrans-1479
  prefs: []
  type: TYPE_NORMAL
  zh: 也许你喜欢阅读非常受欢迎的英国维多利亚时代（1837-1901）或爱德华时代（1901-1914）的神秘故事，这些故事以贵族和冒险的女侦探为主角，而不是福尔摩斯风格的侦探？
- en: Balancing Aspirational and Fun Elements with Historical Accuracy
  id: totrans-1480
  prefs: []
  type: TYPE_NORMAL
  zh: 平衡抱负和乐趣元素与历史准确性
- en: An aristocratic, wealthy, and well-educated heiress in Victorian England or
    1920s New York, for example, will have different expectations, lifestyle, culture,
    and behaviors compared to a young middle-class single woman in a small English
    village in the 1950s who is struggling financially in the post-war years.
  id: totrans-1481
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，维多利亚时代英格兰或20世纪20年代纽约的一个贵族、富有和受过良好教育的继承人，与一个在1950年代的小英格兰村庄里挣扎着度日的年轻中产阶级单身女性相比，会有不同的期望、生活方式、文化和行为。
- en: Reading and writing about adventurous lady sleuths who had the money and freedom
    to travel on cruise ships, drive a motor car, and investigate murders in the golden
    years of the 1920s and 1930s is a lot of fun.
  id: totrans-1482
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读和写作关于在20世纪20年代和30年代的黄金岁月里，有金钱和自由在游轮上旅行、驾驶汽车、调查谋杀的女侦探的故事，非常有趣。
- en: This was also an era of extreme racial prejudice and inequality of all kinds
    and at every level of society.
  id: totrans-1483
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是一个极端种族偏见和各种不平等现象横行的时代，这些现象存在于社会的各个层面和等级。
- en: Readers understand that an underclass of poorly paid servants supported the
    lifestyle of these wealthy characters.
  id: totrans-1484
  prefs: []
  type: TYPE_NORMAL
  zh: 读者明白，一个低收入阶层的不幸仆人支撑着这些富有角色的生活方式。
- en: This was the era before pensions and state benefits, so the upper classes were
    expected to provide housing, healthcare, and support to their staff who were trapped
    in a life of servitude because of their social status.
  id: totrans-1485
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在养老金和国家福利之前的时代，因此上层阶级有责任为那些因为社会地位而陷入仆役生活的员工提供住房、医疗保健和支持。
- en: Create characters that embody the spirit of the 1920s yet remain relatable to
    modern readers.
  id: totrans-1486
  prefs: []
  type: TYPE_NORMAL
  zh: 创建体现20世纪20年代精神，同时又能与现代读者产生共鸣的角色。
- en: This includes developing backgrounds, dialogue, and motivations that are authentic
    to the period.
  id: totrans-1487
  prefs: []
  type: TYPE_NORMAL
  zh: 这包括发展背景、对话和动机，使其符合该时期的真实性。
- en: These will depend mainly on the character's social status and position in the
    class system at that time.
  id: totrans-1488
  prefs: []
  type: TYPE_NORMAL
  zh: 这些将主要取决于角色的社会地位和当时阶级体系中的位置。
- en: Due to social or economic shifts, the sleuth’s relationship with supporting
    characters might change over the series.
  id: totrans-1489
  prefs: []
  type: TYPE_NORMAL
  zh: 由于社会或经济变革，侦探与支持角色之间的关系可能会在整个系列中发生变化。
- en: How to Incorporate Historical Accuracy into a 1920s Mystery.
  id: totrans-1490
  prefs: []
  type: TYPE_NORMAL
  zh: 如何将历史准确性融入20世纪20年代的悬疑小说中。
- en: The challenge is to introduce these fascinating events in a way that contributes
    to the mystery and enriches the story without overwhelming the story or sacrificing
    the cozy and fun atmosphere.
  id: totrans-1491
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战在于以有助于悬疑和丰富故事的方式介绍这些迷人的事件，而不会压倒故事或牺牲轻松愉快的氛围。
- en: This could include addressing class differences, post-World War One adjustments,
    or the women’s right-to-vote movement (mainly from 1918 to 1928 in the UK) in
    a sensitive manner that adds depth to the narrative.
  id: totrans-1492
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能包括以敏感的方式处理阶级差异、一战后的调整，或女性选举权运动（主要在1918年至1928年的英国），从而为叙事增添深度。
- en: To add intrigue, you could introduce real-life historical figures or events
    as elements in a mystery plot, but this requires careful handling and deep research
    to avoid inaccuracies.
  id: totrans-1493
  prefs: []
  type: TYPE_NORMAL
  zh: 为了增加神秘感，你可以在悬疑情节中引入真实的历史人物或事件作为元素，但这需要谨慎处理和深入研究，以避免不准确。
- en: Let’s look at what happened in England in the 1920s.
  id: totrans-1494
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看20世纪20年代的英格兰发生了什么。
- en: '![](image_rsrc440.jpg)'
  id: totrans-1495
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc440.jpg]'
- en: I want to write a five-book, historical, cozy mystery series set in 1920s England,
    between 1920 and 1930\. Can you give me a list of 10 major historical events and
    societal shifts that happened during this period?
  id: totrans-1496
  prefs: []
  type: TYPE_NORMAL
  zh: 我想写一部五本历史悬疑小说系列，背景设定在20世纪20年代的英格兰，介于1920年至1930年之间。你能给我一个这个时期发生的10个主要历史事件和社会变革的清单吗？
- en: '![](image_rsrc441.jpg)'
  id: totrans-1497
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc441.jpg]'
- en: 'Indeed, the 1920s in England was a significant change, marked by the aftermath
    of World War I, economic fluctuations, and considerable societal shifts. Here''s
    a list of 10 major historical events and societal shifts during this period that
    could serve as a rich backdrop for your historical cozy mystery series:'
  id: totrans-1498
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，20世纪20年代的英格兰经历了重大变革，标志着第一次世界大战的后果、经济波动以及相当大的社会变革。以下是这个时期可能为你的历史悬疑小说系列提供丰富背景的10个主要历史事件和社会变革的清单：
- en: 'The aftermath of World War I (1914-1918): The immediate post-war years were
    marked by mourning and adjustment as society dealt with the loss and trauma of
    the war. The effects included physical and emotional scars on soldiers, changes
    in the roles of women, and economic challenges.'
  id: totrans-1499
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次世界大战（1914-1918）的后果：战后立即的几年里，社会在处理战争的损失和创伤中充满了哀悼和调整。影响包括士兵们的身体和情感创伤，女性角色的变化，以及经济挑战。
- en: 'Spanish Flu Pandemic (1918-1920): Though technically ending in 1920, the aftermath
    of the Spanish Flu, which killed more people than World War I, deeply impacted
    society, healthcare, and the economy in the early 1920s.'
  id: totrans-1500
  prefs: []
  type: TYPE_NORMAL
  zh: 西班牙流感大流行（1918-1920）：尽管技术上在1920年结束，但西班牙流感的后果——其死亡人数超过了第一次世界大战——在20世纪20年代初对社会的、医疗的和经济产生了深远的影响。
- en: 'Women''s Suffrage (1918 & 1928): The Representation of the People Act 1918
    granted women over the age of 30 and meeting certain property qualifications the
    right to vote. This was expanded in 1928, when women gained equal voting rights
    with men, at the age of 21.'
  id: totrans-1501
  prefs: []
  type: TYPE_NORMAL
  zh: 妇女选举权（1918 & 1928）：1918年的《人民代表法案》赋予30岁以上且符合某些财产资格的女性投票权。1928年，女性在21岁时获得了与男性平等的投票权。
- en: 'The Roaring Twenties: This period saw economic growth, technological innovation,
    and the flourishing of the arts and culture, including jazz music, cinema, and
    the modernist movement in literature and art. It was a time of social, artistic,
    and cultural dynamism.'
  id: totrans-1502
  prefs: []
  type: TYPE_NORMAL
  zh: 狂欢的二十年代：这个时期见证了经济增长、技术创新以及艺术和文化的繁荣，包括爵士乐、电影以及文学和艺术中的现代主义运动。这是一个社会、艺术和文化充满活力的时期。
- en: 'General Strike of 1926: This was a major industrial dispute that lasted 9 days,
    from 3 May 1926 to 12 May 1926\. It was called by the General Council of the Trades
    Union Congress (TUC) in an unsuccessful attempt to force the government to act
    to prevent wage reductions and worsening conditions for coal miners.'
  id: totrans-1503
  prefs: []
  type: TYPE_NORMAL
  zh: 1926年总罢工：这是一场持续了9天的重大工业纠纷，从1926年5月3日到5月12日。这是由工会大会总委员会（TUC）发起的，试图迫使政府采取行动以防止工资削减和煤矿工人状况恶化，但未能成功。
- en: 'The British Empire Exhibition (1924-1925): Held at Wembley Park, London, this
    exhibition was a showcase of Britain''s global dominance and imperial connections,
    reflecting the era''s attitudes towards empire and international relations.'
  id: totrans-1504
  prefs: []
  type: TYPE_NORMAL
  zh: 英国帝国展览（1924-1925）：在伦敦的温布利公园举行，这次展览展示了英国的全球主导地位和帝国联系，反映了该时代对帝国和国际关系的态度。
- en: 'Economic Challenges and Unemployment: The post-war economic boom of the early
    1920s gave way to recession and financial crises. By the end of the decade, the
    world was heading towards the Great Depression, impacting employment, and living
    standards in England.'
  id: totrans-1505
  prefs: []
  type: TYPE_NORMAL
  zh: 经济挑战和失业：20世纪20年代初的战后经济繁荣让位于衰退和金融危机。到本世纪末，世界正走向大萧条，影响了英国的就业和生活水平。
- en: 'The Rise of the Labour Party: The 1920s saw the Labour Party''s emergence as
    a major political force, reflecting shifts in working-class consciousness and
    the political landscape. The Labour Party won its first general election in 1923,
    leading to the first Labour government.'
  id: totrans-1506
  prefs: []
  type: TYPE_NORMAL
  zh: 工党崛起：20世纪20年代见证了工党作为主要政治力量的出现，反映了工人阶级意识的转变和政治格局的变化。工党在1923年的第一次大选中获胜，组建了第一个工党政府。
- en: 'Prohibition in the United States (1920-1933) and Its International Effects:
    While not a British event, the prohibition era in the United States had worldwide
    cultural and economic impacts, including on England, influencing social attitudes,
    crime, and the underground alcohol trade.'
  id: totrans-1507
  prefs: []
  type: TYPE_NORMAL
  zh: 美国禁酒令（1920-1933）及其国际影响：虽然这不是英国事件，但美国的禁酒时期对全球文化、经济产生了影响，包括对英国，影响了社会态度、犯罪和地下酒类贸易。
- en: 'The Irish War of Independence (1919-1921) and the Establishment of the Irish
    Free State (1922): These events had profound effects on British politics, society,
    and its imperial identity. The partition of Ireland and the establishment of the
    Irish Free State following the Anglo-Irish Treaty of 1921 were significant moments
    in British and Irish history.'
  id: totrans-1508
  prefs: []
  type: TYPE_NORMAL
  zh: 爱尔兰独立战争（1919-1921）和爱尔兰自由邦的建立（1922）：这些事件对英国政治、社会及其帝国身份产生了深远的影响。1921年英爱条约后爱尔兰的分割和爱尔兰自由邦的建立是英国和爱尔兰历史上的重要时刻。
- en: These events and shifts provide a rich context for storytelling, offering numerous
    opportunities for your series to explore themes of change, resilience, and the
    complexities of human experiences in a time of significant transformation.
  id: totrans-1509
  prefs: []
  type: TYPE_NORMAL
  zh: 这些事件和变化为叙事提供了丰富的背景，为你的系列小说探索变革、韧性和人类在重大转型时期经历复杂性的主题提供了众多机会。
- en: Outside of the scientific community, people in the 1920s had limited access
    to technology and forensics, so these would have to be introduced very slowly
    into their sleuths' investigative processes.
  id: totrans-1510
  prefs: []
  type: TYPE_NORMAL
  zh: 在科学界之外，20世纪20年代的人们对技术和法医学的接触有限，因此这些元素必须缓慢地引入他们的侦探调查过程中。
- en: For example, show how the introduction of the telegram system, the telephone,
    and the automobile changes how your sleuth conducts investigations.
  id: totrans-1511
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，展示电报系统、电话和汽车的出现如何改变你的侦探进行调查的方式。
- en: I would recommend keeping a timeline or a series bible to ensure that any advancements
    in technology, historical events, or societal shifts are consistent with the series'
    timeline and the plotlines of the books in the series.
  id: totrans-1512
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议保留时间线或系列圣经，以确保任何技术进步、历史事件或社会变革与系列的时间线和系列书籍的情节保持一致。
- en: Planning a Historical Series
  id: totrans-1513
  prefs: []
  type: TYPE_NORMAL
  zh: 规划历史系列
- en: A compelling series arc effectively combining historical and mystery elements
    requires careful planning and creativity.
  id: totrans-1514
  prefs: []
  type: TYPE_NORMAL
  zh: 一个引人入胜的系列情节有效地结合了历史和悬疑元素，需要周密的计划和创造力。
- en: Let’s use ChatGPT to combine these story elements and create a plan for a five-book
    1920s historical series.
  id: totrans-1515
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用ChatGPT结合这些故事元素，为五本20世纪20年代的历史系列小说制定计划。
- en: Have fun editing the following prompt to match your ideas for your story's period,
    main characters, and general tone.
  id: totrans-1516
  prefs: []
  type: TYPE_NORMAL
  zh: 享受编辑以下提示，使其与你的故事时期、主要人物和总体风格相匹配。
- en: '![](image_rsrc442.jpg)'
  id: totrans-1517
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc442.jpg)'
- en: I need you to plan the character and plot arc for a five-book cozy mystery series.
  id: totrans-1518
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要你为五本轻松悬疑系列小说规划人物和情节发展。
- en: The sleuth is an aristocratic, wealthy, and well-educated English heiress.
  id: totrans-1519
  prefs: []
  type: TYPE_NORMAL
  zh: 侦探是一位贵族、富有的、受过良好教育的英国女继承人。
- en: A compelling series arc should effectively combine historical aspects of life
    in 1920s England with mystery elements.
  id: totrans-1520
  prefs: []
  type: TYPE_NORMAL
  zh: 一个引人入胜的系列情节应该有效地结合20世纪20年代英国生活的历史方面和悬疑元素。
- en: Identify the core mystery that will span the entire series.
  id: totrans-1521
  prefs: []
  type: TYPE_NORMAL
  zh: 确定贯穿整个系列的核心理念谜团。
- en: Develop the character arc for my English heiress whose personal journey and
    development are intertwined with the resolution of this central conflict.
  id: totrans-1522
  prefs: []
  type: TYPE_NORMAL
  zh: 发展我的英国继承人角色的性格弧线，其个人旅程和发展与这一中心冲突的解决交织在一起。
- en: Plan critical milestones for character growth and historical events that mark
    progress in the series arc across each of the five books, ensuring that each installment
    moves the overarching story forward.
  id: totrans-1523
  prefs: []
  type: TYPE_NORMAL
  zh: 规划关键里程碑，以促进角色成长和历史事件，这些事件标志着系列弧线在五本书中的进展，确保每个分册都将整体故事向前推进。
- en: Introduce subplots that tie into the larger narrative but are resolved within
    a single book. These can be linked to significant events, social changes, and
    technological advancements. For example, the post-World War I economic boom, the
    rise of jazz and flapper culture, and the advancements in transportation and communication
    can all play roles in shaping the story's setting and plots.
  id: totrans-1524
  prefs: []
  type: TYPE_NORMAL
  zh: 引入与更大叙事相关但仅在单本书中解决的副线。这些可以与重大事件、社会变革和技术进步联系起来。例如，第一次世界大战后的经济繁荣、爵士乐和短裙文化的兴起，以及交通和通信的进步都可以在塑造故事背景和情节中发挥作用。
- en: Develop characters’ relationships in ways that contribute to both the standalone
    story and their overall arcs across the series. Changes in gender roles or social
    class structures can drive character development, influence plotlines, and add
    depth to the mystery.
  id: totrans-1525
  prefs: []
  type: TYPE_NORMAL
  zh: 以有助于独立故事和整个系列中角色整体弧线的方式发展角色关系。性别角色或社会阶层结构的变化可以推动角色发展，影响情节线，并为谜团增添深度。
- en: Layer in clues or revelations about the overarching mystery in each book, rewarding
    readers for following the series while still providing closure within each installment.
  id: totrans-1526
  prefs: []
  type: TYPE_NORMAL
  zh: 在每本书中逐步加入关于整体谜团的线索或揭示，奖励读者跟随系列的同时，仍为每个分册提供圆满的结局。
- en: Stay consistent throughout the series to ensure that historical details, character
    development, and plot elements remain accurate and coherent from book to book.
  id: totrans-1527
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个系列中保持一致性，以确保历史细节、角色发展和情节元素在每本书中保持准确和连贯。
- en: You can choose the name and character profile for the sleuth.
  id: totrans-1528
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以选择侦探的名字和角色档案。
- en: '![](image_rsrc443.jpg)'
  id: totrans-1529
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc443.jpg](image_rsrc443.jpg)'
- en: For your cozy mystery series set in the 1920s, we'll center around Lady Charlotte
    Cavendish, a wealthy, educated English heiress known for her sharp wit, passion
    for justice, and a curious mind.
  id: totrans-1530
  prefs: []
  type: TYPE_NORMAL
  zh: 对于你设在 20 世纪 20 年代的温馨悬疑系列，我们将围绕夏洛特·卡文迪什女士展开，她是一位富有、受过教育的英国继承人，以其敏锐的机智、对正义的热情和好奇的头脑而闻名。
- en: The overarching mystery involves a series of coded diaries left by her late
    father, which hint at a hidden treasure connected not just to the Cavendish family's
    fortune but also to a scandal that could shake the very foundations of Britain's
    aristocracy.
  id: totrans-1531
  prefs: []
  type: TYPE_NORMAL
  zh: 整体谜团涉及一系列由她已故父亲留下的编码日记，暗示了一个与卡文迪什家族的财富以及可能动摇英国贵族根基的丑闻有关的隐藏宝藏。
- en: Lady Charlotte's journey is not just to uncover the treasure and its secrets
    but also to navigate the rapidly changing social landscape of 1920s England.
  id: totrans-1532
  prefs: []
  type: TYPE_NORMAL
  zh: 夏洛特女士的旅程不仅是为了揭开宝藏及其秘密，还要在 20 世纪 20 年代英格兰快速变化的社会景观中导航。
- en: 'BOOK 1: THE MYSTERY OF THE HIDDEN DIARIES'
  id: totrans-1533
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍 1：隐藏日记之谜
- en: 'Character Arc: Lady Charlotte discovers the first coded diary, sparking her
    interest in mysteries and her father''s hidden past.'
  id: totrans-1534
  prefs: []
  type: TYPE_NORMAL
  zh: 角色弧线：夏洛特发现了第一份编码日记，激起了她对谜团和父亲隐藏过去的兴趣。
- en: 'Plot Arc: Introduction to post-World War I England. Charlotte begins to decipher
    the diary, leading to a smaller mystery that involves stolen artwork from the
    war. This book sets the stage for her investigative path and introduces key allies,
    including a war veteran with knowledge of cryptography and a flapper with connections
    in jazz clubs where some clues lead.'
  id: totrans-1535
  prefs: []
  type: TYPE_NORMAL
  zh: 情节弧线：介绍第一次世界大战后的英格兰。夏洛特开始解读日记，导致一个涉及战争中被盗艺术品的较小谜团。这本书为她的调查之路设定了舞台，并介绍了关键盟友，包括一位了解密码学的战争老兵和一位与爵士乐俱乐部有联系的短裙舞者，其中一些线索指向那里。
- en: 'Historical Backdrop: The post-war economic boom and the rise of jazz and flapper
    culture.'
  id: totrans-1536
  prefs: []
  type: TYPE_NORMAL
  zh: 历史背景：战争后的经济繁荣和爵士乐及短裙文化的兴起。
- en: 'Subplot: Charlotte helps a friend fight for women''s rights, reflecting on
    her own independence.'
  id: totrans-1537
  prefs: []
  type: TYPE_NORMAL
  zh: 副线：夏洛特帮助一位朋友争取妇女权利，同时反思自己的独立性。
- en: 'Character Relationships: Establishes friendships and a potential romantic interest
    with the war veteran.'
  id: totrans-1538
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：与战争老兵建立友谊和潜在的浪漫兴趣。
- en: 'BOOK 2: THE SECRET OF THE CAVENDISH ESTATE'
  id: totrans-1539
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍 2：卡文迪什庄园的秘密
- en: 'Character Arc: Charlotte''s sleuthing reputation grows, as does her determination
    to understand her father''s legacy.'
  id: totrans-1540
  prefs: []
  type: TYPE_NORMAL
  zh: 角色弧：夏洛特的侦探声誉增长，她理解她父亲遗产的决心也增强。
- en: 'Plot Arc: Exploring the Cavendish estate, Charlotte finds another diary leading
    to hidden passages and a secret society her father was involved with, which played
    a role in the post-war peace negotiations.'
  id: totrans-1541
  prefs: []
  type: TYPE_NORMAL
  zh: 情节弧：探索凯文迪什庄园，夏洛特发现另一本日记，引向隐藏的通道和她的父亲参与的秘密社团，该社团在战后和平谈判中发挥了作用。
- en: 'Historical Backdrop: The General Strike of 1926, showcasing the class divide
    and economic tensions.'
  id: totrans-1542
  prefs: []
  type: TYPE_NORMAL
  zh: 历史背景：1926年的总罢工，展示了阶级分歧和经济紧张。
- en: 'Subplot: A strike at the Cavendish estate threatens to reveal family secrets.'
  id: totrans-1543
  prefs: []
  type: TYPE_NORMAL
  zh: 分支情节：凯文迪什庄园的罢工威胁要揭露家族秘密。
- en: 'Character Relationships: Deepens Charlotte''s alliance with her team, testing
    their trust as secrets come to light.'
  id: totrans-1544
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：深化夏洛特与团队的联盟，随着秘密的揭露考验他们的信任。
- en: 'BOOK 3: THE CODE OF THE JAZZ AGE'
  id: totrans-1545
  prefs: []
  type: TYPE_NORMAL
  zh: 第3卷：《爵士时代的法则》
- en: 'Character Arc: Charlotte becomes more enmeshed in the societal changes of the
    era, questioning her place in the aristocracy.'
  id: totrans-1546
  prefs: []
  type: TYPE_NORMAL
  zh: 角色弧：夏洛特更多地陷入该时代的社会变革，质疑她在贵族中的位置。
- en: 'Plot Arc: A diary leads Charlotte to a jazz club that serves as a front for
    smugglers from the Prohibition era in the U.S., entangling her in an international
    mystery.'
  id: totrans-1547
  prefs: []
  type: TYPE_NORMAL
  zh: 情节弧：一本日记引导夏洛特来到一家爵士俱乐部，该俱乐部是美国禁酒令时代走私者的掩护，将她卷入一个国际谜团。
- en: 'Historical Backdrop: The flourishing of the jazz age and the impact of American
    Prohibition on England.'
  id: totrans-1548
  prefs: []
  type: TYPE_NORMAL
  zh: 历史背景：爵士时代的繁荣和美国禁酒令对英国的影响。
- en: 'Subplot: Charlotte confronts the challenges faced by the working class, bridging
    class divides through her investigation.'
  id: totrans-1549
  prefs: []
  type: TYPE_NORMAL
  zh: 分支情节：夏洛特面对工人阶级面临的挑战，通过她的调查弥合阶级分歧。
- en: 'Character Relationships: Charlotte''s relationship with her romantic interest
    deepens, facing challenges from societal expectations.'
  id: totrans-1550
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：夏洛特与她的浪漫兴趣的关系加深，面临来自社会期望的挑战。
- en: 'BOOK 4: THE SHADOW OF THE EMPIRE'
  id: totrans-1551
  prefs: []
  type: TYPE_NORMAL
  zh: 第4卷：《帝国的阴影》
- en: 'Character Arc: Charlotte reckons with her family''s colonial past and its impact
    on the present.'
  id: totrans-1552
  prefs: []
  type: TYPE_NORMAL
  zh: 角色弧：夏洛特反思她家族的殖民过去及其对现在的影响。
- en: 'Plot Arc: A diary leads Charlotte to uncover a link between her family''s fortune
    and colonial exploitation, including artifacts looted during the British Empire''s
    reign.'
  id: totrans-1553
  prefs: []
  type: TYPE_NORMAL
  zh: 情节弧：一本日记引导夏洛特发现她家族财富与殖民剥削之间的联系，包括在大英帝国统治期间掠夺的文物。
- en: 'Historical Backdrop: The British Empire Exhibition, reflecting England''s imperial
    pride and the beginnings of its unraveling.'
  id: totrans-1554
  prefs: []
  type: TYPE_NORMAL
  zh: 历史背景：英国帝国展览，反映了英国的帝国自豪感和其解体的开始。
- en: 'Subplot: Charlotte supports independence movements, learning from leaders of
    colonized nations.'
  id: totrans-1555
  prefs: []
  type: TYPE_NORMAL
  zh: 分支情节：夏洛特支持独立运动，从被殖民国家的领导者那里学习。
- en: 'Character Relationships: Charlotte navigates conflicts between her heritage
    and her newfound beliefs, affecting her friendships and alliances.'
  id: totrans-1556
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：夏洛特在继承与新生信念之间处理冲突，影响她的友谊和联盟。
- en: 'BOOK 5: THE CAVENDISH TREASURE UNVEILED'
  id: totrans-1557
  prefs: []
  type: TYPE_NORMAL
  zh: 第5卷：《凯文迪什宝藏揭晓》
- en: 'Character Arc: Charlotte fully embraces her identity as both an aristocrat
    and a champion for justice, ready to face the future with a clear conscience.'
  id: totrans-1558
  prefs: []
  type: TYPE_NORMAL
  zh: 角色弧：夏洛特完全接受了她作为贵族和正义捍卫者的身份，准备带着清晰的良心面对未来。
- en: 'Plot Arc: The final diary reveals the location of the treasure and its true
    nature: not just material wealth, but documents that could alter the understanding
    of key historical events. Charlotte must decide what to do with these secrets.'
  id: totrans-1559
  prefs: []
  type: TYPE_NORMAL
  zh: 情节弧：最后的日记揭示了宝藏的位置及其真正性质：不仅仅是物质财富，还有可能改变对关键历史事件理解的文件。夏洛特必须决定如何处理这些秘密。
- en: 'Historical Backdrop: The lead-up to the Great Depression, highlighting the
    fragility of the era''s prosperity.'
  id: totrans-1560
  prefs: []
  type: TYPE_NORMAL
  zh: 历史背景：大萧条的前奏，突显了该时代繁荣的脆弱性。
- en: 'Subplot: Charlotte''s efforts to reform her estate and support the local community
    in anticipation of the economic downturn.'
  id: totrans-1561
  prefs: []
  type: TYPE_NORMAL
  zh: 分支情节：夏洛特努力改革她的庄园，并支持当地社区，以应对经济衰退。
- en: 'Character Relationships: Charlotte''s relationships are solidified, and her
    role as a leader in her community is cemented. The series ends with her perhaps
    passing the torch to the next generation or considering her next adventure in
    a changing world.'
  id: totrans-1562
  prefs: []
  type: TYPE_NORMAL
  zh: 角色关系：夏洛特的关系得到巩固，她在社区中的领导者角色得到巩固。系列以她可能将火炬传递给下一代或考虑在变化的世界中寻找下一个冒险结束。
- en: Throughout the series, each book layers in clues that contribute to solving
    the overarching mystery, allowing readers to piece together the puzzle alongside
    Lady Charlotte. Her growth from a curious heiress to a seasoned detective and
    social reformer mirrors the tumultuous but transformative era of the 1920s in
    England, offering a rich tapestry of history, mystery, and personal discovery.
  id: totrans-1563
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个系列中，每本书都会加入一些线索，有助于解决整体谜团，让读者能够与夏洛特女士一起拼凑谜题。她从好奇的继承人成长为经验丰富的侦探和社会改革者，反映了20世纪20年代英格兰动荡但变革的时代，提供了丰富的历史、悬疑和个人发现的画卷。
- en: There are some great ideas here that you can use to spark more detailed story
    development.
  id: totrans-1564
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些很好的想法，你可以用来激发更详细的故事发展。
- en: 'PART SIX: THE SIDEKICKS'
  id: totrans-1565
  prefs: []
  type: TYPE_NORMAL
  zh: 第六部分：辅助角色
- en: The Hierarchy of Characters in a Cozy Mystery Series
  id: totrans-1566
  prefs: []
  type: TYPE_NORMAL
  zh: 温馨悬疑系列中角色的等级制度
- en: The assembled cast of a cozy mystery series is at the core of any successful
    series.
  id: totrans-1567
  prefs: []
  type: TYPE_NORMAL
  zh: 任何成功的温馨悬疑系列的核心是其组成的角色阵容。
- en: Team Sleuth.
  id: totrans-1568
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 侦探团队。
- en: Don’t forget that the sleuth cannot work in isolation.
  id: totrans-1569
  prefs: []
  type: TYPE_NORMAL
  zh: 不要忘记，侦探不能孤立无援地工作。
- en: Quirky Sidekicks, Friends, and Family
  id: totrans-1570
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 古怪辅助角色、朋友和家庭
- en: The story should connect the reader with feelings of emotional charm and possibly
    nostalgia. There is usually a strong sense of the local community and family relationships,
    backed up by the detective’s network of friends.
  id: totrans-1571
  prefs: []
  type: TYPE_NORMAL
  zh: 故事应该让读者产生情感魅力和可能怀旧的感觉。通常有一种强烈的当地社区和家庭关系的意识，这由侦探的朋友网络支撑。
- en: Family members whom the sleuth can trust.
  id: totrans-1572
  prefs: []
  type: TYPE_NORMAL
  zh: 侦探可以信赖的家庭成员。
- en: This is optional, but having a family member who takes the role of a “stakes
    character” in a mystery whom the sleuth will fight to support and protect can
    be helpful in plotting and motivation.
  id: totrans-1573
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是必需的，但有一个家庭成员在悬疑中扮演“赌注角色”，侦探将为之奋斗、支持和保护，这有助于情节规划和动机。
- en: 'Sidekicks:'
  id: totrans-1574
  prefs: []
  type: TYPE_NORMAL
  zh: 辅助角色：
- en: Your sleuth will need at least one sidekick. Someone to talk to about their
    discoveries and bounce ideas off. They can be a family member but is usually a
    close friend.
  id: totrans-1575
  prefs: []
  type: TYPE_NORMAL
  zh: 你的侦探至少需要一个助手。有人可以谈论他们的发现，并从中激发想法。他们可以是家庭成员，但通常是亲密的朋友。
- en: Sidekick archetypes include the tech-savvy assistant, the skeptical confidante, the
    bumbling yet helpful friend or relative, and assorted pets and paranormal entities.
  id: totrans-1576
  prefs: []
  type: TYPE_NORMAL
  zh: 辅助角色的原型包括技术娴熟的助手、怀疑的密友、笨拙但有用的朋友或亲戚，以及各种宠物和超自然实体。
- en: The cast list will include quirky characters that make readers smile, if not
    laugh out loud. This cast of secondary characters will continue across all the
    books in a continuity series so that readers can get to know these characters
    and connect with their lives in this community and family. Returning to a series
    should feel like revisiting old friends you love to spend time with.
  id: totrans-1577
  prefs: []
  type: TYPE_NORMAL
  zh: 角色名单将包括一些古怪的角色，让读者微笑，甚至大笑。这个次要角色阵容将贯穿所有连续性系列书籍，让读者能够了解这些角色，并在这个社区和家庭中与他们建立联系。回到系列中应该感觉像是拜访你喜爱的老朋友。
- en: '![A diagram of characters in a circle  Description automatically generated](image_rsrc444.jpg)'
  id: totrans-1578
  prefs: []
  type: TYPE_IMG
  zh: '![圆形人物图  自动生成描述](image_rsrc444.jpg)'
- en: The Sidekicks and Secondary Characters
  id: totrans-1579
  prefs: []
  type: TYPE_NORMAL
  zh: 辅助角色和次要角色
- en: Give your sleuth at least ONE and possibly TWO friends, family members, pets,
    or other secondary characters who will be their main allies for this book.
  id: totrans-1580
  prefs: []
  type: TYPE_NORMAL
  zh: 给你的侦探至少一个，可能两个朋友、家庭成员、宠物或其他次要角色，他们将在这本书中成为他们的主要盟友。
- en: Sidekicks are super crucial in cozy mystery fiction.
  id: totrans-1581
  prefs: []
  type: TYPE_NORMAL
  zh: 辅助角色在温馨悬疑小说中至关重要。
- en: Not only do they act as someone for the detective to talk to, but they can also
    carry their own subplot, which forms part of the continuity plot between other
    books in the same series.
  id: totrans-1582
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不仅为侦探提供了一个可以交谈的对象，还可以有自己的副线故事，这构成了同一系列其他书籍之间的连续性情节的一部分。
- en: Think of a multi-book series from the start.
  id: totrans-1583
  prefs: []
  type: TYPE_NORMAL
  zh: 从一开始就考虑一个多卷书系列。
- en: Create a network of the supporting cast of recurring friends and family in the
    community. Each character will have their storyline subplot in this and other
    books in the series.
  id: totrans-1584
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个社区中反复出现的亲朋好友的支持角色网络。每个角色都将在这本书和其他系列书籍中拥有自己的故事副线。
- en: These are the characters readers will want to meet again in the following books.
  id: totrans-1585
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是读者希望在下一本书中再次见到的角色。
- en: Who is on Team Sleuth?
  id: totrans-1586
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 谁是侦探团队的一员？
- en: '#The “Stakes Character” or characters, alive or dead, to whom the detective
    is emotionally connected and who motivates the detective to investigate the murder.'
  id: totrans-1587
  prefs: []
  type: TYPE_NORMAL
  zh: '#“赌注角色”或角色，无论生死，侦探与他们有情感联系，并激励侦探调查谋杀。'
- en: This is usually a family member, close friend, or work colleague.  They could,
    for example, be accused of being the killer, linked to the killer, or be suffering
    because of this sudden death. If they are the victim, the sleuth will investigate
    to bring the killer justice.
  id: totrans-1588
  prefs: []
  type: TYPE_NORMAL
  zh: 这通常是一个家庭成员、亲密朋友或工作同事。例如，他们可能被指控是凶手，与凶手有联系，或因这突如其来的死亡而遭受痛苦。如果他们是受害者，侦探将进行调查以将凶手绳之以法。
- en: '#The sidekicks/helpers who are going to support the sleuth.'
  id: totrans-1589
  prefs: []
  type: TYPE_NORMAL
  zh: '#将支持侦探的配角/助手。'
- en: '#The sleuth’s family members and friends.'
  id: totrans-1590
  prefs: []
  type: TYPE_NORMAL
  zh: '#侦探的家庭成员和朋友。'
- en: '#The local police or other officials and private investigators.'
  id: totrans-1591
  prefs: []
  type: TYPE_NORMAL
  zh: '#当地警察或其他官员和私人侦探。'
- en: '#Pets, ghosts, or other paranormal characters linked to the theme you chose
    for your book.'
  id: totrans-1592
  prefs: []
  type: TYPE_NORMAL
  zh: '#与你在书中选择的主题相关的宠物、鬼魂或其他超自然角色。'
- en: An entire of characters is needed to support the plot of a cozy murder mystery.
  id: totrans-1593
  prefs: []
  type: TYPE_NORMAL
  zh: 需要一个完整的角色阵容来支撑温馨谋杀谜案的情节。
- en: How to get started
  id: totrans-1594
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何开始
- en: Start with the “stakes character”.
  id: totrans-1595
  prefs: []
  type: TYPE_NORMAL
  zh: 从“风险角色”开始。
- en: Why? So that the reactions of the sleuth to the murder feel real to the reader.
  id: totrans-1596
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？这样读者才能觉得侦探对谋杀的反应是真实的。
- en: Then work on the sidekicks for the sleuth, and then other characters in the
    community and extended family.
  id: totrans-1597
  prefs: []
  type: TYPE_NORMAL
  zh: 然后为侦探的角色设计配角，然后是社区和扩展家庭中的其他角色。
- en: '![](image_rsrc445.jpg)'
  id: totrans-1598
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc445.jpg)'
- en: You are an expert and advanced cozy murder mystery fiction author who has published
    over 50 bestselling novels and has 30 years of experience. You write commercial
    and very successful cozy murder mystery fiction that readers love and auto-buy
    every book in your series. Your cozy mystery stories are known for escapist settings,
    twisty cozy mystery plots, and your cast of fun and witty characters that readers
    love. You have a deep knowledge of cozy murder mystery tropes and reader expectations
    that inform your writing.
  id: totrans-1599
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一位专家级的高级温馨谋杀谜案小说作家，已经出版了超过50本畅销小说，拥有30年的经验。你写的是商业上非常成功的温馨谋杀谜案小说，读者喜欢并自动购买你系列中的每一本书。你的温馨谋杀谜案故事以逃避现实的场景、错综复杂的温馨谋杀谜案情节以及读者喜爱的有趣、机智的角色而闻名。你对温馨谋杀谜案主题和读者期望有深刻的了解，这些了解指导了你的写作。
- en: Please define what is meant by a “stakes character” in a cozy mystery plot and
    give 10 examples of a stakes character.
  id: totrans-1600
  prefs: []
  type: TYPE_NORMAL
  zh: 请定义在温馨谋杀谜案情节中“风险角色”的含义，并给出10个风险角色的例子。
- en: '![](image_rsrc446.jpg)'
  id: totrans-1601
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc446.jpg)'
- en: 'In cozy murder mystery fiction, a "stakes character" is an individual whose
    fate, actions, or circumstances significantly impact the protagonist and the plot''s
    progression. This character often elevates the emotional or personal stakes of
    the story, making the mystery not just a puzzle to be solved, but a journey with
    personal ramifications for the protagonist. They are integral in adding depth
    and emotional layers to the plot, ensuring that the mystery-solving process is
    not just intellectual but also emotionally engaging. Here are ten examples of
    stakes characters often found in cozy murder mysteries:'
  id: totrans-1602
  prefs: []
  type: TYPE_NORMAL
  zh: 在温馨谋杀谜案小说中，“风险角色”是指其命运、行为或情况对主角和情节发展有重大影响的个人。这个角色通常提高了故事的情感或个人风险，使谜案不仅仅是一个要解决的谜题，而且对主角来说是一个有个人影响的旅程。他们在增加情节的深度和情感层次方面至关重要，确保解谜过程不仅是智力上的，也是情感上吸引人的。以下是在温馨谋杀谜案中常见的十个风险角色例子：
- en: '1\. Victim''s Family Member: A close relative of the victim, whose grief and
    quest for justice add emotional depth to the story. The protagonist might have
    a personal connection with them, adding to the complexity.'
  id: totrans-1603
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 受害者家庭成员：受害者的亲密亲属，他们的悲伤和对正义的追求为故事增添了情感深度。主角可能与他们有个人联系，增加了复杂性。
- en: '2\. Best Friend: The protagonist''s best friend, who provides emotional support,
    assists in the investigation, and sometimes gets into trouble, raising the stakes
    for the protagonist.'
  id: totrans-1604
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 最好的朋友：主角的最佳朋友，他提供情感支持，协助调查，有时会陷入麻烦，为主角增加风险。
- en: '3\. Romantic Interest: A character who provides a romantic subplot. Their involvement
    with the protagonist or the mystery can add tension and personal stakes.'
  id: totrans-1605
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 恋爱对象：一个提供爱情副线的角色。他们的参与与主角或谜案可以增加紧张感和个人风险。
- en: '4\. Rival or Nemesis: A character who challenges the protagonist, whether in
    the investigation or in personal life, adding conflict and raising the stakes
    through their antagonistic actions.'
  id: totrans-1606
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 对手或宿敌：一个在调查或个人生活中挑战主角的角色，通过他们的对抗性行为增加冲突和风险。
- en: '5\. Local Authority Figure: A police officer or local official who may hinder
    or help the investigation. Their actions can significantly impact how the protagonist
    conducts their investigation.'
  id: totrans-1607
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 地方权力人物：可能阻碍或帮助调查的警察或地方官员。他们的行为可以显著影响主角如何进行调查。
- en: '6\. Mentor or Guide: An experienced individual who guides the protagonist,
    offering wisdom and advice. Their well-being or knowledge can become crucial to
    solving the mystery.'
  id: totrans-1608
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 指导者或导师：一个有经验的个人，指导主角，提供智慧和忠告。他们的福祉或知识可能对解决神秘事件至关重要。
- en: '7\. Witness with a Secret: A character who has witnessed something crucial
    but is withholding information. Their secrets add layers to the plot and personal
    stakes for the protagonist.'
  id: totrans-1609
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 有秘密的目击者：一个目睹了关键事件但保留信息的人物。他们的秘密为情节和主角的个人赌注增添了层次。
- en: '8\. Suspect with a Personal Connection: A suspect who has a personal relationship
    with the protagonist. This relationship complicates the investigation and adds
    emotional depth.'
  id: totrans-1610
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 有个人联系的嫌疑人：与主角有个人关系的嫌疑人。这种关系使调查复杂化，并增加了情感深度。
- en: '9\. Threatening Character: Someone who poses a threat to the protagonist, increasing
    the personal danger and urgency in solving the mystery.'
  id: totrans-1611
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 威胁角色：对主角构成威胁的人，增加了解决神秘事件的个人危险和紧迫性。
- en: '10\. Business Partner or Co-worker: Especially in cozies centered around a
    business (like a bakery, bookstore, etc.), a partner or co-worker who is deeply
    involved in the plot. Their actions and well-being directly impact the protagonist''s
    personal and professional life.'
  id: totrans-1612
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 商业伙伴或同事：特别是在以商业为中心的 cozy 类小说（如面包店、书店等）中，一个深度参与情节的伙伴或同事。他们的行为和福祉直接影响到主角的个人和职业生活。
- en: In each of these examples, the stakes character plays a role in escalating the
    emotional and personal investment of the protagonist in the mystery, making the
    story more engaging and multi-dimensional for readers.
  id: totrans-1613
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些例子中，赌注角色在提高主角对神秘事件的情感和个人投资方面发挥作用，使故事对读者来说更加吸引人和多维。
- en: This is an excellent list of the top 10 possible stakes characters who you could
    use to drive the external and internal plots for your entire mystery series.
  id: totrans-1614
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个极好的列表，列出了你可以用来推动整个神秘系列的外部和内部情节的10个可能的赌注角色。
- en: You could write a series of ten books, using each one of these characters to
    drive the plot.
  id: totrans-1615
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以写一系列十本书，使用这些角色中的每一个来推动情节。
- en: The identity of the “stakes character” will depend on your unique story and
    the character profile of your sleuth.
  id: totrans-1616
  prefs: []
  type: TYPE_NORMAL
  zh: “赌注角色”的身份将取决于你独特的剧情和侦探角色的个人档案。
- en: 'You have to answer two questions:'
  id: totrans-1617
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须回答两个问题：
- en: WHAT is at stake for the investigator if they do not find the killer?
  id: totrans-1618
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果调查者找不到凶手，他们面临的风险是什么？
- en: And WHO is at stake?
  id: totrans-1619
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 那么，谁处于危险之中？
- en: Who will be the one person in your cozy mystery who the sleuth cares about or
    is challenged by as part of the murder investigation?
  id: totrans-1620
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的 cozy 悬疑小说中，谁会是侦探在谋杀调查中关心或挑战的那个人？
- en: For example. In the case study cozy mystery, Laura has come to stay with her
    aunt, who is a suspect in the murder of a visiting psychic medium.
  id: totrans-1621
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在案例研究 cozy 悬疑小说中，劳拉来到她阿姨家居住，她阿姨是访问灵媒谋杀案的嫌疑人。
- en: This is the driver behind Laura’s determination to find the real killer. Her
    aunt is the stakes character.
  id: totrans-1622
  prefs: []
  type: TYPE_NORMAL
  zh: 这是劳拉决心找到真正凶手背后的动力。她的阿姨是赌注角色。
- en: Time To Develop A Character Profile For Laura’s Aunt.
  id: totrans-1623
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 是时候为劳拉的阿姨开发一个角色档案了。
- en: Include everything you know from your earlier What-If story brainstorming sessions
    about this stakes character so that the AI can create a helpful response. Edit
    and add details and more ideas as you create the prompt.
  id: totrans-1624
  prefs: []
  type: TYPE_NORMAL
  zh: '包括你从早期的“如果”故事头脑风暴会议中关于这个赌注角色的所有了解，以便 AI 可以创建一个有用的响应。在创建提示时，编辑并添加更多细节和想法。 '
- en: '![](image_rsrc447.jpg)'
  id: totrans-1625
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc447.jpg)'
- en: 'I need you to develop a character profile for the aunt of the sleuth. This
    profile should include: a full name, physical description, background, current
    crisis, personality, murder connection and character arc. The character should
    be in her sixties and runs a popular craft and yarn store in the historic coastal
    town of Polperran.'
  id: totrans-1626
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要你为侦探的阿姨开发一个角色档案。这个档案应包括：全名、外貌描述、背景、当前危机、性格、谋杀联系和角色弧线。这个角色应该六十多岁，在历史海滨小镇波尔佩兰经营一家受欢迎的手工艺品和毛线店。
- en: 'Here is what I know about Laura’s aunt: Plot: When a famous psychic medium
    is murdered at a local psychic fair, followed by the death of an antique dealer
    specializing in occult objects, Laura and her aunt use their unique skills to
    unravel the mystery.'
  id: totrans-1627
  prefs: []
  type: TYPE_NORMAL
  zh: 关于劳拉阿姨的我知道的：剧情：当一位著名的灵媒在当地的灵媒集市上被谋杀，紧接着是一位专门经营神秘物品的古董商死亡，劳拉和她的阿姨利用她们独特的技能来解开这个谜团。
- en: Let’s work on the basic idea and see where it takes us.
  id: totrans-1628
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们着手探讨基本想法，看看它能带我们走向何方。
- en: What if? The famous psychic medium was found murdered at the yarn store studio
    run as a meeting place by Laura’s aunt.
  id: totrans-1629
  prefs: []
  type: TYPE_NORMAL
  zh: 如果……那位著名的灵媒被发现死在劳拉阿姨运营的作为聚会场所的毛线店工作室。
- en: What if? The killer used special antique poisoned knitting needles as their
    weapon, supplied by a local antique dealer.
  id: totrans-1630
  prefs: []
  type: TYPE_NORMAL
  zh: 如果……凶手使用了特殊的古董有毒编织针作为武器，这些针是由当地古董商提供的。
- en: What if? When Laura touched the body to see if he was okay, in his final moment,
    he passed his psychic abilities over to Laura.
  id: totrans-1631
  prefs: []
  type: TYPE_NORMAL
  zh: 如果……当劳拉触摸尸体以查看他是否还好时，在他最后的时刻，他将他的灵媒能力传给了劳拉。
- en: What if? Her aunt and her close friends are actually a group of highly trained
    paranormal investigators, and the murdered guest was bringing new information
    about a case, on his way to the psychic fair.
  id: totrans-1632
  prefs: []
  type: TYPE_NORMAL
  zh: 如果……她的阿姨和她亲密的朋友实际上是一群受过高度训练的超自然现象调查员，而被谋杀的客人正带着关于一个案件的新信息，在前往灵媒集市的过程中。
- en: What if? When Laura's aunt is implicated in the murder of a rival psychic and
    a dealer who was trying to expose them, Laura must clear her aunt's name
  id: totrans-1633
  prefs: []
  type: TYPE_NORMAL
  zh: 如果……当劳拉的阿姨被卷入谋杀一位竞争对手的灵媒和试图揭露他们的古董商时，劳拉必须澄清她阿姨的名誉。
- en: What if? Laura’s mother did not approve of the fact that her husband’s brother,
    Laura’s late uncle, had married an eccentric woman who claimed to be a psychic.
    It was a family secret and comes as quite a shock to Laura when she is gifted
    these new abilities.
  id: totrans-1634
  prefs: []
  type: TYPE_NORMAL
  zh: 如果……劳拉的母亲并不赞成她丈夫的兄弟，劳拉的已故叔叔，娶了一个声称自己是灵媒的古怪女人。这是一个家庭秘密，当劳拉获得这些新能力时，这对她来说是个相当大的震惊。
- en: What if? Laura is going to rely on her aunt to help her to adapt to these bewildering
    new abilities. But she holds the key to finding out who murdered the victim.
  id: totrans-1635
  prefs: []
  type: TYPE_NORMAL
  zh: 如果……劳拉将依赖她的阿姨来帮助她适应这些令人困惑的新能力。但她掌握着找出凶手的关键。
- en: This would be a great way to introduce Laura to her aunt’s true passion and
    her team of quirky seniors who are living in this small community.
  id: totrans-1636
  prefs: []
  type: TYPE_NORMAL
  zh: 这将是向劳拉介绍她阿姨真正热情和她团队中那些古怪的老人们的一个好方法，他们正生活在这个小社区中。
- en: '![](image_rsrc448.jpg)'
  id: totrans-1637
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc448.jpg](image_rsrc448.jpg)'
- en: 'Character Profile: Aunt Beatrice "Bea" Marsh'
  id: totrans-1638
  prefs: []
  type: TYPE_NORMAL
  zh: 角色简介：阿姨贝阿特丽斯“比阿特丽斯”·马什
- en: 'Full Name: Beatrice "Bea" Marsh'
  id: totrans-1639
  prefs: []
  type: TYPE_NORMAL
  zh: 全名：贝阿特丽斯“比阿特丽斯”·马什
- en: 'Physical Description: Aunt Bea is a woman in her sixties, with a warm smile
    that lights up her face and twinkling eyes that sparkle with wisdom and mischief.
    Her silver hair is often styled in loose waves, framing her gentle features. Despite
    her age, she exudes vitality and grace, moving with a vibrant energy that belies
    her years.'
  id: totrans-1640
  prefs: []
  type: TYPE_NORMAL
  zh: 身体描述：阿姨比阿特丽斯是一位六十多岁的女性，她脸上洋溢着温暖的微笑，闪烁着智慧和恶作剧般的眼神。她的银发常常以松散的波浪形状梳理，衬托着她温柔的面容。尽管年纪已大，她却散发出活力和优雅，行动中充满生机，与她实际的年龄不相符。
- en: 'Background: Beatrice Marsh has been a beloved fixture in the historic coastal
    town of Polperran for decades. After inheriting her grandmother''s quaint craft
    and yarn store, she transformed it into a bustling hub of creativity and community,
    drawing in locals and tourists alike with her passion for all things handmade.
    But behind her cheerful exterior lies a secret: Beatrice is a highly trained paranormal
    investigator, part of a clandestine group of seniors who use their unique skills
    to solve mysteries and protect their town from supernatural threats.'
  id: totrans-1641
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：贝阿特丽斯·马什几十年来一直是历史悠久的沿海小镇波尔佩兰的受人爱戴的常客。在继承了祖母的精致手工艺和毛线店后，她将其转变为一个充满创意和社区活力的繁忙中心，她的热情吸引了当地人和游客。但在这欢快的表面之下隐藏着一个秘密：贝阿特丽斯是一位受过高度训练的超自然现象调查员，是秘密团队的一员，他们利用独特的技能来解决谜团并保护他们的城镇免受超自然威胁。
- en: 'Current Crisis: When a famous psychic medium is murdered at the yarn store
    studio run by Beatrice, she finds herself thrust into the spotlight as a prime
    suspect. As the town''s gossip mill churns with rumors and speculation, Beatrice
    must navigate the treacherous waters of suspicion and betrayal, all while unraveling
    the tangled web of secrets surrounding the murder. With her reputation and livelihood
    on the line, she must rely on her wits and the support of her loved ones to clear
    her name and uncover the truth.'
  id: totrans-1642
  prefs: []
  type: TYPE_NORMAL
  zh: 当前危机：当一位著名的灵媒在比阿特丽斯经营的毛线店工作室中被谋杀时，她发现自己成为了众矢之的，成为首要嫌疑人。随着镇上的流言蜚语和猜测不断，比阿特丽斯必须在这片充满怀疑和背叛的险恶水域中航行，同时解开围绕谋杀案的错综复杂的秘密。随着她的名誉和生计受到威胁，她必须依靠自己的智慧和她所爱的人的支持来洗清自己的名字并揭开真相。
- en: 'Personality: Beatrice is a kind-hearted and compassionate woman, with a deep
    love for her community and a fierce loyalty to her friends and family. Despite
    her unconventional interests and hidden talents, she remains down-to-earth and
    approachable, always ready with a listening ear or a comforting word for those
    in need. Beneath her gentle exterior lies a steely resolve and a keen intellect,
    traits that serve her well in her dual roles as business owner and paranormal
    investigator.'
  id: totrans-1643
  prefs: []
  type: TYPE_NORMAL
  zh: 性格特点：比阿特丽斯是一个心地善良、富有同情心的女性，她对社区有着深厚的爱，对朋友和家人有着坚定的忠诚。尽管她有着非传统的兴趣和隐藏的天赋，但她仍然脚踏实地、平易近人，总是准备好倾听那些需要帮助的人的心声或给予安慰的话语。在她温柔的外表下，隐藏着坚定的决心和敏锐的智慧，这些特质在她的双重角色——企业主和灵异调查者——中发挥了很好的作用。
- en: 'Murder Connection: The murder of the psychic medium at Beatrice''s yarn store
    studio serves as the catalyst for the story, drawing her and her niece, Laura,
    into a dangerous game of cat and mouse as they race to uncover the truth behind
    the deadly deed. As the investigation unfolds, Beatrice''s unique insights and
    connections to the paranormal world prove invaluable in unraveling the mystery
    and bringing the killer to justice.'
  id: totrans-1644
  prefs: []
  type: TYPE_NORMAL
  zh: 谋杀联系：在比阿特丽斯经营的毛线店工作室中，灵媒被谋杀，这成为故事的催化剂，将她和她侄女劳拉卷入一场危险的猫鼠游戏，她们争分夺秒地揭开这起致命事件的真相。随着调查的展开，比阿特丽斯对灵异世界的独特洞察力和联系在解开谜团和将凶手绳之以法方面证明是无价的。
- en: 'Character Arc: Throughout the series, Beatrice undergoes a journey of self-discovery
    and empowerment, learning to embrace her true identity as a paranormal investigator
    and embrace her unique gifts. As she confronts the demons of her past and faces
    the challenges of the present, she grows stronger and more confident in her abilities,
    emerging as a formidable force for good in her community. Along the way, she forges
    deeper connections with her niece, Laura, and her quirky group of friends, finding
    strength and solace in their unwavering support. Through her courage and determination,
    Beatrice proves that age is no barrier to adventure and that even the most unlikely
    heroes can change the world.'
  id: totrans-1645
  prefs: []
  type: TYPE_NORMAL
  zh: 角色弧线：在整个系列中，比阿特丽斯经历了自我发现和赋权的旅程，学习接受她作为灵异调查者的真实身份，并拥抱她独特的天赋。当她面对过去的恶魔和面对现在的挑战时，她在能力上变得更加强大和自信，成为她社区中一股强大的正能量。在这个过程中，她与侄女劳拉和她古怪的朋友群体建立了更深的联系，在他们的坚定不移的支持中找到了力量和慰藉。凭借她的勇气和决心，比阿特丽斯证明了年龄不是冒险的障碍，即使是最不可能的英雄也能改变世界。
- en: This is great, but I don’t like Beatrice as a name for such an independent unconventional
    woman. Time to get more creative.
  id: totrans-1646
  prefs: []
  type: TYPE_NORMAL
  zh: 这很好，但我不喜欢将这个名字用于这样一个独立且不拘一格的女性。是时候更加富有创意了。
- en: '![](image_rsrc449.jpg)'
  id: totrans-1647
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc449.jpg)'
- en: Give me 10 alternative names for a quirky psychic woman in her mid-60s living
    in the US whose parents had travelled to India and been part of the hippie culture.
  id: totrans-1648
  prefs: []
  type: TYPE_NORMAL
  zh: 给我一个60多岁的古怪灵媒女性在美国的备选名字，她的父母曾去过印度并曾是嬉皮士文化的一部分。
- en: '![](image_rsrc44A.jpg)'
  id: totrans-1649
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44A.jpg)'
- en: 'Certainly! Here are ten alternative names for a quirky psychic woman in her
    mid-60s with parents who were part of the hippie culture and traveled to India:'
  id: totrans-1650
  prefs: []
  type: TYPE_NORMAL
  zh: 当然！以下是为一个60多岁的古怪灵媒女性提供的十个备选名字，她的父母曾是嬉皮士文化的一部分，并曾去过印度：
- en: Indira (Inspired by Indian culture and the name of former Indian Prime Minister
    Indira Gandhi)
  id: totrans-1651
  prefs: []
  type: TYPE_NORMAL
  zh: 英迪拉（灵感来源于印度文化和前印度总理英迪拉·甘地的名字）
- en: Mystic Moonbeam
  id: totrans-1652
  prefs: []
  type: TYPE_NORMAL
  zh: 神秘月光
- en: Seraphina (Has mystical connotations and ties to spirituality)
  id: totrans-1653
  prefs: []
  type: TYPE_NORMAL
  zh: 赛瑞法娜（具有神秘含义与精神相关联）
- en: Luna (Reflects a connection to the moon and mystical energy)
  id: totrans-1654
  prefs: []
  type: TYPE_NORMAL
  zh: 卢娜（反映了与月亮和神秘能量的联系）
- en: Saffron (Inspired by the spice commonly used in Indian cuisine and associated
    with spirituality)
  id: totrans-1655
  prefs: []
  type: TYPE_NORMAL
  zh: 藏红花（灵感来源于印度菜肴中常用的香料，与精神相关联）
- en: Esmeralda (Evokes a sense of mystery and enchantment)
  id: totrans-1656
  prefs: []
  type: TYPE_NORMAL
  zh: Esmeralda（唤起神秘和迷人的感觉）
- en: Celestia (Suggests a connection to the celestial realm and cosmic energies)
  id: totrans-1657
  prefs: []
  type: TYPE_NORMAL
  zh: Celestia（暗示与天界和宇宙能量的联系）
- en: Shanti (Means "peace" in Sanskrit and reflects a calm and spiritual nature)
  id: totrans-1658
  prefs: []
  type: TYPE_NORMAL
  zh: Shanti（在梵文中意为“和平”，反映了一种平静和灵性的本质）
- en: Zephyra (Derived from the Greek word for "west wind" and symbolizes a free-spirited
    nature)
  id: totrans-1659
  prefs: []
  type: TYPE_NORMAL
  zh: Zephyra（源自希腊语中的“西风”，象征着自由奔放的性格）
- en: Gaia (Inspired by the Greek goddess of the Earth and embodies a deep connection
    to nature and spirituality)
  id: totrans-1660
  prefs: []
  type: TYPE_NORMAL
  zh: Gaia（灵感来源于希腊地球女神，体现了对自然和精神深层次的联系）
- en: I like Seraphina Moonbeam. The short versions of Seraphina include Sera, Seri,
    Phina and Fina.
  id: totrans-1661
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢塞拉芬娜·月光。塞拉芬娜的简称包括Sera、Seri、Phina和Fina。
- en: 'We now have a name for Laura’s aunt Sera: Seraphina Moonbeam Marsh.'
  id: totrans-1662
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们现在有了一个名字来称呼劳拉的姑母塞拉：塞拉芬娜·月光·马什。
- en: It's time to move on to a critical character in any cozy mystery – the sidekick
    companion or companions.
  id: totrans-1663
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候转向任何温馨谋杀谜案的至关重要角色——配角或配角们。
- en: '![](image_rsrc44B.jpg)'
  id: totrans-1664
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44B.jpg)'
- en: You are an expert and advanced cozy murder mystery fiction author who has published
    over 50 bestselling novels and has 30 years of experience. You write commercial
    and very successful cozy murder mystery fiction that readers love and auto-buy
    every book in your series. Your cozy mystery stories are known for escapist settings,
    twisty cozy mystery plots, and your cast of fun and witty characters that readers
    love. You have a deep knowledge of cozy murder mystery tropes and reader expectations
    that inform your writing.
  id: totrans-1665
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一位专家级的高级温馨谋杀谜案小说作家，已经出版了超过50本畅销小说，拥有30年的经验。你写的是商业上非常成功的温馨谋杀谜案小说，读者喜欢并自动购买你系列中的每一本书。你的温馨谋杀谜案故事以逃避现实的背景、错综复杂的温馨谋杀谜案情节以及读者喜爱的有趣、机智的角色而闻名。你对温馨谋杀谜案主题和读者期望有深刻的了解，这些了解指导了你的写作。
- en: Please define what is meant by a “sidekick” in a cozy mystery plot and give
    ten examples of a sidekick character.
  id: totrans-1666
  prefs: []
  type: TYPE_NORMAL
  zh: 请定义在温馨谋杀谜案情节中“配角”的含义，并给出十个配角角色的例子。
- en: '![](image_rsrc44C.jpg)'
  id: totrans-1667
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44C.jpg)'
- en: In cozy murder mysteries, a "sidekick" is a character who accompanies and assists
    the protagonist, often the amateur sleuth, in their investigation. This character
    adds depth to the story through their interactions with the main character, provides
    a sounding board for ideas, and sometimes offers comic relief or emotional support.
  id: totrans-1668
  prefs: []
  type: TYPE_NORMAL
  zh: 在温馨谋杀谜案中，一个“配角”是一个陪伴并协助主角（通常是业余侦探）进行调查的角色。这个角色通过与主要角色的互动，为故事增添了深度，为想法提供了一个回声板，有时提供喜剧效果或情感支持。
- en: The sidekick is crucial in making the investigation more dynamic and engaging.
    They often contrast with the protagonist in personality or skills, offering a
    different perspective on the mystery.
  id: totrans-1669
  prefs: []
  type: TYPE_NORMAL
  zh: 配角对于使调查更加生动和吸引人至关重要。他们通常在性格或技能上与主角形成对比，为谜团提供不同的视角。
- en: 'Here are ten examples of sidekick characters commonly found in cozy murder
    mysteries:'
  id: totrans-1670
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是温馨谋杀谜案中常见的十个配角角色例子：
- en: '1\. Loyal Best Friend: A friend who has known the protagonist for years, offering
    unwavering support and assistance in investigations, often adding emotional depth
    and humor.'
  id: totrans-1671
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 忠诚的最佳朋友：一个认识主角多年的朋友，在调查中提供坚定不移的支持和帮助，通常增添情感深度和幽默。
- en: '2\. Quirky Relative: A family member, like an eccentric aunt or cousin, who
    provides unique insights or unexpected help, often with a touch of humor.'
  id: totrans-1672
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 古怪的亲戚：一个家庭成员，如古怪的女姑母或表亲，提供独特的见解或意外的帮助，通常带有幽默感。
- en: '3\. Intelligent Pet: A cat, dog, or other pet that helps in subtle ways, like
    leading the protagonist to clues or providing comfort. These pets often have a
    keen perception that aids in the mystery.'
  id: totrans-1673
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 智能宠物：一只猫、狗或其他宠物，以微妙的方式帮助，比如引导主角找到线索或提供安慰。这些宠物通常有敏锐的洞察力，有助于解开谜团。
- en: '4\. Tech-Savvy Helper: A character skilled in technology or hacking, helping
    with research or digital clues that the protagonist cannot handle alone.'
  id: totrans-1674
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 技术达人助手：一个在技术或黑客方面有专长的人物，帮助进行主角无法独自处理的研究或数字线索。
- en: '5\. Local Expert: Someone with extensive knowledge of the town or specific
    subject matter relevant to the mystery, offering crucial information or insights.'
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 当地专家：对城镇或与谜案相关的特定主题有广泛知识的人，提供关键信息或见解。
- en: '6\. Bumbling Assistant: A character who is well-meaning but often gets things
    wrong, creating comic relief and sometimes accidentally stumbling upon important
    clues.'
  id: totrans-1676
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 笨拙的助手：一个心地善良但经常出错的角色，创造喜剧效果，有时意外地发现重要线索。
- en: '7\. Romantic Interest: A love interest who assists in the investigation, adding
    romantic tension and personal stakes to the plot.'
  id: totrans-1677
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 恋爱对象：一个在调查中提供帮助，增加浪漫紧张感和个人利益的角色，为剧情增添色彩。
- en: '8\. Retired Professional: A retired police officer, detective, or lawyer who
    offers expertise and advice, guiding the protagonist through the intricacies of
    the investigation.'
  id: totrans-1678
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 退休专业人士：一位退休的警官、侦探或律师，提供专业知识和建议，引导主角通过调查的复杂性。
- en: '9\. Curious Kid or Teenager: A younger character who is eager to help and often
    notices things that adults overlook, bringing a fresh perspective to the investigation.'
  id: totrans-1679
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 好奇的孩子或青少年：一个渴望帮助的年轻角色，经常注意到成年人忽视的事情，为调查带来新的视角。
- en: '10\. Wise Local: An older, knowledgeable local who knows everyone in the community
    and their histories, providing background information and gossip that can be vital
    to solving the mystery.'
  id: totrans-1680
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 聪明的当地人：一位年长的、知识渊博的当地人，了解社区中的每个人及其历史，提供对解决谜案至关重要的背景信息和八卦。
- en: In cozy mysteries, the sidekick not only aids in the investigation but also
    contributes significantly to character development, plot advancement, and the
    overall charm of the story. They often resonate well with readers, adding layers
    of relatability and warmth to the narrative.
  id: totrans-1681
  prefs: []
  type: TYPE_NORMAL
  zh: 在温馨的谜案小说中，配角不仅帮助调查，而且对角色发展、剧情推进和整个故事的魅力做出了重大贡献。他们通常与读者产生共鸣，为叙事增添可联系性和温暖。
- en: Great response. One point is worth noting—the sidekick is often used as the
    sleuth's sounding board.
  id: totrans-1682
  prefs: []
  type: TYPE_NORMAL
  zh: 很好的回应。有一点值得注意——配角经常被用作侦探的回声板。
- en: Think about Captain Hastings in Agatha Christie's Poirot stories. When Poirot
    explains something to Hastings, he tells the reader what he is thinking and how
    he has worked out an important plot point, revelation, or clue.
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: 想想阿加莎·克里斯蒂的波洛故事中的哈斯特上校。当波洛向哈斯特解释某事时，他会告诉读者他在想什么，以及他是如何解决一个重要的剧情点、揭示或线索的。
- en: Sidekicks can also have some of the wittiest, most charming dialogue, quirky
    habits, and hidden talents of the characters in your book.
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: 配角也可以拥有一些最机智、最迷人的对话，古怪的习惯和隐藏的才能，这些都是你书中角色的特点。
- en: Customize the following prompt to match your story idea and the kind of sidekick
    who is a perfect match for your detective.
  id: totrans-1685
  prefs: []
  type: TYPE_NORMAL
  zh: 将以下提示定制以匹配你的故事想法和与侦探完美匹配的配角类型。
- en: Let’s find out more about some of these characters.
  id: totrans-1686
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更深入地了解一些这些角色。
- en: '![](image_rsrc44D.jpg)'
  id: totrans-1687
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc44D.jpg)'
- en: 'Can you tell me more about: Retired Professional: A retired police officer,
    detective, or lawyer who offers expertise and advice, guiding the protagonist
    through the intricacies of the investigation? Give 5 examples of witty and fun
    dialogue between the sleuth and her psychic aunt’s best friend when they are discussing
    the murder investigation.'
  id: totrans-1688
  prefs: []
  type: TYPE_NORMAL
  zh: 你能告诉我更多关于：退休专业人士：一位退休的警官、侦探或律师，提供专业知识和建议，引导主角通过调查的复杂性吗？请给出侦探和她灵媒阿姨最好的朋友在讨论谋杀案调查时的一些机智而有趣的对话示例。
- en: '![](image_rsrc44E.jpg)'
  id: totrans-1689
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc44E.jpg)'
- en: 'Certainly! Here are five examples of witty and fun dialogue between Laura Marsh,
    the sleuth, and her psychic aunt''s best friend, a retired police officer named
    George, as they discuss the murder investigation:'
  id: totrans-1690
  prefs: []
  type: TYPE_NORMAL
  zh: 当然！以下是劳拉·马什，这位侦探，和她灵媒阿姨最好的朋友——一位名叫乔治的退休警官——之间的一些机智而有趣的对话示例，他们讨论谋杀案调查：
- en: 'Dialogue 1:'
  id: totrans-1691
  prefs: []
  type: TYPE_NORMAL
  zh: 对话1：
- en: 'Laura: "So, George, any brilliant deductions on the murder case?"'
  id: totrans-1692
  prefs: []
  type: TYPE_NORMAL
  zh: 'Laura: "乔治，你对这个谋杀案有什么高明的推理吗？"'
- en: 'George: "Ah, you know me, Laura. My detective instincts are as sharp as ever.
    But this case has me stumped."'
  id: totrans-1693
  prefs: []
  type: TYPE_NORMAL
  zh: 'George: "啊，你知道我，劳拉。我的侦探直觉依然敏锐。但这个案件让我陷入了困境。"'
- en: 'Laura: "Stumped? I thought retired detectives were supposed to have all the
    answers."'
  id: totrans-1694
  prefs: []
  type: TYPE_NORMAL
  zh: 'Laura: "困惑了吗？我以为退休的侦探应该有所有答案。"'
- en: 'George: "Well, my dear, even Sherlock Holmes had his off days. But mark my
    words, we''ll crack this case yet."'
  id: totrans-1695
  prefs: []
  type: TYPE_NORMAL
  zh: 'George: "嗯，亲爱的，即使是福尔摩斯也有不顺心的时候。但记住我的话，我们终究会破解这个案件的。"'
- en: 'Dialogue 2:'
  id: totrans-1696
  prefs: []
  type: TYPE_NORMAL
  zh: 对话2：
- en: 'Laura: "Do you think we''re getting closer to catching the killer?"'
  id: totrans-1697
  prefs: []
  type: TYPE_NORMAL
  zh: 'Laura: "你认为我们离抓住凶手更近了吗？"'
- en: 'George: "Closer? Oh, absolutely. We''re practically breathing down their necks."'
  id: totrans-1698
  prefs: []
  type: TYPE_NORMAL
  zh: 'George: "更近？哦，绝对。我们几乎已经追到他们的脖子后面了。"'
- en: 'Laura: "That''s reassuring. I was starting to think we were just chasing our
    tails."'
  id: totrans-1699
  prefs: []
  type: TYPE_NORMAL
  zh: 'Laura: "这让人放心。我开始觉得我们只是在徒劳无功。"'
- en: 'George: "Nonsense, Laura. We may be retired, but we''ve still got plenty of
    tricks up our sleeves."'
  id: totrans-1700
  prefs: []
  type: TYPE_NORMAL
  zh: 'George: "胡说，劳拉。虽然我们已经退休，但我们仍然有很多招数在身上。"'
- en: 'Dialogue 3:'
  id: totrans-1701
  prefs: []
  type: TYPE_NORMAL
  zh: 对话3：
- en: 'Laura: "I can''t believe how many suspects we''ve interviewed already."'
  id: totrans-1702
  prefs: []
  type: TYPE_NORMAL
  zh: 'Laura: "我无法相信我们已经面试了这么多嫌疑人。"'
- en: 'George: "Ah, yes, the joys of detective work. Sorting through the suspects
    is like trying to find a needle in a haystack."'
  id: totrans-1703
  prefs: []
  type: TYPE_NORMAL
  zh: 乔治：“啊，是的，侦探工作的乐趣。在嫌疑人中筛选就像在稻草堆里找针一样。”
- en: 'Laura: "Or a killer in a yarn store."'
  id: totrans-1704
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉：“或者是一个在 yarn 店里的杀手。”
- en: 'George: "Exactly! But with your sharp wit and my years of experience, we''ll
    sift through the suspects in no time."'
  id: totrans-1705
  prefs: []
  type: TYPE_NORMAL
  zh: 乔治：“正是这样！但有了你敏锐的机智和我的多年经验，我们很快就能筛选出嫌疑人。”
- en: 'Dialogue 4:'
  id: totrans-1706
  prefs: []
  type: TYPE_NORMAL
  zh: 对话4：
- en: 'Laura: "I''m starting to wonder if we''re ever going to solve this case."'
  id: totrans-1707
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉：“我开始怀疑我们是否永远解决不了这个案子。”
- en: 'George: "Nonsense, Laura. A detective never gives up hope. Besides, where''s
    the fun in solving a mystery without a few twists and turns along the way?"'
  id: totrans-1708
  prefs: []
  type: TYPE_NORMAL
  zh: 乔治：“胡说，劳拉。侦探永远不会放弃希望。而且，没有一些曲折和转折，解决一个谜案有什么乐趣？”
- en: 'Laura: "I suppose you have a point there. But I could do without the constant
    surprises."'
  id: totrans-1709
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉：“我想你说的有道理。但我可以不用那些不断的惊喜。”
- en: 'George: "Ah, but that''s what keeps us on our toes, my dear. Just when you
    think you''ve seen it all, life throws you another curveball."'
  id: totrans-1710
  prefs: []
  type: TYPE_NORMAL
  zh: 乔治：“啊，但这就是让我们保持警惕的原因，我亲爱的。当你认为你已经看透了一切时，生活又会给你一个曲线球。”
- en: 'Dialogue 5:'
  id: totrans-1711
  prefs: []
  type: TYPE_NORMAL
  zh: 对话5：
- en: 'Laura: "I never thought I''d be investigating a murder in my aunt''s yarn store."'
  id: totrans-1712
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉：“我从没想过我会在我阿姨的 yarn 店里调查谋杀案。”
- en: 'George: "Ah, but that''s the beauty of life, Laura. You never know where the
    next mystery will lead you."'
  id: totrans-1713
  prefs: []
  type: TYPE_NORMAL
  zh: 乔治：“啊，但这就是生活的美好，劳拉。你永远不知道下一个谜团会把你引向何方。”
- en: 'Laura: "True, but I could do without the constant danger."'
  id: totrans-1714
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉：“确实如此，但我可以不用那些不断的危险。”
- en: 'George: "Ah, but where''s the excitement in playing it safe? Besides, with
    you on the case, I have no doubt we''ll catch the killer before they strike again."'
  id: totrans-1715
  prefs: []
  type: TYPE_NORMAL
  zh: 乔治：“啊，但安全地玩有什么乐趣？而且，有你在这起案件中，我坚信我们会在凶手再次作案之前抓住他们。”
- en: I hope that you can see that asking for a sample of dialogue gives you some
    insight into the relationship between the sleuth and who they are going to rely
    on for help and support.
  id: totrans-1716
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你能看出，要求一段对话样本可以让你对侦探与他们将要依赖以获得帮助和支持的人之间的关系有所了解。
- en: You can also combine different kinds of sidekicks.
  id: totrans-1717
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以结合不同类型的助手。
- en: For example. Many cozy mysteries combine the Romantic Interest with the Professional
    police officer, detective, or lawyer, retired or otherwise, to create one sidekick
    character with whom the sleuth will work during the investigation.
  id: totrans-1718
  prefs: []
  type: TYPE_NORMAL
  zh: 例如。许多温馨谋杀谜案将浪漫兴趣与职业警察、侦探或律师（退休或在职）结合起来，创造一个侦探在调查期间将与之合作的助手角色。
- en: Next Steps
  id: totrans-1719
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下一步
- en: Work on who would be the best sidekick for your sleuth and then develop character
    profiles for each person.
  id: totrans-1720
  prefs: []
  type: TYPE_NORMAL
  zh: 确定最适合你的侦探的最佳助手，并为每个人开发角色档案。
- en: What kind of interactions are you looking for?
  id: totrans-1721
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你希望看到什么样的互动？
- en: How can each of these sidekicks move the plot forward?
  id: totrans-1722
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 这些助手如何推动情节发展？
- en: How can you make these characters different and exciting for your readers?
  id: totrans-1723
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你如何让这些角色对读者来说既不同又充满趣味？
- en: For example.
  id: totrans-1724
  prefs: []
  type: TYPE_NORMAL
  zh: 例如。
- en: In the case study, I want the sleuth to have two senior paranormal sidekicks
    with widely different backgrounds and personalities. Both of these seniors live
    in the historic coastal town of Polperran.
  id: totrans-1725
  prefs: []
  type: TYPE_NORMAL
  zh: 在案例研究中，我希望侦探有两个背景和性格迥异的资深超自然助手。这两位资深人士都住在历史悠久的沿海小镇Polperran。
- en: You can customize this prompt for your niche and story idea.
  id: totrans-1726
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以根据你的利基和故事想法定制这个提示。
- en: Let’s explore some options for unusual characters in this community and setting.
    I shall ask for 10 options to save space, but you can ask for 50 to maximize the
    number of character ideas generated.
  id: totrans-1727
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索一下在这个社区和环境中不寻常角色的选项。我会要求提供10个选项以节省空间，但你也可以要求50个以最大化生成角色想法的数量。
- en: '![](image_rsrc44F.jpg)'
  id: totrans-1728
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc44F.jpg]'
- en: You are an expert and advanced cozy murder mystery fiction author who has published
    over 50 bestselling novels and has 30 years of experience. You write commercial
    and very successful cozy murder mystery fiction that readers love and auto-buy
    every book in your series. Your cozy mystery stories are known for escapist settings,
    twisty cozy mystery plots, and your cast of fun and witty characters that readers
    love. You have a deep knowledge of cozy murder mystery tropes and reader expectations
    that inform your writing.
  id: totrans-1729
  prefs: []
  type: TYPE_NORMAL
  zh: 你是一位专家级的高级温馨谋杀谜案小说作家，已经出版了50多本畅销小说，拥有30年的经验。你写的是商业上非常成功的温馨谋杀谜案小说，读者喜欢并自动购买你系列中的每一本书。你的温馨谋杀谜案故事以逃避现实的场景、错综复杂的温馨谋杀谜案情节以及读者喜爱的有趣、机智的角色而闻名。你对温馨谋杀谜案主题和读者期望有深刻的了解，这些了解指导了你的写作。
- en: Please give me 10 examples of an unusual sidekick character who is different,
    unexpected, and unique. This character should be a senior and have an interesting
    background and individual personality. This character has paranormal abilities
    that they bring to the murder investigation.
  id: totrans-1730
  prefs: []
  type: TYPE_NORMAL
  zh: 请给我10个不同、意外、独特的非典型配角角色的例子。这个角色应该是一位长者，拥有有趣背景和个性。这个角色拥有超自然能力，并将其应用于谋杀调查。
- en: '![](image_rsrc44G.jpg)'
  id: totrans-1731
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44G.jpg)'
- en: 'Creating an unusual and unique sidekick character, especially a senior with
    paranormal abilities, offers a delightful twist to the cozy murder mystery genre.
    Here are ten examples that could intrigue readers and add depth to your stories:'
  id: totrans-1732
  prefs: []
  type: TYPE_NORMAL
  zh: 创造一个不同且独特的配角角色，尤其是拥有超自然能力的老者，为温馨谋杀谜案类型增添了一种愉快的转折。以下有十个例子，可能会引起读者的兴趣并为你的故事增添深度：
- en: 'Marjorie, the Psychic Knitter: Marjorie is a spirited octogenarian who possesses
    the uncanny ability to see glimpses of the future in her knitting patterns. Each
    stitch and color choice unwittingly reveals clues about upcoming events, including
    unsolved mysteries. Her warm, grandmotherly demeanor makes her approachable, but
    her sharp wit keeps everyone on their toes.'
  id: totrans-1733
  prefs: []
  type: TYPE_NORMAL
  zh: 马乔里，心灵感应编织者：马乔里是一位充满活力的八旬老人，她拥有一种不可思议的能力，能在编织图案中瞥见未来的片段。每一针每一线的选择都无意中揭示了即将发生的事件的线索，包括未解之谜。她温暖的祖母般的风度让人感到亲切，但她的锐利机智让每个人都保持着警惕。
- en: 'Theodore, the Time-Traveling Gardener: A retired botanist in his late seventies,
    Theodore discovers that he can travel short distances in time whenever he''s in
    contact with ancient plants. Using this ability, he helps to uncover historical
    clues and solve mysteries that have roots deep in the past. He''s eccentric, wearing
    period-appropriate attire for his time travels, and has an encyclopedic knowledge
    of flora.'
  id: totrans-1734
  prefs: []
  type: TYPE_NORMAL
  zh: 西奥多，时间旅行的园丁：一位七十多岁的退休植物学家，西奥多发现只要他接触古代植物，就能在短时间内进行时间旅行。利用这种能力，他帮助揭示历史线索，解决根植于过去的谜团。他性格古怪，穿着适合他时间旅行的时代服装，对植物有着百科全书般的了解。
- en: 'Evelyn, the Clairvoyant Cat Lady: Evelyn is in her early seventies and has
    a deep connection with her dozen cats, each of whom exhibits a unique psychic
    talent. She communicates with them telepathically, and together, they assist in
    solving crimes, often in unexpected and humorous ways. Evelyn herself possesses
    the gift of clairvoyance, seeing events unfold in reflective surfaces like water
    bowls and teacups.'
  id: totrans-1735
  prefs: []
  type: TYPE_NORMAL
  zh: 伊夫琳，心灵感应的猫夫人：伊夫琳七十多岁，与她的十二只猫有着深厚的联系，每只猫都表现出独特的心理感应才能。她通过心灵感应与他们沟通，他们一起协助解决犯罪，常常以意想不到和幽默的方式。伊夫琳本人也拥有预知未来的天赋，能在水碗和茶杯等反射面上看到事件的发展。
- en: 'Archibald, the Ghost Whisperer Historian: A retired history professor in his
    late sixties, Archibald has the ability to communicate with the spirits of the
    dead. He uses this skill to uncover secrets from the past, solve historical mysteries,
    and provide crucial clues for contemporary murder cases. He''s dignified, a little
    aloof, but passionately curious about the stories of those who''ve passed.'
  id: totrans-1736
  prefs: []
  type: TYPE_NORMAL
  zh: 阿奇博尔德，幽灵传声的历史学家：一位六十多岁的退休历史教授，阿奇博尔德拥有与死者灵魂沟通的能力。他利用这项技能揭示过去的秘密，解决历史谜团，并为当代谋杀案件提供关键线索。他举止庄重，有点孤僻，但对已故者故事的热情使他充满好奇心。
- en: 'Gertrude, the Astral Projecting Librarian: At 82, Gertrude finds herself with
    the startling ability to astral project after hours of reading ancient texts.
    She uses this skill to go places she physically can''t, gathering clues and eavesdropping
    on conversations to help solve mysteries. Her love for mystery novels makes her
    a keen detective in her own right.'
  id: totrans-1737
  prefs: []
  type: TYPE_NORMAL
  zh: 格特鲁德，星体投射的图书管理员：82岁的格特鲁德在阅读了数小时古代文本后，发现自己有了惊人的星体投射能力。她利用这项技能去她身体无法到达的地方，搜集线索，偷听对话，以帮助解决谜团。她对神秘小说的热爱使她成为了一名侦探。
- en: 'Rupert, the Psychic Chef: A celebrated chef in his earlier years, Rupert, now
    in his seventies, discovers his meals can induce visions related to murder mysteries
    when eaten. He''s jovial, loves to share stories of his culinary adventures, and
    uses his unique talent to offer not just comfort food but also clues to the protagonist.'
  id: totrans-1738
  prefs: []
  type: TYPE_NORMAL
  zh: 鲁伯特，心灵感应厨师：鲁伯特年轻时是一位著名的厨师，现在七十多岁，他发现他的饭菜在食用时能引发与谋杀谜案相关的幻象。他性格开朗，喜欢分享他的烹饪冒险故事，并利用他独特的才能提供不仅限于安慰食物，还有对主角的线索。
- en: 'Penelope, the Seer of Secrets: A former espionage agent now in her late sixties,
    Penelope possesses the ability to detect lies and uncover secrets with a mere
    touch. Her past is shrouded in mystery, and she uses her talents and extensive
    spy network to gather information, making her an invaluable asset in any investigation.'
  id: totrans-1739
  prefs: []
  type: TYPE_NORMAL
  zh: 彭妮洛普，秘密的先知：彭妮洛普是一位六十多岁的前间谍，她拥有通过触摸就能检测谎言和揭露秘密的能力。她的过去笼罩在神秘之中，她利用她的才能和广泛的间谍网络来收集信息，使她成为任何调查中的无价之宝。
- en: 'Harold, the Antiquarian with a Twist: In his early seventies, Harold deals
    in antiques that whisper their histories to him. This enables him to uncover the
    provenance of crucial items that are key to solving mysteries. He''s a bit of
    a recluse, preferring the company of objects to people, yet his insights are unmatched.'
  id: totrans-1740
  prefs: []
  type: TYPE_NORMAL
  zh: 哈罗德，古董收藏家：哈罗德在七十年代初，经营着能够向他低语历史的古董。这使得他能够发现解决神秘问题的关键物品的来源。他有点孤僻，更喜欢与物品为伴而不是与人交往，但他的洞察力是无与伦比的。
- en: 'Frances, the Telepathic Quilter: Frances is a sweet, grandmotherly figure in
    her late seventies with the peculiar ability to read people''s thoughts when she
    touches fabrics they have worn. She uses this talent while quilting, piecing together
    not just fabric but the hidden motives and secrets of those involved in the mysteries.'
  id: totrans-1741
  prefs: []
  type: TYPE_NORMAL
  zh: 弗朗西斯，心灵感应的缝纫师：弗朗西斯是一位七十多岁的温柔、慈祥的老奶奶，她有一种特殊的能力，当她触摸到别人穿过的布料时，可以读取他们的思想。她在缝纫时运用这种才能，将不仅仅是布料，还有那些参与神秘事件的人的隐藏动机和秘密拼凑在一起。
- en: 'Lester, the Numerologist Watchmaker: At 76, Lester combines his love for watchmaking
    with his talent in numerology to predict events and unravel mysteries. He believes
    numbers connect everything in the universe, and his calculations often lead to
    solving crimes in the most unexpected ways. His shop is a trove of clocks, each
    set to a significant moment in the mysteries he helps to solve.'
  id: totrans-1742
  prefs: []
  type: TYPE_NORMAL
  zh: 莱斯特，数字学家钟表匠：76岁的莱斯特将他对钟表制作的热爱与他在数字学方面的才能结合起来，以预测事件并解开谜团。他相信数字连接着宇宙中的万物，他的计算往往以最意想不到的方式解决犯罪。他的店铺是一个钟表的宝库，每一只钟都设定在他帮助解决的神秘事件中的关键时刻。
- en: These characters not only bring a unique set of skills to the table but also
    enrich the story world with their backgrounds and personalities, offering readers
    an engaging and immersive experience.
  id: totrans-1743
  prefs: []
  type: TYPE_NORMAL
  zh: 这些角色不仅为故事增添了独特的技能，还通过他们的背景和个性丰富了故事世界，为读者提供了引人入胜和沉浸式的体验。
- en: I like the ideas for Frances, the Telepathic Quilter, Harold, and the Antiquarian
    with a Twist, so let’s work on these.
  id: totrans-1744
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢弗朗西斯，心灵感应的缝纫师，哈罗德，以及古董收藏家这些想法，让我们来专注于这些。
- en: '![](image_rsrc44H.jpg)'
  id: totrans-1745
  prefs: []
  type: TYPE_IMG
  zh: '![图片资源44H](image_rsrc44H.jpg)'
- en: You are an expert and advanced cozy murder mystery fiction author who has published
    over 50 bestselling novels and has 30 years of experience. You write commercial
    and very successful cozy murder mystery fiction that readers love and auto-buy
    every book in your series. Your cozy mystery stories are known for escapist settings,
    twisty cozy mystery plots, and your cast of fun and witty characters that readers
    love. You have a deep knowledge of cozy murder mystery tropes and reader expectations
    that inform your writing.
  id: totrans-1746
  prefs: []
  type: TYPE_NORMAL
  zh: 您是一位专家级的高级温馨谋杀悬疑小说作家，已出版超过50本畅销小说，拥有30年的经验。您写的是商业上非常成功且深受读者喜爱的温馨谋杀悬疑小说，读者会自动购买您系列中的每一本书。您的温馨谋杀悬疑故事以逃避现实的场景、错综复杂的悬疑情节以及读者喜爱的有趣、机智的角色而闻名。您对温馨谋杀悬疑的陈词滥调和读者期望有深刻的了解，这些知识指导了您的写作。
- en: 'Can you give me a detailed character profile for a senior sidekick who is Frances,
    the Telepathic Quilter: Frances is a sweet, grandmotherly figure in her late seventies
    with the peculiar ability to read people''s thoughts when she touches fabrics
    they have worn. She uses this talent while quilting, piecing together not just
    fabric but the hidden motives and secrets of those involved in the mysteries.'
  id: totrans-1747
  prefs: []
  type: TYPE_NORMAL
  zh: 您能为我提供一个详细的角色档案，关于一个名叫弗朗西斯，拥有心灵感应能力的缝纫师：弗朗西斯是一位七十多岁的温柔、慈祥的老奶奶，她有一种特殊的能力，当她触摸到别人穿过的布料时，可以读取他们的思想。她在缝纫时运用这种才能，将不仅仅是布料，还有那些参与神秘事件的人的隐藏动机和秘密拼凑在一起。
- en: 'This profile should include: a full name, physical description, background,
    current crisis, personality, murder connection and ideas for subplots with this
    character.'
  id: totrans-1748
  prefs: []
  type: TYPE_NORMAL
  zh: 这个档案应包括：全名、外貌描述、背景、当前危机、性格、谋杀联系以及与这个角色相关的副情节想法。
- en: '![](image_rsrc44J.jpg)'
  id: totrans-1749
  prefs: []
  type: TYPE_IMG
  zh: '![图片资源44J](image_rsrc44J.jpg)'
- en: 'Full Name:'
  id: totrans-1750
  prefs: []
  type: TYPE_NORMAL
  zh: 全名：
- en: Frances Eleanor Wentworth
  id: totrans-1751
  prefs: []
  type: TYPE_NORMAL
  zh: 弗朗西斯·伊莲娜·温特沃斯
- en: 'Physical Description:'
  id: totrans-1752
  prefs: []
  type: TYPE_NORMAL
  zh: 外貌描述：
- en: Frances stands at a modest 5'2", with a frame that's more sturdy than frail,
    suggesting years of active living. Her hair is a soft white, often tied back with
    a fabric ribbon that matches her current quilting project. Her eyes are a sharp
    blue, twinkling with kindness and curiosity, and her hands are nimble yet show
    the signs of her age and love for crafting. She dresses comfortably in layered
    clothing, adorned with handmade quilting patches, each telling a story of her
    past adventures and mysteries she's helped unravel.
  id: totrans-1753
  prefs: []
  type: TYPE_NORMAL
  zh: 弗朗西斯身高5英尺2英寸，身材比娇弱更显得结实，这表明她有着多年活跃的生活经历。她的头发是柔软的白色，经常用一条与当前拼布项目相匹配的布带束起。她的眼睛是锐利的蓝色，闪烁着善意和好奇心，她的手灵巧但显露出她年龄和热爱手工制作的痕迹。她穿着舒适的多层衣物，上面装饰着手工拼布补丁，每个补丁都讲述着她过去的冒险和帮助解开谜团的故事。
- en: 'Background:'
  id: totrans-1754
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：
- en: Frances was born into a family with a deep appreciation for the arts and crafts,
    with quilting being a tradition passed down through generations. She honed her
    craft under the guidance of her mother and grandmother, unknowingly developing
    her unique telepathic ability as she did. After a fulfilling career as a home
    economics teacher, she retired to the quaint town of Willow Creek, where she opened
    a small quilting shop named "The Patchwork Mind." Her shop became a hub for the
    local community, a place where secrets are both hidden and uncovered.
  id: totrans-1755
  prefs: []
  type: TYPE_NORMAL
  zh: 弗朗西斯出生在一个对艺术和手工艺有着深厚欣赏的家庭，拼布是代代相传的传统。在她的母亲和祖母的指导下，她磨练了自己的技艺，不知不觉中发展出了她独特的心灵感应能力。在作为家政学教师充实的事业生涯之后，她退休到了宁静的威洛克里克镇，在那里她开设了一家名为“拼布思维”的小拼布店。她的商店成为当地社区的枢纽，一个既隐藏又揭露秘密的地方。
- en: 'Current Crisis:'
  id: totrans-1756
  prefs: []
  type: TYPE_NORMAL
  zh: 当前危机：
- en: Frances's tranquil retirement is disrupted when a mysterious fabric piece is
    left at her doorstep, carrying the distressing thoughts of someone in grave danger.
    This piece of fabric becomes the catalyst for her involvement in a new mystery,
    compelling her to use her abilities to save someone she may not even know. Meanwhile,
    her shop faces the threat of closure due to a new, modern craft store opening
    in town, challenging her to find a way to preserve her legacy and the town's history.
  id: totrans-1757
  prefs: []
  type: TYPE_NORMAL
  zh: 弗朗西斯宁静的退休生活被一块神秘的布料打破，这块布料放在她家门口，带着一个身处极大危险中的人的痛苦思绪。这块布料成为她参与新谜案的催化剂，迫使她运用自己的能力去拯救一个她可能甚至不认识的人。与此同时，她的商店面临着因镇上新开的一家现代工艺品店而关闭的威胁，这让她必须找到一种方法来保留她的遗产和镇上的历史。
- en: 'Personality:'
  id: totrans-1758
  prefs: []
  type: TYPE_NORMAL
  zh: 性格：
- en: Frances is the epitome of warmth, exuding a grandmotherly affection that draws
    people to her. She's patient, with a keen listening ear, making her a confidante
    to many. However, beneath her gentle exterior lies a sharp intellect and a fierce
    determination. Frances is not one to shy away from challenges; instead, she approaches
    them with pragmatic optimism. Her wit is subtle but present, often surprising
    those who underestimate her based on her age.
  id: totrans-1759
  prefs: []
  type: TYPE_NORMAL
  zh: 弗朗西斯是热情的化身，散发出一种祖母般的慈爱，吸引着人们靠近她。她耐心，有着敏锐的倾听能力，使她成为许多人的知己。然而，在她温和的外表下隐藏着敏锐的智慧和坚定的决心。弗朗西斯不是那种回避挑战的人；相反，她以务实的乐观态度面对挑战。她的智慧微妙但明显，常常让那些仅凭年龄低估她的人感到惊讶。
- en: 'Murder Connection:'
  id: totrans-1760
  prefs: []
  type: TYPE_NORMAL
  zh: 谋杀联系：
- en: The mysterious fabric piece is linked to the disappearance of a local, beloved
    community member, whose last known location was near Frances's shop. As Frances
    delves deeper into her telepathic insights, she uncovers a web of secrets that
    connects this disappearance to a series of unsolved cases in Willow Creek. Her
    unique talent becomes crucial in piecing together the puzzle, drawing her into
    the heart of the investigation alongside the town's detective, who is initially
    skeptical of her abilities.
  id: totrans-1761
  prefs: []
  type: TYPE_NORMAL
  zh: 这块神秘的布料与一位当地深受爱戴的社区成员的失踪有关，这位成员最后已知的位置在弗朗西斯的商店附近。随着弗朗西斯深入挖掘她的心灵感应洞察力，她揭露了一个秘密网络，将这次失踪与威洛克里克的一系列未解决的案件联系起来。她的独特才能在拼凑谜团中变得至关重要，将她引向调查的核心，与镇上的侦探并肩作战，这位侦探最初对她能力持怀疑态度。
- en: 'Ideas for Subplots with This Character:'
  id: totrans-1762
  prefs: []
  type: TYPE_NORMAL
  zh: 与此角色相关的副情节想法：
- en: 'Quilting Class Mysteries: Frances hosts a quilting class where each session
    unintentionally reveals a clue or a motive related to the case, weaving the participants
    into the fabric of the investigation.'
  id: totrans-1763
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拼布课程谜团：弗朗西斯举办拼布课程，每次课程无意中都会揭示与案件相关的线索或动机，将参与者编织到调查的脉络中。
- en: 'The Fabric of Time: Frances embarks on a personal quest to create a "memory
    quilt" for Willow Creek''s bicentennial celebration, leading her to uncover historical
    secrets that mirror the present-day mystery, suggesting a cyclical pattern of
    events.'
  id: totrans-1764
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间之布：弗朗西斯开始个人任务，为 Willow Creek 的 bicentennial 庆祝活动制作“记忆拼布”，这使她发现了与当代谜团相呼应的历史秘密，暗示着事件循环的模式。
- en: 'The Telepathic Network: Frances discovers there are others with similar telepathic
    abilities, connected through different crafts and hobbies. This network becomes
    instrumental in solving the mystery but also introduces new challenges as they
    navigate their shared and conflicting insights.'
  id: totrans-1765
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 心灵感应网络：弗朗西斯发现还有其他人拥有类似的通灵感应能力，他们通过不同的手工艺和爱好相互联系。这个网络在解决谜团时变得至关重要，同时也带来了新的挑战，因为他们需要处理共享和冲突的洞察。
- en: 'The Patchwork Mind Showdown: The modern craft store''s owner is revealed to
    have a vendetta against Frances, tied to a decades-old mystery. This subplot explores
    themes of forgiveness, rivalry, and the preservation of tradition in the face
    of modernization.'
  id: totrans-1766
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 针织品思维对决：现代手工艺店的老板被发现对弗朗西斯怀有敌意，这与一个几十年前的谜团有关。这个副情节探讨了宽恕、竞争以及面对现代化如何保护传统主题。
- en: 'A Stitch in Time Saves Nine: Frances''s ability begins to take a toll on her,
    leading to a subplot where she must find a balance between helping others and
    preserving her own well-being. This journey introduces a character who could be
    a potential apprentice, hinting at the passing of the torch.'
  id: totrans-1767
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一针一线胜九针：弗朗西斯的通灵感应能力开始对她造成影响，导致一个副情节，她必须找到在帮助他人和保护自己健康之间找到平衡。这段旅程介绍了一个可能成为潜在学徒的角色，暗示着火炬的传递。
- en: Frances Eleanor Wentworth's character brings a unique blend of mystery, warmth,
    and wisdom to the cozy murder mystery genre, making her an unforgettable and beloved
    figure in the series.
  id: totrans-1768
  prefs: []
  type: TYPE_NORMAL
  zh: 弗朗西斯·伊莲诺·温特沃斯这个角色为温馨谋杀悬疑体裁带来了神秘、温暖和智慧的独特融合，使她成为系列中难忘且深受喜爱的角色。
- en: This is a really interesting profile.
  id: totrans-1769
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常有趣的档案。
- en: Let’s Play the “What-if” Game for Frances Wentworth
  id: totrans-1770
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让我们为弗朗西斯·温特沃斯玩“如果”游戏
- en: What if? Frances married the son of a wealthy business family that still runs
    the town? Her husband is alive and well and is planning to retire as a lawyer.
    This provides conflict, amusing banter, and scope for more plots.
  id: totrans-1771
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？弗朗西斯嫁给了仍然经营这个城镇的富裕商业家族的儿子？她的丈夫现在还活着，身体健康，并计划作为律师退休。这提供了冲突、有趣的对话以及更多情节的空间。
- en: What if? Frances exhibits her work, takes commissions from families, and donates
    work to charity auctions.
  id: totrans-1772
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？弗朗西斯展示她的作品，接受家庭的委托，并将作品捐赠给慈善拍卖。
- en: What if? Frances has known Laura’s aunt, Sera, since junior school. Sera is
    someone that Frances can talk to about her telepathic abilities, and they are
    pretty close.
  id: totrans-1773
  prefs: []
  type: TYPE_NORMAL
  zh: 如果？弗朗西斯从小学就认识劳拉的阿姨，塞拉。塞拉是弗朗西斯可以谈论她通灵感应能力的人，他们关系相当亲密。
- en: '![](image_rsrc44K.jpg)'
  id: totrans-1774
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44K.jpg)'
- en: You are an expert and advanced cozy murder mystery fiction author who has published
    over 50 bestselling novels and has 30 years of experience. You write commercial
    and very successful cozy murder mystery fiction that readers love and auto-buy
    every book in your series. Your cozy mystery stories are known for escapist settings,
    twisty cozy mystery plots, and your cast of fun and witty characters that readers
    love. You have a deep knowledge of cozy murder mystery tropes and reader expectations
    that inform your writing.
  id: totrans-1775
  prefs: []
  type: TYPE_NORMAL
  zh: 您是一位专家级的高级温馨谋杀悬疑小说作家，已出版超过50本畅销小说，拥有30年的经验。您创作的商业成功且深受读者喜爱的温馨谋杀悬疑小说，让读者们爱不释手，并自动购买您系列中的每一本书。您的温馨谋杀悬疑故事以逃避现实的场景、错综复杂的悬疑情节，以及读者喜爱的有趣和机智的角色而闻名。您对温馨谋杀悬疑的陈词滥调以及读者的期待有深刻的了解，这些知识都体现在您的写作中。
- en: 'Can you give me a detailed character profile for a senior sidekick who is Harold,
    the Antiquarian with a Twist: In his early seventies, Harold deals in antiques
    that whisper their histories to him. This enables him to uncover the provenance
    of crucial items that are key to solving mysteries. He''s a bit of a recluse,
    preferring the company of objects to people, yet his insights are unmatched.'
  id: totrans-1776
  prefs: []
  type: TYPE_NORMAL
  zh: 您能为我提供一个详细的配角人物档案吗？这位配角名叫哈罗德，是一位带点古怪的古董商：在他七十年代初，哈罗德经营着对他低语历史的古董。这使得他能够发现解决谜团的关键物品的来源。他有点孤僻，更喜欢与物品而不是与人相处，但他的洞察力是无与伦比的。
- en: 'This profile should include: a full name, physical description, background,
    current crisis, personality, murder connection and ideas for subplots with this
    character.'
  id: totrans-1777
  prefs: []
  type: TYPE_NORMAL
  zh: 这个档案应该包括：全名、外貌描述、背景、当前危机、性格、谋杀联系以及与这个角色相关的副情节想法。
- en: '![](image_rsrc44M.jpg)'
  id: totrans-1778
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44M.jpg)'
- en: 'Full Name:'
  id: totrans-1779
  prefs: []
  type: TYPE_NORMAL
  zh: 全名：
- en: Harold Jasper Finchley
  id: totrans-1780
  prefs: []
  type: TYPE_NORMAL
  zh: 哈罗德·贾斯珀·芬奇利
- en: 'Physical Description:'
  id: totrans-1781
  prefs: []
  type: TYPE_NORMAL
  zh: 身体描述：
- en: Harold is a man of slender build, standing at about 5'10", with a posture bent
    slightly from years of poring over antique objects and books. His hair is a distinguished
    silver, often unkempt, as if his last thought was always on a piece rather than
    personal grooming. He has deep-set, observant gray eyes that miss nothing, and
    his hands are always slightly stained from handling antiques. Harold dresses in
    a somewhat outdated fashion, favoring tweed jackets with elbow patches, vests,
    and occasionally a bow tie, giving him an air of an academic from a bygone era.
  id: totrans-1782
  prefs: []
  type: TYPE_NORMAL
  zh: 哈罗德身材瘦长，大约5英尺10英寸高，由于多年研究古董和书籍，姿势略有弯曲。他的头发是显眼的银色，常常凌乱不堪，似乎他的最后一刻总是在思考一件物品而不是个人打扮。他有一双深邃、警觉的灰色眼睛，从不放过任何细节，他的手总是因接触古董而略显污渍。哈罗德穿着有些过时的时尚，喜欢带有肘部补丁的粗花呢夹克、背心和偶尔的领结，使他看起来像是一个来自过往时代的学者。
- en: 'Background:'
  id: totrans-1783
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：
- en: Harold grew up in a family that ran a small but respected antique shop in the
    countryside of England, fostering his love for history and ancient artifacts from
    a young age. He was particularly drawn to items with a story, finding he had a
    unique connection to them. This led him to study history at university, though
    he found academic life too confining and returned to his roots, eventually taking
    over the family business. Over the years, Harold became known for his uncanny
    ability to uncover the true stories behind the antiques he acquired, making Finchley's
    Antiques a destination for collectors and historians alike.
  id: totrans-1784
  prefs: []
  type: TYPE_NORMAL
  zh: 哈罗德在英格兰乡村的一个小但受人尊敬的古董店的家庭中长大，从小培养了他对历史和古代文物的热爱。他特别被有故事的东西吸引，发现他与它们有着独特的联系。这促使他在大学学习历史，尽管他发现学术生活过于束缚，于是回到了自己的根源，最终接管了家族生意。多年来，哈罗德因他揭示他收购的古董背后真实故事的超凡能力而闻名，使芬奇利的古董店成为收藏家和历史学家们的目的地。
- en: 'Current Crisis:'
  id: totrans-1785
  prefs: []
  type: TYPE_NORMAL
  zh: 当前危机：
- en: The discovery of a rare 18th-century clock in Harold's shop, connected to a
    legendary unsolved theft from a nearby estate, thrusts him into the spotlight.
    The clock whispers of a hidden compartment containing a clue to the long-lost
    treasure associated with the theft. However, the revelation attracts unwanted
    attention from a shadowy figure determined to claim the treasure for themselves,
    putting Harold and his shop in danger.
  id: totrans-1786
  prefs: []
  type: TYPE_NORMAL
  zh: 在哈罗德的店里发现了一款罕见的18世纪钟表，与附近庄园的一个传奇未解之谜有关，这使他成为了焦点。钟表低语着一个隐藏的隔间，里面藏有与盗窃案相关的失落宝藏的线索。然而，这个发现吸引了一个想要独自占有宝藏的神秘人物的注意，这对哈罗德和他的店铺构成了危险。
- en: 'Personality:'
  id: totrans-1787
  prefs: []
  type: TYPE_NORMAL
  zh: 性格：
- en: Harold is introspective and has a natural inclination toward solitude, finding
    comfort in the silent company of his antiques. He's not unsociable, but he chooses
    his friends carefully, preferring meaningful interactions over small talk. Harold
    possesses a dry wit and is fiercely intelligent, often surprising people with
    his extensive knowledge not just of antiques, but of history, art, and literature.
    He's patient, meticulous, and has a deep-seated integrity, driven by a genuine
    desire to preserve and uncover history.
  id: totrans-1788
  prefs: []
  type: TYPE_NORMAL
  zh: 哈罗德内省且天生倾向于孤独，在古董的寂静陪伴中找到安慰。他并非不社交，但他会仔细选择朋友，更偏好有意义的互动而非闲聊。哈罗德拥有干练的幽默感和强烈的智慧，经常用他广泛的知识令人们惊讶，这些知识不仅限于古董，还包括历史、艺术和文学。他耐心、细致，并有着根深蒂固的诚信，这源于他对保存和揭示历史的真诚渴望。
- en: 'Murder Connection:'
  id: totrans-1789
  prefs: []
  type: TYPE_NORMAL
  zh: 谋杀联系：
- en: The mysterious figure after the clock becomes desperate, leading to a murder
    that seemingly has ties to the estate from which the clock originated. Harold,
    with his connection to the clock and its secrets, becomes an unwitting yet crucial
    player in unraveling the mystery. His ability to communicate with the past through
    the antiques becomes key in uncovering the identity of the murderer and their
    motives, linking present and past in a twisted tale of greed and revenge.
  id: totrans-1790
  prefs: []
  type: TYPE_NORMAL
  zh: 钟表之后的神秘人物变得绝望，导致了一起看似与钟表起源地的庄园有关的谋杀案。哈罗德，由于他与钟表及其秘密的联系，在解开这个谜团的过程中成为了一个无意中但至关重要的参与者。他通过古董与过去沟通的能力，在揭露凶手的身份和动机方面变得至关重要，将现在与过去联系在一起，讲述了一个充满贪婪和复仇的扭曲故事。
- en: 'Ideas for Subplots with This Character:'
  id: totrans-1791
  prefs: []
  type: TYPE_NORMAL
  zh: 与此角色相关的副情节想法：
- en: 'The Whispering Gallery: Harold''s shop becomes the scene of a series of break-ins,
    with the thieves leaving cryptic messages related to historical events. This subplot
    delves into Harold''s past and his connection to the antiques, revealing secrets
    about his family''s history.'
  id: totrans-1792
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 吟游者画廊：哈罗德的商店成为一系列盗窃事件的现场，窃贼们留下了与历史事件相关的神秘信息。这个副情节深入哈罗德的过去以及他与古董的联系，揭示了他家族历史的秘密。
- en: 'A Forgotten Manuscript: Among the antiques, Harold discovers an unpublished
    manuscript by a famous author. As he investigates its provenance, he uncovers
    a literary mystery tied to a historical scandal, drawing him into the world of
    literary forgery and deceit.'
  id: totrans-1793
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 被遗忘的手稿：在古董中，哈罗德发现了一位著名作者的一篇未发表的手稿。随着他调查其来源，他发现了一个与历史丑闻相关的文学谜团，将他带入文学伪造和欺骗的世界。
- en: 'The Silent Partner: Harold reluctantly partners with a charismatic but secretive
    private detective when an artifact from his shop is linked to a cold case. This
    partnership challenges his preference for solitude, and together, they uncover
    a network of crime rooted in historical artifacts.'
  id: totrans-1794
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 沉默的伙伴：当哈罗德商店的一个文物与一个冷案联系起来时，他勉强与一个魅力四射但神秘的私人侦探合作。这种合作关系挑战了他对孤独的偏好，他们一起揭露了一个根植于历史文物的犯罪网络。
- en: 'Legacy of the Lost Locket: Harold receives a locket that, once belonging to
    a queen, supposedly curses its holder until returned to its rightful heir. As
    accidents and misfortunes begin to plague him and those around him, Harold must
    trace the locket''s lineage to break the curse.'
  id: totrans-1795
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 失落的项链的遗产：哈罗德收到了一个曾经属于女王的项链，据说直到归还给合法继承人之前，它都会诅咒持有者。随着意外和不幸开始困扰他和他周围的人，哈罗德必须追溯项链的世系来破解诅咒。
- en: 'The Echoes of War: A collection of items from World War II reveals a spy''s
    identity and an unsent message with information that could change historical records.
    Harold''s efforts to decode and deliver the message attract the interest of modern-day
    secret service organizations, entangling him in a contemporary political intrigue.'
  id: totrans-1796
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 战争的回声：二战时期的一批物品揭示了一个间谍的身份和一封可能改变历史记录的未发送信息。哈罗德解码和传递信息的努力引起了现代秘密服务机构的兴趣，使他陷入当代政治阴谋之中。
- en: Harold Jasper Finchley's deep connection to the past through the antiques he
    cherishes brings a unique dimension to cozy murder mysteries, blending history
    with intrigue and creating a rich tapestry of narratives that span centuries.
  id: totrans-1797
  prefs: []
  type: TYPE_NORMAL
  zh: 哈罗德·贾斯珀·芬奇利的古董收藏与过去的深厚联系为温馨谋杀谜案增添了独特的维度，将历史与阴谋融合，创造了一个跨越几个世纪的丰富叙事。
- en: This is great! That level of description creates a mental image of what Harold
    looks like and his mannerisms.
  id: totrans-1798
  prefs: []
  type: TYPE_NORMAL
  zh: 这太棒了！这种描述程度创造了一个关于哈罗德外貌和举止的心理图像。
- en: Although I wouldn’t say I like Harold and will use Jasper Finchley. Finchley’s
    Antiques will become one of the main settings in the series.
  id: totrans-1799
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我不会说我喜欢哈罗德，但我会使用贾斯珀·芬奇利。芬奇利的古董将成为系列中的一个主要场景。
- en: We also have six ideas for mystery plots for this character.
  id: totrans-1800
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也为这个角色准备了六个神秘情节的想法。
- en: 'I now have two senior sidekick characters: a telepathic quilter, Frances Wentworth,
    and a quiet antique whisperer, Jasper Finchley.'
  id: totrans-1801
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在有两个高级配角角色：一个心灵感应的缝纫女，弗朗西斯·温特沃斯，和一个安静的古董低语者，贾斯珀·芬奇利。
- en: Next Steps
  id: totrans-1802
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下一步
- en: As you write the text of your book, the sidekick characters will develop more
    individual personalities, so use these responses as a starting point to spark
    ideas for your writing.
  id: totrans-1803
  prefs: []
  type: TYPE_NORMAL
  zh: 当你撰写你的书籍文本时，配角角色将发展出更多个性化的性格，因此将这些回应作为写作灵感的起点。
- en: You can go back and fine-tune the details as the characters develop as they
    banter with the sleuth and other characters, revealing more of their backstory.
  id: totrans-1804
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以随着角色在与侦探和其他角色的对话中发展，调整细节，揭示更多他们的背景故事。
- en: One thing to consider is series potential. The sidekick should be able to sustain
    a significant subplot in this book or your next book in the series.
  id: totrans-1805
  prefs: []
  type: TYPE_NORMAL
  zh: 需要考虑的一点是系列潜力。配角应该能够在本书或系列中的下一本书中维持一个重要的副情节。
- en: 'PART SEVEN: CONTINUITY CHARACTERS'
  id: totrans-1806
  prefs: []
  type: TYPE_NORMAL
  zh: '**第七部分：连续性角色**'
- en: ''
  id: totrans-1807
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: CONTINUITY SECONDARY CHARACTERS
  id: totrans-1808
  prefs: []
  type: TYPE_NORMAL
  zh: '**连续性次要角色**'
- en: Continuity secondary characters are those recurring characters who inhabit your
    story world and interact with the sleuth but don’t necessarily have speaking parts
    or major roles to play in every book in the series.
  id: totrans-1809
  prefs: []
  type: TYPE_NORMAL
  zh: 连续性次要角色是那些居住在你的故事世界中并与侦探互动但不必在系列中的每一本书中都拥有说话部分或主要角色的重复角色。
- en: You can use ChatGPT to create a vibrant community of recurring supportive characters
    (shopkeepers, neighbors, suspects, opponents) that live in the storyworld of your
    mystery.
  id: totrans-1810
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用ChatGPT创建一个充满活力的社区，其中包括反复出现的支持性角色（店主、邻居、嫌疑人、对手），他们生活在您的悬疑故事世界中。
- en: Give them distinct personalities and quirks that contribute to the setting and
    provide potential suspects or allies.
  id: totrans-1811
  prefs: []
  type: TYPE_NORMAL
  zh: 给他们赋予独特的个性和怪癖，这些个性和怪癖有助于塑造环境，并提供潜在的嫌疑人或盟友。
- en: Consider their involvement in the series arc: Will they offer clues, keep secrets, or
    become embroiled in future mysteries?
  id: totrans-1812
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑他们在系列情节中的作用：他们会提供线索、保守秘密，还是陷入未来的谜团中？
- en: '![](image_rsrc44N.jpg)'
  id: totrans-1813
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44N.jpg)'
- en: Can you give me a list of the types of secondary characters who are important
    when writing cozy mystery fiction?
  id: totrans-1814
  prefs: []
  type: TYPE_NORMAL
  zh: 你能给我一个列表，列出在写温馨悬疑小说时重要的次要角色类型吗？
- en: '![](image_rsrc44P.jpg)'
  id: totrans-1815
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44P.jpg)'
- en: 'In cozy mystery fiction, secondary characters play crucial roles in creating
    an engaging, dynamic world around the main sleuth. They not only add depth and
    color to the story but also serve various functions such as providing clues, red
    herrings, emotional support, or comic relief. Here''s a list of the types of secondary
    characters important in cozy mystery fiction:'
  id: totrans-1816
  prefs: []
  type: TYPE_NORMAL
  zh: 在温馨悬疑小说中，次要角色在创造围绕主要侦探的引人入胜、动态的世界中扮演着关键角色。他们不仅为故事增添了深度和色彩，还发挥着各种功能，如提供线索、误导信息、情感支持或喜剧缓解。以下是温馨悬疑小说中重要的次要角色类型的列表：
- en: '1\. The Confidant: A close friend or relative of the sleuth who provides emotional
    support, a sounding board for theories, or a voice of reason. This character often
    helps the protagonist process clues and their implications.'
  id: totrans-1817
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 密友：侦探的亲密朋友或亲戚，提供情感支持，为理论提供回声板，或成为理性的声音。这个角色经常帮助主角处理线索及其含义。
- en: '2\. The Gossip: A character who knows everyone''s business and is a valuable
    source of information, rumors, and town dynamics. They can inadvertently provide
    crucial clues or red herrings.'
  id: totrans-1818
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 小道消息：一个了解每个人业务的角色，是信息、谣言和城镇动态的有价值来源。他们可能会无意中提供关键线索或误导信息。
- en: '3\. The Authority Figure: This can be a local police officer, detective, or
    other law enforcement official who officially handles the investigation. They
    can either be a help or a hindrance to the sleuth.'
  id: totrans-1819
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 权威人物：这可以是一个当地警察、侦探或其他执法官员，他们正式处理调查。他们可以是侦探的帮助者或阻碍者。
- en: '4\. The Rival: Someone who challenges the sleuth, either in the investigation
    or in personal life. This character adds conflict and can drive the protagonist
    to work harder to solve the mystery.'
  id: totrans-1820
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 对手：在调查或个人生活中挑战侦探的人。这个角色增加了冲突，可以推动主角更加努力地解决谜团。
- en: '5\. The Expert: A character with specialized knowledge relevant to the mystery
    (like a historian, scientist, or tech expert). They provide essential insights
    or information that the sleuth might not have.'
  id: totrans-1821
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 专家：一个与悬疑相关的专业知识的角色（如历史学家、科学家或技术专家）。他们提供侦探可能没有的必要见解或信息。
- en: '6\. The Witness: An individual who has seen or knows something crucial but
    may not realize its importance. They can be a source of vital clues or misdirection.'
  id: totrans-1822
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 目击者：一个看到或知道一些关键信息但可能没有意识到其重要性的个人。他们可以是提供关键线索或误导信息的来源。
- en: '7\. The Victim''s Circle: Characters connected to the victim, including family,
    friends, and colleagues. They offer a range of emotions and motives, adding depth
    to the victim’s character and the overall mystery.'
  id: totrans-1823
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 受害者圈子：与受害者有关的角色，包括家人、朋友和同事。他们提供了各种情感和动机，为受害者的性格和整个谜团增添了深度。
- en: '8\. The Comic Relief: A character who provides humor, lightening the mood of
    the story. This could be a quirky local, a bumbling assistant, or a witty friend.'
  id: totrans-1824
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 搞笑角色：一个提供幽默，使故事氛围轻松的角色。这可能是一个古怪的地方居民，一个笨拙的助手，或者一个机智的朋友。
- en: '9\. The Antagonist or Villain: Not necessarily the murderer, but someone who
    obstructs the investigation or has a grudge against the sleuth or victim. They
    add tension and suspense.'
  id: totrans-1825
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 对手或反派：不一定是凶手，但可能阻碍调查或对侦探或受害者怀有怨恨的人。他们增加了紧张和悬念。
- en: '10\. The Community Pillar: A well-respected figure in the community who everyone
    knows. This character can offer a broad perspective on the town and its residents.'
  id: totrans-1826
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 社区支柱：社区中备受尊敬的人物，每个人都认识。这个角色可以提供对城镇及其居民的广泛视角。
- en: '11\. The Outsider: A character new to the town or community, offering a fresh
    perspective or new dynamics. They can also serve as a suspect due to their unfamiliarity.'
  id: totrans-1827
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 外来者：一个新到城镇或社区的角色，提供新的视角或新的动态。他们也可以因为不熟悉而成为嫌疑人。
- en: '12\. The Local Business Owner: They provide a gathering spot for characters
    (like a café, bookstore, or pub owner) and are often well-connected with community
    happenings.'
  id: totrans-1828
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 当地商人：他们为角色提供了一个聚会地点（如咖啡馆、书店或酒吧老板），并且通常与社区活动联系紧密。
- en: These characters help to create a rich and believable world in which the mystery
    unfolds, and they interact with the main characters in ways that propel the plot,
    add complexity, and enrich the reader's experience.
  id: totrans-1829
  prefs: []
  type: TYPE_NORMAL
  zh: 这些角色有助于创造一个丰富且可信的世界，其中谜案展开，并且他们以推动情节、增加复杂性和丰富读者体验的方式与主要角色互动。
- en: There is plenty of scope in this list for any number of secondary characters.
  id: totrans-1830
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个名单上有很多空间，可以容纳许多次要角色。
- en: If you need more options or a specific example linked to your story niche, ask
    ChatGPT for some options!
  id: totrans-1831
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要更多选项或与你的故事领域相关的特定示例，请向ChatGPT询问一些选项！
- en: Some secondary characters will become “continuity characters” that readers want
    to meet in other books.
  id: totrans-1832
  prefs: []
  type: TYPE_NORMAL
  zh: 一些次要角色将成为读者希望在其他书籍中遇到的“连续性角色”。
- en: What Is A Continuity Character In Cozy Mystery Fiction?
  id: totrans-1833
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 轻松悬疑小说中的“连续性角色”是什么？
- en: In cozy mystery fiction, a "continuity character" is a character who consistently
    appears throughout a series, providing readers with stability and familiarity.
    Unlike the main characters or the varying cast of suspects, victims, and sidekicks
    that change from book to book, continuity characters are a constant element.
  id: totrans-1834
  prefs: []
  type: TYPE_NORMAL
  zh: 在轻松悬疑小说中，“连续性角色”是指在整个系列中持续出现的角色，为读者提供稳定性和熟悉感。与从一本书到另一本书变化的主角色或不断变化的嫌疑人、受害者和小跟班不同，连续性角色是一个恒定的元素。
- en: They help anchor the series, often serving as a touchstone for the main characters
    and readers. Their presence creates a familiar environment, making readers feel
    like they are revisiting an old friend or a beloved place with each new book.
  id: totrans-1835
  prefs: []
  type: TYPE_NORMAL
  zh: 他们有助于锚定系列，通常作为主要角色和读者的试金石。他们的存在创造了一个熟悉的环境，使读者感觉像是在每次新书出版时重访一位老朋友或一个心爱的地点。
- en: 'Characteristics of continuity characters in cozy mysteries include:'
  id: totrans-1836
  prefs: []
  type: TYPE_NORMAL
  zh: 轻松悬疑小说中连续性角色的特点包括：
- en: '1\. Consistent Presence: They appear in almost every book in the series, regardless
    of the central plot or setting changes.'
  id: totrans-1837
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 一致的存在：他们几乎出现在系列中的每一本书中，无论中心情节或背景变化如何。
- en: '2\. Familiar Role: Their role remains essentially the same throughout the series.
    They may be a family member, a close friend, a colleague, or a beloved pet.'
  id: totrans-1838
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 熟悉的角色：他们的角色在整个系列中保持基本相同。他们可能是一个家庭成员、一个亲密的朋友、一个同事或一个心爱的宠物。
- en: '3\. Relationship with the Protagonist: They often have a well-defined relationship
    with the main character, providing emotional support, humor, or a sounding board
    for ideas.'
  id: totrans-1839
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 与主角的关系：他们通常与主要角色有明确的关系，提供情感支持、幽默或想法的回声板。
- en: '4\. Limited Development: While they may experience some growth or change, continuity
    characters often remain relatively static regarding their personality and role.
    This consistency is key to their function in the series.'
  id: totrans-1840
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 有限的发展：虽然他们可能会经历一些成长或变化，但连续性角色在性格和角色方面通常保持相对稳定。这种一致性是他们系列中功能的关键。
- en: '5\. Contribution to Atmosphere: They contribute significantly to the overall
    atmosphere and setting of the series, reinforcing the cozy, intimate feel that
    is a hallmark of the genre.'
  id: totrans-1841
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 对氛围的贡献：他们对整个系列的氛围和背景做出了重大贡献，加强了该类型标志性的轻松、亲密感。
- en: '6\. Less Involvement in Central Mystery: Unlike the main characters or the
    specific sidekicks of each book, continuity characters are generally less involved
    in the central mystery. They might offer assistance or insights but are usually
    not key players in solving the case.'
  id: totrans-1842
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 在中心谜案中的参与度较低：与主要角色或每本书的具体小跟班不同，连续性角色通常在中心谜案中的参与度较低。他们可能会提供帮助或洞察力，但通常不是解决案件的关键人物。
- en: In essence, continuity characters in cozy mystery fiction serve as a familiar
    and comforting element that helps maintain a sense of continuity and community
    within the series, enhancing the reader's overall experience.
  id: totrans-1843
  prefs: []
  type: TYPE_NORMAL
  zh: 在本质上，轻松悬疑小说中的连续性角色扮演着一种熟悉和安慰的元素，有助于在系列中维持连续性和社区感，从而增强读者的整体体验。
- en: Continuity characters in cozy mysteries range widely, from the local police
    officers to residents and shopkeepers who live in the community to journalists
    and family members.
  id: totrans-1844
  prefs: []
  type: TYPE_NORMAL
  zh: 在温馨悬疑小说中，连续性角色范围广泛，从当地警察到居住在社区中的居民和店主，再到记者和家庭成员。
- en: They may have some dialogue and can be sources of information and support to
    the sleuth or sources of conflict. But they are in the background of your story
    and every other book in the series if you are planning one.
  id: totrans-1845
  prefs: []
  type: TYPE_NORMAL
  zh: 他们可能有对话，可以是侦探的信息和支持来源，或者冲突的来源。但如果你计划写一个系列，他们将是故事和系列中其他书籍的背景人物。
- en: Some secondary characters may have their own story at some point, but right
    now, we are introducing them to the story as part of the cast list.
  id: totrans-1846
  prefs: []
  type: TYPE_NORMAL
  zh: 一些次要角色可能在某个时刻有自己的故事，但现在是时候将他们作为阵容列表的一部分介绍到故事中。
- en: DEVELOPING CONTINUITY CHARACTERS ACROSS THE SERIES
  id: totrans-1847
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在整个系列中发展连续性角色
- en: 'Recurring Characters: Building a Community That Grows and Changes Throughout
    the Series'
  id: totrans-1848
  prefs: []
  type: TYPE_NORMAL
  zh: 重复出现角色：构建在整个系列中成长和变化的社区
- en: These characters become part of the cast to your readers, who look forward to
    revisiting them in each story.
  id: totrans-1849
  prefs: []
  type: TYPE_NORMAL
  zh: 这些角色成为读者阵容的一部分，读者期待在每个故事中再次见到他们。
- en: The Role of Recurring Characters
  id: totrans-1850
  prefs: []
  type: TYPE_NORMAL
  zh: 重复出现角色的作用
- en: Beyond the sleuth and the key sidekicks, continuity secondary characters provide
    depth, conflict, humor, and a sense of stability that ties individual books together
    into a cohesive whole.
  id: totrans-1851
  prefs: []
  type: TYPE_NORMAL
  zh: 除了侦探和主要副手之外，连续性次要角色提供了深度、冲突、幽默和一种稳定性，将个别书籍联系成一个统一的整体。
- en: These characters should have some form of relationship with the sleuth and can
    be allies, provide opposition and conflict, or be neutral local citizens in this
    setting.
  id: totrans-1852
  prefs: []
  type: TYPE_NORMAL
  zh: 这些角色应该与侦探有某种形式的关系，可以是盟友，提供反对和冲突，或者在这个背景中是中立的当地居民。
- en: Creating Compelling Subplots
  id: totrans-1853
  prefs: []
  type: TYPE_NORMAL
  zh: 创造引人入胜的副线故事
- en: Giving secondary characters their subplots is a key strategy in developing their
    arcs. These subplots can be personal dilemmas, romantic entanglements, professional
    challenges, or minor mysteries that parallel or intersect with the main plot.
  id: totrans-1854
  prefs: []
  type: TYPE_NORMAL
  zh: 给予次要角色副线故事是发展他们弧线的关键策略。这些副线故事可以是个人困境、浪漫纠葛、职业挑战，或者与主线情节平行或交叉的次要谜团。
- en: Developing these characters and giving them their own subplots not only enhances
    the complexity of the series but also reflects life in real-life communities,
    where everyone has their own story unfolding alongside the central murder mystery
    plot. It helps to make the setting feel genuine and authentic.
  id: totrans-1855
  prefs: []
  type: TYPE_NORMAL
  zh: 发展这些角色并赋予他们自己的副线故事不仅增强了系列的复杂性，而且反映了现实生活中社区的生活，每个人都在中央谋杀谜团情节的同时展开自己的故事。这有助于使背景显得真实和可信。
- en: As readers grow attached to these characters, their interest in the series extends
    beyond the mysteries to include the well-being and development of the community
    members.
  id: totrans-1856
  prefs: []
  type: TYPE_NORMAL
  zh: 随着读者对这些角色的喜爱加深，他们对系列的兴趣也超越了神秘事件，包括社区成员的福祉和发展。
- en: Let’s use the case study example to generate potential secondary characters
    for this mystery. I will limit it to 10 responses to save space, but you could
    ask for 50 to create innovative ideas.
  id: totrans-1857
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用案例研究示例来生成这个谜团的潜在次要角色。我将限制为10个回应以节省空间，但你也可以要求50个以创造创新的想法。
- en: '![](image_rsrc44R.jpg)'
  id: totrans-1858
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44R.jpg)'
- en: 'I’d like to create a commercial cozy murder mystery novel set in a small coastal
    town with three sleuths, two of whom are seniors, and you are going to help me
    figure this out. The main sleuth is a chef called Laura Marsh who is on holiday
    in Polperran and staying with her aunt, Sera Marsh. Plot: When a famous psychic
    medium is murdered at a local psychic fair, followed by the death of an antique
    dealer specializing in occult objects, Laura and her aunt use their unique skills
    to unravel the mystery. The famous psychic medium was found murdered at the yarn
    store studio run as a meeting place by Laura’s aunt. The killer used special antique
    poisoned knitting needles as their weapon, supplied by a local antique dealer.
    When Laura touched the body to see if he was okay, in his final moment, he passed
    his psychic abilities over to Laura. Her aunt Sera and her close friends, a telepathic
    quilter, Frances Wentworth and a quiet antique whisperer, Jasper Finchley, are
    actually a group of highly trained paranormal investigators, and the murdered
    guest was bringing new information about a case, on his way to the psychic fair.
    When Laura''s aunt Sera is implicated in the murder of a rival psychic and a dealer
    who was trying to expose them, Laura must clear her aunt''s name. Laura’s mother
    did not approve of the fact that her husband’s brother, Laura’s late uncle, had
    married an eccentric woman who claimed to be a psychic. It was a family secret
    and comes as quite a shock to Laura when she is gifted these new abilities. Laura
    is going to rely on her aunt to help her to adapt to these bewildering new abilities.
    But she holds the key to finding out who murdered the victim. I want to create
    a fun and witty bestselling mystery that will appeal to cozy murder mystery readers.
    Please give me a list of 10 secondary characters for my historic coastal town
    of Polperran.'
  id: totrans-1859
  prefs: []
  type: TYPE_NORMAL
  zh: 我想创作一部以小型沿海小镇为背景的商业温馨谋杀谜案小说，其中有三名侦探，其中两名是老年人，你将帮助我解决这个问题。主要的侦探是一位名叫劳拉·马什的厨师，她在波尔珀兰度假，住在她的阿姨Sera
    Marsh那里。情节：当一位著名的灵媒在当地的灵媒集市上被谋杀，紧接着是一位专门经营占卜物品的古董商死亡，劳拉和她的阿姨利用她们独特的技能解开这个谜团。著名的灵媒在劳拉阿姨经营的作为聚会场所的毛线店工作室被发现被谋杀。凶手使用了特殊的古董毒针作为武器，这些针是由当地古董商提供的。当劳拉触摸尸体以查看他是否还好时，他在最后的时刻将自己的灵能力传给了劳拉。劳拉阿姨Sera及其亲密的朋友，一位心灵感应的缝纫师弗朗西斯·温莎和一位安静的古董低语者贾斯珀·芬奇利，实际上是一群受过高度训练的超自然调查员，而被谋杀的客人正在前往灵媒集市途中带来关于一个案件的新信息。当劳拉阿姨Sera被卷入谋杀一位竞争对手灵媒和一个试图揭露他们的古董商时，劳拉必须澄清她阿姨的名誉。劳拉的母亲并不赞成她丈夫的兄弟，劳拉的已故叔叔，与一位声称自己是灵媒的古怪女人结婚的事实。这是一个家庭秘密，当劳拉被赋予这些新能力时，这对她来说是个相当大的震惊。劳拉将依靠她阿姨的帮助来适应这些令人困惑的新能力。但她掌握着找出谁谋杀受害者的关键。我想创作一部有趣且机智的畅销悬疑小说，它将吸引温馨谋杀谜案读者。请为我历史悠久的波尔珀兰沿海小镇列出10位次要角色。
- en: '![](image_rsrc44S.jpg)'
  id: totrans-1860
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44S.jpg)'
- en: 'In the charming, history-rich coastal town of Polperran, a colorful cast of
    secondary characters adds depth, intrigue, and humor to the cozy murder mystery
    surrounding Laura Marsh and her extraordinary circle. Here are ten secondary characters
    to populate this scenic setting:'
  id: totrans-1861
  prefs: []
  type: TYPE_NORMAL
  zh: 在迷人的、历史丰富的波尔珀兰沿海小镇，一群丰富多彩的次要角色为劳拉·马什及其非凡圈子周围的温馨谋杀谜案增添了深度、神秘和幽默。以下是十位次要角色，以充实这个风景如画的环境：
- en: Captain Elias "Eli" Travers - The retired sea captain who runs a local maritime
    museum. Known for his salty tales and deep knowledge of Polperran's seafaring
    history, Captain Eli occasionally assists Laura and her team with insights into
    the town's past, especially relating to maritime artifacts and lore.
  id: totrans-1862
  prefs: []
  type: TYPE_NORMAL
  zh: 艾利阿斯“艾利”·特拉弗斯船长 - 一位退休的海上船长，经营着当地的一个海事博物馆。以他的咸腥故事和对波尔珀兰航海历史的深入了解而闻名，船长艾利偶尔会协助劳拉及其团队，为他们提供关于城镇过去的见解，特别是与航海文物和传说相关的内容。
- en: Milly Thompson - The owner of the "Seashell Café," a favorite local spot for
    residents and tourists alike. Milly's café is known for its nautical-themed décor
    and secret family recipes. She is a treasure trove of town gossip and unwittingly
    provides Laura with crucial clues.
  id: totrans-1863
  prefs: []
  type: TYPE_NORMAL
  zh: Milly Thompson - “贝壳咖啡馆”的老板，这家咖啡馆是居民和游客都喜欢的当地热门地点。Milly的咖啡馆以其航海主题的装饰和家族的秘密食谱而闻名。她是一个城镇八卦的宝库，并且无意中为劳拉提供了关键的线索。
- en: Simon Fairweather - The young and ambitious town mayor, eager to put Polperran
    on the map as a tourist destination. His initiatives often clash with the town's
    traditionalists, creating a backdrop of local politics that intertwines with the
    murder mystery.
  id: totrans-1864
  prefs: []
  type: TYPE_NORMAL
  zh: Simon Fairweather - 年轻且雄心勃勃的镇市长，渴望将波尔珀兰打造成一个旅游目的地。他的倡议经常与传统主义者发生冲突，为谋杀谜团提供了一个背景，将当地政治与谋杀案交织在一起。
- en: Dr. Rowena Hart - The town's veterinarian who has a soft spot for injured wildlife.
    Dr. Hart's practice often brings her into contact with various townsfolk, making
    her a valuable ally for Laura and her team in gathering information from the town's
    pet owners.
  id: totrans-1865
  prefs: []
  type: TYPE_NORMAL
  zh: Dr. Rowena Hart - 镇上的兽医，对受伤的野生动物有着特别的同情。Hart 医生的诊所经常让她与各种镇民接触，使她成为劳拉及其团队在收集镇上宠物主人的信息时的宝贵盟友。
- en: Beatrice "Bea" Hallowell - A reclusive author who writes under a pseudonym and
    lives in a picturesque, if slightly rundown, cottage on the outskirts of Polperran.
    Bea's knowledge of folklore and the occult provides key insights into the mystery.
  id: totrans-1866
  prefs: []
  type: TYPE_NORMAL
  zh: Beatrice "Bea" Hallowell - 一个隐居的作家，她使用笔名写作，并住在波尔珀兰郊外一个风景如画、但略显破旧的农舍里。Bea 对民间传说和占卜的知识为这个谜团提供了关键洞见。
- en: Derek Sands - The charismatic and slightly unscrupulous owner of the "Mystic
    Emporium," a shop that specializes in New Age and occult paraphernalia. Derek's
    connections to the psychic and antique dealing community make him both a suspect
    and a source of information.
  id: totrans-1867
  prefs: []
  type: TYPE_NORMAL
  zh: Derek Sands - "神秘商店" "Mystic Emporium" 的魅力四射且略带不拘小节的店主，这家商店专门经营新时代和占卜用品。Derek
    与灵媒和古董交易界的联系使他既成为嫌疑人，也成为信息的来源。
- en: Agnes Prewitt - The stern and meticulous librarian at the Polperran Public Library.
    Her dedication to preserving the town's history and her eidetic memory make her
    an invaluable resource for Laura's investigations.
  id: totrans-1868
  prefs: []
  type: TYPE_NORMAL
  zh: Agnes Prewitt - 波尔珀兰公共图书馆的严厉且细致的图书管理员。她对保存镇上历史的奉献精神以及她的超常记忆力使她成为劳拉调查的无价资源。
- en: Charlie Brooks - The friendly and outgoing local baker, known for his early
    morning deliveries and his penchant for eavesdropping. Charlie's gossip network
    is second to none, and his sweet treats keep the town's spirits up.
  id: totrans-1869
  prefs: []
  type: TYPE_NORMAL
  zh: Charlie Brooks - 友好且外向的当地面包师，以其清晨的送货和偷听癖闻名。Charlie 的八卦网络无与伦比，他的甜蜜点心让镇上的气氛活跃起来。
- en: Tilda Greene - The manager of the local bed and breakfast, "The Saltwind Inn."
    Tilda is a newcomer trying to fit into Polperran's close-knit community. Her outsider's
    perspective and keen observation skills uncover clues that the locals might overlook.
  id: totrans-1870
  prefs: []
  type: TYPE_NORMAL
  zh: Tilda Greene - 当地民宿 "盐风客栈" 的经理。Tilda 是一个新来者，试图融入波尔珀兰紧密团结的社区。她作为局外人的视角和敏锐的观察力揭示了当地人可能忽略的线索。
- en: Inspector Nathanial "Nate" Ford - The pragmatic and dedicated detective assigned
    to the murder cases. Initially skeptical of Laura's psychic abilities and the
    paranormal aspect of the investigation, he gradually becomes an ally, respecting
    her insights and determination to solve the case.
  id: totrans-1871
  prefs: []
  type: TYPE_NORMAL
  zh: Inspector Nathanial "Nate" Ford - 被分配到谋杀案的调查的务实且专注的侦探。起初对劳拉的灵媒能力和调查中的超自然方面持怀疑态度，但他逐渐成为盟友，尊重她的洞察力和解决案件的决心。
- en: These characters, with their unique backgrounds and connections to the town
    of Polperran, will provide a rich tapestry of allies, suspects, and informants,
    enriching the mystery and adding layers of complexity to Laura Marsh's investigation.
  id: totrans-1872
  prefs: []
  type: TYPE_NORMAL
  zh: 这些角色，凭借他们独特的背景和与波尔珀兰镇的联系，将为故事提供丰富的背景，包括盟友、嫌疑人和信息提供者，丰富谜团并为劳拉·马什的调查增添复杂性。
- en: I could easily use any of these suggestions to create characters for my novel
    who provide information to my three sleuths.
  id: totrans-1873
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以轻易地使用这些建议来为我的小说创造角色，这些角色可以为我的三位侦探提供信息。
- en: I particularly like Inspector Nathanial "Nate" Ford, the local police officer;
    Milly Thompson, the owner of the Seashell Café; Simon Fairweather, the young and
    ambitious town mayor; and Derek Sands, the charismatic and unscrupulous owner
    of the Mystic Emporium, a shop that specializes in New Age and occult paraphernalia.
  id: totrans-1874
  prefs: []
  type: TYPE_NORMAL
  zh: 我特别喜欢当地警官 Nathanial "Nate" Ford、Seashell 餐馆的老板 Milly Thompson、年轻的雄心勃勃的镇市长 Simon
    Fairweather 以及神秘商店 "Mystic Emporium" 的魅力四射且不拘小节的店主 Derek Sands。
- en: You may prefer Agnes Prewitt - The stern and meticulous librarian at the Polperran
    Public Library. Or have your own ideas!
  id: totrans-1875
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能更喜欢 Agnes Prewitt - 波尔珀兰公共图书馆的严厉且细致的图书管理员。或者你有自己的想法！
- en: '![](image_rsrc44T.jpg)'
  id: totrans-1876
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc44T.jpg)'
- en: Tell me more about the character of Inspector Nathanial "Nate" Ford - The pragmatic
    and dedicated detective assigned to the murder cases. Initially skeptical of Laura's
    psychic abilities and the paranormal aspect of the investigation, he gradually
    becomes an ally, respecting her insights and determination to solve the case.
  id: totrans-1877
  prefs: []
  type: TYPE_NORMAL
  zh: 请告诉我更多关于内森尼尔·“内特”·福特警长的角色信息——这位务实且专注的侦探被分配到谋杀案。最初他对劳拉的通灵能力和调查中的超自然方面持怀疑态度，但逐渐成为盟友，尊重她的洞察力和解决案件的决心。
- en: I need you to create a character profile for Nathanial and plan a complete character
    arc over a five-book series.
  id: totrans-1878
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要你为内森尼尔创建一个角色档案，并规划一个五本书的完整角色发展轨迹。
- en: This profile should include a full name, physical description, background, current
    crisis, personality, murder connection, and subplot ideas with this character
    over a five-book series.
  id: totrans-1879
  prefs: []
  type: TYPE_NORMAL
  zh: 这个档案应包括全名、外貌描述、背景、当前危机、性格、谋杀联系以及五本书系列中的副线想法。
- en: '![](image_rsrc44U.jpg)'
  id: totrans-1880
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc44U.jpg](image_rsrc44U.jpg)'
- en: 'Full Name:'
  id: totrans-1881
  prefs: []
  type: TYPE_NORMAL
  zh: 全名：
- en: Inspector Nathanial "Nate" Ford
  id: totrans-1882
  prefs: []
  type: TYPE_NORMAL
  zh: 内森尼尔·“内特”·福特警长
- en: 'Physical Description:'
  id: totrans-1883
  prefs: []
  type: TYPE_NORMAL
  zh: 外貌描述：
- en: Nate is in his late thirties, standing at a height of 6'1" with a lean, athletic
    build that speaks to a disciplined fitness regimen. He has closely cropped dark
    hair, sharp hazel eyes that miss little, and a demeanor that oscillates between
    intensely focused and disarmingly charming. His usual attire consists of smart,
    functional clothing, often seen in a well-fitted suit that adds an air of authority
    to his presence, though he's equally comfortable in more casual wear when the
    situation calls for it.
  id: totrans-1884
  prefs: []
  type: TYPE_NORMAL
  zh: 内特年近四十，身高6英尺1英寸，体态苗条，健美，这表明他有着严格的健身计划。他有着修剪得很短的深色头发，锐利的榛色眼睛几乎不放过任何细节，他的气质在高度专注和令人卸下防备的魅力之间波动。他的日常着装通常是聪明而实用的，经常穿着合身的西装，这给他的出现增添了一丝权威感，尽管在需要时他也同样舒适地穿着休闲装。
- en: 'Background:'
  id: totrans-1885
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：
- en: Nate grew up in a larger city, where he quickly rose through the ranks of the
    police force due to his keen analytical mind and dedication. Seeking a change
    from the fast pace and often impersonal nature of city policing, he transferred
    to Polperran, drawn by its history and the tight-knit community. He views the
    move as a step toward a more meaningful impact in law enforcement, focusing on
    community policing and solving cases that touch the heart of the town.
  id: totrans-1886
  prefs: []
  type: TYPE_NORMAL
  zh: 内特在一个大城市长大，凭借他敏锐的分析能力和奉献精神，他很快在警察队伍中脱颖而出。为了摆脱城市警务快节奏和往往缺乏人情味的性质，他转到了波尔佩兰，被其历史和紧密团结的社区所吸引。他认为这次调动是朝着在执法领域产生更有意义的影响迈出的一步，专注于社区警务和解决触及小镇核心的案件。
- en: 'Current Crisis:'
  id: totrans-1887
  prefs: []
  type: TYPE_NORMAL
  zh: 当前危机：
- en: Upon his arrival in Polperran, Nate is immediately thrown into the deep end
    with a series of murders that challenge his conventional approach to crime-solving.
    He grapples with the local reliance on intuition, folklore, and paranormal insights,
    which clashes with his methodical, evidence-based training. The biggest test to
    his beliefs comes when he's forced to collaborate with Laura and her uniquely
    talented group, pushing him to reconsider his stance on the paranormal as they
    begin to uncover leads that conventional methods miss.
  id: totrans-1888
  prefs: []
  type: TYPE_NORMAL
  zh: 内特抵达波尔佩兰后，立即被一系列挑战他传统犯罪解决方法的谋杀案深深卷入。他与当地对直觉、民间传说和超自然洞察力的依赖作斗争，这与他的基于证据的、有条理的训练相冲突。对他信念的最大考验是在他被迫与劳拉及其独特才能的小组合作时，他们开始发现传统方法所遗漏的线索，这迫使他重新考虑对超自然的态度。
- en: 'Personality:'
  id: totrans-1889
  prefs: []
  type: TYPE_NORMAL
  zh: 性格：
- en: Nate is pragmatic, dedicated, and highly intelligent, with a strong sense of
    duty and a deep commitment to justice. He values evidence and logic above all
    else, which initially makes him skeptical of Laura's psychic abilities and the
    paranormal investigations led by her aunt and friends. However, he's also fair-minded
    and adaptable, willing to entertain unconventional methods if they prove effective.
    Nate's seriousness about his work is balanced by a dry sense of humor and a warm,
    if somewhat guarded, personal side.
  id: totrans-1890
  prefs: []
  type: TYPE_NORMAL
  zh: 内特务实、专注且极具智慧，有着强烈的责任感和对正义的深厚承诺。他最看重证据和逻辑，这最初使他怀疑劳拉的通灵能力和她阿姨和朋友们进行的超自然调查。然而，他也是公正且适应性强的，如果证明有效，愿意尝试非传统的方法。内特对工作的严肃态度与一种干巴巴的幽默感和温暖但略显谨慎的个人性格相平衡。
- en: 'Murder Connection:'
  id: totrans-1891
  prefs: []
  type: TYPE_NORMAL
  zh: 谋杀联系：
- en: Nate's introduction to Polperran's unique blend of mystery and the paranormal
    comes when he's assigned to investigate the murders connected to Laura's aunt
    and the local psychic fair. His reliance on traditional investigative techniques
    is challenged, leading to tension and eventual collaboration with Laura and her
    team.
  id: totrans-1892
  prefs: []
  type: TYPE_NORMAL
  zh: 内特对波尔珀兰神秘与超自然独特混合的初次接触是在他被分配调查与劳拉阿姨和当地灵媒集市相关的谋杀案时。他对传统调查技术的依赖受到挑战，导致紧张局势，并最终与劳拉及其团队的合作。
- en: 'Character Arc Over Five Book Series:'
  id: totrans-1893
  prefs: []
  type: TYPE_NORMAL
  zh: 五本书系列的角色弧：
- en: 'Book 1: Acceptance - Nate struggles with the unconventional methods of Laura
    and her team but learns to appreciate the value of combining his investigative
    techniques with their paranormal insights, leading to the resolution of the psychic
    medium''s murder. His journey from skepticism to cautious acceptance lays the
    groundwork for his character development.'
  id: totrans-1894
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍 1：接受 - 内特与劳拉及其团队的非传统方法作斗争，但学会了欣赏将他的调查技术与他们的超自然洞察力相结合的价值，这导致了灵媒谋杀案的解决。他从怀疑到谨慎接受的旅程为他的角色发展奠定了基础。
- en: 'Book 2: Integration - With his trust in Laura and her team solidifying, Nate
    begins to integrate their insights more proactively into his investigations. A
    case involving historical artifacts and ghostly apparitions in Polperran tests
    his adaptability and deepens his appreciation for the town''s quirks. Nate''s
    background in city policing provides a critical clue that helps solve the case,
    showcasing the strength of combining different approaches.'
  id: totrans-1895
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍 2：积分 - 随着对劳拉及其团队信任的巩固，内特开始更加主动地将他们的洞察力融入他的调查中。一个涉及波尔珀兰历史遗迹和幽灵现象的案件考验了他的适应性，并加深了他对城镇怪癖的欣赏。内特在城市警察背景中提供的关键线索帮助解决了案件，展示了结合不同方法的优势。
- en: 'Book 3: Challenge - Nate''s belief in the effectiveness of combining conventional
    and paranormal methods is put to the test when a high-profile case draws external
    scrutiny. He must defend his approach while navigating bureaucratic pressure and
    personal doubts, leading to a deeper exploration of his commitment to Polperran
    and its people. Nate''s leadership and innovative problem-solving are highlighted
    as he works to protect Laura and her team from skepticism and interference.'
  id: totrans-1896
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍 3：挑战 - 当一个高调案件吸引外部审查时，内特对结合传统与超自然方法的有效性的信念受到考验。他必须在应对官僚压力和个人疑虑的同时捍卫自己的方法，这导致了对他对波尔珀兰及其人民承诺的更深入探索。内特在努力保护劳拉及其团队免受怀疑和干预时，他的领导力和创新问题解决能力得到了突出。
- en: 'Book 4: Personal Stakes - A case becomes personal for Nate when someone close
    to him becomes a suspect. He must balance his professional duties with his personal
    loyalties, challenging his sense of justice and fairness. This book focuses on
    Nate''s internal conflict and growth, showing his willingness to question his
    own biases and the lengths he''ll go to uncover the truth, further solidifying
    his bond with Laura and her aunt.'
  id: totrans-1897
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍 4：个人利益 - 当他亲近的人成为嫌疑人时，案件对内特来说变得个人化。他必须在职业职责与个人忠诚之间取得平衡，挑战他的正义感和公平感。这本书侧重于内特的内心冲突和成长，显示了他质疑自己偏见并揭露真相的意愿，进一步巩固了他与劳拉及其阿姨的纽带。
- en: 'Book 5: Full Circle - A complex case that ties back to Nate''s first days in
    Polperran brings his arc to a climax, requiring all he''s learned about balancing
    logic with intuition. This final installment tests Nate''s resolve, his relationship
    with Laura and her team, and his place within the Polperran community. Culminating
    in a career-defining moment, Nate fully embraces his role in this unique setting,
    reflecting on how much he''s changed since his arrival.'
  id: totrans-1898
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍 5：回归原点 - 一个与内特在波尔珀兰最初几天相关的复杂案件将他的弧线推向高潮，需要他平衡逻辑与直觉所学到的一切。这部最终作品考验了内特的决心、他与劳拉及其团队的关系，以及他在波尔珀兰社区中的位置。在职业生涯的一个决定性时刻，内特完全接受了他在这个独特环境中的角色，反思自他到来以来所发生的变化。
- en: 'Ideas for Subplots with This Character Over a Five Book Series:'
  id: totrans-1899
  prefs: []
  type: TYPE_NORMAL
  zh: 在五本书系列中，这个角色的副线想法：
- en: 'Romantic Tension: A slow-burning romance develops between Nate and another
    character, adding depth to his personal life and providing a counterbalance to
    his professional challenges.'
  id: totrans-1900
  prefs: []
  type: TYPE_NORMAL
  zh: 浪漫张力：内特与另一个角色之间逐渐发展的浪漫关系，为他的个人生活增添了深度，并为他的职业挑战提供了平衡。
- en: 'Mentorship: Nate takes a young officer under his wing, teaching them the ropes
    while learning from their fresh perspective and enthusiasm for the job.'
  id: totrans-1901
  prefs: []
  type: TYPE_NORMAL
  zh: 导师：内特收养了一位年轻的警官，在教授他们技巧的同时，从他们新鲜的视角和对工作的热情中学习。
- en: 'Family Dynamics: Nate''s family visits Polperran, providing insights into his
    background and how it shapes his views on law and order, and challenging his professional
    identity with personal obligations.'
  id: totrans-1902
  prefs: []
  type: TYPE_NORMAL
  zh: 家庭动态：内特的家庭访问波普兰，为他的背景和其对法律与秩序的看法提供了洞察，同时用个人责任挑战他的职业身份。
- en: 'Community Integration: Nate''s efforts to integrate into Polperran''s community,
    including participation in local traditions and events, which sometimes clash
    humorously with his more serious nature.'
  id: totrans-1903
  prefs: []
  type: TYPE_NORMAL
  zh: 社区融合：内特努力融入波普兰社区，包括参与当地传统和活动，这些活动有时会与他更严肃的性格幽默地冲突。
- en: 'Professional Growth: Nate is offered a promotion or a chance to return to city
    policing, forcing him to evaluate his commitment to Polperran and the unique work
    he''s doing there.'
  id: totrans-1904
  prefs: []
  type: TYPE_NORMAL
  zh: 职业成长：内特被提供晋升或返回城市警察的机会，迫使他评估自己对波普兰和在那里所做独特工作的承诺。
- en: Nathanial "Nate" Ford's journey from skepticism to full acceptance and integration
    into the paranormal aspects of Polperran's mysteries provides a compelling narrative
    thread across the series, illustrating his growth as a character and his deepening
    relationships within the community.
  id: totrans-1905
  prefs: []
  type: TYPE_NORMAL
  zh: 内森尼尔“内特”·福特从怀疑到完全接受并融入波普兰神秘事件的超自然方面，为整个系列提供了一个引人入胜的叙事线索，展示了他的角色成长和与社区关系的加深。
- en: You then repeat this prompt for each of the continuity characters you are interested
    in.
  id: totrans-1906
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你为每个你感兴趣的连续角色重复这个提示。
- en: This type of prompt can generate many ideas quickly, building layers of detail
    about the continuity and other secondary characters you can add to your notes
    for each book in the series.
  id: totrans-1907
  prefs: []
  type: TYPE_NORMAL
  zh: 这种提示可以快速产生许多想法，为每个系列书籍的笔记中添加关于连续性和其他次要角色的细节层次。
- en: 'PART EIGHT: WRITING THE FIRST BOOK'
  id: totrans-1908
  prefs: []
  type: TYPE_NORMAL
  zh: 第八部分：撰写第一本书
- en: Your Story Idea for Book One of the Series
  id: totrans-1909
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 系列第一本书的故事想法。
- en: At this point, you should have a library of notes and ideas for each book in
    the series you plan to write.
  id: totrans-1910
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你应该已经拥有了一个图书馆，里面包含了你计划撰写的系列中每本书的笔记和想法。
- en: 'In particular, you should now know:'
  id: totrans-1911
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其现在你应该知道：
- en: 'Who are your main characters:'
  id: totrans-1912
  prefs: []
  type: TYPE_NORMAL
  zh: 你的主要角色是谁：
- en: The sleuth
  id: totrans-1913
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 神探
- en: The stakes character
  id: totrans-1914
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 风险角色
- en: Sidekick or sidekicks
  id: totrans-1915
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 配角或配角
- en: Recurring and community characters
  id: totrans-1916
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 重复的和社区角色
- en: The setting for the mystery.
  id: totrans-1917
  prefs: []
  type: TYPE_NORMAL
  zh: 神秘事件的背景设定。
- en: Draft ideas for the entire plot arc of the series.
  id: totrans-1918
  prefs: []
  type: TYPE_NORMAL
  zh: 为整个系列剧情发展草拟想法。
- en: A working idea for the character arc of the sleuth for the series.
  id: totrans-1919
  prefs: []
  type: TYPE_NORMAL
  zh: 系列中神探角色弧线的一个工作想法。
- en: WORKED EXAMPLE. A Psychic Crafts Mystery.
  id: totrans-1920
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作示例。灵媒工艺之谜。
- en: The sleuth is Laura Marsh.
  id: totrans-1921
  prefs: []
  type: TYPE_NORMAL
  zh: 神探是劳拉·马什。
- en: The stakes character is Laura’s aunt Seraphina Moonbeam Marsh (Sera).
  id: totrans-1922
  prefs: []
  type: TYPE_NORMAL
  zh: 风险角色是劳拉的阿姨塞拉菲娜·月亮之光·马什（塞拉）。
- en: The two senior sidekick characters are a telepathic quilter, Frances Wentworth,
    and a quiet antiques-whisperer, Jasper Finchley.
  id: totrans-1923
  prefs: []
  type: TYPE_NORMAL
  zh: 两个高级配角角色是一个心灵感应的缝纫师，弗朗西斯·温莎，和一个安静的古董鉴赏家，贾斯珀·芬奇利。
- en: Recurring and community characters include Inspector Nathanial "Nate" Ford,
    the local police officer; Milly Thompson, the owner of the "Seashell Café; Simon
    Fairweather, the young and ambitious town mayor; and Derek Sands, the charismatic
    and unscrupulous owner of the "Mystic Emporium," a shop that specializes in New
    Age and occult paraphernalia.
  id: totrans-1924
  prefs: []
  type: TYPE_NORMAL
  zh: 重复的和社区角色包括警探内森尼尔“内特”·福特，当地警察；米莉·汤普森，“贝壳咖啡馆”的老板；西蒙·费尔韦瑟，年轻有抱负的市长；以及魅力四射且肆无忌惮的“神秘商店”老板德里克·桑德斯，这家商店专门经营新时代和占卜用品。
- en: The setting for the mystery is the historic coastal town of Polperran.
  id: totrans-1925
  prefs: []
  type: TYPE_NORMAL
  zh: 神秘事件的背景设定是历史性的沿海小镇波普兰。
- en: A draft idea for the entire plot arc of the series.
  id: totrans-1926
  prefs: []
  type: TYPE_NORMAL
  zh: 为整个系列剧情发展草拟想法。
- en: The search for mystical artifacts throughout the town drives this series' plot
    arc. Each holds a piece of a larger puzzle that, when assembled, could either
    protect or doom Polperran and its inhabitants.
  id: totrans-1927
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个城镇中寻找神秘文物推动了本系列的剧情发展。每个文物都包含着更大谜题的一部分，当拼凑在一起时，可能会保护或毁灭波普兰及其居民。
- en: A working idea for the character arc of the sleuth for the series.
  id: totrans-1928
  prefs: []
  type: TYPE_NORMAL
  zh: 系列中神探角色弧线的一个工作想法。
- en: Laura's personal journey of self-discovery and empowerment is intertwined with
    her quest to uncover this mystery. As she learns that her family lineage is connected
    to the guardianship of these artifacts, Laura transforms into a confident and
    skilled psychic detective.
  id: totrans-1929
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉的个人自我发现和赋权之旅与她揭开这个谜团的追求交织在一起。当她了解到她的家族血统与这些文物的守护有关时，劳拉变成了一个自信且技艺高超的灵媒侦探。
- en: Along the way, she learns to trust in her own self-worth, finds strength in
    her connections, and embraces her role in the larger destiny of Polperran.
  id: totrans-1930
  prefs: []
  type: TYPE_NORMAL
  zh: 在旅途中，她学会了相信自己，在联系中找到力量，并接受她在波尔佩兰更大命运中的角色。
- en: It’s time to gather everything together and start writing the outline for the
    crucial first book in the series.
  id: totrans-1931
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候收集所有信息并开始为系列中至关重要的第一本书编写大纲了。
- en: This book has a lot to do!
  id: totrans-1932
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书有很多事情要做！
- en: It not only establishes the sleuth and the story world, brings the characters
    together to investigate the first murder mystery in a specific niche, but also
    sets in place the start of both the character arc for the sleuth and the plot
    arc for the series.
  id: totrans-1933
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅确立了侦探和故事世界，将角色聚集在一起调查特定领域的第一个谋杀悬疑故事，还为侦探的角色弧和系列的情节弧奠定了基础。
- en: All of these elements need to be woven into the main storyline for the murder
    mystery, so let’s start by building the plot for the murder investigation specific
    to this first book.
  id: totrans-1934
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些元素都需要编织进谋杀悬疑故事的主线中，因此让我们先为这本书构建一个特定的谋杀调查情节。
- en: The exact process can then be applied to the following books in the series.
  id: totrans-1935
  prefs: []
  type: TYPE_NORMAL
  zh: 确切的流程可以应用于系列中的后续书籍。
- en: '| BUILD A PLOT OUTLINE |'
  id: totrans-1936
  prefs: []
  type: TYPE_TB
  zh: '| 构建情节大纲 |'
- en: '| Who is your first Murder Victim? |'
  id: totrans-1937
  prefs: []
  type: TYPE_TB
  zh: '| 你的第一位谋杀受害者是谁？|'
- en: '| Who are the possible suspects, and why?Character Development and Motivation
    for the Murderer. |'
  id: totrans-1938
  prefs: []
  type: TYPE_TB
  zh: '| 可能的嫌疑人是谁，为什么？凶手角色的发展和动机。|'
- en: '| ChatGPT and Subplots |'
  id: totrans-1939
  prefs: []
  type: TYPE_TB
  zh: '| ChatGPT 和副情节 |'
- en: '| Flesh out the Story Idea with the character profiles, subplots, and settings
    to build a Full plot Synopsis. |'
  id: totrans-1940
  prefs: []
  type: TYPE_TB
  zh: '| 使用角色档案、副情节和场景来充实故事想法，构建完整的情节概要。|'
- en: '| Expand this Synopsis into a complete chapter-by-chapter outline of the story
    using the 24-chapter Cozy Mystery Plot Outline as a template. |'
  id: totrans-1941
  prefs: []
  type: TYPE_TB
  zh: '| 使用24章温馨悬疑情节大纲作为模板，将这个概要扩展成完整的章节大纲。|'
- en: The First Murder Victim
  id: totrans-1942
  prefs: []
  type: TYPE_NORMAL
  zh: 第一位谋杀受害者
- en: Let’s work through some questions to help develop a character profile for the
    murder victim. If you are writing a long mystery novel, there could be more than
    one murder victim, and the process will be repeated.
  id: totrans-1943
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一些问题来帮助发展谋杀受害者的角色档案。如果你在写一部长篇悬疑小说，可能会有不止一个谋杀受害者，这个过程将会重复。
- en: '#Who is the murder victim?'
  id: totrans-1944
  prefs: []
  type: TYPE_NORMAL
  zh: '#谁是谋杀受害者？'
- en: '#The means of death.'
  id: totrans-1945
  prefs: []
  type: TYPE_NORMAL
  zh: '#死亡的手段。'
- en: Does the sleuth know the victim? This gives the sleuth a reason to get involved
    and care about why this murder happened.
  id: totrans-1946
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 侦探是否认识受害者？这为侦探提供了一个介入并关心为什么发生这起谋杀的理由。
- en: '#Was the sleuth present when the murder took place?'
  id: totrans-1947
  prefs: []
  type: TYPE_NORMAL
  zh: '#侦探在谋杀发生时在场吗？'
- en: '#What did the killer leave at the murder scene or remove from the scene that
    provides a vital clue for our sleuth?'
  id: totrans-1948
  prefs: []
  type: TYPE_NORMAL
  zh: '#凶手在谋杀现场留下了什么，或者从现场移除了什么，为我们的侦探提供了关键线索？'
- en: '#Was the victim likable? How can you demonstrate this before the murder takes
    place so that the reader cares about this person before they are killed?'
  id: totrans-1949
  prefs: []
  type: TYPE_NORMAL
  zh: '#受害者是否受人喜爱？如何在谋杀发生之前展示这一点，让读者在受害者被杀之前就关心这个人？'
- en: '#Why should anyone want to kill this person?'
  id: totrans-1950
  prefs: []
  type: TYPE_NORMAL
  zh: '#为什么有人想要杀害这个人？'
- en: What aspects of their history and current behavior will be revealed by the sleuth,
    which leads them directly to multiple suspects?
  id: totrans-1951
  prefs: []
  type: TYPE_NORMAL
  zh: 侦探将揭示受害者的哪些历史和当前行为，这直接导致他们指向多个嫌疑人？
- en: Build on your Story Idea and create a profile of the first victim and their
    mode of death.
  id: totrans-1952
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的故事想法的基础上，为第一位受害者和他们的死亡方式创建档案。
- en: I will use the case study of contemporary psychic cozy mystery as a working
    example in the following conversations with ChatGPT.
  id: totrans-1953
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在与ChatGPT的以下对话中使用当代灵异温馨悬疑小说的案例研究作为工作示例。
- en: You would adapt, extend, and shape these prompts for your niche and story idea.
  id: totrans-1954
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要根据你的特定领域和故事想法对这些提示进行调整、扩展和塑造。
- en: '![A diagram of a crime scene  Description automatically generated](image_rsrc44V.jpg)'
  id: totrans-1955
  prefs: []
  type: TYPE_IMG
  zh: '![犯罪现场图  描述自动生成](image_rsrc44V.jpg)'
- en: Who Is The Murder Victim?
  id: totrans-1956
  prefs: []
  type: TYPE_NORMAL
  zh: 谁是谋杀受害者？
- en: In most cases, the sleuth knows who the victim is, either through a personal
    connection or by knowing them in some way.
  id: totrans-1957
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数情况下，侦探通过个人关系或某种方式认识受害者，因此知道受害者是谁。
- en: If you don’t have this connection, talk to the AI and create a character profile
    for the victim in the same way that you collaborated with the sleuth's character.
  id: totrans-1958
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你没有这种联系，与AI交谈，并以相同的方式为受害者创建角色档案，就像你与侦探角色合作一样。
- en: '![](image_rsrc44W.jpg)'
  id: totrans-1959
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc44W.jpg)'
- en: You are a very experienced cozy mystery author who is an expert at crafting
    well-rounded, engaging characters that your cozy mystery readers love. We will
    create a character profile for the first murder victim in my modern psychic cozy
    murder mystery book. Here is what I know so far about the character:  The murder
    victim is a well-known psychic and medium who has come to Polperran for a psychic
    festival. He was found murdered in the craft store studio owned by the aunt of
    Laura Marsh. He was killed by a pair of antique knitting needles which had been
    dipped in a powerful poison.
  id: totrans-1960
  prefs: []
  type: TYPE_NORMAL
  zh: 您是一位经验丰富的温馨谋杀谜案作家，擅长塑造全面、引人入胜的角色，您的温馨谋杀谜案读者们都非常喜欢。我们将为您现代灵异惊悚谋杀谜案书中的第一个谋杀受害者创建一个角色画像。以下是我对角色的了解：谋杀受害者是一位知名的灵媒和灵媒师，他来到波尔珀兰参加灵媒节。他在劳拉·马什阿姨拥有的工艺品店工作室被发现被谋杀。他死于一对浸泡在强力毒药中的古董编织针。
- en: 'Please include details about:'
  id: totrans-1961
  prefs: []
  type: TYPE_NORMAL
  zh: 请提供以下细节：
- en: His name and background.
  id: totrans-1962
  prefs: []
  type: TYPE_NORMAL
  zh: 他的姓名和背景。
- en: Communication Skills and Mannerisms
  id: totrans-1963
  prefs: []
  type: TYPE_NORMAL
  zh: 沟通技巧与举止
- en: Motivation and Limiting Beliefs and Concerns
  id: totrans-1964
  prefs: []
  type: TYPE_NORMAL
  zh: 动机、限制性信念和担忧
- en: A psychological profile.
  id: totrans-1965
  prefs: []
  type: TYPE_NORMAL
  zh: 心理画像。
- en: '![](image_rsrc44X.jpg)'
  id: totrans-1966
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44X.jpg)'
- en: Given the rich context and intriguing premise of your modern psychic cozy murder
    mystery, let's create a multifaceted character profile for the first murder victim.
    This will not only anchor the narrative's initial mystery but also provide depth
    and intrigue that engages readers.
  id: totrans-1967
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到您现代灵异惊悚谋杀谜案的丰富背景和引人入胜的情节，让我们为第一个谋杀受害者创建一个多面性的角色画像。这不仅将为叙事的初始谜团奠定基础，还将提供深度和吸引力，吸引读者。
- en: Name and Background
  id: totrans-1968
  prefs: []
  type: TYPE_NORMAL
  zh: 姓名与背景
- en: 'Name: Edward "Eddie" Montague'
  id: totrans-1969
  prefs: []
  type: TYPE_NORMAL
  zh: 姓名：爱德华“爱迪”蒙塔古
- en: 'Background: Born and raised in a small, picturesque village in Cornwall, Edward
    Montague was always fascinated by the supernatural. From a young age, he claimed
    to see and communicate with spirits, a trait that made him both an object of curiosity
    and isolation among his peers. Despite skepticism from those around him, Eddie
    pursued his passion with vigor, studying various forms of psychic phenomena and
    mediumship across the world. His travels took him from the spiritualist communities
    of New Orleans to the mystic shores of India, where he honed his abilities and
    knowledge.'
  id: totrans-1970
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：爱德华·蒙塔古出生于一个风景如画的小村庄，在康沃尔长大，从小就对超自然现象着迷。从很小的时候起，他就声称能看到并与灵体沟通，这种特质使他成为同龄人中的好奇和孤立的对象。尽管周围的人持怀疑态度，爱迪仍然充满热情地追求他的激情，在世界各地研究各种灵异现象和灵媒术。他的旅行带他走过了新奥尔良的精神主义社区，到印度的神秘海岸，在那里他磨练了他的能力和知识。
- en: Upon returning to England, Eddie established himself as a reputable psychic
    and medium. His fame grew as he began to host popular televised séances and published
    several best-selling books on communicating with the afterlife. This success,
    however, was marred by controversies, including accusations of fraud from skeptics.
    Nonetheless, Eddie maintained a dedicated following and was known for his charismatic,
    albeit enigmatic, public persona.
  id: totrans-1971
  prefs: []
  type: TYPE_NORMAL
  zh: 当爱迪回到英格兰后，他确立了自己作为一位信誉良好的灵媒。随着他开始主持流行的电视通灵仪式并出版了几本关于与死后世界沟通的畅销书，他的名声逐渐增长。然而，这种成功却被争议所玷污，包括怀疑者对他的欺诈指控。尽管如此，爱迪仍然拥有一群忠实的追随者，并以他魅力四射、尽管神秘莫测的公众形象而闻名。
- en: Communication Skills and Mannerisms
  id: totrans-1972
  prefs: []
  type: TYPE_NORMAL
  zh: 沟通技巧与举止
- en: 'Communication Skills: Eddie was an exceptional communicator, using his deep,
    soothing voice to captivate and reassure his audience. He was skilled at reading
    people, a talent that enhanced his perceived psychic abilities. Eddie''s choice
    of words was always deliberate, often laced with ambiguity that left his followers
    intrigued and skeptics puzzled.'
  id: totrans-1973
  prefs: []
  type: TYPE_NORMAL
  zh: 沟通技巧：爱迪是一位杰出的沟通者，他运用深沉、舒缓的声音吸引并安抚他的听众。他擅长读懂他人，这种才能增强了人们对他超感知能力的感知。爱迪的用词总是经过深思熟虑，常常带有模糊性，让他的追随者感到好奇，让怀疑者感到困惑。
- en: 'Mannerisms: Eddie had a penchant for dramatic flair, often dressing in vibrant,
    elaborate outfits that set him apart. His gestures were measured, designed to
    emphasize his points during readings or public appearances. Eddie''s eyes, however,
    were his most striking feature—penetrating and seemingly able to see right through
    people, adding to his mystique.'
  id: totrans-1974
  prefs: []
  type: TYPE_NORMAL
  zh: 举止：爱迪喜欢戏剧性的风格，经常穿着鲜艳、复杂的服装，这使他与众不同。他的手势经过精心设计，旨在在阅读或公开露面时强调他的观点。然而，爱迪的眼睛是他最引人注目的特征——锐利且似乎能看穿人们，增加了他的神秘感。
- en: Motivation, Limiting Beliefs, and Concerns
  id: totrans-1975
  prefs: []
  type: TYPE_NORMAL
  zh: 动机、限制性信念和担忧
- en: 'Motivation: At the core, Eddie sought validation and acceptance. He genuinely
    believed in his psychic abilities and saw himself as a bridge between the living
    and the dead. Eddie''s primary motivation was to help people find closure or comfort
    by communicating with their departed loved ones. However, a deeper, more personal
    quest for understanding the mysteries of life and death drove him.'
  id: totrans-1976
  prefs: []
  type: TYPE_NORMAL
  zh: 动机：从根本上说，爱迪寻求的是认可和接受。他真诚地相信自己的灵媒能力，并认为自己是在生者和死者之间架起桥梁的人。爱迪的主要动机是通过与已故亲人沟通，帮助人们找到安宁或安慰。然而，一个更深层次、更个人化的对生命和死亡之谜的理解的探索驱使着他。
- en: 'Limiting Beliefs and Concerns: Despite his outward confidence, Eddie harbored
    doubts about the extent of his abilities and feared being exposed as a fraud.
    This anxiety sometimes led him to take risks to prove his legitimacy, often at
    the expense of his safety and privacy. Eddie was also deeply concerned about the
    ethical implications of his work, particularly the impact on grieving individuals
    seeking solace.'
  id: totrans-1977
  prefs: []
  type: TYPE_NORMAL
  zh: 限制性信念和担忧：尽管表面上自信，爱迪对自己的能力范围持有怀疑，并害怕被揭露为骗子。这种焦虑有时导致他冒险证明自己的合法性，这往往以牺牲他的安全和隐私为代价。爱迪还深深关注他工作的道德影响，特别是对寻求慰藉的悲伤者的影响。
- en: Psychological Profile
  id: totrans-1978
  prefs: []
  type: TYPE_NORMAL
  zh: 心理画像
- en: 'Personality: Eddie was complex—a blend of genuine empathy and a deep-seated
    need for recognition. He was introspective yet craved the limelight, leading to
    a life filled with contradictions. Eddie''s charisma masked a vulnerability, stemming
    from a childhood of feeling misunderstood and ostracized. His experiences with
    the supernatural both fascinated and haunted him, giving him a contemplative demeanor.'
  id: totrans-1979
  prefs: []
  type: TYPE_NORMAL
  zh: 性格：爱迪是复杂的——真诚的同理心与深植于内心的被认可的需求的混合体。他内省却渴望聚光灯，导致了他充满矛盾的生活。爱迪的魅力掩盖了他的脆弱，这种脆弱源于童年时期感到被误解和排斥。他与超自然现象的经历既令他着迷，又让他感到恐惧，赋予了他沉思的气质。
- en: 'Interpersonal Relationships: Eddie had a talent for forming deep connections
    with people, yet he kept most at arm''s length, fearing that getting too close
    would shatter the image he had carefully curated. His relationships were often
    transient, with few truly understanding the man behind the medium.'
  id: totrans-1980
  prefs: []
  type: TYPE_NORMAL
  zh: 人际关系：爱迪有与人们建立深厚联系的天赋，然而他却保持着距离，害怕过于亲近会破坏他精心打造的形象。他的关系往往是短暂的，很少有人真正理解这个媒介背后的人。
- en: Conclusion
  id: totrans-1981
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Edward "Eddie" Montague's character is a tapestry of contrasts—publicly charismatic
    and confident, yet privately fraught with doubts and fears. His murder at the
    Polperran psychic festival, under such mysterious and symbolic circumstances,
    sets the stage for a compelling mystery that challenges characters to look beyond
    the facade and uncover the truth behind the man and his untimely demise. Eddie's
    background, skills, motivations, and psychological nuances provide fertile ground
    for exploring themes of belief, deception, and the human desire for connection
    beyond death.
  id: totrans-1982
  prefs: []
  type: TYPE_NORMAL
  zh: 爱德华“爱迪”·蒙塔古的角色是一幅对比鲜明的画卷——在公众面前魅力四射、自信满满，然而在私下里却充满了怀疑和恐惧。他在波尔珀兰灵媒节上的谋杀，在如此神秘和象征性的情况下发生，为一场引人入胜的谜案奠定了基础，挑战角色们超越表面现象，揭开这个男人及其不幸死亡的真相。爱迪的背景、技能、动机和心理细微之处为探索信仰、欺骗以及人类超越死亡的连接欲望的主题提供了肥沃的土壤。
- en: Each of these suggestions should spark ideas about the character of the murder
    victim.
  id: totrans-1983
  prefs: []
  type: TYPE_NORMAL
  zh: 这些建议中的每一个都应该激发关于谋杀受害者性格的思考。
- en: They could, of course, have been in the wrong place at the wrong time and be
    an innocent bystander to a bigger crime.
  id: totrans-1984
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，他们可能只是在不恰当的时间和地点出现，成为更大犯罪的无辜旁观者。
- en: Your story, your idea. Tell the AI what you already know and discuss how to
    develop that persona until you understand who this person is, good and bad.
  id: totrans-1985
  prefs: []
  type: TYPE_NORMAL
  zh: 你的故事，你的想法。告诉AI你已经知道的信息，并讨论如何发展这个角色，直到你理解了这个人的好与坏。
- en: This will inform the way you build a list of suspects who would want to kill
    this person.
  id: totrans-1986
  prefs: []
  type: TYPE_NORMAL
  zh: 这将指导你构建一个想要杀害此人的嫌疑名单。
- en: What was the Means of Death?
  id: totrans-1987
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 死亡的方式是什么？
- en: Use the AI to come up with multiple ways in which your victim could have been
    killed.
  id: totrans-1988
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI来想出多种你的受害者可能被杀害的方式。
- en: In this prompt, I added that a pair of poisoned antique knitting needles was
    used, but you could leave this blank and see what the AI suggests.
  id: totrans-1989
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个提示中，我添加了使用一对有毒的古董编织针，但你也可以留空，看看AI会提出什么建议。
- en: One way to examine the crime scene objectively is to ask the AI to prepare a
    fake crime scene report or medical examiner’s report.
  id: totrans-1990
  prefs: []
  type: TYPE_NORMAL
  zh: 检查犯罪现场的一种客观方法就是让AI准备一份假犯罪现场报告或法医报告。
- en: Review the report, edit it to match any new ideas you may have, and then ask
    the AI to describe the crime scene in real time from the detective's perspective.
  id: totrans-1991
  prefs: []
  type: TYPE_NORMAL
  zh: 审阅报告，根据你可能有任何新想法进行编辑，然后请AI从侦探的角度实时描述犯罪现场。
- en: '![](image_rsrc44Y.jpg)'
  id: totrans-1992
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44Y.jpg)'
- en: Assume the role of a crime scene investigator for this task. I need you to construct
    a comprehensive police report from the Polperran police force in the UK, where
    Laura Marsh found body of Edward Montague lying on the floor of her aunt Sera’s
    craft studio. He had been stabbed with two knitting needles to the chest. It was
    7pm in mid-February.
  id: totrans-1993
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你是一名犯罪现场调查员，完成这项任务。我需要你从英国Polperran警察局构建一份全面的警察报告，其中劳拉·马什在她阿姨Sera的手工艺工作室中发现了躺在地板上的Edward
    Montague的尸体。他被两根织针刺穿胸部。那是二月中旬的7点。
- en: Laura’s aunt Sera comes in a few minutes later with her friend, a telepathic
    quilter called Frances Wentworth. They quickly examine the knitting needles before
    the police arrive.
  id: totrans-1994
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉的阿姨Sera几分钟后来到现场，带着她的朋友，一位名为弗朗西斯·温莎的通灵缝纫师。在警察到来之前，他们迅速检查了织针。
- en: This report is meant for use in a Cozy Murder Mystery Novel.
  id: totrans-1995
  prefs: []
  type: TYPE_NORMAL
  zh: 这份报告旨在用于一部温馨谋杀悬疑小说。
- en: Please ensure it includes all the necessary details typically found in a real-life
    police report, such as the date and time of the incident, location, victim information,
    description of the scene, potential evidence, and preliminary findings. Additionally,
    incorporate a few witness testimonies to provide more depth to the narrative.
  id: totrans-1996
  prefs: []
  type: TYPE_NORMAL
  zh: 请确保它包含通常在现实生活中警察报告中找到的所有必要细节，例如事件日期和时间、地点、受害者信息、现场描述、潜在证据和初步发现。此外，融入一些目击者证词，以丰富叙事。
- en: '![](image_rsrc44Z.jpg)'
  id: totrans-1997
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44Z.jpg)'
- en: Polperran Police Force
  id: totrans-1998
  prefs: []
  type: TYPE_NORMAL
  zh: Polperran警察局
- en: Incident Report
  id: totrans-1999
  prefs: []
  type: TYPE_NORMAL
  zh: 事件报告
- en: 'Date of Report: February 15th'
  id: totrans-2000
  prefs: []
  type: TYPE_NORMAL
  zh: 报告日期：2月15日
- en: 'Time of Report: 7:45 PM'
  id: totrans-2001
  prefs: []
  type: TYPE_NORMAL
  zh: 报告时间：晚上7:45
- en: 'Reporting Officer: Inspector Nathanial Ford'
  id: totrans-2002
  prefs: []
  type: TYPE_NORMAL
  zh: 报告警官：警司内森·福特
- en: Incident Details
  id: totrans-2003
  prefs: []
  type: TYPE_NORMAL
  zh: 事件详情
- en: 'Date of Incident: February 15th'
  id: totrans-2004
  prefs: []
  type: TYPE_NORMAL
  zh: 事件日期：2月15日
- en: 'Time of Incident: Approximately 7:00 PM'
  id: totrans-2005
  prefs: []
  type: TYPE_NORMAL
  zh: 事件发生时间：大约晚上7:00
- en: 'Location of Incident: 24 Sea Breeze Lane, Polperran, Sera Marsh’s Craft Studio'
  id: totrans-2006
  prefs: []
  type: TYPE_NORMAL
  zh: 事件发生地点：Polperran Sea Breeze Lane 24号，Sera Marsh的手工艺工作室
- en: Victim Information
  id: totrans-2007
  prefs: []
  type: TYPE_NORMAL
  zh: 受害者信息
- en: 'Name: Edward Montague'
  id: totrans-2008
  prefs: []
  type: TYPE_NORMAL
  zh: 姓名：Edward Montague
- en: 'Age: 52'
  id: totrans-2009
  prefs: []
  type: TYPE_NORMAL
  zh: 年龄：52岁
- en: 'Address: 18 Cliffside Road, Polperran'
  id: totrans-2010
  prefs: []
  type: TYPE_NORMAL
  zh: 地址：Polperran Cliffside Road 18号
- en: 'Occupation: Psychic Medium'
  id: totrans-2011
  prefs: []
  type: TYPE_NORMAL
  zh: 职业：灵媒
- en: 'Description: Male, approximately 5''9", medium build, balding with dark hair
    on the sides, wearing a dark blue sweater and khaki trousers.'
  id: totrans-2012
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：男性，约5'9"，中等身材，头顶脱发，两侧有深色头发，穿着深蓝色毛衣和卡其裤。
- en: Description of the Scene
  id: totrans-2013
  prefs: []
  type: TYPE_NORMAL
  zh: 现场描述
- en: Upon arrival, the body of Edward Montague was found lying on the floor of the
    craft studio belonging to Sera Marsh. The studio was in an orderly condition with
    no signs of a struggle. The victim had been stabbed twice in the chest with knitting
    needles, which were still in place. Surrounding the victim were various craft
    materials, including yarn and fabric. A small circle of chairs was set up in the
    room, suggesting a meeting or gathering had been planned.
  id: totrans-2014
  prefs: []
  type: TYPE_NORMAL
  zh: 到达现场后，发现Edward Montague的尸体躺在Sera Marsh的手工艺工作室的地板上。工作室状况井然，没有挣扎的迹象。受害者胸部被两根织针刺了两次，织针仍然留在原处。受害者周围散布着各种手工艺材料，包括纱线和布料。房间中摆放了一个小圈椅，暗示曾计划过会议或聚会。
- en: Potential Evidence
  id: totrans-2015
  prefs: []
  type: TYPE_NORMAL
  zh: 潜在证据
- en: 'Knitting Needles: Two antique-looking knitting needles protruding from the
    victim''s chest.'
  id: totrans-2016
  prefs: []
  type: TYPE_NORMAL
  zh: 织针：从受害者胸部突出两个看起来很古老的织针。
- en: 'Craft Materials: Various yarns and fabrics in close proximity to the body.
    Some pieces appear to be part of a project the victim was possibly working on
    or discussing.'
  id: totrans-2017
  prefs: []
  type: TYPE_NORMAL
  zh: 手工艺材料：各种纱线和布料靠近尸体。一些物品看起来可能是受害者可能正在制作或讨论的项目的一部分。
- en: 'Footprints: Faint footprints in the dust on the studio floor, not immediately
    identifiable.'
  id: totrans-2018
  prefs: []
  type: TYPE_NORMAL
  zh: 脚印：工作室地板上的灰尘中有淡淡的脚印，无法立即辨认。
- en: 'Fibers: Unknown fibers found on the victim''s clothing, not consistent with
    materials from the studio.'
  id: totrans-2019
  prefs: []
  type: TYPE_NORMAL
  zh: 纤维：在受害者衣物上发现未知纤维，与工作室材料不一致。
- en: 'Witness Testimonies: Statements collected from Laura Marsh, Sera Marsh, and
    Frances Wentworth.'
  id: totrans-2020
  prefs: []
  type: TYPE_NORMAL
  zh: 目击者证词：从劳拉·马什、Sera Marsh和弗朗西斯·温莎收集的陈述。
- en: Witness Testimonies
  id: totrans-2021
  prefs: []
  type: TYPE_NORMAL
  zh: 目击者证词
- en: 'Laura Marsh: Found the victim at approximately 7:00 PM upon entering her aunt’s
    studio for a scheduled visit. States she did not touch anything except in an attempt
    to check the victim''s pulse and immediately called the police.'
  id: totrans-2022
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉·马什：在按照计划拜访她阿姨的工作室时，大约在晚上7点发现了受害者。她表示自己没有触碰任何东西，只是在尝试检查受害者的脉搏后立即报了警。
- en: 'Sera Marsh: Entered the studio a few minutes after Laura and insists she only
    approached the victim to verify he was beyond help. She mentioned that Edward
    Montague was supposed to lead a session on psychic crafts at her studio that evening.'
  id: totrans-2023
  prefs: []
  type: TYPE_NORMAL
  zh: 塞拉·马什：在劳拉进入工作室几分钟后来到工作室，并坚称她只是接近受害者以确认他已经无法救治。她提到，爱德华·蒙塔古那天晚上应该在她的工作室主持一个关于灵媒手工艺的会议。
- en: 'Frances Wentworth: Accompanied Sera Marsh into the studio shortly after the
    body was discovered. States she did not touch anything but observed the scene.
    Frances mentioned feeling a sudden "chill" upon entering the studio, suggesting
    a potential psychic disturbance.'
  id: totrans-2024
  prefs: []
  type: TYPE_NORMAL
  zh: 弗朗西斯·温特沃斯：在尸体被发现后不久陪同塞拉·马什进入工作室。她表示自己没有触碰任何东西，只是观察了现场。弗朗西斯提到进入工作室时感到一阵突如其来的“寒意”，这表明可能存在精神上的干扰。
- en: Preliminary Findings
  id: totrans-2025
  prefs: []
  type: TYPE_NORMAL
  zh: 初步发现
- en: Given the nature of the wounds and the lack of disturbance at the scene, it
    is suggested that the victim knew his attacker and that the attack was sudden.
  id: totrans-2026
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到伤口的性质和现场缺乏干扰，建议受害者认识他的袭击者，袭击是突然发生的。
- en: The antique nature of the knitting needles may indicate a personal motive related
    to the victim's or the assailant’s interest in vintage items or crafts. The absence
    of forced entry suggests the victim was comfortable allowing the assailant into
    the studio. The investigation will focus on individuals known to the victim, especially
    those with access to the studio and a familiarity with the victim’s schedule and
    interests.
  id: totrans-2027
  prefs: []
  type: TYPE_NORMAL
  zh: 编织针的古董性质可能表明与受害者或袭击者对复古物品或手工艺的兴趣有关的个人动机。没有强行进入的迹象表明受害者很舒服地让袭击者进入工作室。调查将集中在受害者认识的人身上，特别是那些有权进入工作室并熟悉受害者日程和兴趣的人。
- en: Additional Notes
  id: totrans-2028
  prefs: []
  type: TYPE_NORMAL
  zh: 其他备注
- en: A thorough examination of the craft materials and fibers found on the victim’s
    clothing will be conducted. Further interviews with individuals scheduled to attend
    the session led by Mr. Montague will be arranged. The studio will remain secured
    as a crime scene for further investigation and collection of forensic evidence.
  id: totrans-2029
  prefs: []
  type: TYPE_NORMAL
  zh: 将对受害者衣物上发现的工艺品材料和纤维进行彻底检查。将安排进一步采访预定参加蒙塔古先生主持的会议的个人。工作室将保持作为犯罪现场的安全状态，以便进一步调查和收集法医证据。
- en: 'Action Items:'
  id: totrans-2030
  prefs: []
  type: TYPE_NORMAL
  zh: 行动项目：
- en: '- Forensic analysis of the knitting needles for fingerprints and DNA.'
  id: totrans-2031
  prefs: []
  type: TYPE_NORMAL
  zh: '- 对编织针进行法医分析以寻找指纹和DNA。'
- en: -Catalog and examine all craft materials in the studio.
  id: totrans-2032
  prefs: []
  type: TYPE_NORMAL
  zh: '- 编目并检查工作室中的所有工艺品。'
- en: -Interview all potential witnesses and individuals with known associations with
    the victim.
  id: totrans-2033
  prefs: []
  type: TYPE_NORMAL
  zh: '- 采访所有可能的目击者和与受害者有已知关联的个人。'
- en: -Review the victim’s phone and email records for recent communications.
  id: totrans-2034
  prefs: []
  type: TYPE_NORMAL
  zh: '- 检查受害者的电话和电子邮件记录，以了解最近的通讯。'
- en: -Investigate the provenance of the antique knitting needles.
  id: totrans-2035
  prefs: []
  type: TYPE_NORMAL
  zh: '- 调查古董编织针的来源。'
- en: 'Report Filed By:'
  id: totrans-2036
  prefs: []
  type: TYPE_NORMAL
  zh: 报告提交人：
- en: Inspector Nathanial Ford
  id: totrans-2037
  prefs: []
  type: TYPE_NORMAL
  zh: 警督内森尼尔·福特
- en: Polperran Police Force
  id: totrans-2038
  prefs: []
  type: TYPE_NORMAL
  zh: 波尔珀兰警察局
- en: Now, we have the crime scene for the first murder investigation, which is linked
    to Laura’s character arc and how she acquired her psychic powers. But why was
    Eddie murdered?
  id: totrans-2039
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们有了第一起谋杀案的调查现场，这与劳拉的个性弧线以及她如何获得她的灵力有关。但为什么爱迪会被谋杀？
- en: '![](image_rsrc450.jpg)'
  id: totrans-2040
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc450.jpg]'
- en: Can you suggest 5 reasons why someone would want to murder Eddie, a visiting
    psychic and medium using poisoned knitting needles.
  id: totrans-2041
  prefs: []
  type: TYPE_NORMAL
  zh: 你能提出5个理由，解释为什么有人会想要谋杀爱迪，这位使用有毒编织针的来访灵媒和灵媒师吗？
- en: '![](image_rsrc451.jpg)'
  id: totrans-2042
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc451.jpg]'
- en: 'Professional Rivalry: Eddie, being a renowned psychic and medium, might have
    had rivals within the psychic community who envied his success or disputed his
    methods. One of these rivals could have viewed Eddie''s appearance at the local
    psychic fair in Polperran as a direct threat to their own standing or business.
    The murder, executed in such a peculiar manner with poisoned knitting needles,
    might have been intended as a symbolic gesture, underscoring a rivalry steeped
    in betrayal and jealousy.'
  id: totrans-2043
  prefs: []
  type: TYPE_NORMAL
  zh: 专业竞争：作为一位著名的灵媒和灵媒师，爱迪可能在灵媒社区中有竞争对手，他们羡慕他的成功或质疑他的方法。这些竞争对手中的任何一个可能认为爱迪在波尔珀兰当地灵媒市场上的出现是对他们自己地位或生意的直接威胁。这种以有毒编织针执行的谋杀可能是一种象征性的姿态，强调了根植于背叛和嫉妒的竞争。
- en: 'Exposed Secrets: In his work as a medium, Eddie could have uncovered deeply
    buried secrets that someone desperately wanted to keep hidden. This could involve
    scandalous family secrets, hidden relationships, or even criminal activities that,
    if exposed, could ruin reputations or lead to legal repercussions. The murderer
    might have used the psychic fair as an opportunity to silence Eddie permanently,
    using the unique method as a way to confuse the investigation or send a message
    to others who might reveal what''s hidden.'
  id: totrans-2044
  prefs: []
  type: TYPE_NORMAL
  zh: 揭露的秘密：在作为通灵者的工作中，爱迪可能揭露了一些某人迫切希望隐藏的深层秘密。这可能涉及丑闻家庭秘密、隐藏的关系，甚至可能涉及如果揭露会毁掉声誉或导致法律后果的犯罪活动。凶手可能利用精神博览会的机会永久地使爱迪沉默，利用这种独特的方法来混淆调查或向可能揭露隐藏之事的其他人发送信息。
- en: 'A Cursed Artifact: Eddie''s murder could be connected to a specific antique
    or artifact that he came into possession of or had recently appraised. Perhaps
    this object was believed to be cursed or held significant spiritual power. The
    previous owner, or someone with a vested interest in the artifact''s power or
    history, might have resorted to murder to reclaim it, believing the poisoned knitting
    needles—a blend of the mundane and the arcane—were the only way to sever Eddie''s
    connection to the artifact.'
  id: totrans-2045
  prefs: []
  type: TYPE_NORMAL
  zh: 诅咒的遗物：爱迪的谋杀可能与一个特定的古董或遗物有关，他最近获得了或对其进行了评估。或许这个物体被认为是有诅咒的或拥有重要的精神力量。前所有者或对遗物的力量或历史有利益关系的人可能诉诸谋杀以夺回它，相信有毒的编织针——平凡与神秘的结合——是切断爱迪与遗物联系的唯一方式。
- en: 'Personal Vendetta: Eddie''s abilities might have directly affected someone''s
    personal life, leading to a vendetta against him. This could be the result of
    a private reading gone awry, where Eddie disclosed information that led to a divorce,
    a feud, or financial loss. The affected party, consumed by a desire for revenge,
    might have chosen the psychic fair in Polperran as the perfect setting for their
    retribution, using the poisoned knitting needles to ensure Eddie''s silence was
    permanent.'
  id: totrans-2046
  prefs: []
  type: TYPE_NORMAL
  zh: 个人恩怨：爱迪的能力可能直接影响了某个人的个人生活，导致对他个人的仇恨。这可能是由于一次出错的私人阅读，爱迪披露了导致离婚、纷争或经济损失的信息。受到影响的当事人，被复仇的欲望所驱使，可能选择波尔佩兰的精神博览会作为他们报复的完美场所，使用有毒的编织针确保爱迪的沉默是永久的。
- en: 'A Desperate Believer: Eddie''s death could be the result of his dealings with
    a desperate individual seeking his psychic guidance. Perhaps this person believed
    Eddie could communicate with a lost loved one or alter their fate through his
    mediumship. When their hopes were dashed—either through Eddie''s inability to
    provide the desired connection or by exposing the individual to harsh truths—they
    might have been driven to an extreme act of violence. The use of poisoned knitting
    needles could symbolize their twisted sense of betrayal, feeling stabbed in the
    heart by unmet expectations and broken promises.'
  id: totrans-2047
  prefs: []
  type: TYPE_NORMAL
  zh: 一个绝望的信仰者：爱迪的死亡可能是他处理一个绝望个体寻求他精神指导的结果。或许这个人相信爱迪能够与一个失去的爱人沟通，或者通过他的通灵能力改变他们的命运。当他们的希望破灭——无论是由于爱迪无法提供所需的联系，还是通过揭露个体面对的残酷真相——他们可能被驱使采取极端的暴力行为。使用有毒的编织针可能象征着他们扭曲的背叛感，感到未满足的期望和破碎的承诺刺痛了他们的心。
- en: These are great suggestions – and I could have asked for a lot more ideas.
  id: totrans-2048
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是极好的建议——我本可以要求更多想法。
- en: Let’s go with A Cursed Artifact. This can be linked directly to the plot arc
    for the entire series.
  id: totrans-2049
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们选择“诅咒的遗物”。这可以直接与整个系列的情节弧线联系起来。
- en: Eddie did not know that Laura’s aunt was a guardian of a series of powerful
    mystical artifacts hidden around Polperran. The killer is searching for these
    artifacts, and Eddie has discovered a vital clue to their location. The killer
    wants to get there before anyone else.
  id: totrans-2050
  prefs: []
  type: TYPE_NORMAL
  zh: 爱迪不知道劳拉的阿姨是隐藏在波尔佩兰周围的一系列强大神秘遗物的守护者。凶手正在寻找这些遗物，而爱迪已经发现了它们位置的至关重要的线索。凶手想要在其他人之前到达那里。
- en: WORKED EXAMPLE
  id: totrans-2051
  prefs: []
  type: TYPE_NORMAL
  zh: 工作示例
- en: '#Who is the murder victim? Edward Montague.'
  id: totrans-2052
  prefs: []
  type: TYPE_NORMAL
  zh: '#谁是谋杀受害者？爱德华·蒙塔古。'
- en: Does the sleuth know the victim? This gives the sleuth a reason to get involved
    and care about why this murder happened. No. But he was murdered in her aunt’s
    craft studio.
  id: totrans-2053
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 神探是否认识受害者？这给了神探一个介入并关心谋杀发生原因的理由。不。但他是在她的阿姨的工艺工作室被谋杀的。
- en: '#The means of death. Two antique knitting needles to the chest.'
  id: totrans-2054
  prefs: []
  type: TYPE_NORMAL
  zh: '#死亡方式。两根古董编织针刺入胸部。'
- en: '#Was the sleuth present when the murder took place? No. But Edward was still
    alive when she found him. Edward grabbed Laura’s arm and gifted her his psychic
    powers before he died.'
  id: totrans-2055
  prefs: []
  type: TYPE_NORMAL
  zh: '#侦探在谋杀发生时在场吗？不。但当她找到他时，爱德华还活着。在死前，爱德华抓住了劳拉的手臂，并将他的灵媒能力赠予她。'
- en: '#What did the killer leave at the murder scene or remove from the scene that
    provides a vital clue for our sleuth? The killer had searched Eddie’s clothing,
    and the contents of his bag were strewn all over the floor of the studio. They
    had brought the unusual antique knitting needles used as a murder weapon with
    them = a vital clue.'
  id: totrans-2056
  prefs: []
  type: TYPE_NORMAL
  zh: '#凶手在谋杀现场留下了什么，或者从现场移除了什么，为我们的侦探提供了至关重要的线索？凶手搜查了爱迪的衣服，他的包里的东西散落在工作室的地板上。他们带来了用作谋杀武器的不同寻常的古董编织针
    = 一个至关重要的线索。'
- en: '#Was the victim likable? How can you demonstrate this before the murder takes
    place so that the reader cares about this person before they are killed? In this
    case, Edward Montague was a celebrity psychic and a medium in Polperran for a
    psychic fair. Laura’s aunt Sera knew him and asked him to tell her if he had encountered
    anything linked to these artifacts.'
  id: totrans-2057
  prefs: []
  type: TYPE_NORMAL
  zh: '#受害者是否讨人喜欢？如何在谋杀发生之前展示这一点，让读者在受害者被杀之前就关心这个人？在这种情况下，爱德华·蒙塔古是波尔珀兰灵媒节的著名灵媒和灵媒。劳拉的阿姨塞拉认识他，并请他告诉她是否遇到过与这些文物有关的事情。'
- en: '#Why should anyone want to kill this person? The killer is searching for these
    artifacts, and Eddie has discovered a vital clue to the location. The killer wants
    to get there before anyone else.'
  id: totrans-2058
  prefs: []
  type: TYPE_NORMAL
  zh: '#为什么有人想要杀死这个人？凶手正在寻找这些文物，而爱迪已经发现了关于其位置的至关重要的线索。凶手想要在其他人之前到达那里。'
- en: '![A blue circle with white text  Description automatically generated](image_rsrc452.jpg)'
  id: totrans-2059
  prefs: []
  type: TYPE_IMG
  zh: '![一个带有白色文字的蓝色圆圈，描述自动生成](image_rsrc452.jpg)'
- en: The Suspects
  id: totrans-2060
  prefs: []
  type: TYPE_NORMAL
  zh: 嫌疑人
- en: One of the delights for any reader of cozy fiction has to be working out the
    identity of the real killer from the range of possible suspects identified by
    our sleuth.
  id: totrans-2061
  prefs: []
  type: TYPE_NORMAL
  zh: 对于任何轻松小说的读者来说，最大的乐趣之一就是从我们侦探确定的可能嫌疑人中找出真正的凶手。
- en: It is a delicious puzzle whose reward is justice for the victim and a rebalancing
    of the world order when the real world seems to be in chaos.
  id: totrans-2062
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个美味的谜题，其回报是为受害者伸张正义，并在现实世界看似混乱时恢复世界秩序。
- en: Our job as the writer is, therefore, to present the readers with a range of
    suspects who have convincing and credible reasons why they want the victim dead/injured.
    So, lots of brainstorming is required.
  id: totrans-2063
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，作为作家，我们的任务是向读者呈现一系列嫌疑人，他们有令人信服和可信的理由想要受害者死亡/受伤。所以，需要大量的头脑风暴。
- en: Who has the most to gain from the victim’s death?
  id: totrans-2064
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 谁从受害者的死亡中获益最大？
- en: Give everyone a secret and a motive – from paying for a nursing home for a beloved
    relative to revenge to greed.
  id: totrans-2065
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给每个人一个秘密和动机——从为心爱的亲戚支付养老院的费用到报复再到贪婪。
- en: Passion and money are classic motives, but what about the deep secrets they
    are hiding?
  id: totrans-2066
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 激情和金钱是经典动机，但他们隐藏的深层秘密又是什么呢？
- en: Keep the motives different for each suspect but based on the relationships between
    people – envy, greed, revenge, resentment, fear of exposure, etc.
  id: totrans-2067
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持每个嫌疑人的动机不同，但基于人与人之间的关系——嫉妒、贪婪、报复、怨恨、害怕暴露等。
- en: Develop the list of suspects and their motives, means, and opportunities.
  id: totrans-2068
  prefs: []
  type: TYPE_NORMAL
  zh: 制定嫌疑人和他们的动机、手段和机会的清单。
- en: Select one suspect who will be the main antagonist and an equal match for the
    sleuth. Build up their backstory.
  id: totrans-2069
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个嫌疑人，他将成为主要反派，与侦探实力相当。构建他们的背景故事。
- en: Recreate how the first murder was committed and then create the clues that will
    lead the sleuth to the killer.
  id: totrans-2070
  prefs: []
  type: TYPE_NORMAL
  zh: 重新创造第一次谋杀是如何发生的，然后创造将侦探引向凶手的线索。
- en: Who are the suspects, and how does the sleuth find the clues and revelations
    to their motive for killing the victim?
  id: totrans-2071
  prefs: []
  type: TYPE_NORMAL
  zh: 嫌疑人是谁，侦探是如何找到他们的线索和揭示他们杀害受害者的动机的？
- en: 'Here are five ideas to help you brainstorm possible suspects:'
  id: totrans-2072
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些想法可以帮助你头脑风暴可能的嫌疑人：
- en: Suspect 1 – THE OBVIOUS KILLER.
  id: totrans-2073
  prefs: []
  type: TYPE_NORMAL
  zh: 嫌疑人1 – **明显的凶手**。
- en: Suspect 2 – THE FAMILY MEMBERS linked to the victim.
  id: totrans-2074
  prefs: []
  type: TYPE_NORMAL
  zh: 嫌疑人2 – 与受害者有联系的**家庭成员**。
- en: Suspect 3 – THE POSSIBLE KILLER IN THE COMMUNITY
  id: totrans-2075
  prefs: []
  type: TYPE_NORMAL
  zh: 嫌疑人3 – **社区中的可能凶手**。
- en: Suspect 4 – THE OUTSIDER
  id: totrans-2076
  prefs: []
  type: TYPE_NORMAL
  zh: 嫌疑人4 – **局外人**。
- en: Suspect 5 – THE HIDDEN SUSPECT
  id: totrans-2077
  prefs: []
  type: TYPE_NORMAL
  zh: 嫌疑人5 – **隐藏的嫌疑人**。
- en: Of course, this list of possible suspects is only a suggestion, and every mystery
    is unique. Still, I have found it helpful to brainstorm these ideas for suspects
    as a guideline to quickly develop a story outline that is both well-motivated
    and will create an interesting puzzle for the sleuth and the reader to solve.
  id: totrans-2078
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这份可能的嫌疑人名单只是一个建议，每个谜案都是独特的。尽管如此，我发现将这些嫌疑人的想法作为指南来快速制定一个既有动机又能为侦探和读者创造有趣谜题的故事大纲是有帮助的。
- en: Using multiple suspects in this way helps build layers of conflict, moments
    of sudden exposition, character-driven emotional intensity, red herrings, and
    distractions as their connection to the victim is revealed.
  id: totrans-2079
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式使用多个嫌疑人有助于构建冲突的层次、突然的揭露、以人物为中心的情感强度、误导和分心，随着他们与受害者的联系被揭示。
- en: Sometimes, the connection is unexpected and startling, revealing an entirely
    new aspect of the victim’s life that the sleuth knew nothing about.
  id: totrans-2080
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，联系是出乎意料的惊人，揭示了侦探一无所知的受害者生活的全新方面。
- en: Each suspect leads to or directly provides, an additional clue or “breadcrumb”
    for the sleuth to follow as they follow a broken path toward the real killer.
  id: totrans-2081
  prefs: []
  type: TYPE_NORMAL
  zh: 每个嫌疑人都会导致或直接提供额外的线索或“面包屑”，供侦探在追寻通往真正凶手破碎路径时跟随。
- en: This is the start of the journey to discovering who your killer is and why the
    sleuth must work hard to match the killer’s intelligence and determination.
  id: totrans-2082
  prefs: []
  type: TYPE_NORMAL
  zh: 这是发现谁是凶手以及为什么侦探必须努力匹配凶手智慧和决心的旅程的开始。
- en: You are going to need three to five possible suspects for this murder, so the
    more creative the ideas you can come up with at this stage, the better.
  id: totrans-2083
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要为这个谋杀案准备三个到五个可能的嫌疑人，所以在这个阶段你能想出越有创意的想法就越好。
- en: I hope that you can see that by building up a character profile for the victim,
    you can create endless permutations when it comes to your suspects, who all have
    excellent reasons for wanting the victim dead.
  id: totrans-2084
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你能看到，通过为受害者建立人物档案，你可以为你的嫌疑人创造无数的可能性，他们都有很好的理由想要受害者死去。
- en: In most mysteries, the greater the number of suspects, the more complex the
    puzzle, which rewards readers.
  id: totrans-2085
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数谜案中，嫌疑人的数量越多，谜题就越复杂，这会奖励读者。
- en: Now, all you have to do is create the sequence of clues, revelations, and tiny
    mistakes that will lead the sleuth to the possible suspects.
  id: totrans-2086
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你所要做的就是创建一系列线索、揭露和微小错误，这将引导侦探找到可能的嫌疑人。
- en: Expand on the Backstory of the Victim and the Motivation of the Killer
  id: totrans-2087
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 扩展受害者的背景和凶手的动机。
- en: What aspects of their history and current behavior will be revealed by the sleuth,
    which leads them directly to multiple suspects?
  id: totrans-2088
  prefs: []
  type: TYPE_NORMAL
  zh: 侦探将揭示哪些历史和当前行为，这将直接引导他们到多个嫌疑人？
- en: Note at least five ideas about the murder victim's backstory and how they came
    to this point. Expand more as you write the story.
  id: totrans-2089
  prefs: []
  type: TYPE_NORMAL
  zh: 至少列出五个关于谋杀受害者背景和他们如何到达这一点的想法。在写作故事时进一步扩展。
- en: Focusing on the backstory of the murder victim, including their lifestyle, friends,
    and family, will deliver a logical and rational explanation that makes sense.
  id: totrans-2090
  prefs: []
  type: TYPE_NORMAL
  zh: 关注谋杀受害者的背景，包括他们的生活方式、朋友和家庭，将提供一个合理且合理的解释。
- en: If you understand why someone would want to kill the victim, then you can create
    multiple suspects.
  id: totrans-2091
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你理解了为什么有人想要杀害受害者，那么你可以创造多个嫌疑人。
- en: Then, use that background to come up with at least three ideas for why someone
    would want to murder the victim and how they did it.
  id: totrans-2092
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，利用这个背景来想出至少三个为什么有人想要谋杀受害者以及他们是如何做到的。
- en: Let’s work through a few of the really interesting suggestions.
  id: totrans-2093
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探讨一些真正有趣的建议。
- en: '![](image_rsrc453.jpg)'
  id: totrans-2094
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc453.jpg](image_rsrc453.jpg)'
- en: 'Please tell me more about A Cursed Artifact: Eddie''s murder could be connected
    to a specific antique or artifact that he came into possession of or had recently
    appraised. Perhaps this object was believed to be cursed or held significant spiritual
    power. The previous owner, or someone with a vested interest in the artifact''s
    power or history, might have resorted to murder to reclaim it, believing the poisoned
    knitting needles—a blend of the mundane and the arcane—were the only way to sever
    Eddie''s connection to the artifact.'
  id: totrans-2095
  prefs: []
  type: TYPE_NORMAL
  zh: 请告诉我更多关于《诅咒的遗物》：艾迪的谋杀可能与一件特定的古董或遗物有关，他可能最近获得了这件遗物或对其进行了评估。也许这个物体被认为是有诅咒的或拥有重要的精神力量。前主人或对遗物的力量或历史有利益关系的人可能诉诸谋杀以夺回它，因为他们相信有毒的编织针——平凡与神秘的结合——是切断艾迪与遗物联系的唯一方法。
- en: Create a character profile explaining in detail why they were compelled to kill
    Eddie when he returned to Polperran.
  id: totrans-2096
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个角色档案，详细解释为什么他在爱迪生回到波尔佩兰时被迫杀害他。
- en: '![](image_rsrc454.jpg)'
  id: totrans-2097
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc454.jpg)'
- en: 'Character Profile: Victor Holloway'
  id: totrans-2098
  prefs: []
  type: TYPE_NORMAL
  zh: 角色档案：维克多·霍洛韦
- en: 'Full Name: Victor Alastair Holloway'
  id: totrans-2099
  prefs: []
  type: TYPE_NORMAL
  zh: 全名：维克多·阿拉斯泰尔·霍洛韦
- en: 'Physical Description: Victor is in his early fifties, with an imposing presence.
    He stands at 6 feet tall, with a lean, wiry frame that speaks to years of disciplined
    physical activity. His hair is peppered gray, cut short in a no-nonsense style,
    and his eyes are a piercing green that often unsettles those he fixes his gaze
    upon. Victor dresses in a manner that blends sophistication with practicality,
    favoring tailored suits that are dark and unassuming.'
  id: totrans-2100
  prefs: []
  type: TYPE_NORMAL
  zh: 身体描述：维克多五十出头，身材威严。他身高六英尺，体态瘦削，肌肉结实，这表明他多年来一直保持着严格的体育锻炼。他的头发夹杂着灰色，短发，风格简洁，眼睛是锐利的绿色，常常让被他注视的人感到不安。维克多的着装风格将精致与实用相结合，偏爱深色且低调的定制西装。
- en: 'Background: Victor Holloway is a collector and dealer of rare antiquities,
    with a particular interest in items of a mystical or occult nature. His fascination
    with the arcane began in childhood, sparked by a family legacy that traces back
    to the ancient druids of Britain. Over the years, Victor amassed a significant
    collection, some pieces of which are rumored to possess real power.'
  id: totrans-2101
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：维克多·霍洛韦是一位稀有古董收藏家和经销商，特别对神秘或超自然物品感兴趣。他对神秘事物的迷恋始于童年，由追溯至英国古德鲁伊德家族遗产所激发。多年来，维克多积累了大量藏品，其中一些据传拥有真正的力量。
- en: Victor's expertise and discreet manner have made him a sought-after figure in
    certain circles, including those dabbling in the supernatural. His dealings are
    shrouded in secrecy, and he is known to go to great lengths to acquire items that
    catch his interest.
  id: totrans-2102
  prefs: []
  type: TYPE_NORMAL
  zh: 维克多的专业知识和低调的行事风格使他成为某些圈子中备受追捧的人物，包括那些涉足超自然领域的人。他的交易总是笼罩在神秘之中，而且众所周知，他会不遗余力地获取引起他兴趣的物品。
- en: 'Current Crisis: Victor''s obsession reached a peak with the pursuit of the
    "Lunar Locket," an artifact believed to hold the power to commune with the spirits
    of the dead during certain phases of the moon. According to legend, the locket
    was lost in Polperran centuries ago, cursed by its last owner to bring misfortune
    to anyone who misused its power.'
  id: totrans-2103
  prefs: []
  type: TYPE_NORMAL
  zh: 当前危机：维克多对“月相护身符”的追求达到了顶峰，这个文物据信在月亮的某些相位下能够与死者的灵魂交流。根据传说，这个护身符在几个世纪前在波尔佩兰丢失，它的最后一位主人诅咒了它，任何滥用其力量的人都会遭受不幸。
- en: When Victor learned that Eddie Montague had come into possession of the locket
    and had identified its true nature, he saw his chance to claim the artifact. However,
    Eddie's refusal to sell the locket and his plans to reveal its secrets at the
    Polperran psychic fair threatened Victor's ambitions and the secrecy of the occult
    world.
  id: totrans-2104
  prefs: []
  type: TYPE_NORMAL
  zh: 当维克多得知爱迪生·蒙塔古获得了护身符并识别出它的真正性质时，他看到了夺取文物的机会。然而，爱迪生拒绝出售护身符并计划在波尔佩兰灵媒节上揭露其秘密，这威胁到了维克多的野心和超自然世界的保密性。
- en: 'Personality: Victor is intelligent, calculated, and deeply private. He possesses
    a charm that he employs selectively to advance his interests. However, beneath
    his polished exterior lies a cold determination and a belief in his right to wield
    the power of the artifacts he collects. Victor is not inherently cruel, but his
    obsession with the occult has skewed his moral compass, leading him to justify
    extreme actions in the name of his quest.'
  id: totrans-2105
  prefs: []
  type: TYPE_NORMAL
  zh: 性格特点：维克多聪明、谨慎、极度私密。他拥有一种魅力，会选择性地运用来推进自己的利益。然而，在他光鲜的外表之下，隐藏着冷酷的决心和对收集到的文物拥有权力的信念。维克多并非天生残忍，但对他所痴迷的神秘学的执着已经扭曲了他的道德指南针，使他以自己的追求为名，为极端行为辩护。
- en: 'Murder Connection: Convinced that the Lunar Locket was destined to be his and
    fearing the exposure of its powers would attract unwanted attention or worse,
    unleash its curse, Victor saw Eddie''s refusal as a direct challenge. Believing
    he had no other choice, he decided to eliminate Eddie, reclaim the locket, and
    protect the secrecy of the artifact''s powers. The use of poisoned knitting needles
    was a calculated decision—Victor believed that blending the mundane with the arcane
    in the act of murder would sever Eddie''s spiritual connection to the locket,
    ensuring its safe retrieval.'
  id: totrans-2106
  prefs: []
  type: TYPE_NORMAL
  zh: 谋杀联系：维克多坚信月亮护身符注定是他的，担心其力量的揭露会吸引不必要的注意，甚至更糟，引发其诅咒，他认为爱迪的拒绝是对他的直接挑战。相信他没有其他选择，他决定消除爱迪，夺回护身符，并保护该文物力量的秘密。使用有毒的编织针是一个经过深思熟虑的决定——维克多认为在谋杀行为中将平凡与神秘结合，将切断爱迪与护身符的精神联系，确保其安全回收。
- en: Victor's act was one born of desperation and a deep-seated belief in the importance
    of his mission to safeguard and control the powers of the mystical world. His
    actions set in motion a series of events that would unravel in Polperran, drawing
    Laura Marsh and her companions into a mystery that bridges the gap between the
    ordinary and the extraordinary.
  id: totrans-2107
  prefs: []
  type: TYPE_NORMAL
  zh: 维克多的行为源于绝望和对他的使命——保护和控制神秘世界力量的重要性——的深深信念。他的行动引发了一系列事件，这些事件将在波普兰展开，将劳拉·马什及其同伴卷入一个连接普通与非凡的神秘事件中。
- en: '![](image_rsrc455.jpg)'
  id: totrans-2108
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc455.jpg)'
- en: 'Please tell me more about A Personal Vendetta: Eddie''s abilities might have
    directly affected someone''s personal life, leading to a vendetta against him.
    This could be the result of a private reading gone awry, where Eddie disclosed
    information that led to a divorce, a feud, or financial loss. The affected party,
    consumed by a desire for revenge, might have chosen the psychic fair in Polperran
    as the perfect setting for their retribution, using the poisoned knitting needles
    to ensure Eddie''s silence was permanent.'
  id: totrans-2109
  prefs: []
  type: TYPE_NORMAL
  zh: 请告诉我更多关于《个人恩怨：爱迪的能力可能直接影响了某人的个人生活，导致对他进行报复。这可能是私人阅读失误的结果，爱迪泄露了导致离婚、纷争或经济损失的信息。受到影响的当事人，被复仇的欲望所驱使，可能选择波普兰的心理博览会作为他们报复的完美场所，利用有毒的编织针来确保爱迪的沉默是永久的。
- en: Create a character profile explaining in detail why they were compelled to kill
    Eddie when he returned to Polperran.
  id: totrans-2110
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个角色档案，详细说明为什么他们在爱迪回到波普兰时被迫杀害他。
- en: '![](image_rsrc456.jpg)'
  id: totrans-2111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc456.jpg)'
- en: 'Character Profile: Helena Barrett'
  id: totrans-2112
  prefs: []
  type: TYPE_NORMAL
  zh: 角色档案：海伦娜·巴雷特
- en: 'Full Name: Helena Margaret Barrett'
  id: totrans-2113
  prefs: []
  type: TYPE_NORMAL
  zh: 全名：海伦娜·玛格丽特·巴雷特
- en: 'Physical Description: Helena is a woman in her late forties with an air of
    faded elegance about her. She has sharp, angular features, with deep-set hazel
    eyes that seem to carry a permanent shadow of grief and anger. Her hair is a rich
    auburn, usually pulled back in a tight bun, emphasizing her stern demeanor. Helena
    dresses in an understated, classic style, favoring dark colors that reflect her
    somber outlook on life.'
  id: totrans-2114
  prefs: []
  type: TYPE_NORMAL
  zh: 身体描述：海伦娜是一位四十多岁的女性，身上带着一种褪色的优雅。她有锐利的、棱角分明的特征，深陷的榛色眼睛似乎带着永久性的悲伤和愤怒的阴影。她的头发是丰富的赤褐色，通常扎成一个紧绷的马尾辫，强调她严厉的气质。海伦娜穿着低调、经典风格的衣服，偏爱深色，反映了她对生活的严肃看法。
- en: 'Background: Helena was once a prominent figure in Polperran''s social circles,
    known for her charitable work and vibrant personality. Her life took a dark turn
    after a private consultation with Eddie Montague, who revealed secrets about her
    husband''s infidelity and dubious business practices.'
  id: totrans-2115
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：海伦娜曾是波普兰社交圈中的显赫人物，以她的慈善工作和充满活力的个性而闻名。在与爱迪·蒙塔古的私人咨询后，她的生活发生了转变，爱迪·蒙塔古揭露了她丈夫的不忠和可疑的商业行为。
- en: This revelation led to a bitter and public divorce, leaving Helena ostracized
    by many of her former friends who sided with her more financially influential
    husband.
  id: totrans-2116
  prefs: []
  type: TYPE_NORMAL
  zh: 这一揭露导致了一场痛苦且公开的离婚，使海伦娜被许多曾经支持她更有经济影响力的丈夫的前朋友们孤立。
- en: The divorce was not just a social disaster for Helena; it resulted in significant
    financial hardship. She was forced to sell her home and move to a smaller, more
    modest house on the outskirts of Polperran. The loss of her social standing, coupled
    with the financial strain, transformed Helena from a lively socialite to a reclusive
    and bitter individual.
  id: totrans-2117
  prefs: []
  type: TYPE_NORMAL
  zh: 离婚不仅对海伦娜来说是一场社会灾难，还导致了重大的经济困难。她被迫卖掉自己的房子，搬到波普兰郊外一个更小、更朴素的房子里。社会地位的丧失，加上经济压力，使海伦娜从活泼的社交名媛变成了一个隐居且愤世嫉俗的人。
- en: 'Current Crisis: When Helena learned that Eddie Montague was returning to Polperran
    to participate in a psychic fair, old wounds were reopened. She blamed Eddie not
    just for the downfall of her marriage but for the complete unraveling of the life
    she once cherished. Consumed by a desire for revenge and seeing an opportunity
    to reclaim some sense of control over her fate, Helena plotted to silence Eddie
    permanently.'
  id: totrans-2118
  prefs: []
  type: TYPE_NORMAL
  zh: 当前危机：当海伦娜得知爱迪·蒙塔古将返回波尔珀兰参加通灵博览会时，旧伤再次被揭开。她不仅责怪爱迪导致了她婚姻的崩溃，还责怪他彻底摧毁了她曾经珍视的生活。被复仇的欲望所驱使，并看到重新掌控命运的机会，海伦娜密谋永久地使爱迪沉默。
- en: 'Personality: Helena is intelligent, articulate, and deeply wounded. She harbors
    a potent mix of grief, bitterness, and anger. Once known for her warmth and generosity,
    her personality has been overshadowed by a desire for vengeance against those
    she holds responsible for her misfortunes. Despite her transformation, she retains
    a sharp wit and a keen sense of observation, skills she uses to meticulously plan
    her revenge.'
  id: totrans-2119
  prefs: []
  type: TYPE_NORMAL
  zh: 性格：海伦娜聪明、口才好，深受伤害。她怀抱着悲痛、苦涩和愤怒的强烈混合体。曾经以她的温暖和慷慨而闻名，但她的个性已被她对那些她认为是她不幸的罪魁祸首的复仇欲望所掩盖。尽管她发生了转变，但她仍然保持着敏锐的机智和敏锐的观察力，她利用这些技能来细致地策划她的复仇。
- en: 'Murder Connection: Viewing the psychic fair as the perfect venue for her retribution,
    Helena used her knowledge of Eddie''s schedule and habits to plan the murder.
    She chose poisoned knitting needles as the weapon, a nod to her own lost hobbies
    and interests that she gave up in the wake of her personal tragedies. The needles,
    coated with a rare and untraceable poison, were a symbolic choice meant to reflect
    the way Eddie''s revelations had pierced her life, leaving it in tatters.'
  id: totrans-2120
  prefs: []
  type: TYPE_NORMAL
  zh: 谋杀联系：海伦娜将通灵博览会视为她复仇的完美场所，利用她对爱迪日程和习惯的了解来策划谋杀。她选择了有毒的编织针作为武器，这是对她个人悲剧后放弃的爱好和兴趣的一种致敬。这些针头涂有一种罕见且难以追踪的毒药，是一种象征性的选择，旨在反映爱迪的揭露如何刺穿她的生活，使其支离破碎。
- en: Helena's decision to kill Eddie was driven by a desperate need to erase the
    source of her pain and to exert some control over a life that she felt was stolen
    from her.
  id: totrans-2121
  prefs: []
  type: TYPE_NORMAL
  zh: 海伦娜决定杀死爱迪，是出于一种绝望的需要，想要抹去她痛苦的根源，并试图控制她感觉被夺走的生活。
- en: Her actions set off a chain of events that not only brings Laura Marsh and her
    team onto her path but also forces Helena to confront the deeper implications
    of her quest for vengeance and the possibility of redemption or further ruin.
  id: totrans-2122
  prefs: []
  type: TYPE_NORMAL
  zh: 她的行为引发了一系列事件，不仅让劳拉·马什及其团队走上她的道路，还迫使海伦娜面对她复仇之路上更深层次的含义以及救赎或进一步毁灭的可能性。
- en: Continue using this prompt to generate a list of possible suspects who would
    want to murder your first victim.
  id: totrans-2123
  prefs: []
  type: TYPE_NORMAL
  zh: 继续使用这个提示来生成一个可能想要谋杀你的第一个受害者的嫌疑人名单。
- en: Do you need more suspects or want to be more creative? Reframe the prompt in
    a different way.
  id: totrans-2124
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要更多嫌疑人，或者想要更有创意吗？以不同的方式重新构思提示。
- en: '![](image_rsrc457.jpg)'
  id: totrans-2125
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc457.jpg)'
- en: Can you give me a list of 5 suspects who could have killed Edward Montague?
    These should be the Obvious Killer, The Possible Killer linked to the victim,
    The Possible killer who lives in the community, the Outsider, and the Hidden Suspect
    who nobody would suspect who has a great alibi.
  id: totrans-2126
  prefs: []
  type: TYPE_NORMAL
  zh: 你能给我一个可能杀害爱德华·蒙塔古的五个嫌疑人的名单吗？这些应该包括明显的凶手、与受害者有联系的可能的凶手、社区中的可能的凶手、局外人以及没有人会怀疑的隐藏嫌疑人，他有一个很好的不在场证明。
- en: 'For each suspect: Provide the motive for the murder, the method, the secrets
    they have been keeping, their alibi at the time of the murder, the reason why
    they killed him now and how they had the opportunity to kill him.'
  id: totrans-2127
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个嫌疑人：提供谋杀动机、方法、他们一直保守的秘密、谋杀时的不在场证明、他们为何现在才杀死他以及他们如何有机会杀死他。
- en: '![](image_rsrc458.jpg)'
  id: totrans-2128
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc458.jpg)'
- en: 'Certainly! Here''s a list of five suspects:'
  id: totrans-2129
  prefs: []
  type: TYPE_NORMAL
  zh: 当然！以下是一个包含五个嫌疑人的名单：
- en: '1\. The Obvious Killer: Victor Holloway'
  id: totrans-2130
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 明显的凶手：维克多·霍洛韦
- en: 'Motive: Victor desired the "Lunar Locket" that Eddie Montague had recently
    discovered. Believing it to hold significant occult power, Victor saw Eddie''s
    refusal to sell as a direct threat to his collection and reputation.'
  id: totrans-2131
  prefs: []
  type: TYPE_NORMAL
  zh: 动机：维克多渴望爱迪·蒙塔古最近发现的“月亮挂锁”，他认为它拥有重要的占卜力量。他认为爱迪拒绝出售是对他收藏和声誉的直接威胁。
- en: 'Method: Poisoned knitting needles, chosen for their symbolic significance to
    sever Eddie''s spiritual connection to the locket.'
  id: totrans-2132
  prefs: []
  type: TYPE_NORMAL
  zh: 方法：使用有毒的编织针，因其象征意义，旨在切断爱迪与挂锁的精神联系。
- en: 'Secrets: Victor is deeply involved in the occult, a fact he keeps hidden under
    the guise of a respectable antiquities dealer.'
  id: totrans-2133
  prefs: []
  type: TYPE_NORMAL
  zh: 秘密：维克多深深卷入了神秘学，这是一个他隐藏在可敬的古董商身份之下的事实。
- en: 'Alibi: Victor was seen at a distant auction house at the time of the murder,
    providing him with a solid alibi.'
  id: totrans-2134
  prefs: []
  type: TYPE_NORMAL
  zh: 证据：在谋杀案发生时，维克多被看到在一家遥远的拍卖行，这为他提供了一个稳固的证据。
- en: 'Reason for Timing: Eddie planned to reveal the locket''s powers at the psychic
    fair, forcing Victor''s hand.'
  id: totrans-2135
  prefs: []
  type: TYPE_NORMAL
  zh: 时间选择的原因：艾迪计划在灵媒会上揭示护身符的力量，迫使维克多采取行动。
- en: 'Opportunity: Victor used a trusted intermediary to deliver the poisoned needles
    to Eddie, knowing he would be at the studio.'
  id: totrans-2136
  prefs: []
  type: TYPE_NORMAL
  zh: 机会：维克多利用一个可信赖的中介将有毒针递送给艾迪，知道他会在工作室。
- en: '2\. The Possible Killer Linked to the Victim: Helena Barrett'
  id: totrans-2137
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 与受害者有联系的可能的凶手：海伦娜·巴雷特
- en: 'Motive: Helena sought revenge for the ruin of her life following Eddie''s revelations
    about her husband''s infidelity and criminal activities.'
  id: totrans-2138
  prefs: []
  type: TYPE_NORMAL
  zh: 动机：海伦娜寻求报复，因为艾迪揭露了她丈夫的不忠和犯罪活动，这毁了她的生活。
- en: 'Method: Utilizing her newfound interest in herbalism to craft a rare, untraceable
    poison applied to knitting needles.'
  id: totrans-2139
  prefs: []
  type: TYPE_NORMAL
  zh: 方法：利用她对草药学的兴趣，制作了一种罕见且难以追踪的毒药，并将其应用于编织针上。
- en: 'Secrets: Helena has been studying poisons and herbalism under the guise of
    starting a new hobby.'
  id: totrans-2140
  prefs: []
  type: TYPE_NORMAL
  zh: 秘密：海伦娜在开始新爱好之名下，一直在研究毒药和草药学。
- en: 'Alibi: At the time of the murder, Helena was hosting a small, well-documented
    book club meeting at her home.'
  id: totrans-2141
  prefs: []
  type: TYPE_NORMAL
  zh: 证据：在谋杀案发生时，海伦娜在她家举办了一个小型、有详细记录的读书俱乐部会议。
- en: 'Reason for Timing: Learning of Eddie''s return to Polperran, Helena saw a chance
    to exact her revenge before he could leave town again.'
  id: totrans-2142
  prefs: []
  type: TYPE_NORMAL
  zh: 时间选择的原因：得知艾迪返回波尔珀兰，海伦娜看到了一个机会，在艾迪再次离开小镇之前实施报复。
- en: 'Opportunity: She mailed the poisoned knitting needles anonymously to the studio,
    knowing they would be used during the fair.'
  id: totrans-2143
  prefs: []
  type: TYPE_NORMAL
  zh: 机会：她匿名地将有毒的编织针邮寄到工作室，知道它们将在会上被使用。
- en: '3\. The Possible Killer Who Lives in the Community: Derek Sands'
  id: totrans-2144
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 社区中的可能凶手：德里克·桑德斯
- en: 'Motive: Derek feared Eddie''s psychic abilities would expose his fraudulent
    psychic business, which heavily relies on deception and trickery.'
  id: totrans-2145
  prefs: []
  type: TYPE_NORMAL
  zh: 动机：德里克害怕艾迪的灵媒能力会揭露他的欺诈灵媒生意，这个生意严重依赖欺骗和诡计。
- en: 'Method: Derek, having access to various mystical and occult artifacts, could
    easily obtain and use poisoned knitting needles.'
  id: totrans-2146
  prefs: []
  type: TYPE_NORMAL
  zh: 方法：德里克能够轻易地获得并使用有毒的编织针，因为他有权访问各种神秘和神秘学文物。
- en: 'Secrets: His business is a front for more dubious activities, including the
    sale of stolen artifacts.'
  id: totrans-2147
  prefs: []
  type: TYPE_NORMAL
  zh: 秘密：他的生意是更多可疑活动的幌子，包括出售被盗文物。
- en: 'Alibi: Derek was performing a live psychic reading online, with viewers as
    his alibi.'
  id: totrans-2148
  prefs: []
  type: TYPE_NORMAL
  zh: 证据：德里克在网上进行了一场现场灵媒阅读，观众是他的证据。
- en: 'Reason for Timing: Eddie had hinted at exposing Derek during the psychic fair.'
  id: totrans-2149
  prefs: []
  type: TYPE_NORMAL
  zh: 时间选择的原因：艾迪在灵媒会上暗示要揭露德里克。
- en: 'Opportunity: Derek''s deep knowledge of the occult community allowed him to
    anonymously deliver the poisoned needles to the studio.'
  id: totrans-2150
  prefs: []
  type: TYPE_NORMAL
  zh: 机会：德里克对神秘学社区的深入了解使他能够匿名地将有毒针递送到工作室。
- en: '4\. The Outsider: Simon Fairweather'
  id: totrans-2151
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 外人：西蒙·费厄韦瑟
- en: 'Motive: As the ambitious mayor, Simon feared Eddie''s psychic fair would overshadow
    his plans for a high-profile festival meant to attract tourism, potentially ruining
    his political career.'
  id: totrans-2152
  prefs: []
  type: TYPE_NORMAL
  zh: 动机：作为有野心的市长，西蒙害怕艾迪的灵媒市集会掩盖他计划的高调节日，旨在吸引旅游业，可能会毁了他的政治生涯。
- en: 'Method: Simon used his connections to quietly obtain the poisoned needles,
    knowing Eddie would be at the studio.'
  id: totrans-2153
  prefs: []
  type: TYPE_NORMAL
  zh: 方法：西蒙利用他的关系悄悄地获得了有毒的针，知道艾迪会在工作室。
- en: 'Secrets: Simon has been manipulating local events and people to further his
    own career, often unethically.'
  id: totrans-2154
  prefs: []
  type: TYPE_NORMAL
  zh: 秘密：西蒙一直在操纵当地事件和人，以进一步自己的事业，常常不道德。
- en: 'Alibi: Simon was at a televised town hall meeting, providing him with a public
    alibi.'
  id: totrans-2155
  prefs: []
  type: TYPE_NORMAL
  zh: 证据：西蒙在电视市政厅会议上，为他提供了一个公开的证据。
- en: 'Reason for Timing: Eddie''s fair coincided with Simon''s festival and eliminating
    him seemed a quick solution to ensure his event''s success.'
  id: totrans-2156
  prefs: []
  type: TYPE_NORMAL
  zh: 时间选择的原因：艾迪的市集与西蒙的节日巧合，消灭他似乎是一个快速解决确保他活动成功的方法。
- en: 'Opportunity: Utilizing his mayoral resources, Simon had someone plant the needles
    at the studio before Eddie''s arrival.'
  id: totrans-2157
  prefs: []
  type: TYPE_NORMAL
  zh: 机会：西蒙利用他的市长资源，在艾迪到来之前让人在工作室里放置了针。
- en: '5\. The Hidden Suspect: Frances Wentworth'
  id: totrans-2158
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 隐藏的嫌疑人：弗朗西斯·温特沃斯
- en: 'Motive: Frances harbored resentment towards Eddie for discrediting her friend''s
    psychic abilities in the past, which led to her friend''s professional ruin.'
  id: totrans-2159
  prefs: []
  type: TYPE_NORMAL
  zh: 动机：弗朗西斯对艾迪怀恨在心，因为艾迪过去曾诋毁她朋友的精神能力，这导致了她朋友的职业毁灭。
- en: 'Method: Being a telepathic quilter, Frances knew crafting and access to rare
    poisons through her connections in the crafting community.'
  id: totrans-2160
  prefs: []
  type: TYPE_NORMAL
  zh: 方法：作为一个心灵感应的拼布者，弗朗西斯通过她在拼布社区的联系人了解制作和获取稀有毒药。
- en: 'Secrets: Frances''s telepathic abilities allow her to manipulate people without
    their knowledge, a secret she guards closely.'
  id: totrans-2161
  prefs: []
  type: TYPE_NORMAL
  zh: 秘密：弗朗西斯的通灵能力使她能够在不知情的情况下操纵人们，这是一个她严格保守的秘密。
- en: 'Alibi: Frances was at a quilting exhibition, surrounded by fellow quilters
    and fans, making her alibi seemingly unbreakable.'
  id: totrans-2162
  prefs: []
  type: TYPE_NORMAL
  zh: 伪证：弗朗西斯参加了一个拼布展览，周围是她的同行拼布者和粉丝，这使得她的伪证看起来似乎坚不可摧。
- en: 'Reason for Timing: With Eddie''s return to Polperran, Frances saw an opportunity
    to avenge her friend under the guise of community activity.'
  id: totrans-2163
  prefs: []
  type: TYPE_NORMAL
  zh: 时机选择的原因：随着爱迪返回波尔珀兰，弗朗西斯看到了一个机会，在社区活动的幌子下为她朋友报仇。
- en: 'Opportunity: Her involvement in the psychic fair and the craft studio gave
    her the perfect chance to plant the deadly needles without suspicion.'
  id: totrans-2164
  prefs: []
  type: TYPE_NORMAL
  zh: 机会：她在灵媒展览和工艺工作室的参与给了她一个完美的机会在无人怀疑的情况下种植致命的针。
- en: As you can see, by framing the question differently, you can generate exciting
    options to add to your list of potential suspects.
  id: totrans-2165
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，通过不同地构建问题，你可以生成一些激动人心的选项，添加到你的潜在嫌疑人名单中。
- en: To save space, I have only asked for five suspects, but you could easily ask
    for more and perhaps link them to the list of secondary characters you generated
    earlier, building connections to the local community as you do so.
  id: totrans-2166
  prefs: []
  type: TYPE_NORMAL
  zh: 为了节省空间，我只请求了五个嫌疑人，但你很容易请求更多，并且可能将它们与之前生成的次要角色名单联系起来，在这个过程中建立与当地社区的连接。
- en: Next Steps
  id: totrans-2167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下一步。
- en: Work through the options suggested and evaluate how they best fit into your
    vision for your story idea.
  id: totrans-2168
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细研究提出的选项，并评估它们如何最好地融入你对故事想法的构想。
- en: Don’t hesitate to ask the AI to repeat the process with your unique slant or
    to change one or more characters until you have a list of potential suspects that
    are an excellent fit for this book.
  id: totrans-2169
  prefs: []
  type: TYPE_NORMAL
  zh: 不要犹豫，让AI根据你独特的角度重复这个过程，或者更改一个或多个字符，直到你得到一份与这本书非常匹配的潜在嫌疑人名单。
- en: Then, work on customizing and modifying these ideas to make them your own. Combine
    ideas, generate new ones, and brainstorm alternatives.
  id: totrans-2170
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，努力定制和修改这些想法，使它们成为你自己的。结合想法，生成新的想法，并头脑风暴替代方案。
- en: The goal is to create a list of suspects who all have compelling reasons for
    wanting to kill your murder victim but have great alibis and character profiles
    that will keep your readers guessing until the final reveal. And, of course, some
    will be red herrings designed to lead our sleuth in the wrong direction.
  id: totrans-2171
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是创建一份嫌疑人名单，他们都有强烈的动机想要杀害你的谋杀受害者，但他们有完美的伪证和人物档案，这将使你的读者在最终揭露之前一直猜测。当然，其中一些将是误导性的线索，旨在将我们的侦探引向错误的方向。
- en: '![A blue circle with white text  Description automatically generated](image_rsrc452.jpg)'
  id: totrans-2172
  prefs: []
  type: TYPE_IMG
  zh: '![一个带有白色文字的蓝色圆圈，描述自动生成](image_rsrc452.jpg)'
- en: Which one of the Suspects killed Edward Montague?
  id: totrans-2173
  prefs: []
  type: TYPE_NORMAL
  zh: 哪个嫌疑人杀害了爱德华·蒙塔古？
- en: You can only know the answer to that question by working through the in-depth
    motivation of at least five suspects, as above.
  id: totrans-2174
  prefs: []
  type: TYPE_NORMAL
  zh: 你只能通过像上面那样深入分析至少五个嫌疑人的动机来知道这个问题的答案。
- en: You can ask ChatGPT who the killer is, but it should be apparent from the response
    generated who the most likely killer is.
  id: totrans-2175
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以问ChatGPT凶手是谁，但根据生成的响应，最可能的凶手应该是显而易见的。
- en: Worked Example.
  id: totrans-2176
  prefs: []
  type: TYPE_NORMAL
  zh: 工作示例。
- en: Given the suspects and motives outlined previously, the suspect who killed Edward
    Montague is Helena Barrett.
  id: totrans-2177
  prefs: []
  type: TYPE_NORMAL
  zh: 根据之前概述的嫌疑人和动机，杀害爱德华·蒙塔古的嫌疑人是海伦娜·巴雷特。
- en: Her motive for the murder stems from a deep-seated desire for revenge, driven
    by the ruin of her life following Eddie's psychic revelations about her husband's
    infidelity and criminal activities. Helena meticulously planned the murder, leveraging
    her knowledge of poisons to craft a rare, untraceable toxin applied to the knitting
    needles.
  id: totrans-2178
  prefs: []
  type: TYPE_NORMAL
  zh: 她谋杀的动机源于一个根深蒂固的复仇欲望，这是由爱迪关于她丈夫不忠和犯罪活动的灵媒揭示之后她生活的毁灭所驱动的。海伦娜精心策划了谋杀，利用她对毒药的知识制作了一种罕见且难以追踪的毒素，应用于编织针上。
- en: Now you must get to work and plan how the sleuth will discover the real killer
    for your plot!
  id: totrans-2179
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你必须开始工作，并计划侦探如何发现你的情节中的真正凶手！
- en: ChatGPT and Subplots
  id: totrans-2180
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT和副线剧情。
- en: Subplots, essentially mini-stories that run parallel to the main plot, add depth
    to your novel, enrich the main storyline, and further develop your characters.
  id: totrans-2181
  prefs: []
  type: TYPE_NORMAL
  zh: 副线剧情，本质上是与主线剧情并行的小故事，为你的小说增添了深度，丰富了主线剧情，并进一步发展了你的角色。
- en: They are particularly useful if you write a continuity series of books with
    the same sleuth and setting.
  id: totrans-2182
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你写的是以相同侦探和背景为背景的连续系列书籍，它们特别有用。
- en: Building Layers of Conflict into Your Story.
  id: totrans-2183
  prefs: []
  type: TYPE_NORMAL
  zh: 将冲突层次融入你的故事。
- en: In every cozy murder mystery, there are five main storylines you can use to
    generate conflict in every scene that will keep readers hooked and turn the page
    to find out what happens next.
  id: totrans-2184
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个轻松谋杀悬疑小说中，你可以使用五个主要故事线来在每个场景中产生冲突，以保持读者的兴趣并翻页查看接下来会发生什么。
- en: The Main Murder Plot.
  id: totrans-2185
  prefs: []
  type: TYPE_NORMAL
  zh: 主要谋杀剧情。
- en: The Main A Plot. This is the murder investigation that is specific to this story.
    Each book in a series will have one or more murders that create a unique murder
    mystery plot.
  id: totrans-2186
  prefs: []
  type: TYPE_NORMAL
  zh: 主要A剧情。这是特定于这个故事的具体谋杀调查。系列中的每一本书都将有一个或多个谋杀案，创造出独特的谋杀悬疑剧情。
- en: In a murder mystery, the overall goal is to identify the killer and bring them
    to justice. This is the spine and desire line of the book, driving the action
    forward in every scene.
  id: totrans-2187
  prefs: []
  type: TYPE_NORMAL
  zh: 在谋杀悬疑小说中，整体目标是识别凶手并将他们绳之以法。这是书的脊梁和欲望线，推动每个场景中的行动向前发展。
- en: We know that the murder will be solved by the end of the book, but the goal
    is to create a clever puzzle and make the reader wonder how the sleuth will find
    the killer. What skills and techniques will the sleuth use?
  id: totrans-2188
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道谋杀将在书的结尾被解决，但目标是创造一个巧妙的谜题，让读者想知道侦探将如何找到凶手。侦探将使用哪些技能和技术？
- en: What is the personal motivation that compels the sleuth to investigate this
    murder? The reader has to believe that someone the sleuth knows and cares about
    is in danger, and the stakes are high. There has to be a link to the “stakes character.”
  id: totrans-2189
  prefs: []
  type: TYPE_NORMAL
  zh: 促使侦探调查这起谋杀的个人动机是什么？读者必须相信侦探认识并关心的人处于危险之中，而且风险很高。必须与“风险角色”有联系。
- en: Then, there are Four Continuity Subplots.
  id: totrans-2190
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，有四个连续性副线。
- en: These subplots are all character-driven, which provides layers of emotional
    depth to your mystery.
  id: totrans-2191
  prefs: []
  type: TYPE_NORMAL
  zh: 这些副线都是人物驱动的，为你的悬疑故事提供了情感深度的层次。
- en: In some cozy mysteries, one type may dominate, but if you intend to write a
    series of linked books with the same sleuth and story world, all four subplots
    should be built into your story planning.
  id: totrans-2192
  prefs: []
  type: TYPE_NORMAL
  zh: 在一些轻松的悬疑小说中，可能有一种类型占主导地位，但如果你打算写一系列以相同侦探和故事世界为背景的书籍，所有四个副线都应该融入你的故事规划中。
- en: Subplot One. The Secondary Character Plot
  id: totrans-2193
  prefs: []
  type: TYPE_NORMAL
  zh: 副线一：次要角色剧情
- en: This is usually a character-based subplot about the victim, a close family member,
    a friend, a sidekick, or a romantic relationship that creates interest, conflict,
    and emotional depth for the sleuth.
  id: totrans-2194
  prefs: []
  type: TYPE_NORMAL
  zh: 这通常是一个基于角色的副线剧情，关于受害者、亲密的家庭成员、朋友、小跟班或浪漫关系，它为侦探创造了兴趣、冲突和情感深度。
- en: The quirky sidekick, for example, can spark ideas for the sleuth. It could be
    a pet, ghost, senior relative, etc., who is a great fit for your niche.
  id: totrans-2195
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，古怪的小跟班可以为侦探激发灵感。这可能是一只宠物、鬼魂、年长的亲戚等，非常适合你的细分市场。
- en: They are often humorous and intriguing, and they have their backstory. Each
    secondary character can become the main character in another book in the series.
  id: totrans-2196
  prefs: []
  type: TYPE_NORMAL
  zh: 他们通常很幽默且引人入胜，并且有自己的背景故事。每个次要角色都可以成为系列中另一本书的主角。
- en: It is possible to have a multi-protagonist series where two or more investigators
    work together to solve crimes, which can work very well if there is one main character
    for the reader to connect with. Each of the investigators has their own backstory
    and subplot going on.
  id: totrans-2197
  prefs: []
  type: TYPE_NORMAL
  zh: 有可能有一个多主角系列，其中两个或更多调查员合作解决犯罪，如果有一个主要角色供读者与之建立联系，这可以非常有效。每个调查员都有自己的背景故事和副线。
- en: Subplot Two. The Community Conflict Plot
  id: totrans-2198
  prefs: []
  type: TYPE_NORMAL
  zh: 副线二：社区冲突剧情
- en: Can you think of one or more characters in the local community who conflict
    with the sleuth for some reason in that story world that could crop up in every
    book in the series?
  id: totrans-2199
  prefs: []
  type: TYPE_NORMAL
  zh: 你能想到一个或多个在当地社区中与侦探因某种原因产生冲突的角色，在系列中的每本书中都会出现吗？
- en: This is your continuity subplot, which will run for the entire series of books
    you write in this story world.
  id: totrans-2200
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你的连续性副线剧情，它将贯穿你在这个故事世界中创作的整个系列书籍。
- en: For example, this could be a family member, local police chief, or a disapproving
    community member. In every book that generates conflict, they will come into contact
    with the sleuth somehow. You can then build a situation where this antagonistic
    character has to go to our sleuth for help.
  id: totrans-2201
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这可能是一个家庭成员、当地警察局长或一个不满意的社区成员。在每一本书中产生冲突时，他们将以某种方式与侦探接触。然后你可以构建一个情境，让这个对抗性角色不得不向我们侦探寻求帮助。
- en: Subplot Three. The Character Arc of the Sleuth
  id: totrans-2202
  prefs: []
  type: TYPE_NORMAL
- en: When you introduced your main sleuth in the first chapter of book one, they
    usually came on stage with a lot of emotional baggage and unfulfilled needs and
    wants. These are often linked to family, loss, and absent parents or spouses.
  id: totrans-2203
  prefs: []
  type: TYPE_NORMAL
- en: Throughout the series of books, you can work on this internal conflict and show
    how the sleuth grows and “arcs” from book one to the last book in the series.
  id: totrans-2204
  prefs: []
  type: TYPE_NORMAL
- en: This is often linked to a romance subplot, where each book in the series continues
    the “will they/won’t they” get-together story thread, automatically creating emotional
    tension. The sleuth and the romance interest will have limiting beliefs and internal
    conflicts that prevent them from being together.
  id: totrans-2205
  prefs: []
  type: TYPE_NORMAL
- en: The aim is to have your readers looking forward to the next book in the series
    so they can find out what happens next in this relationship.
  id: totrans-2206
  prefs: []
  type: TYPE_NORMAL
- en: Subplot Four. The Setting and Storyworld
  id: totrans-2207
  prefs: []
  type: TYPE_NORMAL
- en: As a reader, I feel as though I am returning to a series to revisit a familiar
    world. The challenge with mystery series is that new characters must be introduced
    into your small town or location to keep things fresh while still being grounded
    in the same location.
  id: totrans-2208
  prefs: []
  type: TYPE_NORMAL
- en: Tourists, business contacts, regional fairs, or some other public event or location
    are all ways for the sleuth to meet new characters, dead or alive.
  id: totrans-2209
  prefs: []
  type: TYPE_NORMAL
- en: This is one of the reasons why many cozy mystery sleuths are set in shops, libraries,
    wedding venues, or work situations where the investigator can come into contact
    with the general public. A secondary plot linked to your setting adds extra layers
    to the storyline.
  id: totrans-2210
  prefs: []
  type: TYPE_NORMAL
- en: Combining all Five Plotlines
  id: totrans-2211
  prefs: []
  type: TYPE_NORMAL
- en: The critical thing is to weave these four types of subplots into the main murder
    plot storyline, which is the spine of your book, in a way that feels organic and
    authentic.
  id: totrans-2212
  prefs: []
  type: TYPE_NORMAL
- en: At this point, you probably think, hang on a moment, I have to handle five plotlines
    in a cozy mystery that might only be 50,000 words long.
  id: totrans-2213
  prefs: []
  type: TYPE_NORMAL
- en: Yes, you do. But it’s okay.
  id: totrans-2214
  prefs: []
  type: TYPE_NORMAL
- en: The secret to building up to that powerful reversal at the end of Act Three
    and incorporating multiple storylines is to leverage the power of the story structure
    we have already been working on.
  id: totrans-2215
  prefs: []
  type: TYPE_NORMAL
- en: As long as the murder investigation remains the solid spine of each book in
    the series, you can weave in one of the other subplots, all set in the same storyworld
    and have the same main cast of characters.
  id: totrans-2216
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to generate Subplots.
  id: totrans-2217
  prefs: []
  type: TYPE_NORMAL
- en: 'Using ChatGPT to generate subplots can be a highly effective way to add richness
    to your novel. Here''s how:'
  id: totrans-2218
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Define the Role of Your Subplot
  id: totrans-2219
  prefs: []
  type: TYPE_NORMAL
- en: What kind of subplot do you want to add to your story? Secondary character,
    community, character arc, or storyworld? Should it complement the main plot, provide
    comic relief, or add tension?   A clear idea of the role will guide the AI in
    generating relevant subplot ideas.
  id: totrans-2220
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Generate Subplot Ideas with ChatGPT
  id: totrans-2221
  prefs: []
  type: TYPE_NORMAL
- en: 'Here''s a Working Example for our Case Study: Let’s say we want to create a
    link between our sleuth, Laura Marsh, and one of the antagonistic continuity characters
    in Polperran, Derek Sands.'
  id: totrans-2222
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我们案例研究的一个工作示例：假设我们想在侦探劳拉·马什和波尔珀兰的一个对抗性连续角色德里克·桑德斯之间建立联系。
- en: '![](image_rsrc459.jpg)'
  id: totrans-2223
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc459.jpg)'
- en: In my cozy mystery plot, Derek Sands is the charismatic and slightly unscrupulous
    owner of the "Mystic Emporium," a shop that specializes in New Age and occult
    paraphernalia. Derek's connections to the psychic and antique dealing community
    make him both a suspect and a source of information.
  id: totrans-2224
  prefs: []
  type: TYPE_NORMAL
  zh: 在我温馨的悬疑情节中，德里克·桑德斯是“神秘商店”的迷人且略带不规矩的老板，这家商店专门经营新时代和占卜用品。德里克与灵媒和古董交易界的联系使他既成为嫌疑人，也成为信息的来源。
- en: Can you generate a subplot to flesh out this idea and create motivation to find
    out how Derek is linked to the murder victim, Edward Montague, and why he is in
    conflict with Laura and her aunt Sera for the entire series.
  id: totrans-2225
  prefs: []
  type: TYPE_NORMAL
  zh: 你能生成一个副情节来充实这个想法，并创造动机去发现德里克如何与谋杀受害者爱德华·蒙塔古联系在一起，以及为什么他在整个系列中与劳拉和她的阿姨塞拉发生冲突吗？
- en: Create a five-book plot arc for Derek Sands, culminating in a plot idea in book
    five where Derek has to come to Laura to help him. Give specific details of the
    plot for each of the five books plus a plot series arc for the entire series.
  id: totrans-2226
  prefs: []
  type: TYPE_NORMAL
  zh: 为德里克·桑德斯创建一个五卷本的情节弧，以第五本书中德里克不得不向劳拉求助的情节高潮结束。为每本书以及整个系列的情节弧提供具体的情节细节。
- en: '![](image_rsrc45A.jpg)'
  id: totrans-2227
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc45A.jpg)'
- en: Derek Sands Series Arc Overview
  id: totrans-2228
  prefs: []
  type: TYPE_NORMAL
  zh: 德里克·桑德斯系列情节概述
- en: Derek Sands, proprietor of Mystic Emporium, navigates the murky waters between
    ally and adversary within the small coastal town of Polperran. Known for his charm
    and dubious business practices, Derek's life becomes entwined with Laura Marsh,
    her aunt Sera, and their investigations into the supernatural and the criminal.
    Over a five-book series, Derek's complex relationship with the psychic and antique
    community, along with his conflicts and eventual cooperation with Laura and Sera,
    unfolds against a backdrop of mystery, murder, and mystic artifacts.
  id: totrans-2229
  prefs: []
  type: TYPE_NORMAL
  zh: 迷雾商店的老板德里克·桑德斯在波尔珀兰这个小型沿海小镇中，在盟友和对手之间穿梭。他以魅力和可疑的商业行为而闻名，他的生活与劳拉·马什、她的阿姨塞拉以及他们对超自然和犯罪行为的调查紧密相连。在五本书的系列中，德里克与灵媒和古董社区的复杂关系，以及他与劳拉和塞拉的冲突和最终的合作，在神秘、谋杀和神秘文物的背景下展开。
- en: 'Book 1: "Shadows Over Polperran"'
  id: totrans-2230
  prefs: []
  type: TYPE_NORMAL
  zh: 第一部：《波尔珀兰的阴影》
- en: 'Plot: When Edward Montague is murdered, Derek Sands emerges as a suspect due
    to his rivalry with the victim over a valuable occult artifact. Laura and Sera’s
    investigation leads them to Mystic Emporium, unveiling Derek''s shady dealings.'
  id: totrans-2231
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：当爱德华·蒙塔古被谋杀时，德里克·桑德斯因为与受害者就一个宝贵的占卜文物竞争而成为嫌疑人。劳拉和塞拉的调查将他们引向神秘商店，揭露了德里克的阴暗交易。
- en: 'Conflict with Laura and Sera: Derek''s initial refusal to cooperate with their
    inquiries, coupled with his attempts to mislead them, sets the stage for their
    antagonistic relationship.'
  id: totrans-2232
  prefs: []
  type: TYPE_NORMAL
  zh: 与劳拉和塞拉的冲突：德里克最初拒绝与他们合作调查，以及他试图误导他们的行为，为他们的对抗性关系奠定了基础。
- en: 'Series Arc Setup: Despite their suspicions, Laura and Sera uncover evidence
    pointing away from Derek, suggesting a deeper conspiracy within Polperran''s occult
    community.'
  id: totrans-2233
  prefs: []
  type: TYPE_NORMAL
  zh: 系列情节设置：尽管他们有所怀疑，但劳拉和塞拉发现了指向德里克的证据，这表明波尔珀兰占卜社区中存在更深的阴谋。
- en: 'Book 2: "The Curse of the Lunar Locket"'
  id: totrans-2234
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部：《月长石之诅咒》
- en: 'Plot: A cursed artifact surfaces in Polperran, leading to a series of misfortunes.
    Derek, knowledgeable about the locket''s history, reluctantly becomes involved
    in Laura and Sera''s quest to neutralize its curse.'
  id: totrans-2235
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：一个被诅咒的文物在波尔珀兰出现，导致一系列不幸事件。德里克，对长命锁的历史有所了解，不情愿地卷入了劳拉和塞拉消除其诅咒的寻求中。
- en: 'Conflict: Derek''s past connection to the locket and its previous owner complicates
    the investigation, as he struggles with revealing the full extent of his knowledge.'
  id: totrans-2236
  prefs: []
  type: TYPE_NORMAL
  zh: 冲突：德里克与长命锁及其前所有者的过去联系使调查复杂化，因为他挣扎着揭示他全部知识的范围。
- en: 'Series Arc Development: Through their reluctant collaboration, Derek starts
    to respect Laura and Sera''s determination, hinting at a possible alliance against
    a common enemy.'
  id: totrans-2237
  prefs: []
  type: TYPE_NORMAL
  zh: 系列情节发展：通过他们不情愿的合作，德里克开始尊重劳拉和塞拉的决心，这暗示了他们可能联合对抗共同敌人的可能性。
- en: 'Book 3: "Echoes of the Ancient Druids"'
  id: totrans-2238
  prefs: []
  type: TYPE_NORMAL
  zh: 第三部：《古代德鲁伊的回声》
- en: 'Plot: An ancient druidic artifact is discovered, threatening to unleash forgotten
    powers. Derek''s expertise becomes crucial to understanding the artifact''s significance
    and stopping the impending disaster.'
  id: totrans-2239
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：发现了一个古老的德鲁伊神器，威胁要释放被遗忘的力量。德里克的专长对于理解神器的意义和阻止即将到来的灾难至关重要。
- en: 'Conflict: Derek''s secretive nature and his fear of the artifact''s power put
    him at odds with Laura and Sera, who advocate for transparency and caution.'
  id: totrans-2240
  prefs: []
  type: TYPE_NORMAL
  zh: 冲突：德里克的神秘性格和对神器力量的恐惧使他与主张透明度和谨慎的劳拉和塞拉产生矛盾。
- en: 'Series Arc Growth: The trio''s successful thwarting of the crisis serves as
    a turning point, with Derek beginning to value the strengths Laura and Sera bring
    to their uneasy alliance.'
  id: totrans-2241
  prefs: []
  type: TYPE_NORMAL
  zh: 系列弧成长：三人成功挫败危机，成为转折点，德里克开始重视劳拉和塞拉为他们不稳定的联盟带来的优势。
- en: 'Book 4: "The Phantom of Polperran"'
  id: totrans-2242
  prefs: []
  type: TYPE_NORMAL
  zh: 第四本书：“波尔佩兰的幽灵”
- en: 'Plot: A spectral figure begins haunting Polperran, linked to an artifact sold
    by Derek. His refusal to reveal the buyer puts him back in conflict with Laura
    and Sera, as they seek to solve the mystery and calm the town''s fears.'
  id: totrans-2243
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：一个幽灵般的形象开始困扰波尔佩兰，与德里克出售的神器有关。他拒绝透露买家，使他再次与劳拉和塞拉产生冲突，因为他们试图解决谜团并平息镇上的恐惧。
- en: 'Conflict: Derek''s pride and stubbornness lead him to initially handle the
    situation alone, worsening the haunting.'
  id: totrans-2244
  prefs: []
  type: TYPE_NORMAL
  zh: 冲突：德里克的骄傲和固执使他最初独自处理情况，加剧了困扰。
- en: 'Series Arc Evolution: Derek''s eventual capitulation and request for help demonstrate
    his growing trust in Laura and Sera, cementing their status as allies.'
  id: totrans-2245
  prefs: []
  type: TYPE_NORMAL
  zh: 系列弧进化：德里克最终屈服并寻求帮助，这表明他对劳拉和塞拉的信任日益增强，巩固了他们作为盟友的地位。
- en: 'Book 5: "The Mystic Emporium’s Secret"'
  id: totrans-2246
  prefs: []
  type: TYPE_NORMAL
  zh: 第五本书：“神秘商店的秘密”
- en: 'Plot: Derek discovers a hidden room in the Mystic Emporium, containing a powerful
    artifact that endangers him and the town. Faced with a threat beyond his control,
    Derek turns to Laura and Sera for help, revealing the depth of his transformation.'
  id: totrans-2247
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：德里克在神秘商店中发现了一个隐藏的房间，里面藏有一个危险的强大神器。面对超出他控制范围的威胁，德里克向劳拉和塞拉寻求帮助，揭示了其转变的深度。
- en: 'Conflict: The revelation of the Mystic Emporium''s secret tests Derek''s newfound
    alliance with Laura and Sera, as they navigate the dangers of the artifact.'
  id: totrans-2248
  prefs: []
  type: TYPE_NORMAL
  zh: 冲突：神秘商店秘密的揭露考验了德里克与劳拉和塞拉新建立的关系，他们必须应对神器的危险。
- en: 'Series Arc Conclusion: Their combined efforts to secure the artifact and protect
    Polperran highlight the strength of their bond. Derek, once a suspect and adversary,
    has become a true ally, showcasing the series'' theme of redemption and the power
    of collaboration.'
  id: totrans-2249
  prefs: []
  type: TYPE_NORMAL
  zh: 系列弧结局：他们共同确保神器安全并保护波尔佩兰的努力突显了他们之间关系的力量。德里克，曾经是嫌疑人和对立面，已成为真正的盟友，展示了系列的救赎主题和协作的力量。
- en: Series Arc Conclusion
  id: totrans-2250
  prefs: []
  type: TYPE_NORMAL
  zh: 系列弧结局
- en: Over the course of the series, Derek Sands transitions from a suspect hiding
    in the shadows of his Mystic Emporium to a key ally in the battle against supernatural
    threats.
  id: totrans-2251
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个系列中，德里克·桑德斯从神秘商店的阴影中隐藏的嫌疑人转变为对抗超自然威胁的关键盟友。
- en: His character arc of redemption and the deepening trust between him, Laura,
    and Sera enrich the overarching narrative of community, the blurred lines between
    good and evil, and the redemptive power of facing one's past.
  id: totrans-2252
  prefs: []
  type: TYPE_NORMAL
  zh: 他的人物弧线救赎以及他与劳拉和塞拉之间信任的加深丰富了关于社区、善与恶之间模糊界限以及面对过去救赎力量的整体叙事。
- en: The series concludes with the trio firmly united, ready to face whatever mysteries
    Polperran might hold next.
  id: totrans-2253
  prefs: []
  type: TYPE_NORMAL
  zh: 系列以三人团结一致结束，准备面对波尔佩兰可能带来的下一个谜团。
- en: Some interesting ideas here, linked to the murder investigation in this book
    and the other four books in the series.
  id: totrans-2254
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些有趣的想法，与本书以及系列中的其他四本书中的谋杀调查相关。
- en: What if? Derek was the one who sold the antique knitting needles used as the
    murder weapon to an online bidder. He never met the buyer but is caught up in
    the investigation.
  id: totrans-2255
  prefs: []
  type: TYPE_NORMAL
  zh: 如果……德里克是那个将作为谋杀武器的古董编织针卖给了在线竞标者的人。他从未见过买家，但被卷入了调查。
- en: What if? Derek had no idea that there is a group of guardians keeping these
    artefacts safe and he accidentally exposed them and their mission.
  id: totrans-2256
  prefs: []
  type: TYPE_NORMAL
  zh: 如果……德里克不知道有一群守护者正在保护这些神器，他无意中揭露了他们及其使命。
- en: I hope that you can see how ChatGPT can help you explore multiple story ideas
    very quickly and use them to build subplots based on the characters.
  id: totrans-2257
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你能看到ChatGPT如何帮助你快速探索多个故事想法，并利用它们根据角色构建副情节。
- en: Using subplots like these adds additional layers to the main external and internal
    conflicts and helps to demonstrate the character arcs of the two main characters
    – the sleuth and the murderer.
  id: totrans-2258
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这样的副线为主线的外部和内部冲突添加额外的层次，并有助于展示两个主要角色——侦探和凶手——的角色弧。
- en: 3\. Expand and Refine the Subplot Ideas
  id: totrans-2259
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 扩展和细化副线想法
- en: Copy the subplot or subplots generated by ChatGPT into a new text document.
  id: totrans-2260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将ChatGPT生成的副线或副线复制到一个新的文本文档中。
- en: Print out the text.
  id: totrans-2261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打印出文本。
- en: Step away from the computer.
  id: totrans-2262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 离开电脑。
- en: Start working through each subplot, developing your ideas for the secondary
    characters and the impact on the main characters.
  id: totrans-2263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开始逐个处理每个副线，发展你的次要角色想法以及它们对主要角色的影响。
- en: Have fun! If you don’t like one idea, change the prompt and ask ChatGPT for
    fresh suggestions.
  id: totrans-2264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有趣！如果你不喜欢一个想法，改变提示并让ChatGPT提供新的建议。
- en: Once you've chosen a subplot, ask ChatGPT to expand on it. This will help you
    understand the trajectory of the subplot and how it can integrate with your main
    plot.
  id: totrans-2265
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你选择了副线，请ChatGPT对其进行扩展。这将帮助你理解副线的轨迹以及它如何与你的主线融合。
- en: 4\. Weave the Continuity Subplots into Your Main Plot
  id: totrans-2266
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 将连续副线编织到主线中
- en: Ask ChatGPT for ideas on integrating the subplots into your main plot. This
    will ensure the subplots enhance your overall story and do not feel disconnected.
  id: totrans-2267
  prefs: []
  type: TYPE_NORMAL
  zh: 向ChatGPT寻求将副线整合到主线中的想法。这将确保副线增强你的整体故事，而不会感觉脱节。
- en: ChatGPT can be a valuable tool for brainstorming, developing, and integrating
    subplots into your novel, adding an extra layer of depth and complexity.
  id: totrans-2268
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以是一个宝贵的工具，用于头脑风暴、发展和整合副线到你的小说中，为你的故事增加额外的深度和复杂性。
- en: 'PART NINE: STORY STRUCTURE'
  id: totrans-2269
  prefs: []
  type: TYPE_NORMAL
  zh: 第九部分：故事结构
- en: How to Use Murder Mystery Story Structure
  id: totrans-2270
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用谋杀之谜故事结构
- en: How Are Stories Structured, And How Can You Build The Optimal Structure For
    Your Story?
  id: totrans-2271
  prefs: []
  type: TYPE_NORMAL
  zh: 故事是如何结构的，你如何为你的故事构建最佳结构？
- en: In this part of the book, I will share some of the deep story structure craft
    I have learned as a full-time writer. More importantly, I will explain how you
    can use that structure to take your story from good to great.
  id: totrans-2272
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的这一部分，我将分享我作为一名全职作家所学到的一些深入的故事结构技巧。更重要的是，我将解释你如何使用这个结构将你的故事从好变成伟大。
- en: The Power of Story Structure
  id: totrans-2273
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 故事结构的力量
- en: The process is the same whether you use story structure to create an outline
    for your mystery as part of your pre-writing process or come to it after making
    your first draft.
  id: totrans-2274
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是使用故事结构在你的神秘小说写作前制作提纲，还是在你完成第一稿后回过头来使用它，这个过程都是一样的。
- en: You are breaking your story into a pattern that readers of this genre will recognize.
  id: totrans-2275
  prefs: []
  type: TYPE_NORMAL
  zh: 你正在将你的故事分解成这个流派读者会认出的模式。
- en: What do I mean by that? Modern readers expect to be entertained.
  id: totrans-2276
  prefs: []
  type: TYPE_NORMAL
  zh: 我这是什么意思？现代读者期待被娱乐。
- en: In a cozy mystery, the author promises the reader that the sleuth will solve
    a crime by the end of the book.
  id: totrans-2277
  prefs: []
  type: TYPE_NORMAL
  zh: 在温馨神秘小说中，作者承诺读者侦探将在书的结尾解决一个罪行。
- en: In the process, you will take your readers on an emotional roller coaster of
    a journey with the sleuth – and the stages of that journey are very specific to
    cozy mystery fiction.
  id: totrans-2278
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个过程中，你将带领你的读者与侦探一起经历一段情感过山车般的旅程——而这个旅程的阶段对于温馨神秘小说来说非常具体。
- en: So, What Are These Story Structure Patterns?
  id: totrans-2279
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，这些故事结构模式是什么？
- en: My goal is to give you a solid framework for any cozy mystery you can adapt,
    use, take which parts make sense, and then apply it to your outline or draft.
  id: totrans-2280
  prefs: []
  type: TYPE_NORMAL
  zh: 我的目的是为你提供一个坚实的框架，你可以根据需要调整、使用，取其合理部分，然后将其应用到你的提纲或草稿中。
- en: Imagine that you are building a house.
  id: totrans-2281
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下你正在建造一栋房子。
- en: You start at the bottom with the foundations, the groundwork, the floor layout,
    and the underpinnings of the structure. Then, the building work begins for an
    office block, residential home, or retail store – whatever your plan dictates.
  id: totrans-2282
  prefs: []
  type: TYPE_NORMAL
  zh: 你从底部开始，有基础、地基、楼层布局和结构的支撑。然后，根据你的计划开始建造办公楼、住宅或零售店——无论你的计划是什么。
- en: Story structure is the equivalent foundations that underpin all of your work.
  id: totrans-2283
  prefs: []
  type: TYPE_NORMAL
  zh: 故事结构是支撑你所有工作的等效基础。
- en: On top of those foundations, you can build any fresh and new story you like,
    of any length and genre. The foundations of the story stay the same.
  id: totrans-2284
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些基础之上，你可以构建任何你喜欢的、任何长度和类型的全新故事。故事的基础保持不变。
- en: The story you build on those foundations is your creative genius - but you need
    that solid structural framework to support the weight of your story.
  id: totrans-2285
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些基础上构建的故事是你的创意天才——但你需要这个坚实的结构框架来支撑你故事的重量。
- en: Does that make sense? I hope so.
  id: totrans-2286
  prefs: []
  type: TYPE_NORMAL
  zh: 这说得通吗？我希望如此。
- en: Screenwriting Techniques and Fiction
  id: totrans-2287
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 电影剧本技巧和虚构作品
- en: The good news is that the same story structure techniques screenwriters use
    can be applied to fiction. And especially commercial genre fiction.
  id: totrans-2288
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，编剧使用的相同的故事结构技巧可以应用于虚构作品。特别是商业类型虚构作品。
- en: The best model for commercial genre fiction is the Four-Act story structure.
  id: totrans-2289
  prefs: []
  type: TYPE_NORMAL
  zh: 商业类型小说的最佳模式是四幕故事结构。
- en: Why? Because the goal of a screenwriter is precisely the same as that of a novelist—to
    create a compelling emotional journey for the audience/readers, and there can
    be no better journey than the up-and-down rollercoaster ride of crime fiction.
  id: totrans-2290
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？因为编剧的目标与小说家的目标完全相同——为观众/读者创造一个引人入胜的情感旅程，而没有什么比犯罪小说的起伏跌宕之旅更好的了。
- en: Murder Mystery Story Structure
  id: totrans-2291
  prefs: []
  type: TYPE_NORMAL
  zh: 谋杀谜案故事结构
- en: For me, the mystery story structure is made up of two layers.
  id: totrans-2292
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，神秘故事结构由两层组成。
- en: '#1\. A classical Four Act story plan that provides the backbone to all fiction,
    irrespective of genre.'
  id: totrans-2293
  prefs: []
  type: TYPE_NORMAL
  zh: '#1. 一个经典的四幕故事计划，为所有虚构作品提供骨架，无论类型如何。'
- en: '#2\. A top layer of compulsory scenes and plot events that are essential to
    every cozy murder mystery.'
  id: totrans-2294
  prefs: []
  type: TYPE_NORMAL
  zh: '#2. 一个顶层，包含每个温馨谋杀谜案必不可少的场景和情节事件。'
- en: Like any other fiction genre, cozy mysteries have obligatory scenes and a recognizable
    story structure. Readers expect to see a traditional pattern of events, clues
    and reveals, setbacks and dead ends, leading to a climax final confrontation between
    the sleuth and the real killer.
  id: totrans-2295
  prefs: []
  type: TYPE_NORMAL
  zh: 就像任何其他虚构类型一样，温馨谋杀谜案有必经场景和可识别的故事结构。读者期待看到传统的事件模式、线索和揭示、挫折和死胡同，最终导致侦探和真正凶手之间的传统高潮对抗。
- en: These chapters are added to the Four-Act framework like muscle and sinew on
    a skeleton, building up a murder mystery story with power, authenticity, and originality.
  id: totrans-2296
  prefs: []
  type: TYPE_NORMAL
  zh: 这些章节就像肌肉和肌腱一样添加到四幕框架中，以力量、真实性和原创性构建谋杀谜案故事。
- en: That’s why every cozy murder mystery may have the same basic underlying structure,
    but the outcome is unique and different – because the content of your obligatory
    scenes is your own.
  id: totrans-2297
  prefs: []
  type: TYPE_NORMAL
  zh: 这也是为什么每个温馨的谋杀谜案可能具有相同的基本底层结构，但结果却是独特且不同的——因为你的必经场景内容是你自己的。
- en: Classical Four-Act Story Structure
  id: totrans-2298
  prefs: []
  type: TYPE_NORMAL
  zh: 经典四幕故事结构
- en: In a properly structured movie or novel, the story consists of Four Acts, defined
    by nine key plot points. This means that your first draft of the novel needs to
    have a number of key dramatic twists, sudden obstacles, or reveals, called “turning
    points.” When the story shifts in some remarkable way or something is revealed,
    action must be taken, and the stakes increase. Here is a conflict plan for these
    twists.
  id: totrans-2299
  prefs: []
  type: TYPE_NORMAL
  zh: 在结构良好的电影或小说中，故事由四幕组成，由九个关键情节点定义。这意味着你的小说初稿需要包含一些关键戏剧性的转折、突如其来的障碍或揭示，称为“转折点”。当故事以某种显著的方式转变或揭示某事时，必须采取行动，并提高赌注。以下是这些转折点的冲突计划。
- en: '![Chart, line chart  Description automatically generated](image_rsrc45B.jpg)'
  id: totrans-2300
  prefs: []
  type: TYPE_IMG
  zh: '![图表，折线图  自动生成的描述](image_rsrc45B.jpg)'
- en: Scenes, Sequences, and Four Acts
  id: totrans-2301
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景、序列和四幕
- en: In classical story structure, scenes are collected into Sequences of scenes
    with a start, middle, and end for each Sequence.
  id: totrans-2302
  prefs: []
  type: TYPE_NORMAL
  zh: 在经典的故事结构中，场景被收集成场景序列，每个序列都有一个开始、中间和结束。
- en: Every scene ends with a turning point that hooks the next scene.
  id: totrans-2303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个场景都以一个转折点结束，这个转折点会吸引下一个场景。
- en: Every Sequence ends with a more significant turning point that hooks onto the
    next Scene Sequence.
  id: totrans-2304
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个序列都以一个更重要的转折点结束，这个转折点会吸引到下一个场景序列。
- en: Sequences of scenes are then collected together to form Acts.
  id: totrans-2305
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 场景序列随后被收集在一起形成幕。
- en: Every Act ends with a significant turning point that hooks onto the first scene
    of the following Sequence of the next Act.
  id: totrans-2306
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每一幕都以一个重要的转折点结束，这个转折点会吸引到下一幕序列的第一个场景。
- en: '![A diagram of a sequence  Description automatically generated](image_rsrc45C.jpg)'
  id: totrans-2307
  prefs: []
  type: TYPE_IMG
  zh: '![序列的图解  自动生成的描述](image_rsrc45C.jpg)'
- en: In this way, the story moves on and builds, and instead of a sagging middle,
    the emotional and story tension builds at a controlled pace that will have the
    readers turning the page to find out what happens next.
  id: totrans-2308
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式，故事得以继续发展并构建，而不是出现拖沓的中段，情感和故事张力以可控的速度逐渐增强，这将促使读者翻页以了解接下来会发生什么。
- en: In this way, the story moves on and builds, and each scene, Sequence of scenes,
    and Act pivots into the next unit of action, and there are no sagging middles.
  id: totrans-2309
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式，故事得以继续发展并构建，每个场景、场景序列和幕都转向下一个动作单元，并且没有拖沓的中段。
- en: What’s more, the twist at the end of every scene, scene Sequence, and then Act
    ensures that the tension and conflict are always building, keeping the story moving
    and the reader totally hooked on your story. You are totally in control over how
    you create a page-turning read!
  id: totrans-2310
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，每个场景、场景序列和幕的结尾的转折确保了紧张和冲突始终在增加，使故事不断推进，让读者完全沉浸在你的故事中。你完全控制着如何创造一个让人翻页欲罢不能的阅读体验！
- en: Sequences and Chapters
  id: totrans-2311
  prefs: []
  type: TYPE_NORMAL
  zh: 序列和章节
- en: A Sequence is a collection of scenes divided into chapters. Each sequence builds
    into an Act in the 4-act Structure. For most genre fiction novels, there could
    be two or three scenes in a Sequence, and each chapter is a Sequence.
  id: totrans-2312
  prefs: []
  type: TYPE_NORMAL
  zh: 序列是一系列场景的集合，分为章节。每个序列构建成一个4幕结构中的幕。对于大多数类型小说小说，一个序列中可能有二到三个场景，每个章节都是一个序列。
- en: A chapter in genre fiction can contain one scene or several scenes, depending
    on their length and the target word count of the complete book. Clearly, the number
    of scenes in each chapter will depend on the length of your work.
  id: totrans-2313
  prefs: []
  type: TYPE_NORMAL
  zh: 在类型小说中，一个章节可以包含一个场景或几个场景，这取决于它们的长度以及整本书的目标字数。显然，每个章节中的场景数量将取决于你作品的长短。
- en: How to Use Story Structure
  id: totrans-2314
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用故事结构
- en: STEP ONE
  id: totrans-2315
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步
- en: I start by breaking the storyline down into four Acts. Each of the four Acts
    has six Sequences of scenes collected together into chapters, so I start with
    an outline of 24 chapters.
  id: totrans-2316
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先将故事情节分解为四个幕。每个幕有六个场景序列收集在一起形成章节，所以我开始于24章的提纲。
- en: It is easier to call this a 24-chapter Plot Outline as opposed to a 24-Sequence
    Plot Outline.
  id: totrans-2317
  prefs: []
  type: TYPE_NORMAL
  zh: 与其称之为24序列情节大纲，不如称之为24章情节大纲。
- en: You may not need 24 chapters, or you might need to add more steps, but it is
    somewhere to start.
  id: totrans-2318
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能不需要24章，或者你可能需要添加更多步骤，但这是一个开始的地方。
- en: For very fast-paced mystery novels, each chapter may only contain one long scene.
    It is entirely up to you!
  id: totrans-2319
  prefs: []
  type: TYPE_NORMAL
  zh: 对于节奏非常快的悬疑小说，每个章节可能只包含一个长场景。这完全取决于你！
- en: I see this plot outline as signposts that take the reader from the start to
    the end of the murder mystery journey.
  id: totrans-2320
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这个情节大纲就像是指路牌，将读者从谋杀谜案的起点带到终点。
- en: Important. My personal story structure map is not a formula or join-the-dots
    writing but rather a story pattern that I think cozy mystery readers (like me)
    will recognize and enjoy.
  id: totrans-2321
  prefs: []
  type: TYPE_NORMAL
  zh: 重要。我个人的故事结构图不是一个公式或连线写作，而是一种我认为轻松悬疑小说读者（像我一样）会认可并喜欢的叙事模式。
- en: This works for me, but it may not fit your project or writing process well.
    Go with whatever works for you!
  id: totrans-2322
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我有效，但可能不适合你的项目或写作过程。选择对你有效的方法吧！
- en: One thing is certain. The plot is built up by the actions that the characters
    take under pressure.
  id: totrans-2323
  prefs: []
  type: TYPE_NORMAL
  zh: 一件事是肯定的。情节是通过角色在压力下采取的行动构建起来的。
- en: '#Character is revealed by their actions, reactions, and extraordinary decisions
    in response to challenges introduced by the murder and subsequent investigation.'
  id: totrans-2324
  prefs: []
  type: TYPE_NORMAL
  zh: '#人物通过他们的行动、反应以及对谋杀和随后的调查所提出的挑战做出的非凡决策来展现。'
- en: '![Diagram  Description automatically generated](image_rsrc45D.jpg)'
  id: totrans-2325
  prefs: []
  type: TYPE_IMG
  zh: '![图表描述自动生成](image_rsrc45D.jpg)'
- en: '#In turn, the plot is driven by those reactions and decisions in a series of
    Scenes and Sequels to those scenes where the decision taken at the end of one
    scene triggers the response to that action in the opening of the next scene.'
  id: totrans-2326
  prefs: []
  type: TYPE_NORMAL
  zh: '#反过来，情节是由一系列场景和续集中的反应和决策驱动的，其中一幕结尾处的决策触发下一幕开头的行动反应。'
- en: Start by building a solid sense of who your main characters are. Then, add a
    dilemma, challenge, or conflict. Their responses, actions, and decisions will
    automatically generate your plot. Then, you can start shaping those reactions
    into the best form possible for this story.
  id: totrans-2327
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，构建你主要人物稳固的形象感。然后，加入一个困境、挑战或冲突。他们的反应、行动和决策将自动生成你的情节。然后，你可以开始将这些反应塑造成最适合这个故事的最佳形式。
- en: Build a Full Synopsis
  id: totrans-2328
  prefs: []
  type: TYPE_NORMAL
  zh: 构建完整的概要
- en: At this point, you have completed a lot of pre-writing. Now it’s time to consolidate
    your story pitch and all your notes, draft text, and snatches of ideas into one
    place.
  id: totrans-2329
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你已经完成了大量的预写工作。现在，是时候将你的故事提案以及所有笔记、草稿文本和想法片段整理到一处。
- en: I have found that the best way to do this is to create an extended synopsis
    of a story that includes all of the elements that I have been working on, including
    the character profiles, subplots, and settings.
  id: totrans-2330
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现，最好的方法是为故事创建一个扩展的概要，其中包括我一直在工作的所有元素，包括人物档案、副线和场景。
- en: Once you have your full synopsis on paper, it is much easier to review the options
    you have developed at this point critically.
  id: totrans-2331
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你的完整概要在纸上，就更容易批判性地回顾你在此阶段开发出的选项。
- en: Note. Some discovery writers may prefer to go straight into working on the manuscript
    and combine all the pre-writing into the page's text. And that’s brilliant if
    it works for you.
  id: totrans-2332
  prefs: []
  type: TYPE_NORMAL
  zh: 注意。一些发现式作家可能更喜欢直接开始处理手稿，并将所有预写作内容都融入页面的文本中。如果你这样做有效，那真是太棒了。
- en: Will the story change once you start writing? Of course. And that is how it
    should be. But at this stage, the better the synopsis and plot outline, the better
    the story.
  id: totrans-2333
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦开始写作，故事会发生变化吗？当然会。这正是应该的样子。但在这个阶段，概要和情节大纲越好，故事就会越好。
- en: You can start writing and be confident that you have a plot that is flexible
    enough to adapt to new ideas and characters but strong enough to carry the type
    of cozy mystery that you want to write.
  id: totrans-2334
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以开始写作，并确信你有一个足够灵活的情节，可以适应新的想法和人物，但同时也足够强大，可以承载你想要写的温馨悬疑小说类型。
- en: The 24-Chapter Cozy Mystery Template
  id: totrans-2335
  prefs: []
  type: TYPE_NORMAL
  zh: 24章温馨悬疑小说模板
- en: 'In this chapter, I want to introduce you to my favorite outlining method for
    writing commercial cozy mystery fiction: The 24-chapter Cozy Mystery Plot Template.'
  id: totrans-2336
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一章中，我想向你介绍我最喜欢的用于撰写商业温馨悬疑小说的大纲方法：24章温馨悬疑情节模板。
- en: This outline works well for the first draft of a cozy mystery novel of 50,000
    to 70,000 words, with about 2,000 to 3,000+ words per chapter.
  id: totrans-2337
  prefs: []
  type: TYPE_NORMAL
  zh: 这种大纲非常适合50,000到70,000字的温馨悬疑小说初稿，每章大约有2,000到3,000+字。
- en: Of course, you can have as many or as few chapter breaks as you wish. This can
    vary with your sub-genre, and you may want shorter, faster-paced chapters, for
    example. It's no problem. The plotline and combined character arcs are the same.
  id: totrans-2338
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，你可以根据需要设置尽可能多的或尽可能少的章节分隔。这可能会随着你的子类型而变化，你可能想要更短、节奏更快的章节，例如。这没问题。情节线和结合的角色弧线是相同的。
- en: It can easily be adapted for cozy mystery novellas by using the novel outline
    as fundamental story plot points to be included in any novel, but over a smaller
    word count.
  id: totrans-2339
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用小说大纲作为基本的故事情节点，并将其包含在任何小说中，但字数较少，这种方法可以很容易地适应温馨悬疑小说。
- en: Whether you start with an outline or allow it to emerge during the writing,
    the final novel, novella, or short story should meet and exceed the reader's expectations
    and stay true to your vision as a writer.
  id: totrans-2340
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是从大纲开始，还是允许它在写作过程中自然出现，最终的小说、中篇小说或短篇小说都应该满足并超越读者的期望，并忠实于你作为作家的愿景。
- en: The best way to do this is to create a working initial outline of the plot before
    you start fleshing out chapters, dialogue, settings, and descriptions. No more
    “sagging middle” scenes where the emotional tension flags.
  id: totrans-2341
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始细化章节、对话、场景和描述之前，创建一个工作性的初步情节大纲是做这件事的最佳方式。不再有“情节低谷”场景，情感张力减弱。
- en: The good news is that this outlining method is a great way to brainstorm story
    ideas fast, and it works as a starting point for any cozy mystery fiction of any
    length.
  id: totrans-2342
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，这种大纲方法是快速构思故事想法的好方法，并且它可以作为任何长度的温馨悬疑小说的起点。
- en: Do you have to stick to the plot rigidly once the writing takes over? Not at
    all.
  id: totrans-2343
  prefs: []
  type: TYPE_NORMAL
  zh: 写作接管后，你一定要严格遵循情节吗？一点必要都没有。
- en: The whole purpose of outlining is to create an overall starting structure for
    your plot that you can use to entice you into this story world and meet the people
    who live there.
  id: totrans-2344
  prefs: []
  type: TYPE_NORMAL
  zh: 概括来说，大纲的整个目的是为你构建一个整体的起点结构，你可以用它来吸引你进入这个故事世界，遇见那里生活的人们。
- en: If you have an even stronger idea when your characters take over, that’s excellent!
    Go for it.
  id: totrans-2345
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的人物接管时有一个更强烈的想法，那真是太好了！去追求它吧。
- en: That’s how it should be. Your outline should always be a working tool. Not a
    fixed and inflexible constraint.
  id: totrans-2346
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是应该的样子。你的大纲始终应该是一个工作工具。而不是一个固定且僵化的约束。
- en: The 24-chapter outline builds on the 4-act Story Structure and helps to flesh
    out each step so that you can start writing a first draft that you know will build
    into an engaging, cozy mystery for your readers – and be fun to write.
  id: totrans-2347
  prefs: []
  type: TYPE_NORMAL
  zh: 24章大纲建立在4幕故事结构之上，有助于细化每个步骤，这样你就可以开始写一个你确信会吸引读者、成为引人入胜的温馨悬疑小说的第一稿——而且写作过程也会很有趣。
- en: Since this is the first draft of the outline for your cozy mystery, you should
    not worry about making each word perfect. On the contrary, at this point, you
    may be working with bullet points and fragments of dialogue or story ideas.
  id: totrans-2348
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这是你温馨悬疑小说大纲的第一稿，你不必担心每个词都要完美。相反，在这个阶段，你可能正在使用项目符号和对话片段或故事想法。
- en: And that is fine. Your story. Your process.
  id: totrans-2349
  prefs: []
  type: TYPE_NORMAL
  zh: 这完全没问题。你的故事。你的过程。
- en: Breaking the book into Acts and then chapters can help you avoid feeling overwhelmed
    by its size and the amount of work ahead.
  id: totrans-2350
  prefs: []
  type: TYPE_NORMAL
  zh: 将书籍分成幕和章节可以帮助你避免因书籍的规模和即将到来的工作量而感到不知所措。
- en: A first draft of 72,000 words with 24 chapters is about 3,000 words a chapter.
    This could be one long chapter or two shorter chapters. Whatever works for you.
  id: totrans-2351
  prefs: []
  type: TYPE_NORMAL
  zh: 一个包含 24 章的初稿，约 72,000 字，每章大约 3,000 字。这可以是一个很长的章节，也可以是两个较短的章节。无论哪种方式对你来说都适用。
- en: Because you have a plot outline for the entire story, you know what each chapter
    has to achieve – although you can change the outline at any time.
  id: totrans-2352
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你有整个故事的故事大纲，你知道每一章需要达到什么目标——尽管你可以在任何时候更改大纲。
- en: This is getting the story down and the characters onto the page, acting and
    reacting, and revealing more about themselves.
  id: totrans-2353
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是将故事和人物写下来，让他们行动和反应，并更多地揭示他们自己。
- en: Using ChatGPT with Plot Outline Templates
  id: totrans-2354
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 与情节大纲模板
- en: This is when we take the working full synopsis we have created for our cozy
    mystery and flesh it out into a high-level plot outline for the entire novel.
  id: totrans-2355
  prefs: []
  type: TYPE_NORMAL
  zh: 这时，我们将为我们的温馨谋杀案所创作的完整梗概进行扩展，形成一个整个小说的高级情节大纲。
- en: 'ChatGPT is familiar at a basic level with several different outlining templates,
    including:'
  id: totrans-2356
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 在基本层面上熟悉几种不同的大纲模板，包括：
- en: 4-Act Story Structure
  id: totrans-2357
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 4幕故事结构
- en: Save the Cat
  id: totrans-2358
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Save the Cat
- en: The Hero’s Journey.
  id: totrans-2359
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 英雄之旅。
- en: The choice of story plot template will depend on your niche.
  id: totrans-2360
  prefs: []
  type: TYPE_NORMAL
  zh: 故事情节模板的选择将取决于你的领域。
- en: For example, the Hero’s Journey template would be a good choice if you are writing
    a traditional or paranormal mystery. However, I recommend testing your outline
    against the 24-chapter plot outline to ensure that your cozy mystery will deliver
    the type of modern murder mystery plot readers expect.
  id: totrans-2361
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你正在写一部传统或超自然神秘小说，英雄之旅模板将是一个不错的选择。然而，我建议将你的大纲与 24 章情节大纲进行对比，以确保你的温馨谋杀案能够提供读者期望的现代谋杀谜案情节。
- en: General Plot Outline Prompt
  id: totrans-2362
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一般情节大纲提示
- en: 'Prompt: Using the following synopsis, create a detailed summary of the story,
    fleshing out all additional details and breaking it into parts using the [Outline
    Template of Choice]: [text of the entire story synopsis]'
  id: totrans-2363
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：使用以下梗概，为故事创建一个详细的摘要，详细说明所有附加细节，并使用[所选大纲模板]将其分成几个部分：[整个故事梗概的文本]
- en: For the best results, we will train ChatGPT to use this 24-chapter cozy mystery
    plot template to create the plot outline for our cozy mystery novel.
  id: totrans-2364
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得最佳结果，我们将训练 ChatGPT 使用这个 24 章温馨谋杀案情节模板来为我们的温馨谋杀案小说创建情节大纲。
- en: 'ChatGPT does not know about this template and has not been trained on it, so
    this process needs two separate prompts:'
  id: totrans-2365
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 不了解这个模板，也没有接受过这方面的训练，因此这个过程需要两个独立的提示：
- en: '#1\. Ask ChatGPT to learn and remember the 24-chapter Cozy Murder Mystery Plot
    Template.'
  id: totrans-2366
  prefs: []
  type: TYPE_NORMAL
  zh: '#1. 请 ChatGPT 学习并记住 24 章温馨谋杀谜案情节模板。'
- en: '#2\. Ask ChatGPT to apply the 24-chapter Cozy Murder Mystery Plot Template
    to our story synopsis to generate a chapter-by-chapter outline.'
  id: totrans-2367
  prefs: []
  type: TYPE_NORMAL
  zh: '#2. 请 ChatGPT 将 24 章温馨谋杀谜案情节模板应用于我们的故事梗概，以生成逐章大纲。'
- en: 'Note: For this demonstration, I am using ChatGPT-4.'
  id: totrans-2368
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：在这个演示中，我使用的是 ChatGPT-4。
- en: '![](image_rsrc45E.jpg)'
  id: totrans-2369
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc45E.jpg)'
- en: The following is a 24-chapter cozy mystery outline template that we will use
    today. Please process this. You can say it any number of ways and hold it in your
    memory for later use. Say, "Read," if you understand.
  id: totrans-2370
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是我们今天将使用的 24 章温馨谋杀案大纲模板。请处理这个。你可以用任何方式说出来，并记住它以备后用。如果你理解了，可以说“阅读”。
- en: '![](image_rsrc45F.jpg)'
  id: totrans-2371
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc45F.jpg)'
- en: Read.
  id: totrans-2372
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读。
- en: '![](image_rsrc45G.jpg)'
  id: totrans-2373
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc45G.jpg)'
- en: 'ACT ONE: Setting up the Sleuth in their Ordinary World'
  id: totrans-2374
  prefs: []
  type: TYPE_NORMAL
  zh: 第一幕：在普通世界中为侦探设定场景
- en: 'Chapter 1\. Introduce the sleuth in their ordinary world: hook the reader in
    the first paragraph by hinting at a turning point or crisis in the life of the
    sleuth main character. Quickly establish the setting, period, tone, style, and
    point of view of the story.'
  id: totrans-2375
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章。介绍侦探在他们的普通世界中的情况：在第一段中通过暗示侦探主角生活中的转折点或危机来吸引读者的兴趣。迅速确立故事的背景、时期、基调、风格和视角。
- en: 'Chapter 2\. The sleuth faces challenges in the ordinary world and takes action:
    show how the sleuth is making decisions in the face of new challenges, forcing
    them to move to a different world or way of thinking.'
  id: totrans-2376
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章。侦探在普通世界中面临挑战并采取行动：展示侦探如何面对新的挑战做出决策，迫使他们进入不同的世界或思维方式。
- en: 'Chapter 3\. The Inciting Incident: this is a  significant event that completely
    disrupts the life of the sleuth. In a cozy murder mystery it is most likely to
    be the discovery of the first murder victim.'
  id: totrans-2377
  prefs: []
  type: TYPE_NORMAL
  zh: 第3章. 诱发事件：这是一个完全打乱侦探生活的重大事件。在一个温馨的谋杀谜案中，这很可能是发现第一个谋杀受害者。
- en: 'Chapter 4\. Reaction to the Inciting Incident: establish what is at stake and
    make this crime personal to the sleuth.'
  id: totrans-2378
  prefs: []
  type: TYPE_NORMAL
  zh: 第4章. 对诱发事件的反应：确定风险所在，并让这个罪行对侦探来说变得个人化。
- en: 'Chapter 5\. Refusal of the call to action: show how the sleuth debates what
    to do with her sidekicks or family. Can they return to their ordinary world? Introduce
    a mentor or sidekick or friend for the sleuth. The mentor character encourages
    the sleuth and reassures them that they can cope and be strong.'
  id: totrans-2379
  prefs: []
  type: TYPE_NORMAL
  zh: 第5章. 拒绝行动号召：展示侦探如何与她的助手或家人争论该做什么。他们能回到普通世界吗？为侦探介绍一个导师或助手或朋友。导师角色鼓励侦探，并让他们确信他们能够应对并变得坚强。
- en: 'Chapter 6\. The Sleuth commits to solving the murder: make the stakes real
    for the sleuth – what does she stand to lose if she does not find the killer?
    The sleuth must be strongly motivated and have personal stakes in the investigation.
    Make her DRIVE the action, not just respond to it. There is no going back now.'
  id: totrans-2380
  prefs: []
  type: TYPE_NORMAL
  zh: 第6章. 侦探承诺解决谋杀案：让侦探意识到她如果不找到凶手将面临什么损失——让她有强烈的动机，并在调查中有个人利益。让她主动推动行动，而不仅仅是被动应对。现在没有回头路了。
- en: 'ACT TWO: The Sleuth begins the Investigation'
  id: totrans-2381
  prefs: []
  type: TYPE_NORMAL
  zh: 第二幕：侦探开始调查
- en: 'Chapter 7\. Assembling the Team: introduce the sleuth to her new allies and
    sidekicks. Each of them has their own specific quirks and interests. Can also
    introduce a potential love interest and antagonists.'
  id: totrans-2382
  prefs: []
  type: TYPE_NORMAL
  zh: 第7章. 组建团队：向侦探介绍她的新盟友和助手。他们每个人都有自己独特的怪癖和兴趣。也可以介绍一个潜在的爱情对象和对手。
- en: 'Chapter 8\. The investigation begins with the obvious suspects: introduce the
    key suspects who were closest to the victim and had established motives for killing
    them. Reveal how the sleuth questions them and starts to compile a picture of
    what really happened with the murder.'
  id: totrans-2383
  prefs: []
  type: TYPE_NORMAL
  zh: 第8章. 调查从明显的嫌疑人开始：介绍与受害者关系最近、有杀害他们的动机的关键嫌疑人。揭示侦探如何审问他们，并开始拼凑出谋杀案真正发生的情况。
- en: 'Chapter 9\. Balancing sub-plot: focus on a romance or secondary plot, linked
    to the main plot in some way. Show how this acts to add humor and a shift in tone
    to balance out the murder investigation. At the end of this chapter, reveal a
    ramp up in conflict where the killer shows the sleuth that they are very much
    still in charge.'
  id: totrans-2384
  prefs: []
  type: TYPE_NORMAL
  zh: 第9章. 平衡副线：关注一段爱情或次要情节，以某种方式与主线情节相联系。展示这是如何通过增加幽默和改变语气来平衡谋杀调查。在这一章的结尾，揭示冲突升级，凶手向侦探展示他们仍然完全掌控着局势。
- en: 'Chapter 10\. Motives and secrets are revealed: The motives of more potential
    suspects are revealed. The suspects are as clever and devious as the sleuth and
    recognize that this sleuth is a threat.'
  id: totrans-2385
  prefs: []
  type: TYPE_NORMAL
  zh: 第10章. 揭示动机和秘密：更多潜在嫌疑人的动机被揭示。嫌疑人与侦探一样聪明和狡猾，并意识到这个侦探对他们构成威胁。
- en: 'Chapter 11.  Reaction to this new information: show how the sleuth often has
    a sidekick who has their own way of discovering buried details. Additional problems
    and information emerge that have to be dealt with.'
  id: totrans-2386
  prefs: []
  type: TYPE_NORMAL
  zh: 第11章. 对新信息的反应：展示侦探通常有一个助手，他们有自己的方式来发现隐藏的细节。出现了一些必须解决的问题和信息。
- en: 'Chapter 12\. Midpoint of No Return: introduce another murder or serious attack
    or other event.  This is a major new development, huge revelation, and a serious
    new threat from the killer and his or her accomplices if they have them. This
    drives the next section of the book and provides new clues. This event could be
    the disappearance of one or more suspects or some major new information. The sleuth
    has to fight back and is even more determined to find the killer.'
  id: totrans-2387
  prefs: []
  type: TYPE_NORMAL
  zh: 第12章. 不可回头的中间点：介绍另一个谋杀案、严重攻击或其他事件。这是一个重大新进展，巨大的揭露，以及来自凶手及其同伙的严重新威胁（如果有的话）。这推动了书的下一部分，并提供了新的线索。这个事件可能是失踪一个或多个嫌疑人或一些重大新信息。侦探必须反击，并更加坚定地寻找凶手。
- en: 'ACT THREE: Increased Danger and Pressure on the Sleuth'
  id: totrans-2388
  prefs: []
  type: TYPE_NORMAL
  zh: 第三幕：侦探面临更大的危险和压力
- en: 'Chapter 13\. Reaction to the Midpoint Event: reveal how this major event sends
    the sleuth off in a new direction. The sleuth was on the wrong track. They need
    to change the focus of the investigation after what has happened.'
  id: totrans-2389
  prefs: []
  type: TYPE_NORMAL
  zh: 第13章. 对中间事件的反应：揭示这个重大事件如何让侦探走向新的方向。侦探走错了路。在发生这一切之后，他们需要改变调查的重点。
- en: 'Chapter 14\. The Killer is Blocking the Investigation: Show how the sleuth
    and allies have to regroup and come up with a new plan in response to this new
    attack or new death.'
  id: totrans-2390
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章\. 凶手阻碍调查：展示侦探和盟友如何针对这种新的攻击或新的死亡重新集结并制定新的计划。
- en: 'Chapter 15\. Alibis and Clues: sees the sleuth following up on alibis and gathering
    information on the second event or murder where a trail of evidence leads to one
    or more suspects.  Suspects refute evidence pointing to them from the first murder.'
  id: totrans-2391
  prefs: []
  type: TYPE_NORMAL
  zh: 第15章\. 伪证和线索：看到侦探跟进伪证，收集关于第二起事件或谋杀的信息，其中一条证据线索指向一个或多个嫌疑人。嫌疑人反驳指向第一起谋杀的证据。
- en: 'Chapter 16\. Motives and Secrets: reveal hidden motives and secrets for the
    key suspects. This could be linked to previous clues and revelations. Secret relationships
    come to light, such as business arrangements, romantic involvement, scores to
    be settled or previously unknown connections between characters.'
  id: totrans-2392
  prefs: []
  type: TYPE_NORMAL
  zh: 第16章\. 动机和秘密：揭示关键嫌疑人的隐藏动机和秘密。这可能与之前的线索和揭露有关。揭露秘密关系，例如商业安排、浪漫关系、待解决账目或人物之间之前未知的联系。
- en: SECTION BREAK. Pinch point marks a significant increase in danger to the sleuth
    and allies. Show that there is a ramp up in conflict where the real killer or
    their helpers shows the sleuth that they are very much still in charge.
  id: totrans-2393
  prefs: []
  type: TYPE_NORMAL
  zh: 部分分隔符。瓶颈点标志着侦探和盟友面临危险的大幅增加。展示冲突升级，真正的凶手或其帮凶向侦探展示他们仍然完全掌控局面。
- en: 'Chapter 17\. More Complications: sees the sleuth blocked in their investigations:
    show how the sleuth has to reassess what they know so far with the sidekicks so
    that all the options are explored. Reveal how the suspects are being narrowed
    down and the sleuth discovers more about the real killer and their motivation.
    Show how the real chain of events starts to emerge, and more secrets are revealed.'
  id: totrans-2394
  prefs: []
  type: TYPE_NORMAL
  zh: 第17章\. 更多复杂情况：看到侦探在调查中被阻碍：展示侦探如何与助手一起重新评估他们目前所知道的情况，以便探索所有选项。揭示嫌疑人的范围正在缩小，侦探发现更多关于真正凶手及其动机的信息。展示真正的事件链开始浮现，更多秘密被揭露。
- en: 'Chapter 18\. Apparent Defeat: everything fails and blows up in their faces:
    sees the sleuth questioning whether they will ever be able to find the killer.
    Show how someone betrays the sleuth, the suspects have been framed, or the killer
    is threatening to hurt people the sleuth cares about. The solution to the crime
    appears to be impossible. The killer uses clever misdirection to put them on the
    wrong track. Misinterpretation of clues or mistaken conclusions have led the sleuth
    in the wrong direction.'
  id: totrans-2395
  prefs: []
  type: TYPE_NORMAL
  zh: 第18章\. 表面上的失败：一切失败并化为泡影：看到侦探质疑他们是否能够找到凶手。展示有人背叛了侦探，嫌疑人被陷害，或者凶手威胁要伤害侦探关心的人。犯罪的解决方案似乎是不可能的。凶手使用巧妙的误导将他们引向错误的方向。对线索的误解或错误的结论将侦探引向错误的方向。
- en: 'ACT FOUR: Confrontation and Resolution'
  id: totrans-2396
  prefs: []
  type: TYPE_NORMAL
  zh: 第四幕：对抗与解决
- en: 'Chapter 19\. Regroup: show how the sleuth has to step back and regroup with
    their sidekicks and allies after their apparent defeat. These mentors and allies
    convince the sleuth not to give up.'
  id: totrans-2397
  prefs: []
  type: TYPE_NORMAL
  zh: 第19章\. 重组：展示侦探在看似失败后如何与他们的助手和盟友退后一步重新集结。这些导师和盟友说服侦探不要放弃。
- en: 'Chapter 20\. Secrets and New Directions: reveal how the sleuth discovers a
    secret about one or more suspects, which sets them on a new path to the real killer.
    They have been going about this totally wrong. Show how this is often in the form
    of a history lesson linking the murder to the potential suspects. All the secrets
    are revealed. The killer’s motivation has to be powerful. This can be linked to
    the sub-plot.'
  id: totrans-2398
  prefs: []
  type: TYPE_NORMAL
  zh: 第20章\. 秘密和新方向：揭示侦探发现有关一个或多个嫌疑人的秘密，这使他们走上了通向真正凶手的新的道路。他们一直在完全错误的方向上。展示这通常是以历史课的形式出现的，将谋杀与潜在嫌疑人联系起来。所有秘密都被揭露。凶手的动机必须强大。这可以与副情节联系起来。
- en: 'Chapter 21\. The sleuth is back on track: sees the sleuth collecting together  the  final
    puzzle pieces based on the evidence. Most of the clues and revelations have been
    picked up already during the investigation. Now they make sense. Reveal how the
    sleuth finds the strength to unlock the killer’s secrets in a sudden twist and
    the killer is finally revealed.'
  id: totrans-2399
  prefs: []
  type: TYPE_NORMAL
  zh: 第21章\. 侦探重回正轨：看到侦探根据证据收集最后的拼图碎片。大多数线索和揭露已经在调查过程中收集到。现在它们有了意义。揭示侦探如何在突然的转折中找到力量解开凶手的秘密，凶手最终被揭露。
- en: 'Chapter 22\. A New Action plan: reveal how  the sleuth has a revelation about
    a clue and suspect and realizes that she been going about things in the wrong
    way. She needs a new action plan and has to work quickly. The friends, family
    and allies come together to create a plan. They agree to go forwards, even if
    there is only a small chance of success.'
  id: totrans-2400
  prefs: []
  type: TYPE_NORMAL
  zh: 第22章. 新的行动计划：揭示侦探对线索和嫌疑人的启示，并意识到自己一直在错误的方向上行事。她需要一个新行动计划，并必须迅速行动。朋友们、家人和盟友聚集在一起制定计划。他们同意即使成功的机会很小也要前进。
- en: 'SECTION BREAK. Direct confrontation with the killer: sees the sleuth engaged
    in a one-on-one confrontation with the killer where the sleuth demonstrates their
    determination to get to the truth and find justice for the murder victim. Make
    the pacing of this scene quick, but you should not cheat the reader out of emotional
    reactions, either during the scene or afterwards. Don’t rush the fight scene.
    Reveal every heartbeat, every pulse pounding moment of fear.'
  id: totrans-2401
  prefs: []
  type: TYPE_NORMAL
  zh: 段落分隔。与凶手的直接对抗：看到侦探与凶手进行一对一的对抗，侦探展示了他们决心查明真相并为谋杀受害者寻求正义。使这一场景的节奏快速，但也不应该让读者在场景中或之后失去情感反应。不要急于处理打斗场景。揭示每一个心跳，每一个恐惧的脉搏跳动时刻。
- en: 'Chapter 23\. The Grand Finale: show how the killer tries to escape, but the
    sleuth and their sidekicks and allies work together to defeat them.'
  id: totrans-2402
  prefs: []
  type: TYPE_NORMAL
  zh: 第23章. 最终高潮：展示凶手如何试图逃脱，但侦探及其助手和盟友共同努力击败他们。
- en: 'Chapter 24\. Resolution of the main plot and sub-plots: show that  after the
    killer has been found, the sleuth had a quiet moment with friends, sidekicks,
    love interests and family as they review events. Use this chapter to show the
    full character growth of the sleuth. The sleuth demonstrates the character growth
    and character arc which occurs because she steps outside her comfort zone to investigate
    this death. Show the sleuth back in the old world as a different person.  The
    mystery has to be completely solved – but maybe add a hint or a hook for the next
    story in the series.'
  id: totrans-2403
  prefs: []
  type: TYPE_NORMAL
  zh: 第24章. 主要情节和副情节的解决：展示凶手被发现后，侦探与朋友们、助手、恋人及家人一起回顾事件。用这一章展示侦探的完整性格成长。侦探展示了由于她走出舒适区调查这起死亡事件而发生的性格成长和性格弧线。展示侦探回到旧世界时已成为不同的人。谜团必须完全解开——但也许为系列故事的下一部添加一个暗示或钩子。
- en: '![](image_rsrc45H.jpg)'
  id: totrans-2404
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc45H.jpg)'
- en: Understood, I have processed the 24-chapter cozy mystery outline template and
    will retain this information for later use.
  id: totrans-2405
  prefs: []
  type: TYPE_NORMAL
  zh: 明白了，我已经处理了24章温馨悬疑情节提纲模板，并将保留此信息以供以后使用。
- en: '#2\. Ask ChatGPT to apply the 24-Chapter Cozy Mystery Plot Template to our
    story synopsis to generate a chapter-by-chapter outline.'
  id: totrans-2406
  prefs: []
  type: TYPE_NORMAL
  zh: '#2. 请ChatGPT将24章温馨悬疑故事情节模板应用到我们的故事梗概中，以生成逐章的提纲。'
- en: Great! Now that ChatGPT has learned the plot outline template, we can use it
    to create a 24-chapter outline for our contemporary cozy mystery using the synopsis
    you have generated.
  id: totrans-2407
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了！现在ChatGPT已经学会了情节提纲模板，我们可以使用它来创建一个24章提纲，用于我们的当代温馨悬疑故事，使用你生成的梗概。
- en: General Plot Outline Prompt
  id: totrans-2408
  prefs: []
  type: TYPE_NORMAL
  zh: 一般情节提纲提示
- en: 'Prompt: Using the following synopsis, create a summary of the story, fleshing
    out all additional details, and breaking it into parts using the 24-chapter cozy
    mystery outline template: [paste the text of the entire story synopsis].'
  id: totrans-2409
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：使用以下梗概，创建一个故事摘要，详细说明所有附加细节，并使用24章温馨悬疑情节模板将其分为几个部分：[粘贴整个故事梗概的文本]。
- en: ChatGPT and the Story Synopsis
  id: totrans-2410
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT和故事梗概
- en: We have worked through the critical components of our cozy mystery plot and
    are ready to combine them into one synopsis.
  id: totrans-2411
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经完成了温馨悬疑情节的关键组成部分，并准备好将它们合并成一个梗概。
- en: Use the pitch you developed for the overall story idea during the plotting process.
    Then add in the characters of the sleuth or sleuths and any secondary characters
    and subplots that are key to the plot.
  id: totrans-2412
  prefs: []
  type: TYPE_NORMAL
  zh: 使用你在情节过程中为整体故事想法开发的提案。然后加入侦探或侦探们以及任何对情节至关重要的次要角色和副情节。
- en: Combine them into one large prompt and ask ChatGPT to write the synopsis for
    you, using the persona role of an expert cozy mystery novelist.
  id: totrans-2413
  prefs: []
  type: TYPE_NORMAL
  zh: 将它们合并成一个大的提示，并让ChatGPT以一个温馨悬疑小说专家的角色为你编写梗概。
- en: Using the case study example for our contemporary psychic cozy mystery story,
    let’s ask ChatGPT to create a combined full Synopsis of this story.
  id: totrans-2414
  prefs: []
  type: TYPE_NORMAL
  zh: 使用我们的当代灵异温馨悬疑故事案例研究，让我们请ChatGPT创建这个故事的综合完整梗概。
- en: The following prompt used the case study pitch and characters as a working example.
    You should customize and extend the prompt to include any elements that you feel
    would support your story's synopsis.
  id: totrans-2415
  prefs: []
  type: TYPE_NORMAL
  zh: 以下提示使用了案例研究提案和角色作为一个工作示例。您应该定制并扩展提示，包括任何您认为会支持您故事大纲的元素。
- en: It is a long prompt because of all the information needed to support the story.
    By being specific in this synopsis, you give the AI the information it needs to
    create a more accurate response.
  id: totrans-2416
  prefs: []
  type: TYPE_NORMAL
  zh: 由于需要支持故事的所有信息，这是一个很长的提示。通过在这个大纲中具体说明，您为AI提供了创建更准确回应所需的信息。
- en: '![](image_rsrc45J.jpg)'
  id: totrans-2417
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc45J.jpg)'
- en: You are an expert and advanced cozy murder mystery fiction author who has published
    over 50 bestselling novels and has 30 years of experience. You write commercial
    and very successful cozy murder mystery fiction that readers love and auto-buy
    every book in your series. Your cozy mystery stories are known for escapist settings,
    twisty cozy mystery plots, and your cast of fun and witty characters that readers
    love. You have a deep knowledge of cozy murder mystery tropes and reader expectations
    that inform your writing.
  id: totrans-2418
  prefs: []
  type: TYPE_NORMAL
  zh: 您是一位专家级的高级温馨谋杀悬疑小说作家，已出版超过50本畅销小说，拥有30年的经验。您创作的商业成功且深受读者喜爱的温馨谋杀悬疑小说，读者们喜欢并自动购买您系列中的每一本书。您的温馨谋杀悬疑故事以逃避现实的场景、错综复杂的悬疑情节以及读者喜爱的有趣和机智的角色而闻名。您对温馨谋杀悬疑的陈词滥调和读者期望有深刻的了解，这些知识指导了您的写作。
- en: 'Given the following premise and story information, give me a highly detailed
    synopsis for my paranormal cozy murder mystery story in the traditional four act
    structure. Each act should be clearly labelled and should build toward the ending
    I''ve described:'
  id: totrans-2419
  prefs: []
  type: TYPE_NORMAL
  zh: 根据以下前提和故事信息，请为我提供一个高度详细的大纲，以传统的四幕结构来构建我的超自然温馨谋杀悬疑故事。每一幕都应该明确标注，并朝着我描述的结局发展：
- en: 'Premise: [ paste your story idea here, and include details of the sleuth and
    the main characters such as sidekicks]'
  id: totrans-2420
  prefs: []
  type: TYPE_NORMAL
  zh: 前提：[在此粘贴您的小说想法，包括侦探和主要角色（如助手）的详细信息]
- en: 'Suspects: [ paste your list of five suspects here]'
  id: totrans-2421
  prefs: []
  type: TYPE_NORMAL
  zh: 嫌疑人：[在此粘贴您的五名嫌疑人名单]
- en: 'Setting: [ describe your setting here]'
  id: totrans-2422
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：[在此描述您的背景]
- en: 'Subplot: [ paste your main subplot here for book one of the series]'
  id: totrans-2423
  prefs: []
  type: TYPE_NORMAL
  zh: 副情节：[在此粘贴系列第一本书的主要副情节]
- en: I want to use the classical four act and 24-chapter story structural model to
    create a fun and witty bestselling mystery that will appeal to cozy murder mystery
    readers. The plot outline should contain several creative plot points and escalating
    conflict, with a strong hook to get the reader interested.
  id: totrans-2424
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望使用经典的四幕和24章故事结构模型来创作一个有趣且机智的畅销悬疑小说，吸引温馨谋杀悬疑读者。情节概述应包含几个创意情节点和升级的冲突，以及一个强烈的钩子来吸引读者的兴趣。
- en: I used this prompt to generate the synopsis for the worked example mystery.
  id: totrans-2425
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用这个提示生成了工作示例悬疑小说的大纲。
- en: '![](image_rsrc45K.jpg)'
  id: totrans-2426
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc45K.jpg)'
- en: 'Paranormal Cozy Murder Mystery: "Secrets of Polperran"'
  id: totrans-2427
  prefs: []
  type: TYPE_NORMAL
  zh: 超自然温馨谋杀悬疑：《波尔珀兰的秘密》
- en: 'Act 1: The Disruption'
  id: totrans-2428
  prefs: []
  type: TYPE_NORMAL
  zh: 第一幕：破坏
- en: 'Chapter 1: Arrival in Polperran'
  id: totrans-2429
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章：抵达波尔珀兰
- en: Laura Marsh arrives in the picturesque town of Polperran for a holiday, looking
    forward to a break from her hectic life as a chef. She's greeted by her eccentric
    Aunt Sera and introduced to the quaint, close-knit community.
  id: totrans-2430
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉·马什来到风景如画的波尔珀兰镇度假，期待着从她作为厨师忙碌的生活中暂时放松一下。她被古怪的阿姨塞拉迎接，并被介绍给这个古朴、紧密相连的社区。
- en: 'Chapter 2: A Psychic Fair'
  id: totrans-2431
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章：灵异博览会
- en: Laura and Aunt Sera visit the local psychic fair, where Laura learns about her
    aunt's secret life as a paranormal investigator along with her friends, Frances
    Wentworth, and Jasper Finchley.
  id: totrans-2432
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉和阿姨塞拉参观了当地的灵异博览会，在那里劳拉了解到她阿姨作为灵异调查员的秘密生活，以及她的朋友弗朗西斯·温莎和贾斯珀·芬奇利的存在。
- en: 'Chapter 3: Murder at the Yarn Studio'
  id: totrans-2433
  prefs: []
  type: TYPE_NORMAL
  zh: 第三章：毛线工作室的谋杀案
- en: The fair ends in tragedy when famous psychic Edward Montague is found murdered
    at Sera’s yarn studio, stabbed with poisoned knitting needles. Laura, upon touching
    the body, inadvertently receives Edward's psychic abilities.
  id: totrans-2434
  prefs: []
  type: TYPE_NORMAL
  zh: 在塞拉的毛线工作室，著名的精神科医生爱德华·蒙塔古被发现被谋杀，用有毒的编织针刺死。劳拉在触摸尸体时，无意中获得了爱德华的精神能力。
- en: 'Chapter 4: The Passing of Powers'
  id: totrans-2435
  prefs: []
  type: TYPE_NORMAL
  zh: 第四章：力量的消逝
- en: Confused and overwhelmed by her sudden abilities, Laura struggles to come to
    terms with what has happened. Sera explains the significance of the psychic transfer
    and how it ties into their investigations.
  id: totrans-2436
  prefs: []
  type: TYPE_NORMAL
  zh: 对于她突然获得的能力感到困惑和不知所措，劳拉努力接受所发生的事情。塞拉解释了精神转移的重要性以及它与他们的调查之间的联系。
- en: 'Chapter 5: Suspects and Secrets'
  id: totrans-2437
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章：嫌疑人和秘密
- en: 'The investigation begins. Laura, Sera, Frances, and Jasper start sifting through
    the suspects: Victor Holloway, Helena Barrett, Derek Sands, Simon Fairweather,
    and even Frances Wentworth herself.'
  id: totrans-2438
  prefs: []
  type: TYPE_NORMAL
  zh: 调查开始。劳拉、塞拉、弗朗西斯和杰斯珀开始筛选嫌疑人：维克多·霍洛韦、海伦娜·巴雷特、德里克·桑德斯、西蒙·费尔韦瑟，甚至弗朗西斯·温特沃斯本人。
- en: 'Chapter 6: The First Clue'
  id: totrans-2439
  prefs: []
  type: TYPE_NORMAL
  zh: 第6章：第一个线索
- en: Laura’s new psychic abilities lead to the discovery of a crucial clue linked
    to the antique knitting needles, pointing towards Victor Holloway's involvement
    but also hinting at a deeper conspiracy within Polperran.
  id: totrans-2440
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉的新通灵能力导致发现与古董编织针相关的关键线索，指向维克多·霍洛韦的参与，但也暗示波尔珀兰内部存在更深层次的阴谋。
- en: 'Act 2: The Response'
  id: totrans-2441
  prefs: []
  type: TYPE_NORMAL
  zh: 第二幕：回应
- en: 'Chapter 7: Digging Deeper'
  id: totrans-2442
  prefs: []
  type: TYPE_NORMAL
  zh: 第7章：深入挖掘
- en: The team delves into the backgrounds of each suspect, uncovering hidden motives
    and secrets. Laura's abilities grow, allowing her to sense echoes of the past
    connected to the murder weapon.
  id: totrans-2443
  prefs: []
  type: TYPE_NORMAL
  zh: 团队深入调查每个嫌疑人的背景，揭露隐藏的动机和秘密。劳拉的能力增长，使她能够感知与谋杀武器相关的过去回声。
- en: 'Chapter 8: A Community Divided'
  id: totrans-2444
  prefs: []
  type: TYPE_NORMAL
  zh: 第8章：社区分裂
- en: The murder stirs unrest in Polperran, with the town's residents taking sides.
    Laura and Sera face backlash from those who suspect Sera's involvement in the
    murder.
  id: totrans-2445
  prefs: []
  type: TYPE_NORMAL
  zh: 谋杀在波尔珀兰引起了动荡，镇上的居民分成了两派。劳拉和塞拉面临那些怀疑塞拉参与谋杀的人的反击。
- en: 'Chapter 9: The Mystic Emporium'
  id: totrans-2446
  prefs: []
  type: TYPE_NORMAL
  zh: 第9章：神秘商店
- en: Investigating Derek Sands and his Mystic Emporium, Laura and Sera uncover illegal
    dealings in occult objects. Derek becomes both a suspect and an unlikely ally.
  id: totrans-2447
  prefs: []
  type: TYPE_NORMAL
  zh: 调查德里克·桑德斯和他的神秘商店，劳拉和塞拉发现了与神秘物品相关的非法交易。德里克成为了一个嫌疑人和一个不太可能的盟友。
- en: 'Chapter 10: A Break in the Case'
  id: totrans-2448
  prefs: []
  type: TYPE_NORMAL
  zh: 第10章：案件突破
- en: 'A second murder occurs, this time an antique dealer specializing in occult
    objects. The method is the same: poisoned knitting needles. The plot thickens,
    linking both murders to a rare artifact rumored to be cursed.'
  id: totrans-2449
  prefs: []
  type: TYPE_NORMAL
  zh: 发生第二起谋杀案，这次是一位专门经营神秘物品的古董商。方法相同：有毒的编织针。情节变得更加复杂，将两起谋杀案都与传说中诅咒的罕见物品联系起来。
- en: 'Chapter 11: Helena’s Revenge'
  id: totrans-2450
  prefs: []
  type: TYPE_NORMAL
  zh: 第11章：海伦娜的复仇
- en: Laura's psychic insights reveal Helena Barrett's motive for revenge against
    Edward Montague, positioning her as a prime suspect despite her alibi.
  id: totrans-2451
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉的通灵洞察力揭示了海伦娜·巴雷特对爱德华·蒙塔古进行复仇的动机，尽管她有不在场证明，但她仍被视为主要嫌疑人。
- en: 'Chapter 12: The Festival Sabotage'
  id: totrans-2452
  prefs: []
  type: TYPE_NORMAL
  zh: 第12章：节日破坏
- en: An attempt to disrupt Simon Fairweather's festival points towards an outside
    influence in Polperran, suggesting Simon's involvement in the murder as an effort
    to eliminate competition.
  id: totrans-2453
  prefs: []
  type: TYPE_NORMAL
  zh: 试图破坏西蒙·费尔韦瑟的节日指向了波尔珀兰的外部影响，暗示西蒙参与谋杀是为了消除竞争。
- en: 'Act 3: The Attack'
  id: totrans-2454
  prefs: []
  type: TYPE_NORMAL
  zh: 第三幕：攻击
- en: 'Chapter 13: The Lunar Locket'
  id: totrans-2455
  prefs: []
  type: TYPE_NORMAL
  zh: 第13章：月亮护身符
- en: The investigation reveals the existence of the Lunar Locket, an artifact Edward
    was rumored to possess. Its curse and power become central to understanding the
    murders.
  id: totrans-2456
  prefs: []
  type: TYPE_NORMAL
  zh: 调查揭示了月亮护身符的存在，据传爱德华拥有这个物品。它的诅咒和力量成为理解谋杀案的关键。
- en: 'Chapter 14: Frances’s Secret'
  id: totrans-2457
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章：弗朗西斯的秘密
- en: Frances Wentworth's past with Edward comes to light, revealing a complicated
    history and her potential motive for his murder, complicating the team's dynamics.
  id: totrans-2458
  prefs: []
  type: TYPE_NORMAL
  zh: 弗朗西斯·温特沃斯与爱德华的过去浮出水面，揭示了一段复杂的历史和她谋杀他的潜在动机，使团队的动态更加复杂。
- en: 'Chapter 15: Confronting Demons'
  id: totrans-2459
  prefs: []
  type: TYPE_NORMAL
  zh: 第15章：对抗恶魔
- en: Laura confronts her own fears and doubts about her abilities and her uncle’s
    secretive past, finding strength in her newfound powers and her resolve to clear
    her aunt's name.
  id: totrans-2460
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉面对自己能力的恐惧和怀疑，以及她叔叔秘密的过去，从她新发现的力量和澄清阿姨名誉的决心中找到力量。
- en: 'Chapter 16: Derek’s Dilemma'
  id: totrans-2461
  prefs: []
  type: TYPE_NORMAL
  zh: 第16章：德里克的困境
- en: Derek Sands is caught between aiding Laura's investigation and protecting his
    own secrets, leading to a tense alliance as they uncover the artifact's location.
  id: totrans-2462
  prefs: []
  type: TYPE_NORMAL
  zh: 德里克·桑德斯在帮助劳拉的调查和保护自己的秘密之间左右为难，导致他们在发现物品位置时形成紧张联盟。
- en: 'Chapter 17: The Hidden Room'
  id: totrans-2463
  prefs: []
  type: TYPE_NORMAL
  zh: 第17章：隐藏的房间
- en: A hidden room in the Mystic Emporium reveals secrets about the town's occult
    history and the true nature of the cursed artifact, bringing them closer to the
    killer.
  id: totrans-2464
  prefs: []
  type: TYPE_NORMAL
  zh: 神秘商店中的隐藏房间揭示了城镇的神秘历史和诅咒物品的真实性质，使他们更接近杀手。
- en: 'Chapter 18: The Showdown at the Fair'
  id: totrans-2465
  prefs: []
  type: TYPE_NORMAL
  zh: 第18章：集市上的对决
- en: Using the psychic fair as a cover, Laura and her team set a trap for the killer,
    leading to a public confrontation and the revelation of unexpected alliances.
  id: totrans-2466
  prefs: []
  type: TYPE_NORMAL
  zh: 利用通灵集市作为掩护，劳拉和她的团队为杀手设下陷阱，导致公开对抗和意外联盟的揭露。
- en: 'Act 4: The Resolution'
  id: totrans-2467
  prefs: []
  type: TYPE_NORMAL
  zh: 第四幕：解决
- en: 'Chapter 19: Unraveling the Mystery'
  id: totrans-2468
  prefs: []
  type: TYPE_NORMAL
  zh: 第19章：解开谜团
- en: The killer is revealed in a dramatic turn of events at the psychic fair. Helena
    Barrett's desire for revenge against Edward for ruining her life is confirmed,
    with the cursed artifact playing a key role in her motive.
  id: totrans-2469
  prefs: []
  type: TYPE_NORMAL
  zh: 在灵媒集市上发生了一场戏剧性的转折，凶手被揭露。海伦娜·巴雷特对爱德华因毁掉她生活而进行的复仇欲望得到证实，诅咒的文物在她的动机中扮演了关键角色。
- en: 'Chapter 20: The Curse of the Locket'
  id: totrans-2470
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十十章：护身符的诅咒
- en: The team discovers that the Lunar Locket’s curse was a fabrication, a story
    spun by Edward to protect its true powers, which Helena believed and sought to
    harness for her revenge.
  id: totrans-2471
  prefs: []
  type: TYPE_NORMAL
  zh: 团队发现月球护身符的诅咒是虚构的，是爱德华编造的故事，为了保护其真正的力量，海伦娜相信并试图利用它来实现她的复仇。
- en: 'Chapter 21: Healing Wounds'
  id: totrans-2472
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十一章：治愈创伤
- en: With the murderer apprehended, Laura and her team work to heal the divisions
    in Polperran. Laura comes to terms with her new psychic abilities and her place
    in the town.
  id: totrans-2473
  prefs: []
  type: TYPE_NORMAL
  zh: 在凶手被捕后，劳拉及其团队努力治愈波尔珀兰的分裂。劳拉接受了她的新心灵感应能力和她在镇上的位置。
- en: 'Chapter 22: A New Beginning'
  id: totrans-2474
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十二章：新的开始
- en: Laura decides to extend her stay in Polperran, embracing her role in the paranormal
    investigation team and starting a new chapter in her life, free from her past
    constraints.
  id: totrans-2475
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉决定在波尔珀兰延长她的逗留，接受她在超自然调查团队中的角色，并在她的生活中开启新的篇章，摆脱过去的束缚。
- en: 'Chapter 23: Derek’s Redemption'
  id: totrans-2476
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十三章：德里克的救赎
- en: Derek Sands, having played a crucial role in solving the mystery, seeks to make
    amends for his past actions, offering his resources to Laura and her team for
    future investigations.
  id: totrans-2477
  prefs: []
  type: TYPE_NORMAL
  zh: 德里克·桑德斯在解决谜案中发挥了关键作用，他寻求为过去的行动赎罪，为劳拉及其团队提供资源以供未来的调查。
- en: 'Chapter 24: Setting the Stage for the Next Mystery'
  id: totrans-2478
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十四章：为下一个谜团设定舞台
- en: As the town of Polperran returns to normal, a new mystery surfaces on the horizon,
    teasing the adventures to come for Laura, Sera, Frances, Jasper, and Derek.
  id: totrans-2479
  prefs: []
  type: TYPE_NORMAL
  zh: 随着波尔珀兰镇恢复正常，一个新的谜团出现在地平线上，预示着劳拉、塞拉、弗朗西斯、贾斯珀和德里克即将到来的冒险。
- en: This structure sets the stage for a series that blends cozy mystery tropes with
    paranormal elements, ensuring a twisty plot filled with engaging character dynamics,
    evolving mysteries, and a picturesque setting that readers will want to return
    to time and again.
  id: totrans-2480
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构为一系列将温馨悬疑陈词滥调与超自然元素相结合的系列小说奠定了基础，确保情节错综复杂，充满引人入胜的角色动态、不断发展的谜团，以及读者希望一次又一次返回的如画般的环境。
- en: That works! We now have a simple and very high-level 24-chapter outline of the
    plot of our cozy mystery.
  id: totrans-2481
  prefs: []
  type: TYPE_NORMAL
  zh: 这很有效！我们现在有一个简单且非常高级的24章情节大纲，这是我们温馨悬疑故事的结构。
- en: Breaking the plot synopsis into the four-act structure in this way helps the
    plot come to life, making it easier to track the murder mystery investigation
    – without being overwhelmed with detail.
  id: totrans-2482
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式将情节概述分解为四幕结构，有助于使情节生动起来，使追踪谋杀谜案调查变得更容易，而不会被细节所淹没。
- en: If something in this outline is not working, you can quickly ask ChatGPT to
    change it to the way you want and rewrite the plot outline for you.
  id: totrans-2483
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这个大纲中的某些内容不起作用，您可以快速要求ChatGPT按照您想要的方式更改，并为您重新编写情节大纲。
- en: NEXT STEP IN THE STORY DEVELOPMENT PROCESS
  id: totrans-2484
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 故事发展过程中的下一步
- en: Stand back and evaluate the story idea that ChatGPT has generated for you.
  id: totrans-2485
  prefs: []
  type: TYPE_NORMAL
  zh: 退后一步，评估ChatGPT为您生成的故事想法。
- en: If you don’t like this response, or want more ideas, copy the original response
    into a text document, then press the Regeneration button. You can see that the
    AI remembered the responses it generated earlier and incorporated these in the
    synopsis.
  id: totrans-2486
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您不喜欢这个回应，或者想要更多想法，请将原始回应复制到文本文档中，然后按再生按钮。您可以看到AI记得它之前生成的回应，并将这些纳入概述中。
- en: Change the synopsis prompt. Add in more specific details about your niche, your
    characters, and the setting, until you have several story ideas.
  id: totrans-2487
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更改概述提示。添加更多关于您的细分市场、角色和设置的具体细节，直到您有几个故事想法。
- en: Manually work through the responses and the story ideas that you have recorded.
  id: totrans-2488
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动处理您记录的回应和故事想法。
- en: Do any of them stand out?
  id: totrans-2489
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有哪些内容脱颖而出？
- en: How do these story ideas compare to other bestsellers in your niche at the moment?
    Could this story compete in your niche and grab the attention of the reader?
  id: totrans-2490
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些故事想法与您细分市场中的其他畅销书相比如何？这个故事能否在您的细分市场中竞争，并吸引读者的注意？
- en: Are there any additional tropes or themes or story hooks that readers in your
    niche would love to see? Bring them in now.
  id: totrans-2491
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的细分市场中的读者是否喜欢看到任何额外的陈词滥调、主题或故事钩子？现在就加入它们。
- en: Can you incorporate any ideas of your own to create a combined synopsis of your
    story idea?
  id: totrans-2492
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您能否融入自己的想法，为您的故事想法创建一个综合概述？
- en: The objective at the end of this stage of the plotting process is to have a
    working story idea that you love and cannot wait to start writing!
  id: totrans-2493
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这个情节规划阶段的最终目标是拥有一个你爱不释手、迫不及待想要开始写作的故事想法！
- en: Top Tip. Don’t open a new conversation with ChatGPT. If you have worked on another
    project, click back to the conversation about this book before adding the new
    prompt so that ChatGPT understands who these characters are and what responses
    it has already generated – this helps to add context.
  id: totrans-2494
  prefs: []
  type: TYPE_NORMAL
  zh: 高级技巧。不要用ChatGPT开启新的对话。如果你已经完成了另一个项目，在添加新提示之前，点击回到关于这本书的对话，这样ChatGPT就能理解这些角色是谁以及它已经生成的哪些回应——这有助于添加上下文。
- en: Brainstorm options. Repeat until you have a workable story idea.
  id: totrans-2495
  prefs: []
  type: TYPE_NORMAL
  zh: 发散思维。重复，直到你有一个可行的故事想法。
- en: Keep asking for more ideas on how to improve your synopsis.
  id: totrans-2496
  prefs: []
  type: TYPE_NORMAL
  zh: 继续寻求改进你的摘要的更多想法。
- en: This is the fun part of the writing process when you can go to town on cool
    and engaging ideas that perfectly fit your main character and your story situation.
  id: totrans-2497
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在写作过程中最有趣的部分，当你能够提出一些酷炫且吸引人的想法，这些想法完美地符合你的主要人物和故事情境时。
- en: If you need more information about a specific suggestion, ask the AI to give
    you some examples.
  id: totrans-2498
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要关于某个具体建议的更多信息，请要求AI给你一些例子。
- en: '![](image_rsrc45M.jpg)'
  id: totrans-2499
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc45M.jpg)'
- en: 'Can you give me more information about Chapter 10: A Break in the Case? A second
    murder occurs, this time an antique dealer specializing in occult objects. The
    method is the same: poisoned knitting needles. The plot thickens, linking both
    murders to a rare artifact rumored to be cursed.'
  id: totrans-2500
  prefs: []
  type: TYPE_NORMAL
  zh: 你能给我更多关于第10章：案件的突破的信息吗？这一次发生的是第二起谋杀案，受害者是一位专门经营神秘物品的古董商。手法相同：有毒的编织针。情节变得更加复杂，将两起谋杀案都与一个据称被诅咒的罕见遗物联系起来。
- en: '![](image_rsrc45N.jpg)'
  id: totrans-2501
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc45N.jpg)'
- en: 'Chapter 10: A Break in the Case'
  id: totrans-2502
  prefs: []
  type: TYPE_NORMAL
  zh: 第10章：案件的突破
- en: 'In the heart of Polperran, the quaint serenity is once again shattered by a
    chilling discovery. This time, the victim is Charles Pennington, a well-regarded
    antique dealer known for his extensive collection of occult objects. Found in
    his own shop, Pennington lies motionless, two antique knitting needles protruding
    from his chest, mirroring the brutal demise of Edward Montague. The town is abuzz
    with fear and speculation as the realization sets in: a murderer walks among them,
    wielding a most peculiar choice of weapon.'
  id: totrans-2503
  prefs: []
  type: TYPE_NORMAL
  zh: 在波尔珀兰的中心，宁静的乡村再次被一个令人毛骨悚然的发现所打破。这一次，受害者是查尔斯·彭宁顿，一位以广泛收藏神秘物品而闻名的受人尊敬的古董商。他在自己的店里被发现一动不动，两根古董编织针从他的胸部突出，与爱德华·蒙塔古的残酷死亡相呼应。随着这种认识逐渐显现，镇上充满了恐惧和猜测：一个凶手就在他们中间，手持一种最奇怪的武器。
- en: Laura Marsh, still grappling with her newfound psychic abilities, senses an
    eerie connection between the needles used in both murders.
  id: totrans-2504
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉·马什，仍在努力适应她新发现的通灵能力，感觉到这两种谋杀案中使用的针之间存在一种令人毛骨悚然的联系。
- en: Her investigation, alongside Aunt Sera, Frances Wentworth, and Jasper Finchley,
    takes a new turn as they delve deeper into the world of cursed artifacts and occult
    relics, a domain where Pennington was a known authority.
  id: totrans-2505
  prefs: []
  type: TYPE_NORMAL
  zh: 她的调查，与塞拉阿姨、弗朗西斯·温特沃斯和贾斯珀·芬奇利一起，随着他们深入到诅咒遗物和神秘遗物世界而发生了新的转折，彭宁顿在这个领域是知名的权威。
- en: 'The Break in the Case:'
  id: totrans-2506
  prefs: []
  type: TYPE_NORMAL
  zh: 案件的突破：
- en: 'The Discovery: The chapter opens with Laura and her team arriving at Pennington''s
    shop in response to urgent news of his death. The scene is eerily similar to Montague''s
    murder, with the shop appearing undisturbed except for the grim centerpiece.'
  id: totrans-2507
  prefs: []
  type: TYPE_NORMAL
  zh: 发现：这一章以劳拉和她的团队接到彭宁顿死亡紧急消息后到达他的商店为开头。场景与蒙塔古的谋杀案惊人地相似，商店看起来没有受到干扰，除了那个令人毛骨悚然的中心。
- en: 'Link to the Cursed Artifact: Among Pennington''s possessions, they find a journal
    detailing his recent acquisition of the "Lunar Locket," an artifact Edward Montague
    had been rumored to seek. The journal entries speak of Pennington''s growing obsession
    with the locket''s supposed curse and its power.'
  id: totrans-2508
  prefs: []
  type: TYPE_NORMAL
  zh: 被诅咒的遗物链接：在彭宁顿的财产中，他们发现了一本日记，详细记录了他最近获得的“月相护身符”，这是一件爱德华·蒙塔古据称一直在寻找的遗物。日记条目中提到了彭宁顿对护身符传说中的诅咒及其力量的日益痴迷。
- en: 'Psychic Revelations: Touching the knitting needles, Laura experiences a vivid
    psychic flashback, witnessing a heated argument between Pennington and an unidentified
    figure about the locket. The vision suggests that Pennington may have known the
    identity of Montague''s killer and the motive behind both murders.'
  id: totrans-2509
  prefs: []
  type: TYPE_NORMAL
  zh: 通灵启示：触摸编织针，劳拉经历了一次生动的通灵闪回，目睹了彭宁顿与一个不明身份的人物就护身符发生的激烈争论。这个幻象表明，彭宁顿可能知道蒙塔古杀手的身份以及两起谋杀背后的动机。
- en: 'Community Reaction: News of the second murder with the same modus operandi
    sends shockwaves through Polperran. The community''s trust begins to fray, with
    suspicions cast wide, including at Laura and her investigative team. Their connection
    to both victims through the paranormal investigation draws unwanted attention
    and skepticism.'
  id: totrans-2510
  prefs: []
  type: TYPE_NORMAL
  zh: 社区反应：关于第二次以相同手段进行的谋杀的新闻在波尔佩兰引起了轩然大波。社区的信任开始破裂，怀疑的范围广泛，包括针对劳拉和她的调查团队的怀疑。他们通过超自然调查与两名受害者之间的联系引起了不必要的注意和怀疑。
- en: 'Investigative Challenges: As Laura and her team dig deeper, they encounter
    obstacles from both the local police, who are wary of their unconventional methods,
    and from within the occult community, which closes ranks in the wake of the murders.
    Their investigation reveals that the locket may have been more than a mere collector''s
    item—it was a coveted object of power that could inspire passion, obsession, and,
    ultimately, violence.'
  id: totrans-2511
  prefs: []
  type: TYPE_NORMAL
  zh: 调查挑战：随着劳拉和她的团队深入调查，他们遇到了来自当地警察的障碍，这些警察对他们非传统的方法持怀疑态度，以及来自神秘学社区的障碍，该社区在谋杀事件后团结起来。他们的调查揭示，这个护身符可能不仅仅是一件收藏品——它是一件被渴望的权力象征，可以激发激情、痴迷，最终导致暴力。
- en: 'A Key Suspect: Their inquiries lead them to Victor Holloway, known for his
    interest in acquiring the locket for his collection. However, his solid alibi
    and the revelation that Pennington refused to sell the locket to him complicate
    the suspicion.'
  id: totrans-2512
  prefs: []
  type: TYPE_NORMAL
  zh: 主要嫌疑人：他们的调查将他们引向维克多·霍洛韦，他因收购护身符用于他的收藏而闻名。然而，他的稳固不在场证明以及彭宁顿拒绝将护身符卖给他的事实使怀疑变得更加复杂。
- en: The chapter closes with the team grappling with the implications of their findings.
    The murders are not just isolated incidents but are deeply intertwined with the
    dark underbelly of Polperran's occult scene.
  id: totrans-2513
  prefs: []
  type: TYPE_NORMAL
  zh: 本章以团队在他们的发现中挣扎结束。这些谋杀案不仅仅是孤立的事件，而是与波尔佩兰神秘学场景的黑暗底层紧密相连。
- en: The cursed artifact at the center of it all, the Lunar Locket, holds the key
    to unraveling the mystery, but also poses a danger to anyone who comes too close.
  id: totrans-2514
  prefs: []
  type: TYPE_NORMAL
  zh: 位于这一切中心的诅咒文物，即月亮护身符，是解开谜团的关键，但也对任何过于接近的人构成危险。
- en: Laura, now more than ever, feels the weight of her abilities and the responsibility
    to bring peace back to Polperran, even as the shadows of the past loom ever larger.
  id: totrans-2515
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉现在比以往任何时候都感受到她能力的重量和将和平带回波尔佩兰的责任，尽管过去的阴影越来越大。
- en: These ideas would certainly add to the plot, and you could work through each
    suggestion in the same way, building up an effective and detailed plot summary.
  id: totrans-2516
  prefs: []
  type: TYPE_NORMAL
  zh: 这些想法无疑会丰富情节，你可以以同样的方式逐一处理每个建议，构建一个有效且详细的情节摘要。
- en: Ruthlessly remove ideas that don’t excite you.
  id: totrans-2517
  prefs: []
  type: TYPE_NORMAL
  zh: 无情地剔除那些不能激发你兴趣的想法。
- en: Evaluate and fine-tune every idea and character profile until it matches your
    vision for this story.
  id: totrans-2518
  prefs: []
  type: TYPE_NORMAL
  zh: 评估和微调每一个想法和角色档案，直到它们符合你对这个故事的想法。
- en: Does the story idea you have produced have enough emotional and external conflict
    to sustain a complete full-length novel, or is it better suited to a novella?
  id: totrans-2519
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你产生的故事想法是否具有足够的情感和外部冲突，足以支撑一部完整的长篇小说，或者它更适合成为一部短篇小说？
- en: Do you need to add subplots for a longer work? This will mean asking ChatGPT
    to create secondary characters with specific relationships to the two main characters
    and then weaving their storylines into the synopsis.
  id: totrans-2520
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你需要为更长的作品添加副情节吗？这意味着要求ChatGPT创建与两个主要角色有特定关系的次要角色，然后将他们的故事线编织到概要中。
- en: Are your characters working?  Do they need different motivations and internal
    conflicts? Can you focus on the character arc for the sleuth or the murderer,
    for example?
  id: totrans-2521
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的角色是否有效？他们是否需要不同的动机和内部冲突？你能专注于侦探或谋杀者的角色弧吗？
- en: Would a story idea you like work better in a different location? For example,
    you could easily move our case study story idea from a small coastal town to a
    yarn store in a major city—whatever works for you and your characters.
  id: totrans-2522
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你喜欢的某个故事想法是否更适合在另一个地点？例如，你可以轻松地将我们的案例研究故事想法从一个小沿海小镇移到一个大城市里的毛线店——只要对你和你的角色有效即可。
- en: Repeat until you have a story idea and a plot outline that you cannot wait to
    start writing.
  id: totrans-2523
  prefs: []
  type: TYPE_NORMAL
  zh: 重复操作，直到你有一个迫不及待想要开始写作的故事想法和情节大纲。
- en: Congratulations! We now have a very high-level 24-chapter plot outline for the
    entire cozy mystery novel, including all of the major turning points in the story.
  id: totrans-2524
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜！我们现在已经拥有了一个非常高级的24章情节大纲，包括整个温馨悬疑小说的所有主要转折点。
- en: Remember—you can always press the Regenerate response option if you need more
    ideas. However, this will delete the response you have already received, so you
    may want to copy it into your document first.
  id: totrans-2525
  prefs: []
  type: TYPE_NORMAL
  zh: 记住——如果你需要更多想法，你可以随时按下“重新生成响应”选项。然而，这将删除你已经收到的响应，所以你可能想先把它复制到你的文档中。
- en: If you want to completely change the prompt, it is probably best to open a new
    conversation since the AI will recall what it has already been told and the response
    it has already given.
  id: totrans-2526
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想完全改变提示，最好开启一个新的对话，因为AI会回忆起它已经被告知的内容和它已经给出的响应。
- en: What to Do Next?
  id: totrans-2527
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 接下来要做什么？
- en: Now is the time to start work on the outline.
  id: totrans-2528
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是开始制定大纲的时候了。
- en: At this point, you are completely free to make any major changes or start again
    and redevelop the entire story idea, characters, and settings.
  id: totrans-2529
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你可以完全自由地做出任何重大改变或从头开始重新开发整个故事想法、人物和场景。
- en: Throw out subplots, fill plot holes, create new ideas, and work on the overall
    outline before you dive into the details.
  id: totrans-2530
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入细节之前，摒弃副线剧情，填补情节漏洞，创造新想法，并完善整体大纲。
- en: The huge advantage of using AI as your writing assistant is that you can sort
    through and evaluate multiple ideas in minutes instead of days of work.
  id: totrans-2531
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI作为你的写作助手的一个巨大优势是，你可以在几分钟内筛选和评估多个想法，而不是需要几天的工作。
- en: Generate new ideas for each part of your cozy mystery and weave them into the
    general outline until you have generated your own plot outline that matches your
    vision for this story!
  id: totrans-2532
  prefs: []
  type: TYPE_NORMAL
  zh: 为你的温馨神秘故事中的每一部分生成新想法，并将它们编织到总体大纲中，直到你生成符合你对这个故事愿景的自己的情节大纲！
- en: The goal is to create a 24-chapter (or other story structure plan) plot outline
    for your story that incorporates all of your ideas, chapter by chapter.
  id: totrans-2533
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是为你的故事创建一个包含所有想法的24章（或其他故事结构计划）情节大纲，每章一个。
- en: Don’t worry if you only have a vague idea of what happens in some of these chapters.
    Go back to the AI and ask it to expand the chapter outline and flesh out precisely
    what could happen.
  id: totrans-2534
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对某些章节发生的事情只有一个模糊的想法，不要担心。回到AI那里，让它扩展章节大纲，并精确地描述可能发生的事情。
- en: Need a Book Description?
  id: totrans-2535
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 需要一本书的简介吗？
- en: Once you have generated this outline, it is a great time to ask ChatGPT to produce
    a book description that you can use on the back cover of your print book and the
    book page for online bookstores.
  id: totrans-2536
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你生成了这个大纲，现在是让ChatGPT为你生成一个书描述的好时机，你可以将其用于印刷书的背面和在线书店的书页。
- en: '![](image_rsrc45P.jpg)'
  id: totrans-2537
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc45P.jpg)'
- en: Can you write a bestselling book description for my contemporary paranormal
    and crafts cozy murder mystery novel based on this synopsis? This book description
    will be used on the online book page to market the book and should focus on what
    kind of reading experience it will deliver for the reader.
  id: totrans-2538
  prefs: []
  type: TYPE_NORMAL
  zh: 你能根据这个概要为我写一个当代超自然和工艺温馨谋杀神秘小说的畅销书简介吗？这个简介将用于在线书页上推广这本书，并应侧重于它将为读者提供的阅读体验。
- en: '![](image_rsrc45R.jpg)'
  id: totrans-2539
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc45R.jpg)'
- en: Dive into the quaint and mystical town of Polperran in this captivating contemporary
    paranormal cozy mystery. "Secrets of Polperran" weaves a tale of intrigue, psychic
    powers, and a series of chilling murders, all set against the backdrop of a close-knit
    coastal community with a penchant for crafts and the occult.
  id: totrans-2540
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个迷人的当代超自然温馨神秘故事中，深入探索充满古风和神秘的波尔珀兰镇。"波尔珀兰的秘密"讲述了一个充满阴谋、心灵感应能力和一系列令人毛骨悚然的谋杀案的故事，所有这些都发生在紧密相连的海滨社区中，这个社区以工艺和神秘主义而闻名。
- en: When Laura Marsh arrives in Polperran for a peaceful holiday with her Aunt Sera,
    she never expects to be thrust into the heart of a murder investigation, nor to
    inherit unexpected psychic abilities from a dying victim. Alongside a colorful
    team of paranormal investigators—including a telepathic quilter, a secretive antique
    whisperer, and her eccentric aunt—Laura must unravel the mystery behind the deadly
    use of poisoned knitting needles.
  id: totrans-2541
  prefs: []
  type: TYPE_NORMAL
  zh: 当劳拉·马什带着与阿姨塞拉一起度过一个宁静假期的愿望来到波尔珀兰时，她从未想到自己会被卷入一场谋杀调查，也没有想到从一位垂死的受害者那里继承到意想不到的心灵感应能力。在与一群丰富多彩的超自然调查员——包括一位心灵感应的缝纫师、一位神秘的古董低语者和她古怪的阿姨——并肩作战的过程中，劳拉必须揭开致命使用有毒编织针背后的谜团。
- en: As the investigation deepens, revealing hidden motives, ancient artifacts, and
    the dark underbelly of the town's crafting circle, Laura finds herself confronting
    personal demons and community secrets. With the killer drawing closer, Laura and
    her allies must use all their wits and newly discovered powers to stop the murderer
    before they strike again.
  id: totrans-2542
  prefs: []
  type: TYPE_NORMAL
  zh: 随着调查的深入，揭示了隐藏的动机、古老的文物和镇上工艺圈阴暗的一面，劳拉发现自己正面对着个人的恶魔和社区的秘密。随着凶手越来越近，劳拉和她的盟友们必须运用他们所有的智慧和新发现的力量，在凶手再次作案之前阻止他们。
- en: '"Secrets of Polperran" promises a reading experience filled with suspense,
    humor, and a touch of the supernatural. Join Laura as she stitches together clues
    in this enthralling mystery that will keep you guessing until the very end.'
  id: totrans-2543
  prefs: []
  type: TYPE_NORMAL
  zh: “波尔佩兰的秘密”承诺带来充满悬疑、幽默和一点超自然的阅读体验。加入劳拉，她将线索编织在一起，在这个扣人心弦的谜案中，直到最后一刻你都会感到困惑。
- en: Review the response and ask whether this description captures your voice and
    the tone of the book.
  id: totrans-2544
  prefs: []
  type: TYPE_NORMAL
  zh: 审查这个回应，并询问这个描述是否捕捉到了你的声音和书的基调。
- en: For me, this description feels flat. So let’s add some energy.
  id: totrans-2545
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，这个描述感觉平淡无奇。那么，让我们添加一些活力。
- en: '![](image_rsrc45S.jpg)'
  id: totrans-2546
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc45S.jpg)'
- en: Can you rewrite this book description in a fun, light-hearted and witty style
    that promises the reader that this is going to be an upbeat and positive reading
    experience?
  id: totrans-2547
  prefs: []
  type: TYPE_NORMAL
  zh: 你能以轻松愉快、机智的风格重写这本书的描述，向读者保证这将是一次愉快而积极的阅读体验吗？
- en: '![](image_rsrc45T.jpg)'
  id: totrans-2548
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc45T.jpg)'
- en: Dive headfirst into the quirky and enchanting town of Polperran, where "Secrets
    of Polperran" spins a yarn of mystery, a pinch of paranormal flair, and a murder
    case as tangled as a ball of wool at a cat café.
  id: totrans-2549
  prefs: []
  type: TYPE_NORMAL
  zh: 全身心地投入波尔佩兰这个古怪迷人的小镇，在那里，“波尔佩兰的秘密”编织了一个谜案的故事，一点超自然的魅力，以及一个像猫咖啡馆里一团乱糟糟的羊毛球一样复杂的谋杀案。
- en: Chef Laura Marsh thought her holiday in Polperran would be all about scones,
    sea breeze, and maybe a stitch or two of knitting with her Aunt Sera. Little did
    she know she'd inherit psychic powers from a deceased psychic (talk about an unexpected
    party favor!) and find herself in a stitch—quite literally—as she untangles a
    mystery involving poisoned knitting needles.
  id: totrans-2550
  prefs: []
  type: TYPE_NORMAL
  zh: 劳拉·马什厨师认为她在波尔佩兰的假期将全部是关于松饼、海风，也许还能和阿姨塞拉一起织几针。她怎么也没想到会从一位已故的灵媒那里继承到灵力（这真是一个意想不到的派对礼物！）并在解开一个涉及有毒编织针的谜团时，发现自己真的陷入困境。
- en: With a squad that includes a telepathic quilter who knows more than she sews,
    an antique whisperer who's as mysterious as an unsolved crossword, and an aunt
    who's as eccentric as a cat wearing a sweater, Laura dives needle-first into the
    investigation. They're racing against time to stitch together the clues, from
    cursed artifacts to crafty killers with a penchant for the occult.
  id: totrans-2551
  prefs: []
  type: TYPE_NORMAL
  zh: 这个队伍包括一个知道得比她缝制的还多的心灵感应者，一个神秘的古董低语者，就像未解的填字游戏一样神秘，以及一个像穿毛衣的猫一样古怪的阿姨，劳拉一头扎进调查中。他们和时间赛跑，将线索拼凑在一起，从诅咒的文物到有通灵倾向的狡猾杀手。
- en: '"Secrets of Polperran" promises a crafty blend of laughter, lighthearted sleuthing,
    and the occasional ghostly whisper, making for a cozy mystery that''s as comforting
    as your favorite knitting project.'
  id: totrans-2552
  prefs: []
  type: TYPE_NORMAL
  zh: “波尔佩兰的秘密”承诺带来巧妙的笑声、轻松的侦探调查和偶尔的幽灵低语，这是一部舒适谜案，就像你最喜欢的编织项目一样令人安心。
- en: Join Laura and her motley crew as they purl their way through clues, delivering
    a reading experience that guarantees chuckles, chills, and charm by the spoonful.
  id: totrans-2553
  prefs: []
  type: TYPE_NORMAL
  zh: 加入劳拉和她那群杂色队伍，他们通过线索编织，提供一种保证让你捧腹大笑、毛骨悚然和魅力十足的阅读体验。
- en: Who knew unraveling a murder could be so much fun?
  id: totrans-2554
  prefs: []
  type: TYPE_NORMAL
  zh: 谁会想到解开谋杀案可以如此有趣？
- en: I like it! This is the fun part of writing book descriptions, and it can take
    several iterations to reach the perfect balance of storytelling and writing voice
    and style.
  id: totrans-2555
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢它！这是写书描述的乐趣所在，达到完美的叙事、写作声音和风格平衡可能需要多次迭代。
- en: 'PART TEN: BOOK TITLES'
  id: totrans-2556
  prefs: []
  type: TYPE_NORMAL
  zh: 第十部分：书名
- en: Book Titles
  id: totrans-2557
  prefs: []
  type: TYPE_NORMAL
  zh: 书名
- en: Cozy mysteries are famous for the book titles.
  id: totrans-2558
  prefs: []
  type: TYPE_NORMAL
  zh: 舒适的谜案因书名而出名。
- en: Authors have been mining the depths of familiar nursery stories, myths, sayings,
    anecdotes, and movie and TV show titles for years to come up with variations on
    a phrase or saying associated with a familiar expression.
  id: totrans-2559
  prefs: []
  type: TYPE_NORMAL
  zh: 作者们多年来一直在挖掘熟悉的儿歌、神话、谚语、轶事以及电影和电视节目标题的深处，以找到与熟悉表达相关的短语或谚语的变体。
- en: They would be puns, twists, clever rephrasing, and new variations on a theme.
  id: totrans-2560
  prefs: []
  type: TYPE_NORMAL
  zh: 他们会是双关语、转折、巧妙的改写，以及主题上的新变体。
- en: The most successful book titles take something familiar to their target readers
    and rework it into something fresh.
  id: totrans-2561
  prefs: []
  type: TYPE_NORMAL
  zh: 最成功的书名会将目标读者熟悉的事物重新构思成新鲜事物。
- en: At the same time, the book title has to tell the reader what kind of reading
    experience to expect.
  id: totrans-2562
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，书名必须告诉读者可以期待什么样的阅读体验。
- en: A fun, upbeat, and witty book will likely have a “punny” title with a play on
    words, for example. We’ll Always Have Parrots and Gone Gull by Donna Andrews.
  id: totrans-2563
  prefs: []
  type: TYPE_NORMAL
  zh: 一本有趣、轻松、幽默的书可能有一个“双关语”标题，例如。唐娜·安德鲁斯的《我们永远都有鹦鹉》和《 gone Gull》。
- en: A more traditional mystery may have “murder” in the title. For example. Murder
    on the Orient Express by Agatha Christie and Murder Among the Roses by Liz Fielding.
  id: totrans-2564
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更传统的谜案可能在其标题中有“谋杀”一词。例如。阿加莎·克里斯蒂的《东方快车谋杀案》和莉兹·菲尔丁的《玫瑰丛中的谋杀》。
- en: I like titles based on movies and TV shows. The more popular, the better.
  id: totrans-2565
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢基于电影和电视节目的标题。越受欢迎越好。
- en: What kind of title would you give to the first book that would serve as the
    title for the entire series?
  id: totrans-2566
  prefs: []
  type: TYPE_NORMAL
  zh: 你会给第一本书起什么名字，使其成为整个系列的标题？
- en: Read through your favorite book titles. What would make you pick up a mystery
    based on the title?
  id: totrans-2567
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读你最喜欢的书名。什么会使你根据标题选择一本谜案？
- en: Brainstorm a list of at least 20 ideas, then ask the AI to suggest more using
    the same theme and approach.
  id: totrans-2568
  prefs: []
  type: TYPE_NORMAL
  zh: 列出至少20个想法，然后要求AI使用相同的主题和方法提出更多建议。
- en: Let’s see what book titles ChatGPT can come up with for my Polperran case study
    mystery.
  id: totrans-2569
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看ChatGPT能为我的Polperran案例研究谜案想出什么书名。
- en: '![](image_rsrc45U.jpg)'
  id: totrans-2570
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc45U.jpg)'
- en: 'I want to write a paranormal cozy murder mystery series set in a small coastal
    town with a crafts theme. Can you suggest 10 book titles that are linked to the
    crafts and paranormal cozy mystery theme? Each book title should begin with the
    words: “Murder in. “I also need a compelling and engaging name for the series
    that will attract cozy mystery readers.'
  id: totrans-2571
  prefs: []
  type: TYPE_NORMAL
  zh: 我想写一个以手工艺为主题的超自然轻松谋杀谜案系列，背景设定在一个小沿海城镇。你能建议10个与手工艺和超自然轻松谋杀谜案主题相关的书名吗？每个书名应以“Murder
    in”开头。“我还需要一个吸引轻松谋杀谜案读者的引人入胜且吸引人的系列名称。”
- en: 'Here is the book description: [ paste the book description you have generated
    from the synopsis here]'
  id: totrans-2572
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是书籍描述：[在此处粘贴您从梗概中生成的书籍描述]
- en: '![](image_rsrc45V.jpg)'
  id: totrans-2573
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc45V.jpg)'
- en: 'Series Name: Psychic Shores Mysteries'
  id: totrans-2574
  prefs: []
  type: TYPE_NORMAL
  zh: 系列名称：Psychic Shores Mysteries
- en: 'Book Titles:'
  id: totrans-2575
  prefs: []
  type: TYPE_NORMAL
  zh: 书名：
- en: 'Murder in Clairvoyance: A Psychic Shores Mystery'
  id: totrans-2576
  prefs: []
  type: TYPE_NORMAL
  zh: 'Murder in Clairvoyance: A Psychic Shores Mystery'
- en: 'Murder in Premonitions: Whispers of the Past'
  id: totrans-2577
  prefs: []
  type: TYPE_NORMAL
  zh: 'Murder in Premonitions: Whispers of the Past'
- en: 'Murder in Spirits: Echoes of Polperran'
  id: totrans-2578
  prefs: []
  type: TYPE_NORMAL
  zh: 'Murder in Spirits: Echoes of Polperran'
- en: 'Murder in Merino: A Crafts & Curses Mystery'
  id: totrans-2579
  prefs: []
  type: TYPE_NORMAL
  zh: 'Murder in Merino: A Crafts & Curses Mystery'
- en: 'Murder in Purls: Secrets of the Stitch'
  id: totrans-2580
  prefs: []
  type: TYPE_NORMAL
  zh: 'Murder in Purls: Secrets of the Stitch'
- en: 'Murder in Thimbles: The Quilted Conspiracy'
  id: totrans-2581
  prefs: []
  type: TYPE_NORMAL
  zh: 'Murder in Thimbles: The Quilted Conspiracy'
- en: 'Murder in Charms: The Bewitched Loom'
  id: totrans-2582
  prefs: []
  type: TYPE_NORMAL
  zh: 'Murder in Charms: The Bewitched Loom'
- en: 'Murder in Lace: The Haunted Tapestry'
  id: totrans-2583
  prefs: []
  type: TYPE_NORMAL
  zh: 'Murder in Lace: The Haunted Tapestry'
- en: 'Murder in Wool: The Ghostly Spinner'
  id: totrans-2584
  prefs: []
  type: TYPE_NORMAL
  zh: 'Murder in Wool: The Ghostly Spinner'
- en: 'Murder in Patterns: The Psychic''s Patchwork'
  id: totrans-2585
  prefs: []
  type: TYPE_NORMAL
  zh: 'Murder in Patterns: The Psychic''s Patchwork'
- en: This can be such a fun process! Using AI to generate book titles can save you
    hours, if not days, of time.
  id: totrans-2586
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个如此有趣的过程！使用AI生成书名可以节省你数小时，甚至数天的时间。
- en: NEXT STEPS
  id: totrans-2587
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下一步
- en: 'At this point, you have completed all ten steps in the plotting process, and
    you should have worked on the following:'
  id: totrans-2588
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你已经完成了情节规划过程中的十个步骤，你应该已经完成了以下工作：
- en: A title for your book.
  id: totrans-2589
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为你的书起一个标题。
- en: A book description.
  id: totrans-2590
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一段书籍描述。
- en: A short synopsis of the plot.
  id: totrans-2591
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 故事梗概的简要概述。
- en: A full Four Act Cozy Mystery Plot Outline with at least 16 to 24 Chapters.
  id: totrans-2592
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个完整的四幕轻松谋杀谜案情节大纲，至少包含16至24章。
- en: Collect together all of the ideas that have popped up during the ten-step story
    development process into one document. Then, dive in and have fun with the writing.
  id: totrans-2593
  prefs: []
  type: TYPE_NORMAL
  zh: 将在十步故事发展过程中出现的所有想法收集到一个文档中。然后，深入其中，享受写作的乐趣。
- en: Use your writing notes and ideas and use ChatGPT to flesh out each of the 24
    chapters, building on each chapter in succession.
  id: totrans-2594
  prefs: []
  type: TYPE_NORMAL
  zh: 使用你的写作笔记和想法，并用ChatGPT来充实每一章，依次构建每一章。
- en: Some authors prefer to work on the crucial first act, then build on the key
    turning point events in the rest of the book that spin out from those “discovery”
    opening scenes.
  id: totrans-2595
  prefs: []
  type: TYPE_NORMAL
  zh: 一些作者更喜欢先专注于关键的第一幕，然后在书的其余部分构建从那些“发现”开场场景中产生的关键转折点事件。
- en: Your books. Your process.
  id: totrans-2596
  prefs: []
  type: TYPE_NORMAL
  zh: 你的书籍。你的过程。
- en: WORKING WITH ChatGPT AND AI
  id: totrans-2597
  prefs: []
  type: TYPE_NORMAL
  zh: 与ChatGPT和AI合作
- en: What is ChatGPT?
  id: totrans-2598
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是ChatGPT？
- en: Artificial intelligence is a broad field of computer science focused on creating
    systems capable of performing tasks that typically require human intelligence.
  id: totrans-2599
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能是计算机科学的一个广泛领域，专注于创建能够执行通常需要人类智能的任务的系统。
- en: A key component of AI is Natural Language Processing (NLP). NLP allows machines
    to understand, interpret, and generate human language in a way that is meaningful
    and contextually appropriate.
  id: totrans-2600
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的关键组成部分是自然语言处理（NLP）。NLP使机器能够以有意义和上下文适当的方式理解、解释和生成人类语言。
- en: 'How ChatGPT Works: Training, Language Model, and Abilities'
  id: totrans-2601
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的工作原理：训练、语言模型和能力
- en: Large language models like ChatGPT are trained using vast amounts of data. By
    processing millions of sentences, phrases, and words, the AI model learns a language's
    structure, grammar rules, common phrases, and facts.
  id: totrans-2602
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于ChatGPT的大型语言模型使用大量数据进行训练。通过处理数百万个句子、短语和单词，AI模型学习了一种语言的结构、语法规则、常用短语和事实。
- en: ChatGPT is based on a type of machine learning model known as a transformer
    neural network, specifically, the Generative Pre-trained Transformer model.
  id: totrans-2603
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT基于一种名为转换器神经网络的机器学习模型，具体来说是生成预训练转换器模型。
- en: 'Training ChatGPT involves two stages: pre-training and fine-tuning. The model
    is exposed to a vast dataset containing parts of the internet during pre-training.'
  id: totrans-2604
  prefs: []
  type: TYPE_NORMAL
  zh: 训练ChatGPT涉及两个阶段：预训练和微调。在预训练期间，模型接触到包含互联网部分内容的庞大数据集。
- en: The model doesn't know specifics about which documents were in its training
    set or have access to any specific documents or sources. Instead, it learns to
    predict the next word in a sentence based on the words it has seen so far. Then,
    it is fine-tuned through reinforcement learning from human feedback, focusing
    it on more specific tasks, like maintaining a coherent conversation or writing
    a piece of fiction.
  id: totrans-2605
  prefs: []
  type: TYPE_NORMAL
  zh: 模型不知道其训练集中具体有哪些文档，也没有访问任何特定文档或来源的权限。相反，它通过学习根据迄今为止看到的单词预测句子中的下一个单词。然后，通过从人类反馈中进行的强化学习进行微调，使其专注于更具体的任务，如维持连贯的对话或撰写虚构作品。
- en: The first GPT model, GPT-1, was a proof-of-concept model developed by OpenAI
    in 2018\. GPT-3, unveiled in June 2020, took things a step further with a massive
    leap in the size of the model and its capabilities. Each iteration improved the
    language model's ability to generate coherent, contextually relevant sentences
    and respond effectively to various prompts.
  id: totrans-2606
  prefs: []
  type: TYPE_NORMAL
  zh: 首个GPT模型，GPT-1，是由OpenAI于2018年开发的一个概念验证模型。2020年6月发布的GPT-3，在模型规模和能力上实现了巨大的飞跃。每一次迭代都提高了语言模型生成连贯、上下文相关句子和有效响应各种提示的能力。
- en: It doesn't understand the text it generates but predicts what comes next based
    on its training.
  id: totrans-2607
  prefs: []
  type: TYPE_NORMAL
  zh: 它不理解它生成的文本，而是根据其训练预测接下来会发生什么。
- en: The most recent version of this AI model is GPT-4, an even larger and more capable
    model.
  id: totrans-2608
  prefs: []
  type: TYPE_NORMAL
  zh: 这个人工智能模型的最新版本是GPT-4，这是一个更大、能力更强的模型。
- en: 'ChatGPT: Purpose and Abilities'
  id: totrans-2609
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：目的和能力
- en: The primary purpose of ChatGPT is to generate human-like text based on the prompts
    it's given. ChatGPT can understand and continue a text based on the context provided
    by the prompt, making it useful for various purposes, from drafting emails to
    tutoring in various subjects, and writing fiction.
  id: totrans-2610
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的主要目的是根据其收到的提示生成类似人类的文本。ChatGPT可以理解并根据提示提供的上下文继续文本，这使得它在各种用途中都很有用，从撰写电子邮件到各种学科的辅导，以及撰写虚构作品。
- en: 'Understanding ChatGPT: Tokens, Memory Limitations, and Evolution from 3.5 to
    4'
  id: totrans-2611
  prefs: []
  type: TYPE_NORMAL
  zh: 理解ChatGPT：Tokens、内存限制和从3.5到4的演变
- en: Within a single conversation, ChatGPT's understanding is bound by a window of
    'memory' or context length defined by 'tokens.'
  id: totrans-2612
  prefs: []
  type: TYPE_NORMAL
  zh: 在单次对话中，ChatGPT的理解受限于由“tokens”定义的“记忆”或上下文长度窗口。
- en: A token is a chunk of text that can be as short as one character or as long
    as one word in English (e.g., 'a,' 'apple'). In other languages, a token might
    not correspond to a whole word.
  id: totrans-2613
  prefs: []
  type: TYPE_NORMAL
  zh: Token是一段文本，可以是英文中的一个字符长，也可以是一个单词长（例如，“a”，“apple”）。在其他语言中，token可能不对应整个单词。
- en: The maximum number of tokens that ChatGPT can handle simultaneously – the 'context
    window' – limits the conversation length.  If a conversation exceeds this limit,
    the AI loses sight of the earlier tokens, affecting its ability to maintain context
    and coherence.
  id: totrans-2614
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以同时处理的token的最大数量——即“上下文窗口”——限制了对话的长度。如果对话超过这个限制，AI就会失去对早期tokens的视线，影响其维持上下文和连贯性的能力。
- en: ChatGPT-4 has a larger model size, which corresponds to improved fluency, creativity,
    and comprehension.
  id: totrans-2615
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4具有更大的模型规模，这对应着改进的流畅性、创造力和理解力。
- en: This means that ChatGPT-4 can generate higher-quality outputs, particularly
    when dealing with complex tasks or long conversations.
  id: totrans-2616
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着 ChatGPT-4 可以生成更高质量的输出，尤其是在处理复杂任务或长对话时。
- en: As we look to the future, continual advancements in AI tools such as ChatGPT
    will improve their ability to support creative writing projects while still maintaining
    your unique author voice and writing style.
  id: totrans-2617
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们展望未来，像 ChatGPT 这样的 AI 工具的持续进步将提高它们支持创意写作项目的能力，同时仍然保持您独特的作者声音和写作风格。
- en: Getting Started with ChatGPT
  id: totrans-2618
  prefs: []
  type: TYPE_NORMAL
  zh: 开始使用 ChatGPT
- en: How to Create a ChatGPT Account
  id: totrans-2619
  prefs: []
  type: TYPE_NORMAL
  zh: 如何创建 ChatGPT 账户
- en: Before you can use ChatGPT or any other OpenAI tools, you need to create an
    account with OpenAI. This process is straightforward.
  id: totrans-2620
  prefs: []
  type: TYPE_NORMAL
  zh: 在您可以使用 ChatGPT 或任何其他 OpenAI 工具之前，您需要创建一个 OpenAI 账户。这个过程很简单。
- en: 1\. Visit the OpenAI Website
  id: totrans-2621
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 访问 OpenAI 网站
- en: Head to [https://chat.openai.com/auth/login](https://chat.openai.com/auth/login) to
    get started creating a new account.
  id: totrans-2622
  prefs: []
  type: TYPE_NORMAL
  zh: 前往 [https://chat.openai.com/auth/login](https://chat.openai.com/auth/login)
    开始创建新账户。
- en: If you see "[ChatGPT is at capacity right now](https://www.wikihow.com/Chat-Gpt-Is-at-Capacity)",
    wait a few moments and try again.
  id: totrans-2623
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您看到“[ChatGPT 目前已满载](https://www.wikihow.com/Chat-Gpt-Is-at-Capacity)”，请等待片刻后再试。
- en: You can also create an account using the [ChatGPT mobile app](https://apps.apple.com/us/app/chatgpt/id6448311069) for
    iPhone and Android.
  id: totrans-2624
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您还可以使用 [ChatGPT 移动应用](https://apps.apple.com/us/app/chatgpt/id6448311069) 为
    iPhone 和 Android 创建账户。
- en: You can also use the chatbot on your phone or tablet's web browser.
  id: totrans-2625
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您也可以在手机或平板电脑的网页浏览器中使用聊天机器人。
- en: '![A screenshot of a chat  Description automatically generated with medium confidence](image_rsrc45W.jpg)'
  id: totrans-2626
  prefs: []
  type: TYPE_IMG
  zh: '![聊天截图  描述由中等置信度自动生成](image_rsrc45W.jpg)'
- en: 2\. Click on Sign Up
  id: totrans-2627
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击注册
- en: Once you're on the OpenAI website, you'll see a "Sign Up" button, usually at
    the top right corner of the homepage. Click on this button to begin the account
    creation process.
  id: totrans-2628
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您在 OpenAI 网站上，您会看到一个“注册”按钮，通常位于主页右上角。点击此按钮开始创建账户的过程。
- en: 3\. Fill in Your Details
  id: totrans-2629
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 填写您的详细信息
- en: You'll be directed to a sign-up page where you'll be asked to fill in details
    such as your name, email address, and password. Ensure you complete the correct
    information, as this account will be used to access OpenAI tools.
  id: totrans-2630
  prefs: []
  type: TYPE_NORMAL
  zh: 您将被引导到一个注册页面，您需要填写诸如姓名、电子邮件地址和密码等详细信息。请确保您填写了正确的信息，因为这个账户将用于访问 OpenAI 工具。
- en: Enter your email address and click Continue. You can also sign up through your
    Google, Microsoft, or Apple account. To do so, click the corresponding button.
    If you register with a Google, Microsoft, or Apple account, skip to Step 6 once
    you're signed in.
  id: totrans-2631
  prefs: []
  type: TYPE_NORMAL
  zh: 输入您的电子邮件地址并点击继续。您也可以通过 Google、Microsoft 或 Apple 账户注册。为此，请点击相应的按钮。如果您使用 Google、Microsoft
    或 Apple 账户注册，登录后跳转到第 6 步。
- en: Create a password and click Continue. Your password must be at least eight characters
    long.
  id: totrans-2632
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个密码并点击继续。您的密码必须至少有八个字符长。
- en: '![A screenshot of a login form  Description automatically generated with medium
    confidence](image_rsrc45X.jpg)   ![A screenshot of a login form  Description automatically
    generated with medium confidence](image_rsrc45Y.jpg)'
  id: totrans-2633
  prefs: []
  type: TYPE_IMG
  zh: '![登录表单截图  描述由中等置信度自动生成](image_rsrc45X.jpg) ![登录表单截图  描述由中等置信度自动生成](image_rsrc45Y.jpg)'
- en: 4\. Confirm Your Email Address
  id: totrans-2634
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 确认您的电子邮件地址
- en: '![A picture containing text, screenshot, font, design  Description automatically
    generated](image_rsrc45Z.jpg)'
  id: totrans-2635
  prefs: []
  type: TYPE_IMG
  zh: '![包含文本、截图、字体、设计的图片  描述由自动生成](image_rsrc45Z.jpg)'
- en: Once you've filled in your details, you'll be asked to confirm your email address.
    OpenAI will send a confirmation link to the email address you provided. Click
    this link to verify your email address.
  id: totrans-2636
  prefs: []
  type: TYPE_NORMAL
  zh: 在您填写了详细信息后，您将被要求确认您的电子邮件地址。OpenAI 将向您提供的电子邮件地址发送一个确认链接。点击此链接以验证您的电子邮件地址。
- en: If you didn't receive the email, click Resend email. Check your spam or junk
    folder if you still haven't received the email.
  id: totrans-2637
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您没有收到电子邮件，请点击“重新发送电子邮件”。如果仍未收到电子邮件，请检查您的垃圾邮件或垃圾文件夹。
- en: 5\. Review and Agree to OpenAI's Use Case Policy
  id: totrans-2638
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 审查并同意 OpenAI 的使用案例政策
- en: Before your account is activated, you must review and agree to OpenAI's use
    case policy, which outlines the ethical guidelines and terms of use for its tools.
  id: totrans-2639
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的账户激活之前，您必须审查并同意 OpenAI 的使用案例政策，该政策概述了其工具的道德准则和使用条款。
- en: Enter your first and last names and click Continue.
  id: totrans-2640
  prefs: []
  type: TYPE_NORMAL
  zh: 输入您的姓名和姓氏，然后点击继续。
- en: '![A screenshot of a computer  Description automatically generated with low
    confidence](image_rsrc460.jpg)'
  id: totrans-2641
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图  描述由低置信度自动生成](image_rsrc460.jpg)'
- en: Whatever method you choose, phone verification is required for signup. Select
    your country, enter your valid phone number, and click “Send code”.
  id: totrans-2642
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您选择哪种方法，注册时都需要进行电话验证。选择您的国家，输入有效的电话号码，然后点击“发送代码”。
- en: '![A screenshot of a phone number  Description automatically generated with
    medium confidence](image_rsrc461.jpg)'
  id: totrans-2643
  prefs: []
  type: TYPE_IMG
  zh: '![手机号码的截图  描述由中等置信度自动生成](image_rsrc461.jpg)'
- en: Enter the 6-digit code you received on your phone.
  id: totrans-2644
  prefs: []
  type: TYPE_NORMAL
  zh: 输入您在手机上收到的6位数字代码。
- en: ChatGPT is not yet supported in all countries. If you have a phone number from
    an unsupported country, you won't be able to create an account. Contact the ChatGPT
    website for the next steps.
  id: totrans-2645
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT目前尚未在所有国家得到支持。如果您来自一个不受支持的国家，您将无法创建账户。请联系ChatGPT网站了解下一步操作。
- en: Enter the verification code and click Continue. Once your code is accepted,
    you'll be logged in, and you can now start using ChatGPT.
  id: totrans-2646
  prefs: []
  type: TYPE_NORMAL
  zh: 输入验证码并点击“继续”。一旦您的代码被接受，您将登录，现在您可以开始使用ChatGPT。
- en: 6\. Start Using OpenAI Tools
  id: totrans-2647
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 开始使用OpenAI工具
- en: Once your account is activated, you can start using OpenAI's tools, including
    ChatGPT.
  id: totrans-2648
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您的账户被激活，您就可以开始使用OpenAI的工具，包括ChatGPT。
- en: Free Version of ChatGPT
  id: totrans-2649
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT免费版
- en: ChatGPT is free, but your request will be in the queue with the millions of
    other users online at that precise moment worldwide. Plus, it can only manage
    a certain amount of text in one conversation.
  id: totrans-2650
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是免费的，但您的请求将与其他数百万在线用户同时排在世界各地的队列中。此外，它只能在一次对话中处理一定量的文本。
- en: '![](image_rsrc462.jpg)'
  id: totrans-2651
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc462.jpg)'
- en: This is more than enough capacity for most of the questions you can create during
    the writing process when your question is short and the answer is rarely more
    than a thousand words long.
  id: totrans-2652
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于在写作过程中创建的大多数问题来说已经足够了，当您的问题简短且答案很少超过一千字时。
- en: For example, it won’t be able to create a synopsis for your entire 50,000-word
    novel.  You will have to break the text into smaller chunks, and the size of the
    chunk it can handle will depend on what mode of ChatGPT you are using.
  id: totrans-2653
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，它无法为您整个50,000字的小说创建摘要。您将不得不将文本分成更小的部分，而它能够处理的文本块的大小将取决于您使用的ChatGPT模式。
- en: 'Ask GPT to “continue”: Request that the AI continue its response from where
    it left off – allowing you to generate more content in a follow-up query.'
  id: totrans-2654
  prefs: []
  type: TYPE_NORMAL
  zh: 让GPT“继续”：请求AI从上次停止的地方继续其回答 - 允许您在后续查询中生成更多内容。
- en: Paid Version of ChatGPT Plus
  id: totrans-2655
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus付费版
- en: GPT-4 is OpenAI’s most advanced system, producing safer and more valuable responses.
    Thanks to its broader general knowledge and problem-solving abilities, GPT-4 can
    solve complex problems with greater accuracy. It is available in ChatGPT Plus.
  id: totrans-2656
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4是OpenAI最先进的系统，能够产生更安全和更有价值的回答。得益于其更广泛的一般知识和解决问题的能力，GPT-4可以更准确地解决复杂问题。它可在ChatGPT
    Plus中找到。
- en: GPT-4 is more creative and can generate, edit, and iterate with users on creative
    and technical writing tasks, such as composing songs, writing screenplays, or
    learning a user’s writing style.
  id: totrans-2657
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4更具创造力，可以与用户一起在创意和技术写作任务上进行创作、编辑和迭代，例如创作歌曲、编写剧本或学习用户的写作风格。
- en: GPT-4 is capable of handling over 25,000 words of text, allowing for long-form
    content creation, extended conversations, and document search and analysis. The
    total combined word count for the question input and output response for any query
    is estimated to be about 20,000 to 25,000 English words. These limits are likely
    to be extended as the AI is updated.
  id: totrans-2658
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4能够处理超过25,000字的文本，允许进行长篇内容创作、延长对话以及文档搜索和分析。任何查询的输入和输出响应的总字数估计约为20,000到25,000个英语单词。这些限制可能会随着AI的更新而扩展。
- en: How to get the most out of ChatGPT
  id: totrans-2659
  prefs: []
  type: TYPE_NORMAL
  zh: 如何充分利用ChatGPT
- en: Leveraging the power of ChatGPT for your writing projects can be transformative,
    but here are a few key guidelines to get the most out of the tool.
  id: totrans-2660
  prefs: []
  type: TYPE_NORMAL
  zh: 利用ChatGPT的力量为您的写作项目带来变革，但以下是一些关键指南，以充分利用此工具。
- en: An Introduction to Writing with AI
  id: totrans-2661
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用AI写作的介绍
- en: In AI-assisted writing, the author and the AI tool work together to generate
    an output that meets the author’s needs for that part of the creative writing
    process.
  id: totrans-2662
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI辅助写作中，作者和AI工具共同工作，生成满足作者在该部分创意写作过程中需求的输出。
- en: For example, ChatGPT can generate a character profile for your cozy mystery
    detective, but it's the human author who provides the criteria, writes the prompts,
    and then critically evaluates and refines the character profile the tool generates.
    It's a collaborative process where the AI and the author work with their unique
    strengths.
  id: totrans-2663
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，ChatGPT可以为你的温馨神秘侦探小说生成一个角色档案，但提供标准、撰写提示并随后批判性地评估和改进该工具生成的角色档案的是人类作者。这是一个AI和作者共同协作的过程，各自发挥其独特的优势。
- en: Using ChatGPT allows you to focus on those areas of the writing process that
    are your strengths, while the AI tool works on the other aspects.
  id: totrans-2664
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT允许你专注于写作过程中你擅长的领域，而AI工具则处理其他方面。
- en: This is a very different approach and will need a mindset shift.
  id: totrans-2665
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种非常不同的方法，需要思维方式的转变。
- en: As authors, we are accustomed to the solitary nature of writing, including staring
    at a blank page, crafting text from scratch, and then endlessly revising and editing
    the manuscript until we're happy with it.
  id: totrans-2666
  prefs: []
  type: TYPE_NORMAL
  zh: 作为作家，我们习惯于写作的孤独性质，包括面对空白页面，从头开始创作文本，然后不断地修订和编辑手稿，直到我们满意为止。
- en: With AI, the solitary nature of writing shifts to a more collaborative one when
    the "co-writer" is an artificial intelligence. In any form of collaboration, the
    way we communicate with our colleagues will determine the quality of the response
    we receive.
  id: totrans-2667
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI时，当“合著者”是人工智能时，写作的孤独性质转变为更协作的性质。在任何形式的协作中，我们与同事沟通的方式将决定我们收到的回应的质量。
- en: 1\. Understand How Prompts Work
  id: totrans-2668
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 理解提示的工作原理
- en: Prompt engineering is the skillful crafting of instructions that guide the AI's
    outputs. Prompts are crucial in guiding ChatGPT. The more specific and clear your
    prompts are, the more relevant the output will be.
  id: totrans-2669
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是巧妙地构建指导AI输出的指令的技能。提示对于引导ChatGPT至关重要。你的提示越具体和清晰，输出的相关性就越高。
- en: ChatGPT's interaction model is based on a prompt-and-response system. You, the
    user, provide a prompt, like the starting sentence of a story or a question, and
    the model generates a response based on what it has learned during its training.
    You can then ask for more information.
  id: totrans-2670
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的交互模型基于提示和回应系统。你，作为用户，提供一个提示，比如故事的起始句子或一个问题，模型根据其在训练期间学到的内容生成回应。然后你可以要求更多信息。
- en: The way you structure your prompts can significantly influence the type of response
    you get.
  id: totrans-2671
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何构建你的提示可以显著影响你得到的回应类型。
- en: Worked Example of Prompt Structure
  id: totrans-2672
  prefs: []
  type: TYPE_NORMAL
  zh: 提示结构的工作示例
- en: 'What to do: Give me ten story ideas for'
  id: totrans-2673
  prefs: []
  type: TYPE_NORMAL
  zh: 要做什么：给我十个故事想法
- en: 'The Subject: a fantasy historical cozy mystery story featuring a brilliant
    amateur detective and an elusive thief who is an elf.'
  id: totrans-2674
  prefs: []
  type: TYPE_NORMAL
  zh: 主题：一部以一位聪明的业余侦探和一位难以捉摸的精灵小偷为主角的幻想历史温馨神秘故事。
- en: 'The Context: The story is set in Victorian London.'
  id: totrans-2675
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：故事发生在维多利亚时代的伦敦。
- en: 'The Style: Each story idea should be engaging, have a murder to investigate
    and be attractive to readers of historical fantasy mystery fiction.'
  id: totrans-2676
  prefs: []
  type: TYPE_NORMAL
  zh: 风格：每个故事想法都应该引人入胜，有一个需要调查的谋杀案，并且对历史幻想神秘小说的读者有吸引力。
- en: If you're plotting a cozy mystery novel, you might begin with a detailed prompt
    that outlines the main characters, the setting, and the general direction of the
    plot.
  id: totrans-2677
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在策划一部温馨神秘小说，你可能从一个详细的提示开始，概述主要角色、背景和故事的大致方向。
- en: 'New Ideas: At the initial brainstorming stage, prompts can be questions or
    open-ended scenarios.'
  id: totrans-2678
  prefs: []
  type: TYPE_NORMAL
  zh: 新想法：在最初的头脑风暴阶段，提示可以是问题或开放式场景。
- en: For example, an author might use the prompt, "What could be some unique complications
    in a love story between a Victorian private detective and an elf living in the
    London underworld?"
  id: totrans-2679
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一位作者可能会使用这样的提示：“在一个维多利亚时代的私家侦探和一个生活在伦敦地下世界的精灵之间的爱情故事中，可能有哪些独特的复杂情况？”
- en: 'Drafting: Once the basic story framework is in place, prompts can be more directive,
    outlining a scenario or event in the story. A prompt like, "Describe the first
    time the detective meets the elf that he has been following through the dark London
    streets into the forbidden zones," gives the AI clear guidance. Including character
    names, descriptions, and emotional cues can help produce more nuanced responses.'
  id: totrans-2680
  prefs: []
  type: TYPE_NORMAL
  zh: 起草：一旦故事的基本框架确定，提示可以更加具体，概述故事中的某个场景或事件。例如，“描述侦探第一次在黑暗的伦敦街道上跟随他追踪的精灵进入禁区的情景”，这样的提示为AI提供了明确的指导。包括角色名字、描述和情感提示可以帮助产生更细腻的回应。
- en: 'Revising: In the revision stage, prompts can be used to rework existing content.
    If a specific dialogue feels stilted, authors can prompt the AI with, "Rewrite
    the following dialogue in a more casual, playful tone..." Similarly, for improving
    narrative descriptions, prompts like "Describe the same event from a different
    character''s perspective..." can provide fresh insights.'
  id: totrans-2681
  prefs: []
  type: TYPE_NORMAL
  zh: 修订：在修订阶段，提示可以用来重新构思现有内容。如果某个特定对话显得生硬，作者可以向AI提示：“将以下对话重写得更随意、更轻松的语气……”同样，为了改进叙事描述，如“从不同角色的视角描述同一事件……”这样的提示可以提供新的见解。
- en: 'Polishing: Finally, during the polishing stage, authors can use prompts to
    refine the language, ensuring the text is engaging and grammatically correct.
    A prompt could be, "Proofread the following paragraph for grammar and style,"
    or "Rewrite this passage using more vivid, sensory language..."'
  id: totrans-2682
  prefs: []
  type: TYPE_NORMAL
  zh: 磨光：最后，在磨光阶段，作者可以使用提示来润色语言，确保文本引人入胜且语法正确。提示可以是：“请校对以下段落，检查语法和风格”，或者“用更生动、更具感官性的语言重写这段文字……”
- en: 2\. Try Role-Playing for Dialogue
  id: totrans-2683
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 尝试角色扮演对话
- en: A role-playing approach can be effective in creating dialogue. Define the role
    of the AI, for instance, as a character in your novel, and engage in a conversation
    as if you were another character.
  id: totrans-2684
  prefs: []
  type: TYPE_NORMAL
  zh: 角色扮演方法在创造对话时可能很有效。定义AI的角色，例如，作为你小说中的一个角色，并像另一个角色一样进行对话。
- en: 'Let’s say that you are creating a dialogue between your Victorian amateur detective
    and a police officer who is investigating a murder at a grand ball. You could
    assign roles like this: "You are a brilliant Victorian aristocratic amateur sleuth
    trying to calm down a demanding police officer sent to investigate a murder and
    the theft of a very special moonstone.”'
  id: totrans-2685
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在创作一个对话，其中你的维多利亚时代业余侦探和一位正在调查一场盛大舞会上谋杀案的警官。你可以分配这样的角色：“你是位杰出的维多利亚时代贵族业余侦探，试图安抚一位被派去调查谋杀案和一块非常特别的月光石失窃案的要求苛刻的警官。”
- en: You can also ask the AI to interview one or more characters as though they were
    living people, asking about their lives and personality.
  id: totrans-2686
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以要求AI像对待真人一样采访一个或多个角色，询问他们的生活和个性。
- en: 3\. Review and Iterate
  id: totrans-2687
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 审查和迭代
- en: ChatGPT’s responses are not always perfect. If the output isn't what you expected,
    you may need to rephrase your prompt or request a regeneration. Experimenting
    with different prompts and learning from these trials can lead to better results.
  id: totrans-2688
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回应并不总是完美的。如果输出结果不是你预期的，你可能需要重新措辞提示或请求重新生成。通过尝试不同的提示并从这些试验中学习，可以带来更好的结果。
- en: For instance, if a prompt "Describe a small coastal town" generates a response
    that's too generic, you might adjust it to "Describe a small coastal town on an
    evening in summer when the tourists have left the harbor for the residents to
    enjoy. Provide sensory details of the scene from the viewpoint of a barista who
    enjoys walking along the harbor in the evening with her rescue dog and watching
    the fishing boats."
  id: totrans-2689
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果提示“描述一个小海滨小镇”生成的回应过于泛泛，你可能会调整它为：“描述一个在夏季傍晚，游客离开港口让居民享受的小海滨小镇。从一位喜欢在傍晚沿着港口散步并带着她的救援犬观看渔船的咖啡师的角度，提供场景的感官细节。”
- en: By incorporating these strategies and approaches into your use of ChatGPT, you'll
    be better equipped to create engaging and compelling content. The more you use
    and experiment with this technology, the more effective you'll become.
  id: totrans-2690
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将这些策略和方法融入你对ChatGPT的使用中，你将更好地装备自己，以创作出引人入胜和引人注目的内容。你使用和实验这项技术的次数越多，你将变得越有效。
- en: 'ChatGPT in Creative Writing: Strengths and Limitations'
  id: totrans-2691
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在创意写作中的优势和局限性
- en: The strengths of ChatGPT in creative writing lie in its ability to generate
    diverse and creative narratives, produce large amounts of text quickly, and provide
    unique perspectives that inspire new ideas. It can help overcome writer's block,
    increase productivity, and be a valuable tool for brainstorming and drafting.
  id: totrans-2692
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在创意写作中的优势在于其生成多样化、富有创意的叙事的能力，快速产生大量文本，并提供独特的视角，激发新想法。它可以帮助克服写作障碍，提高生产力，并成为头脑风暴和草拟的有价值工具。
- en: However, these strengths come with limitations.
  id: totrans-2693
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这些优势也伴随着局限性。
- en: ChatGPT's text generation is based on patterns it learned during training, which
    means it can occasionally produce inappropriate or nonsensical outputs.
  id: totrans-2694
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的文本生成基于它在训练期间学习的模式，这意味着它有时可能会产生不适当或不合逻辑的输出。
- en: It can sometimes be overly verbose and may not always maintain perfect consistency,
    especially in longer narratives. Furthermore, while it can follow the instructions
    in a prompt, it doesn't understand the story like a human would.
  id: totrans-2695
  prefs: []
  type: TYPE_NORMAL
  zh: 它有时可能会过于冗长，并且可能无法始终保持完美的连贯性，尤其是在较长的叙述中。此外，虽然它可以遵循提示中的指令，但它并不像人类那样理解故事。
- en: As we navigate this brave new world of AI-assisted writing, remember that tools
    like ChatGPT are just that. Tools.
  id: totrans-2696
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在这个充满AI辅助写作的勇敢新世界中航行时，请记住，像ChatGPT这样的工具只是工具。
- en: This is a tool to help you brainstorm ideas, spark new ones, and then shape
    YOUR version of those ideas, tropes, themes, characters, and settings into a working
    outline of your cozy mystery faster than you thought possible.
  id: totrans-2697
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个帮助你激发想法、激发新想法，并将你的想法、主题、人物和场景版本塑造为工作大纲的工具，使你的轻松悬疑小说比想象中更快地完成。
- en: Challenges using ChatGPT
  id: totrans-2698
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT的挑战
- en: In this chapter, I want to discuss some ethical and legal aspects of using ChatGPT,
    or any other form of AI, to support your creative writing.
  id: totrans-2699
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我想讨论使用ChatGPT或任何其他形式的AI来支持你的创意写作的一些伦理和法律方面。
- en: OWNERSHIP AND Copyright challenges
  id: totrans-2700
  prefs: []
  type: TYPE_NORMAL
  zh: 所有权和版权挑战
- en: You have just seen, and I hope you tested out for yourself, how ChatGPT can
    write the text of a working draft of your cozy mystery novel using the prompts
    you provided.
  id: totrans-2701
  prefs: []
  type: TYPE_NORMAL
  zh: 你刚刚看到了，我希望你自己也尝试过，ChatGPT如何使用你提供的提示来撰写你轻松悬疑小说的工作草案的文本。
- en: 'The challenge is this: You may have provided unique prompts based on your ideas
    and the ideas generated by ChatGPT, but the AI has written the text for that scene
    or chapter.'
  id: totrans-2702
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战在于：你可能提供了基于你自己的想法和ChatGPT生成想法的独特提示，但AI已经为那个场景或章节写出了文本。
- en: Who owns that piece of writing?
  id: totrans-2703
  prefs: []
  type: TYPE_NORMAL
  zh: 谁拥有那篇写作？
- en: As you can imagine, this is a complex and rapidly evolving area of intellectual
    property law. You should understand the current situation but be aware that these
    issues are being examined globally.
  id: totrans-2704
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所想，这是一个复杂且快速发展的知识产权法律领域。你应该了解当前的情况，但也要意识到这些问题正在全球范围内被审查。
- en: Please note that I am not a lawyer, and this section should not be considered
    legal advice for your country and situation, but I have researched this topic
    for my work.
  id: totrans-2705
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，我并非律师，本节内容不应被视为你所在国家和情况的合法建议，但我已经为我的工作研究了这个主题。
- en: My understanding at this time is that the copyright laws in place are designed
    to protect any work that human authors have created.
  id: totrans-2706
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在的理解是，现行的版权法律旨在保护人类作者创作的任何作品。
- en: Due to their creative involvement, the author who created the prompts and then
    revised, edited, and shaped the output generated by ChatGPT holds the copyright
    for the final text.
  id: totrans-2707
  prefs: []
  type: TYPE_NORMAL
  zh: 由于作者的创造性参与，创建了提示并随后修订、编辑和塑造了ChatGPT生成的输出的作者，对最终文本拥有版权。
- en: In other words, they took the AI's ideas and used them as inspiration to create
    a final original work that is substantially different from the response ChatGPT
    generated.
  id: totrans-2708
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，他们借鉴了AI的想法，并以此作为灵感，创作出与ChatGPT生成的回应实质上不同的最终原创作品。
- en: AI did not write the text. The author used AI as a writing assistant.
  id: totrans-2709
  prefs: []
  type: TYPE_NORMAL
  zh: 文本并非AI所写。作者使用AI作为写作助手。
- en: 'This means that:'
  id: totrans-2710
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着：
- en: '#1\. The prompts you input into ChatGPT to generate prose must be your specific
    and original ideas, even if they were inspired by ideas suggested by ChatGPT,
    and don’t infringe on the intellectual property of other authors.'
  id: totrans-2711
  prefs: []
  type: TYPE_NORMAL
  zh: '#1. 你输入到ChatGPT以生成散文的提示必须是你自己的具体和原创想法，即使这些想法受到了ChatGPT建议的启发，也不要侵犯其他作者的知识产权。'
- en: I have seen videos on YouTube that suggest that you prompt ChatGPT to rewrite
    the text of your scenes in the style of the bestselling authors in your niche,
    so your book is as good as the competition.
  id: totrans-2712
  prefs: []
  type: TYPE_NORMAL
  zh: 我在YouTube上看到过一些视频，建议你提示ChatGPT以你所在领域的畅销书作者的风格重写你的场景文本，让你的书与竞争者一样好。
- en: Please do not do that. Plagiarism is real. Although some writers do this as
    a writing exercise to improve their skills and learn their craft, I still would
    not do it.
  id: totrans-2713
  prefs: []
  type: TYPE_NORMAL
  zh: 请不要这样做。剽窃是真实存在的。尽管一些作家将其作为写作练习来提高技能和学习技艺，但我仍然不会这样做。
- en: Intellectual Property lawyers will make a lot of money in AI in the coming years
    because authors' copyrighted works have been used to train large language models.
  id: totrans-2714
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来几年里，知识产权律师将在AI领域赚得盆满钵满，因为作者的受版权保护的作品已被用于训练大型语言模型。
- en: ChatGPT has been trained using an enormous range of online material and may
    have “learned” the style of popular books in your niche as part of learning how
    language patterns are constructed. It does not hold or recall specific sources
    or documents. It generates responses based on predicting what should come next
    in a piece of text based on the patterns and structures it has learned during
    training.
  id: totrans-2715
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是使用大量在线材料训练的，它可能在学习语言模式结构的过程中“学习”了你所在领域的流行书籍的风格。它不保存或回忆特定的来源或文档。它根据在训练期间学习的模式和结构，预测文本中接下来应该出现的内容来生成响应。
- en: The chance of an exact sentence or turn of phrase being precisely the same as
    the text in an existing work of fiction is very remote, but the last thing you
    want is to be accused of plagiarism of another author’s work.
  id: totrans-2716
  prefs: []
  type: TYPE_NORMAL
  zh: 精确的句子或短语与现有虚构作品中的文本完全相同的可能性非常小，但你最不希望的是被指控剽窃另一位作者的作品。
- en: '#2\. Do not use copyrighted characters, settings, or plot elements.'
  id: totrans-2717
  prefs: []
  type: TYPE_NORMAL
  zh: '#2. 不要使用受版权保护的角色、场景或情节元素。'
- en: I recommend that you don’t use copyrighted characters, trade names, settings,
    or plot elements in any of your prompts. It is easy to ask ChatGPT to create a
    plot outline for a seven-book YA Fantasy series set in a fantasy school for witchcraft
    and wizardry, featuring a young orphan hero like the one created by J.K. Rowling.
  id: totrans-2718
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议你不在任何提示中使用受版权保护的角色、商标、场景或情节元素。很容易让ChatGPT为一系列七本书的青少年奇幻系列创作情节大纲，设定在一个魔法学校，并描绘一个像J.K.罗琳创造的那样年轻的孤儿英雄。
- en: Please do not do that. You have plenty of ideas of your own.
  id: totrans-2719
  prefs: []
  type: TYPE_NORMAL
  zh: 请不要这样做。你有很多自己的想法。
- en: If you are concerned about plagiarism, use a plagiarism detection tool before
    publishing. A quick internet search will show you what is available in both free
    and paid options.
  id: totrans-2720
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你担心剽窃，在出版前使用剽窃检测工具。快速的网络搜索将显示免费和付费选项中都有哪些可用。
- en: The more specific and unique your prompts, the less likely the output will be
    similar to published books.
  id: totrans-2721
  prefs: []
  type: TYPE_NORMAL
  zh: 你的提示越具体、越独特，输出与已出版书籍相似的可能性就越小。
- en: Review what has been generated, then change the prompts to include your ideas
    for characters, settings, and hooks, for example, and then regenerate responses
    until you get a unique result.
  id: totrans-2722
  prefs: []
  type: TYPE_NORMAL
  zh: 审查已生成的内容，然后更改提示以包括你对角色、场景和钩子的想法，例如，然后重新生成响应，直到你得到一个独特的结果。
- en: '#3\. Do not simply copy and paste the prose generated by ChatGPT and use this
    directly in your manuscript. AI Detection is rapidly evolving.'
  id: totrans-2723
  prefs: []
  type: TYPE_NORMAL
  zh: '#3. 不要简单地复制粘贴ChatGPT生成的散文，并将其直接用于你的稿件中。AI检测技术正在快速发展。'
- en: There may be “writers” who would rather not take the time to study story craft
    and are more interested in creating a 50,000-word cozy mystery novel in a day
    without any creative or human input whatsoever. Yes, I have shown you how you
    can do that. But that is their choice.
  id: totrans-2724
  prefs: []
  type: TYPE_NORMAL
  zh: 可能存在一些“作家”，他们宁愿不花时间去研究故事技巧，而是更愿意在一天之内创作一部50,000字的温馨悬疑小说，而没有任何创意或人文输入。是的，我已经向你展示了如何做到这一点。但这完全是他们的选择。
- en: Please don’t do that.
  id: totrans-2725
  prefs: []
  type: TYPE_NORMAL
  zh: 请不要这样做。
- en: Not only will the quality be questionable, but many publishers are checking
    manuscripts with AI detection systems and may reject books that they consider
    are not the result of a substantive amount of human creativity.
  id: totrans-2726
  prefs: []
  type: TYPE_NORMAL
  zh: 不仅质量可能会受到质疑，而且许多出版商正在使用AI检测系统检查稿件，并且可能会拒绝他们认为不是大量人类创意结果的书。
- en: If you are concerned, a range of free and paid AI detection software is available,
    and the list is growing rapidly. I would encourage you to research and evaluate
    the free options.
  id: totrans-2727
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你担心，有各种免费和付费的AI检测软件可供选择，而且这个列表正在迅速增长。我鼓励你研究和评估免费选项。
- en: '#4\. Value your creative talent.'
  id: totrans-2728
  prefs: []
  type: TYPE_NORMAL
  zh: '#4. 重视你的创意才能。'
- en: Currently, ChatGPT generates creative writing ideas faster than I can type,
    and ChatGPT-Plus can manage entire chapters of text.
  id: totrans-2729
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，ChatGPT生成创意写作想法的速度比我打字还快，而ChatGPT-Plus甚至可以管理整章的文字。
- en: Use the tool the way it was intended to be used.
  id: totrans-2730
  prefs: []
  type: TYPE_NORMAL
  zh: 按照工具的预期用途使用它。
- en: To rapidly triage a range of ideas for plot threads and characters, for example,
    and generate a draft outline of your cozy mystery manuscript faster than you thought
    possible.
  id: totrans-2731
  prefs: []
  type: TYPE_NORMAL
  zh: 为了快速对一系列情节线索和人物的想法进行分类，例如，并比你想的更快地生成温馨悬疑手稿的草案大纲。
- en: Then, you can put on your “cozy mystery writer hat” and deepen the character
    arc, building layers of conflict into the plot, and having fun with dialogue and
    luscious settings.
  id: totrans-2732
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以戴上你的“温馨悬疑作家帽”，深化人物弧线，将冲突层次融入情节，并在对话和丰富的场景中享受乐趣。
- en: Creative writing and storytelling are very human activities.
  id: totrans-2733
  prefs: []
  type: TYPE_NORMAL
  zh: 创意写作和讲故事是非常人性化的活动。
- en: No AI system, no matter how sophisticated and trained, will understand the complexity
    and subtle nuances of the authentic human emotional conflict implicit in a romance
    or mystery novel.
  id: totrans-2734
  prefs: []
  type: TYPE_NORMAL
  zh: 任何AI系统，无论多么复杂和训练有素，都不会理解爱情小说或悬疑小说中隐含的复杂和微妙的人类情感冲突。
- en: Just like any scrappy first draft, you should expect to take the ideas that
    emerge and rework them, rewrite and reshape them, and then revise the text to
    add your personal style, creative flair, and original voice.
  id: totrans-2735
  prefs: []
  type: TYPE_NORMAL
  zh: 就像任何草稿一样，你应该期待从出现的想法中提取，重新加工它们，重写和重塑它们，然后修改文本以添加你个人的风格、创意和原创声音。
- en: This is when your unique talent can shine!
  id: totrans-2736
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你的独特才能可以发光的时候！
- en: SUMMARY AND CONCLUSIONS
  id: totrans-2737
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要和结论
- en: Artificial intelligence is with us, and it is here to stay.
  id: totrans-2738
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能已经与我们同在，并且它将永远存在。
- en: Whether we like it or not, AI is already integrated into our daily lives, including
    the spelling and grammar check features in our word processing software packages,
    online bookstore algorithms, and predictive text generators worldwide.
  id: totrans-2739
  prefs: []
  type: TYPE_NORMAL
  zh: 无论我们是否喜欢，AI已经融入了我们的日常生活，包括我们文字处理软件包中的拼写和语法检查功能，在线书店算法，以及全球的预测文本生成器。
- en: The creative writing world is at the forefront of a revolutionary innovative
    approach to AI-assisted co-writing, spearheaded by innovative AI tools like ChatGPT.
  id: totrans-2740
  prefs: []
  type: TYPE_NORMAL
  zh: 创意写作领域是革命性创新方法的前沿，这种方法是AI辅助合著的，由像ChatGPT这样的创新AI工具引领。
- en: Fiction writers are in a unique place where they can use tools like ChatGPT
    to explore and expand their creativity like never before.
  id: totrans-2741
  prefs: []
  type: TYPE_NORMAL
  zh: 小说作家处于一个独特的位置，他们可以使用像ChatGPT这样的工具以前所未有的方式探索和扩展他们的创造力。
- en: It is like having a friendly co-author who is always available to help you with
    those areas of the creative writing process that are not your strengths.
  id: totrans-2742
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像有一个友好的合著者，他总是随时准备帮助你处理那些不是你强项的创意写作过程中的问题。
- en: Like any other tool, the value of ChatGPT lies in the hands of the user. I hope
    I have demonstrated that ChatGPT can generate human-like text to help you brainstorm
    new story ideas, develop character profiles, build effective and engaging plot
    outlines, and then help draft the text of the scenes – without losing your authentic,
    unique creativity and talent.
  id: totrans-2743
  prefs: []
  type: TYPE_NORMAL
  zh: 就像任何其他工具一样，ChatGPT的价值在于用户的手中。我希望我已经证明了ChatGPT可以生成类似人类的文本，帮助你构思新的故事想法，发展角色档案，构建有效和吸引人的情节大纲，然后帮助起草场景文本——而不会失去你真实、独特创造力和才能。
- en: AI will continue to evolve and become an even more powerful tool to support
    your creative work.
  id: totrans-2744
  prefs: []
  type: TYPE_NORMAL
  zh: AI将继续发展，并成为一个更强大的工具来支持你的创意工作。
- en: As I said at the beginning of this book, there is no one-size-fits-all approach
    to writing fiction. What works for me may not work for you.
  id: totrans-2745
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我在本书开头所说，没有一种适合所有人的写作虚构作品的方法。对我有效的方法可能对你无效。
- en: Every writer is unique and has to discover a technique and process that works
    for them!
  id: totrans-2746
  prefs: []
  type: TYPE_NORMAL
  zh: 每位作家都是独一无二的，他们必须发现适合自己的技巧和流程！
- en: If you are a planner, my structured approach using a 24-chapter plot outline
    will immediately appeal to how you approach your writing. It also works very well
    with AI-assisted writing, which has been trained on predictive story structures
    and story patterns.
  id: totrans-2747
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个规划者，我使用24章情节大纲的结构化方法将立即吸引你如何处理你的写作。它也与AI辅助写作非常有效，这种写作已经被训练在预测故事结构和故事模式上。
- en: From personal experience, story craft can also be a great resource if you write
    intuitively, and then come back to revise and rewrite the early drafts of your
    manuscript to create a solid second draft.
  id: totrans-2748
  prefs: []
  type: TYPE_NORMAL
  zh: 从个人经验来看，故事技巧也可以是一个很好的资源，如果你是直觉性写作，然后回来修改和重写你的手稿的早期草稿，以创建一个坚实的第二稿。
- en: Many authors use a combination of techniques and create a simple outline or
    rough first draft, as I have suggested, but then dive in and work on the individual
    scenes, which could be anywhere in the story, slowly building rising action as
    they write from turning point to turning point.
  id: totrans-2749
  prefs: []
  type: TYPE_NORMAL
  zh: 许多作家使用多种技巧，创建一个简单的提纲或粗糙的初稿，正如我建议的那样，然后深入其中，专注于故事中的个别场景，从转折点到转折点，慢慢地构建上升动作。
- en: No matter how you write, my sincere wish is that this book will be a valuable
    guide to planning a cozy mystery series using ChatGPT, and I would be delighted
    if you explored these techniques and tried them out with your next project.
  id: totrans-2750
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你如何写作，我真诚的希望这本书将成为使用ChatGPT规划温馨悬疑系列的有价值指南，如果你探索这些技术并尝试它们在你的下一个项目中，我将非常高兴。
- en: Happy writing! Nina.
  id: totrans-2751
  prefs: []
  type: TYPE_NORMAL
  zh: 写作愉快！Nina。
