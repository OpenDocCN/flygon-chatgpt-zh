- en: Prompt Template You Can Use Over and Over
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here’s a reusable prompt you can customize for almost any content task:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt Template:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a [type of content] about [topic] for [audience].
  prefs: []
  type: TYPE_NORMAL
- en: Use a [tone] tone and keep it [length or format preference].
  prefs: []
  type: TYPE_NORMAL
- en: Focus on [goal or key points to include].
  prefs: []
  type: TYPE_NORMAL
- en: Start with [specific direction, if needed], and end with [desired closing or
    call to action].”
  prefs: []
  type: TYPE_NORMAL
- en: 'Example – Blog Post Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a 500-word blog post about how to care for indoor plants during winter
    for beginner plant owners.
  prefs: []
  type: TYPE_NORMAL
- en: Use a warm, encouraging tone.
  prefs: []
  type: TYPE_NORMAL
- en: Focus on common mistakes, lighting tips, and watering advice.
  prefs: []
  type: TYPE_NORMAL
- en: Start with a relatable problem, and end with a call to check out our plant care
    kits.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Example – Social Media Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write 5 Instagram captions for a dog grooming business promoting a spring package.
  prefs: []
  type: TYPE_NORMAL
- en: Use a playful tone, keep captions under 15 words, and include emojis and hashtags.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Example – Product Description Prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: “Write a product description for a stainless steel water bottle designed for
    hikers.
  prefs: []
  type: TYPE_NORMAL
- en: Use an energetic, persuasive tone.
  prefs: []
  type: TYPE_NORMAL
- en: Mention insulation, portability, and eco-friendly benefits.
  prefs: []
  type: TYPE_NORMAL
- en: Include a headline, short paragraph, and 3 bullet points.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Tip: Save Your Best Prompts'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once you’ve found a prompt that works well, copy it into a personal prompt library
    (Google Docs, Notion, a notes app, etc.) so you can reuse or tweak it later.
  prefs: []
  type: TYPE_NORMAL
- en: With this checklist and prompt template, you now have a repeatable process to
    guide your work with ChatGPT—whether you’re creating one post or planning content
    for an entire month.
  prefs: []
  type: TYPE_NORMAL
