  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 3: Develop a script for a 15-second YouTube ad.'
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 3：为 15 秒 YouTube 广告制作脚本。
- en: 'Benefit:'
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Short-form video ads on YouTube require a concise script that captures attention
    in the first few seconds. This prompt helps you develop a script that delivers
    a clear message, evokes interest, and drives action, all within a limited time
    frame.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: YouTube 上的短视频广告需要简洁的脚本，在前几秒内吸引注意力。这个提示帮助您开发一个脚本，在有限的时间内传达清晰的信息，激发兴趣并推动行动。
- en: 'Example Prompts:'
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Develop a script for a 15-second YouTube ad for a meal delivery service focused
    on convenience.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为专注于便利的餐饮配送服务制作一个 15 秒 YouTube 广告脚本。
- en: ● Develop a script for a 15-second YouTube ad for a financial services app offering
    budgeting tools.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为提供预算工具的金融服务应用制作一个 15 秒 YouTube 广告脚本。
- en: ● Develop a script for a 15-second YouTube ad for a mobile phone accessory brand.
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为手机配件品牌制作一个 15 秒的 YouTube 广告脚本。
- en: A YouTube ad script should be fast-paced, with a clear hook, value proposition,
    and CTA, all while fitting within the time constraints.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: YouTube 广告脚本应该节奏紧凑，有明确的钩子、价值主张和行动号召（CTA），同时要符合时间限制。
- en: '* * *'
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 4: Create a targeted ad campaign for [specific demographic].'
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 4：为 [特定人群] 创建一个定向广告活动。
- en: 'Benefit:'
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Targeted ad campaigns ensure your ads reach the right people. This prompt helps
    you create campaigns that are tailored to specific demographics, optimizing the
    effectiveness of your ads and maximizing ROI.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 定向广告活动确保你的广告能够触及正确的人群。这个提示帮助你创建针对特定人群的广告活动，优化广告效果并最大化投资回报率。
- en: 'Example Prompts:'
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Create a targeted ad campaign for young professionals aged 25-35 who are interested
    in fitness.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为对健身感兴趣的 25-35 岁年轻专业人士创建一个定向广告活动。
- en: ● Create a targeted ad campaign for parents of young children for an online
    education platform.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为年轻儿童的家长创建一个在线教育平台的定向广告活动。
- en: ●      Create a targeted ad campaign for seniors seeking healthcare services.
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为寻求医疗保健服务的老年人创建一个定向广告活动。
- en: Tailoring the ad campaign ensures you focus on the needs, preferences, and pain
    points of the chosen demographic.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 定制广告活动确保你专注于所选人群的需求、偏好和痛点。
- en: '* * *'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 5: Suggest A/B testing ideas for [specific ad].'
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 5：为 [特定广告] 提出A/B测试的想法。
- en: 'Benefit:'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: A/B testing allows you to compare variations of your ads to see which performs
    better. This prompt provides you with ideas to experiment with different aspects
    of your ad, optimizing its effectiveness.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: A/B 测试允许你比较你广告的不同版本，以查看哪个表现更好。本提示为你提供了实验你广告不同方面的想法，以优化其效果。
- en: 'Example Prompts:'
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Suggest A/B testing ideas for a Facebook Ad promoting an online cooking class.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为推广在线烹饪课程的 Facebook 广告提出 A/B 测试的想法。
- en: ● Suggest A/B testing ideas for a Google Display Ad for a new fashion line.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为新时尚品牌的 Google 显示广告提出 A/B 测试的想法。
- en: ● Suggest A/B testing ideas for a LinkedIn Ad campaign for a B2B SaaS product.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为 B2B SaaS 产品的 LinkedIn 广告活动提出 A/B 测试的想法。
- en: A/B testing could include variations in headlines, images, CTAs, or ad copy
    to see which resonates better with your audience.
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: A/B 测试可以包括标题、图片、CTA 或广告文案的变化，以查看哪个更能引起受众的共鸣。
- en: '* * *'
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 6: Write a catchy headline for an ad promoting [service].'
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 6：为推广 [服务] 的广告撰写一个吸引人的标题。
- en: 'Benefit:'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: The headline is the first thing users notice and plays a crucial role in grabbing
    attention. This prompt helps you craft a headline that sparks interest and encourages
    people to read further or take action.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 标题是用户首先注意到的东西，在吸引注意力方面起着至关重要的作用。这个提示帮助你撰写一个能够激发兴趣并鼓励人们继续阅读或采取行动的标题。
- en: 'Example Prompts:'
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Write a catchy headline for an ad promoting a home cleaning service.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为推广家庭清洁服务的广告撰写一个吸引人的标题。
- en: ● Write a catchy headline for an ad promoting a personal finance app.
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为推广个人财务应用的广告撰写一个吸引人的标题。
- en: ● Write a catchy headline for an ad promoting a pet grooming service.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为推广宠物美容服务的广告撰写一个吸引人的标题。
- en: A catchy headline should evoke curiosity or offer a solution to the audience’s
    pain points.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 一个吸引人的标题应该唤起好奇心或为受众的痛点提供解决方案。
- en: '* * *'
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 7: Draft a promotional email for a limited-time offer.'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 7：为限时优惠撰写促销电子邮件。
- en: 'Benefit:'
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Promotional emails are an excellent way to directly reach customers and drive
    conversions. This prompt helps you create an email that highlights the urgency
    of a limited-time offer and encourages immediate action.
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 促销电子邮件是直接接触客户并推动转化的一种绝佳方式。这个提示帮助你创建一个突出限时优惠紧迫性的电子邮件，并鼓励立即采取行动。
- en: 'Example Prompts:'
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Draft a promotional email for a limited-time discount on a digital marketing
    course.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为数字营销课程限时折扣撰写促销电子邮件。
- en: ● Draft a promotional email for a limited-time offer on luxury skincare products.
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为奢侈品护肤品的限时优惠撰写促销电子邮件。
- en: ● Draft a promotional email for a limited-time deal on a fitness app subscription.
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为健身应用订阅的限时优惠撰写促销电子邮件。
- en: The email should highlight the offer, emphasize urgency, and include a clear
    CTA directing users to the product or service.
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 电子邮件应突出优惠，强调紧迫性，并包含一个明确的行动号召，引导用户访问产品或服务。
- en: '* * *'
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 8: Suggest innovative ideas for billboard advertising in [industry].'
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 8：为 [行业] 的户外广告提出创新的想法。
- en: 'Benefit:'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Billboards are a great way to reach large audiences, but they require creativity
    due to limited space and time for engagement. This prompt helps you come up with
    fresh, innovative ideas for billboard advertising that capture attention and communicate
    the brand message.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 户外广告是接触大量受众的绝佳方式，但由于空间和时间有限，需要创意。此提示帮助您提出新鲜、创新的户外广告理念，吸引注意力并传达品牌信息。
- en: 'Example Prompts:'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Suggest innovative ideas for billboard advertising in the travel industry
    for a new vacation destination.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一款新度假目的地提出旅游行业户外广告的创新理念。
- en: ● Suggest innovative ideas for billboard advertising in the automotive industry
    for a new car model.
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一款新车型提出汽车行业户外广告的创新理念。
- en: ● Suggest innovative ideas for billboard advertising in the tech industry for
    a new smartphone release.
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一款新智能手机发布提出科技行业户外广告的创新理念。
- en: Billboard ads should be visually striking, with minimal text and a memorable
    call to action.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 户外广告应具有视觉冲击力，文字最少，并包含一个难忘的行动号召。
- en: '* * *'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 9: What are some cost-effective advertising methods for small businesses?'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 9：有哪些适合小型企业的低成本广告方法？
- en: 'Benefit:'
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Small businesses often have limited advertising budgets. This prompt helps you
    discover cost-effective methods to advertise, ensuring that you maximize your
    advertising spend while achieving measurable results.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 小型企业通常有有限的广告预算。此提示帮助您发现低成本广告方法，确保您在实现可衡量的结果的同时，最大化广告支出。
- en: 'Example Prompts:'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● What are some cost-effective advertising methods for small businesses in the
    restaurant industry?
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为餐饮行业的小型商业提出一些低成本广告方法。
- en: ● What are some cost-effective advertising methods for a small e-commerce store
    selling handmade products?
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为销售手工产品的小型电子商务店提出一些低成本广告方法。
- en: ● What are some cost-effective advertising methods for a small digital marketing
    agency?
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: ● 有哪些适合小型数字营销机构的低成本广告方法？
- en: Cost-effective methods could include social media ads with a small budget, local
    sponsorships, influencer partnerships, or content marketing.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 低成本方法可能包括小预算的社交媒体广告、地方赞助、网红合作或内容营销。
- en: '* * *'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 10: Create a retargeting campaign plan for abandoned cart users.'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 10：为购物车放弃用户创建一个重新定位广告计划。
- en: 'Benefit:'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Retargeting campaigns help convert users who showed interest but didn’t complete
    their purchase. This prompt assists in designing a retargeting campaign that brings
    users back to finish the transaction.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 重新定位广告活动有助于将表现出兴趣但未完成购买的用户转化为客户。此提示帮助设计一个重新定位广告活动，将用户带回完成交易。
- en: 'Example Prompts:'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Create a retargeting campaign plan for abandoned cart users on an online clothing
    store.
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为在线服装店上的购物车放弃用户创建一个重新定位广告计划。
- en: ● Create a retargeting campaign plan for abandoned cart users for a subscription
    box service.
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为订阅盒服务创建购物车放弃用户的重新定位广告计划。
- en: ● Create a retargeting campaign plan for abandoned cart users on a home appliance
    website.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为家电网站上的购物车放弃用户创建一个重新定位广告计划。
- en: The campaign should include personalized messaging, special discounts, and compelling
    CTAs to encourage users to finalize their purchase.
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 该活动应包括个性化信息、特别折扣和引人入胜的行动号召，以鼓励用户完成购买。
- en: '* * *'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion of Advertising Section
  id: totrans-628
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 广告部分结论
- en: Effective advertising can make all the difference in driving conversions and
    building brand awareness. Whether you're crafting compelling ad copy, testing
    different ad elements, or finding innovative ways to reach your target audience,
    advertising provides the platform for businesses to connect with customers at
    the right time and place. With a clear strategy, targeted campaigns, and creative
    content, businesses can elevate their marketing efforts and achieve significant
    results.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的广告可以在推动转化和建立品牌知名度方面产生重大差异。无论您是在制作引人入胜的广告文案、测试不同的广告元素，还是寻找创新的方法来接触目标受众，广告为企业在正确的时间和地点与客户建立联系提供了平台。有了明确的策略、有针对性的活动和创意内容，企业可以提高其营销努力并取得显著成果。
- en: Customer Engagement
  id: totrans-630
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 客户参与
- en: Customer engagement is a cornerstone of long-term business success. When customers
    feel connected to your brand, they are more likely to stay loyal, provide valuable
    feedback, and spread the word to others. Engaging your audience effectively can
    create a strong sense of community and improve satisfaction. This section explores
    10 practical prompts that will help you create strategies to improve customer
    relationships and engagement across various platforms.
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 客户参与是长期商业成功的基础。当客户感到与您的品牌有联系时，他们更有可能保持忠诚，提供有价值的反馈，并向他人传播。有效地吸引您的受众可以营造强烈的社区感并提高满意度。本节探讨了10个实用的提示，帮助您制定策略，在各种平台上改善客户关系和参与度。
- en: '* * *'
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 1: Suggest ideas to create a loyalty program for [brand].'
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 提示1：为[品牌]提出创建忠诚度计划的建议。
- en: 'Benefit:'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Loyalty programs encourage repeat purchases by rewarding customers for their
    loyalty. This prompt helps you come up with tailored ideas for a loyalty program
    that will not only incentivize repeat business but also create a strong emotional
    connection with your brand.
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 忠诚度计划通过奖励客户的忠诚度来鼓励重复购买。这个提示帮助您想出定制化的忠诚度计划创意，不仅能够激励重复业务，还能与您的品牌建立强烈的情感联系。
- en: 'Example Prompts:'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Suggest ideas to create a loyalty program for a high-end cosmetics brand.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家高端化妆品品牌提出创建忠诚度计划的建议。
- en: ●      Suggest ideas to create a loyalty program for an online bookstore.
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: ● 建议为一家在线书店创建一个忠诚度计划。
- en: ● Suggest ideas to create a loyalty program for a restaurant chain that rewards
    frequent diners.
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: ● 建议为一家连锁餐厅创建一个奖励常客的忠诚度计划。
- en: A well-structured loyalty program can include point systems, tiered rewards,
    exclusive access, or discounts on future purchases.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 一个结构良好的忠诚度计划可以包括积分系统、分级奖励、独家访问或未来购买的折扣。
- en: '* * *'
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 2: Draft an email series to onboard new customers.'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 提示2：为新的客户制定一系列欢迎邮件。
- en: 'Benefit:'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Onboarding emails help customers become familiar with your brand and offerings,
    ensuring they have a positive experience from the start. This prompt guides you
    in crafting an engaging email sequence that nurtures relationships and sets the
    foundation for loyalty.
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎邮件有助于客户熟悉您的品牌和产品，确保他们从开始就有积极的体验。这个提示指导您制作一个吸引人的邮件序列，培养关系并奠定忠诚度的基础。
- en: 'Example Prompts:'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Draft an email series to onboard new customers of an e-commerce fashion store.
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家电子商务时尚商店的新客户制定一系列欢迎邮件。
- en: ● Draft an email series to onboard new customers for a SaaS company offering
    project management software.
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家提供项目管理软件的SaaS公司的新客户制定一系列欢迎邮件。
- en: ● Draft an email series to onboard new customers for a health and wellness subscription
    box service.
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家健康和福祉订阅盒服务的新客户制定一系列欢迎邮件。
- en: An onboarding series can consist of a welcome email, product tutorials, customer
    support information, and personalized offers.
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎系列可能包括欢迎邮件、产品教程、客户支持信息和个性化优惠。
- en: '* * *'
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 3: Provide 10 creative ways to gather customer feedback for [business].'
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 提示3：为[业务]提供10种收集客户反馈的创意方式。
- en: 'Benefit:'
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Customer feedback is vital for improving products, services, and overall customer
    satisfaction. This prompt helps you identify unique and effective ways to collect
    valuable insights from your customers that can inform business decisions.
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 客户反馈对于改进产品、服务和整体客户满意度至关重要。这个提示帮助您识别独特且有效的方法，从客户那里收集有价值的见解，以指导业务决策。
- en: 'Example Prompts:'
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Provide 10 creative ways to gather customer feedback for a mobile app development
    company.
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家移动应用开发公司提供10种收集客户反馈的创意方式。
- en: ● Provide 10 creative ways to gather customer feedback for a boutique hotel.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家精品酒店提供10种收集客户反馈的创意方式。
- en: ● Provide 10 creative ways to gather customer feedback for a fitness center.
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为健身中心提供10种收集客户反馈的创意方式。
- en: Methods might include surveys, social media polls, one-on-one interviews, and
    interactive feedback forms.
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 方法可能包括调查、社交媒体投票、一对一访谈和互动反馈表单。
- en: '* * *'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 4: Write an apology email for a service/product issue.'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 提示4：为服务/产品问题撰写道歉邮件。
- en: 'Benefit:'
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Apologizing for a mistake or issue shows customers that you value them and are
    committed to resolving problems. This prompt helps you draft a professional and
    empathetic apology email that can turn a negative experience into a positive one.
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 为错误或问题道歉表明您重视客户，并致力于解决问题。这个提示帮助您撰写一份专业且富有同理心的道歉邮件，可以将负面经历转变为积极经历。
- en: 'Example Prompts:'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Write an apology email for a delayed shipment for an online electronics store.
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为在线电子产品店的延迟发货撰写道歉邮件。
- en: ● Write an apology email for a faulty product for a fashion brand.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为时尚品牌因产品故障而撰写道歉邮件。
- en: ● Write an apology email for an issue with a subscription-based meal delivery
    service.
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为基于订阅的餐食配送服务的问题撰写道歉邮件。
- en: An effective apology email should acknowledge the issue, provide a resolution,
    and offer compensation, such as discounts or replacements, if necessary.
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 一封有效的道歉邮件应承认问题，提供解决方案，并在必要时提供补偿，如折扣或更换。
- en: '* * *'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 5: Develop a community engagement strategy for [brand].'
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 提示5：为[品牌]制定社区参与策略。
- en: 'Benefit:'
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: A strong community can help build brand loyalty and advocacy. This prompt allows
    you to create strategies for fostering community engagement, which can lead to
    deeper emotional connections with your customers.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 一个强大的社区可以帮助建立品牌忠诚度和倡导。这个提示允许您创建促进社区参与的策略，这可能导致与客户更深的情感联系。
- en: 'Example Prompts:'
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ●      Develop a community engagement strategy for a sustainable fashion brand.
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: ●      为可持续时尚品牌制定社区参与策略。
- en: ●      Develop a community engagement strategy for a pet care company.
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: ●      为宠物护理公司制定社区参与策略。
- en: ●      Develop a community engagement strategy for a tech startup.
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: ●      为科技初创公司制定社区参与策略。
- en: A community engagement strategy might include social media interactions, user-generated
    content, online forums, exclusive events, and collaborations with influencers.
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 社区参与策略可能包括社交媒体互动、用户生成内容、在线论坛、独家活动和与影响者的合作。
- en: '* * *'
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 6: How can I improve customer retention for [industry]?'
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 提示6：如何提高[行业]的客户保留率？
- en: 'Benefit:'
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Customer retention is often more cost-effective than acquisition. This prompt
    helps you identify key tactics to keep customers engaged and satisfied, ensuring
    that they continue to return.
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 客户保留通常比获取客户更具有成本效益。这个提示帮助你确定关键策略，以保持客户参与和满意，确保他们继续回来。
- en: 'Example Prompts:'
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ●      How can I improve customer retention for a fitness subscription service?
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: ●      如何提高健身订阅服务的客户保留率？
- en: ●      How can I improve customer retention for a B2B SaaS company?
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: ●      如何提高B2B SaaS公司的客户保留率？
- en: ●      How can I improve customer retention for a local coffee shop?
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 如何提高本地咖啡店的客户保留率？
- en: Retention strategies can include personalized offers, customer loyalty programs,
    and regular communication through email or social media.
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 保留策略可以包括个性化优惠、客户忠诚度计划和通过电子邮件或社交媒体的定期沟通。
- en: '* * *'
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 7: Create a survey to understand customer needs for [product/service].'
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 提示7：创建一份调查，了解[产品/服务]的客户需求。
- en: 'Benefit:'
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Understanding your customers’ needs is crucial to developing products and services
    that resonate with them. This prompt helps you design a survey that will gather
    valuable insights into what your customers want and how you can meet their expectations.
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 了解客户的需求对于开发与他们产生共鸣的产品和服务至关重要。这个提示帮助您设计一份调查，以收集有关客户想要什么以及如何满足他们期望的有价值见解。
- en: 'Example Prompts:'
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ●      Create a survey to understand customer needs for a skincare brand.
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: ●      创建一份调查，了解护肤品牌的需求。
- en: ● Create a survey to understand customer needs for a home renovation service.
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: ● 创建一份调查，了解客户对家庭装修服务的需求。
- en: ● Create a survey to understand customer needs for an online learning platform.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为在线学习平台了解客户需求创建一份调查。
- en: The survey should include questions that cover pain points, preferences, satisfaction
    levels, and desired features or services.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 调查应包括涵盖痛点、偏好、满意度水平和期望功能或服务的问题。
- en: '* * *'
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 8: Suggest gamification ideas to improve user interaction with [brand].'
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 提示8：提出提高[品牌]用户互动的游戏化想法。
- en: 'Benefit:'
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Gamification can turn ordinary interactions into fun and engaging experiences,
    motivating customers to interact more with your brand. This prompt provides you
    with ideas for incorporating game-like elements into your customer interactions.
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏化可以将普通互动转变为有趣和吸引人的体验，激励客户更多地与您的品牌互动。这个提示为您提供将游戏元素融入客户互动的想法。
- en: 'Example Prompts:'
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ●      Suggest gamification ideas to improve user interaction with a fitness
    app.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: ●      提出提高健身应用用户互动的游戏化想法。
- en: ● Suggest gamification ideas to improve user interaction with a children's educational
    platform.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提出游戏化想法，以提高儿童教育平台的用户互动。
- en: ● Suggest gamification ideas to improve user interaction with a fashion brand's
    loyalty program.
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提出游戏化想法，以改善时尚品牌忠诚度计划与用户互动。
- en: Gamification can include badges, points, leaderboards, and challenges that encourage
    users to interact with your brand frequently.
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏化可以包括徽章、积分、排行榜和挑战，鼓励用户频繁与您的品牌互动。
- en: '* * *'
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 9: What are ways to improve the customer journey for [brand]?'
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 提示9：如何改善[品牌]的客户旅程？
- en: 'Benefit:'
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Improving the customer journey helps streamline the path from awareness to conversion
    and beyond, enhancing overall satisfaction and retention. This prompt helps you
    map out ways to enhance each touchpoint of the customer experience.
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 改善客户旅程有助于简化从意识阶段到转化以及更远的路径，从而提高整体满意度和保留率。此提示帮助您规划出增强客户体验每个接触点的途径。
- en: 'Example Prompts:'
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● What are ways to improve the customer journey for an e-commerce electronics
    store?
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: ● 如何改善电子商务电子产品店的客户旅程？
- en: ● What are ways to improve the customer journey for a financial services provider?
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: ● 如何改善金融服务提供商的客户旅程？
- en: ● What are ways to improve the customer journey for a luxury travel agency?
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: ● 如何改善豪华旅行社的客户旅程？
- en: Improving the customer journey could involve simplifying the checkout process,
    offering personalized recommendations, and providing excellent customer service
    at every step.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 改善客户旅程可能包括简化结账流程、提供个性化推荐以及在每一步提供卓越的客户服务。
- en: '* * *'
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 10: Write a script for a customer appreciation video.'
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 提示10：撰写客户感谢视频的脚本。
- en: 'Benefit:'
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: A customer appreciation video is a powerful tool to show gratitude and strengthen
    relationships with your customers. This prompt helps you craft a heartfelt script
    that expresses genuine thanks while showcasing your brand’s values.
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 客户感谢视频是一种展示感激之情并加强与客户关系的强大工具。此提示帮助您撰写一份充满感情的脚本，表达真诚的感谢，同时展示您品牌的价值。
- en: 'Example Prompts:'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Write a script for a customer appreciation video for an online clothing store.
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为在线服装店撰写客户感谢视频的脚本。
- en: ● Write a script for a customer appreciation video for a health insurance company.
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为保险公司撰写客户感谢视频的脚本。
- en: ● Write a script for a customer appreciation video for a home cleaning service.
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为家政服务撰写客户感谢视频的脚本。
- en: The script should acknowledge customer loyalty, highlight positive feedback,
    and encourage future engagement, all while reflecting the brand’s tone and values.
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 脚本应承认客户忠诚度，突出积极反馈，并鼓励未来参与，同时反映品牌的语气和价值观。
- en: '* * *'
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion of Customer Engagement Section
  id: totrans-723
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 客户参与章节结论
- en: Customer engagement is all about building lasting relationships that go beyond
    the point of sale. Whether you're developing a loyalty program, crafting effective
    onboarding emails, or gathering feedback to improve your services, creating meaningful
    interactions with customers will foster long-term loyalty and advocacy. By using
    these prompts, businesses can engage customers in creative and personalized ways,
    driving satisfaction, repeat business, and positive word-of-mouth.
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 客户参与关乎建立超越销售点的持久关系。无论您是在开发忠诚度计划、撰写有效的入职电子邮件，还是收集反馈以改进您的服务，与客户建立有意义的互动将培养长期忠诚度和倡导。
- en: PR and Media
  id: totrans-725
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 公关与媒体
- en: Public Relations (PR) and media outreach are essential tools for building a
    positive brand image, managing crisis situations, and getting the word out about
    your products or services. This section explores 10 powerful PR and media strategies
    that will help you craft compelling messages, manage your brand's reputation,
    and amplify your visibility across various platforms.
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 公共关系（PR）和媒体推广是建立积极品牌形象、管理危机情况以及推广您的产品或服务的重要工具。本节探讨了10种强大的公关和媒体策略，这些策略将帮助您撰写引人入胜的信息，管理您品牌的声誉，并在各种平台上扩大您的可见度。
- en: '* * *'
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 1: Write a press release announcing [product/service launch].'
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 提示1：撰写宣布[产品/服务推出]的新闻稿。
- en: 'Benefit:'
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: A press release is a formal, professional way to announce a new product or service
    to the public, media outlets, and potential customers. This prompt guides you
    in creating a well-structured release that highlights key details and generates
    buzz around the launch.
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 新闻稿是一种正式、专业的宣布新产品或服务给公众、媒体机构和潜在客户的方式。此提示指导您创建一个结构良好的发布稿，突出关键细节，并在推出时产生轰动。
- en: 'Example Prompts:'
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Write a press release announcing the launch of a new eco-friendly product
    line for a fashion brand.
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家时尚品牌推出新的环保产品线撰写一份新闻稿。
- en: ● Write a press release announcing the launch of a groundbreaking app for a
    tech startup.
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家科技初创公司推出具有突破性的应用程序撰写一份新闻稿。
- en: ● Write a press release announcing the launch of a new restaurant location for
    a popular chain.
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家流行的连锁餐厅新店开业撰写一份新闻稿。
- en: A press release should include a catchy headline, a brief introduction, key
    facts about the product/service, quotes from key stakeholders, and a call to action.
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 新闻稿应包括一个吸引人的标题、简短介绍、产品/服务的关键事实、关键利益相关者的引语以及行动号召。
- en: '* * *'
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 2: How can I pitch a story to [specific media outlet]?'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt 2: 我如何向[特定媒体机构]推销一个故事？'
- en: 'Benefit:'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Pitching a story to the right media outlet increases the chances of getting
    your brand or product featured. This prompt helps you understand how to craft
    a tailored pitch that appeals to the interests and tone of a specific publication
    or journalist.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 向合适的媒体机构推销故事可以增加您的品牌或产品被报道的机会。此提示帮助您了解如何制定一个针对特定出版物或记者的兴趣和风格的定制提案。
- en: 'Example Prompts:'
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● How can I pitch a story to TechCrunch about a new AI startup?
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我如何向TechCrunch推销关于一家新人工智能初创公司的故事？
- en: ● How can I pitch a story to Vogue about a new luxury handbag collection?
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我如何向Vogue推销关于一款新奢华手袋系列的故事？
- en: ● How can I pitch a story to Forbes about an innovative sustainable business
    model?
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我如何向福布斯杂志推销关于一种创新可持续商业模式的文章？
- en: The key is understanding the media outlet’s audience, aligning the story with
    their editorial interests, and offering a unique angle that will captivate their
    readers.
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 关键在于理解媒体机构的受众，将故事与他们的编辑兴趣对齐，并提供一个能够吸引他们读者的独特角度。
- en: '* * *'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 3: Suggest 5 strategies to manage a PR crisis for [industry].'
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt 3: 提出五种应对[行业]公关危机的策略。'
- en: 'Benefit:'
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Handling a PR crisis effectively can minimize reputational damage and restore
    customer trust. This prompt offers strategies to guide your crisis management
    efforts, helping you navigate sensitive situations with transparency and professionalism.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 有效地处理公关危机可以最小化声誉损害并恢复客户信任。此提示提供策略来指导您的危机管理努力，帮助您以透明和专业的方式应对敏感情况。
- en: 'Example Prompts:'
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Suggest 5 strategies to manage a PR crisis for a food company dealing with
    a product recall.
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提出五种应对因产品召回而陷入困境的食品公司公关危机的策略。
- en: ● Suggest 5 strategies to manage a PR crisis for a tech company after a data
    breach.
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提出五种应对数据泄露后陷入困境的科技公司公关危机的策略。
- en: ● Suggest 5 strategies to manage a PR crisis for a retail brand accused of unethical
    labor practices.
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提出五种应对被指控不道德劳动实践的零售品牌公关危机的策略。
- en: Effective strategies might include acknowledging the issue, taking immediate
    corrective actions, issuing public apologies, and offering transparent updates
    to the public.
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的策略可能包括承认问题、采取立即的纠正措施、发表公开道歉，并向公众提供透明的更新。
- en: '* * *'
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 4: Draft a media kit for [brand].'
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt 4: 为[品牌]制定一份媒体资料包。'
- en: 'Benefit:'
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: A media kit is a powerful PR tool that provides journalists and media outlets
    with key information about your brand. This prompt helps you create a comprehensive
    media kit that highlights your brand's story, values, and assets in an easily
    digestible format.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体资料包是一种强大的公关工具，为记者和媒体机构提供有关您品牌的关键信息。此提示帮助您创建一个全面的媒体资料包，以易于消化的格式突出您品牌的故事、价值观和资产。
- en: 'Example Prompts:'
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ●      Draft a media kit for a new online clothing brand.
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家新的在线服装品牌制定一份媒体资料包。
- en: ● Draft a media kit for a non-profit organization focused on environmental issues.
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为关注环境问题的非营利组织制定一份媒体资料包。
- en: ● Draft a media kit for a high-end hotel chain launching a new luxury resort.
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家推出新奢华度假村的高端酒店连锁制定一份媒体资料包。
- en: A well-crafted media kit should include an about us section, high-quality images,
    press release templates, key facts, and bios of key team members.
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 一份精心制作的媒体资料包应包括关于我们的部分、高质量图片、新闻稿模板、关键事实和关键团队成员的简介。
- en: '* * *'
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 5: Write a thought leadership article for [industry expert].'
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt 5: 为[行业专家]撰写一篇思想领导力文章。'
- en: 'Benefit:'
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Thought leadership articles position experts as authorities in their field,
    establishing credibility and trust with the audience. This prompt helps you draft
    an insightful, valuable article that showcases the expert’s knowledge and perspectives.
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 思想领导力文章将专家定位为其领域的权威，在观众中建立信誉和信任。这个提示帮助你撰写一篇见解独到、有价值的文章，展示专家的知识和观点。
- en: 'Example Prompts:'
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Write a thought leadership article for a CEO of a renewable energy company.
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家可再生能源公司的首席执行官撰写一篇思想领导力文章。
- en: ● Write a thought leadership article for a renowned chef in the food industry.
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为食品行业的一位著名厨师撰写一篇思想领导力文章。
- en: ● Write a thought leadership article for a marketing guru on emerging trends
    in digital marketing.
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一位营销大师关于数字营销新兴趋势撰写一篇思想领导力文章。
- en: The article should provide deep insights, offer solutions to industry challenges,
    and share unique perspectives that demonstrate the expert's thought leadership.
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 文章应提供深入见解，提出行业挑战的解决方案，并分享独特的观点，以展示专家的思想领导力。
- en: '* * *'
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 6: Suggest 10 ways to get featured in [specific niche] publications.'
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 提示6：为[特定领域]出版物提出10种亮相的方法。
- en: 'Benefit:'
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Getting featured in niche publications can increase your brand’s visibility
    among a highly targeted audience. This prompt offers creative, actionable tactics
    to get your story covered by relevant publications in your field.
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 在特定领域的出版物中亮相可以提高品牌在高度针对性受众中的可见度。这个提示提供创造性的、可操作的策略，让你的故事被相关领域的出版物所报道。
- en: 'Example Prompts:'
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Suggest 10 ways to get featured in design publications for an interior design
    business.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家室内设计业务提出10种在设计出版物中亮相的方法。
- en: ● Suggest 10 ways to get featured in tech publications for a blockchain startup.
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家区块链初创公司提出10种在科技出版物中亮相的方法。
- en: ● Suggest 10 ways to get featured in fashion publications for an up-and-coming
    sustainable fashion brand.
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家新兴可持续时尚品牌提出10种在时尚出版物中亮相的方法。
- en: Strategies may include crafting compelling press releases, submitting guest
    articles, offering expert commentary, and building relationships with journalists
    and editors in the niche.
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 策略可能包括撰写吸引人的新闻稿，提交嘉宾文章，提供专家评论，并与该领域的记者和编辑建立关系。
- en: '* * *'
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 7: Create a partnership proposal for a collaboration with [brand].'
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 提示7：为与[品牌]的合作创建一个合作提案。
- en: 'Benefit:'
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Partnerships are an effective way to expand reach and improve brand credibility.
    This prompt helps you develop a persuasive proposal for a collaboration with another
    brand, highlighting the mutual benefits of the partnership.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 合作伙伴关系是扩大影响力和提高品牌信誉的有效方式。这个提示帮助你制定一个有说服力的合作提案，突出合作伙伴关系的互利共赢。
- en: 'Example Prompts:'
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Create a partnership proposal for a collaboration between a fitness brand
    and a healthy meal delivery service.
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家健身品牌和一家健康餐配送服务之间的合作创建一个合作提案。
- en: ● Create a partnership proposal for a collaboration between a luxury skincare
    brand and a beauty influencer.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家奢华护肤品牌和一位美容网红之间的合作创建一个合作提案。
- en: ● Create a partnership proposal for a collaboration between a tech company and
    an educational institution.
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家科技公司和教育机构之间的合作创建一个合作提案。
- en: A strong partnership proposal should outline shared goals, how the collaboration
    will benefit both parties, and potential outcomes.
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 一个强大的合作提案应概述共同目标、合作将如何使双方受益以及可能的成果。
- en: '* * *'
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 8: Write talking points for an interview about [topic].'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 提示8：为关于[主题]的访谈撰写谈话要点。
- en: 'Benefit:'
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Talking points ensure that your messaging is consistent and impactful during
    interviews, allowing the interviewee to stay on message and communicate effectively.
    This prompt helps you craft clear, concise points to guide the conversation.
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 谈话要点确保在访谈中你的信息一致且具有影响力，使受访者能够保持信息一致并有效地沟通。这个提示帮助你制定清晰、简洁的要点来引导对话。
- en: 'Example Prompts:'
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Write talking points for an interview about the future of electric vehicles
    for an automotive expert.
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一位汽车专家关于电动汽车未来的访谈撰写谈话要点。
- en: ● Write talking points for an interview about sustainable fashion for a designer.
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一位设计师关于可持续时尚的访谈撰写谈话要点。
- en: ● Write talking points for an interview about digital transformation for a tech
    entrepreneur.
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一位科技企业家关于数字化转型访谈撰写谈话要点。
- en: Talking points should highlight key messages, statistics, and anecdotes that
    reinforce the brand’s values and expertise.
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 谈话要点应突出关键信息、统计数据和轶事，以加强品牌的价值和专业知识。
- en: '* * *'
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 9: Develop a PR campaign for a nonprofit organization.'
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 9：为一家非营利组织制定公关活动。
- en: 'Benefit:'
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: A well-executed PR campaign can increase awareness and support for nonprofit
    causes. This prompt guides you in creating a campaign that will help a nonprofit
    organization amplify its mission and connect with its audience.
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 一场执行得当的公关活动可以提高对非营利事业的认识和支持。这个提示指导你创建一个活动，帮助非营利组织放大其使命并与受众建立联系。
- en: 'Example Prompts:'
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Develop a PR campaign for a nonprofit focused on mental health awareness.
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家关注心理健康意识慈善机构制定公关活动。
- en: ●      Develop a PR campaign for a nonprofit promoting wildlife conservation.
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: ●      为一家推广野生动物保护的慈善机构制定公关活动。
- en: ● Develop a PR campaign for a nonprofit working to reduce food waste.
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家致力于减少食物浪费的慈善机构制定公关活动。
- en: The campaign should incorporate press releases, partnerships with influencers
    or media outlets, fundraising events, and social media outreach.
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 该活动应包括新闻稿、与影响者或媒体机构的合作、筹款活动和社交媒体推广。
- en: '* * *'
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 10: Suggest ideas for a viral marketing stunt in [industry].'
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 10：为[行业]提出病毒式营销活动的想法。
- en: 'Benefit:'
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: A viral marketing stunt can generate massive buzz and drive traffic to your
    brand. This prompt encourages you to brainstorm creative and attention-grabbing
    ideas that could go viral, helping to raise brand awareness in a fun and impactful
    way.
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 病毒式营销活动可以制造巨大的轰动并吸引流量到你的品牌。这个提示鼓励你头脑风暴创意和引人注目的想法，这些想法可能会走红，以有趣和有影响力的方式提升品牌知名度。
- en: 'Example Prompts:'
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Suggest ideas for a viral marketing stunt in the fitness industry for a new
    gym opening.
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家新健身房开业提出在健身行业进行病毒式营销活动的想法。
- en: ● Suggest ideas for a viral marketing stunt in the beauty industry for a new
    skincare product.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一款新的护肤产品提出在美容行业进行病毒式营销活动的想法。
- en: ● Suggest ideas for a viral marketing stunt in the food industry for a new restaurant
    launch.
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家新餐厅的推出提出在食品行业进行病毒式营销活动的想法。
- en: Ideas could include unique product launches, flash mobs, interactive social
    media campaigns, or partnering with influencers to create buzz.
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 可以包括独特的产品发布、快闪活动、互动社交媒体活动或与影响者合作制造轰动。
- en: '* * *'
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion of PR and Media Section
  id: totrans-818
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 公关和媒体部分结论
- en: Public relations and media outreach are powerful ways to build your brand's
    reputation, generate buzz, and connect with your audience. Whether you’re launching
    a product, managing a crisis, or seeking media coverage, these prompts will guide
    you in crafting compelling stories, strategies, and campaigns that elevate your
    brand’s presence. Leveraging PR effectively can lead to greater visibility, customer
    trust, and business growth.
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 公关和媒体推广是建立品牌声誉、制造轰动并连接受众的强大方式。无论你是推出产品、处理危机还是寻求媒体报道，这些提示都将指导你制定引人入胜的故事、策略和活动，提升品牌的存在感。有效地利用公关可以带来更高的可见度、客户信任和业务增长。
- en: Analytics and Insights
  id: totrans-820
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析和洞察
- en: Understanding data is key to optimizing marketing efforts, improving customer
    experience, and driving growth. This section focuses on utilizing analytics and
    insights to make data-driven decisions, track performance, and identify opportunities
    for improvement across various platforms and campaigns.
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 理解数据是优化营销努力、提升客户体验和推动增长的关键。本节重点介绍利用分析和洞察力做出数据驱动的决策、跟踪绩效以及识别跨各种平台和活动的改进机会。
- en: '* * *'
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 1: How can I analyze customer behavior data for [specific outcome]?'
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 1：我该如何分析客户行为数据以实现[特定结果]？
- en: 'Benefit:'
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Analyzing customer behavior data allows you to understand purchasing patterns,
    user engagement, and preferences, which can drive decisions aimed at achieving
    specific outcomes. This prompt helps you explore methods for analyzing this data
    and aligning it with desired business objectives.
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 分析客户行为数据可以帮助你了解购买模式、用户参与度和偏好，这些都可以推动旨在实现特定结果的决策。这个提示帮助你探索分析这些数据的方法，并将其与期望的商业目标对齐。
- en: 'Example Prompts:'
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● How can I analyze customer behavior data for improving sales conversion rates?
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我该如何分析客户行为数据以提高销售转化率？
- en: ●      How can I analyze customer behavior data for increasing customer retention?
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: ●      我该如何分析客户行为数据以增加客户保留率？
- en: ●      How can I analyze customer behavior data for improving product recommendations?
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: ●      我该如何分析客户行为数据以改进产品推荐？
- en: Effective customer behavior analysis includes segmenting users, tracking their
    interactions, and analyzing patterns to understand how they contribute to business
    goals.
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的客户行为分析包括细分用户、跟踪他们的互动并分析模式，以了解他们如何有助于实现业务目标。
- en: '* * *'
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 2: Create a report outline for a digital marketing campaign.'
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 2：创建数字营销活动的报告大纲。
- en: 'Benefit:'
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: A clear and concise report structure allows you to present insights from a digital
    marketing campaign effectively. This prompt helps you organize data in a way that
    highlights key performance indicators (KPIs), results, and recommendations for
    future campaigns.
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 一个清晰简洁的报告结构允许您有效地展示数字营销活动的洞察。本提示帮助您以突出关键绩效指标（KPIs）、结果和未来活动建议的方式组织数据。
- en: 'Example Prompts:'
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Create a report outline for a digital marketing campaign focused on brand
    awareness for a new product.
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一款新产品的品牌知名度打造数字营销活动创建报告大纲。
- en: ● Create a report outline for a digital marketing campaign aimed at increasing
    online sales for an e-commerce brand.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为旨在提高电子商务品牌在线销售的数字营销活动创建报告大纲。
- en: ● Create a report outline for a digital marketing campaign promoting a seasonal
    event for a retail store.
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为推广零售店季节性活动的数字营销活动创建报告大纲。
- en: A well-organized report should include sections like campaign objectives, target
    audience, KPIs, results, challenges, and next steps.
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 一个组织良好的报告应包括活动目标、目标受众、关键绩效指标（KPIs）、结果、挑战和下一步行动。
- en: '* * *'
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 3: Suggest tools for monitoring competitors in [industry].'
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 3：建议用于监控[行业]竞争对手的工具。
- en: 'Benefit:'
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Monitoring competitors helps identify industry trends, uncover strengths and
    weaknesses, and gain insights into what works. This prompt provides suggestions
    for tools that help track competitors’ activities, product launches, pricing strategies,
    and more.
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 监控竞争对手有助于识别行业趋势、发现优势和劣势，并深入了解哪些策略有效。本提示提供了有助于跟踪竞争对手活动、产品发布、定价策略等方面的工具建议。
- en: 'Example Prompts:'
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ●      Suggest tools for monitoring competitors in the fashion industry.
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: ● 建议用于监控时尚行业竞争对手的工具。
- en: ●      Suggest tools for monitoring competitors in the tech industry.
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: ● 建议用于监控科技行业竞争对手的工具。
- en: ●      Suggest tools for monitoring competitors in the food and beverage industry.
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: ● 建议用于监控食品和饮料行业竞争对手的工具。
- en: Tools could include competitive intelligence software, social media listening
    platforms, or web scraping tools that provide real-time insights into competitors’
    strategies.
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 工具可能包括竞争情报软件、社交媒体监听平台或提供竞争对手策略实时洞察的网页抓取工具。
- en: '* * *'
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 4: How can I set up and interpret Google Analytics for [specific metric]?'
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 4：我该如何设置和解释 Google Analytics 以监控[特定指标]？
- en: 'Benefit:'
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Google Analytics is a powerful tool for tracking website traffic, user behavior,
    and other important metrics. This prompt helps you learn how to set up Google
    Analytics and interpret the data to measure performance and make informed decisions.
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: Google Analytics 是一个强大的工具，用于跟踪网站流量、用户行为和其他重要指标。本提示帮助您了解如何设置 Google Analytics
    并解释数据以衡量绩效并做出明智的决策。
- en: 'Example Prompts:'
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● How can I set up and interpret Google Analytics for tracking e-commerce transactions?
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我该如何设置和解释 Google Analytics 以跟踪电子商务交易？
- en: ● How can I set up and interpret Google Analytics for tracking user engagement
    on blog posts?
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我该如何设置和解释 Google Analytics 以跟踪博客文章的用户参与度？
- en: ● How can I set up and interpret Google Analytics for monitoring organic search
    performance?
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我该如何设置和解释 Google Analytics 以监控有机搜索性能？
- en: You’ll want to focus on the setup of specific goals, conversion tracking, and
    custom reports that align with business objectives.
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要关注特定目标的设置、转化跟踪和与业务目标一致的定制报告。
- en: '* * *'
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 5: Suggest 10 ways to improve lead conversion rates using data insights.'
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 5：建议使用数据洞察提高潜在客户转化率10种方法。
- en: 'Benefit:'
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Data insights can help identify friction points in the lead conversion process
    and inform strategies to improve conversions. This prompt provides actionable
    suggestions to leverage data and analytics to increase lead-to-customer conversion
    rates.
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 数据洞察有助于识别潜在客户转化过程中的摩擦点，并告知提高转化率的策略。本提示提供了利用数据和数据分析来提高潜在客户到客户转化率的实际建议。
- en: 'Example Prompts:'
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Suggest 10 ways to improve lead conversion rates using data insights for a
    SaaS company.
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: ● 建议使用数据洞察提高 SaaS 公司的潜在客户转化率10种方法。
- en: ● Suggest 10 ways to improve lead conversion rates using data insights for an
    e-commerce store.
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提出使用数据洞察来提高电子商务店铺潜在客户转化率的10种方法。
- en: ● Suggest 10 ways to improve lead conversion rates using data insights for a
    consulting business.
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提出使用数据洞察来提高咨询业务潜在客户转化率的10种方法。
- en: These strategies might include optimizing landing pages, segmenting leads based
    on behavior, or improving email nurturing campaigns.
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: 这些策略可能包括优化着陆页、根据行为对潜在客户进行细分或改进电子邮件培育活动。
- en: '* * *'
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 6: What metrics should I focus on for [specific platform]?'
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 提示6：我应该关注[特定平台]的哪些指标？
- en: 'Benefit:'
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Each digital platform has unique metrics that help measure success. This prompt
    helps you determine the key metrics to track for specific platforms to evaluate
    performance and optimize your strategy.
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 每个数字平台都有独特的指标，有助于衡量成功。这个提示帮助您确定特定平台的关键指标以跟踪以评估绩效并优化您的策略。
- en: 'Example Prompts:'
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ●      What metrics should I focus on for Instagram marketing?
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我应该关注哪些指标来进行Instagram营销？
- en: ●      What metrics should I focus on for Google Ads campaigns?
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我应该关注哪些指标来进行谷歌广告活动？
- en: ●      What metrics should I focus on for LinkedIn B2B marketing?
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我应该关注哪些指标来进行领英B2B营销？
- en: Focusing on the right metrics, such as engagement rate, click-through rate (CTR),
    conversion rate, or cost per acquisition (CPA), ensures you can assess platform-specific
    success accurately.
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 关注正确的指标，例如参与率、点击率（CTR）、转化率或获取成本（CPA），可以确保您能够准确评估特定平台的成功。
- en: '* * *'
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 7: Analyze trends in [industry] and suggest actionable steps.'
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 提示7：分析[行业]趋势并提出可行的步骤。
- en: 'Benefit:'
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Staying updated on industry trends is crucial for staying ahead of the competition
    and identifying new opportunities. This prompt encourages you to analyze industry
    trends and create a set of actionable steps to adapt or capitalize on them.
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 保持对行业趋势的了解对于保持竞争优势和识别新机会至关重要。这个提示鼓励您分析行业趋势并制定一套可行的步骤来适应或利用它们。
- en: 'Example Prompts:'
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Analyze trends in the health and wellness industry and suggest actionable
    steps for a fitness brand.
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: ● 分析健康和健身行业趋势并为健身品牌提出可行的步骤。
- en: ● Analyze trends in the software industry and suggest actionable steps for a
    tech startup.
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: ● 分析软件行业趋势并为科技初创公司提出可行的步骤。
- en: ● Analyze trends in the retail industry and suggest actionable steps for a local
    clothing store.
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: ● 分析零售行业趋势并为当地服装店提出可行的步骤。
- en: Actionable steps could include adopting emerging technologies, creating new
    products/services, or tweaking marketing strategies to align with shifting consumer
    preferences.
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 可行的步骤可能包括采用新兴技术、创建新产品/服务，或调整营销策略以适应不断变化的消费者偏好。
- en: '* * *'
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 8: Develop a dashboard for tracking multi-channel marketing performance.'
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: 提示8：开发一个跟踪多渠道营销绩效的仪表板。
- en: 'Benefit:'
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: A multi-channel marketing dashboard consolidates key data from various platforms
    to provide a holistic view of performance. This prompt helps you create a centralized
    reporting tool for monitoring the success of your marketing efforts across different
    channels.
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: 多渠道营销仪表板整合了来自各个平台的关键数据，以提供整体绩效视图。这个提示帮助您创建一个集中式报告工具，用于监控您在不同渠道上营销活动的成功。
- en: 'Example Prompts:'
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Develop a dashboard for tracking multi-channel marketing performance for a
    digital marketing agency.
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为数字营销机构开发一个跟踪多渠道营销绩效的仪表板。
- en: ● Develop a dashboard for tracking multi-channel marketing performance for an
    e-commerce brand.
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为电子商务品牌开发一个跟踪多渠道营销绩效的仪表板。
- en: ● Develop a dashboard for tracking multi-channel marketing performance for a
    non-profit organization.
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为非营利组织开发一个跟踪多渠道营销绩效的仪表板。
- en: The dashboard should include key metrics like traffic, conversions, engagement,
    and ROI across email, social media, paid ads, and organic channels.
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 仪表板应包括关键指标，如电子邮件、社交媒体、付费广告和自然渠道的流量、转化、参与度和投资回报率（ROI）。
- en: '* * *'
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 9: Suggest effective ways to use heatmaps to improve website UX.'
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 提示9：建议有效使用热图来改善网站用户体验。
- en: 'Benefit:'
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Heatmaps are visual representations of user behavior on your website, helping
    you understand how visitors interact with different elements. This prompt suggests
    ways to use heatmap data to improve user experience (UX) and optimize your site.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 热图是您网站上用户行为的视觉表示，有助于您了解访客如何与不同元素互动。这个提示建议使用热图数据来改善用户体验（UX）并优化您的网站。
- en: 'Example Prompts:'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Suggest effective ways to use heatmaps to improve website UX for an e-commerce
    store.
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家电子商务商店建议有效使用热图来改善网站用户体验的方法。
- en: ● Suggest effective ways to use heatmaps to improve website UX for a SaaS platform.
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家SaaS平台建议有效使用热图来改善网站用户体验的方法。
- en: ● Suggest effective ways to use heatmaps to improve website UX for a content-focused
    blog.
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家以内容为重点的博客建议有效使用热图来改善网站用户体验的方法。
- en: Insights could include optimizing navigation, adjusting call-to-action placements,
    or simplifying complex areas that users are ignoring.
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 洞察力可能包括优化导航、调整行动号召放置位置，或简化用户忽视的复杂区域。
- en: '* * *'
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 10: Write a guide to track influencer campaign ROI.'
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 10：编写一份追踪影响者营销投资回报率的指南。
- en: 'Benefit:'
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Measuring the ROI of influencer campaigns ensures that you're investing in the
    right partnerships and driving real business results. This prompt helps you create
    a guide for tracking key performance indicators (KPIs) related to influencer marketing.
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 测量影响者营销的投资回报率确保你投资于正确的合作伙伴关系并推动真正的业务成果。这个提示帮助你创建一个用于跟踪与影响者营销相关的关键绩效指标（KPI）的指南。
- en: 'Example Prompts:'
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Write a guide to track influencer campaign ROI for a fashion brand.
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家时尚品牌编写一份追踪影响者营销投资回报率的指南。
- en: ● Write a guide to track influencer campaign ROI for a skincare company.
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家护肤公司编写一份追踪影响者营销投资回报率的指南。
- en: ● Write a guide to track influencer campaign ROI for a tech startup.
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家科技初创公司编写一份追踪影响者营销投资回报率的指南。
- en: Your guide should focus on metrics like engagement rate, clicks, conversions,
    and the cost-per-influencer compared to sales or leads generated.
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 你的指南应关注参与度、点击量、转化率和与销售额或潜在客户相比的每影响者成本等指标。
- en: '* * *'
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion of Analytics and Insights Section
  id: totrans-913
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分析和洞察部分结论
- en: Data-driven decision-making is essential for improving marketing performance
    and achieving business goals. By analyzing customer behavior, leveraging analytics
    tools, and creating insightful reports, you can optimize your strategies, improve
    user experiences, and enhance overall marketing effectiveness. Whether you’re
    tracking performance across channels, measuring influencer ROI, or identifying
    industry trends, these prompts offer valuable guidance for making data an integral
    part of your marketing efforts.
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 数据驱动决策对于提高营销绩效和实现业务目标至关重要。通过分析客户行为、利用分析工具和创建有洞察力的报告，你可以优化你的策略，改善用户体验，并提高整体营销效果。无论你是跨渠道跟踪绩效、衡量影响者投资回报率还是识别行业趋势，这些提示都提供了宝贵的指导，帮助将数据作为你营销努力的一个关键部分。
- en: Creative and Design
  id: totrans-915
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创意和设计
- en: The creative and design elements of marketing are integral to capturing attention,
    engaging audiences, and delivering a cohesive brand message. This section explores
    creative strategies and design concepts, from branding and visual aesthetics to
    interactive features and campaigns.
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: 市场营销的创意和设计元素对于吸引注意力、吸引受众和传达一致的品牌信息至关重要。本节探讨了创意策略和设计概念，从品牌和视觉美学到互动功能和活动。
- en: '* * *'
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 1: Suggest color palettes for a brand targeting [audience].'
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 1：为针对[观众]的品牌建议色彩调色板。
- en: 'Benefit:'
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Color plays a crucial role in influencing emotions and perceptions. This prompt
    helps you choose color palettes that align with the audience's preferences, enhance
    brand identity, and trigger desired emotional responses.
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: 颜色在影响情绪和感知方面起着至关重要的作用。这个提示帮助你选择与观众偏好相符、增强品牌身份并引发期望的情感反应的色彩调色板。
- en: 'Example Prompts:'
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Suggest color palettes for a brand targeting young adults in the tech industry.
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为针对科技行业年轻成人建议色彩调色板。
- en: ● Suggest color palettes for a brand targeting luxury consumers in the fashion
    industry.
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为针对时尚行业的奢侈品消费者建议色彩调色板。
- en: ● Suggest color palettes for a brand targeting eco-conscious shoppers in the
    sustainable products sector.
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为针对可持续产品领域的环保意识购物者建议色彩调色板。
- en: Colors should resonate with the target audience and reflect the brand’s values
    and message—whether it’s bold and modern, elegant and timeless, or warm and approachable.
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: 颜色应与目标受众产生共鸣，并反映品牌的价值观和信息——无论是大胆现代、优雅永恒，还是温暖亲切。
- en: '* * *'
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 2: How can I design an impactful landing page for [campaign]?'
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 2：我如何设计一个有影响力的[活动]着陆页？
- en: 'Benefit:'
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: An effective landing page is essential for converting visitors into leads or
    customers. This prompt provides actionable steps to create a landing page that
    aligns with the campaign’s goals, ensuring it is visually appealing and optimized
    for conversions.
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: 一个有效的着陆页对于将访客转化为潜在客户或客户至关重要。本提示提供了创建与活动目标一致、视觉吸引人且优化转化的着陆页的具体步骤。
- en: 'Example Prompts:'
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● How can I design an impactful landing page for a holiday sales campaign?
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: ● 如何设计一个对假日销售活动有影响力的着陆页？
- en: ● How can I design an impactful landing page for a lead generation campaign
    for a B2B service?
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: ● 如何设计一个对B2B服务客户生成活动有影响力的着陆页？
- en: ● How can I design an impactful landing page for a product launch campaign?
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: ● 如何设计一个对产品发布活动有影响力的着陆页？
- en: Focusing on elements like clear messaging, compelling visuals, strong calls-to-action
    (CTAs), and user-friendly layout can significantly enhance the page's effectiveness.
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 关注清晰的信息、引人入胜的视觉、强大的CTA（调用行动）和用户友好的布局可以显著提高页面的有效性。
- en: '* * *'
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 3: Write a creative brief for a photoshoot for [brand].'
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 提示3：为[品牌]撰写一个创意拍摄简报。
- en: 'Benefit:'
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: A well-structured creative brief ensures that all stakeholders understand the
    objectives, style, and deliverables of a photoshoot. This prompt guides you to
    outline the key elements that will align the photoshoot with the brand’s vision
    and marketing goals.
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 一个结构良好的创意简报确保所有利益相关者了解拍摄活动的目标、风格和交付成果。本提示指导您概述将拍摄与品牌愿景和营销目标对齐的关键要素。
- en: 'Example Prompts:'
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Write a creative brief for a photoshoot for a new clothing collection for
    a fashion brand.
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一个时尚品牌的新服装系列撰写一个创意拍摄简报。
- en: ● Write a creative brief for a photoshoot for a new product line for a beauty
    brand.
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一个美容品牌的新产品线撰写一个创意拍摄简报。
- en: ● Write a creative brief for a photoshoot for an eco-friendly product campaign.
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一个环保产品活动撰写一个创意拍摄简报。
- en: Your brief should include the campaign’s goals, the target audience, preferred
    photography style, mood, location, models, props, and timeline.
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 您的简报应包括活动的目标、目标受众、首选摄影风格、氛围、地点、模特、道具和进度表。
- en: '* * *'
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 4: Suggest ideas for an engaging trade show booth design.'
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: 提示4：提出吸引人的贸易展位设计想法。
- en: 'Benefit:'
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Trade shows are a great opportunity to showcase products and engage directly
    with potential customers. This prompt offers suggestions for creating a booth
    that captures attention, generates leads, and promotes brand recognition.
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: 贸易展是一个展示产品并与潜在客户直接互动的绝佳机会。本提示提供了创建一个吸引注意力、生成潜在客户并促进品牌认知的展位建议。
- en: 'Example Prompts:'
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Suggest ideas for an engaging trade show booth design for a tech company.
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一家科技公司提出吸引人的贸易展位设计想法。
- en: ● Suggest ideas for an engaging trade show booth design for a food and beverage
    brand.
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一个食品和饮料品牌提出吸引人的贸易展位设计想法。
- en: ● Suggest ideas for an engaging trade show booth design for a fitness equipment
    brand.
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一个健身设备品牌提出吸引人的贸易展位设计想法。
- en: Ideas might include interactive elements like live demos, eye-catching visuals,
    product displays, branded giveaways, and strategically placed CTAs to drive traffic
    and engagement.
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: 可能包括交互式元素，如现场演示、引人注目的视觉、产品展示、品牌赠品和战略性地放置的CTA（调用行动），以驱动流量和参与度。
- en: '* * *'
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 5: Write slogans for a seasonal campaign for [product/service].'
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 提示5：为[产品/服务]的季节性活动撰写口号。
- en: 'Benefit:'
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: A memorable slogan encapsulates the essence of a seasonal campaign, sparking
    excitement and connecting with the target audience. This prompt helps generate
    catchy and impactful slogans that resonate with the season and brand’s message.
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: 一个难忘的口号能够概括季节性活动的精髓，激发兴奋感并与目标受众建立联系。本提示有助于生成与季节和品牌信息产生共鸣的吸引人和有影响力的口号。
- en: 'Example Prompts:'
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ●      Write slogans for a holiday campaign promoting a luxury gift product.
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为推广豪华礼品产品的假日活动撰写口号。
- en: ●      Write slogans for a summer campaign promoting a fitness program.
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为推广健身项目的夏季活动撰写口号。
- en: ●      Write slogans for a fall campaign promoting a skincare service.
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为推广护肤服务的秋季活动撰写口号。
- en: Seasonal slogans should align with the time of year, evoke the desired emotions,
    and clearly communicate the value of the product or service.
  id: totrans-961
  prefs: []
  type: TYPE_NORMAL
  zh: 季节性口号应与年份相符，唤起期望的情感，并清楚地传达产品或服务的价值。
- en: '* * *'
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 6: Generate ideas for interactive website features for [industry].'
  id: totrans-963
  prefs: []
  type: TYPE_NORMAL
  zh: 提示6：为[行业]生成互动网站功能想法。
- en: 'Benefit:'
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Interactive website features enhance user experience, engagement, and time spent
    on the site. This prompt offers creative ideas for making a website more interactive,
    personalized, and fun, thereby improving conversion rates and customer satisfaction.
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: 互动网站功能可以提升用户体验、参与度和用户在网站上的停留时间。本提示提供了使网站更具互动性、个性化和趣味性的创意想法，从而提高转化率和客户满意度。
- en: 'Example Prompts:'
  id: totrans-966
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ●      Generate ideas for interactive website features for a real estate business.
  id: totrans-967
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为房地产业务生成互动网站功能的想法。
- en: ●      Generate ideas for interactive website features for an e-commerce brand.
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为电子商务品牌生成互动网站功能的想法。
- en: ●      Generate ideas for interactive website features for a travel agency.
  id: totrans-969
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为旅行社生成互动网站功能的想法。
- en: Ideas might include quizzes, live chatbots, interactive maps, product configurators,
    and virtual tours that increase user engagement and conversion.
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: 可能的想法包括测验、实时聊天机器人、互动地图、产品配置器和虚拟游览，这些都可以增加用户参与度和转化率。
- en: '* * *'
  id: totrans-971
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 7: Provide tips on improving the visual hierarchy of a website.'
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 提示7：提供提高网站视觉层次结构的技巧。
- en: 'Benefit:'
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: 收益：
- en: Visual hierarchy ensures that website visitors can easily navigate and find
    what they’re looking for. This prompt provides tips on how to organize elements
    on a page to prioritize the most important information and guide the user experience.
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉层次结构确保网站访客可以轻松导航并找到他们想要的内容。本提示提供了如何组织页面元素以优先显示最重要的信息并引导用户体验的技巧。
- en: 'Example Prompts:'
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ●      Provide tips on improving the visual hierarchy of an e-commerce website.
  id: totrans-976
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提供提高电子商务网站视觉层次结构的技巧。
- en: ● Provide tips on improving the visual hierarchy of a service-based business
    website.
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提供提高基于服务业务网站视觉层次结构的技巧。
- en: ●      Provide tips on improving the visual hierarchy of a portfolio website.
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提供提高投资组合网站视觉层次结构的技巧。
- en: Improving visual hierarchy includes techniques such as adjusting font sizes,
    using contrasting colors, grouping related information, and incorporating whitespace
    for clarity and readability.
  id: totrans-979
  prefs: []
  type: TYPE_NORMAL
  zh: 提高视觉层次结构包括调整字体大小、使用对比色、分组相关信息以及融入空白区域以提高清晰度和可读性。
- en: '* * *'
  id: totrans-980
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 8: Suggest design ideas for a limited-edition product packaging.'
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: 提示8：建议限量版产品包装的设计理念。
- en: 'Benefit:'
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: 收益：
- en: Packaging design is crucial for attracting attention and conveying product quality.
    This prompt provides ideas for creating limited-edition packaging that stands
    out, feels exclusive, and enhances the product’s value.
  id: totrans-983
  prefs: []
  type: TYPE_NORMAL
  zh: 包装设计对于吸引注意力和传达产品质量至关重要。本提示提供了创建引人注目、感觉独特并提升产品价值的限量版包装的想法。
- en: 'Example Prompts:'
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Suggest design ideas for limited-edition product packaging for a luxury fragrance
    brand.
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为奢侈香水品牌建议限量版产品包装的设计理念。
- en: ● Suggest design ideas for limited-edition product packaging for a seasonal
    chocolate gift box.
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为季节性巧克力礼品盒建议限量版产品包装的设计理念。
- en: ● Suggest design ideas for limited-edition product packaging for a collectible
    toy series.
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为收藏玩具系列建议限量版产品包装的设计理念。
- en: Designs should include elements such as unique color schemes, premium materials,
    custom illustrations, and collectible features to make the packaging feel special
    and desirable.
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 设计应包括独特配色方案、优质材料、定制插图和收藏特性，使包装感觉特别且令人渴望。
- en: '* * *'
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 9: How can I use illustrations creatively for marketing in [niche]?'
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 提示9：我如何在[细分市场]中创造性地使用插图进行市场营销？
- en: 'Benefit:'
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: 收益：
- en: Illustrations can add personality, creativity, and playfulness to marketing
    materials. This prompt helps you explore ways to use illustrations to communicate
    brand messages and connect with specific niche audiences in a visually compelling
    way.
  id: totrans-992
  prefs: []
  type: TYPE_NORMAL
  zh: 插图可以为营销材料增添个性、创造力和趣味性。本提示帮助您探索使用插图传达品牌信息和以视觉吸引力的方式与特定细分市场受众建立联系的方法。
- en: 'Example Prompts:'
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● How can I use illustrations creatively for marketing in the wellness industry?
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我如何在健康产业中创造性地使用插图进行市场营销？
- en: ● How can I use illustrations creatively for marketing in the tech industry?
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我如何在科技行业中创造性地使用插图进行市场营销？
- en: ● How can I use illustrations creatively for marketing in the food and beverage
    industry?
  id: totrans-996
  prefs: []
  type: TYPE_NORMAL
  zh: ● 我如何在食品和饮料行业中创造性地使用插图进行市场营销？
- en: Illustrations can be used in social media posts, website design, ads, infographics,
    packaging, and more to create a distinct, memorable brand presence.
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: 插图可用于社交媒体帖子、网站设计、广告、信息图表、包装等，以创建独特、难忘的品牌形象。
- en: '* * *'
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Prompt 10: Write a script for an animated explainer video.'
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 提示10：编写一个动画解释视频的脚本。
- en: 'Benefit:'
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: 利益：
- en: Animated explainer videos are an engaging way to convey complex ideas simply
    and entertainingly. This prompt guides you in crafting a script that communicates
    the message clearly and keeps the viewer engaged throughout the video.
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: 动画解释视频是一种吸引人的方式，可以简单而有趣地传达复杂的思想。此提示指导您编写一个脚本，清晰传达信息并使观众在整个视频中保持参与。
- en: 'Example Prompts:'
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: ● Write a script for an animated explainer video for a mobile app that helps
    with productivity.
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一款有助于提高生产力的移动应用编写一个动画解释视频的脚本。
- en: ● Write a script for an animated explainer video for an eco-friendly cleaning
    product.
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一款环保清洁产品编写一个动画解释视频的脚本。
- en: ● Write a script for an animated explainer video for a new SaaS platform.
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: ● 为一款新的SaaS平台编写一个动画解释视频的脚本。
- en: Your script should include a hook to grab attention, a clear explanation of
    the product or service, and a call to action that encourages viewers to take the
    next step.
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 您的脚本应包括一个吸引注意力的钩子，对产品或服务的清晰解释，以及鼓励观众采取下一步行动的号召。
- en: '* * *'
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion of Creative and Design Section
  id: totrans-1008
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创意与设计章节结论
- en: Creative and design elements play a pivotal role in how a brand communicates
    with its audience, whether through color palettes, web features, engaging slogans,
    or impactful visuals. By crafting compelling designs and interactive experiences,
    businesses can foster deeper connections with their target audience, stand out
    in a crowded marketplace, and drive desired outcomes. Whether designing a website,
    creating a photoshoot brief, or developing a landing page, these prompts provide
    useful ideas to ensure that your marketing efforts are visually appealing, user-centered,
    and effective.
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: 创意和设计元素在品牌与受众沟通中扮演着关键角色，无论是通过色彩搭配、网页功能、引人入胜的口号还是有影响力的视觉元素。通过制作引人入胜的设计和互动体验，企业可以与目标受众建立更深的联系，在竞争激烈的市场中脱颖而出，并推动期望的结果。无论是在设计网站、创建摄影简报还是开发着陆页，这些提示都提供了有用的想法，以确保您的营销工作在视觉上吸引人、以用户为中心且有效。
- en: Conclusion
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: 'In "The Marketing Mindset: 100 ChatGPT Prompts to Boost Your Strategy," we''ve
    explored a wide range of practical, actionable prompts designed to help you take
    your marketing efforts to the next level. Whether you''re focusing on strategy
    and planning, branding, content creation, social media marketing, or customer
    engagement, each prompt has been crafted to inspire creativity and refine your
    approach.'
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 在《营销思维：100个ChatGPT提示以提升您的策略》中，我们探讨了广泛实用的、可操作的提示，旨在帮助您将营销工作提升到新的水平。无论您是专注于策略和规划、品牌建设、内容创作、社交媒体营销还是客户参与，每个提示都旨在激发创造力并完善您的策略。
- en: As the marketing landscape continues to evolve, embracing new technologies,
    trends, and customer expectations is vital. This book serves as a toolkit to help
    you navigate those shifts effectively, while staying true to your brand's values
    and mission.
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: 随着营销领域的持续演变，拥抱新技术、趋势和客户期望至关重要。本书作为工具包，帮助您有效地应对这些变化，同时保持对品牌价值观和使命的忠诚。
- en: From developing robust marketing strategies and building memorable brands, to
    optimizing SEO and harnessing the power of customer engagement, the prompts offered
    here will allow you to explore new ideas, measure success, and iterate for growth.
    The actionable insights are designed to be tailored to your specific business
    needs, ensuring you can maximize your marketing potential, no matter your industry.
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: 从制定稳健的营销策略和打造难忘的品牌，到优化SEO和利用客户参与的力量，这里提供的提示将让您探索新想法、衡量成功并迭代以实现增长。这些可操作的见解旨在根据您的特定业务需求定制，确保无论您的行业如何，您都能最大化您的营销潜力。
- en: Whether you’re looking to optimize your existing campaigns, discover innovative
    content formats, or craft compelling advertising strategies, these prompts will
    keep you aligned with your goals and your audience’s desires. Marketing is not
    just about reaching customers—it’s about creating lasting relationships, inspiring
    loyalty, and continually adapting to the dynamic digital environment.
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您是希望优化现有的活动、发现创新的内容格式还是制定引人入胜的广告策略，这些提示都将帮助您与目标保持一致，满足您和您受众的期望。营销不仅仅是触及客户——它是建立持久关系、激发忠诚并不断适应动态数字环境的过程。
- en: Use these prompts as your guide, not just to boost your marketing tactics but
    to develop a deeper understanding of your audience, elevate your brand, and build
    meaningful, sustainable marketing practices. The marketing mindset is about being
    proactive, adaptable, and always focused on delivering value—let this book be
    the catalyst to sharpen that mindset and fuel your success.
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: 将这些提示作为您的指南，不仅是为了提升您的营销策略，还要深入理解您的受众，提升您的品牌，并建立有意义的、可持续的营销实践。营销思维关乎积极主动、适应性强，并且始终专注于提供价值——让这本书成为激发这种思维和推动您成功的催化剂。
