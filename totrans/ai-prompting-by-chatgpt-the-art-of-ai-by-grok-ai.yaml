  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI in Smart Cities and Urban Planning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Traffic Management and Urban Infrastructure: Examining how AI is used to optimize
