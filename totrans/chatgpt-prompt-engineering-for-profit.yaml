  prefs: []
  type: TYPE_NORMAL
  zh: '○ ****共识构建**** : "****一个可持续的方法是创建特定区域以进行受控提取，这些区域将随着使用量的增加而替代。此外，鼓励再森林经济，通过创造以保护为导向的工作，可以确保经济发展与保护之间的平衡。"'
