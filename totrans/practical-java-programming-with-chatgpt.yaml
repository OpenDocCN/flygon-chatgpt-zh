  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先，我们需要点击如图*[图1.1](#fig1_1)*所示的突出显示的**注册**按钮。
- en: Next, we have to provide an email address, choose a strong password, and accept
    the terms of service, as shown in *[Figures 1.2](#fig1_2)* and *[1.3](#fig1_3)*
    following:![](images/Figure-1.02.jpg)
  id: totrans-332
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来，我们必须提供一个电子邮件地址，选择一个强密码，并接受服务条款，如图*[图1.2](#fig1_2)*和*[1.3](#fig1_3)*所示。![](images/Figure-1.02.jpg)
- en: '**Figure 1.2:** The ***ChatGPT*** account creation web page'
  id: totrans-333
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**图1.2**：ChatGPT账户创建网页'
