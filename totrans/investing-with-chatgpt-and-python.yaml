- en: In this example, we use yfinance to download historical Apple share data for
    the year 2022\. We can also retrieve real-time information on the stock by accessing
    the Ticker object.
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个示例中，我们使用 yfinance 下载 2022 年的苹果股票历史数据。我们还可以通过访问 Ticker 对象来检索股票的实时信息。
- en: Gathering stock market information is essential for developing effective trading
    strategies. Using specific libraries such as ccxt, ib_insync, and yfinance, you
    can easily connect to cryptocurrency trading platforms, stock brokers, or financial
    information services to retrieve real-time or historical market data. This data
    can then be analyzed and used to make informed investment decisions.
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 收集股票市场信息对于开发有效的交易策略至关重要。使用特定的库，如ccxt、ib_insync和yfinance，您可以轻松连接到加密货币交易平台、股票经纪商或金融信息服务以检索实时或历史市场数据。然后，您可以分析这些数据并据此做出明智的投资决策。
- en: Principle of Computational Financial Algorithms in Stock and Crypto Trading
  id: totrans-955
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 股票和加密货币交易中的计算金融算法原理
- en: Definition
  id: totrans-956
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 定义
- en: Computational financial algorithms, also known as trading algorithms or algorithmic
    trading, are computer programs that use mathematical rules and predefined instructions
    to execute transactions on the financial markets. These algorithms analyze market
    data, identify trading opportunities and execute orders automatically, without
    human intervention. They can be used in trading stocks, cryptocurrencies, currencies
    and other financial assets.
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 计算金融算法，也称为交易算法或算法交易，是使用数学规则和预定义指令在金融市场执行交易的计算机程序。这些算法分析市场数据，识别交易机会并自动执行订单，无需人工干预。它们可用于交易股票、加密货币、货币和其他金融资产。
- en: Benefits
  id: totrans-958
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优点
- en: 'Speed and precision:'
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 速度和精度：
- en: Algorithms can analyze data and execute transactions much faster than humans,
    often within milliseconds. This makes it possible to take advantage of market
    opportunities instantly.
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: 算法可以比人类更快地分析和执行交易，通常在毫秒内完成。这使得能够立即利用市场机会。
- en: 'Elimination of Emotions :'
  id: totrans-961
  prefs: []
  type: TYPE_NORMAL
  zh: 情感消除：
- en: Trading decisions are based on objective, mathematical criteria, eliminating
    the emotional bias that can affect human decisions.
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: 交易决策基于客观的数学标准，消除了可能影响人类决策的情感偏见。
- en: 'Ability to process large amounts of data:'
  id: totrans-963
  prefs: []
  type: TYPE_NORMAL
  zh: 处理大量数据的能力：
- en: Algorithms can process and analyze large amounts of data in real time, which
    is impossible for a human trader.
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 算法可以实时处理和分析大量数据，这对于人类交易员来说是不可行的。
- en: 'Executing complex strategies :'
  id: totrans-965
  prefs: []
  type: TYPE_NORMAL
  zh: 执行复杂策略：
- en: Algorithms can integrate complex trading strategies that combine multiple indicators
    and mathematical models, optimizing trading performance.
  id: totrans-966
  prefs: []
  type: TYPE_NORMAL
  zh: 算法可以整合复杂的交易策略，结合多个指标和数学模型，优化交易表现。
- en: Disadvantages compared to Manual Trading
  id: totrans-967
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与手动交易相比的缺点
- en: 'Dependence on Technology :'
  id: totrans-968
  prefs: []
  type: TYPE_NORMAL
  zh: 依赖技术：
- en: Algorithms depend entirely on technology and Internet connectivity. Any technical
    failure may result in significant losses.
  id: totrans-969
  prefs: []
  type: TYPE_NORMAL
  zh: 算法完全依赖于技术和互联网连接。任何技术故障都可能导致重大损失。
- en: 'Development complexity :'
  id: totrans-970
  prefs: []
  type: TYPE_NORMAL
  zh: 开发复杂性：
- en: Developing efficient trading algorithms requires advanced skills in programming,
    mathematics and finance.
  id: totrans-971
  prefs: []
  type: TYPE_NORMAL
  zh: 开发高效的交易算法需要编程、数学和金融的高级技能。
- en: 'Lack of Flexibility:'
  id: totrans-972
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏灵活性：
- en: Algorithms follow predefined rules and may not adapt quickly to unforeseen market
    conditions or exceptional events.
  id: totrans-973
  prefs: []
  type: TYPE_NORMAL
  zh: 算法遵循预定义的规则，可能无法快速适应不可预见的市场条件或异常事件。
- en: 'Maintenance costs :'
  id: totrans-974
  prefs: []
  type: TYPE_NORMAL
  zh: 维护成本：
- en: Setting up and maintaining algorithmic trading systems can be costly, requiring
    investment in hardware, software and technical expertise.
  id: totrans-975
  prefs: []
  type: TYPE_NORMAL
  zh: 设置和维护算法交易系统可能成本高昂，需要投资硬件、软件和技术专业知识。
- en: Risks inherent in this technique
  id: totrans-976
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这种技术固有的风险
- en: 'Technical Risks :'
  id: totrans-977
  prefs: []
  type: TYPE_NORMAL
  zh: 技术风险：
- en: System crashes, software bugs and connectivity interruptions can lead to trading
    errors or financial losses.
  id: totrans-978
  prefs: []
  type: TYPE_NORMAL
  zh: 系统崩溃、软件错误和连接中断可能导致交易错误或财务损失。
- en: 'Model risk :'
  id: totrans-979
  prefs: []
  type: TYPE_NORMAL
  zh: 模型风险：
- en: Algorithms are based on mathematical models that may be incorrect or unsuited
    to changing market conditions, resulting in sub-optimal trading decisions.
  id: totrans-980
  prefs: []
  type: TYPE_NORMAL
  zh: 算法基于可能不正确或不适合变化的市场条件的数学模型，导致交易决策次优。
- en: 'Liquidity risk :'
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: 流动性风险：
- en: Algorithms can increase market volatility by amplifying price movements, particularly
    in conditions of low liquidity.
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: 算法可以通过放大价格变动来增加市场波动性，尤其是在流动性较低的情况下。
- en: 'Regulatory Risk :'
  id: totrans-983
  prefs: []
  type: TYPE_NORMAL
  zh: 监管风险：
- en: The use of algorithmic trading is subject to strict regulations. Failure to
    comply may result in legal and financial penalties.
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: 算法交易的使用受到严格的监管。不遵守规定可能导致法律和财务处罚。
- en: Types of Trading Algorithms
  id: totrans-985
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交易算法类型
- en: 'Moving Average Algorithm :'
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: 移动平均算法：
- en: This algorithm uses price moving averages to identify market trends. For example,
    when a short moving average crosses above a long moving average, a buy signal
    is generated, and vice versa for a sell signal.
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: This algorithm uses price moving averages to identify market trends. For example,
    when a short moving average crosses above a long moving average, a buy signal
    is generated, and vice versa for a sell signal.
- en: 'def moving_average_crossover(data, short_window, long_window):'
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 'def moving_average_crossover(data, short_window, long_window):'
- en: data['Short_MA'] = data['Close'].rolling(window=short_window, min_periods=1).mean()
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: data['Short_MA'] = data['Close'].rolling(window=short_window, min_periods=1).mean()
- en: data['Long_MA'] = data['Close'].rolling(window=long_window, min_periods=1).mean()
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: data['Long_MA'] = data['Close'].rolling(window=long_window, min_periods=1).mean()
- en: data['Signal'] = 0
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
  zh: data['Signal'] = 0
- en: data['Signal'][short_window:] = np.where(data['Short_MA'][short_window:] > data['Long_MA'][short_window:],
    1, 0)
  id: totrans-992
  prefs: []
  type: TYPE_NORMAL
  zh: data['Signal'][short_window:] = np.where(data['Short_MA'][short_window:] > data['Long_MA'][short_window:],
    1, 0)
- en: data['Position'] = data['Signal'].diff()
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: data['Position'] = data['Signal'].diff()
- en: return data
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: return data
- en: 'Mean Reversion Algorithm :'
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: 'Mean Reversion Algorithm :'
- en: This algorithm is based on the assumption that asset prices will return to their
    historical average. It buys assets when their price is below the average and sells
    them when the price is above.
  id: totrans-996
  prefs: []
  type: TYPE_NORMAL
  zh: This algorithm is based on the assumption that asset prices will return to their
    historical average. It buys assets when their price is below the average and sells
    them when the price is above.
- en: 'def mean_reversion(data, window):'
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: 'def mean_reversion(data, window):'
- en: data['Rolling_Mean'] = data['Close'].rolling(window=window).mean()
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: data['Rolling_Mean'] = data['Close'].rolling(window=window).mean()
- en: data['Signal'] = 0
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: data['Signal'] = 0
- en: data['Signal'][window:] = np.where(data['Close'][window:] < data['Rolling_Mean'][window:],
    1, 0)
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: data['Signal'][window:] = np.where(data['Close'][window:] < data['Rolling_Mean'][window:],
    1, 0)
- en: data['Position'] = data['Signal'].diff()
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: data['Position'] = data['Signal'].diff()
- en: return data
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: return data
- en: 'Momentum Algorithm :'
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: 'Momentum Algorithm :'
- en: This algorithm identifies assets that have shown strong price movement in one
    direction and bets that the trend will continue. It buys assets that have risen
    and sells those that have fallen.
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: This algorithm identifies assets that have shown strong price movement in one
    direction and bets that the trend will continue. It buys assets that have risen
    and sells those that have fallen.
- en: 'def momentum(data, window):'
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 'def momentum(data, window):'
- en: data['Momentum'] = data['Close'] - data['Close'].shift(window)
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: data['Momentum'] = data['Close'] - data['Close'].shift(window)
- en: data['Signal'] = np.where(data['Momentum'] > 0, 1, 0)
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: data['Signal'] = np.where(data['Momentum'] > 0, 1, 0)
- en: data['Position'] = data['Signal'].diff()
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: data['Position'] = data['Signal'].diff()
- en: return data
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: return data
- en: 'Statistical Arbitrage Algorithm :'
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: 'Statistical Arbitrage Algorithm :'
- en: This algorithm uses statistical techniques to identify price inefficiencies
    between two or more correlated assets. For example, it can exploit price differentials
    between pairs of similar stocks.
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: This algorithm uses statistical techniques to identify price inefficiencies
    between two or more correlated assets. For example, it can exploit price differentials
    between pairs of similar stocks.
- en: 'def statistical_arbitrage(data1, data2, window):'
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: 'def statistical_arbitrage(data1, data2, window):'
- en: spread = data1['Close'] - data2['Close']
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: spread = data1['Close'] - data2['Close']
- en: spread_mean = spread.rolling(window=window).mean()
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: spread_mean = spread.rolling(window=window).mean()
- en: spread_std = spread.rolling(window=window).std()
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: spread_std = spread.rolling(window=window).std()
- en: z_score = (spread - spread_mean) / spread_std
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: z_score = (spread - spread_mean) / spread_std
- en: signal = np.where(z_score > 1, -1, np.where(z_score < -1, 1, 0))
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: signal = np.where(z_score > 1, -1, np.where(z_score < -1, 1, 0))
- en: return signal
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: return signal
- en: 'Turtle Trading Strategy :'
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: 'Turtle Trading Strategy :'
- en: The Turtle Strategy is a trend-following trading method based on price breakouts.
    This strategy was popularized by Richard Dennis and William Eckhardt in the 1980s.
    It uses Donchian channels to identify entry and exit points. For example, a buy
    signal is generated when the price of an asset rises above the 20-day high (breakout),
    and a sell signal is generated when it falls below the 20-day low.
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: The Turtle Strategy is a trend-following trading method based on price breakouts.
    This strategy was popularized by Richard Dennis and William Eckhardt in the 1980s.
    It uses Donchian channels to identify entry and exit points. For example, a buy
    signal is generated when the price of an asset rises above the 20-day high (breakout),
    and a sell signal is generated when it falls below the 20-day low.
- en: 'def turtle_trading(data, entry_period, exit_period):'
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: 'def turtle_trading(data, entry_period, exit_period):'
- en: data['Entry_High'] = data['High'].rolling(window=entry_period).max()
  id: totrans-1022
  prefs: []
  type: TYPE_NORMAL
  zh: data['Entry_High'] = data['High'].rolling(window=entry_period).max()
- en: data['Entry_Low'] = data['Low'].rolling(window=entry_period).min()
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: data['Entry_Low'] = data['Low'].rolling(window=entry_period).min()
- en: data['Exit_High'] = data['High'].rolling(window=exit_period).max()
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: data['Exit_High'] = data['High'].rolling(window=exit_period).max()
- en: data['Exit_Low'] = data['Low'].rolling(window=exit_period).min()
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: data['Exit_Low'] = data['Low'].rolling(window=exit_period).min()
- en: data['Long_Entry'] = data['Close'] > data['Entry_High'].shift(1)
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: data['Long_Entry'] = data['Close'] > data['Entry_High'].shift(1)
- en: data['Long_Exit'] = data['Close'] < data['Exit_Low'].shift(1)
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: data['Long_Exit'] = data['Close'] < data['Exit_Low'].shift(1)
- en: data['Short_Entry'] = data['Close'] < data['Entry_Low'].shift(1)
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: data['Short_Entry'] = data['Close'] < data['Entry_Low'].shift(1)
- en: data['Short_Exit'] = data['Close'] > data['Exit_High'].shift(1)
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: data['Short_Exit'] = data['Close'] > data['Exit_High'].shift(1)
- en: data['Position'] = 0
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: data['Position'] = 0
- en: data['Position'] = np.where(data['Long_Entry'], 1, data['Position'])
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: data['Position'] = np.where(data['Long_Entry'], 1, data['Position'])
- en: data['Position'] = np.where(data['Long_Exit'], 0, data['Position'])
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: data['Position'] = np.where(data['Long_Exit'], 0, data['Position'])
- en: data['Position'] = np.where(data['Short_Entry'], -1, data['Position'])
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: data['Position'] = np.where(data['Short_Entry'], -1, data['Position'])
- en: data['Position'] = np.where(data['Short_Exit'], 0, data['Position'])
  id: totrans-1034
  prefs: []
  type: TYPE_NORMAL
  zh: data['Position'] = np.where(data['Short_Exit'], 0, data['Position'])
- en: return data
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: return data
- en: In this example, we calculate the highs and lows of the entry and exit periods
    to generate buy and sell signals based on price breakouts. This strategy aims
    to capture trend movements systematically.
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: 在本例中，我们计算入场和出场期间的最高和最低点，以根据价格突破生成买入和卖出信号。此策略旨在系统地捕捉趋势变动。
- en: Computational financial algorithms offer significant advantages in terms of
    speed, accuracy and the ability to process large amounts of data. However, they
    also present drawbacks and risks, including dependence on technology, development
    complexity, and model risk. Different types of algorithms, such as moving averages,
    mean reversion, momentum and statistical trading, are commonly used in computerized
    trading. By understanding these algorithms and using them prudently, traders can
    improve their efficiency and profitability on the financial markets.
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: 计算金融算法在速度、准确性和处理大量数据的能力方面具有显著优势。然而，它们也带来了缺点和风险，包括对技术的依赖、开发复杂性和模型风险。移动平均线、均值回归、动量和统计交易等不同类型的算法在计算机化交易中普遍使用。通过理解这些算法并谨慎使用，交易者可以提高他们在金融市场上的效率和盈利能力。
- en: AI in Financial Investments
  id: totrans-1038
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 金融投资中的AI
- en: Introduction
  id: totrans-1039
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简介
- en: Artificial intelligence (AI) is revolutionizing the field of financial investing
    by enabling the rapid creation of tools and robots to generate buy and sell signals
    (BUY/SELL) and execute orders automatically. ChatGPT, developed by OpenAI, is
    one such powerful tool that can help traders and investors automate and optimize
    their trading strategies. This chapter explores how ChatGPT and other AI technologies
    can be used to improve investment decisions, monitor markets, and even track the
    strategies of large investors.
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）通过使工具和机器人快速生成买入和卖出信号（BUY/SELL）并自动执行订单，正在改变金融投资领域。由OpenAI开发的ChatGPT就是这样一款强大的工具，可以帮助交易者和投资者自动化和优化他们的交易策略。本章探讨了如何使用ChatGPT和其他人工智能技术来改善投资决策、监控市场，甚至追踪大型投资者的策略。
- en: Creating trading tools with ChatGPT
  id: totrans-1041
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用ChatGPT创建交易工具
- en: ChatGPT, an advanced language model, can help generate code for automated trading
    strategies. Here's how it can be used to create trading robots that generate BUY/SELL
    signals and handle orders automatically.
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT，一个高级语言模型，可以帮助生成自动化交易策略的代码。以下是它如何用于创建生成买入/卖出信号并自动处理订单的交易机器人的方法。
- en: 'BUY/SELL signal generation :'
  id: totrans-1043
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 买入/卖出信号生成：
- en: ChatGPT can help develop trading algorithms by providing sample code and explaining
    the underlying concepts. For example, a trader can ask ChatGPT to generate code
    for a moving average crossover strategy, which is a popular technique for generating
    buy and sell signals.
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以通过提供示例代码和解释底层概念来帮助开发交易算法。例如，交易者可以要求ChatGPT生成移动平均线交叉策略的代码，这是一种生成买入和卖出信号的流行技术。
