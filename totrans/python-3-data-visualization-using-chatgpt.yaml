  id: totrans-428
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '**NOTE** *Install Python 3.9 (or as close as possible to this version) on your
    machine so that you will have the same version of Python that was used to test
    the Python files in this book.*'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意** *请在您的机器上安装Python 3.9（或尽可能接近这个版本），以便您将拥有与本书中测试Python文件相同的Python版本。*'
- en: 'If you need to install Python on your machine, navigate to the Python home
    page and select the downloads link or navigate directly to this website:'
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您需要在您的机器上安装Python，请导航到Python主页并选择下载链接，或直接导航到该网站：
- en: '*[http://www.python.org/download/](http://www.python.org/download/)*'
