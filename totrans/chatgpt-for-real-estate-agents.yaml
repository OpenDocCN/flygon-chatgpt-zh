  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
- en: 'Quote to remember:'
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
- en: “When you speak to everyone, you speak to no one.” — Meredith Hill
