  zh: 简单来说，**插件**是一种扩展，它扩展了基础系统的功能，允许执行那些在其他情况下不可用的特定任务。在ChatGPT的上下文中，插件作为扩展工作，允许您与外部工具交互，执行高级计算，访问实时数据，甚至自动化复杂的工作流程。虽然ChatGPT的基本模型仅限于根据其训练数据生成基于文本的内容，但插件提供了访问外部资源的能力，将其连接到一个更广泛和更多样化的数字生态系统中。
