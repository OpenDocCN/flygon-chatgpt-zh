- en: Analysis with Generative AI
  id: totrans-1621
  prefs: []
  type: TYPE_NORMAL
  zh: 使用生成式 AI 进行分析
- en: 'Using the Case Dataset files provided, upload the file WDISelectedData.xlsx
    into ChatGPT-4 with the Code Interpreter plugin. Then use the following prompt:'
  id: totrans-1622
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的Case Dataset文件，通过ChatGPT-4的Code Interpreter插件上传文件WDISelectedData.xlsx。然后使用以下提示：
- en: 'Prompt: “Create a scatterplot (with smooth regression lines) comparing the
    GDP between China and the US.”'
  id: totrans-1623
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“创建一个比较中国和US GDP的散点图（带有平滑回归线）。”
- en: '[Figure 11.7](#fig11-7) shows the trend lines for China and the US annual GDP.'
  id: totrans-1624
  prefs: []
  type: TYPE_NORMAL
  zh: '[图11.7](#fig11-7)显示了中美两国年度GDP的趋势线。'
- en: 'Response from ChatGPT-4:'
  id: totrans-1625
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4的回复：
- en: '![image](images/pg245.jpg)'
  id: totrans-1626
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg245.jpg)'
- en: FIGURE 11.7 Visualization showing the comparison of GDP between China and the
    US
  id: totrans-1627
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.7可视化显示中国和美国的GDP比较
- en: ChatGPT Answers to the Framed Analytical Questions
  id: totrans-1628
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT对框架分析问题的回答
- en: We now use ChatGPT to obtain more detailed answers to the framed questions provided
    by the generative AI tool. Remember that the relevant data file has already been
    loaded into ChatGPT for the previous computation. This is a continuation of the
    analysis.
  id: totrans-1629
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在使用ChatGPT来获取由生成式AI工具提供的框架问题的更详细答案。记住，相关数据文件已经在前面的计算中加载到ChatGPT中。这是分析的延续。
- en: 'Prompt: “What is the growth rate of the Chinese GDP and the growth rate of
    the US GDP?”'
  id: totrans-1630
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“中国GDP和US GDP的增长率是多少？”
- en: 'Response from ChatGPT-4:'
  id: totrans-1631
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4的回复：
- en: The total GDP growth rate from 2000 to 2012 is
  id: totrans-1632
  prefs: []
  type: TYPE_NORMAL
  zh: 2000年至2012年的总GDP增长率是
- en: '• For China: Approximately 586.67%586.67%'
  id: totrans-1633
  prefs: []
  type: TYPE_NORMAL
  zh: • 对于中国：大约586.67%
- en: '• For the United States: Approximately 57.16%57.16%'
  id: totrans-1634
  prefs: []
  type: TYPE_NORMAL
  zh: • 对于美国：大约57.16%
- en: This means that during this period, China’s GDP increased by about 586.67%586.67%
    from its 2000 level, while the GDP of the United States increased by about 57.16%57.16%
    from its 2000 level. The calculation indicates a much higher growth rate for China
    compared to the United States over these years.
  id: totrans-1635
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着在此期间，中国的GDP从2000年的水平增长了约586.67%，而美国的GDP从2000年的水平增长了约57.16%。计算表明，与这些年份的美国相比，中国的增长率要高得多。
- en: 'Prompt: “When do you project the Chinese GDP to catch up with the US GDP?”'
  id: totrans-1636
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“你预计中国GDP何时能赶上美国GDP？”
- en: 'Response from ChatGPT-4:'
  id: totrans-1637
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4的回复：
- en: Based on the regression model and extrapolating the GDP trends into the future,
    it is projected that China’s GDP would catch up with the United States’ GDP around
    the year ≈2018≈2018, as the precise intersection is estimated to be in the year
    2017.95.
  id: totrans-1638
  prefs: []
  type: TYPE_NORMAL
  zh: 基于回归模型并将GDP趋势外推到未来，预计中国的GDP将在大约2018年赶上美国的GDP，因为精确的交汇点估计在2017.95年。
- en: Please note that these projections are based on historical growth rates and
    the assumption that these rates will continue in the future. Real-world economic
    outcomes may vary due to a multitude of factors.
  id: totrans-1639
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，这些预测是基于历史增长率以及这些增长率将继续在未来的假设。由于众多因素的影响，现实世界的经济结果可能会有所不同。
- en: 'Analysis Case 11.2: Analysis Case Using ORDERS'
  id: totrans-1640
  prefs: []
  type: TYPE_NORMAL
  zh: 案例分析11.2：使用ORDERS的分析案例
- en: Analysis with Excel
  id: totrans-1641
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel的分析
- en: Using the Case Dataset files, find the file ORDERS.xlsx. Open ORDERS.xlsx using
    Excel.
  id: totrans-1642
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Case Dataset文件，找到文件ORDERS.xlsx。使用Excel打开ORDERS.xlsx。
- en: 'We are going to answer these questions:'
  id: totrans-1643
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将回答这些问题：
- en: What is the yearly sales forecast for the past four years?
  id: totrans-1644
  prefs: []
  type: TYPE_NORMAL
  zh: 过去四年的年度销售额预测是多少？
- en: What is the overall sales trend?
  id: totrans-1645
  prefs: []
  type: TYPE_NORMAL
  zh: 销售的整体趋势是什么？
- en: Can we identify a province that is contributing the most to that trend?
  id: totrans-1646
  prefs: []
  type: TYPE_NORMAL
  zh: 我们能否识别出一个对这一趋势贡献最大的省份？
- en: Create a pivot table of the entire ORDERS table. Select ODERDATE as the rows
    and tabulate the sum of the SALES variable. Now, every order date for each sale
    is considered a category, so the pivot table has thousands of rows. We can aggregate
    them by year (or by month or by month and year) by using a function in the pivot
    tables. In the pivot table “Format” ribbon, find the “Group by” function. With
    any one of the dates selected in the pivot table, invoke the function and select
    “group dates by Year.” You should get a short table with four years and the sum
    of sales for all stores for all years ([Figure 11.8](#fig11-8)).
  id: totrans-1647
  prefs: []
  type: TYPE_NORMAL
  zh: 创建整个ORDERS表的交叉表。选择ORDERDATE作为行，并编制SALES变量的总和。现在，每个销售订单的日期都被视为一个类别，因此交叉表有数千行。我们可以通过使用交叉表中的函数按年（或按月或按月和年）对它们进行聚合。在交叉表的“格式”选项卡中，找到“分组”功能。选择交叉表中的任何日期，调用该功能并选择“按年份分组”。你应该会得到一个包含四年和所有年份所有商店销售额总和的简短表格（[图11.8](#fig11-8)）。
- en: '![image](images/pg247.jpg)'
  id: totrans-1648
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg247.jpg)'
- en: FIGURE 11.8 Pivot table parameters for computing the sales forecast for the
    last four years of total sales
  id: totrans-1649
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.8 计算过去四年总销售额预测的交叉表参数
- en: Create a line chart of the yearly sales totals and add a trend line ([Figure
    11.9](#fig11-9)). What does the trend line tell you about overall sales?
  id: totrans-1650
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个显示年度销售总额的折线图并添加趋势线（参见图11.9）。趋势线告诉你关于整体销售什么？
- en: '![image](images/pg248.jpg)'
  id: totrans-1651
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg248.jpg)'
- en: FIGURE 11.9 Plot of four years of total sales with the added trend line
  id: totrans-1652
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.9 带有趋势线的四年总销售额图
- en: We notice a decrease in sales, so we need to analyze which provinces are causing
    this decline in sales. One way to do this is by creating a pivot table to show
    yearly sales for each province. To keep the chart manageable, we can limit it
    to the provinces with the highest sales by performing a Pareto analysis. We previously
    performed a Pareto analysis in the Analysis Case in [Chapter 7](16_ch07.xhtml)
    and found that six out of the 12 provinces contributed the most to annual sales.
    Let’s narrow it down further by selecting only the top four contributors – Alberta,
    British Columbia, Ontario, and Saskatchewan. We can do this by applying a filter
    on the columns and choosing these four provinces.
  id: totrans-1653
  prefs: []
  type: TYPE_NORMAL
  zh: 我们注意到销售额有所下降，因此我们需要分析哪些省份导致了这种销售下降。一种方法是创建一个交叉表来显示每个省份的年度销售额。为了使图表易于管理，我们可以通过执行帕累托分析来限制它只显示销售额最高的省份。我们在第七章的分析案例中之前已经执行了帕累托分析，发现12个省份中有6个对年度销售额贡献最大。让我们进一步缩小范围，只选择前四个贡献者——阿尔伯塔省、不列颠哥伦比亚省、安大略省和萨斯喀彻温省。我们可以通过在列上应用过滤器并选择这四个省份来实现这一点。
- en: Creating a line chart with multiple series can be challenging when dealing with
    a table display. To simplify the process, copy the table to another spreadsheet.
    When pasting it, use the “Paste Special” function and select the “Transpose rows
    and columns” option. This will paste the data in a format that is more conducive
    to creating the correct line charts.
  id: totrans-1654
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理表格显示时，创建具有多个系列的折线图可能会很具挑战性。为了简化过程，将表格复制到另一张电子表格中。粘贴时，使用“特殊粘贴”功能并选择“转置行和列”选项。这将以更有利于创建正确折线图的数据格式粘贴数据。
- en: Please create line charts depicting sales data for the top four provinces from
    2009 to 2012\. Place total sales on a separate axis to facilitate observation
    of province trends. Additionally, add trend lines to all series (refer to [Figure
    11.10](#fig11-10)). After analyzing the charts, determine which province appears
    to be contributing the most to the overall sales decline trend.
  id: totrans-1655
  prefs: []
  type: TYPE_NORMAL
  zh: 请创建展示2009年至2012年四个主要省份销售数据的折线图。将总销售额放在单独的轴上，以便观察省份趋势。另外，为所有系列添加趋势线（参见图11.10）。分析完图表后，确定哪个省份似乎对整体销售下降趋势贡献最大。
- en: '![image](images/pg249.jpg)'
  id: totrans-1656
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg249.jpg)'
- en: FIGURE 11.10 Chart showing the sales trends by province
  id: totrans-1657
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.10 按省份显示的销售趋势图
- en: Perhaps displaying the monthly sales would be more useful and give us more insight.
    Repeat the process, but now group the ORDERDATE rows by Month and Year. Note that
    now the years and months are part of the table ([Figure 11.11](#fig11-11)).
  id: totrans-1658
  prefs: []
  type: TYPE_NORMAL
  zh: 可能显示月度销售数据会更有用，并给我们更多的洞察。重复此过程，但现在按月份和年份分组ORDERDATE行。注意现在年份和月份是表格的一部分（参见图11.11）。
- en: '![image](images/pg250.jpg)'
  id: totrans-1659
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg250.jpg)'
- en: FIGURE 11.11 Pivot table configuration for tabulating SALES by month
  id: totrans-1660
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.11 按月汇总SALES的交叉表配置
- en: Create a table for the line chart. Paste the two columns from the pivot table
    to another sheet, remove the date rows, and add a month-year variable. Then, add
    a trend line ([Figure 11.12](#fig11-12)). We can see the same downward trend here.
    What else do you notice?
  id: totrans-1661
  prefs: []
  type: TYPE_NORMAL
  zh: 为折线图创建一个表格。将交叉表中的两列复制到另一张工作表上，删除日期行，并添加月-年变量。然后，添加趋势线（参见图11.12）。我们在这里也可以看到相同的下降趋势。你还注意到什么？
- en: '![image](images/pg251.jpg)'
  id: totrans-1662
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg251.jpg)'
- en: FIGURE 11.12 Trend line of monthly SALES data
  id: totrans-1663
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.12 月度SALES数据趋势线
- en: There is a lot of variability to the monthly data. There is no discernible cyclicality
    to the data, either. So, this chart is not as useful as the simpler yearly data
    in discovering trends.
  id: totrans-1664
  prefs: []
  type: TYPE_NORMAL
  zh: 月份数据的变异性很大。数据中也没有明显的周期性。因此，这张图表在发现趋势方面不如简单的年度数据有用。
- en: If we tried the same analysis for the top four provinces compared to total sales
    but monthly, the chart gets even more confusing ([Figure 11.13](#fig11-13)). One
    must produce both types of charts to see which one yields greater insight. Given
    that it was not insightful, this last chart does not need to be further formatted
    with the chart title, series names, or axes titles.
  id: totrans-1665
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们尝试对前四个省份与总销售额但按月进行比较的相同分析，图表会变得更加混乱([图11.13](#fig11-13))。必须同时生成这两种类型的图表，以查看哪一种提供了更深入的见解。鉴于这并不具有洞察力，这个最后的图表不需要进一步格式化，包括图表标题、系列名称或轴标题。
- en: '![image](images/pg252.jpg)'
  id: totrans-1666
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg252.jpg)'
- en: FIGURE 11.13 Trend analysis of monthly SALES data for the top four provinces
  id: totrans-1667
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.13：前四个省份的月度SALES数据的趋势分析
- en: Analysis with R
  id: totrans-1668
  prefs: []
  type: TYPE_NORMAL
  zh: 使用R进行数据分析
- en: Using the Case Dataset files provided, find the ORDERS.xlsx. Use the function
    in Jamovi with the settings shown in [Figure 11.14](#fig11-14) and results in
    [Figure 11.15](#fig11-15).
  id: totrans-1669
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，找到ORDERS.xlsx。使用Jamovi中的功能，设置如[图11.14](#fig11-14)所示，结果如[图11.15](#fig11-15)所示。
- en: '![image](images/pg252_1.jpg)'
  id: totrans-1670
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg252_1.jpg)'
- en: FIGURE 11.14 Function for splitting the time
  id: totrans-1671
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.14：分割时间的函数
- en: '![image](images/pg253.jpg)'
  id: totrans-1672
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg253.jpg)'
- en: FIGURE 11.15 Trend analysis of annual SALES data through 2009-2012
  id: totrans-1673
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.15：2009-2012年年度SALES数据的趋势分析
- en: Analysis with Generative AI
  id: totrans-1674
  prefs: []
  type: TYPE_NORMAL
  zh: 使用生成式AI进行数据分析
- en: Using the Case Dataset files provided, upload the file 2016_SFO_Customer_Survey_Data.xlsx
    into ChatGPT-4 with the Code Interpreter plugin. Then use the prompts shown here
    to obtain the following responses.
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，将文件2016_SFO_Customer_Survey_Data.xlsx上传到ChatGPT-4的代码解释器插件中。然后使用此处显示的提示来获取以下响应。
- en: 'Prompt: “Create a pivot table of total sales in each year of each province
    and save it as an Excel file. Then, create trendlines of the sum of sales using
    distinct colors to show different provinces from 2009 to 2012.”'
  id: totrans-1676
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“创建每个省份每年总销售额的交叉表，并将其保存为Excel文件。然后，创建销售总和的趋势线，使用不同的颜色来显示2009年至2012年的不同省份。”
- en: 'Response from ChatGPT-4:'
  id: totrans-1677
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4的响应：
- en: '[Figure 11.16](#fig11-16) shows the yearly sales by province in the table,
    and [Figure 11.17](#fig11-17) shows the trendlines.'
  id: totrans-1678
  prefs: []
  type: TYPE_NORMAL
  zh: '[图11.16](#fig11-16)显示了按省份的年度销售表格，而[图11.17](#fig11-17)显示了趋势线。'
- en: '![image](images/pg254.jpg)'
  id: totrans-1679
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg254.jpg)'
- en: FIGURE 11.16 Pivot table of total sales in each year of each province
  id: totrans-1680
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.16：每个省份每年总销售额的交叉表
- en: '![image](images/pg254_1.jpg)'
  id: totrans-1681
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg254_1.jpg)'
- en: FIGURE 11.17 Trend lines of sales showed in different colors presenting different
    province from 2009 to 2012
  id: totrans-1682
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.17：以不同颜色表示不同省份的销售趋势线
- en: 'Prompt: “Create another pivot table of total sales in each year and each order
    month and save it as an Excel file. Make sure you include totals. Then, create
    trend lines of the sum of sales using distinct colors to show different years
    from 2009 to 2012, with the x-axis representing the order month. Make sure to
    use unique color for each trend line.”'
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“创建另一个交叉表，显示每年和每个订单月份的总销售额，并将其保存为Excel文件。确保包括总计。然后，创建销售总和的趋势线，使用不同的颜色来显示2009年至2012年的不同年份，x轴表示订单月份。确保每条趋势线使用独特的颜色。”
- en: '[Figure 11.18](#fig11-18) shows the total order per month year over year in
    a table, and Figure 10.19 shows the trend line for each year as a function of
    month.'
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: '[图11.18](#fig11-18)显示了按年逐月总订单的表格，而图10.19显示了每年作为月份函数的趋势线。'
- en: 'Response from ChatGPT-4:'
  id: totrans-1685
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4的响应：
- en: '![image](images/pg255.jpg)'
  id: totrans-1686
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg255.jpg)'
- en: FIGURE 11.18 Pivot table of total sales in each year and the trend line from
    2009 to 2012
  id: totrans-1687
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.18：每年总销售额的交叉表以及2009年至2012年的趋势线
- en: '![image](images/pg256.jpg)'
  id: totrans-1688
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg256.jpg)'
- en: FIGURE 11.19 Trend line of sales from month 1 to 12 showed in different colors
    presenting different years from 2009 to 2012
  id: totrans-1689
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.19：从第1个月到第12个月的销售趋势线，以不同颜色表示2009年至2012年的不同年份
- en: 'Prompt: “Create a pivot table of total sales in each month of each province,
    and save it as an Excel file. Make sure to include totals. Then, create trend
    lines of the sum of sales using distinct colors (unique colors for each line)
    to show different provinces from 2009 to 2012.”'
  id: totrans-1690
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“创建每个省份每月总销售额的交叉表，并将其保存为Excel文件。确保包括总计。然后，创建销售总和的趋势线，使用不同的颜色（每条线使用独特的颜色）来显示2009年至2012年的不同省份。”
- en: '[Figure 11.20](#fig11-20) shows a table of the monthly sales by province, and
    [Figure 11.21](#fig11-21) shows the corresponding trendlines.'
  id: totrans-1691
  prefs: []
  type: TYPE_NORMAL
