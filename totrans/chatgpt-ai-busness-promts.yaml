- en: '---'
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**The Author''s Note**'
  id: totrans-1067
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**作者的注释**'
- en: Sustainability and ESG are becoming increasingly significant for contemporary
    businesses because stakeholders value companies that prioritize environmental,
    social, and governance initiatives. This chapter provides useful exercises to
    help businesses assess their impact, develop effective strategies, and publicly
    share their work. By using these tools, companies can make a positive impact on
    the world while fostering trust and long-term growth.
  id: totrans-1068
  prefs: []
  type: TYPE_NORMAL
  zh: 可持续性和ESG（环境、社会和治理）对当代企业越来越重要，因为利益相关者重视那些优先考虑环境、社会和治理倡议的公司。本章提供了有用的练习，帮助 businesses
    评估其影响，制定有效的策略，并公开分享他们的工作。通过使用这些工具，公司可以在对世界产生积极影响的同时，培养信任和长期增长。
- en: '#Chapter 16:'
  id: totrans-1069
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '#第16章：'
- en: Integration & Implementation of AI
  id: totrans-1070
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能的集成与实施
