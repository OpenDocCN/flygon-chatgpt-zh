  type: TYPE_NORMAL
  zh: '**提示词**是至关重要的，因为它们充当着用户意图与模型生成相关且连贯文本能力之间的桥梁。由于ChatGPT不知道我们想要什么，直到我们向它解释，因此设计有效的提示词至关重要。我们从ChatGPT获得的结果质量直接与我们所提供的提示词的清晰度、准确性和结构相关。这既是艺术也是科学，需要理解模型如何解释单词以及如何引导其响应。'
