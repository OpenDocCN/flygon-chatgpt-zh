- en: Analysis with Generative AI
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 使用生成式 AI 进行分析
- en: Upload 2016 Customer Survey Data.csv. file into ChatGPT-4\. Then use the following
    prompts. The results of the following prompts are shown in [Figures 5.31](#fig5-31)
    and [5.32](#fig5-32).
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 将 2016 Customer Survey Data.csv 文件上传到 ChatGPT-4。然后使用以下提示。以下提示的结果显示在 [图 5.31](#fig5-31)
    和 [5.32](#fig5-32) 中。
- en: 'Prompt: “Create a descriptive statistics summary for count of *RESPNUM (Respondent
    Number, something like survey taker’s ID) by gender (0, female and male), and
    save the table in a Excel file. Then create a bar plot to show count of *RESPNUM’s
    distribution by Q21INCME (from 0 to 5).”'
  id: totrans-802
