    ****resp**on**si**ble**, ****a****n**d** ****acce**s**si**ble** ****w****a**y**.
    ****T****h**e** ****orga**ni**za**tio**n ****ado**p**t**ed** ****a****n**** ****op****e**n**-****so**u**r**ce**
