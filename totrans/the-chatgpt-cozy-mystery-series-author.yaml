- en: What exactly is a Story Hook?
  prefs: []
  type: TYPE_NORMAL
- en: For me, a story hook is something that grabs a reader’s attention, immediately
    creates questions that demand to be answered, and makes someone want to read this
    book, watch the TV show, or watch the movie.
  prefs: []
  type: TYPE_NORMAL
- en: For me, the hook has to grab me by asking a question that can only be answered
    by reading the book.
  prefs: []
  type: TYPE_NORMAL
- en: It could be something cool, different, interesting, or intriguing, but it has
    to be attention-grabbing.
  prefs: []
  type: TYPE_NORMAL
- en: Think of the headlines in an online blog post or newspaper. They are called
    “click-bait” for a reason!
  prefs: []
  type: TYPE_NORMAL
- en: The Four Key Ingredients of a High-Concept Story Idea
  prefs: []
  type: TYPE_NORMAL
- en: What is different about your story idea that makes it sound cool, engaging,
    and fresh?  Yes, readers are looking for similar elements within a specific niche
    but are quickly bored with copycat story ideas.
  prefs: []
  type: TYPE_NORMAL
- en: How is this different, intriguing, and new in some way? Can you create a great
    high-concept story idea that you can use to sell your entire series in one sentence?
  prefs: []
  type: TYPE_NORMAL
- en: Here are four top components of high-concept, cozy mystery story ideas.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. A Fish out of Water
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is a very common theme used by many cozy mystery authors. Essentially,
    it is any scenario where a stranger is dropped into a location or plot scenario
    where they are totally out of their comfort zone.
  prefs: []
  type: TYPE_NORMAL
- en: Characters who are totally at odds with their environment automatically struggle
    to adapt to this new location's culture, habits, rules, and nuances.
  prefs: []
  type: TYPE_NORMAL
- en: This creates internal and external conflict and adds exciting layers to the
    murder mystery investigation. Their fresh approach to solving the crime can be
    their greatest asset!
  prefs: []
  type: TYPE_NORMAL
- en: In Louisiana Longshot by Jana DeLeon, our sleuth, Fortune Redding, is a CIA
    assassin forced to go off-grid in Sinful, Louisiana, posing as a former beauty
    queen turned librarian.
  prefs: []
  type: TYPE_NORMAL
- en: In Coming in Hot by Deany Ray, former motorcycle gang members thirtysomething
    Piper and her grandmother move south into witness protection in a Florida retirement
    village.
  prefs: []
  type: TYPE_NORMAL
- en: In the movie Murder Mystery, a New York City cop and his hairdresser wife scramble
    to solve a murder on a billionaire’s luxury yacht.
  prefs: []
  type: TYPE_NORMAL
- en: In The Psychic Fair Mystery  story idea, Ellie has come to visit her aunt at
    her craft shop and is suddenly gifted with frightening psychic powers. She is
    totally out of her comfort zone.
  prefs: []
  type: TYPE_NORMAL
- en: Over the course of the series, this person will move from being a stranger to
    finding their place in the new society, family, or plot situation.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. A Major External Conflict
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is an overarching problem, dilemma, or conflict that will not be solved
    until the end of the series.
  prefs: []
  type: TYPE_NORMAL
- en: Each book in the series will have more minor conflicts that may not be linked
    to the murder investigation, but the central conflict is in the background.
  prefs: []
  type: TYPE_NORMAL
- en: This hook also generates multiple subplots where this problem threatens the
    main characters and sidekicks.
  prefs: []
  type: TYPE_NORMAL
- en: This can be very powerful if you link it to the character arc of the sleuth.
    Introduce it in book one and end it in the final book in the series when the sleuth
    finally resolves the conflict or problem.
  prefs: []
  type: TYPE_NORMAL
- en: The key is to make this issue very clear in the book description so that the
    reader knows that this threat or issue is hanging over the characters from the
    start.
  prefs: []
  type: TYPE_NORMAL
- en: Example. In Louisiana Longshot and Coming in Hot mentioned above, getting involved
    in a murder investigation could mean blowing their cover, putting themselves and
    their new friends in mortal danger from the people they are hiding from.
  prefs: []
  type: TYPE_NORMAL
- en: Should they stay under the radar and not get involved in the murder investigation
    they are caught up in, or find the killer and risk attracting the criminals who
    are determined to silence them? That question should keep us guessing, while we
    are enjoying the murder investigation they cannot avoid getting caught up in.
  prefs: []
  type: TYPE_NORMAL
- en: Example. In The Antique Hunter's Guide to Murder by C L Miller, Freya Lockwood
    and her eccentric Aunt Carole are sucked into a thrilling mystery, as a prominent
    antique dealer and Freya's estranged mentor leaves her a letter full of clues
    just before his suspicious death.
  prefs: []
  type: TYPE_NORMAL
- en: Can Freya stay alive long enough to solve the murder? And why was he killed?
  prefs: []
  type: TYPE_NORMAL
- en: Example. In The Psychic Fair Mystery  story idea, Ellie is forced to stay with
    her aunt until she has learned how to control and use her new psychic abilities
    without putting her aunt at risk. Can her new abilities be kept a secret from
    the rest of the town and her family? All Ellie wants to do is get back to her
    normal life!  How she learns and adapts is going to be tracked across the series.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. An Aspirational or Escapist Hook
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Something that plays on the hopes, aspirations and dreams of a reader and whisks
    them off to an escapist world outside of the normal day to day world.
  prefs: []
  type: TYPE_NORMAL
- en: How many times have you read mysteries where the sleuth inherits a run-down
    villa/house/bookstore by the sea from someone they barely knew?
  prefs: []
  type: TYPE_NORMAL
- en: Out of the blue, their normal humdrum life is replaced by security, hope, opportunity,
    and excitement, possibly even a new romance.
  prefs: []
  type: TYPE_NORMAL
- en: Cozy authors make this extra special by adding cool elements such as resident
    paranormal beings, animal companions and quirky kind local residents.
  prefs: []
  type: TYPE_NORMAL
- en: The reader instantly wants to know what it would be like to live there. What
    is the weather like? Would they be made to feel welcome? Why has this person left
    them this legacy?
  prefs: []
  type: TYPE_NORMAL
- en: Another option would be to have the sleuth travel to wonderful locations and
    help the local community to solve the murder mystery.
  prefs: []
  type: TYPE_NORMAL
- en: Steve Higgs has a very popular series featuring retired police officer Albert
    Smith and his dog who travel around the UK looking for regional foods – and solving
    murders.
  prefs: []
  type: TYPE_NORMAL
- en: Hope Callaghan takes us on luxury cruise ships with sleuth Millie Sanders, while
    TA Williams explores the stunning Italian countryside around Tuscany with retired
    police detective Dan Armstrong. Both perfect escapist backgrounds for a compelling
    murder mystery with a twist.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. A Universal Theme
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The universal theme is a universal or relatable lesson that the main character
    must learn by the end of the story.
  prefs: []
  type: TYPE_NORMAL
- en: This doesn't mean that your story has to be moral or boring. It simply means
    your story has to say something about what it is like to be a human being facing
    challenges in life.
  prefs: []
  type: TYPE_NORMAL
- en: Your character has to take some form of internal journey and he or she has to
    learn something along the way.
  prefs: []
  type: TYPE_NORMAL
- en: You have to give us something deeper to hang onto. Something that goes beyond
    just the chase scenes or murder investigations or missing persons or fantastical
    worlds. Something that goes beyond the central plot line.
  prefs: []
  type: TYPE_NORMAL
- en: The good news about universal themes is that the majority of high concept movies
    and books use and reuse the same ten universal themes over and over again.
  prefs: []
  type: TYPE_NORMAL
- en: And here they are in no particular order.
  prefs: []
  type: TYPE_NORMAL
- en: Love.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Forgiveness.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Acceptance of self, of reality, a family, of the past, of circumstances, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Faith in oneself and others in the world.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Courage.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Trust.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Survival.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Confidence.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Selflessness and
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Honor.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are the things that human beings learn throughout their experiences and
    therefore these are the things that your characters must learn because that's
    what makes them human.
  prefs: []
  type: TYPE_NORMAL
- en: It makes them relatable - it makes them real.
  prefs: []
  type: TYPE_NORMAL
- en: This Universal Hook Fits Perfectly Into Developing A Series Character Arc For
    the Main Character/Sleuth.
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The series will be tracking the journey that character will take over the course
    of several books.
  prefs: []
  type: TYPE_NORMAL
- en: You can use these universal themes to develop the series character arc for the
    sleuth.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example. By the end of The Psychic Mystery series our newly psychic Ellie
    will have moved from:'
  prefs: []
  type: TYPE_NORMAL
- en: '| Book One | End of the Series |'
  prefs: []
  type: TYPE_TB
- en: '| Being alone. Perhaps she has just ended a long relationship and is at a turning
    point in her life. | Finding love and a lasting romantic relationship |'
  prefs: []
  type: TYPE_TB
- en: '| Regret and loss. | Forgiveness and self-forgiveness for past mistakes she
    made.Overcome a broken relationship. |'
  prefs: []
  type: TYPE_TB
- en: '| Refusing to accept her new situation – she wants out! | Self-Acceptance of
    her skills and acceptance of her family. |'
  prefs: []
  type: TYPE_TB
- en: '| Unsure about her abilities. | Faith in herself and her abilities. |'
  prefs: []
  type: TYPE_TB
- en: '| Scared to make decisions and make changes. | Courage to make decisions. |'
  prefs: []
  type: TYPE_TB
- en: '| Lack of trust in others as a direct result of being betrayed or let down
    by others. | Trust in her aunt and the small community she now calls home. |'
  prefs: []
  type: TYPE_TB
- en: '| Unsure about her new psychic talents and this new town. | She knows now that
    she can survive any situation. |'
  prefs: []
  type: TYPE_TB
- en: '| Lack of confidence. | Confidence in herself and her abilities. |'
  prefs: []
  type: TYPE_TB
- en: '| Some selfish behavior due to her vulnerability and loss. | Ellie has been
    taught to be kind and generous. |'
  prefs: []
  type: TYPE_TB
- en: What to Do Next?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: These four types of Story Hook can be combined together to fit  your story idea,
    theme, niche, voice, setting and emotional promise.
  prefs: []
  type: TYPE_NORMAL
- en: Take some time at this point to work through the previous steps and develop
    at least one story idea that really excites you and you cannot wait to write!
  prefs: []
  type: TYPE_NORMAL
- en: If you are not there yet, repeat the Brainstorming Step, edit the prompts, and
    generate more responses from ChatGPT until you have several ideas to work on.
    Keep working on the premise until you are happy with it.
  prefs: []
  type: TYPE_NORMAL
- en: Combine Your Ideas To Create A Short Summary
  prefs: []
  type: TYPE_NORMAL
- en: Worked Example. The Psychic Fair Mystery
  prefs: []
  type: TYPE_NORMAL
- en: '| Who is the sleuth? What do they do and why are they in this murder mystery?
    |'
  prefs: []
  type: TYPE_TB
- en: '| Ellie has come to stay with her aunt in an historic coastal town.Ellie is
    a professional chef who has resigned from her job in a major London restaurant.
    |'
  prefs: []
  type: TYPE_TB
- en: '| How does the sleuth get involved in the murder investigation? |'
  prefs: []
  type: TYPE_TB
- en: '| She walks into her aunt’s craft studio and finds the dead body of a man who
    has been murdered with knitting needles. |'
  prefs: []
  type: TYPE_TB
- en: '| What are the main themes of the book? |'
  prefs: []
  type: TYPE_TB
- en: '| Crafts and Hobbies. Knitting, Crocheting, and Quilting. Coastal and Beach
    Communities. Psychic and Supernatural Abilities |'
  prefs: []
  type: TYPE_TB
- en: '| What emotional experience does this book promise to deliver? |'
  prefs: []
  type: TYPE_TB
- en: '| Fun, contemporary psychic mystery full of quirky and surprising characters,
    including senior sleuths, in a small coastal town. |'
  prefs: []
  type: TYPE_TB
- en: '| How is this different and new is some way? |'
  prefs: []
  type: TYPE_TB
- en: '| The victim grabbed her and transferred his psychic abilities to Ellie just
    before he died. |'
  prefs: []
  type: TYPE_TB
- en: And there we have it. A Story Idea for Book One of a Cozy Mystery.
  prefs: []
  type: TYPE_NORMAL
- en: 'PART TWO: YOUR SLEUTH'
  prefs: []
  type: TYPE_NORMAL
- en: '![A blue and white rectangular box with text  Description automatically generated](image_rsrc436.jpg)All
    about the Sleuth'
  prefs: []
  type: TYPE_NORMAL
- en: There is one fundamental aspect of the cozy murder mystery genre which explains
    why readers come back to writers and series they love – it is all about the characters.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: For the sake of convenience, I am using an example of a female sleuth
    throughout this book, but of course the sleuth could be any gender or creature.'
  prefs: []
  type: TYPE_NORMAL
- en: I like to think of it this way.
  prefs: []
  type: TYPE_NORMAL
- en: As a reader, when I buy a cozy mystery, I want to feel that I am a tourist taking
    a vacation in an interesting new town/city/resort for a few days. I have booked
    a family-run bed and breakfast hotel, and the owners know everyone in the town.
    I am excited about who I will meet during my short stay and want to learn more
    about this town and its customs and heritage.
  prefs: []
  type: TYPE_NORMAL
- en: I want to be transported into an interesting story world where I meet warm,
    charming, and quirky characters I want to spend time with and get to know better.
    I want to listen to their stories and unique voices and dive deep into their lives.
  prefs: []
  type: TYPE_NORMAL
- en: How do I do that?
  prefs: []
  type: TYPE_NORMAL
- en: By following the journey these characters take when there is a murder in their
    town, and they are forced to deal with the aftermath of the crime.
  prefs: []
  type: TYPE_NORMAL
- en: One or two main characters will set out to discover who the killer is and bring
    them to justice before order can be restored to this small community.
  prefs: []
  type: TYPE_NORMAL
- en: In the process of investigating the murder, they reveal their true nature and
    backstories, making me connect with them at a much deeper level.
  prefs: []
  type: TYPE_NORMAL
- en: When I finally pack my virtual suitcase and head home, I know that I will be
    coming back and spending more vacations in the company of this group of interesting
    people who have become more like old friends.
  prefs: []
  type: TYPE_NORMAL
- en: That is why I would always recommend that you plan to write a series of books
    with the same main characters and setting from the start. Readers come back to
    this story world to reconnect with these same characters and discover what has
    changed in their lives.
  prefs: []
  type: TYPE_NORMAL
- en: None of that matters if the reader does not care about the main character and
    what happens to them.
  prefs: []
  type: TYPE_NORMAL
- en: These are ordinary people dropped into extraordinary situations by circumstances
    outside their control, and there should be a personal reason why the sleuth is
    compelled to investigate this murder.
  prefs: []
  type: TYPE_NORMAL
- en: Why should she put herself into the path of a murderer?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Does the murder take place in her community or her place of work, for example?
    She is driven by a sense of justice to discover who committed this terrible crime
    and why.
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Or does it impact a close family member who she knows to be innocent of the
    murder?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A sleuth is often a person who runs a business or has a hobby or skill that
    brings her into close contact with other members of her community.
  prefs: []
  type: TYPE_NORMAL
- en: No matter the genre, our role as authors is to immerse our characters in the
    world of the story and then reveal their thoughts and actions when they face challenges
    and are forced to make difficult decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Readers should feel sympathy and empathy for our main characters and want to
    follow their journeys.
  prefs: []
  type: TYPE_NORMAL
- en: They have to care whether they will achieve their goals. And that begins with
    the main characters of our cozy mystery.
  prefs: []
  type: TYPE_NORMAL
- en: Select One Main Amateur Sleuth With A Unique Twist.
  prefs: []
  type: TYPE_NORMAL
- en: Classically, the sleuth is an ordinary person driven to take action to find
    the truth.
  prefs: []
  type: TYPE_NORMAL
- en: The sleuth should fit the context of the time period and setting. This is your
    main character, and you should know enough about them to get them onto the page
    as living, breathing people.
  prefs: []
  type: TYPE_NORMAL
- en: Our sleuth should be a realistic character that readers can identify with, who
    may reluctantly agree to get involved, but who has the skills and talents to see
    the clues, analyze the evidence, and solve the crime through common sense and
    her personal intuition.
  prefs: []
  type: TYPE_NORMAL
- en: Get the groundwork done before you start work on the opening scenes.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc437.jpg)'
  prefs: []
  type: TYPE_IMG
- en: What are the typical attributes and characteristics of the sleuth in modern
    cozy mystery novels?
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc438.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Modern cozy mystery sleuths, while sharing some traditional traits with their
    genre predecessors, often have attributes that reflect contemporary settings and
    sensibilities. Here are some common characteristics:'
  prefs: []
  type: TYPE_NORMAL
- en: '1\. Everyday Heroines/Heroes: They are usually ordinary people with relatable
    jobs and lives who are inadvertently drawn into mystery and murder. They are not
    professional detectives, but their natural curiosity and sense of justice lead
    them to become involved in solving crimes.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Intelligence and Intuition: These sleuths typically possess a sharp intellect
    and keen intuition. They may not have formal training in law enforcement, but
    they are clever, observant, and skilled at piecing together clues.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Connection to the Community: The sleuth often has strong ties to their
    town or city, which can be both a blessing and a curse. Their insider status gives
    them access to gossip and secrets but can also make their investigations personally
    challenging.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. A Personal Stake: Unlike traditional detectives, cozy sleuths often have
    a personal connection to the crime, such as a friend or family member being the
    suspect or victim, which drives their pursuit of the truth.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Resourcefulness: They are often resourceful and come up with creative solutions
    to problems, sometimes using their professional skills or hobbies to gather information
    or deduce the identity of the criminal.'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Morally Cantered: Cozy sleuths typically have a strong moral compass. They
    believe in justice and are often motivated by the desire to help others and see
    the guilty parties held accountable for their actions.'
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Humor and Wit: They frequently have a good sense of humor, often dry or
    witty, which helps to lighten the mood of the stories and endear them to readers.'
  prefs: []
  type: TYPE_NORMAL
- en: '8\. Empathy and Compassion: Many have a great deal of empathy, which helps
    them understand and connect with other characters, even those who may be suspects
    in their investigation.'
  prefs: []
  type: TYPE_NORMAL
- en: '9\. Independence and Bravery: Despite the dangers they face, they are usually
    quite independent and brave, willing to put themselves in harm’s way to solve
    a crime, although they typically use their wits rather than physical prowess to
    outsmart the culprit.'
  prefs: []
  type: TYPE_NORMAL
- en: '10\. Personal Growth: Over the course of a series, modern cozy sleuths often
    experience significant personal growth. They may develop new skills, form new
    relationships, or undergo changes in their personal lives.'
  prefs: []
  type: TYPE_NORMAL
- en: '11\. Relationships: They often have a network of friends, family, or a community
    that assists, intentionally or unintentionally, with their investigations. This
    network also provides subplots and interpersonal drama that enrich the story.'
  prefs: []
  type: TYPE_NORMAL
- en: '12\. Lifestyle Appeal: They often embody a lifestyle that appeals to readers,
    whether that''s running a small bookstore, baking, crafting, gardening, or owning
    a pet-centric business. Their profession or hobby frequently ties into the theme
    of the series and provides a backdrop for the mysteries.'
  prefs: []
  type: TYPE_NORMAL
- en: Modern cozy sleuths have evolved to reflect contemporary values and more diverse
    backgrounds, leading to stories that resonate with a wide range of readers who
    appreciate the genre's blend of charm, community, and intrigue, all served with
    a side of sleuthing sophistication.
  prefs: []
  type: TYPE_NORMAL
- en: These are great attributes for any cozy mystery sleuth, irrespective of gender.
  prefs: []
  type: TYPE_NORMAL
- en: They are not perfect and may suffer from inner conflict, but they are intelligent
    and resilient enough to identify the killer and bring justice to a broken community.
  prefs: []
  type: TYPE_NORMAL
- en: 'Two aspects in particular stand out for me:'
  prefs: []
  type: TYPE_NORMAL
- en: At the beginning of the story, the sleuth should be at some form of crossroads
    or crisis in their life. This is key for that character growth/character arc that
    readers love to see. This would be particularly important if the sleuth has a
    profession or hobby linked to the murder.
  prefs: []
  type: TYPE_NORMAL
- en: Secondly. You should make the murder personal to the sleuth.
  prefs: []
  type: TYPE_NORMAL
- en: What if someone is trying to hurt the people you love in your family, friends,
    or community?  What would you do to protect them?  Would you want to learn more
    about the person threatening them, even if this puts you in danger?
  prefs: []
  type: TYPE_NORMAL
- en: These personal connections mean that the stakes are high from the start.
  prefs: []
  type: TYPE_NORMAL
- en: Now increase those stakes – make this the worst thing that could happen to our
    sleuth and those she cares about.
  prefs: []
  type: TYPE_NORMAL
- en: For example. What if? The murder victim was linked to a member of the sleuth’s
    family, and they are now the prime suspect in the murder. How would that impact
    the murder investigation?
  prefs: []
  type: TYPE_NORMAL
- en: Non-Personal Cozy Mysteries
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are cozy mysteries where the sleuth only has a slight connection with
    the victim but gets involved in the murder investigation in order to seek justice
    or out of compassion for the victim’s family and friends.
  prefs: []
  type: TYPE_NORMAL
- en: Story Idea. The sleuth lives in a small town in Alaska and, totally by chance,
    comes across a car that has crashed into a tree on a remote country road. The
    elderly driver had been shot. What was he doing there? He is not a local person.
    Who would want to kill him, and why?
  prefs: []
  type: TYPE_NORMAL
- en: What if? The sleuth in this scenario is the wife of the late sheriff in this
    small town. She knows all of the local criminals and ex-cons. The new sheriff
    might ignore her, but her posse of unconventional ex-con investigators will get
    to the truth.
  prefs: []
  type: TYPE_NORMAL
- en: Travel Mysteries
  prefs: []
  type: TYPE_NORMAL
- en: If the sleuth is traveling from location to location, then they should have
    the skills and attributes to get involved in the murder investigation.
  prefs: []
  type: TYPE_NORMAL
- en: That murder in that town creates a one-time community where the sleuth can interact
    with the local characters and law enforcement officers to solve a murder.
  prefs: []
  type: TYPE_NORMAL
- en: Perhaps they are former police officers or journalists who know how to interview
    suspects and still have contacts they can use to support an investigation.
  prefs: []
  type: TYPE_NORMAL
- en: Story idea. The sleuth is traveling on a cruise ship, and the passenger in the
    next cabin is found murdered. The sleuth only spoke to this passenger a few times
    but wants justice for this kind, shy person who was traveling alone.
  prefs: []
  type: TYPE_NORMAL
- en: What if? The sleuth in this scenario is on a 70th birthday celebration cruise
    with two of her quirkiest best friends. You don’t argue with these gals or try
    and fob them off!
  prefs: []
  type: TYPE_NORMAL
- en: Even when the sleuth has no personal connection to the victim, you can still
    create an engaging character and an intriguing plot line.
  prefs: []
  type: TYPE_NORMAL
- en: It's time to create new prompts to investigate your ideas.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc439.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'I want to write a modern cozy murder mystery. Can you give me a character profile
    for the main female character and sleuth. This profile should include: a physical
    description, background, current crisis, personality, murder connection and character
    arc.'
  prefs: []
  type: TYPE_NORMAL
- en: At the beginning of the story, the sleuth should be at some form of crossroads
    or crisis in their life and has returned to the historical coastal town of Polperran
    to spend the summer with her aunt who runs a craft store.  This sleuth is called
    Ellie. Ellie is a professional chef who has resigned from her job in a major London
    restaurant.
  prefs: []
  type: TYPE_NORMAL
- en: The murder victim should be linked to her aunt’s craft store, and her aunt is
    a suspect.
  prefs: []
  type: TYPE_NORMAL
- en: The sleuth has all of the typical attributes and characteristics of the sleuth
    in modern cozy mystery novels.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc43A.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Character Profile: Ellie Marsh'
  prefs: []
  type: TYPE_NORMAL
- en: 'Physical Description: Ellie Marsh is in her early thirties, with a lithe figure
    and an easy smile that hints at her approachable nature. Her wavy chestnut hair
    falls in loose curls around her shoulders, often pulled back in a practical ponytail
    when she''s busy in the kitchen. Her hazel eyes hold a sharp intelligence, and
    she is always observant of her surroundings.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Background: Originally from Polperran, Ellie left her hometown to pursue her
    culinary dreams in London. Trained at a prestigious culinary institute, she honed
    her skills in some of the city''s top restaurants, earning a reputation for her
    inventive dishes and dedication to her craft. However, after years of fast-paced
    city life, Ellie craved a change and decided to take a break from the culinary
    world.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Current Crisis: Ellie has recently resigned from her position as head chef
    at a major London restaurant, feeling burnt out and disillusioned with the cutthroat
    nature of the industry. Unsure of her next steps, she decides to return to her
    quaint coastal hometown of Polperran for the summer, seeking solace and a chance
    to reconnect with her roots.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Personality: Ellie is a fiercely independent and resourceful woman with a sharp
    wit and a kind heart. She possesses a keen sense of intuition and a natural curiosity
    that serves her well in solving mysteries. Despite her tough exterior, she cares
    deeply for her loved ones and is fiercely loyal to those she trusts. Ellie is
    also known for her culinary prowess, finding solace and expression through cooking.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Murder Connection: The murder victim is a regular customer at Ellie''s aunt''s
    craft store in Polperran. Ellie''s aunt becomes a prime suspect in the investigation,
