- en: One of ChatGPT’s notable strengths is its ability to personalise the learning
    experience. By discerning the individual needs of students, it can generate educational
    content tailored to specific levels and learning styles ([Hauger and Köck 2007](#ch22.xhtml#r625)).
    ChatGPT’s conversational features offer students opportunities for virtual tutoring.
    It skilfully answers specific questions, explains difficult concepts and provides
    additional examples to reinforce understanding ([Opara et al. 2023](#ch22.xhtml#r646);
    [Forman et al. 2023](#ch22.xhtml#r619); [Seetharaman 2023](#ch22.xhtml#r656)).
  id: totrans-2614
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 的一个显著优势是它能够个性化学习体验。通过辨别学生的个别需求，它可以生成针对特定水平和学习风格的定制教育内容 ([Hauger and
    Köck 2007](#ch22.xhtml#r625))。ChatGPT 的对话功能为学生提供了虚拟辅导的机会。它巧妙地回答具体问题，解释复杂概念，并提供额外的例子以加强理解
    ([Opara et al. 2023](#ch22.xhtml#r646); [Forman et al. 2023](#ch22.xhtml#r619);
    [Seetharaman 2023](#ch22.xhtml#r656))。
- en: ChatGPT is a valuable tool for language learning, offering simulated conversations
    to improve communication skills. Its translation capabilities contribute to teaching
    in a multilingual context. The introduction of conversational elements makes learning
    more engaging, as students interact interactively with the tool, stimulating attention
    and participation ([Rasul et al. 2023](#ch22.xhtml#r651); [Nurtayeva et al. 2023](#ch22.xhtml#r645)).
  id: totrans-2615
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 是语言学习的一个宝贵工具，提供模拟对话以改善沟通技能。其翻译能力有助于多语言环境下的教学。引入对话元素使学习更具吸引力，因为学生可以与工具进行互动，激发注意力和参与度
    ([Rasul et al. 2023](#ch22.xhtml#r651); [Nurtayeva et al. 2023](#ch22.xhtml#r645))。
- en: The operation of ChatGPT can be succinctly explained through an algorithmic
    description, as shown in Algorithm 1\. This diagram provides a schematic representation
    of the essential steps in the process, from receiving the request to generating
    the response. Initially, the model takes textual input and performs a thorough
    analysis, taking into account both context and semantics. Once this understanding
    has been established, the model formulates a response, taking into account factors
    such as consistency, relevance and clarity.
  id: totrans-2616
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 的操作可以通过算法描述简洁地解释，如算法 1 所示。此图提供了从接收请求到生成响应过程中基本步骤的示意图。最初，模型接收文本输入并进行彻底分析，同时考虑上下文和语义。一旦建立这种理解，模型就会根据一致性、相关性和清晰度等因素制定响应。
- en: ChatGPT’s underlying algorithm harnesses sophisticated ML mechanisms, including
    neural networks, to continuously enhance its capabilities. The initial training
    of the model relies on extensive and diverse sets of textual data, allowing ChatGPT
    to develop a profound understanding of language and various contextual nuances.
    Through the integration of these elements, the model attains the ability to furnish
    context-aware and pertinent responses, thereby crafting a seamless and natural
    conversational experience for users.
  id: totrans-2617
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的底层算法利用了复杂的机器学习机制，包括神经网络，以持续提升其能力。模型的初始训练依赖于大量且多样化的文本数据集，这使得ChatGPT能够深入理解语言及其各种语境细微差别。通过整合这些元素，模型获得了提供上下文感知和相关性响应的能力，从而为用户打造无缝且自然的对话体验。
- en: 14.2.3 Hybrid approach
  id: totrans-2618
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 14.2.3 混合方法
- en: Our innovative hybrid model, integrating blended learning by adeptly combining
    conventional methodologies with interactive sessions involving ChatGPT, constitutes
    a pioneering advancement in the realm of education. This hybrid approach is designed
    to harness the inherent strengths of traditional educational practices alongside
    the revolutionary capabilities of AI, as manifested through ChatGPT, to craft
    an enriched and adaptive learning milieu.
  id: totrans-2619
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的创新型混合模型，通过巧妙地将传统方法与涉及ChatGPT的互动会话相结合，在教育领域取得了开创性的进步。这种混合方法旨在利用传统教育实践固有的优势以及通过ChatGPT体现的AI革命性能力，打造一个丰富且自适应的学习环境。
- en: At the heart of hybrid learning is the harmonious interplay between conventional
    pedagogy facilitated by educators and the dynamic engagement enabled by interactions
    with ChatGPT. Unlike an abrupt shift towards wholly digital methodologies, our
    hybrid model preserves the invaluable essence of human instruction, seamlessly
    integrating the possibilities presented by the intelligent automation of ChatGPT.
  id: totrans-2620
  prefs: []
  type: TYPE_NORMAL
  zh: 混合学习的核心在于传统教学法（由教育者提供）与ChatGPT互动带来的动态参与之间的和谐互动。与完全转向数字方法截然不同，我们的混合模型保留了人类指导的无价精髓，无缝整合了ChatGPT智能自动化的可能性。
- en: A salient characteristic of this model lies in its commitment to personalising
    the learning experience. By incorporating ChatGPT, endowed with the ability to
    discern individual student needs, the hybrid model can generate bespoke educational
    content tailored to the distinct proficiency levels and learning preferences of
    each learner. This constitutes an inventive response to the myriad learning profiles,
    offering a customised approach without compromising the essential human touch
    ([Alafnan et al. 2023](#ch22.xhtml#r606)).
  id: totrans-2621
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型的一个显著特点是其对个性化学习体验的承诺。通过整合具有识别个别学生需求能力的ChatGPT，混合模型能够生成针对每个学习者的不同熟练水平和学习偏好的定制教育内容。这构成了对众多学习档案的创新性回应，提供了一种定制化的方法，同时不失必要的人文关怀（[Alafnan等，2023](#ch22.xhtml#r606)）。
- en: In the realm of teaching, educators can seamlessly integrate ChatGPT into their
    lessons to furnish additional support beyond class hours. Leveraging ChatGPT’s
    conversational capabilities empowers students to pose queries, seek explanations
    and engage interactively with specific concepts, fostering a real-time, dynamic
    and responsive learning environment that provides continuous support (see [Figure
    14.1](#ch22.xhtml#f43)).
  id: totrans-2622
  prefs: []
  type: TYPE_NORMAL
  zh: 在教学领域，教育者可以将ChatGPT无缝集成到他们的课程中，为课外提供额外的支持。利用ChatGPT的对话能力，学生可以提出问题、寻求解释并与特定概念进行互动，营造一个实时、动态和响应式的学习环境，提供持续的支持（见图14.1）。
- en: '![A flow diagram runs as follows: Initialization, initial interaction, Chat
    G P T, automatic assessment, integration of teacher input, decision point, teacher
    intervention, adaptive learning path, continuous assessment, and interactive process.
    Each step includes a descriptive point or two.](html/images/9781032716084_C014_001.jpg)'
  id: totrans-2623
  prefs: []
  type: TYPE_IMG
  zh: '![流程图如下：初始化、初始交互、Chat G P T、自动评估、整合教师输入、决策点、教师干预、自适应学习路径、持续评估和交互过程。每个步骤包括一到两个描述点。](html/images/9781032716084_C014_001.jpg)'
- en: '[Figure 14.1](#ch22.xhtml#f43b) Hybrid learning method with ChatGPT and teacher
    supervision.'
  id: totrans-2624
  prefs: []
  type: TYPE_NORMAL
  zh: '[图14.1](#ch22.xhtml#f43b) ChatGPT与教师监督的混合学习方法。'
- en: Regarding assessments, the hybrid model employs ChatGPT to autonomously grade
    assignments and tests. This automation not only liberates time for educators,
    allowing them to focus more on pivotal teaching responsibilities, but also furnishes
    students with immediate feedback, fostering a culture of continuous improvement.
    Additionally, blended learning offers an opportunity to optimise exam preparation.
    Through the provision of supplementary explanations, practical questions and study
    tips, ChatGPT can mitigate exam-related stress, extending personalised support
    to students as they prepare for assessments.
  id: totrans-2625
  prefs: []
  type: TYPE_NORMAL
  zh: 关于评估，混合模式使用ChatGPT自动评分作业和测试。这种自动化不仅为教育工作者节省了时间，使他们能够更多地专注于关键的教学职责，而且还为学生提供了即时反馈，培养了一种持续改进的文化。此外，混合学习为优化考试准备提供了机会。通过提供补充解释、实际问题和学习技巧，ChatGPT可以减轻考试相关的压力，在学生准备评估时提供个性化的支持。
- en: 14.3 Methodology
  id: totrans-2626
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 14.3 方法论
- en: 'This survey was carried out at the Mohammed V Faculty of Education in Rabat,
    on students studying for a degree in Educational Technology, as part of a workshop
    held in July 2023\. A total of 152 participants attended the workshop. The course
    consisted of four series of activities, mainly watching videos, reading documents,
    taking part in forums, answering quizzes and, finally, completing a final exam,
    involving a set of tasks to be completed over a period of around four weeks, with
    an average of 2 hours of activities per day. The four series of activities were
    as follows: (S1) fundamentals of project management, (S2) IT tools and updating,
    (S3) basic organisational tools and (S4) advanced organisational tools.'
  id: totrans-2627
  prefs: []
  type: TYPE_NORMAL
  zh: 这项调查是在拉巴特的穆罕默德五世教育学院进行的，针对的是正在攻读教育技术学位的学生，作为2023年7月举办的一个研讨会的一部分。共有152名参与者参加了研讨会。课程包括四个系列活动，主要是观看视频、阅读文件、参与论坛、回答测验，最后完成一个最终考试，涉及在约四周的时间内完成的一系列任务，平均每天活动时间为2小时。四个系列活动如下：（S1）项目管理基础，（S2）IT工具和更新，（S3）基本组织工具和（S4）高级组织工具。
- en: Initially, 146 participants completed the questionnaire submitted to them before
    the start of the workshop.
  id: totrans-2628
  prefs: []
  type: TYPE_NORMAL
  zh: 最初，146名参与者完成了在研讨会开始前提交给他们的问卷。
- en: 'The learning techniques implemented in this chapter during the workshop are
    divided into three distinct methods: traditional learning, learning using ChatGPT
    and hybrid learning combining both traditional teaching and interaction with ChatGPT.'
  id: totrans-2629
  prefs: []
  type: TYPE_NORMAL
  zh: 本章在研讨会中实施的学习技巧分为三种不同的方法：传统学习、使用ChatGPT进行的学习以及结合传统教学和与ChatGPT互动的混合学习。
- en: In the first approach, classical learning, participants were exposed to traditional
    teaching methods, such as lectures, readings and practical exercises. This method
    aims to provide a solid foundation of knowledge and skills using traditional teaching
    practices.
  id: totrans-2630
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一种方法，即经典学习中，参与者接触到了传统的教学方法，例如讲座、阅读和实践练习。这种方法旨在通过传统的教学实践提供坚实的知识和技能基础。
- en: The second method involves interaction between a teacher and ChatGPT to facilitate
    learning. This innovative approach exploits ChatGPT’s capabilities to provide
    explanations, answers to questions and additional information, thus complementing
    the teacher’s role. This offers participants an interactive and personalised learning
    experience.
  id: totrans-2631
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种方法涉及教师与ChatGPT之间的互动，以促进学习。这种创新方法利用ChatGPT的能力提供解释、回答问题和附加信息，从而补充教师的作用。这为参与者提供了一个互动和个性化的学习体验。
- en: Finally, the third method, hybrid learning, combines aspects of the traditional
    model and interaction with ChatGPT. Participants benefit from a balanced approach
    that capitalises on the advantages of each method, promoting in-depth understanding
    and practical application of the knowledge acquired.
  id: totrans-2632
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，第三种方法，混合学习，结合了传统模型和与ChatGPT的互动方面。参与者从一种平衡的方法中受益，这种方法利用了每种方法的优势，促进了所获得知识的深入理解和实际应用。
- en: 14.4 Results and discussion
  id: totrans-2633
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 14.4 结果与讨论
- en: The main objective of this study is to determine whether there are statistically
    significant differences between the results obtained by three distinct groups
    of students, each assigned to use one of the three designated methods such as
    group 1 uses the classical method of education (method 1), group 2 uses the educational
    applications of ChatGPT (method 2) and group 3 uses a hybrid model (method 3).
    To do this, the one-way analysis of variance (ANOVA) test was implemented, incorporating
    the null hypothesis that there are no significant differences between the mean
    scores of the groups ([Table 14.1](#ch22.xhtml#t28)).
  id: totrans-2634
  prefs: []
  type: TYPE_NORMAL
  zh: 本研究的首要目标是确定三个不同组别学生使用三种指定方法（例如，第1组使用经典教育方法（方法1），第2组使用ChatGPT的教育应用（方法2），第3组使用混合模型（方法3））所得结果之间是否存在统计学上的显著差异。为此，实施了单因素方差分析（ANOVA）测试，包括零假设，即各组平均分数之间没有显著差异（[表14.1](#ch22.xhtml#t28)）。
- en: '[Table 14.1](#ch22.xhtml#t28b) Analysis of variance (ANOVA)'
  id: totrans-2635
  prefs: []
  type: TYPE_NORMAL
  zh: '[表14.1](#ch22.xhtml#t28b) 方差分析（ANOVA）'
- en: '|  | **Df** | **Sum Sq** | **Mean Sq** | **F Value** | **Pr(>F)** |'
