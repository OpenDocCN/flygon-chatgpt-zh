  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: '**语调定制示例**：'
- en: '****Aca**demi**c ****To**ne**: “****Wr**ite** ****a**** ****fo**rma**l ****res**earc**h
    ****abs**trac**t ****o**n** ****t**he** ****im**pac**t ****o**f** ****cli**mat**e
    ****ch**ang**e ****o**n** ****agri**cultur**e.”'
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: '**学术语调**： “撰写一篇关于气候变化对农业影响的正式研究摘要。”'
