  prefs: []
  type: TYPE_NORMAL
  zh: '**人工智能（AI）在各个行业的兴起正在以我们刚开始理解的方式重新定义工作场所和职业景观。随着像ChatGPT和其他形式的生成式AI语言模型的进步，它们执行以前仅限于人类的任务的能力引发了既兴奋又恐惧的情绪，特别是在就业领域。一方面，新的机会正在开启，可以创造高技能的工作，而另一方面，人们开始担忧那些可能导致某些技能过时的自动化工作。本章深入探讨了AI对劳动力市场的影响，它为未来的工作者提供了机会，并探讨了在自动化和人类就业之间必须保持的微妙平衡**。'
