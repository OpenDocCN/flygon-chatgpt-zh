  zh: 在之前的“披萨”测试中，例如由Convoca的对话设计师和编辑Maaik Groeneveld进行的测试，ChatGPT证明了它在通过聊天机器人订购披萨来模拟客户旅程方面的有效性；甚至能够准确注意到当“客户”忘记添加他们想要的披萨数量或选择了当前“缺货”的配料时。以下是从Groeneveld的Medium文章中摘录的一段关于他经验的文字，标题为《与ChatGPT共度的一个夜晚（2）》，包括开始时的一个错误，捕捉到了在对话设计（2022年）中保持你的提示游戏强大的必要性：
