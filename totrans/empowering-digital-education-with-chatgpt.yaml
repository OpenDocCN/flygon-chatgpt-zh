- en: 16Mediating ChatGPTThe Ethics of Authority in Higher Education
  id: totrans-2885
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 16 中介ChatGPT高等教育中的权威伦理
- en: Brian Sutherland
  id: totrans-2886
  prefs: []
  type: TYPE_NORMAL
  zh: 布莱恩·萨瑟兰
- en: 'DOI: [10.1201/9781032716350-16](http://doi.org/10.1201/9781032716350-16)'
  id: totrans-2887
  prefs: []
  type: TYPE_NORMAL
  zh: 'DOI: [10.1201/9781032716350-16](http://doi.org/10.1201/9781032716350-16)'
- en: 16.1 Introduction
  id: totrans-2888
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 16.1 引言
- en: 16.1.1 Background
  id: totrans-2889
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 16.1.1 背景
- en: ChatGPT redefines the authorship relation between writers, readers, and publishers.
    This chapter reviews the ethical quandaries this poses for authorship in higher
    education, with a view to the challenges and opportunities for instructional design,
    research publishing, and copyright. How can communities of scholarship manage
    ChatGPT’s negative effects, even as ChatGPT assumes a new and useful role in mediating
    scholarly thinking and communication?
  id: totrans-2890
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT重新定义了作者、读者和出版商之间的作者关系。本章回顾了这一变化对高等教育中作者身份提出的伦理困境，并着眼于教学设计、研究出版和版权的挑战与机遇。学术社区如何管理ChatGPT的负面影响，同时ChatGPT在调解学术思考和交流中承担着新的有用角色？
- en: 'The authority of universities, brick and mortar institutions, derives from
    a variety of sources: collections of publications, experts and their networks,
    capital, architecture: lecture, reference, and research lab spaces, and we might
    say – the capture of futures – new systems, methods for using them which are socially
    imbricated, and smart students to imagine and respond to change. Academic processes
    remix these elements into new expressions of value and new systems of authority:
    sciences and technologies, rich texts articulating culture, esthetics, education,
    and moral authority of various kinds – creating what we broadly call reputation.
    The reputational value of higher education institutions exists notably in contrast
    to cash-money, which has the same value whether it was produced by talent and
    hard work, or by theft and criminal enterprise (e.g. tax evasion). Decades, even
    centuries of scholarship and tradition provide a backdrop against which validation
    occurs for knowledge/career-seeking learners and future creative works. That authority
    is challenged by generative artificial intelligence (AI) writing and authorship
    tools like ChatGPT, which are disrupting scholarly development and the new narratives
    of truth and innovation, as well as the authority of the institutions that produced
    them in significant ways. Yet these generative AI tools also provide new opportunities
    and forms of assistance for learners wanting to improve their writing and researchers
    interested in accelerating their lab discoveries. The ethical, right use of ChatGPT
    is a new kind of system to be threaded, where in shifting fundamental processes
    we wish to bring minimal harm to authority and expertise, the academic communities
    that create it, and the publics that rely on it, while realizing significant new
    benefits to efficiency and productivity in education.'
  id: totrans-2891
  prefs: []
  type: TYPE_NORMAL
  zh: 大学的权威，即实体机构的权威，来源于多种来源：出版物集合、专家及其网络、资本、建筑：讲座、参考和研究实验室空间，我们还可以说——对未来的掌控——新的系统、使用它们的方法，这些方法在社会上相互交织，以及聪明的学生去想象和应对变化。学术过程将这些元素重新组合成新的价值表达和新的权威体系：科学和技术、丰富的文本阐述文化、美学、教育和各种类型的道德权威——创造出我们广义上所说的声誉。高等教育机构的声誉价值与现金货币形成鲜明对比，现金货币的价值不因是才华和辛勤工作产生，还是通过盗窃和犯罪企业（例如逃税）产生而有所不同。数十甚至数百年的学术研究和传统为知识/职业寻求者学习和未来创造性作品提供了验证的背景。这种权威受到生成式人工智能（AI）写作和作者工具（如ChatGPT）的挑战，这些工具正在颠覆学术发展、新的真理和创新叙事，以及产生它们的机构的权威。然而，这些生成式AI工具也为想要提高写作能力的学习者以及想要加速实验室发现的科研人员提供了新的机会和形式上的帮助。ChatGPT的道德、正当使用是一种新的系统，我们需要在转变基本过程中将其贯穿其中，我们希望在转变过程中对权威和专业知识、创建它的学术社区以及依赖它的公众造成最小的伤害，同时实现教育效率和生产力方面的重要新收益。
- en: 16.1.2 Chapter Organization
  id: totrans-2892
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 16.1.2 章节组织
- en: 'The rest of the chapter is organized as follows: [Section 16.2](#ch24.xhtml#h1-097)
    reviews the difference between machine and human information systems and some
    of their similar and complementary biases. [Section 16.3](#ch24.xhtml#h1-098)
    lays out the academic integrity problem posed by ChatGPT, while [Section 16.4](#ch24.xhtml#h1-099)
    discusses how the act of composition develops knowledge and judgment and reviews
    historical problems arising from computer–human interaction. Section 16.5 discusses
    consequentialism, utilitarianism, and responsibility for authorship. [Section
    16.6](#ch24.xhtml#h1-101) looks at transparency and the auditing of smart systems
    to determine responsibility. [Section 16.7](#ch24.xhtml#h1-102) reviews the social
    and environmental cost of computing infrastructure while [Section 16.8](#ch24.xhtml#h1-103)
    reviews copyright and intellectual property issues. [Section 16.9](#ch24.xhtml#h1-104)
    looks at how higher education might adapt teaching and learning to tools like
    ChatGPT while [Section 16.10](#ch24.xhtml#h1-105) summarizes the chapter.'
  id: totrans-2893
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的其余部分组织如下：[第16.2节](#ch24.xhtml#h1-097)回顾了机器和人类信息系统之间的差异以及它们的一些相似和互补偏见。[第16.3节](#ch24.xhtml#h1-098)阐述了ChatGPT带来的学术诚信问题，而[第16.4节](#ch24.xhtml#h1-099)讨论了写作行为如何发展知识和判断，并回顾了计算机-人交互产生的历史问题。第16.5节讨论了功利主义、实用主义和作者责任。[第16.6节](#ch24.xhtml#h1-101)探讨了透明度和智能系统的审计以确定责任。[第16.7节](#ch24.xhtml#h1-102)回顾了计算基础设施的社会和环境成本，而[第16.8节](#ch24.xhtml#h1-103)回顾了版权和知识产权问题。[第16.9节](#ch24.xhtml#h1-104)探讨了高等教育如何适应ChatGPT等工具的教学和学习，而[第16.10节](#ch24.xhtml#h1-105)总结了本章内容。
- en: 16.2 Machines and Humans
  id: totrans-2894
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 16.2 机器与人类
- en: The internet as a mass communication system is with some exceptions globally
    accessible via smartphones to any person at any time – making expert information
    broadly available and for learning opportunities at every situated teachable moment.
    Generative AI system large language models (LLMs) are and will be a wonderful
    opportunity for people in need of expedient information to address their problems
    and obtain useful help. It is clear that ChatGPT can produce expert-caliber texts
    and advice, comparable to human accounts, at least in some fields and problem-spaces.
    Generative AI also has a potential to address human shortcomings, where the “division
    of labour between humans and machines is sometimes ... based on what each is good
    at ... ‘comparative cognitive advantage’” ([Ekbia and Nardi 2017](#ch24.xhtml#r759),
    37). Unlike a human being, for example, AI systems can read and store millions
    of texts – addressing both the common working memory deficit and the lack of time
    for professional people to locate and acquire new information. Researchers have
    noted that while LLMs can have troubling biases, amplified from source training
    texts, they might also be easier to change, compared with the biases of humans.
  id: totrans-2895
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网作为一个大众传播系统，在全球范围内，除了一些例外，可以通过智能手机在任何时间对任何人开放——这使得专家信息广泛可用，并在每个情境中的教学时刻提供学习机会。大型语言模型（LLMs）的生成式AI系统对需要迅速信息以解决问题并获得有用帮助的人来说是一个绝佳的机会。很明显，ChatGPT至少在某些领域和问题空间中可以产生相当于人类水平的文本和建议。生成式AI也有潜力解决人类的不足，例如，“人类与机器之间的劳动分工有时是基于……每个擅长什么……‘比较认知优势’”（[Ekbia
    and Nardi 2017](#ch24.xhtml#r759)，37）。例如，与人类不同，AI系统可以阅读和存储数百万文本——解决常见的短期记忆缺陷以及专业人士寻找和获取新信息的时间不足问题。研究人员指出，虽然LLMs可能会出现令人担忧的偏差，这些偏差来自源训练文本，但与人类的偏差相比，它们可能更容易改变。
- en: AI systems might also make better judgments as to rational evidence, having
    achieved remarkable results in benchmarking testing ([Ray 2023](#ch24.xhtml#r792)).
    In medical situations, for example, practitioners can exhibit confirmation bias,
    neglecting evidence that conflicts with a theory, anchoring bias, first impression
    evidence being given undue weight in a diagnosis, or affect heuristic, where the
    subject’s name, appearance or behavior triggers an emotional response ([Doherty
    and Carroll 2020](#ch24.xhtml#r758)). Even while medical diagnosis might be improved
    by recommender systems that reduce systematic bias, there may be significant potential
    for harm from a new tool that generates inaccurate medical advice ([Ali et al.
    2023](#ch24.xhtml#r748)) or reproduces significant bias problems from pre-training
    texts such as gender bias in cardiovascular disease ([FitzGerald and Hurst 2017](#ch24.xhtml#r763),
    [Cohen 2023](#ch24.xhtml#r754)).
  id: totrans-2896
  prefs: []
  type: TYPE_NORMAL
  zh: AI系统在基准测试中取得了显著成果（[Ray 2023](#ch24.xhtml#r792)），可能也会在理性证据的判断上做出更好的判断。例如，在医疗情况下，从业者可能会表现出确认偏差，忽视与理论相冲突的证据，锚定偏差，在诊断中过度重视第一印象的证据，或者情感启发式，其中主体的姓名、外貌或行为会引发情绪反应（[Doherty
    and Carroll 2020](#ch24.xhtml#r758)）。即使推荐系统可以减少系统性偏差，从而改善医疗诊断，但新工具生成不准确医疗建议（[Ali
    et al. 2023](#ch24.xhtml#r748)）或重现预训练文本中的重大偏差问题，如心血管疾病中的性别偏差（[FitzGerald and Hurst
    2017](#ch24.xhtml#r763)，[Cohen 2023](#ch24.xhtml#r754)）可能仍然存在显著的潜在危害。
- en: 16.3 Academic Integrity
  id: totrans-2897
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 16.3 学术诚信
- en: 'The most significant ethical challenge of ChatGPT, perhaps, is to the integrity
    of academic publishing in student assignments. Academic fakes are not new, but
    ChatGPT can make them extremely difficult to detect. The study of fakes and imposters
    in Steven Woolgar’s recently published “The Imposter as Social Theory” offers
    some insight into the problem of faking academic work, passing ChatGPT-generated
    texts off as human-created. First, that fakes, “resembling a real thing but not
    being it”, are a judgment about shared values people covet – particularly with
    respect to social identity. Second, that, “rather than a stable entity, identity
    is always malleable and in flux and needs to be re-invented and stabilised in
    repeated performances among various groups” ([Rosenthal 2021](#ch24.xhtml#r794),
    31). Within research publishing communities other biases have been noted: a focus
    on producing an “interesting, beautiful and short pithy story” ([Derksen 2021](#ch24.xhtml#r757),
    56–57), a lack replication studies which might expose research results as fakes
    ([Derksen 2021](#ch24.xhtml#r757), 66), or problems with the validity and reliability
    of research instruments ([Artino et al. 2018](#ch24.xhtml#r749)). Social constructions
    of new research sometimes fit predefined research paradigms or “plotlines” rather
    than more dynamically adapting to the typical “messiness” of everyday life ([Law
    2004](#ch24.xhtml#r777)). While we might consider “messiness” part of early technology
    infrastructures like ChatGPT, which gives way to normalized, orderly practice
    in late stages, often “infrastructures remain messy after decades or centuries,
    as the user of any transit system from urban subways to international airlines
    can attest” ([Bell and Dourish 2007](#ch24.xhtml#r750), 139). Technology pathways
    also have a way of evolving into thoroughfares, habituating physical and intellectual
    infrastructures as practitioners repeatedly pass the same way by the same means
    and their speed increases.'
  id: totrans-2898
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT最显著的伦理挑战，或许是对学生作业中学术出版完整性的挑战。学术造假并非新鲜事，但ChatGPT可以使它们变得极其难以检测。史蒂文·伍尔加最近出版的《冒充者作为社会理论》一书中对造假和冒名顶替的研究提供了一些对伪造学术工作的见解，即将ChatGPT生成的文本冒充为人类创作的。首先，造假，“看似真实但并非真实”，是对人们所珍视的共享价值的判断——尤其是与社会身份相关。其次，身份，“而不是一个稳定的实体，总是可塑的、不断变化的，需要在各种群体中的重复表演中重新发明和稳定”
    ([Rosenthal 2021](#ch24.xhtml#r794), 31)。在研究出版社区中，其他偏见也被注意到：专注于生产一个“有趣、美丽且简短精炼的故事”
    ([Derksen 2021](#ch24.xhtml#r757), 56–57)，缺乏重复研究，这可能会暴露研究结果为造假 ([Derksen 2021](#ch24.xhtml#r757),
    66)，或者研究工具的有效性和可靠性问题 ([Artino et al. 2018](#ch24.xhtml#r749))。新研究的社交构建有时会符合预定义的研究范式或“情节线”，而不是更动态地适应日常生活的典型“混乱”
    ([Law 2004](#ch24.xhtml#r777))。虽然我们可能会认为“混乱”是早期技术基础设施如ChatGPT的一部分，它在后期阶段让位于规范化的有序实践，但通常“基础设施在几十年或几个世纪后仍然混乱，正如任何从城市地铁到国际航空的交通工具的用户都可以证明的那样”
    ([Bell and Dourish 2007](#ch24.xhtml#r750), 139)。技术路径也有一种演变成为大道的方式，随着从业者反复以相同的方式通过相同的路径，并且速度加快，习惯性地塑造了物理和智力基础设施。
- en: 'Imitating academic texts in professional circles, imposture is in effect another
    kind of identity performance, a staged identity where authenticity and therefore
    authority are granted to a convincing performance of expression, stereotypes,
    or cultural appropriations ([Rosenthal 2021](#ch24.xhtml#r794), 31). Manipulating
    the rules and biases of a system is a complex concept as explored in ([Klenk 2024](#ch24.xhtml#r773)).
    Imitation performances for the sake of manipulation often take a significant amount
    of knowledge of the underlying system. The Turing Test for AI, the genesis for
    conversational agents was ironically called: “The Imitation Game” where machines
    aren’t required to think like humans but pass for them on tasks humans do. Much
    of the success of the imposture depends upon the frame of the performance and
    how much the audience is invested. One thinks, for example, of the convincing
    performance of “Dr Fox”, the actor who gave a successful lecture at a university
    theatre by memorizing the part ([Naftulin and Donnelly 1973](#ch24.xhtml#r784)).
    ChatGPT by way of imitation, like the internet “should be digested with several
    degrees and dimensions of scepticism, requiring confirmation across multiple,
    ideally primary, sources” ([Meyer et al. 2023](#ch24.xhtml#r780)).'
  id: totrans-2899
  prefs: []
  type: TYPE_NORMAL
  zh: 在专业圈中模仿学术文本，欺骗实际上是一种另一种身份表演，是一种舞台身份，其中真实性以及因此权威性被赋予了一种令人信服的表达、刻板印象或文化挪用的表演([Rosenthal
    2021](#ch24.xhtml#r794)，31)。操纵一个系统的规则和偏见是一个复杂的概念，如([Klenk 2024](#ch24.xhtml#r773))所探讨的。为了操纵而进行的模仿表演通常需要大量的对底层系统的了解。AI的图灵测试，对话代理的起源，讽刺地被称为：“模仿游戏”，其中机器不需要像人类那样思考，但需要在人类完成的任务上通过它们。假冒的成功很大程度上取决于表演的框架以及观众投入的程度。例如，人们会想到“Dr
    Fox”的令人信服的表演，这位演员通过记住角色在大学剧院成功地发表了一次演讲([Naftulin 和 Donnelly 1973](#ch24.xhtml#r784))。通过模仿，ChatGPT，就像互联网一样，“应该以几个程度和维度进行怀疑，需要通过多个、最好是原始来源的确认”([Meyer
    等人 2023](#ch24.xhtml#r780))。
- en: 'Fakes can, however, be socially useful: they “teach about difference and similarity
    by being, in their presentation and treatment, not quite what was expected, hoped
    for or wanted” ([Coopmans 2021](#ch24.xhtml#r755), 79). Their detection is part
    of meaning-making in a domain, it’s an opportunity to examine what it is about
    texts and evidence that make for veritable performances, compared with the different,
    the incongruous, the uncanny, or otherness of fake texts. Plagiarism and its detection,
    regardless of generative AI, has long been an interest for higher education where'
  id: totrans-2900
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，假冒在社会上可能是有用的：它们“通过其呈现和处理方式，不完全符合预期、希望或想要的内容，来教授差异和相似性”([Coopmans 2021](#ch24.xhtml#r755)，79)。在某个领域，它们的检测是意义构建的一部分，它是一个检查文本和证据中哪些因素使得真正的表演与不同、不协调、怪异或其他假冒文本的异质性的机会。无论是否是生成式AI，剽窃及其检测一直是高等教育领域长期感兴趣的话题。
- en: the limited capabilities of anti-plagiarism programs to verify the issue of
    verifying the reliable use of sources, other publications, and source materials
    by a student while writing a diploma thesis, be it a bachelor’s, master’s, doctoral,
    or habilitation thesis, presents a significant challenge.
  id: totrans-2901
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 防止剽窃程序在学生撰写学士、硕士、博士或博士后论文时验证可靠使用来源、其他出版物和原始材料的问题，这提出了一个重大的挑战。
- en: ([Huallpa et al. 2023](#ch24.xhtml#r771), 107)
  id: totrans-2902
  prefs: []
  type: TYPE_NORMAL
  zh: ([Huallpa 等人 2023](#ch24.xhtml#r771)，107)
- en: 'The power of fakes, perhaps – arises from their strong ability to define the
    authorities of canons: who wrote the important original works, who is writing
    new important original works, and who validates new student publications as true
    and original. Yet in this case, by “passing the text through an automated ‘paraphrasing’
    system which changes form but retains its meaning” ([Knott et al. 2023](#ch24.xhtml#r774))
    generative AI text systems continue to resist detection, at least at the time
    of writing, by commercial tools which advertise significant success but do not
    measure up in testing ([Perkins et al. 2023](#ch24.xhtml#r789)).'
  id: totrans-2903
  prefs: []
  type: TYPE_NORMAL
  zh: 假冒的力量，或许——源于它们强大的定义经典权威的能力：谁写了重要的原创作品，谁正在创作新的重要原创作品，以及谁验证新的学生出版物为真实和原创。然而，在这种情况下，通过“将文本通过一个自动的‘改写’系统，改变形式但保留其意义”([Knott
    等人 2023](#ch24.xhtml#r774))，生成式AI文本系统继续抵抗检测，至少在撰写本文时，通过商业工具进行检测，这些工具宣称取得了显著的成功，但在测试中并未达到预期效果([Perkins
    等人 2023](#ch24.xhtml#r789))。
- en: 16.4 Refining Critical Judgment
  id: totrans-2904
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 16.4 细化批判性判断
- en: 'A further ethical problem is that tools like ChatGPT in removing the struggle
    to form and express critical arguments that reflect studied texts impede learning
    and development: too much help limits independence. In learning theory, the “borrowing
    and reorganising principle”, for example, identifies imitation as a way higher
    education promotes learning by mirroring: doing, speaking, and writing durable
    intellectual artifacts, so writing at the course level or knowing at the discipline
    level. Establishing relations and canons from concepts is a natural human activity
    and the outcome from the time invested in scholarship. In this work “humans imitate
    other people, listen to what they say and read what they write”, even down to
    the individual “mirror neuron” cell level ([Sweller and Sweller 2006](#ch24.xhtml#r799),
    438) with socially constructed worlds of thought, performances, and (written)
    artifacts. A common assignment in higher education, for example, involves reading
    an article or a chapter and engaging with what was expressed by answering questions,
    writing a summary, a critical evaluation, or comparing it to another text. If
    ChatGPT is used to produce this kind of work instead, it creates a significant
    lack of engagement with the material and a deficit of understanding that would
    show subsequently in formal testing, live questioning, and real-life application,
    where summative judgments of learning occur.'
  id: totrans-2905
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个伦理问题在于，像ChatGPT这样的工具在移除形成和表达反映学习文本的批判性论点所必需的斗争时，阻碍了学习和发展：过多的帮助限制了独立性。在学习教育理论中，“借鉴与重组原则”例如，将模仿视为高等教育通过镜像促进学习的方式：做、说和写持久的智力作品，所以是课程层面的写作或学科层面的知识。从概念中建立关系和规范是一种自然的人类活动，是投入学术研究时间的成果。在这项工作中，“人类模仿他人，倾听他们所说的话，阅读他们所写的内容”，甚至到个体“镜像神经元”细胞层面([Sweller
    and Sweller 2006](#ch24.xhtml#r799), 438)，在社会构建的思想、表现和（书面）作品的世界中。高等教育中的一项常见作业，例如，涉及阅读一篇文章或一章内容，并通过回答问题、撰写摘要、进行批判性评估或将其与另一文本进行比较来参与其中。如果使用ChatGPT来产生这类工作，它将导致对材料的参与度显著降低，以及理解上的不足，这在随后的正式测试、现场提问和实际应用中会表现出来，在这些场合中，学习的总结性判断会发生。
- en: 'More fundamentally, ChatGPT redefines the problem of academic authorship. In
    looking at this problem of ethics it is useful to reflect on other narratives
    of technology. The technological systems we employ to alleviate social problems
    have intrinsic ethical implications. Ursula Franklin, the Canadian engineer and
    science and technology studies scholar pointed this out in her discussion of police
    radar traps: whereas speed limit signs or “going too fast” signs call attention
    to drivers about their behavior and the social problem of road safety, radar traps,
    photo-radar and “fuzzbusters” (driver radar detection systems) translate or redefine
    the problem to a game of catch and evade. In this case “the mere presence of a
    technological approach to a social problem ... redefines the problem to the detriment
    of the total situation” ([Franklin 1989](#ch24.xhtml#r766)). I raise this example
    in the sense that ChatGPT’s capabilities might have simply been defined differently:
    for example to require more investment in effort and analysis and engagement on
    the part of the user in generating texts of significant length. ChatGPT could
    also have been made to produce shorter, guiding-type texts that include critical
    questions to consider, or require a series of composition-oriented process questions,
    instead of rendering complete texts, assignments, computer code, and instructions.
    A fundamental principle of teaching and learning is we learn as much from the
    process as from the answer. Put another way: “skills atrophy when automation takes
    over” ([Elish 2019](#ch24.xhtml#r760), 50). Both the ChatGPT tool and higher education
    assignments might therefore be altered to support the development of a wider range
    of skills, helping instructors with “productive engagement with students over
    playing detective” ([Koi 2023](#ch24.xhtml#r775)).'
  id: totrans-2906
  prefs: []
  type: TYPE_NORMAL
  zh: 更根本的是，ChatGPT重新定义了学术著作权的问题。在审视这个伦理问题时，反思其他关于技术的叙述是有用的。我们用来缓解社会问题的技术系统具有内在的伦理含义。加拿大工程师和科学技术研究学者乌尔苏拉·富兰克林在她的关于警察雷达陷阱的讨论中指出这一点：速度限制标志或“超速”标志提醒驾驶员注意他们的行为和道路安全的社会问题，而雷达陷阱、摄影雷达和“模糊猎人”（驾驶员雷达探测系统）将问题转化为追逐和逃避的游戏。在这种情况下，“仅仅存在一种技术方法来解决社会问题……将问题重新定义，对整体情况不利”
    ([富兰克林 1989](#ch24.xhtml#r766))。我提出这个例子是为了说明ChatGPT的能力可能被简单地定义为不同：例如，要求用户在生成较长的文本时投入更多的努力、分析和参与。ChatGPT也可以被设计成生产更短的、指导性的文本，包括需要考虑的关键问题，或者要求一系列以写作为导向的过程问题，而不是生成完整的文本、作业、计算机代码和指令。教学和学习的根本原则是我们从过程中学到的知识和从答案中学到的一样多。换句话说：“当自动化接管时，技能就会退化”
    ([Elish 2019](#ch24.xhtml#r760), 50)。因此，ChatGPT工具和高等教育作业可能因此被调整，以支持更广泛技能的发展，帮助教师与学生的“生产性互动”超过“侦探式互动”([Koi
    2023](#ch24.xhtml#r775))。
- en: 'Ethics with respect to computing control and automation have previously been
    explored as science and technology scholars grappled with the effects of the widespread
    application of computer automation and its moral psychology implications in different
    social use-contexts or frames, under names like “responsible computing” or “appropriate
    technology”. These efforts in computing were a “desire to know the ‘right’ answer
    to ethical problems that arise, where ‘right’ is understood to mean something
    like ‘philosophically justified or grounded’” ([Friedman and Kahn 1992](#ch24.xhtml#r767),
    12). Friedman’s work suggests two distortions typically occur from computing:
    a first, where computers reduce a human being’s sense of their own moral agency,
    and a second, where a computation system “masquerades as an agent by projecting
    intentions, desires and volition”. The second distortion is apropos of misappropriation
    of writing products and academic integrity, but this distortion also occurs spontaneously
    as users anthropomorphize or attribute human agency to systems that substitute
    for tasks people normally do, like playing tic tac toe, chess, or holding a conversation,
    “chatting” like ChatGPT. Designing a system to replace what people normally create
    and do across a broad range of formats and industries therefore presents a fundamental
    confusion of roles – where imitations and substitutions are likely to occur, at
    least until a new network of relations stabilizes. ChatGPT as a generative AI
    system might have been conceived as something other than an entity that chats
    back with answers to questions, something people have been doing with other *people*
    since the beginning of computing networks. What could be the teaching power of
    a ChatGPT system that only responds with Socratic guiding questions, increasing
    confidence and stimulating new forms of writing by guided student reflection,
    for example.'
  id: totrans-2907
  prefs: []
  type: TYPE_NORMAL
  zh: 在计算控制与自动化方面的伦理问题之前已被探讨，当时科学和技术学者们在与计算机自动化广泛应用的效应及其在不同社会使用情境或框架中的道德心理学含义进行斗争时，使用了诸如“负责任计算”或“适当技术”等名称。这些计算领域的努力源于对“正确”答案的渴望，这里的“正确”被理解为类似于“哲学上合理或基于事实”的东西
    ([Friedman and Kahn 1992](#ch24.xhtml#r767), 12)。弗里德曼的工作表明，计算通常会导致两种扭曲：第一种是计算机降低了人类对自己道德能动性的感知，第二种是一个计算系统“通过投射意图、欲望和意志，伪装成代理”。第二种扭曲与写作产品的滥用和学术诚信有关，但这种扭曲也自发地发生，因为用户将人类能动性归因于替代人们通常完成的任务（如玩井字棋、下棋或进行对话，“聊天”如ChatGPT）的系统。因此，设计一个系统来替代人们在广泛格式和行业中通常创造和做的事情，因此会带来角色上的基本混淆——在模仿和替代可能发生的地方，至少直到新的关系网络稳定下来。作为一个生成式AI系统，ChatGPT可能被构想为不仅仅是回答问题的实体，这是人们从计算网络开始以来一直与其他*人*做的事情。那么，一个仅以苏格拉底式引导问题回应的ChatGPT系统，通过引导学生的反思来增强信心并激发新的写作形式，比如，它可能具有什么样的教学力量呢？
- en: 16.5 Accountability for Authorship
  id: totrans-2908
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 16.5 著作权责任
- en: Assigning authority to ChatGPT is a problem in the sense that responsibility
    is implied for the ideas expressed in writing a text, what philosophers call consequentialism
    – authors are bound to consider the social effects of their words, employing common
    moral intuition. While “words” are commonly considered a less harmful form of
    disagreement compared with physical engagement, Galileo’s treatise on heliocentrism
    was – rather than a straightforward exposition of the evidence of his discovery
    – necessarily a dialogue between characters about alternate theories, approved
    for publication under a subtrifugal title “Dialogue on the Ebb and Flow of the
    Sea” which ultimately resulted in Galileo being convicted of heresy. Texts are
    not neutral and words are bulldozers. Extrapolating ethical issues to accountability
    for one’s agency, Helen Nissenbaum suggests in the future “we are apt to discover
    a disconcerting array of computers in use for which no one is answerable” ([Nissenbaum
    1996](#ch24.xhtml#r785), 32). Her work also refers to the “illusion of computers
    as moral agents capable of assuming responsibility” ([Nissenbaum 1996](#ch24.xhtml#r785),
    35). So, in granting generative AI writing systems like ChatGPT authorship, we
    imply a similar responsibility or moral authority of expertise situated within
    peer-reviewed communities of speaking and writing, in some cases even granting
    a “research perspective” to ChatGPT ([Zhavoronkov 2022](#ch24.xhtml#r805)). For
    this reason, *Nature* and *Science* academic journals have formally stated that
    ChatGPT cannot be named as co-author ([Meyer et al. 2023](#ch24.xhtml#r780)).
    Generative AI systems can’t assume responsibility, be held accountable, or retract
    their texts.
  id: totrans-2909
  prefs: []
  type: TYPE_NORMAL
  zh: 将权限赋予ChatGPT是一个问题，因为在撰写文本时表达的观点隐含着责任，哲学家称之为后果主义——作者有责任考虑他们话语的社会影响，运用普遍的道德直觉。虽然“话语”通常被认为比身体接触更无害的分歧形式，但伽利略关于日心说的论文——而不是他发现的证据的直接陈述——必然是关于替代理论的角色的对话，以一个副标题“关于海潮涨落的对话”获得出版批准，最终导致伽利略被定罪为异端。文本并非中立，话语是推土机。海伦·尼森鲍姆将道德问题外推到对自己行为的问责，她建议未来“我们可能会发现一些令人不安的计算机使用情况，对于这些情况没有人负责”([尼森鲍姆
    1996](#ch24.xhtml#r785)，32)。她的工作还提到了“计算机作为道德代理人的错觉，能够承担责任”([尼森鲍姆 1996](#ch24.xhtml#r785)，35)。因此，在赋予ChatGPT等生成式AI写作系统作者身份时，我们暗示了类似的职责或道德权威，这种权威位于同行评审的演讲和写作社区中，在某些情况下甚至授予ChatGPT“研究视角”([扎沃罗诺科夫
    2022](#ch24.xhtml#r805))。因此，《自然》和《科学》学术期刊正式声明，ChatGPT不能被列为共同作者([梅耶等人 2023](#ch24.xhtml#r780))。生成式AI系统不能承担责任，不能被问责，也不能撤回他们的文本。
- en: Complex or “many hands” systems in the past have exhibited significant harm
    involving control and responsibility. Some famous, fatal harms include Atomic
    Energy of Canada Limited’s Therac-25 radiation therapy device, smart missile guidance
    systems ([Friedman and Kahn 1992](#ch24.xhtml#r767)), Challenger space shuttle
    O-rings ([Nissenbaum 1996](#ch24.xhtml#r785)), Three Mile Island, and the crash
    of Air France Flight 447 ([Elish 2019](#ch24.xhtml#r760)). That there will be
    harms from ChatGPT seems likely, and once the possible harms from ChatGPT are
    better understood, technology actor–network relations can have an opportunity
    to reconfigure and normalize around better accountability and prevention. This
    process, however, may take a significant time and given the rapid adoption of
    the tool, it would be better to avoid widespread use without better guardrails.
    Notwithstanding the harms we are aware of, enthusiastic publics seem interested
    in “jailbreaking” ChatGPT ([Shaffer Shane 2023](#ch24.xhtml#r796)).
  id: totrans-2910
  prefs: []
  type: TYPE_NORMAL
  zh: 过去复杂或“多手”的系统在控制和责任方面表现出显著的危害。一些著名的、致命的危害包括加拿大原子能有限公司的Therac-25辐射治疗设备、智能导弹制导系统([弗里德曼和卡恩
    1992](#ch24.xhtml#r767))、挑战者号航天飞机的O形环([尼森鲍姆 1996](#ch24.xhtml#r785))、三里岛事件，以及法国航空447航班坠毁([埃利希
    2019](#ch24.xhtml#r760))。ChatGPT可能造成危害似乎很可能会发生，一旦ChatGPT可能造成的危害得到更好的理解，技术行动者-网络关系就有机会重新配置和正常化，围绕更好的问责和预防。然而，这个过程可能需要相当长的时间，鉴于该工具的快速采用，最好在没有更好的安全措施的情况下避免其广泛使用。尽管我们意识到的危害，热情的公众似乎对“越狱”ChatGPT([沙弗·肖恩
    2023](#ch24.xhtml#r796))感兴趣。
- en: 'In the nineteenth century, there was a rash of steam boiler explosions: they
    occurred in the thousands until social mediation appeared in the form of government
    regulations around construction and inspection: “ASME Boiler and Pressure Vessel
    Code (B&PVC) was conceived in 1911 out of a need to protect the public” ([Canonico
    2020](#ch24.xhtml#r753)). Nissenbaum similarly refers to the nineteenth-century
    “caisson problem” where bridge construction workers working underground would
    get “the bends” by depressurizing too quickly after a workday by taking the elevator
    rather than the stairs, observing “today bridge building companies are accountable
    for preventing cases of decompression sickness” ([Nissenbaum 1996](#ch24.xhtml#r785),
    35). As many articles have pointed out, it’s essential that authority not be relegated
    to ChatGPT in critical domains such as medicine as there is a significant potential
    for direct and fatal harm from mistakes. Extraordinary caution is required, perhaps
    even state authority in the form of new legislation. The corollary to so many
    LLMs having been created in California is perhaps, that they may be in a great
    position to pass guiding legislation, as has occurred in environmental regulation,
    a phenomenon known as the “California effect” ([Vogel 1995](#ch24.xhtml#r801)).'
  id: totrans-2911
  prefs: []
  type: TYPE_NORMAL
  zh: 在19世纪，发生了大量的蒸汽锅炉爆炸：它们成千上万地发生，直到社会调解以政府关于建设和检查的法规形式出现：1911年，“美国机械工程师协会锅炉和压力容器规范（B&PVC）”的构想源于保护公众的需要（[Canonico
    2020](#ch24.xhtml#r753)）。尼森鲍姆同样提到了19世纪的“沉箱问题”，其中地下工作的桥梁建设工人，在一天的工作后通过乘坐电梯而不是楼梯快速减压，会患上“减压病”，他指出：“如今，桥梁建筑公司有责任防止减压病的发生”（[Nissenbaum
    1996](#ch24.xhtml#r785)，第35页）。正如许多文章所指出的，在诸如医学等关键领域，权力不应被委派给ChatGPT，因为错误可能直接导致严重的致命伤害。需要采取非凡的谨慎，可能甚至需要以新立法形式的国家权力。在加利福尼亚州创建了如此多的LLM（大型语言模型）的结果可能是，它们可能处于通过指导性立法的绝佳位置，正如在环境监管中发生的那样，这种现象被称为“加州效应”（[Vogel
    1995](#ch24.xhtml#r801)）。
- en: 'Ethics analyses around the benefits and risks of new technology are often guided
    by utilitarianism, the principle of designing systems for the greatest benefit
    to the most people (benefit measured more cynically as greatest profit – see Ralph
    Nader’s *Unsafe at Any Speed*). There are significant benefits to systems like
    ChatGPT. But like democracy, the *rule* of the most people can lead to a tyranny
    of the majority, where minority groups suffer (Mill 1869). As a somewhat unrestrained
    communications system, the internet reflects positive pro-social and feel-good
    viral videos but also a range of ugly biases and anti-social behavior, clusters
    of personality traits associated with online bullying or academic cheating which
    have earned names like “the dark tetrad” from psychologists ([Greitemeyer and
    Kastenmüller 2023](#ch24.xhtml#r769)). We cannot always rely on the inherent goodness
    of people, or their willingness to exercise positive agency defined in this case
    as supporting pro-social behavior or calling out the alternative. Mill refers
    to people’s unerring self-interest in relation to choices, which is a popular
    conception of decision-making among economists. That being said, the purveyors
    of ChatGPT have gone some way to challenge the bias of pretraining texts, helping
    the system to recognize immoral or illegal questions and respond with prosocial
    responses through “reinforcement learning from human feedback (RLHF) techniques
    (designed) to enhance the model’s safety” ([Wu 2023](#ch24.xhtml#r803)). Unfortunately,
    these training techniques have in the past employed human workers under exploitive
    labor practices ([Nyabola 2023](#ch24.xhtml#r786); [Marres 2024,](#ch24.xhtml#r779)
    357), which challenges their ethical remediation. Many authors are calling for
    larger, multi-stakeholder panels to review all aspects of the system ([Stahl and
    Eke 2023](#ch24.xhtml#r797)), particularly as the implications for writing by
    means of generative AI are so far-ranging. For example, and of significant interest
    to higher education students: it is claimed that most job applications are now
    read first and only by AI systems; only a fraction are passed on to be read by
    humans ([Rhea et al. 2022](#ch24.xhtml#r793)), which likely has implications for
    writing them.'
  id: totrans-2912
  prefs: []
  type: TYPE_NORMAL
  zh: 围绕新技术利益和风险的伦理分析通常受功利主义指导，即设计系统以使大多数人获得最大利益的原则（这种利益被更悲观地视为最大利润——参见拉尔夫·纳达尔的《任何速度下都不安全》）。像ChatGPT这样的系统具有显著的好处。但就像民主一样，多数人的“规则”可能导致多数人的暴政，使少数群体遭受苦难（密尔，1869年）。作为一个相对不受约束的通讯系统，互联网反映了积极的亲社会和令人愉快的病毒视频，但也存在一系列丑陋的偏见和反社会行为，这些行为与在线欺凌或学术作弊相关联，心理学家将其命名为“黑暗四重奏”（Greitemeyer和Kastenmüller
    2023）。我们不能总是依赖人们的内在善良，或他们愿意行使正面的能动性，在本例中定义为支持亲社会行为或指出替代方案。密尔提到人们在选择方面的不可错的自私，这是经济学家中流行的决策观念。话虽如此，ChatGPT的推广者已经采取了一些措施来挑战预训练文本的偏见，帮助系统通过“从人类反馈中强化学习（RLHF）技术（设计）来增强模型的安全性”来识别不道德或非法问题，并以亲社会的方式作出回应（Wu
    2023）。不幸的是，这些训练技术过去曾使用在剥削性劳动实践中的人力工作者（Nyabola 2023；Marres 2024，357），这对其伦理补救提出了挑战。许多作者呼吁成立更大、多利益相关者的小组来审查系统的所有方面（Stahl和Eke
    2023），尤其是当通过生成式AI写作的影响如此广泛时。例如，对高等教育学生来说，一个值得关注的问题是：据称，现在大多数求职申请首先且仅由AI系统阅读；只有一小部分被转交给人类阅读（Rhea等人，2022），这可能会对撰写求职申请产生影响。
- en: 16.6 Mediating with Transparency and Auditing
  id: totrans-2913
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 16.6 通过透明度和审计进行调解
- en: 'Looking at a past technology that required ethical mediation, police body-worn
    cameras in combination with citizen smartphone cameras, the system is beginning
    to stabilize around greater transparency (and less privacy) in the behavior of
    both law enforcement and the public, from which various administration reforms
    have been proposed ([Wright et al. 2023](#ch24.xhtml#r802)). The examination of
    generative AI composition, from many stakeholders – from which a network of optimizing
    relations around authority might re-stabilize, normalized as expectations around
    their use – is however inhibited by the black box character of ChatGPT and the
    methods by which models are made: “language representations are induced by gradient
    optimization, resulting in a black box system which is hard to interpret” ([Fitz
    2023](#ch24.xhtml#r762), 1). Writing on algorithms and their social influence
    Frank Pasquale entreats “important decisions be made intelligible ... to independent
    reviewers and that over the years and the decades to come, they be made part of
    a public record available to us all” ([Pasquale 2015](#ch24.xhtml#r787), 218).
    While generative AI recommender systems may cause harm by skipping otherwise qualified
    job candidates, self-driving cars: physical objects at significant size and speed
    controlled by AI have perhaps a more tangible potential to do harm, with a pedestrian
    fatality having occurred in 2018\. For this reason, the IEEE P7001 working group
    proposes specific standards for the transparency of autonomous systems in relation
    to safety ([IEEE 2022](#ch24.xhtml#r771)) which we might demand generative AI
    authoring systems like ChatGPT follow. Their process identifies different levels
    of access for this process: safety certification agencies, accident investigators,
    lawyers or expert witnesses, and the wider society, thus preserving privacy and
    intellectual property while making the process accountable. A similar transparency
    system to make conversational agents like ChatGPT available for auditing would
    be singularly helpful, particularly since harms aren’t limited to direct participants.
    Just as traffic pile ups can result from single collisions, the fundamental human
    need to communicate and amplify interesting claims of all kinds, even credible
    deepfake ones, to “pile on” – can amplify social harms.'
  id: totrans-2914
  prefs: []
  type: TYPE_NORMAL
  zh: 观察到过去需要伦理调解的技术，即警察佩戴的摄像头与市民智能手机摄像头的结合，该系统正开始围绕执法部门和公众行为的更大透明度（以及更少的隐私）稳定下来，从而提出了各种行政改革建议（[Wright
    等人 2023](#ch24.xhtml#r802)）。然而，由于 ChatGPT 的黑盒特性和构建模型的方法，对生成式 AI 文本创作的审查受到阻碍，这些方法可能会重新稳定围绕权威的优化关系，并被视为对其使用的预期——即“通过梯度优化诱导语言表示，从而形成一个难以解释的黑盒系统”
    ([Fitz 2023](#ch24.xhtml#r762)，1）。在关于算法及其社会影响的著作中，Frank Pasquale 呼吁“重要的决策应变得可理解……对独立审查员而言，并且在未来数年甚至数十年中，它们应成为我们所有人都能查阅的公共记录的一部分”
    ([Pasquale 2015](#ch24.xhtml#r787)，218)。虽然生成式 AI 推荐系统可能会通过跳过其他合格的求职者造成伤害，但自动驾驶汽车：由
    AI 控制的具有显著大小和速度的物理对象，可能具有更大的潜在危害性，2018 年发生了一起行人死亡事故。因此，IEEE P7001 工作组提出了关于自主系统安全性的透明度具体标准
    ([IEEE 2022](#ch24.xhtml#r771))，我们可能要求像 ChatGPT 这样的生成式 AI 编写系统遵循这些标准。他们的流程确定了这一过程的不同访问级别：安全认证机构、事故调查员、律师或专家证人，以及更广泛的社会，从而在保护隐私和知识产权的同时使过程具有问责性。一个类似的透明度系统，使像
    ChatGPT 这样的对话代理可供审计，将特别有帮助，尤其是由于危害并不局限于直接参与者。正如交通拥堵可能由单一碰撞引起一样，人类基本的需求是沟通和放大各种有趣的主张，即使是可信的深度伪造主张，以“叠加”——这可能会放大社会危害。
- en: Aside from human feedback and auditing in the process of establishing models,
    a further improvement related to relevance and accuracy in ChatGPT might occur
    with a more discriminating selection of training data and the design of interface
    tools. For example, language models might be made smaller and more focused, “pursuing
    research direction while mitigating its associated risks” ([Bender et al. 2021](#ch24.xhtml#r751),
    619) where the training data is more specifically related to the type of questions,
    and toward “less general systems” ([Ratto 2024](#ch24.xhtml#r791)) where the mismatch
    of context might lead to misapplication and social harm. Targeted research and
    development related to LLMs would also address bias problems associated with regionally
    designed training contexts, canons of good and bad actors, and assessment of expert
    and non-expert accounts as providers of ground truths. Luo et al. (2022), for
    example, developed a medical recommender system BioGPT, where the pretraining
    occurred on biomedical literature, resulting in specific responses reflective
    of an expert questioner’s perspective, with better accuracy. This focused approach
    echoes early development with IBM Watson, which was trained on diagnosis problems
    in the New England Journal of Medicine ([Upbin 2011](#ch24.xhtml#r800)). We might
    consider similarly the benefits of a generative AI chatbot with a specific teaching,
    coaching, or counseling sensibility, as per ([Brown et al. 2023](#ch24.xhtml#r752)).
  id: totrans-2915
  prefs: []
  type: TYPE_NORMAL
  zh: 除了在建立模型过程中的人类反馈和审计之外，ChatGPT在相关性和准确性方面的进一步改进可能发生在对训练数据的选择更加挑剔以及界面工具的设计上。例如，语言模型可能被做得更小、更专注，“在追求研究方向的同时减轻其相关风险”([本德等人
    2021](#ch24.xhtml#r751)，619)，其中训练数据与问题的类型更具体相关，以及向“更少通用系统”([拉托 2024](#ch24.xhtml#r791))发展，其中语境的不匹配可能导致误用和社会伤害。与LLMs相关的有针对性的研究和开发也将解决与地区设计训练环境、善恶行为者的规范以及专家和非专家作为基本真理提供者的评估相关的偏见问题。例如，罗等（2022）开发了一个医学推荐系统BioGPT，其预训练是在生物医学文献上进行的，从而产生了反映专家提问者视角的特定响应，提高了准确性。这种专注的方法与IBM
    Watson的早期发展相呼应，它是在《新英格兰医学杂志》的诊断问题上进行训练的([阿普宾 2011](#ch24.xhtml#r800))。我们可能还会考虑具有特定教学、辅导或咨询敏感性的生成式AI聊天机器人的好处，正如([布朗等人
    2023](#ch24.xhtml#r752))所提到的。
- en: It’s also important to reflect on how much of what we actually believe as scholarly
    communities of practice is socially constructed and alters over time, particularly
    in scientific communities ([Kuhn 1962](#ch24.xhtml#r776), [Fleck 1979](#ch24.xhtml#r764)).
    Are claims that are untrue in contemporary professional literature as easy to
    detect in ChatGPT, such as specious claims about vaccines? How does knowledge
    representation hold up in AI systems when the sources for the knowledge lack transparency
    and present unsubstantiated claims or questionable evidence, “unreliable results”
    ([Derksen 2021](#ch24.xhtml#r757), 66)? Just as scholarly work challenges cultural
    hegemonies of various kinds in the real world, does generative AI modeling have
    a role in researching and articulating shifting “ground truths”? Perhaps helping
    people ask questions about their assumptions is a useful task for generative AI
    chatbots, just like we are starting to evaluate systematically and at scale with
    LLMs.
  id: totrans-2916
  prefs: []
  type: TYPE_NORMAL
  zh: 反思我们作为学术实践社群所真正相信的内容，有多少是社会构建的，并且随着时间的推移而改变，尤其是在科学社群中（[库恩 1962](#ch24.xhtml#r776)，[弗莱克
    1979](#ch24.xhtml#r764)）。在当代专业文献中不真实的说法，如关于疫苗的虚假说法，在ChatGPT中是否同样容易检测到？当知识的来源缺乏透明度，并提出未经证实的说法或可疑的证据，“不可靠的结果”时（[德克森
    2021](#ch24.xhtml#r757)，66），知识在AI系统中的表示如何维持？正如学术工作在现实世界中挑战各种类型的文化霸权一样，生成式AI建模在研究和阐述不断变化的“基本真理”中是否扮演着角色？也许帮助人们质疑他们的假设是生成式AI聊天机器人的一项有用任务，就像我们开始用LLMs系统地、大规模地评估一样。
- en: 16.7 Ethical Resource Handling
  id: totrans-2917
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 16.7 伦理资源处理
- en: Ethically speaking, producing these new LLMs that reflect contemporary or specialized
    knowledge-communities is a problematic cost–benefit question. The trouble occurs
    principally with the societal use of large-scale computing resources. The financial
    investment in creating ChatGPT is estimated at around $12 million ([Wu et al.
    2023](#ch24.xhtml#r803)). We are also starting to recognize there are further
    “externalised” costs to the environment from manufacturing and discarding physical
    computers in significant quantities that must be accounted for. The resource cost
    of physical machines or hardware is called the embodied energy or “emergy” of
    computing infrastructure and it is the more significant social cost compared with
    the large infrastructure investment in software development, buildings, electricity,
    cooling water, and time required during *use* ([Sutherland 2022](#ch24.xhtml#r798)).
    For example, the electricity to make the ChatGPT 3 foundation model was about
    1287 MWh of energy-computation (Patterson et al. 2021). The ChatGPT 4 model was
    estimated to have used 6% of the district’s water supply in West Des Moines, Iowa
    to cool the data center ([Crawford 2024](#ch24.xhtml#r756)). Depending on how
    the electricity is generated, which is a regionally implicated choice, (coal or
    gas burning vs. clean hydroelectric), new AI models represent also potentially
    a significant increase in energy consumption, air pollution, and carbon emissions.
    So the cost–benefit problem is, perhaps, that new and more specialized models
    are necessary to improve the generative AI systems for accuracy, bias, and contemporary
    thinking, yet these models have a significant socially imbricated value-costs
    in terms of financial investment, human health, and the earth’s carrying capacity.
  id: totrans-2918
  prefs: []
  type: TYPE_NORMAL
  zh: 从伦理的角度来看，生产这些反映当代或特定知识群体的新大型语言模型是一个有问题的成本效益问题。问题主要出在大型计算资源的社会使用上。创建ChatGPT的财务投资估计约为1200万美元（[Wu等人，2023](#ch24.xhtml#r803)）。我们也开始认识到，从制造和大量丢弃物理计算机所带来的环境“外部化”成本也必须予以考虑。物理机器或硬件的资源成本被称为计算基础设施的“蕴含能量”或“emergy”，与软件开发、建筑、电力、冷却水和使用期间所需时间的大规模基础设施投资相比，这是更显著的社会成本（[Sutherland
    2022](#ch24.xhtml#r798)）。例如，ChatGPT 3基础模型所需的电力约为1287兆瓦时（Patterson等人，2021）。ChatGPT
    4模型估计使用了爱荷华州西得梅因地区6%的供水来冷却数据中心（[Crawford 2024](#ch24.xhtml#r756)）。根据电力产生的地区性选择（煤炭或天然气燃烧与清洁水力发电），新的AI模型也可能导致能源消耗、空气污染和碳排放的显著增加。因此，成本效益问题可能是，为了提高生成式AI系统的准确性、偏差和当代思维，可能需要新的和更专业的模型，但这些模型在财务投资、人类健康和地球承载能力方面具有显著的社会隐含价值成本。
- en: 'While not directly related to authority, in the sense higher education research
    spaces routinely require ethical review prior to approval: ethical accounting
    practices for research are normalized, more comprehensive methods of accounting
    for large-scale computation are most likely to be created in these spaces, methods
    that might inform and be replicated in other sectors faced with cost–benefit choices
    – where lowest cost isn’t a viable option in a world on fire from climate change.
    Widely sharing products would also tend to offset the social investment, to eliminate
    duplication of effort around improvement.'
  id: totrans-2919
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然与权威性没有直接关系，但从高等教育的科研空间通常在批准前需要进行伦理审查的角度来看：研究中的伦理会计实践已经规范化，在这些空间中很可能创造出更全面的大规模计算会计方法，这些方法可能会在其他面临成本效益选择的部门中提供信息和复制——在一个因气候变化而燃烧的世界里，最低成本不是一个可行的选项。广泛分享产品也倾向于抵消社会投资，消除围绕改进的重复劳动。
- en: 16.8 Copyright and Intellectual Property
  id: totrans-2920
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 16.8 版权与知识产权
- en: 'Ursula Franklin wrote of “indivisible benefit”. Food production, water rights,
    land use, health and safety, civil defense, and even traffic flow are regulated
    by governments for a variety of reasons: they are essential to everyone and raise
    up a “commons” of relations where people enjoy organized liberties and securities
    of fundamental kinds. Capitalism might be said to be the degree or expression
    of how many sectors of society we can own personally (defined by enclosure) versus
    what we manage collectively in groups or share for the common, indivisible benefit.
    The authority of copyright and intellectual property is something of a hybrid
    concept: it is regulated by the state but it supports ownership where normalized
    standards around genres get further defined in disciplinary communities, legislation,
    and case law. ChatGPT and future generative AI authorship tools in their ability
    to produce written texts comparable to professional writers, doing things humans
    do with significant work, undermines the work of these communities and is an emergent
    ethical problem.'
  id: totrans-2921
  prefs: []
  type: TYPE_NORMAL
  zh: 乌尔苏拉·弗兰克林提到了“不可分割的利益”。食品生产、水权、土地利用、健康与安全、民防，甚至交通流量，都是出于各种原因由政府监管的：它们对每个人都是必不可少的，并建立了一个“共有”的关系体系，人们在那里享受着有组织的自由和基本的安全保障。资本主义可以说是一个程度或表达，即我们个人可以拥有多少社会部门（由圈地定义），以及我们在群体中共同管理或为共同、不可分割的利益共享的多少。版权和知识产权的权威是一种混合概念：它由国家监管，但在学科社区、立法和判例法中，围绕体裁的正常化标准得到进一步定义。ChatGPT和未来的生成性AI作者工具，在它们能够产生与专业作家相当的书面文本，做人类做的大量工作时，破坏了这些社区的工作，并引发了一个新兴的伦理问题。
- en: There is further the question of using authored works to produce training models
    with the goal of generating similar, competing writing products, potentially threatening
    future livelihood and human dignity. We need to examine closely the source data
    for AI systems for their role in authorship, as LLMs are a kind of derivative
    work, albeit of a stochastically encoded and re-encoded form. That AI models are
    able to represent private information in a way that privacy leakage occurs is
    a further inappropriate risk (Zhang et al. 2023; Hua et al. 2023). While copyright
    is designed to safeguard not only authorship but also items for sale in markets
    (preventing free distribution from replacing a sale), LLMs in tools like ChatGPT
    have ethical implications particularly when used to generate texts for competition
    with human authors. With respect to these generative AI-produced works being themselves
    intellectual property, we might look to the digitization of the public works of
    museums and the court’s conceptions of originality and creative effort required
    to produce the work ([Petri 2014](#ch24.xhtml#r790)) as a means to consider their
    value as copyrightable works.
  id: totrans-2922
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有一个问题，即使用作者作品来生成训练模型，目的是产生类似或竞争性的写作产品，这可能会威胁到未来的生计和人类尊严。我们需要仔细检查AI系统的源数据，以了解它们在著作权中的作用，因为LLM（大型语言模型）是一种衍生作品，尽管它是以随机编码和重新编码的形式存在的。AI模型能够以导致隐私泄露的方式表示私人信息，这是一种进一步的不当风险（张等，2023年；华等，2023年）。虽然版权旨在保护著作权，以及市场上出售的商品（防止免费分发取代销售），但ChatGPT等工具中的LLM在用于生成与人类作者竞争的文本时，具有特别的伦理影响。关于这些生成性AI作品本身是知识产权的问题，我们可以参考博物馆公共作品的数字化和法院对原创性和创作努力的要求（[佩特里2014](#ch24.xhtml#r790)），作为考虑它们作为可版权作品的价值的手段。
- en: 'A significant risk, perhaps, is that new technologies tend to benefit the wealthy.
    They are owned privately and can do the work of a salaried human at a fraction
    of the effort. On the management end of pedagogy, for people with teaching jobs,
    it seems essential that LLM-based writing tools like ChatGPT not replace the supervisory
    tasks of teaching assistants, instructors, or the work they produce. A slower
    adoption of tools like ChatGPT, and more expert analysis to stabilize the social
    network of relations around identity, value, cost (broadly articulated), social
    risk, and benefit is really necessary to mediate their use. This slower adoption
    would also benefit from student-learners participating actively in the co-determination
    of tools, as we collectively reconfigure the division of cognitive labor, as has
    occurred successfully for other labor systems in history ([Greenbaum 1996](#ch24.xhtml#r768)).
    Some of this effort could more thoughtfully occur beforehand: Bender et al. (2021),
    for example, conduct pre-mortems for new systems, imagining the negative outcome
    to design how tools should be structured – fair relations through intentional
    design rather than “continuous adjustment of the ethical framework to technical
    and social changes” ([Farina et al. 2024](#ch24.xhtml#r761)).'
  id: totrans-2923
  prefs: []
  type: TYPE_NORMAL
  zh: 也许是重大的风险之一，新技术往往使富人受益。它们是私有财产，并且可以用极小的努力完成薪金人类的劳动。在教学的经营管理端，对于有教学职位的人来说，似乎至关重要，基于LLM的写作工具如ChatGPT不应取代助教、讲师或他们产生的监督任务。对ChatGPT等工具的缓慢采用，以及更多专家分析以稳定围绕身份、价值、成本（广泛阐述）、社会风险和利益的社交网络关系，对于调节它们的使用确实是必要的。这种缓慢的采用也将从学生-学习者积极参与工具的共同决定中受益，正如我们共同重新配置认知劳动的分配所发生的那样，这在历史上其他劳动系统中已经成功发生（[Greenbaum
    1996](#ch24.xhtml#r768)）。其中一些努力可以在事先更加深思熟虑地进行：例如，Bender等人（2021年）对新系统进行尸检，想象负面结果以设计工具的结构——通过有意设计公平关系，而不是“不断调整伦理框架以适应技术和社会变化”([Farina
    et al. 2024](#ch24.xhtml#r761))。
- en: 16.9 Toward Ethical Pedagogy and Scholarship
  id: totrans-2924
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 16.9 向着道德教学和学术研究迈进
- en: In this chapter, we have visited a few of the potential harms from bias and
    the uncritical use of LLMs like ChatGPT in higher education. It seems likely when
    these systems work better at supporting the positive uses for which they were
    imagined, they will be a great source of problem-solving in the world, addressing
    challenges that hinder human learners working under normal stress as well as in
    special cases such as accessibility. LLMs in ChatGPT might also assume new and
    useful roles in mediating scholarly thinking and communication as teaching guides
    as well as providing useful reference information and imaginative brainstorming.
    The changes GPT-type systems have wrought in the very short time they have existed
    across a variety of media remind us that understanding and knowledge situate in
    all kinds of ways – physical artifacts, historical and contemporary scholarship,
    in scholarly practices, and (now) in generative computer models. In all these
    systems there are mediated truths as well as biases and harms that we need to
    evaluate actively and in an ongoing way to initiate change, as ethical scholars
    engaged in research, teaching, and learning. Some assessment types are, for example,
    now “potentially obsolete” ([Michel-Villarreal et al. 2023](#ch24.xhtml#r781)).
    What may have to transform in higher education are the ways students engage to
    produce text-oriented scholarship. Sabzalieva and Valentini ([2023](#ch24.xhtml#r795))
    in a UNESCO-sponsored publication, for example, discuss ways students might utilize
    ChatGPT output constructively in assignments, such as a guide on the side, or
    as a non-authoritative reference draft to be critiqued and rewritten. There is
    also a further validation of scholarship that needs to occur in the sense ChatGPT-generated
    texts can, broadly speaking, evade detection systems. We might consider deconstructing
    the learning objectives of assignments and then reconstructing them in ways that
    require more critical thinking effort than cutting and pasting. If student engagement
    is a goal, “creative assignments” which are less concerned with critical or expository
    academic writing, but still present advanced thinking on a subject might be a
    useful alternative performance of identity and knowledge. So, for example, a “creative
    assignment” might entail a true fiction writing piece, a role-play session involving
    a discipline expert, an audio podcast, an alternative museum guide, or a short
    video “rant” (after Canadian comedian Rick Mercer), all of which support critical
    analysis.
  id: totrans-2925
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了由于偏见和高等教育中未经批判地使用类似ChatGPT的LLM（大型语言模型）所可能带来的几种潜在危害。似乎当这些系统在更好地支持它们被设想出的积极用途时，它们将成为世界解决问题的重要来源，解决阻碍人类学习者在正常压力下以及特殊情况下（如可访问性）工作的挑战。ChatGPT中的LLM也可能在调解学术思维和交流中扮演新的和有用的角色，作为教学指南，以及提供有用的参考信息和富有想象力的头脑风暴。GPT类型系统在存在时间极短的情况下，在多种媒体上所引起的变革提醒我们，理解和知识以各种方式存在——物理文物、历史和当代学术研究、学术实践，以及（现在）在生成计算机模型中。在这些所有系统中，都存在中介的真理以及我们需要积极和持续评估的偏见和危害，以启动变革，作为在研究、教学和学习中从事伦理研究的学者。例如，一些评估类型现在可能“变得过时”([Michel-Villarreal等人，2023](#ch24.xhtml#r781))。可能需要在高等教育中转变的是学生参与以产生以文本为导向的学术研究的方式。例如，在联合国教科文组织赞助的出版物中，Sabzalieva和Valentini([2023](#ch24.xhtml#r795))讨论了学生如何可能建设性地利用ChatGPT的输出，例如作为旁白指南，或作为非权威性的参考草案，供批评和重写。还需要进一步验证学术研究，因为从广义上讲，ChatGPT生成的文本可以避开检测系统。我们可能需要分解作业的学习目标，然后以需要比剪切和粘贴更多批判性思维努力的方式重建它们。如果学生参与是目标，那么“创造性作业”，虽然不太关注批判性或说明性的学术写作，但仍然在某个主题上呈现高级思维，可能是一种有用的身份和知识的表现方式。例如，一项“创造性作业”可能包括一篇真正的虚构作品，一个涉及学科专家的角色扮演会话，一个音频播客，一个替代博物馆指南，或一段短视频“发泄”（加拿大喜剧演员Rick
    Mercer之后），所有这些都支持批判性分析。
- en: While it is of course possible to learn complex things from systems of knowledge
    artifacts (textbooks and libraries), or structured experience environments (labs
    and studios), systems that higher education institutions set up for students with
    great care and deliberation, learning can also be messy and embodied ([Foglia
    and Wilson 2013](#ch24.xhtml#r765)), involving real experiences which are constructed
    socially in dynamic and unscripted ways from multiple, situated sites and histories.
    This landscape is constantly changing and as sociologist Noortje Marres observes,
    we need to seek articulation rather than an explanation “enabling some entites
    (sic), some dimensions to stand out, to gain traction, in our engagement with
    the world, while submerging others” (Marres 2024, 357). Authentic learning experiences
    involving community engagement and experiential learning can engage students and
    the higher education community in real-world problems with other communities of
    care, extrapolating the abstract concept of “indivisible benefits” while occasioning
    financial opportunities of the individual kind, like paid internships. In the
    realm of summative testing, supervised, proctored written exams will likely need
    to continue, but some departments have started bringing back the performance exam,
    where students respond orally or “viva voce” to a panel, present a research poster
    to a group, or at an internally organized departmental conference. ChatGPT clearly
    has a lot of potential for individualized instruction at a significant scale,
    just as learning management systems provided for classroom communication and management
    at scale, but only if it is used positively to develop and supplement, and not
    replace academic work – helping students ask questions and contemplate concepts,
    cultivating their critical processes while developing confidence and efficacy
    toward self-improvement.
  id: totrans-2926
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然当然可以从知识体系（教科书和图书馆）或结构化的经验环境（实验室和工作室）中学习复杂的事物，或者高等教育机构为学生精心设置的系统，但学习也可以是混乱的和具身的（[Foglia和Wilson
    2013](#ch24.xhtml#r765)），涉及真实经验，这些经验是通过社会在动态和未编排的方式从多个、特定地点和历史中构建的。这一景观不断变化，正如社会学家Noortje
    Marres观察到的，我们需要寻求的是阐述而不是解释，“使某些实体（实体，某些维度）在我们的与世界互动中脱颖而出，获得牵引力，同时将其他实体淹没”（Marres
    2024, 357）。涉及社区参与和体验学习的真实学习经验可以让学生和高等教育社区参与现实世界中的问题，与其他关怀社区互动，同时推断出“不可分割的利益”这一抽象概念，并带来个人财务机会，如带薪实习。在总结性测试领域，监督下的监考书面考试可能需要继续进行，但一些部门已经开始恢复绩效考试，学生口头或“口试”对评审团作出回应，向一组人展示研究海报，或在内部组织的部门会议上进行。ChatGPT显然在个性化教学方面具有很大的潜力，就像学习管理系统在规模上提供了课堂沟通和管理一样，但只有当它被积极用于发展和补充，而不是取代学术工作——帮助学生提问和思考概念，培养他们的批判性思维过程，同时增强他们自我提升的信心和效能。
- en: 16.10 Conclusions
  id: totrans-2927
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 16.10 结论
- en: 'ChatGPT presents a challenge to higher education as a widely available digital
    tool that renders well-written texts in response to short prompts at significant
    speed and scale. Occasional counterfactual claims or biases surface that inexperienced
    scholars (and maybe experienced ones) will have trouble recognizing which may
    be addressed by more focused training texts and tool systems rather than a general,
    oracle-like system. We can also look to higher education to develop higher standards
    around the evaluation of cited authority. There is a natural affinity between
    writing and the rational imagination, as a non-physical, ephemeral idea-space
    where thought-performance makes for intellectual constructs that lead to actions
    in the real world, the making of ground-truth knowledge artifacts. These in turn
    bring value and reputation to higher education, academia, and societies at large.
    Academic integrity, critical thinking, and scholarly effort, however, are being
    challenged by ChatGPT’s easy and expansive reach, remarkable ability, and speed
    at providing quick solutions without significant critical effort. Expediency is
    not typically a sought-goal of higher education: it values research rigor, disciplinary
    process, and original thought within critical framing traditions. In relation
    to ethical pedagogy and research authority, new academic systems that are more
    human-centered, culturally aligned, sensitive to harm, and actively searching
    to remediate its biases and gaps from the broadest reaches of communities of inquiry
    are desirable to enact. Improvements to the authority problem posed by ChatGPT
    could also occur by broad multi-stakeholder consultation and research, transparency,
    legislation, and critical redesign around considerations of fairness and harm,
    as has happened with personal camera devices. For now and in the future it is
    essential that academic rewards go to legitimate effort, at least if academic
    institutions are to retain their reputations as validators of authentic texts
    of discoveries and inventions, credentialing authorities of graduates, and mediators
    of future generations of thought.'
  id: totrans-2928
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT作为一种广泛可用的数字工具，对高等教育提出了挑战，因为它能够以显著的速度和规模对简短的提示做出高质量的文本回应。偶尔会出现一些反事实的声明或偏见，这些声明或偏见可能让经验不足的学者（甚至可能是经验丰富的学者）难以识别，这些问题可能需要更专注的训练文本和工具系统来解决，而不是一个通用的、类似先知一样的系统。我们还可以期待高等教育在评估引用权威方面制定更高的标准。写作与理性想象之间存在着自然的亲和力，作为一个非物理的、转瞬即逝的思想空间，在这里，思维表现构成了知识结构，这些结构最终导致现实世界中的行动，以及真实知识实体的创造。这些反过来又为高等教育、学术界以及整个社会带来了价值和声誉。然而，学术诚信、批判性思维和学术努力正受到ChatGPT轻松、广泛的影响和快速提供解决方案的能力的挑战，而这些解决方案往往缺乏显著的批判性努力。便利性通常不是高等教育追求的目标：它重视研究的严谨性、学科过程和批判性框架传统内的原创思想。在道德教学和研究权威方面，更以人为本、与文化相协调、对伤害敏感、并积极寻求从最广泛的探究社区中修复其偏见和差距的新学术体系是值得实施的。通过广泛的利益相关者咨询和研究、透明度、立法以及围绕公平和伤害的批判性重新设计，可以改善ChatGPT提出的权威问题，正如个人相机设备所发生的那样。现在和将来，学术奖励必须给予合法的努力，至少如果学术机构要保留其作为真实文本发现和发明的验证者、毕业生资格认证的权威以及未来一代思想的中介者的声誉的话。
