- en: 15OpenAI ChatGPT and Biased Information in Higher Education
  id: totrans-2738
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 15 开放AI ChatGPT与高等教育中的偏见信息
- en: Michael J. O’Brien, Izzat Alsmadi, R. Alexander Bentley, and Milan Tuba
  id: totrans-2739
  prefs: []
  type: TYPE_NORMAL
  zh: 迈克尔·J·奥布莱恩，伊扎特·阿尔斯马迪，R.亚历山大·本特利，和米兰·图巴
- en: 'DOI: [10.1201/9781032716350-15](http://doi.org/10.1201/9781032716350-15)'
  id: totrans-2740
  prefs: []
  type: TYPE_NORMAL
  zh: 'DOI: [10.1201/9781032716350-15](http://doi.org/10.1201/9781032716350-15)'
- en: 15.1 Introduction
  id: totrans-2741
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 15.1 引言
- en: According to its website ([https://openai.com/blog/introducing-openai](https://openai.com/blog/introducing-openai)),
    San Francisco-based OpenAI was founded in 2015 as a “non-profit artificial intelligence
    research company. Our goal is to advance digital intelligence in the way that
    is most likely to benefit humanity as a whole, unconstrained by a need to generate
    financial returns. Since our research is free from financial obligations, we can
    better focus on a positive human impact”—a feat that is not difficult to accomplish
    when you’re looking at a new valuation of up to $90 billion, tripling in value
    in less than nine months ([Seetharaman and Jin 2023](#ch23.xhtml#r731)). OpenAI’s
    application—OpenAI GPT—is a state-of-the-art generative pre-trained transformer
    (GPT) large language model (LLM) that was trained on an enormous corpus of text
    data ([Brown et al. 2020](#ch23.xhtml#r682)) to produce human-like text once prompts
    are entered. LLMs learn which succeeding words, phrases, and sentences are likely
    to come next for any given input word or phrase—like an iPhone when alphabetical
    letters are entered. By “reading” text during training that is written mainly
    by humans, language models also learn how to “write” like us, complete with all
    of our best and worst qualities ([O’Sullivan and Dickerson 2020](#ch23.xhtml#r723)).
  id: totrans-2742
  prefs: []
  type: TYPE_NORMAL
  zh: 根据其网站([https://openai.com/blog/introducing-openai](https://openai.com/blog/introducing-openai))，总部位于旧金山的OpenAI成立于2015年，是一家“非营利性人工智能研究公司。我们的目标是推动数字智能的发展，使其最有可能造福全人类，不受产生财务回报需求的限制。由于我们的研究不受财务义务的约束，我们可以更好地专注于对人类产生积极影响”——当你看到估值高达900亿美元的新估值时，这并不是一件难事，在不到九个月的时间里，其价值翻了两番([Seetharaman和Jin
    2023](#ch23.xhtml#r731))。OpenAI的应用——OpenAI GPT——是一种最先进的生成预训练转换器（GPT）大型语言模型（LLM），它在一个巨大的文本数据语料库上进行了训练([Brown等人2020](#ch23.xhtml#r682))，一旦输入提示，就能产生类似人类的文本。LLM学习对于任何给定的输入词或短语，接下来可能出现的后续单词、短语和句子——就像输入字母时iPhone的行为。通过在训练过程中“阅读”主要由人类撰写的文本，语言模型也学会了如何“写作”，包括我们最好和最差的特点([O’Sullivan和Dickerson
    2020](#ch23.xhtml#r723))。
- en: As impressive as they are, all artificial intelligence (AI) systems have a limited
    range of capabilities, although those are expanding at an astounding rate. Researchers
    (and machines) will keep whittling away at constraints, perhaps one day in the
    not-too-distant future reaching a point where machines will come close to matching
    human performance on virtually every intellectual task ([Lake et al. 2017](#ch23.xhtml#r706);
    [Gillani 2023](#ch23.xhtml#r693))—what is often referred to as “artificial general
    intelligence.” As OpenAI put it, “It’s hard to fathom how much human-level AI
    could benefit society, and it’s equally hard to imagine how much it could damage
    society if built or used incorrectly.” The latter part of that sentence is particularly
    concerning and drew us to write this chapter, in which we focus on issues stemming
    from various forms of bias.
  id: totrans-2743
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管它们令人印象深刻，但所有人工智能（AI）系统都有有限的性能范围，尽管这些范围正在以惊人的速度扩展。研究人员（和机器）将继续削减限制，也许在不远的将来有一天，机器将在几乎所有智力任务上接近人类的表现（[Lake等人2017](#ch23.xhtml#r706)；[Gillani
    2023](#ch23.xhtml#r693))——这通常被称为“人工通用智能”。正如OpenAI所说，“很难想象人类水平的人工智能能对社会带来多大的好处，同样难以想象如果构建或使用不当，它可能会对社会造成多大的损害。”这句话的后半部分尤其令人担忧，促使我们撰写本章，其中我们关注由各种形式的偏见产生的问题。
- en: 'As we discuss in more depth later, the term “bias” is defined in different
    ways, depending on discipline. For now, we can define it as “any basis for choosing
    one generalization over another, other than strict consistency with the observed
    training instances” ([Mitchell 1980](#ch23.xhtml#r713): 1). Like all LLMs, GPT’s
    training on vast amounts of text data can reflect the biases and prejudices—sometimes
    subtle ([Mollick and Mollick 2023](#ch23.xhtml#r716))—not only in the sources
    on which it is trained but also in the minds of its trainers (and manipulators).
    Both can lead not only to the intentional or unintentional generation and proliferation
    of such things as gender or racial bias and offensive language but also to social
    unrest and even violence ([Alsmadi and O’Brien 2021](#ch23.xhtml#r668); [O’Brien
    and Alsmadi 2021](#ch23.xhtml#r721)). It would appear that a first step in eliminating
    such situations would be to “make the biases and their use in controlling learning
    just as explicit as past research has made the observations and their use” ([Mitchell
    1980](#ch23.xhtml#r713): 3). One way to begin is by understanding how the most-used
    conversational model, OpenAI’s ChatGPT, operates and what its capabilities for
    bias are in higher education.'
  id: totrans-2744
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们稍后更深入地讨论的那样，“偏见”这个术语在不同的学科中有不同的定义。目前，我们可以将其定义为“选择一个概括而不是另一个概括的任何依据，除了与观察到的训练实例的严格一致性之外”([Mitchell
    1980](#ch23.xhtml#r713)：1)。像所有LLMs一样，GPT在大量文本数据上的训练可以反映出偏见和偏见——有时是微妙的([Mollick
    and Mollick 2023](#ch23.xhtml#r716))——不仅体现在其训练的来源上，也体现在其训练者（和操纵者）的头脑中。两者都可能不仅导致性别或种族偏见以及冒犯性语言的故意或无意产生和传播，还可能导致社会动荡甚至暴力([Alsmadi
    and O’Brien 2021](#ch23.xhtml#r668)；[O’Brien and Alsmadi 2021](#ch23.xhtml#r721))。显然，消除这种状况的第一步应该是“使偏见及其在控制学习中的使用像过去研究中使观察及其使用一样明确”([Mitchell
    1980](#ch23.xhtml#r713)：3)。开始的一种方法是通过理解最常用的对话模型——OpenAI的ChatGPT——是如何运作的，以及它在高等教育中的偏见能力。
- en: 15.1.1 Chapter Organization
  id: totrans-2745
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 15.1.1 章节组织
- en: 'The remainder of the chapter is divided into four sections: Section 15.2 introduces
    ChatGPT; Section 15.3 discusses issues surrounding ChatGPT in the classroom; Section
    15.4 introduces the different kinds of bias in machine learning, especially in
    LLMs such as ChatGPT; and Section 15.5 contains a few conclusions that can be
    gleaned from our all-too-brief foray into machine learning. One thing to keep
    in mind as you make your way through the sections is that the AI world is changing
    so fast, especially with respect to chatbots, that by the time the chapter appears,
    hundreds of articles and reports—research results plus media coverage—will amplify
    or contradict some of what we present in the various sections and certainly will
    make parts of our discussion obsolete. This in no way is unexpected, given that
    the generative AI market is anticipated to reach $109 billion by 2030—a staggering
    compound *annual* growth rate of 36.5% from 2024 ([Grand View Research 2024](#ch23.xhtml#r696)).'
  id: totrans-2746
  prefs: []
  type: TYPE_NORMAL
  zh: 本章剩余部分分为四个部分：第15.2节介绍了ChatGPT；第15.3节讨论了课堂中围绕ChatGPT的问题；第15.4节介绍了机器学习中不同类型的偏见，特别是在LLMs如ChatGPT中；第15.5节包含了一些可以从我们过于简短的机器学习探索中得出的结论。在阅读这些部分时，需要记住的一点是，AI世界变化非常快，尤其是在聊天机器人方面，到本章出现时，数百篇文章和报告——包括研究成果和媒体报道——可能会放大或反驳我们在各个部分中提出的一些内容，并肯定会使我们讨论的部分变得过时。考虑到生成式AI市场预计到2030年将达到1090亿美元——从2024年开始的复合年增长率高达36.5%（[Grand
    View Research 2024](#ch23.xhtml#r696)），这种情况并不令人意外。
- en: '15.2 ChatGTP: The Game Changer'
  id: totrans-2747
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 15.2 ChatGPT：变革者
- en: The first OpenAI release was GPT-1 in 2018 ([Radford et al. 2018](#ch23.xhtml#r728)),
    followed by GPT-2 in 2019 ([Radford et al. 2019](#ch23.xhtml#r729)) and GPT-3
    in 2020 ([Brown et al. 2020](#ch23.xhtml#r682)), which contained 1.75 trillion
    machine-learning parameters (think human-brain synapses). It was pre-trained on
    several datasets, with 82% of its knowledge base coming from Common Crawl and
    WebText2 ([Lutkevich and Schmelzer 2023](#ch23.xhtml#r710)). It went through a
    supervised testing phase and was then put through a reinforcement phase that included
    human tweaking. Often overlooked was the quiet but significant release of GPT-3.5,
    which used the same pre-training datasets as GPT-3 but with built-in guardrails
    that forced it to comply with preset human values—an example of “reinforcement
    learning with human feedback” ([Thompson 2023](#ch23.xhtml#r743)).
  id: totrans-2748
  prefs: []
  type: TYPE_NORMAL
  zh: 2018年，OpenAI发布了首个版本GPT-1 ([Radford et al. 2018](#ch23.xhtml#r728))，随后在2019年发布了GPT-2
    ([Radford et al. 2019](#ch23.xhtml#r729))，2020年发布了GPT-3 ([Brown et al. 2020](#ch23.xhtml#r682))，其中包含1750亿个机器学习参数（相当于人类大脑的突触数量）。它在多个数据集上进行了预训练，其中82%的知识库来自Common
    Crawl和WebText2 ([Lutkevich and Schmelzer 2023](#ch23.xhtml#r710))。它经历了监督测试阶段，然后进入了一个包括人工调整的强化阶段。常常被忽视的是GPT-3.5的低调但重要的发布，它使用了与GPT-3相同的预训练数据集，但内置了安全栏，迫使它遵守预设的人类价值观——这是“带有人类反馈的强化学习”的一个例子
    ([Thompson 2023](#ch23.xhtml#r743))。
- en: In November 2022, OpenAI released ChatGPT, a fine-tuned conversational model
    based on GPT-3.5\. When most people in higher education talk about “GPT,” they’re
    really talking about ChatGPT, not understanding there is a significant difference
    between an LLM and a chatbot. Also, because of the hype that has surrounded ChatGPT
    ([Syme 2023a](#ch23.xhtml#r738)), lost is the fact that there are now other LLMs
    available that have the *potential* to far surpass ChatGPT in speed, logic, and
    above all, accuracy ([Barr 2023](#ch23.xhtml#r672)). A leading candidate for a
    few months—a lifetime in the AI world—appeared to be Sparrow ([Glaese et al. 2022](#ch23.xhtml#r694)),
    which was hailed by its developer DeepMind as the “ultimate ChatGPT competitor.”
    It was supposed to be released in 2022, but as far as we know, it has been postponed
    indefinitely, although there has been chatter that a beta-test version might be
    released later in 2024\. Regardless, ChatGPT has emerged as first in class, having
    recorded 100 million visits within two months of its release—a number that grew
    to 1.6 billion in March 2023 alone ([Thompson 2023](#ch23.xhtml#r743)). At last
    count (February 2024), it had 180 million users and approximately 1.5 billion
    visitors per month ([Duarte 2024](#ch23.xhtml#r689)).
  id: totrans-2749
  prefs: []
  type: TYPE_NORMAL
  zh: 2022年11月，OpenAI发布了ChatGPT，这是一个基于GPT-3.5的微调对话模型。当高等教育中大多数人谈论“GPT”时，他们实际上是在谈论ChatGPT，而不了解LLM和聊天机器人之间存在显著差异。此外，由于围绕ChatGPT的炒作
    ([Syme 2023a](#ch23.xhtml#r738))，现在有其他LLM可用，它们在速度、逻辑，尤其是准确性方面有可能远远超过ChatGPT ([Barr
    2023](#ch23.xhtml#r672))。几个月来，一个领先的候选者——在AI世界中是一生的时间——似乎是Sparrow ([Glaese et al.
    2022](#ch23.xhtml#r694))，它的开发者DeepMind将其称为“终极ChatGPT竞争者”。它原计划于2022年发布，但据我们所知，它已被无限期推迟，尽管有传言称可能会在2024年晚些时候发布测试版。无论如何，ChatGPT已经成为了行业领导者，发布两个月内就记录了1亿次访问量——这个数字在2023年3月仅增长到16亿次([Thompson
    2023](#ch23.xhtml#r743))。最后统计（2024年2月），它拥有1.8亿用户，每月大约有15亿次访问量([Duarte 2024](#ch23.xhtml#r689))。
- en: Writing in the *Harvard Business Review* two weeks after OpenAI released its
    chatbot, University of Pennsylvania’s Wharton School of Business professor Ethan
    [Mollick (2022)](#ch23.xhtml#r715) referred to it as a “tipping point” for AI.
    There was, however, both good and bad news that came along with that event. Although
    at the time ChatGPT was superior to other AI products, Mollick pointed out that
    although it was, metaphorically, pretty good at steering the car, it sometimes
    rammed into another vehicle. Most of the time it provided good answers to queries,
    but sometimes it seemed to make up the results entirely. Mollick also pointed
    out that AI in general, not just ChatGPT, is a consummate liar (he used a more-colorful
    term) that continually turns out convincing-sounding nonsense that is void of
    truth.
  id: totrans-2750
  prefs: []
  type: TYPE_NORMAL
  zh: 在OpenAI发布其聊天机器人两周后，宾夕法尼亚大学沃顿商学院教授伊桑 [Mollick (2022)](#ch23.xhtml#r715) 在《哈佛商业评论》上撰文，称其为AI的“转折点”。然而，随着这一事件的发生，既有好消息也有坏消息。尽管当时ChatGPT优于其他AI产品，Mollick指出，尽管它在比喻上擅长驾驶汽车，但它有时会撞上另一辆车。大多数时候它提供了良好的答案，但有时它似乎完全编造了结果。Mollick还指出，AI总体上，而不仅仅是ChatGPT，是一个无与伦比的骗子（他用了更生动的词语），它不断地产出听起来令人信服的胡言乱语，却毫无真实性。
- en: 15.3 ChatGPT in the Classroom
  id: totrans-2751
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 15.3 ChatGPT在课堂上的应用
- en: 'It was that feature that helped fuel the fear many academics had of ChatGPT.
    How could they regulate the use of information whose veracity was difficult or
    impossible to determine? Linked to that fear was another: How could they regulate
    its use and misuse? For example, could an essay question or term paper written
    solely by a bot be detected? By early January 2023, students had figured out that
    the technology had appeared so rapidly that colleges and universities had few
    or no protocols in place to deal with the unfettered use of ChatGPT. In short,
    no LLM comes with an instruction manual ([Mollick and Mollick 2023](#ch23.xhtml#r716)).
    No one would argue that cheating on a term paper is anything close to a patient
    dying from a chatbot’s misdiagnosis, but academics still had to deal with their
    own world, which is built around honesty being the educational standard.'
  id: totrans-2752
  prefs: []
  type: TYPE_NORMAL
  zh: 正是这个功能助长了许多学者对ChatGPT的恐惧。他们如何监管那些难以或无法确定真实性的信息的使用？与这种恐惧相关的是另一个问题：他们如何监管其使用和误用？例如，一篇完全由机器人撰写的论文或论文题目能否被检测到？到2023年1月初，学生们已经意识到这项技术出现得太快了，以至于大学和学院几乎没有或没有制定出处理ChatGPT无拘无束使用的方案。简而言之，没有LLM会附带使用说明书([Mollick
    and Mollick 2023](#ch23.xhtml#r716))。没有人会争论在论文中作弊与患者因聊天机器人误诊而死亡的情况相提并论，但学者们仍然必须应对他们自己的世界，这个世界是以诚实作为教育标准建立的。
- en: The fear that cheating would upend the educational world was not the sole property
    of institutions of higher learning. New York City’s Department of Education, for
    example, was so concerned that in early January 2023 it banned ChatGPT from its
    schools’ devices and networks, although the department lifted the ban in May ([Banks
    2023](#ch23.xhtml#r670)). A similar ban had been put in place slightly earlier
    by the Los Angeles Unified School District “to protect academic dishonesty, while
    a risk/benefit assessment was conducted” ([Yang 2023](#ch23.xhtml#r745)). We think
    the district meant “to protect *against* academic honesty.” Like with New York,
    the ban was soon lifted as educators realized it was ineffective because students—at
    least the more affluent ones—could add the chatbot to their home devices and skirt
    the ban.
  id: totrans-2753
  prefs: []
  type: TYPE_NORMAL
  zh: 担心作弊会颠覆教育世界的恐惧并不仅限于高等教育机构。例如，纽约市教育部非常担心，在2023年1月初，它禁止ChatGPT在学校设备和网络上使用，尽管该部门在5月份取消了禁令([Banks
    2023](#ch23.xhtml#r670))。洛杉矶联合学区在稍早之前也实施了类似的禁令，“为了保护学术诚信，同时进行风险/收益评估”([Yang 2023](#ch23.xhtml#r745))。我们认为该区是“为了保护*对抗*学术诚信”。与纽约一样，禁令很快就被取消了，因为教育工作者意识到这是无效的，因为学生——至少是更富裕的学生——可以将聊天机器人添加到他们的家庭设备上，从而规避禁令。
- en: Soon after ChatGPT was released, Sam Altman, the CEO of OpenAI, tried to assuage
    some of the fear by promising that the company would develop ways to help schools
    ferret out AI plagiarism, but he warned that full detection was not guaranteed.
    There might be ways the company could help teachers to be a little more likely
    to detect the output of a GPT-like system, but a determined person would still
    get around the guardrails ([Mok 2023](#ch23.xhtml#r714)). Not surprisingly, computer
    applications that allegedly identified plagiarism sprang up almost immediately
    ([Syme 2023b](#ch23.xhtml#r739)), with mixed results. As a professor at Northern
    Michigan University put it, “Unlike plagiarism cases of old where you can just
    say, “hey, here’s the paragraph from Wikipedia,” there is no knockdown proof that
    you can provide other than the application says that’s the statistical likelihood”
    that a student plagiarized ([Nolan 2023](#ch23.xhtml#r720)).
  id: totrans-2754
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT发布不久后，OpenAI的首席执行官Sam Altman试图通过承诺公司会开发方法帮助学校识别AI剽窃来平息一些恐惧，但他警告说，完全检测并不能保证。公司可能有一些方法可以帮助教师更有可能检测到类似GPT系统的输出，但一个决心已定的人仍然可以绕过这些防护措施([Mok
    2023](#ch23.xhtml#r714))。不出所料，声称可以识别剽窃的计算机应用程序几乎立即出现([Syme 2023b](#ch23.xhtml#r739))，结果参差不齐。正如北密歇根大学的教授所说：“与过去的剽窃案例不同，你可以说‘嘿，这里是从维基百科摘录的段落’，除了应用程序说这是学生剽窃的统计可能性之外，你无法提供其他压倒性的证据”([Nolan
    2023](#ch23.xhtml#r720))。
- en: 'Especially chilling was the ineffectiveness of Altman’s assurances that help
    was on the way. OpenAI quickly produced a classifier that was designed to sort
    out AI-written text from that written by humans, but during its initial testing,
    the following note popped up on OpenAI’s website:'
  id: totrans-2755
  prefs: []
  type: TYPE_NORMAL
  zh: 最令人不寒而栗的是，Altman保证帮助即将到来的无效性。OpenAI迅速开发了一个分类器，旨在区分AI撰写的文本和人类撰写的文本，但在其初步测试期间，以下注释出现在OpenAI的网站上：
- en: As of July 20, 2023, the AI classifier is no longer available due to its low
    rate of accuracy. We are working to incorporate feedback and are currently researching
    more effective provenance techniques for text, and have made a commitment to develop
    and deploy mechanisms that enable users to understand if audio or visual content
    is AI-generated.
  id: totrans-2756
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 截至2023年7月20日，由于准确率低，AI分类器不再可用。我们正在努力整合反馈，并目前正在研究更有效的文本溯源技术，并承诺开发并部署机制，使用户能够了解音频或视觉内容是否由AI生成。
- en: So far, we’ve seen no revised product.
  id: totrans-2757
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们还没有看到任何修订后的产品。
- en: Backing up for a minute, the anxiety and hype that surrounded the unexpected
    release of ChatGPT late in 2022 led to stories emanating from high schools, colleges,
    and universities on its supposed horrors. Many of the stories quickly became urban
    legends. There were exceptions, of course—professors and administrators who wondered
    about the positives that might come from introducing ChatGPT into the curriculum.
    Could students engage with the chatbot—Socratically, so to speak—to improve their
    knowledge of a subject or improve their writing skills?
  id: totrans-2758
  prefs: []
  type: TYPE_NORMAL
  zh: 回到一分钟前，2022年底ChatGPT意外发布所引发的焦虑和炒作，导致高中、大学和大学出现了关于其所谓恐怖故事。许多故事很快变成了都市传说。当然，也有一些例外——教授和行政管理人员在思考将ChatGPT引入课程可能带来的积极影响。学生能否与聊天机器人——可以说是苏格拉底式地——互动，以提高他们对某一学科的了解或提高他们的写作技巧？
- en: 'The problem was, few people outside the AI industry were equipped to adequately
    explore how “safe” or “dangerous” a chatbot was, and for the most part, the industry
    was quiet on the matter. Those in higher education were not so quiet. Among their
    concerns were the established and start-up companies that overnight became “experts”
    in ChatGPT and flooded higher-education e-mail accounts with announcements of
    expensive webinars on how to integrate the chatbot not only into academics but
    into such departments as financial aid, human resources, residence halls, registration,
    and even campus police. Academically, however, there was one unanswered question:
    Just how smart *was* ChatGPT? Could it, for example, pass a college exam?'
  id: totrans-2759
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于，除了AI行业外，很少有人能够充分探索聊天机器人“安全”或“危险”的程度，而且从很大程度上说，该行业对此事保持沉默。高等教育界的人士并不这么安静。他们的担忧包括那些一夜之间成为ChatGPT“专家”的既定公司和初创公司，他们用昂贵的网络研讨会通知充斥着高等教育电子邮件账户，这些网络研讨会旨在将聊天机器人不仅整合到学术中，还整合到财务援助、人力资源、宿舍、注册甚至校园警察等部门。然而，在学术上，有一个未解决的问题：ChatGPT究竟有多“聪明”？例如，它能否通过大学考试？
- en: 'The answer came fast: Yes, it could pass a college exam, even one in law school.
    In a study by [Choi et al. (2023)](#ch23.xhtml#r686) at the Northwestern School
    of Law, when exams taken by ChatGPT—comprising over 95 multiple-choice questions
    and 12 essay questions—were graded blindly along with the exams from human students,
    ChatGPT performed better at essay questions but much worse at multiple-choice
    questions that involved math. Across the four exams, the bot averaged a C+—a below-average,
    but still passing grade, enough to earn the chatbot a law degree ([Sloan 2023](#ch23.xhtml#r732)).'
  id: totrans-2760
  prefs: []
  type: TYPE_NORMAL
  zh: 答案很快就来了：是的，它可以通过大学考试，甚至可以通过法学院考试。在西北法学院[Choi等人（2023）](#ch23.xhtml#r686)的一项研究中，当ChatGPT参加的考试——包括超过95道选择题和12道论文题——与人类学生的考试一起盲评时，ChatGPT在论文题上表现更好，但在涉及数学的选择题上表现则差得多。在这四次考试中，该机器人平均得分C+——一个低于平均水平的但仍然及格的分数，足以让聊天机器人获得法学学位([Sloan
    2023](#ch23.xhtml#r732))。
- en: If ChatGPT can pass a law exam, can it earn an MBA? Yes. In one study conducted
    at the University of Pennsylvania’s Wharton School of Business using an MBA final
    exam graded by a human instructor, ChatGPT received a B or B– grade ([Terwiesch
    2023](#ch23.xhtml#r742)). The instructor noted that ChatGPT was remarkably good
    at modifying its answers in response to human prompts. In other words, in the
    instances where it initially failed to match a problem with the right solution,
    the bot was able to correct itself after receiving an appropriate prompt from
    a human expert. Thus, having “a human in the loop” can be very valuable. Even
    more remarkable, ChatGPT seemed to be able to learn over time so that in the future
    the hint would no longer be needed ([Terwiesch 2023](#ch23.xhtml#r742)).
  id: totrans-2761
  prefs: []
  type: TYPE_NORMAL
  zh: 如果ChatGPT能够通过法律考试，它能否获得MBA学位？答案是肯定的。在一项由宾夕法尼亚大学沃顿商学院进行的调查中，使用了由人类教师评分的MBA期末考试，ChatGPT获得了B或B-的成绩([Terwiesch
    2023](#ch23.xhtml#r742))。教师指出，ChatGPT在根据人类提示修改答案方面表现得非常出色。换句话说，在它最初未能匹配正确解决方案与问题的情况下，机器人能够在收到人类专家适当提示后自行纠正。因此，拥有“人类在回路中”是非常有价值的。更令人惊讶的是，ChatGPT似乎能够随着时间的推移而学习，以至于在未来将不再需要提示([Terwiesch
    2023](#ch23.xhtml#r742))。
- en: 15.4 Bias in Machine Learning
  id: totrans-2762
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 15.4 机器学习中的偏差
- en: ChatGPT has been shown to be “intelligent” in ways not seen previously in AI,
    but what about its particular biases? We doubt any language models are going to
    be free of bias, whether inherited from training data or introduced later (e.g.,
    [Solaiman et al. 2019](#ch23.xhtml#r734); [Zhao et al. 2019](#ch23.xhtml#r746);
    [Bhardwaj et al. 2020](#ch23.xhtml#r674); [Blodgett et al. 2020](#ch23.xhtml#r675);
    [Bender et al. 2021](#ch23.xhtml#r673); [Tamkin et al. 2021](#ch23.xhtml#r740);
    [Kirk et al. 2021](#ch23.xhtml#r703); [Liu et al. 2022](#ch23.xhtml#r709)), but
    how problematic is that? For example, can current and future LLMs be used as powerful
    tools in propaganda and misinformation campaigns? Can the potential bias in such
    models, especially when introduced from the outside, impact public discourse and
    polarization in society? These questions transcend the use of a chatbot for cheating
    on a term paper.
  id: totrans-2763
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT已被证明在AI中以前未见过的“智能”方式，但它的特定偏差如何？我们怀疑任何语言模型都不太可能完全摆脱偏差，无论是从训练数据中继承的还是后来引入的（例如，[Solaiman等人2019](#ch23.xhtml#r734)；[Zhao等人2019](#ch23.xhtml#r746)；[Bhardwaj等人2020](#ch23.xhtml#r674)；[Blodgett等人2020](#ch23.xhtml#r675)；[Bender等人2021](#ch23.xhtml#r673)；[Tamkin等人2021](#ch23.xhtml#r740)；[Kirk等人2021](#ch23.xhtml#r703)；[Liu等人2022](#ch23.xhtml#r709)），但这有多成问题呢？例如，当前和未来的LLM是否可以用作宣传和虚假信息运动的强大工具？这些模型中潜在的偏差，尤其是当从外部引入时，是否会影响公共话语和社会两极分化？这些问题超越了使用聊天机器人来抄袭论文的使用范围。
- en: In the cyber world, bias takes on numerous meanings, typically different from
    how the term is used in news reporting ([Hellström et al. 2020](#ch23.xhtml#r697)).
    In everyday parlance, we use the term to refer to any kind of prejudice in favor
    of or against something compared with another, whereas in the cyber world it refers
    to any systematic deviation from a presupposed ideal ([Soh 2020](#ch23.xhtml#r733)).
    In terms of machine learning, bias refers to how consistently a learned model
    is “right” or “wrong” compared to “ground truth” ([Ivanović and Radovanović
    2015](#ch23.xhtml#r700)). However, what we take as “ground truth” makes all the
    difference. Specifically, it is the difference between prediction by the model
    and the actual value the model tries to predict (particularly in the training
    stage). A model with high bias leads to high error on both training and test data.
    For example, decision trees have a bias toward simple output models over complex
    ones, rule-induction methods have a bias toward simple normal-form expressions,
    and neural-network methods have a bias toward linear threshold functions ([Mooney
    1996](#ch23.xhtml#r717)). In short, bias in machine learning can negatively affect
    the integrity of the analytical process and the validity of its results. LLM algorithms
    are only as good as the data on which they are trained. If biases exist in the
    training datasets, then these will be reiterated—and possibly exacerbated—by the
    application ([Buolamwini and Gebru 2018](#ch23.xhtml#r683); [Pot et al. 2021](#ch23.xhtml#r726)).
  id: totrans-2764
  prefs: []
  type: TYPE_NORMAL
  zh: 在网络世界中，“偏差”有多种含义，通常与新闻报道中使用的含义不同（[Hellström 等人 2020](#ch23.xhtml#r697)）。在日常用语中，我们用这个词来指代任何与另一事物相比的偏见，而在网络世界中，它指的是任何与预设理想的系统性偏差（[Soh
    2020](#ch23.xhtml#r733)）。在机器学习的术语中，偏差指的是学习模型相对于“真实情况”的“正确”或“错误”的稳定性（[Ivanović
    和 Radovanović 2015](#ch23.xhtml#r700)）。然而，我们认为是“真实情况”的东西至关重要。具体来说，这是模型预测与模型试图预测的实际值之间的差异（尤其是在训练阶段）。具有高偏差的模型会导致训练和测试数据上的高误差。例如，决策树倾向于简单的输出模型而不是复杂的模型，规则归纳方法倾向于简单的正规形式表达式，而神经网络方法倾向于线性阈值函数（[Mooney
    1996](#ch23.xhtml#r717)）。简而言之，机器学习中的偏差可能会对分析过程的完整性和结果的准确性产生负面影响。LLM 算法的好坏取决于它们训练的数据。如果训练数据集中存在偏差，那么这些偏差将被重复——甚至可能加剧——在应用中（[Buolamwini
    和 Gebru 2018](#ch23.xhtml#r683)；[Pot 等人 2021](#ch23.xhtml#r726)）。
- en: 'Consider this, however: Why would we want a completely unbiased LLM in the
    first place? If, as [Mitchell (1980](#ch23.xhtml#r713): 1) points out, we take
    slavish consistency to training as the sole determinant of appropriate generalizations,
    then the LLM'
  id: totrans-2765
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，考虑这一点：我们为什么一开始就要一个完全无偏差的 LLM 呢？如果，正如 [Mitchell (1980](#ch23.xhtml#r713)：1)
    指出的那样，我们将对训练的盲目一致性视为适当概括的唯一决定因素，那么 LLM
- en: can never make the inductive leap necessary to classify instances beyond those
    it has observed. Only if the program has other sources of information, or biases
    for choosing one generalization over the other, can it nonarbitrarily classify
    instances beyond those in the training set.
  id: totrans-2766
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 永远无法做出归纳跳跃来对它观察到的实例之外的实例进行分类。只有当程序有其他信息来源，或者有选择一种泛化而不是另一种泛化的偏差时，它才能非任意地对训练集之外的实例进行分类。
- en: 'The trick is to differentiate between “good” and “bad” bias, recognizing that
    what might be good in one situation is bad in another. The problem is similar
    to standard matters of the regression to the mean, where the initial measurement
    happens to be an outlier, such that interpretations of further measurements, regressing
    to the mean, are unintentionally biased ([Barnett et al. 2005](#ch23.xhtml#r671)).
    For example, consider a doctor who uses AI to diagnose an illness and treatment,
    not realizing that although it worked in previous cases, AI misread the symptoms
    and the patient died. What had worked beneficially before didn’t in this case
    because of bias in the AI training. Here, bias refers specifically to “a feature
    of the design of a study, or the execution of a study, or the analysis of the
    data from a study, that makes evidence misleading” ([Stegenga 2018](#ch23.xhtml#r735):
    104).'
  id: totrans-2767
  prefs: []
  type: TYPE_NORMAL
  zh: 小技巧在于区分“好的”和“坏的”偏差，认识到在一种情况下可能好的东西在另一种情况下可能就是坏的。这个问题类似于回归到平均值的标准问题，其中初始测量恰好是一个异常值，这样对进一步测量的解释，回归到平均值，就无意中带有偏差（[Barnett
    等人 2005](#ch23.xhtml#r671)）。例如，考虑一位医生使用人工智能来诊断疾病和治疗，而没有意识到尽管它在之前的案例中有效，但人工智能误读了症状，导致患者死亡。之前有效的东西在这个案例中无效，是因为人工智能训练中的偏差。在这里，“偏差”特指“研究设计、研究执行或研究数据分析中的一个特征，使得证据具有误导性”([Stegenga
    2018](#ch23.xhtml#r735)：104)。
- en: 15.4.1 Biases Found in LLMs
  id: totrans-2768
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 15.4.1 LLM 中发现的偏差
- en: Research on bias in LLMs—especially with respect to fairness and representation—began
    well before OpenAI’s release of GPT-1 ([Brown et al. 2020](#ch23.xhtml#r682)).
    A useful summary of biases that have been found in machine learning across platforms
    comes from [Suresh and Guttag (2019)](#ch23.xhtml#r736), which we use as a springboard
    for brief discussions of relevant literature.
  id: totrans-2769
  prefs: []
  type: TYPE_NORMAL
  zh: 对 LLM 中偏差的研究——特别是在公平性和代表性方面——在 OpenAI 发布 GPT-1 之前就已经开始了（[Brown 等人 2020](#ch23.xhtml#r682)）。对跨平台机器学习中发现的偏差的有用总结来自
    [Suresh 和 Guttag (2019)](#ch23.xhtml#r736)，我们将它作为讨论相关文献的跳板。
- en: '*Learning bia*s: Restrictions in the search space and giving preferences to
    certain data objects or functions over others ([Mitchell 1980](#ch23.xhtml#r713);
    [Dietterich and Kong 1995](#ch23.xhtml#r688)). Researchers’ concerns center on
    the potential for machine-learning systems to be biased against “protected attributes”
    such as gender, race, and age ([Gianfrancesco et al. 2018](#ch23.xhtml#r692);
    [Alelyani 2021](#ch23.xhtml#r667)). For example, [Klare et al. (2012)](#ch23.xhtml#r705)
    showed that there are lower matching accuracies for females than males, for Blacks
    compared to other races/ethnicities, and for 18–30-year-olds compared to other
    age groups.'
  id: totrans-2770
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*学习偏差*：在搜索空间中的限制以及对某些数据对象或函数相对于其他对象或函数的偏好（[Mitchell 1980](#ch23.xhtml#r713)；[Dietterich
    和 Kong 1995](#ch23.xhtml#r688)）。研究人员的关注点集中在机器学习系统可能对“受保护属性”如性别、种族和年龄产生偏差的潜在可能性上（[Gianfrancesco
    等人 2018](#ch23.xhtml#r692)；[Alelyani 2021](#ch23.xhtml#r667)）。例如，[Klare 等人 (2012)](#ch23.xhtml#r705)
    表明，女性的匹配准确率低于男性，黑人相对于其他种族/民族，18-30 岁的人相对于其他年龄组。'
- en: '*Inductive bias:* A set of assumptions that improves generalization of a model
    trained on an empirical distribution. It can be used in machine learning where
    some functions are given preference over others to address the lack of labeling
    data in the target domain ([Bouvier et al. 2021](#ch23.xhtml#r677)). Those preferences
    are assumptions made by the model when making predictions over inputs that have
    not been observed ([Marino and Manic 2019](#ch23.xhtml#r711)). Inductive bias
    for constructing models of new concepts occurs when those concepts are modeled
    as compositions of parts and relations ([Hummel and Biederman 1992](#ch23.xhtml#r698);
    [Lake et al. 2017](#ch23.xhtml#r706)).'
  id: totrans-2771
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*归纳偏差*：一组假设，可以提高在经验分布上训练的模型的泛化能力。它可以在机器学习中使用，其中某些函数相对于其他函数被赋予优先权，以解决目标域中标签数据的缺乏（[Bouvier
    等人 2021](#ch23.xhtml#r677)）。这些偏好是模型在预测未观察到的输入时做出的假设（[Marino 和 Manic 2019](#ch23.xhtml#r711)）。当新概念被建模为部分和关系的组合时，就会发生用于构建新概念模型的归纳偏差（[Hummel
    和 Biederman 1992](#ch23.xhtml#r698)；[Lake 等人 2017](#ch23.xhtml#r706)）。'
- en: '*Hyperparameter bias*: The frequent selection of certain or similar parameters
    in the model. This selection can be through learning tools or algorithms giving
    preferences to certain parameters or values. It can also be a result of users
    or researchers lowering complexity, processing time, and the like.'
  id: totrans-2772
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*超参数偏差*：模型中频繁选择某些或相似参数。这种选择可以通过学习工具或算法对某些参数或值给予优先权来实现。它也可能是用户或研究人员降低复杂性、处理时间等因素的结果。'
- en: '*Co-occurrence bias*: For example, when a word occurs disproportionately, often
    together with certain other words, in texts ([Hellström et al. 2020](#ch23.xhtml#r697)).
    Co-occurrence bias in the training dataset can significantly impact machine-learning
    models. Those co-occurrences might not necessarily reflect most or all actual
    scenarios. Several studies (e.g., [Agarwal et al. 2022](#ch23.xhtml#r665)) discuss
    methods to mitigate co-occurrence bias in machine-learning models.'
  id: totrans-2773
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*共现偏差*：例如，当一个词在文本中不成比例地出现，通常与某些其他词一起出现时（[Hellström 等人 2020](#ch23.xhtml#r697)）。训练数据集中的共现偏差可能会对机器学习模型产生重大影响。这些共现可能并不一定反映大多数或所有实际场景。一些研究（例如，[Agarwal
    等人 2022](#ch23.xhtml#r665)）讨论了减轻机器学习模型中共现偏差的方法。'
- en: '*Framing bias*: How a text expresses a particular opinion on a topic ([Hellström
    et al. 2020](#ch23.xhtml#r697)). For example, questions sometimes are framed in
    an interview or survey to trigger specific answers (e.g., asking if a glass is
    half full or half empty). Framing bias refers to an unobjective individual point
    of view.'
  id: totrans-2774
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*框架偏差*：文本如何表达对某个主题的特定观点（[Hellström 等人 2020](#ch23.xhtml#r697)）。例如，问题有时在访谈或调查中被构建，以引发特定的答案（例如，问一杯水是半满还是半空）。框架偏差指的是一个非客观的个人观点。'
- en: '*Uncertainty bias*: An algorithm may be less certain about its decisions on
    some data clusters than on others ([Phillips et al. 2018](#ch23.xhtml#r725)).
    The machine-learning model probability values represent uncertainty and typically
    have to be above a set threshold for a classification to be considered ([Hellström
    et al. 2020](#ch23.xhtml#r697)). Uncertainty bias occurs when (1) one group is
    underrepresented in the data, which means that there is more uncertainty associated
    with predictions about that group; and (2) the algorithm is risk averse ([Aigner
    and Cain 1977](#ch23.xhtml#r666); [Goodman and Flaxman 2017](#ch23.xhtml#r695)).'
  id: totrans-2775
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*不确定性偏见*：算法可能对其某些数据聚类的决策不如对其他数据聚类的决策有信心（[Phillips 等人 2018](#ch23.xhtml#r725)）。机器学习模型的概率值代表不确定性，并且通常必须超过一个设定的阈值，才能将分类视为有效（[Hellström
    等人 2020](#ch23.xhtml#r697)）。不确定性偏见发生在以下情况下：（1）一个群体在数据中代表性不足，这意味着与该群体的预测相关的更多不确定性；（2）算法规避风险（[Aigner
    和 Cain 1977](#ch23.xhtml#r666)；[Goodman 和 Flaxman 2017](#ch23.xhtml#r695)）。'
- en: '*Brilliance bias*: An implicit bias that imposes the idea that intellectual
    “brilliance” is a male trait ([Troske et al. 2022](#ch23.xhtml#r744)). The brilliance
    bias hurts women in hiring and education and enforces imposter syndrome, among
    other things ([Cundiff 2018](#ch23.xhtml#r687)).'
  id: totrans-2776
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*才华偏见*：一种隐含偏见，认为“才华”是男性特质（[Troske 等人 2022](#ch23.xhtml#r744)）。才华偏见损害了女性在招聘和教育中的地位，并加剧了冒名顶替综合症等问题（[Cundiff
    2018](#ch23.xhtml#r687)）。'
- en: '*Social bias*: Bias related directly to the protected attribute defining a
    group, for example, gender ([Lässig et al. 2022](#ch23.xhtml#r707)). Social bias
    is embedded in technology from a relatively uniform set of perspectives that inform
    their design ([Nangia et al. 2020](#ch23.xhtml#r719); [Nadeem et al. 2020](#ch23.xhtml#r718);
    [Feeney and Porumbescu 2021](#ch23.xhtml#r691)).'
  id: totrans-2777
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*社会偏见*：与定义群体的受保护属性直接相关的偏见，例如性别（[Lässig 等人 2022](#ch23.xhtml#r707)）。社会偏见嵌入在从相对统一的角度中，这些角度为它们的设计提供了信息（[Nangia
    等人 2020](#ch23.xhtml#r719)；[Nadeem 等人 2020](#ch23.xhtml#r718)；[Feeney 和 Porumbescu
    2021](#ch23.xhtml#r691)）。'
- en: '*Stereotypical bias*: A generalized belief that certain attributes characterize
    all members of a particular category or class of people ([Cardwell 1996](#ch23.xhtml#r684);
    [Öztürk 2022](#ch23.xhtml#r724)). Similar to social bias, stereotypical bias can
    be based on perspectives such as skin tone, gender, race, demography, and disability
    ([Badjatiya et al. 2019](#ch23.xhtml#r669)).'
  id: totrans-2778
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*刻板印象偏见*：一种普遍的信念，认为某些属性描述了特定类别或人群的所有成员（[Cardwell 1996](#ch23.xhtml#r684)；[Öztürk
    2022](#ch23.xhtml#r724)）。与社会偏见类似，刻板印象偏见可以基于肤色、性别、种族、人口统计和残疾等视角（[Badjatiya 等人 2019](#ch23.xhtml#r669)）。'
- en: '*Direct versus indirect bias*: In one classification of bias, researchers distinguished
    between direct (explicit) bias and indirect (implicit) bias ([Bolukbasi et al.
    2016](#ch23.xhtml#r676); [Chakraborty et al. 2016](#ch23.xhtml#r685)). Direct
    bias refers to the association between a gender-neutral word and a clear gender
    pair, whereas indirect bias is manifest in the association between gender-neutral
    words.'
  id: totrans-2779
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*直接与间接偏见*：在偏见的一种分类中，研究人员区分了直接（明确）偏见和间接（隐含）偏见（[Bolukbasi 等人 2016](#ch23.xhtml#r676)；[Chakraborty
    等人 2016](#ch23.xhtml#r685)）。直接偏见指的是中性别中性词与明确的性别配对之间的关联，而间接偏见则体现在性别中性词之间的关联。'
- en: '*Epistemological bias*: Linguistic features that focus on the believability
    of an assertion ([Boydstun et al. 2013](#ch23.xhtml#r678)).'
  id: totrans-2780
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*认识论偏见*：关注断言可信度的语言特征（[Boydstun 等人 2013](#ch23.xhtml#r678)）。'
- en: '*Bias bias*: Typically, in machine learning there is a trade-off between bias
    and variance, and models should strive for low bias and high variance, where the
    latter indicates that the training sample is a good representative of all data.
    Bias bias refers to those models that pay attention to bias while ignoring or
    paying little attention to variance ([Brighton and Gigerenzer 2015](#ch23.xhtml#r680)).
    The variance reflects the sensitivity of a model’s predictions to different training
    samples. [Brighton (2020)](#ch23.xhtml#r679) described several examples of bias
    bias that can render inaccurate results or data analysis.'
  id: totrans-2781
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*偏差偏差*：在机器学习中，通常存在偏差和方差之间的权衡，模型应努力实现低偏差和高方差，其中后者表示训练样本是所有数据的良好代表。偏差偏差指的是那些关注偏差而忽略或很少关注方差的模型（[Brighton
    和 Gigerenzer 2015](#ch23.xhtml#r680)）。方差反映了模型预测对不同训练样本的敏感性。[Brighton (2020)](#ch23.xhtml#r679)描述了可能导致结果不准确或数据分析错误的偏差偏差的几个例子。'
- en: '*Sampling bias*: Data with limited samples that are leveraged by algorithms
    to achieve high performance. Researchers, knowingly or unknowingly, report the
    results as having high accuracy.'
  id: totrans-2782
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*抽样偏差*：使用有限样本数据并通过算法实现高性能的数据。研究人员有意或无意地将结果报告为具有高精度。'
- en: '*Measurement bias*: The differential relationship between a latent score and
    a predicted observed score ([Tay et al. 2022](#ch23.xhtml#r741)). In many machine-learning
    models, a single feature that is highly correlated with the target can dominate
    or hide other features. This can be related to the bias–variance trade-off mentioned
    above.'
  id: totrans-2783
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*测量偏差*：潜在分数与预测观察分数之间的差异关系([Tay et al. 2022](#ch23.xhtml#r741))。在许多机器学习模型中，一个与目标高度相关的单一特征可能会主导或掩盖其他特征。这可能与上述提到的偏差-方差权衡有关。'
- en: '*Bias in the data versus bias in the process*: In all previous types of biases
    in machine learning discussed above, we can divide them broadly into two categories:
    biases that are the result of input or training data and those that result from
    the machine-learning process. Data should not be treated as being static, divorced
    from the processes that produced them ([Mehrabi et al. 2021](#ch23.xhtml#r712);
    [Suresh and Guttag 2021](#ch23.xhtml#r737)). Such biases can be serious, especially
    when researchers or model designers do not report them.'
  id: totrans-2784
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*数据偏差与过程偏差*：在上述所有先前讨论的机器学习偏差中，我们可以将它们大致分为两类：由输入或训练数据引起的偏差以及由机器学习过程引起的偏差。数据不应被视为静态的，与产生它们的过程分离([Mehrabi
    et al. 2021](#ch23.xhtml#r712); [Suresh and Guttag 2021](#ch23.xhtml#r737))。这种偏差可能是严重的，尤其是在研究人员或模型设计者没有报告它们的情况下。'
- en: 15.4.2 Bias in GPT
  id: totrans-2785
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 15.4.2 GPT中的偏差
- en: 'Since AI trains on existing data, it notoriously reflects biases already existing
    in media and society. Almost ten years ago, an AI called Beauty AI trained on
    about 6000 photos submitted by people from all over the world for a beauty contest;
    nearly all winners were white ([Levin 2016](#ch23.xhtml#r708)). Earlier that year,
    a Twitter chatbot named Tay had jumped its guardrails and began using racist language
    and promoting neo-Nazi views ([Hunt 2016](#ch23.xhtml#r699)). A decade later,
    ChatGPT is well aware of the possible threats it poses. In an interesting interview
    with the chatbot, GlobalData Thematic Research analyst Daniel Clarke asked it
    if its creation could pose problems for democracy ([www.verdict.co.uk/chat-gpt-3-interview](http://www.verdict.co.uk/chat-gpt-3-interview)).
    This was the answer he received:'
  id: totrans-2786
  prefs: []
  type: TYPE_NORMAL
  zh: 由于AI在现有数据上训练，它臭名昭著地反映了媒体和社会中已经存在的偏见。大约十年前，一个名为Beauty AI的AI在约6000张来自世界各地的人提交的选美比赛照片上进行了训练；几乎所有获胜者都是白人([Levin
    2016](#ch23.xhtml#r708))。在那一年早些时候，一个名为Tay的Twitter聊天机器人越过了其安全线，开始使用种族主义语言并推广新纳粹观点([Hunt
    2016](#ch23.xhtml#r699))。十年后，ChatGPT非常清楚它可能带来的威胁。在一次有趣的采访中，GlobalData主题研究分析师Daniel
    Clarke询问聊天机器人，它的创造是否可能对民主造成问题([www.verdict.co.uk/chat-gpt-3-interview](http://www.verdict.co.uk/chat-gpt-3-interview))。这是他收到的回答：
- en: Yes. … Its ability to generate highly realistic and convincing language, as
    well as large amounts of text quickly and at low cost, could make it a powerful
    tool for propaganda and disinformation campaigns. This could undermine trust in
    political institutions and erode the integrity of elections. Additionally, the
    potential for bias in Chat GPT-3’s language generation raises concerns about its
    impact on public discourse and the polarization of society.
  id: totrans-2787
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 是的。… 它生成高度逼真和令人信服的语言的能力，以及快速且低成本地生成大量文本的能力，可能使其成为宣传和虚假信息运动的强大工具。这可能会损害对政治机构的信任并侵蚀选举的完整性。此外，Chat
    GPT-3的语言生成中的潜在偏差引发了对其对公共话语和社会两极化的影响的担忧。
- en: Remember, that was a bot answering the question, not a human.
  id: totrans-2788
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，那是一个机器人回答的问题，而不是人类。
- en: '[Solaiman et al. (2019)](#ch23.xhtml#r734) analyzed bias in the GPT-2 database
    by using sentiment score as a proxy for bias. [Kirk et al. (2021)](#ch23.xhtml#r703)
    extended [Solaiman et al.’s (2019)](#ch23.xhtml#r734) work by conducting an empirical
    analysis of sentence completions within the specific context of bias toward occupational
    associations. Similarly, [Liu et al. (2022)](#ch23.xhtml#r709) (1) discussed political
    bias in GPT-2 and proposed a reinforcement-learning framework for mitigating it;
    (2) described metrics for measuring political bias after finding that GPT-2 was
    mostly liberal-leaning socially and politically; (3) described two types of bias:
    *Direct*, which refers to bias in texts generated using prompts that have a direct
    ideological trigger and *indirect*, which refers to bias in texts generated using
    prompts with particular keywords; and (4) divided ideological bias into three
    categories: gender, location, and topic.'
  id: totrans-2789
  prefs: []
  type: TYPE_NORMAL
  zh: '[Solaiman等人（2019）](#ch23.xhtml#r734) 通过使用情感分数作为偏见的代理来分析 GPT-2 数据库中的偏见。[Kirk等人（2021）](#ch23.xhtml#r703)
    通过在特定于对职业关联的偏见的具体背景下进行句子完成的实证分析，扩展了 [Solaiman等人（2019）](#ch23.xhtml#r734) 的工作。同样，[Liu等人（2022）](#ch23.xhtml#r709)
    （1）讨论了 GPT-2 中的政治偏见，并提出了一种用于减轻偏见的强化学习框架；（2）在发现 GPT-2 在社会和政治上主要倾向于自由主义后，描述了测量政治偏见的指标；（3）描述了两种类型的偏见：*直接*，指的是使用具有直接意识形态触发的提示生成的文本中的偏见，以及*间接*，指的是使用具有特定关键词的提示生成的文本中的偏见；（4）将意识形态偏见分为三类：性别、地点和主题。'
- en: '[Tamkin et al. (2021)](#ch23.xhtml#r740) found that GPT-3 exhibited several
    racial, gender, and religious biases, but they also pointed out that it is difficult
    to define what it means to mitigate bias in such LLMs in a universal manner, given
    that appropriate language use is highly contextual. With respect to GPT-3, [Zhao
    et al. (2021)](#ch23.xhtml#r747) found that it was biased toward more-frequent
    answers in the prompt, which is related to a typical issue in machine learning—an
    imbalanced dataset when one class is more common. In a remarkable assessment of
    GPT, Brown and colleagues ([2020](#ch23.xhtml#r682)) reported that because there
    is so much content on the web that sexualizes women, GPT-3 is much more likely
    to place words such as “naughty”, “bubbly,” and “petite” near female pronouns,
    whereas male pronouns would receive at worst adjectives such as “lazy,” “eccentric,”
    or “jolly.” Similarly, “Islam” would more commonly be placed near words like “terrorism,”
    and Blackness would appear to be more negative than corresponding white- or Asian-sounding
    prompts.'
  id: totrans-2790
  prefs: []
  type: TYPE_NORMAL
  zh: '[Tamkin等人（2021）](#ch23.xhtml#r740) 发现 GPT-3 表现出一些种族、性别和宗教偏见，但他们也指出，鉴于适当的语言使用高度具有情境性，在这样的大型语言模型（LLM）中普遍定义减轻偏见是困难的。关于
    GPT-3，[Zhao等人（2021）](#ch23.xhtml#r747) 发现它倾向于在提示中给出更常见的答案，这与机器学习中的一个典型问题相关——当某一类别更常见时，数据集不平衡。在
    GPT 的一个引人注目的评估中，Brown 和同事们 ([2020](#ch23.xhtml#r682)) 报告说，由于互联网上有大量将女性性化的内容，GPT-3
    更有可能将“淘气”、“活泼”和“娇小”等词语与女性代词放在一起，而男性代词则最多只能得到“懒惰”、“古怪”或“快乐”这样的形容词。同样，“伊斯兰”一词更常与“恐怖主义”等词语放在一起，而“黑人”似乎比相应的白人或亚洲口音的提示更具负面含义。'
- en: 15.5 Conclusions
  id: totrans-2791
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 15.5 结论
- en: There is no doubt that ChatGPT holds incredible promise for the future of AI
    in general. As [Schwitzgebel et al. (2022)](#ch23.xhtml#r730) point out, various
    forms of AI can now outperform expert humans not only in fairly mundane ways—for
    example, in games such as Go, poker, and chess (e.g., [Brown and Sandholm 2019](#ch23.xhtml#r681);
    [Jumper et al. 2021](#ch23.xhtml#r701))—but also in domains such as cancer screening
    (e.g., [Potnis et al. 2022](#ch23.xhtml#r727)). But what about the downsides?
    Let’s begin with a non-life-threatening example. As university professors, we
    routinely deal with the complex issue of plagiarism, not only among students but
    on occasion among faculty. Companies such as Turnitin and its subsidiary iThenticate
    have made a fortune since the 1990s in the field of plagiarism detection, but
    they never met ChatGPT.
  id: totrans-2792
  prefs: []
  type: TYPE_NORMAL
  zh: 毫无疑问，ChatGPT 对人工智能（AI）的未来前景具有巨大的潜力。正如 [Schwitzgebel等人（2022）](#ch23.xhtml#r730)
    指出的那样，各种形式的AI现在不仅在相当平凡的方式上——例如，在围棋、扑克和象棋等游戏中（例如，[Brown和Sandholm 2019](#ch23.xhtml#r681)；[Jumper等人
    2021](#ch23.xhtml#r701))——而且在癌症筛查（例如，[Potnis等人 2022](#ch23.xhtml#r727)）等领域的表现已经超过了专家人类。但关于其负面影响呢？让我们从一个非致命性的例子开始。作为大学教授，我们经常处理学生和有时是教师之间的复杂剽窃问题。自1990年代以来，像Turnitin及其子公司iThenticate这样的公司已经在剽窃检测领域赚得盆满钵满，但他们从未遇到过ChatGPT。
- en: It has been our collective experience that whether they cheat or not, most of
    today’s students wouldn’t recognize the veracity, or lack thereof, of the information
    they’re receiving, unless it involved, say, a movie star’s alleged indiscretions,
    in which case they might check its accuracy on a site such as Snopes.com. Academics,
    however, aren’t typically interested in an essay based on “facts” related to movie
    stars but rather on topics such as the reasons behind the siege of the Alamo in
    1836 or the role played by the assassination of Archduke Franz Ferdinand in 1914,
    which lit one of the fuses for World War I. Today’s students have little or no
    realization that AI can make up facts to provide a seemingly coherent answer to
    a question posed—a phenomenon known as “hallucinating” or “stochastic parroting,”
    in which an AI strings together phrases that look real but have no basis in fact
    ([Kissinger et al. 2023](#ch23.xhtml#r704)).
  id: totrans-2793
  prefs: []
  type: TYPE_NORMAL
  zh: 我们共同的体验是，无论学生是否作弊，大多数今天的学生除非涉及到，比如说，电影明星的所谓失态行为，否则他们不会认识到他们所接收信息的真实性或缺乏真实性，在这种情况下，他们可能会在Snopes.com这样的网站上检查其准确性。然而，学者们通常对基于电影明星“事实”的论文不感兴趣，而是对诸如1836年阿拉莫围攻的原因或1914年弗朗茨·斐迪南大公被暗杀在第一次世界大战中所起的作用等主题感兴趣。今天的学生几乎没有意识到AI可以编造事实来对一个提出的问题提供一个看似连贯的答案——这种现象被称为“幻觉”或“随机鹦鹉学舌”，其中AI将看似真实的短语串联起来，但实际上没有任何事实依据
    ([Kissinger et al. 2023](#ch23.xhtml#r704))。
- en: 'AI can appear superhuman or at least to have greatly enhanced cognitive abilities,
    which to a naïve user makes it seem like a “supremely fast and highly articulate
    librarian-scholar coupled with a professorial savant. It facilitates the summary
    and interrogation of the world’s knowledge far more effectively than any existing
    technological or human interface, and it does so with unique comprehensiveness”
    ([Kissinger et al. 2023](#ch23.xhtml#r704): 6). This in turn encourages “unquestioning
    acceptance” of whatever is generated and “a kind of magical atmosphere,” while
    at the same time possessing a “capability to misinform its human users with incorrect
    statements and outright fabrication” (p. 7). The seeming veracity of answers can
    lead to “automation bias”: It came from the bot, which has access to an untold
    wealth of “facts,” so the answers *have* to be correct. [Mollick (2022)](#ch23.xhtml#r715)
    provides the perfect example: Ask AI to describe how we know dinosaurs had a civilization,
    and it will set up a whole set of facts that allegedly explain the case. As Mollick
    points out, it literally doesn’t know what it doesn’t know.'
  id: totrans-2794
  prefs: []
  type: TYPE_NORMAL
  zh: 'AI可以显得超凡脱俗，或者至少拥有极大地增强的认知能力，这对于一个天真无邪的用户来说，使其看起来像是一个“极其快速且高度表达的图书管理员学者，加上一个教授式的智者。它比任何现有的技术或人类界面更有效地总结和质询世界的知识，并且它以独特的全面性做到这一点”
    ([Kissinger et al. 2023](#ch23.xhtml#r704): 6)。这反过来又鼓励了对所生成内容的“无条件的接受”和“一种神奇的氛围”，同时它还拥有“用错误陈述和直接编造的能力来误导其人类用户”
    (p. 7)。答案看似真实可能导致“自动化偏差”：它来自机器人，它能够接触到无法计数的“事实”，所以答案*一定是正确的*。[Mollick (2022)](#ch23.xhtml#r715)提供了一个完美的例子：要求AI描述我们是如何知道恐龙有文明的，它会建立一套据说解释这个案例的事实。正如Mollick所指出的，它实际上不知道它不知道的。'
- en: Cheating on an exam or having AI write a term paper, although serious, ranks
    well behind bias resulting from targeted disinformation, for example, especially
    when it invites violence and character assassination. These forms of bias are
    not new. For example, in Rome around 31 B.C., Octavian, a military official, launched
    a smear campaign against his political enemy, Mark Antony. This effort used, as
    [Kaminska (2017)](#ch23.xhtml#r702) put it, “short, sharp slogans written upon
    coins in the style of archaic tweets.” Octavian’s campaign was built around the
    point that Antony was a soldier gone awry—a philanderer, a womanizer, and a drunk
    not fit to hold office. It worked. Octavian, not Antony, became the first Roman
    emperor, taking the name Augustus Caesar. We know the rest of the story.
  id: totrans-2795
  prefs: []
  type: TYPE_NORMAL
  zh: 考试作弊或让AI写学期论文，虽然严重，但与由针对性虚假信息引起的偏见相比，排名相当靠后，尤其是在它引发暴力和人格诽谤的情况下。这些形式的偏见并不新鲜。例如，在公元前31年左右的罗马，军事官员奥古斯都发起了针对他的政治敌人马克·安东尼的诽谤运动。正如[Kaminska
    (2017)](#ch23.xhtml#r702)所说，这次运动使用了“简短、尖锐的口号”，这些口号以古风推特的形式写在硬币上。奥古斯都的运动围绕着一个观点展开，即安东尼是一个走偏的士兵——一个花心的人，一个玩弄女性的人，一个酒鬼，不适合担任公职。这奏效了。奥古斯都而不是安东尼成为了第一位罗马皇帝，取名奥古斯都·凯撒。我们知道接下来的故事。
- en: In the twenty-first century, however, myriad forms of social media, now with
    the “support” of AI, make manipulation and fabrication of information much simpler.
    Social networks make it easy for uncritical readers to dramatically amplify falsehoods
    peddled by governments, populist politicians, and dishonest businesses. One sobering
    example of the dangers posed by social media we’ve reviewed in detail ([O’Brien
    et al. 2019](#ch23.xhtml#r722); [O’Brien and Alsmadi 2021](#ch23.xhtml#r721))
    involved racial tensions at the University of Missouri in 2015 in the wake of
    a young Black man’s death in Ferguson, Missouri, two hours east of Columbia, the
    home of the university. Black students at Mizzou were rightly concerned, but university
    officials did little to calm their fears. Months of chaos ensued. Adding to the
    chaos was a Twitter message one night that warned campus residents that the Ku
    Klux Klan was in town and had joined the local police to hunt down Black students.
  id: totrans-2796
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在21世纪，无数形式的社会媒体，现在有了“支持”人工智能，使得信息的操纵和伪造变得简单得多。社交网络使得无批判的读者可以轻易地放大政府、民粹主义政治家和不诚实企业散布的虚假信息。我们详细审查的一个令人警醒的例子是，2015年密苏里大学在弗格森一名年轻黑人男性死亡事件之后，社交媒体带来的危险（[O’Brien等人2019](#ch23.xhtml#r722)；[O’Brien和Alsmadi
    2021](#ch23.xhtml#r721)）。在哥伦比亚，密苏里大学东边两小时的地方，黑人学生有理由感到担忧，但大学官员几乎没有做什么来平息他们的恐惧。随之而来的是数月的混乱。加剧混乱的是，一个晚上的一条Twitter消息警告校园居民，三K党已经进城，并与当地警方一起追捕黑人学生。
- en: One user included a photograph of a severely bruised young Black man, claiming
    it was his little brother. A Google reverse image search quickly revealed that
    it was a year-old photo from a racial disturbance in Ohio. Other tweets claimed
    there were widespread shootings, stabbings, and cross burnings. The student-body
    president, a young Black man who fell prey to the hysteria, posted on Facebook
    for students to stay away from the windows in residence halls, that the KKK had
    been sighted on campus. He later rescinded the post, but the damage had already
    been done.
  id: totrans-2797
  prefs: []
  type: TYPE_NORMAL
  zh: 一位用户发布了一张严重瘀伤的年轻黑人男性的照片，声称那是他的弟弟。谷歌反向图片搜索很快揭示出这是一张来自俄亥俄州种族骚乱一年前的照片。其他推文声称发生了广泛的枪击、刺伤和十字架焚烧。学生会主席，一位年轻黑人男性，成为了歇斯底里的受害者，他在Facebook上提醒学生们远离宿舍的窗户，称在校园里发现了三K党。他后来撤回了帖子，但损害已经造成。
- en: 'In the end, it turned out that the hysteria caused by the tweets and retweets
    that fateful night began with Russian trolls, specifically the Internet Research
    Agency, based in St. Petersburg. Their purpose was to toss dynamite into an already
    incendiary situation. Interestingly, that was the first group listed in Special
    Counsel Robert Mueller’s 2018 indictment of Russians charged with meddling in
    the 2016 U.S. presidential election. We can only wonder what would have happened
    if ChatGPT had been around to bolster the sinister dissemination of disinformation
    by Octavian in ancient Rome or by the Russian troll factory in Columbia, Missouri.
    One thing is certain: They would have used it. Threat groups are influenced by
    economic factors such as scalability and ease of deployment, and LLMs offer relatively
    low-cost deployment. Based on their analysis of GPT-2 and analysis of threat actors
    and the landscape, Brown and colleagues (2020: 35) suspected that'
  id: totrans-2798
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，事实证明，那天晚上由推文和转发引发的歇斯底里是由俄罗斯网络水军引起的，特别是位于圣彼得堡的互联网研究机构。他们的目的是在一个已经充满火药味的情况中投下炸药。有趣的是，这是特别检察官罗伯特·穆勒2018年对涉嫌干预2016年美国总统选举的俄罗斯人提出的指控中列出的第一个组织。我们只能想象，如果当时有ChatGPT来加强古罗马奥古斯都时期或密苏里州哥伦比亚的俄罗斯网络水军散布虚假信息的恶意传播，会发生什么。有一点是肯定的：他们会使用它。威胁组织受经济因素影响，如可扩展性和部署的简便性，而大型语言模型提供了相对低成本的部署。根据他们对GPT-2的分析和对威胁行为者和形势的分析，布朗及其同事（2020：35）怀疑
- en: AI researchers will eventually develop language models that are sufficiently
    consistent and steerable that they will be of greater interest to malicious actors.
    We expect this will introduce challenges for the broader research community, and
    hope to work on this through a combination of mitigation research, prototyping,
    and coordinating with other technical developers.
  id: totrans-2799
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: AI研究人员最终会开发出足够一致和可引导的语言模型，这将使恶意行为者对其产生更大的兴趣。我们预计这将给更广泛的研究社区带来挑战，并希望通过缓解研究、原型设计和与其他技术开发商协调来解决这个问题。
- en: The technology behind ChatGPT has much to offer higher education, but it comes
    with potential risks and ethical violations. ChatGPT has, and will always have,
    built-in biases, some potentially much more insidious than others, especially
    as a result of human manipulation. The previous sentence, by the way, is part
    of a much longer response by ChatGPT to a question we posed concerning future
    dangers we might face as the use of bots continues to grow, seemingly exponentially.
    In our classes, we would grade that answer as an A+, although we might have to
    reconsider in light of what GPT-4 can do ([Edwards 2023](#ch23.xhtml#r690)).
  id: totrans-2800
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 背后的技术为高等教育提供了很多，但它也伴随着潜在的风险和道德违规。ChatGPT 已经如此，并将始终如此，内置偏见，其中一些可能比其他一些更为隐蔽，尤其是在人为操纵的结果下。顺便说一句，上一句话是
    ChatGPT 对我们提出的一个关于随着机器人使用持续增长，我们可能面临未来危险的更长时间回答的一部分。在我们的课堂上，我们会给那个答案打 A+，尽管我们可能需要根据
    GPT-4 的能力重新考虑（[Edwards 2023](#ch23.xhtml#r690)）。
