  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**早期人工智能和聊天机器人的历史**'
- en: '****N**ow** ****th**at** ****w**e** ****kn**ow** ****t**he** ****ori**gin**s
    ****o**f** ****t**he** ****to**ols** ****a**nd** ****dev**ice**s ****th**at**
    ****l**ed** ****t**o** ****t**he** ****cre**atio**n ****o**f** ****t**he** ****mo**der**n-****d**ay**
    ****com**pute**r, ****i**t**’****s**** ****ti**me** ****t**o** ****lo**ok** ****a**t**
    ****t**he** ****his**tor**y ****o**f** ****A**I** ****a**nd** ****cha**tbot**s.
    ****W**e**’****l**l** ****con**tinu**e ****o**ur** ****st**ory** ****fr**om**
    ****t**he** ****A**I** ****St**one** ****A**ge** ****t**o** ****t**he** ****mo**der**n
