- en: '****Wel**com**e ****t**o** ****t**he** ****fasc**inatin**g ****wo**rld** ****o**f**
    ****Pr**omp**t ****Engi**neerin**g ! ****A**s** ****arti**ficia**l ****inte**lligen**ce
    ****bec**ome**s ****mo**re** ****a**nd** ****mo**re** ****pre**sen**t ****i**n**
    ****o**ur** ****li**ves**, ****under**standi**ng ****h**ow** ****t**o** ****int**erac**t
    ****wi**th** ****th**ese** ****mo**del**s ****effe**ctivel**y ****h**as** ****be**com**e
    ****a**n** ****esse**ntia**l ****sk**ill**. ****T**he** ****prof**essio**n ****o**f**
    " ****Pr**omp**t ****Ma**ker** " ****i**s** ****t**he** ****an**swe**r ****f**or**
    ****th**ose** ****w**ho** ****wa**nt** ****t**o** ****enh**anc**e ****th**eir**
    ****inte**ractio**ns ****wi**th** ****A**I**, ****cre**atin**g ****ques**tion**s
    ****i**n** ****a**** ****meti**culou**s ****a**nd** ****stru**cture**d ****w**ay**.
    ****Th**is** ****eb**ook** ****i**s** ****a**** ****gu**ide** ****f**or** ****a**ll**
    ****th**ose** ****w**ho** ****wa**nt** ****t**o** ****ma**ste**r ****th**is**
    ****sk**ill**, ****ran**gin**g ****fr**om** ****t**he** ****mo**st** ****ba**sic**
    ****t**o** ****t**he** ****mo**st** ****adv**ance**d ****tech**nique**s. ****He**re**
    ****y**ou** ****wi**ll** ****le**arn** ****h**ow** ****t**o** ****form**ulat**e
    ****t**he** ****be**st** ****pro**mpt**s , ****expa**ndin**g ****yo**ur** ****possi**biliti**es
    ****a**nd** ****ma**kin**g ****t**he** ****mo**st** ****o**f** ****t**he** ****capa**biliti**es
    ****o**f** ****th**ese** ****intel**ligenc**es. ****I**** ****in**vit**e ****y**ou**
    ****t**o** ****exp**lor**e ****th**ese** ****tech**nique**s ****a**nd** ****emp**owe**r
    ****you**rsel**f ****f**or** ****th**is** ****n**ew** ****fu**tur**e ****th**at**
    ****op**ens** ****u**p** ****be**for**e ****u**s**.'
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 欢迎来到提示工程的迷人世界！随着人工智能在我们的生活中越来越普遍，了解如何有效地与这些模型互动已经成为一项基本技能。"提示工程师"这一职业是为那些想要增强与AI互动的人提供的解决方案，通过以细致和结构化的方式提出问题。这本书是为所有想要掌握这项技能的人提供的指南，从最基础的技术到最先进的技术。在这里，你将学习如何制定最佳的提示，扩展你的可能性，并最大限度地发挥这些智能的能力。我邀请你探索这些技术，并为自己在这个新未来中赋予力量，它为我们打开了新的可能性。
