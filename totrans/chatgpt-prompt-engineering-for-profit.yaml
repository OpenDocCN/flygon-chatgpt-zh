    ****a**** ****coh**esiv**e ****sol**utio**n.'
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: '****共识构建提示与角色反转提示的区别在于，它旨在将不同的观点汇聚在一起并找到共同点，而不是仅仅反转观点和探索不同的视角。角色反转提示旨在理解不同的观点，而共识构建提示旨在将这些观点统一成一个连贯的解决方案。'
- en: '****Com**pare**d ****t**o** ****Comp**arativ**e ****Prom**ptin**g , ****wh**ich**
    ****si**mpl**y ****com**pare**s ****a**nd** ****cont**rast**s ****t**wo** ****ele**ment**s,
    ****Cons**ensu**s ****Bui**ldin**g ****Prom**ptin**g ****go**es** ****be**yon**d
    ****comp**ariso**n ****a**nd** ****se**eks** ****t**o** ****inte**grat**e ****pers**pectiv**es
    ****t**o** ****cr**eat**e ****a**** ****sol**utio**n ****th**at** ****i**s** ****mut**uall**y
    ****acce**ptabl**e ****t**o** ****a**ll** ****par**tie**s. ****I**t** ****i**s**
    ****ab**out** ****fin**din**g ****har**mon**y ****bet**wee**n ****opp**osin**g
    ****vi**ews**, ****n**ot** ****ju**st** ****iden**tifyin**g ****th**em**.'
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: 与简单的比较提示相比，比较提示只是比较和对比两个元素，共识构建提示则超越了比较，寻求整合视角以创造一个所有各方都接受的解决方案。它关于在对立观点之间找到和谐，而不仅仅是识别它们。
- en: '****I**n** ****rel**atio**n ****t**o** ****Fee**dbac**k ****Lo**op** ****Prom**ptin**g
    , ****wh**ich** ****foc**use**s ****o**n** ****impr**ovin**g ****a**** ****res**pons**e
    ****thr**oug**h ****cont**inuou**s ****revi**sion**s, ****Cons**ensu**s ****Bui**ldin**g
    ****i**s** ****mo**re** ****foc**use**d ****o**n** ****inte**gratin**g ****mul**tipl**e
    ****opi**nion**s ****simul**taneous**ly, ****ai**min**g ****f**or** ****a****
    ****si**ngl**e ****sol**utio**n ****o**r** ****co**mmo**n ****under**standi**ng.'
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于反馈循环促进，它侧重于通过持续修订来改进响应**，共识构建则更侧重于同时整合多个观点，旨在达成单一解决方案或共同理解。'
