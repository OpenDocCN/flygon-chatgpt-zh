  prefs: []
  type: TYPE_NORMAL
  zh: '**Transformer** 架构，由2017年发表的标志性研究论文《**注意力即是全部所需**》引入，是 **GPT** 模型的基石之一，也是机器学习历史上最重要的创新之一。在
    **Transformer** 出现之前，语言模型依赖于循环神经网络（**RNN**）和卷积神经网络（**CNN**），这些模型在处理长文本和复杂词语关系方面存在显著的局限性。'
