- en: About the Authors
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Thomas Carroll is currently a professional software developer. After spending
    almost a decade working as a teacher in a prestigious school in his hometown,
    he decides to devote herself to his greatest passion, programming. Having dedicated
    his initial working life to teaching, he decided, in addition to teaching through
    private courses, to write some programming books for beginners. If you want to
    know more about programming and machine learning I can help you.
  prefs: []
  type: TYPE_NORMAL
