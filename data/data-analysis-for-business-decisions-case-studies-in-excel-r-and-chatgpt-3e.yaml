  zh: 提示： “创建每个商店（比萨、面包店、鞋店、礼品店和宠物店）的成本描述性分析，并将详细结果保存到 Excel 文件中。然后，创建多个箱线图来可视化各种成本之间的显著差异，并添加注释以比较均值，同时在箱线图上显示
    ANOVA 分析（组间）结果。”
