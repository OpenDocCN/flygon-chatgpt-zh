    'com.squareup.okio:okio-jvm:3.2.0'    // Slack SDK libraries    implementation
    'com.slack.api:slack-api-client:1.30.0'    implementation 'com.slack.api:slack-api-model:1.30.0'    //
    SLF4J logging facade    implementation 'org.slf4j:slf4j-api:2.0.7'}compileKotlin
    {    kotlinOptions {        jvmTarget = "1.8"    }}compileTestKotlin {    kotlinOptions
    {        jvmTarget = "1.8"    }}Listing 3-15
  prefs: []
  type: TYPE_NORMAL
- en: Gradle build.gradle
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have our access token, as well as all of our necessary dependencies,
    let’s look at the code necessary in order to access a channel and grab all the
    chat history within a specified time range. For obvious purposes, we want the
    user name, timestamp, and message content of each posting in the channel.
  prefs: []
  type: TYPE_NORMAL
- en: Programmatically Reading Messages from Slack with ChannelReaderSlackBot.java
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Listing [3-16](#PC17) is a simple Java Slack Bot that obtains the user name,
    timestamp, and message content of each posting in the channel within a designated
    time period.import com.slack.api.Slack;import com.slack.api.methods.MethodsClient;import
    com.slack.api.methods.request.conversations.ConversationsHistoryRequest;import
    com.slack.api.methods.response.conversations.ConversationsHistoryResponse;import
    com.slack.api.methods.request.users.UsersInfoRequest;import com.slack.api.methods.response.users.UsersInfoResponse;import
    com.slack.api.model.Message;import com.slack.api.model.User;import com.slack.api.model.block.LayoutBlock;import
    java.time.*;import java.util.Collections;import java.util.List;public class ChannelReaderSlackBot
    {        private static final String SLACK_BOT_TOKEN = "YOUR_SLACK_API_TOKEN";        public
    static void main(String[] args) {        Slack slack = Slack.getInstance();        MethodsClient
    methods = slack.methods(SLACK_BOT_TOKEN);        String channelId = "YOUR_CHANNEL_ID";        LocalDateTime
    startTimeUTC = LocalDateTime.of(2023, Month.AUGUST, 3, 10, 0);        LocalDateTime
    endTimeUTC = LocalDateTime.of(2023, Month.AUGUST, 12, 15, 0);        long startTime
    = startTimeUTC.atZone(ZoneOffset.UTC).toEpochSecond();        long endTime = endTimeUTC.atZone(ZoneOffset.UTC).toEpochSecond();        ConversationsHistoryRequest
    request = ConversationsHistoryRequest.builder()            .channel(channelId)            .oldest(String.valueOf(startTime))            .latest(String.valueOf(endTime))            .build();        try
    {            ConversationsHistoryResponse response = methods.conversationsHistory(request);            if
    (response != null && response.isOk()) {                List<Message> messages
    = response.getMessages();                Collections.reverse(messages);                for
    (Message message : messages) {                    String userId = message.getUser();                    String
    timestamp = formatTimestamp(message.getTs());                    UsersInfoRequest
    userInfoRequest = UsersInfoRequest.builder()                        .user(userId)                        .build();                    UsersInfoResponse
    userInfoResponse = methods.usersInfo(userInfoRequest);                    if (userInfoResponse
    != null && userInfoResponse.isOk()) {                        User user = userInfoResponse.getUser();                        System.out.println("User:
    " + user.getName());                        System.out.println("Timestamp: " +
    timestamp);                        System.out.println("Message: " + message.getText());                        System.out.println();                    }                }            }
    else {                System.out.println("Failed to fetch messages: " + response.getError());            }        }
    catch (Exception e) {            e.printStackTrace();        }    }    private
    static String formatTimestamp(String ts) {        double timestamp = Double.parseDouble(ts);        Instant
    instant = Instant.ofEpochSecond((long) timestamp);        LocalDateTime dateTime
    = LocalDateTime.ofInstant(instant, ZoneOffset.UTC);        return dateTime.toString();    }}Listing
    3-16'
  prefs: []
  type: TYPE_NORMAL
- en: ChannelReaderSlackBot.java
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you should replace “YOUR_SLACK_API_TOKEN” with your actual Slack
    API token and “YOUR_CHANNEL_ID” with the ID of the Slack channel you want to read
    the messages from.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to do something very basic, the Slack Java API is actually quite
    simple to use. You can’t do anything without first getting an instance of the
    “Slack” class itself using the static call “Slack.getInstance()” method. This
    connects to the underlying Slack API infrastructure allowing you to interact with
    the exposed methods and retrieve the information that we want.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we need an instance of the “MethodsClient” class by invoking the “slack.methods()”
    method, where we provide our access token.
  prefs: []
  type: TYPE_NORMAL
- en: In order to retrieve the chat history, we use the ConversationsHistoryRequest
    class which is another class provided by the Slack API. Here, all you need to
    do is specify the desired channel ID, the oldest timestamp, and the latest timestamp
    to define the time range for the chat history. In this example, we retrieve messages
    from August 3, 2023, at 10:00 to August 12, 2023, at 15:00\. Easy peasy.
  prefs: []
  type: TYPE_NORMAL
- en: 'Listing [3-17](#PC18) shows the output after executing ChannelReaderSlackBot.java,
    which is truncated here since you already have the full text in Listing [3-5](#PC5)
    earlier in this chapter.Fatima [2023-08-11T09:04:20] : Hey everyone, I have an
    urgent issue to discuss. I just got off a call with a client who''s experiencing
    app crashes as soon as they load it. They''re really frustrated. Can we get this
    sorted ASAP? :tired_face:Keith [2023-08-11T09:04:35] : Thanks for bringing this
    to our attention, Fatima. Let''s jump on this right away. John, can you take the
    lead in investigating the issue since our architect is out sick today?John [2023-08-11T09:04:52]
    : Sure thing, Keith. I''ll dive into the codebase and see if I can find any potential
    culprits for the crashes.John [2023-08-11T09:05:30] : Fatima, could you gather
    some additional information from the client? Ask them about the specific device,
    operating system, and any recent updates they might have installed....Listing
    3-17'
  prefs: []
  type: TYPE_NORMAL
- en: The Output from Executing ChannelReaderSlackBot.java
  prefs: []
  type: TYPE_NORMAL
- en: Exercises Left for the Reader
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'So, there are obviously a few additional things we can do here, and these steps
    will be left for you (the reader) to accomplish, for example:'
  prefs: []
  type: TYPE_NORMAL
- en: Making the ChatGPTClient.java (the related classes) to be even more safe for
    novice users. For example, for ChatGPT, the valid value for the top P parameter
    is only between 0 and 1\. The constructor for the Chat.java class should throw
    an Exception if the user specifies anything that is beyond the range of any valid
    values.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Connecting the code in ChannelReaderSlackBot.java that reads the messages from
    Slack to the ChatGPTClient.java so that grabbing the messages and getting a summary
    is a single step process.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adding more capabilities to the Slack bot itself such as adding commands so
    that anyone in the channel can request a summary. In its current state, the bot
    doesn’t post anything in the channel. However, the “user interface” to the bot
    is the channel itself; therefore, someone should be able to interact with the
    Slack bot by typing a command (such as requesting a summary).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Making sure that the bot doesn’t make a bad situation worse. Whenever the bot
    provides a summary, it should not post in the channel itself because that could
    add a lot of noise to an already noisy situation. The best practice is to have
    the bot send a private message to the person asking for a summary (or whatever
    new command that you create).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, we talked about one of the various ways artificial intelligence
    can be put to practical use within the enterprise today. We showed you how to
    improve upon our ChatGPTClient.java application by utilizing the builder pattern
    in order to allow constructing your class to be a lot more flexible than what
    was in the previous chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Most notably, however, we discussed what is truly “prompt engineering,” by discussing
    that prompt engineering cannot be accomplished by simply textual input to ChatGPT
    alone. You definitely need to understand the ramifications of all the input parameters
    to the ChatGPT API, in order to properly, and effectively, perform prompt engineering.
  prefs: []
  type: TYPE_NORMAL
- en: Using what we learned about prompt engineering, we were able to successfully
    obtain summarizations of any large body of text provided to us. Finally, we saw
    the code necessary in order to run an automated bot that will grab messages from
    any Slack channel programmatically, if we specify a valid date range.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter (as well as the previous chapter), we were working exclusively
    with the Chat Completions Endpoint of the OpenAI APIs. In the next chapter, we’re
    going to push the boundaries of what’s possible by experimenting with the Whisper
    and DALL·E Endpoints.
  prefs: []
  type: TYPE_NORMAL
