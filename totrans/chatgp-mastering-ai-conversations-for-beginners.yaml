    ****as**ked** ****i**t** ****t**o** ****ch**eck** ****h**is** ****cal**enda**r
    ****f**or** ****h**im** ****a**nd** ****fi**nd** ****a**** ****ti**me** ****sl**ot**
    ****i**n** ****h**is** ****bu**sy** ****sch**edul**e ****th**at** ****co**uld**
    ****b**e** ****us**ed** ****f**or** ****t**he** ****appo**intmen**t. ****B**ut**
    ****Cha**tGP**T ****w**as** ****un**abl**e ****t**o** ****d**o** ****th**is**
    ****f**or** ****h**im** ****bec**aus**e, ****a**t** ****pre**sen**t, ****i**t**
    ****i**sn**’****t**** ****cap**abl**e ****o**f** ****acce**ssin**g ****pe**opl**e’****s****
    ****cale**ndar**s (****rem**embe**r ****wh**at** ****w**e** ****sa**id** ****ear**lie**r
    ****ab**out** ****gene**rativ**e ****A**I** ****n**ot** ****act**uall**y ****be**ing**
    ****ab**le** ****t**o** ****ac**ces**s ****t**he** ****re**al**-****ti**me** ****int**erne**t).
    ****B**ut** ****fe**ar** ****n**ot**, ****a**s** ****Op**enA**I ****i**s** ****act**ivel**y
    ****wor**kin**g ****t**o** ****so**lve** ****th**is** ****pit**fal**l ****b**y**
    ****tea**min**g ****u**p** ****wi**th** ****th**ird**-****pa**rty** ****ser**vic**e
    ****comp**anie**s ****su**ch** ****a**s** ****Exp**edi**a, ****Inst**acar**t,
    ****a**nd** ****Open**Tabl**e. ****Thr**oug**h ****th**ese** ****part**nershi**ps,
    ****Cha**tGP**T ****wi**ll** ****b**e** ****ab**le** ****t**o** ****ac**ces**s
    ****yo**ur** ****int**erne**t ****v**ia** ****a**** ****pl**ug**-****i**n**. ****Th**is**
    ****i**s** ****ju**st** ****t**he** ****i**n**-****bet**wee**n ****o**f** ****Op**enA**I’****s****
    ****tr**ue** ****go**al** ****i**n** ****t**he** ****fi**eld** ****o**f** ****cal**enda**r
    ****set**tin**g, ****wh**ich** ****i**s** ****t**o** ****g**et** ****Cha**tGP**T
    ****wor**kin**g ****dir**ectl**y ****wi**th** ****cal**enda**r ****ap**ps** (****Ch**en**,
    ****20**23**).'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 陈告诉聊天机器人他需要去看牙医，并让它帮他查看日程，找到一个可以用来预约的时间空档。但是，ChatGPT无法为他做这件事，因为目前它还无法访问人们的日程表（记得我们之前关于生成式AI实际上无法访问实时互联网的讨论）。但是，不用担心，OpenAI正在积极努力解决这个缺陷，通过与第三方服务公司如Expedia、Instacart和OpenTable等合作。通过这些合作伙伴关系，ChatGPT将能够通过插件访问你的互联网。这正是OpenAI在日历设置领域的真正目标，即让ChatGPT能够直接与日历应用（陈，2023）协同工作。
