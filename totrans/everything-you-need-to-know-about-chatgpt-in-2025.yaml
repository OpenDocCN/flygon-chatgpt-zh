  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，道德和社会技能的发展将具有至关重要的意义。员工不仅需要理解如何使用人工智能，还需要了解如何管理其道德影响。隐私、算法偏差以及人工智能使用中的公平性都是需要持续反思的问题，从业者必须具备批判性和负责任地解决这些问题的能力。
- en: '****T****h**e** ****Bal**a**n**ce** ****Bet**w**e**en** ****Auto**m**at**ion**
