- en: 2The Shift to Artificial Intelligence, ChatGPT, and Emerging Technologies in
    EducationA Review on Dominant Issues
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Kingsley Ofosu-Ampong, Emmanuel Atebawone, Abdulsalam Salihu Mustafa, and Anthony
    Koomson
  prefs: []
  type: TYPE_NORMAL
- en: 'DOI: [10.1201/9781032716350-2](http://doi.org/10.1201/9781032716350-2)'
  prefs: []
  type: TYPE_NORMAL
- en: 2.1 Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The use of artificial intelligence (AI) in education has emerged as an increasingly
    popular topic in recent times, as researchers explore the potential of these technologies
    to revolutionize teaching and learning practices ([Ofosu-Ampong et al., 2023](#ch10.xhtml#r079)).
    This reflects a growing awareness of AI’s capacity to offer innovative solutions
    to educational challenges, including personalized learning experiences, adaptive
    assessment tools, and intelligent tutoring systems (ITSs). While there is mounting
    evidence that these technologies can enhance student learning outcomes, further
    research is required to establish their effectiveness and validity, particularly
    in various educational settings and among diverse student populations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Since its conceptualization ([Stahl, 2022](#ch10.xhtml#r091); [Li & Gu, 2023](#ch10.xhtml#r062)),
    research on AI in education has gained significant popularity across multiple
    disciplines. In practical terms, the concept of AI in education research aims
    to leverage external resources to meet the increasing demands of teachers and
    students. Therefore, to advance AI in education research, it is crucial to conduct
    a critical scoping review of existing studies to uncover: (a) areas or themes
    that have received less attention, (b) methods, theories, and AI techniques employed
    in previous research, and key areas for future research. Furthermore, as these
    technologies become more pervasive in educational settings, it is important to
    carefully consider their potential impact on privacy, desired outcomes, level
    of automation, effectiveness, and how to demonstrate AI in education ([Su & Yang,
    2023](#ch10.xhtml#r092)). Additionally, several papers highlight the need for
    more research on issues of AI on student motivation and engagement ([Chan, 2023](#ch10.xhtml#r026)).
    Although some evidence suggests that AI-based technologies can improve student
    motivation and engagement ([Al Darayseh, 2023](#ch10.xhtml#r018); [Ofosu-Ampong,
    2024b](#ch10.xhtml#r077)), research is needed to fully understand how these technologies,
    including their strengths, weaknesses, opportunities, and threats, impact student
    attitudes toward learning and their overall learning experiences and concerns.'
  prefs: []
  type: TYPE_NORMAL
- en: The existing literature on AI in education studies lacks comprehensive and systematic
    reviews on AI development phases, ChatGPT, and emerging technologies ([Li & Gu,
    2023](#ch10.xhtml#r062)). In this regard, conducting a thorough review of the
    available literature on AI in education research is necessary for several reasons.
    Firstly, it allows us to evaluate the current state of research in this area,
    identifying the extent of studies that have already been undertaken and potential
    gaps for future investigations. Secondly, such a review will contribute to a deeper
    understanding of the concept of AI in education research and stimulate further
    scholarly inquiry.
  prefs: []
  type: TYPE_NORMAL
- en: In light of these considerations, this study aims to provide a comprehensive
    review of AI in education research by synthesizing and analyzing existing studies.
    By doing so, we aim to develop a framework highlighting the key themes, methodologies,
    and theories employed in previous investigations. This review will serve as a
    valuable resource for researchers and educators interested in AI in education,
    guiding their future studies and facilitating a more nuanced understanding of
    this important field. The main research objectives motivating this review are
  prefs: []
  type: TYPE_NORMAL
- en: '*To identify theories, methodologies, and AI techniques that have informed
    prior AI education research*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*To examine the emerging themes investigated in previous studies and identify
    the SWOT analysis for AI education research*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*To explore the technological roadmap for emerging technologies for the future
    of education*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*To explore the gaps that exist in current human–AI interaction in education
    research that future studies can investigate*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Overall, this review chapter highlights the importance of continued research
    and development of AI-based technologies in education, as well as the need for
    careful consideration of their ethical and social implications. By leveraging
    the potential of AI while addressing these challenges, we can work toward creating
    more equitable, engaging, and effective learning environments for all students.
    The next section focuses on the literature review, while the subsequent sections
    form the research methodology and results, respectively. The review concludes
    with the future of human–AI interaction in education and suggestions.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2 Literature Review
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 2.2.1 An Overview of Using AI in Education
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AI in education is a relatively new phenomenon that has been gaining increasing
    attention over the past few decades. It has the potential to address some of the
    educational challenges today. The first documented use of AI in education dates
    to the 1960s, when researchers at Stanford University created the first computer-based
    instructional system called Project One ([Brown & VanLehn, 1980](#ch10.xhtml#r022)).
    This system was designed to provide individualized instruction to students based
    on their learning needs and progress. Since then, AI has been used in various
    ways to enhance the teaching and learning process. In the 1980s, ITSs were developed,
    which were designed to provide personalized learning ([Wenger, 1987](#ch10.xhtml#r100))
    to students by using rule-based systems, expert systems, and learning algorithms
    to analyze student data and adjust instruction accordingly. This personalized
    approach aimed to enhance student engagement, motivation, and, ultimately, learning
    outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: In the 1990s and 2000s, researchers began exploring the use of natural language
    processing (NLP) to create conversational agents, or chatbots, to provide support
    to students ([Joshi, 1991](#ch10.xhtml#r054)). Chatbots can provide immediate
    feedback to students and help them with their assignments, homework, and exams.
    Recently, AI has been used to develop intelligent educational games – gamification,
    virtual reality (VR) and augmented reality (AR) learning environments, and adaptive
    learning systems ([Elfarri et al., 2023](#ch10.xhtml#r034); [Akgun & Greenhow,
    2022](#ch10.xhtml#r017); [Ofosu-Ampong, 2020](#ch10.xhtml#r073)). These technologies
    are designed to engage students in more interactive and personalized learning
    experiences and provide educators with insights into student learning patterns
    and behaviors ([Mustafa et al. 2022](#ch10.xhtml#r072)).
  prefs: []
  type: TYPE_NORMAL
- en: Currently, AI in education is being used in a wide range of applications, from
    providing personalized learning experiences to students and automating administrative
    tasks for educators, to creating new educational tools and resources for classrooms.
    As AI continues to evolve, it can potentially transform the way we teach and learn
    ([Rahiman & Kodikal, 2024](#ch10.xhtml#r083)), making education more accessible,
    efficient, and effective for students of all ages and backgrounds. Thus, AI’s
    impact on education will likely be profound with its advancement.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.2 Problems Associated with AI Systems in Education
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are several problems associated with the application of AI in education.
    These challenges and problems range from lack of transparency to unintended consequences
    ([Ivanov, 2023](#ch10.xhtml#r053)). For instance, [Bolukbasi et al. (2016)](#ch10.xhtml#r020)
    found that AI systems can be biased based on the data used to train them, leading
    to discriminatory outcomes. Additionally, [Mittelstadt et al. (2016)](#ch10.xhtml#r071)
    postulated that AI systems can be complex, making it difficult to understand how
    they reach their decisions. There is also a risk of overreliance on technology
    – therefore, AI systems are not a replacement for human teachers and should not
    be relied on solely to deliver education ([Selwyn, 2019](#ch10.xhtml#r089)). Further,
    implementing AI systems can be expensive, making it difficult for some educational
    institutions to adopt ([Zawacki-Richter et al. 2019](#ch10.xhtml#r102)). Notwithstanding
    the issues with ethical concerns – the use of AI in education raises ethical concerns
    around privacy, data protection, and the responsible or ethical use of technology
    ([Floridi & Cowls, 2019](#ch10.xhtml#r038)). Moreover, the implementation and
    maintenance of AI systems require specialized knowledge and skills that may not
    be readily available in educational institutions. It is important to note that
    AI systems may not be suitable for all types of education, and their effectiveness
    may be limited to specific domains ([Liao et al., 2018](#ch10.xhtml#r064)). Lastly,
    the use of AI in education may have unintended consequences that are difficult
    to predict, such as changes in student behavior or the devaluation of certain
    skills ([Gulson & Sellar, 2024](#ch10.xhtml#r046); [Ofosu-Ampong et al. 2023](#ch10.xhtml#r079)).
    These skills could include critical thinking, problem solving, creativity, collaboration,
    or communication.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.3 Possible Solutions for AI Problems
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are several possible solutions to the problems associated with AI in education.
    One solution is to make AI systems more transparent and explainable (i.e. *enhancing
    transparency and explainability of AI systems*) so that students and teachers
    can understand how these systems operate and generate recommendations. This can
    be achieved through techniques such as model interpretability and visualizations
    ([Schaub et al., 2020](#ch10.xhtml#r088)). With the issue of bias, inequalities,
    and discrimination in AI systems ([Joyce et al. 2021](#ch10.xhtml#r055)), it is
    essential to ensure that the training data is diverse and representative of the
    population. Additionally, bias detection and mitigation techniques can be applied
    to AI systems to address these issues ([Holstein et al. 2019](#ch10.xhtml#r050)).
    To safeguard data privacy and security in education, it is important to implement
    strong data protection policies and techniques, such as data encryption and access
    control measures ([Magen-Nagar & Tal, 2020](#ch10.xhtml#r066)). Moreover, as AI
    becomes more prevalent in education, it is critical to address ethical concerns
    such as bias and discrimination. This can be achieved by implementing transparency
    and accountability measures. Collaboration and communication between stakeholders,
    including educators, policymakers, and technologists, can help ensure that AI
    systems are designed and used ethically and responsibly ([van der Klink et al.,
    2020](#ch10.xhtml#r095)). Investing in teacher training would be a key solution
    in the future. Teacher training can assist educators in understanding how to effectively
    use AI systems in the classroom and address any ethical concerns that may arise
    ([Magen-Nagar & Tal, 2020](#ch10.xhtml#r066)).
  prefs: []
  type: TYPE_NORMAL
- en: 2.3 Research Methodology
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The review study tries to understand the importance, context, and impact of
    AI and emerging technologies in education. The papers reviewed (*n* = 32 articles)
    represent a diverse set of studies on AI, ChatGPT, and emerging technologies in
    education. The studies were published in various academic journals and conference
    proceedings, demonstrating the growing interest in the field of AI and education.
    The selected studies employed a range of methodologies, including experimental
    studies, case studies, and literature reviews. Hence, highlighting the breadth
    of research methods used to investigate the efficacy of AI in education. Additionally,
    the studies were conducted in various countries around the world, suggesting that
    the application of AI education is a global phenomenon.
  prefs: []
  type: TYPE_NORMAL
- en: The present study assesses and synthesizes the themes, methods, and frameworks
    applied in AI education research. After identifying the problem, a literature
    search and screening for inclusion were conducted. The focus was to summarize
    previous knowledge and generate research questions and a working definition of
    AI education research. Briefly, 32 accessible articles were shortlisted, for data
    analysis and interpretation. [Figure 2.1](#ch10.xhtml#f1) provides an overview
    of the search and selection process.
  prefs: []
  type: TYPE_NORMAL
- en: '![A diagram with two sections. Search section at top includes databases and
    keywords, with a timespan from 2019 to 2023\. Selection section at the bottom
    states that articles were chosen based on search. It includes papers that discuss
    A I and education and excludes those that do not. A textbox reads, N = 42 articles
    on A I and education.](html/images/9781032716084_C002_001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.1](#ch10.xhtml#f1b) Search and selection process.'
  prefs: []
  type: TYPE_NORMAL
- en: 2.4 Results
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 2.4.1 Theories Used in AI Education Research
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This subsection addresses research objective 1 (RO1) of the chapter, focusing
    on examining the theoretical underpinnings found in the sampled papers. The findings
    reveal that 56.2% of the publications did not utilize any theory, leading us to
    categorize these articles under the “no theory” category. Among the articles that
    employed theories, the technology acceptance-related theories (e.g. unified theory
    of acceptance and use of theory, innovation diffusion theory, and technology-organization-environment)
    exhibited the highest usage at 28.1%, followed by the self-determination theory
    (3.1%), collaborative learning theory (3.1%), and adapting learning theory (3.1%).
    Other theories, such as situated learning theory, learning style, actor-network
    theory, and personalized learning theory accounted for 6.3%.
  prefs: []
  type: TYPE_NORMAL
- en: 'The analysis brings forth two significant revelations: (a) the majority of
    AI studies involve proposed theoretical frameworks, and personalized and learning
    algorithms models with a focus on bi-directional theory, (b) most studies do not
    use theories and adopt methodological frameworks and AI research lacks specific
    theories. These findings can be attributed to the AI concept’s relative newness
    and the common practice of borrowing theories from other fields. Despite AI’s
    novelty, it is imperative for researchers to actively work toward developing theories
    that make substantial contributions to the advancement of the research area.'
  prefs: []
  type: TYPE_NORMAL
- en: 2.4.1.1 Methodologies Used in AI Education Research
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: This section presents the findings on the methodologies used in AI in education
    research and addresses research objective 2 (RO2). The review employed [Alavi
    and Carlson’s (1992)](#ch10.xhtml#r019) research strategy classification due to
    its comprehensive coverage of research methodologies, and methods. The findings
    reveal that a significant portion of AI education research is conceptual (34.4%).
    The problem with these conceptual studies is that they lack applicability, effectiveness,
    and real-world performance due to the absence of testing. While this is a concern,
    it can be attributed to the relatively new field of AI education research and
    the challenges in accessing empirical data.
  prefs: []
  type: TYPE_NORMAL
- en: Regarding empirical studies, the controlled experiment and simulation method
    (25%), case study method (15.6%), and survey method (15.6%) emerge as the most
    commonly used approaches within the qualitative and quantitative methodologies.
    The results indicate a preference for quantitative approaches in AI education
    research. One possible explanation for the limited use of other qualitative methods
    is its subjectivity and openness to multiple interpretations with statistical-based
    AI output. Consequently, the case study method appears to be the most suitable
    option for exploring and interpreting AI education data.
  prefs: []
  type: TYPE_NORMAL
- en: 2.4.1.2 AI techniques
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: This section presents the findings on the AI techniques used in developing AI
    in education. The findings reveal that a significant number (46.8%) of AI research
    uses neural networks, fuzzy logic, and support vector machines (SVMs). Other AI
    techniques used include teachable agent and reinforcement learning and machine
    learning (ML) (12.5%), Naïve Bayes and decision trees (12.5%), evolutionary algorithm,
    expert model and syntactic analysis (6.3%), logistic regression, linear online
    algorithm, regression (12.5%), and binary classification, semantic web (9.4%).
    The results generally indicate a preference for ML as a composite for neural networks,
    SVM, and decision trees. Consequently, neural networks and fuzzy logic appear
    to be the most suitable AI techniques used in AI education research.
  prefs: []
  type: TYPE_NORMAL
- en: 2.4.1.3 Themes in AI Education Research
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'This section highlights the findings of the literature review under the following
    subsections: (a) the development phase of AI, (b) the application of ChatGPT,
    (c) SWOT analysis of AI, (d) the impact of AI in education, and (e) human–AI interaction
    (see [Table 2.1](#ch10.xhtml#t2)).'
  prefs: []
  type: TYPE_NORMAL
