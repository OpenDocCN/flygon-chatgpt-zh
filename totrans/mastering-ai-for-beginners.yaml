  zh: 第15页：你的第一个迷你AI项目 – 从想法到执行
- en: Now that you’ve explored tools and concepts, let’s create your first AI-based
    project. It doesn’t need to be complicated — the goal is to apply what you’ve
    learned and showcase your creativity.
  id: totrans-286
