- en: Batching and Consistency
  id: totrans-337
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 批量和一致性
- en: 'Need a **batch of images** for a blog series or launch? Use Prompt stacking
    to create related images. In this example, let’s create three header images for
    a blog about my books about walking the Camino: dawn on the Camino, cathedral
    arrival, trail map and pilgrim essentials.'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 需要为博客系列或发布活动准备一批图片吗？使用提示堆叠来创建相关图片。在这个例子中，让我们为关于我关于徒步朝圣的书籍的博客创建三张标题图片：朝圣之路的黎明、大教堂到达、小径地图和朝圣者必备物品。
- en: In this example, we will ask ChatGPT to create a set of three images for a blog
    about Walking the Camino, that is the theme of a few of my books.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将要求ChatGPT为关于徒步朝圣的博客创建三张图片，这是我的几本书的主题。
- en: 'Prompt:'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '*Create three different header images for a blog about walking the Camino.
    Make one have a set of pilgrim essentials such as backpack, trekking poles, water
    bottle, scallop shell blank credential. One should show a pilgrim walking on a
    quiet path, there is a Camino market beside the road. The other should show the
    pilgrim joyfully arriving at the Cathedral de Santiago. No text.*'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: '*为关于徒步朝圣的博客创建三张不同的标题图片。其中一张应包含朝圣者必备物品，如背包、徒步杖、水瓶、扇贝壳空白凭证。另一张应展示朝圣者在安静的小路上行走，路边有一个朝圣之路的市场。另一张应展示朝圣者快乐地到达圣地亚哥大教堂。无文字。*'
- en: What happens is that ChatGPT will generate one at a time. I used this opportunity
    to tweak the images.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 发生的事情是ChatGPT会一次生成一张。我利用这个机会调整了图片。
- en: '**Blog post 1**'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: '**博客文章1**'
- en: '![Create three different header images for a blog about walking the Camino.
    Make one have a set of pilgrim essentials such as backpack, trekking poles, water
    bottle, scallop shell blank credential. One should show a pilgrim walking on a
    quiet path, there is a Camino marker beside the road. The other should show the
    pilgrim joyfully arriving at the Cathedral de Santiago. No text.](Image00029.jpg)'
  id: totrans-344
  prefs: []
  type: TYPE_IMG
  zh: '![为关于徒步朝圣的博客创建三张不同的标题图片。其中一张应包含朝圣者必备物品，如背包、徒步杖、水瓶、扇贝壳空白凭证。另一张应展示朝圣者在安静的小路上行走，路边有一个朝圣之路的标记。另一张应展示朝圣者快乐地到达圣地亚哥大教堂。无文字。](Image00029.jpg)'
- en: '**Blog post 2**'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: '**博客文章2**'
- en: I had some conversation around this, as I had misspelled a word –
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 我就这件事进行了一些讨论，因为我拼错了一个单词 -
- en: Note – “One should show a pilgrim walking on a quiet path, there is a Camino
    market beside the road.”
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 注意 - “其中一张应展示朝圣者在安静的小路上行走，路边有一个朝圣之路的市场。”
- en: See how I wrote market instead of “marker”? So, Chat gave me this. I had not
    asked for the footer.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 看看我是如何把“market”写成“marker”的？所以，Chat给了我这个。我没有要求页脚。
- en: '![Create three different header images for a blog about walking the Camino.
    Make one have a set of pilgrim essentials such as backpack, trekking poles, water
    bottle, scallop shell blank credential. One should show a pilgrim walking on a
    quiet path, there is a Camino market beside the road. The other should show the
    pilgrim joyfully arriving at the Cathedral de Santiago. No text.](Image00030.jpg)'
  id: totrans-349
  prefs: []
  type: TYPE_IMG
  zh: '![为关于徒步朝圣的博客创建三张不同的标题图片。其中一张应包含朝圣者必备物品，如背包、徒步杖、水瓶、扇贝壳空白凭证。另一张应展示朝圣者在安静的小路上行走，路边有一个朝圣之路的市场。另一张应展示朝圣者快乐地到达圣地亚哥大教堂。无文字。](Image00030.jpg)'
- en: '*So, I had to prompt again*'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: '*所以我不得不再次提示*'
- en: Prompt –
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 -
- en: '*Remove the stall please but keep the marker.*'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: '*请移除摊位但保留标记。*'
- en: This is great!
  id: totrans-353
