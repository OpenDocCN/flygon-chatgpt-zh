- en: '[1](15580-0004.xhtml#en1r). W. Liang, Z. Izzo, Y. Zhang, H. Lepp, H. Cao, X.
    Zhao, et al., “Monitoring AI-Modified Content at Scale: A Case Study on the Impact
    of ChatGPT on AI Conference Peer Reviews,” *arXiv* preprint (March 11, 2024),
    [https://doi.org/10.48550/arXiv.2403.07183](https://doi.org/10.48550/arXiv.2403.07183).
    Thousands of papers are submitted to conferences like NeurIPS, which require ten
    thousand reviews. This makes it difficult to find enough competent human reviewers.'
  id: totrans-1759
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[1](15580-0004.xhtml#en1r). W. Liang, Z. Izzo, Y. Zhang, H. Lepp, H. Cao, X.
    Zhao, et al., “Monitoring AI-Modified Content at Scale: A Case Study on the Impact
    of ChatGPT on AI Conference Peer Reviews,” *arXiv* 预印本 (March 11, 2024), [https://doi.org/10.48550/arXiv.2403.07183](https://doi.org/10.48550/arXiv.2403.07183).
    在NeurIPS等会议提交成千上万篇论文，需要十万条评论。这使得很难找到足够胜任的人类审稿人。'
