  prefs: []
  type: TYPE_NORMAL
- en: Section I – General Problem Solving Overview
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Discusses general principles of human problem-solving and how these principles
    can be applied by AI.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6FA.jpg)'
  prefs: []
  type: TYPE_IMG
- en: This image shows Talos, the first mythical automaton, patrolling a beach. Forged
    by Hephaestus, Talos was a bronze giant tasked with protecting Crete from invaders.
    Created by Bing.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 1\. Adaptive Thinking
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Human Versatility
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Humans are good at solving all sorts of different problems that come their way
    in everyday life and at work. This is because they are versatile in their approach
    to solving problems and adapt their problem-solving approach to suit the challenge
    at hand.
  prefs: []
  type: TYPE_NORMAL
- en: This adaptability is called adaptive thinking.
  prefs: []
  type: TYPE_NORMAL
- en: '| ![](image_rsrc6F9.jpg) | Adaptive thinking is the human capacity to assume
    the mode of thinking that is best suited to solve the immediate problem, and so
    achieve the optimum outcome. |'
  prefs: []
  type: TYPE_TB
- en: Contextual Adaptability in AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It follows that if we have to adjust our thinking mode to suit the problem at
    hand, then AI must also be trained to do the same thing, if we want it to reach
    the optimal conclusion. A generative AI model (such as ChatGPT) does this automatically,
    to a limited extent. This means that the AI automatically adjusts its mode of
    reasoning, depending on the question asked.
  prefs: []
  type: TYPE_NORMAL
- en: AI works this way because the training data that the AI references in order
    to answer the question, not only includes the information needed to answer the
    question, but also includes the sort of thinking needed for that type of question.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: If an AI is asked to answer a maths question, it references training data that
    contains both the actual mathematical information that the AI needs to answer
    the question, and also the patterns of thinking used in mathematics.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: On the other hand, if an AI is asked to write a poem, then the AI shifts to
    a less methodological approach by referencing free-style training data that contains
    information about poetry, and also the loosely structured patterns of thought
    of the creative arts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This AI flexibility is called Contextual Adaptability, which means that the
    AI adjusts its mode of response based on the query’s context.
  prefs: []
  type: TYPE_NORMAL
- en: Limitations of AI Contextual Adaptability
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although a generative AI such as ChatGPT 4 attempts to adjust its thinking mode
    to suit the question, there are limitations to this capability, for the following
    reasons.
  prefs: []
  type: TYPE_NORMAL
- en: 'Limited input: The AI may have difficulty in fully understanding the type of
    problem it’s facing. This is because humans use a mixture of contextual cues,
    prior knowledge, and intuitive understanding to classify problems and decide on
    the best approach. AI, however, can only go on the text in which the user asked
    the question.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Limitations of NLP: The AI may also not exactly grasp nuances in the way it
    is being asked a question, due to limitations in its NLP (Natural Language Processing)
    capabilities, and its inability to decode the exact communication style of the
    questioner.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Subsequently, we need to actively encourage the AI by specifying the type of
    thinking required, to match the problem we are presenting it.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6FB.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A robot that can't quite understand a question asked by a human, by ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 2\. Hard and Soft Problems
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The first decision we make when faced with a real-life problem is deciding whether
    we have a hard problem or a soft problem on our hands. These two different types
    of problems require entirely different problem-solving approaches.
  prefs: []
  type: TYPE_NORMAL
- en: Hard Problems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The term hard problem as used here does not mean that the problem is difficult
    to solve. Instead it means that we are talking about a problem that can be exactly
    defined; “Is it true, or is it false?”.
  prefs: []
  type: TYPE_NORMAL
- en: Hard problems generally relate to the external world, and include physical,
    technical or data-driven issues.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Solving hard problems requires exact methods, logical reasoning and accurate
    data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The answers to hard problems are specific, precise and measurable.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Soft Problems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Soft problems are problems that cannot be exactly defined. They relate to qualitative
    problems or personal questions such as opinions, emotions and relationships; “Is
    it good, or is it bad?”
  prefs: []
  type: TYPE_NORMAL
- en: Soft problems often occur in relation to the human condition; for example in
    fashion design, in organisational behaviour and in personal decision-making.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is often not one correct single answer to soft problems. Instead solving
    soft problems involves subjective judgment, emotional intelligence and an understanding
    of human behaviour.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Solutions to soft problems tend not to be clear-cut and require a nuanced subtle
    approach to balance the competing needs of human complexity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '| ![](image_rsrc6FC.jpg)Magical thinking occurs when a person misidentifies
    a hard problem as a soft problem.In this case they may think that they can make
    the problem “go away” by applying soft-problem solving methods, which is incorrect.The
    term “being hard-headed” refers to the ability to correctly identify a hard problem
    as a hard problem, which must be addressed with rigorous, not wishful, thinking.
    |'
  prefs: []
  type: TYPE_TB
- en: 'Many scenarios necessitate addressing both hard and soft problems, for instance:'
  prefs: []
  type: TYPE_NORMAL
- en: Implementing a new IT system involves the hard problem of development and deployment
    and the soft problem of change management.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Developing a luxury product requires first defining what customers are likely
    to be attracted to, and then engineering and manufacturing the required product.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](image_rsrc6FD.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Computer systems in a luxury car, bbc.co.uk
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 3\. Types of Hard Problems
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Conceptual and Empirical Problem-Solving
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '| ![](image_rsrc6FC.jpg)The word empirical refers to knowledge or methods based
    on observation, experience, or experimentation rather than theory or pure logic.In
    the context of problem solving, empirical means relying on real-world data to
    draw conclusions. |'
  prefs: []
  type: TYPE_TB
- en: Generally speaking, within the category of hard problems, we can identify two
    further general categories, based on the approach used to solve the problem.
  prefs: []
  type: TYPE_NORMAL
- en: 'Conceptual problem-solving:  These are scenarios where the main thrust of finding
    a solution to the problem comes through thinking and the intellect.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Empirical problem-solving: These are scenarios where the problem solving approach
    is primarily based on real-world data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These categories serve as umbrella terms, under which we can further identify
    specific problem types.
  prefs: []
  type: TYPE_NORMAL
- en: Types of Conceptual Problems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Types of hard problems that are mainly solved through thinking include:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Analytical Problems: These involve dissecting a problem into smaller parts,
    addressing each component individually, and then synthesizing an overall solution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Causal Reasoning Problems: Solving these problems requires tracing a chain
    of cause and effect, from the initial cause to the final outcome.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Causal reasoning problems can range from simple “A leads to B” scenarios to
    complex chains of events involving multiple steps and interactions between various
    factors.
  prefs: []
  type: TYPE_NORMAL
- en: '| ![](image_rsrc6FE.jpg)Causal reasoning relates to the fundamental idea of
    cause and effect, and  involves identifying the factors (causes) that lead to
    certain outcomes (effects).For example, if a car won''t start, we use causal reasoning
    to investigate the possible reasons behind the issue, such as a flat battery or
    an overheated engine, to find a solution to the problem. |'
  prefs: []
  type: TYPE_TB
- en: 'Theoretical Problems: These problems relate to the understanding and development
    of theoretical frameworks and require abstract thinking and mathematical modelling
    to solve them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Types of Empirical Problems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Types of hard problems whose solutions are based on facts include:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Technical Problems: Involving the repair or creation of technological systems,
    these problems demand specific technical knowledge and skills, from fixing a washing
    machine to engineering spacecraft components.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Solving technical problems requires an understanding of the relevant technology
    and the ability to apply practical skills and innovative thinking to create, fix,
    or improve technological solutions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Methodological Problems: Developing new techniques or tools to study the natural
    world or improve experiments, such as inventing new instruments or computational
    methods.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Quantitative Problems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Maths is an essential skill required to solve the quantitative problems (problems
    based on numbers) that can arise in all hard-problem areas.
  prefs: []
  type: TYPE_NORMAL
- en: For conceptual problems, maths provides the framework for developing theoretical
    models that can predict outcomes, propose new theories, and explore the implications
    of various hypotheses.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: On the other hand, in empirical problem-solving, maths is needed for designing
    experiments, analysing data, and interpreting results. It allows researchers to
    quantify observations, apply statistical tests, and draw reliable conclusions
    based on empirical data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mathematics forces problem-solvers to ensure that their solutions are both theoretically
    sound and can also be independently verified.
  prefs: []
  type: TYPE_NORMAL
- en: '![Studying... | An old picture from, I think, when I was study… | Flickr](image_rsrc6FF.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Maths, Flickr
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 4\. Combined Hard Problem Types
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Real-world problems often require the combination of various thinking styles,
    three examples are presented in this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Systems Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Systems problems demand an understanding of how different components interact
    within a system to produce a holistic result that is greater than the sum of its
    parts.
  prefs: []
  type: TYPE_NORMAL
- en: 'Systems thinking requires:'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the behaviour of each element in the system,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: understanding how the elements interact with each other, and
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: understanding how the overall system behaves as a whole.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Examples of system thinking problems occur in software systems development,
    environmental conservation, organisational change management, public health management
    and urban planning. In all these cases, we need to understand the behaviour of
    the system as a whole, the behaviours of all the component elements of the system
    and their interactions with each other.
  prefs: []
  type: TYPE_NORMAL
- en: Systems analysis includes both conceptual problem-solving and also empirical
    problem-solving.
  prefs: []
  type: TYPE_NORMAL
- en: This is because, at a high level, a system represents the embodiment of an idea
    or concept. Therefore from a high level perspective, conceptual problem-solving
    is required to understand the initial idea, how the idea is represented in the
    system, and how the system’s output corresponds to the initial thinking behind
    the system.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, empirical methods are needed to observe, measure, and manipulate
    the system's working parts, in real-world applications.
  prefs: []
  type: TYPE_NORMAL
- en: The Hard Sciences
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The hard sciences includes areas of study such as physics, chemistry, biology
    and mathematics. Within the hard sciences, a range of different types of problems
    can be encountered, which require specific problem-solving strategies.
  prefs: []
  type: TYPE_NORMAL
- en: The following types of problems are common within the hard sciences.
  prefs: []
  type: TYPE_NORMAL
- en: Empirical problems require observation, experimentation, and data collection
    to solve. These problems are grounded in the physical world and often require
    the formulation of hypotheses, which are then tested through experiments or observational
    studies.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Theoretical problems involve the development or refinement of scientific theories
    to explain empirical observations. These problems require abstract thinking and
    the application of mathematical models to describe the natural world.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Computational problems in the hard sciences involve using algorithms and computational
    models to solve scientific questions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Methodological problems involve the development of new techniques or tools to
    study the natural world. These can include the invention of new instruments, the
    improvement of experimental procedures, or the creation of novel computational
    methods.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Solving methodological problems enables scientists to make new discoveries and
    to measure phenomena with greater accuracy and precision. For instance, developing
    a more sensitive telescope allows astronomers to observe distant galaxies, while
    creating a more accurate time-measurement tool can enhance the precision of experiments
    in physics.
  prefs: []
  type: TYPE_NORMAL
- en: Interdisciplinary problems sit at the junction of multiple scientific disciplines
    and require a synthesis of concepts and methods from each to be solved. These
    problems reflect the complexity of the natural world, which does not adhere to
    the boundaries defined by academic disciplines.
  prefs: []
  type: TYPE_NORMAL
- en: Examples of interdisciplinary problems include understanding the brain’s functioning,
    which requires knowledge from biology, chemistry, psychology, and computer science;
    or tackling climate change, which involves insights from environmental science,
    computer science, physics, chemistry, and economics.
  prefs: []
  type: TYPE_NORMAL
- en: Many of the great scientific challenges are comprised of interdisciplinary problems.
    This is why a scientist may have to apply a number of the above problem solving
    techniques in order to achieve a true scientific breakthrough.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc6FG.jpg)'
  prefs: []
  type: TYPE_IMG
- en: U.S. supercomputers for weather and climate forecasts, National Oceanic and
    Atmospheric Administration, U.S. Department of Commerce
  prefs: []
  type: TYPE_NORMAL
- en: Algorithmic Problems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This category includes problems that are addressed through the application of
    computer code or manual algorithms. Algorithmic problem-solving is a hybrid area
    that intersects with both conceptual and empirical problem-solving approaches,
    depending on the nature of the problem and the data involved.
  prefs: []
  type: TYPE_NORMAL
- en: The essence of algorithmic problem-solving lies in its systematic approach to
    tackling challenges by breaking them down into smaller, more manageable parts,
    each of which can be addressed through specific, logical steps.
  prefs: []
  type: TYPE_NORMAL
- en: 'Types of Algorithmic Problems include:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Classic Computational Problems: Tasks that are inherently suited to computation,
    such as sorting lists, searching databases, or optimizing routes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Data-Driven Problems: With the advent of cheap access to reliable databases,
    many problems now require sorting through vast datasets to find patterns, make
    predictions, or derive insights.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Optimisation Problems: These are challenges that seek the best solution from
    a set of possible solutions, given certain constraints or criteria. Examples include
    scheduling tasks, allocating resources, or designing networks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Decision-Making Problems: These problems require evaluating multiple options
    and making choices based on certain, given criteria.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Almost all programming languages implement the basic types of algorithms, such
    as sorting algorithms, searching algorithms and recursive algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: These basic types of algorithms provide the building blocks for the more complex
    and specialised algorithms required by the programmer.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 5\. AI’s Unique Problem Solving Capabilities
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using AI to Solve Quantitative Problems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When we start to consider what type of hard problems we can solve using a generative
    AI, such as ChatGPT, the conversation veers in the direction of considering what
    Chat GPT actually does when we ask it a question.
  prefs: []
  type: TYPE_NORMAL
- en: Is Chat GPT primarily functioning as a useful search engine, which amalgamates
    data and stops us having to trawl through multiple web pages?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Or is Chat GPT effectively acting as a “thinking engine” which can work out
    problems for us?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For example, in the area of technical problems, it’s obvious that AI does not
    have good technical skills. AI is unable to handle tools and intuitively feel
    its way through carefully crafting a machine component. However, AI can be incredibly
    useful in finding the right technical information to apply to a particular problem.
    In this case we can think of AI as an intelligent search engine.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, generative AI is very good at solving numerical problems
    described in natural language, as demonstrated in the following example.
  prefs: []
  type: TYPE_NORMAL
- en: '| Problem Statement: The Effect of Introducing a Homework Support Program on
    Student PerformanceScenario DescriptionA local middle school has introduced a
    new after-school Homework Support Program (HSP) aimed at improving student performance
    in mathematics. The program provides students with access to tutors, resources,
    and a structured environment for completing homework. The school aims to evaluate
    the effectiveness of the HSP in enhancing students'' mathematics grades.ObjectiveDetermine
    if participation in the Homework Support Program impacts students'' mathematics
    grades, using a simple before-and-after comparison within participants and non-participants
    groups.Data Provided'
  prefs: []
  type: TYPE_NORMAL
- en: 'Participants: 20 students, with 11 participating in the HSP (treatment group)
    and 9 not participating (control group).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Mathematics Grades: Collected for each student before (pre-program) and after
    (post-program) the HSP introduction.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
