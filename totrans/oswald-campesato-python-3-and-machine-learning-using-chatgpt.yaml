- en: DESCRIBE THE MODEL DIAGNOSTICS
  prefs: []
  type: TYPE_NORMAL
- en: 'Model diagnostics play a crucial role in identifying potential issues with
    the regression model and ensuring the assumptions underlying linear regression
    are met. Here are the primary diagnostics and associated checks for linear regression:'
  prefs: []
  type: TYPE_NORMAL
- en: 1. linearity
  prefs: []
  type: TYPE_NORMAL
- en: 2. independence of errors
  prefs: []
  type: TYPE_NORMAL
- en: 3. homoscedasticity
  prefs: []
  type: TYPE_NORMAL
- en: 4. normality of residuals
  prefs: []
  type: TYPE_NORMAL
- en: 5. multicollinearity
  prefs: []
  type: TYPE_NORMAL
- en: 6. outliers and leverage points
  prefs: []
  type: TYPE_NORMAL
- en: 7. model specification
  prefs: []
  type: TYPE_NORMAL
- en: The assumption of linearity means that the relationship between the independent
    variables and the dependent variable should be linear.
  prefs: []
  type: TYPE_NORMAL
- en: 'Diagnostic Tools:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Residual vs. fitted plot: If there is a pattern in this plot (like a curve),
    it suggests non-linearity. Scatter plots of the observed vs. predicted values.'
  prefs: []
  type: TYPE_NORMAL
- en: The assumption of the independence of errors means that the residuals (errors)
    should be independent.
  prefs: []
  type: TYPE_NORMAL
- en: 'Diagnostic Tools:'
  prefs: []
  type: TYPE_NORMAL
- en: The Durbin-Watson test detects the presence of autocorrelation (a relationship
    between values separated from each other by a given time lag) in the residuals.
  prefs: []
  type: TYPE_NORMAL
- en: The assumption of homoscedasticity means that the variance of the residuals
    should remain constant across all levels of the independent variable(s).
  prefs: []
  type: TYPE_NORMAL
- en: 'Diagnostic Tools:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Residual vs. Fitted plot: If there is a funnel shape, it suggests heteroscedasticity
    (non-constant variance). The Breusch-Pagan or White tests test for heteroscedasticity
    statistically.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The assumption of normality of residuals means that the residuals should be
    approximately normally distributed.
  prefs: []
  type: TYPE_NORMAL
- en: 'Diagnostic Tools:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Histogram or Kernel Density Plot: For visual inspection of normality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Q-Q (Quantile-Quantile) plot: If residuals lie on the 45-degree reference line,
    they are approximately normally distributed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Shapiro-Wilk test: A formal test for normality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The assumption of multicollinearity means that the independent variables should
    not be highly correlated with each other.
  prefs: []
  type: TYPE_NORMAL
- en: 'Diagnostic Tools:'
  prefs: []
  type: TYPE_NORMAL
- en: 'VIF: A VIF > 10 indicates high multicollinearity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Correlation matrix or heatmap: For a visual inspection of correlations between
    variables.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Detecting outliers and leverage points is important because outliers can overly
    influence the model, leading to unreliable estimates.
  prefs: []
  type: TYPE_NORMAL
- en: 'Diagnostic Tools:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Standardized residuals vs. Leverage plot: Helps identify points that have high
    leverage on the regression line.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Cook’s Distance: Measures the effect of deleting a given observation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A correct model specification means that there is no omitted variable bias,
    and no inclusion of unnecessary variables.
  prefs: []
  type: TYPE_NORMAL
- en: 'Diagnostic Tools:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Added Variable (Partial Regression) plots: Helps in checking if a variable
    adds information to the model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'RESET (Regression Specification Error Test): Tests for model misspecification.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For our linear regression model using the death.csv dataset, let’s conduct
    some of these diagnostics, starting with checking for linearity, homoscedasticity,
    and normality of residuals. Based on the diagnostic plots, we have the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Residual vs. Fitted Plot:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Linearity: There does not seem to be any clear pattern in the residuals against
    the fitted values, indicating that the linearity assumption is not strongly violated.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Homoscedasticity: The spread of residuals appears to be relatively uniform
    across the range of fitted values, suggesting that the homoscedasticity assumption
    is not strongly violated.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Histogram of Residuals:'
  prefs: []
  type: TYPE_NORMAL
- en: The histogram shows the distribution of residuals. While it is not perfectly
    normal, the distribution does not have extreme deviations from normality.
  prefs: []
  type: TYPE_NORMAL
- en: 'Q-Q Plot:'
  prefs: []
  type: TYPE_NORMAL
- en: The Q-Q plot shows how well the distribution of residuals aligns with a normal
    distribution. The residuals largely follow the 45-degree reference line, especially
    in the center. There are some deviations, especially in the tails, indicating
    some minor deviations from perfect normality.
  prefs: []
  type: TYPE_NORMAL
- en: To further ensure the model’s reliability, additional diagnostics like checking
    for multicollinearity (more relevant for models with multiple predictors), outliers,
    and high-leverage points should also be considered. For this simple linear model
    with only one predictor, multicollinearity is not a concern.
  prefs: []
  type: TYPE_NORMAL
- en: DESCRIBE ADDITIONAL MODEL DIAGNOSTICS
  prefs: []
  type: TYPE_NORMAL
- en: 'After prompting ChatGPT to delve deeper into additional model diagnostics for
    our linear regression, ChatGPT responded with the text shown after the following
