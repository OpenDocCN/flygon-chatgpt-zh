  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: ● 撰写一个30秒的Instagram Reel脚本，介绍一款新的时尚系列。
- en: ● Draft a script for a 30-second Instagram Reel demonstrating a skincare routine
    using your brand’s products.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: ● 撰写一个30秒的Instagram Reel脚本，展示使用你品牌产品的护肤流程。
- en: ● Draft a script for a 30-second Instagram Reel showcasing the transformation
    of a client’s home using your interior design services.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: ● 撰写一个30秒的Instagram Reel脚本，展示使用你的室内设计服务改造客户家的过程。
