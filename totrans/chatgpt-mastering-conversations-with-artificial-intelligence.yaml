- en: '**6.5 Best Practices**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Use an iterative approach**^([2](#footnote-11253-2))'
  prefs: []
  type: TYPE_NORMAL
- en: Before designing the landscape, start with the character. You can get the body
    morphology right before filling in the rest. Use detailed descriptions.
  prefs: []
  type: TYPE_NORMAL
- en: Interactively use methods to influence the position and arrangement of objects
    in the generated image. Use phrases like "on the left," "behind," etc. to guide
    object placement.
  prefs: []
  type: TYPE_NORMAL
- en: '**Be specific with prompts**'
  prefs: []
  type: TYPE_NORMAL
- en: Use adjectives, time frames, and context elements to refine your prompts.
  prefs: []
  type: TYPE_NORMAL
- en: Say "jubilant young woman" instead of just "woman." Context also enriches the
    prompt; specifying a time frame like "sunset" can lend the generated image a particular
    hue and mood.
  prefs: []
  type: TYPE_NORMAL
- en: Provide context. For example, specifying "jubilant young woman celebrating her
    graduation at sunset" can drastically refine the generated output.
  prefs: []
  type: TYPE_NORMAL
- en: '**Be your set designer**'
  prefs: []
  type: TYPE_NORMAL
- en: DALL-E offers a great deal of creative freedom, but it also obliges you to be
    the director of your virtual stage. You could influence not only the position
    and arrangement of the elements within the image but also the position and settings
    of the camera.
  prefs: []
  type: TYPE_NORMAL
- en: '![DogSideWays.tif](../Images/DogSideWays_fmt.jpeg) ![DogSuperWideAngle.tif](../Images/DogSuperWideAngle_fmt.png) ![DogLongShot.tif](../Images/DogLongShot_fmt.jpeg)'
  prefs: []
  type: TYPE_IMG
- en: '![DogLowAngle.tif](../Images/DogLowAngle_fmt.jpeg) ![DogOverTheShoulder.tif](../Images/DogOverTheShoulder_fmt.jpeg) ![DogWorm_sEye_view.tif](../Images/DogWorm_sEye_view_fmt.jpeg)'
  prefs: []
  type: TYPE_IMG
- en: '**Regenerate images**'
  prefs: []
  type: TYPE_NORMAL
- en: DALL-E cannot edit images, such as removing objects or altering their orientation,
    at your request. If you need to make corrections to the image, review the initial
    image, identify areas for improvement, and refine the wording to capture your
    vision. Treat each iteration as a progression toward the ideal prompt. It is easy
    to iterate; use "Prompt re-writing" by clicking ![pen_symbol.tif](../Images/pen_symbol_fmt.png)
    under the submitted prompt. It allows you to edit the prompt and resubmit it.
  prefs: []
  type: TYPE_NORMAL
- en: E.g., in the images below, the focus of the image remains the same, and you
    direct the scene's point of view by specifying camera settings, angle, framing,
    zoom, and photographic technique.^([3](#footnote-11253-3))
  prefs: []
  type: TYPE_NORMAL
- en: 'E.g. "Photorealistic image of a seasoned oil rig explorer in a yellow vest,
    taken with a Canon EOS style, 9 points focus. The setting is a sunny, late afternoon
    in the northern wooded area of Canada. The image captures a close-up portrait,
    highlighting the intricate details of his face: years of experience, freckles,
    some drops of sweat, and a few drops of dirt from the extraction site. In the
    background, an oil rig and other workers are visible amidst the Canadian landscape.
    The natural light enhances the depth and clarity of the image, suitable for a
    National Geographic publication."'
  prefs: []
  type: TYPE_NORMAL
- en: '![DALL%c2%b7E_2023-12-02_14.43.50_-_Photorealistic_close-up_image.tif](../Images/DALL%C2%B7E_2023-12-02_14.43_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: Or, "Photography, 8K resolution, depicting a sleek Dacia Duster stationed in
    The Rocks region of Sydney. The scene is bathed in the luminous hues of a summer
    day. The majestic Sydney Opera House and the animated Circular Quay form the backdrop.
    A delicate lens flare, characteristic for 50mm lens, enhances the visual appeal."
  prefs: []
  type: TYPE_NORMAL
- en: '![DALL%c2%b7E_2023-12-04_16.59.44_-_Photography%2c_8k_resolution.tif](../Images/DALL%C2%B7E_2023-12-04_16.59_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Image sizes**'
  prefs: []
  type: TYPE_NORMAL
- en: 'DALL-E 3 accepts three different image sizes: 1024px by 1024px, 1792px by 1024px,
    and 1024px by 1792px. It gives more flexibility in aspect ratio and it is an addition
    to the style and context of the generated image. Vertical images may look better
    as if they were taken by a cellphone camera. Horizontal images may work better
    for landscape paintings or digital designs.^([4](#footnote-11253-4))'
  prefs: []
  type: TYPE_NORMAL
- en: '![114_Monkey_seated_on_the_stairs_of_a_colorful_Indian_temple.tif](../Images/114_Monkey_seated_on_th_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Monkey seated on the stairs of a colorful Indian temple*'
  prefs: []
  type: TYPE_NORMAL
