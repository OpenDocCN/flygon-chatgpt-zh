  id: totrans-349
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '****7****.****3**** ****建议食谱'
- en: '****B**y** ****anal**yzin**g ****avai**labl**e ****ingr**edient**s, ****Cha**tGP**T
    ****c**an** ****pro**vid**e ****re**cip**e ****sugg**estion**s:'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 通过分析可用的成分，ChatGPT可以提供食谱建议：
- en: “****I**** ****ha**ve** ****chi**cke**n, ****tom**atoe**s, ****a**nd** ****pa**sta**.
