    ****li**ves**. ****Th**is** ****me**ans** ****th**at** ****ther**apist**s ****a**nd**
    ****psych**iatris**ts ****a**re** ****of**ten** ****fu**lly** ****bo**oke**d ****wi**th**
    ****a**** ****wai**tin**g ****li**st** ****th**at** ****co**uld** ****b**e** ****t**wo**
    ****we**eks** ****o**r** ****ev**en** ****lo**nge**r. ****Bec**aus**e ****o**f**
    ****t**he** ****am**oun**t ****o**f** ****pe**opl**e ****nee**din**g ****th**eir**
    ****he**lp**, ****mo**st** ****me**nta**l ****he**alt**h ****profe**ssiona**ls
    ****ope**rat**e ****b**y** ****a**** ****sy**ste**m ****o**f** ****urg**enc**y,
    ****prio**ritizi**ng ****th**ose** ****th**at** ****ha**ve** ****mo**re** ****pron**ounce**d
    ****o**r** ****ser**iou**s ****me**nta**l ****he**alt**h ****pro**blem**s. ****Th**is**
    ****me**ans** ****th**at** ****th**ose** ****cons**idere**d ****t**o** ****ha**ve**
