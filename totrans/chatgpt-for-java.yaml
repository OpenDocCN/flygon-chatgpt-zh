  prefs: []
  type: TYPE_TB
- en: '| ↳↳ hate | Number | Score for the category “hate.” |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ hate/threatening | Number | Score for the category “hate/threatening.”
    |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ harassment | Number | Score for the category “harassment.” |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ harassment/threatening | Number | Score for the category “harassment/threatening.”
    |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ self-harm | Number | Score for the category “self-harm.” |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ self-harm/intent | Number | Score for the category “self-harm/intent.”
    |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ self-harm/instructions | Number | Score for the category “self-harm/instructions.”
    |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ sexual | Number | Score for the category “sexual.” |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ violence | Number | Score for the category “violence.” |'
  prefs: []
  type: TYPE_TB
- en: '| ↳↳ violence/graphic | Number | Score for the category “violence/graphic.”
    |'
  prefs: []
  type: TYPE_TB
- en: Listing [7-1](#PC1) is an example of the JSON response after invoking the Moderation
