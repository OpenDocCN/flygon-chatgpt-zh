    ****th**em** ****i**n** ****fr**ont** ****o**f** ****u**s** ****t**o** ****co**unt**.'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: '****一个在技术进步方面真正领先的古老社会是中国的。不仅古代中国发明了纸张、火药、时钟甚至指南针，而且4000年前，他们还发明了一种计算设备，它是所有计算器的祖先：算盘。算盘由一个木制框架组成，其上水平放置着金属柱，通过移动沿金属柱散布的珠子，遵循某些指南或规则（或者如果你愿意，算法）。然后，这将被用来进行算术（加法和减法），并允许我们跟踪更大的金额，而无需将它们放在我们面前来计数。'
- en: '****2****. ****Na**pie**r’****s**** ****bo**nes**'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: '****2****. ****纳皮尔骨牌**'
- en: '****Jum**pin**g ****ah**ead** ****t**o** ****t**he** ****ea**rly** ****16**00s**
    ****i**n** ****Sco**tlan**d, ****w**e** ****s**ee** ****o**ur** ****ne**xt** ****ma**jor**
    ****adva**ncemen**t ****i**n** ****comp**utin**g ****dev**ice**s. ****Inv**ente**d
    ****b**y** ****Jo**hn** ****Na**pie**r, ****Na**pie**r’****s**** ****bo**nes**
    ****us**ed** ****ni**ne** ****iv**ory** ****st**rip**s—****t**he** ****bo**nes**—****th**at**
    ****we**re** ****et**che**d ****wi**th** ****num**ber**s. ****Wh**ile** ****t**he**
    ****ab**acu**s ****all**owe**d ****u**s** ****t**o** ****a**dd** ****a**nd** ****sub**trac**t
    ****be**tte**r ****th**an** ****ev**er** ****be**for**e, ****Na**pie**r’****s****
    ****bo**nes** ****ad**ded** ****t**o** ****th**is** ****t**he** ****abi**lit**y
    ****t**o** ****mul**tipl**y ****a**nd** ****di**vid**e. ****I**t** ****al**so**
    ****all**owe**d ****f**or** ****t**he** ****u**se** ****o**f** ****t**he** ****dec**ima**l
    ****po**int** ****sy**ste**m, ****a**** ****fi**rst** ****f**or** ****o**ur**
    ****ea**rly** ****compu**tation**al ****dev**ice**s.'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: '****跳过到16世纪早期的苏格兰，我们看到我们在计算设备方面的下一个重大进步。这是由约翰·纳皮尔发明的纳皮尔骨牌，它使用了九根象牙条——即骨牌——上面刻有数字。虽然算盘允许我们比以前更好地进行加法和减法，但纳皮尔骨牌在此基础上增加了乘法和除法的能力。它还允许使用十进制点系统，这是我们早期计算设备中的第一个。'
- en: '****3****. ****Pasc**alin**e'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: '****3****. ****帕斯卡林**'
- en: '****Ne**xt** ****u**p** ****i**n** ****t**he** ****his**tor**y ****o**f** ****comp**utin**g
    ****dev**ice**s ****co**mes** ****t**he** ****Pasc**alin**e. ****Inv**ente**d
    ****b**y** ****ren**owne**d ****Fr**enc**h ****phil**osophe**r ****a**nd** ****mathe**matici**an
    ****Bl**ais**e ****Pa**sca**l ****bet**wee**n ****16**42**-****16**44**, ****t**he**
    ****Pasc**alin**e ****cons**iste**d ****o**f** ****a**** ****wo**ode**n ****b**ox**
    ****wi**th** ****a**** ****bu**nch** ****o**f** ****ge**ars** ****in**sid**e.
    ****Pas**cal**s’****s**** ****fa**the**r ****w**as** ****a**** ****t**ax** ****supe**rviso**r
    ****f**or** ****Ro**uen**, ****a**** ****ci**ty** ****i**n** ****nor**ther**n
    ****Fr**anc**e, ****a**nd** ****h**ad** ****a**** ****to**ugh** ****ti**me** ****sta**yin**g
    ****o**n** ****t**op** ****o**f** ****a**ll** ****t**he** ****arit**hmetic**al
    ****calc**ulatio**ns ****h**e** ****h**ad** ****t**o** ****ma**ke** ****i**n**
    ****or**der** ****t**o** ****en**sur**e ****th**at** “****de**ath** ****a**nd**
    ****ta**xes**” ****rem**aine**d ****t**he** ****on**ly** ****t**wo** ****cert**aintie**s
    ****o**f** ****li**fe**. ****T**o** ****he**lp** ****h**is** ****da**ddy**-****o****
    ****o**ut** ****wi**th** ****th**is**, ****Pa**sca**l ****cre**ate**d ****t**he**
    ****fi**rst** ****mech**anica**l ****a**nd** ****auto**mate**d ****calc**ulato**r.'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: '****计算设备历史上的下一个里程碑是帕斯卡计算器。由著名的法国哲学家和数学家布莱兹·帕斯卡在1642-1644年之间发明，帕斯卡计算器由一个木制盒子和一些齿轮组成。帕斯卡的父亲的职业是法国北部城市鲁昂的税务监督员，他不得不花费大量时间进行复杂的算术计算，以确保“死亡和税收”是生活中仅有的两种确定性。为了帮助他的父亲摆脱这项工作，帕斯卡发明了第一个机械和自动化的计算器。'
- en: '****4****. ****Diff**erenc**e ****en**gin**e ****a**nd** ****anal**ytica**l
    ****en**gin**e'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: '****4****. ****差分机与解析机'
- en: '****Wi**th** ****t**he** ****fi**rst** ****f**ew** ****iter**ation**s ****o**f**
    ****hu**man** ****compu**tation**al ****dev**ice**s ****cov**ere**d, ****w**e**
    ****n**ow** ****g**et** ****t**o** ****t**he** ****on**es** ****cre**ate**d ****b**y**
    ****t**he** “****fa**the**r ****o**f** ****t**he** ****com**pute**r,” ****Eng**lis**h
    ****pol**ymat**h ****Cha**rle**s ****Bab**bag**e. ****Inv**ente**d ****i**n**
    ****t**he** ****ea**rly** ****18**20s**, ****Bab**bag**e’****s**** ****diff**erenc**e
    ****en**gin**e ****co**uld** ****d**o** ****mo**re** ****th**an** ****ju**st**
    ****t**he** ****si**ngl**e ****si**mpl**e ****calc**ulatio**ns ****o**f** ****i**ts**
    ****pred**ecesso**rs. ****I**t** ****co**uld** ****com**put**e ****a**** ****se**rie**s
    ****o**f** ****calc**ulatio**ns ****wi**th** ****a**** ****nu**mbe**r ****o**f**
    ****vari**able**s, ****all**owin**g ****u**s** ****t**o** ****so**lve** ****mu**ch**
    ****mo**re** ****comp**licate**d ****math**ematic**al ****equa**tion**s. ****Mo**re**
    ****th**an** ****th**at** ****th**oug**h, ****t**he** ****diff**erenc**e ****en**gin**e
    ****w**as** ****al**so** ****ab**le** ****t**o** ****st**ore** ****da**ta** ****t**o**
    ****pro**ces**s ****a**t** ****a**** ****la**ter** ****st**age** (****al**bei**t
    ****temp**oraril**y), ****a**s** ****we**ll** ****a**s** ****t**o** ****pr**int**
    ****o**ut** ****i**ts** ****solu**tion**s. ****Th**is** ****ma**rke**d ****a****
    ****cl**ear** ****sepa**ratio**n ****o**f** ****t**he** ****diff**erenc**e ****en**gin**e
    ****fr**om** ****ot**her** ****calc**ulator**s ****o**f** ****t**he** ****d**ay**,
    ****how**eve**r ****Bab**bag**e’****s**** ****mac**hin**e (****wh**ich** ****w**as**
    ****t**he** ****si**ze** ****o**f** ****a**** ****ro**om**) ****w**as** ****st**ill**
    ****on**ly** ****ab**le** ****t**o** ****d**o** ****o**ne** ****ta**sk** ****a**t**
    ****a**** ****ti**me**.'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
- en: '****Th**en**, ****i**n** ****18**30**, ****Bab**bag**e ****deve**lope**d ****h**is**
    ****ne**xt** ****mech**anica**l ****com**pute**r, ****t**he** ****anal**ytica**l
    ****en**gin**e. ****Wh**ile** ****t**he** ****diff**erenc**e ****en**gin**e ****w**as**
    ****cons**idere**d ****a**** ****calc**ulatin**g ****mac**hin**e, ****t**he**
    ****anal**ytica**l ****en**gin**e ****i**s** ****gene**rall**y ****tho**ugh**t
    ****o**f** ****a**s** ****be**ing** ****t**he** ****wo**rld**’****s**** ****fi**rst**
    ****com**pute**r. ****T**he** ****b**ig** ****diff**erenc**e ****bet**wee**n ****t**he**
    ****diff**erenc**e ****a**nd** ****anal**ytica**l ****eng**ine**s ****i**s** ****th**at**,
    ****wh**ile** ****t**he** ****fo**rme**r ****w**as** ****on**ly** ****ab**le**
    ****t**o** ****d**o** ****o**ne** ****ta**sk** ****a**t** ****a**** ****ti**me**
    ****a**nd** ****w**as** ****st**ill** ****lim**ite**d ****i**n** ****te**rms**
    ****o**f** ****i**ts** ****calc**ulatio**n ****abil**itie**s, ****t**he** ****la**tte**r
    ****w**as** ****a**** ****gen**era**l-****pur**pos**e ****comp**utin**g ****mac**hin**e
    ****ab**le** ****t**o** ****com**plet**e ****a**ny** ****a**nd** ****a**ll** ****calc**ulatio**ns
    ****p**ut** ****t**o** ****i**t**. ****Un**lik**e ****i**ts** ****pred**ecesso**r,
    ****t**he** ****anal**ytica**l ****en**gin**e ****w**as** ****al**so** ****ab**le**
    ****t**o** ****st**ore** ****da**ta** ****inde**finite**ly.'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在1830年，巴贝奇开发了他的下一个机械计算机，即**分析引擎**。虽然差分机被认为是一种计算机器，但分析引擎通常被认为是世界上第一台计算机。差分机和分析引擎之间的一大区别是，前者一次只能完成一个任务，并且在计算能力方面仍然有限，而后者是一种通用计算机器，能够完成任何和所有被提交给它的计算。与它的前辈不同，分析引擎还能够无限期地存储数据。
- en: '****T**he** ****anal**ytica**l ****en**gin**e ****w**as** ****ma**de** ****o**f**
    ****fo**ur** ****diff**eren**t ****pa**rts**, ****wh**ich** ****a**re** ****st**ill**
    ****t**he** ****ma**in** ****ele**ment**s ****o**f** ****t**he** ****mo**der**n
    ****comp**uter**s ****th**at** ****w**e** ****u**se** ****to**day**. ****T**he**
    ****fi**rst**, ****t**he** ****mi**ll**, ****w**as** ****i**ts** ****calc**ulatin**g
    ****un**it** ****a**nd** ****i**s** ****t**he** ****gran**dfathe**r ****o**f**
    ****t**he** ****cen**tra**l ****proc**essin**g ****un**it** (****C**PU**) ****th**at**
    ****w**e** ****fi**nd** ****i**n** ****o**ur** ****comp**uter**s. ****T**he**
    ****ne**xt** ****comp**onen**t ****Bab**bag**e ****ca**lle**d ****t**he** ****st**ore**,
    ****a**nd** ****w**as** ****wh**ere** ****da**ta** ****w**as** ****ke**pt** ****be**for**e
    ****be**ing** ****proc**esse**d. ****Th**is** ****corr**espond**s ****t**o** ****me**mor**y
    ****a**nd** ****sto**rag**e ****i**n** ****mo**der**n ****comp**uter**s ****a**nd**
    ****sim**ila**r ****dev**ice**s. ****Th**ird** ****u**p**, ****w**e** ****ha**ve**
    ****t**he** ****re**ade**r (****t**he** ****in**put** ****de**vic**e), ****wi**th**
    ****t**he** ****fi**nal** ****comp**onen**t ****be**ing** ****t**he** ****pri**nte**r
    (****t**he** ****ou**tpu**t ****de**vic**e).'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: '**分析引擎**由四个不同的部分组成，这些部分仍然是今天我们使用的现代计算机的主要元素。第一个部分是**米勒**，它是计算单元，是中央处理单元（**CPU**）的祖先，我们在电脑中找到的就是这种单元。下一个组件被称为**存储器**，它是数据在处理之前被保存的地方。这对应于现代计算机和类似设备中的内存和存储。第三个部分是**阅读器**（输入设备），最后一个组件是**打印机**（输出设备）。'
- en: '****5****. ****T**he** ****tabu**latin**g ****mac**hin**e'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: '**5. 制表机**'
- en: '****O**ur** ****ne**xt** ****iter**atio**n ****lea**din**g ****u**p** ****t**o**
    ****t**he** ****mo**der**n-****d**ay** ****com**pute**r ****a**nd** ****t**he**
    ****bi**rth** ****o**f** ****arti**ficia**l ****inte**lligen**ce ****w**as** ****t**he**
    ****tabu**latin**g ****mac**hin**e. ****Inv**ente**d ****ar**oun**d ****6**0**
    ****ye**ars** ****af**ter** ****t**he** ****anal**ytica**l ****en**gin**e ****b**y**
    ****Ge**rma**n-****Ame**rica**n ****stat**istici**an ****He**rma**n ****Holl**erit**h,
    ****t**he** ****tabu**latin**g ****mac**hin**e ****w**as** ****a**** ****cou**ntin**g
    ****mac**hin**e ****orig**inall**y ****us**ed** ****t**o** ****org**aniz**e ****U****.****S****.
    ****ce**nsu**s ****da**ta** ****i**n** ****18**90**. ****B**y** ****cou**ntin**g
    ****ca**rds** ****wh**ere** ****ho**les** ****we**re** ****pun**che**d ****a**t**
    ****spe**cifi**c ****loca**tion**s, ****Holl**erit**h’****s**** ****inve**ntio**n
    ****co**uld** ****wo**rk** ****o**ut** ****stat**istic**s ****a**nd** ****th**en**
    ****so**rt** ****a**nd** ****re**cor**d ****da**ta**. ****Th**is** ****ma**de**
    ****i**t** ****per**fec**t ****f**or** ****acco**untin**g ****o**r** ****kee**pin**g
    ****tr**ack** ****o**f** ****inve**ntor**y, ****a**nd** ****l**ed** ****t**o**
    ****a**** ****n**ew** ****cat**egor**y ****o**f** ****comp**utin**g ****mac**hine**s
    ****kn**own** ****a**s** ****un**it** ****reco**rdin**g ****equi**pmen**t, ****a**s**
    ****we**ll** ****a**s** ****a**** ****n**ew** ****ind**ustr**y: ****da**ta** ****proc**essin**g.
    ****Holl**erit**h ****cre**ate**d ****a**** ****com**pan**y ****f**or** ****h**is**
    ****inve**ntio**n, ****wh**ich** ****wo**uld** ****even**tuall**y ****ev**olv**e
    ****in**to** ****Inter**nation**al ****Bus**ines**s ****Mac**hine**s, ****mo**re**
    ****com**monl**y ****kn**own** ****to**day** ****a**s** ****I**BM**. ****I**BM**
    ****wo**uld** ****cr**eat**e ****t**he** ****fi**rst** ****comp**letel**y ****elec**troni**c
    ****comp**utin**g ****mac**hin**e—****t**he** ****Va**cuu**m ****Tu**be** ****Mult**iplie**r—****i**n**
    ****19**43**, ****a**nd** ****a**** ****ye**ar** ****la**ter**, ****wo**uld**
    ****pro**duc**e ****t**he** ****Ma**rk** ****I****, ****t**he** ****fi**rst**
    ****de**vic**e ****th**at** ****w**e** ****wo**uld** ****reco**gniz**e ****a**s**
    ****be**ing** ****a**** ****mo**der**n ****com**pute**r.'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们的** **下一** **代** **学习** **方法** **引领** **至** **现代** **计算机** **以及** **人工智能**
    **的** **诞生** **是** **图灵机** **。** **在** **分析** **机** **发明** **60** **年后** **，**
    **德国-美国** **统计学家** **赫尔曼** **霍勒里特** **发明** **了** **图灵机** **，** **这是一台** **计数**
    **机** **，最初** **用于** **组织** **美国** **人口** **普查** **数据** **（** **1890** **年** **）。**
    **通过** **计数** **卡片** **上** **特定** **位置** **的** **孔** **，** **霍勒里特的** **发明** **可以**
    **计算出** **统计数据** **，** **然后** **排序** **和** **记录** **数据** **。** **这使得** **它** **非常适合**
    **会计** **或** **跟踪** **库存** **，** **并** **导致了** **一种** **新的** **计算** **机** **类别**
    **的产生** **，** **即** **单位** **记录** **设备** **，** **以及** **一个** **新的** **行业** **：**
    **数据处理** **。** **霍勒里特** **为** **他的** **发明** **创建** **了一家** **公司** **，** **这家**
    **公司** **最终** **发展成为** **国际** **商业** **机器** **公司** **，** **今天** **更** **为人** **所**
    **知** **的** **名字** **是** **IBM** **。** **IBM** **将** **在** **1943** **年** **制造**
    **出** **第一台** **完全** **电子** **计算** **机** **——** **真空** **管** **乘** **法** **器**
    **——** **，** **一年** **后** **，** **将** **生产** **出** **Mark I** **，** **这是我们** **今天**
    **所** **认识** **的第一台** **现代** **计算机** **。'
- en: '****6****. ****Ma**rk** ****I****'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: '**6**. **Mark I**'
- en: '****Bu**ilt** ****i**n** ****t**he** ****U****.****S****. ****to**war**d ****t**he**
    ****e**nd** ****o**f** ****t**he** ****Se**con**d ****Wo**rld** ****W**ar**, ****t**he**
    ****Auto**mati**c ****Seq**uenc**e ****Cont**rolle**d ****Calc**ulato**r, ****mo**re**
    ****com**monl**y ****ca**lle**d ****t**he** ****Har**var**d ****Ma**rk** ****I****,
    ****w**as** ****deve**lope**d ****b**y** ****Prof**esso**r ****Ho**war**d ****Ai**ken**
    ****fr**om** ****Har**var**d ****Univ**ersit**y ****i**n** ****colla**borati**on
    ****wi**th** ****I**BM**. ****Ai**ken** ****w**as** ****fasc**inate**d ****wi**th**
    ****Bab**bag**e’****s**** ****anal**ytica**l ****en**gin**e, ****a**nd** ****li**ke**
    ****t**he** ****anal**ytica**l ****en**gin**e, ****t**he** ****Ma**rk** ****I****
    ****w**as** ****a**** ****beh**emot**h ****o**f** ****a**** ****mac**hin**e. ****Wei**ghin**g
    ****i**n** ****a**t** ****a**** ****who**ppin**g ****5**** ****to**ns**, ****5**0**
    ****fe**et** (****1**5** ****me**ter**s) ****lo**ng**, ****Ai**ken**’****s****
    ****inve**ntio**n ****w**as** ****ma**de** ****u**p** ****o**f** ****ov**er**
    ****7**50**,****0**00** ****diff**eren**t ****pa**rts** ****a**nd** ****hun**dred**s
    ****o**f** ****mi**les** ****o**f** ****wi**re**. ****A**s** ****i**ts** ****in**put**s
    ****a**nd** ****ou**tpu**t, ****t**he** ****Ma**rk** ****I**** ****h**ad** ****th**ree**
    ****pa**per**-****ta**pe** ****rea**der**s, ****t**wo** ****ca**rd** ****rea**der**s,
    ****o**ne** ****pu**nch** ****ca**rd**, ****a**nd** ****t**wo** ****type**writer**s,
    ****a**nd** ****i**t** ****to**ok** ****bet**wee**n ****th**ree** ****t**o** ****s**ix**
    ****sec**ond**s ****t**o** ****per**for**m ****si**mpl**e ****calc**ulatio**ns.
    ****O**ne** ****o**f** ****t**he** ****fi**rst** ****us**es** ****o**f** ****t**he**
    ****Ma**rk** ****I**** ****w**as** ****a**s** ****pa**rt** ****o**f** ****t**he**
    ****Manh**atta**n ****Pro**jec**t ****wh**ere** ****i**t** ****w**as** ****us**ed**
    ****t**o** ****he**lp** ****calc**ulat**e ****whe**the**r ****impl**osio**n (****viol**entl**y
    ****coll**apsin**g) ****w**as** ****a**** ****go**od** ****id**ea** ****t**o**
    ****det**onat**e ****t**he** ****at**omi**c ****bo**mb**. ****Ai**ken** ****we**nt**
    ****o**n** ****t**o** ****ma**ke** ****th**ree** ****mo**re** ****ver**sion**s
    ****o**f** ****h**is** ****mac**hin**e (****Ma**rk** ****I****–****I**V**), ****ma**inl**y
    ****us**ed** ****f**or** ****mili**tarist**ic ****pur**pose**s.'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 在第二次世界大战即将结束之际，在美国**建造**的**自动序列控制器**，更常见地被称为**哈佛马克I**，是由哈佛大学霍华德·艾肯教授**开发**的，并与IBM合作。艾肯对巴贝奇的分析引擎着迷，并且像分析引擎一样，马克I是一个**机械**的**怪物**。重达5吨，长50英尺（15米），艾肯的发明由超过750,000个不同的部件和数百英里长的电线组成。作为其输入和输出，马克I有三个纸带阅读器，两个卡片阅读器，一个打孔卡片，和两个打字机，并且它可以在3到6秒内执行简单的计算。马克I的第一个用途之一是作为**曼哈顿计划**的一部分，用于帮助计算是否爆炸（剧烈塌陷）是引爆原子弹的好主意。艾肯继续制作了他机器的三个更多版本（马克I-IV），主要用于军事目的。
