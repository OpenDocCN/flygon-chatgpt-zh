    ****suf**fere**d ****fr**om** ****th**em**! ****Wh**en** ****w**e** ****hu**rt**
    ****ours**elve**s ****o**r** ****g**et** ****si**ck**, ****th**ere** ****a**re**
    ****usu**all**y ****phy**sica**l ****si**gns** ****a**nd** ****sym**ptom**s ****th**at**
