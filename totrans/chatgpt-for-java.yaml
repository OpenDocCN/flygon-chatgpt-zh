  type: TYPE_NORMAL
  zh: '**语音识别在处理人名时存在问题**'
- en: Certain names of people, businesses, and websites can often be hard to spell
    and understand
  id: totrans-516
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有些人名、公司名和网站名往往拼写困难，难以理解
