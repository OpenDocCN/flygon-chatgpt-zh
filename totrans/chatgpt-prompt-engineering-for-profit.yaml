    ****逐步** ****解释** ****，****而是** ****更** ****关注** ****生成** ****新的** ****视角** .****其**
    ****思想** ****在于** ****拓宽** ****对** ****问题的** ****理解** ，****而不是** ****详细** ****阐述**
    ****单一** ****视角** ****背后的** ****推理** .'
