- en: These examples show how a little tweak in how you ask ChatGPT can lead to much
    more helpful answers. Remember, the goal is to make your question as clear and
    specific as possible.
  id: totrans-1799
  prefs: []
  type: TYPE_NORMAL
  zh: 这些例子展示了如何通过稍微调整你询问ChatGPT的方式，可以导致得到更多有用的答案。记住，目标是使你的问题尽可能清晰和具体。
- en: So, now you know—ChatGPT isn’t perfect and can make mistakes, just like any
    of us. The key takeaway from this chapter is all about recognizing when your AI
    chat buddy is giving you the wrong information, for whatever reason, and knowing
    how to get your conversation back on track to get the results you were aiming
    for.
  id: totrans-1800
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你知道了——ChatGPT并不完美，会犯错误，就像我们任何人一样。本章的关键要点是关于识别你的AI聊天伙伴在什么原因下给你提供错误信息，并且知道如何让你的对话回到正轨，以获得你想要的结果。
- en: And this isn’t just about fixing errors; it’s about refining the way we communicate
    with AI to make our interactions as productive and useful as possible, in the
    shortest amount of time.
  id: totrans-1801
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅关于纠正错误；这是关于改进我们与AI沟通的方式，以使我们的互动尽可能高效和有用，在尽可能短的时间内。
- en: What’s the Next Step?
  id: totrans-1802
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是什么？
- en: Put these troubleshooting tips into practice! Whether you’re trying to automate
    your everyday tasks, seeking simple explanations of complicated topics, or trying
    to create a healthy meal plan for you and your family with ChatGPT, remember the
    CLEAR principles from Chapter 2.
  id: totrans-1803
  prefs: []
  type: TYPE_NORMAL
  zh: 将这些故障排除技巧付诸实践！无论你是在尝试自动化你的日常任务，寻求对复杂主题的简单解释，还是尝试用ChatGPT为你和家人制定一个健康的餐食计划，记住第二章中的CLEAR原则。
- en: By keeping your prompts CLEAR, you’re setting yourself up for a smoother journey
    into the magical world of AI. So keep practicing and playing around with your
    prompts, treating each interaction as a chance to get to know ChatGPT better.
    The better you understand ChatGPT and best ways to communicate it with it, the
    faster you’ll be able to use it to get anything you want done.
  id: totrans-1804
  prefs: []
  type: TYPE_NORMAL
  zh: 通过保持你的提示清晰，你正在为更顺利地进入AI的神奇世界做好准备。所以继续练习，尝试不同的提示，把每一次互动都当作了解ChatGPT更好的机会。你越了解ChatGPT以及与它沟通的最佳方式，你就越快能使用它来完成任何你想要的事情。
- en: Chapter 6
  id: totrans-1805
  prefs: []
  type: TYPE_NORMAL
  zh: 第六章
- en: Our Future with AI is Bright
  id: totrans-1806
  prefs: []
  type: TYPE_NORMAL
  zh: 我们与AI的未来是光明的
- en: “I’ve been thinking a lot about how AI can reduce some of the world’s worst
    inequities.
  id: totrans-1807
  prefs: []
  type: TYPE_NORMAL
  zh: “我一直在思考AI如何减少世界上的一些最严重的不平等问题。”
- en: — Bill Gates, Co-Founder of Microsoft
  id: totrans-1808
  prefs: []
  type: TYPE_NORMAL
  zh: ——比尔·盖茨，微软联合创始人
- en: We’ve gone over the basics and if you’ve made it this far, I’m going to assume
    you’ve had at least one chat with ChatGPT. Was it a magical experience? I hope
    so! Remember, AI like ChatGPT is new to everyone. Not Just you, if you are new
    to all of this. Even the people who are developing it are learning new things
    about what it’s capable of helping us with.
  id: totrans-1809
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经讲过了基础知识，如果你已经读到这儿，我会假设你至少和ChatGPT进行过一次对话。那是一次神奇的经历吗？我希望是！记住，像ChatGPT这样的AI对每个人来说都是新的。不仅是你，如果你对这一切都是新手的话。甚至那些开发它的人也在学习关于它能帮助我们做什么的新事物。
- en: AI has so much potential to enhance our capabilities as humans and if we learn
    how to use it now, we can use this technology to positively impact many aspects
    of life. Like I’ve been saying, AI can help us do more and do better every day.
  id: totrans-1810
  prefs: []
  type: TYPE_NORMAL
  zh: AI有巨大的潜力增强我们作为人类的能力，如果我们现在学会如何使用它，我们可以利用这项技术对生活的许多方面产生积极影响。就像我一直在说的，AI可以帮助我们每天做得更多，做得更好。
- en: AI Can Make Our World a Better Place
  id: totrans-1811
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以使我们的世界变得更美好
- en: '![](image_rsrc2YM.jpg)'
  id: totrans-1812
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc2YM.jpg)'
- en: 'DALL-E prompt: Create an image of a child working with his friendly AI robot
    tutor on homework, in a futuristic domestic setting, --ar 16:9'
  id: totrans-1813
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E提示：创建一个孩子与他的友好AI机器人导师一起做作业的图片，在一个未来派的家居环境中，--ar 16:9
- en: Bill Gates has written and spoke about how AI can aid healthcare, education,
    environmental sustainability, and economic opportunity. In an article he wrote
    on his blog called “The Age of AI has begun,” he says, “Philanthropy is my full-time
    job these days, and I’ve been thinking a lot about how—in addition to helping
    people be more productive—AI can reduce some of the world’s worst inequities.”
    The article describes the many opportunities AI can provide the world.
  id: totrans-1814
  prefs: []
  type: TYPE_NORMAL
  zh: 比尔·盖茨已经撰写并谈论了AI如何帮助医疗保健、教育、环境可持续性和经济机会。在他的博客文章《AI时代已经到来》中，他说：“慈善事业是我目前全职的工作，我一直在思考——除了帮助人们提高生产力之外，AI如何减少世界上的一些最严重的不平等。”这篇文章描述了AI可以为世界提供的许多机会。
- en: Gates talks about customized learning with AI tutors, smarter cities optimized
    by AI to reduce accidents and energy use, new medical discoveries enabled by analyzing
    huge datasets, and AI augmenting human capabilities across many fields.
  id: totrans-1815
  prefs: []
  type: TYPE_NORMAL
  zh: 盖茨谈论了与AI导师进行定制化学习，通过AI优化城市以减少事故和能源消耗，通过分析大量数据集实现的新医疗发现，以及AI在许多领域增强人类能力。
- en: He also thinks that in an AI-powered world, we won’t be pointing and clicking
    to use computers, and instead we’ll be communicating with plain English or other
    languages, controlling computers verbally using prompts. And with GPT-4o, we are
    already closer to this being a reality!
  id: totrans-1816
  prefs: []
  type: TYPE_NORMAL
  zh: 他还认为，在一个由人工智能驱动的世界中，我们不会用鼠标点击来使用电脑，而是会用简单的英语或其他语言进行交流，通过提示口头控制电脑。而随着GPT-4o的出现，我们离这一现实越来越近了！
- en: AI is Already Making a Difference
  id: totrans-1817
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在产生实际影响
- en: 'Healthcare: AI improves diagnostics, manages administrative tasks, and offers
    health advice in areas with limited medical access.'
  id: totrans-1818
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 医疗保健：人工智能改善诊断，管理行政任务，并在医疗资源有限的地区提供健康建议。
- en: 'Education: AI personalizes learning, provides immediate feedback, and supports
    career planning.'
  id: totrans-1819
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教育：人工智能个性化学习，提供即时反馈，并支持职业规划。
- en: 'Climate Change & Agriculture: AI develops climate-resilient seeds, advises
    farmers, and creates livestock vaccines.'
  id: totrans-1820
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 气候变化与农业：人工智能开发具有气候适应性的种子，为农民提供建议，并创造牲畜疫苗。
- en: 'Economic Opportunity: AI boosts productivity and reduces inequities by providing
    personalized assistance.'
  id: totrans-1821
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经济机会：人工智能通过提供个性化协助来提高生产力和减少不平等。
- en: Marc Andreessen, co-founder of the venture capital firm Andreessen Horowitz
    (A16Z), is a passionate advocate for the potential of AI to enhance our future.
    He describes AI as “a way to make everything we care about better.”
  id: totrans-1822
  prefs: []
  type: TYPE_NORMAL
  zh: 马克·安德森，安德森·霍洛维茨风险投资公司（A16Z）的联合创始人，是人工智能潜力增强我们未来的热情倡导者。他描述人工智能为“一种让我们所关心的一切变得更好的方式。”
- en: 'In his essay “Why AI Will Save the World,” Andreessen argues that human intelligence
    has always driven progress, leading to advancements in science, technology, medicine,
    the arts, and more. He writes:'
  id: totrans-1823
  prefs: []
  type: TYPE_NORMAL
  zh: 在他的文章《为什么人工智能将拯救世界》中，安德森认为人类智能始终是进步的驱动力，推动了科学、技术、医学、艺术等方面的进步。他写道：
- en: “What AI offers is the opportunity to profoundly augment human intelligence
    to make all of these outcomes of intelligence – and many others, from new medicines
    to solving climate change to reaching the stars – much, much better from here.
  id: totrans-1824
  prefs: []
  type: TYPE_NORMAL
  zh: “人工智能提供的是深刻增强人类智能的机会，使所有这些智能的成果——以及许多其他成果，从新药到解决气候变化到探索星辰——从现在开始变得更好得多。”
- en: Andreessen discusses how AI can significantly boost breakthroughs and productivity
    across various fields, including science, medicine, business, and the arts. He
    envisions AI assistants helping individuals reach their full potential and economic
    gains raising global living standards. With thoughtful application, AI could help
    tackle major challenges such as disease, climate change, and space exploration.
    In essence, Andreessen sees AI as a tool to enhance everything we care about.
  id: totrans-1825
  prefs: []
  type: TYPE_NORMAL
  zh: 安德森讨论了人工智能如何显著提升各个领域的突破和生产力，包括科学、医学、商业和艺术。他设想人工智能助手帮助个人发挥全部潜能，并提高全球经济水平。通过深思熟虑的应用，人工智能可以帮助解决诸如疾病、气候变化和太空探索等重大挑战。本质上，安德森将人工智能视为一个增强我们关心的一切的工具。
- en: With Great Power Comes Great Responsibility
  id: totrans-1826
  prefs: []
  type: TYPE_NORMAL
  zh: 能力越大，责任越大
- en: I didn’t realize “With great power comes great responsibility” was a Spider-Man
    quote until now. It’s a great quote! Like Spider-Man and Superman, who must use
    their incredible powers wisely, we also need to handle AI responsibly. While AI
    can do amazing things, we must be sure that it’s developed ethically and aligns
    with our values.
  id: totrans-1827
  prefs: []
  type: TYPE_NORMAL
  zh: 我直到现在才意识到“能力越大，责任越大”是蜘蛛侠的台词。这是一句伟大的台词！就像蜘蛛侠和超人一样，必须明智地使用他们惊人的力量，我们同样需要负责任地处理人工智能。虽然人工智能可以做惊人的事情，但我们必须确保它是以道德的方式开发的，并与我们的价值观相一致。
- en: But there are concerns. One is job disruption, and an even bigger worry is the
    potential danger of Artificial General Intelligence (AGI). AGI is AI that can
    understand, learn, and apply knowledge across a wide range of tasks, similar to
    human intelligence, and potentially even surpass it. Some fear that these super-smart
    computers might turn against us.
  id: totrans-1828
  prefs: []
  type: TYPE_NORMAL
  zh: 但也存在担忧。一个是工作中断，更大的担忧是通用人工智能（AGI）的潜在危险。AGI是一种能够理解、学习和应用知识广泛任务的AI，类似于人类智能，甚至可能超越它。有些人担心这些超级智能的计算机可能会反叛我们。
- en: This is a real concern, voiced by credible experts in the AI field. However,
    many knowledgeable people also believe this scenario is unlikely. It’s reassuring
    that those most concerned about AGI are the ones working to prevent such risks.
  id: totrans-1829
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个真正的担忧，由人工智能领域的可信专家提出。然而，许多有知识的人也认为这种情景不太可能。令人欣慰的是，最关心通用人工智能（AGI）风险的人正是那些致力于预防这种风险的人。
- en: For those of us without technical expertise, the best thing we can do is start
    using this technology now so we can learn how best to use it to build a better
    future. AI can help us do big things and improve our lives in many ways. But just
    start small.See how Chat can help you. Encourage others to try it out too! Together,
    we can shape the AI-powered world we want to live in.
  id: totrans-1830
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们这些没有技术专长的人来说，我们能做的最好的事情就是现在开始使用这项技术，这样我们就可以学习如何最好地使用它来创造一个更美好的未来。AI可以帮助我们完成大事，并在许多方面改善我们的生活。但只需从小处着手。看看Chat如何帮助你。鼓励其他人也尝试一下！我们一起塑造我们想要生活的AI驱动世界。
- en: Get to Know ChatGPT
  id: totrans-1831
  prefs: []
  type: TYPE_NORMAL
  zh: 了解ChatGPT
- en: Remember, it’s natural to fear what you don’t know. But we’re living in the
    AI revolution right now. It’s happening, and things are changing fast. Everyone
    is trying to figure out how they can use it to improve their lives and businesses.
    And for the first time in the history of revolutions, everyone has access to the
    new technology that is about to change the way the whole world runs.
  id: totrans-1832
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，害怕你所不知道的是很自然的。但我们现在正处于AI革命之中。它正在发生，事物变化迅速。每个人都试图弄清楚他们如何利用它来改善他们的生活和业务。而且，在革命历史上第一次，每个人都能够接触到即将改变整个世界运行方式的这项新技术。
- en: And a little tip, if you’re like me and trying to get your friends and family
    to try ChatGPT, try not even mentioning ‘AI.’ Just talk about this amazing new
    app you’ve been using. ‘ChatGPT’ or even better, just ‘Chat,’ is much more inviting.
    So, get to know Chat today and get some of the Ai magic in your life!
  id: totrans-1833
  prefs: []
  type: TYPE_NORMAL
  zh: 还有一个小贴士，如果你像我一样，试图让你的朋友和家人尝试ChatGPT，尽量不要提及“AI”。只需谈谈你一直在使用的这个惊人的新应用。‘ChatGPT’或者更好，只是‘Chat’，更具吸引力。所以，今天就开始了解Chat，让你的生活中充满一些AI的魔力！
- en: Bonus Chapter
  id: totrans-1834
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励章节
- en: New Features in ChatGPT-4o
  id: totrans-1835
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4o的新功能
- en: “We’re able to serve the best model in the world to, like, anybody who wants
    to download ChatGPT for free.
  id: totrans-1836
  prefs: []
  type: TYPE_NORMAL
  zh: “我们能够为想要免费下载ChatGPT的任何人提供世界上最好的模型。”
- en: — Sam Altman, CEO OpenAI
  id: totrans-1837
  prefs: []
  type: TYPE_NORMAL
  zh: ——Sam Altman，OpenAI首席执行官
- en: ChatGPT’s latest and greatest model, GPT-4o, was released to the public in May
    2024\. Along with an upgrade to the model, OpenAI also opened access to most of
    the features to free users. Now everyone can now enjoy some powerful new features
    for free. This update makes ChatGPT even more versatile and user-friendly, especially
    for those new to AI.
  id: totrans-1838
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT最新的和最好的模型GPT-4o于2024年5月向公众发布。随着模型的升级，OpenAI还向免费用户开放了大部分功能。现在每个人都可以免费享受一些强大的新功能。这次更新使ChatGPT更加灵活和用户友好，特别是对于那些刚开始接触AI的人来说。
- en: Whether you’re looking to get more done in less time or simply curious about
    the latest advancements, this section will get into the exciting new tools GPT-4o
    has to offer. With example prompts and use cases you can try out with ChatGPT.
  id: totrans-1839
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是想用更少的时间完成更多的工作，还是仅仅对最新的进展感到好奇，这一部分将介绍GPT-4o提供的新工具，你可以通过ChatGPT尝试这些示例提示和用例。
- en: GPT-4o’s ‘Omni’ capabilities mean it can understand and respond to a variety
    of inputs—text, images, and audio—making it easier than ever to interact with
    AI. Now you can tap a button in the ChatGPT app and start a chat with your voice.
    You can have an actual voice chat with Chat about anything you want. This chapter
    will show you how to access and use these new features to enhance your experience
    with ChatGPT and get the most out of this amazing technology.
  id: totrans-1840
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4o的“全能”功能意味着它可以理解和回应各种输入——文本、图像和音频——这使得与AI交互比以往任何时候都更容易。现在你可以在ChatGPT应用中轻触一个按钮，并通过语音开始聊天。你可以与Chat进行任何你想要的真正语音聊天。这一章节将向你展示如何访问和使用这些新功能，以增强你在ChatGPT中的体验并充分利用这项惊人的技术。
- en: New Features in ChatGPT-4o
  id: totrans-1841
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4o的新功能
- en: The ‘O’ in GPT-4o stands for “Omni.” This means that GPT-4o is designed to handle
    all kinds of inputs and outputs, making it very versatile nd easier than ever
    to use.
  id: totrans-1842
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4o中的“O”代表“全能”。这意味着GPT-4o被设计来处理所有类型的输入和输出，使其非常灵活，并且比以往任何时候都更容易使用。
- en: 'Omni means that GPT-4o can understand and respond to:'
  id: totrans-1843
  prefs: []
  type: TYPE_NORMAL
  zh: “全能”意味着GPT-4o可以理解和回应：
- en: 'Text: You can type questions or commands'
  id: totrans-1844
  prefs: []
  type: TYPE_NORMAL
  zh: 文本：你可以输入问题或命令
- en: 'Images: You can upload pictures and ask about them'
  id: totrans-1845
  prefs: []
  type: TYPE_NORMAL
  zh: 图像：你可以上传图片并询问它们
- en: 'Audio: You can use your voice to ask questions or give commands'
  id: totrans-1846
  prefs: []
  type: TYPE_NORMAL
  zh: 音频：你可以使用你的声音来提问或下达命令
- en: 'Video: Future updates will allow video inputs too'
  id: totrans-1847
  prefs: []
  type: TYPE_NORMAL
  zh: 视频：未来的更新将允许视频输入
- en: 'ChatGPT can reply with:'
  id: totrans-1848
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以回应：
- en: 'Text: Written answers'
  id: totrans-1849
  prefs: []
  type: TYPE_NORMAL
  zh: 文本：书面答案
- en: 'Audio: Spoken responses'
  id: totrans-1850
  prefs: []
  type: TYPE_NORMAL
  zh: 音频：语音回应
- en: 'Images: Pictures or diagrams'
  id: totrans-1851
  prefs: []
  type: TYPE_NORMAL
  zh: 图像：图片或图表
- en: 'The Smartest and Most Capable AI for Everyone:'
  id: totrans-1852
  prefs: []
  type: TYPE_NORMAL
  zh: 适用于每个人的最聪明和最有能力的AI：
- en: The newly released ChatGPT-4o model uses advanced AI technology, which means
    it’s one of the smartest and most capable models available today. This just means
    it can understand even more complex questions and provide answers with greater
    detail and accuracy than the last model. The best part is that whether you have
    a paid Plus subscription or a free account, you can access these powerful features.
  id: totrans-1853
  prefs: []
  type: TYPE_NORMAL
  zh: 新发布的 ChatGPT-4o 模型使用先进的 AI 技术，这意味着它是目前最智能、最强大的模型之一。这意味着它可以理解更复杂的问题，并且比上一个模型提供更详细、更准确的答案。最好的部分是，无论您是否有付费
    Plus 订阅还是免费账户，您都可以访问这些强大的功能。
- en: Voice Interactions
  id: totrans-1854
  prefs: []
  type: TYPE_NORMAL
  zh: 语音交互
- en: Use your voice to chat with ChatGPT, making the experience more natural hands-free,
    and magical.
  id: totrans-1855
  prefs: []
  type: TYPE_NORMAL
  zh: 使用您的声音与 ChatGPT 聊天，使体验更加自然、免提和神奇。
- en: 'Example prompt: “I have a 30-minute drive, let’s continue working on my Spanish.
    Create a fun lesson we can do to help me with pronunciations.“'
  id: totrans-1856
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示： “我有一个 30 分钟的车程，让我们继续我的西班牙语练习。创建一个有趣的课程，我们可以用它来帮助我练习发音。”
- en: 'Why it’s useful: Voice interactions allow you to use ChatGPT while multitasking
    or when typing isn’t convenient, making it even more helpful.'
  id: totrans-1857
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有用：语音交互允许您在多任务处理或打字不方便时使用 ChatGPT，使其更加有用。
- en: Create and analyze charts
  id: totrans-1858
  prefs: []
  type: TYPE_NORMAL
  zh: 创建和分析图表
- en: Make data analysis easier and more visual.
  id: totrans-1859
  prefs: []
  type: TYPE_NORMAL
  zh: 使数据分析更容易且更直观。
- en: 'Example prompt: “Create a bar chart comparing the population of the top 5 largest
    cities in the world.”'
  id: totrans-1860
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示： “创建一个比较世界上前五大城市人口的条形图。”
- en: 'Why it’s useful: ChatGPT can generate visual data representations quickly,
    helping you understand and present data more effectively.'
  id: totrans-1861
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有用：ChatGPT 可以快速生成视觉数据表示，帮助您更有效地理解和展示数据。
- en: Visual Interactions
  id: totrans-1862
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉交互
- en: Show photos to the AI and discuss them.
  id: totrans-1863
  prefs: []
  type: TYPE_NORMAL
  zh: 向 AI 展示照片并讨论它们。
- en: 'Example prompt: “What can you tell me about this painting?” (Upload a photo
    of a famous artwork)'
  id: totrans-1864
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示： “你能告诉我关于这幅画什么吗？”（上传一幅著名艺术作品的图片）
- en: 'Why it’s useful: ChatGPT can analyze and provide insights on images, making
    it useful for learning more about art, landmarks, and more.'
  id: totrans-1865
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有用：ChatGPT 可以分析和提供关于图像的见解，这使得它对于了解艺术、地标等非常有用。
- en: File Handling
  id: totrans-1866
  prefs: []
  type: TYPE_NORMAL
  zh: 文件处理
- en: Upload files and get help with summarizing or analyzing them.
  id: totrans-1867
  prefs: []
  type: TYPE_NORMAL
  zh: 上传文件并获得总结或分析它们的帮助。
- en: 'Example prompt: “Summarize the key points from this PDF report.” (Upload the
    file)'
  id: totrans-1868
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示： “从这份 PDF 报告中总结关键点。”（上传文件）
- en: 'Why it’s useful: ChatGPT can quickly process and summarize documents, making
    it easier to digest large amounts of information.'
  id: totrans-1869
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有用：ChatGPT 可以快速处理和总结文档，使消化大量信息变得更容易。
- en: Discover AI Tools
  id: totrans-1870
  prefs: []
  type: TYPE_NORMAL
  zh: 发现 AI 工具
- en: Find and use special AI tools from the GPT Store.
  id: totrans-1871
  prefs: []
  type: TYPE_NORMAL
  zh: 从 GPT 商店中查找和使用特殊的 AI 工具。
- en: 'Example prompt: “What tools can help me improve my productivity?”'
  id: totrans-1872
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示： “有什么工具可以帮助我提高我的生产力？”
- en: 'Why it’s useful: ChatGPT can recommend specific tools designed to enhance productivity,
    tailored to your needs.'
  id: totrans-1873
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有用：ChatGPT 可以推荐专为提高生产力而设计的特定工具，满足您的需求。
- en: Enhanced Chat Experience
  id: totrans-1874
  prefs: []
  type: TYPE_NORMAL
  zh: 优化聊天体验
- en: Have the AI remember things to make your interactions smoother and more personalized.
  id: totrans-1875
  prefs: []
  type: TYPE_NORMAL
  zh: 让 AI 记住事情，使您的交互更加顺畅和个性化。
- en: 'Example prompt: “Remember that I prefer low-carb recipes.”'
  id: totrans-1876
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示： “记住我更喜欢低碳食谱。”
- en: 'Why it’s useful: ChatGPT can tailor its responses based on your preferences,
    making your interactions more personalized and efficient.'
  id: totrans-1877
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有用：ChatGPT 可以根据您的偏好定制其响应，使您的交互更加个性化和高效。
- en: The paid version, ChatGPT Plus, offers additional perks like higher usage limits
    and early access to new features. For me, it’s worth the $20/month. I use it all
    day and need that higher usage limit. But the free version of ChatGPT now is just
    as powerful. With the last model, access to the best, most powerful model was
    limit to paid subscribers so its a good time to get started. ([OpenAI Help Center](https://help.openai.com/en/collections/3742473-chatgpt)).
  id: totrans-1878
  prefs: []
  type: TYPE_NORMAL
  zh: 支付版本 ChatGPT Plus 提供了额外的优惠，如更高的使用限制和早期访问新功能。对我来说，每月 20 美元是值得的。我整天都在使用它，需要更高的使用限制。但现在的免费版
    ChatGPT 仍然非常强大。在最新的模型中，最佳、最强大的模型仅限于付费订阅者，所以现在是开始的好时机。（[OpenAI 帮助中心](https://help.openai.com/en/collections/3742473-chatgpt)）
- en: How to Use the New Features in ChatGPT-4o
  id: totrans-1879
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用 ChatGPT-4o 的新功能
- en: '![an image of a friendly robot with a round body and expressive eyes holding
    a ''The End'' sign against a vibrant, cozy, and futuristic background](image_rsrc2YN.jpg)'
  id: totrans-1880
  prefs: []
  type: TYPE_IMG
  zh: '![一个友好机器人的图片，它有一个圆形的身体和表情丰富的眼睛，手持一个‘The End’标志，背景是充满活力、舒适和未来感的](image_rsrc2YN.jpg)'
- en: On the Web
  id: totrans-1881
  prefs: []
  type: TYPE_NORMAL
  zh: 在网页上
- en: 'Headphone icon (bottom right corner):'
  id: totrans-1882
  prefs: []
  type: TYPE_NORMAL
  zh: 耳机图标（右下角）：
- en: 'What it does: Lets you talk to ChatGPT instead of typing.'
  id: totrans-1883
  prefs: []
  type: TYPE_NORMAL
