- en: Scenario 30
  prefs: []
  type: TYPE_NORMAL
- en: Create a UserForm which will accept the participant’s information to get enrolled
    for the training. The form should have Insert and Cancel command buttons. When
    the Insert button is clicked, the information entered in the form must go into
    Excel. When the Cancel button is clicked, the Form should be closed.
  prefs: []
  type: TYPE_NORMAL
- en: Solution
  prefs: []
  type: TYPE_NORMAL
- en: Follow the steps below.
  prefs: []
  type: TYPE_NORMAL
- en: 1. Insert a UserForm.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Change the name and caption from the property window.
  prefs: []
  type: TYPE_NORMAL
- en: 3. The name of the form should be “USR_enroll.”
  prefs: []
  type: TYPE_NORMAL
- en: 4. The caption should be “Training Enrollment Form.”
  prefs: []
  type: TYPE_NORMAL
- en: 5. Design the form as shown in [Figure 22.5](#fig22-5).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_22.5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 22.5 Scenario 30 Solution
  prefs: []
  type: TYPE_NORMAL
- en: This example has several properties.
  prefs: []
  type: TYPE_NORMAL
- en: '■Label: Displays descriptive text.'
  prefs: []
  type: TYPE_NORMAL
- en: '■TextBox: A TextBox is the control most commonly used to display information
    entered by a user.'
  prefs: []
  type: TYPE_NORMAL
- en: '■ListBox: Displays a list of values and lets you select one or more.'
  prefs: []
  type: TYPE_NORMAL
- en: '■ComboBox: Combines the features of a ListBox and a TextBox. The user can enter
    a new value, as with a TextBox, or the user can select an existing value, as with
    a ListBox.'
  prefs: []
  type: TYPE_NORMAL
- en: '■Frame: Creates a functional and visual control group.'
  prefs: []
  type: TYPE_NORMAL
- en: '■Properties: Attributes (properties or variables).'
  prefs: []
  type: TYPE_NORMAL
- en: '■Methods: Operations the object will perform with the attribute.'
  prefs: []
  type: TYPE_NORMAL
- en: Refer to the following [Table 22.1](#tab22-1).
  prefs: []
  type: TYPE_NORMAL
- en: TABLE 22.1 Employee UserForm
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/pg-268.jpg)'
