- en: 'Example: Virtual prototyping'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：虚拟原型
- en: 'Application :  Product designers employ AI models to visualize prototypes before
    physical production, saving time and resources by avoiding costly hardware iterations.'
  id: totrans-390
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用：产品设计师使用AI模型在实物生产前可视化原型，通过避免昂贵的硬件迭代来节省时间和资源。
- en: Art and entertainment
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 艺术与娱乐
- en: '![](images/image1.png)'
  id: totrans-392
  prefs: []
  type: TYPE_IMG
  zh: '![图片1](images/image1.png)'
- en: 'Example: Creating works of art'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：创作艺术作品
- en: 'Application :  Artists collaborate with AI to explore new forms of creative
    expression, generating unique works of art or visuals for video games and films.'
  id: totrans-394
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用：艺术家与AI合作探索新的创意表达形式，为视频游戏和电影生成独特的艺术作品或视觉图像。
- en: Architecture and interior design
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 建筑与室内设计
- en: '![](images/image6.png)'
  id: totrans-396
  prefs: []
  type: TYPE_IMG
  zh: '![图片6](images/image6.png)'
- en: 'Example: Architectural visualization'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：建筑可视化
- en: 'Application :  Architects and interior designers are using AI to create photorealistic
    renderings of buildings or interior designs, allowing clients to imagine themselves
    in unbuilt spaces.'
  id: totrans-398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用：建筑师和室内设计师使用AI创建建筑或室内设计的逼真渲染图，使客户能够想象自己在尚未建造的空间中。
- en: E-Commerce
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 电子商务
- en: '![](images/image5.png)'
  id: totrans-400
  prefs: []
  type: TYPE_IMG
  zh: '![图片5](images/image5.png)'
- en: 'Example: Displaying personalized products'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：展示个性化产品
- en: 'Application :  E-commerce platforms generate personalized product images in
    real time, showing how a product can be customized in color, texture, or style
    according to customer preferences.'
  id: totrans-402
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用：电子商务平台实时生成个性化产品图像，根据客户偏好展示产品在颜色、纹理或风格上的定制方式。
- en: Education and formation
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 教育与培训
- en: '![](images/image3.png)'
  id: totrans-404
  prefs: []
  type: TYPE_IMG
  zh: '![图片3](images/image3.png)'
- en: 'Example: Visual teaching materials'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：视觉教学材料
- en: 'Application :  Educators and educational content creators use AI models to
    create illustrations and animations that make abstract concepts more accessible
    and engaging for students.'
  id: totrans-406
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用：教育工作者和教育内容创作者使用AI模型创建插图和动画，使抽象概念对学生来说更加易于理解和吸引人。
- en: Research and data science
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 研究与数据科学
- en: 'Example: Visualizing complex data'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：可视化复杂数据
- en: 'Application :  Data scientists rely on AI to transform complex data sets into
    understandable visualizations, making it easier to analyze and communicate research
    results.'
  id: totrans-409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用：数据科学家依赖AI将复杂的数据集转化为可理解的视觉图表，使分析和传达研究结果变得更加容易。
- en: Fashion and textiles
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 时尚与纺织品
- en: '![](images/image4.png)'
  id: totrans-411
  prefs: []
  type: TYPE_IMG
  zh: '![图片4](images/image4.png)'
- en: 'Example: Virtual Fashion Design'
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：虚拟时尚设计
- en: 'Application :  Fashion designers leverage AI to design clothing patterns or
    to simulate the appearance of fabrics with different patterns and textures, speeding
    up the creative process.'
  id: totrans-413
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用：时尚设计师利用AI设计服装图案或模拟不同图案和纹理的布料外观，加快创作过程。
- en: 'Conclusion: AI image generation offers immense opportunities across various
    industries, enabling rapid visual creation, mass customization, and creative explorations
    without the traditional constraints of time, cost, or physical resources. As technology
    continues to evolve, we can expect these applications to expand, providing even
    more innovative possibilities and transforming the way visuals are created and
    used across all domains.'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：人工智能图像生成在各个行业中提供了巨大的机遇，它使快速视觉创作、大规模定制和创意探索成为可能，而无需传统的时、成本或物理资源限制。随着技术的持续发展，我们可以期待这些应用将进一步扩展，提供更多创新的可能性，并改变所有领域视觉创作和使用的方式。
- en: ……………………………………….
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: ……………………………………….
- en: 'Chapter 20: PART 2 – The impact of AI in video'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 第20章：第二部分 – 人工智能在视频中的影响
- en: Artificial intelligence has revolutionized video content creation, bringing
    innovations that transform not only production and editing, but also how content
    is generated and personalized. This Chapter focuses on recent advances in AI in
    video and explores the future possibilities it offers.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能已经彻底改变了视频内容创作，带来了不仅改变生产和编辑，还改变内容生成和个性化的创新。本章重点介绍人工智能在视频领域的最新进展，并探讨它提供的未来可能性。
- en: Recent advances
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 近期进展
- en: 'Automated editing:  AI can now analyze and edit videos to optimize storytelling,
    choosing the best shots, adjusting pacing, and even applying basic color corrections
    or special effects, significantly reducing hours of manual work.'
  id: totrans-419
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动编辑：现在人工智能可以分析和编辑视频以优化叙事，选择最佳镜头，调整节奏，甚至应用基本的色彩校正或特效，显著减少手动工作的小时数。
- en: 'Image recognition and processing:  Advances in image recognition and deep learning
    enable AI to understand and process video content at a detailed level, identifying
    characters, objects, and actions for classification, search, and metric extraction.'
  id: totrans-420
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像识别和处理：图像识别和深度学习的进步使人工智能能够以详细程度理解和处理视频内容，识别角色、物体和动作以进行分类、搜索和指标提取。
- en: 'Voice and face synthesis:  The ability to synthesize realistic voices and faces
    opens the door to creating videos with virtual characters or regenerating dialogue
    for dubbing in different languages.'
  id: totrans-421
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语音和面部合成：合成逼真的语音和面部能力为创建带有虚拟角色的视频或为不同语言的配音再生对话打开了大门。
- en: 'AI-assisted production:  AI algorithms assist in making filmmaking decisions,
    such as the optimal camera angle, cut timing, or even suggesting scenarios based
    on trending data.'
  id: totrans-422
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能辅助制作：人工智能算法协助制作决策，例如最佳拍摄角度、剪辑时间或基于趋势数据提出场景建议。
- en: Future possibilities
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 未来可能性
- en: 'Content personalization : AI has the potential to personalize videos for individual
    audiences, changing elements in real time to adapt to viewers'' specific preferences
    and interests.'
  id: totrans-424
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容个性化：人工智能有潜力为个人观众个性化视频，实时改变元素以适应观众的具体偏好和兴趣。
- en: 'Augmented and virtual reality:  With AI, content creation for augmented reality
    (AR) and virtual reality (VR) will become more intuitive, enabling richer, more
    interactive immersive experiences.'
  id: totrans-425
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 增强现实和虚拟现实：借助人工智能，增强现实（AR）和虚拟现实（VR）的内容创作将变得更加直观，从而提供更丰富、更具交互性的沉浸式体验。
- en: 'Automated scripting: AI could generate video scripts based on content performance
    data, identifying which elements resonate best with audiences to suggest themes
    and storylines.'
  id: totrans-426
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动脚本生成：人工智能可以根据内容表现数据生成视频脚本，识别与观众产生共鸣的最佳元素，以建议主题和情节。
- en: 'Optimization for platforms: AI could automatically optimize videos for different
    platforms, adjusting resolution, format, and even content to maximize engagement
    on each channel.'
  id: totrans-427
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平台优化：人工智能可以自动为不同平台优化视频，调整分辨率、格式，甚至内容，以最大化每个渠道的参与度。
- en: 'Conclusion: The impact of AI in video content creation is already considerable,
    and we can expect its role to expand even further. Recent innovations are just
    the beginning of a deeper transformation that will touch every aspect of video
    production, giving creators powerful tools to tell stories, engage viewers and
    personalize the viewing experience. Looking to the future, the possibilities seem
    almost limitless, with AI positioning itself as an essential creative partner
    in the video industry.'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：人工智能在视频内容创作中的影响已经相当显著，我们可以期待其作用将进一步扩大。最近的创新只是更深层次变革的开始，这将触及视频制作的各个方面，为创作者提供强大的工具来讲述故事、吸引观众并个性化观看体验。展望未来，可能性似乎几乎是无限的，人工智能将自己定位为视频行业不可或缺的创意合作伙伴。
- en: ……………………………………….
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: ……………………………………….
- en: 'Chapter 21: From idea to video'
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 第21章：从想法到视频
- en: Creating video content from prompts relies on the ability to translate narrative
    concepts into dynamic visuals. AI offers innovative tools for this transformation,
    making the process more accessible and efficient. Here's a step-by-step guide
    to creating videos from prompts using AI-powered tools.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 从提示创建视频内容依赖于将叙事概念转化为动态视觉的能力。AI为此转换提供了创新工具，使过程更加易于访问和高效。以下是使用AI工具从提示创建视频的逐步指南。
- en: 'Step 1: Definition of the idea and concept of the video'
  id: totrans-432
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：定义视频的想法和概念
- en: 'Before generating a video, clearly define your idea and the message you want
    to convey. Consider the following:'
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 在生成视频之前，明确界定你的想法和想要传达的信息。考虑以下因素：
- en: 'Objective of the Video:  Determine what you want to accomplish with video (inform,
    entertain, educate, etc.).'
  id: totrans-434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频目标：确定你希望通过视频实现的目标（传达信息、娱乐、教育等）。
- en: 'Target audience : Identify the audience the video is intended for.'
  id: totrans-435
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标受众：确定视频的目标受众。
- en: 'Tone and Style:  Choose the tone (serious, playful, didactic) and the visual
    style (realistic, animated, abstract).'
  id: totrans-436
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语气和风格：选择语气（严肃、轻松、教育）和视觉风格（写实、动画、抽象）。
- en: 'Step 2: Writing the video prompt'
  id: totrans-437
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：编写视频提示
- en: 'Formulate a prompt that will describe in detail what you want to see in the
    video:'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 制定一个提示，详细描述你希望在视频中看到的内容：
- en: 'Narrative Content: I nclude a description of the storyline, characters, and
    key events.'
  id: totrans-439
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 叙事内容：包括故事情节、角色和关键事件的描述。
- en: 'Visual Guidelines : Specify visual elements such as settings, objects, and
    atmosphere.'
  id: totrans-440
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视觉指南：指定视觉元素，如场景、物体和氛围。
- en: 'Directives Audio : Decide if you need music, sound effects or narration.'
  id: totrans-441
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指令音频：决定是否需要音乐、音效或旁白。
- en: 'Step 3: Selecting AI tools for video'
  id: totrans-442
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第3步：选择视频的AI工具
- en: 'Choose an AI tool tailored to your needs that can interpret prompts and create
    video content. Look for platforms that offer features like:'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 选择适合你需求的AI工具，该工具可以解释提示并创建视频内容。寻找提供以下功能的平台：
- en: 'Generation of Images and Animations : Able to transform text descriptions into
    images and animations.'
  id: totrans-444
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像和动画生成：能够将文本描述转换为图像和动画。
- en: 'Editing and Editing: Allowing images to be assembled into coherent video sequences.'
  id: totrans-445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编辑和编辑：允许将图像组装成连贯的视频序列。
- en: 'Audio synthesis: To add AI-generated narration or music.'
  id: totrans-446
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 音频合成：添加AI生成的旁白或音乐。
- en: 'Step 4: Settings and customization'
  id: totrans-447
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第4步：设置和定制
- en: 'Customize the AI ​​tool settings to meet your video specifications:'
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义AI工具设置以满足你的视频规格：
- en: 'Video duration: Set the total length of the video.'
  id: totrans-449
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频时长：设置视频的总时长。
- en: 'Resolution and quality:  Choose the resolution (HD, 4K) and adjust the quality
    of the visuals.'
  id: totrans-450
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分辨率和质量：选择分辨率（高清、4K）并调整视觉质量。
- en: 'Transitions and effects:  Select the types of transitions between scenes and
    special effects.'
  id: totrans-451
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过渡和效果：选择场景之间的过渡类型和特殊效果。
- en: 'Step 5: Generation and review'
  id: totrans-452
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第5步：生成和审查
- en: 'Start generating the video. Once the content is created, review the video to
    make sure it matches your vision:'
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 开始生成视频。一旦内容创建完成，审查视频以确保它符合你的愿景：
- en: 'Content review: Verify that all elements of the prompt are present and correctly
    represented.'
  id: totrans-454
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容审查：验证提示的所有元素都存在且正确表示。
- en: 'Adjustments and refinements:  Make adjustments as necessary, by editing the
    prompt or using additional editing tools to refine the video.'
  id: totrans-455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调整和细化：根据需要通过编辑提示或使用额外的编辑工具来调整视频。
- en: 'Step 6: Integration and finalization'
  id: totrans-456
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第6步：整合和最终确定
- en: Include any additional non-AI-generated content, such as logos or calls to actions.
    Finalize the video, making sure the audio is in sync with the video and all effects
    are in place.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 包含任何额外的非AI生成内容，如标志或行动号召。完成视频制作，确保音频与视频同步，所有效果都已到位。
- en: 'Bottom line: Creating a video from a prompt using AI can simplify and speed
    up the video production process, allowing creators to focus on design and storytelling
    rather than the technical aspects of production. With the continued evolution
    of AI, creators can expect even more powerful and intuitive tools to bring their
    video ideas to life.'
  id: totrans-458
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 总结：使用AI从提示创建视频可以简化并加快视频制作过程，让创作者能够专注于设计和叙事，而不是制作的技术方面。随着AI的持续发展，创作者可以期待更强大、更直观的工具将他们的视频想法变为现实。
- en: ……………………………………….
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: ……………………………………….
- en: 'Chapter 22: Example application for video content generation'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 第22章：视频内容生成的示例应用
- en: Video content generation using artificial intelligence (AI) is revolutionizing
    various industries, providing innovative solutions that reduce production time
    and costs while opening up new creative possibilities. Let’s look at some examples
    where AI video generation has been used in innovative ways.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 使用人工智能（AI）生成视频内容正在改变各个行业，提供创新的解决方案，减少生产时间和成本，同时开辟新的创意可能性。让我们看看一些AI视频生成在创新方式中应用的例子。
- en: 'Example 1: Creating movie trailers'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 1：制作电影预告片
- en: 'Application :  Production studios are using AI to generate movie trailers by
    analyzing the entire movie content and selecting key moments that capture the
    essence of the story without revealing spoilers.'
  id: totrans-463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用：制作室正在使用AI通过分析整部电影内容并选择能够捕捉故事精髓的关键时刻来生成电影预告片，而不会泄露剧透。
- en: 'Innovation : AI can identify emotional peaks and action sequences, combining
    these elements to create a cohesive and engaging trailer in a fraction of the
    time a human editor would take.'
  id: totrans-464
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创新：人工智能可以识别情感高潮和动作序列，将这些元素结合起来，以人类编辑所需时间的一小部分创建一个连贯且引人入胜的预告片。
- en: 'Example 2: Personalized educational videos'
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 2：个性化教育视频
- en: 'Application :  Educational platforms use AI to produce personalized video content
    tailored to each learner''s level and interests, presenting complex concepts in
    a visual and interactive way.'
  id: totrans-466
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用：教育平台利用人工智能（AI）为每位学习者量身定制视频内容，根据其水平和兴趣进行个性化调整，以视觉和互动的方式呈现复杂概念。
- en: 'Innovation : AI can assemble videos from a library of educational content based
    on students'' responses to quizzes or their progress through a learning program,
    providing a tailored learning experience.'
  id: totrans-467
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创新：人工智能可以根据学生对测验的反应或他们在学习计划中的进度，从教育内容库中组装视频，提供定制的学习体验。
- en: 'Example 3: Targeted advertisements'
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 3：定向广告
- en: 'Application : Advertising agencies use AI tools to quickly generate targeted
    video ads for specific market segments, testing different versions to see which
    resonates best with a given audience.'
  id: totrans-469
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用：广告公司使用AI工具快速为特定市场细分生成目标视频广告，测试不同版本以查看哪个版本最能引起目标受众的共鸣。
- en: 'Innovation :  AI can adjust video content to reflect demographics, consumer
    preferences, or even current weather conditions, making advertising more relevant
    and personal to the viewer.'
  id: totrans-470
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创新：人工智能可以根据人口统计、消费者偏好或甚至当前天气条件调整视频内容，使广告对观众更加相关和个性化。
- en: 'Example 4: Animation of virtual characters'
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 4：虚拟角色的动画
- en: 'Application : Social media content creators and streamers use AI to animate
    avatars or virtual characters in real time, enabling dynamic interaction with
    their audiences without requiring live filming.'
  id: totrans-472
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用：社交媒体内容创作者和直播者使用AI实时动画化头像或虚拟角色，无需现场拍摄即可与观众进行动态互动。
- en: 'Innovation : AI captures the user''s facial expressions and movements and translates
    them onto the avatar, creating an immersive experience for viewers and offering
    a new form of digital creativity for content creators.'
  id: totrans-473
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创新：人工智能捕捉用户的面部表情和动作，并将它们转换到头像上，为观众创造沉浸式体验，并为内容创作者提供一种新的数字创意形式。
- en: 'Example 5: Summary of training scenarios'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 示例 5：培训场景总结
- en: 'Application : Companies use AI to create video training scenarios, simulating
    professional situations for training in management, customer service, or workplace
    safety.'
  id: totrans-475
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用：公司使用AI创建视频培训场景，模拟专业情境进行管理、客户服务或工作场所安全培训。
- en: 'Innovation : AI can generate realistic interactions between virtual characters,
    allowing employees to visualize and practice responses to complex scenarios without
    the costs associated with staging in-person training.'
  id: totrans-476
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创新：人工智能可以生成虚拟角色之间的逼真互动，使员工能够在不涉及现场培训成本的情况下，可视化并练习对复杂场景的回应。
- en: 'Conclusion: These examples illustrate the breadth of possible applications
    for AI video content generation. By integrating technological innovation into
    creative and operational processes, AI paves the way for significant improvements
    in efficiency, personalization and engagement. As technology evolves, we can expect
    to see more and more areas leveraging these tools to create rich and engaging
    video experiences.'
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：这些例子展示了人工智能视频内容生成的广泛应用。通过将技术创新融入创意和运营流程，人工智能为效率、个性化和参与度的显著提升铺平了道路。随着技术的进步，我们可以期待看到越来越多的领域利用这些工具来创造丰富和引人入胜的视频体验。
- en: ……………………………………….
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: ……………………………………….
- en: 'Chapter 23: Prompt templates for video creation'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 第 23 章：视频创建的提示模板
- en: Formulating prompts for AI-assisted video creation is a skill that combines
    creativity and technical understanding. A good prompt should be descriptive enough
    to guide the AI, but also leave room for creativity and interpretation. Here are
    tips for designing effective prompts in this context.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 制定AI辅助视频创作的提示是一项结合创造力和技术理解的技能。一个好的提示应该足够描述性，以引导AI，但也要留出空间进行创造性和解释。以下是在此背景下设计有效提示的技巧。
- en: 1\. Define the purpose of the video
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 定义视频的目的
- en: Start by clarifying what you want your video to accomplish. Do you want to inform,
    entertain, educate or inspire? Your prompt should reflect this goal by indicating
    the desired tone and style.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 首先明确你希望视频达到的目标。你是想提供信息、娱乐、教育还是启发？你的提示应该通过表明期望的语气和风格来反映这一目标。
- en: 'Example of Prompt:  “Create an educational video that explains the water cycle
    in a cartoon style for elementary school children.”'
  id: totrans-483
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示示例：“为小学生制作一个以卡通风格解释水循环的教育视频。”
- en: 2\. Include narrative elements
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 包含叙事元素
- en: Narrative elements are essential to capture attention. Describe the storyline,
    main characters, and conflicts or key plot points.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 叙事元素对于吸引注意力至关重要。描述故事情节、主要角色、冲突或关键情节点。
- en: 'Example of Prompt:  “Generates a one-minute video where a young explorer discovers
    an enchanted forest, meets its magical creatures and learns about the importance
    of preserving the environment.”'
  id: totrans-486
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示示例：“生成一个一分钟的视频，讲述一位年轻探险家发现一个魔幻森林，遇见其神奇生物，并了解保护环境的重要性。”
- en: 3\. Specify the visual and auditory elements
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 指定视觉和听觉元素
- en: Describe the visuals you imagine, including settings, objects, dominant colors
    and general style. Don't forget to include details about the soundtrack or sound
    effects that accompany the images.
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 描述你想象的视觉元素，包括场景、物体、主导颜色和总体风格。不要忘记包括与图像伴随的音轨或音效的细节。
- en: 'Example of Prompt: “Produce a promotional video with aerial footage of a vibrant
    city at dusk, accented by upbeat, modern music.”'
  id: totrans-489
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示示例：“制作一个以黄昏时分充满活力的城市航拍画面为特色的促销视频，配以欢快的现代音乐。”
- en: 4\. Structure the content
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 结构化内容
- en: If the video must follow a particular structure, indicate this. This can include
    introduction, development, climax and conclusion.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 如果视频必须遵循特定的结构，请指明。这可以包括介绍、发展、高潮和结论。
- en: 'Example of Prompt : "Makes a video editing tutorial that begins with an introduction
    to the software, shows the editing process step-by-step, and ends with a presentation
    of the finished product."'
  id: totrans-492
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示示例：“制作一个视频剪辑教程，从软件介绍开始，逐步展示编辑过程，并以展示成品结束。”
- en: 5\. Mention the duration and format
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 提及时长和格式
- en: Indicate how long you want the video to be and whether it should follow specific
    formats for different platforms (like Instagram, YouTube, or TikTok).
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 指明你希望视频有多长，以及它是否应该遵循针对不同平台（如Instagram、YouTube或TikTok）的特定格式。
- en: 'Example of Prompt: “Created a 30-second vertical format teaser for a new fitness
    mobile app, designed for Instagram Stories.”'
  id: totrans-495
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示示例：“为Instagram Stories设计了一个30秒的垂直格式预告片，用于新的健身移动应用。”
- en: 6\. Integrate creative constraints
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 集成创意限制
- en: Add constraints to stimulate creativity, such as time limits, specific themes
    or the exclusive use of certain types of images or animations.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 添加限制以激发创造力，例如时间限制、特定主题或仅使用某些类型的图像或动画。
- en: 'Example of Prompt: “Design an advertising clip where only 2D animations are
    used to highlight the features of a new smartphone.”'
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：“设计一个仅使用2D动画来突出新智能手机功能的广告片段。”
- en: 'Conclusion: Designing prompts for video creation with the help of AI is a balance
    between precision and creative freedom. A well-thought-out prompt can make creating
    engaging videos much easier, providing enough guidance to guide the AI ​​while
    still allowing for innovation and originality. With practice and experimentation,
    you can fine-tune your prompts to get the most out of AI-powered video creation
    tools.'
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：使用AI帮助设计视频创作是一个精确性和创意自由的平衡。一个经过深思熟虑的提示可以使创建引人入胜的视频变得容易得多，为AI提供足够的指导，同时仍然允许创新和原创性。通过实践和实验，你可以微调你的提示，以充分利用AI驱动的视频创作工具。
- en: ……………………………………….
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: ……………………………………….
- en: 'Chapter 24: Bonus: Essential AI for creating your own music'
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 第24章：附加内容：创建个人音乐必备的AI
- en: Artificial intelligence has become a key player in the field of musical creation.
    It offers new ways to compose, produce and perform music, democratizing musical
    creation for artists of all levels. This Chapter provides an overview of techniques,
    tools, and success stories in using AI for music creation.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能已成为音乐创作领域的关键参与者。它为作曲、制作和表演音乐提供了新的方式，为所有水平的艺术家民主化音乐创作。本章概述了使用人工智能进行音乐创作的技术、工具和成功案例。
- en: AI techniques in music creation
  id: totrans-503
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 音乐创作中的AI技术
- en: 'AI-assisted composition: AI can generate melodies, harmonies and rhythms based
    on a wide variety of genres and styles. Composers can use these ideas as a starting
    point to create original works.'
  id: totrans-504
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能辅助作曲：人工智能可以根据广泛的流派和风格生成旋律、和声和节奏。作曲家可以使用这些想法作为原创作品的起点。
- en: 'Orchestration et arrangement :  AI tools can suggest instrumental arrangements
    for existing or new compositions, helping to choose instruments and their role
    within a piece.'
  id: totrans-505
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编曲与编排：AI工具可以为现有或新的作品建议乐器编排，帮助选择乐器及其在作品中的作用。
- en: 'Deep learning for music analysis: AI can analyze large corpora of music to
    detect patterns and trends, providing insights that can inspire creations.'
  id: totrans-506
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 音乐分析中的深度学习：AI可以分析大量的音乐数据集，以检测模式和趋势，提供可以启发创作的见解。
- en: Tools available
  id: totrans-507
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可用工具
- en: 'AI-powered composition platforms : Tools like Suno.ia, AIVA, Amper Music or
    Google''s Magenta allow users to create compositions by simply specifying the
    desired genre, tempo and mood.'
  id: totrans-508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能驱动的作曲平台：像Suno.ia、AIVA、Amper Music或Google的Magenta这样的工具允许用户通过简单地指定所需的流派、节奏和情绪来创建作品。
- en: 'Sound synthesis and modeling:  Advanced AI technologies can synthesize unique
    sounds or model virtual instruments that closely mimic their acoustic counterparts.'
  id: totrans-509
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 声音合成与建模：先进的AI技术可以合成独特的声音或模拟虚拟乐器，这些虚拟乐器与它们的声学对应物非常相似。
- en: 'Human-Machine Interfacing : AI enables new forms of interaction with instruments,
    such as converting gestures or facial expressions into musical commands.'
  id: totrans-510
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人机交互：人工智能使与乐器的交互形式多样化，例如将手势或面部表情转换为音乐指令。
- en: Success stories
  id: totrans-511
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 成功案例
- en: 'Collaborative artistic projects:  Artists like Taryn Southern or Benoît Carré
    have used AI to compose entire albums, highlighting the collaboration between
    human and artificial intelligence.'
  id: totrans-512
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协作艺术项目：像Taryn Southern或Benoît Carré这样的艺术家已经使用人工智能创作了完整的专辑，突出了人类与人工智能之间的协作。
- en: 'Live performances with AI: Live performances incorporate AI to improvise in
    real time with musicians, creating unique experiences for audiences.'
  id: totrans-513
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能辅助的现场表演：现场表演结合人工智能与音乐家实时即兴创作，为观众创造独特的体验。
- en: 'Music customization:  Companies like Mubert or Jukedeck use AI to generate
    personalized music for videos, games or wellness applications.'
  id: totrans-514
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 音乐定制：像Mubert或Jukedeck这样的公司利用人工智能为视频、游戏或健康应用生成个性化的音乐。
- en: 'Conclusion: The use of AI in music creation has opened a new chapter in music
    history, making music creation and production more accessible and providing new
    avenues for creative expression. As a tool, AI can act as a collaborator, assistant
    or source of inspiration, and its potential continues to grow with the advancement
    of technologies. Musicians, producers, and music fans can leverage these tools
    to explore new creative horizons and push the boundaries of what''s possible in
    music.'
  id: totrans-515
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论：人工智能在音乐创作中的应用开启了音乐历史的新篇章，使音乐创作和制作更加易于接触，并为创意表达提供了新的途径。作为工具，AI可以充当合作者、助手或灵感来源，其潜力随着技术的进步而不断增长。音乐家、制作人和音乐爱好者可以利用这些工具探索新的创意领域，并推动音乐可能性的边界。
- en: ……………………………………….
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: ……………………………………….
- en: 'Part 6: Responsibility and ethics in AI: navigate with caution'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 第6部分：人工智能中的责任与伦理：谨慎行事
- en: 'Chapter 25: Awareness of ethical and security issues'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 第25章：对伦理和安全问题的认识
- en: The mass adoption of artificial intelligence (AI) in various areas of daily
    and professional life raises a multitude of ethical questions and security challenges.
    Responsible use of AI requires careful attention to these aspects to ensure that
    technologies are used in a way that respects human dignity and privacy. This chapter
    addresses the ethical considerations and security challenges inherent in the use
    of AI.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）在日常和职业生活中的广泛应用引发了众多伦理问题和安全挑战。负责任地使用人工智能需要对这些方面给予仔细的关注，以确保技术以尊重人类尊严和隐私的方式被使用。本章讨论了使用人工智能固有的伦理考量和安全挑战。
- en: Ethical considerations
  id: totrans-520
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 伦理考量
- en: 'Bias and discrimination : It is crucial to ensure that AI systems do not perpetuate
    implicit biases or discriminate against certain groups. Particular attention should
    be paid to diversity and inclusion when collecting data and training models.'
  id: totrans-521
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 偏见和歧视：确保人工智能系统不会持续存在隐含的偏见或歧视某些群体至关重要。在收集数据和训练模型时，应特别关注多样性和包容性。
- en: 'Transparency and explainability: Users must be able to understand how and why
    an AI makes certain decisions. Explainability of models is key to building trust
    and allowing users to challenge or understand decisions made by AI.'
  id: totrans-522
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 透明度和可解释性：用户必须能够理解人工智能如何以及为什么做出某些决定。模型的可解释性对于建立信任并使用户能够挑战或理解人工智能做出的决策至关重要。
- en: 'Privacy and consent: Privacy is a fundamental right. AI must be designed to
    protect users'' personal data and require informed consent during data collection
    and analysis.'
  id: totrans-523
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐私和同意：隐私是一项基本权利。人工智能的设计必须旨在保护用户的个人信息，并在数据收集和分析过程中要求知情同意。
- en: 'Responsibility :   It must be clear who is responsible for the actions and
    decisions made by AI, especially when they have significant consequences for individuals
    or society.'
  id: totrans-524
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 责任：必须明确谁对人工智能做出的行动和决策负责，尤其是当它们对个人或社会有重大影响时。
- en: Security challenges
  id: totrans-525
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安全挑战
- en: 'Data security:  Protecting data from unauthorized access and cyberattacks is
    imperative, especially when AI processes sensitive information.'
  id: totrans-526
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据安全：保护数据免受未经授权的访问和网络攻击至关重要，尤其是在人工智能处理敏感信息时。
- en: 'Systems integrity: AI systems must be secure against manipulation and intrusion
    that could cause them to operate in unexpected or dangerous ways.'
  id: totrans-527
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统完整性：人工智能系统必须能够抵御可能导致其以意外或危险方式运行的操纵和入侵。
- en: 'Resilience to attacks  : AI systems must be designed to resist attacks, such
    as data poisoning attacks or adversarial attacks that aim to fool AI models.'
  id: totrans-528
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对攻击的抵抗力：人工智能系统必须设计成能够抵御攻击，例如数据中毒攻击或旨在欺骗人工智能模型的对抗性攻击。
- en: Guidelines for responsible practice
  id: totrans-529
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 负责任实践指南
- en: 'Ethical design : Integrate ethical considerations early in the AI ​​design
    and development process.'
  id: totrans-530
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 伦理设计：在人工智能设计和开发过程中早期整合伦理考量。
- en: 'Regular assessment and audits:  Implement regular audits to assess the ethical
    and security impacts of AI systems and take corrective action if necessary.'
  id: totrans-531
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期评估和审计：实施定期审计以评估人工智能系统的伦理和安全影响，并在必要时采取纠正措施。
- en: 'Training and awareness:  Educate developers, users and stakeholders on the
    ethical and security issues of AI.'
  id: totrans-532
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 培训和意识：教育开发者、用户和利益相关者关于人工智能的伦理和安全问题。
- en: 'Regulatory frameworks:  Monitor and contribute to the development of regulatory
    frameworks that govern the use of AI to ensure ethical and safe practice.'
  id: totrans-533
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监管框架：监测并参与制定监管框架，以规范人工智能的使用，确保其伦理和安全实践。
- en: 'Conclusion: Awareness of ethical and security issues is an essential component
    of the responsible use of AI. As practitioners and users of AI, it is our duty
    to ensure that these technologies are developed and used in ways that serve the
    common interest, promote general well-being and protect fundamental rights. An
    ethical and secure approach to AI will help not only to minimize the risks but
    also to maximize the benefits that these technologies promise for the future.'
  id: totrans-534
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论：对伦理和安全问题的认识是负责任使用人工智能的必要组成部分。作为人工智能的实践者和用户，我们有责任确保这些技术以服务于公共利益、促进普遍福祉和保护基本权利的方式被开发和使用。对人工智能采取伦理和安全的方法不仅有助于最小化风险，还能最大化这些技术为未来承诺的利益。
