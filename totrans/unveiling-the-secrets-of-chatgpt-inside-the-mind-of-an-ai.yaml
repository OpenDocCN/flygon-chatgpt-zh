- en: 1.2 The Principles Behind Language Models
  id: totrans-120
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1.2 语言模型背后的原理
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: Pre-training and Fine-tuning
  id: totrans-122
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 预训练和微调
- en: The success of GPT models lies in the two-step process of pre-training and fine-tuning.
    During pre-training, the model is exposed to a vast and diverse dataset, learning
    to predict the next word in a sentence. This process helps the model grasp grammar,
    facts about the world, and some degree of reasoning.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: GPT模型的成功在于预训练和微调的两个步骤过程。在预训练期间，模型接触到大量且多样化的数据集，学习预测句子中的下一个单词。这个过程帮助模型掌握语法、世界事实以及一定程度的推理能力。
- en: Fine-tuning involves training the model on a smaller, task-specific dataset.
    This step tailors the general language understanding acquired during pre-training
    to specific applications, such as answering questions, generating code, or holding
    a conversation.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 微调涉及在较小的、特定任务的数据集上训练模型。这一步骤将预训练期间获得的一般语言理解能力调整到特定应用中，例如回答问题、生成代码或进行对话。
- en: Self-Attention Mechanism
  id: totrans-125
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 自注意力机制
- en: At the core of the Transformer architecture is the self-attention mechanism.
    This mechanism allows the model to weigh the importance of different words in
    a sentence when making predictions. It enables the model to capture relationships
    between words, regardless of their distance from each other in the text. This
    capability is crucial for understanding context and generating coherent responses.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer架构的核心是自注意力机制。这种机制允许模型在预测时权衡句子中不同单词的重要性。它使模型能够捕捉单词之间的关系，无论它们在文本中的距离有多远。这种能力对于理解上下文和生成连贯的回复至关重要。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
