  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Create <X> motivational quotes inspired by <theme>, keep the word limit under
    6 words*'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: '*创建<X>个受<主题>启发的励志引言，将字数限制在6个字以内*'
