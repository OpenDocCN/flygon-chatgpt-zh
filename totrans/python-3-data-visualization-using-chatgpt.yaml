    by an except statement. The first try block attempts to add the first user-supplied
    number to the variable sum, and the second try block attempts to add the second
    user-supplied number to the previously entered number. An error message occurs
    if either input string is not a valid number; if both are valid numbers, a message
    is displayed containing the input numbers and their sum. Be sure to read the caveat
    regarding the eval() function that is mentioned earlier in this chapter.'
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 1.13](#list1-13) 包含两个 try 块，每个 try 块后面都跟着一个 except 语句。第一个 try 块尝试将第一个用户提供的数字添加到变量
    sum 中，第二个 try 块尝试将第二个用户提供的数字添加到之前输入的数字上。如果任一输入字符串不是有效的数字，将发生错误消息；如果两个都是有效数字，将显示包含输入数字及其总和的消息。务必阅读本章前面提到的有关
    eval() 函数的注意事项。'
- en: '**COMMAND-LINE ARGUMENTS**'
  id: totrans-745
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**命令行参数**'
- en: 'Python provides a getopt module to parse command-line options and arguments,
    and the sys module provides access to any command-line arguments via the sys.argv.
    This serves two purposes:'
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: Python 提供了一个 getopt 模块来解析命令行选项和参数，sys 模块通过 sys.argv 提供了对任何命令行参数的访问。这有两个作用：
- en: sys.argv is the list of command-line arguments.
  id: totrans-747
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: sys.argv 是命令行参数的列表。
- en: len(sys.argv) is the number of command-line arguments.
  id: totrans-748
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: len(sys.argv) 是命令行参数的数量。
- en: Here, sys.argv[0] is the program name, so if the program is called test.py,
    it matches the value of sys.argv[0].
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，sys.argv[0] 是程序名称，因此如果程序被命名为 test.py，它将匹配 sys.argv[0] 的值。
- en: Now you can provide input values for a Python program on the command line instead
    of providing input values by prompting users for their input.
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您可以在命令行上为 Python 程序提供输入值，而不是通过提示用户输入来提供输入值。
- en: 'As an example, consider the script test.py shown here:'
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑以下所示的脚本 test.py：
