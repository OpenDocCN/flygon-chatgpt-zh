  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: preface
  id: totrans-232
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前言
- en: “O brave new world, that has such people in it!” That quote is from William
    Shakespeare’s play *The Tempest* and is spoken by the child Miranda when she encounters
    a crowd of people for the first time. You’re unlikely to have been banished to
    a remote island as a child, but you may still find yourself echoing Miranda’s
    words when you encounter any of the current crop of *artificial intelligence*
    (AI) apps for the first time. It’s a brave new world, indeed, that has such chatbots
    in it.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: “哦，勇敢的新世界，它有这样的人！”这句话出自威廉·莎士比亚的戏剧《暴风雨》，是孩子米兰达第一次遇到一群人时说的。你可能作为一个孩子并没有被流放到遥远的岛屿，但当你第一次遇到任何当前的人工智能（AI）应用程序时，你可能会发现自己正在重复米兰达的话。这确实是一个勇敢的新世界，它有这样的人工智能聊天机器人。
- en: Tools such as ChatGPT seem wondrous at first because they appear to be quite
    good at putting words together. Ask ChatGPT to `Write a Shakespearean sonnet that
    summarizes the plot of Cormac McCarthy's novel "The Road"`, and it will comply.
    No, the resulting poem won’t be Shakespeare-quality, but it *will* be entertaining.
    But after a while, this kind of cheap entertainment wears thin, and most ChatGPT
    users find themselves asking a question along the lines of “What is ChatGPT *truly*
    useful for?”
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 像ChatGPT这样的工具一开始看起来很神奇，因为它们似乎很擅长将词语组合起来。要求ChatGPT“写一首莎士比亚风格的十四行诗，总结科马克·麦卡锡的小说《路》的情节”，它会照做。不，产生的诗歌不会是莎士比亚级别的，但它*确实*会很有趣。但过了一段时间，这种廉价的娱乐就会变得乏味，大多数ChatGPT用户发现自己会问一个类似的问题：“ChatGPT*真正*有什么用？”
- en: 'That’s generally a tough question to answer, with one exception: code. ChatGPT
    is genuinely useful for turning text instructions into programming code. In particular,
    ChatGPT is good at converting text into the code required to construct a web page.
    This is extraordinary, and it means now *anyone* can build a presence on the web,
    even if they can’t or don’t want to learn the intricacies of web development.'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 这通常是一个难以回答的问题，只有一个例外：代码。ChatGPT真正有用，可以将文本指令转换为编程代码。特别是，ChatGPT擅长将文本转换为构建网页所需的代码。这是非凡的，这意味着现在*任何人*都可以在网络上建立自己的存在，即使他们不想或不能学习网络开发的复杂性。
- en: There are, however, a couple of catches to this newfangled way of getting on
    the web. First, yes, ChatGPT is very good at turning text into web page code,
    but only if you know how to formulate that text with detailed instructions for
    ChatGPT to follow. Second, even once ChatGPT has successfully generated all the
    code you need for a web page, you still need to save that code somewhere and then
    get it on the web somehow.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这种新颖的上网方式有几个陷阱。首先，是的，ChatGPT非常擅长将文本转换为网页代码，但前提是你知道如何用详细的指令来制定这个文本，以便ChatGPT遵循。其次，即使ChatGPT已经成功生成了构建网页所需的全部代码，你仍然需要将这段代码保存到某个地方，然后以某种方式将其放到网络上。
- en: Those may seem like high hurdles to jump, but that’s where this book comes in.
    In the pages that follow, you learn not only how to instruct ChatGPT like a pro
    to get exactly the web page you want but also how to save that code and then deploy
    it to the web for all the world to see. Welcome, then, to the brave new world
    of building your very own website with the help of ChatGPT.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 这些可能看起来像是难以跨越的障碍，但这就是这本书的作用所在。在接下来的章节中，你不仅会学到如何像专业人士一样指导ChatGPT，以获得你想要的网页，还会学到如何保存这些代码，然后将它们部署到网络上，让全世界都能看到。那么，欢迎来到一个勇敢的新世界，在那里你可以借助ChatGPT建立自己的网站。
- en: acknowledgments
  id: totrans-238
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 致谢
- en: The American essayist and poet E. B. White once described an editor as “a person
    who knows more about writing than writers do but who has escaped the terrible
    desire to write.” I believe this to be true not only because E. B. White was a
    wise person but also because I’ve come to rely on my editors to make me look like
    a better writer than I am!
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 美国散文家和诗人E. B. White曾将编辑描述为“一个比作家更懂写作的人，但他已经摆脱了那种可怕的写作欲望。”我相信这是真的，不仅因为E. B. White是一个智者，而且因为我已经习惯于依赖我的编辑，让我看起来比实际写得更好！
- en: I’m sure the editors of novels and memoirs and such have their hands full whipping
    their manuscripts into shape, but spare a moment for the poor editors of computer
    books. They have to make sure a computer book reads well and isn’t festooned with
    spelling errors and grammatical gaffes, and they also have to ensure that the
    book is technically accurate. Why? Because even the teensiest authorial (or editorial)
    lapse could result in a book that sows confusion and consternation rather than
    certainty and delight.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信小说和回忆录等书籍的编辑们手头的工作已经非常繁重，需要将稿件整理得井井有条，但请为那些可怜的计算机书籍编辑们留下一刻。他们必须确保计算机书籍读起来流畅，不会出现拼写错误和语法错误，同时还要确保书籍的技术准确性。为什么？因为即使是作者（或编辑）的微小失误也可能导致一本引起困惑和不安而不是确定和喜悦的书籍。
- en: The good folks at Manning Publications ensure that each book reads well and
    is accurate by subjecting each manuscript to a barrage of reviews, not only by
    editorial professionals but also by a team of dedicated outsiders. Instead of
    a process in which single-digit numbers of eyeballs look at the manuscript, a
    Manning book is scrutinized by dozens. The result? The book you’re reading contains
    accurate and relevant information that has passed muster with some of the sharpest
    eyes and ears in the business. Yes, my name may be the only one on the cover,
    but tons of people had a big role in creating what appears between the covers
    (be they physical or virtual). Those reviewers were Adam Wan, Andres Sacco, Andriani
    Stylianou, Ashwin Mhatre, Beardsley Ruml, Bruno Sonnino, Charles Lam, Drew Leon,
    Erim Ertürk, Ganesh Falak, Halil Karakose, James Coates, Jeff Smith, José Alberto
    Reyes Quevedo, Julien Pohie, Lars Pesch, Marvin Schwarze, Matteo Battista, Mikhail
    Karaashev, Ozren Harlovic, Radhakrishna MV, Ranjit Sahai, Rui Liu, Saravanan Muniraj,
    Steve Prior, Swapneelkumar Deshpande, and Tony Holdroyd.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 曼宁出版公司的同事们确保每本书都读起来流畅且内容准确，他们通过让每一份稿件接受一系列的审阅来做到这一点，审阅者不仅包括编辑专业人士，还包括一支专门的第三方团队。在只有一个或几个读者审阅稿件的过程中，曼宁的书籍则由数十人仔细审查。结果如何？你正在阅读的这本书包含了准确且相关的信息，这些信息已经通过了业界一些最敏锐的眼耳的检验。是的，封面上的名字可能只有我一个，但许多人都在创造书页内容方面发挥了重要作用（无论是实体书还是虚拟书）。这些审阅者包括Adam
    Wan、Andres Sacco、Andriani Stylianou、Ashwin Mhatre、Beardsley Ruml、Bruno Sonnino、Charles
    Lam、Drew Leon、Erim Ertürk、Ganesh Falak、Halil Karakose、James Coates、Jeff Smith、José
    Alberto Reyes Quevedo、Julien Pohie、Lars Pesch、Marvin Schwarze、Matteo Battista、Mikhail
    Karaashev、Ozren Harlovic、Radhakrishna MV、Ranjit Sahai、Rui Liu、Saravanan Muniraj、Steve
    Prior、Swapneelkumar Deshpande和Tony Holdroyd。
- en: Many thanks to technical editor Anirudh Prabhu, who is a seasoned user interface
    developer boasting over a decade of experience in the field. His career has been
    punctuated by noteworthy achievements, including the publication of four acclaimed
    books. In addition, he has served as a technical reviewer for various titles under
    esteemed publishers and has taken an active role in shaping the future of web
    development by creating comprehensive training materials for HTML, CSS, and jQuery.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢技术编辑Anirudh Prabhu，他是一位经验丰富的用户界面开发者，拥有超过十年的行业经验。他的职业生涯中充满了值得注意的成就，包括出版了四本备受赞誉的书籍。此外，他还担任了多家知名出版社各种书籍的技术审稿人，并通过为HTML、CSS和jQuery创建全面的培训材料，在塑造Web开发未来方面发挥了积极作用。
- en: I’d like to extend warm thanks to publisher Marjan Bace, acquisitions editor
    Brian Sawyer, development editor Karen Miller, project coordinator Malena Selić,
    copy editor Tiffany Taylor, and all the rest of the production staff at Manning
    who helped bring this book to fruition.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 我还要向出版人Marjan Bace、采购编辑Brian Sawyer、开发编辑Karen Miller、项目协调员Malena Selić、校对编辑Tiffany
    Taylor以及所有帮助本书成形的曼宁出版社的其他制作人员表示衷心的感谢。
- en: Finally, I’d also like to thank all the people who took the time to review the
    early manuscripts of the book and to offer comments and suggestions. Your couple
    of cents’ worth was very much appreciated.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我还要感谢所有抽出时间审阅本书早期稿件并提出评论和建议的人们。你们的宝贵意见非常受重视。
- en: about this book
  id: totrans-245
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于本书
- en: In this book, you learn how to instruct ChatGPT to generate the necessary web
    page code to deploy a page to your specifications. No experience with either ChatGPT
    or web development is required. Everything you need to know is provided as you
    need it, and you won’t find any long-winded technical discussions or philosophical
    arguments in these pages. My goal is to get you on the web with ChatGPT’s assistance,
    and everything in the book is in service of that goal. If you’ve ever wanted to
    put up a web page but couldn’t or didn’t want to learn how to code, this book
    will get you there with a powerful assist from ChatGPT.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，你将学习如何指导ChatGPT生成必要的网页代码，以便按照你的要求部署页面。不需要具备ChatGPT或网页开发的经验。你需要知道的一切都会在你需要时提供，你不会在这些页面上找到任何冗长的技术讨论或哲学争论。我的目标是帮助你借助ChatGPT的力量上网，本书中的所有内容都是为了实现这个目标。如果你曾经想要建立一个网页，但无法或不想学习如何编码，这本书将帮助你通过ChatGPT的强大助力实现这一目标。
- en: 'I’m assuming that you have a life away from your computer screen, so this book
    is organized in such a way that you don’t have to read it from cover to cover.
    If you’re just getting started, read chapter 1 to get a solid foundation, and
    then try the simple project in chapter 2 to get an honest-to-goodness ChatGPT-generated
    page on the web. From there, you can try any of the projects in chapters 3–12
    in any order. To make things easier to find, the section “How this book is organized:
    A road map” gives you a summary of the book’s 13 chapters (and 3 appendixes).'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 我假设你除了电脑屏幕之外还有自己的生活，因此这本书的编排方式是让你不必从头到尾阅读。如果你是刚开始，请阅读第1章以获得坚实的基础，然后尝试第2章中的简单项目，以获得一个真正的ChatGPT生成的网页页面。从那里开始，你可以按任何顺序尝试第3章至第12章中的任何项目。为了便于查找，章节“本书的组织结构：路线图”为你提供了本书13章（以及3个附录）的概述。
- en: Who should read this book
  id: totrans-248
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 适合阅读这本书的人
- en: 'This book is aimed first and foremost at anyone who wants to build a presence
    on the web, whether that presence is a humble home page, a page to show off a
    hobby or interest, or a website for a book club, event, organization, or team.
    More specifically, I aimed this book at three types of readers:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书首先针对的是任何想要在网络上建立存在感的人，无论这种存在感是一个谦逊的个人主页，一个展示爱好或兴趣的页面，还是书友会、活动、组织或团队的网站。更具体地说，我将这本书的目标读者定位为以下三种类型：
- en: '*Someone who doesn’t know how to code web pages and doesn’t want to learn*—The
    specifics of web development have long been a barrier to many people establishing
    a presence on the web. This book aims to show how ChatGPT changes all that for
    people with no interest in learning how to code.'
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*不知道如何编码网页且不想学习的人*——网页开发的细节长期以来一直是许多人建立网络存在感的障碍。这本书旨在展示ChatGPT如何为那些对学习如何编码不感兴趣的人改变这一切。'
- en: '*Someone who doesn’t know how to code web pages and wants to learn*—This book
    is mostly concerned with the instructions you have to provide ChatGPT to get it
    to generate the web page code you want. However, I also give some background about
    each of the web page code technologies used in the book. Combine that background
    knowledge with this book’s hands-on approach to projects, and you’ll learn quite
    a bit about web development.'
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*不知道如何编码网页但想学习的人*——这本书主要关注你必须提供给ChatGPT的指令，以便它生成你想要的网页代码。然而，我也提供了本书中使用的每种网页代码技术的背景信息。将这种背景知识与本书的项目实践方法相结合，你将学到很多关于网页开发的知识。'
- en: '*Someone who knows how to code web pages*—Even if you already know at least
    the basics of web development, you can use ChatGPT to speed up your development
    work and can delegate some of the more tedious tasks to ChatGPT. This book shows
    you the prompts you can use to cajole ChatGPT into being your programming assistant.'
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*知道如何编码网页的人*——即使你已经掌握了至少网页开发的基础知识，你也可以使用ChatGPT来加速你的开发工作，并将一些更繁琐的任务委托给ChatGPT。本书将向你展示你可以使用的提示，以诱导ChatGPT成为你的编程助手。'
- en: 'How this book is organized: A road map'
  id: totrans-253
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 本书组织结构：路线图
- en: '*Chapter 1* introduces you to ChatGPT in general and to using ChatGPT to generate
    web page code in particular. You learn what types of pages you can build with
    the help of ChatGPT, and you get a high-level view of the process.'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: '*第1章*介绍了ChatGPT的一般知识，以及如何使用ChatGPT生成网页代码。你将了解在ChatGPT的帮助下可以构建哪些类型的页面，并得到一个关于整个过程的概览。'
- en: '*Chapter 2* takes you on a journey to create and deploy your first web page
    with the help of ChatGPT. You learn how to prompt ChatGPT to generate the code,
    copy that code, and save the code to a file. From there, you test the code in
    a web browser and then deploy it for free to the web.'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: '*第二章* 带你通过 ChatGPT 创建和部署你的第一个网页。你将学习如何提示 ChatGPT 生成代码、复制该代码并将其保存到文件中。然后，你在网页浏览器中测试代码，并将其免费部署到网络上。'
- en: '*Chapter 3* shows you how to prompt ChatGPT to use fonts, colors, and headings
    on a web page. You learn how to ask ChatGPT to supply you with suggestions for
    your site title and tagline, the fonts to use, and the color scheme to apply.
    You then put all this together in a prompt that asks ChatGPT to generate the code
    for a personal home page.'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '*第三章* 介绍了如何提示 ChatGPT 在网页上使用字体、颜色和标题。你将学习如何请求 ChatGPT 为你的网站标题和标语、使用的字体以及要应用的配色方案提供建议。然后，你将这些内容整合到一个提示中，请求
    ChatGPT 生成个人主页的代码。'
- en: '*Chapter 4* focuses on the structure of a web page, so you learn about headers,
    footers, padding, borders, and margins. You also learn how to add images and social
    media links to the page. The chapter culminates in prompting ChatGPT for the code
    to build a book club page.'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: '*第四章* 专注于网页结构，因此你将了解标题、页脚、填充、边框和边距。你还学习如何将图像和社交媒体链接添加到页面中。章节的最终目标是提示 ChatGPT
    生成构建读书俱乐部页面的代码。'
- en: '*Chapter 5* covers publishing posts to a page as well as using AI to turn text
    prompts into images. You put all this together in a prompt that instructs ChatGPT
    to generate the code for an online journal page.'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: '*第五章* 讲解了如何在页面上发布帖子以及使用 AI 将文本提示转换为图像。你将这些内容整合到一个提示中，指导 ChatGPT 生成在线日志页面的代码。'
- en: '*Chapter 6* is all about links and navigation. You learn how the code for links
    works so you can create links manually instead of always asking ChatGPT to do
    it. You also learn how to instruct ChatGPT to create a page navigation bar with
    links to other site pages. This chapter’s project is an information site.'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: '*第六章* 全部关于链接和导航。你将学习链接代码的工作原理，这样你就可以手动创建链接，而无需总是请求 ChatGPT 来完成。你还学习如何指导 ChatGPT
    创建带有链接到其他网站页面的页面导航栏。本章的项目是一个信息网站。'
- en: '*Chapter 7* examines ChatGPT’s writing prowess as you learn how to prompt the
    chatbot for topic ideas, writing guidelines, and research suggestions. You even
    learn the best way to prompt ChatGPT to produce writing in your own voice. Later
    in the chapter, you construct a prompt for ChatGPT to generate the code for an
    interest or hobby page.'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: '*第七章* 探讨了 ChatGPT 的写作能力，你将学习如何提示聊天机器人获取主题想法、写作指南和研究建议。你甚至将学习如何以最佳方式提示 ChatGPT
    以你自己的风格进行写作。在章节的后面部分，你将构建一个提示，让 ChatGPT 生成兴趣或爱好页面的代码。'
- en: '*Chapter 8* gives you the tools you need to instruct ChatGPT to build web page
    forms that include text boxes, check boxes, radio buttons, lists, and more. You
    also learn how to sign up with a service that enables you to get form data sent
    to your email address. You combine all this in a prompt that asks ChatGPT to generate
    the code for an event sign-up page.'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: '*第八章* 提供了你指导 ChatGPT 构建包含文本框、复选框、单选按钮、列表等网页表单所需的工具。你还学习如何注册一个服务，该服务可以将表单数据发送到你的电子邮件地址。你将这些内容整合到一个提示中，请求
    ChatGPT 生成活动报名页面的代码。'
- en: '*Chapter 9* introduces you to two common web page features: bulleted lists
    and numbered lists. You learn how to instruct ChatGPT to build these lists, and
    you learn various ways to customize them to suit your needs. The chapter concludes
    by prompting ChatGPT for the code to build a recipe page.'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: '*第九章* 介绍了两个常见的网页功能：项目符号列表和编号列表。你将学习如何指导 ChatGPT 构建这些列表，并学习各种定制它们以满足你需求的方法。章节结束时，你将提示
    ChatGPT 生成构建食谱页面的代码。'
- en: '*Chapter 10* takes you through a more detailed look at working with images
    on a web page. You learn how to code images manually, how to use placeholder images,
    and how to work with thumbnail versions of images. The chapter project is a sophisticated
    photo gallery page.'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: '*第十章* 更详细地介绍了在网页上处理图像。你将学习如何手动编码图像、如何使用占位符图像以及如何处理图像缩略图。章节的项目是一个复杂的相册页面。'
- en: '*Chapter 11* introduces you to one of the most popular web page patterns: the
    card, which you can use to showcase items such as works of art, hobbies, people,
    or events. You put this card know-how to good use when getting ChatGPT to help
    you build this chapter’s project: a portfolio page.'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: '*第十一章* 介绍了最受欢迎的网页模式之一：卡片，你可以用它来展示艺术品、爱好、人物或活动等。当使用 ChatGPT 帮助你构建本章的项目：一个作品集页面时，你将充分利用这些卡片知识。'
- en: '*Chapter 12* gives you a complete tutorial on using web page layout tags, as
    well as showing you how to mark up important words and how to emphasize words
    on the page. You also learn a powerful technique for making your pages look good
    on smaller screens. This chapter’s project is a page that displays a long article
    with a sidebar.'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: '*第12章* 提供了使用网页布局标签的完整教程，同时向您展示如何标记重要词汇以及如何在页面上强调词汇。您还将学习一种强大的技术，使您的页面在小屏幕上看起来很好。本章的项目是一个显示长文章并带有侧边的页面。'
- en: '*Chapter 13* introduces you to data-driven web pages, where most of the page
    content is rendered from a separate data file. You first learn how to get ChatGPT
    to create the data file from your Excel data. Then you learn how to enable your
    users to interact with the data by filtering, sorting, and searching it. This
    chapter’s project is a page that displays an online course catalog for a fictional
    university.'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: '*第13章* 介绍了数据驱动的网页，其中大部分页面内容是从单独的数据文件中渲染的。您首先学习如何让ChatGPT从您的Excel数据创建数据文件。然后您学习如何通过过滤、排序和搜索来让您的用户与数据交互。本章的项目是一个显示虚构大学在线课程目录的页面。'
- en: '*Appendix A* provides you with useful background information for getting ready
    to use ChatGPT to build web pages. You learn how to set up a ChatGPT account,
    test your code, and work with web page files.'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: '*附录A* 为您提供了使用ChatGPT构建网页的有用背景信息。您将学习如何设置ChatGPT账户、测试您的代码以及处理网页文件。'
- en: '*Appendix B* is devoted to getting your web code online. You learn how to deploy
    your code to two free sites—Netlify and Cloudflare—as well as other sites.'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: '*附录B* 专注于将您的网页代码上线。您将学习如何将代码部署到两个免费网站——Netlify和Cloudflare——以及其他网站。'
- en: '*Appendix C* raises your ChatGPT game by taking you through an extensive list
    of best practices for prompting ChatGPT and handling any errors that come up.'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: '*附录C* 通过向您展示一系列关于提示ChatGPT的最佳实践和如何处理出现的任何错误，来提升您的ChatGPT技能。'
- en: About the code
  id: totrans-270
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于代码
- en: Not surprisingly, a book about getting an AI chatbot to generate web page code
    contains quite a bit of code! To help differentiate the web page code from the
    rest of the text, throughout this book, the code is formatted in a `fixed-width
    font`. The book also has many separate code listings. In these listings, I’ve
    tried as much as possible to make each line fit into the available page width.
    However, there are some cases where a line is too long to fit the page width,
    so the line carries over to a second line, and that second line is preceded with
    a line-continuation marker (➥).
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 毫不奇怪，一本关于让AI聊天机器人生成网页代码的书包含大量的代码！为了帮助区分网页代码和文本的其他部分，本书中，代码以`固定宽度字体`格式呈现。本书还包含许多单独的代码列表。在这些列表中，我尽可能让每一行都适应可用的页面宽度。然而，有些情况下，一行代码太长而无法适应页面宽度，因此该行代码会延续到下一行，并且下一行前面会有一个行延续标记（➥）。
- en: You may be tempted to describe the amount of ChatGPT-generated code in this
    book as daunting if you’re operating under the assumption that you’re going to
    need to type all that code by hand. Not so! All the book’s web page code, as well
    as all the book’s ChatGPT prompts, are available to view, download, and copy as
    you see fit from the book’s GitHub repository at [https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt).
    To download everything, click the green Code button, and then click Download ZIP.
    Otherwise, click a chapter and then click the file you want to view.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您认为您需要手动输入所有这些代码，那么您可能会觉得本书中ChatGPT生成的代码量令人畏惧。但并非如此！本书的所有网页代码以及所有ChatGPT提示都可在本书的GitHub仓库[https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)中查看、下载和复制。要下载所有内容，请点击绿色的“代码”按钮，然后点击“下载ZIP”。否则，点击一个章节，然后点击您想要查看的文件。
- en: You can get executable snippets of code from the liveBook (online) version of
    this book at [https://livebook.manning.com/book/build-a-website-with-chatgpt](https://livebook.manning.com/book/build-a-website-with-chatgpt).
    The complete code for the examples in the book is also available for download
    from the Manning website at [www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt).
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从本书的在线（liveBook）版本中获取可执行的代码片段，链接为[https://livebook.manning.com/book/build-a-website-with-chatgpt](https://livebook.manning.com/book/build-a-website-with-chatgpt)。书中示例的完整代码也可以从Manning网站[www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt)下载。
- en: liveBook discussion forum
  id: totrans-274
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: liveBook 讨论论坛
- en: Purchase of *Build a Website with ChatGPT* includes free access to liveBook,
    Manning’s online reading platform. Using liveBook’s exclusive discussion features,
    you can attach comments to the book globally or to specific sections or paragraphs.
    It’s a snap to make notes for yourself, ask and answer technical questions, and
    receive help from the author and other users. To access the forum, go to [https://livebook.manning.com/book/build-a-website-with-chatgpt/discussion](https://livebook.manning.com/book/build-a-website-with-chatgpt/discussion).
    You can also learn more about Manning’s forums and the rules of conduct at [https://livebook.manning.com/discussion](https://livebook.manning.com/discussion).
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 购买《使用ChatGPT构建网站》包括免费访问liveBook，曼宁的在线阅读平台。使用liveBook的独特讨论功能，您可以在全球范围内或针对特定章节或段落附加评论。为自己做笔记、提出和回答技术问题，以及从作者和其他用户那里获得帮助都非常简单。要访问论坛，请访问[https://livebook.manning.com/book/build-a-website-with-chatgpt/discussion](https://livebook.manning.com/book/build-a-website-with-chatgpt/discussion)。您还可以在[https://livebook.manning.com/discussion](https://livebook.manning.com/discussion)了解更多关于曼宁论坛和行为准则的信息。
- en: Manning’s commitment to our readers is to provide a venue where a meaningful
    dialogue between individual readers and between readers and the author can take
    place. It is not a commitment to any specific amount of participation on the part
    of the author, whose contribution to the forum remains voluntary (and unpaid).
    We suggest you try asking the author some challenging questions lest his interest
    stray! The forum and the archives of previous discussions will be accessible from
    the publisher’s website as long as the book is in print.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 曼宁对读者的承诺是提供一个平台，让读者之间以及读者与作者之间可以进行有意义的对话。这并不是对作者参与特定数量活动的承诺，作者对论坛的贡献仍然是自愿的（且未支付报酬）。我们建议您尝试向作者提出一些挑战性的问题，以免他的兴趣转移！只要书籍仍在印刷中，论坛和先前讨论的存档将可通过出版社的网站访问。
- en: about the author
  id: totrans-277
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于作者
- en: '![](../../OEBPS/Images/Paul_McFedries.png)'
  id: totrans-278
  prefs: []
  type: TYPE_IMG
  zh: '![保罗·麦克费德斯](../../OEBPS/Images/Paul_McFedries.png)'
- en: Paul McFedries has been a professional technical writer for more than 30 years.
    He has more than 100 books to his credit, which collectively have sold more than
    4 million copies worldwide. His other Manning title is *Web Design Playground,
    Second Edition*. When he’s not writing books, Paul is building web pages, which
    he’s been doing since 1996, and he has intimate knowledge of both HTML and CSS.
    Paul has hand-coded many sites, including his web home ([https://paulmcfedries.com](https://paulmcfedries.com)),
    Word Spy ([https://wordspy.com](https://wordspy.com)), WebDev Workshop ([https://webdevworkshop.io](https://webdevworkshop.io)),
    and Web Design Playground ([https://webdesignplayground.io/2](https://webdesignplayground.io/2)).
    Paul loves to teach, his writing is clear and logical, and he has the empathy
    that comes from remembering what it was like to first learn a subject.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 保罗·麦克费德斯（Paul McFedries）是一位拥有超过30年专业技术写作经验的作家。他拥有超过100本书，总销量超过400万册。他的另一本曼宁出版社的书籍是《Web
    Design Playground，第二版》。当他不写书时，保罗会构建网页，他自1996年开始这样做，对HTML和CSS都有深入的了解。保罗亲手编码了许多网站，包括他的个人网站（[https://paulmcfedries.com](https://paulmcfedries.com)）、Word
    Spy（[https://wordspy.com](https://wordspy.com)）、WebDev Workshop（[https://webdevworkshop.io](https://webdevworkshop.io)）和Web
    Design Playground（[https://webdesignplayground.io/2](https://webdesignplayground.io/2)）。保罗热爱教学，他的写作清晰且逻辑性强，他拥有从记住最初学习某个学科的感受中获得的同理心。
- en: 1 Introducing website creation with ChatGPT
  id: totrans-280
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1 使用ChatGPT介绍网站创建
- en: This chapter covers
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖
- en: Introducing ChatGPT
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介绍ChatGPT
- en: Understanding what kinds of web pages you can create with the help of ChatGPT
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解在ChatGPT的帮助下可以创建哪些类型的网页
- en: Getting to know the limitations of making web pages with ChatGPT
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解使用ChatGPT制作网页的限制
- en: Learning how ChatGPT enables you to create your own web pages
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习如何使用ChatGPT创建自己的网页
- en: 'The British science fiction writer Arthur C. Clarke once formulated three truisms
    that came to be known as *Clarke’s three laws*, the third of which is the one
    most often cited: “Any sufficiently advanced technology is indistinguishable from
    magic.” If you’ve always wanted to create web pages but were daunted by the technology,
    then the premise of this book—that you *can* create your own website with the
    help of ChatGPT—may seem like magic to you. That’s no surprise, because if any
    technology in recent memory deserves the description “sufficiently advanced,”
    it’s ChatGPT and similar so-called *generative AI*—artificial intelligence applications
    that can create poetry, prose, and, yes, web pages.'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 英国科幻作家亚瑟·C·克拉克曾经提出了三个众所周知的原则，被称为 *Clarke’s three laws*，其中第三个原则是最常被引用的：“任何足够先进的技术都和魔法无法区分。”如果你一直想创建网页但又对技术感到畏惧，那么这本书的假设——你
    *可以* 在 ChatGPT 的帮助下创建自己的网站——对你来说可能就像魔法一样。这并不奇怪，因为如果任何最近的技术值得被称为“足够先进”，那么 ChatGPT
    和类似的所谓 *generative AI*——能够创作诗歌、散文，甚至网页的人工智能应用——就当之无愧。
- en: In this chapter, my aim is to demystify ChatGPT and make it seem a little less
    magical and a whole lot more practical. In the next few pages, you get a short
    explanation of the basics of ChatGPT, an overview of the kinds of pages you can
    create with ChatGPT’s help (and, for balance, some notes on the kinds of pages
    you *can’t* create), and a behind-the-scenes and mercifully nontechnical tour
    of how you can use ChatGPT to perform the seemingly magical—but in reality, merely
    mathematical—feat of taking a simple, typed request and turning it into a full-fledged,
    ready-to-be-surfed web page.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我的目标是揭开 ChatGPT 的神秘面纱，让它看起来不那么神奇，而更加实用。在接下来的几页中，你将获得对 ChatGPT 基础知识的简要解释，以及使用
    ChatGPT 创建的页面类型的概述（以及为了平衡，一些关于你 *不能* 创建的页面类型的说明），以及一个幕后且非技术性的导游，展示你如何使用 ChatGPT
    来完成看似神奇的——但实际上仅仅是数学——壮举：将一个简单的、打字请求转换成一个完整的、可以浏览的网页。
- en: 1.1 What is ChatGPT?
  id: totrans-288
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.1 什么是 ChatGPT？
- en: Unless you’ve been hunkered down in a hermitage over the past year or two, you’ve
    likely heard about GPT and/or ChatGPT, the artificial intelligence agents that
    have taken the world (or, at least, that part of the world that pays attention
    to social media) by storm. However, knowing *about* ChatGPT is one thing, but
    knowing what ChatGPT actually *is*, is quite another.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 除非你在过去一年或两年里一直隐居在隐居地，否则你很可能已经听说过 GPT 和/或 ChatGPT，这些人工智能代理已经席卷了世界（至少是那些关注社交媒体的那部分世界）。然而，了解
    *关于* ChatGPT 是一回事，但了解 ChatGPT 实际上 *是什么*，则是另一回事。
- en: 'To help you get a feel for what ChatGPT is and what it does, it helps to break
    down each component of the name to see what it means. I’ll begin with GPT:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助你了解 ChatGPT 是什么以及它能做什么，将名称的每个部分分解来看其含义是很有帮助的。我将从 GPT 开始：
- en: '*G*—The *G* in *GPT* stands for *generative*, which means GPT can create—or
    *generate*—new content. GPT is a *large language model* (LLM), which generally
    means it’s designed to generate text, such as essays, stories, and even poems.
    More specifically for our purposes in this book, GPT’s generative capabilities
    also extend to programming code, particularly the code that underlies web pages.'
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*G*—在 *GPT* 中的 *G* 代表 *generative*，这意味着 GPT 可以创建或 *generate* 新内容。GPT 是一个 *large
    language model* (LLM)，通常意味着它被设计用来生成文本，例如文章、故事，甚至是诗歌。更具体地说，对于本书的目的而言，GPT 的生成能力也扩展到了编程代码，尤其是网页背后的代码。'
- en: '*P*—The *P* in *GPT* stands for *pretrained*, which means GPT was exposed to
    huge amounts of text (that’s what the “large” in *large language model* is referring
    to). During this *pretraining* process, GPT learned the patterns and structures
    in the language, such as how sentences are typically formed. In particular, given
    some existing text, pretraining enables GPT to predict what word or phrase usually
    comes next. In a sense, that’s all GPT is really doing: predicting the next word!
    GPT was also trained on an unimaginably large set of programming data; so, because
    programming code is usually more predictable than regular writing, GPT excels
    at generating code.'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*P*—在 *GPT* 中的 *P* 代表 *pretrained*，这意味着 GPT 接触到了大量的文本（这就是 *large language model*
    中的“large”所指的）。在这次 *pretraining* 过程中，GPT 学习了语言中的模式和结构，例如句子通常是如何形成的。特别是，给定一些现有的文本，预训练使
    GPT 能够预测接下来通常会出现什么单词或短语。从某种意义上说，这就是 GPT 真正在做的事情：预测下一个单词！GPT 还在难以想象的庞大的编程数据集上进行了训练；因此，由于编程代码通常比常规写作更可预测，GPT
    在生成代码方面表现出色。'
- en: '*T*—The *T* in *GPT* stands for *transformer*, which means GPT is able to take
    some text input (such as a request to create a web page) and transform that text
    into its most important components while ignoring or giving lower priority to
    less important components of the text. This enables GPT to produce results with
    greater relevance and accuracy.'
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*T*—在 *GPT* 中的 *T* 代表 *transformer*，这意味着 GPT 能够接收一些文本输入（例如创建网页的请求）并将这些文本转换为其最重要的组成部分，同时忽略或给予文本中不那么重要的部分较低的优先级。这使得
    GPT 能够产生更具相关性和准确性的结果。'
- en: The *Chat* part of *ChatGPT* means you have conversational access to GPT, which
    means you can exchange messages with GPT more or less as you do in a chat conversation.
    In the context of creating web pages, these “conversations” will amount to you
    requesting some page component and ChatGPT providing the required code. However,
    ChatGPT also has a limited ability to “remember” previous messages in the current
    conversation, which can occasionally be useful in your website creation tasks.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: '*ChatGPT* 中的 *Chat* 部分意味着你可以与 GPT 进行对话式访问，这意味着你可以像在聊天对话中一样与 GPT 交换消息。在创建网页的背景下，这些“对话”将涉及你请求一些页面组件，而
    ChatGPT 则提供所需的代码。然而，ChatGPT 也有有限的“记住”当前对话中先前消息的能力，这在你的网站创建任务中有时可能很有用。'
- en: 'As I write this, two main versions of GPT are available: GPT-3.5, released
    in November 2022, and GPT-4, released in March 2023\. If you use the OpenAI app
    (discussed in a moment) either with a free ChatGPT account (learn more in appendix
    A) or with no account, you have access only to GPT-3.5; if you have a paid ChatGPT
    Plus account and you use the OpenAI app, you have access to both GPT-3.5 and GPT-4.'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 当我写下这些时，有两种主要的 GPT 版本可用：2022 年 11 月发布的 GPT-3.5 和 2023 年 3 月发布的 GPT-4。如果你使用 OpenAI
    应用（稍后讨论）并且拥有免费的 ChatGPT 账户（更多信息请见附录 A）或者没有账户，你只能访问 GPT-3.5；如果你拥有付费的 ChatGPT Plus
    账户并且使用 OpenAI 应用，你可以访问 GPT-3.5 和 GPT-4。
- en: 'To access ChatGPT to help you create web pages, you have three preferred choices:'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 要访问 ChatGPT 以帮助你创建网页，你有三种首选选择：
- en: '*OpenAI app*—This is an online app operated by OpenAI, the creators of GPT
    and ChatGPT. The app is available at [https://chat.openai.com](https://chat.openai.com).
    You don’t need an OpenAI account to access it, but having an account removes certain
    restrictions (check out appendix A to learn how to create an account to access
    ChatGPT). If you have a paid ChatGPT Plus account, you get to choose between GPT-3.5
    and GPT-4, as shown in figure 1.1.'
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*OpenAI 应用*—这是由 GPT 和 ChatGPT 的创造者 OpenAI 运营的在线应用。该应用可在 [https://chat.openai.com](https://chat.openai.com)
    访问。访问它不需要 OpenAI 账户，但拥有账户可以移除某些限制（请参阅附录 A 了解如何创建账户以访问 ChatGPT）。如果你拥有付费的 ChatGPT
    Plus 账户，你可以选择 GPT-3.5 和 GPT-4，如图 1.1 所示。'
- en: '![](../../OEBPS/Images/CH01_F01_Mcfedries3.png)'
  id: totrans-298
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH01_F01_Mcfedries3.png)'
- en: Figure 1.1 With a ChatGPT Plus account, the OpenAI app gives you access to both
    GPT-3.5 and GPT-4.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.1：拥有 ChatGPT Plus 账户时，OpenAI 应用为你提供访问 GPT-3.5 和 GPT-4 的权限。
- en: '*Microsoft Copilot in Bing*—This is the AI-enhanced version of Microsoft’s
    search engine, which offers a chat feature that uses GPT-4 behind the scenes and
    also has access to the web. Navigate to [https://bing.com](https://bing.com) and
    select the Copilot tab to get started, as shown in figure 1.2\. Note that you
    don’t need a ChatGPT account to use Bing Copilot. (If you’re wondering about the
    three “conversation style” choices, I explain them in detail in appendix A.)'
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Microsoft Copilot in Bing*—这是微软搜索引擎的 AI 增强版本，它提供了一个使用 GPT-4 在幕后进行聊天并可以访问网络的聊天功能。按照图
    1.2 所示，导航至 [https://bing.com](https://bing.com) 并选择 Copilot 标签开始使用。请注意，使用 Bing
    Copilot 不需要 ChatGPT 账户。（如果你想知道三种“对话风格”选择，我在附录 A 中详细解释了它们。）'
- en: '![](../../OEBPS/Images/CH01_F02_Mcfedries3.png)'
  id: totrans-301
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH01_F02_Mcfedries3.png)'
- en: Figure 1.2 Use Bing Copilot to work with GPT-4.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.2：使用 Bing Copilot 与 GPT-4 一起工作。
- en: '*Microsoft Copilot*—This is the standalone implementation of Microsoft’s version
    of ChatGPT, which uses the GPT-4 model. Navigate to [https://copilot.microsoft.com](https://copilot.microsoft.com),
    as shown in figure 1.3\. Note that you don’t need a ChatGPT account to use Microsoft
    Copilot, but you do need a Microsoft account. (Again, I explain the three “conversation
    style” choices in appendix A.)'
  id: totrans-303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Microsoft Copilot*—这是微软版本的 ChatGPT 的独立实现，它使用 GPT-4 模型。按照图 1.3 所示，导航至 [https://copilot.microsoft.com](https://copilot.microsoft.com)。请注意，使用
    Microsoft Copilot 不需要 ChatGPT 账户，但你确实需要一个微软账户。（再次提醒，我在附录 A 中解释了三种“对话风格”选择。）'
- en: '![](../../OEBPS/Images/CH01_F03_Mcfedries3.png)'
  id: totrans-304
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH01_F03_Mcfedries3.png)'
- en: Figure 1.3 If you have a Microsoft account, use Copilot to work with GPT-4.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.3 如果您拥有微软账户，请使用 Copilot 与 GPT-4 协作。
- en: Note There are quite a few other ways to access ChatGPT, either directly or
    indirectly. For example, there are ChatGPT apps for iOS and Android. These other
    methods are fine for messing around with ChatGPT, but for creating web pages,
    it’s best to stick with the OpenAI app, Bing Copilot, or Microsoft Copilot because
    they give you easy access to the code generated by ChatGPT.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：访问 ChatGPT 的方法有很多，无论是直接还是间接。例如，有适用于 iOS 和 Android 的 ChatGPT 应用。这些其他方法可以用来与
    ChatGPT 打趣，但对于创建网页来说，最好坚持使用 OpenAI 应用、Bing Copilot 或 Microsoft Copilot，因为它们可以轻松访问
    ChatGPT 生成的代码。
- en: Which method should you use to access ChatGPT? When it comes to creating the
    relatively simple web page code that’s covered in this book, it doesn’t matter
    all that much. GPT-4 tends to produce more “modern” code, which is generally a
    good thing. (However, this may mean your pages don’t work well in older browsers
    such as Internet Explorer. My advice? Ignore those ancient browsers and embrace
    the modern web!) If you don’t have a ChatGPT account and don’t want the restrictions
    that the Open AI app imposes on non-account holders, Bing Copilot is the way to
    go.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 您应该使用哪种方法来访问 ChatGPT？当涉及到这本书中涵盖的相对简单的网页代码时，这并不是很重要。GPT-4 通常会产生更“现代”的代码，这通常是一件好事。（然而，这可能意味着您的页面在旧浏览器（如
    Internet Explorer）中可能无法很好地工作。我的建议？忽略那些古老的浏览器，拥抱现代网络！）如果您没有 ChatGPT 账户，也不想受到 Open
    AI 应用对非账户持有者的限制，那么 Bing Copilot 是一个不错的选择。
- en: 1.2 ChatGPT enables anyone to create web pages
  id: totrans-308
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.2 ChatGPT 使任何人都能创建网页
- en: I’ve never been lucky enough to have an assistant, but I can imagine that it’s
    a sweet deal. After all, who wouldn’t be happy to have someone dedicated to performing
    necessary but mundane tasks such as setting up virtual meetings; arranging flights,
    hotels, and other travel details; and putting together presentations? Having an
    assistant is even more valuable if you don’t know (and don’t want to know) how
    to set up a Zoom meeting, navigate the Expedia website, or build a PowerPoint
    presentation.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 我从未有过如此幸运，拥有一个助手，但我可以想象这会是一笔划算的交易。毕竟，谁会不高兴有人专门负责执行那些必要但枯燥的任务，比如安排虚拟会议；预订航班、酒店和其他旅行细节；以及准备演示文稿？如果您不知道（也不想知道）如何设置
    Zoom 会议、浏览 Expedia 网站，或者构建 PowerPoint 演示文稿，那么拥有一个助手就更有价值了。
- en: 'These tasks are nontrivial, for sure, but they seem like kindergarten exercises
    compared to designing, coding, and deploying a web page or even an entire website.
    Sure, there are templates and similar page-building tools out there that offer
    ready-to-roll web pages, but the results are almost always disappointing because
    you get only a limited amount of control over the output. You have a great topic
    for a site, and you have a mental image of how it should look, but there’s a barrier
    between you and your vision: the web page code.'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 这些任务当然不是微不足道的，但与设计、编码和部署一个网页或整个网站相比，它们似乎就像是幼儿园的练习。当然，市面上有一些模板和类似的页面构建工具可以提供现成的网页，但结果几乎总是令人失望，因为您对输出的控制非常有限。您有一个网站的好主题，您也有一个关于它应该看起来怎样的心理图像，但您和您的愿景之间有一个障碍：网页代码。
- en: 'The three main types of web page code—HTML, CSS, and JavaScript—reside on a
    steep learning curve: a slope that for many people is too onerous a climb when
    all they want is to put up a page or three for themselves or for a team, hobby,
    project, charity, or event. If you want to create a presence on the web but have
    either been disappointed in the available prefabricated solutions or shuddered
    at the thought of learning HTML, CSS, and JavaScript, all is not lost, because
    now you can “hire” (for free, if you prefer) an assistant to generate web page
    code to your exact specifications. That assistant is ChatGPT, which sits well
    on the other side of the web development learning curve and is ready, willing,
    and very able to help you turn your web page vision into web page reality. By
    providing the model with a few simple, plain-English instructions, you can cajole
    ChatGPT into translating those instructions into working web page code. You then
    upload that code to the web (ChatGPT can even help you with that step), and you’re
    done!'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 三个主要的网页代码类型——HTML、CSS和JavaScript——位于一个陡峭的学习曲线之上：对于许多人来说，这是一个过于艰巨的攀登，因为他们只想为自己或团队、爱好、项目、慈善机构或活动搭建一个或几个页面。如果你想在网上建立自己的存在，但要么对现有的预制解决方案感到失望，要么对学习HTML、CSS和JavaScript的想法感到恐惧，那么一切并非毫无希望，因为现在你可以“雇佣”（如果你愿意免费的话）一个助手来根据你的精确规格生成网页代码。这个助手就是ChatGPT，它位于网页开发学习曲线的另一端，准备好、愿意并且非常能够帮助你将你的网页愿景变为现实。通过向模型提供一些简单、通俗易懂的指令，你可以说服ChatGPT将这些指令转化为可工作的网页代码。然后，你将代码上传到网上（ChatGPT甚至可以帮助你完成这一步），任务就完成了！
- en: Okay, it’s perhaps not quite as easy as all that (otherwise, there wouldn’t
    have been much point in writing the rest of this book!). But the basic procedure
    is every bit as straightforward as I’ve outlined it here.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，这可能并不像听起来那么简单（否则，就没有必要写这本书的其余部分了！）。但基本步骤和我在这里概述的完全一样。
- en: 1.3 Understanding the types of pages you can (and can’t) create
  id: totrans-313
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.3 理解你可以（和不可以）创建的页面类型
- en: By now, you may be thinking that transforming ChatGPT into a website-building
    robot assistant must come with some sort of catch. After all, to the uninitiated,
    building web pages seems like an almost quintessentially complex task, so claiming
    that you can farm out almost all that labor to an AI model without having to learn
    to code yourself must come with a rather large “gotcha.” Surprisingly, there are
    no such flies in the ChatGPT ointment, but there are a few provisos to bear in
    mind.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 到现在为止，你可能已经在想，将ChatGPT转变为网站建设机器人助手肯定有一些代价。毕竟，对于初学者来说，构建网页似乎是一项几乎本质上复杂的任务，所以声称你可以将几乎所有这些劳动外包给一个AI模型，而不必自己学习编码，这肯定伴随着一个相当大的“陷阱”。令人惊讶的是，ChatGPT中并没有这样的缺陷，但也有一些前提条件需要记住。
- en: 'First, you need to know that the types of web pages most easily created with
    the help of ChatGPT are those described as *static* in the web development trade.
    A static web page is one that contains text and data that don’t change after the
    page is loaded. That may sound restrictive, but there’s really no limit on the
    types of static pages you can ask ChatGPT to help you build. Here are 10 ideas:'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你需要知道，最容易在ChatGPT的帮助下创建的网页类型是在网页开发行业中被称为*静态*的页面。静态网页是指页面加载后包含的文本和数据不会发生变化。这听起来可能有些限制，但事实上，你要求ChatGPT帮助你构建的静态页面类型几乎没有限制。以下有10个想法：
- en: Personal home page
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个人主页
- en: Information page for a team, organization, or event
  id: totrans-317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 团队、组织或活动的信息页面
- en: Product landing page
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品着陆页面
- en: Hobby page
  id: totrans-319
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 爱好页面
- en: Photo gallery
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 照片画廊
- en: Portfolio page
  id: totrans-321
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简历页面
- en: Post page (essay, review, fan fiction, or whatever)
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帖子页面（文章、评论、同人小说，或任何内容）
- en: Top-10 list
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前10名列表
- en: How-to instructions
  id: totrans-324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指令说明
- en: Travel guide
  id: totrans-325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 旅行指南
- en: I bet you can easily come up with 10 more on your own. These are the types of
    pages you learn how to create with the help of ChatGPT in this book. And the really
    great news is that unless you opt for a paid ChatGPT Plus subscription, you can
    do everything—from accessing ChatGPT to saving the generated code to deploying
    your pages—completely free.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 我敢打赌你很容易就能自己想出10个。这些就是你在本书中通过ChatGPT的帮助学习如何创建的页面类型。而且，好消息是，除非你选择付费的ChatGPT Plus订阅，否则你可以完全免费地做任何事情——从访问ChatGPT到保存生成的代码，再到部署你的页面。
- en: Second, one of the characteristics of the types of pages I just listed is that
    they only require what web development geeks call *frontend* code, which means
    code (HTML, CSS, and JavaScript) that runs in the web browser. A much different
    beast is *backend* code, which means code that runs on a web server and is generally
    used to supply text and data for a *dynamic* web page, where the text and data
    change on the fly.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，我刚才列出的一类网页的特点之一是，它们只需要网络开发爱好者所说的*前端*代码，这意味着在网页浏览器中运行的代码（HTML、CSS 和 JavaScript）。与之截然不同的是*后端*代码，这意味着在网页服务器上运行的代码，通常用于为*动态*网页提供文本和数据，其中文本和数据会实时更改。
- en: Technically, it’s possible to ask ChatGPT to supply such backend code, but practically
    speaking, you’re talking about setup tasks that are an order of magnitude more
    complicated, far more complex in terms of organizing and deploying the generated
    code, *huge* security risks because web servers are vulnerable to many types of
    attacks and advanced coding techniques must be used to harden backend code against
    malicious users, and almost always added costs because web hosting accounts that
    enable access to a server usually require a paid subscription plan. For all these
    reasons, you don’t learn how to use ChatGPT to generate backend code in this book.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 从技术上讲，你可以要求 ChatGPT 提供这样的后端代码，但从实际角度来说，你谈论的是比这复杂一个数量级的设置任务，在组织和部署生成的代码方面更为复杂，*巨大的*安全风险，因为网络服务器容易受到多种攻击，并且必须使用高级编码技术来加固后端代码以抵御恶意用户，而且几乎总是会增加成本，因为允许访问服务器的网络托管账户通常需要付费订阅计划。出于所有这些原因，本书中不会介绍如何使用
    ChatGPT 生成后端代码。
- en: 1.4 Using ChatGPT to help you build web pages
  id: totrans-329
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.4 使用 ChatGPT 帮助你构建网页
- en: '*Fritterware* is an old computing term that refers to any software that seduces
    the user into spending inordinate amounts of time playing around with the program’s
    features and options. Once you have a ChatGPT account (which I cover in appendix
    A; however, remember that having an account is optional), you have instant access
    to one of the all-time great pieces of fritterware ever invented! It’s easy to
    spend huge hunks of time getting ChatGPT to do all kinds of fun and silly things,
    but eventually, you’ll want to stop frittering and start creating.'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: '*Fritterware* 是一个古老的计算机术语，指的是任何诱使用户花费大量时间在程序的功能和选项上玩耍的软件。一旦你拥有一个 ChatGPT 账户（我在附录
    A 中进行了介绍；然而，请记住，拥有账户是可选的），你就可以立即访问有史以来最伟大的碎片软件之一！很容易花费大量时间让 ChatGPT 做各种有趣和愚蠢的事情，但最终，你将想要停止浪费并开始创作。'
- en: The ChatGPT creative process varies depending on what you’re making, but for
    our purposes here, you need to know the overall process of getting ChatGPT to
    help you create web pages. The simplified version of that process is summarized
    in figure 1.4\. The next few sections explain each step, and chapter 2 takes you
    through a complete example of the process.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 创作过程因你制作的内容而异，但就我们的目的而言，你需要了解获取 ChatGPT 帮助你创建网页的整体过程。该过程的简化版本总结在图 1.4
    中。接下来的几节将解释每个步骤，而第 2 章将带你通过该过程的完整示例。
- en: '![](../../OEBPS/Images/CH01_F04_Mcfedries3.png)'
  id: totrans-332
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH01_F04_Mcfedries3.png)'
- en: Figure 1.4 A simplified diagram of the process you use to get ChatGPT to help
    you create a web page
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.4 使用 ChatGPT 帮助你创建网页的过程简化图
- en: 1.4.1 Prompting ChatGPT
  id: totrans-334
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.4.1 提示 ChatGPT
- en: The process always begins with a request that specifies what you want ChatGPT
    to create for you. This request is called a *prompt*. When you log in to the ChatGPT
    app (refer to figure 1.1) or navigate to Bing Copilot (refer to figure 1.2), you
    see a text box where you type your prompt.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程总是从一个指定你希望 ChatGPT 为你创建什么的请求开始。这个请求被称为*提示*。当你登录到 ChatGPT 应用程序（参见图 1.1）或导航到
    Bing Copilot（参见图 1.2）时，你会看到一个文本框，你可以在这里输入你的提示。
- en: Prompts can be as simple as a single sentence (as demonstrated in figure 1.3)
    or as complex as multiple paragraphs. However, the sky is definitely not the limit
    here because most versions of ChatGPT will accept only up to 4,000 characters
    per prompt. That’s a good 500 words or so, which ought to be more than enough
    for most of your web creation prompts.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 提示可以是简单的单句（如图 1.3 所示），也可以是复杂的多个段落。然而，这里的天空绝对不是极限，因为大多数版本的 ChatGPT 每个提示只能接受最多
    4,000 个字符。这大约是 500 个单词，对于大多数网页创作提示来说应该足够了。
- en: It’s no exaggeration to say that prompting ChatGPT is the most important step
    because the quality of your prompt directly determines the quality of the result
    returned by ChatGPT. In a sense, this entire book is about providing you with
    high-quality prompts that get ChatGPT to perform specific web page creation tasks.
    I also devote quite a few pages in appendix C to explaining some best practices
    associated with prompting ChatGPT (a process called *prompt engineering* by the
    cognoscenti).
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 不得不说，提示ChatGPT是最重要的一步，因为你的提示质量直接决定了ChatGPT返回的结果质量。从某种意义上说，这本书的整个内容都是关于提供高质量提示，以使ChatGPT执行特定的网页创建任务。我还专门在附录C中用相当多的篇幅解释了一些与提示ChatGPT相关的最佳实践（专家们称之为*提示工程*的过程）。
- en: Warning Although it’s generally true that ChatGPT is a quality-in, quality-out
    model, it is, like all large language models, prone to occasionally producing
    unusable or downright weird results even when the prompt is a good one. I talk
    about some ways to troubleshoot such problems in appendix A.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 警告：尽管一般来说ChatGPT是一个质量输入，质量输出的模型，但它像所有大型语言模型一样，有时即使提示很好，也可能会偶尔产生不可用或非常奇怪的结果。我在附录A中讨论了一些解决此类问题的方法。
- en: 1.4.2 Viewing ChatGPT’s results
  id: totrans-339
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.4.2 查看ChatGPT的结果
- en: 'When you submit your prompt, ChatGPT sets to work and usually begins “typing”
    its response within a few seconds. Figure 1.5 shows an example response to the
    following prompt:'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 当你提交你的提示时，ChatGPT开始工作，通常在几秒钟内就开始“输入”它的响应。图1.5显示了以下提示的示例响应：
- en: '[PRE0]'
  id: totrans-341
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![](../../OEBPS/Images/CH01_F05_McFedries3.png)'
  id: totrans-342
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH01_F05_McFedries3.png)'
- en: Figure 1.5 In this example, ChatGPT’s response to the prompt includes the requested
    code.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.5 在这个例子中，ChatGPT对提示的响应包括请求的代码。
- en: 'As shown in figure 1.5, the result in this case consists of a friendly response
    to your prompt followed by a box titled `html` that includes the web page code
    that was requested. This code will no doubt seem like near-gibberish to you, but
    trust me when I tell you that it does exactly what the prompt asked for: it displays
    the message `Hello World!` in a large (in this case, 48-point) font. Note that,
    for various technical reasons, ChatGPT may not return the same code each time
    you run the prompt. However, because there are often several ways to achieve the
    same result with HTML and CSS, the generated code will still produce a web page
    that looks the same (or at least very similar).'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 如图1.5所示，这个结果包括对你的提示的友好响应，后面跟着一个标题为`html`的框，其中包含请求的网页代码。这个代码在你看来可能像是几乎无法辨认的乱码，但请相信我，它确实做了提示所要求的事情：以大号字体（在这种情况下，48号字体）显示消息`Hello
    World!`。请注意，由于各种技术原因，ChatGPT每次运行提示时可能不会返回相同的代码。然而，由于HTML和CSS通常有多种方式可以达到相同的结果，生成的代码仍然会生成看起来相同（或者至少非常相似）的网页。
- en: 1.4.3 Getting the code into a file
  id: totrans-345
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.4.3 将代码放入文件
- en: The example prompt I used in the previous section is a simple one, for sure,
    but it’s still more than a little awesome that within a few seconds of submitting
    this prompt, ChatGPT generated some workable web page code that satisfied the
    request. As you work on your web page projects with ChatGPT at your side, as it
    were, that sense of amazement will come up again and again as the model quickly
    and seemingly effortlessly generates the code you asked for.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中我使用的示例提示确实很简单，但仍然令人惊叹的是，在提交这个提示后的几秒钟内，ChatGPT就生成了一些可行的网页代码，满足了请求。当你与ChatGPT一起工作在网页项目上时，仿佛这种惊奇感会一次又一次地出现，因为模型快速且看似毫不费力地生成了你要求的代码。
- en: However, the web page code produced by ChatGPT, no matter how accurate it is
    or how suitable to your needs, doesn’t do anything. That’s because, on its own,
    web page code is inert; it’s just a collection of words and odd-looking symbols.
    For web page code to come alive, it must be displayed in a web browser; and before
    you can do that, you must get the code into a file that a browser can access.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，ChatGPT生成的网页代码，无论其准确性如何或是否符合你的需求，都不会做任何事情。这是因为，就其本身而言，网页代码是静止的；它只是一系列单词和看起来奇怪的符号。为了让网页代码变得活跃，它必须在网页浏览器中显示；在你能够做到这一点之前，你必须将代码放入浏览器可以访问的文件中。
- en: 'Appendix A dives into the ins and outs of web page files in just the right
    amount of detail. Figure 1.6 shows the code generated by ChatGPT (refer to figure
    1.5) pasted into an HTML file, which has been saved as index.xhtml. At this point,
    you could load the saved HTML file into your favorite web browser (see chapter
    2 for the details), but a true web project requires one more step: deploying the
    code to the web itself.'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 附录 A 以适当的详细程度深入探讨了网页文件的细节。图 1.6 展示了 ChatGPT 生成的代码（参见图 1.5）粘贴到 HTML 文件中，该文件已保存为
    index.xhtml。此时，你可以将保存的 HTML 文件加载到你的浏览器中（详见第 2 章），但一个真正的网页项目还需要额外一步：将代码部署到网络本身。
- en: '![](../../OEBPS/Images/CH01_F06_McFedries3.png)'
  id: totrans-349
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH01_F06_McFedries3.png)'
- en: Figure 1.6 The code copied from ChatGPT and saved to an HTML file
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.6 从 ChatGPT 复制并保存到 HTML 文件的代码
- en: 1.4.4 Deploying the HTML file
  id: totrans-351
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.4.4 部署 HTML 文件
- en: The only way other people can view your pages is for you to put them on the
    web. For the relatively simple projects you create in this book, this deployment
    process involves copying the file or files that ChatGPT helped you create to a
    service that hosts web pages. I go into this process in more detail in appendix
    B, but for the most part, it just means uploading the folder in which you’ve stored
    your web page files to the host. Figure 1.7 shows an example of the process where
    I’ve dragged the hello-world folder from the Finder window on the right and am
    about to drop it on the window on the left. With your web page files uploaded,
    you can view them right away in your favorite web browser, as shown in figure
    1.8.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 要让其他人能够查看你的页面，你必须将它们放在网络上。对于本书中创建的相对简单的项目，这个部署过程涉及将 ChatGPT 帮助你创建的文件或文件复制到托管网页的服务器上。我在附录
    B 中更详细地介绍了这个过程，但基本上，这意味着将存储网页文件的文件夹上传到主机。图 1.7 展示了示例过程，我将右边的 Finder 窗口中的 hello-world
    文件夹拖动，准备将其放在左边的窗口上。当你上传了网页文件后，你可以在你的浏览器中立即查看它们，如图 1.8 所示。
- en: '![](../../OEBPS/Images/CH01_F07_McFedries3.png)'
  id: totrans-353
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH01_F07_McFedries3.png)'
- en: Figure 1.7 With some services, such as Netlify shown here, deploying is a simple
    drag-and-drop affair.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.7 在一些服务中，例如这里展示的 Netlify，部署是一个简单的拖放操作。
- en: '![](../../OEBPS/Images/CH01_F08_McFedries3.png)'
  id: totrans-355
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH01_F08_McFedries3.png)'
- en: Figure 1.8 The web page created by ChatGPT is on the web.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.8 ChatGPT 创建的网页已上线。
- en: 'The previous few sections took you through a prompt-copy-save-deploy process
    that has, I think you’ll agree, a satisfying—and more than a little surprising—straightforwardness
    to it. However, not all of your projects will be this uncomplicated, particularly
    as you venture into creating web pages that go well beyond saying “Hello World!”
    For these more ambitious projects, you’ll most often use two extra techniques:
    repeating the prompt-copy-save-deploy process to create multiple pages and page
    components; and refining and revising your ChatGPT prompts.'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 前几节向您介绍了提示-复制-保存-部署的过程，我认为您会同意，这个过程既令人满意，又出人意料地简单明了。然而，并非所有项目都这么简单，尤其是当你开始创建远不止“Hello
    World！”的网页时。对于这些更具雄心的项目，你通常会使用两种额外技术：重复提示-复制-保存-部署过程以创建多个页面和页面组件；以及改进和修订你的 ChatGPT
    提示。
- en: 1.4.5 Repeating as needed
  id: totrans-358
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.4.5 需要时重复
- en: 'A single prompt that creates a single web page will be relatively rare in your
    web page creation career. It’s far more likely that you’ll have to perform the
    prompt-copy-save-deploy cycle multiple times before you end up with all the content
    you need. There are two scenarios to consider:'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的网页制作生涯中，仅通过一个提示创建单个网页的情况相对较少。更有可能的是，你需要多次执行提示-复制-保存-部署的循环，才能最终获得所需的所有内容。这里有两种情况需要考虑：
- en: '*Creating multiple pages*—Lots of websites consist of a single page, but the
    far more common case is a website that consists of multiple pages. Even a modest
    website may consist of a home page, an About page (that describes you or your
    site), a Contact page (that lists the various ways site visitors can get in touch
    with you), and separate pages for content such as essays, photos, and portfolios.
    For such a website, you’ll need to repeat the prompt-copy-save-deploy cycle for
    each page.'
  id: totrans-360
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*创建多个页面*——许多网站由单个页面组成，但更常见的情况是网站由多个页面组成。即使是规模较小的网站，也可能包括主页、关于页面（描述你或你的网站）、联系页面（列出网站访客可以联系你的各种方式），以及用于文章、照片和作品集等内容的独立页面。对于这样的网站，你需要为每个页面重复提示-复制-保存-部署的循环。'
- en: '*Creating multiple components for a single page*—Most modern web pages consist
    of multiple components, such as a header, a navigation bar or menu, a content
    area, a sidebar, and a footer. It’s possible to include all the components you
    need in a single prompt, but you’ll get more satisfying results if you use a separate
    prompt for each component. In this case, the process becomes one where you repeat
    the prompt-copy-save part of the cycle for each component, and the copied code
    gets inserted into the same HTML file. You then deploy the code only after you’ve
    added all your page components.'
  id: totrans-361
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*为单个页面创建多个组件*——大多数现代网页由多个组件组成，例如页眉、导航栏或菜单、内容区域、侧边栏和页脚。你可以在单个提示中包含所有需要的组件，但如果你为每个组件使用单独的提示，你会得到更令人满意的结果。在这种情况下，这个过程变成了一种重复提示-复制-保存循环的部分，每个组件的复制代码被插入到同一个HTML文件中。然后你只在添加了所有页面组件之后部署代码。'
- en: 'If all this seems a bit abstract or confusing now, don’t worry: the rest of
    this book is all about getting you comfortable with the specifics of creating
    multiple pages and page components.'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 如果现在这一切看起来有点抽象或令人困惑，不要担心：这本书的其余部分都是关于让你熟悉创建多个页面和页面组件的具体细节。
- en: 1.4.6 Refining and revising your prompts
  id: totrans-363
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.4.6 优化和修订你的提示
- en: The ChatGPT-assisted page creation process depicted earlier in figure 1.3 works
    for uncomplicated web pages and for those times when ChatGPT nails your request.
    But as your web pages—and your prompts—grow more complex, you’ll almost certainly
    find yourself adding a few more steps to the process. I’ve included these extra
    steps in the shaded area of the process diagram shown in figure 1.9.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.3中描述的ChatGPT辅助页面创建过程适用于简单的网页和ChatGPT准确满足你的请求的时候。但随着你的网页——以及你的提示——变得更加复杂，你几乎肯定会发现自己需要在这个过程中添加几个额外的步骤。我已经将这些额外步骤包含在图1.9中所示的过程图的阴影区域中。
- en: '![](../../OEBPS/Images/CH01_F09_Mcfedries3.png)'
  id: totrans-365
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH01_F09_Mcfedries3.png)'
- en: Figure 1.9 Refining and revising your web page prompts
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 图1.9 优化和修订你的网页提示
- en: 'At first glance, this likely appears to be a much more complex process, but
    really, there are just two extra paths this new process can take. These two paths
    come in the form of questions:'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 初看之下，这可能看起来是一个更复杂的过程，但实际上，这个新过程只需要额外走两条路径。这两条路径以问题的形式出现：
- en: '*Is this what you wanted?* You ask this question immediately after ChatGPT
    generates the code you requested in your prompt. Basically, you’re examining the
    code (as best you can, anyway) to make sure it does the job for you. If the answer
    is “Yes,” you move on to the next question; if the answer is “No,” you refine
    the prompt in some way (for example, by making it more specific) and try again.'
  id: totrans-368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*这是你想要的吗？* 你会在ChatGPT根据你的提示生成你请求的代码后立即提出这个问题。基本上，你是在检查代码（尽可能好地检查）以确保它为你完成工作。如果答案是“是”，你就继续下一个问题；如果答案是“否”，你以某种方式（例如，使其更具体）改进提示，然后再次尝试。'
- en: '*Does it work?* This question requires that you test the code by copying it
    and then pasting it into an online site designed for testing web page code, as
    I describe in appendix A. If the code checks out, you can proceed with saving
    it to an HTML file. If the code is wrong somehow, you need to fix the error by
    revising your prompt in some way and then resubmitting it; again, appendix A is
    the place to go for some troubleshooting suggestions.'
  id: totrans-369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*它工作吗？* 这个问题要求你通过复制代码并将其粘贴到在线测试网页代码的网站上来测试代码，正如我在附录A中描述的那样。如果代码通过检查，你可以继续将其保存到HTML文件中。如果代码在某些方面有错误，你需要通过以某种方式修订提示并重新提交来修复错误；再次，附录A是寻找一些故障排除建议的地方。'
- en: Sure, it would be great if ChatGPT generated awesome code every time. And it’s
    great that each new release of ChatGPT gets better not only at producing accurate
    code but also at creating code that matches even vague or general prompts. But
    although ChatGPT may someday routinely crank out perfect web page code every time,
    it’s not there yet, so you’ll need to refine and revise your prompts to get the
    pages you want.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，如果ChatGPT每次都能生成出色的代码那就太好了。而且，ChatGPT的每个新版本不仅在生产准确代码方面变得更好，而且在创建与模糊或一般提示匹配的代码方面也变得更好。尽管ChatGPT可能有一天会例行公事地生成完美的网页代码，但目前它还没有达到那个水平，所以你需要优化和修订你的提示来得到你想要的页面。
- en: Summary
  id: totrans-371
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: GPT stands for *generative* (it’s designed to generate text), *pretrained* (it
    was exposed to large amounts of text to learn language patterns and structures),
    *transformer* (it analyzes requests to give higher priority to the most important
    components).
  id: totrans-372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPT 代表 *生成*（它被设计用来生成文本），*预训练*（它接触了大量文本以学习语言模式和结构），*转换器*（它分析请求，以给予最重要的组件更高的优先级）。
- en: ChatGPT is an app that enables conversational access to GPT via the OpenAI app
    at [https://chat.openai.com](https://chat.openai.com), via Bing Copilot at [https://bing.com](https://bing.com)
    (select the Copilot tab), or via Microsoft Copilot at [https://copilot.microsoft.com](https://copilot.microsoft.com).
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT 是一个应用程序，它通过 OpenAI 应用程序在 [https://chat.openai.com](https://chat.openai.com)、通过
    Bing Copilot 在 [https://bing.com](https://bing.com)（选择 Copilot 选项卡）或通过 Microsoft
    Copilot 在 [https://copilot.microsoft.com](https://copilot.microsoft.com) 上，通过
    GPT 实现对话访问。
- en: 'GPT has been trained on massive amounts of programming code, including the
    code used to build web pages: HTML, CSS, and JavaScript. This training enables
    ChatGPT to generate web page code from plain-English instructions.'
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPT 在大量编程代码上进行了训练，包括用于构建网页的代码：HTML、CSS 和 JavaScript。这种训练使 ChatGPT 能够根据简单的英语指令生成网页代码。
- en: ChatGPT is best used to create static web pages that don’t require or rely on
    data stored on a web server.
  id: totrans-375
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT 最好用于创建不需要或依赖于存储在服务器上的数据的静态网页。
- en: ChatGPT helps you create web pages using a basic prompt-copy-save-deploy cycle,
    where the *prompt* is the instruction that tells ChatGPT what type of page you
    want, *copy* means to copy the code generated by ChatGPT and paste it into a file,
    *save* means to save the code as an HTML file, and *deploy* means to upload the
    HTML file to a web hosting provider.
  id: totrans-376
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT 帮助您通过基本的提示-复制-保存-部署周期创建网页，其中 *提示* 是告诉 ChatGPT 您想要哪种类型页面的指令，*复制* 意味着复制
    ChatGPT 生成的代码并将其粘贴到文件中，*保存* 意味着将代码保存为 HTML 文件，而 *部署* 意味着将 HTML 文件上传到网络托管提供商。
- en: For best results, you’ll usually have to refine your prompts to get the structure
    and content of your page just right, and you’ll usually have to revise your prompts
    to fix page problems.
  id: totrans-377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了获得最佳效果，您通常需要调整您的提示以使网页的结构和内容恰到好处，并且通常需要修改您的提示以修复页面问题。
- en: 2 Creating and deploying your first web page
  id: totrans-378
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2 创建和部署您的第一个网页
- en: This chapter covers
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖
- en: Understanding the process of creating and deploying a web page
  id: totrans-380
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解创建和部署网页的过程
- en: Using a ChatGPT prompt to generate a complete web page
  id: totrans-381
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 提示生成完整的网页
- en: Copying the generated web page code
  id: totrans-382
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复制生成的网页代码
- en: Saving the code to an HTML file
  id: totrans-383
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将代码保存到 HTML 文件
- en: Getting your web page file on the web
  id: totrans-384
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将您的网页文件放到网上
- en: 'It may still seem too good to be true that you can get ChatGPT to help you
    create a fully functional website without having to learn any web development
    code. If you remain skeptical, I hear you: even knowing a bit about how ChatGPT
    does its thing, there’s still an undeniable whiff of magic about the whole enterprise.
    After all, it’s not like you’re asking ChatGPT to tell you a knock-knock joke
    or write a haiku extolling the nutritional value of the rutabaga. No, we’re talking
    about all the code necessary to build a web page that actually does something
    semi-useful. That’s a complex ask by any criteria, so whatever remaining skepticism
    you have is totally warranted.'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能觉得这听起来太好了而不真实，您可以让 ChatGPT 帮助您创建一个完全功能性的网站，而无需学习任何网络开发代码。如果您仍然怀疑，我理解您：即使您对
    ChatGPT 如何工作有一些了解，整个项目仍然带有不可否认的魔力。毕竟，您不是要求 ChatGPT 告诉您一个敲门笑话或写一首赞美芜菁营养价值的俳句。不，我们谈论的是构建一个真正有用的网页所需的所有代码。这在任何标准下都是一个复杂的要求，所以您剩余的怀疑是完全有理由的。
- en: In this chapter, my aim is to show you that it’s possible to create a web page
    with ChatGPT’s help. I’m not going to do this by exploring more ChatGPT theory.
    No, there’s been enough of that. Instead, I’ll take you through a complete example
    where I cajole ChatGPT into creating the code for a functional web page that,
    by the end of the chapter, will have its own home on the web. To get this done
    in a single chapter, the web page will out of necessity be extremely simple, but
    it will work, and it will even provide a bit of fun (depending, as you’ll see,
    on your taste for puns).
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我的目标是向您展示在 ChatGPT 的帮助下创建网页是可能的。我不会通过探索更多的 ChatGPT 理论来做这件事。不，那已经足够了。相反，我会带您通过一个完整的例子，其中我会说服
    ChatGPT 创建一个功能网页的代码，到本章结束时，这个网页将在网上有自己的家。为了在一个章节中完成这项工作，网页将不可避免地非常简单，但它会工作，甚至还会提供一些乐趣（取决于您对双关语的品味）。
- en: 2.1 Understanding the process
  id: totrans-387
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.1 理解过程
- en: 'To create this chapter’s functioning web page, I’m going to use the prompt-copy-save-deploy
    cycle that I introduced in chapter 1 (refer to figure 2.1):'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建本章的功能性网页，我将使用我在第 1 章中介绍过的提示-复制-保存-部署循环（参考图 2.1）：
- en: Prompt ChatGPT to generate the web page code.
  id: totrans-389
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示 ChatGPT 生成网页代码。
- en: Copy the resulting code.
  id: totrans-390
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 复制生成的代码。
- en: Paste the code into a text editor, and then save the code as an HTML file.
  id: totrans-391
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将代码粘贴到文本编辑器中，然后保存为 HTML 文件。
- en: Deploy the HTML file to a web host.
  id: totrans-392
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 HTML 文件部署到网站托管服务上。
- en: '![](../../OEBPS/Images/CH02_F01_Mcfedries3.png)'
  id: totrans-393
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH02_F01_Mcfedries3.png)'
- en: Figure 2.1 The prompt-copy-save-deploy cycle that you’ll be using in this chapter
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.1 本章中将要使用的提示-复制-保存-部署循环
- en: The sections in the rest of this chapter expand on each of these steps.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 本章剩余部分的内容将扩展到每个这些步骤。
- en: 2.2 Prompting ChatGPT to generate your web page code
  id: totrans-396
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.2 提示 ChatGPT 生成你的网页代码
- en: 'To get started, you first need to get ChatGPT onscreen. You have the following
    choices:'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，你首先需要将 ChatGPT 显示在屏幕上。你有以下选择：
- en: If you don’t have an OpenAI account, go to [https://chat.openai.com](https://chat.openai.com)
    to use GPT-3.5 as the model.
  id: totrans-398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你没有 OpenAI 账户，请访问 [https://chat.openai.com](https://chat.openai.com) 使用 GPT-3.5
    作为模型。
- en: If you have an OpenAI account but don’t have a ChatGPT Plus subscription, go
    to [https://chat.openai.com](https://chat.openai.com) to use GPT-3.5 as the model.
  id: totrans-399
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你拥有 OpenAI 账户但没有 ChatGPT Plus 订阅，请访问 [https://chat.openai.com](https://chat.openai.com)
    使用 GPT-3.5 作为模型。
- en: If you have a ChatGPT Plus subscription, go to [https://chat.openai.com](https://chat.openai.com)
    and then click the GPT-4 button.
  id: totrans-400
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你拥有 ChatGPT Plus 订阅，请访问 [https://chat.openai.com](https://chat.openai.com)
    并点击 GPT-4 按钮。
- en: If you prefer to use Bing Copilot, go to [https://bing.com](https://bing.com),
    click Copilot, and then click the Precise conversation style.
  id: totrans-401
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你更喜欢使用 Bing Copilot，请访问 [https://bing.com](https://bing.com)，点击 Copilot，然后点击精确对话风格。
- en: If you have a Microsoft account, go to [https://copilot.microsoft.com](https://copilot.microsoft.com)
    and click the Precise conversation style.
  id: totrans-402
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你拥有 Microsoft 账户，请访问 [https://copilot.microsoft.com](https://copilot.microsoft.com)
    并点击精确对话风格。
- en: For my own prompting, I used the ChatGPT app with GPT-4 as the model, as shown
    in figure 2.2.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我的提示，我使用了带有 GPT-4 作为模型的 ChatGPT 应用，如图 2.2 所示。
- en: '![](../../OEBPS/Images/CH02_F02_McFedries3.png)'
  id: totrans-404
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH02_F02_McFedries3.png)'
- en: Figure 2.2 The ChatGPT app with GPT-4 selected as the language model
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.2 选择 GPT-4 作为语言模型的 ChatGPT 应用
- en: Now that you have ChatGPT waiting to do your bidding, the next step is to give
    the model a prompt to generate some web page code. One of the points I want to
    make in this chapter is that it’s possible to get ChatGPT to output the code for
    a functional web page with a single prompt. To get there, we have to greatly simplify
    things, so this can’t be a complicated, multifunction page with a ton of bells
    and whistles.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经让 ChatGPT 等待执行你的命令，下一步是向模型提供一个提示以生成一些网页代码。在本章中，我想强调的一点是，可以通过单个提示让 ChatGPT
    输出功能网页的代码。为了达到这个目标，我们必须极大地简化事情，因此这不能是一个复杂的多功能页面，带有大量的功能。
- en: 'However, it doesn’t have to be a bottom-of-the-barrel “Hello World!” page,
    either. In general, if you have an idea for a simple page, just ask ChatGPT to
    generate the code for the page and include a description of what you want. That
    description will vary depending on the idea, but you may want to include some
    or all of the following:'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，它也不必是一个最基础的“Hello World！”页面。一般来说，如果你有一个简单的页面想法，只需让 ChatGPT 生成页面的代码，并包括你想要的内容描述。这个描述将根据想法而变化，但你可能希望包括以下内容之一：
- en: '*Goal*—What you want ChatGPT to generate (in this case, a web page)'
  id: totrans-408
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*目标*——你希望 ChatGPT 生成的（在这种情况下，是一个网页）'
- en: '*Data*—The data you want ChatGPT to use, if any'
  id: totrans-409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*数据*——你希望 ChatGPT 使用的数据（如果有的话）'
- en: '*Action*—What you want the web page to do, generally or with the data you specified'
  id: totrans-410
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*行动*——你希望网页执行的操作，通常是通用的或与指定的数据相关'
- en: '*Interface*—How you want the user to initiate the action or otherwise interface
    with the page'
  id: totrans-411
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*界面*——你希望用户如何启动操作或与页面交互'
- en: 'Here’s the prompt for the page I want (refer to figure 2.3):'
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我想创建的网页的提示（参考图 2.3）：
- en: '[PRE1]'
  id: totrans-413
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../../OEBPS/Images/CH02_F03_McFedries3.png)'
  id: totrans-414
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH02_F03_McFedries3.png)'
- en: Figure 2.3 The ChatGPT app with my prompt ready to send
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2.3 准备发送提示的 ChatGPT 应用
- en: 'Here’s how this prompt fits into the goal-data-action-interface schema:'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示如何符合目标-数据-行动-界面模式：
- en: '`Create web page code`—This part of the prompt tells ChatGPT to generate the
    code for an entire web page.'
  id: totrans-417
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`创建网页代码`——这个提示部分告诉ChatGPT生成整个网页的代码。'
- en: '`that stores 50 puns`—Tells ChatGPT to create 50 puns to use as the page data.'
  id: totrans-418
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`存储50个双关语`——告诉ChatGPT创建50个双关语作为页面数据。'
- en: '`and displays a random pun`—Tells ChatGPT to select a pun randomly from the
    data.'
  id: totrans-419
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`并显示一个随机双关语`——告诉ChatGPT从数据中随机选择一个双关语。'
- en: '`each time the user clicks a button`—Tells ChatGPT to provide a button that,
    when clicked, displays another random pun.'
  id: totrans-420
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`每次用户点击按钮`——告诉ChatGPT提供一个按钮，当点击时，显示另一个随机双关语。'
- en: Enter the prompt into the ChatGPT text box, click the Send Message icon, and
    wait for the result.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 将提示输入到ChatGPT文本框中，点击发送消息图标，等待结果。
- en: 2.2.1 Examining the result
  id: totrans-422
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.1 检查结果
- en: 'The following code shows the first response I received from ChatGPT (the code
    that ChatGPT generates for you may be different):'
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码显示了从ChatGPT收到的第一个响应（ChatGPT为你生成的代码可能不同）：
- en: '[PRE2]'
  id: totrans-424
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: ① Page title
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: ① 页面标题
- en: ② Applies the Arial typeface to the page
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: ② 将Arial字体应用于页面
- en: ③ Displays each pun in a 24-pixel font with a 20-pixel margin on top
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 以24像素的字体显示每个双关语，顶部有20像素的边距
- en: ④ Page’s main heading
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 页面的主要标题
- en: ⑤ Button the user clicks to get a new random pun
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 用户点击以获取新随机双关语的按钮
- en: ⑥ Section of the page where each random pun appears
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 页面中每个随机双关语出现的部分
- en: ⑦ (Partial) page data, which is a collection of puns
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ （部分）页面数据，这是一个双关语的集合
- en: ⑧ JavaScript code that extracts a random pun from the data
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 从数据中提取随机双关语的JavaScript代码
- en: 'There are three things to note here:'
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有三点需要注意：
- en: Even though this is a simple page, the code itself is fairly complex, so don’t
    worry if it all seems like a foreign language to you. You don’t need to know how
    this code works, just that it does (taking into account my third point in this
    list).
  id: totrans-434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尽管这是一个简单的页面，但代码本身相当复杂，所以如果你觉得它像一门外语一样，请不要担心。你不需要知道代码是如何工作的，只需知道它确实可以工作（考虑到我在这份清单中的第三点）。
- en: Remember that ChatGPT is nondeterministic, which means it won’t generate the
    same code every time, even when you use the same prompt. Therefore, if you run
    my prompt in ChatGPT, there’s a good chance you’ll end up with code that’s different
    than what you see in listing 2.1.
  id: totrans-435
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记住，ChatGPT是非确定性的，这意味着即使你使用相同的提示，它也不会每次都生成相同的代码。因此，如果你在ChatGPT中运行我的提示，你很可能得到与列表2.1中看到的不同代码。
- en: 'Instead of creating 50 puns, ChatGPT created just three puns and then passed
    the buck:'
  id: totrans-436
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与创建50个双关语不同，ChatGPT只创建了三个双关语，然后推卸责任：
- en: '[PRE3]'
  id: totrans-437
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'This doesn’t happen every time, but you should know that this is very common
    ChatGPT behavior. Fortunately, it doesn’t mean you’re stuck. I got ChatGPT to
    complete its mission with a simple prompt:'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 这种情况并不总是发生，但你应该知道这是ChatGPT非常常见的做法。幸运的是，这并不意味着你陷入了困境。我通过一个简单的提示让ChatGPT完成了它的任务：
- en: '[PRE4]'
  id: totrans-439
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: ChatGPT regenerated the code with the complete set of puns (although I did have
    to click the Continue Generating button—check out figure 2.4—once when ChatGPT
    got stuck). That’s a fair amount of data to generate, so it took a couple of minutes
    for the full code to appear.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT使用完整的双关语集重新生成了代码（尽管我确实在ChatGPT卡住时点击了继续生成按钮——参见图2.4——一次）。这是一大批数据，所以完整的代码出现需要几分钟。
- en: '![](../../OEBPS/Images/CH02_F04_McFedries3.png)'
  id: totrans-441
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH02_F04_McFedries3.png)'
- en: Figure 2.4 If ChatGPT gets stuck, you may have to click Continue Generating
    to get it unstuck.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.4 如果ChatGPT卡住了，你可能需要点击继续生成以使其恢复。
- en: Understanding and customizing the code (optional)
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 理解和自定义代码（可选）
- en: 'If you want to understand and/or customize the code generated by ChatGPT (this
    is entirely optional), here are some notes:'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要理解和/或自定义ChatGPT生成的代码（这完全是可选的），以下是一些注意事项：
- en: 'HTML consists of a collection of items called *tags* for specifying page objects
    such as paragraphs, headings, bulleted lists, and links. Most HTML tags are alphabetic
    codes surrounded by angle brackets (`<` and `>`). For example, you designate the
    start of a paragraph with the `<p>` tag and the end of the paragraph with the
    `</p>` tag. As another example, the ChatGPT-generated HTML code from the previous
    section included the following line:'
  id: totrans-445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: HTML由称为*标签*的项目集合组成，用于指定页面对象，如段落、标题、项目符号列表和链接。大多数HTML标签都是围绕尖括号（`<`和`>`）的字母代码。例如，你用`<p>`标签指定段落的开始，用`</p>`标签指定段落的结束。作为另一个例子，上一节中ChatGPT生成的HTML代码包括以下行：
- en: '[PRE5]'
  id: totrans-446
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The `<h1>` and `</h1>` tags mark up a first-level heading (refer to chapter
    3 to learn more about headings), so in this case, the text `Welcome to Pun Generator!`
    appears on the page as such a heading.
  id: totrans-447
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`<h1>` 和 `</h1>` 标签标记了一级标题（参考第 3 章了解更多关于标题的信息），因此在这种情况下，文本“欢迎来到双关语生成器！”以这样的标题形式出现在页面上。'
- en: 'CSS consists of a collection of items called *properties* for specifying the
    styling applied to page objects. For example, the `font-size` property determines
    the size of the text for a specified object, so to set the size to `24px` (24
    pixels), you use the following CSS declaration:'
  id: totrans-448
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CSS 由一组称为 *属性* 的项目组成，用于指定应用于页面对象的样式。例如，`font-size` 属性决定了指定对象的文本大小，因此要设置大小为 `24px`（24
    像素），你使用以下 CSS 声明：
- en: '[PRE6]'
  id: totrans-449
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Note the colon (`:`) after the property name and the semicolon (`;`) at the
    end. CSS declarations are grouped into *rules*, which consist of the object to
    which the declarations are applied and with those declarations surrounded by braces
    (`{` and `}`), as in this example from the ChatGPT-generated code shown earlier:'
  id: totrans-450
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 注意属性名后面的冒号（`:`）和结尾的分号（`;`）。CSS 声明被分组到 *规则* 中，这些规则包括应用声明的对象以及用大括号（`{` 和 `}`）包围的声明，如下面从之前显示的
    ChatGPT 生成的代码中的例子所示：
- en: '[PRE7]'
  id: totrans-451
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'In this example, `#displayPun` is a reference to the following element in the
    HTML code:'
  id: totrans-452
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在这个例子中，`#displayPun` 是对 HTML 代码中以下元素的引用：
- en: '[PRE8]'
  id: totrans-453
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The text between the `<title>` and `</title>` tags is the page title that appears
    in the browser tab. Feel free to edit this text (don’t mess with the tags, though).
  id: totrans-454
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<title>` 和 `</title>` 标签之间的文本是浏览器标签中显示的页面标题。你可以自由编辑这个文本（但不要乱动这些标签）。'
- en: You can change the size of the pun text by modifying the `font-size` value.
    Whatever value you use, just be sure to follow it with `px` (for pixels).
  id: totrans-455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以通过修改 `font-size` 值来更改双关语文本的大小。无论你使用什么值，只需确保后面跟着 `px`（像素）。
- en: The text between the `<h1>` and `</h1>` tags is the main page heading. You can
    edit this text (but don’t touch the tags).
  id: totrans-456
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`<h1>` 和 `</h1>` 标签之间的文本是主页标题。你可以编辑这个文本（但不要触摸这些标签）。'
- en: The button the user clicks is specified by the `<button>` tag. The text that
    appears between that tag and the `</button>` tag is what appears on the button.
    You can edit this text if you feel like it.
  id: totrans-457
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户点击的按钮由 `<button>` 标签指定。该标签和 `</button>` 标签之间的文本就是按钮上显示的文本。如果你愿意，可以编辑这个文本。
- en: ChatGPT stores the page data in a special data object called an *array*. In
    this case, each item in the array is text (specifically, a pun) surrounded by
    double quotation marks (`""`) and followed by a comma. You can edit, add, or delete
    array items as needed; just make sure that when you’re done, each array item is
    surrounded by double quotation marks and followed by a comma. Also, don’t delete
    the square brackets (`[` and `]`) that start and end the array.
  id: totrans-458
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT 将页面数据存储在一个特殊的数据对象中，称为 *数组*。在这种情况下，数组中的每个项目都是文本（具体来说，是一个双关语），由双引号（`""`）包围，后面跟着一个逗号。根据需要，你可以编辑、添加或删除数组项目；只需确保完成时，每个数组项目都由双引号包围，后面跟着一个逗号。另外，不要删除开始和结束数组的方括号（`[`
    和 `]`）。
- en: Before moving on to the next step, I’m going to take a moment to give you a
    few other prompt suggestions for a simple one-page website.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行下一步之前，我将花一点时间给你提供一些针对简单单页网站的其它提示建议。
- en: 2.2.2 Checking out a few other prompts for single-page websites
  id: totrans-460
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.2 检查一些针对单页网站的其它提示
- en: 'If you’re following along and want to create your own single-page website with
    ChatGPT’s help, you can use my prompt from the previous section, or you can use
    your own prompt if you have an idea you’ve always wanted to try. If you’re not
    sure what to do, here are a few suggestions:'
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在跟随并想使用 ChatGPT 的帮助创建自己的单页网站，你可以使用上一节中的我的提示，或者如果你有一个一直想尝试的想法，你可以使用自己的提示。如果你不确定该做什么，这里有一些建议：
- en: Warning ChatGPT has a kind of “memory” for what you prompted and for what it
    generated earlier in the same chat session. Before trying any of the following
    prompts, be sure to start a new chat so that ChatGPT’s results aren’t tainted
    by anything from earlier in the session.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：ChatGPT 对你提出的问题以及在同一聊天会话中之前生成的内容有一种“记忆”。在尝试以下任何提示之前，请确保开始一个新的聊天，以免 ChatGPT
    的结果受到会话早期内容的影响。
- en: '“Create web page code that displays a list of ten *X* things to do in *Y*”
    (where *X* is an adjective, such as *fun* or *interesting*, and *Y* is the name
    of a city or neighborhood). Example:'
  id: totrans-463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “创建显示 *Y*（*X* 事物清单，其中 *X* 是一个形容词，例如 *fun* 或 *interesting*，*Y* 是一个城市或地区的名称）”的网页代码。例如：
- en: '[PRE9]'
  id: totrans-464
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '“Generate the code for a web page that provides a recipe for making *X*” (where
    *X* is a dinner, dessert, or other type of dish that can be cooked from scratch).
    Example:'
  id: totrans-465
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “生成一个网页代码，提供制作 *X* 的食谱”（其中 *X* 是一道晚餐、甜点或其他可以从头开始烹饪的菜肴）。示例：
- en: '[PRE10]'
  id: totrans-466
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '“Provide web page code that lists the steps required to *X*” (where *X* is
    a project, repair job, maintenance chore, or other task). Example:'
  id: totrans-467
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “提供网页代码，列出完成 *X* 所需的步骤”（其中 *X* 是一个项目、维修工作、维护工作或其他任务）。示例：
- en: '[PRE11]'
  id: totrans-468
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '“Create web page code that explains how *X* works” (where *X* is a machine,
    gadget, scientific principle, or, really, just about anything). Example:'
  id: totrans-469
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “创建网页代码，解释 *X* 的工作原理”（其中 *X* 是一台机器、小工具、科学原理，或者实际上几乎可以是任何东西）。示例：
- en: '[PRE12]'
  id: totrans-470
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '“Generate the code for a web page that stores *X* and displays a random *Y*
    when the user clicks a button” (where *X* is some data, and *Y* is the data combined
    in some way). Example:'
  id: totrans-471
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “生成一个网页代码，存储 *X* 并在用户点击按钮时显示随机的 *Y*”（其中 *X* 是一些数据，而 *Y* 是以某种方式组合的数据）。示例：
- en: '[PRE13]'
  id: totrans-472
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE13]'
- en: “Provide web page code that displays *X* in a list and stores a *Y* associated
    with each *X*. When the user chooses *X* from the list, the page displays the
    associated *Y*” (where *X* could be a word, person, or object and *Y* could be
    a poem, biography, or description).
  id: totrans-473
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “提供网页代码，将 *X* 以列表形式显示并存储与每个 *X* 相关的 *Y*。当用户从列表中选择 *X* 时，页面将显示相关的 *Y*”（其中 *X*
    可以是一个单词、人物或物体，而 *Y* 可以是一首诗、传记或描述）。
- en: '[PRE14]'
  id: totrans-474
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Feel free to use the example prompts as is or by customizing them to suit the
    page you want.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以自由地使用示例提示语，或者根据您想要的页面进行自定义。
- en: 2.3 Copying ChatGPT’s web page code
  id: totrans-476
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.3 复制ChatGPT的网页代码
- en: Once ChatGPT has finished generating your code, your next step is to copy the
    code. How you copy the generated code depends on whether you’re using the ChatGPT
    app, Bing Copilot, or the Copilot sidebar in Microsoft Edge. Each interface offers
    a Copy Code feature in the form of an icon or button. For the complete details
    of how to copy code in each interface, see appendix A. If, like me, you’re using
    the ChatGPT app, the code appears in a separate HTML code window that has a Copy
    Code button in the upper-right corner, as shown in figure 2.5.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦ChatGPT生成了您的代码，您的下一步是复制代码。您如何复制生成的代码取决于您是否使用ChatGPT应用程序、Bing Copilot或Microsoft
    Edge中的Copilot侧边栏。每个界面都提供了一种复制代码的功能，形式为一个图标或按钮。有关如何在每个界面中复制代码的完整细节，请参阅附录A。如果您像我一样使用ChatGPT应用程序，代码将出现在一个单独的HTML代码窗口中，该窗口右上角有一个复制代码按钮，如图2.5所示。
- en: '![](../../OEBPS/Images/CH02_F05_McFedries3.png)'
  id: totrans-478
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH02_F05_McFedries3.png)'
- en: Figure 2.5 To copy generated code in the ChatGPT app, click Copy Code in the
    upper-right corner of the code window.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.5 要在ChatGPT应用程序中复制生成的代码，请点击代码窗口右上角的“复制代码”。
- en: The copied code now resides in your computer’s Clipboard, which is a special
    memory area that stores the most recently copied data. To avoid having the copied
    code overwritten in the Clipboard, be sure to move on to the next step before
    doing anything else on your computer (especially copying or cutting any other
    data).
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 复制的代码现在存储在您的计算机剪贴板中，这是一个特殊的内存区域，用于存储最近复制的数据。为了避免在剪贴板中覆盖复制的代码，请确保在您的计算机上执行任何其他操作之前（尤其是复制或剪切其他数据）继续下一步。
- en: 2.3.1 Saving the web page code to an HTML file
  id: totrans-481
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.3.1 将网页代码保存为HTML文件
- en: Now that you’ve copied the ChatGPT-generated web page code, your next order
    of business is to paste the copied code into a text file and then save that document
    as an HTML file. Before getting started, use File Explorer (Windows) or Finder
    (macOS) to create a subfolder to store all your web projects. For example, you
    may want to create a folder named sites or public_html in your user account’s
    Documents folder.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经复制了ChatGPT生成的网页代码，您的下一步是将复制的代码粘贴到文本文件中，然后将该文档保存为HTML文件。在开始之前，使用文件资源管理器（Windows）或Finder（macOS）创建一个子文件夹来存储所有您的网页项目。例如，您可能想在用户账户的文档文件夹中创建一个名为sites或public_html的文件夹。
- en: 'With that done, here are the steps to follow to save the copied ChatGPT code
    to an HTML file:'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 完成这些操作后，以下是保存复制的ChatGPT代码到HTML文件的步骤：
- en: Open your text editor.
  id: totrans-484
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开您的文本编辑器。
- en: Start a new text file. In most text editors, you choose File > New (or, depending
    on the app, you may have to choose a different command, such as New File, New
    Text File, or New Document). You can also usually press either Ctrl-N (in Windows)
    or Cmd-N (macOS).
  id: totrans-485
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开始创建一个新的文本文件。在大多数文本编辑器中，您可以选择文件 > 新建（或者，根据应用程序，您可能需要选择不同的命令，例如新建文件、新建文本文件或新建文档）。您也可以通常按下
    Ctrl-N（在Windows上）或 Cmd-N（macOS）。
- en: Choose Edit > Paste to paste the copied code into the new text file. You can
    also press either Ctrl-V (in Windows) or Cmd-V (macOS).
  id: totrans-486
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择编辑 > 粘贴以将复制的代码粘贴到新的文本文件中。您也可以按Ctrl-V（在Windows上）或Cmd-V（macOS）。
- en: Choose File > Save. You can also press either Ctrl-S (in Windows) or Cmd-S (macOS).
    The app displays the Save As dialog.
  id: totrans-487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择文件 > 保存。您也可以按Ctrl-S（在Windows上）或Cmd-S（macOS）。应用程序显示另存为对话框。
- en: Navigate to the folder you created earlier (the one named sites or public_html
    or whatever) to store your web projects.
  id: totrans-488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到您之前创建的文件夹（命名为sites或public_html或任何名称）以存储您的网页项目。
- en: Click the New Folder button, and then enter a name for the folder. You’re going
    to upload this folder to the web in the next section, so the name you use should
    consist of just lowercase letters, numbers, dashes (-), and/or underscores (_).
    No spaces allowed.
  id: totrans-489
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击新建文件夹按钮，然后输入文件夹名称。您将在下一节中将此文件夹上传到网络，因此您使用的名称应仅包含小写字母、数字、破折号（-）和/或下划线（_）。不允许有空格。
- en: For the filename, type `index.xhtml`.
  id: totrans-490
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于文件名，键入`index.xhtml`。
- en: Click Save. The app saves your HTML file. Figure 2.6 shows my Pun Generator
    code saved as an HTML file.
  id: totrans-491
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击保存。应用程序保存您的HTML文件。图2.6显示了保存为HTML文件的Pun Generator代码。
- en: '![](../../OEBPS/Images/CH02_F06_McFedries3.png)'
  id: totrans-492
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH02_F06_McFedries3.png)'
- en: Figure 2.6 The ChatGPT-generated code saved as an HTML file
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.6 ChatGPT生成的代码已保存为HTML文件
- en: 'Near the top of figure 2.6, note that my text editor displays the path of the
    HTML file:'
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 在图2.6的顶部附近，注意我的文本编辑器显示HTML文件的路径：
- en: '[PRE15]'
  id: totrans-495
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: This path means that in my user account’s Documents folder, I created a subfolder
    named public_html to hold all my websites. Using the previous steps, I first navigated
    to public_html, created the new pun-generator subfolder, and then saved the code
    as index.xhtml in that new folder.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 此路径表示在我的用户账户的文档文件夹中，我创建了一个名为public_html的子文件夹来存放所有我的网站。使用前面的步骤，我首先导航到public_html，创建了新的pun-generator子文件夹，然后在该新文件夹中将代码保存为index.xhtml。
- en: You’re now ready to give your page a test drive in a web browser.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在可以在网页浏览器中测试您的页面。
- en: 2.4 Testing your web page in the browser
  id: totrans-498
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.4 在浏览器中测试您的网页
- en: 'With your web page code saved to a file on your computer, it’s always a good
    idea to give the page a quick check before deploying it. The easiest way to test
    a web page is to open the HTML file in your favorite web browser. Here are the
    steps to follow:'
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 当您的网页代码已保存到计算机上的文件中时，在部署之前快速检查页面总是一个好主意。测试网页的最简单方法是使用您最喜欢的网页浏览器打开HTML文件。以下是您需要遵循的步骤：
- en: 'In your web browser, display the Open dialog:'
  id: totrans-500
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在您的网页浏览器中，显示打开对话框：
- en: 'Windows web browser: Press Ctrl-O.'
  id: totrans-501
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Windows网页浏览器：按Ctrl-O。
- en: 'Mac web browser: Choose File > Open File or press Cmd-O.'
  id: totrans-502
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Mac网页浏览器：选择文件 > 打开文件或按Cmd-O。
- en: In the Open dialog, navigate to the folder where you stored your HTML file in
    the previous section.
  id: totrans-503
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在打开对话框中，导航到上一节中存储您的HTML文件的文件夹。
- en: Select the HTML file.
  id: totrans-504
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择HTML文件。
- en: Click Open.
  id: totrans-505
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击打开。
- en: The web browser opens the HTML file and displays the web page according to the
    HTML tags and CSS properties.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 网页浏览器打开HTML文件并根据HTML标签和CSS属性显示网页。
- en: Opening the web page from your computer is great for taking the page for a test
    spin, but if you want to see your page on the web, you need to deploy it.
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 从计算机打开网页进行测试运行非常方便，但如果您想在网络上看到您的页面，则需要部署它。
- en: 2.5 Deploying your web page
  id: totrans-508
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.5 部署您的网页
- en: 'Deploying your page means uploading the HTML file to your web host. How you
    go about this depends on the host, so check out the host’s support pages for the
    specific procedure. Here are the general steps that you follow on most web hosts:'
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 部署您的页面意味着将HTML文件上传到您的网络主机。具体操作取决于主机，因此请查看主机的支持页面以获取具体步骤。以下是在大多数网络主机上遵循的一般步骤：
- en: 1.  Sign into your web hosting provider.
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 登录您的网络托管提供商。
- en: 2.  Navigate to the page where you upload your web page files.
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 导航到上传您的网页文件的页面。
- en: 3.  Upload the subfolder you created in the previous section, including that
    folder’s `index.xhtml` file.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 上传您在上一节中创建的子文件夹，包括该文件夹的`index.xhtml`文件。
- en: 'For this example, I’m going to deploy my Pun Generator to Cloudflare by following
    these steps (although refer to appendix B for more specific instructions):'
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个例子，我将按照以下步骤将我的Pun Generator部署到Cloudflare（尽管请参考附录B以获取更具体的说明）：
- en: 4.  In the Cloudflare dashboard’s navigation sidebar, under Workers & Pages,
    click Overview.
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在Cloudflare仪表板的导航侧边栏中，在Workers & Pages下点击概览。
- en: 5.  Click the Create Application button, shown in figure 2.7\. (If this is your
    first Cloudflare deployment, you won’t have the Create Application button onscreen.
    In that case, skip this step.)
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 5.  点击图2.7所示的创建应用程序按钮。（如果您是第一次在Cloudflare上部署，屏幕上不会有创建应用程序按钮。在这种情况下，请跳过此步骤。）
- en: '![](../../OEBPS/Images/CH02_F07_McFedries3.png)'
  id: totrans-516
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH02_F07_McFedries3.png)'
- en: Figure 2.7 On the Overview page, click Create Application.
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.7 在概览页面上，点击创建应用程序。
- en: 6.  Click the Pages tab.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 6.  点击页面标签。
- en: 7.  Scroll down to the Create Using Direct Upload section, and then click Upload
    Assets.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 7.  滚动到直接上传创建部分，然后点击上传资源。
- en: 8.  Type a name for your project, and then click Create Project, as shown in
    figure 2.8.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 8.  输入您的项目名称，然后如图2.8所示点击创建项目。
- en: '![](../../OEBPS/Images/CH02_F08_McFedries3.png)'
  id: totrans-521
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH02_F08_McFedries3.png)'
- en: Figure 2.8 Type a project name, and then click Create Project.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.8 输入项目名称，然后点击创建项目。
- en: '9.  Upload your site folder by using one of the following methods:'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 9.  使用以下方法之一上传您的网站文件夹：
- en: a)  Drag your website folder, and drop it in the upload area.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: a)  拖动您的网站文件夹，并将其拖放到上传区域。
- en: b)  Click Select from Computer, and then click Upload Folder. In the dialog
    that appears, navigate to the project folder, and then click Upload.
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: b)  点击从计算机选择，然后点击上传文件夹。在出现的对话框中，导航到项目文件夹，然后点击上传。
- en: 10.  If your web browser asks you to confirm the operation, click Upload.
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 10.  如果您的网络浏览器要求您确认操作，请点击上传。
- en: 11.  Click Deploy Site.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 11.  点击部署网站。
- en: 12.  Click the link to view the deployed site in the web browser. Figure 2.9
    shows my Pun Generator deployed to [https://pun-generator.pages.dev](https://pun-generator.pages.dev).
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 12.  点击链接在网页浏览器中查看已部署的网站。图2.9显示我的Pun Generator已部署到[https://pun-generator.pages.dev](https://pun-generator.pages.dev)。
- en: '![](../../OEBPS/Images/CH02_F09_McFedries3.png)'
  id: totrans-529
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH02_F09_McFedries3.png)'
- en: Figure 2.9 The Pun Generator website deployed to Cloudflare Pages.
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.9 将Pun Generator网站部署到Cloudflare Pages。
- en: 'There you have it: a web page created with ChatGPT’s help and deployed to the
    web in just a few steps. Yes, the page you created was simple, but the rest of
    this book is dedicated to showing you how to get ChatGPT to help you build much
    more sophisticated and useful websites.'
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样：在ChatGPT的帮助下创建的网页，只需几个步骤就部署到了网络上。是的，您创建的页面很简单，但本书的其余部分致力于向您展示如何让ChatGPT帮助您构建更复杂、更有用的网站。
- en: Summary
  id: totrans-532
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The basic process for getting ChatGPT’s help to build a web page is the prompt-copy-save-deploy
    cycle.
  id: totrans-533
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取ChatGPT帮助构建网页的基本过程是提示-复制-保存-部署周期。
- en: When prompting ChatGPT, include a goal, what data you need, the action you want
    the page to perform, and the interface with which the user initiates the action.
  id: totrans-534
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在提示ChatGPT时，包括目标、所需数据、页面要执行的操作以及用户启动操作的用户界面。
- en: If ChatGPT doesn’t give you everything you ask for, run a second prompt to request
    the missing information.
  id: totrans-535
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果ChatGPT没有给您提供您所要求的所有内容，运行第二个提示以请求缺失的信息。
- en: Copy the generated code by clicking the Copy Code icon or button.
  id: totrans-536
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过点击复制代码图标或按钮来复制生成的代码。
- en: Use your operating system’s file management app to create a folder in which
    you’ll store all your web projects.
  id: totrans-537
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用您的操作系统文件管理应用程序创建一个文件夹，您将在其中存储所有您的网络项目。
- en: In your text editor, paste the copied code into a new text file, and then save
    that file as index.xhtml in a new subfolder created for the project.
  id: totrans-538
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在您的文本编辑器中，将复制的代码粘贴到新的文本文件中，然后以index.xhtml的名称保存该文件，并将其保存在为项目创建的新子文件夹中。
- en: Deploy the website by uploading the project data to your web hosting provider.
  id: totrans-539
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过将项目数据上传到您的网络托管提供商来部署网站。
- en: 3 Working with fonts, colors, and headings
  id: totrans-540
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3 使用字体、颜色和标题
- en: This chapter covers
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 本章节涵盖
- en: Understanding the role of fonts in web page design
  id: totrans-542
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解字体在网页设计中的作用
- en: Creating a color scheme for your page
  id: totrans-543
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为您的页面创建颜色方案
- en: Making a page easier to read with headings
  id: totrans-544
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用标题使页面更容易阅读
- en: Prompting ChatGPT to build a personal home page
  id: totrans-545
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示ChatGPT构建个人主页
- en: Examining and customizing the ChatGPT code
  id: totrans-546
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查和自定义ChatGPT代码
- en: In chapter 2, I took you through the process of creating a functioning web page
    from scratch using a relatively simple ChatGPT prompt. The resulting page worked
    well, but it wasn’t much to look at. That plain page was fine because I wanted
    to keep things simple, but if you’re going to build some kind of presence on the
    web, you’ll definitely want the resulting page to look good.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 在第二章中，我带你从头开始使用相对简单的ChatGPT提示创建了一个功能性的网页。生成的页面运行良好，但外观并不吸引人。那个朴素的页面对我来说是合适的，因为我想要保持简单，但如果你打算在网络上建立某种存在，你肯定希望生成的页面看起来很棒。
- en: In this chapter, you take the first step in that direction by examining several
    page formatting options that can go a long way toward making any web page more
    attractive and more readable. These options include typefaces, type sizes, colors,
    and headings. Here, you’ll learn why these are important and how you can get ChatGPT
    to help you make these design choices for your page. All this information then
    goes into a detailed prompt that you’ll pass along to ChatGPT to produce the web
    page code for a personal home page that gives you a slice of the web that you
    can call your own. If you’re curious, this chapter also explains the code generated
    by ChatGPT and shows you a few ways to customize the code without having to prompt
    ChatGPT all over again.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将通过检查几个可以大大提高任何网页吸引力和可读性的页面格式选项，迈出第一步。这些选项包括字体、字体大小、颜色和标题。在这里，你将了解为什么这些很重要，以及如何让ChatGPT帮助你为你的页面做出这些设计选择。所有这些信息都将被整合到一个详细的提示中，然后你将把这个提示传递给ChatGPT，以生成个人主页的网页代码，让你拥有一片可以称为自己的网络空间。如果你好奇，本章还解释了ChatGPT生成的代码，并展示了几个无需再次提示ChatGPT即可自定义代码的方法。
- en: 3.1 Taking a peek at this chapter’s project
  id: totrans-549
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.1 环顾本章的项目
- en: 'The project you’re going to ask ChatGPT to help you with in this chapter is
    a simple personal home page that consists of some or all of the following components:'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将请求ChatGPT帮助你完成的项目是一个简单的个人主页，它可能包含以下部分之一或全部：
- en: A title (which could be just your name)
  id: totrans-551
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标题（可能是你的名字）
- en: A subtitle (a tagline that sums up the page—or you—for readers)
  id: totrans-552
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 副标题（一个总结页面或你自己的标语，供读者参考）
- en: A brief biography
  id: totrans-553
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简短的传记
- en: A brief description of what you do for a living
  id: totrans-554
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简短的职业描述
- en: A list of your hobbies and interests
  id: totrans-555
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你爱好和兴趣的列表
- en: A list of your favorite books, movies, TV shows, bands, and so on
  id: totrans-556
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你最喜欢的书籍、电影、电视剧、乐队等的列表
- en: Figure 3.1 shows an example of the type of page you’ll be creating with the
    help of ChatGPT.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.1展示了你将在ChatGPT的帮助下创建的页面类型示例。
- en: '![](../../OEBPS/Images/CH03_F01_McFedries3.png)'
  id: totrans-558
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH03_F01_McFedries3.png)'
- en: Figure 3.1 A personal home page generated by ChatGPT
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.1 ChatGPT生成的个人主页
- en: It’s your page, of course, so feel free to add anything else that you want the
    world to know about you. You can also modify this page slightly to turn it into
    an online résumé or curriculum vitae.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这是你的页面，所以请随意添加任何你希望世人了解的信息。你也可以稍微修改这个页面，将其变成一个在线简历或履历。
- en: Before getting to the specifics of prompting ChatGPT to generate the code for
    your personal home page, you can use the model to generate some design suggestions,
    including the site title and subtitle, typefaces, and color scheme. You’ll use
    these suggestions later when building your prompt.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 在具体提示ChatGPT生成个人主页代码之前，你可以使用该模型生成一些设计建议，包括网站标题和副标题、字体和配色方案。你将在构建提示时使用这些建议。
- en: 3.2 Building the personal home page
  id: totrans-562
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.2 构建个人主页
- en: To help you use ChatGPT to build your personal home page, the next few sections
    take you through each component of the page, from the title to the type to the
    colors. In each case, I give you some background, show you the relevant HTML and/or
    CSS, if any, and then show you how to ask ChatGPT to generate what you need.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助你使用ChatGPT构建个人主页，接下来的几节将带你了解页面的每个组成部分，从标题到类型再到颜色。在每种情况下，我都会给你一些背景信息，展示相关的HTML和/或CSS（如果有），然后展示如何请求ChatGPT生成你需要的内容。
- en: 3.2.1 Getting site title and subtitle suggestions
  id: totrans-564
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.1 获取网站标题和副标题建议
- en: The most obvious title for your personal home page is your name. If that’s not
    creative enough for you, put ChatGPT to work to suggest not only a site title
    but also a subtitle or tagline to appear below the title.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 你个人主页最明显的标题就是你的名字。如果你觉得不够有创意，可以让ChatGPT帮忙提出不仅是一个网站标题，还可以是一个副标题或标语，出现在标题下方。
- en: 'One useful way to prompt ChatGPT for a title and subtitle is to combine what
    you do for a living with one or more hobbies or interests and see what ChatGPT
    can come up with. Here’s a generic prompt you can use:'
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 ChatGPT 生成标题和副标题的一个有用方法是结合你从事的工作以及一个或多个爱好或兴趣，看看 ChatGPT 能提出什么建议。以下是一个你可以使用的通用提示：
- en: '[PRE16]'
  id: totrans-567
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: In this prompt, replace *`X`* with your job title or description and replace
    *`Y`* with one or more interests or hobbies. Figure 3.2 shows my results (generated
    using Bing Copilot in Creative mode). If you find a title and subtitle you like
    (they don’t have to come from the same suggestion), copy them somewhere so you
    can use them later when you prompt ChatGPT to create the code for your homepage.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个提示中，将 *`X`* 替换为你的工作标题或描述，将 *`Y`* 替换为一个或多个兴趣或爱好。图 3.2 展示了我的结果（使用创意模式中的 Bing
    Copilot 生成的）。如果你找到一个你喜欢的标题和副标题（它们不必来自同一个建议），请将它们复制到某个地方，以便你可以在提示 ChatGPT 创建主页代码时使用它们。
- en: '![](../../OEBPS/Images/CH03_F02_McFedries3.png)'
  id: totrans-569
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH03_F02_McFedries3.png)'
- en: Figure 3.2 Prompting ChatGPT for a page title and tagline
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3.2 提示 ChatGPT 生成页面标题和标语
- en: 'The web page font is the styling of the page text. This is a huge topic, but
    for our purposes here, you can consider just three components: the typeface, the
    type size, and the type style.'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 网页字体是页面文本的样式。这是一个很大的话题，但就我们在这里的目的而言，你可以考虑三个组成部分：字体、字体大小和字体样式。
- en: 3.2.2 Styling the typeface
  id: totrans-572
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.2 字体样式
- en: The *typeface* is a distinctive design that’s common to any related set of letters,
    numbers, and symbols. Wait a minute, I hear you say, isn’t that a *font*? What’s
    the difference? For all practical purposes, the two terms are interchangeable.
    Technically, though, a font is a particular implementation of a typeface, meaning
    the typeface is rendered with a specific size and style. Arial is a typeface;
    Arial 16-point bold is a font.
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: '*字体* 是任何相关字母、数字和符号集合中常见的独特设计。等一下，我听到你说，那不是 *字体* 吗？两者有什么区别？从实用角度来看，这两个术语是可以互换的。然而，从技术上讲，字体是字体的特定实现，这意味着字体是以特定的尺寸和样式渲染的。Arial
    是一种字体；Arial 16 点粗体是一种字体。'
- en: 'Here are the five typeface categories you’ll come across most often:'
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 你最常遇到的五种字体类别如下：
- en: '| *Serif* —A *serif* (rhymes with *sheriff*) typeface contains fine cross strokes
    (called *feet*) at the extremities of each character. These subtle appendages
    give the typeface a traditional, classy look, but they can get lost when displayed
    on a screen at small sizes. |'
  id: totrans-575
  prefs: []
  type: TYPE_TB
  zh: '| *衬线* —*衬线*（与 *sheriff* 发音相似）字体在每个字符的末端包含细小的交叉笔画（称为 *feet*）。这些细微的附加物赋予了字体一种传统、优雅的外观，但在小尺寸的屏幕上显示时可能会丢失。|'
- en: '![](../../OEBPS/Images/CH03_UN01_McFedries3.png)'
  id: totrans-576
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH03_UN01_McFedries3.png)'
- en: '|'
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| *Sans serif* —A *sans-serif* typeface doesn’t contain cross strokes on the
    extremities of characters. These typefaces usually have a clean, modern look that’s
    well suited to screen text, particularly at small sizes. |'
  id: totrans-578
  prefs: []
  type: TYPE_TB
  zh: '| *无衬线* —*无衬线* 字体在字符的末端不包含交叉笔画。这些字体通常具有干净、现代的外观，非常适合屏幕文本，尤其是在小尺寸时。|'
- en: '![](../../OEBPS/Images/CH03_UN02_McFedries3.png)'
  id: totrans-579
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH03_UN02_McFedries3.png)'
- en: '|'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| *Monospace* —A *monospace* typeface (also called a *fixed-width* typeface)
    uses the same amount of space for each character, so skinny letters such as *i*
    and *l* take up as much space as wider letters such as *m* and *w*. |'
  id: totrans-581
  prefs: []
  type: TYPE_TB
  zh: '| *等宽* —*等宽* 字体（也称为 *fixed-width* 字体）为每个字符使用相同的空间，因此像 *i* 和 *l* 这样细长的字母占用与像
    *m* 和 *w* 这样较宽的字母一样多的空间。|'
- en: '![](../../OEBPS/Images/CH03_UN03_McFedries3.png)'
  id: totrans-582
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH03_UN03_McFedries3.png)'
- en: '|'
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| *Cursive* —The *cursive* typefaces are designed to resemble handwritten pen
    or brush writing. |'
  id: totrans-584
  prefs: []
  type: TYPE_TB
  zh: '| *手写* —*手写* 字体设计用来模仿手写笔或刷子的书写。|'
- en: '![](../../OEBPS/Images/CH03_UN04_McFedries3.png)'
  id: totrans-585
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH03_UN04_McFedries3.png)'
- en: '|'
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: '| *Fantasy* —*Fantasy* typefaces usually are fanciful designs that have some
    extreme elements (such as being extra-thick). |'
  id: totrans-587
  prefs: []
  type: TYPE_TB
  zh: '| *幻想* —*幻想* 字体通常具有一些极端元素（例如非常厚）的奇异设计。|'
- en: '![](../../OEBPS/Images/CH03_UN05_McFedries3.png)'
  id: totrans-588
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH03_UN05_McFedries3.png)'
- en: '|'
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: 'In CSS code, the typeface is specified using the `font-family` property:'
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 在 CSS 代码中，字体是通过 `font-family` 属性指定的：
- en: '[PRE17]'
  id: totrans-591
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'You replace the *`typeface`* placeholder with the name of the typeface. (If
    the typeface name includes one or more spaces, you need to surround the name with
    quotation marks.) For example, each of the previous typeface categories has its
    own CSS keyword, so the following are all legitimate CSS declarations:'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 您将*`typeface`*占位符替换为字体名称。（如果字体名称包含一个或多个空格，您需要将名称用引号括起来。）例如，每个之前的字体类别都有自己的CSS关键字，所以以下都是合法的CSS声明：
- en: '[PRE18]'
  id: totrans-593
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'These five keywords—`serif`, `sans-serif`, `monospace`, `cursive`, and `fantasy`—represent
    the so-called *generic* typefaces, which are available in every web browser. If
    you want to use one of these generic typefaces for a component of your web page,
    you can include the appropriate typeface keyword as part of your instruction to
    ChatGPT:'
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 这五个关键字—`serif`、`sans-serif`、`monospace`、`cursive`和`fantasy`—代表了所谓的*通用*字体，这些字体在所有网络浏览器中都是可用的。如果您想在网页的某个组件中使用这些通用字体之一，您可以将适当的字体关键字作为您对ChatGPT的指令的一部分：
- en: '[PRE19]'
  id: totrans-595
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Note, too, that it’s also possible to specify multiple typefaces in a single
    declaration, and the web browser uses the first typeface (reading left to right)
    that’s installed on the user’s device. This is important to remember because ChatGPT
    will almost always specify multiple typefaces in its generated CSS. Here’s an
    example from the web page code we examine later in this chapter:'
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 还要注意，在单个声明中指定多个字体也是可能的，并且网络浏览器将使用用户设备上安装的第一个字体（从左到右阅读）。这一点很重要，因为ChatGPT几乎总是会在其生成的CSS中指定多个字体。以下是我们将在本章后面部分检查的网页代码的示例：
- en: '[PRE20]'
  id: totrans-597
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: This declaration means the web browser will first try to load the Roboto Serif
    typeface. If it can’t, for some reason, it will fall back to using the generic
    `serif` typeface instead.
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 这个声明意味着网络浏览器将首先尝试加载Roboto Serif字体。如果由于某种原因无法加载，它将回退到使用通用的`serif`字体。
- en: The next major type component you’ll work with is the type size.
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 您接下来将要处理的主要字体组件是字体大小。
- en: 3.2.3 Setting the type size
  id: totrans-600
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.3 设置字体大小
- en: The *type size* is the relative size of each character. Type sizes are usually
    measured in pixels (shortened to px), and the default text size of regular page
    text is 16 pixels (written `16px` in web page code).
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: '*字体大小*是每个字符的相对大小。字体大小通常以像素（缩写为px）为单位测量，常规页面文本的默认文本大小是16像素（在网页代码中写作`16px`）。'
- en: 'In CSS code, the type size is specified using the `font-size` property:'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 在CSS代码中，字体大小是通过`font-size`属性指定的：
- en: '[PRE21]'
  id: totrans-603
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Here, replace *`size`* with the type size you want. For example, many people
    find the default text size of 16 px a bit too small for comfortable reading, so
    it’s common to specify a larger type size, such as 20 px:'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，将*`size`*替换为您想要的字体大小。例如，许多人发现默认的文本大小16 px对于舒适的阅读来说有点小，因此通常指定更大的字体大小，如20 px：
- en: '[PRE22]'
  id: totrans-605
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Figure 3.3 demonstrates a few common type sizes.
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.3展示了几个常见的字体大小。
- en: '![](../../OEBPS/Images/CH03_F03_McFedries3.png)'
  id: totrans-607
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH03_F03_McFedries3.png)'
- en: Figure 3.3 Some common type sizes
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.3 一些常见的字体大小
- en: 'Here’s an example instruction to ChatGPT to specify a type size for a page
    component:'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个向ChatGPT指定页面组件字体大小的示例指令：
- en: '[PRE23]'
  id: totrans-610
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 3.2.4 Working with type styles
  id: totrans-611
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.4 与字体样式一起工作
- en: The *type style* is special styling applied to one or more characters or words.
    The two most common styles are bold and *italics*.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: '*字体样式*是应用于一个或多个字符或单词的特殊样式。最常见的两种样式是粗体和*斜体*。'
- en: 'For bold text, CSS uses the `font-weight` property set to the `bold` keyword:'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 对于粗体文本，CSS使用`font-weight`属性设置为`bold`关键字：
- en: '[PRE24]'
  id: totrans-614
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'Here’s an example instruction to ChatGPT to make a page component bold:'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个向ChatGPT指定使页面组件加粗的示例指令：
- en: '[PRE25]'
  id: totrans-616
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'For italic, CSS uses the `font-style` property set to the `italic` keyword:'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 对于斜体，CSS使用`font-style`属性设置为`italic`关键字：
- en: '[PRE26]'
  id: totrans-618
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'Here’s an example instruction to ChatGPT to style a page component with italics:'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个向ChatGPT指定使用斜体样式页面组件的示例指令：
- en: '[PRE27]'
  id: totrans-620
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Note You can also mark up keywords, titles, and other special text with bold
    or italics using HTML tags. You learn how these tags work in chapter 12.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：您还可以使用HTML标签标记关键词、标题和其他特殊文本，用粗体或斜体表示。您将在第12章学习这些标签是如何工作的。
- en: 'With just these three aspects of web typography—the typeface, the type size,
    and the type style—you can go a long way toward making your pages look great.
    When you’re prompting ChatGPT, you can include separate instructions for the type
    to apply to a component, as just shown, or you can put everything in a single
    instruction, as in this example:'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 只需这三个方面的网络排版——字体、字体大小和字体样式——您就可以在很大程度上使您的页面看起来很棒。当您提示ChatGPT时，您可以像刚才展示的那样为字体应用单独的指令，或者您可以将所有内容放在一个单独的指令中，如下例所示：
- en: '[PRE28]'
  id: totrans-623
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: If you’re not sure what typeface to use in your project, ChatGPT can help, as
    I show in the next section.
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在你的项目中不确定使用哪种字体，ChatGPT可以帮助你，就像我在下一节中展示的那样。
- en: 3.2.5 Getting typeface suggestions from ChatGPT
  id: totrans-625
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.5 从ChatGPT获取字体建议
- en: The generic typefaces that I mentioned earlier are fine, but did you know there
    are hundreds of typefaces available? That’s good news because it means your web
    projects can stand out from the crowd by using interesting typefaces, particularly
    by using different typefaces for the regular page text and the headings. However,
    you can’t just choose two random typefaces. Because each typeface has a particular
    style, it’s easy to choose two typefaces that are mismatched in some way, just
    as it’s easy to choose mismatched colors. But how can you not only choose a couple
    of typefaces but also make sure those typefaces go well together?
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 我之前提到的通用字体是不错的，但你是否知道有数百种字体可供选择？这是个好消息，因为这意味着你的网页项目可以通过使用有趣的字体脱颖而出，尤其是通过为常规页面文本和标题使用不同的字体。然而，你不能只是随机选择两种字体。因为每种字体都有特定的风格，很容易选择两种在某些方面不匹配的字体，就像选择不匹配的颜色一样。但你怎么才能不仅选择几款字体，还能确保这些字体搭配得当呢？
- en: 'ChatGPT is here to help. In particular, you can ask ChatGPT to generate suggestions
    from Google Fonts ([https://fonts.google.com](https://fonts.google.com)), which
    is an online repository of more than 1,500 free typefaces. Here’s a generic prompt
    you can use to have ChatGPT suggest a couple of compatible typefaces (one for
    headings and one for text):'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT就在这里帮助你。特别是，你可以要求ChatGPT从Google Fonts（[https://fonts.google.com](https://fonts.google.com)）生成建议，这是一个包含1500多种免费字体的在线仓库。以下是一个通用的提示，你可以用它让ChatGPT建议几对兼容的字体（一个用于标题，一个用于正文）：
- en: '[PRE29]'
  id: totrans-628
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Replace *`X`* with a word or phrase related to your personal home page, and
    replace *`Y`* and *`Z`* with either `serif` or `sans serif`. Unfortunately, ChatGPT
    often suggests the Roboto and Open Sans typefaces. These are excellent and beautiful
    fonts, for sure, but if you want something more interesting, be sure to exclude
    those common fonts in your prompt, as I did.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 将*`X`*替换为你个人主页相关的一个词或短语，将*`Y`*和*`Z`*替换为`serif`或`sans serif`。不幸的是，ChatGPT经常建议Roboto和Open
    Sans字体。这些字体无疑是优秀且美丽的，但如果你想要更有趣的字体，确保在你的提示中排除这些常见的字体，就像我那样做。
- en: In figure 3.4, you can see that ChatGPT suggested the Josefin Sans and Roboto
    Serif typefaces for my page (generated using Bing Copilot in Creative mode). These
    are great typefaces that should work well together.
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 在图3.4中，你可以看到ChatGPT为我推荐的字体是Josefin Sans和Roboto Serif（使用Bing Copilot在创意模式下生成）。这些是非常好的字体，应该可以很好地搭配在一起。
- en: '![](../../OEBPS/Images/CH03_F04_McFedries3.png)'
  id: totrans-631
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH03_F04_McFedries3.png)'
- en: Figure 3.4 ChatGPT’s typeface suggestions
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.4 ChatGPT的字体建议
- en: 'If you’re using Bing Copilot, the response may include some examples of the
    suggested typefaces. If not, follow the links to Google Fonts to examine the suggested
    typefaces to be sure you like what you see. If the suggested typefaces don’t work
    for your design, ask ChatGPT to try again:'
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用的是Bing Copilot，响应可能包括一些推荐的字体示例。如果没有，请点击链接到Google Fonts（[https://fonts.google.com](https://fonts.google.com)）来检查推荐的字体，以确保你喜欢你所看到的。如果推荐的字体不适合你的设计，请让ChatGPT再次尝试：
- en: '[PRE30]'
  id: totrans-634
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Once you’ve got two typefaces you like, you don’t need to do anything more than
    just write down or remember their names. You’ll include the typeface names when
    you prompt ChatGPT to build your web page code.
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你找到了你喜欢的两种字体，你不需要做任何事情，只需写下或记住它们的名称。当你提示ChatGPT构建你的网页代码时，你会包括字体名称。
- en: 3.2.6 Generating a color scheme
  id: totrans-636
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.6 生成配色方案
- en: By default, web pages use black text on a white background. That color combination
    makes the text easy to read, but it’s not going to win any design awards. You
    don’t need to go crazy with color, but thinking outside the black-text-on-white
    box is an easy way to give your readers a bit of eye candy.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，网页使用黑色文字和白色背景。这种颜色组合使文字易于阅读，但不会赢得任何设计奖项。你不需要对颜色做出疯狂的选择，但跳出黑色文字在白色背景上的思维定式，是给读者一点视觉享受的简单方法。
- en: There are many ways to specify color on the web, but the easiest is to use one
    of the web’s 140 predefined color names (or keywords). They run from `aliceblue`
    to `yellow` and include not only standard colors such as `red`, `green`, and `blue`
    but also decidedly nonstandard hues such as `lemonchiffon`, `darkorchid`, and
    `wheat`.
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 在网络上指定颜色有许多方法，但最简单的是使用网络上的140个预定义颜色名称（或关键字）。它们从`aliceblue`到`yellow`不等，不仅包括标准颜色如`red`、`green`和`blue`，还包括一些非常不标准的色调，如`lemonchiffon`、`darkorchid`和`wheat`。
- en: I’ve put the complete list of color keywords on my Web Design Playground site
    at [wdpg.io/2/colorkeywords](https://webdesignplayground.io/2/tools/css-color-keywords/).
    Figure 3.5 shows a partial list.
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经将颜色关键词的完整列表放在我的Web设计游乐场网站上[wdpg.io/2/colorkeywords](https://webdesignplayground.io/2/tools/css-color-keywords/)。图3.5显示了一个部分列表。
- en: '![](../../OEBPS/Images/CH03_F05_McFedries3.png)'
  id: totrans-640
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH03_F05_McFedries3.png)'
- en: Figure 3.5 To see a complete list of the CSS color keywords on the Web Design
    Playground, surf to [wdpg.io/2/colorkeywords](https://webdesignplayground.io/2/tools/css-color-keywords/).
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.5 要查看Web设计游乐场上的CSS颜色关键词的完整列表，请访问[wdpg.io/2/colorkeywords](https://webdesignplayground.io/2/tools/css-color-keywords/)。
- en: In the list shown in figure 3.5, you need only bother with the Color column
    and the Keyword column. You can safely ignore the weirdness in the RGB Value column.
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 在图3.5所示的列表中，你只需要关注颜色列和关键词列。你可以安全地忽略RGB值列中的奇怪之处。
- en: 'CSS defines two color-related properties. The first property is `color`, which
    you use to apply a color to some text, and the second is `background-color` (sometimes
    shortened to just `background`), which you use to apply a color to an element’s
    background:'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: CSS定义了两个与颜色相关的属性。第一个属性是`color`，你用它来为某些文本应用颜色，第二个是`background-color`（有时简称为`background`），你用它来为元素背景应用颜色：
- en: '[PRE31]'
  id: totrans-644
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'You replace *`keyword1`* and *`keyword2`* with a color keyword, such as `darkblue`
    and `lavender`:'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 你将*`keyword1`*和*`keyword2`*替换为一个颜色关键词，例如`darkblue`和`lavender`：
- en: '[PRE32]'
  id: totrans-646
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Warning When you’re choosing colors for your web pages, you need to ensure that
    your text remains readable by selecting text and background colors that have sufficient
    contrast. Dark text on a light background or light text on a dark background is
    what you want to aim for.
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 警告：当你为你的网页选择颜色时，你需要确保通过选择具有足够对比度的文本和背景颜色来确保文本的可读性。深色文本在浅色背景上或浅色文本在深色背景上是你想要追求的效果。
- en: 'Your home page doesn’t require a complex color scheme, but you may want to
    eschew black-text-on-white for something more interesting. Here’s a prompt you
    can use to get ChatGPT to help you generate a color scheme for your home page:'
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 你的主页不需要复杂的颜色方案，但你可能想要避免使用黑白搭配，寻找更有趣的方案。以下是一个你可以使用的提示，让ChatGPT帮助你为你的主页生成颜色方案：
- en: '[PRE33]'
  id: totrans-649
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Replace *`X`* with a word or phrase related to your personal home page, and
    replace *`Y`* with the keyword for the color you want to use as the main hue on
    your site. I prompted ChatGPT for a color scheme with `dodgerblue` as the main
    hue, and figure 3.6 shows the result (generated using Bing Copilot in Creative
    mode).
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 将*`X`*替换为你个人主页相关的一个词或短语，将*`Y`*替换为你想要用作网站主色调的颜色关键词。我向ChatGPT请求了一个以`dodgerblue`为主色调的颜色方案，图3.6显示了结果（使用Bing
    Copilot在创意模式下生成）。
- en: '![](../../OEBPS/Images/CH03_F06_McFedries3.png)'
  id: totrans-651
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH03_F06_McFedries3.png)'
- en: Figure 3.6 ChatGPT’s color scheme suggestions
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.6 ChatGPT的颜色方案建议
- en: Note that the prompt asks ChatGPT to suggest colors using standard CSS color
    keywords. You’ll use these keywords as part of your prompt when you ask ChatGPT
    to generate your web page code.
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，提示要求ChatGPT使用标准的CSS颜色关键词来建议颜色。当你要求ChatGPT生成你的网页代码时，你将使用这些关键词作为提示的一部分。
- en: You’re almost ready to build the home page prompt for ChatGPT. Your last bit
    of preparation is understanding how web page headings work, which is the topic
    of the next section.
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 你几乎准备好为ChatGPT构建主页提示了。你最后的准备工作是理解网页标题的工作方式，这是下一节的主题。
- en: 3.2.7 Understanding web page headings
  id: totrans-655
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.7 理解网页标题
- en: 'A web page *heading* is a bolded word or phrase that’s set off vertically from
    the rest of the text and serves as a title for the page or a section of the page.
    For most web pages, only three types of headings are used:'
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 网页*标题*是一个加粗的词或短语，它垂直地从其余文本中突出出来，并作为页面或页面部分的标题。对于大多数网页，只使用三种类型的标题：
- en: A single main heading, which is the page title
  id: totrans-657
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个单独的主要标题，它是页面标题
- en: One or more second-level headings, which act as the titles for each major article
    or section of the page
  id: totrans-658
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有一个或多个二级标题，它们作为每篇主要文章或页面部分的标题
- en: Within each second-level heading, one or more third-level headings, which act
    as the subsection titles
  id: totrans-659
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在每个二级标题中，有一个或多个三级标题，它们作为子标题
- en: 'Fortunately, you don’t usually have to get too specific about all this because
    ChatGPT will almost always figure out the heading hierarchy for you automatically.
    However, you may want to control the font size of your headings to get the look
    you want. To give you an idea of what you’re dealing with, here are some notes
    about font sizes for the first three heading levels:'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，你通常不需要对此过于具体，因为ChatGPT几乎总是会自动为你确定标题层次结构。然而，你可能想要控制标题的字体大小以获得你想要的外观。为了给你一个你正在处理的内容的概念，以下是一些关于前三级标题字体大小的说明：
- en: '*First-level headings*—The default font size is 32 px. Depending on the title,
    its length, and the effect you want to achieve, first-level headings (designated
    in HTML using the `<h1>` tag) can be much larger, such as 48 px, 72 px, or even
    bigger.'
  id: totrans-661
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*一级标题*——默认字体大小为32 px。根据标题、长度和想要达到的效果，一级标题（在HTML中使用`<h1>`标签指定）可以更大，例如48 px、72 px，甚至更大。'
- en: '*Second-level headings*—The default font size is 24 px. However, it’s not uncommon
    for second-level headings (designated in HTML using the `<h2>` tag) to be a bit
    larger, such as 28 px or 32 px.'
  id: totrans-662
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*二级标题*——默认字体大小为24 px。然而，二级标题（在HTML中使用`<h2>`标签指定）略大一些，例如28 px或32 px并不罕见。'
- en: '*Third-level headings*—The default font size is about 18.2 px. Since this default
    size is only a bit bigger than regular page text (16 px), you may prefer to style
    your third-level headings (which are designated in HTML using the `<h3>` tag)
    to be larger, such as 20 px or 24 px.'
  id: totrans-663
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*三级标题*——默认字体大小约为18.2 px。由于这个默认大小仅比正常页面文本（16 px）大一点，你可能更喜欢将三级标题（在HTML中使用`<h3>`标签指定）设置为更大，例如20 px或24 px。'
- en: Again, you don’t have to get too deep into the web code weeds here. For most
    web page prompts, you’ll only need to tell ChatGPT what type size you want for
    each heading, assuming the default heading sizes don’t fit your page design.
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，你不需要深入到网页代码的细节中。对于大多数网页提示，你只需要告诉ChatGPT每个标题你想要的字体大小即可，假设默认标题大小不适合你的页面设计。
- en: 3.2.8 Crafting the prompt
  id: totrans-665
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.8 编写提示
- en: 'You now have everything you need to prompt ChatGPT to provide you with the
    web code for your home page. Your prompt should begin as follows:'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你已经拥有了所有你需要提示ChatGPT为你提供主页网页代码的东西。你的提示应该开始如下：
- en: '[PRE34]'
  id: totrans-667
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'You then specify the content of your page, including the following (refer to
    figure 3.7):'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你指定页面内容，包括以下内容（参考图3.7）：
- en: A header (refer to chapter 4) that includes your page title and subtitle.
  id: totrans-669
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含你的页面标题和副标题的标题（参考第4章）。
- en: A main section that starts with an introductory paragraph (which may be something
    like a welcome message to the reader).
  id: totrans-670
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个以引言段落开头的主要部分（可能像是对读者的欢迎信息）。
- en: One or more second-level headings followed by some text. For example, the heading
    “Movies I Like” could be followed by a list of your favorite films. For each item,
    you don’t need to provide the complete text; just a few words or the first sentence
    is fine. You can complete the text later after ChatGPT has generated the code.
  id: totrans-671
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一级或多个二级标题后跟一些文本。例如，标题“我喜欢看的电影”可以后面跟着你最喜欢的电影列表。对于每个条目，你不需要提供完整的文本；几个词或第一句话就足够了。你可以在ChatGPT生成代码后稍后再完成文本。
- en: '![](../../OEBPS/Images/CH03_F07_Mcfedries3.png)'
  id: totrans-672
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH03_F07_Mcfedries3.png)'
- en: Figure 3.7 The sections of the personal home page
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.7 个人主页的各个部分
- en: 'Next, you ask ChatGPT to generate the CSS for how you want your page formatted:'
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你要求ChatGPT为你生成你想要页面格式的CSS：
- en: '[PRE35]'
  id: totrans-675
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: 'You then specify the formatting, including the following:'
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你指定格式，包括以下内容：
- en: The header background color (this should be the primary color from your color
    scheme).
  id: totrans-677
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标题背景颜色（这应该是你的配色方案中的主色）。
- en: The type size and color you want to use for the page title and subtitle (the
    color should be the secondary color from your color scheme).
  id: totrans-678
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想要用于页面标题和副标题的字体大小和颜色（颜色应该是配色方案中的辅助色）。
- en: The type size and color of the second-level headings (the color should be the
    primary color from your color scheme).
  id: totrans-679
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 二级标题的字体大小和颜色（颜色应该是配色方案中的主色）。
- en: The type size of the regular page text.
  id: totrans-680
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正常页面文本的字体大小。
- en: The fonts to use for the headings and regular page text.
  id: totrans-681
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于标题和正常页面文本的字体。
- en: A maximum width for the page. This prevents the lines of text from getting too
    long. A maximum length of 800 px is fine for most pages.
  id: totrans-682
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面的最大宽度。这可以防止文本行过长。对于大多数页面，800 px的最大长度是合适的。
- en: 'Here’s an example prompt for my home page:'
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 这是为我主页的示例提示：
- en: '[PRE36]'
  id: totrans-684
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Note I included the instruction to center the page because a page that doesn’t
    take up the entire browser window (as this page won’t in any window that’s wider
    than 800 px) usually looks better when it’s centered within the window.
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我包括了居中页面的说明，因为不占用整个浏览器窗口的页面（如本页面在任何宽度超过800 px的窗口中都不会这样做）通常在窗口内居中时看起来更好。
- en: 'ChatGPT should create the HTML code first, which you can copy and then paste
    and save to a file named index.xhtml. In that code, you should see a line near
    the top similar to the following:'
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT应首先创建HTML代码，您可以复制并粘贴到名为index.xhtml的文件中。在这段代码中，您应该看到顶部附近类似以下的一行：
- en: '[PRE37]'
  id: totrans-687
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: This code tells the web browser to look for the CSS code in a file named styles.css,
    so your next task is to copy the generated CSS code and then paste it and save
    it to a file named styles.css (or whatever name you see in the `<link>` tag).
    Be sure to save styles.css in the same folder as your index.xhtml file. Refer
    to appendix A to learn more about working HTML and CSS files. I submitted this
    prompt to Bing Copilot in Precise mode, and the code it generated resulted in
    the page shown in figure 3.8.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码指示网页浏览器在名为styles.css的文件中查找CSS代码，因此您的下一个任务是复制生成的CSS代码，然后将其粘贴并保存到名为styles.css的文件中（或您在`<link>`标签中看到的任何名称）。务必将styles.css保存到与您的index.xhtml文件相同的文件夹中。参考附录A了解有关处理HTML和CSS文件的相关信息。我将此提示提交给Bing
    Copilot的精确模式，它生成的代码产生了图3.8所示的页面。
- en: '![](../../OEBPS/Images/CH03_F08_McFedries3.png)'
  id: totrans-689
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH03_F08_McFedries3.png)'
- en: Figure 3.8 My personal home page generated by ChatGPT
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.8 ChatGPT生成的我的个人主页
- en: At this point, if you’re happy with the personal home page that ChatGPT made
    for you, you can skip the rest of this chapter and deploy the code as I describe
    in appendix B. However, if you’re curious to know a bit more about the code that
    ChatGPT generated, continue with the next section.
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，如果您对ChatGPT为您制作的个人主页感到满意，您可以跳过本章的其余部分，并按照附录B中描述的方式部署代码。但是，如果您想了解更多关于ChatGPT生成的代码的信息，请继续阅读下一节。
- en: 3.3 Examining the personal home page code
  id: totrans-692
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.3 检查个人主页代码
- en: 'In this section, I’m going to give you a brief, nontechnical overview of the
    personal home page code that ChatGPT generated for me (and that produced the page
    shown in figure 3.8). The code that ChatGPT generates for you isn’t likely to
    be the same, for two reasons:'
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我将为您简要介绍ChatGPT为我生成的个人主页代码（以及产生图3.8所示页面的代码）。ChatGPT为您生成的代码可能不会相同，原因有两个：
- en: ChatGPT has a degree of randomness built in, so even identical prompts can often
    generate slightly different responses.
  id: totrans-694
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT内置了一定程度的随机性，因此即使相同的提示也可能经常生成略微不同的响应。
- en: The web page code generated by ChatGPT varies depending on the version of the
    model (GPT-3.5 versus GPT-4), the app used (OpenAI versus Copilot), and, for Copilot,
    the mode used (creative, balanced, or precise).
  id: totrans-695
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT生成的网页代码取决于模型的版本（GPT-3.5与GPT-4）、使用的应用程序（OpenAI与Copilot），以及对于Copilot，使用的模式（创意、平衡或精确）。
- en: That said, your personal home page code will likely be very similar to mine,
    so the code annotations in the next two sections should be useful if you’re curious
    about how the code is doing its work.
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，您的个人主页代码可能与我的非常相似，因此如果您对代码是如何工作的感到好奇，下一两个部分的代码注释应该是有用的。
- en: 3.3.1 Examining the HTML
  id: totrans-697
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3.1 检查HTML
- en: 'I’ll start with the HTML code generated by ChatGPT for my personal home page,
    which is shown here:'
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 我将从ChatGPT为我个人主页生成的HTML代码开始，如下所示：
- en: '[PRE38]'
  id: totrans-699
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: ① Loads the Josefin Sans and Roboto Serif fonts from Google Fonts
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: ① 从Google Fonts加载Josefin Sans和Roboto Serif字体
- en: ② Tells the web browser where to find the CSS code
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: ② 告诉网页浏览器在哪里找到CSS代码
- en: ③ Page header
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 页面标题
- en: ④ Page title
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 页面标题
- en: ⑤ Page subtitle
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 页面副标题
- en: ⑥ Main section of the page
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 页面主体部分
- en: ⑦ Paragraph of regular text
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 正常文本段落
- en: ⑧ Second-level headings
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 二级标题
- en: Note, in particular, the code that tells the web browser where to find the CSS
    code, which I describe in the next section.
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，特别是告诉网页浏览器在哪里找到CSS代码的代码，我将在下一节中描述。
- en: 3.3.2 Examining the CSS
  id: totrans-709
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3.2 检查CSS
- en: 'The CSS code that ChatGPT generated for my home page is shown here:'
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT为我主页生成的CSS代码如下所示：
- en: '[PRE39]'
  id: totrans-711
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: ① Applies Roboto Serif to the page text
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: ① 将Roboto Serif应用到页面文本上
- en: ② Sets the maximum page width to 800 px
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: ② 将页面最大宽度设置为800 px
- en: ③ Centers the page
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 居中页面
- en: ④ Sets the header background to dodgerblue
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 将标题背景设置为dodgerblue
- en: ⑤ Adds 20 px of space around the header text
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 在标题文本周围添加20 px的空间
- en: ⑥ Centers the text within the header
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 在标题内居中文本
- en: ⑦ Applies Josefin Sans to the header text
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 将Josefin Sans应用于标题文本
- en: ⑧ Styles the title with font size 48 px and color whitesmoke
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 使用48 px的字体大小和whitesmoke颜色设置标题样式
- en: ⑨ Styles the subtitle with font size 24 px, color whitesmoke, and italics
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ 使用24 px的字体大小、whitesmoke颜色和斜体设置副标题样式
- en: ⑩ Sets the regular page font size to 20 px
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: ⑩ 将常规页面字体大小设置为20 px
- en: ⑪ Styles the second-level headings with font size 32 px and color dodgerblue
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: ⑪ 使用32 px的字体大小和dodgerblue颜色设置二级标题样式
- en: If you like, you can use these annotations to tweak your web page code, as I
    describe in the next section.
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢，可以使用这些注释来调整您的网页代码，正如我在下一节中描述的那样。
- en: 3.4 Customizing the personal home page
  id: totrans-724
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.4 定制个人主页
- en: 'If the personal home page code that ChatGPT generated for you isn’t what you
    wanted, you have two choices:'
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 如果ChatGPT为您生成的个人主页代码不是您想要的，您有两个选择：
- en: If the resulting page isn’t close to what you want, it’s probably best to rewrite
    your prompt, start a new chat session, and try again.
  id: totrans-726
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果生成的页面与您想要的相差甚远，最好重写您的提示，开始一个新的聊天会话，然后再次尝试。
- en: If the resulting page is pretty good but just needs a few adjustments, ask ChatGPT
    to make those adjustments for you. Be sure you submit this request in the same
    session as your original prompt.
  id: totrans-727
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果生成的页面看起来不错，但只需要一些调整，请让ChatGPT为您进行这些调整。确保您在原始提示的同一会话中提交此请求。
- en: For the second case, if the code produced by ChatGPT really does just need some
    small tweaks, consider modifying the code manually based on the annotations I
    provided in the previous section. Because you don’t know web page code, it’s best
    not to try to make any major changes. However, that still leaves quite a few ways
    you can alter the code to get the page you want.
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第二种情况，如果ChatGPT生成的代码确实只需要一些小的调整，请考虑根据我在上一节中提供的注释手动修改代码。因为您不知道网页代码，所以最好不要尝试进行任何重大更改。然而，这仍然让您有相当多的方法可以修改代码以获得您想要的页面。
- en: 'First, here are some customization suggestions for the HTML code:'
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，这里是一些HTML代码的定制建议：
- en: 'In the header, you can edit the title or subtitle. Just be sure not to edit
    or delete the associated HTML tags: `<h1>` and `</h1>` for the title; `<h2>` and
    `</h2>` for the subtitle.'
  id: totrans-730
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在标题中，您可以编辑标题或副标题。只需确保不要编辑或删除相关的HTML标签：`<h1>`和`</h1>`用于标题；`<h2>`和`</h2>`用于副标题。
- en: In the main section of the HTML code, you can add, delete, or edit the text
    within each second-level heading (that is, the text between the `<h2>` and `</h2>`
    tags; be sure you don’t edit or delete these tags).
  id: totrans-731
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在HTML代码的主部分，您可以在每个二级标题（即`<h2>`和`</h2>`标签之间的文本）中添加、删除或编辑文本。确保您不要编辑或删除这些标签）。
- en: In the main section of the HTML code, you can add, delete, or edit the text
    within each paragraph (that is, the text between the `<p>` and `</p>` tags; be
    sure you don’t edit or delete these tags).
  id: totrans-732
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在HTML代码的主部分，您可以在每个段落（即`<p>`和`</p>`标签之间的文本）中添加、删除或编辑文本。确保您不要编辑或删除这些标签）。
- en: In the main section of the HTML code, you can add a new paragraph by typing
    a `<p>` tag, followed by your paragraph text, followed by the `</p>` tag.
  id: totrans-733
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在HTML代码的主部分，您可以通过输入一个`<p>`标签，然后是您的段落文本，最后是`</p>`标签来添加一个新段落。
- en: 'Now here are a few customization ideas for the CSS code:'
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是CSS代码的一些定制想法：
- en: If you want your home page to have a different maximum width, change the `max-width`
    value to something other than `800px`.
  id: totrans-735
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您想使您的首页有不同的最大宽度，将`max-width`值更改为`800px`以外的值。
- en: For any color value, you can change the existing color to a different color
    keyword.
  id: totrans-736
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何颜色值，您可以将现有的颜色更改为不同的颜色关键字。
- en: For any font-size value, you can change the number to increase or decrease the
    font size. Just be sure you leave the `px` unit in place.
  id: totrans-737
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何字体大小值，您可以通过更改数字来增加或减少字体大小。只需确保您保留`px`单位即可。
- en: To make your page code more accessible, consider converting all px measurements
    to rem measurements. 1 rem is, by default, equivalent to 16 px, so 20 px is 1.25 rem,
    24 px is 1.5 rem, 32 px is 2 rem, 48 px is 3 rem, and so on. The rem unit is more
    accessible because it measures font sizes relative to the default font size the
    browser user has defined in their browser settings.
  id: totrans-738
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了使您的页面代码更易于访问，考虑将所有px测量值转换为rem测量值。默认情况下，1 rem相当于16 px，因此20 px是1.25 rem，24 px是1.5 rem，32 px是2 rem，48 px是3 rem，依此类推。rem单位更易于访问，因为它测量的是相对于浏览器用户在其浏览器设置中定义的默认字体大小的字体大小。
- en: Summary
  id: totrans-739
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: By telling ChatGPT a little about your page content, you can prompt it to generate
    creative titles and subtitles.
  id: totrans-740
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过告诉ChatGPT一些关于您页面内容的信息，您可以提示它生成有创意的标题和副标题。
- en: 'ChatGPT can help you with three key aspects of web typography: the typeface,
    the type size, and style.'
  id: totrans-741
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助你处理网页排版的三个关键方面：字体、字体大小和样式。
- en: You can ask ChatGPT to create a color scheme using any of the 140 color keywords
    offered by CSS.
  id: totrans-742
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以要求ChatGPT使用CSS提供的140个颜色关键词中的任何一个来创建一个配色方案。
- en: 'Almost all web pages use headings: one first-level heading that acts as the
    page title, as well as one or more second- and third-level headings.'
  id: totrans-743
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 几乎所有的网页都使用标题：一个一级标题作为页面标题，以及一个或多个二级和三级标题。
- en: For best results, your page prompt should be as specific as possible, including
    colors, font sizes, and heading levels.
  id: totrans-744
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了获得最佳效果，你的页面提示应该尽可能具体，包括颜色、字体大小和标题级别。
- en: Save the generated HTML to the index.xhtml file and the generated CSS to the
    filename suggested by ChatGPT in the HTML code, usually styles.css.
  id: totrans-745
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将生成的HTML保存到index.xhtml文件中，将生成的CSS保存到HTML代码中ChatGPT建议的文件名，通常是styles.css。
- en: 4 Adding structure to a page
  id: totrans-746
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4 为页面添加结构
- en: This chapter covers
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖
- en: The role of the page header and footer
  id: totrans-748
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面标题和页脚的作用
- en: Inserting an image into a web page
  id: totrans-749
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在网页中插入图片。
- en: Adding links to social media sites
  id: totrans-750
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加社交媒体网站的链接。
- en: Prompting ChatGPT to build a book club page
  id: totrans-751
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示ChatGPT构建一个读书俱乐部页面。
- en: Examining and customizing the ChatGPT web page code
  id: totrans-752
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查和自定义ChatGPT网页代码。
- en: In chapter 3, you learned how to get ChatGPT to help you build a personal home
    page. One of the big takeaways from that process is that the more specific your
    prompt, the more the resulting code reflects your requirements, and the closer
    the resulting page will be to your original page vision.
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 在第3章中，你学习了如何让ChatGPT帮助你构建一个个人主页。从这个过程中得到的重大启示之一是，你的提示越具体，生成的代码就越能反映你的要求，生成的页面就越接近你的原始页面愿景。
- en: 'Two aspects that might have surprised you about the process in chapter 3 were
    the length of the final prompt and the amount of detail it contained. However,
    long, detailed prompts are the only way to ensure that ChatGPT generates code
    that meets your design goals. In this chapter, you supply ChatGPT with a bit more
    detail by adding a couple of structural elements—the page header and the page
    footer—that are common to almost all web pages. You also learn how to include
    a couple of useful content elements: one or more images and one or more social
    media links. All this information then goes into a detailed prompt that you’ll
    pass along to ChatGPT to produce the code for a book club page that gives you
    and other club members a home on the web.'
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 第3章中可能让你感到惊讶的两个方面是最终提示的长度和包含的细节量。然而，长而详细的提示是确保ChatGPT生成满足你设计目标的代码的唯一方法。在本章中，你通过添加一些常见的页面结构元素——页面标题和页脚——向ChatGPT提供更多细节。你还学习了如何包含一些有用的内容元素：一个或多个图片和一个或多个社交媒体链接。所有这些信息随后将进入一个详细的提示，你将传递给ChatGPT以生成一个读书俱乐部页面的代码，为你和其他俱乐部成员提供一个网络家园。
- en: This chapter also provides a high-level explanation of the code generated by
    ChatGPT. It even provides a few tips for customizing the code manually to get
    everything just the way you want.
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 本章还提供了ChatGPT生成的代码的高级解释。它甚至提供了一些手动自定义代码的技巧，以获得你想要的一切。
- en: 4.1 Understanding this chapter’s project
  id: totrans-756
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.1 理解本章的项目
- en: 'In this chapter, you’re going to enlist ChatGPT to help you build a simple
    web page for a book club. The resulting page will include the following components:'
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将要求ChatGPT帮助你为读书俱乐部构建一个简单的网页。生成的页面将包括以下组件：
- en: 'A header element that includes the following:'
  id: totrans-758
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个包含以下内容的标题元素：
- en: The book club logo
  id: totrans-759
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 读书俱乐部标志。
- en: The book club name
  id: totrans-760
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 读书俱乐部名称
- en: A tagline that describes or otherwise sums up the club
  id: totrans-761
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个描述或总结俱乐部的标语。
- en: 'A main element that includes the following:'
  id: totrans-762
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个包含以下内容的主元素：
- en: An introductory section that describes the book club
  id: totrans-763
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个介绍性章节，描述读书俱乐部。
- en: A “What We’re Reading” section that displays information about the book club’s
    current selection, including the front cover, title, and summary
  id: totrans-764
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个“我们在读什么”部分，显示关于读书俱乐部当前选择的信息，包括封面、标题和摘要。
- en: A “Next Meetup” section that displays information about the next club meeting,
    including the date, time, location, and some book-related questions to consider
  id: totrans-765
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个“下次聚会”部分，显示关于下次俱乐部聚会的信息，包括日期、时间、地点以及一些需要考虑的与书籍相关的问题。
- en: 'A footer element that includes the following:'
  id: totrans-766
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个包含以下内容的页脚元素：
- en: A copyright notice
  id: totrans-767
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 版权声明
- en: Links to the club’s social media accounts
  id: totrans-768
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 链接到俱乐部的社交媒体账户。
- en: Figure 4.1 shows an example of the type of page you’ll be creating with the
    help of ChatGPT.
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.1展示了你将在ChatGPT的帮助下创建的页面类型的一个示例。
- en: For your own page, you might want to discuss the page design with your group
    members to see if there’s any content you’re missing. You could also modify this
    page slightly to turn it into the home page for a reading group, discussion group,
    literary society, or any kind of meetup.
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 对于你自己的页面，你可能想与你的小组成员讨论页面设计，看看是否遗漏了任何内容。你也可以稍微修改这个页面，将其变成阅读小组、讨论小组、文学社团或任何类型的聚会的主页。
- en: '![](../../OEBPS/Images/CH04_F01_McFedries3.png)'
  id: totrans-771
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH04_F01_McFedries3.png)'
- en: Figure 4.1 A book club page built with ChatGPT-generated code
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.1 使用ChatGPT生成的代码构建的读书俱乐部页面
- en: 4.2 Building the book club page
  id: totrans-773
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.2 构建读书俱乐部页面
- en: 'The goal of this chapter is to use ChatGPT’s help to construct a simple book
    club page that demonstrates the following fundamental elements of a web page:
    the header, the footer, and images. You also learn how to add links to one or
    more social media accounts. At the end of this section, you put all this together
    in a complete prompt to build the book club page.'
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的目标是利用ChatGPT的帮助构建一个简单的读书俱乐部页面，该页面演示了网页的基本元素：页眉、页脚和图片。你还学会了如何添加到一个或多个社交媒体账户的链接。在本节结束时，你将所有这些内容组合成一个完整的提示来构建读书俱乐部页面。
- en: 4.2.1 Introducing the page header
  id: totrans-775
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.1 介绍页面页眉
- en: The page header is a section that appears at the top of the page. In almost
    all cases, the header extends across the entire width of the page. However, it’s
    worth pointing out here that this doesn’t mean the header will necessarily extend
    across the entire width of the browser window. Why? Because, as you’ll see in
    this chapter’s project and most of this book’s example pages, it’s usually best
    to restrict the width of the web page so that the lines of text don’t become too
    wide and therefore too difficult to read.
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 页面页眉是出现在页面顶部的部分。在几乎所有情况下，页眉会扩展到整个页面的宽度。然而，这里值得指出的是，这并不意味着页眉一定会扩展到整个浏览器窗口的宽度。为什么？因为，正如你将在本章的项目和本书大多数示例页面中看到的那样，通常最好限制网页的宽度，这样文本行就不会太宽，因此也就不会太难阅读。
- en: 'The header acts as a kind of introduction to the page, which means it usually
    includes one or more of the following elements:'
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 页眉充当页面的某种介绍，这意味着它通常包括以下一个或多个元素：
- en: The page icon or logo
  id: totrans-778
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面图标或标志
- en: The page title and an optional tagline or subtitle
  id: totrans-779
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面标题以及可选的标语或副标题
- en: Links to social media accounts
  id: totrans-780
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社交媒体账户链接
- en: It’s common (although by no means necessary) to set off the header from the
    rest of the page by styling it with a different background color.
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 通常（尽管并非必需），可以通过使用不同的背景颜色来设置页眉与页面其余部分的分隔。
- en: 'When prompting ChatGPT, you can specify a header and its contents by including
    an instruction along the following lines:'
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 当提示ChatGPT时，你可以通过包含以下类似的指令来指定页眉及其内容：
- en: '[PRE40]'
  id: totrans-783
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Note All the prompts in this chapter are available on this book’s website ([www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt))
    and in the book’s GitHub repository ([https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)).
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：本章中所有的提示都可以在本书的网站上找到（[www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt)）和本书的GitHub仓库中（[https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)）。
- en: 'Here’s some example HTML code that ChatGPT might generate based on this instruction:'
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些示例HTML代码，ChatGPT可能会根据这个指令生成：
- en: '[PRE41]'
  id: totrans-786
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Note that the header is marked up using the header element, which means the
    header content appears between the `<header>` and `</header>` tags, as shown in
    this example. (I talk about the `<img>` tag a little later in this chapter; for
    the `<h1>` tag, refer to chapter 3; for the `<p>` tag, refer to chapter 5.) Figure
    4.2 shows how this code can appear after some CSS has been applied to it. The
    header’s bottom-of-the-page counterpart is the footer, which I discuss next.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，标题是通过标题元素标记的，这意味着标题内容出现在`<header>`和`</header>`标签之间，如本例所示。（我将在本章稍后讨论`<img>`标签；对于`<h1>`标签，请参阅第3章；对于`<p>`标签，请参阅第5章。）图4.2展示了在应用了一些CSS之后，这段代码可能呈现的样子。页眉的页面底部对应物是页脚，我将在下一节讨论。
- en: '![](../../OEBPS/Images/CH04_F02_McFedries3.png)'
  id: totrans-788
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH04_F02_McFedries3.png)'
- en: Figure 4.2 A page header
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.2 页面页眉
- en: 4.2.2 Introducing the page footer
  id: totrans-790
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.2 介绍页面页脚
- en: 'The page footer is a section that appears at the bottom of the page. Like the
    header, the footer almost always extends the full width of the page, and the footer
    height depends on its content. Footers are usually fairly simple affairs that
    include one or both of the following:'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 页脚是出现在页面底部的一个区域。像页眉一样，页脚几乎总是延伸到页面的整个宽度，页脚的高度取决于其内容。页脚通常相对简单，包括以下一个或两个部分：
- en: A copyright notice
  id: totrans-792
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 版权声明
- en: Links to social media accounts
  id: totrans-793
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社交媒体账户链接
- en: Note that although it’s possible for social media links to appear in either
    the header or the footer, they shouldn’t appear in both. In this chapter’s project,
    the social media links will appear in the footer.
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，尽管社交媒体链接可以出现在页眉或页脚中，但它们不应该同时出现在两者中。在本章的项目中，社交媒体链接将出现在页脚中。
- en: Again, it’s common to set off the footer from the rest of the page by styling
    it with a different background color. It’s also common to populate the footer
    with links to other major site pages, a topic I cover in chapter 7.
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，通常通过使用不同的背景颜色来将页脚与页面的其余部分区分开来。通常还会在页脚中包含指向其他主要网站页面的链接，这是我在第7章中讨论的主题。
- en: 'As part of your ChatGPT prompt, you can specify a footer and its contents by
    including an instruction similar to the following:'
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 作为你的ChatGPT提示的一部分，你可以通过包含类似于以下指令的说明来指定页脚及其内容：
- en: '[PRE42]'
  id: totrans-797
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: 'ChatGPT might generate the following code based on this instruction:'
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这个指令，ChatGPT可能会生成以下代码：
- en: '[PRE43]'
  id: totrans-799
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: 'Note that the footer is marked up using the `footer` element, which means the
    footer content appears between the `<footer>` and `</footer>` tags, as shown in
    this example. Figure 4.3 demonstrates how the browser renders this code after
    some CSS has been applied. Next, you learn a vital aspect of the elements you
    see on a web page: the box model.'
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，页脚是用`footer`元素标记的，这意味着页脚内容出现在`<footer>`和`</footer>`标签之间，如本例所示。图4.3 展示了在应用了一些CSS之后，浏览器如何渲染这段代码。接下来，你将学习网页上看到的元素的一个关键方面：盒模型。
- en: '![](../../OEBPS/Images/CH04_F03_McFedries3.png)'
  id: totrans-801
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH04_F03_McFedries3.png)'
- en: Figure 4.3 A page footer
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.3 页脚
- en: 4.2.3 Introducing padding, borders, and margins
  id: totrans-803
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.3 介绍填充、边框和边距
- en: An important HTML concept to bear in mind is that every element on the page
    is surrounded by an invisible box. Why is that such a big deal? Because you can
    get ChatGPT to generate code to control many aspects of that box, including its
    interior spacing, borders, and exterior spacing. To get there, you need to become
    acquainted with the various parts of the box.
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 需要记住的一个重要HTML概念是，页面上的每个元素都被一个不可见的框所包围。为什么这很重要呢？因为你可以让ChatGPT生成代码来控制这个框的许多方面，包括其内部间距、边框和外部间距。要达到这个目的，你需要熟悉框的各个部分。
- en: 'Figure 4.4 gives you an abstract look at the basic box parts, and figure 4.5
    shows how these same parts affect some actual page content. There are four parts
    to each element box:'
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.4 给你一个基本框部分的抽象视图，图4.5 展示了这些相同的部分如何影响实际的页面内容。每个元素框有四个部分：
- en: '*Content*—This area is the inner rectangle of the box, consisting of the content—such
    as some text or an image—contained in the box.'
  id: totrans-806
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*内容*—这个区域是框的内部矩形，包含框内的内容，例如一些文本或图片。'
- en: '*Padding*—This area between the content and the border represents extra whitespace
    added outside the top, right, bottom, and left edges of the content area.'
  id: totrans-807
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*填充*—这个区域位于内容和边框之间，代表在内容区域的顶部、右侧、底部和左侧边缘外添加的额外空白。'
- en: '*Border*—This part runs along the outer edges of the padding area and surrounds
    the content and padding with lines.'
  id: totrans-808
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*边框*—这部分沿着填充区域的边缘运行，并用线条包围内容和填充。'
- en: '*Margin*—This area is the outer rectangle of the box, representing extra whitespace
    added outside of the top, right, bottom, and left borders.'
  id: totrans-809
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*边距*—这个区域是框的外部矩形，代表在顶部、右侧、底部和左侧边框外添加的额外空白。'
- en: '![](../../OEBPS/Images/CH04_F04_Mcfedries3.png)'
  id: totrans-810
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH04_F04_Mcfedries3.png)'
- en: Figure 4.4 The main parts of an element box
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.4 元素框的主要部分
- en: '![](../../OEBPS/Images/CH04_F05_Mcfedries3.png)'
  id: totrans-812
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH04_F05_Mcfedries3.png)'
- en: Figure 4.5 The element box parts as they appear with actual page content
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.5 元素框部分与实际页面内容一起出现
- en: The combination of the content area, padding, border, and margin is known in
    CSS circles as the *box model*. Keeping all this in mind the best you can, it’s
    time to turn your attention to the useful and powerful CSS properties that enable
    you to manipulate any element box. First up is changing the box padding.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 内容区域、内边距、边框和边距的组合在CSS领域被称为*盒模型*。在尽可能记住所有这些的同时，现在是时候将你的注意力转向那些有用且强大的CSS属性，这些属性使你能够操纵任何元素框。首先是改变盒内边距。
- en: Adding padding
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 添加内边距
- en: In the element box, the padding is the whitespace added above, below, to the
    left, and to the right of the content. If you add a border to your element, as
    described in the next section, the padding is the space between your content and
    the border. The padding gives the element a bit of room to breathe in its box,
    ensuring that the content isn’t crowded by its own border or by nearby elements.
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 在元素框中，内边距是添加到内容上方、下方、左侧和右侧的空白。如果你在元素上添加边框，如下一节所述，内边距是内容与边框之间的空间。内边距给元素在其框中留出一些呼吸空间，确保内容不会被其自身的边框或附近元素拥挤。
- en: 'You set the padding by applying a value to one or more of the four sides:'
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过将一个或多个边的值应用到内边距来设置内边距：
- en: '[PRE44]'
  id: totrans-818
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: 'Each value is a measurement in pixels (px). Here’s an example:'
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 每个值都是以像素（px）为单位的测量值。以下是一个例子：
- en: '[PRE45]'
  id: totrans-820
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: 'You can also use a `padding` shorthand property to set all the padding values
    with a single declaration. You can duplicate the rule in the preceding example
    by using the shorthand syntax as follows:'
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以使用一个`padding`简写属性来通过单个声明设置所有内边距值。你可以通过以下简写语法重复前一个示例中的规则：
- en: '[PRE46]'
  id: totrans-822
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: If you supply just a single value, the web browser applies that amount of padding
    to all four sides.
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只提供一个值，浏览器将把这个值应用到所有四个边。
- en: 'To ask ChatGPT to set the padding on an element, you include an instruction
    similar to the following in the CSS portion of your prompt:'
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 要让ChatGPT设置元素的内边距，你需要在提示的CSS部分包含一个类似于以下的指令：
- en: '[PRE47]'
  id: totrans-825
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: 'Based on this instruction, ChatGPT will generate code like this:'
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这个指令，ChatGPT将生成如下代码：
- en: '[PRE48]'
  id: totrans-827
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: The next part of the box model is the border.
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 盒模型的下一段是边框。
- en: Surrounding an element with a border
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 用边框包围一个元素
- en: 'In the element box, the border is the line that defines the outer edge of the
    padding on four sides: top, right, bottom, and left. In this way, the border comes
    between the element’s padding and its margin. The border is optional, but it’s
    often useful to provide the reader with a visual indicator that the enclosed content
    is separate from any nearby content. To create a basic border around an element,
    use the `border` property, as shown in figure 4.6.'
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 在元素框中，边框是定义四个边（上、右、下、左）内边距外边缘的线条。这样，边框位于元素的边距和内边距之间。边框是可选的，但通常很有用，可以为读者提供一个视觉指示，表明封装的内容与任何附近的内容是分开的。要创建一个基本的元素边框，请使用如图4.6所示的`border`属性。
- en: '![](../../OEBPS/Images/CH04_F06_Mcfedries3.png)'
  id: totrans-831
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH04_F06_Mcfedries3.png)'
- en: Figure 4.6 The syntax of the `border` property
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.6 `border`属性的语法
- en: 'The `width` value is a measurement in px. You can also set the value to any
    of the following keywords: `thin`, `medium`, or `thick`. For the `style` value,
    you can use any of the following keywords: `dotted`, `dashed`, `solid`, `double`,
    `groove`, `ridge`, `inset`, `outset`, `hidden`, or `none`. For the `color` parameter,
    you can use any of the color names you learned about in chapter 3.'
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: '`width`值是以像素（px）为单位的测量值。你也可以将值设置为以下任何关键字：`thin`、`medium`或`thick`。对于`style`值，你可以使用以下任何关键字：`dotted`、`dashed`、`solid`、`double`、`groove`、`ridge`、`inset`、`outset`、`hidden`或`none`。对于`color`参数，你可以使用你在第3章中学到的任何颜色名称。'
- en: 'To ask ChatGPT to add a border around an element, you include an instruction
    similar to the following in the CSS portion of your prompt:'
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 要让ChatGPT在元素周围添加边框，你需要在提示的CSS部分包含一个类似于以下的指令：
- en: '[PRE49]'
  id: totrans-835
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: 'Based on this instruction, ChatGPT will generate code like this:'
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这个指令，ChatGPT将生成如下代码：
- en: '[PRE50]'
  id: totrans-837
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: The final aspect of the box model I’ll discuss here is the margin.
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里要讨论的盒模型的最后一个方面是边距。
- en: Working with margins
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 与边距一起工作
- en: In the element box, the margin is the whitespace added above, below, to the
    left, and to the right of the border. The margin lets you control the space between
    elements. Positive margin values, for example, prevent the page elements from
    bumping into one another or overlapping and also keep the elements from brushing
    against the edges of the browser viewport. On the other hand, if your design requires
    elements to overlap, you can achieve this effect by using negative margin values.
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 在元素框中，边距是在边框上方、下方、左侧和右侧添加的空白。边距让你可以控制元素之间的空间。例如，正边距值可以防止页面元素相互碰撞或重叠，并防止元素触及浏览器视口的边缘。另一方面，如果你的设计需要元素重叠，你可以通过使用负边距值来实现这种效果。
- en: 'You apply the margin by setting a value to one or more of an element’s four
    sides:'
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 你通过设置一个值到元素的一个或多个侧面来应用边距：
- en: '[PRE51]'
  id: totrans-842
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: 'Each margin value is a measurement in px. Here’s an example:'
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 每个边距值是一个以px为单位的测量值。以下是一个示例：
- en: '[PRE52]'
  id: totrans-844
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: 'As with padding, a margin shorthand property lets you apply the margins using
    a single declaration. You can rewrite the rule in the preceding example by using
    the shorthand syntax like so:'
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: 与填充一样，一个边距简写属性让你可以使用单个声明来应用边距。你可以通过使用简写语法重写前面的规则，如下所示：
- en: '[PRE53]'
  id: totrans-846
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: If you supply just a single value, the web browser applies that margin value
    to all four sides of the element.
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只提供一个值，则网络浏览器将该边距值应用于元素的四个侧面。
- en: 'To ask ChatGPT to set the margin on an element, you include an instruction
    similar to the following in the CSS portion of your prompt:'
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 要让ChatGPT设置元素的边距，你可以在提示的CSS部分包含一个类似于以下说明的指令：
- en: '[PRE54]'
  id: totrans-849
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: 'Based on this instruction, ChatGPT will generate code like this:'
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这个说明，ChatGPT将生成如下代码：
- en: '[PRE55]'
  id: totrans-851
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: Earlier, you saw an example of a header that included an image. How to work
    with web page images is introduced in the next section.
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 之前，你看到了一个包含图片的标题示例。如何在下一节中处理网页图片将介绍。
- en: 4.2.4 Working with images
  id: totrans-853
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.4 与图片一起工作
- en: Although most web pages convey information (however loosely you define that
    term) using words, pages that are nothing but text are a little intimidating and,
    often, a lot boring! Sure, you can (and should) use typefaces, colors, and text
    styles to spruce up the page (as I described in chapter 3). However, a relatively
    easy way to enliven an otherwise dull wall of text is to give your readers some
    eye candy by inserting an image or two. That’s not to say your web page images
    should be merely decorative. Images are a great way to supplement your page text,
    display information concisely, and help your readers retain what they read on
    your pages.
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管大多数网页（无论你如何定义这个术语）都是通过文字来传达信息，但只有文字的页面可能会让人感到有些令人畏惧，而且通常很无聊！当然，你可以（而且应该）使用字体、颜色和文字样式来美化页面（正如我在第3章中描述的那样）。然而，让一个本来看起来单调的文字墙变得生动的一个相对简单的方法是，通过插入一张或两张图片来给你的读者一些视觉享受。这并不是说你的网页图片只是装饰性的。图片是补充你的页面文字、简洁地展示信息和帮助你的读者记住你在页面上阅读的内容的绝佳方式。
- en: An image is a separate file you can tell ChatGPT to reference in your page’s
    HTML code. (Refer to chapter 10 for a more detailed treatment of images and how
    they are inserted into a web page.) The web has standardized on four formats that
    account for almost all web imagery, as summarized in table 4.1.
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 图片是一个单独的文件，你可以告诉ChatGPT在页面的HTML代码中引用它。（有关图片的更详细处理以及它们如何插入到网页中的信息，请参阅第10章。）网络已经标准化了四种格式，这些格式几乎涵盖了所有网络图像，总结在表4.1中。
- en: 'My assumption in this chapter is that you already have the images you want
    to include in your page. For the book club project, you need two images:'
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我的假设是，你已经有了你想要包含在页面中的图片。对于读书俱乐部项目，你需要两张图片：
- en: A logo for the book club; this image will go in the page header.
  id: totrans-857
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 读书俱乐部的标志；这张图片将放在页面标题中。
- en: The front cover of the book the club is currently reading; this image will go
    in the main section of the page.
  id: totrans-858
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 俱乐部目前正在阅读的书的封面；这张图片将放在页面的主要内容部分。
- en: You need to know the names of all the image files you want to include in your
    page because you’ll be including those names in your prompt.
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要知道你想要包含在页面中的所有图片文件的名称，因为你在提示中会包含这些名称。
- en: Table 4.1 Image file formats
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 表4.1 图片文件格式
- en: '| Name | Extension | Description | Uses |'
  id: totrans-861
  prefs: []
  type: TYPE_TB
  zh: '| 名称 | 扩展名 | 描述 | 用途 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-862
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| GIF | .gif | This is the original web graphics format (the name is short
    for Graphics Interchange Format, which is pronounced “giff” or “jiff”). GIFs are
    limited to 256 colors, can have transparent backgrounds, and can be combined into
    short animations. | Use GIFs if you want to combine multiple images into a single
    animated image. |'
  id: totrans-863
  prefs: []
  type: TYPE_TB
  zh: '| GIF | .gif | 这是原始的网页图形格式（名称缩写为图形交换格式，发音为“giff”或“jiff”）。GIF限制为256种颜色，可以有透明背景，并且可以组合成简短动画。|
    如果你想将多个图像组合成单个动画图像，请使用GIF。|'
- en: '| JPEG | .jpg, .jpeg | This format (which gets its name from Joint Photographic
    Experts Group and is pronounced “jay-peg”) supports complex images that have many
    millions of colors. The main advantage of JPEG files is that they’re compressed,
    so even digitized photographs and other high-quality images can be a reasonably
    small size for faster downloading. Note, however, that JPEG compression is lossy,
    which means it makes the image smaller by discarding redundant pixels. The higher
    the compression, the more pixels are discarded and the less sharp the image appears.
    | If you have a photo or similarly complex image, JPEG is almost always the best
    choice because it gives the smallest file size. |'
  id: totrans-864
  prefs: []
  type: TYPE_TB
  zh: '| JPEG | .jpg, .jpeg | 这种格式（其名称来源于联合图像专家小组，发音为“jay-peg”）支持具有数百万种颜色的复杂图像。JPEG文件的主要优点是它们被压缩，因此即使是数字化的照片和其他高质量图像也可以是合理的小尺寸，以便更快地下载。然而，请注意，JPEG压缩是有损的，这意味着它通过丢弃冗余像素来减小图像的大小。压缩程度越高，丢弃的像素越多，图像看起来就越不清晰。|
    如果你有一个照片或类似复杂图像，JPEG几乎总是最佳选择，因为它提供了最小的文件大小。|'
- en: '| PNG | .png | This format (short for Portable Network Graphics and pronounced
    “p-n-g” or “ping”) supports millions of colors. It’s a compressed format, but
    unlike JPEGs, PNGs use lossless compression. Images retain sharpness, but the
    file sizes can be quite big. PNG also supports transparency. | If you have an
    illustration or icon that uses solid colors or a photo that contains large areas
    of near-solid color, PNG is best because it gives you a reasonably small file
    size while retaining excellent image quality. You can also use PNG if you need
    transparency effects. |'
  id: totrans-865
  prefs: []
  type: TYPE_TB
  zh: '| PNG | .png | 这种格式（缩写为可移植网络图形，发音为“p-n-g”或“ping”）支持数百万种颜色。它是一种压缩格式，但与JPEG不同，PNG使用无损压缩。图像保持清晰度，但文件大小可能相当大。PNG还支持透明度。|
    如果你有一个使用纯色或包含大面积近似纯色的插图或图标，PNG是最好的选择，因为它在保持优秀图像质量的同时提供了合理的小文件大小。如果你需要透明效果，也可以使用PNG。|'
- en: '| SVG | .svg | This format (short for Scalable Vector Graphics) uses vectors
    rather than pixels to generate an image. These vectors are encoded as a set of
    instructions in XML format, meaning the image can be altered in a text editor
    and can be manipulated to produce animations. | If you have a logo or icon and
    have a graphics program that can save files as SVG (such as Adobe Illustrator
    or Inkscape), this format is a good choice because it produces small files that
    can be scaled to any size without distortion. |'
  id: totrans-866
  prefs: []
  type: TYPE_TB
  zh: '| SVG | .svg | 这种格式（缩写为可缩放矢量图形）使用矢量而不是像素来生成图像。这些矢量被编码为XML格式的指令集，这意味着图像可以在文本编辑器中修改，并且可以操纵以产生动画。|
    如果你有一个标志或图标，并且有一个可以将文件保存为SVG格式的图形程序（例如Adobe Illustrator或Inkscape），这种格式是一个不错的选择，因为它可以生成小文件，这些文件可以缩放到任何大小而不会失真。|'
- en: Note One of the most fun aspects of working with generative AI models is getting
    them to create entirely new images from text prompts. I talk about generating
    new images from text using OpenAI’s DALL-E model in chapter 5.
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：与生成式AI模型一起工作的最有趣的部分之一是让他们根据文本提示创建全新的图像。我在第5章中讨论了使用OpenAI的DALL-E模型从文本生成新图像。
- en: You may also want to obtain icons for each social media account associated with
    your book club, discussed next.
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能还想为与你的读书俱乐部相关的每个社交媒体账户获取图标，下文将讨论。
- en: 4.2.5 Adding social media links
  id: totrans-869
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.5 添加社交媒体链接
- en: 'In this modern age, no web page looks complete without at least a few links
    to social media sites. This chapter’s project assumes you want to link to accounts
    on Facebook, X (Twitter), and Instagram. For each link, you’ll need the following:'
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个现代时代，没有至少几个指向社交媒体网站的链接的网页看起来是不完整的。本章的项目假设你想要链接到Facebook、X（Twitter）和Instagram上的账户。对于每个链接，你需要以下内容：
- en: The account username
  id: totrans-871
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 账户用户名
- en: An icon for the social media site
  id: totrans-872
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社交媒体网站的图标
- en: For the latter, you don’t need to download a separate image file from the web
    (unless you prefer to go that route). Instead, you’ll ask ChatGPT to link to an
    icon toolkit named Font Awesome, which includes icons for all major social media
    sites. (The one exception, as I write this, is the Threads social media site,
    the icon for which hadn’t yet been added to Font Awesome.)
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 对于后者，您不需要从网络上下载单独的图像文件（除非您更喜欢这样做）。相反，您将要求ChatGPT链接到一个名为Font Awesome的图标工具包，它包括所有主要社交媒体网站的图标。（一个例外是Threads社交媒体网站，它的图标尚未添加到Font
    Awesome中。）
- en: 4.2.6 Crafting the prompt
  id: totrans-874
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.6 构建提示
- en: 'If you’ve gone through the ChatGPT prompts in the previous section, you now
    have what you need to prompt ChatGPT to generate the code for your book club page.
    Your prompt should begin like this:'
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您已经完成了上一节中的ChatGPT提示，那么您现在就有必要提示ChatGPT为您生成读书俱乐部页面的代码。您的提示应该开始如下：
- en: '[PRE56]'
  id: totrans-876
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: 'You then specify the content of your page, including the following (refer to
    figure 4.7):'
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 然后您指定页面内容，包括以下内容（参见图4.7）：
- en: A header that includes your club logo, page title, and tagline
  id: totrans-878
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含您的俱乐部标志、页面标题和标语的页眉。
- en: A main element that starts with a section that introduces visitors to your book
    club
  id: totrans-879
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个以介绍访客的读书俱乐部部分开始的主体元素。
- en: A section that displays information about the book the club is currently reading,
    including the book cover, title, summary, and page count
  id: totrans-880
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个显示俱乐部当前阅读的书籍信息的部分，包括封面、标题、摘要和页数。
- en: A section that displays information about the club’s next meetup, including
    the date, time, location, and some questions for members to consider in advance
  id: totrans-881
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个显示俱乐部下次聚会的信息的部分，包括日期、时间、地点以及一些供成员提前考虑的问题。
- en: A footer that includes a copyright notice and links to your club’s social media
    accounts
  id: totrans-882
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明和链接到您的俱乐部社交媒体账户的页脚。
- en: 'Next, you ask ChatGPT to generate the CSS for how you want your page formatted:'
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您要求ChatGPT生成您想要页面格式的CSS代码：
- en: '[PRE57]'
  id: totrans-884
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: 'You then specify the formatting, including the following:'
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 然后您指定格式设置，包括以下内容：
- en: The header background color (this should be the primary color from your color
    scheme).
  id: totrans-886
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页眉背景颜色（这应该是您配色方案中的主色）。
- en: The type size and color you want to use for the page title and tagline (the
    color should be the lightest color from your color scheme).
  id: totrans-887
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您想要用于页面标题和标语（颜色应该是您配色方案中最浅的颜色）的字体大小和颜色。
- en: The type size and color of the second-level headings (the color should be the
    primary color from your color scheme).
  id: totrans-888
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 二级标题的字体大小和颜色（颜色应该是您配色方案中的主色）。
- en: The type size of the regular page text.
  id: totrans-889
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正常页面文本的字体大小。
- en: The fonts to use for the headings and regular page text.
  id: totrans-890
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于标题和正常页面文本的字体。
- en: A maximum width for the page. This prevents the lines of text from getting too
    long. A maximum length of 800 px is fine for most pages.
  id: totrans-891
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面的最大宽度。这可以防止文本行过长。对于大多数页面来说，800 px的最大长度是合适的。
- en: '![](../../OEBPS/Images/CH04_F07_McFedries3.png)'
  id: totrans-892
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH04_F07_McFedries3.png)'
- en: Figure 4.7 The sections of the book club page
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.7 读书俱乐部页面的部分
- en: 'Here’s an example prompt for my own book club page:'
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个为我自己的读书俱乐部页面提供的示例提示：
- en: '[PRE58]'
  id: totrans-895
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: Note Given the length of this prompt, if you use Bing Copilot or Microsoft Copilot,
    be sure to use Precise mode, which has a 4,000-character prompt limit.
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：鉴于这个提示的长度，如果您使用Bing Copilot或Microsoft Copilot，请确保使用精确模式，该模式具有4,000个字符的提示限制。
- en: 'ChatGPT should create the HTML code first, which you can copy and then paste
    and save to a file named index.xhtml. In that code, you should see a line near
    the top similar to the following:'
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT应首先创建HTML代码，您可以复制并粘贴到名为index.xhtml的文件中。在这段代码中，您应该看到顶部附近类似以下的一行：
- en: '[PRE59]'
  id: totrans-898
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: This code tells the web browser to look for the CSS code in a file named styles.css,
    so your next task is to copy the generated CSS code, then paste it and save it
    to a file named styles.css (or whatever name you see in the `<link>` tag). Be
    sure to save styles.css in the same folder as your index.xhtml file. You also
    need to copy your image files into the same folder. Refer to appendix A to learn
    more about working with web page files. I submitted this prompt to GPT-4 using
    OpenAI’s ChatGPT app, and the code it generated resulted in the page shown in
    figure 4.8.
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码指示网络浏览器在名为styles.css的文件中查找CSS代码，因此您的下一个任务是复制生成的CSS代码，然后将其粘贴并保存到名为styles.css的文件中（或您在`<link>`标签中看到的任何名称）。请确保将styles.css保存到与您的index.xhtml文件相同的文件夹中。您还需要将图像文件复制到同一文件夹中。有关与网页文件一起工作的更多信息，请参阅附录A。我使用OpenAI的ChatGPT应用提交了这个提示，它生成的代码导致了图4.8所示的页面。
- en: If you’re satisfied with the book club page that ChatGPT generated for you,
    you can skip the rest of this chapter and deploy the code as I describe in appendix
    B. However, if you’d like to know a bit more about the code that ChatGPT generated,
    the next section gives you a closer look.
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对你用ChatGPT生成的书友会页面满意，你可以跳过本章的其余部分，并按照附录B中描述的方式部署代码。然而，如果你想了解更多关于ChatGPT生成的代码，下一节将为你提供更详细的了解。
- en: '![](../../OEBPS/Images/CH04_F08_McFedries3.png)'
  id: totrans-901
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH04_F08_McFedries3.png)'
- en: Figure 4.8 My book club page generated by ChatGPT
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.8 ChatGPT生成的我的书友会页面
- en: 4.3 Examining the code
  id: totrans-903
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.3 检查代码
- en: I’m going to give you a short and reasonably nontechnical overview of the book
    club page code that ChatGPT generated based on my prompt from the previous section
    (that page is shown in figure 4.8). Your ChatGPT-generated code will be different
    from mine not only because your text and images will be different but also because
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 我将为你提供一个简短且相对非技术性的概述，关于ChatGPT根据上一节中的提示生成的书友会页面代码（该页面如图4.8所示）。你用ChatGPT生成的代码将不同于我的，不仅因为你的文本和图片会不同，还因为
- en: ChatGPT’s algorithms include some built-in randomness, so the same prompt will
    often generate slightly different code each time you run it.
  id: totrans-905
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT的算法包含一些内置的随机性，所以相同的提示每次运行时通常会生成略微不同的代码。
- en: ChatGPT’s output varies depending on the model (GPT-3.5 versus GPT-4) and the
    app (OpenAI versus Bing Copilot). For Bing Copilot, the output also depends on
    the conversation style (creative, balanced, or precise).
  id: totrans-906
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT的输出取决于模型（GPT-3.5与GPT-4）和应用程序（OpenAI与Bing Copilot）。对于Bing Copilot，输出还取决于对话风格（创意、平衡或精确）。
- en: Note The generated HTML and CSS code for my book club are available on the book’s
    website (www.manning.com/books/build-a-website-with-chatgpt) and in the GitHub
    repository ([https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)).
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：我生成的书友会HTML和CSS代码可在本书的网站上（www.manning.com/books/build-a-website-with-chatgpt）和GitHub仓库（[https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)）找到。
- en: However, every version of ChatGPT should output HTML and CSS code that’s at
    least similar to what’s displayed in the next two sections, so my code annotations
    should help you understand what’s happening under the hood.
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，ChatGPT的每个版本都应该输出至少与下一两个部分显示的HTML和CSS代码相似的代码，所以我的代码注释应该能帮助你理解底层发生了什么。
- en: 4.3.1 Examining the HTML
  id: totrans-909
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.1 检查HTML
- en: 'The HTML code that ChatGPT generated for my book club is shown here:'
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: 这里展示了ChatGPT为我生成的书友会HTML代码：
- en: '[PRE60]'
  id: totrans-911
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: ① Tells the web browser where to find the CSS code
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: ① 告诉网页浏览器在哪里找到CSS代码
- en: ② Loads the page fonts from Google Fonts
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: ② 从Google Fonts加载页面字体
- en: ③ Page header
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 页面页眉
- en: ④ Page logo
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 页面标志
- en: ⑤ Page title
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 页面标题
- en: ⑥ Page tagline
  id: totrans-917
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 页面标语
- en: ⑦ First section of the page
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 页面的第一部分
- en: ⑧ First section of the page
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 页面的第一部分
- en: ⑨ Second section of the page
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ 页面的第二部分
- en: ⑩ Book cover image
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: ⑩ 书籍封面图片
- en: ⑪ Book info
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: ⑪ 书籍信息
- en: ⑫ Third section of the page
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: ⑫ 页面的第三部分
- en: ⑬ Club meetup info
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: ⑬ 俱乐部聚会信息
- en: ⑭ Page footer
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: ⑭ 页面页脚
- en: ⑮ Copyright notice
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: ⑮ 版权声明
- en: ⑯ Social media links
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: ⑯ 社交媒体链接
- en: Note In my own experiments, ChatGPT occasionally produced code that added unusual
    characters to the page. If you see unusual characters, you can almost always fix
    the problem by adding the code `<meta charset="utf-8">` immediately after the
    `<head>` tag in the HTML file. This tag tells the web browser how to handle certain
    characters, such as curly quotation marks (“ and ”).
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：在我的实验中，ChatGPT偶尔会生成在页面上添加了不寻常字符的代码。如果你看到不寻常的字符，你几乎总是可以通过在HTML文件中的`<head>`标签后立即添加代码`<meta
    charset="utf-8">`来修复这个问题。这个标签告诉浏览器如何处理某些字符，例如花括号引号（“和”）。
- en: 'Here are a few notes to bear in mind when reading the HTML code:'
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读HTML代码时，请注意以下几点：
- en: The page’s two images are referenced using the `<img>` tag, where the `src`
    value is the name of the image file. If you change the name of your image file,
    be sure to change the corresponding `src` value, as well.
  id: totrans-930
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面的两个图像使用`<img>`标签引用，其中`src`值是图像文件的名称。如果你更改了图像文件的名称，务必更改相应的`src`值。
- en: In the book info and the meetup info, the `<br>` tag tells the web browser to
    start the next item on the next line, with no extra space between the two lines.
    If your page has extra space between these lines, it means ChatGPT has used `<p>`
    (for paragraph) tags instead of `<br>` (for line break) tags. Delete the `<p>`
    tag at the beginning of each line and replace the `</p>` tag at the end of each
    line with `<br>`.
  id: totrans-931
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在书籍信息和聚会信息中，`<br>`标签告诉网络浏览器在下一行开始下一个项目，两行之间没有额外空间。如果您的页面在这两行之间有额外空间，这意味着ChatGPT使用了`<p>`（段落）标签而不是`<br>`（换行）标签。请在每行的开头删除`<p>`标签，并将每行末尾的`</p>`标签替换为`<br>`。
- en: In the social media links, the `target="_blank"` code tells the web browser
    to open the link in a new tab. To open the link in the same tab, instead (which
    is the preferred method), you can delete the `target="_blank"` code from each
    link.
  id: totrans-932
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在社交媒体链接中，`target="_blank"`代码告诉网络浏览器在新标签页中打开链接。如果要（首选方法）在同一标签页中打开链接，请从每个链接中删除`target="_blank"`代码。
- en: In the social media links, the `class` values reference a particular Font Awesome
    icon to display as the link text. For example, `class="fab fa-instagram"` displays
    the Instagram icon.
  id: totrans-933
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在社交媒体链接中，`class`值引用特定的Font Awesome图标以显示为链接文本。例如，`class="fab fa-instagram"`将显示Instagram图标。
- en: 'Finally, note that the HTML code includes the following line:'
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，请注意，HTML代码中包含以下行：
- en: '[PRE61]'
  id: totrans-935
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: This tag tells the web browser where to find the CSS code, which I describe
    in the next section.
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 此标签告诉网络浏览器在哪里找到CSS代码，我将在下一节中描述。
- en: 4.3.2 Examining the CSS
  id: totrans-937
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.2 检查CSS
- en: 'ChatGPT’s generated CSS code for my book club page is shown here:'
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT为我书友会页面生成的CSS代码如下所示：
- en: '[PRE62]'
  id: totrans-939
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: ① Applies Source Code Pro to the page text
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: ① 将Source Code Pro应用于页面文字
- en: ② Sets the maximum page width to 800 px
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: ② 设置最大页面宽度为800 px
- en: ③ Centers the page
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 使页面居中
- en: ④ Sets the header background to darkorchid
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 将页眉背景设置为暗紫色
- en: ⑤ Adds 10 px of space around the header text
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 在页眉文字周围添加10 px的空间
- en: ⑥ Floats the logo to the left
  id: totrans-945
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 将标志浮动到左侧
- en: ⑦ Applies Fira Sans Extra Condensed to the title
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 将Fira Sans Extra Condensed字体应用于标题
- en: '⑧ Styles the title: font size 48 px, color lightsteelblue, right-aligned'
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 设置标题样式：字体大小48 px，颜色浅钢蓝色，右对齐
- en: '⑨ Styles the tagline: font size 24 px, color lightsteelblue, italics, right-aligned'
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ 设置标语样式：字体大小24 px，颜色浅钢蓝色，斜体，右对齐
- en: ⑩ Sets the regular page font size to 20 px
  id: totrans-949
  prefs: []
  type: TYPE_NORMAL
  zh: ⑩ 将常规页面字体大小设置为20 px
- en: '⑪ Styles the second-level headings: Fira Sans Extra Condensed font, font size
    30 px, color darkorchid, top margin 15 px'
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: ⑪ 设置二级标题样式：Fira Sans Extra Condensed字体，字体大小30 px，颜色暗紫色，顶部边距15 px
- en: ⑫ Floats the book cover to the right
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: ⑫ 将书封浮动到右侧
- en: ⑬ Applies the color mediumseagreen to the bold text
  id: totrans-952
  prefs: []
  type: TYPE_NORMAL
  zh: ⑬ 将中等海绿色应用于粗体文字
- en: '⑭ Styles the footer: background color darkorchid, text color lightsteelblue,
    padding 5 px, top margin 10 px, and text centered'
  id: totrans-953
  prefs: []
  type: TYPE_NORMAL
  zh: ⑭ 设置页脚样式：背景颜色为暗紫色，文字颜色为浅钢蓝色，内边距5 px，顶部边距10 px，文字居中
- en: '⑮ Styles the footer links: left and right margins 10 px, text color lightsteelblue,
    no underline'
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: ⑮ 设置页脚链接样式：左右边距10 px，文字颜色浅钢蓝色，无下划线
- en: If you like, you can use these annotations to tweak your web page code, as I
    describe in the next section.
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您愿意，可以使用这些注释来调整您的网页代码，正如我在下一节中描述的那样。
- en: 4.4 Customizing the page
  id: totrans-956
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.4 自定义页面
- en: 'If ChatGPT’s book club page code isn’t right for some reason, you have two
    ways to fix things:'
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 如果由于某种原因ChatGPT的书友会页面代码不正确，您有两种方法来修复它：
- en: If the page is far from what you want, rewrite your prompt, start a new chat
    session, and try again.
  id: totrans-958
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果页面与您期望的相差甚远，请重新编写提示，开始一个新的聊天会话，并再次尝试。
- en: If the page is close to what you want, ask ChatGPT to make the necessary adjustments.
    Be sure you submit this request in the same session as your original prompt.
  id: totrans-959
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果页面接近您想要的效果，请要求ChatGPT进行必要的调整。确保您在原始提示的同一会话中提交此请求。
- en: For the second case, if the code produced by ChatGPT really does just need some
    small tweaks, consider modifying the code manually based on the annotations I
    provided in the previous section. Because you don’t know web page code, it’s best
    not to try to make any major changes. However, that still leaves quite a few ways
    you can alter the code to get the page you want.
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: '对于第二种情况，如果ChatGPT生成的代码确实只需要一些小的调整，请考虑根据我在上一节中提供的注释手动修改代码。由于您不了解网页代码，最好不要尝试进行任何重大更改。然而，这仍然留下了一些方法可以修改代码以获得您想要的页面。 '
- en: 'First, here are some customization suggestions for the HTML code:'
  id: totrans-961
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，这里有一些对HTML代码的定制建议：
- en: 'In the header, you can edit the title or tagline. Just be sure not to edit
    or delete the associated HTML tags: `<h1>` and `</h1>` for the title; `<p>` and
    `</p>` for the tagline.'
  id: totrans-962
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在页眉中，您可以编辑标题或标语。只是确保不要编辑或删除相关的 HTML 标签：标题使用 `<h1>` 和 `</h1>`；标语使用 `<p>` 和 `</p>`。
- en: In the main section of the HTML code, you can add, delete, or edit the text
    in each second-level heading (that is, the text between the `<h2>` and `</h2>`
    tags; be sure you don’t edit or delete these tags).
  id: totrans-963
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 HTML 代码的主要部分，您可以在每个二级标题（即 `<h2>` 和 `</h2>` 标签之间的文本）中添加、删除或编辑文本。确保您不要编辑或删除这些标签。
- en: In the main section of the HTML code, you can add, delete, or edit the text
    in each paragraph (that is, the text between the `<p>` and `</p>` tags; be sure
    you don’t edit or delete these tags).
  id: totrans-964
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 HTML 代码的主要部分，您可以在每个段落（即 `<p>` 和 `</p>` 标签之间的文本）中添加、删除或编辑文本。确保您不要编辑或删除这些标签。
- en: In the main section of the HTML code, you can add a new section by typing a
    `<section>` tag followed by the `</section>` tag. Between these tags, you can
    add a heading (some text between the `<h2>` and `</h2>` tags) and a paragraph
    (some text between the `<p>` and `</p>` tags).
  id: totrans-965
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 HTML 代码的主要部分，您可以通过输入 `<section>` 标签后跟 `</section>` 标签来添加一个新部分。在这些标签之间，您可以添加一个标题（一些在
    `<h2>` 和 `</h2>` 标签之间的文本）和一个段落（一些在 `<p>` 和 `</p>` 标签之间的文本）。
- en: 'Now, here are a few customization ideas for the CSS code:'
  id: totrans-966
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这里有一些 CSS 代码的定制想法：
- en: If you want your page to have a different maximum width, change the `max`-`width`
    value to something other than `800px`. For example, if you increase the font size
    (as I describe in a moment), you may want to increase the page width; decreasing
    the font size means you can decrease the page width. Try out different widths
    (usually within the range of 600 px on the low side and 1,000 px on the high side)
    until you find one that suits your page.
  id: totrans-967
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您想使您的页面具有不同的最大宽度，将 `max-width` 值更改为 `800px` 以外的值。例如，如果您增加字体大小（如我稍后所述），您可能想增加页面宽度；减小字体大小意味着您可以减小页面宽度。尝试不同的宽度（通常在
    600 px 的低端和 1,000 px 的高端之间），直到找到适合您页面的宽度。
- en: For any color value, you can change the existing color to a different color
    keyword. Note, however, that changing a single color can throw off your page color
    scheme. If you don’t like your page colors, pick a new primary color and then
    prompt ChatGPT again to create a color scheme from that hue.
  id: totrans-968
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何颜色值，您可以将现有颜色更改为不同的颜色关键字。请注意，然而，更改单个颜色可能会破坏您的页面配色方案。如果您不喜欢您的页面颜色，请选择一个新的主颜色，然后再次提示
    ChatGPT 从该色调创建配色方案。
- en: For any font size value, you can change the number to increase or decrease the
    font size. For example, if your text feels cramped and hard to read, try bumping
    up the font size value by a pixel or two. Just make sure you leave the px unit
    in place.
  id: totrans-969
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何字体大小值，您可以通过更改数字来增加或减少字体大小。例如，如果您的文本感觉拥挤且难以阅读，尝试通过像素或两个增加字体大小值。只是确保您保留 px
    单位。
- en: For any padding or margin value, you can change the number to increase or decrease
    the padding or margins. For example, if your page content seems crowded, you can
    open things up by increasing the padding and/or the margins. Similarly, if your
    page items seem disconnected from each other, try decreasing the margins. In each
    case, be sure to leave the px unit in place.
  id: totrans-970
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何填充或边距值，您可以通过更改数字来增加或减少填充或边距。例如，如果您的页面内容看起来很拥挤，您可以通过增加填充和/或边距来打开空间。同样，如果您的页面项目看起来彼此不相连，尝试减少边距。在每种情况下，请确保保留
    px 单位。
- en: To make your page code more accessible, consider converting all px measurements
    to rem measurements. 1 rem is, by default, equivalent to 16 px, so 20 px is 1.25 rem;
    24 px is 1.5 rem; 32 px is 2 rem; 48 px is 3 rem; and so on. The rem unit is more
    accessible because it measures font sizes relative to the default font size the
    browser user has defined in their browser settings.
  id: totrans-971
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要使您的页面代码更易于访问，请考虑将所有 px 测量转换为 rem 测量。默认情况下，1 rem 等于 16 px，因此 20 px 等于 1.25 rem；24
    px 等于 1.5 rem；32 px 等于 2 rem；48 px 等于 3 rem；依此类推。rem 单位更易于访问，因为它测量的是相对于浏览器用户在其浏览器设置中定义的默认字体大小的字体大小。
- en: Summary
  id: totrans-972
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Almost all web pages start with a header that includes at least a logo, the
    page title, and the page tagline or subtitle.
  id: totrans-973
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 几乎所有网页都以包含至少标志、页面标题和页面标语或副标题的页眉开始。
- en: Most web pages finish with a footer that includes at least a copyright notice
    and a few social media links.
  id: totrans-974
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大多数网页都以包含至少版权声明和一些社交媒体链接的页脚结束。
- en: 'Each element on the page is surrounded by an invisible box that consists of
    four parts: the content, which is the text or image contained in the box; the
    padding, which is the whitespace between the content and the border; the border,
    which runs along the outer edges of the padding area and surrounds the content
    and padding with lines; and the margin, which is the extra whitespace added outside
    of the top, right, bottom, and left borders.'
  id: totrans-975
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面上的每个元素都被一个由四个部分组成的不可见框包围：内容，即框内包含的文本或图像；填充，即内容与边框之间的空白；边框，它沿着填充区域的边缘运行，用线条包围内容和填充；以及外边距，即在顶部、右侧、底部和左侧边框之外添加的额外空白。
- en: To include an image in your page, you need to know the name of the image file,
    and you need to store the image file in the same folder as your web page code
    files.
  id: totrans-976
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要在你的页面上包含图像，你需要知道图像文件的名称，并且需要将图像文件存储在与你的网页代码文件相同的文件夹中。
- en: To include social media links in your page, you need to know the username for
    each social media account.
  id: totrans-977
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要在你的页面上包含社交媒体链接，你需要知道每个社交媒体账户的用户名。
- en: For best results, your page prompt should be as specific as possible, including
    colors, font sizes, and heading levels.
  id: totrans-978
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了获得最佳效果，你的页面提示应该尽可能具体，包括颜色、字体大小和标题级别。
- en: Save the generated HTML to the index.xhtml file and the generated CSS to the
    filename suggested by ChatGPT in the HTML code, usually styles.css.
  id: totrans-979
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将生成的HTML保存到index.xhtml文件中，将生成的CSS保存到ChatGPT在HTML代码中建议的文件名中，通常是styles.css。
- en: 5 Publishing page posts
  id: totrans-980
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5 发布页面帖子
- en: This chapter covers
  id: totrans-981
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖
- en: Collaborating with ChatGPT to publish posts as accordions
  id: totrans-982
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与ChatGPT协作发布可折叠的帖子
- en: Generating new images using DALL-E
  id: totrans-983
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用DALL-E生成新图像
- en: Prompting ChatGPT to build an online journal page
  id: totrans-984
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示ChatGPT构建在线期刊页面
- en: Examining and customizing the ChatGPT web page code
  id: totrans-985
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查和自定义ChatGPT网页代码
- en: Although many people dislike writing, lots of us truly enjoy the act of putting
    pen to paper, or fingers to keyboard. Many of us love to write so much that, besides
    our more “serious” writing, we keep up a regular writing habit in the form of
    a frequently updated diary or journal. And a surprising number of those folks
    have a hankering to post these musings online. In fact, whenever I talk to people
    about building web pages, by far the most common question is, “How do I start
    an online journal/diary/blog?”
  id: totrans-986
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然许多人不喜欢写作，但许多人真正享受将笔尖触及纸张，或者手指敲击键盘的行为。我们中许多人非常喜欢写作，以至于除了我们更“严肃”的写作外，我们还保持着一种定期更新的日记或期刊形式的写作习惯。令人惊讶的是，这些人中有很多人渴望将这些沉思在线发布。事实上，每次我与人谈论构建网页时，最常见的问题无疑是，“我如何开始一个在线期刊/日记/博客？”
- en: Fortunately, if you have some stuff already written, it’s straightforward to
    get ChatGPT to help you create a web page where you can publish your prose for
    all the world to read. You can also use AI to generate new images for things like
    site logos, icons, and page illustrations. This chapter also shows you how to
    use the combination of ChatGPT and OpenAI’s DALL-E image-creation model to generate
    whatever images you need for your page.
  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，如果你已经有一些东西写好了，让ChatGPT帮助你创建一个网页，你可以在那里发布你的散文，让全世界都能阅读。你还可以使用AI生成网站标志、图标和页面插图等新图像。本章还展示了如何使用ChatGPT和OpenAI的DALL-E图像创建模型组合来生成你页面所需的任何图像。
- en: All this information goes into a detailed prompt that you’ll pass along to ChatGPT
    to produce the code for an online journal page where you can post whatever writing
    you want to share. This chapter also provides a high-level explanation of the
    code generated by ChatGPT and even gives a few tips for customizing the code manually
    to get everything just the way you want.
  id: totrans-988
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些信息都包含在一个详细的提示中，你将传递给ChatGPT以生成在线期刊页面的代码，你可以在该页面上发布你想要分享的任何写作。本章还提供了对ChatGPT生成的代码的高级解释，甚至给出了一些手动定制代码的技巧，以获得你想要的一切。
- en: 5.1 Understanding this chapter’s project
  id: totrans-989
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.1 理解本章的项目
- en: 'In this chapter, you’re going to enlist ChatGPT to help you build a simple
    web page for an online journal. The final page will include the following components:'
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将让ChatGPT帮助你构建一个在线期刊的简单网页。最终页面将包括以下组件：
- en: 'A header element that includes the following:'
  id: totrans-991
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含以下内容的页眉元素：
- en: The journal logo (generated by Dall-E)
  id: totrans-992
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 期刊标志（由Dall-E生成）
- en: The journal title
  id: totrans-993
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 期刊标题
- en: The journal tagline
  id: totrans-994
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 期刊标语
- en: A main element where the journal entries appear. Each entry shows only its title
    at first but, when clicked, shows the entry content.
  id: totrans-995
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个主要元素，其中显示期刊条目。每个条目最初只显示其标题，但点击后则显示条目内容。
- en: A footer element that includes a copyright notice.
  id: totrans-996
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明页脚元素。
- en: Figure 5.1 shows an example of the type of page you’ll build with ChatGPT’s
    help in this chapter. The simplicity of this page means you can easily modify
    it to store entries for a blog or travel diary, essays, book or movie reviews,
    fan fiction stories, or really any kind of periodic writing.
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.1展示了本章中在ChatGPT的帮助下你将构建的页面类型示例。这个页面的简单性意味着你可以轻松地修改它来存储博客或旅行日记的条目、论文、书籍或电影评论、粉丝小说故事，或任何类型的定期写作。
- en: '![](../../OEBPS/Images/CH05_F01_McFedries3.png)'
  id: totrans-998
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH05_F01_McFedries3.png)'
- en: Figure 5.1 An online journal page generated by ChatGPT
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.1 由ChatGPT生成的在线期刊页面
- en: 5.2 Building the online journal page
  id: totrans-1000
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.2 构建在线期刊页面
- en: Before crafting the prompt that will generate the code for your online journal
    page, you need a bit of background about a web page element called an accordion
    as well as how to get AI to create new images from text prompts. The next couple
    of sections provide the details.
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: 在为你的在线期刊页面生成代码的提示之前，你需要了解一些关于网页元素手风琴的背景知识，以及如何让AI根据文本提示创建新图像。接下来的几个部分将提供详细信息。
- en: 5.2.1 Working with accordions
  id: totrans-1002
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.2.1 与手风琴式布局一起工作
- en: 'The only new web page technology that you learn about in this chapter is the
    *accordion*, which is an interactive HTML element that enables users to toggle
    between showing just an item’s title and the item’s title and content. An accordion
    consists of two elements:'
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中你将了解的唯一新网页技术是*手风琴*，这是一个交互式HTML元素，使用户能够在仅显示项目标题和项目标题及内容之间切换。手风琴由两个元素组成：
- en: '*Summary*—An element that acts as a title or description for the accordion'
  id: totrans-1004
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*摘要*—一个作为手风琴标题或描述的元素'
- en: '*Details*—An element that contains the entirety of the accordion content, including
    the summary element and any other content you provide (such as one or more articles,
    headings, paragraphs, images, and so on)'
  id: totrans-1005
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*详细信息*—一个包含手风琴全部内容的元素，包括摘要元素和任何其他你提供的内容（如一篇文章或多个文章、标题、段落、图像等）'
- en: The idea behind an accordion is that, by default, all you see at first is the
    summary element. For example, figure 5.2 shows part of a web page with four accordions.
    Each is currently showing only its summary element, such as “Hello World!” at
    the top, which is the summary text for the first accordion.
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 手风琴背后的想法是，默认情况下，你首先看到的是摘要元素。例如，图5.2显示了一个包含四个手风琴的网页的一部分。每个手风琴目前只显示其摘要元素，如顶部“Hello
    World!”，这是第一个手风琴的摘要文本。
- en: '![](../../OEBPS/Images/CH05_F02_McFedries3.png)'
  id: totrans-1007
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH05_F02_McFedries3.png)'
- en: Figure 5.2 A web page with four accordions, each of which displays only its
    summary text
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.2 一个包含四个手风琴的网页，每个手风琴只显示其摘要文本
- en: Notice, too, the right-pointing arrow to the left of each summary element’s
    text. This arrow indicates that more content is available. When you click a summary
    (or its arrow), the accordion expands to show all the content in the accordion’s
    details element. For example, clicking the “Hello World!” summary expands the
    first accordion, as shown in figure 5.3\. Notice that the accordion’s arrow now
    points down to indicate that the accordion’s full content is displayed. Clicking
    the summary text (or arrow) again hides the detailed content.
  id: totrans-1009
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，每个摘要元素文本左侧的指向右方的箭头。这个箭头表示还有更多内容可用。当你点击一个摘要（或其箭头）时，手风琴展开以显示手风琴的详细信息元素中的所有内容。例如，点击“Hello
    World!”摘要展开第一个手风琴，如图5.3所示。注意，手风琴的箭头现在指向下方，表示手风琴的完整内容已显示。再次点击摘要文本（或箭头）将隐藏详细内容。
- en: '![](../../OEBPS/Images/CH05_F03_McFedries3.png)'
  id: totrans-1010
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH05_F03_McFedries3.png)'
- en: Figure 5.3 Clicking the first summary element opens the accordion to display
    its full content.
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.3 点击第一个摘要元素打开手风琴以显示其全部内容。
- en: 'To prompt ChatGPT to use accordions on your page, you can include an instruction
    similar to the following:'
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: 要提示ChatGPT在你的页面上使用手风琴，你可以包含以下类似的指令：
- en: '[PRE63]'
  id: totrans-1013
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: The point of using accordions is that you can fit quite a few posts on your
    page without overwhelming visitors with a ton of content. The best news? Just
    tell ChatGPT that you want to use accordions on your page, and it will handle
    all the HTML and CSS details for you.
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 使用手风琴的目的在于，你可以在页面上放置相当多的帖子，而不会因为大量内容而使访客感到不知所措。最好的消息是？只需告诉ChatGPT你希望在页面上使用手风琴，它就会为你处理所有的HTML和CSS细节。
- en: 5.2.2 Generating images with GPT-4 and DALL-E
  id: totrans-1015
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.2.2 使用GPT-4和DALL-E生成图像
- en: It’s delightfully amazing that GPT-4 can generate essays, poems, emails, and,
    of course, web page code from relatively simple prompts. However, if there’s one
    feature that makes GPT-4 “indistinguishable from magic” (in Arthur C. Clarke’s
    words), it’s the model’s ability to convert natural language into images. That
    is, given a text prompt that describes something (a scene, an object, a person,
    and so on), GPT-4 can use that description to generate an image to match.
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4 能够从相对简单的提示中生成文章、诗歌、电子邮件，当然还有网页代码，这令人愉快且令人惊叹。然而，如果有一个功能使 GPT-4 “难以区分于魔法”（用亚瑟·C·克拉克的话说），那就是模型将自然语言转换为图像的能力。也就是说，给定一个描述某物（场景、物体、人物等）的文本提示，GPT-4
    可以使用该描述生成与之匹配的图像。
- en: The tool behind this seemingly magical feat is DALL-E (a blend of the *WALL-E*
    movie title and the last name of the artist Salvador Dali), an OpenAI model optimized
    for converting natural language text descriptions into images.
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: 这项看似神奇的壮举背后的工具是 DALL-E（结合了 *WALL-E* 电影标题和艺术家萨尔瓦多·达利的姓氏），这是一个针对将自然语言文本描述转换为图像进行优化的
    OpenAI 模型。
- en: Warning As you learn in the sections that follow, DALL-E is pretty good at turning
    text into images, but it’s *only* pretty good. It will only rarely generate images
    that you can use directly. You’ll either have to tweak the images yourself in
    a graphics program or enlist the help of a graphics pro to modify a DALL-E image
    or use a generated image as a prototype for the final design.
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 警告 如您在接下来的章节中所学，DALL-E 在将文本转换为图像方面相当出色，但**仅此而已**。它很少会直接生成您可以直接使用的图像。您可能需要自己使用图形程序调整图像，或者请图形专业人士帮助修改
    DALL-E 图像，或者将生成的图像作为最终设计的原型。
- en: Accessing DALL-E
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: 访问 DALL-E
- en: 'You have two ways to access DALL-E:'
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: 您有两种方式可以访问 DALL-E：
- en: '*OpenAI DALL-E app*—This app gives you direct access to DALL-E via your OpenAI
    account. There are a couple of ways to get to the app (which is shown in figure
    5.4):'
  id: totrans-1021
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*OpenAI DALL-E 应用程序*—此应用程序通过您的 OpenAI 账户直接访问 DALL-E。有几个方法可以访问该应用程序（如图 5.4 所示）：'
- en: Go to [https://openai.com](https://openai.com), click Menu, click Log In, and
    then log in to your OpenAI account. In the selection of OpenAI tools that appear,
    click DALL-E.
  id: totrans-1022
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问 [https://openai.com](https://openai.com)，点击菜单，点击登录，然后登录您的 OpenAI 账户。在出现的
    OpenAI 工具选择中，点击 DALL-E。
- en: Go to [https://openai.com/dall-e-2](https://openai.com/dall-e-2), click Try
    DALL-E, and then log in to your OpenAI account.
  id: totrans-1023
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问 [https://openai.com/dall-e-2](https://openai.com/dall-e-2)，点击“尝试 DALL-E”，然后登录您的
    OpenAI 账户。
- en: '![](../../OEBPS/Images/CH05_F04_McFedries3.png)'
  id: totrans-1024
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH05_F04_McFedries3.png)'
- en: Figure 5.4 The OpenAI DALL-E app
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.4 OpenAI DALL-E 应用程序
- en: '*Copilot Image Creator*—Using Microsoft Edge, go to [https://www.bing.com/images/create](https://www.bing.com/images/create)
    (refer to figure 5.5) or [https://copilot.microsoft.com/images/create](https://copilot.microsoft.com/images/create);
    or, in Copilot, direct your prompt to Image Creator (for example, `Ask Image Creator
    for an image of a dog running on the moon`).'
  id: totrans-1026
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*协作者图像创建器*—使用 Microsoft Edge，访问 [https://www.bing.com/images/create](https://www.bing.com/images/create)（参见图
    5.5）或 [https://copilot.microsoft.com/images/create](https://copilot.microsoft.com/images/create)；或者在
    Copilot 中，将您的提示直接指向图像创建器（例如，`Ask Image Creator for an image of a dog running on
    the moon`）。'
- en: '![](../../OEBPS/Images/CH05_F05_McFedries3.png)'
  id: totrans-1027
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH05_F05_McFedries3.png)'
- en: Figure 5.5 Copilot Image Creator
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.5 协作者图像创建器
- en: Note Using DALL-E via the Open AI app isn’t free. To use it, you need to purchase
    credits, where one credit is good for a single DALL-E request. As I write this,
    you can buy 115 credits for US $15 through your OpenAI account. Note that using
    DALL-E via Microsoft Copilot is free.
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: 注意 通过 Open AI 应用程序使用 DALL-E 是不免费的。要使用它，您需要购买积分，其中一张积分可用于一个 DALL-E 请求。在我写这篇文章的时候，您可以通过您的
    OpenAI 账户以 15 美元的价格购买 115 张积分。请注意，通过 Microsoft Copilot 使用 DALL-E 是免费的。
- en: Prompting DALL-E
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: 指示 DALL-E
- en: Getting DALL-E to produce satisfying images is a bit of an art in itself. The
    biggest mistake that DALL-E rookies make is treating the app like a chatbot and
    providing it with instructions for what you want it to do. Instead, assume that
    your image already exists and that what you’re writing is a detailed description
    for a person who is blind or has some other visual impairment that prevents them
    from seeing the image.
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: 让 DALL-E 生成令人满意的图像本身就是一种艺术。DALL-E 新手犯的最大错误是将应用程序当作聊天机器人，并给它提供您希望它执行的操作的指令。相反，假设您的图像已经存在，您所写的是为盲人或视力有其他障碍的人提供的详细描述，这些障碍使他们无法看到图像。
- en: 'In your description, include not only the elements you want to see in the image
    but also one or more (more is usually better) keywords that specify the exact
    style of the image. Here are some ideas:'
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的描述中，不仅要包括您想要在图像中看到的元素，还要包括一个或多个（通常越多越好）关键词，以指定图像的确切风格。以下是一些想法：
- en: '*The mood*—Use keywords that evoke a positive mood (*bright*, *light*, *vibrant*,
    *peaceful*) or a negative mood (*gloomy*, *dark*, *muted*, *melancholic*, *stormy*).'
  id: totrans-1033
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*情绪*—使用唤起积极情绪（*明亮，* *轻快，* *生动，* *平和*）或消极情绪（*忧郁，* *黑暗，* *柔和，* *忧郁，* *暴风雨*）的关键词。'
- en: '*The overall aesthetic*—For example, *Gothic*, *steampunk*, *cyberpunk*, *post-apocalyptic*,
    *Afro-futurism*.'
  id: totrans-1034
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*整体美学*—例如，*哥特式，* *蒸汽朋克，* *赛博朋克，* *后末日，* *非洲未来主义*。'
- en: '*The medium*—For example, *photograph*, *illustration*, *painting*, *cartoon*.'
  id: totrans-1035
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*媒介*—例如，*摄影，* *插图，* *绘画，* *卡通*。'
- en: '*The specifics of the medium*—Some examples:'
  id: totrans-1036
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*媒介的具体细节*—一些示例：'
- en: '*Photograph*—Film type (*color,* *black and white*), context (*indoors,* *outdoors*),
    lighting, angle (*long*, *medium*, *close-up*), depth of field (*shallow,* *deep*).'
  id: totrans-1037
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*摄影*—电影类型（*彩色，* *黑白*），环境（*室内，* *室外*），照明，角度（*长，* *中，* *特写*），景深（*浅，* *深*）。'
- en: '*Illustration*—Medium (*pencil*, *ink*, *charcoal*, *stencil*, *crayon*, and
    so on) and style (*digital art*, *collage*, *anime*, *Art Deco*, *Bauhaus*, and
    so on).'
  id: totrans-1038
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*插图*—媒介（*铅笔，* *墨水，* *炭笔，* *模板，* *蜡笔*等）和风格（*数字艺术，* *拼贴，* *动漫，* *装饰艺术，* *包豪斯*等）。'
- en: '*Painting*—Medium (*watercolor*, *oil*, and so on) and style (*Impressionist*,
    *Mannerist*, *Symbolist*, *Art Nouveau*, and so on).'
  id: totrans-1039
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*绘画*—媒介（*水彩，* *油画*等）和风格（*印象派，* *风格主义，* *象征主义，* *新艺术*等）。'
- en: Note The latest version of DALL-E (DALL-E 3) should be generally available by
    the time you read this. That’s good news because, unlike previous versions of
    DALL-E, this latest version is much better at rendering text. If your image requires
    text, go ahead and include it in your description. However, check the resulting
    image text carefully because DALL-E 3 often either omits a letter or adds an extra
    letter.
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：到您阅读本文时，DALL-E的最新版本（DALL-E 3）应该已经普遍可用。这是个好消息，因为与DALL-E的先前版本相比，这个最新版本在渲染文本方面要好得多。如果您的图像需要文本，请将其包含在您的描述中。但是，请仔细检查生成的图像文本，因为DALL-E
    3经常要么省略一个字母，要么添加一个额外的字母。
- en: 'To give you a sense of how prompting DALL-E works, it helps to go through a
    few examples. For my online journal page, I prompted Copilot as follows:'
  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让您了解如何提示DALL-E工作，通过几个示例进行操作是有帮助的。对于我的在线日记页面，我向Copilot提示如下：
- en: '[PRE64]'
  id: totrans-1042
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: Figure 5.6 shows the images I received. The one in the top left is pretty good!
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.6展示了我收到的图像。左上角的那个相当不错！
- en: '![](../../OEBPS/Images/CH05_F06_McFedries3.png)'
  id: totrans-1044
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH05_F06_McFedries3.png)'
- en: Figure 5.6 Cartoons generated by Image Creator based on my prompt
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.6展示了根据我的提示由Image Creator生成的卡通。
- en: 'Here’s an example prompt for a photograph that includes the keywords `medium
    shot` and `fluorescent lighting`:'
  id: totrans-1046
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个包含关键词`medium shot`和`fluorescent lighting`的摄影提示示例：
- en: '[PRE65]'
  id: totrans-1047
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: Figure 5.7 shows an image that DALL-E generated from this prompt.
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.7展示了DALL-E根据这个提示生成的图像。
- en: '![](../../OEBPS/Images/CH05_F07_McFedries3.png)'
  id: totrans-1049
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH05_F07_McFedries3.png)'
- en: Figure 5.7 A photographic image generated by DALL-E
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.7 DALL-E生成的摄影图像
- en: 'Here’s a prompt for a digital art illustration that uses the keywords `post-apocalyptic`
    and `desolate`:'
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个使用关键词`post-apocalyptic`和`desolate`的数字艺术插图提示：
- en: '[PRE66]'
  id: totrans-1052
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: Figure 5.8 shows an example DALL-E image generated from this prompt.
  id: totrans-1053
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.8展示了从该提示生成的DALL-E图像示例。
- en: '![](../../OEBPS/Images/CH05_F08_McFedries3.png)'
  id: totrans-1054
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH05_F08_McFedries3.png)'
- en: Figure 5.8 An illustration generated by DALL-E
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.8展示了DALL-E生成的插图。
- en: 'Here’s a prompt for an illuminated manuscript page that uses the keywords `bright`
    and `lavish`:'
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个使用关键词`bright`和`lavish`的插图提示：
- en: '[PRE67]'
  id: totrans-1057
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: Figure 5.9 shows an image that DALL-E created from this prompt.
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.9展示了DALL-E根据这个提示创建的图像。
- en: '![](../../OEBPS/Images/CH05_F09_McFedries3.png)'
  id: totrans-1059
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH05_F09_McFedries3.png)'
- en: Figure 5.9 A DALL-E-generated illuminated manuscript page with cats
  id: totrans-1060
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.9展示了DALL-E生成的带有猫的插图。
- en: If DALL-E generates an image that you want to use (either to edit or to serve
    as a prototype), your next step is to save that image to your computer.
  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: 如果DALL-E生成了一个您想要使用的图像（无论是用于编辑还是作为原型），您的下一步是将该图像保存到您的电脑上。
- en: Saving a generated image
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: 保存生成的图像
- en: 'Once you have an image you want to use on your web page, you need to save the
    image to your computer:'
  id: totrans-1063
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您有了想要在网页上使用的图像，您需要将该图像保存到您的电脑上：
- en: '*OpenAI DALL-E app*—Click the image, click the three-dot (...) button that
    appears in the upper-right corner of the image, and then click Download.'
  id: totrans-1064
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*OpenAI DALL-E app*—点击图片，点击图片右上角出现的三个点 (...) 按钮，然后点击下载。'
- en: '*Copilot Image Creator*—Click the image, and then click Download.'
  id: totrans-1065
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Copilot Image Creator*—点击图片，然后点击下载。'
- en: Either way, the image lands in your computer’s Downloads folder. Move the image
    file to the same folder that holds your HTML and CSS files (which you’ll create
    in the next section), and then rename the image with your preferred filename.
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: 无论哪种方式，图片都会出现在您的电脑下载文件夹中。将图片文件移动到包含您的HTML和CSS文件（您将在下一节中创建）的同一文件夹中，然后使用您首选的文件名重命名图片。
- en: Now that you know how to get ChatGPT to help you write and edit text and generate
    images, you’re ready to build the prompt that generates the web page code for
    an online journal.
  id: totrans-1067
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经知道如何让ChatGPT帮助您编写和编辑文本以及生成图像，您就可以构建生成在线期刊网页代码的提示了。
- en: 5.2.3 Crafting the prompt
  id: totrans-1068
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.2.3 构建提示
- en: 'This chapter’s project is an online journal page. Before proceeding, you should
    have the following at hand:'
  id: totrans-1069
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的项目是一个在线期刊页面。在继续之前，您应该有以下准备：
- en: A page logo, title, and tagline
  id: totrans-1070
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面标志、标题和标语。
- en: The names of the typefaces you want to use for the page headings and page text
  id: totrans-1071
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您想要用于页面标题和页面文本的字体名称。
- en: The names of the colors you want to apply to the page backgrounds and text
  id: totrans-1072
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您想要应用于页面背景和文本的颜色名称。
- en: Refer to chapter 3 to learn more about these design elements and how to prompt
    ChatGPT for title, typeface, and color suggestions.
  id: totrans-1073
  prefs: []
  type: TYPE_NORMAL
  zh: 参考第3章了解这些设计元素以及如何提示ChatGPT获取标题、字体和颜色建议。
- en: 'Even if you haven’t got some writing to publish, you can still go through the
    process of prompting ChatGPT for your online journal HTML and CSS because the
    code will include placeholders for your text. You want to let ChatGPT know right
    away both that you want it to help you build a web page and that you don’t know
    how to code so it will have to generate the code for you. That’s all done by starting
    your prompt like this:'
  id: totrans-1074
  prefs: []
  type: TYPE_NORMAL
  zh: 即使您没有要发布的写作，您也可以通过提示ChatGPT生成您的在线期刊HTML和CSS的过程，因为代码将包括您的文本占位符。您需要立即让ChatGPT知道您希望它帮助您构建网页，并且您不知道如何编码，因此它将为您生成代码。这一切都是通过以下方式开始的：
- en: '[PRE68]'
  id: totrans-1075
  prefs: []
  type: TYPE_PRE
  zh: '[PRE68]'
- en: 'You then specify the content of your page, including the following (refer to
    figure 5.10):'
  id: totrans-1076
  prefs: []
  type: TYPE_NORMAL
  zh: 您然后指定页面内容，包括以下内容（参见图5.10）：
- en: A header that includes your logo, page title, and tagline.
  id: totrans-1077
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含您的标志、页面标题和标语的头。
- en: A main element where each entry is an accordion using the HTML `summary` and
    `details` elements.
  id: totrans-1078
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主要元素，其中每个条目都是一个使用HTML的`summary`和`details`元素的折叠面板。
- en: For each entry, the `summary` text is the entry title, and the `details` element
    includes the entry date followed by the entry text.
  id: totrans-1079
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每个条目，`summary` 文本是条目标题，而`details` 元素包括条目日期和条目文本。
- en: A footer that includes a copyright notice.
  id: totrans-1080
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚。
- en: '![](../../OEBPS/Images/CH05_F10_McFedries3.png)'
  id: totrans-1081
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH05_F10_McFedries3.png)'
- en: Figure 5.10 The sections of the online journal page
  id: totrans-1082
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.10 在线期刊页面的部分
- en: 'Next, you ask ChatGPT to generate the CSS for how you want your page formatted:'
  id: totrans-1083
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您要求ChatGPT生成您想要页面格式的CSS：
- en: '[PRE69]'
  id: totrans-1084
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: 'You then specify the formatting, including the following:'
  id: totrans-1085
  prefs: []
  type: TYPE_NORMAL
  zh: 您然后指定格式，包括以下内容：
- en: The page background color and text color.
  id: totrans-1086
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面背景颜色和文本颜色。
- en: The type sizes you want to use for the page title and tagline.
  id: totrans-1087
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您想要用于页面标题和标语的字体大小。
- en: The type size of the `summary` elements.
  id: totrans-1088
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`summary` 元素的字体大小。'
- en: The fonts to use for the headings, summaries, and regular page text.
  id: totrans-1089
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于标题、摘要和常规页面文本的字体。
- en: A maximum width for the page. This prevents the lines of text from getting too
    long. A maximum length of 850 px is fine for most pages.
  id: totrans-1090
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面的最大宽度。这可以防止文本行过长。对于大多数页面，850 px的最大长度是合适的。
- en: 'Here’s an example prompt for my own online journal page:'
  id: totrans-1091
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我自己的在线期刊页面的一个示例提示：
- en: '[PRE70]'
  id: totrans-1092
  prefs: []
  type: TYPE_PRE
  zh: '[PRE70]'
- en: 'ChatGPT should create the HTML code first, which you can copy and then paste
    and save to a file named index.xhtml. In that code, you should see a line near
    the top similar to the following:'
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT应首先创建HTML代码，您可以复制并粘贴到名为index.xhtml的文件中。在该代码中，您应该看到类似以下内容的行：
- en: '[PRE71]'
  id: totrans-1094
  prefs: []
  type: TYPE_PRE
  zh: '[PRE71]'
- en: This code tells the web browser to look for the CSS code in a file named styles.css,
    so your next task is to copy the generated CSS code, paste it into a file, and
    save it as styles.css (or whatever name you see in the `<link>` tag). Be sure
    to save styles.css in the same folder as your index.xhtml file. You also need
    to copy your image file into the same folder. Refer to appendix A to learn more
    about working web page files.
  id: totrans-1095
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码告诉浏览器在名为styles.css的文件中查找CSS代码，因此你的下一个任务是复制生成的CSS代码，将其粘贴到文件中，并保存为styles.css（或你在`<link>`标签中看到的任何名称）。确保将styles.css保存与你的index.xhtml文件相同的文件夹中。你还需要将你的图片文件复制到同一个文件夹。有关更多关于工作网页文件的信息，请参阅附录A。
- en: I submitted this prompt to GPT-4 using OpenAI’s ChatGPT app. The code it generated
    resulted in the page shown in figure 5.11.
  id: totrans-1096
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用OpenAI的ChatGPT应用向GPT-4提交了这个提示。它生成的代码导致了图5.11所示的页面。
- en: '![](../../OEBPS/Images/CH05_F11_McFedries3.png)'
  id: totrans-1097
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH05_F11_McFedries3.png)'
- en: Figure 5.11 My online journal page generated by ChatGPT
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.11 ChatGPT生成的我的在线期刊页面
- en: Note To get the page shown in figure 5.11, I had to correct a mistake that ChatGPT
    made in the CSS code. I talk about this error in the next section.
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：为了得到图5.11所示的页面，我不得不纠正ChatGPT在CSS代码中犯的一个错误。我将在下一节中讨论这个错误。
- en: If you like the online journal that ChatGPT made for you, you can skip the rest
    of this chapter and deploy the code as I describe in appendix B. However, if you’d
    like to know more about the code ChatGPT generated, the next section gives you
    a closer look.
  id: totrans-1100
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢ChatGPT为你制作的在线期刊，你可以跳过本章的其余部分，并按照附录B中描述的方式部署代码。但是，如果你想更多地了解ChatGPT生成的代码，下一节将为你提供更详细的了解。
- en: 5.3 Examining the code
  id: totrans-1101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.3 检查代码
- en: If you’re curious about the code that ChatGPT generates, in this section, I’m
    going to provide you with a brief and not-too-technical overview of the online
    journal code that resulted from my prompt from the previous section (that journal
    page is shown in figure 5.11). Your ChatGPT-generated code will be different from
    mine not only because your text and images will be different but also because
  id: totrans-1102
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对ChatGPT生成的代码感到好奇，在本节中，我将为你提供一个简短且不太技术性的概述，介绍由我上一节提示生成的在线期刊代码（如图5.11所示的期刊页面）。你生成的ChatGPT代码将不同于我的，不仅因为你的文本和图片不同，还因为
- en: ChatGPT’s algorithms include some built-in randomness, so the same prompt will
    often generate slightly different code each time you run it.
  id: totrans-1103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT的算法包括一些内置的随机性，因此相同的提示每次运行时通常会生成略微不同的代码。
- en: ChatGPT’s output varies depending on the model (GPT-3.5 versus GPT-4) and the
    app (OpenAI versus Copilot). For Copilot, the output also depends on the conversation
    style (creative, balanced, or precise).
  id: totrans-1104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT的输出取决于模型（GPT-3.5与GPT-4）和应用（OpenAI与Copilot）。对于Copilot，输出还取决于对话风格（创意、平衡或精确）。
- en: 'Note The generated HTML and CSS code for my online journal page are available
    on this book’s website ([www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt))
    and in the book’s GitHub repository: [https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt).'
  id: totrans-1105
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：我在线期刊页面的生成HTML和CSS代码可在本书的网站上找到（[www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt)）以及本书的GitHub仓库：[https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)。
- en: However, every version of ChatGPT should output HTML and CSS code that’s at
    least similar to what’s displayed in the next two sections, so my code annotations
    should help you understand what’s happening under the hood.
  id: totrans-1106
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，ChatGPT的每个版本都应该输出至少与下一两个部分显示的类似的HTML和CSS代码，因此我的代码注释应该能帮助你理解底层发生了什么。
- en: 5.3.1 Examining the HTML
  id: totrans-1107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.3.1 检查HTML
- en: 'The HTML code that ChatGPT generated for my online journal page is shown here:'
  id: totrans-1108
  prefs: []
  type: TYPE_NORMAL
  zh: 这里展示了ChatGPT为我在线期刊页面生成的HTML代码：
- en: '[PRE72]'
  id: totrans-1109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE72]'
- en: ① Specifies the page character set
  id: totrans-1110
  prefs: []
  type: TYPE_NORMAL
  zh: ① 指定页面字符集
- en: ② Tells the web browser where to find the CSS code
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: ② 告诉浏览器在哪里找到CSS代码
- en: ③ Loads the page fonts from Google Fonts
  id: totrans-1112
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 从Google Fonts加载页面字体
- en: ④ Page logo
  id: totrans-1113
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 页面标志
- en: ⑤ Page title
  id: totrans-1114
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 页面标题
- en: ⑥ Page tagline
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 页面标语
- en: ⑦ Page header
  id: totrans-1116
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 页眉
- en: ⑧ Entry summary (title)
  id: totrans-1117
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 条目摘要（标题）
- en: ⑨ Entry date
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ 条目日期
- en: ⑩ Entry text
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: ⑩ 条目文本
- en: ⑪ Details element
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: ⑪ 详细信息元素
- en: ⑫ Page footer
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: ⑫ 页脚
- en: 'Here are a few notes to bear in mind when reading the HTML code:'
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读HTML代码时，请注意以下几点：
- en: The code `<meta charset="utf-8">` immediately after the `<head>` tag in the
    HTML file tells the browser the character set used in the page. You don’t need
    to know what this means, only that this tag is required to make the copyright
    symbol display properly. It will also help characters such as em dashes (—) and
    curly quotation marks (“ and ”) display properly if you use those and similar
    characters in your journal entries.
  id: totrans-1123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: HTML文件中`<head>`标签之后立即的代码`<meta charset="utf-8">`告诉浏览器页面使用的字符集。您不需要知道这意味着什么，只需知道这个标签是使版权符号正确显示所必需的。如果您在日记条目中使用像破折号（—）和括号引号（“和”）这样的字符，它也会帮助这些字符正确显示。
- en: This code uses placeholder text for the entries, so you’d need to add your own
    title, date, and text for each entry.
  id: totrans-1124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此代码使用占位文本为条目，因此您需要为每个条目添加自己的标题、日期和文本。
- en: If the page tagline sounds familiar, it’s a line borrowed from the character
    Joey of the old TV show *Friends*.
  id: totrans-1125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果页面的标语听起来很熟悉，那是一句从老电视剧《老友记》中的角色乔伊那里借来的。
- en: 'Finally, note that the HTML code includes the following line:'
  id: totrans-1126
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，请注意HTML代码中包含以下行：
- en: '[PRE73]'
  id: totrans-1127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE73]'
- en: This tag tells the web browser where to find the CSS code, which I describe
    in the next section.
  id: totrans-1128
  prefs: []
  type: TYPE_NORMAL
  zh: 这个标签告诉网络浏览器在哪里找到CSS代码，我将在下一节中描述。
- en: 5.3.2 Examining the CSS
  id: totrans-1129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.3.2 检查CSS
- en: 'ChatGPT’s generated CSS code for my online journal page is shown here:'
  id: totrans-1130
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT为我在线日记页面生成的CSS代码如下所示：
- en: '[PRE74]'
  id: totrans-1131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE74]'
- en: ① Sets the page background color, text color, and font
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: ① 设置页面背景色、文字颜色和字体
- en: ② Sets the maximum page width to 850 px
  id: totrans-1133
  prefs: []
  type: TYPE_NORMAL
  zh: ② 设置最大页面宽度为850 px
- en: ③ Centers the page
  id: totrans-1134
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 使页面居中
- en: ④ Sets a maximum logo width, and floats it to the left
  id: totrans-1135
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 设置最大标志宽度，并将其浮动到左侧
- en: ⑤ Sets the page title font size to 48 px, and applies the Lato font
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 设置页面标题字体大小为48 px，并应用Lato字体
- en: ⑥ Styles the tagline with font size 22 px and italics
  id: totrans-1137
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 使用22 px字体大小和斜体样式标语
- en: ⑦ Styles the entry titles with font size 30 px and the Lato font
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 使用30 px字体大小和Lato字体样式条目标题
- en: ⑧ Styles the entry date with color darkblue and font size 18 px
  id: totrans-1139
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 使用深蓝色和18 px字体大小样式条目日期
- en: ⑨ Applies special styles to the accordions
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ 为手风琴应用特殊样式
- en: 'Fortunately, ChatGPT rarely makes mistakes when generating HTML and CSS code,
    but in this case, it did. To see the error, first look back at the following line
    from the HTML code (there are similar lines for each entry):'
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，ChatGPT在生成HTML和CSS代码时很少出错，但在这个案例中，它确实犯了错。要查看错误，首先查看以下HTML代码中的以下行（每个条目都有类似的行）：
- en: '[PRE75]'
  id: totrans-1142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE75]'
- en: In this `<p>` tag, the `class` attribute refers to a set of CSS styles applied
    to the paragraph. In this example, the class name is `entry-date`. In the CSS
    code, class styles are designated by appending a period (`.`) before the class
    name. However, you can scour the CSS code all day long, and you won’t find any
    CSS rule that begins with `.entry-date`. The closest is `.date`, which means ChatGPT
    made a mistake. (How would you know? In this case, you’d know by looking at the
    page and noticing that the entry dates aren’t formatted with the `darkblue` color
    as specified in the prompt.) In the CSS, you fix the problem by changing `.date`
    to `.entry-date`.
  id: totrans-1143
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个`<p>`标签中，`class`属性指的是应用于段落的CSS样式集。在这个例子中，类名是`entry-date`。在CSS代码中，类样式通过在类名前添加一个点(`.`)来指定。然而，您可以整天浏览CSS代码，但您不会找到任何以`.entry-date`开头的CSS规则。最接近的是`.date`，这意味着ChatGPT犯了一个错误。（您如何知道？在这种情况下，您会通过查看页面并注意到条目日期没有按照提示中指定的`darkblue`颜色格式化来知道。）在CSS中，您可以通过将`.date`更改为`.entry-date`来修复这个问题。
- en: If you like, you can use the annotations from earlier in this section to tweak
    your web page code, as I describe next.
  id: totrans-1144
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您愿意，可以使用本节前面部分的注释来调整您的网页代码，正如我接下来要描述的。
- en: 5.4 Customizing the page
  id: totrans-1145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5.4 自定义页面
- en: If you’re not happy with the page that ChatGPT generated for you, one possible
    fix is to modify your prompt and then resubmit it. However, for relatively small
    customizations, it’s often easiest to edit the code manually.
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您对ChatGPT为您生成的页面不满意，一个可能的解决方案是修改您的提示并重新提交。然而，对于相对较小的自定义，手动编辑代码通常更容易。
- en: 'First, here are some customization suggestions for the HTML code:'
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，这里有一些HTML代码的自定义建议：
- en: 'In the header, you can edit the title or tagline. Just be sure not to edit
    or delete the associated HTML tags: `<h1>` and `</h1>` for the title, and `<p>`
    and `</p>` for the tagline.'
  id: totrans-1148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在页眉中，您可以编辑标题或标语。只需确保不要编辑或删除相关的HTML标签：用于标题的`<h1>`和`</h1>`，以及用于标语的`<p>`和`</p>`。
- en: 'To add a new entry (that is, a new accordion), follow these steps:'
  id: totrans-1149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要添加一个新条目（即，一个新的手风琴），请按照以下步骤操作：
- en: a)  Open the HTML file in a text editor.
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
  zh: a) 在文本编辑器中打开HTML文件。
- en: b)  Select an existing entry. That is, select everything between and including
    a single pair of `<details>` and `</details>` tags, as shown in figure 5.12.
  id: totrans-1151
  prefs: []
  type: TYPE_NORMAL
  zh: b) 选择一个现有条目。也就是说，选择包括单个`<details>`和`</details>`标签之间的所有内容，如图5.12所示。
- en: '![](../../OEBPS/Images/CH05_F12_McFedries3.png)'
  id: totrans-1152
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH05_F12_McFedries3.png)'
- en: Figure 5.12 Select an existing accordion entry.
  id: totrans-1153
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.12 选择现有的手风琴条目。
- en: c)  Copy the entry (for example, by pressing either Ctrl-C or Cmd-C).
  id: totrans-1154
  prefs: []
  type: TYPE_NORMAL
  zh: c) 复制条目（例如，通过按Ctrl-C或Cmd-C）。
- en: d)  Create a new line at the point where you want the new entry to appear. For
    example, if you want the new entry to appear above the existing entries, position
    the cursor immediately before the first `<details>` tag and then press Enter or
    Return.
  id: totrans-1155
  prefs: []
  type: TYPE_NORMAL
  zh: d) 在你想要新条目出现的位置创建一个新行。例如，如果你想新条目出现在现有条目之上，将光标立即放在第一个`<details>`标签之前，然后按Enter或Return。
- en: e)  Position the cursor on the new line you just created, as shown in figure
    5.13.
  id: totrans-1156
  prefs: []
  type: TYPE_NORMAL
  zh: e) 将光标定位在你刚刚创建的新行上，如图5.13所示。
- en: '![](../../OEBPS/Images/CH05_F13_McFedries3.png)'
  id: totrans-1157
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH05_F13_McFedries3.png)'
- en: Figure 5.13 Position the cursor where you want to paste the code you copied.
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.13 将光标定位在你想要粘贴你复制的代码的位置。
- en: f)  Paste the copied code (for example, by pressing either Ctrl-C or Cmd-C).
  id: totrans-1159
  prefs: []
  type: TYPE_NORMAL
  zh: f) 粘贴复制的代码（例如，通过按Ctrl-C或Cmd-C）。
- en: g)  Edit the entry title, date, and text.
  id: totrans-1160
  prefs: []
  type: TYPE_NORMAL
  zh: g) 编辑条目标题、日期和文本。
- en: 'If your entry text includes multiple paragraphs, you can ensure that each paragraph
    renders properly by surrounding it with a `<p class="entry-text">` tag at the
    beginning and a `</p>` tag at the end:'
  id: totrans-1161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你的条目文本包含多个段落，你可以通过在开始和结束处分别添加`<p class="entry-text">`标签和`</p>`标签来确保每个段落正确渲染：
- en: '[PRE76]'
  id: totrans-1162
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE76]'
- en: In the footer section of the HTML code, you can add links to your social media
    accounts, as I describe in chapter 4.
  id: totrans-1163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在HTML代码的页脚部分，你可以添加指向你的社交媒体账户的链接，正如我在第4章中描述的那样。
- en: 'Now, here are a few customization ideas for the CSS code:'
  id: totrans-1164
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这里有一些CSS代码的定制想法：
- en: 'To format the text of each entry, add `.entry-text { }` to the bottom of your
    CSS code and populate it with the formatting you want. For example, the following
    code adjusts the entry font size:'
  id: totrans-1165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要格式化每个条目的文本，请将`.entry-text { }`添加到你的CSS代码底部，并填充你想要的格式。例如，以下代码调整条目字体大小：
- en: '[PRE77]'
  id: totrans-1166
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE77]'
- en: If you want your page to have a different maximum width, change the `max-width`
    value to something other than `850px`.
  id: totrans-1167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想你的页面有不同的最大宽度，将`max-width`值更改为`850px`以外的值。
- en: For any color value, you can change the existing color to a different color
    keyword.
  id: totrans-1168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何颜色值，你可以将现有颜色更改为不同的颜色关键字。
- en: For any font size value, you can change the number to increase or decrease the
    font size. Just make sure you leave the `px` unit in place.
  id: totrans-1169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何字体大小值，你可以更改数字以增加或减少字体大小。只需确保保留`px`单位。
- en: For any padding or margin value, you can change the number to increase or decrease
    the padding or margins. In each case, be sure to leave the `px` unit in place.
  id: totrans-1170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何填充或边距值，你可以更改数字以增加或减少填充或边距。在每种情况下，务必保留`px`单位。
- en: To make your page code more accessible, consider converting all px measurements
    to rem measurements. 1 rem is by default equivalent to 16 px, so 20 px is 1.25 rem,
    24 px is 1.5 rem, 32 px is 2 rem, 48 px is 3 rem, and so on. The rem unit is more
    accessible because it measures font sizes relative to the default font size the
    browser user has defined in their browser settings.
  id: totrans-1171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要使你的页面代码更易于访问，考虑将所有px测量转换为rem测量。默认情况下，1rem相当于16px，因此20px是1.25rem，24px是1.5rem，32px是2rem，48px是3rem，依此类推。rem单位更易于访问，因为它测量的是相对于浏览器用户在其浏览器设置中定义的默认字体大小的字体大小。
- en: Summary
  id: totrans-1172
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: An accordion is a special HTML feature that consists of a summary (the title
    or description of the accordion) and details (the entirety of the accordion content).
  id: totrans-1173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手风琴是一个特殊的HTML功能，它由摘要（手风琴的标题或描述）和细节（手风琴内容的全部）组成。
- en: Clicking the accordion summary toggles the full accordion content between hidden
    and displayed.
  id: totrans-1174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击手风琴摘要可以切换手风琴内容的隐藏和显示状态。
- en: To get AI to generate an image from a text prompt, use either OpenAI’s DALL-E
    app or Copilot’s Image Creator.
  id: totrans-1175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要让AI根据文本提示生成图像，可以使用OpenAI的DALL-E应用或Copilot的图像创建器。
- en: When prompting for an image, use keywords to evoke the overall mood and aesthetic,
    the medium, and the specifics of the medium.
  id: totrans-1176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在请求图像时，使用关键词来唤起整体情绪和美学、媒介以及媒介的具体细节。
- en: For best results, your page prompt should be as specific as possible, including
    colors, font sizes, and heading levels.
  id: totrans-1177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了获得最佳效果，你的页面提示应该尽可能具体，包括颜色、字体大小和标题级别。
- en: Save the generated HTML to the index.xhtml file and the generated CSS to the
    filename suggested by ChatGPT in the HTML code, usually styles.css.
  id: totrans-1178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将生成的HTML保存到index.xhtml文件中，将生成的CSS保存到HTML代码中ChatGPT建议的文件名，通常是styles.css。
- en: 6 Adding links and navigation
  id: totrans-1179
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6 添加链接和导航
- en: This chapter covers
  id: totrans-1180
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖
- en: Creating links to other sites and pages
  id: totrans-1181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建到其他网站和页面的链接
- en: Creating a navigation bar for your site
  id: totrans-1182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为你的网站创建导航栏
- en: Asking ChatGPT to help you design your pages
  id: totrans-1183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让ChatGPT帮助你设计页面
- en: Prompting ChatGPT to build an information website for an organization
  id: totrans-1184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示ChatGPT为组织构建信息网站
- en: Examining and customizing ChatGPT’s web page code
  id: totrans-1185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查和自定义ChatGPT的网页代码
- en: 'In each of the web projects you’ve seen so far in this book, you’ve cajoled
    ChatGPT into providing you with the code for a single web page. One-page websites
    are legion on the web, but it’s more common for a site to have two or more pages.
    Once you add that second page, however, questions quickly arise: How do you get
    a site visitor from your home page to the other page? And once someone gets to
    that other page, how do you get them back to the home page? How do you figure
    all this out with a site that has three, four, or even more pages?'
  id: totrans-1186
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书中你迄今为止看到的每个网络项目中，你都巧妙地让ChatGPT为你提供单个网页的代码。网络上有一大堆单页网站，但一个网站拥有两个或更多页面更为常见。然而，一旦添加了第二个页面，问题很快就会出现：你如何将网站访客从主页引导到其他页面？一旦有人到达那个其他页面，你如何让他们回到主页？如何在一个拥有三页、四页甚至更多页面的网站上解决这个问题呢？
- en: Answering these and similar questions is the topic of this chapter. In the pages
    that follow, you learn how to enable a visitor to your site to jump from one page
    to another by asking ChatGPT to craft some web page code that creates a clickable
    link to another page. You also learn how to ask ChatGPT to create a special web
    page element called a navigation bar that brings links to all your site pages
    into a single, handy location for easy access.
  id: totrans-1187
  prefs: []
  type: TYPE_NORMAL
  zh: 回答这些问题以及类似的问题是本章的主题。在接下来的页面中，你将学习如何通过让ChatGPT编写一些网页代码来创建一个可点击的链接到另一个页面，从而让访问你网站的访客能够从一个页面跳转到另一个页面。你还将学习如何让ChatGPT创建一个特殊的网页元素，称为导航栏，将所有网站页面的链接汇总到一个方便的位置，以便轻松访问。
- en: 'All this information then goes into a detailed prompt that you’ll pass along
    to ChatGPT to produce the code for a very common project pattern: a website that
    provides information about an organization. This chapter also provides a high-level
    explanation of the code generated by ChatGPT and pointers for customizing the
    code manually to get everything just the way you want.'
  id: totrans-1188
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些信息都包含在一个详细的提示中，然后你将传递给ChatGPT以生成一个非常常见的项目模式的代码：一个提供组织信息的网站。本章还提供了ChatGPT生成的代码的高级解释以及手动自定义代码的指南，以获得你想要的一切。
- en: 6.1 Understanding this chapter’s project
  id: totrans-1189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.1 理解本章的项目
- en: 'In this chapter, you’re going to enlist ChatGPT to help you build a simple
    information website for an organization. The final page will include the following
    components:'
  id: totrans-1190
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将让ChatGPT帮助你为组织构建一个简单的信息网站。最终页面将包括以下组件：
- en: A header element that includes the site title and tagline
  id: totrans-1191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含网站标题和标语的头元素
- en: A navigation element with links to the site’s other pages
  id: totrans-1192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含链接到网站其他页面的导航元素
- en: A main element that includes an introduction to the site as well as some engaging
    content for the reader
  id: totrans-1193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含网站介绍以及一些吸引读者内容的主要元素
- en: A footer element that includes a copyright notice
  id: totrans-1194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚元素
- en: Figure 6.1 shows an example of an information website home page created from
    code generated by ChatGPT. This kind of website can be easily modified to act
    as an information site for a community, charity, event, team, or band, or even
    a favorite movie or TV show.
  id: totrans-1195
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.1展示了由ChatGPT生成的信息网站主页的示例。这种类型的网站可以很容易地修改，用作社区、慈善机构、活动、团队或乐队的信息网站，甚至是一部喜欢的电影或电视剧。
- en: '![](../../OEBPS/Images/CH06_F01_McFedries3.png)'
  id: totrans-1196
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH06_F01_McFedries3.png)'
- en: Figure 6.1 An information website home page generated by ChatGPT
  id: totrans-1197
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.1 ChatGPT生成的信息网站主页
- en: 6.2 Building the information site home page
  id: totrans-1198
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.2 构建信息网站主页
- en: 'An information website contains multiple web pages, so it’s a good idea to
    build the site in stages. My recommended process is summarized here:'
  id: totrans-1199
  prefs: []
  type: TYPE_NORMAL
  zh: 信息网站包含多个网页，因此分阶段构建网站是个好主意。我推荐的过程总结如下：
- en: Prompt ChatGPT to generate the HTML code for the website’s home page.
  id: totrans-1200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指示ChatGPT生成网站主页的HTML代码。
- en: Prompt ChatGPT to generate the CSS code for the website’s styling. Note that
    it’s best to combine these first two steps into a single prompt.
  id: totrans-1201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示ChatGPT生成网站的CSS样式代码。请注意，最好将这两个步骤合并为一个提示。
- en: 'For each of your other site pages, prompt ChatGPT to generate the HTML code
    for that page. In particular, the prompt for each of the other site pages should
    include the following:'
  id: totrans-1202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于你的其他网站页面，提示ChatGPT生成该页面的HTML代码。特别是，其他网站页面的提示应包括以下内容：
- en: An instruction to use the same CSS file in which you saved the CSS generated
    in step 2.
  id: totrans-1203
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示使用与步骤2中保存的CSS生成的CSS文件相同的CSS文件。
- en: An instruction to not generate any extra styles, particularly inline styles
    (that is, CSS code inserted directly into HTML tags). ChatGPT always wants to
    include CSS styling with its HTML output, so without this instruction, ChatGPT
    will almost certainly add extra styles, which could conflict with or override
    the styles in the CSS file.
  id: totrans-1204
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示不要生成任何额外的样式，尤其是内联样式（即直接插入HTML标签中的CSS代码）。ChatGPT总是希望将其HTML输出与CSS样式一起包含，因此如果没有这个指示，ChatGPT几乎肯定会添加额外的样式，这可能会与或覆盖CSS文件中的样式。
- en: Before you get to all that, take a minute to familiarize yourself with the new
    web page technology introduced in this chapter.
  id: totrans-1205
  prefs: []
  type: TYPE_NORMAL
  zh: 在你了解所有这些之前，花一分钟时间熟悉本章中介绍的新网页技术。
- en: 6.2.1 Creating links
  id: totrans-1206
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6.2.1 创建链接
- en: One of the signal traits of HTML (in fact, it’s the *H* in *HTML*) is *hypertext*,
    which is just a fancy word for links that take you to other pages, whether those
    pages exist elsewhere on your website or anywhere on the web. A link is usually
    a word or phrase configured so that when someone clicks that text, the web browser
    navigates to whatever web page is specified by the link’s configuration.
  id: totrans-1207
  prefs: []
  type: TYPE_NORMAL
  zh: HTML（实际上，它是*HTML*中的*H*）的一个显著特征是*超文本*，这只是一个更华丽的词，指的是带你去其他页面的链接，无论这些页面是否存在于你的网站上或互联网上的任何地方。链接通常是一个配置为当有人点击该文本时，网络浏览器会导航到链接配置指定的任何网页的单词或短语。
- en: 'If you’re linking to a page on your site in the same directory as the current
    HTML file, you can ask ChatGPT for a link to that filename. Here’s some code that
    asks for a link to a page named about.xhtml:'
  id: totrans-1208
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在链接到与当前HTML文件相同的目录中的网站页面，你可以要求ChatGPT提供对该文件名的链接。以下是一些请求名为about.xhtml的页面的代码：
- en: '[PRE78]'
  id: totrans-1209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE78]'
- en: 'Figure 6.2 shows the output from the ChatGPT app. Here’s the HTML code returned
    by ChatGPT:'
  id: totrans-1210
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.2显示了ChatGPT应用输出的结果。以下是ChatGPT返回的HTML代码：
- en: '[PRE79]'
  id: totrans-1211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE79]'
- en: '![](../../OEBPS/Images/CH06_F02_McFedries3.png)'
  id: totrans-1212
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH06_F02_McFedries3.png)'
- en: Figure 6.2 ChatGPT’s code for a link to the about.xhtml page
  id: totrans-1213
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.2 ChatGPT为about.xhtml页面生成的代码
- en: As the code shows, the HTML tags you use to create a link are `<a>` and its
    corresponding `</a>` closing tag. In the `a` element, you use the `href` attribute
    to insert the address—often called the *URL* (short for *uniform resource locator*)—of
    your link. Figure 6.3 shows how this element works.
  id: totrans-1214
  prefs: []
  type: TYPE_NORMAL
  zh: 如代码所示，你用来创建链接的HTML标签是`<a>`及其相应的`</a>`闭合标签。在`a`元素中，你使用`href`属性来插入链接的地址——通常称为*URL*（即*统一资源定位符*）——图6.3显示了该元素的工作方式。
- en: '![](../../OEBPS/Images/CH06_F03_Mcfedries3.png)'
  id: totrans-1215
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH06_F03_Mcfedries3.png)'
- en: Figure 6.3 The syntax to use for the `<a>` tag
  id: totrans-1216
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.3 `<a>`标签的语法
- en: 'If the file on your site that you want to link to resides in a different directory,
    you need to include that directory name in your prompt:'
  id: totrans-1217
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要链接的文件位于你的网站上的不同目录中，你需要在你的提示中包含该目录名：
- en: '[PRE80]'
  id: totrans-1218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE80]'
- en: 'Figure 6.4 shows the output from the ChatGPT app. Here’s the HTML code returned
    by ChatGPT:'
  id: totrans-1219
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.4显示了ChatGPT应用输出的结果。以下是ChatGPT返回的HTML代码：
- en: '[PRE81]'
  id: totrans-1220
  prefs: []
  type: TYPE_PRE
  zh: '[PRE81]'
- en: '![](../../OEBPS/Images/CH06_F04_McFedries3.png)'
  id: totrans-1221
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH06_F04_McFedries3.png)'
- en: Figure 6.4 ChatGPT’s code for a link to the index.xhtml page in the /faq directory
  id: totrans-1222
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.4 ChatGPT为/faq目录中的index.xhtml页面生成的代码
- en: Notice that I preceded the directory name with a slash (`/`), which tells the
    AI that the specified directory runs off my site’s root directory. If, instead,
    the location is a subdirectory of the directory where your HTML file resides,
    leave off the slash in the prompt.
  id: totrans-1223
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我在目录名前加了一个斜杠(`/`)，这告诉AI指定的目录是从网站根目录开始的。如果你要链接的文件位于当前HTML文件所在的目录的子目录中，请在提示中省略斜杠。
- en: 'For an external web page, it’s usually easiest to create an empty link (that
    is, `<a href="">link text</a>`, surf to the page, copy the address, and then paste
    that address between the quotation marks of the `href` attribute value. However,
    if the page is describable—for example, you know the site’s name and can describe
    the page content uniquely in a few words—why not get your AI assistant to do the
    dirty work for you? Here’s an example:'
  id: totrans-1224
  prefs: []
  type: TYPE_NORMAL
  zh: 对于外部网页，通常最简单的方法是创建一个空链接（即`<a href="">链接文本</a>`），浏览到该页面，复制地址，然后将该地址粘贴到`href`属性值的引号之间。然而，如果页面可以描述——例如，您知道网站的名称，并且可以用几个词独特地描述页面内容——为什么不请您的AI助手为您做这项工作呢？以下是一个示例：
- en: '[PRE82]'
  id: totrans-1225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE82]'
- en: 'Figure 6.5 shows the output from the ChatGPT app. Here’s the HTML code returned
    by ChatGPT:'
  id: totrans-1226
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.5显示了ChatGPT应用输出的结果。以下是ChatGPT返回的HTML代码：
- en: '[PRE83]'
  id: totrans-1227
  prefs: []
  type: TYPE_PRE
  zh: '[PRE83]'
- en: '![](../../OEBPS/Images/CH06_F05_McFedries3.png)'
  id: totrans-1228
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH06_F05_McFedries3.png)'
- en: Figure 6.5 ChatGPT’s code for a link to the rutabagas page on Wikipedia
  id: totrans-1229
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.5 ChatGPT为维基百科中 rutabagas 页面的链接代码
- en: 6.2.2 Creating the navigation bar
  id: totrans-1230
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6.2.2 创建导航栏
- en: One very common website pattern is the *navigation bar*, which is a collection
    of links to the other pages on the website (or, if the site is large, to the site’s
    most important pages). The navigation bar can be horizontal or vertical, but the
    most common configuration is a horizontal strip that runs across the page, just
    below the header. Figure 6.6 shows an example.
  id: totrans-1231
  prefs: []
  type: TYPE_NORMAL
  zh: 一个非常常见的网站模式是*导航栏*，它是一组指向网站其他页面（或如果网站很大，则指向网站最重要的页面）的链接。导航栏可以是水平的或垂直的，但最常见的配置是在页眉下方横跨页面的水平条。图6.6显示了示例。
- en: '![](../../OEBPS/Images/CH06_F06_McFedries3.png)'
  id: totrans-1232
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH06_F06_McFedries3.png)'
- en: Figure 6.6 An example of a navigation bar
  id: totrans-1233
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.6导航栏示例
- en: 'In HTML, you create a navigation bar using the `<nav>` and `</nav>` tags. Between
    these tags, you add the links to each site page. You can ask ChatGPT to generate
    a similar navigation bar by including the following instruction in your prompt:'
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
  zh: 在HTML中，您可以使用`<nav>`和`</nav>`标签创建一个导航栏。在这些标签之间，您添加指向每个网站页面的链接。您可以通过在提示中包含以下指令来要求ChatGPT生成一个类似的导航栏：
- en: '[PRE84]'
  id: totrans-1235
  prefs: []
  type: TYPE_PRE
  zh: '[PRE84]'
- en: 'Based on this instruction, ChatGPT will generate HTML code similar to the following
    (which is the code that created the navigation bar shown in figure 6.6):'
  id: totrans-1236
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这个指令，ChatGPT将生成类似于以下HTML代码（这是创建图6.6中显示的导航栏的代码）：
- en: '[PRE85]'
  id: totrans-1237
  prefs: []
  type: TYPE_PRE
  zh: '[PRE85]'
- en: 'You may notice two strange things about how the browser renders the list in
    figure 6.6:'
  id: totrans-1238
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能会注意到图6.6中浏览器渲染列表的两种奇怪之处：
- en: The list runs horizontally instead of vertically.
  id: totrans-1239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列表水平排列，而不是垂直排列。
- en: The list items are spaced evenly across the page.
  id: totrans-1240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列表项在页面中均匀分布。
- en: 'The browser renders the navigation bar that way because of the following CSS
    code, which applies a few properties to the `nav` element:'
  id: totrans-1241
  prefs: []
  type: TYPE_NORMAL
  zh: 浏览器以这种方式渲染导航栏，是因为以下CSS代码将一些属性应用于`nav`元素：
- en: '[PRE86]'
  id: totrans-1242
  prefs: []
  type: TYPE_PRE
  zh: '[PRE86]'
- en: ① Adds a border above and below the nav element
  id: totrans-1243
  prefs: []
  type: TYPE_NORMAL
  zh: ① 在`nav`元素上方和下方添加边框
- en: ② Turns the nav element into a Flexbox container
  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: ② 将`nav`元素转换为Flexbox容器
- en: ③ Tells the browser to space the items evenly
  id: totrans-1245
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 告诉浏览器均匀分配项目空间
- en: ④ Styles the nav element’s margins and padding
  id: totrans-1246
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 设置`nav`元素的边距和填充
- en: 'The main thing to note here is the `display: flex` declaration, which converts
    the `nav` element into a Flexbox container. By default, it displays its items
    horizontally rather than vertically. (You’ll learn more about Flexbox in chapter
    10.)'
  id: totrans-1247
  prefs: []
  type: TYPE_NORMAL
  zh: '这里需要注意的主要是`display: flex`声明，它将`nav`元素转换为Flexbox容器。默认情况下，它水平显示其项目，而不是垂直显示。（您将在第10章中了解更多关于Flexbox的内容。）'
- en: Note Depending on the number of items in your navigation bar, that element may
    be too wide to render well on small screens, particularly smartphone screens in
    portrait mode. The usual solution is to convert the navigation element to an icon
    that displays a menu when clicked or tapped. To learn how to prompt ChatGPT to
    generate the code for a menu like this, see chapter 12.
  id: totrans-1248
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：根据导航栏中元素的数量，该元素可能太宽，无法在小屏幕上良好渲染，尤其是竖屏模式的智能手机屏幕。通常的解决方案是将导航元素转换为图标，当点击或轻触时显示菜单。要了解如何提示ChatGPT生成此类菜单的代码，请参阅第12章。
- en: Now you have everything you need to know to create your home page prompt for
    ChatGPT.
  id: totrans-1249
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您已经拥有了创建ChatGPT主页提示所需的所有知识。
- en: 6.2.3 Crafting the home page prompt
  id: totrans-1250
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6.2.3 构建主页提示
- en: 'This chapter’s project is an information website. Before moving on to the prompting
    portion of the show, make sure you already have these items:'
  id: totrans-1251
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的项目是一个信息网站。在继续展示提示部分之前，请确保您已经具备以下项目：
- en: 'Some or all of the following: a page logo, title, and tagline'
  id: totrans-1252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以下之一或全部：页面标志、标题和标语
- en: The names of the typefaces you want to use for the page headings and the page
    text
  id: totrans-1253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您想要用于页面标题和页面文字的字体名称
- en: The keywords of the colors you want to apply to the page backgrounds and text
  id: totrans-1254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您想要应用于页面背景和文字的颜色关键词
- en: Refer to chapter 3 to learn more about these design elements and how to prompt
    ChatGPT for title, typeface, and color suggestions.
  id: totrans-1255
  prefs: []
  type: TYPE_NORMAL
  zh: 参考第 3 章了解这些设计元素以及如何提示 ChatGPT 提供标题、字体和颜色建议。
- en: 'You’re now ready to enlist ChatGPT to help you generate the code for your information
    website’s home page. Your prompt should begin like this:'
  id: totrans-1256
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在可以请 ChatGPT 帮助您生成信息网站主页的代码。您的提示应该开始如下：
- en: '[PRE87]'
  id: totrans-1257
  prefs: []
  type: TYPE_PRE
  zh: '[PRE87]'
- en: 'You then specify the content of your page, including the following (refer to
    figure 6.7):'
  id: totrans-1258
  prefs: []
  type: TYPE_NORMAL
  zh: 您随后指定页面的内容，包括以下内容（参见图 6.7）：
- en: A header that includes your site title and tagline
  id: totrans-1259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含您的网站标题和标语的页眉
- en: A navigation element that includes links to the other site pages (or the site’s
    main pages)
  id: totrans-1260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个包含链接到其他网站页面（或网站的主要页面）的导航元素
- en: A main element with a lead paragraph that welcomes visitors to the site
  id: totrans-1261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个包含欢迎访问者到网站的引言段落的主体元素
- en: One or more section elements that display engaging content to the reader
  id: totrans-1262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个或多个用于向读者展示引人入胜内容的章节元素
- en: A footer that includes a copyright notice
  id: totrans-1263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚
- en: '![](../../OEBPS/Images/CH06_F07_McFedries3.png)'
  id: totrans-1264
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH06_F07_McFedries3.png)'
- en: Figure 6.7 The elements of the information website home page
  id: totrans-1265
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.7 信息网站主页的元素
- en: 'Next, you ask ChatGPT to generate the CSS for how you want your page formatted:'
  id: totrans-1266
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您要求 ChatGPT 生成您想要页面格式的 CSS：
- en: '[PRE88]'
  id: totrans-1267
  prefs: []
  type: TYPE_PRE
  zh: '[PRE88]'
- en: 'You then specify the formatting, including the following:'
  id: totrans-1268
  prefs: []
  type: TYPE_NORMAL
  zh: 您随后指定格式，包括以下内容：
- en: The page background color and text color
  id: totrans-1269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面的背景颜色和文字颜色
- en: The type sizes you want to use for the page title and tagline
  id: totrans-1270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您想要用于页面标题和标语的字型大小
- en: The type size of the headers and page text
  id: totrans-1271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标题和页面文字的字型大小
- en: The fonts to use for the headings and regular page text
  id: totrans-1272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于标题和常规页面文字的字体
- en: A maximum width for the page. This prevents the lines of text from getting too
    long. A maximum length of 800 px is fine for this type of site.
  id: totrans-1273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面的最大宽度。这可以防止文字行过长。对于这种类型的网站，800 像素的最大长度是合适的。
- en: 'Here’s an example prompt for my own information page:'
  id: totrans-1274
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我自己的信息页面的一个示例提示：
- en: '[PRE89]'
  id: totrans-1275
  prefs: []
  type: TYPE_PRE
  zh: '[PRE89]'
- en: 'ChatGPT should create the HTML code first, which you can copy and then paste
    and save to a file named index.xhtml. In that code, you should see a line near
    the top similar to the following:'
  id: totrans-1276
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 应首先创建 HTML 代码，您可以复制然后粘贴并保存到一个名为 index.xhtml 的文件中。在这段代码中，您应该看到顶部附近有一行类似于以下的内容：
- en: '[PRE90]'
  id: totrans-1277
  prefs: []
  type: TYPE_PRE
  zh: '[PRE90]'
- en: This code tells the web browser to look for the CSS code in a file named styles.css,
    so your next task is to copy the generated CSS code, paste it into a file, and
    save it as styles.css (or whatever name you see in the `<link>` tag). Be sure
    to save styles.css in the same folder as your index.xhtml file. You also need
    to copy your image file into the same folder. Refer to appendix A to learn more
    about working with web page files.
  id: totrans-1278
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码告诉网络浏览器在名为 styles.css 的文件中查找 CSS 代码，因此您的下一个任务是复制生成的 CSS 代码，将其粘贴到文件中，并保存为
    styles.css（或 `<link>` 标签中显示的任何名称）。请确保将 styles.css 保存与您的 index.xhtml 文件相同的文件夹中。您还需要将您的图像文件复制到同一个文件夹中。参考附录
    A 了解更多关于处理网页文件的信息。
- en: I submitted this prompt to GPT-4 using OpenAI’s ChatGPT app. The code it generated
    resulted in the page shown in figure 6.8.
  id: totrans-1279
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用 OpenAI 的 ChatGPT 应用程序向 GPT-4 提交了这个提示。它生成的代码导致了图 6.8 所示的页面。
- en: '![](../../OEBPS/Images/CH06_F08_McFedries3.png)'
  id: totrans-1280
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH06_F08_McFedries3.png)'
- en: Figure 6.8 My information website home page generated by ChatGPT
  id: totrans-1281
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6.8 ChatGPT 生成的我的信息网站主页
- en: If you like the information website that ChatGPT made for you, you can skip
    the rest of this chapter and deploy the code as I describe in appendix B. However,
    if you’d like to know more about the code ChatGPT generated, the next section
    gives you a closer look.
  id: totrans-1282
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢 ChatGPT 为您制作的网站信息，您可以跳过本章的其余部分，并按照附录 B 中描述的方式部署代码。但是，如果您想了解更多关于 ChatGPT
    生成的代码的信息，下一节将为您提供一个更详细的了解。
- en: 6.3 Examining the home page code
  id: totrans-1283
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.3 检查主页代码
- en: If you’re curious about the code that ChatGPT generates, in this section, I’m
    going to provide you with a brief and not-too-technical overview of the information
    website code that resulted from my prompt from the previous section (the information
    website home page is shown in figure 6.8).
  id: totrans-1284
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你好奇ChatGPT生成的代码，在本节中，我将为你提供一个关于上一节（信息网站主页如图6.8所示）提示生成的信息网站代码的简要且非技术性的概述。
- en: 'Note The generated HTML and CSS code for my information website home page are
    available on this book’s website ([www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt))
    and in the book’s GitHub repository: [https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt).'
  id: totrans-1285
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：本书网站上提供了我的信息网站主页的生成HTML和CSS代码（[www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt)）以及GitHub仓库中的代码：[https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)。
- en: Every version of ChatGPT should output HTML and CSS code that’s at least similar
    to what’s displayed in the next two sections, so my code annotations should help
    you understand what’s happening under the hood.
  id: totrans-1286
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的每个版本都应该输出至少与下一两个部分显示的HTML和CSS代码相似的代码，因此我的代码注释应该能帮助你理解底层发生了什么。
- en: 6.3.1 Examining the HTML
  id: totrans-1287
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6.3.1 检查HTML
- en: 'The HTML code that ChatGPT generated for my information site’s home page is
    shown here:'
  id: totrans-1288
  prefs: []
  type: TYPE_NORMAL
  zh: 下面展示了ChatGPT为我信息网站主页生成的HTML代码：
- en: '[PRE91]'
  id: totrans-1289
  prefs: []
  type: TYPE_PRE
  zh: '[PRE91]'
- en: ① Specifies the page character set
  id: totrans-1290
  prefs: []
  type: TYPE_NORMAL
  zh: ① 指定页面字符集
- en: ② Loads the page fonts from Google Fonts
  id: totrans-1291
  prefs: []
  type: TYPE_NORMAL
  zh: ② 从Google Fonts加载页面字体
- en: ③ Tells the web browser where to find the CSS code
  id: totrans-1292
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 告诉网络浏览器CSS代码的位置
- en: ④ Page title
  id: totrans-1293
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 页面标题
- en: ⑤ Page tagline
  id: totrans-1294
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 页面标语
- en: ⑥ Page header
  id: totrans-1295
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 页面页眉
- en: ⑦ Navigation element
  id: totrans-1296
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 导航元素
- en: ⑧ Main element
  id: totrans-1297
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 主要元素
- en: ⑨ Page footer
  id: totrans-1298
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ 页脚
- en: 'Here are a few notes to bear in mind when reading the HTML code:'
  id: totrans-1299
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读HTML代码时，请注意以下几点：
- en: The code `<meta charset="utf-8">` in the `<head>` tag in the HTML file tells
    the browser the character set used in the page. You don’t need to know what this
    means, only that this tag is required to make the copyright symbol display properly.
    It will also help characters such as em dashes (—) and curly quotation marks (“
    and ”) display properly if you use those and similar characters in your page text.
  id: totrans-1300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: HTML文件中的`<head>`标签中的`<meta charset="utf-8">`代码告诉浏览器页面使用的字符集。你不需要知道这意味着什么，只需知道这个标签是必需的，以便正确显示版权符号。如果你在页面文本中使用类似字符（如破折号—和引号“和”），它也会帮助这些字符正确显示。
- en: For some reason, ChatGPT referenced the two Google Fonts typefaces using two
    separate `<link>` tags. No idea why, but it works, so I just went with it.
  id: totrans-1301
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于某种原因，ChatGPT使用两个单独的`<link>`标签引用了两个Google Fonts字体样式。不知道为什么，但它有效，所以我就这样做了。
- en: In the prompt, I asked ChatGPT to look for words surrounded by double asterisks
    (for example, `**hullaballoo**`) and make those words bold. In the HTML, ChatGPT
    replaced the double asterisks with the `<strong>` and `</strong>` tags, which
    make the text between them bold.
  id: totrans-1302
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在提示中，我要求ChatGPT查找被双星号包围的单词（例如，`**hullaballoo**`）并将这些单词加粗。在HTML中，ChatGPT将双星号替换为`<strong>`和`</strong>`标签，这些标签使它们之间的文本加粗。
- en: Similarly, I asked ChatGPT to look for words surrounded by single asterisks
    (for example, `*noise*`) and make those words italic. In the HTML, ChatGPT replaced
    the asterisks with the `<em>` and `</em>` tags, which make the text between them
    italic.
  id: totrans-1303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 同样，我要求ChatGPT查找被单星号包围的单词（例如，`*noise*`）并将这些单词设置为斜体。在HTML中，ChatGPT将星号替换为`<em>`和`</em>`标签，这些标签使它们之间的文本斜体。
- en: 'Note that the HTML code includes the following line:'
  id: totrans-1304
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，HTML代码中包含以下行：
- en: '[PRE92]'
  id: totrans-1305
  prefs: []
  type: TYPE_PRE
  zh: '[PRE92]'
- en: This tag tells the web browser where to find the CSS code, which I describe
    in the next section.
  id: totrans-1306
  prefs: []
  type: TYPE_NORMAL
  zh: 这个标签告诉网络浏览器在哪里找到CSS代码，我将在下一节中描述。
- en: 6.3.2 Examining the CSS
  id: totrans-1307
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6.3.2 检查CSS
- en: 'ChatGPT’s generated CSS code for my information website home page is shown
    here:'
  id: totrans-1308
  prefs: []
  type: TYPE_NORMAL
  zh: 下面展示了ChatGPT为我信息网站主页生成的CSS代码：
- en: '[PRE93]'
  id: totrans-1309
  prefs: []
  type: TYPE_PRE
  zh: '[PRE93]'
- en: ① Sets the page background color
  id: totrans-1310
  prefs: []
  type: TYPE_NORMAL
  zh: ① 设置页面背景颜色
- en: ② Sets the maximum page width to 800 px
  id: totrans-1311
  prefs: []
  type: TYPE_NORMAL
  zh: ② 设置页面最大宽度为800 px
- en: ③ Centers the page
  id: totrans-1312
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 居中页面
- en: ④ Styles the page title font size to 64 px, with color midnightblue and the
    Playfair Display font
  id: totrans-1313
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 将页面标题字体大小设置为64 px，颜色为midnightblue，并使用Playfair Display字体
- en: ⑤ Styles the tagline with font size 30 px
  id: totrans-1314
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 将标语样式设置为字体大小30 px
- en: ⑥ Styles the nav element (as described earlier)
  id: totrans-1315
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 样式化导航元素（如前所述）
- en: ⑦ Sizes the nav links to 24 px
  id: totrans-1316
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 将导航链接的大小设置为24 px
- en: ⑧ Styles the page links with color steelblue and no underline
  id: totrans-1317
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 样式化页面链接，颜色为steelblue，无下划线
- en: ⑨ Styles the second-level headings with font size 48 px, color midnightblue,
    and the Playfair Display font
  id: totrans-1318
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ 使用48px字体大小、深蓝色和中世纪字体样式化二级标题
- en: ⑩ Styles the regular page text with font size 24 px, color darkslategray, and
    the Lora font
  id: totrans-1319
  prefs: []
  type: TYPE_NORMAL
  zh: ⑩ 使用24px字体大小、深灰色和Lora字体样式化常规页面文本
- en: ⑪ Styles the footer
  id: totrans-1320
  prefs: []
  type: TYPE_NORMAL
  zh: ⑪ 样式化页脚
- en: If you like, you can use these annotations to tweak your web page code, as I
    describe in the next section.
  id: totrans-1321
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您愿意，可以使用这些注释来调整您的网页代码，正如我在下一节中描述的那样。
- en: 6.4 Customizing the home page
  id: totrans-1322
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.4 定制主页
- en: 'If ChatGPT’s information website code is off for some reason, you have two
    ways to fix things:'
  id: totrans-1323
  prefs: []
  type: TYPE_NORMAL
  zh: 如果ChatGPT的信息网站代码由于某种原因出现问题，您有两种方法可以修复：
- en: If the page is far from what you want, rewrite your prompt, start a new chat
    session, and try again.
  id: totrans-1324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果页面与您想要的效果相差甚远，请重新编写提示，开始一个新的聊天会话，然后再次尝试。
- en: If the page is close to what you want, ask ChatGPT to make the necessary adjustments
    for you. Be sure you submit this request in the same session as your original
    prompt.
  id: totrans-1325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果页面接近您想要的效果，请让ChatGPT为您进行必要的调整。请确保在原始提示的同一会话中提交此请求。
- en: For the second case, if the code produced by ChatGPT really just needs some
    small tweaks, consider modifying the code manually based on the annotations I
    provided in the previous section. Because you don’t know web page code, it’s best
    not to try to make any major changes. However, that leaves quite a few ways you
    can alter the code to get the page you want.
  id: totrans-1326
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第二种情况，如果ChatGPT生成的代码只需要一些小的调整，请考虑根据我在上一节中提供的注释手动修改代码。因为您不了解网页代码，所以最好不要尝试进行任何重大更改。然而，这仍然提供了很多方法来修改代码以获得您想要的页面。
- en: 'First, here are some customization suggestions for the HTML code:'
  id: totrans-1327
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，这里有一些HTML代码的定制化建议：
- en: 'In the header, you can edit the title or tagline. Just be sure not to edit
    or delete the associated HTML tags: `<h1>` and `</h1>` for the title, and `<p>`
    and `</p>` for the tagline.'
  id: totrans-1328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在页眉中，您可以编辑标题或标语。只需确保不要编辑或删除相关的HTML标签：标题使用`<h1>`和`</h1>`，标语使用`<p>`和`</p>`。
- en: Edit the `section` elements as you need, adjusting the heading and text.
  id: totrans-1329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据需要编辑`section`元素，调整标题和文本。
- en: 'To add a new section, follow these steps:'
  id: totrans-1330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要添加新部分，请按照以下步骤操作：
- en: a)  Open the HTML file in a text editor.
  id: totrans-1331
  prefs: []
  type: TYPE_NORMAL
  zh: a) 在文本编辑器中打开HTML文件。
- en: b)  Select an existing section. That is, select everything between and including
    a single pair of `<section>` and `</section>` tags, as shown in figure 6.9.
  id: totrans-1332
  prefs: []
  type: TYPE_NORMAL
  zh: b) 选择一个现有的部分。也就是说，选择包括单个`<section>`和`</section>`标签对之间的所有内容，如图6.9所示。
- en: '![](../../OEBPS/Images/CH06_F09_McFedries3.png)'
  id: totrans-1333
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH06_F09_McFedries3.png)'
- en: Figure 6.9 Select an existing section element.
  id: totrans-1334
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.9 选择一个现有的section元素。
- en: c)  Copy the entry (for example, by pressing either Ctrl-C or Cmd-C).
  id: totrans-1335
  prefs: []
  type: TYPE_NORMAL
  zh: c) 复制条目（例如，通过按Ctrl-C或Cmd-C）。
- en: d)  Create a new line at the point where you want the new section to appear.
    For example, if you want the new section to appear above the page’s first section,
    position the cursor immediately before the first `<section>` tag, and then press
    Enter or Return.
  id: totrans-1336
  prefs: []
  type: TYPE_NORMAL
  zh: d) 在您想要新部分出现的位置创建一个新行。例如，如果您想在页面的第一个部分上方出现新部分，请将光标置于第一个`<section>`标签之前，然后按Enter或Return键。
- en: e)  Position the cursor on the new line you just created, as shown in figure
    6.10.
  id: totrans-1337
  prefs: []
  type: TYPE_NORMAL
  zh: e) 将光标置于您刚刚创建的新行上，如图6.10所示。
- en: '![](../../OEBPS/Images/CH06_F10_McFedries3.png)'
  id: totrans-1338
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH06_F10_McFedries3.png)'
- en: Figure 6.10 Position the cursor where you want to paste the code you copied.
  id: totrans-1339
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.10 将光标置于您想要粘贴复制的代码的位置。
- en: f)  Paste the copied code (for example, by pressing either Ctrl-C or Cmd-C).
  id: totrans-1340
  prefs: []
  type: TYPE_NORMAL
  zh: f) 粘贴复制的代码（例如，通过按Ctrl-C或Cmd-C）。
- en: g)  Edit the section title and text.
  id: totrans-1341
  prefs: []
  type: TYPE_NORMAL
  zh: g) 编辑部分标题和文本。
- en: 'If your entry text includes multiple paragraphs, you can ensure that each paragraph
    renders properly by surrounding it with a `<p>` tag at the beginning and a `</p>`
    tag at the end:'
  id: totrans-1342
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您的入口文本包含多个段落，您可以通过在段落前后添加`<p>`标签来确保每个段落都能正确渲染：
- en: '[PRE94]'
  id: totrans-1343
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE94]'
- en: In the footer section of the HTML code, you can add links to your social media
    accounts, as I describe in chapter 4.
  id: totrans-1344
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在HTML代码的页脚部分，您可以添加指向您的社交媒体账户的链接，正如我在第4章中描述的那样。
- en: 'Now, here are a few customization ideas for the CSS code:'
  id: totrans-1345
  prefs: []
  type: TYPE_NORMAL
  zh: 现在为您提供了几个CSS代码的定制化建议：
- en: If you want your page to have a different maximum width, change the `max-width`
    value to something other than `800px`.
  id: totrans-1346
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果您希望页面具有不同的最大宽度，请将`max-width`值更改为`800px`以外的值。
- en: For any color value, you can change the existing color to a different color
    keyword.
  id: totrans-1347
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何颜色值，您都可以将现有颜色更改为不同的颜色关键字。
- en: For any font size value, you can change the number to increase or decrease the
    font size. Just make sure you leave the `px` unit in place.
  id: totrans-1348
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何字体大小值，您可以通过更改数字来增加或减少字体大小。只需确保保留`px`单位。
- en: For any padding or margin value, you can change the number to increase or decrease
    the padding or margins. In each case, be sure to leave the `px` unit in place.
  id: totrans-1349
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何填充或边距值，你可以更改数字以增加或减少填充或边距。在每种情况下，务必保留`px`单位。
- en: 'To give your text more breathing room, create some extra space between each
    line by adding the declaration `line-height: 1.5;` somewhere in the CSS code’s
    `body` rule:'
  id: totrans-1350
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '为了给您的文本提供更多呼吸空间，通过在CSS代码的`body`规则中添加声明`line-height: 1.5;`在每行之间创建一些额外空间：'
- en: '[PRE95]'
  id: totrans-1351
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE95]'
- en: To make your page code more accessible, consider converting all px measurements
    to rem measurements. 1 rem is by default equivalent to 16 px, so 20 px is 1.25 rem,
    24 px is 1.5 rem, 32 px is 2 rem, 48 px is 3 rem, and so on. The rem unit is more
    accessible because it measures font sizes relative to the default font size the
    browser user has defined in their browser settings.
  id: totrans-1352
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了使您的页面代码更易于访问，考虑将所有`px`测量值转换为`rem`测量值。默认情况下，1 `rem`相当于16 `px`，所以20 `px`是1.25 `rem`，24 `px`是1.5 `rem`，32 `px`是2 `rem`，48 `px`是3 `rem`，依此类推。`rem`单位更易于访问，因为它测量的是相对于浏览器用户在浏览器设置中定义的默认字体大小的字体大小。
- en: 6.5 Building prompts for the other site pages
  id: totrans-1353
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6.5 为其他网站页面构建提示
- en: Although some information websites consist of just a single page, the majority
    have several pages, and many have quite a few. If that’s the case for your site,
    your next task is to prompt ChatGPT for the code to create your other pages.
  id: totrans-1354
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然一些信息网站只包含一个页面，但大多数网站都有几个页面，很多网站甚至有很多页面。如果您的网站也是这样，您的下一个任务就是提示ChatGPT生成其他页面的代码。
- en: Fortunately, these other pages will have a structure very similar to your home
    page, with the only difference being that the `main` element will store each page’s
    headings and text. All this means your prompt for each subtopic page will be very
    similar to the prompt for your home page. Note, too, that you don’t need any new
    CSS for these subtopic pages, so you can skip the CSS part of the prompt.
  id: totrans-1355
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，这些其他页面将与您的首页结构非常相似，唯一的区别是`main`元素将存储每个页面的标题和文本。这意味着您每个子主题页面的提示将与您首页的提示非常相似。请注意，您也不需要为这些子主题页面添加任何新的CSS，因此您可以跳过提示中的CSS部分。
- en: 'Here’s a generic prompt you can use:'
  id: totrans-1356
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个通用的提示您可以使用：
- en: '[PRE96]'
  id: totrans-1357
  prefs: []
  type: TYPE_PRE
  zh: '[PRE96]'
- en: Note the final instruction to ChatGPT to not add inline styles, which refers
    to CSS code added directly to an HTML tag. In the absence of any CSS-related instructions,
    ChatGPT has a tendency to insert a few formatting suggestions in the form of inline
    styles. Because all the styling you need is already in your styles.css file, you
    have to tell ChatGPT to hold off adding any new styling that may mess up your
    pages. Figure 6.11 shows an example page generated by ChatGPT for my information
    site.
  id: totrans-1358
  prefs: []
  type: TYPE_NORMAL
  zh: 注意对ChatGPT的最后一条指示，即不要添加内联样式，这指的是直接添加到HTML标签中的CSS代码。在没有任何CSS相关指示的情况下，ChatGPT倾向于插入一些以内联样式形式出现的格式建议。因为您需要的所有样式都已经包含在您的styles.css文件中，所以您必须告诉ChatGPT不要添加任何可能破坏您页面的新样式。图6.11显示了ChatGPT为我信息网站生成的示例页面。
- en: '![](../../OEBPS/Images/CH06_F11_McFedries3.png)'
  id: totrans-1359
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH06_F11_McFedries3.png)'
- en: Figure 6.11 Another information site page generated by ChatGPT
  id: totrans-1360
  prefs: []
  type: TYPE_NORMAL
  zh: 图6.11 ChatGPT生成的另一个信息网站页面
- en: Whatever type of entity you want to highlight—be it an organization, community,
    event, charity, team, or project—an information website is a great way to tell
    the world about it and help people learn more. Now, with ChatGPT as your coding
    partner, you can get an entire website up and running with just a few prompts.
  id: totrans-1361
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您想突出显示哪种类型的实体——无论是组织、社区、活动、慈善机构、团队还是项目——信息网站都是向世界介绍它的绝佳方式，并帮助人们了解更多。现在，有了ChatGPT作为您的编码伙伴，您只需几个提示就可以建立一个完整的网站并使其运行。
- en: Summary
  id: totrans-1362
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: A link is a special HTML tag that, when clicked, takes the user to a specified
    web page.
  id: totrans-1363
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 链接是一个特殊的HTML标签，当点击时，会将用户带到指定的网页。
- en: A navigation bar is a collection of links to the other pages on the website
    (or, if the site is large, to the site’s most important pages).
  id: totrans-1364
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导航栏是一组链接，指向网站上的其他页面（或者，如果网站很大，指向网站最重要的页面）。
- en: For best results, your page prompt should be as specific as possible, including
    colors, font sizes, and heading levels.
  id: totrans-1365
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了获得最佳效果，您的页面提示应尽可能具体，包括颜色、字体大小和标题级别。
- en: Save the generated HTML to the index.xhtml file and the generated CSS to the
    filename suggested by ChatGPT in the HTML code, usually styles.css.
  id: totrans-1366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将生成的HTML保存到index.xhtml文件中，将生成的CSS保存到ChatGPT在HTML代码中建议的文件名中，通常是styles.css。
- en: 7 Creating site content
  id: totrans-1367
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 7 创建网站内容
- en: This chapter covers
  id: totrans-1368
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖
- en: Collaborating with ChatGPT to create and edit content
  id: totrans-1369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与ChatGPT协作创建和编辑内容
- en: Getting ChatGPT to write in your own style
  id: totrans-1370
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让ChatGPT以你的风格写作
- en: Getting AI help to edit your writing
  id: totrans-1371
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取AI帮助编辑你的写作
- en: Adding a hero image
  id: totrans-1372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加英雄图片
- en: Prompting ChatGPT to build a page for an interest or hobby
  id: totrans-1373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示ChatGPT为兴趣或爱好创建页面
- en: Examining and customizing the ChatGPT web page code
  id: totrans-1374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查和自定义ChatGPT网页代码
- en: As I explained in chapter 1, the *G* in GPT stands for *generative*, and it
    means you can use ChatGPT not only to have conversations but also to create new
    things. As you’ve seen so far in this book, that generated content can be ideas
    for the page title and tagline, suggestions for typefaces that match your page
    topic, color scheme recommendations, links, navigation bars, and, of course, the
    HTML and CSS code to build the final web page.
  id: totrans-1375
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我在第一章中解释的，GPT中的“G”代表“生成”，这意味着你可以使用ChatGPT不仅进行对话，还可以创建新事物。正如你在本书中迄今为止所看到的，这些生成内容可以是页面标题和标语的想法，匹配页面主题的字型建议，配色方案推荐，链接，导航栏，当然还有构建最终网页的HTML和CSS代码。
- en: However, your generative content ambitions don’t have to be restricted to small
    snippets of text and code. If you have an itch to put your true self on the web
    for all to see, one of the best ways to do that is to write about an interest
    or hobby that fascinates or engages you. If you’re not sure what to write or you’re
    having trouble getting started, this chapter shows you how to bring in ChatGPT
    as a collaborator to help you get going. You learn how to get AI-generated content
    ideas and writing suggestions, use AI for research, and even use ChatGPT to write
    in your voice.
  id: totrans-1376
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，你的生成内容雄心不必局限于小块的文本和代码。如果你有在网络上展示你真实自我的冲动，那么最好的方法之一就是写关于一个让你着迷或吸引你的兴趣或爱好。如果你不确定写什么，或者你开始有困难，本章将向你展示如何将ChatGPT作为合作伙伴引入，以帮助你开始。你将学习如何获取AI生成的创意和写作建议，使用AI进行研究，甚至使用ChatGPT以你的风格写作。
- en: You also learn how to craft a detailed prompt that you’ll pass along to ChatGPT
    to produce the code for a page devoted to an interest or hobby, where you can
    post whatever content you and ChatGPT have created together. This chapter also
    provides a high-level explanation of the code generated by ChatGPT and even provides
    a few tips for customizing the code manually to get everything just the way you
    want.
  id: totrans-1377
  prefs: []
  type: TYPE_NORMAL
  zh: 你还将学习如何制作一个详细的提示，将其传递给ChatGPT以生成一个专门针对兴趣或爱好页面的代码，在那里你可以发布你与ChatGPT共同创建的内容。本章还提供了ChatGPT生成的代码的高级解释，甚至提供了一些手动定制代码的技巧，以获得你想要的一切。
- en: 7.1 Understanding this chapter’s project
  id: totrans-1378
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.1 理解本章的项目
- en: 'In this chapter, you create a simple website devoted to an interest or hobby.
    You’re going to hire ChatGPT as your writing assistant to help you brainstorm
    ideas, do research, and create first drafts for the site content. The home page
    will include the following components:'
  id: totrans-1379
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将创建一个专注于兴趣或爱好的简单网站。你将雇佣ChatGPT作为你的写作助手，帮助你构思想法，进行研究，并为网站内容创建初稿。主页将包括以下组件：
- en: 'A header element that includes the following:'
  id: totrans-1380
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含以下内容的页眉元素：
- en: An image that takes up the full width and height of the browser window
  id: totrans-1381
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 占据整个浏览器窗口宽度和高度的图片
- en: The website title
  id: totrans-1382
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站标题
- en: The website tagline
  id: totrans-1383
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网站标语
- en: A navigation element with links to other site pages
  id: totrans-1384
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含链接到其他网站页面的导航元素
- en: A main element with some introductory text and links to the other site pages
  id: totrans-1385
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含一些介绍性文本和链接到其他网站页面的主要元素
- en: A footer element that includes a copyright notice
  id: totrans-1386
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚元素
- en: Figure 7.1 shows an example of an interest website’s home page built with code
    generated by ChatGPT.
  id: totrans-1387
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.1展示了使用ChatGPT生成的代码构建的一个兴趣网站主页的示例。
- en: '![](../../OEBPS/Images/CH07_F01_McFedries3.png)'
  id: totrans-1388
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH07_F01_McFedries3.png)'
- en: Figure 7.1 An interest website home page generated by ChatGPT
  id: totrans-1389
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.1 ChatGPT生成的兴趣网站主页
- en: 'The other site pages will use a similar structure:'
  id: totrans-1390
  prefs: []
  type: TYPE_NORMAL
  zh: 其他网站页面将使用类似的结构：
- en: 'A header element that includes the following:'
  id: totrans-1391
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含以下内容的页眉元素：
- en: A hero image
  id: totrans-1392
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 英雄图片
- en: The page title
  id: totrans-1393
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面标题
- en: The page subtitle
  id: totrans-1394
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面副标题
- en: A navigation element with links to other site pages
  id: totrans-1395
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含链接到其他网站页面的导航元素
- en: A main element with the page text
  id: totrans-1396
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含页面文本的主要元素
- en: A footer element with a copyright notice
  id: totrans-1397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚元素
- en: Figure 7.2 shows an example of such a page. The simplicity of these pages means
    you can easily customize them for use with any interest, hobby, or obsession you
    want to share with the world.
  id: totrans-1398
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.2显示了这样一个页面的示例。这些页面的简单性意味着你可以轻松地根据你想要与世界分享的任何兴趣、爱好或痴迷来定制它们。
- en: '![](../../OEBPS/Images/CH07_F02_McFedries3.png)'
  id: totrans-1399
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH07_F02_McFedries3.png)'
- en: Figure 7.2 A subtopic page
  id: totrans-1400
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.2 一个子主题页面
- en: 7.2 Generating and editing text with ChatGPT
  id: totrans-1401
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.2 使用ChatGPT生成和编辑文本
- en: If you have a hankering not only to write but also to share that writing with
    others by posting it to the web, you may be more than a little leery about using
    ChatGPT as a writing assistant or even as a kind of ghost(in the machine)writer.
    If writing is important to you, it’s also important that it’s *your* writing,
    not something manufactured by AI.
  id: totrans-1402
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不仅想写，还想通过在网络上发布来与他人分享你的写作，你可能会对使用ChatGPT作为写作助手或甚至作为一种机器中的幽灵（作者）持谨慎态度。如果你认为写作很重要，那么它也是重要的，这是你的写作，而不是由AI制造的东西。
- en: However, none of that means you can’t use ChatGPT for some of the grunt work
    associated with writing. Need some ideas for content? ChatGPT can help. Need to
    do some research for a post? That’s right up ChatGPT’s alley. Stuck facing a blank
    screen? Get ChatGPT to generate something, anything, and maybe a sentence or even
    a phrase of that text will be enough to spark your imagination. Not happy with
    something you wrote? Ask ChatGPT to take a look at it and suggest improvements.
  id: totrans-1403
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这并不意味着你不能用ChatGPT来完成一些与写作相关的繁琐工作。需要一些内容想法吗？ChatGPT可以帮忙。需要为文章做一些研究？这正是ChatGPT擅长的。面对空白的屏幕感到困惑？让ChatGPT生成一些东西，任何东西，也许那句话或甚至那个短语就足以激发你的想象力。对你写的东西不满意？让ChatGPT看看它，并提出改进建议。
- en: There’s really no end to the ways ChatGPT can act as your personal writing assistant.
    And, of course, if you want, you can even get ChatGPT to write everything for
    you. If you can do that and still sleep well at night, well, I’m not going to
    try to persuade you otherwise.
  id: totrans-1404
  prefs: []
  type: TYPE_NORMAL
  zh: 真的没有尽头的方式来让ChatGPT充当你的个人写作助手。当然，如果你想的话，甚至可以让ChatGPT为你写一切。如果你能这样做并且还能睡得香，嗯，我可不打算试图说服你改变主意。
- en: 7.2.1 Getting ChatGPT to suggest writing ideas
  id: totrans-1405
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.2.1 让ChatGPT建议写作想法
- en: ChatGPT excels at many tasks, but one of its strongest talents is suggesting
    ideas for writing on just about any topic, no matter how obscure or arcane. That
    is, if you have a general sense of the theme you want to pursue in your writing,
    ChatGPT can come up with content ideas from multiple angles.
  id: totrans-1406
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT擅长许多任务，但其中一项最突出的才能是就几乎任何主题提出写作想法，无论多么晦涩或神秘。也就是说，如果你对你的写作想要追求的主题有一个大致的概念，ChatGPT可以从多个角度提出内容想法。
- en: 'You should begin your prompt by assigning ChatGPT a role:'
  id: totrans-1407
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该从为ChatGPT分配一个角色开始你的提示：
- en: '[PRE97]'
  id: totrans-1408
  prefs: []
  type: TYPE_PRE
  zh: '[PRE97]'
- en: Replace `[`*`topic`*`]` with a word or phrase that describes the theme or subject
    you want to write about.
  id: totrans-1409
  prefs: []
  type: TYPE_NORMAL
  zh: 用一个词或短语替换`[`*`主题`*`]`，描述你想要写的主题或内容。
- en: 'Now add a question that will get ChatGPT to generate some ideas for a post.
    Here are a few examples to get you started:'
  id: totrans-1410
  prefs: []
  type: TYPE_NORMAL
  zh: 现在添加一个问题，让ChatGPT为你生成一些文章的想法。以下是一些示例，帮助你开始：
- en: '[PRE98]'
  id: totrans-1411
  prefs: []
  type: TYPE_PRE
  zh: '[PRE98]'
- en: 'Again, in each case, you replace `[`*`topic`*`]` with a word or phrase that
    describes the theme or subject you want to write about. For example, figure 7.3
    shows the ideas that Copilot (in Creative mode) generated for me based on the
    following prompt:'
  id: totrans-1412
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，在每种情况下，你都用一个词或短语替换`[`*`主题`*`]`，这个词或短语描述了你想要写的主题或内容。例如，图7.3显示了Copilot（在创意模式下）基于以下提示为我生成的一些想法：
- en: '[PRE99]'
  id: totrans-1413
  prefs: []
  type: TYPE_PRE
  zh: '[PRE99]'
- en: '![](../../OEBPS/Images/CH07_F03_McFedries3.png)'
  id: totrans-1414
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH07_F03_McFedries3.png)'
- en: Figure 7.3 ChatGPT’s ideas for getting started with bread baking
  id: totrans-1415
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.3 ChatGPT关于如何开始面包烘焙的想法
- en: These are excellent suggestions and would serve nicely as a starting point for
    a post to interest beginners in baking bread. Note that it’s important to consider
    ChatGPT’s content ideas as just the beginning. It’s up to you to flesh out the
    details to create an awesome post.
  id: totrans-1416
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是极好的建议，可以作为一篇吸引面包烘焙初学者的文章的起点。请注意，将ChatGPT的内容想法视为起点是很重要的。细节的充实取决于你，以创建一篇出色的文章。
- en: 7.2.2 Generating ideas for how to write about a topic
  id: totrans-1417
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.2.2 生成关于如何写主题的想法
- en: In the previous section, you learned how to use ChatGPT to generate writing
    ideas. A similar use for ChatGPT is to ask it how to write about either a particular
    topic or a particular approach to a topic.
  id: totrans-1418
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，你学习了如何使用ChatGPT来生成写作想法。ChatGPT的另一个类似用途是询问它如何就某个特定主题或某个特定主题的特定方法进行写作。
- en: 'As usual, begin your prompt by assigning ChatGPT a role:'
  id: totrans-1419
  prefs: []
  type: TYPE_NORMAL
  zh: 如同往常，首先给你的ChatGPT分配一个角色：
- en: '[PRE100]'
  id: totrans-1420
  prefs: []
  type: TYPE_PRE
  zh: '[PRE100]'
- en: Replace `[`*`topic`*`]` with a word or phrase that describes the theme or subject
    you want to explore through writing.
  id: totrans-1421
  prefs: []
  type: TYPE_NORMAL
  zh: 将 `[`*`topic`*`]` 替换为你想要通过写作探索的主题或主题的描述性单词或短语。
- en: 'Next you add a question that will prompt ChatGPT to come up with ideas for
    how to write about your theme. Here are some examples:'
  id: totrans-1422
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你添加一个问题，以促使ChatGPT想出如何撰写你的主题的想法。以下是一些示例：
- en: '[PRE101]'
  id: totrans-1423
  prefs: []
  type: TYPE_PRE
  zh: '[PRE101]'
- en: 'Again, replace `[`*`topic`*`]` in each example with text that describes the
    theme or subject of your writing. For example, figure 7.4 shows the writing ideas
    that Copilot (in Creative mode) generated from the following prompt:'
  id: totrans-1424
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，在每个示例中将 `[`*`topic`*`]` 替换为描述你写作主题的文本。例如，图7.4显示了Copilot（在创意模式下）从以下提示中生成的写作想法：
- en: '[PRE102]'
  id: totrans-1425
  prefs: []
  type: TYPE_PRE
  zh: '[PRE102]'
- en: These are great suggestions not only for writing about bread baking but also
    for writing about almost anything else!
  id: totrans-1426
  prefs: []
  type: TYPE_NORMAL
  zh: 这些建议不仅适用于撰写面包烘焙方面的文章，而且适用于撰写几乎所有其他主题的文章！
- en: '![](../../OEBPS/Images/CH07_F04_McFedries3.png)'
  id: totrans-1427
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH07_F04_McFedries3.png)'
- en: Figure 7.4 ChatGPT’s advice for writing engagingly about bread baking
  id: totrans-1428
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.4 ChatGPT关于如何引人入胜地撰写面包烘焙文章的建议
- en: 7.2.3 Getting ChatGPT help for researching a topic
  id: totrans-1429
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.2.3 获取ChatGPT帮助研究主题
- en: The GPT models that underlie ChatGPT were trained on an impossible-to-imagine
    amount of data, which means they know quite a bit about almost any topic you care
    to name. That makes ChatGPT the perfect research assistant because you can ask
    it for help exploring whatever topic you want to write about, and you’ll get back
    lots of helpful pointers.
  id: totrans-1430
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT背后的GPT模型在难以想象的大量数据上进行了训练，这意味着它们对几乎所有你感兴趣的任何主题都有相当的了解。这使得ChatGPT成为完美的研究助手，因为你可以要求它帮助你探索你想要撰写的任何主题，你将得到大量有用的提示。
- en: 'Here’s a prompt you can use to ask ChatGPT for research assistance:'
  id: totrans-1431
  prefs: []
  type: TYPE_NORMAL
  zh: 这是你可以用来请求ChatGPT研究帮助的提示：
- en: '[PRE103]'
  id: totrans-1432
  prefs: []
  type: TYPE_PRE
  zh: '[PRE103]'
- en: 'As usual, `[`*`topic`*`]` is a short description of the subject you want to
    research. Here’s what the other placeholders represent:'
  id: totrans-1433
  prefs: []
  type: TYPE_NORMAL
  zh: 如同往常，`[`*`topic`*`]` 是你想要研究的主题的简短描述。以下是一些其他占位符所代表的含义：
- en: '*`A`*, *`B`*, and *`C`*—General themes related to the overall topic.'
  id: totrans-1434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*`A`*、*`B`*和*`C`*——与整体主题相关的一般主题。'
- en: '*`X`*, *`Y`*, and *`Z`*—Specific aspects of the overall topic.'
  id: totrans-1435
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*`X`*、*`Y`*和*`Z`*——整体主题的特定方面。'
- en: Tip The final sentence in the prompt assumes you’re using a version of ChatGPT
    that’s connected to the web. I highly recommend a web-connected version for this
    because the generated links enable you to fact-check ChatGPT’s results and also
    give you more fodder for your research.
  id: totrans-1436
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：提示中的最后一句话假设你正在使用一个连接到网络的ChatGPT版本。我强烈推荐使用网络连接版本，因为生成的链接使你能够核实ChatGPT的结果，并为你提供更多研究素材。
- en: 'Here’s an example:'
  id: totrans-1437
  prefs: []
  type: TYPE_NORMAL
  zh: 这是示例：
- en: '[PRE104]'
  id: totrans-1438
  prefs: []
  type: TYPE_PRE
  zh: '[PRE104]'
- en: Figure 7.5 shows the last part of an exceptionally long response to the previous
    prompt from Copilot (in Creative mode). The prompt assumes you’re writing for
    a general audience, but of course, you should modify that depending on your intended
    reader.
  id: totrans-1439
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.5显示了Copilot（在创意模式下）对先前提示的异常长响应的最后一部分。提示假设你是在为普通受众写作，但当然，你应该根据你预期的读者进行修改。
- en: '![](../../OEBPS/Images/CH07_F05_McFedries3.png)'
  id: totrans-1440
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH07_F05_McFedries3.png)'
- en: Figure 7.5 The last part of ChatGPT’s response to a prompt for help researching
    the history of coffee
  id: totrans-1441
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.5 ChatGPT对请求帮助研究咖啡历史的提示的最后一部分响应
- en: 7.2.4 Getting ChatGPT to write in your own voice
  id: totrans-1442
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.2.4 让ChatGPT用你的风格写作
- en: An elusive goal of ChatGPT-generated writing is getting the model to output
    prose that sounds like you. Sure, ChatGPT can readily (and, often, amusingly)
    generate prose in the style of famous writers such as James Joyce, Emily Dickinson,
    and Dr. Seuss. That’s because ChatGPT was (almost certainly) trained on large
    samples of those authors’ writings. However, it’s unlikely that ChatGPT has an
    inkling of how *you* write.
  id: totrans-1443
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT生成写作的一个难以实现的目标是让模型输出的散文听起来像你。当然，ChatGPT可以轻松（并且，经常是幽默地）生成像詹姆斯·乔伊斯、艾米莉·狄金森和苏斯博士这样的著名作家的风格散文。这是因为ChatGPT（几乎肯定）是在这些作者的大量写作样本上进行了训练。然而，ChatGPT可能对你如何写作一无所知。
- en: That’s not a problem, however, because you can “train” ChatGPT to write like
    you. How? By giving ChatGPT several samples of your writing, asking it to analyze
    the tone and style of those samples, and then asking it to write something new
    in the same voice.
  id: totrans-1444
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这不是问题，因为你可以“训练”ChatGPT模仿你的写作风格。如何做到？通过给ChatGPT提供你写作的几个样本，要求它分析这些样本的语气和风格，然后要求它用相同的语气写一些新的内容。
- en: 'Here’s the prompt:'
  id: totrans-1445
  prefs: []
  type: TYPE_NORMAL
  zh: 这是提示：
- en: '[PRE105]'
  id: totrans-1446
  prefs: []
  type: TYPE_PRE
  zh: '[PRE105]'
- en: 'Replace each instance of *`Writing sample #n`* with a sample of your writing.'
  id: totrans-1447
  prefs: []
  type: TYPE_NORMAL
  zh: '将每个“*写作样本 #n*”实例替换为您自己的写作样本。'
- en: Note Ideally, your writing samples should use the same style and tone that you
    want to use for the piece of writing you’d like to create.
  id: totrans-1448
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：理想情况下，您的写作样本应使用您想要用于您想要创建的写作的风格和语气。
- en: You don’t have to include all five samples. You can use just two or three or
    even a single long sample, but remember that the more text you provide, the more
    accurate the analysis provided by ChatGPT and the more successful the prompt.
  id: totrans-1449
  prefs: []
  type: TYPE_NORMAL
  zh: 您不必包括所有五个样本。您可以使用两个或三个，甚至一个单独的长样本，但请记住，您提供的文本越多，ChatGPT提供的分析就越准确，提示就越成功。
- en: 'Tip If you have a favorite author whose writing style you admire and would
    like to emulate to a certain extent, include that in your prompt. For example,
    to ask ChatGPT to include a smidgen of the style and tone of Eudora Welty, add
    this to your prompt: `Please also include about 10 percent of the tone and style
    of Eudora Welty`.'
  id: totrans-1450
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：如果您有一位您钦佩并希望在一定程度上模仿的作者，请将其包含在提示中。例如，要请ChatGPT包含Eudora Welty的风格和语气的一小部分，请将以下内容添加到提示中：“请也包含大约10%的Eudora
    Welty的语气和风格”。
- en: 'In the prompt, replace *X* with a brief description of the writing you want
    ChatGPT to generate. Here’s an example:'
  id: totrans-1451
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示中，将*X*替换为您想要ChatGPT生成的写作的简要描述。以下是一个示例：
- en: '[PRE106]'
  id: totrans-1452
  prefs: []
  type: TYPE_PRE
  zh: '[PRE106]'
- en: Figure 7.6 shows the story that GPT-4 (Copilot in Creative mode) generated based
    on my writing samples.
  id: totrans-1453
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.6显示了基于我的写作样本，GPT-4（创意模式下的Copilot）生成的故事。
- en: '![](../../OEBPS/Images/CH07_F06_McFedries3.png)'
  id: totrans-1454
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH07_F06_McFedries3.png)'
- en: Figure 7.6 The story generated by Copilot in Creative mode
  id: totrans-1455
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.6 Creative模式下的Copilot生成的故事
- en: 'This is a pretty good first attempt: it matches the tone and style of the writing
    samples, it’s a decent story idea, and it has some genuine humor. However, it’s
    far from perfect:'
  id: totrans-1456
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一次相当不错的尝试：它符合写作样本的语气和风格，它是一个相当不错的创意，并且有一些真正的幽默。然而，它远非完美：
- en: It contains some errors, such as including “Pittsburgh” as an example of a word
    that uses the letters “ough.”
  id: totrans-1457
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它包含一些错误，例如将“匹兹堡”作为一个使用“ough”字母的单词的例子。
- en: Some of the writing is clunky and will require substantial rewriting to bring
    it up to snuff.
  id: totrans-1458
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些写作比较笨拙，需要大量重写才能达到标准。
- en: The use of real names (such as Justice Sonia Sotomayer) in a satirical piece
    such as this is a bad choice. A better way to go would be to use made-up names
    that play on the letters “ough.”
  id: totrans-1459
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这样的讽刺作品中使用真实姓名（如索尼亚·索托马约尔大法官）是一个糟糕的选择。更好的做法是使用基于“ough”字母的虚构名字。
- en: These sorts of problems are common with AI-generated writing, so you should
    always carefully proofread anything created by ChatGPT and be prepared to do quite
    a bit of rewriting.
  id: totrans-1460
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题在AI生成的写作中很常见，因此您应该始终仔细校对ChatGPT创建的任何内容，并准备好进行大量的重写。
- en: 7.2.5 Rewriting post text
  id: totrans-1461
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.2.5 重写后文本
- en: 'After you’ve written some text, you may wonder if your prose could be improved
    in some way so it’s funnier, more succinct, more verbose, easier to understand,
    more academic, and so on. Happily, as long as your text is either online or otherwise
    in a form that you can load into a web browser (such as an HTML file, a text file,
    or a PDF file), ChatGPT—specifically, the Microsoft Copilot app—is happy to help.
    Here’s how:'
  id: totrans-1462
  prefs: []
  type: TYPE_NORMAL
  zh: 在您写了一些文本之后，您可能会想知道您的散文是否可以通过某种方式改进，使其更有趣、更简洁、更冗长、更容易理解、更学术化等等。幸运的是，只要您的文本是在线的，或者以您能够将其加载到网页浏览器中的形式（例如HTML文件、文本文件或PDF文件），ChatGPT——特别是Microsoft
    Copilot应用——都愿意提供帮助。以下是方法：
- en: 1.  In the Microsoft Edge browser, open the Copilot sidebar.
  id: totrans-1463
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在Microsoft Edge浏览器中打开Copilot侧边栏。
- en: 2.  Navigate to the page or open the file that contains the text you want to
    rewrite.
  id: totrans-1464
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 导航到包含您想要重写的文本的页面或打开该文件。
- en: 3.  Select the text you want to rewrite.
  id: totrans-1465
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择您想要重写的文本。
- en: 4.  In the sidebar, you see the message `Send selected or copied text to chat?`,
    as shown in figure 7.7.
  id: totrans-1466
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在侧边栏中，您会看到消息“将选定的或复制的文本发送到聊天？”，如图7.7所示。
- en: '![](../../OEBPS/Images/CH07_F07_McFedries3.png)'
  id: totrans-1467
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH07_F07_McFedries3.png)'
- en: Figure 7.7 Select some text in the current page, and Copilot asks if you want
    to send it to the AI.
  id: totrans-1468
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.7 在当前页面中选择一些文本，Copilot会询问您是否想将其发送到AI。
- en: 5.  Click Send. Copilot asks what you want to do with the text.
  id: totrans-1469
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击发送。Copilot询问您想对文本做什么。
- en: '6.  Type your instruction. Here are some examples:'
  id: totrans-1470
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 输入您的指令。以下是一些示例：
- en: —   Make it funnier
  id: totrans-1471
  prefs: []
  type: TYPE_NORMAL
  zh: —  使其更有趣
- en: —   Make it more succinct
  id: totrans-1472
  prefs: []
  type: TYPE_NORMAL
  zh: —  使其更简洁
- en: —   Make it easier to understand
  id: totrans-1473
  prefs: []
  type: TYPE_NORMAL
  zh: —  使其更容易理解
- en: —   Make it more academic
  id: totrans-1474
  prefs: []
  type: TYPE_NORMAL
  zh: —  使其更具学术性
- en: —   Rewrite it for a 10-year-old
  id: totrans-1475
  prefs: []
  type: TYPE_NORMAL
  zh: ——  为10岁孩子重写
- en: 7.  Press Enter or Return. Copilot revises the selected text according to the
    instruction you provided in step 6.
  id: totrans-1476
  prefs: []
  type: TYPE_NORMAL
  zh: 7.  按下Enter或Return键。Copilot将根据你在步骤6中提供的说明修改选定的文本。
- en: Figure 7.8 shows the result when I asked Copilot to rewrite the selected text
    shown in figure 7.7 for a 10-year-old.
  id: totrans-1477
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.8展示了当我要求Copilot将图7.7中选定的文本重写为10岁孩子能理解的形式时的结果。
- en: '![](../../OEBPS/Images/CH07_F08_McFedries3.png)'
  id: totrans-1478
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH07_F08_McFedries3.png)'
- en: Figure 7.8 The selected text from figure 7.7, rewritten for a 10-year-old
  id: totrans-1479
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.8 图7.7中选定的文本，为10岁孩子重写
- en: 'You may have noticed something about all the writing samples I’ve had ChatGPT
    generate so far. That’s right: no HTML tags! Those are important, so you learn
    how to include them in your ChatGPT-generated writing in the next section.'
  id: totrans-1480
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经注意到了我到目前为止生成的所有写作样本。没错：没有HTML标签！这些标签很重要，所以你将在下一节中学习如何在ChatGPT生成的写作中包含它们。
- en: 7.2.6 Don’t forget the HTML tags
  id: totrans-1481
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.2.6 不要忘记HTML标签
- en: 'No matter what writing you create in collaboration with ChatGPT, in the end
    the text will reside in a web page. This means the text needs to be structured
    with the appropriate HTML tags, particularly for the text headings and paragraphs.
    To get ChatGPT to do this for you, add the following to the end of your writing
    prompt:'
  id: totrans-1482
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你与ChatGPT合作创作什么内容，最终文本都会存在于一个网页中。这意味着文本需要用适当的HTML标签进行结构化，尤其是文本标题和段落。为了让ChatGPT为你完成这项工作，请在你的写作提示末尾添加以下内容：
- en: '[PRE107]'
  id: totrans-1483
  prefs: []
  type: TYPE_PRE
  zh: '[PRE107]'
- en: With your site text ready to publish, it’s time to get ChatGPT to help you build
    your home page. You learn how in the next section.
  id: totrans-1484
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的网站文本准备发布时，是时候让ChatGPT帮助你构建主页了。你将在下一节中学习如何操作。
- en: 7.3 Building the home page
  id: totrans-1485
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.3 构建主页
- en: 'Because this project is a multipage website, it’s best to build the site’s
    components in stages. The basic process is summarized here:'
  id: totrans-1486
  prefs: []
  type: TYPE_NORMAL
  zh: 因为这个项目是一个多页网站，最好分阶段构建网站组件。基本流程如下总结：
- en: Prompt ChatGPT to generate the HTML code for the website’s home page.
  id: totrans-1487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示ChatGPT生成网站主页的HTML代码。
- en: Prompt ChatGPT to generate the CSS code for the website’s styling. Note that
    it’s best to combine these first two steps into a single prompt.
  id: totrans-1488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示ChatGPT生成网站样式的CSS代码。请注意，最好将这两个步骤合并为一个提示。
- en: 'For each of your other site pages, prompt ChatGPT to generate the HTML code
    for that page. In particular, the prompt for each of the other site pages should
    include the following:'
  id: totrans-1489
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于你的其他网站页面，提示ChatGPT生成该页面的HTML代码。特别是，其他网站页面的提示应包括以下内容：
- en: An instruction to use the same CSS file in which you saved the CSS generated
    by step 2
  id: totrans-1490
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用与步骤2生成的CSS相同的CSS文件
- en: An instruction to not generate any extra styles, particularly inline styles
    (that is, CSS code inserted directly into HTML tags)
  id: totrans-1491
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示不要生成任何额外的样式，尤其是内联样式（即直接插入HTML标签中的CSS代码）
- en: Before you get to all that, take a minute to familiarize yourself with the new
    web page technology introduced in this chapter.
  id: totrans-1492
  prefs: []
  type: TYPE_NORMAL
  zh: 在你开始所有这些之前，花一分钟熟悉本章中介绍的新网页技术。
- en: 7.3.1 Working with hero images
  id: totrans-1493
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.3.1 与英雄图片合作
- en: 'The only new web page technology you learn about in this chapter is the *hero
    image*: an eye-catching photo or illustration that takes up the entire width (and
    usually the entire height) of the browser window when you first land on a page.
    Figure 7.9 shows an example web page that includes a hero image.'
  id: totrans-1494
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中你唯一需要了解的新网页技术是*英雄图片*：当你首次访问页面时，占据整个浏览器窗口宽度（通常也是整个高度）的引人注目照片或插图。图7.9展示了包含英雄图片的示例网页。
- en: '![A close up of a bread Description automatically generated](../../OEBPS/Images/CH07_F09_McFedries3.png)'
  id: totrans-1495
  prefs: []
  type: TYPE_IMG
  zh: '![面包特写，自动生成的描述](../../OEBPS/Images/CH07_F09_McFedries3.png)'
- en: Figure 7.9 A web page with a hero image
  id: totrans-1496
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.9 带有英雄图片的网页
- en: 'Here are some pointers to bear in mind when using a hero image:'
  id: totrans-1497
  prefs: []
  type: TYPE_NORMAL
  zh: 使用英雄图片时，以下是一些需要注意的要点：
- en: The image subject should be relevant to your page topic.
  id: totrans-1498
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图片主题应与你的页面主题相关。
- en: The image should be dramatic or eye-catching in some way.
  id: totrans-1499
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图片应具有戏剧性或引人注目的特点。
- en: Use an image that’s high-quality and free of distortions such as pixelation.
    If you’re using a photo, it should be well-composed and well-lit.
  id: totrans-1500
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用高质量且无像素化等扭曲的图片。如果你使用的是照片，它应该构图良好且光线充足。
- en: Don’t use an image file that’s too small, or it will get distorted when the
    browser expands it to fit the window. An image that’s 1,200 pixels wide with an
    aspect ratio (that is, the ratio of width to height) of 16:9 is the ideal size
    for most larger screens (and for smaller device screens in landscape mode).
  id: totrans-1501
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要使用过小的图像文件，否则当浏览器将其扩展以适应窗口时，它将会变形。宽度为1,200像素，宽高比为16:9的图像对于大多数较大屏幕（以及横向模式下的较小设备屏幕）是理想的大小。
- en: Use an image that’s not so busy that your text will get lost or be unreadable.
  id: totrans-1502
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用不会使你的文本丢失或难以阅读的图像。
- en: As you see a bit later, you can tell ChatGPT to darken the image a little, so
    don’t worry if your image appears too light for your text.
  id: totrans-1503
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如你稍后所见，你可以告诉ChatGPT稍微加深图像的亮度，所以如果你的图像对于你的文本来说看起来太亮，请不要担心。
- en: If you don’t have a suitable image, you can ask DALL-E or Copilot’s Image Creator
    to generate one for you (as I described in chapter 5).
  id: totrans-1504
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你没有合适的图像，你可以要求DALL-E或Copilot的图像创建器为你生成一个（如第5章所述）。
- en: 'To get ChatGPT to add a hero image to a page, your prompt should include an
    instruction similar to the following:'
  id: totrans-1505
  prefs: []
  type: TYPE_NORMAL
  zh: 要让ChatGPT向页面添加英雄图片，你的提示应该包含类似于以下说明的指令：
- en: '[PRE108]'
  id: totrans-1506
  prefs: []
  type: TYPE_PRE
  zh: '[PRE108]'
- en: 'Interestingly, when you examine the HTML code, you won’t see a reference to
    the image file. For example, here’s the HTML code that creates the header shown
    in figure 7.9:'
  id: totrans-1507
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，当你检查HTML代码时，你不会看到对图像文件的引用。例如，下面是创建图7.9中所示标题的HTML代码：
- en: '[PRE109]'
  id: totrans-1508
  prefs: []
  type: TYPE_PRE
  zh: '[PRE109]'
- en: 'The hero image is embedded into the `header` element in the CSS, as shown by
    this partial listing of the `header` rule used for the `header` element in figure
    7.9:'
  id: totrans-1509
  prefs: []
  type: TYPE_NORMAL
  zh: 英雄图片嵌入到CSS中的`header`元素中，如图7.9中用于`header`元素的`header`规则的部分列表所示：
- en: '[PRE110]'
  id: totrans-1510
  prefs: []
  type: TYPE_PRE
  zh: '[PRE110]'
- en: This code tells the web browser to display the image file hero.jpg as the background
    of the `header` element and that the image should cover the entire element. Using
    a hero image is a great way to grab a visitor’s attention right off the bat, which
    is why this has been one of the most popular web design trends for the past few
    years.
  id: totrans-1511
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码告诉网络浏览器将图像文件hero.jpg作为`header`元素的背景显示，并且图像应该覆盖整个元素。使用英雄图片是立即吸引访客注意力的好方法，这也是为什么这已经成为过去几年最受欢迎的网页设计趋势之一。
- en: 7.3.2 Crafting the home page prompt
  id: totrans-1512
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.3.2 构建主页提示
- en: 'This chapter’s project is a website devoted to an interest or hobby. You’re
    almost ready to construct the home page prompt for ChatGPT, but first you need
    to make sure you already have these items:'
  id: totrans-1513
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的项目是一个关于兴趣或爱好的网站。你几乎准备好为ChatGPT构建主页提示了，但首先你需要确保你已经有了以下这些物品：
- en: 'Some or all of the following: a page logo, title, and tagline'
  id: totrans-1514
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以下内容之一或全部：页面标志、标题和标语
- en: The names of the typefaces you want to use for the page headings and the page
    text
  id: totrans-1515
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想要用于页面标题和页面文本的字体名称
- en: The keywords of the colors you want to apply to the page backgrounds and text
  id: totrans-1516
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想要应用于页面背景和文本的颜色关键词
- en: Refer to chapter 3 to learn more about these design elements and how to prompt
    ChatGPT for title, typeface, and color suggestions.
  id: totrans-1517
  prefs: []
  type: TYPE_NORMAL
  zh: 参考第3章了解更多关于这些设计元素以及如何提示ChatGPT获取标题、字体和颜色建议的信息。
- en: 'The starting point for your interest or hobby website is the home page, which
    you can enlist ChatGPT to help you build. Your prompt should begin like this:'
  id: totrans-1518
  prefs: []
  type: TYPE_NORMAL
  zh: 你的兴趣或爱好网站起点是主页，你可以请ChatGPT帮助你构建。你的提示应该开始如下：
- en: '[PRE111]'
  id: totrans-1519
  prefs: []
  type: TYPE_PRE
  zh: '[PRE111]'
- en: 'Then specify the content of your page, including the following (refer to figure
    7.10):'
  id: totrans-1520
  prefs: []
  type: TYPE_NORMAL
  zh: 然后指定你页面的内容，包括以下内容（参见图7.10）：
- en: A header that includes your hero image, page title, and tagline and a navigation
    bar with links to your other site pages
  id: totrans-1521
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含你的英雄图片、页面标题和标语以及包含链接到你的其他网站页面的导航栏的标题
- en: A main element that begins with an introductory paragraph welcoming visitors
    to your site
  id: totrans-1522
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个以欢迎访客的介绍段落开始的主体元素
- en: For each of your site’s subtopics, a section element that includes a header
    with the subtopic title, a description of the subtopic, and a link to the subtopic
  id: totrans-1523
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于你网站的每个子主题，一个包含子主题标题、子主题描述和子主题链接的章节元素
- en: A footer that includes a copyright notice
  id: totrans-1524
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚
- en: 'Next, ask ChatGPT to generate the CSS for how you want your page formatted:'
  id: totrans-1525
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，请让ChatGPT生成你想要页面格式的CSS：
- en: '[PRE112]'
  id: totrans-1526
  prefs: []
  type: TYPE_PRE
  zh: '[PRE112]'
- en: 'Specify the formatting, including the following:'
  id: totrans-1527
  prefs: []
  type: TYPE_NORMAL
  zh: 指定格式，包括以下内容：
- en: The page background color and text color.
  id: totrans-1528
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面背景颜色和文本颜色。
- en: The type sizes and color you want to use for the page title, tagline, and navigation
    links.
  id: totrans-1529
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想要用于页面标题、标语和导航链接的字体大小和颜色。
- en: The fonts to use for the headings and regular page text.
  id: totrans-1530
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于标题和常规页面文本的字体。
- en: A maximum width for the main element. This prevents the lines of text from getting
    too long. A maximum length of 800 px is fine for most pages.
  id: totrans-1531
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主要元素的最大宽度。这可以防止文本行过长。对于大多数页面，800 px的最大长度就足够了。
- en: '![](../../OEBPS/Images/CH07_F10_McFedries3.png)'
  id: totrans-1532
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH07_F10_McFedries3.png)'
- en: Figure 7.10 The sections of the interest site’s home page
  id: totrans-1533
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.10 感兴趣网站主页的各个部分
- en: 'Here’s an example prompt for my own home page:'
  id: totrans-1534
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我的主页的一个示例提示：
- en: '[PRE113]'
  id: totrans-1535
  prefs: []
  type: TYPE_PRE
  zh: '[PRE113]'
- en: 'ChatGPT should create the HTML code first, which you can copy and then paste
    and save to a file named index.xhtml. In that code, you should see a line near
    the top similar to the following:'
  id: totrans-1536
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT应首先创建HTML代码，您可以复制并粘贴到名为index.xhtml的文件中，然后保存。在这段代码中，您应该看到顶部附近类似以下的一行：
- en: '[PRE114]'
  id: totrans-1537
  prefs: []
  type: TYPE_PRE
  zh: '[PRE114]'
- en: This code tells the web browser to look for the CSS code in a file named styles.css,
    so your next task is to copy the generated CSS code, paste it into a file, and
    save it as styles.css (or whatever name you see in the `<link>` tag). Be sure
    to save styles.css in the same folder as your index.xhtml file. You also need
    to copy your hero image file into the same folder. Refer to appendix A to learn
    more about working web page files.
  id: totrans-1538
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码告诉网络浏览器在名为styles.css的文件中查找CSS代码，因此您的下一个任务是复制生成的CSS代码，将其粘贴到文件中，并保存为styles.css（或您在`<link>`标签中看到的任何名称）。请确保将styles.css保存与您的index.xhtml文件相同的文件夹中。您还需要将您的英雄图片文件复制到同一文件夹中。有关更多关于工作网页文件的信息，请参阅附录A。
- en: I submitted this prompt to GPT-4 using OpenAI’s ChatGPT app. The code it generated
    resulted in the page shown in figure 7.11.
  id: totrans-1539
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用OpenAI的ChatGPT应用提交了这个提示，它生成的代码导致了图7.11所示的页面。
- en: '![](../../OEBPS/Images/CH07_F11_McFedries3.png)'
  id: totrans-1540
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH07_F11_McFedries3.png)'
- en: Figure 7.11 The home page generated by ChatGPT
  id: totrans-1541
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.11 ChatGPT生成的主页
- en: If you like the home page that ChatGPT made for you, you can skip the rest of
    this section and move on to the other pages (refer to “Building prompts for the
    other site pages”). However, if you’d like to know a bit more about the code that
    ChatGPT generated, the next section gives you a closer look.
  id: totrans-1542
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢ChatGPT为您创建的主页，您可以跳过本节的其余部分，并继续到其他页面（请参阅“为其他网站页面构建提示”）。但是，如果您想了解更多关于ChatGPT生成的代码的信息，下一节将为您提供更详细的了解。
- en: 7.4 Examining the home page code
  id: totrans-1543
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.4 检查主页代码
- en: I’m going to give you a short and not-too-technical overview of the home page
    code that resulted from my prompt from the previous section (that home page is
    shown in figure 7.11).
  id: totrans-1544
  prefs: []
  type: TYPE_NORMAL
  zh: 我将为您提供一个简短且不太技术性的概述，这是从我上一节提示（如图7.11所示的主页）中得到的页面代码。
- en: 'Note The generated HTML and CSS code for my online journal page are available
    on this book’s website ([www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt))
    and in the book’s GitHub repository: [https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt).'
  id: totrans-1545
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：本书网站上（[www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt)）和GitHub存储库（[https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)）中提供了我在线日志页面的生成的HTML和CSS代码。
- en: Every version of ChatGPT should output HTML and CSS code that’s at least similar
    to what’s displayed in the next two sections, so my code annotations should help
    you understand what’s happening under the hood.
  id: totrans-1546
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的每个版本都应该输出至少与下一两个部分显示的类似的HTML和CSS代码，因此我的代码注释应该能帮助您理解底层发生了什么。
- en: 7.4.1 Examining the HTML
  id: totrans-1547
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.4.1 检查HTML
- en: 'The HTML code that ChatGPT generated for my interest website home page is shown
    here:'
  id: totrans-1548
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT为我感兴趣网站的主页生成的HTML代码如下所示：
- en: '[PRE115]'
  id: totrans-1549
  prefs: []
  type: TYPE_PRE
  zh: '[PRE115]'
- en: ① Specifies the page character set
  id: totrans-1550
  prefs: []
  type: TYPE_NORMAL
  zh: ① 指定页面字符集
- en: ② Loads the page fonts from Google Fonts
  id: totrans-1551
  prefs: []
  type: TYPE_NORMAL
  zh: ② 从Google Fonts加载页面字体
- en: ③ Tells the web browser where to find the CSS code
  id: totrans-1552
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 告诉网络浏览器在哪里找到CSS代码
- en: ④ Page header
  id: totrans-1553
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 页面页眉
- en: ⑤ Navigation element
  id: totrans-1554
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 导航元素
- en: ⑥ Page title
  id: totrans-1555
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 页面标题
- en: ⑦ Page tagline
  id: totrans-1556
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 页面标语
- en: ⑧ Page header
  id: totrans-1557
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 页面页眉
- en: ⑨ Main element
  id: totrans-1558
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ 主要元素
- en: ⑩ Page introduction
  id: totrans-1559
  prefs: []
  type: TYPE_NORMAL
  zh: ⑩ 页面简介
- en: ⑪ Each section element has a heading, description, and link.
  id: totrans-1560
  prefs: []
  type: TYPE_NORMAL
  zh: ⑪ 每个部分元素都有一个标题、描述和链接。
- en: ⑫ Main element
  id: totrans-1561
  prefs: []
  type: TYPE_NORMAL
  zh: ⑫ 主要元素
- en: ⑬ Page footer
  id: totrans-1562
  prefs: []
  type: TYPE_NORMAL
  zh: ⑬ 页面页脚
- en: 'Note that the HTML code includes the following line:'
  id: totrans-1563
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，HTML代码中包含以下行：
- en: '[PRE116]'
  id: totrans-1564
  prefs: []
  type: TYPE_PRE
  zh: '[PRE116]'
- en: This tag tells the web browser where to find the CSS code, which I describe
    in the next section.
  id: totrans-1565
  prefs: []
  type: TYPE_NORMAL
  zh: 这个标签告诉网络浏览器在哪里找到CSS代码，我将在下一节中描述。
- en: 7.4.2 Examining the CSS
  id: totrans-1566
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.4.2 检查CSS
- en: 'ChatGPT’s generated CSS code for my interest website home page is shown here:'
  id: totrans-1567
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT为我感兴趣网站的主页生成的CSS代码如下所示：
- en: '[PRE117]'
  id: totrans-1568
  prefs: []
  type: TYPE_PRE
  zh: '[PRE117]'
- en: ① Resets some styles
  id: totrans-1569
  prefs: []
  type: TYPE_NORMAL
  zh: ① 重置一些样式
- en: ② Styles the page background color, font, font size, and text color
  id: totrans-1570
  prefs: []
  type: TYPE_NORMAL
  zh: 使用样式设置页面背景颜色、字体、字体大小和文字颜色
- en: ③ Sets up the hero image to fill the browser window
  id: totrans-1571
  prefs: []
  type: TYPE_NORMAL
  zh: 设置英雄图片以填充浏览器窗口
- en: ④ Centers the header text
  id: totrans-1572
  prefs: []
  type: TYPE_NORMAL
  zh: 使用样式使页眉文本居中
- en: ⑤ Darkens the hero image to make the text easier to read
  id: totrans-1573
  prefs: []
  type: TYPE_NORMAL
  zh: 使用样式使英雄图像变暗，以便更容易阅读
- en: ⑥ Styles the navigation element
  id: totrans-1574
  prefs: []
  type: TYPE_NORMAL
  zh: 使用样式设置导航元素
- en: ⑦ Styles the navigation links
  id: totrans-1575
  prefs: []
  type: TYPE_NORMAL
  zh: 使用样式设置导航链接
- en: ⑧ Adds an underline to each nav link when hovered over
  id: totrans-1576
  prefs: []
  type: TYPE_NORMAL
  zh: 在鼠标悬停时为每个导航链接添加下划线
- en: ⑨ Sets the page title font size to 72 px, and applies the Raleway font
  id: totrans-1577
  prefs: []
  type: TYPE_NORMAL
  zh: 将页面标题的字体大小设置为72 px，并应用Raleway字体
- en: ⑩ Styles the tagline with font size 36 px
  id: totrans-1578
  prefs: []
  type: TYPE_NORMAL
  zh: 使用36 px的字体大小样式设置标语
- en: ⑪ Styles the page headings with color saddlebrown, font size 48 px, and the
    Raleway font
  id: totrans-1579
  prefs: []
  type: TYPE_NORMAL
  zh: 使用颜色为saddlebrown、字体大小48 px和Raleway字体的样式设置页面标题
- en: ⑫ Adds a 20 px margin below each main element paragraph
  id: totrans-1580
  prefs: []
  type: TYPE_NORMAL
  zh: 为每个主元素段落添加20 px的下边距
- en: ⑬ Styles the main element with 25 px padding, 800 px maximum width, and centered
  id: totrans-1581
  prefs: []
  type: TYPE_NORMAL
  zh: 使用25 px的内边距、800 px的最大宽度和居中对齐样式设置主元素
- en: ⑭ Styles the page links with color saddlebrown and no underline
  id: totrans-1582
  prefs: []
  type: TYPE_NORMAL
  zh: 使用颜色为saddlebrown且无下划线的样式设置页面链接
- en: ⑮ Adds an underline to each link when hovered over
  id: totrans-1583
  prefs: []
  type: TYPE_NORMAL
  zh: 在鼠标悬停时为每个链接添加下划线
- en: ⑯ Styles the page footer
  id: totrans-1584
  prefs: []
  type: TYPE_NORMAL
  zh: 使用样式设置页面页脚
- en: If you like, you can use these annotations to tweak your web page code, as I
    describe in the next section.
  id: totrans-1585
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你愿意，可以使用这些注释来调整你的网页代码，正如我在下一节中描述的那样。
- en: 7.4.3 Customizing the home page
  id: totrans-1586
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7.4.3 自定义首页
- en: If you don’t like the home page that results from the code generated by ChatGPT,
    feel free to tweak your prompt and try again. However, if you only want to make
    a few small tweaks, consider editing the code manually.
  id: totrans-1587
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不喜欢ChatGPT生成的代码生成的首页，请随意调整你的提示并再次尝试。然而，如果你只想进行一些小的调整，考虑手动编辑代码。
- en: 'First, here are some customization suggestions for the HTML code:'
  id: totrans-1588
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，这里有一些HTML代码的定制建议：
- en: 'In the header, you can edit the title or tagline. Just be sure not to edit
    or delete the associated HTML tags: `<h1>` and `</h1>` for the title, and `<p>`
    and `</p>` for the tagline.'
  id: totrans-1589
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在页眉中，你可以编辑标题或标语。只需确保不要编辑或删除相关的HTML标签：标题的`<h1>`和`</h1>`，标语的`<p>`和`</p>`。
- en: In the header, edit the link text and link filename as needed for your website
    files.
  id: totrans-1590
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在页眉中，根据你的网站文件需要编辑链接文本和链接文件名。
- en: Edit the `section` elements, adjusting the heading, description, and link as
    needed.
  id: totrans-1591
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编辑`section`元素，根据需要调整标题、描述和链接。
- en: To add a new section, copy an existing section (that is, everything between
    and including a single pair of `<section>` and `</section>` tags), paste the code
    where you want it in the `main` element (that is, between the `<main>` and `</main>`
    tags), and then adjust the heading, description, and link. (Refer to chapter 6
    for more detailed instructions on adding a new `section` element.)
  id: totrans-1592
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要添加一个新部分，复制一个现有的部分（即单个`<section>`和`</section>`标签之间的所有内容），将代码粘贴到`main`元素中你想要的位置（即在`<main>`和`</main>`标签之间），然后调整标题、描述和链接。（有关添加新`section`元素的更详细说明，请参阅第6章。）
- en: In the footer section of the HTML code, you can add links to your social media
    accounts, as I described in chapter 4.
  id: totrans-1593
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在HTML代码的页脚部分，你可以添加指向你的社交媒体账户的链接，正如我在第4章中描述的那样。
- en: 'Now, here are a few customization ideas for the CSS code:'
  id: totrans-1594
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这里有一些CSS代码的定制想法：
- en: 'To set the darkness of the hero image, ChatGPT uses the following code:'
  id: totrans-1595
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了设置英雄图像的暗度，ChatGPT使用以下代码：
- en: '[PRE118]'
  id: totrans-1596
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE118]'
- en: 'You control the darkness by adjusting the final numbers in the two `rgba` functions
    (the `0.5` values in this code). The first `rgba` function controls the darkness
    of the top half of the image, and the second `rgba` function controls the darkness
    of the bottom half. Use values closer to `0` for lighter and closer to `1` for
    darker. Here’s a darker example:'
  id: totrans-1597
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过调整两个`rgba`函数中的最后数字（此代码中的`0.5`值）来控制暗度。第一个`rgba`函数控制图像上半部分的暗度，第二个`rgba`函数控制下半部分的暗度。使用接近`0`的值以获得更亮的效果，使用接近`1`的值以获得更暗的效果。以下是一个更暗的示例：
- en: '[PRE119]'
  id: totrans-1598
  prefs: []
  type: TYPE_PRE
  zh: '[PRE119]'
- en: 'To give your text more breathing room, create some extra space between each
    line by adding the declaration `line-height: 1.5;` somewhere in the CSS code’s
    `body` rule:'
  id: totrans-1599
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '为了给你的文字提供更多的呼吸空间，在CSS代码的`body`规则中添加声明`line-height: 1.5;`以在每行之间创建一些额外的空间：'
- en: '[PRE120]'
  id: totrans-1600
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE120]'
- en: 'If you want your page to have a different maximum width, locate the `main`
    rule in the CSS code and change the `max-width` value to something other than
    `800px`. In the following example, I’ve changed the maximum width to `960px`:'
  id: totrans-1601
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想你的页面有不同的最大宽度，定位CSS代码中的`main`规则，并将`max-width`值更改为`800px`以外的值。在以下示例中，我已经将最大宽度更改为`960px`：
- en: '[PRE121]'
  id: totrans-1602
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE121]'
- en: For any color value, you can change the existing color to a different color
    keyword.
  id: totrans-1603
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何颜色值，您可以将现有的颜色更改为不同的颜色关键字。
- en: For any font size value, you can change the number to increase or decrease the
    font size. Just make sure you leave the `px` unit in place.
  id: totrans-1604
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何字体大小值，您可以通过更改数字来增加或减少字体大小。只需确保您保留`px`单位。
- en: For any padding or margin value, you can change the number to increase or decrease
    the padding or margins. In each case, be sure to leave the `px` unit in place.
  id: totrans-1605
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何填充或边距值，您可以通过更改数字来增加或减少填充或边距。在每种情况下，请确保保留`px`单位。
- en: To make your page code more accessible, consider converting all px measurements
    to rem measurements. 1 rem is by default equivalent to 16 px, so 20 px is 1.25 rem,
    24 px is 1.5 rem, 32 px is 2 rem, 48 px is 3 rem, and so on. The rem unit is more
    accessible because it measures font sizes relative to the default font size the
    browser user has defined in their browser settings.
  id: totrans-1606
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了使您的页面代码更易于访问，请考虑将所有`px`测量值转换为`rem`测量值。默认情况下，1 `rem`相当于16 `px`，因此20 `px`是1.25
    `rem`，24 `px`是1.5 `rem`，32 `px`是2 `rem`，48 `px`是3 `rem`，依此类推。`rem`单位更易于访问，因为它测量的是浏览器用户在其浏览器设置中定义的默认字体大小。
- en: 7.5 Building prompts for the other site pages
  id: totrans-1607
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7.5 为其他网站页面构建提示
- en: Although it’s possible that your interest/hobby website consists of just a single
    page, it’s far more likely that you’ll have several pages, one for each subtopic
    of your site’s main topic. If that’s the case, your next chore is to prompt ChatGPT
    for the code to create your other pages.
  id: totrans-1608
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然您的兴趣/爱好网站可能只包含一个页面，但更有可能的是，您将拥有几个页面，每个页面对应于您网站主要主题的每个子主题。如果是这样，您的下一个任务是提示ChatGPT生成您其他页面的代码。
- en: Fortunately, these other pages will have a structure very similar to your home
    page, with the only difference being that the `main` element will store each page’s
    headings and text. All this means your prompt for each subtopic page will be very
    similar to the prompt for your home page. Note, too, that you don’t need any new
    CSS for these subtopic pages, so you can skip the CSS part of the prompt.
  id: totrans-1609
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，这些其他页面将与您的首页结构非常相似，唯一的区别是`main`元素将存储每个页面的标题和文本。这意味着您每个子主题页面的提示将与您首页的提示非常相似。请注意，您也不需要为这些子主题页面添加任何新的CSS，因此您可以跳过提示中的CSS部分。
- en: 'Here’s a generic prompt you can use:'
  id: totrans-1610
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个通用的提示您可以使用：
- en: '[PRE122]'
  id: totrans-1611
  prefs: []
  type: TYPE_PRE
  zh: '[PRE122]'
- en: Note the final instruction to ChatGPT to not add inline styles, which refers
    to CSS code added directly to an HTML tag. In the absence of any CSS-related instructions,
    ChatGPT has a tendency to insert a few formatting suggestions in the form of inline
    styles. Because all the styling you need is already present in your styles.css
    file, you need to tell ChatGPT to hold off on adding any new styling that may
    mess up your pages.
  id: totrans-1612
  prefs: []
  type: TYPE_NORMAL
  zh: 注意对ChatGPT的最后一条指令，即不要添加内联样式，这指的是直接添加到HTML标签中的CSS代码。在没有任何CSS相关指令的情况下，ChatGPT倾向于插入一些以内联样式形式出现的格式建议。因为您需要的所有样式已经存在于您的styles.css文件中，所以您需要告诉ChatGPT不要添加任何可能破坏您页面的新样式。
- en: Figure 7.12 shows an example page generated by ChatGPT for my interest site.
    Whatever your interest or hobby, why not enlist ChatGPT’s help to share your enthusiasm
    with friends, family, and whoever drops by your new website? It has never been
    easier to show the world what you care about!
  id: totrans-1613
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.12显示了ChatGPT为我感兴趣网站生成的示例页面。无论您的兴趣或爱好是什么，为什么不请ChatGPT帮忙与朋友、家人以及任何访问您新网站的人分享您的热情呢？向世界展示您所关心的事情从未如此简单！
- en: '![](../../OEBPS/Images/CH07_F12_McFedries3.png)'
  id: totrans-1614
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH07_F12_McFedries3.png)'
- en: Figure 7.12 A subtopic page generated by ChatGPT
  id: totrans-1615
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.12 ChatGPT生成的子主题页面
- en: Summary
  id: totrans-1616
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: A hero image is an eye-catching photo or illustration that takes up the entire
    width (and usually the entire height) of the browser window when you first land
    on a page.
  id: totrans-1617
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 英雄图片是一张引人注目的照片或插图，当您首次进入页面时，它将占据整个浏览器窗口的宽度（通常也是整个高度）。
- en: You can use ChatGPT to suggest writing ideas, offer tips for writing about specific
    topics, and help research topics.
  id: totrans-1618
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以使用ChatGPT来提出写作想法，提供关于特定主题的写作技巧，并帮助研究主题。
- en: To get ChatGPT to write in your own voice, supply it with several examples of
    your writing, ask it to analyze the samples for tone and style, and then ask it
    to write something that emulates your writing voice.
  id: totrans-1619
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要让ChatGPT用您的声音写作，请提供您的一些写作示例，要求它分析样本的语气和风格，然后要求它写一些模仿您写作风格的内容。
- en: For best results, your page prompt should be as specific as possible, including
    colors, font sizes, and heading levels.
  id: totrans-1620
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了获得最佳效果，您的页面提示应尽可能具体，包括颜色、字体大小和标题级别。
- en: For the website home page, save the generated HTML to the index.xhtml file and
    the generated CSS to the filename suggested by ChatGPT in the HTML code, usually
    styles.css.
  id: totrans-1621
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于网站主页，将生成的 HTML 保存到 index.xhtml 文件，并将生成的 CSS 保存到 ChatGPT 在 HTML 代码中建议的文件名，通常是
    styles.css。
- en: For each website subtopic page, ask ChatGPT to create only the HTML code and
    save it to whatever filename you’re using for the page.
  id: totrans-1622
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每个网站子主题页面，请 ChatGPT 仅创建 HTML 代码，并将其保存到你为页面使用的任何文件名。
- en: 8 Generating site forms
  id: totrans-1623
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 8 生成网站表单
- en: This chapter covers
  id: totrans-1624
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖
- en: Dealing with text boxes and text areas
  id: totrans-1625
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理文本框和文本区域
- en: Working with check boxes and radio buttons
  id: totrans-1626
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与复选框和单选按钮一起工作
- en: Adding selection lists and buttons to a form
  id: totrans-1627
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向表单添加选择列表和按钮
- en: Using the free Getform service to have form data sent to you
  id: totrans-1628
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用免费的 Getform 服务将表单数据发送给你
- en: Crafting a ChatGPT prompt for building an event sign-up page
  id: totrans-1629
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为构建活动注册页面创建 ChatGPT 提示
- en: Examining and customizing the ChatGPT- generated code
  id: totrans-1630
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查和自定义 ChatGPT 生成的代码
- en: Most web pages—and all the web projects so far in this book—are read-only media,
    meaning their purpose is to present each visitor with information related to the
    page’s main topic. Such pages require nothing of the visitor except their time
    and attention (which are big asks in these overly busy times!).
  id: totrans-1631
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数网页——以及本书中迄今为止的所有网页项目——都是只读媒体，这意味着它们的目的是为每位访客提供与页面主题相关的信息。此类页面不需要访客做任何事情，除了他们的时间和注意力（在如此繁忙的时代，这两者都是很大的要求！）。
- en: However, there are plenty of scenarios where you’ll want your page to be more
    interactive, meaning you ask users to provide you with some information. Perhaps
    you want to get feedback about your website. Maybe you want to present your visitors
    with a survey or quiz. Or maybe you want to offer folks a way to sign up for a
    newsletter or register for an upcoming event. Whatever the reason, you solicit
    such information by offering a *form*, which is a special web page object that
    has fields the visitor fills in and then submits.
  id: totrans-1632
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有许多场景下你可能希望你的页面更加互动，这意味着你需要用户提供一些信息。也许你想要获取关于你网站的反馈。也许你想要向访客展示一份调查或测验。或者，也许你想要为人们提供一种订阅时事通讯或注册即将举行的活动的方式。无论原因如何，你通过提供一个*表单*来征求此类信息，这是一个特殊的网页对象，访客可以在其中填写字段并提交。
- en: In this chapter, you learn how forms work, what kinds of fields you can use,
    and how to get form data emailed to you. You then use this information to create
    a detailed prompt for ChatGPT to generate the necessary code for an event signup
    page. This chapter also provides a high-level explanation of the code generated
    by ChatGPT and tips for customizing the code.
  id: totrans-1633
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将学习表单的工作原理，你可以使用哪些类型的字段，以及如何将表单数据通过电子邮件发送给你。然后，你使用这些信息为 ChatGPT 创建一个详细的提示，以生成活动注册页面所需的代码。本章还提供了
    ChatGPT 生成的代码的高级解释以及自定义代码的技巧。
- en: 8.1 Checking out this chapter’s project
  id: totrans-1634
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8.1 检查本章的项目
- en: 'This chapter’s project is a simple web page that includes a form that enables
    a page visitor to sign up for an upcoming event. The final page will include the
    following components:'
  id: totrans-1635
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的项目是一个简单的网页，其中包含一个表单，允许页面访客注册即将举行的活动。最终页面将包括以下组件：
- en: A header element that includes the website logo, title, and tagline
  id: totrans-1636
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含网站标志、标题和标语的头元素
- en: A main element that includes the event title, some info, and a form for signing
    up for the event
  id: totrans-1637
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含活动标题、一些信息和注册活动表单的主要元素
- en: A footer element that includes a copyright notice
  id: totrans-1638
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚元素
- en: Figure 8.1 shows an example of the type of page you’ll build with ChatGPT’s
    help in this chapter.
  id: totrans-1639
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.1 展示了在本章中，在 ChatGPT 的帮助下你将构建的页面类型示例。
- en: '![](../../OEBPS/Images/CH08_F01_McFedries3.png)'
  id: totrans-1640
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH08_F01_McFedries3.png)'
- en: Figure 8.1 An event sign-up page generated by ChatGPT
  id: totrans-1641
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.1 由 ChatGPT 生成的活动注册页面
- en: The example form includes all the major types of form controls, which means
    you can easily modify the form to gather other types of information, such as site
    feedback or a survey or quiz. To do any of that, you need to know a bit about
    each type of form control. First, however, you need to learn how to get the form
    data sent to you.
  id: totrans-1642
  prefs: []
  type: TYPE_NORMAL
  zh: 示例表单包括所有主要的表单控件类型，这意味着你可以轻松修改表单以收集其他类型的信息，例如网站反馈或调查或测验。要完成任何这些，你需要了解每种表单控件的一些知识。然而，首先你需要学习如何将表单数据发送给你。
- en: 8.2 Getting the form data sent to you
  id: totrans-1643
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8.2 获取发送给你的表单数据
- en: Unfortunately, there’s no method built into HTML to have a form’s data sent
    to you. To get the form data that a user submits, you need to set up an account
    with a company that provides this service. There are quite a few such companies,
    but for this project, I’m going to use Getform ([https://getform.io](https://getform.io)).
    This company enables you to create a free *endpoint*, which is an address to which
    your form submits its data.
  id: totrans-1644
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，HTML中并没有内置的方法可以将表单数据发送给您。要获取用户提交的表单数据，您需要与提供此服务的公司设置账户。这类公司有很多，但在这个项目中，我将使用Getform
    ([https://getform.io](https://getform.io))。这家公司使您能够创建一个免费的*端点*，这是您的表单提交数据的地址。
- en: 'Although Getform has subscription plans, you may not need one because the service
    also offers a free tier that has the following restrictions:'
  id: totrans-1645
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Getform有订阅计划，但您可能不需要，因为该服务还提供免费层，具有以下限制：
- en: One endpoint only.
  id: totrans-1646
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仅一个端点。
- en: A maximum of 50 form submissions per month.
  id: totrans-1647
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每月最多提交50份表格。
- en: Getform branding is added to each form-submission email message you receive.
  id: totrans-1648
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个收到的表格提交电子邮件消息都会添加Getform品牌。
- en: If one of these restrictions is a dealbreaker for you, check out Getform’s paid
    plans at [https://getform.io/pricing](https://getform.io/pricing) (plans start
    at US $19 per month).
  id: totrans-1649
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这些限制中的任何一个对您来说是决定性的，请查看Getform的付费计划[https://getform.io/pricing](https://getform.io/pricing)（计划起价为每月19美元）。
- en: 8.2.1 Setting up a Getform account
  id: totrans-1650
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.2.1 设置Getform账户
- en: 'First, follow these steps to set up a Getform account:'
  id: totrans-1651
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，按照以下步骤设置Getform账户：
- en: Navigate to the Getform home page ([https://getform.io](https://getform.io)).
  id: totrans-1652
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到Getform主页([https://getform.io](https://getform.io))。
- en: Click the Generate Endpoint for Free button. (If you don’t see that button,
    click Account, Sign Up, or navigate directly to [https://app.getform.io/register](https://app.getform.io/register).)
  id: totrans-1653
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“免费生成端点”按钮。（如果您看不到该按钮，请点击“账户”、“注册”或直接导航到[https://app.getform.io/register](https://app.getform.io/register)。）
- en: Enter your name, email, and password, and then click Sign Up.
  id: totrans-1654
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入您的姓名、电子邮件和密码，然后点击“注册”。
- en: Go to your email inbox, open the Getform email message, and then click the link
    to verify your account.
  id: totrans-1655
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往您的电子邮件收件箱，打开Getform电子邮件消息，然后点击链接以验证您的账户。
- en: 8.2.2 Creating a Getform endpoint
  id: totrans-1656
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.2.2 创建Getform端点
- en: 'With your account verified, log in to your Getform account and then follow
    these steps to set up your form submission endpoint:'
  id: totrans-1657
  prefs: []
  type: TYPE_NORMAL
  zh: 验证您的账户后，登录您的Getform账户，然后按照以下步骤设置您的表单提交端点：
- en: Click Create in the left sidebar. Getform displays the Create dialog, shown
    (filled in) in figure 8.2.
  id: totrans-1658
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在左侧侧边栏中点击“创建”。Getform显示创建对话框，如图8.2所示（已填写）。
- en: Make sure the Form tab is selected.
  id: totrans-1659
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保已选中“表单”选项卡。
- en: Use the Form Endpoint Name text box to type a short but descriptive name for
    your form.
  id: totrans-1660
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用“表单端点名称”文本框输入您的表单的简短但描述性的名称。
- en: Use the Time Zone list to select your time zone.
  id: totrans-1661
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用时区列表选择您的时区。
- en: Click Create.
  id: totrans-1662
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“创建”。
- en: '![](../../OEBPS/Images/CH08_F02_McFedries3.png)'
  id: totrans-1663
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH08_F02_McFedries3.png)'
- en: Figure 8.2 Fill in this form to create your Getform endpoint.
  id: totrans-1664
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.2 填写此表单以创建您的Getform端点。
- en: 'Getform creates your new endpoint and then displays the endpoint’s home page,
    an example of which is shown in figure 8.3\. There are several things to notice
    on this page:'
  id: totrans-1665
  prefs: []
  type: TYPE_NORMAL
  zh: Getform创建您的新端点，然后显示端点的首页，如图8.3所示。在这个页面上有几个需要注意的地方：
- en: You’ll need the endpoint address when you prompt ChatGPT to build your form.
    To avoid errors, click the Copy button to the right of the address, and then paste
    the address into your prompt.
  id: totrans-1666
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当您提示ChatGPT构建您的表单时，您将需要端点地址。为了避免错误，请点击地址右侧的“复制”按钮，然后将地址粘贴到您的提示中。
- en: 'To prevent spam, the example form includes the following code:'
  id: totrans-1667
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了防止垃圾邮件，示例表单包括以下代码：
- en: '[PRE123]'
  id: totrans-1668
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE123]'
- en: This is an example of a *honeypot*, which is a hidden field that your users
    won’t see (and therefore won’t fill in) but a spam bot will fill in and submit.
    (It’s called a honeypot because the spam bot can’t resist it.) A filled-in honeypot
    field tells the Getform server that the submission must be spam. When you build
    your ChatGPT prompt later, you’ll ask ChatGPT to include this code in your form.
  id: totrans-1669
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这是一个*诱饵字段*的例子，这是一个用户看不到（因此不会填写）但垃圾邮件机器人会填写并提交的字段。（它被称为诱饵字段，因为垃圾邮件机器人无法抗拒它。）填写的诱饵字段告诉Getform服务器提交必须是垃圾邮件。当您稍后构建ChatGPT提示时，您会要求ChatGPT将此代码包含在您的表单中。
- en: You can click Inbox at the top of this page to monitor your form submissions.
    But remember that Getform also sends each form submission to your email address.
  id: totrans-1670
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以点击页面顶部的“收件箱”以监控您的表单提交。但请记住，Getform也会将每个表单提交发送到您的电子邮件地址。
- en: '![](../../OEBPS/Images/CH08_F03_McFedries3.png)'
  id: totrans-1671
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH08_F03_McFedries3.png)'
- en: Figure 8.3 When your Getform endpoint is created, you see its home page.
  id: totrans-1672
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.3 当你的Getform端点创建后，你会看到它的主页。
- en: 8.3 Building a form
  id: totrans-1673
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8.3 构建表单
- en: A form is a special collection of HTML elements that enables you to gather information
    from a user and then send that information somewhere. Each of these special HTML
    elements is called a *control*, and in the next few sections, you learn about
    the half-dozen most common and most useful form controls. Knowing what each control
    does and what type of information it is designed to gather will enable you to
    set up a prompt so ChatGPT can build the form you need.
  id: totrans-1674
  prefs: []
  type: TYPE_NORMAL
  zh: 表单是一组特殊的HTML元素，它允许你从用户那里收集信息，然后将这些信息发送到某个地方。这些特殊HTML元素被称为*控件*，在接下来的几节中，你将了解最常见和最有用的六种表单控件。了解每个控件的功能以及它设计用来收集的信息类型，将使你能够设置提示，以便ChatGPT可以构建你需要的表单。
- en: 'Along the way, I’ll provide you with example ChatGPT prompts for each type
    of control. In each example, assume that an instruction similar to the following
    has been included earlier in the prompt:'
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
  zh: 在此过程中，我将为你提供每种控件类型的示例ChatGPT提示。在每个示例中，假设在提示中已经包含了以下类似的指令：
- en: '[PRE124]'
  id: totrans-1676
  prefs: []
  type: TYPE_PRE
  zh: '[PRE124]'
- en: 8.3.1 Specifying the form’s endpoint
  id: totrans-1677
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.3.1 指定表单的端点
- en: 'In this chapter’s example, you learn how to get form data sent to you by using
    a service called Getform. This service provides you with a unique address called
    an *endpoint*, which is a remote script that processes the form data. When you’re
    instructing ChatGPT to build an HTML form, the first specification is this endpoint
    address. (Refer to section 8.2 to learn how to generate a unique endpoint address
    to use with your form.) Here’s an example instruction:'
  id: totrans-1678
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的示例中，你将学习如何使用名为Getform的服务来获取发送给你的表单数据。此服务为你提供一个唯一的地址，称为*端点*，它是一个远程脚本，用于处理表单数据。当你指示ChatGPT构建HTML表单时，第一个规范就是这个端点地址。（参考第8.2节了解如何生成用于表单的唯一端点地址。）以下是一个示例说明：
- en: '[PRE125]'
  id: totrans-1679
  prefs: []
  type: TYPE_PRE
  zh: '[PRE125]'
- en: In this prompt, replace `endpoint` with the address provided to you by the Getform
    service. The `method` attribute referred to in the instruction tells the browser
    how to send the form data.
  id: totrans-1680
  prefs: []
  type: TYPE_NORMAL
  zh: 在此提示中，将`endpoint`替换为Getform服务提供的地址。指令中提到的`method`属性告诉浏览器如何发送表单数据。
- en: With that out of the way, it’s time to take a closer look at the most common
    form controls. The first control type is the text box, discussed next.
  id: totrans-1681
  prefs: []
  type: TYPE_NORMAL
  zh: 在完成这些之后，现在是时候更仔细地查看最常见的表单控件了。第一种控件类型是文本框，接下来将讨论。
- en: 8.3.2 Gathering text with text boxes
  id: totrans-1682
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.3.2 使用文本框收集文本
- en: 'The most common type of form control is the *text box*, which is a rectangular
    area designed to hold text typed by the user. HTML offers a large collection of
    text box input types, each designed to hold a particular kind of information.
    Here are the four most common input types:'
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的表单控件类型是*文本框*，它是一个矩形区域，用于存放用户输入的文本。HTML提供了一大批文本框输入类型，每种都设计用来存放特定类型的信息。以下是四种最常见的输入类型：
- en: '*Text*—Holds any kind of text, which can be any combination of letters, numbers,
    and symbols. Here’s an example instruction to include in your form prompt:'
  id: totrans-1684
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Text*—可以存放任何类型的文本，可以是字母、数字和符号的任意组合。以下是在你的表单提示中要包含的示例说明：'
- en: '[PRE126]'
  id: totrans-1685
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE126]'
- en: '*Number*—Holds numeric data only. Example instruction:'
  id: totrans-1686
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Number*—仅包含数字数据。示例说明：'
- en: '[PRE127]'
  id: totrans-1687
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE127]'
- en: '*Email*—Holds an email address only. The control also checks whether the user
    entered a valid email address. Here’s an example instruction to ChatGPT:'
  id: totrans-1688
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Email*—仅包含电子邮件地址。该控件还会检查用户是否输入了有效的电子邮件地址。以下是一个给ChatGPT的示例说明：'
- en: '[PRE128]'
  id: totrans-1689
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE128]'
- en: '*URL*—Holds a web address. Example instruction:'
  id: totrans-1690
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*URL*—包含一个网页地址。示例说明：'
- en: '[PRE129]'
  id: totrans-1691
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE129]'
- en: Figure 8.4 shows an example of each input type. Notice that the Number field
    includes up and down arrows that the user can click to increment and decrement
    (respectively) the current field value.
  id: totrans-1692
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.4 展示了每种输入类型的示例。请注意，数字字段包括上箭头和下箭头，用户可以点击它们来增加和减少（分别）当前字段值。
- en: '![](../../OEBPS/Images/CH08_F04_McFedries3.png)'
  id: totrans-1693
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH08_F04_McFedries3.png)'
- en: Figure 8.4 The four main text box input types
  id: totrans-1694
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.4 四种主要的文本框输入类型
- en: 'tIP To get ChatGPT to generate code that configures your form with the text
    on the left and the text boxes on the right, include the following in your prompt:
    “Make the form a two-column grid container with the labels in the first column
    and the controls in the second column.”'
  id: totrans-1695
  prefs: []
  type: TYPE_NORMAL
  zh: tIP 要让ChatGPT生成配置你的表单的代码，其中左侧是文本，右侧是文本框，请在你的提示中包含以下内容：“将表单设置为两列网格容器，第一列包含标签，第二列包含控件。”
- en: 'When prompting ChatGPT to include text boxes in a form, you have control over
    the following for each text box:'
  id: totrans-1696
  prefs: []
  type: TYPE_NORMAL
  zh: 当提示ChatGPT在表单中包含文本框时，你可以控制每个文本框的以下内容：
- en: 'You can set the width of the box by specifying a size in characters. In figure
    8.4, for example, each text box is 30 characters wide. Example prompt:'
  id: totrans-1697
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以通过指定字符大小来设置框的宽度。例如，在图8.4中，每个文本框宽度为30个字符。示例提示：
- en: '[PRE130]'
  id: totrans-1698
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE130]'
- en: 'You can specify an initial value. This value appears by default in the text
    box, although the user is free to edit or replace this default value. Example
    prompt:'
  id: totrans-1699
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以指定一个初始值。此值默认显示在文本框中，尽管用户可以自由编辑或替换此默认值。示例提示：
- en: '[PRE131]'
  id: totrans-1700
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE131]'
- en: 'You can specify a *placeholder*, which is some text that appears temporarily
    in the text box and that briefly tells the user what to type into the text box.
    As soon as the user starts typing, the placeholder text disappears. Example prompt:'
  id: totrans-1701
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以指定一个*占位符*，这是一种暂时出现在文本框中的文本，简要告诉用户应该在文本框中输入什么。一旦用户开始输入，占位符文本就会消失。示例提示：
- en: '[PRE132]'
  id: totrans-1702
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE132]'
- en: 'You can specify a maximum and/or minimum length in characters:'
  id: totrans-1703
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以指定最大和/或最小长度（以字符为单位）：
- en: '[PRE133]'
  id: totrans-1704
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE133]'
- en: 'You can specify that a text box is “required” if the user must fill in a value
    before submitting the form:'
  id: totrans-1705
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你指定文本框是“必需的”，则用户在提交表单之前必须填写一个值：
- en: '[PRE134]'
  id: totrans-1706
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE134]'
- en: You may be wondering how you get ChatGPT to name each control (such as the names
    shown to the left of each control in figure 8.4). If you don’t specify a name,
    ChatGPT will make one up for you. Specifying your own control names is the subject
    of the next section.
  id: totrans-1707
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道如何让ChatGPT为每个控件命名（例如，图8.4中每个控件左侧显示的名称）。如果你不指定名称，ChatGPT会为你生成一个。指定自己的控件名称是下一节的主题。
- en: 8.3.3 Adding labels to each control
  id: totrans-1708
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.3.3 为每个控件添加标签
- en: 'If you examine figure 8.4 in the previous section, you can see that the items
    are divided into two columns: the controls are in the right column, and the left
    column contains short bits of text that describe each control. These short bits
    of text are called *labels,* and, with the exception of the button control (discussed
    below), you need to include a label for each field. Your labels should be short
    enough that they don’t take up too much room on the page but descriptive enough
    that the user knows what they’re supposed to type into each field.'
  id: totrans-1709
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你检查上一节中的图8.4，你可以看到项目分为两列：控件在右侧列，左侧列包含描述每个控件的简短文本。这些简短文本被称为*标签*，除了下面的按钮控件外，你需要为每个字段包含一个标签。你的标签应该足够短，以免占用太多页面空间，但描述性足够强，以便用户知道他们应该在每个字段中输入什么。
- en: 'When you’re building your ChatGPT prompt for your form, it’s best to state
    the label you want at the same time you state the rest of your control specifications:'
  id: totrans-1710
  prefs: []
  type: TYPE_NORMAL
  zh: 当你构建ChatGPT的表单提示时，最好在说明其余控件规格的同时说明你想要的标签：
- en: '[PRE135]'
  id: totrans-1711
  prefs: []
  type: TYPE_PRE
  zh: '[PRE135]'
- en: 8.3.4 Handling more text with text areas
  id: totrans-1712
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.3.4 使用文本区域处理更多文本
- en: A text box is useful for gathering relatively short informational tidbits from
    the user, such as their name, email address, or favorite number. However, occasionally,
    your form may need to solicit longer text entries, such as feedback, suggestions,
    questions, or even the user’s bio. For these longer entries, you can add a *text
    area*, which is a form field that supports multiline entries. Figure 8.5 shows
    an example of a text area.
  id: totrans-1713
  prefs: []
  type: TYPE_NORMAL
  zh: 文本框对于收集用户相对较短的信息片段非常有用，例如他们的姓名、电子邮件地址或最喜欢的数字。然而，有时你的表单可能需要收集更长的文本输入，如反馈、建议、问题或甚至用户的个人简介。对于这些较长的输入，你可以添加一个*文本区域*，这是一个支持多行输入的表单字段。图8.5显示了文本区域的示例。
- en: '![](../../OEBPS/Images/CH08_F05_McFedries3.png)'
  id: totrans-1714
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH08_F05_McFedries3.png)'
- en: Figure 8.5 An example of a text area
  id: totrans-1715
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.5 文本区域的示例
- en: 'When prompting ChatGPT to include a text area in a form, you can customize
    the text area in the following ways:'
  id: totrans-1716
  prefs: []
  type: TYPE_NORMAL
  zh: 当提示ChatGPT在表单中包含文本区域时，你可以按以下方式自定义文本区域：
- en: 'You can set the height of the text area box by specifying the number of rows.
    In figure 8.5, for example, the text area’s height is six rows. Example instruction
    to ChatGPT:'
  id: totrans-1717
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以通过指定行数来设置文本区域框的高度。例如，在图8.5中，文本区域的高度为六行。示例指令给ChatGPT：
- en: '[PRE136]'
  id: totrans-1718
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE136]'
- en: Note Whatever the height of the text area, the user is free to enter text beyond
    the specified number of lines. If the amount of text is greater than the height
    of the text area, the user can either scroll the text area vertically or resize
    it by dragging the lower-right corner of the box.
  id: totrans-1719
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：无论文本区域的高度如何，用户都可以自由输入超过指定行数的文本。如果文本量超过文本区域的高度，用户可以垂直滚动文本区域或通过拖动框的右下角来调整其大小。
- en: 'You can set the width of the text area box by specifying the number of columns:'
  id: totrans-1720
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以通过指定列数来设置文本区域框的宽度：
- en: '[PRE137]'
  id: totrans-1721
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE137]'
- en: 'A text area enables the user to type any length of entry they want. However,
    if you’re worried about being inundated with too much text, you can specify a
    maximum entry size in characters:'
  id: totrans-1722
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本区域允许用户输入他们想要的任何长度的条目。然而，如果你担心会被过多的文本淹没，你可以指定字符的最大输入大小：
- en: '[PRE138]'
  id: totrans-1723
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE138]'
- en: 'If needed, you can also specify a minimum entry size in characters:'
  id: totrans-1724
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果需要，你还可以指定字符的最小输入大小：
- en: '[PRE139]'
  id: totrans-1725
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE139]'
- en: 'You can set a text area as “required” if the user must fill in a value before
    submitting the form:'
  id: totrans-1726
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你希望用户在提交表单之前必须填写一个值，可以将文本区域设置为“必填”：
- en: '[PRE140]'
  id: totrans-1727
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE140]'
- en: 'The opposite, in a sense, of the text-heavy text area is when you need the
    user to choose between just two simple possibilities: yes or no, on or off, and
    so on. Don’t use a text area or even a text box for this—HTML offers a special
    control to handle these one-or-the-other choices, which is the subject of the
    next section.'
  id: totrans-1728
  prefs: []
  type: TYPE_NORMAL
  zh: 在某种程度上，与文本密集的文本区域相反的情况是当你需要用户在两个简单的可能性之间进行选择时：是/否、开/关等。不要使用文本区域或文本框来处理这种情况——HTML
    提供了一个特殊的控制来处理这些非此即彼的选择，这是下一节的主题。
- en: 8.3.5 Getting yes-or-no info with check boxes
  id: totrans-1729
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.3.5 使用复选框获取是/否信息
- en: One common information-gathering situation is when you give the user an option,
    and the user either accepts it or rejects it. Similarly, depending on the wording
    and intent of the option, the user may say yes or no, or they may turn it on or
    off. For all these scenarios—accept/reject, yes/no, on/off—you can include in
    your form a control called a *check box*. This is a control that displays a small
    square. If the user wants to submit a positive response for the check box (accept
    or yes or on), they click the check box to add a checkmark inside it; if, instead,
    the user wants to submit a negative response for the check box (reject or no or
    off), they click the check box to remove its checkmark.
  id: totrans-1730
  prefs: []
  type: TYPE_NORMAL
  zh: 一种常见的信息收集情况是当用户有一个选择，他们要么接受要么拒绝。同样，根据选项的措辞和意图，用户可能会说“是”或“否”，或者他们可能会打开或关闭。对于所有这些场景——接受/拒绝、是/否、开/关——你可以在你的表单中包含一个称为复选框的控制。这是一个显示小方框的控制。如果用户想要为复选框提交一个肯定响应（接受或“是”或“开”），他们点击复选框以在其中添加勾选标记；如果用户想要为复选框提交一个否定响应（拒绝或“否”或“关”），他们点击复选框以移除其勾选标记。
- en: 'Figure 8.6 shows a couple of examples of check boxes. The top check box is
    unchecked, which means (in this case) the user doesn’t want to be notified about
    future events. The bottom check box is checked, which means (again, in this case)
    the user does want to subscribe to the site’s newsletter. Here’s an example instruction
    to include in your form prompt:'
  id: totrans-1731
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.6 展示了几个复选框的示例。顶部的复选框未勾选，这意味着（在这种情况下）用户不想被通知未来的事件。底部的复选框已勾选，这意味着（再次，在这种情况下）用户确实想订阅该网站的通讯。以下是在你的表单提示中包含的示例指令：
- en: '[PRE141]'
  id: totrans-1732
  prefs: []
  type: TYPE_PRE
  zh: '[PRE141]'
- en: '![](../../OEBPS/Images/CH08_F06_McFedries3.png)'
  id: totrans-1733
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH08_F06_McFedries3.png)'
- en: Figure 8.6 Some example check boxes
  id: totrans-1734
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8.6 一些示例复选框
- en: 'When prompting ChatGPT to include a check box in a form, you can customize
    the check box by specifying whether the check box is initially checked, as in
    this example:'
  id: totrans-1735
  prefs: []
  type: TYPE_NORMAL
  zh: 当提示 ChatGPT 在表单中包含复选框时，你可以通过指定复选框是否初始勾选来自定义复选框，如下例所示：
- en: '[PRE142]'
  id: totrans-1736
  prefs: []
  type: TYPE_PRE
  zh: '[PRE142]'
- en: If you want your users to choose between more than two options, HTML offers
    a couple of solutions, starting with radio buttons, discussed next.
  id: totrans-1737
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你希望你的用户在超过两个选项之间进行选择，HTML 提供了一些解决方案，首先是下一节将要讨论的单选按钮。
- en: 8.3.6 Choosing one of several options with radio buttons
  id: totrans-1738
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.3.6 使用单选按钮选择多个选项之一
- en: 'In the previous section, you learned about enabling your users to choose between
    two states by offering a check box. However, it’s often the case that you want
    a user to choose one of three or four possibilities. For example, if an event
    occurs on Friday, Saturday, and Sunday, you may want the user to choose just one
    of those days. Similarly, for a free t-shirt giveaway, you may ask the user to
    choose the shirt size they want: Small, Medium, Large, or Extra Large.'
  id: totrans-1739
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，你学习了如何通过提供复选框来启用用户在两种状态之间进行选择。然而，通常情况下，你希望用户从三个或四个可能性中选择一个。例如，如果事件发生在周五、周六和周日，你可能希望用户只选择这些日子中的一个。同样，对于免费T恤赠送，你可能要求用户选择他们想要的尺码：小号、中号、大号或加大号。
- en: 'When you need your visitors to choose just one of three or four options, you
    can add to your form a group of *radio buttons*, which is a set of HTML elements
    with the following characteristics:'
  id: totrans-1740
  prefs: []
  type: TYPE_NORMAL
  zh: 当你需要你的访客在三个或四个选项中选择一个时，你可以在你的表单中添加一组单选按钮，这是一个具有以下特征的 HTML 元素集：
- en: Each button is a small circle.
  id: totrans-1741
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个按钮都是一个小的圆圈。
- en: Only one button can be selected at a time.
  id: totrans-1742
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一次只能选择一个按钮。
- en: The currently selected button’s circle is filled in.
  id: totrans-1743
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当前选中的按钮的圆圈被填充。
- en: All the nonselected buttons have empty circles.
  id: totrans-1744
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有未选中的按钮都有空圆圈。
- en: When the user clicks a nonselected button, that button’s circle is filled in,
    and the previously selected button’s circle becomes empty.
  id: totrans-1745
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当用户单击未选中的按钮时，该按钮的圆圈会被填充，而之前选中的按钮的圆圈变为空。
- en: Figure 8.7 shows an example of a radio button group. The Medium radio button
    is currently selected.
  id: totrans-1746
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.7展示了单选按钮组的示例。Medium单选按钮当前被选中。
- en: '![](../../OEBPS/Images/CH08_F07_McFedries3.png)'
  id: totrans-1747
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH08_F07_McFedries3.png)'
- en: Figure 8.7 A group of radio buttons
  id: totrans-1748
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.7一组单选按钮
- en: 'When it’s time to build your ChatGPT prompt for a form, you can use an instruction
    such as the following:'
  id: totrans-1749
  prefs: []
  type: TYPE_NORMAL
  zh: 当您准备构建用于表单的ChatGPT提示时，您可以使用如下指令：
- en: '[PRE143]'
  id: totrans-1750
  prefs: []
  type: TYPE_PRE
  zh: '[PRE143]'
- en: 'You can customize your radio buttons as follows:'
  id: totrans-1751
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以按照以下方式自定义您的单选按钮：
- en: 'You can specify which radio button is initially selected:'
  id: totrans-1752
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以指定哪个单选按钮最初被选中：
- en: '[PRE144]'
  id: totrans-1753
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE144]'
- en: 'You can surround your radio button group with a “legend” element and specify
    a “caption” for that legend. The radio button group in figure 8.7 has such a legend
    with the caption `Choose a t-shirt size`. ChatGPT tends to include a legend element
    automatically, but you can use an instruction such as the following to specify
    the caption you want:'
  id: totrans-1754
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以用“图例”元素包围您的单选按钮组，并为该图例指定一个“标题”。图8.7中的单选按钮组有一个带有标题`选择T恤尺寸`的图例。ChatGPT倾向于自动包含图例元素，但您可以使用如下指令来指定您想要的标题：
- en: '[PRE145]'
  id: totrans-1755
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE145]'
- en: If you need your users to choose from more than four options, you should put
    those options into a selection list, as I describe in the following section.
  id: totrans-1756
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您需要用户从超过四个选项中进行选择，您应该将这些选项放入选择列表，正如我在下一节中描述的那样。
- en: 8.3.7 Offering more selections with lists
  id: totrans-1757
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.3.7 使用列表提供更多选择
- en: Theoretically, there’s no reasonable limit on the number of radio buttons you
    can offer your users. Practically, however, having a large number of radio buttons
    can be confusing for the user and can take up too much page real estate. The general
    rule is to have at most four options in any group of radio buttons.
  id: totrans-1758
  prefs: []
  type: TYPE_NORMAL
  zh: 理论上，您可以为用户提供单选按钮的数量没有合理的限制。然而，实际上，拥有大量单选按钮可能会让用户感到困惑，并且会占用过多的页面空间。一般规则是，在任何单选按钮组中最多有四个选项。
- en: However, it’s not at all unusual to have five or more options to present to
    your users. Perhaps you want the user to choose one day out of the seven days
    of the week (Monday through Sunday). Or you may ask a visitor to choose a state
    or country (as part of, say, gathering the user’s mailing address).
  id: totrans-1759
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，向用户提供五个或更多选项并不罕见。也许您希望用户从一周的七天中选择一天（从星期一到星期日）。或者您可能要求访客选择一个州或国家（例如，收集用户的邮寄地址）。
- en: For these larger collections of choices, you can put all the options you want
    to present to the user in a *selection list*, which by default is displayed as
    a dropdown list, as shown in figure 8.8\. Clicking the list displays a menu of
    the choices you’ve made available to the user, as shown in figure 8.9.
  id: totrans-1760
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这些较大的选择集合，您可以将您想要向用户展示的所有选项放入一个*选择列表*中，默认情况下，它以下拉列表的形式显示，如图8.8所示。单击列表将显示用户可用的选项菜单，如图8.9所示。
- en: '![](../../OEBPS/Images/CH08_F08_McFedries3.png)'
  id: totrans-1761
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH08_F08_McFedries3.png)'
- en: Figure 8.8 A selection list initially appears as a dropdown list.
  id: totrans-1762
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.8显示，选择列表最初以下拉列表的形式出现。
- en: '![](../../OEBPS/Images/CH08_F09_McFedries3.png)'
  id: totrans-1763
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH08_F09_McFedries3.png)'
- en: Figure 8.9 Clicking the selection list displays the available options.
  id: totrans-1764
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.9单击选择列表将显示可用的选项。
- en: 'Here’s an example instruction you can include in your form prompt:'
  id: totrans-1765
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个您可以包含在表单提示中的示例指令：
- en: '[PRE146]'
  id: totrans-1766
  prefs: []
  type: TYPE_PRE
  zh: '[PRE146]'
- en: 'When you’re creating your ChatGPT form prompt, you can customize your selection
    lists as follows:'
  id: totrans-1767
  prefs: []
  type: TYPE_NORMAL
  zh: 当您创建ChatGPT表单提示时，您可以按照以下方式自定义您的选择列表：
- en: 'You can specify which list item is initially selected:'
  id: totrans-1768
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以指定哪个列表项最初被选中：
- en: '[PRE147]'
  id: totrans-1769
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE147]'
- en: 'You can specify that the user is allowed to select multiple list items (by
    holding Ctrl (Windows) or Cmd (macOS) and clicking each item):'
  id: totrans-1770
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以指定用户是否可以选中多个列表项（通过在Windows上按Ctrl或macOS上按Cmd并单击每个项）：
- en: '[PRE148]'
  id: totrans-1771
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE148]'
- en: 'You can specify a size in rows. This converts the dropdown list to a regular
    list box that displays the number of rows you specified. If the number of displayed
    rows is smaller than the number of items in the list, the user can scroll the
    list box vertically. Here’s an example instruction:'
  id: totrans-1772
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以指定行数的大小。这会将下拉列表转换为显示您指定行数的常规列表框。如果显示的行数少于列表中的项目数，用户可以垂直滚动列表框。以下是一个示例指令：
- en: '[PRE149]'
  id: totrans-1773
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE149]'
- en: Now that you’re familiar with all the basic form controls, you’re ready to find
    out how your users can submit the form.
  id: totrans-1774
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经熟悉了所有基本表单控件，您就可以了解用户如何提交表单了。
- en: 8.3.8 Submitting the form with a button
  id: totrans-1775
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.3.8 使用按钮提交表单
- en: When you deal with a dialog on your computer, you fill in the fields (if any)
    and then click a button (usually labeled OK) to tell your app or operating system
    that you’re done with the dialog and it should process the dialog data. In a sense,
    an HTML form is the web page equivalent of a dialog, which means your form needs
    some way for the user to tell the web browser that they’re done with the form
    and the browser should process it. The user does this by clicking a button, which
    is an HTML element that looks and acts just like an OK button in a computer dialog.
    Figure 8.10 shows an example of a form with a button.
  id: totrans-1776
  prefs: []
  type: TYPE_NORMAL
  zh: 当您在电脑上处理对话框时，您会填写（如果有）字段，然后点击一个按钮（通常标有“确定”）来告诉您的应用程序或操作系统您已经完成了对话框，它应该处理对话框数据。从某种意义上说，HTML表单是网页对话框的等价物，这意味着您的表单需要一种方式让用户告诉浏览器他们已经完成了表单，浏览器应该处理它。用户通过点击一个按钮来完成这个操作，这个按钮是一个HTML元素，其外观和行为与电脑对话框中的“确定”按钮非常相似。图8.10显示了带有“发送它”按钮的表单示例。
- en: '![](../../OEBPS/Images/CH08_F10_McFedries3.png)'
  id: totrans-1777
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH08_F10_McFedries3.png)'
- en: Figure 8.10 A form with a Send It button
  id: totrans-1778
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.10 带有“发送它”按钮的表单
- en: 'ChatGPT will always include a button named Submit when you ask it to generate
    form code. To specify your preferred button name, here’s an example instruction
    to ChatGPT that you can include in your overall form prompt:'
  id: totrans-1779
  prefs: []
  type: TYPE_NORMAL
  zh: 当您要求ChatGPT生成表单代码时，ChatGPT总是会包括一个名为“提交”的按钮。为了指定您首选的按钮名称，以下是一个可以包含在您整体表单提示中的ChatGPT示例指令：
- en: '[PRE150]'
  id: totrans-1780
  prefs: []
  type: TYPE_PRE
  zh: '[PRE150]'
- en: Clicking a button in a form element is called *submitting* the form, and in
    the next section, you learn how to get the form data sent to you.
  id: totrans-1781
  prefs: []
  type: TYPE_NORMAL
  zh: 在表单元素中点击按钮被称为“提交”表单，在下一节中，您将学习如何将表单数据发送给您。
- en: OK, you now know everything you need to know to successfully prompt ChatGPT
    to build a working form, as I describe in the next section.
  id: totrans-1782
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在您已经知道了成功提示ChatGPT构建工作表单所需的所有信息，正如我在下一节中描述的那样。
- en: 8.4 Crafting the prompt for the event sign-up page
  id: totrans-1783
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8.4 撰写活动注册页面的提示语
- en: 'This chapter’s project is a single page that contains a form that enables users
    to sign up to participate in a local barn-raising event. The form itself will
    use all six types of controls that I discussed earlier in this chapter: a text
    box, an email field, a text area, a check box, a radio button group, a selection
    list, and a button to submit the form.'
  id: totrans-1784
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的项目是一个包含表单的单页，该表单允许用户注册参加当地搭建谷仓活动。该表单本身将使用我在本章前面讨论的六种类型的控件：一个文本框、一个电子邮件字段、一个文本区域、一个复选框、一个单选按钮组、一个选择列表和一个提交表单的按钮。
- en: Before continuing, you should already have a site title, tagline, and page title.
    You should also know which Google Fonts typefaces you want for the page text and
    the color scheme you want to apply. Refer to chapter 3 to learn how to get ChatGPT’s
    help with titles, fonts, and colors.
  id: totrans-1785
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续之前，您应该已经拥有网站标题、标语和页面标题。您还应该知道您想要用于页面文本的Google Fonts字体类型以及您想要应用的配色方案。请参阅第3章了解如何获取ChatGPT在标题、字体和颜色方面的帮助。
- en: 'Your prompt begins by telling ChatGPT that you want it to help you build a
    web page and that you don’t know how to code, so it will have to generate the
    code for you:'
  id: totrans-1786
  prefs: []
  type: TYPE_NORMAL
  zh: 您的提示语首先告诉ChatGPT您希望它帮助您构建一个网页，并且您不知道如何编写代码，因此它将不得不为您生成代码：
- en: '[PRE151]'
  id: totrans-1787
  prefs: []
  type: TYPE_PRE
  zh: '[PRE151]'
- en: 'You then specify the content of your page, including the following items (refer
    to figure 8.11):'
  id: totrans-1788
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，您指定页面的内容，包括以下项目（参见图8.11）：
- en: A header that includes your logo, site title, and tagline
  id: totrans-1789
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含您的标志、网站标题和标语的头
- en: A main element that starts with the page title and is followed by some introductory
    text
  id: totrans-1790
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个主元素，它从页面标题开始，后面跟着一些介绍性文本
- en: The form that users can submit to sign up for your event
  id: totrans-1791
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户可以提交以注册您活动的表单
- en: A footer that includes a copyright notice
  id: totrans-1792
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚
- en: 'Next, you instruct ChatGPT to generate the CSS for the page formatting:'
  id: totrans-1793
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您指导ChatGPT生成页面格式的CSS：
- en: '[PRE152]'
  id: totrans-1794
  prefs: []
  type: TYPE_PRE
  zh: '[PRE152]'
- en: 'You then specify the formatting, including the following:'
  id: totrans-1795
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，您指定格式，包括以下内容：
- en: The page background color and text color.
  id: totrans-1796
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面背景颜色和文字颜色。
- en: The type sizes you want to use for the site title, tagline, page title, page
    text, and the form controls.
  id: totrans-1797
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您希望用于网站标题、标语、页面标题、页面文字和表单控件的字体大小。
- en: The fonts to use for the headings and regular page text.
  id: totrans-1798
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于标题和常规页面文字的字体。
- en: A maximum width for the page. This prevents the lines of text from getting too
    long. A maximum length of 800 px works for this page.
  id: totrans-1799
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面的最大宽度。这可以防止文字行过长。本页面的最大长度为800 px。
- en: '![](../../OEBPS/Images/CH08_F11_McFedries3.png)'
  id: totrans-1800
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH08_F11_McFedries3.png)'
- en: Figure 8.11 The elements of the event sign-up page
  id: totrans-1801
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.11 事件注册页面元素
- en: 'Here’s an example prompt for my own event sign-up page:'
  id: totrans-1802
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我自己的事件注册页面的一个示例提示：
- en: '[PRE153]'
  id: totrans-1803
  prefs: []
  type: TYPE_PRE
  zh: '[PRE153]'
- en: 'ChatGPT will first generate the HTML code, which you can copy and then paste
    and save to a file named index.xhtml. In that code, you should see a line near
    the top similar to the following:'
  id: totrans-1804
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT首先生成HTML代码，您可以复制并粘贴到名为index.xhtml的文件中保存。在这段代码中，您应该看到顶部附近有一行类似于以下内容：
- en: '[PRE154]'
  id: totrans-1805
  prefs: []
  type: TYPE_PRE
  zh: '[PRE154]'
- en: This code tells the web browser to look for the CSS code in a file named styles.css,
    so your next task is to copy the generated CSS code and then paste it and save
    it to a file named styles.css (or whatever name you see in the `<link>` tag).
    Be sure to save styles.css file in the same folder as your index.xhtml file. You
    also need to copy your header image file into the same folder. Refer to appendix
    A to learn more about working web page files.
  id: totrans-1806
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码告诉网络浏览器在名为styles.css的文件中查找CSS代码，因此您的下一个任务是复制生成的CSS代码，然后粘贴并保存到名为styles.css的文件中（或您在`<link>`标签中看到的任何名称）。请确保将styles.css文件保存到与index.xhtml文件相同的文件夹中。您还需要将您的页眉图像文件复制到同一文件夹中。有关更多关于工作网页文件的信息，请参阅附录A。
- en: I used OpenAI’s ChatGPT app to submit my prompt to GPT-4\. The generated code
    produced the page shown in figure 8.12.
  id: totrans-1807
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用OpenAI的ChatGPT应用将提示提交给GPT-4。生成的代码产生了如图8.12所示的页面。
- en: '![](../../OEBPS/Images/CH08_F12_McFedries3.png)'
  id: totrans-1808
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH08_F12_McFedries3.png)'
- en: Figure 8.12 My event sign-up page
  id: totrans-1809
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.12 我的注册页面
- en: If you’re satisfied with the page and form generated by ChatGPT, feel free to
    bypass the rest of this chapter and deploy the code to the web (refer to appendix
    B for the details). However, if you’re curious to know more about the generated
    web page code, proceed to the next section for a closer look.
  id: totrans-1810
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您对ChatGPT生成的页面和表单满意，您可以自由跳过本章的其余部分并将代码部署到网络上（有关详细信息，请参阅附录B）。但是，如果您想了解更多关于生成的网页代码，请继续下一节以进行更深入的查看。
- en: 8.5 Examining the event sign-up page code
  id: totrans-1811
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8.5 检查事件注册页面代码
- en: You don’t need to know how the web page code generated by ChatGPT works. However,
    if you’d like to dive a little deeper, the next couple of sections offer a brief
    and not-overly-technical description of the event sign-up page code that resulted
    from my prompt from the previous section (that page is shown in figure 8.12).
  id: totrans-1812
  prefs: []
  type: TYPE_NORMAL
  zh: 您不需要了解ChatGPT生成的网页代码是如何工作的。但是，如果您想深入了解，接下来的几节将简要介绍由上一节提示（如图8.12所示的页面）生成的事件注册页面代码，这不是过于技术性的描述。
- en: 'Note The generated HTML and CSS code for my event sign-up page are available
    on this book’s website ([www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt))
    and in the book’s GitHub repository: [https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt).'
  id: totrans-1813
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：本书网站上（[www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt)）和GitHub存储库（[https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)）提供了我事件注册页面的生成HTML和CSS代码。
- en: I hope my code annotations help you to understand what’s happening under the
    hood and assist you in tweaking or customizing your own code.
  id: totrans-1814
  prefs: []
  type: TYPE_NORMAL
  zh: 希望我的代码注释能帮助您理解底层发生的事情，并帮助您调整或自定义自己的代码。
- en: 8.5.1 Examining the HTML
  id: totrans-1815
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.5.1 检查HTML
- en: 'Here’s the HTML code that ChatGPT generated for my event sign-up page:'
  id: totrans-1816
  prefs: []
  type: TYPE_NORMAL
  zh: 这是ChatGPT为我事件注册页面生成的HTML代码：
- en: '[PRE155]'
  id: totrans-1817
  prefs: []
  type: TYPE_PRE
  zh: '[PRE155]'
- en: ① Helps the page display properly on mobile devices
  id: totrans-1818
  prefs: []
  type: TYPE_NORMAL
  zh: ① 帮助页面在移动设备上正确显示
- en: ② Tells the web browser where to find the CSS code
  id: totrans-1819
  prefs: []
  type: TYPE_NORMAL
  zh: ② 告诉网络浏览器在哪里找到CSS代码
- en: ③ Site logo
  id: totrans-1820
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 网站标志
- en: ④ Site title
  id: totrans-1821
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 网站标题
- en: ⑤ Site tagline
  id: totrans-1822
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 网站标语
- en: ⑥ Page header
  id: totrans-1823
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 页面页眉
- en: ⑦ Form element specifies the endpoint
  id: totrans-1824
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 表单元素指定端点
- en: ⑧ Name text box
  id: totrans-1825
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 名称文本框
- en: ⑨ Email text box
  id: totrans-1826
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ 电子邮件文本框
- en: ⑩ Skills text area
  id: totrans-1827
  prefs: []
  type: TYPE_NORMAL
  zh: ⑩ 技能文本区域
- en: ⑪ Check box
  id: totrans-1828
  prefs: []
  type: TYPE_NORMAL
  zh: ⑪ 复选框
- en: ⑫ Radio button group text box
  id: totrans-1829
  prefs: []
  type: TYPE_NORMAL
  zh: ⑫ 单选按钮组文本框
- en: ⑬ Selection list
  id: totrans-1830
  prefs: []
  type: TYPE_NORMAL
  zh: ⑬ 选择列表
- en: ⑭ Hidden “honeypot” field
  id: totrans-1831
  prefs: []
  type: TYPE_NORMAL
  zh: ⑭ 隐藏的“诱饵”字段
- en: ⑮ Submit button
  id: totrans-1832
  prefs: []
  type: TYPE_NORMAL
  zh: ⑮ 提交按钮
- en: ⑯ Page footer
  id: totrans-1833
  prefs: []
  type: TYPE_NORMAL
  zh: ⑯ 页面页脚
- en: 'Here are a few notes to bear in mind when reading the HTML code:'
  id: totrans-1834
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读HTML代码时，请注意以下几点：
- en: In the `form` element, notice that the `action` attribute is set to address
    of the Getform endpoint. (Note that I’ve altered the real address, so don’t try
    to use this address in your own forms because it won’t work.)
  id: totrans-1835
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在`form`元素中，请注意`action`属性设置为Getform端点的地址。（注意，我已经更改了真实地址，因此请不要尝试在自己的表单中使用此地址，因为它不会工作。）
- en: For each form control (except the button), notice that ChatGPT also includes
    a `name` attribute. The web browser uses these `name` attribute values to identify
    each field when it submits the form. Figure 8.13 shows an example submission.
    Notice that the names of each field—`name`, `email`, `skills`, `day`, `gift`,
    and `notify`—match the `name` attribute values in the form.
  id: totrans-1836
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每个表单控件（除了按钮），请注意ChatGPT也包含一个`name`属性。网络浏览器使用这些`name`属性值在提交表单时识别每个字段。图8.13显示了示例提交。请注意，每个字段的名称——`name`、`email`、`skills`、`day`、`gift`和`notify`——与表单中的`name`属性值相匹配。
- en: '![](../../OEBPS/Images/CH08_F13_McFedries3.png)'
  id: totrans-1837
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH08_F13_McFedries3.png)'
- en: Figure 8.13 Form submissions appear on your Getform page.
  id: totrans-1838
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.13 表单提交出现在您的Getform页面上。
- en: Note also that each radio button and selection list option has its own `value`
    attribute. When the browser submits the form, it sends the value of the currently
    selected radio button and list item. In figure 8.13, for example, that the submitted
    value for the `day` field (the radio button group) is `Saturday`, and the submitted
    value for the `gift` field (the selection list) is `shirt` (that is, the T-shirt
    item in the list).
  id: totrans-1839
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意，每个单选按钮和选择列表选项都有自己的`value`属性。当浏览器提交表单时，它会发送当前选中的单选按钮和列表项的值。例如，在图8.13中，提交给`day`字段（单选按钮组）的值是`Saturday`，提交给`gift`字段（选择列表）的值是`shirt`（即列表中的T恤项）。
- en: Just before the `button` element is an `input` element with its `type` attribute
    set to `hidden` and its `name` attribute set to `_gotcha`. This field is used
    to sniff out spam bots, which, when they submit this form, are programmed to fill
    in each field, including this hidden one. If the Getform service receives a form
    submission where this hidden field is filled in, it knows it’s dealing with spam
    and discards the submission.
  id: totrans-1840
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在`button`元素之前是一个`input`元素，其`type`属性设置为`hidden`，其`name`属性设置为`_gotcha`。该字段用于检测垃圾邮件机器人，当它们提交此表单时，被编程为填写每个字段，包括这个隐藏字段。如果Getform服务收到一个包含此隐藏字段已填写的表单提交，它知道它正在处理垃圾邮件并丢弃该提交。
- en: 'Finally, note that the HTML code includes the following line:'
  id: totrans-1841
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，请注意HTML代码中包含以下行：
- en: '[PRE156]'
  id: totrans-1842
  prefs: []
  type: TYPE_PRE
  zh: '[PRE156]'
- en: This tag tells the web browser where to find the CSS code, which I describe
    in the next section.
  id: totrans-1843
  prefs: []
  type: TYPE_NORMAL
  zh: 此标签告诉网络浏览器在哪里找到CSS代码，我将在下一节中描述。
- en: 8.5.2 Examining the CSS
  id: totrans-1844
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 8.5.2 检查CSS
- en: 'Here’s the CSS code that ChatGPT generated for my event sign-up page:'
  id: totrans-1845
  prefs: []
  type: TYPE_NORMAL
  zh: 这是ChatGPT为我生成的事件注册页面CSS代码：
- en: '[PRE157]'
  id: totrans-1846
  prefs: []
  type: TYPE_PRE
  zh: '[PRE157]'
- en: ① Loads the Bitter font from Google Fonts
  id: totrans-1847
  prefs: []
  type: TYPE_NORMAL
  zh: ① 从Google Fonts加载Bitter字体
- en: ② Sets the page background color, text color, and font
  id: totrans-1848
  prefs: []
  type: TYPE_NORMAL
  zh: ② 设置页面背景颜色、文本颜色和字体
- en: ③ Sets the maximum page width to 800 px
  id: totrans-1849
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 将最大页面宽度设置为800 px
- en: ④ Centers the page
  id: totrans-1850
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 使页面居中
- en: ⑤ Sets a maximum logo width, and floats it to the left
  id: totrans-1851
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 设置最大标志宽度，并将其浮动到左侧
- en: ⑥ Sets the page title font size to 48 px, and aligns it to the right
  id: totrans-1852
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 将页面标题字体大小设置为48 px，并右对齐
- en: ⑦ Styles the tagline with font size 26 px, italics, small caps, and right alignment
  id: totrans-1853
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 使用26 px字体大小、斜体、小写字母和右对齐设置标语样式
- en: ⑧ Adds a margin to the top of the main element
  id: totrans-1854
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 在主要元素顶部添加边距
- en: ⑨ Sets the font size of the main heading
  id: totrans-1855
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ 设置主要标题的字体大小
- en: ⑩ Styles the font size of the regular page text
  id: totrans-1856
  prefs: []
  type: TYPE_NORMAL
  zh: ⑩ 设置常规页面文本的字体大小
- en: ⑪ Sets a width for the form
  id: totrans-1857
  prefs: []
  type: TYPE_NORMAL
  zh: ⑪ 设置表单的宽度
- en: ⑫ Styles the font size of the form control text
  id: totrans-1858
  prefs: []
  type: TYPE_NORMAL
  zh: ⑫ 设置表单控件文本的字体大小
- en: ⑬ Applies the text color to the button
  id: totrans-1859
  prefs: []
  type: TYPE_NORMAL
  zh: ⑬ 将文本颜色应用于按钮
- en: If you like, you can use these annotations to help customize your web page code,
    as I describe in the next section.
  id: totrans-1860
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢，可以使用这些注释来帮助定制您的网页代码，正如我在下一节中描述的那样。
- en: 8.6 Customizing the event sign-up page
  id: totrans-1861
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8.6 定制事件注册页面
- en: If the form code generated by ChatGPT isn’t even close to what you want, you’re
    better off starting a new chat session and submitting a revised prompt. However,
    if the form code is close to what you were looking for, it may be easier to modify
    it yourself.
  id: totrans-1862
  prefs: []
  type: TYPE_NORMAL
  zh: 如果ChatGPT生成的表单代码甚至接近您想要的结果，您最好开始一个新的聊天会话并提交一个修订的提示。然而，如果表单代码接近您所寻找的，可能更容易自行修改它。
- en: 'First, here are some customization suggestions for the HTML code:'
  id: totrans-1863
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，这里有一些针对HTML代码的定制建议：
- en: Feel free to edit any of the page text, such as the title, the tagline, the
    introductory text, or any of the form labels. Be careful not to edit or delete
    the HTML tags that surround each bit of text (such as the `<label>` and `</label>`
    tags that bracket a form label).
  id: totrans-1864
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随意编辑页面上的任何文本，例如标题、标语、简介文本或任何表单标签。请注意，不要编辑或删除围绕每段文本的HTML标签（例如括号表单标签的`<label>`和`</label>`标签）。
- en: If you want to include a second introductory paragraph, place the edit cursor
    after the `</p>` tag that ends the existing introductory paragraph. Press Enter
    or Return to start a new line, type a `<p>` tag, type your paragraph text, and
    finish with a `</p>` tag.
  id: totrans-1865
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你想要包含第二个简介段落，请将编辑光标放在现有简介段落结束的`</p>`标签之后。按Enter或Return键开始新行，输入一个`<p>`标签，输入你的段落文本，并以`</p>`标签结束。
- en: In the form code, you can edit some of the tag attribute values. For example,
    with a text box, you can modify the `size` and `placeholder` attribute values;
    with a text area, you can modify the `rows` and `cols` attribute values; and you
    can modify any `value` attribute string. In all these cases, be sure to modify
    only the text between the double quotation marks. Also, don’t change the values
    of any `type` or `name` attribute in the form.
  id: totrans-1866
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在表单代码中，你可以编辑一些标签属性值。例如，对于文本框，你可以修改`size`和`placeholder`属性值；对于文本区域，你可以修改`rows`和`cols`属性值；并且你可以修改任何`value`属性字符串。在这些所有情况下，确保只修改双引号之间的文本。此外，不要更改任何`type`或`name`属性值。
- en: In the footer section of the HTML code, you can add links to your social media
    accounts, as I describe in chapter 4.
  id: totrans-1867
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在HTML代码的页脚部分，你可以添加指向你的社交媒体账户的链接，正如我在第4章中描述的那样。
- en: 'Now, here are a few customization ideas for the CSS code:'
  id: totrans-1868
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这里有一些针对CSS代码的定制想法：
- en: To give your page a different background color, use a different color keyword
    for the `body` element’s `background-color` property.
  id: totrans-1869
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要给你的页面设置不同的背景颜色，为`body`元素的`background-color`属性使用不同的颜色关键字。
- en: To use a different color for the page text, specify a different color keyword
    for the `body` element’s `color` property.
  id: totrans-1870
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要为页面文本指定不同的颜色，为`body`元素的`color`属性指定不同的颜色关键字。
- en: 'The CSS code uses the page text color in two other places: the `form button`
    element’s `color` property and the `footer` element’s `border-top` property. To
    keep your colors in harmony, you need to replace these color values with whatever
    color keyword you use in the previous item.'
  id: totrans-1871
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CSS代码在其他两个地方使用了页面文字颜色：`form button`元素的`color`属性和`footer`元素的`border-top`属性。为了保持颜色的一致性，你需要将这些颜色值替换为在上一项中使用的颜色关键字。
- en: If you want your page to have a different maximum width, change the `max-width`
    value to something other than `800px`.
  id: totrans-1872
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你希望你的页面有不同的最大宽度，将`max-width`值更改为`800px`之外的其他值。
- en: 'If you’d prefer to have the header logo on the right and the text and tagline
    aligned on the left, you need to make three changes:'
  id: totrans-1873
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你希望将页眉标志放在右侧，并将文本和标语对齐在左侧，你需要进行三个更改：
- en: In the `header img` element, change the `float` value to `right`.
  id: totrans-1874
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在`header img`元素中，将`float`值更改为`right`。
- en: In the `header h1` element, change the `text-align` value to `left`.
  id: totrans-1875
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在`header h1`元素中，将`text-align`值更改为`left`。
- en: In the `header p` element, change the `text-align` value to `left`.
  id: totrans-1876
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在`header p`元素中，将`text-align`值更改为`left`。
- en: For any font size value, you can change the number to increase or decrease the
    font size. Just make sure you leave the `px` unit in place.
  id: totrans-1877
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何字体大小值，你可以更改数字以增加或减少字体大小。只需确保保留`px`单位。
- en: For any padding or margin value, you can change the number to increase or decrease
    the padding or margins. In each case, be sure to leave the `px` unit in place.
  id: totrans-1878
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何填充或边距值，你可以更改数字以增加或减少填充或边距。在每种情况下，确保保留`px`单位。
- en: To make your page code more accessible, consider converting all px measurements
    to rem measurements. 1 rem is by default equivalent to 16 px, so 20 px is 1.25 rem,
    24 px is 1.5 rem, 32 px is 2 rem, 48 px is 3 rem, and so on. The rem unit is more
    accessible because it measures font sizes relative to the default font size the
    browser user has defined in their browser settings.
  id: totrans-1879
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要使你的页面代码更易于访问，考虑将所有px测量值转换为rem测量值。默认情况下，1 rem相当于16 px，因此20 px是1.25 rem，24 px是1.5 rem，32 px是2 rem，48 px是3 rem，依此类推。rem单位更易于访问，因为它测量的是相对于浏览器用户在其浏览器设置中定义的默认字体大小的字体大小。
- en: Summary
  id: totrans-1880
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: A form is a special collection of HTML elements that enable you to gather information
    and then send that information somewhere (such as your email address).
  id: totrans-1881
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表单是一组特殊的HTML元素，它允许你收集信息，然后将这些信息发送到某个地方（例如你的电子邮件地址）。
- en: A form’s endpoint is the address to which the web browser sends the form data
    when the user submits the form.
  id: totrans-1882
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表单的终点是当用户提交表单时，网络浏览器发送表单数据的目标地址。
- en: A text box is a rectangular area designed to hold text typed by the user. You
    can set up text boxes to hold special data types, such as email addresses, numbers,
    and URLs.
  id: totrans-1883
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本框是一个矩形区域，用于容纳用户输入的文本。您可以设置文本框以存储特殊数据类型，例如电子邮件地址、数字和URL。
- en: A label is text that describes a particular control.
  id: totrans-1884
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标签是描述特定控件文本。
- en: A text area is a form field that supports longer, multiline text entries.
  id: totrans-1885
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本区域是一个表单字段，支持较长的多行文本输入。
- en: For yes/no or on/off types of data, use a check box.
  id: totrans-1886
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于是/否或开/关类型的数据，请使用复选框。
- en: To enable the user to choose one of three or four options, use a radio button
    group.
  id: totrans-1887
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要使用户能够从三个或四个选项中选择一个，请使用单选按钮组。
- en: To enable the user to choose from among five or more options, use a selection
    list.
  id: totrans-1888
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要使用户能够从五个或更多选项中选择，请使用选择列表。
- en: Include a button in the form so the user can submit the form data.
  id: totrans-1889
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在表单中包含一个按钮，以便用户可以提交表单数据。
- en: For best results, your page prompt should be as specific as possible, including
    colors, font sizes, and heading levels.
  id: totrans-1890
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了获得最佳效果，您的页面提示应尽可能具体，包括颜色、字体大小和标题级别。
- en: 9 Adding lists to your pages
  id: totrans-1891
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 9 向您的页面添加列表
- en: This chapter covers
  id: totrans-1892
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖
- en: Prompting ChatGPT to build a bulleted list
  id: totrans-1893
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指示ChatGPT构建项目符号列表
- en: Asking ChatGPT to generate a numbered list
  id: totrans-1894
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要求ChatGPT生成编号列表
- en: Customizing your lists
  id: totrans-1895
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自定义您的列表
- en: Crafting a ChatGPT prompt for building a recipe page
  id: totrans-1896
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为构建食谱页面制作ChatGPT提示
- en: Examining and customizing the ChatGPT-generated code
  id: totrans-1897
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查和自定义ChatGPT生成的代码
- en: “Content is king” is an old (and, alas, sexist) adage from the early days of
    the web. It meant that what was most important on every web page was the content
    it contained. In other words, if you published great content, the world would
    beat a path to your website door.
  id: totrans-1898
  prefs: []
  type: TYPE_NORMAL
  zh: “内容为王”是网络早期的一个古老（而且遗憾的是，带有性别歧视）的谚语。它的意思是，每个网页上最重要的东西就是它所包含的内容。换句话说，如果你发布了优质的内容，全世界都会蜂拥而至你的网站门口。
- en: 'That may have been true in the 1990s when people didn’t expect much from each
    web page they visited. Nowadays, however, having great content doesn’t amount
    to anything if you present that content poorly. If you’ve gone through any of
    the web projects in the previous chapters, you may have been surprised (but hopefully
    not dismayed) by how specific all my ChatGPT prompts have been. That level of
    detail is needed because otherwise, ChatGPT will generate code for pages that
    are decidedly unattractive: dull, cramped, and poorly laid out. Yes, you have
    awesome content you want to share, but to prevent visitors from leaving seconds
    after they arrive, you need to present that content engagingly.'
  id: totrans-1899
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能在20世纪90年代是真实的，当时人们对自己访问的每个网页期望不多。然而，如今，如果你展示得不好，即使有优质的内容也毫无意义。如果你已经完成了前几章中的任何网络项目，你可能会对ChatGPT的提示如此具体感到惊讶（但希望不是失望）。这种详细程度是必要的，因为否则，ChatGPT将生成页面代码，这些页面明显不吸引人：单调、拥挤且布局不佳。是的，你有想要分享的精彩内容，但为了防止访客在到达后几秒钟内离开，你需要以引人入胜的方式展示这些内容。
- en: In this chapter, you learn two techniques for making your content easier to
    read, easier to understand, and more engaging for the reader. The two techniques
    are bulleted lists and numbered lists, which are among the most common patterns
    used in modern web pages and form the basis of some of today’s most popular sites.
    You then put your newfound list know-how to work to create a detailed prompt for
    ChatGPT to generate the code for a recipe page. This chapter also provides a high-level
    explanation of the code generated by ChatGPT and tips for customizing it.
  id: totrans-1900
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将学习两种使你的内容更容易阅读、更容易理解并更吸引读者的技术。这两种技术是项目符号列表和编号列表，它们是现代网页中最常见的模式之一，也是当今一些最受欢迎网站的基础。然后你将运用你新学到的列表知识，为ChatGPT创建一个详细的提示，以生成食谱页面的代码。本章还提供了ChatGPT生成的代码的高级解释以及自定义它的技巧。
- en: 9.1 Checking out this chapter’s project
  id: totrans-1901
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9.1 检查本章的项目
- en: 'The project you get ChatGPT to create for you in this chapter is a basic web
    page that takes the reader through a recipe for making nut bars. The final page
    will include the following components:'
  id: totrans-1902
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将得到ChatGPT为你创建的项目，这是一个基本的网页，引导读者了解制作坚果棒的食谱。最终页面将包括以下组件：
- en: A header element that includes the website logo, title, and tagline
  id: totrans-1903
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含网站标志、标题和标语的头元素
- en: A main element that begins with the recipe title and introduction
  id: totrans-1904
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个以食谱标题和介绍开始的主体元素
- en: A couple of bulleted lists containing the recipe ingredients
  id: totrans-1905
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 几个包含食谱成分的项目符号列表
- en: A numbered list of the recipe steps
  id: totrans-1906
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 食谱步骤的编号列表
- en: A footer element that includes a copyright notice
  id: totrans-1907
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明页脚元素
- en: Figure 9.1 shows an example of the kind of page you’ll convince ChatGPT to generate
    for you in this chapter.
  id: totrans-1908
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1展示了你将在本章中说服ChatGPT为你生成的页面类型的一个示例。
- en: '![](../../OEBPS/Images/CH09_F01_McFedries3.png)'
  id: totrans-1909
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH09_F01_McFedries3.png)'
- en: Figure 9.1 A recipe page generated by ChatGPT
  id: totrans-1910
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.1 ChatGPT生成的食谱页面
- en: The example page includes two bulleted lists and a single numbered list (with
    a numbered sublist), but you can easily modify this project to include only a
    bulleted list, only a numbered list, or multiple lists of both types. This means
    you can create pages that include content such as top-10 lists, tutorials, documentation,
    travel guides, product reviews, and lists of your favorite books, movies, TV shows,
    games, ice cream flavors, computer book authors, and more. Before you get to all
    that, you need to know a bit about each type of list.
  id: totrans-1911
  prefs: []
  type: TYPE_NORMAL
  zh: 示例页面包括两个项目符号列表和一个单独的编号列表（带编号的子列表），但你可以轻松地修改这个项目，只包含项目符号列表、只包含编号列表，或者包含这两种类型的多个列表。这意味着你可以创建包含内容如前十名列表、教程、文档、旅行指南、产品评论、你最喜欢的书籍、电影、电视节目、游戏、冰淇淋口味、计算机书籍作者等的页面。在你做到所有这些之前，你需要了解每种列表类型的一些信息。
- en: 9.2 Building a bulleted list
  id: totrans-1912
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9.2 创建项目符号列表
- en: A *bulleted list* is a collection of HTML elements that present multiple items
    as a vertical list, where each item is indented slightly from the left margin
    and preceded by a small black circle called a *bullet*. You use a bulleted list
    when you want to present several items but the order of those items isn’t an essential
    component of the list. Figure 9.2 shows an example of a bulleted list.
  id: totrans-1913
  prefs: []
  type: TYPE_NORMAL
  zh: 项目符号列表是一组HTML元素，它们以垂直列表的形式展示多个项目，其中每个项目都稍微缩进，并在前面有一个称为*项目符号*的小黑圆圈。当你想要展示多个项目但项目的顺序不是列表的必要组成部分时，你会使用项目符号列表。图9.2展示了项目符号列表的一个示例。
- en: '![](../../OEBPS/Images/CH09_F02_McFedries3.png)'
  id: totrans-1914
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH09_F02_McFedries3.png)'
- en: Figure 9.2 An example of a bulleted list
  id: totrans-1915
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.2 项目符号列表的示例
- en: 'Here’s how you’d instruct ChatGPT to generate the code for such a list:'
  id: totrans-1916
  prefs: []
  type: TYPE_NORMAL
  zh: 这是如何指导ChatGPT生成此类列表的代码：
- en: '[PRE158]'
  id: totrans-1917
  prefs: []
  type: TYPE_PRE
  zh: '[PRE158]'
- en: 'Here’s the resulting code:'
  id: totrans-1918
  prefs: []
  type: TYPE_NORMAL
  zh: 这是生成的代码：
- en: '[PRE159]'
  id: totrans-1919
  prefs: []
  type: TYPE_PRE
  zh: '[PRE159]'
- en: 'There are two main components to this code:'
  id: totrans-1920
  prefs: []
  type: TYPE_NORMAL
  zh: 该代码有两个主要组成部分：
- en: The whole thing is surrounded by `<ul>` and `</ul>` tags (where `ul` is short
    for *unnumbered list*).
  id: totrans-1921
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 整个内容被`<ul>`和`</ul>`标签包围（其中`ul`是*无编号列表*的缩写）。
- en: Each list item is surrounded by `<li>` and `</li>` tags (where `li` is short
    for *list item*).
  id: totrans-1922
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个列表项都被`<li>`和`</li>`标签包围（其中`li`是*列表项*的缩写）。
- en: For short items (a word or a short phrase), surrounding each item with quotation
    marks is fine. If your list contains items with much longer text, you’ll want
    to use the method I discuss in the next section.
  id: totrans-1923
  prefs: []
  type: TYPE_NORMAL
  zh: 对于短项目（一个单词或短语），在每项周围加上引号是可以的。如果你的列表包含较长的文本项，你将想要使用我在下一节中讨论的方法。
- en: 9.2.1 Handling longer list items
  id: totrans-1924
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9.2.1 处理较长的列表项
- en: 'Bulleted list items don’t have to be single words or short phrases. You’re
    free to include as much text as you need in each item. (That said, if you make
    the content of your items too long—say, more than a few sentences—your list becomes
    harder to read and scan.) For longer items, your prompt should separate the items
    clearly so ChatGPT doesn’t get confused. Here’s an example instruction:'
  id: totrans-1925
  prefs: []
  type: TYPE_NORMAL
  zh: 项目符号列表项不一定是单个单词或短语。你可以在每个项中包含你需要的任意多的文本。（尽管如此，如果你的列表项内容太长——比如说，超过几句话——你的列表就会变得难以阅读和扫描。）对于较长的列表项，你的提示应该清晰地分隔各项，这样ChatGPT就不会感到困惑。以下是一个示例指令：
- en: '[PRE160]'
  id: totrans-1926
  prefs: []
  type: TYPE_PRE
  zh: '[PRE160]'
- en: Notice that the instruction precedes each list item with a dash (`-`). ChatGPT
    understands that a dash represents a new list item (The plus sign [`+`] also works.).
    Figure 9.3 shows how the code generated by ChatGPT from this instruction appears
    in a web browser.
  id: totrans-1927
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到指令在每个列表项前都加上了破折号（`-`）。ChatGPT理解破折号代表一个新的列表项（加号[`+`]同样有效）。图9.3展示了从该指令生成的ChatGPT代码在网页浏览器中的显示方式。
- en: '![](../../OEBPS/Images/CH09_F03_McFedries3.png)'
  id: totrans-1928
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH09_F03_McFedries3.png)'
- en: Figure 9.3 A bulleted list with longer list items
  id: totrans-1929
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.3 带有较长列表项的项目符号列表
- en: Does one of your bullet points itself need to have a bulleted list? That’s covered
    in the next section.
  id: totrans-1930
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的某个项目符号本身需要有一个项目符号列表？这将在下一节中介绍。
- en: 9.2.2 Nesting bulleted lists
  id: totrans-1931
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9.2.2 嵌套项目符号列表
- en: A common bulleted list pattern is to have one of the items contain its own bulleted
    list. This is known as a *nested* bulleted list, and it enables you to break your
    page info into multiple levels, which can make complex data much clearer and easier
    for your readership to follow.
  id: totrans-1932
  prefs: []
  type: TYPE_NORMAL
  zh: 常见的项目符号列表模式是其中一个项目包含其自己的项目符号列表。这被称为*嵌套*项目符号列表，它使您可以将页面信息分成多个层次，这可以使复杂的数据对读者来说更加清晰和易于理解。
- en: 'Here’s an example instruction that convinces ChatGPT to generate a bulleted
    list where one of the items is a nested bulleted list:'
  id: totrans-1933
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个示例指令，说服ChatGPT生成一个项目符号列表，其中一个项目是嵌套的项目符号列表：
- en: '[PRE161]'
  id: totrans-1934
  prefs: []
  type: TYPE_PRE
  zh: '[PRE161]'
- en: Notice that, under the `Fruit` item, the three items are indented by one space.
    This indentation is enough to let ChatGPT know that you want those items rendered
    as a nested bulleted list. Figure 9.4 shows the code generated by ChatGPT in the
    web browser.
  id: totrans-1935
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在“水果”项目下，三个项目缩进了一个空格。这种缩进足以让ChatGPT知道您希望这些项目以嵌套项目符号列表的形式呈现。图9.4显示了ChatGPT在网页浏览器中生成的代码。
- en: '![](../../OEBPS/Images/CH09_F04_McFedries3.png)'
  id: totrans-1936
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH09_F04_McFedries3.png)'
- en: Figure 9.4 A bulleted list with a nested bulleted list
  id: totrans-1937
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.4 带有嵌套项目符号列表的项目符号列表
- en: 'Here’s the code behind this list:'
  id: totrans-1938
  prefs: []
  type: TYPE_NORMAL
  zh: 这是此列表背后的代码：
- en: '[PRE162]'
  id: totrans-1939
  prefs: []
  type: TYPE_PRE
  zh: '[PRE162]'
- en: 'To help the reader differentiate the nested list from the main list, the web
    browser does two things:'
  id: totrans-1940
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助读者区分嵌套列表和主列表，网页浏览器做了两件事：
- en: Indents the nested list items a bit more than the main list items
  id: totrans-1941
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将嵌套列表项缩进得比主列表项更多
- en: Uses a hollow circle instead of a filled circle as the item bullet
  id: totrans-1942
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用空心圆圈而不是填充圆圈作为项目符号
- en: That hollow circle lets you know that there are different bullet types available.
    The next section shows you how to specify a different bullet type for your lists.
  id: totrans-1943
  prefs: []
  type: TYPE_NORMAL
  zh: 那个空心圆圈让您知道有不同类型的项目符号可用。下一节将向您展示如何为您的列表指定不同的项目符号类型。
- en: 9.2.3 Changing the bullet type
  id: totrans-1944
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9.2.3 更改项目符号类型
- en: 'By default, web browsers render a bulleted list with a filled circle (also
    called a *disc*) as the bullet. However, that default bullet type isn’t set in
    stone. Here’s a generic prompt instructing ChatGPT to use a different bullet type:'
  id: totrans-1945
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，网页浏览器以填充圆圈（也称为*圆点*）作为项目符号来渲染项目符号列表。然而，这种默认的项目符号类型并不是固定不变的。以下是一个通用的提示，指示ChatGPT使用不同的项目符号类型：
- en: '[PRE163]'
  id: totrans-1946
  prefs: []
  type: TYPE_PRE
  zh: '[PRE163]'
- en: 'In your instruction, you replace *`type`* with one of the following:'
  id: totrans-1947
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的指令中，您将*`type`*替换为以下之一：
- en: The word `circle` to use an unfilled circle as the bullet.
  id: totrans-1948
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用单词`circle`以空心圆圈作为项目符号。
- en: The word `square` to use a filled square as the bullet.
  id: totrans-1949
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用单词`square`以填充方框作为项目符号。
- en: The name of any emoji character, such as Check Mark, Star, Heart, Arrow, or
    Smiley Face.
  id: totrans-1950
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任何表情符号字符的名称，例如勾号、星号、心形、箭头或笑脸。
- en: The name of any other Unicode character, such as Black Right-Pointing Triangle,
    Rightwards Arrow, or White Diamond. (Check out [www.unicode.org/charts](https://www.unicode.org/charts)
    to see the available characters—all 144,000 of them!)
  id: totrans-1951
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任何其他Unicode字符的名称，例如黑色右指三角形、右箭头或白色菱形。（查看[www.unicode.org/charts](https://www.unicode.org/charts)以查看可用的字符——全部144,000个！）
- en: Figure 9.5 shows a bulleted list that uses Check Mark emoji characters instead
    of the regular bullets.
  id: totrans-1952
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.5显示了一个使用勾号表情符号字符而不是常规项目符号的项目符号列表。
- en: '![](../../OEBPS/Images/CH09_F05_McFedries3.png)'
  id: totrans-1953
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH09_F05_McFedries3.png)'
- en: Figure 9.5 A bulleted list that uses Check Mark emojis as bullets
  id: totrans-1954
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.5 使用勾号表情符号作为项目符号的项目符号列表
- en: Bulleted lists are a common sight throughout the web, but they’re not the only
    list game in town. Numbered lists are the topic of the next section.
  id: totrans-1955
  prefs: []
  type: TYPE_NORMAL
  zh: 项目符号列表在网络上很常见，但它们并不是唯一的列表游戏。编号列表是下一节的主题。
- en: 9.3 Building a numbered list
  id: totrans-1956
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9.3 构建编号列表
- en: I mentioned earlier that you use a bulleted list when the order of the list
    items isn’t an essential component of the list. However, for many collections
    of items, the order *is* important, and your web pages can display those items
    using a numbered list.
  id: totrans-1957
  prefs: []
  type: TYPE_NORMAL
  zh: 我之前提到，您在列表项的顺序不是列表的必要组成部分时使用项目符号列表。然而，对于许多项目集合，顺序*是*重要的，并且您的网页可以使用编号列表显示这些项目。
- en: For example, if you’re providing a set of step-by-step instructions, it’s vital
    that the procedure begins with the first step and then proceeds sequentially to
    the final step. Similarly, for a top-10 ranking, you probably want the 10th-ranked
    item to appear first, followed by the 9th-ranked item, and continuing to the top-ranked
    item, which appears last.
  id: totrans-1958
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果您提供一组逐步指令，则程序必须从第一步开始，然后按顺序进行到最后一步。同样，对于前十名排名，您可能希望第十名排在第一位，然后是第九名，一直排到排名第一的项目，它最后出现。
- en: 'Figure 9.6 shows an example of a numbered list. Here’s how you’d instruct ChatGPT
    to generate the code for it:'
  id: totrans-1959
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.6展示了编号列表的示例。以下是指导ChatGPT生成该代码的方法：
- en: '[PRE164]'
  id: totrans-1960
  prefs: []
  type: TYPE_PRE
  zh: '[PRE164]'
- en: '![](../../OEBPS/Images/CH09_F06_McFedries3.png)'
  id: totrans-1961
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH09_F06_McFedries3.png)'
- en: Figure 9.6 An example of a numbered list
  id: totrans-1962
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.6 编号列表的示例
- en: 'Notice that you precede each item in your list with a dash (`-`). You can also
    use a plus sign (`+`), an asterisk (`*`), or even the numeral 1 followed by a
    period (`1.`). Here’s the resulting code:'
  id: totrans-1963
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，你需要在列表中的每一项前加上一个破折号（`-`）。你也可以使用加号（`+`）、星号（`*`），甚至数字1后跟一个句点（`1.`）。下面是生成的代码：
- en: '[PRE165]'
  id: totrans-1964
  prefs: []
  type: TYPE_PRE
  zh: '[PRE165]'
- en: 'There are two main components to this code:'
  id: totrans-1965
  prefs: []
  type: TYPE_NORMAL
  zh: 这个代码有两个主要组成部分：
- en: The whole thing is surrounded by `<ol>` and `</ol>` tags (where `ol` is short
    for *ordered list*).
  id: totrans-1966
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 整个列表被`<ol>`和`</ol>`标签包围（其中`ol`是*ordered list*的缩写）。
- en: Each list item is surrounded by `<li>` and `</li>` tags (where `li` is short
    for *list item*).
  id: totrans-1967
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个列表项都被`<li>`和`</li>`标签包围（其中`li`是*list item*的缩写）。
- en: The web browser always renders numbered lists starting with the first item as
    number 1, but there are a couple of ways you can customize the list order. First
    up, in the next section you learn how to reverse the list order.
  id: totrans-1968
  prefs: []
  type: TYPE_NORMAL
  zh: 网页浏览器总是将编号列表的第一个项目渲染为数字1，但有两种方法可以自定义列表顺序。首先，在下一节中，你将学习如何反转列表顺序。
- en: 9.3.1 Reversing the list order
  id: totrans-1969
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9.3.1 反转列表顺序
- en: When you’re using a numbered list as part of a tutorial, some product documentation,
    or a recipe, you want the reader to start with step 1, proceed to step 2, and
    continue in sequence until the final step. However, not every numbered list fits
    this pattern. For example, it’s traditional for a top-10 list to begin at number
    10, present number 9, and so on down to number 1.
  id: totrans-1970
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在一个教程、产品文档或食谱中使用编号列表时，你希望读者从步骤1开始，继续到步骤2，并按顺序继续，直到最后一步。然而，并非每个编号列表都符合这种模式。例如，一个前10名的列表通常从第10开始，然后是第9，以此类推，直到第1。
- en: 'To cajole ChatGPT into creating such a list, instruct it to generate a *reversed
    numbered list*, as in this example:'
  id: totrans-1971
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让ChatGPT创建这样的列表，指导它生成一个*倒序编号列表*，如下例所示：
- en: '[PRE166]'
  id: totrans-1972
  prefs: []
  type: TYPE_PRE
  zh: '[PRE166]'
- en: Figure 9.7 shows how the code generated by ChatGPT from this instruction is
    rendered in the web browser.
  id: totrans-1973
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.7显示了ChatGPT根据这个指令生成的代码在网页浏览器中的渲染效果。
- en: '![](../../OEBPS/Images/CH09_F07_McFedries3.png)'
  id: totrans-1974
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH09_F07_McFedries3.png)'
- en: Figure 9.7 A reversed numbered list
  id: totrans-1975
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.7 一个倒序编号列表
- en: The other method you can use to change the order of a numbered list is to specify
    the list’s starting number, which is the topic of the next section.
  id: totrans-1976
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以用来改变编号列表顺序的另一种方法是指定列表的起始编号，这是下一节的主题。
- en: 9.3.2 Changing the list’s starting number
  id: totrans-1977
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9.3.2 改变列表的起始编号
- en: By default, a regular numbered list starts with number 1, and a reversed numbered
    list starts with a value equal to the number of items in the list. However, you’re
    free to specify any starting value you like. Why would you ever want to do such
    a thing? One common example is when you present part of a larger list (such as
    a contract). If that part of the larger list starts at number 4, for example,
    so should the numbered list you present to the reader.
  id: totrans-1978
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，常规编号列表从数字1开始，倒序编号列表从列表项数相等的位置开始。然而，你可以指定任何你喜欢的起始值。你为什么要这样做呢？一个常见的例子是当你展示一个更大的列表的一部分（例如，一份合同）时，如果这部分列表从第4开始，那么你向读者展示的编号列表也应该从第4开始。
- en: Another common example is when you start a numbered list, have a section of
    text, and then have a new numbered list that’s meant to be a continuation of the
    first. Figure 9.8 shows what happens in the browser.
  id: totrans-1979
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个常见的例子是当你开始一个编号列表，有一个文本部分，然后有一个新的编号列表，它应该作为第一个列表的延续。图9.8显示了在浏览器中发生的情况。
- en: '![](../../OEBPS/Images/CH09_F08_McFedries3.png)'
  id: totrans-1980
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH09_F08_McFedries3.png)'
- en: Figure 9.8 A list, interrupted
  id: totrans-1981
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.8 一个被打断的列表
- en: 'The problem here is that the second list starts over at step 1 when it should
    continue with step 5\. Fortunately, you can tell ChatGPT the starting value of
    a numbered list by including `starting at` *X* in your prompt, where *X* is the
    starting value you want. Here’s an example:'
  id: totrans-1982
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的问题是第二个列表从步骤1开始，而它应该从步骤5继续。幸运的是，你可以在提示中包含`starting at` *X* 来告诉ChatGPT编号列表的起始值，其中*X*是你想要的起始值。以下是一个示例：
- en: '[PRE167]'
  id: totrans-1983
  prefs: []
  type: TYPE_PRE
  zh: '[PRE167]'
- en: Figure 9.9 shows that the code generated by ChatGPT from this instruction now
    renders the second list correctly as a continuation of the first.
  id: totrans-1984
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.9显示了ChatGPT根据这个指令生成的代码现在正确地将第二个列表渲染为第一个列表的延续。
- en: '![](../../OEBPS/Images/CH09_F09_McFedries3.png)'
  id: totrans-1985
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH09_F09_McFedries3.png)'
- en: Figure 9.9 The second list is now a proper continuation of the first list.
  id: totrans-1986
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.9 第二个列表现在是第一个列表的适当延续。
- en: Need one of the items in a nested list to have its own numbered list? The next
    section tells you everything you need to know.
  id: totrans-1987
  prefs: []
  type: TYPE_NORMAL
  zh: 需要在嵌套列表中有一个项目拥有自己的编号列表吗？下一节将告诉你所有你需要知道的内容。
- en: 9.3.3 Nesting numbered lists
  id: totrans-1988
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9.3.3 嵌套编号列表
- en: Occasionally, you need to have “substeps” in a numbered list. In a tutorial,
    for example, you may want to break down a particular item into multiple subitems
    for clarity or precision. Similarly, it’s common for legal text to have numbered
    clauses and numbered subclauses. A collection of substeps within a larger numbered
    list is called a *nested* numbered list.
  id: totrans-1989
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，你需要在编号列表中包含“子步骤”。例如，在教程中，你可能希望将某个特定项目分解成多个子项目以提高清晰度或精确度。同样，法律文本中常见的编号条款和子条款也是如此。较大编号列表中的子步骤集合称为*嵌套编号列表*。
- en: 'Here’s an example prompt that asks ChatGPT to generate a numbered list where
    each of the two main steps has multiple substeps:'
  id: totrans-1990
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个示例提示，要求ChatGPT生成一个编号列表，其中两个主要步骤都有多个子步骤：
- en: '[PRE168]'
  id: totrans-1991
  prefs: []
  type: TYPE_PRE
  zh: '[PRE168]'
- en: Notice that in each case, the three subitems are indented by one space. This
    indentation tells ChatGPT that you want those items rendered as a nested numbered
    list. Figure 9.10 shows the code generated by ChatGPT in the web browser.
  id: totrans-1992
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在每种情况下，三个子项目都缩进了一个空格。这种缩进告诉ChatGPT你希望这些项目以嵌套编号列表的形式呈现。图9.10显示了ChatGPT在网页浏览器中生成的代码。
- en: '![](../../OEBPS/Images/CH09_F10_McFedries3.png)'
  id: totrans-1993
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH09_F10_McFedries3.png)'
- en: Figure 9.10 A numbered list with two nested numbered lists
  id: totrans-1994
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.10 一个包含两个嵌套编号列表的编号列表
- en: 'Here’s the code behind this list:'
  id: totrans-1995
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是这个列表背后的代码：
- en: '[PRE169]'
  id: totrans-1996
  prefs: []
  type: TYPE_PRE
  zh: '[PRE169]'
- en: To help the reader differentiate the nested list from the main list, the web
    browser indents the nested items a bit more than the main list items. However,
    this default way of handling nested numbered lists is a bit confusing because
    the nested items use the same numbering scheme (1, 2, 3, etc.) as the main numbered
    list. Fortunately, as you learn in the next section, you can specify a different
    numbering style.
  id: totrans-1997
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助读者区分嵌套列表和主列表，网络浏览器将嵌套项目比主列表项目缩进更多。然而，这种处理嵌套编号列表的默认方式有点令人困惑，因为嵌套项目使用与主编号列表相同的编号方案（1，2，3等）。幸运的是，正如你在下一节中学习的，你可以指定不同的编号样式。
- en: 9.3.4 Changing the numbering style
  id: totrans-1998
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9.3.4 更改编号样式
- en: 'By default, web browsers render a numbered list using decimal numbers (1, 2,
    3, and so on). However, there are several different numbering styles you can use,
    such as Roman numerals. Here’s a generic instruction that asks ChatGPT to use
    a different numbering style:'
  id: totrans-1999
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，网络浏览器使用十进制数字（1，2，3等）来渲染编号列表。然而，你可以使用几种不同的编号样式，例如罗马数字。这里有一个通用的指令，要求ChatGPT使用不同的编号样式：
- en: '[PRE170]'
  id: totrans-2000
  prefs: []
  type: TYPE_PRE
  zh: '[PRE170]'
- en: 'In your instruction, you replace *`style`* with one of the following:'
  id: totrans-2001
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的指令中，你将*`style`*替换为以下之一：
- en: The phrase `decimal leading zero` to use decimal numbers padded by initial zeros,
    as needed (01, 02, 03, and so on)
  id: totrans-2002
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 术语“十进制前导零”用于根据需要使用前导零填充的十进制数字（01，02，03等）
- en: The phrase `upper roman` to use uppercase Roman numerals (I, II, III, and so
    on)
  id: totrans-2003
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 术语“上标罗马数字”用于使用大写罗马数字（I，II，III等）
- en: The phrase `lower roman` to use lowercase Roman numerals (i, ii, iii, and so
    on)
  id: totrans-2004
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 术语“下标罗马数字”用于使用小写罗马数字（i，ii，iii等）
- en: The phrase `upper alpha` to use uppercase letters (A, B, C, and so on)
  id: totrans-2005
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 术语“上标字母”用于使用大写字母（A，B，C等）
- en: The phrase `lower alpha` to use lowercase letters (a, b, c, and so on)
  id: totrans-2006
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 术语“下标字母”用于使用小写字母（a，b，c等）
- en: 'Here’s a revised version of the ChatGPT instruction from the previous section,
    asking for lowercase Roman numbers in the nested numbered lists:'
  id: totrans-2007
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是上一节中ChatGPT指令的修订版，要求嵌套编号列表中使用小写罗马数字：
- en: '[PRE171]'
  id: totrans-2008
  prefs: []
  type: TYPE_PRE
  zh: '[PRE171]'
- en: Figure 9.11 shows the updated numbered list with the nested numbered lists using
    lowercase Roman numerals.
  id: totrans-2009
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.11 显示了使用小写罗马数字的更新后的编号列表和嵌套编号列表。
- en: '![](../../OEBPS/Images/CH09_F11_McFedries3.png)'
  id: totrans-2010
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH09_F11_McFedries3.png)'
- en: Figure 9.11 The nested numbered lists now use lowercase Roman numerals.
  id: totrans-2011
  prefs: []
  type: TYPE_NORMAL
  zh: 图9.11 嵌套编号列表现在使用小写罗马数字。
- en: At this point, you know all that’s required to successfully prompt ChatGPT to
    build a recipe page. The following section takes you through the process.
  id: totrans-2012
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你已经知道了成功提示ChatGPT构建食谱页面的所有要求。下一节将带你通过这个过程。
- en: 9.4 Crafting the prompt for the recipe page
  id: totrans-2013
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9.4 构建食谱页面的提示
- en: 'This chapter’s project is a web page that offers the reader a recipe that uses
    several lists:'
  id: totrans-2014
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的项目是一个网页，为读者提供了一个使用多个列表的食谱：
- en: Two bulleted lists for two sets of ingredients
  id: totrans-2015
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两套成分的两份列表项
- en: A numbered list (with a nested numbered list) for the instructions
  id: totrans-2016
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指令的编号列表（包含嵌套编号列表）
- en: At this point, you should already have a site title, a tagline, and a page title,
    which in this case will be the name of the recipe. It will be helpful if you know
    which Google Fonts typefaces you want for the page text and which colors you want
    to use. Check out chapter 3 to learn how to prompt ChatGPT for suggested titles,
    fonts, and colors.
  id: totrans-2017
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你应该已经有了网站标题、标语和页面标题，在这个例子中，页面标题将是食谱的名称。如果你知道你想要用于页面文本的 Google Fonts 字体类型和想要使用的颜色，这将很有帮助。查看第
    3 章了解如何提示 ChatGPT 获取建议的标题、字体和颜色。
- en: 'To start your prompt, tell ChatGPT that you want to construct a web page and
    that you want it to generate the code for you:'
  id: totrans-2018
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始你的提示，告诉 ChatGPT 你想要构建一个网页，并且希望它为你生成代码：
- en: '[PRE172]'
  id: totrans-2019
  prefs: []
  type: TYPE_PRE
  zh: '[PRE172]'
- en: 'Now spell out the page content, including the following (refer to figure 9.12):'
  id: totrans-2020
  prefs: []
  type: TYPE_NORMAL
  zh: 现在详细说明页面内容，包括以下内容（参考图 9.12）：
- en: A header that includes your logo, site title, and tagline
  id: totrans-2021
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含你的标志、网站标题和标语的页眉
- en: A main element that starts with the page title and is followed by some introductory
    text
  id: totrans-2022
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个以页面标题开始并跟随着一些介绍性文本的主要元素
- en: One or more bulleted lists that detail the recipe ingredients
  id: totrans-2023
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 详细说明食谱成分的列表项
- en: One or more numbered lists that take the reader through the recipe steps
  id: totrans-2024
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个或多个编号列表，引导读者通过食谱步骤
- en: A footer that includes a copyright notice.
  id: totrans-2025
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚。
- en: '![](../../OEBPS/Images/CH09_F12_McFedries3.png)'
  id: totrans-2026
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH09_F12_McFedries3.png)'
- en: Figure 9.12 The elements of the recipe page
  id: totrans-2027
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.12 食谱页面的元素
- en: 'Next, ask ChatGPT to generate the CSS:'
  id: totrans-2028
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，要求 ChatGPT 生成 CSS：
- en: '[PRE173]'
  id: totrans-2029
  prefs: []
  type: TYPE_PRE
  zh: '[PRE173]'
- en: 'You then specify the page formatting, including the following:'
  id: totrans-2030
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你指定页面格式，包括以下内容：
- en: The page background color and text color.
  id: totrans-2031
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面背景颜色和文本颜色。
- en: The type sizes you want to use for the site title, tagline, page title, and
    page text.
  id: totrans-2032
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想要用于网站标题、标语、页面标题和页面文本的字体大小。
- en: The fonts to use for the headings and regular page text.
  id: totrans-2033
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于标题和常规页面文本的字体。
- en: A maximum width for the page. This prevents the lines of text from getting too
    long. A maximum length of 800 px works for this page.
  id: totrans-2034
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面的最大宽度。这可以防止文本行过长。对于这个页面，800 像素的最大长度是合适的。
- en: 'Here’s an example prompt for my own recipe page:'
  id: totrans-2035
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我自己食谱页面的一个示例提示：
- en: '[PRE174]'
  id: totrans-2036
  prefs: []
  type: TYPE_PRE
  zh: '[PRE174]'
- en: 'ChatGPT first generates the HTML code, which you can copy and then paste and
    save to a file named index.xhtml. In that code, you should see a line near the
    top similar to the following:'
  id: totrans-2037
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 首先生成 HTML 代码，你可以复制并粘贴到名为 index.xhtml 的文件中。在这段代码中，你应该看到顶部附近类似以下的一行：
- en: '[PRE175]'
  id: totrans-2038
  prefs: []
  type: TYPE_PRE
  zh: '[PRE175]'
- en: This code tells the web browser to look for the CSS code in a file named styles.css,
    so your next task is to copy the generated CSS code and paste it and save it to
    a file named styles.css (or whatever name you see in the `<link>` tag). Be sure
    to save styles.css in the same folder as your index.xhtml file. You also need
    to copy your header image file into the same folder. Refer to appendix A to learn
    more about working web page files.
  id: totrans-2039
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码指示网络浏览器在名为 styles.css 的文件中查找 CSS 代码，因此你的下一个任务是复制生成的 CSS 代码，并将其粘贴并保存到名为 styles.css
    的文件中（或 `<link>` 标签中显示的任何名称）。务必将 styles.css 保存到与你的 index.xhtml 文件相同的文件夹中。你还需要将你的页眉图像文件复制到同一个文件夹中。参考附录
    A 了解更多关于工作网页文件的信息。
- en: I used OpenAI’s ChatGPT app to submit my prompt to GPT-4\. The generated code
    produced the page shown in Figure 9.13.
  id: totrans-2040
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用 OpenAI 的 ChatGPT 应用将我的提示提交给 GPT-4。生成的代码生成了图 9.13 所示的页面。
- en: '![](../../OEBPS/Images/CH09_F13_Mcfedries3.png)'
  id: totrans-2041
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH09_F13_Mcfedries3.png)'
- en: Figure 9.13 My recipe page
  id: totrans-2042
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.13 我的食谱页面
- en: If you like the page ChatGPT came up with, you can skip the rest of this chapter
    and deploy the code to the web (refer to appendix B for the deployment details).
    However, if you want to understand the generated web page code, keep reading to
    get a closer look.
  id: totrans-2043
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢 ChatGPT 提供的页面，你可以跳过本章的其余部分，并将代码部署到网络上（有关部署细节，请参阅附录 B）。然而，如果你想了解生成的网页代码，请继续阅读以获得更详细的了解。
- en: 9.5 Examining the recipe page code
  id: totrans-2044
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9.5 检查食谱页面代码
- en: One of the main premises of this book is that ChatGPT is good enough at slinging
    web page code that even folks who don’t want to know much about web development
    can still publish pages to the web by trusting ChatGPT to do the code part of
    the job. That said, there’s no rule against trying to understand what the code
    generated by ChatGPT is doing. To that end, the next two sections take a peek
    behind the curtain to examine the recipe page code that resulted from my prompt
    from the previous section (that page is shown in figure 9.13).
  id: totrans-2045
  prefs: []
  type: TYPE_NORMAL
  zh: 本书的一个主要前提是ChatGPT在编写网页代码方面足够出色，即使那些不想深入了解网页开发的人也可以通过信任ChatGPT来完成代码部分的工作，从而将网页发布到网络上。尽管如此，尝试理解ChatGPT生成的代码所做的工作并没有什么规则。为此，下一两个部分将揭开面纱，检查上一节中我提出的提示所生成的食谱页面代码（该页面如图9.13所示）。
- en: 'Note The generated HTML and CSS code for my recipe page are available on this
    book’s website ([www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt))
    and in the book’s GitHub repository: [https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt).'
  id: totrans-2046
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：本食谱页面的生成HTML和CSS代码可在本书的网站上找到（[www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt)）以及本书的GitHub仓库：[https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)。
- en: The code annotations that follow should help you both to understand what’s happening
    under the hood and to tweak or customize your own code.
  id: totrans-2047
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的代码注释将帮助您理解幕后发生的事情，并调整或自定义您自己的代码。
- en: 9.5.1 Examining the HTML
  id: totrans-2048
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9.5.1 检查HTML
- en: 'Here’s the ChatGPT-generated HTML code for my recipe page:'
  id: totrans-2049
  prefs: []
  type: TYPE_NORMAL
  zh: 这是ChatGPT为我食谱页面生成的HTML代码：
- en: '[PRE176]'
  id: totrans-2050
  prefs: []
  type: TYPE_PRE
  zh: '[PRE176]'
- en: ① Helps the page display properly on mobile devices
  id: totrans-2051
  prefs: []
  type: TYPE_NORMAL
  zh: ① 帮助页面在移动设备上正确显示
- en: ② Loads the Merriweather and Merriweather Sans fonts from Google Fonts
  id: totrans-2052
  prefs: []
  type: TYPE_NORMAL
  zh: ② 从Google Fonts加载Merriweather和Merriweather Sans字体
- en: ③ Tells the web browser where to find the CSS code
  id: totrans-2053
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 告诉网络浏览器在哪里找到CSS代码
- en: ④ Site logo
  id: totrans-2054
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 网站标志
- en: ⑤ Site title
  id: totrans-2055
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 网站标题
- en: ⑥ Site tagline
  id: totrans-2056
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 网站标语
- en: ⑦ Page header
  id: totrans-2057
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 页面页眉
- en: ⑧ Recipe title
  id: totrans-2058
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 食谱标题
- en: ⑨ Recipe introduction
  id: totrans-2059
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ 食谱简介
- en: ⑩ Bulleted list for the dry ingredients
  id: totrans-2060
  prefs: []
  type: TYPE_NORMAL
  zh: ⑩ 干燥成分的列表项
- en: ⑪ Bulleted list for the wet ingredients
  id: totrans-2061
  prefs: []
  type: TYPE_NORMAL
  zh: ⑪ 湿成分的列表项
- en: ⑫ Numbered list for the recipe preparation
  id: totrans-2062
  prefs: []
  type: TYPE_NORMAL
  zh: ⑫ 食谱准备步骤的编号列表
- en: ⑬ Nested numbered list
  id: totrans-2063
  prefs: []
  type: TYPE_NORMAL
  zh: ⑬ 嵌套编号列表
- en: ⑭ Page footer
  id: totrans-2064
  prefs: []
  type: TYPE_NORMAL
  zh: ⑭ 页面页脚
- en: 'Note that the HTML code includes the following line:'
  id: totrans-2065
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，HTML代码中包含以下行：
- en: '[PRE177]'
  id: totrans-2066
  prefs: []
  type: TYPE_PRE
  zh: '[PRE177]'
- en: This tag tells the web browser where to find the CSS code, which I describe
    in the next section.
  id: totrans-2067
  prefs: []
  type: TYPE_NORMAL
  zh: 这个标签告诉网络浏览器在哪里找到CSS代码，我将在下一节中描述。
- en: 9.5.2 Examining the CSS
  id: totrans-2068
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 9.5.2 检查CSS
- en: 'Here’s the ChatGPT-generated CSS code for my recipe page:'
  id: totrans-2069
  prefs: []
  type: TYPE_NORMAL
  zh: 这是ChatGPT为我食谱页面生成的CSS代码：
- en: '[PRE178]'
  id: totrans-2070
  prefs: []
  type: TYPE_PRE
  zh: '[PRE178]'
- en: ① Sets the page background color, margin, line height, and font
  id: totrans-2071
  prefs: []
  type: TYPE_NORMAL
  zh: ① 设置页面背景颜色、边距、行高和字体
- en: ② Sets the maximum page width to 800 px
  id: totrans-2072
  prefs: []
  type: TYPE_NORMAL
  zh: ② 设置最大页面宽度为800 px
- en: ③ Centers the page
  id: totrans-2073
  prefs: []
  type: TYPE_NORMAL
  zh: ③ 居中页面
- en: ④ Sets the header text color, padding, and alignment
  id: totrans-2074
  prefs: []
  type: TYPE_NORMAL
  zh: ④ 设置页眉文本颜色、填充和对齐
- en: ⑤ Sets a maximum logo width, and floats it to the left
  id: totrans-2075
  prefs: []
  type: TYPE_NORMAL
  zh: ⑤ 设置最大标志宽度，并将其浮动到左侧
- en: ⑥ Sets the page title font size, bottom margin, and font
  id: totrans-2076
  prefs: []
  type: TYPE_NORMAL
  zh: ⑥ 设置页面标题字体大小、底部边距和字体
- en: ⑦ Styles the tagline font size, top margin, and italics
  id: totrans-2077
  prefs: []
  type: TYPE_NORMAL
  zh: ⑦ 设置标语字体大小、顶部边距和斜体
- en: ⑧ Adds a margin to the top of the main element, and sets the font size
  id: totrans-2078
  prefs: []
  type: TYPE_NORMAL
  zh: ⑧ 在主元素顶部添加边距，并设置字体大小
- en: ⑨ Sets the font size and the font of the recipe title
  id: totrans-2079
  prefs: []
  type: TYPE_NORMAL
  zh: ⑨ 设置食谱标题的字体大小和字体
- en: ⑩ Styles the nested numbered list to use lowercase Roman numerals
  id: totrans-2080
  prefs: []
  type: TYPE_NORMAL
  zh: ⑩ 将嵌套编号列表样式设置为小写罗马数字
- en: ⑪ Styles the footer padding, top margin, and top border
  id: totrans-2081
  prefs: []
  type: TYPE_NORMAL
  zh: ⑪ 设置页脚填充、顶部边距和顶部边框
- en: If you like, you can use these annotations to help customize your web page code,
    as I describe in the next section.
  id: totrans-2082
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您喜欢，可以使用这些注释来帮助自定义您的网页代码，正如我在下一节中描述的那样。
- en: 9.6 Customizing the recipe page
  id: totrans-2083
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9.6 自定义食谱页面
- en: If you really don’t like the page ChatGPT created for you, try revising your
    prompt and submitting it in a new chat session. If the page is close to what you
    were looking for, consider tweaking the code yourself.
  id: totrans-2084
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您真的不喜欢ChatGPT为您创建的页面，请尝试修改您的提示并提交一个新的聊天会话。如果页面接近您所寻找的内容，请考虑自己调整代码。
- en: 'I’ll begin with a few suggestions for modifying the HTML:'
  id: totrans-2085
  prefs: []
  type: TYPE_NORMAL
  zh: 我将从修改HTML的一些建议开始：
- en: It’s safe to edit any of the page text, including the title, tagline, headings,
    or introductory text or any of the bulleted or numbered list items. Just make
    sure you don’t accidentally edit or delete the HTML tags on each side of the text
    (such as the `<li>` and `</li>` tags that surround a bulleted or numbered list
    item).
  id: totrans-2086
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编辑页面文本是安全的，包括标题、标语、标题或引言文本以及任何项目符号或编号列表项。只需确保你不会意外地编辑或删除文本两侧的HTML标签（例如包围项目符号或编号列表项的`<li>`和`</li>`标签）。
- en: 'Feel free to add one or more introductory paragraphs. For each new paragraph,
    follow this procedure:'
  id: totrans-2087
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随意添加一个或多个引言段落。对于每个新的段落，请遵循以下步骤：
- en: a)  In your text editor, position the cursor immediately after the `</p>` tag
    that ends the existing introductory paragraph.
  id: totrans-2088
  prefs: []
  type: TYPE_NORMAL
  zh: a) 在你的文本编辑器中，将光标置于结束现有引言段落的`</p>`标签之后。
- en: b)  Press Enter or Return to start a new line.
  id: totrans-2089
  prefs: []
  type: TYPE_NORMAL
  zh: b) 按Enter或Return键开始新的一行。
- en: c)  Type a `<p>` tag, and then press Enter or Return. Most text editors insert
    a `</p>` tag automatically.
  id: totrans-2090
  prefs: []
  type: TYPE_NORMAL
  zh: c) 输入一个`<p>`标签，然后按Enter或Return键。大多数文本编辑器会自动插入一个`</p>`标签。
- en: d)  Type your paragraph text.
  id: totrans-2091
  prefs: []
  type: TYPE_NORMAL
  zh: d) 输入你的段落文本。
- en: e)  If your text editor didn’t do so already, type a `</p>` tag to finish your
    paragraph element.
  id: totrans-2092
  prefs: []
  type: TYPE_NORMAL
  zh: e) 如果你的文本编辑器尚未这样做，输入一个`</p>`标签以完成你的段落元素。
- en: If you’re building a site around recipes (or something similar), you’ll want
    a navigation element so visitors can easily find your other pages. Check out chapter
    6 to learn how to prompt ChatGPT for links and a navigation bar.
  id: totrans-2093
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你正在围绕食谱（或类似内容）构建网站，你将需要一个导航元素，以便访客可以轻松找到你的其他页面。查看第6章了解如何提示ChatGPT获取链接和导航栏。
- en: In the footer section of the HTML code, you can add links to your social media
    accounts, as I describe in chapter 4.
  id: totrans-2094
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在HTML代码的页脚部分，你可以添加指向你的社交媒体账户的链接，正如我在第4章中描述的那样。
- en: 'Here are a few customization ideas for the CSS code:'
  id: totrans-2095
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些CSS代码的定制想法：
- en: If you’d prefer another numbering scheme for the nested numbered list, change
    the `ol` element’s `list-style-type` property value to a different keyword, such
    as `lower-alpha`.
  id: totrans-2096
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你希望嵌套编号列表使用另一种编号方案，将`ol`元素的`list-style-type`属性值更改为另一个关键字，例如`lower-alpha`。
- en: For a different background color, replace the value of the `body` element’s
    `background-color` property with another color keyword.
  id: totrans-2097
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了改变背景颜色，将`body`元素的`background-color`属性的值替换为另一个颜色关键字。
- en: For a different header text color, replace the value of the `header` element’s
    `color` property with another color keyword.
  id: totrans-2098
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了改变标题文本颜色，将`header`元素的`color`属性的值替换为另一个颜色关键字。
- en: If you want your page to have a different maximum width, change the `max-width`
    value to something other than `800px`.
  id: totrans-2099
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你希望你的页面有不同的最大宽度，将`max-width`的值更改为`800px`以外的值。
- en: If you’d prefer to have the header logo on the right, in the `header img` element,
    change the `float` value to `right`.
  id: totrans-2100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你希望将标题标志放在右侧，在`header img`元素中，将`float`值更改为`right`。
- en: For any font size value, you can change the number to increase or decrease the
    font size. Just make sure you leave the `px` unit in place.
  id: totrans-2101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何字体大小值，你可以改变数字来增加或减少字体大小。只需确保保留`px`单位。
- en: For any padding or margin value, you can change the number to increase or decrease
    the padding or margins. In each case, be sure to leave the `px` unit in place.
  id: totrans-2102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于任何填充或边距值，你可以改变数字来增加或减少填充或边距。在每种情况下，确保保留`px`单位。
- en: To make your page code more accessible, consider converting all px measurements
    to rem measurements. 1 rem is by default equivalent to 16 px, so 20 px is 1.25 rem,
    24 px is 1.5 rem, 32 px is 2 rem, 48 px is 3 rem, and so on. The rem unit is more
    accessible because it measures font sizes relative to the default font size the
    browser user has defined in their browser settings.
  id: totrans-2103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了使你的页面代码更易于访问，考虑将所有px测量值转换为rem测量值。默认情况下，1 rem相当于16 px，因此20 px是1.25 rem，24 px是1.5
    rem，32 px是2 rem，48 px是3 rem，依此类推。rem单位更易于访问，因为它测量的是相对于浏览器用户在其浏览器设置中定义的默认字体大小的字体大小。
- en: Summary
  id: totrans-2104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: A bulleted list is a collection of HTML elements that present multiple items
    as a vertical list, where each item is indented slightly from the left margin
    and preceded by a small black circle called a bullet.
  id: totrans-2105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 项目符号列表是一组HTML元素，将多个项目作为垂直列表展示，其中每个项目从左边缘略微缩进，并 precede by a small black circle
    called a bullet。
- en: You use a bulleted list when you want to present several items but the order
    of those items isn’t an essential component of the list.
  id: totrans-2106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你想展示多个项目但项目顺序不是列表的必要组成部分时，使用项目符号列表。
- en: A numbered list is a collection of HTML elements that present multiple items
    as a vertical list, where each item is indented slightly from the left margin
    and preceded (usually) by a number.
  id: totrans-2107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有序列表是一组HTML元素，它们以垂直列表的形式展示多个项目，其中每个项目都稍微缩进，并且通常在左边距前有一个数字。
- en: You use a numbered list when you want to present several items and the order
    of those items is an essential component of the list.
  id: totrans-2108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你想展示多个项目，并且这些项目的顺序是列表的一个基本组成部分时，你使用有序列表。
- en: A bulleted or numbered list that resides inside another bulleted or numbered
    list is said to be nested within that list.
  id: totrans-2109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 位于另一个项目符号或有序列表内部的列表称为嵌套在该列表内。
- en: For best results, your page prompt should be as specific as possible, including
    colors, font sizes, and heading levels.
  id: totrans-2110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了获得最佳效果，你的页面提示应该尽可能具体，包括颜色、字体大小和标题级别。
- en: Save the generated HTML to the index.xhtml file and the generated CSS to the
    filename suggested by ChatGPT in the HTML code, usually styles.css.
  id: totrans-2111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将生成的HTML保存到index.xhtml文件中，将生成的CSS保存到ChatGPT在HTML代码中建议的文件名中，通常是styles.css。
- en: 10 Setting up a photo gallery
  id: totrans-2112
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10 设置照片库
- en: This chapter covers
  id: totrans-2113
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖
- en: Using images on a web page
  id: totrans-2114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在网页上使用图像
- en: Working with thumbnail versions of images
  id: totrans-2115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用图像的缩略图版本
- en: Displaying images in a lightbox
  id: totrans-2116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在相册中显示图像
- en: Laying out a page using Flexbox
  id: totrans-2117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Flexbox布局页面
- en: Crafting a ChatGPT prompt for building a photo gallery page
  id: totrans-2118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为构建照片库页面制作ChatGPT提示
- en: Examining and customizing the ChatGPT-generated code
  id: totrans-2119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查和自定义ChatGPT生成的代码
- en: 'After you learned a few image basics in chapter 4, the projects in this book
    have mostly included a single image: a site logo in the page header. That’s a
    great start, but you no doubt know from your own online gadabouts that images
    are everywhere on the web. A well-placed and well-chosen photo or artwork can
    really perk up a page and offer some welcome eye candy for text-weary visitors.'
  id: totrans-2120
  prefs: []
  type: TYPE_NORMAL
  zh: 在你学习了第4章的一些图像基础知识之后，本书中的项目大多只包含一个图像：页面页眉中的网站标志。这是一个很好的开始，但你无疑知道，从你自己的在线活动来看，图像在网络上无处不在。一个放置得当且选择恰当的图片或艺术品可以真正让页面焕发活力，并为疲惫的访客提供一些受欢迎的视觉享受。
- en: In this chapter, you learn a bit more about images and how they work on the
    web, which will enable you to incorporate additional images on your pages. Go
    big or go home, as the saying goes—so this chapter goes big with images by showing
    you not only how to build a working photo gallery that you can use to show off
    your photographic skills but also how to use a modern layout technique to make
    your page look awesome. You then put all this image and layout list know-how to
    work to create a detailed prompt for ChatGPT to generate the code for the photo
    gallery.
  id: totrans-2121
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将了解更多关于图像在网页上如何工作的信息，这将使你能够将额外的图像添加到你的页面中。正如俗话所说——要么做大，要么回家，所以本章通过展示如何构建一个可以用来展示你的摄影技巧的工作照片库，以及如何使用现代布局技术让你的页面看起来很棒，来大张旗鼓地介绍图像。然后，你将所有这些图像和布局知识应用到实践中，为ChatGPT创建一个详细的提示，以生成照片库的代码。
- en: This chapter also provides annotated versions of the ChatGPT-generated HTML
    and CSS to help you understand how the photo gallery works. You also get a few
    useful tips for customizing the code.
  id: totrans-2122
  prefs: []
  type: TYPE_NORMAL
  zh: 本章还提供了ChatGPT生成的HTML和CSS的注释版本，以帮助你理解照片库是如何工作的。你还得到了一些有用的提示，用于自定义代码。
- en: 10.1 Checking out this chapter’s project
  id: totrans-2123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10.1 检查本章的项目
- en: 'As I mentioned in the introduction, this chapter’s project is a single-page
    photo gallery. The final page will include the following components:'
  id: totrans-2124
  prefs: []
  type: TYPE_NORMAL
  zh: 如我在引言中提到的，本章的项目是一个单页照片库。最终页面将包括以下组件：
- en: A header element that includes the website logo and title
  id: totrans-2125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含网站标志和标题的页眉元素
- en: A main element that begins with the gallery title and instructions for using
    the gallery
  id: totrans-2126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个以相册标题和使用说明开始的主体元素
- en: Nine reduced-size versions of the photos, where clicking one of these images
    displays a larger-size version of the image
  id: totrans-2127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 九个缩小尺寸的图片版本，点击其中一张图片将显示该图片的大尺寸版本
- en: A footer element that includes a copyright notice
  id: totrans-2128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚元素
- en: Figure 10.1 shows an example photo gallery created with code supplied by ChatGPT.
    You can use this kind of layout for other types of content, including a product
    catalog, artist portfolio, or design sampler or a gallery of current or completed
    projects, team members, upcoming events, testimonials, or clients. The common
    denominator in each of these projects is that they consist of a collection of
    images (perhaps with some text as well), so you need to know a bit more about
    how images work on the web.
  id: totrans-2129
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.1显示了由ChatGPT提供的代码创建的示例相册。你可以使用这种布局来展示其他类型的内容，包括产品目录、艺术家作品集、设计样本或当前或已完成的项目、团队成员、即将举行的活动、客户评价或客户。这些项目的共同点是它们由一系列图片（可能还有一些文本）组成，因此你需要了解更多关于图片在网页上如何工作的信息。
- en: '![](../../OEBPS/Images/CH10_F01_McFedries3.png)'
  id: totrans-2130
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH10_F01_McFedries3.png)'
- en: Figure 10.1 A photo gallery generated by ChatGPT
  id: totrans-2131
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.1 由ChatGPT生成的相册
- en: 10.2 A closer look at images
  id: totrans-2132
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10.2 深入了解图片
- en: If you’ve used a word processor or presentation program, you’ve probably created
    lots of documents that include images. In each case, the app offers something
    like an Insert Picture command that enables you to choose the image you want,
    which is added directly into the document at the spot you choose.
  id: totrans-2133
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用过文字处理程序或演示文稿程序，你可能已经创建了许多包含图片的文档。在每种情况下，应用程序都提供类似插入图片的命令，允许你选择你想要的图片，并将其直接添加到你在文档中选择的地点。
- en: Surprisingly, web page code doesn’t work the same way. There’s no HTML equivalent
    of the Insert Picture command that embeds an image directly into the page. Instead,
    you upload the image to your website as a separate file and then insert into your
    page text a special HTML tag that tells the browser where to locate the image.
    When the browser comes across this tag, it retrieves the image file from the server
    and displays the image on the page in the location you specified.
  id: totrans-2134
  prefs: []
  type: TYPE_NORMAL
  zh: 令人惊讶的是，网页代码的工作方式并不相同。没有HTML等价于插入图片命令，可以直接将图片嵌入页面。相反，你需要将图片作为单独的文件上传到你的网站，然后在页面文本中插入一个特殊的HTML标签，告诉浏览器图片的位置。当浏览器遇到这个标签时，它会从服务器检索图片文件，并在你指定的位置在页面上显示图片。
- en: 10.2.1 Checking out the <img> tag
  id: totrans-2135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 10.2.1 检查 `<img>` 标签
- en: The special tag that gets the browser to add an image to a web page is the `<img>`
    tag, which uses the partial syntax shown in figure 10.2.
  id: totrans-2136
  prefs: []
  type: TYPE_NORMAL
  zh: 获取浏览器将图片添加到网页的特殊标签是 `<img>` 标签，它使用图10.2中显示的部分语法。
- en: '![](../../OEBPS/Images/CH10_F02_McFedries3.png)'
  id: totrans-2137
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH10_F02_McFedries3.png)'
- en: Figure 10.2 You insert an image into a web page using the `<img>` tag.
  id: totrans-2138
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.2 使用 `<img>` 标签将图片插入网页。
- en: 'This version of the `img` element has two attributes:'
  id: totrans-2139
  prefs: []
  type: TYPE_NORMAL
  zh: 这个版本的 `img` 元素有两个属性：
- en: '`src="`*`file`*`"`—For the `src` (short for *source*) attribute, you replace
    *`file`* with the location of the image file. To keep things simple, I’m only
    going to show the two most common possibilities:'
  id: totrans-2140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`src="`*`file`*`"`—对于 `src`（简称 *源*）属性，你将 *`file`* 替换为图片文件的位置。为了简化，我只将展示两种最常见的情况：'
- en: 'If the image file is in the same directory as the HTML file, replace *`file`*
    with the name of the image file. For example, if your image file is logo.png,
    your `<img>` tag will look like this:'
  id: totrans-2141
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果图片文件与HTML文件位于同一目录下，将 *`file`* 替换为图片文件的名称。例如，如果你的图片文件是logo.png，你的 `<img>` 标签将看起来像这样：
- en: '[PRE179]'
  id: totrans-2142
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE179]'
- en: 'If the image is in a subdirectory, replace *`file`* with the image’s directory
    name and filename, separated by a backslash (`/`). For example, if you’ve created
    a subdirectory named images, and your image file is logo.png, your `<img>` tag
    will look like this:'
  id: totrans-2143
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果图片在子目录中，将 *`file`* 替换为图片的目录名和文件名，用反斜杠（`/`）分隔。例如，如果你创建了一个名为images的子目录，并且你的图片文件是logo.png，你的
    `<img>` 标签将看起来像这样：
- en: '[PRE180]'
  id: totrans-2144
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE180]'
- en: '`alt="`*`description`*`"`—For the `alt` (short for *alternative*) attribute,
    you replace *`description`* with a word or short phrase that describes the image;
    this can be used in place of the image if the image file can’t be displayed. Alt
    text (as it is often called) is also used by screen readers and Braille apps to
    give their users some idea of what the image is. Here’s an example:'
  id: totrans-2145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`alt="`*`description`*`"`—对于 `alt`（简称 *替代*）属性，你将 *`description`* 替换为一个描述图片的词或短语；如果图片文件无法显示，可以使用此文本代替图片。Alt文本（通常如此称呼）也被屏幕阅读器和盲文应用用来向用户传达图片的大致内容。以下是一个示例：'
- en: '[PRE181]'
  id: totrans-2146
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE181]'
- en: 'Technically, your web page is invalid unless each `<img>` tag has an `alt`
    attribute present. Having an invalid page means your page may not render properly
    in the web browser, but mostly it means your page will be less accessible to people
    using assistive technologies such as screen readers. Fortunately, ChatGPT-generated
    `<img>` tags usually include the `alt` attribute, but the description is almost
    always trivial and unhelpful. Therefore, you should always include the `alt` text
    you want in your prompt. Here’s an example instruction to ChatGPT:'
  id: totrans-2147
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 从技术上讲，除非每个`<img>`标签都有一个存在的`alt`属性，否则你的网页是无效的。一个无效的页面意味着你的网页可能在网络浏览器中无法正确渲染，但主要意味着你的页面对使用辅助技术（如屏幕阅读器）的人的可用性会降低。幸运的是，ChatGPT生成的`<img>`标签通常包括`alt`属性，但描述几乎总是微不足道的且无帮助。因此，你应该始终在你的提示中包含你想要的`alt`文本。以下是一个向ChatGPT的示例指令：
- en: '[PRE182]'
  id: totrans-2148
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE182]'
- en: 'Here’s an example `<img>` tag generated by ChatGPT from such a prompt:'
  id: totrans-2149
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里是一个ChatGPT根据这样的提示生成的`<img>`标签的例子：
- en: '[PRE183]'
  id: totrans-2150
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE183]'
- en: Tip If your page uses decorative or other nonessential images, set the `alt`
    attribute equal to the empty string (`""`). That way, your page is still valid,
    but you’re not annoying people using assistive technology (such as screen readers)
    who don’t want to hear descriptions of purely decorative images.
  id: totrans-2151
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：如果你的页面使用了装饰性或其他非必需的图片，请将`alt`属性设置为空字符串（`""`）。这样，你的页面仍然有效，但不会让使用辅助技术（如屏幕阅读器）的人感到烦恼，他们可能不想听到纯装饰性图片的描述。
- en: If you don’t yet have the image you want to use but know the image’s final dimensions,
    you can insert a placeholder image to occupy the same space on the page until
    the image is ready to use. The net section provides the details.
  id: totrans-2152
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有你想要使用的图片，但知道图片的最终尺寸，你可以插入一个占位符图片来占据页面上的相同空间，直到图片准备好使用。本节提供了详细信息。
- en: 10.2.2 Adding placeholder images
  id: totrans-2153
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 10.2.2 添加占位符图片
- en: You probably know that in the world of text, a *placeholder* is some text that
    temporarily marks a place where some permanent word or phrase will eventually
    appear. In the previous section, for example, the syntax for the `<img>` tag used
    the placeholders *`file`* and *`description`* for the values of the `src` and
    `alt` attributes, respectively.
  id: totrans-2154
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能知道，在文本的世界里，一个*占位符*是一些临时标记某个永久单词或短语最终将出现位置的文本。例如，在前一节中，`<img>`标签的语法使用了占位符*`file`*和*`description`*分别作为`src`和`alt`属性值的占位符。
- en: You can also use placeholders with images. In this case, the placeholder image
    takes up the same amount of space as the permanent image that will eventually
    be added to the page, which is very useful if you want to build your page but
    don’t have the image (or images) you need.
  id: totrans-2155
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以使用占位符与图片一起使用。在这种情况下，占位符图片占据与最终将添加到页面上的永久图片相同的空间，如果你想在页面中构建内容但还没有所需的图片（或图片），这非常有用。
- en: 'You have several ways to add placeholder images, but the easiest is to use
    a placeholder server, such as [https://placehold.co](https://placehold.co). Here’s
    an example instruction to ChatGPT to add a placeholder image:'
  id: totrans-2156
  prefs: []
  type: TYPE_NORMAL
  zh: 你有几种方法可以添加占位符图片，但最简单的是使用占位符服务器，例如[https://placehold.co](https://placehold.co)。以下是一个向ChatGPT添加占位符图片的示例指令：
- en: '[PRE184]'
  id: totrans-2157
  prefs: []
  type: TYPE_PRE
  zh: '[PRE184]'
- en: 'Here’s an example `<img>` tag generated by ChatGPT from this prompt:'
  id: totrans-2158
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个ChatGPT根据这个提示生成的`<img>`标签的例子：
- en: '[PRE185]'
  id: totrans-2159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE185]'
- en: Figure 10.3 shows how this placeholder appears on a web page.
  id: totrans-2160
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.3显示了这种占位符在网页上的显示方式。
- en: '![](../../OEBPS/Images/CH10_F03_McFedries3.png)'
  id: totrans-2161
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH10_F03_McFedries3.png)'
- en: Figure 10.3 An example placeholder image from placehold.co
  id: totrans-2162
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.3 来自placehold.co的一个示例占位符图片
- en: 10.2.3 Working with image thumbnails
  id: totrans-2163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 10.2.3 与图像缩略图一起工作
- en: To really show off your photographs, you need to display them at a relatively
    large size. However, depending on the file format (refer to chapter 4) and other
    factors, such as the camera you used, the full-size file can be quite large—at
    least several megabytes. That’s bad enough for a single image, but your photo
    gallery will have multiple images (nine in this project); it’s asking too much
    for gallery visitors to download such a massive amount of data. (This is especially
    true for folks coming to your page via a slow internet connection or a limited
    mobile data plan.)
  id: totrans-2164
  prefs: []
  type: TYPE_NORMAL
  zh: 要真正展示你的照片，你需要以相对较大的尺寸显示它们。然而，根据文件格式（参考第4章）和其他因素，例如你使用的相机，完整尺寸的文件可以相当大——至少几兆字节。对于单个图片来说已经足够糟糕了，但你的照片画廊将包含多张图片（本项目中有九张）；要求画廊访客下载如此大量的数据确实太过分了。（这对于通过慢速互联网连接或有限的数据计划来到你页面的人来说尤其如此。）
- en: For a project such as a photo gallery, a better strategy for all your users
    is to initially display a reduced-size version—known in the trade as a *thumbnail*—of
    each photo. The idea is to set up your page so that clicking a thumbnail will
    temporarily display a large-size version of the photo. (The size the user sees
    depends on the dimensions of the browser window.)
  id: totrans-2165
  prefs: []
  type: TYPE_NORMAL
  zh: 对于像照片库这样的项目，对所有用户来说，最初显示每个照片的缩小版本（在业界称为“缩略图”）是一个更好的策略。目的是设置您的页面，以便点击缩略图将临时显示照片的大尺寸版本。（用户看到的尺寸取决于浏览器窗口的尺寸。）
- en: NOTE There are no hard-and-fast rules about the size of your thumbnails. A page
    designed to hold dozens of images may use thumbnails that are only 50 or 75 pixels
    wide, whereas for a photo gallery like the one you get ChatGPT to help you build
    in this chapter, thumbnails that are around 300 pixels wide work well.
  id: totrans-2166
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：关于缩略图的大小没有硬性规定。一个可以容纳数十张图片的页面可能只使用宽度为50或75像素的缩略图，而对于像本章中ChatGPT帮助您构建的相册这样的照片库，宽度约为300像素的缩略图效果较好。
- en: Before proceeding, you should create your thumbnail versions of your photos.
    First up, the Windows instructions.
  id: totrans-2167
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续之前，您应该创建您照片的缩略图版本。首先，是Windows的说明。
- en: Creating a thumbnail using the Windows Photos app
  id: totrans-2168
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Windows照片应用创建缩略图
- en: If you’re using Windows 11, you can make a copy of the original photo file and
    then use the Photos app to resize the copy to your preferred thumbnail dimensions.
    In this project, I assume your thumbnail versions include the text *-thumbnail*
    as part of the filename. For example, if the full-size version is named image01.jpg,
    its thumbnail version is named image01-thumbnail.jpg.
  id: totrans-2169
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您使用的是Windows 11，您可以复制原始照片文件，然后使用照片应用将副本调整到您首选的缩略图尺寸。在本项目中，我假设您的缩略图版本包含文件名中的文本“-thumbnail”。例如，如果完整尺寸版本命名为image01.jpg，则其缩略图版本应命名为image01-thumbnail.jpg。
- en: 'Follow these steps to create a thumbnail version of a photo using the Photos
    app:'
  id: totrans-2170
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤使用照片应用创建照片的缩略图版本：
- en: 1.  Use File Explorer to locate the photo you want to work with.
  id: totrans-2171
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 使用文件资源管理器找到您要处理的照片。
- en: 2.  Click the file, click Copy in the toolbar, and then click Paste to create
    a copy of the photo.
  id: totrans-2172
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击文件，点击工具栏中的“复制”，然后点击“粘贴”以创建照片的副本。
- en: 3.  Click the copied file, click Rename (or press F2), and then edit the filename
    to remove the *-Copy* text added by Windows and replace it with `-thumbnail`.
    (So, you should end up with a filename along the lines of image01-thumbnail.jpg.)
  id: totrans-2173
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击复制的文件，点击“重命名”（或按F2键），然后编辑文件名以删除Windows添加的“-Copy”文本，并将其替换为“-thumbnail”。（因此，您最终应该得到一个类似image01-thumbnail.jpg的文件名。）
- en: 4.  Double-click the copied and renamed image file to load the image into the
    Photos app.
  id: totrans-2174
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 双击复制并重命名的图像文件，将图像加载到照片应用中。
- en: 5.  Click See More (the three dots in the toolbar), and then click Resize Image
    to open the Resize dialog, shown in figure 10.4.
  id: totrans-2175
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击工具栏中的“查看更多”（三个点），然后点击“调整大小图像”以打开图10.4所示的“调整大小”对话框。
- en: '![](../../OEBPS/Images/CH10_F04_McFedries3.png)'
  id: totrans-2176
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH10_F04_McFedries3.png)'
- en: Figure 10.4 Use the Resize dialog to create a thumbnail version of your photo.
  id: totrans-2177
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.4 使用“调整大小”对话框创建照片的缩略图版本。
- en: 6.  Make sure the Pixels option is selected.
  id: totrans-2178
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 确保已选择“像素”选项。
- en: 7.  Use the Width text box to set the thumbnail’s width in pixels. (Note that
    the Height value changes automatically to maintain the aspect ratio—that is, the
    ratio of the image’s width to its height—which is what you want. Alternatively,
    you can set the Height value, and the Width will change automatically.)
  id: totrans-2179
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 使用“宽度”文本框设置缩略图的宽度（像素）。（请注意，高度值会自动更改以保持宽高比——即图像宽度与其高度的比例——这是您想要的。或者，您也可以设置高度值，宽度将自动更改。）
- en: 8.  Click Save.
  id: totrans-2180
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 点击保存。
- en: If you use a Mac instead of a Windows PC, your version of the steps is next.
  id: totrans-2181
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您使用的是Mac而不是Windows PC，您的步骤版本如下。
- en: Creating a thumbnail using the macOS Preview app
  id: totrans-2182
  prefs: []
  type: TYPE_NORMAL
  zh: 使用macOS预览应用创建缩略图
- en: If you’re running macOS, you can use Finder to copy the original photo file
    and then use Preview to resize the copy to your preferred thumbnail width and
    height. This project assumes the thumbnail copies include the text *-thumbnail*
    in the filename. For example, if the full-size photo file is named image01.jpg,
    the thumbnail version should be named image01-thumbnail.jpg.
  id: totrans-2183
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您正在运行macOS，您可以使用Finder复制原始照片文件，然后使用预览应用将副本调整到您首选的缩略图宽度和高度。本项目假设缩略图副本的文件名中包含文本“-thumbnail”。例如，如果完整尺寸的照片文件名为image01.jpg，则缩略图版本应命名为image01-thumbnail.jpg。
- en: 'Follow these steps to create a thumbnail version of a photo in macOS:'
  id: totrans-2184
  prefs: []
  type: TYPE_NORMAL
  zh: 按照以下步骤在macOS中创建照片的缩略图版本：
- en: 1.  Use Finder to locate and click the photo you want to work with.
  id: totrans-2185
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 使用Finder定位并点击你想要处理的照片。
- en: 2.  Choose Edit > Copy, and then choose Edit > Paste to create a copy of the
    photo.
  id: totrans-2186
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择“编辑”>“复制”，然后选择“编辑”>“粘贴”以创建照片的副本。
- en: 3.  Click the copied file, press Enter, and then edit the filename to remove
    the *copy* text added by Finder and replace it with `-thumbnail`. (So, you should
    end up with a filename like image01-thumbnail.jpg.)
  id: totrans-2187
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击复制的文件，按Enter键，然后编辑文件名以移除Finder添加的*copy*文本，并替换为`-thumbnail`。（因此，你应该得到一个类似image01-thumbnail.jpg的文件名。）
- en: 4.  Double-click the copied and renamed image file to load the image into Preview.
  id: totrans-2188
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 双击复制并重命名的图像文件，将图像加载到预览中。
- en: 5.  Choose Tools > Adjust Size to open the dialog shown in figure 10.5.
  id: totrans-2189
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 选择“工具”>“调整大小”以打开图10.5所示的对话框。
- en: '![](../../OEBPS/Images/CH10_F05_McFedries3.png)'
  id: totrans-2190
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH10_F05_McFedries3.png)'
- en: Figure 10.5 Use this dialog to create a thumbnail version of your photo.
  id: totrans-2191
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.5 使用此对话框创建照片的缩略图版本。
- en: 6.  Make sure the Pixels item is selected in the list to the right of the Width
    and Height text boxes.
  id: totrans-2192
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 确保在“宽度”和“高度”文本框右侧的列表中选中了“像素”项。
- en: 7.  Use the Width text box to set the thumbnail’s width in pixels. (Note that
    the Height value changes automatically to maintain the aspect ratio—that is, the
    ratio of the image’s width to its height—which is what you want. Alternatively,
    you can set the Height value, and the Width will change automatically.)
  id: totrans-2193
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 使用“宽度”文本框设置缩略图的宽度（以像素为单位）。（注意，高度值会自动改变以保持宽高比——即图像宽度与高度的比率，这是你想要的。或者，你也可以设置高度值，宽度会自动改变。）
- en: 8.  Click OK.
  id: totrans-2194
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 点击“确定”。
- en: Next you learn how to enhance your thumbnail versions with some explanatory
    text.
  id: totrans-2195
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你将学习如何通过一些说明性文字来增强缩略图版本。
- en: 10.2.4 Adding image captions
  id: totrans-2196
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 10.2.4 添加图像说明
- en: 'You may prefer that your photo gallery show only the thumbnail versions of
    each image. However, you can make the experience a bit more friendly for your
    visitors if you provide a short caption for each image. The caption doesn’t have
    to be anything elaborate: just a brief title or description of the photo.'
  id: totrans-2197
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能更喜欢你的相册只显示每张图像的缩略图版本。然而，如果你为每张图像提供简短的说明，可以让你访客的体验更加友好。说明不必过于复杂：只需一个简短的标题或照片描述即可。
- en: 'You can add captions in multiple ways, but the most straightforward is to ask
    ChatGPT to turn your image into a *figure* and then provide a *figure caption*.
    Here’s the generic HTML that ChatGPT generates:'
  id: totrans-2198
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过多种方式添加说明文字，但最直接的方式是让ChatGPT将你的图像转换为**图**，然后提供**图说明**。以下是ChatGPT生成的通用HTML代码：
- en: '[PRE186]'
  id: totrans-2199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE186]'
- en: 'Here, *`Caption text`* is the caption, which appears just below the image.
    Here’s an example instruction to ChatGPT:'
  id: totrans-2200
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，*`Caption text`* 是说明文字，它出现在图像下方。以下是对ChatGPT的示例指令：
- en: '[PRE187]'
  id: totrans-2201
  prefs: []
  type: TYPE_PRE
  zh: '[PRE187]'
- en: 'Here’s an example figure and caption generated by ChatGPT from such a prompt:'
  id: totrans-2202
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个示例图和说明，由ChatGPT从这样的提示生成：
- en: '[PRE188]'
  id: totrans-2203
  prefs: []
  type: TYPE_PRE
  zh: '[PRE188]'
- en: Figure 10.6 shows how it looks in the browser.
  id: totrans-2204
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.6显示了它在浏览器中的样子。
- en: '![](../../OEBPS/Images/CH10_F06_McFedries3.png)'
  id: totrans-2205
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH10_F06_McFedries3.png)'
- en: Figure 10.6 A figure with a caption
  id: totrans-2206
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.6 带有说明的图
- en: With your thumbnail versions created and your captions composed, you’re ready
    to check out how your visitors can see the large-size version of each photo.
  id: totrans-2207
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建好缩略图版本并编写好说明文字后，你就可以查看访客如何看到每张照片的大尺寸版本了。
- en: 10.3 Implementing a lightbox overlay
  id: totrans-2208
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10.3 实现灯箱覆盖
- en: As you learn shortly (refer to section 10.5), when someone visits the photo
    gallery, the page at first shows a grid of nine thumbnail images. How does the
    user see a large-size version of a photo?
  id: totrans-2209
  prefs: []
  type: TYPE_NORMAL
  zh: 稍后你将了解到（参考第10.5节），当有人访问相册时，页面最初显示九个缩略图图像的网格。用户如何看到照片的大尺寸版本？
- en: There are a bunch of ways to solve that problem. For example, you can set up
    each thumbnail image as a link that, when clicked, loads the large-size version
    of the photo. That approach works, but clicking a link takes the user out of your
    photo gallery, so they need to navigate back to see more photos. Believe me, no
    one wants to see your photos that badly!
  id: totrans-2210
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这个问题有很多方法。例如，你可以将每个缩略图图像设置为链接，点击链接后加载照片的大尺寸版本。这种方法是可行的，但点击链接会将用户从相册中移出，所以他们需要导航回来查看更多照片。相信我，没有人那么想看你的照片！
- en: 'A better solution is to ask ChatGPT to create a *lightbox*, which is a special
    element that has the following characteristics:'
  id: totrans-2211
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更好的解决方案是让ChatGPT创建一个**灯箱**，这是一个具有以下特性的特殊元素：
- en: It’s created on the fly.
  id: totrans-2212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是即时创建的。
- en: It takes up the entire width and height of the browser window.
  id: totrans-2213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它占据了浏览器窗口的整个宽度和高度。
- en: It’s slightly transparent.
  id: totrans-2214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它略微透明。
- en: It’s displayed on top of the existing web page, which is why it’s called an
    “overlay.”
  id: totrans-2215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它显示在现有网页之上，这就是为什么它被称为“覆盖层”。
- en: 'For example, figure 10.7 shows a simple version of a photo gallery with three
    thumbnails. When the user clicks a thumbnail, the following things happen:'
  id: totrans-2216
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，图10.7显示了一个包含三个缩略图的简单相册版本。当用户点击缩略图时，以下事情会发生：
- en: The lightbox element is created.
  id: totrans-2217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建了灯箱元素。
- en: The new lightbox element is given an `img` element.
  id: totrans-2218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 新的灯箱元素被赋予了一个`img`元素。
- en: That `img` element is filled with the large-size version of the photo.
  id: totrans-2219
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 那个`img`元素被填充了照片的大尺寸版本。
- en: The lightbox is displayed by overlaying it on the page.
  id: totrans-2220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过在页面上覆盖它来显示灯箱。
- en: '![](../../OEBPS/Images/CH10_F07_McFedries3.png)'
  id: totrans-2221
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH10_F07_McFedries3.png)'
- en: Figure 10.7 A simple photo gallery with three thumbnails
  id: totrans-2222
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.7 一个包含三个缩略图的简单相册
- en: The result is that the user now sees the large-size version of the photo, which
    fills all or most of the browser window. For example, if I click the rightmost
    thumbnail in figure 10.7, the browser displays a larger version of the photo,
    as shown in figure 10.8\. Notice that the gallery appears faintly in the spaces
    to the left and right of the lightbox. This lets the user know they haven’t left
    the gallery. To return to the gallery, the user only has to click anywhere in
    the page, which removes the lightbox and redisplays the photo gallery.
  id: totrans-2223
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是，用户现在看到的是照片的大尺寸版本，它填充了整个或大部分浏览器窗口。例如，如果我点击图10.7中最右侧的缩略图，浏览器将显示照片的较大版本，如图10.8所示。注意，相册在灯箱左右的空间中显得微弱。这使用户知道他们还没有离开相册。要返回相册，用户只需在页面的任何地方点击一下，这将移除灯箱并重新显示相册。
- en: '![](../../OEBPS/Images/CH10_F08_McFedries3.png)'
  id: totrans-2224
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH10_F08_McFedries3.png)'
- en: Figure 10.8 Clicking a thumbnail displays the lightbox, which contains the larger
    version of the photo.
  id: totrans-2225
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.8 点击缩略图显示灯箱，其中包含照片的较大版本。
- en: 'If all this seems like it would be hideously complex to code, remember that
    you don’t have to lift a finger beyond preparing your thumbnail images. You can
    ask ChatGPT to implement all the lightbox functionality with an instruction similar
    to the following:'
  id: totrans-2226
  prefs: []
  type: TYPE_NORMAL
  zh: 如果所有这些都看起来像是编码起来会非常复杂，请记住，你不必做任何事，只需准备你的缩略图图像。你可以要求ChatGPT使用类似以下指令来实现所有灯箱功能：
- en: '[PRE189]'
  id: totrans-2227
  prefs: []
  type: TYPE_PRE
  zh: '[PRE189]'
- en: The sharp-eyed reader will have noticed the instruction to provide “JavaScript
    code” in this prompt. What’s that all about? The next section solves the mystery.
  id: totrans-2228
  prefs: []
  type: TYPE_NORMAL
  zh: 留意细节的读者会注意到这个提示中要求提供“JavaScript代码”。这是怎么回事？下一节将解开这个谜团。
- en: '10.4 The lightbox: Powered by JavaScript'
  id: totrans-2229
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10.4 灯箱：由JavaScript驱动
- en: Up to this point in the book, you’ve seen that you can get pretty far with just
    HTML and CSS. These are powerful technologies that, when generated successfully
    by ChatGPT with detailed prompts, can produce attractive and useful web pages.
  id: totrans-2230
  prefs: []
  type: TYPE_NORMAL
  zh: 到这本书的这一部分，你已经看到，仅使用HTML和CSS就可以走得很远。这些是强大的技术，当通过ChatGPT的详细提示成功生成时，可以产生吸引人且实用的网页。
- en: 'However, there are many things that HTML and CSS, potent as they are, just
    can’t do. A lightbox is a good example. Yes, you can use HTML and CSS to create
    and style the lightbox, but once you click a thumbnail, HTML and CSS fall down
    on the job:'
  id: totrans-2231
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，HTML和CSS虽然强大，但仍然有很多事情做不到。灯箱就是一个很好的例子。是的，你可以使用HTML和CSS来创建和样式化灯箱，但一旦点击缩略图，HTML和CSS就会失败：
- en: They can’t create new elements.
  id: totrans-2232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们无法创建新元素。
- en: They can’t load the full-size version of the clicked thumbnail into the lightbox
    `img` element.
  id: totrans-2233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们无法将点击的缩略图的全尺寸版本加载到灯箱`img`元素中。
- en: They can’t display the hidden lightbox.
  id: totrans-2234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们无法显示隐藏的灯箱。
- en: They can’t remove the lightbox when the user clicks it.
  id: totrans-2235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户点击时无法移除灯箱。
- en: 'Fortunately, there’s a third major web page technology that can handle these
    types of tasks and many more: JavaScript. This is a programming language that’s
    built into the web browser and is designed to add interactivity and dynamism to
    otherwise-inert web page elements. In this project, JavaScript essentially does
    two things:'
  id: totrans-2236
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，还有一种主要的网页技术可以处理这些类型的任务以及更多：JavaScript。这是一种内置在网页浏览器中的编程语言，旨在为其他方面静止的网页元素添加交互性和动态性。在这个项目中，JavaScript基本上做两件事：
- en: It adds a “click” event handler to each image. An *event handler* is JavaScript
    code that runs automatically when a specified event occurs. In this case, the
    event is the user clicking on an image in the photo gallery.
  id: totrans-2237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它为每个图像添加了一个“点击”事件处理程序。*事件处理程序*是当指定事件发生时自动运行的JavaScript代码。在这种情况下，事件是用户在照片画廊中点击图像。
- en: In the event handler, JavaScript builds and then displays the lightbox.
  id: totrans-2238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在事件处理程序中，JavaScript构建并显示相框。
- en: And, happily for you, that’s all you need to know about it. ChatGPT will handle
    the rest.
  id: totrans-2239
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，这就是你需要知道的所有关于它的内容。ChatGPT将处理其余部分。
- en: 10.5 Laying out the gallery with Flexbox
  id: totrans-2240
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10.5 使用Flexbox布局画廊
- en: When you add items to a web page, the default layout behavior for most elements
    is to flow vertically down the page, one element after the next. That has worked
    out well for the projects you’ve seen so far in this book, but it won’t work for
    the photo gallery. Why not? Because with your images rendered as figures, they
    too will flow vertically down the page, one after the other.
  id: totrans-2241
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在网页上添加项目时，大多数元素的默认布局行为是垂直排列在页面中，一个元素接一个。这在本书中你看到的迄今为止的项目中效果很好，但这对照片画廊来说不起作用。为什么？因为你的图像被渲染为图，它们也会垂直排列在页面中，一个接一个。
- en: That’s not the end of the world, for sure, but it’s not a great look, and it’s
    not convenient for folks who visit your page. Figure 10.9 shows a version of the
    photo gallery where the photos are displayed this way.
  id: totrans-2242
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这并不是世界末日，但这看起来并不好，而且对访问你页面的人来说也不方便。图10.9展示了照片画廊的一种版本，其中照片以这种方式显示。
- en: 'You can prevent this default behavior by asking ChatGPT to lay out the photo
    gallery using a web page technique called *Flexbox*. This is a complex technology,
    but all you need to know for now is that when you turn a web page element into
    a Flexbox container, the items lose their rigid default layout behavior and adapt
    themselves to the browser’s current dimensions. For this project, you can prompt
    ChatGPT to use Flexbox with a simple instruction:'
  id: totrans-2243
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过要求ChatGPT使用一种称为*Flexbox*的网页技术来布局照片画廊来防止这种默认行为。这是一个复杂的技术，但你现在需要知道的是，当你将网页元素转换为Flexbox容器时，项目会失去其刚性的默认布局行为，并适应浏览器当前的大小。对于这个项目，你可以通过简单的指令提示ChatGPT使用Flexbox：
- en: '[PRE190]'
  id: totrans-2244
  prefs: []
  type: TYPE_PRE
  zh: '[PRE190]'
- en: To see the result of this instruction, check out the final photo gallery layout,
    which appears later, in figure 10.10.
  id: totrans-2245
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看此指令的结果，请查看稍后出现的最终照片画廊布局，如图10.10所示。
- en: At this point, you know all that’s required to successfully prompt ChatGPT to
    build a photo gallery. The following section takes you through the process.
  id: totrans-2246
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你已经知道了成功提示ChatGPT构建照片画廊所需的所有内容。下一节将带你通过这个过程。
- en: '![](../../OEBPS/Images/CH10_F09_McFedries3.png)'
  id: totrans-2247
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH10_F09_McFedries3.png)'
- en: Figure 10.9 By default, your photo figures will run vertically down the page,
    one after the other.
  id: totrans-2248
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.9 默认情况下，你的照片图将垂直排列在页面中，一个接一个。
- en: 10.6 Crafting the prompt for the photo gallery
  id: totrans-2249
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10.6 为照片画廊制作提示
- en: This chapter’s project is a photo gallery page that displays nine photo thumbnails,
    each of which, when clicked, displays a large-size version of the photo. I’m assuming
    you already have a site logo and title, know which fonts you want to use for the
    page headings and text, and have a color scheme ready to apply. Head back to chapter
    3 to learn how to prompt ChatGPT for title, typeface, and color suggestions.
  id: totrans-2250
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的项目是一个照片画廊页面，它显示九个照片缩略图，每个缩略图在被点击时都会显示照片的大尺寸版本。我假设你已经有了网站标志和标题，知道你想要用于页面标题和文本的字体，并且已经准备好了要应用的颜色方案。返回第3章学习如何提示ChatGPT提供标题、字体和颜色建议。
- en: 'To start your prompt, tell ChatGPT that you want to construct a web page and
    that you want it to generate the code for you:'
  id: totrans-2251
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始你的提示，告诉ChatGPT你想要构建一个网页，并且你想要它为你生成代码：
- en: '[PRE191]'
  id: totrans-2252
  prefs: []
  type: TYPE_PRE
  zh: '[PRE191]'
- en: 'Now outline out the page content, item by item, including the following (refer
    to figure 10.10):'
  id: totrans-2253
  prefs: []
  type: TYPE_NORMAL
  zh: 现在逐项概述页面内容，包括以下内容（参见图10.10）：
- en: A header that includes your logo and site title
  id: totrans-2254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含你的标志和网站标题的页眉
- en: A main element that starts with the page title and is followed by some instructions
  id: totrans-2255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个以页面标题开始的主体元素，后面跟着一些指令
- en: The gallery of photo thumbnails
  id: totrans-2256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 照片缩略图画廊
- en: A footer that includes a copyright notice
  id: totrans-2257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含版权声明的页脚
- en: '![](../../OEBPS/Images/CH10_F10_McFedries3.png)'
  id: totrans-2258
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../../OEBPS/Images/CH10_F10_McFedries3.png)'
- en: Figure 10.10 The elements of the photo gallery page
  id: totrans-2259
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.10 照片画廊页面的元素
- en: 'Next, ask ChatGPT to generate the CSS:'
  id: totrans-2260
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，请ChatGPT生成CSS：
- en: '[PRE192]'
  id: totrans-2261
  prefs: []
  type: TYPE_PRE
  zh: '[PRE192]'
- en: 'You then specify the page formatting, including the following:'
  id: totrans-2262
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你指定页面格式，包括以下内容：
- en: The page background color and text color
  id: totrans-2263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 页面背景颜色和文本颜色
- en: The type sizes you want to use for the headings and page text
  id: totrans-2264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想要用于标题和页面文本的字体大小。
- en: The fonts to use for the headings and regular page text
  id: totrans-2265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于标题和常规页面文本的字体。
- en: Which elements should be Flexbox containers (in this project, these will be
    the header, the gallery, and the lightbox overlay)
  id: totrans-2266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些元素应该是Flexbox容器（在本项目中，这些将是页眉、相册和灯箱覆盖层）。
- en: Finally, you instruct ChatGPT to provide the HTML, CSS, and JavaScript code
    for a lightbox-style overlay to display the large-size photos.
  id: totrans-2267
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你指示ChatGPT提供用于显示大尺寸照片的灯箱样式覆盖层的HTML、CSS和JavaScript代码。
- en: 'Here’s an example prompt for my own photo gallery:'
  id: totrans-2268
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我为我的照片画廊的示例提示：
- en: '[PRE193]'
  id: totrans-2269
  prefs: []
  type: TYPE_PRE
  zh: '[PRE193]'
- en: 'In each of my tests with this prompt, ChatGPT generated this code in four stages:'
  id: totrans-2270
  prefs: []
  type: TYPE_NORMAL
  zh: 在我使用此提示进行的每次测试中，ChatGPT都分四个阶段生成了此代码：
- en: 'ChatGPT generated some—but crucially, not all—of the HTML code. When it came
    to generating the `figure` elements, ChatGPT generated the code for just the first
    figure, followed by a comment similar to this:'
  id: totrans-2271
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT生成了一些——但关键的是，并非全部——HTML代码。在生成`figure`元素时，ChatGPT仅生成了第一个图标的代码，随后是一个类似于以下注释的代码：
- en: '[PRE194]'
  id: totrans-2272
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE194]'
- en: 'I don’t think so! Later, I used the following prompt to ask ChatGPT to provide
    the complete HTML code:'
  id: totrans-2273
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我不这么认为！后来，我使用了以下提示来要求ChatGPT提供完整的HTML代码：
- en: '[PRE195]'
  id: totrans-2274
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE195]'
- en: 'When that was done, I saved the full HTML code as index.xhtml. In that file,
    you should see two references to external files:'
  id: totrans-2275
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 完成这些后，我将完整的HTML代码保存为index.xhtml。在该文件中，你应该看到两个对外部文件的引用：
- en: 'The first reference is in the `head` section and is for the CSS file; the reference
    is a `<link>` tag that should look something like this:'
  id: totrans-2276
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首个引用位于`head`部分，是为CSS文件设置的；引用是一个`<link>`标签，其外观可能如下所示：
- en: '[PRE196]'
  id: totrans-2277
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE196]'
- en: 'The second reference is near the bottom of the HTML code and is for the JavaScript
    file; the reference is a `<script>` tag that should look something like this:'
  id: totrans-2278
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二个引用位于HTML代码的底部附近，是为JavaScript文件设置的；引用是一个`<script>`标签，其外观可能如下所示：
- en: '[PRE197]'
  id: totrans-2279
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE197]'
- en: ChatGPT generated the code for the CSS, which you need to save to the same filename
    that appears in the `<link>` tag (usually styles.css).
  id: totrans-2280
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT生成了CSS代码，你需要将其保存到与`<link>`标签中出现的相同文件名（通常是styles.css）。
- en: ChatGPT generated the code for the JavaScript, which you need to save to the
    same filename that appears in the `<script>` tag (usually script.js)
  id: totrans-2281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT生成了JavaScript代码，你需要将其保存到与`<script>`标签中出现的相同文件名（通常是script.js）。
- en: ChatGPT generated more CSS code for the lightbox overlay. You need to copy that
    code and then paste it at the bottom of your CSS file.
  id: totrans-2282
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT为灯箱覆盖层生成了更多的CSS代码。你需要复制该代码并将其粘贴到CSS文件的底部。
- en: I used OpenAI’s ChatGPT app to submit my prompt to GPT-4\. The generated code
    produced the page shown in figure 10.11\. Clicking a thumbnail produces a larger
    version of the image, as shown in figure 10.12.
  id: totrans-2283
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用OpenAI的ChatGPT应用将我的提示提交给GPT-4。生成的代码产生了图10.11所示的页面。点击缩略图将生成图像的较大版本，如图10.12所示。
- en: '![](../../OEBPS/Images/CH10_F11_McFedries3.png)'
  id: totrans-2284
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH10_F11_McFedries3.png)'
- en: Figure 10.11 My photo gallery
  id: totrans-2285
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.11 我的照片画廊
- en: '![](../../OEBPS/Images/CH10_F12_McFedries3.png)'
  id: totrans-2286
  prefs: []
  type: TYPE_IMG
  zh: '![](../../OEBPS/Images/CH10_F12_McFedries3.png)'
- en: Figure 10.12 Clicking a thumbnail displays a larger-size version of the photo.
  id: totrans-2287
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.12 点击缩略图将显示照片的较大版本。
- en: If you’re happy with your page, feel free to bypass the rest of this chapter
    and deploy the code to the web (refer to appendix B to learn how to deploy your
    page). However, if you want to understand the generated web page code, keep reading
    to get a closer look.
  id: totrans-2288
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对自己的页面满意，可以自由地跳过本章的其余部分并将代码部署到网络上（参考附录B了解如何部署你的页面）。然而，如果你想了解生成的网页代码，请继续阅读以获得更详细的了解。
- en: 10.7 Examining the photo gallery code
  id: totrans-2289
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10.7 检查照片画廊代码
- en: If you’d like to have at least some idea of what ChatGPT generated on your behalf,
    the next three sections provide you with a brief look at the HTML and CSS code
    that underlies the photo gallery page shown earlier in figure 10.11, as well as
    the JavaScript code that enables the lightbox overlay demonstrated in figure 10.12.
  id: totrans-2290
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要至少对ChatGPT为你生成的代码有一个大致的了解，接下来的三个部分为你提供了对之前图10.11中显示的照片画廊页面背后的HTML和CSS代码的简要查看，以及启用图10.12中演示的灯箱覆盖层的JavaScript代码。
- en: 'Note The generated HTML and CSS code for my photo gallery are available on
    this book’s website ([www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt))
    and in the book’s GitHub repository: [https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt).'
  id: totrans-2291
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：本书网站上（[www.manning.com/books/build-a-website-with-chatgpt](https://www.manning.com/books/build-a-website-with-chatgpt)）和GitHub存储库（[https://github.com/paulmcfe/websites-with-chatgpt](https://github.com/paulmcfe/websites-with-chatgpt)）中提供了我的照片画廊生成的HTML和CSS代码。
- en: The code annotations that follow should help you understand how the photo gallery
    works and can make it easier to modify or customize your own code.
  id: totrans-2292
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的代码注释应该有助于您理解照片画廊的工作原理，并使修改或自定义您自己的代码变得更加容易。
- en: 10.7.1 Examining the HTML
  id: totrans-2293
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 10.7.1 检查HTML
- en: 'Here’s an annotated version of the HTML code that ChatGPT produced for my photo
    gallery:'
  id: totrans-2294
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是ChatGPT为我照片画廊生成的HTML代码的注释版本：
- en: '[PRE198]'
  id: totrans-2295
  prefs: []
  type: TYPE_PRE
  zh: '[PRE198]'
