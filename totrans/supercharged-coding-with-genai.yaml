- en: 'Miller’s Law, also known as Magic Number 7 plus or minus 2: [https://en.wikipedia.org/wiki/The_Magical_Number_Seven,_Plus_or_Minus_Two](https://en.wikipedia.org/wiki/The_Magical_Number_Seven,_Plus_or_Minus_Two)'
