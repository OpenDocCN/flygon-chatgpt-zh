- en: '***LISTING 2.21: np_plot_quadratic.py***'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE155]'
  prefs: []
  type: TYPE_PRE
- en: '[Listing 2.21](#list2-21) starts with two import statements, followed by the
    initialization of x as a range of values via the NumPy linspace() API. Next, y
    is assigned a range of values that fit a quadratic equation, which are based on
