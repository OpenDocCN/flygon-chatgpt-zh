    score Q7
  id: totrans-1547
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.15 机场各区域客户满意度Q7子得分与整体满意度得分Q7的线性回归模型结果
- en: Analysis with Generative AI
  id: totrans-1548
  prefs: []
  type: TYPE_NORMAL
  zh: 使用生成式AI进行数据分析
- en: 'Using the Case Data files, upload the file 2016_SFO_Customer_Survey_Data.xlsx
    into ChatGPT-4 with the Code Interpreter plugin. Then use the following prompt:'
  id: totrans-1549
  prefs: []
  type: TYPE_NORMAL
  zh: 使用案例数据文件，将文件2016_SFO_Customer_Survey_Data.xlsx上传到ChatGPT-4的代码解释器插件中。然后使用以下提示：
- en: 'Prompt: “Create a multivariate regression model to predict the overall score
    Q7ALL someone will give given selected sub-question scores (Q7FOOD, Q7STORE, Q7SIGN,
    Q7SCREENS, and Q7WIFI), save all coefficients and intercept in a Excel file. Then,
    create a correlation matrix for Q7FOOD, Q7STORE, Q7SIGN, Q7SCREENS, Q7WIFI, and
    Q7ALL, and save the matrix in an Excel file.”'
  id: totrans-1550
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：创建一个多元回归模型，以预测给定选定的子问题得分（Q7FOOD、Q7STORE、Q7SIGN、Q7SCREENS 和 Q7WIFI）的人将给出的总体分数
    Q7ALL，并将所有系数和截距保存到 Excel 文件中。然后，为 Q7FOOD、Q7STORE、Q7SIGN、Q7SCREENS、Q7WIFI 和 Q7ALL
    创建一个相关矩阵，并将矩阵保存到 Excel 文件中。
- en: '[Figure 10.17](#fig10-17) shows the coefficients of the model found by ChatGPT.
    [Figure 10.16](#fig10-16) shows the correlation matrix.'
  id: totrans-1551
  prefs: []
  type: TYPE_NORMAL
  zh: '[图 10.17](#fig10-17) 展示了 ChatGPT 找到的模型系数。[图 10.16](#fig10-16) 展示了相关矩阵。'
- en: 'Response from ChatGPT-4:'
  id: totrans-1552
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4 的回复：
- en: '![image](images/pg233.jpg)'
  id: totrans-1553
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg233.jpg)'
- en: FIGURE 10.16 Correlation matrix of customer satisfaction scores for individual
    areas of the airport to each other and to the overall satisfaction score
  id: totrans-1554
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10.16 机场各个区域客户满意度分数的相关矩阵，彼此之间以及与总体满意度分数
