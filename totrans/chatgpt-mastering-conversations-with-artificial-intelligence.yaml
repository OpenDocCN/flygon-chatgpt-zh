- en: '*Voice: First person*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Length: Around 800 words*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 2: Programming Task Assistance'
  prefs: []
  type: TYPE_NORMAL
- en: 'OUTPUT FORMAT:'
  prefs: []
  type: TYPE_NORMAL
