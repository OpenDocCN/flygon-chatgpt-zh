- en: Introduction
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: Are you thinking, “But I’m not a tech person! AI sounds complicated and, to
    be honest, a little scary!”? Trust me, I get it. The magic of AI, like ChatGPT,
    is that you don’t need to be a programmer or data scientist to use it. If you
    can type a text message or search on Google, you can use ChatGPT. It’s that simple.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你在想：“但我不懂技术！AI听起来很复杂，坦白说，有点可怕！”？相信我，我明白。像ChatGPT这样的AI的魔力在于，您不需要是程序员或数据科学家就能使用它。如果您能发送短信或搜索谷歌，您就可以使用ChatGPT。就这么简单。
- en: Don’t believe me? Just ask my mom. She’s 71 years old and not exactly a ‘tech
    person’. When I started telling her about ChatGPT and showing her how I used it,
    she got curious. After a few weeks of me talking about it and demonstrating it
    on her iPhone, she finally took the plunge and opened up the ChatGPT app herself.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 你不相信吗？问问我的妈妈。她71岁，并不完全是一个“技术人士”。当我开始告诉她关于ChatGPT并展示我是如何使用它的时候，她变得好奇起来。几周后，我一直在谈论它并在她的iPhone上展示它，她终于下定决心，自己打开了ChatGPT应用。
- en: And you know what? She loves it. She uses ChatGPT for recipes, random questions
    about history and politics, and more. She even discovered she could speak to ChatGPT
    in Chinese, and it understands her perfectly. This still amazes her. Recently,
    she asked, ‘How many languages does it understand?’ I just smiled and said, ‘Why
    don’t you ask Chat?’
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道吗？她很喜欢。她用ChatGPT找食谱，询问关于历史和政治的随机问题，还有更多。她甚至发现她可以用中文与ChatGPT交谈，它完全理解她。这仍然让她感到惊讶。最近，她问：“它理解多少种语言？”我只是微笑着说：“为什么不问问Chat呢？”
- en: And if you’re wondering, Chat currently understands over 95 different languages!
    It really is AI that everyone can use. Btw, I’ll refer to ChatGPT as ‘Chat’ throughout
    the book. It’s easier, and that’s what I call it in real life!
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还在想，Chat 目前能理解超过95种不同的语言！这真的是每个人都可以使用的人工智能。顺便说一句，我在整本书中都会把 ChatGPT 称为“Chat”。这样更简单，这也是我在现实生活中称呼它的方式！
- en: ChatGPT has also become my mom’s go-to translation app. She’s from Taiwan, but
    after living in the US for over 45 years, she doesn’t always remember exactly
    how to write what she wants to say in Chinese. So she opens the ChatGPT app, types
    what she wants to say in English, and asks Chat to write it in Chinese for her.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 也已成为我妈妈的首选翻译应用。她来自台湾，但在美国生活了45年多后，她并不总是记得如何用中文准确表达她想要说的话。所以她打开 ChatGPT
    应用，用英语输入她想要说的话，并让 Chat 帮她用中文写下来。
- en: The other day, she needed to reply to a text message from a lawyer she was hoping
    could help her with a tough situation. A mutual contact connected her with this
    lawyer, so this was an introductory text. She had no idea how to say what she
    wanted to say or how much information she should reply back with. Even if she
    did, with English being her second language, she’s not always confident writing
    messages, especially for this type of thing. On top of all that, she just didn’t
    know what was appropriate.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 前几天，她需要回复一条来自律师的短信，这位律师可能能帮助她解决一个棘手的情况。一个共同联系人将她与这位律师联系起来，所以这是一条介绍短信。她不知道如何表达她想要说的话，也不知道应该回复多少信息。即使她知道，由于英语是她的第二语言，她并不总是自信地撰写信息，尤其是这种类型的信息。更不用说所有这些，她也不知道什么才是合适的。
- en: So Chat helped her with that too. She briefly explained the situation to Chat,
    and it wrote up the perfect message she could reply with. ChatGPT is AI that anyone
    can use. It can make life easier in big ways and small. It can save you time,
    answer any question you have about anything in seconds, and help you do things
    you were never able to do before.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 所以 Chat 也帮助了她。她简要地向 Chat 解释了情况，Chat 写下了她可以回复的完美信息。ChatGPT 是任何人都可以使用的人工智能。它可以在大和小方面使生活变得更简单。它可以在几秒钟内回答你关于任何事情的任何问题，并帮助你做以前从未能做的事情。
- en: Start using ChatGPT today
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 今天就开始使用 ChatGPT 吧
- en: In this book, you’ll discover how you to naturally start using AI every day
    with ChatGPT. You’ll find tips from ChatGPT power users who started out just like
    you and practical real-world examples of how ChatGPT can help you do more and
    do better every day, starting now. Whether you’re looking to get a healthy weekly
    routine set up, grow your business, or you just want to get instant answers about
    the things you wonder about, ChatGPT can help.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，你会发现如何自然地开始每天使用 ChatGPT 来使用人工智能。你将找到ChatGPT高级用户的建议，他们最初和你一样，以及ChatGPT如何帮助你每天做得更多、更好的实际世界例子，从现在开始。无论你是想建立健康的每周常规，扩大你的业务，还是你只是想立即了解你好奇的事情，ChatGPT都能帮助你。
- en: I’ll repeat this many times, but it’s important you understand how easy ChatGPT
    is to use – if you can send a text message, you can chat with ChatGPT. And if
    my mom can use ChatGPT, you can too.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我会反复强调这一点，但重要的是你要明白 ChatGPT 的使用有多么简单——如果你能发送短信，你就能与 ChatGPT 聊天。而且如果我的妈妈都能使用
    ChatGPT，那你也能。
- en: Even after hearing about how my mom uses Chat, you might still think all this
    AI stuff sounds complicated. But take a look at the graphic on the next page.
    The ChatGPT app looks and feels just like your messaging app on your iPhone or
    Android. Let’s go over the basics of the ChatGPT app on an iPhone.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你听说过我的妈妈如何使用 Chat，你仍然可能认为所有这些人工智能听起来都很复杂。但看看下一页的图形。ChatGPT 应用看起来和感觉就像你iPhone或Android上的消息应用。让我们来了解一下iPhone上ChatGPT应用的基础。
- en: ChatGPT App is Just Like iMessage
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 应用就像 iMessage 一样
- en: '![Fig 1.1  The graphic compares the ChatGPT app interface (left) to the familiar
    iMessage (right) on an iPhone, with an iPhone homescreen in the middle](image_rsrc2XD.jpg)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图 1.1 该图形比较了 ChatGPT 应用界面（左）与iPhone上熟悉的iMessage（右），中间是iPhone的主屏幕](image_rsrc2XD.jpg)'
- en: Fig 1.1 The graphic compares the ChatGPT app interface (left) to the familiar
    iMessage (right) on an iPhone, with an iPhone homescreen in the middle
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1.1 该图形比较了 ChatGPT 应用界面（左）与iPhone上熟悉的iMessage（右），中间是iPhone的主屏幕
- en: '(1) ChatGPT app icon: Just like any app on your iPhone, tap the ChatGPT icon
    to open the app'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: (1) ChatGPT 应用图标：就像你iPhone上的任何应用一样，点击 ChatGPT 图标来打开应用
- en: '(2) Plus icon (+): Tap the plus icon to upload files, photos, and more'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: (2) 加号图标 (+)：点击加号图标来上传文件、照片等
- en: '(3) Message bar: Type your questions or thoughts here, just as you would in
    a text message'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: (3) 消息栏：在这里输入你的问题或想法，就像在短信中一样
- en: '(4) Send button: Hit this to send your message off to ChatGPT.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: (4) 发送按钮：点击此按钮将你的消息发送到ChatGPT。
- en: '(5) Your message: Sent messages appear here'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: (5) 你的消息：发送的消息会显示在这里
- en: '(6) ChatGPT response: ChatGPT’s responses pop up below your messages, similar
    to a chat thread'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: (6) ChatGPT回复：ChatGPT的回复会出现在你的消息下方，类似于聊天线程
- en: '(7) Saved messages and settings: Access your message history and manage your
    ChatGPT settings here, just as you would in other apps'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: (7) 保存的消息和设置：在这里访问你的消息历史和管理ChatGPT设置，就像在其他应用中做的那样
- en: '(8) New chat: Start a fresh conversation with this button'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: (8) 新聊天：点击此按钮开始新的对话
- en: The comparison between the ChatGPT app and iMessage illustrates how intuitive
    and familiar using ChatGPT can be. Just like iMessage, ChatGPT allows you to type
    in your questions, send messages, and receive replies in a chat format. The left
    screen shows ChatGPT’s interface, which is straightforward and user-friendly,
    similar to what you are already accustomed to with iMessage on the right.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT应用和iMessage之间的比较说明了使用ChatGPT是多么直观和熟悉。就像iMessage一样，ChatGPT允许你输入问题，发送消息，并以聊天格式接收回复。左侧屏幕显示了ChatGPT的界面，它简单直观，类似于你已经在右侧的iMessage中习惯的界面。
- en: By understanding the simple and user-friendly interface of ChatGPT, you are
    already a step ahead in making the most out of this powerful tool. This book is
    designed to guide you through every aspect of using ChatGPT, making it an indispensable
    part of your daily routine.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 通过理解ChatGPT简单易用的界面，你已经在充分利用这个强大工具的道路上迈出了第一步。本书旨在指导你了解ChatGPT使用的各个方面，使其成为你日常生活中的不可或缺的一部分。
- en: If you can text, you can use ChatGPT! And that’s the amazing thing about this
    AI assistant. It’s not for tech people or the business world. ChatGPT is for everyone.
    Whether you’re a student, a retiree, or anything in between, it can help you find
    answers, discover new things, and make your life a little bit easier.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够发短信，你就可以使用ChatGPT！这正是这个AI助手的神奇之处。它不仅面向科技人士或商业世界。ChatGPT面向所有人。无论你是学生、退休人员还是介于两者之间的人，它都可以帮助你找到答案，发现新事物，让你的生活变得更轻松一些。
- en: How to Use This Book
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用本书
- en: Find definitions in the glossary
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在词汇表中查找定义
- en: If you come across a word you don’t understand, flip to the glossary at the
    end of the book for a quick, easy-to-understand definition.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遇到不懂的单词，请翻到本书末尾的词汇表，以获取快速、易于理解的定义。
- en: Experience the magic of AI for yourself
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 亲身体验AI的魔力
- en: Use the prompts and examples at the end of each chapter! Don’t just read them
    – use them! Copy and paste them directly into ChatGPT and customize them to fit
    your unique needs and life. It only takes a minute to get the AI magic started.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 使用每章末尾的提示和示例！不要只是阅读它们——使用它们！直接将它们复制并粘贴到ChatGPT中，并根据你的独特需求和生活方式进行定制。只需一分钟就可以开始AI的魔力。
- en: 'The images you’ll see throughout the book have all been generated in ChatGPT
    with its image generation tool DALL-E, like the one below:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 本书中的所有图片都是使用ChatGPT的图像生成工具DALL-E生成的，就像下面这张一样：
- en: '![](image_rsrc2XE.jpg)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc2XE.jpg)'
- en: 'DALL-E prompt: Create an image with a friendly robot elephant holding a ‘Hi’
    sign against a backdrop with futuristic elements, --ar 16:9'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E提示：创建一个友好的机器人大象手持“Hi”标志，背景有未来元素，--ar 16:9
- en: Under each image is the prompt I used to create it. Copy and paste the prompts
    into Chat and see what images it’ll create for you!
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 每张图片下面都是我用来创建它的提示。将提示复制并粘贴到Chat中，看看它会为你创建什么样的图片！
- en: To help you better understand ChatGPT’s capabilities, you’ll find example prompts
    with real responses from ChatGPT in text boxes with green borders and shaded background
    like the one below. Take a moment to read through it. This will give you a better
    idea of how ChatGPT replies and interacts to different prompts.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助你更好地理解ChatGPT的功能，你会在带有绿色边框和阴影背景的文本框中找到ChatGPT的真实响应示例，就像下面这样。花点时间阅读它，这将给你一个更好的想法，了解ChatGPT如何回复和与不同的提示进行交互。
- en: People use ChatGPT for all sorts of things and the number of use cases increases
    every day. I was curious what people like to chat with Chat about so I just asked
    Chat.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 人们用ChatGPT做各种各样的事情，而且使用案例每天都在增加。我对人们喜欢和ChatGPT聊些什么感到好奇，所以我只是问了Chat。
- en: 'My prompt: What are the most asked questions from people using ChatGPT?'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我的提示：使用ChatGPT的人最常问的问题是什么？
- en: 'Real ChatGPT response: The most commonly asked questions people ask ChatGPT
    cover a wide range of topics, reflecting the diverse interests and needs of its
    users. Here are the top five most frequently asked questions:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 真实ChatGPT回应：人们问ChatGPT的最常见问题涵盖了广泛的主题，反映了其用户多样化的兴趣和需求。以下是五个最常问的问题：
- en: '1\. Basic Information and Definitions:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 基本信息和定义：
- en: Many users seek explanations of terms and concepts, such as “What does ‘epistemology’
    mean?” or “How does blockchain work?”. These questions highlight the model’s ability
    to provide clear, concise explanations on a variety of topics.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 许多用户寻求对术语和概念的解释，例如“‘认识论’是什么意思？”或“区块链是如何工作的？”。这些问题突显了该模型在提供各种主题的清晰、简洁解释方面的能力。
- en: '2\. Health and Wellness:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 健康与福祉：
- en: Questions about mental and physical health are very common. People often ask,
    “How can I improve my mental health?” or “What are some effective ways to lose
    weight?”. These queries indicate a strong interest in personal well-being and
    self-improvement.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 关于心理和身体健康的提问非常常见。人们经常问，“我如何改善我的心理健康？”或“有哪些有效的减肥方法？”。这些查询表明人们对个人福祉和自我提升有强烈的兴趣。
- en: '3\. Technology and Science:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 科技与科学：
- en: Users frequently inquire about the latest advancements in technology and scientific
    concepts. Questions like “What are the latest advancements in technology?” and
    “How does quantum computing work?” are typical, showcasing the model’s role in
    making complex topics more understandable.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 用户经常询问科技和科学概念的最新进展。例如，“科技领域的最新进展是什么？”和“量子计算是如何工作的？”这些问题展示了该模型在使复杂主题更易于理解方面的作用。
- en: '4\. Life and Motivation:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 生活与动力：
- en: Many users ask philosophical or motivational questions such as “What is the
    meaning of life?” or “How can I be more motivated?”. These questions reflect a
    desire for guidance and perspective on life’s bigger questions and personal growth.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 许多用户提出哲学或激励问题，例如“生活的意义是什么？”或“我如何更有动力？”。这些问题反映了人们对生活重大问题和个人成长指导与观点的渴望。
- en: '5\. Practical Tips and Advice:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 实用技巧和建议：
- en: Practical advice is highly sought after, with questions like “What are some
    effective study tips?” and “How can I start a successful business?”. These questions
    show that users are looking for actionable advice to improve various aspects of
    their lives.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 实用建议非常受欢迎，例如“有哪些有效的学习技巧？”和“我如何开始一家成功的企业？”。这些问题表明用户正在寻找可操作的建议来改善他们生活的各个方面。
- en: These questions illustrate how people use ChatGPT as a resource for learning,
    self-improvement, and understanding complex topics in simple terms.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题说明了人们如何将ChatGPT作为学习、自我提升和理解复杂主题的资源。
- en: Feel free to skip around
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 随意浏览
- en: If you’re new to AI, start from the beginning. We’ll walk you through setting
    up a ChatGPT account and the basics of using it. If you’re already familiar with
    the basics, use the ‘Contents’ page to jump to sections that match your goals
