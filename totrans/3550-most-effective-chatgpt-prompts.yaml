  id: totrans-1356
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编写一篇针对搜索引擎优化并包含相关关键词的产品描述。
- en: Generate a list of backlinks to target for improved search engine rankings.
  id: totrans-1357
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成一个要针对以提高搜索引擎排名的链接列表。
- en: Optimize search results based on user intent and behavior.
  id: totrans-1358
  prefs:
