- en: CHAPTER 7
  prefs: []
  type: TYPE_NORMAL
- en: PARETO ANALYSIS
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg133.jpg)'
  prefs: []
  type: TYPE_IMG
- en: This chapter introduces a powerful business analysis technique known as Pareto
    analysis, often referred to as the “80/20 rule.” Named after Italian economist
    Vilfredo Pareto, this method helps identify the most significant factors in a
    dataset, revealing which small subset of causes or elements contributes to the
    majority of effects or outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Pareto analysis addresses the following business question: “Which factors are
    the most important, influential, or impactful?” It is a versatile tool applicable
    across various business scenarios, from quality control and customer service to
    sales optimization and risk management.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Pareto analysis involves examining two related variables in a dataset: typically,
    a set of categories and their associated numerical values. The analysis helps
    determine which group of categories, when combined, contributes the most to the
    total. For instance, we might ask, “Which products generate 80% of our revenue?”
    or “Which customer segments account for the majority of our complaints?”'
  prefs: []
  type: TYPE_NORMAL
- en: The power of Pareto analysis lies in its ability to cut through the noise and
    focus on the “vital few” factors that have the most significant impact. This approach
    allows businesses to allocate resources more efficiently, prioritize issues effectively,
    and make data-driven strategic decisions.
  prefs: []
  type: TYPE_NORMAL
- en: The Pareto chart, a key component of this analysis, combines a bar graph and
    a line graph. The bars represent individual causes in descending order of magnitude,
    while the line shows the cumulative percentage. This visual representation makes
    it easy to identify the point at which the cumulative line begins to level off,
    which is often referred to as the “elbow” or “knee” of the curve.
  prefs: []
  type: TYPE_NORMAL
- en: While Excel does not have a built-in function for Pareto analysis, the process
    can be carried out using basic spreadsheet operations. This chapter guides you
    through the steps to perform a Pareto analysis manually, enabling you to apply
    this technique to various business scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: While Pareto analysis is a powerful tool, it should be applied judiciously.
    The classic 80/20 ratio is not a strict rule analysts must follow, and the actual
    proportions can vary depending on the specific dataset and context. Moreover,
    focusing solely on the top contributors might sometimes lead to overlooking important
    but less frequent issues.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout this chapter, we explore several case studies that demonstrate the
    application of Pareto analysis in different contexts. We use various tools, including
    Excel and R (via Jamovi), and even leverage the capabilities of AI-powered analysis.
    By the end of this chapter, you will have learned how to conduct a Pareto analysis
    and interpret its results, adding a valuable technique to your data analysis toolkit.
  prefs: []
  type: TYPE_NORMAL
- en: Pareto Analysis
  prefs: []
  type: TYPE_NORMAL
- en: What is a Pareto Analysis?
  prefs: []
  type: TYPE_NORMAL
- en: Pareto analysis, also known as the 80/20 rule or the principle of factor sparsity,
    is a powerful statistical technique used to identify the most significant factors
    in a dataset. Named after Italian economist Vilfredo Pareto, who observed that
    80% of Italy’s wealth was owned by 20% of its population, this principle has found
    wide applications in various fields, particularly in business and quality control.
  prefs: []
  type: TYPE_NORMAL
- en: Pareto analysis is based on the idea that a small number of causes (usually
    around 20%) are responsible for a large majority of effects (often about 80%).
    This concept is visualized through a Pareto chart, which combines a bar graph
    and a line graph to show both individual values in descending order and the cumulative
    total.
  prefs: []
  type: TYPE_NORMAL
- en: In business contexts, Pareto analysis is invaluable for prioritizing issues,
    allocating resources, and making strategic decisions. For instance, a company
    might discover that 80% of its profits come from 20% of its products, or that
    80% of customer complaints stem from 20% of its service issues. By focusing on
    these vital few factors, businesses can achieve significant improvements with
    minimal effort.
  prefs: []
  type: TYPE_NORMAL
- en: 'The process of conducting a Pareto analysis typically involves several steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1.**Identify the problem or effect to be analyzed.'
  prefs: []
  type: TYPE_NORMAL
- en: '**2.**List the potential causes or contributors.'
  prefs: []
  type: TYPE_NORMAL
- en: '**3.**Gather data on the frequency or impact of each cause.'
  prefs: []
  type: TYPE_NORMAL
- en: '**4.**Calculate the cumulative percentage for each cause.'
  prefs: []
  type: TYPE_NORMAL
- en: '**5.**Create a Pareto chart, arranging causes from highest to lowest frequency.'
  prefs: []
  type: TYPE_NORMAL
- en: '**6.**Draw a cumulative percentage line on the chart.'
  prefs: []
  type: TYPE_NORMAL
- en: '**7.**Analyze the chart to identify the “vital few” causes.'
  prefs: []
  type: TYPE_NORMAL
- en: One of the strengths of Pareto analysis is its versatility. It can be applied
    to a wide range of business scenarios, from quality control in manufacturing to
    customer service improvement, sales optimization, and risk management. In quality
    management, for example, it helps identify the most common defects or sources
    of waste. In marketing, it can reveal which products or customer segments generate
    the most revenue.
  prefs: []
  type: TYPE_NORMAL
- en: However, it is important to note that while Pareto analysis is a powerful tool,
    it should be applied judiciously. The 80/20 ratio is a recommendation of how the
    proportions should be, but the real proportions can vary. Focusing only on the
    top contributors might lead to overlooking important but less frequent issues.
  prefs: []
  type: TYPE_NORMAL
- en: When interpreting a Pareto chart, analysts look for the “elbow” or “knee” of
    the curve, which is the point where the cumulative percentage line begins to level
    off. This point often indicates where to draw the line between the “vital few”
    and the “trivial many” causes.
  prefs: []
  type: TYPE_NORMAL
- en: In the era of big data and advanced analytics, Pareto analysis remains relevant
    due to its simplicity and effectiveness. It provides a clear, visual way to prioritize
    factors and focus efforts on where they will have the most impact. By helping
    businesses identify and address the most significant issues first, Pareto analysis
    enables more efficient problem-solving and resource allocation, ultimately leading
    to improved performance and competitiveness.
  prefs: []
  type: TYPE_NORMAL
- en: As with any analytical tool, the effectiveness of Pareto analysis depends on
    the quality of the data and the accuracy of its interpretation. When used judiciously,
    it serves as a valuable complement to other statistical and business analysis
    techniques, helping organizations to work more efficiently in their pursuit of
    excellence.
  prefs: []
  type: TYPE_NORMAL
- en: What Are the Elements of Pareto Analysis?
  prefs: []
  type: TYPE_NORMAL
- en: 'The elements or components of Pareto analysis, which contribute to their effectiveness
    as a tool for data visualization and analysis, include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1.**Problem or effect: the specific issue or outcome being analyzed, which
    forms the basis of the Pareto analysis'
  prefs: []
  type: TYPE_NORMAL
- en: '**2.**Causes or contributors: the factors that potentially contribute to the
    problem or effect under investigation'
  prefs: []
  type: TYPE_NORMAL
- en: '**3.**Data collection: quantitative information gathered about each cause,
    typically frequency of occurrence or impact'
  prefs: []
  type: TYPE_NORMAL
- en: '**4.**Pareto chart: the primary visual representation, combining a bar graph
    and a line graph'
  prefs: []
  type: TYPE_NORMAL
- en: '**5.**Bars: vertical columns representing individual causes, arranged in descending
    order of magnitude from left to right'
  prefs: []
  type: TYPE_NORMAL
- en: '**6.**Cumulative line: a line graph overlaid on the bar chart, showing the
    cumulative percentage of the total effect'
  prefs: []
  type: TYPE_NORMAL
- en: '**7.**Left y-axis: typically represents the frequency or impact of individual
    causes'
  prefs: []
  type: TYPE_NORMAL
- en: '**8.**Right y-axis: shows the cumulative percentage, usually ranging from 0%
    to 100%'
  prefs: []
  type: TYPE_NORMAL
- en: '**9.**X-axis: lists the causes or contributors, often using codes or abbreviated
    labels'
  prefs: []
  type: TYPE_NORMAL
- en: '**10.**80% line: a horizontal line at the 80% mark on the cumulative percentage
    axis, helping identify the “vital few” causes'
  prefs: []
  type: TYPE_NORMAL
- en: '**11.**“Vital few:” the small number of causes (usually around 20%) that account
    for the majority of the effect'
  prefs: []
  type: TYPE_NORMAL
- en: '**12.**“Trivial many:” the remaining causes that collectively account for a
    smaller portion of the total effect'
  prefs: []
  type: TYPE_NORMAL
- en: '**13.**“Elbow” or “knee:” the point on the cumulative line where it begins
    to level off, often used to separate the “vital few” from the “trivial many”'
  prefs: []
  type: TYPE_NORMAL
- en: These elements work together to create a powerful visual tool that helps analysts
    and decision-makers quickly identify and prioritize the most significant factors
    affecting a given situation or problem.
  prefs: []
  type: TYPE_NORMAL
- en: An Example of Creating Pareto Analysis for a Dataset
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 7.1](#fig7-1) shows an example of how to create a Pareto analysis for
    a dataset of GDP by country, as provided by the World Bank in its World Development
    Indicators database. This analysis helps answer the question of which countries
    contribute the most to the world’s GDP.'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg138.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 7.1 Pareto chart of GDP by country showing the countries that contribute
    the most to the world’s total GDP
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 7.1: Pareto Analysis'
  prefs: []
  type: TYPE_NORMAL
- en: Analysis with Excel
  prefs: []
  type: TYPE_NORMAL
- en: Using the Case Dataset files provided, find the file WDIAnnotatedData.xlsx.
    Open WDIAnnotatedData.xlsx using Excel.
  prefs: []
  type: TYPE_NORMAL
- en: 'We are going to answer this question:'
  prefs: []
  type: TYPE_NORMAL
- en: Which countries contribute the most to the global Internet user population?
    (We will compute it for 2012, the latest year for which we have data.)
  prefs: []
  type: TYPE_NORMAL
- en: We are going to need population and Internet users per 100 for all countries
    for the year 2012\. Following our practice of not changing the raw data, select
    the appropriate columns and rows, create a shaped file in a new spreadsheet, and
    label the tab “Pareto.”
  prefs: []
  type: TYPE_NORMAL
- en: Delete rows at the bottom of the table that appear after the last individual
    country (Zimbabwe). Once you have a shaped file with “Country Name,” “Population,”
    and “Internet Users per 100,” save the file. Create a variable in an empty column
    to the right and label it “Internet Users.” Compute and enter into this new column
    the product of “Population” and “Internet Users per 100” to get the total number
    of Internet users in each country.
  prefs: []
  type: TYPE_NORMAL
- en: Compute the total number of Internet users and populations, and enter it at
    the bottom of each respective column.
  prefs: []
  type: TYPE_NORMAL
- en: What is the ratio of Internet users to the total population in the world?
  prefs: []
  type: TYPE_NORMAL
- en: Are you surprised? (You may need to reformat the cells to easily read the numbers.)
  prefs: []
  type: TYPE_NORMAL
- en: Sort the data file by “Internet Users” ([Figure 7.2](#fig7-2)). Create a variable
    on an empty column on the right and enter a computed variable of percent Internet
    users for each country with respect to the total number of Internet users for
    the world. Make the variable a percentage with no decimals so it can be read easily.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg140.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 7.2 World Bank dataset shaped and ready for analysis
  prefs: []
  type: TYPE_NORMAL
- en: On another empty column to the right, create a computed variable where you enter
    the cumulative distribution function (CDF) results. Highlight the top rows up
    to the 80% cumulative result ([Figure 7.3](#fig7-3)).
  prefs: []
  type: TYPE_NORMAL
- en: 'Answer these questions:'
  prefs: []
  type: TYPE_NORMAL
- en: How many countries does the 80% represent? What percentage are they of all countries
    in the world? Does it fit the 80/20 rule?
  prefs: []
  type: TYPE_NORMAL
- en: Plot the CDF for the first 50 countries. What do you notice? What does it tell
    you? We see that 25 out of 126 countries (or 20%) contribute 80% of the world’s
    total Internet users. In this case, the 80/20 rule works well ([Figure 7.4](#fig7-4)).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg141.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 7.3 Pareto analysis of the 2012 Internet users showing the countries
    that contribute the most to the entire population of Internet users in the world
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg142.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 7.4 Details of how the Pareto chart is constructed
  prefs: []
  type: TYPE_NORMAL
