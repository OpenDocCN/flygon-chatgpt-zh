  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态人工智能的**整合**将是对沉浸式技术，如**增强现实**（AR）和**虚拟现实**（VR）发展的**变革性**力量。这些技术已经开始改变我们工作、娱乐和沟通的方式，并将极大地从人工智能的能力中受益，即能够同时解释多种数据模式。在一个AR或VR环境中，人工智能不仅能够处理用户的动作或命令，而且能够实时分析视觉和物理环境，以调整体验，使其更加**沉浸**和**个性化**。
