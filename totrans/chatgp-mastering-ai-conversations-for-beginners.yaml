  zh: 在第三章的早期，我们讨论了如何使用ChatGPT来增强你的搜索引擎优化，通过提供一个关键词列表来用于特定主题。这在对话设计中也极其有用。虽然关键词对于确定你的目标受众在特定主题上使用哪些类型的术语很有用，以便你可以在基于文本的网页副本、博客文章等中使用最好的关键词，但实体生成关于这些词如何在你的网站聊天机器人或LLM的数据集中记录的问题，这看起来更像代码而不是实际的英语。幸运的是，有了ChatGPT，你现在不需要了解关于实体生成的更多知识，除了如何提示这个革命性的聊天机器人以生成你想要的术语或短语。然后，你所要做的就是复制并将这些粘贴到你的自己的聊天机器人或你用于网站的的大型语言模型的后端。
