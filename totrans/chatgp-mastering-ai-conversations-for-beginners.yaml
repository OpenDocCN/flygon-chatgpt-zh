  zh: '**有两个主要的原因**，为什么每个对使用聊天机器人和生成式AI感兴趣的人都应该确保他们理解提示工程的基本原理。首先，通过学习是什么让AI“起作用”，你会发展出一个对ChatGPT和类似系统的能力与局限性的深入理解。其次，这将清楚地表明你目前已经具备哪些技能，这些技能可以在提示工程中发挥巨大作用。让我们来回顾一下你可以在使用生成式AI时使用的五种日常技能。'
