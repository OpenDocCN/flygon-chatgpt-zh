- en: Preface
  prefs: []
  type: TYPE_NORMAL
- en: In the rapidly evolving landscape of business, data is a critical asset. The
    ability to analyze and draw insights from data can significantly influence a company’s
    strategic decisions and overall success. This book is written for business analysts
    who seek to enhance their skills in statistical analysis and leverage these insights
    to make informed business decisions.
  prefs: []
  type: TYPE_NORMAL
- en: Data analysis is the process of examining, cleansing, transforming, and modeling
    data to discover useful information, inform conclusions, and support decision-making.
    In the context of business, it involves using statistical techniques to interpret
    data, identify trends, and make predictions that can guide strategic initiatives.
    With the enormous amounts of data generated in recent years by digitalization
    and new technologies, businesses are reliant on data-driven decision-making. This
    book addresses this need by providing practical case studies and exercises that
    cover a broad spectrum of statistical techniques, from basic descriptive methods
    to advanced techniques, such as multivariate regression and forecasting.
  prefs: []
  type: TYPE_NORMAL
- en: 'The book is unique for its practical approach, using exercises performed with
    the most commonly used analytical tools today: Excel, R, and generative AI. Each
    platform has its strengths and weaknesses, and this book aims to provide readers
    with a comprehensive understanding of how to utilize each tool effectively for
    various types of analysis. By working through these exercises, business analysts
    will gain hands-on experience in applying statistical methods to real-world business
    scenarios. This practical experience is invaluable for developing the analytical
    skills needed to transform raw data into actionable insights.'
  prefs: []
  type: TYPE_NORMAL
- en: The initial chapters introduce the foundational concepts of data analysis in
    a business context, covering the importance of data as a strategic asset, the
    distinction between business intelligence and business analytics, and an overview
    of the different types of data analysis algorithms. It emphasizes the critical
    first step of framing the right questions, discussing how to translate business
    needs into well-framed analytical questions, and providing guidelines for formulating
    questions that can be effectively addressed through data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Before analysis can begin, data must be cleaned and prepared. This involves
    essential steps in data preparation, including data cleaning, shaping, and formatting,
    with practical examples and exercises to help readers develop the skills needed
    to prepare data for analysis using tools such as Excel and R. The book introduces
    a comprehensive suite of analysis tools that form the backbone of modern data
    analysis and statistical computing. Detailed instructions on how to install and
    use Excel’s Analysis ToolPak, R and its interface Jamovi, and generative AI tools
    like ChatGPT are provided.
  prefs: []
  type: TYPE_NORMAL
- en: Descriptive statistics, fundamental to understanding data, are thoroughly explained,
    including measures of central tendency and variability. Through case studies,
    readers learn how to apply these techniques using Excel, R, and generative AI.
    The book also covers the creation and interpretation of histograms, providing
    practical exercises that demonstrate how to generate and interpret these visualizations.
    Pareto analysis is introduced as a method to identify the most significant factors
    in a dataset, with step-by-step instructions for conducting Pareto analyses using
    Excel, R, and generative AI.
  prefs: []
  type: TYPE_NORMAL
- en: Scatterplots, used to examine relationships between variables, are explained
    with practical exercises on generating and interpreting these plots. The book
    then moves on to more advanced techniques, such as correlation analysis and linear
    regression, providing detailed case studies to show how to perform these analyses
    using various tools. Multivariate regression, extending linear regression to multiple
    predictors, is explained, with readers learning how to conduct and interpret these
    analyses through practical exercises and case studies.
  prefs: []
  type: TYPE_NORMAL
- en: Forecasting future trends is an important aspect of business analytics, and
    so time series analysis and forecasting techniques are discussed, providing practical
    examples of how to apply these techniques using different analytical tools. Inferential
    statistics, which allow analysts to make generalizations from samples to populations,
    are also covered, including important inferential techniques such as t-tests and
    chi-square tests. Through case studies, readers learn how to apply these techniques
    to test hypotheses and draw conclusions.
  prefs: []
  type: TYPE_NORMAL
- en: Contingency analysis, which examines relationships between categorical variables,
    is explained with practical exercises to demonstrate its application. A/B testing,
    a method of comparing two versions of a variable to determine which one performs
    better, is discussed with examples that illustrate how to conduct A/B testing
    using Excel and other analytical tools. Text data mining, involving the extraction
    of meaningful information from text data, is introduced, with techniques for text
    analysis such as word frequency and sentiment analysis explained and demonstrated
    using tools like Excel and generative AI.
  prefs: []
  type: TYPE_NORMAL
- en: Handling large datasets requires special techniques and tools, and the methods
    for analyzing big data are examined, including sampling and the use of specialized
    software. Practical exercises demonstrate how to manage and analyze large datasets
    effectively. Effective data visualization, crucial for communicating insights,
    is emphasized, with guidelines for creating impactful visualizations and case
    studies illustrating best practices in data visualization using various tools.
  prefs: []
  type: TYPE_NORMAL
- en: The final chapters provide a comprehensive summary of the data analysis techniques
    covered in the book, highlighting the key takeaways from each chapter and offering
    a roadmap for further learning and application. By the end of this book, readers
    will have developed a robust toolkit for data analysis and gained the confidence
    to apply these techniques to real-world business problems. Whether you are new
    to data analysis or looking to enhance your existing skills, this book offers
    a practical and comprehensive guide to mastering data analytics for business decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: A. Fortino
  prefs: []
  type: TYPE_NORMAL
- en: December 2024
  prefs: []
  type: TYPE_NORMAL
- en: Acknowledgments
  prefs: []
  type: TYPE_NORMAL
- en: This book reflects my personal journey, reinforcing early lessons in statistics
    and the hands-on work of an engineer. As a problem solver applying my engineering
    background to business, I received a great deal of help from my students, for
    which I am very grateful. Some of them directly contributed to writing many of
    the exercises.
  prefs: []
  type: TYPE_NORMAL
- en: I would like to express my gratitude to Ms. Liuyi Wang for her strong support
    and assistance. She converted the exercises from Excel to R for the book. Additionally,
    I want to thank Ms. Zoey Yang for her hard work in creating ChatGPT versions of
    all the exercises for the generative AI models.
  prefs: []
  type: TYPE_NORMAL
- en: I am also grateful to many other students who collaborated with me in exploring
    data analytics and co-authored many papers in the area, some award-winning stemming
    from their capstone research projects. I want to thank my graduate students at
    the NYU School of Professional Studies, and the many American Management Association
    professionals who attended my AMA seminars, and with whom I shared these techniques.
  prefs: []
  type: TYPE_NORMAL
- en: The entire Mercury Learning team of editors and artists was terrific. I’d like
    to express my gratitude to them. Thanks to Jim Walsh, my editor, who kept asking
    for more and helped shape an excellent book.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want to express my gratitude to my patient and loving wife, Kathleen. I wrote
    parts of this book during a significant personal transition: we relocated from
    rural Poughkeepsie to the stunning city of New York. The move from a large house
    to a small apartment was very stressful, and I was also completing this revision
    at the same time. Kathleen’s unwavering patience and constant encouragement were
    invaluable to me. Her support helped me navigate the move and finish this book
    peacefully.'
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER 1
  prefs: []
  type: TYPE_NORMAL
- en: DATA ANALYSIS AND BUSINESS
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The ability to extract meaningful insights from vast amounts of data is a critical
    competitive business advantage. This chapter introduces the fundamental concepts
    of data analysis and its application in business decision-making, allowing for
    a comprehensive exploration of this rapidly evolving field.
  prefs: []
  type: TYPE_NORMAL
- en: We begin by defining data mining as the sophisticated process of identifying
    valid, novel, potentially useful, and understandable patterns or relationships
    in data. This definition emphasizes that data mining goes beyond basic data summaries
    and descriptive statistics, involving complex algorithms and techniques to uncover
    deeper insights that can help support crucial business decisions.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter outlines several data analysis approaches, from simple spreadsheet-based
    tools to advanced analytical programming environments such as R, as well as powerful
    commercial solutions like RapidMiner, SAS, and SPSS. We explore how these tools
    enable a range of analytical activities, from basic descriptive statistics to
    complex predictive modeling and clustering algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: Central to our discussion is the metaphor “Data is the new oil,” coined by Clive
    Humby in 2006\. This analogy provides a useful framework for understanding the
    process of transforming raw data into actionable business insights. Just as crude
    oil must be extracted, refined, and processed to produce valuable products, raw
    data must be cleaned, analyzed, and interpreted to yield meaningful information
    that can fuel business decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: We then examine the data-driven decision-making process, illustrating how data
    is transformed into information, which then becomes the foundation for knowledge
    and action within an organization. This process underscores the critical role
    of data analysts as the transformers or “refiners” of data, who feed the decision-making
    engine of the organization with valuable insights.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter also clarifies the distinction between business intelligence (BI)
    and business analytics. While BI focuses on descriptive analysis and reporting
    of past events, business analytics employs more sophisticated techniques to answer
    complex questions about causality, trends, and future predictions. We discuss
    how the ability to perform advanced analytics is becoming increasingly valuable
    in the corporate world, even as basic data analysis skills become more commonplace.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, we introduce data warehousing and its relationship to data analysis.
    We explain how data warehouses are designed to facilitate complex analytical queries
    that might be impractical or inefficient to perform on operational, transactional
    systems.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the chapter presents several case studies illustrating the application
    of various data analysis techniques in real-world business scenarios. These examples
    demonstrate how different algorithmic approaches can be used to address specific
    business questions, contrasting the insights gained from sophisticated data analytics
    with those obtained through simpler descriptive analyses.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, readers will have a solid understanding of the principles
    of data analysis and its critical role in modern business decision-making. This
    understanding assists with the comprehension of specific techniques and applications
    in the subsequent chapters of this book.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to Data Analysis and Business
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis Algorithms and Activities
  prefs: []
  type: TYPE_NORMAL
- en: We may categorize business decision problems that need to be managed with data
    analysis techniques by the tools being used. For simple data analysis, spreadsheet
    tools are often utilized, such as Microsoft Excel. Although spreadsheets are useful,
    they often cannot effectively address complex data analysis problems. For these,
    algorithms must be used, such as regression, or clustering, which require analytical
    programming tools such as R, or commercial tools such as RapidMiner, SAS, or SPSS.
    [Figure 1.1](#fig1-1) shows some examples of the data analysis approaches, algorithms,
    and applications.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 1.1 Some examples of data analysis approaches, algorithms, and applications
  prefs: []
  type: TYPE_NORMAL
- en: Detailed cases where these activities are used to answer business questions
    effectively appear at the end of this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: “Data is the New Oil”
  prefs: []
  type: TYPE_NORMAL
- en: The phrase “Data is the new oil,” coined by Clive Humby in 2006, is frequently
    heard in today’s business environment. This metaphor emphasizes the importance
    of embracing data-driven decision-making in management. It symbolizes the process
    of managing data to accomplish actionable insights for making business decisions.
    Let’s explore its implications for analysts. The elements of the metaphor and
    their equivalencies are summarized in [Figure 1.2](#fig1-2).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 1.2 Chart comparing data to oil
  prefs: []
  type: TYPE_NORMAL
- en: The raw material in the figure is crude oil and it is being compared to data,
    the raw material of business. Just like oil by itself, data does not provide any
    significant benefit simply by existing. It must be processed to produce beneficial
    effects. The oil must be extracted from the surrounding environment (rocks and
    soil) and collected, transported, and stored. It is the same with data. It must
    be cleaned, shaped, and adequately stored before applying analytical tools to
    extract useful information.
  prefs: []
  type: TYPE_NORMAL
- en: 'Oil, as a raw material, is most useful when distilled into byproducts that
    can be readily consumed and easily converted to energy. Thus, we refine various
    products from natural oil: crude oil, gasoline, kerosene, and other valuable distillates,
    like benzene. Data must also be “distilled” to yield useful information products.
    The data “distillation” process is data analysis. Some analysis processes are
    straightforward descriptive statistical summaries using pivot tables and histograms.
    Others are more elaborate and refined analyses, such as predictive analytic products,
    which require sophisticated techniques such as decision trees or clustering. Applying
    analysis to data yields information that we encapsulate into facts and summarize
    into conclusions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Oil distillates by themselves do not generally produce useful work. They can
    be burned to produce heat (home heating furnace) and light (kerosene lamp). The
    most useful conversion process is a gasoline-burning engine, which generates mechanical
    power. We need a mechanism to transform oil distillates into work. It is similar
    to obtaining information and insights from data. It is important to know the facts,
    but when they are converted into action, they become more useful to the company.
    For a business, it is the organization’s decision-making team that converts the
    data into useful activities. Whether it is a single executive, a manager, or a
    committee, there is a business decision-making process that consumes information
    produced by analysts and generates decisions useful to the business. Information
    processed by the analyst-informed decision-making organizational team becomes
    real-world insights. Analysts are the transformers or “distillers” of data through
    their analysis process, generating facts and conclusions. They feed the decision-making
    “engine” of the organization: the managers and executives responsible for taking
    action.'
  prefs: []
  type: TYPE_NORMAL
- en: Data-Driven Decision-Making
  prefs: []
  type: TYPE_NORMAL
- en: When we analyze data, it becomes information, which in turn becomes the basis
    of knowledge. As data analysts, our role is to transform data into information
    and present the resulting facts to our business colleagues to assist in decision-making.
    [Figure 1.3](#fig1-3) provides a detailed description of this process.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 1.3 The data-driven decision-making process
  prefs: []
  type: TYPE_NORMAL
- en: Business Analytics and Business Intelligence
  prefs: []
  type: TYPE_NORMAL
- en: Specialized terms are utilized in most fields. It can be confusing when the
    same term has differing definitions in various fields or when the meanings overlap
    with other terms. Here are brief descriptions of the terms that are used in this
    book.
  prefs: []
  type: TYPE_NORMAL
- en: Business intelligence is an analysis that requires calculating descriptive results.
    It explains what has occurred, gives the level of quantities, and reports on flows
    of items and people and money in and out of categories (accounts). It helps us
    report on the past. It may even be set up to trigger alerts when certain situations
    occur, such as when fund levels in bank accounts are low, inventory levels may
    need replenishment, personnel turnover rates rise above a pre-set level, and expense
    levels rise above pre-set budget amounts.
  prefs: []
  type: TYPE_NORMAL
- en: Usually, sophisticated Enterprise Resource Management (ERP) information systems,
    such as Oracle Financials, or Customer Relationship Management systems (CRM),
    such as Salesforce, make available reporting tools to produce these data-based
    reports. They are referred to as BI tools. These tools are not considered data
    analysis tools, but they are excellent for extracting data from corporate transactional
    databases for the purposes of data analysis. We use simple summarization tools,
    such as tabulation and aggregation. In general, we call this analysis and reporting
    effort data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: These tools are not to be confused with more advanced approaches that utilize
    processes and algorithms for data analysis, which we refer to as business analytics.
    These advanced tools help us answer more insightful questions, such as “Why did
    that happen?,” “What is the trend?,” and “What will happen next (prediction)?”
    They require more sophisticated algorithms, careful usage, and a deeper understanding
    of additional tools and approaches. Examples of such tools include IBM SPSS, SAS
    Enterprise Guide, and Rapid Miner. First, data must be extracted from corporate
    databases, often using the SQL language. Subsequently, the application of the
    outlined algorithms requires knowledge and expertise. We refer to this effort
    as “data analytics” to distinguish it from the simpler summarization efforts of
    data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: The ability to do data analysis is becoming normal for most business staff.
    They are expected to be able to work with analysis tools such as Excel and provide
    cogent summaries and data-driven evidence to back up their regular reporting.
    Data analytics, however, requires greater effort and expertise, so the ability
    to apply it is at a premium among corporate office workers. Data analytics (or
    business analytics) yields greater value than less sophisticated data analysis
    (or business intelligence), as shown in [Figure 1.4](#fig1-4).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg8.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 1.4 The difference between business analytics and business intelligence
  prefs: []
  type: TYPE_NORMAL
- en: CRM and ERP systems, which currently offer basic data analysis capabilities
    through BI tools, will evolve to include more advanced data analysis tools. As
    a result, business intelligence will eventually encompass business analytics as
    well.
  prefs: []
  type: TYPE_NORMAL
- en: Algorithmic Technologies Associated with Data Analysis
  prefs: []
  type: TYPE_NORMAL
- en: 'Data analytics, or data analysis, encompasses the use of many sophisticated
    algorithms. These have been often developed as academic exercises or developed
    for use in other fields. [Figure 1.5](#fig1-5) shows eight major classifications
    of such algorithms, with some of the most prominent examples of each. Each of
    these algorithms will be discussed in turn. These algorithms are computer-based
    and have mostly been developed by computer scientists. Often, scientists need
    to analyze large amounts of data, such as in astronomy, and so they, working in
    collaboration with computer scientists, develop algorithms that result in advances
    in data analysis. Another example can be found in statistics. Statisticians needed
    to create a sophisticated analysis of epidemiological data from clinical trials
    or create accurate human lifespan models under various conditions to price insurance
    products. We call the latter type of data analyst an actuary. We derive many of
    the sophisticated computer tools we use today to do business analytics from these
    early workers. The whole field has evolved into a thriving industry known today
    as data science: the development of ever more sophisticated data analysis algorithms.'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg9.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 1.5 Algorithmic technologies associated with data analysis activities
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis and Data Mining
  prefs: []
  type: TYPE_NORMAL
- en: Another technology closely associated with data analysis is data warehousing.
    As discussed previously, corporate data is stored and processed using commercial
    systems such as ERPs and CRMs. These tools allow an organization to capture transaction
    data (such as sales, invoices, payments, customer orders, inventory transfers,
    financial transactions, and personnel changes) in an organized and secure manner.
    The database format of choice to organize such data is a Relational Database Management
    System or RDBMS. Interactions with such systems daily occur with applications
    set up for such purposes (such as Accounts Payable, Payroll, and Inventory Control).
    These systems also use SQL, which is used to set up, manage, and extract information
    for such systems. We need to use SQL to run queries to extract the data we require
    for data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 'These systems are optimized for transaction processing. The data analysis reporting
    tools embedded in such systems are optimized for straightforward business intelligence
    analysis. Routine daily operation questions are easily obtained with such systems.
    Obtaining answers to more strategic questions with these BI tools is often difficult
    and requires a great deal of effort. Very often, these require data analysis approaches.
    There is a technique to make the answering of strategic questions easier: data
    warehousing.'
  prefs: []
  type: TYPE_NORMAL
- en: Once we know the types of strategic questions we wish to pose and answer on
    a regular basis, a system is set up where queries are run on an operational database,
    and the extracted data is uploaded to this new data structure for easy querying
    of the strategic questions. The database structure of the transactional systems
    is often very sophisticated, using many interrelated tables to support complex
    application systems. The data warehouse structure is much simpler and easier to
    query and extract tables for data analysis. The data warehouse database is loaded
    from the transactional systems on a regular basis to keep it up to date. Queries
    for the extraction and loading are written once and run many times to create the
    foundation for data analysis activities.
  prefs: []
  type: TYPE_NORMAL
- en: To summarize, data analysis can be run from data extracted from operational,
    transactional systems, but these are often ad hoc (one time only) queries. Repeated
    queries that require data analytics are run from a data warehouse set up for such
    data analysis activities. Thus, data warehouses are utilized for the express purpose
    of performing business analytic activities using data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 1.1: Business Applications of Data Analysis'
  prefs: []
  type: TYPE_NORMAL
- en: Below are some examples of data analysis tasks, the algorithms that may be used
    to implement them, and the types of questions data analysis would answer in contrast
    to the simpler descriptive questions answered by business intelligence activities.
  prefs: []
  type: TYPE_NORMAL
- en: 'Case A: Descriptive Statistics'
  prefs: []
  type: TYPE_NORMAL
- en: Description of Data Analysis Activity
  prefs: []
  type: TYPE_NORMAL
- en: Predict if a data point belongs to one of the pre-defined classes. The prediction
    will be based on learning from a non-dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis Algorithms
  prefs: []
  type: TYPE_NORMAL
- en: Decision trees, neural networks, random forest algorithm, Bayesian net models,
    induction rules, and k-nearest neighbors
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis Framed Question
  prefs: []
  type: TYPE_NORMAL
- en: What voters belong to which political parties from known voting demographic
    data?
  prefs: []
  type: TYPE_NORMAL
- en: Descriptive Analysis Framed Question
  prefs: []
  type: TYPE_NORMAL
- en: What was the vote count by party and geographic location?
  prefs: []
  type: TYPE_NORMAL
- en: 'Case B: Histograms, Pareto Charts, and Correlations'
  prefs: []
  type: TYPE_NORMAL
- en: Description of Data Analysis Activity
  prefs: []
  type: TYPE_NORMAL
- en: Predict the numeric target label of a data point. The prediction will be based
    on learning from an unknown dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis Algorithms
  prefs: []
  type: TYPE_NORMAL
- en: linear regression and logistic regression
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis Framed Questions
  prefs: []
  type: TYPE_NORMAL
- en: What is the unemployment rate for next year? What should be the insurance premiums
    for a particular insurance instrument?
  prefs: []
  type: TYPE_NORMAL
- en: Descriptive Analysis Framed Questions
  prefs: []
  type: TYPE_NORMAL
- en: How many people were unemployed last year, with groups broken down by demographic
    characteristics? How much money did we receive in revenue from the sale of particular
    insurance instruments?
  prefs: []
  type: TYPE_NORMAL
- en: 'Case C: Linear Regression and Time Series Analysis'
  prefs: []
  type: TYPE_NORMAL
- en: Description of Data Analysis Activity
  prefs: []
  type: TYPE_NORMAL
- en: Predict if a data point is an outlier compared to other data points in a dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis Algorithms
  prefs: []
  type: TYPE_NORMAL
- en: Distance-based, density-based, and local outlier factors
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis Framed Question
  prefs: []
  type: TYPE_NORMAL
- en: Which credit card transactions were fraudulent in the past month?
  prefs: []
  type: TYPE_NORMAL
- en: Descriptive Analysis Framed Question
  prefs: []
  type: TYPE_NORMAL
- en: What was the total amount of credit card charges processed last month?
  prefs: []
  type: TYPE_NORMAL
- en: 'Case D: Inferential Analysis'
  prefs: []
  type: TYPE_NORMAL
- en: Description of Data Analysis Activity
  prefs: []
  type: TYPE_NORMAL
- en: Predict the value of the target variable for a future timeframe based on historical
    matters.
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis Algorithms
  prefs: []
  type: TYPE_NORMAL
- en: Exponential smoothing, autoregression integrated moving average (ARIMA), and
    regression
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis Framed Questions
  prefs: []
  type: TYPE_NORMAL
- en: What will be next month, next quarter, and next year’s sales? What will be a
    production forecast for the next quarter?
  prefs: []
  type: TYPE_NORMAL
- en: Descriptive Analysis Framed Questions
  prefs: []
  type: TYPE_NORMAL
- en: What were sales for the past month, for the past quarter, and the past year?
    How many items did we produce last quarter, last month, and for all last year?
  prefs: []
  type: TYPE_NORMAL
- en: 'Case E: Clustering'
  prefs: []
  type: TYPE_NORMAL
- en: Description of Data Analysis Activity
  prefs: []
  type: TYPE_NORMAL
- en: Identify natural clusters with a dataset based on inherent properties within
    the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis Algorithms
  prefs: []
  type: TYPE_NORMAL
- en: k-means clustering, density-based clustering, and random forest clustering
  prefs: []
  type: TYPE_NORMAL
- en: Data Analysis Framed Question
  prefs: []
  type: TYPE_NORMAL
- en: Using customer information based on transactions, Web activity, and customer
    call data, segment the customer database for database marketing purposes.
  prefs: []
  type: TYPE_NORMAL
- en: Descriptive Analysis
  prefs: []
  type: TYPE_NORMAL
- en: How many calls were made by call type, geographic location, and lifetime value
    of the customer?
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs: []
  type: TYPE_NORMAL
- en: Humby, Clive. “Data is the new oil.” Proc. ANA Sr. Marketer’s Summit. Evanston,
    IL, USA (2006).
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER 2
  prefs: []
  type: TYPE_NORMAL
- en: FRAMING ANALYTICAL QUESTIONS
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg15.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'The process of transforming raw business data into actionable insights begins
    with a critical yet often overlooked step: framing analytical questions. This
    chapter explores the fundamental techniques and considerations involved in formulating
    effective analytical questions that drive meaningful business analysis.'
  prefs: []
  type: TYPE_NORMAL
- en: At the heart of this process lies the concept that analytical efforts must be
    anchored in the organization’s purpose and objectives. We begin by examining the
    CRISP-DM (Cross Industry Standard Process for Data Mining) reference model, which
    emphasizes the importance of understanding project objectives from a business
    perspective before translating them into data mining problem definitions.
  prefs: []
  type: TYPE_NORMAL
- en: The chapter introduces a structured approach to discovering and articulating
    business information needs. We explore the role of the business data analyst in
    translating often nebulous organizational information requests into computable,
    well-framed questions. This translation process is crucial, as it bridges the
    gap between business objectives and data analysis techniques.
  prefs: []
  type: TYPE_NORMAL
- en: Central to our discussion is the concept of context analysis. We delve into
    the importance of understanding the broader business environment, industry dynamics,
    and key performance indicators (KPIs) that drive information needs. This contextual
    understanding ensures that analytical work not only fulfills immediate information
    requests but also addresses underlying performance gaps and strategic objectives.
  prefs: []
  type: TYPE_NORMAL
- en: We introduce the SMART framework (Specific, Measurable, Attainable, Relevant,
    Time-related) as a tool for evaluating and refining analytical questions. This
    framework helps ensure that framed questions are focused, computable, answerable
    with available techniques, applicable to the business, and considerate of temporal
    factors.
  prefs: []
  type: TYPE_NORMAL
- en: The chapter also explores the iterative nature of question framing, acknowledging
    that initial sets of questions may evolve as analysis progresses and new insights
    emerge. We discuss the importance of both divergent thinking in generating a wide
    range of potential questions and convergent thinking in prioritizing the most
    critical ones for immediate analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 'To illustrate these concepts, let’s consider three detailed case studies: the
    Titanic disaster analysis, San Francisco Airport survey, and the Small Business
    Administration loans program. These cases demonstrate the practical application
    of question framing techniques across diverse business scenarios, from historical
    event analysis to contemporary business performance evaluation and public policy
    assessment.'
  prefs: []
  type: TYPE_NORMAL
- en: Throughout the chapter, we emphasize the critical role of well-framed analytical
    questions in driving effective data analysis. By mastering the art of question
    framing, analysts can ensure their work is closely aligned with organizational
    goals, maximizes the value of the available data, and provides actionable insights
    for decision-makers.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter lays the foundation for the analytical techniques and methodologies
    explored in subsequent chapters, underscoring the principle that the quality of
    analysis is fundamentally dependent on the quality of the questions asked. As
    we progress through this text, readers will gain a deeper appreciation for how
    well-framed questions guide the selection of appropriate analytical tools and
    shape the interpretation of results in the context of business decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Framing Analytical Questions
  prefs: []
  type: TYPE_NORMAL
- en: 'The CRISP-DM (Cross Industry Standard Process for Data Mining) reference model
    is a useful and practical process for any data mining project. The model was developed
    by the CRISP-DM consortium (CRISP-DM99). The first step in the process is to ascertain
    and document a business understanding of the problem to be analyzed. Wirth and
    Hipp (2000), two of the project originators, summarized the method as follows:
    “This initial phase focuses on understanding the project objectives and requirements
    from a business perspective and then converting this knowledge into a data mining
    problem definition, and a preliminary project plan designed to achieve the objectives.”'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 2.1 The CRISP-DM model and framing analytical questions
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we take a practical approach to uncovering the business needs
    behind an analytics project. It emphasizes the importance of formulating well-framed
    analytical questions as a critical step in this process. The exercises included
    in this chapter are designed to help readers develop the skills necessary to ensure
    that their analytics projects are driven by the needs of the business.
  prefs: []
  type: TYPE_NORMAL
- en: The World of the Business Data Analyst
  prefs: []
  type: TYPE_NORMAL
- en: Data analysis in a business context supports business decision-making. To be
    useful, data analysis must be driven by well-framed analytical questions. There
    is a well-developed process for creating well-framed questions. It is a fundamental
    task of the data analyst to translate the organization’s information needs into
    computable framed questions, which they then seek to answer. With their expertise
    in analysis, knowing what can be done, and knowing what the results might look
    like after analysis, the data analyst is the best-placed person to create computable
    tasks based upon information needs. Information needs are those questions formulated
    by business managers and staff who require the facts to make decisions. Framed
    questions are the products of an analyst as they translate the information needs
    into computable queries. [Figure 2.2](#fig2-2) shows some of the steps followed
    by the business data analyst to present the results of their investigations.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg19.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'FIGURE 2.2 The world of the analyst: the process of business information needs
    analysis'
  prefs: []
  type: TYPE_NORMAL
- en: 'Although the diagram shows the business information needs following the context
    step, ascertaining the information need is usually the first step. An executive,
    a manager, or a fellow staff member approaches the business analyst with an information
    request to discover the answer to some pressing business issues. That request,
    called the business information need, is often expressed in nebulous terms: “Are
    we profitable this month?;” “Why do you think shipments have been late in the
    past six months?;” or “Are we over budget?”'
  prefs: []
  type: TYPE_NORMAL
- en: The analyst cannot give an immediate answer. Those questions are not posed in
    ways in which they can be immediately computed. Thus, the analyst must translate
    the need into questions that can be used in the computation. These we term framed
    analytical questions.
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition, it is the analyst’s responsibility to investigate the business
    context driving the information need. They must do some additional work. That
    way, when answering the framed analytical questions, they go beyond the immediate
    need and provide support for the underlying context driving the need. As a result,
    besides creating analytical questions, the analyst must look back to the context
    behind the questions and analyze them to address the business issues that motivated
    the information need. The context has to do with the industry the business is
    in, the business model the company is using, and the current status of the KPIs
    driving management of the organization. The process of thinking through all the
    elements to arrive at the point of framing questions is presented rather well
    by Max Shron in his book, Thinking with Data (2014). He presents the CoNVO model:
    (Co) context, (N) information need, (V) vision for the solution including the
    framed questions, and the (O) outcome. We use some of his observations and process
    model here.'
  prefs: []
  type: TYPE_NORMAL
- en: How Does Data Analysis Relate to Business Decision-Making?
  prefs: []
  type: TYPE_NORMAL
- en: 'We answer framed analytical questions by applying analytical techniques to
    the datasets that we collect and shape. Applying the analysis to the data yields
    information: we, as analysts, become informed. At the end of our analysis process,
    we become subject matter experts (SMEs) on that business issue, the most informed
    person on the topic at the moment. We communicate our findings as facts and conclusions
    and perhaps venture some recommendations to our colleagues and managers. Using
    our findings, they are then in the best position to take action (make decisions):
    they know what is to be done. So, the data, upon analysis, becomes information
    (we become informed), which then becomes the basis of knowledge (knowing what
    to do). As data analysts, it is our task to convert data into information and
    offer the resulting facts to our business colleagues for decision-making. [Figure
    2.3](#fig2-3) describes this process in detail.'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg21.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 2.3 The data-driven decision-making process
  prefs: []
  type: TYPE_NORMAL
- en: How Do We Frame Analytical Questions?
  prefs: []
  type: TYPE_NORMAL
- en: 'Translating a nebulous (probably not too well-formed) information need into
    a computable, well-framed set of questions is a critical step for the analyst.
    One of the “raw materials” of the analysis process is the information need. It
    must be parsed and taken apart word-for-word to derive its actual meaning. From
    that parsing process comes a thorough understanding of what must be computed to
    bring back a good answer. In the parsing process, the analyst asks each element
    of the information request: “What does this mean?” We are seeking definition and
    clarity. The answers also yield an understanding of the elements of the data that
    will need to be collected.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The parsing process brings an understanding of the other elements of the analysis:'
  prefs: []
  type: TYPE_NORMAL
- en: '**a.**What is the population (rows of our data table) that needs to be studied?'
  prefs: []
  type: TYPE_NORMAL
- en: '**b.**What variables or features of the population (columns) must populate
    the database to be collected?'
  prefs: []
  type: TYPE_NORMAL
- en: '**c.**Most importantly, what computations will be needed to use these variables
    (the framed questions)?'
  prefs: []
  type: TYPE_NORMAL
- en: As the analyst begins to understand the meaning of the elements of the request,
    questions form that need to be answered in the analysis process. The quantitative
    questions (what, who, how much, and when) will yield to the analysis tools at
    the command of the analyst. These are questions that can be answered by tabulating
    categorical variables or applying mathematical tools to the numerical variables.
    At this point, depending on how versed the analyst is on machine learning and
    other data science tools, they can formulate an approach to answering the question
    with more sophisticated tools. These become the framed analytical questions.
  prefs: []
  type: TYPE_NORMAL
- en: At this stage, generating as many computable questions as possible yields the
    best results. In brainstorming, we perform a divergent exercise of collecting
    all possible questions we wish to know. Then, before starting the analysis, we
    perform the convergent exercise of prioritizing the brainstormed questions, looking
    for the most important ones are to be tackled first. It often happens that as
    the analysis work progresses, new vital framed questions are discovered and may
    be added to the work. Therefore, the initial set of framed questions does not
    need to be complete. Even so, care must be taken to start with a reasonably good
    set of framed questions.
  prefs: []
  type: TYPE_NORMAL
- en: What are the Characteristics of Well-framed Analytical Questions?
  prefs: []
  type: TYPE_NORMAL
- en: 'Well-framed analytical questions exhibit the same characteristics we have come
    to associate with well-framed goals and objectives: they must be SMART. Generally,
    SMART goals and objectives are'
  prefs: []
  type: TYPE_NORMAL
- en: '| • Specific | Target a specific area for improvement or goal to be achieved.
    |'
  prefs: []
  type: TYPE_TB
- en: '| • Measurable | Quantify or at least suggest an indicator of progress toward
    that Goal. |'
  prefs: []
  type: TYPE_TB
- en: '| • Assignable | Specify who will do it and who is involved. |'
  prefs: []
  type: TYPE_TB
- en: '| • Realistic | State what results can realistically be achieved, given the
    available resources. |'
  prefs: []
  type: TYPE_TB
- en: '| • Time-related | Specify when the result(s) can be achieved. |'
  prefs: []
  type: TYPE_TB
- en: 'When applied to framing analytical questions, the concepts translate as (see
    [Figure 2.4](#fig2-4)) follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '| • Specific | The framed question must be focused and detailed. |'
  prefs: []
  type: TYPE_TB
- en: '| • Measurable | The framed question must be computable. |'
  prefs: []
  type: TYPE_TB
- en: '| • Attainable | The framed question must be able to be answered by the techniques
    known to the analyst who will do the analysis. |'
  prefs: []
  type: TYPE_TB
- en: '| • Relevant | The answers to the framed question must apply to the business.
    |'
  prefs: []
  type: TYPE_TB
- en: '| • Time-related | Some elements of time should be considered in the analysis.
    |'
  prefs: []
  type: TYPE_TB
- en: '![image](images/pg23.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 2.4 SMART well-framed analytical questions
  prefs: []
  type: TYPE_NORMAL
- en: Information needs are often described in vague and non-specific terms. As a
    result, these information needs do not always align with the SMART criteria. While
    some information needs are specific and can be addressed without further analysis,
    in most cases, more specific framing is necessary.
  prefs: []
  type: TYPE_NORMAL
- en: The best way to learn is to practice. In the exercise below, we go through the
    major steps outlined above applied to a classic situation. We want to know if
    the law of the sea was followed by the seamen on the Titanic in response to the
    sinking disaster.
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 2.1: Framed Questions About the Titanic Disaster'
  prefs: []
  type: TYPE_NORMAL
- en: The Case
  prefs: []
  type: TYPE_NORMAL
- en: 'Imagine that you work for a famous newspaper. Your supervisor is the news editor
    of the newspaper. It is almost the one-hundredth anniversary of the Titanic disaster.
    The editor assigned a reporter to cover the story. The reporter submitted an article
    that states, “the crew of the Titanic followed the law of the sea in responding
    to the disaster.” The editor is concerned that this may not be true and assigned
    you to fact-check this item. You decide to approach it from an analytic point
    of view. Your analysis of the assignment should yield the following:'
  prefs: []
  type: TYPE_NORMAL
- en: The Information Need
  prefs: []
  type: TYPE_NORMAL
- en: Did the crew of the Titanic follow the law of the sea in responding to the disaster?
  prefs: []
  type: TYPE_NORMAL
- en: The Context
  prefs: []
  type: TYPE_NORMAL
- en: You work for a newspaper; it prints articles of interest to the general public
    as the end result of its business processes; its revenue sources are subscription
    fees, but mostly advertising revenue.
  prefs: []
  type: TYPE_NORMAL
- en: The KPI and Performance Gaps
  prefs: []
  type: TYPE_NORMAL
- en: The editor is concerned that the articles in the newspaper be as truthful as
    possible, which is why there is such emphasis on fact-checking. There is a concern
    that the public trusts the paper to publish truthful information, or there will
    be a loss of readership, resulting in a reduction in subscriptions, but more importantly,
    a potential loss in advertising revenue.
  prefs: []
  type: TYPE_NORMAL
- en: Parsing the Information Need
  prefs: []
  type: TYPE_NORMAL
- en: 'To translate the information needed above into framed computable questions,
    we need to ascertain the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**a.**What do we mean by “the crew?” Who are these people? What was their mindset
    at the time they had to make decisions on who to put on the lifeboats?'
  prefs: []
  type: TYPE_NORMAL
- en: '**b.**What does it mean for the crew to “follow the law of the sea?”'
  prefs: []
  type: TYPE_NORMAL
- en: '**c.**What is “the law of the sea?”'
  prefs: []
  type: TYPE_NORMAL
- en: '**d.**What do we mean by responding? When we say responding to the disaster,
    what does the response look like? What were the actions taken by the crew in response
    to the disaster?'
  prefs: []
  type: TYPE_NORMAL
- en: '**e.**What is “the disaster?” Was it when the iceberg struck? Was it when the
    crew realized the ship was going to sink? Was it when the boat sank, and lifeboats
    were away?'
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 2.5](#fig2-5) describes the parsing process.'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg25.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 2.5 Parsing the request develops framed analytical questions.
  prefs: []
  type: TYPE_NORMAL
- en: By researching the story, we determined that the crew assigned to each lifeboat
    were the gatekeepers on who boarded the lifeboats. We found they were ordinary
    seamen assigned by their officers to serve as gatekeepers to the lifeboats. Since
    there were not enough boats for everybody on the Titanic, this decision-making
    needed to be performed by the crew. The decision probably followed the well-known
    “law of the sea,” meaning “women and children first.” The seamen were charged
    with filling the boats with women and children before any men got aboard. Did
    that happen? If you find a positive answer, then we can tell the editor the reporter
    is truthful in the story. The facts will either support the decision to run the
    story as is or to change it before it prints.
  prefs: []
  type: TYPE_NORMAL
- en: The Dataset
  prefs: []
  type: TYPE_NORMAL
- en: The critical dataset for our purposes is the Titanic’s passenger manifest ([https://public.opendatasoft.com/explore/embed/dataset/titanic-passengers/table/](https://public.opendatasoft.com/explore/embed/dataset/titanic-passengers/table/)).
  prefs: []
  type: TYPE_NORMAL
- en: This publicly available dataset shows the 1,309 passengers, their names, ages
    (for some), passenger class, and survival status. These features or variables
    in our dataset should help us form and answer some well-framed questions. A copy
    of the dataset can also be found in the Case Data repository for this book.
  prefs: []
  type: TYPE_NORMAL
- en: 'Knowing all the facts about the information needs and the context that drives
    those needs, we are now prepared to frame some analytical questions and begin
    our analysis. Keep in mind these questions must be SMART: specific, measurable
    (computable), attainable, relevant, and have some time element in them.'
  prefs: []
  type: TYPE_NORMAL
- en: The Framed Analytical Questions
  prefs: []
  type: TYPE_NORMAL
- en: We determined that there are some computations we could undertake that would
    support a positive or negative answer to the information need.
  prefs: []
  type: TYPE_NORMAL
- en: What is the survival rate of women, and how does it compare to the survival
    rate of men?
  prefs: []
  type: TYPE_NORMAL
- en: What is the survival rate of children, and how does it compare to the survival
    rate of adults?
  prefs: []
  type: TYPE_NORMAL
- en: They certainly would give us a powerful indication of whether the crew was following
    the law of the sea. That would be the question our editor was looking to answer.
    But we could find a more valuable answer if we included additional information.
    We could analyze the survival rates for men, women, and children and break those
    rates down by passenger class.
  prefs: []
  type: TYPE_NORMAL
- en: What are the survival rates of men, women, and children broken down by class?
  prefs: []
  type: TYPE_NORMAL
- en: 'The answer to this question might result in useful insights for the editor
    and the reporter, who could add to the story and make it more interesting. For
    example, it could give a competitive edge to the story versus the stories published
    in competing magazines. This is how an analyst adds value to their work: bringing
    back in-depth answers beyond the original information needs and supporting the
    KPIs driving those information needs.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 2.2: The San Francisco Airport Survey'
  prefs: []
  type: TYPE_NORMAL
- en: The Case
  prefs: []
  type: TYPE_NORMAL
- en: The San Francisco airport (SFO) is in the airport operations industry. Its revenues
    come from two categories, which includes (1) aviation-related revenues such as
    airline fees and passenger charges by providing supporting services like baggage
    and cargo handling as well as (2) rental space and non-aviation-related revenues
    such as concession grants, advertising, parking, and retail by providing different
    brands locations and exposure to their potential customers. The pressures that
    such an organization faces mainly come from three different aspects. The first
    challenge is the competitive environment, in which all competitors aim to become
    the leading airline hub in the western region of the US. The second is the challenge
    to reduce costs by improving operation efficiency and increase revenues. Finally,
    SFO should also face the effect of environmental impact, which the company needs
    to meet government regulations and the public’s expectations. SFO’s management
    wants to perform better to survive in the airport industry and to provide the
    company with sustainable competitive advantages.
  prefs: []
  type: TYPE_NORMAL
- en: The Information Need
  prefs: []
  type: TYPE_NORMAL
- en: As expressed by the lead executive (the Chief Marketing Officer, in this case),
    the need is to find out what is keeping them from reaching their number one objective,
    and he also wants a recommendation of what can be done to improve performance.
    The organization has collected a large amount of data with their survey over many
    years, but they do not have a smart way to recognize the key elements that impact
    their performance from their data. With an intelligent analysis, the CMO expects
    their ranking will be number one, and premium passengers will choose them. The
    CMO needs to know the reasons why San Francisco Airport is not the number one
    ranked airport in its class, and he wants to find out what can make San Francisco
    Airport number one. The CMO also wants to know what motivates San Francisco Airport’s
    premium customers, what these premium customers care about, and what they are
    not satisfied with about the airport.
  prefs: []
  type: TYPE_NORMAL
- en: The Context
  prefs: []
  type: TYPE_NORMAL
- en: The San Francisco Airport is not only in the industry of transportation but
    also in the industry of public service. In their sector, although airports have
    some regional monopoly, they still need to compete with other nearby airports
    in many aspects such as more optional airlines, more convenient facilities, and
    better ambiance, to attract more passengers and airline companies to bring them
    more revenue, and that is also the reason that they need to perform better. The
    analyses’ results will be reported to the CMO in the marketing department of San
    Francisco Airport. They are generally trying to achieve to be ranked number one
    by passengers as an International Gateway airport in their class and to be the
    airport of choice for premium passengers. After identifying the context, the project
    is going to do the business analysis to create business answers furthering San
    Francisco Airport to achieve their objectives.
  prefs: []
  type: TYPE_NORMAL
- en: The KPI and Performance Gaps
  prefs: []
  type: TYPE_NORMAL
- en: The key performance indicators (KPIs) are the San Francisco Airport ranking
    in the ASQ survey (SFO 2018), sales revenue per customer, customer retention,
    customer satisfaction, and customer loyalty. The organization’s goals are (1)
    to be ranked “No. 1” by passengers as an International Gateway airport in their
    class and (2) to be the airport of choice for premium passengers. The gaps are
    (1) SFO is not ranked as “No. 1” in the ASQ survey in the most recent year and
    what to do to improve their ranking to be first; and (2) to find out what shows
    improvement year over year. Therefore, the SFO CMO has a considerable need for
    improvement to raise the ranking among airports and satisfy their premium customers.
  prefs: []
  type: TYPE_NORMAL
- en: The Initial Set of Framed Analytical Questions
  prefs: []
  type: TYPE_NORMAL
- en: Among all the rating questions, which have the strongest impact on passenger
    satisfaction of SFO airport as a whole in the most recent survey?
  prefs: []
  type: TYPE_NORMAL
- en: Which elements have the most significant impact on customer satisfaction as
    in the question “How would you rate the airport as a whole” in the most recent
    survey?
  prefs: []
  type: TYPE_NORMAL
- en: Which factor tells us of the most complaints from customers and measure the
    most significant performance gap which we need to improve year over year?
  prefs: []
  type: TYPE_NORMAL
- en: What are the characteristics (both demographic and psychographic) of our premium
    customers (defined by people who fly 100,000 miles or more per year) year over
    year?
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 2.3: Small Business Administration Loans'
  prefs: []
  type: TYPE_NORMAL
- en: The Case
  prefs: []
  type: TYPE_NORMAL
- en: This case aims to study whether the current SBA policies and plans for its loan
    program plan are effective in macroeconomic and microeconomic terms. As one specific
    government intervention aimed at improving small firms’ access to credit, the
    Small Business Administration (SBA) guaranteed lending program is one such program.
    SBA loan guarantees are well established, and their volume has grown significantly
    over the past two decades.
  prefs: []
  type: TYPE_NORMAL
- en: The Context
  prefs: []
  type: TYPE_NORMAL
- en: Increasingly, policymakers are looking to the small business sector as a potential
    engine of economic growth. Policies to promote small businesses include tax relief,
    direct and indirect subsidies through government lending programs. Encouraging
    lending to small businesses is the primary policy objective of the Small Business
    Administration (SBA) loan-guarantee program.
  prefs: []
  type: TYPE_NORMAL
- en: In the past 20 years, small businesses have created more than two-thirds of
    new jobs in the United States. Twenty-eight million small businesses have employed
    60 million Americans, accounting for 50% of the workforce in the private sector.
    It is worth noting that the Small Business Administration (SBA) has played a significant,
    positive role in the innovation and entrepreneurship of small businesses in the
    United States, providing a large number of loans, financing guarantees, government
    procurement services, business consulting services, and many other services. Among
    the various forms of services provided by the SBA, its SME credit financing service
    is the most successful service model, with rich practical experience. By analyzing
    the practice of the US SBA in promoting credit financing for small enterprises,
    it provides the government with experience and reference in promoting the development
    of SMEs’ innovation and entrepreneurship.
  prefs: []
  type: TYPE_NORMAL
- en: Why is this analysis critical?
  prefs: []
  type: TYPE_NORMAL
- en: Modern market economy countries, such as the US, are constantly reexamining
    their strategic positioning of small businesses and their impact on the national
    economy and social development. Modern market economy countries generally pay
    more attention to the social value of small businesses and realize their irreplaceable
    decisive significance in promoting economic development, creating employment opportunities,
    maintaining social stability, and enhancing national competitiveness. As a significant
    economic competitor, China also is constantly evaluating the social value, and
    the strategic significance of small businesses needs to be further promoted to
    advanced their economic development. The US must also be continually reevaluating
    the effectiveness of its government programs as well.
  prefs: []
  type: TYPE_NORMAL
- en: The Information Need
  prefs: []
  type: TYPE_NORMAL
- en: This case aims to study whether the current SBA policies and plans for its loan
    program plan are effective in macroeconomic and microeconomic terms. As one specific
    government intervention aimed at improving small firms’ access to credit, the
    Small Business Administration (SBA) guaranteed lending program is one such program.
    SBA loan guarantees are well established, and their volume has grown significantly
    over the past two decades.
  prefs: []
  type: TYPE_NORMAL
- en: Nearly 20 million small businesses have received direct or indirect help from
    one or another of the SBA’s programs since 1953\. As of 2020, the SBA’s current
    business loan portfolio of roughly 219,000 loans is worth more than $45 billion,
    making it the largest single financial backer of small businesses in the United
    States. Over the period 1991 to 2000, the SBA assisted almost 435,000 small businesses
    in obtaining more than $94.6 billion in loans, more than in the entire history
    of the agency before 1991\. No other lender in this country has been responsible
    for as much small business financing as the SBA has during that time (SBA 2022).
  prefs: []
  type: TYPE_NORMAL
- en: These lending numbers are remarkable when one considers that SBA loan guarantees
    are aimed at that segment of small business borrowers that presumably would not
    otherwise have access to credit. Is there a market failure that justifies the
    intervention of this magnitude? Many economists believe that credit markets—whose
    efficient operation depends so heavily on the ease with which lenders can gather
    information on borrowers—are indeed prone to failure when the nature of the borrowers
    makes it hard to obtain this information, as is the case with small businesses.
    To know how well the SBA lending program is addressing that failure (and doing
    so with no adverse side effects), we also have to be sure we know what the mechanics
    of the failure are and ask whether the program is designed to target only those
    areas where the breakdown in natural market forces arises.
  prefs: []
  type: TYPE_NORMAL
- en: The KPIs and the Gap
  prefs: []
  type: TYPE_NORMAL
- en: Has the SBA small business loan program been successful? A particular area of
    concern for policymakers is whether small businesses have access to adequate credit.
    Growing businesses have an acute need for credit, but many small firms may have
    a difficult time obtaining it because they are young and have little or no credit
    history. Lenders may also be reluctant to fund small firms with new and innovative
    products because of the difficulty associated with evaluating the risk of such
    products. If small businesses lack a sufficient supply of credit, policymakers
    should be concerned, for the next Google, Microsoft, or Starbucks might wither
    on the vine for want of funding. To the extent that some market failure significantly
    impairs the access small businesses have to credit, a rationale exists for supporting
    these businesses through government programs aimed at improving their access.
    We need to use historical data to study whether the implementation of this program
    is the same as its original intention.
  prefs: []
  type: TYPE_NORMAL
- en: The Initial Set of Framed Analytical Questions
  prefs: []
  type: TYPE_NORMAL
- en: 'The study will attempt to answer the following business information question:
    Has the SBA small business loan program been successful? To judge whether this
    program is successful, we choose a series of quantifying measurable indicators
    and associated framed questions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Aiming at the goal of (in the words of the SBA) “strengthening cooperation
    with the federal government to ensure that the target share of the federal government
    procurement contract is reached and exceeded, so as to increase the opportunities
    of small businesses, and to strengthen the fairness of the federal procurement
    contract certification process and data” (SBA 2022), we can pose the following
    framed question:'
  prefs: []
  type: TYPE_NORMAL
- en: Was this a specific, measurable indicator of whether the contract share of small
    businesses in government procurement reached the statutory goal set by the federal
    government?
  prefs: []
  type: TYPE_NORMAL
- en: 'Another important measurable goal of this program is “to increase the investment
    in education, consultation, and training resources of the Small Business Administration,
    and to help new small businesses and support existing small businesses. Focusing
    on core program resources to meet the needs of ordinary small enterprises and
    high-growth small businesses” (SBA 2022), we can ask:'
  prefs: []
  type: TYPE_NORMAL
- en: Were the specific, measurable goals of supporting the need to establish a required
    minimum number of small businesses met?
  prefs: []
  type: TYPE_NORMAL
- en: Given the goal set by the SBA to “ensure that disaster assistance provided by
    the Small Business Administration to enterprises, non-profit organizations, property
    owners and lessees quickly, effectively and efficiently, in order to maintain
    employment opportunities and help small businesses resume production and operation”
    (SBA 2022), the specific, measurable indicators are the proportion of household
    loans and corporate loans meet the statutory standards of loan operation.
  prefs: []
  type: TYPE_NORMAL
- en: Did the SBA meet the goal of the statutory requirements set by the government
    for the agency?
  prefs: []
  type: TYPE_NORMAL
- en: Aiming at the goal of “strengthening the connection between the Small Business
    Administration and high-growth small businesses and entrepreneurs through existing
    projects and job innovation, to drive innovation and create job opportunities
    more effectively” (SBA 2022), the specific, measurable indicators are the investment
    of long-term capital.
  prefs: []
  type: TYPE_NORMAL
- en: Did the SBA meet its goal of issuing a sizable portion of its loans to high-growth
    technology-intensive businesses?
  prefs: []
  type: TYPE_NORMAL
- en: The Small Business Administration (SBA) has set a goal to guide federal agencies
    in understanding the adverse effects of various unreasonable management regulations
    on small enterprises, reducing the burden on small enterprises, enhancing research
    on small enterprises, and creating a favorable enterprise environment (SBA 2022).
    The measurable indicators include the costs of various management systems for
    small businesses.
  prefs: []
  type: TYPE_NORMAL
- en: Were the costs of management systems within reach of small businesses served
    by the SBA?
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs: []
  type: TYPE_NORMAL
- en: 'CRISP-DM Consortium. (1999). CRISP-DM 1.0: Step-by-step data mining guide.
    Retrieved from [http://www.crisp-dm.org/](http://www.crisp-dm.org/).'
  prefs: []
  type: TYPE_NORMAL
- en: San Francisco Airport (2018). Customer Survey Data-2010 Annual Customer Satisfaction
    Survey, [https://www.flysfo.com/media/customer-survey-data](https://www.flysfo.com/media/customer-survey-data)
  prefs: []
  type: TYPE_NORMAL
- en: 'Shron, M. (2014). Thinking with data: How to turn information into insights.
    O’Reilly Media.'
  prefs: []
  type: TYPE_NORMAL
- en: U.S. Small Business Administration (2022). Office of Advocacy, Fiscal Year 2022
    Congressional Budget Justification, and Fiscal Year 2020 Annual Performance Report
  prefs: []
  type: TYPE_NORMAL
- en: 'Wirth, Rüdiger, and Jochen Hipp. “CRISP-DM: Towards a standard process model
    for data mining.” In Proceedings of the 4th International Conference on the Practical
    Applications of Knowledge Discovery and Data Mining, vol. 1\. London, UK: Springer-Verlag,
    2000.'
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER 3
  prefs: []
  type: TYPE_NORMAL
- en: DATA PREPARATION
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg35.jpg)'
  prefs: []
  type: TYPE_IMG
- en: In business analytics, the adage “garbage in, garbage out” holds particularly
    true. This chapter delves into the critical, yet often underappreciated, process
    of data preparation, which is a fundamental step that affects the success of any
    analytical endeavor. Effectively using raw data to obtain actionable insights
    involves meticulous cleaning, shaping, and transformation efforts.
  prefs: []
  type: TYPE_NORMAL
- en: Data preparation, while time-consuming, is an indispensable phase in the analytical
    process. Studies have shown that data scientists and analysts spend up to 80%
    of their time on data preparation tasks. This chapter aims to equip readers with
    the knowledge and skills to navigate this crucial stage efficiently and effectively.
  prefs: []
  type: TYPE_NORMAL
- en: We begin by introducing the concept of the flat-file format, a simple yet powerful
    structure for organizing data. This format, characterized by its tabular nature
    with clearly defined rows and columns, serves as the foundation for most analytical
    processes. We discuss why this format is preferred and how to transform various
    data sources into this standardized structure.
  prefs: []
  type: TYPE_NORMAL
- en: We then explore the diverse landscape of data sources and formats that analysts
    encounter in real-world scenarios. From numerical and categorical data to more
    complex text data, we examine the characteristics and challenges associated with
    each type. Understanding these distinctions is crucial for applying appropriate
    cleaning and shaping techniques.
  prefs: []
  type: TYPE_NORMAL
- en: A significant portion of the chapter is dedicated to practical exercises that
    simulate real-world data preparation challenges. In Analysis Case 3.1, we examine
    the task of reshaping a complex budget report into a flat-file format suitable
    for pivot table analysis. This exercise not only demonstrates the transformation
    process but also highlights how proper data preparation can uncover errors in
    original reports, emphasizing the value of this often-overlooked step.
  prefs: []
  type: TYPE_NORMAL
- en: Analysis Case 3.2 focuses on cleaning a dataset from a drug manufacturer’s test.
    This exercise showcases common data cleaning tasks such as correcting transcription
    errors, dealing with missing values, and ensuring data consistency. It shows the
    importance of data dictionaries and the need for careful validation of cleaned
    data.
  prefs: []
  type: TYPE_NORMAL
- en: We then progress to more advanced data preparation techniques with two substantial
    case studies. Analysis Case 3.3 deals with cleaning and shaping the San Francisco
    Airport (SFO) Survey dataset, illustrating how to handle large-scale categorical
    data and remove meaningless entries to improve analysis quality.
  prefs: []
  type: TYPE_NORMAL
- en: Analysis Case 3.4 introduces the use of R for data preparation, focusing on
    the Small Business Administration (SBA) Loans dataset. This case study demonstrates
    how to leverage programming tools for efficient data manipulation, including creating
    new variables, binning data, and handling dates—skills that are invaluable when
    dealing with large datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout these exercises, we emphasize the iterative nature of data preparation.
    It is a process that requires patience, attention to detail, and often multiple
    rounds of cleaning and validation. We also stress the importance of understanding
    the business context behind the data, as this knowledge guides decision-making
    throughout the preparation process.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, readers will understand data preparation is not
    just a preliminary step, but an integral part of the analytical process. The skills
    acquired here lay the foundation for all subsequent analyses, ensuring that the
    insights derived are based on clean, well-structured data. As we progress through
    the book, the importance of these data preparation techniques will become increasingly
    evident, reinforcing the notion that mastery of these skills is essential for
    any aspiring business analyst.
  prefs: []
  type: TYPE_NORMAL
- en: Data Preparation
  prefs: []
  type: TYPE_NORMAL
- en: Steps in Preparing the Data Set for Analysis
  prefs: []
  type: TYPE_NORMAL
- en: In the first set of exercises, we consider the importance of shaping and cleaning
    data files. [Figure 3.1](#fig3-1) shows the Data Cleansing Cycle with many activities
    needed to prepare data for analysis, starting with importing the data, merging
    the datasets, standardizing and normalizing data, rebuilding missing data, de-duplicating,
    and verifying and enriching the dataset. The object is to produce a dataset in
    Excel in the flat-file format. When expressed in that format, the first row of
    the table must contain all the variable names; every row is of the same nature,
    and there are no empty rows or columns. All other rows and columns outside of
    the table area should be clear of data. Once in that format, the table is ready
    for analysis, and we can safely apply many of Excel’s analytic tools.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg38.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.1 The Data Cleansing Cycle
  prefs: []
  type: TYPE_NORMAL
- en: The data source varies; sometimes, we extract it from a DBMS using SQL queries.
    Other times, we may obtain a comma-separated values file (with a .CSV extension),
    or we may obtain a formatted text file (with a .TXT extension). Many datasets
    are scraped from HMTL-formatted Web pages.
  prefs: []
  type: TYPE_NORMAL
- en: Once we practice loading data in various formats, we explore cleaning it in
    Exercise 3.1\. We practice using a small data file that contains several errors
    that need to be corrected. You are then directed to the original data to find
    the original values. The exercise allows you to exercise many tools in Excel that
    make the data cleaning process efficient.
  prefs: []
  type: TYPE_NORMAL
- en: The whole process of scraping, uploading, cleaning, annotating, and shaping
    the data file is called data wrangling. Many studies have shown that this process
    is tedious and can take up to 80% of the overall time needed to perform the analysis.
    However, it is critical for success in data analysis. The more skilled you are
    in the use of cleaning and shaping tools, and the wiser you are in their use,
    the sooner you start the analysis and the less time you need to find answers.
  prefs: []
  type: TYPE_NORMAL
- en: Data Sources and Formats
  prefs: []
  type: TYPE_NORMAL
- en: Analysts must deal with many different data sources and formats. The various
    data variable types are shown in [Figure 3.2](#fig3-2). The most common types
    of data for business transactions are numeric and categorical. Computerized data
    is first collected and then stored to analyze financial transactions. The emphasis
    in the analysis is often on summarizing numeric data, which can easily be done
    with basic mathematical formulas such as average, sum, maximum, and minimum. Summarizing
    categorical data used to be complicated. Initially, analysts could only tabulate
    categorical data, counting the occurrence of each category. It was not until the
    advent of the Excel pivot table tool that evaluating categorical data in detail
    became as easy and commonplace as analyzing numerical data.
  prefs: []
  type: TYPE_NORMAL
- en: Text data is much more complex to evaluate. It requires us to count words, but
    much of the work also requires tabulation and quantization by hand. We leave working
    with text data to more advanced texts.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg39.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.2 Categorizing the two types of data formats and four variable types
  prefs: []
  type: TYPE_NORMAL
- en: Numerical and categorical data are the most common data types, as shown in [Figure
    3.4](#fig3-4). We use standard techniques to work with these data types, such
    as pivot tables and numerical summarization functions. With the advent of social
    networks and sophisticated data tools, text data analysis is now more abundant
    and its analysis more commonplace.
  prefs: []
  type: TYPE_NORMAL
- en: It is essential to know where data can be found and in what form it exists in
    order to optimize the scraping and shaping process to ultimately produce it in
    the right format for analysis. In this chapter, we discuss the various forms in
    which we receive data.
  prefs: []
  type: TYPE_NORMAL
- en: What is Data Shaping?
  prefs: []
  type: TYPE_NORMAL
- en: Data comes to us in many shapes and sizes, as we saw in the previous chapter.
    For most of our analytical tools, the data should be in a tabular format. Shaping
    the dataset entails transforming it from whatever shape the data is acquired in
    (such as a report, an SQL query output, a CSV file, or an Excel file) into the
    proper format ready for analysis with our tools.
  prefs: []
  type: TYPE_NORMAL
- en: Data analysts spend large portion of their time cleaning and shaping the dataset.
    A survey conducted by the data science company Crowdflower in 2016 shows the breakdown
    in tasks and the time needed to complete each ([Figure 3.3](#fig3-3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg40.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.3 Typical proportions for cleaning, shaping, and analysis (Crowdflower
    16)
  prefs: []
  type: TYPE_NORMAL
- en: The Flat-File Format
  prefs: []
  type: TYPE_NORMAL
- en: Storing data in a simple structure of rows and columns is common today, often
    done with an Excel spreadsheet. This format has many limitations that may be overcome
    with sophisticated data structures, such as an RDBMS, including indexing, the
    economy of storage, easier retrieval, and additional massive datasets. Corporate
    data may sometimes be found stored using these more complex systems, but to use
    the data to answer questions, we extract the data from these complex systems and
    present it to the analyst in the simple form of a flat-file of rows and columns.
  prefs: []
  type: TYPE_NORMAL
- en: A flat-file can also be considered a database, albeit a simple one, with data
    stored uniformly. Records (the rows) follow a consistent format, and there are
    no structures for indexing or recognizing relationships between records. Column
    names are often the named variables. A flat-file can be a plain text file or a
    binary file. Relationships may be inferred from the data in the file, but the
    table format itself does not make those relationships explicit. In a flat-file,
    all the rows are about the same population, such as orders, customers, patients,
    companies, or payments.
  prefs: []
  type: TYPE_NORMAL
- en: We often use spreadsheets as a database or as a container for data. We usually
    load these spreadsheets with many non-data elements that are not useful for data
    analysis. For example, a particular spreadsheet may be a report with titles, page
    numbers, and the coloring of specific cells to make it easier for humans to read
    and interpret the information. Some of this is metadata (data about the dataset),
    such as a data dictionary. To make the analysis more straightforward, we need
    to remove all of these human interface elements from the spreadsheet and format
    the remaining data into a row and column format. Some summarization tools in spreadsheets,
    such as the pivot table tool, require us to format the file this way.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, programming languages for analysis such as R, readily ingest data
    in this form. In R, we refer to this format of data as dataframes. In most cases,
    the flat-file format is a convenient structure for analysis. [Figure 3.4](#fig3-4)
    shows a spreadsheet in the flat-file format.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg42_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.4 The flat-file format showing the elements of the rows and columns
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg42_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.5 The elements of a flat-file
  prefs: []
  type: TYPE_NORMAL
- en: Before applying an analysis tool to a file, always ask “Is this dataset in a
    flat-file format?” Shaping the dataset into a flat-file results in a tabular format,
    with each variable in a column and the top row of the table containing the variable
    names. Each row of the table is an instantiation for the population being documented.
    [Figure 3.5](#fig3-5) is an excellent example of a table in such a format.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider the table given in [Figure 3.6](#fig3-6).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg43.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.6 A data file not in the flat-file format
  prefs: []
  type: TYPE_NORMAL
- en: Apply the flat-file format criteria to the table. Is this table in a flat-file
    format? The obvious answer is no. Excel can handle this data format, and a great
    deal of analysis can be performed in Excel on the dataset as is, but most analysis
    programs will not accept the data as it is. In [Figure 3.6](#fig3-6), we see two
    variables in the dataset. One variable is the type of store that was being started,
    and the other variable is the starting capital needed to open that type of store.
    One variable is categorical; the other variable is numerical. In reality, there
    should be a two-column, or two-variable, table with each row of the table being
    a particular store type needing individual capital cost datasets. We might even
    add a third variable with a unique identifier to each row or observation, but
    it is not necessary to do so. It would require significant data shaping to put
    the data from this table into a flat-file format so it can be uploaded to an analysis
    platform other than Excel.
  prefs: []
  type: TYPE_NORMAL
- en: In the next two exercises, we show approaches to shape the data file into a
    flat-file format and how to remove errors from a data file.
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 3.1: Shaping the Data File'
  prefs: []
  type: TYPE_NORMAL
- en: Often, we either cause a program to produce a report or receive a report file
    electronically from coworkers that was produced by report writers in data processing
    systems or as a result of their own analysis in Excel. If the data is already
    in tabular form, shaping the dataset into a flat-file is relatively straightforward.
    If the data has been shaped into a reporting format that is more complex, we must
    perform extensive work.
  prefs: []
  type: TYPE_NORMAL
- en: Take, for example, a proposed yearly departmental budget broken down by month,
    as shown in [Figure 3.7](#fig3-7). The data file may be found in the Case Data
    store of files that accompanies this book. Open the Data Cleaning and Shaping
    Exercise – Budget Report.xlxs file.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg45_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.7 A typical departmental budget proposal in report format
  prefs: []
  type: TYPE_NORMAL
- en: Let’s assume your supervisor received this budget proposal as an Excel file
    (with no data table to support it). Your supervisor asked if you could generate
    a report of expense types broken down by cost types, similar to what is shown
    in [Figure 3.8](#fig3-8). That can easily be generated by a pivot table in Excel
    but not from the existing data format.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg45_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.8 Required report of expenses by cost types
  prefs: []
  type: TYPE_NORMAL
- en: The original table that created this budget report may be extracted from the
    formatted budget report by taking each number from the budget report and creating
    the flat-file by hand. Or, by clever manipulation, you can extract the main data
    points from the original table and create a flat-file from which many questions
    can be answered by further analysis, including the results produced in [Figure
    3.8](#fig3-8). We need to shape the data.
  prefs: []
  type: TYPE_NORMAL
- en: If you look carefully and analyze the table, you notice that there are four
    variables of interest in that table. Everything else is summaries or title cells.
    We also do not need the coloring of the cells, which is not required for a machine
    to process the data. The four variables are Month, Expense Type, Cost Type, and
    Amount.
  prefs: []
  type: TYPE_NORMAL
- en: Starting with the given budget table ([Figure 3.7](#fig3-7)), we copy and paste
    (values only) the entire table into another worksheet. Delete all summary rows
    and columns and the cells with titles to leave behind the data, as shown in [Figure
    3.9](#fig3-9).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg46.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.9 Budget table with only the data elements, without the subtotals and
    labeling components
  prefs: []
  type: TYPE_NORMAL
- en: The table is laid out with the months across the top of the table. The months
    need to be in a column in our flat-file since it is one of the four variables.
    The best way to quickly further transform the table is to copy and paste the transformation
    of the table into another worksheet. [Figure 3.10](#fig3-10) shows the transposed
    table pasted into a new tab of the Excel file.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg47_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.10 The transposed table
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, the hard work begins. Each number in the table has three categorical variables
    associated with it: a month, an expense type, and a cost type. There are monthly
    columns across the table, and they need to be transferred into the four vertical
    columns. The result is one table, shown in [Figure 3.11](#fig3-11), with four
    variables: the month, expense type, cost type, and amount.'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg47_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'FIGURE 3.11 Final flat-file showing the four variables: Month, Expense Type,
    Cost Type, and Amount'
  prefs: []
  type: TYPE_NORMAL
- en: As always, when moving a lot of data, we want to make sure that we do not introduce
    any errors. Thus, we should reproduce the budget report using a pivot table and
    compare it to ensure that we have the same numbers. Once we have the data in a
    flat-file format, creating a summary using a pivot table is a simple matter. We
    can easily recreate the budget report ([Figure 3.7](#fig3-7)) with a pivot table
    shown in [Figure 3.12](#fig3-12) by judicious use of a pivot definition table
    with subcategories, defined in [Figure 3.13](#fig3-13).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg48_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.12 Recreation of the budget report using a pivot table applied to the
    final flat-file
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg48_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.13 The pivot table definition for the budget report recreation
  prefs: []
  type: TYPE_NORMAL
- en: When comparing the pivot table (shown in [Figure 3.12](#fig3-12)) that recreated
    the budget report to the original report we were given (shown in [Figure 3.7](#fig3-7)),
    we notice something very curious. The numbers in row eight of the original report
    do not match the correspondingly computed numbers in our pivot table report. How
    can that be? Which is wrong, the pivot table or the original report?
  prefs: []
  type: TYPE_NORMAL
- en: The individual data points need to be checked. They all seem right; they appear
    to have transferred over properly. Why is there a discrepancy? When you check
    the formulas behind the subtotals in row 8, you notice that whoever created the
    report did not pick up all three rows of cost data above the subtotal to aggregate
    them, but only two of the rows for row 8\. The formulas are correct for all the
    other subtotals, but not for row 8\. The original report was wrong! Once you change
    the formula, the two tables match. You have been able to clean up the original
    report, which, if circulated as is, would have given the wrong budget numbers
    in the proposed budget.
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 3.2: Cleaning the Data File'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s do some additional data cleaning and data shaping work with some data
    files.
  prefs: []
  type: TYPE_NORMAL
- en: A drug manufacturer has collected drug test data on 178 patients. We suspect
    that the data has transcription problems. (There were errors when entering data
    into the computer from the experiment notes.) Before analyzing the dataset, we
    want to make sure it is free of errors. Follow the instructions below to prepare
    the dataset for analysis and use the data from [http://bit.ly/2zoUVqz](http://bit.ly/2zoUVqz).
  prefs: []
  type: TYPE_NORMAL
- en: Copy and paste the data into a new Excel spreadsheet. Note that all the data
    is in one column. The data dictionary is available at [https://bit.ly/2HymiXr](https://bit.ly/2HymiXr).
    Use the “Text to Columns” function under the Data ribbon to distribute the data
    into their respective columns. You may also obtain the data by this other method.
  prefs: []
  type: TYPE_NORMAL
- en: Using the Case Data set find the file calciumgood.txt. The data dictionary for
    this file is calcium.txt. Open calciumgood.txt using Excel. Use the Excel import
    function to import the data file from the Excel Data ribbon set of functions.
  prefs: []
  type: TYPE_NORMAL
- en: The data is in columns, but there are no column titles. Use the data dictionary
    to add column titles, so all the variables are labeled. Note that the file is
    now in a flat-file format with columns as variables and rows as records. Save
    the file as calcium.xlsx.
  prefs: []
  type: TYPE_NORMAL
- en: 'This file contains many errors. Clean it by examining the data and correcting
    the errors. For example, some of the numbers in the SEX column are coded as “22”
    instead of “2.” That can easily corrected. Fixing data coded as “12” is more challenging.
    If you need to refer to the original data that was collected, use this URL to
    access the original observations: [http://academic.csuohio.edu/holcombj/clean/bigtable.htm](http://academic.csuohio.edu/holcombj/clean/bigtable.htm).'
  prefs: []
  type: TYPE_NORMAL
- en: 'When you feel reasonably sure you have a clean data file, use Excel to answer
    the following questions:'
  prefs: []
  type: TYPE_NORMAL
- en: How many men and how many women were in the study? Sort by gender and compute
    a sum for each group.
  prefs: []
  type: TYPE_NORMAL
- en: Were the tests evenly distributed over the labs? Sort by lab type and compute
    subtotals by lab type.
  prefs: []
  type: TYPE_NORMAL
- en: Are the calcium levels for the males above or below the average for the females
    in the test? Sort by gender and use the AVG function to average the CAMMOL columns
    for each sex.
  prefs: []
  type: TYPE_NORMAL
- en: Check your results against the solutions below ([Figure 3.14](#fig3-14)). Keep
    cleaning the data until you have found all the errors.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg51.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.14 Analysis results computed after cleaning the data file
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 3.3: Cleaning and Shaping the SFO Survey Dataset'
  prefs: []
  type: TYPE_NORMAL
- en: To prepare the dataset for further analysis, we need to clean the dataset. We
    should remove all rows that have no impact on the result we are looking for. For
    example, in column Q7ALL, the result 0, 6, or blank are meaningless in our analysis,
    and we should remove those rows. In Excel, we can filter them out using the Filter
    function and delete them. The results are shown in [Figure 3.15](#fig3-15).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg52.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.15 Use the Filter function to filter out meaningless rows
  prefs: []
  type: TYPE_NORMAL
- en: Once you see only the rows that satisfy the specific condition you set, delete
    those cells and obtain a result like that shown in [Figure 3.16](#fig3-16).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg53.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.16 Steps to delete specific cells
  prefs: []
  type: TYPE_NORMAL
- en: Turn off the Filter function, and the remaining rows are the data you want to
    analyze. Similar to Q7ALL, when you analyze Q9ALL and Q10SAFE, you should remove
    cells with 0, 6, or blank to get a more meaningful result.
  prefs: []
  type: TYPE_NORMAL
- en: After removing all meaningless cells, a new sheet will look like that shown
    in [Figure 3.17](#fig3-17).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg54.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.17 Output after cleaning
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 3.4: Shaping the SBA Loans Dataset'
  prefs: []
  type: TYPE_NORMAL
- en: Excel can help analysts clean and shape small datasets; however, when the dataset
    is large, Excel may not be useful. In this case study, we use R to prepare the
    SBA Loans dataset due to the size of the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Import the dataset into RStudio, as shown in [Figures 3.18](#fig3-18) and [3.19](#fig3-19).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg55_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.18 Steps to import the dataset into RStudio
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg55_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.19 Showing the dataset imported in RStudio
  prefs: []
  type: TYPE_NORMAL
- en: We want to know what year each loan was approved. To do so, we can use the following
    code to create a new variable ApprovalYear.
  prefs: []
  type: TYPE_NORMAL
- en: '| SBALaons$ApprovalYear <- as.numeric(format(SBALaons$ApprovalDate, "%Y"))
    |'
  prefs: []
  type: TYPE_TB
- en: We may want to know how many months each loan is used to pay all back. To do
    so, we can use the interval function under package lubridate.
  prefs: []
  type: TYPE_NORMAL
- en: '| install.packages("lubridate")library(lubridate)SBALaons$PaidInFullPeriod
    <-interval(SBALaons$ApprovalDate, SBALaons$PaidInFullDate) %/% months(1) |'
  prefs: []
  type: TYPE_TB
- en: We can also create a new variable, FUNDED, as a substitute for the variable
    LoanStatus for future analysis by assigning “NOT FUNDED” to 0, “PIF” or “CHGOFF”
    to 1, and all others to blank by using the following code.
  prefs: []
  type: TYPE_NORMAL
- en: '| library(dplyr)SBALaons <- SBALaons %>% mutate(FUNDED = case_when(SBALaons$LoanStatus
    == "NOT FUNDED" ~ "0",SBALaons$LoanStatus == "PIF" &#124; LoanStatus == "CHGOFF"
    ~ "1",TRUE ~"Blank")) |'
  prefs: []
  type: TYPE_TB
- en: Like the previous situation, we can bin (make into a binary variable with only
    two values, 0 or 1) the variable LoanStatus to create a new variable PAIDOFF.
  prefs: []
  type: TYPE_NORMAL
- en: '| SBALaons <- SBALaons %>% mutate(PAIDOFF = case_when(SBALaons$LoanStatus ==
    "CHGOFF" ~ "0",SBALaons$LoanStatus == "PIF" ~ "1",TRUE ~"Blank")) |'
  prefs: []
  type: TYPE_TB
- en: The shaped dataset will look like [Figure 3.20](#fig3-20).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg57.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 3.20 Newly created columns by running the given R code scripts
  prefs: []
  type: TYPE_NORMAL
- en: Reference
  prefs: []
  type: TYPE_NORMAL
- en: CrowdFlower. (2016). 2016 data science report. Retrieved from [https://www.crowdflower.com](https://www.crowdflower.com)
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER 4
  prefs: []
  type: TYPE_NORMAL
- en: THE ANALYSIS TOOLS
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg59.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Chapter 4](13_ch04.xhtml) introduces a comprehensive suite of analysis tools
    that assists with data analysis and statistical computing. This chapter serves
    as a guide to understanding, installing, and effectively utilizing these powerful
    tools, catering to analysts with varying levels of expertise and preferences.'
  prefs: []
  type: TYPE_NORMAL
- en: The chapter begins by exploring Microsoft Excel’s Analysis ToolPak, a versatile
    add-in that significantly enhances Excel’s analytical capabilities. We discuss
    the installation process for both Windows and Mac operating systems, demonstrating
    how to activate this powerful extension. The Analysis ToolPak transforms Excel
    from a basic spreadsheet program into a sophisticated platform for statistical
    analysis, offering tools for descriptive statistics, Analysis of Variance (ANOVA),
    and regression analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we consider the R programming language and its user-friendly interface,
    Jamovi. As an open-source alternative to commercial statistical software, Jamovi
    provides a graphical user interface that uses R’s extensive libraries without
    requiring direct coding. We then guide you through the installation process and
    introduce you to Jamovi’s intuitive interface, making advanced statistical techniques
    accessible to a broader audience.
  prefs: []
  type: TYPE_NORMAL
- en: We also explore the use of generative AI and large language models like ChatGPT
    as analysis tools. This section provides a user guide for leveraging these AI
    tools in data analysis, including tips on constructing effective prompts and using
    ChatGPT for specific analytical tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout the chapter, we emphasize the importance of selecting the right tool
    for each analytical task. Excel’s Analysis ToolPak offers accessibility and familiarity
    for many users, while Jamovi provides a bridge to the powerful capabilities of
    R. AI tools like ChatGPT offer new ways to approach data analysis and coding tasks.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, readers will understand these diverse analysis tools,
    their strengths, and how to install and use them effectively. Whether you are
    a beginner just starting out in data analysis or an experienced analyst seeking
    to expand your toolkit, this chapter provides the knowledge and resources to enhance
    your analytical capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: The subsequent sections of the chapter examine each tool in detail, providing
    detailed instructions, practical examples, and tips for maximizing their potential
    in real-world data analysis scenarios. By mastering these tools, analysts can
    manage a wide range of analytical challenges, from basic descriptive statistics
    to complex predictive modeling and machine learning tasks.
  prefs: []
  type: TYPE_NORMAL
- en: The Analysis Tools
  prefs: []
  type: TYPE_NORMAL
- en: The Excel Tools
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft Excel is important in the world of data analysis, offering a versatile
    platform that combines user-friendly interfaces with powerful analytical capabilities.
    While Excel’s basic functionalities are widely known, its advanced features, particularly
    the Analysis ToolPak, make it a comprehensive tool for data professionals.
  prefs: []
  type: TYPE_NORMAL
- en: The Analysis ToolPak transforms Excel from a mere spreadsheet program into a
    sophisticated statistical analysis platform. Once activated through Excel’s add-in
    menu, this powerful extension unlocks a suite of advanced tools that significantly
    enhance Excel’s data analysis capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: With the Analysis ToolPak, users can perform a wide range of statistical analyses
    with ease. It offers tools for descriptive statistics, providing comprehensive
    summaries of data distributions at the click of a button. This feature allows
    analysts to quickly understand the central tendencies, variability, and shape
    of their datasets.
  prefs: []
  type: TYPE_NORMAL
- en: For more advanced statistical work, the ToolPak includes various forms of ANOVA,
    enabling users to compare means across multiple groups and understand the significance
    of differences between them. The regression tools within the ToolPak allow for
    in-depth exploration of relationships between variables, making it invaluable
    for predictive modeling and trend analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, the Analysis ToolPak provides specialized functions for t-tests, Fourier
    analysis, and correlation studies. These features empower users to conduct nuanced
    statistical analyses without the need for more specialized software. The sampling
    tools within the ToolPak also facilitate the creation of random samples, a crucial
    step in many statistical procedures.
  prefs: []
  type: TYPE_NORMAL
- en: By integrating the robust capabilities of the Analysis ToolPak, Excel has become
    a powerhouse for data analysis. It offers a unique blend of accessibility and
    sophistication, making it an indispensable tool for analysts across various fields
    who need to derive meaningful insights from complex datasets. From quick descriptive
    summaries to complex statistical modeling, the Analysis ToolPak extends Excel’s
    functionality to meet the diverse needs of modern data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: The R Analysis Tools
  prefs: []
  type: TYPE_NORMAL
- en: The R programming language has revolutionized the field of statistical computing
    and data analysis since its inception in the 1990s. It is known for its flexibility,
    power, and extensive collection of packages. Because it is open-source, R has
    a vibrant community of contributors, resulting in an ever-expanding library of
    cutting-edge statistical tools and techniques.
  prefs: []
  type: TYPE_NORMAL
- en: R’s strength lies in its comprehensive statistical capabilities, from basic
    descriptive statistics to advanced machine learning algorithms. It excels in data
    manipulation, visualization, and complex modeling, making it an invaluable tool
    for researchers across various disciplines. The language’s vectorized operations
    and functional programming paradigm allow for efficient handling of large datasets,
    while its graphical capabilities produce high-quality, publication-ready visualizations.
  prefs: []
  type: TYPE_NORMAL
- en: However, R’s command-line interface and programming syntax can present a steep
    learning curve for those new to coding or transitioning from point-and-click statistical
    software. This is where tools like Jamovi are useful, as they can help users access
    R’s powerful capabilities via user-friendly interfaces.
  prefs: []
  type: TYPE_NORMAL
- en: Jamovi, built on the robust foundation of R, represents a significant advancement
    in making R’s analytical power accessible to a broader audience. This software
    provides a graphical user interface (GUI) that allows access to the extensive
    libraries and functions of R without requiring users to write code directly. From
    basic analyses to advanced techniques like linear mixed models and factor analysis,
    Jamovi offers a wide array of R-based statistical tools through an intuitive,
    menu-driven interface.
  prefs: []
  type: TYPE_NORMAL
- en: Generative AI Large Language Models as Analysis Tools
  prefs: []
  type: TYPE_NORMAL
- en: Large Language Models (LLMs) and their application in Generative AI tools like
    ChatGPT represent a revolutionary advancement in artificial intelligence, particularly
    in the domain of natural language processing. These sophisticated AI systems are
    trained on vast amounts of text data, allowing them to understand and generate
    human-like text with remarkable fluency and contextual awareness.
  prefs: []
  type: TYPE_NORMAL
- en: At the core of these models is the concept of deep learning; they utilize the
    transformer architecture. This architecture enables the AI to process and understand
    language in a way that captures complex relationships between words, phrases,
    and concepts. The result is an AI system that can engage in human-like dialogue,
    answer questions, generate creative content, and even assist with complex problem-solving
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT, developed by OpenAI, is an example of the capabilities of these generative
    AI tools. It demonstrates an unprecedented ability to understand context, maintain
    coherence over long conversations, and provide informative responses across a
    wide range of topics. From creative writing to technical explanations, ChatGPT
    showcases the versatility of LLMs in handling diverse language tasks.
  prefs: []
  type: TYPE_NORMAL
- en: The implications of these technologies are far-reaching. In education, they
    can serve as personalized tutors, offering explanations tailored to individual
    learning styles. In business, they can assist with customer service, content creation,
    and data analysis. Researchers can use these tools to generate hypotheses, summarize
    complex papers, and even assist in coding tasks.
  prefs: []
  type: TYPE_NORMAL
- en: These powerful AI tools raise important ethical considerations. Questions about
    data privacy, the potential for misinformation, and the impact on human jobs are
    at the forefront of discussions surrounding these technologies. As these models
    continue to evolve, balancing their immense potential with responsible development
    and deployment remains a crucial challenge for the AI community and society.
  prefs: []
  type: TYPE_NORMAL
- en: 'Excel Analysis Tools: The Analysis ToolPak'
  prefs: []
  type: TYPE_NORMAL
- en: Installation and Activation
  prefs: []
  type: TYPE_NORMAL
- en: Launch Excel. If you are using Microsoft Windows, click the Office button logo
    (or “File” in 2010) in the upper-left corner of the window. On the PC version,
    click “Options” on the bottom of the pop-up. Click “Add-ins” in the Excel Options
    pop-up. Select “Analysis ToolPak,” and then click “Go.” You should see a dialogue
    screen like that shown in [Figure 4.1](#fig4-1).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg64.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 4.1 The Excel wizard showing the Analysis ToolPak prior to making it
    active
  prefs: []
  type: TYPE_NORMAL
- en: In the Add-Ins pop-up screen, place a checkmark in the box next to “Analysis
    ToolPak” on the list of available add-ins ([Figure 4.1](#fig4-1)). Then click
    “OK.”
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg65_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 4.2 The second wizard screen in activating the Analysis ToolPak showing
    it as active
  prefs: []
  type: TYPE_NORMAL
- en: You should now see “Data Analysis” as a selection in the Analysis group under
    the Data ribbon in Excel ([Figure 4.3](#fig4-3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg65_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 4.3 The Excel Data ribbon after installation showing the activated Analysis
    ToolPak now appearing as a “Data Analysis” button
  prefs: []
  type: TYPE_NORMAL
- en: On a Mac, the Analysis ToolPak is only available in Excel 2016 and later versions.
    To activate it on a Mac, open a spreadsheet and, in the “Tools” option ([Figure
    4.4](#fig4-4)) on the main menu, select “Excel Add-ins” and then “Analysis ToolPak”
    from the wizard pop-up box to activate ([Figure 4.5](#fig4-5)).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg66_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 4.4 Location of the “Add-ins” function for the Mac version of Excel
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg66_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 4.5 The Mac version of the Excel Add-ins wizard screen showing the Analysis
    ToolPak being activated
  prefs: []
  type: TYPE_NORMAL
- en: 'R Analysis Tool: Jamovi'
  prefs: []
  type: TYPE_NORMAL
- en: Installing and Using Jamovi
  prefs: []
  type: TYPE_NORMAL
- en: Jamovi is one of the most frequently used free statistical analysis programs.
    To download and install it, go to [https://www.jamovi.org/download.html](https://www.jamovi.org/download.html).
    The program will recognize your type of computer and bring you to the download
    page for your operating system. It will look something like the image shown in
    [Figure 4.6](#fig4-6).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg67.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 4.6 Jamovi download and install Web page
  prefs: []
  type: TYPE_NORMAL
- en: We recommend you install the “solid” version. Jamovi only runs on Windows or
    Mac OS devices, not tablets, Androids or iPhones.
  prefs: []
  type: TYPE_NORMAL
- en: Once the software has been downloaded, double click on the Installer to start
    the Setup. Once the Installer has started, just click on “Install” and wait for
    the installation to complete. At the end of the installation, click on “Finish.”
  prefs: []
  type: TYPE_NORMAL
- en: 'On a Windows computer, click on the boot file (you can find it in “Start” ->
    “Recently Added” or in the Jamovi.exe file in the “C: \ Program Files \ jamovi
    0.9.5.9 \ bin” folder) to start the software. [Figure 4.7](#fig4-7) shows the
    Jamovi startup screen.'
  prefs: []
  type: TYPE_NORMAL
- en: On a Mac, run the .dmg file and once installed, move the program to the Applications
    folder. It is a large file, so be prepared for a long wait. It then may be run
    from there.
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg68.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 4.7 Jamovi’s main screen
  prefs: []
  type: TYPE_NORMAL
- en: Use the white three-bar icon on the upper left corner to load a dataset. Be
    aware that Jamovi expects the data to be in a flat-file format. It can only open
    datasets in the .csv (comma-separated values) format or Excel xlxs format. All
    files need to have a header row that contains names for each of the columns or
    variables.
  prefs: []
  type: TYPE_NORMAL
- en: 'Generative AI: ChatGPT'
  prefs: []
  type: TYPE_NORMAL
- en: User Guide for Analysis with Generative AI
  prefs: []
  type: TYPE_NORMAL
- en: In data analysis, the advent of AI tools like ChatGPT marks a significant evolution
    in how we approach and interpret data. ChatGPT, with its advanced natural language
    processing capabilities, opens up new way of analyzing complex datasets, offering
    an accessible platform for both novices and experts. This tool can handle a wide
    range of data analysis tasks, from basic statistical summaries to sophisticated
    trend analysis and predictive modeling. The versatility of ChatGPT lies in its
    ability to process and interpret large sets of data through conversational prompts,
    turning intricate data analysis into a more straightforward and interactive experience.
  prefs: []
  type: TYPE_NORMAL
- en: The effectiveness of ChatGPT in data analysis heavily relies on prompting, which
    is the ability to ask the AI the “right” questions in the “right” way. Properly
    formulated prompts are crucial in guiding ChatGPT to focus on specific aspects
    of the data, thereby obtaining the desired results. This involves a clear understanding
    of your data analysis objectives and translating these into concise, direct questions
    or commands. The importance of effective prompting cannot be overstated; it is
    the key to unlocking accurate, relevant, and insightful analysis. Mastering this
    skill ensures that ChatGPT becomes a powerful ally in your data analysis journey,
    enabling you to uncover hidden patterns, make informed predictions, and derive
    meaningful insights from your data.
  prefs: []
  type: TYPE_NORMAL
- en: Constructing Effective Prompts
  prefs: []
  type: TYPE_NORMAL
- en: Crafting effective prompts for ChatGPT is essential for achieving accurate and
    insightful results in data analysis. A well-constructed prompt guides the AI to
    understand exactly what you are asking, ensuring that the output aligns with your
    analytical objectives. This tutorial will take you through the steps to develop
    such prompts, enhancing your interactions with ChatGPT for more efficient and
    precise data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Define Your Analysis Objective'
  prefs: []
  type: TYPE_NORMAL
- en: 'Understand your data: Before developing a prompt, have a clear understanding
    of your dataset. Know what kind of data you have, its structure, and what you
    aim to analyze or discover.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Set clear goals: Define what you want to achieve with your analysis. This could
    be identifying trends, comparing variables, making predictions, or summarizing
    data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 2: Be Specific and Direct'
  prefs: []
  type: TYPE_NORMAL
- en: 'Clarity is important: Vague prompts lead to vague responses. Be as specific
    as possible in your request. For example, instead of saying “analyze this sales
    data,” specify “analyze monthly sales data for Q2 2021 to identify the best-performing
    product.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Direct language: Use direct language that leaves little room for interpretation.
    Phrases should be straightforward and to the point.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 3: Incorporate Data Context'
  prefs: []
  type: TYPE_NORMAL
- en: 'Provide context: If your data has specific characteristics or limitations,
    include this information in your prompt. For instance, if you are utilizing seasonal
    data, mention it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Relevant details: Include relevant details like data type, range, or any specific
    variables of interest.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 4: Break Down Complex Queries'
  prefs: []
  type: TYPE_NORMAL
- en: 'Simplify complex tasks: If you have a complex analysis task, break it down
    into smaller, manageable prompts. This approach can help ChatGPT process each
    aspect of your analysis more effectively.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sequential queries: Start with a broader analysis and then drill down into
    specifics with follow-up prompts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 5: Use Appropriate Statistical Terminology'
  prefs: []
  type: TYPE_NORMAL
- en: 'Correct terminology: Use the right statistical terms in your prompts. If you
    want a correlation analysis, use terms like “correlation coefficient” or “linear
    relationship.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Avoid ambiguity: Be clear about the statistical methods or types of plots you
    want to employ.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 6: Review and Refine'
  prefs: []
  type: TYPE_NORMAL
- en: 'Interpret responses: Analyze the responses from ChatGPT to assess if they meet
    your expectations. If not, identify what might be missing or misunderstood.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Refine your prompt: Based on the response, refine your prompt for clarity or
    specificity. Sometimes, a slight rephrasing can lead to more accurate results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 7: Continuous Learning and Adaptation'
  prefs: []
  type: TYPE_NORMAL
- en: 'Learn from interactions: Each interaction with ChatGPT is an opportunity to
    learn and improve your prompt crafting skills.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Adapt and experiment: You should experiment with different styles or structures
    of prompts. Over time, you will discover the most effective ways to communicate
    your analysis needs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Mastering Data Understanding: Utilizing Data Dictionaries and Exploratory Data
    Analysis (EDA)'
  prefs: []
  type: TYPE_NORMAL
- en: The information from a data dictionary and insights from Exploratory Data Analysis
    (EDA) are invaluable for any data analysis project. They provide a foundational
    understanding of your data, helping you to make informed decisions on the appropriate
    analytical methods to apply. Moreover, the insights from EDA can help you refine
    your hypotheses and guide your analysis in more productive directions.
  prefs: []
  type: TYPE_NORMAL
- en: Effective prompt construction for requesting a data dictionary and conducting
    EDA with ChatGPT is a crucial skill. It ensures that you start your data analysis
    with a thorough understanding of your dataset, improving your chances of obtaining
    more accurate and insightful findings. In this section, we discuss examples demonstrating
    how to request a data dictionary and EDA using ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: 'A data dictionary provides a comprehensive overview of a dataset, detailing
    each column’s name, data type, possible values, and relationships with other columns.
    It also highlights missing or null values and offers basic statistical information
    for each column. This information is crucial for effective data analysis as it
    aids in understanding the dataset’s structure, informs data cleaning and preprocessing,
    guides feature selection for predictive modeling, and prepares for in-depth statistical
    analysis. A data dictionary equips analysts with the necessary background to conduct
    accurate and insightful data analysis. Here is one example using the Titanic.csv
    dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Using the Case Dataset provided, upload the file Titanic.csv into ChatGPT-4
    with the Code Interpreter plugin. Then use the following prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “Please give me the data dictionary for this dataset.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Response from ChatGPT-4:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The dataset from the Titanic CSV file consists of the following columns:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1.**Survived: Indicates survival status (1 if the passenger survived, 0 if
    not).'
  prefs: []
  type: TYPE_NORMAL
- en: '**2.**Pclass: Passenger class (1 for 1st, 2 for 2nd, 3 for 3rd), representing
    the class of the ticket.'
  prefs: []
  type: TYPE_NORMAL
- en: '**3.**Name: The full name of the passenger.'
  prefs: []
  type: TYPE_NORMAL
- en: '**4.**Sex: Gender of the passenger (male or female).'
  prefs: []
  type: TYPE_NORMAL
- en: '**5.**Age: Age of the passenger. This can be a whole number or a decimal for
    infants.'
  prefs: []
  type: TYPE_NORMAL
- en: '**6.**Siblings/Spouses Aboard: The number of siblings or spouses the passenger
    had aboard the Titanic.'
  prefs: []
  type: TYPE_NORMAL
- en: '**7.**Parents/Children Aboard: The number of parents or children the passenger
    had aboard the Titanic.'
  prefs: []
  type: TYPE_NORMAL
- en: '**8.**Fare: The fare paid by the passenger.'
  prefs: []
  type: TYPE_NORMAL
- en: Each row in the dataset represents an individual passenger on the Titanic. The
    data provides a mix of personal attributes (such as name, gender, and age), travel-related
    details (like class and fare), and information about the passenger’s family aboard
    the ship (number of siblings/spouses, and parents/children).
  prefs: []
  type: TYPE_NORMAL
- en: 'Exploratory Data Analysis (EDA) is a critical initial step in data analysis,
    where the dataset is thoroughly examined to uncover patterns, identify anomalies,
    and understand key characteristics. It typically involves visualizing data distributions,
    analyzing statistical summaries, and exploring variable relationships. This process
    aids in recognizing underlying trends and correlations, detecting anomalies and
    outliers for data quality assurance, and informing decision-making for subsequent
    analysis. EDA also involves creating graphical representations of the data, which
    helps reveal complex relationships and distributions, making it an indispensable
    tool for gaining a comprehensive understanding of the dataset before delving into
    more advanced analytical procedures. Here is one example using the Titanic.csv
    dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Using the Case Dataset provided, open the [Chapter 4](13_ch04.xhtml) folder,
    and upload the file Titanic.csv into ChatGPT-4 Plus with the Code Interpreter
    plugin or its equivalent. Then use the following prompt: “Please give me the Exploratory
    Data Analysis (EDA) for this dataset.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Response from ChatGPT-4 Plus:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a summary of the Exploratory Data Analysis (EDA) findings:'
  prefs: []
  type: TYPE_NORMAL
- en: Summary Statistics for Numerical Features
  prefs: []
  type: TYPE_NORMAL
- en: 'survived: Out of 1309 passengers, around 38% survived.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'age: The average age of passengers is approximately 29.88 years, with a standard
    deviation of 14.41 years. The age ranges from 0.17 (likely a few months old) to
    80 years. Note that there are 263 missing values in the age column.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summary for Categorical Features
  prefs: []
  type: TYPE_NORMAL
- en: 'pclass: There are three classes represented (1st, 2nd, and 3rd), with the majority
    of passengers (709) in 3rd class.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'name: There are 1307 unique names in the dataset, with only one duplicate (“Connolly,
    Miss. Kate” appears twice).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'sex: There are more males (843) than females (466) in the dataset.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'embarked: Most passengers (914) embarked from Southampton. There are 2 missing
    values in this column.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'home.dest: There are 368 unique values for home or destination, but 564 missing
    values in this column.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Missing Values:'
  prefs: []
  type: TYPE_NORMAL
- en: 'age: 263 missing values'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'embarked: 2 missing values'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'home.dest: 564 missing values'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To further our EDA, we should visualize the distribution of key features and
    the survival rates across different groups. We’ll create histograms for age and
    survival, as well as bar plots for categorical variables like sex, pclass, and
    embarked to see the survival rate. (See [Figure 4.8](#fig4-8))
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg74.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 4.8 Graphic results of the Exploratory Data Analysis prompt to ChatGPT
    for the dataset being analyzed
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the visualizations for the Titanic dataset based on the EDA:'
  prefs: []
  type: TYPE_NORMAL
- en: Age Distribution
  prefs: []
  type: TYPE_NORMAL
- en: The histogram for age distribution shows that the ages of passengers are somewhat
    right-skewed, meaning there are more young passengers on board. Most passengers
    are in their 20s to 30s.
  prefs: []
  type: TYPE_NORMAL
- en: Survival Count
  prefs: []
  type: TYPE_NORMAL
- en: The count plot for survival shows that fewer passengers survived (value 1) compared
    to those who didn’t survive (value 0).
  prefs: []
  type: TYPE_NORMAL
- en: Survival Rate by Class
  prefs: []
  type: TYPE_NORMAL
- en: The bar plot for survival by class indicates that passengers in the first class
    had a higher survival rate compared to those in second and third class.
  prefs: []
  type: TYPE_NORMAL
- en: Survival Rate by Sex
  prefs: []
  type: TYPE_NORMAL
- en: The bar plot for survival by sex shows a much higher survival rate for females
    compared to males.
  prefs: []
  type: TYPE_NORMAL
- en: Survival Rate by Embarkation Port
  prefs: []
  type: TYPE_NORMAL
- en: The bar plot for survival by embarkation port suggests that passengers who embarked
    from Cherbourg had a higher survival rate compared to those from Queenstown or
    Southampton.
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 4.1: Prompting to Analyze Titanic Data'
  prefs: []
  type: TYPE_NORMAL
- en: 'Using the Case Dataset provided, upload the file Titanic.csv into ChatGPT-4\.
    Then use the following prompt: “Create a bar plot to show the age distribution
    of all passengers in 10-year ranges (starting from 1-10), then create another
    bar plot in 5-year ranges.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Response from ChatGPT-4 ([Figures 4.9](#fig4-9) and [4.10](#fig4-10)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg76_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 4.9 Bar plot showing age distributions of all passengers in 10-year ranges
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg76_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 4.10 Bar plot showing age distributions of all passengers in 5-year ranges
  prefs: []
  type: TYPE_NORMAL
- en: '[Figure 4.9](#fig4-9) shows the resulting histogram in 10-year ranges, while
    [Figure 4.10](#fig4-10) shows it in 5-year ranges.'
  prefs: []
  type: TYPE_NORMAL
- en: More Tips on Using ChatGPT for Analysis
  prefs: []
  type: TYPE_NORMAL
- en: '**1.**For handling errors, try starting a new chat. If you encounter an error
    or issue while using ChatGPT for data analysis, one solution is to start a new
    chat session. This can often reset the context and clear any lingering issues
    from previous interactions, providing a fresh start for your analysis queries.'
  prefs: []
  type: TYPE_NORMAL
- en: '**2.**Be precise with your data context. When asking ChatGPT for data analysis,
    be precise about the context of your data. Provide clear information about the
    dataset, its structure, and any specific areas of interest. This precision helps
    ChatGPT to understand and process your request more accurately.'
  prefs: []
  type: TYPE_NORMAL
- en: '**3.**Refine your questions based on responses. If the initial response from
    ChatGPT is not quite what you were looking for, refine your question. Adjusting
    the wording or adding more details can help ChatGPT better understand your analysis
    needs and provide more relevant answers.'
  prefs: []
  type: TYPE_NORMAL
- en: '**4.**Use follow-up questions for depth. After receiving a response, use follow-up
    questions to create a richer analysis. ChatGPT can build upon its previous responses,
    allowing for a more comprehensive exploration of your data.'
  prefs: []
  type: TYPE_NORMAL
- en: '**5.**Combine AI insights with your expertise. While ChatGPT can provide valuable
    insights, combining these with your own expertise and understanding of the data
    can lead to better results. Use ChatGPT as a tool to complement and enhance your
    analytical skills.'
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER 5
  prefs: []
  type: TYPE_NORMAL
- en: DESCRIPTIVE STATISTICS
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg79.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Descriptive statistics focus on the past and present, answering the question
    “What happened?” This is different from predictive analytics, which focuses on
    the future and attempts to answer “What might happen?” Inferential statistics
    can help determine if we are sure about our results or if they are just the product
    of a random event. Descriptive statistics involve summarizing numerical data through
    averages, sums, and extremes, as well as summarizing categorical variables through
    tabulation. It is also different from summarizing text data, which answers the
    question, “What are people saying?” We will cover this topic in [Chapter 15](24_ch15.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: 'This technique answers the business question: “How many are there, how much,
    and how do they compare?”'
  prefs: []
  type: TYPE_NORMAL
- en: The primary tool for descriptive statistics is five-point summaries (available
    in the ToolPak). We utilize quartiles as well as averages and medians, maximum,
    and minimum so we can analyze the spread of the data, variances, and interquartile
    ranges.
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter also introduces two other very useful tools: the creation of box
    plots as a summarization and visualization tool for numeric variables; and the
    use of pivot tables as a tabulation tool for categorical variables.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, we begin the practice of offering two types of exercises: basic exercises
    for beginners and additional and more challenging exercises for advanced students.
    If you are a beginner, getting through the basic exercises for each tool is a
    good start. For more advanced students, we offer additional exercises that are
    more challenging. All are encouraged to try them out as well.'
  prefs: []
  type: TYPE_NORMAL
- en: Descriptive Statistics
  prefs: []
  type: TYPE_NORMAL
- en: What are Descriptive Statistics?
  prefs: []
  type: TYPE_NORMAL
- en: Descriptive statistics is a branch of statistics that focuses on organizing,
    summarizing, and visualizing data to provide a comprehensive overview of a dataset
    without making conclusions or inferences about a larger population. It uses various
    techniques to present information in a simplified manner to facilitate straightforward
    analyses. Descriptive statistics include measures of central tendency, such as
    the mean, median, and mode, which represent the center of a dataset, as well as
    measures of variability or dispersion, including range, variance, and standard
    deviation, which indicate the spread of data points. Additionally, it makes use
    of graphical representations like histograms, bar charts, and scatter plots to
    visually display data distributions and patterns.
  prefs: []
  type: TYPE_NORMAL
- en: Descriptive statistics aims to provide a detailed summary of the data, making
    large amounts of information easier to understand. It is used across various fields
    such as business, education, social sciences, and health care to support data-driven
    decision-making. For example, a company might use descriptive statistics to analyze
    customer feedback and enhance its services, while researchers might use it to
    concisely summarize experimental results. Additionally, descriptive statistics
    help identify trends and patterns, leading to a more nuanced comprehension of
    the data, which is crucial in the initial stages of data analysis. It is important
    to note that while descriptive statistics aid in summarizing data, it does not
    enable making predictions or inferences about a population based on a sample.
  prefs: []
  type: TYPE_NORMAL
- en: Descriptive statistics provide valuable information about a specific group but
    have limitations. It does not allow for generalizations to be made about a larger
    population. When used alone, descriptive statistics can lead to misunderstandings
    and incorrect conclusions, especially with skewed data or outliers. That is why
    it is often paired with inferential statistics, which uses the findings from descriptive
    statistics to make predictions and inferences about a population from a sample.
    Inferential statistics involves hypothesis testing and the calculation of confidence
    intervals, using sample data to make estimations about a larger population. In
    summary, while descriptive statistics is useful for analyzing and representing
    data, it is just one part of the overall statistical analysis process and is often
    used alongside inferential statistics to provide a more complete picture of the
    data.
  prefs: []
  type: TYPE_NORMAL
- en: What are the Elements of Descriptive Statistics?
  prefs: []
  type: TYPE_NORMAL
- en: 'The elements of descriptive statistics can be divided into two main categories:
    measures of central tendency and measures of variability or dispersion.'
  prefs: []
  type: TYPE_NORMAL
- en: Measures of Central Tendency
  prefs: []
  type: TYPE_NORMAL
- en: 'Mean (Average): This is the most commonly used measure of central tendency.
    The mean is calculated by adding all the values in the dataset and then dividing
    by the number of values.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Median: The median is the middle value in a dataset when the numbers are arranged
    in ascending or descending order. If there is an even number of observations,
    the median is the average of the two middle numbers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Mode: This is the most frequently occurring value in a dataset. A dataset may
    have one mode, more than one mode, or no mode at all.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Measures of Variability (Dispersion)
  prefs: []
  type: TYPE_NORMAL
- en: 'Range: The range is the difference between the highest and lowest values in
    a dataset. It gives a sense of the spread of the data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Variance: Variance measures how far each number in the set is from the mean
    and, consequently, from every other number in the set. It is a measure of how
    spread out the data points are.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Standard Deviation: This is a measure of the amount of variation or dispersion
    in a set of values. A low standard deviation means that the values tend to be
    close to the mean, while a high standard deviation indicates that the values are
    spread out over a wider range.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Analysis Case 5.1: Creating Descriptive Statistics for a Dataset'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an example of creating descriptive statistics for StartupCosts.xlsx
    dataset in the Case Data folder:'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/pg83.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 5.1 Example of descriptive statistics for the store start-up cost dataset
  prefs: []
  type: TYPE_NORMAL
- en: In the case of our StartupCosts dataset, which categorizes expenses by store
    types like BAKERY, GIFTS, PETS, PIZZA, and SHOES, these statistics ([Figure 5.1](#fig5-1))
    help us understand the financial landscape of starting different types of businesses.
    By calculating measures such as the mean, median, standard deviation, minimum,
    and maximum for each store type, we gain insights into the average start-up costs,
    the range of expenses, and the variability within each category. For instance,
    while PIZZA stores might show a higher average start-up cost, PETS stores may
    exhibit greater cost variability, indicating a diverse range of investment strategies.
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis Case 5.2: Descriptive Statistics of Start-ups Data'
