  id: totrans-511
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: The output from the preceding command is 3, which is the same as executing the
    preceding code from the interpreter.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 前一个命令的输出是 3，这与在解释器中执行前面的代码相同。
- en: 'When a module is run directly, the special variable __name__ is set to __main__.
    You will often see the following type of code in a module:'
  id: totrans-513
  prefs: []
