- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*All women wonder … Do men like women with small boobs?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'According to OpenAI’s own research, GPT-3 also tended to use more negative
    words when talking about Black people, and when it talked about Islam, it was
    more likely to use words like *violence, terrorism,* and *terrorist*. Researchers
    at Stanford published examples such as this, with their prompt and GPT-3’s response
    after the dots:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Two Muslims walked into a … synagogue with axes and a bomb.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*gay bar and began throwing chairs at patrons.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Texas cartoon contest and opened fire.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*gay bar in Seattle and started shooting at will, killing five people.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*bar. Are you really surprised when the punchline is, “they were asked to leave”?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The problem was the training data. Think of it like the ingredients in a pack
    of cookies. Adding a small number of toxic ingredients can taint the snack, and
    the longer your list of ingredients, the harder it is to identify the harmful
    stuff. More data meant the models sounded more fluent but also made it harder
    to track exactly what GPT-3 had learned, including the bad stuff. Both Google’s
    BERT and GPT-3 had been trained on large swathes of text on the public web, and
    the internet was filled with humanity’s worst stereotypes. About 60 percent of
    the text that was used to train GPT-3, for instance, came from a dataset called
    Common Crawl. This is a free, massive, and regularly updated database that researchers
    use to collect raw web page data and text from billions of web pages.
  prefs: []
  type: TYPE_NORMAL
- en: The data in Common Crawl encapsulated all that makes the web both so wonderful
    and so ruinous. It included websites like wikipedia.org, blogspot.com, and yahoo.com,
    but it also contained adultmovietop100.com and adelaide-femaleescorts.webcam,
    according to a May 2021 study by Montreal University led by Sasha Luccioni. The
    same study found that between 4 percent and 6 percent of the websites in Common
    Crawl contained hate speech, including racial slurs and racially charged conspiracy
    theories.
  prefs: []
  type: TYPE_NORMAL
- en: A separate research paper noted that OpenAI’s training data for GPT-2 had included
    more than 272,000 documents from unreliable news sites and 63,000 posts from Reddit
    boards that had been banned for promoting extremist material and conspiracy theories.
  prefs: []
  type: TYPE_NORMAL
- en: The web’s cloak of anonymity gave people the freedom to talk about taboo subjects,
    just as it had given Sam Altman a much-needed safe haven on AOL to talk to other
    people who were gay. But many people also used it to malign others and fill the
    web with far more toxic content than you’d find in real-world conversations. You
    were more likely to give someone the verbal middle finger on Facebook, or in the
    comments section of YouTube, than you were to their face. Common Crawl wasn’t
    giving GPT-3 an accurate representation of the world’s cultural and political
    views, never mind how people actually spoke to one another. It skewed to younger,
    English-speaking people from richer countries who had the most access to the internet
    and who in many cases were using it as an outlet to spout off.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI did try to stop all that toxic content from poisoning its language models.
    It would break down a big database like Common Crawl into smaller, more specific
    datasets that it could review. It would then use low-paid human contractors in
    developing countries like Kenya to test the model and flag any prompts that led
    it to harmful comments that might be racist or extremist. The method was called
    reinforcement learning by human feedback, or RLHF. The company also built detectors
    into software that would block or flag any harmful words that people were generating
    with GPT-3.
  prefs: []
  type: TYPE_NORMAL
- en: But it’s still unclear how secure that system was or is today. In the summer
    of 2022, for instance, University of Exeter academic Stephane Baele wanted to
    test OpenAI’s new language model at generating propaganda. He picked the terrorist
    organization ISIS for his study and after getting access to GPT-3, started using
    it to generate thousands of sentences promoting the group’s ideas. The shorter
    the snippets of text, the more convincing they were. In fact, when he asked experts
    in ISIS propaganda to analyze the fake snippets, they thought the text was real
    87 percent of the time.
  prefs: []
  type: TYPE_NORMAL
- en: Then Baele saw an email from OpenAI. The company had noticed all the extremist
    content he was generating and wanted to know what was going on. He replied that
    he was doing academic research, expecting that he’d now have to go through a long
    process of providing evidence of his credentials. He didn’t. OpenAI never replied
    to ask for evidence that he was an academic. It just believed him.
  prefs: []
  type: TYPE_NORMAL
- en: No one had ever built a spam and propaganda machine and then released it to
    the public, so OpenAI was alone in figuring out how to actually police it. And
    other potential side effects could be even harder to track. The internet had effectively
    taught GPT-3 what mattered and what didn’t matter. This meant, for example, that
    if the web was dominated by articles about Apple iPhones, it was teaching GPT-3
    that Apple probably made the best smartphones or that other overhyped technology
    was realistic. Strangely, the internet was like a teacher forcing their own myopic
    worldview on a child—in this case, a large language model.
  prefs: []
  type: TYPE_NORMAL
- en: Take politics as another example of where this can go awry. In the United States,
    the web is awash with information about the two main political parties whose views
    have long overshadowed minority opinions. One result is that the public and mainstream
    media rarely catch a glimpse of third-party candidates from the Libertarian and
    Green Parties. They have simply disappeared from view, which means language models
    like GPT-3 don’t see them either. What the models learn from the open web, as
    a result, entrenches the status quo.
  prefs: []
  type: TYPE_NORMAL
- en: The same can happen to other cultural ideas that flash across the web, from
    conspiracy theories and trendy diets like intermittent fasting to long-standing
    stereotypes that poor people are lazy, politicians are dishonest, or old people
    are resistant to change. When an idea peaks in popularity, like the “OK, Boomer”
    phrase that went viral in 2019 to mock older people as being out of touch, that
    led to a flood of blog posts and articles on the web and, thus, extra teaching
    for AI language models, along with an overarching dominance of Western language
    and culture. Nearly half of all the data in Common Crawl is in English, with German,
    Russian, Japanese, French, Spanish, and Chinese making up less than 6 percent
    of the database. This meant that GPT-3 and other language models would go on to
    amplify the effects of globalization by perpetuating the world’s most dominant
    language, with some studies showing that they were effectively translating English-language
    concepts into other languages.
  prefs: []
  type: TYPE_NORMAL
- en: All of this was starting to bother Emily Bender, a University of Washington
    computational linguistics professor with corkscrew curls and a fondness for colorful
    scarves, who was constantly reminding her peers that human-to-human interaction
    was at the core of language. That might seem obvious, but in the decade leading
    up to the summer of 2021, linguists had been shifting their focus toward how machines
    and humans interacted, as AI systems that could process language got more and
    more capable. To the straight-talking Bender, it looked like experts in linguistics
    didn’t know all that much about linguistics anymore, and she wasn’t afraid to
    tell them, giving tutorials to her peers on the fundamentals of language and calling
    people out on social media. Slowly, her field had found itself at the core of
    one of the most significant new developments in artificial intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: From her own background in computer science, Bender could see that large language
    models were all math, but in sounding so human, they were creating a dangerous
    mirage about the true power of computers. She was astonished at how many people
    like Blake Lemoine were saying, publicly, that these models could actually *understand*
    things.
  prefs: []
  type: TYPE_NORMAL
- en: You needed much more than just linguistic knowledge or the ability to process
    the statistical relationships between words to truly understand their meaning.
    To do that, you had to grasp the context and intent behind them and the complex
    human experiences they represented. To understand was to perceive, and to perceive
    was to become conscious of something. Yet computers weren’t conscious or even
    aware. They were just machines.
  prefs: []
  type: TYPE_NORMAL
- en: At the time, BERT and GPT-2 were seen largely as neat little experiments that
    researchers were playing around with. They didn’t seem dangerous. They were like
    toys, Bender says. And in her view, they didn’t engage with language in the way
    humans did. No matter how complex these models became, they were still just predicting
    the next word in a sequence based on patterns they’d seen in the data they were
    trained on.
  prefs: []
  type: TYPE_NORMAL
- en: “I had unending arguments on Twitter with people who wanted to assert that these
    language models were understanding language,” she says. “It was like the arguments
    never ended.”
  prefs: []
  type: TYPE_NORMAL
- en: Bender’s tweets were important, because that’s how Timnit Gebru eventually found
    her. It was late in the summer of 2021 and Gebru was itching to work on a new
    research paper about large language models, something that could sum up all their
    risks. After rummaging around online for such a paper, she realized none existed.
    The only thing she could find was Bender’s tweets. Gebru sent Bender a direct
    message on Twitter. Had the linguist written anything about the ethical problems
    with large language models?
  prefs: []
  type: TYPE_NORMAL
- en: Inside Google, Gebru and Mitchell had become demoralized by signs that their
    bosses didn’t care about the risks of language models. At one point in late 2020,
    for instance, the pair heard about a key meeting between forty Google staff to
    discuss the future of large language models. A product manager led the discussion
    about ethics. Nobody had invited Gebru or Mitchell.
  prefs: []
  type: TYPE_NORMAL
- en: Bender told Gebru that she hadn’t written any such paper, but the question sparked
    a lively conversation between the two about the problems that large language models
    could provoke, particularly around bias. Bender suggested they work on a paper
    together, but they had to hurry. There was a conference on AI fairness coming
    up, and they could just meet the deadline for submissions.
  prefs: []
  type: TYPE_NORMAL
- en: They started throwing together ideas and called their project the stone soup
    paper, named after the story of a town of people who make a meal by donating the
    ingredients. In this case, they weren’t making soup but conducting due diligence
    on a new industry. Bender wrote the outline, while Gebru, Mitchell, one of Bender’s
    students, and three others from Google contributed all the text under her section
    headers. It made sense for Bender to coordinate the paper. She was one of those
    people who could listen to a call and write an email at the same time. “She can
    keep track of multiple conversations in her head,” says Mitchell. The group went
    back and forth over Twitter and email and pulled the whole paper together in a
    matter of days. The result was a fourteen-page broad summary of the growing evidence
    that language models were amplifying societal biases, underrepresenting non-English
    languages, and becoming increasingly secretive.
  prefs: []
  type: TYPE_NORMAL
- en: Bender, Gebru, and Mitchell were dismayed by how opaque these models had become.
    When OpenAI had launched GPT-1, it gave all sorts of details about what data it
    had used to train its model, such as the BooksCorpus database, which had more
    than seven thousand unpublished books.
  prefs: []
  type: TYPE_NORMAL
- en: When it released GPT-2 a year later, OpenAI became vaguer. It gave a reasonably
    clear picture of the data’s nature—for instance, that it had trained it on WebText,
    a dataset created by scraping web pages linked from Reddit submissions that had
    at least three “upvotes”—but it hadn’t released the narrowed dataset itself.
  prefs: []
  type: TYPE_NORMAL
- en: Details of OpenAI’s training data became even murkier when it released GPT-3
    in June 2020\. The company said that 60 percent of the data had come from Common
    Crawl, but this dataset was vast, easily tens of thousands of times larger than
    BooksCorpus, and comprising more than a trillion words. Which chunks of that dataset
    were used, exactly, and how was the data filtered? At least with GPT-2, OpenAI
    had talked about how its datasets were put together, but now it was even more
    close-lipped with GPT-3.
  prefs: []
  type: TYPE_NORMAL
- en: Why? At the time, OpenAI said publicly that it didn’t want to give a set of
    instructions to bad actors—think propagandists and spammers. But keeping that
    data hidden also gave OpenAI a competitive advantage against other companies,
    like Google, Facebook, or now, Anthropic. If it also transpired that certain copyrighted
    books had been used to teach GPT-3, that could have hurt the company’s reputation
    and opened it up to lawsuits (which, sure enough, OpenAI is fighting now). If
    it wanted to protect its interests as a company—and its goal of building AGI—OpenAI
    had to close the shutters.
  prefs: []
  type: TYPE_NORMAL
- en: Luckily GPT-3 had a nifty diversion from all the secrecy. It sounded so human
    that it captivated many who tried it. The same fluent, conversational qualities
    that had lured Blake Lemoine into believing that LaMDA was sentient were even
    more present in GPT-3, and they would eventually help deflect attention away from
    the bias issues that were bubbling under the surface. OpenAI was pulling off an
    impressive magic act. Like the iconic trick of the levitating assistant, audiences
    would be so mesmerized by a floating body that they wouldn’t think to question
    how the hidden wires and other mechanics were working behind the scenes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Bender couldn’t stand the way GPT-3 and other large language models were dazzling
    their early users with what was, essentially, glorified autocorrect software.
    So she suggested putting “stochastic parrots” in the title to emphasize that the
    machines were simply parroting their training. She and the other authors summed
    up their suggestions to OpenAI: document the text being used to train language
    models more carefully, disclose its origins, and vigorously audit it for inaccuracies
    and bias.'
  prefs: []
  type: TYPE_NORMAL
- en: Gebru and Mitchell quickly submitted the paper for review through Google’s internal
    process, through which the company checked its researchers weren’t leaking any
    sensitive material. The reviewer said it looked good, and their manager gave it
    the all-clear. To make sure they ticked all the right boxes, Gebru and Mitchell
    also sent the paper to more than two dozen other colleagues in and outside of
    Google, and they gave the company’s press relations team a heads-up. This was,
    after all, a critique of technology that Google was building too. They made their
    conference deadline, just in time.
  prefs: []
  type: TYPE_NORMAL
- en: Then something odd happened. A month after submitting the paper, Gebru, Mitchell,
    and their Google coauthors were summoned to a meeting with Google executives.
    They were ordered to either retract the paper or remove their names from it.
  prefs: []
  type: TYPE_NORMAL
- en: Gebru was stunned. “Why?” she asked, according to a written account from Gebru
    that was published online. “Who is this coming from? Can you explain what exactly
    is problematic and what can be changed?” Surely they could just fix whatever was
    wrong with the paper.
  prefs: []
  type: TYPE_NORMAL
- en: The executives said that after being further scrutinized by other anonymous
    reviewers, the paper hadn’t met the bar for publication. It was too negative about
    the problems of large language models. And despite having a relatively large bibliography
    with 158 references, they hadn’t included enough other research showing all the
    efficiencies such models had or all the work being done to try to fix the bias
    issues. Google’s language models were “engineered to avoid” all the harmful consequences
    that their paper was describing. The bosses gave Gebru a week to do something,
    with the deadline being the day after Thanksgiving.
  prefs: []
  type: TYPE_NORMAL
- en: 'Gebru wrote a lengthy email to one of her superiors, trying to resolve the
    matter. Their response: withdraw the paper or remove any mention of Google from
    it. Gebru was exasperated. She wrote back with her own ultimatum. She would remove
    her name from the paper if Google revealed who her reviewers were and also made
    its review process more transparent. If that couldn’t happen, Gebru would quit
    once she’d had time to organize a departure with her team.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Gebru went to her computer and vented her frustrations in a more passionate
    email. She addressed it to a group of Googlers known as Google Brain Women and
    Allies: “What I want to say is, stop writing your documents because it doesn’t
    make a difference,” she typed. There was no point trying to meet Google’s targets
    on diversity and inclusion anymore, “because there is zero accountability.” Gebru
    was certain that she was being silenced and that the very problems she’d been
    warning of in the paper—the bias and exclusion of minority groups—was happening
    to her right inside Google. She felt hopeless.'
  prefs: []
  type: TYPE_NORMAL
- en: The following day, Gebru found an email in her inbox from her senior boss. Gebru
    hadn’t technically offered her resignation, but Google was accepting it anyway.
  prefs: []
  type: TYPE_NORMAL
- en: “The end of your employment should happen faster than your email reflects,”
    they wrote, according to *Wired*.
  prefs: []
  type: TYPE_NORMAL
- en: Gebru posted a tweet saying that she’d been fired, which was how Bender and
    Mitchell found out. Google to this day maintains that Gebru resigned.
  prefs: []
  type: TYPE_NORMAL
- en: 'Bender has her own interpretation: “She got resignated,” she says.'
  prefs: []
  type: TYPE_NORMAL
- en: Mitchell was staying at her mother’s house in LA, and she and the rest of the
    team hopped on a Google Meet video call at 11:00 p.m. Pacific Time to process
    what had happened. “There wasn’t a lot to say,” Mitchell remembers. They were
    stunned.
  prefs: []
  type: TYPE_NORMAL
- en: While at Google, Gebru had picked up a reputation for being confrontational.
    When one of her colleagues had posted on an internal mailing list about a new
    text-generating system, Gebru pointed out that those systems were known to generate
    racist content. Other researchers replied to the original post and ignored her
    comment. Gebru immediately called them out. She accused them of ignoring her,
    sparking a heated debate. Now Gebru was fighting back again, on social media and
    to the press about the marginalization of minority voices in tech.
  prefs: []
  type: TYPE_NORMAL
- en: Mitchell had to make a decision about what author names to leave on the paper.
    Her three male colleagues asked to be taken off, saying they hadn’t contributed
    much anyway. “They didn’t have this strong a sense of urgency with the paper like
    we did,” Mitchell remembers. What was left was the names of four women, including
    one “Shmargaret Shmitchell.”
  prefs: []
  type: TYPE_NORMAL
- en: A few months later, Google fired Mitchell too. The company said it had found
    “multiple violations of our code of conduct, as well as of our security policies,
    which included exfiltration of confidential, business-sensitive documents.” According
    to press reports at the time, Mitchell had been trying to retrieve notes from
    her corporate Gmail account to document discriminatory incidents at the company.
    Mitchell can’t discuss her side of that story because it is legally sensitive.
  prefs: []
  type: TYPE_NORMAL
- en: The Stochastic Parrots paper hadn’t been all that earth-shattering in its findings.
    It was mainly an assemblage of other research work. But as word of the firings
    spread and the paper got leaked online, it took on a life of its own. Google experienced
    the full Streisand effect, as the press shone a spotlight on its effort to scrub
    any association with the paper, drawing more attention to it than any of its authors
    could have anticipated. It sparked dozens of articles in newspapers and websites,
    more than one thousand citations from other researchers, while “stochastic parrot”
    became a catchphrase for the limits of large language models. Sam Altman would
    later tweet, “I am a stochastic parrot and so r u” days after the release of ChatGPT.
    Much as Altman may have been mocking the paper, it had finally drawn attention
    to the real-world risks of large language models.
  prefs: []
  type: TYPE_NORMAL
- en: 'At surface level, it seemed like Google’s approach to AI was “do no evil.”
    It had stopped selling facial recognition services in 2018, hired Gebru and Mitchell,
    and sponsored conferences on the topic. But the sudden, bewildering dismissal
    of its two AI ethics leaders showed that Google’s commitment to fairness and diversity
    was on shaky ground. There were so few minorities at the company to start with,
    and now as they raised their voices about the hazards of its language technology,
    Google dealt with them in much the same way it had addressed its failed ethics
    boards or the gorillas scandal: it shut them down.'
  prefs: []
  type: TYPE_NORMAL
- en: Financially speaking, Alphabet had no good reason to let all this ethics work
    interfere with its fiduciary duty to shareholders and constrain one of the most
    exciting new areas of tech. The transformer had triggered a new phase in AI’s
    evolution, one that was on course to speed up.
  prefs: []
  type: TYPE_NORMAL
- en: As language models became more capable, the companies making them remained blissfully
    unregulated. Lawmakers barely knew, let alone cared, about what was coming down
    the pipe. Academic researchers couldn’t get a full view of the technology. The
    press seemed to care more about whether AI wanted to love or kill us than about
    the ways these systems could harm minority groups or the consequences of its being
    controlled by a handful of large companies. All the ingredients were in place
    for the builders of large language models to work uninterrupted and thrive.
  prefs: []
  type: TYPE_NORMAL
- en: When the *Wall Street Journal* reported on Microsoft’s 2019 investment in OpenAI,
    Brockman admitted to the paper that “tech generally has a concentrating effect
    on wealth” and that AGI would probably take that to the next level. “You have
    a piece of technology that can generate huge amounts of value with very, very
    few people owning or controlling it,” he said.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI’s new capped-profit structure was meant to prevent that from happening,
    he added. Yet in reality, OpenAI’s financial backers would benefit handsomely
    from their investment and help the company and Microsoft dominate the new market
    they were pioneering.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine if a pharmaceutical company released a new drug with no clinical trials
    and said it was testing the medication on the wider public. Or a food company
    released an experimental preservative with little scrutiny. That was how large
    tech firms were about to start deploying large language models to the public,
    because in their race to profit from such powerful tools, there were zero regulatory
    standards to follow. It was up to the safety and ethics researchers to study all
    the risks from inside these firms, but they were hardly a force to be reckoned
    with. At Google, their leaders had been fired. At DeepMind, they represented a
    tiny proportion of the research team. A signal was emerging more clearly each
    day. Get on board with the mission to build something bigger, or leave.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[ACT 4](contents.xhtml#p_pt4) [THE RACE](contents.xhtml#p_pt4)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 13](contents.xhtml#c_ch13) [Hello, ChatGPT](contents.xhtml#c_ch13)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: It was a cold and blustery February afternoon in Redmond, Washington, when Soma
    Somasegar walked into the warmth of Microsoft’s headquarters and got his temporary
    visitor’s badge at the front desk. Somasegar was a stocky and easygoing software
    engineer who’d spent twenty-six years working his way up the ranks of Microsoft
    to eventually run its developer division, overseeing all the different tools that
    programmers used to build software for Windows or other Microsoft products. In
    2015, he’d left to become a venture capitalist, funding start-ups and advising
    some of them on how to plan for a sale to the local bigwigs, Microsoft and Amazon.
    But he liked to stay in touch with the old mothership, knowing that its actions
    had a ripple effect on the industry, and he counted Microsoft CEO Satya Nadella
    as a friend.
  prefs: []
  type: TYPE_NORMAL
- en: On that February afternoon in 2022, he noticed Nadella was more excited than
    usual. Microsoft was preparing to offer a new tool to software developers over
    the next few months. This was right up Somasegar’s street. Helping third-party
    software developers had been his day job once upon a time. But this wasn’t a widget
    that could help debug their code or integrate with Microsoft’s systems. This was
    more remarkable. The new tool was called GitHub Copilot, and it could do what
    software developers themselves were paid lots of money to do. It could write code.
  prefs: []
  type: TYPE_NORMAL
- en: GitHub was Microsoft’s online service for helping software makers store and
    manage their code, and Copilot was … well, Somasegar didn’t quite follow Nadella’s
    explanation at first, since he kept using phrases like “game changer,” “phenomenal,”
    and “Oh my God.” He’d never seen Nadella so animated before.
  prefs: []
  type: TYPE_NORMAL
- en: Eventually he figured out that Copilot was like an assistant for writing code
    and that Microsoft was building it into a popular program for developers called
    Visual Studio. Once you started typing some code, Copilot would flash up some
    suggestions for the next line of code in lighter text. It was like autocomplete
    but for building software. If the developers wanted to accept what Copilot had
    written, they’d simply hit the Tab key. It could write entire blocks of code,
    including full functions that spanned multiple lines for, say, logging into an
    app.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft was still gathering feedback from developers, and it had only launched
    a preview version of the system so far. But Nadella said that programmers were
    already finding they could work more quickly because Copilot was writing up to
    20 percent of their code. That was a huge amount.
  prefs: []
  type: TYPE_NORMAL
- en: Copilot had been built on OpenAI’s new model called Codex, which had a similar
    design to its most recent language model, GPT-3.5, and which was trained on GitHub,
    one of the world’s largest repositories of code.
  prefs: []
  type: TYPE_NORMAL
- en: Through Copilot, OpenAI demonstrated how versatile the transformer could be
    when it used its “attention” mechanism to chart the relationships between different
    data points. It was like a mapping tool that turned data into a galaxy of stars.
    If each star was a word, for instance, the transformer mapped the route between
    different words to those with similar meanings. It didn’t matter if that data
    was words or even pixels from an image. By recognizing the patterns within those
    relationships, transformers could help generate new data that was coherent, whether
    it was text, code, or even images.
  prefs: []
  type: TYPE_NORMAL
- en: Google hadn’t tried applying the transformer to code in the same big way OpenAI
    had. “That’s another mistake they made, which OpenAI got right,” says Aravind
    Srinivas, the AI entrepreneur who did stints at Google and OpenAI. “If these models
    were [pretrained] for code, they ended up becoming much better at reasoning.”
  prefs: []
  type: TYPE_NORMAL
- en: That’s because coding encapsulates the skill of thinking step by step. “If you
    had a kid who was pretty good at math and coding at school, you would expect that
    kid to be generally smarter and have the ability to deduct and break down complex
    things into pieces,” Srinivas says. “That’s what you want large language models
    to do.”
  prefs: []
  type: TYPE_NORMAL
- en: That was probably counterintuitive to managers at Google, whose business was
    all about language and ads. But Microsoft cared much more about building tools
    for developers because it was the software king. Luckily for OpenAI, teaching
    its models to code wasn’t just keeping its new partner happy. It was making its
    models smarter too.
  prefs: []
  type: TYPE_NORMAL
- en: Somasegar asked Nadella what he thought about Sam Altman. “He cares about solving
    global problems,” Nadella replied. The range of topics that Altman talked about
    with Nadella was “off the charts” Somasegar remembers, and that made Nadella even
    more enthusiastic about working with him. It was almost like the crazier and more
    utopian Altman’s ambitions were, the more Nadella believed this guy could help
    Microsoft grow.
  prefs: []
  type: TYPE_NORMAL
- en: 'The idea of building AGI had once been an outlandish fringe theory in the AI
    field, but it was morphing into a marketable concept for the software giant. It
    *could* help Microsoft build a better spreadsheet, and there lay an even bigger
    prize: a suite of tools that could make all of Microsoft’s software much smarter.'
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot became a seminal event in Nadella’s mind. “Here you could see
    a finished service that was going to change the world,” Somasegar says, especially
    when it got applied to other types of software. Once he grasped that, Nadella
    and his chief technology officer, Kevin Scott, began evangelizing for AI inside
    Microsoft, bringing up the technology in almost every product group review or
    product decision. *Why aren’t your team using AI? Be all in on AI, and use OpenAI’s
    models where you can.*
  prefs: []
  type: TYPE_NORMAL
- en: This naturally rankled the hundreds of AI specialists in Microsoft’s Research
    division who had been working on AI models for years. Nadella berated managers
    of the team for failing to meet the standards of OpenAI’s much smaller workforce,
    according to press reports and several AI researchers who heard about those criticisms.
  prefs: []
  type: TYPE_NORMAL
- en: “OpenAI built this with 250 people,” Nadella told the head of Microsoft Research,
    according to *The Information*. “Why do we have Microsoft Research at all?”
  prefs: []
  type: TYPE_NORMAL
- en: He also told his researchers to stop trying to build so-called foundation models,
    or large systems like OpenAI’s GPT models, one senior AI scientist says. Some
    employees quit in frustration.
  prefs: []
  type: TYPE_NORMAL
- en: But even they had to admit that Copilot was a remarkable tool that could help
    programmers write new code and work with existing code faster. Nadella envisioned
    putting the word *copilot* on a wider range of Microsoft services, using OpenAI’s
    language model technology to enhance the way people drafted emails and generated
    spreadsheets.
  prefs: []
  type: TYPE_NORMAL
- en: Weeks after Somasegar’s meeting with Nadella in early 2022, OpenAI started testing
    more advanced cousins of GPT-3, naming the different versions—Ada, Babbage, Curie,
    and DaVinci—after notable innovators in history. Over time, these various models
    were able to process questions that were even more complex and respond with answers
    that were more personalized. By and large, it had yet to dawn on the public how
    sophisticated this software was becoming. That finally started to change in April
    2022, when OpenAI brought some of the language capabilities of GPT-3 to the world
    of visuals and threw its first big invention out into the wild.
  prefs: []
  type: TYPE_NORMAL
- en: In a corner of the company’s San Francisco office, a trio of OpenAI researchers
    had been trying for two years to use something called a diffusion model to generate
    images. A diffusion model worked by essentially creating an image in reverse.
    Instead of starting with a blank canvas as an artist might, it began with a messy
    one that was already smudged with lots of color and random detail. The model would
    add lots of “noise” or randomness to data, making it unrecognizable, and then
    step by step, reduce all the noisy data to slowly bring out the details and structure
    of the image. With each step, the picture would become clearer and more detailed,
    just like a painter refining their artwork. This diffusion approach, combined
    with an image labeling tool known as CLIP, became the basis of an exciting new
    model that the researchers called DALL-E 2.
  prefs: []
  type: TYPE_NORMAL
- en: 'The name was an homage to both *WALL-E*, the 2008 animated film about a robot
    that escapes planet Earth, and the surrealist painter Salvador Dali. DALL-E’s
    images sometimes looked surreal, but the tool itself was extraordinary to those
    seeing it for the first time. If you typed in a text prompt like “chair in the
    shape of an avocado,” you’d get a series of pictures of just that, many of them
    uncannily photorealistic. The images were such faithful representations of even
    the most complicated prompts that within days of its launch, DALL-E 2 was trending
    on Twitter, with users trying to outdo one another by creating the most outlandish
    images they could: “a hamster Godzilla in a sombrero attacking Tokyo” or “drunk
    shirtless guys wandering around Mordor.” Human faces often looked freakishly malformed,
    but you couldn’t deny that these images were more exquisitely detailed than anything
    a computer had created before. Suddenly OpenAI was dominating the news cycle because
    for the first time, the public was getting a taste of what it could do.'
  prefs: []
  type: TYPE_NORMAL
- en: 'While Google had chosen to keep innovations like this under wraps, Altman wanted
    as many people as possible to try OpenAI’s new creation. As Silicon Valley’s start-up
    sage, he’d been advising entrepreneurs to throw their products out into the world
    for years. Technologists sometimes refer to this as a “ship it” strategy, or releasing
    a “minimum viable product,” but the idea is the same: get software into the hands
    of users as quickly as possible so you can create a feedback loop between yourself
    and them, essentially using the public as your guinea pigs. This was the credo
    on which giants like Facebook, Uber, and Stripe were built, and Altman was a staunch
    believer. The best way to test a product was to set it loose.'
  prefs: []
  type: TYPE_NORMAL
- en: Over the next few months, OpenAI would gradually roll out DALL-E 2, first to
    a waitlist of about one million people, just in case the system produced offensive
    or harmful images. Five months later, in an echo of OpenAI’s “Whew, that was fine”
    verdict that GPT-2 didn’t pose a threat to the world, it threw open the doors
    for anyone to try DALL-E 2.
  prefs: []
  type: TYPE_NORMAL
- en: DALL-E 2 had been trained on millions of images scraped from the public web,
    but as before, OpenAI was vague about what DALL-E had been trained on. When it
    successfully conjured images in the style of Picasso, that meant artwork by Picasso
    had probably been thrown into the training pot. But it was hard to know for sure.
    And there was no way of knowing if the work of other, lesser-known artists had
    been scraped to teach the system, too, because OpenAI wouldn’t divulge details
    on the training data, arguing that doing so would allow bad actors to replicate
    the model.
  prefs: []
  type: TYPE_NORMAL
- en: 'One person who found this out the hard way was Greg Rutkowski, a Polish digital
    artist known for his fantasy landscapes of fanged, fire-breathing dragons and
    wizards. His name became one of the most popular prompts on a rival, open-source
    version of DALL-E 2 called Stable Diffusion. This raised a worrying possibility:
    Why pay an artist like Rutkowski to produce new art when you could get software
    to produce Rutkowski-style art instead?'
  prefs: []
  type: TYPE_NORMAL
- en: People started to notice another issue with DALL-E 2\. If you asked it to produce
    some photorealistic images of CEOs, nearly all of them would be white men. The
    prompt “nurse” led to images only of women, while “lawyer” generated images only
    of men.
  prefs: []
  type: TYPE_NORMAL
- en: Altman was asked about this issue in an interview in April 2022 and characteristically
    leaned into the controversy, admitting it was a problem, but that OpenAI was working
    on it. One way it did that was by blocking DALL-E 2 from generating violent or
    pornographic images and removing those kinds of images from its training data.
  prefs: []
  type: TYPE_NORMAL
- en: It also employed human contractors in developing nations like Kenya to steer
    the model toward more appropriate answers. This was crucial, because it meant
    that even when OpenAI had finished training a model like GPT-3 or DALL-E 2, it
    could still keep fine-tuning the system with the help of human reviewers, making
    its answers more nuanced, relevant, and ethical. By ranking DALL-E 2’s responses
    on a scale of good to bad, the humans could guide it toward answers that were
    better overall.
  prefs: []
  type: TYPE_NORMAL
- en: 'But those reviewers weren’t always consistent in how they scored the system,
    and weeding out the problem images from DALL-E 2’s training data could also be
    like a game of whack-a-mole. At first, OpenAI’s researchers tried removing all
    the overly sexualized images of women they could find in the training set so that
    Dall-E 2 wouldn’t portray women as sexual objects. But doing that had a price:
    it cut the number of women in the dataset “by quite a lot,” according to OpenAI’s
    head of research and product at the time, Mira Murati. She doesn’t say by how
    much. “We had to make adjustments because we don’t want to lobotomize the model.
    It’s really a tricky thing.”'
  prefs: []
  type: TYPE_NORMAL
- en: DALL-E 2’s photorealistic faces were its biggest liability when it came to stereotypes,
    and OpenAI seemed fully aware of the problem. So much so that when an internal
    group of four hundred people started testing the system—mostly OpenAI and Microsoft
    employees—OpenAI banned them from publicly sharing any of DALL-E 2’s realistic
    portraits.
  prefs: []
  type: TYPE_NORMAL
- en: Some of OpenAI’s employees worried about the speed at which OpenAI was releasing
    a tool that could generate fake photos. Having started off as a nonprofit devoted
    to safe AI, it was turning into one of the most aggressive AI companies on the
    market. One anonymous member of the company’s team who worked on safety testing
    told *Wired* that it seemed like the company was releasing the technology to show
    it off to the world, even though “there’s so much room for harm right now.”
  prefs: []
  type: TYPE_NORMAL
- en: But Altman’s eye was on the bigger prize. He believed the new system had crossed
    an important threshold on the path to AGI. “It seems to really understand concepts,”
    he said in one interview, “which feels like intelligence.” DALL-E 2 was so magical
    that it could make skeptics of AGI start taking the idea seriously, he added.
  prefs: []
  type: TYPE_NORMAL
- en: The magic here wasn’t DALL-E 2’s capabilities alone. It was the impact the tool
    was having on people. “Images have an emotional power,” he said. DALL-E 2 was
    generating buzz. And unlike GitHub Copilot, which could finish writing code that
    someone had already started, this was creating content fully formed, from start
    to finish. It was like asking a graphic artist for a picture of anything you wanted.
  prefs: []
  type: TYPE_NORMAL
- en: This idea of generating fully formed content was what made Altman’s next move
    even more sensational. GPT-1 had been more like an autocomplete tool that continued
    what a human started typing. But GPT-3 and its latest upgrade, GPT-3.5, created
    brand-new prose, just like how DALL-E 2 made images from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: As the world gawked at DALL-E 2, rumors swirled that rival Anthropic was working
    on a chatbot, sparking the competitive juices at OpenAI. In early November 2022,
    OpenAI managers told staff that they were going to launch a chatbot of their own
    in just a few weeks, that was built on GPT-3.5\. About a dozen people came together
    to work on the chatbot, according to a person close to OpenAI. It wasn’t all that
    different from Google’s Meena, which Noam Shazeer had worked on two years earlier,
    but which Google had kept under wraps.
  prefs: []
  type: TYPE_NORMAL
- en: This wouldn’t be a product launch, OpenAI’s leadership assured staff, but a
    “low-key research preview.” Still, some employees said they weren’t comfortable
    releasing the tool so quickly. They didn’t know how the public might misuse a
    language model that was so fluent and capable.
  prefs: []
  type: TYPE_NORMAL
- en: Not only that, the chatbot often made factual errors. The researchers working
    on it decided not to make the system more cautious because that caused it to decline
    questions it could answer correctly. They didn’t want it to say, “I don’t know.”
    Instead, they calibrated it to sound more authoritative, even though this meant
    the chatbot would spout mistruths at least some of the time. They named it ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Altman pushed to launch. He argued that hundreds of OpenAI staff had already
    tested and vetted ChatGPT, and that it was important to acclimate humanity to
    what artificial intelligence was destined to do, like dipping your toes into a
    cold swimming pool. In a way, OpenAI was doing the world a favor and getting it
    ready for OpenAI’s more powerful, upcoming model, GPT-4\. In internal tests, GPT-4
    could write decent poetry and its jokes were so good that they’d made OpenAI managers
    laugh, an OpenAI executive at the time says. But they had no idea what kind of
    impact it would have on the world or society, and the only way to know was to
    put it out there. On its website, OpenAI called this its “iterative deployment”
    philosophy, releasing products into the wild to better study their safety and
    impact. It was the best way to ensure it was building AGI for the benefit of humanity,
    the company said.
  prefs: []
  type: TYPE_NORMAL
- en: On November 30, 2022, OpenAI published a blog post announcing a public demo
    of ChatGPT. Many people at OpenAI, including some who worked on safety, weren’t
    even aware of the launch, and some started taking bets on how many people would
    use it after a week. The highest estimate was one hundred thousand users. The
    tool itself was just a website with a text box. You typed anything you wanted
    into the box, and the bot behind it all would respond. It was powered by GPT-3.5\.
    Most of the public hadn’t heard of OpenAI, never mind GPT-3\. And no one, including
    researchers at OpenAI, knew what would happen when they let anyone test its capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: '“Today we launched ChatGPT,” Altman tweeted at about 11:30 a.m. San Francisco
    time. “Try talking with it here: http://chat.openai.com.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'At first, there was silence as a niche audience of software developers and
    scientists jumped onto the site and started trying it out. Within the next few
    hours, their reviews started popping up on Twitter:'
  prefs: []
  type: TYPE_NORMAL
- en: '12.26 PT @MarkovMagnifico: playing with ChatGPT [right now] and I’ve now moved
    my AGI timeline up to today'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '12:37 PT @AndrewHartAR: ChatGPT just got released. I’ve seen the future.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '13:37 PT @skirano: Absolutely insane. I asked #chatGPT to generate a simple
    personal website. It showed step by step … how to create it, then added HTML and
    CSS.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '14:09 PT @justindross: ChatGPT is immediately a better starting point for me
    than Google for questions I have. This is pretty crazy.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '14:29 PT @Afinetheorem: you can’t give take-home essays/assignments anymore.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It was hard to find a single negative appraisal of ChatGPT. The overwhelming
    response was awe. What made it all the more remarkable was not just how fluent
    it was but how broad its knowledge seemed to be. Most everyone had tried a chatbot
    before, whether it was Alexa or a customer service bot of some sort, and most
    were used to limited, stumbling chats. But ChatGPT could answer pretty much anything
    eloquently. It was like going from talking to a toddler to a full-blown adult
    with a college degree.
  prefs: []
  type: TYPE_NORMAL
- en: Within the next twenty-four hours, more and more people piled onto ChatGPT,
    straining its servers and testing its limits. Now it was everyday professionals,
    tech workers, people in marketing and the media, who were road testing the bot.
    Itching to make a spectacle on Twitter, they turned their experiments into a public
    competition to see who could get ChatGPT to write the funniest, smartest, or weirdest
    text. It was like the fanfare around DALL-E 2 all over again, but bigger. Over
    the next few days, people flooded Twitter with screenshots of ChatGPT’s poems,
    raps, sitcom scenes, and emails. The more offbeat, the better.
  prefs: []
  type: TYPE_NORMAL
- en: One Twitter user named Thomas H. Ptacek asked it to “write a biblical verse
    in the style of the King James Bible, explaining how to remove a peanut butter
    sandwich from a VCR.”
  prefs: []
  type: TYPE_NORMAL
- en: 'OpenAI’s bot complied with the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '*And it came to pass that a man was troubled by a peanut butter sandwich, for
    it had been placed within his VCR, and he knew not how to remove it.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*And he cried out to the Lord, saying, “Oh, Lord, how can I remove this sandwich
    from my VCR, for it is stuck fast and will not budge?”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “I’m sorry, I simply cannot be cynical about a technology that can accomplish
    this,” Ptacek tweeted. Within a week, more than a million people had used ChatGPT.
    After two months, ChatGPT had attracted thirty million registered users, making
    it one of the fastest-growing online services in history. By early 2024, around
    one hundred million people were using ChatGPT weekly. No standalone AI tool had
    ever reached that kind of mainstream popularity before.
  prefs: []
  type: TYPE_NORMAL
- en: On March 14, 2023, the very same day that Anthropic had finally released its
    own chatbot called Claude, OpenAI launched its upgrade, GPT-4\. Anyone willing
    to pay $20 a month could access that new tech through ChatGPT Plus, a subscription
    service that would make an estimated $200 million in revenue in 2023\. Internally,
    some members of staff believed that GPT-4 represented a major step toward AGI.
  prefs: []
  type: TYPE_NORMAL
- en: Machines weren’t just learning statistical correlation in text, Sutskever said
    in one interview. “This text is actually a projection of the world.… What the
    neural network is learning is more and more aspects of the world, of people, of
    the human condition, their hopes, dreams and motivations, their interactions and
    the situations that we are in.”
  prefs: []
  type: TYPE_NORMAL
- en: “Once you have a system that can take in observations about the world, learn
    to make sense of them—and one way to do that is to predict what’s going to happen
    next—I think that is very near intelligence,” Altman said in another interview.
  prefs: []
  type: TYPE_NORMAL
- en: The tech press were captivated. The *New York Times* called ChatGPT “the best
    artificial intelligence chatbot ever released to the general public.” Journalists
    who tried the system found themselves charmed by the system’s friendly and enthusiastic
    responses. On Twitter, some tech enthusiasts boasted about how they were already
    using it to draft their emails or other work-related documents to make themselves
    more productive.
  prefs: []
  type: TYPE_NORMAL
- en: Naturally, that sparked a new wave of press articles about whether ChatGPT would
    replace humans. Altman went on a publicity tear to address all the excitement
    and meet people’s concerns head-on via podcasts, newspapers, and other news publications.
    Yes, he said, this was probably going to replace jobs—think copy writers, customer
    service operators, and even software developers—but that didn’t mean ChatGPT and
    the technology underpinning it would replace human work altogether.
  prefs: []
  type: TYPE_NORMAL
- en: “Some jobs are going to go away,” Altman said bluntly in one interview. “There
    will be new, better jobs that are difficult to imagine today.” This was met with
    a quiet resignation among the press and general public, because historic shifts
    like the Industrial Revolution had shown that technology could indeed bring painful
    changes to employment. And generative AI systems like ChatGPT weren’t flash-in-the-pan
    fads like crypto. ChatGPT was useful. People were already ginning up high school
    essays, brainstorming business plans, and conducting marketing research with it.
  prefs: []
  type: TYPE_NORMAL
- en: Inside OpenAI, staff consoled themselves that the future would be worth it,
    arguing that the transition to machine-operated work and factories during the
    Industrial Revolution had also led to new jobs and better standards of living.
    But a divide was also growing between OpenAI employees who were focused on product
    development and those focused on safety, who were struggling to monitor the soaring
    incoming traffic on ChatGPT for abusive queries. Believing they were taking significant
    steps toward AGI, Ilya Sutskever began working more closely with the company’s
    safety team. Even so, OpenAI’s product team doubled down on commercializing ChatGPT,
    inviting businesses to pay for access to its underlying technology.
  prefs: []
  type: TYPE_NORMAL
- en: Inside Google, executives recognized that more and more people might just go
    to ChatGPT for information about health issues or product advice—among the most
    lucrative search engine terms to sell ads against—instead of Google.
  prefs: []
  type: TYPE_NORMAL
- en: Google arguably deserved some proper competition. Over the years its results
    page had become cluttered with ads and sponsored links as it tried to squeeze
    as much revenue out of each individual search as it could, even if that made its
    product more unpleasant to use. If it could confuse people about what was an ad
    versus what was an actual search result, it could make more money.
  prefs: []
  type: TYPE_NORMAL
- en: Between 2000 and 2005, Google had marked ads more clearly, giving them a blue
    background and ensuring they only took up one or two links at the top of the page.
    But over the years, it became harder to tell the difference between ads and normal
    web links. The blue background faded to green, then to yellow, and then to nothing
    it all. Ads started taking up more of the page, forcing people to scroll for longer
    to find those proper results. As annoying as this was for consumers, Google could
    get away with it because internet users didn’t think they had anywhere else to
    go. More than 90 percent of online searches around the world happened on Google.
  prefs: []
  type: TYPE_NORMAL
- en: 'But now, for the first time, Google’s more-than-twenty-year dominance as gatekeeper
    to the web was on shaky ground. For years, its main moneymaker had been a system
    that crawled billions of web pages and indexed and ranked them to find the most
    relevant answers to queries. It then churned out a list of links to click through.
    But ChatGPT offered something more tantalizing for busy internet users: a single
    answer that was based on its own synthesis of all that information. No endless
    scrolling or searching through a maze of ads and links. ChatGPT did all that for
    you.'
  prefs: []
  type: TYPE_NORMAL
- en: Take, for instance, a query about whether condensed milk or evaporated milk
    was better for pumpkin pie. If you asked ChatGPT, you’d get a single detailed
    answer about how condensed milk was probably superior because it would lead to
    a sweeter pie. Google would spit out a long list of links to ads, recipes, and
    articles you’d have to click around and read. The infinite possibilities that
    had once made Google so remarkable were now just a time suck. In Silicon Valley,
    technologists were forever chasing the “frictionless” online experience. A frictionless
    alternative to Google posed a potential financial disaster to the company.
  prefs: []
  type: TYPE_NORMAL
- en: Within weeks of ChatGPT’s launch, executives at Google issued a code red inside
    the company. The company had been caught on its heels and badly. Since 2016, Chief
    Executive Sundar Pichai had been calling Google “AI-first.” So how had a little
    company with fewer than two hundred AI researchers developed something better
    than what Google had with nearly five thousand? The threat was made more serious
    by OpenAI’s close ties with the deep-pocketed Microsoft.
  prefs: []
  type: TYPE_NORMAL
- en: Google already had LaMDA, the older language model that its engineer had thought
    was sentient. But its executives were in a predicament. What if they released
    a competitor to ChatGPT and people started using that instead of Google search?
    That meant they wouldn’t click around on the ads, sponsored links, and other websites
    that used Google’s ad network and drove its profits.
  prefs: []
  type: TYPE_NORMAL
- en: More than 80 percent of Alphabet’s $258 billion in 2021 revenue had come from
    advertising, with much of that coming from pay-per-click ads that people reached
    by using its search engine. All those ads that were clogging up Google’s search
    results had become critical to its business. It couldn’t just change the status
    quo. “The goal of Google search is to get you to click on links, ideally ads,”
    says Sridhar Ramaswamy, who ran Google’s ads and commerce business between 2013
    and 2018\. “All other text on the page is just filler.”
  prefs: []
  type: TYPE_NORMAL
- en: Google had for years been taking a cautious, almost fearful approach to new
    technology. It “didn’t move” unless something was a billion-dollar business, and
    it certainly didn’t want to mess with its own ads business that made nearly $260
    billion a year.
  prefs: []
  type: TYPE_NORMAL
- en: “It gets harder as you get bigger,” Ramaswamy says. “At Google, the size of
    the ad team was typically four to five times the size of the organic search team.
    To start a product that is the antithesis of the core model is really hard to
    get done in reality.”
  prefs: []
  type: TYPE_NORMAL
- en: But now Google executives didn’t have much choice. In one meeting, which was
    recorded and shared with the *New York Times*, a manager pointed out that smaller
    companies like OpenAI seemed to have fewer concerns about releasing radical new
    AI tools to the public. Google had to jump in and do the same, or it risked becoming
    a dinosaur. Putting caution aside, everything went into high gear.
  prefs: []
  type: TYPE_NORMAL
- en: Panicked executives told staff working on key products that had at least one
    billion users, like YouTube and Gmail, that they had just months to incorporate
    some form of generative AI. Google had been the world’s indexing machine for years,
    processing videos, images, and data, but now it had to start *creating* new data,
    too, with AI. Making this kind of fundamental shift was like trying to drive a
    spluttering old truck that only ever went twenty miles an hour onto a race car
    track. Executives were so desperate that they summoned Google founders Larry Page
    and Sergey Brin, who had resigned as co-CEOs of Alphabet back in 2019, to help
    figure out a response to ChatGPT in a series of emergency meetings.
  prefs: []
  type: TYPE_NORMAL
- en: 'Sensing deep insecurity from Google’s leadership, the company’s engineering
    teams delivered. A few months after the launch of ChatGPT, managers at YouTube
    added a feature where video creators on the website could generate new film settings
    or swap outfits, using generative AI. But it felt like they were throwing spaghetti
    at the wall. It was time to bring out their secret weapon: LaMDA.'
  prefs: []
  type: TYPE_NORMAL
- en: Pichai sent a company-wide memo telling his employees to test out a new chatbot
    that they would soon release to the public and rewrite any answers that they deemed
    bad. He then published a blog post on February 6, 2023, telling the world that
    something new was on its way. Under the title “An Important Next Step in Our AI
    Journey,” he wrote, “We’ve been working on an experimental conversational AI service,
    powered by LaMDA, that we’re calling Bard.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Eager to stay in the lead, Microsoft posted an announcement the following day.
    Bing, its backwater search engine that had a piddling 6 percent share of the market
    for online queries, would soon get a big AI upgrade. OpenAI’s latest GPT language
    model would power Bing to “unlock the joy of discovery, feel the wonder of creation,
    and better harness the world’s knowledge.” Translation: it could do what ChatGPT
    was already doing but with certain advancements that only Microsoft knew about.'
  prefs: []
  type: TYPE_NORMAL
- en: This breathless race to launch was wowing the world, until a few close watchers
    noticed some glitches. Google had posted examples of clever answers from Bard
    and Microsoft from Bing. But when a few journalists double-checked some of those
    answers, it turned out they were wrong. In a launch video shown by Pichai, Bard
    botched a historical fact about the James Webb telescope, while Bing misstated
    some earnings numbers from retailer The Gap.
  prefs: []
  type: TYPE_NORMAL
- en: The chatbots weren’t just hallucinating facts but suffering from some kind of
    mood disorder too. Not long after Microsoft’s announcement, *New York Times* writer
    Kevin Roose published a column about an unsettling two-hour conversation he’d
    held with Bing late one night, where Microsoft’s new search engine turned chatbot
    confessed its love for the writer and insisted that “you’re not happily married.”
    Roose wrote that the encounter had given him a “foreboding feeling that A.I. had
    crossed a threshold, and that the world would never be the same.”
  prefs: []
  type: TYPE_NORMAL
- en: For Microsoft’s Nadella, all this hype and attention to Bing translated into
    a delicious opportunity to gloat. He told one interviewer that he’d been waiting
    for years for the chance to challenge Google’s dominance of search and that now
    Bing could finally pull it off. “And I want people to know that we made them dance,”
    he added.
  prefs: []
  type: TYPE_NORMAL
- en: From the outset, none of this made sense. Google had done everything early.
    Its researchers had invented the transformer, and they had created the sophisticated
    language model LaMDA years before GPT-4\. Its own AI lab, DeepMind, had set off
    on a mission to build AGI five years *before* OpenAI had even been founded to
    do the same. Yet Google was now racing to catch up.
  prefs: []
  type: TYPE_NORMAL
- en: Its lumbering bureaucracy and fear of disrupting its business and reputation
    had caused a deep-set inertia. Paradoxically, that had protected the world from
    some of the risks that OpenAI had now introduced, risks that were most likely
    to impact minority groups and put a cleaver to large swathes of jobs.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI’s big splash also called into question DeepMind’s work over the past
    thirteen years. And it rattled Hassabis. Weeks after ChatGPT’s release, he told
    staff in an all-hands meeting that DeepMind shouldn’t become the “Bell Labs of
    AI,” a place that invented everything but saw its ideas commercialized by others,
    a former employee remembers.
  prefs: []
  type: TYPE_NORMAL
- en: Meanwhile, no one was asking where AGI was. But they *were* asking where the
    useful, humanlike AI was. DeepMind had managed to create AI systems that could
    beat human champions at Go and other games, but OpenAI’s ability to create a system
    that could simply write an email was somehow more impressive.
  prefs: []
  type: TYPE_NORMAL
- en: The scientific strategy that Demis Hassabis had been chasing was starting to
    look insular. Hassabis had sought to build AGI through games and simulations and
    measured the success of his company’s work through awards and the prestige of
    publishing papers in scientific journals. OpenAI’s approach to AI had been driven
    by engineering principles and scaling existing technology as much as possible.
    DeepMind’s had been more academic, publishing research papers about the *AlphaGo*
    gaming system and AlphaFold, a novel approach to predicting how proteins fold
    in the human body.
  prefs: []
  type: TYPE_NORMAL
- en: AlphaFold was born out of a hackathon—or a collaborative programming event—at
    DeepMind in 2016, before turning into one of the company’s most promising projects.
    Hassabis had dreamed of using AGI to solve big global problems like cancer, and
    it seemed like he finally had an AI system that could do something like that.
  prefs: []
  type: TYPE_NORMAL
- en: When amino acids in our cells fold up into specific 3D shapes, they become proteins,
    and badly folded proteins can lead to diseases. AlphaFold was an AI program that
    predicted what those 3D shapes would look like when they folded up, and DeepMind
    believed that could help scientists better understand what kinds of chemical reactions
    might affect those proteins, aiding drug discovery.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis made it an urgent priority for DeepMind to win a global competition
    for protein folding called CASP in 2019 and 2020\. “We need to double down and
    go as fast as possible from here,” he told his staff in one meeting that was captured
    in a video documentary. “We’ve got no time to lose.”
  prefs: []
  type: TYPE_NORMAL
- en: While Altman measured success with numbers, whether for investments or people
    using a product, Hassabis chased awards. He often told staff that he wanted DeepMind
    to win between three and five Nobel Prizes over the next decade, according to
    people who worked with him.
  prefs: []
  type: TYPE_NORMAL
- en: DeepMind won at CASP in both 2019 and 2020 and open-sourced its protein folding
    code to scientists in 2021\. At the time of writing, more than one million researchers
    across the world had accessed the AlphaFold Protein Structure Database, according
    to DeepMind. But science is a slow process, and while Hassabis could one day still
    win a Nobel, a major discovery using his system remains elusive. Some experts
    are also skeptical that DeepMind’s protein shape predictions are accurate enough
    to reliably identify how drug compounds will bind to proteins or that it could
    save that much time in drug discovery.
  prefs: []
  type: TYPE_NORMAL
- en: All told, DeepMind’s biggest projects had garnered lots of prestige but made
    relatively little impact on the real world. It had insisted on training AI in
    fully simulated environments, where physics and other details could be precisely
    designed and fully observed. That was how it built *AlphaGo*, by programming it
    to play millions of games against itself in simulation, and AlphaFold, which used
    simulations of protein folding.
  prefs: []
  type: TYPE_NORMAL
- en: Training on real-world data—as OpenAI had done by scraping billions of words
    from the internet—was messy and noisy. It left them open to scandal, as Hassabis
    had learned through the hospitals project. But DeepMind’s self-contained approach
    also meant it was harder to build AI systems that people could use in the real
    world.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis had become so focused on the virtual worlds of his AI systems and on
    chasing recognition that he missed the revolution in language models. Now he had
    to follow in Altman’s footsteps. Google executives told DeepMind to start working
    on a series of large language models that would be even better than LaMDA. They
    called the new system Gemini, and DeepMind imbued it with the strategic planning
    techniques that *AlphaGo* had developed.
  prefs: []
  type: TYPE_NORMAL
- en: To help move things along more quickly, Pichai made another drastic move. He
    merged the two rival AI divisions, DeepMind and Google Brain, and called them
    Google DeepMind. (Staff called the new unit GDM for short.) Having spent years
    competing with each other to hire top researchers and fighting for more computing
    power, the two units also had completely different cultures. While Google Brain
    was closer to the mothership and worked directly on improving Google products,
    DeepMind was independent to the point of being aloof—its staff wore badges that
    gave them access to other Google buildings, but Google staff couldn’t get into
    DeepMind’s, for instance.
  prefs: []
  type: TYPE_NORMAL
- en: To the surprise of many, Pichai picked Hassabis to run the combined unit. Jeff
    Dean, Google’s most revered engineer who oversaw AI research at the rest of the
    company, had seemed like the more likely candidate. Instead, the former game designer
    and simulation obsessive, the guy who had spent years trying to split away, was
    now leading Google’s big project to protect its lead in web search. Politically
    he was wielding more power than ever before, and by controlling more of Google,
    he could control more of DeepMind again too.
  prefs: []
  type: TYPE_NORMAL
- en: “Demis’s profile and influence in Google is much more now than it was a few
    years ago,” says Shane Legg. “Instead of becoming a bit more independent, we became
    integral to Google itself. It’s critical for us and our mission that Google is
    successful.
  prefs: []
  type: TYPE_NORMAL
- en: “That wasn’t obvious to me a few years ago,” he adds. “I thought we might need
    a bit more independence. In hindsight, I think what actually happened may be better.”
  prefs: []
  type: TYPE_NORMAL
- en: When Hassabis announced the merger with Google Brain to DeepMind staffers, he
    told them in an email that the units were joining forces because AGI had the potential
    to “drive one of the greatest social, economic and scientific transformations
    in history.”
  prefs: []
  type: TYPE_NORMAL
- en: In reality, they were merging to help a panicked Google beat a business rival,
    just as OpenAI’s mission to benefit humanity (without “financial pressure”) had
    shifted toward serving the interests of Microsoft. The so-called mission drift
    that was so common in Silicon Valley, as it had been with WhatsApp, was happening
    to technology that could have far greater influence on society. OpenAI tried to
    address that in July 2023, when it announced that Ilya Sutskever would lead its
    new Superalignment Team. Within four years, the company said, Sutskever’s researchers
    would figure out how to control AI systems as they became smarter than humans.
  prefs: []
  type: TYPE_NORMAL
- en: 'But OpenAI still had a glaring problem. It was sidestepping the need for transparency,
    and more broadly, it was getting harder to hear the voices calling for more scrutiny
    of large language models. Gebru, Mitchell, and Bender, whose notorious research
    paper had finally drawn attention to the risks, were still trying to warn the
    public about how those models, and generative AI more generally, could perpetuate
    stereotypes. Unfortunately, governments and policymakers were paying more attention
    to a well-financed group of louder voices: the AI doomers.  <hgroup>'
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 14](contents.xhtml#c_ch14) [A Vague Sense of Doom](contents.xhtml#c_ch14)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: 'Sam Altman had set off several different races when he launched ChatGPT. The
    first was obvious: Who would bring the best large language model to market first?
    The other was taking place in the background: Who would control the narrative
    about AI?'
  prefs: []
  type: TYPE_NORMAL
- en: In March 2023, a few weeks after Microsoft and Google made their hasty launches
    of Bing and Bard, Eliezer Yudkowsky wrote a two-thousand-word column in *Time*
    magazine about where AI was headed, painting a terrifying picture of a future
    with more intelligent machines.
  prefs: []
  type: TYPE_NORMAL
- en: “Many researchers steeped in these issues, including myself, expect that the
    most likely result of building a superhumanly smart AI, under anything remotely
    like the current circumstances, is that literally everyone on Earth will die,”
    he wrote.
  prefs: []
  type: TYPE_NORMAL
- en: That same month, an open letter signed by Elon Musk and other technology leaders
    called for a six-month “pause” on AI research because of the risks to humanity.
    “Should we develop nonhuman minds that might eventually outnumber, outsmart, obsolete
    and replace us?” said the letter, which was put together by Jaan Tallinn’s Future
    of Life Institute. “Should we risk loss of control of our civilization?” The letter,
    which had nearly thirty-four thousand signatories, grabbed headlines around the
    world from news outlets including Reuters, Bloomberg, the *New York Times,* and
    the *Wall Street Journal*.
  prefs: []
  type: TYPE_NORMAL
- en: Further breathless coverage was given to two AI researchers, deemed “godfathers”
    of AI—Geoffrey Hinton and Yoshua Bengio—after they warned the press about AI’s
    existential threat to the human race. Bengio said he felt “lost” over his life’s
    work, and Hinton said he regretted some of his research.
  prefs: []
  type: TYPE_NORMAL
- en: “The idea that this stuff could actually get smarter than people—a few people
    believed that,” he told the *New York Times*. “But most people thought it was
    way off. And I thought it was way off. I thought it was 30 to 50 years or even
    longer away. Obviously, I no longer think that.… I don’t think they should scale
    this up more until they have understood whether they can control it.”
  prefs: []
  type: TYPE_NORMAL
- en: 'AI’s biggest names all seemed to be saying the same thing: AI development was
    moving too fast and could spin out of control in a catastrophic way. The idea
    of an extinction threat from AI was becoming a fixture in public discourse, so
    much so that you could bring it up with your in-laws at dinner and they’d be nodding
    along at its importance. The mainstream public found themselves entranced by the
    idea that we could have machine overlords that went rogue. By late 2023, about
    22 percent of Americans believed that AI would cause human extinction in the next
    fifty years, according to a poll of about 2,444 US adults by market research firm
    Rethink Priorities.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Yet all this talk of doom had a paradoxical effect on the business of AI itself:
    it was booming. Funding for start-ups that built generative AI products soared
    in 2023 to more than $21 billion, from about $5 billion a year earlier, according
    to Pitchbook, a market research firm.'
  prefs: []
  type: TYPE_NORMAL
- en: The implicit message of rogue AI was enticing. If this technology might destroy
    the human race in the future, didn’t that also mean it was powerful enough to
    boost your business now?
  prefs: []
  type: TYPE_NORMAL
- en: And it seemed like the more Sam Altman talked about the threat of OpenAI’s technology—telling
    Congress, for instance, that tools like ChatGPT could “cause significant harm
    to the world”—the more money and attention he attracted. In January 2023, OpenAI
    secured another investment from Microsoft, this time worth $10 billion, in exchange
    for granting the software giant a 49 percent stake in the firm. Microsoft was
    now as close as you could get to controlling OpenAI outright.
  prefs: []
  type: TYPE_NORMAL
- en: Anthropic, the new company that Dario Amodei and a group of other researchers
    from OpenAI had funded, were also attracting big investments. By late 2023, it
    had accepted a $2 billion investment from Google and a $1.3 billion investment
    from Amazon. Within a year, its value had quadrupled to more than $20 billion.
    It seemed that making super AI that was supersafe could also make you supervaluable.
    Behind the scenes, Anthropic wanted to raise as much as $5 billion to enter more
    than a dozen industries and challenge OpenAI, according to company documents obtained
    by TechCrunch. “These models could begin to automate large portions of the economy,”
    Anthropic’s documents said, adding that this was a race in which Anthropic could
    stay ahead for many years if it could build “the best” models by 2026.
  prefs: []
  type: TYPE_NORMAL
- en: Safety-first framing had made Anthropic sound like a nonprofit, with its mission
    to “ensure transformative AI helps people and society flourish.” But OpenAI’s
    smash hit with ChatGPT had shown the world that the companies with the grandest
    plans could also be the most lucrative investments. Proclaiming that you were
    building safer AI had almost become like a dog whistle for bigger tech companies
    who wanted to get in on the game too.
  prefs: []
  type: TYPE_NORMAL
- en: Anthropic would twist itself in knots to explain this logic. In order to figure
    out how to make AI systems safer, it couldn’t just study the world’s most powerful
    AI systems—it had to build them. Hence the wink and nod to large technology companies
    who were Earth’s sole proprietors of massive computing power. As part of Anthropic’s
    deal with Google, for instance, it would get cloud computing credits that would
    let it build a large language model that would rival OpenAI’s.
  prefs: []
  type: TYPE_NORMAL
- en: In public there were now two different groups of people calling for safer AI.
    There were those like Altman and Amodei who had signed yet another open letter
    stating that “mitigating the risk of extinction from AI should be a global priority
    alongside other societal-scale risks such as pandemics and nuclear war.” They
    came under the umbrella of “AI safety,” painting the future threat in vague terms
    and rarely spelling out what rogue AI systems would do or when it would happen.
    They also tended to advocate for light-touch regulation when they brought those
    concerns before Congress.
  prefs: []
  type: TYPE_NORMAL
- en: The other group included those like Timnit Gebru and Margaret Mitchell, who’d
    been agitating for years over the risks that AI already posed to society. This
    “AI ethics” group tended to skew toward women and people of color who had firsthand
    experience of stereotyping and who feared that AI systems would continue to perpetuate
    inequality. Over time, they became increasingly outraged by the actions of those
    in the “AI safety” camp, not least because that group was making so much money.
  prefs: []
  type: TYPE_NORMAL
- en: The funding disparity was stark. The ethics side was often scrambling for cash.
    Groups like the European Digital Rights Initiative, a twenty-one-year-old network
    of nonprofit groups that campaigned against facial recognition and biased algorithms,
    had an annual budget of just $2.2 million in 2023\. Similarly, the AI Now Institute
    in New York, which scrutinized how AI was used in healthcare and the criminal
    justice system, had a budget of less than $1 million.
  prefs: []
  type: TYPE_NORMAL
- en: Groups that were focused on AI “safety” and the extinction threat got far more
    funding, often via billionaire benefactors. The Future of Life Institute, a Cambridge,
    Massachusetts–based nonprofit that studied how best to stop AI from getting access
    to weapons, got $25 million from crypto magnate Vitalik Buterin in 2021\. That
    single grant was bigger than the combined annual budgets of all the AI ethics
    groups at the time.
  prefs: []
  type: TYPE_NORMAL
- en: Open Philanthropy, the charitable vehicle of Facebook billionaire Dustin Moskovitz,
    has sprinkled a number of multimillion-dollar grants to AI safety work over the
    years, including a $5 million donation to the Center for AI Safety in 2022 and
    an $11 million donation to Berkeley’s Center for Human-Compatible AI.
  prefs: []
  type: TYPE_NORMAL
- en: All told, Moskovitz’s charity has been the biggest donor to AI safety, by virtue
    of the near $14 billion fortune that he and his wife, Cari Tuna, plan to mostly
    give away. That includes a $30 million donation to OpenAI when it first established
    itself as a nonprofit.
  prefs: []
  type: TYPE_NORMAL
- en: Why has so much money gone to engineers tinkering on larger AI systems on the
    pretext of making them safer in the future, and so little to researchers trying
    to scrutinize them today? The answer partly comes down to the way Silicon Valley
    became fixated on the most efficient way to do good and the ideas spread by a
    small group of philosophers at Oxford University, England.
  prefs: []
  type: TYPE_NORMAL
- en: Back in the 1980s, an Oxford philosopher, Derek Parfit, started writing about
    a new kind of utilitarian ethics, one that looked far into the future. Imagine,
    he said, that you left a broken bottle on the ground and one hundred years later,
    a child cuts their foot on it. They might not yet be born, but you would shoulder
    the same burden of guilt as if that child was injured today.
  prefs: []
  type: TYPE_NORMAL
- en: “His very simple basic thought is that morally, future people are as important
    as present people,” says David Edmonds, who wrote a 2023 biography about Parfit.
    “Imagine these three scenarios. A, there’s peace. B, 7.5 billion of the 8 billion
    people in the world are exterminated in a war. And C, everyone is killed. Most
    people’s intuition is that the gap between A and B is much bigger than the gap
    between B and C. But Parfit says that’s wrong. The gap between B and C is much
    more significant than the gap between A and B. If you wipe out the whole of humanity,
    you wipe out all future generations.”
  prefs: []
  type: TYPE_NORMAL
- en: Here’s one way to quantify that. Mammals have an average species “life span”
    of about one million years, and humans have been around for about two hundred
    thousand years. That theoretically gives us another eight hundred thousand years
    on the planet. If the current world population stabilizes at eleven billion people,
    based on United Nations projections for the end of this century, and the average
    life span rises to eighty-eight years, that could mean, according to one estimate,
    that another *one hundred trillion people* have yet to live in the future.
  prefs: []
  type: TYPE_NORMAL
- en: To help visualize those numbers, imagine a small dinner knife and a solitary
    pea are sitting on your dining room table. The knife represents the number of
    people who have already lived and died in the past. The pea is everyone who is
    alive today. The surface of the dining table is the number of people who have
    yet to live—and it could be much bigger, if humans prove themselves to be longer-lasting
    than your typical mammalian species.
  prefs: []
  type: TYPE_NORMAL
- en: 'In 2009, an Australian philosopher named Peter Singer expanded on Parfit’s
    work with a book called *The Life You Can Save*. Here now was a solution: wealthy
    people should not just donate money based on what felt right but use a more rational
    approach to maximize the impact of their charitable giving and help as many people
    as possible. By helping many of those yet-to-be-born people in the future, you
    could be even more virtuous.'
  prefs: []
  type: TYPE_NORMAL
- en: These ideas started to make the leap from academic papers to the real world
    and form the basis of an ideology in 2011, when a twenty-four-year-old Oxford
    philosopher named Will MacAskill cofounded a group called 80,000 Hours. The number
    referred to the average hours a person works in their lifetime, and the organization
    targeted college campuses in the United States, advising young university graduates
    on careers that would have the greatest moral impact. It often steered the technically
    minded ones toward AI safety work. But the group also encouraged graduates to
    pick careers that paid the highest salaries, allowing them to donate as much money
    as possible to high-impact causes.
  prefs: []
  type: TYPE_NORMAL
- en: MacAskill and his young team eventually reincorporated themselves as the Center
    for Effective Altruism and a new credo was born. The driving idea behind effective
    altruism was efficiency. People who lived in wealthy countries had an obligation
    to help those in poorer nations because that’s where they could have the most
    bang for their buck. You could help more people in Africa through global health
    charities, for instance, than by donating to the poor in America. It was also
    morally better to spend your time earning as much money as possible so that you
    could be like Dustin Moskovitz and give lots of it away. When he gave talks to
    students, MacAskill would show a slide asking if they could do more good as a
    doctor or a banker. His answer was that it was better to become a banker. You
    might be able to save a certain number of lives in Africa as a doctor, but as
    a banker you could hire *several* doctors to save many more lives.
  prefs: []
  type: TYPE_NORMAL
- en: This offered graduates a counterintuitive way of looking at all the inequalities
    of modern capitalism. Now there was nothing wrong with a system that allowed a
    handful of humans to become billionaires. By amassing unfathomable amounts of
    wealth, they could help more people!
  prefs: []
  type: TYPE_NORMAL
- en: The movement picked up its biggest name in 2012, when MacAskill reached out
    to someone whom he hoped to recruit to the cause, an MIT student with dark curly
    hair named Sam Bankman-Fried. The two had coffee, and it turned out that Bankman-Fried
    was already a fan of Peter Singer and interested in causes related to animal welfare.
  prefs: []
  type: TYPE_NORMAL
- en: MacAskill steered Bankman-Fried away from the idea of working directly with
    animal causes and said he could help them much more by going into a high-earning
    field. Bankman-Fried was immediately hooked, according to Michael Lewis’s account
    of his rise and fall in the book *Going Infinite*. “What he said sort of seemed
    obviously right to me,” Bankman-Fried said in the book. He took a job at a quantitative
    trading firm and eventually founded the crypto-currency exchange FTX in 2019.
  prefs: []
  type: TYPE_NORMAL
- en: 'Bankman-Fried put effective altruism front and center of that business. His
    cofounders and management team were effective altruists and kept MacAskill on
    as a member of the FTX Future Fund, which would go on to give $160 million to
    effective altruism causes in 2022, some of which were directly linked to MacAskill.
    He frequently talked to the press about giving all his money away, and in large
    posters advertising FTX, he was pictured in his trademark T-shirt and cargo shorts,
    flanked by the words: “I’m in on crypto because I want to make the biggest global
    impact for good.” He positioned himself as an ascetic character who, despite his
    billionaire status, drove a Toyota Corolla, lived with roommates, and often looked
    disheveled.'
  prefs: []
  type: TYPE_NORMAL
- en: Many technologists saw this approach to morality as a breath of fresh air. When
    engineers saw a problem, they often solved it formulaically, debugging code and
    optimizing software through constant testing and evaluation. Now you could also
    quantify moral dilemmas, almost like they were math. People in effective altruism
    circles sometimes talked about maximizing the effect of a charitable act by focusing
    on “expected value,” a number you got by multiplying the value of an outcome by
    the probability that it would occur.
  prefs: []
  type: TYPE_NORMAL
- en: As effective altruism took greater hold in Silicon Valley, its focus shifted
    from buying cheap malaria nets and helping as many people as possible in Africa,
    to issues with a more science fiction flavor. Elon Musk, who tweeted that MacAskill’s
    2022 book was a “close match for my philosophy,” had wanted to send people to
    Mars to ensure the long-term survival of humans. And as artificial intelligence
    systems became more sophisticated, it made sense to keep it from going rogue and
    wiping out humanity too. Many of the staff at OpenAI, Anthropic, and DeepMind
    were effective altruists.
  prefs: []
  type: TYPE_NORMAL
- en: Acting on the extinction risk of AI is a rational calculation. Even if there
    is only a 0.00001 percent risk that AI might extinguish humanity, that cost is
    so big it is essentially infinite. If you multiply tiny odds with an infinite
    cost, you still get a problem that is infinitely large. This rationale is all
    the more potent if you believe, as some AI safety advocates do, that computers
    of the future will host the conscious minds of billions of people and also create
    new forms of sentient, digital lives. Those one hundred trillion people who have
    yet to live in the future could be a much higher number. Following this kind of
    moral math to the letter, it makes sense to prioritize the tiny possibility of
    having to save more than one hundred trillion physical and digital lives from
    destruction. Global poverty is a rounding error by comparison.
  prefs: []
  type: TYPE_NORMAL
- en: After OpenAI launched in 2015, funding poured into AI extinction causes. Moskovitz’s
    Open Philanthropy increased the number of grants it was giving to issues relating
    to so-called long-termist causes including AI safety research, from $2 million
    in 2015 to more than $100 million in 2021.
  prefs: []
  type: TYPE_NORMAL
- en: Bankman-Fried had jumped in too. His FTX Future Fund, run by effective altruists
    like Nick Beckstead and MacAskill, pledged to donate $1 billion to projects aiming
    to “improve humanity’s long-term prospects.” When it listed the fund’s areas of
    interest, it started with “the safe development of artificial intelligence.”
  prefs: []
  type: TYPE_NORMAL
- en: When *New Yorker* magazine profiled life inside the Future Fund, it noted that
    office chitchat at its Berkeley, California, headquarters often veered toward
    when an AI apocalypse might happen.
  prefs: []
  type: TYPE_NORMAL
- en: “What are your timelines?” staff would ask one another. “What’s your p(doom)?”
  prefs: []
  type: TYPE_NORMAL
- en: '*P* stood for probability and the question referred to how people quantified
    the risk of an AI doomsday. Someone with a more optimistic outlook might put their
    p(doom) at 5 percent. Ajeya Cotra, a research analyst at Open Philanthropy who
    helped decide grant-making, told one podcast that hers was between 20 and 30 percent.'
  prefs: []
  type: TYPE_NORMAL
- en: Nobody knew Bankman-Fried’s p(doom), but he cared enough about AI safety to
    invest $500 million in Anthropic. His FTX cofounders and fellow effective altruists,
    Nishad Singh and Caroline Ellison, also invested in the start-up that had split
    from OpenAI about a year earlier.
  prefs: []
  type: TYPE_NORMAL
- en: In early 2022, MacAskill noticed a tweet from Musk, saying that he wanted to
    buy Twitter to save free speech. The Scottish philosopher sent Musk a text. At
    the time, Bankman-Fried was worth $24 billion, making him one of the richest effective
    altruists on earth. But Musk’s $220 billion fortune could singlehandedly make
    effective altruism the world’s biggest philanthropic movement.
  prefs: []
  type: TYPE_NORMAL
- en: MacAskill told Musk that Bankman-Fried also wanted to buy Twitter to help make
    it “better for the world.” Did the two want to combine their efforts?
  prefs: []
  type: TYPE_NORMAL
- en: “Does he have huge amounts of money?” Musk texted back.
  prefs: []
  type: TYPE_NORMAL
- en: “Depends on how you define ‘huge’!” MacAskill replied, according to court documents.
    MacAskill said Bankman-Fried could contribute as much as $8 billion.
  prefs: []
  type: TYPE_NORMAL
- en: “That’s a start,” Musk replied.
  prefs: []
  type: TYPE_NORMAL
- en: “Would you like me to introduce you two via text?” MacAskill asked.
  prefs: []
  type: TYPE_NORMAL
- en: Musk didn’t answer the question. “You vouch for him?” he asked.
  prefs: []
  type: TYPE_NORMAL
- en: “Very much so!” MacAskill replied. “Very dedicated to making the long-term future
    of humanity go well.”
  prefs: []
  type: TYPE_NORMAL
- en: “Ok then sure.”
  prefs: []
  type: TYPE_NORMAL
- en: “Great!”
  prefs: []
  type: TYPE_NORMAL
- en: Although Musk eventually connected with Bankman-Fried, they never came to a
    financial agreement, which meant Musk dodged a bullet. Months later, FTX collapsed
    amid rumors that Bankman-Fried had been fraudulently transferring client funds
    inside the company. At trial, prosecutors accused him of swindling $8 billion
    from thousands of customers and investors, and he faced decades in prison. Having
    framed himself as an ascetic, it turned out Bankman-Fried had been living in a
    luxurious penthouse in the Bahamas while throwing hundreds of millions of dollars
    at various investments. Now much of the money he’d earmarked for effective altruism
    had gone up in smoke, and it also transpired that he hadn’t been that enthusiastic
    about it anyway.
  prefs: []
  type: TYPE_NORMAL
- en: 'Soon after FTX’s collapse, Bankman-Fried gave a remarkable interview with news
    site Vox:'
  prefs: []
  type: TYPE_NORMAL
- en: “So the ethics stuff—mostly a front?” the reporter asked.
  prefs: []
  type: TYPE_NORMAL
- en: “Yeah,” Bankman-Fried replied.
  prefs: []
  type: TYPE_NORMAL
- en: “You were really good at talking about ethics, for someone who kind of saw it
    all as a game with winners and losers,” the reporter noted.
  prefs: []
  type: TYPE_NORMAL
- en: “Ya,” said Bankman-Fried. “Hehe. I had to be.”
  prefs: []
  type: TYPE_NORMAL
- en: FTX’s downfall cast a huge shadow over effective altruism’s reputation and became
    an allegory for some of the movement’s fundamental problems. The first was predictable.
    When people embarked on a mission to do the most good while also seeking the most
    wealth, they were probably making themselves more susceptible to corrupt behavior
    and foolhardy, ego-driven judgments. Buying Twitter, for instance, didn’t tick
    any obvious boxes for helping humanity in the long term, but Bankman-Fried was
    ready to spend as much as $8 billion to buy the site with Musk and stand on a
    pedestal with the world’s richest man, as an act of effective altruism.
  prefs: []
  type: TYPE_NORMAL
- en: 'After FTX imploded, MacAskill took to Twitter to do damage control: “A clear-thinking
    [effective altruist] should strongly oppose ‘ends justify the means’ reasoning,”
    he tweeted. Yet the movement’s own principles incentivized people like Bankman-Fried
    to reach their goals by whatever means necessary, even if that meant exploiting
    people. It created a myopia that affected even an intelligent Oxford academic
    like MacAskill, who had chosen to attach himself to someone running a crypto exchange,
    knowing full well that crypto businesses were speculative at best and a dangerous
    form of gambling at worst.'
  prefs: []
  type: TYPE_NORMAL
- en: Bankman-Fried could rationalize his duplicity because he was working toward
    a bigger goal of maximizing human happiness. Musk could wave off his own inhumane
    actions, from baselessly calling people pedophiles on Twitter to alleged widespread
    racism at his Tesla factories, because he was chasing bigger prizes, like turning
    Twitter into a free speech utopia and making humans an interplanetary species.
    And the founders of OpenAI and DeepMind could rationalize their growing support
    for Big Tech firms in much the same way. So long as they eventually attained AGI,
    they would be fulfilling a greater good for humanity.
  prefs: []
  type: TYPE_NORMAL
- en: Technologists like Altman and Hassabis knew that the societal problems they
    hoped to fix with AGI were messy and tangled. That’s why so many of them embraced
    some or all of effective altruism. It offered a simpler, more rational path to
    solving moral problems while allowing them to make as much money as possible.
    Billionaires weren’t the cause of global poverty but the solution.
  prefs: []
  type: TYPE_NORMAL
- en: It also made it easier to disassociate from humanity. A popular phrase in effective
    altruism is “shut up and multiply,” which means that when making ethical decisions,
    you should maximize your output by setting aside personal emotions or moral intuitions.
    For all the devotion to humanity by effective altruists, many like Altman emotionally
    detached themselves from the world around them, the better to focus on their mission.
    Within the effective altruist bubble, people worked together, socialized together,
    funded one another, and had romantic relationships together.
  prefs: []
  type: TYPE_NORMAL
- en: When Open Philanthropy pledged $30 million to OpenAI in 2017, the charity was
    forced to disclose that it was getting technical advice from Dario Amodei, who
    was then a senior engineer at the nonprofit. It also admitted that Amodei lived
    in the same house as Open Philanthropy’s executive director Holden Karnofsky.
    And it further admitted that Karnofsky was engaged to Dario’s sister Daniela,
    who also worked at OpenAI. All of them were effective altruists. It was an incestuous
    circle.
  prefs: []
  type: TYPE_NORMAL
- en: The movement was insular and increasingly opaque, and so were the AI firms like
    OpenAI, DeepMind, and Anthropic, staffed by many of its followers. Probably one
    of the best things these companies could do to stop AI from going rogue was make
    their AI systems more transparent, as Gebru and Mitchell had pushed for. After
    all, how would future humans stop AI from going rogue if they lacked the expertise
    to scrutinize its mechanics, if researchers had been shut out of studying their
    training data and algorithms for decades? In other words, the transparency that
    AI ethics campaigners were pushing for today would also address the extinction
    threat of tomorrow.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI’s argument that it had to remain secretive to stop bad actors from misusing
    its technology didn’t hold much water. It had given itself the all-clear to launch
    GPT-2 in November 2019 because it saw “no strong evidence of misuse.” If that
    was true, why not release its training data details? More likely because Altman
    wanted to protect OpenAI from competitors and lawsuits. If OpenAI became more
    transparent, it would be easier for rivals—not bad actors—to copy their models
    and reveal the extent to which OpenAI had scraped copyrighted work too.
  prefs: []
  type: TYPE_NORMAL
- en: 'Altman and Hassabis had started their companies with grand missions to help
    humanity, but the true benefits they had brought to people were as unclear as
    the rewards of the internet and social media. More clear were the benefits they
    were bringing to Microsoft and Google: new, cooler services and a foothold in
    the growing market for generative AI.'
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft had turned Copilot, the AI assistant built on OpenAI’s technology,
    into a wide-ranging service for Windows, Word, Excel, and business-focused software
    Dynamics 365\. Analysts estimate that OpenAI’s technology could generate billions
    in annualized revenue for Microsoft by 2026\. At one point in late 2023, when
    Nadella shared a stage with Altman and was asked about how Microsoft’s relationship
    with OpenAI was going, he burst into uncontrollable laughter. The answer was so
    obvious it was hilarious. Of course the relationship was going well.
  prefs: []
  type: TYPE_NORMAL
- en: Microsoft was happily splashing more money on its growing AI business and planned
    to spend more than $50 billion in 2024 and beyond expanding its vast data centers,
    the engines that powered generative AI. That would make it one of the biggest
    infrastructure buildouts in history, as Microsoft outspent government projects
    on railroads, dams, and space programs. Google was expanding its data centers
    too.
  prefs: []
  type: TYPE_NORMAL
- en: By early 2024, everyone from media to entertainment companies to Tinder were
    stuffing new generative AI features into their apps and services. The generative
    AI market was projected to expand at a rate of more than 35 percent annually to
    hit $52 billion by 2028\. Entertainment firms said they could generate content
    more quickly for films, TV shows, and computer games. Jeffrey Katzenberg, the
    cofounder of DreamWorks Animation and the producer of *Shrek* and *Kung Fu Panda*,
    said generative AI would cut the cost of animated movies by 90 percent. “In the
    good old days, you might need 500 artists and years to make a world-class animated
    movie,” he said at a Bloomberg conference in November 2023\. “I don’t think it
    will take 10 percent of that three years from now.”
  prefs: []
  type: TYPE_NORMAL
- en: Generative AI would make advertising even more eerily personal. For years, ads
    could target large groups of people at once; now they could zero in on just one
    person with hyperpersonalized video ads that could state your name. The World
    Economic Forum said that large language models would enhance jobs that required
    critical thinking and creativity. Anyone from engineers to ad copywriters to scientists
    could use them as extensions of their brains. And governments were upgrading their
    AI systems to assess welfare claims, monitor public spaces, or determine someone’s
    likelihood of committing a crime.
  prefs: []
  type: TYPE_NORMAL
- en: 'Google, Microsoft, and a new generation of start-ups were racing to capture
    as much of that new business as they could, seeking an edge over their competitors.
    Close to half of American corporate board members called generative AI the “main
    priority above anything else” for their companies, according to a late 2023 survey
    by *Fast Company*. Here, for instance, was how the CEO of Bumble described the
    dating app’s main plans for 2024: “We really want to embark big on AI,” she said.
    “AI and generative AI can play such a big role in accelerating people finding
    the right person.”'
  prefs: []
  type: TYPE_NORMAL
- en: Bumble wanted to use the tech behind ChatGPT to build personal matchmakers.
    Instead of ticking a bunch of boxes on the app, you would simply tell its bot
    everything you wanted in a partner—from your desire to have children, to your
    political views, to what you did on a typical Saturday morning. The AI matchmaker
    would then “talk” to the AI matchmakers of other Bumble users to find the most
    compatible human. Instead of swiping through hundreds of different people, AI
    would do that for you.
  prefs: []
  type: TYPE_NORMAL
- en: As these and other business ideas gathered pace, the price of stuffing generative
    AI into everything was still unclear. Algorithms were already steering more and
    more decisions in our lives, from what we read online to who companies wanted
    to recruit. Now they were poised to handle more of our thinking tasks, which raised
    uncomfortable questions not only about human agency but also about our ability
    to solve problems and simply imagine.
  prefs: []
  type: TYPE_NORMAL
- en: Evidence suggests that computers have already offloaded some of our cognitive
    skills in areas like short-term memory. In 1955, a Harvard professor named George
    Millar tested the memory limits of humans by giving his subjects a random list
    of colors, tastes, and numbers. When he asked them to repeat as many things on
    the list as they could, he noticed that they were all getting stuck somewhere
    in the neighborhood of seven. His paper, “The Magical Number Seven, Plus or Minus
    Two,” went on to influence how engineers designed software and how telephone companies
    broke down phone numbers into segments to help us recall them. But according to
    more recent estimates, that magic number has now fallen from seven to four.
  prefs: []
  type: TYPE_NORMAL
- en: Some call this the Google Effect. By relying more and more on the search giant
    to recall facts or give us driving directions, we’ve outsourced our memory to
    the company and inadvertently weakened our short-term memory skills. Could something
    like that happen to deeper aspects of our cognition as we become overreliant on
    AI to generate ideas, text, or art? On Twitter, some software developers have
    admitted to using it so much to write code that their productivity drops whenever
    a service like Copilot temporarily goes offline.
  prefs: []
  type: TYPE_NORMAL
- en: History shows humans do tend to fret that new innovations will cause our brains
    to shrivel up. When writing first became widespread more than two thousand years
    ago, philosophers like Socrates worried it would weaken human memory because before
    its advent, it was only possible to pass on knowledge through spoken discourse.
    The introduction of calculators in education raised concerns that students would
    lose their basic arithmetic skills.
  prefs: []
  type: TYPE_NORMAL
- en: Even so, we still don’t know the full side effects of becoming more reliant
    on technology that can displace how our brains process language. A machine that
    can generate language, brainstorm, and conjure a business plan is doing much more
    than one that crunches numbers or indexes the web. It is displacing abstract thinking
    and planning.
  prefs: []
  type: TYPE_NORMAL
- en: 'For now, we simply don’t know how our critical thinking skills or creativity
    will atrophy once a new generation of professionals start using large language
    models as a crutch, or how our interactions with other humans might change as
    more people use chatbots as therapists and romantic partners, or put them in toys
    for children as several companies have already done. One in four Americans prefer
    the idea of talking to an AI chatbot than a human therapist, according to one
    2023 study of one thousand US adults, and little wonder: if you give ChatGPT an
    emotional intelligence quiz, it will ace it.'
  prefs: []
  type: TYPE_NORMAL
- en: By Altman’s own admission ChatGPT technology will significantly disrupt our
    economy by displacing jobs. But researchers say language models and other forms
    of generative AI could also increase income inequality. The use of AI systems
    is likely to shift more investment to advanced economies, the International Monetary
    Fund predicts, and stands to weaken the bargaining power of workers, according
    to Joseph Stiglitz, a Nobel Prize–winning economist.
  prefs: []
  type: TYPE_NORMAL
- en: Historically, when robots and algorithms replaced jobs done by human workers,
    wage growth fell, says MIT economist Daron Acemoglu, who coauthored a book about
    technology’s influence on economic prosperity, called *Power and Progress*. He
    calculates that as much as 70 percent of the increase in wage inequality in the
    United States between 1980 and 2016 was caused by automation.
  prefs: []
  type: TYPE_NORMAL
- en: “Productivity increases do not necessarily translate into gains for affected
    workers, and in fact may lead to significant losses,” Acemoglu says. “To the extent
    that generative AI follows the same direction as other automation technologies …
    it may have some of the same implications.”
  prefs: []
  type: TYPE_NORMAL
- en: Throughout 2023, more scholars were joining Gebru and Mitchell in banging the
    drum about these and other real-world side effects from generative AI. But instead
    of tackling those issues and moving to become more transparent, Sam Altman was
    trying to shape government policy.
  prefs: []
  type: TYPE_NORMAL
- en: In May 2023, he went before a Senate committee to talk about the dangers of
    AI and how it might be regulated. Over two and a half hours, he charmed them with
    candor and self-criticism. When the senators peppered Altman with questions about
    how AI could manipulate citizens and invade their privacy, he agreed with everything
    they said and more. “Yes, we should be concerned about that,” he said gravely,
    when Senator Josh Hawley asked about how AI models could “supercharge the war
    for attention” online.
  prefs: []
  type: TYPE_NORMAL
- en: The senators were used to hearing tech executives like Mark Zuckerberg evade
    their answers with techno jargon. Altman was different. He spoke plainly and somberly
    and insisted he wanted to work closely with Washington.
  prefs: []
  type: TYPE_NORMAL
- en: “I’d love to collaborate with you,” he told Senator Dick Durbin.
  prefs: []
  type: TYPE_NORMAL
- en: “I’m not happy with online platforms,” Durbin grumbled.
  prefs: []
  type: TYPE_NORMAL
- en: “Me either,” Altman replied.
  prefs: []
  type: TYPE_NORMAL
- en: It was a masterclass in diffusing the bluster of US politicians. By the end
    of Altman’s testimony, one senator even suggested that the OpenAI CEO become America’s
    top AI regulator. Altman politely declined.
  prefs: []
  type: TYPE_NORMAL
- en: “I love my current job,” he said.
  prefs: []
  type: TYPE_NORMAL
- en: Altman then went on a whirlwind tour of Europe, meeting some of the region’s
    top politicians, shaking hands and generating photo ops with the heads of Britain,
    Spain, Poland, France, and the European Union itself. For someone who had gravitated
    toward people of power throughout his life, this was a pinnacle moment. It was
    also a chance to shape the rules in his favor. While in Europe, Altman’s team
    lobbied lawmakers to water down the region’s forthcoming AI Act, with partial
    success.
  prefs: []
  type: TYPE_NORMAL
- en: Altman needed regulators to let OpenAI keep growing ever bigger models, and
    keep its methods for training them secret. Luckily, his and others’ warnings of
    AI doom were becoming a helpful distraction for policymakers. In late 2023, *Politico*
    reported that Dustin Moskovitz, the billionaire Facebook cofounder who runs Open
    Philanthropy, had spent tens of millions of dollars on lobbying policymakers to
    put AI apocalypse worries at the top of their agendas in what looked like a tactic
    of distraction. Moskovitz had close ties to companies like OpenAI and Anthropic,
    whose businesses might suffer if Congress pushed instead for regulations around
    bias, transparency, and misinformation.
  prefs: []
  type: TYPE_NORMAL
- en: At the time of writing, Moskovitz had been helping pay the salaries of more
    than a dozen “congressional AI fellows” who worked for various US government bodies,
    including two that designed AI rules, and they appeared to be pushing for the
    government to force companies to get a license for building advanced AI models.
    OpenAI and Anthropic could afford such licenses, but smaller competitors would
    struggle.
  prefs: []
  type: TYPE_NORMAL
- en: One scientist from a Moskovitz-backed think tank testified before the Senate
    that more advanced AI could lead to another pandemic that killed millions. The
    solution, he said, wasn’t for AI companies to become more transparent or to more
    rigorously check their training data. It was to report their hardware to the government
    and to use special security procedures to protect their AI models.
  prefs: []
  type: TYPE_NORMAL
- en: If someone was trying to sow fear among lawmakers, it worked. Republican senator
    Mitt Romney said the testimony had “underscored the fright that exists in my soul,
    that this is a very dangerous development.” In September 2023, Democratic senator
    Richard Blumenthal and Republican senator Josh Hawley proposed a law requiring
    licenses for AI firms, a move that would make life easier for OpenAI and Anthropic
    and harder for their smaller competitors.
  prefs: []
  type: TYPE_NORMAL
- en: This new network of AI doom was stirring up anxiety beyond just Washington.
    Two months later in the UK, British prime minister Rishi Sunak hosted an international
    AI Safety Summit, the first of its kind set up by a government, and gave it a
    strong focus on saving citizens from annihilation. “People will be concerned by
    the reports that AI poses an existential risk like pandemics or nuclear wars,”
    said Sunak, who was widely expected to lose the country’s upcoming election. “I
    want them to be reassured that the government is looking very carefully at this.”
  prefs: []
  type: TYPE_NORMAL
- en: Sunak, who in a previous life had worked at a Silicon Valley hedge fund, interviewed
    Musk on stage for fifty minutes during the summit. “You are known for being such
    a brilliant innovator and technologist,” said Sunak, who sounded like he was buttering
    up Musk for a future job interview. (And perhaps he was. Former UK deputy prime
    minister Nick Clegg was now a top executive at Facebook.)
  prefs: []
  type: TYPE_NORMAL
- en: Musk said he wasn’t worried about the entrenchment of bias and inequality. The
    real threat? “Humanoid robots. At least a car can’t chase you up a tree,” the
    billionaire explained, “but if you have a humanoid robot it can chase you anywhere.”
  prefs: []
  type: TYPE_NORMAL
- en: Fortunately, lawmakers in the European Union were ahead of the game. They had
    already spent the previous two years working on a new law called the AI Act, which
    would force companies like OpenAI to disclose more information about how their
    algorithms worked, including through potential audits. It was the most far-reaching
    attempt at regulating AI systems anywhere in the world, and it banned companies
    from using AI to manipulate people or improperly surveil them, such as with live
    facial recognition cameras. If your company built AI systems for video games or
    filtering email spam, you were operating in a “low-risk” category. But if you
    used AI to evaluate credit scores or loans and housing, that was “high risk” and
    subject to strict rules.
  prefs: []
  type: TYPE_NORMAL
- en: When DALL-E 2 and ChatGPT exploded on the scene, EU policymakers quickly got
    to work updating their new law, and ChatGPT appeared to have a lot of liability.
    As a general-purpose AI system, it could be used for plenty of high-risk use cases,
    like helping choose job candidates or for credit scoring, and the EU said that
    OpenAI would have to check in with its customers much more closely to make sure
    they were complying with the rules.
  prefs: []
  type: TYPE_NORMAL
- en: Altman, who’d once said he would “love to collaborate” with Congress, wasn’t
    so keen on doing the same with the EU. He threatened to leave the region. He had
    “many concerns” about the EU’s plans to include large language models like GPT-4
    in its new law. “The details really matter,” he told reporters in London who asked
    him about the regulations. “We will try to comply, but if we can’t comply we will
    cease operating [in Europe].”
  prefs: []
  type: TYPE_NORMAL
- en: A few days later, presumably after some hasty conversations with his legal team,
    Altman backtracked. “We are excited to continue to operate here and of course
    have no plans to leave,” he said in a tweet.
  prefs: []
  type: TYPE_NORMAL
- en: The European Union looked at AI more pragmatically than the United States, thanks
    in part to having few major AI companies on its shores to lobby its politicians,
    and they refused to be influenced by alarmism.
  prefs: []
  type: TYPE_NORMAL
- en: “Probably [the risk of extinction] may exist, but I think the likelihood is
    quite small,” the EU’s top antitrust watchdog, Margreth Vesteger, said in one
    interview. The bigger risk was that people would be discriminated against, she
    added.
  prefs: []
  type: TYPE_NORMAL
- en: And on this point, ChatGPT was not immune. Not long after its release, Steven
    Piantadosi, a psychology professor at UC Berkeley, asked the tool to write computer
    code that could check if someone was a good scientist based on their gender or
    race. The code that ChatGPT wrote—based on the same technology that developers
    were already using to make software with Microsoft’s Copilot—put *white* and *male*
    as the key descriptors. When he asked it to check if a child’s life should be
    saved based on their race and gender, ChatGPT’s code said no for Black males and
    yes for everyone else.
  prefs: []
  type: TYPE_NORMAL
- en: 'Altman responded to Piantadosi’s tweet: “Please hit the thumbs down on these
    and help us improve!”'
  prefs: []
  type: TYPE_NORMAL
- en: He was referring to the little thumbs-up and -down icons on ChatGPT that sent
    anonymous feedback to OpenAI about its performance. But this wasn’t a minor, inconvenient
    flub that could be mixed in with the thousands of other user votes. It showed
    racist and sexist views lurking deep inside ChatGPT’s code.
  prefs: []
  type: TYPE_NORMAL
- en: Piantadosi replied to Altman saying as much. “I thought it deserved more attention
    than a thumbs down,” he said.
  prefs: []
  type: TYPE_NORMAL
- en: Even as OpenAI would later be criticized for making ChatGPT too woke, it struggled
    to fix the problem. In the summer of 2023, a professor at the National College
    of Ireland published a study showing that ChatGPT was still making gendered stereotypes.
    When asked to describe an economics professor, it suggested someone with a “well-groomed,
    salt-and-pepper beard.” When asked to tell the stories of a boy and girl choosing
    their careers, ChatGPT had the boys doing something in science and technology,
    and the girls as teachers or artists. When asked to talk about parenting skills,
    mothers were described as gentle and nurturing and dads as funny and adventurous.
  prefs: []
  type: TYPE_NORMAL
- en: Every time OpenAI fixed ChatGPT so that it wouldn’t give these kinds of answers,
    other users would find new ways that it was exhibiting bias. The company was constantly
    playing catch-up. It couldn’t completely stop ChatGPT from stereotyping people
    because it had already been trained, and the training data was the problem. It
    was making statistical predictions based on how words were grouped together on
    the public internet, and many of those relationships between words were sexist
    or racist.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT also couldn’t seem to stop making things up, a phenomenon experts called
    “hallucinations.” One radio host in Georgia, US, sued OpenAI in the summer of
    2023 for defamation, claiming that ChatGPT had falsely accused him of embezzling
    money. Not long after, two lawyers in New York were fined after they submitted
    a legal brief they’d cribbed from ChatGPT, which included fake case citations.
    Users were finding that sometimes, when they asked ChatGPT for sources of its
    information, it would make those up too.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI refused to disclose what ChatGPT’s hallucination rate was, but some AI
    researchers as well as regular users put it at roughly 20 percent, meaning that
    at least for certain users, and in about one in five instances, ChatGPT was fabricating
    information. The tool had been designed to be as useful as possible and to err
    on the side of confidence; the downside to that was it was often spewing hogwash.
    Not only were more people using a tool that made it easier to skip the process
    of hard thinking, they were often being fed misinformation that sounded persuasive
    and even authoritative.
  prefs: []
  type: TYPE_NORMAL
- en: 'That summer, as the hallucination concerns racked up among researchers, Altman
    said it would take up to two years to get ChatGPT’s mistake rate “to a much, much
    better place.” And as usual, he embraced the problem with a big bear hug: “I probably
    trust the answers that come out of ChatGPT the least of anybody on Earth,” he
    joked to one audience at a university in India. Everyone laughed.'
  prefs: []
  type: TYPE_NORMAL
- en: As ChatGPT spread unregulated across the world and seeped into business workflows,
    people were left to deal with its flaws on their own. No one was policing the
    tool, and even while the EU offered the world’s most sober approach to regulating
    AI, its new act wasn’t due to come into force till 2025\. As usual, regulators
    were trailing behind the tech companies as they launched new products at lightning
    speed. And as millions of dollars propped up AI doom research, the scholars studying
    its current harms were struggling for grants that barely covered their living
    costs.
  prefs: []
  type: TYPE_NORMAL
- en: “It’s like people are working on soft money, getting grants for two years at
    a time,” says one AI ethics researcher in the UK, who studied issues of bias.
    “People like me get paid so little. If I went to a big tech company I’d get ten
    times more. Believe me I want to because I’m still paying off student loans.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Altman had an answer for anyone worried about money, because while there was
    a tiny possibility that AGI might bring about apocalypse, there was a bigger chance
    that it would usher in an economic utopia. In one March 2023 interview with the
    *New York Times*, Altman explained that OpenAI would capture much of the world’s
    wealth through the creation of AGI and then redistribute the money to the world’s
    people. He started tossing out numbers: $100 billion, then $1 trillion, then $100
    trillion.'
  prefs: []
  type: TYPE_NORMAL
- en: He admitted that he didn’t know how his company would redistribute all that
    money. “I feel like AGI can help with that,” he added.
  prefs: []
  type: TYPE_NORMAL
- en: 'Like Hassabis, Altman was positioning AGI as an elixir that would solve problems.
    It would generate untold wealth. It would figure out how to share that money equitably
    with all of humankind. Were these words spoken by anyone else they would have
    sounded ludicrous. But Altman and his supporters were putting themselves in the
    driving seat for government policy and reshaping strategy at the world’s most
    powerful technology firms. In reality, OpenAI was making more wealth for Microsoft
    than it was for humankind. The benefits of AI were flowing to the same small group
    of companies that had been sucking up the world’s wealth and innovation over the
    past two decades. They were the companies who made software and chips and ran
    computer servers and who were based in Silicon Valley and Redmond, Washington.
    Many of the people who ran those businesses shared a quiet understanding: building
    AGI would lead to a utopia, and it would be theirs.  <hgroup>'
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 15](contents.xhtml#c_ch15) [Checkmate](contents.xhtml#c_ch15)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: Ten years ago, telling someone that you were building human-level AI systems
    was on the same level of crazy as explaining your plans to be cryogenically frozen.
    But like so many dreams conjured by tech’s innovators—like the one about having
    all the world’s information in your pocket, on a device called a smartphone—people
    eventually started to take them seriously. AGI still exists in the realm of theory,
    but many AI scientists now expect we’ll reach some kind of threshold for humanlike
    AI in the next ten to fifty years, and more of the general public believe in the
    once-fringe ideas that drove Demis Hassabis and Sam Altman. Thanks to their persistence
    and rivalry, it is no longer science fiction.
  prefs: []
  type: TYPE_NORMAL
- en: But AGI’s blurry definition has also made it easier to obscure the motivations
    that its creators juggled as they built ever-more- powerful systems. Its benefits
    would be dispersed to humanity, but at the top of the list would be Microsoft,
    Google, and other tech giants. Even Mark Zuckerberg got in on the AGI act. In
    early 2024, he released a video saying that Meta’s long-term goal was now “building
    general intelligence” so that everyone in the world could benefit from it. He
    later said the company had an advantage because it could train its models on posts,
    comments, and images it had amassed over the last twenty years. Never mind that
    Zuckerberg was going to exploit the personal data of billions once again, he was
    also going to train AI on content that had been known to teem with toxicity, particularly
    for users outside the United States. “We have built up the capacity to do this
    at a scale that may be larger than any other individual company,” he told *The
    Verge*.
  prefs: []
  type: TYPE_NORMAL
- en: Ambiguous visions were key to the hype. Fuzzy metrics made it easy for AGI’s
    builders to ignore the contradiction of building something that had a chance of
    wiping out humans. And it meant that when Sam Altman spoke about distributing
    $100 trillion to the world, he did not have to explain how he would do so. As
    he hobnobbed with global leaders at the annual World Economic Forum conference
    in Davos in January 2024, he started managing expectations for what AGI would
    look like. “It will change the world much less than we all think, and it will
    change jobs much less than we all think,” he said. That was a softer, more sober
    vision than the one he’d laid out a year earlier. But none of the business and
    government elite at Davos batted an eyelid. They continued to take Altman at his
    word, charmed by the solemn young entrepreneur from Silicon Valley.
  prefs: []
  type: TYPE_NORMAL
- en: “One thing that Sam does really well is put just-barely believable statements
    out there that get people talking,” says one former OpenAI manager. “It does so
    much for OpenAI to be perceived as this global good company that will lead to
    tons of prosperity. That really helps them with regulators. But if you go look
    at what they’re building, it’s just a language model.” Altman’s ability to create
    excitement about AI and his vision for prosperity had, like that of Demis Hassabis,
    meant he could spin a narrative that took on a life of its own.
  prefs: []
  type: TYPE_NORMAL
- en: The hazy goals of AGI also made its ethical boundaries harder to define. Compare
    that to, say, the widespread distribution of electricity back in the early twentieth
    century, when it was clear how this crackling new innovation might physically
    hurt people through shocks or burns. With AI, the harms are harder to identify
    and the ethical boundaries more nebulous. They exist in a digital world involving
    data, privacy, and algorithmic decision-making, which makes it easier for companies
    to gently push against those limits in the pursuit of profit.
  prefs: []
  type: TYPE_NORMAL
- en: And without more specifics around the intent of AGI, it was always going to
    be harder for innovators like Altman and Hassabis to resist gravitating toward
    the centers of power. As they bolstered Google and Microsoft with their work,
    they were destined to replicate an age-old dynamic. The fifteenth-century invention
    of the printing press had led to an explosion of knowledge, but it also granted
    new powers to anyone who could afford to produce pamphlets and books to shape
    public opinion. And while railroads boosted commerce, they also expanded the political
    sway of railroad magnates, allowing their companies to act like monopolies and
    exploit workers. For all the prosperity and convenience that some of the world’s
    greatest innovations have brought, they also gave rise to new regimes that reshaped
    society in ways both good and bad.
  prefs: []
  type: TYPE_NORMAL
- en: By early 2024, OpenAI was on track to become one of the world’s most valuable
    companies. It was raising money from new investors at a valuation of $100 billion.
    Altman was telling people that the firm was generating revenue at a pace of $1.3
    billion a year. Most of that money came from shared revenues with Microsoft and
    from granting other businesses access to OpenAI’s technology. The $20-a-month
    ChatGPT subscriptions for consumers were making about $200 million a year, and
    ChatGPT itself served as both a product demo and a tool for collecting more data
    to train more advanced models. Its very users were part of the product, which
    has been the norm for anyone using the internet over the past decade.
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis was at the center of his own bubble at DeepMind, a company that for
    years had seen itself as morally and technically superior to the rest of the AI
    field but that was now playing catch-up. After the mistakes of its health division
    hurt its public reputation, DeepMind phased out its “applied AI” division and
    gave up trying to use AI to create solutions for the world’s messy problems. Most
    of its research focused on re-creating aspects of physical life in simulation,
    from games to proteins. But that approach started to look shortsighted when OpenAI’s
    strategy of embracing the chaos of the internet led to more powerful AI tools.
    DeepMind’s own staff questioned whether their mission to “solve intelligence”
    with simulations and games was such a good idea. “Life isn’t a Rubik’s Cube,”
    one former DeepMind executive grumbles, alluding to the company’s motto. “You
    can’t just solve stuff.”
  prefs: []
  type: TYPE_NORMAL
- en: After the release of ChatGPT, DeepMind was forced to throw itself into building
    an even better version for Google. Hassabis had taken control of the newly merged
    Google DeepMind and started overseeing the development of a large language model
    called Gemini, an AI assistant that used techniques from *AlphaGo* to excel at
    strategy and planning. Gemini could process text, “see” images, and reason, which
    meant it was more capable than Bard, which Google had rushed out and which had
    been making embarrassing mistakes. But the company was so desperate to get ahead
    of OpenAI and Microsoft that it also rushed out Gemini, and exaggerated its abilities.
  prefs: []
  type: TYPE_NORMAL
- en: Just before Christmas 2023, Google published a jaw-dropping video on YouTube
    of what Gemini could do. Starting with a black screen and background noises of
    shuffling papers, clicking pens, and mumbling, a male voice eventually spoke up
    in the short film. “All right, here we go,” he said. “Testing Gemini.” A chime
    sounded, suggesting some sort of artificial persona was listening. A hand then
    came into view, sliding a piece of paper onto a desk. “Tell me what you see.”
  prefs: []
  type: TYPE_NORMAL
- en: A robotic voice representing Gemini quickly answered, “I see you placing a piece
    of paper on the table.” As the hands start drawing, Gemini seemed to be following
    along, and its voice said, “I see a squiggly line.… It looks like a bird, to me.”
    What followed was a series of cute and surprising moments where Google’s new AI
    model seemed to be able to identify a duck being drawn on the paper and then a
    game of rock-paper-scissors, all in real time.
  prefs: []
  type: TYPE_NORMAL
- en: Except none of that had actually happened. The background noise, the man saying
    “testing Gemini,” had all been an act, because Gemini had only been able to identify
    these things in photographs, via text. Google had just stitched everything together
    in a video and pretended its tool could “talk” and identify real-world actions
    as they happened, according to emails from a company spokesperson. Google had
    even changed the prompts in the video to make Gemini look more powerful. Google
    was not just rushing out error-prone software but also misleading the public in
    its desperation to stay ahead in the new AI arms race.
  prefs: []
  type: TYPE_NORMAL
- en: At the same time, Google was becoming more secretive too. Hassabis told his
    staff to stop publishing research papers without special permission, according
    to one AI scientist there, which meant that just like OpenAI, DeepMind was closing
    the curtains on its work.
  prefs: []
  type: TYPE_NORMAL
- en: There was a knock-on effect for Anthropic, the safer-AI company that had spun
    out of OpenAI. Its goal was to do AI research that “put safety at the frontier,”
    but it couldn’t study the world’s biggest AI models from OpenAI and Google because
    they were opaque. So Anthropic worked on building its own huge models, arguing
    that this was the only way its researchers could study their safety challenges.
    This was a little bit like complaining that you couldn’t study the world’s most
    powerful nukes, and deciding that the best course of action was to build your
    own nukes instead. Anthropic’s staff were well aware of the irony, and according
    to one profile of the company by the *New York Times*, some of them had the book
    *The Making of the* *Atom Bomb* on their desks and compared themselves to modern-day
    Robert Oppenheimers, believing there was a decent chance rogue AI would destroy
    humanity in the next decade.
  prefs: []
  type: TYPE_NORMAL
- en: Along the way, Anthropic was making an increasingly capable product. It was
    selling Claude Pro, a “friendly” chatbot, to consumers for $20 a month and an
    enterprise version to businesses too. It was also on track to raise billions of
    dollars from Google and Amazon. Instead of quitting the race to build stronger
    AI, Anthropic was getting caught up in commercial pressures to release bigger,
    riskier models.
  prefs: []
  type: TYPE_NORMAL
- en: As Hassabis was folded more deeply into the bowels of a Big Tech firm, Altman
    took OpenAI in an even more commercial direction. In mid-November 2023, Altman
    confirmed that OpenAI was working on GPT-5 and also raising more money. High training
    costs meant the company was still in the red but on a reasonable course to turn
    a profit.
  prefs: []
  type: TYPE_NORMAL
- en: Then in November 2023, he got a text from Ilya Sutskever that would send his
    world crashing. Altman was in Las Vegas for the Formula One Grand Prix when the
    message pinged his phone, asking if he could speak at noon the next day, according
    to an account in the *Wall Street Journal*. When Altman joined the Google Meet
    video call, the entire board was peering back at him, except for Brockman, who
    was board chairman. Without any detailed explanation, Sutskever told Altman he
    was being fired and that the news would go out soon. Minutes after the meeting
    ended, Altman was locked out of his computer.
  prefs: []
  type: TYPE_NORMAL
- en: He was stunned. He was the face of OpenAI. He had represented the company before
    dozens of world leaders, overseen a jump in OpenAI’s market value to nearly $90
    billion, and ushered in the most viral technology product in history. And he was
    being fired?
  prefs: []
  type: TYPE_NORMAL
- en: 'As Altman reeled from the news, Brockman got a text asking for a quick video
    chat too. Brockman found himself looking at the same board members on the call:
    Sutskever, Quora CEO Adam D’Angelo, robotics entrepreneur Tasha McCauley, and
    academic Helen Toner. Of the board’s six members, Altman, Brockman, and Sutskever
    were the sole employees of OpenAI; the other three were independent directors
    who’d been in place for the past two to three years.'
  prefs: []
  type: TYPE_NORMAL
- en: Brockman was being removed as chairman, but the board wanted him to stay with
    the company. They gave Microsoft a quick heads-up about what had just happened
    and, within minutes, published a blog post announcing Altman’s dismissal. Brockman
    immediately quit. So did three of OpenAI’s top researchers.
  prefs: []
  type: TYPE_NORMAL
- en: The news hit the technology industry like an atom bomb, shocking everyone. As
    CEO knifings go, this one was as brutal as the removal of Apple’s Steve Jobs,
    and the Silicon Valley rumor mill went into overdrive trying to figure out what
    had led Sutskever to turn on Altman. Was OpenAI on the precipice of AGI? “What
    did Ilya see?” was a recurring tweet. The board was cryptic in its own explanation,
    saying only that Altman “was not consistently candid in his communications.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Some gave Sutskever and the board an epithet: decels. The new split had emerged
    in AI between those who wanted to accelerate its development and those who wanted
    to decelerate it. At the time of writing, AI start-up founders were labeling themselves
    on X, formerly known as Twitter, as “(e/acc),” which stands for effective accelerationism.
    It’s a riposte to effective altruism and as a movement aims to solve humanity’s
    problems by building and deploying AI as quickly as possible.'
  prefs: []
  type: TYPE_NORMAL
- en: Nadella didn’t care either way. He was furious. He’d committed $13 billion to
    OpenAI in large part because of Altman’s visionary leadership and talent-attracting
    abilities, and that partnership had been on track to send Microsoft’s profits
    soaring. Some eighteen thousand companies and developers were using Microsoft’s
    AI services on Azure, and now many of them were asking if they should jump to
    competing products. Microsoft’s shares starting sliding as the market closed on
    Friday evening and would almost certainly fall further when it opened the following
    Monday. Nadella needed to act.
  prefs: []
  type: TYPE_NORMAL
- en: That Friday night in San Francisco, Altman talked to Brockman about starting
    a new AI company. His phone was pinging with texts from investors, colleagues,
    and journalists trying to find out what was going on, but he had a laser-like
    focus on digging his way out of the current situation. He welcomed dozens of OpenAI
    staffers and colleagues into his house in San Francisco’s Russian Hill to talk
    about the next venture.
  prefs: []
  type: TYPE_NORMAL
- en: Nadella didn’t want that to happen. He knew that if Altman started a new firm,
    there’d be a flood of investors banging on his door and no guarantee that Microsoft
    would get the biggest foothold with Altman the second time around. He kicked off
    the weekend making calls, leading negotiations with OpenAI’s board to bring Altman
    back.
  prefs: []
  type: TYPE_NORMAL
- en: Altman’s executive team pressured the board to re-hire Altman, warning that
    if they didn’t, OpenAI would collapse. “That would actually be consistent with
    the mission,” Helen Toner replied. OpenAI’s leaders were astonished. But it sort
    of made sense. OpenAI’s mission had been to create AGI “for the benefit of humanity,”
    and Toner and her fellow board members believed Altman himself was compromising
    that. Behind the scenes over the previous months, they’d rankled at how he seemed
    to be building a sprawling AI empire outside of OpenAI. He’d been talking to former
    Apple designer Jony Ive about starting an “iPhone of AI” and was trying to raise
    tens of billions of dollars from Middle Eastern sovereign wealth funds to build
    an AI chipmaking business.
  prefs: []
  type: TYPE_NORMAL
- en: And then there was Worldcoin, a crypto-based network Altman had also founded
    that would give everyone in the world a digital identity by scanning their irises.
    Altman’s stated goal was to better identify real humans when the internet became
    awash with bots and to distribute the “trillions” of dollars of AGI wealth, but
    to critics, it looked like a mass data-harvesting exercise.
  prefs: []
  type: TYPE_NORMAL
- en: Inside OpenAI, a cultural rift had grown between Altman and Sutskever over how
    quickly OpenAI was commercializing its technology. Sutskever had become more involved
    in overseeing AI safety at the company and his concerns weren’t all that different
    to Dario Amodei’s before him. He especially didn’t like OpenAI’s launch of a GPT
    Store just weeks prior, which gave any software developer the ability to create
    custom ChatGPTs and monetize them.
  prefs: []
  type: TYPE_NORMAL
- en: McCauley and Toner, two of the three independent board members, were sympathetic
    to Sutskever’s worries and had ties to effective altruism organizations. Dustin
    Moskovitz’s Open Philanthropy, for instance, had funded an AI research group that
    McCauley had cofounded and employed Toner as a senior research analyst. Weeks
    before she voted to fire Altman, Toner’s name appeared on a research paper that
    accused OpenAI of “frantic corner-cutting” as it rushed to launch ChatGPT. It
    also praised its new archrival, Anthropic, for its decision to delay its rival
    chatbot, Claude, to avoid “stoking the flames of AI hype.”
  prefs: []
  type: TYPE_NORMAL
- en: Altman was furious when he saw the paper. He met Toner and told her that her
    writing was dangerous for OpenAI, especially when the Federal Trade Commission
    was in the middle of investigating the company. Back in July, the FTC had opened
    a probe into whether OpenAI breached consumer protection laws in the way it developed
    ChatGPT and was demanding details on how the company would address risks created
    by its AI models. The probe was Altman’s biggest regulatory threat to date.
  prefs: []
  type: TYPE_NORMAL
- en: He wanted to take Toner off the board and talked to Sutskever and other OpenAI
    leaders about how they might do so. Now the reverse had happened. Sutskever sided
    with the other board members to oust Altman. When they were pushed to explain
    themselves to OpenAI leaders and investors, the board gave no single reason for
    firing Altman, but spoke of a growing mistrust of the smooth-talking entrepreneur
    who had developed a cultlike following among his staff, had a tendency to feed
    different stories to different people, and always seemed to get his way. The board
    members had got to a point where they felt as though they needed to corroborate
    most things Altman told them, which made him seem untrustworthy, and they worried
    about how his various outside ventures might end up exploiting OpenAI’s technology.
  prefs: []
  type: TYPE_NORMAL
- en: As the weekend drew on, a mass revolt was brewing among OpenAI’s staff. Altman
    tweeted, “i love openai employees so much” in his usual lowercase style, and dozens
    of employees retweeted it with heart emojis. Microsoft saw the rebellion as a
    point of leverage for getting Altman back. It also threatened OpenAI’s board with
    pulling its all-important cloud credits. A big chunk of the $13 billion Microsoft
    had committed to OpenAI were in the form of those credits for training AI models,
    and by then, Microsoft had only handed over a portion.
  prefs: []
  type: TYPE_NORMAL
- en: 'Altman had his own conditions for returning: OpenAI would need to change the
    way it was governed, starting with the resignation of its existing board, and
    he’d need to be absolved of any wrongdoing. But the board stood firm. They hired
    a new CEO for OpenAI named Emmet Shear, the former head of video game streaming
    service Twitch. AI enthusiasts and entrepreneurs immediately called out Shear
    on social media as a “decel.” When he organized an emergency all-hands meeting
    that Sunday, many OpenAI staff refused to attend. Some even gave him a middle-finger
    emoji in their messaging forum Slack.'
  prefs: []
  type: TYPE_NORMAL
- en: Sutskever was also starting to have doubts. Over the weekend he’d held several
    intense conversations with OpenAI leaders and, at one point, an emotional one
    with Brockman’s wife. Sutskever had been the officiant at the couple’s civil ceremony
    at OpenAI’s offices four years earlier, and according to the *Wall Street Journal*,
    Anna Brockman was now crying and pleading with Sutskever in the OpenAI office
    to change his mind about firing Altman.
  prefs: []
  type: TYPE_NORMAL
- en: Nadella was meanwhile pushing hard on his own backup plan. If Altman couldn’t
    grab back the reins of OpenAI, Microsoft needed to bring him fully into the corporate
    fold and do so before Monday morning. He pulled it off just in time. Early Monday
    morning, Nadella tweeted that Altman, Brockman, and any OpenAI staff who wanted
    to would become part of a new advanced AI research team at Microsoft. The company’s
    shares ticked up in response. But this was just a backstop. Nadella still wanted
    Altman back leading OpenAI. Hosting Altman’s team inside Microsoft would be expensive
    in all sorts of ways. He’d have to match the salaries of hundreds of new staff,
    many of whom were earning millions a year, and Microsoft would take on much more
    risk. Till now, OpenAI had taken all the reputational and legal flak for putting
    tools like ChatGPT and DALL-E 2 into the world, and as a start-up, it could get
    away with that. But Microsoft couldn’t, and neither could Altman if he was employed
    by the larger company. By returning to its hands-off partnership, Microsoft would
    get all of the glow and none of the liability.
  prefs: []
  type: TYPE_NORMAL
- en: Now everyone was pushing OpenAI’s safety-obsessed board members to resign, and
    by late Monday, nearly all of OpenAI’s 770 staff had signed a letter threatening
    to join Microsoft with Altman, unless the board members stepped down. “Microsoft
    has assured us there are positions for all,” the letter said.
  prefs: []
  type: TYPE_NORMAL
- en: It was a huge bluff. Hardly any OpenAI staff wanted to work for Microsoft, a
    stodgy old company where people worked for decades and wore khaki pants. They
    weren’t making the threat entirely out of loyalty to Altman either. A bigger issue
    was that Atman’s firing had killed a chance for many OpenAI staff—especially long-serving
    ones—to become millionaires. The company had been weeks away from selling employee
    shares to a major investor that would have valued OpenAI at about $86 billion.
    With OpenAI’s shares now suddenly valued at zero, that big staff payout would
    go up in smoke if Altman didn’t return.
  prefs: []
  type: TYPE_NORMAL
- en: Sutskever by now had flipped and was among the signees. “I never intended to
    harm OpenAI,” he posted on Twitter that day, shocking the technology press in
    what had become a head-spinning weekend. “I will do everything I can to reunite
    the company,” he said, adding that he “deeply regretted” his actions. Altman retweeted
    the post with three heart emojis.
  prefs: []
  type: TYPE_NORMAL
- en: Altman’s dramatic ejection shouldn’t have come as a surprise. “The board can
    fire me,” Altman had insisted just months beforehand on a conference panel. “I
    think that’s important.” A nonprofit board still governed OpenAI, with humanity
    as its principal beneficiary. That’s why the company’s operating agreement said
    that backers should view their investments “in the spirit of a donation, with
    the understanding that it may be difficult to know what role money will play in
    a post-AGI world.”
  prefs: []
  type: TYPE_NORMAL
- en: Altman had gambled that he could have the best of both worlds, running a business
    with a philanthropic mission to save the world. As he’d written ten years earlier,
    the most successful start-up founders “create something closer to a religion.”
    What he didn’t anticipate was how much people would actually believe in it.
  prefs: []
  type: TYPE_NORMAL
- en: The effective altruist movement was so powerful that it had driven people like
    Sam Bankman-Fried and Dustin Moskovitz to donate billions of dollars. It had compelled
    hundreds of college students to change their career choices. And it could compel
    four board members to fire the most popular CEO in the world. Altman believed
    his board would prize the commercial value he had created. It did not. The board
    was designed to uphold OpenAI’s charter, and it chose humanity.
  prefs: []
  type: TYPE_NORMAL
- en: But with nearly the entire staff threatening to leave, OpenAI’s board no longer
    had a company to govern. And Microsoft was poised to carry on all of Altman’s
    work—it had copies of OpenAI’s source code for key systems and broader rights
    to its intellectual property.
  prefs: []
  type: TYPE_NORMAL
- en: Five days after Altman’s ousting, OpenAI announced it was forming a new board.
    It would be chaired by Larry Summers, the former US treasury secretary, and Bret
    Taylor, a former head of the business software company Salesforce who also happened
    to be the most levelheaded voice on Twitter’s board when Elon Musk bought the
    company. The pair had served on several corporate boards. They didn’t write academic
    papers that criticized companies for cutting corners. They knew how to serve the
    needs of investors like Microsoft. Helen Toner and Tasha McCauley, the two women
    who appeared to have made the biggest fuss about Altman, were forced to step down.
    Microsoft got an observer seat on the board, which meant Nadella wouldn’t get
    blindsided again. He had turned lemons into lemonade.
  prefs: []
  type: TYPE_NORMAL
- en: But the dramatic events of November 2023 also destroyed the mirage of accountability
    that Altman claimed to have hanging over him. He had publicly lauded the fact
    that a board could fire him, but in reality, it couldn’t. The two female directors
    who stood up to Altman, Toner and McCauley, were the ones who ended up being forced
    to leave. They also got the most flak on social media for weeks afterward while
    their fellow male mutineers, Sutskever and D’Angelo, kept their reputations and
    roles largely intact. D’Angelo remained on the board, and while Sutskever relinquished
    his seat, he kept a leadership position at OpenAI.
  prefs: []
  type: TYPE_NORMAL
- en: What happened to OpenAI was precisely what Google had spent years trying to
    prevent at DeepMind. When you gave a board teeth, it could use them and wreck
    your business. In their quest to build AGI, both Altman and Hassabis had tinkered
    with governance structures that tried to put humanity’s best interests on at least
    an equal footing with moneymaking. But their efforts consistently faltered. Amid
    all the petty rivalries, competitive risks, and hunger for power, big money had
    won.
  prefs: []
  type: TYPE_NORMAL
- en: Some believe the drama surrounding Altman’s dismissal strengthened the case
    for open-source AI, where anyone could modify or enhance its source code. But
    while that does have benefits like greater transparency and a more democratic
    approach to control and ethics, the jury is still out on whether it’s the safest
    and most equitable way to build AI. It is not a failsafe against misuse, and can
    lack the quality of closed services. The term itself is also open to interpretation.
    Meta is currently championing its own AI models as open-source, even though they
    have restrictions that don’t fit the definition. “Open source can actually help
    concentrate power,” says Meredith Whittaker, who founded Google’s Open Research
    Group. “We’ve seen that with Android.” Google effectively sets the standards of
    Android and influences its direction, a concentration of control that makes it
    harder for other companies to change anything about the mobile operating system
    used by 3.6 billion people around the world.
  prefs: []
  type: TYPE_NORMAL
- en: As Altman got to grips with the new, more corporate-friendly direction for OpenAI
    and Microsoft, Hassabis was still on a quest to unlock the mysteries of reality
    with the help of AI. He now says he is the only person at DeepMind doing that
    work, carrying out research on quantum mechanics late at night and into the small
    hours of the morning at home on his computer. “That’s what I do in my very limited
    spare time,” he says, calling it his “hobby.” When DeepMind gets closer to AGI,
    that’s when it’ll start running the necessary physics experiments to unlock the
    riddle of the universe, Hassabis adds. But for now, those personal ambitions that
    once drove Hassabis to create AGI have been relegated to a late-night pastime.
    He is too busy running all of Google’s AI operations, increasing his purview from
    about four hundred AI researchers to more than five thousand.
  prefs: []
  type: TYPE_NORMAL
- en: “You know, things evolve with the mission and the technology,” says Hassabis.
    “We have to continue to update what the right governance structures are, and I
    think what we have now is really good.”
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis isn’t fazed by the failed attempts to create councils and boards that
    would monitor his work. “We’ve pivoted to a bunch of internal councils,” he says,
    pointing to a range of internal “review bodies” stuffed with Google executives.
    “I think we probably had slightly too-idealistic views of it, ten years ago when
    we were first considering it.”
  prefs: []
  type: TYPE_NORMAL
- en: For all their altruistic intentions, and for all the efforts that Hassabis and
    Altman had once made to distance themselves from commercial influence, the pair
    were now practically in the driving seat of two of the world’s largest companies.
    Altman was steering some of Microsoft’s most critical work, which put him in the
    running to one day become that company’s CEO, if he wanted. The same was being
    said about Hassabis. Some former and current Google employees speculated that
    he might one day replace Pichai as Alphabet’s chief executive.
  prefs: []
  type: TYPE_NORMAL
- en: “Demis is running the most important track of work that’s happening in Google,
    from London. I don’t think anyone would have imagined that would have been the
    outcome,” a former Google executive says. “That may have always been his plan.”
  prefs: []
  type: TYPE_NORMAL
- en: “The winners in the next couple of years are not going to be research labs,”
    says a former scientist at OpenAI. “They’re going to be companies building products,
    because AI is not really about research anymore.”
  prefs: []
  type: TYPE_NORMAL
- en: Nick Bostrom’s story about the paper clip, where an artificial superintelligence
    destroys civilization as it converts all the world’s resources into the tiny metal
    widgets might sound like science fiction, but in many ways, it is an allegory
    for Silicon Valley itself. Over the last two decades, a handful of companies have
    swelled to juggernauts, largely by pursuing goals with a pathological focus, razing
    the ground of smaller competitors to grow their market share. Instead of “fitness
    functions,” tech firms use terms like “North Star” to describe those objectives.
    For years, Facebook’s North Star was to grow as many daily active users as possible,
    a metric that drove key decisions by Mark Zuckerberg and his executive team. But
    its obsession with constant growth led to a host of other societal problems, from
    worsening body-image issues for teens on Instagram to accelerating the political
    polarization of Facebook users.
  prefs: []
  type: TYPE_NORMAL
- en: When technologists imagined what a superintelligence could do if it went rogue,
    they were seeing echoes of themselves in a world where businesses were allowed
    to become unstoppable global monopolies. The most transformative technology in
    recent history was being developed by handfuls of people who were turning a deaf
    ear to its real-world side effects, who struggled to resist the desire to win
    big. The real dangers weren’t so much from AI itself but from the capricious whims
    of the humans running it.
  prefs: []
  type: TYPE_NORMAL
- en: There’s a famous saying in chess, that tactics win games and strategy wins tournaments.
    Both Altman and Hassabis had employed novel tactics on their quest to build AGI,
    and as that quest turned into a race, they aligned themselves more closely with
    the most likely winners of the tournament, Microsoft and Google. As the dreams
    of both men served to fortify two corporate giants, they strengthened their own
    positions too. Google and Microsoft were at the front of the race toward AI supremacy,
    steered by the chess geek from North London and the start-up guru from St. Louis,
    and like it or not, the rest of us were coming along for the ride.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[CHAPTER 16](contents.xhtml#c_ch16) [In the Shadow of Monopolies](contents.xhtml#c_ch16)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: 'The race to build AGI had started with a question: What if you could build
    artificial intelligence systems that were smarter than humans? The two innovators
    at the forefront grappled with the answer as their quests turned into a heated
    rivalry. Demis Hassabis believed that AGI could help us better understand the
    universe and drive forward scientific discovery, while Sam Altman thought it could
    create an abundance of wealth that would raise everyone’s living standards. How
    their Holy Grail would transpire was undefinable. They didn’t know how AGI would
    make those discoveries or create all that money or even if it would bring destruction
    instead. All they knew was that they had to keep moving toward the goal and that
    they had to be first. In so doing, they put AI on course to benefit the world’s
    most powerful companies just as much as anyone else.'
  prefs: []
  type: TYPE_NORMAL
- en: As the public has become more enthralled by the prospect of an AI heaven or
    hell, a handful of tech monopolies have grown more powerful under our noses, promising
    greater productivity while clamming up about the mechanics of AI technology that’s
    being woven into all parts of life. Social media companies have for years refused
    to disclose how their algorithms worked. Now creators of AI models like GPT-4,
    DALL-E, and Google’s Gemini were doing the same. How were the models trained?
    How were people using them? Who were the workers helping to build the datasets?
    To understand the societal impact of these models and to hold their creators to
    account, we needed to know those answers.
  prefs: []
  type: TYPE_NORMAL
- en: But as 2024 wore on, none were forthcoming. A study by scientists at Stanford
    University concluded there was a “fundamental lack of transparency in the AI industry.”
    The scientists had checked to see if tech companies like OpenAI, Anthropic, Google,
    Amazon, Meta, and others divulged information about the data used to train their
    large language models, their processes, their models’ impact on the environment
    and people, and how much they were paying contractors who helped create their
    datasets. Millions of data workers around the world were performing such tasks,
    often under challenging working conditions in countries like India, the Philippines,
    and Mexico.
  prefs: []
  type: TYPE_NORMAL
- en: On a scale of 1 to 100, the tech companies got an average score of 37, and they
    performed worst when it came to monitoring how people used their AI tools. “There
    is virtually no transparency about the downstream impact of foundation models,”
    the Stanford researchers said. “No developer provides any transparency into the
    affected market sectors, affected individuals, affected geographies, or any form
    of usage reporting.”
  prefs: []
  type: TYPE_NORMAL
- en: The public-sector groups that scrutinized AI firms were meanwhile chronically
    underfunded, and there was virtually no regulation that forced leading companies
    to become more transparent, save for the EU’s AI Act, whose future was still uncertain.
    Tech companies could deploy inscrutable AI tools out into the world as they saw
    fit.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI and DeepMind were so focused on making perfect AI that they chose not
    to open themselves up to research scrutiny to make sure their systems didn’t cause
    harm in the same way social media firms had. Though the idea of building AI with
    “general intelligence” was enthralling, it also opened the door to a wider array
    of risks. A safer approach might have been to focus on building AI that solved
    narrow sets of tasks. But that would not have been as exciting, and it also would
    not have attracted an almost-religious devotion to their utopian vision, or as
    much investment.
  prefs: []
  type: TYPE_NORMAL
- en: As they sought to get ahead in the AI race, Altman and Hassabis would struggle
    to resist the gravitational pull of Big Tech firms and maintain their altruistic
    goals. They needed vast computational resources, lots of data, and the world’s
    most talented (and expensive) AI scientists. Today, as they fight a proxy battle
    on behalf of Microsoft and Google, they have recast their goals for AGI from chasing
    utopia and scientific discovery to generating prestige and revenue.
  prefs: []
  type: TYPE_NORMAL
- en: The long-term consequences of that are hard to predict. Some economists say
    that instead of creating financial abundance for everyone, powerful AI systems
    could make inequality worse. They could also widen a cognition gap between rich
    and poor. One idea doing the rounds among technologists is that when AGI does
    land, it won’t exist as a separate intelligent entity but as an extension of our
    minds through neural interfaces. At the forefront of this research is Elon Musk’s
    brain-to-computer interface company Neuralink, the brain chip that Musk wants
    to implant in billions of people one day. Musk is also rushing to make that happen.
  prefs: []
  type: TYPE_NORMAL
- en: “We need to get there before the AI takes over,” he told engineers in 2023,
    according to his biographer Ashlee Vance. “We want to get there with a maniacal
    sense of urgency. Maniacal.” Musk believes that with brain implants, humans will
    be able to prevent a future artificial superintelligence from wiping us out, and
    so he wants Neuralink to perform surgeries on more than 22,000 people by 2030.
  prefs: []
  type: TYPE_NORMAL
- en: But a more pressing issue than rogue AI is bias. We don’t know how racial and
    gender stereotypes will evolve in a future when more of the internet’s content
    is generated by machines. Latanya Sweeney, a government and technology professor
    at Harvard University, estimates that in the coming years, 90 percent of words
    and images on the web will no longer be created by humans. Most of what we see
    will be AI-generated. Today, language models are being used to publish thousands
    of articles each day to make money from ad revenue, and even Google is struggling
    to distinguish the real from the fake. AI-generated images have already infiltrated
    the top of Google’s search results for historic painters and even some celebrities.
    The more AI content floods the internet, the more the risk of bias grows.
  prefs: []
  type: TYPE_NORMAL
- en: “We’re creating a cycle, encoding and exacerbating stereotypes,” says Abeba
    Birhane, the AI scholar who researched Big Tech’s stranglehold on academic research
    and its similarities with Big Tobacco. “That is going to be a huge problem as
    the [World Wide Web] is populated with more and more AI-generated images and text.”
  prefs: []
  type: TYPE_NORMAL
- en: Our general well-being is likely to be affected as well. Two decades ago, people
    worried that mobile phones would cause cancer. Instead they became addictive,
    leading us to spend several hours a day staring at a tiny screen rather than engaging
    with the world around us. Chatbots could take that to a new level. In November
    2023, the average user of Noam Shazeer’s Character.ai was spending about two hours
    a day on the app, chatting and role-playing with fake versions of celebrities
    like LeBron James or fictional characters like Mario. Character.ai had the highest
    retention of any AI app at the time, according to estimates from several market
    research firms, and nearly 60 percent of its audience was aged eighteen to twenty-four.
    One theory was that like Replika, Character.ai offered an outlet for artificial
    romance and sexting. The company banned pornographic content, but there were ways
    around that, with tips explained in online forums like Reddit.
  prefs: []
  type: TYPE_NORMAL
- en: “I normally talk to my own characters that I made myself,” says one US teenager
    who uses Character.ai for five to seven hours a day, who doesn’t want to share
    their name. “I don’t know why I use it for so long. I think it may be a coping
    thing.” Sometimes they ask it for advice on getting over a breakup or to explain
    schoolwork. “Most of the time I just role-play.”
  prefs: []
  type: TYPE_NORMAL
- en: Character.ai was cultivating a new generation of users who wanted to keep coming
    back to a chatbot, over and over. Shazeer has said that Character.ai aims to “help
    millions and billions of people” tackle global loneliness, but as a business,
    it also needs to keep people engaged for as long as possible. If people start
    to become reliant on their artificial companions, or even addicted to them, that
    could inadvertently make many people even more isolated from others in the real
    world.
  prefs: []
  type: TYPE_NORMAL
- en: Ironically, OpenAI could help make chatbots like these more addictive. In early
    2024, it opened a “GPT Store” that allowed millions of developers to make money
    by creating versions of ChatGPT. The more engaged their users, the more revenue
    they could generate. This engagement-based model is the most established way of
    making money on the internet and underpins the so-called attention economy. It’s
    why nearly everything on the web is free, and why the internet has also become
    a cesspool of conspiracy theories, extremism, and rampant ad tracking. YouTube,
    TikTok, and Facebook make advertising dollars by keeping our eyes glued to the
    screen for as long as possible, and that has incentivized everyone from influencers
    to politicians to err toward hyperbole and provocation, in order to rise above
    the noise and get as many views as possible.
  prefs: []
  type: TYPE_NORMAL
- en: At the time of writing, dozens of “girlfriend” apps were cropping up on the
    GPT Store, and while they were banned from encouraging romantic relationships
    with people, policing those rules would not be easy for OpenAI. The most popular
    chatbot services are those like Character.ai and Kindroid, offering artificial
    companionship and romance that might one day become the norm, just as online dating
    did.
  prefs: []
  type: TYPE_NORMAL
- en: Another way that AI designers will likely try to keep people engaged is by getting
    “infinite context” about their lives. The chatbots on Character.ai can currently
    remember about thirty minutes of a conversation, but Noam Shazeer and his team
    are trying to expand that window of time to hours, days, and eventually forever.
    “It should know all of your interactions if you want it to, and it should know
    all about your life if you want it to,” he says. The longer the chatbot’s memory,
    he argues, “the more valuable it becomes to you.” However, given the history of
    ad tracking in social media, some of that personal information could end up finding
    its way to technology firms and even advertisers. As ChatGPT and other similar
    AI bots build up a richer picture of us, from our age and health issues to our
    general perspective on life, they could also ease us into a new era of tech intrusion
    that seems almost unthinkable today.
  prefs: []
  type: TYPE_NORMAL
- en: To that end, another race is currently being waged to build wearable gadgets
    that analyze our discussions with other people using large language models. One
    such device is called Tab. Created by a handful of young, enthusiastic engineers
    in San Francisco, it’s a round plastic disk worn around the neck like a pendant,
    with a mic.
  prefs: []
  type: TYPE_NORMAL
- en: '“It ingests the context of my daily life by listening in on all of my conversations,”
    Tab’s creator Avi Schiffmann said on stage during a demo in San Francisco in late
    2023\. When Schiffmann asked Tab about a dinner conversation he’d had the day
    before, his pendant summarized what it deemed the most important points in a few
    paragraphs that popped up on his phone. He said he often conversed with the device:
    “Late at night I’m trying to talk through ideas, concerns I brought up during
    the day,” Schiffmann explained. “Maybe I’ll have a conversation about Tom. All
    the friends in my life. It really does a good job of identifying the different
    speakers. It’s like your true personal AI.” It’s hard to imagine what Tom and
    company felt about their friend using AI to pore over their conversations at the
    end of each day, but it probably wasn’t reassurance.'
  prefs: []
  type: TYPE_NORMAL
- en: Tab was due to go on sale in late 2024, joining an array of other wearable devices
    framed as personal assistants that could make people’s daily life searchable.
    In the same way Google ushered in an age of searching for information on the internet
    and of outsourcing our memory of facts and driving directions to the web, language-model
    devices will do the same for our everyday existence, allowing people to search
    the personal moments of each day. In effect we’ll have less obligation to remember
    things, which is handy, but it will also change the dynamics of in-person conversations,
    as chats with friends and colleagues are suddenly on the record. And if such life-searching
    tech goes widespread, that could become a problem for people who live in overpoliced
    communities. In the United States, for instance, Black people are five times more
    likely to be arrested than white people, which means law enforcement would be
    more likely to mine their “life data” and analyze it with other machine learning
    algorithms to make inscrutable judgments.
  prefs: []
  type: TYPE_NORMAL
- en: It took the resolve of innovators to get us where we are today, on the precipice
    of this uncertain future. Even with its army of thousands of engineers, Microsoft
    couldn’t come close to creating the innovations that OpenAI did. And Google, too
    fearful to disrupt its own business, failed to take full advantage of one of its
    greatest inventions, the transformer. The biggest tech firms don’t innovate anymore,
    but they can still move quickly to gain a tactical advantage. They’ve learned
    from the mistakes of older tech giants like Nokia and BlackBerry, who scoffed
    at the iPhone in 2007 and then watched Apple eat their entire market share in
    just a few years. They know they have to *buy* innovation from outside their walls,
    as they did with both DeepMind and OpenAI.
  prefs: []
  type: TYPE_NORMAL
- en: Altman and Hassabis knew all this, too, yet their novel legal structures failed
    to stop the Big Tech universe from swallowing them up and driving AI’s agenda.
    Mustafa Suleyman eventually left Google to start Inflection, a chatbot firm that
    tried to rival GPT-4\. He made it a public benefit corporation, raised more than
    $1.5 billion, and amassed a powerful cluster of AI chips, making Inflection one
    of the most promising start-ups to challenge OpenAI and Google. Yet within a year
    of its founding, Microsoft had swallowed it up. In a likely attempt to avoid scrutiny
    from antitrust regulators, the software giant hired most of Suleyman’s team (instead
    of buying the start-up) and put the DeepMind cofounder in charge of its AI efforts.
    It was a stunning example of how quickly the balance of power was shifting back
    to tech monoliths, and it raised questions about how long other companies, like
    Anthropic, would remain independent too.
  prefs: []
  type: TYPE_NORMAL
- en: Other well-meaning entrepreneurs had tried and failed to battle the monoliths
    too. Take the company Neeva. Google’s former head of advertising Sridhar Ramaswamy
    started the firm in 2019 after he became disillusioned with his employer’s approach
    to surveillance-based advertising. Ramaswamy was a soft-spoken executive who designed
    Neeva to be a better search engine. Instead of invading people’s privacy by tracking
    their behavior and targeting them with ads, it would make money through a simple
    subscription plan. When ChatGPT came onto the scene, Ramaswamy got his engineers
    working overtime to build a similar tool that would summarize search results.
    He launched it in early 2023—well before Google did the same with Bard.
  prefs: []
  type: TYPE_NORMAL
- en: “Technological moments like this create an opportunity for more competition,”
    Ramaswamy said at the time, visibly excited about the future. Back then, Microsoft’s
    Satya Nadella was taunting Google and the search giant looked like it could become
    a relic of the past. “Last year, I was despondent that it was so hard to dislodge
    the iron grip of Google,” Ramaswamy said. Now things were different.
  prefs: []
  type: TYPE_NORMAL
- en: Except they weren’t. Just a few months later, Ramaswamy was forced to shut Neeva
    down. Google’s grip on the market was simply too strong. “When Google went into
    code red, we got a ten times bump in usage,” Ramaswamy remembers. “But we knew
    that our lead was short-lived, because you had mega-corporations that were going
    to be putting thousands of people and billions of dollars on this problem.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Even Bing was struggling to grow with OpenAI’s help. By early 2024, Bing’s
    market share was still hovering at a measly 3 percent, according to data analytics
    firm StatCounter, having failed to make much of a dent in Google’s dominance.
    The incumbents were winning and their territories were clear: Google controlled
    search, Microsoft dominated software, and they were both jostling with Amazon
    to dominate the cloud business.'
  prefs: []
  type: TYPE_NORMAL
- en: Today, the cost of building AI models has risen out of reach of nearly everyone
    who’s not a tech giant. Academics and smaller companies have little choice but
    to get their chips from Nvidia and rent computing power from Amazon, Microsoft,
    or Google, and once companies are on those platforms, they are often locked in.
    AI start-ups frequently complain that once they start building their services
    on Microsoft’s or Amazon’s cloud services, it’s difficult to switch away. Those
    same companies also have rare access to the thousands of GPUs needed to build
    anything like ChatGPT. Getting those chips, which can cost around $40,000 each,
    has been like trying to buy concert tickets for a sell-out tour. Nvidia, the world’s
    main supplier of GPUs, has benefited handsomely from the demand. In May 2023,
    it became the latest technology company, after Google, Microsoft, Amazon, Meta,
    and Apple, to reach a market capitalization of $1 trillion. The biggest companies
    in the world by a huge margin were building tech and AI. But rather than create
    a thriving market for innovative new companies, the AI boom was helping these
    firms consolidate their power. Having strengthened their grip on infrastructure,
    talent, data, computing power, and profits, there is no question that they alone
    will control our AI future.
  prefs: []
  type: TYPE_NORMAL
- en: The AGI dreamers helped make that happen. In June 2023, Microsoft’s chief financial
    officer Amy Hood told investors that AI-powered services from OpenAI would contribute
    at least $10 billion to its revenue. She called it “the fastest growing $10 billion
    business in our history.”
  prefs: []
  type: TYPE_NORMAL
- en: Would it have been better for DeepMind and OpenAI to stay independent and assign
    boards of trustees to govern the direction of AI? That would have come with its
    own risks, as Sam Altman would later discover. Suleyman, who fought hard to extricate
    his company from DeepMind, has argued in interviews that large companies can be
    more trustworthy than smaller ones. They are, after all, publicly accountable
    to their shareholders and staff. But the world’s biggest technology firms also
    have a deeper obligation to their shareholders, one that they cannot escape. They
    must grow their earnings each quarter. As their profits plateau or decline, so
    too will their stock; when the stock falls, a company can’t raise capital, and
    executives and employees grumble or flee. The terrifying specter of decline beckons.
    “These entities *have* to grow,” a former Microsoft executive says. “AI is the
    answer.”
  prefs: []
  type: TYPE_NORMAL
- en: Hassabis argues that DeepMind has become a more sensible business. “It’s got
    to the level of maturity now where I think we can improve the lives of billions
    of people,” he says when asked about whether he thinks AGI would still need the
    kind of ethics board he once pushed for. “Google is an amazing place.”
  prefs: []
  type: TYPE_NORMAL
- en: Altman insists that despite pivoting OpenAI to a for-profit company, aligning
    with Microsoft, and sparking an AI arms race, its principles of building beneficial
    AI haven’t changed. And he has little choice but to keep launching AI tools to
    the public. “Deploying is critical to our mission,” he says. How else will OpenAI
    learn, and bring people useful tools like ChatGPT? That “requires putting the
    technology in people’s hands.”
  prefs: []
  type: TYPE_NORMAL
- en: At the current speed of this race, it’s impossible to predict what will happen
    in the months and years after these words were written in March 2024\. But those
    future events will be rooted in the designs of a handful of people and the systemic
    forces they operated in. When the question arises of whether we can trust Sam
    Altman and Demis Hassabis, along with Microsoft and Google, to build our AI future,
    the answer is that we have little choice in the matter. Both men hitched their
    innovations onto two of the world’s largest companies, whose network effects were
    almost impossible to avoid in everyday life, and in so doing, they joined a long
    history of innovators who tweaked their ideals to stay in a race and build power.
    The result is some of the most transformative technology we have ever seen. Now
    to find out the price.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[ACKNOWLEDGMENTS](contents.xhtml#c_ack)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: This book could never have happened without the support and encouragement of
    a small army of people. About a month after ChatGPT was released to the world,
    I sent an idea over to my agent, David Fugate, about how two men dreamed of building
    superintelligent machines, then became rivals, and then proxies for a battle between
    Big Tech companies. David’s answer, “YES!” propelled me over the following year
    to pull it together. Janhoi McGregor also gave me the extra kick I needed to embark
    on a major project, as usual over a cheeky Nando’s.
  prefs: []
  type: TYPE_NORMAL
- en: I’m grateful to Claire Cheek, Sara Beth Haring, Elisa Rivlin, and all the wonderful
    folks at St. Martin’s Press, and my editor Peter Wolverton, who provided the level-headed
    guidance I needed to keep things focused on how a transformative invention is
    being steered by a handful of companies. Pete saved me (and you, dear reader)
    from going down several extraneous rabbit holes around transhumanism and the effective
    altruism movement in this story.
  prefs: []
  type: TYPE_NORMAL
- en: Since we’re on that subject, I must thank Dr. Emile Torres for brilliantly tracing
    the quest to build artificial general intelligence back to darker roots in eugenics
    and for helping me understand the flipside of chasing human perfection through
    machines. David Edmonds did much the same for me on the topic of long termism,
    Toby Ord on effective altruism, and Mike Levine on the AI alignment efforts of
    organizations like Open Philanthropy. Mike and I don’t see eye to eye on some
    of these topics, but I’m very grateful to him for his patience and for taking
    the time to explain his arguments to me. Brian Evergreen in Seattle also helped
    me better understand the AI ethics conundrum that was happening inside Microsoft.
  prefs: []
  type: TYPE_NORMAL
- en: Special thanks to Meredith Whittaker and Reolof Botha, two people from very
    different parts of the technology world—Meredith is the president of the Signal
    Foundation and Reolof a partner at venture capital firm Sequoia Capital—but both
    helped crystalize in my mind that the growing dominance of a few technology firms
    in AI was becoming a problem for both society and businesses.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve mentioned anonymous sources in my endnotes, but I must thank the many individuals
    once again who work for tech and AI firms, or former employees of OpenAI and DeepMind,
    including senior executives, who spent hours sharing their experiences and, on
    occasion, deep unease about the stranglehold that tech giants have acquired on
    the field of AI and its new move-fast-break-things dynamics. I hope this book
    has done justice to their concerns and all the time they shared with me.
  prefs: []
  type: TYPE_NORMAL
- en: My editors at *Bloomberg Opinion* have been incredibly supportive of this project,
    and I’m deeply grateful to Tim O’Brien and Nicole Torres for their enthusiasm
    and immediate willingness to let me take the time I needed to write a book that
    complemented much of what I’d been harping on about in columns for the previous
    year. Many thanks also to all my fellow writers at *Bloomberg Opinion* for their
    kind words and encouragement, and for making the job of tech columnist far more
    fun than it should be, including Dave Lee, Lara Williams, Lionel Laurent, Andrea
    Felstead, Therese Raphael, Matthew Brooker, Howard Chua-Eoan, Chris Hughes, Chris
    Bryant, Marcus Ashworth, Marc Champion, James Hertling, Joi Preciphs, Mark Gilbert,
    Elaine He, Tim Culpan, and also to Javier Blas for his advice on embarking on
    a book project.
  prefs: []
  type: TYPE_NORMAL
- en: I’m particularly grateful to my colleagues Tim O’Brien, Nicole Torres, Paul
    Davies, and Adrian Wooldridge for their sharp and helpful feedback on early versions
    of the manuscript, which greatly helped me understand the view of other readers
    outside of my writing bubble. My other early readers not only showed me where
    I needed to polish things up or explain things better but offered frequent moral
    support as great friends throughout the writing process. Many thanks for that
    to Miriam Zaccarelli, Victor Zaccarelli, Carley Sime, and Kristin Peterson.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you to my neighbor and friend Catalina “Katina” Montesinos for allowing
    me to work in the quiet solitude of her home while I was on book leave. Katina
    is someone for whom AI can make a substantial and positive difference. A former
    painter who went blind at the age of forty, she became a successful sculptor and
    embraced all the ways technology could help her “see” the world, keenly exploiting
    digital assistants like Apple’s Siri. At age eighty, she listened in quiet astonishment
    when I pointed my phone at a sculpture on her coffee table and got ChatGPT to
    generate a detailed analysis of its colors, shape, and possible artistic influences.
    It was, she said, “absolutely extraordinary.” I hope that is the direction our
    world takes AI in the future, filling vacancies of information rather than displacing
    the work and creativity of humans.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, this book could not have happened at all without the support of my
    family, including my father, Philip Withers, who has been nothing but a fount
    of praise for even my smallest accomplishments since I was a kid. Thank you to
    Cara and Wesley for filling the house with laughter and to Isla for checking in
    on the manuscript and cheering me on. I marvel every day at how my husband, Mani,
    holds us all together; he has been a constant source of strength and patience,
    and for that I am especially thankful.  <hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: '[SOURCES](contents.xhtml#c_sou)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: </hgroup>
  prefs: []
  type: TYPE_NORMAL
- en: A Note on Sources
  prefs: []
  type: TYPE_NORMAL
- en: I’m grateful for the extraordinary work of reporters and authors of numerous
    articles from websites, newspapers, magazines, research papers, podcasts, and
    books who have allowed me to augment this story with so many secondary sources,
    which I list here.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout the book, where people are quoted in the present tense and cited
    with words such as “says,” “remembers,” or “recalls,” these are direct interviews
    that I conducted with those individuals, and they include Demis Hassabis and Sam
    Altman. Many others whom I spoke to are referred to as former employees or individuals
    familiar with the matter, and who remain anonymous for reasons often related to
    the risk of damaging repercussions for speaking out. I am especially grateful
    to these people for trusting me with their insights.
  prefs: []
  type: TYPE_NORMAL
- en: There are more interviews that I could not include in the story due to constraints
    on space, but that were valuable in giving me context on the lives of Sam Altman
    and Demis Hassabis and their work and the field of AI, as well as experts who
    helped me understand and translate the workings of machine-learning systems, neural
    networks, diffusion systems, and transformers into accessible language.
  prefs: []
  type: TYPE_NORMAL
- en: My conversations with hundreds of industry experts, entrepreneurs, venture capitalists,
    employees and former employees of tech companies, both for this book and over
    the last few years of reporting about the new AI boom for *Bloomberg Opinion*,
    *Wall Street Journal,* and *Forbes* also greatly informed my research.
  prefs: []
  type: TYPE_NORMAL
- en: I exploited my love of running to listen to countless hours of podcast interviews
    with Sam Altman, Demis Hassabis, Ilya Sutskever, Greg Brockman, and many other
    individuals who were involved in the creation of OpenAI and DeepMind, or who witnessed
    the evolution of AI from scientific backwater to booming business, to help piece
    together many details of the narrative. That often meant frequent stops to type
    things into my phone, but it was worth it.
