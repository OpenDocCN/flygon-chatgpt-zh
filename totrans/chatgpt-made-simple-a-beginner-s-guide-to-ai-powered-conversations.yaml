- en: '****Intr**oducti**on ****t**o** ****Cha**tGP**T'
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '****ChatGPT简介'
- en: '****Ima**gin**e ****i**t**’****s**** ****la**te** ****a**t** ****ni**ght**,
    ****a**nd** ****y**ou**’****r**e** ****wor**kin**g ****o**n** ****a**** ****pro**jec**t
    ****wi**th** ****a**** ****fa**st**-****appr**oachin**g ****dea**dlin**e. ****Y**ou**’****r**e**
    ****st**uck** ****o**n** ****a**** ****tr**ick**y ****que**stio**n, ****a**nd**
    ****th**ere**’****s**** ****n**o** ****o**ne** ****ar**oun**d ****t**o** ****he**lp**.
    ****Wh**at** ****i**f**, ****ins**tea**d ****o**f** ****hit**tin**g ****se**arc**h
    ****eng**ine**s ****a**nd** ****sif**tin**g ****thr**oug**h ****do**zen**s ****o**f**
    ****art**icle**s, ****y**ou** ****co**uld** ****a**sk** ****a**** ****dig**ita**l
    ****assi**stan**t ****a**** ****di**rec**t ****que**stio**n ****a**nd** ****g**et**
    ****a**** ****thou**ghtfu**l, ****conve**rsation**al ****res**pons**e ****i**n**
    ****sec**ond**s? ****Th**at**’****s**** ****t**he** ****ma**gic** ****o**f** ****Cha**tGP**T—****a****
    ****lan**guag**e ****mo**del** ****th**at** ****fe**els** ****al**mos**t ****li**ke**
    ****ha**vin**g ****a**** ****knowl**edgeab**le ****fr**ien**d ****a**t** ****yo**ur**
    ****fing**ertip**s, ****d**ay** ****o**r** ****ni**ght**.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**想象** **一下** **它** **在** **深夜** **时** **分**， **而你** **正在** **为一个** **项目**
    **工作**， **截止日期** **迫在眉睫**。 **你** **卡在一个** **棘手** **的问题** **上**， **周围** **没有人**
    **可以** **帮忙**。 **如果** **不是** **点击** **搜索引擎** **并** **浏览** **数十** **篇文章**， **而是**
    **直接** **向** **一个** **数字** **助手** **提出** **一个** **直接** **问题**， **并在** **几秒** **内**
    **获得** **深思熟虑**， **对话式** **的** **回答**， **那会** **怎么样**？ **这就是** **ChatGPT** **的**
    **魔力**—— **一种** **语言** **模型**， **感觉** **就像** **在你的** **指尖** **处** **有一个** **知识**
    **渊博** **的朋友**， **无论** **白天** **还是** **夜晚**。'
- en: '****B**ut** ****Cha**tGP**T ****i**s** ****mo**re** ****th**an** ****ju**st**
    ****a**** ****cha**tbo**t. ****I**t**’****s**** ****pa**rt** ****o**f** ****a****
    ****n**ew** ****gene**ratio**n ****o**f** ****A**I** ****th**at** ****do**esn**’****t****
    ****ju**st** ****pro**vid**e ****ans**wer**s ****b**ut** ****do**es** ****s**o**
    ****i**n** ****a**** ****w**ay** ****th**at** ****fe**els** ****conve**rsation**al,
    ****ada**ptiv**e, ****a**nd** ****genu**inel**y ****hel**pfu**l. ****I**t**’****s****
    ****a**** ****to**ol** ****th**at**’****s**** ****cha**ngin**g ****h**ow** ****w**e**
    ****ac**ces**s ****info**rmatio**n, ****app**roac**h ****crea**tivit**y, ****a**nd**
    ****g**et** ****assi**stanc**e ****wi**th** ****ever**ythin**g ****fr**om** ****em**ail**
    ****dr**aft**s ****t**o** ****pro**ble**m-****sol**vin**g.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**但** **ChatGPT** **远** **不止** **一个** **聊天机器人**。 **它** **是** **新一代** **人工智能**
    **的一部分**， **不仅** **提供** **答案**， **而且** **以一种** **感觉** **像** **对话** **的方式**， **适应性**
    **强**， **真正** **有帮助**。 **它** **是一种** **工具**， **正在** **改变** **我们** **获取** **信息**，
    **接近** **创造力**， **以及** **从** **电子邮件** **草稿** **到** **问题** **解决** **的** **方式**。'
- en: '****Wh**at** ****Exa**ctl**y ****I**s** ****Cha**tGP**T?'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT** **究竟** **是什么**？'
- en: '****A**t** ****i**ts** ****co**re**, ****Cha**tGP**T ****i**s** ****a**** ****ty**pe**
    ****o**f** ****arti**ficia**l ****inte**lligen**ce ****des**igne**d ****t**o**
    ****pro**ces**s ****a**nd** ****gen**erat**e ****te**xt**. ****I**t** ****w**as**
    ****deve**lope**d ****b**y** ****a**** ****res**earc**h ****orga**nizati**on ****ca**lle**d
    ****Op**enA**I, ****wh**ich** ****spec**ialize**s ****i**n** ****cre**atin**g
    ****adv**ance**d ****A**I** ****mo**del**s ****th**at** ****c**an** ****unde**rstan**d
    ****a**nd** ****int**erac**t ****us**ing** ****nat**ura**l ****lan**guag**e—****lan**guag**e
    ****li**ke** ****y**ou** ****a**nd** ****I**** ****u**se** ****i**n** ****eve**ryda**y
    ****conve**rsatio**ns.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**在** **其** **核心** **上，** **ChatGPT** **是一种** **人工智能** **类型**， **旨在** **处理**
    **和** **生成** **文本**。 **它** **是由** **一个** **名为** **OpenAI** **的研究** **机构** **开发的**，
    **该机构** **专门** **从事** **创建** **先进的** **人工智能** **模型**， **这些** **模型** **能够** **理解和**
    **使用** **自然** **语言** **进行** **交互**—— **就像** **你** **和我** **在日常** **对话** **中使用**
    **的语言**。'
- en: '****T**he** ****te**rm** “****G**PT**” ****st**and**s ****f**or** ****Gene**rativ**e
    ****Pret**raine**d ****Tran**sforme**r. ****I**n** ****sim**ple**r ****te**rms**,
    ****th**is** ****me**ans** ****i**t**’****s**** ****a**n** ****A**I** ****mo**del**
    ****tra**ine**d ****o**n** ****va**st** ****amo**unt**s ****o**f** ****te**xt**
    ****da**ta** ****fr**om** ****bo**oks**, ****web**site**s, ****a**nd** ****mo**re**,
    ****s**o** ****i**t** ****c**an** ****gen**erat**e ****resp**onse**s ****th**at**
    ****se**em** ****log**ica**l, ****hu**man**, ****a**nd** ****rel**evan**t ****t**o**
    ****t**he** ****ques**tion**s ****i**t**’****s**** ****as**ked**. ****Th**ink**
    ****o**f** ****i**t** ****a**s** ****a**** ****lib**rar**y ****th**at** ****do**esn**’****t****
    ****ju**st** ****st**ore** ****info**rmatio**n ****b**ut** ****kn**ows** ****h**ow**
    ****t**o** ****org**aniz**e ****a**nd** ****exp**res**s ****i**t** ****i**n**
    ****mean**ingfu**l ****wa**ys**.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**“GPT”** **这个** **术语** **代表** **生成式** **预训练** **Transformer**。 **用更简单的** **话**
    **说**， **这意味着** **它** **是一个** **AI** **模型**， **经过** **在** **大量** **文本** **数据**
    **（来自** **书籍**、 **网站** **等**） **上** **训练**， **因此** **可以** **生成** **看似** **逻辑**、
    **人性** **且** **与** **所** **问** **问题** **相关的** **回答**。 **把它** **想象** **成一个** **图书馆**，
    **它** **不仅** **存储** **信息**， **而且** **知道** **如何** **组织和** **以** **有意义的** **方式**
    **表达** **它**。'
- en: '****W**hy** ****Cha**tGP**T ****Mat**ter**s: ****Cha**ngin**g ****H**ow** ****W**e**
    ****Int**erac**t ****wi**th** ****A**I**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么** **ChatGPT** **重要：** **改变** **我们** **与** **AI** **交互** **的方式**'
- en: '****Cha**tGP**T ****h**as** ****be**com**e ****pop**ula**r ****f**or** ****a****
    ****go**od** ****re**aso**n. ****I**t**’****s**** ****n**ot** ****ju**st** ****answ**erin**g
    ****ques**tion**s; ****i**t**’****s**** ****cha**ngin**g ****t**he** ****w**ay**
    ****w**e** ****th**ink** ****ab**out** ****tech**nolog**y’****s**** ****ro**le**
    ****i**n** ****o**ur** ****li**ves**. ****Fr**om** ****supp**ortin**g ****stu**dent**s
    ****wi**th** ****hom**ewor**k ****t**o** ****assi**stin**g ****bus**ines**s ****profe**ssiona**ls
    ****wi**th** ****em**ail**s, ****brain**stormi**ng, ****a**nd** ****ev**en** ****tech**nica**l
    ****co**din**g ****ta**sks**, ****Cha**tGP**T ****i**s** ****prov**idin**g ****a****
    ****le**vel** ****o**f** ****inte**ractio**n ****th**at** ****pre**viou**s ****A**I**
    ****assi**stant**s ****co**uld**n’****t**** ****qu**ite** ****ach**iev**e.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT** **已** **经** **因其** **良好** **的原因** **而** **变得** **流行**。 **它** **不仅**
    **能** **够** **回答** **问题**； **它** **正在** **改变** **我们** **思考** **技术** **在我们** **生活中**
    **作用的** **方式**。 **从** **帮助** **学生** **完成** **家庭** **作业** **到** **协助** **商业** **专业人士**
    **处理** **电子邮件**、 **头脑风暴** **以及** **甚至** **技术** **编码** **任务**， **ChatGPT** **提供**
    **了一种** **前所未有的** **交互** **水平**， **这是** **以前的** **AI** **助手** **无法** **完全** **实现的**。'
- en: '****F**or** ****ins**tanc**e, ****i**n** ****cus**tome**r ****ser**vic**e,
    ****Cha**tGP**T ****c**an** ****res**pon**d ****t**o** ****co**mmo**n ****ques**tion**s,
    ****fre**ein**g ****u**p** ****hu**man** ****repres**entativ**es ****t**o** ****ha**ndl**e
    ****mo**re** ****com**ple**x ****inqu**irie**s. ****I**n** ****educ**atio**n,
    ****stu**dent**s ****c**an** ****a**sk** ****i**t** ****t**o** ****exp**lai**n
    ****com**ple**x ****to**pic**s, ****hel**pin**g ****th**em** ****le**arn** ****a**t**
    ****th**eir** ****o**wn** ****pa**ce**. ****Ev**en** ****crea**tive**s—****wri**ter**s,
    ****art**ist**s, ****a**nd** ****desi**gner**s—****a**re** ****fin**din**g ****th**at**
    ****Cha**tGP**T ****c**an** ****a**ct** ****a**s** ****a**** ****sou**ndin**g
    ****bo**ard** ****f**or** ****id**eas**, ****off**erin**g ****sugg**estion**s
    ****a**nd** ****insp**iratio**n ****whe**neve**r ****ne**ede**d.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**例如**， **在** **客户** **服务** **方面**， **ChatGPT** **可以** **回答** **常见** **问题**，
    **从而** **释放** **人类** **代表** **处理** **更** **复杂的** **查询**。 **在教育** **领域**， **学生**
    **可以** **向** **它** **询问** **解释** **复杂** **主题**， **帮助他们** **在自己的** **节奏** **下**
    **学习**。 **甚至** **创意人士**——**作家**、 **艺术家** **和** **设计师**——**发现** **ChatGPT** **可以作为**
    **一个** **灵感** **板** **来** **使用**， **在** **需要** **时** **提供** **建议** **和** **灵感**。'
- en: '****A**** ****Br**ief** ****His**tor**y ****o**f** ****A**I** ****a**nd** ****t**he**
    ****Ro**ad** ****t**o** ****Cha**tGP**T'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI** **的** **简短** **历史** **以及** **通往** **ChatGPT** **的道路**'
- en: '****T**he** ****jou**rne**y ****t**o** ****cre**atin**g ****A**I** ****li**ke**
    ****Cha**tGP**T ****sta**rte**d ****dec**ade**s ****a**go** ****wi**th** ****ea**rly**
    ****att**empt**s ****a**t** ****ma**kin**g ****comp**uter**s ****unde**rstan**d
    ****a**nd** ****res**pon**d ****t**o** ****hu**man** ****lan**guag**e. ****Fr**om**
    ****si**mpl**e ****cha**tbot**s ****o**f** ****t**he** ****pa**st** ****t**o**
    ****mo**re** ****sophi**sticat**ed ****algo**rithm**s, ****ea**ch** ****adva**ncemen**t
    ****pa**ved** ****t**he** ****w**ay** ****to**war**d ****mo**del**s ****th**at**
    ****co**uld** ****ha**ndl**e ****mo**re** ****nat**ura**l, ****com**ple**x ****conve**rsatio**ns.
    ****Op**enA**I’****s**** ****wo**rk** ****o**n** ****G**PT**-****3**** ****a**nd**
    ****la**ter** ****G**PT**-****4**** ****ma**rke**d ****a**** ****sign**ifican**t
    ****le**ap**, ****ma**kin**g ****Cha**tGP**T ****o**ne** ****o**f** ****t**he**
    ****mo**st** ****pow**erfu**l ****a**nd** ****vers**atil**e ****A**I** ****to**ols**
    ****avai**labl**e ****to**day**.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**旅程：** 创建像ChatGPT这样的AI始于几十年前的早期尝试，旨在制造能够理解和回应人类语言的计算机。从简单的聊天机器人到更复杂的算法，每一次进步都为构建能够处理更自然、更复杂对话的模型铺平了道路。OpenAI在GPT-3及其后续版本GPT-4上的工作标志着显著的飞跃，使ChatGPT成为今天最强大和最通用的AI工具之一。'
- en: '****A**s** ****w**e** ****con**tinu**e ****thr**oug**h ****th**is** ****bo**ok**,
    ****y**ou**’****l**l** ****le**arn** ****h**ow** ****t**o** ****g**et** ****sta**rte**d
    ****wi**th** ****Cha**tGP**T, ****h**ow** ****t**o** ****a**sk** ****ques**tion**s
    ****i**n** ****a**** ****w**ay** ****th**at** ****ge**ts** ****y**ou** ****t**he**
    ****be**st** ****resp**onse**s, ****a**nd** ****wh**ere** ****Cha**tGP**T’****s****
    ****tr**ue** ****stre**ngth**s ****a**nd** ****limi**tation**s ****l**ie**. ****Whe**the**r
    ****y**ou**’****r**e** ****a**** ****cur**iou**s ****beg**inne**r, ****a**** ****bus**ines**s
    ****prof**ession**al, ****o**r** ****si**mpl**y ****a**** ****te**ch** ****enth**usias**t,
    ****y**ou**’****l**l** ****fi**nd** ****th**at** ****Cha**tGP**T ****op**ens**
    ****u**p** ****a**** ****wo**rld** ****o**f** ****possi**biliti**es—****a**nd**
    ****w**e**’****r**e** ****ju**st** ****scra**tchin**g ****t**he** ****sur**fac**e.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**随着我们继续阅读这本书，你将学习如何开始使用ChatGPT，如何以获得最佳响应的方式提问，以及ChatGPT的真实优势和局限性在哪里。无论你是好奇的初学者、商业专业人士，还是简单的技术爱好者，你都会发现ChatGPT打开了一个充满可能性的世界——而我们只是刚刚触及表面。'
