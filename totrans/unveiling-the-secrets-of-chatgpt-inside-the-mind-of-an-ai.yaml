- en: Introduction
  id: totrans-87
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 引言
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: In an era where artificial intelligence is increasingly integrated into our
    daily lives, understanding how these systems operate has never been more important.
    This mini-book delves into the intricate workings of ChatGPT, one of the most
    advanced conversational AI models. By uncovering the secrets of its internal algorithms,
    we aim to demystify the technology and provide insights into how it handles and
    responds to user requests.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能日益融入我们日常生活的时代，了解这些系统的运作方式从未如此重要。这本小书深入探讨了ChatGPT这一最先进的对话AI模型的复杂运作机制。通过揭示其内部算法的秘密，我们旨在揭开技术的神秘面纱，并提供关于它如何处理和响应用户请求的见解。
