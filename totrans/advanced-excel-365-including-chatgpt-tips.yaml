- en: Editing the Recorded Macros
  id: totrans-2421
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑录制宏
- en: Sometimes recorded macros may not give you full automation. In these cases,
    you will have to edit your recorded macros. Alternatively, you might want to add
    some actions to your recorded macro and then edit your macro.
  id: totrans-2422
  prefs: []
  type: TYPE_NORMAL
  zh: 有时录制的宏可能无法提供完整的自动化。在这些情况下，您将不得不编辑您的录制宏。或者，您可能想向您的录制宏添加一些操作，然后编辑您的宏。
- en: For example, in Scenario 5, instead of changing criteria in Excel, your macro
    should ask which region and department to use. The user will type their response,
    then click OK. The macro will perform the filter.
  id: totrans-2423
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在场景5中，您的宏应询问使用哪个地区和部门，而不是在Excel中更改条件。用户将输入他们的响应，然后点击确定。宏将执行筛选。
- en: To edit your recorded macro, follow the steps below.
  id: totrans-2424
  prefs: []
  type: TYPE_NORMAL
  zh: 要编辑您的录制宏，请按照以下步骤操作。
- en: 1. Go to Tools.
  id: totrans-2425
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 转到工具。
- en: 2. Click on Macro.
  id: totrans-2426
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击宏。
- en: 3. Open Visual Basic Editor.
  id: totrans-2427
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 打开Visual Basic编辑器。
- en: 4. Open the code window of your macro.
  id: totrans-2428
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 打开宏的代码窗口。
