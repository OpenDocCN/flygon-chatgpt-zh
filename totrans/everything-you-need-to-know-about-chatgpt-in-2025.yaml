  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 一个特别令人不安的方面是数据的未经授权或恶意使用。随着人工智能模型变得更加复杂，它们在个人数据中识别模式的能力呈指数级增长。这种能力，如果处理不当，可能会被用于恶意目的，例如定位追踪、预测个人行为，甚至对个人进行画像以操纵他们的决策，如在定向广告或虚假信息宣传活动中的情况。
