- en: '**2\. Getting Started**'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: ChatGPT is a platform designed for dialogue.^([1](#footnote-12394-1)) It listens
    to you, detects your intents, feelings, and emotions, and tries to reply as close
    as it can to your request. It works in a way like a mirror. The clearer the image
    of what you want to display, the clearer the reflection you get. So, it is not
    just about asking questions; it is about asking the right questions, about giving
    the context of your question, about how clearly you express your thoughts.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will guide you through the basics to help you get started.
    By the end, you will be ready to communicate with one of the most advanced AI
    models out there.
  prefs: []
  type: TYPE_NORMAL
- en: Let's get started!
  prefs: []
  type: TYPE_NORMAL
- en: '**2.1 Setting Up ChatGPT**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can access ChatGPT through any up-to-date browser at [chat.openai.com](https://chat.openai.com/auth/login)
    (Figure 2.1). Any modern device with an up-to-date browser works great. For an
    uninterrupted flow in your conversations would be good to have a stable internet
    connection but no large bandwidth is necessary.
  prefs: []
  type: TYPE_NORMAL
- en: And now, let's prepare for your AI conversations.
  prefs: []
  type: TYPE_NORMAL
- en: '**Connect to ChatGPT; Step-by-step Instructions**'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Connect to [chat.openai.com](https://chat.openai.com/auth/login) and Sign-up
  prefs: []
  type: TYPE_NORMAL
- en: – Open your browser,
  prefs: []
  type: TYPE_NORMAL
- en: – Go to [https://chat.openai.com](https://chat.openai.com).
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure_2.1.tif](../Images/Figure_2.1_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 2.1 How to access ChatGPT using web browser interface*'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Set up the account
  prefs: []
  type: TYPE_NORMAL
- en: – Enter your email address and create a password
  prefs: []
  type: TYPE_NORMAL
- en: – Verify your account via the link sent to your email.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Log in for the first time
  prefs: []
  type: TYPE_NORMAL
- en: – Log in with your email and password
  prefs: []
  type: TYPE_NORMAL
- en: – Accept the Terms of Service and Privacy Policy.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Check the main dashboard (Figure 2.2)
  prefs: []
  type: TYPE_NORMAL
- en: – Check all tabs
  prefs: []
  type: TYPE_NORMAL
- en: – Explore settings for customization options.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Start your conversation
  prefs: []
  type: TYPE_NORMAL
- en: – Start your first conversation by typing in the provided chat box. Responses
    will be written out in front of you
  prefs: []
  type: TYPE_NORMAL
- en: – Start by using ChatGPT; upgrade later to ChatGPT Plus.^([2](#footnote-12394-2))
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure_2.2.tif](../Images/Figure_2.2_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 2.2 ChatGPT User Interface*'
  prefs: []
  type: TYPE_NORMAL
- en: Remember ChatGPT is a tool; it does not matter how advanced it is, but how you
    use it.
  prefs: []
  type: TYPE_NORMAL
- en: Happy chatting!
  prefs: []
  type: TYPE_NORMAL
- en: '**2.2 The Art of Prompting**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With ChatGPT, what you ask for is what you get. The better the prompt the better
    it responds. The art of prompt crafting is essential.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, there is no perfect prompt because an LLM will always use statistics
    to learn the patterns and probability to select the words when it answers. (You
    can test this by entering the same prompt several times. Each time, you will get
    a slightly different worded response.) It means that the art of prompting is about
    how to craft the prompts that maximize our chances of getting what we want. The
    practice of designing better prompts to instruct the model to perform a task is
    referred to as prompt design. The good news is we can achieve a lot with simple
    prompts.
  prefs: []
  type: TYPE_NORMAL
- en: Let's take a simple example where we ask ChatGPT to summarize a text.
  prefs: []
  type: TYPE_NORMAL
- en: The input and the output are presented below. The text we submit to be processed
    is between quotes.
  prefs: []
  type: TYPE_NORMAL
- en: '![chrome-capture-2023-10-5a.tif](../Images/chrome-capture-2023-10-_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '![chrome-capture-2023-10-5b.tif](../Images/chrome-capture-2023-10_fmt1.png)'
  prefs: []
  type: TYPE_IMG
- en: There are many use cases with simple prompts. Here are a few keywords.
  prefs: []
  type: TYPE_NORMAL
- en: '| **SUMMARIZE**![Summarize.tif](../Images/Summarize_fmt.png) | To generate
    a concise and condensed overview of the main points or key elements of a larger
    piece of text. |'
  prefs: []
  type: TYPE_TB
- en: '| **REWRITE**![Rewrite.tif](../Images/Rewrite_fmt.png) | To rephrase or reword
    content while retaining its core meaning; to improve clarity, style, or adapt
    it for a different audience.Example: Transforming a complex scientific article
    into a simpler text, without technical jargon, for general audience. |'
  prefs: []
  type: TYPE_TB
- en: '| **GENERATE**![Generate.tif](../Images/Generate_fmt.png) | To craft content,
    brainstorming, and/or idea generation.Example: You are writing a project draft
    and need to be creative with the usability of the results. You can use ChatGPT
    as a brainstorming tool to generate ideas. |'
  prefs: []
  type: TYPE_TB
- en: '| **SEARCH**![Search.tif](../Images/Search_fmt.png) | To seek factual answers
    and clarifications.Example: You are researching for a school project on climate
    change and its effects on marine life. You input "impact of climate change on
    marine life" into ChatGPT and will receive a range of opinions and facts about
    the topic, things it learned during training.If ChatGPT is connected to the internet,
    it presents an updated range of articles, research papers, and studies about this
    topic. |'
  prefs: []
  type: TYPE_TB
- en: '| **EXTRACT**![Extract.tif](../Images/Extract_fmt.png) | To retrieve specific
    information or data from a text.Example: Pulling out city names from a report.
    |'
  prefs: []
  type: TYPE_TB
- en: '| **CLASSIFY**![Classify.tif](../Images/Classify_fmt.png) | To categorize or
    sort data or information into distinct groups based on given criteria.Example:
    Sorting emails into folders like "Work," "Personal," or "Promotions" based on
    their content. |'
  prefs: []
  type: TYPE_TB
- en: '| **CLUSTER**![Cluster.tif](../Images/Cluster_fmt.png) | To group related items
    together based on shared characteristics or patterns.Example: You upload a group
    of customer reviews and ask ChatGPT to cluster reviews that share common sentiments
    and discuss similar aspects. |'
  prefs: []
  type: TYPE_TB
- en: '| **CONVERSATION**![Conversation.tif](../Images/Conversation_fmt.png) | To
    mimic natural, contextually relevant communication as if it were between two humans.Example:
    Chatting with a virtual assistant that responds in a conversational manner, understanding
    context and providing meaningful answers. Another example is to use ChatGPT as
    a tutor. |'
  prefs: []
  type: TYPE_TB
- en: '| **TRANSLATE**![Translate.tif](../Images/Translate_fmt.png) | To convert text
    from one language to another while preserving its meaning and context.Example:
    Using a language translation tool to convert a paragraph from English to Spanish.
    |'
  prefs: []
  type: TYPE_TB
- en: '| **SENTIMENT ANALYSIS**![Sentiment_Analysis.tif](../Images/Sentiment_Analysis_fmt.png)
    | To determine the emotional tone or sentiment expressed in a text by using natural
    language processing and computational techniques.Example: Analyzing social media
    posts to understand whether they convey positive, negative, or neutral feelings
    about a product. |'
  prefs: []
  type: TYPE_TB
- en: '**2.3 General Tips for Crafting Prompts**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When engaging with ChatGPT, the way you formulate your prompts greatly influences
    the accuracy, relevance, and quality of the responses. Here are some essential
    guidelines:'
  prefs: []
  type: TYPE_NORMAL
- en: – Be clear about what you want
  prefs: []
  type: TYPE_NORMAL
- en: Clarity is key to ensuring you receive accurate and on-point answers. Use direct
    language and avoid ambiguity. Compare the output of the following prompts.
  prefs: []
  type: TYPE_NORMAL
- en: '*Give me a summary of [Title of the book].*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Could you summarize the key themes and character development in [Title of
    the book]?*'
  prefs: []
  type: TYPE_NORMAL
- en: – Set up the stage
  prefs: []
  type: TYPE_NORMAL
- en: 'Context is essential for meaningful conversations. Offer background information
    to help AI understand the context of your query. For instance:'
  prefs: []
  type: TYPE_NORMAL
- en: '*What are the benefits of exercise?*'
  prefs: []
  type: TYPE_NORMAL
- en: '*In the context of overall well-being, could you elaborate on the recommended
    physical and mental exercises for a 70-year-old person?*'
  prefs: []
  type: TYPE_NORMAL
- en: – Refine your prompt through iterations.
  prefs: []
  type: TYPE_NORMAL
- en: Experiment with new wording, context, and style to see how AI's responses evolve.
    Learn from observed patterns to further fine-tune your approach. Do not be afraid
    to ask multi-step questions. Ask a question and get a response. Based on that
    response, ask another question. Do it as many times as necessary and you will
    get wonderful results.
  prefs: []
  type: TYPE_NORMAL
- en: '**2.4 Preserving Your Conversations**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ChatGPT is a powerful tool that generates a wealth of content. To make the most
    of your interactions and keep track of your conversations, the platform provides
    a convenient feature. After each conversation, ChatGPT saves the entire conversation
    thread in the History tab. The History tab serves as a repository of your interactions,
    providing a record of your discussions with AI.
  prefs: []
  type: TYPE_NORMAL
- en: This allows you to revisit and continue conversations at any time. To access
    them, navigate to the History tab where you will find a list of your conversations
    in reverse chronological order. Click on any conversation to re-enter the discussion
    (or delete it) or start a new one whenever you like.
  prefs: []
  type: TYPE_NORMAL
- en: If you wish to use or share a conversation you have had, you can employ the
    traditional approach of copying the conversation and pasting it into another platform,
    such as a document, email, or note-taking application.
  prefs: []
  type: TYPE_NORMAL
- en: 'For more structured and permanent record-keeping, ChatGPT offers the option
    to download your conversations. This is particularly useful if you want to keep
    an offline copy of your interactions. To do this, follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: – Open sidebar History (click on the icon on the left upper corner);
  prefs: []
  type: TYPE_NORMAL
- en: – At the bottom of the History tab, click ![menu1.tif](../Images/menu1_fmt.png)
    in the Select Settings/Data control;
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshoot2.tif](../Images/Screenshoot2_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: – Click Export and follow the instructions.
  prefs: []
  type: TYPE_NORMAL
- en: '**2.5 Hands-on Exercises**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As you have already learned, ChatGPT's potential applications span across various
    domains — from aiding in research and providing customer support, to even helping
    authors brainstorm ideas.
  prefs: []
  type: TYPE_NORMAL
- en: a. Below there are some simple prompts. Test them, modify them, and get a first
    taste of how ChatGPT works.
  prefs: []
  type: TYPE_NORMAL
- en: '| **SUMMARIZE**![Summarize.tif](../Images/Summarize_fmt1.png)Adapt the prompts
    by providing new, clear guidance, to help AI generate summaries that align with
    your intentions. | *I''d like a summary of the new features of the* product *[e.g.,
    phone model]. Focus on camera capabilities and battery life.* |'
  prefs: []
  type: TYPE_TB
- en: '| *Please summarize the key findings in this scientific* study *about the effects
    of sleep deprivation on cognitive performance. Highlight the main implications
    for productivity.* |'
  prefs: []
  type: TYPE_TB
- en: '| *Please provide a summary of this* transcript *discussing the benefits of
    mindfulness meditation for stress reduction. Include all practical tips mentioned.*
    |'
  prefs: []
  type: TYPE_TB
- en: '| **REWRITE**![Rewrite.tif](../Images/Rewrite_fmt1.png)Customize the prompts
    by providing new, specific goals. E.g., make the text more concise, change tone
    to informal, or simplify the complex concepts. | *Please rephrase this* blog *post
    discussing travel tips for solo adventurers. Maintain the engaging tone while
    condensing the content for a quicker read.* |'
  prefs: []
  type: TYPE_TB
- en: '| *Please help me rewrite the* abstract *of my paper. I''d like a more concise
    version that retains the main findings and key implications.* |'
  prefs: []
  type: TYPE_TB
- en: '| *I need a clearer version of these instructions for this [product/service].
    Simplify the steps and ensure the language is easy to follow for beginners.* |'
  prefs: []
  type: TYPE_TB
- en: '| **GENERATE**![Generate.tif](../Images/Generate_fmt1.png)Adjust the prompts
    to fit your needs. E.g., generate questions from a textbook, generate travel ideas,
    etc. | *Create an engaging* explanation *of artificial intelligence for high school
    students. Use simple language and relatable examples to demystify the concept
    of AI.* |'
  prefs: []
  type: TYPE_TB
- en: '| *I need a detailed* comparison *between iOS and Android. Highlight their
    strengths, weaknesses, and differences in terms of user experience.* |'
  prefs: []
  type: TYPE_TB
- en: '| *I have a list of ingredients that includes [list ingredients]. Could you
    create a flavorful and healthy* recipe *using these ingredients? Please suggest
    cooking techniques, seasonings, and step-by-step instructions.* |'
  prefs: []
  type: TYPE_TB
- en: '| **SEARCH**![Search.tif](../Images/Search_fmt1.png)Customize the prompts by
    providing new clear search criteria to gather relevant information. | *Help me
    find* reviews *for [phone model]. I want to know about its features, performance,
    and user experiences.* |'
  prefs: []
  type: TYPE_TB
- en: '| *I''m planning a vacation in [travel destination]. Please gather information
    about historical* landmarks *and provide a brief overview of each.* |'
  prefs: []
  type: TYPE_TB
- en: '| *I''m interested in learning how to start a blog. Please find comprehensive
    how-to* guides *that cover the steps, tools, and best practices.* |'
  prefs: []
  type: TYPE_TB
- en: '| **EXTRACT**![Extract.tif](../Images/Extract_fmt1.png)Adapt the prompts by
    specifying the type of information you want to extract to gather relevant details.
    | *Please extract the main* key points *and takeaways from this article about
    the future of AI* |'
  prefs: []
  type: TYPE_TB
- en: '| *I need you to extract any relevant* statistics or data *related to climate
    change impacts from this research paper.* |'
  prefs: []
  type: TYPE_TB
- en: '| *Extract* descriptions *of the main characters from [title of the novel]
    and provide details about their appearances and personalities.* |'
  prefs: []
  type: TYPE_TB
- en: '| **CLASSIFY**![Classify.tif](../Images/Classify_fmt1.png)Modify these prompts
    by adjusting the criteria and categories according to your needs. | *Classify
    the main* characters *in this story as protagonists, antagonists, or supporting
    ones based on their actions and motivations.* |'
  prefs: []
  type: TYPE_TB
- en: '| *Classify the* features *mentioned in this product description into categories
    like usability, performance, and security.* |'
  prefs: []
  type: TYPE_TB
- en: '| *Classify the observed* phenomena *mentioned in this astronomy article as
    planetary, stellar, or galactic events.* |'
  prefs: []
  type: TYPE_TB
- en: '| **CLUSTER**![Cluster.tif](../Images/Cluster_fmt1.png)Adjust these prompts
    by providing AI clear guidelines to create your clusters. | *I''m looking to segment
    our* customer feedback *into clusters based on their preferences. Group feedbacks
    that mention similar features or issues.* |'
  prefs: []
  type: TYPE_TB
- en: '| *I need you to cluster* product reviews *for our clothing line based on attributes
    like quality, comfort, design, and fit.* |'
  prefs: []
  type: TYPE_TB
- en: '| *Please cluster* market research data *into trends such as consumer behavior,
    product demand, and industry competition.* |'
  prefs: []
  type: TYPE_TB
- en: '| **CONVERSATION**![Conversation.tif](../Images/Conversation_fmt1.png)Adapt
    and customize these prompts to match your preferences and the context of the conversation.
    Do not forget to specify the assistant''s role. | *Please help me practice Italian
    by engaging in a conversation as my* language teacher*. Let''s discuss my weekend
    plans.* |'
  prefs: []
  type: TYPE_TB
- en: '| *I''m feeling stressed about a new project at work. Can you act like my*
    personal trainer *and offer some advice and techniques to manage my anxiety and
    improve my focus?* |'
  prefs: []
  type: TYPE_TB
- en: '| *You are my* friend*. Let''s have a debate about the latest developments
    in artificial intelligence. Do you think we are close to achieving human-level
    understanding?* |'
  prefs: []
  type: TYPE_TB
- en: '| **TRANSLATE**![Translate.tif](../Images/Translate_fmt1.png)Customize these
    prompts to fit your specific translation needs. | *Please* translate my message
    *into Mandarin while maintaining a professional tone.* |'
  prefs: []
  type: TYPE_TB
- en: '| *I have this Italian article. Can you* read, summarize, and translate *it
    into English?* |'
  prefs: []
  type: TYPE_TB
- en: '| *Help me* translate the technical instructions *from this user manual from
    German into English.* |'
  prefs: []
  type: TYPE_TB
- en: '| **SENTIMENT ANALYSIS**![Sentiment_Analysis.tif](../Images/Sentiment_Analysis_fmt1.png)Modify
    these prompts according to the specific text you would like the sentiments to
    be analyzed. | *Perform sentiment analysis on these* social media comments *to
    assess how the audience perceives our new offerings.* |'
  prefs: []
  type: TYPE_TB
- en: '| *Analyze the sentiment in this* project feedback *to assess our business
    partner satisfaction with the outcomes.* |'
  prefs: []
  type: TYPE_TB
- en: '| *Perform sentiment analysis on* customer cancellation requests *and their
    accompanying comments. Determine if issues are service-related or situational.*
    |'
  prefs: []
  type: TYPE_TB
- en: 'b. Create your own prompt collection with the keywords: DESCRIBE, COMPARE,
    PREDICT, RECOMMEND, LIST, MEASURE, CATEGORIZE, ANALYZE, DEFINE, RANK, RECOGNIZE,
    IDENTIFY, EVALUATE, EXPLAIN, SELECT, ORGANIZE.'
  prefs: []
  type: TYPE_NORMAL
- en: '![34_Young_woman_walking_through_a_street_in_Florence.tif](../Images/34_Young_woman_walking__fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Young woman walking through a street in Florence, Italy. She is wearing a
    striking green dress*'
  prefs: []
  type: TYPE_NORMAL
- en: '[1](#footnote-12394-1-backlink). OpenAI, "OpenAI''s technology explained" (accessed
    in November 2023; [https://openai.com/global-affairs/openai-technology-explained](https://openai.com/global-affairs/openai-technology-explained)).'
  prefs: []
  type: TYPE_NORMAL
- en: '[2](#footnote-12394-2-backlink). OpenAI, "Introducing ChatGPT Plus" (accessed
    in August-October 2023; [https://openai.com/blog/chatgpt-plus](https://openai.com/blog/chatgpt-plus)).'
  prefs: []
  type: TYPE_NORMAL
- en: '**3\. Prompt Design**'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Structuring and phrasing prompts play a pivotal role in the type of response
    that ChatGPT generates. Slight alterations can lead to varied outputs, highlighting
    the model's sensitivity. Keeping this in mind and experimenting with different
    phrasings can help users optimize the interactions. This adaptability ensures
    that they consistently get the desired information.
  prefs: []
  type: TYPE_NORMAL
- en: We can compare chatting with a Language Model with writing a letter to a friend
    with whom you are sharing thoughts, whom you are asking questions, or requesting
    advice. The way you share your thoughts, the context you give, and the way you
    phrase your questions or requests greatly influence what you get out of the conversation.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, to get the most out of the conversation with ChatGPT you need to
    structure your message. It is like a Lego game. We will start learning the building
    blocks of a prompt and how to use them for different outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: Then, we will continue with understanding how AI's word memory works and how
    to harness it to keep your conversations flowing naturally and coherently.
  prefs: []
  type: TYPE_NORMAL
- en: With every chapter the theory is fantastic, but the practice is where the real
    magic happens. The hands-on experience will boost your confidence and upgrade
    your prompt crafting skills.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.1 Prompt Structure**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The precision of an AI model's response hinges upon the quality of your prompt.
    Different phrasing, context, examples, and instructions, all play a role in shaping
    the output of a prompt^([1](#footnote-12250-1)). To embark on this journey, let's
    start by understanding the fundamental components of a prompt. An organized approach
    to craft prompts can yield remarkable results. The most important elements are
    presented below (Figure 3.1).
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure_3.1.tif](../Images/Figure_3.1_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 3.1 Components of a prompt*'
  prefs: []
  type: TYPE_NORMAL
- en: In Figure 3.2 we have simple examples for each component.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure_3.2.tif](../Images/Figure_3.2_fmt.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 3.2 Components of a prompt: examples*'
  prefs: []
  type: TYPE_NORMAL
- en: We will learn them one by one.
  prefs: []
  type: TYPE_NORMAL
- en: '**CONTEXT Component**'
  prefs: []
  type: TYPE_NORMAL
- en: Just as in having a friendly chat with a colleague, before seeking advice or
    posing a question it is essential to set the stage and provide context, to establish
    the conversation's foundation.
  prefs: []
  type: TYPE_NORMAL
- en: 'By using the CONTEXT instructions, we enable AI to:'
  prefs: []
  type: TYPE_NORMAL
- en: – Understand our overall goal
  prefs: []
  type: TYPE_NORMAL
- en: – Decode jargon, abbreviations, or acronyms
  prefs: []
  type: TYPE_NORMAL
- en: – Generate output relevant to us
  prefs: []
  type: TYPE_NORMAL
- en: – Ensure outputs are sensitive to regional and cultural differences.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 1: Seeking Writing Advice'
  prefs: []
  type: TYPE_NORMAL
- en: 'CONTEXT:'
  prefs: []
  type: TYPE_NORMAL
- en: '*I''m working on a blog post about sustainable living and need help with structuring
    my ideas.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 2: Programming Task Assistance'
  prefs: []
  type: TYPE_NORMAL
- en: 'CONTEXT:'
  prefs: []
  type: TYPE_NORMAL
- en: '*I''m working on a web development project and need help with coding a responsive
    navigation menu.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 3: Organizing an Environmental Conservation Event'
  prefs: []
  type: TYPE_NORMAL
- en: 'CONTEXT:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Domain of Discourse: Environmental Conservation*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Location: Australian Outback*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Time Period: Present day*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Scenario: Planning a tree-planting event*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Desired Perspective: Ecologically sustainable practices*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Overall Goal: To organize a successful event that promotes community engagement
    in environmental conservation.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**AI ROLE Component**'
  prefs: []
  type: TYPE_NORMAL
- en: The next most important thing when we talk to AI is to assign AI a certain role.
    This empowers it to take on distinct responsibilities, such as teacher, language
    instructor, or designer.
  prefs: []
  type: TYPE_NORMAL
- en: The instruction "Act as a [ROLE]" equips AI with a blueprint for interaction.
    With this role in mind, AI can offer tailored responses, insights, and solutions
    that align with its defined role.
  prefs: []
  type: TYPE_NORMAL
- en: 'Advanced GPT engines can adopt various roles, including:'
  prefs: []
  type: TYPE_NORMAL
- en: – Functioning as a Human Expert, whether as prompt engineer, analyst, teacher,
    therapist, or financial analyst.
  prefs: []
  type: TYPE_NORMAL
- en: – Operating as a Tool, simulating functionalities like a Linux terminal, JavaScript
    Console, or an Excel Sheet.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 1: Seeking Writing Advice'
  prefs: []
  type: TYPE_NORMAL
- en: 'ROLE:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Act like a Writing Consultant.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 2: Programming Task Assistance'
  prefs: []
  type: TYPE_NORMAL
- en: 'ROLE:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Act like a Code Mentor.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 3: Seeking Custom Travel Advice'
  prefs: []
  type: TYPE_NORMAL
- en: 'ROLE:'
  prefs: []
  type: TYPE_NORMAL
- en: '*You are a travel advisor, specializing in creating personalized itineraries
    for budget-conscious backpackers.*'
  prefs: []
  type: TYPE_NORMAL
- en: In this role (as travel advisor), ChatGPT would provide tailored travel advice,
    suggest affordable accommodations, transportation options, and tourist attractions,
    and help backpackers plan cost-effective adventures.
  prefs: []
  type: TYPE_NORMAL
- en: '**AI PERSONALITY Component**'
  prefs: []
  type: TYPE_NORMAL
- en: This component of a prompt includes specific instructions about how AI should
    behave throughout the conversation, and how AI interacts with you. The default
    setting is "ChatGPT, you are a helpful assistant."
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: Preparing a History Lesson'
  prefs: []
  type: TYPE_NORMAL
- en: 'PERSONALITY:'
  prefs: []
  type: TYPE_NORMAL
- en: '*You are a witty, knowledgeable, and slightly sarcastic assistant with a penchant
    for historical anecdotes. While providing precise information, you engage with
    a touch of humor and an old-world charm, making the learning journey enjoyable.*'
  prefs: []
  type: TYPE_NORMAL
- en: This personality imbues the interaction with a lively, engaging tone, along
    with a dash of humor, making the discourse informative yet entertaining.
  prefs: []
  type: TYPE_NORMAL
- en: '**AI TASK Component**'
  prefs: []
  type: TYPE_NORMAL
- en: The instruction "Execute [TASK]" is what we want the model to perform, respectively
    our immediate request. Consider it as assigning tasks to different friends with
    specific expertise.
  prefs: []
  type: TYPE_NORMAL
- en: The instruction "Execute [TASK]" could include the current task or a step in
    a broader project.
  prefs: []
  type: TYPE_NORMAL
- en: – The long-term goal if the immediate task is part of a larger project.
  prefs: []
  type: TYPE_NORMAL
- en: '– The task to be executed now: write, rewrite, generate, summarize, analyze,
    code, cluster, extract, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 1: Seeking Writing Advice'
  prefs: []
  type: TYPE_NORMAL
- en: 'TASK:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Provide guidance on organizing key points and creating engaging subheadings.*'
  prefs: []
  type: TYPE_NORMAL
