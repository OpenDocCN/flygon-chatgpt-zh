  zh: 如同我们在上一章中提到的，时间是我们拥有的最重要的资源之一，如果不是最重要的。它也是我们每天、每小时、每分钟、每秒都拥有的东西。唯一能够“创造”更多时间的方法是通过整理我们的日常流程，摆脱那些不值得花费时间的事情，或者越来越多地，通过将某些重复性和自动化的任务委托给技术。我们曾经不得不自己洗衣服，直到洗衣机被发明出来，我们曾经不得不在烤箱里烹饪食物，直到微波炉被发明出来，而且在烤箱之前，我们曾经不得不生火来烹饪食物。
