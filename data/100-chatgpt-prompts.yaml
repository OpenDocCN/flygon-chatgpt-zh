  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions about my niche and audience behavior. Then, generate
    5 YouTube Shorts ideas designed to boost engagement, shares, and subscriber growth."'
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我10个关于我的领域和观众行为的问题。然后，生成5个旨在提升互动、分享和订阅增长的YouTube短片想法。"'
- en: 'Example Interaction:'
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●      ChatGPT asks:'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: ● ChatGPT 询问：
- en: What is your channel’s focus (education, entertainment, reviews, etc.)?
  id: totrans-585
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的频道重点是什么（教育、娱乐、评论等）？
- en: Who is your ideal viewer, and what short-form content do they engage with?
  id: totrans-586
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的理想观众是谁，他们喜欢参与哪些短视频内容？
- en: What are some of the most common misconceptions in your niche?
  id: totrans-587
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你领域内最常见的误解有哪些？
- en: Would you like to incorporate humor, storytelling, or shocking facts?
  id: totrans-588
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否希望融入幽默、讲故事或惊人的事实？
- en: What’s a quick, valuable tip or insight you can share in under 60 seconds?
  id: totrans-589
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你能分享一个60秒内快速、有价值的技巧或见解吗？
- en: Are there trending topics or viral challenges in your niche?
  id: totrans-590
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的领域内是否有热门话题或病毒式挑战？
- en: Would you like to stitch or react to other popular videos?
  id: totrans-591
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否希望拼接或反应其他热门视频？
- en: Do you want to use engaging hooks like “Wait till the end” or “Most people don’t
    know this”?
  id: totrans-592
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否想使用吸引人的钩子，如“等到最后”或“大多数人不知道这个”？
- en: How will you encourage viewers to comment, like, and subscribe?
  id: totrans-593
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你将如何鼓励观众评论、点赞和订阅？
- en: Do you plan to use YouTube Shorts as a teaser for long-form content?
  id: totrans-594
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你计划将YouTube短片作为长篇内容的预告片吗？
- en: '3\. YouTube Prompt: Live Streaming & Real-Time Engagement Strategy'
  id: totrans-595
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. YouTube 提示：直播与实时互动策略
- en: 'Prompt:'
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions about my content goals and audience interaction.
    Based on my answers, generate 5 YouTube Live stream ideas designed to maximize
    real-time engagement and build a loyal community."'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我10个关于我的内容目标和观众互动的问题。根据我的回答，生成5个旨在最大化实时互动和建立忠诚社区的YouTube直播想法。"'
- en: 'Example Interaction:'
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●      ChatGPT asks:'
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: ● ChatGPT 询问：
- en: What is the main goal of your YouTube Live streams (Q&A, education, entertainment,
    product launch)?
  id: totrans-600
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你YouTube直播的主要目标是什么？（问答、教育、娱乐、产品发布？）
- en: Who is your target audience, and what topics do they want to discuss?
  id: totrans-601
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的目标受众是谁，他们想讨论哪些话题？
- en: Do you prefer a structured format or spontaneous interaction?
  id: totrans-602
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你更喜欢结构化格式还是即兴互动？
- en: Would you like to bring on guest speakers or collaborate with other YouTubers?
  id: totrans-603
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否希望邀请嘉宾演讲或与其他YouTube创作者合作？
- en: How long do you plan to stream, and how often?
  id: totrans-604
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你计划直播多长时间，多久一次？
- en: Will you use interactive features like polls, super chats, or giveaways?
  id: totrans-605
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你会使用互动功能，如投票、超级聊天或赠品吗？
- en: How will you promote your Live sessions in advance to increase attendance?
  id: totrans-606
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你将如何提前推广你的直播活动以增加出席人数？
- en: Do you want to create Live content that can be repurposed as regular videos?
  id: totrans-607
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否希望创建可以作为常规视频重用的直播内容？
- en: How will you encourage real-time audience participation?
  id: totrans-608
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你将如何鼓励实时观众参与？
- en: What CTA (call to action) will you use to drive subscriptions, sales, or further
    engagement?
  id: totrans-609
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你将使用什么CTA（行动号召）来推动订阅、销售或进一步互动？
- en: '4\. YouTube Prompt: Collaboration & Audience Growth Strategy'
  id: totrans-610
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. YouTube 提示：合作与观众增长策略
- en: 'Prompt:'
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions about my niche, partnerships, and audience growth
    goals. Based on my answers, generate 5 YouTube collaboration ideas that boost
    engagement and expand my reach."'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我10个关于我的领域、合作伙伴关系和观众增长目标的问题。根据我的回答，生成5个旨在提升互动和扩大影响力的YouTube合作想法。"'
- en: 'Example Interaction:'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●      ChatGPT asks:'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: ●      ChatGPT 提问：
- en: What is your niche, and who are the major players in your industry?
  id: totrans-615
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的细分市场是什么，你行业中的主要参与者是谁？
- en: Do you want to collaborate with YouTubers at your level or larger influencers?
  id: totrans-616
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是想与处于你水平或更大影响力的 YouTuber 合作吗？
- en: What value can you offer to a potential collaboration partner?
  id: totrans-617
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你可以向潜在的合作伙伴提供什么价值？
- en: Would you prefer an interview, debate, reaction video, or challenge?
  id: totrans-618
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你更倾向于采访、辩论、反应视频还是挑战？
- en: How will you structure the collaboration to benefit both channels?
  id: totrans-619
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你将如何构建合作以使两个频道都受益？
- en: What audience engagement strategies will you use to cross-promote the collaboration?
  id: totrans-620
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你将使用哪些受众参与策略来跨推广合作？
- en: Do you want to make the collaboration a one-time event or an ongoing series?
  id: totrans-621
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是想将合作做成一次性的活动，还是持续系列？
- en: Are you open to featuring audience-generated questions or topics?
  id: totrans-622
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否愿意展示受众生成的提问或话题？
- en: How will you track the success of your collaboration?
  id: totrans-623
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你将如何跟踪合作的成功？
- en: Will you repurpose the collaboration content for shorts, TikTok, or Instagram?
  id: totrans-624
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否会将合作内容重新用于短片、TikTok 或 Instagram？
- en: '5\. YouTube Prompt: Subscriber Retention & Loyalty Strategy'
  id: totrans-625
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. YouTube 提示：订阅者保留与忠诚度策略
- en: 'Prompt:'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions about my current audience engagement and content
    performance. Then, generate 5 YouTube video ideas designed to increase watch time,
    loyalty, and repeat viewership."'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我关于我当前受众参与和内容表现的10个问题。然后，生成5个旨在增加观看时间、忠诚度和重复观看率的 YouTube 视频想法。"'
- en: 'Example Interaction:'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●      ChatGPT asks:'
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: ●      ChatGPT 提问：
- en: What is your current subscriber count, and how fast are you growing?
  id: totrans-630
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的当前订阅者数量是多少，你增长的速度有多快？
- en: What types of videos retain viewers the longest?
  id: totrans-631
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 哪种类型的视频能最长时间地留住观众？
- en: Have you noticed specific drop-off points in your videos?
  id: totrans-632
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否注意到你的视频中存在特定的流失点？
- en: What feedback have your most loyal subscribers given you?
  id: totrans-633
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你最忠诚的订阅者给了你哪些反馈？
- en: Do you want to create a content series that encourages binge-watching?
  id: totrans-634
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否想创建一个鼓励 binge-watching 的内容系列？
- en: Are there specific video formats that bring repeat viewers?
  id: totrans-635
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有哪些特定的视频格式能吸引重复观看者？
- en: Would you like to gamify subscriber loyalty with incentives, shoutouts, or giveaways?
  id: totrans-636
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否想通过激励、提及或赠品来游戏化订阅者的忠诚度？
- en: How do you currently interact with subscribers outside of videos (comments,
    Discord, newsletters)?
  id: totrans-637
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你目前如何在视频之外与订阅者互动（评论、Discord、通讯）？
- en: Do you want to personalize content for different audience segments?
  id: totrans-638
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否想为不同的受众群体定制内容？
- en: How will you create urgency for viewers to return for your next video?
  id: totrans-639
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你将如何为观众创造紧迫感，让他们回到你的下一个视频？
- en: 'Pinterest Prompts for Engagement and Growth:'
  id: totrans-640
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Pinterest 提升参与度和增长的提示：
- en: '1\. Pinterest Prompt: Engagement-Boosting Pin Strategy'
  id: totrans-641
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. Pinterest 提示：提升参与度的 Pin 策略
- en: 'Prompt:'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions about my niche, audience, and content strategy.
    Based on my answers, generate 5 Pinterest content ideas that encourage saves,
    repins, and comments."'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我关于我的细分市场、受众和内容策略的10个问题。根据我的回答，生成5个旨在鼓励保存、重新推送和评论的 Pinterest 内容想法。"'
