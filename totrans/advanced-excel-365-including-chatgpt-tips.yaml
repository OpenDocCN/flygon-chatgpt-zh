  id: totrans-2535
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 练习创建一个宏，在工作表中添加每日报告标题。
- en: 6. Practice creating a macro to add a signature at the end of the data.
  id: totrans-2536
  prefs: []
