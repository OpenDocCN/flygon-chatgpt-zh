  prefs: []
  type: TYPE_NORMAL
  zh: '**场景**：在线零售商希望为访问其网站的客户提供即时帮助。'
- en: '**Steps**:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤**：'
- en: '**Initial Setup**: Integrate ChatGPT with the customer support chat system
