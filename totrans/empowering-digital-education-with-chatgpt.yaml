  prefs: []
  type: TYPE_TB
- en: In conclusion, these emerging technologies are not mere fads, but catalysts
    for profound change. From individualized AI-powered platforms to captivating VR
    simulations, they hold the key to making education more personalized, engaging,
    and effective. Embracing this technological revolution empowers educators and
    learners alike to thrive in the digital age and forge a brighter future for education.
  prefs: []
  type: TYPE_NORMAL
- en: '2.4.2.2 Theme II: Application of ChatGPT'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Studies on the application of ChatGPT in educational research primarily focus
    on implementation, precautions, and responsible use. These studies were mostly
    in the form of peer-reviewed articles and few preprints available on social science
    research network (SSRN). Specifically, the research investigates how ChatGPT can
    decrease the burden of writing and formatting while accelerating and expediting
    the research process. For example, [Wang et al. (2023)](#ch10.xhtml#r098) investigated
    the effectiveness of ChatGPT in generating Boolean queries for literature reviews.
    Their findings indicated that ChatGPT demonstrated higher precision compared to
    current automatic query formulation methods. However, it proved unsuitable for
    high-recall retrieval and had certain limitations, including the presence of incorrect
    MeSH terms, variability in query effectiveness, and being a black-box application.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, limitations of ChatGPT in scientific writing were identified. While
    it proved to be extremely helpful, it exhibited problems with reasoning, calculating
    mathematical expressions, factual errors, bias, discrimination, and difficulty
    in using idioms. It also lacked human-like divergences, transparency, reliability,
    and perspective ([Borji, 2023](#ch10.xhtml#r021)). Furthermore, concerns were
    raised regarding security, data privacy, plagiarism, environmental impact, and
    ethical consequences. The suggested actions included responsible use, monitoring,
    transparent communication, and regular inspection for biases and harmful purposes.
  prefs: []
  type: TYPE_NORMAL
- en: The issue of academic integrity in the ChatGPT era was a common theme ([Cotton
    et al., 2023](#ch10.xhtml#r029)). There was a high risk of plagiarism and academic
    dishonesty, highlighting the need for careful consideration when using educational
    assessment tools. The review also found that ChatGPT could effectively reduce
    the burden of writing and formatting while overcoming language barriers ([Gao
    et al., 2022](#ch10.xhtml#r040)). However, there remained a risk of misuse and
    bias, which emphasizes the importance of clearly disclosing and documenting the
    use of ChatGPT in scientific writing or assistance. Importantly, ChatGPT was found
    to accelerate the research process, enhancing accuracy and precision ([Polonsky
    & Rotman, 2023](#ch10.xhtml#r081)). However, the issue of intellectual property
    arises when financial gains are involved, and ChatGPT could be listed as an author
    in some instances. The ongoing debate revolves around using the developers’ names
    as co-authors instead of ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: 2.4.2.2.1 Concerns with ChatGPT
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: Several concerns have been raised regarding the use of ChatGPT in education
    settings. Ethical issues, such as the risk of bias and transparency problems,
    were consistently highlighted ([Mhlanga, 2023](#ch10.xhtml#r069)). The generation
    of inaccurate content has been recognized as a valid concern with potentially
    serious consequences in education ([Adiguzel et al., 2023](#ch10.xhtml#r016)).
    Additionally, ChatGPT’s ability to provide justifications for incorrect decisions
    was questioned.
  prefs: []
  type: TYPE_NORMAL
- en: Other limitations of ChatGPT were also identified, including interpretability,
    reproducibility, and handling uncertainty, which can have detrimental effects
    on education research ([Ray, 2023](#ch10.xhtml#r086)). In the context of personalized
    learning, the lack of transparency and unclear information about the data sources
    used for ChatGPT training raised significant issues, considering the variation
    among different populations. The reproducibility of ChatGPT prompt runs was particularly
    emphasized as a major limitation in teaching and learning and producing similar
    assignments ([Elbanna & Armstrong, 2023](#ch10.xhtml#r033)).
  prefs: []
  type: TYPE_NORMAL
- en: 2.4.2.2.2 How to Integrate ChatGPT in Education
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: The swift advancements of ChatGPT in the realm of education necessitate that
    students, faculty, and researchers possess or acquire the capability to incorporate
    and capitalize on the opportunities they offer while also mitigating the limitations
    associated with reasoning, factual accuracy, mathematics, coding, and bias ([Abujaber
    et al., 2023](#ch10.xhtml#r015); [Elbanna & Armstrong, 2023](#ch10.xhtml#r033)).
    [Wu (2023)](#ch10.xhtml#r101) argues for the careful evaluation of ChatGPT integration
    to ensure alignment with ethical and pedagogical considerations.
  prefs: []
  type: TYPE_NORMAL
- en: 'In educational environments, it is proposed that the integration of ChatGPT
    prioritize ethical principles ([Mhlanga, 2023](#ch10.xhtml#r069)), accountability
    ([Rane, 2023](#ch10.xhtml#r085)), and privacy protection, while also fostering
    critical thinking and honesty ([Kostka & Toncelli, 2023](#ch10.xhtml#r058); [Cotton
    et al., 2023](#ch10.xhtml#r029)). Educators are encouraged to educate students
    about the limitations of ChatGPT and to encourage them to question its outputs.
    Implementation should be accompanied by clear regulatory frameworks, and institutions
    should concentrate on nurturing skills that AI cannot replicate, such as contextual
    comprehension and creativity. While AI does offer customized learning opportunities,
    it cannot fully replace the importance of collaboration and interaction with educators
    ([Fui-Hoon Nah et al., 2023](#ch10.xhtml#r039)). In the context of Industry 4.0
    technologies, educators and learners alike need to develop essential skills such
    as global awareness, innovation, technological proficiency, and interpersonal
    competence, which can significantly enhance learning processes both presently
    and in the future ([Sharma, & Yadav, 2022](#ch10.xhtml#r090)). To responsibly
    integrate ChatGPT in education the following should be considered:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Focus on specific tasks: Using it to provide feedback on drafts, summarizing
    complex topics, and generating practice questions.*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Stress on critical thinking: Teaching students to evaluate the information
    output to identify potential biases.*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Conglomerate with other approaches: Avoid relying solely on ChatGPT by integrating
    with traditional approaches e.g. hands-on activities and discussion forums*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Set clear guidelines: Establish clear expectations for how students can use
    ChatGPT responsibly and ethically.*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In examining the ethical dimensions of employing ChatGPT in higher education,
    [Huallpa (2023)](#ch10.xhtml#r051) advocated for utilizing NLP models to enhance
    human communication rather than replace it, aiming to address inherent limitations.
    To safeguard student privacy and minimize bias, universities should establish
    guidelines and ethical frameworks governing the utilization of NLP models. The
    reception of ChatGPT integration in terms of accessibility and societal acceptance
    was found to be moderate among participants. Previous research suggests the need
    for further exploration to comprehend the implications of AI in education, necessitating
    institutions to address ethical considerations and provide appropriate training
    for educators ([Ofosu-Ampong et al., 2023](#ch10.xhtml#r079)). In summary, the
    incorporation of ChatGPT into educational settings requires deliberate assessment
    of its role in augmenting rather than supplanting human interaction and the development
    of critical thinking skills. By recognizing the unique strengths and weaknesses
    of both human and ML, learners and educators can harness the potential of ChatGPT
    while upholding the essential aspects of human learning experiences.
  prefs: []
  type: TYPE_NORMAL
- en: '2.4.2.3 Theme III: SWOT Analysis of AI in Education'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: SWOT analysis is a strategic planning tool that can be used in educational institutions
    to evaluate their internal strengths and weaknesses, and external opportunities
    and threats ([Leiber et al. 2018](#ch10.xhtml#r060)). In 2020, the COVID-19 pandemic
    had a significant impact on education ([Ofosu-Ampong et al. 2024](#ch10.xhtml#r080)),
    and many institutions used SWOT analysis to assess their current position and
    develop future strategies. [Figure 2.2](#ch10.xhtml#f2) shows the SWOT analysis
    for the chapter based on the reviewed materials.
  prefs: []
  type: TYPE_NORMAL
- en: '![A flow diagram runs as follows. Strengths, weakness, opportunities, and threats.](html/images/9781032716084_C002_002.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.2](#ch10.xhtml#f2b) Synthesis of SWOT analysis of artificial intelligence.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Wang et al. (2022)](#ch10.xhtml#r097) used a SWOT analysis to evaluate the
    impact of the COVID-19 pandemic on education. They identified strengths and several
    coping strategies for educational institutions to adapt to new teaching and online
    learning methods and high learning flexibility. Weaknesses such as weak practical
    function, reduced vision, low efficiency, and effectiveness of communication were
    identified. Furthermore, they identified opportunities, such as the multi-directional
    information exchange activity and diversity of learning motivations to improve
    the use of technology in education; and threats included network instability,
    a requirement of strong self-control and the complexity of online resources.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In conclusion, SWOT analysis is a valuable tool that can be used in the education
    industry in the AI era to evaluate an institution to determine its current position
    and develop strategies for future growth and success ([Farrokhnia et al., 2023](#ch10.xhtml#r035)).
    With the current development of AI and emerging technologies, the following SWOT
    is discussed as reviewed:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Strength:'
  prefs: []
  type: TYPE_NORMAL
- en: The review covers a wide range of topics related to AI’s application education,
    including *personalized learning, student engagement, equity and access, and teacher
    support*.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The studies employ a range of methodologies, including experimental studies,
    case studies, and literature reviews, which provide a more comprehensive understanding
    of the potential of AI in education.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The studies are conducted in various countries around the world, suggesting
    that the application of AI in education is a global phenomenon and of varied interest.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The papers highlight the potential of AI-based technologies to transform various
    aspects of teaching and learning and suggest promising areas for future research.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Weaknesses:'
  prefs: []
  type: TYPE_NORMAL
- en: The reviewed papers are limited in number and cover a relatively short time
    frame, which may not provide a comprehensive understanding of the field.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is a tendency to focus on a specific intervention or technology, which
    may limit their generalizability to other contexts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Many of the studies are experimental, which can be time-consuming and resource-intensive
    and may not be feasible in all educational settings.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The studies are conducted in a range of educational settings and contexts, which
    may make it difficult to compare results across studies.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Opportunities:'
  prefs: []
  type: TYPE_NORMAL
- en: There is a growing interest in the application of AI in education, which provides
    opportunities for further research and development, despite the lack of clear
    policy direction from educational institutions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The potential of AI-based technologies to improve personalized learning, student
    engagement, equity and access, and teacher support provides opportunities for
    innovation in educational practice.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is a need for research on the ethical and social implications of AI in
    education, which provides opportunities for interdisciplinary collaboration.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Threats:'
  prefs: []
  type: TYPE_NORMAL
- en: There are concerns about the potential negative effects of AI-based technologies
    on educational outcomes, such as increased dependence on technology and reduced
    face-to-face interaction.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As previously stated, there are concerns about AI’s ethical and social implications
    in education, such as privacy concerns and the potential for bias and discrimination.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The high cost of developing and implementing AI-based technologies may limit
    their accessibility in some educational settings.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There may be resistance from educators and students to the use of AI-based technologies
    in education, which may limit their adoption and effectiveness.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Overall, the SWOT analysis highlights the potential and challenges of the application
    of AI in education. While there are opportunities for innovation and improved
    educational outcomes, there are also threats related to ethical and social implications,
    cost, and adoption ([Garcia et al. 2024](#ch10.xhtml#r042)). Addressing these
    challenges is critical in realizing the potential of AI in education.
  prefs: []
  type: TYPE_NORMAL
- en: '2.4.2.3 Theme IV: The Human–AI Interaction (The Impact on Education)'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The emergence of ChatGPT in November 2022 has captured the attention of scholars
    across all disciplines. Researchers and the media have actively engaged in discussions
    surrounding the implications of ChatGPT and generative AI in general, shedding
    light on the potential benefits and risks associated with these systems ([Li et
    al., 2021)](#ch10.xhtml#r063). The field of generative AI gained significant traction
    in 2014 with the development of generative adversarial networks (GANs), which
    enabled the creation of valuable outputs like facial images and noise maps ([Creswell
    et al., 2018](#ch10.xhtml#r030)). Thanks to a user-friendly web interface provided
    by OpenAI, generative AI tools can now effectively respond to queries in English
    and generate answers to complex questions nearly indistinguishable from expert
    human responses. The launch of ChatGPT and the subsequent discussions have caused
    concern among academics, especially concerning maintaining academic integrity
    in university classrooms ([Cotton et al., 2023](#ch10.xhtml#r029)). Some have
    expressed worry that these systems promote high-tech plagiarism and allow students
    to avoid genuine learning. While academic integrity issues exist, even with tools
    that can detect generative AI text, we argue against completely dismissing the
    potential of these technologies. AI has the potential to revolutionize the classroom
    experience and enhance the knowledge and competencies of students. Considering
    this, we propose suggestions for higher education instructors to fully engage
    with this disruptive technology ([Girasa & Girasa, 2020](#ch10.xhtml#r043)).
  prefs: []
  type: TYPE_NORMAL
- en: The transformation in academic work from writing to research has become more
    evident with the advent of ChatGPT ([Cantú-Ortiz et al., 2020](#ch10.xhtml#r024)).
    The importance of writing may therefore be diminished as tools like ChatGPT can
    facilitate writing tasks more effectively. The focus now shifts toward communicating
    research results through text that is easy to understand. Many scholars particularly
    those who are not native English speakers have already taken advantage of writing
    assistance tools like Grammarly and proofreading services to enhance their writing
    ([Fitria, 2021](#ch10.xhtml#r037)). ChatGPT has paved the way for research to
    overcome language barriers, and English writing proficiency is no longer the only
    factor in disseminating research findings to a broader audience ([Fitria, 2021](#ch10.xhtml#r037)).
    The release of ChatGPT is just the beginning, and more specialized and advanced
    tools will likely follow. It is neither advisable to ban nor embrace the technology
    without proper critical consideration. As with any technological progress, it
    is necessary to carefully assess its advantages and disadvantages and experiment
    to find ways to make the most of it. Such AI tools can potentially transform work
    practices and eventually become a part of our daily lives. However, it remains
    to be seen how technology will evolve and how humans and society will adapt to
    it in the long term.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, the reviewed papers highlight the potential of AI-based technologies
    to transform various aspects of teaching and learning. The recurring themes of
    personalized learning, student engagement, equity and access, and teacher support
    suggest that these are promising areas for future research.
  prefs: []
  type: TYPE_NORMAL
- en: '*Recurring Themes:*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Personalized learning: One recurring theme across the papers was the use of
    AI-based technologies to provide personalized learning experiences for students
    ([Zhou, 2013](#ch10.xhtml#r104)). ITSs and adaptive learning platforms were the
    most studied interventions for personalized learning. Several papers reported
    positive effects on student learning outcomes, suggesting that AI-based personalized
    learning is a promising area for future research.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Student engagement: Another recurring theme was the use of AI-based tools to
    increase student engagement and motivation in learning activities. Chatbots and
    game-based learning environments were among the most studied interventions for
    student engagement. The papers reported mixed results for the effectiveness of
    these interventions, suggesting that further research is needed to understand
    better the potential of AI-based tools for increasing student engagement.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Equity and access: Several papers discussed the potential for AI-based technologies
    to improve equity and access in education ([Tsai et al. 2020](#ch10.xhtml#r094);
    [Ofosu-Ampong, 2023](#ch10.xhtml#r075)). The studies focused on how AI can support
    students from marginalized backgrounds or with disabilities, through personalized
    learning and assistive technologies. The results of these studies were generally
    positive, highlighting the potential for AI to improve equity and access in education.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Teacher support: The review found that AI-based tools can be used to support
    teachers in their instructional practice, such as through automated grading and
    feedback systems. The results of these studies were mixed, with some suggesting
    that AI-based tools can save teachers time and improve their efficiency. Contrastingly,
    others highlight concerns about the accuracy and fairness of automated grading
    ([Hacker, 2018](#ch10.xhtml#r047)).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Figure 2.3](#ch10.xhtml#f3) shows a conceptualization for this review chapter
    to encompass the AI problems identified, methodological approaches, themes, SWOT
    analysis, recurring themes, and the future of human–AI interaction.'
  prefs: []
  type: TYPE_NORMAL
- en: '![An infographic titled conceptualizing artificial intelligence framework in
    education with a lightbulb icon. It has six sections. 1. A I problems, 2. methodology,
    3. A I themes, 4. SWOT analysis, 5. recurring themes, and 6. future of human-A
    I. At the bottom text reads, Ofosu-Ampong et al. 2024.](html/images/9781032716084_C002_003.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 2.3](#ch10.xhtml#f3b) Conceptualisation of AI in education.'
  prefs: []
  type: TYPE_NORMAL
- en: 2.4.2.3.1 Human–AI Interaction and Trust
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: AI encompasses millions of interrelated values and factors to enhance predictive
    accuracy continually, resulting in a delicate balance between transparency and
    complexity ([Walmsley, 2021](#ch10.xhtml#r096)). AI techniques empower machines
    to learn from experience and mimic intelligent human behavior. Due to its operational
    mechanism, AI is often characterized as an opaque box paradigm due to the diverse
    algorithms at play ([Suresh et al., 2023](#ch10.xhtml#r093)). This lack of transparency
    has led to widespread trust issues with AI, as individuals are often unfamiliar
    with the underlying algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: The ascent of AI brings forth a significant societal concern – trust in AI ([Lukyanenko
    et al., 2022](#ch10.xhtml#r065)). Human trust traditionally relies heavily on
    physical appearance, but AI, built on unseen algorithms, presents a challenge
    for individuals to trust its outputs ([Glikson & Woolley, 2020](#ch10.xhtml#r044)).
    The inherent uncertainty and ambiguity in AI operations contribute to widespread
    caution, skepticism, and distrust of AI-generated results. Despite attempts to
    imbue AI agents with anthropomorphic traits to improve human trust, such as a
    human-like appearance, studies question whether humans indeed develop more confidence
    in AI ([Zhang et al., 2023](#ch10.xhtml#r103)).
  prefs: []
  type: TYPE_NORMAL
- en: '[Dujmovic (2017)](#ch10.xhtml#r032) reported that approximately 42% of people
    in the USA lack trust in AI’s outputs. In terms of trust across sectors, only
    16% expressed trust in AI medical diagnostics, 4% in human resources, and 13%
    in self-driving cars. Similarly, consumer perceptions of AI services in the USA
    indicate that about 45% harbor distrust toward AI services ([Davenport, 2019](#ch10.xhtml#r031)).
    In Japan, around 57% of people feel uncomfortable working with AI ([Ministry of
    Internal Affairs and Communications, 2016](#ch10.xhtml#r070)). [Langer et al.
    (2023)](#ch10.xhtml#r059) argue that mistrust in AI stems from the inconsistency
    of results. While most people expect AI to yield consistent outcomes, this is
    not always the case. Inconsistencies can erode trust in AI, posing challenges
    for subsequent repairs. Despite tempered expectations from automated systems,
    breaches of trust make it challenging to heavily rely on AI results. In short,
    the key takeaway for higher education in building trust in human–AI interaction
    involves a combination of transparency, fairness, user empowerment, user feedback
    and iterative improvement, education, human-centric design, and a commitment to
    ethical practices. We project that, as AI technologies continue to advance, trustworthy,
    and user-friendly systems will be essential in their successful integration into
    various aspects of society.'
  prefs: []
  type: TYPE_NORMAL
- en: 2.5 The Future of Human–AI Interaction in Education
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Considering the mutual reliance of AI and human agents in task performance,
    we propose that AI, chatbots, and other learning platforms can utilize a range
    of human–AI hybrids that span from *robotization to diversification and synthesis.*
  prefs: []
  type: TYPE_NORMAL
- en: '2.5.1 Robotization: Chasing Robots in Education'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Robotization, the process of replacing human workers with robots is already
    underway in several industries, including manufacturing, healthcare, and customer
    service ([Chu et al. 2022](#ch10.xhtml#r028)). In the education sector, robotization
    is also beginning to take hold. One application of robotization in education is
    by developing language model chatbots or platforms. These platforms allow AI systems
    to be deployed to substitute for the role of human agents in performing tasks.
    For example, AI systems can now write articles about sporting events, in a fraction
    of the time and at a comparable quality level to that of experienced sports writers.
    Another way that robotization is being used in education is by developing virtual
    assistants ([Goel & Polepeddi, 2020](#ch10.xhtml#r045)). These assistants can
    be used to provide students with personalized support and instruction. For example,
    a virtual assistant could help students with their homework or provide them with
    feedback on their writing. The use of robots in education is still in its early
    stages, but it is likely to grow in the coming years. As AI systems become more
    sophisticated, they will be able to perform an increasing number of tasks currently
    performed by humans (teachers). This could lead to significant changes in the
    way that education is delivered.
  prefs: []
  type: TYPE_NORMAL
- en: 2.5.2 Diversification
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Diversification is the process of merging different elements to create something
    new. In the context of education, diversification can refer to the process of
    combining different teaching and learning methods to create a more effective learning
    experience for students ([Chou et al. 2022](#ch10.xhtml#r027)). One way that diversification
    is being used in education is through digital platforms. These platforms allow
    human and AI agents to work collaboratively to enhance one another’s skills and
    abilities. Humans can also augment AI agents in many ways. For example, humans
    can:'
  prefs: []
  type: TYPE_NORMAL
- en: Teach AI agents to improve their understanding of language nuances and contextual
    knowledge, fix mistakes, and learn from their accomplishments.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Make it easier for non-technical individuals to understand the reasoning behind
    decisions made by opaque ML algorithms, enhancing transparency, and accountability.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use judgment and ethical values and educational co-creation values to ensure
    AI agents consistently behave ethically and comply with ethical standards ([Rai
    et al., 2019](#ch10.xhtml#r084); [Robayo-Pinzon et al. 2023](#ch10.xhtml#r087)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The use of diversification in education is still in its early stages, but its
    potential growth is undeniable. As AI systems become more sophisticated, they
    will be able to play an increasingly important role in education. This could lead
    to significant changes in the way that education is delivered.
  prefs: []
  type: TYPE_NORMAL
- en: 2.5.3 Synthesis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Similarly, synthesis is the process of combining different elements to create
    something new ([Brunsting et al., 2014](#ch10.xhtml#r023)). However, it emphasizes
    a broad spectrum of AI to encompassing speech synthesis, image generation, machine
    translation, and generating explanation. In the context of education, synthesis
    can refer to the process of combining different teaching and learning methods
    to create a more effective AI learning experience for students.
  prefs: []
  type: TYPE_NORMAL
- en: One way that synthesis is being used in education is through digital platforms
    or chatbots ([Li et al. 2021](#ch10.xhtml#r063)). These platforms allow human
    and AI agents to work together to create an integrated unit to perform complex
    tasks. For example, medical schools and AI-powered robots ([Li, Lam & See, 2021](#ch10.xhtml#r063))
    can function as integrated units to perform minimally invasive surgeries. This
    type of synthesis has the potential to revolutionize education. By combining the
    strengths of humans and AI agents, the platforms can create learning experiences
    that are more personalized, more engaging, and more effective than traditional
    methods.
  prefs: []
  type: TYPE_NORMAL
- en: The use of synthesis in education has several potential benefits. For example,
    synthesis can give students access to a wider range of teaching and learning methods.
    However, as stated earlier several challenges need to be addressed. For instance,
    it is important to ensure that AI systems are used in a way that is ethical and
    responsible. Also, humans and AI agents can work together effectively, and the
    use of synthesis should not lead to job losses for teachers ([Holstein et al.,
    2020](#ch10.xhtml#r049)). Overall, the use of synthesis in education is a complex
    issue with both potential benefits and challenges. Hence, it is essential to carefully
    evaluate the potential impact of synthesis before making any decisions about its
    use in the classroom ([Zawacki-Richter et al., 2019](#ch10.xhtml#r102)). Further
    research is needed to examine the types of human–AI interactions required for
    different tasks that are performed on chatbot platforms.
  prefs: []
  type: TYPE_NORMAL
- en: 2.6 Conclusion and Suggestions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter reviews the current state of AI, ChatGPT, and emerging technologies
    in education and highlights possible future research areas. The study found the
    progressive integration of theories in AI research; however, several articles
    employed theories from the technology acceptance-motivational related theories
    such as the unified theory of acceptance and use of theory, innovation diffusion
    theory, technology-organization-environment, self-determination theory, and collaborative
    learning theory. Concerning the methodologies, the controlled experiment and simulation
    method, case study method, and the survey method emerge as the most used approaches
    within the qualitative and quantitative methodologies. Also, the review shows
    that the popular AI techniques used are neural networks, fuzzy logic, and SVM.
  prefs: []
  type: TYPE_NORMAL
- en: 'Three main themes were identified concerning the issues investigated: the development
    phase, the SWOT analysis phase, and the human–AI interaction phase. The review
    suggests that a qualitative study should be conducted to determine the critical
    features of ChatGPT applications that drive their acceptance, adoption, and use,
    leading to benefits beyond those expected. Also, human–AI interaction can utilize
    a range of human–AI hybrids that span from robotization to diversification and
    synthesis ([Ofosu-Ampong, 2024a](#ch10.xhtml#r076)).'
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, gaining a competitive advantage is crucial for educational institutions
    to outperform their rivals and succeed. One valuable tool for enhancing productivity
    that can contribute to this advantage is AI education (e.g. ChatGPT), an AI language
    model. Integrating AI into instructional activities can offer numerous benefits
    for students. However, it may necessitate institutional adjustments such as updating
    curricula in schools to accommodate generative AI tools. While some academic institutions
    have currently enforced a complete ban on the use of AI tools like ChatGPT for
    school-related tasks, it is essential to reevaluate this policy and actively involve
    instructors in utilizing the tool to maximize its benefits for students.
  prefs: []
  type: TYPE_NORMAL
- en: At the national level, governments are responsible for establishing regulations
    that balance between safeguarding users against the abuse and misuse of generative
    AI while encouraging technology companies to invest in this transformative innovation
    ([Ofosu-Ampong, 2021](#ch10.xhtml#r074)). Some analysts express concerns that
    such regulations could potentially hinder the development and utilization of these
    systems ([Cantú-Ortiz et al. 2020](#ch10.xhtml#r024); [Chu et al 2022](#ch10.xhtml#r028);
    [Ofosu-Ampong et al. 2023](#ch10.xhtml#r079)). Therefore, it becomes crucial to
    assess the societal value of ChatGPT and other generative AI tools to formulate
    regulations that effectively govern their usage. Additionally, given the global
    reach of tools like ChatGPT, different jurisdictions should collaborate to develop
    regulations that can be universally embraced.
  prefs: []
  type: TYPE_NORMAL
- en: The integration of AI into teaching, research, and learning is still in its
    early stages, and it is too early to definitively predict what the long-term impact
    will be. However, AI has the potential to both improve and exacerbate the challenges
    facing innovation in education (see Appendix). It is important to consider these
    challenges as AI continues to develop carefully.
  prefs: []
  type: TYPE_NORMAL
- en: Three main recommendations for higher education
  prefs: []
  type: TYPE_NORMAL
- en: '*Based on all that has been discussed, we recommend that:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Students develop adaptive skills, collaborative and critical thinking skills
    to solve complex and unstructured problems*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Managers of higher education reevaluate the importance of higher education
    and prepare students for the workforce embedded in AI*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Educational stakeholders at regional and national level collaborate to discuss
    best practices for the future of higher education*'
  prefs:
  - PREF_OL
