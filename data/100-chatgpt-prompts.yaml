  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否会使用赠品、比赛或提及作为激励措施？
- en: How will you promote your UGC campaign across other social platforms?
  id: totrans-548
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你将如何在其他社交平台上推广你的UGC活动？
