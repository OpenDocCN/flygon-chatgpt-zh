- en: 'Chapter One: Introduction to Prompt Engineering'
  id: totrans-22
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一章：提示工程简介
- en: AI prompt engineering is a captivating and revolutionizing discipline that is
    responsible for unlocking the total potential of artificial intelligence (AI).
    Whether you’re writing prompts for creative writing, coding, or solving problems,
    being aware of the fundamentals of AI prompts is vital to unravel the power of
    AI tools. In this chapter, we will explore the basics of AI prompts, how they
    operate, and why they are at the heart of making the most from AI systems.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: AI提示工程是一个引人入胜且具有革命性的学科，它负责解锁人工智能（AI）的全部潜力。无论你是为创意写作、编码还是解决问题编写提示，了解AI提示的基础对于揭示AI工具的力量至关重要。在本章中，我们将探讨AI提示的基本知识、它们的工作原理以及为什么它们是充分利用AI系统的核心。
- en: What is a Prompt?
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是提示？
- en: In artificial intelligence, a prompt refers to an input or command given to
    an AI model to produce a certain output. A well-crafted prompt directs the AI
    to produce responses that are consistent with the expectations of the user, be
    it generating text, answering a question, or filling out a task.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能领域，提示指的是提供给AI模型以产生特定输出的输入或命令。一个精心设计的提示将指导AI产生符合用户期望的响应，无论是生成文本、回答问题还是完成任务。
- en: Fundamentally, AI works by studying patterns and associations from large quantities
    of information, using these to forecast results from provided inputs. The prompt
    acts as a master key that unlocks the ability of the model to generate accurate,
    pertinent, and cohesive answers.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 从本质上讲，AI通过研究大量信息中的模式和关联来工作，使用这些信息来预测从提供的输入中得出的结果。提示充当一把万能钥匙，解锁模型生成准确、相关和连贯答案的能力。
- en: How Do AI Models Work?
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型是如何工作的？
- en: 'AI algorithms, particularly NLP-based models such as GPT (Generative Pretrained
    Transformer), work by reading the input text and producing an output that best
    matches the context of the prompt. The process typically entails the following
    steps:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: AI算法，尤其是基于NLP的模型，如GPT（生成预训练变换器），通过读取输入文本并产生与提示上下文最佳匹配的输出而工作。这个过程通常包括以下步骤：
- en: 'Tokenization: The AI tokenizing the input prompt into finer units (tokens),
    which may be words, subwords, or characters. The model processes these tokens
    to learn the meaning and structure of the input.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 分词：AI将输入提示分词成更细小的单元（标记），这些可能是单词、子词或字符。模型处理这些标记以学习输入的意义和结构。
- en: 'Contextual Understanding: The AI relies on its pre-trained understanding to
    make sense of the meaning behind the tokens in the prompt. It analyzes the context
    and comes up with the most probable response based on patterns learned during
    training.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文理解：AI依靠其预训练的理解能力来理解提示中标记的意义。它分析上下文，并根据在训练期间学习到的模式提出最可能的响应。
- en: 'Response Generation: Based on comprehension of the prompt, the AI provides
    a response. Such output is made possible through statistical patterns derived
    from data, involving grammar, syntax, semantics, as well as even more general
    contextual understanding.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 响应生成：基于对提示的理解，AI提供响应。这种输出是通过从数据中得出的统计模式实现的，涉及语法、句法、语义，甚至更广泛的上下文理解。
- en: 'Refinement: Several AI models provide the option to modify outputs through
    refinement of prompts or adding more context, e.g., precise directions on tone,
    style, or format.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 精炼：一些AI模型提供了通过提示的精炼或添加更多上下文来修改输出的选项，例如，对语气、风格或格式的精确指导。
- en: The output’s quality is mostly reliant on the prompt’s quality. A vague or ill-composed
    prompt can produce answers that are off-topic or incomplete, but a clear and well-formatted
    prompt can lead the AI to exceptionally precise and valuable outcomes.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 输出的质量主要依赖于提示的质量。模糊或不恰当的提示可能会产生离题或不完整的答案，但清晰和格式良好的提示可以引导AI产生非常精确和有价值的输出。
- en: The Significance of Precise and Clear Prompts
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 精确和清晰提示的重要性
- en: 'Creating effective AI prompts is an art. Clear and specific prompts allow the
    AI to understand exactly what you’re asking and provide outputs that meet your
    needs. Here are a few key considerations when crafting your prompts:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 创建有效的AI提示是一种艺术。清晰和具体的提示可以让AI确切地了解你的要求，并提供满足你需求的输出。在制定你的提示时，以下是一些关键考虑因素：
- en: 'Clarity: Vague questions may confuse the AI and lead to obscure or irrelevant
    answers. The clearer and more direct the question, the greater the likelihood
    the AI will generate the intended output.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰度：模糊的问题可能会让AI困惑，导致模糊或不相关的答案。问题越清晰、越直接，AI生成预期输出的可能性就越大。
- en: 'Example: Rather than asking, “Tell me about history,” you might ask, “Give
    me an overview of the history of Ancient Rome, with a focus on the establishment
    of the empire.”'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：与其问“告诉我关于历史的事情”，你可能会问“给我概述一下古罗马的历史，重点放在帝国的建立上。”
- en: 'Context: Giving the AI context or a set of specific instructions allows it
    to create a more relevant and meaningful response. The more context you give,
    the more the AI will be able to customize its output.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文：为AI提供上下文或一组具体指令，使其能够创建更相关和有意义的回答。你提供的上下文越多，AI就越能够定制其输出。
- en: 'Example: If you prefer a more formal tone in your answer, including “Write
    in a formal tone” assists the AI in its style.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：如果你希望回答更加正式，包括“用正式的语气写”可以帮助AI确定风格。
- en: 'Detail: Providing more details in your prompts can help the AI generate more
    accurate and intricate outputs. For instance, instead of asking the AI to “Write
    a story,” include more specific information such as the setting, characters, and
    the conflict.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 详细性：在提示中提供更多细节可以帮助AI生成更准确和复杂的输出。例如，与其要求AI“写一个故事”，不如提供更具体的信息，如背景、人物和冲突。
- en: Various Kinds of Prompts
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 各种类型的提示
- en: 'There are a few types of prompts through which different types of outputs can
    be created. Below is an explanation of some popular prompt types:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种类型的提示可以通过不同的方式创建不同的输出。以下是关于一些流行提示类型的解释：
- en: 'Informational Prompts: These prompts are designed to elicit factual information
    or data.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 信息提示：这些提示旨在引发事实信息或数据。
- en: 'Example: “What are the advantages of exercise on mental health?”'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“锻炼对心理健康有哪些好处？”
- en: 'Creative Prompts: These are prompts for producing creative material, like stories,
    poems, or ideas for paintings.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 创意提示：这些是用于产生创意材料（如故事、诗歌或绘画想法）的提示。
- en: 'Example: “Write a short story about a detective who solves a mystery in a futuristic
    city.”'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“写一个关于侦探在未来的城市解决谜案的短篇小说。”
- en: 'Instructional Prompts: These are used to instruct the AI to give directions
    or procedures.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 指示性提示：这些用于指导AI给出指示或程序。
- en: 'Example: “Describe baking a chocolate cake from scratch, step by step.”'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“从零开始，一步一步描述制作巧克力蛋糕的过程。”
- en: 'Problem-Solving Prompts: These are prompts that require the AI to solve a particular
    problem or examine an issue.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 问题解决提示：这些提示要求AI解决特定问题或检查某个问题。
- en: 'Example: “How do I rank better in SEO in my website?”'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“我如何在网站上提高SEO排名？”
- en: 'Opinion-Based Prompts: These require subjective opinions, insights, or analyses.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 基于观点的提示：这些提示需要主观意见、见解或分析。
- en: 'Example: “What are the advantages and disadvantages of remote working for companies?”'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“远程工作对公司有哪些优缺点？”
- en: 'Generative Prompts: These are prompts that require the AI to create new, original
    content on a provided theme.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式提示：这些提示要求AI在提供的主题上创建新的、原创的内容。
- en: 'Example: “Create five interesting headings for a blog entry on AI in business.”'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为关于商业中AI的博客文章创建五个有趣的标题。”
- en: Common Mistakes to Avoid in Prompt Engineering
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 避免在提示工程中犯的常见错误
- en: 'Even though crafting AI prompts seems straightforward, several common mistakes
    can hinder the effectiveness of the responses:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管制作AI提示看起来很简单，但一些常见的错误可能会阻碍响应的有效性：
- en: 'Being Too Vague: As stated above, vague questions can confuse the AI and yield
    irrelevant responses. Always try to be clear and specific.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 过于模糊：如上所述，模糊的问题可能会让AI感到困惑，并产生不相关的响应。始终尝试保持清晰和具体。
- en: 'Overloading the Prompt: Giving too much information at once can confuse the
    AI and result in unorganized answers. Keep prompts centered on a single primary
    task or question.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 提示过载：一次性提供过多信息可能会让AI感到困惑，导致答案无组织。请确保提示集中在单一的主要任务或问题上。
- en: 'Omitting to Mention Output Type: If you require the output in a certain length,
    style, or format, ensure that you indicate so in the prompt. For instance, “Write
    a 500-word blog post on…” or “Give a bullet-point list of…”'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 忽略提及输出类型：如果你需要特定长度、风格或格式的输出，确保在提示中指明。例如，“写一篇500字的博客文章……”或“给出一个要点列表……””
- en: 'Overlooking the Audience: If you are thinking of a particular audience, make
    sure your prompt speaks to that audience. A technical explanation, for example,
    may not be appropriate for a general audience, so be clear who the answer is intended
    for.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 忽视受众：如果你在考虑特定的受众，确保你的提示能够吸引那个受众。例如，技术解释可能不适合普通受众，所以请明确答案的目标受众。
- en: Conclusion
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Here, in this chapter, we have provided a foundation for recognizing the use
    of AI prompts and how they contribute to useful output creation. The process of
    creating an effectively defined prompt is key to the full realization of AI. Through
    making sure that your prompts are specific, clear, and detailed, you can direct
    the AI to give responses that work for you in terms of business, education, content
    generation, or solving issues.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们为识别AI提示的使用及其如何有助于创建有用的输出提供了基础。创建一个有效定义的提示是AI全面实现的关键。通过确保你的提示具体、清晰和详细，你可以指导AI给出对你有用的响应，无论是商业、教育、内容生成还是解决问题。
- en: As we continue to explore more advanced techniques in prompt engineering, it’s
    important to keep practicing and experimenting. The more you refine your approach
    to AI prompts, the better your results will be. Now that we’ve covered the basics,
    let’s move on to the next chapter, where we’ll delve deeper into creating customized
    prompts for different use cases.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们继续探索提示工程的高级技术，保持实践和实验非常重要。你越精细地调整对AI提示的方法，结果就会越好。现在我们已经涵盖了基础知识，让我们进入下一章，我们将更深入地探讨为不同用例创建定制提示。
- en: 'Chapter Two: Fundamentals of Effective Prompt Design'
  id: totrans-64
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章：有效提示设计的基础
- en: In Chapter One, we introduced the fundamentals of AI prompts, their significance,
    and functionality. In this chapter, we will learn how to write well-structured
    and effective prompts. Writing clear, specific, and accurate prompts is critical
    to instructing AI models to produce high-quality, relevant, and actionable results.
    This chapter will offer a step-by-step guide on how to write prompts that optimize
    the potential of AI and steer clear of pitfalls.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一章中，我们介绍了AI提示的基础知识、其重要性以及功能。在本章中，我们将学习如何编写结构良好和有效的提示。编写清晰、具体和准确的提示对于指导AI模型产生高质量、相关和可操作的结果至关重要。本章将提供如何编写提示以优化AI潜力并避免陷阱的逐步指南。
- en: 1\. Anatomy of an Effective Prompt
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 有效提示的构成
- en: A good prompt isn’t simply a sentence; it’s a concise and specific instruction
    that tells the AI how to create valuable content. Knowledge of the general framework
    of a good prompt is the starting point for effective prompt engineering.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好的提示不仅仅是一个句子；它是一个简洁而具体的指令，告诉AI如何创建有价值的内容。了解一个好的提示的一般框架是有效提示工程的开端。
- en: 'Most Important Elements of a Good Prompt:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 好的提示最重要的要素：
- en: 'Clarity: The question should state precisely what you’re looking for without
    vagueness. If the AI can clearly understand the task, it’s more likely to give
    you appropriate answers.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰度：问题应精确地说明你想要什么，不要含糊。如果AI可以清楚地理解任务，那么它更有可能给出适当的答案。
- en: 'Specificity: Make your request as specific as possible regarding the task.
    If you’re asking for a certain format, tone, or type of response, make sure to
    include these in your request.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 具体性：尽可能具体地说明你的任务请求。如果你要求某种格式、语气或响应类型，确保在请求中包含这些内容。
- en: 'Context: If there is some background information required for the task, include
    the context. This will assist the AI in producing responses that are not only
    correct but also appropriate for the situation presented.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：如果任务需要某些背景信息，请包括背景。这将帮助AI产生不仅正确而且适合所提供情况的响应。
- en: 'Instructions: Clear instructions regarding the output you want will guide the
    attention of the AI. For instance, indicate whether you want a list, a paragraph,
    or a set of bullet points.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 指示：关于你想要的输出的明确指示将引导AI的注意力。例如，指出你是否想要一个列表、一个段落或一系列项目符号。
- en: 2\. Establishing Clearer Intentions through Your Prompt
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 通过你的提示建立更清晰的意图
- en: One of the most important factors in writing effective prompts is setting clear
    intentions. If you know exactly what you want from the AI, you can structure your
    prompt accordingly.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 写出有效提示最重要的因素之一是设定清晰的意图。如果你确切知道你想要从AI那里得到什么，你可以相应地构建你的提示。
- en: 'Example 1: Ambiguous vs. Clear Intentions'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：含糊不清与清晰意图的比较
- en: 'Ambiguous Prompt: “Tell me about health.”'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 含糊不清的提示：“告诉我关于健康的事情。”
- en: 'Clear Prompt: “Describe the advantages of an equilibrated diet for physical
    and mental well-being.”'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰的提示：“描述均衡饮食对身体和心理健康的好处。”
- en: In the first example, the AI would have a very broad set of possible responses.
    In the second example, the prompt specifies the emphasis on the advantages of
    eating well, and so the AI will respond with a more detailed and practical answer.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一个例子中，AI会有一个非常广泛的可能回答集。在第二个例子中，提示明确指出了强调健康饮食的优点，因此AI会给出更详细和实用的回答。
- en: 3\. Placing Your Prompt in Context and with Constraints
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在背景和限制条件下放置你的提示
- en: Supplying the appropriate context assists in limiting the scope of the AI’s
    response. In other instances, you might also like to impose constraints (e.g.,
    certain length, tone, or style) to better match the output to your requirements.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 提供适当的背景有助于限制AI响应的范围。在其他情况下，你也可能希望施加限制（例如，特定长度、语气或风格），以便更好地将输出与你的要求相匹配。
- en: 'Examples of Contextualizing Prompts:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 提示具体化的例子：
- en: “300-word blog entry on the necessity of time management for college students.”
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: “一篇300字的关于大学生时间管理必要性的博客文章。”
- en: '“Generate a formal response to this customer complaint: ‘I’m disappointed with
    your service and would like a refund.’”'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: “对以下客户投诉给出正式回应：‘我对你们的服务感到失望，并希望退款。’”
- en: “Give me a list of 5 effective strategies for reducing stress, written in a
    casual, conversational tone.”
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: “给我一个5个有效减轻压力策略的列表，用轻松、对话的语气写。”
- en: By providing the AI with specific context and constraints, you guarantee the
    output is geared towards your requirements and exceeds your expectations.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 通过向AI提供具体的背景信息和限制条件，你可以确保输出符合你的要求并超出你的期望。
- en: 4\. Fine-Tuning Your Prompts for Desired Outcomes
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 调整你的提示以获得期望的结果
- en: Even a minor tweak to a prompt can significantly change the output produced
    by AI. Fine-tuning your prompts is a critical skill in prompt engineering. The
    more precise your prompt, the better your chances of getting the output you require.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是对提示的微小调整也可能显著改变AI产生的输出。在提示工程中，调整你的提示是一个关键技能。你的提示越精确，你获得所需输出的机会就越大。
- en: 'Example of Fine-Tuning:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 精细化调整的例子：
- en: 'First Prompt: “Tell me about artificial intelligence.”'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次提示：“告诉我关于人工智能的事情。”
- en: 'Refined Prompt: “Provide an elaborate description of artificial intelligence,
    citing its uses in the field of medicine, finance, and education. Keep it to 300
    words.”'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 精炼后的提示：“详细描述人工智能，引用其在医学、金融和教育领域的应用。请控制在300字以内。”
- en: In this polished iteration, the prompt is more contextual, indicates the intended
    applications, and stipulates the word count. These subtle tweaks guarantee that
    the output of the AI is as the user anticipates.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个经过润色的版本中，提示更加具体，指出了预期的应用，并规定了字数。这些细微的调整保证了AI的输出符合用户的预期。
- en: 5\. Selecting the Proper Tone, Style, and Format
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 选择适当的语气、风格和格式
- en: Other times the AI content is flawless, but the tone, style, or format isn’t
    what you want. To prevent this, it’s necessary to detail these elements in your
    prompts. This is especially helpful when you’re writing for various audiences,
    including technical readers, general readers, or children.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 有时AI内容本身无懈可击，但语气、风格或格式并不是你想要的。为了避免这种情况，有必要在提示中详细说明这些元素。当你为不同的受众写作，包括技术读者、普通读者或儿童时，这一点尤其有用。
- en: 'Tone and Style Examples:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 语气和风格示例：
- en: “Compose a professional letter of recommendation for a graduate school applicant.”
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: “为申请研究生院的学生写一封推荐信。”
- en: Write a humorous short story of a dog learning how to talk.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 写一个关于狗学习说话的幽默短故事。
- en: Write an argumentative blog post on why renewable energy is significant, written
    in a professional tone.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 写一篇关于可再生能源重要性的论辩性博客文章，采用专业语气。
- en: 'Format Examples:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 格式示例：
- en: Make a bulleted list of digital marketing’s main points.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 列出数字营销的主要要点。
- en: “Give a step-by-step instruction on how to install a home Wi-Fi network.”
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: “提供安装家庭Wi-Fi网络的逐步说明。”
- en: “Write a 500-word article on the benefits of mindfulness meditation for stress
    reduction.”
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: “写一篇关于正念冥想对减压益处的500字文章。”
- en: Defining the tone, style, and format guarantees that the output is geared toward
    your desired audience and goal.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 定义语气、风格和格式可以确保输出符合你希望的目标受众和目标。
- en: 6\. Avoiding Common Mistakes When Crafting Prompts
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 避免在制作提示时犯常见错误
- en: While writing prompts, it’s easy to make common mistakes that can lead to poor-quality
    outputs. Let’s look at some common pitfalls and how to avoid them.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在编写提示时，很容易犯一些常见的错误，这些错误可能导致输出质量低下。让我们看看一些常见的陷阱以及如何避免它们。
- en: 'Mistakes to Avoid:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 需要避免的错误：
- en: 'Being Too Vague: As we talked about before, general prompts can prompt irrelevant
    or overly broad answers.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 过于模糊：正如我们之前讨论的，一般的提示可能会引发不相关或过于宽泛的回答。
- en: 'Example Error: “Tell me about marketing.”'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 示例错误：“告诉我关于营销的事情。”
- en: 'Revised: “Describe the most important elements of a digital marketing strategy,
    with emphasis on social media and content marketing.”'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 修订版：“描述数字营销策略最重要的要素，重点在于社交媒体和内容营销。”
- en: 'Overloading the Prompt with Too Much Information: While context is important,
    adding too many details at once can overwhelm the AI and produce disorganized
    responses. Keep your prompts focused and clear.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示中添加过多信息：虽然上下文很重要，但一次性添加过多细节可能会使AI感到不知所措，并产生混乱的回答。请保持你的提示专注和清晰。
- en: 'Example Error: “Write me a 1,000-word essay about the effect of technology
    on education with statistics, a historical overview, and future forecasts.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 示例错误：“给我写一篇关于技术对教育影响的1000字论文，包括统计数据、历史概述和未来预测。”
- en: 'Revised: “Composed of a 500-word essay on the role of technology in education,
    with an emphasis on online education platforms.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 修订版：“由一篇500字的论文组成，论述技术在教育中的作用，重点在于在线教育平台。”
- en: 'Anticipating Perfection from the AI: AI is a phenomenal resource, but it’s
    not perfect. Be ready to edit and modify the prompts if necessary.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 对AI的完美期待：AI是一个非凡的资源，但它并不完美。如果需要，准备好编辑和修改提示。
- en: 7\. Trying Various Prompting Strategies
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 尝试各种提示策略
- en: Occasionally, it takes a more experimental route to achieve the most out of
    AI. Experimenting with varied phrasing or strategy can unlock new heights of creativity
    and functionality.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，需要通过更实验性的方法来充分发挥人工智能的潜力。尝试不同的措辞或策略可以开启新的创造力和功能高度。
- en: 'Techniques to Try:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试的技术：
- en: 'Multiple Prompts: Divide a complex request into smaller prompts to provide
    the AI with more specific tasks to process.'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 多个提示：将复杂的要求分解成更小的提示，为人工智能提供更具体的任务来处理。
- en: 'Prompt Iteration: Begin with an initial prompt, assess the output, and then
    iterate your prompt based on the outcome.'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 提示迭代：从初始提示开始，评估输出，然后根据结果迭代你的提示。
- en: 'Prompt Expansion: Broaden the scope of a basic prompt to encompass more details
    or sub-questions, asking the AI to provide more elaborate answers.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 提示扩展：扩大基本提示的范围，包括更多细节或子问题，要求人工智能提供更详细的答案。
- en: Conclusion
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Effective writing of prompts is critical to the optimal use of AI. Being concise,
    precise, and descriptive helps you nudge the AI into generating content that suits
    your requirements. Knowing how to construct prompts with context and limitations,
    refine them for certain outcomes, and steer clear of pitfalls will raise the level
    of quality of AI-generated content. In the following chapter, we will explore
    advanced methods for tailoring prompts to particular applications, whether for
    enterprise, creative writing, or technical purposes.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 提示的有效编写对于人工智能的最佳使用至关重要。简洁、精确和描述性有助于你引导人工智能生成符合你要求的内容。了解如何构建具有上下文和限制的提示，为特定结果进行细化，并避免陷阱，将提高人工智能生成内容的水平。在下一章中，我们将探讨针对特定应用的高级方法，无论是企业、创意写作还是技术目的。
- en: 'Chapter Three: Crafting Prompts for Text Generation'
  id: totrans-121
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三章：为文本生成构建提示
- en: In this chapter, we’ll concentrate on the art of writing prompts specifically
    targeted at creative and generative work. AI has changed our approach to creativity,
    bringing us very effective tools for writing, creating paintings, music, and plenty
    more. To be able to lead AI into creating creative material is very important
    for every person who creates for a living within the fields of writing, marketing,
    the arts, and others. Whether you write a novel, produce original content for
    marketing purposes, or write intriguing social media posts, this chapter will
    provide you with the techniques necessary to formulate efficient prompts for creative
    tasks involving AI.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将专注于编写针对创意和生成性工作的提示的艺术。人工智能已经改变了我们对创造性的看法，为我们提供了非常有效的写作、绘画、音乐以及更多领域的工具。能够引导人工智能创作创意材料对于在写作、营销、艺术等领域以创作谋生的人来说非常重要。无论你是写小说，还是为营销目的制作原创内容，或者撰写引人入胜的社交媒体帖子，本章将为你提供制定涉及人工智能的创意任务的效率提示所需的技巧。
- en: 1\. The Role of AI in Creative Tasks
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 人工智能在创造性任务中的作用
- en: AI has fast become a necessary tool for professional creatives. In writing,
    AI can create anything from blog content to poetry, short stories, and even intricate
    novels. It can assist marketers in creating compelling campaigns, while artists
    utilize AI to craft beautiful visual artwork, music, and design ideas.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能已经迅速成为专业创意人士的必要工具。在写作方面，人工智能可以创作从博客内容到诗歌、短篇小说，甚至复杂小说的一切。它可以协助营销人员创建引人入胜的活动，而艺术家则利用人工智能创作美丽的视觉艺术作品、音乐和设计理念。
- en: Despite AI’s immense potential, creativity remains a nuanced and human-centered
    endeavor. However, by leveraging AI’s strengths and crafting well-structured prompts,
    you can enhance your creative process, streamline workflows, and produce high-quality
    content in a fraction of the time it would take manually.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管人工智能具有巨大的潜力，但创造力仍然是一个复杂且以人为中心的努力。然而，通过利用人工智能的优势并精心构建结构化的提示，你可以增强你的创作过程，简化工作流程，并在极短的时间内产生高质量的内容。
- en: AI programs such as GPT-3 or DALL-E (in the case of visual creativity) can be
    trained to perceive creative subtleties so that they can assist at any level of
    the creative process—be it brainstorming, drafting, or refinement.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 如GPT-3或DALL-E（在视觉创造力方面）等人工智能程序可以被训练来感知创造性的细微差别，以便它们可以在创作的任何阶段提供帮助——无论是头脑风暴、起草还是完善。
- en: 2\. Understanding Creative Prompts
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 理解创造性提示
- en: Creative prompts are directions or inputs provided to AI models to create new,
    original material. Whether you are writing a work of fiction, creating an advertisement,
    or creating a work of digital art, the prompt you give determines the kind of
    material that the AI will produce.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 创意提示是为AI模型提供以创建新、原创材料的指示或输入。无论你是撰写一部小说、创建广告还是创作数字艺术作品，你给出的提示将决定AI将产生哪种类型的材料。
- en: The key in writing creative prompts is to balance giving sufficient detail to
    direct the AI and leaving enough space for creativity and imagination. Too much
    detail kills creativity, but too little could lead to a nonsensical output.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写创意提示时，关键在于在为AI提供足够细节以进行指导的同时，留下足够的空间进行创造性和想象力。过多的细节会扼杀创造力，但过少的细节可能导致输出无意义。
- en: 'Types of Creative Prompts:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 创意提示类型：
- en: 'Storytelling Prompts: These are intended to create story content, be it fiction,
    memoir, or creative nonfiction.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 叙事提示：这些旨在创建故事内容，无论是小说、自传还是创意非虚构作品。
- en: 'Example: “Write a short story about a young girl who discovers a hidden world
    inside her attic.”'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“写一个关于小女孩在阁楼上发现一个隐藏世界的短篇小说。”
- en: 'Poetry Prompts: AI is used to create poetry on a given theme or style.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 诗歌提示：AI用于根据给定主题或风格创作诗歌。
- en: 'Example: “Compose a sonnet regarding the ephemeral nature of time.”'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“创作一首关于时间易逝性的十四行诗。”
- en: 'Marketing and Copywriting Questions: AI can help write compelling and imaginative
    marketing copy for companies, social media content, or advertisements.'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 市场和文案问题：AI可以帮助公司撰写引人入胜且富有想象力的营销文案、社交媒体内容或广告。
- en: 'Example: “Create an attention-grabbing tagline for a new organic skincare brand.”'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为新有机护肤品牌创建一个吸引眼球的标语。”
- en: 'Artistic Creation Prompts: For visual AI applications such as DALL-E, prompts
    direct the AI to produce original images, designs, or illustrations.'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 艺术创作提示：对于视觉AI应用（如DALL-E），提示指导AI生成原创图像、设计或插图。
- en: 'Example: “Create an abstract art piece based on the beauty of a city skyline
    sunset.'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“基于城市天际线日落之美创作一幅抽象艺术作品。”
- en: 'Idea Generation Prompts: These are prompts designed to generate creative ideas
    for a range of projects or ventures.'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 灵感生成提示：这些提示旨在为各种项目或企业生成创意想法。
- en: 'Example: “Provide me with five new product concepts for environmentally friendly
    kitchenware.”'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为我提供五个环保厨房用品的新产品概念。”
- en: 3\. Writing Engaging Creative Writing Prompts
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 撰写引人入胜的创意写作提示
- en: AI can be an effective writing tool for creating creative writing, be it a novel,
    short story, screenplay, or any other type of written work. Building the correct
    prompt for creative writing is necessary for creating stimulating and coherent
    outcomes.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以是一个有效的写作工具，用于创作创意写作，无论是小说、短篇小说、剧本还是任何其他类型的书面作品。为创意写作构建正确的提示对于创建刺激和连贯的结果是必要的。
- en: 'Key Considerations:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 关键考虑因素：
- en: 'Genre and Tone: Identify the genre and tone of the work. Whether you’re composing
    a horror or romantic comedy, the AI will generate a better output if it knows
    what kind of story you’re aiming to write.'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 风格和语气：确定作品的风格和语气。无论你是创作恐怖片还是浪漫喜剧，如果AI知道你想要写什么类型的小说，它将生成更好的输出。
- en: 'Character Development: Identify the primary characters and give any details
    needed regarding their personality, history, or motivation.'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 角色发展：确定主要角色，并给出关于他们性格、历史或动机的任何必要细节。
- en: 'Setting: Explain the world or environment in which the story occurs. The setting
    may play an important role in influencing the tone and organization of the narrative.'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：解释故事发生的世界或环境。背景可能在影响叙事的语气和组织中扮演重要角色。
- en: 'Plot: Providing a short plot summary or major events can assist the AI in remaining
    on course.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 情节：提供简短的情节摘要或主要事件可以帮助AI保持方向。
- en: 'Example Creative Writing Prompts:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 示例创意写作提示：
- en: 'Fantasy Short Story Prompt: “Create a fantasy short story in which a young
    wizard finds an old prophecy about a dragon that has the power to save or destroy
    the kingdom.”'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 奇幻短篇小说提示：“创作一个关于年轻巫师发现关于能够拯救或毁灭王国的古老预言的奇幻短篇小说。”
- en: 'Science Fiction Prompt: “Write a futuristic sci-fi story on Mars, where humans
    are fighting to survive following an unforeseen catastrophe, with themes of survival
    and isolation.”'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 科幻小说提示：“在火星上写一个未来科幻故事，人类在一场无法预见的灾难后为生存而战，主题为生存和孤立。”
- en: By adding essential aspects to the prompt—like genre, tone, and character specifications—you
    can guide the AI towards developing a narrative that makes sense and is interesting
    to read.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在提示中添加基本方面——如类型、语气和角色规格——你可以引导AI发展出有逻辑且引人入胜的故事。
- en: 4\. Marketing and Advertising Content Prompts
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 营销和广告内容提示
- en: AI is now a go-to for content creators, particularly for marketers who seek
    new and exciting copy. You want an ad, social media update, email campaign, or
    product description, and AI will create quality content in a snap. The key, though,
    is to craft the proper prompt to make the AI know the target audience and messaging
    objectives.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: AI现在已成为内容创作者的首选，尤其是对于寻求新颖和激动人心的文案的市场营销人员。你想要一则广告、社交媒体更新、电子邮件营销活动或产品描述，AI将瞬间为你创造高质量的内容。然而，关键在于构建适当的提示，让AI了解目标受众和传播目标。
- en: 'Key Elements for Marketing Prompts:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 营销提示的关键要素：
- en: 'Target Audience: Clearly define who the marketing message is for. Whether you’re
    targeting young adults, professionals, or retirees, specifying the audience ensures
    the tone and language align with their expectations.'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 目标受众：明确界定营销信息的目标对象。无论你针对的是年轻人、专业人士还是退休人员，明确受众可以确保语气和语言符合他们的期望。
- en: 'Call to Action: Ensure the prompt contains a specific call to action of what
    the audience should do, like “sign up,” “buy,” or “find out more.”'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 行动号召：确保提示中包含一个具体的行动号召，告诉受众应该做什么，例如“注册”、“购买”或“了解更多。”
- en: 'Unique Selling Proposition (USP): Emphasize why your product or service is
    distinguishable from products or services within the market.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 独特卖点（USP）：强调你的产品或服务为何在市场上与众不同。
- en: 'Example Marketing Prompts:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 示例营销提示：
- en: Create an Instagram caption to market a new sustainable fashion company to environmentally
    aware millennials, highlighting the waste reduction commitment of the brand.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 为一家面向环保意识强的千禧一代的可持续时尚公司创建Instagram配文，突出品牌的减废承诺。
- en: Come up with an eye-catching slogan for a monthly wellness box subscription
    service.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 为月度健康礼盒订阅服务想出一个引人注目的标语。
- en: Draft an email promotion for a fresh e-commerce store with 20% discount on every
    product, making it a time-limited deal.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 为一家提供所有产品20%折扣的新电商店铺草拟一封电子邮件促销活动，使其成为限时优惠。
- en: Having these aspects included serves to direct the AI in producing content that
    suits your marketing needs.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 包含这些方面有助于引导AI产生符合你营销需求的内容。
- en: 5\. Art and Visual Content Creation Prompts
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 艺术和视觉内容创作提示
- en: For imaginative AI software such as DALL-E or Artbreeder, developing elaborate
    prompts is central to creating distinct and visually impressive art. When producing
    images, you can dictate style, color scheme, mood, and subject matter to achieve
    optimal results.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 对于像DALL-E或Artbreeder这样的创意AI软件，开发详尽的提示对于创作独特且视觉上令人印象深刻的艺术至关重要。在制作图像时，你可以指定风格、色彩方案、氛围和主题内容，以实现最佳效果。
- en: 'Major Features of Artistic Prompts:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 艺术提示的主要特点：
- en: 'Style: Establish the style of art you prefer, e.g., abstract, surrealism, minimalism,
    or realism.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 风格：确立你偏好的艺术风格，例如抽象、超现实主义、极简主义或现实主义。
- en: 'Color Palette: Define the colors to dominate the artwork.'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 色彩调色板：定义作品中的主导颜色。
- en: 'Mood and Emotion: If you wish the piece to elicit a certain feeling, mention
    this in the prompt.'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 情绪和氛围：如果你希望作品唤起某种特定的感觉，请在提示中提及。
- en: 'Subject Matter: Be specific about what you wish the artwork to represent if
    it is to be a landscape, portrait, or an abstract idea.'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 主题内容：如果你希望艺术作品代表的是风景、肖像或抽象概念，请具体说明。
- en: 'Example Artistic Prompts:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 示例艺术提示：
- en: Paint a surreal depiction of a tree blooming in the center of a downtown street
    during sunset, incorporating a warm palette of red, orange, and yellow.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在日落时分，描绘一棵树在市中心街道中央绽放的超现实画面，融入暖色调的红、橙、黄。
- en: “Create a minimalist black-and-white drawing of a single figure standing atop
    a mountain peak amid a storm.”
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: “创建一幅单个人物站在山顶上，暴风雨中的简约黑白素描。”
- en: By structuring the art aspects in your question carefully, you can instruct
    the AI to develop pieces of art in keeping with your vision.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 通过精心构建你的问题中的艺术方面，你可以指导AI根据你的愿景创作出艺术作品。
- en: 6\. Playing with Creative Prompts
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 玩转创意提示
- en: 'One of the most thrilling things about AI is the possibility of experimentation.
    Creative prompts tend to produce unexpected and novel results. Following are a
    few suggestions for experimenting with prompts:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 关于AI最令人兴奋的事情之一是实验的可能性。创意提示往往会产生意想不到和独特的结果。以下是一些关于如何实验提示的建议：
- en: 'Combination Prompts: Put several creative elements into one prompt. For instance,
    “Write a poem based on the colors of the ocean, with aspects of adventure and
    mystery.”'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 组合提示：将多个创意元素放入一个提示中。例如，“写一首基于海洋颜色的诗，包含冒险和神秘元素。”
- en: 'Random Inputs: Oftentimes, adding randomness to the prompt will yield novel
    creative results. Experiment with prompts such as “Write a story where the main
    character can communicate with animals, but only on Tuesdays.”'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 随机输入：通常，在提示中加入随机性会产生新颖的创意结果。尝试使用如“写一个故事，主角可以在星期二与动物交流”这样的提示。
- en: 'Challenge the AI: Challenge the limits of AI creativity by requesting it to
    create content that breaks traditional expectations, such as merging styles or
    genres.'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战AI：通过要求AI创建打破传统预期的内容来挑战AI的创造力，例如合并风格或体裁。
- en: Trying out various prompts can result in the identification of new avenues of
    creativity you may not have thought about otherwise.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的提示可以导致发现你未曾考虑过的新的创意途径。
- en: Conclusion
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Creative task prompting is a strong skill that can take your work to the next
    level, whether you’re writing, designing, or marketing. By being clear about genre,
    tone, character creation, and style, you can direct the AI to produce content
    that matches your vision. Keep in mind that the secret to creative prompting success
    is to give the AI sufficient context to direct it without leaving no room for
    its creativity to shine through.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 创意任务提示是一种强大的技能，无论你是写作、设计还是营销，都能将你的工作提升到新的水平。通过明确体裁、语气、角色创造和风格，你可以引导AI生成符合你愿景的内容。记住，创意提示成功的秘诀是给AI足够的背景信息来引导它，同时又不限制其创造性的发挥。
- en: In the next chapter, we’ll explore how to write prompts for more technical and
    data-driven tasks, including coding, problem-solving, and data analysis.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨如何编写针对更技术性和数据驱动任务的提示，包括编码、问题解决和数据分析。
- en: 'Chapter Four: Designing Prompts for Data Analysis and Visualization'
  id: totrans-183
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四章：设计数据分析与可视化提示
- en: We have already discussed the creative aspect of prompt engineering in the previous
    chapters. Nevertheless, the abilities of AI go far beyond creative work and into
    technical and analytical problems. In this chapter, we will discuss how to build
    prompts for tasks that involve problem-solving, technical analysis, coding, and
    processing data. These kinds of prompts are fundamental for professionals who
    work in software development, data science, finance, and engineering.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经在前面章节中讨论了提示工程中的创意方面。尽管如此，AI的能力远不止创意工作，还包括技术和分析问题。在本章中，我们将讨论如何构建涉及问题解决、技术分析、编码和数据处理任务的提示。这类提示对于在软件开发、数据科学、金融和工程领域工作的专业人士来说是基本技能。
- en: Successful technical prompts tend to be concise, specific, and directed at achieving
    certain results. Whether debugging code, statistical analysis, or process automation,
    having a well-crafted prompt can assist in getting accurate and useful results
    from the AI.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 成功的技术提示往往简洁、具体，旨在实现特定结果。无论是调试代码、统计分析还是流程自动化，一个精心设计的提示可以帮助从AI中获得准确和有用的结果。
- en: 1\. The Significance of Clarity and Specificity for Technical Requests
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 技术请求的清晰性和具体性的重要性
- en: 'In contrast to creative prompts, which are open to interpretation and artistic
    license, technical prompts need to be highly clear and precise. For technical
    work, AI models are supposed to adhere to strict rules, formulas, or procedures.
    When composing writing prompts for such work, it’s essential to:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 与创意提示不同，创意提示可以自由解读和艺术发挥，技术提示则需要高度清晰和精确。对于技术工作，AI模型应遵循严格的规则、公式或程序。在为这类工作编写提示时，以下事项至关重要：
- en: 'Define the scope of the task: Be specific about what needs to be accomplished.
    If you’re asking the AI to write code or solve a problem, make sure the requirements
    are clear.'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 定义任务的范围：具体说明需要完成什么。如果你要求AI编写代码或解决问题，确保要求清晰。
- en: 'Provide any context that is needed: For instance, if you are requesting code
    to solve some specific problem, provide the input data, expected output, and also
    any assumptions or limitations.'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 提供所需的所有背景信息：例如，如果你要求编写代码来解决某个特定问题，请提供输入数据、预期输出，以及任何假设或限制。
- en: 'Specify the format of the output desired: Regardless of whether you require
    a block of code, a formula, or a step-by-step breakdown, ensure the prompt conveys
    the structure of how the output must be formatted.'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 指定所需的输出格式：无论您需要代码块、公式还是逐步分解，确保提示传达输出必须遵循的结构。
- en: 2\. Writing Prompts for Coding and Software Development
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 编写编码与软件开发提示
- en: AI can be used to help with different parts of coding and software development,
    ranging from producing small functions to debugging big projects. To receive the
    most accurate and effective code, your inputs must be well-defined and precise.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能可用于帮助处理编码和软件开发的不同部分，从生成小函数到调试大型项目。为了获得最准确和有效的代码，您的输入必须定义明确且精确。
- en: 'Key Features for Coding Prompts:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 编码提示的关键特性：
- en: 'Programming Language: State the programming language in which you’d like the
    code to be written (e.g., Python, JavaScript, C++).'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 编程语言：说明您希望代码用哪种编程语言编写（例如，Python、JavaScript、C++）。
- en: 'Task Specifications: Accurately describe the problem that the code has to resolve,
    including any input data or constraints.'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 任务规范：准确描述代码必须解决的问题，包括任何输入数据或约束。
- en: 'Expected Output: Provide examples of input/output to clarify the requirements.'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 预期输出：提供输入/输出的示例，以阐明要求。
- en: 'Constraints and Edge Cases: If applicable, add any constraints or edge cases
    that the code must address.'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 约束条件和边缘情况：如果适用，添加代码必须解决的任何约束或边缘情况。
- en: 'Example Coding Prompts:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 示例编码提示：
- en: Create a Python function that accepts an array of integers and returns the array
    sorted in ascending order.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个Python函数，该函数接受一个整数数组，并返回按升序排序的数组。
- en: “Write a JavaScript function to check if an input string is a valid email address
    and return ‘true’ if valid, ‘false’ otherwise.”
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: “编写一个JavaScript函数，用于检查输入字符串是否为有效的电子邮件地址，如果有效则返回‘true’，否则返回‘false’。”
- en: Correct this Python code fragment for computing Fibonacci numbers so that it
    accommodates both negative and positive integers as input.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 修正计算斐波那契数的Python代码片段，使其能够接受负数和正数作为输入。
- en: In coding prompts, make clear the syntax, what the code should do, and the edge
    cases the code should respond to. This reduces ambiguity and encourages the AI
    to produce more consistent code.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 在编码提示中，明确语法、代码应执行的操作以及代码应响应的边缘情况。这减少了歧义并鼓励AI生成更一致的代码。
- en: 3\. Writing Prompts for Data Analysis and Statistical Tasks
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 编写数据分析与统计任务提示
- en: AI is increasingly being used to analyze large datasets, perform statistical
    calculations, and generate insights. Whether you’re working with structured data,
    running statistical tests, or visualizing data, crafting the right prompt is essential
    to ensuring that the AI provides accurate and meaningful results.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能越来越多地被用于分析大型数据集、执行统计计算和生成见解。无论您是处理结构化数据、运行统计测试还是可视化数据，制定正确的提示对于确保AI提供准确和有意义的输出至关重要。
- en: 'Key Elements for Data Analysis Prompts:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析提示的关键要素：
- en: 'Dataset Information: If you’re working with a specific dataset, provide information
    about its structure, such as the variables or features involved.'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集信息：如果您正在处理特定的数据集，提供有关其结构的信息，例如涉及的变量或特征。
- en: 'Analysis Goal: Specify what you’re hoping to learn from the data (e.g., “Find
    the average salary by job title” or “Identify trends in sales over the last 12
    months”).'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 分析目标：指定您希望从数据中了解的内容（例如，“按职位查找平均工资”或“确定过去12个月的销售趋势”）。
- en: 'Statistical Techniques: If you require particular statistical tests (e.g.,
    t-test, ANOVA, regression analysis), include them in the prompt.'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 统计技术：如果您需要特定的统计测试（例如，t检验、方差分析、回归分析），请在提示中包含它们。
- en: 'Desired Output Format: Specify the format in which you would like to receive
    the analysis results (e.g., table, graph, or written report).'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 所需输出格式：指定您希望接收分析结果的格式（例如，表格、图形或书面报告）。
- en: 'Example Data Analysis Questions:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 示例数据分析问题：
- en: Using this data set of monthly sales data, compute the average sales for each
    product category and display the results in tabular form.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个月度销售数据集，计算每个产品类别的平均销售额，并以表格形式显示结果。
- en: “Run a regression analysis on the data and report the coefficients and p-values
    for the predictor variables.”
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: “对数据进行回归分析，并报告预测变量的系数和p值。”
- en: Create a pie chart contrasting the market share of the top five smartphone manufacturers
    in 2020 according to the given sales data.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 根据给定的销售数据，创建一个饼图，对比2020年前五大智能手机制造商的市场份额。
- en: When developing data analysis prompts, clarity on the dataset, the analysis
    objective, and the output format desired are important in obtaining the proper
    results.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发数据分析提示时，对数据集、分析目标和期望的输出格式有清晰的了解对于获得正确的结果很重要。
- en: 4\. Writing Prompts for Mathematical and Scientific Problems
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 数学与科学问题的写作提示
- en: AI can be used to solve a variety of mathematical and scientific issues, such
    as algebra, calculus, and physics. The most important thing in successful prompts
    in these categories is to give the proper problem configuration and specify how
    the answer should be formatted.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以用来解决各种数学和科学问题，如代数、微积分和物理。在这些类别中，成功提示的最重要事情是给出适当的问题配置并指定答案应该如何格式化。
- en: 'Key Features for Mathematical Questions:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 数学问题的关键特性：
- en: 'Problem Description: Describe the mathematical problem. Whether solving for
    an equation, determining derivatives, or calculating integrals, the problem must
    be described in detail.'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 问题描述：描述数学问题。无论是求解方程、确定导数还是计算积分，问题必须详细描述。
- en: 'Contextual Information: If relevant, include pertinent formulas, constraints,
    or background information (e.g., known variables or assumptions).'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文信息：如果相关，包括相关的公式、约束或背景信息（例如，已知变量或假设）。
- en: 'Preferred Output Format: Indicate if you prefer the AI to display step-by-step
    solutions, present only the final answer, or provide a written description of
    the steps taken.'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 期望的输出格式：指出你是否希望AI显示逐步解决方案、仅提供最终答案或提供步骤的书面描述。
- en: 'Example Mathematical Questions:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 示例数学问题：
- en: Solve the equation 2x^2 + 3x – 5 = 0 for x, and give all steps of the solution.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 解方程2x^2 + 3x – 5 = 0求x，并给出所有解题步骤。
- en: “Find the derivative of the function f(x) = 3x^3 – 4x^2 + 2x – 7, and explain
    the process.”
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: “求函数f(x) = 3x^3 – 4x^2 + 2x – 7的导数，并解释过程。”
- en: Integrate f(x) = x^2 from x = 1 to x = 5 to find the area under the curve, and
    give an approximate numerical solution.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 集成f(x) = x^2从x = 1到x = 5以找到曲线下的面积，并给出一个近似的数值解。
- en: For scientific issues, having a step-by-step explanation or the breakdown of
    the solution is beneficial. You can also add any science principles or equations
    that the AI will need to refer back to.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 对于科学问题，有一个逐步解释或解决方案的分解是有益的。你还可以添加任何AI需要参考的科学原理或方程。
- en: 5\. Automation and Process Optimization Writing Prompts
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 自动化和流程优化写作提示
- en: AI can be a useful ally in task automation and business process optimization.
    From scripting to automate repetitive tasks to developing models to optimize decision-making,
    AI can assist in automating workflows and minimizing manual labor.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以在任务自动化和业务流程优化中成为一个有用的盟友。从编写脚本来自动化重复性任务到开发模型以优化决策，AI可以帮助自动化工作流程并减少人工劳动。
- en: 'Critical Factors for Automation Requests:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化请求的关键因素：
- en: 'Task Definition: Identify the task you wish to automate and the steps required
    to perform it.'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 任务定义：确定你希望自动化的任务及其执行所需的步骤。
- en: 'Input and Output: Define the input format and desired output. For example,
    if you wish the AI to produce a report, list any important metrics or criteria.'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 输入和输出：定义输入格式和期望的输出。例如，如果你希望AI生成报告，列出任何重要的指标或标准。
- en: 'Optimization Criteria: If you’re looking to optimize a process (e.g., minimize
    cost or maximize efficiency), outline the key factors that should be considered.'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 优化标准：如果你想要优化一个流程（例如，最小化成本或最大化效率），概述应考虑的关键因素。
- en: 'Example Automation Prompts:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 示例自动化提示：
- en: Create a Python script that scrapes information from a website and saves it
    to a CSV file. The script must be able to handle pagination and save information
    for products, prices, and descriptions.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个Python脚本，从网站抓取信息并将其保存到CSV文件中。脚本必须能够处理分页并保存产品、价格和描述的信息。
- en: Develop a sci-kit-learn machine learning model that can predict customer churn
    from past data, and tune the model for precision.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 开发一个可以预测客户流失的sci-kit-learn机器学习模型，并对模型进行精确度调优。
- en: Automate sending customized email reminders to customers who have left items
    in their shopping cart.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化向将商品留在购物车中的客户发送定制的电子邮件提醒。
- en: For automation tasks, make sure to specify any prerequisites (e.g., libraries,
    data formats) that the AI might need to utilize.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 对于自动化任务，确保指定AI可能需要利用的任何先决条件（例如，库、数据格式）。
- en: 6\. Troubleshooting and Debugging Prompts
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 故障排除和调试提示
- en: One of the most frequent applications of AI in technical work is debugging and
    troubleshooting code. The art of creating a good debugging question is important
    to determine the problem and resolve errors in code.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能在技术工作中的最常见应用之一是调试和故障排除代码。提出一个好的调试问题的艺术对于确定问题和解决代码中的错误至关重要。
- en: 'Key Elements for Debugging Prompts:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 调试提示的关键要素：
- en: 'Error Description: Describe the issue you’re facing with as much detail as
    possible, including any error messages or unexpected behavior.'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 错误描述：尽可能详细地描述你遇到的问题，包括任何错误消息或意外行为。
- en: 'Code Snippet: Add the specific part of the code where the error is being produced.'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 代码片段：添加产生错误的代码的具体部分。
- en: 'Expected Result: Define the intended behavior or result of the code once the
    bug is fixed.'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 预期结果：定义在修复错误后代码应显示的预期行为或结果。
- en: 'Example Debugging Prompts:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 示例调试提示：
- en: This Python program raises an IndexError. Can anyone help determine why and
    how to fix it?
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 这个Python程序引发了一个IndexError。有人能帮助确定原因和如何修复它吗？
- en: “Fix this JavaScript code. It should show a list of items, but it’s giving an
    empty array. What’s the issue?”
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: “修复这段JavaScript代码。它应该显示一个项目列表，但它给出的是一个空数组。问题出在哪里？”
- en: Giving enough context and information regarding the issue will enable the AI
    to identify the problem and recommend a solution.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 提供足够的问题背景和信息将使人工智能能够识别问题并推荐解决方案。
- en: Conclusion
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: When you create prompts for technical and analytical work, clarity, specificity,
    and rich context should be the emphasis. Whether you’re doing math problems, programming,
    data analysis, or process automation, a well-crafted prompt directs the AI to
    produce accurate, consistent, and relevant output. In the following chapter, we
    will discuss how to create prompts for research, fact-checking, and information
    retrieval tasks so that you can leverage AI as a powerful search and reference
    tool.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 当你为技术和分析工作创建提示时，清晰度、具体性和丰富的背景信息应该是重点。无论你是在做数学问题、编程、数据分析还是流程自动化，一个精心设计的提示将引导人工智能产生准确、一致和相关的输出。在下一章中，我们将讨论如何为研究、事实核查和信息检索任务创建提示，以便你可以利用人工智能作为强大的搜索和参考工具。
- en: 'Chapter Five: Crafting Prompts for Conversational AI'
  id: totrans-249
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第五章：为对话式人工智能制作提示
- en: With the advent of the digital era, AI has emerged as a precious asset for research,
    fact-checking, and quick and efficient information gathering. Whether you are
    composing an article, conducting scholarly research, or fact-checking claims,
    having the skill to write good prompts for AI can go a long way in improving the
    accuracy and efficiency of your information-gathering process.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 随着数字时代的到来，人工智能已成为研究、事实核查和快速高效信息收集的宝贵资产。无论你是撰写文章、进行学术研究还是核查断言，掌握编写良好人工智能提示的技能可以在很大程度上提高你信息收集过程的准确性和效率。
- en: Here, we will learn how to design effective prompts for AI to help in research,
    fact-checking, and data gathering. Getting the appropriate prompt for these activities
    right is important for getting the correct, relevant, and trustworthy information
    from AI models.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将学习如何为人工智能设计有效的提示，以帮助进行研究和事实核查以及数据收集。正确获取这些活动的适当提示对于从人工智能模型中获得正确、相关和可靠的信息至关重要。
- en: 1\. The Significance of Applying AI in Research and Fact-Checking
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在研究和事实核查中应用人工智能的重要性
- en: AI can sift through enormous amounts of data in a matter of seconds, which would
    take human hours or even days, making it a valuable resource for researchers and
    businesspeople who require fast, accurate information. Yet, although AI can be
    an excellent research assistant, it’s crucial to know how to direct the AI so
    that the information it retrieves is accurate, relevant, and credible.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能可以在几秒钟内处理大量数据，这需要人类数小时甚至数天，对于需要快速、准确信息的科研人员和商人来说，它是一个宝贵的资源。尽管人工智能可以成为优秀的研究助手，但了解如何指导人工智能以使其检索到的信息准确、相关和可信是至关重要的。
- en: 'Utilizing AI in research and fact-checking is especially helpful for:'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 在研究和事实核查中使用人工智能特别有助于：
- en: 'Finding Sources: AI can assist you in finding primary sources, articles, journals,
    and studies related to your research question.'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 查找来源：人工智能可以帮助你找到与你的研究问题相关的原始资料、文章、期刊和研究。
- en: 'Cross-Referencing Information: AI can check the consistency and accuracy of
    claims by cross-referencing multiple sources.'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉引用信息：人工智能可以通过交叉引用多个来源来检查断言的一致性和准确性。
- en: 'Quick Summaries: AI can provide concise summaries of long documents, making
    it easier to digest information quickly.'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 快速摘要：AI可以提供长文档的简洁摘要，使快速消化信息变得更容易。
- en: 'Myth-Busting: Fact-checking question prompts can be used to establish the accuracy
    of a statement or claim, and this is particularly beneficial in our information-rich
    society.'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 拆穿神话：事实核查问题提示可用于验证陈述或声明的准确性，这在信息丰富的社会中尤其有益。
- en: To leverage AI’s potential for research and fact-checking, it is vital to structure
    prompts in a way that helps the AI access and retrieve the most relevant information.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 为了利用AI在研究和事实核查方面的潜力，至关重要的是以有助于AI访问和检索最相关信息的方式构建提示。
- en: 2\. Composing Research Questions
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 构建研究问题
- en: When you’re requesting that AI help you with research, you need to specify the
    topic, the level of detail of information you want, and the type of sources you
    want to have. The more precise you are with the research request, the better you
    will get in response.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 当您要求AI帮助您进行研究时，您需要指定主题、所需信息的详细程度以及您想要的来源类型。研究请求越精确，您得到的回应就越好。
- en: 'Key Elements for Research Prompts:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 研究提示的关键要素：
- en: 'Research Topic: Clearly state the subject matter or question you wish the AI
    to investigate. Specify the area of study, e.g., history, technology, medicine,
    or economics.'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 研究主题：清楚地说明您希望AI调查的主题或问题。指定研究领域，例如历史、技术、医学或经济学。
- en: 'Source Requirements: If you require information from a particular type of source
    (e.g., academic papers, news articles, government publications), specify that
    in your prompt.'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 来源要求：如果您需要特定类型的来源信息（例如，学术论文、新闻文章、政府出版物），请在提示中指定。
- en: 'Depth of Information: Indicate the level of detail or scope you would like
    the research to have. For example, you can ask for a thorough review or simply
    an overview.'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 信息深度：指出您希望研究达到的详细程度或范围。例如，您可以要求进行彻底的审查或简单地概述。
- en: 'Key Terms or Concepts: List any significant terms or concepts that must be
    incorporated into the research.'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 关键术语或概念：列出必须纳入研究中的任何重要术语或概念。
- en: 'Example Research Questions:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 例子：研究问题
- en: “Supply the top five best scholarly articles released within the last five years
    on climate change and agriculture impacts.”
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: “提供过去五年内发布的关于气候变化和农业影响的五篇最佳学术文章。”
- en: “Locate current studies on artificial intelligence in healthcare, particularly
    on how it can be applied to diagnose diseases.”
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: “定位当前关于医疗保健领域的人工智能研究，特别是关于如何将其应用于疾病诊断的研究。”
- en: “Outline the recent trends of renewable energy adoption among developing nations,
    according to global energy agencies’ reports.”
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: “根据全球能源机构的报告，概述发展中国家采用可再生能源的最新趋势。”
- en: These questions bring objectivity to the subject, source type, and the level
    of information needed. This will enable the AI to get the most suitable research
    materials.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题为主题、来源类型和所需信息水平带来了客观性。这将使AI能够获取最合适的研究材料。
- en: 3\. Fact-Checking Prompts
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 事实核查提示
- en: Fact-checking is a key to making sure information is credible and trustworthy.
    AI can cross-reference claims, authenticate assertions, and recognize misleading
    or fake information.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 事实核查是确保信息可信和可靠的关键。AI可以交叉引用主张，验证断言，并识别误导性或虚假信息。
- en: 'To get the most out of fact-checking prompts, consider the following elements:'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 为了最大限度地利用事实核查提示，请考虑以下要素：
- en: 'Major Components for Fact-Checking Prompts:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 事实核查提示的主要组成部分：
- en: 'Claim or Statement: State the precise claim or statement which you wish to
    verify.'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 陈述或声明：明确陈述您希望验证的精确陈述或声明。
- en: 'Source Information: If you have a source already where the claim is being stated,
    put that in the prompt. This allows the AI to evaluate the validity of the source.'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 来源信息：如果您已经有了声明正在被陈述的来源，请在提示中放入。这允许AI评估来源的有效性。
- en: 'Desired Output: Identify what you are looking for in the response, whether
    it is a confirmation, refutation, or analysis of the claim.'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 所需输出：确定您在回应中寻找的内容，无论是确认、反驳还是对主张的分析。
- en: 'Example Fact-Checking Prompts:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 例子：事实核查提示
- en: '“Verify the statement: ‘Drinking eight glasses of water a day is necessary
    for maximum health.’ Offer evidence in support or contradiction.”'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: “验证陈述：‘每天喝八杯水对最大健康是必要的。’提供支持或反驳的证据。”
- en: '“Prove or disprove the statement: ‘The Great Wall of China can be seen from
    space.’ Cite reliable sources to refute or confirm this statement.”'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: “证明或反驳以下陈述：‘从太空中可以看到中国的长城。’引用可靠来源来反驳或确认这一陈述。”
- en: Is it true that the consumption of processed sugar adds to the risk of heart
    disease?
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 消费加工糖是否真的会增加患心脏病的风险？
- en: Cross-reference several studies to affirm or negate.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 跨多个研究进行交叉引用以确认或否定。
- en: These are straightforward questions that leave no doubt that the AI is charged
    with checking for the validity of a particular statement. By giving the AI precise
    statements and source data, the AI can cross-check facts immediately across credible
    sources.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是直接的提问，没有疑问，表明人工智能的任务是检查特定陈述的有效性。通过向人工智能提供精确的陈述和源数据，人工智能可以立即在可信来源之间交叉检查事实。
- en: 4\. Data Retrieval Writing Prompts
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 数据检索写作提示
- en: AI can help to fetch specific pieces of information from different sources of
    documents, such as reports, datasets, and web pages. If you require statistics,
    historical facts, or information on a certain topic, AI can retrieve that precise
    piece of information for you.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能可以帮助从不同的文档来源中获取特定的信息片段，例如报告、数据集和网页。如果你需要统计数据、历史事实或某个主题的信息，人工智能可以为你检索到那精确的信息片段。
- en: 'Key Features for Data Retrieval Prompts:'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 数据检索提示的关键特征：
- en: 'Data Type: Define the type of data you require, e.g., statistics, historical
    information, or numeric values.'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 数据类型：定义所需数据的类型，例如，统计数据、历史信息或数值。
- en: 'Timeframe: Where appropriate, specify a specific period or date range for data
    that you require.'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 时间范围：在适当的情况下，指定所需数据的特定时间段或日期范围。
- en: 'Source or Database: If you need information from a specific source (e.g., government
    database, academic journal, etc.), say so in your request.'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 来源或数据库：如果你需要来自特定来源的信息（例如，政府数据库、学术期刊等），请在请求中说明。
- en: 'Context or Relevance: Give context for why you require the data. This enables
    AI to concentrate on the most applicable pieces of information.'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文或相关性：提供你要求数据的原因。这使人工智能能够专注于最相关的信息片段。
- en: 'Example Data Retrieval Prompts:'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 示例数据检索提示：
- en: “Get the mean temperature of New York City for July over the last ten years
    and present the information in table form.”
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: “获取过去十年纽约市7月的平均气温，并以表格形式呈现信息。”
- en: What are Indian unemployment rates during 2020 and 2021, as given by official
    government sources?
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 根据官方政府来源，2020年和2021年印度的失业率是多少？
- en: “Get historical statistics of worldwide smartphone sales between 2015 and 2020
    by region.”
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: “获取2015年至2020年全球智能手机按地区销售的历史统计数据。”
- en: By indicating the data type, time period, and output format, you can be certain
    that the AI brings back the specific data points that you require for your project.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 通过指明数据类型、时间范围和输出格式，你可以确保人工智能为你检索到所需项目中的特定数据点。
- en: 5\. Writing Prompts for Summarization
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 摘要写作提示
- en: AI has the ability to summarize lots of information, making it more convenient
    to read lengthy research papers, articles, and reports. In writing summarising
    prompts, it’s crucial to describe how you prefer the content to be summarized,
    and what are the most important points to highlight in the summary.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能能够总结大量信息，这使得阅读冗长的研究论文、文章和报告变得更加方便。在撰写总结提示时，描述你希望内容如何被总结，以及在总结中需要突出的最重要的要点至关重要。
- en: 'Major Components for Summarization Questions:'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 摘要问题的主要组成部分：
- en: 'Summary Length: Specify the length you’d like for the summary—to give a concise
    overview or a fuller condensation of the material.'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 摘要长度：指定你想要的摘要长度——是提供一个简洁的概述还是更全面的浓缩。
- en: 'Key Points: If there are certain sections or parts of the document that need
    to be given priority in the summary, state that in the prompt.'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 关键点：如果文档中有某些部分需要在摘要中给予优先考虑，请在提示中说明。
- en: 'Tone and Audience: If you want the summary for a particular audience, indicate
    the tone and language you prefer the AI to employ (e.g., academic, informal, technical).'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 语调和受众：如果你希望摘要针对特定受众，请指出你希望人工智能使用的语调和语言（例如，学术性、非正式性、技术性）。
- en: 'Example Summarization Questions:'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 示例摘要问题：
- en: Condense the most important points of this 20-page research paper on quantum
    computing into fewer than 300 words.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 将关于量子计算的20页研究论文的最重要的要点压缩到300字以内。
- en: Give a brief overview of the 2020 UN climate change report, highlighting the
    deforestation findings.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 简要概述2020年联合国气候变化报告，突出森林砍伐的发现。
- en: “Write a brief overview of the latest COVID-19 vaccine development news from
    peer-reviewed journals.”
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: “从同行评审的期刊中撰写一篇关于最新COVID-19疫苗研发新闻的简要概述。”
- en: These questions guarantee that the AI provides a brief, meaningful summary that
    dwells on the crux of the document.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题确保AI提供简短、有意义的总结，并关注文档的核心。
- en: 6\. Writing Prompts for Cross-Referencing Sources
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 为交叉引用来源编写提示
- en: Cross-referencing several sources enables you to triangulate data and check
    the consistency of assertions. AI can assist in automating this by verifying several
    documents or websites to confirm that the data is consistent.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉引用多个来源可以使你三角测量数据并检查主张的一致性。AI可以通过验证多个文档或网站来自动化这一过程，以确认数据的一致性。
- en: 'Most Important Features for Cross-Referencing Prompts:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉引用提示的最重要特征：
- en: 'List of Sources: Put in the sources that you would like the AI to cite. This
    may be links to articles, research papers, or certain publications.'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 来源清单：列出你希望AI引用的来源。这可能包括文章、研究论文或特定出版物。
- en: 'Specific Claims or Points: Identify which claims or points in the sources you
    wish to cross-reference.'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 具体的主张或观点：识别你希望在来源中交叉引用的主张或观点。
- en: 'Desired Outcome: Identify whether you require a comparison, a synthesis of
    the sources, or verification of the consistency of the information.'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 预期结果：确定你是否需要比较、来源的综合或信息一致性的验证。
- en: 'Example Cross-Referencing Questions:'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉引用问题示例：
- en: “Cross-reference these articles and confirm the assertion that ‘Electric vehicles
    save 50% of greenhouse gas emissions over their lifetime.’”
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: “交叉引用这些文章，并确认‘电动汽车在其使用寿命内可节省50%的温室气体排放’这一主张。”
- en: “Verify whether various sources concur on the economic effect of the 2008 financial
    crisis in the U.S. and summarize the findings.”
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: “验证各种来源是否就2008年美国金融危机的经济影响达成一致，并总结发现。”
- en: By providing sources and specific points to verify, AI can assist in making
    sure that your research is based on accurate, consistent information.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供来源和具体点来验证，AI可以帮助确保你的研究基于准确、一致的信息。
- en: Conclusion
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Writing good research, fact-checking, and information-retrieval prompts is a
    critical skill in the modern information age. By writing clear, specific instructions
    to AI, you can dramatically improve your research process, quickly check facts,
    and obtain solid data from credible sources. In the following chapter, we will
    discuss how to write prompts for more intricate, multi-step processes and decision-making
    tasks.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代信息时代，撰写良好的研究、事实核查和信息检索提示是一项关键技能。通过向AI编写清晰、具体的指令，你可以显著提高你的研究过程，快速核查事实，并从可信来源获得可靠数据。在下一章中，我们将讨论如何为更复杂的多步骤流程和决策任务编写提示。
- en: 'Chapter Six: Designing Prompts for Code Generation'
  id: totrans-320
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第六章：为代码生成设计提示
- en: AI’s creative potential is perhaps the most thrilling part of its abilities.
    Whether you’re a writer, artist, designer, or musician, AI can help improve your
    creative process. By writing the right prompts, you can nudge the AI to create
    content that aligns with your vision, generates new ideas, or expedites your creative
    workflow.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: AI的创造潜力可能是其能力中最令人兴奋的部分。无论你是作家、艺术家、设计师还是音乐家，AI都能帮助你改善你的创作过程。通过编写正确的提示，你可以引导AI创建符合你愿景的内容，产生新想法，或加速你的创作流程。
- en: In this chapter, we will explore how to create prompts for various creative
    and artistic tasks, including writing fiction, creating artwork, composing music,
    and even designing. You’ll learn how to give clear instructions while allowing
    room for creativity, so the AI can collaborate with you effectively.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨如何为各种创意和艺术任务创建提示，包括撰写小说、创作艺术作品、作曲以及设计。你将学习如何在允许创造力的同时给出明确的指令，以便AI能够有效地与你合作。
- en: 1\. The Power of Collaborative Creativity with AI
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 与AI合作的协同创造力
- en: 'AI is generally regarded as a resource for technical jobs, but its power to
    aid with creative work is revolutionizing fields. By constructing well-crafted
    prompts, you are able to use AI to:'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: AI通常被视为技术工作的资源，但其在创意工作上的帮助正在改变各个领域。通过构建精心设计的提示，你能够使用AI来完成以下任务：
- en: 'Enhance Your Creativity: AI can generate new ideas, provide inspiration, and
    help you explore possibilities you may not have thought of.'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 提升你的创造力：AI可以产生新想法，提供灵感，并帮助你探索你可能未曾想到的可能性。
- en: 'Speed Up the Process: AI is able to automate some aspects of the creative process,
    like creating rough content, providing composition suggestions, or smoothing out
    designs.'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 加快进程：AI能够自动化创意过程中的某些方面，如创建草稿内容、提供创作建议或平滑设计。
- en: 'Experiment with Various Styles: Whether you’re authoring a novel, creating
    music, or working on graphics, AI can assist you in experimenting with various
    styles, tones, or methods, providing you with greater flexibility and freedom
    to pursue creative paths.'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试各种风格：无论是撰写小说、创作音乐还是从事图形设计，AI都可以帮助你尝试各种风格、调子或方法，为你提供更大的灵活性和自由度，以追求创意路径。
- en: In order to maximize AI in creative industries, one must understand how to give
    prompts that are specific yet flexible, so that the AI can work in accordance
    with your vision but also allow for its own creative input.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 为了最大限度地发挥AI在创意产业中的作用，必须了解如何给出既具体又灵活的提示，以便AI能够根据你的愿景工作，同时也允许其自身的创意输入。
- en: 2\. Fiction and Creative Writing Writing Prompts
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 小说和创意写作写作提示
- en: AI can be a great collaborator for writers, whether you are writing short stories,
    novels, scripts, or poetry. By giving the AI the proper prompts, you can get the
    AI to create characters, plots, dialogue, or even entire chapters for your writing.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以成为作家的大好合作伙伴，无论你是在写短篇小说、小说、剧本还是诗歌。通过给AI适当的提示，你可以让AI为你创作角色、情节、对话，甚至为你的写作创作整个章节。
- en: 'Key Elements for Writing Prompts:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 写作提示的关键要素：
- en: 'Genre: Identify the genre or kind of writing you prefer, such as science fiction,
    fantasy, romance, horror, or literary fiction.'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 类型：确定你偏好的写作类型或种类，例如科幻、奇幻、浪漫、恐怖或文学小说。
- en: 'Setting and Context: Identify the world, era, and any significant aspects of
    the setting.'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：确定世界、时代以及背景的任何重要方面。
- en: 'Character Descriptions: If relevant, include details about the characters,
    such as their personality traits, motivations, and backstory.'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 角色描述：如果相关，包括有关角色的细节，例如他们的性格特征、动机和背景故事。
- en: 'Plot or Conflict: Give the AI a plot or conflict that the story will revolve
    around, or let it generate ideas based on a general theme.'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 情节或冲突：给AI一个故事将围绕其展开的情节或冲突，或者让它根据一个一般主题生成想法。
- en: 'Tone and Style: Indicate the tone you desire the story to convey—be it light-hearted,
    dark, humorous, or dramatic—and any stylistic preferences.'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 调子和风格：指出你希望故事传达的调子——无论是轻松愉快、黑暗、幽默还是戏剧性——以及任何风格偏好。
- en: 'Example Fiction Writing Prompts:'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 示例小说写作提示：
- en: Create the first chapter of a science fiction novel in which a team of astronauts
    finds an extraterrestrial life form on a distant planet. The atmosphere must be
    suspenseful, and the environment must be a futuristic space station.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 创作一部科幻小说的第一章，其中一组宇航员在一个遥远的星球上发现了一种外星生命形式。氛围必须充满悬疑，环境必须是一个未来太空站。
- en: Write a conversation between two characters in a fantasy world. One is a wise
    old wizard, and the other is a young, cynical apprentice. The conversation should
    touch on issues of trust and power.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 写一篇发生在奇幻世界中的两个角色之间的对话。一个是智慧的老巫师，另一个是年轻、愤世嫉俗的学徒。对话应涉及信任和权力问题。
- en: “Create a short story in the manner of Edgar Allan Poe, in a gothic mansion
    during the 19th century, where the main character starts to lose their mind.”
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: “以爱伦·坡的风格创作一个短篇小说，发生在19世纪的哥特式庄园中，主要角色开始失去理智。”
- en: These prompts provide the AI with direction but retain sufficient flexibility
    to create original, interesting content. Whether you need inspiration or a full
    story, these prompts can assist in guiding the writing process.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 这些提示为AI提供了方向，但保留了足够的灵活性，以创建原创、有趣的内容。无论你需要灵感还是完整的故事，这些提示都可以帮助指导写作过程。
- en: 3\. Visual Art and Design Prompts
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 视觉艺术和设计提示
- en: AI has come a long way in creating visual art and designs. Whether designing
    digital art, illustrations, or graphic design, AI can be of help by creating original
    compositions, proposing color schemes, or aiding the overall design.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: AI在创建视觉艺术和设计方面已经取得了长足的进步。无论是设计数字艺术、插图还是图形设计，AI都可以通过创建原创作品、提出配色方案或协助整体设计来提供帮助。
- en: 'Essential Components for Art and Design Assignments:'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 艺术和设计作业的必要组件：
- en: 'Style: Specify the art style you wish the AI to imitate. It may be an old style
    such as realism or impressionism or newer styles such as minimalism, abstract,
    or surrealism.'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 风格：指定你希望AI模仿的艺术风格。这可能是一种旧风格，如现实主义或印象派，或更新的风格，如极简主义、抽象或超现实主义。
- en: 'Subject Matter: Define the subject or topic of the work, whether landscape,
    portrait, abstract idea, or still life.'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 主题：定义作品的主体或主题，无论是风景、肖像、抽象想法还是静物。
- en: 'Mood and Emotion: Identify the mood or emotion that you desire your art to
    project, like peace, disorder, grief, or happiness.'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 情绪与情感：确定你希望你的艺术作品传达的情绪或情感，如和平、混乱、悲伤或快乐。
- en: 'Medium: If applicable, state the medium the artwork should emulate (e.g., oil
    painting, digital art, pencil sketch, watercolors).'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 媒介：如果适用，说明艺术作品应模仿的媒介（例如，油画、数字艺术、铅笔素描、水彩画）。
- en: 'Example Art and Design Prompts:'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 示例艺术与设计提示：
- en: “Create a digital artwork of a cityscape at sunset in a cyberpunk setting with
    high-rise buildings and flying cars.”
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: “创作一幅赛博朋克风格的日落城市景观数字艺术作品，有摩天大楼和飞行汽车。”
- en: “Create a black-and-white pencil sketch of a mountain landscape, with a focus
    on light and shadow to convey a sense of mystery.”
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: “创作一幅以光影传达神秘感的黑白山景铅笔素描。”
- en: “Create a logo for a technology startup that deals with artificial intelligence.
    The logo must be futuristic and minimalistic, in shades of blue and white.”
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: “为一家涉及人工智能的技术初创公司设计一个标志。该标志必须是未来主义和简约风格，以蓝白色调为主。”
- en: These prompts provide the AI with explicit instructions about the artistic aspects
    you wish to incorporate, but they also leave some space for interpretation so
    that the AI can try various ways of approaching the design.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 这些提示为AI提供了关于你希望融入的艺术方面的明确指示，但同时也留出了一些空间，以便AI尝试不同的设计方法。
- en: 4\. Writing Music and Soundtracks Using AI
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 使用AI创作音乐和配乐
- en: AI can also be an effective instrument for composers, musicians, and sound designers.
    By giving prompts that designate the instrumentation, mood, and genre, AI can
    produce musical pieces, assist with arrangement, or even provide melodies.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: AI也可以是作曲家、音乐家和声音设计师的有效工具。通过给出指定乐器、情绪和类型的提示，AI可以创作音乐作品，协助编排，甚至提供旋律。
- en: 'Important Elements for Music Composition Prompts:'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 音乐创作提示的重要元素：
- en: 'Genre and Style: Define the type of music you wish, i.e., classical, jazz,
    electronic, rock, or orchestral.'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 类型与风格：定义你希望的音乐类型，例如，古典、爵士、电子、摇滚或管弦乐。
- en: 'Mood or Emotion: Identify the feeling or mood you would like the music to express
    (e.g., cheerful, sad, ominous).'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 情绪或情感：确定你希望音乐表达的感觉或情绪（例如，愉快、悲伤、不祥）。
- en: 'Instrumentation: State any instruments you would like to include in the composition
    (e.g., piano, violin, electronic beats).'
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 乐器配置：说明你希望在作品中包含的任何乐器（例如，钢琴、小提琴、电子节拍）。
- en: 'Tempo and Structure: Specify if you’d like the tempo to be fast, slow, or medium,
    and if you prefer a conventional song structure or something radical.'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 速度与结构：指定你是否希望速度是快、慢还是中等，以及你是否更喜欢传统的歌曲结构或某种激进的结构。
- en: 'Example Music Composition Prompts:'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 示例音乐创作提示：
- en: Write a brief, inspiring piano piece in the classical style, with a moderate
    tempo and a major key.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 以古典风格创作一首简短、鼓舞人心的钢琴曲，速度适中，主调为主。
- en: Create a dark, moody electronic song that would be suitable for the soundtrack
    of a dystopian film. The track should incorporate synthesizers, ambient sound,
    and a slow, haunting rhythm.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 创作一首适合反乌托邦电影原声带的黑暗、忧郁的电子歌曲。这首曲目应包含合成器、环境声音和缓慢、令人不安的节奏。
- en: “Write a jazz composition for a quartet featuring saxophone, trumpet, bass,
    and drums. The piece should be upbeat and energetic.”
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: “为四重奏创作一首爵士乐作品，包括萨克斯风、小号、贝斯和鼓。这首曲子应该节奏欢快且充满活力。”
- en: These prompts enable the AI to generate music that is of a specific style and
    mood and includes certain instruments and structural features.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 这些提示使AI能够生成具有特定风格和情绪的音乐，并包括某些乐器和结构特征。
- en: 5\. Writing Prompts for Other Creative Work
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 其他创意作品的写作提示
- en: In addition to writing, art, and music, AI can be utilized to help with other
    creative projects, including fashion design, product design, and video production.
    In all of these instances, the most important thing with effective prompts is
    to give the AI sufficient context to create relevant and inspiring ideas and still
    allow room for its own creative spark.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 除了写作、艺术和音乐，AI还可以用于帮助其他创意项目，包括时尚设计、产品设计以及视频制作。在这些情况下，有效的提示最重要的是给AI足够的上下文来创造相关和启发性的想法，同时仍然留有空间发挥其自身的创意火花。
- en: 'Key Elements for Other Artistic Prompts:'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 其他艺术提示的关键元素：
- en: 'Project Type: Define the type of project, if it’s a fashion collection, a prototype
    of a new product, or a short film.'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 项目类型：定义项目类型，例如时尚系列、新产品原型或短片。
- en: 'Design Requirements: Give concrete design elements like color schemes, materials,
    or themes.'
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 设计要求：提供具体的设计元素，如色彩方案、材料或主题。
- en: 'Inspirational Sources: If applicable, list sources of other works, styles,
    or artists that will guide the creative process.'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 灵感来源：如适用，列出其他作品、风格或艺术家的来源，这些将指导创作过程。
- en: 'Target Audience: If the design or artwork is targeting a particular audience,
    provide that information so the output is appealing to them.'
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 目标受众：如果设计或艺术作品针对特定受众，请提供相关信息，以确保输出内容对他们有吸引力。
- en: 'Example Artistic Project Prompts:'
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 示例艺术项目提示：
- en: “Create a futuristic fashion line inspired by nature, with sustainable materials
    and environmentally friendly manufacturing processes.”
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: “设计一个以自然为灵感，采用可持续材料和环保制造工艺的未来派时尚系列。”
- en: Design a storyboard for a short animated movie that delves into the theme of
    time travel with a playful and adventurous spirit.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 为一部深入探讨时间旅行主题的短片设计一个故事板，以轻松和冒险的精神展现。
- en: “Create a logo for a new green tech firm that specializes in clean energy. The
    logo must reflect innovation and sustainability.”
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: “为一家专注于清洁能源的新绿色科技公司设计一个标志。该标志必须反映创新和可持续性。”
- en: These questions steer the AI in the correct direction but still leave ample
    opportunity for creative interpretation so that the AI can create original and
    innovative ideas.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题引导AI走向正确的方向，但仍然为创造性解释留下充足的空间，以便AI能够创造原创和创新的想法。
- en: Conclusion
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Creating good prompts for creative and artistic work is a matter of finding
    the right balance between structure and freedom. Whether you are writing a story,
    creating artwork, creating music, or working on any other form of art, the secret
    to good collaboration with AI is giving it clear instructions and still letting
    the AI contribute its own creative input. In the following chapter, we will discuss
    how to write prompts for task organization, time management, and productivity,
    allowing you to use AI as your personal assistant to organize your daily routine.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 为创意和艺术作品创建良好的提示是找到结构和自由之间正确平衡的问题。无论你是写故事、创作艺术作品、创作音乐，还是从事任何其他形式的艺术，与AI良好合作的秘诀是给出清晰的指示，同时仍然让AI贡献其自身的创造性输入。在下一章中，我们将讨论如何编写任务组织、时间管理和生产力的提示，让你能够将AI作为个人助理来组织你的日常生活。
- en: 'Chapter Seven: Designing Prompts for Content Creation and Writing Assistance'
  id: totrans-380
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第七章：设计内容创作和写作辅助的提示
- en: AI models have revolutionized the content creation world, providing writers,
    marketers, and other content creators with useful tools to make their work easier.
    This chapter delves into designing prompts for content creation and how AI can
    be used to generate high-quality articles, blog posts, creative writing, and much
    more.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型已经彻底改变了内容创作世界，为作家、营销人员和其他内容创作者提供了有用的工具，使他们的工作更加容易。本章深入探讨了设计内容创作提示以及如何使用AI生成高质量的文章、博客文章、创意写作等。
- en: Comprehending the Function of AI in Content Generation
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 理解AI在内容生成中的作用
- en: In content development, AI acts as a strong aide by creating text, coming up
    with ideas, and editing drafts. Utilizing strong prompts, users can direct AI
    to develop content that is in accordance with their tone, style, and topic specifications.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 在内容开发中，AI 通过创建文本、提出想法和编辑草稿，充当强大的助手。利用强大的提示，用户可以指导AI开发符合他们语气、风格和主题要求的内容。
- en: Methods for Creating Prompts for Content Creation
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 创建内容创作提示的方法
- en: 'Specify the Content Type: State the content type you require, for example,
    a blog post, social media caption, creative story, or email.'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 指定内容类型：说明所需的内容类型，例如博客文章、社交媒体标题、创意故事或电子邮件。
- en: 'Example: “Create a blog post on the top five remote worker productivity tools.”'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“撰写一篇关于前五款远程工作者生产力工具的博客文章。”
- en: 'Identify the Purpose and Audience: State the purpose of the content (e.g.,
    informative, persuasive, entertaining) and the target audience (e.g., professionals,
    students, general public).'
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 确定目的和受众：说明内容的目的（例如，信息性、说服性、娱乐性）和目标受众（例如，专业人士、学生、公众）。
- en: 'Example: “Write a compelling article for young professionals on why they should
    contribute to a retirement fund at an early age.”'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为年轻专业人士撰写一篇引人入胜的文章，阐述他们为什么应该尽早为退休基金做贡献。”
- en: 'Instruction:'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 指示：
- en: Give a general outline or list of key points to assist the AI in organizing
    the content in a proper manner.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 提供一个一般的大纲或关键点列表，以帮助AI以适当的方式组织内容。
- en: 'Example: “Create a blog entry on green travel tips, including packing, transportation,
    accommodations, and activities.”'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“创建一篇关于绿色旅行小贴士的博客文章，包括打包、交通、住宿和活动。”
- en: 'Establish the Tone and Style: Specify the tone (formal, informal, humorous)
    and writing style (narrative, descriptive, analytical) that is required.'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 建立语气和风格：指定所需的语气（正式、非正式、幽默）和写作风格（叙述、描述、分析）。
- en: 'Example: “Compose a casual, lighthearted blog entry on the difficulties of
    working remotely.”'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“撰写一篇关于远程工作困难的轻松、轻松的博客文章。”
- en: 'Include Keywords and SEO Best Practices: To make content search engine optimized,
    identify the target keywords and make sure that the AI applies them naturally
    within the content.'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 包含关键词和SEO最佳实践：为了使内容搜索引擎优化，确定目标关键词并确保AI在内容中自然地应用它们。
- en: 'Example: “Write a 1500-word article on ‘best travel destinations in India,’
    with the keyword ‘affordable travel in India’ used at least three times.”'
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“撰写一篇关于‘印度最佳旅游目的地’的1500字文章，至少使用三次‘印度经济旅行’这个关键词。”
- en: Refining and Editing Content Based on Prompts
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 根据提示精炼和编辑内容
- en: 'AI can similarly be of big help in refining and editing writing. These strategies
    assist you in the use of AI as an editor:'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: AI同样可以在润色和编辑写作方面提供很大帮助。以下策略可以帮助您作为编辑使用AI：
- en: 'Grammar and Style Checks: Employ prompts to direct AI in recognizing grammar
    errors, enhancing sentence construction, and providing overall clarity.'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 语法和风格检查：使用提示指导AI识别语法错误、增强句子结构和提供整体清晰度。
- en: 'Example: “Read the following paragraph and make recommendations for grammar,
    sentence structure, and clarity.”'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“阅读以下段落，并对语法、句子结构和清晰度提出建议。”
- en: 'Rewriting for Tone and Style: If the content’s tone or style needs adjusting,
    prompt the AI to rephrase the text accordingly.'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 调整语气和风格：如果内容的语气或风格需要调整，提示AI相应地改写文本。
- en: 'Example: “Rewrite this email to sound more professional and polite.”'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“将此电子邮件重写，使其听起来更加专业和礼貌。”
- en: 'Summarization: Sometimes, you might need to summarize lengthy content. Well-crafted
    prompts can lead AI to identify the most crucial information.'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 摘要：有时，您可能需要总结长篇内容。精心设计的提示可以引导AI识别最重要的信息。
- en: 'Example: “Condense the below 500-word article into an executive summary of
    100 words.”'
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“将以下500字的文章压缩成100字的执行摘要。”
- en: 'Expanding Content: If you must expand a brief draft into a full-length work,
    utilize prompts to request the AI to elaborate on concepts or provide details.'
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展内容：如果您必须将简短的草稿扩展成完整的作品，请使用提示请求AI详细阐述概念或提供细节。
- en: 'Example: “Elaborate on the paragraph on sustainable tourism by including examples
    of green hotels and activities.”'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“通过包括绿色酒店和活动的例子来完善关于可持续旅游的段落。”
- en: 'Case Studies: Content Creation in Practice'
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究：内容创作实践
- en: 'Blog Writing: One lifestyle blogger utilized AI to compose blog articles on
    wellness and health subjects. By employing keyword-specific prompts that outlined
    the tone and audience, the blogger created several posts in a matter of hours
    while preserving quality and relevance.'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 博客写作：一位生活方式博主利用AI撰写关于健康和福祉主题的博客文章。通过使用特定的关键词提示，概述了语气和受众，博主在几小时内就创作了几篇帖子，同时保持了质量和相关性。
- en: 'Social Media Marketing: An AI-powered social media manager made creative posts
    for a fashion company. By providing explicit prompts, AI came up with catchy titles,
    product descriptions, and call-to-action sentences, saving time and improving
    the brand’s digital presence.'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体营销：一个AI驱动的社交媒体经理为一家时尚公司制作了创意帖子。通过提供明确的提示，AI想出了吸引人的标题、产品描述和行动号召句子，节省了时间并提升了品牌的数字形象。
- en: 'Creative Writing: An author used AI to brainstorm ideas and refine short stories.
    By providing detailed prompts, the author guided the AI in generating plot ideas,
    character dialogues, and scene descriptions that were in line with their creative
    vision.'
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 创意写作：一位作者使用AI来激发想法并完善短篇小说。通过提供详细的提示，作者引导AI生成符合其创意愿景的情节想法、角色对话和场景描述。
- en: How to Fine-Tune AI for Various Writing Activities
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 如何调整AI以适应各种写作活动
- en: 'Blog Posts: When creating blog posts, you need to format your prompts with
    headings, subheadings, and main points. This assists in dividing the article and
    making it simple for the AI to create well-structured content.'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 博客文章：在创建博客文章时，你需要用标题、副标题和主要观点格式化你的提示。这有助于将文章分割，并使AI能够创建结构良好的内容。
- en: 'Social Media Content: For social media, brevity, engagement, and tone are important.
    Prompts should be written in a way to produces short and effective messages with
    calls to action or hashtags.'
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体内容：对于社交媒体，简洁、参与度和语气很重要。提示应该以产生简短而有效的信息、行动号召或标签的方式编写。
- en: 'Email Campaigns: Emails must be concise, personalized, and action-oriented.
    Have the AI create subject lines, body copy, and CTAs (calls to action) depending
    on the purpose of the campaign.'
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 邮件活动：邮件必须简洁、个性化且具有行动导向。让AI根据活动的目的创建主题行、正文和CTA（行动号召）。
- en: 'Creative Writing: For poetry or fiction, prompts need to be rich in emotional
    tone, character description, and setting details. AI can help with descriptions,
    dialogue, and plot ideas, but the more detailed the prompt, the closer the output
    will be to your idea.'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 创意写作：对于诗歌或小说，提示需要丰富的情感基调、人物描述和场景细节。AI可以帮助描述、对话和情节想法，但提示越详细，输出就越接近你的想法。
- en: Conclusion
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Mastery of prompt engineering is crucial to leverage the full capacity of AI
    to write. Through the creation of clear, concrete, and contextually sensitive
    prompts, you’re able to write high-quality content quicker and with greater reliability.
    Whether you are writing blog posts, producing social media posts, or coming up
    with ideas for creative projects, AI can be an invaluable tool in your content
    creation workflow.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握提示工程对于发挥AI写作的完整能力至关重要。通过创建清晰、具体和上下文敏感的提示，你可以更快、更可靠地写出高质量的内容。无论你是撰写博客文章、制作社交媒体帖子还是构思创意项目的想法，AI都可以成为你内容创作流程中的无价之宝。
- en: 'Chapter Eight: Designing Prompts for Personalization and Customization'
  id: totrans-417
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第八章：设计用于个性化与定制的提示
- en: With AI becoming a part of many industries, one of the strongest uses of AI
    is in personalization. Personalization, whether marketing, product suggestions,
    or user experiences, enables businesses and creators to personalize their content
    to individual needs and tastes. This chapter is about how to write prompts that
    allow AI to create personalized and customized content for different audiences.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI成为许多行业的一部分，AI最强大的用途之一就是个性化。无论是营销、产品推荐还是用户体验，个性化都使企业和创作者能够根据个人需求和口味定制内容。本章是关于如何编写提示，使AI能够为不同的受众创建个性化的定制内容。
- en: Understanding Personalization and Customization in AI
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 理解AI中的个性化与定制
- en: Personalization refers to designing singular experiences, recommendations, or
    content in reference to an individual’s tastes, actions, and demographics. In
    this context, AI has been shown to surpass humans through extensive data processing
    and creating outputs that seem specifically suited to the user. It is important
    through effective prompt engineering to steer AI toward producing such customized
    outputs.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化指的是根据个人的喜好、行为和人口统计数据设计独特的体验、推荐或内容。在这种情况下，AI通过广泛的数据处理和创建似乎专门针对用户的输出已被证明超越了人类。通过有效的提示工程来引导AI产生这样的定制输出是非常重要的。
- en: Methods for Creating Tailored Prompts
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 创建定制提示的方法
- en: 'Gather Relevant Data: In order to tailor content to meet their needs, feed
    the AI relevant information about the user, product, or service. This might include
    preferences, history of what the user has viewed, or user requirements.'
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 收集相关数据：为了满足用户、产品或服务的需求，向AI提供有关用户、产品或服务的相关信息。这可能包括偏好、用户查看历史的记录或用户需求。
- en: 'Example: “Create a customized email for a customer who has just bought a fitness
    tracker, suggesting complementary products such as smart scales and resistance
    bands.”'
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为刚刚购买健身追踪器的客户创建一封定制电子邮件，建议互补产品，如智能秤和阻力带。”
- en: 'Use Demographics and Interests: Add demographic data like age, location, occupation,
    or interests to create content that appeals to the target audience.'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 使用人口统计数据和兴趣：添加人口统计数据，如年龄、位置、职业或兴趣，以创建吸引目标受众的内容。
- en: 'Example: “Create a blog post about travel destinations for young professionals
    in their 20s, focusing on budget-friendly and adventure-filled experiences.”'
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为20多岁的年轻专业人士创建一篇关于旅行目的地的博客文章，重点关注预算友好和充满冒险的经历。”
- en: 'Incorporate User Behavior: Personalize content according to user behavior or
    previous interactions. This is especially helpful for recommendation systems or
    follow-up messages.'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 结合用户行为：根据用户行为或之前的互动个性化内容。这对于推荐系统或后续消息特别有帮助。
- en: 'Example: “Recommend a product to a customer who has bought environmentally
    friendly products in the past, recommending similar products such as reusable
    water bottles and solar-powered devices.”'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“向过去购买过环保产品的客户推荐产品，例如可重复使用的水瓶和太阳能设备。”
- en: 'Specify Tone Based on Audience: Adapt the tone of the content to suit the taste
    of the target audience. Whether the audience is professional, informal, or energetic,
    prompts should accommodate this.'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 根据受众指定语调：根据目标受众的喜好调整内容的语调。无论受众是专业人士、非正式人士还是充满活力的人，提示都应该适应这一点。
- en: 'Example: “Create a LinkedIn announcement of a new product launch for a corporate
    audience, written in a formal tone and emphasizing major business benefits.”'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为面向企业受众的新产品发布撰写LinkedIn公告，采用正式语调并强调主要商业利益。”
- en: 'Request Dynamic Personalization: You can have AI create dynamic content that
    varies according to certain variables, like time of day, place, or event. Mention
    these variables in the request to make the experience extremely personalized.'
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 请求动态个性化：您可以要求AI创建根据某些变量（如时间、地点或事件）变化的动态内容。在请求中提及这些变量，以使体验极具个性化。
- en: 'Example: “Compose a welcome message for a customer who is visiting a website
    in the morning from Mumbai, India, with special offers for local users.”'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为早上从印度孟买访问网站的客户撰写欢迎信息，为当地用户提供特别优惠。”
- en: Sophisticated Techniques for Personalization and Customization
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化与定制的高级技术
- en: 'Behavioral Segmentation: Segment your audience into separate groups according
    to their actions, likes, and participation levels. Design prompts to create content
    that is appealing to each group.'
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 行为细分：根据受众的行为、喜好和参与程度将受众分成不同的群体。设计提示以创建对每个群体都有吸引力的内容。
- en: 'Example: “Design three separate versions of a newsletter: one for highly active
    subscribers, one for occasional readers, and one for new subscribers.”'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“设计三份不同的新闻通讯版本：一份针对高度活跃的订阅者，一份针对偶尔的读者，一份针对新订阅者。”
- en: 'Context-Aware Personalization: Make sure that the AI is aware of the context
    in which the content will be used. This may involve the user’s current context,
    environment, or immediate needs at the time.'
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文感知个性化：确保AI了解内容将使用的上下文。这可能涉及用户的当前上下文、环境或当时的即时需求。
- en: 'Example: “Create a personalized suggestion for a customer who is shopping late
    at night and seeking entertainment products, e.g., streaming services or gaming
    equipment.”'
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为晚上晚些时候购物并寻求娱乐产品的客户创建个性化建议，例如流媒体服务或游戏设备。”
- en: 'Personalized Email Campaigns: Email personalization can strongly enhance engagement.
    Writing triggers that involve the names of customers, purchase history, or preferences
    can result in more efficient campaigns.'
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化电子邮件活动：电子邮件个性化可以显著增强参与度。涉及客户姓名、购买历史或偏好的触发器可以导致更有效的活动。
- en: 'Example: “Compose a birthday email to a loyal customer, with a special discount
    on products that are similar to their past purchases and wishing them a wonderful
    year.”'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为一位忠诚的客户撰写生日电子邮件，提供与过去购买产品相似产品的特别折扣，并祝他们新年快乐。”
- en: 'Personalized Learning Paths: In learning content, cues can be programmed to
    develop personalized learning paths in relation to the learner’s progress, objectives,
    and learning style.'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化学习路径：在学习内容中，可以根据学习者的进度、目标和学习风格编程提示，以开发个性化的学习路径。
- en: 'Example: “Create a learning module for a student who is struggling with algebra,
    providing simplified explanations, examples, and interactive exercises.”'
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为在代数方面有困难的学生创建学习模块，提供简化的解释、示例和交互式练习。”
- en: 'Ad Personalization: In online advertising, inputs can direct AI to make targeted
    advertisements based on the unique users’ histories of searches, likes, and behaviors.'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 广告个性化：在线广告中，输入可以指导AI根据独特用户的搜索、点赞和行为历史制作定向广告。
- en: 'Example: “Create a Google ad for a new skincare product, aimed at users who
    have searched for organic beauty products in the past.”'
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为新护肤产品创建Google广告，针对过去搜索过有机美容产品的用户。”
- en: 'Case Studies: Personalized Content in Action'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究：个性化内容的应用
- en: 'E-Commerce Product Recommendations: An e-commerce platform employs AI to create
    customized product recommendations for users based on their past purchases and
    search history. AI-powered prompts designed recommendations for each customer,
    which resulted in more sales and enhanced customer satisfaction.'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 电子商务产品推荐：一个电子商务平台利用人工智能根据用户的过去购买和搜索历史为用户创建定制的产品推荐。人工智能驱动的提示为每位客户设计了推荐，这导致了更多销售和提高了客户满意度。
- en: 'Personalized Newsletters: An AI-powered digital marketing agency created personalized
    email newsletters for various customer segments. Analyzing customer behavior and
    preferences, the agency customized the content of each newsletter to drive engagement
    and conversions.'
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化新闻通讯：一个由人工智能驱动的数字营销机构为不同的客户群体创建了个性化的电子邮件通讯。通过分析客户行为和偏好，该机构定制了每份通讯的内容，以推动参与度和转化率。
- en: 'Dynamic Ad Campaigns: One global brand used AI to create dynamic ads that adapted
    according to location, time of day, and user behavior. This enabled the brand
    to offer extremely relevant ads to consumers, driving click-through rates and
    conversions.'
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 动态广告活动：一个全球品牌利用人工智能创建动态广告，这些广告根据地理位置、一天中的时间和用户行为进行自适应。这使得品牌能够向消费者提供极其相关的广告，从而推动点击率和转化率。
- en: Best Practices for Delivering Personalization with AI
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 利用人工智能实现个性化交付的最佳实践
- en: 'Data Accuracy: Make sure that the information that will be used for personalization
    is accurate and current. Inaccurate data can create irrelevant content and user
    experiences.'
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 数据准确性：确保用于个性化信息准确且最新。不准确的数据可能创建不相关的内容和用户体验。
- en: 'Avoid Over-Personalization: While personalization can enhance user experiences,
    excessive personalization can feel invasive. Be mindful of striking a balance.'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 避免过度个性化：虽然个性化可以提升用户体验，但过度的个性化可能会感觉侵犯隐私。注意保持平衡。
- en: 'Test and Iterate: Test various personalization content methods repeatedly.
    Employ AI for testing various pieces of content types and tracking engagement
    to determine what performs the best for your audience.'
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 测试和迭代：反复测试各种个性化内容方法。利用人工智能测试各种内容类型，并跟踪参与度，以确定哪些内容最适合您的受众。
- en: 'Respect Privacy: When employing personal information, make sure privacy laws
    are observed. Notify users clearly on how their data will be employed to customize
    content.'
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 尊重隐私：在利用个人信息时，确保遵守隐私法律。明确通知用户他们的数据将如何用于定制内容。
- en: Conclusion
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Personalization is an essential part of our current digital landscape, and AI
    can play a powerful role in enabling businesses and creators to connect with their
    users in better ways. Through the creation of well-defined, data-driven prompts,
    AI can create highly personalized content that is directly addressed to users’
    needs and interests. Whether it’s for advertising, product suggestions, learning
    content, or customized user experiences, successful prompt engineering enables
    businesses to provide significant and customized interactions that foster better
    relationships with their audience.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化是我们当前数字景观的一个基本组成部分，人工智能在使企业和创作者以更好的方式与用户连接方面可以发挥强大的作用。通过创建定义明确、数据驱动的提示，人工智能可以创建高度个性化的内容，这些内容直接针对用户的需要和兴趣。无论是广告、产品建议、学习内容还是定制用户体验，成功的提示工程使企业能够提供重要且定制的互动，从而促进与受众建立更好的关系。
- en: 'Chapter Nine: Designing Prompts for Customer Support and Service Automation'
  id: totrans-454
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第九章：设计客户支持和服务自动化的提示
- en: With the advancement of AI technology, it is increasingly vital in customer
    support, allowing companies to automate replies and personalize service at scale.
    In this chapter, we will learn how to craft prompts that enable AI to help with
    customer service functions, ranging from responding to common questions to issue
    resolution and handling customer inquiries. Good prompt engineering has the potential
    to increase customer satisfaction, lower response time, and enhance support operations.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能技术的进步，它在客户支持方面变得越来越重要，允许公司实现规模化的自动回复和个性化服务。在本章中，我们将学习如何构建提示，使人工智能能够帮助处理客户服务功能，从回答常见问题到问题解决和处理客户咨询。良好的提示工程有可能提高客户满意度，降低响应时间，并提升支持运营。
- en: Understanding AI in Customer Support
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 理解人工智能在客户支持中的应用
- en: AI has transformed customer support by providing businesses with a means of
    managing large volumes of queries in a speedy and efficient manner. Through AI-based
    chatbots, virtual assistants, and automated email systems, businesses can offer
    24/7 support to customers. Through the creation of concise and informative prompts,
    businesses can instruct AI to provide effective, human-like responses that resolve
    issues, provide information, and ensure a smooth customer experience.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: AI通过为企业提供一种快速高效管理大量查询的方法，已经改变了客户支持。通过基于AI的聊天机器人、虚拟助手和自动电子邮件系统，企业可以为客户提供24/7的支持。通过创建简洁且信息丰富的提示，企业可以指导AI提供有效、类似人类的响应，以解决问题、提供信息和确保客户体验顺畅。
- en: Key Elements of Designing Prompts for Customer Support
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 设计客户支持提示的关键要素
- en: 'Explain the Problem or Request: To give correct answers, prompts must be formulated
    in a way that gets the customer’s problem or requests across accurately. This
    is possible by encouraging AI to request clarification questions if the question
    is ambiguous or not fully expressed.'
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 解释问题或请求：为了给出正确的答案，提示必须以准确传达客户的问题或请求的方式制定。这可以通过鼓励AI在问题模糊或未充分表达时请求澄清问题来实现。
- en: 'Example: “Request the customer to confirm if they are facing any problems in
    the payment process or shipping information.”'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“要求客户确认他们是否在支付过程中遇到任何问题或运输信息有误。”
- en: 'Provide Context: AI must be provided with pertinent background information,
    like the customer’s past interactions, purchase history, or account information,
    to provide more personalized assistance.'
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 提供背景信息：AI必须提供相关的背景信息，如客户的过往互动、购买历史或账户信息，以提供更个性化的帮助。
- en: 'Example: “Based on the history of orders from the customer, recommend steps
    to troubleshoot a product that has been labeled as defective.”'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“根据客户的历史订单，推荐解决被标记为有缺陷的产品的步骤。”
- en: 'Identify the Tone of the Response: The tone of the customer service response
    is important for generating a positive experience. Depending on circumstances,
    the tone can require being empathetic, professional, friendly, or urgent. Clear
    prompts ensure that AI will be able to sustain the proper tone.'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 确定响应的语气：客户服务响应的语气对于产生积极的体验很重要。根据情况，语气可能需要表现出同理心、专业、友好或紧急。清晰的提示确保AI能够保持适当的语气。
- en: 'Example: “Answer the customer in a polite and sympathetic voice, admitting
    their annoyance and providing a speedy solution.”'
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“以礼貌和同情的语气回答客户，承认他们的烦恼并提供快速解决方案。”
- en: 'Provide Helpful Solutions or Information: Make sure the AI is directed to give
    useful solutions or helpful information, like troubleshooting procedures, product
    information, return policies, or FAQs. Utilize prompts to lead AI to actionable
    solutions.'
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 提供有用的解决方案或信息：确保AI被指导提供有用的解决方案或有用的信息，如故障排除程序、产品信息、退货政策或常见问题解答。利用提示引导AI到可执行的解决方案。
- en: 'Example: “Give the customer directions on how to reset their password, and
    include a link to the help center in case they need additional help.”'
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“向客户说明如何重置他们的密码，并在需要额外帮助的情况下包含帮助中心的链接。”
- en: 'Escalation Protocol: When AI is not able to resolve a problem completely, prompts
    should instruct on escalation procedures to transfer the question to a human agent
    or to channel the customer toward other support mediums.'
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 升级协议：当AI无法完全解决问题时，提示应指导升级程序将问题转交给人工代理或引导客户到其他支持渠道。
- en: 'Example: “If the matter cannot be addressed, request if the customer would
    want to be escalated to a live support agent.”'
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“如果问题无法解决，询问客户是否希望升级到现场支持代理。”
- en: Types of Customer Support Prompts
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 客户支持提示类型
- en: 'Frequently Asked Questions (FAQ) Responses: Design prompts that enable AI to
    respond to routine questions swiftly and precisely.'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 常见问题解答（FAQ）响应：设计提示，使AI能够迅速而精确地回答常规问题。
- en: 'Example: “Answer customer questions regarding shipping policies, including
    delivery rates and times for overseas orders.”'
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“回答客户关于运输政策的疑问，包括海外订单的配送费率和时间。”
- en: 'Product Support: When customers have issues with products or services, AI can
    provide troubleshooting steps, and product usage tips, or direct users to relevant
    resources.'
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 产品支持：当客户遇到产品或服务问题时，AI可以提供故障排除步骤、产品使用技巧或直接引导用户到相关资源。
- en: 'Example: “Walk the customer through the process of troubleshooting a connectivity
    problem with their smart device.”'
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“指导客户通过他们的智能设备解决连接问题。”
- en: 'Order Status and Tracking: AI can be instructed to assist customers in tracking
    their orders or requesting order statuses, returns, or exchanges.'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 订单状态和跟踪：AI可以指示协助客户跟踪他们的订单或请求订单状态、退货或换货。
- en: 'Example: “Offer the customer real-time order status information, such as estimated
    delivery dates and shipping notifications.”'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“提供客户的实时订单状态信息，例如预计交货日期和运输通知。”
- en: 'Billing and Payments: Designing precise prompts for billing-related questions
    ensures customers receive correct answers about their bills, payment status, or
    refund requests.'
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 账单和支付：为账单相关问题设计精确的提示，确保客户收到关于账单、支付状态或退款请求的正确答案。
- en: 'Example: “Tell the customer their current balance and the methods they can
    use to pay their invoice.”'
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“告知客户他们的当前余额以及他们可以使用的方法来支付他们的账单。”
- en: 'Account Management: AI can aid in the management of customer accounts by supporting
    functions like password resets, profile changes, and subscription management.'
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 账户管理：AI可以通过支持密码重置、资料更改和订阅管理等功能来协助客户账户管理。
- en: 'Example: “Walk the customer through updating their billing address or email
    address in their account settings.”'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“指导客户更新他们在账户设置中的账单地址或电子邮件地址。”
- en: Best Practices for Designing Effective Customer Support Prompts
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 设计有效客户支持提示的最佳实践
- en: 'Understand Customer Intent: The importance lies in developing prompts to make
    the AI realize the customer’s intent without confusion. If the query is on a technical
    matter, product capability, or managing accounts, the AI needs to discern the
    problem instantaneously.'
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 理解客户意图：关键在于开发提示，使AI能够不混淆地意识到客户的意图。如果查询是关于技术问题、产品功能或账户管理，AI需要立即识别问题。
- en: 'Example: “Request the customer if they require assistance with a product failure
    or general inquiries regarding the product’s functionality.”'
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“询问客户是否需要帮助解决产品故障或关于产品功能的一般性咨询。”
- en: 'Be Brief and Clear: Customer service conversations must be clear and to the
    point. Wordy answers or extraneous details can annoy customers. Make prompts that
    elicit brief, actionable answers.'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 简洁明了：客户服务对话必须清晰、简洁。冗长的答案或无关的细节可能会让客户感到烦恼。创建能够引发简短、可操作答案的提示。
- en: 'Example: “Answer in two to three sentences with precise steps on how to fix
    the billing problem.”'
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“用两到三句话回答如何修复账单问题的精确步骤。”
- en: 'Be Friendly and Helpful: Customers like to feel heard and understood. Even
    if AI interactions are to be kept professional, they must possess an empathetic
    and courteous tone to establish positive customer relationships.'
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 保持友好和乐于助人：客户喜欢感到被听到和理解。即使AI交互需要保持专业，它们也必须具备同理心和礼貌的语气，以建立积极的客户关系。
- en: 'Example: “Express gratitude to the customer for their patience, respond to
    their concerns, and assure them that the issue is being addressed.”'
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“对客户的耐心表示感谢，回应他们的关切，并确保他们的问题正在得到解决。”
- en: 'Use Contextual Data to Offer Personalized Answers: Using data from the user,
    like past interaction or purchase data, can aid AI in creating more personalized
    and relevant answers and enhance the experience of the user.'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 使用上下文数据提供个性化答案：使用用户数据，如过去的互动或购买数据，可以帮助AI创建更个性化、更相关的答案，并提升用户体验。
- en: 'Example: “Refer to the customer’s recent blender purchase when offering troubleshooting
    advice for the product.”'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“在提供产品故障排除建议时，提及客户最近的搅拌机购买。”
- en: 'Test and Refine: Test the AI responses periodically to make sure they are accurate,
    useful, and pertinent. Frequently update prompts for new problems, shifting customer
    requirements, or product/service changes.'
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 测试和改进：定期测试AI的响应，以确保它们准确、有用且相关。经常更新提示以应对新问题、变化的客户需求或产品/服务变更。
- en: 'Example: “Test responses to common troubleshooting issues every month to ensure
    the information is up-to-date and effective.”'
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“每月测试对常见故障排除问题的响应，以确保信息是最新的且有效的。”
- en: 'Case Studies: AI in Customer Support'
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究：客户支持中的AI
- en: 'E-Commerce Chatbots: An e-commerce platform integrated an AI chatbot to handle
    customer inquiries regarding order status, returns, and product details. The AI
    successfully handled over 60% of customer inquiries, reducing response time and
    improving overall customer satisfaction.'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 电子商务聊天机器人：一个电子商务平台集成了人工智能聊天机器人来处理有关订单状态、退货和产品详情的客户咨询。人工智能成功处理了超过60%的客户咨询，减少了响应时间并提高了整体客户满意度。
- en: 'Banking Virtual Assistants: A bank used AI-based virtual assistants to provide
    answers to common questions related to account balances, loan requests, and ATM
    branches. This cut down considerably on the workload for human agents, enabling
    them to deal with more intricate matters.'
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 银行虚拟助手：一家银行使用基于人工智能的虚拟助手来回答与账户余额、贷款申请和ATM分行相关的常见问题。这大大减少了人工代理的工作量，使他们能够处理更复杂的问题。
- en: 'Telecom Troubleshooting: A telecommunication firm rolled out AI to lead customers
    through service outage, device, and bill trouble-shooting procedures. The AI delivered
    fast resolutions and escalated unresolved problems to human representatives for
    quicker resolution.'
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 电信故障排除：一家电信公司推出了人工智能，引导客户通过服务中断、设备和账单故障排除程序。人工智能提供了快速的解决方案，并将未解决的问题升级给人工代表以加快解决。
- en: Conclusion
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: AI-powered customer service platforms can revolutionize the way companies engage
    with their customers, making it possible to provide quick, personalized, and effective
    service. By developing concise, precise prompts, companies can train AI to effectively
    perform various customer service tasks. From providing FAQs to resolving complicated
    issues, AI can make customer experiences more efficient and lower operational
    expenses. Through ongoing refinement of prompt tactics and keeping the AI current
    with new customer needs and behaviors, companies can ensure high customer satisfaction
    and loyalty.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能驱动的客户服务平台可以彻底改变公司与其客户互动的方式，使其能够提供快速、个性化和有效的服务。通过开发简洁、精确的提示，公司可以训练人工智能有效地执行各种客户服务任务。从提供常见问题解答到解决复杂问题，人工智能可以使客户体验更高效并降低运营成本。通过持续优化提示策略并确保人工智能与新的客户需求和行为保持同步，公司可以确保高客户满意度和忠诚度。
- en: 'Chapter Ten: Designing Prompts for Data Analysis and Insights'
  id: totrans-497
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第十章：设计数据分析与见解的提示
- en: With the advent of big data, organizations and businesses are depending more
    and more on AI to scan large volumes of data and derive meaningful insights. Through
    proper prompts for data analysis, AI can assist organizations in making more informed
    decisions, finding patterns, and optimizing performance. In this chapter, we will
    discuss how to create prompts that instruct AI to analyze data, produce insights,
    and create actionable reports that inform business strategy.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 随着大数据的出现，组织和企业在越来越多地依赖人工智能来扫描大量数据并得出有意义的见解。通过适当的数据分析提示，人工智能可以帮助组织做出更明智的决策，发现模式，并优化性能。在本章中，我们将讨论如何创建指令人工智能分析数据、产生见解并创建可操作的报告，以指导商业策略。
- en: Knowing AI in Data Analysis
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 了解数据分析中的人工智能
- en: Data analysis is the process of taking large sets of data and making sense of
    them. With AI, it can be automated, speeding up, making it more accurate and more
    scalable. With advanced algorithms and machine learning, AI can identify trends,
    correlations, and outliers that would be hard or time-consuming for humans to
    identify. Writing clear prompts is essential to make sure AI knows what needs
    to be done and returns accurate, actionable results.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析是将大量数据提取并使其有意义的处理过程。借助人工智能，这一过程可以自动化，从而加快速度，提高准确性，并实现更广泛的扩展。通过先进的算法和机器学习，人工智能可以识别出人类难以或耗时才能识别的趋势、相关性以及异常值。编写清晰的提示是确保人工智能知道需要做什么并返回准确、可操作的结果的关键。
- en: Major Components of Designing Data Analysis Prompts
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 设计数据分析提示的主要组成部分
- en: 'Define the Data Source: For efficiently analyzing data, it is necessary to
    define the source where the AI must extract information. If it’s from a spreadsheet,
    database, website, or somewhere else, the prompt must clearly mention where the
    data is located.'
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 定义数据源：为了有效地分析数据，有必要定义人工智能必须从中提取信息的数据源。如果数据来自电子表格、数据库、网站或其他地方，提示必须清楚地说明数据所在的位置。
- en: 'Example: “Examine the last quarter’s sales data in the company’s SQL database
    to determine trends and patterns.”'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“检查公司SQL数据库中上一季度的销售数据，以确定趋势和模式。”
- en: 'Make the Objective Clear: AI prompts must specifically state the precise objective
    of the data analysis, be it to detect trends, contrast data points, forecast future
    results, or identify anomalies.'
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 明确目标：AI 提示必须明确说明数据分析的精确目标，无论是检测趋势、对比数据点、预测未来结果，还是识别异常。
- en: 'Example: “Show the top five products that sold the highest revenue last month,
    and compare the demographic information of the customers who bought them.”'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“展示上个月销售最高收入的五大产品，并比较购买这些产品的客户的人口统计信息。”
- en: 'Request Specific Metrics or KPIs: If performance measurement is the aim, then
    it’s crucial to state the key performance indicators (KPIs) or metrics to be analyzed.'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 请求特定的指标或 KPI：如果绩效测量是目标，那么明确要分析的关键绩效指标（KPI）或指标至关重要。
- en: 'Example: “Determine the customer acquisition cost (CAC) and lifetime value
    (LTV) using the latest customer data for Q4.”'
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“使用最新客户数据确定 Q4 的客户获取成本（CAC）和终身价值（LTV）。”
- en: 'Include Time Frames: Analyzing data sometimes requires knowledge of trends
    across given periods. Be certain to add the required time frames so AI processes
    data within the proper context.'
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 包含时间范围：分析数据有时需要了解给定时间段内的趋势。务必添加所需的时间范围，以便 AI 在适当的环境中处理数据。
- en: 'Example: “Give a comparison of January to March 2024 monthly sales growth and
    highlight any large fluctuations.”'
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“比较 2024 年 1 月至 3 月的月度销售额增长，并突出任何大幅波动。”
- en: 'Specify Desired Output Format: It is crucial to state how you would like the
    results to be formatted. As a summary, chart, graph, or full report, clear instructions
    will make the AI deliver the data in the most beneficial format.'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 指定所需输出格式：明确您希望结果如何格式化至关重要。作为总结、图表、图形或完整报告，清晰的指令将使 AI 以最有益的格式提供数据。
- en: 'Example: “Show the analysis of customer churn rate as a bar chart with month-to-month
    comparisons for the past six months.”'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“展示过去六个月每月的客户流失率分析，并以柱状图形式展示月度比较。”
- en: Types of Data Analysis Questions
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析问题类型
- en: 'Trend Analysis: Use prompts to instruct AI to find and graph trends over time,
    whether sales data, customer activity, or market conditions.'
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 趋势分析：使用提示指令 AI 在时间序列中查找并绘制趋势，无论是销售数据、客户活动还是市场状况。
- en: 'Example: “Review the last year’s sales data and determine if there are any
    seasonal patterns that can be used to forecast demand for the next quarter.”'
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“回顾去年的销售数据，确定是否存在可用于预测下季度需求的季节性模式。”
- en: 'Comparative Analysis: Comparative analysis prompts assist AI in comparing various
    sets of data side by side by comparing variables such as sales levels, performance
    statistics, or customer satisfaction across regions or time.'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 对比分析：对比分析提示帮助 AI 通过比较销售水平、性能统计或跨区域或时间段的客户满意度等变量，将不同的数据集并排比较。
- en: 'Example: “Compare the last three months’ performance of two marketing campaigns
    based on conversion rate, reach, and engagement.”'
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“比较两个营销活动过去三个月的表现，基于转化率、触及率和参与度。”
- en: 'Predictive Analysis: In predictive analysis, AI can make predictions based
    on past data about future trends. The creation of prompts for the AI to make correct
    predictions is essential for business decision-making.'
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 预测分析：在预测分析中，AI 可以根据过去的数据预测未来的趋势。为 AI 创建正确的预测提示对于商业决策至关重要。
- en: 'Example: “Based on historical sales records of the last five years, forecast
    the total sales for the upcoming quarter, and calculate the anticipated growth
    rate.”'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“基于过去五年历史销售记录，预测即将到来的季度的总销售额，并计算预期的增长率。”
- en: 'Sentiment Analysis: Customer opinions, reviews, and social media posts can
    be analyzed by AI to measure sentiment. Specific prompts can be used by companies
    to learn customer satisfaction, brand image, and product feedback.'
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 情感分析：AI 可以分析客户意见、评论和社交媒体帖子来衡量情感。公司可以使用特定的提示来了解客户满意度、品牌形象和产品反馈。
- en: 'Example: “Conduct sentiment analysis on reviews of our new product by customers,
    classifying them as positive, neutral, and negative feedback.”'
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“对我们新产品的客户评论进行情感分析，将它们分类为正面、中立和负面反馈。”
- en: 'Anomaly Detection: AI can assist in detecting unusual patterns or anomalies
    in data, like fraudulent transactions, unexpected changes in performance, or infrequent
    events that need to be investigated.'
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 异常检测：AI 可以协助检测数据中的异常模式或异常，如欺诈交易、性能的意外变化或需要调查的罕见事件。
- en: 'Example: “Identify any abnormal spikes in web traffic that could signal a possible
    security risk or an unforeseen marketing campaign impact.”'
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“识别任何可能表示潜在安全风险或意外营销活动影响的网络流量异常峰值。”
- en: Best Practices for Developing Effective Data Analysis Prompts
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 开发有效数据分析提示的最佳实践
- en: 'Be Specific In Terms Of Data Inputs: The more precise the data inputs, the
    more accurate is the analysis. Properly define the datasets, variables, and any
    necessary filters to arrive at accurate information.'
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据输入方面要具体：数据输入越精确，分析就越准确。正确定义数据集、变量和任何必要的过滤器，以获得准确信息。
- en: 'Example: “Break down the last two months of sales figures for items in the
    ‘electronics’ category, not counting any discount or promotional sales.”'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“分析过去两个月‘电子产品’类别中商品的销售额，不计任何折扣或促销销售。”
- en: 'Use Clear Metrics and KPIs: Make sure that the AI knows what the key metrics
    are of interest to the analysis. Establish each KPI and specify any additional
    calculations required by the analysis.'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 使用清晰的指标和KPI：确保AI知道分析中感兴趣的关键指标。建立每个KPI并指定分析所需的任何额外计算。
- en: 'Example: “Calculate the conversion rate for visitors to the website during
    the past two weeks, and break it down by traffic source (organic, paid, referral).”'
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“计算过去两周网站访问者的转化率，并按流量来源（有机、付费、推荐）细分。”
- en: 'Clarify the Level of Detail Required: Data analysis may vary from high-level
    summaries to in-depth exploration of granular details. Identify the level of detail
    you prefer to get from the AI.'
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 明确所需细节级别：数据分析可能从高级总结到深入探索细节。确定您希望从AI获得何种细节级别。
- en: 'Example: “Provide a high-level summary of the sales performance for Q1, highlighting
    the top-performing products and regions, along with a detailed breakdown of customer
    demographics.”'
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为Q1的销售表现提供一个高级总结，突出表现最佳的产品和地区，以及详细的客户人口统计细分。”
- en: 'Iterate and Refine: Data analysis is frequently iterative. You may need to
    revisit and improve the AI’s analysis from preliminary results. Create follow-up
    questions that request more targeted analysis or greater detail.'
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代和改进：数据分析通常是迭代的。您可能需要回顾并改进AI的初步分析结果。创建后续问题，请求更针对性的分析或更多细节。
- en: 'Example: “Refine the analysis of sales trends by removing seasonal fluctuations
    and considering only non-holiday sales.”'
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“通过去除季节性波动，仅考虑非假日销售来细化销售趋势的分析。”
- en: 'Include Visualization Requests: AI can produce different visualizations, including
    charts, graphs, and tables, that make the data easier to digest. If visualizations
    are required, mention the type and format.'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 包含可视化请求：AI可以生成不同的可视化，包括图表、图形和表格，使数据更容易消化。如果需要可视化，请说明类型和格式。
- en: 'Example: “Create a line chart comparing the number of monthly website visitors
    to sign-ups for the past 12 months.”'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“创建一个折线图，比较过去12个月每月网站访问者数量与注册用户数量。”
- en: 'Case Studies: AI in Data Analysis'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究：数据分析中的AI
- en: 'Retail Data Analysis: One big retail store utilized AI to study customer buying
    patterns, monitor product sales, and determine trends in real time. By creating
    in-depth prompts, they were able to easily shift to accommodate shifting consumer
    demands, resulting in more focused advertising campaigns and higher sales.'
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 零售数据分析：一家大型零售店利用AI研究客户购买模式、监控产品销售并实时确定趋势。通过创建深入提示，他们能够轻松适应不断变化的消费者需求，从而实现更专注的广告活动和更高的销售额。
- en: 'Financial Performance Tracking: A financial services firm utilized AI to examine
    monthly revenue, spending, and market trends. The AI created predictive models
    that enabled them to predict future cash flow, spot potential threats, and make
    improved investment choices.'
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 财务绩效跟踪：一家金融服务公司利用AI检查月度收入、支出和市场趋势。AI创建了预测模型，使他们能够预测未来的现金流，发现潜在威胁，并做出改进的投资选择。
- en: 'Customer Sentiment Analysis: An IT firm applied AI to scrutinize millions of
    customer reviews across platforms. Through defining specific sentiment analysis
    questions, they were able to understand in-depth user satisfaction, identify incipient
    problems with products, and accordingly modify marketing strategies.'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 客户情绪分析：一家IT公司应用AI审查了数百万个来自不同平台的客户评论。通过定义具体的情绪分析问题，他们能够深入了解用户满意度，识别产品初期问题，并相应地调整营销策略。
- en: Conclusion
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: AI-powered data analysis is a game-changer for companies that want to tap into
    their data to make informed decisions. With the ability to create accurate, context-specific
    prompts, organizations can direct AI to sift through massive volumes of data with
    speed and accuracy, reveal concealed patterns, and develop insights that inform
    decision-making. Whether it’s forecasting future sales, determining market trends,
    or monitoring customer sentiment, AI has the power to dramatically improve how
    businesses utilize data to enhance operations and strategies. With prompt engineering
    mastery for data analysis, businesses can tap into the full value of their data
    and make more effective, data-informed decisions.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: AI驱动的数据分析对于想要利用数据做出明智决策的公司来说是一个变革者。通过创建准确、上下文特定的提示，组织可以指导AI快速准确地筛选大量数据，揭示隐藏的模式，并发展出有助于决策的见解。无论是预测未来销售、确定市场趋势还是监控客户情绪，AI都有能力显著改善企业利用数据来提升运营和策略的方式。通过掌握数据分析提示工程，企业可以充分利用其数据价值，做出更有效、基于数据的决策。
- en: 'Chapter Eleven: Designing Prompts for Marketing and Social Media Content Creation'
  id: totrans-540
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第十一章：设计营销和社交媒体内容创作的提示
- en: Social media and marketing content are critical drivers of customer acquisition,
    brand visibility, and engagement. With the digital age, companies must produce
    high-quality, compelling content at scale to remain competitive. AI is now a formidable
    content creation tool for marketers, with the potential to automate content creation,
    enhance creativity, and reduce workflow. This chapter will discuss how to craft
    compelling prompts to get AI to generate marketing and social media content that
    resonates with audiences, leads to conversions, and establishes brand presence.
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体和营销内容是客户获取、品牌可见性和参与度的重要驱动因素。在数字时代，公司必须大规模生产高质量、引人入胜的内容以保持竞争力。AI现在已成为营销人员强大的内容创作工具，具有自动化内容创作、增强创造力和减少工作流程的潜力。本章将讨论如何制定引人入胜的提示，以使AI生成与受众产生共鸣、导致转化并建立品牌影响力的营销和社交媒体内容。
- en: Knowing AI in Marketing and Content Creation
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 了解营销和内容创作中的AI
- en: Marketing and content creation with AI utilizes natural language processing
    (NLP) and machine learning techniques to create content that supports distinct
    marketing goals. From social media posts and blog posts to ad copy and email newsletters,
    AI tools can assist marketers in producing quality content with speed and effectiveness.
    Using clear, concise prompts, marketers can instruct AI to create customized content
    in the tone, voice, and style of the brand as well as its audience.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI进行营销和内容创作利用自然语言处理（NLP）和机器学习技术来创建支持特定营销目标的内容。从社交媒体帖子、博客文章到广告文案和电子邮件通讯，AI工具可以帮助营销人员快速有效地生产高质量的内容。使用清晰、简洁的提示，营销人员可以指导AI以品牌及其受众的语气、声音和风格创建定制内容。
- en: Most Important Aspects of Designing Marketing and Content Creation Prompts
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 设计营销和内容创作提示的最重要方面
- en: 'Establish the Content Objective: Every item of content has a definite function,
    be it to inform, entertain, convert, or make people aware of a brand. Definite
    briefs ensure that AI writes content based on the specified marketing objective.'
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 确立内容目标：每一项内容都有明确的功能，无论是为了告知、娱乐、转化还是让人们了解一个品牌。明确的要求确保AI根据指定的营销目标撰写内容。
- en: 'Example: “Create a social media announcement for raising awareness on our new
    green product line with emphasis on sustainability and environmentally friendly
    customers.”'
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“创建一条社交媒体公告，提高我们新绿色产品线的意识，重点在于可持续性和环保型客户。”
- en: 'Explain the Target Audience: Content must address the audience it’s targeting
    directly. Prompts must detail specific information about the target audience,
    including demographics, interests, and pain points.'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 解释目标受众：内容必须直接针对其目标受众。提示必须详细说明关于目标受众的具体信息，包括人口统计、兴趣和痛点。
- en: 'Example: “Blog post aimed at 25-35-year-old young professionals with interest
    in personal finances, about budgeting advice for a newbie.”'
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“针对对个人财务感兴趣的25-35岁年轻专业人士的博客文章，关于新手的预算建议。”
- en: 'Specify the Tone and Voice: A brand’s tone and voice are critical in establishing
    its identity and connecting with its audience. Prompts should guide AI to maintain
    a consistent tone, whether it’s casual, formal, humorous, or authoritative.'
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 指定语气和声音：品牌的语气和声音对于建立其身份和与受众建立联系至关重要。提示应指导AI保持一致的语气，无论是随意的、正式的、幽默的还是权威的。
- en: 'Example: “Develop a newsletter email for current customers using a casual,
    conversational tone to offer our newest product discounts and sales promotions.”'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为现有客户开发一份使用轻松、对话式的语气提供我们最新产品折扣和促销活动的时事通讯邮件。”
- en: 'Include SEO Keywords: For content to be search engine-friendly, it needs to
    contain keywords. Define keywords, phrases, or SEO tactics that AI can integrate
    into the content.'
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 包含SEO关键词：为了使内容对搜索引擎友好，它需要包含关键词。定义AI可以整合到内容中的关键词、短语或SEO策略。
- en: 'Example: “Create a 500-word blog post on ‘best workout routines for beginners’
    with keywords such as ‘beginner workout plans’ and ‘home exercises for weight
    loss.’”'
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“创建一篇关于‘初学者最佳锻炼计划’的500字博客文章，包含关键词如‘初学者锻炼计划’和‘减肥家庭锻炼’。”
- en: 'Specify Content Structure: In order to make AI produce content that is readable
    and interesting, it’s necessary to define how the content will be structured.
    This may involve specifying the length, sections, headings, and any type of formatting
    that may be needed.'
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 指定内容结构：为了使AI生成易于阅读和有趣的内容，有必要定义内容将如何被组织。这可能包括指定长度、部分、标题以及可能需要的任何格式。
- en: 'Example: “Create a 300-word product description for our new smartwatch, with
    a bulleted list of features and benefits, and a call to action at the end.”'
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为我们的新款智能手表创建一个300字的描述，包括功能列表和好处，并在结尾处添加行动号召。”
- en: Marketing and Content Creation Types of Prompts
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 营销和内容创作类型提示
- en: 'Social Media Posts: AI can be utilized to create compelling social media posts
    that trigger discussions, encourage engagement, and support brand values. Creating
    specific prompts for social media posts guarantees that the content is timely,
    relevant, and aligned with the style of the platform.'
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体帖子：AI可以用来创建能够引发讨论、鼓励参与并支持品牌价值观的引人入胜的社交媒体帖子。为社交媒体帖子创建特定的提示可以确保内容是及时的、相关的，并与平台的风格保持一致。
- en: 'Sample: “Compose a tweet for announcing our summer sale, employing a playful
    tone and tags such as #SummerSale and #DiscountAlert.”'
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“撰写一条宣布我们夏季促销活动的推文，采用轻松的语气，并使用标签如#SummerSale和#DiscountAlert。”
- en: 'Blog Posts: Blog posts are most important for organic traffic generation, building
    authority, and delivering value to readers. AI can be used to generate ideas,
    write articles, and optimize them for search engines.'
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 博客文章：博客文章对于生成有机流量、建立权威和向读者提供价值至关重要。AI可以用来生成想法、撰写文章并优化以适应搜索引擎。
- en: 'Example: “Write a 1,000-word blog about ‘how to optimize your digital marketing
    plan in 2024,’ employing subheadings and taking into consideration tips of an
    actionable nature.”'
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“撰写一篇关于‘如何在2024年优化您的数字营销计划’的1000字博客文章，使用子标题并考虑可操作性的建议。”
- en: 'Email Campaigns: Email marketing is a powerful means of lead nurturing and
    customer relationship maintenance. Email content prompts should indicate the purpose
    of the email (e.g., to promote a sale, introduce a new product, or send a newsletter)
    and the tone it should take.'
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 邮件营销活动：邮件营销是培养潜在客户和维持客户关系的一种强大手段。邮件内容提示应表明邮件的目的（例如，推广促销活动、介绍新产品或发送通讯稿）以及它应采取的语气。
- en: 'Example: “Compose an email to subscribers announcing a flash sale, with a sense
    of urgency and emphasizing limited-time offers.”'
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为订阅者撰写一封宣布限时抢购的邮件，带有紧迫感并强调限时优惠。”
- en: 'Ad Copy: Ad copy should be concise and engaging whether used for Google Ads,
    Facebook Ads, or otherwise. Well-crafted prompts assist AI in writing compelling,
    action-driven copy that sparks interest and elicits clicks.'
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 广告文案：广告文案应简洁且引人入胜，无论是用于谷歌广告、Facebook广告还是其他方式。精心设计的提示有助于AI撰写引人入胜、行动驱动的文案，激发兴趣并引发点击。
- en: 'Example: “Write a Facebook ad copy for a 50%-off summer sale with a compelling
    call to action to shop now.”'
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为50%夏季折扣的Facebook广告撰写文案，包含引人注目的行动号召，鼓励现在购物。”
- en: 'Video Scripts: Video content is an effective engagement and brand-narrative
    tool. AI may assist in scripting promotional videos, explainer videos, product
    demos, or social media snippets.'
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 视频脚本：视频内容是一种有效的参与和品牌叙事工具。AI可以帮助编写促销视频、解释视频、产品演示或社交媒体片段。
- en: 'Example: “Create a 60-second script for a YouTube advertisement announcing
    our new app, highlighting its innovative features and how it addresses a typical
    user issue.”'
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为宣布我们新应用的YouTube广告创建一个60秒的脚本，突出其创新功能和解决典型用户问题的方法。”
- en: Best Practices for Developing Effective Marketing and Content Prompts
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 开发有效营销和内容提示的最佳实践
- en: 'Be Specific Regarding the Purpose of the Content: Marketing content needs to
    be tied to specific business goals, whether it is lead generation, brand awareness,
    or sales. Prompts should explicitly define the purpose of the content so that
    AI can produce targeted, effective content.'
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 明确内容目的：营销内容需要与特定的商业目标相关联，无论是生成潜在客户、品牌知名度还是销售。提示应明确定义内容的目的，以便AI能够生成针对性强、有效的文案。
- en: 'Example: “Create a case study on how our product enhanced customer retention,
    addressing potential business customers who are looking at our software.”'
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“创建一个案例研究，说明我们的产品如何提高了客户保留率，针对那些正在考虑我们软件的潜在商业客户。”
- en: 'Incorporate Audience Preferences: Knowing your target audience’s likes and
    habits can enable AI to create content that speaks to them. Prompts must incorporate
    details about the audience’s interests, issues, and wants.'
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 融入受众偏好：了解目标受众的喜好和习惯可以使AI创建出能够引起他们共鸣的内容。提示必须包含有关受众兴趣、问题和需求的具体细节。
- en: 'Example: “Design an Instagram ad targeting 18-30-year-old fitness enthusiasts
    featuring a new fitness tracker, focusing on its health-monitoring functions.”'
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“设计一个针对18-30岁健身爱好者的Instagram广告，展示一款新的健身追踪器，重点介绍其健康监测功能。”
- en: 'Apply A/B Testing to Content Differences: In generating multiple content versions
    (e.g., ad copy, email subject lines), applying prompts that identify unique variables
    enables AI to create A/B test versions for fine-tuning.'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 对内容差异应用A/B测试：在生成多个内容版本（例如，广告文案、电子邮件主题行）时，应用识别独特变量的提示，使AI能够创建用于微调的A/B测试版本。
- en: 'Example: “Write two subject line variations of an email for our winter clothing
    sale: one with ‘exclusive offers’ and another with ‘limited-time discounts.’”'
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为我们的冬季服装促销活动撰写两封电子邮件的主题行变体：一封带有‘独家优惠’，另一封带有‘限时折扣’。”
- en: 'Have SEO in Mind: If content is going to be successful on the internet, particularly
    in search engine placement, SEO guidelines have to be kept in mind. Offer AI-related
    keywords, keywords/phrases, and optimization methods.'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑SEO：如果内容要在互联网上取得成功，尤其是在搜索引擎排名方面，必须考虑SEO指南。提供AI相关关键词、关键词/短语和优化方法。
- en: 'Example: “Create a product page for our green tote bags, incorporating SEO
    keywords such as ‘sustainable tote bags’ and ‘environmentally friendly shopping
    bags.’”'
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为我们的绿色购物袋创建一个产品页面，融入SEO关键词，如‘可持续购物袋’和‘环保购物袋’。”
- en: 'Maintain Consistency Across Platforms: Marketing copy must be consistent with
    the voice and tone of the brand across all platforms. Prompts must indicate any
    changes required for varying platforms so that the message does not change.'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有平台上保持一致性：营销文案必须与品牌在所有平台上的声音和语气保持一致。提示必须指出任何针对不同平台所需的变化，以确保信息不发生变化。
- en: 'Example: “Develop a post for Instagram to advertise our future webinar in short,
    impactful copy with an informal, conversational tone.”'
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为Instagram开发一篇广告帖子，宣传我们未来的网络研讨会，使用简短、有影响力的文案，并采用非正式、对话式的语气。”
- en: 'Case Studies: AI in Marketing and Content Generation'
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究：营销和内容生成中的AI
- en: 'E-Commerce Brand Content Strategy: One e-commerce business utilized AI to create
    product descriptions, social media content, and email campaigns. Leveraging AI-powered
    content creation enabled them to scale marketing efforts, minimizing writing time
    but preserving the consistency of their brand voice. Consequently, website traffic
    and conversion rates for the business dramatically improved.'
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 电子商务品牌内容策略：一家电子商务企业利用AI创建产品描述、社交媒体内容和电子邮件活动。利用AI驱动的创作能力，他们能够扩大营销努力，减少写作时间，同时保持品牌声音的一致性。因此，该企业的网站流量和转化率显著提高。
- en: 'B2B Marketing Campaign: A software firm running a B2B business used AI to author
    case studies and blog articles on their website. By setting distinct prompts for
    various content types, they were in a position to create high-quality content
    efficiently. The outcome was an increase in lead generation that could be measured
    as well as engagement with the target audience.'
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: B2B营销活动：一家经营B2B业务的软件公司使用AI在其网站上撰写案例研究和博客文章。通过为不同内容类型设置独特的提示，他们能够高效地创建高质量的内容。结果是潜在客户的生成量增加，并且可以衡量与目标受众的互动。
- en: 'Non-Profit Awareness Campaign: A non-profit entity employed AI to develop a
    campaign of social media updates and e-mail newsletters focused on generating
    awareness for a charity event. Their audience was connected with the content generated
    by the AI, which led to greater donations and publicity for the cause.'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 非营利意识宣传活动：一个非营利机构利用人工智能开发了一系列社交媒体更新和电子邮件通讯稿，旨在提高对一场慈善活动的认识。他们的受众与人工智能生成的内容建立了联系，这导致了更多的捐款和对该事业的关注。
- en: Conclusion
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: AI is revolutionizing how businesses produce and disseminate marketing content.
    Through the creation of well-crafted prompts, marketers can use AI to generate
    high-quality, engaging content that serves specified purposes, resonates with
    target audiences, and achieves business results. From creating social media posts,
    and writing blog posts, to developing email campaigns, AI enables marketers to
    scale their content efforts while ensuring a consistent brand voice. As AI further
    improves, businesses will be able to harness even more sophisticated features,
    fine-tuning their marketing strategies and staying ahead of the competition. By
    perfecting prompt engineering for marketing and content development, businesses
    can streamline their efforts and amplify their impact in an ever-more crowded
    digital environment.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在改变企业生产和传播营销内容的方式。通过创建精心设计的提示，营销人员可以使用人工智能生成高质量、引人入胜的内容，这些内容服务于特定的目的，与目标受众产生共鸣，并实现商业成果。从创建社交媒体帖子、撰写博客文章，到开发电子邮件营销活动，人工智能使营销人员能够扩大其内容努力，同时确保品牌声音的一致性。随着人工智能的进一步改进，企业将能够利用更高级的功能，微调其营销策略，并保持竞争优势。通过完善营销和内容开发的提示工程，企业可以简化其努力，并在日益拥挤的数字环境中放大其影响力。
- en: 'Chapter Twelve: Ethical Considerations and Best Practices for AI Prompt Engineering'
  id: totrans-583
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第十二章：人工智能提示工程的伦理考量与最佳实践
- en: As AI technologies keep advancing and becoming more embedded in different aspects
    of our lives, ethical considerations are becoming a more significant part of their
    design, development, and deployment. In the case of AI prompt engineering, ethical
    issues can emerge in different forms—ranging from data biases used to train AI
    models to the consequences of applying AI in sensitive domains such as healthcare,
    law enforcement, and customer support. This chapter will discuss the ethical implications
    of creating AI prompts, the responsibility of creators and users, and best practices
    for ensuring that AI is responsibly used, transparently, and in a way that serves
    society.
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能技术的不断进步并嵌入到我们生活的各个方面，伦理考量正成为其设计、开发和部署中越来越重要的部分。在人工智能提示工程的情况下，伦理问题可能以不同的形式出现——从用于训练人工智能模型的数据偏差，到在医疗保健、执法和客户支持等敏感领域应用人工智能的后果。本章将讨论创建人工智能提示的伦理影响、创作者和用户的责任，以及确保人工智能负责任、透明地使用并服务于社会的最佳实践。
- en: Understanding the Ethical Consequences of AI
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 理解人工智能的伦理后果
- en: AI is a strong tool that can be applied for good or evil, depending on how it
    is created and implemented. The ability of AI to either perpetuate current social
    biases or assist in reducing them is an essential area of emphasis for developers,
    users, and policymakers. As AI prompt engineers, it is necessary to understand
    that the manner in which prompts are designed may impact the AI’s output, which
    could ultimately influence decision-making processes, public perception, and even
    individual lives.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能是一个强大的工具，其应用可以是善也可以是恶，这取决于其创建和实施方式。人工智能要么持续加剧当前的社会偏见，要么帮助减少它们，这是开发人员、用户和政策制定者必须关注的重点领域。作为人工智能提示工程师，有必要理解提示的设计方式可能会影响人工智能的输出，这最终可能影响决策过程、公众认知，甚至个人生活。
- en: AI systems are no more ethical than the data to which they are trained, and
    if such data sets are biased or missing, the results generated by AI can continue
    harm or injustice. Moreover, AI prompts can unknowingly perpetuate damaging stereotypes
    or lead to disinformation. Due to these considerations, ethical AI prompt engineering
    must consider fairness, transparency, accountability, and privacy.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能系统在伦理上并不比它们所训练的数据更高级，如果这些数据集存在偏差或缺失，人工智能生成的结果可能会继续造成伤害或不公正。此外，人工智能提示可能无意中持续传播有害的刻板印象或导致错误信息。考虑到这些因素，伦理的人工智能提示工程必须考虑公平性、透明度、责任和隐私。
- en: Major Ethical Concerns in AI Prompt Engineering
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能提示工程中的主要伦理担忧
- en: 'Bias and Fairness: AI systems tend to be trained on large data sets that mirror
    historical trends, including societal biases. These biases may be reflected in
    AI outputs, reinforcing stereotypes or making discriminatory decisions based on
    gender, race, or socioeconomic status.'
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 偏见与公平性：人工智能系统往往是在反映历史趋势的大型数据集上训练的，包括社会偏见。这些偏见可能会反映在人工智能的输出中，强化刻板印象或基于性别、种族或社会经济地位做出歧视性决策。
- en: 'Example: An example question intended to analyze job candidates might unintentionally
    discriminate against female candidates compared to male candidates if the data
    upon which the AI was trained contains historical gender-based biases in hiring.'
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 例子：一个旨在分析求职者的示例问题可能会无意中歧视女性候选人，与男性候选人相比，如果训练人工智能的数据包含历史上基于性别在招聘中的偏见。
- en: 'Best Practice: To reduce bias, engineers should thoroughly check the training
    data for indications of imbalance and strive to develop diverse, representative
    datasets. It’s also essential to test the outputs of the AI for fairness and fine-tune
    the prompts to provide fair treatment of all groups.'
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳实践：为了减少偏见，工程师应彻底检查训练数据中的不平衡迹象，并努力开发多样化、代表性的数据集。测试人工智能的输出以确保公平性，并微调提示以对所有群体提供公平待遇也是至关重要的。
- en: 'Transparency and Accountability: Transparency in AI decision-making is essential,
    especially in high-stakes domains such as healthcare, criminal justice, and finance.
    When making recommendations or predictions using AI, it’s essential to know how
    the AI reached its conclusions and be able to clearly explain those decisions
    to stakeholders.'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 透明度和问责制：在人工智能决策中保持透明度至关重要，尤其是在医疗保健、刑事司法和金融等高风险领域。当使用人工智能进行推荐或预测时，了解人工智能如何得出结论，并能够向利益相关者清楚地解释这些决策是至关重要的。
- en: For instance, if artificial intelligence is being utilized to come to medical
    diagnoses, the reasoning employed by the artificial intelligence must be made
    clear to physicians so they can check and validate the conclusions and explain
    it to patients.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果人工智能被用于医疗诊断，人工智能所采用的推理必须向医生明确，以便他们可以检查和验证结论并向患者解释。
- en: 'Best Practice: Promote the use of explainable AI models and insert explicit,
    detailed prompt specifications that instruct the AI to offer explanations of its
    suggestions or predictions. This makes sure the user is able to trust the decisions
    of the AI and comprehend the rationale for those decisions.'
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳实践：推广使用可解释的人工智能模型，并插入明确的、详细的提示规范，指导人工智能提供其建议或预测的解释。这确保用户能够信任人工智能的决策并理解这些决策的理由。
- en: 'Privacy and Data Protection: Privacy is a core ethical issue when developing
    AI prompts, particularly when handling personal or sensitive information. AI models
    can inadvertently reveal sensitive information or introduce vulnerabilities that
    can be used for malicious intent.'
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 隐私和数据保护：在开发人工智能提示时，隐私是一个核心的伦理问题，尤其是在处理个人信息或敏感信息时。人工智能模型可能会无意中透露敏感信息或引入可能被用于恶意目的的漏洞。
- en: 'Example: A question created to examine customer preferences could unknowingly
    reveal sensitive information such as email addresses, shopping history, or personal
    identifiers unless proper precautions are taken.'
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 例子：一个旨在检验客户偏好的问题可能会无意中透露敏感信息，如电子邮件地址、购物历史或个人标识符，除非采取适当的预防措施。
- en: 'Best Practice: When creating prompts, data privacy guidelines should be adhered
    to. Don’t gather more personal information than is needed, anonymize sensitive
    information whenever it is possible to do so, and keep all data securely stored
    and processed. Prompt engineers must also have knowledge of data protection laws
    like GDPR and HIPAA.'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳实践：在创建提示时，应遵守数据隐私指南。不要收集比所需更多的个人信息，在可能的情况下匿名化敏感信息，并确保所有数据都安全存储和处理。提示工程师还必须了解数据保护法律，如GDPR和HIPAA。
- en: 'Manipulation and Disinformation: AI can be used to propagate disinformation,
    manipulate opinion, or sway people’s choices for unethical purposes. A poorly
    formulated prompt might create biased or deceptive content, particularly in the
    realm of news, advertisement, and political communication.'
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 操纵和虚假信息：人工智能可以用来传播虚假信息、操纵观点或为了不道德的目的影响人们的选择。一个表述不当的提示可能会产生有偏见或误导性的内容，尤其是在新闻、广告和政治沟通领域。
- en: For instance, an AI prompt that automatically creates news headlines for an
    internet media platform may accidentally lean towards sensationalized or distorted
    stories, giving rise to fabricated news.
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个为互联网媒体平台自动创建新闻标题的AI提示可能会无意中偏向耸人听闻或扭曲的故事，从而产生虚假新闻。
- en: 'Best Practice: Make sure that prompts are created to produce well-balanced,
    fact-based content. AI must be designed not to create content that can easily
    be misinterpreted, misleading, or created to manipulate opinions.'
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳实践：确保创建的提示能够生成平衡、基于事实的内容。AI的设计必须避免生成容易被误解、误导或用于操纵观点的内容。
- en: 'Autonomy and Human Judgment: AI should complement human decision-making, not
    entirely replace it. Although AI is capable of automating processes and tasks,
    it must never be employed to make decisions with significant implications without
    human monitoring. The purpose of prompt engineers is to make AI systems support
    human judgment and enable review in case it’s needed.'
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 自主性和人类判断：AI应补充人类决策，而不是完全取代它。尽管AI能够自动化流程和任务，但它绝不能在没有人类监控的情况下用于做出具有重大影响的决定。提示工程师的目的是使AI系统支持人类判断，并在需要时允许进行审查。
- en: 'Example: Relying on AI in making life-changing choices, like medical treatments
    or legal rulings, without human intervention may result in cataclysmic outcomes.'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：在没有人类干预的情况下，依赖AI做出改变生活的选择，如医疗治疗或法律裁决，可能会导致灾难性的后果。
- en: 'Best Practice: Design prompts that involve a “human-in-the-loop” strategy,
    where humans can intervene or override AI-generated results when needed. This
    guarantees that AI is utilized responsibly and that people have control over significant
    decisions.'
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳实践：设计涉及“人类在回路”策略的提示，当需要时，人类可以干预或覆盖AI生成的结果。这保证了AI的负责任使用，并且人们能够控制重大决策。
- en: Best Practices in Ethical AI Prompt Engineering
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 道德AI提示工程的最佳实践
- en: 'Incorporate Fairness and Inclusivity: While creating prompts, one needs to
    consider the various backgrounds, views, and requirements of multiple user groups.
    Prompts should be framed such that they encourage inclusivity and fairness and
    do not reinforce negative stereotypes or marginalize specific groups.'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 融入公平性和包容性：在创建提示时，需要考虑多个用户群体的各种背景、观点和需求。提示应构建得鼓励包容性和公平性，不强化负面刻板印象或边缘化特定群体。
- en: 'Example: While developing prompts for a healthcare AI system, make sure that
    the data and language employed are representative of the diverse requirements
    of different populations, such as different ethnicities, genders, and age groups.'
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：在开发医疗AI系统的提示时，确保使用的数据和语言能够代表不同人群的多样化需求，例如不同的民族、性别和年龄群体。
- en: 'Encourage Explainability and Transparency: Design prompts so that AI outputs
    are explainable and transparent. When AI is employed for making decisions, users
    should be able to comprehend the rationale behind the outcome. Transparency helps
    to build trust and confidence in AI systems.'
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 鼓励可解释性和透明度：设计提示，使AI的输出可解释和透明。当AI用于做出决策时，用户应该能够理解结果背后的理由。透明度有助于建立对AI系统的信任和信心。
- en: 'Example: For a legal AI tool that helps predict court case outcomes, prompts
    should ensure that the AI provides clear, understandable explanations for how
    it arrived at a particular conclusion.'
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：对于帮助预测法庭案件结果的AI工具，提示应确保AI提供清晰、易懂的解释，说明它是如何得出特定结论的。
- en: 'Engage in Continuous Monitoring and Auditing: Ethical AI prompt engineering
    is an ongoing process. Regularly audit the AI’s performance and outputs to ensure
    that biases are not creeping into the system. Continuously refine prompts to improve
    fairness, accuracy, and transparency.'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 进行持续监控和审计：道德AI提示工程是一个持续的过程。定期审计AI的表现和输出，以确保偏见不会渗透到系统中。持续优化提示，以提高公平性、准确性和透明度。
- en: 'Example: Perform regular audits of an AI system employed in recruitment to
    confirm that the algorithm still makes selections in a fair and unbiased manner,
    particularly when new data are added.'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：对用于招聘的AI系统进行定期审计，以确认算法在添加新数据后仍然以公平和无偏见的方式进行选择。
- en: 'Prioritize User Privacy: Always prioritize user privacy when designing prompts,
    especially when handling sensitive data. Ensure that AI systems comply with data
    privacy laws and regulations, and make sure that users’ personal information is
    protected from misuse.'
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 优先考虑用户隐私：在设计提示时始终优先考虑用户隐私，尤其是在处理敏感数据时。确保人工智能系统遵守数据隐私法律法规，并确保用户的个人信息免受滥用。
- en: 'Example: For a healthcare-related AI product, make sure that any questions
    used to collect medical data adhere to privacy regulations like HIPAA in the U.S.
    or GDPR in Europe.'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：对于与医疗相关的AI产品，确保用于收集医疗数据的任何问题都遵守美国HIPAA或欧洲GDPR等隐私法规。
- en: 'Ensure Ethical Use Cases: Lastly, it’s crucial to ensure that AI is utilized
    ethically for good and useful purposes. Do not use AI prompts for malicious or
    nefarious purposes, including generating fake news, deepfakes, or manipulating
    vulnerable groups.'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 确保道德用例：最后，确保人工智能被用于善良和有用的目的至关重要。不要将人工智能提示用于恶意或非法目的，包括生成虚假新闻、深度伪造或操纵易受伤害的群体。
- en: 'Example: A chatbot prompt should aim to give useful and empathetic feedback,
    not to be employed in getting people to buy things they don’t require.'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：聊天机器人提示应旨在提供有用和同理心的反馈，而不是用于让人们购买他们不需要的东西。
- en: 'Case Studies: Ethical Pitfalls in AI Prompt Engineering'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究：AI 提示工程中的伦理陷阱
- en: 'Facial Recognition and Bias: A facial recognition system applied by law enforcement
    was discovered to be biased, disproportionately misidentifying people from minority
    ethnic groups. The problem resulted from biased training data and badly designed
    prompts that did not incorporate diversity in the datasets. Consequently, the
    system discriminated against specific communities. Upon solving the bias and reworking
    the prompts, the system became more accurate and fair.'
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 面部识别和偏见：执法部门应用的面部识别系统被发现存在偏见，不成比例地错误识别了少数族裔群体的人。这个问题源于有偏见的训练数据和设计不佳的提示，这些提示没有在数据集中体现多样性。因此，该系统对特定社区进行了歧视。在解决偏见并重新设计提示后，该系统变得更加准确和公平。
- en: 'AI in Recruitment: An AI recruitment system was developed to help hiring managers
    sift through job applications. But the AI inadvertently had a bias, favoring male
    applicants based on the training data it had been exposed to, which was historically
    male-skewed. By reworking the training data and rephrasing the prompts to emphasize
    skills over demographic attributes, the firm was able to reduce this bias and
    develop a more equitable and inclusive recruitment process.'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: AI在招聘中的应用：开发了一个AI招聘系统，帮助招聘经理筛选工作申请。但该AI无意中存在偏见，基于其接触到的历史上有性别偏见的训练数据，偏爱男性申请人。通过重新设计训练数据和重新措辞提示，强调技能而非人口统计属性，公司能够减少这种偏见，并开发出更公平和包容的招聘流程。
- en: 'Misinformation in News: An AI tool designed to write news headlines inadvertently
    generated clickbait headlines that were misleading and sensationalized. To address
    this, the team behind the AI system adjusted the prompts to include fact-checking
    steps and guidelines to ensure the headlines reflected the true nature of the
    news, fostering more responsible journalism.'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 新闻中的错误信息：一个旨在撰写新闻标题的人工智能工具意外地生成了误导性和耸人听闻的点击诱饵标题。为了解决这个问题，AI系统背后的团队调整了提示，包括事实核查步骤和指南，以确保标题反映了新闻的真实性质，从而促进更负责任的新闻业。
- en: Conclusion
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Ethical AI prompt engineering is a critical part of designing trustworthy, fair,
    and responsible AI systems. With the growing influence of AI on industries and
    societies, prompt engineers will need to keep fairness, transparency, and user
    privacy top of mind. Through consideration of potential biases, encouraging explainability,
    and promoting accountability, AI can be applied to improve lives for all. Ethical
    considerations should drive AI development, and engineers should be directed to
    develop systems that are innovative as well as socially responsible. With the
    technology only continuing to advance, ethical AI will be the foundation of trust
    in AI-based systems and applications.
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 道德AI提示工程是设计可信赖、公平和负责任的人工智能系统的关键部分。随着人工智能在行业和社会中的影响力日益增强，提示工程师需要将公平性、透明度和用户隐私放在首位。通过考虑潜在的偏见、鼓励可解释性和促进问责制，人工智能可以应用于改善所有人的生活。伦理考虑应驱动人工智能的发展，工程师应被指导开发既创新又负责任的人工智能系统。随着技术的持续进步，道德人工智能将是基于人工智能的系统和应用的基础。
- en: Final Thoughts
  id: totrans-621
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 最后的想法
- en: Throughout this book, we’ve delved into the exciting and dynamic realm of AI
    prompt engineering. From learning the basics of how prompts function, to crafting
    advanced and effective prompts for a range of applications, we’ve discussed important
    insights that will allow you to tap into the full potential of AI tools. As AI
    continues to advance, prompt engineering has emerged as an essential skill that
    closes the gap between human intention and machine output, providing endless opportunities
    for personal and professional application.
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 在整本书中，我们深入探讨了人工智能提示工程的激动人心和动态领域。从学习提示如何工作的基础知识，到为各种应用制作高级和有效的提示，我们讨论了重要的见解，这将使您能够充分利用人工智能工具的潜力。随着人工智能的不断发展，提示工程已成为弥合人类意图与机器输出之间差距的关键技能，为个人和职业应用提供了无限的机会。
- en: Key Insights and Takeaways
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 关键见解和收获
- en: 'The Power of Well-Crafted Prompts: The quality of your output from AI depends
    directly on the clarity, specificity, and structure of your prompts. A well-crafted
    prompt directs the AI to generate the most relevant and useful responses.'
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 精心制作的提示的力量：您从人工智能获得的输出质量直接取决于您提示的清晰度、具体性和结构。一个精心制作的提示将引导人工智能生成最相关和有用的响应。
- en: 'Customization Across Use Cases: Whether you’re using it for creative writing,
    technical support, marketing copy, or decision-making tools, learning how to customize
    prompts to your particular goals is the key to getting the most out of AI.'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 根据用例定制：无论您是用于创意写作、技术支持、营销文案还是决策工具，学习如何根据您的特定目标定制提示是充分利用人工智能的关键。
- en: 'Ethical Implications: The deeper we move into the integration of AI in society,
    the more important it is to be sensitive to ethical issues, including bias, fairness,
    transparency, and privacy. Effective prompt engineering is not only technical
    proficiency but also that AI contributes to the common good.'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 道德影响：随着我们越来越深入地将人工智能融入社会，对道德问题的敏感性变得越来越重要，包括偏见、公平性、透明度和隐私。有效的提示工程不仅需要技术熟练，还需要人工智能为公共利益做出贡献。
- en: 'The Continuous Learning Curve: AI is a fast-evolving domain. With new models,
    tools, and best practices continually emerging, prompt engineering will keep on
    changing. Ongoing experimentation, feedback, and adjusting to changes are imperative
    to remain ahead of AI developments.'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 持续的学习曲线：人工智能是一个快速发展的领域。随着新模型、工具和最佳实践的持续涌现，提示工程将持续变化。持续的实验、反馈和适应变化是保持领先于人工智能发展的必要条件。
- en: Conclusion on the Changing World of Prompt Engineering
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 对提示工程变化世界的总结
- en: Prompt engineering is no longer an esoteric skill only for data scientists or
    AI practitioners. It is an emerging field that is increasingly becoming a must-have
    for many industries. With the rise of AI continuing to shape the way we work,
    communicate, and produce, knowing how to design and optimize prompts effectively
    will be more valuable than ever. The possible uses of AI are limitless, and those
    who learn the skill of prompt engineering will be well-equipped to harness AI
    for innovation, efficiency, and solving problems in every industry.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程不再是只有数据科学家或人工智能从业者才能掌握的神秘技能。它是一个日益成为许多行业必备技能的新兴领域。随着人工智能的持续发展，塑造我们工作、沟通和生产的模式，了解如何有效地设计和优化提示将比以往任何时候都更有价值。人工智能的潜在用途是无限的，那些学习提示工程技能的人将能够充分利用人工智能进行创新、提高效率和解决各个行业的难题。
- en: Incentive towards Further Study and Exploration
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 鼓励进一步学习和探索
- en: This book has given you the building blocks to start your prompt engineering
    journey. But the AI universe is big and dynamic. I invite you to continue learning,
    try new prompts, and tweak your style. By continually experimenting and testing,
    you’ll learn new methods of leveraging the power of AI to realize your personal
    and professional aspirations. AI is a tool that captures human creativity and
    innovation—what you do with it is only limited by your imagination.
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 本书为您提供了开始提示工程之旅的基石。但人工智能宇宙庞大且动态。我邀请您继续学习，尝试新的提示，并调整您的风格。通过不断的实验和测试，您将学会利用人工智能的力量实现您个人和职业抱负的新方法。人工智能是一个捕捉人类创造力和创新精神的工具——您如何使用它仅限于您的想象力。
- en: Appendices
  id: totrans-632
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录
- en: Glossary of Key Terms in Prompt Engineering
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程中的关键术语词汇表
- en: 'Prompt: A particular input or command is provided to an AI model so that it
    can produce a response.'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：向人工智能模型提供特定的输入或命令，以便它能够产生响应。
- en: 'AI Model: A statistical model or a program that learns through data and predicts
    or outputs using input stimuli.'
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型：一种通过数据学习并通过输入刺激进行预测或输出的统计模型或程序。
- en: 'Natural Language Processing (NLP): A branch of AI that is concerned with computer-human
    language interaction and the processing of natural language by machines, enabling
    them to comprehend, analyze, and produce natural language.'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）：人工智能的一个分支，关注计算机与人类语言交互以及机器对自然语言的处理，使其能够理解、分析和生成自然语言。
- en: 'Bias: A systematic distortion in an AI model’s output that prefers some groups,
    outcomes, or viewpoints over others.'
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 偏见：AI模型输出中的一种系统性扭曲，偏好某些群体、结果或观点，而忽视其他群体、结果或观点。
- en: 'Explainability: The capacity to comprehend and explain the decision-making
    process of an AI model.'
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 可解释性：理解并解释AI模型决策过程的能力。
- en: 'Generative AI: A type of AI model that can create new content from the data
    they have been trained on.'
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI：一种可以从其训练数据中创建新内容的AI模型。
- en: 'SEO (Search Engine Optimization): The process of enhancing the visibility and
    ranking of web content in search engine results.'
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: SEO（搜索引擎优化）：提高网络内容在搜索引擎结果中可见性和排名的过程。
- en: 'Human-in-the-Loop: An AI deployment model in which human judgment and decision-making
    are incorporated into the process of AI, making it accountable and minimizing
    the possibility of errors.'
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: 人类在回路：一种AI部署模型，其中人类的判断和决策被纳入AI过程，使其负责并最小化错误的可能性。
- en: 'Fine-Tuning: The procedure of fine-tuning a pre-trained AI model to particular
    tasks or datasets to enhance its performance for a specific application.'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 微调：将预训练的AI模型微调到特定任务或数据集的过程，以提高其在特定应用中的性能。
- en: Templates and Examples for Effective Prompt Construction
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的提示构建模板和示例
- en: Basic Prompt Template for Text Generation
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 文本生成的基本提示模板
- en: 'Task: Create a piece of content (i.e., blog post, social media post).'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 任务：创建一篇内容（例如博客文章、社交媒体帖子）。
- en: 'Task: “Create a [type of content] on [topic] for [audience] with a [tone/style],
    including the following keywords: [keywords].”'
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 任务：“为[受众]创建一篇[类型的内容]，关于[主题]，以[风格]呈现，包括以下关键词：[关键词]。”
- en: 'Example: “Create a 300-word blog entry on the advantages of meditation, for
    busy professionals, in a soothing and motivational tone, and with keywords such
    as ‘stress reduction,’ ‘mental clarity,’ and ‘work-life balance.’”'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“创作一篇300字的博客文章，介绍冥想的优点，面向忙碌的专业人士，以舒缓且激励的语气，并包含关键词‘压力减轻’、‘精神清晰’和‘工作与生活平衡’。”
- en: Creative Writing Prompt Template
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 创意写作提示模板
- en: 'Objective: Write a short story or poem.'
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：写一个短篇故事或诗歌。
- en: 'Instructions: “Create a [genre of content] on [subject] when [specific event
    happens], utilizing [particular themes or moods], and integrating the following
    personality traits: [traits].”'
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 指示：“当[特定事件发生]时，创作一篇[内容类型]关于[主题]的文章，利用[特定主题或情绪]，并整合以下性格特征：[特征]。”
- en: 'Example: “Create a short story of a lost traveler who stumbles upon a secret
    city, creating feelings of awe and intrigue, with a curious and courageous protagonist.”'
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“创作一个关于一位迷失的旅行者偶然发现一座神秘城市的故事，激发敬畏和好奇，主角是一位好奇而勇敢的人物。”
- en: SEO-Optimized Blog Post Template
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: SEO优化博客文章模板
- en: 'Goal: Write a blog post optimized for SEO.'
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：撰写一篇针对SEO优化的博客文章。
- en: 'Instruction: “Write a [word count] blog post on [topic] with the following
    keywords included: [list of keywords]. Use subheadings to break up each section,
    include a call to action at the end, and ensure the content is informative and
    reader-friendly.”'
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 指示：“撰写一篇[字数]的博客文章，关于[主题]，包含以下关键词：[关键词列表]。使用副标题划分每个部分，在结尾处包含一个行动号召，并确保内容信息丰富且易于阅读。”
- en: 'Example: “Write a 1,000-word blog entry on ‘how to start a successful online
    business’ containing the keywords: ‘start an online business,’ ‘business ideas,’
    and ‘how to make money online.’”'
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“撰写一篇1000字的博客文章，主题为‘如何开始一家成功的在线业务’，包含关键词：‘开始在线业务’、‘商业想法’和‘如何在线赚钱’。”
- en: Marketing Copy Prompt Template
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 营销文案提示模板
- en: 'Objective: Create ad copy or promotional material.'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：创建广告文案或促销材料。
- en: 'Instruction: “Create a [type of content] for promoting [product/service] emphasizing
    [feature/benefit], written in a [tone], with a strong call to action.”'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 指示：“创建一篇[类型的内容]，用于推广[产品/服务]，强调[特性/好处]，以[语气]撰写，并包含强烈的行动号召。”
- en: 'Example: “Create a Facebook advertisement for our new coffee machine, highlighting
    its time-saving benefits and simplicity, in a friendly tone and with a call to
    action of ‘Order yours today!’”'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为我们的新咖啡机创建一个Facebook广告，突出其节省时间的优点和简便性，以友好的语气，并带有‘今天订购您的咖啡机！’的行动号召。”
- en: Social Media Post Template
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体帖子模板
- en: 'Objective: Write a compelling social media post.'
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：撰写一个引人入胜的社交媒体帖子。
- en: 'Instruction: “Create a [platform type] post on [topic] aimed at [audience]
    with a [CTA] and the following hashtags: [hashtags].”'
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 指示：“为[平台类型]创建一个针对[主题]的帖子，面向[受众]，包含[行动号召]和以下标签：[标签].”
- en: 'Example: “Create an Instagram post for our summer sale, aimed at young adults
    between the ages of 18-25, with a call to action to shop now, and including the
    hashtags #SummerSale #Discounts #ShopNow.”'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: '示例：“为我们的夏季促销活动创建一个Instagram帖子，针对18-25岁的年轻人，带有‘现在购物’的行动号召，并包含#SummerSale #Discounts
    #ShopNow标签。”'
- en: These resources and templates will provide a starting point to test various
    AI models, refine prompts, and generate high-quality, actionable content for a
    range of contexts.
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 这些资源和模板将为测试各种AI模型、细化提示和生成适用于各种情境的高质量、可操作内容提供一个起点。
- en: By using the strategies and best practices outlined in this book, you’ll be
    able to create more effective and ethical prompts for a variety of uses, from
    generating creative content to solving business problems and beyond. Continue
    to experiment, iterate, and learn as you tap into the enormous potential of AI
    in shaping the future of human-computer interaction.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: '通过使用本书中概述的策略和最佳实践，您将能够为各种用途创建更有效和道德的提示，从生成创意内容到解决商业问题等。在挖掘AI在塑造人机交互未来巨大潜力时，继续实验、迭代和学习。 '
