    sure to remove the “0” and “6” response rows for Q7 and the blank and “3” responses
    for Q22\. Perform a chi-squared test to ensure that the variables are dependent.
    Check the percentage approval using sum of the number of the “4” and “5” ratings.
    Note that we had to use a different online calculator for chi-squared statistic
    since we have more than five levels for one of the variables ([http://www.quantpsy.org/chisq/chisq.htm](http://www.quantpsy.org/chisq/chisq.htm)).
