  id: totrans-1545
  prefs: []
  type: TYPE_NORMAL
  zh: 图10.14 建立整体得分与子问题得分之间的多元线性回归的参数设置
- en: '![image](images/pg232.jpg)'
  id: totrans-1546
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg232.jpg)'
- en: FIGURE 10.15 Result of the linear regression model of some customer satisfaction
