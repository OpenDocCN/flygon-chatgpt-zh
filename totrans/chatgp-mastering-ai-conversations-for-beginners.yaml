  type: TYPE_NORMAL
  zh: '**心理健康**已经成为现代流行语之一，并且有很好的理由。根据国家心理健康研究所的研究，目前活着的五名成年人中就有一人患有中度到重度的心理健康状况（Giroglimo，2022）。疾病控制与预防中心发布的其他统计数据表明，超过一半的美国人将在他们的一生中经历并诊断出某种形式的心理健康状况（CDCP，2023）。但是，究竟什么是心理健康（或心理不健康）呢？'
