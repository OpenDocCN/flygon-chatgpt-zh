  type: TYPE_NORMAL
  zh: '**使用Seaborn的直方图**'
- en: Histograms are powerful tools for visualizing the distribution of data. Seaborn’s
    histplot() function provides a way to easily generate histograms with additional
    features like kernel density estimation.
  id: totrans-3174
