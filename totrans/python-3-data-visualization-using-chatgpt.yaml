- en: '[PRE143]'
  id: totrans-901
  prefs: []
  type: TYPE_PRE
  zh: '[PRE143]'
- en: '**NUMPY AND THE RESHAPE() METHOD**'
  id: totrans-902
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**NUMPY 和 RESHAPE() 方法**'
- en: NumPy arrays support the reshape() method, which allows you to restructure the
    dimensions of an array of numbers. In general, if a NumPy array contains m elements,
    where m is a positive integer, then that array can be restructured as an m1 x
    m2 NumPy array, where m1 and m2 are positive integers such that m1*m2 = m.
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 数组支持 reshape() 方法，允许您重新结构化数字数组的维度。一般来说，如果一个 NumPy 数组包含 m 个元素，其中 m 是一个正整数，那么该数组可以被重新结构化为一个
    m1 x m2 的 NumPy 数组，其中 m1 和 m2 是正整数，且满足 m1*m2 = m。
- en: '[Listing 2.17](#list2-17) displays the content of numpy_reshape.py that illustrates
    how to use the reshape() method on a NumPy array.'
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 2.17](#list2-17) 展示了 numpy_reshape.py 的内容，该内容说明了如何在 NumPy 数组上使用 reshape()
    方法。'
- en: '***LISTING 2.17: numpy_reshape.py***'
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: '***列表 2.17: numpy_reshape.py***'
