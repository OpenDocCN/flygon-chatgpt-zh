- en: Chapter I
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to ChatGPT and AI
  prefs: []
  type: TYPE_NORMAL
- en: 1.1\. What is ChatGPT?
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT was launched in November 2022 and quickly captured worldwide attention,
    reaching 10 million daily active users in its first month. Never before has a
    technology been adopted so quickly. This growth, ten times faster than that of
    platforms such as Instagram or Google, marked a before and after in the history
    of technology.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is revolutionary because it is an advanced Artificial Intelligence (AI)
    model capable of understanding and generating human language coherently and contextually.
    Unlike other systems designed for specific tasks, ChatGPT adapts to various applications,
    from answering technical questions to creating creative content. This paradigm
    shift represents a breakthrough in AI, enabling more natural interactions between
    humans and machines. However, it also means that we must learn how to interact
    with these models to use them properly, which can be challenging for some people.
  prefs: []
  type: TYPE_NORMAL
- en: This book has been created to take you into the fascinating world of ChatGPT.
    You will discover how this tool can change how you communicate, work, and solve
    problems. Throughout these pages, we will break down from the most basic concepts
    of this technology to its most advanced applications, showing you how you can
    take advantage of it whether you are a student, an entrepreneur, or just someone
    who wants to be more efficient in your day-to-day life. We'll dive into prompts
    engineering, explore practical and advanced uses, and even share case studies
    to inspire you. This book is a complete guide to mastering ChatGPT and maximizing
    its potential. Get ready to discover how this revolutionary technology can become
    part of your daily life, transforming it in ways you haven't yet imagined.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can carry on conversations and provide coherent answers on various topics,
    from science and technology to literature and philosophy. Its ability to learn
    from context and follow the conversation thread makes it valuable and versatile.
  prefs: []
  type: TYPE_NORMAL
- en: 'To understand how we got here, it is essential to know the context and history
    of this technology. Let''s start: ChatGPT was developed by the company OpenAI.
    This technology is based on Natural Language Processing (NLP), a branch of AI
    that has been growing for several decades. AI, in turn, is a discipline of computer
    engineering whose main objective is to get computers to perform tasks that usually
    require human intelligence. The main objective of NLP is to help computers understand,
    interpret, and generate human language effectively. In other words, it is about
    teaching machines to understand and use the language we humans use to communicate
    with each other.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is crucial because most of the information in the world is in human language,
    whether in books, articles, or social networks. Now, imagine a future in which
    machines not only understand what we say but also can reason in ways that we,
    as humans, can only dream of. It would not simply be a matter of using AI for
    quick searches or machine translations (uses that already exist today) but something
    much more profound: a time when AI could become so advanced in its reasoning that
    it discovers solutions to problems that now seem impossible to solve.'
  prefs: []
  type: TYPE_NORMAL
- en: Could we, for example, see cures for diseases we have considered incurable or
    discover innovations that today seem like science fiction? This future, which
    may sound utopian or even dystopian, is closer than we imagine. In this book,
    we will explore how AI, and ChatGPT in particular, could be one of the tools that
    guides us towards this new horizon of possibilities.
  prefs: []
  type: TYPE_NORMAL
- en: 1.2. The workings behind ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is a Large Language Model (LLM). Stay with these acronyms because they
    will appear throughout this book. A model (computer model, not the flesh-and-blood
    kind) is a program or software that allows us to predict a specific event. For
    example, we use the climate model to know what the weather will be like in the
    next few days to anticipate it. A language model is similar, but instead of predicting
    the weather, it predicts the next word most likely to appear in a sentence, depending
    on the context.
  prefs: []
  type: TYPE_NORMAL
- en: Think of an LLM as a tool that allows a machine to understand human language.
    In addition, an LLM does not just look for the meaning of each word but also tries
    to understand how they relate to each other to capture the whole meaning of a
    sentence or text.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are many LLMs, each with its characteristics and peculiarities. One of
    them is GPT, which you are probably familiar with. But... have you ever wondered
    what GPT means? It comes from "Generative Pre-trained Transformer". Let''s break
    it down:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Generative: It is an AI capable of creating or generating something new. In
    this case, it can create text, images, and audio. The video is probably not far
    away.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Pre-trained: GPT is already trained with a large amount of data before use.
    Let''s say it is "ready to use" without the need to perform any additional tasks.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Transformer: This is the type of neural network used.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Like the human brain, a neural network can learn from the information it processes
    and, over time, improve its ability to process information. This means that ChatGPT
    can understand human natural language and, from that understanding, generate coherent
    responses.
  prefs: []
  type: TYPE_NORMAL
- en: 'I''m pretty sure you''ve used those customer service chat rooms on websites:
    those frustrating systems where you rarely got a solution to what you needed due
    to their limited capabilities. These old chats worked differently; instead of
    understanding the context of what you were asking, they relied on keywords to
    provide predefined answers. As a result, they mainly offered answers that had
    nothing to do with what you were looking for.'
  prefs: []
  type: TYPE_NORMAL
- en: Unlike them, ChatGPT, instead of relying on keywords, can analyze the meaning
    of a whole sentence or even a set of sentences and, based on that, give you a
    more accurate and detailed answer. In other words, ChatGPT can better "understand"
    what you are asking it, which means it is less likely to give you irrelevant or
    generic answers, like the old chats.
  prefs: []
  type: TYPE_NORMAL
- en: 1.3.From GPT-1 to OpenAI o1 and beyond
  prefs: []
  type: TYPE_NORMAL
- en: To properly understand ChatGPT and how it works, discussing the different models
    that bring it to life is essential. The models presented below are ordered chronologically,
    from the first GPT in 2018 to OpenAI o1 in September 2024\. OpenAI o1 is the first
    model optimized explicitly for executing complex real-time operations, including
    mathematical computations and advanced data processing.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-1
  prefs: []
  type: TYPE_NORMAL
- en: 'In 2018, OpenAI presented its first language model, GPT. Its primary purpose
    was modest but ambitious: to predict the next word in a sentence accurately and
    rigorously. Although this model''s utility was limited, it laid the groundwork
    for what would come. We could say that it was an early demonstration of the power
    of transformer-based language models.'
  prefs: []
  type: TYPE_NORMAL
- en: GPT-2
  prefs: []
  type: TYPE_NORMAL
- en: A year later, in 2019, came GPT-2, an improved version. With an even more significant
    amount of data and a much larger model, it was no longer limited to predicting
    individual words but could generate complete sentences fluently. In just one year,
    this technology had made a breakthrough in natural language generation and response
    consistency. This model had 1.5 billion parameters, and the results began approaching
    a more natural language, although there was still some way to go.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: The parameters refer to the connections between the different layers
    of the neural network. The greater the number of parameters, the greater the complexity
    of the network and, in principle, the better the model''s performance.'
  prefs: []
  type: TYPE_NORMAL
- en: GPT-3
  prefs: []
  type: TYPE_NORMAL
- en: In 2020, OpenAI achieved a groundbreaking milestone with the introduction of
    GPT-3, a model that redefined the landscape of artificial intelligence. This innovative
    model represented a significant evolution in AI technology, boasting an impressive
    architecture with 175 billion parameters. This vast scale allowed GPT-3 to generate
    remarkably high-quality text, far surpassing its predecessors.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-3's capabilities extended beyond traditional text generation. It demonstrated
    what are known as "emergent skills," meaning that the model could perform a wide
    array of complex tasks that were not specifically programmed into it. For instance,
    while it was initially trained to predict the next word in a sentence, GPT-3 soon
    showcased its ability to translate languages, answer diverse questions, and even
    write cohesive and contextually relevant code.
  prefs: []
  type: TYPE_NORMAL
- en: This remarkable versatility highlighted a transformative shift in AI, marking
    a pivotal moment in its evolution. The launch of GPT-3 not only raised the bar
    for what AI could achieve but also set the stage for future advancements, fundamentally
    altering the trajectory of research and applications in the field. This milestone
    is now recognized as a turning point in the history of artificial intelligence,
    signaling a new era of capabilities and potential.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-3.5
  prefs: []
  type: TYPE_NORMAL
- en: Released by OpenAI in June 2021, GPT-3.5 represented a significant improvement
    over GPT-3 with notable advances. Its training with varied data sets, including
    text and code, improved its ability to handle more complex language tasks. This
    training approach enabled GPT-3.5 to understand context better, produce more coherent
    responses, and generate longer content, with fewer problems related to inaccuracies
    or "hallucinations" (when the model generates incorrect or nonsensical information)
    than GPT-3.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-3.5 included several versions of the model, some of which showed improved
    accuracy in tracking user intent. In addition, the GPT-3.5 architecture enabled
    the generation of more extended text outputs. It showed better handling of complex
    tasks, such as responding to more intricate prompts in creative writing or assisting
    in programming.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: 'Launched in November 2022, ChatGPT was more than just a technological novelty:
    it became an unprecedented phenomenon. Its adoption increased staggeringly in
    days, making it the fastest-growing application in human history. Suddenly, millions
    worldwide interacted with the system, testing its ability to carry on fluid conversations,
    answer questions, and perform tasks of all kinds. It was a genuine phenomenon
    that shook the technological sphere and how society understands and uses AI.'
  prefs: []
  type: TYPE_NORMAL
- en: For a large part of the population, the AI era began with the launch of ChatGPT.
    This is not entirely correct. As we have seen, OpenAI's GPT-series language models
    have been around since 2018, and the beginnings of AI date back to the 1950s.
  prefs: []
  type: TYPE_NORMAL
- en: Although it is easy to confuse ChatGPT with the language models on which it
    is based, such as GPT-3 or GPT-4, ChatGPT is not a model per se but a conversational
    interface that allows the everyday user to interact fluidly and naturally with
    these models. Its goal is to democratize the interaction with these Large Language
    Models  (LLMs), simulating a conversation instead of just generating text in isolation.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT provides context to each response through this personalization layer,
    maintains the conversation thread, answers questions, and allows users to feel
    they are in dialogue with the AI. We will go deeper into how this technology works
    later, but it is essential to remember that the GPT models are in charge of generating
    the content. At the same time, ChatGPT is the tool that allows us to interact
    with them conversationally and straightforwardly, providing an easy-to-use interface
    that removes the technical complexity of the models and facilitates the experience
    for users without advanced knowledge in AI.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-4
  prefs: []
  type: TYPE_NORMAL
- en: GPT -4 was released on March 14, 2023\. ChatGPT had been available for under
    four months when this major upgrade arrived. GPT-4 substantially improved GPT-3.5,
    especially in reasoning, factual accuracy, and handling longer and more complex
    prompts. This model demonstrated a more remarkable ability to understand context
    and generate well-structured, high-quality responses, positioning itself as the
    flagship in the OpenAI model series for months to come.
  prefs: []
  type: TYPE_NORMAL
- en: Until then, the only advantage ChatGPT Plus users had was access during peak
    demand, i.e., periods of high usage when many users were trying to access simultaneously.
    Yes, during the first few months of its life, ChatGPT experienced constant downtime
    due to the high and unplanned volume of users. If you paid the subscription, you
    could log in even when the system was down, but little else.
  prefs: []
  type: TYPE_NORMAL
- en: 'The upgrade to GPT-4 provided compelling reasons to subscribe to this service.
    GPT-4 can solve complex problems more accurately, thanks to its broad general
    knowledge and problem-solving skills. It is the most creative and collaborative
    model to date. Here are some of the key advantages this model brought over its
    predecessor:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Multimodality: GPT-4 processes not only text but also images and audio, which
    means that it can understand and respond to different types of content. This capability
    allows the model to recognize objects in images, listen to and generate audio,
    and respond more completely and naturally. In other words, multimodality makes
    GPT-4 a much more versatile tool, bringing human-machine interaction closer to
    communication similar to the one we have between people.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Internet connection: GPT-4 can access real-time information over the Internet,
    which means it is no longer limited by a fixed set of knowledge (a significant
    limitation of GPT-3.5). This connection allows it to search for up-to-date data
    and provide more accurate answers, improving its usefulness in recent news queries,
    sports scores, or any research that requires fresh information. This has improved
    its usefulness for queries requiring updated data, such as news, recent research,
    or details of current trends and events.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Expanded context window: Thanks to a significantly larger context window than
    GPT-3.5, GPT-4 was able to process a larger amount of text, both in each interaction
    and in the total conversation. This allowed it to handle longer and more complex
    discussions, have greater context in extended communications and work with longer
    documents.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Greater precision and control in response generation: With GPT-4, the tone
    and style adjustment mechanisms were improved, providing responses that better
    matched the context and the user''s needs. In addition, it could distinguish between
    different levels of formality and adapt the content according to the instructions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Reduction of errors and hallucinations: GPT-4''s ability to recognize and avoid
    mistakes or "hallucinations" (when the model generates incorrect or made-up information)
    was optimized. Although imperfect, it was much less prone to provide false data
    than its predecessor, GPT-3.5, making it more reliable in critical applications.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Improved understanding of complex instructions: GPT-4 excels at understanding
    and executing detailed, multi-step instructions, making it well-suited for complex
    tasks like programming and report generation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Integration with external tools: Although it relied on tools such as Whisper
    and DALL-E for specific functions, GPT-4 was better integrated with these tools,
    facilitating a smoother workflow. This expanded its versatility and allowed it
    to offer a broader range of services within a single platform.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These improvements made GPT-4 a much more robust and versatile model than GPT-3.5,
    expanding its capabilities and making it ideal for a broader range of applications.
    To conclude this section, let's look at an official comparison of GPT-4 and GPT-3.5\.
    OpenAI evaluated both language models by performing different tests, including
    simulations of tests designed for humans. The results of these tests are shown
    in Figure 1, which compares the performance of both models.
  prefs: []
  type: TYPE_NORMAL
- en: '![A graph with green and blue bars  Description automatically generated](image_rsrc3PG.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 1\. Results in different tests GPT-3.5 vs GPT-4\. Source: OpenAI'
  prefs: []
  type: TYPE_NORMAL
- en: 'The graph shows a fascinating reality: GPT-4 excels in numerous areas where
    its predecessor, GPT-3.5, failed to excel. This shows us that GPT-4 is not simply
    an improved version of GPT-3.5 but has outperformed its predecessor in various
    fields, thus expanding its usefulness and applicability.'
  prefs: []
  type: TYPE_NORMAL
- en: GPT-4o
  prefs: []
  type: TYPE_NORMAL
- en: At the beginning of 2024, rumors circulated within the AI community suggesting
    that OpenAI was not training GPT-5\. As the year progressed, expectations for
    releasing a new model diminished. However, in a characteristic move that surprised
    many, OpenAI announced a new model to be unveiled at their upcoming presentation.
    This model is designated GPT-4o, where the "o" stands for "Omni." This latest
    iteration signifies a significant advancement, as it can simultaneously generate
    and comprehend text, images, and audio. This multimodal capacity indicates that
    it can even process video content.
  prefs: []
  type: TYPE_NORMAL
- en: Although the video functionality is integrated into this native version of GPT-4o,
    it is essential to note that this feature is currently unavailable to users, with
    a promise of future release. Users familiar with the ChatGPT Plus version might
    reminisce about the capabilities of GPT-4, which could dictate responses, read
    answers aloud, and generate images. While these functionalities hold, the key
    distinction lies in the underlying operations that support GPT-4o.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike its predecessor, GPT-4, which relied on external tools and systems for
    handling non-text formats, GPT-4o features an inherent ability to understand audio,
    images, and videos directly without requiring any conversion. Traditional models
    would convert audio to text or use other means to process different data types.
    In contrast, GPT-4o's "native" comprehension allows it to engage with various
    inputs in their original formats, significantly enhancing both speed and efficiency
    in generating responses. While GPT-4 depended on auxiliary systems to interpret
    formats beyond text, GPT-4o emerged as a comprehensive multimodal model fully
    equipped for the seamless processing of audio, images, and video.
  prefs: []
  type: TYPE_NORMAL
- en: This model offers practical applications for users. For instance, you can present
    ChatGPT with a photograph if you encounter issues adjusting the saddle on your
    bicycle, enabling it to diagnose the problem. Additionally, if you're unsure what
    to cook based on your pantry ingredients, sharing an image of what’s available
    in your fridge will allow the model to assist you in meal planning. Furthermore,
    GPT-4o can analyze complex graphs about work-related data, providing valuable
    insights.
  prefs: []
  type: TYPE_NORMAL
- en: For those wishing to narrow their focus on specific parts of an image, a drawing
    tool is available within the mobile app, allowing users to annotate or highlight
    interest areas, as illustrated in Figure 2.
  prefs: []
  type: TYPE_NORMAL
- en: '![A black tube on a bicycle  Description automatically generated](image_rsrc3PH.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2\. Example of the uploaded image to ChatGPT using the drawing tool
  prefs: []
  type: TYPE_NORMAL
- en: To initiate this multimodal interaction with ChatGPT, users can tap the camera
    button to capture an image or select a pre-existing one. If using an iOS or Android
    device, tapping the "+" button will suffice to begin. Users can also comment on
    multiple images or use the drawing tool to direct the model's attention appropriately.
  prefs: []
  type: TYPE_NORMAL
- en: Multimodal models such as GPT-4o leverage sophisticated linguistic reasoning
    to process various inputs, ranging from ordinary photographs and screenshots to
    documents that contain a mix of textual and visual elements. This capability represents
    a paradigm shift in how artificial intelligence can interact with and understand
    diverse forms of human communication.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI o1
  prefs: []
  type: TYPE_NORMAL
- en: 'Today, we have achieved developments in language models that were unthinkable
    a few years ago. ChatGPT was a real revolution worldwide, thanks to the GPT-3
    language model underpinning it. GPT-3 generated text with remarkable consistency,
    quickly, and relatively accurately. The arrival of GPT-4 represented a significant
    leap forward: it generated text faster, with greater accuracy, and better performance
    in complex tasks.'
  prefs: []
  type: TYPE_NORMAL
- en: However, there was a common problem with these models. When formulating a question,
    the models tended to provide an immediate answer without considering the complexity
    of the question. For example, questions such as "What is the capital of Spain?"
    are straightforward to answer. However, others, such as "How does the Heisenberg
    uncertainty principle affect our understanding of the behavior of subatomic particles
    in quantum physics?" require further analysis. Regardless of the complexity, the
    models offered immediate answers, often leading to errors due to lack of reflection.
  prefs: []
  type: TYPE_NORMAL
- en: Responding without thinking can lead to incorrect answers, especially in complex
    contexts.
  prefs: []
  type: TYPE_NORMAL
- en: This is where OpenAI o1 comes in. Although it is based on the same technology,
    this model differs from the GPT series in that it does not rush to give an immediate
    response. First, it processes our request, analyzes it, and studies the best response
    methods. This may not make much difference in trivial tasks, but it is a real
    revolution in the scientific field. This is the first release in a new series
    of models. OpenAI CEO Sam Altman stated that this model is equivalent to when
    GPT-2 was launched; there is still a long way to go.
  prefs: []
  type: TYPE_NORMAL
- en: Next, in Figure 2, a comparison between the GPT-4o, 01-preview (available to
    GPT Plus users), and o1 (soon to be available to paid subscribers) models is presented.
    This comparison measures performance on math, code, and Ph.D.-level science questions,
    respectively, from left to right.
  prefs: []
  type: TYPE_NORMAL
- en: '![A graph of different colored bars  Description automatically generated](image_rsrc3PJ.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2\. Tests to measure reasoning ability. Source: OpenAI'
  prefs: []
  type: TYPE_NORMAL
- en: 'Undoubtedly, this is a breakthrough. If mankind manages to develop a model
    capable of generating text but can also reason for itself and self-correct its
    reasoning, we could be closer to achieving superintelligence, Artificial General
    Intelligence (AGI). AI has been capable of playing games like chess or Go better
    than the best players worldwide for several years. This is possible because these
    systems can significantly anticipate future moves, analyzing infinitely more options
    than humans. OpenAI o1 represents the beginning of this type of intelligence applied
    to language. Imagining an AI with the ability to reason at superhuman levels raises
    fascinating questions: Could we cure cancer? Solve riddles of the universe? Eradicate
    global poverty? While these goals may seem distant, we are undoubtedly moving
    in that direction.'
  prefs: []
  type: TYPE_NORMAL
- en: GPT-5
  prefs: []
  type: TYPE_NORMAL
- en: The next OpenAI model is under development but has no official release date
    yet. It is expected to improve reasoning, reliability, and multimodal capabilities,
    including voice, image, and video, surpassing GPT-4\. Although Sam Altman has
    emphasized that there is still work to be done before release, it is rumored that
    significant internal progress has already been made. The release will likely be
    a paid version, following OpenAI's current monetization strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Don't want to miss out on any updates? Join our community and receive a weekly
    email in your inbox with the best news of this world and future updates of this
    book. You can't miss it!
  prefs: []
  type: TYPE_NORMAL
- en: '![A qr code in a circle  Description automatically generated](image_rsrc3PK.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3\. QR: Join our community'
  prefs: []
  type: TYPE_NORMAL
- en: 1.4\. Limitations
  prefs: []
  type: TYPE_NORMAL
- en: In the previous section, we saw the different OpenAI models and all their potential,
    but this does not mean they are free of limitations. Although they are becoming
    fewer and fewer, it is worth highlighting some of them. The following are the
    main ones.
  prefs: []
  type: TYPE_NORMAL
- en: Biases in training data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AI models, such as ChatGPT, learn from the data on which they are trained. If
    this data contains biases, the models will also remember them, replicating and
    amplifying them in their responses. This can result in discriminatory or biased
    results, as in the case of Amazon, which had to stop using a recruitment algorithm
    that showed a gender bias, penalizing CVs containing the word "female". To mitigate
    these biases, various techniques are applied, such as careful curation of training
    data, inclusion of more diverse data, and implementation of subsequent adjustments.
  prefs: []
  type: TYPE_NORMAL
- en: Confusion between fact and fiction (hallucinations)
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT- Language models like me often have a limitation known as "hallucinations".
    This occurs because our main function is to predict the next most likely word
    in a sentence, based on our training with large amounts of text (including both
    fact and fiction). By not "understanding" information as humans do and only replicating
    language patterns, we can generate answers that seem convincing, but are incorrect
    or made up. So, although we try to be accurate, we do not always adequately distinguish
    fact from fiction.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hallucinations are one of the most significant and most dangerous limitations
    of LLMs. To explain what they are, I decided to ask ChatGPT, and this is what
    it told us:'
  prefs: []
  type: TYPE_NORMAL
- en: Accuracy of bibliographic references
  prefs: []
  type: TYPE_NORMAL
- en: Although all ChatGPT users, including the free versions, now have access to
    the Internet, the bibliographic references are often inaccurate. The links provided
    may also be incorrect, lead to unrelated topics, or even result in broken links.
    Therefore, reviewing and verifying the information provided is essential to ensure
    its accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: Limitations in specialized tasks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatGPT may have difficulty performing particular and specialized tasks, mainly
    when dealing with highly complex technical or scientific language. While it can
    handle various general topics, its performance may be limited when faced with
    highly specialized terminology, scientific niche jargon, or areas where a deep
    understanding of the context is required. In these cases, the results may not
    be accurate, and it is crucial to have the intervention of a human expert to validate
    and adjust the information provided.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter II
  prefs: []
  type: TYPE_NORMAL
- en: Getting started with ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: 2.1\. Creating an account
  prefs: []
  type: TYPE_NORMAL
- en: 'Creating a ChatGPT account is a quick and easy process. Just follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Open your browser and visit [chat.openai.com](https://chat.openai.com/).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Click on "Subscribe": On the home page, click the " Subscribe " button. Don''t
    worry—it''s free.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Complete the registration form: Enter your email address and a password. You
    can also register with your Google or Microsoft account for speed and convenience.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Verify your email: OpenAI will send you a verification email. Open the email
    and follow the instructions to verify your account.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Login to your account: Once you have verified your email address, you can log
    in to your OpenAI account and access ChatGPT from the main menu.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Complete additional information: When you log in for the first time, you will
    be asked for your first and last name.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'SMS Verification: You must provide your phone number for SMS verification.
    Enter the code you receive.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: That's it! You can now access ChatGPT and start using it for various tasks.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once logged in, you will see the main screen, where you can type your query
    in the highlighted text box.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a chat  Description automatically generated](image_rsrc3PM.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Prompt - Explain to me how to cook a Spanish omelet, briefly, please.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, suppose you want to know how to cook a potato omelet. Type in
    the text box the following:'
  prefs: []
  type: TYPE_NORMAL
- en: After typing your query, press the Enter key or click the Submit button (arrow
    pointing up). Then, wait a few seconds while ChatGPT processes your request. Once
    completed, you will receive a response in the chat window.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT will provide you with an easy-to-follow answer that follows your instructions.
    If you have further questions about a topic, such as the process of cooking a Spanish
    omelet, you can continue to give instructions, and ChatGPT will continue to provide
    you with information.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2\. Frequently Asked Questions
  prefs: []
  type: TYPE_NORMAL
- en: Here are some basic questions that may help to clarify common doubts about the
    use of ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.1\. What is a prompt?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A prompt is an instruction you give the LLM to perform a task. It is like talking
    to it or writing down what you want it to do, similar to talking to an online
    person with a wealth of knowledge. Prompts can vary from a simple question to
    several sentences or a complete context, allowing us to generate more accurate
    answers. If we feed ChatGPT with the correct information, we can explore many
    possibilities and access knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: The quality of our inputs determines the quality of the responses. Providing
    detailed inputs allows the model to deliver more personalized responses tailored
    to our needs and expectations. The key to getting the most out of ChatGPT or other
    LLMs lies in the quality of our information.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let''s see the effectiveness of different levels of instruction with three
    examples:'
  prefs: []
  type: TYPE_NORMAL
- en: Basic Prompt - Write a short story
  prefs: []
  type: TYPE_NORMAL
- en: Prompt in some detail - Write a short story set in a medieval world, with a
    young adventurous hero.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt in more detail  - Write a short story of approximately 500 words, set
    in a medieval world, where a young hero named Aron, accompanied by his wolf, embarks
    on an adventure searching for a legendary sword, facing challenges and mystical
    creatures.
  prefs: []
  type: TYPE_NORMAL
- en: Use these prompts with ChatGPT, and you will notice that the first answer is
    general, while the last one, thanks to the details provided, offers an answer
    that is more in line with our needs.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.2\. Is ChatGPT available free of charge?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Yes! ChatGPT is free and can be used for writing, programming, learning new
    things, and much more. However, there is also a subscription option called ChatGPT
    Plus, which costs $20 per month.
  prefs: []
  type: TYPE_NORMAL
- en: 'With ChatGPT Plus, you get access to additional benefits such as:'
  prefs: []
  type: TYPE_NORMAL
- en: Priority access to the advanced OpenAI o1 and Canvas model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DALL-E 3 image generation tool.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The latest performance improvements and updates.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This paid option is ideal for those who want an even more complete and faster
    experience.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.3\. Is there a ChatGPT application?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Yes, there is an official ChatGPT app for iPhone and Android. It is important to
    download the official OpenAI app to avoid fake apps, as many apps that are not
    affiliated with OpenAI can be found in the Apple App Store and Google Play Store.
    In addition, both applications are completely free and have received good reviews.
    These are highly recommended if you want quick access to ChatGPT from your mobile.
    Plus, you can dictate to them.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, a ChatGPT application for macOS is also available. This application
    allows quick access to the chatbot with a keyboard shortcut. Initially, this Mac
    version was available only to ChatGPT Plus subscribers, but OpenAI has recently
    made it available to all users.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.4\. Is ChatGPT safe?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AI chatbots such as ChatGPT have raised concerns about their impact on human
    intelligence, misinformation, and privacy. Some fear that chatbots will replace
    human skills, such as essay writing, which has raised concerns about fraud in
    education. Initially, some schools blocked access to ChatGPT, but many have unblocked
    it, and some universities have even incorporated AI courses. Chatbots can also  spread
    misinformation. ChatGPT recommends verifying the information received, as their
    responses are not always accurate. OpenAI warns that the model can generate responses
    that appear credible but are incorrect.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, there are ethical concerns about the data used to train ChatGPT.
    OpenAI has collected data from the Internet without consent, which raises copyright
    issues. In addition, using user data to improve the model is questioned, although
    OpenAI allows you to disable the use of your data for training and chat history.
    If privacy is your primary concern, OpenAI offers data protection options. The
    debate over ethical concerns continues, and the rules surrounding the use of AI
    are likely to evolve.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.5\. Will my ChatGPT conversations be used for training?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By default, OpenAI uses the conversations to improve its technology. However,
    you can opt out of sharing your data for training. Click on the question mark
    in the bottom left corner, select Settings, and uncheck the "Enhance models for
    all" option.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.6\. Is ChatGPT detectable?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The short answer is yes. Tools attempt to detect texts generated by ChatGPT,
    but none offer completely reliable accuracy. Currently, there is no way to check
    100% whether a text has been written by ChatGPT using detection tools.
  prefs: []
  type: TYPE_NORMAL
- en: The most effective way to do this is to have experience using ChatGPT. Those
    who have worked extensively with this model can often identify specific patterns
    in the responses generated. For example, ChatGPT employs a somewhat impersonal
    and structured writing style. However, this assessment is subjective and depends
    greatly on the reader's perception, so it is not a foolproof method.
  prefs: []
  type: TYPE_NORMAL
- en: It should be noted that there is nothing wrong with using ChatGPT as a support
    tool to draft or polish a text, as long as the main ideas and content come from
    ourselves. ChatGPT can be an excellent complement to improve the clarity and accuracy
    of our writing, allowing us to maintain control over the message and style.
  prefs: []
  type: TYPE_NORMAL
- en: In short, although detection tools exist, none are entirely reliable. Ultimately,
    what matters is that we shape the content and maintain our original voice throughout
    the writing process.
  prefs: []
  type: TYPE_NORMAL
- en: 2.3\. Tips for writing good instructions
  prefs: []
  type: TYPE_NORMAL
- en: 'The quality of instruction is essential for quality results. By providing well-written
    instructions, conversations will be more rewarding and generate valuable information.
    To achieve this goal, it is recommended that the following aspects be considered
    when formulating our instructions:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Clarity: It is preferable to be clear and precise. Avoid using ambiguous language
    that may generate confusion.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Concise: Do not use unnecessary words; brief and concise instruction will facilitate
    understanding and improve the quality of the response.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Focus: Set a clear objective to be achieved and be as specific as possible
    in your instruction to keep the conversation focused.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Following these tips will make your interactions with ChatGPT more productive,
    allowing you to get better responses in every conversation.
  prefs: []
  type: TYPE_NORMAL
- en: The importance of context
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When interacting with ChatGPT, providing a clear and detailed context is essential.
    Although we may have a precise idea of what we want to achieve, the model may
    generate a vague or overly general response if we do not explain it enough. This
    may be sufficient for straightforward questions. However, context becomes crucial
    when addressing more complex issues, developing plans, or creating strategies.
  prefs: []
  type: TYPE_NORMAL
- en: The more detailed the context we provide to ChatGPT, the better it will understand
    and adapt to our needs, providing more accurate and helpful answers. Like a Google
    search, the more specific the information we provide, the more refined and relevant
    the results will be. ChatGPT needs the proper context to be truly effective in
    its responses.
  prefs: []
  type: TYPE_NORMAL
- en: The example below illustrates how the quality of the model's responses can vary
    depending on the quantity and quality of the context.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - How can I increase traffic to my website?
  prefs: []
  type: TYPE_NORMAL
- en: Answer without enough context - To increase traffic to your website, consider
    using SEO techniques to improve your search engine rankings and publish content
    on a regular basis.
  prefs: []
  type: TYPE_NORMAL
- en: 'Problem: While the answer is valid, it is too generic and may not be practical
    depending on the type of website, target audience or specific business objectives.'
  prefs: []
  type: TYPE_NORMAL
- en: Question to the model with additional context - I have an online sports accessories
    store and I want to increase traffic to my site. What specific strategies do you
    recommend?
  prefs: []
  type: TYPE_NORMAL
- en: Response with context - To increase traffic to your sports accessories online
    store, you might consider collaborating with sports influencers for reviews and
    mentions of your products. It is also effective to launch targeted PPC campaigns
    for search terms related to sports accessories. In addition, make sure your site
    is optimized for mobile and that product descriptions include SEO-relevant keywords.
  prefs: []
  type: TYPE_NORMAL
- en: 'Result: With more specific context about the type of business and target market,
    the model provides detailed and directly applicable suggestions that will likely
    be more effective for the user.'
  prefs: []
  type: TYPE_NORMAL
- en: This example shows how even a reasonable initial question can significantly
    benefit from additional detail, making the answer more targeted and valuable.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout the following chapters, we will continue to work on developing skills
    to create adequate instructions and make the most of this powerful tool.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter III
  prefs: []
  type: TYPE_NORMAL
- en: Basic uses of ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will dive into the most common uses of ChatGPT, exploring
    how this tool can simplify and enrich our daily lives. From generating texts and
    defining concepts to planning routines and discovering personalized recommendations,
    we will learn how to get the most out of the basic functionalities. In addition,
    we'll get into the basics of prompt engineering, where you'll discover key tips
    and strategies for interacting more effectively with ChatGPT. Finally, we'll explore
    Canvas functionality, a new addition that opens up even more possibilities. Get
    ready to discover how to use ChatGPT for everyday tasks and much more.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1\. What can we do with ChatGPT?
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT offers some basic functionalities that can be very useful. By understanding
    and generating human language coherently and contextually, this model opens up
    a world of possibilities. ChatGPT capabilities include text generation, question
    answering, information summarization, and language translation, among many others.
    In the following, we will explore these primary uses, which, although they may
    seem simple, are the foundation on which more complex and customized applications
    are built.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1.1.     Text generation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As mentioned in Chapter I, ChatGPT is a large language model (LLM), and one
    of its primary functions is text generation. This AI model understands and processes
    human language and uses it to create new and coherent text. When writing, ChatGPT
    considers the context of the conversation so that responses are appropriate to
    the request. For example, if it is provided with prior information on a specific
    topic, it can use those details to provide more personalized responses.
  prefs: []
  type: TYPE_NORMAL
- en: Generating text quickly and consistently is beneficial in various applications,
    from answering questions or writing e-mails to programming applications.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1.2.     Define terms
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Nowadays, when we encounter unfamiliar terms, ChatGPT offers us an effective
    alternative to online dictionaries or Google searches. This LLM provides definitions
    and contextualizes them to gain a deeper understanding. While ChatGPT is a powerful
    tool, it has limitations and can produce inaccurate answers. It is still a valuable
    resource for intuitively understanding any term. For example, if you're looking
    to understand what "bitcoin" is, instead of Googling and navigating through links
    and ads, you could use ChatGPT and get a straightforward answer.
  prefs: []
  type: TYPE_NORMAL
- en: Another advantage is that you can adjust the complexity of the definitions according
    to your needs, from technical explanations to simplified versions for a 10-year-old
    child. Let's look at some examples.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - What is quantum computing? Explain it briefly in technical terms.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT Response - Quantum computing is a field of computer science that uses
    the principles of quantum mechanics to process and store information. It uses
    quantum bits, or qubits, which can be in multiple states simultaneously, allowing
    calculations to be performed more efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt - Now explain it to a 10-year-old.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT - Quantum computing is like a superpower for computers. Regular computers
    use small blocks called "bits" to do calculations. But quantum computers use something
    called "qubits," like super bits that can be simultaneously in many positions.
    This makes quantum computers much faster.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI's LLM easily adapts to our needs, providing definitions with the level
    of detail and simplicity required, whether it's a technical explanation for experts
    or a simple analogy for beginners. We can also explore more creative approaches,
    such as asking ChatGPT to define a term, such as quantum computing, as a consonant
    rhyme, which we rarely find in a conventional web search.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt -
  prefs: []
  type: TYPE_NORMAL
