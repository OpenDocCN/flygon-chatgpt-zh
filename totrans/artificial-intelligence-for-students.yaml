  type: TYPE_NORMAL
  zh: 营养：剖析均衡饮食的基本原理。
- en: The fundamentals of the stock market's functioning and economic significance.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 股票市场运作的基本原理及其经济意义。
- en: Simplifying the definition and formation of black holes.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 简化黑洞的定义和形成。
- en: Describe the various forms of renewable energy and their advantages.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 描述各种可再生能源及其优势。
- en: The creation and development of the Internet is described in its history.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 在其历史中描述互联网的创建和发展。
- en: Recognizing how globalization affects cultures and economies.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到全球化如何影响文化和经济。
- en: 'Conclusion: Using ChatGPT to Break Down and Explain a Topic'
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: '**结论：使用ChatGPT分解和解释一个主题**。'
- en: It can be very beneficial to use ChatGPT to deconstruct and clarify difficult
    subjects.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT分解和阐明复杂主题是非常有益的。
- en: You can make a difficult subject approachable and relatable by identifying key
    ideas, dissecting them into smaller components, using examples and analogies,
    and participating in interactive learning.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 通过识别关键思想，将它们分解成更小的组成部分，使用例子和类比，以及参与互动学习，您可以使一个复杂主题变得易于接近和关联。
- en: Keep in mind that learning is a journey, and ChatGPT and other tools are available
    to help you along the way.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，学习是一个旅程，ChatGPT和其他工具可以帮助您在这个过程中。
- en: Have fun exploring!
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 享受探索的乐趣！
- en: 'chapter 7:'
  id: totrans-392
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**第七章**：'
- en: ChatGPT for Academic Writing and Research
  id: totrans-393
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT用于学术写作和研究
- en: Brainstorming Ideas for Essays and Projects**
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: '**论文和项目构思想法**'
- en: I have structured the best ChatGPT prompts for academic writing, researching,
    editing, and other purposes. The greatest advantage of these guidelines, in my
    opinion, is that they were all tested on real assignments.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经整理了最适合学术写作、研究、编辑和其他目的的ChatGPT提示词。在我看来，这些指南的最大优势是它们都在真实的作业中进行了测试。
- en: We still haven't discovered any new applications for ChatGPT in research, and
    I'm thrilled about this viewpoint.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还没有在研究方面发现ChatGPT的新应用，我对这个观点感到非常兴奋。
- en: initially
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: '**最初**。'
- en: Creating a Research Question Brainstorm
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: '**构思研究问题**。'
- en: A brief research question is the first step in any project, no matter how big.
    Before you can determine whether you have sufficient knowledge to finish the task,
    you must invent it. To have a choice, the majority of students and academic writers
    generate a dozen such topics and questions.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 简短的研究问题是任何项目的第一步，无论大小。在你确定你是否拥有完成任务的足够知识之前，你必须发明它。为了有选择，大多数学生和学术作家会生成一打这样的主题和问题。
- en: 'This is where ChatGPT can greatly simplify your life because it is:'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是ChatGPT可以极大地简化你的生活的地方，因为它：
- en: 'Efficient: ChatGPT works faster than any other brainstorming technique.'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 高效：ChatGPT比任何其他头脑风暴技术都要快。
- en: 'Objective: To a certain degree, of course, it is objective.'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 目标：在某种程度上，当然，这是客观的。
- en: 'Unemotional: If a subject is too complex or contentious, it never falters.'
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 不动情：如果一个主题过于复杂或具有争议性，它永远不会动摇。
- en: 'Diverse: Unlike you as a human, ChatGPT generates ideas from every possible
    point of view.'
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 多样性：与作为人类的你不同，ChatGPT从每个可能的角度生成想法。
- en: 'Self-improving: It refines its recommendations based on your input.'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 自我改进：它根据你的输入改进其建议。
- en: Three Chat GPT Questions to Assist in Developing a Research Question
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 三个Chat GPT问题以帮助发展研究问题
- en: The topic of my research paper is [insert your general topic, such as global
    warming]. List fifteen distinct research topics that I could cover in my paper.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 我的论文主题是[插入你的主题，例如全球变暖]。列出我在论文中可以涵盖的十五个不同的研究主题。
- en: I'm writing about the difference between [idea 1] and [ 2].  Please provide
    five possible research questions that will utilize a contrast and compare to it
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在撰写关于[想法1]和[2]之间差异的文章。请提供五个可能的研究问题，这些问题将利用对比和比较来探讨。
- en: '[State the question] is my research question. Make it more answerable and targeted
    in a 1000-word text.'
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: '[提出问题]是我的研究问题。在1000字的文本中使其更具可回答性和针对性。'
- en: Searching for Useful Sources
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找有用的来源
- en: You have selected the research question and topic.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经选择了研究问题和主题。
- en: 'The next action you must take is:'
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 你接下来必须采取的行动是：
- en: Find information from reliable publications.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 从可靠的出版物中寻找信息。
- en: At this point, ChatGPT is very beneficial since it offers all of the current
    viewpoints on the same issue. Although you are in charge of selecting the angle,
    at least you are aware of your options.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，ChatGPT非常有用，因为它提供了关于同一问题的所有当前观点。虽然你负责选择角度，但至少你知道你的选择。
- en: Additionally, it can recommend databases, journals, or websites that are relevant
    to your subject. You can always refine the question if you're not happy with the
    outcome. Unfortunately, the Google era is coming to an end.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，它还可以推荐与你主题相关的数据库、期刊或网站。如果你对结果不满意，你可以随时细化问题。不幸的是，谷歌时代即将结束。
- en: 'But:'
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 但是：
- en: Please remember that AI can only be trusted to a certain degree. Google (sorry,
    Google is still around) the statements and references you intend to use in your
    final text. Check Google Scholar for scholarly publications to ensure they are
    legitimate.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，AI只能在一定程度上被信任。在最终文本中使用你打算使用的陈述和参考文献时，请谷歌（抱歉，谷歌仍然存在）搜索。通过Google Scholar查找学术出版物，以确保它们是合法的。
- en: Three ChatGPT Prompts to Assist in Locating Useful Sources
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 三个Chat GPT提示以帮助定位有用的来源
- en: The [research topic] interests me. Suggest appropriate websites/databases/journals
    where I can find academic articles on this topic.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: '[研究主题]让我感兴趣。建议适当的网站/数据库/期刊，我可以在那里找到关于这个主题的学术文章。'
- en: I'm researching [the subject] right now. List the current opposing views on
    the matter.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 我目前正在研究[主题]。列出关于这个问题的当前对立观点。
- en: To respond to [your research question], I require information and statistics
    on [aspect of the topic]. Could you recommend trustworthy places to look for this
    information?
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回应[你的研究问题]，我需要关于[话题方面]的信息和统计数据。你能推荐一些可以查找这些信息的可靠地方吗？
- en: Recapitulating the Sources
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 概括来源
- en: Let's say you are required to write a literature review that draws from multiple
    novels. Due to time constraints, you must summarize and gather a variety of resources.
    Explaining how they address your research question is the main goal.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你需要写一篇从多部小说中汲取的文献综述。由于时间限制，你必须总结和收集各种资源。解释它们如何解决你的研究问题是主要目标。
- en: 'Meanwhile:'
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 同时：
- en: Academic articles frequently use ambiguous terminology and excessively complicated
    language. Many of them won't be needed at all, and reading them is a waste of
    time.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 学术文章经常使用模糊的术语和过于复杂的语言。其中许多根本不需要，阅读它们是浪费时间。
- en: To separate the wheat from the chaff, you can use ChatGPT to generate preliminary
    summaries. An AI-powered key point generator is an additional choice that enables
    you to obtain a structured summary in the form of a list of bullet points.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 为了区分优劣，您可以使用ChatGPT生成初步摘要。一个基于AI的关键点生成器是另一个选择，它使您能够以列表的形式获得结构化摘要。
- en: 4 Prompts for Summarizing & Sources
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 4个总结和来源提示
- en: Give a summary of [article name] in plain English.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 用简单的英语总结[文章名称]。
- en: 'Summarize the following in 100 words: [insert text].'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 用100个字总结以下内容：[插入文本]。
- en: Write a synopsis of [article] about economics that would be understandable to
    someone without specialized training.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 为[文章]撰写一个关于经济学的摘要，使其对没有专业培训的人也能理解。
- en: conclude an  article (a)and explain how its ideas relate to article (b)
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 总结一篇文章（a）并解释其观点如何与文章（b）相关
- en: Creating an Outline
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 创建大纲
- en: Frequently, the information is too disparate and difficult to handle. I then
    arrange my thoughts using ChatGPT.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，信息过于分散且难以处理。然后我使用ChatGPT整理思路。
- en: 'For instance:'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: The tool can organize the arguments in a particular section or provide an outline
    of the entire essay.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 工具可以组织特定部分的论点或提供整篇论文的提纲。
- en: The introduction and conclusion benefit greatly from it. Additionally, it offers
    suitable transitional words and sentences to improve the coherence and flow of
    your writing.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 引言和结论从中受益匪浅。此外，它还提供了合适的过渡词和句子，以改善写作的连贯性和流畅性。
- en: An AI-based outline generator can be used to expedite the procedure even further.
    The generated outline can be examined by ChatGPT, which can then highlight areas
    that need work.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 基于AI的大纲生成器可以进一步加快流程。生成的提纲可以由ChatGPT检查，然后突出需要改进的领域。
- en: Three ChatGPT Exercises to Help You Arrange Your Thoughts
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 三个ChatGPT练习帮助您整理思路
- en: '[Insert the question here] is the research question. Create a concise outline
    for the entire research paper based on the research question.'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: '[在此处插入问题]是研究问题。根据研究问题为整个研究论文创建一个简洁的大纲。'
- en: My argument is supported by several pieces of evidence. To create a coherent
    paragraph, arrange it logically.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 我的论点由几项证据支持。为了创建一个连贯的段落，请按逻辑排列。
- en: '[The claim] is what I''m claiming. My proof is as follows: [evidence 1] and
    [evidence 2]. Provide transitional phrases to help my paper''s various sections
    flow together. The sections are as follows: [text here].'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: '[以下陈述]是我所主张的。我的证据如下：[证据1]和[证据2]。提供过渡性短语以帮助我的论文各部分流畅衔接。各部分如下：[文本内容]。'
- en: Making Visual Components
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 制作视觉组件
- en: The only visual format available to you if you don't have a paid subscription
    to ChatGPT is tables. Nevertheless, it can offer helpful guidance on revising
    your visual aids.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您没有ChatGPT的付费订阅，您唯一可用的视觉格式是表格。尽管如此，它仍可以提供修改视觉辅助的有用指导。
- en: 'For instance, request that ChatGPT:'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，要求ChatGPT：
- en: Provide the ideal color schemes for the concepts provided.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 提供所提供概念的理想配色方案。
- en: Make the infographics logical.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 使信息图逻辑清晰。
- en: Tell which images will be the most illustrative.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 告诉哪些图像将是最具说明性的。
- en: An Advanced Data Analysis feature in Chat Ps "Plus" edition enables users to
    examine and display data in infographics, charts, and diagrams. Since I don't
    yet have it, these are my visualization-making prompts.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: Chat Ps "Plus"版的高级数据分析功能使用户能够以信息图、图表和图表的形式检查和显示数据。由于我还没有它，这些是我的可视化提示。
- en: Three ChatGPT Prompts to Aid in Information Visualization
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 三个ChatGPT提示帮助信息可视化
- en: 'The following details are included in my research report: [your information].
    Provide the best possible visual representation of this data to [the intended
    audience].'
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 我的研究报告中包含以下详细信息：[您的信息]。为[目标受众]提供最佳的可视化数据表示。
- en: Which graph colors would help me make the information easier for readers to
    understand in my report?
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 哪些图表颜色可以帮助我在报告中使信息更容易让读者理解？
- en: Create a two-row table. One row should contain [list of items] and be titled
    [row title]. [List of items] and [row title] should be the titles of the other
    row.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个两行表格。一行应包含[项目列表]并标有[行标题]。[项目列表]和[行标题]应作为另一行的标题。
- en: Proofreading and editing
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 校对和编辑
- en: You can use ChatGPT as a proofreader (with some restrictions). It recognizes
    your errors more accurately than any human, as is the case with any language-based
    software. It fixes errors
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以将ChatGPT用作校对工具（有一些限制）。它识别您的错误比任何人都准确，就像任何基于语言的软件一样。它会修正错误
- en: 'Pay attention:'
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意：
- en: 'Editing and proofreading are two distinct processes:'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑和校对是两个不同的过程：
- en: As I mentioned above, the former is superficial error correction.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 如我上面提到的，前者是表面错误修正。
- en: The latter focuses more on consistency and structure.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 后者更注重一致性和结构。
- en: It is preferable not to request that the text be edited for errors or proofread
    for inconsistencies. The opposite is always true.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 不建议要求对文本进行错误编辑或校对以消除不一致性。相反的情况总是成立的。
- en: Three ChatGPT Exercises to Assist You in Editing and Editing Your Work
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 三个 ChatGPT 练习，帮助你编辑和润色作品
- en: 'Check my writing for spelling, grammar, and punctuation errors. Additionally,
    fix the inconsistent formatting: [insert text].'
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 检查我的写作中的拼写、语法和标点符号错误。另外，修复不一致的格式：[插入文本]。
- en: 'Check my writing for coherence, clarity, and a formal, academic tone: [Insert
    text here].'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 检查我的写作的连贯性、清晰度和正式、学术的语气：[在此处插入文本]。
- en: 'This is my research paper draft: [Insert text here]. Verify the logical flow
    of it. Draw attention to any logical errors.'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我的研究论文草稿：[在此处插入文本]。验证其逻辑流程。指出任何逻辑错误。
- en: 'chapter 8:'
  id: totrans-464
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第8章：
- en: Writing Better Essays with ChatGPT
  id: totrans-465
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 写出更好的论文
- en: Writing an essay can be a difficult undertaking, but it can be made much easier
    with the aid of ChatGPT, an AI-powered language model. We'll take you through
    easy steps in this guide to help ChatGPT write an essay that is both coherent
    and engaging. You can use AI to improve your writing while upholding moral principles
    by being aware of ChatGPT's features, creating efficient prompts, and refining
    the produced content. Bardeen, a browser-based tool that saves you time by reducing
    tedious tasks to a single click without the need for coding, makes it simple to
    automate recording ChatGPT interactions.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 写论文可能是一项艰巨的任务，但有了 ChatGPT（一个基于 AI 的语言模型）的帮助，它可以变得容易得多。在本指南中，我们将带你通过简单的步骤，帮助
    ChatGPT 写出既连贯又吸引人的论文。通过了解 ChatGPT 的功能、创建有效的提示和改进生成内容，你可以使用 AI 提高你的写作，同时维护道德原则。Bardeen
    是一个基于浏览器的工具，通过将繁琐的任务简化为单次点击，无需编码即可节省你的时间，使自动记录 ChatGPT 交互变得简单。
- en: 'ChatGPT: Improving Essay Quality'
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT：提升论文质量
- en: 'Through an iterative process, ChatGPT can be an effective tool for polishing
    and enhancing your essay drafts. Here''s how to use ChatGPT to improve the overall
    caliber of your writing:'
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 通过迭代过程，ChatGPT 可以成为提升和增强你的论文草稿的有效工具。以下是使用 ChatGPT 提高你写作整体水平的步骤：
- en: Give ChatGPT a thorough prompt that includes the essay's topic, structure, and
    any special requirements to help it create an initial draft.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 给 ChatGPT 一个详尽的提示，包括论文的主题、结构和任何特殊要求，以帮助它创建一个初始草稿。
- en: Get the entire discussion and check the produced material for coherence, relevance,
    and prompt adherence.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 获取整个讨论并检查产生的材料是否连贯、相关以及是否遵循提示。
- en: Determine what needs to be improved, such as shaky arguments, a dearth of examples,
    or a tone that is inconsistent.
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 确定需要改进的地方，例如不稳定的论点、缺乏例子或不一致的语气。
- en: Talk back and forth with ChatGPT, offering criticism and requesting changes
    to particular parts or elements of the essay.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 与 ChatGPT 互相交流，提出批评并要求对论文的特定部分或元素进行修改。
- en: By giving examples or identifying the target audience, ChatGPT can adapt to
    a preferred writing style or tone.
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供示例或确定目标受众，ChatGPT 可以适应首选的写作风格或语气。
- en: To monitor the iterative process and compare versions with ease, save the transcript
    to Google Docs.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 为了监控迭代过程并轻松比较版本，将记录保存到 Google Docs。
- en: You can greatly increase the caliber, impact, and clarity of your essay by continuously
    editing it with ChatGPT's help. To make sure the final draft satisfies your standards
    and requirements, don't forget to review it yourself and make any necessary edits.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用 ChatGPT 的帮助不断编辑你的论文，你可以大大提高论文的质量、影响力和清晰度。为了确保最终草稿符合你的标准和要求，别忘了自己检查并做出任何必要的编辑。
- en: Best Practices and Ethical Issues
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳实践和伦理问题
- en: To maintain academic integrity when using ChatGPT for essay writing, it is essential
    to think about the ethical ramifications and follow best practices. Since AI-generated
    content may closely resemble previously published work, plagiarism is one of the
    main concerns. It's crucial to use ChatGPT as a tool to assist your writing process
    rather than depending solely on it in order to prevent this.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用 ChatGPT 写论文时保持学术诚信，考虑伦理影响并遵循最佳实践至关重要。由于 AI 生成的内容可能与先前发表的作品非常相似，剽窃是主要担忧之一。为了防止这种情况，至关重要的是将
    ChatGPT 作为辅助写作过程的工具来使用，而不是完全依赖它。
- en: 'The following rules will help you use ChatGPT in an ethical manner:'
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 以下规则将帮助你以道德的方式使用ChatGPT：
- en: When using ChatGPT to create drafts, outlines, or ideas, make sure the content
    is in line with your own ideas and writing style by reviewing and editing it frequently.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用ChatGPT创建草稿、大纲或想法时，确保通过频繁的审查和编辑，内容与你的想法和写作风格保持一致。
- en: To increase the essay's genuineness and interest, incorporate your own thoughts,
    observations, and analysis.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 为了增加论文的真实性和趣味性，融入你自己的思考、观察和分析。
- en: Even if ChatGPT recommended some of the sources or references used in the essay,
    make sure to credit them properly.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 即使ChatGPT推荐了论文中使用的某些来源或参考文献，也请确保正确地引用它们。
- en: If your instructor or institution requires it, be open and honest about how
    you use AI tools to write.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的指导老师或机构要求，请坦诚地说明你如何使用AI工具来写作。
- en: Keep in mind that the purpose of ChatGPT is to supplement your writing process,
    not to take the place of your own originality and critical thinking. You can produce
    interesting and genuine essays that demonstrate your command of the subject by
    fusing the capabilities of AI with your distinct viewpoint and commitment to moral
    behavior.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，ChatGPT的目的是补充你的写作过程，而不是取代你自己的原创性和批判性思维。通过融合AI的能力与你的独特观点和对道德行为的承诺，你可以创作出有趣且真实的论文，展示你对主题的掌握。
- en: Utilize Bardeen and OpenAI to Automate Essay Writing
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 利用Bardeen和OpenAI自动化论文写作
- en: Composing an essay can be difficult, particularly if you have a tight deadline
    or are attempting to produce content on difficult subjects. While writing essays
    by hand is still the conventional method, automation tools like Bardeen provide
    a more advanced option by using OpenAI to automate certain steps of the writing
    process. By producing ideas and drafts that can be improved and edited, this method
    not only saves time but also aids in getting past writer's block.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 撰写论文可能会很困难，尤其是当你有一个紧迫的截止日期或者试图在困难的主题上创作内容时。虽然手工写作仍然是传统方法，但像Bardeen这样的自动化工具通过使用OpenAI来自动化写作过程的某些步骤，提供了一个更高级的选项。通过产生可以改进和编辑的想法和草稿，这种方法不仅节省了时间，还有助于克服写作障碍。
- en: 'Here are a few instances of how Bardeen''s playbooks can use OpenAI to automate
    the essay-writing process:'
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些Bardeen的剧本如何使用OpenAI自动化论文写作过程的例子：
- en: 'Save ChatGPT transcript to Google Docs: This playbook helps you better organize
    and hone your ideas by capturing the essence of your ChatGPT brainstorming sessions
    and saving transcripts straight to Google Docs.'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT记录保存到Google Docs：这个剧本帮助你更好地组织和磨练你的想法，通过捕捉你的ChatGPT头脑风暴会议的精髓并将记录直接保存到Google
    Docs。
- en: 'Write an essay using AI in a Google Doc: Simplify your essay writing by using
    OpenAI to create a thorough draft of your essay that is automatically saved as
    a new Google Document for editing and review.'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 在Google Doc中使用AI撰写论文：通过使用OpenAI创建一篇详尽的论文草稿，并将其自动保存为新的Google文档以供编辑和审阅，简化你的论文写作过程。
- en: From the first brainstorming to the creation of the draft, you can greatly improve
    your essay writing process by utilizing this automation. Download the Bardeen
    app as well to get started.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 从最初的头脑风暴到草稿的创建，通过利用这个自动化，你可以极大地提高你的论文写作过程。下载Bardeen应用以开始使用。
- en: 'chapter 9:'
  id: totrans-490
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第9章：
- en: Streamlining Research with AI
  id: totrans-491
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用AI简化研究
- en: I was discussing with coworkers the other day how AI is frustrating creative
    fields; they are also musicians and writers outside of work. Many believe that
    it is displacing genuine creativity or automating originality. The creative industries
    are deeply rooted in this sentiment. However, AI is capable of much more than
    just producing content. It boosts productivity, advances research, and ignores
    the creative core, which is something that only humans are capable of providing.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 我前几天和同事讨论了AI如何让创意领域感到沮丧；他们也是工作之外的音乐家和作家。许多人认为它正在取代真正的创造力或自动化原创性。创意产业深深植根于这种情感。然而，AI的能力远不止于产生内容。它提高了生产力，推动了研究，并忽略了只有人类才能提供的创造性核心。
- en: 'Five Artificial Intelligence Research and Efficiency Prompts (Not Content Creation):'
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 五个人工智能研究效率提示（非内容创作）：
- en: 'Theme extraction from transcripts:'
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 从记录中提取主题：
- en: '"Identify important themes in this transcript, rank them according to frequency,
    and include timestamps for pertinent quotes," is the prompt.'
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: “识别这个记录中的重要主题，按频率排序，并为相关的引言添加时间戳，”这是提示。
- en: 'Use Case: Ideal for expediting the analysis process by distilling lengthy interviews
    into actionable insights.'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 用例：非常适合通过提炼冗长的访谈来加速分析过程，转化为可操作见解。
- en: 'Locating Reputable Articles:'
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 定位可靠的文章：
- en: The assignment is to locate five reliable articles that back up [Trend A] and
    summarize them using direct quotes. Make sure the sources are from respectable
    journals or publications.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 任务：找到支持[Trend A]的五篇可靠文章，并使用直接引语进行总结。确保来源来自受人尊敬的期刊或出版物。
- en: 'Use Case: AI can guarantee the validity of the research, removing any doubt
    about its dependability.'
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 用例：AI 可以保证研究的有效性，消除对其可靠性的任何怀疑。
- en: 'Discovering Up-and-Coming Businesses:'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 发现新兴企业：
- en: 'Prompt: "Name ten up-and-coming businesses in [sector] that don''t get enough
    attention from the media. Provide links to pertinent funding or press reports.'
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“列出[领域]中那些没有得到媒体足够关注的十个新兴企业。提供相关资助或新闻报道的链接。”
- en: 'Use Case: AI helps you investigate new market opportunities by revealing hidden
    competitors.'
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 用例：AI 通过揭示隐藏的竞争对手，帮助你调查新的市场机会。
- en: 'Use Case: To find lost opportunities and maintain your competitiveness, use
    AI to find gaps in your content.'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 用例：为了找到丢失的机会并保持你的竞争力，使用 AI 来寻找你内容中的差距。
- en: 'Examining Upcoming Trends in Scholarly Journals:'
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 检查学术期刊中的新兴趋势：
- en: 'Task: "Look for research on new trends in [industry] by searching scholarly
    journals." Provide citations and a summary of the results.'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 任务：“通过搜索学术期刊，寻找[行业]中新的趋势的研究。”提供引用和结果摘要。
- en: 'Use Case: By identifying research, AI assists you in predicting future trends
    and positioning your content appropriately.'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 用例：通过识别研究，AI 帮助你预测未来趋势，并适当地定位你的内容。
- en: AI-Powered Scalable Workflows
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: AI 驱动的可扩展工作流程
- en: By automating research, data analysis, and trend forecasting, these prompts
    provide a means of scaling your workflow beyond content creation. You can quickly
    duplicate the process across various subjects or projects once you have a system
    in place for AI to handle these tasks. This will save time and boost productivity
    without compromising the creativity that only humans can offer.
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 通过自动化研究、数据分析以及趋势预测，这些提示提供了一种方法，可以将你的工作流程扩展到内容创作之外。一旦你为 AI 处理这些任务建立了一套系统，你就可以快速地在各种主题或项目中复制这个过程。这将节省时间并提高生产力，而不会损害只有人类才能提供的创造力。
- en: How to Write a Research Paper Summary Using ChatGPT
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用 ChatGPT 撰写研究论文摘要
- en: Without a doubt, ChatGPT is a potent AI tool that can handle a wide range of
    tasks in numerous industries. There are two ways you can use it to write a summary
    for a research paper. You can either use the AskYourPDF ChatGPT plugin to upload
    your research paper documents and then enter a prompt to have the research paper
    summarized for you, or you can upload your research paper document directly to
    ChatGPT along with a prompt to be summarized.
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 毫无疑问，ChatGPT 是一款功能强大的 AI 工具，能够在众多行业中处理各种任务。你可以通过两种方式用它来撰写研究论文的摘要。你可以使用 AskYourPDF
    ChatGPT 插件上传你的研究论文文档，然后输入提示来让论文为你进行总结，或者你可以直接将研究论文文档上传到 ChatGPT，并附上总结的提示。
- en: When it comes to producing rapid research paper summaries, ChatGPT and the AskYourPDF
    plugin can be your saving grace. In their own right, both tools are precise and
    effective since they produce succinct and understandable summaries in a matter
    of seconds. I think the AskYourPDF ChatGPT plugin is simpler to use. Like ChatGPT,
    it saves time, quickly refreshes your memory on the key points of the research
    paper topic, and effortlessly improves your academic work.
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到快速制作研究论文摘要时，ChatGPT 和 AskYourPDF 插件可以成为你的救命稻草。就其本身而言，这两个工具都非常精确和有效，因为它们能在几秒钟内产生简洁易懂的摘要。我认为
    AskYourPDF ChatGPT 插件更容易使用。就像 ChatGPT 一样，它节省了时间，快速地让你回忆起研究论文主题的关键点，并轻松地提高你的学术工作。
- en: This section will walk you through the process of writing research paper summaries
    using the AskYourPDF ChatGPT Plugin or uploading the paper to ChatGPT. Let's begin,
    then.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将指导你使用 AskYourPDF ChatGPT 插件或上传论文到 ChatGPT 来撰写研究论文摘要的过程。那么，让我们开始吧。
- en: Why Are Research Paper Summaries Necessary?
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么研究论文摘要有必要？
- en: 'A succinct research paper summary is essential for researchers and academics
    for several reasons. Here are a few of them:'
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 简洁的研究论文摘要对研究人员和学者来说至关重要，原因有很多。以下是一些原因：
- en: '1\. To remain current with the most recent findings in their field: Every year,
    a significant number of research-related literary works are published, making
    it impossible for scholars and researchers to read every paper in detail. Therefore,
    a succinct synopsis is necessary so that they can swiftly peruse the literature
    and find the most significant and pertinent papers.'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 为了跟上他们领域最新的发现：每年都会出版大量的与研究相关的文学作品，使得学者和研究人员不可能详细阅读每一篇论文。因此，一个简洁的概述是必要的，这样他们可以快速浏览文献，并找到最相关和最重要的论文。
- en: '2\. To find new research opportunities: No literature or research paper is
    absolute; by summarizing a research paper, you are likely to discover a gap that
    would allow you to conduct new research in that field, which would then allow
    you to write and publish your research paper.'
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 为了寻找新的研究机会：没有哪篇文献或研究论文是绝对的；通过总结研究论文，你可能会发现一个可以让你在该领域进行新研究的空白，这样你就可以撰写并发表你的研究论文。
- en: Research papers are difficult and time-consuming to manually summarize. To successfully
    summarize a research paper by hand, scholars and researchers must possess a thorough
    comprehension of the paper's topic, methodology, and findings to generate a precise
    and succinct summary. Therefore, using AI-driven tools like ChatGPT in their research
    summary process is necessary because doing so would take time.
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 手动总结研究论文既困难又耗时。要成功手动总结研究论文，学者和研究人员必须对论文的主题、方法和发现有透彻的理解，以便生成精确且简洁的摘要。因此，在研究总结过程中使用ChatGPT等AI驱动工具是必要的，因为这样做可以节省时间。
- en: Data and information are already fed into AI-powered tools to assist scholars
    and researchers in overcoming their obstacles. Additionally, a lot of research
    papers can be used to teach AI-powered tools the fundamentals of academic writing,
    enabling them to produce precise, succinct, and well-written summaries.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 数据和信息已经被输入到AI工具中，以帮助学者和研究人员克服他们的障碍。此外，大量的研究论文可以用来教AI工具学术写作的基本原则，使它们能够生成精确、简洁且文笔流畅的摘要。
- en: 'Here are some particular instances of how succinct paper summaries can be produced
    using AI-powered solutions:'
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些使用AI解决方案生成简洁论文摘要的特定实例：
- en: AI models can condense a paper's abstract or introduction into a single sentence.
    Researchers and academics who need to quickly grasp the paper's main argument
    may find this useful.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型可以将论文的摘要或引言压缩成一句话。需要快速掌握论文主要论点的研究人员和学者可能会发现这很有用。
- en: The methods, findings, and discussion sections of a paper can be condensed by
    AI models. Researchers and academics who need a more thorough understanding of
    the paper's findings may find this useful.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 论文的方法、发现和讨论部分可以通过AI模型进行压缩。需要更深入理解论文发现的研究人员和学者可能会发现这很有用。
- en: Research paper summaries can be produced by AI models for target audiences.
    A summary of a paper for a general audience or a more specialized audience, like
    other researchers in the same field, could be produced by an AI model, for instance.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型可以为特定受众生成研究论文摘要。例如，可以为普通受众或更专业的受众（如同一领域的其他研究人员）生成论文摘要。
- en: How to Summarize a Research Paper Using ChatGPT
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用ChatGPT总结研究论文
- en: OpenAI created the large language model (LLM) known as ChatGPT. One kind of
    AI that can produce and comprehend text is called an LLM. ChatGPT can produce
    fluid and logical text because it has been trained on a sizable corpus of text
    and code.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI创建了名为ChatGPT的大型语言模型（LLM）。一种能够产生和理解文本的AI称为LLM。ChatGPT能够产生流畅且逻辑性强的文本，因为它在大量的文本和代码语料库上进行了训练。
- en: Because it can produce precise, thorough, succinct, and direct summaries, ChatGPT
    can be used to create research paper summaries. By automating the summarization
    process, it can save researchers and academics a substantial amount of time. The
    best thing is that the latest versions make it simple to use as long as you have
    an internet connection and allow you to summarize your research paper for free.
    Four simple steps will get you started right away.
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 由于它能够生成精确、全面、简洁和直接的摘要，ChatGPT可以用来创建研究论文摘要。通过自动化总结过程，它可以节省研究人员和学者大量的时间。最好的是，最新版本使得只要有互联网连接，就可以轻松使用，并且允许你免费总结你的研究论文。只需四个简单步骤，你就可以立即开始。
- en: Here's How to Summarize Your Research Paper on ChatGPT Step-by-Step
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 这是如何在ChatGPT上逐步总结你的研究论文的步骤
- en: Navigate to Settings & Beta after launching the ChatGPT console.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 启动ChatGPT控制台后，导航到设置与测试版。
- en: In the Beta Features section, enable plugins.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 在Beta Features部分，启用插件。
- en: 3\. Choose Plugin Store after clicking the GPT-4 icon.
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击GPT-4图标后选择插件商店。
- en: 4\. Install the plugin after searching for "Ask Yourpdf".
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在搜索“Ask Yourpdf”后安装插件。
- en: 5\. Select Plugins from the default menu to activate the plugin.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 从默认菜单中选择插件以激活插件。
- en: 'To submit your file, you can either:'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 提交你的文件，你可以：
- en: Use the document's URL to access it online. Make sure ".pdf" or another compatible
    file format appears at the end of the link.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 使用文档的URL在线访问它。确保链接的末尾出现".pdf"或其他兼容的文件格式。
- en: Provide a Dropbox or Google Drive link to your document.
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 提供Dropbox或Google Drive的文档链接。
- en: visit  askyourpdf.com/import the document manually from your phone or pc
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 访问askyourpdf.com，从你的手机或电脑手动导入文档
- en: After uploading your document, you can use the ChatGPT console to enter a prompt
    to summarize the research paper.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 上传文档后，你可以使用ChatGPT控制台输入提示来总结研究论文。
- en: The advantages of creating a research paper summary with ChatGPT
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT创建研究论文摘要的优势
- en: 'Some particular advantages of using ChatGPT to write a research paper summary
    include the following:'
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT撰写研究论文摘要的一些特定优势包括以下内容：
- en: 'Get the main idea of a research paper quickly: Researchers and academics who
    need to quickly grasp the main argument of a paper can benefit from ChatGPT''s
    ability to summarize the abstract and introduction for the paper in a single sentence.'
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 快速把握研究论文的主旨：需要快速掌握论文主要论点的研究人员和学者可以从ChatGPT能够用一句话总结论文的摘要和引言的能力中受益。
- en: 'Find gaps in the literature: By producing summaries of research papers that
    are relevant to their work, ChatGPT can assist scholars and researchers in finding
    gaps in the literature.'
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 发现文献中的空白：通过生成与其工作相关的论文摘要，ChatGPT可以帮助学者和研究人员发现文献中的空白。
- en: 'Share research findings with others: ChatGPT can produce research paper summaries
    for particular audiences, like the general public or other researchers working
    in the same field.'
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 与他人分享研究成果：ChatGPT可以为特定受众，如公众或同一领域工作的其他研究人员，生成研究论文摘要。
- en: 'Save time and effort: By automating the summarization process, ChatGPT can
    help academics and researchers save a great deal of time and effort.'
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 节省时间和精力：通过自动化总结过程，ChatGPT可以帮助学者和研究人员节省大量时间和精力。
- en: The Best Ways to Write Research Papers with ChatGPT
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT撰写研究论文的最佳方式
- en: 'Preserve Context: When using ChatGPT to create a research paper summary, it''s
    critical to pay attention to the output and make sure it preserves the original
    meaning of the paper.'
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 保持上下文：在使用ChatGPT创建研究论文摘要时，注意输出并确保它保留了论文的原意。
- en: 'Verify the facts: It''s true that ChatGPT can facilitate the summarization
    process. But, if you agree with me, the majority of AI-generated summaries can
    occasionally overlook important details or misinterpret information, so it is
    crucial to always double-check facts. Thus, it would be wise to double-check for
    accuracy.'
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 核实事实：ChatGPT确实可以促进总结过程。但，如果你同意我的观点，大多数AI生成的摘要有时会忽略重要细节或误解信息，因此始终核实事实至关重要。因此，仔细检查准确性是明智的。
- en: 'Use Specific Prompts: The more precise and unambiguous your prompts are, the
    better the outcome will be. Therefore, make sure your prompts are both clear and
    specific. Additionally, customize your prompts to focus on the section of the
    paper that needs to be summarized.'
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 使用具体的提示词：你的提示词越精确、越明确，结果就会越好。因此，请确保你的提示词既清晰又具体。此外，根据需要总结的论文部分定制你的提示词。
- en: 'Recognize Limitations: Keep in mind that ChatGPT is an AI tool and, despite
    its strength, is not perfect. It may have trouble understanding intricate theories
    or misunderstand important facts. Thus, use caution.'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 认识到局限性：记住ChatGPT是一个AI工具，尽管它很强大，但并不完美。它可能难以理解复杂理论或误解重要事实。因此，使用时要谨慎。
- en: In conclusion
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 总之
- en: For academics and researchers who need to quickly summarize research papers,
    ChatGPT can be a useful tool. It's crucial to understand both its advantages and
    disadvantages, though. Always review the generated summaries to make sure no information
    is erroneous or misunderstood.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 对于需要快速总结研究论文的学者和研究人员来说，ChatGPT可以是一个有用的工具。然而，理解其优缺点至关重要。始终审查生成的摘要，以确保没有信息是错误的或被误解的。
- en: For precise summaries of your research papers and other document types, I suggest
    using the AskYourPDF ChatGPT plugin. In addition to saving you time, doing this
    will increase your productivity. When you give it a try, kindly let us know.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 对于研究论文和其他文档类型的精确摘要，我建议使用AskYourPDF ChatGPT插件。这不仅能节省你的时间，还能提高你的工作效率。当你尝试时，请告诉我们。
- en: 'chapter 10:'
  id: totrans-551
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第10章：
- en: Avoiding Plagiarism While Using AI
  id: totrans-552
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用AI时避免抄袭
- en: Steer Clear of Plagiarism When Using AI
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI时避免抄袭
- en: Preamble
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 前言
- en: Creating content fast is now simpler than ever thanks to AI tools like ChatGPT.
    However, it's crucial to stay unique and stay away from plagiarism, especially
    for professionals and students. This chapter concentrates on useful advice for
    using AI sensibly so that your work stays original, moral, and free of plagiarism.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 借助ChatGPT等AI工具，快速创建内容比以往任何时候都更简单。然而，保持原创性并远离抄袭至关重要，特别是对于专业人士和学生而言。本章重点介绍合理使用AI的实用建议，以确保你的作品保持原创性、道德性且无抄袭。
- en: Aware of Plagiarism
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 了解抄袭
- en: Using someone else's words, ideas, or work without giving due credit is called
    plagiarism. Intentional or inadvertent, this can occur. Copying and pasting text
    straight from a source is one common example.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 抄袭是指未经适当认可而使用他人的文字、想法或作品。这可能是有意或无意的。直接从来源复制粘贴文本就是一个常见例子。
- en: Paraphrasing without making enough changes to the wording or structure.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 改写时对措辞或结构修改不足。
- en: The failure to properly credit sources.
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 未能正确注明来源。
- en: If the output from AI tools like ChatGPT is used verbatim without careful modification,
    it may unintentionally result in plagiarism.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 如果像ChatGPT这样的AI工具的输出未经仔细修改而直接使用，可能会无意中导致抄袭。
- en: 'Step 1: Using ChatGPT to Effectively Paraphrase'
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 步骤1：使用ChatGPT有效进行改写
- en: 'You can rewrite content in your own words while maintaining its original meaning
    by using the useful skill of paraphrasing. Here''s how to use ChatGPT to accomplish
    it:'
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 改写是一项有用的技能，你可以用自己的话重述内容，同时保持其原意。以下是使用ChatGPT实现这一点的方法：
- en: 1\. Explain the Content in Detail**
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. **详细解释内容**
- en: Divide the text into manageable chunks rather than asking ChatGPT to rewrite
    it all at once.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 将文本分成可管理的部分，而不是要求ChatGPT一次性重写所有内容。
- en: '''Chat gpt has revolutionized how we interact with. '' is the prompt. Please
    simplify this sentence.'
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 提示词是："Chat gpt has revolutionized how we interact with." 请简化这个句子。
- en: AI has completely changed how we use technology is the output.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: AI彻底改变了我们使用技术的方式。
- en: 2\. Make Use of Several Variations
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 使用多种变体
- en: Try out ChatGPT's various paraphrasing modes, including expand, creative, and
    fluency, to produce original rewrites. Always alter the outcomes to guarantee
    uniqueness.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试使用ChatGPT的各种改写模式，包括扩展、创意和流畅模式，以生成原创的改写内容。务必修改结果以确保独特性。
- en: 3\. Do not copy the output word for word.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 不要逐字复制输出内容。
- en: Even if ChatGPT offers a decent paraphrase, you should still edit and improve
    it in your own words to give it your unique style.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 即使ChatGPT提供了不错的改写，你仍应使用自己的话进行编辑和改进，以赋予其独特的风格。
- en: '---'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: 'Step 2: Correctly Citing Sources'
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 步骤2：正确引用来源
- en: 'Appropriate citations are crucial when utilizing AI-generated content or concepts
    derived from outside sources. ChatGPT can assist:'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用AI生成的内容或源自外部来源的概念时，适当的引用至关重要。ChatGPT可以提供帮助：
- en: 1\. **Citation Generation**
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. **引用生成**
- en: '- Prompt: "Give an APA reference for this source: ''There are many uses for
    artificial intelligence in healthcare.''"'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: '- 提示："为这个来源提供一个APA引用：''人工智能在医疗保健中有许多用途。''"'
- en: 'The result:'
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: Smith, J. (2023), APA. The advantages and difficulties of artificial intelligence
    in healthcare. Technology and Health Journal, 12(3), 45–67\.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: Smith, J. (2023), APA. 人工智能在医疗保健中的优势与挑战。《技术与健康杂志》，12(3), 45–67\。
- en: 2\. Make Use of Citation Resources
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 利用引用资源
- en: To properly format your references, use Citation Machine or Zotero in conjunction
    with ChatGPT's recommendations.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 为了正确格式化你的参考文献，请将Citation Machine或Zotero与ChatGPT的建议结合使用。
- en: '---'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Step 3: Using Plagiarism Tools to Check Originality**'
  id: totrans-581
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**步骤3：使用抄袭检测工具检查原创性**'
- en: 'It''s crucial to check the originality of your content even after paraphrasing.
    Both paid and free resources can help identify inadvertent plagiarism:'
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在改写后，检查内容的原创性也至关重要。付费和免费资源都可以帮助识别无意中的抄袭：
- en: One of the suggested free tools is **Paper Owl**, which lets you check lengthy
    documents for plagiarism.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐的免费工具之一是**Paper Owl**，它可以让你检查长篇文档是否存在抄袭。
- en: '**PlagScan**: Provides free basic scans to check for originality.'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: '**PlagScan**：提供免费的基本扫描以检查原创性。'
- en: Using them is as simple as copying and pasting your content into the tool.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 使用它们就像复制和粘贴你的内容到工具中一样简单。
- en: Examine the areas that have been flagged and, if required, further refine them
    using ChatGPT.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 检查标记的区域，并在必要时使用ChatGPT进一步细化它们。
- en: 3\. **Pro Tip:** To ensure unique phrasing and refine flagged sections, use
    AI tools like QuillBot in conjunction with plagiarism checkers.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **小贴士**：为确保独特的措辞并完善标记的部分，请结合使用AI工具如QuillBot和抄袭检测器。
- en: '---'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '1\. **Use AI as a Support Tool, Not a Replacement** ### **Step 4: Tools and
    Techniques for Responsible AI Use**'
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: '1. **将AI作为辅助工具，而不是替代品** ### **第4步：负责任使用AI的工具和技术**'
- en: AI can help with drafts and ideas, but your ideas and analysis should be reflected
    in the finished product.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能可以帮助处理草稿和想法，但你的想法和分析应该反映在最终产品中。
- en: 2\. **Record Your Prompts** - Maintain a record of the queries or prompts you
    employed to produce AI content. This guarantees openness and may be helpful for
    changes.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **记录你的提示** - 记录你用于生成AI内容的查询或提示。这保证了透明度，可能有助于修改。
- en: 3\. Utilize Manual Edits
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 利用手动编辑
- en: Human judgment is essential for editing and contextualizing content, regardless
    of how sophisticated AI gets.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 无论人工智能多么复杂，人类判断对于编辑和内容上下文都是必不可少的。
- en: 'Step 5: Useful Activities to Prevent Plagiarism: 1\. **Rewrite a Passage**'
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：防止抄袭的有用活动：1. **改写一段文字**
- en: Take a paragraph from any source, paraphrase it using ChatGPT, and then edit
    it by hand.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 从任何来源摘取一段文字，使用ChatGPT进行改写，然后手动编辑。
- en: 2\. Verify Your Work Again
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 再次验证你的工作
- en: To make sure the paraphrased text is unique, use a plagiarism detector. Emphasize
    the highlighted passages and make additional revisions.
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保改写的文本是独特的，请使用抄袭检测器。强调突出部分并做出额外修改。
- en: 3\. **Experiment with Citation Formats** Give ChatGPT source information and
    practice creating citations in APA, MLA, and Chicago formats.
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **实验引用格式** 给ChatGPT提供源信息，并练习创建APA、MLA和芝加哥格式的引用。
- en: '---'
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: '**Most Important Points**'
  id: totrans-600
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**最重要的要点**'
- en: Effectively paraphrase content produced by AI, and constantly check for originality.
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 有效改写人工智能生成的内容，并不断检查原创性。
- en: Make use of plagiarism detection software to double-check your work.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 利用抄袭检测软件双重检查你的工作。
- en: To maintain academic and professional integrity, properly cite your sources.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持学术和职业诚信，正确引用你的来源。
- en: Think of AI as a tool to supplement your creativity and hard work, not as a
    substitute
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 将人工智能视为补充你的创造力和辛勤工作的工具，而不是替代品
- en: 'chapter 11:'
  id: totrans-605
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第11章：
- en: Using ChatGPT for Revision**
  id: totrans-606
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行修订**
- en: Students are using artificial intelligence (AI) tools like ChatGPT to help them
    with their revision in today's hectic world. With its ability to provide immediate
    feedback, AI has completely changed the way we work, learn, and study. This chapter
    will explore how you can maximize AI's potential to help you learn and revise
    more precisely and accurately than ever before.
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今繁忙的世界里，学生们正在使用ChatGPT等人工智能工具来帮助他们复习。凭借其提供即时反馈的能力，人工智能已经彻底改变了我们的工作、学习和学习方式。本章将探讨如何最大限度地发挥人工智能的潜力，帮助你以前所未有的精确和准确程度学习和复习。
- en: Additionally, you will learn how to prepare for your exams using ChatGPT, Gemini,
    and specialized AI tools like Smart Mark.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，你还将学习如何使用ChatGPT、Gemini和像Smart Mark这样的专业AI工具来准备你的考试。
- en: 'How to revise using ChatGPT: Five Ways to Revision with AI'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用ChatGPT进行复习：五种使用人工智能进行复习的方法
- en: 1\. Recap the lesson's contents.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 回顾本节课的内容。
- en: Attempting to review everything you have discussed in class with a teacher can
    be one of the more difficult parts of revision. Frequently, it can be too much
    to manage the lesson slides, notes, handouts, and homework.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试与老师一起复习课堂上讨论的所有内容可能是复习过程中更困难的部分之一。通常，管理课程幻灯片、笔记、讲义和作业可能过于繁重。
- en: AI has the remarkable capacity to condense and summarize vast amounts of complex
    information with remarkable accuracy. By doing this, you can produce brief notes
    with bullet points that can be utilized to assist in the creation of flashcards,
    knowledge organizers, mind maps, and more.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能具有将大量复杂信息以惊人的准确性进行压缩和总结的非凡能力。通过这样做，你可以制作出带有项目符号的简要笔记，这些笔记可以用来辅助创建闪卡、知识组织者、思维导图等。
- en: 'As usual with AI, you won''t get the most accurate results if you just give
    it a prompt and attach a few documents. Try a prompt like this instead:'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 如同往常使用人工智能一样，如果你只是给出提示并附加一些文档，你不会得到最准确的结果。尝试以下这样的提示：
- en: 'You graduated from the UK with a degree in computer science. no Write a synopsis
    of my GCSE Computer Science: Systems Architecture notes. Although I am aware of
    the CPU''s primary functions, I find it difficult to comprehend the Fetch, Decode,
    and Execute cycle. Can you help me rewrite this topic by creating a brief list
    of bullet points? All of the information you return must be exact and by the specification,
    not generic, as I have attached a PDF of my lesson notes, the lesson slides, and
    a copy of the specification. Could you provide me with a table at the end of the
    document that lists the keywords associated with this subject and includes the
    definition in the second column? This way, I can use them to organize my knowledge
    later.'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 你以计算机科学学位毕业于英国。请为我总结GCSE计算机科学：系统架构笔记。尽管我了解CPU的主要功能，但我发现很难理解取指、解码和执行周期。你能通过创建一个简短的要点列表来帮我重写这个主题吗？你返回的所有信息都必须是精确的，并且符合规范，而不是通用的，因为我附上了我的课堂笔记、课堂幻灯片和规范副本。你能在文档末尾提供一个表格，列出与这个主题相关的关键词，并在第二列包含定义？这样我就可以在以后组织我的知识了。
- en: By avoiding irrelevant material and concentrating only on pertinent material
    that will be covered in your exams, this method more precisely adapts your revision
    to your exam board.
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 通过避免无关材料，只关注你考试中将要涵盖的相关材料，这种方法可以更精确地适应你的考试委员会的复习。
- en: 2\. Assess your understanding
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 评估你的理解
- en: One of the best ways to revise is to test your knowledge because it lets you
    see where you need to improve. This guarantees that you can fill in those knowledge
    gaps and be sure your knowledge is solid before your tests start. Students can
    use AI to generate a set of questions about a subject and to create their mark
    scheme. A variety of practice questions, including multiple-choice, short-answer,
    and essay questions, can also be produced by ChatGPT and other AI services.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的复习方法之一是测试你的知识，因为这让你能看到你需要改进的地方。这保证了你可以在考试开始前填补这些知识空白，并确保你的知识扎实。学生可以使用AI生成关于某一主题的问题集和创建他们的评分标准。ChatGPT和其他AI服务还可以生成包括多项选择题、简答题和论文题在内的各种练习题。
- en: 'When doing this, there are a few significant pitfalls to be aware of:'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 在做这件事时，有几个重要的陷阱需要注意：
- en: Make sure to upload your exam board's practice paper and marking scheme, and
    instruct the AI in the prompt to pose questions that resemble those in the paper.
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 确保上传你考试委员会的练习试卷和评分标准，并在提示中指导AI提出与试卷中相似的问题。
- en: To make sure the questions don't deviate too much from the syllabus you are
    studying, you can also upload the exam board specification.
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保问题不会偏离你正在学习的课程大纲太远，你也可以上传考试委员会的规范。
- en: Because ChatGPT and Gemini (and other models) are not fully trained on the subtleties
    of your exam board and the exam style, they may mark your answers incorrectly.
    Therefore, don't rely solely on the marking of your answers, even when using the
    mark scheme.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT和Gemini（以及其他模型）并没有完全训练过你对考试委员会和考试风格的细微差别，它们可能会错误地评分你的答案。因此，即使在使用评分标准时，也不要完全依赖你答案的评分。
- en: 3\. Make a study schedule
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 制定学习计划
- en: It can be difficult for students to organize themselves. Even the most well-organized
    individuals may find it difficult to manage numerous classes, tests, and deadlines.
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 学生组织自己可能很困难。即使是组织得最好的个人也可能发现很难管理多个课程、考试和截止日期。
- en: Fortunately, it's easy to use ChatGPT to help you plan your revisions strategically!
    It will create a customized schedule if you just enter the subjects you need to
    study, the number of days you have left before your exams, and how much time you
    would like to devote to each subject each day or week.
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，使用ChatGPT帮助你战略性地规划复习很容易！如果你只需输入你需要学习的科目、考试前剩余的天数以及你每天或每周愿意为每个科目投入多少时间，它就会为你创建一个定制的时间表。
- en: 'For instance: "Make a two-week schedule for A Level Chemistry, Physics, and
    Biology revision. The output should be a table with the days of the week on the
    side and the headings and subjects at the top. I would like to revise two subjects
    a day, and each subject should receive an hour of revision time. Tell me the subject
    and the topic to be covered in that revision lesson in each cell.'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：“为A Level化学、物理和生物复习制定两周的计划。输出应该是一个表格，包含一周中的每一天在旁边，标题和科目在顶部。我每天想复习两个科目，每个科目应该得到一小时的复习时间。告诉我每个复习课中要覆盖的科目和主题。”
- en: Having a well-organized plan in place can help you maximize your time, lower
    stress, and keep your revision on course.
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 制定一个良好的计划可以帮助你最大化时间，降低压力，并确保你的复习按计划进行。
- en: 4\. AI has replaced your personal tutor.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 4. AI已经取代了你的私人导师。
- en: Artificial intelligence (AI) tools can be used to simplify complex ideas. It
    can guide you through the process step-by-step and make complex ideas easy to
    understand. Asking it to describe how to solve an algebraic expression by gathering
    similar terms is one way to do this.
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）工具可以用来简化复杂的概念。它可以一步一步地引导你通过这个过程，并使复杂的概念变得容易理解。要求它描述如何通过合并同类项来解决代数表达式，这是实现这一目标的一种方法。
- en: An example of a prompt
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 一个提示示例
- en: '"I must make this expression simpler: 4b + 3a2 - 3a - a2 - 8a I can''t recall
    how to do this, even though my teacher explained collecting terms. Could you walk
    me through it step-by-step?'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: “我必须使这个表达式更简单：4b + 3a^2 - 3a - a^2 - 8a 我甚至想不起如何做这个，尽管我的老师解释了合并同类项。你能一步一步地教我吗？”
- en: It is crucial to remember that AI is notorious for making mathematical mistakes,
    so you cannot assume that it will be flawless. Asking someone to help you understand
    a process or idea is always preferable to trying to answer the question yourself.
    To try to guarantee a higher level of accuracy, you can also ask it to check its
    responses twice.
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 记住这一点至关重要，因为人工智能因犯数学错误而臭名昭著，所以你不能假设它将完美无缺。请别人帮助你理解一个过程或想法，总是比你自己尝试回答问题更好。为了尽量保证更高的准确性，你也可以要求它检查其回答两次。
- en: Another thing to keep in mind is that generic AI tools won't be tailored to
    your exam board's requirements and marking schemes. This can hinder your learning,
    and some exam boards require specific answers to questions, such as using specific
    keywords, which AI won't understand naturally. Even though you could invest a
    lot of time in "training" the model with previous paper mark schemes, this does
    not ensure that it will function as you would like.
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 另一点需要记住的是，通用的AI工具不会针对你的考试委员会的要求和评分标准进行定制。这可能会阻碍你的学习，并且一些考试委员会要求对问题的特定答案，例如使用特定的关键词，AI不会自然地理解。即使你投入大量时间用以前的试卷评分标准来“训练”模型，这也并不能保证它将按你的期望运行。
- en: Because of this, Save My Exams has unveiled a brand-new AI tool that has been
    trained by an AI developer and subject matter experts to mark your exam questions.
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，Save My Exams已经推出了一款全新的AI工具，该工具由AI开发人员和领域专家训练，用于批改你的考试问题。
- en: '"Smart Mark," a fully trained artificial intelligence system created by our
    exceptional team of educational experts and developers, will evaluate your exam
    question answers in accordance with mark schemes and exam board requirements.
    This was created in collaboration with highly skilled, informed educators who
    have marked exams for the board.'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: “智能标记”是一个由我们杰出的教育专家和开发团队完全训练的人工智能系统，它将根据评分标准和考试委员会的要求评估你的考试问题答案。这是与具有丰富经验的、了解考试委员会要求的评分教师合作创建的。
- en: Smart Mark versus ChatGPT
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 智能标记与ChatGPT
- en: Exam board specifications, mark schemes, past paper style questions, and expert
    teacher input were all used in the creation of Smart Mark, an AI marking tool
    that meticulously checks for exam keywords. After that, Smart Mark marks your
    work and gives you succinct, understandable feedback to help you improve your
    exam technique and learn how to write better answers for the final exam series.
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建智能标记（Smart Mark）这个AI评分工具时，我们使用了考试委员会的规范、评分标准、往届试卷风格问题和专家教师的意见。之后，智能标记会批改你的作业，并提供简洁、易懂的反馈，帮助你提高考试技巧，学习如何为最终考试系列写出更好的答案。
- en: The feedback provided by Smart Mark is customized for each subject and exam
    board. Smart Mark has been trained to evaluate responses according to mark schemes,
    providing students with the most precise and detailed feedback possible. Unlike
    generic AI tools like Chat GPT, Smart Mark consistently gives feedback that accurately
    reflects how students will be graded on an exam.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: Smart Mark提供的反馈是针对每个科目和考试委员会定制的。Smart Mark经过训练，能够根据评分标准评估回答，为学生提供尽可能精确和详细的反馈。与像Chat
    GPT这样的通用AI工具不同，Smart Mark始终提供准确反映学生在考试中如何评分的反馈。
- en: A student's response must be in line with the curriculum of that particular
    exam board in order to receive the highest possible score. ChatGPT (and other
    generic AI tools) frequently omits important subject-specific language because
    they give generic feedback that does not consistently match exam-specific mark
    schemes. This implies that generic AI tools may give students positive feedback
    for answers that, if graded by an examiner or knowledgeable teacher, would not
    receive the full amount of marks because of errors or a lack of specific terminology
    because they are overconfident and inaccurate.
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 学生的回答必须与特定考试委员会的课程大纲相符，才能获得尽可能高的分数。ChatGPT（以及其他通用AI工具）经常省略重要的学科特定语言，因为它们提供的是通用的反馈，这些反馈并不始终与特定的评分标准相匹配。这意味着通用AI工具可能会给学生提供积极的反馈，如果由考官或有知识的教师评分，这些答案可能不会得到全部的分数，因为存在错误或缺乏特定的术语，因为它们过于自信且不准确。
- en: Exam question and answer marks are being incorrectly assigned by Chat GPT.
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: Chat GPT正在错误地分配考试问题和答案的分数。
- en: Correctly, Smart Mark does not give points for the same wrong exam question
    response.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 正确的是，Smart Mark不会为相同的错误考试问题回答给出分数。
- en: Which courses does Smart Mark offer?
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: Smart Mark提供哪些课程？
- en: 'We currently provide Smart Mark for the following courses as of this writing:'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 就目前写作而言，我们提供以下课程的Smart Mark：
- en: GCSE Business Edexcel
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: GCSE商业Edexcel
- en: Biology AQA GCSE
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 生物学AQA GCSE
- en: Physics for the IGCSE CIE
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: IGCSE物理CIE
- en: IGCSE Biology CIE
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: IGCSE生物学CIE
- en: Chemistry for the IGCSE CIE
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: IGCSE化学CIE
- en: GCSE AQA Eng Lit
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: GCSE AQA英语文学
- en: With many more scheduled to be released in the upcoming months, the list of
    subjects and courses that offer the Smart Mark feature will only continue to expand.
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 随着未来几个月更多内容的发布，提供Smart Mark功能的科目和课程列表将不断扩展。
- en: How to avoid using ChatGPT and AI to study for tests
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 如何避免使用ChatGPT和AI来准备考试
- en: Even though artificial intelligence AI is a fantastic tool, you should use it
    carefully. The following are some things to be aware of.
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管人工智能AI是一个出色的工具，但你应该谨慎使用。以下是一些需要注意的事项。
- en: Don't assume everything is true.
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 不要假设所有事情都是真实的。
- en: As previously stated, even though ChatGPT and other AI models are derived from
    extensive datasets, this does not guarantee that they are accurate and current.
    The output must be compared to your textbooks, mark schemes, or class notes.
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，尽管ChatGPT和其他AI模型源自大量数据集，但这并不保证它们的准确性或时效性。输出必须与你的教科书、评分标准或课堂笔记进行比较。
- en: Avoid relying too much on AI.
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 避免过度依赖AI。
- en: One excellent method to improve learning and task completion speed is to use
    artificial intelligence (AI). But when it comes to class mock exams or actual
    exam situations, learning can become passive, which could lead to poor performance.
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 使用人工智能（AI）是提高学习和任务完成速度的一个极好方法。但是，当涉及到课堂模拟考试或实际考试情况时，学习可能会变得被动，这可能导致表现不佳。
- en: Students avoid using efficient active recall revision techniques like flashcards,
    knowledge organizers, practice exam questions, quizzing, etc. when they rely too
    much on artificial intelligence to complete the task for them. If you want to
    revise in different ways,
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 当学生过度依赖人工智能来完成作业时，他们会避免使用高效的主动回忆复习技巧，如闪卡、知识组织者、练习考试题、测验等。如果你想以不同的方式复习，
- en: Commonly asked queries
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 常见问题查询
- en: Can I revise using ChatGPT?
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以使用ChatGPT进行复习吗？
- en: Indeed, ChatGPT can be a useful revision tool for creating practice questions,
    summarizing lesson notes and homework assignments, and breaking down complex subjects.
    To guarantee thorough comprehension, it is crucial to combine it with other revision
    techniques.
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，ChatGPT可以是一个有用的复习工具，用于创建练习题、总结课堂笔记和作业，以及分解复杂主题。为了确保全面理解，结合其他复习技巧至关重要。
- en: Is ChatGPT a useful tool for revision?
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是复习的有用工具吗？
- en: Indeed, ChatGPT is a great tool for certain tasks, but as this article explains,
    it is not for answering specific exam questions. It is helpful for automating
    user-generated content, but it lacks the specificity to thoroughly review and
    mark your responses.
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，ChatGPT对于某些任务来说是一个伟大的工具，但正如本文所解释的，它并不适合回答特定的考试问题。它有助于自动化用户生成的内容，但它缺乏彻底审查和评分你的回答的特异性。
- en: How can educators determine whether you are using ChatGPT?
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 教育者如何确定你是否使用了ChatGPT？
- en: Teachers may use AI detection software or plagiarism checkers, depending on
    the school. These show where content has been finished by AI and are highly accurate.
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 根据学校情况，教师可能会使用AI检测软件或抄袭检测器，这些软件显示内容是由AI完成的，并且非常准确。
- en: Your teachers will have an excellent understanding of each student's present
    proficiency level, writing style, and development. The best course of action is
    to use AI to help you learn, such as by creating an essay outline, creating programming
    challenges, or, for instance, asking you 20 math question circles. Instead of
    using it to replace you, use it as a tutor or personal assistant.
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 你的老师将对每个学生的当前熟练程度、写作风格和发展情况有很好的了解。最好的做法是使用AI来帮助你学习，例如通过创建论文提纲、创建编程挑战，或者例如，让你回答20个数学问题。而不是用它来取代你，而是用它作为导师或个人助理。
- en: Can exam questions be answered by ChatGPT?
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 考试问题可以被ChatGPT回答吗？
- en: It can respond to exam questions, yes. The quality of the user's input greatly
    influences the quality of the output, as indicated throughout this article. However,
    don't rely on AI to complete your tasks. Use it to check your work or get advice
    on how to respond to questions instead.
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 它可以回答考试问题，是的。用户输入的质量在很大程度上影响了输出的质量，正如本文中所示。然而，不要依赖AI来完成你的任务。用它来检查你的工作或获取如何回答问题的建议。
- en: 'Chapter 12 :'
  id: totrans-667
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第12章：
- en: Practicing Exam Questions with ChatGPT
  id: totrans-668
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT练习考试问题
- en: A student's academic journey includes exams, and success depends on their ability
    to prepare. As a virtual tutor, ChatGPT can assist students in creating multiple-choice
    questions, mock exams, and even polishing essay-style responses. You will learn
    how to use ChatGPT to enhance your exam preparation and performance in this chapter.
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 学生的学术旅程包括考试，成功取决于他们准备的能力。作为一个虚拟导师，ChatGPT可以帮助学生创建多项选择题、模拟考试，甚至润色论文风格的回答。你将在这章中学习如何使用ChatGPT来提高你的考试准备和表现。
- en: 'Step 1: Making Practice Mock Exams'
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步：制作练习模拟考试
- en: Mock exams help you pinpoint your areas of strength and growth by simulating
    actual exam conditions. You can make customized practice exams for any subject
    or topic using ChatGPT.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟考试可以帮助你通过模拟实际考试条件来准确找出你的优势和成长领域。你可以使用ChatGPT为任何科目或主题创建定制的练习考试。
- en: Making Mock Exams
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 制作模拟考试
- en: The assignment is to "create a mock test on the topic of cell structure for
    high school biology."
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 作业是“为高中生物的细胞结构主题创建一个模拟测试。”
- en: 'Output: A list of inquiries such as'
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：如下的询问列表
- en: 'Multiple-choice: What is the cell''s main source of power?'
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 多项选择题：细胞的主要能量来源是什么？
- en: B) Mitochondria C) Ribosome A) Nucleus
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: B) 线粒体 C) 核糖体 A) 核
- en: D) The chloroplast
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: D) 叶绿体
- en: 'Brief response: Describe how the cell membrane works.'
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 简短回答：描述细胞膜是如何工作的。
- en: Changing the Difficulty Levels
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 改变难度级别
- en: '"Create five challenging physics questions about Newton''s Laws of Motion"
    is the prompt.'
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: “创建五个关于牛顿运动定律的具有挑战性的物理问题”是提示。
- en: 'Output: Critical thinking-intensive questions, like figuring out the forces
    acting on an object in intricate situations.'
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：需要批判性思维的问题，如确定复杂情况下作用在物体上的力。
- en: Creating Multiple-Choice Questions in Step Two
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 第二步：创建多项选择题
- en: Exams frequently consist of multiple-choice questions (MCQs), which ChatGPT
    can create with thorough justifications for each response.
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 考试通常包括多项选择题（MCQs），ChatGPT可以为每个选项创建详细的解释。
- en: Simple MCQs
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 简单的多项选择题
- en: '"Create ten multiple-choice questions on world history with four options each,"
    is the prompt.'
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: “创建十个关于世界历史的四选一的多项选择题”是提示。
- en: 'Output: Questions about important subjects like historical occurrences, revolutions,
    and well-known leaders.'
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：关于历史事件、革命和著名领导人的重要主题的问题。
- en: Answers and Their Explanations
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 答案及其解释
- en: '"Give explanations for the correct answers to these multiple-choice questions"
    is the follow-up prompt.'
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: “为这些多项选择题提供正确答案的解释”是后续提示。
- en: 'Output: An explanation of why the right answer is right and the others are
    wrong.'
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：解释为什么正确答案是正确的，其他答案为什么是错误的。
- en: 'Step 3: Coming Up with Essay-Style Queries'
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 第三步：提出论文风格查询
- en: Essay questions assess your capacity for clear idea expression, argument analysis,
    and in-depth concept explanation.
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 论文问题评估你清晰表达思想、论证分析和深入概念解释的能力。
- en: Making Prompts for Essays
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 为论文制作提示
- en: '"Create five essay-style questions for a literature exam on Shakespeare''s
    Hamlet," is the prompt.'
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: “为莎士比亚的《哈姆雷特》文学考试创建五个论文风格的问题，”这是提示。
- en: 'Results:'
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: Talk about Hamlet's revenge theme.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 讨论哈姆雷特的复仇主题。
- en: Examine Hamlet and Ophelia's relationship.
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 检验哈姆雷特和奥菲利亚的关系。
- en: Analyze how madness functions in the play.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 分析疯狂在剧中如何发挥作用。
- en: Using ChatGPT's Feedback to Practice
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT的反馈进行练习
- en: 'Compose your answer and request that ChatGPT evaluate it:'
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 撰写您的答案，并要求ChatGPT进行评估：
- en: 'Prompt: "Compare my essay on Hamlet''s revenge theme. How can I make it better?'
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“比较我对哈姆雷特复仇主题的论文。我如何才能让它更好？”
- en: 'Output: Comprehensive comments on argumentation, coherence, and structure.'
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：对论证、连贯性和结构的全面评论。
- en: 'Step 4: Polishing Your Responses'
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：润色您的回答
- en: ChatGPT can assist you in honing your responses for greater precision and clarity
    on essays or multiple-choice questions.
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助您在论文或多项选择题中提高回答的精确性和清晰度。
- en: Enhancing Structure and Grammar
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 提高结构和语法
- en: '"Repair this essay''s grammar and flow: [Paste essay here]" is the prompt.'
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: '"修复这篇论文的语法和流畅度：[粘贴论文]"是提示。'
- en: 'Output: An updated essay with improved coherence and polished language.'
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：一篇改进了连贯性和语言润色的更新版论文。
- en: Adding Nuance to Responses
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 在回答中增加细微差别
- en: 'Prompt: "Explain in greater detail how climate change affects biodiversity
    in this response."'
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“在回答中更详细地解释气候变化如何影响生物多样性。”
- en: 'Output: More details and illustrations to support your answer.'
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：提供更多细节和插图来支持您的答案。
- en: 'Step 5: Hands-on Activities for Students'
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：学生的实践活动
- en: Make a Test
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 制作测试
- en: Select a subject and create a 10-question practice exam using ChatGPT. Examine
    your responses after taking the test.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个科目，使用ChatGPT创建一个10个问题的练习考试。考试后检查您的回答。
- en: Practice Writing Essays
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 练习写作论文
- en: Write a response to an essay prompt that ChatGPT generates, then use ChatGPT
    to get feedback and make changes.
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 针对ChatGPT生成的论文提示写一个回答，然后使用ChatGPT获取反馈并进行修改。
- en: Examine Your Performance
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 检查您的表现
- en: Utilize ChatGPT to evaluate your responses, spot errors, and offer solutions.
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 利用ChatGPT评估您的回答，找出错误并提供解决方案。
- en: Important Takeaways
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 重要要点
- en: A useful tool for making customized essay prompts and practice exams is ChatGPT.
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一个有用的工具，可用于创建定制的论文提示和练习考试。
- en: It offers comments and recommendations to help you improve your responses.
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 它提供了评论和建议，以帮助您改进您的回答。
- en: Including ChatGPT in your study regimen can help you become more confident and
    prepared for tests.
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT纳入您的学习计划可以帮助您在考试中更加自信和准备充分。
- en: 'chapter 13 :'
  id: totrans-721
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第13章：
- en: Improving Memory Retention with AI Prompts
  id: totrans-722
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用AI提示提高记忆保留
- en: '#Preamble'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: '#序言'
- en: For students to succeed academically, memory retention is essential. Students
    can develop personalized memory aids, mnemonics, and interactive learning strategies
    to improve their ability to retain information with the aid of AI tools like ChatGPT.
    This chapter examines the use of AI prompts to improve recall and memory for a
    range of subjects.
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 为了学生在学术上取得成功，记忆保持至关重要。学生可以利用ChatGPT等AI工具开发个性化的记忆辅助工具、助记符和互动学习策略，以帮助他们在AI工具的帮助下提高信息保留能力。本章探讨了使用AI提示来提高各种学科的回忆和记忆。
- en: '**First Step: Employing Memory Aids and Mnemonics**'
  id: totrans-725
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**第一步：使用记忆辅助工具和助记符**'
- en: Mnemonics are a tried-and-true method of helping people remember complicated
    information. For any subject, ChatGPT can help generate unique and imaginative
    mnemonics.
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 助记符是帮助人们记住复杂信息的有效方法。对于任何学科，ChatGPT都可以帮助生成独特和富有想象力的助记符。
- en: 1\. **Using ChatGPT to Create Mnemonics**
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 1. **使用ChatGPT创建助记符**
- en: 'The prompt is: "Assist me in coming up with a mnemonic to help me remember
    the solar system''s planet order."'
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是：“帮助我想出一个助记符，帮助我记住太阳系行星的顺序。”
- en: Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, and Neptune are the planets
    that make up the output, "My Very Educated Mother Just Served Us Nachos."
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 水星、金星、地球、火星、木星、土星、天王星和海王星是构成输出“我的非常受教育的母亲刚刚为我们提供了玉米片”的行星。
- en: 2\. **Memory Aid Customization**
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 2. **记忆辅助工具定制**
- en: '" The prompt is to "create a mnemonic to aid in your memory of the first ten
    elements of the periodic table."'
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: '"提示是“创建一个助记符，帮助您记住周期表的前十个元素。”'
- en: '"He enjoys beer but is unable to provide full neon" (hydrogen, helium, lithium,
    beryllium, boron, carbon, nitrogen, oxygen, fluorine, and neon) is the output
    message.'
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: '"他喜欢啤酒，但无法提供完整的霓虹灯"（氢、氦、锂、铍、硼、碳、氮、氧、氟和氖）是输出信息。'
- en: 3\. **Aids for Visual Memory**
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 3. **视觉记忆辅助工具**
- en: The question asks students to "provide a visual aid for recalling the components
    of a plant cell."
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 问题要求学生“提供一个视觉辅助工具来回忆植物细胞的组成部分。”
- en: '- Output: Picture the cell as a busy manufacturing facility:'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: '- 输出：将细胞想象成一个繁忙的制造工厂：'
- en: The manager's office is the nucleus.
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 经理办公室是核心。
- en: '- Power station = mitochondria.'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: '- 发电站 = 线粒体。'
- en: '- Ribosomes = Product assembly workers'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: '- 核糖体 = 产品组装工人'
- en: Interactive Learning Strategies in Step Two
  id: totrans-739
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第二步的互动学习策略
- en: Memory retention is improved by interactive strategies like role-playing, games,
    and quizzes. These activities can be facilitated by ChatGPT.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 通过角色扮演、游戏和测验等互动策略可以提高记忆力。这些活动可以通过ChatGPT来促进。
- en: 1\. **Active Recall Quizzes**
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. **主动回忆测验**
- en: '"'
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: '"'
- en: The request is to "create a 10-question quiz on the American Revolution with
    answers."
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 请求是“创建一个包含答案的美国革命10题测验。”
- en: 'The result:'
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: The Declaration of Independence was authored by whom?
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 独立宣言是由谁撰写的？
- en: 'Thomas Jefferson A: In which year did the American Revolution start?'
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 托马斯·杰斐逊 A：美国革命是在哪一年开始的？
- en: 'A: 1775'
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 1775'
- en: 2\. **Scenarios for Role-Playing**
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. **角色扮演场景**
- en: '"Create a role-playing scenario to learn about ecosystems" is the prompt.'
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: '"创建一个角色扮演场景来了解生态系统"是提示。'
- en: '- Output: Picture yourself as an animal in a rainforest. Explain your function,
    your food sources, and your interactions with other animals.'
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: '- 输出：想象自己是一只雨林中的动物。解释你的功能、你的食物来源以及你与其他动物之间的互动。'
- en: 3\. interactive Flashcards
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 交互式闪卡
- en: '"Create flashcards for important biology terms like photosynthesis, mitosis,
    and osmosis," is the prompt.'
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: '"为光合作用、有丝分裂和渗透等重要生物学术语创建闪卡"是提示。'
- en: 'The result:'
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: What is photosynthesis, first of all?
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，光合作用是什么？
- en: '- Back: The method by which plants create food and oxygen using carbon dioxide,
    water, and sunlight.'
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: '- 返回：植物通过二氧化碳、水和阳光创造食物和氧气的方法。'
- en: 'Step 3: Using ChatGPT to Gamify Learning'
  id: totrans-756
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤3：使用ChatGPT使学习游戏化
- en: By keeping students interested, games enhance retention and make learning enjoyable.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 通过保持学生的兴趣，游戏增强了记忆力，使学习变得愉快。
- en: 1\. Word games
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. 单词游戏
- en: Create a crossword puzzle for important chemistry terms" is the task.
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: “为重要的化学术语创建一个填字游戏”是任务。
- en: .
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: .
- en: A list of words and hints that can be used to construct a puzzle is the output.
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 输出是一个可以用来构建谜题的单词列表和提示。
- en: 2\. **Challenges for Trivia**
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. **知识问答挑战**
- en: The prompt is to "create a five-question World War II trivia challenge for history
    practice."
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是“创建一个五题的世界大战知识问答挑战，用于历史练习。”
- en: '- Output: Knowledge-challenging questions that reinforce important ideas.'
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: '- 输出：知识挑战性问题，有助于强化重要思想。'
- en: 3\. **Difficulties with Memory**
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. **记忆困难**
- en: '"The prompt is to "provide a memory game to learn irregular verbs in English.'
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: '"提示是“提供一个记忆游戏来学习英语不规则动词。”'
- en: Students match verbs with their past tense forms in this matching game.
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个匹配游戏中，学生将动词与其过去式形式相匹配。
- en: '**Step 4: Using Repetition to Reinforce Information**'
  id: totrans-768
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**步骤4：使用重复来强化信息**'
- en: For long-term memory retention, repetition is essential. ChatGPT can assist
    in automating and varying methods of repetition.
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 对于长期记忆的保持，重复是必不可少的。ChatGPT可以帮助自动化和多样化重复的方法。
- en: 1\. [Interspersed Repetition]
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. [间隔重复]
- en: '"Assist me in developing a spaced repetition schedule to help me learn vocabulary
    words for my Spanish class," is the prompt.'
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: '"帮助我制定一个间隔重复计划，以帮助我学习西班牙语课的词汇"是提示。'
- en: 'The result:'
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: Study ten new words on the first day.
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一天学习十个新单词。
- en: 'Day 3: Go over the ten words again and add ten more.'
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 第3天：再次复习十个单词并增加十个。
- en: On the seventh day, test your knowledge of all 20 words.
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 在第七天，测试你对所有20个单词的知识。
- en: 2\. **Rewording for Strengthening**
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. **改写以加强**
- en: The prompt asks you to explain photosynthesis in simple terms before going into
    more detail using scientific terminology.
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 提示要求你在用科学术语进行更详细解释之前，用简单的话解释光合作用。
- en: '- Output: Two iterations of the explanation aid in strengthening comprehension.'
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: '- 输出：解释辅助工具的两个迭代有助于加强理解。'
- en: Practical Exercises 1\. **Make Customized Mnemonics** - Create a mnemonic for
    a difficult subject using ChatGPT. Evaluate its efficacy.
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 实践练习1\. **制作定制记忆法** - 使用ChatGPT为一个困难的科目创建一个记忆法。评估其有效性。
- en: 2\. **Interactive Flashcards** - Request 20 flashcards from ChatGPT in preparation
    for an impending test. Use them daily for practice.
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. **交互式闪卡** - 从ChatGPT请求20张闪卡，为即将到来的考试做准备。每天使用它们进行练习。
- en: '**Gamify Your Learning** - Use ChatGPT to create a memory or trivia game, then
    play it with your study group.'
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: '**游戏化你的学习** - 使用ChatGPT创建一个记忆或知识问答游戏，然后与你的学习小组一起玩。'
- en: '---'
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: Most Important Points
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 最重要要点
- en: To make difficult subjects easier to understand, ChatGPT can come up with original
    mnemonics and memory aids.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使难以理解的主题更容易理解，ChatGPT可以提出原创的记忆法和记忆辅助工具。
- en: Games and quizzes are examples of interactive strategies that improve retention
    and engagement.
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏和测验是提高记忆和参与度的互动策略的例子。
- en: Long-term information mastery is ensured by repetition and spaced learning.
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 通过重复和间隔学习确保长期信息掌握。
- en: 'chapter 14:'
  id: totrans-787
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第14章：
- en: Math Problem Solving with ChatGPT
  id: totrans-788
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 解决数学问题
- en: Due to its intimidating appearance, math is a subject that most students find
    frightening. "Math is a part of everyday life and therefore should be made friends
    with," is a statement that can be heard in every classroom. However, even after
    receiving assistance from teachers or consulting books and other resources, students
    frequently still struggle to understand difficult mathematical concepts. At that
    point, ChatGPT is helpful.
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 由于其令人畏惧的外观，数学是大多数学生感到恐惧的学科。在每一个教室里都能听到这样的说法：“数学是日常生活的一部分，因此应该与之成为朋友。”然而，即使在接受老师的帮助或查阅书籍和其他资源之后，学生仍然经常难以理解复杂的数学概念。这时，ChatGPT就派上用场了。
- en: Students can make friends with math with ChatGPT. It facilitates their understanding
    and learning of mathematics in an easy, fun, and straightforward way. Every problem,
    from basic math to intricate calculus, can be resolved by ChatGPT. But in order
    to use ChatGPT for assistance, one needs to know how to ask questions and receive
    the answers they need. Thus, the top ten ChatGPT prompts for handling challenging
    math problems are listed here.
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 学生可以通过 ChatGPT 与数学交朋友。它以简单、有趣和直接的方式促进他们对数学的理解和学习。从基础数学到复杂的微积分，每个问题都可以通过 ChatGPT
    解决。但为了使用 ChatGPT 进行帮助，需要知道如何提问并获得所需的答案。因此，这里列出了处理具有挑战性的数学问题的前十个 ChatGPT 提示。
- en: The basic mathematical computations that are done on numbers to obtain a result
    are known as arithmetic operations. These consist of division, multiplication,
    subtraction, and addition.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 对数字进行基本计算以获得结果的操作称为算术运算。这些包括除法、乘法、减法和加法。
- en: You must use ChatGPT prompts to solve complex problems if you are having trouble
    with complex arithmetic operations. Type "Please solve this arithmetic operation"
    and then the complex arithmetic problem you wish to solve.
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遇到复杂的算术运算问题，必须使用 ChatGPT 提示来解决复杂问题。输入“请解决这个算术运算”然后输入你想要解决的复杂算术问题。
- en: 'Example prompt: {[(4*2)+(10-3)]/2^2}*5-1 is an arithmetic operation that needs
    to be solved.'
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：{[(4*2)+(10-3)]/2^2}*5-1 是一个需要解决的算术运算。
- en: 'Using the prompt: In the beginning, formulate the challenging mathematical
    problem you wish to solve, then submit it and ask ChatGPT to resolve the arithmetic
    issue for you. Finally, watch for the answer.'
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示：首先制定你想要解决的具有挑战性的数学问题，然后提交并要求 ChatGPT 解决算术问题。最后，等待答案。
- en: Used in financial analysis, math contests, and education.
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 用于财务分析、数学竞赛和教育。
- en: 2\. Calculus Issues
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 微积分问题
- en: Everyone finds calculus challenging because it covers subjects like limits,
    derivatives, integrals, and more. You can use ChatGPT prompts, like "Give me the
    answer for this problem," to solve difficult calculus math problems and receive
    your solution.
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都会觉得微积分具有挑战性，因为它涵盖了极限、导数、积分等主题。你可以使用 ChatGPT 提示，如“给我这个问题的答案”，来解决困难的微积分数学问题并获得你的解决方案。
- en: 'Example Prompt: Determine the derivative of the function f x'
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：确定函数 f x 的导数
- en: x = 3x^2 + 2x -1 and provide me with the solution to this problem.
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: x = 3x^2 + 2x -1 并提供这个问题的解。
- en: 'Using the prompt: Write down the calculus problem you wish to solve first,
    then ask ChatGPT to figure out the answer.'
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示：首先写下你想要解决的微积分问题，然后要求 ChatGPT 找出答案。
- en: Utilized in finance, economics, and computer science and technology.
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: 用于金融、经济学、计算机科学和技术。
- en: 3\. Equations in Algebra
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 代数方程
- en: 'Another type of complex math problem that can be resolved with ChatGPT prompts
    is algebraic equations, which involve working with polynomials and symbols. By
    writing something like this, one can ask chatGPT to solve an algebraic equation
    after entering it:'
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种可以用 ChatGPT 提示解决的复杂数学问题是代数方程，这涉及到多项式和符号的处理。通过写下类似的内容，可以要求 ChatGPT 在输入后解决代数方程：
- en: 'Example Prompt: Determine the correct solution to the algebraic equation 3x^3-6x^2+2x-5=0.'
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：确定代数方程 3x^3-6x^2+2x-5=0 的正确解。
- en: 'Using the prompt: Choose the algebraic problem that needs to be solved first,
    then enter the equation in the chat window of chatGPT and request that it be solved.'
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示：首先选择需要解决的代数问题，然后在 ChatGPT 的聊天窗口中输入方程，并要求它解决。
- en: Utilized in business, management, physics, and mathematics education
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 用于商业、管理、物理和数学教育
- en: 4\. Proofs and Theorems in Geometry
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 几何中的证明和定理
- en: Mathematical topics known as geometry theorems and proofs involve a sequence
    of shape-related problems that must be correctly solved to establish a theorem.
    Because these kinds of equations take a long time to solve, you can use ChatGPT
    prompts to tackle challenging math problems.
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 被称为几何定理和证明的数学主题涉及一系列与形状相关的问题，必须正确解决以建立定理。由于这类方程解决起来耗时较长，你可以使用ChatGPT的提示来解决具有挑战性的数学问题。
- en: Explain the Pythagoras Theorem and its proof as an example prompt.
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 以解释勾股定理及其证明为例提示。
- en: 'Using the prompt: Initially, pick a specific geometry theorem that you wish
    to better understand or prove, then type the theorem''s name and a request for
    its explanation and proof into ChatGPT''s chat box. Finally, await a thorough
    response.'
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示：最初，选择一个你希望更好地理解或证明的特定几何定理，然后在ChatGPT的聊天框中输入定理的名称和对其解释及证明的请求。最后，等待详细的回复。
- en: Utilized in robotics, computer graphics, cartography, and art and design
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器人技术、计算机图形学、制图、艺术和设计等领域得到应用。
- en: 5\. Issues with Trigonometry
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 三角学的难题
- en: Trigonometry involves a lot of equations and very challenging steps to solve
    for an angle or to calculate cos, tan, sine, and other formulas. Since this is
    a concept that students struggle with, you can use ChatGPT prompts to solve challenging
    math problems by simply answering questions like "Calculate the value of this
    trigonometric angle" or "Solve this trigonometric equation."
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 三角学涉及许多方程，解决角度或计算余弦、正切、正弦和其他公式的步骤非常具有挑战性。由于这是一个学生感到困难的概念，你可以通过简单地回答像“计算这个三角角度的值”或“解这个三角方程”这样的问题来使用ChatGPT的提示解决具有挑战性的数学问题。
- en: 'An example of a promptThis trigonometric equation needs to be solved: Isinx'
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：这个三角方程需要解决：Isinx
- en: + 2 cosx = 1.
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: + 2 cosx = 1.
- en: 'Using the prompt: Choose the trigonometric problem you wish to solve, then
    enter it and ask ChatGPT to do it for you.'
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示：选择你想要解决的三角问题，然后输入它并让ChatGPT为你解决。
- en: Utilized in kinematics, mechanics, medical imaging, and navigation.
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 在运动学、力学、医学成像和导航等领域得到应用。
- en: 6\. Help with Statistics and Probability
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 统计学和概率的帮助
- en: The mathematical discipline, which focuses on uncertainties, data analysis,
    and interpretation, includes the subjects of probability and statistics. As a
    result, ChatGPT can be used to analyze data sets and determine event probabilities.
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于不确定性、数据分析和解释的数学学科包括概率和统计学。因此，ChatGPT可以用来分析数据集并确定事件概率。
- en: 'Example prompt: A business manufactures light bulbs and tracks how long they
    last. The following bulb lifespans have been documented: 1200, 1500, 800, 2000,
    1600, 1800, 1000, 1400, 2200, and 900\. Determine its meaning.'
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：一家企业生产灯泡并跟踪它们的寿命。以下记录了灯泡的寿命：1200，1500，800，2000，1600，1800，1000，1400，2200，和900。确定其含义。
- en: 'Using the prompt: First, submit your mathematical problem and ask ChatGPT to
    solve it for you by entering the question in the chat box.'
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示：首先，提交你的数学问题，并让ChatGPT通过在聊天框中输入问题来为你解决问题。
- en: Utilized in market research, risk management, and insurance.
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 在市场研究、风险管理、保险等领域得到应用。
- en: 7\. Theory of Numbers
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 数论理论
- en: 'Another tool for solving challenging math problems is number theory, which
    includes inquiries about prime numbers, arithmetic, and divisibility rules. Such
    mathematical queries can be answered with chatGPT by utilizing expressions like:'
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个解决具有挑战性的数学问题的工具是数论，它包括关于素数、算术和可除性规则的研究。这类数学问题可以通过使用chatGPT并利用如下表达式来回答：
- en: 'An example of a promptProvide an answer to this query: Show that the number
    of prime numbers is infinite.'
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：提供一个答案来回答这个查询：证明素数的数量是无限的。
- en: 'Using the prompt: Write your math problem in the ChatGPT prompt box after selecting
    it.'
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示：在选定数学问题后，在ChatGPT提示框中写下你的数学问题。
- en: Utilized in coding theory and cryptography.
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 在编码理论和密码学中得到应用。
- en: 8\. Equations of Differentiation
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 微分方程的公式
- en: Simply asking ChatGPT to "solve a differential equation of the form [Insert
    differential equation here]" will enable it to quickly and easily comprehend complex
    differential equations.
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 仅要求ChatGPT“解形式为[在此插入微分方程]的微分方程”将使它能够快速轻松地理解复杂微分方程。
- en: 'Example task: Determine the solution to a differential equation with the formula
    dy/dx + y = 1.'
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 示例任务：确定具有公式 dy/dx + y = 1 的微分方程的解。
- en: 'Using the prompt: Choose a differential equation math problem, then enter the
    equation in ChatGPT''s chat box and request that it be solved.'
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示：选择一个微分方程数学问题，然后在ChatGPT的聊天框中输入方程并请求解决。
- en: 'Utilized in: Finance, Telecommunications, and Astrophysics'
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 适用于：金融、电信和天体物理学
- en: 9\. Issues with Optimization
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 优化问题中的问题
- en: One of the most popular prompts for using ChatGPT to solve challenging math
    problems is optimization problems. When you use a prompt like "Please optimize
    the function," you can quickly identify the solution to this kind of issue.
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT解决具有挑战性的数学问题中最受欢迎的提示之一是优化问题。当你使用“请优化函数”这样的提示时，你可以快速识别这类问题的解决方案。
- en: 'An example of a prompt please make the function more efficient: To create a
    box, we will cut out the corners of a 50 cm by 20 cm piece of cardboard and fold
    up the sides. Indicate the box height that will produce the most volume.'
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 一个提示示例：请使函数更高效：为了制作一个盒子，我们将从50厘米乘以20厘米的纸板角上剪下，并将侧面折叠起来。指出产生最大体积的盒子高度。
- en: 'Using the prompt: First, decide which optimization problem needs to be resolved.
    Enter it into chatGPT, then watch for your response.'
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示：首先，决定需要解决哪个优化问题。将其输入到chatGPT中，然后等待回复。
- en: Utilized in marketing, aerospace, and operations research.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 适用于市场营销、航空航天和运筹学。
- en: 10\. Clarifications of Complex Analysis
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 复杂分析的澄清
- en: Clarifications of complex analysis are yet another way to solve challenging
    mathematical problems that cover a wide range of subjects, including the residue
    theorem, contour integration, and analytic functions. By typing something like
    "Explain [name of the topic] in complex analysis" into chatGPT, you can find solutions
    to such difficult issues.
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂分析的澄清是解决涵盖广泛主题的具有挑战性的数学问题的另一种方法，包括留数定理、曲线积分和解析函数。通过在chatGPT中输入类似“解释复杂分析中的[主题名称]”的内容，你可以找到这类困难问题的解决方案。
- en: 'Example Prompt: Describe how complex analysis uses the Residue Theorem.'
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：描述复杂分析如何使用留数定理。
- en: 'Using the prompt: Enter the math problem in chatGPT''s chat box and watch for
    a response.'
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示：在chatGPT的聊天框中输入数学问题，并等待回复。
- en: Utilized in fluid dynamics and mathematical analysis.
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 适用于流体动力学和数学分析。
- en: In conclusion
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 总结
- en: Math problems, both simple and complex, are now even easier to solve thanks
    to AI technology. Using these ChatGPT prompts to solve challenging math problems
    is a quick and easy way to get your results, whether you're a student looking
    for AI assistance or want to double-check your answers.
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 由于人工智能技术的应用，现在解决简单和复杂的数学问题都变得更加容易。使用这些ChatGPT提示来解决具有挑战性的数学问题是一种快速简便的方法来获取你的结果，无论你是寻求AI帮助的学生，还是想双重检查你的答案。
- en: Using the appropriate prompt is crucial because AI technology can occasionally
    misinterpret your problem and provide you with incorrect answers. For Chatgpt
    to solve complex math problems, you must include all relevant information in your
    question.
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: 使用适当的提示至关重要，因为人工智能技术有时可能会误解你的问题并提供错误的答案。为了使Chatgpt解决复杂的数学问题，你必须在你提出的问题中包含所有相关信息。
- en: 'FAQs: The Greatest ChatGPT Exercises to Address Difficult Math Issues'
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 常见问题解答：解决困难数学问题的最佳ChatGPT练习
- en: 1\. Why should we solve challenging math problems using ChatGPT prompts?
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 为什么我们应该使用ChatGPT提示来解决具有挑战性的数学问题？
- en: Depending on the individual, some people may use ChatGPT to solve difficult
    math problems in order to save time or may use it to double-check their answers.
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 根据个人情况，有些人可能使用ChatGPT来解决具有挑战性的数学问题以节省时间，或者用它来双重检查他们的答案。
- en: 2\. Describe a prompt.
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 描述一个提示。
- en: In order for an artificial intelligence tool to understand a user's message,
    query, or circumstance and provide the intended result, the user must provide
    a prompt.
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使人工智能工具理解用户的消息、查询或情况并提供预期的结果，用户必须提供提示。
- en: 3\. Is ChatGPT capable of mastering my challenging math problems?
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 3. ChatGPT能否掌握我的具有挑战性的数学问题？
- en: Indeed, ChatGPT can readily resolve any issue you pose to it as a prompt; just
    be sure to provide accurate and comprehensive information to ensure a 100% accurate
    response.
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，ChatGPT可以轻松解决你提出的任何问题；只需确保提供准确和全面的信息，以确保100%准确的回答。
- en: 'Chapter 15:'
  id: totrans-853
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第15章：
- en: Science Physics – Theories and Formulas
  id: totrans-854
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 科学物理学 – 理论和公式
- en: Physics's Place in Daily Life
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 物理学在日常生活中的作用
- en: From the motion of planets to the energy that runs our homes, physics explains
    how the world functions. To simplify difficult ideas, educators must have a solid
    understanding of fundamental theories and formulas.
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 从行星的运动到为我们家庭供电的能量，物理学解释了世界是如何运作的。为了简化复杂的概念，教育工作者必须对基本理论和公式有扎实的理解。
- en: 'The main topics of this chapter are:'
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的主要内容是：
- en: Fundamental theories of physics.
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 物理学的根本理论。
- en: Important equations with real-world examples.
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 带有现实世界例子的重要方程。
- en: How AI can change physics instruction and learning.
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: AI如何改变物理教学和学习。
- en: 2\. Essential Theories of Physics Explained
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 物理学基本理论解释
- en: A. Mechanics by Newton
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: A. 牛顿力学
- en: Explains forces and motion in the real world.
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: 解释现实世界中的力和运动。
- en: 'Key Takeaway: Describes why things move or remain motionless.'
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点：描述了为什么物体会运动或保持静止。
- en: 'Students'' Example: What causes a ball to roll more quickly downhill than uphill?'
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 学生的例子：为什么球在向下滚动时比向上滚动时滚得更快？
- en: B. Thermodynamics
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: B. 热力学
- en: Investigates work, heat, and energy.
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 研究工作、热量和能量。
- en: 'Key Takeaway: Energy can only be transferred; it cannot be created or destroyed.'
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点：能量只能转移，不能创造或毁灭。
- en: 'Students'' Example: In a cold room, why does hot coffee cool down?'
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 学生的例子：在冷房间里，为什么热咖啡会冷却？
- en: C. Electricity
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: C. 电力
- en: Explains electricity and magnetism, which are essential components of contemporary
    technology.
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: 解释了电和磁，它们是现代技术的基本组成部分。
- en: 'Key Takeaway: The fundamentals of how magnets and phones charge.'
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点：磁铁和手机充电的基本原理。
- en: 'Students'' Example: What are the workings of electric motors?'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 学生的例子：电动机是如何工作的？
- en: D. Mechanics of Quantum
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: D. 量子力学力学
- en: Focuses on how small particles, such as atoms and photons, behave.
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于如原子和光子等小粒子的行为。
- en: 'Key Takeaway: Light can behave as both a particle and a wave.'
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点：光可以同时表现为粒子波。
- en: 'Students'' Example: What causes a microwave to heat food but not metal?'
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 学生的例子：为什么微波加热食物而不加热金属？
- en: E. The concept of relativity
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: E. 相对论的概念
- en: Gravity and the nature of time and space are explained by Einstein's theories.
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 爱因斯坦的理论解释了引力和时空的本质。
- en: 'Important Takeaway: For astronauts in space, time is relative and moves more
    slowly.'
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 重要要点：对于太空中的宇航员来说，时间是相对的，移动得更慢。
- en: 'Students'' Example: Relativity is necessary for GPS satellites to deliver precise
    data.'
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: 学生的例子：为什么相对论对于GPS卫星提供精确数据是必要的？
- en: 3\. Fundamental Physics Formulas (Simplified)
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 基础物理公式（简化版）
- en: 'Force: F = maF = ma'
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: 力：F = maF = ma
- en: Mass multiply  acceleration equals force.
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
  zh: 质量乘以加速度等于力。
- en: 'Real-World Example: Figuring out how much force is required to push a car.'
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 现实世界的例子：确定推动汽车所需的力是多少。
- en: F = Gm1m2r2F = G \frac{m_1m_2r^2
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: F = Gm1m2r2F = G \frac{m_1m_2r^2
- en: is the gravitational force.
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
  zh: 是引力。
- en: Explains how two objects are drawn together by gravity.
  id: totrans-888
  prefs: []
  type: TYPE_NORMAL
  zh: 解释了两个物体是如何被引力吸引在一起的。
- en: 'Example from Real Life: What causes astronauts to float in space?'
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 生活中的例子：是什么原因导致宇航员在太空中漂浮？
- en: KE=12mv2KE = \frac{1}{2}mv^2 is the kinetic energy.
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: KE=12mv2KE = \frac{1}{2}mv^2 是动能。
- en: The energy of an object in motion.
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 运动物体的能量。
- en: An example from real life is how a roller coaster accelerates when going downhill.
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
  zh: 生活中的一个例子是过山车在下坡时如何加速。
- en: 'The law of Ohm: V=IRV = IR'
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
  zh: 欧姆定律：V=IRV = IR
- en: Current × Resistance equals voltage.
  id: totrans-894
  prefs: []
  type: TYPE_NORMAL
  zh: 电流乘以电阻等于电压。
- en: Why high-resistance wires heat up is an example from real life.
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么高电阻导线会发热是现实生活中的一个例子。
- en: 'Equation of Waves: v=fλv = f Lambda'
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
  zh: 波动方程：v=fλv = f Lambda
- en: Wavelength  frequency equals wave speed.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 波长乘以频率等于波速。
- en: 'Example from Real Life: Why certain frequencies produce clearer radio signals.'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 生活中的例子：为什么某些频率产生更清晰的无线电信号。
- en: The formula for Einstein's energy is E=mc2E = mc2.
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 爱因斯坦能量公式的公式是E=mc2E = mc2。
- en: Energy and mass are equivalent.
  id: totrans-900
  prefs: []
  type: TYPE_NORMAL
  zh: 能量和质量是等价的。
- en: Nuclear power science is a real-world example.
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: 核能科学是现实世界的例子。
- en: 4\. AI in Physics Instruction
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 物理学教学中的AI
- en: 'Tools for Visualization: AI-driven simulations assist students in seeing abstract
    ideas (such as wave motions and particle collisions).'
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化工具：由AI驱动的模拟帮助学生看到抽象概念（如波动和粒子碰撞）。
- en: AI tools are capable of solving equations and producing explanations in real-time.
  id: totrans-904
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能工具能够实时解决方程并生成解释。
- en: 'Personalized Lesson Plans: Teachers can create physics lessons that are appropriate
    for students at various skill levels with the aid of platforms such as ChatGPT.'
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化课程计划：借助ChatGPT等平台，教师可以为不同技能水平的学生创建合适的物理课程。
- en: 'Interactive Learning: Real-time problem-solving games in physics are made interesting
    by AI-powered applications.'
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 互动学习：由AI驱动的物理问题解决游戏通过应用变得有趣。
- en: 5\. Applications of Physics in Real Life
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 物理学在现实生活中的应用
- en: 'Medical: Electromagnetism is used in MRI machines.'
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 医疗：电磁用于MRI机器。
- en: 'Energy: To transform sunlight into energy, solar panels use quantum physics.'
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 能量：为了将阳光转化为能量，太阳能板使用量子物理。
- en: 'Space Exploration: GPS accuracy and satellite orbits are guided by relativity.'
  id: totrans-910
  prefs: []
  type: TYPE_NORMAL
  zh: 太空探索：GPS精度和卫星轨道由相对论指导。
- en: 'Technology: Physics underpins AI systems, electric vehicles, and smartphones.'
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 技术：物理是AI系统、电动汽车和智能手机的基础。
- en: 6\. Useful Lessons for Teachers
  id: totrans-912
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 对教师有用的课程
- en: Simplify difficult physics formulas with AI tools.
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI工具简化复杂的物理公式。
- en: To pique students' interest, connect physics concepts to practical applications.
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 为了激发学生的兴趣，将物理概念与实际应用联系起来。
- en: Make lessons more engaging and memorable by utilizing virtual labs and simulations.
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 通过利用虚拟实验室和模拟，使课程更加吸引人和难忘。
- en: In conclusion, physics can be made approachable by decomposing it into straightforward
    theories and formulas. Together with AI, educators can produce a potent, captivating,
    and life-changing educational experience.
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，通过将物理分解为简单的理论和公式，可以使物理变得易于理解。与AI结合，教育者可以创造出强大、吸引人且改变生活的教育体验。
- en: 'Chapter 16:'
  id: totrans-917
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第16章：
- en: Language Learning Made Easy with ChatGPT
  id: totrans-918
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT轻松学习语言
- en: The process of learning a new language is thrilling and calls for commitment
    and repetition. ChatGPT can be a useful tool to help you with text translation,
    grammar correction, pronunciation, and vocabulary building. This chapter offers
    doable actions to use ChatGPT for engaging and successful language learning.
  id: totrans-919
  prefs: []
  type: TYPE_NORMAL
  zh: 学习新语言的过程令人兴奋，需要承诺和重复。ChatGPT可以作为一个有用的工具，帮助你进行文本翻译、语法纠正、发音和词汇构建。本章提供了可行的行动方案，以使用ChatGPT进行有趣且成功的语言学习。
- en: 'Step 1: Learning Grammar and Increasing Vocabulary'
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：学习语法和增加词汇
- en: Developing Vocabulary
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: 发展词汇
- en: Word lists can be customized by ChatGPT according to themes or subjects.
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以根据主题或科目定制单词列表。
- en: '"Teach me ten common Italian words or language for traveling," is an example
    of a prompt.'
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: “教我十个常用的意大利语单词或旅行用语，”这是一个提示示例。
- en: An example of output
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: 一个输出示例
- en: Biglietto (ticket)
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: 大小或Biglietto（票）
- en: Aeroporto (airport)
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: 机场或Aeroporto
- en: Albergo (hotel)
  id: totrans-927
  prefs: []
  type: TYPE_NORMAL
  zh: 酒店或Albergo
- en: The passport, or passport
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 护照，或护照
- en: Luggage, or bagaglio
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: 行李，或bagaglio
- en: 'Useful Tip: Request that ChatGPT create sentences with new words.'
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: 有用提示：请ChatGPT创建包含新单词的句子。
- en: 'Example: "Use the word ''passport'' in a sentence."'
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“在句子中使用‘passport’这个词。”
- en: '"I''ll send you my passport for the Volo," is the output.'
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: “我会把我的护照寄给你，以便Volo，”这是输出。
- en: ChatGPT's "Mastering Grammar" feature simplifies difficult grammatical rules.
  id: totrans-933
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的“掌握语法”功能简化了复杂的语法规则。
- en: 'Prompt Example: "Describe the distinction between the French words "avoir"
    and "être."'
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：“描述一下法语单词‘avoir’和‘être’的区别。”
- en: Both are auxiliary verbs, but "avoir" is typically employed in the majority
    of tenses, whereas "être" is reserved for reflexive and motion-related verbs,
    such as "aller."
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个都是助动词，但“avoir”通常用于大多数时态，而“être”则用于反身动词和与运动相关的动词，如“aller。”
- en: 'Step 2: Improving Your Speech'
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：改善你的发音
- en: Tips for Learning Pronunciation
  id: totrans-937
  prefs: []
  type: TYPE_NORMAL
  zh: 学习发音的技巧
- en: 'Prompt Example: "What is the pronunciation of the French word rendezvous?"'
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：“rendezvous这个法语单词的发音是什么？”
- en: '"It is pronounced as ''rahn-day-voo,'' with a nasalized ''n.''" is an example
    response.'
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: “它的发音是‘rahn-day-voo’，带有鼻音的‘n。’”是一个示例回答。
- en: Using Audio Tools for Practice
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: 使用音频工具进行练习
- en: Although ChatGPT doesn't make sound by itself, you can use it in conjunction
    with text-to-speech software to hear proper pronunciations. Additionally, you
    can ask ChatGPT to help you avoid common mistakes and phonetic spellings.
  id: totrans-941
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT本身不发声，但你可以用它配合文本到语音软件来听到正确的发音。此外，你可以要求ChatGPT帮助你避免常见的错误和音标拼写。
- en: 'Step 3: Writing Practice and Text Translation'
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：写作练习和文本翻译
- en: Assistance with Translation
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 翻译协助
- en: ChatGPT makes text translation easier to understand.
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT使文本翻译更容易理解。
- en: 'Example Prompt: "Convert this statement into Spanish: ''I like learning new
    languages.''"'
