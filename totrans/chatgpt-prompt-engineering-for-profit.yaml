    ****rem**ovin**g ****det**ail**s, ****o**r** ****ev**en** ****as**kin**g ****t**he**
    ****mo**del** ****h**ow** ****som**eon**e ****el**se** ****wo**uld** ****res**pon**d.
    ****Refr**amin**g ****cha**nge**s ****t**he** ****con**tex**t ****a**nd** ****app**roac**h
