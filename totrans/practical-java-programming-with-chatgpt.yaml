- en: About the Author
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Alan S. Bluck** is the Director of ASB Software Development Limited and also,
    provides consultancy as a systems architect, providing a broad range of services,
    from high-level technical design, through mentoring for code development and installation
    and configuration of FileNet’s core products.'
  prefs: []
  type: TYPE_NORMAL
- en: Nominated as an IBM Champion in 2022 and re-elected in 2023, the Author has
    already published 5 technical books and over 30 ResearchGate papers which are
    available for free download.
  prefs: []
  type: TYPE_NORMAL
- en: He is responsible for high-level analysis and configuration of existing and
    new FileNet systems. He is also responsible for mentoring and troubleshooting
    high-level systems and issues.
  prefs: []
  type: TYPE_NORMAL
- en: He has over 45 years of Software Development experience in both business and
    scientific systems; 5 years of experience as a Project Manager / Analyst Developer,
    11 years as a Software Development Manager for a team of 12 Software Engineers,
    11 years as a Technical Consultant and 20 years as a Solutions Architect.
  prefs: []
  type: TYPE_NORMAL
- en: About the Reviewer
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Gil Metcalf** has had a long and varied career, initially qualifying as an
    industrial microbiologist working for an oil company on projects relating to microbial
    mining of heavy metals as well as enhanced oil recovery from spent wells. Following
    this he worked for many years for a large pharmaceutical company where he fulfilled
    several roles, including project manager, development team leader and network
    administrator. During this time he developed software for clinical trials management,
    as well as critical tools used in hospitals for the management of cancer patients.
    During his many years working in the software industry as a solutions architect,
    he has gained a wealth of experience in many fields and sectors, particularly
    financial technologies, but also including manufacturing, logistics, and energy
    markets. He has an in-depth knowledge of many software fields, including those
    that relate to modern business practices. These include documents and content
    management, case management, business process management and process automation,
    document lifecycle management, identity management and online banking technologies.
    He is widely regarded as an expert within the industry. Working with many well-known
    banks and institutions, he brings a wide knowledge and keen eye for detail to
    bear, whilst at the same time being able to see and understand the wider picture.
    This enables him to successfully tackle problems that large financial organizations
    have struggled with. His perceptive and innovative approach has been applied in
    many cases and applications to deliver success across the industry.'
  prefs: []
  type: TYPE_NORMAL
- en: He is now a software architect with over 25 years of experience in the software
    industry. He has been instrumental in designing and implementing solutions for
    many blue-chip enterprises, and has spent the last ten years working mainly with
    fintech solutions. He has many qualifications in the document capture, document
    management, business automation and identity management fields. He has recently
    been working on profile management and passwordless authentication methods for
    mobile banking applications. Gil believes that the key to successful software
    architecture rests on a number of primary skills; an understanding of the software
    being just one of those. Also important are softer abilities such as being able
    to explain complex software concepts to less technicallyminded audiences (such
    as users and executives!), being able to see a broad picture of the solution (along
    with the risks and pitfalls), and being able to tease out requirements from what
    is often a vague wish list. He says that preparing for solution design is often
    “an exercise in extrapolation and interpolation at the same time!”. He is a member
    of several professional associations, including the Chartered Institute for IT,
    the Identity Management Institute, and the International Association for Software
    Architects.
  prefs: []
  type: TYPE_NORMAL
- en: Acknowledgement
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are a few people whom I want to thank for the continued and ongoing support
    that they gave me while I wrote this book. First and foremost, I would like to
    thank my wife, Jenny, for continuously encouraging me to write the book—I could
    never have completed this book without her support.
  prefs: []
  type: TYPE_NORMAL
- en: I am grateful for the support of the ResearchGate website, which has held over
    30 of my free publications since 2019, most of which I have referenced in this
    book
  prefs: []
  type: TYPE_NORMAL
- en: I also extend my gratitude to the team at AVA Orange for their support and dedication
    allowing me to publish this book in such a short time and update the material
    during the production process as AI Software is such a rapidly expanding area
    covering a broad range of applications.
  prefs: []
  type: TYPE_NORMAL
- en: I would also like to thank Giles Metcalf, the Technical Reviewer of this book,for
    his diligence and helpful suggestions.
  prefs: []
  type: TYPE_NORMAL
- en: Preface
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The questions in this book, relating to Java program software development, were
    posed to the ChatGPT android phone app. The questions were based on previous developments
    (many algorithms originally took days to write). The responses were astonishing
    and appeared in seconds!In this book, we take the example Java code supplied by
    ChatGPT and implement it using the latest available Eclipse IDE. We have also
    established that all the base code generated by ChatGPT is free to use!
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT provides a fantastic opportunity for Java programmers to turbocharge
    their code writing. Software developers, programmers and software engineers can
    spend days writing code for applications. In this book we describe, using examples,
    the prompts which can be used for ChatGPT to automate the process of ChatGPT Java
    code generation.
  prefs: []
  type: TYPE_NORMAL
- en: This book contains questions relating to software development, which I posed
    (in bold) to the ChatGPT Android phone app. We then describe the detailed steps
    to implement the working Java code and validate the results.
  prefs: []
  type: TYPE_NORMAL
- en: This book is divided into **13 chapters**, designed to provide examples for
    use by Java Programmers, IT consultants, Systems and Solution Architects, with
    basic general IT knowledge, The book provides working templates for the development
    of Java programming solutions with examples using the OpenAI ChatGPT server system
    and the front end AI systems to support the development of programs for use by
    Developers for Data processing, Mathematical Analysis and Document Management,
    for implementation for Manufacturing Industries, Banks and Insurance Companies.
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 1](c01.xhtml)** covers questions relating to software development,
    which were posed (in bold) to the ChatGPT 3.5 AskAI ‘phone app. We also cover
    the installation of ChatGPT as a web application and the Android mobile ‘phone
    application install. The issue of copyright of the responses and the basic use
    of ChatGPTis described.'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 2](c02.xhtml)** covers the ChatGPT prompt used to test its knowledge
    of good programming practice. We asked it to define what it knew about the “SOLID”
    principles, which it did almost instantaneously. The following output was just
    the introduction:'
  prefs: []
  type: TYPE_NORMAL
- en: ”SOLID is a set of five principles for object-oriented programming that were
    introduced by Robert C. Martin (also known as Uncle Bob). These principles aim
    to make software designs more robust, flexible, and maintainable. Here’s a brief
    overview of the SOLID principles and how they apply to Java:”
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 3](c03.xhtml)** covers the Java Code required to use the OpenAI
    Java API to interface with the ChatGPT AI system. ChatGPT provided an example
    of how to make a request to the API using the OkHttp library. In order to use
    the API, we describe the method required to obtain the OpenAI API key.'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 4](c04.xhtml)** covers the questions posed to provide a code for
    a Java program for using Binary Search. The Binary Search method takes a sorted
    array of integers and a target integer to search for. It returns the index of
    the target integer in the array if it is found, or -1 if it is not found.'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 5](c05.xhtml)** We cover the download and installation of the latest
    Open-Source Eclipse Java IDE (Eclipse IDE 2023-06 R – Eclipse IDE for Java Developers)
    and the step-by-step installation on MS Windows 10 and RedHat Enterprise Linux,
    RHEL 8.x. We then describe the detailed implementation and validation of the Binary
    Search program by creating the Java BinarySearch project and examining the Java
    Program output.'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 6](c06.xhtml)** covers the Fourier analysis of an MP4 music file
    to separate instruments and vocals. This is a complex task, involving multiple
    steps like decoding the MP4 file, performing signal processing, and applying source
    separation techniques. ChatGPT provided an outline guide for the steps required
    and suggested some libraries for each step. A simpler task, which ChatGPT did
    provide the full working code for, was for the Fourier analysis of a sine wave
    using Java code.'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 7](c07.xhtml)** describes theChatGPT-generated Java code for the
    Fast Fourier Transform. ChatGPT was asked to provide example Java code to demonstrate
    the Fast Fourier transform. An example Java code was displayed that demonstrated
    the Fast Fourier Transform (FFT) using the Apache Commons Math library.'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 8](c08.xhtml)** covers an example Java code generated by ChatGPT,
    for indexing a document with an output of a list of keywords with the associated
    document page numbers. The code provided by ChatGPT created an index of documents
    and their associated keywords using the Lucene library. It also allowed searching
    for documents based on keywords and returned the document path.'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 9](c09.xhtml)** describes how ChatGPT was prompted to provide a
    Java code for the Saltikov determination of the size distribution of particles
    in an opaque material from a measurement of the size distribution of their sections.
    This code generated by ChatGPT prompted the user to input the number of sections
    measured, the size of each section, and the area under the curve. It then calculated
    the particle size distribution using the Saltikov determination and printed the
    results.'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 10](c10.xhtml)** explains how ChatGPT generated Java code to invert
    a triangular matrix to obtain the coefficients of a polynomial.ChatGPT was prompted
    for an example Java program with code to invert a triangular matrix to obtain
    the coefficients of a polynomial as the result of a set of polynomial equations.
    The Java code created prompted the user to input the degree of the polynomial
    and the coefficients of a set of polynomial equations. It then used Gaussian elimination
    to invert the resulting matrix and obtain the coefficients of the polynomial.
    Finally, it printed the coefficients of the polynomial.'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 11](c11.xhtml)** covers the use of ChatGPT to generate an example
    Java code to store a document in the latest IBM FileNet Document Management system,
    using the FileNet Java API. The code, generated by ChatGPT, after some additional
    download libraries, established a connection to the FileNet server, created a
    new document, set the document properties, added content to it, saved the document,
    and then filed it in the specified Object Store folder.'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 12](c12.xhtml)** covers the conclusions and the future of ChatGPT
    for program development. We describe the ChatGPT 3.5 knowledge cutoff in September
    2021, and the subsequent ongoing developments by the OpenAI Foundation to enhance
    this knowledge base and therapid development of the beta ChatGPT 4.0 currently
    released. We also give some indications for the road map of future versions of
    ChatGPT 5.0.'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Chapter 13](c13.xhtml)** provides Appendices with references and additional
    ChatGPT questions including information on other IBM systems supporting AI development,
    including the impact of Quantum Computing developments on AI processing.'
  prefs: []
  type: TYPE_NORMAL
