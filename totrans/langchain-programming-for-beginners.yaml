  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: '---'
- en: This is because the LLM has the answer in its training data, so it decides to
    answer directly.
  id: totrans-995
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为LLM在其训练数据中已经有了答案，所以它决定直接回答。
- en: Adding Streamlit UI for the Agent
  id: totrans-996
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为代理添加Streamlit UI
- en: Now that the agent is running, you can add the Streamlit UI to improve the user
    experience.
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: 现在代理正在运行，你可以添加Streamlit UI来提高用户体验。
- en: 'You only need to add a single chat_input to accept a task, then write the question
    and answer as follows:'
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需要添加一个chat_input来接受任务，然后按照以下方式编写问题和答案：
- en: import streamlit as st
  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: 导入streamlit库作为st
- en: '... other code'
  id: totrans-1000
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '...其他代码'
- en: agent_executor = AgentExecutor(agent=agent, tools=tools, verbose=True)
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: agent_executor = AgentExecutor(agent=agent, tools=tools, verbose=True)
- en: st.title("AI Agent")
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: st.title("AI Agent")
- en: 'question = st.chat_input("Give me a task: ")'
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: question = st.chat_input("给我一个任务：")
- en: 'if question:'
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 'if question:'
- en: 'with st.chat_message("user"):'
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 'with st.chat_message("user"):'
- en: st.markdown(question)
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: st.markdown(question)
- en: 'with st.chat_message("assistant"):'
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: 'with st.chat_message("assistant"):'
- en: 'for response in agent_executor.stream({"input": question}):'
