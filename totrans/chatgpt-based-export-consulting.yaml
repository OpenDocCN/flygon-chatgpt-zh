  prefs: []
  type: TYPE_NORMAL
- en: 'Iterative Refinement: Start with a basic prompt to get an overview and then
    refine the output by providing more detailed background information and asking
    deepening questions. This approach ensures that the strategy is well-aligned with
    the client’s goals and market conditions.'
