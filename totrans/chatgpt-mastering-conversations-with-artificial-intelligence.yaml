- en: – Methodology (e.g., Feynman methodology), argument structure
  prefs: []
  type: TYPE_NORMAL
- en: – Data privacy, ethical considerations, feedback incorporation
  prefs: []
  type: TYPE_NORMAL
- en: – Clear multi-step instructions for complex tasks
  prefs: []
  type: TYPE_NORMAL
- en: – Adaptability based on evolving data
  prefs: []
  type: TYPE_NORMAL
- en: – Comparative analyses with pros, cons, and potential outcomes
  prefs: []
  type: TYPE_NORMAL
- en: – Necessary data for the model to execute the request (e.g., text to summarize)
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 1: Seeking Writing Advice'
  prefs: []
  type: TYPE_NORMAL
- en: 'TASK GUIDELINES:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Consider a casual, informative tone.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Suggest subheadings that capture each aspect of sustainable living.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Use examples from recent articles.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 2: Programming Task Assistance'
  prefs: []
  type: TYPE_NORMAL
- en: 'TASK GUIDELINES:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Follow best practices for mobile-first design.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Explain the use of media queries for responsiveness.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Provide code snippets and explanations.*'
  prefs: []
