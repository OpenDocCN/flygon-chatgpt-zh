  zh: '[*第一章*](Chapter_1.xhtml#_idTextAnchor037)，*从自动化到完整的软件开发生命周期：GenAI的当前机遇*'
- en: '[*Chapter 2*](Chapter_2.xhtml#_idTextAnchor061), *Your Quickstart Guide to
    OpenAI API*'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[*第二章*](Chapter_2.xhtml#_idTextAnchor061)，*OpenAI API快速入门指南*'
