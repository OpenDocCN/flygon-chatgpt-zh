  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 我们人类始终感到需要衡量和量化事物。在计算机（BC，即计算机之前）的早期时代，我们使用周围任何东西来帮助我们计数和记录我们所拥有的东西。棍子、石头、骨头、贝壳以及各种其他在地上找到的东西，都被用来计算我们无法存储在头脑中的东西。根据《大英词典》的解释，单词“计算”意味着“估算或计算（一个数字或数量）。”更非正式（但仍然被词典认可）的词义是，“似乎合理；有道理。”换句话说，计算意味着想出某个东西，或者对周围的世界有所理解。
