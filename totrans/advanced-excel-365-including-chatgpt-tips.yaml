- en: Using For Each… Next Statements
  id: totrans-3052
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 For Each… Next 语句
- en: For Each...Next statements repeat a block of statements for each object in a
    collection or element in an array.
  id: totrans-3053
  prefs: []
  type: TYPE_NORMAL
  zh: For Each...Next 语句会为集合中的每个对象或数组中的每个元素重复执行一组语句。
- en: Visual Basic automatically sets a variable each time the loop runs.
  id: totrans-3054
  prefs: []
  type: TYPE_NORMAL
  zh: 每次循环运行时，Visual Basic 会自动设置一个变量。
- en: Any number of Exit For statements may be placed anywhere in the loop as an alternative
    way to exit.
  id: totrans-3055
  prefs: []
  type: TYPE_NORMAL
  zh: 可以在任何位置放置任意数量的 Exit For 语句，作为退出循环的另一种方式。
- en: 'Syntax:'
  id: totrans-3056
  prefs: []
  type: TYPE_NORMAL
  zh: 语法：
- en: For Each element In group
  id: totrans-3057
  prefs: []
  type: TYPE_NORMAL
  zh: For Each 元素 In group
- en: '[statements]'
  id: totrans-3058
  prefs: []
  type: TYPE_NORMAL
  zh: '[语句]'
- en: '[Exit For]'
  id: totrans-3059
  prefs: []
  type: TYPE_NORMAL
  zh: '[退出 For]'
- en: '[statements]'
  id: totrans-3060
  prefs: []
  type: TYPE_NORMAL
  zh: '[语句]'
- en: Next [element]
  id: totrans-3061
  prefs: []
  type: TYPE_NORMAL
  zh: Next [element]
- en: 'Required: Variable used to iterate through the elements of the collection or
    array. For collections, element can only be a Variant variable, a generic object
    variable, or any specific object variable. For arrays, element can only be a Variant
    variable.'
  id: totrans-3062
  prefs: []
  type: TYPE_NORMAL
  zh: 必需：用于遍历集合或数组元素的变量。对于集合，元素只能是一个 Variant 变量、一个通用对象变量或任何特定对象变量。对于数组，元素只能是一个 Variant
    变量。
- en: 'Group: Required. The name of an object collection or array'
  id: totrans-3063
  prefs: []
  type: TYPE_NORMAL
  zh: 组：必需。对象集合或数组的名称
- en: Statements
  id: totrans-3064
  prefs: []
  type: TYPE_NORMAL
  zh: 语句
- en: Optional. One or more statements that are executed on each item in group.
  id: totrans-3065
  prefs: []
  type: TYPE_NORMAL
  zh: 可选。在组中的每个项目上执行的一个或多个语句。
