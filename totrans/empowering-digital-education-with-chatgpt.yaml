- en: In synthesizing insights derived from the extensive literature review presented
    in [Table 18.1](#ch26.xhtml#t32), we endeavor to construct a robust conceptual
    framework that bridges theoretical foundations with practical approaches. The
    aim is to provide a comprehensive guide for understanding and mitigating the challenges
    posed by ChatGPT and other LLM generative AI tools in university environments,
    particularly in the context of management education.
  id: totrans-3173
  prefs: []
  type: TYPE_NORMAL
  zh: 在综合[表18.1](#ch26.xhtml#t32)中展示的广泛文献回顾所得出的见解时，我们努力构建一个稳健的概念框架，将理论基础与实际方法相结合。目标是提供一个全面的指南，以理解和减轻ChatGPT和其他LLM生成AI工具在大学环境中，特别是在管理教育背景下所提出的挑战。
- en: The theoretical underpinnings gleaned from the exploration of collaborative
    decision-making and the role of ChatGPT in management education serve as the foundational
    elements for our synthesis. Drawing from social constructivism, shared mental
    models, and distributed cognition, our synthesis highlights the importance of
    collaborative decision-making processes in addressing the limitations of AI tools
    like ChatGPT. The synthesis underscores the need to integrate theoretical perspectives
    that acknowledge the cognitive processes distributed across both humans and AI
    tools. By doing so, we aim to create a framework that not only complements the
    capabilities of ChatGPT but also addresses the nuanced requirements of managerial
    decision-making and skill development. Our conceptual framework hinges on the
    seamless integration of collaborative decision-making and customized AI tools
    within the educational landscape. The framework posits that the synergy between
    human intelligence, as facilitated by collaborative decision-making, and AI tools,
    like ChatGPT, can cultivate a learning environment that transcends the limitations
    posed by AI in isolation.
  id: totrans-3174
  prefs: []
  type: TYPE_NORMAL
  zh: 从对协作决策探索和ChatGPT在管理教育中角色的研究中汲取的理论基础，构成了我们综合分析的基础元素。借鉴社会建构主义、共享心智模式和分布式认知，我们的综合分析突出了在应对ChatGPT等AI工具的局限性时，协作决策过程的重要性。综合分析强调了需要整合承认人类和AI工具之间认知过程分布的理论视角。通过这样做，我们旨在创建一个框架，不仅补充ChatGPT的能力，而且解决管理决策和技能发展的细微要求。我们的概念框架依赖于在教育环境中无缝集成协作决策和定制AI工具。该框架认为，通过协作决策促进的人类智能与AI工具（如ChatGPT）之间的协同作用，可以培养一个超越AI孤立局限性的学习环境。
- en: 'Key Components of the Conceptual Framework:'
  id: totrans-3175
  prefs: []
  type: TYPE_NORMAL
  zh: 概念框架的关键组成部分：
- en: 'Collaborative Decision-Making: Integration of modules that promote collaborative
    decision-making within management courses, leveraging theoretical insights from
    social constructivism and shared mental models.'
  id: totrans-3176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协作决策：在管理课程中整合促进协作决策的模块，利用社会建构主义和共享心智模式的理论洞察。
- en: 'Customization of AI Tools: Tailoring AI tools, such as ChatGPT, to suit specific
    educational objectives, aligning them with the curriculum and mitigating biases
    through collaborative refinement.'
  id: totrans-3177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能工具定制：将人工智能工具，如ChatGPT，定制以适应特定的教育目标，使其与课程相一致，并通过协作优化来减轻偏见。
- en: 'Ethical Decision-Making Integration: Embedding modules on ethical decision-making
    within the framework to address ethical concerns associated with AI-generated
    content.'
  id: totrans-3178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 道德决策整合：在框架内嵌入道德决策模块，以解决与人工智能生成内容相关的道德问题。
- en: 'Interdisciplinary Collaborations: Encouraging collaborative projects that transcend
    disciplinary boundaries, drawing from the principles of distributed cognition.'
  id: totrans-3179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跨学科合作：鼓励超越学科边界的协作项目，借鉴分布式认知的原则。
- en: The conceptual framework guides the identification of key variables crucial
    for the empirical validation of our proposed approaches. These variables are informed
    by both theoretical considerations and practical insights derived from the literature,
    ensuring a holistic and methodologically sound survey design.
  id: totrans-3180
  prefs: []
  type: TYPE_NORMAL
  zh: 概念框架指导了关键变量的识别，这些变量对于我们提出的方法的经验验证至关重要。这些变量既受到理论考虑的影响，也受到从文献中获得的实践洞察的影响，确保了全面且方法上合理的调查设计。
- en: 'Effectiveness of Collaborative Decision-Making: Assessing the perceived impact
    of collaborative decision-making modules on the development of critical managerial
    skills.'
  id: totrans-3181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协作决策有效性：评估协作决策模块对培养关键管理技能发展感知的影响。
- en: 'Customization Preferences: Understanding the preferences of educators, students,
    and industry managers regarding the customization of AI tools for educational
    use.'
  id: totrans-3182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定制偏好：了解教育工作者、学生和行业经理对用于教育目的的人工智能工具定制的偏好。
- en: 'Ethical Concerns: Investigating the ethical considerations associated with
    AI-generated content and the integration of ethical decision-making modules.'
  id: totrans-3183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 道德关注点：调查与人工智能生成内容相关的道德考虑以及道德决策模块的整合。
- en: 'Collaborative Learning Outcomes: Evaluating the outcomes of interdisciplinary
    collaborations on collaborative decision-making and learning experiences.'
  id: totrans-3184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协作学习成果：评估跨学科合作对协作决策和学习体验的影响。
- en: 18.3 Methodology
  id: totrans-3185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 18.3 方法论
- en: The research methodology employed seeks to empirically validate and refine a
    conceptual framework derived from an extensive literature review. The selection
    of a survey as the primary research method stems from its efficiency in collecting
    a diverse range of perspectives. Given the multi-stakeholder nature of the study
    involving educators, students, and industry managers, a survey provides a systematic
    approach to glean insights on the effectiveness of collaborative decision-making
    strategies and the challenges posed by ChatGPT in management education. Furthermore,
    a survey enables the collection of quantitative data, facilitating the analysis
    of trends, patterns, and correlations. This methodological choice aligns with
    the research objective of deriving empirical evidence to support and refine proposed
    approaches within the conceptual framework.
  id: totrans-3186
  prefs: []
  type: TYPE_NORMAL
  zh: 采用的研究方法论旨在通过广泛的文献综述来经验验证和优化概念框架。选择调查作为主要的研究方法源于其在收集各种观点方面的效率。鉴于研究涉及教育工作者、学生和行业经理的多利益相关者性质，调查提供了一种系统的方法来获取关于协作决策策略的有效性和ChatGPT在管理教育中提出的挑战的见解。此外，调查能够收集定量数据，便于分析趋势、模式和相关性。这一方法论选择与研究目标相一致，即从概念框架中得出经验证据以支持和优化提出的方法。
- en: 'Survey questions are crafted to ensure a targeted exploration of key variables
    identified in the conceptual framework. These questions are designed to capture
    nuanced perspectives on collaborative decision-making, the role of ChatGPT, and
    proposed practical approaches within the educational landscape:'
  id: totrans-3187
  prefs: []
  type: TYPE_NORMAL
  zh: 调查问题被精心设计，以确保对概念框架中确定的关键变量进行有针对性的探索。这些问题旨在捕捉关于协作决策、ChatGPT的作用以及教育环境中提出的实际方法的细微观点：
- en: 'Collaborative Decision-Making Effectiveness: How is the impact of collaborative
    decision-making modules perceived in the development of critical managerial skills?
    To what extent does collaborative decision-making contribute to enhanced learning
    outcomes?'
  id: totrans-3188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协作决策有效性：协作决策模块在培养关键管理技能发展中的影响是如何被感知的？协作决策在提高学习成果方面贡献了多大？
- en: 'Customization Preferences: How should AI tools, like ChatGPT, be customized
    to better suit educational objectives? To what degree is customization of AI tools
    necessary to address educational challenges?'
  id: totrans-3189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定制偏好：如何定制像ChatGPT这样的AI工具，以更好地适应教育目标？在解决教育挑战方面，AI工具的定制程度需要达到什么程度？
- en: 'Ethical Considerations: What ethical concerns are associated with AI-generated
    content in educational settings? How important is the integration of ethical decision-making
    modules in management education?'
  id: totrans-3190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 伦理考量：在教育环境中，与AI生成内容相关的伦理问题有哪些？在管理教育中，整合伦理决策模块的重要性如何？
- en: 'Interdisciplinary Collaborations: Have you participated in collaborative projects
    involving interdisciplinary collaborations, and if so, what were the perceived
    outcomes? To what extent do interdisciplinary collaborations contribute to collaborative
    decision-making and learning experiences?'
  id: totrans-3191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跨学科合作：你是否参与过涉及跨学科合作的协作项目，如果是的话，你认为结果如何？跨学科合作在协作决策和学习体验中起到了多大程度的贡献？
- en: The survey targets three primary groups within the university environment. The
    sampling strategy ensures representation from each target group within the context
    of Morocco.
  id: totrans-3192
  prefs: []
  type: TYPE_NORMAL
  zh: 本调查针对大学环境中的三个主要群体。抽样策略确保在摩洛哥的背景下，每个目标群体都有代表。
- en: 'Professors: Inclusion Criteria: Professors currently engaged in teaching management
    courses at universities in Morocco. Sampling Method: Purposeful sampling, reaching
    out to academic institutions across Morocco via email and LinkedIn, ensuring representation
    from different universities and academic backgrounds.'
  id: totrans-3193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教授们：纳入标准：目前在摩洛哥大学教授管理课程的教授。抽样方法：目的抽样，通过电子邮件和LinkedIn联系摩洛哥各地的学术机构，确保来自不同大学和学术背景的代表。
- en: 'Students: Inclusion Criteria: Students enrolled in management programs at Moroccan
    universities. Sampling Method: Random sampling through online platforms, targeting
    various universities and academic levels to capture a diverse student population.'
  id: totrans-3194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学生：纳入标准：在摩洛哥大学就读的管理学课程的学生。抽样方法：通过在线平台进行随机抽样，针对不同大学和学术水平，以捕捉多样化的学生群体。
- en: 'Company Managers: Inclusion Criteria: Managers holding decision-making positions
    in Moroccan companies, particularly those involved in hiring management graduates.
    Sampling Method: Utilization of email addresses and professional networks on LinkedIn,
    ensuring representation from diverse industries and company sizes.'
  id: totrans-3195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公司经理：纳入标准：在摩洛哥公司担任决策职位的经理，尤其是那些参与招聘管理毕业生的经理。抽样方法：利用电子邮件地址和LinkedIn上的专业网络，确保来自不同行业和公司规模的代表。
- en: The inclusion of these diverse stakeholders enriches survey responses, ensuring
    a comprehensive understanding of challenges and opportunities associated with
    collaborative decision-making and AI integration in management education.
  id: totrans-3196
  prefs: []
  type: TYPE_NORMAL
  zh: 包含这些多样化的利益相关者丰富了调查回应，确保对协作决策和管理教育中AI整合的挑战和机遇有一个全面的理解。
- en: Given the online nature of the study in Morocco, the survey was distributed
    via email. Additionally, LinkedIn groups served as platforms for reaching professors,
    and company managers and targeted Facebook groups for students. The total responses
    garnered, comprising 978 students, 167 professors, and 213 company managers, attest
    to the efficacy of the chosen online distribution channels.
  id: totrans-3197
  prefs: []
  type: TYPE_NORMAL
  zh: 由于摩洛哥研究在线性质，调查通过电子邮件分发。此外，LinkedIn群组作为联系教授、公司经理和针对学生的目标Facebook群组的平台。总共收集到的回应，包括978名学生、167名教授和213名公司经理，证明了所选在线分发渠道的有效性。
- en: 18.4 Results
  id: totrans-3198
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 18.4 结果
- en: The results of the survey provide a rich tapestry of insights, offering a nuanced
    understanding of the perceptions and preferences of students, professors, and
    company managers regarding collaborative decision-making strategies in the context
    of management education. The analysis is structured to align with the main objectives
    of the study, as outlined in the conceptual framework.
  id: totrans-3199
  prefs: []
  type: TYPE_NORMAL
  zh: 调查结果提供了一幅丰富的洞察力画卷，提供了对管理教育背景下学生、教授和公司经理对协作决策策略的看法和偏好的细致理解。分析结构旨在与概念框架中概述的主要研究目标保持一致。
- en: 18.4.1 Demographics
  id: totrans-3200
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 18.4.1 人口统计
- en: Before delving into the specific survey responses, it is crucial to contextualize
    the findings by considering the demographics of the respondents. [Table 18.2](#ch26.xhtml#t33)
    presents the survey results, which successfully captured a diverse range of perspectives,
    with students constituting the majority at 62.10%, followed by company managers
    at 13.50%, and professors at 10.60%. This distribution ensures a comprehensive
    view that incorporates the experiences and viewpoints of key stakeholders within
    the management education ecosystem.
  id: totrans-3201
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入具体调查回答之前，通过考虑受访者的背景信息来对调查结果进行上下文化至关重要。[表18.2](#ch26.xhtml#t33)展示了调查结果，成功地捕捉到了一个多样化的观点范围，其中学生占多数，为62.10%，其次是公司经理，占13.50%，教授占10.60%。这种分布确保了一个全面的视角，纳入了管理教育生态系统内关键利益相关者的经验和观点。
- en: '[Table 18.2](#ch26.xhtml#t33b) Role'
  id: totrans-3202
  prefs: []
  type: TYPE_NORMAL
  zh: '[表18.2](#ch26.xhtml#t33b) 角色'
- en: '| **Role** | **Frequency** | **Percentage** |'
  id: totrans-3203
