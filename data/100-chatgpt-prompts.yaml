  type: TYPE_NORMAL
  zh: 你的受众最喜欢哪种类型的内容？
- en: What is the goal of your TikTok engagement strategy (more comments, duets, stitches)?
  id: totrans-496
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的TikTok参与度策略的目标是什么（更多评论、合唱、拼接）？
- en: Do you prefer using humor, education, or storytelling in your content?
  id: totrans-497
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你更倾向于在内容中使用幽默、教育还是讲故事？
