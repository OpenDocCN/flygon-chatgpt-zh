- en: '**HANDLING OUTLIERS IN PANDAS**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you are unfamiliar with outliers and anomalies, please search for an online
    article that discusses these two concepts because this section uses Pandas to
    find outliers in a dataset. The key idea involves finding the “z score” of the
    values in the dataset, which involves calculating the mean sigma and standard
    deviation std, and then mapping each value x in the dataset to the value (x-sigma)/std.
  prefs: []
  type: TYPE_NORMAL
- en: Next, you specify a value of z (such as 3) and find the rows whose z score is
    greater than 3\. These are the rows that contain values that are considered outliers.
    *Note that a suitable value for the z score is your decision (not some other external
    factor).*
  prefs: []
  type: TYPE_NORMAL
- en: '[Listing 3.23](#list3-23) displays the contents of outliers_zscores.py that
    illustrates how to find rows of a dataset whose z-score greater than (or less
    than) a specified value.'
  prefs: []
  type: TYPE_NORMAL
- en: '***LISTING 3.23: outliers_zscores.py***'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE239]'
  prefs: []
  type: TYPE_PRE
- en: '[Listing 3.23](#list3-23) initializes the variable df with the contents of
    the built-in Iris dataset. Next, the variable columns is initialized with the
    column names, and the DataFrame iris_df is initialized from the contents of df.data
    that contains the actual data for the Iris dataset. In addition, iris_df.columns
    is initialized with the contents of the variable columns.'
  prefs: []
  type: TYPE_NORMAL
- en: The next portion of [Listing 3.23](#list3-23) displays the shape of the DataFrame
    iris_df, followed by the z-score of the iris_df DataFrame, which is computed by
    subtracting the mean and then dividing by the standard deviation (performed for
    each row).
  prefs: []
  type: TYPE_NORMAL
- en: 'The last two portions of [Listing 3.23](#list3-23) display the outliers (if
    any) whose z-score is outside the interval [0.01, 2.5]. Launch the code in [Listing
    3.23](#list3-23) and you will see the following output:'
  prefs: []
  type: TYPE_NORMAL
