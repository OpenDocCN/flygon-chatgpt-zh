  type: TYPE_NORMAL
  zh: 图 5.27 计算常旅客与总机场用户比例的表格
- en: Analysis with R
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 R 进行分析
- en: Using the Case Dataset files provided, open the [Chapter 5](14_ch05.xhtml) folder,
