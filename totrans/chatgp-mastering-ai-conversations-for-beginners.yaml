  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让机器“聊天”给我们，它们需要使用我们熟悉的词汇。换句话说，AI必须能够处理自然语言，不仅是在输入（计算信息）上，也在输出（告诉我们关于那些信息）上。
- en: '****Inte**lligen**t ****Rob**otic**s'
  id: totrans-346
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 当AI在过去获取信息时，它通常是以数字的形式。正如我们在本章前面看到的，所有的早期计算设备都是为了帮助我们跟踪数字、解决数学方程和从数据集中隔离趋势而制造的。如今，计算机做的远不止计算数字。通过机器学习，AI现在精通所有人类语言，无论是口语还是书面语。它可以回答问题，根据请求生成新的文本，甚至比世界上最好的多语种翻译者翻译得更快。尽管AI在目前可能没有母语者的同样流畅，但这是时间问题，多亏了机器学习领域称为自然语言处理的一个子领域。
