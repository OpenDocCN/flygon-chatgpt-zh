  zh: '**欧洲**，在法律和法规方面引领世界，保护其公民的个人数据，实施了一项名为**通用数据保护条例（GDPR**）的政策。**GDPR**旨在通过规范组织可以收集和存储的数据，以及规范他们如何使用他们获取的个人数据来保护欧洲4亿公民的个人数据。而且，与美国的隐私规则和法规不同（这些规则和法规在州一级而非整个大陆范围内实施），欧洲的**GDPR**即便某人的个人信息在线上容易获取，也适用。换句话说，仅仅因为一家公司可以公开访问某人的信息，并不意味着该公司可以随意处理这些信息。这使欧洲在许多最大的科技和社会媒体公司的隐私政策方面处于世界领先地位，当然，也包括OpenAI。'
