- en: Code Documentation & Maintenance
  id: totrans-1836
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 代码文档与维护
- en: Good documentation turns good code into great code. This chapter offers prompts
    to create, maintain, and improve your documentation, ensuring that your work is
    understandable, maintainable, and ready for the future.
  id: totrans-1837
  prefs: []
  type: TYPE_NORMAL
  zh: 良好的文档将优秀的代码转化为卓越的代码。本章提供提示以创建、维护和改进您的文档，确保您的工作易于理解、可维护并准备好迎接未来。
