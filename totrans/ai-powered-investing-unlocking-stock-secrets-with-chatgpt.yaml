    **A**I **too**ls **li**ke **Chat**GPT **c**an **he**lp.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在股票市场中投资，首先要了解你关注的公司的基本情况。这包括技术巨头、新生物技术公司或大型消费品公司。明智选择的关键是理解企业的核心。本章深入探讨股票分析的基本知识，展示ChatGPT等AI工具如何帮助。
- en: '**2**.**1** **Wh**at **i**s **Fundam**ental **Anal**ysis?'
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**2.1** 基本分析是什么？'
- en: '**Fundam**ental **anal**ysis **che**cks **a** **comp**any''**s** **finan**cial
    **hea**lth, **i**ts **pla**ce **i**n **t**he **indu**stry, **a**nd **gro**wth
    **chan**ces. **I**t **loo**ks **a**t **wh**at **mak**es **a** **comp**any **str**ong
    **ov**er **ti**me. **Th**is **i**s **diffe**rent **fr**om **techn**ical **anal**ysis,
    **whi**ch **focu**ses **o**n **pri**ce **chan**ges **a**nd **cha**rts.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 基本分析检查公司的财务健康、其在行业中的地位以及增长机会。它关注的是使公司长期强大的因素。这与侧重于价格变化和图表的技术分析不同。
- en: '**K**ey **goa**ls **o**f **fundam**ental **anal**ysis **a**re:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 基本分析的关键目标是：
- en: • **Chec**king **a** **comp**any’**s** **pro**fit **a**nd **h**ow **we**ll **i**t
    **us**es **resou**rces.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: • 检查一家公司的利润及其资源利用情况。
- en: • **Look**ing **a**t **i**ts **finan**cial **hea**lth **a**nd **de**bt **manag**ement.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: • **审视其财务健康和债务管理。
- en: • **Underst**anding **i**ts **sp**ot **i**n **t**he **indu**stry **a**nd **h**ow
    **i**t **fi**ts **wi**th **tre**nds.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: • **理解其在行业中的位置以及它如何与趋势相匹配。
- en: • **Find**ing **t**he **tr**ue **val**ue **o**f **a** **sto**ck **t**o **sp**ot
    **go**od **bu**ys **o**r **sel**ls.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: • **找到股票的真实价值以发现好的买卖点。
- en: '**Inves**tors **u**se **th**is **in**fo **t**o **dec**ide **t**o **b**uy, **ho**ld,
    **o**r **se**ll. **Th**ey **mat**ch **the**ir **choi**ces **wi**th **the**ir **mon**ey
    **goa**ls **a**nd **h**ow **mu**ch **ri**sk **th**ey **c**an **ta**ke.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**I**n**v**e**s**t**o**r**s **u**s**e** **t**h**i**s **i**n**f**o** **t**o
    **d**e**c**i**d**e **t**o **b**u**y**, **h**o**l**d**, **o**r **s**e**l**l**.
    **T**h**e**y **m**a**t**c**h **t**h**e**i**r **c**h**o**i**c**e**s **w**i**t**h
    **t**h**e**i**r **m**o**n**e**y **g**o**a**l**s **a**n**d **h**o**w **m**u**c**h
    **r**i**s**k**t**h**e**y **c**a**n **t**a**k**e**.'
- en: '**2**.**2** **T**he **Co**re **Pill**ars **o**f **Fundam**ental **Anal**ysis'
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**2**.**2** **基本面分析的核心支柱**'
- en: '**Inves**tors **lo**ok **a**t **thr**ee **ma**in **are**as **f**or **a** **fu**ll
    **anal**ysis: **finan**cial **state**ments, **qualit**ative **fact**ors, **a**nd
    **outs**ide **influ**ences.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**I**n**v**e**s**t**o**r**s **l**o**o**k **a**t **t**h**r**e**e **m**a**i**n
    **a**r**e**a**s **f**o**r **a **f**u**l**l **a**n**a**l**y**s**i**s**:** **f**i**n**a**n**c**i**a**l
    **s**t**a**t**e**m**e**n**t**s**, **q**u**a**l**i**t**a**t**i**v**e **f**a**c**t**o**r**s**,
    **a**n**d **o**u**t**s**i**d**e **i**n**f**l**u**e**n**c**e**s**.'
- en: '**1**. **Finan**cial **State**ments'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**1**. **财务报表**'
- en: '**Finan**cial **state**ments **gi**ve **a** **qui**ck **lo**ok **a**t **a**
    **comp**any’**s** **perfor**mance. **T**he **thr**ee **k**ey **on**es **a**re:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**F**i**n**a**n**c**i**a**l **s**t**a**t**e**m**e**n**t**s **g**i**v**e **a
    **q**u**i**c**k **l**o**o**k **a**t **a **c**o**m**p**a**n**y**’**s **p**e**r**f**o**r**m**a**n**c**e**.
    **T**h**e **t**h**r**e **k**e**y**s **a**r**e**:'
- en: '· **Bala**nce **She**et:**Th**is **sho**ws **a** **comp**any’**s** **ass**ets,
    **deb**ts, **a**nd **wh**at **own**ers **o**wn. **I**t **sho**ws **i**ts **finan**cial
    **sta**te **a**t **a** **cert**ain **ti**me. **Impor**tant **numb**ers **incl**ude:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: · **资产负债表**：这显示了公司的资产、负债以及所有者拥有的东西。它显示了公司在特定时间点的财务状况。重要的数字包括：
- en: '**o** **Curr**ent **rat**io (**h**ow **liq**uid **i**t **i**s).'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**o** **流动比率**（**流动性如何**）。'
- en: '**o** **De**bt-**t**o-**equ**ity **rat**io (**h**ow **mu**ch **de**bt **i**t
    **h**as). **o** **N**et **work**ing **capi**tal (**i**ts **sho**rt-**te**rm **mon**ey
    **hea**lth).'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**o** **资产负债率**（**债务有多少**）。**o** **网络资本**（其短期资金健康）。'
- en: '· **Inc**ome **State**ment: **Th**is **sho**ws **h**ow **profi**table **a**
    **comp**any **w**as **ov**er **a** **ti**me. **Inves**tors **lo**ok **a**t **thi**ngs
    **li**ke:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: · **利润表**：这显示了公司在一段时间内的盈利能力。投资者关注的事项包括：
- en: '**o** **Reve**nue **gro**wth.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**o** **收入增长**。'
- en: '**o** **Gro**ss **pro**fit **mar**gin.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**o** **毛利率**。'
- en: '**o** **Opera**ting **inc**ome **a**nd **n**et **inc**ome.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**o** **营业收入和净收入**。'
- en: '· **Ca**sh **Fl**ow **State**ment: **Th**is **sho**ws **ca**sh **com**ing **i**n
    **a**nd **goi**ng **o**ut. **I**t **sho**ws **h**ow **we**ll **a** **comp**any
    **mana**ges **mon**ey. **Impor**tant **numb**ers **incl**ude:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: · **现金流量表**：这显示了现金的流入和流出。它显示了公司管理资金的能力。重要的数字包括：
- en: '**o** **Opera**ting **ca**sh **fl**ow.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**o** **经营活动现金流**。'
- en: '**o** **Fr**ee **ca**sh **fl**ow.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**o** **自由现金流**。'
- en: '**o** **Ca**sh **fl**ow **eno**ugh **f**or **de**bt **paym**ent.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**o** **现金流足以偿还债务**。'
- en: '**2**. **Qualit**ative **Fact**ors'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**2**. **定性因素**'
- en: '**Numb**ers **a**re **impor**tant, **b**ut **th**ey **d**on’**t** **te**ll
    **every**thing. **Qualit**ative **fact**ors **li**ke **manag**ement, **bra**nd,
    **a**nd **compet**itive **ed**ge **a**re **k**ey **t**o **lo**ng-**te**rm **succ**ess.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**N**umbers **a**re **i**m**p**o**r**t**a**n**t, **b**u**t **t**h**e**y **d**o**n’**t
    **t**e**ll **e**v**e**r**y**t**h**i**n**g. **Qual**i**t**a**t**i**v**e **f**a**c**t**o**r**s**
    **l**i**k**e **m**a**n**a**g**e**m**e**n**t, **b**r**a**n**d, **a**n**d **c**o**m**p**e**t**i**t**i**v**e
    **e**d**g**e** **a**r**e **k**e**y**t**o**l**o**n**g**-**t**e**r**m **s**u**c**c**e**s**s**.'
- en: '• **Manag**ement **a**nd **Leade**rship: **Go**od **lead**ers **c**an **dri**ve
    **innov**ation **a**nd **han**dle **chall**enges.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: • **管理和领导力**：优秀的领导者能够推动创新并应对挑战。
- en: • **Mo**at:**T**he **comp**any’**s** **w**ay **t**o **st**ay **ahe**ad, **li**ke
    **uni**que **techn**ology **o**r **str**ong **cust**omer **loya**lty.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: • **护城河**：公司保持领先地位的途径，如独特技术或强大的客户忠诚度。
- en: '• **Indu**stry **Positi**oning: **H**ow **we**ll **t**he **comp**any **fi**ts
    **i**n **i**ts **sec**tor **a**nd **i**ts **abil**ity **t**o **ke**ep **u**p **wi**th
    **tre**nds.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: • **行业定位**：公司在其行业中的位置以及其跟上趋势的能力。
- en: '**3**. **Exte**rnal **Influ**ences'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**3**. **外部影响**'
- en: '**B**ig **econ**omic **fact**ors **a**nd **indu**stry **tre**nds **al**so **aff**ect
    **a** **comp**any’**s** **fut**ure.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**大经济因素和行业趋势也会影响公司的未来**。'
- en: '• **Econ**omic **Indic**ators: **G**DP **gro**wth, **infla**tion, **a**nd **inte**rest
    **rat**es **sha**pe **t**he **mar**ket.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: • **经济**指标：**GDP**增长、**通胀**和**利率**塑造市场。
- en: '• **Regul**atory **Enviro**nment: **Gover**nment **rul**es **c**an **grea**tly
    **imp**act **cert**ain **indus**tries.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: • **监管环境**：政府规则可以极大地影响某些行业。
- en: '• **Glo**bal **Tre**nds: **Chan**ges **i**n **cons**umer **hab**its, **techn**ology,
    **a**nd **wor**ld **eve**nts **oft**en **cha**nge **mar**ket **tre**nds.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: • **全球趋势**：消费者习惯、技术和世界事件的变化经常改变市场趋势。
- en: '**2**.**3** **Valua**tion **Techn**iques'
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**2.3 估值技术**'
- en: '**T**he **go**al **o**f **fundam**ental **anal**ysis **i**s **t**o **fi**nd
    **a** **comp**any’**s** **tr**ue **val**ue. **W**e **u**se **seve**ral **meth**ods
    **t**o **d**o **th**is:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**基本面分析的目标是找到公司的真实价值。我们使用多种方法来完成这项工作**：'
- en: • **Pri**ce-**t**o-**Earn**ings (**P**/**E**) **Rat**io:**Th**is **met**hod
    **comp**ares **t**he **sto**ck’**s** **pri**ce **t**o **i**ts **earn**ings. **I**t
    **hel**ps **u**s **s**ee **i**f **t**he **sto**ck **i**s **t**oo **expen**sive
    **o**r **n**ot.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: • **市盈率（P/E）**：这种方法比较股票的价格与其收益。它帮助我们判断股票是否过于昂贵或不够。
- en: • **Pri**ce-**t**o-**Bo**ok (**P**/**B**) **Rat**io:**I**t **sho**ws **h**ow
    **t**he **sto**ck’**s** **mar**ket **val**ue **comp**ares **t**o **i**ts **bo**ok
    **val**ue.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: • **市净率（P/B）**：它显示了股票的市场价值与其账面价值的比较。
- en: '• **Disco**unted **Ca**sh **Fl**ow (**D**CF): **Th**is **met**hod **estim**ates
    **t**he **pres**ent **val**ue **o**f **fut**ure **ca**sh **flo**ws. **I**t’**s**
    **a** **deta**iled **w**ay **t**o **val**ue **a** **comp**any.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: • **折现现金流（DCF）**：这种方法估计未来现金流的现值。它是一种详细评估公司的方法。
- en: '**Know**ing **the**se **meth**ods **hel**ps **inves**tors **ma**ke **sma**rt,
    **da**ta-**bas**ed **choi**ces.'
  id: totrans-88
  prefs: []
