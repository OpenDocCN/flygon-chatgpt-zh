- en: Else
  prefs: []
  type: TYPE_NORMAL
- en: Vote = "not eligible"
  prefs: []
  type: TYPE_NORMAL
- en: EndIf
  prefs: []
  type: TYPE_NORMAL
- en: End Function
  prefs: []
