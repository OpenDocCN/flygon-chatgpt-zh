- en: 'Task-Specific Prompt:'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 任务特定提示：
- en: 'Context:'
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文：
- en: '*You are a student preparing a presentation on climate change.*'
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: '*你是一位准备关于气候变化演示的学生。*'
- en: 'Assistant Role:'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 助理角色：
- en: '*GPT Assistant, function as a scientific researcher.*'
  id: totrans-461
