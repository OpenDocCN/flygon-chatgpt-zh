    ****wh**i**l**e** ****mini**m**iz**ing** ****i****t**s** ****ri**s**k**s**.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT** 在短时间内已经通过展示人工智能可以不仅仅是工具，而可以成为**协作伙伴、导师和创造力的催化剂**，从而改变了我们对人工智能的看法。但它也提醒我们，随着这种力量的到来，我们需要负责任地使用它，最大化其益处，同时最小化其风险。'
