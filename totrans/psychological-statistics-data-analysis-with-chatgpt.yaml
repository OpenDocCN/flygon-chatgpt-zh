  type: TYPE_NORMAL
  zh: -       示例设计：
- en: '-       Between-subject design: Each participant is assigned to only one condition.'
  id: totrans-1084
  prefs: []
  type: TYPE_NORMAL
  zh: -       组间设计：每个参与者只分配到一个条件。
- en: '-       Within-subject design: Each participant experiences all conditions.'
  id: totrans-1085
  prefs: []
