  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者（们），独家授权给APress Media, LLC，Springer Nature的一部分，2025L. Evelyn让ChatGPT为你工作[https://doi.org/10.1007/979-8-8688-1445-7_10](https://doi.org/10.1007/979-8-8688-1445-7_10)
- en: 10. Prompts to Use ChatGPT As a Major Time-Saver
  id: totrans-843
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10. 使用ChatGPT作为主要时间节省工具的提示
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: Lydia Evelyn^([1](#Aff2)  )(1)西班牙加泰罗尼亚
- en: Earlier in this book, in Chapter [6](641691_1_En_6_Chapter.xhtml), we simplified
    the concept of data analysis and demonstrated that it’s an everyday occurrence
    that can then be even more simplified by delegating the task to ChatGPT. Likewise,
    when we talk about data conversion, what comes to mind might be very technical
    and complex—something only software developers care about. But just like data
    analysis, data conversion is just as common in an everyday setting.
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的早期章节，在第[6](641691_1_En_6_Chapter.xhtml)章中，我们简化了数据分析的概念，并证明了它是一种日常发生的事情，通过将任务委托给ChatGPT可以进一步简化。同样，当我们谈论数据转换时，可能会想到非常技术性和复杂的事情——这通常是软件开发者关心的事情。但就像数据分析一样，数据转换在日常环境中同样普遍。
- en: If you’re using a recipe from a French blogger, you need to convert the measurements
    from metric to imperial. If you’re thinking about going on a trip abroad, you’re
    going to have to convert your budget to the local currency. Even turning a verbal
    conversation into a digital report to email to your manager is a form of data
    conversion you perform yourself on a daily basis. Data conversion has a multitude
    of practical applications for anybody. So, let’s take a look at how data conversion
    is another powerful feature of ChatGPT, enabling us to convert files, create transcripts
    from audio files, translate entire documents into another language, and even edit
    a photo for Instagram. Let’s get started.
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用的是法国博客作者的食谱，你需要将度量单位从公制转换为英制。如果你在考虑出国旅行，你将不得不将你的预算转换为当地货币。甚至将口头对话转换为电子邮件发送给经理的数字报告也是你每天都会进行的数据转换形式。数据转换对任何人都有多种实际应用。因此，让我们看看数据转换是ChatGPT的另一个强大功能，使我们能够转换文件、从音频文件创建转录本、将整个文档翻译成另一种语言，甚至为Instagram编辑照片。让我们开始吧。
- en: 'What we’ll be covering in this chapter:'
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 本章我们将涵盖的内容：
- en: Optimize your productivity and save time when you’re working with spreadsheets!
    Converting an Excel file into a key insight sales report with charts and graphics.
  id: totrans-848
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你使用电子表格工作时，优化你的生产力并节省时间！将Excel文件转换为包含图表和图形的关键洞察力销售报告。
- en: You went to Paris and had the best macarons of your life, and you want to make
    it at home. Using ChatGPT to translate the language and measurement units from
    a French recipe for macarons.
  id: totrans-849
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你去了巴黎，吃到了你一生中最好的马卡龙，你想要在家里制作它。使用ChatGPT将法式马卡龙食谱的语言和度量单位翻译成中文。
- en: Make quick photo edits for effective social media posts. Using ChatGPT to edit
    and crop various photos.
  id: totrans-850
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为有效的社交媒体帖子快速编辑照片。使用ChatGPT编辑和裁剪各种照片。
- en: Using ChatGPT to Convert an Excel File into a Key Insights Sales Report
  id: totrans-851
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ChatGPT将Excel文件转换为关键洞察力销售报告
- en: ChatGPT can be used to convert files of many different formats, which is a lifesaver
    for anyone who works with documents or images that need to be reformatted for
    different purposes.
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以用来转换多种格式的文件，这对于需要为不同目的重新格式化文档或图像的人来说是一大救星。
- en: Most of us have had to work with Excel or software equivalent to work with large
    tables that contain important data. Working with Excel makes it easy to collaborate
    with other coworkers and leave comments, add formatting, or create charts. But
    it’s no one’s favorite task to look through these often massive tables and interpret
    that information into a report with charts and figures that accurately portray
    what the data implies.
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: 我们中的大多数人不得不使用Excel或类似软件来处理包含重要数据的大型表格。使用Excel使得与其他同事协作、留下评论、添加格式或创建图表变得容易。但查看这些通常庞大的表格并将信息解释成包含图表和图形的报告，准确描绘数据所暗示的内容，并不是任何人的首选任务。
- en: Rather than do all that, we’re going to use ChatGPT to read an Excel file and
    create a sales report with analysis of the data for anyone to read and understand.
    Furthermore, we’re going to instruct ChatGPT to put all of this into a Word document
    on our behalf (Prompt [10-1](#PC1)).Create a Word document explaining the contents
    of these sales records and what they could implicate. In the document, include
    key profitability insights and provide charts to visualize the dataPrompt 10-1
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是做所有这些，我们将使用ChatGPT来读取Excel文件，并为任何人创建一份包含数据分析的销售报告，以便阅读和理解。此外，我们还将指示ChatGPT代表我们把这些内容整理成一个Word文档（提示[10-1](#PC1)）。创建一个Word文档，解释这些销售记录的内容以及它们可能涉及的问题。在文档中，包括关键盈利洞察，并提供图表来可视化数据Prompt
    10-1
- en: 'Telling ChatGPT to explain the contents of an Excel file Figure [10-1](#Fig1)
    shows what it looks like when we submit this prompt to ChatGPT. As you can see,
    it’s very similar to when we uploaded a PDF in previous chapters.![A bar chart
    titled "Total Profit by Region" displays profit data for different regions. The
    chart features orange bars representing total profit, with a vertical axis labeled
    "Total Profit" ranging from 0 to 1.2e7\. The chart includes interactive elements
    with text prompts: "Can you add ROI calculations?" and "Show more insights by
    item type." Above the chart, a table titled "100 Sales Records" lists sales data,
    including regions, countries, item types, and sales channels. The table includes
    entries such as "Australia and Oceania, Tuvalu, Baby Food, Offline" and "Europe,
    Russia, Office Supplies, Offline." A text box suggests creating a Word document
    to explain the sales records and visualize data insights.](../images/641691_1_En_10_Chapter/641691_1_En_10_Fig1_HTML.jpg)'
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: 告诉ChatGPT解释Excel文件的内容图10-1显示了当我们向ChatGPT提交此提示时的样子。如图所示，这与我们在前几章上传PDF时的操作非常相似。![一个标题为“按地区划分的总利润”的柱状图显示了不同地区的利润数据。图表中橙色柱子代表总利润，垂直轴标有“总利润”，范围从0到1.2e7。图表包括交互式元素，带有文本提示：“你能添加ROI计算吗？”和“通过项目类型展示更多洞察。”图表上方有一个标题为“100销售记录”的表格，列出了销售数据，包括地区、国家、项目类型和销售渠道。表格中包括如“澳大利亚和大洋洲，图瓦卢，婴儿食品，线下”和“欧洲，俄罗斯，办公用品，线下”等条目。一个文本框建议创建一个Word文档来解释销售记录并可视化数据洞察。](../images/641691_1_En_10_Chapter/641691_1_En_10_Fig1_HTML.jpg)
- en: Figure 10-1
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-1
- en: Asking ChatGPT to write a sales report ChatGPT generates the document and images
    we asked for in its response. As requested, it generated a .docx file, and in
    Response [10-1](#PC2) you’ll see the report ChatGPT wrote based upon the Excel
    table we sent it.**Sales Records Analysis and Insights**This document presents
    an analysis of the sales records data. Key profitability insights are derived
    based on regions, item types, and sales channels. Visualizations are included
    to highlight significant patterns and trends.**Key Profitability Insights**1\.
    The most profitable region is Sub-Saharan Africa with a total profit of $12183211.40.2\.
    The most profitable item type is Cosmetics with a total profit of $14556048.66.3\.
    The sales channel with the highest profit is Offline with a total profit of $24920726.67.**Visualizations**The
    following charts provide a visual representation of the profitability analysis:Response
    10-1
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 要求ChatGPT编写销售报告 ChatGPT生成了我们请求的文档和图像。如请求，它生成了一个.docx文件，在响应[10-1](#PC2)中，您将看到ChatGPT根据我们发送的Excel表编写的报告。**销售记录分析和洞察**本文件展示了销售记录数据的分析。基于地区、商品类型和销售渠道，得出关键盈利洞察。包括可视化以突出显著的模式和趋势。**关键盈利洞察**1.
    最盈利的地区是撒哈拉以南非洲，总利润为12183211.40美元。2. 最盈利的商品类型是化妆品，总利润为14556048.66美元。3. 最盈利的销售渠道是线下，总利润为24920726.67美元。**可视化**以下图表提供了盈利分析的视觉表示：响应10-1
- en: ChatGPT writes up a key insights report based upon sales data This is great!
    ChatGPT highlights precisely the information we asked for. You’ll see that Figures
    [10-2](#Fig2) through [10-5](#Fig5) show the graphics ChatGPT generated for the
    sales report.![Bar chart titled "Total Profit by Region" displaying total profit
    in millions for various regions. Sub-Saharan Africa and Europe show the highest
    profits, followed by Asia, Middle East and North Africa, Australia and Oceania,
    Central America and the Caribbean, and North America with the lowest. The y-axis
    represents total profit, and the x-axis lists the regions. Bars are orange.](../images/641691_1_En_10_Chapter/641691_1_En_10_Fig2_HTML.jpg)
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT根据销售数据编写关键洞察报告 这太棒了！ChatGPT精确地突出了我们请求的信息。您会看到图[10-2](#Fig2)至[10-5](#Fig5)显示了ChatGPT为销售报告生成的图形。![标题为“按地区划分的总利润”的柱状图，显示各地区以百万计的总利润。撒哈拉以南非洲和欧洲显示出最高的利润，其次是亚洲、中东和北非、澳大利亚和大洋洲、中美洲和加勒比海以及北美利润最低。y轴表示总利润，x轴列出地区。柱状图为橙色。](../images/641691_1_En_10_Chapter/641691_1_En_10_Fig2_HTML.jpg)
- en: Figure 10-2
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-2
- en: 'ChatGPT generates the “total profit by region” graphic.Disclaimer: Figure [10-2](#Fig2)
    is an AI-generated image'
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT生成了“按地区划分的总利润”图表。免责声明：图[10-2](#Fig2) 是由AI生成的图像
- en: '![Bar chart titled "Total Profit by Item Type" displaying total profit in millions
    for various item categories. The categories include Cosmetics, Household, Office
    Supplies, Clothes, Baby Food, Cereal, Vegetables, Personal Care, Beverages, Snacks,
    Meat, and Fruits. Cosmetics show the highest profit, while Fruits have the lowest.
    The chart uses orange bars to represent data.](../images/641691_1_En_10_Chapter/641691_1_En_10_Fig3_HTML.jpg)'
  id: totrans-861
  prefs: []
  type: TYPE_IMG
  zh: '![标题为“按商品类型划分的总利润”的柱状图，显示各种商品类别的以百万计的总利润。类别包括化妆品、家居用品、办公用品、服装、婴儿食品、谷物、蔬菜、个人护理、饮料、零食、肉类和水果。化妆品显示出最高的利润，而水果利润最低。图表使用橙色柱状图表示数据。](../images/641691_1_En_10_Chapter/641691_1_En_10_Fig3_HTML.jpg)'
- en: Figure 10-3
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-3
- en: 'ChatGPT generates the “total profit by item type” graphic. Disclaimer: Figure
    [10-3](#Fig3) is an AI-generated image'
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT生成了“按商品类型划分的总利润”图表。免责声明：图[10-3](#Fig3) 是由AI生成的图像
- en: '![Pie chart titled "Profit Distribution by Sales Channel" showing two segments:
    Offline at 56.4% in orange, and Online at 43.6% in red.](../images/641691_1_En_10_Chapter/641691_1_En_10_Fig4_HTML.jpg)'
  id: totrans-864
  prefs: []
  type: TYPE_IMG
  zh: '![标题为“按销售渠道划分的利润分布”的饼图，显示两个部分：线下占56.4%，橙色，在线占43.6%，红色。](../images/641691_1_En_10_Chapter/641691_1_En_10_Fig4_HTML.jpg)'
- en: Figure 10-4
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-4
- en: 'ChatGPT generates the “profit distribution by sales channel” graphic. Disclaimer:
    Figure [10-4](#Fig4) is an image generated by AI'
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT生成了“按销售渠道划分的利润分布”图表。免责声明：图[10-4](#Fig4) 是由AI生成的图像
- en: We’re going to dive more into how ChatGPT can be used to generate images in
    Chapter [13](641691_1_En_13_Chapter.xhtml), but it’s already evident here that
    not only was the process very simple, the results are impressive.
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在第[13](641691_1_En_13_Chapter.xhtml)章中更深入地探讨如何使用ChatGPT生成图像，但在这里已经很明显，不仅过程非常简单，结果也非常令人印象深刻。
- en: Now we’re going to look at a simpler example of data conversion. We’re going
    to see how we can use ChatGPT to convert the language and measurement units for
    a recipe in French for macarons.
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将来看一个更简单的数据转换例子。我们将看看如何使用ChatGPT将法式马卡龙食谱的语言和度量单位进行转换。
- en: Converting the Language and Measurement Units in a Recipe for Macarons
  id: totrans-869
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 马卡龙食谱中的语言和度量单位转换
- en: If you don’t know already, macarons are a delicious French dessert. It’s made
    up of two delicate cookies with a creamy middle, kind of like an Oreo cookie.
    They’re often colorful and can have different fillings—anything from ice cream
    to jelly! They’re amazing, and if you want to try an authentic macaron, you’ll
    want to follow a recipe from natives. Trust me.
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还不知道，马卡龙是一种美味的法国甜点。它由两层精致的饼干和中间的奶油馅组成，有点像奥利奥饼干。它们通常色彩鲜艳，可以有不同口味的馅料——从冰淇淋到果冻！它们太棒了，如果你想尝试正宗的马卡龙，你将想要遵循当地人的食谱。相信我。
- en: Luckily, if you want to follow a recipe from a foreign language, ChatGPT can
    not only translate the recipe but also convert the measurement units so that the
    recipe is easier to follow. Let’s try that out, then create a PDF from the results
    for easy printing.![Two vibrant pink macarons on a dark surface, one whole and
    the other partially eaten, revealing a creamy filling. Crumbs are scattered around,
    highlighting the delicate texture of the macarons.](../images/641691_1_En_10_Chapter/641691_1_En_10_Fig5_HTML.jpg)
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，如果你想跟随一种外语食谱，ChatGPT不仅能翻译食谱，还能转换度量单位，使得食谱更容易遵循。让我们试试看，然后从结果中创建一个PDF文件以便于打印。![两个鲜艳的粉色马卡龙放在深色表面上，一个完整，另一个部分被吃掉，露出奶油馅。周围散落着面包屑，突出了马卡龙的细腻质地。](../images/641691_1_En_10_Chapter/641691_1_En_10_Fig5_HTML.jpg)
- en: Figure 10-5
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-5
- en: Delicious-looking macarons
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来美味的马卡龙
- en: 'I’ve already found a recipe ahead of time, so let’s get started by translating
    it from French to English. Prompt [10-2](#PC3) shows the prompt we used along
    with the recipe we’re using for this example.Translate this recipe from French
    to English:###Pour les coques :15 gouttes de colorant alimentaire rouge80 g de
    sucre glace90 g de sucre semoule75 g de blanc d''oeuf à température ambiante80
    g d'' amandes en poudre tamiséePour la garniture :30 g de beurre40 g de sucre
    en poudre70 g de coulis de framboiseÉTAPE 1Pour les coques :ÉTAPE 2Battre les
    blancs d''oeufs à vitesse moyenne. Quand la mousse fait des vagues, ajouter 45
    g de sucre semoule. Continuer à battre à vitesse moyenne. Lorsque au retrait du
    mixeur, les blancs forment un bec d''oiseau à base large au bout du batteur, incorporer
    le reste du sucre et le colorant alimentaire. Puis battre les blancs à vitesse
    maximum jusqu’à obtention d''une base lisse, brillante et homogène.ÉTAPE 3Ajouter
    ensuite le mélange poudre d''amande - sucre glace, lentement en ramenant les bords
    à la spatule, lentement. Former un mélange homogène, puis tester la préparation
    : lorsque vous lever la spatule, un ruban doit se former. Si ce n''est pas le
    cas, écraser la préparation avec la spatule par le milieu, re-tester et recommencer
    si nécessaire.ÉTAPE 4Préchauffer votre four à 150°C (thermostat 5). Chaleur tournante
    préférable.ÉTAPE 5Mettre la préparation dans une poche à douille et former la
    coque du macaron : environ 2 cm de diamètre. Les espacer sur du papier sulfurisé
    ou sur une plaque en silicone.ÉTAPE 6Enfourner 12 min. Laisser refroidir quelques
    minutes avant de les retirer de la plaque.ÉTAPE 7Vous avez fini les coques ! Ouf
    !ÉTAPE 8La garniture :ÉTAPE 9Mélanger les ingrédients dans une casserole a feu
    fort, porter à ébullition en remuant sans arrêt pendant 3 min. Sortir du feu,
    continuer a mélanger. Quand le mélange épaissit, appliquer 1/2 cuillère à café
    sur la coque du bas, puis placer la coque du haut par dessus.ÉTAPE 10Laisser reposer
    les macarons, les conserver au réfrigérateur.Prompt 10-2'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经提前找到了一个食谱，让我们开始将其从法语翻译成英语。提示 [10-2](#PC3) 显示了我们使用的提示以及我们在这个示例中使用的食谱。将此食谱从法语翻译成英语：###
    对于外壳：15滴红色食用色素80克糖粉90克细砂糖75克室温下的蛋白霜80克筛过的杏仁粉### 对于馅料：30克黄油40克糖粉70克树莓酱### 步骤 1
    对于外壳：### 步骤 2 以中速搅拌蛋白霜。当泡沫形成波浪时，加入45克细砂糖。继续以中速搅拌。当搅拌器移开后，蛋白霜在搅拌器尖端形成宽鸟喙状，加入剩余的糖和食用色素。然后以最大速度搅拌蛋白霜，直到获得光滑、闪亮和均匀的基座。###
    步骤 3 然后慢慢加入杏仁粉-糖粉混合物，慢慢将边缘刮回刮刀，慢慢混合。形成均匀的混合物，然后测试准备情况：当你抬起刮刀时，应该形成一条带子。如果不是这样，用刮刀从中间压碎准备物，重新测试，如果需要的话，再重复一次。###
    步骤 4 预热烤箱至150°C（温控器5）。建议使用对流加热。### 步骤 5 将准备物放入裱花袋中，形成马卡龙的壳：直径约2厘米。将它们间隔地放在烘焙纸上或硅质烤盘上。###
    步骤 6 烘烤12分钟。取出后，在烤盘上冷却几分钟。### 步骤 7 你已经完成了外壳！呼！### 步骤 8 馅料：### 步骤 9 在一个大火的锅中搅拌配料，不停搅拌至沸腾，持续3分钟。离火，继续搅拌。当混合物变稠时，在底部外壳上涂抹1/2茶匙，然后放上顶部外壳。###
    步骤 10 让马卡龙静置，放入冰箱保存。提示 10-2
- en: 'Asking ChatGPT to translate a recipe for macarons from French to English Now
    that we’ve provided ChatGPT with the recipe in our prompt, let’s see how it responds.
    Response [10-2](#PC4) shows the translation ChatGPT came back with.**Macaron Recipe****For
    the Shells:**- 15 drops of red food coloring- 80 g icing sugar- 90 g granulated
    sugar- 75 g egg whites at room temperature- 80 g almond flour (sifted)**For the
    Filling:**- 30 g butter- 40 g powdered sugar- 70 g raspberry coulis---**Instructions:****Step
    1: Preparing the Shells**1\. Beat the Egg Whites   - Whisk the egg whites at medium
    speed.   - Once the foam forms waves, add 45 g of granulated sugar. Continue whisking
    at medium speed.   - When lifting the whisk, the whites should form a broad bird''s
    beak at the tip of the whisk. At this point, add the remaining sugar and the food
    coloring.   - Increase the whisking speed to maximum until the mixture becomes
    smooth, shiny, and uniform.2\. Combine Dry and Wet Ingredients   - Gradually fold
    the almond flour and icing sugar mixture into the egg whites.   - Use a spatula
    to gently fold the mixture from the edges inward until fully incorporated.   -
    Check the consistency by lifting the spatula; the batter should form a ribbon
    as it falls. If not, press the mixture with the spatula down the center, mix,
    and test again.3\. Preheat the Oven   - Preheat your oven to 150°C (300°F) with
    a fan setting, if available.4\. Pipe the Shells   - Transfer the batter to a piping
    bag.   - Pipe shells approximately 2 cm in diameter, spacing them apart, onto
    parchment paper or a silicone baking mat.5\. Bake   - Bake for 12 minutes.   -
    Let the shells cool for a few minutes before removing them from the baking sheet.6\.
    Shells Complete!   - The shells are done—well done!---**Step 2: Preparing the
    Filling**1\. Cook the Filling   - Combine all filling ingredients in a saucepan
    over high heat.   - Bring to a boil, stirring constantly for 3 minutes.   - Remove
    from heat and continue stirring until the mixture thickens.2\. Assemble the Macarons   -
    Apply 1/2 teaspoon of filling onto the flat side of one shell.   - Place another
    shell on top to create a sandwich.3\. Store the Macarons   - Allow the macarons
    to rest and store them in the refrigerator.Enjoy your delicious homemade macarons!
    ![A grayscale emoji face with a smiling expression and three hearts around it,
    one on the left and two on the right. The hearts are also in shades of gray, conveying
    a sense of affection or love.](../images/641691_1_En_10_Chapter/641691_1_En_10_Figa_HTML.gif)Response
    10-2'
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 请问ChatGPT将法式马卡龙食谱从法语翻译成英语 Now that we’ve provided ChatGPT with the recipe in
    our prompt, let’s see how it responds. Response [10-2](#PC4) shows the translation
    ChatGPT came back with.**马卡龙食谱****壳的制作材料：****- 15滴红色食用色素- 80克糖粉- 90克细砂糖- 75克室温下的鸡蛋清-
    80克杏仁粉（过筛）****馅的制作材料：****- 30克黄油- 40克糖粉- 70克树莓果泥---**制作步骤：****步骤 1：制作壳**1\. 打发鸡蛋清   -
    以中速打发鸡蛋清。   - 当泡沫形成波浪状时，加入45克细砂糖。继续以中速打发。   - 当提起打蛋器时，蛋白应在打蛋器尖端形成宽大的鸟喙。此时，加入剩余的糖和食用色素。   -
    提高打蛋速度至最大，直到混合物变得光滑、闪亮且均匀。2\. 混合干湿材料   - 逐渐将杏仁粉和糖粉混合物拌入鸡蛋清中。   - 使用刮刀轻轻将混合物从边缘向内翻拌，直到完全混合。   -
    通过提起刮刀检查一致性；面糊应形成一条面带，当它落下时。如果不这样，用刮刀将混合物压下中心，混合，再测试。3\. 预热烤箱   - 如果有风扇设置，将烤箱预热至150°C（300°F）。4\.
    填充壳   - 将面糊转移到裱花袋中。   - 在烘焙纸上或硅胶烘焙垫上挤出直径约2厘米的壳，间隔排列。5\. 烘焙   - 烘烤12分钟。   - 在从烤盘上取下壳之前，让壳冷却几分钟。6\.
    壳完成！   - 壳已经做好——做得很好！---**步骤 2：制作馅**1\. 烹饪馅   - 在高温下，将所有馅料成分放入锅中。   - 沸腾后，不断搅拌3分钟。   -
    离火，继续搅拌直到混合物变稠。2\. 组装马卡龙   - 在一个壳的平面上涂抹1/2茶匙馅料。   - 放上另一个壳，制成三明治。3\. 储存马卡龙   -
    让马卡龙休息并放入冰箱中储存。享受您美味的自制马卡龙！ ![灰度表情符号脸，表情微笑，周围有三颗心，一颗在左边，两颗在右边。心也是灰度的，传达出一种关爱或爱的感觉。](../images/641691_1_En_10_Chapter/641691_1_En_10_Figa_HTML.gif)Response
    10-2
- en: A translated version of a French macaron recipe
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 法式马卡龙食谱的翻译版本
- en: This is great! The text has been translated in its entirety and has even been
    formatted to make for an aesthetically pleasing recipe to follow. However, we
    still have a bit of a problem. The text has been translated, but the recipe will
    still prove to be a challenge to follow with the measurements still in metric
    units. So, let’s take another step further and ask ChatGPT to convert all of the
    metric measurements to imperial.
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
  zh: 这太棒了！文本已经完整翻译，并且格式化得很好，使得食谱看起来非常美观，易于遵循。然而，我们仍然有一些问题。文本虽然已经翻译，但食谱中仍然使用公制单位，这可能会给遵循食谱带来挑战。所以，让我们再进一步，让ChatGPT将所有公制测量转换为英制。
- en: Converting Metric Measurements to Imperial
  id: totrans-878
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将公制测量转换为英制
- en: We’re going to continue the same conversation we have with ChatGPT with Prompt
    [10-3](#PC5).Convert all of the metric measurements to imperial measurement units
    typically found in the kitchenPrompt 10-3
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将继续与ChatGPT的相同对话，使用提示[10-3](#PC5)。将所有公制测量转换为厨房中常见的英制测量单位提示 10-3
- en: Instructing ChatGPT to convert measurements
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 指示ChatGPT进行测量转换
- en: 'Now let’s take a look at the results, as you can see in Response [10-3](#PC6).***Macaron
    Recipe*****For the Shells:**   - 15 drops of red food coloring   - 2/3 cup (2.8
    oz) powdered sugar   - 7 tablespoons (3.2 oz) granulated sugar   - 2 1/2 large
    egg whites (room temperature)   - 2/3 cup (2.8 oz) almond flour (sifted)**For
    the Filling:**   - 2 tablespoons (1 oz) butter   - 3 tablespoons (1.4 oz) granulated
    sugar   - 5 tablespoons (2.5 oz) raspberry coulis***Instructions:*****Step 1:
    Preparing the Shells***1\. Beat the Egg Whites*   - Whisk the egg whites at medium
    speed.   - Once the foam forms waves, add 3 1/2 tablespoons granulated sugar.
    Continue whisking at medium speed.   - When lifting the whisk, the whites should
    form a broad bird''s beak at the tip of the whisk. At this point, add the remaining
    sugar and the food coloring.   - Increase the whisking speed to maximum until
    the mixture becomes smooth, shiny, and uniform.2\. *Combine Dry and Wet Ingredients*   -
    Gradually fold the almond flour and powdered sugar mixture into the egg whites.   -
    Use a spatula to gently fold the mixture from the edges inward until fully incorporated.   -
    Check the consistency by lifting the spatula; the batter should form a ribbon
    as it falls. If not, press the mixture with the spatula down the center, mix,
    and test again.3\. *Preheat the Oven*   - Preheat your oven to 300°F with a fan
    setting, if available.4\. *Pipe the Shells*   - Transfer the batter to a piping
    bag.   - Pipe shells approximately 3/4 inch in diameter, spacing them apart, onto
    parchment paper or a silicone baking mat.5\. *Bake*   - Bake for 12 minutes.   -
    Let the shells cool for a few minutes before removing them from the baking sheet.6\.
    *Shells Complete!*   - The shells are done — well done!**Step 2: Preparing the
    Filling**1\. *Cook the Filling*   - Combine all filling ingredients in a saucepan
    over high heat.   - Bring to a boil, stirring constantly for 3 minutes.   - Remove
    from heat and continue stirring until the mixture thickens.2\. *Assemble the Macarons*   -
    Apply 1/2 teaspoon of filling onto the flat side of one shell.   - Place another
    shell on top to create a sandwich.3\. *Store the Macarons*   - Allow the macarons
    to rest and store them in the refrigerator.   - Enjoy your delicious homemade
    macarons!![A grayscale emoji symbol depicting a smiling face with three hearts
    around it. The face has closed eyes and a wide smile, conveying a sense of happiness
    and affection. The hearts are positioned around the face, enhancing the theme
    of love and joy.](../images/641691_1_En_10_Chapter/641691_1_En_10_Figb_HTML.gif)Response
    10-3'
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们来看看结果，正如你在响应[10-3](#PC6)中可以看到的。***马卡龙食谱*****壳的配料：**   - 15滴红色食用色素   - 2/3杯（2.8盎司）糖粉   -
    7汤匙（3.2盎司）砂糖   - 2 1/2个大鸡蛋清（室温）   - 2/3杯（2.8盎司）杏仁粉（过筛）**馅料的配料：**   - 2汤匙（1盎司）黄油   -
    3汤匙（1.4盎司）砂糖   - 5汤匙（2.5盎司）树莓酱***说明：*****步骤 1：准备壳***1\. 打发鸡蛋清*   - 以中速搅拌鸡蛋清。   -
    当泡沫形成波浪时，加入3 1/2汤匙砂糖。继续以中速搅拌。   - 当提起搅拌器时，蛋白应在搅拌器尖端形成宽大的鸟喙。在这个时候，加入剩余的砂糖和食用色素。   -
    提高搅拌速度至最大，直到混合物变得光滑、闪亮且均匀。2\. *混合干湿原料*   - 逐渐将杏仁粉和糖粉混合物拌入鸡蛋清中。   - 使用刮刀轻轻将混合物从边缘向内折叠，直到完全混合。   -
    通过提起刮刀检查一致性；面糊应形成一条面带，当它落下时。如果不是这样，用刮刀将混合物压向中心，混合，然后再次测试。3\. *预热烤箱*   - 如果有的话，将烤箱预热至300°F，并设置为风扇模式。4\.
    *挤壳*   - 将面糊转移到挤袋中。   - 将直径约3/4英寸的壳挤到烘焙纸上或硅胶烘焙垫上，间隔开。5\. *烘烤*   - 烘烤12分钟。   -
    在将壳从烤盘上取下之前，让壳冷却几分钟。6\. *壳完成!*   - 壳已经做好了——做得很好！**步骤 2：准备馅料**1\. *煮馅料*   - 在高温下，将所有馅料配料放入锅中。   -
    煮沸，不断搅拌3分钟。   - 离火，继续搅拌直到混合物变稠。2\. *组装马卡龙*   - 在一个壳的平面上涂上1/2茶匙馅料。   - 放上另一个壳，制成三明治。3\.
    *储存马卡龙*   - 让马卡龙休息并放入冰箱储存。   - 享受你美味的自制马卡龙！！![一个表示微笑脸周围有三颗心的灰度表情符号。脸部有闭眼和大笑，传达出快乐和亲情的感受。心形围绕脸部，增强了爱与欢乐的主题。](../images/641691_1_En_10_Chapter/641691_1_En_10_Figb_HTML.gif)响应
    10-3
- en: ChatGPT responds with all measurements converted This is fantastic! But we can
    even take it a step further. Remember, ChatGPT can convert data into different
    file formats as well. Let’s make ChatGPT create a PDF with this recipe we’ve converted
