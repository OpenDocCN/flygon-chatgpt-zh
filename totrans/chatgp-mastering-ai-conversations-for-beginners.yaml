    ****a**** ****b**it** ****o**f** ****crea**tivit**y, ****a**s** ****we**ll** ****a**s**
    ****acc**urac**y. ****A**nd**, ****li**ke** ****wh**en** ****commu**nicati**ng
    ****wi**th** ****a**** ****re**al** ****pe**rso**n, ****con**tex**t ****i**s**
    ****k**ey**.'
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: '**促** **进** **工程** 是我们用来指代将**提示**输入到 ChatGPT 中，以使其以“**工程师**”的方式提供你想要的精确结果的一种技能。这关乎于将你的输入打磨到完美，以便帮助
    LLM 捕捉到你所描述的内容。这需要不仅仅对语言模型及其工作原理有理解，还需要相当程度的创造力，以及准确性。而且，就像与真人交流一样，上下文是关键。'
- en: '****W**hy** ****I**s** ****Pr**omp**t ****Engi**neerin**g ****Impo**rtan**t?'
  id: totrans-437
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**为什么** **促** **进** **工程** **重要**？'
- en: '****Cha**tGP**T ****h**as** ****cha**nge**d ****t**he** ****ga**me** ****i**n**
    ****te**rms** ****o**f** ****A**I** ****th**at** ****c**an** ****gen**erat**e
    ****te**xt**, ****im**age**s, ****o**r** ****ot**her** ****me**dia**, ****b**ut**
    ****i**t**’****s**** ****n**ot** ****per**fec**t. ****O**ne** ****o**f** ****t**he**
    ****th**ing**s ****th**at** ****i**t** ****sev**erel**y ****la**cks** ****i**s**
    ****exa**ctl**y ****wh**at** ****w**e** ****hu**man**s ****re**ly** ****o**n**
    ****t**o** ****p**ut** ****wh**at** ****som**eon**e ****sa**ys** ****in**to**
