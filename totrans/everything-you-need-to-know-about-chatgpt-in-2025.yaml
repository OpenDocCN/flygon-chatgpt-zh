    ****o****f**** ****wh****a**t** ****A****I**** ****c****a**n** ****ach**i**e**ve**.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**生成式预训练Transformer（GPT**）模型系列无疑是OpenAI最著名的成就之一，也是对人工智能领域最显著的贡献之一。GPT的每一次迭代都标志着向前迈出的一个步伐，这不仅体现在技术术语上，也体现在公众对人工智能能够实现什么的认识上。'
- en: '****G****P**T**-****1****: ****T****h**e** ****St**a**r**t** ****o****f****
