- en: 5Do Social Influence and Initial Experience of ChatGPT Matter for Students’
    Retention at Higher Education Institutions?The Direct and Indirect Relationships
    Investigation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Hai-Ninh Do, Hue Minh Nguyen, and Ngoc Bich Do
  prefs: []
  type: TYPE_NORMAL
- en: 'DOI: [10.1201/9781032716350-5](http://doi.org/10.1201/9781032716350-5)'
  prefs: []
  type: TYPE_NORMAL
- en: 5.1 Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Introduced at the end of 2022 by OpenAI, ChatGPT (Chat Generative Pre-trained
    Transformer) received tremendous attention and achieved significant performance
    by attracting 1 million users in just five days ([Buchholz and Richte, 2023](#ch13.xhtml#r189)).
    It is a deep-learning- AI (artificial intelligence) chatbot trained with diverse
    content classifications, such as books, articles, and websites, to generate human-like
    content ([Wach et al., 2023](#ch13.xhtml#r240)). Hence, ChatGPT can create answers
    for input questions in different languages. Generally, the technology in ChatGPT
    is not new, based on “GPT 3.5” in 2020; however, it achieved its breakthrough
    because ChatGPT provides a user-friendly interface and is free for all users.
  prefs: []
  type: TYPE_NORMAL
- en: Students at different levels have adopted ChatGPT as an intensive language model
    and easy-to-use platform to assist their learning. As mentioned by [Duong et al.
    (2023)](#ch13.xhtml#r197), this platform can provide an outline, suggest corrections
    for texts, and provide instant information for questions being asked by users.
    On the other hand, students in the Generation Z cohort are digital natives; they
    grow up and interact with technology as part of their daily activities ([McKinsey,
    2023](#ch13.xhtml#r217)). Hence, the widespread use of this platform in education
    applications can be partially explained.
  prefs: []
  type: TYPE_NORMAL
- en: 'Studies around ChatGPT in education have started receiving attention since
    2022\. Within the education sector, the prior studies centralized on four research
    pathways: including determinants generating actual use or refusal to use of ChatGPT
    ([Duong et al., 2023](#ch13.xhtml#r197); [Strzelecki, 2023a](#ch13.xhtml#r225)),
    how to detect ChatGPT in students’ work, the bright-side and dark-side of ChatGPT
    in the educational sector ([Ahsan et al., 2022](#ch13.xhtml#r184); [Perkins, 2023](#ch13.xhtml#r221)),
    and the potential and further possible application of AI-based tools such as ChatGPT
    to leverage student performance ([Wang et al., 2024](#ch13.xhtml#r242)). Yet,
    academic research results on ChatGPT are still fragmented and new to examine further
    ([Strzelecki, 2023a](#ch13.xhtml#r225)). Specifically, little attention was focused
    on students’ retention to adopt ChatGPT during their study journal. Students’
    continuous-using intention reflects the evidence for higher education institutions
    (HEIs) to adopt this tool in the long-term. Furthermore, this AI-generated tool
    is still in the feedback phase ([Strzelecki, 2023b](#ch13.xhtml#r226)). Hence,
    to fill this gap, our study examines factors influencing students’ continuous
    intention to use ChatGPT as a learning assistance tool in the future.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In this study, three research questions are addressed:'
  prefs: []
  type: TYPE_NORMAL
- en: RQ1:  Can prior experience and social influence effectively generate ChatGPT
    continuous-use intention?
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: RQ2:  What fundamental relationship exists between intention, social influence,
    and experience?
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: RQ3:  What are the implications of positive ChatGPT retention at HEIs?
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: By closing the mentioned gaps, our research makes considerable contributions.
    First, we integrate two theories to examine AI-based technologies despite the
    prior study only adopting Unified Theory of Acceptance and Use of Technology (UTAUT).
    Notably, this study reveals the indirect effect of experience and four mediators,
    including personal innovativeness, motivation, perceived usefulness (PU), and
    enjoyment, to predict the likelihood of intention to continue using AI-related
    technologies. Second, there is still debate about the pros and cons of ChatGPT.
    This paper sheds light on the benefits of adopting new technology such as ChatGPT
    at HEIs by providing the implications for various stakeholders – HEIs, educators,
    and students to leverage AI-blended learning.
  prefs: []
  type: TYPE_NORMAL
- en: The structure of this chapter consists of four parts. This research begins to
    answer research questions by reviewing the relevant literature regarding ChatGPT
    to investigate research gaps and develop a research model. The second section
    explains how research is being implemented. The third section shows the data analysis
    procedure, deploying the structural equation model using Smart-PLS to reach results.
    Following, the study findings are presented with relevant discussion to provide
    implications for scholars and educational practitioners. The final section implies
    current limitations and sheds light on further research opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2 Literature Review and Research Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 5.2.1 Theoretical Background
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This study employs the Stimulus–Organism–Response (SOR) theory and the UTAUT
    theory as fundamental bases for developing the research model.
  prefs: []
  type: TYPE_NORMAL
- en: SOR theory was developed by [Mehrabian and Russell (1974)](#ch13.xhtml#r218).
    It aims to illustrate the mechanism of consumer response. The model includes three
    blocks – Stimulus (external stimuli), Organism (affective response), and Response
    (cognitive response). This study aims to obtain insights into consumer affective
    (such as enjoyment) and cognitive response (such as continuous-use intention).
    Hence, SOR theory is appropriate as a theoretical signpost for constructing hypotheses
    and models.
  prefs: []
  type: TYPE_NORMAL
- en: '[Venkatesh et al. (2003)](#ch13.xhtml#r237) proposed the UTAUT model. It strives
    to explain the mechanism of how consumers accept a particular technology and actual
    continuous retention. Four factors explain the adoption intention: performance
    expectancy, effort expectancy, social influence (SI), and facilitating conditions.
    The final actual use behavior can be explained through the intention to use level,
    which lies at the model’s center. The possible moderating effects can be gender,
    age, experience, and voluntariness of use.'
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, [Venkatesh (2022)](#ch13.xhtml#r235) suggested that this theory
    can be extended to examine AI tools and the adoption of users. In this study,
    a novel AI-based technology called ChatGPT, and the user experience (UE) is one
    of the main elements being examined. Also, the study aims to explore the retention
    behavior of students; therefore, the UTAUT theory is suitable to adopt for further
    research model development in this research.
  prefs: []
  type: TYPE_NORMAL
- en: 5.2.2 Research Model and Hypotheses Development
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With technological advancement in recent years, the world has experienced an
    increasing popularity and acceptance of artificial intelligence (AI) and AI-based
    technologies across industries. Many organizations consider adopting AI data and
    knowledge as critical sources of competitive advantages ([Wirtz et al., 2018](#ch13.xhtml#r243)).
    Within the education sector, AI-based technologies would effectively support teachers
    and students in reducing the burden of information searching ([Loeckx, 2016](#ch13.xhtml#r214);
    [Chiu et al., 2023](#ch13.xhtml#r191)). Based on the S–O–R and UTAUT theoretical
    background, the study provides a study model in [Figure 5.1](#ch13.xhtml#f13).
  prefs: []
  type: TYPE_NORMAL
- en: '![A flow diagram runs as follows: Chat G P T experience leads to perceived
    enjoyment and usefulness, which lead to continuous-use intention. Social influence
    leads to personal innovativeness and self-motivation, which also lead to continuous-use
    intention. Chat G P T experience and social influence also lead to continuous-use
    intention.](html/images/9781032716084_C005_001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 5.1](#ch13.xhtml#f13b) Research model. (Source: Research team.)'
  prefs: []
  type: TYPE_NORMAL
- en: 'The emergence of ChatGPT in late 2022 has attracted technology enthusiasts
    worldwide, including academics and university learners. Experience of new technology
    has been investigated by [Venkatesh et al. (2003)](#ch13.xhtml#r237) in the UTAUT
    model as a moderating variable to discuss the determinants of behavioral intention
    related to technology-based tools from initial introduction to more incredible
    experience stages. Given that this study was conducted in early 2023 and assuming
    that most users have limited experience using ChatGPT, we examined both the direct
    and indirect effects of experience on ChatGPT-using behavior. It is anticipated
    that experience helps enhance skills, foster familiarity with new technology’s
    interface, and suggest insights into how well AI addresses its specific objectives.
    Drawing on the adaptation-level theory ([Helson, 1964](#ch13.xhtml#r203)), it
    is believed that early experience with this new technology would immediately bring
    some users favorable impressions and extrinsic motivation that would affect the
    decision to continue using it ([Ho, 2012](#ch13.xhtml#r205); [Sun et al., 2022](#ch13.xhtml#r229)).
    As such, hypothesis H1 is stated as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '*H1: Experience directly and significantly influences the intention to continuous-use
    ChatGPT*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: While some users decide on their purchase based on the initial impressions,
    others spend longer experiencing it to build crucial knowledge for their consideration.
    This consumer response mechanism is well reflected by the SOR model, in which
    internal feelings are equally important ([Mehrabian and Russell, 1974](#ch13.xhtml#r218)).
  prefs: []
  type: TYPE_NORMAL
- en: 'In this study, perceived enjoyment (PE) and perceived usefulness (PU) are regarded
    as mediators between the early experience with ChatGPT and the decision to continue
    using it. PU refers to users’ belief that technological tools will be able to
    help people improve productivity by minimizing mental and physical efforts ([Davis,
    1989](#ch13.xhtml#r193); [Maheshwari, 2023](#ch13.xhtml#r215)). The degree seen
    as intrinsically fascinating is perceived enjoyment ([Won et al., 2023](#ch13.xhtml#r244)).
    It is valid not only for technologies such as social networks and mass media ([Sullivan
    and Koh, 2019](#ch13.xhtml#r228); [Lee et al., 2019](#ch13.xhtml#r213)) but also
    for AI-powered educational tools such as ChatGPT ([Nalbant, 2021](#ch13.xhtml#r219)).
    It is hypothesized that initial experience would stimulate self-evaluation on
    the level of usefulness and enjoyment when using ChatGPT, and in turn, it leads
    to continuous-use intention. As such, the second and the third hypotheses are
    developed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '*H2: Experience has an indirect and significant influence on the intention
    to continuous-use ChatGPT through perceived enjoyment*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*H3: Experience has an indirect and significant influence on the intention
    to continuous-use ChatGPT through perceived usefulness*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Social influence (SI) describes the external pressure that influences one’s
    decision to interact in a behavior ([Fishbein and Ajzen, 1975](#ch13.xhtml#r198)).
    An individual can acknowledge opinions from others within their social circle
    to choose whether to accept or reject the product and even new technology. [Venkatesh
    et al. (2003)](#ch13.xhtml#r237) suggested that SI is vital in the early stages
    of new technology experience, as individuals appear to comply with close people’s
    expectations and alter their behavior according to social pressure. Similarly,
    in educational settings, learners who are often engaged in various social interactions,
    either inside or outside the classroom, will be under enormous pressure from those
    ([Strzelecki and ElArabawy, 2024](#ch13.xhtml#r227)). This fact results in strong
    extrinsic motivation for learners to try modern technology to feel compatible
    with their peers. Some previous studies stressed the significance of social pressure
    in adopting emerging tools in learning and research activities ([Alowayr, 2022](#ch13.xhtml#r185);
    [Bernacki et al., 2020](#ch13.xhtml#r188); [Wai et al., 2018](#ch13.xhtml#r241)).
  prefs: []
  type: TYPE_NORMAL
- en: The acceptance and utilization of ChatGPT in higher education remains controversial.
    Actors, in external stimuli, such as instructors and peers, are likely to believe
    that ChatGPT positively and negatively affects learners’ performance. Various
    issues have been raised and discussed with ChatGPT, such as lack of accuracy ([Hu,
    2023](#ch13.xhtml#r208)) and ethical concerns ([Tilili et al., 2023](#ch13.xhtml#r232)).
    However, the undeniable benefits of ChatGPT, like providing quick accessibility
    to a huge body of human knowledge, have been accepted. Hence, it has led to the
    widespread adoption of this AI-based tool globally.
  prefs: []
  type: TYPE_NORMAL
- en: Recent studies in HEIs by [Strzelecki and ElArabawy (2023)](#ch13.xhtml#r227)
    and [Foroughi et al. (2023)](#ch13.xhtml#r199) have highlighted the direct impact
    of SI on behavior intention. These results support SI positively, which triggers
    the continuous usage of ChatGPT for studying. As a result, the fourth hypothesis
    is stated.
  prefs: []
  type: TYPE_NORMAL
- en: '*H4: Social influence has a direct and significant influence on the intention
    to continuous-use ChatGPT*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: While some people may be strongly affected by social pressure, others are highly
    motivated by their internal inputs. Some exhibit relative resistance to following
    the trend of using technology-based devices and tools unless they recognize their
    self-interest. This study considers personal innovativeness and self-motivation
    as internal driving forces of technology usage behavior. According to [Patil et
    al. (2020)](#ch13.xhtml#r220), personal innovativeness is the degree to which
    a person is willing to experiment with new technologies. Innovative individuals
    tend to be curious and desire to try emerging technologies ([Foroughi et al.,
    2023](#ch13.xhtml#r199)); therefore, they are more inclined to embrace the challenges
    associated with using those ([Kabra et al., 2017](#ch13.xhtml#r209)). Self-motivation
    is the internal drive individuals generate, sustain, and regulate their behavior
    toward their objectives. Based on the self-determination theory, people have three
    fundamental psychological needs of humans, including autonomy, competence, and
    relatedness ([Deci and Ryan, 1985](#ch13.xhtml#r194)). These needs form the basis
    for both intrinsic and extrinsic incentives that foster individuals’ learning
    and achievement ([Zhou and Li, 2023](#ch13.xhtml#r246)).
  prefs: []
  type: TYPE_NORMAL
- en: 'In this study, intertwined with SI, extrinsic drive, self-motivation, and personal
    innovativeness are sources of intrinsic inspiration influencing the intention
    to keep using ChatGPT. As such, the authors state hypotheses H5 and H6 as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '*H5: Social influence has indirect and significant influence on the intention
    to continuous-use ChatGPT through personal innovativeness*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*H6: Social influence has indirect and significant influence on the intention
    to continuous-use ChatGPT through self-motivation*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 5.3 Methodology
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 5.3.1 Research design
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This study employs a quantitative approach and a questionnaire for Vietnamese
    students at HEIs. The survey consists of two sections. In the first sections,
    participants were questioned about demographic information, including age and
    gender. In the second part, 38 questions from the previous research are applied
    to measure variables in this study. Precisely, UE was measured by ten items from
    study of [Hsu and Tsou (2011)](#ch13.xhtml#r207), [Tsaur et al. (2007)](#ch13.xhtml#r233),
    and [Schmitt (2012)](#ch13.xhtml#r222), SI was measured by four items applied
    by [Kalinic and Marinkovic (2016](#ch13.xhtml#r210)), PU was measured by six items
    by [Davis (1989)](#ch13.xhtml#r193), self-motivation (PM) with first five items
    from [Shi and Cristea (2016)](#ch13.xhtml#r223) and three items from [Glynn et
    al. (2011)](#ch13.xhtml#r200). Perceived innovativeness (PI) was adopted by [Hong
    et al. (2017)](#ch13.xhtml#r206) with four items. Finally, the intention to continuous-use
    (ITCU) was adopted from the research of [Venkatesh et al. (2012)](#ch13.xhtml#r238).
    From 1 (strongly disagree) to 5 (strongly agree) on the five-point Likert scale,
    respondents indicated how ChatGPT influenced their learning journey and impacted
    their decision to continue to use it as one of the supported tools for their learning.
    Regarding the pilot test, the research team surveyed 50 students to collect feedback
    on questions that needed clarification or were inaccessible to non-professionals.
    After being reworded, the questionnaires were ready to be distributed to participants.
  prefs: []
  type: TYPE_NORMAL
- en: 5.3.2 Sampling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Hair et al. (2016) stated that an exploratory study needs at least four to five
    times the total number of items. The sample size was determined for each processing
    method using empirical methods, such as sample size calculations for factor analysis
    ([Hair et al., 2021](#ch13.xhtml#r202)) and regression analysis ([Tabachnick and
    Fidell, 2007](#ch13.xhtml#r230)). In addition, [Worthington and Whittaker (2006)](#ch13.xhtml#r245)
    recommended using structural equation model, confirmatory factor analysis, and
    exploratory factor analysis on sample sizes larger than 200 and no less than 100
    participants. In short, N = 106 is the minimum sample size recommended for factor
    analysis and multiple regression analysis, and the population sample in this study
    produced 270 valid responses, which is efficient and reliable for further analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 5.3.3 Data collection and data analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Researchers distributed questionnaires to the students who used ChatGPT as a
    learning tool by sending them through social network sites and emails. The collection
    period was three months, from October 2023 to December 2023\. Only 270 of the
    303 respondents who took part in the study were considered valid after the data
    were analyzed. All demographic information was kept confidential and only utilized
    for this study. To execute descriptive and inferential statistical procedures,
    SPSS 25 and Smart-PLS 4.0 software were chosen because they have been shown to
    have high statistical power for investigating regression analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 5.4 Data Analysis
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Following [Anderson and Gerbing’s (1991)](#ch13.xhtml#r187) approach, the questionnaire
    data are evaluated in two stages for model measurement in this study. First, the
    outer loading indicates the link between the observable and latent variables.
    According to Hair et al. (2016), it is acceptable to proceed subsequent stages
    if the outer loading results are greater than 0.7\. Then, the reliability will
    be examined using two main indicators: Cronbach’s alpha (α) and composite reliability.
    Following the signpost of [DeVellis (2012)](#ch13.xhtml#r195) and Hair et al.
    (2016), Cronbach’s alpha and composite reliability have to be larger than 0.7
    to meet the required standard to proceed with further analysis. As shown in [Table
    5.1](#ch13.xhtml#t10), all α results are above 0.6, and composite reliability
    results are above 0.7, indicating that all constructs achieved satisfactory internal
    consistency; thus, authors can proceed to the next test. Third, to evaluate the
    convergence, AVE (Average Variance Extracted) indicator is used; as shown in [Table
    5.1](#ch13.xhtml#t10), a significant degree of convergent validity is shown by
    AVE results that are more than 0.5 (Hair et al. 2016).'
  prefs: []
  type: TYPE_NORMAL
