  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: '****Contrarian ****Prom**t**ing****, ****o**r**** **Contrary ****Prom**t**ing****,
    ****i**s**** **a**** ****prompt**** **engineering**** **technique**** ****that****
