  id: totrans-1404
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写Python代码以实现图的广度优先搜索（BFS）和深度优先搜索（DFS）。包括如何遍历表示为邻接表的图的示例，并讨论这两种算法的时间和空间复杂度。"'
- en: '10: Solving Two-Pointer Problems'
  id: totrans-1405
  prefs: []
  type: TYPE_NORMAL
  zh: '10: 解决两指针问题'
- en: 'Prompt:'
  id: totrans-1406
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write Python code to solve the two-pointer problem of finding all pairs in
