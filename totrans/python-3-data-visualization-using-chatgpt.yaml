  id: totrans-1934
  prefs: []
  type: TYPE_NORMAL
  zh: '***列表 5.8: multi_lines.py***'
- en: '[PRE395]'
  id: totrans-1935
  prefs: []
  type: TYPE_PRE
  zh: '[PRE395]'
- en: '[Listing 5.8](#list5-8) defines the NumPy variable points that defines a 2D
    list of points with three rows and four columns. The Pyplot API plot() uses the
    points variable to display a grid-like pattern. [Figure 5.5](#fig5-5) displays
    a grid of points, as defined in [Listing 5.8](#list5-8).'
  id: totrans-1936
  prefs: []
