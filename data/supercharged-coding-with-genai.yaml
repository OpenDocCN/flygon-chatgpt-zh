- en: '2'
  id: totrans-262
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '2'
- en: Your Quickstart Guide to OpenAI API
  id: totrans-263
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 您的 OpenAI API 快速入门指南
- en: '**Generative artificial intelligence** (**GenAI**) platforms such as OpenAI
    are transforming entire industries by empowering everyday users to generate custom
    answers to questions, reports, and images. You do not have to be an AI expert
    to leverage OpenAI to supercharge your software development. This chapter focuses
    on setting up OpenAI and using its **application programming interface** (**API**)
    calls to generate quality code.'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: '**生成式人工智能**（**GenAI**）平台，如 OpenAI，通过赋予普通用户生成针对问题、报告和图像的定制答案的能力，正在改变整个行业。您不必成为
    AI 专家就可以利用 OpenAI 来加速您的软件开发。本章重点介绍设置 OpenAI 以及使用其 **应用程序编程接口**（**API**）调用生成高质量代码。'
- en: OpenAI offers numerous services such as chat, image generation, and text-to-speech.
    These are available through a **RESTful HTTP** request, which is a standard way
    for applications to communicate over the web, or through a programmatic interface
    of the `openai` Python package.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 提供了众多服务，如聊天、图像生成和文本到语音。这些服务可以通过 **RESTful HTTP** 请求获得，这是应用程序在网络上通信的标准方式，或者通过
    `openai` Python 包的程序化接口。
- en: In our first quickstart guide of the book, we will walk through three interactive
    labs and three sets of requests, working with the OpenAI Chat service. We will
    dive into the different models available through OpenAI API, and how to impact
    the AI-generated output.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的第一篇快速入门指南中，我们将通过三个交互式实验室和三组请求，使用 OpenAI Chat 服务进行操作。我们将深入了解通过 OpenAI API
    可用的不同模型，以及如何影响 AI 生成的输出。
- en: We will obtain our project API keys, analyze the services’ limits, and learn
    how to compute each request’s costs. The costs are computed from the number of
    **tokens** or subword fragments of the model’s input and output.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将获取我们的项目 API 密钥，分析服务的限制，并学习如何计算每个请求的成本。成本是根据模型输入和输出的 **tokens** 或子词片段的数量来计算的。
- en: We will wrap up this chapter by creating a basic code completion program that
    can generate a Python code implementation based on a function signature.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将通过创建一个基本的代码补全程序来结束本章，该程序可以根据函数签名生成 Python 代码实现。
- en: 'In this chapter, we will explore the following topics:'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨以下主题：
- en: Introducing OpenAI API
  id: totrans-270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介绍 OpenAI API
- en: Obtaining your project API keys from OpenAI
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从 OpenAI 获取您的项目 API 密钥
- en: Sending your first OpenAI API request using the `openai` Python package
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 `openai` Python 包发送您的第一个 OpenAI API 请求
- en: Learning how request costs are calculated
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习如何计算请求成本
- en: Understanding rate limits and usage restrictions for free and paid OpenAI accounts
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解免费和付费 OpenAI 账户的速率限制和使用限制
- en: Analyzing request parameters
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析请求参数
- en: Using OpenAI API to generate code
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 OpenAI API 生成代码
- en: Technical requirements
  id: totrans-277
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'To get the most out of this chapter, ensure you have the following:'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 为了充分利用本章内容，请确保您具备以下条件：
- en: Your personal OpenAI account credentials
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的个人 OpenAI 账户凭据
- en: Access to the book’s GitHub repository, which is available at [https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI](https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI)
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 访问本书的 GitHub 仓库，网址为 [https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI](https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI)
- en: A virtual environment set up in your **integrated development environment**
    (**IDE**), either VS Code or PyCharm
  id: totrans-281
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在您的 **集成开发环境**（**IDE**）中设置虚拟环境，无论是 VS Code 还是 PyCharm
- en: If you require additional assistance in setting up your OpenAI account or a
    virtual environment in your IDE, refer to the *Appendix* for detailed instructions.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在设置 OpenAI 账户或 IDE 中的虚拟环境方面需要额外帮助，请参阅 *附录* 以获取详细说明。
- en: Introducing OpenAI API
  id: totrans-283
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 介绍 OpenAI API
- en: The OpenAI platform offers a variety of **natural language processing** (**NLP**)
    services, powering many AI applications. At its core, the platform leverages **large
    language models** (**LLMs**) that are trained on a massive amount of data, with
    a complex architecture and billions of learnable parameters to produce AI-generated
    responses. Developers can interact with the platform through its API with text-based
    requests that are often called **prompts**. The prompts are processed, enriched,
    and transformed before being passed into the LLM model. The model’s output is
    further refined and delivered as a response to the API request.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 平台提供各种 **自然语言处理**（**NLP**）服务，为许多 AI 应用程序提供动力。在其核心，平台利用在大量数据上训练的 **大型语言模型**（**LLMs**），具有复杂的架构和数十亿可学习的参数，以生成
    AI 生成的响应。开发者可以通过其 API 通过基于文本的请求与平台交互，这些请求通常被称为 **提示**。提示在经过处理、丰富和转换后，被传递到 LLM
    模型。模型的输出进一步细化并作为对 API 请求的响应交付。
- en: 'The Chat service by OpenAI is designed for conversational interactions with
    the LLM where the conversation uses three types of prompt roles – user, system,
    and assistant:'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 的 Chat 服务旨在与 LLM 进行对话交互，其中对话使用三种类型的提示角色 - 用户、系统和助手：
- en: '**User prompts** represent an end user of the system such as a ChatGPT user,
    and resemble prompts we feed into ChatGPT, such as `Tell me about the Fibonacci
    sequence.`'
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户提示**代表系统的一个最终用户，例如 ChatGPT 用户，类似于我们输入到 ChatGPT 中的提示，例如 `告诉我关于斐波那契数列的事情。`'
- en: '**Assistant prompts** represent the model output through the conversation and
    resemble answers we will get back from ChatGPT, such as `The Fibonacci sequence
    is a series of numbers where each number is the sum of the two preceding ones.`'
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**助手提示**通过对话表示模型输出，类似于我们从 ChatGPT 收到的答案，例如 `斐波那契数列是一系列数字，其中每个数字都是前两个数字的和。`'
- en: '**System prompts** define the guidelines of the assistant behavior through
    the conversation, such as `You are a helpful programming instructor.`'
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统提示**通过对话定义助手行为的指南，例如 `你是一位有用的编程讲师。`'
- en: Like many other GenAI tools in the industry, the OpenAI API calls are primarily
    a paid service. It does offer some limited free usage such as three requests per
    minute to a restricted selection of models, excluding *GPT-4o*. With just $5 in
    OpenAI credits, you can fully engage with the examples and labs presented in this
    book. We will instruct you how to do this right after our initial *Lab 2.1*.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 与行业中的许多其他 GenAI 工具一样，OpenAI API 调用主要是付费服务。它确实提供了一些有限的免费使用，例如每分钟对受限制的模型选择进行三次请求，不包括
    *GPT-4o*。只需 $5 的 OpenAI 信用额度，您就可以完全参与本书中展示的示例和实验室。我们将在最初的 *Lab 2.1* 实验之后指导您如何做到这一点。
- en: OpenAI API through a RESTful HTTP request
  id: totrans-290
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过 RESTful HTTP 请求使用 OpenAI API
- en: 'The OpenAI API services are accessed via **RESTful HTTP requests**, a communication
    protocol based on the principles of **Representational State Transfer** (**REST**)
    architecture, and using the **HyperText Transfer Protocol** (**HTTP**). RESTful
    HTTP provides a standardized way to send and retrieve data from servers over the
    internet. A request to OpenAI API includes four key components:'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI API 服务通过 **RESTful HTTP 请求** 访问，这是一种基于 **表示状态转移**（**REST**）架构原则的通信协议，并使用
    **超文本传输协议**（**HTTP**）。RESTful HTTP 提供了一种标准化的方式，通过互联网从服务器发送和检索数据。对 OpenAI API 的请求包括四个关键组件：
- en: '**Endpoint**: The URL specifying the service you are accessing, such as [https://api.openai.com/v1/chat/completions](https://api.openai.com/v1/chat/completions)
    for the Chat service'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**端点**：指定您要访问的服务 URL，例如用于 Chat 服务的 [https://api.openai.com/v1/chat/completions](https://api.openai.com/v1/chat/completions)'
- en: '**HTTP method**: The action to perform, such as `POST` for OpenAI Chat service
    requests, which sends data to the server'
  id: totrans-293
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**HTTP 方法**：要执行的操作，例如 OpenAI Chat 服务请求的 `POST`，它将数据发送到服务器'
- en: '**Headers**: Metadata about the request, including your API token, to authenticate
    and provide context for the request'
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**头部**：关于请求的元数据，包括您的 API 令牌，用于身份验证和提供请求的上下文'
- en: '**Body**: The data payload containing details such as the LLM to use and the
    input prompts'
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正文**：包含使用 LLM 和输入提示等详细信息的请求数据负载'
- en: 'Here is an example of a request to the OpenAI API Chat service using the `requests`
    package in Python. It demonstrates how to make a `POST` request to the service,
    including a header with your API key for authentication and a body containing
    the data payload, such as the model and a prompt:'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个使用 Python 中的 `requests` 包向 OpenAI API Chat 服务发送请求的示例。它演示了如何向服务发送 `POST`
    请求，包括一个包含您的 API 密钥进行身份验证的头部和一个包含数据负载的正文，例如模型和提示：
- en: '[PRE2]'
  id: totrans-297
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/3.png) **Quick tip**: Enhance your coding experience with the
    **AI Code Explainer** and **Quick Copy** features. Open this book in the next-gen
    Packt Reader. Click the **Copy** button'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: '![](../Images/3.png) **快速提示**：使用**AI代码解释器**和**快速复制**功能增强您的编码体验。在下一代Packt阅读器中打开本书。点击**复制**按钮'
- en: (**1**) to quickly copy code into your coding environment, or click the **Explain**
    button
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: （**1**）快速将代码复制到您的编码环境，或点击**解释**按钮
- en: (**2**) to get the AI assistant to explain a block of code to you.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: （**2**）让AI助手为您解释代码块。
- en: '![A white background with a black text  AI-generated content may be incorrect.](../Images/image_%282%29.png)'
  id: totrans-301
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景上的黑色文字  AI生成的内容可能不正确。](../Images/image_%282%29.png)'
- en: '**![](../Images/4.png)** **The next-gen Packt Reader** is included for free
    with the purchase of this book. Scan the QR code OR visit packtpub.com/unlock,
    then use the search bar to find this book by name. Double-check the edition shown
    to make sure you get the right one.'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: '**![](../Images/4.png)** **新一代Packt阅读器**随本书免费赠送。扫描二维码或访问packtpub.com/unlock，然后使用搜索栏通过书名查找此书。请仔细核对显示的版本，以确保您获得正确的版本。'
- en: '![A qr code on a white background  AI-generated content may be incorrect.](../Images/Split-B-PEN-Unlock-QR.png)'
  id: totrans-303
  prefs: []
  type: TYPE_IMG
  zh: '![白色背景上的二维码  AI生成的内容可能不正确。](../Images/Split-B-PEN-Unlock-QR.png)'
- en: Note that this code sample can also be found at the book’s repository path,
    *ch2/code_samples/openai_request.py*.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，此代码示例也可以在本书的存储库路径中找到，*ch2/code_samples/openai_request.py*。
- en: In this example, the payload is submitted in JSON format. If the request is
    successfully accepted and the server responds, the OpenAI API Chat service’s output
    can be retrieved from `response.json()["choices"][0]["message"]["content"]`.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 在此示例中，有效负载以JSON格式提交。如果请求成功接受并且服务器响应，可以从`response.json()["choices"][0]["message"]["content"]`检索OpenAI
    API聊天服务的输出。
- en: For Python developers, a more efficient approach to accessing the OpenAI Chat
    service is available. Rather than dealing with the complexities of crafting and
    sending RESTful HTTP requests, such as constructing the correct endpoint URL,
    setting authentication tokens in headers, formatting payloads in JSON, and handling
    potential response errors, we can leverage the dedicated `openai` package.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Python开发者来说，有一种更有效的方法可以访问OpenAI聊天服务。我们不必处理构建和发送RESTful HTTP请求的复杂性，例如构造正确的端点URL、在头中设置身份验证令牌、格式化JSON有效负载以及处理潜在的响应错误，我们可以利用专门的`openai`包。
- en: OpenAI API Python package installation
  id: totrans-307
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: OpenAI API Python包安装
- en: The `openai` Python package simplifies the process by abstracting complexities
    such as URL paths, retries, error handling, and authentication. This allows us
    to interact directly with Python objects, instead of manually constructing RESTful
    HTTP requests.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: '`openai` Python包通过抽象诸如URL路径、重试、错误处理和身份验证等复杂性，简化了安装过程。这使得我们能够直接与Python对象交互，而不是手动构建RESTful
    HTTP请求。'
- en: 'To install the `openai` package, run the following command in your terminal
    within your virtual environment:'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 要安装`openai`包，请在您的虚拟环境中运行以下命令：
- en: '[PRE3]'
  id: totrans-310
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'To verify that the `openai` package is installed correctly on your virtual
    environment, run the following command, which specifies the information of the
    package:'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 要验证`openai`包是否正确安装在您的虚拟环境中，请运行以下指定包信息的命令：
- en: '[PRE4]'
  id: totrans-312
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Your console will output information about the package version, author, and
    support email.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 您的控制台将输出有关包版本、作者和支持电子邮件的信息。
- en: With the `openai` package installed, we can simplify our interactions with the
    OpenAI platform using a programmatic framework. Instead of making direct RESTful
    HTTP requests, we will utilize Python classes. This results in fewer boilerplates,
    such as handling authentication and error management, and a more maintainable
    code.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 安装了`openai`包后，我们可以使用程序性框架简化与OpenAI平台的交互。我们不会直接发送RESTful HTTP请求，而是将利用Python类。这减少了样板代码，例如处理身份验证和错误管理，并使代码更易于维护。
- en: Important note
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: If you are already working with the book repository, you do not need to install
    the `openai` package separately. It is already specified in the `requirements.txt`
    file and should be installed in your virtual environment. If you require additional
    assistance in setting up your virtual environments, refer to the *Appendix* for
    detailed instructions.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您已经在处理本书的存储库，则无需单独安装`openai`包。它已在`requirements.txt`文件中指定，并应在您的虚拟环境中安装。如果您需要设置虚拟环境的额外帮助，请参阅*附录*以获取详细说明。
- en: Obtaining your project API keys from OpenAI
  id: totrans-317
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从OpenAI获取您的项目API密钥
- en: All requests to OpenAI API require an authentication token, and we must obtain
    one prior to submitting any request.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 所有对OpenAI API的请求都需要一个认证令牌，我们必须在提交任何请求之前获取一个。
- en: Navigate to [https://platform.openai.com](https://platform.openai.com) and log
    in with the same credentials as you use for ChatGPT at [https://chat.openai.com/](https://chat.openai.com/).
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 导航到 [https://platform.openai.com](https://platform.openai.com) 并使用与你在 [https://chat.openai.com/](https://chat.openai.com/)
    上使用的相同凭据登录。
- en: Once logged in, click on **Dashboard** in the upper-right menu, then select
    **API keys** from the left menu.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 登录后，点击右上角的 **仪表板**，然后在左侧菜单中选择 **API密钥**。
- en: Recently, OpenAI replaced personal API keys with the option to create a project
    API key. This new key serves two purposes. First, it allows personal use, as required
    for the work throughout this book. Second, it supports service API keys intended
    for non-human identities such as microservices running in production.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，OpenAI用创建项目API密钥的选项替换了个人API密钥。这个新密钥有两个用途。首先，它允许个人使用，正如本书中的工作所要求的那样。其次，它支持服务API密钥，这些密钥用于非人类身份，例如在生产中运行的微服务。
- en: '![Figure 2.1: Project API keys dashboard](../Images/B31534_02_1.png)'
  id: totrans-322
  prefs: []
  type: TYPE_IMG
  zh: '![图2.1：项目API密钥仪表板](../Images/B31534_02_1.png)'
- en: 'Figure 2.1: Project API keys dashboard'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.1：项目API密钥仪表板
- en: To generate your first API key, click on **Create new secret key** under your
    account icon at the upper left. Choose an API key that is owned by **You**, as
    we will use this key rather than assign it to a service account. You can assign
    a name for future reference, and it should be associated with a project (named
    *default project* if you have not changed the project name yet).
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 要生成你的第一个API密钥，点击右上角账户图标下的 **创建新密钥**。选择一个属于 **你** 的API密钥，因为我们将会使用这个密钥而不是将其分配给服务账户。你可以为它指定一个名称以便将来参考，并且它应该与一个项目相关联（如果你还没有更改项目名称，则命名为
    *默认项目*）。
- en: '![Figure 2.2: Creating a new secret key for personal use](../Images/B31534_02_2.png)'
  id: totrans-325
  prefs: []
  type: TYPE_IMG
  zh: '![图2.2：为个人使用创建新的密钥](../Images/B31534_02_2.png)'
- en: 'Figure 2.2: Creating a new secret key for personal use'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.2：为个人使用创建新的密钥
- en: Once you click on **Create secret key**, the platform will generate a new secret
    key for you.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 点击 **创建密钥** 后，平台将为你生成一个新的密钥。
- en: 'Return to your IDE, either VS Code or PyCharm, and export it as an environment
    variable from your terminal by running the following:'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 返回你的IDE，无论是VS Code还是PyCharm，然后在终端运行以下命令以将环境变量导出：
- en: '[PRE5]'
  id: totrans-329
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Alternatively, for a reproducible environment, you can use the *.env* file
    template provided with this book’s repository:'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，为了创建一个可重复的环境，你可以使用本书仓库提供的 *.env* 文件模板：
- en: "![Figure 2.3: The .env file template, placed at the root of the repositor\uFEFF\
    y](../Images/B31534_02_3.png)"
  id: totrans-331
  prefs: []
  type: TYPE_IMG
  zh: '![图2.3：.env文件模板，位于仓库根目录](../Images/B31534_02_3.png)'
- en: 'Figure 2.3: The .env file template, placed at the root of the repository'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.3：.env文件模板，位于仓库根目录
- en: If you choose to work with *.env* for your environment variables management,
    you should verify that your running configurations are set to work with this file.
    Refer to the *Appendix* if you need additional assistance.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你选择使用 *.env* 来管理环境变量，你应该验证你的运行配置是否设置为与该文件一起工作。如需额外帮助，请参阅 *附录*。
- en: Next, we will learn how to submit our first request to OpenAI API using the
    `openai` Python package, following a template that will be utilized throughout
    this book.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将学习如何使用 `openai` Python包提交我们的第一个OpenAI API请求，我们将遵循一个将在整本书中使用的模板。
- en: Lab 2.1 – sending your first OpenAI API request using the openai Python package
  id: totrans-335
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 实验2.1 – 使用openai Python包发送你的第一个OpenAI API请求
- en: With the installed Python package and the API Keys, we are all set to execute
    our first OpenAI API request. Note that you do not need OpenAI platform credits
    to complete this lab, and we will instruct you how to load credits to your account
    later in this chapter. If you have previously loaded credits to the OpenAI platform,
    this example should cost no more than a fraction of a cent to execute.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 安装了Python包和API密钥后，我们就准备好执行第一个OpenAI API请求了。请注意，完成这个实验不需要OpenAI平台的信用额度，我们将在本章后面指导你如何将信用额度加载到你的账户中。如果你之前已经将信用额度加载到OpenAI平台，这个示例的执行成本不会超过几分之一美分。
- en: 'In this lab, we will start with a simple template for executing OpenAI API
    requests to the Chat service and printing the response output. We will have three
    steps:'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实验中，我们将从一个简单的模板开始，用于执行对Chat服务的OpenAI API请求并打印响应输出。我们将有三个步骤：
- en: Create an `openai.OpenAI` class instance.
  id: totrans-338
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建一个 `openai.OpenAI` 类实例。
- en: Submit a request to the Chat service with a single user prompt and a model selection
    such as *GPT-4o-mini* or *GPT-3.5-turbo*.
  id: totrans-339
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用单个用户提示和一个模型选择（如 *GPT-4o-mini* 或 *GPT-3.5-turbo*）向聊天服务提交请求。
- en: Print the response output.
  id: totrans-340
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打印响应输出。
- en: 'These steps are in place in our starter code, and we will walk you through
    completing it, running it, and analyzing the results we get:'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 这些步骤已包含在我们的起始代码中，我们将引导您完成它、运行它并分析我们得到的结果：
- en: '[PRE6]'
  id: totrans-342
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: In this lab walk-through, we will build on this starter code to complete the
    `model` and `messages` arguments, enabling us to receive an AI-generated response
    to our request from the OpenAI platform.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实验室演示中，我们将在此基础上完成 `model` 和 `messages` 参数，使我们能够从 OpenAI 平台接收对请求的 AI 生成的响应。
- en: Lab 2.1 guided walk-through
  id: totrans-344
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实验室 2.1 指导性演示
- en: 'Open *Lab 2.1* in the book’s repository located at *ch2/labs/lab21.py*. First,
    we will instantiate a new instance of the `openai.OpenAI` class:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 在位于 *ch2/labs/lab21.py* 的书籍仓库中打开 *Lab 2.1*。首先，我们将创建 `openai.OpenAI` 类的新实例：
- en: '[PRE7]'
  id: totrans-346
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: We do not specify any authentication parameters directly in the code. The `OpenAI`
    client automatically retrieves the API key from the `OPENAI_API_KEY` environment
    variable. While it is possible to pass the API key using the `api_key` argument
    during instantiation, we strongly advise against hardcoding credentials in scripts
    for security reasons.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在代码中不直接指定任何认证参数。`OpenAI` 客户端会自动从 `OPENAI_API_KEY` 环境变量中检索 API 密钥。虽然您可以在实例化时使用
    `api_key` 参数传递 API 密钥，但我们强烈建议出于安全原因不要在脚本中硬编码凭证。
- en: 'The next step is to send a request using the OpenAI client. We will initiate
    a call to the Chat service by accessing `chat.completion`, where we will define
    the necessary RESTful HTTP request parameters. This includes at least two parts:
    the `model` and `messages` keyword arguments. The `model` argument represents
    the name of the LLM you are querying, and the `messages` argument represents the
    input prompts sent to the model:'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是使用 OpenAI 客户端发送请求。我们将通过访问 `chat.completion` 来发起对聊天服务的调用，在那里我们将定义必要的 RESTful
    HTTP 请求参数。这至少包括两个部分：`model` 和 `messages` 关键字参数。`model` 参数代表您查询的 LLM 名称，而 `messages`
    参数代表发送给模型的输入提示：
- en: '[PRE8]'
  id: totrans-349
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'If you have loaded credits onto your OpenAI platform account, enter the `model`
    value between the double quotes:'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您已在您的 OpenAI 平台账户中充值了积分，请在双引号内输入 `model` 值：
- en: '[PRE9]'
  id: totrans-351
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Otherwise, use the following model instead:'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
