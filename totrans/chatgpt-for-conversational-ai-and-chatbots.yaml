  type: TYPE_NORMAL
- en: '2'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using ChatGPT with Conversation Design
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will delve into the intersection of ChatGPT and conversation
    design. We’ll look at the role of the conversation designer and explore how **large
    language models** (**LLMs**) such as ChatGPT have impacted conversation design.
    We will also examine the practical applications of ChatGPT in conversation design,
    including its use in simulating conversations and creating personas. Finally,
    we’ll discuss the importance of testing and iterative design in creating effective
    and engaging conversational AI systems. By the end of this chapter, you will have
    a comprehensive understanding of how to utilize ChatGPT in conversation design.
  prefs: []
  type: TYPE_NORMAL
- en: Some of the prompt results are listed, while others have been omitted in the
    interests of space. We encourage you to try the prompts for yourself.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’re going to cover the following main topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding conversation design
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Working with practical applications of ChatGPT in conversation design
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Simulating conversations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Persona creation with ChatGPT
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Testing and iteration in conversation design with ChatGPT
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will be using ChatGPT. We recommend that you sign up with
    OpenAI.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding conversation design
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Conversation design is a complex and involved role that is key to creating a
    chatbot or voice assistant that is helpful and natural and, as a result, successful.
    There are other roles in the field of conversation design, particularly that of
    an AI trainer and variations of this role. For the purpose of this book, we will
    consider these other roles when discussing conversation design, as there is considerable
    overlap between the tasks carried out for many of them.
  prefs: []
  type: TYPE_NORMAL
- en: Conversation design leverages the principles of user experience design, linguistics,
    cognitive psychology, and AI to create engaging, interactive experiences between
    humans and machines over the medium of voice or text. At their core, conversation
    designers understand communications, the technology landscape of conversational
    AI, the mediums to deploy to their users, and how to satisfy user requirements.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of conversation design is to create a smooth, intuitive, and conversational
    user interface that feels natural to the user with the technologies available
    to mimic human-like conversation.
  prefs: []
  type: TYPE_NORMAL
- en: Exploring the role of conversation designers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Conversation designers carry out several important tasks. These are important
    to cover so we can see where LLMs and ChatGPT can be used to streamline and improve
    the process. Let’s look at the processes involved in creating conversation designs.
    It’s these designs that will be implemented on the chosen conversational AI platform
    for the project.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding user needs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first step in conversation design is to understand the user’s needs and
    behaviors, as well as the context in which the conversation takes place.
  prefs: []
  type: TYPE_NORMAL
- en: A conversation designer’s role is to understand an organization’s operations,
    processes, challenges, and aims. A good designer can turn business requirements
    into customer journeys, use cases, and natural flows. The designer needs to understand
    the personas of the intended users, including their age, demographic, needs, expectations,
    and language. They also need to understand the current interactions within the
    organization or application. A thorough understanding of existing inquiries and
    existing unstructured or structured data is especially important here, as is a
    solid understanding of the channel the conversational experience will be deployed
    to.
  prefs: []
  type: TYPE_NORMAL
- en: Designing the persona
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The persona for the agent not only decides its tone of voice but also guides
    its approach to conversations. This needs to be carefully considered to match
    user needs.
  prefs: []
  type: TYPE_NORMAL
- en: Existing brand and content guidelines will also need to be considered.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, a chatbot deployed on an enterprise software platform to handle
    customer support queries is going to have a different tone of voice and persona
    than an agent designed to help students with queries on WhatsApp during orientation
    week .
  prefs: []
  type: TYPE_NORMAL
- en: Designing conversations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The conversation flow is the sequence of interactions between the user and the
    conversational agent.
  prefs: []
  type: TYPE_NORMAL
- en: A conversation designer will need to prioritize existing use cases to understand
    what jobs an agent needs to carry out and how a conversation can be structured
    to achieve this task.
  prefs: []
  type: TYPE_NORMAL
- en: Intents clarification, utterance creation, and entities clarification
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: An intent represents the user’s intention. For example, the intent could be
    to find out the status of an order or to book a flight. Each intent is associated
    with a set of utterances, which are the phrases that users might use to express
    that intent. For example, for the intent of checking flight status, the utterances
    could be “*When does my flight leave?*” or “*Is my flight* *on time?*”.
  prefs: []
  type: TYPE_NORMAL
- en: Entities are the specific pieces of information that the chatbot needs to fulfill
    an intent. For example, for the intent of booking a flight, the entities could
    be the departure city, arrival city, and date of travel. It’s the conversation
    designers’ job to understand each type of entity and the different entries for
    each one. Common entities are often straightforward, as they are supported by
    conversational AI models. However, if a custom entity is needed, each one will
    have to be sourced. For example, a dog-training chatbot may need to understand
    all the different dog breeds.
  prefs: []
  type: TYPE_NORMAL
- en: Dialogue design
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: With the user journeys mapped out for the conversation, it’s the conversation
    designers’ job to create the details of the interactions. This involves designing
    the conversation flow between the user and the conversational agent. It includes
    defining the prompts that the chatbot will use to guide the conversation, the
    user responses, and the agent’s replies. The dialogue should be designed to be
    natural and engaging, and it should guide the user toward achieving their goal.
  prefs: []
  type: TYPE_NORMAL
- en: Designers carefully script dialogue and responses with different paths. These
    are based on potential user inputs where information needs to be gathered to enable
    the user to convey their needs, and the agent to gather the values needed to answer
    the query. Designers start with what is commonly known as the happy path, which
    is the easiest route through conversation to achieve the goal, and then build
    out to handle the edge cases around a conversation.
  prefs: []
  type: TYPE_NORMAL
- en: The design needs to support other situational edge cases, such as unhandled
    intents, mismatched intents, on-input, and any other ways a user can try to steer
    a conversation. There is a lot to document here. These designs can become complex
    with many turns of a conversation, as conversations are often not linear, and
    users may change topics or ask unexpected questions. It’s the conversation designer’s
    job to include this in a design.
  prefs: []
  type: TYPE_NORMAL
- en: 'Conversation designs are shared between project stakeholders using several
    different methods, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Flow charts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Spreadsheets
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pseudocode
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conversation management software, such as Voiceflow
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Depending on the size of the project, team, and budget, as well as personal
    preference, there is no one-size-fits-all approach for conversation design tools.
    As long as they are easy to iterate and collaborate on, these designs will often
    be touched by several different teams on the way to sign-off. However, some of
    the more popular conversation management tools offer a lot more than just design
    and collaboration and include some very useful features leveraging LLMs. This
    will be covered in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Copywriting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The last step is to write the actual text of the chatbot’s responses. This involves
    using persuasive and engaging language to guide the user through the conversation.
    The copy should reflect the chatbot’s persona and align with the brand’s voice
    and tone. For larger agents with hundreds or even thousands of responses, the
    challenge is often in securing consistency, particularly if there are several
    conversation designers working on a project in tandem or over time. As a conversational
    AI project matures, it’s even more likely that this will occur. As each party
    brings their own style to the project, the tone of voice can deviate from the
    original persona and brand guidelines for the agent.
  prefs: []
  type: TYPE_NORMAL
- en: Now we’ve covered the role of a conversation designer and the specific tasks
    that make up the process of conversation design before implementing a conversational
    AI solution, it’s time to see where ChatGPT can be utilized in these specific
    workflows.
  prefs: []
  type: TYPE_NORMAL
- en: Working with practical applications of ChatGPT in conversation design
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: From our understanding of the tasks that need to be carried out for conversation
    design, it’s easy to see that in some areas, we can leverage ChatGPT to help complete
    them. Some of the most popular conversation design tools also supply the ability
    to carry out these tasks as part of their functionality.
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: Remember that ChatGPT is a conversation design tool, not a replacement for conversation
    design best practices.
  prefs: []
  type: TYPE_NORMAL
- en: Intent clustering with ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Intents are the core concept of most traditional conversational AI agents. The
    intent is there to define the intention of the user, and each intent needs to
    have a set of utterances to fire this intent. Many conversational AI implementations
    start with large volumes of live chat data, voice transcripts, or other unstructured
    text data, which will form the basis of the tasks or intents that a chatbot or
    voice interface will need to support.
  prefs: []
  type: TYPE_NORMAL
- en: How can intent clustering be useful?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A conversational AI project may be in its infancy. It may also be a mature project
    under heavy use or one whose subject matter changes often. It’s often the conversation
    designer or AI trainer’s job to use this data to understand and prioritize the
    intents by clustering unstructured training data or utterances.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if you are looking to move from live chat to chatbot automation,
    you may have a large corpus of historical chat. You’ll want to look at this and
    decide which common questions or intents are asked the most. Similarly, a chatbot
    or voice assistant that handles a specific fluid subject matter, such as holidays,
    may need to be changed regularly to answer new questions arising from external
    factors. These new questions could be highlighted by clustering.
  prefs: []
  type: TYPE_NORMAL
- en: What is intent clustering?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Intent clustering essentially means looking at a large corpus of data and looking
    for groupings of semantically similar sentences. So, for our use case, we will
    be looking at our unstructured chat data and grouping based on semantically similar
    meanings so that we can start surfacing intents.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the past, the process of intent surfacing by clustering has involved either
    a complex process using embeddings, or the use of proprietary solutions such as
    HumanFirst. The process would follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data collection**: Assemble the corpus of text data that you want to analyze.
    This could range from a collection of scientific articles to a dataset of user-generated
    content.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Embedding generation**: Use machine learning libraries such as TensorFlow,
    services such as Word2Vec, or **Bidirectional Encoder Representations from Transformers**(**BERT**)
    to generate similarity embeddings for your text data. These embeddings are high-dimensional
    vector representations that capture the semantic content of the text. So, if a
    text has a similar meaning to another, then the embeddings will be closer together'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Clustering algorithm**: Apply an unsupervised machine learning algorithm
    such as K-means to the generated embeddings. These algorithms separate the high-dimensional
    embedding space into clusters based on the density and distance between points.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Cluster analysis**: Once complete, there should be sets of clusters of utterances,
    each containing semantically similar texts. Analyzing these clusters can reveal
    intents or questions, which can then be used to train an intent-based machine
    learning model.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In essence, clustering in this context is an unsupervised technique that uses
    semantic embeddings to group similar texts together, helping the discovery of
    underlying intents in large text datasets of unstructured text data.
  prefs: []
  type: TYPE_NORMAL
- en: Learning how to create intent clusters with ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Looking at achieving this with ChatGPT is straightforward when you follow the
    simple rules of prompt engineering: instruction, context, input data, and output
    indicator. We’ll cover more examples of prompt engineering in more detail in [*Chapter
    4*](B21100_04.xhtml#_idTextAnchor110).'
  prefs: []
  type: TYPE_NORMAL
- en: Prompting, for our intents, could look something like the following. It’s important
    to note that designing prompts is an iterative process that sometimes requires
    experimentation to get the results you are looking for.
  prefs: []
  type: TYPE_NORMAL
- en: For our first example, we are looking at creating a chatbot for our college
    website that will answer questions about the college. We have a set of unstructured
    utterances that have been harvested from a live chat implementation.
  prefs: []
  type: TYPE_NORMAL
- en: 'For this example, we are using instructions, input data, and an output indicator
    in our prompt. The instructions and input data handle telling ChatGPT what we
    want and what utterances to use. The output indicator also shows the format we
    want the result to use. In this case, JSON will be the most useful, as we’re looking
    at using the intents or utterances as part of an automated process. The model
    would also handle other output formats such as CSV. It looks something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'The result should look something like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Along with manually creating intents via the ChatGPT interface, it would also
    be possible to automate this process further by using the ChatGPT API directly.
  prefs: []
  type: TYPE_NORMAL
- en: Expanding the example to create intents
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Considering our chatbot use case, it may be that we want to build our intent
    set by creating more intents. For example, if your live chat data is limited and
    you would like to expand out to other intents, you can use ChatGPT to carry out
    a task to create more intents and utterances using some of your existing ones.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s create our prompt by using the output from our earlier example, prompting
    for intent clusters, which you can see in the prompt with the **{****input_data}**
    placeholder:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'If we run this prompt, we can see that this works well. This is the output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Understanding utterance and entity generation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In modern conversational AI systems, intents and entities are crucial components
    that enable the system to understand and process human language, enabling more
    natural and effective conversations. The task of creating these elements is one
    of the most common tasks for a conversation designer. These elements can then
    be used to train our machine learning model for the conversational AI platform
    we are using.
  prefs: []
  type: TYPE_NORMAL
- en: Creating utterances
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the earlier *Learning how to create intent clusters with ChatGPT* section,
    we looked at clustering utterances to surface intents from unstructured training
    data. ChatGPT can also be used to create utterances.
  prefs: []
  type: TYPE_NORMAL
- en: 'If we don’t have enough utterances for a specific intent, we can prompt ChatGPT
    to create a set of utterances for a specific intent, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'The results are surprisingly good:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'We can also be more specific about the types of utterances. For example, if
    we wanted a larger spread of utterances, we could prompt ChatGPT for longer tail
    examples. Let’s use the “Get College Location” intent use case and add long tail
    utterances to the existing utterances:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'This results in a larger breadth of utterances for our NLU training dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Each of the created utterances matches our criteria with a more conversational
    and complex (long tail) format.
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: Remember that artificial training data, even that created by LLMs, is no replacement
    for real usage data. This is particularly true when we are creating utterances
    for voice, as ChatGPT has been trained on textual data.
  prefs: []
  type: TYPE_NORMAL
- en: Creating entities
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another generative task that ChatGPT is very capable of is creating entities.
  prefs: []
  type: TYPE_NORMAL
- en: Entities are the specific pieces of information that relate to the intent. They
    are the variables that supply the details of the user’s request.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, consider our **Get_College_Events** intent. To answer the question
    correctly, we need to know a couple of things: the dates and types of events.
    While system dates tend to be supported by the conversational AI platform, custom
    entities often need to be created to train the NLU. For this particular use case,
    the event type would be the custom entity we need to populate. We can ask ChatGPT
    to help us with this. Remember to be as specific as possible with the prompt.
    In this case, we’re asking for the output to be formatted correctly for importing
    into our conversational AI platform:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'The results are a comprehensive set of entity types and corresponding synonyms:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: By correctly finding and processing entities, ChatGPT can create precise and
    useful responses quickly.
  prefs: []
  type: TYPE_NORMAL
- en: In the absence of any customer conversational data, ChatGPT utterances can serve
    as a good means to bootstrap a chatbot for further iterations.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to help write your dialogue
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Writing engaging chat and voice dialogue is one of the critical parts of a conversation
    designer’s role. So, how can ChatGPT help, and should you even consider using
    it?
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the challenges of writing dialogue
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As conversation designers, one of the most engaging yet challenging aspects
    of our work is crafting the responses of our chatbot or voice assistant. After
    all, this is your chance to shine. Good dialogue is the difference between a flat
    conversational experience and one that is truly engaging for your users.
  prefs: []
  type: TYPE_NORMAL
- en: 'Creating sample dialogue, ensuring smooth transitions between bits of dialogue
    within a flow, and formulating precise responses for highly specific contexts
    all take time and careful consideration. This is all done while dealing with the
    pressure of meeting deadlines and keeping stakeholders informed and feedback actioned.
    Some of the things to consider include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Upholding a voice and tone that resonate with your AI assistant’s persona
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keeping to company content guidelines
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Utilizing language that aligns with the content you may need to offer your users
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Handling error scenarios capably and consistently
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Striking a balance between saying too little and being overly verbose
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensuring that the crafted responses are effective across various modalities,
    not just in theory
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Addressing inherent biases that could influence the language we use and impact
    the end users
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Following legal and compliance guidelines carefully to ensure the language we
    use is correct and not going to land you legal hot water
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In essence, editing conversational dialogue is a complex set of tasks that requires
    a delicate balance of creativity, precision, and compliance.
  prefs: []
  type: TYPE_NORMAL
- en: Editing your dialogue with ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ChatGPT can perform several tasks to enhance your dialogue. Let’s delve into
    a few examples, such as rewriting for readability, checking content guidelines,
    or creating different versions of copy for a better conversational experience.
  prefs: []
  type: TYPE_NORMAL
- en: Rewriting for readability
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'If you have copy that is not written for your use case, but you still need
    to convey the included information, you can ask ChatGPT to rewrite it for you.
    Here is an example of a prompt for doing this. This is a copy of a patient information
    sheet for a clinical trial:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'From the result, you can see that ChatGPT has done an excellent job of summarizing
    the content:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Try this with your own example text. Keep iterating on your prompt until you
    have something you’re satisfied with.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another good dialog creation example is rewriting content for a specific purpose.
    For example, if we want to create a set of concise instructions from descriptive
    copy, we might use the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Providing concise instructions with context, input, and output instructions
    yields good results and something we can work with. Try this with your own examples.
  prefs: []
  type: TYPE_NORMAL
- en: It’s tempting to think that we can automate our response creation. However,
    it’s not wise to do so. The content created by ChatGPT is only a starting point.
    It’s essential to ensure that ChatGPT is supplying the right information and not
    changing meaning while also keeping to your conversation design requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Persona creation with ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: User personas are critical components in user-centric design, as they enable
    organizations to understand their target demographics and construct solutions
    tailored to their needs. This section will delve into how ChatGPT can be used
    to generate sophisticated and intelligent user personas.
  prefs: []
  type: TYPE_NORMAL
- en: Real-world example
  prefs: []
  type: TYPE_NORMAL
- en: Meet LuxeLocks, our imaginary company that specializes in selling luxury haircare
    products. LuxeLocks is passionate about providing its customers with high-end,
    quality products that transform their hair into a crowning glory. In an effort
    to elevate their customer service to the next level and to answer queries around
    the clock, LuxeLocks has decided to implement a chatbot.
  prefs: []
  type: TYPE_NORMAL
- en: This chatbot will be designed to assist customers in various ways, from helping
    them choose the perfect product based on their hair type and concerns, to answering
    frequently asked questions about product usage and ingredients, and even assisting
    with order tracking and returns.
  prefs: []
  type: TYPE_NORMAL
- en: By posing questions and presenting scenarios, you can gain insights into user
    preferences, behaviors, and pain points.
  prefs: []
  type: TYPE_NORMAL
- en: Persona creation is based on hard facts and user-specific data. Using ChatGPT
    is not a shortcut for real research, but it can help.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT for user research
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It’s beyond the scope of this book to outline the process of gathering information
    about your target audience through surveys, interviews, and market research. There
    is also no substitute for this. Here are some external sources to learn more about
    this process:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.questionpro.com/blog/research-process-steps/](https://www.questionpro.com/blog/research-process-steps/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[https://medium.com/@h_locke/every-ux-book-i-recommend-and-why-673d634ca530](mailto:https://medium.com/@h_locke/every-ux-book-i-recommend-and-why-673d634ca530)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[https://www.nngroup.com/articles/why-you-only-need-to-test-with-5-users/](https://www.nngroup.com/articles/why-you-only-need-to-test-with-5-users/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[https://www.usability.gov/what-and-why/user-experience.html](https://www.usability.gov/what-and-why/user-experience.html)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'However, it is feasible to use ChatGPT to help you with some ideas to carry
    out your research. You can do this with the following prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'The output can, at the very least, form a basis to start your research. This
    might look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'Once you have your details, you can also use ChatGPT to analyze the data and
    surface some details about the user groups:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: The preferences and characteristics of LuxeLocks users can then help us build
    up our user persona and supply steering for our chatbot persona.
  prefs: []
  type: TYPE_NORMAL
- en: Creating our user and chatbot personas
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can use the demographic characteristics created from the earlier prompt
    to help you create your user and chatbot personas.
  prefs: []
  type: TYPE_NORMAL
- en: Creating our user persona
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s prompt ChatGPT to create a persona and use the results from our earlier
    prompt for preferences and characteristics. Replace ***characteristics*** and
    ***preferences*** with those values in the prompt that follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: We can use the resulting persona description in follow-up questions to ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Creating our chatbot persona
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can also use ChatGPT to create your chatbot or virtual assistant’s persona.
    As with any prompt, you can vary the amount of information you include, but I’ve
    found that more detailed prompts lead to better results. Try using something like
    this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: We can now use our users’ and chatbot’s personas to guide ChatGPT in further
    tasks related to creating dialogue and interactions.
  prefs: []
  type: TYPE_NORMAL
- en: Simulating conversations
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: ChatGPT can be used to create sample conversations with potential users with
    a specific persona, which can be used to help create your conversation flows.
    Again, I’m stressing that this should not replace the conversational flow design
    process, but that it is an effective way of looking at specific use cases.
  prefs: []
  type: TYPE_NORMAL
- en: What is a sample dialogue?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Sample dialogue entails examples of specific multi-turn conversations between
    a user and an agent.
  prefs: []
  type: TYPE_NORMAL
- en: For those involved in the design and development of conversational experiences,
    these bits of dialogue are an essential tool. They allow us to explore the potential
    pathways a conversation can follow, and to evaluate which of these branches call
    for consideration and integration into the final conversational design.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Let’s now look at creating our own chatbot dialogue in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Creating sample dialogue
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In the following prompt, we supply information for tone, language, clarification,
    and elements of the conversation. We want to provide these in this case to ensure
    we have solved the problem:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: This results in a good conversational example. It’s worth trying different variations
    so that you can build up an understanding of the sorts of ways a conversation
    can go.
  prefs: []
  type: TYPE_NORMAL
- en: At this stage, we’re designing our flows, but we’ll also see later that we can
    use a similar technique as part of our testing process.
  prefs: []
  type: TYPE_NORMAL
- en: Creating sample dialogue with personas
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We can build on the creation of bits of sample dialogue, which have so far
    been centered on specific use cases, by passing more information about the user
    and agents’ personas into the prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: The trick here is to provide ChatGPT with details of your user and chatbot personas.
    Once you’ve provided these to ChatGPT, you can then give follow-up prompts requesting
    further examples of dialogue or use cases.
  prefs: []
  type: TYPE_NORMAL
- en: 'This technique will also work when looking at example use cases. In the next
    prompt, we will build on this and ask for another conversation example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: ChatGPT’s response is impressive here, as it goes one step further and creates
    some quiz questions, although the best choice would be to include details of your
    quiz.
  prefs: []
  type: TYPE_NORMAL
- en: The technique of detailed prompting to create conversation examples can also
    be used in testing and further iterations, which we’ll cover in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Testing and iteration in conversation design with ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Conversation design is an iterative process. Automated agents are always changing
    and being improved. In this section, we’ll look at testing and improving our agents
    with ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Testing with ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the earlier sections, we saw that ChatGPT can be a valuable tool in streamlining
    the design process by creating dialogue to help us craft our designs. We can carry
    out a similar approach when we test our agent before deployment.
  prefs: []
  type: TYPE_NORMAL
- en: We often create our agents based on which questions we think they are going
    to be asked. This is even more likely to be the case if we are starting a conversational
    AI project from scratch with little or no training data. If this is the case,
    it’s even more important to test your agent before releasing your agent into the
    wild.
  prefs: []
  type: TYPE_NORMAL
- en: Even if the conversational AI project has internal testers, or if you can expose
    friends or family to your agent before alpha or beta releases, it’s still valuable
    to test as thoroughly as possible before handing it over to human users. This
    is where ChatGPT can be utilized.
  prefs: []
  type: TYPE_NORMAL
- en: Conversation simulations for testing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This process is similar to the design process. We can create simulations where
    ChatGPT plays the role of a user. You can then build up sets of test user interaction
    scripts to follow with the chatbot without real user engagement.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll consider this in the context of our luxury haircare chatbot example. In
    the same way that ChatGPT was used to create entities and utterances, we can also
    use it to generate additional training data that mirrors real-world conversations.
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: If you continue with the same ChatGPT session from before, we’ll already have
    prompted our personas. If you’re starting a new session, remember to add these
    to your prompt to set the context.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, we’ll simply ask ChatGPT to create training data results in the form of
    questions that cover a range of topics related to haircare, product recommendations,
    sustainability, and personalized routines, reflecting Sophia’s persona and interests:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: 'We can also prompt for more long-tail examples so we can test these with our
    agent:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: Once we have a set of training questions, you can test our agent manually or
    create an automation if your chatbot provides APIs.
  prefs: []
  type: TYPE_NORMAL
- en: Creating more specific test scripts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For more complex conversational interactions, ChatGPT can also be used to create
    examples of the same flow so they can be used to test your agent.
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider an example inquiry from a user interested in the status of their order.
    This can be used as a prompt to ChatGPT to create other examples with different
    conversational turns:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: You can then run through these script examples with your chatbot to see how
    it performs.
  prefs: []
  type: TYPE_NORMAL
- en: Testing for failures and edge cases
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Other conversational outcomes for the same use case can also be considered and
    accounted for with ChatGPT. For example, you can use ChatGPT to cover edge cases
    that need to be accounted for within the design.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some examples could involve users straying away from the happy path, or the
    following example, where there are issues with the services Lila relies on to
    provide answers:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: 'You can also prompt ChatGPT to provide its own suggestions here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: The results can be used to check whether you’ve missed anything in the design
    and implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Iterating your chatbot with ChatGPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'As soon as you have real users testing your agent, you can use transcripts
    and interaction logs to see how your conversation designs can be improved by feeding
    examples to ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: This is particularly useful if you want to look at failed conversations, conversations
    that ended with unsatisfactory results, or conversations that ended with a dissatisfied
    user. It lets you look at ways you can improve your conversation flow.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we focused on how ChatGPT can be used in conversation design.
    We explored the multifaceted role of the conversation designer and looked at some
    of the many tasks that make up the conversation design process in more detail.
    We learned that some of these tasks can be tackled with the help of ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: We delved into the practical tasks involved, such as understanding user needs,
    designing personas, creating conversation flows, and writing dialogue.
  prefs: []
  type: TYPE_NORMAL
- en: We also learned that it’s important to understand that ChatGPT is not a replacement
    for good conversation design practices, but that it is an incredibly powerful
    tool.
  prefs: []
  type: TYPE_NORMAL
- en: At the heart of our use of ChatGPT as a conversation design assistant is the
    effective implementation of prompt engineering. We started to look at the principles
    involved with prompt engineering. In [*Chapter 4*](B21100_04.xhtml#_idTextAnchor110),
    we’ll look at prompt engineering in more detail to gain a deeper understanding
    of this emerging field. In the next chapter, we’ll look at the different ways
    of using ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The following links are resources to help you with this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://chat.openai.com/](https://chat.openai.com/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[https://www.deepset.ai/blog/the-beginners-guide-to-text-embeddings](https://www.deepset.ai/blog/the-beginners-guide-to-text-embeddings)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Part 2: Using ChatGPT, Prompt Engineering, and Exploring LangChain'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This part focuses on the hands-on use of ChatGPT, the intricacies of prompt
    engineering, and a deep dive into LangChain. You’ll explore different ways to
    interact with ChatGPT, whether through the web interface, APIs, or official libraries.
    You’ll also gain insights into prompt engineering, learning how to craft effective
    prompts. Finally, this section introduces LangChain, guiding you through both
    its basic and advanced uses, including debugging techniques, memory management,
    and leveraging agents for enhanced functionality.
  prefs: []
  type: TYPE_NORMAL
- en: 'This part has the following chapters:'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 3*](B21100_03.xhtml#_idTextAnchor080), *ChatGPT Mastery – Unlocking
    Its Full Potential*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[*Chapter 4*](B21100_04.xhtml#_idTextAnchor110), *Prompt Engineering with ChatGPT*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[*Chapter 5*](B21100_05.xhtml#_idTextAnchor138), *Getting Started with LangChain*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[*Chapter 6*](B21100_06.xhtml#_idTextAnchor159), *Advanced Debugging, Monitoring,
    and Retrieval with LangChain*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: ChatGPT Mastery – Unlocking Its Full Potential
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we’ll delve into the technical aspects of using ChatGPT so
    that you can get the most out of the technology and interact with the OpenAI models
    effectively with several different techniques. We’ll walk through the four different
    ways to interact with ChatGPT – that is, through the webchat interface, OpenAI
    Playground, directly using the **application programming interface** (**API**),
    or by using one of the official OpenAI libraries, all of which we’ll look at in
    more detail.
  prefs: []
  type: TYPE_NORMAL
- en: You will gain a solid understanding of the ChatGPT interface and the difference
    between the Free and Plus versions, as well as the power of custom instructions.
    Next, you’ll look at how to use AI Playground. Finally, we’ll cover how to interact
    with the API directly and look at the OpenAI Python and Node.js libraries.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, you’ll have a solid understanding of the different
    ways to interact with ChatGPT and be able to make informed decisions on which
    techniques to use.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’re going to cover the following main topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Mastering the ChatGPT interface
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Exploring OpenAI Playground
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learning to use the ChatGPT API
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will be using ChatGPT extensively, so you will need to sign
    up for a free account. If you haven’t created an account, go to [https://openai.com/](https://openai.com/)
    and click **Get Started** at the top right of the page or go to [https://chat.openai.com](https://chat.openai.com).
  prefs: []
  type: TYPE_NORMAL
- en: For the getting started examples, depending on your coding language, you will
    need an environment with Python installed.
  prefs: []
  type: TYPE_NORMAL
- en: Mastering the ChatGPT interface
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Using the ChatGPT interface is where most users started with ChatGPT and it’s
    the easiest way to interact with the technology. At the time of writing, you can
    use ChatGPT on iOS and Android and via the web.
  prefs: []
  type: TYPE_NORMAL
- en: The Free and Plus versions of ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At the time of writing, ChatGPT comes in Free and Plus versions. The free version
    allows you to use ChatGPT with some restrictions, while the Plus version includes
    some more powerful features and access to the latest GPT-4 model.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at the differences between the two versions and their availability
    across devices.
  prefs: []
  type: TYPE_NORMAL
- en: '**Free version – basic** **ChatGPT features**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Models**: GPT-3.5'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Features**: No plugin support'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cost**: Free'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Support**: No customer supports'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Response time**: Has lower response times compared to the Plus version'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ChatGPT Plus – expanded features with** **premium access**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Models**: GPT-3.5 and GPT-4'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Features**: Access to beta features, including **Browsing**, **Plugins**,
    and **Advanced** **Data Analysis**'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cost**: $24.00 per month'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Support**: Customer support'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Response time**: Response times are faster than the Free version, although
    GPT-4 currently has a cap of 50 messages every 3 hours'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Should you go for the Free or Plus version?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Whether you go for the Plus version is down to your budget and whether you need
    the extra features. The Plus version does provide faster response times and access
    to the latest GPT-4 model, which makes it worthwhile. If you’re looking to achieve
    more complex tasks, then GPT-4 gives much better output and can handle more involved
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Also, because the Plus version offers beta features, you can use plugins, which
    dramatically extend ChatGPT’s capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT interface
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this section, we’ll provide a detailed breakdown of the features you’ll
    see when using the main ChatGPT interface while using images as references. Although
    largely self-explanatory, some areas call for further details. The following screenshot
    shows the current ChatGPT interface:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.1 – ChatGPT interface](image/B21100_03_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.1 – ChatGPT interface
  prefs: []
  type: TYPE_NORMAL
- en: Once you’ve logged in to your OpenAI account, you can start using the ChatGPT
    ([https://chat.openai.com/](https://chat.openai.com/)) interface. Let’s become
    familiar with the AI tool’s interface.
  prefs: []
  type: TYPE_NORMAL
- en: Sidebar
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'On the left part of your screen is the sidebar, which holds the following features
    to manage conversations and your account:'
  prefs: []
  type: TYPE_NORMAL
- en: '**New Chat**: This allows you to start a new conversation. Use this button
    if you want to start a new dialog without the context of an earlier discussion.
    Remember that the ChatGPT model retains its memory of past conversations to provide
    contextual responses. So, if you want to change the topic of the conversation,
    it’s wise to start a new one.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chat History**: The left sidebar stores all your past dialogs, allowing you
    to revisit them whenever necessary. You can also turn this feature off in **Settings**
    | **Data Controls**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Account Options**: Clicking on your email address or name at the bottom of
    the sidebar shows a popup that provides access to the following options:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**My Plan**'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Custom Instructions**'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Settings** **and Beta**'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: You can also upgrade if you don’t have ChatGPT Plus.
  prefs: []
  type: TYPE_NORMAL
- en: Chat view
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The chat screen is where you interact with ChatGPT. It’s designed to mimic
    a messaging platform, offering a user-friendly environment where you can input
    your queries and receive responses from the AI:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Choose a model from the dropdown**: For Plus users, you can choose which
    GPT model you want to interact with: **GPT 3.5**, **GPT 4**, or **Plugins**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt examples**: There are also four buttons that you can select, along
    with examples of prompts to try'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Text input area**: Here, you can type your questions and responses'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Responses**: When ChatGPT responds to your queries, you can provide feedback
    by selecting the **Thumbs Up** and **Thumbs Down** buttons and copying the response
    to your clipboard'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bottom bar**: This tells you which released version of ChatGPT you are working
    with and includes a link to the release notes. This is useful for checking the
    latest features and whether they are available in your region.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Custom instructions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One issue with ChatGPT until recently is having to repeat context and instructions
    in prompts for every session. You had to store your prompts somewhere and remember
    which ones you used previously.
  prefs: []
  type: TYPE_NORMAL
- en: The **Custom instructions** feature fixes this as it allows users to personalize
    their interaction with the AI by providing it with specific instructions that
    it will remember in all future conversations.
  prefs: []
  type: TYPE_NORMAL
- en: Custom instructions are guidelines for ChatGPT to help it understand your preferences
    and needs without you having to include all this in your prompts. You can provide
    instructions covering what you would like ChatGPT to know about you so that it
    can provide better responses.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at a specific example for this subject matter: an instruction for
    a conversational AI professional.'
  prefs: []
  type: TYPE_NORMAL
- en: Example of a conversation designer instruction
  prefs: []
  type: TYPE_NORMAL
- en: I am a conversation designer working on creating engaging and natural dialogs
    for a virtual assistant. I often need help brainstorming dialog flows, generating
    natural responses, and understanding best practices in conversation design.
  prefs: []
  type: TYPE_NORMAL
- en: 'With this instruction, ChatGPT will be aligned to assist in several ways:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Designing flows**: Whenever the designer asks for assistance in creating
    dialog flows, ChatGPT can provide structured and detailed dialog sequences that
    align with industry standards'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Natural responses**: ChatGPT can help generate natural and engaging responses
    that can be used in the virtual assistant’s script, saving time and effort for
    the designer and providing variation when they want to provide different variations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Best practices**: The designer can inquire about the best practices in conversation
    design, and ChatGPT will provide insights based on the latest industry standards
    and trends'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Feedback and review**: The designer can ask ChatGPT to review dialogs they
    have created and receive constructive feedback to enhance their work'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resource recommendations**: ChatGPT can suggest books, courses, and other
    resources to help the designer further their knowledge and skills in conversation
    design'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By setting up custom instructions, the conversation designer can have a personalized
    assistant that understands their professional needs and assists them efficiently
    in their work. It essentially becomes a collaborative tool that understands the
    nuances of conversation design and offers tailored assistance without having to
    input this into subsequent sessions.
  prefs: []
  type: TYPE_NORMAL
- en: How to set up Custom instructions
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Setting up **Custom instructions** is a straightforward process and is available
    to both Free and ChatGPT Plus users, where they can use it on the web or via the
    Android and iPhone apps.
  prefs: []
  type: TYPE_NORMAL
- en: 'Simply click on the meatballs menu (**…**) and select the **Custom instructions**
    option. You will see two text boxes: one for adding details about yourself (such
    as age, location, hobbies, industry, and job type) and another for specifying
    the instructions that ChatGPT should follow (such as the tone and length of the
    responses).'
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to note that custom instructions are not supported when using
    the API. Instead, this can be achieved by putting the custom instructions into
    the system prompt message.
  prefs: []
  type: TYPE_NORMAL
- en: GPTs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GPTs are custom versions of ChatGPT, built for specific tasks or purposes. You
    can create your own GPTs without coding by giving instructions, adding extra knowledge,
    and creating actions. Actions allow you to pull in information from outside ChatGPT,
    enabling you to call external APIs and use the returned data in your GPT's knowledge
    base. The Create GPT interface walks you through the process, making it easy to
    build your own.
  prefs: []
  type: TYPE_NORMAL
- en: Think of GPTs as specialized versions of ChatGPT, tailored for your needs. For
    example, you could create a GPT to help you learn the rules of a board game, teach
    your kids math, or design stickers. You can even share these GPTs with others
    in the GPT Marketplace, potentially earning money if they prove popular.
  prefs: []
  type: TYPE_NORMAL
- en: The ChatGPT community is actively building and sharing GPTs for various purposes.
    The "GPT Store" makes it easy to find and use these creations. GPTs represent
    a new way to customize ChatGPT and unlock its potential for specific applications.
  prefs: []
  type: TYPE_NORMAL
- en: 'At this point, you have a good understanding of how to use the ChatGPT interface.
    In the next section, we’ll look at the second of our three methods to use ChatGPT
    and the other GPT models: OpenAI Playground.'
  prefs: []
  type: TYPE_NORMAL
- en: Exploring OpenAI Playground
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: OpenAI Playground provides a free-to-use web-based sandbox environment that
    makes it easy for users to test and experiment with ChatGPT and the GPT series
    of language models. The platform also provides useful guides and examples of tasks
    that can be carried out with the models. Users can interact with a range of models
    and save their playground sessions so that they can return to them or share them
    with other users.
  prefs: []
  type: TYPE_NORMAL
- en: Getting started
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At this stage, I’m assuming that you’ve created a free OpenAI account. Once
    logged in, you can access OpenAI Playground by clicking on the **Playground**
    link at the top of the page.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following screenshot shows OpenAI Playground’s landing page:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.2 – OpenAI Playground](image/B21100_03_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.2 – OpenAI Playground
  prefs: []
  type: TYPE_NORMAL
- en: The main text area is where you can interact with the model. Try inputting a
    question using one of the prompts from earlier in this book. You can also load
    presets. OpenAI has dozens of pre-made prompts built in. Click on **Your Presets**
    | **Browse examples** and select one from the list. It’s worth looking at some
    of these so that you can understand the sorts of tasks you can do and what’s needed
    to achieve them.
  prefs: []
  type: TYPE_NORMAL
- en: UI features
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: OpenAI Playground is easy to grasp but let’s take a quick look at the core features,
    all of which provide several useful features.
  prefs: []
  type: TYPE_NORMAL
- en: Saving your presets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can save your playground’s state by clicking on the **Save** button. At
    this point, you can toggle whether you want to make your preset accessible to
    anyone with the link. These presets will also be displayed in the **Presets**
    dropdown so that they can be used later.
  prefs: []
  type: TYPE_NORMAL
- en: Mode
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The **Mode** setting allows you to decide how you want the system to respond
    to your prompts. It’s best to leave this set to **Chat** as the other two choices
    are now deprecated.
  prefs: []
  type: TYPE_NORMAL
- en: AI models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can select the model you wish to interact with by using the **Model** dropdown.
    The list contains all the latest GPT-3 and GPT-4 models, as well as some of the
    legacy versions.
  prefs: []
  type: TYPE_NORMAL
- en: Parameters
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here, you can configure the following new parameters to get different results
    for your prompts. I’ll cover these in more detail when we cover prompt engineering:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Temperature**: This can be set between 0 and 1 and dictates the AI’s creativity
    level. By default, it is set to **0.7**, which generally gives better performance
    for my creative tasks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Maximum length**: This governs the extent of both the input prompt and the
    resultant output, measured in “tokens” rather than words or characters. A single
    token approximates four English characters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Stop sequence**: This instructs the AI to cease generation at a specified
    point. Typically, in a conversational AI use case setup, it’s useful for the model
    to halt after generating a one-line reply.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Top P**: This parameter offers another way to steer the randomness and creativity
    of the generated content by ranking tokens based on their relevance to the existing
    prompt to guide the output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Content filter preferences
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Clicking the three dots on the menu displays the option to choose the content
    filter preferences for the playground session. Toggling this on enables a warning
    if content involving sexual themes, hate speech, violence, or self-harm is found.
  prefs: []
  type: TYPE_NORMAL
- en: History
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Clicking on the **History** button loads up the last 30 days of your usage.
    Selecting any one of your sessions allows you to view the session and gives you
    the option of restoring this version, which will override your current session.
  prefs: []
  type: TYPE_NORMAL
- en: Viewing code
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For me, one of the key features of the playground is the ability to see the
    underlying code that drives the operations and outputs generated within. Click
    on the **View Code** option at the top of the menu and inspect the code that was
    executed when you were interacting with the chosen model.
  prefs: []
  type: TYPE_NORMAL
- en: 'Upon selecting the **Library** dropdown at the top, you can choose from the
    following options to see examples of how to interact with the OpenAI models:'
  prefs: []
  type: TYPE_NORMAL
- en: '**API** using curl and JSON payloads'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**SDKs** using Python and Node.js'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the next section, we’ll cover these approaches to using ChatGPT technology
    in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: Pricing for API and Playground
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: OpenAI pricing is based on a pay-as-you-go model. Upon initial registration,
    users receive a premium trial with credits that are valid for the first 3 months;
    after this period, the credits expire.
  prefs: []
  type: TYPE_NORMAL
- en: The consumption of credits varies with each model and these costs are documented
    on the OpenAI website. The billing metric is based on the number of tokens utilized,
    with every 1K token, equating to roughly 750 words, incurring a charge.
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: When you’re using the playground, you are still calling the same API endpoint
    you would use when calling the OpenAI endpoints directly. So, the playground and
    API calls cost the same.
  prefs: []
  type: TYPE_NORMAL
- en: How to track and control token usage
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can view your LLM usage tracking via the following dashboard:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3.3 – OpenAI usage dashboard](image/B21100_03_3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3.3 – OpenAI usage dashboard
  prefs: []
  type: TYPE_NORMAL
- en: Click on your username at the top right of the page to show the main menu and
    go to **Manage account** | **Usage**.
  prefs: []
  type: TYPE_NORMAL
- en: You can then see how many tokens you’ve used during the current and past billing
    cycles, as well as a breakdown of tokens for each request. You can also view other
    stats, such as how many credits you have left to spend.
  prefs: []
  type: TYPE_NORMAL
- en: For your peace of mind, it’s also a good idea to set usage limits so that you
    can manage your spending. You can do this by accessing **Organization Billing**
    | **Usage limits**. Here, you can set hard and soft limits.
  prefs: []
  type: TYPE_NORMAL
- en: This is particularly important if you have several team members using the API.
    It’s recommended to check the usage tracking dashboard regularly.
  prefs: []
  type: TYPE_NORMAL
- en: Learning to use the ChatGPT API
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: For many of the uses we covered in [*Chapter 2*](B21100_02.xhtml#_idTextAnchor057),
    it makes sense to use the ChatGPT web interface or the interactive playground.
  prefs: []
  type: TYPE_NORMAL
- en: However, OpenAI provides an extensive API that allows you to carry out several
    tasks with their models, including interacting with ChatGPT and their other models
    using code. So, if you’re looking to create complex applications with ChatGPT,
    and I’m hoping you are, then using the API is the way to go.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we’ll take a closer look at the different techniques you can
    use to interact with the ChatGPT API. These techniques will be used throughout
    the remaining chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Getting started
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can easily interact with the API through standard HTTP requests from any
    language, via the official Python or Node.js library, or a community-maintained
    library. It’s useful to look at examples of the code needed to interact with the
    API by looking at the Playground and clicking on the code option to view an example
    for each library or **curl** request. Alternatively, you can look at the API documentation,
    where you will find various examples. Authentication, model names, messages, and
    hyperparameters are elements you must understand when carrying out interactions
    with the API and libraries.
  prefs: []
  type: TYPE_NORMAL
- en: Authentication
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before interacting with the OpenAI API using any of the available means, you
    need to authenticate with an API key, which can be created in the console. Once
    logged in to the OpenAI dashboard, click on your username in the top-right corner.
    Select **View API Keys** from the drop-down menu. Then, click **Create new secret
    key** and give it a name. Make sure you write down your API key as you won’t be
    able to see it again.
  prefs: []
  type: TYPE_NORMAL
- en: Available Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Under **Available Models**, you can specify which model to use. In this case,
    it’s GPT-3.5 Turbo, which is the model powering the ChatGPT interface unless you
    selected GPT4\. At the time of writing, the following models are available for
    chat completion:'
  prefs: []
  type: TYPE_NORMAL
- en: '**gpt-4**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**gpt-4-0613**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**gpt-4-32k**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**gpt-4-32k-0613**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**gpt-3.5-turbo**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**gpt-3.5-turbo-0613**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**gpt-3.5-turbo-16k**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**gpt-3.5-turbo-16k-0613**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The Playground gives the names of the other GPT models you can use, though
    you can refer to the models’ page for more details: [https://platform.openai.com/docs/models](https://platform.openai.com/docs/models).'
  prefs: []
  type: TYPE_NORMAL
- en: Messages
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The messages array is an array of message objects that are formed via a role
    and content. The role can be one of the following types:'
  prefs: []
  type: TYPE_NORMAL
- en: '**System message**: System messages describe the behavior of the AI assistant
    for the duration of the conversation – for example, “*You are an expert Python
    programmer who talks like a character in the* *film Goodfellas*.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**User message**: User messages are essentially the prompts that you will be
    sending to the API. We’ll cover examples of user messages throughout this tutorial.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Assistant message**: Assistant messages are previous responses in the conversation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The first message that’s sent should be a system message. Messages that follow
    should alternate between the user and the assistant and contain content.
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: The messages array is where you will persist past messages in a conversation
    for your API integration. The API will not magically remember the context of the
    conversation. This mechanism is used by ChatGPT under the hood.
  prefs: []
  type: TYPE_NORMAL
- en: Hyperparameters
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'By fine-tuning these values, you can significantly influence the model’s output:'
  prefs: []
  type: TYPE_NORMAL
- en: '**temperature**: This is the level of randomness of the model’s output'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**max_tokens**: The maximum number of tokens to generate'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**top_p**: This controls the diversity of the generated text'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**frequency_penalty**: This affects the likelihood of tokens appearing based
    on their frequency in the training data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**presence_penalty**: This affects the likelihood of tokens that indicate the
    “*presence*” of certain entities or concepts in the generated text'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By fine-tuning these parameters, you can influence the model’s output, making
    it more deterministic, creative, or context-aware.
  prefs: []
  type: TYPE_NORMAL
- en: Calling the API directly
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The API endpoints provide other functionality, such as embeddings and fine-tuning
    models, along with generative tasks. However, for this book, we are only looking
    at the functions related to chatting with our models, which is the chat/completions
    endpoint.
  prefs: []
  type: TYPE_NORMAL
- en: To interact directly with the ChatGPT API, you can issue a **POST** request
    to [https://api.openai.com/v1/completions](https://api.openai.com/v1/completions).
  prefs: []
  type: TYPE_NORMAL
- en: 'Include an authentication header bearing the API key and any other parameters
    you want to send to the API:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: 'Responses from the API include the generated text, along with other metadata,
    and look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: The returned payload includes details of the chat’s completion, including the
    response itself and usage data.
  prefs: []
  type: TYPE_NORMAL
- en: This straightforward approach provides a granular level of control over the
    interaction with the OpenAI models, which is ideal for understanding the API endpoint’s
    requests and responses.
  prefs: []
  type: TYPE_NORMAL
- en: Calling the OpenAI API directly using something like **curl** is straightforward
    but can be annoying. It’s a good idea to use an API workflow tool such as Postman
    to simplify calling the endpoints. There is an unofficial Postman collection that
    you can fork and use to simplify the process.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve covered calling the API directly, in the next section, we’ll
    look at how we get started using the Python and Node.js libraries.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up with the OpenAI Python library
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Setting up your environment to use the OpenAI Python library is a straightforward
    process. Here are the steps to get you started:'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, install the library with the help of the following command:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Create a Python file and add the following code to it. Import the OS and OpenAI
    Python packages. Then, load your key from an environment variable so that you
    can use it with the package:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'To make a call to the ChatGPT API, you need to call **openai.ChatCompletion.create()**.
    This is the method you must call to interact with the chat completions endpoint.
    The following is an example of how you would call this. To make your code more
    reusable, wrap it in a helper function. It will take the message you want to send
    and other parameters to pass on to the **create()** function and return the API’s
    response:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The following helper function allows you to easily customize your interactions
    with the ChatGPT API. You can call the function as follows and print the response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: This gives us the flexibility to send whatever hyperparameters we want and change
    models.
  prefs: []
  type: TYPE_NORMAL
- en: Running the program
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s look at how to run the program:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Set up your environment variable**: Make sure you have your OpenAI API key
    set up in your environment variables. You can do this by running the following
    command in your terminal (replace **YOUR_API_KEY** with your actual API key):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Execute the Python script**: Save the code in a file, such as chatgpt_interaction.py,
    and then run the script from your terminal:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This setup allows you to send any message you want and adjust the parameters
    to fine-tune the behavior of the GPT model and compare responses between different
    models.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up with the OpenAI Node.js library
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'OpenAI presents a Node.js library, authored in TypeScript, which makes it a
    great option for TypeScript projects as the library includes TypeScript definitions.
    Let’s go ahead and start using the library:'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, install the library with the help of the following command:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'You should use environment variables or a secret management tool to expose
    your secret key. For example, you can create a **.env** file to store your environment
    variables (make sure you add this file to **.gitignore** to avoid committing it
    to your version control). You can use a package such as **dotenv** to load these
    environment variables in your application:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Reference your OpenAI API key stored in an environment variable.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'It also makes sense to create a helper function for greater flexibility:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The helper function allows you to easily customize your interactions with the
    ChatGPT API. You can call it like so:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The models, messages, and hyperparameters are the same ones that are used in
    the Python library.
  prefs: []
  type: TYPE_NORMAL
- en: Handling errors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If the library fails to establish a connection with the API or receives a non-success
    status code such as a 4xx or 5xx response, it will throw an exception derived
    from the **APIError** class.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this case, it’s easy to handle errors coming back from the service and you
    can choose to handle these as needed. In our helper function, we are looking for
    **APIError**:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: 'The returned error codes are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**400**: **BadRequestError**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**401**: **AuthenticationError**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**403**: **PermissionDeniedError**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**404**: **NotFoundError**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**422**: **UnprocessableEntityError**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**429**: **RateLimitError**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**>=****500**: **InternalServerError**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**N/A**: **APIConnectionError**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By understanding these error codes and how to handle them, you can create more
    robust and error-resilient applications using the OpenAI Python library.
  prefs: []
  type: TYPE_NORMAL
- en: Request and response structures
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This library encompasses TypeScript definitions for all request parameters
    and response fields. They can be imported and used as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  prefs: []
  type: TYPE_PRE
- en: By utilizing TypeScript definitions for request parameters and response fields
    in the **OpenAI** library, you can ensure that your code is type-safe and aligns
    with the expected structures of the API. This approach simplifies the process
    of constructing requests and interpreting responses and you can ensure a more
    efficient and error-resistant development experience when interacting with the
    OpenAI API.
  prefs: []
  type: TYPE_NORMAL
- en: Retries and timeouts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Retries for the following errors thrown by the API are automatically retried
    twice by default, with a short exponential backoff:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Connection errors**: **408**, **409**, and **429**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Internal** **errors**: **>=500**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can use the **maxRetries** option to configure or disable this for all
    API calls, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE44]'
  prefs: []
  type: TYPE_PRE
- en: 'Alternatively, you can set the following parameter on a per-call basis:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE45]'
  prefs: []
  type: TYPE_PRE
- en: 'Similarly, API timeouts can be configured with the **timeout** option. The
    default timeout is 10 minutes. You can set the default for all requests:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE46]'
  prefs: []
  type: TYPE_PRE
- en: 'You can also set the timeout on a per-request basis:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE47]'
  prefs: []
  type: TYPE_PRE
- en: It’s a personal preference for what language to use. There are also several
    open-source libraries available.
  prefs: []
  type: TYPE_NORMAL
- en: Other ChatGPT libraries
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you want to interact with the OpenAI API using other languages, there are
    lots of options. The open-source community has developed libraries in various
    programming languages to interact with OpenAI’s services. These libraries cover
    a range of programming languages and provide bindings and convenient methods for
    working with OpenAI’s APIs.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re working with Microsoft’s Azure, specific libraries are provided to
    interact with OpenAI services on Azure, such as the Azure OpenAI client libraries
    for Java and .NET, which are adaptations of OpenAI’s REST APIs.
  prefs: []
  type: TYPE_NORMAL
- en: Together, these libraries form a rich ecosystem that developers can leverage
    to interact with OpenAI services and models, either directly or through cloud
    platforms such as Azure.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, the focus has been on the various methods to interact with
    ChatGPT, each with its unique set of advantages, catering to different user needs
    and technical proficiencies. Initially, we looked at the ChatGPT interface, distinguishing
    between the Free and Plus versions while highlighting the latter’s enhanced features,
    which include faster response times and access to the GPT-4 model, which is instrumental
    for more complex tasks. We also covered the novel feature of custom instructions,
    which significantly optimizes user interaction by retaining specified instructions
    across sessions.
  prefs: []
  type: TYPE_NORMAL
- en: Moving on to OpenAI Playground, we looked at how this sandbox is a great platform
    for experimentation with OpenAI models. With a user-friendly interface, it allows
    for hands-on exploration of models, saving and sharing sessions, and viewing the
    underlying code, serving as a bridge between a point-and-click and a more code-driven
    approach.
  prefs: []
  type: TYPE_NORMAL
- en: In the final section, we covered the different ways you can interact with the
    OpenAI API.
  prefs: []
  type: TYPE_NORMAL
- en: The API serves as the primary means for developers to use ChatGPT. You learned
    how to do this by following a detailed walkthrough of using the API directly via
    HTTP or by using OpenAI’s Python and Node.js libraries. We explained the process
    of making API calls, handling errors, and configuring retries and timeouts, making
    it a comprehensive guide for developers.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, you may be wondering when you should use the API rather than
    the web interface or the Playground. For casual interactions and many of the conversation
    design tasks we’ve looked at so far, it makes sense to use the hugely popular
    chat interface, which handles your conversation context, custom instructions,
    and plugin interactions well.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to start looking at the other models and gain some exposure to the
    code behind interactions with the API, then OpenAI Playground is a good next stop.
  prefs: []
  type: TYPE_NORMAL
- en: However, if you want to include ChatGPT in your own conversational AI application,
    internal services, or data pipeline or you just want to have more control over
    your interactions with your model interactions, then the API is more appropriate.
    Leveraging the API through OpenAI’s libraries or community-driven libraries in
    your team’s language of choice is the way to go. Whatever your choice, at this
    point, you should be comfortable with all these methods.
  prefs: []
  type: TYPE_NORMAL
- en: So far, you used prompts extensively in [*Chapter 2*](B21100_02.xhtml#_idTextAnchor057)
    when learning how to use ChatGPT for conversation design tasks. In the next chapter,
    we’ll take a deeper dive into the new field of prompt engineering.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The following links are a curated list of resources to help you with using
    ChatGPT:'
