    ****t**he** ****mo**der**n ****wo**rld** ****h**as** ****t**o** ****of**fer**.'
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎所有人类都**天生**具有某种形式的**同理心**或形成同理心的能力。大多数时候，我们甚至无法帮助。当我们看到有人割伤手指或以某种方式受伤时，我们都会感到痛苦，但我们除了一次又一次地感受到他们的痛苦外，别无他法。这是因为同理心不仅是一种**天生的**（**与生俱来的**）能力，而且也是一种**本能**（**无需思考就能做到**）。在许多方面，我们与他人产生共鸣的能力是我们能够一起在更大的群体中工作的能力，这使我们能够构建我们周围的世界。话虽如此，同理心并不是一个**普遍的常数**。换句话说，同理心的能力并不是每个人都是一样的。就像我们每个人都有不同的个性特征、优势和劣势一样，我们也有不同的同理心能力。不仅如此，我们在生活中也经历了不同水平的同理心。而且，这并不像那些有钱的人感觉更有同理心，而那些没有钱的人则没有同理心那么明显。因为正如我们所有人都知道的那样，大多数富有的人并不是以关心他人而闻名，除了关心他们自己，而世界上有许多**钻石般**的**同理心**存在于一些最艰难的地区。
