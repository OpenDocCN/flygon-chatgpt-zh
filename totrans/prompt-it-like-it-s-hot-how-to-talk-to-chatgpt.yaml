  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 迭代思维：
- en: Am I prepared to refine and improve the output after the first draft?
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 我是否准备好在第一稿之后对输出进行精炼和改进？
- en: '✅ Energy and Curiosity:'
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ 能量和好奇心：
- en: Am I treating this like a creative dialogue, not just a one-time request?
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 我是不是把它当作一场创意对话，而不仅仅是一次性的请求？
- en: '* * *'
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Final Words:'
  id: totrans-544
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 最后一句话：
- en: The better your prompts, the better your world.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 你的提示越好，你的世界就越好。
- en: Keep practicing. Keep tweaking. Keep building conversations that move ideas,
