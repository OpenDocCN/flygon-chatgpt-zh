  prefs: []
  type: TYPE_IMG
- en: Figure 4\. Key Directives and Acts.
  prefs: []
  type: TYPE_NORMAL
- en: Data Act
  prefs: []
  type: TYPE_NORMAL
- en: 'Data Accessibility: Addresses the legal, economic, and technical aspects of
    data accessibility and reuse.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Fair Data Sharing: Promotes fair data sharing practices, particularly beneficial
    for SMEs and startups.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Critical Entities Directive
  prefs: []
  type: TYPE_NORMAL
- en: 'Critical Infrastructure Protection: Aims to protect essential services like
    energy, transport, banking, and health.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Risk Management: Requires entities to implement stringent risk management practices
    and report significant cyber threats.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cyber Resilience Act
  prefs: []
  type: TYPE_NORMAL
- en: 'Product Security: Focuses on the cybersecurity of products with digital elements.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Lifecycle Approach: Mandates a lifecycle approach to cybersecurity, from design
    to disposal.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI Act
  prefs: []
  type: TYPE_NORMAL
- en: 'AI Regulation: Aims to ensure AI systems are safe and respect EU values and
    fundamental rights.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Risk-Based Approach: Introduces a risk-based approach to AI governance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Digital Services Act
  prefs: []
  type: TYPE_NORMAL
- en: 'Online Platforms Regulation: Addresses the responsibilities of digital services
    and massive online platforms in managing online risks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Consumer Protection: Enhances consumer protection and transparency in digital
    services.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
