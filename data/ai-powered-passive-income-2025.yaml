  type: TYPE_NORMAL
  zh: '"可爱的[神话生物]乡村美学，柔和的灯光，奇幻 –v 6"（例如：“可爱的小蘑菇精灵乡村美学，柔和的灯光，奇幻 –v 6”）→ TikTok和Pinterest对这些疯狂追捧。'
