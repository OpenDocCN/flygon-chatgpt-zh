- en: Handling Events for the Control
  id: totrans-3548
  prefs: []
  type: TYPE_NORMAL
  zh: 处理控制项事件
- en: 'To handle events for the control, follow these steps:'
  id: totrans-3549
  prefs: []
  type: TYPE_NORMAL
  zh: 要处理控制项事件，请按照以下步骤操作：
- en: 1. Open the code window for the form.
  id: totrans-3550
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 打开表单的代码窗口。
- en: 2. Select the form control.
  id: totrans-3551
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择表单控制项。
- en: 3. Click the View code tool from the project explorer window, as shown in [Figure
    22.4](#fig22-4) (a).
  id: totrans-3552
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 如[图22.4](#fig22-4) (a)所示，从项目资源管理器窗口中点击查看代码工具。
- en: 4. Select the control which you have placed in your form from [Figure 22.4](#fig22-4)
    (b).
  id: totrans-3553
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 从[图22.4](#fig22-4) (b)中选择您在表单中放置的控制项。
- en: 5. Select the event for your control, as shown in [Figure 22.4](#fig22-4) (c).
