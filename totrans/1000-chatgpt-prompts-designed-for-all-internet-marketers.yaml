- en: '• First prompt: Write an Emotional 500 Word Journal Entry'
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
- en: from the perspective of **[ideal client]** who is struggling with **[pain points]**.
    He feels **[emotions]** and wants to **[dream outcomes]**.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 从 **[ideal client]** 的视角出发，他正在为 **[pain points]** 而挣扎。他感到 **[emotions]**，并希望实现
    **[dream outcomes]**。
- en: '• Second prompt: Rewrite the above but replace "I" with "you"'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: • 第二提示：重写上述内容，但将 "I" 替换为 "you"
- en: '• Third prompt: Use the above to write a **[word count]** words Sales Letter
    targeting **[ideal client]** who are struggling with **[pain points]**. Promise
    that if they keep reading they’ll see why the REAL reason they haven’t been able
    to **[dream outcome]** is something called **[unique mechanism]**. Offer a product
    named **[name of the product]** which has the main benefits:'
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: • 第三提示：使用上述内容撰写一篇 **[word count]** 字数的销售信，针对 **[ideal client]**，他们正在为 **[pain
    points]** 而挣扎。承诺如果他们继续阅读，他们将看到他们未能实现 **[dream outcome]** 的真正原因是一种称为 **[unique
    mechanism]** 的东西。提供一款名为 **[name of the product]** 的产品，其主要优点包括：
- en: • -**[Benefit 1]**
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: • -**[Benefit 1]**
- en: • -**[Benefit 2]**
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: • -**[Benefit 2]**
- en: • -**[Benefit 3]**
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: • -**[Benefit 3]**
- en: • Give this guarantee **[include guarantee]**, and include these credentials
    **[include credentials]**
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: • 提供这个保证 **[include guarantee]**，并包括这些证书 **[include credentials]**
- en: '• Fourth prompt: Include follow up instructions like:'
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: • 第四提示：包括后续指示，例如：
- en: • -Include the fact that we have helped **[number of people]** achieve **[dream
    outcome]**
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: • - 包含我们帮助 **[number of people]** 实现了 **[dream outcome]** 的事实
- en: • -Be more emotional in the intro
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: • - 在介绍中更加情感化
- en: • -Include these testimonials across the page **[paste testimonials]**
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: • - 在页面中包含这些推荐信 **[paste testimonials]**
- en: • -Use storytelling before mentioning the price
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: • - 在提及价格之前使用故事叙述
- en: • -Include a headline that mentions these **[pain points]** and **[desires]**
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: • - 包含一个提及这些 **[pain points]** 和 **[desires]** 的标题
- en: 'EXAMPLE:'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: • 示例：
- en: • Write an Emotional 500 Word Journal Entry from the perspective of a salon
    owner who is struggling with burnout and working far too many hours. She feels
    exhausted and wants to scale her business while delegating work to a team.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: • 撰写一篇从挣扎于倦怠和长时间工作的沙龙老板视角出发的500字情感日记。她感到筋疲力尽，希望在扩大业务的同时将工作委托给团队。
- en: • Rewrite the above but replace "I" with "you".
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: • 重写上述内容，但将 "I" 替换为 "you".
- en: '• Use the above to write a 1000 words Sales Letter targeting salon owners who
    are struggling with burnout after working far too many hours. Promise that if
    they keep reading they’ll see why the REAL reason they haven’t been able to increase
    profits and build a team is something called “Poverty Pricing”. Offer a product
    named “Scale Behind the Chair” which has the main benefits:'
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: • 使用上述内容撰写一篇1000字的销售信，针对长时间工作后挣扎于倦怠的沙龙老板。承诺如果他们继续阅读，他们将看到他们未能增加利润和组建团队的真实原因是一种称为“Poverty
    Pricing”的东西。提供一款名为“Scale Behind the Chair”的产品，其主要优点包括：
- en: • -Price as a luxury salon
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: • - 将价格定位为豪华沙龙
- en: • -Attract premium clients
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: • - 吸引高端客户
- en: • Work 4 hours a week
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: • 每周工作4小时
- en: • Guarantee that if they don’t make $20000 dollars in their 6 months you will
    give them 3 months of free coaching for free, and mention that the instructor
    has helped 200 salon owners reach 7 figures while working 4 hours per week.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: • 保证如果在6个月内他们没有赚到20000美元，你将免费提供3个月的免费辅导，并提到这位导师已经帮助200位沙龙老板在每周工作4小时的情况下达到7位数。
- en: •
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: •
- en: '• Result (without including testimonials, buttons, a bio, or a value stack):'
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: • 结果（不包括推荐信、按钮、个人简介或价值堆栈）：
- en: '• Scale Behind the Chair: The 6-Month Accelerator to Create a 7-Figure Salon
    While Working 4 Hours Per Week'
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: • 桌椅背后的扩展：每周工作4小时，6个月加速器，创建一个7位数的沙龙
- en: • Dear Salon Owner,
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: • 亲爱的沙龙老板，
- en: • Imagine waking up feeling completely burned out after working countless hours
    and sacrificing time with your loved ones just to keep your business running.
    You're exhausted, but you know you need to do something to increase your profits
    and build a team to take some weight off your shoulders.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: • 想象一下，在连续工作无数小时、牺牲与亲人相处的时间来维持业务运营之后醒来，感到完全筋疲力尽。你感到疲惫，但你知道你需要做些事情来增加利润并组建一个团队来减轻你的负担。
- en: • But, no matter how hard you try, it seems like you just can't seem to get
    ahead. You're stuck in a cycle of long hours and overwhelming stress, unable to
    see a way out.
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: • 但是，无论你多么努力，似乎你都无法取得进展。你陷入了长时间工作和压倒性压力的循环中，看不到出路。
- en: • It's a story all too familiar to many salon owners, and it was once my story
    too.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: • 这是一个许多沙龙老板都熟悉的常见故事，这曾经也是我的故事。
- en: • But, what if I told you that the real reason you haven't been able to increase
    profits and build a team is something called "Poverty Pricing"?
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: • 但是，如果你告诉我，你无法提高利润和组建团队的真实原因是一种叫做“贫困定价”的东西，你会怎么想？
- en: • As a former salon owner who struggled with burnout just like you, I know how
    frustrating it can be to feel like you're stuck in a never-ending cycle of hard
    work with no results. But, what I discovered after years of struggling was that
    the key to success in the salon industry was pricing my services as a luxury salon.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: • 作为一位曾经像你一样因过度劳累而感到沮丧的美容院老板，我知道感觉自己陷入了一个没有结果、永无止境的辛勤工作循环是多么令人沮丧。但是，经过多年的努力，我发现美容行业成功的关键是将我的服务定价为奢华美容院。
- en: • This is why I created "Scale Behind the Chair," a program specifically designed
    to help salon owners like you price their services as a luxury salon, attract
    premium clients, and work only 4 hours a week.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: • 这就是为什么我创建了“椅子背后的规模”，这是一个专门为像你这样的美容院老板设计的计划，旨在帮助他们将服务定价为奢华美容院，吸引高端客户，每周只需工作4小时。
- en: • Not only have I used these principles to grow my own successful salon, but
    I have also helped over 200 other salon owners reach 7 figures while working only
    4 hours per week. And, I'm confident that I can do the same for you.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: • 不仅我已经使用这些原则来扩大我自己的成功美容院，我还帮助了200多位其他美容院老板每周只需工作4小时就达到七位数。而且，我坚信我也能为你做到。
- en: • That's why I'm offering a guarantee. If after 6 months of using the strategies
    and techniques in "Scale Behind the Chair," you don't make $20,000, I'll give
    you 3 months of free coaching for free.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: • 正因如此，我提供了一份保证。如果在“椅子背后的规模”中使用的策略和技术6个月后，你未能赚到20,000美元，我将免费提供3个月的免费辅导。
- en: • It's time to say goodbye to burnout and hello to a profitable, successful
    salon. Keep reading to learn more about "Scale Behind the Chair" and take the
    first step towards a better future for your business and your life.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: • 是时候告别过度劳累，迎接一个盈利、成功的美容院了。继续阅读，了解更多关于“椅子背后的规模”的信息，并迈向你业务和生活的美好未来第一步。
- en: • Sincerely,
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: • 真诚地，
- en: • [Your Name]
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: • [你的名字]
- en: '📃 Writing a Landing Page (For Opt-Ins or Webinar Registrations) :'
  id: totrans-498
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📃 编写着陆页（用于注册或网络研讨会注册）：
- en: 'FILL-IN-THE-BLANK PROMPTS:'
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 'FILL-IN-THE-BLANK PROMPTS:'
- en: '• Write a landing page that offers **[lead magnet]** to **[audience]**. This
    free **[ebook/webinar/video series]** will help them:'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: • 编写一个提供**[引诱物]**给**[受众]**的着陆页。这个免费的**[电子书/网络研讨会/视频系列]**将帮助他们：
- en: • -[Benefit 1]
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: • -[收益1]
- en: • -[Benefit 2]
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: • -[收益2]
- en: • -[Benefit 3]
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: • -[收益3]
- en: • Mention that it is completely free and that I can help them because [include
    credentials].
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: • 提到这是完全免费的，并且我可以帮助他们，因为[包括资历]。
- en: '• Can you help me create a landing page for my [product/service] that converts
    visitors into customers? Here are some details about my [product/service]: [insert
    details such as benefits, unique selling points, target audience, etc.].'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: • 你能帮我创建一个可以将访客转化为客户的[产品/服务]着陆页吗？以下是我[产品/服务]的一些详细信息：[插入如收益、独特卖点、目标受众等详细信息]。
- en: 'OPEN-ENDED PROMPTS:'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 'OPEN-ENDED PROMPTS:'
- en: • "I need a landing page that can help me generate more leads for my business.
    Can you help me create one that highlights the key features and benefits of my
    product/service?"
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: • “我需要一个能够帮助我为我业务生成更多潜在客户的着陆页。你能帮我创建一个突出产品/服务关键功能和收益的着陆页吗？”
- en: • "I'm launching a new product and I need a landing page that can capture the
    attention of potential customers. Can you help me create one that's visually appealing
    and easy to navigate?"
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: • “我即将推出一款新产品，我需要一个能够吸引潜在客户注意力的着陆页。你能帮我创建一个既视觉上吸引人又易于导航的着陆页吗？”
- en: • "I want to promote my upcoming event and I need a landing page that can help
    me sell tickets. Can you help me create a page that includes all the necessary
    information and encourages visitors to register?"
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: • “我想推广即将举行的活动，我需要一个可以帮助我销售票务的着陆页。你能帮我创建一个包含所有必要信息并鼓励访客注册的页面吗？”
- en: • "I need a landing page that can showcase my portfolio and services as a freelancer.
    Can you help me create a page that highlights my skills and encourages potential
    clients to get in touch?"
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: • “我需要一个可以展示我的作品集和作为自由职业者的服务的着陆页。你能帮我创建一个突出我的技能并鼓励潜在客户联系我的页面吗？”
- en: • "I want to create a landing page for my e-book and I need it to be persuasive
    enough to convert visitors into customers. Can you help me create one that includes
    a clear call-to-action and highlights the key benefits of my book?"
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: • “我想为我的电子书创建一个着陆页，并且需要它足够有说服力，以便将访客转化为客户。你能帮我创建一个包含明确的行动号召并突出我书籍关键收益的着陆页吗？”
- en: • "I need a landing page that can convince visitors to sign up for my free trial.
    Can you help me create one that highlights the unique features of my product and
    persuades visitors to take action?"
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: • “我需要一个可以说服访客注册我的免费试用版本的着陆页。你能帮我创建一个突出产品独特功能并说服访客采取行动的着陆页吗？”
- en: • "I'm looking to generate more sales for my e-commerce store and I need a landing
    page that can help me convert visitors into customers. Can you help me create
    one that's visually appealing and includes persuasive product descriptions?"
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: • “我正在寻找为我的电子商务商店创造更多销售额，我需要一个可以帮助我将访客转化为客户的着陆页。你能帮我创建一个视觉上吸引人并包含有说服力的产品描述的着陆页吗？”
- en: 'EXAMPLES:'
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 'EXAMPLES:'
