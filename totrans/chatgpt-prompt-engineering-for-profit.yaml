    ****Refr**amin**g ****i**s** ****n**ot** ****nece**ssaril**y ****conc**erne**d
    ****wi**th** ****expl**ainin**g ****st**ep** ****b**y** ****st**ep**, ****b**ut**
    ****ra**the**r ****wi**th** ****gene**ratin**g ****n**ew** ****pers**pectiv**es.
    ****T**he** ****id**ea** ****i**s** ****t**o** ****bro**ade**n ****t**he** ****under**standi**ng
    ****o**f** ****t**he** ****is**sue**, ****a**nd** ****n**ot** ****de**tai**l ****t**he**
    ****reas**onin**g ****be**hin**d ****a**** ****si**ngl**e ****pers**pectiv**e.'
