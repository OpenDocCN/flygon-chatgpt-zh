  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释软件开发中常用的数据格式，例如 JSON、XML 和 CSV。编写示例，说明如何在 [Python/Node.js 等] 中解析和生成每种格式，并讨论每种格式最合适的场景。"'
