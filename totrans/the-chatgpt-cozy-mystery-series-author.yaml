- en: Decision Four. A Cool Hook for the Entire Series
  prefs: []
  type: TYPE_NORMAL
- en: Once you have a basic story idea, it’s time to come up with a fresh, intriguing,
    and cool story hook for your story idea that has the potential to be extended
