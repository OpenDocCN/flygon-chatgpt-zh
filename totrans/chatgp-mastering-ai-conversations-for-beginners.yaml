  zh: 正如您可以从上面列出的主要数据分析类型中看到，有大量的不同数据集需要被分析。这些数据可以追溯到历史数据，甚至可以延伸到当前情况，甚至通过尝试预测或推荐最佳行动方案来延伸到未来。没有这样的分析，我们就会任由命运的风吹雨打，以及顾客不断变化的喜好来决定一个企业是成功还是失败。既然那将是一个相当糟糕的商业模型，那么每个企业家或老板都应该发展对与他们的业务相关的数据分析的深入理解。
