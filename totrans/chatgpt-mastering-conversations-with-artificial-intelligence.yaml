    analysis-chatgpt-enterprise-version](https://help.openai.com/en/articles/8437071-advanced-data-analysis-chatgpt-enterprise-version)).'
  id: totrans-1648
  prefs: []
  type: TYPE_NORMAL
  zh: '[1](#footnote-10801-1-backlink)。OpenAI，"高级数据分析（ChatGPT企业版)"（2023年11月访问；[https://help.openai.com/en/articles/8437071-advanced-data-
    analysis-chatgpt-enterprise-version](https://help.openai.com/en/articles/8437071-advanced-data-
    analysis-chatgpt-enterprise-version))。'
- en: '[2](#footnote-10801-2-backlink). MIT Management, "How to Use ChatGPT''s Advanced
    Data Analysis Feature" (accessed in November 2023; [https://mitsloanedtech.mit.edu/ai/tools/data-
    analysis/how-to-use-chatgpts-advanced-data-analysis-feature/](https://mitsloanedtech.mit.edu/ai/tools/data-analysis/how-to-use-chatgpts-advanced-data-analysis-feature/)).'
  id: totrans-1649
  prefs: []
  type: TYPE_NORMAL
  zh: '[2](#footnote-10801-2-backlink)。麻省理工学院管理，"如何使用ChatGPT的高级数据分析功能"（2023年11月访问；[https://mitsloanedtech.mit.edu/ai/tools/data-analysis/how-to-use-chatgpts-advanced-data-analysis-feature/](https://mitsloanedtech.mit.edu/ai/tools/data-analysis/how-to-use-chatgpts-advanced-data-analysis-feature/))。'
- en: '**11\. The Future of Generative AI**'
  id: totrans-1650
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**11. 生成式AI的未来**'
- en: Until the 2000s, the way we used computers to solve problems was simple. Take
    a complex problem and have a human solve the problem. Then, have a programmer
    tell the machines to repeat what the human did. And now we have a new machine,
    which does not need programming. It learns on its own or under supervision. Some
    would call it AI, while some would call it another type of automation. This technology
    paved the way for innovations like ChatGPT.
  id: totrans-1651
  prefs: []
  type: TYPE_NORMAL
  zh: 直到2000年代，我们使用计算机解决问题的方法很简单。拿一个复杂问题，让人类解决问题。然后，让程序员告诉机器重复人类所做的事情。而现在我们有了一个新的机器，它不需要编程。它自己学习或在监督下学习。有些人会称之为AI，而有些人会称之为另一种自动化。这项技术为ChatGPT等创新铺平了道路。
- en: 'You have likely heard the hype:'
  id: totrans-1652
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经听到了炒作：
- en: '"ChatGPT will soon be sentient."'
  id: totrans-1653
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT很快就会变得有感知能力。"'
- en: '"ChatGPT will save us! ChatGPT will cure cancer. ChatGPT will solve climate
    warming."'
  id: totrans-1654
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT将拯救我们！ChatGPT将治愈癌症。ChatGPT将解决气候变暖。"'
- en: '"ChatGPT will destroy us. It will soon become Artificial Superintelligence
    and dominate us."'
  id: totrans-1655
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT将毁灭我们。它很快将成为人工超级智能并统治我们。"'
- en: But no! ChatGPT cannot do any of the above. At least, not today. It is a fantastic
    language model with numerous applications in creative domains, but its language
    fluency does not imply accuracy.
  id: totrans-1656
  prefs: []
  type: TYPE_NORMAL
  zh: 但不是这样的！ChatGPT不能做上述任何一件事情。至少，不是今天。它是一个出色的语言模型，在创意领域有众多应用，但它的语言流畅性并不代表准确性。
- en: 'ChatGPT works nicely but will not automatically lead to Artificial General
    Intelligence. It is a powerful technology; only:'
  id: totrans-1657
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT运行良好，但不会自动导致通用人工智能。这是一项强大的技术；只有：
- en: – It has no intuitive reasoning abilities. If you tell it that the street is
    wet, it cannot infer it is raining. It will ask for more context.
  id: totrans-1658
  prefs: []
  type: TYPE_NORMAL
  zh: – 它没有直观的推理能力。如果你告诉它街道是湿的，它不能推断出正在下雨。它会要求更多的上下文。
- en: '![Screenshoot1_1.tif](../Images/Screenshoot1_1_fmt.png)'
  id: totrans-1659
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot1_1.tif](../Images/Screenshoot1_1_fmt.png)'
- en: – It has no source of truth; it cannot independently verify the accuracy of
    its content, and it cannot correct itself.
  id: totrans-1660
  prefs: []
  type: TYPE_NORMAL
  zh: – 它没有真理来源；它不能独立验证其内容的准确性，也不能自行纠正。
- en: '![Screenshoot_2.tif](../Images/Screenshoot_2_fmt.png)![Screenshot_3.tif](../Images/Screenshot_3_fmt.png)'
  id: totrans-1661
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot_2.tif](../Images/Screenshoot_2_fmt.png)![Screenshot_3.tif](../Images/Screenshot_3_fmt.png)'
- en: – Its knowledge is limited to what was in the training corpus.
  id: totrans-1662
  prefs: []
  type: TYPE_NORMAL
  zh: – 它的知识仅限于训练语料库中的内容。
- en: '![Screenshoot_4.tif](../Images/Screenshoot_4_fmt.jpeg)'
  id: totrans-1663
  prefs: []
  type: TYPE_IMG
  zh: '![Screenshoot_4.tif](../Images/Screenshoot_4_fmt.jpeg)'
- en: But wouldn't it be nice to have a machine that could do that? The best use of
    advanced tools like ChatGPT relies on the user's skill and understanding, not
    just on the capabilities of the technology itself. We should learn how to use
    this magnificent creation, ChatGPT. We are just beginning to scratch the surface
    of what is possible by combining language, vision, and automation in a single
    AI system.
  id: totrans-1664
  prefs: []
  type: TYPE_NORMAL
  zh: 但不是很好吗？有一台机器能做这些事情？像ChatGPT这样的高级工具的最佳用途依赖于用户的技能和理解，而不仅仅是技术的本身能力。我们应该学习如何使用这个了不起的创造，ChatGPT。我们才刚刚开始探索通过将语言、视觉和自动化结合在一个AI系统中所能实现的可能性。
- en: And this is the future.
  id: totrans-1665
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是未来。
- en: McKinsey's research found that generative AI, including applications like ChatGPT,
    could add up to $4.4 trillion to the global economy annually.^([1](#footnote-10462-1))
  id: totrans-1666
  prefs: []
  type: TYPE_NORMAL
  zh: 麦肯锡的研究发现，包括ChatGPT在内的生成式人工智能应用每年可能为全球经济增加高达4.4万亿美元.^([1](#footnote-10462-1))
- en: What does this mean for our future?
  id: totrans-1667
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我们未来的意义是什么？
- en: Goldman Sachs research suggests that advancements in generative AI could lead
    to a 7% increase in global GDP over the next decade (nearly $7 trillion) and could
    lift productivity growth by 1.5 percentage points over the same period.^([2](#footnote-10462-2))
  id: totrans-1668
  prefs: []
  type: TYPE_NORMAL
  zh: 高盛的研究表明，生成式人工智能的进步可能导致未来十年全球GDP增长7%（近7万亿美元），并可能在该时期内提高1.5个百分点的生产率增长.^([2](#footnote-10462-2))
- en: Research by OpenAI and UPenn has found that around 80% of the US workforce could
    have at least 10% of their work tasks affected by Generative Pre-trained Transformers
    (GPTs). Approximately 19% of US workers may see at least 50% of their tasks impacted
    by the rise and eventual AI adoption. This study also indicates that ChatGPT-like
    AI can complete tasks faster than human workers, and jobs at all wage levels could
    be affected.
  id: totrans-1669
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI和UPenn的研究发现，大约80%的美国劳动力可能至少有10%的工作任务会受到生成式预训练变换器（GPTs）的影响。大约19%的美国工人可能会看到至少50%的任务受到人工智能兴起和最终采用的冲击。这项研究还表明，类似于ChatGPT的人工智能可以比人类工人更快地完成任务，所有工资水平的工作都可能受到影响。
- en: We will build new models that generate new ideas, not included in the training
    corpus, and new knowledge, not included in our science books, but most likely
    will be built on a different architecture than LLMs.
  id: totrans-1670
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将构建新的模型，生成训练语料库中未包含的新想法和知识，这些新知识可能不会包含在我们的科学书籍中，但很可能会基于与LLMs不同的架构。
- en: The speed the technology is changing is breathtaking, and it suggests that we
    will build these new machines sooner rather than later. Today's version of ChatGPT
    allows the freedom to select a customized AI for a specific purpose.
  id: totrans-1671
  prefs: []
  type: TYPE_NORMAL
  zh: 技术变化的速度令人叹为观止，这表明我们将比预期更早地构建这些新机器。今天的ChatGPT版本允许用户自由选择用于特定目的的定制AI。
- en: '![ChatGPT_screen1.tif](../Images/ChatGPT_screen1_fmt.png)'
  id: totrans-1672
  prefs: []
  type: TYPE_IMG
  zh: '![ChatGPT_screen1.tif](../Images/ChatGPT_screen1_fmt.png)'
- en: 'New functionalities have been made public at OpenAI DevDay^([3](#footnote-10462-3))
    (November 6, 2023, in San Francisco):'
  id: totrans-1673
  prefs: []
  type: TYPE_NORMAL
  zh: 在OpenAI DevDay^([3](#footnote-10462-3))（2023年11月6日，旧金山）上公布了新的功能：
- en: – A new GPT-4 Turbo model with knowledge up to April 2023 and supports a 128K
    context window.
  id: totrans-1674
  prefs: []
  type: TYPE_NORMAL
  zh: – 一个新的GPT-4 Turbo模型，知识截止到2023年4月，并支持128K的上下文窗口。
- en: '– New functionalities to create your custom versions of ChatGPT^([4](#footnote-10462-4))
    by combining instructions, extra knowledge, and any combination of skills. And
    note this: no need for any developer experience. Creating one is as easy as starting
    a conversation, giving it instructions and extra knowledge, and picking what it
    can do, like searching the web, making images, or analyzing data.'
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
  zh: – 通过结合指令、额外知识和任何技能组合，创建您自己的ChatGPT版本的新功能（^([4](#footnote-10462-4)））。请注意这一点：无需任何开发者经验。创建它就像开始一场对话，给它指令和额外知识，并选择它能做什么，比如搜索网络、制作图像或分析数据。
- en: You can make them. For you, your company's internal or public use.
  id: totrans-1676
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以创建它们。供您个人使用或您公司的内部或公共使用。
- en: Try it out at [https://chat.openai.com/gpts/discovery](http://https://chat.openai.com/gpts/discovery).
  id: totrans-1677
  prefs: []
  type: TYPE_NORMAL
  zh: 在[https://chat.openai.com/gpts/discovery](http://https://chat.openai.com/gpts/discovery)上试一试。
- en: GPTs will continue to get more skillful. Eventually, we will allow them to take
    on tasks in the real world.
  id: totrans-1678
  prefs: []
  type: TYPE_NORMAL
  zh: GPT将继续变得更加熟练。最终，我们将允许它们在现实世界中承担任务。
- en: In AI's field, these systems are called "agents."
  id: totrans-1679
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能领域，这些系统被称为“代理”。
- en: In addition to using the built-in capabilities, you can define custom actions
    by making one or more APIs available to GPT. Like plugins, actions allow GPTs
    to integrate external data or interact with the world. Connect GPTs to databases,
    plug them into emails, or make them your shopping assistant. For example, you
    could integrate a travel listings database, connect a user's email inbox, or facilitate
    e-commerce orders.
  id: totrans-1680
  prefs: []
  type: TYPE_NORMAL
  zh: 除了使用内置功能外，您可以通过使一个或多个API对GPT可用来定义自定义操作。像插件一样，操作允许GPT集成外部数据或与世界互动。将GPT连接到数据库，将它们插入到电子邮件中，或使它们成为您的购物助手。例如，您可以集成一个旅游列表数据库，连接用户的电子邮件收件箱，或促进电子商务订单。
- en: 'Until Artificial General Intelligence appears—and some argue this moment is
    only 5-15 years away—we must already prepare mentally for a new world in which:'
  id: totrans-1681
  prefs: []
  type: TYPE_NORMAL
  zh: 直到通用人工智能出现——有些人认为这一时刻只有5-15年——我们必须在心理上为一个新的世界做好准备，在这个世界中：
- en: – the best Go player is AI,
  id: totrans-1682
  prefs: []
  type: TYPE_NORMAL
  zh: – 最优秀的围棋选手是人工智能，
- en: – the best chess player is AI,
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: – 最优秀的国际象棋选手是人工智能，
- en: – AI can pass exams from law and business schools,
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: – 人工智能可以参加法律和商学院的考试，
- en: – AI can pass exams for the United States Medical Licensing,
  id: totrans-1685
  prefs: []
  type: TYPE_NORMAL
  zh: – 人工智能可以参加美国医学执照考试，
- en: – and many more accomplishments attributed to humans.
  id: totrans-1686
  prefs: []
  type: TYPE_NORMAL
  zh: – 以及许多归因于人类的成就。
- en: The following years will be very unusual as AI technology will accelerate its
    integration into our lives. Politicians should think about ways to avoid repeating
    another Oppenheimer moment so those who own the AI sources of power and wealth
    will hesitate before using them solely for their interests. Philosophers should
    think of a new kind of society where AI technology creates abundance, and conflicts
    for land and resources will stop.
  id: totrans-1687
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的几年里，将非常不寻常，因为人工智能技术将加速其融入我们生活的步伐。政治家们应该考虑避免重蹈奥本海默时刻的覆辙，让那些拥有人工智能力量和财富的人在使用它们仅为自己利益服务之前犹豫不决。哲学家们应该思考一种新的社会形态，在那里人工智能技术创造繁荣，土地和资源的冲突将停止。
- en: And we must prepare for "non-human" intelligence, already here and growing.
    AI will redefine jobs, businesses, and probably even our existence when this new
    form of automation frees us from tedious jobs. We need to find faster ways to
    upskill and use AI to create a better future.
  id: totrans-1688
  prefs: []
  type: TYPE_NORMAL
  zh: 我们必须为“非人类”智能做好准备，这种智能已经存在并正在增长。当这种新的自动化形式让我们从枯燥的工作中解放出来时，人工智能将重新定义工作、商业，甚至可能甚至我们的存在。我们需要找到更快的方法来提升技能并利用人工智能创造一个更美好的未来。
- en: '![162_Futuristic_space_exploration_command_center.tif](../Images/162_Futuristic_space_ex_fmt.png)'
  id: totrans-1689
  prefs: []
  type: TYPE_IMG
  zh: '![162_Futuristic_space_exploration_command_center.tif](../Images/162_Futuristic_space_ex_fmt.png)'
- en: '*Futuristic space exploration command center*'
  id: totrans-1690
  prefs: []
  type: TYPE_NORMAL
  zh: '*未来太空探索指挥中心*'
- en: '[1](#footnote-10462-1-backlink). McKinsey & Company, "What''s the future of
    generative AI? An early view in 15 charts" (accessed October 2023; [https://www.mckinsey.com/featured-insights/mckinsey-
    explainers/whats-the-future-of-generative-ai-an-early-view- in-15-charts](https://www.mckinsey.com/featured-insights/mckinsey-explainers/whats-the-future-of-generative-ai-an-early-view-in-15-charts)).'
