- en: Writing a Cozy Mystery Series
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 撰写温馨悬疑系列
- en: Cozy mystery series have never been so popular.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 温馨悬疑系列从未如此受欢迎。
- en: A whopping 83% of the [Cozy Category](https://amzn.to/3ToDYrm) top 100 eBooks
    on Amazon.com are part of an ongoing book series. [18 March 2024.]
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 亚马逊.com 上 83% 的温馨类别前 100 本电子书都是正在进行的书系列的一部分。[2024年3月18日]
- en: Plus, 48% of the top 100 Kindle bestsellers for Mystery, Thrillers, and Suspense
    on Amazon.com are eBooks in series. [K-Lytics. Mystery, Thriller, and Suspense
    Report. Feb 2024.]
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，亚马逊.com上神秘、惊悚和悬疑类前100名畅销书中，有48%是系列电子书。[K-Lytics. 神秘、惊悚和悬疑报告。2024年2月。]
- en: This overwhelming presence of series in the bestseller charts is a testament
    to the enduring popularity of mystery fiction and its ability to captivate readers.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这种系列在畅销书排行榜上的压倒性存在，证明了悬疑小说的持久受欢迎程度及其吸引读者的能力。
- en: While the concept of “series fatigue” is genuine, successful mystery series
    manage to leave readers eagerly anticipating each new installment.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然“系列疲劳”的概念是真实的，但成功的悬疑系列仍然能够让读者急切地期待每一部新作品的推出。
- en: Mystery readers love returning to the same characters they have come to know
    as real people living in an engaging fictional world.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 悬疑小说读者喜欢回到他们已经熟悉并视为真实生活在引人入胜的虚构世界中的角色。
- en: Agatha Christie fans, for example, still love her books, movies and TV series
    featuring Hercule Poirot and Miss Marple.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，阿加莎·克里斯蒂的粉丝仍然喜欢她以赫尔克里·波洛和简·马普尔为主角的书、电影和电视剧。
- en: Just think about how much fun you could have writing a series of books with
    characters you have created, in a story world which could be anywhere you wish.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 想想如果你能在你希望的地方创造一个故事世界，并创作一系列你创造的角色，那会有多有趣。
- en: However, all of the wonderful elements of cozy mysteries that make this genre
    so attractive to readers, can also create problems if you are writing a series
    featuring the same main sleuth and sidekicks.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，所有这些让本格推理小说对读者如此有吸引力的精彩元素，如果是在以相同的主要侦探和助手为特色的系列中写作，也可能造成问题。
- en: How do you keep the characters and setting fresh and interesting across a series
    of five or more books?
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何保持角色和背景在五本或更多书中保持新鲜和有趣？
- en: Should the characters change and grow, and when should you add in new characters
    into the core group that carries each story?
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如果角色需要改变和成长，你何时应该向核心群体中添加新角色？
- en: And what about the setting? Should you move to a different location in each
    book, or stay in one small local community?
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 那关于背景呢？你是在每本书中移动到不同的地点，还是留在一个小型的本地社区？
- en: In this guide, I will be exploring how you can develop a compelling cozy mystery
    series using characters and settings developed in the first book and then extended
    into a five-book series.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在本指南中，我将探讨如何使用在第一本书中开发的角色和背景来构建一个引人入胜的本格推理系列，并将其扩展为五本书。
- en: Writing five linked books is a lot of work!
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 写五本相互关联的书是一项很大的工作！
- en: That’s why I recommend using AI tools such as ChatGPT to help you develop your
    plot outline and character profiles faster than you thought possible. Building
    a linked series one book at a time – but without feeling overwhelmed by the scale
    of the work.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，我建议使用AI工具如ChatGPT来帮助你更快地发展你的情节大纲和人物档案，比你想象的要快。一次构建一个系列，一本书，但不会因为工作的规模而感到不知所措。
- en: Let’s get to it!
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: Writing with ChatGPT
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT写作
- en: My goal is simple. I want to understand how I can apply story craft to shape
    a story idea into compelling commercial fiction that will appeal to my ideal target
    audience, and then share that story with the largest potential audience of ideal
    readers.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我的目的是简单的。我想了解我如何可以将故事技巧应用到将故事想法塑造成吸引我理想目标受众的引人入胜的商业小说中，然后与最大潜在的理想读者群体分享这个故事。
- en: Over the past few years, three things have become very clear.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几年里，有三件事情变得非常清晰。
- en: First, mystery fiction is still one of the most popular genres. Like you, I
    love reading and writing mystery fiction. From historical to contemporary, from
    classic Agatha Christie tropes to same-gender sleuths, from paranormal to small-town
    western murder mysteries, readers have a passion for niche cozy mystery fiction.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，悬疑小说仍然是最受欢迎的流派之一。就像你一样，我也喜欢阅读和写作悬疑小说。从历史到现代，从经典的阿加莎·克里斯蒂情节到同性侦探，从超自然到小镇西部谋杀悬疑小说，读者对细分本格推理小说有着浓厚的兴趣。
- en: Secondly, commercial cozy mystery fiction has developed unwritten story conventions,
    tropes, and elements that today’s readers will recognize and expect to see in
    modern cozy mystery fiction, such as novellas and novels.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，商业本格推理小说已经发展出了未成文的叙事惯例、情节和元素，今天的读者会认出并期待在现代本格推理小说中看到，例如短篇小说和长篇小说。
- en: A paranormal, fantasy, or historical cozy mystery will have different worldbuilding
    conventions compared to a cozy set in a small town or a community in a modern
    big city, for example.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 与例如设定在现代大城市小镇或社区中的神秘小说相比，超自然、奇幻或历史神秘小说将有不同的世界观构建惯例。
- en: And now we get to the real challenge.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来到了真正的挑战。
- en: Thirdly. In order to make a living as a fiction author, you have to create more
    books, preferably in a linked series of books, faster than ever before. And then
    market and share those books around the world in the most efficient way possible.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 第三点。为了作为小说家谋生，你必须比以往任何时候都更快地创作更多书籍，最好是系列书籍。然后以最有效的方式在全球范围内推广和分享这些书籍。
- en: Why? If you want to make a living, you have to provide an entertaining cozy
    mystery that your readers will purchase, read, enjoy, and then immediately buy
    the next book in the series. And that reader wants the book now. Not in a few
    months.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？如果你想谋生，你必须提供一本令人愉快的神秘小说，让读者愿意购买、阅读、享受，然后立即购买系列中的下一本书。而且读者希望现在就得到这本书，而不是几个月后。
- en: Indeed, some cozy mystery readers will not invest time and money in the first
    book in a series until they know that the next book or books are complete. They
    have fallen in love with your characters and want to spend time with them in their
    next adventure. This is why many cozy mystery authors will often “bank” the first
    two books in a series until the third is complete and release all three over a
    short time period.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，一些神秘小说读者在知道下一本书或几本书已经完成之前，不会在系列的第一本书上投入时间和金钱。他们已经爱上了你的角色，并想在他们的下一次冒险中与他们共度时光。这就是为什么许多神秘小说作者通常会“存入”系列的前两本书，直到第三本书完成，然后在短时间内发布这三本书。
- en: And therein lies the problem.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 而问题就出在这里。
- en: Most cozy mystery authors do not write full-time. Every author has a different
    lifestyle and home life, but in my experience, genre fiction authors are real
    people who might have a day job to pay the bills, a family, a home to run, and
    children and/or relatives to take care of.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数神秘小说作者不是全职写作。每位作者都有不同的生活方式和家庭生活，但根据我的经验，类型小说作者都是真实的人，他们可能有一份工作来支付账单，有一个家庭要经营，有孩子和/或亲戚要照顾。
- en: Asking cozy mystery authors to become more productive so that they can write
    even more compelling, brilliant, captivating cozy mystery books and produce them
    faster is just adding more stress and pressure to an already busy life. And we
    know where that leads.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 要求神秘小说作者提高生产力，以便他们能写出更多引人入胜、精彩、吸引人的神秘小说，并更快地生产出来，这只是在他们已经忙碌的生活中增加了更多的压力和压力。我们知道那会走向何方。
- en: This is why an AI tool such as ChatGPT can transform your productivity and output.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么像ChatGPT这样的AI工具可以改变你的生产力和产出。
- en: These tools can assist you in writing a cozy mystery novel at every stage of
    the writing process, including Plot Generation, Character Development, Dialogue,
    Editing, and Book Marketing.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具可以在写作过程的每个阶段帮助你撰写神秘小说，包括情节生成、角色发展、对话、编辑和书籍营销。
- en: Limitations of AI tools such as ChatGPT
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT等人工智能工具的限制
- en: AI tools like ChatGPT have been trained on vast amounts of online data and can
    recognize patterns in language associated with specific fiction tropes. But they
    don’t understand the concept of creative author voice, or the subtle personal
    nuances of cozy mystery relationships and the emotional depth that is implicit
    in cozy mystery fiction.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于ChatGPT的人工智能工具已经在大量在线数据上进行了训练，并能识别与特定虚构主题相关的语言模式。但它们并不理解创意作者声音的概念，也不理解神秘小说关系中的微妙个人细微差别和神秘小说小说中隐含的情感深度。
- en: That’s why these tools can never totally replace a human author.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么这些工具永远无法完全取代人类作者。
- en: I prefer to think of ChatGPT as a very competent writing assistant who can suggest
    ideas and work through challenges at every stage of the writing process. You can
    then decide whether to accept these suggestions or look for better ones.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我更喜欢将ChatGPT视为一位非常称职的写作助手，他可以在写作过程的每个阶段提出建议并克服挑战。然后你可以决定是否接受这些建议或寻找更好的建议。
- en: Will ChatGPT be able to write my entire cozy mystery book for me?
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT能否为我写完整个神秘小说？
- en: No. At least, not yet. It can handle fact-based nonfiction text much more easily.
    But as we all know, writing creative fiction is an entirely different challenge.
    There are also technical limitations about how many words each prompt and output
    can cope with. That’s why I recommend using the paid version of ChatGPT Plus rather
    than the free version.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 不。至少，目前还不是。它处理基于事实的非虚构文本要容易得多。但正如我们所知，创作创意小说是完全不同的挑战。还有关于每个提示和输出可以处理多少字数的技术限制。这就是为什么我建议使用ChatGPT
    Plus的付费版本，而不是免费版本。
- en: How does ChatGPT work?
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是如何工作的？
- en: ChatGPT is just one example, among many, of a “large language model” form of
    Artificial Intelligence. This Chatbot-Generative Pretrained Transformer was launched
    in November 2022 and is now the fastest-growing product in history worldwide.
    The system has been trained to understand the connections between words and phrases
    that create languages.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT只是众多“大型语言模型”形式的人工智能中的一个例子。这个聊天生成式预训练转换器于2022年11月推出，现在是全球历史上增长最快的产品。该系统已被训练去理解创造语言的字词和短语的联系。
- en: 'That’s why it can:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是为什么它可以：
- en: Read and understand what you type.
  id: totrans-96
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 阅读和理解你所输入的内容。
- en: Write and respond to your questions and instructions using language that feels
    as though a human could have written it – with some limitations.
  id: totrans-97
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用感觉像是人类可以写出的语言来撰写和回应你的问题和指令——尽管有一些限制。
- en: Engage in a back-and-forth personal conversation with you.
  id: totrans-98
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与你进行来回的个人对话。
- en: It is still learning every time you type in a question or instruction. This
    is why you are advised to never include personal or sensitive information in your
    chats.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 每次你输入一个问题或指令时，它都在学习。这就是为什么建议你永远不要在聊天中包含个人或敏感信息。
- en: Prompts
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: The questions and instructions you provide to ChatGPT as input are known as
    “Prompts”- you are prompting the system with the information it needs to search
    for an answer.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你提供给ChatGPT作为输入的问题和指令被称为“提示”——你正在提示系统所需的信息以搜索答案。
- en: The secret to using ChatGPT for any form of writing, and especially creative
    writing, is to ask a series of questions using very clear and precise language.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行任何形式的写作，尤其是创意写作的秘诀，就是用非常清晰和精确的语言提出一系列问题。
- en: I prefer to interact with ChatGPT as if I am conversing with an intelligent
    person with a vast amount of knowledge who is learning English as a second or
    third language.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我更喜欢将ChatGPT视为一个拥有大量知识、正在学习英语作为第二或第三语言的有智慧的人进行对话。
- en: They have studied hard for years to develop a working vocabulary and understand
    most of what you say to them.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 他们已经努力多年，发展了一个工作词汇表，并理解了你对他们说的绝大多数内容。
- en: 'But when you ask them to discuss concepts and be creative, you have to be:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 但是当你要求他们讨论概念和发挥创意时，你必须：
- en: very clear about precisely what you want them to do and
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 非常清楚地说明你希望他们做什么。
- en: how you want them to do it.
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你希望他们如何去做。
- en: A poor prompt will lead to a vague, generalized response. A clear, well-defined
    prompt will give you insightful, precise responses.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 一个差的提示会导致模糊、笼统的回答。一个清晰、定义明确的提示将给你提供有洞察力、精确的回答。
- en: NOTE. The prompts used in this guide can be used with any large language model
    AI system, including Claude, Bard, CoPilot, Sudowrite, Novel Crafter and many
    others.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 注意。本指南中使用的提示可以用于任何大型语言模型AI系统，包括Claude、Bard、CoPilot、Sudowrite、Novel Crafter以及许多其他系统。
- en: The best way to illustrate how powerful ChatGPT can be and how prompts are structured
    is through a few examples.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 通过几个示例，我们可以展示ChatGPT的强大功能和提示的结构。
- en: WORKED EXAMPLE.
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作示例。
- en: Let’s imagine that you are writing a cozy murder mystery series from scratch
    and would like some help to get started.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一下，你正在从头开始创作一个温馨的谋杀谜案系列，并希望得到一些帮助来开始。
- en: You want this series to be based in a knitting and craft store.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你希望这个系列以一家编织和手工艺店为背景。
- en: Let’s kickstart some ideas for a new series!
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们启动一些新系列的想法！
- en: '![](image_rsrc42C.jpg)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc42C.jpg)'
- en: Please provide me with a list of 10 popular cozy mystery fiction tropes I can
    use to write a 70,000-word contemporary cozy murder mystery novel set in a small
    coastal town. For each of these ten tropes give me three examples of a compelling
    story idea for a contemporary cozy murder mystery novel based on that trope. Our
    sleuth is a retired woman who works in a knitting and craft store in this town.
    Each story idea should be engaging and attractive to potential readers of modern,
    cozy murder mystery fiction. Each story idea should include one murder investigation.
    Focus each murder on the knitting and craft theme.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 请提供一份10个流行舒适谋杀悬疑小说主题的清单，我可以使用这些主题来写一部70,000字的当代沿海小镇舒适谋杀悬疑小说。对于这十个主题，请给我三个基于该主题的引人入胜的故事想法。我们的侦探是这个镇上一家编织和手工艺店的退休女士。每个故事想法都应该吸引现代舒适谋杀悬疑小说的潜在读者。每个故事想法都应该包含一个谋杀调查。每个谋杀都聚焦于编织和手工艺主题。
- en: '![](image_rsrc42D.jpg)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc42D.jpg)'
- en: 'Creating a cozy murder mystery novel around popular tropes can give your story
    a familiar yet refreshing appeal. Set in a small coastal town, with a retired
    woman working in a knitting and craft store as the sleuth, presents a charming
    backdrop for intrigue and mystery. Here are 10 popular cozy mystery tropes and
    3 story ideas for each that could captivate readers of contemporary cozy mysteries:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 围绕流行的主题创作一个舒适的谋杀悬疑小说可以给你的故事带来熟悉而又清新的吸引力。设定在一个小沿海小镇，一位退休的女士在一家编织和手工艺店工作，作为侦探，提供了一个迷人的背景，适合阴谋和神秘。以下是10个流行的舒适谋杀悬疑小说主题和每个主题的3个故事想法，这些想法可能会吸引当代舒适谋杀悬疑小说的读者：
- en: 1\. The Secret Society
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 秘密社团
- en: 'The Purl of Death: A secretive knitting circle within the craft store discovers
    a pattern that, once knitted, reveals the location of a hidden gem in town. The
    murder of the circle''s leader spurs an investigation into the pattern''s origins
    and its deadly secrets.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 织针的死亡：手工艺店内的一个秘密编织圈发现了一个一旦编织就能揭示镇上隐藏宝石位置的图案。该圈领导人的谋杀引发了对图案起源及其致命秘密的调查。
- en: 'Stitches of the Past: An ancient tapestry displayed in the craft store is rumored
    to contain a map to a lost treasure. When the historian verifying its authenticity
    is found dead, the sleuth must unravel the tapestry''s mysteries.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过去的针法：在手工艺店展出的古代挂毯据说藏有一张通往失落宝藏的地图。当验证其真实性的历史学家被发现死亡时，侦探必须解开挂毯的谜团。
- en: 'The Crochet Conspiracy: A crochet group at the craft store uncovers a plot
    to defraud the town''s elderly out of their homes. The murder of a group member
    who was close to exposing the truth leads the sleuth on a tangled journey of justice.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 钩针阴谋：手工艺店内的一个钩针小组揭露了一个计划欺骗镇上老年人的阴谋。一位接近揭露真相的小组成员被谋杀，导致侦探踏上了一条错综复杂的正义之旅。
- en: 2\. The Annual Festival
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 年度节日
- en: 'The Fatal Stitch: The annual knitting festival''s highlight is a competitive
    showcase of handmade garments. When the favorite contestant is found dead, suspicion
    and the quest for a unique stitch pattern lead the sleuth through a maze of rivalry
    and envy.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 致命的针法：年度编织节的重头戏是一场手工服装的竞争展示。当最受欢迎的参赛者被发现死亡时，怀疑和对独特针法图案的追求将侦探引入了一个充满竞争和嫉妒的迷宫。
- en: 'The Quilted Whisper: A quilt show at the festival becomes the scene of a murder
    when a judge is found smothered under a quilt rumored to tell the future. The
    sleuth must piece together the quilt''s history and the murderer''s identity.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《被褥低语》：在节日上的被子展览成为谋杀案的现场，当一位法官被发现被捂在被子里，而这床被子据说能预示未来。侦探必须拼凑被子的历史和凶手的身份。
- en: 'Yarn Bombing Gone Wrong: The festival''s yarn bombing event turns deadly when
    the organizer is found strangled with a skein of yarn. The sleuth untangles the
    web of art, passion, and jealousy to catch the killer.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 纱线炸弹事件出错：当组织者被发现被一根纱线勒死时，节日的纱线炸弹活动变得致命。侦探必须解开艺术、激情和嫉妒的错综复杂的关系，以捕捉凶手。
- en: 3\. The Haunted Locale
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 被诅咒的地方
- en: 'The Ghostly Stitch: Legend has it that the old craft store is haunted by its
    original owner, a master craftswoman. When a body is found among the knitting
    needles and yarn, the sleuth must determine if the ghost has returned or if a
    more earthly force is at play.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 鬼魂的针法：传说中，这家老手工艺店被其原始主人，一位大师级的手工艺人，所诅咒。当一具尸体在编织针和纱线中找到时，侦探必须确定是鬼魂回来了，还是更世俗的力量在起作用。
- en: 'The Cursed Spindle: A spindle said to be cursed causes misfortune for those
    who use it. After a local crafter is found dead with the spindle, the sleuth must
    weave through superstition and reality to solve the mystery.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 咒怨纺锤：据说被诅咒的纺锤会给使用它的人带来不幸。在一位当地工匠被发现死在纺锤后，侦探必须穿过迷信和现实，以解决这个谜团。
- en: 'Phantom of the Fabric: Strange occurrences in the fabric section of the craft
    store lead to the discovery of a body behind the bolts of cloth. The sleuth stitches
    together clues to reveal if it''s the work of a spectral presence or a murderer
    hiding behind tales of ghosts.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 布料幻影：在工艺店的布料区发生的奇怪事件导致在一排布料后面发现了一具尸体。侦探将线索编织起来，以揭示这是否是幽灵的存在或隐藏在鬼魂故事背后的凶手所为。
- en: 4\. The Family Feud
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 家庭纷争
- en: 'The Embroidered Secret: A family gathering at the craft store to celebrate
    the unveiling of a generations-old embroidered tapestry turns deadly when the
    tapestry goes missing and its keeper is found murdered. The sleuth must decode
    the tapestry''s patterns to find the killer.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 织锦秘密：在工艺店庆祝一代代刺绣挂毯揭幕的家庭聚会中，挂毯失踪，其保管人被发现被谋杀。侦探必须解码挂毯的图案来找到凶手。
- en: 'The Legacy Quilt: The murder of a quilter who was about to donate a historic
    family quilt to the local museum unravels a family feud. The sleuth pieces together
    the quilt''s story and the family''s secrets to catch the murderer.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 传承拼布：一位即将向当地博物馆捐赠历史家族拼布的织布工被谋杀，揭开了一场家族纷争。侦探将拼布的故事和家族的秘密拼凑起来，以捕捉凶手。
- en: 'The Needlepoint Nemesis: A competitive needlepoint contest reveals deep-seated
    animosity within a crafting dynasty, leading to murder. The sleuth uses her knowledge
    of crafts and family dynamics to solve the case.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 针织恶魔：一场竞争激烈的针织比赛揭示了一个工艺世家中根深蒂固的仇恨，最终导致了谋杀。侦探利用她对工艺和家庭动态的了解来解决这个案件。
- en: 5\. The Town Eccentric
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 乡镇怪人
- en: 'The Woolen Warning: The town''s eccentric yarn dyer is found dead, wrapped
    in a skein of her most controversial colorway. The sleuth knits together clues
    from the dyer''s past to solve the murder.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 羊毛警告：镇上古怪的羊毛染色工被发现死在一条最具有争议的色彩方式的线团中。侦探将染色工过去的线索编织起来，以解决这起谋杀案。
- en: 'The Felted Figure: An artist known for her unique felted sculptures is murdered
    during the unveiling of her latest piece. The sleuth must feel her way through
    the art world''s egos and jealousies to find the killer.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 毛毡人物：一位以其独特的毛毡雕塑而闻名的艺术家在揭幕她最新的作品时被谋杀。侦探必须穿过艺术世界的自负和嫉妒，以找到凶手。
- en: 'Patchwork Clues: The discovery of a body covered in a patchwork of knitted
    squares at the craft store leads the sleuth on a hunt through the knitting community,
    uncovering secrets hidden in the patterns.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缝纫线索：在工艺店发现一具覆盖着针织方块的拼布尸体，侦探在针织社区中展开调查，揭露隐藏在图案中的秘密。
- en: 6\. The Mysterious Stranger
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 神秘陌生人
- en: 'The Looming Shadow: A stranger who arrives in town with a mysterious knitting
    technique is found dead after teaching a class at the craft store. The sleuth
    must unravel the stranger''s past and the secret behind the method to solve the
    murder.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 织机阴影：一位带着神秘针织技术的陌生人来到镇上，在工艺店教授了一堂课后被发现死亡。侦探必须揭开陌生人的过去和方法的秘密，以解决这起谋杀案。
- en: 'Knit One, Kill One: The sudden appearance and subsequent murder of a renowned
    but reclusive knitwear designer at a local knitting retreat brings the sleuth
    face to face with the cutthroat world of high fashion knitting.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一针致命：一位著名而隐居的针织服装设计师在当地针织度假村突然出现并遭到谋杀，侦探不得不面对这个残酷的高档针织世界。
- en: 'The Spinner''s Tale: After a spinner with a revolutionary fiber blend is murdered,
    the sleuth must untangle the threads of jealousy, competition, and innovation
    in the crafting community to catch the killer.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 纺纱者的故事：一位拥有革命性纤维混合物的纺纱工被谋杀后，侦探必须解开工艺社区中的嫉妒、竞争和创新的线索，以捕捉凶手。
- en: 7\. The Festival Disaster
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 节日灾难
- en: 'Dyed in Wool: The annual wool festival turns tragic when the organizer is found
    dead in a vat of dye. The sleuth must color through layers of deceit, rivalry,
    and crafty secrets to uncover the murderer.'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 染羊毛：年度羊毛节上，组织者被发现死在染料桶中，变得悲剧。侦探必须穿过欺骗、竞争和狡猾的秘密的层层，以揭露凶手。
- en: 'The Needle''s Eye: A high stakes knitting competition ends in death when one
    of the judges is found impaled with a knitting needle. The sleuth knits through
    a pattern of lies to reveal the truth.'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 针眼：一场高风险的针织比赛以一位评委被发现被针织针刺死而结束。侦探穿过谎言的模式，揭示真相。
- en: 'The Crochet Hook Conspiracy: During a crochet contest, a contestant is mysteriously
    murdered with a crochet hook. The sleuth must chain together motives and alibis
    to catch a crafty killer.'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《钩针阴谋》：在一次钩针比赛中，一名参赛者神秘地被钩针谋杀。侦探必须将动机和不在场证明串联起来，捕捉一个狡猾的凶手。
- en: 8\. The Locked Room
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 锁定的房间
- en: 'The Stitched Silence: A murder in a locked yarn room challenges the sleuth
    to unravel how the deed was done. Clues are knotted in yarn weights, types, and
    colors, leading to a tightly stitched solution.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《编织的沉默》：一个锁着的羊毛房间的谋杀案挑战侦探解开罪行是如何发生的。线索被编织在羊毛重量、类型和颜色中，引导到一个紧密编织的解决方案。
- en: 'The Woven Alibi: The body of a weaver is found in a locked weaving studio,
    surrounded by unfinished tapestries. The sleuth must weave through a fabric of
    alibis and motives to solve the murder.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《编织的辩解》：一位织工的尸体被发现在一个锁着的织布工作室里，周围是不完整的挂毯。侦探必须穿过一系列的辩解和动机来解开谋杀案。
- en: 'The Pincushion Puzzle: A seamstress is found dead in a locked sewing room,
    with a pincushion as the only clue. The sleuth sews together the seams of the
    case to reveal the murderer.'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《别针垫谜题》：一位女裁缝被发现死在锁着的缝纫室里，别针垫是唯一的线索。侦探必须缝合案件的线索，揭示凶手。
- en: 9\. The Old Flame
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 旧爱
- en: 'The Ex''s Embroidery: The sleuth''s ex, a talented embroiderer, returns to
    town only to be found dead with embroidery scissors in hand. The sleuth must stitch
    past heartache to piece together the truth.'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《前男友的刺绣》：侦探的前女友，一位有才华的刺绣师，回到镇上后却被发现手握刺绣剪刀死亡。侦探必须克服心碎，拼凑出真相。
- en: 'The Knit-Back Together: When the sleuth''s high school sweetheart, now a renowned
    yarn producer, is murdered, she must untangle old feelings and new clues to catch
    the killer.'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《重织在一起》：当侦探的高中恋人，现在是一位著名的羊毛生产商，被谋杀时，她必须理清旧感情和新线索来捕捉凶手。
- en: 'The Unraveled Affair: The discovery of an old love letter woven into a scarf
    at the craft store leads to murder when the scarf''s creator is killed. The sleuth
    must follow the thread of a long-lost romance to solve the case.'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《未解之谜》：在工艺品店发现一条编织在围巾上的旧情书，当围巾的创作者被杀时，导致谋杀。侦探必须追寻一段久远的浪漫线索来解决这个案件。
- en: 10\. The Secret Recipe
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 秘密食谱
- en: 'The Fatal Fiber: A secret fiber blend, said to be revolutionary, becomes the
    motive for murder when its creator is found dead. The sleuth must spin through
    a tangle of jealousy and ambition to uncover the killer.'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《致命纤维》：一种据说具有革命性的秘密纤维混合物成为谋杀的动机，当其创造者被发现死亡时。侦探必须穿过嫉妒和野心的混乱来揭露凶手。
- en: 'The Dyed Secret: The murder of a dyer known for a unique, secret dye recipe
    leads the sleuth on a colorful chase through the world of fiber arts to solve
    the mystery.'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《染料秘密》：一位以独特、秘密染料配方闻名的染色工的谋杀案，将侦探引领到纤维艺术的世界中，以解决这个谜团。
- en: 'The Pattern Thief: The death of a designer known for her exclusive knitting
    patterns, stolen right before a major competition, leaves the sleuth to purl through
    a skein of suspects to catch the killer.'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《窃贼的图案》：一位以独家编织图案闻名的设计师在一场重大比赛前被盗，她的死让侦探必须梳理一串嫌疑人以捕捉凶手。
- en: Each story idea is now intricately linked with the knitting and craft theme,
    offering a cozy and creative backdrop for your murder mystery novel.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 每个故事想法现在都与编织和工艺主题紧密相连，为你的谋杀悬疑小说提供了一个温馨而富有创意的背景。
- en: Did your jaw just drop?
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 你的下巴掉下来了吗？
- en: Mine did the first time I used this this kind of prompt.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 我第一次使用这种提示时就是这样做的。
- en: These outputs were created by ChatGPT in seconds.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 这些输出是由ChatGPT在几秒钟内创建的。
- en: Yes. Seconds. It took longer to type in the prompt than the system took to generate
    a response.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 是的。几秒钟。输入提示比系统生成响应的时间要长。
- en: I have just generated 30 story ideas for a Craft and Hobbies Cozy Mystery series
    from a single prompt!
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经从一个提示中生成了30个工艺和爱好温馨悬疑系列的故事想法！
- en: This is an astonishing development, and right now, the basic ChatGPT model is
    free for anyone to use.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个惊人的发展，目前，基本的ChatGPT模型对任何人都是免费的。
- en: 'You may have noticed a few things from this worked example:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经注意到了这个工作示例中的几个要点：
- en: The AI-generated book titles are based on the context of the story and the subgenre
    of different popular cozy mystery tropes.
  id: totrans-167
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能生成的书名基于故事背景和不同流行温馨悬疑主题的子类型。
- en: ChatGPT has learned technical information about yarns and crafts and can apply
    this to the instruction without additional prompting.
  id: totrans-168
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT已经学习了关于羊毛和工艺的技术信息，并且可以在不额外提示的情况下应用这些信息。
- en: The system can follow multi-part prompts/instructions and deliver results in
    seconds. It understands when you use more complex prompts, but you have to know
    what to ask and how.
  id: totrans-169
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 系统可以遵循多部分提示/指令，并在几秒钟内提供结果。它理解当你使用更复杂的提示时，但你必须知道要问什么以及如何提问。
- en: It only takes seconds to change this prompt to match your cozy niche. Experiment
    with different types of setting and your ideas for the sleuth and story world.
    And you can ask for as many story ideas as you wish!
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 只需几秒钟就可以改变这个提示以匹配你的温馨细分市场。尝试不同的场景类型和你的侦探和故事世界的想法。你可以要求尽可能多的故事想法！
- en: We will be working through the structure of prompts in detail, and there is
    a Prompt Library at the back of this book.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将详细研究提示的结构，这本书的后面有一个提示库。
- en: Aren’t most of these story ideas total cliches?
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这些故事想法大部分不是陈词滥调吗？
- en: Of course they are, and that is precisely because we asked ChatGPT to give examples
    of popular tropes.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，正是由于我们要求ChatGPT给出流行惯用句的例子。
- en: Tropes are shortcuts into the story that readers use to find the cozy mystery
    stories they love.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 惯用句是读者用来寻找他们喜爱的温馨悬疑故事的一种捷径。
- en: The system did what we asked it to do – hence the need to think about the prompt
    before you dive in.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 系统做了我们要求它做的事情——这就是为什么在深入之前需要考虑提示的原因。
- en: AI tools such as ChatGPT provide a starting point for triggering your own ideas
    for characters, external and internal conflicts, and settings. These ideas are
    presented as suggestions  designed to spark your imagination and creativity.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: AI工具如ChatGPT为你触发关于人物、外部和内部冲突以及场景的想法提供了一个起点。这些想法作为建议呈现，旨在激发你的想象力和创造力。
- en: Won’t my work be stilted and robotic?
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 我的作品不会显得生硬和机械吗？
- en: ChatGPT, Claude, Sudowrite, Novel Crafter, and the numerous AI fiction-support
    software platforms available online are tools.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT、Claude、Sudowrite、Novel Crafter以及网上可用的众多AI小说支持软件平台都是工具。
- en: Not replacements for your style or unique voice.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 它不是你风格或独特声音的替代品。
- en: New, more sophisticated options are already being developed, but right now they
    are valuable tools that any genre fiction author can use to transform their productivity
    and output – saving time, energy, and money so that you can focus on the quality
    of the cozy mystery fiction produced.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 新的、更复杂的选择正在开发中，但现在是任何类型小说作者都可以用来提高生产力和输出的宝贵工具——节省时间、精力和金钱，以便你可以专注于温馨悬疑小说的质量。
- en: Use their suggestions and outputs as inspiration and ideas for how your book
    could work.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 使用他们的建议和输出作为你书籍如何运作的灵感和想法。
- en: MINDSET SHIFT. Become an Agile Author.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 思维模式转变。成为敏捷作家。
- en: AI is not going away. ChatGPT and other AI writing tools are being developed
    at a truly astonishing rate, and the rate will accelerate over the next few years
    to become even more integrated into every part of our personal, writing, and business
    lives. It will change the world.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能不会消失。ChatGPT和其他AI写作工具正在以惊人的速度开发，未来几年，其发展速度将加快，更加融入我们个人、写作和商业生活的各个方面。它将改变世界。
- en: AI has the power to totally disrupt the publishing industry from the bottom
    up and the top down.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能有从上到下、从下到上彻底颠覆出版业的能力。
- en: What key points does this all come down to?
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这一切归结于哪些关键点？
- en: AI is a massive disruption you can leverage or avoid.
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能是一次巨大的颠覆，你可以利用它或避免它。
- en: The advantage an individual has over big companies is agility and the ability
    to adapt and adjust to technology faster and more creatively in hours rather than
    weeks.
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个人比大公司有优势的是敏捷性和快速适应和调整技术的能力，几个小时而不是几周。
- en: Your unique creative passion and purpose will become your superpower.
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你独特的创造热情和目标将成为你的超级力量。
- en: These are early days, and I believe that authors who adapt and use AI to support
    the creative writing process will be ahead of the game in a time of great turmoil.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 这些还是早期阶段，我相信那些适应并使用AI来支持创意写作过程的作者将在动荡时期领先一步。
- en: This is why AI is one of the most exciting technological advances in decades!
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么人工智能是几十年来最激动人心的技术进步之一！
- en: 'It’s time to re-think ChatGPT as your new friendly and professional story guide
    and co-author who:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 是时候重新思考ChatGPT作为你新的友好和专业故事向导和合著者了：
- en: Has the power to transform your productivity and output.
  id: totrans-192
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 它有改变你生产力和输出的能力。
- en: Is always available 24/7, providing you have an internet connection.
  id: totrans-193
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 只要你有互联网连接，它就始终可用，24/7。
- en: Is always ready to help with any aspect of the writing process.
  id: totrans-194
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 它始终准备帮助写作过程中的任何方面。
- en: If you have upgraded to ChatGPT Plus, it can handle inputs and outputs of several
    thousand words so that you can work one chapter at a time.
  id: totrans-195
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如果您已升级到ChatGPT Plus，它可以处理数千字的输入和输出，这样您可以一次处理一章。
- en: Can have a conversation with you on any topic you want – at least almost any
    subject. Violent and Erotic Content are not allowed. This is not the place to
    ask for help writing erotic mystery fiction.
  id: totrans-196
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 可以就您想讨论的任何话题与您进行对话——至少几乎任何主题。暴力和色情内容是不允许的。这不是请求帮助编写色情悬疑小说的地方。
- en: The Purpose of This Book
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 本书的目的
- en: The primary aim of this book is to guide authors, particularly those interested
    in cozy mystery fiction, through the process of using ChatGPT to enhance their
    writing and build a series of linked books.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 本书的主要目的是指导作者，特别是那些对温馨悬疑小说感兴趣的作者，通过使用ChatGPT来增强他们的写作并构建一系列相互关联的书籍。
- en: With the correct prompts and guidance, ChatGPT can help create compelling characters,
    emotional narratives, and vibrant settings that capture readers' hearts.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 通过正确的提示和指导，ChatGPT可以帮助创建引人入胜的角色、情感叙述和生动的场景，这些都能抓住读者的心。
- en: By understanding how ChatGPT works, how to craft effective prompts, and how
    to edit and refine the text it generates, authors can utilize this tool to augment
    their creativity, not replace it.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 通过了解ChatGPT的工作原理、如何编写有效的提示以及如何编辑和精炼它生成的文本，作者可以利用这个工具来增强他们的创造力，而不是取代它。
- en: I will be using a case study to demonstrate how ChatGPT can dramatically cut
    down the story development and plotting process for a complete series.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 我将通过案例研究来展示ChatGPT如何显著减少完整系列的故事发展和策划过程。
- en: I sincerely hope this book will act as a practical guide on how you can use
    ChatGPT to help you plot a compelling story that hits all of the expected story
    beats AND retains your unique voice.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 我真诚地希望这本书能作为一本实用指南，帮助您了解如何使用ChatGPT来帮助您策划一个引人入胜的故事，这个故事不仅包含了所有预期的故事节奏，而且保留了您独特的声音。
- en: No fluff or padding. Just practical information on how you can use the power
    of AI tools such as ChatGPT to help you plot and draft your commercial modern
    cozy mystery – fast!
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 没有花哨或填充。只是关于如何使用ChatGPT等AI工具的力量来帮助您快速策划和撰写商业现代温馨悬疑小说的实用信息。
- en: How to Plot a Cozy Murder Mystery Series using ChatGPT
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用ChatGPT策划温馨谋杀悬疑系列
- en: My Ten-Step Procrastination-Busting Process.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 我的十步克服拖延过程。
- en: In my experience, shaping and writing that first scrappy draft of your cozy
    mystery fiction of any length is the crucial first step in discovering more about
    your characters and where they want to take you inside your story.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的经验，塑造和撰写任何长度的温馨悬疑小说的第一个粗糙草稿是深入了解您的人物以及他们想将您带入故事中的关键第一步。
- en: That’s why this first draft is often called the “discovery” draft. It helps
    you to discover where your characters will take you.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么这个初稿通常被称为“发现”草稿。它帮助您发现您的人物将带您去哪里。
- en: ChatGPT will help you develop that crucial discovery first draft as quickly
    as possible. The best way to use this technology is to break down the story development
    process and work through a series of prompts in a step-by-step sequence. You are
    giving the AI a framework of specific instructions.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT将帮助您尽可能快速地开发那个至关重要的发现初稿。使用这项技术的最佳方式是将故事发展过程分解成一系列按步骤进行的提示。您正在为AI提供一个具体的指令框架。
- en: What’s more, it helps to fill in the gaps between your writing strengths. If
    you are brilliant at witty dialogue and characterization – that’s amazing! Let
    ChatGPT help you with plot outlines, setting, and world-building.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，它有助于填补您写作优势之间的空白。如果您在机智对话和角色塑造方面非常出色——那太棒了！让ChatGPT帮助您进行情节概述、场景设置和世界构建。
- en: How to Use the Ten-Step Process to Build a Series
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用十步法构建系列
- en: The first step is to come up with a fantastic high-concept story idea for book
    one of the series that is cool, different, intriguing, and so interesting that
    you cannot wait to find out where your characters will take you.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是构思一个令人惊叹的高概念故事想法，为系列的第一本书，这个想法要酷、不同、引人入胜，有趣到您迫不及待地想知道您的人物将带您去哪里。
- en: What is the setting? Contemporary, historical, or escapist fun?
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 设置是什么？当代的、历史的，还是逃避现实的乐趣？
- en: Now we need a detective and secondary characters who will investigate the murder.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要一位侦探和次要角色来调查谋杀案。
- en: By working quickly through your ideas and options, you can triage the results
    and select one idea to focus on.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 通过快速处理您的想法和选项，您可以对结果进行分类，并选择一个想法进行专注。
- en: These are the foundations for the entire series, so it is always worth taking
    the time to work on the core elements of the first book. The rest of the series
    will spin off from here. By working quickly through your ideas and options, you
    can triage the results and select one idea to focus on.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是整个系列的基础，所以总是值得花时间来处理第一本书的核心元素。系列的其余部分将由此展开。通过快速处理你的想法和选项，你可以对结果进行分类，并选择一个想法来集中关注。
- en: At this point, we are ready to start working on the murder mystery puzzle of
    the first book, which will set the tone and style for the complete series.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 到这一点，我们准备开始着手解决第一本书的谋杀神秘谜题，这将为整个系列设定基调和风格。
- en: This is the fun part of the writing process when you can create dozens of murder
    scenarios and go to town on cool and engaging ideas that are a perfect fit for
    both your sleuth and your story situation.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在写作过程中最有趣的部分，当你可以创造数十个谋杀场景，并对适合你的侦探和故事情境的酷炫和吸引人的想法进行深入研究。
- en: Once you have worked through these steps, you can then start working on a draft
    outline for the first book using a 4-Act story structure.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你完成了这些步骤，你就可以开始为第一本书制定一个草稿大纲，使用4幕故事结构。
- en: Big disclaimer here. There is no ideal or perfect way to write fiction.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个大警告。没有一种理想或完美的方式来写小说。
- en: There is only YOUR way, process, words, approach, and style. Every writer has
    to develop a unique writing method.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 只有你的方式，过程，文字，方法，风格。每个作家都必须发展一种独特的写作方法。
- en: I am sharing my process, based on my extensive study of story craft and my professional
    and practical experience creating fiction for a traditional publisher.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 我将分享我的过程，这是基于我对故事技巧的广泛研究和我在为传统出版社创作小说的专业和实际经验。
- en: This process can be applied to any fiction project but works particularly well
    for cozy mystery fiction, where a cozy mystery plotline is combined with character
    arcs to create an engaging, emotional journey for your reader.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程可以应用于任何小说项目，但特别适用于温馨神秘小说，其中温馨神秘情节与角色弧线相结合，为读者创造一个引人入胜、情感丰富的旅程。
- en: This process is the fastest way to get to the heart of your story.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程是到达你故事核心的最快方式。
- en: Let’s get started!
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: 'PART ONE: BUILDING THE FOUNDATIONS'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 第一部分：构建基础
- en: How to Plan a Cozy Murder Mystery Series using ChatGPT
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用ChatGPT规划温馨谋杀神秘系列
- en: How Do You Get Started Planning A Cozy Mystery Series?
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何开始规划一个温馨神秘系列？
- en: One successful approach is to start with a high-level concept and then add more
    layers and detail until you have a story idea that you cannot wait to start writing.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 一种成功的方法是从一个高级概念开始，然后添加更多层次和细节，直到你有一个迫不及待想要开始写作的故事想法。
- en: For me, it starts with three critical decisions.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，它始于三个关键决策。
- en: WHAT kind of cozy mystery fiction do you love to read and want to write?
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 你喜欢阅读和想要创作的哪种温馨神秘小说？
- en: WHERE is the ideal setting for that kind of mystery?
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 那种神秘故事的理想场景在哪里？
- en: WHO is the sleuth and the main characters in this story?
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个故事中，谁是侦探和主要角色？
- en: '![](image_rsrc42E.jpg)'
  id: totrans-233
  prefs: []
  type: TYPE_IMG
  zh: '![image_rsrc42E.jpg]'
- en: Decision One. Theme and Niche
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 决策一：主题和细分市场
- en: '![A blue and white rectangular box with white text  Description automatically
    generated](image_rsrc42F.jpg)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![A blue and white rectangular box with white text  Description automatically
    generated](image_rsrc42F.jpg)'
- en: What theme and cozy niche category would you use to describe your series?
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 你会用什么主题和温馨细分市场类别来描述你的系列？
- en: What kind of world does your series take us to? From wedding planning to book
    selling, dog walking to baking cupcakes, hobby store to historical or paranormal—the
    range is only limited by your imagination.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 你的系列带我们进入一个什么样的世界？从婚礼策划到书籍销售，从遛狗到制作纸杯蛋糕，从爱好店到历史或超自然——范围仅限于你的想象力。
- en: What are you interested in and curious about? What will keep you writing the
    following books in the series? You have to enjoy and care about the industry,
    craft, hobby, or period you are drawn to. The goal is to create immersive story
    worlds.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 你对什么感兴趣和好奇？什么会让你继续写系列中的下一本书？你必须喜欢并关心你被吸引的行业、技艺、爱好或时期。目标是创造沉浸式的故事世界。
- en: Use any specialist knowledge you may have. Focus on the way people talk, the
    jargon and idioms of the hobby or profession, the equipment and tools they use,
    and the arguments and gossip in the hobby or industry. These are the details that
    make the backstory of the characters and the storyworld come alive.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 使用你可能拥有的任何专业知识。关注人们说话的方式，爱好或职业的术语和习语，他们使用的设备和工具，以及爱好或行业中的争论和八卦。这些都是使角色的背景和故事世界生动起来的细节。
- en: Why Is It So Essential To Understand What Niche, Or Combination Of Niches, Best
    Describes The Cozy Mystery Fiction You Want To Write.
  id: totrans-240
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 为什么理解最佳描述你想要写的温馨悬疑小说的细分市场或细分市场组合是如此重要。
- en: 'Because the competition in the mystery genre is very tough, it is crucial to
    understand the following:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 由于悬疑体裁的竞争非常激烈，理解以下内容至关重要：
- en: The particular niche/sub-genre you love to read and is the best fit for the
    books you love to read and write.
  id: totrans-242
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你最喜欢阅读的特定细分/子类别，以及最适合你阅读和写作的书籍。
- en: The specific cozy mystery plotlines and story ideas that are associated with
    that particular niche/sub-genre.
  id: totrans-243
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与那个特定细分/子类别相关的特定温馨悬疑情节线和故事想法。
- en: How can you combine popular tropes and themes with your niche or niches to attract
    your ideal readers to your work?
  id: totrans-244
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你如何将流行的陈词滥调和主题与你的细分市场或细分市场相结合，以吸引你的理想读者阅读你的作品？
- en: It is the unique combination of all of these elements that will make your book
    unique and yet similar enough to other books in your selected niche that readers
    will instantly be able to recognize that this is the type of book that they want
    to read.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 正是所有这些元素的独特组合，将使你的书籍独特，同时足够接近你选择的细分市场中的其他书籍，以至于读者能够立刻认出这就是他们想要阅读的书籍类型。
- en: The good news is that there is now a vast range of cozy mystery niche categories
    and markets with readers who are looking for the next book and story world to
    discover.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，现在有大量的温馨悬疑细分市场和读者群体，他们正在寻找下一本书和故事世界来探索。
- en: The range means that it is crucial for you to decide on your niche before you
    start developing the story and characters for the first book and the series.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 这个范围意味着在你开始为第一本书和系列开发故事和角色之前，你必须决定你的细分市场。
- en: Establishing the theme and niche at this point impacts every other decision
    about this book and the characters.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段确定主题和细分市场将影响关于这本书和角色的所有其他决策。
- en: Each cozy mystery niche comes with a set of reader expectations and tropes,
    often associated with specific settings.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 每个温馨悬疑细分市场都伴随着一套读者期望和陈词滥调，通常与特定的环境相关。
- en: For example. I love to read cozy culinary mysteries with an amateur sleuth set
    in small communities. Bookstores come next. You may prefer paranormal themes,
    historical cozies, needlecraft, or a story with animal companions.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我喜欢阅读以小社区为背景的业余侦探的温馨烹饪悬疑小说。书店排在第二位。你可能更喜欢超自然主题、历史温馨小说、针线活或带有动物伙伴的故事。
- en: Every author is different. Your book, your idea, your choice.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 每位作者都是不同的。你的书，你的想法，你的选择。
- en: Note down some ideas and have fun with themes, plot ideas, characters, or hooky
    titles. You will find it easy to find something that interests you.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 记下一些想法，并享受主题、情节、人物或吸引人的标题。你会发现很容易找到你感兴趣的东西。
- en: '![A blue circle with white text  Description automatically generated](image_rsrc42G.jpg)'
  id: totrans-253
  prefs: []
  type: TYPE_IMG
  zh: '![一个带有白色文字的蓝色圆圈，描述自动生成](image_rsrc42G.jpg)'
- en: Let’s see what ChatGPT recommends.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看ChatGPT会推荐什么。
- en: Substitute your idea and story elements into this prompt to generate more specific
    responses and have fun.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的想法和故事元素代入这个提示，以生成更具体的回应，并享受乐趣。
- en: The more information about your themes that you can give ChatGPT the better,
    so don’t worry if you have a long list of questions.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 你能提供给ChatGPT关于主题的信息越多越好，所以如果你有一长串问题，请不要担心。
- en: '![](image_rsrc42H.jpg)'
  id: totrans-257
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc42H.jpg)'
- en: Please give me a full and detailed list of all of the story themes and publishing
    categories and subcategories for cozy mystery fiction.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 请提供一个完整且详细的关于温馨悬疑小说的故事主题和出版类别及子类别的清单。
- en: '![](image_rsrc42J.jpg)'
  id: totrans-259
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc42J.jpg)'
- en: 'Cozy mystery fiction is a subgenre of crime fiction characterized by its setting
    in a small community, the absence of graphic violence or explicit content, and
    often featuring an amateur sleuth. Within this subgenre, there are numerous themes
    and publishing categories/subcategories that cater to a wide range of reader interests.
    Here''s a comprehensive list:'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 温馨悬疑小说是犯罪小说的一个子类别，其特点是在小社区中设定，没有血腥暴力或露骨的内容，通常以业余侦探为主角。在这个子类别中，有众多主题和出版类别/子类别，以满足广泛的读者兴趣。以下是一个全面的列表：
