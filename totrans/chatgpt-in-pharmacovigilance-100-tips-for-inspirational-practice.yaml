- en: This CRF example is meant to gather comprehensive data that can be used for
    the evaluation of the cancer medication's efficacy and safety. The actual CRF
    design would be much more detailed and would be created in consultation with clinical
    experts, statisticians, and regulatory authorities to ensure all necessary data
    is captured accurately and completely.
  id: totrans-2347
  prefs: []
  type: TYPE_NORMAL
  zh: 本CRF示例旨在收集可用于评估癌症药物疗效和安全性综合数据。实际的CRF设计将更加详细，并将与临床专家、统计学家和监管机构协商制定，以确保准确和完整地捕捉所有必要的数据。
- en: Additionally, the CRF would be designed to ensure compliance with regulations
    such as HIPAA for patient privacy and GCP for clinical trials.
  id: totrans-2348
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，CRF将被设计以确保符合如HIPAA（患者隐私）和GCP（临床试验）等法规。
- en: Adverse Event Reporting in Clinical Trials
  id: totrans-2349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 临床试验中的不良事件报告
- en: In the PV domain, the creation of guidelines for the reporting of Suspected
    Unexpected Serious Adverse Reactions (SUSARs) from the investigator to the sponsor
    is a critical task to ensure patient safety and regulatory compliance.
  id: totrans-2350
  prefs: []
  type: TYPE_NORMAL
  zh: 在PV领域，从调查者到赞助商报告疑似意外严重不良事件（SUSARs）的指南制定是一个确保患者安全和法规遵守的关键任务。
- en: 'Leveraging ChatGPT for drafting these guidelines involves utilizing its capabilities
    to produce a clear, comprehensive, and compliant document that delineates the
    reporting process. Here’s an approach for using ChatGPT in this context:'
  id: totrans-2351
  prefs: []
  type: TYPE_NORMAL
- en: Utilizing ChatGPT for SUSAR Reporting Guidelines
  id: totrans-2352
  prefs: []
  type: TYPE_NORMAL
- en: 'Objective: To establish standardized procedures for the prompt identification
    and reporting of SUSARs by investigators to the sponsor in accordance with regulatory
    requirements and Good Clinical Practice (GCP) guidelines.'
  id: totrans-2353
  prefs: []
  type: TYPE_NORMAL
- en: 'Scope: These guidelines apply to all clinical trial investigators and site
    staff involved in [Sponsor Name]’s clinical studies.'
  id: totrans-2354
  prefs: []
  type: TYPE_NORMAL
- en: 'Document Overview: ChatGPT can assist in outlining the key sections of the
    guidelines, which may include:'
  id: totrans-2355
  prefs: []
  type: TYPE_NORMAL
- en: 'Definition of SUSARs: ChatGPT can provide a clear definition of SUSARs, incorporating
    descriptions from regulatory sources such as the ICH E2A guidelines and applicable
    regulatory bodies (e.g., FDA, EMA).'
  id: totrans-2356
  prefs: []
  type: TYPE_NORMAL
- en: 'Detection of SUSARs: The AI can outline the procedures for monitoring and identifying
    potential SUSARs, emphasizing the importance of vigilance and the criteria for
    what constitutes a ''suspected'' and ''unexpected'' reaction.'
  id: totrans-2357
  prefs: []
  type: TYPE_NORMAL
- en: 'Initial Reporting: ChatGPT can describe the process for immediate verbal notification
    followed by written reports, specifying the time frame within which SUSARs must
    be reported (typically within 24 hours of awareness).'
  id: totrans-2358
  prefs: []
  type: TYPE_NORMAL
- en: 'Detailed Follow-up Reports: These can specify the information required in follow-up
    reports and the timelines for submission in line with regulatory stipulations.'
  id: totrans-2359
  prefs: []
  type: TYPE_NORMAL
- en: 'Documentation: ChatGPT can list the essential documentation needed for a SUSAR
    report, such as patient identifiers, a detailed description of the event, treatment
    details, and an assessment of causality.'
  id: totrans-2360
  prefs: []
  type: TYPE_NORMAL
- en: 'Reporting Forms: The AI can provide guidance on completing the appropriate
    SUSAR reporting forms, ensuring the accuracy and completeness of the information.'
  id: totrans-2361
  prefs: []
  type: TYPE_NORMAL
- en: 'Regulatory Reporting Requirements: ChatGPT can include a summary of the regulatory
    reporting requirements for SUSARs, which may vary by region and regulatory authority.'
  id: totrans-2362
  prefs: []
  type: TYPE_NORMAL
- en: 'Training: ChatGPT can emphasize the necessity for investigator training on
    SUSAR detection and reporting, offering to draft training materials or outlines.'
  id: totrans-2363
  prefs: []
  type: TYPE_NORMAL
- en: 'Communication: Guidelines on how and to whom SUSARs should be communicated
    within the sponsor organization, including contact information for the sponsor’s
    safety department.'
  id: totrans-2364
  prefs: []
  type: TYPE_NORMAL
- en: 'Review and Approval: ChatGPT can draft a statement about the review and approval
    process for the guidelines, stating that the final document must be reviewed and
    approved by the sponsor’s PV team and legal department to ensure compliance with
    all regulatory obligations.'
  id: totrans-2365
  prefs: []
  type: TYPE_NORMAL
- en: By utilizing ChatGPT in this manner, sponsors can ensure that their SUSAR reporting
    guidelines are meticulously drafted, align with best practices, and facilitate
    compliance with international regulatory standards. However, it is crucial that
    the generated document is reviewed and ratified by qualified PV and regulatory
    affairs professionals.
  id: totrans-2366
  prefs: []
  type: TYPE_NORMAL
  zh: 通过以这种方式利用ChatGPT，赞助商可以确保其SUSAR报告指南被精心起草，符合最佳实践，并促进符合国际监管标准。然而，至关重要的是，生成的文件必须由合格的PV和监管事务专业人员审查和批准。
- en: Statistical Analysis Plans
  id: totrans-2367
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 统计分析计划
- en: While the creation of statistical analysis plans (SAPs) requires expert statisticians,
    ChatGPT can assist in drafting the initial SAP document based on the trial's objectives,
    which can then be refined by a biostatistician.
  id: totrans-2368
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然创建统计分析计划（SAP）需要专家统计学家，但ChatGPT可以根据试验目标协助起草初始SAP文件，然后由生物统计学家进行完善。
- en: 'Example of the initial SAP document based on the trial''s objectives, which
    can then be refined by a biostatistician:'
  id: totrans-2369
  prefs: []
  type: TYPE_NORMAL
  zh: 基于试验目标的初始SAP文件示例，然后可由生物统计学家进行完善：
- en: Creating an initial SAP is a crucial step in the clinical trial process. The
    SAP details the statistical analysis framework and is designed to ensure the validity
    and integrity of the data interpretation.
  id: totrans-2370
  prefs: []
  type: TYPE_NORMAL
  zh: 创建初始SAP是临床试验过程中的一个关键步骤。SAP详细说明了统计分析框架，旨在确保数据解释的有效性和完整性。
- en: 'Here''s an example outline for an initial SAP document for a hypothetical clinical
    trial on a cancer medication, which should be refined by a biostatistician:'
  id: totrans-2371
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个关于假设癌症药物临床试验的初始SAP文件示例，该文件应由生物统计学家进行完善：
- en: Statistical Analysis Plan (SAP)
  id: totrans-2372
  prefs: []
  type: TYPE_NORMAL
  zh: 统计分析计划（SAP）
- en: 'Trial Title: A Phase III, Randomized, Double-Blind Study of XYZ Drug for the
    Treatment of Advanced Melanoma'
  id: totrans-2373
  prefs: []
  type: TYPE_NORMAL
  zh: 试验标题：一项关于XYZ药物用于治疗晚期黑色素瘤的III期、随机、双盲研究
- en: 'SAP Version: 1.0'
  id: totrans-2374
  prefs: []
  type: TYPE_NORMAL
  zh: SAP版本：1.0
- en: 'Date: [MM/DD/YYYY]'
  id: totrans-2375
  prefs: []
  type: TYPE_NORMAL
  zh: 日期：[MM/DD/YYYY]
- en: 'Prepared by: [Author Name]'
  id: totrans-2376
  prefs: []
  type: TYPE_NORMAL
  zh: 准备人：[作者姓名]
- en: 1\. Introduction
  id: totrans-2377
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 简介
- en: Brief overview of the trial, including its objectives and endpoints.
  id: totrans-2378
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对试验的简要概述，包括其目标和终点。
- en: 2\. Trial Objectives
  id: totrans-2379
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 试验目标
- en: 'Primary Objective: To compare the overall survival of patients treated with
    XYZ Drug versus the control group.'
  id: totrans-2380
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主要目标：比较接受XYZ药物治疗的患者的总生存率与对照组。
- en: 'Secondary Objectives: To compare progression-free survival, response rate,
    and safety profile between the two groups.'
  id: totrans-2381
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 次要目标：比较两组的无进展生存期、反应率和安全性特征。
- en: 3\. Study Design
  id: totrans-2382
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 研究设计
- en: Description of the study design, including randomization, blinding, and treatment
    regimens.
  id: totrans-2383
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述研究设计，包括随机化、盲法和治疗方案。
- en: 4\. Study Population
  id: totrans-2384
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 研究人群
- en: Inclusion and exclusion criteria for patient selection.
  id: totrans-2385
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 患者选择包括的纳入和排除标准。
- en: Description of the intent-to-treat (ITT) and per-protocol (PP) populations.
  id: totrans-2386
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述意向治疗（ITT）和方案规定（PP）人群。
- en: 5\. Endpoints
  id: totrans-2387
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 终点
- en: Definition of primary and secondary endpoints.
  id: totrans-2388
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义主要和次要终点。
- en: Time points for assessment.
  id: totrans-2389
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估的时间点。
- en: 6\. Sample Size Determination
  id: totrans-2390
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 样本量确定
- en: Rationale for sample size, including assumptions for event rates, treatment
    effect, and statistical power.
  id: totrans-2391
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 样本量确定的理由，包括事件率、治疗效果和统计功效的假设。
- en: 7\. Randomization and Stratification
  id: totrans-2392
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 随机化和分层
- en: Method of randomization.
  id: totrans-2393
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随机化方法。
- en: Stratification factors, if applicable.
  id: totrans-2394
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如适用，分层因素。
- en: 8\. Statistical Methods
  id: totrans-2395
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 统计方法
- en: 'Primary Endpoint Analysis: The Kaplan-Meier method is used to estimate overall
    survival curves, with a log-rank test for comparison.'
  id: totrans-2396
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主要终点分析：使用Kaplan-Meier方法估计总生存率曲线，并使用log-rank检验进行比较。
- en: 'Secondary Endpoint Analysis: Cox proportional hazards model for progression-free
    survival; Chi-square test for response rate.'
  id: totrans-2397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 次要终点分析：使用Cox比例风险模型分析无进展生存期；使用卡方检验分析反应率。
- en: Description of any interim analysis and stopping guidelines.
  id: totrans-2398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述任何中期分析和停止指南。
- en: 9\. Data Handling
  id: totrans-2399
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 数据处理
- en: Rules for handling missing data, dropouts, and protocol deviations.
  id: totrans-2400
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理缺失数据、脱落和方案偏离的规则。
- en: Criteria for outliers and their impact on analysis.
  id: totrans-2401
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 异常值的标准及其对分析的影响。
- en: 10\. Subgroup Analysis
  id: totrans-2402
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 亚组分析
- en: Planned subgroup analyses, such as by demographic categories or baseline disease
    severity.
  id: totrans-2403
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计划的亚组分析，例如按人口统计类别或基线疾病严重程度。
- en: 11\. Safety Analysis
  id: totrans-2404
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 安全性分析
- en: Statistical methods for the analysis of adverse events, categorized by severity
    and relationship to the study drug.
  id: totrans-2405
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析不良事件的统计方法，按严重程度和与研究药物的关系分类。
- en: 12\. Interim Analysis
  id: totrans-2406
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 中期分析
- en: Plan for interim analysis, including statistical boundaries for efficacy and
    futility.
  id: totrans-2407
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 期中分析计划，包括有效性和无效性的统计界限。
- en: 13\. Software
  id: totrans-2408
  prefs: []
  type: TYPE_NORMAL
  zh: 13. 软件
- en: Statistical software will be used for the analyses.
  id: totrans-2409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将使用统计软件进行分析。
- en: 14\. Tables, Figures, and Listings (TFLs)
  id: totrans-2410
  prefs: []
  type: TYPE_NORMAL
  zh: 14. 表格、图形和列表（TFLs）
- en: List of planned tables, figures, and listings.
  id: totrans-2411
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计划中的表格、图形和列表清单。
- en: 15\. Quality Control
  id: totrans-2412
  prefs: []
  type: TYPE_NORMAL
  zh: 15. 质量控制
- en: Procedures for ensuring the accuracy and consistency of the statistical analyses.
  id: totrans-2413
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保统计分析准确性和一致性的程序。
- en: 16\. Amendment Procedures
  id: totrans-2414
  prefs: []
  type: TYPE_NORMAL
  zh: 16. 修订程序
- en: Process for making and documenting amendments to the SAP.
  id: totrans-2415
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对SAP进行修订和记录的流程。
- en: 17\. Biostatistician Approval
  id: totrans-2416
  prefs: []
  type: TYPE_NORMAL
  zh: 17. 生物统计师批准
- en: Sign-off by the biostatistician responsible for the final review and refinement
    of the SAP.
  id: totrans-2417
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由负责最终审查和精炼SAP的生物统计师签署。
- en: '* * *'
  id: totrans-2418
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Appendix A: Mock Tables and Figures'
  id: totrans-2419
  prefs: []
  type: TYPE_NORMAL
  zh: 附录A：模拟表格和图形
- en: 'Appendix B: Statistical Code Samples'
  id: totrans-2420
  prefs: []
  type: TYPE_NORMAL
  zh: 附录B：统计代码示例
- en: Document Revision History
  id: totrans-2421
  prefs: []
  type: TYPE_NORMAL
  zh: 文档修订历史
- en: '| Version | Date | Author | Change Description |'
  id: totrans-2422
  prefs: []
  type: TYPE_TB
  zh: '| 版本 | 日期 | 作者 | 变更描述 |'
- en: '| 1.0 | [MM/DD/YY] | [Author] | Initial draft of Statistical Analysis Plan
    |'
  id: totrans-2423
  prefs: []
  type: TYPE_TB
  zh: '| 1.0 | [MM/DD/YY] | [作者] | 统计分析计划初稿 |'
- en: '* * *'
  id: totrans-2424
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Approval:'
  id: totrans-2425
  prefs: []
  type: TYPE_NORMAL
  zh: 批准：
- en: '[Signature of Author]'
  id: totrans-2426
  prefs: []
  type: TYPE_NORMAL
  zh: '[作者签名]'
- en: '[Date]'
  id: totrans-2427
  prefs: []
  type: TYPE_NORMAL
  zh: '[日期]'
- en: '[Signature of Reviewing Biostatistician]'
  id: totrans-2428
  prefs: []
  type: TYPE_NORMAL
  zh: '[审查生物统计师的签名]'
- en: '[Date]'
  id: totrans-2429
  prefs: []
  type: TYPE_NORMAL
  zh: '[日期]'
- en: '* * *'
  id: totrans-2430
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: This document serves as a starting point for the biostatistician to refine and
    ensure that the statistical methods are appropriately chosen and all necessary
    details are included for a rigorous analysis.
  id: totrans-2431
  prefs: []
  type: TYPE_NORMAL
  zh: 本文件作为生物统计学家开始精炼和确保统计方法适当选择以及包括所有必要细节以进行严格分析的起点。
- en: The final SAP will be a comprehensive guide for the statistical analysis once
    the trial data are collected.
  id: totrans-2432
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦收集到试验数据，最终SAP将成为统计分析的全面指南。
- en: Interim Analysis Reports
  id: totrans-2433
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 期中分析报告
- en: ChatGPT can compile interim analysis reports by organizing collected data into
    predefined formats, facilitating quicker interim reviews and decision-making by
    the Data Monitoring Committee (DMC).
  id: totrans-2434
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以通过将收集到的数据组织到预定义的格式中，编译期中分析报告，从而加快数据监测委员会（DMC）的期中审查和决策。
- en: 'Example: Creating a SOP for interim reviews and decision-making by a DMC is
    essential for maintaining the integrity of a clinical trial.'
  id: totrans-2435
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：为DMC的期中审查和决策制定SOP对于保持临床试验的完整性至关重要。
- en: 'Below is an example of what such an SOP might look like:'
  id: totrans-2436
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个此类SOP可能的样子：
- en: Standard Operating Procedure (SOP) for Interim Reviews and Decision-Making by
    the Data Monitoring Committee (DMC)
  id: totrans-2437
  prefs: []
  type: TYPE_NORMAL
  zh: 数据监测委员会（DMC）期中审查和决策的标准操作程序（SOP）
- en: 'Document Number: SOP-DMC-005'
  id: totrans-2438
  prefs: []
  type: TYPE_NORMAL
  zh: 文件编号：SOP-DMC-005
- en: 'Version: 1.0'
  id: totrans-2439
  prefs: []
  type: TYPE_NORMAL
  zh: 版本：1.0
- en: 'Effective Date: [MM/DD/YYYY]'
  id: totrans-2440
  prefs: []
  type: TYPE_NORMAL
  zh: 生效日期：[MM/DD/YYYY]
- en: 'Review Date: [MM/DD/YYYY]'
  id: totrans-2441
  prefs: []
  type: TYPE_NORMAL
  zh: 审查日期：[MM/DD/YYYY]
- en: 'I. Purpose: To define the process for conducting interim reviews of clinical
    trial data and the decision-making criteria used by the Data Monitoring Committee
    to ensure participant safety, data integrity, and scientific validity.'
  id: totrans-2442
  prefs: []
  type: TYPE_NORMAL
  zh: I. 目的：定义对临床试验数据进行期中审查的过程以及数据监测委员会（DMC）为确保参与者安全、数据完整性和科学有效性所使用的决策标准。
- en: II. Scope This SOP applies to all DMC members involved in [Sponsor Name] sponsored
    clinical trials that require interim monitoring.
  id: totrans-2443
  prefs: []
  type: TYPE_NORMAL
  zh: II. 范围本SOP适用于所有参与[Sponsor Name]赞助的临床试验并需要期中监测的DMC成员。
- en: III. Definitions
  id: totrans-2444
  prefs: []
  type: TYPE_NORMAL
  zh: III. 定义
- en: 'Interim Review: A scheduled or ad hoc analysis of accumulated trial data by
    the DMC.'
  id: totrans-2445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 期中审查：DMC对累积的试验数据进行的有计划或临时分析。
- en: 'DMC (Data Monitoring Committee): An independent group of experts that monitors
    patient safety and treatment efficacy data while a clinical trial is ongoing.'
  id: totrans-2446
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DMC（数据监测委员会）：一个独立的专家小组，在临床试验进行期间监测患者安全性和治疗有效性数据。
- en: IV. Responsibilities
  id: totrans-2447
  prefs: []
  type: TYPE_NORMAL
  zh: IV. 职责
- en: 'DMC Chair: Ensures that the interim review is conducted according to the SOP
    and is responsible for leading the discussion and consensus-building during DMC
    meetings.'
  id: totrans-2448
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DMC主席：确保期中审查按照SOP进行，并在DMC会议期间负责领导和达成共识。
- en: 'DMC Members: Review interim data and contribute to the decision-making process.'
  id: totrans-2449
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DMC成员：审查期中数据并参与决策过程。
- en: 'Statistician: Prepares interim analysis reports and presents findings to the
    DMC.'
  id: totrans-2450
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 统计师：准备期中分析报告并向DMC（数据监测委员会）展示结果。
- en: 'Sponsor: Facilitates the DMC by providing necessary documents and logistical
    support without influencing decision-making.'
  id: totrans-2451
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 赞助商：通过提供必要的文件和后勤支持来促进DMC，但不影响决策。
- en: V. Procedure
  id: totrans-2452
  prefs: []
  type: TYPE_NORMAL
  zh: V. 程序
- en: Meeting Scheduling and Material Preparation
  id: totrans-2453
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 会议安排和材料准备
- en: The DMC coordinator schedules interim review meetings in accordance with the
    clinical trial protocol or when triggered by specific criteria.
  id: totrans-2454
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DMC协调员根据临床试验方案或特定标准触发时安排中期审查会议。
- en: Relevant materials, such as blinded data reports, are prepared by the statistician
    and distributed to DMC members ahead of the meeting.
  id: totrans-2455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相关材料，如盲法数据报告，由统计学家准备并在会议前分发给DMC成员。
- en: Interim Data Analysis
  id: totrans-2456
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 中期数据分析
- en: The statistician conducts interim analyses as per the pre-specified statistical
    plan, maintaining data confidentiality.
  id: totrans-2457
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 统计学家根据预先指定的统计计划进行中期分析，保持数据保密。
- en: Results are prepared in a manner that preserves the integrity of the trial,
    using techniques like closed-session reporting if required.
  id: totrans-2458
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结果以保护试验完整性的方式准备，如需要，使用闭门会议报告等技术。
- en: Review Meeting Conduct
  id: totrans-2459
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 复议会议流程
- en: Meetings are held in a secure and confidential manner, following the pre-defined
    agenda.
  id: totrans-2460
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 会议以安全和保密的方式进行，遵循预先定义的议程。
- en: The DMC reviews interim data focusing on safety signals, efficacy indicators,
    and trial conduct.
  id: totrans-2461
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DMC审查中期数据，重点关注安全信号、疗效指标和试验执行。
- en: Decision-Making Criteria
  id: totrans-2462
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策标准
- en: Decisions to continue, modify, or terminate the study are based on pre-established
    criteria, such as statistical stopping boundaries, safety thresholds, and benefit-risk
    ratios.
  id: totrans-2463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 继续研究、修改或终止研究的决定基于预先设定的标准，如统计停止界限、安全阈值和风险效益比。
- en: Recommendation Formulation
  id: totrans-2464
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建议制定
- en: After thorough discussion, the DMC formulates a recommendation, reached by consensus
    or vote.
  id: totrans-2465
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经过充分讨论后，DMC通过共识或投票形成一项建议。
- en: The DMC Chair documents the decision-making process and rationale.
  id: totrans-2466
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DMC主席记录决策过程和理由。
- en: Communication of Recommendations
  id: totrans-2467
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建议的沟通
- en: Recommendations are communicated to the sponsor in a written statement without
    disclosing confidential data unless it pertains to participant safety.
  id: totrans-2468
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建议以书面声明的方式传达给赞助商，除非涉及受试者安全，否则不披露机密数据。
- en: Documentation and Archiving
  id: totrans-2469
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文档和存档
- en: All DMC discussions and decisions are documented in meeting minutes.
  id: totrans-2470
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有DMC讨论和决策都记录在会议纪要中。
- en: Records are maintained securely by the DMC coordinator for future audits and
    regulatory inspections.
  id: totrans-2471
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DMC协调员安全地保存记录，以备未来的审计和监管检查。
- en: VI. Training
  id: totrans-2472
  prefs: []
  type: TYPE_NORMAL
  zh: VI. 培训
- en: DMC members are required to undergo training on this SOP and the ethical conduct
    of interim reviews.
  id: totrans-2473
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DMC成员必须接受关于本SOP和中期审查道德行为的培训。
- en: VII. Documentation
  id: totrans-2474
  prefs: []
  type: TYPE_NORMAL
  zh: VII. 文档记录
- en: A DMC Charter outlining the detailed responsibilities and operational procedures
    of the DMC is referenced as a companion document to this SOP.
  id: totrans-2475
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一份DMC章程，概述DMC的详细职责和操作程序，作为本SOP的配套文件。
- en: VIII. Deviation Management
  id: totrans-2476
  prefs: []
  type: TYPE_NORMAL
  zh: VIII. 偏差管理
- en: Any deviations from this SOP must be documented and justified.
  id: totrans-2477
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任何偏离本SOP的行为都必须记录并说明理由。
- en: IX. Amendments
  id: totrans-2478
  prefs: []
  type: TYPE_NORMAL
  zh: IX. 修订
- en: SOP amendments are subject to review and approval by the DMC and the sponsor's
    quality assurance team.
  id: totrans-2479
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SOP修订需经DMC和赞助商的质量保证团队审查和批准。
- en: '* * *'
  id: totrans-2480
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Approval:'
  id: totrans-2481
  prefs: []
  type: TYPE_NORMAL
  zh: 批准：
- en: '[Signature of DMC Chair]'
  id: totrans-2482
  prefs: []
  type: TYPE_NORMAL
  zh: '[DMC主席签名]'
- en: '[Date]'
  id: totrans-2483
  prefs: []
  type: TYPE_NORMAL
  zh: '[日期]'
- en: '[Signature of Sponsor Representative]'
  id: totrans-2484
  prefs: []
  type: TYPE_NORMAL
  zh: '[赞助代表签名]'
- en: '[Date]'
  id: totrans-2485
  prefs: []
  type: TYPE_NORMAL
  zh: '[日期]'
- en: '* * *'
  id: totrans-2486
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Revision History Table
  id: totrans-2487
  prefs: []
  type: TYPE_NORMAL
  zh: 修订历史表
- en: '| Version | Date | Author | Change Description |'
  id: totrans-2488
  prefs: []
  type: TYPE_TB
  zh: '| 版本 | 日期 | 作者 | 变更描述 |'
- en: '| 1.0 | [MM/DD/YY] | [Author] | Initial creation of SOP |'
  id: totrans-2489
  prefs: []
  type: TYPE_TB
  zh: '| 1.0 | [MM/DD/YY] | [作者] | SOP 初始创建 |'
- en: This SOP is a guideline for the DMC to conduct interim reviews in a consistent,
    unbiased, and ethical manner, ensuring the credibility of the clinical trial results
    and safeguarding the interests of trial participants.
  id: totrans-2490
  prefs: []
  type: TYPE_NORMAL
  zh: 本SOP是DMC进行中期审查的指南，旨在以一致、无偏见和道德的方式进行，确保临床试验结果的可靠性并保护受试者的利益。
- en: Patient Engagement and Retention
  id: totrans-2491
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 患者参与和保留
- en: Utilizing ChatGPT for ongoing patient engagement can help maintain participant
    retention rates. It can generate personalized follow-up messages, reminders for
    medication adherence, and motivational content to keep participants engaged.
  id: totrans-2492
  prefs: []
  type: TYPE_NORMAL
  zh: 利用ChatGPT进行持续的患者参与可以帮助维持参与者的保留率。它可以生成个性化的跟进信息、药物依从性提醒以及激励内容，以保持参与者的参与度。
- en: Patient engagement and retention are pivotal in the success of a clinical trial.
    Keeping participants engaged not only improves the quality of the data collected
    but also ensures that the study meets its objectives in a timely manner.
  id: totrans-2493
  prefs: []
  type: TYPE_NORMAL
  zh: 患者参与和保留对于临床试验的成功至关重要。保持参与者的参与不仅提高了收集数据的质量，还确保研究能够及时达到其目标。
- en: An example of how communication for patient engagement and retention might be
    structured
  id: totrans-2494
  prefs: []
  type: TYPE_NORMAL
  zh: 患者参与和保留的沟通方式的一个例子
- en: 'Subject: Your Participation Makes a Difference - Weekly Reminder and Inspiration'
  id: totrans-2495
  prefs: []
  type: TYPE_NORMAL
  zh: 主题：您的参与让一切不同 - 周提醒和灵感
- en: Dear [Participant's Name],
  id: totrans-2496
  prefs: []
  type: TYPE_NORMAL
  zh: 亲爱的[参与者姓名]，
- en: We hope this message finds you well. As a valued participant in our [Study Name]
    for [Medication/Condition], your dedication is making a significant contribution
    to advancing medical science and potential treatments for [Condition]. Here’s
    your weekly update and inspiration!
  id: totrans-2497
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这条信息找到您一切安好。作为我们[研究名称]中[药物/条件]的宝贵参与者，您的奉献对推动医学科学和[条件]的潜在治疗方法做出了重大贡献。以下是您的每周更新和灵感！
- en: 'Medication Adherence Reminder: This is just a friendly reminder to take your
    [Medication Name] as prescribed. Consistency is key to the success of the treatment
    and the study’s outcomes. If you have any questions or concerns about taking your
    medication, please don’t hesitate to contact us.'
  id: totrans-2498
  prefs: []
  type: TYPE_NORMAL
  zh: 药物依从性提醒：这只是友好地提醒您按照处方服用[药物名称]。一致性是治疗成功和研究结果的关键。如果您对服用药物有任何疑问或担忧，请随时联系我们。
- en: 'Your Impact: Every data point you contribute by taking your medication and
    providing feedback is a building block in the foundation of medical progress.
    Your role is crucial, and we cannot thank you enough for your commitment.'
  id: totrans-2499
  prefs: []
  type: TYPE_NORMAL
  zh: 您的影响：您通过服用药物和提供反馈所贡献的每个数据点都是医学进步基础上的一个构建块。您的角色至关重要，我们无法对您的承诺表示感谢。
- en: 'This Week’s Inspiration: Remember, your participation in this study could pave
    the way for groundbreaking treatments. You are part of a community dedicated to
    creating a healthier future for all.'
  id: totrans-2500
  prefs: []
  type: TYPE_NORMAL
  zh: 这周的灵感：记住，您在这个研究中的参与可能为开创性的治疗方法铺平道路。您是致力于为所有人创造更健康未来的社区的一部分。
- en: 'Stay Connected: Staying informed and connected is vital. Join our online community
    forum to share experiences, find support, and connect with fellow participants.
    [Include a link to the community forum]'
  id: totrans-2501
  prefs: []
  type: TYPE_NORMAL
  zh: 保持联系：保持信息和联系至关重要。加入我们的在线社区论坛，分享经验，寻找支持，并与其他参与者建立联系。[包含社区论坛的链接]
- en: Need Support? If you need any support or have questions, please contact our
    participant support team at [Contact Information]. We're here for you every step
    of the way.
  id: totrans-2502
  prefs: []
  type: TYPE_NORMAL
  zh: 需要支持？如果您需要任何支持或有疑问，请通过[联系方式]联系我们的参与者支持团队。我们将在每个步骤中为您提供帮助。
- en: 'Looking Ahead: Mark your calendar for your next check-in on [Date]. We look
    forward to seeing you and hearing about your progress.'
  id: totrans-2503
  prefs: []
  type: TYPE_NORMAL
  zh: 展望未来：请记下您的下一次检查日期为[日期]。我们期待见到您，并了解您的进展情况。
- en: Thank you for being a part of this journey. Together, we are making a difference!
  id: totrans-2504
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您参与这段旅程。我们一起正在做出改变！
- en: Warm regards,
  id: totrans-2505
  prefs: []
  type: TYPE_NORMAL
  zh: 真诚问候，
- en: '[Your Study Team’s Name]'
  id: totrans-2506
  prefs: []
  type: TYPE_NORMAL
  zh: '[您的学习团队名称]'
- en: '[Your Contact Information]'
  id: totrans-2507
  prefs: []
  type: TYPE_NORMAL
  zh: '[您的联系方式]'
- en: '[Study Hotline Number]'
  id: totrans-2508
  prefs: []
  type: TYPE_NORMAL
  zh: '[研究热线电话]'
- en: '* * *'
  id: totrans-2509
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'P.S.: Don''t forget to keep a daily log of your medication times and any symptoms
    in your participant diary. Your thorough records are incredibly valuable to the
    study’s success!'
  id: totrans-2510
  prefs: []
  type: TYPE_NORMAL
  zh: P.S.：别忘了在您的参与者日记中记录每日的药物服用时间和任何症状。您详尽的记录对研究的成功至关重要！
- en: '* * *'
  id: totrans-2511
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: This type of communication is intended to be sent out on a regular basis, such
    as weekly, to maintain consistent touchpoints with the participant.
  id: totrans-2512
  prefs: []
  type: TYPE_NORMAL
  zh: 这种类型的沟通应定期发送，例如每周一次，以保持与参与者的持续接触点。
- en: 'It serves multiple purposes:'
  id: totrans-2513
  prefs: []
  type: TYPE_NORMAL
  zh: 它具有多重用途：
- en: it acts as a medication adherence prompt, provides a motivational message to
    highlight the importance of the participant's role in the study,
  id: totrans-2514
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它作为药物依从性提示，提供激励信息，强调参与者在研究中的角色的重要性，
- en: offers a channel for support,
  id: totrans-2515
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供支持渠道，
- en: and reinforces the schedule for upcoming engagements.
  id: totrans-2516
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并强化即将到来的活动的日程安排。
- en: Each element of the message is crafted to promote engagement, adherence, and
    a sense of community among participants.
  id: totrans-2517
  prefs: []
  type: TYPE_NORMAL
  zh: 消息的每个要素都旨在促进参与者的参与度、依从性和社区感。
- en: FAQs and Real-Time Inquiry Response
  id: totrans-2518
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 常见问题解答和实时查询响应
- en: ChatGPT can provide instant responses to frequently asked questions (FAQs) from
    trial participants or research staff, reducing the workload on trial coordinators
    and enhancing overall communication.
  id: totrans-2519
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以为试验参与者或研究人员提供即时响应常见问题（FAQ），减轻试验协调员的工作负担，并增强整体沟通。
- en: During a clinical trial for a cancer medication, participants and research staff
    often have numerous questions regarding the study.
  id: totrans-2520
  prefs: []
  type: TYPE_NORMAL
  zh: 在一项癌症药物的临床试验中，参与者和研究人员经常对研究有众多疑问。
- en: an example of a FAQ document
  id: totrans-2521
  prefs: []
  type: TYPE_NORMAL
  zh: 一个常见问题解答（FAQ）文档的例子
- en: Frequently Asked Questions (FAQ) for the [Trial Name] Study
  id: totrans-2522
  prefs: []
  type: TYPE_NORMAL
  zh: '[试验名称]研究的常见问题解答（FAQ）'
- en: 'For Trial Participants:'
  id: totrans-2523
  prefs: []
  type: TYPE_NORMAL
  zh: 针对试验参与者：
- en: What is the purpose of this clinical trial?
  id: totrans-2524
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 本临床试验的目的是什么？
- en: This trial aims to evaluate the effectiveness and safety of [Medication Name],
    a new medication for [type of cancer]. We hope to determine whether it improves
    outcomes for patients like you.
  id: totrans-2525
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 本试验旨在评估[药物名称]的有效性和安全性，这是一种针对[癌症类型]的新药。我们希望确定它是否可以改善像您这样的患者的预后。
- en: What does participation involve?
  id: totrans-2526
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与包括哪些内容？
- en: Participation involves regular visits to the trial site for health assessments,
    receiving the study medication, and possibly undergoing additional tests, such
    as blood work or imaging, to monitor your health and the medication's effects.
  id: totrans-2527
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参与包括哪些内容？
- en: Will I receive the experimental medication or a placebo?
  id: totrans-2528
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我会收到实验药物还是安慰剂？
- en: Depending on the study design, you may receive the experimental medication or
    a placebo. If this is a blinded study, neither you nor the study team will know
    which one you are receiving to ensure unbiased results.
  id: totrans-2529
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在试验期间，我可以继续我的当前癌症治疗吗？
- en: Are there any risks involved in participating?
  id: totrans-2530
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与存在任何风险吗？
- en: As with any medical treatment, there are potential risks, which may include
    side effects related to the medication. These will be explained in detail before
    you agree to participate, and your health will be closely monitored throughout
    the study.
  id: totrans-2531
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与任何医疗治疗一样，存在潜在的风险，这可能包括与药物相关的副作用。这些将在您同意参与之前详细解释，并且在整个研究过程中将密切监测您的健康状况。
- en: Can I continue my current cancer treatments while in the trial?
  id: totrans-2532
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我可以在试验期间继续我的当前癌症治疗吗？
- en: It depends on the trial’s specific criteria. Some trials might require you to
    stop current treatments, while others may allow certain therapies to continue.
    This will be clearly outlined in the inclusion/exclusion criteria.
  id: totrans-2533
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这取决于试验的具体标准。有些试验可能要求您停止当前的治疗，而其他试验可能允许某些治疗继续。这将在纳入/排除标准中明确说明。
- en: What if I want to leave the study?
  id: totrans-2534
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果我想退出研究怎么办？
- en: You have the right to withdraw from the study at any time, for any reason, without
    affecting your standard of care.
  id: totrans-2535
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您有权在任何时候、出于任何原因退出研究，而不会影响您接受的标准护理。
- en: 'For Research Staff:'
  id: totrans-2536
  prefs: []
  type: TYPE_NORMAL
  zh: 针对研究工作人员：
- en: How do we handle adverse events?
  id: totrans-2537
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们如何处理不良事件？
- en: All adverse events must be documented and reported as per the study protocol.
    Severe adverse events require immediate notification of the principal investigator
    and adherence to the protocol's safety reporting procedures.
  id: totrans-2538
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有不良事件必须按照研究方案进行记录和报告。严重不良事件需要立即通知主要研究者并遵守方案的安全报告程序。
- en: What is the process for documenting protocol deviations?
  id: totrans-2539
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 记录方案偏离的程序是什么？
- en: Protocol deviations should be documented in the participant's case report form
    (CRF) and reported to the trial's sponsor and IRB/ethics committee according to
    the procedures outlined in the study protocol.
  id: totrans-2540
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 方案偏离应在参与者的病例报告表（CRF）中记录，并根据研究方案中概述的程序向试验的赞助商和IRB/伦理委员会报告。
- en: How is participant confidentiality maintained?
  id: totrans-2541
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如何保持参与者的隐私？
- en: Participant confidentiality is maintained by assigning unique identification
    codes, securing records, limiting access to authorized personnel, and following
    all applicable privacy regulations and guidelines.
  id: totrans-2542
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过分配唯一的识别代码、保护记录、限制授权人员访问以及遵循所有适用的隐私法规和指南来维护参与者的隐私。
- en: What are the guidelines for participant compensation?
  id: totrans-2543
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参与者补偿的指南是什么？
- en: Participants may be compensated for their time and travel. The compensation
    structure is outlined in the informed consent form and adheres to ethical guidelines
    to ensure it does not unduly influence participation.
  id: totrans-2544
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参与者可能因时间和旅行得到补偿。补偿结构在知情同意书中概述，并遵守伦理指南，以确保它不会过度影响参与。
- en: Who should we contact for trial-related queries?
  id: totrans-2545
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们应该联系谁以解决与试验相关的问题？
- en: All trial-related queries should be directed to the trial coordinator, or the
    designated point of contact as listed in the study contact sheet.
  id: totrans-2546
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有与试验相关的查询应指向试验协调员或研究联系表中列出的指定联系人。
- en: '* * *'
  id: totrans-2547
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: This FAQ is designed to address common questions and concerns that may arise
    during a clinical trial for cancer medication, providing clear and concise information
    to ensure participants and staff are well-informed about the study.
  id: totrans-2548
  prefs: []
  type: TYPE_NORMAL
  zh: 本常见问题解答旨在解答在癌症药物临床试验期间可能出现的常见问题和担忧，提供清晰简洁的信息，以确保参与者和管理人员对研究有充分的了解。
- en: Post-Authorization Safety Studies (PASS)
  id: totrans-2549
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获批后安全性研究（PASS）
- en: The utilization of ChatGPT in the design and analysis of Post-Authorization
    Safety Studies (PASS) can enhance the methodological approach, streamline data
    analysis, and support the communication of findings.
  id: totrans-2550
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在获批后安全性研究（PASS）的设计和分析中的应用可以增强方法论方法，简化数据分析，并支持结果沟通。
- en: Table 19\. Use of ChatGPT in various stages of a PASS.
  id: totrans-2551
  prefs: []
  type: TYPE_NORMAL
  zh: 表19. ChatGPT在PASS各个阶段的应用。
- en: '| Stage of PASS | ChatGPT Assistance |'
  id: totrans-2552
  prefs: []
  type: TYPE_TB
  zh: '| PASS阶段 | ChatGPT辅助 |'
- en: '| Study Design | - Suggest study design options (prospective, retrospective,
    cohort, case-control, etc.) |'
  id: totrans-2553
  prefs: []
  type: TYPE_TB
  zh: '| 研究设计 | - 提出研究设计选项（前瞻性、回顾性、队列、病例对照等） |'
- en: '|  | - Provide templates for study protocols and informed consent forms |'
  id: totrans-2554
  prefs: []
  type: TYPE_TB
  zh: '|  | - 提供研究协议和知情同意书模板 |'
- en: '|  | - Generate hypotheses based on existing safety data and literature |'
  id: totrans-2555
  prefs: []
  type: TYPE_TB
  zh: '|  | - 基于现有安全数据和文献生成假设 |'
- en: '| Protocol Development | - Draft sections on objectives, methodology, statistical
    analysis plan, and ethical considerations |'
  id: totrans-2556
  prefs: []
  type: TYPE_TB
  zh: '| 协议开发 | - 起草关于目标、方法、统计分析计划和伦理考虑的章节 |'
- en: '|  | - Assist in developing patient inclusion and exclusion criteria |'
  id: totrans-2557
  prefs: []
  type: TYPE_TB
  zh: '|  | - 协助制定患者纳入和排除标准 |'
- en: '| Data Collection | - Create data collection templates and electronic data
    capture (EDC) systems |'
  id: totrans-2558
  prefs: []
  type: TYPE_TB
  zh: '| 数据收集 | - 创建数据收集模板和电子数据采集（EDC）系统 |'
- en: '|  | - Draft guidance documents for researchers conducting the study |'
  id: totrans-2559
  prefs: []
  type: TYPE_TB
  zh: '|  | - 为进行研究的研究人员起草指导文件 |'
- en: '| Statistical Analysis Plan (SAP) | - Propose initial statistical methods for
    data analysis, including interim and final analyses |'
  id: totrans-2560
  prefs: []
  type: TYPE_TB
  zh: '| 统计分析计划（SAP） | - 提出数据分析的初始统计方法，包括中期和最终分析 |'
- en: '|  | - Outline plans for handling missing data, multiplicity issues, and subgroup
    analyses |'
  id: totrans-2561
  prefs: []
  type: TYPE_TB
  zh: '|  | - 概述处理缺失数据、多重问题和亚组分析的计划 |'
- en: '| Patient Enrollment Communications | - Generate patient recruitment materials
    and communication plans to encourage enrollment |'
  id: totrans-2562
  prefs: []
  type: TYPE_TB
  zh: '| 患者招募沟通 | - 生成患者招募材料和沟通计划以鼓励招募 |'
- en: '| Data Monitoring | - Provide templates for data monitoring committee (DMC)
    charters |'
  id: totrans-2563
  prefs: []
  type: TYPE_TB
  zh: '| 数据监测 | - 提供数据监测委员会（DMC）章程模板 |'
- en: '|  | - Generate interim reports for ongoing safety monitoring |'
  id: totrans-2564
  prefs: []
  type: TYPE_TB
  zh: '|  | - 生成持续安全性监测的临时报告 |'
- en: '| Safety Signal Detection | - Suggest methodologies for signal detection using
    AI algorithms |'
  id: totrans-2565
  prefs: []
  type: TYPE_TB
  zh: '| 安全信号检测 | - 建议使用人工智能算法进行信号检测的方法 |'
- en: '|  | - Assist in setting up real-time dashboards for signal monitoring |'
  id: totrans-2566
  prefs: []
  type: TYPE_TB
  zh: '|  | - 协助设置信号监测的实时仪表板 |'
- en: '| Regulatory Compliance | - Compile regulatory submission checklists based
    on regional requirements |'
  id: totrans-2567
  prefs: []
  type: TYPE_TB
  zh: '| 法规遵从 | - 根据区域要求编制法规提交清单 |'
- en: '|  | - Draft sections of the final study report for regulatory submissions
    |'
  id: totrans-2568
  prefs: []
  type: TYPE_TB
  zh: '|  | - 起草最终研究报告的提交部分 |'
- en: '| Dissemination of Findings | - Summarize study findings for scientific publication
    |'
  id: totrans-2569
  prefs: []
  type: TYPE_TB
  zh: '| 研究成果的传播 | - 概括研究成果以供科学出版物发表 |'
- en: '|  | - Create lay summaries for public communication |'
  id: totrans-2570
  prefs: []
  type: TYPE_TB
  zh: '|  | - 创建面向公众的简要总结 |'
- en: '| Quality Assurance | - Generate SOPs for quality checks and data verification
    procedures |'
  id: totrans-2571
  prefs: []
  type: TYPE_TB
  zh: '| 质量保证 | - 生成质量检查和数据验证程序的标准操作程序（SOP） |'
- en: '|  | - Prepare audit trail documentation procedures |'
  id: totrans-2572
  prefs: []
  type: TYPE_TB
  zh: '|  | - 准备审计跟踪文档程序 |'
- en: Using ChatGPT in PASS can lead to a more structured and systematic approach
    to safety surveillance post-marketing authorization.
  id: totrans-2573
  prefs: []
  type: TYPE_NORMAL
  zh: 在PASS中使用ChatGPT可以导致在上市后授权后的安全性监测方面采取更加结构化和系统化的方法。
- en: Specific Subpopulation
  id: totrans-2574
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 特定亚组
- en: Analyze drug safety in specific populations, like pediatrics or geriatrics.
  id: totrans-2575
  prefs: []
  type: TYPE_NORMAL
  zh: 分析特定人群（如儿科或老年病学）中的药物安全性。
- en: In this chapter, we present how ChatGPT can be integrated into subpopulation
    analysis for drug safety in specific populations such as pediatrics or geriatrics.
  id: totrans-2576
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们介绍如何将ChatGPT集成到特定人群（如儿科或老年病学）的药物安全性亚组分析中。
- en: Table 20.Example of use for analysis in the specific populations.
  id: totrans-2577
  prefs: []
  type: TYPE_NORMAL
  zh: 表20. 在特定人群中的分析使用示例。
- en: '| Subpopulation Analysis Stage | Utilization of ChatGPT in Pediatrics | Utilization
    of ChatGPT in Geriatrics |'
  id: totrans-2578
  prefs: []
  type: TYPE_TB
  zh: '| 亚组分析阶段 | ChatGPT在儿科的应用 | ChatGPT在老年病学中的应用 |'
- en: '| Defining Subpopulation Characteristics | - Draft criteria for pediatric classification
    (e.g., age, weight). | - Draft criteria for geriatric classification (e.g., age,
    comorbidities). |'
  id: totrans-2579
  prefs: []
  type: TYPE_TB
  zh: '| 定义亚组特征 | - 撰写儿科分类标准（例如，年龄、体重）。 | - 撰写老年科分类标准（例如，年龄、合并症）。 |'
- en: '| Data Collection Guidelines | - Generate templates for data collection specific
    to pediatric adverse events. | - Generate templates for data collection specific
    to geriatric pharmacokinetics and dynamics. |'
  id: totrans-2580
  prefs: []
  type: TYPE_TB
  zh: '| 数据收集指南 | - 生成针对儿科不良事件的特定数据收集模板。 | - 生成针对老年科药代动力学和药效学的特定数据收集模板。 |'
- en: '| Statistical Analysis Plan (SAP) Development | - Help design an SAP that accounts
    for pediatric dosing and metabolism differences. | - Help design an SAP that considers
    age-related pharmacological changes in geriatrics. |'
  id: totrans-2581
  prefs: []
  type: TYPE_TB
  zh: '| 统计分析计划（SAP）制定 | - 帮助设计考虑儿科剂量和代谢差异的SAP。 | - 帮助设计考虑老年科与年龄相关的药理变化的SAP。 |'
- en: '| Adverse Event (AE) Analysis | - Assist in analyzing AE data for age-specific
    safety signals. | - Assist in analyzing AE data for drug-drug interactions common
    in polypharmacy. |'
  id: totrans-2582
  prefs: []
  type: TYPE_TB
  zh: '| 不良事件（AE）分析 | - 协助分析针对特定年龄的安全信号数据。 | - 协助分析多药联用中常见的药物相互作用数据。 |'
- en: '| Risk Assessment | - Outline risk assessment protocols for drugs in developmental
    stages. | - Outline risk assessment protocols for drugs affecting elderly physiology.
    |'
  id: totrans-2583
  prefs: []
  type: TYPE_TB
  zh: '| 风险评估 | - 制定处于开发阶段药物的风险评估方案。 | - 制定影响老年生理的药物的风险评估方案。 |'
- en: '| Literature Review | - Automate searches for pediatric-specific drug safety
    studies. | - Automate searches for geriatric-specific drug safety studies. |'
  id: totrans-2584
  prefs: []
  type: TYPE_TB
  zh: '| 文献综述 | - 自动搜索针对儿科特定药物安全研究的文献。 | - 自动搜索针对老年科特定药物安全研究的文献。 |'
- en: '| Regulatory Compliance | - Draft sections of regulatory submissions focusing
    on pediatric safety data. | - Draft sections of regulatory submissions focusing
    on geriatric safety data. |'
  id: totrans-2585
  prefs: []
  type: TYPE_TB
  zh: '| 法规遵从性 | - 撰写法规提交文件的部分章节，重点关注儿科安全性数据。 | - 撰写法规提交文件的部分章节，重点关注老年科安全性数据。 |'
- en: '| Safety Signal Detection | - Enhance signal detection algorithms for pediatric-specific
    issues. | - Enhance signal detection algorithms for geriatric-specific issues.
    |'
  id: totrans-2586
  prefs: []
  type: TYPE_TB
  zh: '| 安全信号检测 | - 加强针对儿科特定问题的信号检测算法。 | - 加强针对老年科特定问题的信号检测算法。 |'
- en: '| Results Communication | - Create communication materials for pediatric healthcare
    providers and caretakers. | - Create communication materials for geriatric healthcare
    providers and caregivers. |'
  id: totrans-2587
  prefs: []
  type: TYPE_TB
  zh: '| 结果沟通 | - 为儿科医疗保健提供者和护理者创建沟通材料。 | - 为老年科医疗保健提供者和护理者创建沟通材料。 |'
- en: Using ChatGPT ensures that the unique safety concerns of pediatric and geriatric
    populations are thoroughly addressed and that the findings are communicated clearly
    to all stakeholders involved in drug safety and PV.
  id: totrans-2588
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT确保儿科和老年科人群的独特安全性问题得到充分解决，并且研究结果被清楚地传达给所有参与药物安全和PV的各方。
- en: When defining subpopulation characteristics for clinical trials or PV studies,
    it is crucial to establish clear criteria that accurately reflect the specific
    needs and considerations of each group.
  id: totrans-2589
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义临床试验或PV研究中的亚组特征时，建立准确反映每个群体特定需求和考虑的明确标准至关重要。
- en: Table 21\. Defining Subpopulation Characteristics.
  id: totrans-2590
  prefs: []
  type: TYPE_NORMAL
  zh: 表21. 定义亚组特征。
- en: '| Subpopulation | Criteria for Classification |'
  id: totrans-2591
  prefs: []
  type: TYPE_TB
  zh: '| 亚组 | 分类标准 |'
- en: '| Pediatric | - Age Range: Define specific age brackets (e.g., neonates, infants,
    children, adolescents). |'
  id: totrans-2592
  prefs: []
  type: TYPE_TB
  zh: '| 儿科 | - 年龄范围：定义具体的年龄区间（例如，新生儿、婴儿、儿童、青少年）。 |'
- en: '|  | - Weight Brackets: Establish weight brackets appropriate for dosing considerations.
    |'
  id: totrans-2593
  prefs: []
  type: TYPE_TB
  zh: '|  | - 重量范围：根据剂量考虑因素建立合适的重量范围。 |'
- en: '|  | - Developmental Stage: Consider developmental pharmacokinetics and pharmacodynamics,
    such as organ maturity and metabolic capacity. |'
  id: totrans-2594
  prefs: []
  type: TYPE_TB
  zh: '|  | - 开发阶段：考虑发育药代动力学和药效学，如器官成熟度和代谢能力。 |'
- en: '|  | - Disease Severity: Account for pediatric-specific disease manifestations
    and progression. |'
  id: totrans-2595
  prefs: []
  type: TYPE_TB
  zh: '|  | - 疾病严重程度：考虑儿科特定的疾病表现和进展。 |'
- en: '| Geriatric | - Age Range: Define the age threshold for geriatric patients
    (commonly 65 years and older). |'
  id: totrans-2596
  prefs: []
  type: TYPE_TB
  zh: '| 老年科 | - 年龄范围：定义老年患者的年龄阈值（通常为65岁及以上）。 |'
- en: '|  | - Comorbidities: List common age-related comorbidities (e.g., hypertension,
    diabetes, cardiovascular disease). |'
  id: totrans-2597
  prefs: []
  type: TYPE_TB
  zh: '|  | - 合并症：列出常见的与年龄相关的合并症（例如，高血压、糖尿病、心血管疾病）。 |'
- en: '|  | - Polypharmacy: Consider the impact of concomitant medications due to
    polypharmacy, which is prevalent in this population. |'
  id: totrans-2598
  prefs: []
  type: TYPE_TB
  zh: '|  | - 多药联用：考虑多药联用中同时用药的影响，这在该人群中很普遍。 |'
- en: '|  | - Functional Status: Include criteria for assessing functional status,
    such as mobility and cognitive function. |'
  id: totrans-2599
  prefs: []
  type: TYPE_TB
  zh: '|  | - 功能状态：包括评估功能状态的标准，如移动性和认知功能。 |'
- en: '|  | - Frailty Indexes: Utilize established frailty indexes to assess the patient''s
    overall health status. |'
  id: totrans-2600
  prefs: []
  type: TYPE_TB
  zh: '|  | - 弱化指数：利用已建立的弱化指数来评估患者的整体健康状况。 |'
- en: These criteria are essential for tailoring clinical trials and treatment protocols
    to the specific needs of pediatric and geriatric patients, ensuring that safety
    and efficacy are appropriately monitored, and that dosing is optimized for the
    unique characteristics of these populations.
  id: totrans-2601
  prefs: []
  type: TYPE_NORMAL
  zh: 这些标准对于调整临床试验和治疗方案以适应儿科和老年患者的特定需求至关重要，确保安全和有效性得到适当监测，并且剂量优化以适应这些人群的独特特征。
- en: '![A close-up of pills  Description automatically generated](image_rsrc6DN.jpg)'
  id: totrans-2602
  prefs: []
  type: TYPE_IMG
  zh: '![药片的特写  描述自动生成](image_rsrc6DN.jpg)'
- en: PRODUCT INFORMATION
  id: totrans-2603
  prefs: []
  type: TYPE_NORMAL
  zh: 产品信息
- en: Labeling Recommendations
  id: totrans-2604
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 标签推荐
- en: Utilizing ChatGPT for drug labeling recommendations involves leveraging the
    platform’s advanced language processing capabilities to interpret safety data
    and translate it into clear, actionable labeling information.
  id: totrans-2605
  prefs: []
  type: TYPE_NORMAL
  zh: 利用ChatGPT进行药物标签推荐涉及利用平台的高级语言处理能力来解释安全数据并将其转化为清晰、可操作性的标签信息。
- en: 'Here is how ChatGPT can support the generation of labeling recommendations:'
  id: totrans-2606
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是ChatGPT如何支持生成标签推荐的方式：
- en: '1\. Review of Safety Data: ChatGPT can initially assist in the systematic review
    of aggregated safety data from clinical trials, post-marketing surveillance, and
    literature to identify potential safety concerns that need to be reflected in
    the drug labeling.'
  id: totrans-2607
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 安全数据审查：ChatGPT最初可以帮助系统地审查临床试验、上市后监测和文献中的汇总安全数据，以识别需要反映在药物标签中的潜在安全关注。
- en: '2\. Safety Signal Analysis: Employ ChatGPT to perform an analysis of identified
    safety signals, categorizing them by severity, frequency, and potential impact
    on different patient populations.'
  id: totrans-2608
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 安全信号分析：使用ChatGPT对识别出的安全信号进行分析，按严重程度、频率和可能对不同患者群体的影响进行分类。
- en: '3\. Labeling Section Drafting: ChatGPT can draft sections of the label such
    as ''Warnings and Precautions,'' ''Adverse Reactions,'' ''Contraindications,''
    and ''Use in Specific Populations,'' ensuring that the language used is precise
    and consistent with regulatory requirements.'
  id: totrans-2609
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 标签部分起草：ChatGPT可以起草标签的部分内容，例如“警告和预防措施”、“不良反应”、“禁忌症”和“特定人群的使用”，确保使用的语言精确且符合监管要求。
- en: '4\. Dosage and Administration Guidance: Utilize ChatGPT to suggest modifications
    to the ''Dosage and Administration'' section based on safety findings, such as
    dose adjustments for specific populations or in the presence of certain adverse
    events.'
  id: totrans-2610
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 剂量和给药指导：利用ChatGPT根据安全发现提出对“剂量和给药”部分的修改建议，例如针对特定人群的剂量调整或在出现某些不良事件时。
- en: '6\. Patient Counseling Information: Leverage ChatGPT to create patient-friendly
    counseling information that accurately reflects safety concerns and provides clear
    guidance on what patients should watch for and when to seek medical advice.'
  id: totrans-2611
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 患者咨询信息：利用ChatGPT创建患者友好的咨询信息，准确反映安全关注并提供明确的指导，说明患者应关注的事项以及何时寻求医疗建议。
- en: '7\. Comparison with Similar Drugs: ChatGPT can assist in comparing the safety
    profile of the drug with similar medications on the market, providing a context
    for the labeling recommendations.'
  id: totrans-2612
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 与类似药物的比较：ChatGPT可以帮助比较药物与市场上类似药物的安全状况，为标签推荐提供背景信息。
- en: '8\. Regulatory Standards Alignment: Ensure that ChatGPT''s labeling recommendations
    are aligned with the standards and guidelines of regulatory authorities such as
    the FDA, EMA, or other national bodies.'
  id: totrans-2613
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 与监管标准的对齐：确保ChatGPT的标签推荐与FDA、EMA或其他国家监管机构的标准和指南保持一致。
- en: '9\. Labeling Updates: ChatGPT can generate templates for periodic safety updates
    to the label, keeping the safety information current as new data emerge.'
  id: totrans-2614
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 标签更新：ChatGPT可以生成定期安全更新标签的模板，随着新数据的出现，保持安全信息的最新性。
- en: '10\. Communication with Regulatory Bodies: Draft communication to regulatory
    agencies proposing labeling changes, providing a rationale based on the latest
    safety data and analyses.'
  id: totrans-2615
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 与监管机构的沟通：起草与监管机构沟通的文件，提出标签变更建议，基于最新的安全数据和进行分析的理由。
- en: In applying ChatGPT for labeling recommendations, it’s crucial to ensure that
    the suggestions are evaluated and approved by PV and regulatory affairs experts
    and that all recommendations are evidence-based and reflect the most current and
    comprehensive safety data available.
  id: totrans-2616
  prefs: []
  type: TYPE_NORMAL
  zh: 在应用 ChatGPT 进行标签推荐时，确保建议被 PV 和法规事务专家评估和批准至关重要，并且所有建议都是基于证据的，并反映了最最新和最全面的安全数据。
- en: Patient Education
  id: totrans-2617
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 患者教育
- en: 'Here are examples of how ChatGPT can be applied to various aspects of patient
    education:'
  id: totrans-2618
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是 ChatGPT 可以应用于患者教育各个方面的示例：
- en: Table 22\. Patient education.
  id: totrans-2619
  prefs: []
  type: TYPE_NORMAL
  zh: 表 22\. 患者教育。
- en: '| Patient Education Aspect | ChatGPT Application |'
  id: totrans-2620
  prefs: []
  type: TYPE_TB
  zh: '| 患者教育方面 | ChatGPT 应用 |'
- en: '| Medication Purpose and Action | Draft simple explanations of the medication''s
    mechanism, intended effects, and its role in treatment. |'
  id: totrans-2621
  prefs: []
  type: TYPE_TB
  zh: '| 药物用途和作用 | 撰写关于药物机制、预期效果和治疗中作用的简单说明。 |'
- en: '| Dosage and Administration | Create step-by-step guides for proper medication
    use, including timing, dosage, and administration techniques. |'
  id: totrans-2622
  prefs: []
  type: TYPE_TB
  zh: '| 剂量和给药 | 创建正确使用药物的逐步指南，包括时间、剂量和给药技术。 |'
- en: '| Side Effects and Management | Provide information on common side effects,
    emergency signs, and management strategies. |'
  id: totrans-2623
  prefs: []
  type: TYPE_TB
  zh: '| 副作用和管理 | 提供关于常见副作用、紧急迹象和管理策略的信息。 |'
- en: '| Interactions and Contraindications | Explain potential interactions with
    other drugs or activities and list any contraindications. |'
  id: totrans-2624
  prefs: []
  type: TYPE_TB
  zh: '| 相互作用和禁忌 | 解释与其他药物或活动的潜在相互作用，并列出任何禁忌。 |'
- en: '| Lifestyle Recommendations | Suggest lifestyle modifications to complement
    medical treatment and mitigate side effects. |'
  id: totrans-2625
  prefs: []
  type: TYPE_TB
  zh: '| 生活方式建议 | 提出补充医疗治疗并减轻副作用的生活方式调整建议。 |'
- en: '| Treatment Adherence | Generate motivational content emphasizing the importance
    of adherence and strategies to maintain treatment regimes. |'
  id: totrans-2626
  prefs: []
  type: TYPE_TB
  zh: '| 治疗依从性 | 生成强调依从性重要性和维持治疗方案策略的激励性内容。 |'
- en: '| FAQs | Compile and answer common questions related to the medication, condition,
    and treatment protocols. |'
  id: totrans-2627
  prefs: []
  type: TYPE_TB
  zh: '| 常见问题解答 | 汇编并回答与药物、疾病和治疗方案相关的常见问题。 |'
- en: '| Visual Aids | Outline content for visual aids, like infographics or illustrative
    videos, to enhance understanding. |'
  id: totrans-2628
  prefs: []
  type: TYPE_TB
  zh: '| 视觉辅助工具 | 概述视觉辅助内容，如信息图表或说明性视频，以增强理解。 |'
- en: '| Support and Resources | List available support systems, additional information
    sources, and educational resources. |'
  id: totrans-2629
  prefs: []
  type: TYPE_TB
  zh: '| 支持和资源 | 列出可用的支持系统、额外信息来源和教育资源。 |'
- en: '| Personalized Education Materials | Personalize educational materials based
    on individual patient profiles and treatment specifics. |'
  id: totrans-2630
  prefs: []
  type: TYPE_TB
  zh: '| 个性化教育材料 | 根据个别患者档案和治疗具体情况进行个性化教育材料。 |'
- en: '| Translation Services | Assist in translating educational content into different
    languages to cater to non-English-speaking patients. |'
  id: totrans-2631
  prefs: []
  type: TYPE_TB
  zh: '| 翻译服务 | 协助将教育内容翻译成不同语言，以适应非英语患者。 |'
- en: '| Feedback and Improvement | Design feedback tools to evaluate the effectiveness
    of educational materials and inform iterative improvements. |'
  id: totrans-2632
  prefs: []
  type: TYPE_TB
  zh: '| 反馈与改进 | 设计评估教育材料有效性的反馈工具，并告知迭代改进。 |'
- en: Using ChatGPT in this structured format ensures that patient education is comprehensive,
    accessible, and tailored to the needs of diverse patient populations. It is important
    that all AI-generated materials are reviewed by healthcare professionals to ensure
    clinical accuracy and appropriateness.
  id: totrans-2633
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 在这种结构化格式中确保患者教育全面、易于获取，并针对不同患者群体的需求定制。所有由 AI 生成的材料都应由医疗保健专业人员审查，以确保临床准确性和适宜性。
- en: 'Another example is creating infographics for patient education on hypertension
    medicine, which involves a few key steps:'
  id: totrans-2634
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个例子是为高血压药物的患者教育创建信息图表，这涉及几个关键步骤：
- en: 'Identify the Key Information: Decide on the essential points about hypertension
    medicine you want to convey. This might include types of medications, how they
    work, common side effects, lifestyle modifications, and the importance of adherence
    to medication schedules.'
  id: totrans-2635
  prefs: []
  type: TYPE_NORMAL
  zh: 确定关键信息：决定你想传达的高血压药物的关键信息。这可能包括药物类型、它们如何工作、常见副作用、生活方式调整以及遵守药物时间表的重要性。
- en: 'Design the Infographic: The design should be clear and engaging. Use a mix
    of visuals and text to communicate your message effectively. Keep in mind the
    literacy level of your target audience.'
  id: totrans-2636
  prefs: []
  type: TYPE_NORMAL
  zh: 设计信息图表：设计应清晰且引人入胜。使用视觉和文本的结合来有效地传达你的信息。请记住你目标受众的识字水平。
- en: 'Choose the Right Tools: There are various tools and software like Adobe Illustrator,
    Canva, or Piktochart that can be used to create infographics.'
  id: totrans-2637
  prefs: []
  type: TYPE_NORMAL
  zh: 选择合适的工具：有各种工具和软件，如Adobe Illustrator、Canva或Piktochart，可以用来创建信息图表。
- en: 'Readability test: Before finalizing the infographic, it''s a good idea to get
    feedback from healthcare professionals and potential patients to ensure the information
    is accurate and easy to understand.'
  id: totrans-2638
  prefs: []
  type: TYPE_NORMAL
  zh: 可读性测试：在最终确定信息图表之前，从医疗保健专业人员和潜在患者那里获取反馈是一个好主意，以确保信息准确且易于理解。
- en: 'Here''s a basic outline for an infographic on hypertension medicine:'
  id: totrans-2639
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是关于高血压药物的信息图表的基本大纲：
- en: 'Infographic Outline: Understanding Hypertension Medicine'
  id: totrans-2640
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信息图表大纲：了解高血压药物
- en: 'Title: "Managing Hypertension: Understanding Your Medication"'
  id: totrans-2641
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 标题：“管理高血压：了解您的药物”
- en: 'Introduction: A brief explanation of what hypertension is and why medication
    is important.'
  id: totrans-2642
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简介：简要解释高血压是什么以及为什么药物很重要。
- en: 'Types of Hypertension Medications:'
  id: totrans-2643
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 高血压药物类型：
- en: 'Diuretics: Helps kidneys remove sodium and water, reducing blood volume.'
  id: totrans-2644
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利尿剂：帮助肾脏排出钠和水，减少血容量。
- en: 'Beta-blockers: Reduces the workload on the heart and open blood vessels.'
  id: totrans-2645
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: β-受体阻滞剂：减少心脏的工作负荷并开放血管。
- en: 'ACE inhibitors: Helps relax blood vessels by blocking the formation of a natural
    chemical.'
  id: totrans-2646
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ACE抑制剂：通过阻断天然化学物质的生成来帮助放松血管。
- en: 'Angiotensin II receptor blockers (ARBs): Helps relax blood vessels.'
  id: totrans-2647
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 血管紧张素II受体阻滞剂（ARBs）：帮助放松血管。
- en: 'Calcium channel blockers: Prevents calcium from entering heart and blood vessel
    cells.'
  id: totrans-2648
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 钙通道阻滞剂：防止钙进入心脏和血管细胞。
- en: 'Renin inhibitors: Slows down the production of renin, an enzyme the kidneys
    produce.'
  id: totrans-2649
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 肾素抑制剂：减缓肾脏产生肾素（一种酶）的速度。
- en: 'How to Take Your Medication:'
  id: totrans-2650
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如何服用您的药物：
- en: Importance of following the prescribed schedule.
  id: totrans-2651
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遵循处方时间表的重要性。
- en: Tips for remembering to take your medication.
  id: totrans-2652
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记住服用药物的小贴士。
- en: 'Possible Side Effects:'
  id: totrans-2653
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可能的副作用：
- en: A list of common side effects for each type of medication.
  id: totrans-2654
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每种药物类型的常见副作用列表。
- en: Advice on what to do if side effects are experienced.
  id: totrans-2655
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果出现副作用时的建议。
- en: 'Lifestyle Modifications:'
  id: totrans-2656
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生活方式的改变：
- en: Diet and exercise tips.
  id: totrans-2657
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 饮食和运动建议。
- en: Importance of regular blood pressure monitoring.
  id: totrans-2658
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期监测血压的重要性。
- en: 'Consult Your Doctor: Encouraging patients to maintain regular check-ups and
    consult their doctor for any concerns.'
  id: totrans-2659
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 咨询您的医生：鼓励患者保持定期检查，并在有任何担忧时咨询医生。
- en: 'Footer: Include contact information for further queries and a disclaimer about
    consulting healthcare providers for personalized advice.'
  id: totrans-2660
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 页脚：包括进一步查询的联系信息和关于咨询医疗保健提供者以获得个性化建议的免责声明。
- en: 'Visual Elements:'
  id: totrans-2661
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 视觉元素：
- en: Icons for each type of medication.
  id: totrans-2662
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每种药物类型的图标。
- en: A small chart or graph showing the impact of medication adherence on blood pressure
    levels.
  id: totrans-2663
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个小图表或图形显示药物依从性对血压水平的影响。
- en: Lifestyle modification visuals like healthy foods, exercise, and a blood pressure
    monitor.
  id: totrans-2664
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生活方式改变视觉元素，如健康食品、运动和血压计。
- en: Creating Educational Materials
  id: totrans-2665
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建教育材料
- en: 'Here''s a step-by-step approach for using ChatGPT to create patient information
    leaflets and educational materials:'
  id: totrans-2666
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是使用ChatGPT创建患者信息手册和教育材料的一步一步的方法：
- en: 'Identify the Target Audience: Determine whether the material is for patients,
    caregivers, healthcare professionals, or a specific patient demographic. Understanding
    your audience is crucial in tailoring the language, tone, and complexity of the
    information.'
  id: totrans-2667
  prefs: []
  type: TYPE_NORMAL
  zh: 确定目标受众：确定材料是为患者、护理者、医疗保健专业人员还是特定患者群体。了解您的受众对于调整语言、语气和信息复杂度至关重要。
- en: 'Establish Key Information: List the essential information that needs to be
    included, such as drug indications, dosage, administration method, side effects,
    storage instructions, and any contraindications or precautions.'
  id: totrans-2668
  prefs: []
  type: TYPE_NORMAL
  zh: 确立关键信息：列出需要包含的基本信息，例如药物适应症、剂量、给药方法、副作用、储存说明以及任何禁忌症或注意事项。
- en: 'Use ChatGPT for Drafting: Input the key information into ChatGPT, asking it
    to draft a patient leaflet or educational material.'
  id: totrans-2669
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行草稿：将关键信息输入ChatGPT，要求它起草患者手册或教育材料。
- en: For instance, "Create a patient information leaflet for [Drug Name] that includes
    indications, dosage, side effects, and storage instructions."
  id: totrans-2670
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，“为[药物名称]创建一份患者信息手册，包括适应症、剂量、副作用和储存说明。”
- en: 'Review and Revise: Once ChatGPT provides a draft, thoroughly review it for
    accuracy, clarity, and compliance with regulatory standards. It''s important to
    ensure that the information is medically accurate and aligns with the latest clinical
    guidelines and FDA regulations.'
  id: totrans-2671
  prefs: []
  type: TYPE_NORMAL
  zh: 审查和修订：一旦ChatGPT提供了草稿，彻底审查其准确性、清晰度和是否符合监管标准。确保信息在医学上准确，并与最新的临床指南和FDA法规保持一致非常重要。
- en: 'Simplify Medical Jargon: Use ChatGPT to translate medical terms into layman''s
    language.'
  id: totrans-2672
  prefs: []
  type: TYPE_NORMAL
  zh: 简化医学术语：使用ChatGPT将医学术语翻译成通俗易懂的语言。
- en: For example, you can ask, "Rewrite the following medical information in simple
    language for patient understanding."
  id: totrans-2673
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以询问，“将以下医疗信息重写为简单语言，以便患者理解。”
- en: 'Incorporate Q&A Sections: Consider asking ChatGPT to create a Frequently Asked
    Questions (FAQ) section based on common queries related to the medication or condition.'
  id: totrans-2674
  prefs: []
  type: TYPE_NORMAL
  zh: 包含问答部分：考虑让ChatGPT根据与药物或状况相关的常见问题创建一个常见问题解答（FAQ）部分。
- en: 'Ensure Cultural Sensitivity and Inclusivity: Ask ChatGPT to review the material
    to ensure it is culturally sensitive and inclusive. This includes using appropriate
    terminology and considering diversity in examples and illustrations.'
  id: totrans-2675
  prefs: []
  type: TYPE_NORMAL
  zh: 确保文化敏感性和包容性：请ChatGPT审查材料，以确保其具有文化敏感性和包容性。这包括使用适当的术语，并考虑在示例和插图中的多样性。
- en: 'Legal and Ethical Compliance Check: While ChatGPT can assist in drafting, it''s
    essential to have a legal and regulatory expert review the material for compliance
    with pharmaceutical regulations and ethical guidelines.'
  id: totrans-2676
  prefs: []
  type: TYPE_NORMAL
  zh: 法律和伦理合规性检查：虽然ChatGPT可以帮助起草，但重要的是要由法律和监管专家审查材料，以确保符合药品法规和伦理指南。
- en: 'Pilot Testing and Feedback: Before finalizing, consider testing the draft with
    a small group from your target audience. Use their feedback to make necessary
    adjustments.'
  id: totrans-2677
  prefs: []
  type: TYPE_NORMAL
  zh: 试点测试和反馈：在最终确定之前，考虑使用目标受众的小组对草稿进行测试。使用他们的反馈进行必要的调整。
- en: '![A robot sitting at a desk with a computer  Description automatically generated](image_rsrc6DP.jpg)'
  id: totrans-2678
  prefs: []
  type: TYPE_IMG
  zh: '![一台坐在桌前的机器人，旁边有一台电脑，描述自动生成](image_rsrc6DP.jpg)'
- en: PRIVACY AND SECURITY
  id: totrans-2679
  prefs: []
  type: TYPE_NORMAL
  zh: 隐私和安全
- en: Management of data privacy
  id: totrans-2680
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据隐私管理
- en: 'AI''s handling of data privacy is a critical concern, especially given the
    sensitive nature of the data often involved. Here are key aspects of how AI systems
    can be designed and used to handle data privacy effectively:'
  id: totrans-2681
  prefs: []
  type: TYPE_NORMAL
  zh: AI处理数据隐私是一个关键问题，尤其是在涉及数据敏感性的情况下。以下是AI系统设计和使用以有效处理数据隐私的关键方面：
- en: 'Data Anonymization and Pseudonymization: AI systems can anonymize or pseudonymize
    personal data, removing or replacing personal identifiers. This process helps
    in protecting individual privacy while allowing the valuable aspects of the data
    to be used for analysis and training.'
  id: totrans-2682
  prefs: []
  type: TYPE_NORMAL
  zh: 数据匿名化和脱敏：AI系统可以对个人数据进行匿名化或脱敏，移除或替换个人标识符。这个过程有助于保护个人隐私，同时允许数据的宝贵方面用于分析和训练。
- en: 'Secure Data Storage and Transmission: AI systems must employ secure methods
    for storing and transmitting data. This includes using encryption and secure protocols
    to protect data from unauthorized access during storage and when it''s being sent
    across networks.'
  id: totrans-2683
  prefs: []
  type: TYPE_NORMAL
  zh: 安全的数据存储和传输：AI系统必须采用安全的方法来存储和传输数据。这包括使用加密和安全的协议来保护数据在存储期间以及在网络中传输时的未授权访问。
- en: 'Access Controls: Implementing strict access controls ensures that only authorized
    personnel can access sensitive data. AI systems can be configured to enforce these
    controls, limiting access based on user roles and permissions.'
  id: totrans-2684
  prefs: []
  type: TYPE_NORMAL
  zh: 访问控制：实施严格的访问控制确保只有授权人员可以访问敏感数据。AI系统可以被配置来执行这些控制，根据用户角色和权限限制访问。
- en: 'Compliance with Regulations: AI systems must be designed and operated in compliance
    with relevant data protection regulations, such as the GDPR in Europe, the Health
    Insurance Portability and Accountability Act (HIPAA) in the United States, and
    other local data protection laws. This involves incorporating privacy by design
    and by default into the AI systems.'
  id: totrans-2685
  prefs: []
  type: TYPE_NORMAL
  zh: 遵守法规：AI系统必须设计和运营符合相关的数据保护法规，例如欧洲的GDPR，美国的健康保险可携带性和问责法案（HIPAA）以及其他地方的数据保护法律。这包括将隐私设计为默认选项和内置到AI系统中。
- en: 'Regular Audits and Monitoring: Regular audits and continuous monitoring of
    AI systems help identify and address any potential privacy issues. This includes
    monitoring data access logs and ensuring that the system is functioning as intended.'
  id: totrans-2686
  prefs: []
  type: TYPE_NORMAL
  zh: 定期审计和监控：定期审计和持续监控AI系统有助于识别和解决任何潜在的隐私问题。这包括监控数据访问日志，并确保系统按预期运行。
- en: 'Data Minimization: AI systems should collect and process only the data that
    is necessary for the specific purpose for which the system is being used. This
    principle of data minimization is key to protecting privacy.'
  id: totrans-2687
  prefs: []
  type: TYPE_NORMAL
  zh: 数据最小化：AI系统应仅收集和处理用于系统特定用途所必需的数据。数据最小化原则是保护隐私的关键。
- en: 'Transparency and Consent: Users should be informed about what data is being
    collected, how it is being used, and for what purpose. Obtaining explicit consent
    from users, especially for sensitive data, is crucial.'
  id: totrans-2688
  prefs: []
  type: TYPE_NORMAL
  zh: 透明度和同意：用户应了解正在收集哪些数据，如何使用这些数据，以及用于什么目的。特别是对于敏感数据，从用户那里获得明确同意是至关重要的。
- en: 'Ethical Considerations: Beyond legal compliance, ethical considerations should
    guide the use of AI, especially in decisions about what data to collect and how
    to use it.'
  id: totrans-2689
  prefs: []
  type: TYPE_NORMAL
  zh: 道德考量：除了法律合规之外，道德考量应指导AI的使用，特别是在关于收集哪些数据和如何使用它们的决定上。
- en: 'Bias Mitigation: Ensuring that AI systems do not perpetuate or amplify biases,
    particularly when dealing with personal data, is important for ethical and privacy
    reasons.'
  id: totrans-2690
  prefs: []
  type: TYPE_NORMAL
  zh: 偏差缓解：确保AI系统在处理个人数据时不会持续或放大偏差，这对于道德和隐私原因是重要的。
- en: 'Incident Response Plans: In case of a data breach or privacy incident, having
    a robust incident response plan is crucial. AI systems can be part of the solution,
    helping to quickly identify and mitigate breaches.'
  id: totrans-2691
  prefs: []
  type: TYPE_NORMAL
  zh: 事件响应计划：在发生数据泄露或隐私事件的情况下，拥有一个强大的事件响应计划至关重要。AI系统可以是解决方案的一部分，有助于快速识别和缓解泄露。
- en: In summary, handling data privacy in AI involves a combination of technical
    measures, ethical considerations, and compliance with legal standards. It requires
    a proactive approach to privacy and security, ensuring that privacy protections
    are integrated into every aspect of AI system development and deployment.
  id: totrans-2692
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，在AI中处理数据隐私需要结合技术措施、道德考量以及遵守法律标准。这需要一种积极的隐私和安全方法，确保隐私保护被整合到AI系统开发和部署的各个方面。
- en: Adhering to Data Privacy in PV
  id: totrans-2693
  prefs: []
  type: TYPE_NORMAL
  zh: 遵守药物警戒中的数据隐私
- en: The handling of sensitive data is an area of paramount importance, especially
    in the context of adhering to data privacy laws. As PV professionals, it is not
    just a legal obligation but an ethical responsibility to ensure that all PV data
    is managed in compliance with the GDPR, as well as other international data privacy
    rules.
  id: totrans-2694
  prefs: []
  type: TYPE_NORMAL
  zh: 处理敏感数据是一个至关重要的领域，特别是在遵守数据隐私法律的情况下。作为药物警戒专业人员，确保所有药物警戒数据都符合GDPR以及其他国际数据隐私规则，不仅是一项法律义务，也是一种道德责任。
- en: The GDPR sets stringent guidelines for data processing, ensuring the protection
    of personal data. In the field of PV, this typically involves patient information,
    adverse event reports, and other health-related data. Compliance with these regulations
    requires a thorough understanding and implementation of practices that safeguard
    the privacy and integrity of this data.
  id: totrans-2695
  prefs: []
  type: TYPE_NORMAL
  zh: GDPR为数据处理设定了严格的指南，确保个人数据得到保护。在药物警戒领域，这通常涉及患者信息、不良事件报告以及其他与健康相关的数据。遵守这些法规需要彻底理解和实施保护这些数据隐私和完整性的实践。
- en: This includes obtaining proper consent for data collection, ensuring anonymity
    in reporting, and securing data against unauthorized access.
  id: totrans-2696
  prefs: []
  type: TYPE_NORMAL
  zh: 这包括为数据收集获得适当的同意，确保报告中的匿名性，以及保护数据免受未经授权的访问。
- en: Moreover, the global nature of PV means that professionals often deal with data
    that crosses international borders. Therefore, it's crucial to be well-versed
    not only with the GDPR but also with other international data privacy laws that
    may apply.
  id: totrans-2697
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，药物警戒的全球性质意味着专业人士经常处理跨越国际边界的资料。因此，不仅需要精通GDPR，还需要熟悉可能适用的其他国际数据隐私法律。
- en: THE FUTURE OF AI AND CHATGPT IN PHARMACOVIGILANCE
  id: totrans-2698
  prefs: []
  type: TYPE_NORMAL
  zh: AI和ChatGPT在药物警戒中的未来
- en: As we close the book on the current landscape of AI and ChatGPT in pharmacovigilance,
    we look back at a journey marked by remarkable advancements and forward to a horizon
    rich with potential.
  id: totrans-2699
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们回顾AI和ChatGPT在药物警戒中的当前格局时，我们回顾了一段以显著进步为标志的旅程，并展望一个充满潜力的未来。
- en: Reflecting on ChatGPT's Role in Pharmacovigilance
  id: totrans-2700
  prefs: []
  type: TYPE_NORMAL
  zh: 反思ChatGPT在药物警戒中的作用
- en: ChatGPT can transform the PV field, providing unparalleled assistance in adverse
    event reporting, literature review, and data analysis. Its ability to process
    natural language has enabled more efficient signal detection from diverse data
    sources, including social media and electronic health records. With real-time
    processing capabilities, ChatGPT has reduced the lag in identifying potential
    safety signals, thereby enhancing patient safety, and ensuring quicker regulatory
    responses.
  id: totrans-2701
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以改变PV领域，在不良事件报告、文献综述和数据分析方面提供无与伦比的协助。其处理自然语言的能力使得从包括社交媒体和电子健康记录在内的多种数据源中检测信号更加高效。凭借实时处理能力，ChatGPT减少了识别潜在安全信号的时间滞后，从而提高了患者安全，并确保了更快的监管响应。
- en: The integration of AI technologies like ChatGPT into PV is just the beginning.
    The next wave of AI promises to deliver even more sophisticated tools for predictive
    analytics, pattern recognition, and decision support. As machine learning algorithms
    grow more advanced, their predictive capabilities will extend beyond current use,
    potentially forecasting adverse events before they occur and enabling proactive
    risk management.
  id: totrans-2702
  prefs: []
  type: TYPE_NORMAL
  zh: 将AI技术如ChatGPT整合到PV中只是开始。AI的下一波浪潮承诺将提供更先进的工具，用于预测分析、模式识别和决策支持。随着机器学习算法变得更加先进，它们的预测能力将超越当前用途，可能预测在发生之前的不良事件，并实现主动风险管理。
- en: Ongoing Initiatives and Future Directions
  id: totrans-2703
  prefs: []
  type: TYPE_NORMAL
  zh: 持续的倡议和未来方向
- en: 'The PV community is actively engaged in several initiatives that push the boundaries
    of what AI can achieve:'
  id: totrans-2704
  prefs: []
  type: TYPE_NORMAL
  zh: PV社区积极参与多个倡议，推动AI所能达到的边界：
- en: 'Global Harmonization: Efforts like the International Coalition of Medicines
    Regulatory Authorities (ICMRA) are working towards harmonizing AI applications
    across regulatory jurisdictions to streamline PV practices worldwide.'
  id: totrans-2705
  prefs: []
  type: TYPE_NORMAL
  zh: 全球协调：国际药品监管机构联盟（ICMRA）等组织正致力于协调监管机构间的AI应用，以简化全球的药物警戒（PV）实践。
- en: 'Standardization of Data: Projects such as the FAIR (Findable, Accessible, Interoperable,
    and Reusable) data principles are ensuring that the vast amounts of health data
    needed to train AI systems are standardized and high-quality.'
  id: totrans-2706
  prefs: []
  type: TYPE_NORMAL
  zh: 数据标准化：如FAIR（可查找、可访问、可互操作和可重复使用）数据原则等项目确保了训练AI系统所需的大量健康数据得到标准化且质量上乘。
- en: 'Ethical AI Use: Organizations are creating frameworks to guide the ethical
    use of AI in healthcare, ensuring that patient privacy is protected, and biases
    are minimized.'
  id: totrans-2707
  prefs: []
  type: TYPE_NORMAL
  zh: 伦理AI使用：组织正在创建框架来指导医疗保健中AI的伦理使用，确保患者隐私得到保护，并最小化偏见。
- en: 'Collaboration with Tech Giants: Partnerships between PV bodies and tech companies
    are fostering the development of specialized AI tools tailored to drug safety
    monitoring.'
  id: totrans-2708
  prefs: []
  type: TYPE_NORMAL
  zh: 与科技巨头合作：药物警戒机构和科技公司之间的合作正在促进针对药物安全监测的专用AI工具的开发。
- en: 'Education and Workforce Development: Institutions focus on educating current
    and future professionals in the combined fields of AI and PV, aiming to create
    a workforce that is as adept in technology as it is in medicine.'
  id: totrans-2709
  prefs: []
  type: TYPE_NORMAL
  zh: 教育与劳动力发展：机构们专注于培养当前和未来在AI与PV结合领域的专业人士，旨在打造既精通技术又精通医学的劳动力。
- en: Human Responsibility
  id: totrans-2710
  prefs: []
  type: TYPE_NORMAL
  zh: 人类责任
- en: The Imperative of Human Oversight
  id: totrans-2711
  prefs: []
  type: TYPE_NORMAL
  zh: 人类监管的必要性
- en: The role of humans in overseeing and verifying the information provided by AI
    systems like ChatGPT is crucial. While AI can process and generate vast amounts
    of data at unprecedented speeds, the responsibility to ensure the accuracy and
    reliability of this information ultimately lies with human users.
  id: totrans-2712
  prefs: []
  type: TYPE_NORMAL
  zh: 人类在监督和验证ChatGPT等AI系统提供的信息方面的作用至关重要。虽然AI可以以前所未有的速度处理和生成大量数据，但确保这些信息的准确性和可靠性的责任最终仍在于人类用户。
- en: AI models, including ChatGPT, are powerful tools, but they are not infallible—they
    rely on the data they have been trained on, which may not always be up-to-date
    or free from biases.
  id: totrans-2713
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型，包括ChatGPT，是强大的工具，但它们并非完美无缺——它们依赖于训练时所使用的数据，而这些数据可能并不总是最新的或无偏见。
- en: The Role of Professionals
  id: totrans-2714
  prefs: []
  type: TYPE_NORMAL
  zh: 专业人士的作用
- en: PV professionals, and indeed all users of AI, must exercise due diligence when
    interacting with AI-generated content. It is essential to critically assess, cross-verify
    with authoritative sources, and contextualize the information before using it
    in decision-making processes. In the context of PV, where patient safety and public
    health are at stake, this vigilance is especially paramount.
  id: totrans-2715
  prefs: []
  type: TYPE_NORMAL
  zh: 光伏专业人士，以及所有AI用户，在与AI生成的内容互动时必须尽职尽责。在决策过程中使用信息之前，进行批判性评估、与权威来源交叉验证以及将信息置于适当背景中是至关重要的。在光伏领域，患者的安全和公共卫生处于风险之中，这种警惕性尤为重要。
- en: An Example of Misinformation
  id: totrans-2716
  prefs: []
  type: TYPE_NORMAL
  zh: 错误信息的例子
- en: Consider a scenario where a PV professional asks ChatGPT about the adverse effects
    associated with a new medication. ChatGPT might generate a list based on its training
    data, which could include outdated or incomplete information. If the professional
    does not cross-reference this list with the latest clinical research or regulatory
    databases, they might miss newly identified adverse effects, leading to incomplete
    safety profiles and potential risks to patient health.
  id: totrans-2717
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑这样一个场景，一位光伏专业人士向ChatGPT询问一种新药的不良影响。ChatGPT可能会根据其训练数据生成一个列表，这可能包括过时或不完整的信息。如果专业人士不将此列表与最新的临床研究或监管数据库进行交叉验证，他们可能会错过新识别的不良影响，导致安全资料不完整，并可能对患者的健康构成风险。
- en: The potential of AI in enhancing PV
  id: totrans-2718
  prefs: []
  type: TYPE_NORMAL
  zh: AI在增强光伏领域的潜力
- en: The human-AI partnership should be symbiotic, with AI providing the computational
    power and humans providing the discernment and ethical oversight. As AI becomes
    more integrated into critical fields like PV, the importance of human responsibility
    in verifying the information provided by AI cannot be overstated. Continuous education,
    awareness of AI's limitations, and a commitment to accuracy are the pillars that
    will uphold the integrity of AI-assisted professions.
  id: totrans-2719
  prefs: []
  type: TYPE_NORMAL
  zh: 人机合作应该是共生关系，AI提供计算能力，而人类提供判断力和道德监督。随着AI越来越多地融入光伏等关键领域，人类在验证AI提供的信息方面所承担的责任的重要性不容忽视。持续教育、了解AI的局限性以及坚持准确性是维护AI辅助职业完整性的支柱。
- en: The future is bright for AI in PV. We anticipate a landscape where AI not only
    complements human expertise but also brings forth new insights that were previously
    inaccessible. The challenges of integrating AI into the heavily regulated PV environment
    will be met with innovative solutions that enhance compliance, efficiency, and,
    ultimately, patient safety.
  id: totrans-2720
  prefs: []
  type: TYPE_NORMAL
  zh: 光伏领域的AI未来光明。我们预计将出现一个AI不仅补充人类专业知识，还能带来以前无法触及的新见解的格局。将AI整合到高度监管的光伏环境中的挑战将遇到创新解决方案，这些解决方案将提高合规性、效率，最终提高患者的安全性。
- en: In the coming years, AI will likely become an indispensable ally in PV—a tool
    that seamlessly blends into the fabric of drug safety practices. The ongoing initiatives
    today are the seeds for a revolution in healthcare that promises to keep patients
    safer and healthier than ever before.
  id: totrans-2721
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来几年里，AI可能会成为光伏领域不可或缺的盟友——一个无缝融入药物安全实践的工具。今天的持续举措是医疗保健革命的种子，承诺让患者比以往任何时候都更安全、更健康。
- en: As we turn the final page, we look forward with optimism, ready to embrace the
    new era of AI in PV.
  id: totrans-2722
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们翻到最后一页，我们满怀乐观地期待，准备拥抱光伏领域AI的新时代。
- en: The journey continues, and the best is yet to come.
  id: totrans-2723
  prefs: []
  type: TYPE_NORMAL
  zh: 旅程仍在继续，最好的还在后面。
