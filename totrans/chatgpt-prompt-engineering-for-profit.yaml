  zh: '**23**. **问题** **分解** **（** **问题** **分解** **）'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-1225
  prefs: []
  type: TYPE_NORMAL
  zh: '[**什么是** **]'
- en: '****Pro**ble**m ****Brea**kdow**n , ****o**r** ****Pro**ble**m ****Decom**positi**on,
    ****i**s** ****a**** ****pro**ble**m ****engi**neerin**g ****tech**niqu**e ****th**at**
    ****inv**olve**s ****bre**akin**g ****do**wn** ****a**** ****com**ple**x ****pro**ble**m
    ****in**to** ****sma**lle**r, ****mo**re** ****mana**geabl**e ****pa**rts**. ****T**he**
    ****go**al** ****o**f** ****th**is** ****tech**niqu**e ****i**s** ****t**o** ****sim**plif**y
    ****a**** ****pro**ble**m, ****ma**kin**g ****i**t** ****ea**sie**r ****t**o**
    ****so**lve** ****b**y** ****dea**lin**g ****wi**th** ****sma**lle**r ****subp**roblem**s,
    ****wh**ose** ****solu**tion**s ****c**an** ****b**e** ****com**bine**d ****t**o**
    ****so**lve** ****t**he** ****ma**in** ****pro**ble**m.'
  id: totrans-1226
  prefs: []
  type: TYPE_NORMAL
  zh: '****问题分解，或称为问题分解，是一种问题工程技术，它涉及将一个复杂问题分解成更小、更易于管理的部分。这种技术的目标是简化问题，通过处理更小的子问题来使其更容易解决，这些子问题的解决方案可以组合起来解决主要问题。'
- en: '****Th**is** ****app**roac**h ****he**lps** ****ta**ckl**e ****pro**blem**s
    ****th**at** ****m**ay** ****se**em** ****dau**ntin**g ****a**t** ****fi**rst**
    ****gl**anc**e ****b**y** ****all**owin**g ****t**he** ****mo**del** ****t**o**
    ****add**res**s ****ea**ch** ****comp**onen**t ****i**n** ****de**tai**l ****a**nd**
    ****even**tuall**y ****st**itc**h ****t**he** ****ans**wer**s ****tog**ethe**r
    ****t**o** ****so**lve** ****t**he** ****com**plet**e ****pro**ble**m.'
  id: totrans-1227
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法有助于解决那些一开始看起来令人畏惧的问题，通过允许模型详细处理每个组成部分，并最终将答案拼接在一起来解决整个问题。
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****go**al** ?]'
  id: totrans-1228
  prefs: []
  type: TYPE_NORMAL
  zh: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****go**al** ?]'
- en: '****T**he** ****ma**in** ****go**al** ****o**f** ****Pro**ble**m ****Decom**positi**on
    ****i**s** ****t**o** ****ma**ke** ****i**t** ****ea**sie**r ****t**o** ****so**lve**
    ****com**ple**x ****pro**blem**s ****b**y** ****bre**akin**g ****th**em** ****do**wn**
    ****in**to** ****sma**lle**r, ****sim**ple**r ****st**eps**. ****Th**is** ****tech**niqu**e
    ****al**low**s ****f**or** ****a**** ****syst**emati**c ****app**roac**h, ****wh**ere**
    ****ea**ch** ****subp**roble**m ****c**an** ****b**e** ****addr**esse**d ****indep**endent**ly,
    ****incr**easin**g ****cla**rit**y ****a**nd** ****ens**urin**g ****th**at** ****a**ll**
    ****pa**rts** ****o**f** ****t**he** ****pro**ble**m ****a**re** ****cov**ere**d.'
  id: totrans-1229
  prefs: []
  type: TYPE_NORMAL
  zh: 问题分解的主要目标是使解决复杂问题更容易，通过将它们分解成更小、更简单的步骤。这种技术允许采取系统性的方法，其中每个子问题都可以独立解决，提高清晰度并确保问题的所有部分都被覆盖。
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****imp**rov**e ****t**he**
    ****orga**nizati**on ****a**nd** ****effi**cienc**y ****o**f** ****pro**ble**m-****sol**vin**g.
    ****Bre**akin**g ****t**he** ****pro**ble**m ****do**wn** ****in**to** ****sma**lle**r
    ****pa**rts** ****al**low**s ****y**ou** ****t**o** ****prio**ritiz**e ****cri**tica**l
    ****st**eps** ****a**nd** ****ta**ckl**e ****ea**ch** ****o**ne** ****mo**re**
    ****effe**ctivel**y, ****ens**urin**g ****a**** ****det**aile**d ****under**standi**ng
    ****be**for**e ****mo**vin**g ****o**n** ****t**o** ****t**he** ****ne**xt** ****st**age**.
    ****I**t** ****al**so** ****al**low**s ****y**ou** ****t**o** ****ide**ntif**y
    ****pote**ntia**l ****pa**in** ****po**int**s ****o**r** ****bott**leneck**s ****be**for**e
    ****atte**mptin**g ****t**o** ****so**lve** ****t**he** ****pro**ble**m ****a**s**
    ****a**** ****wh**ole**.'
  id: totrans-1230
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个目标是提高问题解决的组织和效率。将问题分解成更小的部分允许你优先考虑关键步骤，并更有效地逐一解决每个问题，确保在进入下一阶段之前有详细的了解。它还允许你在尝试作为一个整体解决问题之前，识别潜在的痛点或瓶颈。
