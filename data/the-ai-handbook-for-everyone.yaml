  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我已经很久没有和[朋友的名字]说话了，我想重新建立联系。请草拟一条自然、温馨的信息，不要让它显得尴尬。"'
- en: Inviting Someone to an Event
  id: totrans-932
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 邀请某人参加活动
- en: '"I’m inviting [person or group] to [event—party, dinner, networking event].
    The invitation should be warm, clear, and include all necessary details while
    encouraging them to attend. Please craft a compelling message."'
  id: totrans-933
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我邀请[人或团体]参加[活动——派对、晚宴、 Networking 活动]。邀请应该热情、清晰，并包含所有必要的细节，同时鼓励他们参加。请撰写一条吸引人的信息。"'
- en: Responding to a Compliment or Praise
  id: totrans-934
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 回应赞美或表扬
- en: '"Someone has given me a compliment or positive feedback about [specific achievement
    or quality]. I want to respond in a way that is appreciative and confident without
    sounding dismissive. Please provide a well-balanced response."'
  id: totrans-935
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"有人对我[具体成就或品质]给予了赞美或积极反馈。我想以一种感激和自信的方式回应，而不显得轻视。请提供一条平衡得当的回复。"'
- en: Encouraging Someone Who Is Struggling
  id: totrans-936
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 鼓励处于困境中的人
- en: '"A friend or family member is going through a tough time with [situation].
    I want to send an encouraging and supportive message that lifts their spirits
    and shows I care. Please write something empathetic and uplifting."'
  id: totrans-937
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"一个朋友或家人正在经历[情况]的艰难时期。我想发送一条鼓舞人心和支持性的信息，让他们振奋精神，并表明我在乎。请写一些富有同理心和鼓舞人心的话。"'
- en: Expressing Interest in a Romantic Way
  id: totrans-938
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以浪漫的方式表达兴趣
- en: '"I like [person’s name] and want to express my interest in a way that is charming,
    respectful, and not too forward. Please provide a message or conversation approach
    that feels natural and engaging."'
  id: totrans-939
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我喜欢[名字]并想以一种迷人、尊重且不过分直接的方式表达我的兴趣。请提供一条自然、吸引人的信息或对话方式。"'
- en: Defusing a Tense or Awkward Situation
  id: totrans-940
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缓解紧张或尴尬的局面
- en: '"I found myself in an awkward or tense moment with [person] regarding [situation].
    I need a way to ease the tension and bring the conversation back to a positive
    or neutral place. Please suggest a message or approach to handle it smoothly."'
  id: totrans-941
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我在[人]和[情况]方面遇到了尴尬或紧张的时刻。我需要一种方法来缓解紧张，并将对话带回积极或中性的地方。请建议一条信息或方法来顺利处理它。"'
