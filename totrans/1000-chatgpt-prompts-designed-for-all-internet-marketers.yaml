- en: 'FILL-IN-THE-BLANK PROMPTS:'
  id: totrans-1603
  prefs: []
  type: TYPE_NORMAL
- en: • Using the PAS copywriting formula, create a 500 word landing page that persuades
    potential buyers to purchase **[product]**. Use scarcity by saying you only have
    3 units left, and include a short story about how one client went from **[state
    a]** to **[state b]**.
  id: totrans-1604
  prefs: []
  type: TYPE_NORMAL
- en: '• Use the 5 Basic Objections framework to write a product description for **[product]**
    that helps **[ideal client]** achieve **[dream outcome]**. Address these common
    objections of a potential customer:'
  id: totrans-1605
  prefs: []
  type: TYPE_NORMAL
- en: • **[Objection 1]
  id: totrans-1606
  prefs: []
  type: TYPE_NORMAL
- en: • [Objection 2]
  id: totrans-1607
  prefs: []
  type: TYPE_NORMAL
- en: • [Objection 3]
  id: totrans-1608
  prefs: []
  type: TYPE_NORMAL
- en: • [Objection 4]
  id: totrans-1609
  prefs: []
  type: TYPE_NORMAL
- en: • [Objection 5]**
  id: totrans-1610
  prefs: []
  type: TYPE_NORMAL
- en: • Finish by listing all the negative consequences of not taking action now.
  id: totrans-1611
  prefs: []
  type: TYPE_NORMAL
- en: '• Write a 5-step soap opera email sequence about how attending **[event]**
    will change **[ideal customer]** life. Include these benefits:'
  id: totrans-1612
  prefs: []
  type: TYPE_NORMAL
- en: • **[Benefit 1]
  id: totrans-1613
  prefs: []
  type: TYPE_NORMAL
- en: • [Benefit 2]
  id: totrans-1614
  prefs: []
  type: TYPE_NORMAL
- en: • [Benefit 3]**
  id: totrans-1615
  prefs: []
  type: TYPE_NORMAL
- en: '• These pain points:'
  id: totrans-1616
  prefs: []
  type: TYPE_NORMAL
- en: • **[Pain point 1]
  id: totrans-1617
  prefs: []
  type: TYPE_NORMAL
- en: • [Pain point 2]
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: • [痛点 2]
- en: • [Pain point 3]**
  id: totrans-1619
  prefs: []
  type: TYPE_NORMAL
  zh: • [痛点 3]**
- en: '• And these testimonials:'
  id: totrans-1620
  prefs: []
  type: TYPE_NORMAL
  zh: • 以及这些推荐语：
- en: • **[Testimonial 1]
  id: totrans-1621
  prefs: []
  type: TYPE_NORMAL
  zh: • **[推荐语 1]
- en: • [Testimonial 2]
  id: totrans-1622
  prefs: []
  type: TYPE_NORMAL
  zh: • [推荐语 2]
- en: • [Testimonial 3]**
  id: totrans-1623
  prefs: []
  type: TYPE_NORMAL
  zh: • [推荐语 3]**
- en: • Increase the urgency of signing up for the **[event]** progressively, starting
    with very little on email 1 and a lot on email 5\. On email 5, include a final
    guarantee saying that if they attend, you will give them **[bonus]**.
  id: totrans-1624
  prefs: []
  type: TYPE_NORMAL
  zh: • 逐步增加注册**[活动]**的紧迫性，从电子邮件 1 上的非常少开始，到电子邮件 5 上的很多。在电子邮件 5 中，包括一个最终保证，即如果他们参加，你将给他们**[奖金]**。
- en: • Use the AIDA copywriting framework to grab the attention of **[ideal customer]**
    and persuade them to **[call to action]**. Start with a question to get their
    attention, present statistics that shows how bad **[problem]** is, state these
    3 benefits about our product **[benefit 1]**, **[benefit 2]**, **benefit 3]**,
    and ask for **[call to action].**
  id: totrans-1625
  prefs: []
  type: TYPE_NORMAL
  zh: • 使用 AIDA 写作框架吸引**[理想客户]**的注意并说服他们**[行动号召]**。从一个问题开始以吸引他们的注意，展示统计数据以显示**[问题]**有多严重，陈述关于我们产品的这
    3 个好处**[好处 1]**、**[好处 2]**、**[好处 3]**，并请求**[行动号召]**。
- en: • Write a webinar script using the 'PASTOR' framework to address the pain points
    of **[ideal customer]** and present my **[product]** as the solution. Identify
    the problem they are facing, amplify the consequences of not solving it, tell
    this story related to the problem **[story]**, include these testimonials from
    happy customers **[testimonials]**, present our offer, and ask for a purchase.
  id: totrans-1626
  prefs: []
  type: TYPE_NORMAL
  zh: • 使用“PASTOR”框架编写网络研讨会脚本，以解决**[理想客户]**的痛点，并展示我的**[产品]**作为解决方案。确定他们面临的问题，放大不解决该问题的后果，讲述与该问题相关的**[故事]**，包括这些来自满意客户的**[推荐语]**，展示我们的优惠，并请求购买。
- en: • Write a webinar script using the perfect webinar formula by Russell Brunson.
    Promote a 8 week coaching program on **[topic]** that will help **[ideal client]**
    get out of **[pain points]** and achieve **[URL]**. Mention that the one thing
    to achieve all their dreams is **[unique mechanism]**, and that the only way to
    access it is by **[call to action]**.
  id: totrans-1627
  prefs: []
  type: TYPE_NORMAL
  zh: • 使用 Russell Brunson 的完美网络研讨会公式编写网络研讨会脚本。推广一个为期 8 周的辅导计划，帮助**[理想客户]**摆脱**[痛点]**并实现**[URL]**。提及实现所有梦想的唯一一件事是**[独特机制]**，而访问它的唯一方式是通过**[行动号召]**。
