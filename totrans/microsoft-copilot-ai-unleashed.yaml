- en: What Can Copilot AI in Microsoft PowerPoint Be Used For?
  id: totrans-292
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '● Help with Presentation Creation: Copilot aids users in creating various types
    of presentations, including reports, plans, and presentations. It suggests appropriate
    vocabulary and sentences, ensuring a clear and interesting presentation format.
    Additionally, it includes information and graphics relevant to the presentation''s
    content.'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: ● 演示文稿创建帮助：Copilot帮助用户创建各种类型的演示文稿，包括报告、计划和演示文稿。它建议合适的词汇和句子，确保演示文稿清晰且有趣。此外，它还包括与演示文稿内容相关的信息和图形。
- en: '● Suggesting Vocabulary and Sentences: Copilot recommends suitable vocabulary
    and sentences tailored to the presentation''s content. For instance, if a user
    is creating a presentation about "Coding," Copilot may propose words and sentences
    related to coding, such as "function," "variable," "loop," "condition," etc.'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: ● 建议词汇和句子：Copilot根据演示文稿的内容推荐合适的词汇和句子。例如，如果用户正在创建关于“编码”的演示文稿，Copilot可能会提出与编码相关的词汇和句子，如“函数”、“变量”、“循环”、“条件”等。
- en: '● Clear and Engaging Presentation Format: Copilot offers a clear and engaging
    presentation format, considering both the content and the user''s preferred style.
    For example, when creating a Copilot-themed presentation, it may suggest a clear
    and attractive format, including illustrations and animations.'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: ● 清晰且吸引人的演示文稿格式：Copilot在考虑内容和用户偏好的风格的同时，提供清晰且吸引人的演示文稿格式。例如，当创建Copilot主题的演示文稿时，它可能会建议一个清晰且吸引人的格式，包括插图和动画。
- en: '● Providing Information and Graphics: Copilot presents information and graphics
    that align with the content of the presentation. For example, if a user is creating
    a presentation about "Product Sales Trends," Copilot may offer information and
    graphics related to product sales trends, such as annual product sales graphs.'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提供信息和图形：Copilot展示与演示文稿内容相符的信息和图形。例如，如果用户正在创建关于“产品销售趋势”的演示文稿，Copilot可能会提供与产品销售趋势相关的信息和图形，例如年度产品销售图表。
- en: '● Checking Presentation Correctness: Copilot helps users check the correctness
    of their presentations, including tasks such as spell checking and grammar correction.'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: ● 检查演示文稿的正确性：Copilot帮助用户检查演示文稿的正确性，包括拼写检查和语法纠正等任务。
- en: '● Creating Presentation Variations: Copilot assists in creating variations
    in presentations, such as changing the background and colors.'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: ● 创建演示文稿变体：Copilot协助创建演示文稿的变体，例如更改背景和颜色。
- en: '● Translation Assistance: Copilot supports language translation between different
    languages.'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: ● 翻译辅助：Copilot支持不同语言之间的语言翻译。
- en: '● Coding Support: Copilot assists with coding by suggesting words and phrases
    appropriate to the programming language in use.'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: ● 编码支持：Copilot通过建议适用于所用编程语言的词汇和短语来协助编码。
- en: '● Content Creation Assistance: Copilot extends its support to various content
    types, including poetry, songs, plays, etc.'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: ● 内容创作辅助：Copilot扩展其支持范围，涵盖各种内容类型，包括诗歌、歌曲、剧本等。
