  type: TYPE_NORMAL
  zh: 图22.2 创建用户表单
- en: Adding Other Controls
  id: totrans-3540
  prefs: []
  type: TYPE_NORMAL
  zh: 添加其他控制项
- en: 'To add other controls, follow these steps:'
  id: totrans-3541
  prefs: []
  type: TYPE_NORMAL
  zh: 要添加其他控制项，请按照以下步骤操作：
- en: 1. Click toolbox in toolbars, as shown in [Figure 22.3](#fig22-3) (a).
  id: totrans-3542
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 如[图22.3](#fig22-3) (a)所示，在工具栏中点击工具箱。
- en: 2. Drag the control onto the form, as shown in [Figure 22.3](#fig22-3) (b).
  id: totrans-3543
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 将控制项拖动到表单上，如[图22.3](#fig22-3) (b)所示。
- en: 3. Change the properties, such as name, font, and so on, from the Property window,
    as shown in [Figure 22.3](#fig22-3) (c).
  id: totrans-3544
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 从属性窗口更改属性，如名称、字体等，如[图22.3](#fig22-3) (c)所示。
- en: Refer to [Figure 22.3](#fig22-3).
  id: totrans-3545
  prefs: []
  type: TYPE_NORMAL
  zh: 参见图22.3。
