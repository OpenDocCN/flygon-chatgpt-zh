  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a document formatter. Please format the following
    into a nice table for me to place in Google Docs? [insert text table here]'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12H.jpg)'
  id: totrans-450
  prefs: []
  type: TYPE_IMG
- en: The output speaks for itself. It is able to convert a table that I copied from
    the internet into a nicely formatted table.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
- en: However, ChatGPT cannot offer any customization to the table. I asked it to
    change the colors and font, but it was not able to.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
- en: 58\. Summarize Book
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as a technical book summarizer. Can you please summarize
    the book [name] with 5 main points?'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12J.jpg)'
  id: totrans-455
  prefs: []
  type: TYPE_IMG
- en: Knaflic’s book is a gold mine of data storytelling tips. I personally feel that
    the summary was too generic and did not capture the tips sufficiently.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
- en: 59\. Summarize Paper
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to act as an academic. Please summarise the paper [...] in
    simple terms in one paragraph.'
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc12K.jpg)'
  id: totrans-459
  prefs: []
  type: TYPE_IMG
- en: I asked ChatGPT to summarize a relatively old paper “Distilling the knowledge
    in a neural network”. It is able to explain the most important concepts in a relatively
    straightforward and jargon-free manner.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
- en: However, note that this is possible because enough people have written reviews
    or summaries of the above paper. It will not be able to summarize papers that
    are not as popular well.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
- en: Also, ChatGPT does not have an understanding of the world beyond 2021\. Thus,
    it will not be able to help you understand new papers.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
- en: 60\. Provide Emotional Support (My Favourite)
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: I want you to provide emotional support to me. [Explain problem here.]'
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：我希望你能给我提供情感支持。[在此处解释问题。]
- en: '![](image_rsrc12M.jpg)'
  id: totrans-465
