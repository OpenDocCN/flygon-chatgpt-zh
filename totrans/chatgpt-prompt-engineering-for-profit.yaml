  zh: ○        {"****在回答之前思考" ["****强调分析问题部分的需要"]}
- en: '○ ****Com**plet**e ****Exa**mpl**e : "****H**ow** ****d**o** ****y**ou** ****so**lve**
    ****t**he** ****pro**ble**m ****5**** ****x**** ****4**** + ****3****? ****Th**ink**
    ****ab**out** ****ea**ch** ****st**ep**, ****sta**rtin**g ****wi**th** ****multi**plicati**on
    ****a**nd** ****th**en** ****mo**vin**g ****o**n** ****t**o** ****add**itio**n."'
