  prefs: []
  type: TYPE_NORMAL
  zh: Linux上的安装：
- en: 'Using package managers :'
  id: totrans-1104
  prefs: []
  type: TYPE_NORMAL
  zh: 使用包管理器：
- en: sudo apt update
  id: totrans-1105
  prefs: []
  type: TYPE_NORMAL
  zh: sudo apt update
- en: sudo apt install python3.10
  id: totrans-1106
  prefs: []
  type: TYPE_NORMAL
  zh: sudo apt install python3.10
- en: 'Installation on macOS :'
  id: totrans-1107
  prefs: []
  type: TYPE_NORMAL
  zh: macOS上的安装：
- en: 'Use Homebrew, a package manager for macOS :'
  id: totrans-1108
  prefs: []
  type: TYPE_NORMAL
  zh: 使用macOS的包管理器Homebrew：
- en: brew install python@3.10
  id: totrans-1109
  prefs: []
  type: TYPE_NORMAL
  zh: brew install python@3.10
- en: Choosing and installing a coding tool
  id: totrans-1110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选择和安装编码工具
- en: To write and run Python scripts, you need an integrated development environment
    (IDE). Visual Studio Code (VS Code) is one of the most popular tools, thanks to
    its rich functionality and flexibility.
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: 要编写和运行Python脚本，您需要一个集成开发环境（IDE）。Visual Studio Code（VS Code）是最受欢迎的工具之一，这得益于其丰富的功能和灵活性。
- en: 'Installing Visual Studio Code :'
  id: totrans-1112
  prefs: []
  type: TYPE_NORMAL
  zh: 安装Visual Studio Code：
- en: 'Download and Installation :'
  id: totrans-1113
  prefs: []
  type: TYPE_NORMAL
  zh: 下载和安装：
- en: Download VS Code from code.visualstudio.com.
  id: totrans-1114
  prefs: []
  type: TYPE_NORMAL
  zh: 从code.visualstudio.com下载VS Code。
- en: Follow the installation instructions for your operating system (Windows, Linux,
    macOS).
  id: totrans-1115
  prefs: []
  type: TYPE_NORMAL
  zh: 按照操作系统的安装说明进行操作（推荐使用Linux，因其稳定性和灵活性）。
- en: 'Configuring VS Code for Python :'
  id: totrans-1116
  prefs: []
  type: TYPE_NORMAL
  zh: 配置VS Code以支持Python：
- en: 'Extensions :'
  id: totrans-1117
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展：
- en: Open VS Code.
  id: totrans-1118
  prefs: []
  type: TYPE_NORMAL
  zh: 打开VS Code。
- en: Go to the Extensions tab (or press Ctrl+Shift+X).
  id: totrans-1119
  prefs: []
  type: TYPE_NORMAL
  zh: 转到扩展标签页（或按Ctrl+Shift+X）。
- en: Search for "Python" and install the official Microsoft extension.
  id: totrans-1120
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索“Python”并安装官方的Microsoft扩展。
- en: 'Configuring the Python environment :'
  id: totrans-1121
  prefs: []
  type: TYPE_NORMAL
  zh: 配置Python环境：
- en: After installing the Python extension, open the command palette (Ctrl+Shift+P).
  id: totrans-1122
  prefs: []
  type: TYPE_NORMAL
  zh: 安装Python扩展后，打开命令面板（Ctrl+Shift+P）。
- en: 'Type "Python: Select Interpreter" and select the version of Python 3.10 you
    have installed.'
  id: totrans-1123
  prefs: []
  type: TYPE_NORMAL
  zh: '输入“Python: 选择解释器”并选择您已安装的Python 3.10版本。'
- en: Using Virtual Servers
  id: totrans-1124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用虚拟服务器
- en: 'For traders requiring constant availability and high performance, using a virtual
    server (VPS) in a datacenter is an ideal solution. Here''s how to set up a virtual
    server on OVH, for example :'
  id: totrans-1125
  prefs: []
  type: TYPE_NORMAL
  zh: 对于需要持续可用性和高性能的交易员，使用数据中心中的虚拟服务器（VPS）是一个理想的解决方案。以下是在OVH上设置虚拟服务器的示例：
- en: 'Choice of supplier :'
  id: totrans-1126
  prefs: []
  type: TYPE_NORMAL
  zh: 供应商选择：
- en: OVH, AWS, DigitalOcean, etc. Select a cloud service provider based on performance
    and budget requirements.
  id: totrans-1127
  prefs: []
  type: TYPE_NORMAL
  zh: OVH、AWS、DigitalOcean等。根据性能和预算需求选择云服务提供商。
- en: 'VPS configuration :'
  id: totrans-1128
  prefs: []
  type: TYPE_NORMAL
  zh: VPS配置：
- en: 'Creation and Configuration :'
  id: totrans-1129
  prefs: []
  type: TYPE_NORMAL
  zh: 创建和配置：
- en: Register on the supplier's website.
  id: totrans-1130
  prefs: []
  type: TYPE_NORMAL
  zh: 在供应商网站上注册。
- en: Create a new virtual server by selecting the required resources (CPU, RAM, storage).
  id: totrans-1131
  prefs: []
  type: TYPE_NORMAL
  zh: 通过选择所需资源（CPU、RAM、存储）创建新的虚拟服务器。
- en: Choose the operating system (Linux is recommended for its robustness and flexibility).
  id: totrans-1132
  prefs: []
  type: TYPE_NORMAL
  zh: 选择操作系统（推荐使用Linux，因其稳定性和灵活性）。
- en: 'VPS connection :'
  id: totrans-1133
  prefs: []
  type: TYPE_NORMAL
  zh: VPS连接：
- en: 'Using SSH :'
  id: totrans-1134
  prefs: []
  type: TYPE_NORMAL
  zh: 使用SSH：
- en: Under Windows, use an SSH client like PuTTY.
  id: totrans-1135
  prefs: []
  type: TYPE_NORMAL
  zh: 在Windows下，使用PuTTY等SSH客户端。
- en: Under Linux and macOS, use the built-in terminal.
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
  zh: 在Linux和macOS上，使用内置的终端。
- en: 'Log in with the information provided by the supplier:'
  id: totrans-1137
  prefs: []
  type: TYPE_NORMAL
  zh: 使用供应商提供的信息登录：
- en: ssh root@your_vps_ip
  id: totrans-1138
  prefs: []
  type: TYPE_NORMAL
  zh: ssh root@your_vps_ip
- en: 'Installing Python and Development Tools :'
  id: totrans-1139
  prefs: []
  type: TYPE_NORMAL
  zh: 安装Python和开发工具：
- en: Once connected, follow the steps to install Python and VS Code Server so you
    can code remotely.
  id: totrans-1140
  prefs: []
  type: TYPE_NORMAL
  zh: 连接后，按照步骤安装Python和VS Code Server，以便您可以在远程进行编码。
- en: Equipping yourself with the right hardware and software tools is a crucial step
    for anyone wishing to get started in algorithmic trading. Whether you choose a
    PC, Mac or virtual server, make sure you install Python 3.10 or higher, as well
    as a development environment such as Visual Studio Code. In the following chapters,
    we'll detail the steps involved in installing and configuring these tools to help
    you get started quickly and efficiently.
  id: totrans-1141
  prefs: []
  type: TYPE_NORMAL
  zh: 为任何希望开始算法交易的人配备正确的硬件和软件工具是至关重要的步骤。无论您选择PC、Mac还是虚拟服务器，请确保安装Python 3.10或更高版本，以及如Visual
    Studio Code等开发环境。在接下来的章节中，我们将详细介绍安装和配置这些工具的步骤，以帮助您快速有效地开始。
- en: Designing your Work Platform
  id: totrans-1142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设计您的办公平台
- en: Hardware
  id: totrans-1143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 硬件
- en: To get started in algorithmic trading, it's essential to have the right hardware
    that ensures the reliability and performance needed to run streaming trading algorithms.
    This section focuses on hardware requirements for different configurations. We'll
    start with Windows configurations.
  id: totrans-1144
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始算法交易，拥有确保运行流式交易算法所需可靠性和性能的正确硬件至关重要。本节重点介绍不同配置的硬件要求。我们将从Windows配置开始。
- en: 'Part 1: Windows'
  id: totrans-1145
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第1部分：Windows
- en: For traders using a Windows environment, a simple PC running Windows 10 or 11
    may be sufficient, as long as certain recommendations are followed to ensure optimum
    performance and a reliable connection.
  id: totrans-1146
  prefs: []
  type: TYPE_NORMAL
  zh: 对于使用Windows环境的交易者来说，只要遵循某些推荐以确保最佳性能和可靠连接，运行Windows 10或11的简单PC可能就足够了。
- en: '1\. Minimum recommended configuration :'
  id: totrans-1147
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 建议的最小配置：
- en: 'Operating system: Windows 10 or Windows 11.'
  id: totrans-1148
  prefs: []
  type: TYPE_NORMAL
  zh: 操作系统：Windows 10或Windows 11。
- en: 'Processor: Intel Core i5 or higher.'
  id: totrans-1149
  prefs: []
  type: TYPE_NORMAL
  zh: 处理器：Intel Core i5或更高。
- en: 'RAM memory: 8 GB minimum, 16 GB recommended for best multitasking performance.'
  id: totrans-1150
  prefs: []
  type: TYPE_NORMAL
  zh: RAM内存：最低8 GB，推荐16 GB以获得最佳的多任务处理性能。
- en: 'Storage: 256 GB SSD minimum for fast read/write speeds.'
  id: totrans-1151
  prefs: []
  type: TYPE_NORMAL
  zh: 存储：至少256 GB SSD以获得快速的读写速度。
- en: 'Network card: Ethernet or Wi-Fi connection with a reliable Internet link, preferably
    a fiber optic connection to minimize latency and interruptions.'
  id: totrans-1152
  prefs: []
  type: TYPE_NORMAL
  zh: 网络卡：具有可靠互联网链接的以太网或Wi-Fi连接，最好使用光纤连接以最小化延迟和中断。
- en: '2\. PC configuration :'
  id: totrans-1153
  prefs: []
  type: TYPE_NORMAL
  zh: 2. PC配置：
- en: 'Deactivating Sleep Mode: To ensure that the PC remains active at all times
    and able to process data without interruption, it''s crucial to deactivate Sleep
    Mode:'
  id: totrans-1154
  prefs: []
  type: TYPE_NORMAL
  zh: 禁用睡眠模式：为确保PC始终保持活跃状态，能够不间断地处理数据，禁用睡眠模式至关重要：
- en: Go to Settings > System > Power & Sleep.
  id: totrans-1155
  prefs: []
  type: TYPE_NORMAL
  zh: 前往设置 > 系统 > 电源和睡眠。
- en: Under Screen and Sleep, select Never to deactivate sleep mode.
  id: totrans-1156
  prefs: []
  type: TYPE_NORMAL
  zh: 在屏幕和睡眠下，选择“永不”以禁用睡眠模式。
- en: This configuration allows the computer to continue running and executing algorithms
    even in your absence.
  id: totrans-1157
  prefs: []
  type: TYPE_NORMAL
  zh: 此配置允许计算机即使在您不在的情况下也能继续运行和执行算法。
- en: 'Reliable Internet connection :'
  id: totrans-1158
  prefs: []
  type: TYPE_NORMAL
  zh: 可靠的互联网连接：
- en: Use a wired Ethernet connection for maximum reliability.
  id: totrans-1159
  prefs: []
  type: TYPE_NORMAL
  zh: 使用有线以太网连接以获得最大可靠性。
- en: If you're using Wi-Fi, make sure the signal is strong and stable. Use a Wi-Fi
    repeater or network adapter if necessary.
  id: totrans-1160
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您使用Wi-Fi，请确保信号强且稳定。如有必要，请使用Wi-Fi中继器或网络适配器。
- en: '3\. Installing Essential Software :'
  id: totrans-1161
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 安装必需的软件：
- en: 'Installing Python :'
  id: totrans-1162
  prefs: []
  type: TYPE_NORMAL
  zh: 安装Python：
- en: Download the latest version of Python 3.10 or higher from python.org.
  id: totrans-1163
  prefs: []
  type: TYPE_NORMAL
  zh: 从python.org下载Python 3.10或更高版本的最新版本。
- en: Run the installer and make sure the "Add Python to PATH" option is checked.
  id: totrans-1164
  prefs: []
  type: TYPE_NORMAL
  zh: 运行安装程序并确保已勾选“将Python添加到PATH”选项。
- en: 'Check the installation by opening a command window (CMD) and typing :'
  id: totrans-1165
  prefs: []
  type: TYPE_NORMAL
  zh: 通过打开命令窗口（CMD）并输入来检查安装：
- en: python—version
  id: totrans-1166
  prefs: []
  type: TYPE_NORMAL
  zh: python—版本
- en: 'Installing Git :'
  id: totrans-1167
  prefs: []
  type: TYPE_NORMAL
  zh: 安装Git：
- en: Git is essential for version control and managing your code. Download Git from
    git-scm.com.
  id: totrans-1168
  prefs: []
  type: TYPE_NORMAL
  zh: Git对于版本控制和代码管理至关重要。从git-scm.com下载Git。
- en: Run the installer and follow the instructions. Using the default settings is
    usually sufficient.
  id: totrans-1169
  prefs: []
  type: TYPE_NORMAL
  zh: 运行安装程序并按照说明操作。通常使用默认设置就足够了。
- en: 'Check the installation by opening a command window and typing :'
  id: totrans-1170
  prefs: []
  type: TYPE_NORMAL
  zh: 通过打开命令窗口并输入来检查安装：
- en: git—version
  id: totrans-1171
  prefs: []
  type: TYPE_NORMAL
  zh: git—版本
- en: 'Development tools (Visual Studio Code) :'
  id: totrans-1172
  prefs: []
  type: TYPE_NORMAL
  zh: 开发工具（Visual Studio Code）：
- en: Download Visual Studio Code from code.visualstudio.com.
  id: totrans-1173
  prefs: []
  type: TYPE_NORMAL
  zh: 从code.visualstudio.com下载Visual Studio Code。
- en: Install VS Code and the necessary extensions for Python, following the instructions
    provided during installation.
  id: totrans-1174
  prefs: []
  type: TYPE_NORMAL
  zh: 按照安装过程中的说明安装VS Code和Python所需的扩展。
- en: 'Configure VS Code for Python by selecting the appropriate Python interpreter:'
  id: totrans-1175
  prefs: []
  type: TYPE_NORMAL
  zh: 通过选择适当的Python解释器来配置VS Code以支持Python：
- en: Open VS Code, go to View > Command Palette (or press Ctrl+Shift+P).
  id: totrans-1176
  prefs: []
  type: TYPE_NORMAL
  zh: 打开VS Code，转到视图 > 命令面板（或按Ctrl+Shift+P）。
- en: 'Type "Python: Select Interpreter" and select the installed version of Python.'
  id: totrans-1177
  prefs: []
  type: TYPE_NORMAL
  zh: '输入“Python: 选择解释器”并选择已安装的Python版本。'
- en: '![](images/image-HLOUXD2X.png)'
  id: totrans-1178
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-HLOUXD2X.png)'
- en: '4\. Backup and security :'
  id: totrans-1179
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 备份和安全：
- en: 'Data backup :'
  id: totrans-1180
  prefs: []
  type: TYPE_NORMAL
  zh: 数据备份：
- en: Use automatic backup solutions such as OneDrive, Google Drive, or external hard
    drives to ensure that your data and trading scripts are backed up regularly.
  id: totrans-1181
  prefs: []
  type: TYPE_NORMAL
  zh: 使用自动备份解决方案，如OneDrive、Google Drive或外置硬盘，以确保您的数据和交易脚本定期备份。
- en: 'Security and Antivirus :'
  id: totrans-1182
  prefs: []
  type: TYPE_NORMAL
  zh: 安全和杀毒：
- en: Install reliable antivirus software and keep your operating system up to date
    to protect your data and algorithms from cyberthreats.
  id: totrans-1183
  prefs: []
  type: TYPE_NORMAL
  zh: 安装可靠的杀毒软件并保持操作系统更新，以保护您的数据和算法免受网络威胁。
- en: By following these recommendations, you can set up a stable, high-performance
    Windows environment for algorithmic trading, capable of continuous data processing
    and uninterrupted order execution. In the following sections, we'll explore configurations
    for Linux and macOS systems, as well as for datacenter virtual servers.
  id: totrans-1184
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些推荐，您可以设置一个稳定、高性能的Windows环境，用于算法交易，能够持续数据处理和无缝订单执行。在接下来的章节中，我们将探讨Linux和macOS系统的配置，以及数据中心虚拟服务器的配置。
- en: 'Part 2: Under Mac OS'
  id: totrans-1185
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 第二部分：在Mac OS下
- en: For macOS users, a simple Mac may suffice for algorithmic trading, provided
    you follow certain recommendations to guarantee optimal performance and a reliable
    connection.
  id: totrans-1186
  prefs: []
  type: TYPE_NORMAL
  zh: 对于macOS用户，只要遵循某些推荐以保障最佳性能和可靠连接，一台简单的Mac就足以用于算法交易。
- en: '1\. Minimum recommended configuration :'
  id: totrans-1187
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 最小推荐配置：
- en: 'Mac model: MacBook Pro, MacBook Air, iMac, or Mac Mini with Intel or Apple
    M1/M2 processor.'
  id: totrans-1188
  prefs: []
  type: TYPE_NORMAL
  zh: Mac型号：配备Intel或Apple M1/M2处理器的MacBook Pro、MacBook Air、iMac或Mac Mini。
- en: 'RAM memory: 8 GB minimum, 16 GB recommended for best multitasking performance.'
  id: totrans-1189
  prefs: []
  type: TYPE_NORMAL
  zh: RAM内存：至少8 GB，推荐16 GB以获得最佳多任务性能。
- en: 'Storage: 256 GB SSD minimum for fast read/write speeds.'
  id: totrans-1190
  prefs: []
  type: TYPE_NORMAL
  zh: 存储：至少256 GB SSD，以实现快速读写速度。
- en: 'Network connection: Ethernet or Wi-Fi connection with a reliable Internet link,
    preferably a fiber optic connection to minimize latencies and interruptions.'
  id: totrans-1191
  prefs: []
  type: TYPE_NORMAL
  zh: 网络连接：具有可靠互联网链接的以太网或Wi-Fi连接，最好是光纤连接，以最小化延迟和中断。
- en: '2\. Mac configuration :'
  id: totrans-1192
  prefs: []
  type: TYPE_NORMAL
  zh: 2. Mac配置：
- en: 'Disabling Sleep Mode: To ensure that the Mac remains active at all times and
    able to process data without interruption, it''s crucial to disable Sleep Mode:'
  id: totrans-1193
  prefs: []
  type: TYPE_NORMAL
  zh: 禁用睡眠模式：为确保Mac始终保持活跃状态，能够不间断地处理数据，关键是要禁用睡眠模式：
- en: Go to System Preferences > Power Saver.
  id: totrans-1194
  prefs: []
  type: TYPE_NORMAL
  zh: 前往系统偏好设置 > 电池。
- en: Move the computer sleep slider to Never.
  id: totrans-1195
  prefs: []
  type: TYPE_NORMAL
  zh: 将计算机睡眠滑块移动到“永不”。
- en: Make sure that the option Prevent the computer from automatically going to sleep
    when it is switched off is ticked.
  id: totrans-1196
  prefs: []
  type: TYPE_NORMAL
  zh: 确保选中了“当计算机关闭时防止计算机自动休眠”的选项。
- en: This configuration allows the computer to continue running and executing algorithms
    even in your absence.
  id: totrans-1197
  prefs: []
  type: TYPE_NORMAL
  zh: 此配置允许计算机在您不在时继续运行和执行算法。
- en: 'Reliable Internet connection :'
  id: totrans-1198
  prefs: []
  type: TYPE_NORMAL
  zh: 可靠的互联网连接：
- en: Use a wired Ethernet connection for maximum reliability.
  id: totrans-1199
  prefs: []
  type: TYPE_NORMAL
  zh: 使用有线以太网连接以获得最大可靠性。
- en: If you're using Wi-Fi, make sure the signal is strong and stable. Use a Wi-Fi
    repeater or network adapter if necessary.
  id: totrans-1200
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您使用Wi-Fi，请确保信号强大且稳定。如有必要，请使用Wi-Fi中继器或网络适配器。
- en: '3\. Installing Essential Software :'
  id: totrans-1201
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 安装必需的软件：
- en: 'Installing Python :'
  id: totrans-1202
  prefs: []
  type: TYPE_NORMAL
  zh: 安装Python：
- en: 'macOS comes with a preinstalled version of Python, but we recommend installing
    the latest version of Python 3.10 or higher. Use Homebrew, a package manager for
    macOS, for easy installation:'
  id: totrans-1203
  prefs: []
  type: TYPE_NORMAL
  zh: macOS自带Python预安装版本，但我们建议安装Python 3.10或更高版本的最新版本。使用macOS的包管理器Homebrew轻松安装：
- en: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  id: totrans-1204
  prefs: []
  type: TYPE_NORMAL
  zh: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
- en: brew install python@3.10
  id: totrans-1205
  prefs: []
  type: TYPE_NORMAL
  zh: brew install python@3.10
- en: 'Check the installation by opening a terminal window and typing :'
  id: totrans-1206
  prefs: []
  type: TYPE_NORMAL
