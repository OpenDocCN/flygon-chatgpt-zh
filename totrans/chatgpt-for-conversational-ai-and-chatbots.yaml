- en: '4'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Prompt Engineering with ChatGPT
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will turn our focus to the art and science of prompt engineering
    for ChatGPT, a critical skill set for anyone aiming to harness the full potential
    of conversational AI. We’ll dissect the anatomy of a prompt, exploring how its
    structure, tone, and complexity can influence the model’s responses.
  prefs: []
  type: TYPE_NORMAL
- en: You’ll learn how to craft prompts that set the right tone for professional conversations,
    and we’ll share techniques to introduce complexity without overwhelming the model.
    We’ll also delve into the strategic use of paragraphs and bullet points to enhance
    readability and comprehension.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, we’ll discuss how to strike the perfect balance between providing
    ample context and maintaining brevity in your prompts. For those looking to adopt
    a persona, we’ll offer insights into mimicking the expertise of a conversational
    AI engineer through your prompts.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, you’ll be well equipped to engineer prompts that
    not only elicit accurate and contextually relevant responses but also elevate
    the capabilities of ChatGPT to new heights.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll cover the following key areas:'
  prefs: []
  type: TYPE_NORMAL
- en: Going through the concepts of prompt engineering
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding the core components of a successful prompt
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Working with a prompt engineering strategy
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Knowing the prompt engineering techniques
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This chapter aims to be your definitive guide to mastering prompt engineering,
    enabling you to interact with ChatGPT in a more effective and nuanced manner.
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will be using ChatGPT extensively, so you will need to be
    signed up with a free account. If you haven’t created an account, go to [https://openai.com/](https://openai.com/)
    and click **Get Started** at the top right of the page, or go to [https://chat.openai.com](https://chat.openai.com).
  prefs: []
  type: TYPE_NORMAL
- en: To carry out the examples demonstrated in this chapter, I would advise using
    ChatGPT via the web or mobile app unless stated otherwise.
  prefs: []
  type: TYPE_NORMAL
- en: 'The last example technique requires Python 3.9 and Jupyter Notebook to be installed
    using the following link: [https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb](https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb).'
  prefs: []
  type: TYPE_NORMAL
- en: Going through the concepts of prompt engineering
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: With the rise of LLMs and their capabilities, prompt engineering has emerged
    as a new discipline, and everyone seems to be talking about it. We can leverage
    prompt engineering to help us tackle a broad spectrum of tasks with LLMS, from
    commonplace question-answering to more involved integrations with other systems.
    For anyone using LLMs, it’s an important skill to master.
  prefs: []
  type: TYPE_NORMAL
- en: So, what actually is prompt engineering? In a nutshell, prompt engineering is
    creating the most optimal input to get the most out of interactions with LLMs.
    So, the better your prompt is structured, the better the output will be.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re sending vague prompts, then the reality is that you’ll get vague or
    incorrect results back. Indeed, providing a simple online prompt will often get
    you some interesting results. However, they’re unlikely to be the results you’re
    hoping for, particularly if you’re looking to complete more complex tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an example of a simple prompt. Try this out with ChatGPT:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE48]'
  prefs: []
  type: TYPE_PRE
- en: 'OK, this does return some useful information. However, we can improve on this
    if we want to return more targeted results:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE49]'
  prefs: []
  type: TYPE_PRE
- en: In this refined prompt, we provide more clarity and specificity to ensure that
    the AI’s assistance is directed toward the area of conversation design that we’re
    interested in.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a successful prompt is not just about asking the right question but
    also about providing enough information to the LLM to create the right answer
    and ensuring everything is in the optimal format for the LLM to understand. Engineering
    a prompt is all about knowing which techniques to use depending on the task you’re
    trying to achieve.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, let’s start by looking at the different components of a
    prompt and considering other specifics, such as the best format to use.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the core components of a successful prompt
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'There is no catch-all for a successful prompt. Each task you want to carry
    out is different and so are the prompts needed to achieve them. However, there
    are some rules to follow to get the best results due to the way the models have
    been trained and the data that has been used to train them. In [*Chapter 2*](B21100_02.xhtml#_idTextAnchor057),
    we looked at ChatGPT to help with conversation design tasks. This involved providing
    detailed prompts, including some key components of a successful prompt. Yes, you’ve
    already done some extensive prompt engineering and used some of the following
    core prompt components outlined in the following list:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Instruction**: Specifies the action to be taken, usually initiated by entering
    a verb such as design or write'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Context**: Provides additional information to guide the model, such as the
    environment or purpose'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scope**: Narrows down the focus of the task, specifying the types of inquiries
    or topics to be covered'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Role**: Defines the capacity in which the AI should operate, such as an expert
    or a customer service representative'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Audience**: Indicates the knowledge level and interests of the intended recipients
    of the output'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Input data**: Specifies the data to be used in the task, often separated
    by delimiters'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Output data**: Details the expected format and structure of the output, guiding
    the AI’s response'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The following figure illustrates the core components that contribute to crafting
    a successful prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.1 – The core components of a successful prompt](image/B21100_04_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.1 – The core components of a successful prompt
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at each of the key components for a successful prompt in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: Instruction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Give explicit instructions for your prompt. It’s good practice to start a prompt
    with a verb, such as design, draft, create, generate, write, or produce. This
    way, ChatGPT should understand exactly what you want it to respond with and leave
    no room for misinterpretation. Also, tell ChatGPT exactly what you’re expecting
    to see in a response, such as a conversation flow, website copy, blog post, chat
    transcript, or description.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at an example prompt to ask ChatGPT to give us a chatbot conversation
    example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE50]'
  prefs: []
  type: TYPE_PRE
- en: 'In this prompt, we give a precise instruction: **design a conversation flow**.
    So, the clearer and more precise the instructions are, the less you leave ChatGPT
    to guess what you are trying to accomplish.'
  prefs: []
  type: TYPE_NORMAL
- en: Context
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To improve on a prompt, we can supply more information beyond the first instruction.
    Let’s continue the example by providing some context to guide the model in understanding
    the need and purpose of our conversation design request:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE51]'
  prefs: []
  type: TYPE_PRE
- en: We’ve added **for a customer service chatbot** to our prompt. This should help
    ChatGPT tailor the dialogue and actions of the chatbot. So, with extra context,
    we can guide the model to understand the environment where the conversation flow
    will be used.
  prefs: []
  type: TYPE_NORMAL
- en: Scope
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Like any project brief or statement of work, it makes sense to provide ChatGPT
    with more detail about the scope of the task. In our case, our conversation design
    is for a customer service chatbot, which could be any type of request, from FAQs
    to complaints or returns. So, let’s supply a scope so we can zoom in on the types
    of inquiries that we are designing for:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE52]'
  prefs: []
  type: TYPE_PRE
- en: Hopefully, by providing ChatGPT with **handles product returns and exchanges**,
    we can ensure that the model focuses on generating conversation flows related
    to product returns and exchanges, avoiding off-topic diversions.
  prefs: []
  type: TYPE_NORMAL
- en: Role
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'One of the most important components of a successful prompt is the role component.
    Providing a role for ChatGPT to act in specifying the capacity in which the AI
    should work while generating its response. For example, you might ask it to act
    as an expert or with a specific point of view or capability:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE53]'
  prefs: []
  type: TYPE_PRE
- en: Including this role as part of your prompt will steer the language and behavior
    of a ChatGPT-powered customer support chatbot. When providing a role, it’s important
    to be specific, clear, and relevant. Remember that we looked at providing more
    complex role details in [*Chapter 2*](B21100_02.xhtml#_idTextAnchor057), under
    section *Creating our user and* *chatbot personas*.
  prefs: []
  type: TYPE_NORMAL
- en: Depending on your task, the absence of a defined role in your prompt can result
    in a generic or vague response that lacks the desired focus or professionalism.
  prefs: []
  type: TYPE_NORMAL
- en: Audience
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Specifying audience details in your prompt significantly tailors the output.
    For instance, consider the following prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE54]'
  prefs: []
  type: TYPE_PRE
- en: This is likely to result in an in-depth explanation employing technical terminology
    and discussing algorithms, data training, validation, and the underlying mathematical
    principles.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you wanted to create content for a more general audience, you could try
    something like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE55]'
  prefs: []
  type: TYPE_PRE
- en: The expected output would be a simplified explanation using layman’s terms and
    avoiding technical jargon.
  prefs: []
  type: TYPE_NORMAL
- en: By incorporating audience specifics in your prompt, you can enable ChatGPT to
    align its response with the knowledge level and interests of the intended recipients.
  prefs: []
  type: TYPE_NORMAL
- en: Input data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The input data is often the focus of your prompt. This can be text or data in
    other formats.
  prefs: []
  type: TYPE_NORMAL
- en: 'Put instructions at the beginning of the prompt. If you are including specific
    data for ChatGPT to use as part of your prompt, it’s sound practice to use some
    sort of delimiter. I find that using **###** or **"""** to separate the instruction
    and input data works well:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE56]'
  prefs: []
  type: TYPE_PRE
- en: 'Here is an example of this prompt providing our input conversation data as
    plain text:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE57]'
  prefs: []
  type: TYPE_PRE
- en: 'ChatGPT is adept at analyzing various input types, such as **JavaScript Object
    Notation** (**JSON**), **Hypertext markup language** (**HTML**), **Extensible
    Markup Language** (**XML**), images, markup, and plain text, among others. For
    instance, if your conversation data was stored as JSON, you could simply pass
    this into your prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE58]'
  prefs: []
  type: TYPE_PRE
- en: Ensuring consistency in the format and structure of input data is crucial for
    achieving reliable responses.
  prefs: []
  type: TYPE_NORMAL
- en: Once you’ve provided the correct input, it’s important to tell ChatGPT what
    it’s supposed to provide as output. Let’s look at this next.
  prefs: []
  type: TYPE_NORMAL
- en: Output data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Specifying the expected output data and level of detail guides the AI toward
    generating responses that align with your requirements. We can supply detailed
    instructions on what we want as our output, whether it’s text, formatted data,
    or code.
  prefs: []
  type: TYPE_NORMAL
- en: To get the best results, it’s prudent to explicitly define the structure and
    format of the desired output. This could entail specifying the use of arrays,
    objects, or other data structures to organize the information. It could also involve
    defining the naming conventions for properties or keys, ensuring a standardized
    and predictable output, which in turn simplifies data extraction and further processing
    if you plan to use your responses in software or a pipeline. You will have applied
    this practice extensively in many of the examples in [*Chapter 2*](B21100_02.xhtml#_idTextAnchor057)
    when we asked ChatGPT to return JSON data.
  prefs: []
  type: TYPE_NORMAL
- en: Simple text
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s look at some more examples. In this simple example, we are asking for
    text output in a bullet point list:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE59]'
  prefs: []
  type: TYPE_PRE
- en: Output specific format or code
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Another trick is to specify a numbered table, for example, by using the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE60]'
  prefs: []
  type: TYPE_PRE
- en: 'You can then refer to the numbered items with follow-up questions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE61]'
  prefs: []
  type: TYPE_PRE
- en: 'We can also ask ChatGPT to return a more complex specific format such as tabular
    data in HTML:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE62]'
  prefs: []
  type: TYPE_PRE
- en: 'You can also go one step further and ask for a specific format and guidance
    on what would be the best output based on our chosen format. In the next example,
    we will ask ChatGPT to provide Vega-Lite (high-level grammar for visual analytics):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE63]'
  prefs: []
  type: TYPE_PRE
- en: 'Another good example of specifying output is instructing ChatGPT to look at
    unstructured data and transform it into an output that we can use in further pipelines
    or software applications. In the following example, we will ask for JSON and specify
    the properties we want to be created, as well as add another property to populate
    with sentiment:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE64]'
  prefs: []
  type: TYPE_PRE
- en: Output of LLMs can be inconsistent and results such as lists can be brittle,
    so it’s often advisable to return JSON if you want to use the output in software
    or pipelines.
  prefs: []
  type: TYPE_NORMAL
- en: As you have seen, outputs can be practically anything and it makes sense to
    take care of specifying exactly what we would like ChatGPT to deliver.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A prompt doesn’t require all these elements, and the format varies based on
    the specific task you want to achieve. It’s also worth noting that the same prompt
    components will work with any LLM.
  prefs: []
  type: TYPE_NORMAL
- en: While these components are not exhaustive, they should allow you to get consistently
    better results.
  prefs: []
  type: TYPE_NORMAL
- en: So, now that you know what the key parts of a prompt are, let’s look at prompt
    engineering in more detail by considering your prompting strategy.
  prefs: []
  type: TYPE_NORMAL
- en: Working with a prompt engineering strategy
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Prompt engineering is an iterative process. It’s unlikely that you’ll be successful
    with your task with your first, second, or third prompt. This is why I tend to
    avoid guides and lists on the internet offering the 100 best prompts. There are
    no hard and fast rules in prompt engineering, but there are some strategies to
    follow alongside using some or all of our effective prompt components. Let’s take
    a closer look at some of these strategies in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: Define clear goals
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before you even start using prompts, it’s best to consider the task you’re trying
    to achieve. A clear design and goal will mean fewer iterations overall. So, consider
    your task and see whether you can explain it clearly to yourself or describe it
    in a few sentences, including some appropriate keywords, to ensure that you’ve
    thought it through and have enough detail to provide to ChatGPT. LLMs tend to
    go off on tangents if you don’t provide enough detail in your prompt, as there
    will be too many possibilities for them to go the wrong way.
  prefs: []
  type: TYPE_NORMAL
- en: Employ iterative prompt development
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Prompt development is an iterative process. It’s unlikely that the first prompt
    you use to explain your task to an LLM will be the prompt you use in production.
    What’s key is that you start simple and then, with every output, iterate on the
    prompt depending on where the result is lacking or needs refinement. In the next
    example, we will illustrate iterating on the prompts for a specific task.
  prefs: []
  type: TYPE_NORMAL
- en: Iterative development example
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this example, you are tasked with designing a conversational flow for a new
    chatbot that will be deployed on a university’s website to answer queries related
    to admissions, programs, and campus facilities. The conversational flow should
    be intuitive, informative, and engaging to assist prospective students in finding
    the information they need.
  prefs: []
  type: TYPE_NORMAL
- en: 'You have some data about the university’s admissions, which can be supplied
    as part of your prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE65]'
  prefs: []
  type: TYPE_PRE
- en: 'Our first try is fairly simple:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE66]'
  prefs: []
  type: TYPE_PRE
- en: This is pretty vague and lacks context and guidance, leaving ChatGPT without
    the necessary information to generate a meaningful conversational flow. The output
    from ChatGPT is pretty impressive and includes an example conversation, but it’s
    fairly basic.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s try and improve our prompt with more detail:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE67]'
  prefs: []
  type: TYPE_PRE
- en: This is a better prompt; we have provided more scope and clearer instructions,
    as well as a scenario, and requested a script for a specific user inquiry. However,
    it doesn’t provide any steering on the chatbot’s persona or emphasis on the chatbot’s
    tone.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE68]'
  prefs: []
  type: TYPE_PRE
- en: This prompt creates a persona for ChatGPT, places it in a realistic scenario,
    and provides a specific user inquiry to respond to. It emphasizes the importance
    of a friendly, supportive, and engaging tone, and it gives ChatGPT the context
    and data needed to craft a meaningful, informative response to fulfill our conversation
    flow task.
  prefs: []
  type: TYPE_NORMAL
- en: As you can see from this example, prompt engineering is a process of iteration.
    We started simply and, through a series of prompt improvements, built up the detail
    of our prompt based on each prompt result.
  prefs: []
  type: TYPE_NORMAL
- en: Start simple
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It’s also useful to keep in mind that, depending on the task you want to achieve,
    it can be the case that using several simpler prompts will result in better outcomes
    than one long complex prompt. If you are using ChatGPT with the web or mobile
    chat interface, you can start with a simple explicit prompt and build on this
    with further follow-up prompts. Remember that the ChatGPT application manages
    the context and conversation history behind the scenes, which you will have to
    implement yourself if you are using the API.
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: If you are trying to achieve too much in a prompt, LLMs can become confused
    and may not provide the best results. If you are trying to do more than four or
    five things at a time, it could be time to split these down into a series of follow-up
    prompts.
  prefs: []
  type: TYPE_NORMAL
- en: If you are trying to achieve a very complex task, it can be easier to not try
    and create the perfect prompt but to look at achieving your task in multiple prompts.
    Start with a clear and concise prompt and then follow up with further questions
    or clarifications.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s consider a more complex task: designing a multi-functional conversational
    AI system for a healthcare provider that can handle appointment scheduling, prescribe
    refills, and provide general information about medical conditions. Instead of
    asking ChatGPT to provide all the information in one go, you could start with
    a clear and concise prompt to lay down the foundations of the system:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE69]'
  prefs: []
  type: TYPE_PRE
- en: 'Once you have a basic structure, you can delve deeper into each functionality
    with follow-up questions, such as asking about further details for the appointment
    scheduling:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE70]'
  prefs: []
  type: TYPE_PRE
- en: What you are doing here is starting simple, so ChatGPT understands the overall
    task, and then breaking down the complex task into smaller and more manageable
    subtasks. This approach works well for larger, more complex tasks such as coding
    and text use cases.
  prefs: []
  type: TYPE_NORMAL
- en: Use follow-up prompts to test against multiple examples
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Sometimes you will have multiple examples of data to evaluate your prompt against.
    It makes sense to test the prompts across a range of inputs so you can see whether
    your prompt is performing correctly across several examples. This is particularly
    important if you are using ChatGPT to process large amounts of data. You can use
    ChatGPT to help with this. Here is an example. Let’s say that you have an LLM
    automation that creates hotel descriptions based on a set of hotel data. This
    prompt could look something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE71]'
  prefs: []
  type: TYPE_PRE
- en: 'It may be that you’re not 100% sure that the facilities data is going to be
    available for every hotel, and you don’t want any made-up facilities details or
    mention of no facilities, so you can check that the description does not mention
    facilities in another prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE72]'
  prefs: []
  type: TYPE_PRE
- en: You can see the value in testing your prompts across a range of inputs and sanitizing
    the output from ChatGPT with follow-up prompts here.
  prefs: []
  type: TYPE_NORMAL
- en: Use temperature when you need to
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We covered how to change the temperature in [*Chapter 3*](B21100_03.xhtml#_idTextAnchor080).
    Temperature allows you to change the randomness of the model’s responses. The
    higher the temperature, the more varied and random the response will be. Generally,
    when building applications where you want a predictable response, it’s a good
    practice to use a temperature of zero. So, if you are trying to build a system
    that is reliable and predictable, I would recommend using zero. For applications
    where you would want more creativity, it’s a good idea to increase the temperature.
  prefs: []
  type: TYPE_NORMAL
- en: Handling memory limitations in ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Memory limitations in ChatGPT, or any LLM, can be a bottleneck when you’re trying
    to maintain a long or complex conversation or understand a broader context. All
    the GPT models have a token limit, which includes both the input and output tokens.
    Once the token limit is reached, you either have to truncate, omit, or otherwise
    manage the conversation history to make room for new input and output.
  prefs: []
  type: TYPE_NORMAL
- en: Strategies for managing memory issues
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In addressing the limitations of memory in conversational AI, several strategies
    can be employed to optimize the interaction flow. Here are some effective techniques:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Selective truncation**: Keep only essential parts of the conversation. For
    example, remove greetings or less relevant exchanges to save space in follow-up
    messages.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Summarization**: Periodically, you can summarize what has been talked about
    so far and use this in further prompts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pagination**: Break down the conversation or contextual content into pages
    or sections and deal with each of them independently. You can use a prompts splitter
    such as [https://www.chatsplitter.com/](https://www.chatsplitter.com/) to divide
    longer input documents into smaller, manageable segments. This is useful if you’re
    dealing with larger documents. This tool allows you to easily upload multiple
    files and have them automatically split into multiple chunks, which you can load
    into ChatGPT.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt minimization**: There is some scope to minimize prompt length, but
    as you’ve learned to create optimum prompts throughout this chapter, it doesn’t
    make too much sense to limit them. The results are probably negligible. That being
    said, depending on your use case, it may be worth removing data that you’ve added
    as input in your prompts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The reset mechanism
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When you’ve reached the memory limit, it’s important to reset the model. Failing
    to do so can truncate inputs or outputs unpredictably, causing loss of context
    or incorrect answers. Resetting should be a controlled operation that keeps the
    essence of the conversation while discarding expendable parts. The most effective
    way to do this is to summarize the conversation and use it in your next prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Be cautious about replicating incorrect turns from earlier iterations. If a
    response is off track, make sure you don’t include that part when you reset the
    model.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are some different ways to reset a conversation:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Hard reset**: Completely clear the conversation and begin with a new initializing
    context'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Soft reset**: Retain key points or summaries of the prior conversation as
    initializing context'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Context caching**: Store essential information in an external database or
    context manager and reintroduce it as needed'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use the GPT-4 model, which has larger memory
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is an easy fix and makes significant inroads into alleviating the memory
    problem. The latest GPT-4 models have a much larger memory. The token limit for
    GPT-35-Turbo is 4,096 tokens, while the token limits for GPT-4 and GPT-4-32k are
    8,192 and 32,768 respectively, so it’s often wise to use these. Just keep API
    costs in mind.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As you’ve learned, it’s important to have a solid prompt engineering strategy
    so you can overcome the challenges of prompt engineering. Follow an iterative
    strategy and ensure you provide specific, clear prompts with plenty of background
    information and context, and avoid ambiguity. In the next section, we’ll look
    at some specific prompt engineering techniques.
  prefs: []
  type: TYPE_NORMAL
- en: Knowing the prompt engineering techniques
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Let’s use what we’ve learned with some ChatGPT prompting techniques and use
    cases that are specific to conversational AI.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we will delve into advanced prompt engineering techniques,
    aiming to leverage the full potential of ChatGPT for specialized use cases within
    conversational AI. We’ll explore methods such as few-shot learning for targeted
    responses, summarization for data interpretation, and the iterative refinement
    of prompts for a travel chatbot. Each technique is designed to refine the AI’s
    understanding and output, ensuring that the resulting interactions are as effective
    and relevant as possible to the task at hand. Whether it’s shaping a customer
    support chatbot or integrating LLMs for data summarization, this section should
    help you learn to use the most useful prompt techniques.
  prefs: []
  type: TYPE_NORMAL
- en: Few-shot learning for a customer support chatbot
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A common way to prompt ChatGPT with context and give tighter boundaries on output
    is to use a few-shot learning approach. In few-shot learning, a set of training
    examples is provided as part of your prompt. The benefit of this is that you are
    providing extra context, and each response gives ChatGPT examples of the output
    that you are looking for, so you can have a fair degree of confidence about the
    responses.
  prefs: []
  type: TYPE_NORMAL
- en: To look at this in action, let’s consider asking ChatGPT to take on the role
    of a customer support chatbot for a smartphone company.
  prefs: []
  type: TYPE_NORMAL
- en: 'A single-turn prompt could be something like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE73]'
  prefs: []
  type: TYPE_PRE
- en: 'The output from ChatGPT works well but is a little too detailed for our use
    case. You could give more output guidelines, or, with a few-shot learning approach,
    you can guide ChatGPT to answer in a more structured and consistent manner:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE74]'
  prefs: []
  type: TYPE_PRE
- en: 'For the same example, if you were interacting with the ChatGPT completions
    API, your examples would be part of the array of messages you send to the API:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE75]'
  prefs: []
  type: TYPE_PRE
- en: By providing examples to ChatGPT, you’re priming the model with domain-specific
    knowledge, as well as setting up the interactive role of the task, leading response
    format, and task understanding. You are hopefully also helping to maintain uniform
    responses.
  prefs: []
  type: TYPE_NORMAL
- en: For this use case, few-shot learning enables ChatGPT to act as a specialized
    assistant, transforming it from a general-purpose chatbot to one capable of supplying
    domain-specific guidance, for dog training in this case. In the next section,
    let’s look at using ChatGPT to carry out another common use case with some added
    complexity.
  prefs: []
  type: TYPE_NORMAL
- en: Prompting to summarize data for a conversational agent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One notable use of LLMs is leveraging them for summarization tasks. Our prompt
    summarization example differs from a standard text summarization task. Instead,
    we’ll be creating a prompt to answer questions about data in JSON format.
  prefs: []
  type: TYPE_NORMAL
- en: This technique is valuable if you are aiming for your chatbot or automated assistant
    to address inquiries about specific data for the inquirer.
  prefs: []
  type: TYPE_NORMAL
- en: For this example, suppose you have a customer support chatbot for an online
    travel agency. Your chatbot is handling an inquiry from a customer about their
    flight luggage details. The chatbot has a direct integration with the agency’s
    back-office web service. It also has the current user’s details, so it’s straightforward
    to look up the customer’s booking data. The complexity comes with interpreting
    and representing the data for the user to answer their question.
  prefs: []
  type: TYPE_NORMAL
- en: 'For our example, the flight data that is returned by the system looks like
    the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE76]'
  prefs: []
  type: TYPE_PRE
- en: In an intent-based conversational AI system, we would construct a response to
    the user based on the data by parsing this data and constructing it manually or
    with a templating system. This can become brittle and hard to maintain. Instead,
    we can use ChatGPT to handle answering the question with a summary of the flight’s
    data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at a prompt to achieve this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE77]'
  prefs: []
  type: TYPE_PRE
- en: 'After receiving a coherent output from ChatGPT, we can iteratively refine our
    prompt for our specific use case. For example, we can do this by altering the
    output to generate a summary tailored for an IVR system:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE78]'
  prefs: []
  type: TYPE_PRE
- en: As you can see, the technique of using ChatGPT to summarize works well when
    the input is structured data as well as unstructured text. This is also a great
    technique to use if you are working with an intent-based system, but you want
    to introduce LLM technology carefully and only at an intent level or specific
    to some intents.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can still do a lot more. Let’s consider building on our example to create
    a complete chatbot in the example in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Prompting to create your own chatbot powered by ChatGPT
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We can build on the previous example of our travel assistant agent by using
    ChatGPT to create our own working travel assistant chatbot.
  prefs: []
  type: TYPE_NORMAL
- en: This code example demonstrates a simple interactive chatbot created using Python,
    ChatGPT, and IPython widgets for the display elements within a Jupyter Notebook
    environment. The chatbot has some holiday information in JSON format, which is
    included in the context of your prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Importing the necessary libraries
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'First, we need to import all the necessary libraries:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE79]'
  prefs: []
  type: TYPE_PRE
- en: Essential libraries and modules are imported to support the chatbot’s functionality.
    For instance, **openai** is used to interact with the GPT-3.5-Turbo model, and
    **ipywidgets** and **IPython.display** are used to create an interactive UI within
    Jupyter Notebook. We are also passing our environment variable populated with
    our OpenAI key.
  prefs: []
  type: TYPE_NORMAL
- en: Loading booking data for the chatbot
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Next, we need to load the chatbot booking data from the JSON file:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE80]'
  prefs: []
  type: TYPE_PRE
- en: The code reads a **booking.json** file to get booking details for an imaginary
    customer so your chatbot will have some information when you ask it about your
    holiday. This simulates an integration with a back-office system.
  prefs: []
  type: TYPE_NORMAL
- en: Defining the helper function for calling the completions endpoint
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following code outlines the helper function for calling the completions
    endpoint with our messages and other parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE81]'
  prefs: []
  type: TYPE_PRE
- en: This function sends the conversation history (**messages**) to the GPT-3.5-Turbo
    model and returns the model’s response.
  prefs: []
  type: TYPE_NORMAL
- en: Creating UI elements
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following elements are simple UI components to make up our chat interface:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE82]'
  prefs: []
  type: TYPE_PRE
- en: UI components are created using **ipywidgets**. These include a text input field
    (**inp**), a button (**chat_button**), and an output area (**output**) to display
    the conversation, as well as the panels list, which is initialized to hold the
    conversation panels that will be displayed.
  prefs: []
  type: TYPE_NORMAL
- en: Initializing the context
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Next, we will create the context for our conversation with our system prompt
    and booking information:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE83]'
  prefs: []
  type: TYPE_PRE
- en: The context array is initialized with a system message instructing the assistant
    with the prompt details and customer data input. This is important, as it sets
    the scenario for the conversation.
  prefs: []
  type: TYPE_NORMAL
- en: Defining the collect_messages function and UI elements
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We will also create a function to format the messages and create our UI elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE84]'
  prefs: []
  type: TYPE_PRE
- en: This function is triggered when the user clicks the **Chat!** button.
  prefs: []
  type: TYPE_NORMAL
- en: It reads the user’s input, clears the input field, updates the context array
    with the user’s message, and retrieves the assistant’s response by calling **chat_with_gpt**.
  prefs: []
  type: TYPE_NORMAL
- en: The context array is updated again with the assistant’s response, thus forming
    the conversation history.
  prefs: []
  type: TYPE_NORMAL
- en: User and assistant messages are formatted and added to the panels list, which
    holds the conversation.
  prefs: []
  type: TYPE_NORMAL
- en: 'The **collect_messages** function is also bound to the click event for **chat_button**:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE85]'
  prefs: []
  type: TYPE_PRE
- en: A vertical box (**VBox**) widget is created to hold the text input, button,
    and output area, forming the chatbot dashboard.
  prefs: []
  type: TYPE_NORMAL
- en: The **display** function is called to render the dashboard in Jupyter Notebook.
  prefs: []
  type: TYPE_NORMAL
- en: The chatbot context
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The context array plays a crucial role in managing the conversation history
    and ensuring coherent and contextually relevant responses from ChatGPT. It gets
    updated with each exchange between the user and the assistant, providing the necessary
    context for generating meaningful responses based on the ongoing conversation
    and the initial system instruction. In essence, this is what is occurring behind
    the scenes when you interact with the ChatGPT UI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once you’ve run the code, you should be able to see a simple chatbot interface:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4.2 – Chatbot interface](image/B21100_04_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4.2 – Chatbot interface
  prefs: []
  type: TYPE_NORMAL
- en: You can now start the conversation by saying hello. You should be greeted by
    ChatGPT, and you will be able to ask follow-up questions about your holiday.
  prefs: []
  type: TYPE_NORMAL
- en: Try changing the information in the JSON and asking other questions on your
    own.
  prefs: []
  type: TYPE_NORMAL
- en: You can also try changing the prompt and data input and creating a different
    type of chatbot and use case.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we looked at the emerging field of prompt engineering. You
    gained an understanding of the core components of a successful prompt. We introduced
    the importance of clearly defining roles, audience, input, and output data in
    prompts to tailor the model’s responses to specific tasks or user groups.
  prefs: []
  type: TYPE_NORMAL
- en: With a heavy emphasis on the iterative nature of prompt engineering, we saw
    that it’s important to have a solid prompt engineering strategy. We hopefully
    covered some solid details on what to look for or consider during prompt engineering.
  prefs: []
  type: TYPE_NORMAL
- en: We also looked at some prompt engineering techniques and how to use these in
    real-world examples specifically tailored to the world of conversational AI.
  prefs: []
  type: TYPE_NORMAL
- en: Through iterative development and testing across multiple data examples, you
    were encouraged to refine prompts to achieve better, more consistent outcomes
    from ChatGPT, so you could enhance the model’s utility in various applications.
  prefs: []
  type: TYPE_NORMAL
- en: So, you should now be comfortable with moving on to more complex ChatGPT use
    cases. In our next chapter, we are going to delve into LangChain, an open-source
    framework that helps with the integration of ChatGPT with other external components,
    enabling the creation of more advanced applications.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The following links are resources to help in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.chatsplitter.com/](https://www.chatsplitter.com/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[https://jupyter.org/](https://jupyter.org/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '5'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Getting Started with LangChain
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we’re going to look at LangChain and how this framework enables
    users to build complex LLM applications. You’ll gain an understanding of LangChain
    and the problems it fixes, as well as an introduction to the core components of
    LangChain, LangChain Expression Language, and the different types of chains that
    you can create.
  prefs: []
  type: TYPE_NORMAL
- en: At its core, LangChain is an open-source development framework designed for
    building LLM applications. By the end of this chapter, you’ll be well-equipped
    to engineer LangChain applications and use the more advanced functions and capabilities
    covered in the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll cover the following key areas:'
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to LangChain
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Core components of LangChain
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding LangChain Expression Language
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating different LangChain chains
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This chapter aims to be an introduction to the core concepts to give you a solid
    base for mastering LangChain, enabling you to move on to more complex LangChain
    applications.
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will be using ChatGPT extensively, so you will need to be
    signed up with a free account. If you haven’t created an account, go to https://openai.com/
    and click **Get Started** at the top right of the page, or go to https://chat.openai.com.
  prefs: []
  type: TYPE_NORMAL
- en: To carry out the examples, I would advise using ChatGPT via the web or mobile
    app unless stated otherwise.
  prefs: []
  type: TYPE_NORMAL
- en: The last example technique requires Python 3.9 and Jupyter Notebook to be installed
    (https://jupyter.org/try-jupyter/lab/index.html).
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to LangChain
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As we progress further into the realm of LLM application development, you’ll
    start to notice that these sorts of applications quickly become complex and necessitate
    increasingly complex prompts. A prompt can include basic system instruction, user
    input, subject metadata, personalization for the user, previous interaction data,
    and other information from other systems. So, a typical application might necessitate
    multiple promptings of an LLM along with parsing its output, thus calling for
    a substantial amount of auxiliary code. This is where LangChain, created by Harrison
    Chase, comes into play to add structure to your LLM applications and ease the
    development journey.
  prefs: []
  type: TYPE_NORMAL
- en: LangChain emerged from the necessity to fabricate intricate LLM applications
    while employing common abstractions in their developmental blueprint. It’s an
    open-source framework with a strong community and many active contributors.
  prefs: []
  type: TYPE_NORMAL
- en: The inception of LangChain was driven by the aspiration to streamline the development
    process, making it less daunting for developers to work with LLMs. In fact, this
    was the main reason I started using Langchain – as an easy means to deploy a proof
    of concept for a potential client to showcase a chatbot able to chat about a customer’s
    own data.
  prefs: []
  type: TYPE_NORMAL
- en: LangChain is a framework tailored for crafting applications driven by language
    models. It accentuates context-awareness and reasoning by interfacing with language
    models and application-specific data. It offers modular components and off-the-shelf
    chains for ease of use and customization, facilitating a structured assembly of
    components for higher-level tasks. The framework also encapsulates various modules
    such as model I/O, retrieval, chains, agents, memory, and callbacks, catering
    to different aspects of interaction and data handling within your LLM application.
  prefs: []
  type: TYPE_NORMAL
- en: LangChain libraries
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The LangChain framework supports two different scripting languages: Python
    and JavaScript (TypeScript). The essence of LangChain lies in its emphasis on
    composition and modularity, housing a myriad of individual components. These components
    can either be amalgamated or utilized independently, showcasing the framework’s
    flexible nature.'
  prefs: []
  type: TYPE_NORMAL
- en: Both libraries are easy to use. While the Python LangChain library is more mature
    and feature-rich, the **TypeScript** library is newer but being developed to closely
    mirror the Python version’s capabilities. Both are designed to be user-friendly,
    with a focus on simplifying the integration and use of LLMs in various applications.
  prefs: []
  type: TYPE_NORMAL
- en: With such a strong community, there is a huge number of contributors in both
    libraries, with modules for everything from document loaders to agent blueprints
    to memory providers as well as integrations from tech providers, large and small.
  prefs: []
  type: TYPE_NORMAL
- en: But to make the best use of LangChain, it’s good to start with its basics. In
    the next section, we’ll look at the core components of LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: Core components of LangChain
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: LangChain offers a variety of modules that can be used to create language model
    applications. These modules can be used individually in simple applications or
    combined to create more complex ones. Flexibility is the key here!
  prefs: []
  type: TYPE_NORMAL
- en: 'The most common components of any LangChain chain are the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**LLM model**: LangChain’s core reasoning engine is your language model. LangChain
    makes it easy to use many different types of LLMs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt templates**: These provide instructions to the LLM, controlling its
    output. Understanding how to construct prompts and different prompting strategies
    is crucial, so it’s good that we covered this in the previous chapter.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Output parsers**: These convert the raw response from the LLM into a more
    usable format, simplifying downstream processing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s look at each of these core components in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: Working with LLMs in LangChain
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are two different types of LLM models in LangChain, which are called LLMs
    and ChatModels. These models are used to interface with the different LLM models
    available. LangChain supports many different types of LLMs and so is a great enabler
    for trying different types of LLMs and comparing results.
  prefs: []
  type: TYPE_NORMAL
- en: '**LLMs**: This is a language model that takes a string as input and returns
    a string'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ChatModel**: This is a language model that takes a list of messages as input
    and returns a message'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LLMs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: LLMs in LangChain refer to the pure text completion models that they interface
    with – for example, GPT-4\. These take a simple input as a string and output a
    string.
  prefs: []
  type: TYPE_NORMAL
- en: Chat models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In comparison, Chat models are tuned for conversations. The LLM APIs use a
    different interface than pure text completion models. Instead of a single string,
    they take a list of chat messages as input, which are labeled with a specific
    role: system, assistant, and user. You’ve already been introduced to the concept
    of working with a list of chat messages in [*Chapter 3*](B21100_03.xhtml#_idTextAnchor080),
    in the *Learning to use* *the ChatGPT API* section. The ChatGPT completions endpoint
    expects this input.'
  prefs: []
  type: TYPE_NORMAL
- en: As we’re concentrating on using ChatGPT and creating conversational experiences
    using LangChain, we’ll focus more on Chat Models for the rest of this chapter.
    If you are interested in carrying out generative tasks, then using the LLM model
    may be a better fit.
  prefs: []
  type: TYPE_NORMAL
- en: 'In LangChain, the chat model supports a list of ChatMessages, which have two
    properties:'
  prefs: []
  type: TYPE_NORMAL
- en: '**content**: The content of the message'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**role**: The role of the entity from where the **ChatMessage** originated'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The supported roles are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**AIMessage**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**HumanMessage**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**SystemMessage**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**FunctionMessage**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can also create a role manually in the **ChatMessage** class.
  prefs: []
  type: TYPE_NORMAL
- en: 'The ChatModel provides a **predict_messages()** method to interact with the
    mode using a list of messages. This would look like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE86]'
  prefs: []
  type: TYPE_PRE
- en: 'This should output something that looks like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE87]'
  prefs: []
  type: TYPE_PRE
- en: Let’s now look at using prompt templates with the LLM.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt templates
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we’ve seen, prompts can get detailed and long pretty quickly. We also often
    want to reuse our prompts. This is where the LangChain prompt templates can help
    a lot. They serve as structured blueprints to craft prompts for all the different
    tasks we want to carry out.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt templates can be combined, and LangChain also provides prompts for common
    tasks such as question answering and summarization.
  prefs: []
  type: TYPE_NORMAL
- en: In essence, instead of directly manipulating the prompt string with instructions,
    we can just pass in the variables for a specific prompt and let LangChain handle
    the rest. We can also use LangChain prompts to work with our Chat Model prompting,
    so let’s take a look.
  prefs: []
  type: TYPE_NORMAL
- en: The **PromptTemplate** class in LangChain acts as a mold for string prompts,
    which can be filled with user-defined parameters.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at an example. You are looking to build an application that analyzes
    your chat transcripts so you can understand the sentiment of your conversations
    across the different departments.
  prefs: []
  type: TYPE_NORMAL
- en: 'We import the **PromptTemplate**, then use the **from_template** function to
    create the template and corresponding variable placeholders:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE88]'
  prefs: []
  type: TYPE_PRE
- en: 'If you call the **format** method on your template and output **conversation_analysis**,
    you should have something that looks like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE89]'
  prefs: []
  type: TYPE_PRE
- en: Notice that you have a completed prompt that is composed of the template and
    the variables that were passed in.
  prefs: []
  type: TYPE_NORMAL
- en: Chat prompt template
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The **ChatPromptTemplate** works with chat models and enables the creation of
    conversational prompts, encapsulating a sequence of chat messages with designated
    roles such as **'**‘**system'**, **'human'**, and **'AI'**.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a look at an example. We’re creating a health clinic chatbot to
    assist with general health-related inquiries. We import **ChatPromptTemplate**,
    and then create the template by calling the **from_messages** function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE90]'
  prefs: []
  type: TYPE_PRE
- en: 'You can then use this template as follows; this will create our message list
    populated with the variables we’ve assigned:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE91]'
  prefs: []
  type: TYPE_PRE
- en: 'These messages are now correctly formatted as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE92]'
  prefs: []
  type: TYPE_PRE
- en: 'You can now use these in a call to your Chat model by passing in your formatted
    prompts list:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE93]'
  prefs: []
  type: TYPE_PRE
- en: There are also out-of-the-box prompts such as a prompt template that uses few-shot
    examples. The main components of the few-shot template are the examples, which
    are a list of examples to pass into the prompt and the example prompt itself.
    The prompt templates give you a lot of options with types of prompts; however,
    sometimes you may want to create your own prompt template. LangChain also makes
    this easy with custom prompt templates. Let’s look at these in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Custom templates
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Custom prompt templates in LangChain offer flexibility by enabling users to
    craft bespoke prompts for unique tasks beyond the scope of standard templates.
    These custom templates become useful when a task demands a distinct prompt format
    or particular details to steer your language model in the intended direction.
    Let’s look at an example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE94]'
  prefs: []
  type: TYPE_PRE
- en: 'Example usage of this template would look something like the following, by
    passing in the input variables when defining the prompt and calling the **format**
    function with your required variables:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE95]'
  prefs: []
  type: TYPE_PRE
- en: You now have a productivity advice-prompting template that you can reuse and
    share if necessary.
  prefs: []
  type: TYPE_NORMAL
- en: Using output parsers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we understand an LLM and our prompts, the final core component of a
    LangChain app is the output parser.
  prefs: []
  type: TYPE_NORMAL
- en: Oftentimes, once we have extracted our response from our LLM, we have specific
    requirements for a certain format. Our example use case is based on some of the
    tasks we carried out in [*Chapter 2*](B21100_02.xhtml#_idTextAnchor057), in the
    section named *Creating utterances*. We can use our LLM to create intents and
    utterances. In these examples, although it appears to respond with JSON, it’s
    actually a string. What would be more useful would be to parse the LLM output
    string into a Python dictionary.
  prefs: []
  type: TYPE_NORMAL
- en: First, we import all the required libraries and then create our **ResponseSchema**
    by providing a name and description. We can have as many of these as we require
    to match our output variables, which we then use to create our output parser by
    calling the **StructuredOutputParser.from_response_schemas** function.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can then create our instructions to include in our prompt template by calling
    **get_format_instructions()** on the output parser. The instructions are then
    used in our prompt template. Remember to pass our intent format instructions into
    our prompt. Let’s look at how we would do this in the following code example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE96]'
  prefs: []
  type: TYPE_PRE
- en: Once we get the response back from the LLM, we can simply pass our response
    into our parse function to format our result – **output_dict = intent_output_parser.parse(response.content)**
    – which will now be a dictionary that we can interact with as normal.
  prefs: []
  type: TYPE_NORMAL
- en: There are a lot of benefits of using the output parser here as it manages any
    number of specific instructions to be used in the prompt, and the resulting response
    can be parsed as needed without having to manually format each one. The output
    parser is the final core component of a LangChain app.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we’ll look at the concept of chains and the language used
    to manipulate them.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding LangChain Expression Language
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'We’ve covered the core LangChain components. Now, we turn our focus to a pivotal
    concept that can be used in the creation and execution of these components: **LangChain
    Expression Language** (**LCEL**). Let’s delve deeper into what LCEL is and understand
    its significance in the LangChain framework.'
  prefs: []
  type: TYPE_NORMAL
- en: What is LCEL?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The concept of chains is that they are the key building blocks of LangChain.
    A chain is a collection of blocks of functionality and in ’its simplest form,
    a chain would be made up of a prompt, a call to an LLM, and the processing of
    the result. We’ve seen these functional blocks in the previous section. At their
    most complex, chains can be made up of hundreds of steps.
  prefs: []
  type: TYPE_NORMAL
- en: LCEL provides a declarative syntax and orchestration framework that was created
    so users could easily create chains of functionality with a standardized way of
    defining and invocation to make it as easy as possible to run as well as create
    custom chains.
  prefs: []
  type: TYPE_NORMAL
- en: Key components of LCEL
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LCEL offers a lot of functionality out of the box and is based on piping and
    modularity along with several specific features and a runnable protocol for each
    component, with each object providing a common interface so you can interact with
    each one in the same way.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is a list of the key features of LCEL:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Streaming support**: LCEL enhances streaming efficiency by reducing the delay
    before the first output is produced. It streams tokens from an LLM to an output
    parser for quick, step-by-step parsing in real time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Asynchronous and synchronous support**: Chains built with LCEL can be called
    using both synchronous (e.g., in Jupyter notebooks for prototyping) and asynchronous
    (e.g., in a LangServe server) APIs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Optimized parallel execution**: LCEL efficiently handles tasks by executing
    parallel steps in a sequence, such as retrieving documents simultaneously from
    various sources to minimize delay.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Retries and fallbacks**: To make sure your applications are reliable; you
    can configure retries and fallbacks in any part of the LCEL chain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Input and output schemas**: To help with input and output validation, documentation,
    and error handling, LCEL chains include Pydantic and JSON Schema, which can be
    used for validation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Observability**: Out of the box, using LCEL logs the input and output of
    each step and details of the sequence of steps in the chain, which can then be
    viewed with the LangSmith server, which we’ll cover in later sections.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integration** : For complex chains, accessing the results for each step is
    often crucial for feedback or debugging. LCEL provides easy integration to LangSmith
    for monitoring and debugging.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Runnable protocol
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LCEL’s Runnable protocol is important for custom chain creation. LCEL employs
    a “Runnable” protocol to streamline the development of custom chains.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Runnable protocol in LCEL is designed to make it easier to build and use
    custom processing chains. In simple terms, it’s like a set of rules or guidelines
    that helps in organizing how these chains are created and run. This protocol includes
    specific methods for tasks such as streaming data and processing in batches, along
    with their advanced versions for more complex operations. The main purposes of
    this protocol are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Standardization**: It creates a uniform way to define and use different parts
    of a system. This means that no matter what component you’re dealing with (such
    as a model or a tool), you use the same set of rules to work with it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flexibility**: By having a standard approach, it becomes easier to mix and
    match different components. You can plug different parts into your chain, and
    they’ll work together smoothly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Clarity**: It provides clear guidelines on what kind of data goes into and
    comes out of each component. This helps in understanding and inspecting how each
    part of the system functions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Efficiency**: It streamlines the process of building and modifying chains,
    saving time, and reducing the likelihood of errors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, in essence, the Runnable protocol is like a common language or blueprint
    that helps in building, modifying, and understanding custom chains in LCEL effectively
    and efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: LCEL syntax
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With LCEL, we create our chains differently using the **pipe operator** (**|**)
    instead of **Chain**
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE97]'
  prefs: []
  type: TYPE_PRE
- en: When LangChain encounters the pipe operator between two objects, it tries to
    feed **x** into **y**.
  prefs: []
  type: TYPE_NORMAL
- en: A simple example of LCEL
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To help you see the difference between using LCEL and the traditional approach,
    let’s compare both methods of creating a simple chain.
  prefs: []
  type: TYPE_NORMAL
- en: 'These two examples achieve the same outcome: setting up a chain with a language
    model and a default prompt. Let’s explore each one:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Use the **LLMChain** class as follows. In this approach, you’re explicitly
    creating an instance of the **LLMChain** class:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE98]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This involves passing in the language model (**llm**) and the default prompt
    (**default_prompt**) as arguments.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Create the chain with LCEL by connecting each step with the pipeline operator
    (**|**):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE99]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This approach uses the pipeline operator (**|**) to chain together the language
    model (**llm**) and the default prompt (**default_prompt**). The pipeline operator
    effectively “‘pipes”‘ the output of one component (the LLM) into the next component
    (the default prompt processor).
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Key differences and benefits of LCEL
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are some key differences and benefits to point out here:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Syntax, style, and readability**: The most apparent difference is in the
    syntax. The first approach is more verbose and explicit, while the second is more
    concise and might be more intuitive for those familiar with functional programming
    or command-line operations where such piping is common. For someone new to LangChain,
    the explicit **LLMChain** instantiation might be more readable and easier to understand.
    The pipeline operator, while concise, might require a bit of getting used to.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Extensibility**: Both methods are extensible, but the way you extend them
    differs. With the **LLMChain** class, you might extend functionality by subclassing
    or modifying the class. With the pipeline operator, you extend by adding more
    components to the pipeline.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Underlying mechanics**: While both achieve a similar end result, the underlying
    mechanics might differ slightly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Advanced features**: LCEL in both Python and Typescript offers benefits such
    as optimized parallel execution and support for handling errors with retries and
    fallbacks. LCEL also offers the ability to output the results of separate parts
    of your chain before the final chain completion, which is great for debugging
    and sending updates to the end client – for example, if you want to send your
    chat interface updates during a long execution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: Initially, the LLMChain interface was the standard method. However, the more
    modern method is LCEL. LLMChain is still valid but for new application development,
    it’s advisable to use LCEL for composing chains.
  prefs: []
  type: TYPE_NORMAL
- en: In the following examples in this chapter and the remainder of the book, we’ll
    try and use LCEL wherever possible. In the next section, we’ll dive into creating
    different types of LangChain chains.
  prefs: []
  type: TYPE_NORMAL
- en: Creating different LangChain chains
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this section, we’ll explore how to create some of the various chains you
    can create in LangChain. Our aim is to guide you from basic chains to more advanced
    chains.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll start with an example to introduce the basics of a simple chain. This
    will provide a foundation for understanding how chains work in LangChain. Next,
    we’ll learn how to create sequential chains, parallel chains, and finally, routing
    chains.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this section, you’ll have a clear understanding of how to create
    and utilize different LangChain chains and be equipped with the skills to apply
    these in your future LangChain projects. Let’s dive in.
  prefs: []
  type: TYPE_NORMAL
- en: Basic chain example
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this basic example, we’ll show the simplest chain with a prompt and LLM
    component, which forms the basis of many more complex implementations. In this
    example, we are using our model to translate text into any language:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE100]'
  prefs: []
  type: TYPE_PRE
- en: 'Walking through the code, you can see this is a simple chain. We create a **ChatPromptTemplate**
    instance from a template string. The template string defines the prompt that will
    be presented to the language model. The prompt asks the model to translate text
    into a specified language:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE101]'
  prefs: []
  type: TYPE_PRE
- en: 'The prompt template is a string that contains the following placeholders:'
  prefs: []
  type: TYPE_NORMAL
- en: '**{text}**: This placeholder will be replaced by the text to be translated'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**{language}**: This placeholder will be replaced by the target language'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We can then create the runnable, our chain of components that all implement
    the runnable interface and are designed to be chained together, which is the core
    concept of LCEL. This line of code creates the **runnable** chain using the **|**
    operator:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE102]'
  prefs: []
  type: TYPE_PRE
- en: 'The **runnable** is a chain of three components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**prompt**: This component applies the chat prompt template to the input data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ChatOpenAI**: This is the model that sends the prompted text to the **ChatOpenAI**
    chat models'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**StrOutputParser**: This model parses the output of the **ChatOpenAI** chat
    models into a string, facilitating easy integration into various applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'It’s likely that you may encounter chains where the **LLMChain** class is instantiated.
    This is the equivalent of our runnable in this example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE103]'
  prefs: []
  type: TYPE_PRE
- en: The **LLMChain** is now a legacy class, so it’s best practice to use LCEL.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we’ll look at creating a simple sequential chain for a
    more complex use case that’s specific to conversational AI.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a sequential chain to investigate conversational data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s start by looking at a simple sequential chain. Sequential chains run a
    sequence of chains one after another and work well when you have expected input
    and outputs for carrying out downstream processing.
  prefs: []
  type: TYPE_NORMAL
- en: For this example, imagine we have an electric car subscription company called
    GreenRide, which uses live chat to handle customer queries on its website. It
    is interested in creating a chatbot to automate some of its customer conversations.
    It has a lot of uncategorized chat transcripts. It wants to categorize these chat
    transcripts into **frequently asked questions** (**FAQs**) and transactional inquiries
    so it can understand which queries are complex and which ones are simple. It is
    interested in using an intent-based **Natural Language Understanding** (**NLU**)
    platform for handling transactional inquiries and an LLM to handle the FAQs. With
    the transactional inquiries, it wants to cluster the conversations by intent so
    that it can look at each use case in more detail and look at which teams need
    to be involved.
  prefs: []
  type: TYPE_NORMAL
- en: 'You have been tasked with looking at this transcript data and carrying out
    these tasks. So, let’s break this down:'
  prefs: []
  type: TYPE_NORMAL
- en: Categorize each conversation and split it into two lists of FAQs and transactional
    conversations.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Look at the transactional list of conversations and cluster these by intent.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'To achieve this, we’ll use LangChain to process chat transcripts through a
    sequential chain of operations. These processes are highlighted in the following
    diagram:'
  prefs: []
  type: TYPE_NORMAL
- en: "![\uFEFFFigure 5.1 – Processes of a sequential chain to investigate conversational\
    \ data](image/B21100_05_1.jpg)"
  prefs: []
  type: TYPE_IMG
- en: Figure 5.1 – Processes of a sequential chain to investigate conversational data
  prefs: []
  type: TYPE_NORMAL
- en: You will need two chains to carry out the categorization and clustering. The
    first chain, which uses an LLM and a prompt, will take in the list of transcripts
    and return two lists of conversations. The second chain will also be made up of
    an LLM and a prompt and will take in a list of transactional conversations and
    cluster these by intent type.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this example, we’ll be using LCEL and passing the results of one chain into
    another for further processing:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Start by importing the necessary modules from **langchain** and initialize
    our **ChatOpenAI** model with temperature **0**, as this isn’t going to be a creative
    task:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE104]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Chat transcripts are loaded from a JSON file, which will be the data source
    for processing:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE105]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Set up our output schemas to categorize the two conversations into **transactional_transcripts**
    and **faq**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE106]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: You’ll notice that although you have a response schema for your two categorized
    lists of transcripts, you are only going to be using one, **transactional_transcripts**,
    for this processing task.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Set up your prompt template for categorizing transcripts, including placeholders
    for dynamic content:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE107]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Configure an output parser to structure the language model’s output and set
    up a **ChatPromptTemplate** for the categorization task:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE108]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Create your transactional categorization processing chain combining the prompt,
    ChatGPT model, and output parser for categorizing transcripts. This is composed
    using LangChain’s chaining mechanism, where each component is linked using the
    pipe operator (**|**):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE109]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This is the first chain complete, so now you can move on to creating the next
    chain.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'For the second intent clustering phase, you create new response schemas and
    an intent clustering prompt template:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE110]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Set up the second processing chain for intent clustering first, by creating
    a new prompt and the intent output parser. We can use the same chat model as we
    used for the first chain although depending on your task, these could be different.
    The beauty of LangChain is that all the components are interchangeable.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE111]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The last part of the code helps you to create the second chain with the elements
    you’ve created. The output of the transcripts from **chain_one** is passed in:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE112]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The output should be a dictionary of chat transcripts made up of the transcripts
    list and the intent and category properties. You can access the first one as follows:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE113]'
  prefs: []
  type: TYPE_PRE
- en: There are other improvements you can try here. If you are going to be dealing
    with larger numbers of transcripts, it might be a good idea to loop over chunks
    of data so you don’t hit on token issues.
  prefs: []
  type: TYPE_NORMAL
- en: You could also add further processing by adding another chain element – for
    example, creating utterances for intents or categorizing intents for specific
    departments.
  prefs: []
  type: TYPE_NORMAL
- en: Using LangChain, we can also run chains in parallel. In the next section, let’s
    look at an example.
  prefs: []
  type: TYPE_NORMAL
- en: Utilizing parallel chains in LangChain for efficient multi-source information
    gathering
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There may be situations when you want to run chains in parallel as part of
    a sequence. For example, imagine a scenario where we want to query multiple information
    sources simultaneously. This capability is particularly useful when a user asks
    a complex question that requires pulling data from different types of content,
    such as news articles, scientific papers, and general web information. The following
    diagram outlines the processes involved in a parallel chain:'
  prefs: []
  type: TYPE_NORMAL
- en: "![\uFEFFFigure 5.2 – Using a parallel chain in a sequence](image/B21100_05_2.jpg)"
  prefs: []
  type: TYPE_IMG
- en: Figure 5.2 – Using a parallel chain in a sequence
  prefs: []
  type: TYPE_NORMAL
- en: 'The following code example illustrates how you can achieve this approach:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Create our model and then create the three separate prompts we’re going to
    use in our chain (**news_chain**, **academic_chain**, and **web_info_chain**),
    each using a template to query specific types of content (news, academic papers,
    and general web information) about a given topic:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE114]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Create our runnable parallel chain with the **RunnableParallel** class, as
    it is used to run these chains in parallel:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE115]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Invoke the parallel chains with topics (e.g., **"artificial intelligence"**),
    and each chain will fetch relevant information based on its configuration:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE116]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'This will achieve what you expected. The chains all run in parallel and return
    their results as a **dictionary** you can then access as follows: **results[''web_info''])**.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: It may be even more useful to create a summary of all three results to answer
    your user’s question. To achieve this, you need to run the parallel chains and
    then use these as part of a sequential chain.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Create the summarization prompt:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE117]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Create our **RunnableSequence** and call our chain with **invoke()**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE118]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: In summary, **RunnableParallel** outputs a dictionary with the results of each
    parallel chain.
  prefs: []
  type: TYPE_NORMAL
- en: We can access those results using the keys we gave the parallel chains (e.g.,
    news, academic, and web info).
  prefs: []
  type: TYPE_NORMAL
- en: We pass that whole output dictionary into the **RunnableSequence**.
  prefs: []
  type: TYPE_NORMAL
- en: Our **summarise_prompt** prompt then has access to those results via the keys
    to populate its template. So, this allows smooth piping of the outputs of parallel
    processes into a sequential chain.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s move on to a slightly more complex example, where we look intelligently
    routing our requests to different chains.
  prefs: []
  type: TYPE_NORMAL
- en: Routing chains to answer questions effectively
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When creating an LLM-powered application, you may need to call different chains,
    depending on the type of question or information you need to provide. The **RunnableBranch**
    allows you to do this.
  prefs: []
  type: TYPE_NORMAL
- en: 'For an example of this type of implementation, let’s go back to our car subscription
    company: GreenRide. We have an idea of the types of inquiries that we need to
    handle and these fit into three categories: maintenance, car info, and accounts.
    However, we’ll need to answer these with different chains. Let’s look at how this
    is achieved:'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we import the necessary classes from the **langchain** library, then
    initialize our model:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE119]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Next, we need to create the prompts for each department. We create templates
    for the different types of queries (maintenance, car info, and accounts). Each
    template is designed to guide the language model to answer in a specific context:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE120]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'We also need a general template:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE121]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This is a fallback template for queries that don’t fit into the specific departments.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Next, we create the branching logic using a **RunnableBranch**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE122]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This part defines the logic to decide which template to use based on the topic.
    It checks the topic of the input and matches it to the corresponding template.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'We then need to create the topic classifier and classifier chain:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE123]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The **TopicClassifier** class defines a Pydantic data model that represents
    the output of the topic classification process. It has a single field, **topic**,
    which is an enum value indicating the classified topics of the user question.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Next, we use the **convert_pydantic_to_openai_function** function to convert
    the **TopicClassifier** Pydantic model into an OpenAI function that can be used
    with the **ChatOpenAI** API:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE124]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: We then use the bind method to add the converted **TopicClassifier** function
    to the **ChatOpenAI** object. This effectively makes the topic classifier function
    available as a callable function within the **ChatOpenAI** context. The **PydanticAttrOutputFunctionsParser**
    class is used to parse the output of the topic classifier function, which is a
    JSON object. The **pydantic_schema** argument specifies the Pydantic model to
    use for parsing the JSON object, which in this case is the **TopicClassifier**
    model. The **attr_name** argument specifies the attribute of the Pydantic model
    to extract the classified topic from, which is the topic attribute.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: OpenAI functions
  prefs: []
  type: TYPE_NORMAL
- en: 'We are using OpenAI function calling here to ensure we receive the correct
    JSON format and schema. It’s worth noting that with the latest versions of OpenAI
    models (**gpt-4-1106-preview** or **gpt-3.5-turbo-1106**), you can set **response_format**
    to **{ "type": "json_object" }** to enable JSON mode. When JSON mode is enabled,
    the model is constrained to only generate strings that parse into valid JSON objects.
    However, this does not ensure the correct schema.'
  prefs: []
  type: TYPE_NORMAL
- en: 'We then bring this together in our chain:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE125]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: When the **classifier_chain** is called with a user question, the question is
    first passed to the **ChatOpenAI** function for topic classification. The output
    of the topic classifier function is then parsed by the Pydantic attribute output
    functions parser, and the extracted classified topic is returned, allowing us
    to define which template to call.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Finally, we create our main chain pipeline, bringing all this together:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE126]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The final chain first classifies the input, then selects the appropriate template,
    processes the input with the language model, and parses the output. Finally, it’s
    easy to invoke our chain:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE127]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: You should now have a working example that sets up a chatbot that can intelligently
    route customer support queries to specific departments such as maintenance, car
    information, and accounts.
  prefs: []
  type: TYPE_NORMAL
- en: At the moment, we are looking at different prompts. We can extend the **RunnableBranch**
    to route input not only to different prompts but also to entirely different chains.
    This allows for more complex and specialized processing, depending on the input’s
    topic or other criteria.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s assume that in addition to handling maintenance, car information, and
    account queries, you want to route some queries to a different chain for special
    handling. For instance, you might have a chain that handles credit control queries
    such as payments, which needs to tap into a payments service and user history
    and therefore has a much more complex chain. This is an easy case of just creating
    the chain and adding to our branching logic in the **RunnableBranch** configuration:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE128]'
  prefs: []
  type: TYPE_PRE
- en: This is a pretty simple chain and theoretical example that uses a document loader
    component for looking up user payment account details. This introduces one of
    the many different modules available in LangChain that we’ll look at in the next
    chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we’ve taken our first look at LangChain and you should have
    a good understanding of what it is, the problems it solves, and its role in simplifying
    the development of complex LLM applications.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve looked at the core components of LangChain, such as the LLM models, prompt
    templates, and output parsers. You should have a good understanding of the LCEL,
    its key features, and its role in creating and executing chains within the LangChain
    framework. Finally, the chapter has covered the various examples of LangChain
    chains, ranging from basic to complex, to illustrate the practical application
    of the concepts discussed.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we’ve only scratched the surface of Langchain, but hopefully,
    we’ve built a solid foundation for you to engineer LangChain applications and
    enable you to move on to the more complex concepts and applications of the LangChain
    library. In our next chapter, we’ll look at other concepts such as memory as well
    as agents, modules, and other tools, particularly LangSmith.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The following links are a curated list of resources to help you with the topics
    discussed in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.chatsplitter.com/](https://www.chatsplitter.com/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[https://jupyter.org/](https://jupyter.org/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[https://docs.pydantic.dev/latest/](https://docs.pydantic.dev/latest/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[https://platform.openai.com/docs/guides/text-generation/function-calling](https://platform.openai.com/docs/guides/text-generation/function-calling)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[https://python.langchain.com/docs/get_started/introduction](https://python.langchain.com/docs/get_started/introduction)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[https://js.langchain.com/docs/get_started/introduction](https://js.langchain.com/docs/get_started/introduction)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '6'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Advanced Debugging, Monitoring, and Retrieval with LangChain
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we’re going to look at some of the more advanced LangChain
    subjects and their applications. You’ll gain an understanding of some important
    processes, such as debugging LangChain and using the new LangSmith platform. You
    will gain an understanding of the power of agents and tools and see how they can
    be used to give your agent superpowers. You’ll look at out-of-the-box tools and
    create a custom tool for an agent. You’ll then learn about memory in the context
    of creating **large language model** (**LLM**)-powered conversational experiences
    and see how this can be implemented with LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter aims to build on the previous chapter by looking at more advanced
    concepts, enabling you to create more complex LangChain applications.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Debugging and monitoring LangChain
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leveraging LangChain agents
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Exploring LangChain memory
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We will be using ChatGPT extensively in this chapter, so you will need to sign
    up with a free account. If you haven’t created an account, go to [https://openai.com/](https://openai.com/)
    and click **Get Started** at the top right of the page or go to [https://chat.openai.com](https://chat.openai.com).
  prefs: []
  type: TYPE_NORMAL
- en: 'The examples require Python 3.9 and Jupyter Notebook to be installed, both
    of which you can download from [https://jupyter.org/install](https://jupyter.org/install).
    Jupyter Notebook is also included with Anaconda. You can find this chapter’s code
    in this book’s GitHub repository: [https://github.com/PacktPublishing/ChatGPT-for-Conversational-AI-and-Chatbots/chapter6](https://github.com/PacktPublishing/ChatGPT-for-Conversational-AI-and-Chatbots/chapter6).'
  prefs: []
  type: TYPE_NORMAL
- en: Debugging and monitoring LangChain
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: By now, you’ve probably realized that even with the simpler chains, there is
    still a lot going on with LangChain under the hood. Often, when you’re constructing
    your prompts from different sources, you’ll need to see what the inputs and outputs
    of your language model are to understand and iterate on them.
  prefs: []
  type: TYPE_NORMAL
- en: So, it’s important to see what’s going on inside your application so that you
    can build, monitor, and debug your application. LangChain offers several different
    ways to achieve this.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s explore these options to gain a clearer understanding of how they can
    enhance your application’s functionality. We’ll start with the simplest options
    and progress to the most comprehensive option: LangSmith.'
  prefs: []
  type: TYPE_NORMAL
- en: Understanding tracing techniques
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LangChain offers some simple ways to output the different steps of a chain.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you’re working on the examples that are presented in this book using Jupyter
    Notebook or by simply running Python scripts, you have a few options to provide
    tracing output:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Verbose**: Setting **verbose** to **True** creates a global setting and will
    output the steps of a chain at the highest level so that we can see the different
    LLM calls that are occurring. You can set this as follows:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE129]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Debug**: Setting **debug** to **True** creates a global setting that outputs
    all the inputs and outputs generated by components with callback support (chains,
    agents, models, tools, and retrievers) and gives the most comprehensive information:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE130]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Verbose logs**: You may also want to activate verbose logs on a specific
    chain as the global output can be too much if you’re working with multiple chains.
    If you’re using a chain object, then this can be achieved as follows:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE131]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Callbacks**: If you’re using LCEL to create your chain and you want to set
    **verbose** to **True**, then you’ll need to use callbacks. In the following code
    example, we’re passing in the config with **ConsoleCallbackHandler** when we call
    **invoke** on **chain**:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE132]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The preceding code creates a chain of runnables and then invokes it. We use
    the **|** operator to chain two runnables. This means that the output of **fun_1**
    will be passed as the input to **fun_2**. Here, **runnable.invoke(1, config={''callbacks'':
    [ConsoleCallbackHandler()]})** invokes the chain starting with input 1\. The configuration
    specifies that **ConsoleCallbackHandler** should be used.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'The output will show each step of the chain as it’s run. Part of the output
    can be seen here:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE133]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: These techniques are fine if you’re still developing using a notebook or Python
    script. However, if you want to persist your logs, you require more granular information
    and an intuitive interface, or you’re looking to go into production with your
    application, it’s probably time to look at using LangSmith. We’ll cover this in
    the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Introducing LangSmith
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LangSmith is currently an early product in beta. Along with being an early release,
    it is the new tool for working with LangChain and it’s likely to be something
    you’ll work with a lot. It simplifies debugging, testing, monitoring, and evaluating
    your LangChain project. This section will only briefly introduce LangSmith, so
    you’re encouraged to look at the documentation as it is being constantly updated.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up LangSmith
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Getting started with LangSmith involves a few straightforward steps:'
  prefs: []
  type: TYPE_NORMAL
- en: First, you’ll need to create a LangSmith account and generate an API key.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Visit the LangChain website at [smith.langchain.com](http://smith.langchain.com).
    Follow the instructions on the site to sign up and create a new account.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Once your account has been created, log in to the LangSmith console using your
    new credentials.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: After logging in, navigate to the **Settings** page within the LangSmith console.
    Here, locate the option to create an API key and generate one.
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Next, you need to configure your development environment so that they can integrate
    with LangSmith. This is simply a case of setting the following variables:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE134]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Once you have set these up, each run will mean that the respective traces will
    be logged to your default project. A **run** represents a single unit of work
    within your application.
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s easy to target a specific project by setting the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE135]'
  prefs: []
  type: TYPE_PRE
- en: You can then look at each run and drill down into the specifics of each to see
    exactly what occurred in each step.
  prefs: []
  type: TYPE_NORMAL
- en: Leveraging LangChain agents
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: LLMs are incredibly powerful, but they also have some fundamental flaws. We’ve
    discussed their limitations extensively; remember that they only have knowledge
    up to when their training data was cut off for ChatGPT, which was in late 2021\.
    Surprisingly, technology this advanced is also not very good at other computational
    tasks, such as basic math, logic, or even the ability to look up other information
    that they don’t know about.
  prefs: []
  type: TYPE_NORMAL
- en: To compensate for these drawbacks, we need another technique or method to help
    out where our LLM needs assistance. These solutions are called **agents,** and,
    in this section, we’ll look at what they are, how they work, and how to use them
    with LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: What is an agent?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Agents provide tooling for LLMs to carry out tasks that they can’t carry out
    themselves effectively. There are several different types of agents that are designed
    to work with different models, such as OpenAI LLMs, and provide support for different
    tasks and use cases, such as XML or JSON handling.
  prefs: []
  type: TYPE_NORMAL
- en: Each type has specific use cases and it’s worth looking at the LangChain information
    about each agent so that you can decide which one is best for your use case.
  prefs: []
  type: TYPE_NORMAL
- en: 'To create an agent, we need to consider three different components:'
  prefs: []
  type: TYPE_NORMAL
- en: LLM
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A tool to carry out a task
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An agent to control the task
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The LLM will handle understanding and generating responses, the specialized
    tool will execute specific tasks, and the agent will orchestrate these tasks.
  prefs: []
  type: TYPE_NORMAL
- en: What are LangChain tools?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LangChain tools allow agents to carry out their defined tasks by interacting
    with external systems. A tool consists of a schema for the tool with information
    about what inputs the tool expects and a function to call to carry out the task.
    LangChain provides lots of built-in tools and lets you create custom tools, something
    you’ll likely want to do at some point. Along with individual tools, LangChain
    also provides the concept of toolkits, which are groups of tools you can use to
    carry out specific tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at what makes up a tool:'
  prefs: []
  type: TYPE_NORMAL
- en: A name and description to document its intended usage
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A JSON schema to define input parameters
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A run function that gets called with inputs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A **return_direct** flag indicating if outputs should go to the user
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s important to include as much of this information as possible and keep tools
    simple so that they’re easy for the LLM to use. The name, description, and schema
    will all be used in the prompt to the LLM so that it knows what action to take.
    These need to be clear and concise.
  prefs: []
  type: TYPE_NORMAL
- en: An introduction to OpenAI tool calling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before we dive into the next example, it’s important to cover OpenAI functions/tools
    so that we understand why they exist and how they can be used. Just to confuse
    matters, these used to be called **functions** but now they are called **tools**,
    which makes more sense.
  prefs: []
  type: TYPE_NORMAL
- en: Before function calling was released, you would ask ChatGPT a question such
    as “*What’s the latest news in London?*” and you wouldn’t get a useful response.
    As we know, it’s no good at returning up-to-date information because it’s not
    connected to the internet and can’t pull or scrape data.
  prefs: []
  type: TYPE_NORMAL
- en: We could write some code to go and call a news service, but we’d need to pass
    the location and any other parameters and go back to our conversation. This isn’t
    easy to do, especially if we want to use parameters from the conversation to call
    our service.
  prefs: []
  type: TYPE_NORMAL
- en: 'Function calling was created and is supported by the ChatGPT Turbo and GPT4
    models to overcome these problems and provide an easy way to answer questions
    by easily calling external APIs and extracting structured data. These models are
    trained to look at the functions and intelligently decide when to call them. The
    basic process to implement functions is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Trigger the model with a user query and predefined functions. The model may
    call functions, generating a JSON object with possible imaginary parameters.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Decode the JSON in your code and execute the function with any given arguments.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Input the function’s response back to the model so that it can be summarized
    for the user.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s look at a simple example.
  prefs: []
  type: TYPE_NORMAL
- en: Looking at a simple OpenAI tool example
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We pass our function definitions to our chat completion via the **tools** parameter
    on a chat completion call, which accepts an array of tools represented in standard
    **JSON** format. The following is a definition for a tool that ChatGPT will hopefully
    consider and call to get the latest news articles about a specific topic:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE136]'
  prefs: []
  type: TYPE_PRE
- en: We provide the name of the tool, which will force our function to be called
    by the model and provide as detailed a description as possible. Remember that
    this description will be used in the context of the prompt, so the more accurate
    and detailed it is, the better. When it comes to tools, try and describe what
    your function is going to do as this is how the model has been trained. Then,
    we add the description for the parameters that we are going to send to the function.
    In our case, we are passing a **topic** string.
  prefs: []
  type: TYPE_NORMAL
- en: Now, when we try a chat completion by asking our ChatGPT model about the latest
    news in London, the model will know to call our function with the specific parameters
    we’ve defined in the tool definition. If we had more parameters defined in our
    tool, ChatGPT would ask clarification questions until it has all the information
    it requires.
  prefs: []
  type: TYPE_NORMAL
- en: 'The tools are passed into our completion call as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE137]'
  prefs: []
  type: TYPE_PRE
- en: Notice that we have set **tool_choice** to **auto**, which tells ChatGPT to
    decide whether to use a tool.
  prefs: []
  type: TYPE_NORMAL
- en: 'This should output something like the following, showing **ChatCompletionMessage**
    with no content specified. However, we should have **ChatCompletionMessageToolCall**
    in our tool calls for our function. We also have the **topic** argument and our
    function’s name:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE138]'
  prefs: []
  type: TYPE_PRE
- en: 'Here, we can see that ChatGPT has decided to call our function; we can do some
    tests if it decides otherwise. If we change our question to something like “*Explain
    quantum physics*,” then we should get **ChatCompletionMessage** with content answering
    the question:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE139]'
  prefs: []
  type: TYPE_PRE
- en: As we can see, ChatGPT decides on the tools to be used to satisfy this question
    and lists these in our **tool_calls** list. We can cycle through this and call
    each function with arguments if ChatGPT has extracted these from our question.
    After, we can add the results to our messages list and let ChatGPT summarize the
    results for the user.
  prefs: []
  type: TYPE_NORMAL
- en: 'Don’t forget that you can also set **tool_choice={"type": "function", "function":
    {"name": " another_response_function"}}** in our chat completion call to force
    ChatGPT to use a specific function instead of letting it decide for itself.'
  prefs: []
  type: TYPE_NORMAL
- en: The other powerful application of functions/tools is to make it easy to get
    ChatGPT to create deterministic, perfectly formed data. In [*Chapter 2*](B21100_02.xhtml#_idTextAnchor057),
    we were prompting for user utterances or datasets in JSON. We can now use tools
    to create perfect output by creating a function definition to do this for us.
    I recommend that you take a look at some of the training data creation tasks in
    [*Chapter 2*](B21100_02.xhtml#_idTextAnchor057) and create a tool to achieve the
    same outcome.
  prefs: []
  type: TYPE_NORMAL
- en: A lot is going on with OpenAI functions, but this should at least give you enough
    understanding of the benefits and steps involved in using them. Now, let’s look
    at LangChain tools and see where LangChain streamlines the use of OpenAI functions.
  prefs: []
  type: TYPE_NORMAL
- en: Plug-and-play LangChain tools for immediate integration
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LangChain provides a lot of out-of-the-box tools, which makes it easy to provide
    tools for your agent. You can find these listed at [https://python.langchain.com/docs/integrations/tools/](https://python.langchain.com/docs/integrations/tools/)
    in the docs, which are created and maintained by vendors and community members.
    They cover a wide range of functionalities, from search engines to ways to interact
    with filesystems and ways to interact with big cloud services vendors such as
    Google Drive.
  prefs: []
  type: TYPE_NORMAL
- en: An out-of-the-box tool example
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s look at one of my favorite tools: the Tavily Search API. Tavily Search
    is a search engine that’s optimized for LLMs to provide the best search results.
    So, it’s a good example of an LLM tool and one that you’re likely to use. While
    looking at how to create this tool, it’s also useful to look at its details so
    that we can understand what components make for an effective tool. First, we need
    to install the required libraries:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE140]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, import the library and create the API keys that we’ll need:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE141]'
  prefs: []
  type: TYPE_PRE
- en: 'Now, we can create the tool by creating an instance of the **TavilySearchAPIWrapper**
    class, which acts as a wrapper around the Tavily Search API. We can pass this
    instance into our **TavilySearchResults** class:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE142]'
  prefs: []
  type: TYPE_PRE
- en: 'You can inspect the different properties of the tool by printing them out via
    **print(tavily_tool.name), print(tavily_tool.description), print(tavily_tool.args)**,
    and most importantly carry out a search by calling **invoke()**:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE143]'
  prefs: []
  type: TYPE_PRE
- en: 'When you run this, you should get a response that contains up-to-date information
    on the search. You should see an output similar to the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6.1 – Tavily Search output](image/B21100_06_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.1 – Tavily Search output
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we’ll look at how to use the tool with an agent.
  prefs: []
  type: TYPE_NORMAL
- en: Using our tool with an agent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'At this point, we’ve created a tool, but we aren’t using it yet. To do this,
    we need to create an agent. In our example, we’re using an OpenAI Functions agent.
    We covered OpenAI functions in the previous section; in this section, we’ll see
    how easy it is to implement this with LangChain. The agent can be created using
    the **create_openai_functions_agent()** function, which takes three arguments:'
  prefs: []
  type: TYPE_NORMAL
- en: '**llm**: A language model that supports OpenAI’s function calling API'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**tools**: A list of tools that the agent can use'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**prompt**: A prompt that the agent will use'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We pass these three parameters to create our agent:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE144]'
  prefs: []
  type: TYPE_PRE
- en: 'Now that we have this agent, we’ll need to create an **AgentExecuter** class
    to run it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE145]'
  prefs: []
  type: TYPE_PRE
- en: 'We should then be able to call the **invoke()** function and return some results
    that contain up-to-date information:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE146]'
  prefs: []
  type: TYPE_PRE
- en: If you print out the result, you should get an answer to the question with up-to-date
    information showing that our agent and tool are working correctly. Remember to
    look at the logs in Langsmith so that you can follow what’s going on there.
  prefs: []
  type: TYPE_NORMAL
- en: You can go even further with LangChain’s plug-and-play tools by using the toolkits
    provided by the LangChain ecosystem. These toolkits offer collections of tools
    that are designed to be used together for specific tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve looked at a prebuilt toolbox and covered agents, you can see
    how powerful LangChain agents are. You’re encouraged to look at some of the other
    tools and agent types at [https://python.langchain.com/docs/integrations/tools/](https://python.langchain.com/docs/integrations/tools/).
  prefs: []
  type: TYPE_NORMAL
- en: You’ll likely have a requirement that needs a different type of tool. The good
    news is that it’s also easy to create custom tools. Let’s dive in and look at
    a specific example so that you understand the steps involved.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a custom weather tool
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For our example, we’re going to create a custom tool to get the current weather
    for a location using Open-Meteo, the free weather API Meto.
  prefs: []
  type: TYPE_NORMAL
- en: Our tool will take two arguments, **latitude** and **longitude**, so that we
    can look up the weather for a specific location. Both arguments are required.
  prefs: []
  type: TYPE_NORMAL
- en: 'The first thing to consider is that we need an agent type that supports multiple
    inputs. So, let’s go with **StructuredChatAgent**. Let’s jump into the code:'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, import the necessary modules. The script imports various Python modules,
    including those for making HTTP requests, handling data, and specific LangChain
    components for tool and agent creation:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE147]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Set up the necessary environment variables for OpenAI and LangChain API, your
    LangSmith key for logging, as well as other config details.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'LangChain tools are just functions that we call from our agent. To create one,
    we must follow the same basic pattern. This involves subclassing **BaseTool**,
    implementing **run()**, and passing instances of our tools when creating the agent.
    The custom tool class, **GetWeatherByLocationTool**, extends the **BaseTool**
    class, providing it with specific functionality to fetch weather information based
    on latitude and longitude. We must also provide a name and description so that
    our LLM knows how and when to use the tool:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE148]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: This tool’s **_run()** method performs the actual logic to fetch weather information
    using the Open-Meteo API and returns the results as a string.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Now that we’ve created our tool, we can initialize the language model and the
    custom tool, and then create the agent using the **create_structured_chat_agent()**
    function, which combines the language model with the tool for handling specific
    queries:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE149]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Create an **AgentExecutor** class, which is responsible for executing the agent
    with the provided tools. Then, invoke the agent with a specific query, like so:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE150]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Hopefully, when you’ve run this, you’ll get something like the following:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE151]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The cool thing is that we’re passing in a location and the LLM knows the latitude
    and longitude coordinates to use for that location and uses these in the call
    to the custom tool.
  prefs: []
  type: TYPE_NORMAL
- en: With this, you’ve seen how powerful LangChain agents are when to create a custom
    tool, as well as rely on some of the powerful out-of-the-box tools. The possibilities
    are endless!
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we’ll look at a more advanced requirement for your ChatGPT-powered
    agents, which is to give them memory. We’ll learn how to achieve this with LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: Exploring LangChain memory
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As we work with LLMs, a key challenge emerges as they cannot inherently recall
    past interactions. So, in essence, they are stateless. A stateless operation won’t
    persist information from one request to the next, which is a problem if you want
    to create a chatbot. The way around this is to add the full conversation to the
    context. The ChatGPT client itself will be passing the full conversation into
    each prompt as it progresses.
  prefs: []
  type: TYPE_NORMAL
- en: What we want our ChatGPT applications to do is offer stateful interactions where
    information is remembered across requests and sessions. To achieve this, we need
    to use a memory mechanism. Different representations of memory will then be included
    in an LLM prompt. This section is dedicated to exploring the concept of memory
    in the context of LLMs. We will delve into different types of memory and the challenges
    you’ll face in using memory with LLMs before taking a deep dive into how to use
    LangChain to provide memory capabilities to ChatGPT-powered applications.
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: The ChatGPT UI uses memory under the hood, introducing state by passing the
    message history every time a prompt is provided. This also allows you to select
    and restart previous conversations.
  prefs: []
  type: TYPE_NORMAL
- en: Exploring the different types of memory applications
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you think about having a conversation – whether this is just chatting about
    a subject, a more personal conversation, or a conversation to achieve a transactional
    outcome – it quickly becomes apparent that there could be different types of memory
    at play. The obvious need for memory is to store what has been said during an
    active conversation. However, other memory specifics that might be needed are
    a memory of historical conversations, a memory of specific information related
    to a user, or knowledge of a specific subject matter related to a user or application.
    Let’s look at the different memory types in the context of a working conversation.
  prefs: []
  type: TYPE_NORMAL
- en: Memory in active conversations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'One of the following forms of memory comes into play within an active conversation:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Conversational buffer memory**: This memory type archives the entire text
    of ongoing dialogs, including all inputs and responses. It preserves the full
    context of the conversation so that it can pass each prompt to the LLM.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Conversational buffer window memory**: A more complex version of buffer memory,
    this maintains only a specified number of the most recent interactions, discarding
    older ones or combining them as a summary. It functions as a short-term memory,
    optimizing token usage as a conversation progresses over multiple turns.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Historical memory
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Historical memory can be broken down into two types:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Past conversations**: This includes long-term memory, which could be previous
    conversations and sessions for this specific user. This user will likely be known
    to your agent through authentication. Historical conversations can be as simple
    as a list of previous interactions, or they may be a more complex implementation
    where interactions are queried before use.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Past conversations summary**: This method builds on historical memory and
    condenses previous interactions before integrating them into the model’s history.
    It’s designed to decrease token use and streamline memory management while preserving
    essential elements of the conversation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Personalized memory
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Personalized memory may encompass broader information such as user preferences
    and historical data organized either in structured formats such as knowledge graphs
    or unstructured formats such as document collections. This type of memory may
    also provide memory bank mechanisms to fine-tune the memory to provide the best
    support to the LLM.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding memory challenges
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For all these different types of memory, the key resource we must consider is
    the context window size of the LLM we are using. This will determine the size
    of the working conversation, including the prompt and result, so each of these
    types of memory that you choose to implement will need to be considered in the
    overall size of the context window. As a ChatGPT developer, you need to treat
    this context window size as a finite resource, so deciding what information should
    be within this window can become a challenging aspect of creating complex LLM
    applications.
  prefs: []
  type: TYPE_NORMAL
- en: The good news for the development of your ChatGPT applications is that OpenAI
    has released increasingly large context windows for their models. For example,
    the latest GPT-4 model supports more than 32k tokens, which is roughly 24k words.
  prefs: []
  type: TYPE_NORMAL
- en: 'The bad news is that having bigger, increasingly larger contexts may not guarantee
    improved performance. The following are some other factors that may influence
    response accuracy or have other ramifications:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Position**: The relative position of the information may influence the results,
    so strategically placing the most important information at the beginning or end
    of the context window could improve the model’s output'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Clarity**: A larger context may mean accuracy declines. It’s wise not to
    take the attitude that the bigger the context available, the more you can add
    to it. Loading up as much information as you can may result in less accurate or
    relevant responses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Knowledge precedence**: Many LLM implementations will involve domain-specific
    knowledge. As an LLM developer, you may need to decide whether this knowledge
    takes precedence over conversational memory when context memory resources are
    at a premium.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cost**: Despite OpenAI’s attempts to reduce costs with each released GPT
    model, these larger contexts enable you to use more tokens and costs can skyrocket
    as a result if you’re not careful.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: When using memory, consider not only selecting the appropriate information but
    also structuring the information in a way that enhances model performance.
  prefs: []
  type: TYPE_NORMAL
- en: Introducing memory usage techniques
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are several techniques you can use to manage memory that have varying
    degrees of complexity and ease of implementation, with some looking to streamline
    active conversational memory and others looking to assist with history and knowledge.
    Let’s look at the different memory usage techniques we can use:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Rolling active conversation memory**: The rolling window technique maintains
    a dynamic window of the most recent interactions or messages, ensuring that the
    model remains focused on the most current context. The following figure shows
    the process of this type of memory implementation:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 6.2 – The rolling conversational memory process](image/B21100_06_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.2 – The rolling conversational memory process
  prefs: []
  type: TYPE_NORMAL
- en: As new messages arrive, older data is removed from the window, effectively limiting
    the model’s exposure to past messages. This approach is both straightforward and
    efficient. However, this is a basic approach, and it carries the risk of discarding
    valuable message history in the context without having any way of knowing what’s
    just been removed and how this will affect the conversation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Incremental summary of active conversation memory**: This approach extracts
    the key takeaways from a conversation as a summary and feeds this to the context
    instead of the entire dialog, along with the most recent messages. This method
    reduces the risk of data loss and allows for a concise summary while still keeping
    the theme of the conversation. The following figure shows the incremental memory
    implementation process:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 6.3 – The incremental summary technique](image/B21100_06_3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.3 – The incremental summary technique
  prefs: []
  type: TYPE_NORMAL
- en: However, If you’re summarizing content over multiple conversation calls, this
    can cause a steady dilution of the nuances of the conversation. Additionally,
    creating these summaries will need further LLM calls, increasing computational
    costs
  prefs: []
  type: TYPE_NORMAL
- en: '**Enhancing context with a memory bank**: There’s an emerging technique known
    as a memory bank, which is a memory mechanism tailored for LLMs. This type of
    implementation will recall multi-turn conversations, personal information, and
    summarized events from its memory storage mechanism. The following figure outlines
    the process that’s involved in using a memory bank:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 6.4 – Memory bank technique](image/B21100_06_4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6.4 – Memory bank technique
  prefs: []
  type: TYPE_NORMAL
- en: The application will manage what’s stored and forgotten by using a memory updater
    inspired by the Ebbinghaus Forgetting Curve theory, all while using its LLM calls
    to decide what to use in the current conversation, hence continually evolving
    its context. Bringing all this together should hopefully provide a much more personalized
    experience. Implementing an application with a memory bank would be a complex
    undertaking.
  prefs: []
  type: TYPE_NORMAL
- en: In the *Understanding memory challenges* section, we outlined that there may
    be some issues with larger contexts. It may be that a model with a 4k token limit
    is just not going to be enough to support everything you need to fit into the
    context, so it may be a good idea to look at a GPT model with a larger context.
  prefs: []
  type: TYPE_NORMAL
- en: One of the easiest ways to overcome memory constraints is to break more complex
    tasks into smaller prompts. This technique helps simplify complex prompts and
    often gets better results.
  prefs: []
  type: TYPE_NORMAL
- en: Hopefully, you now understand memory in terms of creating conversational experiences
    and some of the available techniques and can appreciate some of the challenges
    and complexities of adding memory. In the next section, we’ll see how LangChain
    can be used to add memory to an LLM application.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding an example of using memory in LangChain
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In its simplest form, a conversational system must have the capacity to directly
    access a range of past interactions so that they can be used to display conversation
    history in a chat interface or – in our case – passed to the LLM. In this example,
    we’re going to look at using LangChain memory for a simple conversational interface
    for a live music assistant. The main aim is to show how we can use memory in a
    simple conversational application.
  prefs: []
  type: TYPE_NORMAL
- en: LangChain provides several different integrations for supporting memory, from
    in-memory to persistent databases. In the following example, we’ll be using the
    **ConversationBufferMemory** class, which is the most basic form of memory in
    langChain.
  prefs: []
  type: TYPE_NORMAL
- en: 'Fundamentally, our memory system should facilitate two primary functions: reading
    and writing to memory.'
  prefs: []
  type: TYPE_NORMAL
- en: After receiving initial inputs from the user and before initiating its core
    logic, a chain reads from its memory system so that previous interactions can
    be used in the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Once the core logic has been executed but before delivering the response, the
    outputs and inputs are written to memory by the chain. This action ensures that
    this information is available for reference in future interactions. In essence,
    this is similar to the way a conventional conversational AI platform will manage
    a conversation.
  prefs: []
  type: TYPE_NORMAL
- en: 'These processes are illustrated in the following example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we must import the necessary classes from the **langchain** library
    and then initialize our model:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE152]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Next, a **ConversationBufferMemory** object must be initialized to manage the
    conversation history. The **return_messages=True** parameter ensures that the
    memory returns a list of messages when queried. By default, these are single strings:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE153]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Now, we must set up a **ChatPromptTemplate** template that structures the conversation.
    It includes a system message that defines the role of the bot (a music fan events
    chatbot), a placeholder for historical messages, and a structure for receiving
    human input.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE154]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'At this point, we can create the chain using LCEL. The chain is composed of
    a series of operations. The chain combines memory loading, prompt processing,
    and language model response generation:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE155]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: Using **RunnablePassthrough** allows you to continue adding a dictionary of
    data as you move through the steps of a chain sequentially. In this example, we
    load it into a history key to be used in the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Here, **RunnablePassthrough.assign(...)** is used to create an extra key, after
    which the conversation history is assigned to this key. Then, **RunnableLambda(memory.load_memory_variables)
    | itemgetter("history")** fetches the conversation history.
  prefs: []
  type: TYPE_NORMAL
- en: The chain then applies the prompt template and sends the processed input to
    the LLM for generating a response.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can initiate the first interaction by inputting **hi** and waiting for a
    response. We can then save the input and output in memory for context in future
    interactions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE156]'
  prefs: []
  type: TYPE_PRE
- en: 'The subsequent interactions continue. This is repeated for each new user input,
    thus maintaining the context of the conversation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE157]'
  prefs: []
  type: TYPE_PRE
- en: 'Remember to retrieve the conversation history so that we can load the stored
    conversation variables for review or further processing:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE158]'
  prefs: []
  type: TYPE_PRE
- en: This example was simple as **ConversationBufferMemory** is an in-memory store
    that stores all the interactions. LangChain offers several different memory integrations.
    In the next section, we’ll look at how these can provide better memory support.
  prefs: []
  type: TYPE_NORMAL
- en: Exploring more advanced memory types
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s look at some more advanced types of memory available in LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: In-memory stores
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Since we’re learning to create conversational experiences with ChatGPT to support
    more complexity, we’ll likely need to support multiple-turn chats. With a longer
    conversation, you can imagine that buffer size might become a concern. It might
    be wise to look at using **ConversationBufferWindowMemory**, which allows you
    to store a specific number of interactions by passing the **k** value on creation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE159]'
  prefs: []
  type: TYPE_PRE
- en: This way, you’re keeping a sliding window of the **5** latest interactions so
    that the buffer doesn’t get too large.
  prefs: []
  type: TYPE_NORMAL
- en: 'Having your conversation interactions fixed to a specific number in memory
    could be limiting, so you could look at using **ConversationSummaryMemory** to
    help with summarizing the conversation. This type of memory can be instantiated
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE160]'
  prefs: []
  type: TYPE_PRE
- en: Here, **ConversationSummaryMemory** collects and updates an overview of the
    ongoing dialog. This summary, which is stored in memory, can then be used in prompts
    or chains to provide a quick recap of the conversation so far.
  prefs: []
  type: TYPE_NORMAL
- en: You can take this even further by combining the two concepts of a conversation
    buffer and conversation summary by using **ConversationSummaryBufferMemory**.
  prefs: []
  type: TYPE_NORMAL
- en: 'This type of memory stores the latest interactions based on the token length
    that was set when you instantiated the memory. Instead of just deleting interactions
    when they are outside of the token limit, the memory stores them as a summary
    and uses them in subsequent interactions. The memory can be used in **ConversationChain**
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE161]'
  prefs: []
  type: TYPE_PRE
- en: Notice that we set **verbose=True** and **max_token_limit=150** so that we can
    see a summary and message history in memory. If we output the memory with
  prefs: []
  type: TYPE_NORMAL
- en: '**memory.load_memory_variables({}**, we should get something similar to the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE162]'
  prefs: []
  type: TYPE_PRE
- en: Notice that the summary is loaded into the system memory and that there is a
    list of **HumanMessage** and **AIMessage** object interactions stored in memory.
  prefs: []
  type: TYPE_NORMAL
- en: Using persisted memory
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The previous types of LangChain memory implementations we’ve looked at are great
    for handling live conversations. However, this memory does not persist between
    sessions. We touched on this type of approach where you can use historical conversations
    as part of your context in the *Introducing memory usage techniques* section.
    So, let’s look at how to do this with LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we’re going to use a vector store and embeddings. Don’t worry
    about the details of these concepts just yet – we’ll get into all that in the
    next chapter when we explore **retrieval-augmented generation** (**RAG**). Here,
    we’re using embeddings and vector stores to keep track of past conversation turns
    so that we can search over them.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can refer to relevant information from earlier interactions when sending
    prompts to the LLM to provide conversation history in the context. Let’s get started:'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we must install the required packages, most notably ChromaDB, which
    is the database we’ll be using for storing our embeddings:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE163]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'We must also add our imports and create our environment variables for API keys
    and LangChain configurations:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE164]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Next, we must initialize **ChatOpenAI** and **OpenAIEmbeddings** so that we
    can generate responses and embeddings, respectively:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE165]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Now, we can set up ChromaDB and our vector store. ChromaDB is an open-source
    database for managing embeddings, allowing us to store and search our embeddings.
    The vector store enables efficient retrieval of past conversation turns based
    on these embeddings. As we’ve created **PersistentClient**, notice that the Chroma
    database has been stored in an **emdeddings** folder under the current Jupyter
    Notebook folder:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE166]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Now, we must create the memory and retriever objects. The memory object stores
    conversation turns, and the retriever helps us fetch relevant past turns by the
    vector store’s default similarity search:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE167]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Next, we must save some example conversations to memory so that we can check
    whether they’re included in the context of the conversation later:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE168]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Now, we must define a template for our conversation, which includes past conversations
    as context and the current input:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE169]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The following is a friendly conversation between a human and an AI sports assistant.
    The AI is helpful and provides specific details from its context to support the
    chat. If the AI doesn’t know the answer to a question, it truthfully says it doesn’t
    know:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE170]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Finally, we must create **ConversationChain**, which combines all these components
    and sends a chat input:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE171]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Here, **verbose** is set to **True** so that we can see the LLM’s output. We’ll
    see that the conversation history is included in the prompt. If we restart our
    Jupyter Notebook kernel and run the code again, the conversation should be persisted.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: If you want to look at the documents and their embeddings stored in your Chroma
    vector store, you can output the whole collection by running **print(vector_store._collection.get(include=['embeddings']))**.
  prefs: []
  type: TYPE_NORMAL
- en: You can also try out your own similarity search by running **similar_documents
    = vector_store.similarity_search(query="your** **question", k=1)**.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we have dived deeper into LangChain, looking at some more advanced
    topics. We started by looking at debugging techniques and introduced LangSmith,
    the go-to tool for advanced logging and monitoring for LangChain applications.
    We also looked at LangChain agents and understood how to use them to provide different
    functionalities to our LLM project, as well as how they tie in with OpenAI function
    calling. We focused on the out-of-the-box tools provided by LangChain and covered
    creating custom tools by looking at practical examples to help our ChatGPT application
    answer questions about real-time news and weather. Finally, we covered the concept
    of providing memory to our agents while looking at the different types of memory,
    the challenges, and the techniques involved in providing memory in LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll look at RAG. You’ll understand what it is, the concepts
    and processes involved, and how to implement retrieval in LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The following links are a curated list of resources to help you understand
    this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: '*LangChain*: [https://www.langchain.com](https://www.langchain.com)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*LangSmith*: [https://smith.langchain.com](https://smith.langchain.com)'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '*ChromaDB*: [https://docs.trychroma.com](https://docs.trychroma.com)'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '*Lost in the Middle: How Language Models Use Long Contexts*, by F. Liu: [https://arxiv.org/abs/2307.03172](https://arxiv.org/abs/2307.03172)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*MemoryBank: Enhancing Large Language Models with Long-Term* *Memory*: [https://ar5iv.labs.arxiv.org/html/2305.10250](https://ar5iv.labs.arxiv.org/html/2305.10250)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Ebbinghaus’s Forgetting* *Curve*: [https://www.mindtools.com/a9wjrjw/ebbinghauss-forgetting-curve](https://www.mindtools.com/a9wjrjw/ebbinghauss-forgetting-curve)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Virtual context management* *implementation*: [https://memgpt.ai/](https://memgpt.ai/)'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '*LangChain* *agents*: [https://python.langchain.com/docs/modules/agents/](https://python.langchain.com/docs/modules/agents/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*LangChain* *tools*: [https://python.langchain.com/docs/integrations/tools/](https://python.langchain.com/docs/integrations/tools/)'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Part 3: Building and Enhancing ChatGPT-Powered Applications'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this part, we will explore **Retrieval-Augmented Generation** (**RAG**) systems,
    demonstrating how to use vector stores as a knowledge base. Then, we will bring
    together all the concepts covered so far to build and enhance ChatGPT-powered
    applications. You’ll work on your own practical project to create a chatbot that
    can handle complex tasks and provide personalized interactions. Finally, we will
    look into the future of conversational AI and **large language models** (**LLMs**),
    discussing the challenges of taking ChatGPT applications to production and examining
    alternative technologies and emerging trends in the field.
  prefs: []
  type: TYPE_NORMAL
- en: 'This part has the following chapters:'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Chapter 7*](B21100_07.xhtml#_idTextAnchor181), *Vector Stores as Knowledge
    Bases for Retrieval-augmented Generation*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[*Chapter 8*](B21100_08.xhtml#_idTextAnchor199), *Creating Your Own LangChain
    Chatbot Example*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[*Chapter 9*](B21100_09.xhtml#_idTextAnchor221), *The Future of Conversational
    AI with LLMs*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '7'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Vector Stores as Knowledge Bases for Retrieval-augmented Generation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Retrieval-augmented generation** (**RAG**) is easily the most common use
    case for LLMs that has emerged since the explosion of ChatGPT. In this chapter,
    we’re going to look at the key steps and concepts involved in creating a RAG system.
    Once you have an understanding of what’s involved with each step, we’ll look at
    how these processes and techniques can be carried out using LangChain. Going further,
    we’ll work through our own RAG system with a real-world example.'
  prefs: []
  type: TYPE_NORMAL
- en: This chapter aims to be an introduction to the core concepts of RAG so that
    you have a solid base for mastering it.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Why do we need RAG?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding the steps needed to create a RAG system
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Working through a RAG example with LangChain
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will be using ChatGPT extensively, so you will need to sign
    up for a free account. If you haven’t created an account, go to [https://openai.com/](https://openai.com/)
    and click **Get Started** at the top right of the page or go to [https://chat.openai.com](https://chat.openai.com).
  prefs: []
  type: TYPE_NORMAL
- en: The examples require Python 3.9 and Jupyter Notebook to be installed, both of
    which can be found at [https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb](https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: We’ll use ChromaDB as our open source vector database, so it’s advisable to
    take a look at it and familiarize yourself with Chroma ([https://www.trychroma.com](https://www.trychroma.com)).
    However, there are a lot of other different options for vector store providers.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can find this chapter’s code in this book’s GitHub repository: [https://github.com/PacktPublishing/ChatGPT-for-Conversational-AI-and-Chatbots/chapter7](https://github.com/PacktPublishing/ChatGPT-for-Conversational-AI-and-Chatbots/chapter7).'
  prefs: []
  type: TYPE_NORMAL
- en: Why do we need RAG?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: LLMs are restricted by their knowledge of the world through their training data,
    so ChatGPT doesn’t know about recent events or your own data, which severely restricts
    its ability to provide relevant answers. Things can also get worse with LLM performance
    because of hallucinations, where the LLM doesn’t have any knowledge to support
    a question, so it makes things up.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, when we talk about an LLM’s knowledge, there are two types:'
  prefs: []
  type: TYPE_NORMAL
- en: Knowledge from information that the LLM used during training.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Knowledge from information that was passed to the LLM via a prompt in the context
    of the conversation. We can call this context-specific knowledge.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, the standout use case for an LLM application, and one that I’m asked about
    the most, is how we can allow an LLM to interpret and discuss data outside of
    their training dataset. This includes accessing real-time information or other
    external data sources, such as proprietary information contained within a company’s
    document stores or databases. In effect, we need to improve our LLM’s context-specific
    knowledge, and we do this with RAG.
  prefs: []
  type: TYPE_NORMAL
- en: Any requirement where the base language model may not have the breadth or depth
    of knowledge required means we need to source contextual information from somewhere
    so that we can pass it to our LLM. We also have to be mindful of the context window
    limitations of ChatGPT and the costs involved with larger context windows. If
    you have large amounts of data, then sending big chunks to ChatGPT is going to
    increase your token usage and costs. So, the smaller and more relevant our context-specific
    knowledge is, the better.
  prefs: []
  type: TYPE_NORMAL
- en: Although we will be focusing on the context-specific knowledge of other specific
    subjects for our ChatGPT application in this chapter, remember that context-specific
    knowledge can mean anything relevant to a conversation. You were introduced to
    the mechanics of a RAG system when we looked at persisting memory in the previous
    chapter. Let’s look at the different elements of RAG in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the steps needed to create a RAG system
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To implement RAG, a sequence of steps needs to be carried out. First, we need
    to define the sources from which data will be retrieved. This could range from
    online databases, specific websites, or even customized data repositories. Then,
    we need to optimize and store this information for retrieval. Once we’ve done
    this, we can use a retrieval system to fetch the relevant information based on
    the query context. This information is then passed on to the language model during
    the prompting process. The following figure outlines the different steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.1 – Steps for creating a RAG system](image/B21100_07_01.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.1 – Steps for creating a RAG system
  prefs: []
  type: TYPE_NORMAL
- en: I appreciate that a lot is going on here, so let’s look at each step in more
    detail.
  prefs: []
  type: TYPE_NORMAL
- en: Defining your RAG data sources
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For our first step, we must identify and select the sources from which our knowledge
    data will be retrieved. This could include online databases, specific websites,
    or customized data repositories tailored to the system’s needs. Our sources could
    be in different types of file formats, such as raw HTML, PDF, PowerPoint, Word
    documents, or entire websites – it all depends on your use case.
  prefs: []
  type: TYPE_NORMAL
- en: To get the best results, you need to pre-process your data to ensure the best
    quality before starting the chunking process and other downstream tasks.
  prefs: []
  type: TYPE_NORMAL
- en: There is a lot you can do to improve your content before creating embeddings.
    This process can incur some costs, but it’s worth the investment. Once you’ve
    done it, you can use the processed content in multiple downstream tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Ideally, you don’t want to care about where your content comes from concerning
    file type; you want to be able to process them regardless of source format so
    that you can treat them in the same way. To do this, you need to break them down
    into common elements such as titles and narrative text in a readable format. The
    most common format is JSON as it’s a common and well-understood structure. This
    way, you can serialize content and extract and store metadata such as page number,
    document name, and keywords.
  prefs: []
  type: TYPE_NORMAL
- en: Every document type is different and employs different elements that we can
    use to differentiate between different types of information. For example, HTML
    has tags or we can use NLP to understand text; shorter sentences are likely to
    be titles. For PDFs and images, we can use more advanced techniques such as document
    layout detection or vision transformers.
  prefs: []
  type: TYPE_NORMAL
- en: Content processing can involve complex tasks and it’s worth considering using
    a library or service such as Unstructured. They provide some really powerful core
    open source tools and great documentation, as well as APIs to carry out more complex
    tasks, such as content extraction. They also have an enterprise service in the
    pipeline. Take a look at their documents and follow their quickstart guide for
    more information.
  prefs: []
  type: TYPE_NORMAL
- en: Preprocessing our content and generating embeddings
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once we have the dataset we’re going to use, we need to clean and prepare our
    data by splitting it into manageable chunks and creating embeddings from these
    chunks.
  prefs: []
  type: TYPE_NORMAL
- en: Chunking for effective LLM interactions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Your dataset will likely contain many documents and characters, so the first
    step of indexing your data is to get it into a reasonable size via text splitting.
    We do this for several reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: To enhance result relevance by improving embedding accuracy for later processing.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To support smaller context windows, which embedding models typically support.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So that we can provide more accurate and specific information by narrowing down
    larger text sources into smaller, more focused segments.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To reduce the volumes of contextual knowledge we’re going to pass into the LLM.
    This keeps relevance up, which affects the quality of the response and keeps costs
    down. It also allows us to use larger documents.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When you chunk your text data, big parts of text are split into smaller chunks,
    such as sections, sentences, phrases, delimiters, and even words. With an effective
    chunking strategy, we aim to break down large content into meaningful pieces that
    we can use to accurately answer a user’s query. The following figure highlights
    the different elements of a chunking strategy:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.2 – Chunking strategy](image/B21100_07_02.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.2 – Chunking strategy
  prefs: []
  type: TYPE_NORMAL
- en: 'However, chunking isn’t a one-size-fits-all solution. Designing an effective
    strategy requires careful consideration of the content you’re chunking and the
    use case for your application. Let’s take a closer look at these elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Chunk size**: Think of this as the bite-size for your LLM. Smaller chunks
    (sentences, phrases) offer granular control but can lead to information loss and
    context fragmentation. Conversely, larger chunks (paragraphs, sections) maintain
    context but might overwhelm the LLM’s capacity. Finding the sweet spot depends
    on the following factors:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LLM capabilities**: Different embedding models have different handling capacities.
    Refer to the documentation for recommended context sizes. Don’t forget that when
    the chunks are retrieved, we still need to add these to our context, so we also
    need to consider LLM context limits. Note that if you’re using GPT-4 with the
    32k content window, this is less of a problem.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Task complexity**: What sort of content are you going to be using? Longer
    documents, such as articles, or smaller ones, such as chat transcripts? Simpler
    tasks, such as sentiment analysis, might handle larger chunks, while nuanced tasks,
    such as summarization, benefit from smaller bites.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Desired level of detail**: Do you need a broad overview or a deep dive? What
    types of questions do you want to support? Tailor chunk size accordingly.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chunking methods**: How you slice the text matters. Popular methods have
    different strengths and weaknesses, so I encourage you to try different approaches
    to see what sort of results you can achieve. All of these methods are supported
    by different libraries in LangChain. The following are some popular methods:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fixed-size chunking**: Simple and efficient but risks breaking sentences
    and losing context. We use fixed-size chunking the most in the examples in this
    book.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sentence-based chunking**: Content-aware chunking allows you to split text
    into separate sentences.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Recursive chunking**: This chunking process iteratively splits text into
    smaller parts using varying criteria until chunks of a similar, though not identical,
    size are achieved, allowing for structural flexibility.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Remember, the optimal chunking strategy is unique to your LLM, task, and desired
    outcome. Experiment with different approaches, monitor performance, and refine
    your strategy to unlock the full potential of your LLM interactions.
  prefs: []
  type: TYPE_NORMAL
- en: The key takeaway is that LangChain provides some powerful out-of-the-box chunking
    tools. Now that we have our chunked data, we are ready to create our embeddings.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding embeddings – transforming text into meaningful vectors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The terms **vector** and **embedding** are closely related in the context of
    machine learning and natural language processing, but they refer to different
    concepts. First, let’s look at what a vector is:'
  prefs: []
  type: TYPE_NORMAL
- en: '**What is a vector?**: A vector is a mathematical representation of data in
    a space defined by dimensions. It is essentially an array of floating-point numbers.
    Similar to packing items into a suitcase, we store various attributes of data,
    such as height, weight, color, or word frequency, in this list. This allows us
    to feed complex information into machine learning algorithms that only understand
    numbers. This enables efficient computation, allowing algorithms to handle large
    amounts of real-world data effectively.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Different types of vectors**: There are different types, such as feature
    vectors and embeddings (the vector type we are interested in for RAG).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**They represent different things**: Vectors can represent various data types,
    from simple numerical features (such as image pixel values) to complex concepts
    such as word meanings or document topics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Encoding with meaning**: Vector values aren’t random; they hold meaning!
    For example, in word embeddings, the distance between words in the vector space
    reflects their semantic similarity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**From input to output**: Vectors can represent both input data fed into the
    algorithm and its output predictions. For instance, a vector (more on this later)
    might input some text as a vector and output a vector representing the closest
    answer to the question.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Word embeddings explained – from text to meaningful numbers
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We can create various word or sentence embeddings. However, in the context of
    RAG, we are interested in chunked sentences, and we want to understand the relationship
    between them. To do this, we can use sentence embeddings.
  prefs: []
  type: TYPE_NORMAL
- en: Sentence embeddings transform entire sentences into dense vectors of fixed size,
    capturing the overall semantic meaning. Unlike word embeddings, which represent
    individual words, sentence embeddings consider the context and relationships between
    words in a sentence. We can measure the distance between vectors to show how related
    they are.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s imagine we’re creating embeddings for the sentences “*I like eating cake*”
    and “*I’m interested in baking*” with a five-dimensional vector for each sentence.
    Note that real-world embeddings are much larger than this:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Sentence: “*I like* *eating cake*:”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Embedding**: **[0.45, -0.2, 0.33,** **0.1, -0.4]**'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sentence: “*I’m interested* *in baking*:”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Embedding**: **[0.4, -0.15, 0.35,** **0.05, -0.3]**'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In this hypothetical example, each vector represents the entire sentence’s meaning
    in a five-dimensional space. The dimensions are abstract and not directly interpretable
    but are structured in such a way that sentences with similar meanings are closer
    in this multidimensional space.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine each sentence as a point in a giant room with five invisible walls (the
    dimensions). Sentences with similar meanings will be closer together in this room,
    even though you can’t directly see those meanings.
  prefs: []
  type: TYPE_NORMAL
- en: Think of “*I like eating cake*” and “*I’m interested in baking*” as two people
    in the room. Sure, they’re doing different things (eating versus baking), but
    they both share a love of food, kind of like being in the same “*food zone*” within
    the room. This is reflected in how close their points are, even though the room
    itself is invisible.
  prefs: []
  type: TYPE_NORMAL
- en: In real-world applications, this “*room*” would have many more walls (dimensions)
    to capture even finer details of meaning. The number of dimensions can range from
    50 to 1,024, with 300 being a common choice.
  prefs: []
  type: TYPE_NORMAL
- en: The easiest way to create embeddings is to use a pre-trained model. We’ll look
    at some of these models and how we can create embeddings in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI’s text embedding models
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: OpenAI’s text embedding models have consistently been among the most popular,
    with **text-embedding-ada-002** being the most widely used. However, these models
    have been superseded by even better embedding models. **text-embedding-3-small**
    and **text-embedding-3-large** are the newest and most performant embedding models.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI’s latest advancement, Text Embeddings v3, represents a significant leap
    in artificial intelligence capabilities. This model, with its variations of “small”
    and “large,” showcases notable improvements in performance, particularly in multilingual
    embeddings and English language processing. It introduces a more efficient approach
    to handling data dimensionality without compromising accuracy thanks to the innovative
    Matryoshka Representation Learning. This optimizes the embedding process by structuring
    data in layers, like Russian nesting dolls, which enhances the efficiency and
    accuracy of language models.
  prefs: []
  type: TYPE_NORMAL
- en: There are many other embedding models outside of OpenAI, such as Google’s BERT
    and T5, Facebook’s RoBERTa, and the multilingual XLM-R. The process of using different
    models is often streamlined by LangChain. For this chapter, we’ll be concentrating
    on using the OpenAI embedding models. In the next section, we’ll see how this
    looks.
  prefs: []
  type: TYPE_NORMAL
- en: Creating embeddings with OpenAI models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are several different ways to use the OpenAI embedding models. One option
    is to call the **embeddings** API endpoint directly:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE172]'
  prefs: []
  type: TYPE_PRE
- en: 'Alternatively, LangChain provides an easy **OpenAIEmbeddings** wrapper class
    to create embeddings with the OpenAI API. Here’s a simple example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE173]'
  prefs: []
  type: TYPE_PRE
- en: 'Often, there’s no need to directly use an embedding creation service. Many
    vector stores offer a streamlined approach to both embed and store documents simultaneously.
    We will illustrate this by examining the process within ChromaDB. Now that we’ve
    covered vectors and embeddings, we can move on to the next step in our RAG process:
    storing and searching our embeddings with a vector store.'
  prefs: []
  type: TYPE_NORMAL
- en: Storing and searching our embeddings with a vector store
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now that we have our high-dimensional data vector embeddings, we need to be
    able to store them and, more importantly, search them effectively. Our vector
    database is going to play an important role in storing and searching our data.
    The following diagram illustrates this process:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.3 – Indexing our data](image/B21100_07_03.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.3 – Indexing our data
  prefs: []
  type: TYPE_NORMAL
- en: Our vector database is a specific type of database that’s been optimized to
    work with multi-dimensional vectors. Let’s look at the advantages of using this
    type of storage.
  prefs: []
  type: TYPE_NORMAL
- en: Main advantages of vector databases
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Vector databases are purpose-built to manage vector embeddings, so they provide
    several advantages:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Straightforward data management**: Vector databases provide all the **Create,
    Read, Update, Delete** (**CRUD**) actions we expect with a database. Vector databases
    also provide simple ways to carry out metadata storage and filtering so that we
    can query using additional metadata filters for finer-grained queries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Similarity search**: The main advantage of using a vector database is that
    it allows us to search our embedding based on the similarity of the meanings represented
    in our vectors. So, while a traditional database is queried based on exact matches
    or criteria, we can use a vector database to find the most similar or relevant
    data based on semantic or contextual meaning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scalability**: With most use cases, we’ll likely be working with large volumes
    of vectors. As the data volume grows, vector databases can scale horizontally
    by distributing data across multiple machines, ensuring efficient performance
    even with massive datasets.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How does a vector database work?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While traditional databases store data in rows and columns, accommodating scalar
    data types such as strings and numbers, vector databases are designed around managing
    vectors. This fundamental difference extends to their optimization and querying
    mechanisms.
  prefs: []
  type: TYPE_NORMAL
- en: In a conventional database setup, queries typically seek exact matches among
    rows based on specified criteria. Vector databases, however, employ similarity
    metrics to identify vectors closely resembling the query, diverging from the exact-match
    approach.
  prefs: []
  type: TYPE_NORMAL
- en: At the core of vector databases is the **approximate nearest neighbor** (**ANN**)
    search, which leverages a suite of algorithms to refine and accelerate the search
    process. These algorithms, which include methods such as hashing, quantization,
    and graph-based searches, are orchestrated into a pipeline to return fast, accurate
    results for the query.
  prefs: []
  type: TYPE_NORMAL
- en: Given that vector databases yield approximate results, a key consideration is
    the balance between accuracy and query speed. Higher accuracy levels often result
    in slower searches. Nevertheless, a well-optimized vector database can achieve
    remarkably fast searches without significantly compromising accuracy, striking
    an optimal balance for many applications. Vector databases employ several different
    techniques or similarity measures for comparing vectors within a database so that
    they can identify the most relevant outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Similarity measures are mathematical techniques that are used to quantify the
    resemblance between two vectors within a vector space. This enables the database
    to assess the similarity of stored vectors against a query vector. There are several
    similarity measures, with the following being some standout ones:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cosine similarity**: This measure calculates the cosine of the angle between
    two vectors, with values ranging from -1 to 1\. Here, a value of 1 indicates identical
    vectors, 0 denotes orthogonal (independent) vectors, and -1 suggests completely
    opposing vectors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Euclidean distance**: This measures the direct line distance between two
    vectors, extending from 0 to infinity. A value of 0 signifies identical vectors,
    with increasing values indicating growing dissimilarity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dot product**: This represents the multiplication of the magnitudes of two
    vectors and the cosine of the angle between them. Positive values indicate vectors
    pointing in the same direction, 0 denotes orthogonal vectors, and negative values
    suggest opposite directions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that you understand the basics of how vector databases function, the next
    step is to choose the right one for your project.
  prefs: []
  type: TYPE_NORMAL
- en: Deciding which vector database to use
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many vector databases and vendors provide open source, hosted, scalable solutions
    catering to every price point and requirement
  prefs: []
  type: TYPE_NORMAL
- en: Like selecting any persistence layer, choosing the right vector database for
    RAG systems and LangChain applications requires carefully considering several
    key factors tailored to these advanced AI frameworks.
  prefs: []
  type: TYPE_NORMAL
- en: For RAG systems, the vector database must excel in fast and accurate retrieval
    capabilities, and it must be easy to work with. Vector databases often provide
    programming-language-specific SDKs that wrap the API, which will make it easier
    for you to interact with the database in your applications.
  prefs: []
  type: TYPE_NORMAL
- en: In the context of LangChain, most of the main vector providers have already
    created integrations in the LangChain library and are part of the **langchain-community**
    packages. Just have a look at the integrations pages to find out which vendors
    have created out-of-the-box integrations and extensive documentation.
  prefs: []
  type: TYPE_NORMAL
- en: Budget considerations also play a critical role; open source vector databases
    might offer cost savings and customizability for teams willing to invest in setup
    and maintenance. However, for projects requiring seamless scalability and minimal
    operational overhead, a managed cloud-based vector database could be more appropriate,
    despite potentially higher costs. The scope and scale of a project are important
    here; it may be that you have the luxury to choose your provider or it may be
    that you’re required to look at technologies on offer from your cloud provider
    of choice.
  prefs: []
  type: TYPE_NORMAL
- en: Standout vector database providers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When it comes to vector databases, there are both open source and managed options
    available. Let’s look at a few examples:'
  prefs: []
  type: TYPE_NORMAL
- en: ChromaDB is one of the solid open source vector databases. We’ve already used
    this in this book, and we’ll use it as our go-to vector database for the rest
    of this book. Chroma is an open source embedding database that allows you to easily
    manage text documents, convert text into embeddings, and do similarity searches.
    Yes, there is a ChromaDB LangChain wrapper and retriever classes for querying.
    Other standout open source vector stores worth mentioning are Qdrant and Weaviate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pinecone** is a managed vector database platform that’s been purpose-built
    to tackle the unique challenges associated with vectors and provides everything
    you need to go into production.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Facebook AI Similarity Search** (**FAISS**), provided by Meta, is an open
    source library for swiftly searching for similarities and clustering dense vectors.
    It’s not exactly a vector database; it’s a vector index, also known as a vector
    library. It houses algorithms that are capable of searching within vector sets
    of varying sizes and complexity. FAISS is well supported in LangChain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are just a few of the vector database options available. I highly recommend
    conducting thorough research to determine the most suitable choice for your project.
    Additionally, consider exploring the vector providers featured within the LangChain
    integrations for a more comprehensive understanding of what’s available.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, we understand the sequence of steps in our RAG. We’ve learned
    how to define our data sources, preprocess our data into chunks, and create our
    embeddings with specialist models, as well as how we leverage vector databases
    to store and search. In the next section, we’ll look at an end-to-end example
    that brings all these techniques together using the LangChain framework.
  prefs: []
  type: TYPE_NORMAL
- en: Working through a RAG example with LangChain
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: LangChain provides functionality to carry out all of the steps we’ve outlined.
    So, let’s look at a RAG example while looking at how we achieve the steps with
    LangChain in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: For our use case, we’re going to look at using unstructured website data as
    the basis for our RAG system. This is a common example of a RAG application as
    most organizations have websites and unstructured data that they want to use.
    Imagine that your organization has asked you to create an LLM-powered chatbot
    that can answer questions about the content on your organization’s website.
  prefs: []
  type: TYPE_NORMAL
- en: In our scenario, we’ll explore leveraging unstructured website data as the foundation
    for our RAG system. Utilizing unstructured data from websites is a prevalent approach
    for RAG applications given that most organizations possess websites filled with
    data they wish to use. Imagine being tasked by your organization to develop a
    chatbot capable of answering queries related to the content on your company’s
    website.
  prefs: []
  type: TYPE_NORMAL
- en: For our example, we’re going to create a chatbot that can provide up-to-date
    information about New York’s economy. For our data source, we’ll use Wikipedia.
    You’re welcome to follow your own subject matter for this and even use your own
    website pages.
  prefs: []
  type: TYPE_NORMAL
- en: The first step is to load our dataset with a document loader. So, let’s dive
    in.
  prefs: []
  type: TYPE_NORMAL
- en: Integrating data – choosing your document loader
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LangChain document loaders are designed to easily fetch documents from different
    sources, serving as the initial step in the data retrieval process. LangChain
    provides access to over 100 different document loaders that cater to a diverse
    range of data sources, such as private cloud storage, public websites, or even
    specific document formats such as **HTML**, **CSV**, **PDF**, **JSON**, and code
    files.
  prefs: []
  type: TYPE_NORMAL
- en: The document loader you need will depend on your use case and requirements.
    With the options available, you can integrate data from practically any source
    into your ChatGPT application, whether that be unstructured public or private
    data from websites or cloud storage such as Google Drive. You can also load more
    structured information from many different database types or data storage providers.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to their versatility, document loaders in LangChain are designed
    to be easy to use. They offer straightforward interfaces that allow developers
    to quickly set up and start fetching documents with minimal configuration. This
    simplicity accelerates the development process, particularly when you’re creating
    proofs of concept to try out different data sources. Hopefully, this will give
    you more time to focus on more complex aspects of your application.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at a simple example of a document loader. Remember that we want
    to answer questions about New York, so our dataset needs to match the requirements.
    Wikipedia is a great source for up-to-date information, so this will suffice for
    this example. Let’s look at using **WebBaseLoader**, an **HTML** document loader,
    to pull some information from Wikipedia as the basis for our dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE174]'
  prefs: []
  type: TYPE_PRE
- en: 'Printing out the **docs** variable should result in something similar to the
    following, where **page_content** is the text data we’re going to use:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE175]'
  prefs: []
  type: TYPE_PRE
- en: Considering the unstructured HTML data we have, it may also be worth considering
    using **documentTransformer** to clean up our HTML into plain text, such as **AsyncHtmlLoader**.
  prefs: []
  type: TYPE_NORMAL
- en: Many other LangChain document loader options are purpose-built for specific
    use cases, so it’s always worth checking what’s available in Python or TypeScript.
  prefs: []
  type: TYPE_NORMAL
- en: 'For our example, we’ll use **WikipediaLoader**, which we used earlier in this
    chapter. Note that I’m keeping **load_max_docs** low for the interests of this
    example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE176]'
  prefs: []
  type: TYPE_PRE
- en: The benefit of using this is that we now have data from multiple Wikipedia pages.
    The results from **WikipediaLoader** should look pretty good, with a list of documents
    similar in structure to the **WebBaseLoader** results.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have our dataset, the next step is to index it.
  prefs: []
  type: TYPE_NORMAL
- en: Creating manageable chunks with text splitting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we discussed in the section on Chunking for Effective LLM Interactions, the
    process of text splitting can be quite complicated, requiring careful decisions
    about chunk size and the appropriate method to use. Fortunately, LangChain provides
    easy-to-use interfaces and integrations for several modules that can be used to
    “chunk” or split our document dataset so that it’s ready for further processing.
  prefs: []
  type: TYPE_NORMAL
- en: LangChain’s text-splitting algorithms are designed to be versatile and efficient,
    ensuring that the integrity and context of the original document are maintained
    while optimizing it for retrieval. This involves considering factors such as the
    nature and format of the text, the logical divisions within the document, and
    the specific requirements of the retrieval task at hand.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing text splitting in LangChain can be done by using one of the out-of-the-box
    splitters, which provide different ways to split depending on the dataset itself.
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: One fantastic tool for understanding different chunking strategies and evaluating
    the results of chunking your text is [https://chunkviz.up.railway.app](https://chunkviz.up.railway.app).
    It’s a brilliant way to see how your text is split based on the LangChain utility
    and different parameters such as chunk size and overlap.
  prefs: []
  type: TYPE_NORMAL
- en: For this use case, we’re going to use **RecursiveCharacterTextSplitter** to
    chunk our text. The **RecursiveCharacterTextSplitter** utility is designed to
    efficiently segment text into manageable pieces. It looks for predefined separator
    characters such as newlines, spaces, and empty strings. The result should be chunked
    text broken down into paragraphs, sentences, and words, where the text segments
    preserve the meaning of related text segments. The utility dynamically divides
    text into chunks, targeting a specific size in terms of character count. Once
    a chunk reaches this predetermined size, it’s earmarked as an output segment.
    To ensure continuity and context are maintained across these segments, adjacent
    chunks feature a configurable degree of overlap.
  prefs: []
  type: TYPE_NORMAL
- en: Its parameters are fully customizable, offering flexibility to accommodate various
    text types and application requirements.
  prefs: []
  type: TYPE_NORMAL
- en: It’s a good solution for breaking down large volumes of text into smaller, semantically
    meaningful units.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is our example code, which uses **RecursiveCharacterTextSplitter**. This
    is recommended for generic text:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE177]'
  prefs: []
  type: TYPE_PRE
- en: 'We can create our **RecursiveCharacterTextSplitter** class with attributes
    that we wish to control, including **chunk_size**, which ensures manageable sizes
    for processing, and **chunk_overlap**, which allows for character overlap between
    chunks, maintaining context continuity. If you change the chunk size, you’ll be
    able to create a document list with more entries. You can look at one of the split
    documents by running the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE178]'
  prefs: []
  type: TYPE_PRE
- en: 'With **RecursiveCharacterTextSplitter**, we’ve broken down our large text content
    into smaller, meaningful units. This prepares our data for further processing
    and analysis. Now that we’ve explored text splitting, let’s delve into how we
    can use our chunks to create embeddings:'
  prefs: []
  type: TYPE_NORMAL
- en: Creating and storing text embeddings
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have chunks of manageable data, it’s time to create embeddings from
    these chunks and store them in our vector database. For this example, we’re going
    to use ChromaDB as our vector store.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, we’re going to create our embeddings from the **langchain_openai** and
    **langchain.vectorstores** libraries, which allow us to call the OpenAI embeddings
    service and store them in ChromaDB. Follow these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'First, we must initialize an instance of the **OpenAIEmbeddings** class with
    our specific model, **text-embedding-3-small**:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE179]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The **docs_vectorstore = Chroma(...)** line creates an instance of the Chroma
    class, which is used to store document vectors. The following parameters are provided
    to Chroma:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**collection_name="chapter7db_documents_store"**: This specifies the name of
    the collection within Chroma where the document vectors will be stored. Think
    of it as naming a table in a database where your data will be kept.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**embedding_function=embeddings_model**: Here, the previously created **embeddings_model**
    is passed as the embedding function. This tells Chroma to use the **OpenAIEmbeddings**
    instance to generate embeddings for documents before storing them. Essentially,
    whenever a document is added to Chroma, it will be passed through this embedding
    model to convert the text into a vector.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**persist_directory="chapter7db"**: This parameter specifies the directory
    where Chroma will persistently store its data. This allows the vector store to
    maintain its state between program runs. In our case, it will be a folder where
    we’re running our Jupyter Notebook:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE180]'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
- en: 'We can then pass in our previously split documents by calling **add_documents()**.
    After, we can persist everything by calling **persist()** on our Chroma instance:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE181]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Now, we can conduct a search to see if we get any results back. We’ll do this
    by carrying out a similarity search on the Chroma instance by calling **similarity_search**
    with our text query. Try a question related to New York’s economy:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE182]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: You should be able to print out search results for your query. Now, let’s look
    at bringing our RAG system together with LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: Bringing everything together with LangChain
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now that we have our Chroma document store returning results, let’s learn how
    to bring all our RAG elements together using LangChain so that we can create a
    system that’s capable of answering questions based on information in our documents:'
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll begin by importing the necessary classes from the **langchain_openai**
    and **langchain_core** libraries, as well as the variables we need to log in to
    LangSmith. Then, we need to create an instance of the **ChatOpenAI** class so
    that we can leverage GPT-4 to generate our answers:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE183]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Setting the temperature to **0.0** makes the model’s responses deterministic,
    which is often desirable for consistent QA performance.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Now that our Chroma document store has been set up, we can initialize a retriever
    to fetch relevant documents based on our query:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE184]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The retriever is configured to return the top **5** documents that match a query.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Next, we need to create a prompt template that tells the language model how
    to utilize the retrieved documents to answer questions:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE185]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'This template helps the model provide sourced answers from our data or instructs
    us to indicate when information is unavailable:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![Figure 7.4 – Prompt passed to the LLM](image/B21100_07_04.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.4 – Prompt passed to the LLM
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, implement a function to format the retrieved documents so that they can
    be included in the prompt:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE186]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: We’ll use this function to organize document content and sources into a readable
    format when they’re included in our prompt.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Now, we must use LCEL to create our question-answering pipeline. This setup
    allows us to directly apply formatting to the retrieved documents and streamlines
    the flow into the prompt generation and answer production stages:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE187]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Here’s what each part of this pipeline does:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Processing with **RunnablePassthrough** and document retrieval: **{"chroma_documents":
    retriever | format_docs, "question": RunnablePassthrough()}**: This dictionary
    sets up two parallel streams. For **chroma_documents**, documents are retrieved
    via **retriever** and then immediately formatted with **format_docs**. For **question**,
    **RunnablePassthrough()** is used to simply pass the question through without
    any modification. This approach efficiently prepares both the formatted documents
    and the question for the next step.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Prompt application: **| prompt**: The processed information (both question
    and formatted documents) is then piped into the prompt. This step utilizes **ChatPromptTemplate**
    to combine the question with the formatted documents according to the predefined
    template, setting the stage for the LLM to generate an answer.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Language model generation: **llm**: Here, the combined input from the previous
    step is fed into the language model (GPT-4) initialized earlier. The model generates
    a response based on the prompt, effectively answering the question with the help
    of information extracted from the retrieved documents.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Output parsing: **| StrOutputParser()**: Finally, the output from the language
    model is parsed into a string format by **StrOutputParser()**. This step ensures
    that the final answer is easily readable and formatted correctly.'
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Finally, we can invoke the pipeline with a question and print the answer:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE188]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'This search should return something similar to the following, including an
    answer and sources:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE189]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: By following these steps, you’ve constructed a RAG system that’s capable of
    answering questions about New York’s economy with up-to-date information from
    Wikipedia. Try some other questions and see how the FAQ performs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Remember that it’s useful to look at the debugging output in LangSmith so that
    you can see what’s going on in each step of LangChain. In the following screenshot,
    we’ve drilled down into the LangSmith prompt template output so that we can see
    the documents we’ve retrieved and passed into the LLM prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7.5 – Using LangSmith to see what’s going on under the hood](image/B21100_07_5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7.5 – Using LangSmith to see what’s going on under the hood
  prefs: []
  type: TYPE_NORMAL
- en: First, we loaded our documents from Wikipedia based on our subject criteria,
    chunked this data, and created embeddings that we’ve stored in our vector store.
    Then, we defined a retriever to query our store, passed the document search results
    to an LLM prompt, and handed over to our LLM to get an accurate response to our
    question while listing sources and safeguarding against hallucinations. This was
    brought together with a LangChain defined in LCEL.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we looked at what RAG systems are and why we need them. Then,
    we covered the steps we must follow to create a RAG system in detail. At this
    point, you should know how to select and pre-process data with chunking, as well
    as what vectors and embeddings are and how to create them with specialized models
    so that you can store them with a specific type of database for storing vectors.
    Finally, we created a RAG system, working through each step with a real-world
    example before bringing it all together with LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll look at a more complex ChatGPT-powered, real-world
    LangChain application in more detail. We’ll be utilizing some of the core concepts
    from previous chapters as well as what we’ve learned about how to implement RAG
    in this chapter. We’ll aim to create a more complex chatbot that supports memory,
    RAG, and more specific capabilities powered by LangChain tools.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The following is a curated list of resources to help you understand the material
    provided in this chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: 'LangSmith: [https://smith.langchain.com/](https://smith.langchain.com/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Embedding models: [https://python.langchain.com/docs/integrations/text_embedding](https://python.langchain.com/docs/integrations/text_embedding)
    and [https://platform.openai.com/docs/guides/embeddings/embedding-models](https://platform.openai.com/docs/guides/embeddings/embedding-models)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'ChromaDB: [https://docs.trychroma.com/](https://docs.trychroma.com/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Unstructured: [https://docs.unstructured.io/welcome](https://docs.unstructured.io/welcome)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '8'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Creating Your Own LangChain Chatbot Example
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we’ll combine key concepts from earlier chapters into a practical
    project. So far, we’ve covered a lot, from conversational AI fundamentals and
    prompt engineering to utilizing LangChain to create a RAG system. Now, we’re ready
    to apply this knowledge by building a ChatGPT-powered chatbot.
  prefs: []
  type: TYPE_NORMAL
- en: This project will demonstrate how to apply ChatGPT technology in a practical,
    real-world conversational AI scenario. We’ll aim to create an automated assistant
    that can not only answer questions about our own data but also handle more complex
    tasks and provide personalization.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, you’ll not only have a functional ChatGPT chatbot
    but also a solid understanding of how to craft more sophisticated conversational
    agents. You’ll also gain insights to better assess the feasibility of integrating
    LLM-powered agents into your business operations and determine whether it’s the
    right moment to transition from existing NLU systems.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we’ll cover the following key areas:'
  prefs: []
  type: TYPE_NORMAL
- en: Scoping our ChatGPT project
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Getting our data ready for the Chatbot
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating our agent for complex interactions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Bringing it all together – building your own LangChain chatbot with Streamlit
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s start building our chatbot, but first, we need to consider our conversational
    agent’s use case and scope.
  prefs: []
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will use ChatGPT extensively, so you will need to be signed
    up with a free account. If you haven’t created an account, go to [https://openai.com/](https://openai.com/)
    and click **Get Started** at the top right of the page, or go to https://chat.openai.com.
  prefs: []
  type: TYPE_NORMAL
- en: 'The examples require Python 3.9 and a Jupyter notebook to be installed: [https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb](https://jupyter.org/try-jupyter/notebooks/?path=notebooks/Intro.ipynb).'
  prefs: []
  type: TYPE_NORMAL
- en: We will use Chroma DB as our open source vector database, so it’s advisable
    to take a look and familiarize yourself with Chroma ([https://www.trychroma.com](https://www.trychroma.com))
    although there are a lot of other different options for Vector stores providers.
  prefs: []
  type: TYPE_NORMAL
- en: Scoping our ChatGPT project
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Everyone likes a holiday, and helping travelers with smart conversational automations
    is an area I’m very passionate about, so for our use case, we are going to create
    our own ChatGPT-powered travel assistant.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, we must be realistic with scope; an online travel agent could
    potentially do thousands of different tasks with varying levels of complexity,
    but let’s choose a handful of specific use cases that are not only interesting
    to implement but also bring together the techniques we’ve covered so far in the
    book.
  prefs: []
  type: TYPE_NORMAL
- en: A holiday assistant use case
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You work for an online travel agent, and you’ve been tasked with creating an
    LLM-powered holiday assistant designed to revolutionize the way travelers choose
    their accommodations. Online travel agents tend to be limited in their accommodation
    searches, so your challenge is to provide a more personalized granular search.
    Drawing on a dataset of hotels, complete with descriptions, reviews, and other
    possible sources of information such as weather and location, your goal is to
    construct a ChatGPT-powered chatbot capable of guiding users to their ideal hotel
    choice. Let’s call our agent Ellie the explorer and dig deeper into her persona.
  prefs: []
  type: TYPE_NORMAL
- en: A persona outline for Ellie the explorer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, let’s consider Ellie’s personality and the capabilities she’s going to
    offer to her users.
  prefs: []
  type: TYPE_NORMAL
- en: Ellie’s personality
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ellie is enthusiastic, friendly, and incredibly knowledgeable. She approaches
    every interaction with a positive attitude and a genuine desire to help. Her responses
    are thoughtful and personalized, reflecting her understanding of each user’s unique
    preferences and needs. Ellie is not just a chatbot; she’s a travel companion who’s
    excited to help users plan their trips, offering advice as a friend would.
  prefs: []
  type: TYPE_NORMAL
- en: Ellie’s interactions are characterized by her warmth and enthusiasm. She communicates
    in a conversational tone, making complex travel planning feel like a chat with
    a knowledgeable friend. Her responses are prompt, informative, and always considerate
    of the user’s needs and preferences.
  prefs: []
  type: TYPE_NORMAL
- en: Ellie’s capabilities
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s outline what Ellie’s capabilities are going to be when handling her users’
    queries:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Learning user preferences**: Ellie is attentive and observant, quickly picking
    up on subtle hints about a user’s travel preferences, family dynamics, and favorite
    holiday activities. She remembers these details across interactions, continually
    refining her understanding of what each user enjoys.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Personalized recommendations**: Using her comprehensive knowledge of a hotel’s
    dataset, Ellie goes beyond simple keyword searches. She understands free text
    questions and digs deep into her database to offer recommendations that perfectly
    match each user’s wishes, whether they’re looking for family-friendly resorts,
    romantic getaways, or adventure-packed hostels.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Destination information**: Ellie is a treasure trove of information on countless
    destinations. She can tell you the best times to visit a place, share insights
    on local attractions, offer safety advice, and even teach you a few cultural tips
    to help you blend in. Her advice is always up to date, ensuring travelers have
    the best experience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Weather conditions**: Ellie keeps a close eye on the weather across the globe.
    She can provide current and forecasted conditions for any destination, advising
    on how the weather might affect travel plans. Whether it’s suggesting the best
    day for a beach outing or warning about potential travel disruptions due to severe
    weather, Ellie’s guidance is invaluable.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now we’ve got an idea about Ellies capabilities, let’s look at her conversational
    capabilities and the types of interactions we want to support.
  prefs: []
  type: TYPE_NORMAL
- en: Ellie’s conversational scope
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s outline the conversations Ellie will be able to carry out. She will hopefully
    be able to carry out the following types of interactions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Personalized recommendations**: Using the hotel’s dataset, based on user
    preferences and past interactions, the chatbot can offer personalized hotel recommendations,
    tailored to meet each user’s specific needs. We want to offer more than just keyword
    searches for parameters such as facilities. We want to support free text questions
    about our hotels based on hotel descriptions and holiday maker reviews, allowing
    us to offer more granular suggestions to our users.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Destination information**: Inquiries about the destination, including best
    times to visit, local attractions, safety advice, and cultural tips.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Weather conditions**: Questions about current and forecasted weather conditions
    for specific destinations or how the weather might affect travel plans.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hopefully, once our **p****roof of concept**(**POC**) is working, we’ll be able
    to make an informed decision on whether we want to make a more fully featured
    agent with a larger hotel dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Technical features
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To create Ellie the explorer and meet the conversational scope we’ve outlined,
    we’re going to implement the following features:'
  prefs: []
  type: TYPE_NORMAL
- en: A RAG system to store information about our hotel descriptions that we can use
    to provide our suggestions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LangChain agents to provide the tools to interact with external data sources
    and get up-to-date information
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Performance monitoring using LangSmith so that we can see how our assistant
    performs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A working web-based Chatbot interface where we can see our conversations and
    interact with the agent, while keeping track of the ongoing conversation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Getting our data ready for the chatbot
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: To get our data ready, we first need to source and then process it so that it’s
    in the cleanest state, ready to be used.
  prefs: []
  type: TYPE_NORMAL
- en: Selecting our data sources
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For this project, we’re going to need to provide a number of different types
    of context-specific knowledge to our LLM agent so that we can service the expected
    question types:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Hotel information**: This would come from our online travel agent hotel dataset,
    so we’ll need some hotel data to represent the hotels we want to recommend to
    our users. The data we’re going to use to provide hotel recommendations is a small
    subset of the dataset at [https://www.kaggle.com/datasets/raj713335/tbo-hotels-dataset](https://www.kaggle.com/datasets/raj713335/tbo-hotels-dataset).
    This dataset contains information on 1,000,000+ hotels from different countries
    and regions, such as their rates, reviews, amenities, location, and star ratings.
    The data was collected from various sources, such as hotel websites, online travel
    agencies, and review platforms. We’re going to use a much smaller version of this
    data to keep our model interaction costs down.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Location weather**: Users may ask about the weather in a specific location,
    so we’ll use Open-Meteo, the free weather API.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Detailed location information**: To provide up-to-date location information,
    we’ll use Wikipedia so that we can search by location.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Preparing the hotel data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The hotel dataset we’re going to use, **hotel-info-chapter8-001.csv**, is a
    **CSV** file made up of around 900 hotel records from countries around the world
    for a bit of variety. This data is populated with the following columns:'
  prefs: []
  type: TYPE_NORMAL
- en: '**countryCode**, **countryName**, **cityCode**, **cityName**, **HotelCode**,
    **HotelName**, **HotelRating**, **Address**, **Attractions**, **Description**,
    **HotelFacilities**, **Map**, **PhoneNumber**, **PinCode**, **HotelWebsiteUrl**,
    and **Reviews**'
  prefs: []
  type: TYPE_NORMAL
- en: These are all fairly self-explanatory; the columns we’re most interested in
    are the **Description** and **Reviews** columns, as we’re going to use this data
    to form the basis for our RAG system to help Ellie provide hotel recommendations.
    So, to recap, what we need to do to make this data available for RAG is to *clean
    it up, chunk and create embeddings, and store the data as embeddings so that we
    can retrieve it later on?.
  prefs: []
  type: TYPE_NORMAL
- en: Cleaning and normalizing data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before creating embeddings, we need to ensure that our data in the **Description**
    and **Reviews** columns is clean and normalized. This involves removing any HTML.
    If you look at the **descriptions** field, you’ll notice that it has text with
    HTML tags, so the first thing we should do is clean this up. To do this, we can
    use the **BeautifulSoup** library from Python’s **bs4** package. In the following
    code, we’ll any HTML in **Descriptions** and **Attractions** with the **remove_html_tags**
    function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE190]'
  prefs: []
  type: TYPE_PRE
- en: Other improvements to our cleaning process could involve standardizing abbreviations
    (e.g., changing **Rest.** to **Restaurant**) and correcting spelling errors. Normalizing
    data helps to reduce the variance in your embeddings, leading to more accurate
    recommendations.
  prefs: []
  type: TYPE_NORMAL
- en: Creating our chunks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s look at creating our chunks from the **Description** and **Reviews**
    columns. There are a number of different ways you could do this; we’re using a
    LangChain document loader, but in a production environment where you could have
    a much larger dataset, you may find using the **pandas** library we used to clean
    up our data in the previous section is more efficient. In our approach, we read
    the data out of our CSV file, create a dictionary from each row so that we can
    access the column values, look at each document, and then create chunks from the
    **Description** and **Reviews** columns:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Load the CSV file**: First, we need to load our hotel information from a
    CSV file. We’ll use a custom **CSVLoader** class for this purpose. Specify the
    file path, the column containing hotel names, and any additional metadata columns.
    We’re using the **HotelName** as the source column:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE191]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Create a text splitter**: To handle potentially long hotel descriptions and
    reviews, we’ll split them into smaller chunks. We use **RecursiveCharacterTextSplitter**
    for this, setting a chunk size and overlap to ensure continuity in the text analysis.
    The descriptions are not actually that large, but for our example, the aim is
    to break them down into small enough chunks to provide some granular information
    about each hotel:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE192]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Process and split the text**: Iterate through each document, extract the
    content of the specified columns, and split the content of each column into manageable
    chunks. We then loop over each chunk and create a document for each chunk, consisting
    of a key/value pair of **metadata** and **page_content**, ready for downstream
    processing:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE193]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: We want to loop over each CSV record and select **Description** and **Review**,
    which are then chunked individually, so each chunk with the original CSV metadata
    is then added to our **chunked_docs** list ,ready to create embeddings from.
  prefs: []
  type: TYPE_NORMAL
- en: Creating our embeddings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Once we’ve got our chunked text, we want to create our embeddings. For our
    vector database, we’re going to use Chroma DB and the OpenAI model to create our
    embeddings. We’ll store the database locally and use the latest OpenAI embeddings
    model, **text-embedding-3-small**, to create our embeddings. To keep my OpenAI
    embedding costs down, I’m only going to create embeddings from the first 100 chunks;
    it’s up to you how many you want to create for your project:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE194]'
  prefs: []
  type: TYPE_PRE
- en: 'We can test whether we’ve got records in the store by looking at the number
    of records with **count()** or doing a similarity search:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE195]'
  prefs: []
  type: TYPE_PRE
- en: Now we’ve got our hotel embeddings stored with their metadata, we can start
    to look at creating the tools that our agent will utilize to interact with this
    data and other sources.
  prefs: []
  type: TYPE_NORMAL
- en: Creating our agent for complex interactions
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Our agent is going to be powered by tools that provide the functionality to
    meet our requirements. The main concept is that the agent will be able to take
    our question and use an LLM call to reason and split this task down into smaller
    tasks, while deciding which tools are appropriate to use to satisfy our request
    and deliver an answer to our question. The reasoning processes the agent uses
    areillustrated in the following diagram:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.1 –  The agent’s reasoning process](image/B21100_08_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.1 – The agent’s reasoning process
  prefs: []
  type: TYPE_NORMAL
- en: Begin by creating a dedicated folder that will contain all the code for our
    agent. This will help organize our project files and make the code base easier
    to navigate. I’m going to name this folder **streamlit**, as it’s where we’ll
    create our Streamlit app later on.
  prefs: []
  type: TYPE_NORMAL
- en: 'Copy over the Chroma database we’ve created to store the vectors in this folder:
    **path to** **your project\streamlit\chapter8db\**.'
  prefs: []
  type: TYPE_NORMAL
- en: Next, create a folder named **tools** so that we can start creating the tools
    for our agent.
  prefs: []
  type: TYPE_NORMAL
- en: Creating the agent tools
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before we create our LangChain agent, we’ll need to create the LangChain tools
    to meet our requirements. We’re going to try and implement all our functionality
    using agent tools, including the RAG functionality:'
  prefs: []
  type: TYPE_NORMAL
- en: Hotel information
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Weather information
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Location information
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each tool will have the capabilities to carry out its own task. Let’s work through
    each one; for now, create a folder named **tools**, where we’ll save the tools
    to use in our final project.
  prefs: []
  type: TYPE_NORMAL
- en: Personalized hotel recommendations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first tool is arguably the most important for our application, as this is
    the tool that will interact with our vector store that makes up the retrieval
    part of our RAG system. We’re going to create a custom tool to accomplish this.
    There are a few challenges to overcome when we start to think about how our agent
    will perform these searches.
  prefs: []
  type: TYPE_NORMAL
- en: We currently have our embeddings stored in our vector store, so we’ll need to
    create a retriever that will accept queries to search through these embeddings,
    such as “*Can you suggest hotels with* *good food?*”
  prefs: []
  type: TYPE_NORMAL
- en: Remember that we’ve stored our text embeddings with their own metadata. What
    would be even more useful is if we could also filter our embeddings by their metadata
    as you would with a relational database. For example, **hotel countryName** and
    **HotelRating** are both represented in our metadata. So, if we want to look for
    similar documents for hotels in a specific country with a specific rating, our
    question could be something like “*Can you suggest a four-star hotel in the UK
    with* *good food?*”
  prefs: []
  type: TYPE_NORMAL
- en: Luckily, Chroma DB provides the ability to filter queries on metadata, so we
    know we can achieve this with our vector store.
  prefs: []
  type: TYPE_NORMAL
- en: The next thing to consider is how we’ll achieve this in our LangChain tool.
    The first challenge is that we want to extract parameters from our question so
    that we can use these downstream, specifically in our chroma query.
  prefs: []
  type: TYPE_NORMAL
- en: One approach could be to interact with an LLM to extract relevant search parameters
    from user interactions, which are then fed into your retriever to carry out a
    search against the Chroma DB. However, before diving in, it’s always best practice
    to see what is already available in the LangChain ecosystem. As it happens, there
    is already something we can use, **SelfQueryRetriever**, a retriever built specifically
    to carry out this task. Let’s break this down into detailed steps, explaining
    each component’s role and how they integrate.
  prefs: []
  type: TYPE_NORMAL
- en: '**Create the search service**: First, create a new file, **hotel_search.py**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Initialize OpenAI Embeddings**: Next, we initialize an embeddings model using
    the **OpenAI Embeddings**. This model is responsible for converting text into
    vector representations, which are used for semantic searches, and it’s the same
    model we used to create our embeddings:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE196]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Create a Chroma document store**: Next, we set up a Chroma document store
    that uses the embeddings from **embeddings_model** to perform semantic searches.
    Documents stored in Chroma can be retrieved based on their semantic relevance
    to query strings:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE197]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Define the metadata for the documents**: We define metadata attributes for
    the documents stored in Chroma. This metadata field info is going to be passed
    onto the retriever. For our example, we’re only interested in searching by **HotelRating**,
    **cityName**, and **CountryName**. Feel free to add any other parameters you want
    to search by:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE198]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**Initialize the self-query retriever**: **SelfQueryRetriever** is initialized
    with the language model, document store, and metadata information that we defined
    in the previous step. It’s configured to perform similarity-based searches within
    its own indexed content, finding documents that are semantically relevant to user
    queries:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE199]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: We’re also limiting the number of documents to return to 10 and setting **verbose=True**
    so that we can view the output. Let’s move on to creating our prompt.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Configure a prompt template**: Next, **PromptTemplate** is defined to ensure
    that the retrieved information from the documents is presented clearly to the
    LLM when answering user queries:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE200]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'Now that we’ve created our prompt, we can bring everything together to create
    our tool:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Create a retriever tool**: First, we wrap the retriever in a retriever tool
    using **create_retriever_tool**, passing in the title of the tool, the description
    to the retriever itself, and the document prompt we created:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE201]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**create_retriever_tool** returns our tool of type **Tool**. The final step
    involves integrating **hotel_search** into our LangChain conversational agent,
    which we’ll do by passing it on to our **AgentExecutor** when we create our agent.
    To recap, this agent will process user queries about hotel recommendations, leveraging
    the semantic search capabilities of **SelfQueryRetriever**, which now understands
    which metadata to look for and work with in our hotel questions, providing users
    with helpful hotel recommendations.'
  prefs: []
  type: TYPE_NORMAL
- en: Weather information
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can create a custom tool to provide our weather information. The simplest
    way to create a custom tool is to annotate a function with **@tool**.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, for our weather tool, it’s straightforward to construct. We create our
    function named **search_weather**, which the decorator uses as the tool name,
    and the description is pulled from the docstring. For the weather data, we’re
    going to use **OpenWeatherMap**, and to make the process of calling this API nice
    and simple, we’ll use a Langchain utility, **OpenWeatherMapAPIWrapper**. Once
    again, it’s worth pointing out that if you’ve found a service you want to consume
    for your ChatGPT app, always have a look around the LangChain ecosystem before
    building anything bespoke. Create a file named **search_weather.py** and add the
    following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE202]'
  prefs: []
  type: TYPE_PRE
- en: Go to [https://openweathermap.org/api/](https://openweathermap.org/api/) and
    sign up for an account to get your API key. This will need to be available as
    an environment variable. We’ll look at setting environment variables when we create
    the chatbot application.
  prefs: []
  type: TYPE_NORMAL
- en: Location information
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We want to create a tool to answer questions about hotel locations with up-to-date
    data so that we can add these results to our context. There are a number of options.
    We could use the Tavily search engine, the purpose-built search engine for LLMs,
    and there is also an out-of-the-box tool in LangChain, **TavilySearchResults**.
  prefs: []
  type: TYPE_NORMAL
- en: However, a great place to find information is Wikipedia, so let’s use this as
    the information source for our tool.
  prefs: []
  type: TYPE_NORMAL
- en: We’re going to use an out-of-the-box LangChain tool to interact with Wikipedia,
    **WikipediaQueryRun**. You’ll need to install the Wikipedia Python package by
    running **pip install --upgrade --quiet** **Wikipedia**.
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s easy to create this tool – create a file named **wikipedia.py** and add
    the following to create the Wikipedia API wrapper:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE203]'
  prefs: []
  type: TYPE_PRE
- en: The wrapper provides some useful ways to fine-tune Wikipedia search results,
    so we’ve limited the number of results returned to 5 and limited the content for
    each returned document to 500 characters.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, create the tool by passing in our wrapper and giving the tool a description:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE204]'
  prefs: []
  type: TYPE_PRE
- en: We’ll now be able to use this tool in our agent. In the next section, we’ll
    look at creating our LangChain agent using the tools we’ve created. In the next
    section, we’re going to bring all these elements together by creating an agent
    that can utilize the tools we’ve created.
  prefs: []
  type: TYPE_NORMAL
- en: Bringing it all together – building Your own LangChain Chatbot with Streamlit
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Let’s begin constructing our web-based chatbot so that we can interact with
    ChatGPT using LangChain. To accomplish this, we’ll use the Streamlit Python library
    to build the interface. Streamlit’s wealth of ready-to-use components and utilities,
    as well as great documentation, allows us to swiftly develop a functional web-based
    chatbot. Its straightforward yet powerful features support quick prototyping and
    iterative refinement, making it perfectly suited for our chatbot project. Streamlit
    simplifies the integration of interactive elements and provides a lot of out-of-the-box
    functionality, which will cut our development time and allow us to concentrate
    on the LangChain project.
  prefs: []
  type: TYPE_NORMAL
- en: Make sure you’ve installed Streamlit with **pip install streamlit**, or by using
    one of the many other ways to install. I’m using Anaconda, so I’m using this distribution.
    You can test that you’ve installed Streamlit correctly by running **streamlit
    hello**.
  prefs: []
  type: TYPE_NORMAL
- en: In our project folder, create a folder named **app**, where we’ll store our
    application code. Copy over the tools you created earlier into a tools folder
    under **app**/**tools**. Next, let’s look at managing our API keys.
  prefs: []
  type: TYPE_NORMAL
- en: Creating secrets and config management
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The first bit of Streamlit magic will be to use the out-of-the-box secrets
    manager. Streamlit provides native file-based secrets management so that we can
    easily store and securely access our API keys and manage projects. Create a folder
    named **.streamlit** and a file named **secrets.toml**, and then add the API keys
    we need for this project:'
  prefs: []
  type: TYPE_NORMAL
- en: '**OPENAI_API_KEY="YOUR KEY"**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LANGCHAIN_API_KEY="YOUR KEY"**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**OPENWEATHERMAP_API_KEY="YOUR KEY"**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Streamlit automatically loads secrets from **secrets.toml** into your project
    directory during development, and it provides options if you want to deploy via
    the Streamlit Cloud interface or make your application publicly available. Let’s
    move on to creating our agent code.
  prefs: []
  type: TYPE_NORMAL
- en: Creating our agent service
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s organize the code for our LangChain service in a dedicated LangChain service
    file.
  prefs: []
  type: TYPE_NORMAL
- en: '**Create the LangChain service**: Begin by creating a Python file dedicated
    to your LangChain service and storing it in the app folder. This could be named
    something like like langchain_service.py. This file will contain all the necessary
    code to set up and run your agent.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Import the necessary libraries and modules**: Import the os module for environment
    variable management, components from LangChain to access the hub functionalities
    and agent execution, our **ChatOpenAI** model, **AgentExecutor** to manage prompts
    and conversation memory, and the tools we created in the earlier steps (**weather_search**,
    **wikipedia_search**, and **hotel_search**), designed for specific chatbot functionalities.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Define the** **setup_agent** **function**: This function is designed to configure
    and return an **AgentExecutor** instance, equipped with specific tools and settings
    for the chatbot:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE205]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The preceding parameters include a list of messages for conversation history
    from the Streamlit app and the API keys for the OpenAI, LangChain, and **OpenWeatherMap**
    services. We then set our environment variables so that LangChain can access them.
    I’m also setting the environment variables so that we can track everything in
    LangSmith, along with a project name so that we can easily track all our interactions
    with Ellie.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Initialize the language model, tools, and prompt**: An instance of **ChatOpenAI**
    is created with specific temperature and model parameters. We also create our
    list of tools:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE206]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The predefined tools (**hotel_search**, **weather_search**, and **wikipedia**)
    will add our specialized functionalities, which the agent will decide to use depending
    on the question asked. **hub_prompt** is retrieved using **hub.pull**, which fetches
    a pre-defined prompt template from the LangChain hub. You can create this manually
    if you want more control, but for our example, this works perfectly.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Configure the conversation memory**: We are going to use **ConversationBufferWindowMemory**,
    which will give our Chatbot memory of the conversations and allow it to provide
    context-aware responses. Note that we’re keeping the last 20 interactions in memory
    by setting **k=20**, and we are also passing in a list of messages (**msgs**)
    into **chat_memory** from our Streamlit agent, which allows us to tie up our agent
    memory with Streamlit Session State.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Create the agent with the tools, memory, and the AgentExecutor**: Next, we
    create our agent with the imported **create_openai_tools_agent** function. This
    LangChain function creates an agent capable of using OpenAI’s **tools** functionality:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE207]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: '**create_openai_tools_agent** is called with the language model (**llm**),
    the list of tools, and **hub_prompt** to create a configured agent.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Create our Agent Executor**: Finally, we can create our **AgentExecutor**,
    which is instantiated with the created agent, tools, memory configuration, and
    verbosity settings. This executor manages the execution flow of the chatbot, processes
    inputs, and generatesresponses based on the integrated tools and conversation
    memory. The **setup_agent()**function returns the **AgentExecutor** instance,
    which is now ready to be used in the Streamlit chatbot application. We’ll look
    at how we create this application and use our LangChain service in the next section:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Building our Streamlit chat app
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'With all our components now ready, it’s time to build our chatbot. Start by
    creating a file named **main.py**; this file will serve as the primary Streamlit
    script. Within this script, we will develop Ellie’s chatbot interface. Let’s go
    through the steps to create this code:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Import the libraries**: We need to import the essential libraries, including
    our LangChain history component and **streamlit (as st)** for our chatbot elements.
    We also import **setup_agent()**. This function from the **langchain_service**.py
    we created initializes the chatbot’s agent with the necessary configurations and
    API keys.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Initialize the Streamlit web application**: Define the **init_streamlit()**
    function; this sets up the Streamlit page configuration with **st.set_page_config**,
    specifying the page title and icon. We also give our page a title with **st.title("**
    **✈️** **Ellie the** **explorer ")**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Next, we initialize our chat message history**: This is important, as Streamlit
    apps operate on a single-threaded model, where the entire script reruns from top
    to bottom upon any user interaction that triggers a rerun. So, to save our messages,
    we would need to create a mechanism to manage these in Streamlit’s Session State.
    We also need to consider handing these over to our LangChain app. To achieve this,
    we use a component from the LangChain Community library. **StreamlitChatMessageHistory**
    is a class that allows you to store and use chat message history in a Streamlit
    app,'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**msgs =** **StreamlitChatMessageHistory()**.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: It works seamlessly with LangChain by allowing you to incorporate the chat message
    history into your LangChain chains. It works by storing messages in Streamlit
    Session State at a specified key (the default is **langchain_messages**). We then
    pass over a reference of this memory to our agent.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Define the** **prepare_agent** **function**: This is a helper function that
    calls **setup_agent** with the chat message history and API keys stored in **st.secrets**,
    returning a configured **AgentExecutor**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Create our** **AgentExecutor** **Langchain agent**: We call **prepare_agent().**
    to create our **agent_executor**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**agent_executor: AgentExecutor = prepare_agent(msgs)**, passing the chat message
    history and API keys from **st.secrets** to the **setup_agent()** function imported
    from our LangChain service code, **langchain_service.py**, which returns the **AgentExecutor**
    instance configured for the chatbot.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Display a welcome message**: Add a welcome for the user at the start of the
    conversation, guiding them on how to interact with the chatbot:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE208]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: The message is defined and added to the chat history if it’s the initial load
    (i.e., there are no messages in the history).
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**User interaction and response handling**: Next, we want to handle user input.
    If the user inputs a new prompt, we generate and draw a new response:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE209]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: An optional component can be added so that you can easily look at what’s being
    stored in **st.session_state.langchain_messages**. This is an expander widget
    (**st.expander**) to display the message history in the JSON format.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The application listens for user input through **st.chat_input()**. When input
    is received, it’s displayed as a **human** message using **st.chat_message()**.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The input is then passed to **agent_executor.invoke()** to process the response,
    which, upon success, is displayed back to the user as an **ai** message.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: We’re also handling errors in the response format and errors coming back from
    our agent call; if there is an error, then this message is displayed using **st.error()**.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'If the script is the main program (i.e., not imported as a module), **init_streamlit()**
    is called to start the app:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE210]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: That’s it! Everything should now be in place to create a functioning chatbot.
    In the next section, let’s take it for a spin.
  prefs: []
  type: TYPE_NORMAL
- en: Running and testing Ellie, our chatbot application
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To run this Streamlit application, ensure that you have Streamlit and all the
    necessary packages installed in your Python environment. Then, navigate to the
    directory containing the **main.py** file and run the following command in your
    terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE211]'
  prefs: []
  type: TYPE_PRE
- en: This command launches the Streamlit web server and opens the app in your default
    web browser, allowing you to interact with the chatbot. If there are any issues,
    double-check that your API keys and any other required configurations are correctly
    set in **st.secrets** and passed appropriately to the **setup_agent()** function
    for the application to function as expected. You should also be able to see your
    logs appearing in LangChain once you start interacting with the chatbot, enabling
    you to drill down into each run.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s try our first search for hotel recommendations. We get a useful result,
    as you can see in the following screenshot of the output:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.2 – Asking our agent for hotel recommendations](image/B21100_08_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.2 – Asking our agent for hotel recommendations
  prefs: []
  type: TYPE_NORMAL
- en: 'The agent looks at the question and chooses which tool to use to fulfill the
    request. This question is hotel-specific, so the agent calls our **hotel_search**
    tool to answer our question. Remember to look at the debug output in LangSmith
    to view the individual runs for the project. This will allow you to see the individual
    calls to get a solid understanding of how your agent interacts with the different
    LLMs to decide on the tool to use and return our response, as well as other tasks
    specific to the individual tool – for example, extracting the parameters to use
    in filtering our vector search. The following LangSmith screenshot shows this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.3 – View the calls from our agent to the LLMs in LangSmith](image/B21100_08_3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.3 – View the calls from our agent to the LLMs in LangSmith
  prefs: []
  type: TYPE_NORMAL
- en: Feel free to try your own questions with anything specific to your own data.
  prefs: []
  type: TYPE_NORMAL
- en: We should also be able to ask follow-up questions so that the agent exercises
    the other tools. In the following screenshot, we also ask about the weather, and
    you can see Ellie responds with data from our weather search tool.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8.4 – We ask a weather-specific question to test our weather tool](image/B21100_08_4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8.4 – We ask a weather-specific question to test our weather tool
  prefs: []
  type: TYPE_NORMAL
- en: Try out the **wikipedia_search** tool by asking for something specific about
    the area.
  prefs: []
  type: TYPE_NORMAL
- en: So, we now have a working ChatGPT-powered agent that can form a good basis for
    an even more advanced agent. Let’s look at what other improvements you can carry
    out.
  prefs: []
  type: TYPE_NORMAL
- en: Ways to improve Ellie
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are lots of different enhancements you could implement to improve Ellie’s
    travel assistant capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: Improve the chat UI – for example, implement streaming answers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide more complex interactions by enhancing our LangChain agent so that we
    can carry out more complex transactional tasks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn user preferences – their interests, family situation, and what they like
    to do on holiday
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enhance the chatbot memory with a vector store to persist conversations so that
    they can be used between sessions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Look at the chunking strategy to improve vector embeddings for better searches
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So far, what you’ve created is just a start and a good basis for creating a
    more complex ChatGPT-powered agent. Any of these enhancements would be worth implementing
    to improve Ellie’s capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we looked at a real-world example of creating a ChatGPT-powered
    conversational agent, using some of the techniques and technologies that we covered
    in earlier chapters. Our example was thoughtfully designed to cover the use cases,
    functionality, and features of our chatbot, allowing us to apply our knowledge
    of LangChain, RAG systems, and related tools effectively. You were also introduced
    to the Streamlit library to create rich chat interfaces and saw how to use this
    with LangChain. Hopefully, we’ve implemented our code base to make our agent extensible
    and something that we could use for a more complex project. We’ve achieved our
    aim of creating a ChatGPT conversational agent with knowledge of our own data
    and the capability to use external information and sources.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve created our POC and validated our concept. It’s a start, but there is
    a lot to consider before creating a more extensive application and going live.
    In our final chapter, we’ll consider going into production with what we’ve learned
    so far and what other core functionality we would need to create to make this
    a reality. We’ll also consider other alternatives to ChatGPT and the emergence
    and importance of smaller language models. Finally, we’ll come to some conclusions
    and see where we go from here with the current state of the technology.
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
