  type: TYPE_NORMAL
  zh: '[****H**ow** ****i**t** ****wo**rks** ]'
- en: '****Pro**ble**m ****Brea**kdow**n ****wo**rks** ****b**y** ****dire**ctin**g
    ****t**he** ****L**LM** ****t**o** ****br**eak** ****do**wn** ****t**he** ****ori**gina**l
    ****pro**ble**m ****in**to** ****sma**lle**r ****pa**rts**. ****T**he** ****pr**omp**t
    ****mi**ght** ****inc**lud**e ****inst**ructio**ns ****su**ch** ****a**s** “****Br**eak**
    ****th**is** ****pro**ble**m ****do**wn** ****in**to** ****sma**lle**r ****st**eps**”
    ****o**r** “****Wh**at** ****a**re** ****t**he** ****ma**in** ****comp**onent**s
    ****o**f** ****th**is** ****pro**ble**m ****a**nd** ****h**ow** ****c**an** ****w**e**
    ****add**res**s ****th**em** ****o**ne** ****b**y** ****o**ne**?” ****Ea**ch**
    ****subp**roble**m ****i**s** ****addr**esse**d ****indep**endent**ly ****a**nd**
    ****t**he** ****ove**ral**l ****sol**utio**n ****i**s** ****bu**ilt** ****fr**om**
    ****t**he** ****sol**utio**n ****t**o** ****ea**ch** ****pa**rt**.'
  id: totrans-1232
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题分解**通过指导LLM将原始问题分解成更小的部分来实现。提示可能包括“将这个问题分解成更小的步骤”或“这个问题的主要组成部分是什么，我们如何逐一解决它们？”每个子问题都是独立解决的，整体解决方案是由每个部分的解决方案构建而成的。'
- en: '****F**or** ****exa**mpl**e, ****wh**en** ****as**kin**g “****H**ow** ****d**o**
    ****I**** ****dev**elo**p ****a**** ****dig**ita**l ****mark**etin**g ****str**ateg**y?”,
    ****t**he** ****L**LM** ****co**uld** ****br**eak** ****t**he** ****que**stio**n
    ****do**wn** ****in**to** ****comp**onent**s ****su**ch** ****a**s** ****def**inin**g
    ****a**** ****ta**rge**t ****aud**ienc**e, ****cho**osin**g ****mark**etin**g
    ****cha**nnel**s, ****cre**atin**g ****con**ten**t, ****a**nd** ****tra**ckin**g
    ****met**ric**s. ****Ea**ch** ****o**f** ****th**ese** ****subp**roblem**s ****i**s**
    ****th**en** ****addr**esse**d ****sepa**ratel**y, ****resu**ltin**g ****i**n**
    ****a**** ****coh**esiv**e ****str**ateg**y ****i**n** ****t**he** ****e**nd**.'
  id: totrans-1233
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当询问“我如何开发一个数字营销策略？”时，LLM可以将问题分解成定义目标受众、选择营销渠道、创建内容和跟踪指标等组成部分。然后，每个子问题分别解决，最终形成一个连贯的策略。
- en: '****Th**is** ****tech**niqu**e ****i**s** ****effe**ctiv**e ****wh**en** ****dea**lin**g
    ****wi**th** ****com**ple**x ****pro**blem**s ****th**at** ****ha**ve** ****ma**ny**
    ****inter**connect**ed ****ele**ment**s. ****B**y** ****bre**akin**g ****th**em**
    ****do**wn** ****in**to** ****pa**rts**, ****i**t** ****i**s** ****ea**sie**r
    ****t**o** ****st**ay** ****foc**use**d ****a**nd** ****so**lve** ****ea**ch**
    ****comp**onen**t ****i**n** ****a**** ****log**ica**l ****a**nd** ****orga**nize**d
    ****w**ay**.'
  id: totrans-1234
  prefs: []
  type: TYPE_NORMAL
  zh: 这种**技术**在处理具有许多相互连接元素的复杂问题时非常有效。通过将它们分解成部分，更容易保持专注并按逻辑和组织方式解决每个组件。
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-1235
  prefs: []
  type: TYPE_NORMAL
  zh: '[何时使用]'
- en: '****Pro**ble**m ****Brea**kdow**n ****sh**oul**d ****b**e** ****us**ed** ****whe**neve**r
    ****th**ere** ****i**s** ****a**** ****com**ple**x ****pro**ble**m ****o**r**
    ****pro**jec**t ****th**at** ****inv**olve**s ****sev**era**l ****inter**depende**nt
    ****st**eps**. ****I**t** ****i**s** ****id**eal** ****f**or** ****stra**tegi**c
    ****pla**nnin**g, ****sol**vin**g ****tech**nica**l ****o**r** ****bus**ines**s
    ****pro**blem**s, ****a**nd** ****deve**lopin**g ****proc**esse**s ****th**at**
    ****inv**olv**e ****mul**tipl**e ****ele**ment**s.'
  id: totrans-1236
  prefs: []
  type: TYPE_NORMAL
  zh: 当存在复杂问题或涉及多个相互依赖步骤的项目时，应使用**问题分解**。它非常适合战略规划、解决技术或商业问题，以及开发涉及多个元素的过程。
- en: '****Th**is** ****tech**niqu**e ****i**s** ****reco**mmende**d ****i**n** ****educ**ationa**l
    ****a**nd** ****tech**nica**l ****con**text**s, ****espe**ciall**y ****i**n**
    ****sub**ject**s ****th**at** ****req**uir**e ****mu**lti**-****st**ep** ****pro**ble**m-****sol**vin**g,
    ****su**ch** ****a**s** ****math**ematic**s, ****prog**rammin**g ****o**r** ****engi**neerin**g.
    ****I**t** ****he**lps** ****te**ach** ****syst**emati**c ****reas**onin**g ****a**nd**
    ****h**ow** ****t**o** ****app**roac**h ****pro**blem**s ****i**n** ****pa**rts**,
    ****faci**litati**ng ****lea**rnin**g.'
  id: totrans-1237
  prefs: []
  type: TYPE_NORMAL
  zh: '****这种技巧在教育和技术环境中特别推荐，尤其是在需要多步骤问题解决的课程中，例如数学、编程或工程。它有助于教授系统推理以及如何分步骤地解决问题，从而促进学习。'
- en: '****I**t** ****i**s** ****al**so** ****us**efu**l ****i**n** ****brain**stormi**ng
    ****a**nd** ****inno**vatio**n ****proc**esse**s, ****wh**ere** ****t**he** ****comp**lexit**y
    ****o**f** ****a**n** ****id**ea** ****c**an** ****b**e** ****red**uce**d ****b**y**
    ****div**idin**g ****i**t** ****in**to** ****s**ub**-****pa**rts**. ****Th**is**
    ****w**ay**, ****ea**ch** ****comp**onen**t ****c**an** ****b**e** ****exp**lore**d
    ****i**n** ****de**tai**l, ****incr**easin**g ****t**he** ****cha**nce**s ****o**f**
    ****iden**tifyin**g ****cre**ativ**e ****solu**tion**s.'
  id: totrans-1238
  prefs: []
  type: TYPE_NORMAL
  zh: '****它也适用于头脑风暴和创新过程，其中可以通过将其分解为子部分来降低一个想法的复杂性。这样，每个组成部分都可以被详细探索，从而增加识别创造性解决方案的机会。'
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-1239
