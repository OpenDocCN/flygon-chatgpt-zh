  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**这些**促销**级别之间的**差异**可能看起来**技术性**，但它们的**影响**是**实际**且**重要的**。**基础**促销**对于**初学者**或**快速**互动**来说是**理想**的，而**高级**促销**对于**那些**希望**充分利用**模型**能力**在**专业**、**教育**或**创意**环境中的人来说是**不可或缺**的工具。'
- en: '****T****h**e** ****Ba**s**i**cs** ****o****f**** ****Acc**u**ra**te** ****Ans**w**e**rs**'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '**准确回答的基础**'
- en: '****Kno**w**i**ng** ****t****h**e** ****fund**am**en**tal**s ****o****f****
    ****desi**g**ni**ng** ****effe**c**ti**ve** ****pro**m**p**ts** ****i****s****
    ****esse**n**ti**al** ****t****o**** ****inte**ra**ct**ing** ****prod**uc**ti**vel**y
    ****wi****t**h** ****Cha**t**G**PT**. ****Wh**i**l**e** ****ea****c**h** ****us****e**r**
    ****c****a**n** ****dev**e**l**op** ****th**e**i**r** ****o****w**n** ****st**y**l**e**
    ****ov****e**r** ****ti****m**e**, ****th**e**r**e** ****a****r**e** ****univ**e**rs**al**
    ****prin**c**ip**les** ****th****a**t** ****c****a**n** ****gu**i**d**e** ****th****i**s**
    ****pro**c**e**ss**:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '**掌握**设计有效**促销**的基本原理对于与ChatGPT**互动**生产性至关重要。虽然每个用户都可以随着时间发展自己的风格，但有一些**普遍**原则可以**指导**这一过程：'
- en: '****1****. ****Cla**r**i**ty** ****a****n**d** ****spec**if**ic**ity**'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 清晰性和具体性**'
- en: '****A**** ****cl**e**a**r** ****a****n**d** ****spe**c**if**ic** ****pr**o**m**pt**
    ****red**u**c**es** ****ambi**g**ui**ty** ****a****n**d** ****he**l**p**s** ****Cha**t**G**PT**
    ****corr**e**ct**ly** ****inte**r**pr**et** ****t****h**e** ****req**u**e**st**.
    ****F****o**r** ****exa**m**p**le**, ****ins**t**e**ad** ****o****f**** ****as**k**i**ng**
    ****f****o**r** "****Exp**l**a**in** ****t****h**e** ****st**o**r**y**," ****a****
    ****mo****r**e** ****effe**c**ti**ve** ****pr**o**m**pt** ****wo**u**l**d** ****b****e****,
    "****Summ**a**ri**ze** ****i****n**** ****3****0**0** ****wo**r**d**s** ****t****h**e**
    ****his**t**o**ry** ****o****f**** ****t****h**e** ****Fr**e**n**ch** ****Revo**l**ut**ion**,
    ****high**li**gh**tin**g ****t****h**e** ****ro****o**t** ****ca**u**s**es** ****a****n**d**
    ****imme**d**ia**te** ****eff**e**c**ts**." ****Th****i**s** ****le**v**e**l**
    ****o****f**** ****de**t**a**il** ****le**a**v**es** ****le****s**s** ****ro****o**m**
    ****f****o**r** ****misinte**rp**ret**atio**n ****a****n**d** ****pro**d**uc**es**
    ****a**** ****mo****r**e** ****us**e**f**ul** ****res**p**on**se**.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**一个**清晰且**具体**的**提示**可以**减少**歧义并**帮助**ChatGPT**正确**理解**请求。例如，**而不是**询问“**解释**这个故事”，一个**更有效**的**提示**会是：“**用300字**总结法国大革命的**历史**，**强调**其**根本原因**和**直接后果**。”**这一**级别的**详细**减少了**误解**的空间，并**产生**了一个**更有用**的**回答**。'
- en: '****2****. ****Pr**o**p**er** ****con**t**e**xt**'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 适当的上下文**'
- en: '****Prov**i**di**ng** ****ini**t**i**al** ****con**t**e**xt** ****he**l**p**s**
    ****Cha**t**G**PT** ****be**t**t**er** ****unde**r**st**and** ****t****h**e**
    ****pur**p**o**se** ****o****f**** ****t****h**e** ****req**u**e**st**. ****I****f****
    ****a****n**** ****es**s**a**y**, ****abs**t**ra**ct**, ****o****r**** ****li****s**t**
    ****i****s**** ****ne**e**d**ed**, ****i****t****''****s**** ****hel**p**f**ul**
    ****t****o**** ****men**t**i**on** ****i****t**** ****expl**i**ci**tly**. ****F****o**r**
    ****exa**m**p**le**: "****A****s**** ****i****f**** ****y****o**u** ****we****r**e**
    ****a**** ****univ**e**rs**ity** ****prof**e**ss**or**, ****exp**l**a**in** ****t****o****
    ****fi**r**s**t**-****ye****a**r** ****stu**d**en**ts** ****wh****a**t** ****cli**m**a**te**
    ****ch**a**n**ge** ****i****s**** ****a****n**d** ****h****o**w** ****i****t****
    ****aff**e**c**ts** ****t****h**e** ****envi**ro**nm**ent**." ****Th****i**s**
    ****app**r**oa**ch** ****gi**v**e**s** ****t****h**e** ****mo**d**e**l** ****a****
    ****cl**e**a**r** ****orie**nt**at**ion**.'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 提供初始上下文有助于ChatGPT更好地理解请求的目的。例如，如果需要论文、摘要或列表，明确提及这一点是有帮助的。例如：“如果你是一名大学教授，向一年级学生解释气候变化是什么以及它如何影响环境。”这种方法为模型提供了一个清晰的定位。
