- en: 'Writing a Meeting Summary:'
  id: totrans-231
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编写会议总结：
- en: 'FILL-IN-THE-BLANK PROMPTS:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 填空提示：
- en: '• Summarize the 5 main takeaways from these meeting notes: **[copy and paste
    notes].**'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: • 总结这些会议记录中的5个主要收获：**[复制并粘贴笔记]**
- en: '• Summarize the decisions made and the next steps outlined in these meeting
    notes: **[copy and paste notes].**'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: • 总结这些会议记录中做出的决定和概述的下一步行动：**[复制并粘贴笔记]**
- en: '• Summarize the key points raised, the solutions proposed and the responsible
    departments in these meeting notes: **[copy and paste notes].**'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: • 总结这些会议记录中提出的要点、提出的解决方案和负责的部门：**[复制并粘贴笔记]**
- en: 'OPEN-ENDED PROMPTS:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 开放式提示：
- en: • “Can you please summarize the main points discussed in this meeting today?
    [[copy and paste transcript of the meeting].”
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能请总结一下今天会议中讨论的主要观点？[[复制并粘贴会议记录]”
- en: • “I would appreciate it if you could provide a brief summary of this meeting
    we just had. [copy and paste transcript of the meeting].”
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: • “如果您能简要总结一下我们刚才召开的会议，我将不胜感激。[复制并粘贴会议记录]”
- en: '• “Could you write up a summary of this meeting we had earlier? I want to make
    sure I didn''t miss anything important: [copy and paste transcript of the meeting].”'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能总结一下我们之前召开的会议吗？我想确保我没有错过任何重要内容：[复制并粘贴会议记录]”
- en: '• “Please summarize the key takeaways from this meeting: [copy and paste transcript
    of the meeting].”'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: • “请总结一下这次会议的关键要点：[复制并粘贴会议记录]”
- en: '• “Could you put together a meeting summary that I can share with other stakeholders?
    Here is the transcript of the recordings: [copy and paste transcript of the meeting].”'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能整理一份会议总结，我可以与其他利益相关者分享吗？这是录音的转录：[复制并粘贴会议记录]”
- en: • “I need to send a follow-up email to everyone who attended this meeting [copy
    and paste the transcript of the recordings]. Can you write a summary that I can
    include in the email?”
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: • “我需要给所有参加会议的人发送跟进电子邮件。[复制并粘贴录音记录]。你能写一个总结，我可以包含在电子邮件中吗？”
