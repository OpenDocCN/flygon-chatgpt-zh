- en: The Result of Running AudioSplitter.java on Episode 811 of This American Life
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 在《美国生活》第811集上运行AudioSplitter.java的结果
- en: Since the AudioSplitter.java utility uses a JNI wrapper to interface with FFmpeg,
    you’ll see a lot of diagnostic messages during the audio splitting process, as
    shown in Listing [4-6](#PC7). Unless you care about codecs, frequencies, and bitrates,
    most of the information presented will be meaningless to you. The good news, however,
    is that we now have a folder with 6 MP3 files ready for transcription!
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 由于AudioSplitter.java实用程序使用JNI包装器与FFmpeg接口，你会在音频分割过程中看到很多诊断信息，如列表[4-6](#PC7)所示。除非你关心编解码器、频率和比特率，否则展示的大部分信息对你来说将毫无意义。然而，好消息是，我们现在有一个包含6个MP3文件的文件夹，这些文件已经准备好进行转录！
- en: Of course, as you can see from the code in Listing [4-5](#PC5), WhisperClient.java
    iterates over all the files in a folder and send them to the Transcription Endpoint
    in order to use the Whisper Model.
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，正如你从列表[4-5](#PC5)中的代码中可以看到，WhisperClient.java遍历文件夹中的所有文件，并将它们发送到转录端点以使用Whisper模型。
- en: Listing [4-7](#PC8) is an excerpt of the full transcript of the episode."...My
    younger cousin Camille is not really a dog person, but there is one dog she adored.
    Her name was Foxy, because she looked exactly like a fox, except she was black.
    She was the neighbor's dog, but she and Camille seemed to have a real kinship,
    maybe because they both weren't very far from the ground. Camille was around four
    or five years old back then, and she had a little lisp, so Foxy came out as Fozzie.
    I thought it was one of the cutest things I'd ever heard.The way Camille remembers
    Foxy, it's almost like a movie. Her memories feel like endless summer, hazy and
    perfect, like a scene shot on crackly film. I just remembered like the feeling
    of being excited to go and see Foxy. I have an image in my head of like coming
    to the house, and I could see Foxy was like outside. I can see Foxy through the
    door that leads to the garden. There's a story about Camille and Foxy that I think
    about fairly often. I've talked about it with my sister for years, but never with
    Camille. And it's this. Once when they were playing..."Listing 4-7
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [4-7](#PC8) 是该期节目全文转录本的摘录。“...我的表妹卡米勒并不是一个真正喜欢狗的人，但她有一只她非常喜爱的狗。它的名字叫福克斯，因为它看起来就像一只狐狸，只是它是黑色的。它是邻居的狗，但似乎她和卡米勒之间有一种真正的亲情，也许是因为她们都不离地面太远。当时卡米勒大约四到五岁，她有点口吃，所以福克斯听起来像是
    Fozzie。我觉得这是我听过的最可爱的事情之一。卡米勒对福克斯的记忆几乎就像一部电影。她的记忆感觉像是无尽的夏日，模糊而完美，就像是在胶片上拍摄的场景。我刚刚想起了那种兴奋地去见福克斯的感觉。我脑海中有一个画面，就像来到房子里，我可以看到福克斯在外面。我可以看到福克斯通过通往花园的门。关于卡米勒和福克斯有一个故事，我经常在想。我已经和我的姐姐谈论了多年，但从未和卡米勒说过。那就是。有一次，当他们玩耍时...”列表
    4-7
- en: The Partial Transcript of Episode 811 of This American Life
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: This American Life 第 811 期节目的部分转录本
- en: For brevity, we’re only showing an excerpt of the transcript. The full transcript
    itself is over 8000 words due to the fact that the episode is nearly 1 hr in length.
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简洁，我们只展示转录本的摘录。由于该期节目长度近 1 小时，全文转录本本身超过 8000 字。
- en: 'Going Meta: Prompt Engineering GPT-4 to Write a Prompt for DALL·E'
  id: totrans-663
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 走向元界：提示工程 GPT-4 为 DALL·E 编写提示
- en: 'Since the full text transcript of the podcast episode that we want to visualize
    is thousands of words, we’re going to use GPT-4 to automatically create the prompt
    needed for the DALL⋅E model. DALL⋅E is able to take a textual description in a
    prompt and create an image, but it’s best to keep the prompt as short as possible.
    Listing [4-8](#PC9) is the prompt for GPT-4 to generate a prompt for DALL⋅E.**System**:
    You are a service that helps to visualize podcasts.**User**: Read the following
    transcript from a podcast. Describe for a visually impaired person the background
    and subject that best represents the overall theme of the episode. Start with
    any of the following phrases:- "A photo of"- "A painting of"- "A macro 35mm photo
    of"- "Digital art of "**User:** Support for This American Life comes from Squarespace...**Model**:
    gpt-4-32k**Temperature**: 1.47**Maximum length:** 150**Top P:** 0**Frequency penalty:**
    0.33**Presence penalty:** 0Listing 4-8'
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们想要可视化的播客节目全文转录本有数千字，我们将使用 GPT-4 自动创建 DALL⋅E 模型所需的提示。DALL⋅E 能够根据提示中的文本描述创建图像，但最好将提示尽可能保持简短。列表
    [4-8](#PC9) 是 GPT-4 生成 DALL⋅E 提示的示例。**系统**：您是一个帮助可视化播客的服务。**用户**：阅读以下播客转录本。为视障人士描述代表该期节目整体主题的背景和主题。以下短语均可作为开头：“一张照片”、“一幅画”、“一张
    35mm 的宏观照片”、“数字艺术”**用户**：支持 This American Life 来自 Squarespace...**模型**：gpt-4-32k**温度**：1.47**最大长度**：150**Top
    P**：0**频率惩罚**：0.33**存在惩罚**：0列表 4-8
- en: The Prompt for GPT-4 to Create a Prompt for DALL⋅E
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4 创建 DALL⋅E 提示的提示
- en: As you can see in the prompt, the model used is the 32k token version of GPT-4
    in order to allow us to process REALLY LONG text transcripts. DALL⋅E needs to
    know the type of image to generate so that’s why we need to specify that the image
    should be a photo, painting, digital art, etc. We need to ensure that the resulting
    text generated by GPT-4 is short, so we want to have a maximum length of 150 tokens.
    Also, in order to prevent GPT-4 from repeating some phrases multiple times, we
    introduced a frequency penalty of 0.33.
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 如提示所示，我们使用的是 GPT-4 的 32k 令牌版本，以便我们处理非常长的文本转录本。DALL⋅E 需要知道要生成的图像类型，因此我们需要指定图像应该是照片、绘画、数字艺术等。我们需要确保
    GPT-4 生成的文本尽可能短，因此我们希望最大长度为 150 个令牌。此外，为了防止 GPT-4 多次重复某些短语，我们引入了 0.33 的频率惩罚。
- en: Listing [4-9](#PC10) shows the results from GPT-4 after reading the transcript
    of Episode 811 of This American Life.![](../images/607613_1_En_4_Chapter/607613_1_En_4_Figc_HTML.gif)A
    logo of open A I.Digital art of a young girl sitting in a garden with a black
    dog that looks like a fox. The girl is smiling and the dog is wagging its tail.
    The image has a hazy, dream-like quality, with crackly film effects to evoke nostalgia.Listing
    4-9
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [4-9](#PC10) 展示了 GPT-4 在阅读 This American Life 第 811 集的转录后的结果。![图片](../images/607613_1_En_4_Chapter/607613_1_En_4_Figc_HTML.gif)一个开放的
    A I 标志。一位年轻女孩坐在花园里，旁边是一只看起来像狐狸的黑狗。女孩在微笑，狗摇着尾巴。图像有一种朦胧、梦幻般的感觉，带有粗糙的电影效果，以唤起怀旧之情。列表
    4-9
- en: The Prompt for DALL⋅E Created by GPT-4
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4 创建的 DALL⋅E 提示
- en: Create Image Endpoint
  id: totrans-669
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Create Image 端点
- en: In order to use the DALL⋅E model to dynamically create an image from a text
    prompt, you need to call the **Create Image** Endpoint.
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用 DALL⋅E 模型根据文本提示动态创建图像，您需要调用 **Create Image** 端点。
