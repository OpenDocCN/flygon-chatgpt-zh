    "babbage",      "object": "model",      "created": 1649358449,      "owned_by":
    "openai"    },...列表 2-3'
- en: RESPONSE. The Partial JSON Response After Running ListModels.java
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 响应。运行 ListModels.java 后的 JSON 部分响应
- en: Listing [2-3](#PC3) is a partial list due to the sheer size of the number of
    models available for developers to use! The good news, however, is that the full
    response is provided as a table in the Appendix.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [2-3](#PC3) 是由于可供开发者使用的模型数量庞大而提供的部分列表！然而，好消息是完整的响应作为表格提供在附录中。
- en: Now that we can programmatically get a list of models available to use, it’s
    time to send prompts to ChatGPT using Java. This is accomplished using the Chat
    Endpoint.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以通过编程方式获取可用的模型列表，是时候使用 Java 向 ChatGPT 发送提示了。这是通过使用 Chat 端点来实现的。
- en: Chat Endpoint
  id: totrans-211
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Chat 端点
- en: The Chat Endpoint (formerly called, “Chat Completion”) is a REST service that’s
    basically a 1-to-1 representation of what you can do in the Chat Playground; therefore,
    this service should feel like second nature to you.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: Chat 端点（以前称为“Chat Completion”）是一个 REST 服务，基本上是你可以在 Chat Playground 中执行操作的 1-to-1
    表示；因此，这项服务应该对你来说就像第二本能一样。
- en: Creating the Request
  id: totrans-213
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建请求
- en: Table [2-3](#Tab3) lists all the HTTP parameters necessary to call the Chat
    Endpoint.Table 2-3
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [2-3](#Tab3) 列出了调用 Chat 端点所需的全部 HTTP 参数。表 2-3
- en: The HTTP Parameters for the Chat Endpoint
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: Chat 端点的 HTTP 参数
- en: '| HTTP Param | Description |'
  id: totrans-216
  prefs: []
  type: TYPE_TB
  zh: '| HTTP 参数 | 描述 |'
- en: '| --- | --- |'
  id: totrans-217
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Endpoint URL | https://api.openai.com/v1/chat/completions |'
  id: totrans-218
  prefs: []
  type: TYPE_TB
  zh: '| 端点 URL | https://api.openai.com/v1/chat/completions |'
- en: '| Method | POST |'
  id: totrans-219
  prefs: []
  type: TYPE_TB
  zh: '| 方法 | POST |'
- en: '| Header | Authorization: Bearer **$OPENAI_API_KEY** |'
  id: totrans-220
  prefs: []
  type: TYPE_TB
  zh: '| 头部 | Authorization: Bearer **$OPENAI_API_KEY** |'
- en: '| Content-Type | application/json |'
  id: totrans-221
  prefs: []
  type: TYPE_TB
  zh: '| Content-Type | application/json |'
- en: Table [2-4](#Tab4) describes the format of the JSON object necessary for the
    request body for the Chat Endpoint. After a quick glance, you can see that only
    a few fields are actually required in order to successfully invoke the service.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [2-4](#Tab4) 描述了用于 Chat 端点请求体的必要 JSON 对象格式。快速浏览后，你可以看到为了成功调用服务，实际上只需要几个字段。
- en: Chat (JSON)
  id: totrans-223
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Chat (JSON)
- en: Table 2-4
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 表 2-4
- en: The Structure of the Chat JSON Object
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: Chat JSON 对象的结构
- en: '| Field | Type | Required? | Description |'
  id: totrans-226
  prefs: []
  type: TYPE_TB
  zh: '| 字段 | 类型 | 必需？ | 描述 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-227
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| model | String | Required | The ID of the model you want to use for Chat
    Completion. Compatible models include• gpt-4• gpt-4-0613• gpt-4-32k• gpt-4-32k-0613• gpt-3.5-turbo• gpt-3.5-turbo-0613• gpt-3.5-turbo-16k• gpt-3.5-turbo-16k-0613
    |'
  id: totrans-228
  prefs: []
  type: TYPE_TB
  zh: '| model | String | Required | 你想要用于 Chat Completion 的模型的 ID。兼容的模型包括• gpt-4• gpt-4-0613• gpt-4-32k• gpt-4-32k-0613• gpt-3.5-turbo• gpt-3.5-turbo-0613• gpt-3.5-turbo-16k• gpt-3.5-turbo-16k-0613
    |'
- en: '| messages | Array | Required | An array of messages that are a part of the
    ongoing conversation.Each message in the array has two properties: "role" and
    "content." |'
  id: totrans-229
  prefs: []
  type: TYPE_TB
  zh: '| messages | Array | Required | 作为持续对话一部分的消息数组。数组中的每个消息有两个属性：“role”和“content。”
    |'
- en: '|   ↳ role | String | Required | Specifies the role of the message, which can
    be any of the following:• "system"• "user"• "assistant"• "tool" |'
  id: totrans-230
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ role | 字符串 | 必需 | 指定消息的角色，可以是以下任何一种：• "system"• "user"• "assistant"• "tool"
    |'
- en: '|   ↳ content | String | Required | Contains the text of the message for the
    specified role. |'
  id: totrans-231
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ content | 字符串 | 必需 | 包含指定角色的消息文本。 |'
- en: '| tools | Array | Optional | This allows you to specify a list of tools that
    the model can call. Currently, the only supported type of tool is a function.This
    parameter enables you to define a set of functions for which the model can generate
    JSON inputs. |'
  id: totrans-232
  prefs: []
  type: TYPE_TB
  zh: '| tools | 数组 | 可选 | 这允许您指定模型可以调用的工具列表。目前，唯一支持的工具类型是函数。此参数使您能够定义模型可以生成JSON输入的函数集。
    |'
- en: '|   ↳ type | String | Required | This is type of the tool, which can be any
    of the following:• "function" |'
  id: totrans-233
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ type | 字符串 | 必需 | 这是工具的类型，可以是以下任何一种：• "function" |'
- en: '|   ↳ function | Array | Optional | An array of functions that the model may
    use to call in the Chat Completion. |'
  id: totrans-234
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ function | 数组 | 可选 | 模型在聊天完成中可能使用的函数数组。 |'
- en: '|   ↳↳ name | String | Required | The name of the function to be called.Valid
    names must be a-z, A-Z, 0-9, or contain underscores and dashes.The maximum length
    is 64 characters. |'
  id: totrans-235
  prefs: []
  type: TYPE_TB
  zh: '|   ↳↳ name | 字符串 | 必需 | 要调用的函数的名称。有效的名称必须是a-z、A-Z、0-9，或包含下划线和破折号。最大长度为64个字符。
    |'
- en: '|   ↳↳ description | String | Optional | A description of what the function
    does.This helps the model to decide whether to call the function in the Chat Completion.
    |'
  id: totrans-236
  prefs: []
  type: TYPE_TB
  zh: '|   ↳↳ description | 字符串 | 可选 | 函数的功能描述。这有助于模型决定是否在聊天完成中调用函数。 |'
- en: '|   ↳↳ parameters | JSON object | Required | The parameters the function accepts
    in the format of a JSON Schema object. |'
  id: totrans-237
  prefs: []
  type: TYPE_TB
  zh: '|   ↳↳ 参数 | JSON对象 | 必需 | 函数接受的参数格式为JSON Schema对象。 |'
- en: '| tool_choice | String or JSON objectdefault:"none" when no functions are included
    in the request"auto" when functions are included in the request | Optional | This
    allows you to determine which, if any, function the model should invoke.When set
    to "none," the model will refrain from calling any function and will solely generate
    a message response.When set to "auto," the model has the flexibility to choose
    between generating a message response or invoking a function based on its internal
    decision-making process. |'
  id: totrans-238
  prefs: []
  type: TYPE_TB
  zh: '| tool_choice | 字符串或JSON对象默认值："none" 当请求中不包含函数时 "auto" 当请求中包含函数时 | 可选 | 这允许您确定模型应该调用哪个函数（如果有的话）。当设置为"none"时，模型将避免调用任何函数，仅生成消息响应。当设置为"auto"时，模型可以根据其内部决策过程灵活选择生成消息响应或调用函数。
    |'
- en: '| temperature | Number or nulldefault: 1 | Optional | Valid values range between
    0 and 2.Controls the randomness of the model’s output.The best practice is to
    adjust the top_p or temperature, but not both. |'
  id: totrans-239
  prefs: []
  type: TYPE_TB
  zh: '| temperature | 数字或null默认值：1 | 可选 | 有效值介于0和2之间。控制模型输出的随机性。最佳实践是调整top_p或温度，但不要同时调整两者。
    |'
- en: '| top_p | Number or nulldefault: 1 | Optional | Valid values range between
    0 and 1.Indicates whether to consider few possibilities (0) or all possibilities
    (1).The best practice is to adjust the top_p or temperature, but not both. |'
  id: totrans-240
  prefs: []
  type: TYPE_TB
  zh: '| top_p | 数字或null默认值：1 | 可选 | 有效值介于0和1之间。表示是否考虑少数可能性（0）或所有可能性（1）。最佳实践是调整top_p或温度，但不要同时调整两者。
    |'
- en: '| n | integer or nulldefault: 1 | Optional | Specifies how many Chat Completion
    choices the model should generate for each input message. |'
  id: totrans-241
  prefs: []
  type: TYPE_TB
  zh: '| n | 整数或null默认值：1 | 可选 | 指定模型为每个输入消息应生成的聊天完成选项数量。 |'
- en: '| stream | Boolean or nulldefault: false | Optional | If "stream" is set to
    "true," partial message updates will be sent as server-sent events.This means
    tokens will be sent as data-only events as they become available, and the stream
    will end with a "data: [DONE]" message |'
  id: totrans-242
  prefs: []
  type: TYPE_TB
  zh: '| stream | 布尔或null默认值：false | 可选 | 如果"stream"设置为"true"，则将发送部分消息更新作为服务器发送事件。这意味着标记将在可用时作为仅数据事件发送，并且流将以"data:
    [DONE]"消息结束 |'
- en: '| stop | String / array / nulldefault: null | Optional | You can provide up
    to 4 sequences where the API should stop generating further tokens.This can be
    useful for controlling the length or content of responses. |'
  id: totrans-243
  prefs: []
  type: TYPE_TB
  zh: '| stop | 字符串 / 数组 / null默认值：null | 可选 | 您可以提供最多4个序列，API将在其中停止生成进一步的标记。这可以用于控制响应的长度或内容。
    |'
- en: '| max_tokens | integer or nulldefault: inf | Optional | This parameter sets
    the maximum number of tokens that the generated Chat Completion can have. |'
  id: totrans-244
  prefs: []
  type: TYPE_TB
  zh: '| max_tokens | 整数或null默认值：inf | 可选 | 此参数设置生成的聊天完成的最大标记数。 |'
- en: '| response_format | JSON object | Optional | You have two options:{ "type":
    "json_object" }  for a JSON object responseor{ "type": "text" } for a text response
    |'
  id: totrans-245
  prefs: []
  type: TYPE_TB
  zh: '| response_format | JSON对象 | 可选 | 您有两个选项：{ "type": "json_object" } 用于JSON对象响应或
    { "type": "text" } 用于文本响应 |'
- en: '| seed | integer or null | Optional | By specifying a seed, the system will
    make an attempt to generate repeatable results.In theory, this means that if you
    make repeated requests with the same seed and parameters, you should expect to
    receive the same result.In order to get the seed value to put in the subsequent
    request, copy the system_fingerprint from your last response. |'
  id: totrans-246
  prefs: []
  type: TYPE_TB
  zh: '| seed | 整数或null | 可选 | 通过指定一个种子，系统将尝试生成可重复的结果。理论上，这意味着如果您使用相同的种子和参数进行重复请求，您应该期望收到相同的结果。为了将种子值放入后续请求中，请复制您上次响应中的system_fingerprint。
    |'
- en: '| presence_penalty | Number or nulldefault: 0 | Optional | A number between
    -2.0 and 2.0.Positive values penalize new tokens based on whether they appear
    in the conversation history, encouraging the model to talk about new topics. |'
  id: totrans-247
  prefs: []
  type: TYPE_TB
  zh: '| presence_penalty | 数字或null默认值：0 | 可选 | 一个介于-2.0和2.0之间的数字。正值根据新标记是否出现在对话历史中对其进行惩罚，鼓励模型讨论新主题。
    |'
- en: '| frequency_penalty | Number or nulldefaults: 0 | Optional | A number between
    -2.0 and 2.0.Positive values penalize tokens based on their existing frequency
    in the conversation history, reducing the likelihood of repeating the same lines
    verbatim. |'
  id: totrans-248
  prefs: []
  type: TYPE_TB
  zh: '| frequency_penalty | 数字或null默认值：0 | 可选 | 一个介于-2.0和2.0之间的数字。正值根据它们在对话历史中的现有频率对标记进行惩罚，降低重复相同行文字的概率。
    |'
- en: '| logit_bias | JSON Mapdefault: null | Optional | Allows you to modify the
    likelihood of specific tokens appearing in the completion.You provide a JSON object
    that maps tokens (specified by their token ID in the tokenizer) to associated
    bias values from -100 to 100.This bias is added to the model’s logits before sampling.
    |'
  id: totrans-249
  prefs: []
  type: TYPE_TB
  zh: '| logit_bias | JSON映射默认值：null | 可选 | 允许您修改特定标记在完成中的出现概率。您提供一个将标记（由分词器中的标记ID指定）映射到关联偏置值的JSON对象，范围从-100到100。此偏置在采样之前添加到模型的logits中。
    |'
- en: '| user | String | Optional | This is a unique ID that you can optionally generate
    to represent your end user. This will help OpenAI monitor and detect abuse. |'
  id: totrans-250
  prefs: []
  type: TYPE_TB
  zh: '| user | 字符串 | 可选 | 这是一个可选生成的唯一ID，可以代表您的最终用户。这将帮助OpenAI监控和检测滥用。 |'
- en: Note
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: In this book, we’re going to be working with the “stream” parameter set to its
    default setting, which is false. This means that we are going to receive the results
    from ChatGPT all at once as a single HTTP response.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，我们将使用默认设置为false的“stream”参数。这意味着我们将一次性作为单个HTTP响应接收来自ChatGPT的结果。
- en: However, there are cases where you would want this setting to be set true. Let’s
    say that you’re building, for example, an interactive voice-enabled chat bot.
    Let’s also say that you’re interested in converting the text from ChatGPT to audio
    so that your users can hear an audible response. In such a case, then you’d definitely
    want to set the “stream” parameter to be true. Why is this so? When the response
    is streamed back to your Java application, you have the opportunity at that moment
    to convert the text snippet to audio. This will enable you to work in parallel
    with converting text snippets to audio while receiving more text simultaneously.
    This will make the response seem more natural to the end user and help the conversation
    feel like an **actual** conversation.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有些情况下您可能希望将此设置设置为true。比如说，您正在构建一个交互式语音启用的聊天机器人。再比如说，您对将ChatGPT的文本转换为音频感兴趣，以便您的用户可以听到可听到的响应。在这种情况下，您肯定希望将“stream”参数设置为true。为什么是这样呢？当响应以流的形式返回到您的Java应用程序时，您有机会在那个时刻将文本片段转换为音频。这将使您能够在接收更多文本的同时并行地将文本片段转换为音频。这将使响应对最终用户来说看起来更自然，并帮助对话感觉像**真实的**对话。
- en: 'Listing [2-4](#PC4) is an example of what the JSON object would look like in
    order to properly invoke the Chat Endpoint.{  "model": "gpt-3.5-turbo",  "messages":
    [    {      "role": "system",      "content": "You are a product marketer"    },    {      "role":
    "user",      "content": "Explain why Java is so widely used in the enterprise
    "    }  ],  "temperature": 1,  "max_tokens": 256,  "top_p": 1,  "frequency_penalty":
    0,  "presence_penalty": 0}Listing 2-4'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: '列表[2-4](#PC4)是正确调用聊天端点时JSON对象的一个示例。{  "model": "gpt-3.5-turbo",  "messages":
    [    {      "role": "system",      "content": "You are a product marketer"    },    {      "role":
    "user",      "content": "Explain why Java is so widely used in the enterprise
    "    }  ],  "temperature": 1,  "max_tokens": 256,  "top_p": 1,  "frequency_penalty":
    0,  "presence_penalty": 0}列表2-4'
- en: Example of the Chat JSON Object
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: Chat JSON 对象示例
- en: Handling the Response
  id: totrans-256
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 处理响应
- en: After successfully invoking the Chat Endpoint, the API will respond with a Chat
    Completion object or a stream of completion chunks if streaming is enabled. Here’s
    a breakdown of the Chat Completion object.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 在成功调用 Chat 端点后，API 将响应一个 Chat Completion 对象，如果启用了流式传输，则返回一系列完成块。以下是 Chat Completion
    对象的分解。
- en: Chat Completion (JSON)
  id: totrans-258
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Chat Completion (JSON)
- en: Table 2-5
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 表 2-5
- en: The Structure of the Chat Competion JSON Object
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: Chat Competion JSON 对象的结构
- en: '| Field | Type | Description |'
  id: totrans-261
  prefs: []
  type: TYPE_TB
  zh: '| 字段 | 类型 | 描述 |'
- en: '| --- | --- | --- |'
  id: totrans-262
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| id | String | The unique identifier for the Chat Completion. |'
  id: totrans-263
  prefs: []
  type: TYPE_TB
  zh: '| id | 字符串 | Chat Completion 的唯一标识符。 |'
- en: '| object | String | This always returns the literal, "chat.completion." |'
  id: totrans-264
  prefs: []
  type: TYPE_TB
  zh: '| object | 字符串 | 这始终返回字面量，“chat.completion。” |'
- en: '| system_fingerprint | String | Use this parameter as the "seed" in a subsequent
    request if you want to reproducible results in from a previous conversation. |'
  id: totrans-265
  prefs: []
  type: TYPE_TB
  zh: '| system_fingerprint | 字符串 | 如果您想要在后续请求中重现之前对话的结果，请将此参数用作“种子”。 |'
- en: '| created | integer | The timestamp of the Chat Completion. |'
  id: totrans-266
  prefs: []
  type: TYPE_TB
  zh: '| created | 整数 | Chat Completion 的时间戳。 |'
- en: '| model | String | The model used for the Chat Completion. |'
  id: totrans-267
  prefs: []
  type: TYPE_TB
  zh: '| model | 字符串 | 用于 Chat Completion 的模型。 |'
- en: '| choices | Array | A list of Chat Completion choices available.You can get
    more than one choice of messages if you specify the desired number of responses
    you want with the "n" parameter in the Chat JSON request. See Table [2-4](#Tab4).
    |'
  id: totrans-268
  prefs: []
  type: TYPE_TB
  zh: '| choices | 数组 | 可用的 Chat Completion 选择列表。如果您在 Chat JSON 请求中指定了所需的响应数量，则可以获取多个消息选择。"n"
    参数用于指定。请参阅表 [2-4](#Tab4)。 |'
- en: '|   ↳ index | integer | The index of the choice in the list. |'
  id: totrans-269
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ index | 整数 | 列表中选择的索引。 |'
- en: '|   ↳ message | Array | A chat completion message generated by the model. |'
  id: totrans-270
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ message | 数组 | 模型生成的聊天完成消息。 |'
- en: '|   ↳ finish_reason | String | Every response will include a finish_reason.
    The possible values for finish_reason arestop: The API returned complete message,
    or a message terminated by one of the stop sequences provided via the stop parameter.length:
    The model output was incomplete due to the max_tokens parameter in the request
    or token limit of the model itself.tool_call: The model called a tool, such as
    a fucntion.content_filter: The response was terminated due to a violation of the
    content filters.null: The API response still in progress or incomplete. |'
  id: totrans-271
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ finish_reason | 字符串 | 每个响应都将包含一个 finish_reason。finish_reason 的可能值有：stop：API
    返回了完整的消息，或由 stop 参数提供的终止序列之一终止的消息.length：由于请求中的 max_tokens 参数或模型本身的标记限制，模型输出不完整.tool_call：模型调用了工具，例如函数.content_filter：由于违反内容过滤器，响应被终止.null：API
    响应仍在进行中或未完成。 |'
- en: '| usage | Array | Usage statistics for the completion request, including the
    number of tokens in the prompt, completion, and total request. |'
  id: totrans-272
  prefs: []
  type: TYPE_TB
  zh: '| usage | 数组 | 完成请求的使用统计信息，包括提示、完成和总请求中的标记数量。 |'
- en: '|   ↳ prompt_tokens | integer | The number of tokens used in the prompt. |'
  id: totrans-273
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ prompt_tokens | 整数 | 提示中使用的标记数量。 |'
- en: '|   ↳ completion_tokens | integer | The number of tokens used in the response.
    |'
  id: totrans-274
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ completion_tokens | 整数 | 响应中使用的标记数量。 |'
- en: '|   ↳ total_tokens | integer | The sum total of all token in the request and
    response. |'
  id: totrans-275
  prefs: []
  type: TYPE_TB
  zh: '|   ↳ total_tokens | 整数 | 请求和响应中所有标记的总和。 |'
- en: 'Listing [2-5](#PC5) is an example of the JSON response after invoking the Chat
    Endpoint.![](../images/607613_1_En_2_Chapter/607613_1_En_2_Figc_HTML.gif)A logo
    of open A I.{  "id": "chatcmpl-7wUOFQ3S34scDLmrLdWTTqvHmXztQ",  "object": "chat.completion",  "created":
    1694174199,  "model": "gpt-3.5-turbo-0613",  "choices": [    {      "index": 0,      "message":
    {        "role": "assistant",        "content": "Java is widely used in the enterprise
    because it is platform-independent, allowing applications to run on any system.
    Additionally, Java has a large and mature ecosystem with a vast array of libraries,
    frameworks, and tools, making it easier for developers to build robust and scalable
    enterprise applications."      },      "finish_reason": "stop"    }  ],  "usage":
    {    "prompt_tokens": 32,    "completion_tokens": 55,    "total_tokens": 87  }}Listing
    2-5'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: '列表 [2-5](#PC5) 是调用Chat端点后的JSON响应示例。![open A I.的标志](../images/607613_1_En_2_Chapter/607613_1_En_2_Figc_HTML.gif)A
    logo of open A I.{  "id": "chatcmpl-7wUOFQ3S34scDLmrLdWTTqvHmXztQ",  "object":
    "chat.completion",  "created": 1694174199,  "model": "gpt-3.5-turbo-0613",  "choices":
    [    {      "index": 0,      "message": {        "role": "assistant",        "content":
    "Java is widely used in the enterprise because it is platform-independent, allowing
    applications to run on any system. Additionally, Java has a large and mature ecosystem
    with a vast array of libraries, frameworks, and tools, making it easier for developers
    to build robust and scalable enterprise applications."      },      "finish_reason":
    "stop"    }  ],  "usage": {    "prompt_tokens": 32,    "completion_tokens": 55,    "total_tokens":
    87  }}列表 2-5'
- en: The Chat Completion JSON Object
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: Chat Completion JSON 对象
- en: Wait, How Many Tokens Are in My Prompt?
  id: totrans-278
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 等等，我的提示中有多少个token？
- en: At a certain point, you’re going to start thinking about the prompts that you
    plan to send to ChatGPT and give considerable thought to the token limitations
    (and the costs) regarding the model that you want to use. In case you forgot,
    be sure to refer back to Table 1-1 for a list of models and the price of the tokens.
    Additionally, OpenAI created a simple to use website that allows you to see how
    many tokens are in your prompt, as shown in Figure [2-1](#Fig1).
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 在某个时刻，你将开始思考计划发送给ChatGPT的提示，并对你想要使用的模型的token限制（以及成本）给予相当多的思考。如果你忘记了，请务必参考表 1-1
    以获取模型列表和token价格。此外，OpenAI创建了一个简单易用的网站，允许你查看你的提示中有多少个token，如图 [2-1](#Fig1) 所示。
- en: ChatGPT Token Counter
  id: totrans-280
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT Token 计数器
- en: '[https://platform.openai.com/tokenizer](https://platform.openai.com/tokenizer)![](../images/607613_1_En_2_Chapter/607613_1_En_2_Fig1_HTML.jpg)'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://platform.openai.com/tokenizer](https://platform.openai.com/tokenizer)![](../images/607613_1_En_2_Chapter/607613_1_En_2_Fig1_HTML.jpg)'
- en: A page titled Tokenizer has a few paragraphs to learn about language model tokenization.
    A text box reads, How many tokens are in this line of text? The answer is given
    at the bottom as 10 tokens and 41 characters.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 一个名为“Tokenizer”的页面有几段介绍语言模型分词的内容。一个文本框写着，“这一行文本中有多少个token？”答案在底部给出，为10个token和41个字符。
- en: Figure 2-1
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-1
- en: The ChatGPT Tokenizer Can Give You a Quick Count of the Tokens in Your Prompt
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT分词器可以快速计算你的提示中的token数量
- en: 'Creating the Next Java App: ChatGPTClient.java'
  id: totrans-285
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建下一个Java应用程序：ChatGPTClient.java
- en: 'Now it’s time to build our own ChatGPTClient. Let’s simply dive right in, and
    provide the ChatGPT the information it needs via the ChatGPT Playground.**System**:
    You are a Java developer**User**: Convert the following cURL command to Java.
    Make sure the URL and API keys to the API are variables. I want to use the Jackson
    library to create the JSON object in the request. Name the main class, ChatGPTClient,
    and create helper classes if necessary.**User:**curl https://api.openai.com/v1/chat/completions
    \  -H "Content-Type: application/json" \  -H "Authorization: Bearer $OPENAI_API_KEY"
    \  -d ''{  "model": "gpt-3.5-turbo",  "messages": [    {      "role": "system",      "content":
    "You are a product marketer"    },    {      "role": "user",      "content": "Explain
    why Java is so widely used in the enterprise "    }  ],  "temperature": 1,  "max_tokens":
    256,  "top_p": 1,  "frequency_penalty": 0,  "presence_penalty": 0}''Listing 2-6'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: '现在是时候构建我们自己的 ChatGPTClient 了。让我们直接深入，并通过 ChatGPT Playground 提供ChatGPT所需的信息。**系统**：你是一名Java开发者**用户**：将以下cURL命令转换为Java。确保API的URL和API密钥是变量。我想使用Jackson库在请求中创建JSON对象。将主类命名为ChatGPTClient，并在必要时创建辅助类。**用户**：curl
    https://api.openai.com/v1/chat/completions \  -H "Content-Type: application/json"
    \  -H "Authorization: Bearer $OPENAI_API_KEY" \  -d ''{  "model": "gpt-3.5-turbo",  "messages":
    [    {      "role": "system",      "content": "You are a product marketer"    },    {      "role":
    "user",      "content": "Explain why Java is so widely used in the enterprise
    "    }  ],  "temperature": 1,  "max_tokens": 256,  "top_p": 1,  "frequency_penalty":
    0,  "presence_penalty": 0}''列表 2-6'
- en: The Initial Conversation to Create ChatGPTClient.java
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 ChatGPTClient.java 的初始对话
- en: 'The response from ChatGPT was a good start, but didn’t have everything exactly
    as I wanted it. Now, since I didn’t specify exactly how the HTTP calls should
    have been made, ChatGPT decided to use the Apache HTTPClient library. Therefore,
    I added the following User message (Listing [2-7](#PC7)).**User**: I have a Java
    11 environment, so use Java 11 HTTP classes for the API calls. I''d rather use
    pure Java instead of Apache HttpClientListing 2-7'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 的响应是一个良好的开端，但并没有完全符合我想要的内容。现在，由于我没有明确指定 HTTP 调用应该如何进行，ChatGPT 决定使用 Apache
    HTTPClient 库。因此，我添加了以下用户消息（列表 [2-7](#PC7)）。**用户**：我有一个 Java 11 环境，所以请使用 Java 11
    HTTP 类进行 API 调用。我更愿意使用纯 Java 而不是 Apache HttpClient
- en: PROMPT. Adding Additional Information to the Conversation to Create ChatGPTClient.java
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: PROMPT. 向对话中添加额外信息以创建 ChatGPTClient.java
- en: The goal here is to have a conversation. It’s impractical to expect ChatGPT
    to produce exactly what you want in a single prompt. Even developers don’t do
    that! Therefore, feel free to have the conversation with ChatGPT, and clarify
    to it things that it may have guessed or assumed incorrectly.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的目标是进行一场对话。期望 ChatGPT 在单个提示中就完全符合你的要求是不切实际的。即使是开发者也不会这样做！因此，请随意与 ChatGPT 进行对话，并向其澄清它可能猜测或假设错误的事情。
- en: 'Listing [2-8](#PC8) shows the final result for ChatGPTClient.java.![](../images/607613_1_En_2_Chapter/607613_1_En_2_Figd_HTML.gif)A
    logo of open A I.import com.fasterxml.jackson.core.JsonProcessingException;import
    com.fasterxml.jackson.databind.ObjectMapper;import com.fasterxml.jackson.annotation.JsonProperty;import
    java.io.BufferedReader;import java.io.IOException;import java.io.InputStreamReader;import
    java.io.OutputStream;import java.net.HttpURLConnection;import java.net.URL;import
    java.util.ArrayList;import java.util.List;public class ChatGPTClient {        public
    static void main(String[] args) {        String openAIKey = "insert your API key
    here";        String endpoint = "https://api.openai.com/v1/chat/completions";        String
    model = "gpt-3.5-turbo";        float temperature = 1.0f;        int max_tokens
    = 256;        float top_p = 1.0f;        int frequency_penalty = 0;        int
    presence_penalty = 0;        List<Message> messages = new ArrayList<>();        messages.add(new
    Message("system", "You are a product marketer."));        messages.add(new Message("user",
    "Explain why Java is so widely used in the enterprise"));        String jsonInput
    = null;        try {            ObjectMapper mapper = new ObjectMapper();            Chat
    chat = new Chat(model, messages, temperature, max_tokens, top_p, frequency_penalty,
    presence_penalty);            jsonInput = mapper.writeValueAsString(chat);        }
    catch (JsonProcessingException e) {            e.printStackTrace();        }        try
    {            URL url = new URL(endpoint);            HttpURLConnection connection
    = (HttpURLConnection) url.openConnection();            connection.setRequestMethod("POST");            connection.setRequestProperty("Content-Type",
    "application/json");            connection.setRequestProperty("Authorization",
    "Bearer " + openAIKey);            connection.setDoOutput(true);            OutputStream
    outputStream = connection.getOutputStream();            outputStream.write(jsonInput.getBytes());            outputStream.flush();            outputStream.close();            int
    responseCode = connection.getResponseCode();            if (responseCode == HttpURLConnection.HTTP_OK)
    {                BufferedReader reader = new BufferedReader(new InputStreamReader(connection.getInputStream()));                StringBuilder
    response = new StringBuilder();                String line;                while
    ((line = reader.readLine()) != null) {                    response.append(line);                }                reader.close();                //
    Print the response                System.out.println(response.toString());            }
    else {                System.out.println("Error: " + responseCode);            }            connection.disconnect();        }
    catch (IOException e) {            e.printStackTrace();        }    }    // Helper
    class to represent the Chat object    static class Chat {        @JsonProperty("model")        private
    String model;        @JsonProperty("messages")        private List<Message> messages;        @JsonProperty("temperature")        private
    float temperature;        @JsonProperty("max_tokens")        private int max_tokens;        @JsonProperty("top_p")        private
    float top_p;        @JsonProperty("frequency_penalty")        private int frequency_penalty;        @JsonProperty("presence_penalty")        private
    int presence_penalty;        public Chat(String model, List<Message> messages,
    float temperature, int max_tokens, float top_p, int frequency_penalty, int presence_penalty)
    {            this.model = model;            this.messages = messages;            this.temperature
    = temperature;            this.max_tokens = max_tokens;            this.top_p
    = top_p;            this.frequency_penalty = frequency_penalty;            this.presence_penalty
    = presence_penalty;        }        // Getters and setters (optional, but can
    be useful if you need to modify the object later)        }    // Helper class
    to represent the Chat Message    static class Message {        @JsonProperty("role")        private
    String role;        @JsonProperty("content")        private String content;        public
    Message(String role, String content) {            this.role = role;            this.content
    = content;        }    }}Listing 2-8'
