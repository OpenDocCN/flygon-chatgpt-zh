- en: '****T**he** ****ne**xt** ****co**mmo**n ****bar**rie**r ****prev**entin**g
    ****pe**opl**e ****fr**om** ****get**tin**g ****t**he** ****he**lp** ****th**ey**
    ****ne**ed** ****f**or** ****th**eir** ****me**nta**l ****he**alt**h ****i**s**
    ****t**he** ****la**ck** ****o**f** ****educ**atio**n ****a**nd** ****awar**enes**s
    ****o**ut** ****th**ere** ****ab**out** ****i**t**. ****A**s** ****w**e**’****v**e**
    ****ment**ione**d, ****me**nta**l ****he**alt**h ****i**s** ****o**ne** ****o**f**
    ****t**he** ****catc**hword**s ****o**f** ****t**he** ****mo**der**n ****a**ge**.
    ****B**ut** ****i**t** ****ha**sn**’****t**** ****al**way**s ****be**en** ****th**at**
    ****w**ay**. ****I**n** ****fa**ct**, ****un**til** ****pr**ett**y ****rec**entl**y,
    ****me**nta**l ****he**alt**h ****is**sue**s ****we**re** ****b**y**-****a**nd**-****la**rge**
