  id: totrans-1452
  prefs: []
  type: TYPE_NORMAL
  zh: API：Binance API 允许您实时访问市场数据，下订单和管理投资组合。
- en: 'Benefits: Wide range of cryptocurrencies, low transaction fees, comprehensive
    API documentation.'
  id: totrans-1453
  prefs: []
  type: TYPE_NORMAL
  zh: 优点：广泛的加密货币种类，低交易费用，全面的 API 文档。
