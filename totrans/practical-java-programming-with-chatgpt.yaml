    a two-factor authentication mechanism, which requires you to click on a verification
    link in the email that is sent to you. A strong password must be entered, as requested
    in *[Figure 1.3](#fig1_3)*.
  id: totrans-334
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 需要一个有效的电子邮件地址，您能够访问，因为OpenAI使用双因素认证机制，这要求您点击发送到您邮箱的验证链接。必须输入如图*[图1.3](#fig1_3)*所示要求的强密码。
