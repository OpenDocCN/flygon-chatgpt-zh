  - PREF_H3
  type: TYPE_NORMAL
  zh: '****8****.****1**** ****适应**语调**'
- en: '****Cha**tGP**T ****c**an** ****sh**ift** ****i**ts** ****to**ne** ****depe**ndin**g
    ****o**n** ****t**he** ****ta**sk**:'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: '****ChatGPT****可以**根据**任务**调整**其**语调**：'
