- en: Note
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: So let’s slow things down a bit and talk about intents. What exactly is an “intent”
    and why is it needed? For the purposes of the Discord API, you need to specify
    explicitly every type of information that you want to be notified by Discord programmatically.
    Otherwise, Discord will constantly bombard you with events that are not relevant
    to you or your bot. For example, for our purposes, we don’t care when people join
    or leave the server. However, if you want to send a list of server rules to anyone
    who joins your server for the first time, then you definitely would want to enable
    the “**SERVER MEMBERS INTENT**.” When we deep dive into the code, you’ll see more
    information about intents.
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们放慢节奏，谈谈意图。究竟什么是“意图”，为什么需要它？对于Discord API来说，你需要明确指定你想要通过Discord程序通知的每种类型的信息。否则，Discord会不断地向你发送与你或你的机器人无关的事件。例如，就我们的目的而言，我们不在乎人们何时加入或离开服务器。然而，如果你想要向第一次加入你服务器的任何人发送服务器规则列表，那么你肯定希望启用“**服务器成员意图**”。当我们深入代码时，你会看到更多关于意图的信息。
