  type: TYPE_NORMAL
  zh: 你想在TikTok直播中讨论哪些主题或主题？
- en: What type of interaction do you want—Q&A, tutorial, entertainment, storytelling?
  id: totrans-555
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你希望有什么类型的互动——问答、教程、娱乐、讲故事？
- en: What is your goal for using TikTok Live (sales, brand awareness, community engagement)?
  id: totrans-556
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你使用TikTok直播的目标是什么（销售、品牌知名度、社区互动）？
- en: Do you want to bring on a guest or collaborate with another creator?
  id: totrans-557
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是想邀请嘉宾还是与其他创作者合作？
