  prefs: []
  type: TYPE_NORMAL
- en: Influence plots
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cook’s distance
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: VIF (variance inflation factor)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Condition Number
