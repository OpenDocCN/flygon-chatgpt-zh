  type: TYPE_NORMAL
- en: Sub Gross_Salary()
  prefs: []
  type: TYPE_NORMAL
- en: '''The user will select the range H2:H101 cells As Range.'
  prefs: []
  type: TYPE_NORMAL
- en: For Each wscell In Selection
  prefs: []
  type: TYPE_NORMAL
- en: wscell.Offset(0, 1).Value = "=rc[-1]*75%"
  prefs: []
  type: TYPE_NORMAL
- en: wscell.Offset(0, 2).Value = "=rc[-2]*60%"
  prefs: []
  type: TYPE_NORMAL
- en: wscell.Offset(0, 3).Value = "=sum(rc[-1]:rc[-3])"
  prefs: []
  type: TYPE_NORMAL
- en: Next
  prefs: []
  type: TYPE_NORMAL
- en: End Sub
  prefs: []
  type: TYPE_NORMAL
