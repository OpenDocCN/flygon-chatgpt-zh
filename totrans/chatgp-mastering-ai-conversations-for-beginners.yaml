  zh: 任何**伟大**的**创新**或**新技术**都伴随着**大量**的风险，**不仅**对其**创造者**和**用户**，而且对**ChatGPT**来说也是如此。许多技术专家认为，OpenAI的聊天机器人标志着**人工智能**以及我们**使用**它的**方式**，以及它“**使用**”我们的**方式**的**转折点**。生成式AI有能力**彻底改变**我们**工作**、**学习**和**生活**在**技术****痴迷**的**世界**中的**方式**，但我们**确实**需要在**风险**和**回报**之间**取得平衡**。**同样**重要的是要记住，**OpenAI**不是**慈善机构**或某种**人道主义**的**冒险**；它是一家**盈利**的**企业**。**虽然**我们现在**不**需要**付费**使用ChatGPT，**OpenAI**也没有**支付**用于**训练**其LLM的**数据**，**没有人**因为**使用**他们的**数据**而**获得补偿**，而**OpenAI**的价值自2021年以来**翻倍**，到2023年**估值**约为**2900亿美元**（Gallup，2023）。**此外**，**OpenAI**在2023年2月发布了ChatGPT
    Plus，这是一个**付费订阅**版本的AI，它**优先考虑**用户并**保证**他们**持续**访问**平台**，**而你**则**遭遇**了一个**完美的****数据隐私****困境**。预计ChatGPT
    Plus到2024年将**产生**超过**100亿美元**的**收入**（Gallup，2023）。
