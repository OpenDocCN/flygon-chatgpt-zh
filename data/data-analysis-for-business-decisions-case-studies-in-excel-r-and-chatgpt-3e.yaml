- en: Improving Data Visuals Using Generative AI
  id: totrans-2682
  prefs: []
  type: TYPE_NORMAL
  zh: 利用生成式AI改进数据可视化
- en: 'Large language models can be used to audit data visuals. We use the principles
    in this chapter to fine-tune an LLM: ChatGPT. Then, we present it with a chart
    and ask for critiques, what is wrong with it and how to fix the problems, while
    using the 18-point checklist we developed in this chapter.'
  id: totrans-2683
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型可以用于审核数据可视化。我们利用本章中的原则微调了一个LLM：ChatGPT。然后，我们向它展示一张图表并请求批评，询问图表的问题以及如何修复这些问题，同时使用我们在本章中开发的18点清单。
- en: The first prompt requires uploading a copy of [Chapter 17](26_ch17.xhtml), which
    is found in the Case Data repository, and setting up the model to be a “data visualization
    expert.”
  id: totrans-2684
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个提示需要上传[第17章](26_ch17.xhtml)的副本，该副本位于案例数据存储库中，并设置模型为“数据可视化专家”。
- en: 'Prompt: “Please take on the role of a leading data visualization expert who
    is ready to give advice on how to enhance charts that are presented to you. You
    have developed an 18-point analysis template which you use to review charts, and
    it has been uploaded as a set of principles. We would like to use these principles
    to advise us on how to improve a data visualization.”'
  id: totrans-2685
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“请扮演一位准备就如何增强你展示的图表提供建议的领先数据可视化专家。你已经开发了一个18点分析模板，用于审查图表，并且它已作为一组原则上传。我们希望使用这些原则来指导我们如何改进数据可视化。”
- en: 'Response from ChatGPT:'
  id: totrans-2686
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: Excellent, let’s start by utilizing the 18-point analysis template to audit
    and improve your data visual. Please upload the chart or data visual you’d like
    me to review. Once I have it, we can apply the principles from the template to
    enhance its effectiveness.
  id: totrans-2687
  prefs: []
  type: TYPE_NORMAL
  zh: 很好，让我们首先利用18点分析模板来审计和改进你的数据可视化。请上传你希望我审查的图表或数据可视化。一旦我有了它，我们就可以应用模板中的原则来提高其有效性。
- en: Now upload a data visual for it to analyze. Let’s use the one analyzed in the
    chapter, so we have a reasonable comparison between a data visual expert, the
    author, and the model. Use this prompt and upload the chart.
  id: totrans-2688
  prefs: []
  type: TYPE_NORMAL
  zh: 现在请上传一个数据可视化供分析。让我们使用章节中分析的那个，以便我们可以在数据可视化专家、作者和模型之间进行合理的比较。使用这个提示并上传图表。
- en: 'Prompt: “I want to use this chart to present to a customer, the City of New
    York, about how much money they have spent with us over the years. This will demonstrate
    that we have been a good vendor for them and that we want to continue as their
    partners. Analyze the chart along the 18 dimensions to determine what is wrong
    with it and how to make it better.”'
  id: totrans-2689
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“我想使用这个图表向客户，纽约市，展示他们多年来在我们这里花费的金额。这将证明我们一直是他们的好供应商，并且我们希望继续作为他们的合作伙伴。沿着18个维度分析图表，以确定它的问题以及如何改进。”
- en: 'Response from ChatGPT:'
  id: totrans-2690
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: 'Let’s analyze the provided chart using the 18-point template and suggest improvements:'
  id: totrans-2691
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用18点模板分析提供的图表并提出改进建议：
- en: Story
  id: totrans-2692
  prefs: []
  type: TYPE_NORMAL
  zh: 故事
- en: '**1.**Create a Visual Story'
  id: totrans-2693
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**创建视觉故事'
- en: '• Current: The chart does not clearly convey the overall message of being a
    valuable vendor.'
  id: totrans-2694
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：图表没有清楚地传达作为有价值供应商的整体信息。
- en: '• Improvement: Add a clear title or annotation that emphasizes the key message,
    e.g., “Demonstrating Our Strong Partnership with NYC.”'
  id: totrans-2695
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：添加一个明确的标题或注释，强调关键信息，例如，“展示我们与纽约市强大的合作伙伴关系。”
- en: '**2.**Make It a Prop'
  id: totrans-2696
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**将其作为道具'
- en: '• Current: The visual is cluttered and may distract from the main story.'
  id: totrans-2697
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：视觉元素杂乱，可能会分散对主要故事的注意力。
- en: '• Improvement: Simplify the chart by focusing on the most important data points.
    Consider using fewer colors and removing the 3D effect.'
  id: totrans-2698
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：通过聚焦最重要的数据点简化图表。考虑使用更少的颜色并移除3D效果。
- en: '**3.**Emulate Legendary Storytellers'
  id: totrans-2699
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**模仿传奇故事讲述者'
- en: '• Current: The chart lacks a connection to well-established visual storytelling
    techniques.'
  id: totrans-2700
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：图表缺乏与成熟的视觉叙事技巧的联系。
- en: '• Improvement: Use a bar chart or another more effective visual method to highlight
    the key agencies and their spending more clearly.'
  id: totrans-2701
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：使用条形图或其他更有效的视觉方法来更清晰地突出关键机构和它们的支出。
- en: Signs
  id: totrans-2702
  prefs: []
  type: TYPE_NORMAL
  zh: 符号
- en: '**4.**Signs'
  id: totrans-2703
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.**符号'
- en: '• Current: The use of signs and symbols is not very effective.'
  id: totrans-2704
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：使用符号和标志的效果不是很有效。
- en: '• Improvement: Use consistent and easily distinguishable colors for different
    segments. Avoid the 3D effect.'
  id: totrans-2705
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：使用一致且易于区分的颜色为不同部分着色。避免3D效果。
- en: '**5.**Communication'
  id: totrans-2706
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.**沟通'
- en: '• Current: The signal-to-noise ratio is low due to the 3D effect and multiple
    colors.'
  id: totrans-2707
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：由于3D效果和多种颜色，信噪比低。
- en: '• Improvement: Flatten the chart to 2D and use a limited color palette to improve
    clarity.'
  id: totrans-2708
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：将图表简化为2D，并使用有限的调色板来提高清晰度。
- en: '**6.**Function'
  id: totrans-2709
  prefs: []
  type: TYPE_NORMAL
  zh: '**6.**功能'
- en: '• Current: The chart appears more decorative than informational.'
  id: totrans-2710
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：图表看起来更像装饰性而非信息性。
- en: '• Improvement: Focus on making the chart functional by using a more straightforward
    chart type and clearer labels.'
  id: totrans-2711
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：通过使用更直接的图表类型和更清晰的标签来使图表功能化。
- en: Purpose
  id: totrans-2712
  prefs: []
  type: TYPE_NORMAL
  zh: 目的
- en: '**7.**Need'
  id: totrans-2713
  prefs: []
  type: TYPE_NORMAL
  zh: '**7.**需求'
- en: '• Current: The chart does not fully address organizational information needs.'
  id: totrans-2714
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：图表没有完全满足组织信息需求。
- en: '• Improvement: Ensure the chart highlights the most significant data that underscores
    the partnership’s value.'
  id: totrans-2715
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：确保图表突出显示强调合作伙伴价值的最重要数据。
- en: '**8.**Audience'
  id: totrans-2716
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.**受众'
- en: '• Current: The chart does not fully consider the audience’s needs and biases.'
  id: totrans-2717
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：图表没有充分考虑受众的需求和偏见。
- en: '• Improvement: Use a format that the audience can quickly interpret, such as
    a bar chart, which is generally easier to read than a pie chart.'
  id: totrans-2718
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：使用观众可以快速理解的格式，例如柱状图，通常比饼图更容易阅读。
- en: '**9.**Frame'
  id: totrans-2719
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.**框架'
- en: '• Current: The chart does not answer a well-framed analytical question.'
  id: totrans-2720
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：图表未能回答一个精心设计的分析问题。
- en: '• Improvement: Frame the data to answer specific questions, such as “Which
    departments have we served the most?” or “How has spending changed over time?”'
  id: totrans-2721
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：将数据框架化以回答特定问题，例如“哪些部门是我们的主要服务对象？”或“支出是如何随时间变化的？”
- en: Perception
  id: totrans-2722
  prefs: []
  type: TYPE_NORMAL
  zh: 感知
- en: '**10.**Seeing'
  id: totrans-2723
  prefs: []
  type: TYPE_NORMAL
  zh: '**10.**观察'
- en: '• Current: The eye does not naturally focus on the most important point.'
  id: totrans-2724
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：眼睛不会自然地聚焦于最重要的点。
- en: '• Improvement: Use color and size to draw attention to key data points.'
  id: totrans-2725
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：使用色彩和大小来吸引对关键数据点的注意。
- en: '**11.**Mind'
  id: totrans-2726
  prefs: []
  type: TYPE_NORMAL
  zh: '**11.**思维'
- en: '• Current: Gestalt principles of perception are not well utilized.'
  id: totrans-2727
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：感知的格式塔原理没有得到充分利用。
- en: '• Improvement: Group similar data together and use visual hierarchy to guide
    the viewer’s attention.'
  id: totrans-2728
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：将相似数据分组并使用视觉层次结构引导观众的注意力。
- en: '**12.**Quality'
  id: totrans-2729
  prefs: []
  type: TYPE_NORMAL
  zh: '**12.**质量'
- en: '• Current: The chart does not effectively inform the viewer.'
  id: totrans-2730
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：图表未能有效地通知观众。
- en: '• Improvement: Ensure the chart provides clear and insightful information,
    perhaps with annotations or highlights.'
  id: totrans-2731
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：确保图表提供清晰且富有洞察力的信息，可能需要添加注释或突出显示。
- en: Method
  id: totrans-2732
  prefs: []
  type: TYPE_NORMAL
  zh: 方法
- en: '**13.**Color'
  id: totrans-2733
  prefs: []
  type: TYPE_NORMAL
  zh: '**13.**色彩'
- en: '• Current: Color usage is excessive and not very judicious.'
  id: totrans-2734
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：色彩使用过多且不够明智。
- en: '• Improvement: Use a more restrained color palette, focusing on key colors
    to highlight important data.'
  id: totrans-2735
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：使用更为节制的色彩调色板，专注于关键色彩以突出重要数据。
- en: '**14.**Chart junk'
  id: totrans-2736
  prefs: []
  type: TYPE_NORMAL
  zh: '**14.**图表杂项'
- en: '• Current: The chart includes unnecessary elements, like the 3D effect.'
  id: totrans-2737
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：图表包含不必要的元素，如3D效果。
- en: '• Improvement: Remove the 3D effect and any other non-essential visual elements.'
  id: totrans-2738
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：移除3D效果和其他任何非必要视觉元素。
- en: '**15.**Title'
  id: totrans-2739
  prefs: []
  type: TYPE_NORMAL
  zh: '**15.**标题'
- en: '• Current: The title does not fully convey the chart’s point.'
  id: totrans-2740
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：标题未能充分传达图表的观点。
- en: '• Improvement: Make the title more descriptive and directly related to the
    chart’s message.'
  id: totrans-2741
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：使标题更具描述性，并直接与图表信息相关。
- en: Charts
  id: totrans-2742
  prefs: []
  type: TYPE_NORMAL
  zh: 图表
- en: '**16.**Right Chart'
  id: totrans-2743
  prefs: []
  type: TYPE_NORMAL
  zh: '**16.**正确图表'
- en: '• Current: A pie chart may not be the best choice for this data.'
  id: totrans-2744
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：饼图可能不是处理此类数据的最佳选择。
- en: '• Improvement: Consider using a bar chart to better compare the spending across
    agencies.'
  id: totrans-2745
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：考虑使用柱状图以更好地比较各机构的支出。
- en: '**17.**Selection'
  id: totrans-2746
  prefs: []
  type: TYPE_NORMAL
  zh: '**17.**选择'
- en: '• Current: The chart type does not fully match the business question.'
  id: totrans-2747
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：图表类型与业务问题不完全匹配。
- en: '• Improvement: Use a chart type that better answers the business question,
    such as a stacked bar chart for cumulative data or a line chart for trends over
    time.'
  id: totrans-2748
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：使用更好地回答业务问题的图表类型，例如累积数据的堆积柱状图或随时间变化的趋势折线图。
- en: '**18.**Tables'
  id: totrans-2749
  prefs: []
  type: TYPE_NORMAL
  zh: '**18.**表格'
- en: '• Current: The pie chart segments are hard to compare.'
  id: totrans-2750
  prefs: []
  type: TYPE_NORMAL
  zh: • 当前：饼图各部分难以比较。
- en: '• Improvement: If using a table, ensure it is readable with appropriate formatting
    and perhaps include a bar or line chart for emphasis.'
  id: totrans-2751
  prefs: []
  type: TYPE_NORMAL
  zh: • 改进：如果使用表格，确保其格式适当且可读，可能包括条形图或折线图以强调重点。
- en: Summary of Improvements
  id: totrans-2752
  prefs: []
  type: TYPE_NORMAL
  zh: 改进总结
- en: • • Change the chart type to a bar chart or stacked bar chart to improve clarity.
  id: totrans-2753
  prefs: []
  type: TYPE_NORMAL
  zh: • • 将图表类型改为柱状图或堆积柱状图以提高清晰度。
- en: • • Simplify the color scheme to highlight key data points.
  id: totrans-2754
  prefs: []
  type: TYPE_NORMAL
  zh: • • 简化色彩方案以突出关键数据点。
- en: • • Remove the 3D effect to reduce clutter and improve readability.
  id: totrans-2755
  prefs: []
  type: TYPE_NORMAL
  zh: • • 移除3D效果以减少杂乱并提高可读性。
- en: • • Enhance the title to clearly convey the chart’s message.
  id: totrans-2756
  prefs: []
  type: TYPE_NORMAL
  zh: • • 增强标题以清晰地传达图表信息。
- en: • • Add annotations to emphasize significant data points and trends.
  id: totrans-2757
  prefs: []
  type: TYPE_NORMAL
  zh: • • 添加注释以强调重要数据点和趋势。
- en: • • Ensure the chart fulfills the audience’s needs by focusing on the most relevant
    data and framing it to answer specific questions.
  id: totrans-2758
  prefs: []
  type: TYPE_NORMAL
  zh: • • 通过关注最相关的数据并针对特定问题进行框架化，确保图表满足观众的需求。
- en: By making these adjustments, the chart will become a more effective tool for
    demonstrating your value to the City of New York and reinforcing the partnership.
  id: totrans-2759
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这些调整，图表将成为展示您对纽约市价值的一种更有效的工具，并加强合作伙伴关系。
- en: Now let’s ask ChatGPT to produce a draft of a replacement chart that fixes all
    these problems.
  id: totrans-2760
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们要求ChatGPT生成一个替代图表的草案，以解决所有这些问题。
- en: 'Prompt: “Produce a replacement chart that fixes all these problems.”'
  id: totrans-2761
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“生成一个替代图表，以解决所有这些问题。”
- en: 'Response from ChatGPT:'
  id: totrans-2762
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: 'Here’s the improved chart based on the analysis ([Figure 17.3](#fig17-3)):'
  id: totrans-2763
  prefs: []
  type: TYPE_NORMAL
  zh: 这是基于分析改进的图表（[图17.3](#fig17-3)）：
- en: '![image](images/pg406.jpg)'
  id: totrans-2764
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg406.jpg)'
- en: FIGURE 17.3 Case study slide modified and improved by ChatGPT. Compare this
    chart to the author’s solution in [Figure 17.2](#fig17-2).
  id: totrans-2765
  prefs: []
  type: TYPE_NORMAL
  zh: 图 17.3 案例研究幻灯片由 ChatGPT 修改和改进。将此图表与作者在[图 17.2](#fig17-2)中的解决方案进行比较。
- en: Improvements Applied
  id: totrans-2766
  prefs: []
  type: TYPE_NORMAL
  zh: 应用改进
- en: '• • Chart type: changed from a 3D pie chart to a horizontal bar chart for better
    readability and comparison'
  id: totrans-2767
  prefs: []
  type: TYPE_NORMAL
  zh: • • 图表类型：从 3D 饼图更改为水平条形图，以提高可读性和比较
- en: '• • Color usage: simplified to a single color scheme to avoid distraction and
    focus on the data'
  id: totrans-2768
  prefs: []
  type: TYPE_NORMAL
  zh: • • 颜色使用：简化为单一颜色方案，以避免干扰并专注于数据
- en: '• • Data labels: added data labels directly on the bars to make it easy to
    read the values'
  id: totrans-2769
  prefs: []
  type: TYPE_NORMAL
  zh: • • 数据标签：在条形上直接添加数据标签，以便轻松读取值
- en: '• • Title: enhanced the title to clearly convey the chart’s purpose'
  id: totrans-2770
  prefs: []
  type: TYPE_NORMAL
  zh: • • 标题：增强了标题，以清楚地传达图表的目的
- en: '• • Grid lines: added light grid lines to improve readability without cluttering
    the visual'
  id: totrans-2771
  prefs: []
  type: TYPE_NORMAL
  zh: • • 网格线：添加了轻网格线以提高可读性，而不造成视觉上的杂乱
- en: '• • Axes: inverted the y-axis to place the most significant values at the top,
    aligning with typical reading patterns'
  id: totrans-2772
  prefs: []
  type: TYPE_NORMAL
  zh: • • 轴：反转 Y 轴，将最重要的值放在顶部，与典型的阅读模式相一致
- en: Chart Summary
  id: totrans-2773
  prefs: []
  type: TYPE_NORMAL
  zh: 图表摘要
- en: '• • Title: City of New York Agency Engagements with ACME (Since 2014)'
  id: totrans-2774
  prefs: []
  type: TYPE_NORMAL
  zh: • • 标题：纽约市与 ACME 的机构合作（自 2014 年以来）
- en: '• • Y-Axis: Agencies'
  id: totrans-2775
  prefs: []
  type: TYPE_NORMAL
  zh: • • Y 轴：机构
- en: '• • X-Axis: Spending in dollars'
  id: totrans-2776
  prefs: []
  type: TYPE_NORMAL
  zh: • • X 轴：美元支出
- en: '• • Data Labels: Spending amounts displayed on each bar'
  id: totrans-2777
  prefs: []
  type: TYPE_NORMAL
  zh: • • 数据标签：每个条形上显示的支出金额
- en: This chart now effectively communicates the spending by various NYC agencies
    with ACME, making it clear and easy to understand for the audience.
  id: totrans-2778
  prefs: []
  type: TYPE_NORMAL
  zh: 此图表现在有效地传达了纽约市各机构与 ACME 的支出情况，对观众来说清晰易懂。
- en: References
  id: totrans-2779
  prefs: []
