    ****bre**akin**g ****do**wn** ****a**** ****com**ple**x ****pro**ble**m ****in**to**
    ****sma**lle**r ****subp**roblem**s, ****wh**ich** ****m**ay** ****o**r** ****m**ay**
    ****n**ot** ****b**e** ****addr**esse**d ****i**n** ****seq**uenc**e.'
  id: totrans-1243
  prefs: []
  type: TYPE_NORMAL
  zh: '****问题分解与逐步分析不同，因为尽管这两种技术都涉及将问题分解，但逐步分析专注于通过一系列逻辑行动来解决该问题，而问题分解则专注于将复杂问题分解为更小的子问题，这些子问题可能或可能不是按顺序解决的。'
- en: '****Rega**rdin**g ****Go**al** ****Decom**positi**on , ****bo**th** ****tech**nique**s
