    ****g**o** ****ov**er** ****t**he** ****ta**sk** ****Ch**en** ****s**et** ****f**or**
    ****h**is** ****vir**tua**l ****assi**stan**t, ****a**nd** ****w**hy** ****exa**ctl**y
    ****i**t** ****di**dn**’****t**** ****wo**rk** ****o**ut** ****s**o** ****we**ll**.'
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 陈设为其潜在PA设定的最后一项任务是：**设置和检查他的日历**。不幸的是，这也是一个行政助理的主要工作之一，并且给整个实验增添了一丝沮丧。但是，有一个银色的线索，因为众所周知，ChatGPT无法为你设置日历，并且存在一些严肃的工作正在进行中，以确保它将来能够做到这一点。在我们探讨解决方案之前，让我们回顾一下陈设为其虚拟助手设定的任务，以及为什么它没有如此顺利地工作。
- en: '****Ch**en** ****to**ld** ****t**he** ****cha**tbo**t ****th**at** ****h**e**
