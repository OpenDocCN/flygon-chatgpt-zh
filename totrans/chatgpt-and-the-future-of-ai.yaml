    *纽约时报*, 2023年8月16日, https://www.nytimes.com/2023/08/16/technology/ai-defcon-hackers.html.'
- en: '[6](15580-0004.xhtml#en6r). Pi is a new chatbot available for testing from
    Inflection. Meta is working on a competitor to GPT-4\. Ernie Bot was released
    by Baidu on August 31, 2023, and was an instant hit in China (“Meet Ernie, China’s
    Answer to ChatGPT,” *The Economist*, September 3, 2023).'
  id: totrans-1764
  prefs:
