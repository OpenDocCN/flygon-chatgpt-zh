    ****y****o**u** ****con**s**id**er** ****t****h**e** ****gro**w**i**ng** ****aut**o**no**my**
    ****o****f**** ****A****I**** ****mo**d**e**ls** ****a****n**d** ****th**e**i**r**
    ****abi**l**i**ty** ****t****o**** ****le**a**r**n** ****cont**in**uo**usl**y.'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: '**超越**著作权，**更**关注的是**AI**可能如何**影响**人类工作的**本质**。虽然有些人认为自动化**只是**一种工具，可以**解放**人类从重复和单调的任务中，但其他人**担心**AI可能会**取代**关键领域的**人类工作者**，例如**文案写作**、**客户服务**，甚至**创意**领域。我们是否准备好进入一个由机器做出我们传统上认为是人类责任的决定的社会？当考虑到AI模型日益增长的**自主性**以及它们持续学习的能力时，这个问题**更加**相关。'
- en: '****T****h**e** ****so**c**i**al** ****im**p**a**ct** ****o****f**** ****gene**r**at**ive**
