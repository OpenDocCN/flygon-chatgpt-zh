- en: CHAPTER  17
  prefs: []
  type: TYPE_NORMAL
- en: Conditional Statements in VBA
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs: []
  type: TYPE_NORMAL
- en: 'In Visual Basic for Applications (VBA), conditional statements are used to
    make decisions in your code based on certain conditions. They allow you to execute
    different blocks of code depending on the outcome of a logical expression. In
    this chapter, we will focus on two commonly used conditional statements in VBA:
    Select Case and If...End If.'
  prefs: []
  type: TYPE_NORMAL
- en: Structure
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will go over the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: ■If…End If
  prefs: []
  type: TYPE_NORMAL
- en: ■Select Case
  prefs: []
  type: TYPE_NORMAL
- en: ■Select Case vs. If…End If
  prefs: []
  type: TYPE_NORMAL
- en: Objectives
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, the reader will learn the differences between Select
    Case and If...End If statements in VBA and learn their appropriate usage in different
    scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: If…End If
  prefs: []
  type: TYPE_NORMAL
- en: 'In VBA, the If...End If statement is used to evaluate a condition and execute
    a block of code if the condition is true. It can also be combined with ElseIf
    and Else clauses to handle multiple conditions. Here is an example of the basic
    syntax for the If...End If statement:'
  prefs: []
  type: TYPE_NORMAL
- en: If condition1 Then
  prefs: []
  type: TYPE_NORMAL
- en: ''' Code block to execute if condition1 is True'
  prefs: []
  type: TYPE_NORMAL
- en: ElseIf condition2 Then
  prefs: []
  type: TYPE_NORMAL
- en: ''' Code block to execute if condition2 is True and condition1 is False'
  prefs: []
  type: TYPE_NORMAL
- en: Else
  prefs: []
  type: TYPE_NORMAL
- en: ''' Code block to execute if none of the previous conditions are'
  prefs: []
  type: TYPE_NORMAL
- en: 'True'
  prefs: []
  type: TYPE_NORMAL
- en: End If
  prefs: []
  type: TYPE_NORMAL
- en: The “condition” and “condition2” expressions in the above example are Boolean
    expressions that evaluate to either true or false.
  prefs: []
  type: TYPE_NORMAL
- en: It is important to note that the “If…End If statement can be nested within other
    control structures, like loops, and can be used in combination with other statements
    and keywords to create more complex logic in your VBA code.
  prefs: []
  type: TYPE_NORMAL
- en: Example
  prefs: []
  type: TYPE_NORMAL
- en: 'If the score is equal to or greater than 90, it displays “Grade: A.” If it
    is between 80 and 89, it displays “Grade: B,” and so on. If the score does not
    meet any of the specified conditions, it displays “Grade: F.”'
  prefs: []
  type: TYPE_NORMAL
- en: Sub GradeEvaluation()
  prefs: []
  type: TYPE_NORMAL
- en: Dim score As Integer
  prefs: []
  type: TYPE_NORMAL
- en: ''' Prompt the user to enter a score score = InputBox("Enter the score:")'
  prefs: []
  type: TYPE_NORMAL
- en: ''' Evaluate the score and provide a corresponding grade If score >= 90 Then'
  prefs: []
  type: TYPE_NORMAL
- en: 'MsgBox "Grade: A"'
  prefs: []
  type: TYPE_NORMAL
- en: ElseIf score >= 80 Then
  prefs: []
  type: TYPE_NORMAL
- en: 'MsgBox "Grade: B"'
  prefs: []
  type: TYPE_NORMAL
- en: ElseIf score >= 70 Then
  prefs: []
  type: TYPE_NORMAL
- en: 'MsgBox "Grade: C"'
  prefs: []
  type: TYPE_NORMAL
- en: ElseIf score >= 60 Then
  prefs: []
  type: TYPE_NORMAL
- en: 'MsgBox "Grade: D"'
  prefs: []
  type: TYPE_NORMAL
- en: Else
  prefs: []
  type: TYPE_NORMAL
- en: 'MsgBox "Grade: F"'
  prefs: []
  type: TYPE_NORMAL
- en: End If
  prefs: []
  type: TYPE_NORMAL
- en: End Sub
  prefs: []
  type: TYPE_NORMAL
- en: Select Case
  prefs: []
  type: TYPE_NORMAL
- en: 'The Select Case statement in VBA provides a concise and structured way to handle
    multiple conditions and execute different code blocks based on the value of a
    single expression. Here is a comprehensive explanation of its syntax and usage:'
  prefs: []
  type: TYPE_NORMAL
- en: Select Case expression
  prefs: []
  type: TYPE_NORMAL
- en: Case value1
  prefs: []
  type: TYPE_NORMAL
- en: ''' Code to execute if expression matches value1'
  prefs: []
  type: TYPE_NORMAL
- en: Case value2
  prefs: []
  type: TYPE_NORMAL
- en: ''' Code to execute if expression matches value2'
  prefs: []
  type: TYPE_NORMAL
- en: Case Else
  prefs: []
  type: TYPE_NORMAL
- en: ''' Code to execute if expression does not match any previous cases'
  prefs: []
  type: TYPE_NORMAL
- en: End Select
  prefs: []
  type: TYPE_NORMAL
- en: Example
  prefs: []
  type: TYPE_NORMAL
- en: In this example, the program prompts the user to enter a fruit name. The Select
    Case statement then evaluates the input and displays a corresponding message based
    on the selected fruit. If the fruit is “apple,” it displays a message about it
    being a healthy choice. If it is “banana,” it mentions the potassium content.
    If it is “orange” or “mandarin,” it highlights the citrus goodness. For any other
    input, it displays a generic message.
  prefs: []
  type: TYPE_NORMAL
- en: Sub FruitSelection()
  prefs: []
  type: TYPE_NORMAL
- en: Dim fruit As String
  prefs: []
  type: TYPE_NORMAL
- en: ''' Prompt the user to enter a fruit name fruit = InputBox("Enter a fruit name:")'
  prefs: []
  type: TYPE_NORMAL
- en: ''' Evaluate the fruit name and display corresponding message Select Case fruit'
  prefs: []
  type: TYPE_NORMAL
- en: Case "apple"
  prefs: []
  type: TYPE_NORMAL
- en: MsgBox "You selected an apple. It's a healthy choice!"
  prefs: []
  type: TYPE_NORMAL
- en: Case "banana"
  prefs: []
  type: TYPE_NORMAL
- en: MsgBox "You selected a banana. It's a great source of potassium."
  prefs: []
  type: TYPE_NORMAL
- en: Case "orange", "mandarin"
  prefs: []
  type: TYPE_NORMAL
- en: MsgBox "You selected an orange or a mandarin. Enjoy the citrus goodness!"
  prefs: []
  type: TYPE_NORMAL
- en: Case Else
  prefs: []
  type: TYPE_NORMAL
- en: MsgBox "That's an interesting choice!"
  prefs: []
  type: TYPE_NORMAL
- en: End Select
  prefs: []
  type: TYPE_NORMAL
- en: End Sub
  prefs: []
  type: TYPE_NORMAL
- en: Select Case vs. If … End If
  prefs: []
  type: TYPE_NORMAL
- en: Use the Select Case statement as an alternative to using ElseIf in If...Then...
    Else statements when comparing one expression to several different values.
  prefs: []
  type: TYPE_NORMAL
- en: While If...Then...Else statements can evaluate a different expression for each
    ElseIf statement, the Select Case statement evaluates an expression only once,
    at the top of the control structure.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we explored the differences between Select Case and If...End
    If statements in VBA. We learned that Select Case is a useful alternative when
    you have multiple conditions to evaluate against a single expression. It simplifies
    your code and improves readability. When you have distinct and unrelated conditions
    to consider, If...End If statements are more appropriate.
  prefs: []
  type: TYPE_NORMAL
- en: Exercises
  prefs: []
  type: TYPE_NORMAL
- en: 1. Write a VBA program that asks the user to enter a day of the week (as a number
    from one to seven), then displays the corresponding day name. Use both Select
    Case and If...End If statements to implement the program.
  prefs: []
  type: TYPE_NORMAL
- en: 2. Write a VBA program that asks the user to enter a number and determines if
    it is positive, negative, or zero. Use both Select Case and If...End If statements
    to implement the program.
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER  18
  prefs: []
  type: TYPE_NORMAL
- en: Variables and Data Types in VBA
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will explore the fundamentals of variables and data types
    in VBA (Visual Basic for Applications). Variables are essential elements in programming
    that store and manipulate data during program execution, while data types define
    the nature of the data stored in variables. Understanding variables and data types
    is crucial for writing efficient and effective VBA code. We will cover topics
    such as declaring variables and constants, specifying data types, working with
    message boxes and input boxes, selecting cells, rows, and columns, and working
    with sheets, workbooks, and the application object.
  prefs: []
  type: TYPE_NORMAL
- en: Structure
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will cover the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: ■Variables and constants
  prefs: []
  type: TYPE_NORMAL
- en: ■Declaring variables and constants
  prefs: []
  type: TYPE_NORMAL
- en: ■Data types of variables and constants
  prefs: []
  type: TYPE_NORMAL
- en: ■The message box and the input box
  prefs: []
  type: TYPE_NORMAL
- en: ■Selecting and activating cells
  prefs: []
  type: TYPE_NORMAL
- en: ■Selecting and activating rows and columns
  prefs: []
  type: TYPE_NORMAL
- en: ■Working with Sheets
  prefs: []
  type: TYPE_NORMAL
- en: ■Working with the Workbook
  prefs: []
  type: TYPE_NORMAL
- en: ■Working with the application object
  prefs: []
  type: TYPE_NORMAL
- en: Objectives
  prefs: []
  type: TYPE_NORMAL
- en: By the end of the chapter, the reader will be able to understand the concept
    of variables and constants in VBA and how to declare them, be familiar with different
    data types available in VBA and their respective ranges and understand the usage
    of message boxes and input boxes for user interaction. Additionally, the reader
    will also learn techniques for selecting and activating cells, rows, and columns
    in Excel, and gain knowledge on working with sheets, workbooks, and the application
    object in VBA.
  prefs: []
  type: TYPE_NORMAL
- en: Variables and Constants
  prefs: []
  type: TYPE_NORMAL
- en: Let us now learn about variables and constants.
  prefs: []
  type: TYPE_NORMAL
- en: Variables
  prefs: []
  type: TYPE_NORMAL
- en: 'The features of variables are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: ■A variable is a named storage location containing data that can be modified
    during program execution.
  prefs: []
  type: TYPE_NORMAL
- en: ■Each variable has a name that uniquely identifies it within its scope.
  prefs: []
  type: TYPE_NORMAL
- en: ■A data type can be specified or not.
  prefs: []
  type: TYPE_NORMAL
- en: '■Variable names:'
  prefs: []
  type: TYPE_NORMAL
- en: •Must begin with an alphabetic character,
  prefs: []
  type: TYPE_NORMAL
- en: •Must be unique within the same scope,
  prefs: []
  type: TYPE_NORMAL
- en: •Cannot be longer than 255 characters, and
  prefs: []
  type: TYPE_NORMAL
- en: •Must contain an embedded period or type-declaration character.
  prefs: []
  type: TYPE_NORMAL
- en: Constant
  prefs: []
  type: TYPE_NORMAL
- en: A constant is a named item that retains a constant value throughout the execution
    of a program. A constant can be a string or a numeric literal.
  prefs: []
  type: TYPE_NORMAL
- en: Declaring Variables and Constants
  prefs: []
  type: TYPE_NORMAL
- en: 'The syntax to declare a variable is:'
  prefs: []
  type: TYPE_NORMAL
- en: DIM name_of_variable AS type_of_variable
  prefs: []
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: Dim strName As String
  prefs: []
  type: TYPE_NORMAL
- en: Dim intX As Integer
  prefs: []
  type: TYPE_NORMAL
- en: Dim intX , intYAs Integer
  prefs: []
  type: TYPE_NORMAL
- en: 'The syntax to declare a constant is:'
  prefs: []
  type: TYPE_NORMAL
- en: Const name_of_variable AS type_of_variable = constant value
  prefs: []
  type: TYPE_NORMAL
- en: For example, Const conAge As Integer = 34.
  prefs: []
  type: TYPE_NORMAL
- en: When declaring variables, use a Dim statement. For constants, use a Const statement.
  prefs: []
  type: TYPE_NORMAL
- en: A declaration statement can be placed within a procedure to create a procedure-level
    variable. It may also be placed at the top of a module, in the Declarations section,
    to create a module-level variable.
  prefs: []
  type: TYPE_NORMAL
- en: Data Types of Variables and Constants
  prefs: []
  type: TYPE_NORMAL
- en: '[Table 18.1](#tab18-1) shows the various ranges in data type.'
  prefs: []
  type: TYPE_NORMAL
- en: TABLE 18.1 Data Types
  prefs: []
  type: TYPE_NORMAL
- en: '| Data type | Range |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Byte | 0 to 255. |'
  prefs: []
  type: TYPE_TB
- en: '| Integer | – 32,768 to 32,767. |'
  prefs: []
  type: TYPE_TB
- en: '| Long | – 2,147,483,648 to 2,147,483,647. |'
  prefs: []
  type: TYPE_TB
- en: '| Single | – 3.402823E38 to – 1.401298E – 45 (negative values). |'
  prefs: []
  type: TYPE_TB
- en: '| 1.401298E – 45 to 3.402823E38 (positive values). |'
  prefs: []
  type: TYPE_TB
- en: '| Double | – 1.7200369313486231E308 to– 4.94065645841247E – 324 (negative values).
    4.94065645841247E – 324 to 1.7200369313486231E308(positive values). |'
  prefs: []
  type: TYPE_TB
- en: '| Currency | – 922,337,203,685,477.5808 to 922,337,203,685,477.5807. |'
  prefs: []
  type: TYPE_TB
- en: '| String | Zero to approximately two billion characters. |'
  prefs: []
  type: TYPE_TB
- en: '| Variant | Date values: January 1, 100 to December 31, 9999. |'
  prefs: []
  type: TYPE_TB
- en: '| Numeric values: same range as Double. |'
  prefs: []
  type: TYPE_TB
- en: '| String values: same range as String. |'
  prefs: []
  type: TYPE_TB
- en: '| Can also contain Error or Null values. |'
  prefs: []
  type: TYPE_TB
- en: '| Boolean | True or False. |'
  prefs: []
  type: TYPE_TB
- en: '| Date | January 1, 100 to December 31, 9999. |'
  prefs: []
  type: TYPE_TB
- en: '| Object | Any object reference. |'
  prefs: []
  type: TYPE_TB
- en: Using the Option Explicit Statement
  prefs: []
  type: TYPE_NORMAL
- en: Use Option Explicit to enforce explicit declaration of variables. It must appear
    in a module before any procedure. If not used, undeclared variables will be of
    Variant type.
  prefs: []
  type: TYPE_NORMAL
- en: Message Box and Input Box
  prefs: []
  type: TYPE_NORMAL
- en: The Msgbox function displays a message in a dialog box, waits for the user to
    click a button, and returns an Integer indicating which button the user clicked.
  prefs: []
  type: TYPE_NORMAL
- en: The InputBox Function displays a prompt in a dialog box, waits for the user
    to input text or click a button, and returns a string containing the contents
    of the text box.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example:'
  prefs: []
  type: TYPE_NORMAL
- en: Sub Greet()
  prefs: []
  type: TYPE_NORMAL
- en: MsgBox "Hello " & InputBOx("What is your name?")
  prefs: []
  type: TYPE_NORMAL
- en: End Sub
  prefs: []
  type: TYPE_NORMAL
- en: Selecting and Activating Cells
  prefs: []
  type: TYPE_NORMAL
- en: When you work with Microsoft Excel, you usually select a cell or cells and then
    perform an action, such as formatting the cells or entering values in them.
  prefs: []
  type: TYPE_NORMAL
- en: Refer to [Table 18.2](#tab18-2) to write the codes for various actions.
  prefs: []
  type: TYPE_NORMAL
- en: TABLE 18.2 Codes for Various Actions
  prefs: []
  type: TYPE_NORMAL
- en: '| To do this | Write this code |'
  prefs: []
  type: TYPE_TB
- en: '| Select cell A1 | Range("A1").select or Cells(1,1). select |'
  prefs: []
  type: TYPE_TB
- en: '| Select range A1:B5 | Range("A1:b5").select |'
  prefs: []
  type: TYPE_TB
- en: '| Select range A1:A5 and C2:C10 | Range("A1:A5 , C2:C10").select |'
  prefs: []
  type: TYPE_TB
- en: '| Select current cell | Activecell.select |'
  prefs: []
  type: TYPE_TB
- en: '| Select range from current cell to B6 | Range(Activecell , "B6").select |'
  prefs: []
  type: TYPE_TB
- en: '| Select current region of activecell | Activecell.currentregion.select |'
  prefs: []
  type: TYPE_TB
- en: '| Ctrl + Shift+ Down Arrow from Activecell | Range(ActivecellActivecell.End(X
    lDown)).select |'
  prefs: []
  type: TYPE_TB
- en: '| Ctrl + Shift + Down Arrow from cell A2 | Range("A2" , Activecell.End(XlDown)).
    Select |'
  prefs: []
  type: TYPE_TB
- en: Selecting and activating rows and columns
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes you need to select specific rows and columns and then perform actions.
  prefs: []
  type: TYPE_NORMAL
- en: To do this, write the code shown in the following [Table 18.3](#tab18-3).
  prefs: []
  type: TYPE_NORMAL
- en: TABLE 18.3 Codes for Various Actions
  prefs: []
  type: TYPE_NORMAL
- en: '| To do this | Write this code |'
  prefs: []
  type: TYPE_TB
- en: '| Select a row | Rows("2:2").select |'
  prefs: []
  type: TYPE_TB
- en: '| Select rows from 2 to 5 | Rows("2:5").select |'
  prefs: []
  type: TYPE_TB
- en: '| Select 3 rows from activecell | Activecell.entirerow.Range("1:3"). select
    |'
  prefs: []
  type: TYPE_TB
- en: '| Select a column | Columns("A:A").select |'
  prefs: []
  type: TYPE_TB
- en: '| Select columns from B to E | Columns("B:E").select |'
  prefs: []
  type: TYPE_TB
- en: '| Select 3 columns from activecell | Activecell.entirecolumn.Range("A:C").select
    |'
  prefs: []
  type: TYPE_TB
- en: '| Select current row | Activecell.entirerow.select |'
  prefs: []
  type: TYPE_TB
- en: '| Select current column | Activecell.entirecolumn.select |'
  prefs: []
  type: TYPE_TB
- en: Working with Sheets
  prefs: []
  type: TYPE_NORMAL
- en: You will frequently need to select a specific sheet, insert a new sheet, rename
    a sheet, and so on. Refer to [Table 18.4](#tab18-4).
  prefs: []
  type: TYPE_NORMAL
- en: TABLE 18.4 Codes for Various Actions
  prefs: []
  type: TYPE_NORMAL
- en: '| To do This | Write This code |'
  prefs: []
  type: TYPE_TB
- en: '| Select any sheet by index number | Sheets(2).selectWorksheets(2).select |'
  prefs: []
  type: TYPE_TB
- en: '| Select any sheet by name | Sheets("Sheet1"). selectWorksheets("Sheet1").select
    |'
  prefs: []
  type: TYPE_TB
- en: '| Renaming a sheet | Sheets("Sheet1").name="newname" |'
  prefs: []
  type: TYPE_TB
- en: '| Assign a new name | Worksheets("Sheet1").name=Activesheet.name |'
  prefs: []
  type: TYPE_TB
- en: '| Delete a sheet | Sheets("Sheet1").delete Worksheets("Sheet1").deleteActivesheet.delete
    |'
  prefs: []
  type: TYPE_TB
- en: '| Insert a sheet | Sheets.add before:= sheets("Sheet1")   Worksheets.add before:=sheets("Sheet1")
    |'
  prefs: []
  type: TYPE_TB
- en: Working with a Workbook
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes you need to work with different workbooks. Refer to [Table 18.5](#tab18-5).
  prefs: []
  type: TYPE_NORMAL
- en: TABLE 18.5 Codes for Various Actions
  prefs: []
  type: TYPE_NORMAL
- en: '| To do This | Write this code |'
  prefs: []
  type: TYPE_TB
- en: '| Open a workbook | Workbooks.open filename:="filename with path" |'
  prefs: []
  type: TYPE_TB
- en: '| Open workbook which contains auto macros | Workbooks. openfilename: =" Activeworkbook.
    runautomacros" |'
  prefs: []
  type: TYPE_TB
- en: '| Close a workbook | Workbooks(2).close |'
  prefs: []
  type: TYPE_TB
- en: '| Add a new workbook | Workbooks.add |'
  prefs: []
  type: TYPE_TB
- en: Working with the Application Object
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes you will need to ignore some Excel messages. To do this, you need
    to work with the application object, as illustrated in [Table 18.6](#tab18-6).
  prefs: []
  type: TYPE_NORMAL
- en: TABLE 18.6 Codes for Various Actions
  prefs: []
  type: TYPE_NORMAL
- en: '| To do this | Write This Code |'
  prefs: []
  type: TYPE_TB
- en: '| To switch off the display of messages | Application.DisplayAlert = False
    |'
  prefs: []
  type: TYPE_TB
- en: '| To stop flickering of the screen | Application.ScreenUpdating = False |'
  prefs: []
  type: TYPE_TB
- en: '| To stop copy / cut mode | Application.CutCopyMode = False |'
  prefs: []
  type: TYPE_TB
- en: '| To calculate | Application.Calculate |'
  prefs: []
  type: TYPE_TB
- en: Scenario 15
  prefs: []
  type: TYPE_NORMAL
- en: Create a macro which should accept the Name and City of a person and store it
    in an Excel worksheet in cell A1 and B1\. If the user types Mumbai as the city,
    the font color must be red. Use the InputBox function to take input from the user.
    Use the MsgBox function to display results.
  prefs: []
  type: TYPE_NORMAL
- en: Sub Accept_Details()
  prefs: []
  type: TYPE_NORMAL
- en: Dim e_Name , e_City As String
  prefs: []
  type: TYPE_NORMAL
- en: Name = InputBox("Enter your name")
  prefs: []
  type: TYPE_NORMAL
- en: City = InputBox("Enter your city")
  prefs: []
  type: TYPE_NORMAL
- en: MsgBox "Your name is " & Name & " and city is " & City Cells(1, 1).Value = e_Name
    Cells(1, 2).Value = e_City If Cells(1, 2).Value = "mumbai" Then
  prefs: []
  type: TYPE_NORMAL
- en: Cells(1, 2).Font.ColorIndex = 3
  prefs: []
  type: TYPE_NORMAL
- en: Else
  prefs: []
  type: TYPE_NORMAL
- en: Cells(1, 2).Font.ColorIndex = 0
  prefs: []
  type: TYPE_NORMAL
- en: EndIf
  prefs: []
  type: TYPE_NORMAL
- en: End Sub
  prefs: []
  type: TYPE_NORMAL
- en: Scenario 16
  prefs: []
  type: TYPE_NORMAL
- en: Create a macro and name it “Data_Entry”. It must accept the employee code, name,
    hire date, and salary of a person. Insert the values in the “Database” worksheet.
    Every new record must be stored after the last record.
  prefs: []
  type: TYPE_NORMAL
- en: Sub Data_Entry()
  prefs: []
  type: TYPE_NORMAL
- en: Dim EmpCode As integer, Next_Row as integer
  prefs: []
  type: TYPE_NORMAL
- en: Dim EmpName As String
  prefs: []
  type: TYPE_NORMAL
- en: Dim doj As Date
  prefs: []
  type: TYPE_NORMAL
- en: Dim Salary As Currency
  prefs: []
  type: TYPE_NORMAL
- en: EmpCode = InputBox("Enter Employee Code")
  prefs: []
  type: TYPE_NORMAL
- en: EmpName = InputBox("Enter Employee Name")
  prefs: []
  type: TYPE_NORMAL
- en: doj = InputBox("enter Date of Joining mm/dd/yy")
  prefs: []
  type: TYPE_NORMAL
- en: Salary = InputBox("Enter Salary of Employee")
  prefs: []
  type: TYPE_NORMAL
- en: Range("a65536").select
  prefs: []
  type: TYPE_NORMAL
- en: Selection.end(xlup).select Next_Row= activecell.row+1
  prefs: []
  type: TYPE_NORMAL
- en: Cells(Next_Row, 1).Value = EmpCode Cells(Next_Row, 2).Value = EmpName Cells(Next_Row,
    3).Value = Format(doj, "MMM DD YYYY") Cells(Next_Row, 4).Value = Salary
  prefs: []
  type: TYPE_NORMAL
- en: End Sub
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, this chapter provided a comprehensive overview of variables and
    data types in VBA. It covered the declaration of variables and constants, explained
    different data types and their ranges, demonstrated the usage of message boxes
    and input boxes, and explored techniques for selecting and manipulating cells,
    rows, and columns in Excel. The chapter also touched upon working with sheets,
    workbooks, and the application object. By understanding these fundamentals, readers
    can write efficient and effective VBA code.
  prefs: []
  type: TYPE_NORMAL
- en: Exercise
  prefs: []
  type: TYPE_NORMAL
- en: 1. Write a VBA macro that prompts the user to enter their name, age, and favorite
    color using input boxes. The macro should store the values in cells A1, B1, and
    C1 of the active worksheet. Additionally, if the user’s age is greater than or
    equal to 18, the font color of the corresponding cell should be set to their favorite
    color. Test the macro by running it and entering different values.
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER  19
  prefs: []
  type: TYPE_NORMAL
- en: Looping Structures in VBA
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will delve into the topic of looping structures in Visual
    Basic for Applications (VBA). Loops are powerful tools that enable the repetitive
    execution of code, improving efficiency and automating tasks. This chapter explores
    different types of loops, such as Do...Loop, For...Next, and For Each...Next loops,
    as well as auto-executed macros that run based on specific events.
  prefs: []
  type: TYPE_NORMAL
- en: Structure
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we will go over the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: ■Using Loops (repeating actions)
  prefs: []
  type: TYPE_NORMAL
- en: ■Using Do…Loop statements
  prefs: []
  type: TYPE_NORMAL
- en: ■Using For…Next statements
  prefs: []
  type: TYPE_NORMAL
- en: ■Using For Each…Next statements
  prefs: []
  type: TYPE_NORMAL
- en: ■Auto-Executed Macros
  prefs: []
  type: TYPE_NORMAL
- en: Objectives
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this chapter, the reader will learn looping structures in VBA,
    such as Do...Loop, For...Next, and For Each...Next. The chapter also covers practical
    examples for their implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Using Loops (Repeating Action)
  prefs: []
  type: TYPE_NORMAL
- en: Looping allows you to run a group of statements repeatedly. Some loops repeat
    statements until a condition is False; others repeat statements until a condition
    is True. There are also loops that repeat statements a specific number of times
    or for each object in a collection.
  prefs: []
  type: TYPE_NORMAL
- en: Choosing a Loop to Use
  prefs: []
  type: TYPE_NORMAL
- en: 'There are various loops you can use, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: '■Do…Loop: Looping while or until a condition is True.'
  prefs: []
  type: TYPE_NORMAL
- en: '■For…Next: Using a counter to run statements a specified number of times.'
  prefs: []
  type: TYPE_NORMAL
- en: '■For Each…Next: Repeating a group of statements for each object in a collection.'
  prefs: []
  type: TYPE_NORMAL
- en: Using Do…Loop Statements
  prefs: []
  type: TYPE_NORMAL
- en: You can use Do...Loop statements to run a block of statements an indefinite
    number of times. The statements are repeated either while a condition is True
    or until a condition becomes True.
  prefs: []
  type: TYPE_NORMAL
- en: 'Syntax:'
  prefs: []
  type: TYPE_NORMAL
- en: Do [{While | Until} condition]
  prefs: []
  type: TYPE_NORMAL
- en: '[statements]'
  prefs: []
  type: TYPE_NORMAL
- en: '[Exit Do]'
  prefs: []
  type: TYPE_NORMAL
- en: '[statements]'
  prefs: []
  type: TYPE_NORMAL
- en: Loop
  prefs: []
  type: TYPE_NORMAL
- en: Repeating Statements While a Condition is True
  prefs: []
  type: TYPE_NORMAL
- en: In a Do...Loop statement there are two ways to use the While keyword to check
    a condition. You can check the condition before you enter the loop, or you can
    check it after the loop has run at least once.
  prefs: []
  type: TYPE_NORMAL
- en: Checking Condition Before You Enter the Loop
  prefs: []
  type: TYPE_NORMAL
- en: 'The syntax for checking the condition before you enter the loop is:'
  prefs: []
  type: TYPE_NORMAL
- en: DO WHILE (condition)
  prefs: []
  type: TYPE_NORMAL
- en: Code to be repeated
  prefs: []
  type: TYPE_NORMAL
- en: LOOP
  prefs: []
  type: TYPE_NORMAL
- en: Checking Condition After the Loop Has Run at Least Once
  prefs: []
  type: TYPE_NORMAL
- en: 'The syntax for checking the condition after the loop has run at least once
    is:'
  prefs: []
  type: TYPE_NORMAL
- en: DO
  prefs: []
  type: TYPE_NORMAL
- en: Code to be repeated
  prefs: []
  type: TYPE_NORMAL
- en: LOOP WHILE (condition)
  prefs: []
  type: TYPE_NORMAL
- en: Scenario 17
  prefs: []
  type: TYPE_NORMAL
- en: Write code to accept and validate a username. A blank name should not be allowed.
    Refer to Training File5.xls.
  prefs: []
  type: TYPE_NORMAL
- en: Refer to [Figure 19.1](#fig19-1).
  prefs: []
  type: TYPE_NORMAL
- en: '![image](image/Figure_19.1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 19.1 Scenario 17
  prefs: []
  type: TYPE_NORMAL
- en: Sub validate_name()
  prefs: []
  type: TYPE_NORMAL
- en: Dim name As String
  prefs: []
  type: TYPE_NORMAL
- en: name = InputBox("enter your name")
  prefs: []
  type: TYPE_NORMAL
- en: Do While Trim(name) = ""
  prefs: []
  type: TYPE_NORMAL
- en: MsgBox "Name cannot be blank"
  prefs: []
  type: TYPE_NORMAL
