  prefs: []
  type: TYPE_NORMAL
  zh: '5: 练习链表问题'
- en: 'Prompt:'
  id: totrans-1391
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write Java/Python code to reverse a singly linked list in place. Include a
    step-by-step explanation of how pointers are updated during the reversal process
