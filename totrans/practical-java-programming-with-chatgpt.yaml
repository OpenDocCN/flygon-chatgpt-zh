    *   CodeLlama-13b-Python *   CodeLlama-34b-Python *   CodeLlama-7b-Instruct *   CodeLlama-13b-Instruct
    *   CodeLlama-34b-Instruct”    With each model download, you’ll receive a copy
    of the **License** and **Acceptable Use Policy,** and you can find all other information
    about the model and code on **GitHub.**    # [Setting up Jupyter Notebook environment](toc.xhtml#s145a)    To
