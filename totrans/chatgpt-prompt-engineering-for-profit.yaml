    ****ti**me** ****a**nd** ****sp**ace**. "'
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: ○        ****初始答案**： "****相对论改变了我们对时间和空间的理解。"
- en: '○        ****Fi**rst** ****Iter**atio**n (****Refi**nemen**t) : "****A**dd**
    ****exa**mple**s ****o**f** ****prac**tica**l ****appl**icatio**ns ****o**f**
    ****th**is** ****th**eor**y. "'
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: ○        ****第一次迭代（改进）**： "****添加该理论的实际应用示例。"
- en: '○ ****Ref**ine**d ****An**swe**r : "****T**he** ****th**eor**y ****o**f** ****rela**tivit**y
    ****h**as** ****cha**nge**d ****o**ur** ****under**standi**ng ****o**f** ****ti**me**
    ****a**nd** ****sp**ace** ****a**nd** ****h**as** ****sev**era**l ****prac**tica**l
    ****appl**icatio**ns, ****su**ch** ****a**s** ****G**PS**, ****wh**ich** ****ne**eds**
    ****t**o** ****ta**ke** ****in**to** ****acc**oun**t ****t**he** ****eff**ect**s
    ****o**f** ****rela**tivit**y ****t**o** ****pro**vid**e ****acc**urat**e ****coor**dinate**s.
    "'
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: ○ ****改进后的答案**： "****相对论改变了我们对时间和空间的理解，并且有多个实际应用，例如GPS，它需要考虑到相对论的影响以提供准确的坐标。"
- en: '○        ****Se**con**d ****Iter**atio**n (****Refi**nemen**t) : "****Exp**lai**n
    ****h**ow** ****rela**tivit**y ****aff**ect**s ****G**PS**. "'
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: ○        ****第二次迭代（改进）**： "****解释相对论如何影响GPS。"
- en: '○ ****Imp**rove**d ****An**swe**r : "****G**PS** ****wo**rks** ****wi**th**
    ****sate**llite**s ****th**at** ****or**bit** ****t**he** ****Ea**rth**, ****a**nd**
    ****t**he** ****th**eor**y ****o**f** ****rela**tivit**y ****sa**ys** ****th**at**
    ****ti**me** ****pa**sse**s ****diff**erentl**y ****f**or** ****th**ese** ****sate**llite**s
    ****d**ue** ****t**o** ****t**he** ****hi**gh** ****sp**eed** ****a**t** ****wh**ich**
    ****th**ey** ****mo**ve** ****a**nd** ****t**he** ****lo**wer** ****gravi**tation**al
    ****fo**rce** ****com**pare**d ****t**o** ****t**he** ****Ea**rth**''****s****
    ****sur**fac**e. ****Wit**hou**t ****t**he** ****rela**tivit**y ****corr**ectio**n,
    ****G**PS** ****wo**uld** ****ha**ve** ****loc**atio**n ****er**ror**s ****o**f**
    ****sev**era**l ****me**ter**s. "'
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: ○ ****改进后的答案**： "****GPS与环绕地球的卫星一起工作，相对论理论表明，由于这些卫星以高速移动以及与地球表面相比的较低重力，它们的时间流逝不同。如果没有相对论校正，GPS将会有几米的位置误差。"
