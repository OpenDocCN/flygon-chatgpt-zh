- en: '**Building AI Applications with** **ChatGPT APIs**'
  id: totrans-3098
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用 ChatGPT API 构建人工智能应用**'
- en: Martin Yanev
  id: totrans-3099
  prefs: []
  type: TYPE_NORMAL
  zh: 马丁·亚内夫
- en: 'ISBN: 978-1-80512-756-7'
  id: totrans-3100
  prefs: []
  type: TYPE_NORMAL
  zh: 'ISBN: 978-1-80512-756-7'
- en: Develop a solid foundation in using the ChatGPT API for natural language processing
    tasks
  id: totrans-3101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在自然语言处理任务中使用 ChatGPT API 建立坚实的基础
- en: Build, deploy, and capitalize on a variety of desktop and SaaS AI applications
  id: totrans-3102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建、部署并利用各种桌面和SaaS人工智能应用
- en: Seamlessly integrate ChatGPT with established frameworks such as Flask, Django,
    and Microsoft Office APIs
  id: totrans-3103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无缝集成 ChatGPT 到现有的框架，如 Flask、Django 和 Microsoft Office API
- en: Channel your creativity by integrating DALL-E APIs to produce stunning AI-generated
    art within your desktop applications
  id: totrans-3104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过集成 DALL-E API 来激发您的创造力，在桌面应用程序中产生令人惊叹的AI生成艺术
- en: Experience the power of Whisper API’s speech recognition and text-to-speech
    features
  id: totrans-3105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 体验 Whisper API 的语音识别和文本到语音功能
- en: Discover techniques to optimize ChatGPT models through the process of fine-tuning
  id: totrans-3106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发现通过微调过程优化 ChatGPT 模型的技术
- en: '[![](image/9781805123347.jpg)](https://www.amazon.in/dp/1805123343)'
  id: totrans-3107
