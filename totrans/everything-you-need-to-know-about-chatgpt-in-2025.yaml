  prefs: []
  type: TYPE_NORMAL
  zh: '**Transformer** 通过一种称为 **注意力** 的机制解决了这个问题，这使得模型能够在处理信息时“关注”文本序列的不同部分。这意味着，与逐词分析不同，模型可以同时考虑整个文本中的关系。这不仅使这种方法更有效率，而且还能更好地理解上下文和语义。'
