- en: INTRODUCTION
  id: totrans-34
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**引言**'
- en: In a complex world, language is the ultimate tool for human interaction and
    cooperation. From the earliest grunts and gestures to revolutionary manifestos
    and Tweetstorms, language enables us to share ideas, express human emotion, and
    build connections. However, as our communication needs have evolved, so too has
    the technology that underpins it. Today, we have new language tools that are transforming
    the way we communicate and generate ideas. From customer service chatbots to voice-enabled
    assistants, these new tools are making it possible for machines to interact with
    humans using natural language.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个复杂的世界里，语言是人类互动和合作的终极工具。从最早的咕哝和手势到革命性的宣言和推特风暴，语言使我们能够分享想法，表达人类情感，并建立联系。然而，随着我们的沟通需求不断演变，支撑它的技术也在不断发展。今天，我们拥有了新的语言工具，这些工具正在改变我们沟通和产生想法的方式。从客户服务聊天机器人到语音助手，这些新工具使得机器能够使用自然语言与人类进行交互。
- en: Leading the way is ChatGPT, an AI language model developed by OpenAI. Founded
    by Sam Altman in 2015, OpenAI is the same company behind DALL-E, an innovative
    text-to-image software launched in mid 2022. The release of ChatGPT in late 2022
    has since solidified OpenAI’s grip on the technology world and the media’s imagination.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 领先的是ChatGPT，这是一个由OpenAI开发的AI语言模型。OpenAI成立于2015年，由山姆·奥特曼创立，也是2022年中推出创新文本到图像软件DALL-E背后的公司。ChatGPT在2022年底的发布以来，已经巩固了OpenAI在技术世界和媒体想象中的地位。
- en: As with any new technology, there are both benefits and risks associated with
    using large language models like ChatGPT for generating content. On the one hand,
    ChatGPT can save time and effort by generating high-quality content quickly and
    efficiently. It can also help users overcome writer's block by generating creative
    ideas and providing new perspectives. On the other hand, there are concerns that
    relying too heavily on large language models could lead to a lack of originality
    and creativity in content. It is possible that the widespread use of ChatGPT could
    lead to homogenization and a dramatic regression to the mean in terms of writing
    quality and originality. Additionally, there are ethical considerations around
    the ownership and use of content generated by AI language models, particularly
    when it comes to copyright and plagiarism.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 与任何新技术一样，使用ChatGPT等大型语言模型生成内容既存在好处也存在风险。一方面，ChatGPT可以快速高效地生成高质量的内容，从而节省时间和精力。它还可以通过生成创意想法和提供新的视角来帮助用户克服写作障碍。另一方面，人们担心过度依赖大型语言模型可能导致内容缺乏原创性和创造性。可能的情况是，ChatGPT的广泛应用可能导致写作质量和原创性的同质化，以及向平均水平的显著回归。此外，围绕AI语言模型生成内容的所有权和使用也存在道德考量，尤其是在版权和剽窃方面。
- en: Another consideration is the potential impact of large language models on the
    job market. While some fear that ChatGPT and other AI-powered writing tools could
    eventually replace human writers and lead to job losses, others argue that the
    technology will enhance the outputs of knowledge workers and create new job opportunities.
    For instance, some writers may specialize in training AI language models to generate
    content in specific industries or niches, while others may focus on editing and
    refining content generated by AI. Most jobs, though, will evolve into a copilot
    role. Whether it’s linguists using ChatGPT to translate documents or lawyers validating
    contracts drafted by AI assistants, human workers will be increasingly seen working
    alongside AI to carry out their professional tasks.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个需要考虑的因素是大型语言模型对就业市场可能产生的影响。虽然有些人担心ChatGPT和其他AI驱动的写作工具最终可能取代人类作家，导致失业，但也有人认为这项技术将提升知识工作者的产出，并创造新的就业机会。例如，一些作家可能会专门从事训练AI语言模型，以生成特定行业或细分市场的内
    容，而其他人可能会专注于编辑和润色AI生成的内 容。然而，大多数工作将演变成协同驾驶者的角色。无论是语言学家使用ChatGPT翻译文件，还是律师验证由AI助手起草的合同，人类工作者将越来越多地与AI并肩工作，以完成他们的专业任务。
- en: Rather than being left behind, it's crucial to stay up to date and embrace new
    tools that can give you a competitive edge. Embracing ChatGPT doesn’t require
    specialized programming or AI knowledge. With the right attitude and guidance,
    anyone can become a master of the software. That said, constructing a good prompt
    requires practical experience, including knowledge of ChatGPT’s strengths and
    limitations. This is a skill you can easily develop through experimentation and
    applying some of the tips and strategies covered in this title.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是被淘汰，保持与时俱进并拥抱能够给你带来竞争优势的新工具至关重要。拥抱ChatGPT不需要专业的编程或AI知识。有了正确的态度和指导，任何人都可以成为该软件的大师。然而，构建一个良好的提示需要实践经验，包括了解ChatGPT的优势和局限性。这是一种你可以通过实验和运用本标题中涵盖的一些技巧和策略轻松发展的技能。
- en: In this book, we will look carefully at best practices in text prompt engineering,
    covering topics such as model training, priming, negative prompting, common use
    cases, and other tips to transform your workflow. After completing this quick
    guide, you will have a better understanding of how to leverage the capabilities
    of ChatGPT to enhance your writing and improve your outputs.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，我们将仔细研究文本提示工程的最佳实践，涵盖模型训练、引导、负提示、常见用例以及其他一些技巧，以改变你的工作流程。完成这个快速指南后，你将更好地了解如何利用ChatGPT的能力来提升你的写作并提高你的产出。
- en: Whether you are a writer, a linguist, a student, a knowledge worker, or simply
    someone interested in the future of communication, this book has something to
    offer. So, come along on the journey, and let's explore the future of rapid content
    production using ChatGPT.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是作家、语言学家、学生、知识工作者，还是对通信的未来感兴趣的人，这本书都有所提供。所以，让我们一起踏上这段旅程，探索使用ChatGPT进行快速内容生产的未来。
- en: '|  | 2 |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '|  | 2 |'
- en: UNVEILING CHATGPT
  id: totrans-43
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 揭秘ChatGPT
- en: The launch of ChatGPT represents a significant milestone in the ongoing development
    of large language models. By combining the power of machine learning and natural
    language processing, ChatGPT can generate contextually relevant and coherent text,
    opening up a world of possibilities across different industries and applications.
    From simulating conversations and generating content to answering questions and
    summarizing text, ChatGPT's versatility is transforming the way we interact with
    and harness AI technology.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的发布标志着大型语言模型持续发展中的一个重要里程碑。通过结合机器学习和自然语言处理的力量，ChatGPT能够生成上下文相关且连贯的文本，为不同行业和应用领域开辟了一个充满可能性的世界。从模拟对话和生成内容到回答问题和总结文本，ChatGPT的多功能性正在改变我们与AI技术互动和利用的方式。
- en: As you delve deeper into prompt engineering, you will see ChatGPT’s immense
    potential and the limitless opportunities it presents. First, though, it’s important
    to understand the core technology behind this ground-breaking software.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你深入探索提示工程，你将看到ChatGPT的巨大潜力和它所提供的无限机遇。然而，首先重要的是要理解支撑这一突破性软件的核心技术。
- en: ChatGPT, short for Chat Generative Pre-trained Transformer, is based on the
    GPT architecture, developed by OpenAI. Without delving into the specific mechanics
    of the underlying architecture, it’s important to have a basic understanding of
    machine learning and natural language processing.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT，即Chat Generative Pre-trained Transformer，基于OpenAI开发的GPT架构。尽管不需要深入了解底层架构的具体机制，但了解机器学习和自然语言处理的基本概念是重要的。
- en: Machine learning refers to the process of teaching a model to recognize patterns,
    relationships, and structures within a dataset, enabling it to make predictions
    or generate coherent responses to user inputs. In the case of ChatGPT, the model
    is trained to acquire the ability to understand and generate human-like text based
    on vast amounts of sample data, known as the "WebText" dataset.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习是指教导模型识别数据集中模式、关系和结构的过程，使其能够做出预测或对用户输入生成连贯的响应。在ChatGPT的情况下，模型经过训练，能够根据大量的样本数据（称为“WebText”数据集）理解并生成类似人类的文本。
- en: NLP is another subfield of artificial intelligence that overlaps with machine
    learning but deals with enabling computers to comprehend, interpret, and generate
    human language. By understanding the likelihood of words appearing together and
    identifying relationships between topics, language models can be used for a wide
    array of applications, such as machine translation, speech recognition, and text
    generation. In the case of ChatGPT, the model functions by predicting the most
    probable next word in a sequence based on any context set by the user’s input.
    This process is then repeated for each subsequent word, allowing it to generate
    coherent and contextually relevant sentences in the form of a chat conversation.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）是人工智能的另一个子领域，它与机器学习有交集，但专注于使计算机能够理解、解释和生成人类语言。通过理解词语共同出现的可能性以及识别主题之间的关系，语言模型可以用于广泛的用途，例如机器翻译、语音识别和文本生成。在ChatGPT的情况下，模型通过根据用户输入设定的任何上下文预测序列中最可能出现的下一个单词来工作。然后，这个过程会针对后续的每个单词重复进行，使其能够以聊天对话的形式生成连贯且上下文相关的句子。
- en: The model used for ChatGPT has been trained on vast amounts of publicly available
    data, which has trained the model to understand a wide range of topics and produce
    responses that mimic human-like text. The purpose of the training dataset is to
    provide the model with as much knowledge as possible by exposing it to various
    languages, writing styles, and subjects.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 用于ChatGPT的模型在大量公开可用的数据上进行了训练，这使得模型能够理解广泛的主题并生成模仿人类文本的响应。训练数据集的目的是通过让模型接触各种语言、写作风格和主题，尽可能多地提供知识。
- en: Note that the datasets used to train large language models like ChatGPT play
    a crucial role in shaping their understanding of the world. If the model was trained
    on biased or limited data, this will produce biased or inaccurate responses. Similarly,
    if a dataset consists mostly of data from a single source, such as a particular
    website or news outlet, the language model will develop biases towards that source's
    perspectives and writing style. This can lead to the model generating responses
    reflecting that particular source's views, rather than providing a balanced and
    objective view. The quality and accuracy of the data can also impact the model's
    performance. For example, if the dataset contains a lot of errors or inconsistencies,
    the model may learn to produce outputs that are similarly flawed.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，用于训练像ChatGPT这样的大型语言模型的语料库数据集在塑造其对世界的理解方面发挥着至关重要的作用。如果模型是在有偏见或有限的数据上训练的，这将产生有偏见或不准确的结果。同样，如果数据集主要由来自单一来源的数据组成，例如特定的网站或新闻机构，语言模型将倾向于该来源的观点和写作风格。这可能导致模型生成反映该特定来源观点的响应，而不是提供平衡和客观的观点。数据的质量和准确性也会影响模型的表现。例如，如果数据集包含大量错误或不一致之处，模型可能会学会产生同样有缺陷的输出。
- en: Understanding the sources of the dataset used to train a language model is therefore
    important for assessing the model's biases and reliability. In the case of ChatGPT,
    the model was trained on an extensive selection of data sources including the
    following source types.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，了解用于训练语言模型的语料库数据来源对于评估模型的偏见和可靠性非常重要。就ChatGPT而言，该模型是在包括以下类型的数据源在内的广泛数据集上训练的。
- en: 1) **Websites:** Content from millions of websites, including news articles
    and blog posts covering a wide array of topics, such as science, technology, politics,
    history, and culture.2) **Books:** Excerpts from books, both fiction and non-fiction,
    exposing the model to a variety of different writing styles, genres, and narrative
    structures.3) **Online forums:** This includes content collected from online forums
    and discussion boards, such as Reddit and Stack Overflow, providing ChatGPT with
    examples of informal language and conversation, as well as a variety of opinions
    and viewpoints.4) **Social media:** Text from social media platforms, including
    Twitter and Facebook, was used to help ChatGPT understand shorter and more casual
    forms of text, including slang and abbreviations.5) **Conversational data:** Conversational
    data from customer support logs, public chat rooms, and other sources to improve
    ChatGPT’s ability to engage in dialogue and understand the context in a conversational
    setting.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 1) **网站：**包含数百万个网站的内容，包括涵盖广泛主题的新闻文章和博客文章，如科学、技术、政治、历史和文化。2) **书籍：**书籍摘录，包括虚构和非虚构作品，使模型接触到各种不同的写作风格、类型和叙事结构。3) **在线论坛：**这包括从在线论坛和讨论板收集的内容，如Reddit和Stack
    Overflow，为ChatGPT提供非正式语言和对话的例子，以及各种观点和意见。4) **社交媒体：**来自社交媒体平台（包括Twitter和Facebook）的文本，用于帮助ChatGPT理解更短、更随意的文本形式，包括俚语和缩写。5) **对话数据：**来自客户支持日志、公共聊天室和其他来源的对话数据，以提高ChatGPT在对话环境中进行对话和理解上下文的能力。
- en: ChatGPT-4
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4
- en: At the time of writing, ChatGPT’s model is powered by the GPT-4 architecture.
    This model is the latest version in a series of GPT models and the culmination
    of decades of research and innovation in large language modeling.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本文时，ChatGPT的模型由GPT-4架构提供支持。这是GPT模型系列中的最新版本，也是数十年来在大规模语言建模方面的研究和创新的结晶。
- en: For context, the earliest language models were primarily statistical, relying
    on frequency counts of words and word sequences in a large corpus (a database
    containing text) to estimate probabilities. While these models helped to lay the
    groundwork for understanding language, they were limited in their ability to capture
    the complex relationships and context that define human communication.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 对于背景信息，最早的语料库模型主要是基于统计的，依赖于大型语料库（包含文本的数据库）中单词和单词序列的频率计数来估计概率。虽然这些模型有助于为理解语言奠定基础，但它们在捕捉定义人类交流的复杂关系和上下文方面存在局限性。
- en: With the advent of advanced technology and methods, including GPU chips for
    computer processing, neural networks, and deep learning, the next generation of
    language models evolved. These models, built on recurrent neural networks (RNNs)
    and long short-term memory (LSTM) networks, were better equipped to handle the
    sequential nature of language, allowing for improved predictions and more sophisticated
    text generation.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 随着先进技术和方法的出现，包括用于计算机处理的GPU芯片、神经网络和深度学习，下一代语言模型得到了发展。这些模型建立在循环神经网络（RNNs）和长短期记忆（LSTM）网络之上，更好地处理了语言的顺序性，从而提高了预测能力并实现了更复杂的文本生成。
- en: OpenAI's GPT model represents a significant advancement in the evolution of
    language models. The first GPT model was released in 2018, setting the stage for
    more powerful and versatile language models. GPT-2, released in 2019, subsequently
    built upon the success of its predecessor, demonstrating even greater capabilities
    in generating coherent and contextually relevant text. However, despite its impressive
    performance, GPT-2 faced numerous limitations, including the generation of nonsensical
    or inaccurate responses and difficulties with handling longer text sequences.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI的GPT模型代表了语言模型演变中的一个重大进步。第一个GPT模型于2018年发布，为更强大和多功能的语言模型奠定了基础。2019年发布的GPT-2在继承前辈成功的基础上，展示了在生成连贯和上下文相关文本方面的更大能力。然而，尽管其表现令人印象深刻，GPT-2面临着许多限制，包括生成无意义或不准确的回应，以及处理较长的文本序列的困难。
- en: The release of GPT-3 in 2020 marked a major breakthrough for large language
    models, showcasing unprecedented performance and versatility. The success of GPT-3
    paved the way for the popular ChatGPT application and GPT-4, which is a multimodal
    model that can accept both image and text inputs to produce outputs.^([1](index_split_021.html#note_1
    "1"))
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 2020年GPT-3的发布标志着大型语言模型的一个重大突破，展示了前所未有的性能和多功能性。GPT-3的成功为流行的ChatGPT应用和GPT-4铺平了道路，GPT-4是一个多模态模型，可以接受图像和文本输入以产生输出。[1](index_split_021.html#note_1
    "1")
- en: Despite being less capable than humans in certain real-world scenarios, GPT-4
    has achieved human-level performance on various professional and academic benchmarks.
    This includes passing a simulated bar exam with a score in the top 10% of test
    takers. In internal evaluations, GPT-4 also showed an 82% reduction in the likelihood
    of responding to requests for disallowed content and a 40% increase in producing
    factual responses when compared to its predecessor. These improvements are attributed
    to the incorporation of more human feedback, including feedback from ChatGPT users,
    to enhance GPT-4's behavior. OpenAI collaborated with over 50 experts in domains
    such as AI safety and security to provide early feedback and ensure the responsible
    development of GPT-4.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管在某些现实场景中GPT-4的能力不如人类，但在各种专业和学术基准测试中，GPT-4已经达到了人类水平的表现。这包括以测试者前10%的分数通过模拟律师资格考试。在内部分析中，与前辈相比，GPT-4在回应禁止内容请求的可能性上减少了82%，在产生事实性回应上增加了40%。这些改进归因于更多人类反馈的整合，包括来自ChatGPT用户的反馈，以增强GPT-4的行为。OpenAI与50多个领域的专家合作，包括AI安全和安全，以提供早期反馈并确保GPT-4的负责任发展。
- en: Use Cases
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 应用场景
- en: Unlike traditional software-as-a-service, which come with well-defined use cases
    and scenarios, ChatGPT is designed to serve a diverse range of purposes, similar
    to a code editor or a word processor. Additionally, as the technology behind it
    evolves, ChatGPT is likely to expand in terms of ways it can be used to generate
    content, including the ability to accept image, audio, and video files as inputs,
    as well as more sophisticated outputs, including data visualization and audio
    narration.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 与具有明确用例和场景的传统软件即服务不同，ChatGPT旨在服务于多样化的目的，类似于代码编辑器或文字处理器。此外，随着其背后技术的演变，ChatGPT在生成内容的方式上可能会进一步扩展，包括接受图像、音频和视频文件作为输入，以及更复杂的输出，包括数据可视化和音频叙述。
- en: With new version upgrades on the way, there really are limitless possibilities
    when it comes to ways to use ChatGPT. From simulated conversations to content
    generation, idea brainstorming, text summarization, and translation, ChatGPT can
    service a broad range of knowledge-based tasks, as covered in this book.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 随着新版本升级的进行，在如何使用ChatGPT方面，确实有无穷无尽的可能性。从模拟对话到内容生成、创意头脑风暴、文本摘要和翻译，ChatGPT可以服务于广泛的基于知识的工作任务，正如本书所涵盖的。
- en: While its current outputs are limited to text (and not videos or images), ChatGPT
    is also capable of generating tables and programming scripts, including answering
    programming questions and debugging boilerplate code. Code generated in the chat
    can then be copied and pasted into your chosen code editor, as shown in Example
    1.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然其当前输出仅限于文本（不包括视频或图像），但ChatGPT也能生成表格和编程脚本，包括回答编程问题和调试模板代码。在聊天中生成的代码可以复制并粘贴到您选择的代码编辑器中，如示例
    1 所示。
- en: '**Example 1: Python script for a bar plot**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 1：条形图的Python脚本**'
- en: '**Step 1:** Input your data (such as your monthly expense records) into ChatGPT.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1：** 将您的数据（如月度支出记录）输入到ChatGPT中。'
- en: '![A list of cost per month  Description automatically generated with medium
    confidence](images/image.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![每月成本列表  描述自动生成，置信度中等](images/image.png)'
- en: '**Step 2:** Ask ChatGPT to generatea script in Python to visualize the data.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 2：** 要求ChatGPT生成用于可视化数据的Python脚本。'
- en: '**Prompt:** Provide the code to visualize my expenses in bar plot form using
    Python'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示：** 使用Python编写代码，以条形图形式可视化我的支出'
- en: '![A screenshot of a computer  Description automatically generated](images/image-1.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图  描述自动生成](images/image-1.png)'
- en: '**Step 3:** Copy code into a text editor such as Jupyter Notebook'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 3：** 将代码复制到文本编辑器，例如Jupyter Notebook'
- en: '![A screenshot of a computer program  Description automatically generated](images/image-2.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![计算机程序屏幕截图  描述自动生成](images/image-2.png)'
- en: '**Step 4:** Run code'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 4：** 运行代码'
- en: '![A graph of a graph showing the amount of expenses  Description automatically
    generated](images/image-3.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![显示支出金额的图表  描述自动生成](images/image-3.png)'
- en: '**Example 2: Generating a table**'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 2：生成表格**'
- en: Let’s now use ChatGPT to quickly convert text into a table.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将使用ChatGPT快速将文本转换为表格。
- en: '**Step 1:** Source data from a spreadsheet, public dataset, Wikipedia, chat
    log, or another source. The names of the columns should be placed on the first
    line, with information for each row positioned below.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 1：** 从电子表格、公共数据集、维基百科、聊天记录或其他来源获取数据源。列名应放在第一行，每行的信息位于下方。'
- en: '**Step 2:** Copy and paste the data into ChatGPT and add the text prompt below.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 2：** 将数据复制粘贴到ChatGPT中，并添加以下文本提示。'
- en: '**Prompt:** Convert into a dataset:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示：** 转换为数据集：'
- en: '![Table  Description automatically generated](images/image-4.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![表格  描述自动生成](images/image-4.png)'
- en: The Limitations of ChatGPT
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的局限性
- en: While ChatGPT has made significant advances in natural language processing and
    text generation, it also comes with a number of limitations that users should
    be aware of when using this software.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT在自然语言处理和文本生成方面取得了重大进展，但它也带来了一些局限性，用户在使用此软件时应有所了解。
- en: In this section, we'll explore some of the key limitations of ChatGPT, including
    its inability to reason and the potential for biased responses. Note, however,
    that these limitations will be addressed and improved upon over time with new
    version updates.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将探讨ChatGPT的一些关键局限性，包括其推理能力不足和可能存在偏见的风险。然而，请注意，这些局限性将随着新版本更新而得到解决和改进。
- en: Time Relevant Information
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 时间相关资料
- en: As an AI language model, ChatGPT does not search the Internet in real-time and
    is not connected to the Internet. As mentioned earlier in the chapter, ChatGPT
    was exposed to knowledge from an extensive repository of text and language data,
    gathered from sources such as books, articles, and websites. This means that its
    knowledge is limited to a finite number of sources as well as the timeframe for
    which the data was collected. At the time of writing, ChatGPT-3 and ChatGPT-4
    are trained on data collected up to and before September 2021\. As a result, the
    model might not be aware of events, developments, or trends that occurred after
    2021.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一种人工智能语言模型，ChatGPT不会实时搜索互联网，也不连接到互联网。如本章前面所述，ChatGPT接触到了来自广泛文本和语言数据的知识库，这些数据来自书籍、文章和网站等来源。这意味着其知识仅限于有限数量的来源以及收集数据的时间框架。截至写作时，ChatGPT-3和ChatGPT-4是在截至2021年9月之前收集的数据上训练的。因此，该模型可能不了解2021年之后发生的事件、发展或趋势。
- en: To demonstrate this limitation, if we ask ChatGPT about the Silicon Valley Bank
    crisis that occurred in early 2023, the model is unable to generate a credible
    and up-to-date response to this request. As the model explains in Example 1, new
    information has emerged since its knowledge cutoff (the period when it was initially
    trained).
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示这一局限性，如果我们询问ChatGPT关于2023年初发生的硅谷银行危机，该模型无法对此请求生成一个可信且最新的响应。正如示例1中模型所解释的，自其知识截止点（最初训练的时期）以来，已经出现了新的信息。
- en: '**Example 1: Unaware**'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 1：不知情**'
- en: '![Image](images/image-5.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-5.png)'
- en: In example 2, meanwhile, ChatGPT refers to Silicon Valley Bank during the Dotcom
    crisis rather than the actual Silicon Valley Bank crisis.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，在示例2中，ChatGPT提到的是互联网泡沫危机期间的硅谷银行，而不是实际的硅谷银行危机。
- en: '**Example 2: Irrelevant**'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 2：无关**'
- en: '![Graphical user interface, text, application  Description automatically generated](images/image-6.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图形用户界面、文本、应用程序 描述自动生成](images/image-6.png)'
- en: It’s therefore essential to keep an eye out for updates regarding ChatGPT’s
    most recent knowledge cutoff date, or alternatively explore other software applications
    with a more recent cutoff date to access real-time knowledge if you want to generate
    content based on recent events. If you are a fiction author or a 20th Century
    history teacher, then obviously, you won’t have to worry so much about ChatGPT’s
    latest cutoff date.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，密切关注ChatGPT最新知识截止日期的更新至关重要，或者如果您想根据最近的事件生成内容，可以探索其他截止日期更近的软件应用程序以获取实时知识。如果您是一位小说家或20世纪的历史教师，那么显然，您不必过于担心ChatGPT的最新截止日期。
- en: Inability to Reason
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 无法推理
- en: The next limitation of ChatGPT is its inability to reason like a human. While
    the model can quickly generate responses based on patterns it has learned from
    the training data (the dataset used to train the model), it lacks the ability
    to understand the underlying concepts or make logical deductions. This means that
    it may struggle to answer complex questions that require critical thinking or
    problem-solving, especially for questions that require more than just a simple
    factual response.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的下一个局限性是其无法像人类一样进行推理。虽然该模型可以快速根据从训练数据（用于训练模型的数据库）中学到的模式生成响应，但它缺乏理解潜在概念或进行逻辑推理的能力。这意味着它可能难以回答需要批判性思维或解决问题的复杂问题，尤其是对于需要不仅仅是简单事实回答的问题。
- en: 'Two examples of questions that require reasoning and logic to answer include:
    “What is the best way to reduce carbon emissions using AI technology but without
    negatively impacting the economy and amplifying inflation?” and “What are the
    ethical implications of using gene editing technologies to enhance human intelligence
    and could we see North Korea as an early adopter to this technology?” While ChatGPT
    may be able to piece together some information related to these topics, it typically
    struggles to offer a comprehensive and nuanced argument.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 需要推理和逻辑来回答的问题的两个例子包括：“使用人工智能技术但不会对经济产生负面影响并加剧通货膨胀的最佳方法来减少碳排放是什么？”以及“使用基因编辑技术来增强人类智能的伦理影响是什么？我们能否将朝鲜视为这项技术的早期采用者？”虽然ChatGPT可能能够拼凑一些与这些主题相关的信息，但它通常难以提供一个全面和细致入微的论点。
- en: ChatGPT's predictive abilities are also limited, and the model cannot accurately
    forecast future events and trends through logical reasoning or extrapolation.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的预测能力也有限，该模型无法通过逻辑推理或外推准确预测未来事件和趋势。
- en: Biased Responses
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 偏见性回答
- en: As a new technology, the extent and nature of bias associated with AI model
    design have yet to be fully documented. Although the capabilities of ChatGPT are
    impressive, they may also reflect and exaggerate societal biases. As ChatGPT is
    mostly trained on data crawled from the Internet, it’s possible that the model
    will generate content that contains or purports harmful stereotypes. If the training
    data is skewed towards a particular demographic, political, or geographical location,
    ChatGPT's responses may reflect that bias. For example, if the training data is
    biased towards male viewpoints on a certain topic, ChatGPT will struggle to generate
    accurate responses for female viewpoints on that topic.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一项新技术，与AI模型设计相关的偏见程度和性质尚未得到充分记录。尽管ChatGPT的能力令人印象深刻，但它也可能反映和夸大社会偏见。由于ChatGPT主要是在从互联网爬取的数据上训练的，因此模型可能会生成包含或声称包含有害刻板印象的内容。如果训练数据偏向于特定的族裔、政治或地理区域，ChatGPT的回答可能会反映出这种偏见。例如，如果训练数据在某个特定主题上偏向男性观点，ChatGPT在生成该主题女性观点的准确回答时可能会遇到困难。
- en: Transparency
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 透明度
- en: It's important to note that the source data used to train ChatGPT and generate
    outputs is not fully transparent. As some data may originate from online sources
    that aren’t properly cited or verified, this may lead to inaccuracies, biases,
    or other problems with ChatGPT’s responses. For instance, in the case of programming
    and technology, you might want to know where the model is sourcing its information,
    i.e. official documentation, blogs, forum comments, etc. If you are writing code,
    you also want to know if the code ChatGPT is recommending is secure and efficient,
    for example.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，用于训练ChatGPT和生成输出的源数据并不完全透明。由于一些数据可能源自未正确引用或验证的在线来源，这可能导致ChatGPT的回答出现不准确、偏见或其他问题。例如，在编程和技术领域，你可能想知道模型是从哪里获取信息的，即官方文档、博客、论坛评论等。如果你正在编写代码，你也想知道ChatGPT推荐的代码是否安全且高效，例如。
- en: Commoditization of Content
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 内容商品化
- en: While ChatGPT can generate high-quality content, it’s important to remember
    that each output is based on patterns learned from the training data. With millions
    of users generating content using the same training data, ChatGPT-generated content
    may skew toward reoccurring perspectives, case studies, arguments, and phrasing.
    This should lead to some level of content commoditization, with many blogs and
    other content channels propagating the same ChatGPT-generated content.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT可以生成高质量的内容，但重要的是要记住，每个输出都是基于从训练数据中学到的模式。随着数百万用户使用相同的训练数据生成内容，ChatGPT生成的内容可能会偏向于重复的观点、案例研究、论点和措辞。这可能导致一定程度的内容商品化，许多博客和其他内容渠道传播相同由ChatGPT生成的内容。
- en: As Kieran Flanagan, CMO of Zapier, explains, “AI is going to create a bigger
    gulf between the big batch of everything content and the small batch of incredible
    content because it drags up content creators who are like okay into the good bucket…
    because you can automate a lot of the research, you can get a lot of great data
    points, and get a lot of first drafts, and you can iterate on that.”^([2](index_split_022.html#note_2
    "2"))
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 如Zapier首席营销官Kieran Flanagan解释的那样，“AI将扩大一切内容的大批量和小批量精彩内容之间的差距，因为它将那些像‘好吧’一样进入好桶的内容创作者拖了上来……因为你可以自动化很多研究，你可以获得很多很好的数据点，得到很多初稿，然后你可以在此基础上进行迭代。”^([2](index_split_022.html#note_2
    "2"))
- en: Emotional Intelligence
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 情商
- en: ChatGPT does not have emotional intelligence like humans. It cannot understand
    or empathize with emotions, which limits its ability to provide emotional support
    or advice. This means that it may provide generic or irrelevant responses when
    dealing with emotional issues.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT没有像人类那样的情商。它无法理解或同情情感，这限制了它提供情感支持或建议的能力。这意味着在处理情感问题时，它可能会提供通用或不相关的回答。
- en: When asking ChatGPT for advice on dealing with anxiety, it usually provides
    a generic response based on the patterns it has learned from the training data,
    rather than understanding the specific emotional state that the end-user is currently
    in. Likewise, if you ask ChatGPT “**What is the meaning of life?”**, the model
    instantly provides a generic response based on philosophy, scholarly writing,
    and other patterns it has learned from the training data, rather than questioning
    and understanding the true meaning of why someone might be asking this question.
    In contrast, a human responder would probably seek to disambiguate the question
    and offer emotional understanding and assistance if deemed appropriate to the
    situation.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 当向ChatGPT寻求处理焦虑的建议时，它通常会提供一个基于从训练数据中学到的模式的一般性回应，而不是理解最终用户当前的具体情绪状态。同样，如果你问ChatGPT“**生命的意义是什么？””，模型会立即提供一个基于哲学、学术写作和其他从训练数据中学到的模式的一般性回应，而不是质疑和了解为什么有人可能会问这个问题。相比之下，一个人类回应者可能会试图澄清问题，并在适当的情况下提供情感理解和帮助。
- en: Informational Errors
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 信息性错误
- en: AI language models remain a work in progress and ChatGPT does make mistakes,
    including incomplete, incorrect, non-sensical, or outdated claims. ChatGPT's responses
    can also include references to case studies, statistics, or other sources of information
    that aren’t findable through a simple Google search, raising the question of whether
    such case studies even exist. It is, therefore, critical to approach ChatGPT's
    responses with a critical eye and not always take them at face value. This includes
    fact-checking information that ChatGPT generates and asking ChatGPT for website
    links to any case studies or research reports that it cites (in order to check
    whether they actually exist).
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能语言模型仍在不断发展中，ChatGPT确实会犯错误，包括不完整、不正确、无意义或过时的说法。ChatGPT的回应也可能包括引用案例研究、统计数据或其他信息来源，这些信息无法通过简单的谷歌搜索找到，这引发了这样的问题：这些案例研究甚至是否存在。因此，以批判的眼光看待ChatGPT的回应，不要总是盲目接受，是至关重要的。这包括核实ChatGPT生成的事实信息，并要求ChatGPT提供任何它引用的案例研究或研究报告的网站链接（以便检查它们是否确实存在）。
- en: You should also be wary of relying on ChatGPT’s responses as a single source
    of information, especially when it comes to making important decisions, drawing
    conclusions, or disseminating information.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 你还应该警惕不要将ChatGPT的回应作为唯一的信息来源，尤其是在做出重要决策、得出结论或传播信息时。
- en: Restricted Content
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 限制内容
- en: Lastly, ChatGPT is programmed to prioritize user safety and well-being. This
    means that the model is cautious about answering questions and providing advice
    related to health, investing, and other sensitive topics.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，ChatGPT被编程为优先考虑用户的安全和福祉。这意味着模型在回答与健康、投资和其他敏感话题相关的问题时非常谨慎。
- en: In the case of health-related questions, ChatGPT may provide general information
    and suggestions, but it will not diagnose or recommend exact treatments or medications.
    This is because health advice should be provided by medical professionals, who
    have access to a patient's full medical history and who can provide personalized
    recommendations.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在涉及健康相关问题的案例中，ChatGPT可能会提供一般信息和建议，但它不会进行诊断或推荐具体的治疗方案或药物。这是因为健康建议应由医疗专业人员提供，他们可以访问患者的完整医疗历史，并能提供个性化的建议。
- en: Similarly, for investing advice, ChatGPT may provide general information about
    different investment options and strategies, but it will not provide specific
    investment advice. As with health advice, investment decisions should be based
    on an individual's unique circumstances, including their financial situation,
    risk tolerance, and investment goals, which can only be assessed by a professional
    and qualified financial advisor.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，对于投资建议，ChatGPT可能会提供关于不同投资选项和策略的一般信息，但它不会提供具体的投资建议。与健康建议一样，投资决策应基于个人的独特情况，包括他们的财务状况、风险承受能力和投资目标，这些只能由专业合格的经济顾问评估。
- en: Other topics, meanwhile, are outright restricted. This includes hate speech,
    sexually explicit language, illegal activities such as violence, and personal
    information, including phone numbers, addresses, and financial information.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，其他一些话题是直接受限的。这包括仇恨言论、色情语言、非法活动如暴力，以及个人信息，包括电话号码、地址和财务信息。
- en: '|  | 3 |'
  id: totrans-114
  prefs: []
  type: TYPE_TB
  zh: '|  | 3 |'
- en: GETTING STARTED WITH CHATGPT
  id: totrans-115
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 开始使用ChatGPT
- en: Now that you have a basic understanding of what ChatGPT is and what it can be
    used for, it's time to get more hands-on.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经对ChatGPT是什么以及它可以用来做什么有了基本的了解，是时候更实际地操作了。
- en: To start using ChatGPT, you will first need to visit the OpenAI website (www.openai.com)
    and navigate to the signup page for ChatGPT. Next, fill in the required information,
    including your name, email address, and password, and then complete the registration
    process by following the instructions sent to your email account.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用ChatGPT，您首先需要访问OpenAI网站（www.openai.com），导航到ChatGPT的注册页面。接下来，填写所需信息，包括您的姓名、电子邮件地址和密码，然后根据发送到您电子邮件账户的指示完成注册过程。
- en: ChatGPT currently offers a free and paid version. As these versions are subject
    to change in regard to pricing and the features provided, I will not delve into
    the specifics of each option. For first-time users, I recommend using the freemium
    version (if it is still available) and continue using it until you feel comfortable
    with the level of service provided and the value you are gaining from using the
    free service.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT目前提供免费和付费版本。由于这些版本的价格和提供的功能可能会变化，我将不会深入探讨每个选项的细节。对于初次用户，我建议使用免费增值版本（如果仍然可用），并继续使用它，直到您对所提供的服务水平以及从免费服务中获得的价值感到满意。
- en: If you encounter any problems with slow processing speed or identify features
    included in the paid version that meet your needs, then you may wish to consider
    upgrading to the paid version as an individual user or as an enterprise user on
    behalf of your employer/company. I currently use ChatGPT Plus for USD $20 a month
    as this gives me access to ChatGPT-4 as well as faster processing speed and higher
    availability, which helps me get my work done faster.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您遇到处理速度慢的问题或识别出付费版本中包含的满足您需求的功能，那么您可能希望考虑作为个人用户或代表您的雇主/公司作为企业用户升级到付费版本。我目前使用ChatGPT
    Plus，每月支付20美元，这使我能够访问ChatGPT-4以及更快的处理速度和更高的可用性，这有助于我更快地完成工作。
- en: After setting up an account with OpenAI and logging into ChatGPT, you can click
    on the “**+ New chat**” button in the top-left corner of the landing page or simply
    type your instructions into the chat bar on the right-hand side.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在OpenAI上设置账户并登录ChatGPT后，您可以在登录页面左上角点击“**+ 新聊天**”按钮，或者简单地将在右侧聊天栏中输入您的指令。
- en: '![Image](images/image-7.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-7.png)'
- en: 'Figure 1: ChatGPT’s simple user interface'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：ChatGPT的简单用户界面
- en: Chats
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天
- en: On the left side of the screen, there is a chat history that is automatically
    saved to your account. This lets you easily access past conversations and refer
    back to text prompts and their corresponding outputs. This feature also enables
    you to organize multiple projects into designated chats, which allows for a more
    streamlined and efficient workflow as you can easily switch between projects and
    access relevant information without having to search through one long chat message.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 在屏幕的左侧，有一个自动保存到您账户中的聊天历史。这使得您可以轻松访问过去的对话，并回顾文本提示及其相应的输出。此功能还允许您将多个项目组织到指定的聊天中，这样您就可以在项目之间轻松切换并获取相关信息，而无需搜索长篇聊天信息。
- en: It is important to separate your ChatGPT chats based on topics to avoid confusing
    the model. ChatGPT uses an algorithm that relies on context to generate responses,
    so if the conversation jumps between different topics or contexts, this will affect
    the model’s ability to generate coherent and relevant responses. By keeping each
    ChatGPT chat focused on a specific topic, you can help the model understand the
    context of the conversation and generate more accurate responses.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 根据主题将您的ChatGPT聊天分开是很重要的，以避免混淆模型。ChatGPT使用一个依赖于上下文的算法来生成响应，所以如果对话在不同的主题或上下文之间跳跃，这将影响模型生成连贯和相关的响应的能力。通过保持每个ChatGPT聊天专注于特定主题，您可以帮助模型理解对话的上下文，并生成更准确的响应。
- en: Text Prompts
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: To interact with ChatGPT, you will need to provide what’s called a *text prompt*,
    which is instructions for the AI about what you wish to generate. A prompt can
    be as simple as **What is ChatGPT?** or **Translate your previous output in French**.
    ChatGPT will then attempt to generate a relevant output based on the text prompt
    provided.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 要与ChatGPT互动，您需要提供所谓的*文本提示*，这是对AI关于您希望生成的内容的指令。提示可以是像**什么是ChatGPT？**或**将您的先前输出翻译成法语**这样简单。然后ChatGPT将尝试根据提供的文本提示生成相关输出。
- en: '![Image](images/image-8.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-8.png)'
- en: There is no single method or set code for writing a text prompt. You can ask
    ChatGPT any question or provide any input, and ChatGPT will do its best to provide
    a relevant response. One useful way to approach text prompt construction is to
    imagine that you are explaining a new task to a colleague or intern. By doing
    so, you can ensure that ChatGPT fully understands what's required and how to execute
    it.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 没有一种单一的方法或固定代码来编写文本提示。你可以向ChatGPT提出任何问题或提供任何输入，ChatGPT将尽力提供相关的响应。构建文本提示的一个有用方法是想像你正在向同事或实习生解释一项新任务。这样做可以确保ChatGPT完全理解所需的内容以及如何执行它。
- en: It is vital to use natural language as that’s the language the AI is trained
    on. Natural language refers to human languages, such as everyday conversational
    English or what you might write in a text message, as opposed to an artificial
    language such as a programming language. This means you should communicate to
    ChatGPT like it’s a human and avoid using artificial languages such as CSS, Python,
    or Google search tricks to write your text prompts. You can also use other natural
    languages such as French, Spanish, Japanese, and so forth.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 使用自然语言至关重要，因为这是AI训练的语言。自然语言指的是人类语言，如日常对话英语或你可能会在短信中写的语言，而不是像编程语言这样的人工语言。这意味着你应该像与人类交流一样与ChatGPT交流，并避免使用CSS、Python或Google搜索技巧来编写你的文本提示。你也可以使用其他自然语言，如法语、西班牙语、日语等。
- en: While it’s possible to generate high-quality outputs using a sentence fragment
    (i.e. **blog post about personal finance**), you will generally get more relevant
    results using an imperative (i.e. **draft a blog post about personal finance**),
    a full sentence (i.e. **I want to write a blog post about personal finance**),
    or multiple sentences (i.e. **Draft a blog post about personal finance. The blog
    should include sections on credit card management and savings hacks**).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然使用句子片段（例如**关于个人理财的博客文章**）可以生成高质量的内容，但通常使用祈使句（例如**撰写一篇关于个人理财的博客文章**）、完整句子（例如**我想写一篇关于个人理财的博客文章**）或多个句子（例如**撰写一篇关于个人理财的博客文章。博客应包括信用卡管理和储蓄技巧部分**）可以获得更相关的结果。
- en: Next, although there are no set rules for interacting with ChatGPT, you should
    take the following tips into consideration.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，尽管与ChatGPT互动没有固定的规则，但你应该考虑以下建议。
- en: '**Use proper grammar and spelling:** ChatGPT is programmed to understand and
    respond to proper grammar, spelling, and punctuation. If you use improper grammar,
    spelling, or punctuation, ChatGPT may not be able to understand your question
    or may provide an inadequate response.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用正确的语法和拼写**：ChatGPT被编程为理解和响应正确的语法、拼写和标点。如果你使用不正确的语法、拼写或标点，ChatGPT可能无法理解你的问题或可能提供不充分的响应。'
- en: '**Try open-ended questions:** Open-ended questions allow ChatGPT to generate
    more detailed and informative responses. For example, instead of asking **Do you
    like cats?**, try asking **What is your opinion on cats as pets?**'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '**尝试开放式问题**：开放式问题允许ChatGPT生成更详细和有信息量的响应。例如，与其问**你喜欢猫吗**？不如问**你对猫作为宠物的看法是什么**？'
- en: '**Try to use verbs:** Using verbs can be useful for giving ChatGPT a clearer
    understanding of your intentions. Verbs are action words that convey a specific
    meaning, and by using them, you indicate to ChatGPT what action you want it to
    take or what type of response you are looking for. Examples of verbs include *write*,
    *answer*, *translate*, *optimize*, *calculate*, *explain*, etc. However, it''s
    important to remember that ChatGPT is a large language model, and it can understand
    and respond to a wide range of inputs, including prompts that don’t use verbs.
    So, while using verbs can be helpful, it''s not always necessary for ChatGPT to
    understand a request.'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '**尽量使用动词**：使用动词可以帮助ChatGPT更清晰地理解你的意图。动词是表示特定意义的动作词，通过使用它们，你向ChatGPT表明你希望它执行的动作或你希望得到的响应类型。动词的例子包括*写*、*回答*、*翻译*、*优化*、*计算*、*解释*等。然而，重要的是要记住ChatGPT是一个大型语言模型，它可以理解和响应广泛的输入，包括不使用动词的提示。因此，虽然使用动词可能有所帮助，但并不总是必要的，因为ChatGPT能够理解请求。'
- en: '**Use quotation marks:** Using quotation marks can sometimes be helpful to
    separate the command from the subject matter. An example of this would be using
    quotation marks to highlight the phrase or word you wish to translate or summarize,
    i.e. **Translate “apple” into French**.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用引号**：使用引号有时可以帮助将命令与主题内容分开。一个例子是使用引号来突出你希望翻译或总结的短语或单词，例如**将“苹果”翻译成法语**。'
- en: '**Don''t be afraid to correct ChatGPT:** If ChatGPT provides an incorrect or
    inappropriate response, don''t be afraid to correct it. This helps improve ChatGPT''s
    performance and ensures that you receive more accurate responses in the future.
    You can leave feedback by clicking on the thumbs-up and thumbs-down arrows on
    the right-hand side of the message or by directly correcting ChatGPT through your
    follow-up message. Regenerating the outcome is also an indirect way to leave feedback.'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '**不要害怕纠正ChatGPT：** 如果ChatGPT提供了错误或不恰当的回应，不要害怕去纠正它。这有助于提高ChatGPT的表现，并确保你未来能够收到更准确的回应。你可以通过点击消息右侧的点赞和踩踏箭头来留下反馈，或者通过后续消息直接纠正ChatGPT。重新生成结果也是一种间接的反馈方式。'
- en: '![Image](images/image-9.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-9.png)'
- en: '**Provide more context:** If you are not happy with ChatGPT’s output, this
    is usually a sign that the model needs more information or context to help it
    generate an accurate and relevant response.'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '**提供更多上下文：** 如果你对ChatGPT的输出不满意，这通常意味着模型需要更多的信息或上下文来帮助它生成准确和相关的回应。'
- en: '**Rephrase your message:** Another way to improve the output is to try to rephrase
    your original input. ChatGPT is a language model that generates responses based
    on the input it receives, so by rephrasing your question or input, you might be
    able to get a different and more satisfactory output.'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '**重新措辞你的信息：** 提高输出的另一种方法是尝试重新措辞你的原始输入。ChatGPT是一个基于接收到的输入生成回应的语言模型，所以通过重新措辞你的问题或输入，你可能会得到不同且更令人满意的输出。'
- en: Sample ChatGPT Prompts
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 样本ChatGPT提示
- en: Below are some sample text prompts you can use to experiment with using ChatGPT.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些你可以用来实验ChatGPT使用的样本文本提示。
- en: '**Tell me a joke about ______**'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: '**告诉我一个关于______的笑话**'
- en: Yep, ChatGPT is capable of generating humorous responses!
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，ChatGPT能够生成幽默的回应！
- en: Break down [topic] into smaller, easier-to-understand parts. Use analogies and
    real-life examples to simplify the concept and make it more relatable.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 将[主题]分解成更小、更容易理解的组成部分。使用类比和现实生活中的例子来简化概念，使其更具相关性。
- en: ChatGPT can provide explanations and solutions on various topics.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以在各种主题上提供解释和解决方案。
- en: What book/movie/song should I read/watch/listen to next? I also like ______.
    Give me recommendations based on that.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我接下来应该阅读/观看/听什么书/电影/歌曲？我也喜欢______。基于这些推荐给我。
- en: ChatGPT can provide recommendations on books, movies, and music based on your
    interests.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以根据你的兴趣提供关于书籍、电影和音乐的推荐。
- en: What’s the difference between ______ and ______?
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: ______和______之间的区别是什么？
- en: Ask ChatGPT to answer simple questions about the difference between particular
    words (i.e. empathy and sympathy) or different topics (i.e. Christianity and Judaism).
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 让ChatGPT回答关于特定单词（例如同情与同情）或不同主题（例如基督教与犹太教）之间差异的简单问题。
- en: Please edit the following passage to improve clarity, flow, and impact. Fix
    any errors and suggest ways to make it more engaging.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 请编辑以下段落，以提高清晰度、流畅性和影响力。修复任何错误，并提出使其更具吸引力的方法。
- en: Improve your writing and communication skills using ChatGPT to refine your writing
    and gain immediate feedback.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT来改进你的写作和沟通技巧，通过精炼你的写作和获得即时反馈。
- en: I’m writing a non-fiction book about ______ and I’m looking for an interesting
    scientific case study that explores the idea of ______ and ______. Please suggest
    some options.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在写一本关于______的非虚构书籍，我正在寻找一个有趣的科学案例研究，探讨______和______的想法。请提供一些选项。
- en: ChatGPT can be an effective research assistant, but always be sure to double-check
    the accuracy and reliability of any studies, information, or claims that it makes.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以成为一个有效的研究助手，但始终要确保双重检查它提出的任何研究、信息或主张的准确性和可靠性。
- en: Hotkeys & Shortcuts
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 快捷键与快捷方式
- en: At present, ChatGPT does not have hotkeys or shortcuts that you can use to streamline
    your workflow. However, some platforms that integrate with ChatGPT may have their
    own keyboard shortcuts or commands that you can use to interact with the chat
    interface more efficiently.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，ChatGPT没有你可以用来简化工作流程的快捷键或快捷方式。然而，一些与ChatGPT集成的平台可能有自己的键盘快捷键或命令，你可以使用它们更有效地与聊天界面交互。
- en: You can check the documentation or “help” resources for the specific platform
    you are using to chat with ChatGPT to see if any hotkeys or shortcuts are available.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以检查你与ChatGPT聊天所使用的特定平台的文档或“帮助”资源，看看是否有可用的快捷键或快捷方式。
- en: Privacy
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 隐私
- en: OpenAI has clearly stated that the data submitted through the OpenAI API is
    not utilized to train OpenAI models or enhance the services provided by OpenAI.
    However, the data submitted through non-API consumer services, such as the web
    version of ChatGPT and DALL-E, may be used to improve and train their models.
    This means that ChatGPT is likely using machine learning to continually refine
    its model and responses based on past user inputs and ChatGPT outputs. However,
    ChatGPT does not have a direct memory of past conversations with its users or
    the capability to share that information with other users.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI明确表示，通过OpenAI API提交的数据不会被用于训练OpenAI模型或增强OpenAI提供的服务。然而，通过非API消费者服务提交的数据，例如ChatGPT和DALL-E的网页版本，可能会被用于改进和训练他们的模型。这意味着ChatGPT很可能会使用机器学习来不断优化其模型和响应，基于过去的用户输入和ChatGPT的输出。然而，ChatGPT并没有直接记忆与用户过去的对话，也没有能力将此信息与其他用户共享。
- en: It is important to note that users have the choice to opt out of having their
    data used to improve the non-API services offered by OpenAI. To opt out, users
    are required to fill out a form and provide their email address associated with
    the owner of the account. Furthermore, OpenAI has assured its users that their
    content, including prompts, generated images, uploads, and API responses, will
    be deleted upon request and they do not share user content with third parties
    for marketing purposes.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，用户可以选择不使用他们的数据来改善OpenAI提供的非API服务。要选择退出，用户需要填写表格并提供与账户所有者关联的电子邮件地址。此外，OpenAI已向其用户保证，根据用户的要求，将删除其内容，包括提示、生成的图像、上传和API响应，并且他们不会为了营销目的与第三方共享用户内容。
- en: In summary, you shouldn’t be too concerned with ChatGPT directly disclosing
    your conversations with other users, but keep in mind that it does observe your
    prompts and feedback (thumbs-up and thumbs-down button) and this data may be used
    to retrain the overall model.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，您不必过于担心ChatGPT直接披露您与其他用户的对话，但请记住，它确实会观察您的提示和反馈（点赞和踩按钮），这些数据可能会被用于重新训练整体模型。
- en: Ownership
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 所有权
- en: According to ChatGPT’s Content Policy (labs.openai.com/policies/content-policy)
    and Terms (openai.com/policies/terms-of-use), users retain ownership of the content
    generated by ChatGPT. This includes the rights to republish, sell, and merchandise
    outputs, irrespective of whether they were produced using a free or paid subscription.
    This means that you can use content generated by ChatGPT for personal and commercial
    projects as long as that content doesn’t infringe on the copyright of existing
    content and the terms and conditions for publishing content on other platforms.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 根据ChatGPT的内容政策（labs.openai.com/policies/content-policy）和条款（openai.com/policies/terms-of-use），用户保留由ChatGPT生成的内容的所有权。这包括重新发布、销售和商品化的权利，无论这些内容是否使用免费或付费订阅产生。这意味着只要该内容不侵犯现有内容的版权，并且符合在其他平台上发布内容的条款和条件，您就可以将ChatGPT生成的内容用于个人和商业项目。
- en: Copyright
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 版权
- en: The issue of AI copyright infringement is a complex issue, and there is still
    no clear answer regarding the long-term legal implications of using ChatGPT in
    regard to copyright law. As stated by ChatGPT, the responsibility for ensuring
    that the content generated by ChatGPT does not infringe on any copyright laws
    lies with the user.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: AI版权侵权是一个复杂的问题，关于使用ChatGPT在版权法方面的长期法律影响还没有明确的答案。正如ChatGPT所述，确保由ChatGPT生成的内容不侵犯任何版权法的责任在于用户。
- en: '![Image](images/image-10.png)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![Image](images/image-10.png)'
- en: In addition to the legal concerns, writers who use ChatGPT may also face reputational
    risks, particularly if companies view reliance on AI models as a potential liability
    for freelance or contract writers. Therefore, it is important for users of ChatGPT
    to be aware of the potential legal and reputational risks associated with their
    use, and to take appropriate measures to mitigate those risks.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 除了法律问题之外，使用ChatGPT的作家还可能面临声誉风险，尤其是如果公司认为依赖AI模型可能成为自由职业者或合同作家潜在的责任。因此，对于ChatGPT的用户来说，了解他们使用过程中可能出现的潜在法律和声誉风险，并采取适当的措施来减轻这些风险是非常重要的。
- en: '|  | 4 |'
  id: totrans-168
  prefs: []
  type: TYPE_TB
  zh: '|  | 4 |'
- en: PRECISION PROMPT WRITING
  id: totrans-169
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 精确提示写作
- en: With the growing popularity of ChatGPT, millions of people have direct access
    to a powerful tool for generating large volumes of content. However, with everyone
    using the same model, it's becoming increasingly important to create content that
    stands out from the crowd. Although ChatGPT levels the playing field, it's the
    quality of the prompts that sets writers apart and a well-crafted prompt can be
    the difference between a piece of writing that captures readers' attention and
    one that gets lost in the deep sea of content on the web.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 随着ChatGPT的日益流行，数百万人可以直接访问一个用于生成大量内容的强大工具。然而，由于每个人都在使用相同的模型，创建与众不同的内容变得越来越重要。尽管ChatGPT使竞争更加公平，但提示的质量是区分作家的重要因素，一个精心制作的提示可能是吸引读者注意力和在网络上内容海洋中迷失之间的区别。
- en: In general, the more specific your prompt is, the better ChatGPT can comprehend
    your intention, and the more specific the output will be. For instance, rather
    than asking a general question like **What is the meaning of life?**, try asking
    a more specific question like **What are the main philosophies on the meaning
    of life?**
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，你的提示越具体，ChatGPT就越能理解你的意图，输出也会越具体。例如，与其问一个一般性的问题如**生命的意义是什么**，不如尝试问一个更具体的问题，如**关于生命意义的哲学有哪些主要观点**？
- en: Modifiers
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 修饰符
- en: In the previous chapter, we looked at the simple prompt in the form of **draft
    a blog post about personal finance** (using a verb at the start of the prompt
    to form an imperative^([3](index_split_023.html#note_3 "3"))). While there is
    ample information here for ChatGPT to generate a relevant output, we can refine
    this prompt to generate a more nuanced and less generic output.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们探讨了以**撰写一篇关于个人财务的博客文章**（在提示的开头使用动词以形成祈使句^([3](index_split_023.html#note_3
    "3")))的形式的简单提示。虽然这里为ChatGPT生成相关输出提供了充足的信息，但我们仍然可以细化这个提示以生成更细腻且不那么通用的输出。
- en: This is where *modifiers* come in. While your base prompt will generally outline
    the general task, a modifier adds additional instructions regarding the style,
    tone, or voice you want ChatGPT to use.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是**修饰符**发挥作用的地方。虽然你的基本提示通常会概述一般任务，但修饰符会添加关于你希望ChatGPT使用的风格、语气或声音的额外说明。
- en: '![Image](images/image-11.png)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![图像](images/image-11.png)'
- en: 'If we take the original base prompt of **a blog about personal finance**, we
    can add a modifier in the form of **a blog post about personal finance written
    in the style of the Bible: King James version.** Obviously,this prompt will produce
    a dramatically different result from the original prompt.'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将原始的基本提示**关于个人财务的博客**，我们可以添加一个修饰符，形式为**以圣经风格（詹姆斯国王版）撰写的关于个人财务的博客文章**。显然，这个提示将产生与原始提示截然不同的结果。
- en: Similarly, you could use a modifier to specify a particular style of writing
    based on a well-known author such as J.K. Rowling or Tim Ferriss.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，你可以使用修饰符来指定基于知名作者（如J.K. 罗琳或蒂姆·费里斯）的特定写作风格。
- en: Text Prompt
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: Craft a blog post about personal finance written in the style of Tim Ferriss
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 撰写一篇以蒂姆·费里斯风格撰写的关于个人财务的博客文章。
- en: '![Image](images/image-12.png)'
  id: totrans-180
  prefs: []
  type: TYPE_IMG
  zh: '![图像](images/image-12.png)'
- en: Additionally, you can apply multiple modifiers by stacking them together.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，你可以通过堆叠它们来应用多个修饰符。
- en: Text Prompt
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: 'Draft a blog post about personal finance written in the style of the Bible:
    King James version, inclusive language, U.S. spelling.'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 撰写一篇以圣经风格（詹姆斯国王版、包容性语言、美国拼法）撰写的关于个人财务的博客文章。
- en: '![Text  Description automatically generated](images/image-13.png)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
  zh: '![文本  自动生成的描述](images/image-13.png)'
- en: 'Here, I added two new modifiers: **inclusive language** and **U.S. spelling**.
    However, if you find yourself using the same modifiers for multiple prompts, you
    might want to write a prompt to apply those modifiers for all subsequent outputs
    within the ongoing chat thread.'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我添加了两个新的修饰符：**包容性语言**和**美国拼法**。然而，如果你发现自己正在为多个提示使用相同的修饰符，你可能想要编写一个提示来应用这些修饰符，以便在当前聊天线程的所有后续输出中使用。
- en: Text Prompt
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: Please always use U.S. spelling and inclusive language for all outputs in this
    chat thread.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 请在此聊天线程的所有输出中始终使用美国拼法和包容性语言。
- en: '![Graphical user interface, text, application, email  Description automatically
    generated](images/image-14.png)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
  zh: '![图形用户界面、文本、应用程序、电子邮件  自动生成的描述](images/image-14.png)'
- en: After issuing this request, you will no longer need to include those two modifiers
    for each text prompt. Alternatively, if you are working for a brand or company
    that has fixed content guidelines regarding the organization’s tone and voice,
    you can copy and paste those guidelines into the chat before you start generating
    content.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 在发出此请求后，您将不再需要为每个文本提示包含那些两个修饰符。或者，如果您为一家有固定内容指南（关于组织的语气和声音）的品牌或公司工作，您可以在开始生成内容之前将那些指南复制粘贴到聊天中。
- en: Text Prompt
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: 'Please use the following tone and voice when generating outputs in this chat:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 请在这次聊天中生成输出时使用以下语气和声音：
- en: - **Use active voice, avoid passive voice**- **Avoid slang and jargon, write
    in plain English**- **Write positively, use positive language rather than negative
    language**
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: '-   **使用主动语态，避免被动语态**-   **避免俚语和行话，用普通英语写作**-   **积极表达，使用积极语言而不是消极语言**'
- en: Above is an example of Mailchimp’s writing style and guidelines that feed into
    all its online content as an email marketing service company.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 上文是Mailchimp的写作风格和指南示例，这些指南作为一家电子邮件营销服务公司，被用于其所有在线内容。
- en: While it’s possible to copy and paste internal content guidelines into ChatGPT,
    it’s worthwhile creating a custom prompt that clearly summarizes your content
    guidelines relevant to use with ChatGPT. This way, ChatGPT can better understand
    your content requirements and other team members can use the same prompt for each
    writing task.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然可以将内部内容指南复制粘贴到ChatGPT中，但创建一个明确总结与ChatGPT使用相关的您的内容指南的定制提示是值得的。这样，ChatGPT可以更好地理解您的内容要求，其他团队成员也可以为每个写作任务使用相同的提示。
- en: Alternatively, you can use ChatGPT to design writing style guidelines for your
    content based on your target audience, industry, and brand personality.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，您可以使用ChatGPT根据您的目标受众、行业和品牌个性为您的内容设计写作风格指南。
- en: Text Prompt
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: Please write content writing guidelines for a web3 company whose audience is
    web3 developers based predominately in the U.S., including tone and voice, spelling,
    and inclusive language. **The guidelines should be short and sweet because they
    will be used as a text prompt for working with ChatGPT.**
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 请为一家以美国为主的web3开发者为主要受众的web3公司撰写内容写作指南，包括语气和声音、拼写和包容性语言。**指南应简短明了，因为它们将被用作与ChatGPT一起工作的文本提示**。
- en: '![Text, letter  Description automatically generated](images/image-15.png)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![文本、字母描述自动生成](images/image-15.png)'
- en: As we can see in the screenshot, ChatGPT was able to generate writing guidelines
    based on this fictional company’s needs. Note that you will need to verify and
    potentially edit the guidelines before putting them into action!
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 如截图所示，ChatGPT能够根据这家虚构公司的需求生成写作指南。请注意，在付诸实施之前，您需要验证并可能编辑这些指南！
- en: As demonstrated in this section, there any many ways to craft a text prompt
    and using modifiers is one effective method to avoid generic outputs and inject
    a unique voice into your content.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 如本节所示，有许多方法可以构建文本提示，使用修饰符是避免通用输出并给内容注入独特声音的有效方法。
- en: Maybe I Don’t Want to Be Specific!
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 也许我不想具体说明！
- en: While this chapter has spoken to the benefits of precise prompt writing, and
    incorporating multiple modifiers, it is also perfectly acceptable to go in the
    opposite direction and let ChatGPT drive the interaction. Rather than crafting
    a highly detailed prompt, you can use a vaguely defined prompt, such as **Blog
    about the future of the world**, and see what direction ChatGPT follows. This
    technique can be useful when you’re still exploring content ideas and you aren’t
    sure what exactly you want to discuss.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然本章已经讨论了精确提示写作的好处以及结合多个修饰符，但也可以采取相反的方向，让ChatGPT驱动交互。与其构建一个高度详细的提示，您可以使用一个模糊定义的提示，例如**关于世界未来的博客**，看看ChatGPT会跟随什么方向。当您仍在探索内容想法并且不确定您确切想讨论什么时，这种技术非常有用。
- en: Likewise, you can use ChatGPT as an idea-generation tool by explaining your
    content goals and asking it for direct feedback.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，您可以将ChatGPT用作创意生成工具，通过解释您的内容目标并请求直接反馈。
- en: Text Prompt
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: I need to write a personal finance blog for Gen Z readers but I need help creating
    a structure and theme for this blog. Please generate 10 different paths I can
    take with this blog post.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要为Z世代读者写一个个人理财博客，但我需要帮助为这个博客创建结构和主题。请为这篇博客文章生成10种不同的路径。
- en: '![Image](images/image-16.png)'
  id: totrans-206
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-16.png)'
- en: As seen in this screenshot, you can leverage ChatGPT to generate ideas and supplement
    the writing process, rather than relying solely on the model to generate content
    in its final form.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 如此截图所示，你可以利用ChatGPT来生成想法并补充写作过程，而不是完全依赖模型生成最终形式的内容。
- en: Negative Prompting
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 负面提示
- en: Negative prompting is a technique used to guide the AI toward generating an
    output while explicitly avoiding undesired information, words, or perspectives.
    By specifying what not to include in the answer, you can achieve a more focused
    and relevant output.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 负面提示是一种引导AI生成输出同时明确避免不希望的信息、词汇或观点的技术。通过指定答案中不应包含的内容，你可以获得更专注和相关的输出。
- en: Negative prompting works by simply telling the model what not to include in
    its response using words such as **avoid**, **do not**, **excluding**, etc.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 负面提示通过简单地告诉模型不要包含某些内容来实现，可以使用诸如**避免**、**不要**、**排除**等词汇。
- en: Text Prompt
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: Write a personal finance blog for Gen Z readers but avoid mentioning obvious
    strategies such as reducing expenses or high-risk strategies.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 为千禧一代读者写一篇个人理财博客，但避免提及明显的策略，如减少开支或高风险策略。
- en: Text Prompt
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: Tell me about different types of renewable energy sources, excluding solar power.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 请告诉我关于不同类型的可再生能源，排除太阳能。
- en: Prompt Boundaries
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 提示边界
- en: When it comes to crafting your text prompt, it helps to define some boundaries
    for ChatGPT to operate in. For instance, there are many ways to ask ChatGPT to
    rewrite a sentence, such as optimize, reword, edit, etc. However, if you want
    ChatGPT to make only slight adjustments to the text and preserve your writing
    style, then you might want to use the prompt **optimize**. Conversely, using the
    prompt write something along the lines of will result in drastic changes to the
    composition of the text, as shown in the following example.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到制定你的文本提示时，为ChatGPT定义一些操作边界是有帮助的。例如，有多种方式要求ChatGPT重写句子，如优化、改写、编辑等。然而，如果你想ChatGPT只对文本进行轻微调整并保留你的写作风格，那么你可能想使用提示**优化**。相反，使用提示写一些类似的内容将会导致文本结构的剧烈变化，如下面的例子所示。
- en: Sample sentence
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 样本句子
- en: The name is Bond, James Bond.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 名字是邦德，詹姆斯·邦德。
- en: '![A black and white text  Description automatically generated](images/image-17.png)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![黑白文本  自动生成的描述](images/image-17.png)'
- en: Overriding
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 覆盖
- en: All AI-trained models come with their own personality or signature style. In
    the text-to-image space, AI software like DALLE-2 and Craiyon lean toward more
    abstract and surrealist designs, whereas Midjourney is better for generating realistic
    art and images.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 所有经过AI训练的模型都带有自己的个性和签名风格。在文本到图像的空间中，如DALLE-2和Craiyon这样的AI软件倾向于更抽象和超现实的设计，而Midjourney更适合生成逼真的艺术和图像。
- en: In the case of ChatGPT, the default model tends to be objective but verbose.
    In other words, ChatGPT does not have strong or subjective views on any topic,
    but it will also rarely give you a one-line answer. This style stems from biases
    in how the model was trained, with the developers favoring lengthier, measured,
    and more comprehensive-looking answers. This makes sense because this approach
    gives the model a higher chance of the model providing the user with something
    useful or relevant without being subjective.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 对于ChatGPT来说，默认模型往往客观但冗长。换句话说，ChatGPT对任何话题都没有强烈的或主观的观点，但它也很少会给出简短的回答。这种风格源于模型训练中的偏见，开发者更倾向于更长的、更谨慎的、看起来更全面的答案。这样做是有道理的，因为这种方法给模型提供了更高的机会，使其能够向用户提供有用或相关的信息，而不会带有主观性。
- en: While extended answers can be useful and they offer more potential information,
    interacting with ChatGPT over multiple messages can consume more time than needed.
    If you want to override or offset the default settings of the model, you can use
    negative prompting (i.e. **don’t give me a long response**) or add a direct command
    to keep responses short, using words such as **quickly summarize**, **answer in
    one line**, **limit your response to 100 words**, etc.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然长篇回答可能很有用并且提供更多信息，但通过多轮消息与ChatGPT交互可能会比所需的时间更长。如果你想覆盖或抵消模型的默认设置，你可以使用负面提示（即**不要给我长回答**）或添加直接命令以保持回答简短，使用诸如**快速总结**、**一句话回答**、**限制你的回答在100个单词以内**等词汇。
- en: Text Prompt
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示
- en: Quickly tell me how many calories are in a banana
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 快速告诉我香蕉里有多少卡路里
- en: '![Graphical user interface, text, application, email  Description automatically
    generated](images/image-18.png)'
  id: totrans-226
  prefs: []
  type: TYPE_IMG
  zh: '![图形用户界面，文本，应用程序，电子邮件  自动生成的描述](images/image-18.png)'
- en: Another way to override the default settings is to dictate the format of the
    output. Rather than outputting information organized into bullet points, which
    is common, you can use negative prompting to stop ChatGPT from using this style,
    which could be useful for authors, for example.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种覆盖默认设置的方法是指定输出格式。而不是以常见的项目符号形式组织信息输出，你可以使用负提示来阻止ChatGPT使用这种风格，这对于作者来说可能很有用。
- en: Text Prompt
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 文本提示词
- en: Write a book chapter about ____ in the style of ____ without using bullet points
    to organize information.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 用____的风格写一本书的章节，不要使用项目符号来组织信息。
- en: '|  | 5 |'
  id: totrans-230
  prefs: []
  type: TYPE_TB
  zh: '|  | 5 |'
- en: PROMPTS FOR COMMON USE CASES
  id: totrans-231
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**常见用例提示词**'
- en: Whether you’re a content creator, a developer, or an all-rounded knowledge worker,
    text prompts can help you generate ideas, streamline your workflow, and improve
    the overall quality of your work. In this chapter, we will explore some common
    cases where text prompts can be used to enhance or replace manual tasks, including
    fiction writing, coding, summarizing text, and more.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是内容创作者、开发者还是全能型知识工作者，文本提示词可以帮助你产生想法、简化工作流程，并提高你工作的整体质量。在本章中，我们将探讨一些常见的案例，其中文本提示词可以用来增强或替代手动任务，包括小说写作、编码、总结文本等。
- en: Keep in mind that several of the sample prompts provided in this book are context-specific,
    which means that you need to provide ChatGPT with source text or examples in order
    for these prompts to be effective.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，本书中提供的几个示例提示词是特定上下文的，这意味着你需要向ChatGPT提供源文本或示例，以便这些提示词才能有效。
- en: Calculate
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 计算
- en: Unlike traditional calculators or spreadsheet cells that force you to clean
    up data before formulas can be applied, you can conveniently drop text into ChatGPT
    and ask it to perform various calculations. For instance, you can copy and paste
    in a table of last month’s credit card expenses and tell ChatGPT to convert all
    the expenses from Euro into USD by using the conversion rate of say 1.10 and then
    sum your total expenses in USD. (Note that ChatGPT won’t be aware of the current
    exchange rate). This saves you time formatting the data and also allows you to
    ask questions about the data, such as **What was my average daily expenses?**
    You can even ask ChatGPT to give you the code to plot your expenses as a bar chart
    and then paste that code into a code editor.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 与传统的计算器或电子表格单元格不同，你必须先清理数据才能应用公式，你可以在ChatGPT中方便地输入文本，并要求它执行各种计算。例如，你可以复制并粘贴上个月信用卡费用的表格，并告诉ChatGPT使用例如1.10的汇率将所有费用从欧元转换为美元，然后计算你的总费用（注意，ChatGPT不会知道当前的汇率）。这节省了你格式化数据的时间，也允许你询问有关数据的问题，例如**我的平均每日费用是多少？**你甚至可以要求ChatGPT给你生成条形图的代码，然后将该代码粘贴到代码编辑器中。
- en: In addition, you can use text to request calculations such as **How much money
    will I earn with 5% annual interest on $1,000 in a savings account with a daily
    interest calculation?**
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，你可以使用文本来请求计算，例如**在储蓄账户中，以5%的年利率和每日计息，1000美元将赚多少钱？**
- en: '**Text Prompts**'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示词**'
- en: Sum all the expenses above
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 计算上述所有费用
- en: What conclusions can you draw from the data above? Please look for any strong
    correlation between ___ and ___?
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从上述数据中得出什么结论？请寻找任何强相关性，例如____和____？
- en: What is 90 days after January 12, 2023?
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年1月12日之后的90天是什么时候？
- en: What calorie deficit do I need to lose 1 pound per week? My current weight is
    160 pounds, my age is 34, and my height is 5 foot 10.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 我每周需要多少卡路里赤字才能减掉1磅？我的当前体重是160磅，年龄是34岁，身高是5英尺10英寸。
- en: What is 160 pounds in kilograms?
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 160磅等于多少公斤？
- en: Cooking a Gourmet Meal
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 烹饪美食大餐
- en: Generate custom meal suggestions based on who’s coming to dinner and their food
    preferences, or according to what’s left in the fridge! You may want to add negative
    prompting to exclude dishes or ingredients that don’t agree with your taste palette,
    religion, or nutrition requirements.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 根据来参加晚宴的人和他们喜欢的食物，或者根据冰箱里剩下的食物，生成定制的餐点建议！你可能需要添加负提示来排除与你的口味、宗教或营养需求不符的菜肴或食材。
- en: '**Text Prompts**'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: '**文本提示词**'
- en: I want to impress my friends with a gourmet dinner. Can you provide a vegetarian
    recipe for an elegant three-course meal that includes appetizers, a main course,
    and a decadent dessert?
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 我想用一顿美食盛宴来给我的朋友们留下深刻印象。你能提供一个优雅的三道菜素食食谱，包括开胃菜、主菜和奢华的甜点吗？
- en: I'm hosting a dinner party for a special occasion and I want to create a memorable
    menu. Could you suggest some innovative and visually appealing dishes that will
    leave my guests impressed? No spicy food or pork please.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
- en: 'Using the following ingredients: ________________ What can I make as a quick
    and easy meal for two?'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
- en: Prepare 5 nutritious recipes for lunch and dinner meals that can be cooked in
    large batches and contain less than 600 calories per meal.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
- en: Content Optimization
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
- en: By providing suggestions for grammar, sentence structure, word choice, content
    optimization, and writing inspiration, ChatGPT can help you communicate more effectively
    and achieve your writing goals.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
- en: Below is a quick list of ways that you can use ChatGPT to enhance your writing.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
- en: '**Sentence Structure:** ChatGPT can help you improve the structure of your
    sentences. If your sentences are too long or difficult to read, ChatGPT can provide
    suggestions for breaking them up into smaller, more manageable sentences.'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
- en: '**Word Choice:** Choosing the right words is essential for effective communication.
    ChatGPT can help you find more effective ways to express your ideas by suggesting
    synonyms and other related words.'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
- en: '**Content Optimization:** In addition to improving the technical aspects of
    your writing, ChatGPT can help you optimize your content. By analyzing your writing,
    ChatGPT can suggest ways to make your message more clear and concise or directly
    rewrite your prose.'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
- en: '**Writing Inspiration:** If you''re feeling stuck or struggling to come up
    with ideas, ChatGPT can provide inspiration and help you brainstorm new ideas.
    Simply input a topic or keyword, and ChatGPT will provide suggestions for related
    topics and ideas.'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
- en: '**Text Prompts**'
