- en: The tools involved in AI-generated content are in a state of transformation,
    marked by rapid advancements. This section discusses the tools needed for AI-generated
    content, exploring its impact on various domains and reflecting on its future.
    Drawing from research insights and real-world examples, we examine the dynamic
    nature of AI-generated content.
  prefs: []
  type: TYPE_NORMAL
- en: However, it is essential to recognize the inherent complexity in forecasting
    the future of AI advances. The pace of innovation in AI often defies prediction,
    as breakthroughs can emerge unexpectedly, disrupting established paradigms. The
    multifaceted nature of AI, spanning natural language processing, computer vision,
    and other domains, further compounds this challenge. Moreover, the ethical and
    societal implications of AI progress add layers of uncertainty to the equation.
  prefs: []
  type: TYPE_NORMAL
- en: Despite these complexities, our aim is to provide a forward-looking perspective
    on the evolving landscape of AI-generated content. By examining current trends
    and anticipating potential trajectories, we hope to empower readers with the insights
    needed to navigate this dynamic field and harness its transformative potential
    for the benefit of various industries and society at large.
  prefs: []
  type: TYPE_NORMAL
- en: The Unfolding Revolution of AI-Generated Content
  prefs: []
  type: TYPE_NORMAL
- en: AI-generated content is becoming increasingly pervasive, infiltrating diverse
    sectors and reshaping the way we create, interact with, and consume information.
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 1: Creative Writing'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “As a poet, compose a haiku that captures the beauty of a cherry blossom
    in spring, Craft a three-line poem that evokes the ephemeral nature of nature’s
    artistry and the renewal of life with the changing seasons.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: In this example, the prompt assigns the AI the role of a poet and
    tasks it with composing a haiku, a traditional form of Japanese poetry. The goal
    is to create a three-line poem that beautifully encapsulates the essence of a
    cherry blossom in spring. The context emphasizes the haiku’s purpose: to convey
    the fleeting yet profound beauty of nature’s artistry and the cyclical renewal
    of life as the seasons change. This prompt guides the AI to generate a poetic
    masterpiece that paints a vivid picture of nature’s wonders.'
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 2: Content Generation'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “As a content creator, compose an informative article on sustainable
    agriculture practices. Write a well-researched article that highlights the importance
    of sustainable farming methods, their environmental benefits, and their potential
    to transform the future of agriculture.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: In this example, the prompt assigns the role of content creator to
    the AI and identifies the goal as composing an informative article. The context
    specifies that the article should focus on sustainable agriculture practices,
    emphasizing their significance, environmental advantages, and potential to revolutionize
    the agricultural industry. This well-constructed prompt guides the AI to generate
    a comprehensive and engaging article that educates readers on the topic of sustainable
    farming.'
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 3: Personalization'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “As a user experience designer, design a personalized news recommendation
    system. Develop an algorithm that assembles news articles by considering each
    user’s interests, browsing history, and preferences, enhancing their news consumption
    experience.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: In this example, the prompt assigns the role of a user experience
    designer to the AI and identifies the goal as designing a personalized news recommendation
    system. The context specifies that the focus should be on creating an algorithm
    that tailors news article recommendations to individual users, taking into account
    their interests, browsing history, and preferences. This well-constructed prompt
    guides the AI to develop a system that enhances the user’s news consumption experience
    by delivering content that aligns with their unique tastes and interests.'
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 4: Marketing and Advertising'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “As a marketing strategist, generate a series of engaging social media
    advertisements for a new line of eco-friendly products. Create visually appealing
    and persuasive ad content that highlights the products’ sustainability, quality,
    and their positive impact on the environment.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: In this example, the prompt assigns the role of a marketing strategist
    to the AI and identifies the goal as generating a series of engaging social media
    advertisements. The context specifies that the focus should be on creating visually
    appealing and persuasive ad content that showcases a new line of eco-friendly
    products. The ads should emphasize the products’ sustainability, quality, and
    the positive impact they have on the environment. This well-structured prompt
    guides the AI to craft advertisements that effectively communicate the product’s
    unique selling points to potential customers.'
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 5: Language Translation'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “As a language translator, translate a complex legal document from
    English to Spanish. Ensure accuracy, consistency, and adherence to legal terminology,
    providing a seamless and reliable translation for legal professionals.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: In this example, the prompt assigns the role of a language translator
    to the AI and identifies the goal as translating a complex legal document from
    English to Spanish. The context specifies that the focus should be on ensuring
    accuracy, consistency, and adherence to legal terminology, delivering a seamless
    and reliable translation service for legal professionals. This well-constructed
    prompt guides the AI to perform a high-quality translation, maintaining the document’s
    legal integrity and making it accessible to a Spanish-speaking audience.'
  prefs: []
  type: TYPE_NORMAL
- en: As AI continues to change how content is generated, the future holds promise
    and challenges alike. The ethical considerations surrounding AI-generated content,
    such as plagiarism and misinformation, necessitate vigilant monitoring. However,
    the potential for creative collaboration, personalized experiences, and streamlined
    content creation positions AI-generated content as a transformative force in our
    information-driven world.
  prefs: []
  type: TYPE_NORMAL
- en: 10.2 ADDRESSING BIAS AND FAIRNESS IN PROMPTS AND RESPONSES
  prefs: []
  type: TYPE_NORMAL
- en: As AI systems become increasingly intertwined with human interactions, addressing
    bias and ensuring fairness in prompts and responses is important. This section
    delves into the crucial issue of bias in AI-generated content, exploring the challenges
    it poses and the strategies to mitigate it. Drawing from research findings and
    real-world examples, we discuss bias mitigation in prompt engineering.
  prefs: []
  type: TYPE_NORMAL
- en: The Perils of Bias in AI-Generated Content
  prefs: []
  type: TYPE_NORMAL
- en: Bias in AI-generated content can perpetuate stereotypes, reinforce discrimination,
    and erode trust in AI systems. It is essential to recognize and rectify bias to
    ensure equitable and inclusive human-AI interactions.
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 1: Political Bias in Information Retrieval'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompts: “As an AI ethics analyst, develop a prompt template for generating
    neutral news summaries. Craft a standardized prompt format that ensures balanced
    and unbiased news summaries, free from political slant or editorial influence,
    thus promoting fair and accurate information retrieval.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: In this example, the prompt assigns the AI the role of an AI ethics
    analyst and identifies the goal as developing a prompt template. The context specifies
    that the focus should be on creating a standardized prompt format that guarantees
    balanced and unbiased news summaries. The aim is to ensure that the generated
    summaries are free from political slant or editorial influence, promoting fair
    and accurate information retrieval for users seeking news content. This prompt
    guides the AI to contribute to mitigating political bias in information retrieval
    systems.'
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 2: Racial and Ethnic Bias in Translation'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: As an AI translator, create a prompt framework for culturally sensitive
    translation. Develop a set of guidelines and prompt templates that prioritize
    culturally nuanced and respectful translations, ensuring that the AI translation
    system avoids perpetuating racial or ethnic bias.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: In this example, the prompt assigns the role of an AI translator
    to the AI and identifies the goal as creating a prompt framework. The context
    specifies that the focus should be on developing guidelines and prompt templates
    that prioritize culturally sensitive translations. The aim is to ensure that the
    AI translation system avoids perpetuating racial or ethnic bias in its translations.
    This well-constructed prompt guides the AI to contribute to fair and respectful
    cross-cultural communication by addressing bias in translation outputs.'
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 3: Bias Amplification in Content Generation'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “As a content curator, design prompts that prevent bias amplification.
    Create a series of prompt templates that promote balanced, inclusive, and unbiased
    content generation, ensuring that the AI system does not inadvertently magnify
    or perpetuate existing biases in its responses.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: In this example, the prompt assigns the AI the role of a content
    curator and identifies the goal as designing prompts to prevent bias amplification.
    The context specifies that the focus should be on creating a series of prompt
    templates that prioritize balanced, inclusive, and unbiased content generation.
    The aim is to ensure that the AI system does not inadvertently magnify or perpetuate
    existing biases in its responses. This prompt guides the AI to contribute to content
    generation that promotes fairness and inclusivity while minimizing the risk of
    bias amplification.'
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 4: Bias Detection and Redirection'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “As an AI bias analyst, create prompts for bias detection and redirection.
    Develop a set of prompt templates that empower the AI system to identify biased
    content in responses and provide corrections or alternative perspectives to ensure
    a fair and unbiased exchange of information.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: In this example, the prompt assigns the role of an AI bias analyst
    to the AI and identifies the goal as creating prompts for bias detection and redirection.
    The context specifies that the focus should be on developing prompt templates
    that enable the AI system to identify biased content in its responses and take
    corrective actions, such as providing corrections or alternative perspectives.
    The aim is to ensure a fair and unbiased exchange of information, mitigating the
    impact of bias in AI-generated content. This prompt guides the AI to contribute
    to the detection and redirection of biased content for more balanced and inclusive
    communication.'
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 5: Bias-Responsive Systems'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “As an AI system developer, construct prompts for building bias-responsive
    systems. Develop a set of prompt templates that allow the AI system to adapt and
    respond to feedback on bias, fostering continuous improvement and ensuring that
    the system actively addresses and mitigates bias in its outputs.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: In this example, the prompt assigns the role of an AI system developer
    to the AI and identifies the goal as constructing prompts for building bias-responsive
    systems. The context specifies that the focus should be on creating prompt templates
    that enable the AI system to adapt and respond to feedback related to bias. These
    prompts foster a continuous improvement process, ensuring that the AI system actively
    addresses and mitigates bias in its outputs. This prompt guides the AI to contribute
    to the development of AI systems that are responsive to bias concerns and committed
    to fairness and equity.'
  prefs: []
  type: TYPE_NORMAL
- en: 10.3 ETHICAL CONSIDERATIONS FOR PROMPT ENGINEERING
  prefs: []
  type: TYPE_NORMAL
- en: As prompt engineering plays a pivotal role in shaping AI interactions, ethical
    considerations are paramount. This section discusses the ethical dimensions of
    prompt engineering, exploring the responsibilities of AI developers and users
    in ensuring responsible AI usage. Drawing from ethical frameworks and real-world
    examples, we identify the complex ethics involved in prompt engineering.
  prefs: []
  type: TYPE_NORMAL
- en: Ethical Imperatives in Prompt Engineering
  prefs: []
  type: TYPE_NORMAL
- en: Prompt engineering carries ethical implications that extend beyond bias mitigation,
    encompassing broader considerations such as privacy, transparency, and accountability.
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 1: Privacy and Data Handling'
  prefs: []
  type: TYPE_NORMAL
- en: Prompts Involving Sensitive Information
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: Prompts that request or involve sensitive user data, such as medical
    history or personal identifiers, raise privacy concerns. If not handled with care,
    such prompts can lead to privacy violations and data misuse.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Ethical Consideration 1: Informed Consent'
  prefs: []
  type: TYPE_NORMAL
- en: Respect user privacy by obtaining informed consent for collecting and using
    sensitive data in prompts, ensuring compliance with data protection regulations.
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 2: Transparency and Ability to Explain'
  prefs: []
  type: TYPE_NORMAL
- en: Opaque Prompts Leading to Confusion
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: Prompts that lack clarity or context can confuse users, leading to
    unexpected AI responses. Without transparency in prompt engineering, users may
    not understand how AI-generated content is generated.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Ethical Consideration 2: Transparent Prompts'
  prefs: []
  type: TYPE_NORMAL
- en: Ensure prompts are transparent and provide users with a clear understanding
    of the AI’s capabilities and limitations to manage user expectations effectively.
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 3: Accountability in Content Generation'
  prefs: []
  type: TYPE_NORMAL
- en: Inappropriate Prompts and Content
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: Irresponsible prompts that incite harmful or inappropriate content
    generation can result in unethical AI usage. For instance, prompts that encourage
    hate speech or misinformation propagate harmful behaviors.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Ethical Consideration 3: Ethical Guidelines'
  prefs: []
  type: TYPE_NORMAL
- en: Adhere to ethical guidelines that explicitly prohibit the use of AI for harmful
    or unethical purposes and establish mechanisms for accountability in prompt creation.
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 4: Inclusivity and Accessibility'
  prefs: []
  type: TYPE_NORMAL
- en: Exclusionary Prompts
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: Prompts that inadvertently exclude certain groups or communities
    can perpetuate discrimination. For example, prompts that assume a specific cultural
    context may alienate users from different backgrounds.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Ethical Consideration 4: Inclusive Language'
  prefs: []
  type: TYPE_NORMAL
- en: Use inclusive language in prompts to ensure that AI-generated content is accessible
    and respectful of diverse audiences and cultures.
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE 5: Algorithmic Fairness'
  prefs: []
  type: TYPE_NORMAL
- en: Biased Prompts and Responses
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: Prompts that carry inherent biases can lead to prejudiced AI responses.
    Ethical concerns arise when prompt engineering perpetuates systemic preconceptions
    and discrimination.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Ethical Consideration 5: Bias Mitigation'
  prefs: []
  type: TYPE_NORMAL
- en: Implement robust bias mitigation strategies in prompt engineering to ensure
    fair and equitable AI interactions.
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, responsible AI usage in prompt engineering is underpinned by
    a commitment to privacy, transparency, accountability, inclusivity, and fairness.
    Ethical considerations must permeate every aspect of prompt engineering, from
    the design of prompts to the deployment of AI systems. By adhering to ethical
    guidelines, respecting user privacy, ensuring transparency, fostering inclusivity,
    and mitigating bias, AI developers and users can contribute to the responsible
    and ethical evolution of AI systems.
  prefs: []
  type: TYPE_NORMAL
- en: CHAPTER 11
  prefs: []
  type: TYPE_NORMAL
- en: GPTS AND GPT APPLICATION
  prefs: []
  type: TYPE_NORMAL
- en: BUILDER
  prefs: []
  type: TYPE_NORMAL
- en: In November 2023, OpenAI introduced a new tool for building customized GPT models
    or GPTs (openai.com), a significant advancement in the field of artificial intelligence
    and natural language processing. In this chapter, we examine this ground-breaking
    development. This chapter is designed to guide both novice and experienced users
    through the versatile capabilities of the GPTS framework and the GPT Builder tool.
  prefs: []
  type: TYPE_NORMAL
- en: 11.1 NEW FEATURES ANNOUNCED WITH GPTS
  prefs: []
  type: TYPE_NORMAL
- en: We shift our focus to the API-GPT Builder, an intuitive interface that empowers
    developers to create bespoke GPT models. This section goes through the step-by-step
    process of model creation, from defining parameters and training datasets to fine-tuning
    models for specific tasks or industry requirements. Practical examples and case
    studies are provided to illustrate how customized models can significantly enhance
    performance in tasks such as content generation, data analysis, and customer service
    automation.
  prefs: []
  type: TYPE_NORMAL
- en: The information included here can serve as a vital resource for those looking
    to utilize the full potential of OpenAI’s latest contributions to artificial intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: 11.2 HOW TO BUILD GPTS
  prefs: []
  type: TYPE_NORMAL
- en: The following steps guide users to build a GPT app. For this purpose, a paid
    subscription to GPT-4 is necessary.
  prefs: []
  type: TYPE_NORMAL
- en: 1. Sign in to GPT, and from the sidebar, select and click on “Explore,” as shown
    in [Figure 11.1](#fig11-1).
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/Fig_11_1.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.1 “Explore” icon in the ChatGPT-4 sidebar.
  prefs: []
  type: TYPE_NORMAL
- en: 2. In the main window, “MY GPTs” shows up with the “Create a GPT” tool, as shown
    in [Figure 11.2](#fig11-2).
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/Fig_11_2.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.2 Create a GPT icon in ChatGPT-4.
  prefs: []
  type: TYPE_NORMAL
- en: Underneath, any GPTs previously built by the user and those made by OpenAI are
    also listed.
  prefs: []
  type: TYPE_NORMAL
- en: 3. Hover over the “Create a GPT” icon and click. A new window will show up,
    as shown in [Figure 11.3](#fig11-3).
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/Fig_11_3.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.3 Window showing the interface for building GPTs.
  prefs: []
  type: TYPE_NORMAL
- en: Read the information provided in this window. There are two ways to go forward
    from this point, 1) a quick way by using the “Create” option and start typing
    in the “Message GPT Builder…” area or 2) a longer way by using the “Configure”
    tool/button. The former functions as a wizard, guiding users in constructing their
    GPT app through an interactive conversation. To initiate this feature, type in
    a short description of what you want to build in the “Message GPT Builder…” space
    area.
  prefs: []
  type: TYPE_NORMAL
- en: It is also sometimes feasible to combine both options and go back and forth
    between “Create” and “Configure” selections. We continue with using the “Configure”
    option.
  prefs: []
  type: TYPE_NORMAL
- en: '4. Click on the “Configure” button. A new window appears, as shown in [Figure
    11.4](#fig11-4). This window has two main areas: the “GPT Builder” and the “Preview.”
    Fill in the space areas provided under “Name,” “Description,” and “Instructions.”
    The remaining are optional features to use. By clicking on the “+” icon, users
    can upload a photo or use DALL-E to create a profile picture or logo.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/Fig_11_4.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.4 Configuring the icon and the related window in ChatGPT-4.
  prefs: []
  type: TYPE_NORMAL
- en: 5. Click on the “Create” button and provide the information required for your
    GPT in the space provided.
  prefs: []
  type: TYPE_NORMAL
- en: '6. When complete, click on the “Save” button. There are three options for saving
    a GPT app: “Only me,” “Anyone with a link,” and “Public.” The latter could be
    used if users want to list their app in the GPT Store.'
  prefs: []
  type: TYPE_NORMAL
- en: 'More instructions, how-to information, and guides for building GPTs can be
    found through the following URLs (as of December 2023):'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://help.openai.com/en/articles/8554397-creating-a-gpt](https://help.openai.com/en/articles/8554397-creating-a-gpt)
    [https://youtu.be/5--JexprHuk](https://youtu.be/5--JexprHuk) [https://www.youtube.com/watch?v=R3X6rk1bWF0](https://www.youtube.com/watch?v=R3X6rk1bWF0)'
  prefs: []
  type: TYPE_NORMAL
- en: LinkedIn Learning provides some courses on this topic, available to their subscribed
    users.
  prefs: []
  type: TYPE_NORMAL
- en: 11.3 EXAMPLE 1- A GPT APP FOR COLORING PAGES
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we build a GPT app called “Color Muse” for creating adult coloring
    pages. A screen-capture video available through the companion Web site demonstrates
    how to build this app along with some results. To re-create this app, a subscription
    to GPT-4 is required.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/Fig_11_5.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.5 App logo for Color Muse.
  prefs: []
  type: TYPE_NORMAL
- en: 'When building this App, you can use the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Name: Coloring Muse'
  prefs: []
  type: TYPE_NORMAL
- en: 'Description: Creative assistant for adult coloring designs'
  prefs: []
  type: TYPE_NORMAL
- en: 'Instructions: Color Muse is tailored to assist with creating coloring pictures
    focused exclusively on cars, buildings, and natural scenes. It will reject requests
    unrelated to these themes, ensuring specialized experience. Color Muse will offer
    a variety of car models, buildings, and natural landscapes, providing artistic
    guidance on intricacy and style. It will also suggest color palettes that complement
    these specific scenes, ensuring the final artwork is harmonious and appealing.
    The interaction will be professional, engaging, and tailored to adult preferences
    in coloring, emphasizing relaxation and creativity within the theme bounds. For
    each picture that you create, provide some suggestion for the colors suitable
    to the picture built.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Conversation starters:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/bull.jpg) Suggest a mandala design'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/bull.jpg) Create a cityscape theme'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/bull.jpg) Help me choose colors for a nature scene'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/bull.jpg) Create a coloring page of a classic car'
  prefs: []
  type: TYPE_NORMAL
- en: 'Capabilities: check-in the boxes for Web Browsing and DALL.E Image Generation
    items.'
  prefs: []
  type: TYPE_NORMAL
- en: Note that the instructions given to the GPT for this app restrict it to creating
    images of buildings, cars, and nature. Any other types of requests will be rejected.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, after building this app, we can use it. For example, enter the following
    prompt in the message area space:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “Create a coloring page for an image of a classic car on a road with
    spring scene in the background.”'
  prefs: []
  type: TYPE_NORMAL
- en: After a few minutes, a picture appears ([Figure 11.6](#fig11-6)). You can save
    or print this picture and start coloring it.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/Fig_11_6.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.6 The first coloring page generated by the app.
  prefs: []
  type: TYPE_NORMAL
- en: As another application example, let’s try the following prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “Create a modern car parked in front of a historical building.”'
  prefs: []
  type: TYPE_NORMAL
- en: After a few minutes, the picture shown in [Figure 11.7](#fig11-7) appears. You
    can save or print this picture and start coloring it.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/Fig_11_7.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.7 The second coloring page generated by the app.
  prefs: []
  type: TYPE_NORMAL
- en: 11.4 EXAMPLE 2- A GPT APP FOR STORY WRITERS
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we build a GPT app called “Tale Spinner” for assisting story
    writers creating stories. A screen-capture video available through the companion
    Web site demonstrates how to build this app along with some results. To re-create
    this app, a subscription to GPT-4 is required.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/Fig_11_8.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.8 App logo for Tale Spinner.
  prefs: []
  type: TYPE_NORMAL
- en: 'When building this App, you can use the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Name: Tale Spinner'
  prefs: []
  type: TYPE_NORMAL
- en: 'Description: A Creative Storyteller'
  prefs: []
  type: TYPE_NORMAL
- en: 'Instructions: Tale Spinner will maintain a formal yet engaging and friendly
    tone, offering suggestions and feedback in a manner that is respectful and encouraging.
    It will personalize its interactions to align with the user’s narrative style
    and preferences, providing a supportive and constructive environment for storytelling.
    Its dialogue will be characterized by professionalism and warmth, aiming to inspire
    and facilitate the creative process of each user.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Conversation starters:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/bull.jpg) Start a tale about a lost city'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/bull.jpg) Expand on the character’s dilemma'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/bull.jpg) Suggest a twist for the story'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/bull.jpg) How should it end?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Capabilities: check-in the boxes for Web Browsing item.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, after building this app, we can use it. For example, enter the following
    prompt in the message space area:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “Once upon a time, there was a baby fox in the woods during the winter...”'
  prefs: []
  type: TYPE_NORMAL
- en: After a few minutes a story, as shown below, appears. You can save, print this
    story, or prompt the Tale Spinner to modify it as you like.
  prefs: []
  type: TYPE_NORMAL
- en: “Once upon a time, in the heart of a vast and whispering forest, as winter unfurled
    its white blanket over the land, there was a baby fox. This little fox, with fur
    as red as the setting sun, found itself alone amid the sprawling tapestry of snow
    and ice. The forest, usually a symphony of sounds and life, was now quiet, save
    for the gentle rustling of the pine trees swaying in the cold breeze.
  prefs: []
  type: TYPE_NORMAL
- en: Despite the starkness of the season, the baby fox was not afraid. It was born
    of the wild, with a heart full of curiosity and eyes that sparkled with the promise
    of adventure. Each day, it ventured a little further from its den, paw prints
    painting stories in the snow, learning the secrets of the winter woods.
  prefs: []
  type: TYPE_NORMAL
- en: The baby fox discovered the tracks of other animals—a dance of life on the white
    canvas of the forest floor. It learned to listen for the whisper of wings above,
    signaling the presence of birds, and to watch for the shadows that moved just
    beyond sight, hinting at the presence of fellow forest dwellers.
  prefs: []
  type: TYPE_NORMAL
- en: As the days passed, the baby fox grew stronger and more confident. It learned
    the art of silence, moving like a shadow among the trees, and the joy of play,
    tumbling in the snow and chasing its own tail in circles.
  prefs: []
  type: TYPE_NORMAL
- en: But winter in the forest is not just a time of beauty and play; it is a season
    of survival. The baby fox learned to forage for food, nibbling on frozen berries
    and digging for roots beneath the snow. It encountered challenges too, like bitter
    cold nights and the scarcity of food, but with each challenge, it grew wiser and
    more resilient.
  prefs: []
  type: TYPE_NORMAL
- en: One day, as the sun began to linger a little longer in the sky, signaling the
    approach of spring, the baby fox came upon a clearing where the snow had begun
    to melt, revealing the tender shoots of new life. There, in the middle of the
    clearing, stood a majestic deer, its breath visible in the cold air, a symbol
    of the forest’s enduring strength and grace.
  prefs: []
  type: TYPE_NORMAL
- en: The deer looked at the baby fox with gentle eyes, and in that moment, an unspoken
    understanding passed between them. The fox realized it was no longer just a baby;
    it had grown, learned, and survived the winter. It was now a creature of the forest,
    wise and free.
  prefs: []
  type: TYPE_NORMAL
- en: As spring unfurled its green fingers through the land, the fox took its place
    within the tapestry of the forest, a small but vital thread in the ever-unfolding
    story of the wild. And so, the cycle continued, with the forest nurturing and
    challenging all who call it home, each season bringing new stories of life, survival,
    and growth. Thus concludes our tale of the baby fox in the winter woods, a story
    of adventure, learning, and the enduring beauty of the natural world.”
  prefs: []
  type: TYPE_NORMAL
- en: 11.5 WINDING DOWN THE CHATGPT PLUGINS
  prefs: []
  type: TYPE_NORMAL
- en: Recently, OpenAI announced a transition from plugins to API, a change set to
    commence on March 19, 2024, and become fully effective for existing conversations
    utilizing plugins by April 9, 2024\. As a result, users are encouraged to adopt
    GPT apps, with many prominent plugin developers pivoting to create GPT-centric
