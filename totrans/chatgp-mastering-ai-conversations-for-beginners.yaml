  prefs: []
  type: TYPE_NORMAL
  zh: 我们在本章中已经提到过一次或两次**OpenAI**这个名字。**OpenAI**的使命宣言是创建“安全且友好的AI，能够造福人类”，因此**OpenAI**自八年前在旧金山成立以来已经取得了长足的进步。为了开始讲述这家非盈利公司分享开源产品的故事，让我们回到2015年，探究它为何首先在第一个地方成立，以及是由谁创立的。
