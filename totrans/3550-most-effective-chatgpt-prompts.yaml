  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供关于制作人们从邮件中访问的页面看起来很好并且与邮件内容相匹配的建议，以便他们更容易使用。
- en: Think about sending emails that are just right for each person by dividing them
    into groups and making each email special.
  id: totrans-448
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑通过将他们分成群体并使每封邮件都特别，发送适合每个人的电子邮件。
- en: Look at how to check and understand numbers from emails, like how many people
    open them or click on links, to see what's working and make things better using
    the data.
  id: totrans-449
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查看如何检查和理解邮件中的数据，例如有多少人打开它们或点击链接，以了解哪些内容有效并使用数据改进事物。
- en: Give ideas for making emails more interesting and letting people take part,
    like adding quizzes, polls, or surveys.
  id: totrans-450
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供使电子邮件更加有趣并让人们参与的建议，例如添加测验、民意调查或调查。
- en: Think about using tools or programs to help do tasks automatically, making it
    easier to manage and save time when sending out emails.
  id: totrans-451
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑使用工具或程序来自动执行任务，以便在发送邮件时更容易管理并节省时间。
- en: Discuss why it's important to make emails easy to use for everyone, including
    those who use screen readers or need better color contrast.
  id: totrans-452
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么让电子邮件对每个人来说都易于使用很重要，包括使用屏幕阅读器或需要更好的颜色对比的人。
- en: Give advice on making email titles that make people curious and want to open
    and read the email.
  id: totrans-453
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供关于制作能激发人们好奇心并希望打开和阅读的电子邮件标题的建议。
- en: Look at how to use personal details, like what someone bought or looked at online,
    to make emails more about what each person is interested in.
  id: totrans-454
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 研究如何使用个人细节，如某人在线购买或查看的内容，使电子邮件更多地关注每个人的兴趣。
- en: Discuss how using ads on social media along with emails can make more people
    see and respond to messages.
  id: totrans-455
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论如何在使用社交媒体广告的同时使用电子邮件，让更多人看到并回应消息。
- en: Give ideas on splitting customers into groups based on things like age or what
    they bought, so emails can be more about what each group likes.
  id: totrans-456
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供根据年龄或他们购买的内容等将客户分成不同群体的想法，以便电子邮件更多地关注每个群体的喜好。
- en: Think about using numbers and data from emails to see what people like and do,
    and use that information to make future emails better.
  id: totrans-457
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑使用电子邮件中的数字和数据来了解人们喜欢什么和做什么，并使用这些信息来使未来的电子邮件更好。
- en: Discuss how telling people there's not much time to do something in emails,
    like a special offer that ends soon, can make more people buy things.
  id: totrans-458
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在电子邮件中告诉人们没有多少时间做某事，如即将结束的特殊优惠，如何让更多人购买商品。
- en: Give advice on making a series of emails to welcome new subscribers and help
    them get to know the brand.
  id: totrans-459
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供制作一系列欢迎新订阅者并帮助他们了解品牌的电子邮件的建议。
- en: Look at how to use personal details to suggest things people might like based
    on what they've looked at or bought before.
  id: totrans-460
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 研究如何使用个人细节来根据他们之前查看或购买的内容建议人们可能喜欢的事物。
- en: Discuss the role of writing a short bit of text before the main part of the
    email to give more information and make people want to open it.
  id: totrans-461
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在电子邮件的主要部分之前写一小段文字，以提供更多信息并让人们想要打开它的作用。
- en: Give ideas on making emails look good on phones by designing them to fit small
    screens.
  id: totrans-462
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供设计以适应小屏幕，使电子邮件在手机上看起来好的建议。
- en: Look at why it's a good idea to regularly clean up the list of people getting
    emails, like removing those who don't read them or fixing emails that bounce back.
  id: totrans-463
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 研究为什么定期清理接收电子邮件的人的名单，如删除不阅读它们的人或修复退回的电子邮件，是一个好主意。
- en: Discuss how putting buttons to share emails on social media or offering rewards
    for bringing in friends can make more people hear about a business.
  id: totrans-464
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论将按钮放置在社交媒体上分享电子邮件或在引入朋友时提供奖励，如何让更多人了解一家企业。
- en: Give tips on using automatic plans to help interested people through steps based
    on what they do or when they do it.
  id: totrans-465
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用自动计划来帮助感兴趣的人根据他们的行为或行为时间进行步骤的技巧。
- en: Explore the idea of suggesting things to buy in emails based on what someone
    bought or looked at before.
  id: totrans-466
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索根据某人之前购买或查看的内容在电子邮件中建议购买物的想法。
- en: Discuss why it's good to write titles for emails that make people feel like
    they need to do something right away or that they're part of something special.
  id: totrans-467
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么为电子邮件写标题，让人们感觉他们需要立即采取行动或感觉自己是某个特别事物的一部分是好的。
- en: Share ideas for trying out different things in emails, like how they look or
    where buttons are, to see what works best.
  id: totrans-468
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在电子邮件中分享尝试不同事物的想法，比如它们的外观或按钮的位置，以查看哪些效果最佳。
- en: Look at why it's good to tell stories in emails to make people feel something
    and want to keep hearing from a business.
  id: totrans-469
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 研究为什么在电子邮件中讲故事，让人们有所感触并希望继续从企业那里听到消息是好的。
- en: Discuss why it's good to show what other people say about a business or get
    famous people to say they like it in emails.
  id: totrans-470
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中展示其他人关于一家企业的评价或让名人说他们喜欢它是好的。
- en: Give advice on making sure emails get to people's inboxes by setting them up
    right and not using words that make them look like spam.
  id: totrans-471
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供确保通过正确设置并避免使它们看起来像垃圾邮件的词语，使电子邮件到达人们收件箱的建议。
- en: Explore the idea of saying hello in a friendly way or talking about something
    the person likes in emails to make them more interesting.
  id: totrans-472
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中以友好方式打招呼或谈论某人喜欢的事情，以使它们更有趣的想法。
- en: Discuss why it's good to look at numbers from emails, like how many people open
    them or click on links, to see how well the emails are doing.
  id: totrans-473
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么查看电子邮件中的数字，如有多少人打开它们或点击链接，以了解电子邮件表现如何是好的。
- en: Share ideas for making emails look interesting with good pictures and clear
    things for people to do.
  id: totrans-474
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用好图片和清晰指示来使电子邮件看起来有趣的点子。
- en: Explore the idea of dividing customers into groups and making emails that are
    just right for each group.
  id: totrans-475
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索将客户分为不同群体并制作适合每个群体的电子邮件的想法。
- en: Discuss how using automatic plans, like reminding people about things they left
    in an online cart or asking how their purchase was, can make more people buy things
    and stay interested.
  id: totrans-476
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论使用自动计划，如提醒人们关于他们在网上购物车中留下的东西或询问他们的购买情况，如何使更多人购买东西并保持兴趣。
- en: Give ideas on writing emails that tell people why a product or service is good,
    address their problems, and make them want to do something.
  id: totrans-477
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供撰写电子邮件的想法，告诉人们为什么某个产品或服务很好，解决他们的问题，并使他们想要采取行动。
- en: Talk about why it's important to regularly clean up the list of people getting
    emails and share ways to keep it updated.
  id: totrans-478
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么定期清理接收电子邮件的人的名单并分享保持其更新的方法很重要。
- en: Share advice on making email titles that make people curious and want to open
    the email.
  id: totrans-479
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享制作能激发人们好奇心并想要打开的电子邮件标题的建议。
- en: Explore the idea of suggesting things to buy in emails based on what someone
    likes or bought before to get them interested.
  id: totrans-480
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索根据某人喜欢或之前购买的东西在电子邮件中建议购买物品的想法，以激发他们的兴趣。
- en: Discuss why it's good to include things like what customers say or stories from
    them in emails to make people trust a business.
  id: totrans-481
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中包含客户所说的话或他们的故事，以使人们信任一家企业是件好事。
- en: Give strategies for making people who haven't read emails in a while interested
    again.
  id: totrans-482
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供策略，让那些很久没有阅读电子邮件的人再次产生兴趣。
- en: Explore how to use automatic plans to help people learn more and buy things.
  id: totrans-483
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索如何使用自动计划帮助人们学习更多并购买东西。
- en: Discuss why it's good to send emails that are just right for different groups
    of people with things they like.
  id: totrans-484
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么发送适合不同人群且包含他们喜欢的内容的电子邮件是件好事。
- en: Share tips on making sure emails look good and work well on all kinds of devices.
  id: totrans-485
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享确保电子邮件在各种设备上看起来好且运行良好的技巧。
- en: Look at how to use things like quizzes or surveys in emails to make people want
    to join in and share thoughts.
  id: totrans-486
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探讨如何在电子邮件中使用像测验或调查这样的东西，以使人们想要参与并分享想法。
- en: Discuss why it's good to connect emails with social media so people can follow
    and talk about a brand online.
  id: totrans-487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么将电子邮件与社交媒体连接起来，让人们可以在线关注和讨论一个品牌是件好事。
- en: Give strategies for making sure emails get to people's inboxes and are seen
    as trustworthy.
  id: totrans-488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供确保电子邮件到达人们的收件箱并被视为可信的策略。
- en: Explore the benefits of sending emails at the right time, like when someone
    leaves things in a shopping cart or on their birthday.
  id: totrans-489
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在适当的时间发送电子邮件的好处，比如当某人将东西留在购物车中或在他们生日时。
- en: Discuss how to tell interesting stories in emails to make people feel something
    and want to hear more.
  id: totrans-490
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论如何在电子邮件中讲述有趣的故事，以使人们产生某种感觉并想要了解更多。
- en: Share advice on making emails that work well on phones and tablets.
  id: totrans-491
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享关于制作在手机和平板电脑上都能良好运行的电子邮件的建议。
- en: Explore the idea of changing what's in emails based on what someone likes or
    bought before to make it more personal.
  id: totrans-492
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索根据某人喜欢或之前购买的东西更改电子邮件内容，使其更加个性化的想法。
- en: Discuss why it's good to include buttons to share emails on social media and
    get more people to see and talk about a brand.
  id: totrans-493
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中包含分享按钮，以便更多的人看到并讨论一个品牌是件好事。
- en: Give ideas for making forms where people can sign up for emails work better,
    so more people join and share useful information.
  id: totrans-494
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供制作人们可以注册电子邮件的表格的想法，以便更好地工作，让更多人加入并分享有用的信息。
- en: Talk about why it's a good idea to ask people for their thoughts through surveys
    or feedback requests to make emails better.
  id: totrans-495
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论通过调查或反馈请求让人们提出意见，以使电子邮件变得更好的好处。
- en: Discuss how using emotions in emails can make people feel more connected and
    do what the email asks.
  id: totrans-496
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在电子邮件中使用情感如何使人们感觉更亲近并按照电子邮件的要求行事。
- en: Share advice on making it easy for people to stop getting emails and hear what
    they think.
  id: totrans-497
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使人们容易停止接收电子邮件并听到他们看法的建议。
- en: Explore the idea of sending special emails for someone's birthday or anniversary
    to make them feel special and want to stay connected.
  id: totrans-498
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索为某人的生日或周年纪念日发送特别电子邮件的想法，使他们感到特别并想要保持联系。
- en: Discuss why it's good to include things like what customers say or stories from
    famous people in emails to make people trust a business more.
  id: totrans-499
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中包含客户所说的话或名人的故事，以使人们更加信任一家企业是件好事。
- en: Give strategies for making special offers in emails that make people want to
    buy things right away.
  id: totrans-500
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供在电子邮件中制作特别优惠的策略，让人们想立即购买东西。
- en: Explore the benefits of showing things in emails that change as time goes on,
    like a timer or updates on what's available, to make people act quickly.
  id: totrans-501
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在邮件中展示随时间变化的事物（如计时器或可用性更新）的好处，以促使人们迅速采取行动。
- en: Discuss why it's good to send emails that are just right for different groups
    of people based on what they do and how much they're interested.
  id: totrans-502
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么根据人们的行为和兴趣发送恰到好处的邮件对不同的群体来说是有益的。
- en: Share tips on making buttons in emails that tell people what to do in a clear
    and interesting way.
  id: totrans-503
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享在邮件中制作按钮的技巧，以清晰有趣的方式告诉人们该做什么。
- en: Explore the idea of making emails that match what different types of customers
    like or care about.
  id: totrans-504
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索制作符合不同类型客户喜好或关注点的邮件的想法。
- en: Discuss why it's good to mix emails with social media contests to get people
    interested and make the list of email subscribers grow.
  id: totrans-505
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么将邮件与社交媒体竞赛结合使用以吸引人们并使电子邮件订阅者名单增长是有益的。
- en: Share strategies for making the first part of an email give an idea of what's
    inside and make people want to open it.
  id: totrans-506
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使邮件的第一部分给人一个关于内容的想法并激发人们打开它的策略。
- en: Explore the benefits of making emails more personal with details like where
    someone lives or special things they might like.
  id: totrans-507
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索通过添加诸如某人居住地或他们可能喜欢的特别事物等细节，使邮件更加个性化的好处。
- en: Discuss why it's good to send emails that try to get people interested again
    if they haven't been reading them.
  id: totrans-508
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么如果人们没有阅读邮件，发送试图再次引起他们兴趣的邮件是有益的。
- en: Share advice on how often to send emails so people remember but don't get tired
    of them.
  id: totrans-509
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享关于多久发送一次邮件的建议，让人们记住但不会感到厌烦。
- en: Explore the idea of sending emails that give ideas based on what someone looked
    at or bought before.
  id: totrans-510
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探讨基于某人之前查看或购买的内容发送邮件的想法。
- en: Discuss why it's good to include things like what customers say or what's said
    about the business on social media in emails to make people trust a business more.
  id: totrans-511
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在邮件中包含诸如客户所说或社交媒体上关于企业的评论等事项，以使人们更加信任企业是有益的。
- en: Share strategies for sending emails that are just right for different groups
    of people based on what they like or who they are.
  id: totrans-512
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享根据人们喜欢或是谁他们发送恰到好处的邮件的策略。
- en: Learn about how using automatic plans for emails can make things like welcome
    emails or order confirmations happen without having to do them every time, saving
    a lot of time.
  id: totrans-513
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 了解如何使用自动计划发送邮件，可以使得欢迎邮件或订单确认等无需每次都手动操作，从而节省大量时间。
- en: Talk about how telling interesting stories in emails can make people feel a
    connection and want to do something.
  id: totrans-514
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在邮件中讲述有趣的故事可以让人感到联系并想要采取行动。
- en: Get advice on making emails easy to read with clear titles, lists, and short
    text.
  id: totrans-515
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获得关于如何使邮件易于阅读的建议，包括清晰的标题、列表和简短文本。
- en: Explore the idea of changing what's in emails based on what someone did before,
    like suggesting things they might like based on what they looked at or bought.
  id: totrans-516
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索根据某人之前的行为（如基于他们查看或购买的内容建议他们可能喜欢的事物）更改邮件内容的好处。
- en: Discuss why it's good to look at numbers from emails, like how many people opened
    them or clicked on links, to make emails better.
  id: totrans-517
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么查看邮件中的数据，如有多少人打开了它们或点击了链接，可以使邮件变得更好。
- en: Share ideas for using what customers do or buy to send emails that are just
    right for them, like special offers for anniversaries or asking how a recent purchase
    was.
  id: totrans-518
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用客户的行为或购买来发送适合他们的邮件的想法，如为周年纪念日提供特别优惠或询问最近购买的物品。
- en: Explore why it's good to send different emails to people at different times,
    like welcome emails for new customers or rewards for loyal customers.
  id: totrans-519
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索为什么在不同时间向不同的人发送不同的邮件（如为新客户发送欢迎邮件或为忠实客户发放奖励）是有益的。
- en: Discuss how using friendly and easy-to-understand words in emails can make them
    more interesting and relatable.
  id: totrans-520
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在邮件中使用友好且易于理解的词语可以使它们更加有趣和亲切。
- en: Share advice on making sure pictures in emails are the right size and have descriptions
    so everyone can see them.
  id: totrans-521
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享确保邮件中的图片大小合适并且有描述，以便每个人都能看到它们的建议。
- en: Explore the idea of using what customers say or think, like ratings or reviews,
    in emails to make people trust a business more.
  id: totrans-522
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探讨在邮件中使用客户说或想的内容，如评分或评论，以使人们更加信任企业的想法。
- en: Discuss why it's good to say things in emails that make people feel like they
    need to do something right away, like a special offer that ends soon.
  id: totrans-523
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在邮件中说一些让人感觉需要立即采取行动的事情是有益的，比如即将结束的特殊优惠。
- en: Share strategies for making a series of emails that give helpful information
    over time, like teaching people more about a product or service.
  id: totrans-524
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享制作一系列电子邮件的策略，这些电子邮件随着时间的推移提供有用的信息，例如教人们更多关于产品或服务的内容。
- en: Explore why it's good to use personal details, like what someone likes or the
    kind of things they want to know about, to make emails more interesting.
  id: totrans-525
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索为什么使用个人细节（如某人喜欢什么或他们想了解的事物类型）使电子邮件更有趣是件好事。
- en: Discuss how automatic plans for emails can send special emails when someone
    does something important, like reaching a certain amount of purchases.
  id: totrans-526
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论如何通过电子邮件的自动计划在某人做重要事情时发送特殊电子邮件，例如达到一定数量的购买。
- en: Share tips on trying out different things in emails, like titles, buttons, or
    how they look, to see what works best.
  id: totrans-527
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享在电子邮件中尝试不同事物（如标题、按钮或外观）的技巧，以查看哪些效果最佳。
- en: Discuss why it's important to split customers into groups and send them emails
    that are just right for what they like or care about.
  id: totrans-528
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么将客户分成不同的群体并发送适合他们喜欢或关心的事情的电子邮件很重要。
- en: Give advice on making welcome emails that make people feel good and start a
    good connection with a brand.
  id: totrans-529
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供制作让人感觉良好并开始与品牌建立良好联系的欢迎电子邮件的建议。
- en: Explore the idea of sending special emails when someone leaves things in a shopping
    cart or looks at things online to get them interested.
  id: totrans-530
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索当某人在购物车中留下东西或在线查看东西时发送特殊电子邮件的想法，以引起他们的兴趣。
- en: Discuss why it's good to connect emails with social media so people can talk
    about a brand in different places.
  id: totrans-531
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么将电子邮件与社交媒体连接起来，让人们可以在不同的地方谈论品牌是件好事。
- en: Share ideas for making emails easy to read, like picking the right letters,
    putting space between lines, and using empty space well.
  id: totrans-532
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使电子邮件易于阅读的想法，例如选择合适的字体、在行间留出空间以及充分利用空白空间。
- en: Explore why telling interesting stories in emails can make people interested
    and feel something.
  id: totrans-533
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中讲述有趣的故事可以引起人们的兴趣并让他们有所感触的原因。
- en: Discuss why it's good to include things like what customers say or write about
    a brand in emails to make people trust it more.
  id: totrans-534
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中包含客户对品牌说的话或写的关于品牌的内容，可以让人更加信任它。
- en: Share tips on making sure emails work well for everyone, like describing pictures
    and making sure they can be read out loud.
  id: totrans-535
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享确保电子邮件对每个人都能有效工作的技巧，例如描述图片并确保它们可以大声朗读。
- en: Explore the idea of sending special emails when someone buys something to suggest
    more things they might like.
  id: totrans-536
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索当某人购买东西时发送特殊电子邮件以建议他们可能喜欢的东西的想法。
- en: Discuss why it's good to use someone's name and suggest things based on what
    they like or did before in emails.
  id: totrans-537
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中使用某人的名字并根据他们喜欢或之前做过的事情提出建议是件好事。
- en: Share ideas for writing emails that grab attention, tell people why something
    is good, and make them want to do something.
  id: totrans-538
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享撰写吸引注意、告诉人们为什么某物好并使他们想要采取行动的电子邮件的想法。
- en: Explore the benefits of showing things in emails that change as time goes on,
    like real-time updates or suggesting things based on what someone likes.
  id: totrans-539
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中展示随时间变化的事物（如实时更新或根据某人喜欢的东西提出建议）的益处。
- en: Discuss why it's good to include buttons in emails that make it easy for people
    to share things on social media.
  id: totrans-540
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中包含使人们能够轻松在社交媒体上分享内容的按钮是件好事。
- en: Share tips for making sure emails get to people's inboxes by following important
    rules and being seen as trustworthy.
  id: totrans-541
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享确保电子邮件通过遵循重要规则并被视为值得信赖，从而进入人们的收件箱的技巧。
- en: Explore the idea of sending special emails to get people interested again if
    they haven't been reading them.
  id: totrans-542
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索如果人们没有阅读它们，发送特殊电子邮件以重新引起人们兴趣的想法。
- en: Discuss why it's good to send different emails to different people based on
    who they are or what they like.
  id: totrans-543
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么根据他们的身份或喜好向不同的人发送不同的电子邮件是件好事。
- en: Share strategies for using automatic plans to help people learn more and buy
    things.
  id: totrans-544
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用自动计划帮助人们了解更多和购买东西的策略。
- en: Explore the benefits of asking people for their thoughts in emails to make things
    better and improve how emails work.
  id: totrans-545
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中询问人们的想法以改进事物和提高电子邮件工作方式的益处。
- en: Discuss the impact of using smiley faces or other small pictures in email titles
    and text to make them more interesting and get people involved.
  id: totrans-546
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在电子邮件标题和文本中使用笑脸或其他小图片以使其更有趣并吸引人们参与的影響。
- en: Give ideas on when to send emails to make the most impact and have more people
    open them.
  id: totrans-547
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供关于何时发送电子邮件以产生最大影响和让更多人打开它们的想法。
- en: Explore the idea of sending special emails to remind people of why they like
    a brand and why staying connected is good.
  id: totrans-548
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索发送特殊电子邮件提醒人们为什么喜欢某个品牌以及保持联系的好处。
- en: Discuss why it's good to say things like "limited time" or "almost sold out"
    in emails to make people want to buy things.
  id: totrans-549
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中说“限时”或“即将售罄”等话术以激发人们购买是好事。
- en: Share ideas for trying out different things in emails, like how they look or
    what they say, to see what people like best.
  id: totrans-550
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享一些在电子邮件中尝试不同事物的想法，比如它们的外观或内容，以了解人们最喜欢什么。
- en: Explore the benefits of suggesting things to buy in emails based on what someone
    looked at or bought before to get them interested.
  id: totrans-551
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索基于某人之前查看或购买的内容在电子邮件中建议购买事项的好处，以激发他们的兴趣。
- en: Discuss why it's good to send special emails when someone buys something to
    give important information and make them trust a brand more.
  id: totrans-552
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在某人购买某物时发送特殊电子邮件以提供重要信息并增加他们对品牌的信任感是好事。
- en: Share advice on making it easy for people to stop getting emails and offer other
    options, like getting emails less often.
  id: totrans-553
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享一些让人们在想要停止接收电子邮件时更容易操作，并提供其他选项，如减少接收频率的建议。
- en: Explore the idea of sending special emails to people who haven't been interested
    in a brand for a while.
  id: totrans-554
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索向一段时间内对某个品牌不感兴趣的人发送特殊电子邮件的想法。
- en: Discuss why it's important to look at numbers from emails, like how many people
    open them or click on links, to make emails better.
  id: totrans-555
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么查看电子邮件中的数据，如打开人数或点击链接的人数，对于改进电子邮件很重要。
- en: Share ideas for making titles in emails that stand out and make people want
    to open them.
  id: totrans-556
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享一些在电子邮件中制作引人注目且能激发人们打开它们的标题的技巧。
- en: Explore the benefits of saying more personal things in emails, like what someone
    bought before or where they live.
  id: totrans-557
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中说更多个性化事情的好处，比如某人之前购买过什么或他们住在哪里。
- en: Discuss why it's good to have programs that reward and keep good customers in
    email marketing.
  id: totrans-558
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件营销中拥有奖励和保持优质客户的程序是好事。
- en: Share tips for asking people what they think in emails to make things better
    in the future.
  id: totrans-559
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享一些在电子邮件中询问人们看法的技巧，以使未来事物变得更好。
- en: Explore the idea of sending special emails to remind people to buy things they
    use up regularly.
  id: totrans-560
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索发送特殊电子邮件提醒人们购买他们经常使用的东西的想法。
- en: Discuss why it's good to have contests or giveaways in emails to get more people
    interested and talking about a brand.
  id: totrans-561
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中举办竞赛或抽奖活动以吸引更多人感兴趣并讨论品牌是好事。
- en: Share strategies for making buttons in emails that tell people what to do in
    a clear and interesting way.
  id: totrans-562
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享制作电子邮件中按钮的策略，以清晰有趣的方式告诉人们该做什么。
- en: Explore the benefits of sending special emails when someone leaves things in
    an online cart to remind them and offer something extra.
  id: totrans-563
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在某人将物品留在在线购物车中时发送特殊电子邮件提醒他们并提供额外优惠的好处。
- en: Discuss why it's good to have things like quizzes or demos in emails to make
    people want to join in.
  id: totrans-564
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中包含像测验或演示这样的内容以激发人们参与是好事。
- en: Share advice on making sure emails look good and work well on all kinds of devices.
  id: totrans-565
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享确保电子邮件在各种设备上看起来好且运行良好的建议。
- en: Explore the idea of sending special emails to celebrate important times with
    customers, like anniversaries or birthdays.
  id: totrans-566
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索发送特殊电子邮件庆祝与客户的重要时刻，如周年纪念日或生日的想法。
- en: Discuss how using personalized content in emails, like things someone likes
    or did before, can make emails more interesting.
  id: totrans-567
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论如何使用个性化内容，如某人喜欢的事物或之前做过的事情，在电子邮件中使它们更有趣。
- en: Share ideas for using emails to keep people interested who found out about a
    brand in other places, like social media or content online.
  id: totrans-568
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享一些使用电子邮件来保持那些在其他地方（如社交媒体或在线内容）了解到该品牌的人感兴趣的想法。
- en: Explore the idea of asking people what they think in emails to make things better
    and know what they like.
  id: totrans-569
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中询问人们看法的想法，以改进事物并了解他们的喜好。
- en: Discuss why it's good to send special emails to people who bought before but
    haven't for a while.
  id: totrans-570
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么向之前购买但一段时间没有购买的人发送特殊电子邮件是好事。
- en: Share tips on making emails interesting from the start so people want to open
    and read them.
  id: totrans-571
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享一些让电子邮件从一开始就吸引人的技巧，让人们愿意打开并阅读它们。
- en: Explore the idea of sending a series of special emails to new customers to introduce
    them to a brand.
  id: totrans-572
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索向新客户发送一系列特殊电子邮件以介绍品牌给他们的想法。
- en: Discuss why it's good to say personal things in emails to reward and keep good
    customers.
  id: totrans-573
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中说一些个性化的事情以奖励和保持优质客户是好事。
- en: Share strategies for sending special emails to people who haven't been interested
    for a while, offering them something extra.
  id: totrans-574
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享向一段时间内不感兴趣的人发送特别电子邮件并给予额外优惠的策略。
- en: Explore why it's good to include things like what customers say or stories from
    famous people in emails to make people trust a brand more.
  id: totrans-575
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探讨为什么在电子邮件中包含客户评价或名人的故事等元素有助于人们更加信任一个品牌。
- en: Discuss why it's important to look at numbers from emails, like how many people
    click on things, to make emails better.
  id: totrans-576
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么查看电子邮件中的数据，如有多少人点击了某些内容，对于改进电子邮件很重要。
- en: Share tips for making the first part of an email interesting to make people
    want to open it.
  id: totrans-577
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使电子邮件开头部分吸引人的技巧，以激发人们打开邮件的欲望。
- en: Explore the idea of telling interesting stories in emails to keep people interested
    and make a brand memorable.
  id: totrans-578
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中讲述有趣故事以保持人们兴趣并使品牌难忘的想法。
- en: Discuss why it's good to include things like what customers say or stories from
    real people in emails to make people trust a brand more.
  id: totrans-579
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中包含客户评价或真实人物的故事等元素有助于人们更加信任一个品牌。
- en: Share strategies for making emails look good and work well on small screens,
    like phones and tablets.
  id: totrans-580
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使电子邮件在小屏幕上（如手机和平板电脑）看起来好且运行良好的策略。
- en: Explore the benefits of showing things in emails that change as time goes on,
    like special deals based on the weather or suggestions based on what someone likes.
  id: totrans-581
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中展示随时间变化的事物（如基于天气的特殊优惠或基于喜好的建议）的好处。
- en: Discuss the impact of sending special emails based on what someone did or liked
    to keep them interested.
  id: totrans-582
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论根据某人的行为或喜好发送特别电子邮件以保持他们兴趣的影响。
- en: Share tips for making buttons in emails that tell people what to do in a clear
    and interesting way.
  id: totrans-583
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享在电子邮件中制作按钮的技巧，这些按钮以清晰有趣的方式告诉人们该做什么。
- en: Explore the idea of sending different emails to different people based on what
    they like or care about.
  id: totrans-584
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索根据人们的喜好或关心的事情向不同的人发送不同电子邮件的想法。
- en: Talk about how looking at the numbers and information from emails helps know
    if they are doing well and where they can get better.
  id: totrans-585
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 谈论如何通过查看电子邮件中的数据和信息来了解业务表现良好与否以及可以改进的地方。
- en: Share ideas for making emails personal, like suggesting things to buy based
    on what someone likes or did before.
  id: totrans-586
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使电子邮件个性化的想法，如根据某人的喜好或之前的行为建议购买事项。
- en: Explore the idea of using automatic plans to make things easier and guide people
    through buying.
  id: totrans-587
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索使用自动计划来简化流程并引导人们完成购买的思路。
- en: Discuss why it's good to try out different things in emails, like how they look
    or what they say, to see what people like.
  id: totrans-588
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中尝试不同的元素，如外观或内容，以了解人们喜欢什么。
- en: Share advice on making sure emails get to people's inboxes and look good, like
    using a good email service and having a clean email list.
  id: totrans-589
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享确保电子邮件到达收件箱并看起来好的建议，如使用优质的电子邮件服务和保持干净的电子邮件列表。
- en: Explore the idea of asking people what they think in emails to make things better
    and improve how emails work.
  id: totrans-590
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中询问人们意见以改进事物并提高电子邮件工作效果的思路。
- en: Discuss why it's good to say personal things in emails to reward and keep good
    customers.
  id: totrans-591
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中说一些个人化的事情可以奖励并保持良好的客户关系。
- en: Share ideas for sending special emails to remind people about things they didn't
    buy.
  id: totrans-592
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享发送特别电子邮件提醒人们他们未购买的事物的想法。
- en: Explore the benefits of sending special emails based on what someone looked
    at or bought to get them interested.
  id: totrans-593
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索根据某人查看或购买的内容发送特别电子邮件以激发他们兴趣的好处。
- en: Discuss why it's good to connect emails with social media so people can talk
    about a brand in different places.
  id: totrans-594
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么将电子邮件与社交媒体连接起来，以便人们可以在不同地方讨论一个品牌。
- en: Share tips for making emails look good and match a brand's style.
  id: totrans-595
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使电子邮件看起来好并符合品牌风格的技巧。
- en: Explore the concept of using things like timers or special deals that only last
    for a short time in emails to make people want to buy things.
  id: totrans-596
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中使用计时器或限时特价等元素来激发人们购买欲望的概念。
- en: Discuss the idea of sending special emails to people who haven't been interested
    in a brand for a while.
  id: totrans-597
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论向一段时间内对品牌不感兴趣的人发送特别电子邮件的思路。
- en: Share strategies for using emails to keep people interested who found out about
    a brand in other places, like events or content online.
  id: totrans-598
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用电子邮件保持在其他地方（如活动或在线内容）了解到品牌的人感兴趣的策略。
- en: Explore the benefits of suggesting things to read or look at in emails to give
    value and make people interested.
  id: totrans-599
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中建议阅读或查看的内容以提供价值并激发人们兴趣的好处。
- en: Discuss why it's good to use words and stories in emails that make people feel
    something.
  id: totrans-600
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中使用让人产生情感的语言和故事是件好事。
- en: Share tips for sending the right number of emails so people remember a brand
    but don't feel overwhelmed.
  id: totrans-601
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享发送适当数量的电子邮件，让人们记住品牌但不会感到不知所措的小贴士。
- en: Explore the concept of making emails personal by suggesting things based on
    who someone is or what they like.
  id: totrans-602
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索通过根据某人的身份或喜好来建议事情，使电子邮件个性化的概念。
- en: Talk about how looking at what people do, like what they look at or buy, helps
    send them emails about things they like.
  id: totrans-603
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论观察人们的行为，如他们查看或购买的内容，如何帮助发送他们喜欢的电子邮件。
- en: Share ideas for sending special emails to people who haven't been interested
    in a while, making them want to come back.
  id: totrans-604
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享向一段时间没有兴趣的人发送特殊电子邮件，让他们想要回归的小贴士。
- en: Explore the idea of suggesting more things to buy when telling people about
    something they already bought.
  id: totrans-605
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在告诉人们他们已经购买的东西时建议更多购买事项的想法。
- en: Discuss why it's nice to send special emails for someone's birthday or when
    they've been a customer for a while.
  id: totrans-606
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在某人过生日或成为客户一段时间后发送特别的电子邮件是件好事。
- en: Share advice on making sure emails work well for everyone, including people
    who use special tools to read.
  id: totrans-607
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享确保电子邮件对每个人（包括使用特殊工具阅读的人）都有效的小贴士。
- en: Explore the idea of making emails fun by adding games or challenges for people
    to enjoy.
  id: totrans-608
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索通过添加游戏或挑战使电子邮件变得有趣的想法。
- en: Discuss the idea of using what is known about customers to suggest things they
    might like or be interested in.
  id: totrans-609
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论利用对客户的了解来建议他们可能喜欢或感兴趣的事情的想法。
- en: Share ways to use things like pictures or words from customers in emails.
  id: totrans-610
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享如何在电子邮件中使用图片或客户的文字等元素。
- en: Explore the idea of sending special emails to people who bought before but haven't
    for a while.
  id: totrans-611
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索向之前购买过但一段时间没有购买的人发送特别电子邮件的想法。
- en: Discuss why it's good to have buttons in emails that let people share things
    with their friends.
  id: totrans-612
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中添加让人们能够与朋友分享内容的按钮是件好事。
- en: Share tips on making it easy for people to stop getting emails if they want,
    and giving them other options, like getting fewer emails or choosing what they
    want.
  id: totrans-613
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享如何让人们容易停止接收电子邮件（如果他们想要的话），并提供其他选项，如减少电子邮件数量或选择他们想要的选项的小贴士。
- en: Explore the idea of looking at all the times people might hear about a brand
    and using emails to make them interested.
  id: totrans-614
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索查看人们可能听到品牌信息的所有时间，并利用电子邮件让他们感兴趣的想法。
- en: Discuss why it's good to say personal things in emails to make people feel special.
  id: totrans-615
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中说一些个人化的事情可以让人们感到特别。
- en: Share strategies for sending a series of emails that guide people through buying
    over time.
  id: totrans-616
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享一系列电子邮件的策略，引导人们逐步购买。
- en: Explore the benefits of sending special emails with things like early looks,
    behind-the-scenes stuff, or special tips.
  id: totrans-617
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索发送包含早期预览、幕后内容或特别提示等内容的特殊电子邮件的好处。
- en: Discuss why it's good to use words and stories in emails that make people want
    to buy things.
  id: totrans-618
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么在电子邮件中使用让人想要购买物品的语言和故事是件好事。
- en: Share tips for making the first part of an email interesting to make people
    want to open it.
  id: totrans-619
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享如何使电子邮件的第一部分有趣，以吸引人们打开它。
- en: Explore the idea of using moving pictures or videos in emails to make them more
    interesting.
  id: totrans-620
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索在电子邮件中使用动态图片或视频使其更有趣的想法。
- en: Discuss the idea of using what people say to make emails better all the time.
  id: totrans-621
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论利用人们说的话来不断改进电子邮件的想法。
- en: Share ways to use emails to tell people about online events or courses and get
    them interested.
  id: totrans-622
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享如何利用电子邮件告诉人们关于在线活动或课程的信息，并激发他们的兴趣。
- en: Explore the benefits of sending special emails about things people left in their
    cart and offering them something extra to finish buying.
  id: totrans-623
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索发送关于人们留下的购物车中的物品的特殊电子邮件，并额外提供一些优惠以完成购买的好处。
- en: Talk about how sending emails that suggest other things to buy based on what
    someone bought before can make customers interested.
  id: totrans-624
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论根据某人之前购买的内容发送建议购买其他物品的电子邮件，如何让客户感兴趣。
- en: Share ideas for making emails that share interesting content, news, and special
    deals to keep people interested.
  id: totrans-625
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享如何制作包含有趣内容、新闻和特别优惠的电子邮件，以保持人们的兴趣。
- en: Discuss why it's important for a business to have a strong and unique identity
    in the emails they send, to stand out from other businesses.
  id: totrans-626
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论为什么对于一家企业来说，在发送的电子邮件中拥有强大而独特的身份认同，以区别于其他企业，是很重要的。
- en: Share tips on creating email subject lines that make people curious and want
    to open the email.
  id: totrans-627
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享如何创建让人好奇并想要打开的电子邮件主题行的小贴士。
- en: Explore the idea of making emails more personal by talking about things subscribers
    are interested in.
  id: totrans-628
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索通过谈论订阅者感兴趣的事情使电子邮件更具个性化的想法。
- en: Discuss how using people with influence on social media in emails can help a
    business reach more people and be more trustworthy.
  id: totrans-629
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在电子邮件中使用社交媒体上有影响力的人如何帮助企业触及更多人并提高可信度。
- en: Share strategies for making emails easy to read with things like bullet points,
    headings, and clear organization.
  id: totrans-630
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享使用项目符号、标题和清晰组织等策略使电子邮件易于阅读的方法。
- en: Explore the benefits of using a series of welcoming emails that are sent automatically
    to new subscribers to make them feel part of the group and turn them into happy
    customers.
  id: totrans-631
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索使用一系列自动发送给新订阅者的欢迎电子邮件的益处，使新订阅者感到自己是团体的一部分，并使他们成为满意的客户。
- en: Discuss why it's good to include what customers say about a business in emails
    to build trust and show that people like the products.
  id: totrans-632
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论在电子邮件中包含客户对企业的评价的好处，以建立信任并表明人们喜欢这些产品。
- en: Share tips on making sure emails get to people's inboxes by keeping the list
    of email addresses up to date and avoiding things that make emails look like spam.
  id: totrans-633
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
