- en: Refer to [Figure 11.1](#fig11-1).
  id: totrans-1789
  prefs: []
  type: TYPE_NORMAL
  zh: 参见图 11.1。
- en: '![image](image/Figure_11.1.jpg)'
  id: totrans-1790
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_11.1.jpg)'
- en: Figure 11.1 Goal Seek
  id: totrans-1791
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.1 目标求值
- en: Projecting Figures Using a Data Table
  id: totrans-1792
  prefs: []
  type: TYPE_NORMAL
  zh: 使用数据表预测数据
- en: A data table is a range that displays the results when certain values are changed
    in one or more formulas. The different values you want to enter in a formula are
    also included in the Data Table. Either a single variable or two variables can
    be used in the data table.
  id: totrans-1793
  prefs: []
  type: TYPE_NORMAL
  zh: 数据表是一个范围，当在其中一个或多个公式中更改某些值时，它会显示结果。您希望在公式中输入的不同值也包含在数据表中。数据表中可以使用一个或两个变量。
- en: One-Variable Data Tables
  id: totrans-1794
  prefs: []
  type: TYPE_NORMAL
  zh: 单变量数据表
- en: This method is used to observe the effects of changing a single variable in
    one or more formulas.
  id: totrans-1795
  prefs: []
  type: TYPE_NORMAL
  zh: 此方法用于观察在一个或多个公式中改变单个变量所产生的影响。
- en: 'Example:'
  id: totrans-1796
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: You can see that when we change the interest rate of monthly payments in the
    function, PMT (b5/12, 36, 100000) is affected. In this function, A5 is called
    the input cell, where various input values are substituted from the Data Table.
    Refer to [Figure 11.2](#fig11-2).
  id: totrans-1797
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以看到，当我们更改函数中月付款利率时，PMT (b5/12, 36, 100000) 会受到影响。在此函数中，A5 被称为输入单元格，其中各种输入值从数据表中替换。参见图
    11.2。
- en: '![image](image/Figure_11.2.jpg)'
  id: totrans-1798
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_11.2.jpg)'
- en: Figure 11.2 One-Variable Data Tables Example
  id: totrans-1799
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11.2 单变量数据表示例
- en: 'To create a one-variable Data Table, follow these steps:'
  id: totrans-1800
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个单变量数据表，请按照以下步骤操作：
- en: 1. Enter input values in a row or a column.
  id: totrans-1801
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 在一行或一列中输入输入值。
- en: 2. If you list the input values in a column, enter the formula in the cell located
    at the intersection of the row above the first input value and the column to the
    right of the input values, as shown in [Figure 11.2](#fig11-2). If you list the
    input values in a row, enter the formula in the cell located at the intersection
    of the column to the left of the first value and the row, just below the row of
    input values.
  id: totrans-1802
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 如果您在列中列出输入值，请在第一个输入值上方的一行和输入值右侧的列交叉处的单元格中输入公式，如图 11.2 所示。如果您在行中列出输入值，请在第一个值左侧的列和输入值行下方的一行交叉处的单元格中输入公式。
- en: 3. Select the range containing the input values and the formula.
  id: totrans-1803
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择包含输入值和公式的范围。
- en: 4. On the Data tab, in the Data Tools group, click What-if Analysis and choose
    Data Table to open the Table dialog box.
  id: totrans-1804
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在“数据”选项卡上，在“数据工具”组中，点击“假设分析”并选择“数据表”以打开“表格”对话框。
- en: 5. If the input values are in a column, specify the input cell in the Column
    input cell box. If the input values are in a row, use the Row input cell box.
  id: totrans-1805
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 如果输入值位于一列中，请在“列输入单元格”框中指定输入单元格。如果输入值位于一行中，请使用“行输入单元格”框。
- en: 6. Click OK.
  id: totrans-1806
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 点击“确定”。
- en: Two-Variable Data Tables
  id: totrans-1807
  prefs: []
  type: TYPE_NORMAL
  zh: 双变量数据表
- en: You can use a two-variable Data Table to see the effect of changing two variables
    in one or more formulas, as shown in [Figure 11.3](#fig11-3). For example, you
    can see how changing the Loan Amount and the number of payments affects the monthly
    payment.
  id: totrans-1808
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用双变量数据表来查看在一个或多个公式中更改两个变量的影响，如图 11.3 所示。例如，您可以查看更改贷款金额和付款次数如何影响月付款额。
- en: To create a two-variable data table, follow the steps below.
  id: totrans-1809
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个双变量数据表，请按照以下步骤操作。
- en: 1. Enter a formula that contains two input cells.
  id: totrans-1810
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 输入包含两个输入单元格的公式。
- en: 2. In the same column, below the formula, enter the first list of input values.
    In the same row, to the right of the formula, enter the second list of input values.
  id: totrans-1811
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在同一列中，公式下方输入第一个输入值列表。在同一行中，公式右侧输入第二个输入值列表。
- en: 3. Select the range containing both the input values and the formula.
  id: totrans-1812
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择包含输入值和公式的范围。
- en: 4. In the Data Tools group, click What-if Analysis and choose Data Table to
    open the Table dialog box.
  id: totrans-1813
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在“数据工具”组中，点击“假设分析”并选择“数据表”以打开“表格”对话框。
- en: 5. In the Row input cell box, specify the row input cell.
  id: totrans-1814
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 在“行输入单元格”框中，指定行输入单元格。
- en: 6. In the Column input cell box, specify the column input cell.
  id: totrans-1815
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 在“列输入单元格”框中，指定列输入单元格。
- en: 7. Click OK.
  id: totrans-1816
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 点击“确定”。
- en: What-if Scenarios
  id: totrans-1817
  prefs: []
  type: TYPE_NORMAL
  zh: 假设情景
- en: Scenarios are part of a suite of commands sometimes called What-if Analysis
    tools. A scenario is a set of values which Excel saves and can substitute automatically
    in your worksheet. To forecast the outcome of a worksheet model, you can use scenarios.
    You can create and save different groups of values on a worksheet and switch to
    any of these new scenarios to view different results. You can define up to 32
    changing cells per scenario.
  id: totrans-1818
  prefs: []
  type: TYPE_NORMAL
  zh: 场景是被称为假设分析工具集的一部分的命令。场景是一组Excel保存并可以自动替换到您工作表中的值。为了预测工作表模型的输出，您可以使用场景。您可以在工作表上创建和保存不同的值组，并切换到这些新场景中的任何一个以查看不同的结果。您可以为每个场景定义多达32个更改单元格。
- en: You can use the Scenario Manager for the tasks listed below.
  id: totrans-1819
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用场景管理器执行以下任务。
- en: ■Create multiple scenarios with multiple sets of changing cells.
  id: totrans-1820
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用多组更改单元格创建多个场景。
- en: ■View the results of each scenario on your worksheet.
  id: totrans-1821
  prefs: []
  type: TYPE_NORMAL
  zh: ■在工作表中查看每个场景的结果。
- en: ■Create a summary report of all input values and results.
  id: totrans-1822
  prefs: []
  type: TYPE_NORMAL
  zh: ■创建所有输入值和结果的摘要报告。
- en: ■Merge scenarios from a group into a single scenario model.
  id: totrans-1823
  prefs: []
  type: TYPE_NORMAL
  zh: ■将组中的场景合并到单个场景模型中。
- en: ■Protect scenarios from modification and hide scenarios.
  id: totrans-1824
  prefs: []
  type: TYPE_NORMAL
  zh: ■保护场景免受修改并隐藏场景。
- en: ■Keep track of modifications with an automatic scenario history.
  id: totrans-1825
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用自动场景历史记录跟踪修改。
- en: Creating Scenarios
  id: totrans-1826
  prefs: []
  type: TYPE_NORMAL
  zh: 创建场景
- en: Let us assume that you have to analyze the net income of a business side-by-side
    under best, worst, and current circumstances in the following illustration. You
    may use scenario manager to achieve the required result in a summary format.
  id: totrans-1827
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们假设您必须分析以下示例中在最佳、最坏和当前情况下并排的业务净收入。您可以使用场景管理器以汇总格式达到所需的结果。
- en: You can use the Scenario Manager Dialog box to create scenarios. Follow the
    steps below.
  id: totrans-1828
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用场景管理器对话框创建场景。按照以下步骤操作。
- en: 1. Activate the Data tab.
  id: totrans-1829
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 激活“数据”选项卡。
- en: 2. From the What-if Analysis list in the Data Tools group, select Scenario Manager
    to open the Scenario Manager Dialog box.
  id: totrans-1830
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 从数据工具组中的“假设分析”列表中选择场景管理器以打开场景管理器对话框。
- en: 3. Click the Add button to open the Add Scenario dialog box.
  id: totrans-1831
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击“添加”按钮以打开添加场景对话框。
- en: 4. In the Scenario name box, specify the name of the scenario.
  id: totrans-1832
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在“场景名称”框中，指定场景的名称。
- en: 5. In the Changing cells box, specify the cells that contain the values you
    want to change. (for example, select the range of current scenario range).
  id: totrans-1833
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 在“更改单元格”框中，指定包含您想要更改的值的单元格。（例如，选择当前场景范围的范围）。
- en: 6. Click OK to open the Scenario Values dialog box.
  id: totrans-1834
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 点击“确定”以打开“场景值”对话框。
- en: 7. In the Scenario Values dialog box, specify values for the changing cells.
  id: totrans-1835
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 在“场景值”对话框中，指定更改单元格的值。
- en: 8. Click OK to create the scenario.
  id: totrans-1836
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 点击“确定”以创建场景。
- en: If you want to create additional scenarios, click Add again, and then repeat
    the procedure. When you finish creating scenarios, click OK.
  id: totrans-1837
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您要创建更多场景，请再次点击“添加”，然后重复此过程。完成创建场景后，请点击“确定”。
- en: 'Example:'
  id: totrans-1838
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: In the following example, if we need to know the PMT for a range of loan amounts,
    rates of interest, and number of payments, we may use scenarios, as shown in [Figure
    11.3](#fig11-3).
  id: totrans-1839
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下示例中，如果我们需要知道一系列贷款金额、利率和还款次数的PMT，我们可以使用场景，如[图11.3](#fig11-3)所示。
- en: In First Change, the loan amount is 1,50,000, the rate of interest is 10.6%,
    and the number of terms is 24\. In Second Change, the loan amount is 2,00,000,
    the rate of interest is 11%, and number of payments is 48.
  id: totrans-1840
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一次更改中，贷款金额为1,50,000，利率为10.6%，期限为24。在第二次更改中，贷款金额为2,00,000，利率为11%，还款次数为48。
- en: Refer to the following [Figure 11.3](#fig11-3).
  id: totrans-1841
  prefs: []
  type: TYPE_NORMAL
  zh: 参考以下[图11.3](#fig11-3)。
- en: '![image](image/Figure_11.3.jpg)'
  id: totrans-1842
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_11.3.jpg)'
- en: Figure 11.3 Scenario Manager
  id: totrans-1843
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.3 场景管理器
- en: Create a Scenario Summary Report
  id: totrans-1844
  prefs: []
  type: TYPE_NORMAL
  zh: 创建场景摘要报告
- en: 'To create a scenario summary report, follow these steps:'
  id: totrans-1845
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建场景摘要报告，请按照以下步骤操作：
- en: 1. Click on the Summary Scenario Manager dialog box.
  id: totrans-1846
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 点击“汇总场景管理器”对话框。
- en: 2. In the Result cells box, enter the references for the cells that refer to
    cells whose values are changed by the scenarios (Net Income in the above example).
    Separate the multiple references with commas, as shown in [Figure 11.4](#fig11-4).
  id: totrans-1847
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“结果单元格”框中，输入引用更改场景值（例如，上述示例中的净收入）的单元格的引用。多个引用之间用逗号分隔，如[图11.4](#fig11-4)所示。
- en: Delete a Scenario
  id: totrans-1848
  prefs: []
  type: TYPE_NORMAL
  zh: 删除场景
- en: 'To delete a scenario, follow these steps:'
  id: totrans-1849
  prefs: []
  type: TYPE_NORMAL
  zh: 要删除场景，请按照以下步骤操作：
- en: 1. Activate the Data tab.
  id: totrans-1850
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 激活“数据”选项卡。
- en: 2. From the What-if Analysis list in the Data Tools group, select Scenario Manager
    to open the Scenario Manager dialog box.
  id: totrans-1851
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在数据工具组中的假设分析列表中，选择场景管理器以打开场景管理器对话框。
- en: 3. Click the name of the scenario you want to delete.
  id: totrans-1852
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击您想要删除的场景名称。
- en: 4. Click Delete.
  id: totrans-1853
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 点击删除。
- en: Refer to [Figure 11.4](#fig11-4).
  id: totrans-1854
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图11.4。
- en: '![image](image/Figure_11.4.jpg)'
  id: totrans-1855
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_11.4.jpg)'
- en: Figure 11.4 Scenario Summary
  id: totrans-1856
  prefs: []
  type: TYPE_NORMAL
  zh: 图11.4 场景摘要
- en: Display a Scenario
  id: totrans-1857
  prefs: []
  type: TYPE_NORMAL
  zh: 显示场景
- en: When you display a scenario, you change the values of the cells saved as part
    of that scenario. Follow the steps below to display a scenario.
  id: totrans-1858
  prefs: []
  type: TYPE_NORMAL
  zh: 当您显示一个场景时，您会更改作为该场景一部分保存的单元格的值。要显示场景，请按照以下步骤操作。
- en: 1. Activate the Data tab.
  id: totrans-1859
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 激活数据选项卡。
- en: 2. From the What-if Analysis list in the Data Tools group, select Scenario Manager
    to open the Scenario Manager dialog box.
  id: totrans-1860
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在数据工具组中的假设分析列表中，选择场景管理器以打开场景管理器对话框。
- en: 3. Click the name of the scenario you want to display.
  id: totrans-1861
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击您想要显示的场景名称。
- en: 4. Click Show.
  id: totrans-1862
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 点击显示。
- en: Note Double-clicking the name of the scenario displayed in the Scenarios box
    is the same as selecting the name and choosing Show values.
  id: totrans-1863
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：双击场景框中显示的场景名称与选择名称并选择显示值相同。
- en: Merge Scenarios from Another Worksheet
  id: totrans-1864
  prefs: []
  type: TYPE_NORMAL
  zh: 从另一个工作表合并场景
- en: 'It is easy to merge scenarios when all What-if models on the worksheets are
    identical. All changing cells on the source worksheet must refer to the corresponding
    changing cells on the active worksheet. Excel copies all scenarios on the source
    sheet to the active worksheet. To merge scenarios from another worksheet, follow
    these steps:'
  id: totrans-1865
  prefs: []
  type: TYPE_NORMAL
  zh: 当工作表上的所有假设模型都相同的时候，合并场景很容易。所有源工作表上的变化单元格必须引用活动工作表上相应的变化单元格。Excel会将源工作表上的所有场景复制到活动工作表上。要从另一个工作表合并场景，请按照以下步骤操作：
- en: 1. Open all the workbooks that contain the scenarios you want to merge.
  id: totrans-1866
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 打开包含您想要合并的场景的所有工作簿。
- en: 2. Switch to the worksheet where you want to merge the scenarios.
  id: totrans-1867
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 切换到您想要合并场景的工作表。
- en: 3. Activate the Data tab.
  id: totrans-1868
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 激活数据选项卡。
- en: 4. From the What-if Analysis list in the Data Tools group, select Scenario Manager
    to open the Scenario Manager dialog box.
  id: totrans-1869
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在数据工具组中的假设分析列表中，选择场景管理器以打开场景管理器对话框。
- en: 5. Click Merge.
  id: totrans-1870
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击合并。
- en: 6. In the Book box, click a workbook name.
  id: totrans-1871
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 在工作簿框中，点击一个工作簿名称。
- en: 7. In the Sheet box, click the name of a worksheet that contains the scenarios
    you want to merge.
  id: totrans-1872
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 在工作表框中，点击包含您想要合并的场景的工作表名称。
- en: 8. Click OK.
  id: totrans-1873
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 点击确定。
- en: 9. Repeat this process if you want to merge scenarios from more worksheets.
  id: totrans-1874
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 如果您想要从更多工作表合并场景，请重复此过程。
- en: Protecting Scenarios
  id: totrans-1875
  prefs: []
  type: TYPE_NORMAL
  zh: 保护场景
- en: 'The Add Scenario and Edit Scenario dialog boxes contain two protection options:'
  id: totrans-1876
  prefs: []
  type: TYPE_NORMAL
  zh: 添加场景和编辑场景对话框包含两个保护选项：
- en: ■Prevent Changes
  id: totrans-1877
  prefs: []
  type: TYPE_NORMAL
  zh: ■防止更改
- en: ■Hide
  id: totrans-1878
  prefs: []
  type: TYPE_NORMAL
  zh: ■隐藏
- en: If you select Prevent Changes and then activate sheet protection, the scenarios
    you define cannot be edited. This does not prevent you from seeing the values
    of the changing cells directly on the sheet (unless the cells themselves are locked).
    Rather, the scenarios themselves are protected from modification when the Prevent
    Changes checkbox is selected.
  id: totrans-1879
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您选择防止更改并激活工作表保护，您定义的场景将无法编辑。这不会阻止您直接在工作表上看到变化单元格的值（除非单元格本身被锁定）。相反，当选择防止更改复选框时，场景本身会得到保护，防止修改。
- en: In addition, selecting the Hide checkbox removes a scenario name from the list
    of defined scenarios, preventing its display. Once you select protection options
    in the Add Scenario or Edit Scenario dialog box, you must activate sheet protection.
    To do this, use the protection command on the Tools menu, and then choose Protect
    Sheet.
  id: totrans-1880
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，选择隐藏复选框会从定义的场景列表中删除场景名称，防止其显示。一旦在添加场景或编辑场景对话框中选择了保护选项，就必须激活工作表保护。为此，请使用工具菜单上的保护命令，然后选择保护工作表。
- en: Note When sheet protection is activated, you can still add scenarios. You cannot
    edit or delete them unless the Prevent Changes checkbox is cleared.
  id: totrans-1881
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：当激活工作表保护时，您仍然可以添加场景。除非清除防止更改复选框，否则您无法编辑或删除它们。
- en: Conclusion
  id: totrans-1882
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, the What-if Analysis tools in Excel, including Goal Seek, Data
    Tables, and Scenario Manager, provide valuable insights and support you in making
    informed decisions. The tools let you explore different scenarios and analyze
    the impact of variables on formulas. These tools are essential for financial planning,
    budgeting, and forecasting, allowing users to save time, reduce errors, and gain
    valuable insights for better decision-making.
  id: totrans-1883
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，Excel 中的假设分析工具，包括目标求值、数据表和场景管理器，提供了宝贵的见解，并支持你做出明智的决策。这些工具让你能够探索不同的场景，并分析变量对公式的
    影响。这些工具对于财务规划、预算和预测至关重要，使用户能够节省时间，减少错误，并获得更好的决策洞察。
- en: Exercises
  id: totrans-1884
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: 'You work for a financial planning company and are analyzing the impact of different
    loan options on monthly payments. You have the following information:'
  id: totrans-1885
  prefs: []
  type: TYPE_NORMAL
  zh: 你在一家财务规划公司工作，正在分析不同贷款选项对月供的影响。你拥有以下信息：
- en: 'Loan Amount: $100,000'
  id: totrans-1886
  prefs: []
  type: TYPE_NORMAL
  zh: 贷款金额：$100,000
- en: 'Interest Rate: 5.5%'
  id: totrans-1887
  prefs: []
  type: TYPE_NORMAL
  zh: 利率：5.5%
- en: 'Loan Term: 20 years'
  id: totrans-1888
  prefs: []
  type: TYPE_NORMAL
  zh: 贷款期限：20 年
- en: 'Using What-if Analysis, perform the following tasks:'
  id: totrans-1889
  prefs: []
  type: TYPE_NORMAL
  zh: 使用假设分析，执行以下任务：
- en: 'Task 1: Goal Seek'
  id: totrans-1890
  prefs: []
  type: TYPE_NORMAL
  zh: 任务 1：目标求值
- en: Calculate the monthly payment (EMI) for the given loan amount, interest rate,
    and loan term.
  id: totrans-1891
  prefs: []
  type: TYPE_NORMAL
  zh: 计算给定贷款金额、利率和贷款期限的月供（EMI）。
- en: Use Goal Seek to find the number of months required to pay off the loan if the
    monthly payment is increased to $800.
  id: totrans-1892
  prefs: []
  type: TYPE_NORMAL
  zh: 使用目标求值功能，找出如果月供增加到 $800，需要多少个月才能还清贷款。
- en: 'Task 2: Data Table'
  id: totrans-1893
  prefs: []
  type: TYPE_NORMAL
  zh: 任务 2：数据表
- en: Create a one-variable data table to analyze the impact of changing interest
    rates (4%, 5%, and 6%) on the monthly payment for the given loan amount and term.
  id: totrans-1894
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个单变量数据表，以分析改变利率（4%、5% 和 6%）对给定贷款金额和期限的月供的影响。
- en: Create a two-variable data table to analyze the impact of changing both the
    loan amount ($80,000, $100,000, and $120,000) and the loan term (15 years, 20
    years, and 25 years) on the monthly payment.
  id: totrans-1895
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个双变量数据表，以分析改变贷款金额（$80,000、$100,000 和 $120,000）和贷款期限（15 年、20 年和 25 年）对月供的影响。
- en: 'Task 3: Scenario Manager'
  id: totrans-1896
  prefs: []
  type: TYPE_NORMAL
  zh: 任务 3：场景管理器
- en: Create a scenario named “Best Case” with a loan amount of $80,000, an interest
    rate of 4%, and a loan term of 15 years.
  id: totrans-1897
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个名为“最佳情况”的场景，贷款金额为 $80,000，利率为 4%，贷款期限为 15 年。
- en: Create a scenario named “Worst Case” with a loan amount of $120,000, an interest
    rate of 6%, and a loan term of 25 years.
  id: totrans-1898
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个名为“最坏情况”的场景，贷款金额为 $120,000，利率为 6%，贷款期限为 25 年。
- en: Generate a scenario summary report showing the monthly payment for each scenario.
  id: totrans-1899
  prefs: []
  type: TYPE_NORMAL
  zh: 生成一个场景摘要报告，显示每个场景的月供。
- en: CHAPTER  12
  id: totrans-1900
  prefs: []
  type: TYPE_NORMAL
  zh: 第 12 章
- en: Working with Multiple Worksheets, Workbooks, and Applications
  id: totrans-1901
  prefs: []
  type: TYPE_NORMAL
  zh: 与多个工作表、工作簿和应用一起工作
- en: Introduction
  id: totrans-1902
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: Working with multiple worksheets, workbooks, and applications is essential for
    managing and analyzing data effectively. This chapter explores various techniques
    to establish links between different worksheets, create links between different
    software, utilize auditing features to trace errors, collaborate in a workgroup,
    and create hyperlinks for seamless navigation. By mastering these skills, you
    will be able to enhance your productivity and efficiency in handling complex data
    scenarios.
  id: totrans-1903
  prefs: []
  type: TYPE_NORMAL
  zh: 与多个工作表、工作簿和应用一起工作是有效管理和分析数据的关键。本章探讨了建立不同工作表之间链接的各种技术，创建不同软件之间的链接，利用审计功能追踪错误，在工作组中进行协作，以及创建超链接以实现无缝导航。通过掌握这些技能，你将能够提高处理复杂数据场景的生产力和效率。
- en: Structure
  id: totrans-1904
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-1905
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Links between different worksheets
  id: totrans-1906
  prefs: []
  type: TYPE_NORMAL
  zh: ■不同工作表之间的链接
- en: ■Creating links between different software
  id: totrans-1907
  prefs: []
  type: TYPE_NORMAL
  zh: ■创建不同软件之间的链接
- en: ■Auditing features
  id: totrans-1908
  prefs: []
  type: TYPE_NORMAL
  zh: ■审计功能
- en: ■Workgroup collaboration
  id: totrans-1909
  prefs: []
  type: TYPE_NORMAL
  zh: ■工作组协作
- en: ■Creating hyperlinks
  id: totrans-1910
  prefs: []
  type: TYPE_NORMAL
  zh: ■创建超链接
- en: Objectives
  id: totrans-1911
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, the reader will be able to identify the various
    ways to work with multiple worksheets and identify the various ways to work with
    multiple workbooks and applications.
  id: totrans-1912
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习本章后，读者将能够识别与多个工作表和多个工作簿以及应用程序一起工作的各种方法。
- en: Links Between Different Worksheets
  id: totrans-1913
  prefs: []
  type: TYPE_NORMAL
  zh: 不同工作表之间的链接
- en: If there is monthly data in different worksheets and we need to have yearly
    data on a different worksheet, as shown in [Figure 12.1](#fig12-1), we may use
    intersheet reference.
  id: totrans-1914
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不同工作表中有月度数据，而我们需要在不同的工作表上拥有年度数据，如图 12.1 所示，我们可以使用跨工作表引用。
- en: '![image](image/Figure_12.1.jpg)'
  id: totrans-1915
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_12.1.jpg)'
- en: Figure 12.1 Monthly Data
  id: totrans-1916
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12.1 月度数据
- en: 'To use a cell reference from a different sheet, you can use the following syntax:'
  id: totrans-1917
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用来自不同工作表的单元格引用，可以使用以下语法：
- en: Sheetname!Reference
  id: totrans-1918
  prefs: []
  type: TYPE_NORMAL
  zh: Sheetname!Reference
- en: '[Figure 12.2](#fig12-2) shows an example of finding the sum of cells from a
    different worksheet:'
  id: totrans-1919
  prefs: []
  type: TYPE_NORMAL
  zh: '[图12.2](#fig12-2) 展示了从不同工作表中查找单元格总和的示例：'
- en: '![image](image/Figure_12.2.jpg)'
  id: totrans-1920
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_12.2.jpg)'
- en: Figure 12.2 Finding the Sum
  id: totrans-1921
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.2 查找总和
- en: If the product names are not the same, or are not in the same order, in all
    the other sheets, this method will not prove useful. In these scenarios, you may
    use the consolidation feature of Excel, as shown in [Figure 12.3](#fig12-3).
  id: totrans-1922
  prefs: []
  type: TYPE_NORMAL
  zh: 如果产品名称在不同工作表中不相同，或者顺序不一致，这种方法将不会证明是有用的。在这些情况下，您可以使用Excel的合并功能，如图12.3所示。
- en: '![image](image/Figure_12.3.jpg)'
  id: totrans-1923
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_12.3.jpg)'
- en: Figure 12.3 Consolidation Feature
  id: totrans-1924
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.3 合并功能
- en: To consolidate data from different worksheets, follow the steps below.
  id: totrans-1925
  prefs: []
  type: TYPE_NORMAL
  zh: 要合并来自不同工作表的数据，请按照以下步骤操作。
- en: 1. Go to the Data Tab.
  id: totrans-1926
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 转到“数据”选项卡。
- en: 2. Select Consolidate. The Consolidate dialog box will open, as shown in [Figure
    12.4](#fig12-4).
  id: totrans-1927
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择“合并”。将打开“合并”对话框，如图12.4所示。
- en: '![image](image/Figure_12.4.jpg)'
  id: totrans-1928
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_12.4.jpg)'
- en: Figure 12.4 The Consolidate Dialog Box
  id: totrans-1929
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.4 合并对话框
- en: 3. Select the function you want to apply on the data from the Function dropdown
    box.
  id: totrans-1930
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 从函数下拉框中选择要应用的数据函数。
- en: 4. Click on Browse and select the first group of data.
  id: totrans-1931
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 点击“浏览”并选择第一组数据。
- en: 5. Click on Add.
  id: totrans-1932
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击“添加”。
- en: 6. Repeat the second and third steps for all the data.
  id: totrans-1933
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 对所有数据重复第二步和第三步。
- en: 7. Click on Top Row and Left Column checkboxes if you want the row and column
    Title to be picked up.
  id: totrans-1934
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 如果你想获取行和列标题，请勾选“顶部行”和“左侧列”复选框。
- en: 8. Select Create links to source data, if you wish to have the updated data
    for every change in the source data.
  id: totrans-1935
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 如果您希望源数据每次更改时都更新数据，请选择“创建到源数据的链接”。
- en: Refer to [Figure 12.5](#fig12-5).
  id: totrans-1936
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图12.5。
- en: '![image](image/Figure_12.5.jpg)'
  id: totrans-1937
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_12.5.jpg)'
- en: Figure 12.5 Resultant Data
  id: totrans-1938
  prefs: []
  type: TYPE_NORMAL
  zh: 图12.5 结果数据
- en: Creating Links Between Different Software
  id: totrans-1939
  prefs: []
  type: TYPE_NORMAL
  zh: 在不同软件之间创建链接
- en: 'Let us assume that we have to copy specific data from an Excel sheet to a Word
    document. If you do a normal copy and paste, the contents pasted in the Word document
    are static; they will not be updated even if there is a change of data in the
    Excel worksheet. Now let us see how to create a link so that the data is updated
    even in the Word document. Follow these steps:'
  id: totrans-1940
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们必须从Excel工作表复制特定的数据到Word文档。如果你进行常规的复制和粘贴，粘贴到Word文档中的内容是静态的；即使Excel工作表中的数据发生变化，它们也不会更新。现在让我们看看如何创建一个链接，以便即使在Word文档中数据也会更新。按照以下步骤操作：
- en: 1. Copy the contents from the Excel worksheet.
  id: totrans-1941
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 从Excel工作表复制内容。
- en: 2. While pasting in the Word document, click on the Home tab from the clipboard
    group.
  id: totrans-1942
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在Word文档中粘贴时，从剪贴板组点击“主页”选项卡。
- en: 3. Select Edit-Paste special.
  id: totrans-1943
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择“编辑-特殊粘贴”。
- en: 4. In the Paste Special dialog box, select the option Paste Link and then select
    MS Office Word Object Document.
  id: totrans-1944
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在“特殊粘贴”对话框中，选择“粘贴链接”选项，然后选择“MS Office Word对象文档”。
- en: 5. Click on OK.
  id: totrans-1945
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击“确定”。
- en: 6. Now whenever the data in the Excel worksheet is changed, the change will
    be automatically reflected in the Word document.
  id: totrans-1946
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 现在，每当Excel工作表中的数据发生变化时，该变化将自动反映在Word文档中。
- en: Auditing Features
  id: totrans-1947
  prefs: []
  type: TYPE_NORMAL
  zh: 审核功能
- en: You can use the auditing features in Excel to trace errors in a worksheet. You
    can also trace the relationships between cells and formulas on your worksheets.
    You might want to identify the cells on which the value of a formula is based.
    Excel provides the Trace Precedents and Trace Dependents commands to point out
    such cells.
  id: totrans-1948
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用Excel中的审核功能来追踪工作表中的错误。您还可以追踪工作表上单元格和公式之间的关系。您可能想识别公式基于其值的单元格。Excel提供了“追踪前置”和“追踪依赖”命令来指出这样的单元格。
- en: Dependent and Precedent Cells
  id: totrans-1949
  prefs: []
  type: TYPE_NORMAL
  zh: 依赖和前置单元格
- en: A precedent cell provides data to a specific cell. A dependent cell relies on
    the value of another cell. When you click the Trace Precedents and Trace Dependents
    buttons in the Formula Auditing ribbon group on the Formulas ribbon tab, Excel
    draws arrows showing precedent and dependent cells.
  id: totrans-1950
  prefs: []
  type: TYPE_NORMAL
  zh: 前置单元格向特定单元格提供数据。依赖单元格依赖于另一个单元格的值。当你在公式选项卡上的公式审核组中的“追踪前置”和“追踪依赖”按钮上点击时，Excel会绘制箭头以显示前置和依赖单元格。
- en: Workgroup Collaboration
  id: totrans-1951
  prefs: []
  type: TYPE_NORMAL
  zh: 工作组协作
- en: Sharing a workbook makes it possible for several members of a workgroup to collaborate
    on the same set of data. For example, several sales managers could enter their
    respective regional sales figures in the same workbook, making it unnecessary
    to collect and consolidate the data manually.
  id: totrans-1952
  prefs: []
  type: TYPE_NORMAL
  zh: 共享工作簿使得工作组中的多个成员能够对同一组数据进行协作。例如，几个销售经理可以在同一工作簿中输入他们各自的区域销售数据，这样就无需手动收集和合并数据。
- en: Sharing Workbooks
  id: totrans-1953
  prefs: []
  type: TYPE_NORMAL
  zh: 共享工作簿
- en: To share a workbook, follow the steps below.
  id: totrans-1954
  prefs: []
  type: TYPE_NORMAL
  zh: 要共享工作簿，请按照以下步骤操作。
- en: 1. Open the workbook that you want to share.
  id: totrans-1955
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 打开您想要共享的工作簿。
- en: 2. Activate the Review ribbon tab.
  id: totrans-1956
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 激活“审阅”选项卡。
- en: 3. In the Changes ribbon group, click Share Workbook to open the Share Workbook
    dialog box.
  id: totrans-1957
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“更改”选项卡组中，点击“共享工作簿”以打开“共享工作簿”对话框。
- en: 4. Activate the Editing tab.
  id: totrans-1958
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 激活“编辑”选项卡。
- en: 5. Check Allow changes by more than one user at the same time, and then click
    OK.
  id: totrans-1959
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 选择“允许多个用户同时更改”，然后点击“确定”。
- en: 6. Save the workbook in a location where other users can access it.
  id: totrans-1960
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 将工作簿保存在其他用户可以访问的位置。
- en: You can control how a workbook is shared by using the Advanced tab of the Share
    Workbook dialog box. For example, under Update changes, you can choose to see
    other users’ changes each time you save the workbook. You can also set the interval
    at which changes will be shown automatically.
  id: totrans-1961
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用“共享工作簿”对话框的高级选项卡来控制工作簿的共享方式。例如，在“更新更改”部分，您可以选择在保存工作簿时查看其他用户的更改。您还可以设置更改自动显示的间隔。
- en: Merging Workbooks
  id: totrans-1962
  prefs: []
  type: TYPE_NORMAL
  zh: 合并工作簿
- en: 'You may need to share a workbook among users who cannot access the same file
    simultaneously. In such a situation, you can distribute copies of the shared workbook,
    allow users to make changes to their copies, and then merge those copies into
    a single workbook. To share a workbook that you intend to merge later, follow
    these steps:'
  id: totrans-1963
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能需要将工作簿共享给无法同时访问同一文件的用户。在这种情况下，您可以分发共享工作簿的副本，允许用户更改他们的副本，然后将这些副本合并到一个工作簿中。要共享您打算稍后合并的工作簿，请按照以下步骤操作：
- en: 1. Open the Share Workbook dialog box, activate the Editing tab, and check Allow
    changes by more than one user at the same time.
  id: totrans-1964
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 打开“共享工作簿”对话框，激活“编辑”选项卡，并选择“允许多个用户同时更改”。
- en: 2. On the Advanced tab, under Track changes, select Keep change history for.
    In the box, enter the number of days you want to allow users to make changes in
    the workbook.
  id: totrans-1965
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“高级”选项卡下，在“跟踪更改”部分，选择“保留更改历史记录”。在框中，输入您希望用户在 workbooks 中进行更改的天数。
- en: 3. Click OK.
  id: totrans-1966
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击“确定”。
- en: 4. Make copies of the workbook and distribute one to each user.
  id: totrans-1967
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 复制工作簿并发给每个用户一份。
- en: 'After the users have made changes to their copies of the workbook, you can
    merge the copies into a single workbook, using the following steps:'
  id: totrans-1968
  prefs: []
  type: TYPE_NORMAL
  zh: 用户更改了他们工作簿副本后，您可以使用以下步骤将副本合并到一个工作簿中：
- en: 1. Choose File, Excel Options to open the Excel Options dialog box.
  id: totrans-1969
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择“文件”，然后选择“Excel选项”以打开“Excel选项”对话框。
- en: 2. Select Customization and add Compare and Merge Workbooks to the Quick Access
    Toolbar.
  id: totrans-1970
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“自定义”中添加“比较和合并工作簿”到快速访问工具栏。
- en: 3. On the Quick Access Toolbar, choose Compare and Merge Workbooks to open the
    Select Files to Merge into Current Workbook dialog box.
  id: totrans-1971
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在快速访问工具栏上，选择“比较和合并工作簿”以打开“将文件合并到当前工作簿”对话框。
- en: 4. Select the copies of the workbook that contain changes you want to merge.
  id: totrans-1972
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 选择包含您想要合并的更改的工作簿副本。
- en: 5. Click OK.
  id: totrans-1973
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击“确定”。
- en: Tracking Changes
  id: totrans-1974
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪更改
- en: 'You can analyze changes which users have made to a workbook by using the Track
    Changes feature. This will tell you who made the changes, when they were made,
    and the original and changed values without having to manually compare the two
    workbooks. If your workbook is not shared, Excel makes the workbook shared automatically
    when you turn on the Track Changes feature. To highlight changes, follow these
    steps:'
  id: totrans-1975
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用“跟踪更改”功能来分析用户对工作簿所做的更改。这将告诉您谁进行了更改，更改的时间，以及原始值和更改后的值，而无需手动比较两个工作簿。如果您的
    workbook 未共享，当您打开“跟踪更改”功能时，Excel 会自动将 workbook 设置为共享。要突出显示更改，请按照以下步骤操作：
- en: 1. Activate the Review ribbon tab.
  id: totrans-1976
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 激活“审阅”选项卡。
- en: 2. In the Changes ribbon group, click Track Changes and choose Highlight Changes
    to open the Highlight Changes dialog box.
  id: totrans-1977
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“更改”选项卡组中，点击“跟踪更改”并选择“突出显示更改”以打开“突出显示更改”对话框。
- en: 3. If the workbook is not shared, check Track changes while editing. If the
    workbook is shared, this option will be checked by default.
  id: totrans-1978
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 如果工作簿未共享，请选择“编辑时跟踪更改”。如果工作簿已共享，则此选项将默认选中。
- en: '4. Specify how you want the changes to be tracked:'
  id: totrans-1979
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 指定您想要如何跟踪更改：
- en: a. If you want to view changes based on when they were made (for example, after
    a specific date), check When, then select the necessary setting from the list.
  id: totrans-1980
  prefs: []
  type: TYPE_NORMAL
  zh: a. 如果您想根据更改的日期查看更改（例如，在特定日期之后），请勾选“何时”，然后从列表中选择必要的设置。
- en: b. If you want to view the changes made by a specific user, check Who, then
    select Everyone or Everyone but Me from the list.
  id: totrans-1981
  prefs: []
  type: TYPE_NORMAL
  zh: b. 如果您想根据特定用户查看所做的更改，请勾选“谁”，然后从列表中选择“所有人”或“除我之外的所有人”。
- en: c. If you want to view the changes made to a specific range of cells, check.
    Where, then enter the range.
  id: totrans-1982
  prefs: []
  type: TYPE_NORMAL
  zh: c. 如果您想查看对特定单元格范围的更改，请勾选“在哪里”，然后输入范围。
- en: 5. Click OK.
  id: totrans-1983
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击“确定”。
- en: 'To review workbook changes and accept or reject them, follow these steps:'
  id: totrans-1984
  prefs: []
  type: TYPE_NORMAL
  zh: 要审查工作簿更改并接受或拒绝它们，请按照以下步骤操作：
- en: 1. Open the workbook that contains the tracked changes.
  id: totrans-1985
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 打开包含跟踪更改的工作簿。
- en: 2. Activate the Review ribbon tab.
  id: totrans-1986
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 激活“审阅”选项卡。
- en: 3. In the Changes ribbon group, click Track Changes and choose Accept or Reject
    Changes.
  id: totrans-1987
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“更改”选项组中，点击“跟踪更改”并选择“接受或拒绝更改”。
- en: 4. You will be prompted to save the workbook. Click OK to save the workbook.
  id: totrans-1988
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 您将提示保存工作簿。点击“确定”以保存工作簿。
- en: 5. The Select Changes to Accept or Reject dialog box appears.
  id: totrans-1989
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 将出现“选择要接受或拒绝的更改”对话框。
- en: 6. If you want to view changes based on when they were made, check When and
    select a time period.
  id: totrans-1990
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 如果您想根据更改的日期查看更改，请勾选“何时”并选择一个时间段。
- en: 7. Click OK to open the Accept or Reject Changes dialog box.
  id: totrans-1991
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 点击“确定”以打开“接受或拒绝更改”对话框。
- en: 8. A cell that contains a changed value will be highlighted. This dialog box
    displays information about each change, including the name of the person who made
    the change, the date and time it was made, and other changes that will occur if
    you accept or reject the suggested change. You can scroll down to view the rest
    of the contents.
  id: totrans-1992
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 包含更改值的单元格将被突出显示。此对话框显示有关每个更改的信息，包括更改人的姓名、更改的日期和时间，以及如果您接受或拒绝建议的更改将发生的其他更改。您可以向下滚动以查看其余内容。
- en: 9. Click Accept to accept the change or click Reject to restore the original
    value.
  id: totrans-1993
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 点击“接受”以接受更改或点击“拒绝”以恢复原始值。
- en: 10. The next cell with a changed value will be highlighted.
  id: totrans-1994
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 下一个具有更改值的单元格将被突出显示。
- en: Creating Hyperlinks
  id: totrans-1995
  prefs: []
  type: TYPE_NORMAL
  zh: 创建超链接
- en: 'To create hyperlinks within the same workbook, follow these steps:'
  id: totrans-1996
  prefs: []
  type: TYPE_NORMAL
  zh: 要在同一工作簿内创建超链接，请按照以下步骤操作：
- en: 1. To link a particular cell, first name the cell.
  id: totrans-1997
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 要链接特定单元格，首先命名该单元格。
- en: 2. Select the cell, and click the Formula Tab.
  id: totrans-1998
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择单元格，并点击“公式”选项卡。
- en: 3. Select Define Name.
  id: totrans-1999
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择“定义名称”。
- en: 4. The define name dialogue box will appear.
  id: totrans-2000
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 将出现定义名称对话框。
- en: 5. In the Define dialogue box, type a name for the cell and click on Add.
  id: totrans-2001
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 在“定义”对话框中，为单元格输入一个名称并点击“添加”。
- en: 6. Click on Close.
  id: totrans-2002
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 点击“关闭”。
- en: 7. Now click on the cell where the hyper link is to be created.
  id: totrans-2003
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 现在点击要创建超链接的单元格。
- en: 8. Click on Insert Hyperlink or press Ctrl+K.
  id: totrans-2004
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 点击“插入超链接”或按Ctrl+K。
- en: 9. The Insert Hyperlink box will appear.
  id: totrans-2005
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 将出现插入超链接对话框。
- en: 10. Click on the Place in this document option.
  id: totrans-2006
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 点击“在此文档中放置”选项。
- en: 11. Click on the Defined name option. The defined names for the workbook will
    appear.
  id: totrans-2007
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 点击“已定义名称”选项。将出现工作簿的已定义名称。
- en: 12. Select the defined name, which we created in the previous step.
  id: totrans-2008
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 选择我们在上一步中创建的已定义名称。
- en: 13. Click on OK.
  id: totrans-2009
  prefs: []
  type: TYPE_NORMAL
  zh: 13. 点击“确定”。
- en: 14. The link will be created.
  id: totrans-2010
  prefs: []
  type: TYPE_NORMAL
  zh: 14. 将创建链接。
- en: Creating Links to a Different File
  id: totrans-2011
  prefs: []
  type: TYPE_NORMAL
  zh: 创建指向不同文件的链接
- en: 'To create links to a different file, follow these steps:'
  id: totrans-2012
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建指向不同文件的链接，请按照以下步骤操作：
- en: 1. To link a particular cell, first define a name for the cell.
  id: totrans-2013
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 要链接特定单元格，首先为单元格定义一个名称。
- en: 2. Select the cell, then click on the Formula Tab.
  id: totrans-2014
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择单元格，然后点击“公式”选项卡。
- en: 3. Select Define Name. The define name dialogue box will appear.
  id: totrans-2015
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择“定义名称”。将出现定义名称对话框。
- en: 4. In the Define dialogue box, type a name for the cell.
  id: totrans-2016
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在“定义”对话框中，为单元格输入一个名称。
- en: 5. Click on Add, then on Close.
  id: totrans-2017
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 点击“添加”，然后点击“关闭”。
- en: 6. Now click on the cell where the hyperlink is to be created, and click on
    Insert Hyperlink or press Ctrl+K.
  id: totrans-2018
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 现在点击要创建超链接的单元格，然后点击“插入超链接”或按Ctrl+K。
- en: 7. The Insert Hyperlink box will appear.
  id: totrans-2019
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 将出现插入超链接对话框。
- en: 8. Click on Existing file or webpage option.
  id: totrans-2020
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 点击“现有文件或网页”选项。
- en: 9. Browse to the folder where you have saved the file you want to link to.
  id: totrans-2021
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 浏览到您保存要链接的文件的文件夹。
- en: 10. Click on the file in the list that appears.
  id: totrans-2022
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 点击列表中出现的文件。
- en: 11. The path of the file will appear in the address box under it.
  id: totrans-2023
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 文件的路径将出现在其下方的地址框中。
- en: 12. Click OK.
  id: totrans-2024
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 点击“确定”。
- en: 'You may use this method to link to a webpage, as well. To do this, type the
    URL of the webpage into the address box. To link to a particular cell in an Excel
    workbook, do all the steps up to step six in the above process. Add the sheet
    name and cell reference at the end of the file path in the address box in this
    format:'
  id: totrans-2025
  prefs: []
  type: TYPE_NORMAL
  zh: 您也可以使用此方法链接到网页。为此，将网页的URL输入到地址框中。要链接到Excel工作簿中的特定单元格，请在上面的过程中执行所有步骤直到第六步。在地址框中的文件路径末尾添加工作表名称和单元格引用，格式如下：
- en: File Path#sheetname!Named Range
  id: totrans-2026
  prefs: []
  type: TYPE_NORMAL
  zh: 文件路径#工作表名称!命名范围
- en: For example, use c:\test.xlsx#salary!A1 to refer to cell A1 of Salary sheet
    in the file test.xlsx located in the c drive.
  id: totrans-2027
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，使用c:\test.xlsx#salary!A1来引用位于C盘的test.xlsx文件中薪酬工作表的A1单元格。
- en: You may also create a new document while creating a hyperlink, or hyperlink
    to an email address using the options in the hyperlink dialog box.
  id: totrans-2028
  prefs: []
  type: TYPE_NORMAL
  zh: 您也可以在创建超链接时创建新文档，或者使用超链接对话框中的选项链接到电子邮件地址。
- en: Conclusion
  id: totrans-2029
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Working with multiple worksheets, workbooks, and applications requires a solid
    understanding of the available features and techniques. This chapter has provided
    you with valuable insights into establishing links between worksheets, creating
    links between different software, utilizing auditing features, collaborating in
    a workgroup, and creating hyperlinks. By applying these concepts in your day-to-
    day work, you can streamline your data management processes and improve collaboration
    with others. With practice, you will become proficient in working with multiple
    data sources and maximize the potential of your worksheets, workbooks, and applications.
  id: totrans-2030
  prefs: []
  type: TYPE_NORMAL
  zh: 处理多个工作表、工作簿和应用程序需要深入了解可用的功能和技巧。本章为您提供了关于建立工作表之间链接、创建不同软件之间链接、利用审计功能、在工作组中协作以及创建超链接的宝贵见解。通过在日常工作中应用这些概念，您可以简化数据管理流程并提高与他人协作的能力。通过实践，您将熟练处理多个数据源并最大化工作表、工作簿和应用程序的潜力。
- en: Exercises
  id: totrans-2031
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: 1. Open an Excel workbook and create three worksheets named “Sales,” “Expenses,”
    and “Summary.”
  id: totrans-2032
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 打开一个Excel工作簿，创建三个工作表，分别命名为“销售”、“支出”和“摘要”。
- en: 2. In the Sales worksheet, enter monthly sales data for different products.
  id: totrans-2033
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在销售工作表中，输入不同产品的月度销售数据。
- en: 3. In the Expenses worksheet, enter monthly expense data for various categories.
  id: totrans-2034
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在支出工作表中，输入各种类别的月度支出数据。
- en: 4. Use intersheet referencing to calculate the total sales and total expenses
    in the Summary worksheet.
  id: totrans-2035
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 使用跨工作表引用在摘要工作表中计算总销售额和总支出。
- en: 5. Consolidate the data from the Sales and Expenses worksheets into a separate
    worksheet using the consolidation feature.
  id: totrans-2036
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 使用合并功能将销售和支出工作表中的数据合并到一个单独的工作表中。
- en: 6. Create a link between an Excel worksheet and a Word document. Copy the consolidated
    data from the Excel worksheet and paste it into the Word document as a linked
    object.
  id: totrans-2037
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 创建Excel工作表和Word文档之间的链接。将合并后的数据从Excel工作表复制并粘贴到Word文档中作为链接对象。
- en: 7. Use the auditing features offered by Excel to trace precedents and dependents
    for a specific formula in one of the worksheets.
  id: totrans-2038
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 使用Excel提供的审计功能追踪工作表中特定公式的先决条件和依赖项。
- en: 8. Share the workbook with a colleague and allow simultaneous editing.
  id: totrans-2039
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 与同事共享工作簿并允许同时编辑。
- en: 9. Merge changes from multiple copies of the workbook back into a single workbook.
  id: totrans-2040
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 将工作簿多个副本的更改合并回单个工作簿。
- en: 10. Track changes made by different users in the workbook and review and accept
    or reject the changes.
  id: totrans-2041
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 跟踪工作簿中不同用户所做的更改，并审查和接受或拒绝这些更改。
- en: CHAPTER  13
  id: totrans-2042
  prefs: []
  type: TYPE_NORMAL
  zh: 第13章
- en: Working with Charts
  id: totrans-2043
  prefs: []
  type: TYPE_NORMAL
  zh: 处理图表
- en: Introduction
  id: totrans-2044
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In this chapter, we will explore the topic of working with charts in Excel.
    Charts are a powerful tool for visualizing data and presenting it in a meaningful
    way. By creating charts, you can quickly analyze trends, compare data, and communicate
    information effectively. This chapter will guide you through the process of creating
    charts using chart tools, understanding different chart designs, formatting charts,
    and utilizing recommendations provided by Excel. We will also introduce sparklines,
    which are compact charts that can be embedded within cells to provide a snapshot
    of data trends.
  id: totrans-2045
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨在Excel中处理图表的主题。图表是可视化数据和以有意义方式呈现数据的有力工具。通过创建图表，您可以快速分析趋势、比较数据并有效地传达信息。本章将指导您使用图表工具创建图表、理解不同的图表设计、格式化图表以及利用Excel提供的建议。我们还将介绍Sparklines，这些是紧凑的图表，可以嵌入到单元格中，以提供数据趋势的快照。
- en: Structure
  id: totrans-2046
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-2047
  prefs: []
  type: TYPE_NORMAL
  zh: 本章我们将讨论以下主题：
- en: ■Creating charts using chart tools
  id: totrans-2048
  prefs: []
  type: TYPE_NORMAL
  zh: ■使用图表工具创建图表
- en: ■Chart designs
  id: totrans-2049
  prefs: []
  type: TYPE_NORMAL
  zh: ■图表设计
- en: ■Formatting charts
  id: totrans-2050
  prefs: []
  type: TYPE_NORMAL
  zh: ■格式化图表
- en: ■Recommendations
  id: totrans-2051
  prefs: []
  type: TYPE_NORMAL
  zh: ■建议
- en: ■Sparklines
  id: totrans-2052
  prefs: []
  type: TYPE_NORMAL
  zh: ■Sparklines
- en: Objectives
  id: totrans-2053
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: After studying this chapter, the reader will be able to create a chart using
    chart tools, identify different types of charts, and format charts.
  id: totrans-2054
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习本章之后，读者将能够使用图表工具创建图表，识别不同类型的图表，并格式化图表。
- en: Creating Charts Using Chart Tools
  id: totrans-2055
  prefs: []
  type: TYPE_NORMAL
  zh: 使用图表工具创建图表
- en: 'Charts may be used to present data more effectively. For example, it takes
    time to analyze trends in data, but if it is graphically represented, it will
    be easier to understand. There are many types of charts, such as column, line,
    pie, bar, area, and scatter. To create a chart, follow the steps below:'
  id: totrans-2056
  prefs: []
  type: TYPE_NORMAL
  zh: 图表可以用来更有效地展示数据。例如，分析数据趋势需要时间，但如果以图形方式表示，则更容易理解。有许多类型的图表，如柱形、折线、饼形、条形、面积和散点图。要创建图表，请按照以下步骤操作：
- en: 1. Select the data.
  id: totrans-2057
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择数据。
- en: 2. Go to the Insert tab.
  id: totrans-2058
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 转到“插入”选项卡。
- en: 3. From the Charts group, select the chart that you want to create, as shown
    in [Figure 13.1](#fig13-1).
  id: totrans-2059
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 从“图表”组中选择你想要创建的图表，如图[图13.1](#fig13-1)所示。
- en: 4. We can select any type of Column chart or click on All Chart Types | Insert
    Chart. The dialog box will appear.
  id: totrans-2060
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 我们可以选择任何类型的柱形图或点击“所有图表类型”|“插入图表”。将出现对话框。
- en: 5. Select the desired chart.
  id: totrans-2061
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 选择所需的图表。
- en: 6. Click OK.
  id: totrans-2062
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 点击“确定”。
- en: 7. The chart will be created in the same worksheet. Excel will recommend charts
    in the dialog box.
  id: totrans-2063
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 图表将在同一工作表中创建。Excel将在对话框中推荐图表。
- en: Refer to [Figure 13.1](#fig13-1).
  id: totrans-2064
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图[图13.1](#fig13-1)。
- en: '![image](image/Figure_13.1.jpg)'
  id: totrans-2065
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_13.1.jpg)'
- en: Figure 13.1 Charts
  id: totrans-2066
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.1 图表
- en: Chart Designs
  id: totrans-2067
  prefs: []
  type: TYPE_NORMAL
  zh: 图表设计
- en: Excel provides different chart designs with every chart type, which we can select
    from the Design Tab. An example of the Design Gallery can be seen in [Figure 13.2](#fig13-2).
  id: totrans-2068
  prefs: []
  type: TYPE_NORMAL
  zh: Excel为每种图表类型提供不同的图表设计，我们可以在“设计”选项卡中选择。设计图库的示例可以在[图13.2](#fig13-2)中看到。
- en: '![image](image/Figure_13.2.jpg)'
  id: totrans-2069
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_13.2.jpg)'
- en: Figure 13.2 Chart Designs
  id: totrans-2070
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.2 图表设计
- en: Adding Titles and Values in Charts Using Chart Tools
  id: totrans-2071
  prefs: []
  type: TYPE_NORMAL
  zh: 使用图表工具在图表中添加标题和值
- en: Excel provides some built-in layouts. These can be selected from the Design
    tab in Chart Tools. The user can also create some custom layouts, and set the
    Axis Title, Chart Title, Legend, Data Label, and Data Table positions according
    to their needs.
  id: totrans-2072
  prefs: []
  type: TYPE_NORMAL
  zh: Excel提供了一些内置布局。这些可以从图表工具中的“设计”选项卡中选择。用户还可以创建一些自定义布局，并根据需要设置轴标题、图表标题、图例、数据标签和数据表的位置。
- en: To do this, follow the steps below.
  id: totrans-2073
  prefs: []
  type: TYPE_NORMAL
  zh: 要这样做，请按照以下步骤操作。
- en: 1. Use the Design Tab. Click on the Add Chart Element option in the Charts Layout
    Group.
  id: totrans-2074
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 使用“设计”选项卡。在图表布局组中点击“添加图表元素”选项。
- en: 2. Add a Chart Element.
  id: totrans-2075
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 添加图表元素。
- en: 3. Under the Add Chart Element option, there are many options given to the user
    for formatting the chart, such as adding a secondary axis, adding a name to the
    axis or to charts, adding a data label, and so on.
  id: totrans-2076
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“添加图表元素”选项下，用户有许多格式化图表的选项，例如添加次要轴、给轴或图表添加名称、添加数据标签等。
- en: Refer to [Figure 13.3](#fig13-3).
  id: totrans-2077
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图[图13.3](#fig13-3)。
- en: '![image](image/Figure_13.3.jpg)'
  id: totrans-2078
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_13.3.jpg)'
- en: Figure 13.3 Associated Options of a Chart
  id: totrans-2079
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.3 图表的关联选项
- en: Formatting Charts
  id: totrans-2080
  prefs: []
  type: TYPE_NORMAL
  zh: 格式化图表
- en: Excel provides a way to change the default color of the various parts of the
    default design templates.
  id: totrans-2081
  prefs: []
  type: TYPE_NORMAL
  zh: Excel提供了一种更改默认设计模板中各种部分默认颜色的方式。
- en: To do so, use the contextual tab Format under the Chart Tools tab group. It
    will provide various options to change the outline color, shape alignment, and
    positioning of the chart.
  id: totrans-2082
  prefs: []
  type: TYPE_NORMAL
  zh: 要这样做，请使用图表工具选项卡下的上下文选项卡“格式”。它将提供各种选项来更改图表轮廓颜色、形状对齐和位置。
- en: Charts for Data
  id: totrans-2083
  prefs: []
  type: TYPE_NORMAL
  zh: 数据图表
- en: According to your needs, you may select different types of charts to represent
    the data.
  id: totrans-2084
  prefs: []
  type: TYPE_NORMAL
  zh: 根据您的需求，您可以选择不同类型的图表来有效地表示数据。
- en: '[Table 13.1](#tab13-1) shows various types of data and the charts that can
    be used to represent them effectively:'
  id: totrans-2085
  prefs: []
  type: TYPE_NORMAL
  zh: '[表13.1](#tab13-1)显示了各种类型的数据和可以用来有效表示它们的图表：'
- en: TABLE 13.1 Types of Chart
  id: totrans-2086
  prefs: []
  type: TYPE_NORMAL
  zh: 表13.1 图表类型
- en: '| Type of Chart | Data Represented |'
  id: totrans-2087
  prefs: []
  type: TYPE_TB
  zh: '| 图表类型 | 表示的数据 |'
- en: '| Column Chart | Represents change in data over a period of time. |'
  id: totrans-2088
  prefs: []
  type: TYPE_TB
  zh: '| 柱形图 | 表示一段时间内数据的变化。|'
- en: '| Bar Chart | Represents Numerical Comparisons. |'
  id: totrans-2089
  prefs: []
  type: TYPE_TB
  zh: '| 柱形图 | 表示数值比较。|'
- en: '| Line Chart | Represents evenly spaced values. |'
  id: totrans-2090
  prefs: []
  type: TYPE_TB
  zh: '| 折线图 | 表示均匀分布的值。|'
- en: '| Scatter Chart | Displays and compares numeric values, like statistical, scientific,
    and engineering data. |'
  id: totrans-2091
  prefs: []
  type: TYPE_TB
  zh: '| 散点图 | 显示并比较数值，如统计、科学和工程数据。 |'
- en: '| Pie Chart | Represents associations of different values in a given value.
    |'
  id: totrans-2092
  prefs: []
  type: TYPE_TB
  zh: '| 饼图 | 表示给定值中不同值之间的关联。 |'
- en: '| Doughnut Chart | Represents the relationship of parts to a whole. |'
  id: totrans-2093
  prefs: []
  type: TYPE_TB
  zh: '| 饼图 | 表示部分与整体的关系。 |'
- en: '| Bubble Chart | Represents financial data. |'
  id: totrans-2094
  prefs: []
  type: TYPE_TB
  zh: '| 气泡图 | 表示财务数据。 |'
- en: '| Area Chart | Represents optimum combinations between two sets of data. |'
  id: totrans-2095
  prefs: []
  type: TYPE_TB
  zh: '| 面积图 | 表示两组数据之间的最佳组合。 |'
- en: '| Radar Chart | Used when you want to look at several different factors related
    to one item. |'
  id: totrans-2096
  prefs: []
  type: TYPE_TB
  zh: '| 雷达图 | 当您想查看与一个项目相关的多个不同因素时使用。 |'
- en: Chart Templates
  id: totrans-2097
  prefs: []
  type: TYPE_NORMAL
  zh: 图表模板
- en: 'Sometimes, after creating a chart, we decide to use the same design in the
    future, as well. This may be difficult to do manually every time. Excel provides
    a way in which you can save your charts as templates. Perform the following steps
    to save a chart as a template:'
  id: totrans-2098
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，在创建图表后，我们决定将来也使用相同的设计。这每次手动操作可能很困难。Excel 提供了一种方法，您可以将其图表保存为模板。执行以下步骤以将图表保存为模板：
- en: 1. After creating the chart, right click on Charts and select the Save as Templates
    option.
  id: totrans-2099
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 创建图表后，右键点击“图表”并选择“另存为模板”选项。
- en: 2. The Save as dialog box will appear. Save your chart.
  id: totrans-2100
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 将会出现“另存为”对话框。保存您的图表。
- en: 'In the future, if you wish to use this template, perform the following steps:'
  id: totrans-2101
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来，如果您想使用此模板，请执行以下步骤：
- en: 1. Right-click on the newly created chart.
  id: totrans-2102
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 右键点击新创建的图表。
- en: 2. A context menu appears. Click on Change Chart Type.
  id: totrans-2103
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 将出现上下文菜单。点击“更改图表类型”。
- en: 3. In the Insert Chart dialog box, click on Templates. Here, you can see all
    your saved templates here.
  id: totrans-2104
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“插入图表”对话框中，点击“模板”。在这里，您可以查看所有已保存的模板。
- en: 4. Select the required template you want to apply to the current chart.
  id: totrans-2105
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 选择要应用到当前图表的所需模板。
- en: Chart Filter Option
  id: totrans-2106
  prefs: []
  type: TYPE_NORMAL
  zh: 图表筛选选项
- en: Another impressive feature is the chart filters option, which lays out all variables
    (series) and categories for an interactive view when you insert the chart. It
    can be difficult to filter the chart information. If you want to see only the
    information you require, make use of the Chart Filter button.
  id: totrans-2107
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个令人印象深刻的功能是图表筛选选项，当您插入图表时，它会列出所有变量（系列）和类别，以供交互式查看。筛选图表信息可能很困难。如果您只想查看所需的信息，请使用图表筛选按钮。
- en: Waterfall Chart
  id: totrans-2108
  prefs: []
  type: TYPE_NORMAL
  zh: 瀑布图
- en: 'To create a Waterfall Chart in Excel, you can follow these steps:'
  id: totrans-2109
  prefs: []
  type: TYPE_NORMAL
  zh: 要在 Excel 中创建瀑布图，您可以按照以下步骤操作：
- en: 1. Select the table that includes the category and value data.
  id: totrans-2110
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择包含类别和值数据的表格。
- en: 2. Go to the Insert tab in the Excel ribbon.
  id: totrans-2111
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在 Excel 标签栏中转到“插入”选项卡。
- en: 3. In the Charts section, click on the Waterfall chart type.
  id: totrans-2112
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“图表”部分中，点击“瀑布图”类型。
- en: 4. Select the desired Waterfall Chart subtype (for example, “Waterfall” or “Stacked
    Waterfall”).
  id: totrans-2113
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 选择所需的瀑布图子类型（例如，“瀑布”或“堆叠瀑布”）。
- en: 5. Excel will generate the Waterfall Chart based on the selected data provided
    in [Figure 13.4](#fig13-4).
  id: totrans-2114
  prefs: []
  type: TYPE_NORMAL
  zh: 5. Excel 将根据[图 13.4](#fig13-4)中提供的所选数据生成瀑布图。
- en: '![image](image/Figure_13.jpg)'
  id: totrans-2115
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_13.jpg)'
- en: Figure 13.4 Data Provided for Chart
  id: totrans-2116
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.4 为图表提供的数据
- en: The Chart can be seen in [Figure 13.5](#fig13-5).
  id: totrans-2117
  prefs: []
  type: TYPE_NORMAL
  zh: 图表可以在[图 13.5](#fig13-5)中查看。
- en: '![image](image/Figure_13.5.jpg)'
  id: totrans-2118
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_13.5.jpg)'
- en: Figure 13.5 Waterfall Graph
  id: totrans-2119
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.5 瀑布图
- en: The resulting Waterfall Chart will display each category as a bar, with positive
    values represented by bars rising above the starting point and negative values
    shown as bars going below the starting point. The cumulative total is represented
    by the length and position of each bar.
  id: totrans-2120
  prefs: []
  type: TYPE_NORMAL
  zh: 结果的瀑布图将显示每个类别为一个条形，正值由高于起点的条形表示，负值则显示为低于起点的条形。累计总数由每个条形的长度和位置表示。
- en: Recommendations
  id: totrans-2121
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐
- en: The Insert tab is rich with new features, from recommended pivot tables to recommended
    charts. Excel provides recommendations for achieving the most in the least amount
    of time. For the best results, use the recommendations offered by Excel.
  id: totrans-2122
  prefs: []
  type: TYPE_NORMAL
  zh: “插入”选项卡功能丰富，从推荐的透视表到推荐的图表。Excel 提供了在最少时间内实现最大效果的推荐。为了获得最佳结果，请使用 Excel 提供的推荐。
- en: 'To use the recommendation, perform the following steps:'
  id: totrans-2123
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用此推荐，请执行以下步骤：
- en: 1. Select the data to create a chart.
  id: totrans-2124
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择要创建图表的数据。
- en: 2. Click on the Insert tab.
  id: totrans-2125
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击“插入”选项卡。
- en: 3. Select Recommended chart options. You will get a view offering various chart
    types.
  id: totrans-2126
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择推荐的图表选项。您将获得提供各种图表类型的视图。
- en: 4. Select any of the options.
  id: totrans-2127
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 选择任何选项。
- en: Sparklines
  id: totrans-2128
  prefs: []
  type: TYPE_NORMAL
  zh: Sparklines
- en: Sparklines are tiny charts that fit in a cell. Sparklines helps users to view
    summary trends alongside data. It takes up a small amount of space. It is especially
    useful for dashboards or other places where you need to show a snapshot of your
    business in an easy-to understand visual format without adding much detail. For
    example, [Figure 13.6](#fig13-6) and [Figure 13.7](#fig13-7) show how a Sparkline
    lets you see at a glance how each department performed in May.
  id: totrans-2129
  prefs: []
  type: TYPE_NORMAL
  zh: Sparklines是适合单元格的小型图表。Sparklines帮助用户在数据旁边查看总结趋势。它占用很少的空间。它特别适用于仪表板或其他需要以易于理解的可视化格式展示业务快照而无需添加太多细节的地方。例如，[图13.6](#fig13-6)和[图13.7](#fig13-7)展示了Sparkline如何让您一眼看出每个部门在五月份的表现。
- en: '![image](image/Figure_13.6.jpg)'
  id: totrans-2130
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_13.6.jpg)'
- en: Figure 13.6 Sparklines Example 1
  id: totrans-2131
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.6 Sparklines示例1
- en: Refer to [Figure 13.7](#fig13-7).
  id: totrans-2132
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图13.7[Figure 13.7](#fig13-7)。
- en: '![image](image/Figure_13.7.jpg)'
  id: totrans-2133
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_13.7.jpg)'
- en: Figure 13.7 Sparklines Example 2
  id: totrans-2134
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.7 Sparklines示例2
- en: Create a Sparkline
  id: totrans-2135
  prefs: []
  type: TYPE_NORMAL
  zh: 创建Sparkline
- en: To create Sparklines, follow the steps below.
  id: totrans-2136
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建Sparklines，请按照以下步骤操作。
- en: 1. Select an empty cell or a group of empty cells in which you want to insert
    one or more sparklines.
  id: totrans-2137
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择一个空单元格或一组空单元格，在其中插入一个或多个Sparklines。
- en: '2. On the Insert tab, in the Sparklines group, click the type of Sparkline
    that you want to create: Line, Column, or Win/Loss.'
  id: totrans-2138
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“插入”选项卡的Sparklines组中，单击您想要创建的Sparkline类型：线形、柱形或胜负。
- en: 3. In the Data box, type the range of the cells that contain the data on which
    you want to base the earlier scenario.
  id: totrans-2139
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“数据”框中，输入包含您想要基于之前场景的数据的单元格范围。
- en: 4. After selecting one or more sparklines, the Sparkline Tools appear and display
    the Design tab.
  id: totrans-2140
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 选择一个或多个Sparklines后，Sparkline工具将出现并显示“设计”选项卡。
- en: 5. On the Design tab, you can select one or more of several commands from among
    the Sparkline, Type, Show/Hide, and Style groups.
  id: totrans-2141
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 在“设计”选项卡上，您可以从Sparkline、类型、显示/隐藏和样式组中选择一个或多个命令。
- en: 6. Use these commands to create a new Sparkline, change its type, format it,
    show or hide data points on a line Sparkline, or format the vertical axis in a
    Sparkline group.
  id: totrans-2142
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 使用这些命令创建新的Sparkline，更改其类型，格式化它，在折线Sparkline上显示或隐藏数据点，或在Sparkline组中格式化垂直轴。
- en: Customize Sparklines
  id: totrans-2143
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义Sparklines
- en: After you create sparklines, Excel provides you with options to customize sparklines,
    such as adjusting the high, low, first, last, or any negative values. You can
    also change the type of the sparkline into other types, such as Line, Column,
    or Win/Loss. You can also style from a gallery or set individual formatting options,
    set options on the vertical axis, and control how empty or zero values are displayed.
  id: totrans-2144
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建Sparklines之后，Excel为您提供了自定义Sparklines的选项，例如调整高、低、第一个、最后一个或任何负值。您还可以将Sparklines的类型更改为其他类型，例如线形、柱形或胜负。您还可以从图库中选择样式或设置单个格式选项，设置垂直轴选项，并控制空值或零值的显示方式。
- en: Change the Style of Sparklines
  id: totrans-2145
  prefs: []
  type: TYPE_NORMAL
  zh: 更改Sparklines的样式
- en: 'Use the Style gallery on the Design tab, which becomes available when you select
    a cell that contains data. Perform the following steps to change the style of
    Sparklines:'
  id: totrans-2146
  prefs: []
  type: TYPE_NORMAL
  zh: 使用“设计”选项卡上的样式图库，当您选择包含数据的单元格时，它将变得可用。执行以下步骤以更改Sparklines的样式：
- en: 1. Select a single sparkline or a sparkline group.
  id: totrans-2147
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 选择单个Sparkline或Sparkline组。
- en: 2. To apply a predefined style, on the Design tab.
  id: totrans-2148
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 要应用预定义的样式，请转到“设计”选项卡。
- en: 3. In the Style group, click a style, or click the arrow at the lower right
    corner of the box to see additional styles.
  id: totrans-2149
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“样式”组中，单击一个样式，或单击框的右下角箭头以查看更多样式。
- en: 4. Choose a specific formatting for a sparkline.
  id: totrans-2150
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 为Sparkline选择特定的格式。
- en: Conclusion
  id: totrans-2151
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Charts are an essential tool in Excel for presenting data in a visual and easily
    understandable format. By mastering the techniques discussed in this chapter,
    you will be able to create, customize, and format charts effectively. Whether
    you need to analyze trends, compare data, or communicate information to others,
    charts can greatly enhance the clarity and impact of your data presentations.
  id: totrans-2152
  prefs: []
  type: TYPE_NORMAL
  zh: 图表是Excel中用于以视觉和易于理解的方式呈现数据的必备工具。通过掌握本章讨论的技术，您将能够有效地创建、自定义和格式化图表。无论您需要分析趋势、比较数据还是向他人传达信息，图表都可以极大地增强您数据展示的清晰度和影响力。
- en: Exercises
  id: totrans-2153
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: 1. Select a set of data from your own spreadsheet or create a sample dataset.
  id: totrans-2154
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 从您的电子表格中选择一组数据或创建一个示例数据集。
- en: 2. Create a column chart using the selected data.
  id: totrans-2155
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 使用所选数据创建柱形图。
- en: 3. Customize the chart by adding titles, legends, and data labels.
  id: totrans-2156
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 通过添加标题、图例和数据标签来自定义图表。
- en: 4. Apply different chart designs to the created chart and observe the changes.
  id: totrans-2157
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 将不同的图表设计应用到创建的图表中，并观察变化。
- en: 5. Format the chart by changing colors, outlines, and other formatting options.
  id: totrans-2158
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 通过更改颜色、轮廓和其他格式选项来格式化图表。
- en: 6. Save the chart as a template for future use.
  id: totrans-2159
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 将图表保存为模板以供将来使用。
- en: 7. Use the recommendation feature in Excel to explore different chart options
    for your dataset.
  id: totrans-2160
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 使用Excel中的推荐功能来探索数据集的不同图表选项。
- en: 8. Create a sparkline in a cell to represent a trend within a subset of your
    data.
  id: totrans-2161
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 在单元格中创建一个sparkline来表示数据子集中的趋势。
- en: 9. Customize the sparkline by changing its type, style, and formatting options.
  id: totrans-2162
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 通过更改类型、样式和格式选项来自定义sparkline。
- en: 10. Share your chart and sparkline with others to showcase your data analysis
    and visualization skills.
  id: totrans-2163
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 与他人分享您的图表和sparkline，以展示您数据分析可视化的技能。
- en: CHAPTER  14
  id: totrans-2164
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章
- en: Creating and Recording Macros in VBA
  id: totrans-2165
  prefs: []
  type: TYPE_NORMAL
  zh: 在VBA中创建和记录宏
- en: Introduction
  id: totrans-2166
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In this chapter, we will explore the world of VBA macros and their role in automating
    repetitive tasks in Microsoft Excel. VBA, which stands for Visual Basic for Applications,
    is a powerful programming language embedded within Excel. Macros, which are sequences
    of commands, allow us to automate actions and streamline our workflows. Whether
    you are new to VBA or have some experience, this chapter provides a comprehensive
    guide to creating and recording macros. You will learn the fundamentals of VBA,
    the benefits of macros, and how to create macros through writing code or recording
    actions. Get ready to boost your productivity and efficiency in Excel with the
    power of VBA macros.
  id: totrans-2167
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨VBA宏的世界及其在Microsoft Excel中自动化重复性任务的作用。VBA代表应用程序的Visual Basic，是嵌入在Excel中的强大编程语言。宏，即一系列命令，使我们能够自动化操作并简化我们的工作流程。无论你是VBA的新手还是有经验，本章都提供了一个创建和记录宏的全面指南。你将学习VBA的基础知识、宏的好处以及如何通过编写代码或记录操作来创建宏。准备好利用VBA宏的力量来提高你在Excel中的生产力和效率。
- en: Structure
  id: totrans-2168
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-2169
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Introduction to VBA
  id: totrans-2170
  prefs: []
  type: TYPE_NORMAL
  zh: ■VBA简介
- en: ■Introduction to Macros
  id: totrans-2171
  prefs: []
  type: TYPE_NORMAL
  zh: ■宏简介
- en: ■Creating a Macro
  id: totrans-2172
  prefs: []
  type: TYPE_NORMAL
  zh: ■创建宏
- en: ■Recording a Macro
  id: totrans-2173
  prefs: []
  type: TYPE_NORMAL
  zh: ■录制宏
- en: ■Defining a Macro
  id: totrans-2174
  prefs: []
  type: TYPE_NORMAL
  zh: ■定义宏
- en: ■Stop Recording
  id: totrans-2175
  prefs: []
  type: TYPE_NORMAL
  zh: ■停止录制
- en: ■Relative Reference Macro
  id: totrans-2176
  prefs: []
  type: TYPE_NORMAL
  zh: ■相对引用宏
- en: ■Running Your Macro
  id: totrans-2177
  prefs: []
  type: TYPE_NORMAL
  zh: ■运行您的宏
- en: ■Running the Macro by Name
  id: totrans-2178
  prefs: []
  type: TYPE_NORMAL
  zh: ■按名称运行宏
- en: Objectives
  id: totrans-2179
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: This chapter will introduce VBA and macros, explain the process of creating
    and recording macros, define macros and their properties, demonstrate how to run
    macros, and provide practical examples for creating macros to automate tasks in
    Excel.
  id: totrans-2180
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将介绍VBA和宏，解释创建和记录宏的过程，定义宏及其属性，演示如何运行宏，并提供创建宏以在Excel中自动化任务的实用示例。
- en: Introduction to VBA
  id: totrans-2181
  prefs: []
  type: TYPE_NORMAL
  zh: VBA简介
- en: VBA stands for Visual Basic for Applications. It is a programming language that
    is included with all the Microsoft Office applications, such as Excel, Word, PowerPoint,
    and so on. It is also the language that Excel macros are written in. VBA is a
    subset of Microsoft Visual Basic.
  id: totrans-2182
  prefs: []
  type: TYPE_NORMAL
  zh: VBA代表应用程序的Visual Basic。它是包含在所有Microsoft Office应用程序中，如Excel、Word、PowerPoint等的应用程序的一部分。它也是Excel宏所使用的语言。VBA是Microsoft
    Visual Basic的一个子集。
- en: Uses of VBA
  id: totrans-2183
  prefs: []
  type: TYPE_NORMAL
  zh: VBA的使用
- en: 'Some of the uses of VBA are as follows:'
  id: totrans-2184
  prefs: []
  type: TYPE_NORMAL
  zh: VBA的一些用途如下：
- en: ■To drive an entire application.
  id: totrans-2185
  prefs: []
  type: TYPE_NORMAL
  zh: ■驱动整个应用程序。
- en: ■To combine multiple actions in one action, that is, a macro.
  id: totrans-2186
  prefs: []
  type: TYPE_NORMAL
  zh: ■将多个操作合并为一个操作，即宏。
- en: ■To write your own functions.
  id: totrans-2187
  prefs: []
  type: TYPE_NORMAL
  zh: ■编写自己的函数。
- en: Introduction to Macros
  id: totrans-2188
  prefs: []
  type: TYPE_NORMAL
  zh: 宏简介
- en: A macro is a series of commands written in logical order, meant to automate
    any repeated task. It is stored in the Microsoft Visual Basic Module. It can be
    assigned to the Add-ins tab or to a button on the Quick Access Toolbar.
  id: totrans-2189
  prefs: []
  type: TYPE_NORMAL
  zh: 宏是一系列按逻辑顺序编写的命令，旨在自动化任何重复性任务。它存储在Microsoft Visual Basic模块中。它可以分配到“添加-ins”选项卡或快速访问工具栏上的按钮。
- en: 'Below are some examples of how macros are used:'
  id: totrans-2190
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一些宏使用示例：
- en: ■To automatically add a standard company header to any spreadsheet at the press
    of a button.
  id: totrans-2191
  prefs: []
  type: TYPE_NORMAL
  zh: ■按按钮自动添加标准公司页眉到任何电子表格。
- en: ■To format a text file from a general ledger system into a more usable format.
  id: totrans-2192
  prefs: []
  type: TYPE_NORMAL
  zh: ■将总账系统中的文本文件格式化为更易用的格式。
- en: ■To print out certain sheets from within a workbook, rather than going through
    each sheet and printing individually.
  id: totrans-2193
  prefs: []
  type: TYPE_NORMAL
  zh: ■在电子表格内部打印某些工作表，而不是逐个打印每个工作表。
- en: Creating a Macro
  id: totrans-2194
  prefs: []
  type: TYPE_NORMAL
  zh: 创建宏
- en: 'There are two methods used to create macros:'
  id: totrans-2195
  prefs: []
  type: TYPE_NORMAL
  zh: 创建宏有两种方法：
- en: '■Writing: Write code for the actions in the sequence using VBA language for
    the macros.'
  id: totrans-2196
  prefs: []
  type: TYPE_NORMAL
  zh: ■编写：使用 VBA 语言为宏中的操作编写代码。
- en: '■Recording: Record your actions in Excel using Macro Recorder. Excel has a
    Macro Recorder which records the action and writes the code for the macro.'
  id: totrans-2197
  prefs: []
  type: TYPE_NORMAL
  zh: ■录制：使用宏录制器在 Excel 中记录您的操作。Excel 有一个宏录制器，它记录操作并为宏编写代码。
- en: 'The best approach when it comes to creating a macro is to follow the steps
    below:'
  id: totrans-2198
  prefs: []
  type: TYPE_NORMAL
  zh: 创建宏的最佳方法如下：
- en: 1. Identify the exact problem and the end result that the user wants from the
    macro.
  id: totrans-2199
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 确定用户希望从宏中获得的确切问题和最终结果。
- en: 2. Plan the steps of your macro to obtain the end result successfully.
  id: totrans-2200
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 规划宏的步骤以成功获得最终结果。
- en: 3. Create your macro either by recording, writing, or combining both.
  id: totrans-2201
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 通过录制、编写或结合两者来创建您的宏。
- en: Note Record the actions which you have taken in Excel, or write them.
  id: totrans-2202
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：记录在 Excel 中执行的操作，或将其写入。
- en: Adding a Developer Tab on the Ribbon
  id: totrans-2203
  prefs: []
  type: TYPE_NORMAL
  zh: 在功能区添加开发者选项卡
- en: 'To add a developer tab on Ribbon, follow these steps:'
  id: totrans-2204
  prefs: []
  type: TYPE_NORMAL
  zh: 要在功能区添加开发者选项卡，请按照以下步骤操作：
- en: 1. Click on the File Button.
  id: totrans-2205
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 点击“文件”按钮。
- en: 2. Click on the Options… button.
  id: totrans-2206
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击“选项…”按钮。
- en: 3. On the Customize Ribbon Tab, then select Show Developer Tab in the Ribbon,
    as shown in [Figure 14.1](#fig14-1).
  id: totrans-2207
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“自定义功能区”选项卡上，然后选择“在功能区中显示开发者选项卡”，如图 [图 14.1](#fig14-1) 所示。
- en: '![image](image/Figure_14.1.jpg)'
  id: totrans-2208
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_14.1.jpg)'
- en: Figure 14.1 Adding Developer Tab on the Ribbon
  id: totrans-2209
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.1 在功能区添加开发者选项卡
- en: Recording a Macro
  id: totrans-2210
  prefs: []
  type: TYPE_NORMAL
  zh: 录制宏
- en: 'To record a macro, follow these steps:'
  id: totrans-2211
  prefs: []
  type: TYPE_NORMAL
  zh: 要录制宏，请按照以下步骤操作：
- en: 1. Click on the Developer Tab.
  id: totrans-2212
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 点击“开发者”选项卡。
- en: 2. In group Code, click on the Record Macro button, as shown in [Figure 14.2](#fig14-2).
  id: totrans-2213
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在“代码”组中，点击如图 14.2 所示的“录制宏”按钮，[图 14.2](#fig14-2)。
- en: '![image](image/Figure_14.2.jpg)'
  id: totrans-2214
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_14.2.jpg)'
- en: Figure 14.2 Recording a Macro
  id: totrans-2215
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.2 录制宏
- en: Defining a Macro
  id: totrans-2216
  prefs: []
  type: TYPE_NORMAL
  zh: 定义宏
- en: 'To define a macro, follow these steps:'
  id: totrans-2217
  prefs: []
  type: TYPE_NORMAL
  zh: 要定义宏，请按照以下步骤操作：
- en: '![image](image/Figure_14.3.jpg)'
  id: totrans-2218
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_14.3.jpg)'
- en: Figure 14.3 Defining a Macro
  id: totrans-2219
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14.3 定义宏
- en: 'When it comes to assigning names to macros, follow these rules:'
  id: totrans-2220
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到为宏命名时，请遵循以下规则：
- en: ■The macro name can consist of letters and numbers.
  id: totrans-2221
  prefs: []
  type: TYPE_NORMAL
  zh: ■宏名称可以由字母和数字组成。
- en: ■It should not start with digits.
  id: totrans-2222
  prefs: []
  type: TYPE_NORMAL
  zh: ■它不应以数字开头。
- en: ■It should not have any special symbol, except underscore (_).
  id: totrans-2223
  prefs: []
  type: TYPE_NORMAL
  zh: ■它不应该有任何特殊符号，除了下划线 (_)。
- en: ■It can have a maximum of 255 characters.
  id: totrans-2224
  prefs: []
  type: TYPE_NORMAL
  zh: ■它最多可以有 255 个字符。
- en: ■Do not use a macro name that is also a cell reference.
  id: totrans-2225
  prefs: []
  type: TYPE_NORMAL
  zh: ■不要使用也是单元格引用的宏名称。
- en: Macro Storage
  id: totrans-2226
  prefs: []
  type: TYPE_NORMAL
  zh: 宏存储
- en: 'The different macro storage options are as follows:'
  id: totrans-2227
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的宏存储选项如下：
- en: '■Personal Macro Workbook: The recording will be performed on the current workbook,
    and the macro will be stored in a file named Personal.xls. This is a hidden file
    (located inside the XLSTART folder) which is opened whenever the Excel application
    is open.'
  id: totrans-2228
  prefs: []
  type: TYPE_NORMAL
  zh: ■个人宏工作簿：录制将在当前工作簿上进行，宏将存储在名为 Personal.xls 的文件中。这是一个隐藏文件（位于 XLSTART 文件夹中），每当
    Excel 应用程序打开时都会打开。
- en: '■This Workbook: Recording will be performed on the current workbook and the
    macro will be stored in the current file.'
  id: totrans-2229
  prefs: []
  type: TYPE_NORMAL
  zh: ■当前工作簿：录制将在当前工作簿上进行，宏将存储在当前文件中。
- en: '■New Workbook: Recording will be performed on the current workbook and the
    macro will be stored in a new file.'
  id: totrans-2230
  prefs: []
  type: TYPE_NORMAL
  zh: ■新工作簿：录制将在当前工作簿上进行，宏将存储在新文件中。
- en: Note Macros can be used if the file in which they are stored is open. If you
    want a macro to be available whenever you use Excel, select the Personal Macro
    Workbook option.
  id: totrans-2231
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：如果存储宏的文件已打开，则可以使用宏。如果您希望宏在您使用 Excel 时始终可用，请选择“个人宏工作簿”选项。
- en: Macro Shortcut
  id: totrans-2232
  prefs: []
  type: TYPE_NORMAL
  zh: 宏快捷键
- en: 'You can use Ctrl+ Letter (for lowercase letters) or Ctrl + Shift+ letter (for
    uppercase letters), where letter is any letter key on the keyboard. The shortcut
    key letter you use cannot be a number or a special character, such as @ or #.
    The shortcut key will override any equivalent default Microsoft Excel shortcut
    keys while the workbook that contains the macro is open.'
  id: totrans-2233
  prefs: []
  type: TYPE_NORMAL
  zh: '您可以使用 Ctrl+字母（对于小写字母）或 Ctrl + Shift+字母（对于大写字母），其中字母是键盘上的任何字母键。您使用的快捷键字母不能是数字或特殊字符，如
    @ 或 #。快捷键将覆盖在包含宏的工作簿打开时任何等效的默认 Microsoft Excel 快捷键。'
- en: Macro Description
  id: totrans-2234
  prefs: []
  type: TYPE_NORMAL
  zh: 宏描述
- en: The description is used to write details about the macro, such as the purpose
    of this macro. This helps with post-maintenance.
  id: totrans-2235
  prefs: []
  type: TYPE_NORMAL
  zh: 描述用于编写有关宏的详细信息，例如此宏的目的。这有助于后期维护。
- en: Stop Recording
  id: totrans-2236
  prefs: []
  type: TYPE_NORMAL
  zh: 停止录制
- en: 'To stop recording a macro, follow these steps:'
  id: totrans-2237
  prefs: []
  type: TYPE_NORMAL
  zh: 要停止录制宏，请按照以下步骤操作：
- en: 1. Perform the actions required to be executed by a macro.
  id: totrans-2238
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 执行宏所需的操作。
- en: 2. Stop recording by either clicking on the Stop Recording button on the Developer
    tab in the Group Code, or on the status bar at the bottom.
  id: totrans-2239
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 通过在“代码”组中的“开发人员”选项卡上的“停止记录”按钮或状态栏底部单击来停止记录。
- en: Refer to [Figure 14.4](#fig14-4).
  id: totrans-2240
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图14.4。
- en: '![image](image/Figure_14.4.jpg)'
  id: totrans-2241
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_14.4.jpg)'
- en: Figure 14.4 Stop Recording a Macro
  id: totrans-2242
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.4停止记录宏
- en: Relative Reference Macro
  id: totrans-2243
  prefs: []
  type: TYPE_NORMAL
  zh: 相对引用宏
- en: If you want the macro to run relative to the position of the active cell, record
    it using relative cell references. On the Developer tab, click on Use Relative
    Reference so that it is selected. Excel will continue to record macros with relative
    references until you quit Excel or until you click Use Relative Reference again,
    so that it is not selected.
  id: totrans-2244
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您希望宏相对于活动单元格的位置运行，请使用相对单元格引用来记录它。在“开发人员”选项卡上，单击“使用相对引用”使其选中。Excel将继续使用相对引用记录宏，直到您退出Excel或再次单击“使用相对引用”使其不选中。
- en: Refer to [Figure 14.5](#fig14-5).
  id: totrans-2245
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图14.5。
- en: '![image](image/Figure_14.5.jpg)'
  id: totrans-2246
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_14.5.jpg)'
- en: Figure 14.5 Stop Recording a Macro
  id: totrans-2247
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.5停止记录宏
- en: Note The Use Relative Reference button is a toggle button. Be careful with it,
    and before you start recording, check whether or not it is selected.
  id: totrans-2248
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：使用相对引用按钮是一个切换按钮。请小心使用它，并在开始记录之前检查是否已选中。
- en: Scenario 1
  id: totrans-2249
  prefs: []
  type: TYPE_NORMAL
  zh: 场景1
- en: Create a macro to automatically add the company’s name in a specific format
    to the first row of any spreadsheet.
  id: totrans-2250
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个宏，自动将公司名称以特定格式添加到任何电子表格的第一行。
- en: For this, refer to Training File1.xls and follow the steps below.
  id: totrans-2251
  prefs: []
  type: TYPE_NORMAL
  zh: 为此，请参考Training File1.xls并按照以下步骤操作。
- en: 1. Start recording.
  id: totrans-2252
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 开始记录。
- en: 2. Add the name “Company_name”.
  id: totrans-2253
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 添加名称“Company_name”。
- en: 3. Set the shortcut as Ctrl + Shift + C.
  id: totrans-2254
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 将快捷键设置为Ctrl + Shift + C。
- en: '4. Carry out the following steps:'
  id: totrans-2255
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 执行以下步骤：
- en: a. Select the first cell (since the name should be on the first row).
  id: totrans-2256
  prefs: []
  type: TYPE_NORMAL
  zh: a. 选择第一个单元格（因为名称应该在第一行）。
- en: b. Type your company’s name.
  id: totrans-2257
  prefs: []
  type: TYPE_NORMAL
  zh: b. 输入您的公司名称。
- en: 'c. Apply the format: font size 20, bold, blue font, and white background.'
  id: totrans-2258
  prefs: []
  type: TYPE_NORMAL
  zh: c. 应用格式：字体大小20，粗体，蓝色字体，白色背景。
- en: d. Select A1 to H1 cells.
  id: totrans-2259
  prefs: []
  type: TYPE_NORMAL
  zh: d. 选择A1到H1单元格。
- en: e. Click on the Merge tool.
  id: totrans-2260
  prefs: []
  type: TYPE_NORMAL
  zh: e. 单击合并工具。
- en: '5. Stop the recording:'
  id: totrans-2261
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 停止记录：
- en: a. Go to the Tools menu, then click Macro | Stop
  id: totrans-2262
  prefs: []
  type: TYPE_NORMAL
  zh: a. 转到工具菜单，然后单击宏 | 停止
- en: Recording. Refer to the following [Figure 14.6](#fig14-6).
  id: totrans-2263
  prefs: []
  type: TYPE_NORMAL
  zh: 记录。参考以下图14.6。
- en: '![image](image/Figure_14.6.jpg)'
  id: totrans-2264
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_14.6.jpg)'
- en: Figure 14.6 Scenario 1
  id: totrans-2265
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.6场景1
- en: Running Your Macro
  id: totrans-2266
  prefs: []
  type: TYPE_NORMAL
  zh: 运行您的宏
- en: Macros can be run several ways.
  id: totrans-2267
  prefs: []
  type: TYPE_NORMAL
  zh: 宏可以通过多种方式运行。
- en: ■The shortcut (which you assign while defining the macro)
  id: totrans-2268
  prefs: []
  type: TYPE_NORMAL
  zh: ■快捷键（在定义宏时分配）
- en: ■The name
  id: totrans-2269
  prefs: []
  type: TYPE_NORMAL
  zh: ■名称
- en: ■The button on the Quick Access Toolbar
  id: totrans-2270
  prefs: []
  type: TYPE_NORMAL
  zh: ■快速访问工具栏上的按钮
- en: ■The button on the worksheet
  id: totrans-2271
  prefs: []
  type: TYPE_NORMAL
  zh: ■工作表上的按钮
- en: Running the Macro by Name
  id: totrans-2272
  prefs: []
  type: TYPE_NORMAL
  zh: 通过名称运行宏
- en: 'To run your macro by name, follow these steps:'
  id: totrans-2273
  prefs: []
  type: TYPE_NORMAL
  zh: 要通过名称运行您的宏，请按照以下步骤操作：
- en: 1. Go to the Developer tab.
  id: totrans-2274
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 转到“开发人员”选项卡。
- en: 2. Select Macros (Snapshot 1).
  id: totrans-2275
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择宏（快照1）。
- en: 3. Select the macro which you want to run (Snapshot 2).
  id: totrans-2276
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 选择要运行的宏（快照2）。
- en: 4. Click on the Run button.
  id: totrans-2277
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 单击运行按钮。
- en: Refer to [Figure 14.7](#fig14-7).
  id: totrans-2278
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图14.7。
- en: '![image](image/Figure_14.7.jpg)'
  id: totrans-2279
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_14.7.jpg)'
- en: Figure 14.7 Running a Macro by Name
  id: totrans-2280
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.7通过名称运行宏
- en: Scenario 2
  id: totrans-2281
  prefs: []
  type: TYPE_NORMAL
  zh: 场景2
- en: Create a macro to display a product table with the table headers, Product Name,
    Quantity, Price, Total, and Net. The table must always appear from the second
    row and first column. Excel should not accept any negative values for price and
    quantity. This macro will always result from the second row, first column (A1
    reference).
  id: totrans-2282
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个宏，显示带有表头的产品表，包括产品名称、数量、价格、总计和净额。该表必须始终从第二行第一列出现。Excel不应接受价格和数量的任何负值。此宏始终从第二行第一列（A1引用）开始。
- en: Steps to be performed are below. (Refer to Training File1.xls.)
  id: totrans-2283
  prefs: []
  type: TYPE_NORMAL
  zh: 要执行的步骤如下。（参考Training File1.xls。）
- en: 1. Start recording (use name Product_Table and shortcut Ctrl + Shift + P).
  id: totrans-2284
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 开始记录（使用名称Product_Table和快捷键Ctrl + Shift + P）。
- en: 2. Select cell A2 (the table must always appear from the second row and first
    column).
  id: totrans-2285
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择单元格A2（表格必须始终从第二行第一列出现）。
- en: 3. Create a table as per [Figure 14.8](#fig14-8).
  id: totrans-2286
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 按照图14.8创建表格。
- en: 4. Write the formula for total and Net Total.
  id: totrans-2287
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 编写总计和净总计的公式。
- en: 5. Format it.
  id: totrans-2288
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 格式化它。
- en: 6. Do validation for quantity and price cells (negative values are restricted).
  id: totrans-2289
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 对数量和价格单元格进行验证（负值被限制）。
- en: 7. Stop the recording.
  id: totrans-2290
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 停止记录。
- en: Refer to [Figure 14.8](#fig14-8).
  id: totrans-2291
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图14.8。
- en: '![image](image/Figure_14.8.jpg)'
  id: totrans-2292
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_14.8.jpg)'
- en: Figure 14.8 Scenario 2
  id: totrans-2293
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.8 场景2
- en: Scenario 3
  id: totrans-2294
  prefs: []
  type: TYPE_NORMAL
  zh: 场景3
- en: Create a macro to display the same product table (Scenario 2), but this time
    it should appear anywhere, wherever the user wants (using relative reference).
    This macro depends on the user’s selection.
  id: totrans-2295
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个宏来显示与场景2相同的商品表，但这次它应该出现在用户想要的位置（使用相对引用）。此宏依赖于用户的选择。
- en: 'The steps to be performed are below:'
  id: totrans-2296
  prefs: []
  type: TYPE_NORMAL
  zh: 要执行的操作步骤如下：
- en: 1. Start recording (use the name Product_Table_Relative and shortcut).
  id: totrans-2297
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 开始录制（使用Product_Table_Relative名称和快捷键）。
- en: 2. Switch on the Relative Reference button on the Stop Recording toolbar.
  id: totrans-2298
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在停止录制工具栏上打开相对引用按钮。
- en: 3. Create a table from the current cell as per [Figure 14.9](#fig14-9).
  id: totrans-2299
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 根据图14.9创建从当前单元格开始的表格。
- en: Note Start typing from wherever you are in the sheet; there is no need to click
    in the sheet while creating a relative reference macro.
  id: totrans-2300
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：从工作表中的任何位置开始输入；在创建相对引用宏时，无需在工作表中点击。
- en: 4. Write the formula for total and Net Total.
  id: totrans-2301
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 编写总计和净总计的公式。
- en: 5. Format it.
  id: totrans-2302
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 格式化它。
- en: 6. Do validation for quantity and price cells (negative values are restricted).
  id: totrans-2303
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 对数量和价格单元格进行验证（负值被限制）。
- en: 7. Switch off the Relative Reference button.
  id: totrans-2304
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 关闭相对引用按钮。
- en: 8. Stop the recording.
  id: totrans-2305
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 停止录制。
- en: Refer to [Figure 14.9](#fig14-9).
  id: totrans-2306
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图14.9。
- en: '![image](image/Figure_14.9.jpg)'
  id: totrans-2307
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image/Figure_14.9.jpg)'
- en: Figure 14.9 Scenario 3
  id: totrans-2308
  prefs: []
  type: TYPE_NORMAL
  zh: 图14.9 场景3
- en: Conclusion
  id: totrans-2309
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: To summarize, this chapter has introduced the fundamentals of VBA macros and
    their significance in automating tasks in Excel. By creating and recording macros,
    users can streamline repetitive actions and enhance productivity. Whether through
    manual coding or the recording feature, macros offer a powerful tool for customizing
    and optimizing Excel functionality. By leveraging macros, users can save time,
    reduce errors, and improve efficiency.
  id: totrans-2310
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，本章介绍了VBA宏的基础及其在Excel中自动化任务的重要性。通过创建和录制宏，用户可以简化重复操作并提高生产力。无论是通过手动编码还是通过录制功能，宏都提供了一种强大的工具，用于自定义和优化Excel功能。通过利用宏，用户可以节省时间，减少错误，并提高效率。
- en: Exercises
  id: totrans-2311
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: 1. Create a macro named “CalculateAverage” that calculates the average of a
    range of numbers in Excel.
  id: totrans-2312
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 创建一个名为“CalculateAverage”的宏，该宏计算Excel中一系列数字的平均值。
- en: 2. Create a macro named “FormatData” that applies specific formatting to a range
    of cells in Excel.
  id: totrans-2313
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 创建一个名为“FormatData”的宏，该宏应用于Excel中一系列单元格的特定格式。
- en: 3. Create a macro named “GenerateReport” that automates the process of generating
    a report in Excel.
  id: totrans-2314
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 创建一个名为“GenerateReport”的宏，该宏自动化Excel中生成报告的过程。
- en: CHAPTER  15
  id: totrans-2315
  prefs: []
  type: TYPE_NORMAL
  zh: 第15章
- en: Assigning Buttons to Macros
  id: totrans-2316
  prefs: []
  type: TYPE_NORMAL
  zh: 将按钮分配给宏
- en: Introduction
  id: totrans-2317
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In this chapter, we will explore the process of assigning buttons to macros
    in Excel. By creating buttons on the Quick Access Toolbar and Excel worksheets,
    we can automate tasks, improve efficiency, and simplify complex operations. Join
    us as we delve into the world of Excel automation and discover the power of button
    macro integration.
  id: totrans-2318
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨在Excel中为宏分配按钮的过程。通过在快速访问工具栏和Excel工作表中创建按钮，我们可以自动化任务，提高效率，并简化复杂操作。加入我们，深入了解Excel自动化世界，发现按钮宏集成之力。
- en: Structure
  id: totrans-2319
  prefs: []
  type: TYPE_NORMAL
  zh: 结构
- en: 'In this chapter, we will go over the following topics:'
  id: totrans-2320
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: ■Creating buttons on the Quick Access Toolbar
  id: totrans-2321
  prefs: []
  type: TYPE_NORMAL
  zh: ■在快速访问工具栏上创建按钮
- en: ■Modifying menus or buttons
  id: totrans-2322
  prefs: []
  type: TYPE_NORMAL
  zh: ■修改菜单或按钮
- en: ■Creating a button on an Excel worksheet
  id: totrans-2323
  prefs: []
  type: TYPE_NORMAL
  zh: ■在工作表上创建按钮
- en: ■Editing the recorded macros
  id: totrans-2324
  prefs: []
  type: TYPE_NORMAL
  zh: ■编辑录制的宏
- en: Objectives
  id: totrans-2325
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: By the end of this chapter, the reader will understand how to create buttons
    on the Quick Access Toolbar for quick access to macros, and how to modify menus
    or buttons to customize their appearance and functionality. The reader will also
    be able to explore the process of creating buttons directly in Excel worksheets
    for specific tasks, as well as gain proficiency in editing recorded macros to
    enhance automation and tailor them to specific requirements.
  id: totrans-2326
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，读者将了解如何创建快速访问工具栏上的按钮以快速访问宏，以及如何修改菜单或按钮以自定义其外观和功能。读者还将能够探索在Excel工作表中直接创建按钮的过程，以及熟练编辑录制宏以增强自动化并满足特定要求。
- en: Creating Buttons on the Quick Access Toolbar
  id: totrans-2327
  prefs: []
  type: TYPE_NORMAL
  zh: 在快速访问工具栏上创建按钮
- en: To create buttons on the Quick Access Toolbar, follow the steps below.
  id: totrans-2328
  prefs: []
  type: TYPE_NORMAL
  zh: 要在快速访问工具栏上创建按钮，请按照以下步骤操作。
- en: 1. Click on the Office button.
  id: totrans-2329
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 点击“Office”按钮。
- en: 2. Click on Excel Options.
  id: totrans-2330
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击“Excel选项”。
- en: 3. Go to the Customize Tab.
  id: totrans-2331
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 转到自定义选项卡。
- en: 4. Under the Choose Commands From drop-down box, select Macros.
  id: totrans-2332
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在“从以下选项中选择命令”下拉框中，选择宏。
- en: 5. Add your macro to Customize Quick Access Toolbar.
  id: totrans-2333
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 将您的宏添加到自定义快速访问工具栏。
- en: Refer to [Figure 15.1](#fig15-1).
  id: totrans-2334
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图15.1 [图15.1](#fig15-1)。
- en: '![image](image/Figure_15.1.jpg)'
  id: totrans-2335
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_15.1.jpg)'
- en: Figure 15.1 Creating Buttons on the Quick Access Toolbar
  id: totrans-2336
  prefs: []
  type: TYPE_NORMAL
  zh: 图15.1 在快速访问工具栏上创建按钮
- en: Modifying Menus or Buttons
  id: totrans-2337
  prefs: []
  type: TYPE_NORMAL
  zh: 修改菜单或按钮
- en: Whenever you want to create a new button, edit the existing button, or remove
    any button from the Quick Access Toolbar, follow the steps below.
  id: totrans-2338
  prefs: []
  type: TYPE_NORMAL
  zh: 每次您想要创建新按钮、编辑现有按钮或从快速访问工具栏中删除任何按钮时，请按照以下步骤操作。
- en: 1. Click on the Modify… button.
  id: totrans-2339
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 点击“修改…”按钮。
- en: 2. Select an icon of your choice.
  id: totrans-2340
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 选择您选择的图标。
- en: 3. Enter the Display Name.
  id: totrans-2341
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 输入显示名称。
- en: 4. Click OK.
  id: totrans-2342
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 点击“确定”。
- en: Refer to [Figure 15.2](#fig15-2).
  id: totrans-2343
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图15.2 [图15.2](#fig15-2)。
- en: '![image](image/Figure_15.2.jpg)'
  id: totrans-2344
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_15.2.jpg)'
