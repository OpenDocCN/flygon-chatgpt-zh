- en: '**SEABORN’S KDE PLOTS FOR DENSITY ESTIMATIONS**'
  id: totrans-3235
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**SEABORN 的密度估计 KDE 图**'
- en: Kernel Density Estimation (KDE) plots visualize the probability density of a
    continuous variable. They can be thought of as smoothed histograms and are particularly
    useful when discerning the underlying distribution of a dataset. They allow us
    to visualize data density.
  id: totrans-3236
  prefs: []
  type: TYPE_NORMAL
  zh: 核密度估计 (KDE) 图可视化连续变量的概率密度。它们可以被视为平滑的直方图，在辨别数据集的潜在分布时特别有用。它们允许我们可视化数据密度。
