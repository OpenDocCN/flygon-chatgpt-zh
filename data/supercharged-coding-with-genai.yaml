- en: Documenting Code with GenAI
  id: totrans-1782
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 GenAI 记录代码
- en: In *Part 3* of the book, we will introduce advanced practices from the **software
    development lifecycle** (**SDLC**) when working with ChatGPT, OpenAI API, and
    GitHub Copilot. Using the five S’s framework introduced in [*Chapter 4*](Chapter_4.xhtml#_idTextAnchor166),
    and prompt engineering techniques introduced in [*Chapter 8*](Chapter_8.xhtml#_idTextAnchor339)
    and [*Chapter 9*](Chapter_9.xhtml#_idTextAnchor391), we will see how to productionize
    our Python applications.
  id: totrans-1783
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的 *第 3 部分* 中，我们将介绍与 ChatGPT、OpenAI API 和 GitHub Copilot 一起工作时软件开发生命周期（SDLC）的高级实践。通过介绍
    [*第 4 章*](Chapter_4.xhtml#_idTextAnchor166) 中引入的五 S 框架，以及 [*第 8 章*](Chapter_8.xhtml#_idTextAnchor339)
    和 [*第 9 章*](Chapter_9.xhtml#_idTextAnchor391) 中介绍的提示工程技术，我们将了解如何将我们的 Python 应用程序投入生产。
- en: In this chapter, we will introduce docstrings for Python objects, which already
    has a built-in slash command (i.e., /doc) with GitHub Copilot. We can use this
    slash command with the vanilla format or extend it with specific docstring requirements.
    Docstrings are already a feature of most IDEs as a template structure where arguments
    will be formatted with a fixed style, but the standard template does not include
    any descriptive information about the function or its parameters beyond their
    name. GitHub Copilot will usually produce a full docstring for high-quality code.
  id: totrans-1784
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将介绍 Python 对象的文档字符串，它已经内置了 GitHub Copilot 的斜杠命令（即 /doc）。我们可以使用这个斜杠命令以纯格式或扩展它以满足特定的文档字符串要求。文档字符串已经是大多数
    IDE 的一个功能，作为模板结构，其中参数将以固定的样式进行格式化，但标准模板不包括关于函数或其参数的任何描述性信息，除了它们的名称。GitHub Copilot
    通常会为高质量的代码生成完整的文档字符串。
