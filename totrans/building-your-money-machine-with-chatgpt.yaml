  zh: 使用像ChatGPT这样的工具，你可以创建数百种相同广告文案的变体，旨在吸引广泛的受众。这样，你可以最大化你广告活动的覆盖范围，并针对你目标受众的不同细分市场进行定制。以下是一个你可以用来让ChatGPT为洗衣业务编写样本买家角色资料的提示示例。从输出结果中，请特别注意挑战和关键信息部分中的细节。这些元素可以融入你的广告文案中，因为它们对你的潜在客户来说最为重要。
