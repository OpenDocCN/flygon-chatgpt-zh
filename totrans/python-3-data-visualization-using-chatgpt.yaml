- en: '**SUMMARY**'
  id: totrans-1453
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**总结**'
- en: This chapter introduced you to Pandas for creating labeled DataFrames and displaying
    metadata of Pandas DataFrames. Then you learned how to create Pandas DataFrames
    from various sources of data, such as random numbers and hard-coded data values.
  id: totrans-1454
  prefs: []
  type: TYPE_NORMAL
  zh: 本章向您介绍了 Pandas，用于创建标记的 DataFrame 并显示 Pandas DataFrame 的元数据。然后您学习了如何从各种数据源创建
    Pandas DataFrame，例如随机数和硬编码的数据值。
- en: You also learned how to read Excel spreadsheets and perform numeric calculations
    on that data, such as the minimum, mean, and maximum values in numeric columns.
    Then you saw how to create Pandas DataFrames from data stored in CSV files. In
    addition, you learned how to generate a scatterplot from data in a Pandas DataFrame.
  id: totrans-1455
  prefs: []
  type: TYPE_NORMAL
  zh: 您还学习了如何读取 Excel 电子表格并对该数据进行数值计算，例如数值列中的最小值、平均值和最大值。然后您看到了如何从存储在 CSV 文件中的数据创建
    Pandas DataFrame。此外，您还学习了如何从 Pandas DataFrame 中的数据生成散点图。
- en: Then you got a brief introduction to JSON, along with an example of converting
    a Python dictionary to JSON-based data (and vice versa). Finally, you learned
    about Texthero, which is an open source Python-based toolkit that is a layer of
    abstraction over Pandas.
  id: totrans-1456
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，您简要介绍了 JSON，并提供了将 Python 字典转换为基于 JSON 的数据（反之亦然）的示例。最后，您了解了 Texthero，这是一个在
    Pandas 之上的开源 Python 工具包。
- en: CHAPTER 4
  id: totrans-1457
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第四章
- en: '*PANDAS AND SQL*'
  id: totrans-1458
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '*Pandas 和 SQL*'
- en: This chapter contains a variety of Python code samples that contain Pandas,
    SQL, and SQLite3. You will also see examples of working with XML documents and
    JSON data in Python code samples.
  id: totrans-1459
  prefs: []
  type: TYPE_NORMAL
  zh: 本章包含各种包含 Pandas、SQL 和 SQLite3 的 Python 代码示例。您还将看到在 Python 代码示例中处理 XML 文档和 JSON
    数据的示例。
- en: The first section contains code samples of data visualization in Pandas, such
    as bar charts, area charts, and line graphs.
  id: totrans-1460
  prefs: []
  type: TYPE_NORMAL
  zh: 第一部分包含了 Pandas 中数据可视化的代码示例，例如条形图、面积图和折线图。
- en: The first section contains code samples of data visualization in Pandas, such
    as bar charts, area charts, and line graphs.
  id: totrans-1461
  prefs: []
  type: TYPE_NORMAL
  zh: 第一部分包含了 Pandas 中数据可视化的代码示例，例如条形图、面积图和折线图。
- en: The second section contains code samples that show you how to write Python code
    that contains MySQL commands. You will also see code samples that contain Python
    and Pandas. In addition, you will learn how to export SQL data from Pandas to
    an Excel spreadsheet.
  id: totrans-1462
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部分包含了代码示例，展示了如何编写包含 MySQL 命令的 Python 代码。您还将看到包含 Python 和 Pandas 的代码示例。此外，您将学习如何将
    SQL 数据从 Pandas 导出到 Excel 电子表格。
- en: The third section briefly introduces XML and JSON, and how to read such data
    in a Pandas DataFrame. Moreover, there is section that discusses regular expressions.
  id: totrans-1463
  prefs: []
  type: TYPE_NORMAL
  zh: 第三部分简要介绍了 XML 和 JSON，以及如何在 Pandas DataFrame 中读取此类数据。此外，还有一个讨论正则表达式的部分。
- en: The fourth section shows you how to combine Python and SQLite to perform database-related
    operations, such as creating a table in a sqlite3 database and then inserting
    data into such a table. You will then learn how to select data from that table
    and populate a Pandas DataFrame with that data.
  id: totrans-1464
  prefs: []
  type: TYPE_NORMAL
  zh: 第四部分展示了如何将 Python 和 SQLite 结合起来执行数据库相关操作，例如在 sqlite3 数据库中创建一个表，然后向该表中插入数据。然后您将学习如何从该表中选择数据，并将这些数据填充到
    Pandas DataFrame 中。
- en: The final section contains a brief introduction to Beautiful Soup, along with
    code samples that show you how to use Beautiful Soup in order to parse HTML Web
    pages.
  id: totrans-1465
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的部分简要介绍了 Beautiful Soup，并提供了代码示例，展示了如何使用 Beautiful Soup 来解析 HTML 网页。
