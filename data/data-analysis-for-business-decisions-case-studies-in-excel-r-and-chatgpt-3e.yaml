- en: 'We are going to answer this question:'
  id: totrans-1823
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将回答以下问题：
- en: Each group’s startup costs vary widely, and the average startup costs vary from
    one type of store to another. Are the differences in the averages real, or are
    they different purely by chance?
  id: totrans-1824
  prefs: []
  type: TYPE_NORMAL
  zh: 每个组的启动成本差异很大，平均启动成本从一种商店类型到另一种类型都有所不同。这些平均值之间的差异是真实的，还是纯粹是偶然的？
- en: Following our practice of not changing the raw data, we are going to create
    a shaped file for our analysis in a new spreadsheet. Select the data and enter
    it into a new spreadsheet in the workbook under a tab called ANOVA.
  id: totrans-1825
  prefs: []
  type: TYPE_NORMAL
  zh: 按照我们不更改原始数据的惯例，我们将在新的工作表创建一个用于分析的形状文件。选择数据，并将其输入到名为ANOVA的新工作表中的工作簿中。
- en: Use the Analysis ToolPak to compute the “ANOVA Single Factor” test. Make sure
    to select all the data, including the column headers ([Figure 12.3](#fig12-3)).
  id: totrans-1826
  prefs: []
  type: TYPE_NORMAL
  zh: 使用分析工具包计算“单因素ANOVA”测试。确保选择包括列标题在内的所有数据 ([图12.3](#fig12-3))。
- en: '![image](images/pg276.jpg)'
  id: totrans-1827
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg276.jpg)'
