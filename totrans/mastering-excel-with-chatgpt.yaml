  id: totrans-1421
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc2U3.jpg)'
- en: CHAPTER 9
  id: totrans-1422
  prefs: []
  type: TYPE_NORMAL
  zh: 第九章
- en: ENHANCING DATA ANALYSIS
  id: totrans-1423
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 提升数据分析能力
- en: '![](image_rsrc2U2.jpg)'
  id: totrans-1424
