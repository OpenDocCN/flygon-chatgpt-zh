- en: Introduction
  id: totrans-0
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: A New Era in Education
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 教育新时代
- en: Teaching in the 21st century is a unique challenge—and a great chance. With
    technology's rapid growth, educators' access to a broad range of powerful and
    diverse tools has never been at a higher level. One of these is ChatGPT, a technology
    that has become a game-changer. Imagine having an ever-energized professional
    assistant—ready to hash out session ideas with you, compose reports, attend to
    queries, help students understand intricate concepts, and more. This is the future
    to which ChatGPT has committed itself.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 21世纪的教书育人是一项独特的挑战——也是一个巨大的机遇。随着技术的快速发展，教育工作者能够接触到广泛而强大的工具，这从未达到如此高的水平。其中之一就是ChatGPT，这项技术已经成为一个颠覆者。想象一下，拥有一个永远充满活力的专业助手——随时准备与你讨论课程想法、撰写报告、处理查询、帮助学生理解复杂的概念等等。这就是ChatGPT致力于实现的未来。
- en: 'But let''s be frank: new technology is often intimidating. How do you sort it
    all out? Where do you start? And most importantly, how can you be sure it will
    help rather than just add to an already full plate?'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但让我们坦白地说：新技术往往令人畏惧。你该如何整理这一切？从哪里开始？最重要的是，你如何确保它会有帮助，而不是仅仅增加你已满当当的负担？
- en: This book was written with you—the Teacher—in mind. Whether you’re a tech-savvy
    early adopter or someone just dipping a cautious toe into the world of AI, ChatGPT
    for Teachers is your roadmap to confidently integrating this tool into your professional
    life.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书是以你——教师——为写作对象的。无论你是技术娴熟的早期采用者，还是刚刚小心翼翼地踏入AI世界的人，ChatGPT for Teachers都是你自信地将这项工具融入专业生活的路线图。
- en: 'You’ll find step-by-step guides, practical examples, and plenty of tips to
    help you:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 你将找到逐步指南、实用示例和大量技巧，以帮助你：
- en: Plan lessons more efficiently.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更高效地规划课程。
- en: Engage students with creativity and innovation.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用创造性和创新来吸引学生。
- en: Save time on administrative tasks.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在行政任务上节省时间。
- en: Personalise learning to meet diverse student needs.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个性化学习以满足不同学生的需求。
- en: 'This is not just a how-to book in using ChatGPT but also discusses the bigger
    picture: the ethics of AI in education, its limitations, and the indispensable
    role of teachers in shaping an AI-driven future.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是一本关于如何使用ChatGPT的指南书，还讨论了更大的图景：教育中AI的伦理、其局限性以及教师在塑造AI驱动未来中不可或缺的作用。
- en: On the pages that follow, you will be entering a place where AI does not come to
    replace you but is here to empower you. We are about to dive deep into exactly how
    to make this technology work for you, your students, and your school.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的页面上，你将进入一个地方，在那里AI不是来取代你，而是来赋予你力量。我们即将深入探讨如何让这项技术为你、你的学生和你的学校服务。
- en: There are many tools on the market – Claude, Deepseek, Gemini, Copilot. We have
    chosen to focus on ChatGPT given it is free, is widely in use and has great capabilities.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 市场上有很多工具——Claude、Deepseek、Gemini、Copilot。我们选择专注于ChatGPT，因为它免费、广泛使用，并且功能强大。
- en: Welcome to the journey. Let’s transform teaching, one prompt at a time.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎踏上这段旅程。让我们一次提示地改变教学。
- en: Happy teaching
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 快乐教学
- en: QUICK START GUIDE
  id: totrans-15
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 快速入门指南
- en: TO
  id: totrans-16
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 到
- en: CHATGPT
  id: totrans-17
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: CHATGPT
- en: Before we kick off into the detail, you are obviously here because you have
    heard of ChatGPT and you want to know more. You have noticed that tools like ChatGPT
    are not a phase or going to go away and the way to succeed is the understand how
    they work and get ahead. ChatGPT is like having a friend who has a vast array
    of knowledge and is available to answer question 24/7 via the desktop or your
    phone. It has seen some incredible advances in the last few years and its popularity
    has skyrocketed.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入细节之前，你显然是来这里因为你知道ChatGPT并想了解更多。你已经注意到，像ChatGPT这样的工具不是一个阶段，也不会消失，成功的关键在于理解它们是如何工作的，并走在前面。ChatGPT就像有一个知识渊博的朋友，随时准备通过桌面或你的手机回答问题24/7。在过去几年中，它已经取得了一些令人难以置信的进步，其受欢迎程度也急剧上升。
- en: What is ChatGPT, and What is AI?
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT是什么，AI又是什么？
- en: Artificial Intelligence in simple terms is just a name given to computer systems,
    which are designed to do things that would normally require human intelligence
    to perform. These include problem-solving and learning to understanding language
    and making decisions. Think of AI as the technology powering voice assistants,
    search engines, and even self-driving cars.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，人工智能只是给那些设计用来执行通常需要人类智能才能完成的事情的计算机系统起的名字。这包括解决问题、学习理解语言和做出决策。将AI视为驱动语音助手、搜索引擎甚至自动驾驶汽车的技术。
- en: ChatGPT is an OpenAI-developed tool that helps computers converse with human
    beings naturally. Unlike a search engine that shows lists or a direct answer to
    anything queried, this application helps the computers go further and respond
    like humans-for instance, they can hold conversations with others, contextualising
    information, adapting prior responses, and handling more complex requests with
    a bit of word creativity. That is all possible because it is trained on loads
    of text from books, websites, and other written materials, learning patterns in
    how people use language to communicate. It has been developed to understand text,
    language and sentences and then respond in a human like manner. To teachers, ChatGPT
    is a versatile helper that can formulate lesson ideas, provide tailored support
    for students, and even automate routine administrative tasks to free up more time
    for meaningful teaching activities.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 是由 OpenAI 开发的一款工具，它帮助计算机以自然的方式与人类进行对话。与显示列表或直接回答任何查询的搜索引擎不同，这款应用帮助计算机更进一步，以类似人类的方式回应——例如，它们可以与他人进行对话，理解上下文信息，调整先前回应，并以一定的词汇创造力处理更复杂的请求。这一切之所以可能，是因为它是在大量书籍、网站和其他书面材料的基础上进行训练的，学习人们如何使用语言进行交流的模式。它被开发出来是为了理解文本、语言和句子，并以类似人类的方式回应。对于教师来说，ChatGPT
    是一个多功能的助手，可以帮助制定课程想法，为学生提供定制支持，甚至自动化日常行政任务，以便有更多时间进行有意义的课堂教学活动。
- en: AI is the header term for all these areas including machine learning, neural
    networks and ChatGPT and other LLMs (large language models).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: AI 是所有这些领域的总称，包括机器学习、神经网络和 ChatGPT 以及其他大型语言模型（LLMs）。
- en: So, what can it do?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，它究竟能做什么呢？
- en: It can create content, help with marketing, aid in learning new topics, provide
    information on business and answer everyday life questions. It can produce short
    form content quickly, it can bring back knowledge at speed, help with coding tasks,
    writing tasks and analysing information.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 它可以创建内容，帮助营销，辅助学习新主题，提供商业信息，回答日常生活问题。它可以快速生成简短内容，快速回溯知识，帮助编码任务、写作任务和分析信息。
- en: Equally as important is, what can it not do?
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 同样重要的是，它不能做什么？
- en: ChatGPT was trained on knowledge that exists, but only up until September 2023\.
    It can now, however, search the web for more up to date information. It does not
    possess common sense or emotional intelligence. We have probably all seen viral
    posts where people ask ChatGPT about emotional topics such as “are the government
    lying to us?”. ChatGPT is not a human and doesn’t have opinion, it will provide
    a response because it was trained to do so, but probably just something we want
    to hear. ChatGPT struggles with longer form text, ask it to write a book from
    start to finish and it can’t. It cannot automate your life, it will not do your
    dishes sadly and therefore cannot entirely take out your job – just help you become
    more efficient.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 是基于截至 2023 年 9 月存在的知识进行训练的。然而，现在它却可以搜索网络以获取更及时的信息。它不具备常识或情商。我们可能都见过那些病毒式帖子，人们向
    ChatGPT 提出关于情感话题的问题，比如“政府是否在欺骗我们？”。ChatGPT 并非人类，没有观点，它之所以会提供回应，是因为它被训练去这样做，但可能只是我们想要听到的。ChatGPT
    在处理长篇文本方面存在困难，如果你要求它从头到尾写一本书，它就无法做到。它不能自动化你的生活，它不会帮你洗碗，因此不能完全取代你的工作——它只能帮助你提高效率。
- en: The following funnel outlines AI as, essentially, the header term for all the
    elements that fall below, of which ChatGPT is merely a subsection.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的漏斗图概述了人工智能作为所有下级元素的统称，其中 ChatGPT 只是其中的一部分。
- en: Key Terminology
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键术语
- en: 'Below is a table explaining commonly used terms in the field of AI and ChatGPT:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个表格，解释了人工智能和 ChatGPT 领域中常用的术语：
- en: '| Term | Meaning |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
  zh: '| 术语 | 含义 |'
- en: '| Artificial Intelligence (AI) | Technology enabling machines to simulate human
    intelligence, such as reasoning or learning. |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
  zh: '| 人工智能（AI） | 使机器能够模拟人类智能的技术，例如推理或学习。|'
- en: '| Machine Learning (ML) | A subset of AI focused on teaching machines to learn
    from data and improve over time. |'
  id: totrans-32
  prefs: []
  type: TYPE_TB
  zh: '| 机器学习（ML） | 人工智能的一个子集，专注于教会机器从数据中学习并在时间上不断改进。|'
- en: '| Deep Learning | Deep learning is a type of AI that teaches computers to learn
    and solve problems by mimicking how the human brain works, using large amounts
    of data and powerful computers. |'
  id: totrans-33
  prefs: []
  type: TYPE_TB
  zh: '| 深度学习 | 深度学习是一种人工智能，它通过模拟人脑的工作方式，使用大量数据和强大的计算机来教会计算机学习和解决问题。|'
- en: '| Generative Artificial Intelligence | Generative AI creates new content like
    text, images, or music based on patterns it learned from existing data. |'
  id: totrans-34
  prefs: []
  type: TYPE_TB
  zh: '| 生成式人工智能 | 生成式人工智能根据从现有数据中学习到的模式创建新的内容，如文本、图像或音乐。|'
- en: '| Large Language Model (LLM) | AI systems, like ChatGPT, trained on vast amounts
    of text data to understand and generate text. |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '| 大型语言模型 (LLM) | 像 ChatGPT 这样的 AI 系统，在大量文本数据上训练以理解和生成文本。|'
- en: '| Generative Pre-Trained Transformers (GPTs) | GPT is a type of AI that understands
    and generates human-like text by learning from huge amounts of information. |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| 生成预训练的 Transformer (GPTs) | GPT 是一种通过学习大量信息来理解和生成类似人类文本的人工智能。|'
- en: '| GPT 4 | GPT-4 is an advanced version of GPT that can generate more accurate
    and detailed text, sometimes even understanding images, for tasks like answering
    questions or creating stories. |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| GPT 4 | GPT-4 是 GPT 的高级版本，能够生成更准确和详细的文本，有时甚至能理解图像，用于回答问题或创作故事等任务。|'
- en: '| Natural Language Processing (NLP) | A branch of AI that deals with understanding
    and generating human language. |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| 自然语言处理 (NLP) | 人工智能的一个分支，处理理解和生成人类语言。|'
- en: '| Prompt | A user’s input or question to an AI model, which the model uses
    to generate a response. |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| 提示 | 用户输入或向 AI 模型提出的问题，模型使用这些问题来生成响应。|'
- en: '| Token | A unit of text (e.g., a word or character). Models like ChatGPT process
    text in tokens. |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| 令牌 | 文本单位（例如，一个词或字符）。ChatGPT 等模型以令牌处理文本。|'
- en: '| API | Application Programming Interface; allows integration of ChatGPT into
    other applications. |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| API | 应用程序编程接口；允许将 ChatGPT 集成到其他应用程序中。|'
- en: '| Model | A specific version of ChatGPT trained to provide responses. Examples
    include GPT-3.5 and GPT-4. |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| 模型 | 训练以提供响应的 ChatGPT 的特定版本。例如包括 GPT-3.5 和 GPT-4。|'
- en: '| Custom GPT | A tailored version of ChatGPT designed for specific tasks or
    industries. |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| 定制 GPT | 为特定任务或行业定制的 ChatGPT 版本。|'
- en: '| Training Data | The information (text, code, etc.) used to train ChatGPT
    to understand language and respond intelligently. |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| 训练数据 | 用于训练 ChatGPT 理解语言并智能响应的信息（文本、代码等）。|'
- en: '| Bias | Systematic errors or unfairness in AI responses due to biases in the
    training data. |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| 偏见 | 由于训练数据中的偏见而产生的 AI 响应中的系统性错误或不公平。|'
- en: '| Hallucination | When AI generates incorrect or fabricated information. |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| 幻觉 | 当 AI 生成错误或虚构信息时。|'
- en: Step-by-Step Guide to Using ChatGPT
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 的分步指南
- en: 'Step 1: Accessing the ChatGPT Website'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 第 1 步：访问 ChatGPT 网站
- en: Open your preferred web browser.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 打开您首选的网页浏览器。
- en: 'Visit the ChatGPT website: [https://chat.openai.com](https://chat.openai.com).'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 访问 ChatGPT 网站：[https://chat.openai.com](https://chat.openai.com)。
- en: Click on the “Sign Up” button if you’re new or “Log In” if you already have
    an account.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是新用户，请点击“注册”按钮；如果你已有账户，请点击“登录”。
- en: '![A screenshot of a login form  Description automatically generated](image_rsrc2AJ.jpg)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![登录表单截图，自动生成描述](image_rsrc2AJ.jpg)'
- en: ChatGPT offers a free plan and a paid plan. Below is a summary [1] of the differences
    between ChatGPT free and paid.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 提供免费计划和付费计划。以下是 ChatGPT 免费和付费之间差异的摘要 [1]。
- en: '[1]. Summary is effective for January 2025'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '[1]. 2025 年 1 月的摘要有效'
- en: '|  | Free | Paid |'
  id: totrans-55
  prefs: []
  type: TYPE_TB
  zh: '|  | 免费 | 付费 |'
- en: '| Model usage | Limited to GPT-3.5 | GPT-4o, GPT-o1, offering more advanced
    responses |'
  id: totrans-56
  prefs: []
  type: TYPE_TB
  zh: '| 模型使用 | 限制于 GPT-3.5 | GPT-4o, GPT-o1，提供更高级的响应|'
- en: '| Response Speed | Standard; may be slower during peak usage | Faster processing
    compared to the free tier |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
  zh: '| 响应速度 | 标准速度；高峰使用期间可能会变慢 | 相比免费版，处理速度更快|'
- en: '| Availability | Lower priority during high traffic; you may experience delays
    or limited access | High-priority access, even during peak usage times |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
  zh: '| 可用性 | 高流量期间优先级较低；您可能会遇到延迟或访问限制 | 即使在高峰使用时间也能获得高优先级访问|'
- en: '| Cost | Free | Approx £20 per month (price my vary by region) |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '| 成本 | 免费 | 大约每月 £20（价格可能因地区而异）|'
- en: 'Step 2: Creating an Account'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 第 2 步：创建账户
- en: Enter your email address and create a password.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 输入您的电子邮件地址并创建密码。
- en: Follow the on-screen instructions to verify your email.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 按照屏幕上的说明验证您的电子邮件。
- en: Complete the setup by providing your name and agreeing to the terms of service.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供您的姓名并同意服务条款来完成设置。
- en: 'Step 3: Starting a Chat'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 第 3 步：开始聊天
- en: Once logged in, you will see a text box at the bottom of the screen.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 登录后，您将在屏幕底部看到一个文本框。
- en: Type your question or request into the text box. This is your prompt.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在文本框中输入您的问题或请求。这是您的提示。
- en: Press the “Send” button (or hit Enter) to receive a response.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 按下“发送”按钮（或按 Enter 键）以接收响应。
- en: '![A screenshot of a chat  Description automatically generated](image_rsrc2AK.jpg)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![聊天截图，自动生成描述](image_rsrc2AK.jpg)'
- en: 'Step 4: Understanding the Models'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 第 4 步：了解模型
- en: ChatGPT offers different models like GPT-3.5 and GPT-4o. The latter provides
    more advanced and detailed responses.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提供不同的模型，如GPT-3.5和GPT-4o。后者提供更高级和详细的响应。
- en: You can select your preferred model before starting a chat (options appear in
    the settings or plan tiers).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始聊天之前，您可以选择您喜欢的模型（选项出现在设置或计划层级中）。
- en: 'Step 5: Sending Effective Prompts'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：发送有效提示
- en: Be clear and specific in your prompts. For example, instead of “Tell me about
    history,” try “Summarise the causes of World War I.”
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的提示中要明确具体。例如，与其说“告诉我关于历史的事情”，不如说“总结第一次世界大战的原因”。
- en: Set context. Add background information e.g. “Write a short story about a teacher
    in a rural town”.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 设置上下文。添加背景信息，例如：“写一篇关于乡村教师的短篇小说”。
- en: Provide structure. Request a format for the output to be given e.g. “List 5
    tips for healthy eating”, “Provide the output in max 500 words”, “Give the output
    in table format”, “Provide the output in a downloadable word document”.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 提供结构。请求输出格式，例如：“列出5个健康饮食的建议”，“以最多500字提供输出”，“以表格格式提供输出”，“提供可下载的Word文档”。
- en: If the response is not what you need, refine your prompt and try again. ChatGPT
    improves with more detailed input. Experimentation and practice are key.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如果响应不是您需要的，请细化您的提示并再次尝试。ChatGPT会随着更详细的输入而改进。实验和实践是关键。
- en: '* We will touch on more detail of sending effective prompts shortly.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '* 我们将在稍后讨论发送有效提示的更多细节。'
- en: 'Step 6: Chats'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 第6步：聊天
- en: ChatGPT is organised into Chats – on the left you will see a pen in a box at
    the top – this is your new chat button. If you are switching topics, you should
    start a new chat.
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT组织成聊天——在左侧，您会在顶部看到一个盒子里的笔——这是您的新聊天按钮。如果您正在切换主题，您应该开始一个新的聊天。
- en: You will see also a history on the left of all your chats, you can revisit a
    chat and come back to it at any time and start interacting with it again.
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您还会在左侧看到所有聊天的历史记录，您可以随时回顾一个聊天，并再次与之互动。
- en: You can rename chats to make it easy to find again and keep chats organised.
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您可以重命名聊天，以便再次轻松找到并保持聊天组织有序。
- en: You can archive chats you no longer need.
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您可以存档不再需要的聊天。
- en: Recently ‘Projects’ were launched where you can organise multiple tasks or goals
    within GPT and group related chats together. Click “create project” and add a
    title and description and related chats.
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最近推出了“项目”，您可以在GPT中组织多个任务或目标，并将相关的聊天分组在一起。点击“创建项目”，添加标题和描述以及相关的聊天。
- en: Responses from ChatGPT should always be fact-checked, especially for critical
    or sensitive information, as the model sometimes produces content that is not
    accurate or is outdated. While this is a powerful tool to generate text, its output
    is based on patterns in the training data and may include errors or fabricated
    details. Always verify responses with reliable and up-to-date sources before acting
    on them.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的响应应该始终进行事实核查，特别是对于关键或敏感信息，因为该模型有时会产生不准确或过时的内容。虽然这是一个强大的文本生成工具，但其输出基于训练数据中的模式，可能包括错误或虚构的细节。在采取行动之前，始终使用可靠和最新的来源来验证响应。
- en: 'Activity time:'
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 活动时间：
- en: Sign up for ChatGPT following the steps provided, and firstly send a message
    saying, “what can you do for me?”. See how ChatGPT responds. With that response
    now ask it to add a bit more context to any of the points it has raised i.e. “add
    more context to your first point above” or “add more context to your point on
    [x]”. Again, see how it adds more detail to what it previously provided.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 按照提供的步骤注册ChatGPT，首先发送一条消息说，“你能为我做什么？”。看看ChatGPT如何响应。有了这个响应后，现在要求它为它提出的任何观点添加更多上下文，即“在上面的第一点中添加更多上下文”或“在关于[x]的观点上添加更多上下文”。再次，看看它如何为之前提供的内容添加更多细节。
- en: Now ask ChatGPT to write a summary of a website. So, let’s go to the Wikipedia
    page for the history of education in England. ([https://en.wikipedia.org/wiki/History_of_education_in_England](https://en.wikipedia.org/wiki/History_of_education_in_England))
    and paste that into the chat box in ChatGPT and as for a summary of the page.
    You can now ask ChatGPT for further information on any aspects, as it read the
    page we sent it and has it in its memory.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 现在要求ChatGPT编写一个网站的摘要。所以，让我们转到英国教育史的维基百科页面（[https://en.wikipedia.org/wiki/History_of_education_in_England](https://en.wikipedia.org/wiki/History_of_education_in_England)），并将其粘贴到ChatGPT的聊天框中，并要求页面的摘要。现在您可以要求ChatGPT就任何方面提供更多信息，因为它已经阅读了我们发送的页面，并将其保存在其记忆中。
- en: Now spend a few moments trying out some other questions and prompts in order
    to understand how ChatGPT interacts with you and how the basics work of sending
    and receiving prompts.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 现在花几分钟时间尝试一些其他问题和提示，以了解ChatGPT如何与你互动以及发送和接收提示的基本工作原理。
- en: Sending Effective Prompts
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 发送有效的提示
- en: Earlier we mentioned around sending effective prompts. We mentioned that important
    elements were to be clear and specific in the request, set some context, provide
    structure and to iterate when the output wasn’t quite what you needed.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 之前我们提到了发送有效提示的重要性。我们提到，请求中重要元素是要清晰具体，设定一些背景，提供结构，并在输出不是你需要的时进行迭代。
- en: 'Here are some more things to consider:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这里还有一些需要考虑的事项：
- en: Breaking down queries
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 分解查询
- en: When prompting ChatGPT it is important to not overload the questions in one
    prompt, this is a conversation. You can start the prompt with a clear question,
    some context and desired output structure. Then develop that with further prompts
    after the initial prompt is received.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 当提示ChatGPT时，重要的是不要在一个提示中过载问题，这是一个对话。你可以用一个清晰的问题、一些背景和期望的输出结构开始提示，然后在收到初始提示后进一步发展。
- en: For example, you want to ask about UK history, instead of just sending summarise
    World War 1 you might want to ask first about the lead up to WW1, then ask about
    what happened during WW1 and finally ask about the conclusion.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你想要了解英国历史，而不是仅仅发送总结第一次世界大战的内容，你可能首先想要了解第一次世界大战的导火索，然后询问第一次世界大战期间发生了什么，最后询问最终结果。
- en: Adding roles
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 添加角色
- en: Another effective method of prompting is to add a role to the prompt.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种有效的提示方法是向提示中添加一个角色。
- en: i.e. you can say “act as a teacher”, “act as a social media expert”, “act as
    a scientist”, “act as a storyteller”.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 即你可以这样说：“扮演一个老师”，“扮演一个社交媒体专家”，“扮演一个科学家”，“扮演一个讲故事的人”。
- en: This will help the context for ChatGPT to know how to respond.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 这将帮助ChatGPT了解如何回应。
- en: Explaining who the output is for
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 解释输出对象是谁
- en: Another key element of the context for ChatGPT is to explain who you want to
    relay this information to.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的另一个关键背景元素是解释你希望将此信息传达给谁。
- en: For example, “make the explanation suitable for 5-year-olds”, “explain this
    to a beginner”, “provide the output suitable for a parent”
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，“使解释适合5岁儿童”，“向初学者解释”，“提供适合家长的输出”
- en: Tone of voice
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 语调
- en: ChatGPT can change how it responds in different tones of voice.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以改变它以不同语调回应的方式。
- en: For example, you can say, “respond in a formal tone”, “respond in a casual tone”,
    “respond like Shakespeare”
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以这样说，“以正式的语调回应”，“以随意的语调回应”，“以莎士比亚的语调回应”
- en: Giving it some help
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 给它一些帮助
- en: You may know exactly how you want it to respond
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能确切知道你希望它如何回应
- en: For example, “provide output as a list”, “provide output with explanations”,
    “start with x”, “make sure to include x, y, z”
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，“以列表形式提供输出”，“提供带有解释的输出”，“从x开始”，“确保包括x、y、z”
- en: All these help ChatGPT narrow its aim and provide a much more effective output
    which will reduce the number of iterations, if any, you need to get the output
    you want.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都有助于ChatGPT缩小目标，提供更有效的输出，这将减少你需要进行迭代的次数，如果有的话。
