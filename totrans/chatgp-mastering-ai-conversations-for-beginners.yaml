  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT** 并不是第一个引发对个人信息担忧的技术进步，也不会是最后一个。我们生活在一个日益互联和互联网连接的世界，而这样做付出的代价比金钱更昂贵：它是以我们的隐私为代价的。在现代社会，不仅企业或名人容易在网上找到，几乎所有（过去20年里没有生活在岩石下或荒岛上的人）都很容易通过谷歌搜索或社交媒体追踪，从而避免被任何人找到，无论他们身在何处。我们中的大多数人不仅接受了这个事实，而且还完全拥抱了这种生活方式，不断更新我们所做的一切以及我们在哪里做，以便我们的追随者可以跟随我们充满活力的生活旅程。这些追随者不仅仅是我们的朋友和家人，他们还可以是完全的陌生人，我们永远不会见到或实际上在我们的生活中与他们交谈。其中一些陌生人可能会尝试与我们建立对话，通过发送电子邮件或滑入我们的DM，不是为了连接或分享我们的快乐和幸福，而是试图获取我们敏感的个人信息，用于他们自己的恶意目的。这被称为钓鱼，是我们互联世界最严重和最直接的影响之一。'
- en: '****Alt**houg**h ****i**t** ****m**ay** ****b**e** ****me**an** ****t**o**
