  type: TYPE_NORMAL
- en: Therefore, Listings [3-14](#PC15) and [3-15](#PC16) are snippets of the Maven
    pom.xml and Gradle build.gradle files necessary (with the versions that I tested
    with) in order to get everything to build.    <dependencies>        <!-- Gson
    library -->        <dependency>            <groupId>com.google.code.gson</groupId>            <artifactId>gson</artifactId>            <version>2.10.1</version>        </dependency>        <!--
    Kotlin standard libraries -->        <dependency>            <groupId>org.jetbrains.kotlin</groupId>            <artifactId>kotlin-stdlib</artifactId>            <version>1.6.20</version>        </dependency>        <dependency>            <groupId>org.jetbrains.kotlin</groupId>            <artifactId>kotlin-stdlib-jdk8</artifactId>            <version>1.6.20</version>        </dependency>        <!--
    OkHttp library -->        <dependency>            <groupId>com.squareup.okhttp3</groupId>            <artifactId>okhttp</artifactId>            <version>4.11.0</version>        </dependency>        <!--
    Okio library -->        <dependency>            <groupId>com.squareup.okio</groupId>            <artifactId>okio</artifactId>            <version>3.2.0</version>        </dependency>        <dependency>            <groupId>com.squareup.okio</groupId>            <artifactId>okio-jvm</artifactId>            <version>3.2.0</version>        </dependency>        <!--
    Slack SDK libraries -->        <dependency>            <groupId>com.slack.api</groupId>            <artifactId>slack-api-client</artifactId>            <version>1.30.0</version>        </dependency>        <dependency>            <groupId>com.slack.api</groupId>            <artifactId>slack-api-model</artifactId>            <version>1.30.0</version>        </dependency>        <!--
    SLF4J logging facade -->        <dependency>            <groupId>org.slf4j</groupId>            <artifactId>slf4j-api</artifactId>            <version>2.0.7</version>        </dependency>    </dependencies>Listing
