- en: 4\. Refining Multilingual Output with AI
  id: totrans-1817
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 使用AI精炼多语言输出
- en: 'Use AI iteratively:'
  id: totrans-1818
  prefs: []
  type: TYPE_NORMAL
  zh: 重复使用AI：
- en: 'Step 1: Translate'
  id: totrans-1819
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：翻译
- en: 'Step 2: Ask, “Is this culturally appropriate for [audience]?”'
  id: totrans-1820
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：询问，“这对[受众]来说文化上合适吗？”
- en: 'Step 3: Adjust tone or slang as needed'
  id: totrans-1821
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：根据需要调整语调或俚语
- en: 'Step 4: Have AI simulate a native speaker’s review'
  id: totrans-1822
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：让AI模拟母语者的评论
- en: This mimics the workflow of human translators—but in seconds.
  id: totrans-1823
  prefs: []
  type: TYPE_NORMAL
  zh: 这模仿了人工翻译的工作流程——但只需几秒钟。
- en: 5\. Combining Multilingual Messaging with Visuals
  id: totrans-1824
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 将多语言信息与视觉元素结合
- en: 'Pair text and visuals for stronger impact. Example:'
  id: totrans-1825
  prefs: []
  type: TYPE_NORMAL
  zh: 配对文本和视觉元素以增强影响力。例如：
- en: 'Prompt: “Write a short ad for an eco-friendly backpack in English and Spanish,
    then suggest a matching image idea for each language’s audience.”'
  id: totrans-1826
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“用英语和西班牙语写一个环保背包的简短广告，并为每种语言的受众提出一个匹配的图像创意。”
- en: This lets you build full, localized campaign assets—text and image—from one
    AI.
  id: totrans-1827
  prefs: []
  type: TYPE_NORMAL
  zh: 这让您可以从一个AI中构建完整的本地化活动资产——文本和图像。
- en: 6\. Tips for Better Results
  id: totrans-1828
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 提高结果的小贴士
- en: 'Be clear about language variant: e.g., Brazilian Portuguese vs. European Portuguese'
  id: totrans-1829
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确语言变体：例如，巴西葡萄牙语与欧洲葡萄牙语
- en: 'Specify tone and formality: casual, professional, poetic, etc.'
  id: totrans-1830
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指定语调和正式程度：随意、专业、诗意等
- en: 'Use roleplay: “Act like a marketing expert from Italy writing to Gen Z customers.”'
  id: totrans-1831
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用角色扮演：“扮演一个来自意大利的市场专家，给Z世代客户写信。”
- en: Ask for back-translations to check accuracy
  id: totrans-1832
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请求回译以检查准确性
- en: 'Conclusion: Speak to the World, Naturally'
  id: totrans-1833
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：自然地与世界对话
- en: AI makes multilingual communication not just possible—but scalable, fast, and
    deeply personal. With thoughtful prompting and sensitivity to cultural nuance,
    you can break down language barriers and build bridges with words.
  id: totrans-1834
  prefs: []
  type: TYPE_NORMAL
  zh: AI使多语言沟通不仅成为可能——而且可扩展、快速且深入个人。通过深思熟虑的提示和对文化细微差异的敏感性，您可以打破语言障碍，用文字建立桥梁。
- en: 'Chapter 33: Content Summarization'
  id: totrans-1835
  prefs: []
  type: TYPE_NORMAL
  zh: 第33章：内容摘要
- en: In an age of information overload, the ability to distill vast amounts of data
    into clear, concise summaries is priceless. Whether you're catching up on lengthy
    reports, processing research papers, or curating content for your audience, AI-powered
    summarization tools can save hours—without sacrificing understanding.
  id: totrans-1836
  prefs: []
  type: TYPE_NORMAL
  zh: 在信息过载的时代，将大量数据提炼成清晰、简洁的摘要是无价的。无论您是在追赶冗长的报告、处理研究论文，还是为您的受众策划内容，AI驱动的摘要工具可以节省数小时——而不会牺牲理解。
- en: This chapter dives into how AI can help you compress, reframe, and repurpose
    content for faster learning, clearer communication, and enhanced productivity.
  id: totrans-1837
  prefs: []
  type: TYPE_NORMAL
  zh: 本章深入探讨AI如何帮助您压缩、重构和重新利用内容，以实现快速学习、清晰沟通和提升生产力。
- en: 1\. The Power of Summarization
  id: totrans-1838
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 摘要的力量
- en: 'AI summarization isn''t just about shortening text—it’s about extracting the
    essence. A good summary answers:'
  id: totrans-1839
  prefs: []
  type: TYPE_NORMAL
  zh: AI摘要不仅仅是缩短文本——它是提取精华。一个好的摘要应该回答：
- en: What’s the core message?
  id: totrans-1840
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 核心信息是什么？
- en: What are the key takeaways?
  id: totrans-1841
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键收获是什么？
- en: What matters most to the target reader?
  id: totrans-1842
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对目标读者来说最重要的是什么？
- en: 'AI can help with multiple types of summaries:'
  id: totrans-1843
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以帮助多种类型的摘要：
- en: 'Abstract summaries: Interpretive and paraphrased'
  id: totrans-1844
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摘要摘要：解释性和释义
- en: 'Extractive summaries: Pulling exact phrases or sentences'
  id: totrans-1845
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提取式摘要：提取精确的短语或句子
- en: Bullet-point breakdowns
  id: totrans-1846
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要点分解
- en: Headlines or titles
  id: totrans-1847
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标题或标题
- en: 2\. How to Prompt for Better Summaries
  id: totrans-1848
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 如何提出更好的摘要提示
- en: General Summary
  id: totrans-1849
  prefs: []
  type: TYPE_NORMAL
  zh: 一般摘要
- en: “Summarize the following article in 3 paragraphs.”
  id: totrans-1850
  prefs: []
  type: TYPE_NORMAL
  zh: “将以下文章总结成3段。”
- en: By Audience
  id: totrans-1851
  prefs: []
  type: TYPE_NORMAL
  zh: 按受众分类
- en: “Summarize this legal document for a 12-year-old to understand.”
  id: totrans-1852
  prefs: []
  type: TYPE_NORMAL
  zh: “将这份法律文件总结成12岁孩子能理解的形式。”
- en: “Give a C-suite level summary of this technical report.”
  id: totrans-1853
  prefs: []
  type: TYPE_NORMAL
  zh: “为C级管理层总结这份技术报告。”
- en: By Format
  id: totrans-1854
  prefs: []
  type: TYPE_NORMAL
  zh: 按格式分类
- en: “Summarize the following podcast transcript as bullet points.”
  id: totrans-1855
  prefs: []
  type: TYPE_NORMAL
  zh: “将以下播客记录摘要为要点。”
- en: “Write a 280-character tweet summarizing this blog post.”
  id: totrans-1856
  prefs: []
  type: TYPE_NORMAL
  zh: “写一条280字符的推文总结这篇博客文章。”
- en: By Function
  id: totrans-1857
  prefs: []
  type: TYPE_NORMAL
  zh: 按功能分类
- en: “What are the pros and cons discussed in this article?”
  id: totrans-1858
  prefs: []
  type: TYPE_NORMAL
  zh: “这篇文章讨论了哪些利弊？”
- en: “Extract action items from this meeting transcript.”
  id: totrans-1859
  prefs: []
  type: TYPE_NORMAL
  zh: “从这次会议记录中提取行动项目。”
- en: 3\. Practical Use Cases
  id: totrans-1860
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 实际应用案例
