- en: '○        ****Que**stio**n : "****Wh**at** ****i**s** ****photo**synthes**is?
    "'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: ○        ****问**题**： "****什么是**光合作用**？"
- en: '○        ****Ini**tia**l ****An**swe**r : "****Photo**synthes**is ****i**s**
    ****a**** ****pro**ces**s ****b**y** ****wh**ich** ****pl**ant**s ****ma**ke**
    ****fo**od**. "'
