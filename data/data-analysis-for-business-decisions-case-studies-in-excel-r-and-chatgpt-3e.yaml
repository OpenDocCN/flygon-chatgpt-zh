- en: 'Prompt: “Do frequent flyer customers (fly > 100,000/year) feel differently
    about airport cleanliness, safety, and overall rating than regular flyers?”'
  id: totrans-1939
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：经常乘坐飞机的旅客（每年飞行超过100,000英里）对机场清洁度、安全性和整体评分的看法是否与普通旅客不同？
- en: 'Response from ChatGPT:'
  id: totrans-1940
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: 'To determine if frequent flyer customers (those who fly > 100,000 miles/year)
    feel differently about airport cleanliness, safety, and overall rating than regular
    flyers, we’ll perform the following steps:'
  id: totrans-1941
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确定经常乘坐飞机的旅客（每年飞行超过100,000英里）对机场清洁度、安全性和整体评分的看法是否与普通旅客不同，我们将执行以下步骤：
- en: '**1.**Filter the Data: Separate the data into two groups based on the frequent
    flyer criteria you provided. We’ll assume that in the Q22FLY column, a value of
    1 indicates frequent flyers (those who fly > 100,000 miles/year) and a value of
    2 indicates regular flyers.'
  id: totrans-1942
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**数据筛选：根据您提供的经常乘坐飞机的旅客标准，将数据分为两组。我们假设在Q22FLY列中，值为1表示经常乘坐飞机的旅客（每年飞行超过100,000英里），值为2表示普通旅客。'
- en: '**2.**Statistical Testing: We’ll conduct independent two-sample t-tests to
    compare the means of the scores for airport cleanliness (Q9ALL), safety (Q10SAFE),
    and overall rating (Q7ALL) between the two groups. A t-test will help determine
    if the differences observed in the means are statistically significant.'
  id: totrans-1943
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**统计检验：我们将进行独立的两组样本t检验，比较两组之间机场清洁度（Q9ALL）、安全性（Q10SAFE）和整体评分（Q7ALL）的评分均值。t检验将有助于确定均值之间的差异是否具有统计学意义。'
- en: '**3.**Analysis: Based on the results of the t-tests, we’ll draw conclusions
    about the sentiments of frequent flyers vs. regular flyers regarding cleanliness,
    safety, and overall rating.'
  id: totrans-1944
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**分析：根据t检验的结果，我们将对经常旅客与普通旅客在清洁度、安全性和整体评分方面的感受得出结论。'
- en: 'Here are the results of the t-tests comparing the sentiments of frequent flyers
    vs. regular flyers for airport cleanliness (Q9ALL), safety (Q10SAFE), and overall
    rating (Q7ALL):'
  id: totrans-1945
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是对比经常旅客与普通旅客在机场清洁度（Q9ALL）、安全性（Q10SAFE）和整体评分（Q7ALL）方面的感受的t检验结果：
- en: '**1.**Overall Rating (Q7ALL)'
  id: totrans-1946
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**整体评分（Q7ALL）'
- en: '• T-statistic: -2.685'
  id: totrans-1947
  prefs: []
  type: TYPE_NORMAL
  zh: '• T-statistic: -2.685'
- en: '• P-value: 0.0075'
  id: totrans-1948
  prefs: []
  type: TYPE_NORMAL
  zh: '• P-value: 0.0075'
- en: '**2.**Airport Cleanliness (Q9ALL)'
  id: totrans-1949
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**机场清洁度（Q9ALL）'
- en: '• T-statistic: -2.121'
  id: totrans-1950
  prefs: []
  type: TYPE_NORMAL
  zh: '• T-statistic: -2.121'
- en: '• P-value: 0.0343'
  id: totrans-1951
  prefs: []
  type: TYPE_NORMAL
  zh: '• P-value: 0.0343'
- en: '**3.**Safety (Q10SAFE)'
  id: totrans-1952
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**安全性（Q10SAFE）'
- en: '• T-statistic: 0.355'
  id: totrans-1953
  prefs: []
  type: TYPE_NORMAL
  zh: '• T-statistic: 0.355'
- en: '• P-value: 0.7230'
  id: totrans-1954
  prefs: []
  type: TYPE_NORMAL
  zh: '• P-value: 0.7230'
- en: Given a common significance level (e.g., α=0.05), the p-values for Q7ALL and
    Q9ALL are less than 0.05, suggesting that there is a statistically significant
    difference in the overall rating and cleanliness perceptions between frequent
    flyers and regular flyers. Specifically, the negative t-statistics suggest that
    frequent flyers have a lower mean rating for these two aspects compared to regular
    flyers.
  id: totrans-1955
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一个常见的显著性水平（例如，α=0.05），Q7ALL和Q9ALL的p值小于0.05，表明常旅客和普通乘客在整体评分和清洁度感知方面存在显著的统计差异。具体来说，负的t统计量表明，与普通乘客相比，常旅客在这两个方面有较低的均值评分。
- en: However, for Q10SAFE (safety), the p-value is greater than 0.05, indicating
    that there is no statistically significant difference in safety perceptions between
    the two groups.
  id: totrans-1956
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于Q10SAFE（安全），p值大于0.05，表明两组在安全感知方面没有显著的统计差异。
- en: In conclusion
  id: totrans-1957
  prefs: []
  type: TYPE_NORMAL
  zh: 总之
- en: • Frequent flyers seem to have different feelings about airport cleanliness
    and overall rating compared to regular flyers.
  id: totrans-1958
  prefs: []
  type: TYPE_NORMAL
  zh: • 与普通乘客相比，常旅客似乎对机场清洁度和整体评分有不同的感受。
- en: • There is no significant difference in safety perceptions between frequent
    flyers and regular flyers.
  id: totrans-1959
  prefs: []
  type: TYPE_NORMAL
  zh: • 常旅客和普通乘客在安全感知方面没有显著差异。
- en: CHAPTER 13
  id: totrans-1960
  prefs: []
  type: TYPE_NORMAL
  zh: 第13章
- en: CONTINGENCY ANALYSIS
  id: totrans-1961
  prefs: []
  type: TYPE_NORMAL
  zh: 概率分析
- en: '![image](images/pg299.jpg)'
  id: totrans-1962
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg299.jpg)'
- en: Contingency analysis is an essential aspect of inferential statistical analysis,
    dealing primarily with categorical variables. To comprehend its application, consider
    a scenario involving the Titanic disaster, where we investigate if survival rates
    differed based on gender. By cross-tabulating variables such as survival status
    and gender, we can form a contingency table that provides insightful data on these
    relationships. This chapter delves into such analyses, helping us determine if
    observed patterns, such as higher survival rates for women, are statistically
    significant or merely coincidental.
  id: totrans-1963
  prefs: []
  type: TYPE_NORMAL
  zh: 概率分析是推断统计分析的一个基本方面，主要处理分类变量。为了理解其应用，可以考虑一个涉及泰坦尼克号灾难的场景，在那里我们调查生存率是否因性别而异。通过交叉表变量，如生存状态和性别，我们可以形成一个提供关于这些关系的洞察性数据的概率表。本章深入探讨此类分析，帮助我们确定观察到的模式，如女性的较高生存率，是否具有统计显著性或仅仅是巧合。
- en: One of the cornerstone techniques we employ is the chi-squared test, which is
    instrumental in assessing whether there is an underlying association between two
    categorical variables. For instance, when examining the Titanic data, we see a
    higher survival rate for women. To assert that this pattern indicates a deliberate
    bias or is a result of chance, we must compute the chi-squared statistic. A p-value
    of less than 0.05 in this context would suggest that the survival outcome is not
    independent of gender, thus indicating a bias towards saving women.
  id: totrans-1964
  prefs: []
  type: TYPE_NORMAL
  zh: 我们采用的一个基石技术是卡方检验，它在评估两个分类变量之间是否存在潜在关联方面至关重要。例如，在检查泰坦尼克号数据时，我们看到女性的生存率较高。为了断言这种模式表明故意偏差或偶然结果，我们必须计算卡方统计量。在这种情况下，p值小于0.05表明生存结果与性别不独立，从而表明对女性的救助存在偏差。
- en: Setting up a chi-squared analysis can be complex, particularly in Excel, which
    necessitates using external tools for accuracy and efficiency. This chapter guides
    you through various scenarios requiring chi-squared computations, providing hands-on
    practice with freely available online tools. This methodological approach is akin
    to what we used in [Chapter 10](19_ch10.xhtml) for testing hypotheses but is tailored
    for categorical outcomes.
  id: totrans-1965
  prefs: []
  type: TYPE_NORMAL
  zh: 设置卡方分析可能很复杂，尤其是在Excel中，这需要使用外部工具以确保准确性和效率。本章指导你通过需要卡方计算的各种场景，提供使用免费在线工具的实践。这种方法论方法类似于我们在第10章（19_ch10.xhtml）中用于测试假设的方法，但针对分类结果进行了调整。
- en: Contingency analysis is pivotal in business contexts, answering critical questions
    such as whether there is an inherent relationship or bias between categorical
    variables. This technique extends beyond mere cross-tabulation; it equips us with
    the tools to test for statistical significance, thereby informing business decisions
    with a higher degree of confidence.
  id: totrans-1966
  prefs: []
  type: TYPE_NORMAL
  zh: 概率分析在商业环境中至关重要，它回答了诸如分类变量之间是否存在固有关系或偏差等关键问题。这项技术不仅超越了简单的交叉表；它为我们提供了测试统计显著性的工具，从而以更高的置信度向商业决策提供信息。
- en: 'This technique answers the following business questions: “Are two categorical
    variables independent, or is there an underlying bias or relationship between
    them?”'
  id: totrans-1967
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术回答以下商业问题：“两个分类变量是否独立，或者它们之间是否存在潜在的偏差或关系？”
- en: Contingency Analysis
  id: totrans-1968
  prefs: []
  type: TYPE_NORMAL
  zh: 情景分析
- en: What is Contingency Analysis?
  id: totrans-1969
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是情景分析？
- en: Contingency analysis, also known as cross-tabulation or crosstab analysis, is
    a powerful statistical tool used in business and data analysis to examine the
    relationship between two or more categorical variables. This method helps determine
    whether there is a significant association between these variables, providing
    valuable insights for decision-making and strategy development. The process involves
    creating a contingency table that displays the frequency distribution of variables
    in a matrix format, allowing analysts to see how different categories of one variable
    relate to categories of another.
  id: totrans-1970
  prefs: []
  type: TYPE_NORMAL
  zh: 情景分析，也称为交叉表或交叉表分析，是一种强大的统计工具，用于商业和数据分析中检查两个或多个分类变量之间的关系。这种方法有助于确定这些变量之间是否存在显著的关联，为决策和战略制定提供有价值的见解。该过程涉及创建一个列联表，以矩阵格式显示变量的频率分布，使分析师能够看到一个变量的不同类别如何与另一个变量的类别相关联。
- en: The analysis typically begins with data collection, gathering categorical data
    for at least two variables. Once the data is collected, a contingency table is
    constructed, where each cell represents the frequency of observations for a specific
    combination of variable categories. The next step involves calculating expected
    frequencies and determining what the frequency for each cell would be if there
    were no associations between variables. A chi-square test of independence is then
    performed to compare observed frequencies with expected frequencies. The resulting
    p-value is analyzed to determine if there is a statistically significant association
    between variables. To quantify the strength of any discovered association, statistics
    such as Cramer’s V or Phi coefficient may be used.
  id: totrans-1971
  prefs: []
  type: TYPE_NORMAL
  zh: 分析通常从数据收集开始，收集至少两个变量的分类数据。一旦收集到数据，就构建一个列联表，其中每个单元格代表特定变量类别组合的观察频率。下一步是计算期望频率，确定如果变量之间没有关联，每个单元格的频率会是多少。然后进行卡方检验，比较观察频率与期望频率。分析得到的p值以确定变量之间是否存在统计上显著的关联。为了量化任何发现的关联的强度，可以使用如Cramer的V或Phi系数等统计方法。
- en: In business, contingency analysis finds applications across various domains.
    It is commonly used in market segmentation to analyze relationships between demographic
    factors and product preferences, helping identify target markets. Customer behavior
    analysis benefits from this method by examining associations between customer
    characteristics and purchasing patterns. In quality control, it can investigate
    relationships between manufacturing processes and defect rates. Human resources
    departments use it to analyze connections between employee attributes and performance
    metrics. The finance and insurance sectors employ contingency analysis for risk
    assessment, studying associations between risk factors and outcomes.
  id: totrans-1972
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业领域，情景分析在各种领域都有应用。它通常用于市场细分，分析人口统计因素与产品偏好之间的关系，帮助识别目标市场。通过考察客户特征与购买模式之间的关系，客户行为分析可以从这种方法中受益。在质量控制中，它可以研究制造过程与缺陷率之间的关系。人力资源部门使用它来分析员工属性与绩效指标之间的联系。金融和保险行业采用情景分析进行风险评估，研究风险因素与结果之间的关系。
- en: Marketing teams find this tool valuable for evaluating the effectiveness of
    campaigns by examining the relationship between marketing channels and conversion
    rates. In product development, it helps analyze the association between product
    features and customer satisfaction. Sales departments use it to examine the relationship
    between sales techniques and closing rates. Even in supply chain management, contingency
    analysis proves useful in analyzing relationships between supplier characteristics
    and delivery performance.
  id: totrans-1973
  prefs: []
  type: TYPE_NORMAL
  zh: 市场团队发现这个工具很有价值，通过考察营销渠道与转化率之间的关系来评估活动的有效性。在产品开发中，它有助于分析产品特征与客户满意度之间的关联。销售部门使用它来考察销售技巧与成交率之间的关系。即使在供应链管理中，情景分析在分析供应商特征与交付性能之间的关系时也证明是有用的。
- en: While contingency analysis offers numerous benefits, including revealing hidden
    patterns in categorical data and providing a foundation for more advanced statistical
    analyses, it is important to note its limitations. This method only reveals associations,
    not causation, and the strength of associations can be influenced by sample size.
    Care must be taken to avoid misinterpreting spurious correlations. Despite these
    considerations, contingency analysis remains a versatile and valuable tool for
    businesses to uncover relationships in their categorical data, enabling more informed
    decision-making across various business functions.
  id: totrans-1974
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然列联分析提供了许多好处，包括揭示分类数据中的隐藏模式并为更高级的统计分析提供基础，但重要的是要注意其局限性。这种方法仅揭示关联，而不是因果关系，关联的强度可能受样本大小的影响。必须小心避免误解虚假相关性。尽管有这些考虑，但列联分析仍然是一种多用途且宝贵的工具，帮助企业发现其分类数据中的关系，从而在各个业务职能中做出更明智的决策。
- en: What are the Elements of Contingency Analysis?
  id: totrans-1975
  prefs: []
  type: TYPE_NORMAL
  zh: 列联分析的基本要素是什么？
- en: These elements work together to provide a comprehensive analysis of the relationship
    between categorical variables in a dataset.
  id: totrans-1976
  prefs: []
  type: TYPE_NORMAL
  zh: 这些元素共同作用，为数据集中分类变量之间的关系提供全面分析。
- en: '**1.**Categorical variables: These are the variables being analyzed, which
    can be divided into distinct categories. In a contingency analysis, you need at
    least two categorical variables.'
  id: totrans-1977
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.** 分类变量：这些是需要分析的变量，可以划分为不同的类别。在列联分析中，你需要至少两个分类变量。'
- en: '**2.**Contingency table: This is a matrix that displays the frequency distribution
    of the variables. It shows how many observations fall into each combination of
    categories.'
  id: totrans-1978
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.** 列联表：这是一个矩阵，显示了变量的频率分布。它显示了有多少观测值落在每个类别的组合中。'
- en: '**3.**Observed frequencies: These are the actual counts of occurrences in each
    cell of the contingency table. They represent the raw data collected in the study.'
  id: totrans-1979
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.** 观察频率：这些是列联表每个单元格中实际发生次数的计数。它们代表了研究中收集的原始数据。'
- en: '**4.**Expected frequencies: These are calculated values assuming no association
    between variables. They are computed using row and column totals and the overall
    sample size.'
  id: totrans-1980
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.** 期望频率：这些是在假设变量之间不存在关联的情况下计算出的值。它们使用行和列总计以及总体样本量来计算。'
- en: '**5.**Degrees of freedom: This represents the number of values in the final
    calculation that are free to vary. It is typically calculated as (rows - 1) *
    (columns - 1) in a contingency table.'
  id: totrans-1981
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.** 自由度：这代表最终计算中可以自由变化的值的数量。在列联表中，通常计算为（行数 - 1）*（列数 - 1）。'
- en: '**6.**Chi-square statistic: This is a measure of the difference between observed
    and expected frequencies. It quantifies how much the observed data deviates from
    what we would expect if there were no association.'
  id: totrans-1982
  prefs: []
  type: TYPE_NORMAL
  zh: '**6.** 卡方统计量：这是观察频率和期望频率之间差异的度量。它量化了观察数据与我们预期没有关联时的差异程度。'
- en: '**7.**P-value: This is the probability of obtaining test results at least as
    extreme as the observed results, assuming no true association exists. It helps
    determine statistical significance.'
  id: totrans-1983
  prefs: []
  type: TYPE_NORMAL
  zh: '**7.** P值：这是在假设不存在真实关联的情况下，获得至少与观察结果一样极端的测试结果的概率。它有助于确定统计显著性。'
- en: '**8.**Significance level: This is the threshold used to determine statistical
    significance, typically set at 0.05\. It represents the acceptable risk of making
    a Type I error.'
  id: totrans-1984
  prefs: []
  type: TYPE_NORMAL
  zh: '**8.** 显著性水平：这是用于确定统计显著性的阈值，通常设置为0.05。它代表了犯一类错误的可接受风险。'
- en: '**9.**Marginal totals: These are the sum of frequencies for each row and column
    in the contingency table. They provide summary information for each category of
    each variable.'
  id: totrans-1985
  prefs: []
  type: TYPE_NORMAL
  zh: '**9.** 边际总计：这些是列联表中每一行和每一列频率的总和。它们为每个变量的每个类别提供了汇总信息。'
- en: '**10.**Grand total: This is the sum of all frequencies in the table. It represents
    the total sample size in the study.'
  id: totrans-1986
  prefs: []
  type: TYPE_NORMAL
  zh: '**10.** 总计：这是表中所有频率的总和。它代表了研究中的总样本量。'
- en: '**11.**Residuals: These are the differences between observed and expected frequencies.
    They help identify which specific combinations contribute most to any observed
    association.'
  id: totrans-1987
  prefs: []
  type: TYPE_NORMAL
  zh: '**11.** 偏差：这些是观察频率和期望频率之间的差异。它们有助于确定哪些特定的组合对任何观察到的关联贡献最大。'
- en: An Example of Performing a Contingency Analysis for a Dataset
  id: totrans-1988
  prefs: []
  type: TYPE_NORMAL
  zh: 执行数据集列联分析的示例
- en: Here is an example (shown in [Figure 13.1](#fig13-1)) of a contingency table
    derived from a business application. It analyzes the relationship between age
    groups and the types of products purchased. The table is based on a pivot table
    of survey data from customers who were asked about the types of products they
    spend the majority of their monthly budget on. The customer demographic data was
    sorted into three age groups. The survey asked about major budget categories such
    as groceries, clothing, and electronics. The goal was to determine if there is
    a relationship between age and the items customers spend their money on.
  id: totrans-1989
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个例子（[图 13.1](#fig13-1) 中所示），它是一个从商业应用中得出的列联表。它分析了年龄组与购买的产品类型之间的关系。该表基于调查数据的汇总表，调查对象被问及他们每月预算的大部分花在了哪些产品类型上。客户人口统计数据被分为三个年龄组。调查询问了主要预算类别，如杂货、服装和电子产品。目标是确定年龄与客户花钱购买的商品之间是否存在关系。
- en: '![image](images/pg304.jpg)'
  id: totrans-1990
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg304.jpg)'
- en: FIGURE 13.1 The contingency table for Age Group vs. Product Type with the marginal
    totals for our example
  id: totrans-1991
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.1 年龄组与产品类型交叉表，以及示例的边际总数
- en: We conducted an analysis to determine if the age group, which is the independent
    variable in this study, affects the type of product purchased. The independence
    test, which involves calculating the chi-squared statistic, yielded a negative
    result in this case. This suggests that there is no significant relationship between
    different age groups and the types of products they purchase. In other words,
    it does not matter which age group the buyers belong to as the differences we
    observed appear to be purely random.
  id: totrans-1992
  prefs: []
  type: TYPE_NORMAL
  zh: 我们进行了一项分析，以确定年龄组（本研究的自变量）是否会影响购买的产品类型。涉及计算卡方统计量的独立性检验在此案例中得到了负结果。这表明不同年龄组与购买的产品类型之间没有显著的关系。换句话说，无论买家属于哪个年龄组，我们观察到的差异似乎完全是随机的。
- en: Chi-Square Test Results
  id: totrans-1993
  prefs: []
  type: TYPE_NORMAL
  zh: 卡方检验结果
- en: '• chi-square statistic: 2.850'
  id: totrans-1994
  prefs: []
  type: TYPE_NORMAL
  zh: • 卡方统计量：2.850
- en: '• p-value: 0.583'
  id: totrans-1995
  prefs: []
  type: TYPE_NORMAL
  zh: • p 值：0.583
- en: '• degrees of freedom (dof): 4'
  id: totrans-1996
  prefs: []
  type: TYPE_NORMAL
  zh: • 自由度（df）：4
- en: The chi-square test results indicate that there is no significant association
    between the age group and product type purchased (p-value > 0.05). This analysis
    helps to understand if different age groups have different purchasing preferences,
    which can be crucial for targeted marketing strategies.
  id: totrans-1997
  prefs: []
  type: TYPE_NORMAL
  zh: 卡方检验结果表明，年龄组与购买的产品类型之间没有显著的关联（p 值 > 0.05）。这项分析有助于理解不同年龄组是否有不同的购买偏好，这对于有针对性的营销策略可能至关重要。
- en: 'Analysis Case 13.1: Contingency Analysis and Chi-Squared'
  id: totrans-1998
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 13.1：列联分析和卡方检验
- en: Analysis with Excel
  id: totrans-1999
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Excel 进行分析
- en: In this case study, we use contingency tables and the test of independence of
    those variables to investigate the Titanic disaster more closely. Suppose you
    are an investigative journalist writing a story on the Titanic, and you hear from
    a few people that the crew of the Titanic followed the “law of the sea” in saving
    passenger lives. What is the law of the sea, and how would you demonstrate that
    the crew followed it?
  id: totrans-2000
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个案例研究中，我们使用列联表和这些变量的独立性检验来更深入地研究泰坦尼克号灾难。假设你是一位调查记者，正在撰写关于泰坦尼克号的故事，你从一些人那里听说泰坦尼克号的船员遵循了“海上法则”来救助乘客的生命。海上法则是怎样的，你将如何证明船员遵循了它？
- en: The “law of the sea” states that “women and children should be saved first in
    a disaster” (see [https://en.wikipedia.org/wiki/Women_and_children_first](https://en.wikipedia.org/wiki/Women_and_children_first)).
    Did this protocol occur on the Titanic?
  id: totrans-2001
  prefs: []
  type: TYPE_NORMAL
  zh: “海上法则”规定“在灾难中应首先救助妇女和儿童”（参见[https://en.wikipedia.org/wiki/Women_and_children_first](https://en.wikipedia.org/wiki/Women_and_children_first))。这个协议在泰坦尼克号上是否得到了执行？
- en: 'We are going to investigate it by answering the following questions about the
    Titanic disaster:'
  id: totrans-2002
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将通过回答以下关于泰坦尼克号灾难的问题来调查这个问题：
- en: Did women survive at a higher rate than men?
  id: totrans-2003
  prefs: []
  type: TYPE_NORMAL
  zh: 妇女比男性有更高的生存率吗？
- en: Did children survive at a higher rate than adults?
  id: totrans-2004
  prefs: []
  type: TYPE_NORMAL
  zh: 儿童的生存率是否高于成人？
- en: Did the passenger class of a passenger make a difference in his/her survival
    rate?
  id: totrans-2005
  prefs: []
  type: TYPE_NORMAL
  zh: 乘客的舱位等级是否对其生存率有影响？
- en: 'We are going to use contingency analysis, which is basically performed with
    pivot tables in Excel. This is what it looks like ([Figure 13.2](#fig13-2)):'
  id: totrans-2006
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用列联分析，这基本上是在 Excel 中的数据透视表中进行的。这就是它的样子（[图 13.2](#fig13-2)）：
- en: '![image](images/pg305.jpg)'
  id: totrans-2007
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg305.jpg)'
- en: FIGURE 13.2 Elements of a contingency table
  id: totrans-2008
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.2 列联表的要素
- en: Excel provides a formula to compute chi-squared and the p-value derived from
    it. Unfortunately, creating the expected matrix from the contingency table is
    complicated and tedious.
  id: totrans-2009
  prefs: []
  type: TYPE_NORMAL
  zh: Excel提供了一个公式来计算卡方统计量和由此得到的p值。不幸的是，从列联表中创建预期矩阵是复杂且繁琐的。
- en: 'In this example, we use a free chi-squared computation calculator from the
    Internet, which makes the process much easier. This calculator can analyze up
    to a 5x5 table: [http://www.socscistatistics.com/tests/chisquare2/Default2.aspx](http://www.socscistatistics.com/tests/chisquare2/Default2.aspx)
    ([Figure 13.3](#fig13-3)). For tables up to 10x10, you can use [http://www.quantpsy.org/chisq/chisq.htm](http://www.quantpsy.org/chisq/chisq.htm).'
  id: totrans-2010
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们使用互联网上的免费卡方计算器，这使得整个过程变得容易得多。这个计算器可以分析最多5x5的表格：[http://www.socscistatistics.com/tests/chisquare2/Default2.aspx](http://www.socscistatistics.com/tests/chisquare2/Default2.aspx)
    ([图13.3](#fig13-3))。对于10x10以下的表格，你可以使用[http://www.quantpsy.org/chisq/chisq.htm](http://www.quantpsy.org/chisq/chisq.htm)。
- en: '![image](images/pg306.jpg)'
  id: totrans-2011
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg306.jpg)'
- en: FIGURE 13.3 A Web-based 5×5 chi-square calculator
  id: totrans-2012
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.3 基于网络的5×5卡方计算器
- en: First, we start by creating a contingency table using a pivot table to analyze
    the two categorical variables. Then, we calculate the ratios of interest. Next,
    we use the chi-squared test to determine if the observed differences in ratios
    are statistically significant and not just due to chance. If the p-value is less
    than 0.05, we can conclude that the variables are “dependent” with at least 95%
    confidence in the reality of the differences.
  id: totrans-2013
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们通过使用数据透视表创建列联表来分析两个分类变量。然后，我们计算感兴趣的比率。接下来，我们使用卡方检验来确定观察到的比率差异是否具有统计学意义，而不仅仅是由于偶然性。如果p值小于0.05，我们可以得出结论，变量“相关”且对差异的现实性有至少95%的信心。
- en: Using the Case Dataset files provided, find the file Titanic.xlsx. Open Titanic.xlsx
    with Excel. To answer the first question, create a pivot table of gender (variable
    sex in the table) versus survival. Compute the ratios to see if women survived
    at a higher rate than men. Enter the elements of the pivot table in the 5×5 online
    calculator to ensure that the difference in survival rates was not due to chance.
    What do you see?
  id: totrans-2014
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，找到文件Titanic.xlsx。使用Excel打开Titanic.xlsx。为了回答第一个问题，创建一个性别（表中变量sex）与生存的交叉表。计算比率以查看女性是否比男性有更高的生存率。将交叉表中的元素输入到5×5的在线计算器中，以确保生存率的差异不是由于偶然性。你看到了什么？
- en: The chi-squared statistic can best be described as the standardized deviation
    of observed data from expected data. Our concern is not with the actual number
    but with the probability that the results we observe are due to chance, given
    by the p-value ([Figure 13.4](#fig13-4)).
  id: totrans-2015
  prefs: []
  type: TYPE_NORMAL
  zh: 卡方统计量最好描述为观察数据与预期数据之间标准化的偏差。我们关注的不只是实际数字，而是观察到的结果是由于偶然性造成的概率，即p值([图13.4](#fig13-4))。
- en: '![image](images/pg307.jpg)'
  id: totrans-2016
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg307.jpg)'
- en: FIGURE 13.4 Computing a contingency table using a pivot table and performing
    a chi-square analysis for independence using a Web-based calculator
  id: totrans-2017
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.4 使用数据透视表计算列联表，并使用基于网络的计算器进行独立性卡方分析
- en: To answer the next question, create a pivot table of gender (variable sex in
    the table) versus survival ([Figure 13.5](#fig13-5)). Compute the ratios to see
    if women survived at a higher rate than men and add a subcategory of the pclass
    variable (passenger class).
  id: totrans-2018
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答下一个问题，创建一个性别（表中变量sex）与生存的交叉表([图13.5](#fig13-5))。计算比率以查看女性是否比男性有更高的生存率，并添加pclass变量（乘客等级）的子类别。
- en: Again, use the online calculator inputting the elements of the pivot table to
    ensure that the differences in survival rates by passenger class were not due
    to chance. What do you see?
  id: totrans-2019
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，使用在线计算器输入交叉表的元素，以确保乘客等级的生存率差异不是由于偶然性。你看到了什么？
- en: '![image](images/pg308.jpg)'
  id: totrans-2020
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg308.jpg)'
- en: FIGURE 13.5 Computing a contingency table using a pivot table and performing
    a chi-square analysis using a Web-based calculator for a Titanic passenger survival
    analysis
  id: totrans-2021
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.5 使用数据透视表计算列联表，并使用基于网络的计算器进行泰坦尼克号乘客生存分析
- en: To answer the last question, we need to add a new variable based on age, which
    we can call CHILD (YES or NO) using an IF function (=IF(E2>14, IF(E2=”NA”,” “,”NO”),”YES”)).
    We will use 14 years of age as a cut off for children, as that was the acceptable
    age of childhood 100 years ago. Note that we want to have a blank for any persons
    whose age is not given in the table (N/A). That way, we can filter blanks out
    when we create the contingency table
  id: totrans-2022
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答最后一个问题，我们需要基于年龄添加一个新变量，我们可以使用 IF 函数（=IF(E2>14, IF(E2="NA"，" "，"NO")，"YES"））将其称为
    CHILD（是或否）。我们将使用 14 岁作为儿童的截止年龄，因为那曾是 100 年前可接受的童年年龄。请注意，我们希望为任何年龄在表中未给出的人（N/A）留出空白。这样，我们就可以在创建交叉表时过滤掉空白。
- en: Create a pivot table of CHILD versus SURVIVAL RATE ([Figure 13.6](#fig13-6)).
    Compute the ratios to see if children survived at a higher rate than adults. Add
    the subcategory pclass to determine whether there was a survival bias based on
    the passenger class.
  id: totrans-2023
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个关于儿童与生存率的交叉表（[图 13.6](#fig13-6)）。计算比率以查看儿童是否比成人有更高的生存率。添加子类别 pclass 以确定是否存在基于乘客舱等的生存偏差。
- en: Utilize the online calculator to verify that the variations in survival rates
    were not simply coincidental. Take note of the inclusion of Sparklines to visually
    represent the survival rates by class. What pattern do you observe? Is there a
    tendency for first- and second-class passengers to have higher survival rates?
    (Sparklines in Excel are miniature charts that fit within a single cell, providing
    a quick visual representation of data trends. They allow users to easily spot
    patterns and changes in data series without the need for full-sized charts, making
    them particularly useful for dashboards and summary reports. In Excel, Sparklines
    can be found and invoked from the “Insert” tab on the ribbon, under the “Sparklines”
    group, where users can choose from line, column, or win/loss chart types.)
  id: totrans-2024
  prefs: []
  type: TYPE_NORMAL
  zh: 利用在线计算器验证生存率的差异并非仅仅是巧合。注意包含 Sparklines 以直观地表示按舱等划分的生存率。你观察到什么模式？是否有首等和二等舱乘客生存率较高的趋势？（Sparklines
    在 Excel 中是适合单个单元格的微型图表，提供数据趋势的快速视觉表示。它们允许用户轻松地发现数据系列中的模式和变化，而无需全尺寸图表，这使得它们在仪表板和总结报告中特别有用。在
    Excel 中，Sparklines 可以在“插入”选项卡上的“Sparklines”组中找到并调用，用户可以选择线形、柱形或赢/输图表类型。）
- en: '![image](images/pg310.jpg)'
  id: totrans-2025
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg310.jpg)'
- en: FIGURE 13.6 Computing a contingency table using a pivot table and performing
    a chi-square analysis using a Web-based calculator for a Titanic passenger survival
    analysis based on passenger class
  id: totrans-2026
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.6 使用数据透视表计算乘客舱等别与生存率的交叉表，并使用基于网络的计算器进行卡方分析，以分析泰坦尼克号乘客的生存情况
- en: Analysis with R
  id: totrans-2027
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 R 进行分析
- en: Using the Case Dataset files provided, locate the file Titanic.xlsx. Open Titanic.xlsx
    with Jamovi. To answer the first question, create a contingency table of gender
    (variable “sex” in the table) versus survival. Make sure to display percentages
    for each gender so that it is clear how many females survived compared to males.
    The setup screen in Jamovi is shown in [Figure 13.7](#fig13-7), and the resulting
    contingency analysis is shown in [Figure 13.8](#fig13-8). Notice that the p-value
    for the chi-squared statistic is less than .001, which means the two variables
    are not independent or the survival rate is very much dependent on gender.
  id: totrans-2028
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，找到文件 Titanic.xlsx。使用 Jamovi 打开 Titanic.xlsx。为了回答第一个问题，创建一个性别（表中变量“sex”）与生存的交叉表。确保显示每个性别的百分比，以便清楚地了解与男性相比有多少女性幸存。Jamovi
    的设置屏幕如图 13.7 所示，结果交叉分析如图 13.8 所示。注意，卡方统计量的 p 值小于 .001，这意味着两个变量不独立，或者生存率非常依赖于性别。
- en: '![image](images/pg311.jpg)'
  id: totrans-2029
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg311.jpg)'
- en: FIGURE 13.7 Setup screen for creating contingency table and performing contingency
    analysis and chi-square test in Jamovi for a Titanic passenger survival versus
    gender analysis
  id: totrans-2030
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.7 创建交叉表和执行交叉分析及卡方测试的设置屏幕，用于泰坦尼克号乘客生存与性别分析
- en: '![image](images/pg311_1.jpg)'
  id: totrans-2031
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg311_1.jpg)'
- en: FIGURE 13.8 Results of creating contingency table performing contingency analysis
    and chi-square test in Jamovi for a Titanic passenger survival versus gender analysis
  id: totrans-2032
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.8 在 Jamovi 中创建交叉表、执行交叉分析和卡方测试的泰坦尼克号乘客生存与性别分析结果
- en: The initial analysis reveals that women were given priority to board the lifeboats
    over men. When we consider passenger class as the independent variable, a different
    pattern emerges. The setup screen in Jamovi is displayed in [Figure 13.9](#fig13-9),
    and the resulting contingency analysis is shown in [Figure 13.10](#fig13-10).
    It is important to note that the p-value for the chi-squared statistic is less
    than .001, indicating that the two variables are not independent or that the survival
    rate is heavily influenced by passenger class. Specifically, first- and second-class
    passengers were granted access to the lifeboats before third-class passengers.
  id: totrans-2033
  prefs: []
  type: TYPE_NORMAL
  zh: 初步分析显示，女性在登船进入救生艇方面比男性享有优先权。当我们考虑乘客等级作为自变量时，会出现不同的模式。Jamovi的设置屏幕显示在[图13.9](#fig13-9)中，相应的列联分析显示在[图13.10](#fig13-10)中。需要注意的是，卡方统计量的p值小于.001，表明这两个变量不独立，或者生存率受到乘客等级的严重影响。具体来说，一等和二等乘客在进入救生艇方面优先于三等乘客。
- en: '![image](images/pg312.jpg)'
  id: totrans-2034
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg312.jpg)'
- en: 'FIGURE 13.9: Setup screen for creating contingency table and performing contingency
    analysis and chi-square test in Jamovi for a Titanic passenger survival versus
    gender analysis'
  id: totrans-2035
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.9：在Jamovi中创建列联表并进行泰坦尼克号乘客生存与性别分析的列联分析和卡方检验的设置屏幕
- en: '![image](images/pg313.jpg)'
  id: totrans-2036
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg313.jpg)'
- en: FIGURE 13.10 Results of creating a contingency table for performing the contingency
    analysis and chi-square test in Jamovi for a Titanic passenger survival versus
    gender analysis
  id: totrans-2037
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.10 使用Jamovi对泰坦尼克号乘客生存与性别进行列联分析和卡方检验的结果
- en: Analysis with Generative AI
  id: totrans-2038
  prefs: []
  type: TYPE_NORMAL
  zh: 使用生成式AI的分析
- en: Using the Case Dataset files provided, upload the file Titanic.xlxs into ChatGPT-4\.
    Then, use the following prompts (the responses from ChatGPT are given below).
  id: totrans-2039
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，将文件Titanic.xlxs上传到ChatGPT-4。然后，使用以下提示（以下为ChatGPT的回复）。
- en: 'Prompt: “Please do a contingency analysis of the ‘survived’ versus ‘sex’ variables
    and show a table with marginal distributions and perform a chi-squared analysis
    to see if the variables are independent.”'
  id: totrans-2040
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：请对“survived”与“sex”变量进行列联分析，并展示包含边缘分布的表格，然后进行卡方分析以查看这两个变量是否独立。
- en: 'Response from ChatGPT-4:'
  id: totrans-2041
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4的回复：
- en: 'Here is the contingency analysis of the “survived” versus “sex” variable, including
    the marginal distributions:'
  id: totrans-2042
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是“survived”与“sex”变量的列联分析，包括边缘分布：
- en: TABLE 13.1 Survival vs. sex analysis results
  id: totrans-2043
  prefs: []
  type: TYPE_NORMAL
  zh: 表13.1 生存与性别分析结果
- en: '![image](images/pg314.jpg)'
  id: totrans-2044
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg314.jpg)'
- en: 'The chi-squared test results are as follows:'
  id: totrans-2045
  prefs: []
  type: TYPE_NORMAL
  zh: 卡方检验结果如下：
- en: '• chi-squared statistic: 363.62'
  id: totrans-2046
  prefs: []
  type: TYPE_NORMAL
  zh: • 卡方统计量：363.62
- en: '• p-value: 4.59e-81'
  id: totrans-2047
  prefs: []
  type: TYPE_NORMAL
  zh: • p值：4.59e-81
- en: '• degrees of freedom: 1'
  id: totrans-2048
  prefs: []
  type: TYPE_NORMAL
  zh: • 自由度：1
- en: The very low p-value indicates that there is a significant association between
    “survived” and “sex,” suggesting that these variables are not independent.
  id: totrans-2049
  prefs: []
  type: TYPE_NORMAL
  zh: 非常低的p值表明“survived”与“sex”之间存在显著关联，表明这两个变量不独立。
- en: 'Prompt: “Please do a contingency analysis of ‘survived’ versus ‘pclass’ variables
    and show a table with marginal distributions and perform a chi-squared analysis
    to see if the variables are independent.”'
  id: totrans-2050
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：请对“survived”与“pclass”变量进行列联分析，并展示包含边缘分布的表格，然后进行卡方分析以查看这两个变量是否独立。
- en: 'Response from ChatGPT-4:'
  id: totrans-2051
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT-4的回复：
- en: 'Here is the contingency analysis of the “survived” versus “pclass” variable,
    including the marginal distributions:'
  id: totrans-2052
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是“survived”与“pclass”变量的列联分析，包括边缘分布：
- en: TABLE 13.2 Survived vs. pclass variable analysis results
  id: totrans-2053
  prefs: []
  type: TYPE_NORMAL
  zh: 表13.2 生存与pclass变量分析结果
- en: '![image](images/pg314_1.jpg)'
  id: totrans-2054
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg314_1.jpg)'
- en: 'The chi-squared test results are as follows:'
  id: totrans-2055
  prefs: []
  type: TYPE_NORMAL
  zh: 卡方检验结果如下：
- en: '• chi-squared statistic: 127.86'
  id: totrans-2056
  prefs: []
  type: TYPE_NORMAL
  zh: • 卡方统计量：127.86
- en: '• p-value: 1.72e-28'
  id: totrans-2057
  prefs: []
  type: TYPE_NORMAL
  zh: • p值：1.72e-28
- en: '• degrees of freedom: 2'
  id: totrans-2058
  prefs: []
  type: TYPE_NORMAL
  zh: • 自由度：2
- en: The very low p-value indicates that there is a significant association between
    “survived” and “pclass,” suggesting that these variables are not independent.
  id: totrans-2059
  prefs: []
  type: TYPE_NORMAL
  zh: 非常低的p值表明“survived”与“pclass”之间存在显著关联，表明这两个变量不独立，或者生存率受到乘客等级的严重影响。具体来说，一等和二等乘客在进入救生艇方面优先于三等乘客。
- en: ChatGPT Answers to the Framed Analytical Questions
  id: totrans-2060
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT对框架分析问题的回答
- en: We now use ChatGPT to obtain more detailed answers to the framed questions provided
    by the generative AI tool. Remember that the relevant data file has already been
    loaded into ChatGPT for the previous computation. This is a continuation of the
    analysis. The prompts shown here obtained the following responses.
  id: totrans-2061
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在使用ChatGPT来获取由生成式AI工具提供的框架问题的更详细答案。请记住，相关数据文件已经在前一次计算中加载到ChatGPT中。这是分析的延续。这里显示的提示获得了以下回复。
- en: 'Prompt: “Did women survive at a higher rate than men?”'
  id: totrans-2062
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “女性是否比男性有更高的生存率？”
- en: 'Response from ChatGPT:'
  id: totrans-2063
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: To determine if women survived at a higher rate than men, we can look at the
    survival rates for each gender. Let’s calculate the survival rates for women and
    men from the contingency table data.
  id: totrans-2064
  prefs: []
  type: TYPE_NORMAL
  zh: 要确定女性是否比男性有更高的生存率，我们可以查看每个性别的生存率。让我们根据列联表数据计算女性和男性的生存率。
- en: '• number of women who survived: 339'
  id: totrans-2065
  prefs: []
  type: TYPE_NORMAL
  zh: • 生存的女性人数：339
- en: '• total number of women: 466'
  id: totrans-2066
  prefs: []
  type: TYPE_NORMAL
  zh: • 女性总数：466
- en: '• number of men who survived: 161'
  id: totrans-2067
  prefs: []
  type: TYPE_NORMAL
  zh: • 生存的男性人数：161
- en: '• total number of men: 843'
  id: totrans-2068
  prefs: []
  type: TYPE_NORMAL
  zh: • 男性总数：843
- en: Survival rates
  id: totrans-2069
  prefs: []
  type: TYPE_NORMAL
  zh: 生存率
- en: '• women: 339/466'
  id: totrans-2070
  prefs: []
  type: TYPE_NORMAL
  zh: • 女性：339/466
- en: '• men: 161/843'
  id: totrans-2071
  prefs: []
  type: TYPE_NORMAL
  zh: • 男性：161/843
- en: I’ll calculate these values.
  id: totrans-2072
  prefs: []
  type: TYPE_NORMAL
  zh: 我将计算这些值。
- en: 'The survival rates are as follows:'
  id: totrans-2073
  prefs: []
  type: TYPE_NORMAL
  zh: 生存率如下：
- en: '• women: 72.75%'
  id: totrans-2074
  prefs: []
  type: TYPE_NORMAL
  zh: • 女性：72.75%
- en: '• men: 19.10%'
  id: totrans-2075
  prefs: []
  type: TYPE_NORMAL
  zh: • 男性：19.10%
- en: Yes, women survived at a significantly higher rate than men on the Titanic.
  id: totrans-2076
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，女性在泰坦尼克号上的生存率显著高于男性。
- en: 'Prompt: “Did children survive at a higher rate than adults?”'
  id: totrans-2077
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “儿童是否比成人有更高的生存率？”
- en: 'Response from ChatGPT:'
  id: totrans-2078
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: To determine if children survived at a higher rate than adults, we need to define
    a threshold age to distinguish between children and adults. Typically, an age
    of 16 is used as the threshold.
  id: totrans-2079
  prefs: []
  type: TYPE_NORMAL
  zh: 要确定儿童是否比成人有更高的生存率，我们需要定义一个年龄阈值来区分儿童和成人。通常，16岁被用作阈值。
- en: 'Let’s calculate the survival rates for children (age ≤ 16) and adults (age
    > 16). I’ll start by creating the necessary contingency table and calculating
    the survival rates. Here is the contingency analysis of the survived versus age_group
    variable, including the marginal distributions:'
  id: totrans-2080
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们计算儿童（年龄≤16岁）和成人（年龄>16岁）的生存率。我将首先创建必要的列联表并计算生存率。以下是生存率与年龄组变量列联分析，包括边际分布：
- en: TABLE 13.3 Survived vs. age groups analysis results
  id: totrans-2081
  prefs: []
  type: TYPE_NORMAL
  zh: 表13.3 生存率与年龄组分析结果
- en: '![image](images/pg316.jpg)'
  id: totrans-2082
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg316.jpg)'
- en: 'The survival rates are as follows:'
  id: totrans-2083
  prefs: []
  type: TYPE_NORMAL
  zh: 生存率如下：
- en: '• children: 55.22%'
  id: totrans-2084
  prefs: []
  type: TYPE_NORMAL
  zh: • 儿童：55.22%
- en: '• adults: 36.26%'
  id: totrans-2085
  prefs: []
  type: TYPE_NORMAL
  zh: • 成人：36.26%
- en: Yes, children survived at a higher rate than adults on the Titanic.
  id: totrans-2086
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，儿童在泰坦尼克号上的生存率高于成人。
- en: 'Prompt: “Did the passenger class of a passenger make a difference in his/her
    survival rate?”'
  id: totrans-2087
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “乘客的舱位等级是否对其生存率有影响？”
- en: 'Response from ChatGPT:'
  id: totrans-2088
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: To determine if the passenger class made a difference in survival rates, we
    can calculate the survival rates for each passenger class (1st, 2nd, and 3rd).
  id: totrans-2089
  prefs: []
  type: TYPE_NORMAL
  zh: 要确定乘客舱位是否对生存率有影响，我们可以计算每个舱位（一等、二等和三等）的生存率。
- en: We’ll use the previously calculated contingency table for “survived” versus
    “pclass” and determine the survival rates for each class. Let’s calculate the
    survival rates for each passenger class.
  id: totrans-2090
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用之前计算的“生存”与“pclass”的列联表，并确定每个舱位的生存率。让我们计算每个乘客舱位的生存率。
- en: 'The survival rates for each passenger class are as follows:'
  id: totrans-2091
  prefs: []
  type: TYPE_NORMAL
  zh: 每个乘客舱位的生存率如下：
- en: '• 1st class: 61.92%'
  id: totrans-2092
  prefs: []
  type: TYPE_NORMAL
  zh: • 一等舱：61.92%
- en: '• 2nd class: 42.96%'
  id: totrans-2093
  prefs: []
  type: TYPE_NORMAL
  zh: • 二等舱：42.96%
- en: '• 3rd class: 25.53%'
  id: totrans-2094
  prefs: []
  type: TYPE_NORMAL
  zh: • 三等舱：25.53%
- en: Yes, the passenger class made a significant difference in survival rates. Passengers
    in 1st class had the highest survival rate, followed by those in 2nd class, and
    then 3rd class.
  id: totrans-2095
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，乘客舱位对生存率有显著影响。一等舱乘客的生存率最高，其次是二等舱，然后是三等舱。
- en: Lastly, let’s see how the GenAI tool handles the overarching question that drove
    this analysis about “the law of the sea.”
  id: totrans-2096
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们看看GenAI工具如何处理推动这次分析关于“海上法则”的总体问题。
- en: 'Prompt: “Can you tell if the crew of the Titanic followed the ‘law of the sea’
    in this disaster? What evidence is there?”'
  id: totrans-2097
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “你能判断泰坦尼克号的船员在这场灾难中是否遵循了‘海上法则’？有什么证据？”
- en: 'Response from ChatGPT:'
  id: totrans-2098
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: We’ll focus on the survivability of passengers, disregarding the crew, and examine
    whether women, children, and passengers in higher classes had higher survival
    rates.
  id: totrans-2099
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将关注乘客的生存能力，不考虑船员，并检查女性、儿童和高级舱位的乘客是否具有更高的生存率。
- en: 'Here’s a summary of our findings so far:'
  id: totrans-2100
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们的发现总结如下：
- en: '**1.**Survival Rates by Gender'
  id: totrans-2101
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**按性别划分的生存率'
- en: '**a.**women: 72.75%'
  id: totrans-2102
  prefs: []
  type: TYPE_NORMAL
  zh: '**a.**女性：72.75%'
- en: '**b.**men: 19.10%'
  id: totrans-2103
  prefs: []
  type: TYPE_NORMAL
  zh: '**b.**男性：19.10%'
- en: '**2.**Survival Rates by Age'
  id: totrans-2104
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**按年龄的生存率'
- en: '**a.**children: 55.22%'
  id: totrans-2105
  prefs: []
  type: TYPE_NORMAL
  zh: '**a.**儿童：55.22%'
- en: '**b.**adults: 36.26%'
  id: totrans-2106
  prefs: []
  type: TYPE_NORMAL
  zh: '**b.**成人：36.26%'
- en: '**3.**Survival Rates by Class:'
  id: totrans-2107
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**按舱位的生存率：'
- en: '**a.**1st class: 61.92%'
  id: totrans-2108
  prefs: []
  type: TYPE_NORMAL
  zh: '**a.**一等舱：61.92%'
- en: '**b.**2nd class: 42.96%'
  id: totrans-2109
  prefs: []
  type: TYPE_NORMAL
  zh: '**b.**二等舱：42.96%'
- en: '**c.**3rd class: 25.53%'
  id: totrans-2110
  prefs: []
  type: TYPE_NORMAL
  zh: '**c.**三等舱：25.53%'
- en: 'Let’s summarize the evidence:'
  id: totrans-2111
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们总结一下证据：
- en: • Women had a significantly higher survival rate compared to men, indicating
    adherence to the “women and children first” norm.
  id: totrans-2112
  prefs: []
  type: TYPE_NORMAL
  zh: • 与男性相比，女性的生存率显著更高，表明遵守了“妇女和儿童优先”的规范。
- en: • Children had a higher survival rate compared to adults, further supporting
    the same norm.
  id: totrans-2113
  prefs: []
  type: TYPE_NORMAL
  zh: • 与成人相比，儿童的生存率更高，进一步支持了相同的规范。
- en: • Passengers in 1st and 2nd class had higher survival rates compared to those
    in 3rd class, suggesting that higher class passengers were prioritized in the
    evacuation process.
  id: totrans-2114
  prefs: []
  type: TYPE_NORMAL
  zh: • 一等舱和二等舱的乘客比三等舱的乘客有更高的生存率，这表明在疏散过程中优先考虑了高等级舱位的乘客。
- en: Based on these findings, it appears that the norms of the “law of the sea” were
    largely followed, with a focus on saving women, children, and higher-class passengers.
    However, without detailed data on the crew’s actions, we cannot fully assess their
    compliance. The high survival rates of women, children, and higher-class passengers
    strongly suggest that these norms influenced the evacuation process.
  id: totrans-2115
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这些发现，似乎“海洋法”的规范在很大程度上得到了遵守，重点是救助妇女、儿童和高级舱位的乘客。然而，由于缺乏关于船员行动的详细数据，我们无法完全评估他们的合规性。妇女、儿童和高级舱位乘客的高生存率强烈表明这些规范影响了疏散过程。
- en: 'Analysis Case 13.2: Analysis Using SFO Airport Survey Data'
  id: totrans-2116
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例13.2：使用SFO机场调查数据进行分析
- en: Analysis with Excel
  id: totrans-2117
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel进行分析
- en: Use the Case Dataset files provided in the [Chapter 13](22_ch13.xhtml) folder,
    and find the file
  id: totrans-2118
  prefs: []
  type: TYPE_NORMAL
  zh: 使用[第13章](22_ch13.xhtml)文件夹中提供的案例数据集文件，并找到文件
- en: 2016_SFO_Customer_Survey_Data.xls. Open the data dictionary and have it available
    to consult as you work with the data.
  id: totrans-2119
  prefs: []
  type: TYPE_NORMAL
  zh: 2016_SFO_Customer_Survey_Data.xls。打开数据字典，并在处理数据时随时查阅。
- en: 'We are going to answer several questions using contingency analysis:'
  id: totrans-2120
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用列联分析来回答几个问题：
- en: How does the overall satisfaction level with the SFO Airport vary by gender?
  id: totrans-2121
  prefs: []
  type: TYPE_NORMAL
  zh: 对SFO机场的整体满意度水平如何随性别变化？
- en: How does the overall satisfaction level vary by income level?
  id: totrans-2122
  prefs: []
  type: TYPE_NORMAL
  zh: 整体满意度水平如何随收入水平变化？
- en: How does the overall satisfaction level vary by age?
  id: totrans-2123
  prefs: []
  type: TYPE_NORMAL
  zh: 整体满意度水平如何随年龄变化？
- en: Open the data file using Excel. Create a pivot table of Q7ALL by Q22GENDER ([Figure
    13.11](#fig13-11)). Make sure to remove the “0” and “6” response rows for Q7 and
    the blank and “3” responses for Q22\. Perform a chi-squared test to ensure that
    the variables are dependent. Check the percentage approval using the sum of the
    numbers of “4” and “5” ratings.
  id: totrans-2124
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel打开数据文件。创建一个以Q7ALL为行，Q22GENDER为列的交叉表（[图13.11](#fig13-11)）。确保删除Q7的“0”和“6”回答行以及Q22的空白和“3”回答行。进行卡方检验以确保变量相关。通过“4”和“5”评分的总数检查百分比批准情况。
- en: '![image](images/pg320.jpg)'
  id: totrans-2125
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg320.jpg)'
- en: FIGURE 13.11 Computing the contingency table using a pivot table and performing
    a chi-square analysis using a Web-based calculator for a Titanic passenger survival
    analysis based on passenger class
  id: totrans-2126
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.11 使用交叉表计算列联表，并使用基于乘客舱位的Web在线计算器进行卡方分析，以进行泰坦尼克号乘客生存分析
- en: Create a pivot table of Q7ALL by Q21INCOME ([Figure 13.12](#fig13-12)). Make
    sure to remove the “0” and “6” response rows for Q7 and the blank and “3” responses
    for Q21\. Perform a chi-squared test to assure that the variables are dependent.
    Check the percentage approval using the sum of the number of the “4” and “5” ratings.
    Note the addition of a Sparkline graph to visualize the differences across income
    levels.
  id: totrans-2127
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个以Q7ALL为行，Q21INCOME为列的交叉表（[图13.12](#fig13-12)）。确保删除Q7的“0”和“6”回答行以及Q21的空白和“3”回答行。进行卡方检验以确保变量相关。通过“4”和“5”评分的总数检查百分比批准情况。注意添加Sparkline图表以可视化不同收入水平之间的差异。
- en: '![image](images/pg321.jpg)'
  id: totrans-2128
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg321.jpg)'
- en: FIGURE 13.12 Computing a contingency table using a pivot table and performing
    a chi-square analysis using a Web-based calculator for a passenger satisfaction
    analysis based on passenger income level
  id: totrans-2129
  prefs: []
  type: TYPE_NORMAL
  zh: 图13.12 使用交叉表计算列联表，并使用基于乘客收入水平的乘客满意度分析基于Web的在线计算器进行卡方分析
- en: Create a pivot table of Q7ALL by Q22GENDER ([Figure 13.13](#fig13-13)). Make
    sure to remove the “0” and “6” response rows for Q7 and the blank and “3” responses
    for Q22\. Perform a chi-squared test to ensure that the variables are dependent.
    Check the percentage approval using sum of the number of the “4” and “5” ratings.
    Note that we had to use a different online calculator for chi-squared statistic
    since we have more than five levels for one of the variables ([http://www.quantpsy.org/chisq/chisq.htm](http://www.quantpsy.org/chisq/chisq.htm)).
  id: totrans-2130
  prefs: []
  type: TYPE_NORMAL
  zh: 通过 Q22GENDER 创建 Q7ALL 的数据透视表（[图 13.13](#fig13-13)）。确保删除 Q7 的“0”和“6”响应行以及 Q22
    的空白和“3”响应。执行卡方检验以确保变量相关。检查百分比批准率，即“4”和“5”评分的总数。请注意，由于其中一个变量的级别超过五个，我们不得不使用不同的在线计算器来计算卡方统计量（[http://www.quantpsy.org/chisq/chisq.htm](http://www.quantpsy.org/chisq/chisq.htm)）。
- en: '![image](images/pg322.jpg)'
  id: totrans-2131
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg322.jpg)'
- en: FIGURE 13.13 Computing a contingency table using a pivot table and performing
    a chi-square analysis using a Web-based calculator for a passenger satisfaction
    analysis based on passenger age bracket
  id: totrans-2132
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.13 展示了使用数据透视表计算列联表并进行基于乘客年龄段的乘客满意度分析时，使用基于网络的计算器进行卡方分析。
- en: Analysis with R
  id: totrans-2133
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 R 进行分析
- en: Please make sure to use the raw survey results to create a flat file with Q7ALL
    (overall satisfaction score), age variable Q19AGE, income variable Q21INCOME,
    and gender variable Q20GENDER. After creating the file, clean it by removing spurious
    data elements such as 0 and 6 scores for satisfaction (they are codes, not scores),
    anything other than MALE and FEMALE from the gender variable, and other spurious
    elements in the income variable. You can also use generative AI to extract and
    clean the variables if you are comfortable with using it, or you can use the prepared
    file 2016_SFO_Customer_Survey_Data_Final_Updated.xlsx found in the [Chapter 13](22_ch13.xhtml)
    folder. Open the data file using Jamovi. Create a contingency analysis including
    computing chi-squared statistics.
  id: totrans-2134
  prefs: []
  type: TYPE_NORMAL
  zh: 请确保使用原始调查结果创建包含 Q7ALL（总体满意度得分）、年龄变量 Q19AGE、收入变量 Q21INCOME 和性别变量 Q20GENDER 的平面文件。创建文件后，通过删除满意度得分为
    0 和 6 的虚假数据元素（它们是代码，不是得分）、性别变量中除 MALE 和 FEMALE 之外的所有内容以及收入变量中的其他虚假元素来清理它。如果您熟悉使用生成式
    AI 提取和清理变量，您也可以使用它，或者您可以使用位于 [第 13 章](22_ch13.xhtml) 文件夹中的准备好的文件 2016_SFO_Customer_Survey_Data_Final_Updated.xlsx。使用
    Jamovi 打开数据文件。创建一个包括计算卡方统计量的列联分析。
- en: '[Figure 13.14](#fig13-14) shows the Jamovi parameter set up for Q7ALL versus
    age. [Figure 13.15](#fig13-15) shows the resulting contingency analysis and chi-squared
    results.'
  id: totrans-2135
  prefs: []
  type: TYPE_NORMAL
  zh: '[图 13.14](#fig13-14) 展示了 Q7ALL 与年龄对应的 Jamovi 参数设置。[图 13.15](#fig13-15) 展示了相应的列联分析和卡方结果。'
- en: '![image](images/pg323.jpg)'
  id: totrans-2136
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg323.jpg)'
- en: FIGURE 13.14 The Jamovi parameter setup for Q7ALL versus age contingency analysis
  id: totrans-2137
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.14 展示了 Q7ALL 与年龄对应的列联分析 Jamovi 参数设置。
- en: '![image](images/pg324.jpg)'
  id: totrans-2138
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg324.jpg)'
- en: FIGURE 13.15 The resulting contingency analysis and chi-squared results for
    Q7ALL versus age
  id: totrans-2139
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13.15 展示了 Q7ALL 与年龄对应的列联分析和卡方结果。
- en: '[Figure 13.16](#fig13-16) shows the Jamovi parameter set up for Q7ALL versus
    income levels. [Figure 13.17](#fig13-17) shows the resulting contingency analysis
    and chi-squared results.'
  id: totrans-2140
