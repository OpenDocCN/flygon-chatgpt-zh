  zh: '**不仅**未来的**机器**需要**思考**、**行走**和**交谈**，**它们**还需要**感知****周围**的**世界**。这**比**你**可能**认为的**更**具**挑战性**，**因为**一个**机器人**要**做到**这一点**，**但**技术**正在**逐渐****实现**。**使用**传感器（**摄像头**、**无线信号**、**麦克风**等）**而不是**感官（**听觉**、**触觉**、**视觉**、**触觉**和**嗅觉**），**机器**正在**学习**如何**更好地**感知**周围**的世界**。**在**机器**感知**方面**取得**的**重大**进步，特别是在**软件**程序**编程**用于**识别****语音**、**面部**和**物体**方面，**这**导致**我们**到达**现代**AI**的**最终**特征……'
