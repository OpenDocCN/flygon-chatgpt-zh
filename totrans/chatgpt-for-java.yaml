    approach to creating automated apps to work with Discord servers. Mostly everything
    that we need comes from the net.dv8tion.jda.api package, which exists in the net.dv8tion-<VERSION>
    jar file.
  prefs: []
  type: TYPE_NORMAL
- en: The JDA library has its own dependencies, which are
