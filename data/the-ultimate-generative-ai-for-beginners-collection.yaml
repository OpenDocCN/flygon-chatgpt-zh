  type: TYPE_NORMAL
  zh: 留下评论：在亚马逊上分享你对这本书的想法
- en: 'Be honest: Whether you loved the book or have suggestions for improvement,
    your feedback is invaluable.'
  id: totrans-640
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要诚实：无论你是否喜欢这本书，或者有改进的建议，你的反馈都是无价的。
- en: 'Be specific: Mention what you found most helpful, inspiring, or interesting.
