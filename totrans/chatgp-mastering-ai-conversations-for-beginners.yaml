    ****cra**ftin**g ****pow**erfu**l ****pro**mpt**s ****req**uire**s ****fee**din**g
    ****Cha**tGP**T ****t**he** ****re**al**-****wo**rld** ****expe**rienc**e ****i**t**’****s****
    ****lac**kin**g.'
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: '****如果你****正在寻找使用ChatGPT来帮助你处理工作-生活，那么你****很幸运！****因为你可以提供我们的强大****lil’聊天机器人****所需的确切信息（以及它缺少什么，以及你需要什么来获得最大利益）：真实世界的专业知识。****当我们想到提示工程这个职业时，我们并不是在想象一个“****杰克-万能-杂技演员”****类型的角色，这个人可以坐下并连接上完美的提示，无论主题是什么——无论是医疗保健还是加密货币。****这需要了解行业的内情和外情，以及术语和语言，以便能够设计出完美的提示。****大多数针对提示工程师的工作发布都非常明确，他们正在寻找那些拥有“****行业特定专业知识”****的人（格兰特，2023）。****虽然成为提示工程师可能不像你想象的那么容易，但它也意味着你可以为你的特定利基或行业设计提示。****正如我们上面提到的，制作强大的提示需要向ChatGPT提供它所缺乏的真实世界经验。'
