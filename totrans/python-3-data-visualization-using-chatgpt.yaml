- en: Before delving into code samples that work with strings, the next section briefly
    discusses Unicode and UTF-8, both of which are character encodings.
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入探讨与字符串一起工作的代码示例之前，下一节简要讨论Unicode和UTF-8，它们都是字符编码。
- en: '**UNICODE AND UTF-8**'
  id: totrans-593
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**UNICODE和UTF-8**'
- en: A Unicode string consists of a sequence of numbers that are between 0 and 0x10ffff,
    where each number represents a group of bytes. An *encoding* is the manner in
    which a Unicode string is translated into a sequence of bytes. Among the various
    encodings, UTF-8 (“Unicode Transformation Format”) is perhaps the most common,
    and it is also the default encoding for many systems. The digit 8 in UTF-8 indicates
    that the encoding uses 8-bit numbers, whereas UTF-16 uses 16-bit numbers (but
    this encoding is less common).
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: Unicode字符串由一系列介于0和0x10ffff之间的数字组成，其中每个数字代表一组字节。*编码*是将Unicode字符串转换为一系列字节的方式。在各种编码中，UTF-8（“Unicode转换格式”）可能是最常用的，它也是许多系统的默认编码。UTF-8中的数字8表示编码使用8位数字，而UTF-16使用16位数字（但这种编码较少见）。
- en: The ASCII character set is a subset of UTF-8, so a valid ASCII string can be
    read as a UTF-8 string without any re-encoding required. In addition, a Unicode
    string can be converted into a UTF-8 string.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: ASCII字符集是UTF-8的子集，因此有效的ASCII字符串可以作为一个UTF-8字符串读取，无需重新编码。此外，Unicode字符串可以转换为UTF-8字符串。
- en: '**WORKING WITH UNICODE**'
