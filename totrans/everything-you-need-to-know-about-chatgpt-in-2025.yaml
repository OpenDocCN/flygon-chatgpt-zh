  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**除了** **技术** **进步** **之外**， **转换器** **架构** **已经** **民主化** **了** **人工智能** **开发**
    **的** **访问** **。 **工具** **如** **Hugging Face** **和** **PyTorch** **已经** **将**
