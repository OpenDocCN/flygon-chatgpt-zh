  zh: '*使用过去五年内发表在信誉良好的科学期刊上的数据。*'
- en: 'Desired Output:'
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 所需输出：
- en: '*Provide a concise summary with informative graphs and tables, targeting an
