  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: '**为了使人工智能为社会带来更大利益，伦理框架和负责任的政策至关重要。许多政府和组织开始着手解决这些问题，起草政策以规范人工智能的发展，并建立数据使用、隐私和问责制标准。在未来几年，我们可以期待这些法规不断完善，并变得更加全面，明确如何使用像ChatGPT这样的工具，以及应采取哪些安全措施。**'
