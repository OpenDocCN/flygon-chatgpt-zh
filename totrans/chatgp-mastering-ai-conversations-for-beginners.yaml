  prefs: []
  type: TYPE_NORMAL
  zh: 就像我们刚刚看到的，正是在19世纪末和20世纪初，我们今天称之为计算机的第一代“思考机器”出现了。虽然这些现代AI的祖先当时无法做更多的事情，主要只能进行基本的计算任务，但它们在当时绝对是划时代的。在一定的圈子内，是这样的。直到20世纪80年代，史蒂夫·乔布斯和苹果公司才使计算机和AI对普通乔布斯变得可访问。在此之前，AI几乎完全局限于数学家、科学家、哲学家、军事人员和科幻小说作家等人的领域。虽然最后这一类人参与AI可能看起来不那么明显，但想想这个：我们讲述关于在数百年前我们第一次踏上月球表面之前，月球可能是什么样子。所有这些早期AI热情支持者心中的一个大问题是：“机器能思考吗？”
