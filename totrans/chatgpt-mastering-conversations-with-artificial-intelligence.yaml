    Medicine, Pharmacy, Science, and Technology of Targu Mures, Romania, EU. His published
    work includes books, scholarly articles, and science popularization articles aimed
    at making science and technology subjects more accessible.
  prefs: []
  type: TYPE_NORMAL
- en: He embraced many roles such as leader, strategist, educator, researcher, academic
    writer, and visiting professor at universities from the UK, Ireland, Norway, France,
    The Netherlands, Spain, Italy, and Greece.
  prefs: []
  type: TYPE_NORMAL
