  type: TYPE_NORMAL
  zh: '**医学教育是一个动态且要求高的领域，需要有效的教学方法来确保未来的医疗保健专业人员能够充分准备，以应对临床实践中的挑战。人工智能（AI），如ChatGPT，已被证明是辅助教学、在各种教育活动中提供支持的有力工具。然而，为了最大限度地发挥这项技术的潜力，必须确保提供给AI的促进因素——或指令——是清晰、详细且结构良好的**。'
