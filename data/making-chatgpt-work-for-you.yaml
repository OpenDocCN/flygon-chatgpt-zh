  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者（们），独家授权给APress Media, LLC，Springer Nature的一部分，2025L. Evelyn让ChatGPT为您服务[https://doi.org/10.1007/979-8-8688-1445-7_2](https://doi.org/10.1007/979-8-8688-1445-7_2)
- en: '2. Prompt Engineering: The Key to Being a Pro at Using ChatGPT'
  id: totrans-258
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. 提示工程：成为ChatGPT高手的秘诀
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: Lydia Evelyn^([1](#Aff2)  )(1)加泰罗尼亚，西班牙
- en: When you set out to use ChatGPT to help you with a project, come up with an
    idea, or streamline your productivity at work, there’s one thing that will set
    you apart from a very dry and unhelpful response from ChatGPT to something unique
    and usable for any number of use cases—good prompt engineering. In this chapter,
    we’re going to take a closer look at prompt engineering and review some of the
    most popular conventions for getting helpful responses.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 当您开始使用ChatGPT帮助您完成项目、提出想法或提高工作效率时，有一件事将使您与ChatGPT的非常枯燥和无用的响应区分开来，那就是独特且适用于各种用例的——良好的提示工程。在本章中，我们将更深入地探讨提示工程，并回顾一些最受欢迎的获取有用响应的惯例。
- en: Explaining Prompt Engineering by Using Prompt Engineering
  id: totrans-261
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过提示工程解释提示工程
- en: Let’s kick things off with an example. Prompt [2-1](#PC1) is our very first
    prompt. We’re going to ask ChatGPT to explain what prompt engineering is all about.
    This will give us a concrete idea of how to interact with ChatGPT and get useful
    information from it.In simple terms, explain what prompt engineering is.Prompt
    2-1
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个例子开始。提示[2-1](#PC1)是我们第一个提示。我们将要求ChatGPT解释提示工程是什么。这将给我们一个具体的概念，了解如何与ChatGPT互动并从中获取有用的信息。简单来说，解释一下提示工程是什么。
- en: The beginning! What’s prompt engineering? This is a nice, simple prompt. Unlike
    a Google search, where we might just ask “What is prompt engineering?” we’re guiding
    ChatGPT toward the type of response we want and telling it how we want it. We’re
    not looking for a lengthy article—just a straightforward answer to a direct question.
    Let’s see how ChatGPT answered in this example, shown in Response [2-1](#PC2).Prompt
    engineering is the process of crafting and refining the questions or instructions
    (prompts) that are given to an AI to generate useful or creative responses. It
    involves designing the prompt in a way that guides the AI to understand and produce
    the desired outcome more effectively. This can include specifying details, adjusting
    the tone, or focusing the request to leverage the AI's capabilities optimally.
    The goal is to enhance the AI's performance by providing clear, specific, and
    well-thought-out prompts.Response 2-1
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 开始！什么是提示工程？这是一个简单、良好的提示。与谷歌搜索不同，我们可能会简单地问“什么是提示工程？”我们是在引导ChatGPT走向我们想要的回答类型，并告诉它我们想要的方式。我们不是在寻找一篇冗长的文章——只是对一个直接问题的直接回答。让我们看看ChatGPT在这个例子中的回答，如响应[2-1](#PC2)。提示工程是制作和改进提供给AI的问题或指令（提示）的过程，以便生成有用或创造性的回答。这包括指定细节、调整语气或集中请求以最佳利用AI的能力。目标是通过对AI提供清晰、具体和深思熟虑的提示来提高AI的性能。
- en: A simple introduction to prompt engineering
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程的简单介绍
- en: This is a decent explanation of prompt engineering that helps us understand
    it in simple terms, and it’s certainly easier to read here compared to reading
    an entire article on the subject. However, in my opinion, it’s a bit too bare
    and maybe a little complex and dry. So let's use prompt engineering to get a better
    response.Give me a more conversational answer and go into more detail so I can
    learn best practices for prompt engineering.Prompt 2-2
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对提示工程的相当不错的解释，它以简单的方式帮助我们理解它，并且与阅读关于这个主题的整篇文章相比，在这里阅读要容易得多。然而，在我看来，它有点过于简单，可能有点复杂和枯燥。所以让我们使用提示工程来获得更好的回答。给我一个更对话式的回答，并深入细节，这样我就可以学习提示工程的最佳实践。
- en: Clarifying our needs to ChatGPT
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 明确我们的需求给ChatGPT
- en: What are we looking for in this response? We want ChatGPT to explain this in
    a way that anyone can understand, using simpler terms and a bit more detail. We
    want an explanation that not only defines prompt engineering but also gives us
    practical tips on how to use it to get the best results. We’ve updated our input,
    so let’s look at the results in Response [2-2](#PC4).Sure, I'd be happy to dive
    deeper into prompt engineering! It's a bit like being a director in a play—you
    have to give clear and thoughtful instructions to get the best performance out
    of your actors, or in this case, the AI.When you're prompt engineering, you're
    basically fine-tuning the way you ask the AI questions or give it tasks. The clearer
    and more specific your instructions, the better the AI can perform. Here are a
    few best practices:**1\. Be Specific:** Ambiguity can lead the AI down the wrong
    path. If you need a specific type of answer, make sure your prompt reflects that.
    For example, if you want a detailed explanation, specify that instead of just
    asking a broad question.**2\. Provide Context:** Sometimes, the AI needs a bit
    of background to give you the right answer. If your question relates to a specific
    topic or requires certain knowledge, include that context in your prompt.**3\.
    Use Clear Language:** Avoid jargon, unless it's relevant to the query, and try
    to be as clear as possible. The AI is good at following instructions but can get
    tripped up by overly complex language or double negatives.**4\. Iterative Refinement:**
    Don't be afraid to refine your prompts based on the responses you get. Sometimes,
    the first response from an AI gives you a better idea of how to ask a more effective
    follow-up question.**5\. Experiment:** Try different phrasings or approaches to
    see what yields the best results. You might find that slight changes in how you
    phrase a question can make a big difference in the type of answers you receive.Think
    of it as a collaborative effort where your role is to guide the AI with precision
    and clarity, enhancing the likelihood of getting back exactly what you need.Response
    2-2
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这个响应中寻找什么？我们希望ChatGPT以一种任何人都能理解的方式解释，使用更简单的术语和一些更多的细节。我们希望一个不仅定义了提示工程，还提供了如何使用它以获得最佳结果的实用技巧的解释。我们已经更新了输入，让我们看看响应[2-2](#PC4)的结果。当然，我很乐意深入探讨提示工程！这有点像是一个戏剧的导演——你必须给出清晰和深思熟虑的指示，以从你的演员（在这种情况下，是AI）那里获得最佳表现。当你进行提示工程时，你基本上是在微调你向AI提问或给它分配任务的方式。你的指示越清晰、越具体，AI的表现就越好。以下是一些最佳实践：**1.
    具体明确：**含糊不清可能导致AI走向错误的方向。如果你需要特定类型的答案，确保你的提示反映了这一点。例如，如果你想得到一个详细的解释，明确指出这一点，而不是仅仅提出一个广泛的问题。**2.
    提供背景：**有时，AI需要一些背景信息才能给出正确的答案。如果你的问题与特定主题相关或需要某些知识，请确保在提示中包含这些背景信息。**3. 使用清晰的语言：**除非与查询相关，否则避免使用行话，并尽量清晰。AI擅长遵循指示，但可能会被过于复杂的语言或双重否定所困扰。**4.
    逐步改进：**不要害怕根据你得到的响应来改进你的提示。有时，AI的第一个响应会给你一个更好的想法，如何提出一个更有效的后续问题。**5. 尝试不同的方法：**尝试不同的措辞或方法，看看哪种方法能产生最佳结果。你可能发现，你对问题的措辞的微小变化会在你收到的答案类型上产生重大差异。把它看作是一个协作努力，你的角色是精确而清晰地引导AI，从而增加你得到所需结果的几率。
- en: Getting a better response from ChatGPT on how to get good responses from ChatGPT
    (talk about inception)
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 从ChatGPT获取更好的响应，了解如何从ChatGPT获得良好响应（谈论起源）
- en: This is excellent! With a little more input, we were able to get ChatGPT to
    give us very helpful instructions on how to… well, use ChatGPT.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 这太棒了！通过一点更多的输入，我们能够让ChatGPT给我们提供非常有用的指导，关于如何……嗯，使用ChatGPT。
- en: This is a great basis to start with, and to add to it, we’re going to take a
    look at the most common approaches to prompting ChatGPT for various use cases.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个很好的起点，为了增加内容，我们将探讨针对各种用例提示ChatGPT的常见方法。
- en: Most Commonly Used Techniques for Prompt Engineering
  id: totrans-271
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最常用的提示工程技术
- en: Now that we know what prompt engineering is, we can take a look at some of the
    best approaches to do it well. You’d be surprised how a simple change in phrasing
    can make the difference between a decent answer and a great one. Here, we’ll cover
    some of the most common techniques to get ChatGPT to give you creative and useful
    responses you can use in a variety of situations.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经知道了什么是提示工程，我们可以看看一些最佳方法来做好它。你会惊讶于一个简单的措辞变化如何能让一个不错的答案和一个出色的答案之间产生差异。在这里，我们将介绍一些最常见的技术，让ChatGPT给出你在各种情况下都可以使用的创造性和有用的响应。
- en: 'Example 1: Teaching English to Non-native Speakers'
  id: totrans-273
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例1：教授非母语人士英语
- en: Now, imagine you’re a teacher trying to teach English to foreign students with
    various levels of competency in the language. In order to do so, you need to create
    a curriculum that accommodates your students and covers different topics and exercises
    that allow beginners to start right away and more experienced students to pick
    up where they left off. Let’s look at two approaches we could take to build a
    curriculum for our English students. We’re using Prompt [2-3](#PC5) to get us
    started.I'm an English teacher for foreign students and I'm looking for inspiration
    for creating a comprehensive curriculum.Prompt 2-3
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，想象一下你是一名教师，试图教授英语给不同语言能力水平的留学生。为了做到这一点，你需要创建一个能够适应你的学生，涵盖不同主题和练习的课程，让初学者能够立即开始学习，而更有经验的学生能够从上次离开的地方继续学习。让我们看看我们可以采取的两种方法来为我们的英语学生构建课程。我们正在使用提示[2-3](#PC5)来开始我们的工作。我是一个外国学生的英语教师，我在寻找创建一个全面课程灵感的提示。提示2-3
- en: 'Describing the problem Response [2-3](#PC6) shows the response we got from
    ChatGPT for creating a curriculum for an English teacher.Creating a comprehensive
    curriculum for teaching English to foreign students involves several key steps.
    Here''s a structured approach to help you design an effective and engaging curriculum:*Step
    1: Define Objectives**Language Proficiency Levels:* Identify the proficiency levels
    (beginner, intermediate, advanced) and align your curriculum with the Common European
    Framework of Reference for Languages (CEFR) or other standards like ACTFL.*Skills
    Focus:* Determine the focus areas: speaking, listening, reading, writing, grammar,
    and vocabulary.*Cultural Competence*:  Include cultural knowledge and intercultural
    communication skills.*Step 2: Needs Analysis**Assess Student Needs:* Conduct surveys
    or interviews to understand the specific needs, interests, and goals of your students.*Diagnostic
    Tests:* Use placement tests to determine students'' current proficiency levels.*Step
    3: Develop Content and Materials**Thematic Units:* Organize the curriculum into
    thematic units (e.g., daily life, travel, work, education).*Grammar and Vocabulary:*
    Introduce grammar and vocabulary systematically and contextually.*Integrated Skills:*
    Design activities that integrate multiple skills (e.g., a project that involves
    reading, writing, and speaking).*Step 4: Create Lesson Plans**Structured Lessons:*
    Develop lesson plans that follow a consistent structure (warm-up, introduction,
    practice, production, review).*Diverse Activities:* Include a variety of activities
    (e.g., discussions, role-plays, games, writing exercises).*Authentic Materials:*
    Use authentic materials like news articles, videos, podcasts, and literature to
    enhance learning.*Step 5: Assessment and Evaluation**Formative Assessments:* Use
    quizzes, homework, and in-class activities to monitor progress.*Summative Assessments:*
    Design tests and projects to evaluate overall proficiency at the end of units
    or terms.*Self-Assessment:* Encourage students to reflect on their learning and
    set personal goals.*Step 6: Incorporate Technology**Digital Tools:* Utilize language
    learning apps, online dictionaries, and grammar checkers.*Interactive Platforms:*
    Use platforms like Google Classroom, Edmodo, or Moodle to manage assignments and
    communication.*Multimedia Resources:* Incorporate videos, interactive exercises,
    and audio recordings to enhance engagement.*Step 7: Continuous Improvement**Feedback:*
    Regularly gather feedback from students and other teachers.*Professional Development:*
    Stay updated with the latest teaching methods and resources through workshops,
    webinars, and courses.*Adapt and Update:* Continuously revise and improve the
    curriculum based on feedback and new developments in language teaching.*Sample
    Curriculum Outline**Beginner Level**1\. Unit 1: Introductions and Personal Information*Greetings,
    introductions, personal information questions.Grammar: Simple present tense, pronouns.Vocabulary:
    Family, numbers, days of the week.Activities: Role-plays, flashcards, matching
    games.*2\. Unit 2: Daily Routines*Describing daily routines and habits.Grammar:
    Present simple tense, adverbs of frequency.Vocabulary: Daily activities, time
    expressions.Activities: Schedules, interviews, diary entries.*Intermediate Level**1\.
    Unit 1: Travel and Transportation*Discussing travel plans, using public transportation.Grammar:
    Future tense (will, going to), modal verbs.Vocabulary: Travel-related terms, directions.Activities:
    Trip planning, map reading, dialogues.*2\. Unit 2: Health and Wellness*Talking
    about health issues and remedies.Grammar: Present perfect tense, comparatives
    and superlatives.Vocabulary: Body parts, symptoms, medical terms.Activities: Doctor-patient
    role-plays, health surveys.*Advanced Level**1\. Unit 1: Work and Career*Job interviews,
    discussing career goals.Grammar: Conditionals, passive voice.Vocabulary: Job-related
    terms, professional skills.Activities: Mock interviews, resume writing, career
    planning.*2\. Unit 2: Social Issues*    *-* *Debating social issues, discussing
    news articles.*    *-* *Grammar: Reported speech, relative clauses.*    *-* *Vocabulary:
    Social issues, opinion expressions.*    *-* *Activities: Debates, article analysis,
    opinion essays.**Resources and Tools**Textbooks and Workbooks:* Choose reputable
    ESL textbooks that align with your curriculum.*Online Resources:* Websites like
    BBC Learning English, ESL Library, and Duolingo.*Interactive Apps:* Quizlet, Kahoot,
    and Anki for vocabulary practice.*Final Tips**Engage Students:* Make lessons interactive
    and student-centered.*Real-life Practice:* Encourage students to practice English
    outside the classroom.*Cultural Exchange:* Incorporate cultural lessons and encourage
    sharing of cultural experiences.By following these steps and continuously refining
    your approach, you can create a comprehensive and effective curriculum that meets
    the diverse needs of your students.Response 2-3'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 描述问题 响应 [2-3](#PC6) 展示了 ChatGPT 为英语教师创建课程所得到的反馈。为外国学生教授英语的综合课程设计涉及几个关键步骤。以下是一个结构化的方法，帮助您设计一个有效且吸引人的课程：*步骤
    1：定义目标**语言熟练程度水平：**确定熟练程度水平（初学者、中级、高级），并将您的课程与欧洲共同参考框架（CEFR）或其他标准（如ACTFL）相一致。*技能重点：*确定重点领域：口语、听力、阅读、写作、语法和词汇。*文化能力：*包括文化知识和跨文化交流技能。*步骤
    2：需求分析**评估学生需求：*通过调查或访谈了解学生的具体需求、兴趣和目标。*诊断测试：*使用分级测试来确定学生的当前熟练程度。*步骤 3：开发内容和材料**主题单元：*将课程组织成主题单元（例如，日常生活、旅行、工作、教育）。*语法和词汇：*系统性地、情境性地介绍语法和词汇。*综合技能：*设计涉及多种技能的活动（例如，涉及阅读、写作和口语的项目）。*步骤
    4：创建课程计划**结构化课程：*制定遵循一致结构的课程计划（热身、介绍、练习、产出、复习）。*多样化活动：*包括各种活动（例如，讨论、角色扮演、游戏、写作练习）。*真实材料：*使用真实材料，如新闻文章、视频、播客和文学作品，以增强学习效果。*步骤
    5：评估和评价**形成性评估：*使用测验、家庭作业和课堂活动来监控进度。*总结性评估：*设计测试和项目，以评估单元或学期末的整体熟练程度。*自我评估：*鼓励学生反思他们的学习并设定个人目标。*步骤
    6：融入技术**数字工具：*利用语言学习应用程序、在线词典和语法检查器。*互动平台：*使用 Google Classroom、Edmodo 或 Moodle
    等平台来管理作业和沟通。*多媒体资源：*融入视频、互动练习和音频录音，以增强参与度。*步骤 7：持续改进**反馈：*定期收集学生和其他教师的反馈。*专业发展：*通过研讨会、网络研讨会和课程，了解最新的教学方法资源。*适应和更新：*根据反馈和语言教学的新发展，持续修订和改进课程。*样本课程大纲**初学者水平**1.
    单元 1：介绍和个人信息*问候语、介绍、个人信息问题。语法：简单现在时态、代词。词汇：家庭、数字、星期几。活动：角色扮演、闪卡、匹配游戏。*2. 单元 2：日常生活*描述日常生活和习惯。语法：现在简单时态、频率副词。词汇：日常活动、时间表达。活动：日程安排、访谈、日记条目。**中级水平**1.
    单元 1：旅行和交通*讨论旅行计划，使用公共交通。语法：将来时态（will，going to）、情态动词。词汇：与旅行相关的术语、方向。活动：旅行计划、地图阅读、对话。*2.
    单元 2：健康和福祉*谈论健康问题和治疗方法。语法：现在完成时态、比较级和最高级。词汇：身体部位、症状、医疗术语。活动：医生-病人角色扮演、健康调查。**高级水平**1.
    单元 1：工作和职业*面试、讨论职业目标。语法：条件句、被动语态。词汇：与工作相关的术语、专业技能。活动：模拟面试、简历写作、职业规划。*2. 单元 2：社会问题*    *-*
    *辩论社会问题，讨论新闻文章。    *-* *语法：间接引语、关系从句。    *-* *词汇：社会问题、观点表达。    *-* *活动：辩论、文章分析、观点文章。**资源和工具**教科书和练习册：选择与您的课程相一致的可信的
    ESL 教科书。在线资源：如 BBC Learning English、ESL Library 和 Duolingo 等网站。互动应用程序：Quizlet、Kahoot
    和 Anki 用于词汇练习。**最终提示***参与学生：使课程互动并以学生为中心。*现实生活实践：鼓励学生在课堂外练习英语。*文化交流：融入文化课程并鼓励分享文化经验。通过遵循这些步骤并不断改进您的做法，您可以创建一个全面且有效的课程，满足学生多样化的需求。响应
    2-3
- en: ChatGPT creates a curriculum for an English teacher
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT为英语教师创建课程
- en: This is already a very helpful response. It provides multiple suggestions, an
    example lesson plan, and tips for constructing a curriculum successfully, even
    beyond the suggestions ChatGPT has given us here.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 这已经是一个非常有帮助的回答了。它提供了多个建议，一个示例课程计划，以及成功构建课程的小贴士，甚至超出了ChatGPT在这里给出的建议。
- en: However, this single prompt won’t create an entire lesson plan. See how we still
    need a teacher to construct something usable? The lesson plan ChatGPT provided
    us covers a broad range of topics; however, some of it may not be helpful for
    our complete beginners. For instance, beginners wouldn’t be ready to discuss politics
    at any point in their first semester. Conversely, more advanced students only
    have two units to learn from, which couldn’t last them an entire semester of learning.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这个单一提示并不能创建一个完整的课程计划。看看我们仍然需要教师来构建一个可用的东西？ChatGPT提供的课程计划涵盖了广泛的主题；然而，其中一些可能对我们这些初学者并不适用。例如，初学者在他们的第一个学期中任何时刻都还没有准备好讨论政治。相反，更高级的学生只有两个单元要学习，这不足以支撑他们整个学期的学习。
- en: Moreover, ChatGPT is essentially telling us to come up with the rest on our
    own. But we don’t have to do it all ourselves. There’s a way to get ChatGPT to
    take on the role of teacher and put more of the burden on the chatbot, which can
    help streamline our productivity and reduce the time spent brainstorming.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，ChatGPT实际上是在告诉我们自己想出其余的部分。但我们不必全部自己来做。有一种方法可以让ChatGPT承担教师的角色，并将更多的负担放在聊天机器人上，这有助于提高我们的生产力并减少头脑风暴所花费的时间。
- en: Make ChatGPT Know Its Role in the Conversation. Start with “You Are a…”
  id: totrans-280
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 让ChatGPT了解它在对话中的角色。从“你是……”开始
- en: In this case, the trick to getting an even more detailed response from ChatGPT
    is to make it answer from the perspective of *being* the teacher, as shown in
    Prompt [2-4](#PC7).You are an English teacher for foreign students that needs
    to create a curriculum that's comprehensive and easy to approach from various
    languages.Prompt 2-4
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，从ChatGPT那里获得更详细回答的技巧是让它从“成为”教师的视角来回答，如提示[2-4](#PC7)所示。你是为外国学生授课的英语教师，需要创建一个全面且易于从各种语言接近的课程。提示2-4
- en: 'Ensure ChatGPT knows its place! The difference between the two prompts is that
    your prompt makes ChatGPT play the role of the helpful assistant giving an English
    teacher some suggestions, which puts more burden on us for deciding how much to
    use and how much to disregard. However, in the second scenario, by telling ChatGPT
    to place itself in the shoes of the teacher itself, we’re telling ChatGPT to give
    us an answer that comes from the viewpoint of a professional. ChatGPT is answering
    as someone that knows how to teach kids proficiently, as opposed to being the
    one giving professional ideas. Response [2-4](#PC8) shows how ChatGPT answered.Creating
    a comprehensive and accessible English curriculum for foreign students involves
    structuring the course to cater to different proficiency levels, incorporating
    various teaching methods, and considering the linguistic and cultural backgrounds
    of the students. Here''s a detailed curriculum outline:*Curriculum Overview**Levels:
    Beginner, Intermediate, Advanced**Components:*1\. Vocabulary2\. Grammar3\. Reading
    Comprehension4\. Writing5\. Listening Comprehension6\. Speaking7\. Cultural Context*Beginner
    Level**1\. Vocabulary*   - Basic words: Greetings, numbers, colors, days of the
    week, common objects   - Thematic vocabulary: Family, school, food, body parts*2\.
    Grammar*   - Simple sentence structure: Subject + Verb + Object   - Present simple
    tense   - Basic pronouns (I, you, he, she, it, we, they)   - Articles (a, an,
    the)3\. Reading Comprehension   - Short, simple texts: Dialogues, descriptions,
    daily routines   - Comprehension questions focusing on identifying key information*4\.
    Writing*   - Simple sentences and short paragraphs   - Personal introductions,
    describing familiar objects or routines*5\. Listening Comprehension*   - Listening
    to slow, clear speech: Simple conversations, instructions   - Identifying basic
    information from spoken language*6\. Speaking*   - Basic conversational phrases   -
    Pronunciation practice   - Role-playing simple scenarios (e.g., shopping, asking
    for directions)*7\. Cultural Context*   - Introductions to English-speaking cultures   -
    Common customs and polite expressions*Intermediate Level**1\. Vocabulary*   -
    Expanding thematic vocabulary: Travel, hobbies, weather, jobs   - Synonyms and
    antonyms*2\. Grammar*   - Past simple and present continuous tenses   - Comparative
    and superlative adjectives   - Modals (can, could, may, might, should)   - Introduction
    to complex sentences: Conjunctions (and, but, because)*3\. Reading Comprehension*   -
    Short stories and articles   - Answering comprehension questions and summarizing
    texts*4\. Writing*   - Structured paragraphs and short essays   - Descriptive
    writing, narrating events*5\. Listening Comprehension*   - Listening to conversations
    and short stories   - Answering questions about main ideas and details*6\. Speaking*   -
    Extended conversations   - Group discussions and presentations   - Practicing
    intonation and stress in sentences*7\. Cultural Context*   - Deeper understanding
    of English-speaking countries'' traditions   - Social norms and etiquette*Advanced
    Level**1\. Vocabulary*   - Advanced vocabulary: Idioms, phrasal verbs, academic
    terms   - Contextual usage and nuances*2\. Grammar*   - Present perfect and past
    perfect tenses   - Passive voice   - Conditional sentences   - Reported speech*3\.
    Reading Comprehension*   - Longer, complex texts: Essays, news articles, literature
    excerpts   - Critical analysis and interpretation*4\. Writing*   - Essays, reports,
    and creative writing   - Coherent and cohesive writing style   - Argumentative
    and persuasive writing*5\. Listening Comprehension*   - Understanding different
    accents and faster speech   - Listening to lectures, debates, and news reports   -
    Inferencing and identifying implied meanings*6\. Speaking*   - Debates and discussions
    on various topics   - Formal presentations   - Fluency and accuracy in spoken
    English*7\. Cultural Context*   - Cultural diversity in English-speaking countries   -
    Analyzing cultural references in media and literature*Teaching Methods**1\. Interactive
    Activities:* Role-plays, group work, games*2\. Multimedia Resources:* Videos,
    audio recordings, online exercises*3\. Real-life Contexts*: Simulating real-world
    scenarios, field trips*4\. Feedback and Assessment:* Regular quizzes, feedback
    sessions, and progress reports*Additional Resources*   - *Textbooks and Workbooks:*
    Structured exercises and explanations   - *Online Platforms:* Duolingo, BBC Learning
    English, ESL websites   - *Apps:* Language learning apps for practice on the go   -
    *Cultural Exchange Programs:* Connecting with native speakers and cultural immersion
    activities*Curriculum Implementation**1\. Assessment:* Initial placement tests
    to determine proficiency levels.*2\. Customization:* Adapting the curriculum based
    on students'' linguistic backgrounds and learning needs.*3\. Progress Tracking:*
    Regular assessments and feedback to monitor student progress.*4\. Support Systems:*
    Providing additional support through tutoring, language labs, and study groups.By
    tailoring this curriculum to the specific needs of your students and incorporating
    various teaching methods, you can create an engaging and effective English learning
    experience for foreign students.Response 2-4'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 确保ChatGPT知道自己的位置！两个提示之间的区别在于你的提示让ChatGPT扮演一个有帮助的助手，为英语老师提供一些建议，这让我们在决定使用多少以及忽略多少方面承担了更多责任。然而，在第二种情况下，通过告诉ChatGPT将自己置于老师的角色，我们是在告诉ChatGPT给出一个来自专业人士观点的答案。ChatGPT在回答问题时，是以一个知道如何高效教授孩子的身份来回答的，而不是作为一个提供专业想法的人。响应[2-4](#PC8)展示了ChatGPT的回答方式。
- en: ChatGPT answers as a teacher creating a curriculum for teaching English
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT以教师身份创建英语教学课程
- en: This answer is extremely expansive and goes more in depth. It covers grammar,
    suggests exercises for students, and creates a comprehensive plan for teaching
    students to read and write, speak, and listen at every stage of learning. This
    answer provides suggestions for using various tools for learning such as Duolingo
    and BBC English to complement the learning plan.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 这个答案非常详尽，深入探讨了更多内容。它涵盖了语法，为学生提供了练习建议，并为每个学习阶段的学生阅读和写作、口语和听力制定了全面的计划。这个答案提供了使用各种学习工具的建议，如Duolingo和BBC英语，以补充学习计划。
- en: Both answers provided by ChatGPT are helpful, but making ChatGPT play the role
    of a teacher has given us a plan that’s pretty close to being actionable. From
    here, ChatGPT can be prompted to create individual lessons based upon the suggestions
    it’s already made, create templates for quizzes with answers, and more (however,
    be careful relying on the answers from ChatGPT for creating material that should
    be double-checked for accuracy; see **Notes** at the end of this chapter for more
    details).
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提供的两个答案都很有帮助，但让ChatGPT扮演教师的角色为我们提供了一个几乎可以实施的计划。从这里，ChatGPT可以被提示根据它已经提出的建议创建个别课程，创建带有答案的测验模板等等（然而，在创建需要准确性的材料时，请谨慎依赖ChatGPT的答案；请参阅本章末尾的**注意事项**以获取更多详细信息）。
- en: 'Example 2: Summarizing a Paper on the History of DNA for a Fifth Grader and
    a College Student'
  id: totrans-286
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例2：为五年级学生和大学生总结DNA历史论文
- en: Just about everyone struggles to find the right words. In a text message to
    a friend, you might end almost every sentence with “LOL,” but that would be considered
    unprofessional in an email to your boss. Sometimes you know *what* you’re trying
    to say, but not *how* you should say it. You’re telling your boss that you had
    a pretty wild trip back home from vacation, but without putting “LOL” at the end,
    how do you keep the tone light?
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎每个人都在寻找合适的词语。在给朋友的短信中，你可能几乎每个句子都以“LOL”结尾，但在给老板的电子邮件中这样做会被认为是不专业的。有时你知道自己想说什么，但不知道该如何表达。你想要告诉老板假期回家旅途非常刺激，但如果不加上“LOL”，该如何保持轻松的语气呢？
- en: Instead of having an existential crisis, we’re going to turn to ChatGPT to transform
    our weak attempt at using the English language into something appropriate for
    different people in different situations.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不会陷入存在主义危机，而是会求助于ChatGPT，将我们使用英语的薄弱尝试转化为适合不同情境中不同人的表达。
- en: In this case, we’re going to look at how we can improve the language of a very
    plainly written summary. This will be the imaginary introduction to an imaginary
    paper on the discovery of DNA. Remember how we talked about ChatGPT being nondeterministic?
    Well, this is an example that really highlights that feature. We’re going to take
    the same text and write it for two different audiences.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们将探讨如何改进一份非常直白的总结的语言。这将是一篇关于DNA发现的假想论文的假想引言。还记得我们讨论ChatGPT的非确定性吗？这是一个真正突出这一特性的例子。我们将用相同的文本为两个不同的受众撰写。
- en: Set the Tone for a Fifth Grade Science Report
  id: totrans-290
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 为五年级科学报告设定基调
- en: We already have a summary that we’re asking ChatGPT to edit to make it more
    appropriate for different purposes. Prompt [2-5](#PC9) is an example for a fifth
    grade science report.Rewrite this introductory summary to suit the tone of a 5th
    grader's science report:###This report explores the history of DNA discovery,
    starting with the early 20th-century advancements in genetics, highlighted by
    the rediscovery of Mendel's principles by Hugo de Vries, Carl Correns, and Erich
    von Tschermak. Thomas Hunt Morgan's work with fruit flies demonstrated that genes
    are located on chromosomes. Despite this, the chemical nature of genes remained
    unknown until mid-century. Key experiments by scientists like Oswald Avery, who
    identified DNA as the genetic material, and the Hershey-Chase experiments confirmed
    this. The 1950s were pivotal, with Maurice Wilkins, Rosalind Franklin, James Watson,
    and Francis Crick contributing to the discovery of DNA's double helix structure.
    Linus Pauling's earlier work on protein helices also played a role. These discoveries
    were foundational in understanding molecular biology and genetics, providing insights
    into the complex interactions of genes and proteins.Prompt 2-5
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经有一个摘要，我们要求ChatGPT编辑使其更适合不同的目的。提示[2-5](#PC9)是一个五年级科学报告的例子。将以下简介重写以适应五年级学生科学报告的语气：###本报告探讨了DNA发现的历史，从20世纪初遗传学的进步开始，以Hugo
    de Vries、Carl Correns和Erich von Tschermak重新发现孟德尔的原理为亮点。Thomas Hunt Morgan通过果蝇的工作表明基因位于染色体上。尽管如此，直到中世纪，基因的化学性质仍然是个谜。像Oswald
    Avery这样的科学家进行了关键实验，确定了DNA作为遗传物质，Hershey-Chase实验也证实了这一点。20世纪50年代是关键时期，Maurice Wilkins、Rosalind
    Franklin、James Watson和Francis Crick对DNA双螺旋结构的发现做出了贡献。Linus Pauling对蛋白质螺旋的早期工作也起到了作用。这些发现对于理解分子生物学和遗传学的基础至关重要，提供了关于基因和蛋白质复杂相互作用的见解。
- en: Getting ChatGPT to edit a science report summary
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 让ChatGPT编辑科学报告摘要
- en: If you notice, we separated the context of the prompt (namely, the report summary)
    by three pound signs (###). This is a generally accepted technique that helps
    ChatGPT separate context and provide an answer that will meet your expectations,
    without getting anything confused.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你注意的话，我们通过三个井号（###）将提示的上下文（即报告摘要）进行了分隔。这是一个普遍接受的技巧，有助于ChatGPT区分上下文并提供一个符合你期望的答案，而不会造成任何混淆。
- en: We can see how ChatGPT answered this prompt in Response [2-5](#PC10).My Science
    Report on the History of DNA DiscoveryIn this report, we're going to learn about
    how scientists discovered DNA. It all started in the early 1900s when three scientists,
    Hugo de Vries, Carl Correns, and Erich von Tschermak, found out about Mendel's
    rules for how traits are passed down in plants. Then, Thomas Hunt Morgan did experiments
    with fruit flies and showed that genes are on chromosomes.But even though they
    knew where genes were, nobody knew what they were made of until much later. Scientists
    like Oswald Avery did important experiments and found out that DNA is the material
    that carries genetic information. Later, the Hershey-Chase experiments confirmed
    Avery's findings.The 1950s were super important for DNA discovery. Maurice Wilkins
    and Rosalind Franklin used X-ray pictures to study DNA, and James Watson and Francis
    Crick figured out that DNA has a double helix shape, like a twisted ladder. Linus
    Pauling's work on proteins also helped with understanding DNA's structure.All
    these discoveries helped scientists understand molecular biology and genetics
    better. They learned how genes and proteins interact, which was a big deal for
    science.Response 2-5
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在响应[2-5](#PC10)中看到ChatGPT是如何回答这个提示的。我的DNA发现历史科学报告在这个报告中，我们将学习科学家是如何发现DNA的。一切始于20世纪初，当时三位科学家Hugo
    de Vries、Carl Correns和Erich von Tschermak发现了孟德尔关于植物性状遗传的规律。然后，Thomas Hunt Morgan通过果蝇实验表明基因位于染色体上。尽管如此，直到很久以后，科学家们才知道基因是由什么组成的。像Oswald
    Avery这样的科学家进行了重要的实验，发现DNA是携带遗传信息的物质。后来，Hershey-Chase实验证实了Avery的发现。20世纪50年代对DNA发现来说非常重要。Maurice
    Wilkins和Rosalind Franklin利用X射线图片研究DNA，James Watson和Francis Crick确定了DNA具有双螺旋形状，就像一个扭曲的梯子。Linus
    Pauling对蛋白质的研究工作也有助于理解DNA的结构。所有这些发现帮助科学家更好地理解分子生物学和遗传学。他们了解到基因和蛋白质是如何相互作用的，这对科学来说是一个重大突破。
- en: ChatGPT helps us adjust the tone for a science report
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT帮助我们调整科学报告的语气
- en: This response expands on what we provided in the context of our prompt and does
    a good job of adjusting the tone to sound more juvenile. ChatGPT was made to specifically
    be able to understand and convey tone very well, and that shows here.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 这个响应扩展了我们提示中的内容，并且很好地调整了语气，使其听起来更加年轻化。ChatGPT 被设计成能够很好地理解和传达语气，这一点在这里得到了体现。
- en: But there’s even more we can do. Because ChatGPT is nondeterministic, with a
    small change to the prompt, we’re going to get a completely different response
    in a completely different tone.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们还能做更多。因为 ChatGPT 是非确定性的，通过稍微改变提示，我们将得到一个完全不同语气和风格的响应。
- en: Set the Tone for an English Paper on the Discovery of DNA
  id: totrans-298
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 为一篇关于 DNA 发现的英文论文设定基调
- en: Now we’re going to use the same summary from Prompt [2-5](#PC9), but we’re going
    to alter it a bit so that we’re asking ChatGPT to help us write for a completely
    different purpose. This time, we’re looking for a more academic tone in the response
    (Prompt [2-6](#PC11)).Rewrite this in the tone of an introductory summary on the
    history of DNA and its discovery. Extra points are given out for making the tone
    of the writing engaging and easy to read, yet professional and academic.###This
    report explores the history of DNA discovery, starting with the early 20th-century
    advancements in genetics, highlighted by the rediscovery of Mendel's principles
    by Hugo de Vries, Carl Correns, and Erich von Tschermak. Thomas Hunt Morgan's
    work with fruit flies demonstrated that genes are located on chromosomes. Despite
    this, the chemical nature of genes remained unknown until mid-century. Key experiments
    by scientists like Oswald Avery, who identified DNA as the genetic material, and
    the Hershey-Chase experiments confirmed this. The 1950s were pivotal, with Maurice
    Wilkins, Rosalind Franklin, James Watson, and Francis Crick contributing to the
    discovery of DNA's double helix structure. Linus Pauling's earlier work on protein
    helices also played a role. These discoveries were foundational in understanding
    molecular biology and genetics, providing insights into the complex interactions
    of genes and proteins.Prompt 2-6
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将使用来自提示 [2-5](#PC9) 的相同摘要，但我们会稍作修改，以便让 ChatGPT 帮助我们为完全不同的目的写作。这次，我们希望响应中带有更学术的语气（提示
    [2-6](#PC11)）。以下报告探讨了 DNA 发现的历史，从20世纪初遗传学的早期进展开始，以雨果·德·弗里斯、卡尔·科伦斯和埃里希·冯·切马克重新发现孟德尔原理为标志。托马斯·亨特·摩尔根使用果蝇的工作表明基因位于染色体上。尽管如此，直到中世纪，基因的化学性质仍然是个未知数。科学家如奥斯瓦尔德·艾弗里等人的关键实验确定了
    DNA 是遗传物质，赫希-查斯实验也证实了这一点。20世纪50年代是关键时期，莫里斯·威尔金斯、罗莎琳德·富兰克林、詹姆斯·沃森和弗朗西斯·克里克对 DNA
    双螺旋结构的发现做出了贡献。林纳斯·鲍林在蛋白质螺旋方面的早期工作也起到了作用。这些发现对于理解分子生物学和遗传学具有基础性意义，为基因和蛋白质的复杂相互作用提供了见解。
- en: 'Asking for an introductory paragraph for an English paper With our slight changes
    made, we can see just how well ChatGPT adheres to our request in Response [2-6](#PC12).The
    Journey of DNA Discovery: From Early Genetics to the Double HelixThe story of
    DNA discovery is a fascinating journey through the evolution of genetics and molecular
    biology. It begins in the early 20th century with the rediscovery of Gregor Mendel''s
    principles of inheritance by scientists Hugo de Vries, Carl Correns, and Erich
    von Tschermak. These foundational ideas were crucial in establishing the field
    of genetics, but the quest to understand the physical basis of heredity had only
    just begun.Thomas Hunt Morgan''s groundbreaking work with fruit flies in the 1910s
    provided a key breakthrough. By demonstrating that genes are located on chromosomes,
    Morgan paved the way for a deeper exploration into the chemical nature of these
    hereditary units. Despite this, the specific molecule responsible for genetic
    information remained a mystery well into the mid-20th century.A major milestone
    was achieved in the 1940s by Oswald Avery and his colleagues, who identified DNA
    as the substance that carried genetic information. This finding was further solidified
    by the Hershey-Chase experiments in 1952, which provided clear evidence that DNA,
    and not protein, was the genetic material in viruses.The 1950s marked a pivotal
    era in DNA research. The collaborative efforts of scientists Maurice Wilkins,
    Rosalind Franklin, James Watson, and Francis Crick led to the discovery of the
    DNA double helix structure. This iconic model, revealed in 1953, elucidated how
    genetic information is stored and replicated. Franklin''s critical X-ray diffraction
    images and Wilkins'' insights were instrumental, alongside Watson and Crick''s
    theoretical model building.Additionally, Linus Pauling''s earlier research on
    protein helices laid essential groundwork for understanding molecular structures,
    influencing Watson and Crick''s approach to the DNA model.These discoveries have
    profoundly impacted our understanding of molecular biology and genetics, providing
    invaluable insights into the complex interplay of genes and proteins. The journey
    from Mendelian genetics to the elucidation of the double helix represents one
    of the most significant scientific achievements shaping modern biology and medicine.Response
    2-6'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 请求一篇英语论文的引言段落。通过我们稍作修改，我们可以看到ChatGPT在响应[2-6](#PC12)中是如何严格遵守我们的要求的。《DNA发现的旅程：从早期遗传学到双螺旋》DNA发现的历程是遗传学和分子生物学演变中一段迷人的旅程。它始于20世纪初，科学家雨果·德·弗里斯、卡尔·科伦斯和埃里希·冯·切马克重新发现了格雷戈尔·孟德尔的遗传学原理。这些基础性思想对于建立遗传学领域至关重要，但理解遗传的物理基础的研究才刚刚开始。托马斯·亨特·摩尔根在20世纪10年代对果蝇进行的开创性工作提供了一个关键的突破。通过证明基因位于染色体上，摩尔根为深入探索这些遗传单位的化学性质铺平了道路。尽管如此，负责遗传信息的特定分子直到20世纪中叶仍是一个谜。1940年代，奥斯瓦尔德·阿维里和他的同事们在研究过程中取得了重大里程碑，他们确定了DNA是携带遗传信息的物质。这一发现通过1952年赫希-查斯实验的进一步证实得到了巩固，该实验提供了明确的证据，表明DNA而不是蛋白质是病毒中的遗传物质。20世纪50年代是DNA研究的关键时期。科学家莫里斯·威尔金斯、罗莎琳德·富兰克林、詹姆斯·沃森和弗朗西斯·克里克的合作努力导致了DNA双螺旋结构的发现。这个标志性的模型在1953年揭晓，阐明了遗传信息是如何存储和复制的。富兰克林的至关重要X射线衍射图像和威尔金斯的洞察力，以及沃森和克里克的模型构建理论，都起到了关键作用。此外，林纳斯·鲍林对蛋白质螺旋的早期研究为理解分子结构奠定了基础，影响了沃森和克里克对DNA模型的方法。这些发现对我们对分子生物学和遗传学的理解产生了深远的影响，为我们提供了关于基因和蛋白质复杂相互作用的宝贵见解。从孟德尔遗传学到双螺旋结构的阐明，这一旅程代表了塑造现代生物学和医学的最重要科学成就之一。响应2-6
- en: ChatGPT completely changes the tone of an English paper
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT完全改变了英语论文的语气
- en: This response is wildly different from the first. It has a much more academic
    tone, just like we asked for. Yet it’s not hard to get through or overly complicated.
    It completely delivers on everything we specified we needed for the tone of this
    summary. It’s infinitely helpful to someone that struggles putting what they’re
    thinking into words when the tone of what they’ve already written doesn’t sound
    appropriate for the situation. It’s hard to believe the two prompts we provided
    are only different by a few sentences!
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 这个回复与第一个截然不同。它的语气更加学术化，正如我们要求的。然而，它并不难理解，也没有过于复杂。它完全满足了我们对这个总结语气的所有要求。对于那些在将所思所想转化为文字时，发现他们已经写下的语气不适合当前情况的人来说，这无疑是非常有帮助的。难以置信的是，我们提供的两个提示仅通过几句话就有所不同！
- en: Key Tips for Prompt Engineering
  id: totrans-303
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示工程的关键技巧
- en: There are a few concepts that are essential to remember when working with ChatGPT,
    regardless of the purpose. While ChatGPT is an amazing tool that seems able to
    do anything, it’s important to remember that it requires human supervision and
    management to create anything usable.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 在与ChatGPT合作时，有几个概念是必须记住的，无论目的如何。虽然ChatGPT是一个似乎能做任何事的神奇工具，但重要的是要记住，它需要人类的监督和管理来创建任何可用的东西。
- en: Therefore, let’s look at the most common mistakes to be aware of when you’re
    using ChatGPT.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们看看在使用ChatGPT时应该注意的最常见的错误。
- en: Always Check Your Sources
  id: totrans-306
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 总是检查你的来源
- en: There are a number of reasons that can cause ChatGPT to give you false information.
    For example, generally, you can expect that whenever you’re using ChatGPT, it’s
    been trained on information publicly available on the web a year ago from the
    current date. Therefore, if you’re asking questions about sports scores for a
    particular game or recent election results in your prompts, chances are the information
    ChatGPT gives you won’t be accurate.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多原因可能导致ChatGPT提供错误信息。例如，一般来说，你可以预期，无论何时使用ChatGPT，它都是在当前日期一年前公开可用的信息上进行了训练。因此，如果你在提示中询问特定比赛的比分或最近的选举结果，ChatGPT给出的信息可能不会准确。
- en: ChatGPT is also limited to the sources of information it has available. If you’re
    asking a question on a little-known topic, it’s possible that ChatGPT isn’t drawing
    from accurate sources. So, asking what would happen if you farted on Pluto might
    not result in a very scientifically accurate answer.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT也受限于它可用的信息来源。如果你在一个不为人知的主题上提问，ChatGPT可能不是从准确的信息来源中抽取信息。所以，询问如果你在冥王星上放屁会发生什么可能不会得到一个非常科学的答案。
- en: Finally, ChatGPT might simply be mistaken. Its algorithms draw from an incredibly
    large pool of data, and it’s entirely possible that ChatGPT might mix up information
    when it provides an answer. If you’re asking for a list of 100 best fantasy books,
    it might mix up and add sci-fi or historical fiction to the list. If you don’t
    double-check, you might not otherwise notice the mistake.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，ChatGPT可能只是犯了错误。它的算法从极其庞大的数据池中抽取信息，因此ChatGPT在提供答案时可能会混淆信息。如果你要求列出100本最佳奇幻书籍，它可能会将科幻小说或历史小说错误地添加到列表中。如果你不进行双重检查，你可能不会注意到这个错误。
- en: This is why it’s important to always do your own research when you’re using
    ChatGPT when you’re attempting to learn something from it or use what it’s given
    you to present to other people. Otherwise, it’s not ChatGPT that made the mistake,
    it’s you for not double-checking the results.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么在尝试从ChatGPT中学习或使用它提供的内容向其他人展示时，始终进行自己的研究非常重要。否则，不是ChatGPT犯了错误，而是你没有双重检查结果，你犯了错误。
- en: ChatGPT Can Hallucinate, but What Does That Really Mean?
  id: totrans-311
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ChatGPT会产生幻觉，但这究竟意味着什么？
- en: Wait. ChatGPT can *hallucinate*? Yes. It’s actually very common.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 等一下。ChatGPT会**产生幻觉**吗？是的。这实际上是非常常见的。
- en: Technically, hallucinating is simply when ChatGPT is making up facts that *it
    believes* are true. This can happen if you’re in a long chat window that you’ve
    been reusing for a while. It might start pulling information from “sources” that
    don’t exist. This issue can also occur if you ask ChatGPT a lot of questions about
    a subject it doesn’t know about. You can experiment with this by asking it about
    a little-known book author and ask it details about them. Be really specific about
    the questions. It will probably start giving you facts about a person it’s never
    heard of.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 从技术上讲，幻觉是指ChatGPT编造它**相信**为真的事实。这可能会发生在你长时间使用同一个聊天窗口，并且已经使用了一段时间的情况下。它可能会从“来源”中提取信息，而这些来源实际上并不存在。如果你就一个ChatGPT不熟悉的话题提出很多问题，这个问题也可能发生。你可以通过询问一个不太知名的书籍作者并询问他们的详细信息来实验这一点。提出的问题要非常具体。它可能会开始给你提供关于一个它从未听说过的个人的事实。
- en: ChatGPT will almost certainly hallucinate if you *tell* it something is true,
    even if it’s not. That’s the difference between asking ChatGPT if a fact is true
    and telling it the fact *is* true. ChatGPT will rarely correct you unless you
    specifically ask for it, and even then, the response will likely favor what you
    already said.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT几乎肯定会**告诉你**一些它认为是真的的事情，即使这些事情并不是真的。这就是询问ChatGPT某个事实是否为真和直接告诉它这个事实**是**真的之间的区别。除非你明确要求，否则ChatGPT很少会纠正你，即使如此，它的回应也很可能偏向于你之前所说的内容。
- en: Note
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: This issue can be greatly circumvented by using the recent features introduced
    in ChatGPT 4o that allows you to search the web for fact-checking. ChatGPT can
    also give you links so you can conduct your own research.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用ChatGPT 4.0中引入的最近功能，你可以搜索网络进行事实核查，这可以大大避免这个问题。ChatGPT还可以为你提供链接，以便你可以进行自己的研究。
- en: In a Prompt, ChatGPT Can Confuse the Difference Between Instructions and Information
  id: totrans-317
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在一个提示中，ChatGPT可能会混淆指令和信息之间的区别
- en: Earlier, in Prompt [2-5](#PC9), we gave ChatGPT instructions, then provided
    context (the necessary information) for the request. We separated the instructions
    from the information with three pound signs (###). This is because, otherwise,
    ChatGPT can get instructions confused for information and vice versa.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 在之前，在提示[2-5](#PC9)中，我们向ChatGPT提供了指令，然后提供了请求的上下文（必要的信息）。我们用三个井号（###）将指令与信息分开。这是因为，否则，ChatGPT可能会将指令误认为是信息，反之亦然。
- en: ChatGPT will also at times “forget” information you’ve given it earlier on in
    a conversation, which is another issue that can cause it to get mixed up. Because
    of this, it’s wise to remind ChatGPT what you’re talking about when the conversation
    has gone on for a while, even if you have to copy something you’ve already stated
    from earlier in the conversation and paste it back into your latest response.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT有时也会“忘记”在对话早期提供的信息，这又是一个可能导致它混淆的问题。因此，当对话进行了一段时间后，明智的做法是提醒ChatGPT你们在谈论什么，即使你不得不从之前的对话中复制一些已经说过的话，并将其粘贴到最新的回复中。
- en: Conclusion
  id: totrans-320
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, you learned about prompt engineering and covered some of the
    most common conventions for getting helpful responses. We also became aware of
    some of the most common mistakes ChatGPT can make and how to avoid creating problems
    with the responses you get.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一章中，你了解了提示工程，并了解了一些获取有用响应的最常见惯例。我们还意识到了ChatGPT可能犯的一些常见错误以及如何避免在得到的响应中产生问题。
- en: In the next chapter, we’re going to learn more about using ChatGPT to create
    new content as a marketer, social media influencer, or just someone that needs
    ideas on what to make for dinner for the week.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将学习更多关于如何作为营销人员、社交媒体影响者或只是需要为一周晚餐想点子的人使用ChatGPT来创建新内容。
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
    Nature 2025L. EvelynMaking ChatGPT Work for You[https://doi.org/10.1007/979-8-8688-1445-7_3](https://doi.org/10.1007/979-8-8688-1445-7_3)
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者（们），独家授权给APress Media, LLC，Springer Nature的一部分，2025L. Evelyn让ChatGPT为你工作[https://doi.org/10.1007/979-8-8688-1445-7_3](https://doi.org/10.1007/979-8-8688-1445-7_3)
- en: 3. Prompting ChatGPT to Help You Create New Content and Get Ideas
  id: totrans-324
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 提示ChatGPT帮助你创建新内容并获取想法
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: Lydia Evelyn^([1](#Aff2)  )(1)加泰罗尼亚，西班牙
- en: Creating content can be both essential and tiring. Whether you’re brainstorming
    ideas for a blog, a YouTube video, a business presentation, or even just planning
    meals for the week, it can be tough to stay creative and come up with fresh ideas.
    In our busy lives, where burnout is all too common, we could all use a little
    help getting inspired.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 创建内容既可能是必要的，也可能是令人疲惫的。无论你是为博客、YouTube视频、商业演示还是仅仅是为一周的计划制定餐食，保持创造力并想出新颖的想法都可能很困难。在我们忙碌的生活中，由于过度劳累的情况很常见，我们都可以用一点帮助来激发灵感。
- en: That’s where ChatGPT comes in. This tool can assist with content creation by
    generating ideas when you’re stuck. You can customize its responses to fit your
    specific needs, giving you a new perspective and helping to overcome creative
    blocks.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是ChatGPT发挥作用的地方。这个工具可以通过在你卡壳时生成想法来帮助你进行内容创作。你可以定制其响应以适应你的特定需求，为你提供一个新的视角，并帮助你克服创作障碍。
- en: 'In this chapter, we will explore different situations where ChatGPT makes content
    creation easier. We’ll also learn how to adjust our prompts to ensure ChatGPT
    provides unique and tailored responses to spark your creativity. Specifically,
    we’ll cover the following: *   Using ChatGPT to create a marking plan for a Twitch
    channel'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一章中，我们将探讨ChatGPT使内容创作变得更容易的不同情况。我们还将学习如何调整我们的提示，以确保ChatGPT提供独特且定制的响应，激发你的创造力。具体来说，我们将涵盖以下内容：*   使用ChatGPT为Twitch频道创建一个标记计划
- en: Asking ChatGPT to act as a PR manager to help a YouTuber prepare to get sponsorships
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要求ChatGPT扮演公关经理以帮助YouTuber准备获得赞助
- en: Using ChatGPT to help with meal planning
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ChatGPT帮助制定餐食计划
- en: 'Level Up a *Minecraft* Twitch Channel: Asking ChatGPT for a Marketing Plan'
  id: totrans-331
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提升Minecraft Twitch频道的水平：向ChatGPT请求营销计划
- en: Twitch is a fantastic platform for the gaming community. It’s an online service
    where people can watch and interact with live video broadcasts. Users, called
    streamers, broadcast themselves playing games or engaging in other activities,
    while viewers can watch, chat, and support their favorite streamers by following
    their channels, subscribing, or making donations. Gamers can find fans who love
    watching them play, build loyal followings, and even earn money through subscriptions
    and donations.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: Twitch是游戏社区的一个绝佳平台。它是一个在线服务，人们可以观看和互动直播视频。用户，被称为主播，通过直播自己玩游戏或其他活动，而观众可以观看、聊天，并通过关注他们的频道、订阅或捐赠来支持他们最喜欢的主播。玩家可以找到喜欢观看他们游戏的粉丝，建立忠实的粉丝群，甚至通过订阅和捐赠来赚钱。
- en: Turning your gaming hobby into a source of income is exciting, and Twitch is
    a great place for gamers to start. One of the most popular games on the platform
    is *Minecraft*. *Minecraft* is a popular video game where players can build and
    explore virtual worlds made up of blocks. It’s like a digital sandbox where you
    can create anything you imagine, from simple houses to elaborate cities. Players
    can also go on adventures, fight monsters, and gather resources. *Minecraft* has
    both single-player and multiplayer modes, allowing people to play alone or with
    others on different servers, which are online worlds hosted by various people
    or communities.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的游戏爱好转变为收入来源是令人兴奋的，Twitch是游戏玩家开始的好地方。该平台上最受欢迎的游戏之一就是*Minecraft*。*Minecraft*是一款流行的视频游戏，玩家可以在由方块组成的虚拟世界中建造和探索。它就像一个数字沙盒，你可以创造出任何你想象的东西，从简单的房子到复杂的城市。玩家还可以进行冒险，与怪物战斗，收集资源。*Minecraft*既有单人模式也有多人模式，允许人们独自或与其他服务器上的玩家一起游玩，这些服务器是由不同的人或社区提供的在线世界。
- en: While playing games like *Minecraft* on Twitch is fun and engaging, attracting
    and growing an audience is more challenging. Many content creators find that while
    they love gaming, they struggle with the marketing aspect needed to become successful
    influencers.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然在Twitch上玩游戏如*Minecraft*很有趣且引人入胜，但吸引和扩大观众群更具挑战性。许多内容创作者发现，尽管他们热爱游戏，但在成为成功影响者所需的营销方面却感到困难。
- en: To address this challenge, we will explore how ChatGPT can help create a marketing
    plan for a Twitch streamer who mainly plays *Minecraft*. This plan will focus
    on gaining more followers, increasing channel monetization, and boosting income
    through donations and subscriptions.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 为了应对这一挑战，我们将探讨ChatGPT如何帮助为一位主要玩*Minecraft*的Twitch主播制定营销计划。此计划将侧重于增加粉丝数量、提高频道货币化，并通过捐赠和订阅来增加收入。
- en: Getting Relevant Marketing Ideas for a Twitch Channel
  id: totrans-336
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为Twitch频道获取相关营销想法
- en: In Prompt [3-1](#PC1), we’re going to use ChatGPT to get useful advice on creating
    a marketing strategy.You're a gamer on Twitch and stream Minecraft regularly.
    You need to create a marketing plan to grow an audience and improve engagement.
    Detail a marketing strategy tailored toward nurturing a new channel aiming to
    draw the attention of the Minecraft fanbase on Twitch.Prompt 3-1
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示[3-1](#PC1)中，我们将使用ChatGPT获取有关创建营销策略的有用建议。你是一位在Twitch上定期直播*Minecraft*的游戏玩家。你需要制定一个营销计划来扩大观众群并提高参与度。详细说明一个针对培养新频道、旨在吸引Twitch上*Minecraft*粉丝群注意力的营销策略。提示3-1
- en: Give ChatGPT the scenario—you are a gamer on Twitch
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 给ChatGPT设定场景——你是一位Twitch上的游戏玩家
- en: 'This is a great prompt because, as we covered in Chapter [2](641691_1_En_2_Chapter.xhtml),
    it’s best to make ChatGPT play the role of the person needing to make a plan.
    For this reason, we told ChatGPT to answer from the perspective of a Twitch streamer.
    This prompt clearly conveys the goal of growing a Twitch audience from scratch
    and boosting engagement for *Minecraft* streams. Response [3-1](#PC2) shows the
    results we got from ChatGPT using this prompt.Creating a successful marketing
    plan for your Twitch channel involves several key strategies, focusing on content
    quality, audience engagement, and promotion. Here''s a detailed outline to help
    grow your audience and improve engagement for your Minecraft streams:1\. Branding
    and IdentityChannel Name and Logo: Ensure your channel name is memorable and reflective
    of your content. Create a professional logo and consistent branding elements (color
    scheme, fonts) for your Twitch channel and social media.Channel Description: Write
    a compelling channel description that highlights what viewers can expect from
    your streams. Mention your streaming schedule, special events, and any unique
    aspects of your content.2\. Content StrategyRegular Schedule: Establish a consistent
    streaming schedule. This helps viewers know when to tune in and builds routine
    viewership.Stream Themes: Create specific themes or series for your Minecraft
    streams, such as "Survival Sundays," "Building Challenges," "Redstone Tutorials,"
    or "Adventure Maps.”Interactive Content: Encourage viewer participation through
    polls, viewer challenges, or letting viewers influence in-game decisionsCollaborations:
    Collaborate with other Minecraft streamers to reach new audiences. Participate
    in joint streams, raids, and community events.3\. Engagement and Community BuildingChat
    Interaction: Actively engage with your chat. Respond to comments, acknowledge
    new followers, and create a welcoming environment.Discord Server: Create a Discord
    server for your community. Use it to share updates, host community events, and
    provide a space for viewers to connect outside of streams.Viewer Rewards: Implement
    a points or rewards system (using Twitch’s Channel Points) to incentivize viewer
    engagement. Offer rewards like custom emotes, shout-outs, or in-game actions.Response
    3-1'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个很好的提示，因为，正如我们在第 [2](641691_1_En_2_Chapter.xhtml) 章所讨论的，最好是让 ChatGPT 扮演一个需要制定计划的人的角色。因此，我们告诉
    ChatGPT 从 Twitch 流播者的角度来回答。这个提示清楚地传达了从零开始扩大 Twitch 观众群和提升 *Minecraft* 流播互动性的目标。响应
    [3-1](#PC2) 展示了我们使用这个提示从 ChatGPT 获得的结果。为您的 Twitch 频道制定一个成功的营销计划涉及几个关键策略，重点关注内容质量、观众互动和推广。以下是一个详细的提纲，以帮助您扩大观众群并提高您的
    Minecraft 流播的互动性：
- en: A marketing plan from ChatGPT to help a *Minecraft* streamer on Twitch build
    their platform
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 为帮助 Twitch 上的 *Minecraft* 直播者建立平台制定的营销计划
- en: This response is amazing for several reasons. It not only gives you advice that
    are on par with common trends within the streaming community on Twitch, like suggesting
    that you keep a streaming schedule, which is a well-known way to gain consistent
    viewers. It also suggests that you create themes for your streams so that viewers
    come back to continue the saga you’ve started and see the progress you made on
    *Minecraft*.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 这个响应非常出色，原因有几个。它不仅提供了与 Twitch 流播社区中常见的趋势相媲美的建议，例如建议您保持直播时间表，这是一种获得稳定观众的有效方式。它还建议您为直播创建主题，以便观众回来继续您已经开始的故事，并看到您在
    *Minecraft* 上的进步。
- en: Even more impressive is that ChatGPT is using common vernacular that *Minecraft*
    players understand, like doing Surviving Challenges, Building Challenges, or Redstone
    Tutorials. Every *Minecraft* player knows how hard it is to play a *Minecraft*
    run without dying once. There are YouTube channels that show exclusively how to
    follow intricate blueprints for massive *Minecraft* mansions. And if you’ve played
    *Minecraft* long enough, you know no one even tries to do anything with Redstone
    without searching for a tutorial.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 更令人印象深刻的是，ChatGPT 正在使用 *Minecraft* 玩家能够理解的常用词汇，比如进行生存挑战、建筑挑战或红石教程。每个 *Minecraft*
    玩家都知道，在没有死亡的情况下玩一次 *Minecraft* 是多么困难。有些 YouTube 频道专门展示如何遵循复杂的蓝图来建造巨大的 *Minecraft*
    大宅。如果你玩过足够长时间的 *Minecraft*，你就会知道，没有人会尝试做任何与红石相关的事情而不去查找教程。
- en: ChatGPT is also displaying a comprehension of Twitch’s platform and how people
    connect, contribute, and expand their community via donations, Discord servers,
    and creating unique emotes for subscribers. Anyone that’s used Twitch knows this
    is all pretty standard, but if you had no idea about any of these concepts beforehand,
    this is pretty darn helpful.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 还表现出对 Twitch 平台的理解，以及人们如何通过捐赠、Discord 服务器和为订阅者创建独特的表情符号来连接、贡献和扩展他们的社区。任何使用过
    Twitch 的人都知道这都很常见，但如果你事先对任何这些概念一无所知，这会非常有帮助。
- en: Let’s take this even further and pry ChatGPT for more details.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更进一步，挖掘 ChatGPT 以获取更多细节。
- en: Using ChatGPT to Stay Consistent with Creative Ideas That Engage Your Audience
  id: totrans-345
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 保持与吸引观众创意想法的一致性
- en: In Prompt [3-2](#PC3), we’re going to use the same chat window with ChatGPT
    as before; therefore, ChatGPT will retain the context of the conversation we’ve
    had thus far, and we won’t have to repeat ourselves.Come up with ideas for a themed
    stream series.Prompt 3-2
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示 [3-2](#PC3) 中，我们将继续使用之前与 ChatGPT 一样的聊天窗口；因此，ChatGPT 将保留我们迄今为止所进行的对话的上下文，我们无需重复自己。提出一个主题流系列的创意点子。提示
    3-2
- en: 'We’re keeping it simple, silly In this prompt, we’re asking ChatGPT for help
    with one specific aspect of the advice it gave us earlier. We like the idea of
    creating a themed series of streams, so let’s make ChatGPT expound on that to
    help us keep our audience engaged and, most of all, keep us from getting burned
    out from constantly coming up with ideas. Response [3-2](#PC4) shows what we got
    back from ChatGPT.Creating a themed stream series can add excitement and draw
    viewers who are interested in specific aspects of Minecraft gameplay. Here are
    some ideas for a themed stream series:*1\. "Minecraft Marvels: Build Challenges"**Theme:*
    Creative Building*Description:* Each stream focuses on building a marvel, such
    as famous landmarks, fantasy castles, or futuristic cities. Invite viewers to
    suggest themes or participate in build-offs.*Special Episodes*: Collaborate with
    other streamers for joint builds or competitions.2\. "Survival Saga: Hardcore
    Adventures"*Theme:* Survival Mode*Description:* Document your journey through
    Minecraft''s survival mode on the hardest difficulty. Each episode presents new
    challenges, such as exploring dangerous biomes, defeating bosses, or building
    secure bases.*Interactive Elements:* Allow viewers to suggest challenges or help
    make crucial survival decisions through polls.*3\. "Mystery Mansion: Roleplay
    Adventure"**Theme*: Roleplay and Storytelling*Description:* Create a roleplay
    series set in a spooky mansion filled with puzzles, traps, and mysteries to solve.
    Develop a storyline with characters that viewers can interact with.*Special Features*:
    Invite guest streamers to play characters or villains.*4\. "Minecraft Masterclass:
    Learn with Me"**Theme:* Tutorials and Education*Description:* Each stream focuses
    on teaching viewers different Minecraft skills, such as redstone engineering,
    efficient farming, or advanced combat techniques.*Viewer Interaction:* Conduct
    live Q&A sessions and invite viewers to submit their builds for critique and improvement
    tips.*5\. "Epic Expeditions: Exploring Minecraft Biomes"**Theme:* Exploration*Description:*
    Set out on epic journeys to explore and document every biome in Minecraft. Each
    episode focuses on a different biome, highlighting its unique features, resources,
    and challenges.*Community Involvement:* Organize group expeditions where viewers
    can join the adventure.*6\. "Villager Ventures: Trading and Economy"**Theme:*
    Trading and Villager Mechanics*Description:* Dive deep into the mechanics of villager
    trading, build a thriving village, and optimize trading routes. Each episode can
    focus on different aspects, like building a marketplace or protecting villagers
    from raids.*Viewer Interaction:* Create viewer-driven market days where viewers
    suggest trades and economic strategies.*7\. "Minecraft Mythbusters: Game Mechanics"**Theme:*
    Testing Game Mechanics*Description:* Test and debunk popular Minecraft myths,
    glitches, and mechanics. Each stream can focus on different myths and involve
    experiments to see what’s true.*Interactive Experiments:* Encourage viewers to
    submit myths they want to see tested.*8\. "Pixel Art Parade: Artistic Creations"**Theme:*
    Pixel Art and Creative Mode*Description:* Dedicate each stream to creating intricate
    pixel art designs or recreating famous artworks and characters in Minecraft.*Community
    Contributions:* Showcase viewer-submitted pixel art and host contests for the
    best creations.*9\. "Redstone Revolution: Engineering Challenges"**Theme:* Redstone
    Engineering*Description:* Focus on building complex redstone contraptions, from
    automated farms to intricate traps. Explain the mechanics and design process step-by-step.*Viewer
    Projects:* Review and help troubleshoot viewer-submitted redstone projects.*10\.
    "Minecraft Marathon: 24-Hour Survival"**Theme:* Endurance and Charity*Description:*
    Host a 24-hour marathon stream where you attempt to complete as many Minecraft
    challenges as possible, from defeating the Ender Dragon to completing advancements.*Charity
    Element:* Partner with a charity and encourage donations throughout the stream,
    with milestones and goals linked to in-game challenges.These themed stream series
    can keep your content fresh and engaging, attract new viewers interested in specific
    aspects of Minecraft, and build a loyal community around your channel.Response
    3-2'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 我们保持简单，傻傻的。在这个提示中，我们请求ChatGPT帮助我们处理之前它给出的建议中的一个具体方面。我们喜欢创建一系列主题流的想法，所以让我们让ChatGPT详细阐述这一点，以帮助我们保持观众的兴趣，最重要的是，避免因不断想出新点子而感到疲惫。响应
    [3-2](#PC4) 展示了我们从ChatGPT那里得到的内容。创建一个主题流系列可以增加兴奋感，吸引对Minecraft游戏特定方面感兴趣的观众。以下是一些主题流系列的想法：
- en: ChatGPT suggests how to create a series of themed streams
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 建议如何创建一系列主题直播
- en: These ideas are fantastic. As you can see, ChatGPT has given us ideas that are
    very relevant and aware of the Twitch and *Minecraft* gaming community. There
