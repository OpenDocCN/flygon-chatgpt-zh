    ****o**n** ****a**nd** ****dis**cove**r ****h**ow** ****t**o** ****sp**eak** ****t**o**
    ****Cha**tGP**T ****ri**ght**, ****a**s** ****w**e** ****le**arn** ****ab**out**
    ****t**he** ****wo**rld** ****o**f** ****pr**omp**t ****engi**neerin**g.'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: '**正如您所看到的**，今天有**许多**种方式可以开始使用ChatGPT。但是，为了从这种轻量级、深度学习机器中获得任何有价值的东西，您需要知道如何给它提供它所需的提示。如果您想要得到正确的答案，您需要学习如何提出正确的问题，毕竟！阅读并发现如何正确地与ChatGPT交流，正如我们了解提示工程的世界一样。'
