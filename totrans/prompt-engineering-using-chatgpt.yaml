- en: '11.5.1 Case Study 1: Prompt Professor'
  prefs: []
  type: TYPE_NORMAL
- en: This app is available under the Education list. When activated, an interface
    appears as shown in [Figure 11.18](#fig11-18).
  prefs: []
  type: TYPE_NORMAL
- en: '![](image/Fig_11_18.jpg)'
  prefs: []
  type: TYPE_IMG
- en: FIGURE 11.18 The Prompt Professor.
  prefs: []
  type: TYPE_NORMAL
- en: After clicking on the Start Chat icon, we can use it as a tool with its expertise
    focused on prompt engineering. The following is an example.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “Tell me 26 Principles of Good Prompt.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt Professor: “Sure, here are the 26 Principles of Good Prompt based on
    the information I have:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Straight to the Point: Avoid using polite phrases like ‘please,’ ‘thank
    you,’ etc., and get straight to the point.'
  prefs: []
  type: TYPE_NORMAL
- en: '2. Audience Integration: Specify the intended audience within the prompt, such
    as an expert in a particular field.'
  prefs: []
  type: TYPE_NORMAL
- en: '3. Break Down Tasks: For complex tasks, use a sequence of simpler prompts in
    an interactive conversation.'
  prefs: []
  type: TYPE_NORMAL
- en: '4. Affirmative Language: Use affirmative directives like ‘do’ and avoid negative
    language like ‘don’t.’'
  prefs: []
  type: TYPE_NORMAL
- en: '5. Clarity and Understanding: When clarity or a deeper understanding is needed,
    use prompts like ‘Explain in simple terms’ or ‘Explain as if I’m a beginner in
    [field].’'
  prefs: []
  type: TYPE_NORMAL
- en: '6. Incentive Mentioning: Mention a tip (e.g., ‘I’m going to tip $xxx for a
    better solution!’) to possibly influence the response quality.'
  prefs: []
  type: TYPE_NORMAL
- en: '7. Example-driven Prompting: Use few-shot prompting by including examples in
    your prompt.'
  prefs: []
  type: TYPE_NORMAL
- en: '8. Structured Formatting: Use ‘###Instruction###’ and ‘###Example###’ or ‘###Question###’
    to structure your prompt.'
  prefs: []
  type: TYPE_NORMAL
- en: '9. Directives: Use phrases like ‘Your task is’ and ‘You MUST’ to provide clear
    instructions.'
  prefs: []
  type: TYPE_NORMAL
- en: '10. Penalty Mentioning: Mention potential penalties like ‘You will be penalized.’'
  prefs: []
  type: TYPE_NORMAL
- en: '11. Human-like Response: Request a response in a natural, human-like manner.'
  prefs: []
  type: TYPE_NORMAL
- en: '12. Step-by-Step Thinking: Encourage the model to ‘think step-by-step.’'
  prefs: []
  type: TYPE_NORMAL
- en: '13. Unbiased Responses: Request unbiased responses and avoid stereotypes.'
  prefs: []
  type: TYPE_NORMAL
- en: '14. Interactive Information Gathering: Encourage the model to ask questions
    to gather sufficient information.'
  prefs: []
  type: TYPE_NORMAL
- en: '15. Learning and Testing: Use prompts that encourage teaching and testing understanding.'
  prefs: []
  type: TYPE_NORMAL
- en: '16. Role Assignment: Assign specific roles to the AI model.'
  prefs: []
  type: TYPE_NORMAL
- en: '17. Use Delimiters: To separate different sections of the prompt.'
  prefs: []
  type: TYPE_NORMAL
- en: '18. Repetition: Repeat specific words or phrases for emphasis or clarity.'
  prefs: []
  type: TYPE_NORMAL
- en: '19. Combining Techniques: Use Chain-of-thought with few-shot prompts for complex
    reasoning.'
  prefs: []
  type: TYPE_NORMAL
- en: '20. Output Primers: End your prompt with the start of the desired output.'
  prefs: []
  type: TYPE_NORMAL
- en: '21. Detailed Requests: Ask for detailed text, ensuring all necessary information
    is included.'
  prefs: []
  type: TYPE_NORMAL
- en: '22. Style Preservation: Request improvements without altering the original
    style.'
  prefs: []
  type: TYPE_NORMAL
- en: '23. Scripting for Code: For coding tasks, specify script generation for multi-file
    code.'
  prefs: []
  type: TYPE_NORMAL
- en: '24. Text Continuation: Prompt the model to continue or complete a text based
    on a provided beginning.'
  prefs: []
  type: TYPE_NORMAL
- en: '25. Clear Requirements: State the specific requirements the model must follow.'
  prefs: []
  type: TYPE_NORMAL
- en: '26. Similarity Maintenance: To mimic a given text style or content, instruct
    the model to follow the provided sample closely.'
  prefs: []
  type: TYPE_NORMAL
- en: These principles aim to enhance the effectiveness and precision of prompts,
    guiding the AI to generate more relevant and accurate responses.”
  prefs: []
  type: TYPE_NORMAL
- en: 'As another application example, consider the following prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “Rate this prompt: Take a role of an expert in logic and philosophy.
    How do you analyze this statement: watermelon becomes red when you cut it.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt Professor: “To rate the prompt ‘take a role of an expert in logic and
    philosophy. how do you analyze this statement: watermelon becomes red when you
    cut it,’ let’s apply some principles of good prompt engineering:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Clarity and Specificity: The prompt is clear and specific in asking the
    AI to take on a specific role (expert in logic and philosophy) and analyze a statement.
    This clarity helps guide the AI’s response in a focused direction.'
  prefs: []
  type: TYPE_NORMAL
- en: '2. Clear Intent: The intent of the prompt is clear – to analyze a statement
    from a logical and philosophical perspective.'
  prefs: []
  type: TYPE_NORMAL
- en: '3. Role-prompting: The prompt effectively uses role-prompting by asking the
    AI to assume the role of an expert in logic and philosophy. This can help generate
    more insightful and context-appropriate responses.'
  prefs: []
  type: TYPE_NORMAL
- en: '4. Contextual Information: The prompt could be improved by providing more context.
    For instance, it could specify what kind of analysis is expected (logical consistency,
    philosophical implications, etc.).'
  prefs: []
  type: TYPE_NORMAL
- en: '5. Incremental Prompts: This could be a starting point for a series of incremental
    prompts, where the AI’s response could lead to deeper, follow-up questions.'
  prefs: []
  type: TYPE_NORMAL
- en: Overall, this prompt is well-structured and clear, with a defined role and a
    specific task. However, it could benefit from a bit more context to guide the
    AI’s analysis further. It’s a strong prompt, particularly in its use of role-prompting
    and clarity, but there’s a small room for enhancement in terms of providing contextual
    depth.”
  prefs: []
  type: TYPE_NORMAL
- en: 'As a follow-up prompt, we take the suggested improvement made by Prompt Professor
    and enter the prompt in ChatGPT, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: “Assuming the position of a specialist in logic and philosophy, how
    would you examine the philosophical ramifications of this statement? ‘a watermelon
    becomes red when you cut it.’”'
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT: “The philosophical implications of the statement ‘a watermelon becomes
    red when you cut it’ delve into the realms of perception, reality, and the nature
    of properties and change. Here are some philosophical considerations:'
  prefs: []
  type: TYPE_NORMAL
- en: '1. Perception vs. Reality: The statement raises questions about the distinction
    between perception and reality. Philosophically, it prompts us to consider whether
    properties (like color) are intrinsic to objects or if they only manifest upon
    interaction or observation. In this case, is the redness of the watermelon an
    inherent quality, or is it only ‘realized’ or ‘revealed’ when observed (i.e.,
    when the watermelon is cut)?'
  prefs: []
  type: TYPE_NORMAL
- en: '2. Potentiality vs. Actuality: From an Aristotelian perspective, the statement
    touches upon the concepts of potentiality and actuality. The watermelon has the
    potential to exhibit its redness, but this potential is actualized only when it
    is cut and observed. This leads to a broader philosophical discussion on how potential
    properties become actualized through interaction or observation.'
  prefs: []
  type: TYPE_NORMAL
- en: '3. Causality: The statement implies a causal relationship where the action
    of cutting leads to the watermelon being red, which philosophically invites scrutiny.
    It challenges our understanding of cause and effect, prompting us to differentiate
    between causation and correlation. The redness is not caused by the cutting; rather,
    the cutting reveals what is already there.'
  prefs: []
  type: TYPE_NORMAL
- en: '4. Identity and Change: The statement also touches upon philosophical debates
    about identity and change. Does the watermelon change when it is cut, or is its
    identity (as a red object) merely revealed? This ties into philosophical discussions
    about the essence of objects and how they are perceived or defined by their observable
    properties.'
  prefs: []
  type: TYPE_NORMAL
- en: '5. Language and Meaning: Philosophically, the statement also highlights the
    importance of language precision in conveying reality. The way we describe observations
    can shape our understanding and beliefs about the world. This aligns with Wittgenstein’s
    philosophy that the limits of our language mean the limits of our world.'
  prefs: []
  type: TYPE_NORMAL
- en: '6. Epistemology: There’s an epistemological angle as well, concerning how we
    come to know or understand the properties of objects. The statement suggests that
    our knowledge of the watermelon’s color is contingent upon a specific action or
    condition, which raises questions about the conditions under which we gain knowledge
    about the world.'
  prefs: []
  type: TYPE_NORMAL
- en: In summary, the statement, while simple on the surface, opens up a range of
    philosophical inquiries about how we understand, describe, and interact with the
    world, highlighting the complex interplay between observation, reality, language,
    and knowledge.”
  prefs: []
  type: TYPE_NORMAL
- en: '11.5.2 Case Study 2: Wolfram'
