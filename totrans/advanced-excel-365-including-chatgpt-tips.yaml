  id: totrans-2451
  prefs: []
  type: TYPE_NORMAL
  zh: 场景7
- en: Create a macro to import data from a txt file (sales.txt) and design a pivot
    table which shows the sum of sales based on product and month. This macro will
    automate the import of data from the text file and create a pivot table report
    (refer to Training File4\. xls).
  id: totrans-2452
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个宏，从txt文件（sales.txt）导入数据，并设计一个根据产品和月份显示销售额总和的交叉表。此宏将自动化从文本文件导入数据并创建交叉表报告（参考Training
    File4.xls）。
