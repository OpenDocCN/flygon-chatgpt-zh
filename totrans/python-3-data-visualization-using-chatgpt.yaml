- en: '**SUMMARY**'
  id: totrans-2097
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**总结**'
- en: This chapter started with a very short introduction to Matplotlib, along with
    code samples that displayed the available colors in Matplotlib.
  id: totrans-2098
  prefs: []
  type: TYPE_NORMAL
  zh: 本章从对 Matplotlib 的简要介绍开始，同时提供了显示 Matplotlib 中可用颜色的代码示例。
- en: Then you learned how to render horizontal lines, slanted lines, parallel lines,
    and a grid of points. In addition, you learned how to load images, display checkerboard
    patterns, and plot trigonometric functions. You also saw how to render histograms,
    bar charts, pie charts, and heat maps.
  id: totrans-2099
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你学习了如何绘制水平线、斜线、平行线以及点阵网格。此外，你还学习了如何加载图像、显示棋盘图案以及绘制三角函数图。你同样看到了如何绘制直方图、条形图、饼图和热力图。
- en: Next, you saw how to create a 3D plot, as well as how to render financial data
    and a chart with data from a sqlite3 database.
  id: totrans-2100
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你看到了如何创建3D图，以及如何绘制金融数据和来自 sqlite3 数据库的图表。
- en: CHAPTER 6
  id: totrans-2101
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第六章
- en: '*SEABORN FOR DATA VISUALIZATION*'
  id: totrans-2102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**Seaborn 数据可视化**'
- en: This chapter introduces several tools for data visualization, including Seaborn,
    Bokeh, and YellowBrick. This chapter also contains a gentle introduction to Scikit-learn
    (which is typically imported as sklearn).
  id: totrans-2103
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了几个数据可视化工具，包括 Seaborn、Bokeh 和 YellowBrick。本章还温和地介绍了 Scikit-learn（通常导入为 sklearn）。
- en: The first part of the chapter introduces you to Seaborn for data visualization,
    which is a layer above Matplotlib. Although Seaborn does not have all of the features
    that are available in Matplotlib, Seaborn provides an easier set of APIs for rendering
    charts and graphs.
  id: totrans-2104
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第一部分介绍了用于数据可视化的 Seaborn，它位于 Matplotlib 之上。尽管 Seaborn 并不包含 Matplotlib 中所有可用的功能，但它提供了一套更易于使用的
    API 来渲染图表和图形。
- en: The second portion of this chapter contains a very short introduction to Bokeh,
    along with a code sample that illustrates how to create a more artistic graphics
    effect with relative ease in Bokeh.
  id: totrans-2105
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第二部分包含了对 Bokeh 的简要介绍，以及一个代码示例，展示了如何在 Bokeh 中轻松创建更具艺术效果的图形。
- en: 'The third part of the chapter introduces you to Scikit-learn, which is a very
    powerful Python library that supports many machine learning algorithms and also
    supports visualization. If you are new to machine learning, fear not: *this section
    does not require a background in machine learning in order to understand the Python
    code samples.*'
  id: totrans-2106
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的第三部分介绍了 Scikit-learn，这是一个非常强大的 Python 库，支持许多机器学习算法，同时也支持可视化。如果你是机器学习的新手，不必担心：*本节不需要机器学习背景知识即可理解
    Python 代码示例。*
- en: '**WORKING WITH SEABORN**'
  id: totrans-2107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**使用 Seaborn 进行绘图**'
- en: Seaborn is a Python library for data visualization that also provides a high-level
    interface to Matplotlib. Seaborn is easier to work with than Matplotlib, and actually
    extends Matplotlib, but keep in mind that Seaborn is not as powerful as Matplotlib.
  id: totrans-2108
  prefs: []
  type: TYPE_NORMAL
  zh: Seaborn 是一个用于数据可视化的 Python 库，同时也提供了一个高级接口用于 Matplotlib。与 Matplotlib 相比，Seaborn
    更易于使用，实际上它扩展了 Matplotlib，但请注意，Seaborn 的功能并不及 Matplotlib 强大。
- en: Seaborn addresses two challenges of Matplotlib. The first involves the default
    Matplotlib parameters. Seaborn works with different parameters, which provides
    greater flexibility than the default rendering of Matplotlib plots. Seaborn addresses
    the limitations of the Matplotlib default values for features such as colors,
    tick marks on the upper and right axes, and the style (among others).
  id: totrans-2109
  prefs: []
  type: TYPE_NORMAL
  zh: Seaborn 解决了 Matplotlib 的两个挑战。第一个涉及默认的 Matplotlib 参数。Seaborn 使用不同的参数，这比 Matplotlib
    默认渲染的图表提供了更大的灵活性。Seaborn 解决了 Matplotlib 默认值在颜色、上下轴的刻度标记以及样式（等等）等方面的局限性。
- en: In addition, Seaborn makes it easier to plot entire data frames (somewhat like
    Pandas) than doing so in Matplotlib. Nevertheless, since Seaborn extends Matplotlib,
    knowledge of the latter is advantageous and will simplify your learning curve.
  id: totrans-2110
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，Seaborn 使绘制整个数据框（类似于 Pandas）比在 Matplotlib 中这样做更加容易。尽管如此，由于 Seaborn 扩展了 Matplotlib，了解后者是有益的，并且将简化你的学习曲线。
- en: '**Features of Seaborn**'
  id: totrans-2111
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**Seaborn 的特性**'
- en: 'Seaborn provides a nice set of features and useful methods to control the display
    of data, some of which are listed here:'
  id: totrans-2112
  prefs: []
  type: TYPE_NORMAL
  zh: Seaborn 提供了一套很好的特性和有用的方法来控制数据的显示，其中一些列在这里：
- en: scale Seaborn plots
  id: totrans-2113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缩放 Seaborn 图表
- en: set the plot style
  id: totrans-2114
