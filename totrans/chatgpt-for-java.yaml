  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经成功完成了所有步骤，以获得一个功能齐全的 Discord 机器人，创建第二个机器人将易如反掌！所以，让我们简要回顾一下上述步骤，以便创建我们的第二个
