    ****Thr**o**u**gh** ****algo**r**it**hms**, ****mac**h**i**ne** ****lea**r**ni**ng**
    ****sys**t**e**ms** ****ana**l**y**ze** ****pat**t**er**ns** ****i****n**** ****t****h**e**
