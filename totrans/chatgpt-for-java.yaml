- en: ChatGPT Is Here to Take Away Everyone’s Jobs (Not Really)
  id: totrans-323
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT 来了，要夺走每个人的工作（其实不是）
- en: It is my humble opinion that every company in the world is sitting on a gold
    mine of untapped information. If you are using any system that keeps a log of
    exchanges between employees, a database of support requests from your customers,
    or any large repository of text (yes, this includes your email, Microsoft Exchange,
    and corporate Gmail), then you have a large repository of unstructured text that
    is waiting to be utilized.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 我谦卑地认为，世界上每家公司都坐在一座未被开采的金矿上。如果您使用任何记录员工之间交流的系统、客户支持请求的数据库或任何大型文本存储库（是的，这包括您的电子邮件、Microsoft
    Exchange和公司Gmail），那么您就有了一个大量未结构化文本的存储库，等待被利用。
- en: Therefore, the best use of ChatGPT is not to eliminate anyone’s jobs. It should
    be used in order to augment and extend what team members in your company are already
    doing. As we saw in the previous chapter, as a programmer, ChatGPT can work as
    a very effective Pair-Programmer. It is also very good at performing certain difficult
    tasks very efficiently and quickly. So, let’s see a practical example of what
    can be done in order to make useful a large source of unstructured text.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，ChatGPT 的最佳用途不是消除任何人的工作。它应该被用来增强和扩展您公司团队成员已经做的事情。正如我们在上一章中看到的，作为一个程序员，ChatGPT
    可以作为一个非常有效的配对程序员。它也非常擅长高效快速地完成某些困难的任务。所以，让我们看看一个实际例子，看看如何使大量未结构化文本变得有用。
- en: 'Examining a Real World Problem: Customer Support for a Software Company'
  id: totrans-326
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检查现实世界问题：软件公司的客户支持
- en: 'One of the most grueling tasks in software development is providing tech support.
    Imagine the joys of fielding calls and messages all day from people who might
    be frustrated, confused, or just in need of a solution while using your software.
    Here’s some of the reasons why customer support is a tough nut to crack:'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 软件开发中最艰巨的任务之一是提供技术支持。想象一下整天处理来自可能感到沮丧、困惑或只是需要解决方案的人的电话和信息是多么的快乐。以下是客户支持为什么是一个难题的一些原因：
- en: Your end users and your customers are notoriously bad at explaining problems
    with your software.
  id: totrans-328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的最终用户和您的客户在解释您软件中的问题时，名声不佳。
- en: Level 1 technicians, often the first line of defense, typically handle the most
    basic issues or user errors. But when problems get more complex, users are escalated
    to Level 2.
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一级技术人员，通常是第一道防线，通常处理最基本的问题或用户错误。但当问题变得更加复杂时，用户会被提升到二级。
- en: The mid-tier is a tricky place, because they have more knowledge and experience
    than the tech support staff at Level 1; however, they don’t have the opportunity
    to directly get answers from the end user.
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 中间层是一个棘手的地方，因为他们比一级技术支持人员拥有更多的知识和经验；然而，他们没有机会直接从最终用户那里获得答案。
- en: Really bad problems get escalated to Level 3; however, these are the most expensive
    tech support staff because they have the most knowledge and experience. They have
    hands-on experience with the code as well as the servers and the infrastructure.
  id: totrans-331
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 真正糟糕的问题会被提升到三级；然而，这些是最昂贵的客服人员，因为他们拥有最多的知识和经验。他们不仅对代码有实际经验，还对服务器和基础设施有实际经验。
- en: 'So let’s work with a real world example of a typical conversation within a
    typical tech support channel within Slack. Below is a list of the team members
    and their roles within a fictional company:'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个典型的 Slack 技术支持渠道中的典型对话的真实世界例子来工作。以下是一个虚构公司中团队成员及其角色的列表：
- en: Fatima (Customer Service Representative)
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 法蒂玛（客户服务代表）
- en: John (Software Engineer)
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 约翰（软件工程师）
- en: Dave (PM)
  id: totrans-335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 戴夫（项目经理）
- en: Keith (CTO)
  id: totrans-336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基思（首席技术官）
- en: 'Listing [3-5](#PC5) provides an example of a conversation between the team
    members at a software startup. Fatima, the customer service representative, lets
    the team know that their app is crashing immediately after launching (not a good
    problem to have). Keith, the CTO, steps in immediately to escalate the issue.Fatima
    [16:00 | 02/08/2019]: Hey everyone, I have an urgent issue to discuss. I just
    got off a call with a client who''s experiencing app crashes as soon as they load
    it. They''re really frustrated. Can we get this sorted ASAP? ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figa_HTML.gif)A
    crying emoji with eyes closed and mouth opened.Keith [16:01 | 02/08/2019]: Thanks
    for bringing this to our attention, Fatima. Let''s jump on this right away. @John,
    can you take the lead in investigating the issue since our architect is out sick
    today?John [16:02 | 02/08/2019]: Sure thing, Keith. I''ll dive into the codebase
    and see if I can find any potential culprits for the crashes.John [16:02 | 02/08/2019]:
    Fatima, could you gather some additional information from the client? Ask them
    about the specific device, operating system, and any recent updates they might
    have installed.Fatima [16:03 | 02/08/2019]: Absolutely, John. I''ll reach out
    to the client immediately and gather those details. Will update you all once I
    have them.Dave [16:04 | 02/08/2019]: I understand the urgency here. Let''s make
    sure we keep the client informed about our progress ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figb_HTML.gif)A
    crying emoji with eyes closed and mouth opened. Fatima. We don''t want them feeling
    left in the dark during this troubleshooting process.Fatima [16:04 | 02/08/2019]:
    Definitely, Dave. ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figc_HTML.gif)A
    thumbs-up icon. I''ll keep the client updated at regular intervals, providing
    them with any relevant information we uncover.John [16:20 | 02/08/2019]: I''ve
    checked the codebase, and so far, I haven''t found any obvious issues. It''s strange
    that the app is crashing on load. Could it be a memory-related issue? Keith, do
    we have any recent reports of memory leaks or high memory usage?Keith [16:22 |
    02/08/2019]: I''ll pull up the monitoring logs, John, and check if there have
    been any memory-related anomalies in recent releases. Let me get back to you on
    that.Fatima [17:01 | 02/08/2019]: Quick update, everyone. The client is using
    an iPhone X running iOS 15.1\. They mentioned that the issue started after updating
    their app a few days ago ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figd_HTML.gif)A
    thinking emoji.Keith [17:05 | 02/08/2019]: Thanks for the update, Fatima. That''s
    helpful information. John, let''s focus on testing the latest app update on an
    iPhone X simulator with iOS 15.1 to see if we can replicate the issue.John [17:06
    | 02/08/2019]: Good idea, Keith. I''ll set up the emulator and run some tests
    right away.Keith [17:30 | 02/08/2019]: John, any progress on replicating the issue
    on the emulator?John [17:32 | 02/08/2019]: Yes, Keith. I managed to reproduce
    the crash on the emulator. It seems to be related to a compatibility issue with
    iOS 15.1 ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fige_HTML.gif)An exploding
    head emoji.. I suspect it''s due to a deprecated method call. I''ll fix it and
    run more tests to confirm.John [18:03 | 02/08/2019]: Fixed the deprecated method
    issue, and the app is no longer crashing on load. It looks like we''ve identified
    and resolved the problem. I''ll prepare a patch and send it to you, Keith, for
    review and deployment.Keith [18:04 | 02/08/2019]: ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figf_HTML.gif)Three
    emojis of clapping hands. Thank you, please provide me with the patch as soon
    as possible. Once I review it, we''ll deploy the fix to the app store.Dave [18:06
    | 02/08/2019]: Great job, team! ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figg_HTML.gif)An
    emoji with a triangular face and curly hair. John, please keep the client informed
    about the progress and let them know we have a fix ready for them on the next
    app update. Can someone make sure the release notes reflect this?John [18:07 |
    02/08/2019]: Will do, Dave. I''ll update the client and ensure they''re aware
    of the upcoming fix.Keith [18:27 | 02/08/2019]: Patch reviewed and approved, John.
    Please proceed with updating the app in the store. Let''s aim to have it done
    within the next hour.John [18:26 | 02/08/2019]: Understood, Keith. I''m in the
    process of uploading it now.Fatima [18:38 | 02/08/2019]: I just informed the client
    about the fix. They''re relieved and grateful for our prompt response. Thanks,
    everyone, for your collaboration and quick action. It''s a pleasure working with
    such a competent team!Dave [18:40 | 02/08/2019]: Well done, team! Your efforts
    are greatly appreciated. We managed to turn this urgent problem around in record
    time. Let''s keep up the good work! ![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figh_HTML.gif)A
    thumbs-up emoji.Listing 3-5'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: '列表 [3-5](#PC5) 展示了一个软件初创公司团队成员之间的对话示例。客户服务代表法蒂玛（Fatima）通知团队，他们的应用程序在启动后立即崩溃（这不是一个好问题）。首席技术官基思（Keith）立即介入以升级问题。法蒂玛
    [16:00 | 02/08/2019]: 嘿，大家好，我有一个紧急问题要讨论。我刚和一个遇到应用程序崩溃的客户通完电话，他们在加载应用程序后立即遇到了这个问题。他们真的很沮丧。我们能尽快解决这个问题吗？
    ![哭泣表情](../images/607613_1_En_3_Chapter/607613_1_En_3_Figa_HTML.gif) 一个闭眼张嘴哭泣的表情符号。基思
    [16:01 | 02/08/2019]: 感谢你把这个问题带到我们注意，法蒂玛。让我们立即着手解决这个问题。@约翰，由于我们的架构师今天因病缺席，你能负责调查这个问题吗？约翰
    [16:02 | 02/08/2019]: 当然可以，基思。我会深入代码库，看看是否能找到导致崩溃的潜在原因。约翰 [16:02 | 02/08/2019]:
    法蒂玛，你能从客户那里收集一些额外的信息吗？询问他们具体的设备、操作系统以及他们可能安装的任何最近更新。法蒂玛 [16:03 | 02/08/2019]:
    当然可以，约翰。我会立即联系客户并收集这些详细信息。一旦有了这些信息，我会立即通知大家。戴夫 [16:04 | 02/08/2019]: 我理解这里的紧迫性。让我们确保让客户了解我们的进展
    ![哭泣表情](../images/607613_1_En_3_Chapter/607613_1_En_3_Figb_HTML.gif) 一个闭眼张嘴哭泣的表情符号。法蒂玛。我们不想在故障排除过程中让他们感到被忽视。法蒂玛
    [16:04 | 02/08/2019]: 当然，戴夫 ![点赞表情](../images/607613_1_En_3_Chapter/607613_1_En_3_Figc_HTML.gif)
    一个点赞的手势图标。我会定期更新客户，提供我们发现的任何相关信息。约翰 [16:20 | 02/08/2019]: 我已经检查了代码库，到目前为止，我没有发现任何明显的问题。应用程序在加载时崩溃很奇怪。这可能是与内存相关的问题吗？基思，我们最近是否有关于内存泄漏或高内存使用的报告？基思
    [16:22 | 02/08/2019]: 约翰，我会调出监控日志，检查最近发布中是否有任何与内存相关的异常。我会尽快告诉你。法蒂玛 [17:01 | 02/08/2019]:
    快速更新，大家。客户正在使用运行 iOS 15.1 的 iPhone X。他们提到，问题是在几天前更新应用程序后开始的 ![思考表情](../images/607613_1_En_3_Chapter/607613_1_En_3_Figd_HTML.gif)
    一个思考的表情符号。基思 [17:05 | 02/08/2019]: 感谢你的更新，法蒂玛。这是有帮助的信息。约翰，让我们专注于在 iOS 15.1 的 iPhone
    X 模拟器上测试最新的应用程序更新，看看我们是否能重现这个问题。约翰 [17:06 | 02/08/2019]: 好主意，基思。我会立即设置模拟器并运行一些测试。基思
    [17:30 | 02/08/2019]: 约翰，你在模拟器上重现问题的进展如何？约翰 [17:32 | 02/08/2019]: 是的，基思。我设法在模拟器上重现了崩溃。这似乎与
    iOS 15.1 的兼容性问题有关 ![爆炸头表情](../images/607613_1_En_3_Chapter/607613_1_En_3_Fige_HTML.gif)
    一个爆炸头表情符号。我怀疑是由于一个已弃用的方法调用。我会修复它并运行更多测试以确认。约翰 [18:03 | 02/08/2019]: 修复了已弃用的方法问题，应用程序在加载时不再崩溃。看起来我们已经识别并解决了这个问题。我将准备一个补丁并发送给您，基思，以便您审查和部署。基思
    [18:04 | 02/08/2019]: ![鼓掌表情](../images/607613_1_En_3_Chapter/607613_1_En_3_Figf_HTML.gif)
    三个鼓掌的手势表情符号。谢谢你，请尽快提供补丁。一旦我审查完毕，我们将部署修复程序到应用商店。戴夫 [18:06 | 02/08/2019]: 干得好，团队
    ![三角形脸和卷发表情](../images/607613_1_En_3_Chapter/607613_1_En_3_Figg_HTML.gif) 一个三角形脸和卷发的表情符号。约翰，请继续通知客户进展情况，并让他们知道我们将在下一个应用程序更新中为他们提供修复方案。有人能确保发布说明反映了这一点吗？约翰
    [18:07 | 02/08/2019]: 我会做到的，戴夫。我会更新客户并确保他们知道即将到来的修复方案。基思 [18:27 | 02/08/2019]:
    补丁已审查并批准，约翰。请继续更新商店中的应用程序。让我们争取在下一个小时内完成。约翰 [18:26 | 02/08/2019]: 我明白了，基思。我现在正在上传中。法蒂玛
    [18:38 | 02/08/2019]: 我刚刚通知了客户关于修复方案的消息。他们感到如释重负，并对我们的快速响应表示感谢。谢谢大家，感谢你们的协作和迅速行动。与这样一支有能力的团队合作是一种乐趣。戴夫
    [18:40 | 02/08/2019]: 干得好，团队！你们的努力非常值得赞赏。我们设法在创纪录的时间内解决了这个紧急问题。让我们继续保持良好的工作状态
    ![点赞表情](../images/607613_1_En_3_Chapter/607613_1_En_3_Figh_HTML.gif) 一个点赞的手势表情符号。列表
    3-5'
- en: Team Members Within a Slack Channel Trying to Analyze a Customer’s Problem
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Slack 频道中试图分析客户问题的团队成员
- en: 'Prompt Engineering 101: Text Summarization'
  id: totrans-339
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示工程 101：文本摘要
- en: So, needless to say, no one wants to spend their day constantly scrolling through
    Slack channels reading about issues and problems that are on fire. We’re going
    to utilize the capabilities of ChatGPT for text summarization. To keep things
    simple, let’s try a few prompts to send the entire listing of the chat messages
    to ChatGPT in order for it to give us a usable summary of all the events that
    have happened.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，不用说，没有人愿意整天在 Slack 频道中不断滚动阅读关于正在燃烧的问题和问题的文章。我们将利用 ChatGPT 的文本摘要功能。为了保持简单，让我们尝试几个提示，将整个聊天消息列表发送给
    ChatGPT，以便它给我们一个所有发生事件的可用摘要。
- en: 'Prompt #1: “tl;dr”'
  id: totrans-341
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '提示 #1：“tl;dr”'
- en: 'This prompt is short, sweet, and to the point. In case you’re not familiar
    with it, it’s a term used online frequently to briefly summarize a long article.
    It literally stands for “Too Long; Didn’t Read,” which is how I feel about a lot
    of conversations on Slack when I’m swamped with work. Conveniently, ChatGPT can
    understand this simple term (I wouldn’t necessarily call it a word) as a prompt,
    and the results are pretty impressive.**System**: You are a helpful assistant**User**:  Fatima
    [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...**User**: Tl;dr**Model**:
    gpt-4**Temperature**: 1**Maximum length:** 360**Top P:** 1**Frequency penalty:**
    0**Presence penalty:** 0Listing 3-6'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 这个提示非常简洁、明了。如果你不熟悉它，这是一个在网上经常用来简要总结长篇文章的术语。它字面意思是“太长了；没读”，这正是我在工作繁忙时对 Slack
    上许多对话的感受。方便的是，ChatGPT 可以理解这个简单的术语（我并不一定称之为单词）作为提示，结果相当令人印象深刻。**系统**：您是一个有用的助手**用户**：Fatima
    [16:00 | 02/08/2019]：大家好，我有一个紧急的...**用户**：tl;dr**模型**：gpt-4**温度**：1**最大长度**：360**Top
    P**：1**频率惩罚**：0**存在惩罚**：0列表 3-6
- en: PROMPT. Asking for a Summarized Version of a Longer Conversation
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 提示。请求对较长的对话进行总结
- en: Note
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: You have two options now on how to send the preceding prompt to ChatGPT. The
    first option is to use the ChatGPTClient.java app and its supporting classes.
    The second option is to use the Chat Playground. In either case, be sure that
    the first User message contains all of the text that is in Listing [3-5](#PC5).
    It’s truncated in Listing [3-6](#PC6) to make it more readable.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您有两种方法可以将前面的提示发送到 ChatGPT。第一种方法是使用 ChatGPTClient.java 应用程序及其支持类。第二种方法是使用 Chat
    Playground。在两种情况下，请确保第一个用户消息包含列表 [3-5](#PC5) 中的所有文本。它在列表 [3-6](#PC6) 中被截断，以便更易于阅读。
- en: Notice how the number of tokens is kept small, at 360, which will ultimately
    help ChatGPT to create a short response. Also see that the temperature is left
    at 1 (the default value), but the Top P is increased all the way to its maximum
    (which is 1). Therefore, it’s important to play around with temperature and other
    settings to control the tone and variety of ChatGPT’s responses.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，令牌数量保持很小，为 360，这最终将帮助 ChatGPT 创建简短的响应。同时看到温度保持在 1（默认值），但 Top P 提高到最大值（即 1）。因此，重要的是要尝试调整温度和其他设置，以控制
    ChatGPT 响应的语气和多样性。
- en: Listing [3-7](#PC7) shows ChatGPT’s summarization of the conversation from Listing
    [3-5](#PC5).![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figi_HTML.gif)The
    Chat G P T logo.The team quickly responds to a client's app crashing issue. John
    investigates the codebase while Fatima gathers information from the client. They
    discover a compatibility issue with iOS 15.1 and John fixes it. The patch is reviewed
    and approved, and the app is updated in the store. The client is informed and
    grateful for the quick resolution. The team is praised for their collaboration
    and prompt action.Listing 3-7
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [3-7](#PC7) 显示了 ChatGPT 对列表 [3-5](#PC5) 中对话的摘要。![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figi_HTML.gif)Chat
    G P T 标志。团队迅速响应客户的崩溃问题。John 调查代码库，Fatima 从客户那里收集信息。他们发现与 iOS 15.1 不兼容的问题。John
    修复了它。补丁经过审查并获得批准，应用程序在商店中更新。客户被告知并感谢快速解决。团队因他们的协作和迅速行动而受到赞扬。列表 3-7
- en: RESPONSE. Getting a Summarized Version of a Very Long Conversation
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 响应。获取非常长对话的总结
- en: That’s fantastic! It reduced that extremely long conversation down to a simple
    and brief summary of only 68 words. As you can see, ChatGPT is not replacing a
    job here; however, it will definitely make someone more productive. Now, let’s
    try a few more prompts, shall we?
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 太棒了！它将那个极其冗长的对话简化成了一个只有68个单词的简单摘要。如您所见，ChatGPT在这里并没有取代任何工作；然而，它肯定会让人更加高效。现在，让我们尝试几个更多的提示，怎么样？
- en: 'Prompt #2: “Explain This in 3 Sentences or Less”'
  id: totrans-350
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 'Prompt #2: “用3句话或更少的解释”'
- en: 'So, If “tl;dr” doesn’t provide a brief enough explanation for you, then we
    can tell ChatGPT to make things even simpler. ChatGPT does well with parameters,
    so let’s specify that the explanation shouldn’t be any longer than 3 sentences
    as shown in Listing [3-8](#PC8).**System**: You are a helpful assistant**User**:  Fatima
    [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...**User**: Explain this
    in 3 sentences or less.**Model**: gpt-4**Temperature**: 1**Maximum length:** 250**Top
    P:** 0**Frequency penalty:** 0**Presence penalty:** 0Listing 3-8'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: '因此，如果“tl;dr”没有提供足够简明的解释，那么我们可以告诉ChatGPT使事情更加简单。ChatGPT在参数方面做得很好，所以让我们指定解释不应超过3句话，如列表[3-8](#PC8)所示。**系统**:
    你是一个有用的助手**用户**: 法蒂玛 [16:00 | 02/08/2019]: 嘿，大家好，我有一个紧急的...**用户**: 请用3句话或更少的解释。**模型**:
    gpt-4**温度**: 1**最大长度**: 250**Top P**: 0**频率惩罚**: 0**存在惩罚**: 0列表3-8'
- en: PROMPT. Asking for a Shorter Version of a Longer Conversation
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: PROMPT. 请求一个更长对话的简短版本
- en: As you may have noticed, the temperature is set to 0.82 in this example. We
    really want ChatGPT to give us a concise answer here, so the “drier” the better.![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figj_HTML.gif)The
    Chat G P T logo.A customer reported an urgent issue of app crashes to the team.
    John investigates the issue and asks Fatima to gather additional information from
    the client. They discover that the issue is related to a compatibility problem
    with iOS 15.1\. John fixes the problem and Keith approves the deployment of the
    fix to the client's production environment.Listing 3-9
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所注意到的，在这个例子中，温度设置为0.82。我们真的希望ChatGPT在这里给我们一个简洁的回答，所以“越干”越好！![Chat G P T标志](../images/607613_1_En_3_Chapter/607613_1_En_3_Figj_HTML.gif)一位客户向团队报告了一个紧急的应用程序崩溃问题。约翰调查了这个问题，并要求法蒂玛从客户那里收集更多信息。他们发现问题是与iOS
    15.1的兼容性问题有关。约翰修复了这个问题，基思批准将修复部署到客户的生成环境中。列表3-9
- en: RESPONSE. Getting a 3 Sentence Summary
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: RESPONSE. 获取3句话的摘要
- en: 'Prompt #3: “I’m a Manager. Explain to Me What Happened”'
  id: totrans-355
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 'Prompt #3: “我是一个经理。向我解释发生了什么”'
- en: 'When you don’t want to sound like the one person that doesn’t understand, ChatGPT
    has the capability to rephrase what has been said and break it down until it’s
    very simple (Listing [3-10](#PC10)).**System**: You are a helpful assistant**User**:  Fatima
    [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...**User**: Summarize this
    conversation and explain it to me like I''m a manager with little technical experience.**Model**:
    gpt-3.5-turbo**Temperature**: 0.82**Maximum length:** 750**Top P:** 1**Frequency
    penalty:** 0**Presence penalty:** 0Listing 3-10'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: '当你不想听起来像是那个不理解的人时，ChatGPT有重新表述所说内容并将其分解到非常简单的程度的能力（列表[3-10](#PC10)）。**系统**:
    你是一个有用的助手**用户**: 法蒂玛 [16:00 | 02/08/2019]: 嘿，大家好，我有一个紧急的...**用户**: 总结这次对话，并像我对一个技术经验很少的经理一样解释给我听。**模型**:
    gpt-3.5-turbo**温度**: 0.82**最大长度**: 750**Top P**: 1**频率惩罚**: 0**存在惩罚**: 0列表3-10'
- en: PROMPT. Asking for a Simplified Version of a More Complex Conversation
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: PROMPT. 请求一个更复杂对话的简化版本
- en: Again, the temperature is set below 1.0 so that ChatGPT can keep the answer
    brief and easy to understand. We increased the token length so that ChatGPT can
    take the time to explain some potentially technical concepts.![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figk_HTML.gif)The
    Chat G P T logo.In this conversation, Fatima brings up an urgent issue with a
    client who is experiencing app crashes as soon as they load it. Keith assigns
    John to investigate the issue since their architect is out sick. John asks Fatima
    to gather additional information from the client about their device, operating
    system, and recent updates. Dave emphasizes the importance of keeping the client
    informed throughout the troubleshooting process.John checks the codebase but doesn't
    find any obvious issues, so he suspects it could be a memory-related problem.
    Keith agrees to check for memory-related anomalies in recent releases. Fatima
    provides an update that the client is using an iPhone X running iOS 15.1 and mentioned
    that the issue started after updating the app. Keith suggests testing the latest
    app update on an iPhone X simulator with iOS 15.1 to replicate the issue.John
    successfully reproduces the crash on the emulator and identifies a compatibility
    issue with iOS 15.1, possibly due to a deprecated method call. He fixes the issue
    and prepares a patch for review and deployment. Keith approves the patch and asks
    John to update the app in the store. Dave requests that the client be kept informed
    and that the release notes reflect the upcoming fix.John uploads the patch and
    informs the client about the fix. Keith reviews and approves the patch, and John
    proceeds with updating the app in the store. Fatima informs the client about the
    fix, and they express relief and gratitude for the prompt response. Dave commends
    the team for their collaboration and quick action, emphasizing the importance
    of maintaining good work.In summary, the team quickly addressed an urgent issue
    where a client's app was crashing on load. They investigated the issue, identified
    a compatibility problem with iOS 15.1, fixed it, and prepared a patch for deployment.
    The client was kept informed throughout the process, and the fix was successfully
    implemented, resulting in a relieved and grateful client.Listing 3-11
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，温度被设置为低于1.0，这样ChatGPT可以保持答案简短且易于理解。我们增加了标记长度，以便ChatGPT有足够的时间解释一些可能的技术概念。![Chat
    G P T标志](../images/607613_1_En_3_Chapter/607613_1_En_3_Figk_HTML.gif)在这个对话中，法蒂玛提到了一个紧急问题，客户在加载应用程序后立即遇到应用程序崩溃。基思指派约翰调查这个问题，因为他们的架构师因病缺席。约翰要求法蒂玛从客户那里收集有关他们的设备、操作系统和最近更新的额外信息。戴夫强调了在整个故障排除过程中保持客户知情的重要性。约翰检查了代码库，但没有发现任何明显的问题，所以他怀疑可能是与内存相关的问题。基思同意检查最近发布中的内存相关异常。法蒂玛提供更新称，客户使用的是运行iOS
    15.1的iPhone X，并提到问题是在更新应用程序后开始的。基思建议在iOS 15.1的iPhone X模拟器上测试最新的应用程序更新以重现问题。约翰在模拟器上成功重现了崩溃，并确定了一个与iOS
    15.1的兼容性问题，可能是由于过时的方法调用。他修复了这个问题，并为审查和部署准备了一个补丁。基思批准了补丁，并要求约翰更新商店中的应用程序。戴夫要求保持客户知情，并且发布说明反映了即将进行的修复。约翰上传了补丁，并通知客户关于修复的信息。基思审查并批准了补丁，约翰继续在商店中更新应用程序。法蒂玛通知客户关于修复的信息，他们表示对快速响应感到欣慰和感激。戴夫称赞团队的合作和快速行动，强调了保持良好工作的重要性。总之，团队迅速解决了一个紧急问题，即客户的加载应用程序时崩溃的问题。他们调查了问题，确定了与iOS
    15.1的兼容性问题，修复了它，并为部署准备了补丁。在整个过程中，客户都得到了通知，修复成功实施，客户感到欣慰和感激。列表3-11
- en: RESPONSE. Getting a Simplified Version of a More Complex Conversation
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 响应：获取更复杂对话的简化版本
- en: 'Prompt #4: “Give Me Suggestions on Next Steps”'
  id: totrans-360
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '提示 #4：“给我下一步的建议”'
- en: 'In addition to making a summary that’s easier to understand, ChatGPT can explain
    in different styles and “tones.” We’re going to increase the top P to 0.75 because
    we want ChatGPT to think of more possibilities than what is the default. We are
    also going to increase the presence penalty to 0.5 because we want to encourage
    a versatile response.**System**: You are a helpful assistant**User**:  Fatima
    [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...**User**: I''m a QA engineer
    at the company. Give me suggestions on next steps.**Model**: gpt-4**Temperature**:
    1**Maximum length:** 1200**Top P:** 0.75**Frequency penalty:** 0**Presence penalty:**
    0.5Listing 3-12'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 除了制作更容易理解的摘要外，ChatGPT还可以用不同的风格和“语气”进行解释。我们将把Top P提高到0.75，因为我们希望ChatGPT考虑比默认更多的可能性。我们还将增加存在惩罚到0.5，因为我们希望鼓励多样化的回答。**系统**：您是一个有用的助手**用户**：Fatima
    [16:00 | 02/08/2019]：嘿，大家好，我有一个紧急的...**用户**：我是公司的QA工程师。给我一些建议的下一步行动。**模型**：gpt-4**温度**：1**最大长度**：1200**Top
    P**：0.75**频率惩罚**：0**存在惩罚**：0.5列表3-12
- en: PROMPT. Asking to ChatGPT for Advice on the Best Next Steps
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: PROMPT. 向ChatGPT请求关于最佳下一步行动的建议
- en: '![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figl_HTML.gif)The Chat G
    P T logo.As a QA engineer, here are some suggestions for next steps:1\. Test the
    patch: Once the patch has been deployed to the app store, thoroughly test it on
    various devices and operating systems to ensure that the issue has been resolved
    and there are no new bugs or regressions introduced.2\. Conduct regression testing:
    In addition to testing the specific issue, perform a comprehensive regression
    test to ensure that the fix does not have any unintended side effects on other
    functionalities of the app.3\. Communicate the fix to the client: Keep the client
    updated on the progress and let them know that the fix is available in the latest
    app update. Provide them with clear instructions on how to update their app and
    encourage them to test it on their end as well.4\. Monitor user feedback: Keep
    an eye on user feedback after the fix has been deployed. Encourage users to report
    any issues they encounter, and be proactive in addressing them promptly.5\. Document
    the issue and resolution: Create a detailed report documenting the issue, the
    steps taken to reproduce and resolve it, and any other relevant information. This
    will serve as a reference for future troubleshooting and help improve the development
    process.6\. Conduct a post-mortem analysis: After the issue has been resolved
    and the fix has been deployed, schedule a post-mortem meeting with the team to
    discuss the root cause, lessons learned, and any process improvements that can
    be implemented to prevent similar issues in the future.7\. Continuous improvement:
    Use this incident as an opportunity to identify areas of improvement in the development
    and testing processes. Evaluate if there are any changes that can be made to prevent
    similar issues from occurring in the future.Remember, open communication, collaboration,
    and continuous learning are key to ensuring the highest quality of your app and
    maintaining a strong relationship with your clients.Listing 3-13'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: '![](../images/607613_1_En_3_Chapter/607613_1_En_3_Figl_HTML.gif)Chat G P T标志。作为一名QA工程师，以下是一些建议的下一步行动：1.
    测试补丁：一旦补丁部署到应用商店，请在各种设备和操作系统上彻底测试，以确保问题已解决，没有引入新的错误或回归。2. 进行回归测试：除了测试特定问题外，还要进行全面的回归测试，以确保修复不会对应用的其他功能产生意外的副作用。3.
    将修复方案告知客户：保持客户对进度的更新，并让他们知道修复已在最新应用更新中可用。提供明确的指导，说明如何更新他们的应用，并鼓励他们在自己的端上测试。4.
    监控用户反馈：修复部署后，密切关注用户反馈。鼓励用户报告他们遇到的问题，并积极及时地解决这些问题。5. 记录问题和解决方案：创建详细报告，记录问题、重现和解决步骤以及任何其他相关信息。这将作为未来故障排除的参考，并有助于改进开发过程。6.
    进行事后分析：问题解决并部署修复后，安排一次团队的事后会议，讨论根本原因、经验教训以及可以实施以防止未来类似问题的流程改进。7. 持续改进：利用这次事件作为机会，识别开发和测试过程中的改进领域。评估是否可以做出任何改变以防止未来发生类似问题。记住，开放沟通、协作和持续学习是确保应用最高质量和维护与客户良好关系的关键。列表3-13'
- en: RESPONSE. Suggestions from ChatGPT on Possible Next Steps
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: RESPONSE. ChatGPT关于可能下一步行动的建议
- en: Now, of course, ChatGPT (like every other form of artificial intelligence on
    the planet) is not entirely perfect. For instance, recommendation number 3 is
    a valid item to do, except for the fact that it’s not usually the responsibility
    of a QA person in order to communicate anything directly to the client or customer.
    That communication can be done either through tech support, or with a product
    manager who has those communication channels (especially if they are a significant
    customer). So, the suggestion is fine, but it’s not appropriate for a person with
    that role within a company.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，当然，ChatGPT（就像地球上其他所有形式的人工智能一样）并不完全完美。例如，第三项建议是一个有效的操作项，但事实上，这通常不是QA人员的责任，以便直接与客户或客户沟通。这种沟通可以通过技术支持完成，或者与拥有这些沟通渠道的产品经理（特别是如果他们是重要客户）进行沟通。因此，建议是好的，但并不适合在公司中担任该角色的人。
- en: Let’s Talk About Real Prompt Engineering
  id: totrans-366
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 让我们谈谈真正的提示工程
- en: If you Google the term, “prompt engineering,” you’ll find a ton of examples,
    blogs, and even full websites with subscription plans that will try to convince
    you that the perfect prompts can be created by simply only using text. As you
    have seen from the examples above, prompt engineering cannot be accomplished solely
    by merely crafting textual inputs.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你搜索“提示工程”这个术语，你会找到大量的例子、博客，甚至有订阅计划的完整网站，它们会试图说服你，完美的提示可以通过仅使用文本来创建。正如你从上面的例子中看到的，提示工程不能仅仅通过仅仅构建文本输入来完成。
- en: In reality, the process is quite similar to cooking a sophisticated meal. Imagine
    trying to cook, for example, beef bourguignon using only salt as the seasoning,
    and neglecting all other ingredients and spices! Honestly, the result would pale
    in comparison to the actual dish.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，这个过程与烹饪一道复杂的菜肴非常相似。想象一下，例如，只用盐作为调味料来尝试烹饪波尔多牛肉，而忽略了所有其他成分和香料！说实话，结果与实际菜肴相比将相形见绌。
- en: Similarly, try assembling an entire orchestra but only use one instrument and
    one musician. That’s an embarrassing “one man band.” Therefore, simply adjusting
    the text to the prompt isn’t enough in order to truly perform prompt engineering.
    The parameters such as the model’s temperature, which controls randomness; the
    top-p, impacting token probability; the specific model used; the number of tokens;
    and the other parameters to the endpoint all play highly pivotal roles in getting
    a great response.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，尝试组装一个完整的管弦乐队，但只使用一种乐器和一个音乐家。那将是一个尴尬的“单打独斗”。因此，仅仅调整文本以符合提示并不足以真正进行提示工程。模型温度等参数，它控制随机性；top-p，影响标记概率；使用的特定模型；标记数量；以及发送到端点的其他参数，都在获得良好响应中扮演着至关重要的角色。
- en: This book is not about prompt engineering, since (as you can see from the explanation
    above) it truly involves several factors that don’t have anything to do with Java.
    However, you are highly encouraged to experiment with ALL the parameters to the
    models and endpoints provided by OpenAI to find what works best for your use case.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书不是关于提示工程的，因为（正如你从上面的解释中可以看到）它真正涉及几个与Java无关的因素。然而，你被强烈鼓励尝试所有由OpenAI提供的模型和端点的参数，以找到最适合你用例的方案。
- en: Registering a Slack Bot App
  id: totrans-371
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 注册Slack机器人应用
- en: Now that we know the various ways for ChatGPT to summarize a large body of text
    for us, let’s see what’s necessary in order to create a simple bot in Java that
    will programmatically grab all the messages from a channel within a Slack instance.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道了ChatGPT为我们总结大量文本的各种方法，让我们看看为了创建一个简单的Java机器人，该机器人可以程序化地从Slack实例中的某个频道获取所有消息，需要哪些条件。
- en: Note
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: In order to accomplish the steps, you will need to have administrative access
    to a Slack workspace. Most developers will **NOT** have these levels of permissions;
    therefore, in order to fully experiment, I recommend that you create your own
    personal Slack workspace for testing purposes. This way, you will have all the
    rights and privileges to install your Slack bot.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 为了完成这些步骤，你需要对Slack工作空间有管理权限。大多数开发者**不会**有这些级别的权限；因此，为了完全实验，我建议你创建自己的个人Slack工作空间进行测试。这样，你将拥有安装你的Slack机器人的所有权利和特权。
- en: But one step at a time. First, we’re going to make our Slack bot app, so head
    over to Slack API website (Figure [3-1](#Fig1)).
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 但一步一个脚印。首先，我们将创建我们的Slack机器人应用，所以前往Slack API网站（图[3-1](#Fig1)）。
- en: '[https://api.slack.com/](https://api.slack.com/)![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig1_HTML.png)'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://api.slack.com/](https://api.slack.com/)![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig1_HTML.png)'
- en: A screenshot of the Slack a p i interface. It displays the home screen with
    the dropdown under the Your Apps tab at the top.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: Slack API界面的截图。它显示了主屏幕，在顶部“您的应用”标签下有一个下拉菜单。
- en: Figure 3-1
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-1
- en: In Order to Create a Slack Bot, Go to the Slack API Website
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建一个Slack Bot，请访问Slack API网站
- en: Of course, you’ll need to have a Slack account in order for this to work, so
    if you don’t have one, then you need to create one first.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，您需要一个Slack账户才能使这生效，所以如果您还没有，那么您需要先创建一个。
- en: After you have logged in, go to the top-right of the page and navigate to “**Your
    apps ➤ Create your first app**”, as shown in Figure [3-1](#Fig1). In Slack terminology,
    a “bot” is an “app,” and bots are not allowed to run on a Slack instance unless
    they have been registered with Slack first.![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig2_HTML.png)
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 登录后，前往页面右上角，导航到“**您的应用 ➤ 创建您的第一个应用**”，如图[3-1](#Fig1)所示。在Slack术语中，“bot”就是“应用”，并且除非它们已在Slack上注册，否则bot不允许在Slack实例上运行。![图片](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig2_HTML.png)
- en: A screenshot of the Slack a p i interface is overlayed by the create an app
    popup box. It lists the options to create the app from scratch and the app manifest.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: Slack API界面的截图被创建应用弹出框覆盖。它列出了创建应用从头开始和应用程序清单的选项。
- en: Figure 3-2
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-2
- en: Creating a New Bot App for Slack
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 为Slack创建新的Bot应用
- en: As shown in Figure [3-2](#Fig2), you’ll be taken to the **Your Apps** page where
    you can manage your Slack apps. Immediately, you’ll see a popup to **Create an
    App** button in the middle of the screen.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[3-2](#Fig2)所示，您将被带到**您的应用**页面，在那里您可以管理您的Slack应用。立即，您会在屏幕中间看到一个弹出创建**应用**按钮。
- en: Select the option to create your app **from scratch**. This is because we want
    to be able to manipulate all of the details of the application ourselves without
    overcomplicating things with a bunch of default settings.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 选择创建应用**从头开始**的选项。这是因为我们希望能够自己操作应用的所有细节，而不需要用一大堆默认设置来复杂化事情。
- en: Afterward, you’ll be prompted to specify a name for your bot and to select the
    workspace that you want your bot to have access to, as shown in Figure [3-3](#Fig3).
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，您将被提示为您的bot指定一个名称，并选择您希望bot可以访问的工作空间，如图[3-3](#Fig3)所示。
- en: Click the **Create App** button to proceed.![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig3_HTML.png)
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 点击**创建应用**按钮继续。![图片](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig3_HTML.png)
- en: A screenshot of the Slack a p i interface is overlayed by the Name App and Choose
    workspace popup box. It lists the fields to enter the name and workspace to develop
    the app with cancel and create app buttons.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: Slack API界面的截图被Name App和选择工作空间弹出框覆盖。它列出了输入名称和工作空间的字段，以及取消和创建应用的按钮。
- en: Figure 3-3
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-3
- en: Creating a New Bot App for Slack
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 为Slack创建新的Bot应用
- en: Specifying What Your Bot Can (and Can’t) Do By Setting the Scope
  id: totrans-392
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过设置作用域来指定您的Bot可以（和不可以）做什么
- en: Now, you’ll be presented with a screen that has a ton of options for bots for
    Slack workspaces. The first thing you need to do, however, is from the sidebar
    on the left, click **OAuth & Permissions**.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您将看到一个屏幕，它为Slack工作空间中的bot提供了大量选项。然而，您首先需要从左侧的侧边栏中点击**OAuth & Permissions**。
- en: Our bot is going to be pretty simple; all it needs to do is read the messages
    from a channel in order to give us a summary of what was said. In addition to
    reading the messages, we also need to know the names of the people in the Slack
    workspace; otherwise, we’ll get a UUID representation of the person instead of
    their name, which is meaningless to us.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的bot将会非常简单；它只需要从频道中读取消息，以便为我们提供所说的内容的摘要。除了读取消息外，我们还需要知道Slack工作空间中人的名字；否则，我们将得到一个表示人的UUID，这对我们来说是没有意义的。
- en: So, scroll down and be sure to add the following OAuth Scopes to your Slack
    Bot, as shown in Figure [3-4](#Fig4).
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，向下滚动并确保将以下OAuth作用域添加到您的Slack Bot中，如图[3-4](#Fig4)所示。
- en: channels:history
  id: totrans-396
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: channels:history
- en: channels:read
  id: totrans-397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: channels:read
- en: users:read
  id: totrans-398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: users:read
- en: '![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig4_HTML.png)'
  id: totrans-399
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig4_HTML.png)'
- en: A screenshot of the Slack a p i interface. It displays the applications under
    the scopes. It lists the O Auth scope and description under the Bot token scopes.
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: Slack API界面的截图。它显示了作用域下的应用。在Bot令牌作用域下列出了OAuth作用域和描述。
- en: Figure 3-4
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 图3-4
- en: Adding Scopes for the Slack Bot App
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 为Slack Bot应用添加作用域
- en: Confirming Your Settings
  id: totrans-403
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确认您的设置
- en: After you’ve added the appropriate scopes for your bot, scroll back up and click
    **Basic Information** from the left side bar.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 在为你的机器人添加了适当的作用域后，向上滚动并从左侧栏点击**基本信息**。
- en: On the page that follows, you’ll see that there’s now a green checkmark beside
    “Add features and functionality,” which confirms that you’ve added your scopes
    correctly, as shown in Figure [3-5](#Fig5).![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig5_HTML.png)
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的页面上，你会看到现在“添加功能”旁边有一个绿色的勾选标记，这确认你已经正确添加了作用域，如图[3-5](#Fig5)所示。![图 3-5](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig5_HTML.png)
- en: A screenshot of the Slack a p i interface. The block information is selected
    under the settings that display the basic information. It reads the following
    options. Add features and functionality, install the app, and manage distribution.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: Slack API界面的截图。在显示基本信息的设置下选中了块信息。它显示了以下选项：添加功能，安装应用，管理分发。
- en: Figure 3-5
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-5
- en: Confirm Your Settings
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 确认你的设置
- en: Viewing the OAuth and Permissions Page
  id: totrans-409
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 查看OAuth和权限页面
- en: As shown in Figure [3-6](#Fig6), navigate to the **OAuth & Permissions** page
    and click the “Install to Workspace” button.![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig6_HTML.png)
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[3-6](#Fig6)所示，导航到**OAuth & Permissions**页面并点击“安装到工作区”按钮。![图 3-6](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig6_HTML.png)
- en: A screenshot of the Slack a p i interface. The O Auth and permissions option
    is selected under the features that display the Advanced token security via token
    rotation and O Auth Tokens for the Workspace settings.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: Slack API界面的截图。在显示高级功能选项下选中了OAuth和权限，通过令牌轮换和为工作区设置提供OAuth令牌的高级令牌安全。
- en: Figure 3-6
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-6
- en: The OAuth & Permission Screen
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: OAuth & Permission屏幕
- en: Installing Your Slack Bot App to Your Workspace
  id: totrans-414
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将你的Slack机器人应用到工作区
- en: Now that all the permissions have been requested, it’s time to install your
    bot to your workspace. During the installation process, you should see a screen
    as shown in Figure [3-7](#Fig7).![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig7_HTML.png)
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 现在所有权限都已请求，是时候将你的机器人安装到工作区了。在安装过程中，你应该会看到一个如图[3-7](#Fig7)所示的屏幕。![图 3-7](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig7_HTML.png)
- en: A screenshot of the Slack window. It reads the following message. Tester Bot
    is requesting permission to access the Apress Book Testing Slack workspace and
    the allow button is selected.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: Slack窗口的截图。它显示了以下消息。Tester Bot请求访问Apress Book Testing Slack工作区的权限，并且已选中允许按钮。
- en: Figure 3-7
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3-7
- en: “Installing” a New Slack Bot App
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: “安装”新的Slack机器人应用
- en: Click the **Allow** button to authorize the bot and allow the permissions you
    allotted in the previous step.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 点击**允许**按钮以授权机器人并允许你在上一步分配的权限。
- en: Note
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: It’s important to understand what “installing” means here. In a traditional
    Java sense, installing an app means to load a JAR, WAR, or EAR file into another
    machine and have it to execute. That’s not what’s happening here.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里理解“安装”的含义很重要。在传统的Java意义上，安装一个应用意味着将JAR、WAR或EAR文件加载到另一台机器上并执行它。这里的情况并非如此。
- en: Here, when you “install” a bot app, you’re enabling your Slack workspace to
    allow an app to join the workspace – that’s all. The code for your bot will run
    on your own machine, and not on Slack’s servers.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，当你“安装”一个机器人应用时，你是在使你的Slack工作区允许应用加入工作区——仅此而已。你的机器人代码将在你的机器上运行，而不是在Slack的服务器上。
- en: Getting Your Slack Bot (Access) Token
  id: totrans-423
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 获取你的Slack机器人（访问）令牌
- en: This time, “token,” actually means access token! In order to connect to the
    Slack API and access messages and user information programmatically, you need
    a specific OAuth token generated for your Slack bot.![](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig8_HTML.png)
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，“令牌”实际上是指访问令牌！为了连接到Slack API并以编程方式访问消息和用户信息，你需要为你的Slack机器人生成一个特定的OAuth令牌！![图
    3-8](../images/607613_1_En_3_Chapter/607613_1_En_3_Fig8_HTML.png)
- en: A screenshot of the Slack a p i interface. The O Auth and permissions option
    is selected under the features that display the Advanced token security via token
    rotation and O Auth Tokens for the Workspace with the Bot user O Auth token copied.
  id: totrans-425
  prefs: []
