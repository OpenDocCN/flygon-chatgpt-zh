- en: '****2**4**. ****Iter**ativ**e ****Brain**stormi**ng'
  id: totrans-1296
  prefs: []
  type: TYPE_NORMAL
  zh: '**24. 重复头脑风暴**'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-1297
  prefs: []
  type: TYPE_NORMAL
  zh: '[**什么是**]'
- en: '****Iter**ativ**e ****Brain**stormi**ng, ****o**r** ****Iter**ativ**e ****Brain**stormi**ng,
    ****i**s** ****a**** ****pr**omp**t ****engi**neerin**g ****tech**niqu**e ****th**at**
    ****inv**olve**s ****as**kin**g ****t**he** ****L**LM** ****t**o** ****gen**erat**e
    ****a**** ****li**st** ****o**f** ****id**eas** ****o**r** ****solu**tion**s,
    ****a**nd** ****th**en** ****revi**ewin**g ****a**nd** ****ref**inin**g ****th**ese**
    ****id**eas** ****i**n** ****mul**tipl**e ****ro**und**s ****t**o** ****cont**inuall**y
    ****imp**rov**e ****th**em**. ****T**he** ****fo**cus** ****i**s** ****o**n**
    ****us**ing** ****mul**tipl**e ****iter**ation**s ****t**o** ****ex**pan**d, ****re**fin**e,
    ****a**nd** ****se**lec**t ****progr**essive**ly ****be**tte**r ****a**nd** ****mo**re**
    ****det**aile**d ****id**eas**.'
  id: totrans-1298
  prefs: []
  type: TYPE_NORMAL
  zh: '**重复头脑风暴**，或称为**迭代头脑风暴**，是一种提示工程技术，涉及让LLM生成一个想法或解决方案列表，然后在这些想法中审查和改进，进行多轮迭代以持续改进它们。重点是使用多次迭代来扩展、细化并逐步选择更优秀和更详细的想法。'
- en: '****Th**is** ****app**roac**h ****al**low**s ****f**or** ****a**** ****cont**inuou**s
    ****pro**ces**s ****o**f** ****gene**ratin**g ****a**nd** ****ref**inin**g ****id**eas**,
    ****fost**erin**g ****crea**tivit**y ****a**nd** ****t**he** ****deve**lopmen**t
    ****o**f** ****solu**tion**s ****th**at** ****m**ay** ****n**ot** ****init**iall**y
    ****b**e** ****obv**iou**s. ****T**he** ****mo**del** ****gene**rate**s ****a**n**
    ****ini**tia**l ****ba**se** ****o**f** ****id**eas** ****a**nd**, ****i**n**
    ****ea**ch** ****iter**atio**n, ****ma**kes** ****adju**stment**s ****o**r** ****addi**tion**s,
    ****ma**kin**g ****t**he** ****id**eas** ****mo**re** ****elab**orat**e ****a**nd**
    ****rel**evan**t.'
  id: totrans-1299
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法允许一个持续的过程，生成和细化想法，促进创造力和可能最初并不明显的解决方案的发展。模型生成一个初始想法库，并在每一轮迭代中做出调整或添加，使想法更加详尽和相关性更强。
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****go**al** ?]'
  id: totrans-1300
  prefs: []
  type: TYPE_NORMAL
  zh: '[**你的主要目标是什么**？]'
- en: '****T**he** ****ma**in** ****go**al** ****o**f** ****Iter**ativ**e ****Brain**stormi**ng
    ****i**s** ****t**o** ****stim**ulat**e ****crea**tivit**y ****a**nd** ****inno**vatio**n
    ****b**y** ****gene**ratin**g ****a**** ****wi**de** ****ra**nge** ****o**f**
    ****id**eas** ****a**nd** ****th**en** ****ref**inin**g ****th**em** ****t**o**
    ****fi**nd** ****t**he** ****be**st** ****solu**tion**s. ****Th**is** ****tech**niqu**e
    ****al**low**s ****y**ou** ****t**o** ****exp**lor**e ****mul**tipl**e ****dire**ction**s
    ****be**for**e ****comm**ittin**g ****t**o** ****a**** ****spe**cifi**c ****app**roac**h,
    ****incr**easin**g ****t**he** ****like**lihoo**d ****o**f** ****fin**din**g ****tr**uly**
    ****effe**ctiv**e ****solu**tion**s.'
  id: totrans-1301
  prefs: []
  type: TYPE_NORMAL
  zh: '**迭代式头脑风暴**的主要目标是刺激创造力和创新，通过生成广泛的想法范围，然后细化它们以找到最佳解决方案。这种技术允许你在承诺于特定方法之前探索多个方向，增加找到真正有效解决方案的可能性。'
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****cont**inuall**y ****imp**rov**e
    ****id**eas** ****thr**oug**h ****a**** ****re**vie**w ****pro**ces**s ****th**at**
    ****ta**kes** ****in**to** ****acc**oun**t ****t**he** ****stre**ngth**s ****a**nd**
    ****weak**nesse**s ****o**f** ****ini**tia**l ****sugg**estion**s. ****Th**is**
    ****cre**ate**s ****a**n** ****envi**ronmen**t ****wh**ere** ****ea**ch** ****id**ea**
    ****i**s** ****te**ste**d ****a**nd** ****ref**ine**d, ****resu**ltin**g ****i**n**
    ****mo**re** ****thou**ghtfu**l ****a**nd** ****effe**ctiv**e ****prop**osal**s.'
  id: totrans-1302
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个目标是通过对初始建议的优缺点进行审查，不断改进想法。这创造了一个环境，每个想法都经过测试和细化，从而产生更加深思熟虑和有效的提案。
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-1303
  prefs: []
  type: TYPE_NORMAL
  zh: '[**它是如何工作的**]'
- en: '****Iter**ativ**e ****Brain**stormi**ng ****wo**rks** ****b**y** ****as**kin**g
    ****t**he** ****L**LM** ****t**o** ****st**art** ****wi**th** ****a**** ****se**rie**s
    ****o**f** ****ini**tia**l ****id**eas** ****f**or** ****a**** ****pro**ble**m
    ****o**r** ****pro**jec**t. ****On**ce** ****th**ese** ****id**eas** ****a**re**
    ****gene**rate**d, ****t**he** ****ne**xt** ****st**ep** ****i**s** ****t**o**
    ****re**vis**e ****th**em** ****t**o** ****ex**pan**d, ****com**bin**e, ****imp**rov**e,
    ****o**r** ****elim**inat**e ****th**em** ****a**s** ****ne**ede**d. ****Th**is**
    ****pro**ces**s ****rep**eat**s ****f**or** ****sev**era**l ****ro**und**s, ****wi**th**
    ****ea**ch** ****iter**atio**n ****resu**ltin**g ****i**n** ****a**** ****mo**re**
    ****ref**ine**d ****s**et** ****o**f** ****id**eas**.'
  id: totrans-1304
  prefs: []
  type: TYPE_NORMAL
  zh: '**迭代式头脑风暴**通过让LLM从一个系列初始想法开始，为一个问题或项目工作。一旦这些想法被生成，下一步就是根据需要修订它们，以扩展、组合、改进或消除它们。这个过程重复进行几轮，每一轮迭代都会产生一个更加精细的想法集。'
- en: '****F**or** ****exa**mpl**e, ****wh**en** ****soli**citin**g ****id**eas**
    ****f**or** ****a**** ****n**ew** ****tech**nolog**y ****pro**duc**t ****f**or**
    ****yo**ung** ****pe**opl**e, ****t**he** ****fi**rst** ****ro**und** ****mi**ght**
    ****gen**erat**e ****br**oad** ****con**cept**s ****su**ch** ****a**s** “****han**dhel**d
    ****ga**min**g ****dev**ice**s” ****o**r** “ ****educ**ationa**l ****gad**get**s
    .” ****I**n** ****subs**equen**t ****ro**und**s, ****th**ese** ****id**eas** ****a**re**
    ****ref**ine**d ****wi**th** ****mo**re** ****de**tai**l ****ab**out** ****t**he**
    ****fea**ture**s, ****funct**ionali**ty, ****a**nd** ****va**lue** ****th**ey**
    ****c**an** ****br**ing** ****t**o** ****t**he** ****e**nd** ****us**er**.'
  id: totrans-1305
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当征求针对年轻人群体的新技术产品的想法时，第一轮可能会生成广泛的概念，例如“**手持游戏设备**”或“**教育小工具**”。在随后的轮次中，这些想法会根据更多关于功能、功能和它们可以为最终用户带来的价值的细节进行细化。
- en: '****Ea**ch** ****ro**und** ****o**f** ****brain**stormi**ng ****de**lve**s
    ****de**epe**r ****in**to** ****t**he** ****det**ail**s, ****wi**th** ****t**he**
    ****L**LM** ****revi**ewin**g ****a**nd** ****ref**inin**g ****id**eas** ****o**r**
    ****prop**osin**g ****n**ew** ****appr**oache**s. ****Th**is** ****tech**niqu**e
    ****he**lps** ****av**oid** ****qui**ckl**y ****comm**ittin**g ****t**o** ****t**he**
    ****fi**rst** ****id**ea** ****a**nd** ****al**low**s ****t**he** ****cre**ativ**e
    ****pro**ces**s ****t**o** ****ev**olv**e, ****all**owin**g ****f**or** ****cont**inuou**s
    ****impr**ovemen**t.'
  id: totrans-1306
  prefs: []
  type: TYPE_NORMAL
  zh: '**头脑风暴**的每一轮都深入到细节中，LLM会**审查**和**改进**想法或**提出**新的方法。这种技术有助于避免迅速对第一个想法做出承诺，并允许创造过程发展，从而实现持续改进。'
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-1307
  prefs: []
  type: TYPE_NORMAL
  zh: '[**何时使用**]'
- en: '****Iter**ativ**e ****Brain**stormi**ng ****sh**oul**d ****b**e** ****us**ed**
    ****wh**en** ****y**ou** ****ne**ed** ****t**o** ****gen**erat**e ****a**** ****wi**de**
    ****var**iet**y ****o**f** ****id**eas** ****a**nd** ****th**en** ****re**fin**e
    ****th**em** ****t**o** ****ch**oos**e ****t**he** ****be**st** ****opt**ion**s.
    ****I**t** ****i**s** ****id**eal** ****i**n** ****situ**ation**s ****su**ch**
    ****a**s** ****n**ew** ****pro**duc**t ****deve**lopmen**t, ****cre**atin**g ****mark**etin**g
    ****stra**tegie**s, ****o**r** ****cre**ativ**e ****pro**ble**m ****sol**vin**g.'
  id: totrans-1308
  prefs: []
  type: TYPE_NORMAL
  zh: 当你需要生成大量想法并随后对它们进行细化以选择最佳选项时，应使用**迭代式头脑风暴**。它在诸如新产品开发、制定营销策略或创造性问题解决等情况中非常理想。
- en: '****Th**is** ****tech**niqu**e ****i**s** ****reco**mmende**d ****i**n** ****con**text**s
    ****wh**ere** ****crea**tivit**y ****i**s** ****esse**ntia**l, ****su**ch** ****a**s**
    ****de**sig**n, ****pro**duc**t ****inno**vatio**n ****o**r** ****stra**tegi**c
    ****pla**nnin**g. ****Iter**ativ**e ****brain**stormi**ng ****al**low**s ****r**aw**
    ****id**eas** ****t**o** ****ev**olv**e ****in**to** ****prac**tica**l, ****we**ll**-****ref**ine**d
    ****solu**tion**s, ****hel**pin**g ****t**o** ****en**sur**e ****th**at** ****ini**tia**l
    ****crea**tivit**y ****i**s** ****n**ot** ****lo**st** ****du**rin**g ****t**he**
    ****ref**inin**g ****pro**ces**s.'
  id: totrans-1309
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术在需要创造力的环境中推荐使用，例如设计、产品创新或战略规划。迭代式头脑风暴允许原始想法发展成实际、经过深思熟虑的解决方案，有助于确保在审查过程中不会失去初始创造力。
- en: '****Addi**tional**ly, ****i**t** ****i**s** ****us**efu**l ****i**n** ****gr**oup**
    ****brain**stormi**ng ****ses**sion**s, ****wh**ere** ****diff**eren**t ****iter**ation**s
    ****c**an** ****b**e** ****coll**ective**ly ****disc**usse**d ****a**nd** ****ref**ine**d,
    ****resu**ltin**g ****i**n** ****a**** ****cons**ensu**s ****th**at** ****i**s**
    ****mo**re** ****inno**vativ**e ****a**nd** ****so**lid** ****th**an** ****indi**vidua**l
    ****id**eas**.'
  id: totrans-1310
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，它在小组头脑风暴会议中很有用，不同的迭代可以集体讨论和细化，从而产生比个人想法更具创新性和稳固性的共识。
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-1311
  prefs: []
