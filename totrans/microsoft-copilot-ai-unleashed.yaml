- en: Using Copilot AI in Microsoft 365 (Microsoft Office) Example of using Copilot
    AI in Word
  id: totrans-193
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 Microsoft 365 (Microsoft Office) 中使用 Copilot AI 的示例：Word 中使用 Copilot AI 的示例
- en: '![](image_rsrcGM.jpg)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcGM.jpg)'
- en: What can Copilot AI in Microsoft Word be used for?
  id: totrans-195
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Copilot AI 在 Microsoft Word 中可以用作什么？
- en: '● Document Creation: Copilot can assist users in creating various types of
    documents, including reports, letters, and articles. It suggests appropriate vocabulary,
    sentences, and writing styles tailored to the document''s content.'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: ● 文档创建：Copilot 可以协助用户创建各种类型的文档，包括报告、信件和文章。它根据文档内容建议合适的词汇、句子和写作风格。
- en: '● Suggesting Vocabulary and Sentences: Copilot recommends suitable vocabulary
    and sentences based on the document''s subject. For instance, if a user is writing
    an article about "Coding," Copilot may propose words and sentences related to
    coding, such as "function," "variable," "loop," "condition," etc.'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: ● 建议词汇和句子：Copilot 根据文档的主题推荐合适的词汇和句子。例如，如果用户正在撰写关于“编码”的文章，Copilot 可能会提出与编码相关的词汇和句子，如“函数”、“变量”、“循环”、“条件”等。
- en: '● Clear and Concise Writing Style: Copilot offers a clear and concise writing
    style, considering both the document''s content and the user''s writing style.
    For instance, when creating a report, Copilot might suggest clear and concise
    writing, including sub-topics, page numbers, etc.'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: ● 明确简洁的写作风格：Copilot 考虑文档内容和用户的写作风格，提供明确简洁的写作风格。例如，在创建报告时，Copilot 可能会建议清晰简洁的写作，包括子主题、页码等。
- en: '● Providing Information and Graphics: Copilot presents information and graphics
    relevant to the document''s content. For example, if a user is drafting a report
    on "Product Sales," Copilot may suggest relevant information and graphics like
    sales summary tables and sales graphs.'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提供信息和图形：Copilot 展示与文档内容相关的信息和图形。例如，如果用户正在草拟关于“产品销售”的报告，Copilot 可能会建议相关信息和图形，如销售汇总表和销售图表。
- en: '● Checking Document Correctness: Copilot aids in checking the correctness of
    documents, including tasks such as spell checking and grammar correction.'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: ● 检查文档正确性：Copilot 帮助检查文档的正确性，包括拼写检查和语法纠正等任务。
- en: '● Creating Different Document Formats: Copilot helps in creating various document
    formats, such as letters, emails, and articles.'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: ● 创建不同文档格式：Copilot帮助创建各种文档格式，如信件、电子邮件和文章。
- en: '● Translation Assistance: Copilot facilitates language translation between
    different languages.'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: ● 翻译帮助：Copilot促进不同语言之间的语言翻译。
- en: '● Coding Support: Copilot assists with coding by suggesting vocabulary, sentences,
    and writing styles appropriate to the programming language in use.'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: ● 编码支持：Copilot通过建议适合所用编程语言的词汇、句子和写作风格来辅助编码。
- en: '● Assisting in Other Content Creation: Copilot extends its support to various
    content types, including poetry, songs, plays, etc.'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助创建其他内容：Copilot扩展其支持范围，包括诗歌、歌曲、剧本等各种内容类型。
- en: 'Example of a Case Study Created with Copilot in Microsoft Word:'
  id: totrans-205
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Copilot在Microsoft Word中创建的案例研究示例：
- en: 1\. Report Writing
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 写报告
- en: Imagine a user is crafting a report, specifically in the "Product Sales" section.
    Users can employ Copilot to generate relevant data and graphics that align with
    the report's content. The user can input the Prompt command as follows >
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: '想象一个用户正在撰写一份报告，特别是“产品销售”部分。用户可以使用Copilot生成与报告内容相符的相关数据和图形。用户可以输入以下提示命令> '
- en: Product salesreport
