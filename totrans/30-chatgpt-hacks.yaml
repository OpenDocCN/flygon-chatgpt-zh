- en: <th colspan="2">Merged Header</th>
  prefs: []
  type: TYPE_NORMAL
- en: </tr>
  prefs: []
  type: TYPE_NORMAL
- en: <tr>
  prefs: []
  type: TYPE_NORMAL
- en: <td rowspan="2">Rowspan Cell</td>
  prefs: []
  type: TYPE_NORMAL
- en: <td>Cell 1</td>
  prefs: []
  type: TYPE_NORMAL
- en: </tr>
  prefs: []
  type: TYPE_NORMAL
- en: <tr>
