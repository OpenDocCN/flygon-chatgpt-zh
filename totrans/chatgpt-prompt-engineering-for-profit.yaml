  id: totrans-999
  prefs: []
  type: TYPE_NORMAL
  zh: '****反事实提示****与****角色反转提示****不同，因为，虽然角色反转提示****关注****采用一个替代或对立的观点，****反事实提示****则关注****明确地挑战一个论点或观点。****角色反转提示****旨在从一个不同的观点来看待一个问题，而****反事实提示****则试图反驳或找出一个普遍论点的缺陷。'
