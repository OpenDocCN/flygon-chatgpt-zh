- en: 📨 Writing A Cart Abandonment Email
  id: totrans-306
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📨 撰写购物车放弃邮件
- en: 'FILL-IN-THE-BLANK PROMPTS:'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 'FILL-IN-THE-BLANK PROMPTS:'
- en: '• Generate a cart abandonment email for potential customers that includes:'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: • 为潜在客户生成一封购物车放弃邮件，包括：
- en: '• Greeting: Hi **[recipient name]**,'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: • 问候语：嗨**[收件人姓名**]，
- en: '• Reminder: You left **[insert your product/service name]** in your cart.'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: • 提醒：您在购物车中留下了**[插入您的产品/服务名称**]。
- en: '• Benefits: Our **[insert your product/service name]** offers **[insert your
    first benefit]**, **[insert your second benefit]**, and **[insert your third benefit]**.'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: • 优点：我们的**[插入您的产品/服务名称**]提供**[插入您的第一个优点**]，**[插入您的第二个优点**]，和**[插入您的第三个优点**]。
- en: '• Call-to-action: Complete your purchase and enjoy **[insert your offer or
    incentive]**.'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: • 动作号召：完成您的购买并享受**[插入您的优惠或激励**]。
- en: '• Contact Information: Reach out to us by **[insert your preferred method of
    contact, such as phone, email, or chat]** at **[insert your team''s email address
    or phone number]** if you need help.'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: • 联系信息：如果您需要帮助，请通过**[插入您首选的联系方式，如电话、电子邮件或聊天**]在**[插入您的团队电子邮件地址或电话号码**]联系我们。
- en: '• Sign-off: Thanks, **[insert your name]**."'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: • 结尾语：谢谢，**[插入您的姓名**]。”
- en: • Write a 3-email sequence for potential customers who started purchasing **[product]**
    but did not complete their purchase. Use urgency by saying their **[percentage]**%
    discount will expire in 48 hours, and use a playful tone across the emails.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: • 为那些开始购买**[产品**]但未完成购买流程的潜在客户撰写一个3封邮件的系列。通过强调他们的**[百分比**]%折扣将在48小时内失效来制造紧迫感，并在邮件中保持轻松愉快的语气。
- en: 'QUESTION-BASED PROMPTS:'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 'QUESTION-BASED PROMPTS:'
- en: • "Write a cart abandonment email for potential customers that encourages them
    to complete their purchase."
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: • “为潜在客户撰写一封鼓励他们完成购买的购物车放弃邮件。”
- en: • "Can you draft an email that reminds potential customers about items left
    in their cart and offers incentives for completing the purchase?"
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能草拟一封提醒潜在客户关于他们购物车中留下的物品并提供完成购买激励的邮件吗？”
- en: • "Write a cart abandonment email that highlights the benefits of the products
    in the abandoned cart."
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: • “撰写一封强调购物车中产品利益的购物车放弃邮件。”
- en: • "Can you compose an email that addresses common reasons for cart abandonment
    and provides solutions?"
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能撰写一封邮件，针对购物车放弃的常见原因并提供解决方案吗？”
- en: • "Write a cart abandonment email that provides a special offer or discount
    to incentivize the purchase."
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: • “撰写一封提供特别优惠或折扣以激励购买的购物车放弃邮件。”
- en: • "Can you create a cart abandonment email that emphasizes the convenience and
    security of the checkout process?"
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能创建一封强调结账过程便利性和安全性的购物车放弃邮件吗？”
- en: • "Write an email that showcases similar or complementary products that the
    customer may be interested in."
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: • “撰写一封展示类似或互补产品，客户可能感兴趣的邮件。”
- en: • "Can you draft an email that provides a time-limited offer to encourage the
    customer to complete their purchase?"
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能草拟一封提供限时优惠以鼓励客户完成购买的邮件吗？”
- en: • "Write a cart abandonment email that includes customer testimonials or reviews
    to build trust and credibility."
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: • “撰写一封包含客户评价或评论的购物车放弃邮件，以建立信任和信誉。”
- en: • "Can you create an email that concludes by expressing gratitude for the customer's
    consideration and reiterating the benefits of completing the purchase?"
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: • “你能创建一封邮件，以表达对客户考虑的感激之情并重申完成购买的好处吗？”
