  zh: '[第一章](toc.xhtml#c01)'
- en: '[Getting Started with ChatGPT](toc.xhtml#c01)'
  id: totrans-271
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '[开始使用 ChatGPT](toc.xhtml#c01)'
- en: '[Introduction](toc.xhtml#s1a)'
  id: totrans-272
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '[引言](toc.xhtml#s1a)'
- en: This book features questions relating to Java software development which were
    posed (in bold) to the **OpenAI** organization, **AI** software, **ChatGPT 3.5**,
    using the Android phone app, **Ask AI**.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 本书包含与 Java 软件开发相关的问题，这些问题（粗体）是向 **OpenAI** 组织、**AI** 软件、**ChatGPT 3.5**、使用安卓手机应用
    **Ask AI** 提出的。
- en: The questions were based on my previous developments (many algorithms originally
    taking days to write, and most were written in the **Fortran IV** language).
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题基于我之前的发展（许多算法最初需要花费数天时间编写，而且大多数是用 **Fortran IV** 语言编写的）。
- en: The responses were astonishing and appeared in seconds!
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 响应令人惊讶，并且几乎在瞬间出现！
- en: In this chapter, we cover the installation of **ChatGPT** as a web application
    and also use the **Ask AI** **ChatGPT** front-end interface application, installed
    on an Android mobile ‘phone.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将介绍如何将ChatGPT作为网络应用程序安装，并使用安装在Android手机上的**Ask AI** **ChatGPT**前端界面应用程序。
- en: We also cover the current legal copyright ownership of the responses and the
    basic use of **ChatGPT**.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还涵盖了当前响应的版权所有法律和ChatGPT的基本使用方法。
- en: '[Structure](toc.xhtml#s2a)'
  id: totrans-278
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '[结构](toc.xhtml#s2a)'
- en: 'In this chapter, we will discuss the following topics:'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将讨论以下主题：
- en: AI Suggested book titles
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI建议的书籍标题
- en: Current copyright laws for AI-Generated Java code
  id: totrans-281
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI生成Java代码的当前版权法律
- en: Create an account for the Free ChatGPT 3.5 version
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为免费ChatGPT 3.5版本创建账户
- en: Create an account for the Subscribed ChatGPT-4 Version
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为订阅版ChatGPT-4版本创建账户
- en: '[AI Suggested book titles](toc.xhtml#s3a)'
  id: totrans-284
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '[AI建议的书籍标题](toc.xhtml#s3a)'
- en: To illustrate the prompts and responses of the mobile phone Application, **Ask
    AI**, which uses **ChatGPT 3.5** (which has an internet knowledgebase cut-off
    of September 2021), the following question was asked. (All questions are in bold
    and the **ChatGPT AI** responses are in italics)
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明使用**ChatGPT 3.5**（截止到2021年9月有一个互联网知识库）的**Ask AI**移动应用程序的提示和响应，以下问题被提出。（所有问题都用粗体表示，**ChatGPT
    AI**的响应用斜体表示）
- en: '**I want to write a book about using ChatGPT to assist Java programmers. Can
    you suggest a book title which would be of interest to them?**'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: '**我想写一本关于使用ChatGPT帮助Java程序员的书籍。你能为我建议一个对他们有吸引力的书名吗？**'
- en: '*Certainly! Here are a few book title suggestions for a book about using ChatGPT
    to assist Java programmers:*'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: '*当然可以！以下是一些关于使用ChatGPT帮助Java程序员的书籍标题建议：*'
- en: '*"Java Mastery with ChatGPT: Unleashing AI to Enhance Your Programming Skills"*'
  id: totrans-288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*"用ChatGPT掌握Java：释放AI增强编程技能"*'
- en: '*"ChatGPT for Java Programmers: Revolutionizing Your Coding Experience"*'
  id: totrans-289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*"Java程序员用ChatGPT：革新您的编码体验"*'
- en: '*"The AI-Driven Java Developer: Unleashing the Power of ChatGPT"*'
  id: totrans-290
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*"AI驱动Java开发者：释放ChatGPT的力量"*'
- en: '*"Java Programming Made Smarter: Harnessing ChatGPT for Efficiency and Productivity"*'
  id: totrans-291
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*"Java编程变得更聪明：利用ChatGPT提高效率和生产力"*'
- en: '*"ChatGPT Companion: Empowering Java Programmers with AI-Powered Assistance"*'
  id: totrans-292
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*"ChatGPT伴侣：用AI辅助工具赋能Java程序员"*'
- en: '*"Conversational Coding: Mastering Java with ChatGPT''s Intelligent Guidance"*'
  id: totrans-293
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*"对话式编码：借助ChatGPT的智能指导掌握Java"*'
- en: '**"Enhancing Java Development with ChatGPT: Your AI-Powered Programming Assistant"**'
  id: totrans-294
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**"利用ChatGPT增强Java开发：您的AI编程助手"**'
- en: '*"The Intelligent Java Developer: Leveraging ChatGPT for Enhanced Efficiency"*'
  id: totrans-295
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*"智能Java开发者：利用ChatGPT提高效率"*'
- en: '*"AI-Assisted Java Programming: Unlocking New Frontiers with ChatGPT"*'
  id: totrans-296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*"AI辅助Java编程：与ChatGPT一起开拓新领域"*'
- en: '*"Java Programming in the Age of AI: Harnessing ChatGPT for Success"*'
  id: totrans-297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*"在AI时代进行Java编程：利用ChatGPT取得成功"*'
- en: '*Feel free to customize these suggestions or let me know if you need more options!*'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: '*请随意定制这些建议，或者告诉我你是否需要更多选项！*'
- en: The title in bold was selected (the seventh title suggested by the **Ask AI**
    app). This title was selected because it emphasizes the role of the human programmer.
    Care should be taken to validate the code produced by the AI software. (It has
    been known to produce results with mistakes!)
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 粗体标题（由**Ask AI**应用提出的第七个标题）被选中。这个标题被选中是因为它强调了程序员的作用。应仔细验证由AI软件生成的代码。（已知其产生过有误的结果！）
- en: '[Copyright laws for AI-Generated Java code](toc.xhtml#s4a)'
  id: totrans-300
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '[AI生成Java代码的版权法律](toc.xhtml#s4a)'
- en: There is some controversy in the media over the legal status of the responses
    provided by **ChatGPT**. There are a number of specific areas where the legality
    of the **AI** responses is currently being challenged, for example, authors who
    think their copyright may have been broken from the reproduction of response data
    obtained during the web “scraping” which was used to train **ChatGPT** in 2021.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 媒体上对ChatGPT提供的响应的法律地位存在一些争议。目前有几个具体领域正在挑战AI响应的合法性，例如，一些作者认为他们的版权可能因2021年用于训练ChatGPT的网页“抓取”过程中获取的响应数据的复制而被侵犯。
- en: 'This position is complicated by the current legal status of **AI** software
    output in **UK** copyright law:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 当前英国版权法中AI软件输出的法律地位使得这一职位变得复杂：
- en: “*UK law would currently prohibit an AI from owning copyright (or even recognising
    that an AI created it), as it is not a human and therefore cannot be treated as
    an author or owner under the Copyright, Designs and Patents Act. It is also unlikely
    that this position is going to change anytime soon, given the UK government’s
    response to the AI consultation*”
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: “*根据英国法律，目前禁止人工智能拥有版权（甚至承认是人工智能创建的），因为它不是人类，因此不能根据版权、设计和专利法案被视为作者或所有者。鉴于英国政府对人工智能咨询的回应，这种立场在不久的将来不太可能改变。*”
- en: '**See: [https://www.port.ac.uk/news-events-and-blogs/blogs/security-and-risk/chatgpt-what-the-law-says-about-who-owns-the-copyright-of-ai-generated-content](https://www.port.ac.uk/news-events-and-blogs/blogs/security-and-risk/chatgpt-what-the-law-says-about-who-owns-the-copyright-of-ai-generated-content)**'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: '**参见：[https://www.port.ac.uk/news-events-and-blogs/blogs/security-and-risk/chatgpt-what-the-law-says-about-who-owns-the-copyright-of-ai-generated-content](https://www.port.ac.uk/news-events-and-blogs/blogs/security-and-risk/chatgpt-what-the-law-says-about-who-owns-the-copyright-of-ai-generated-content)****'
- en: '**Note**'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: '*A number of other websites were found which discussed the legal requirements
    with reference to copyright, as follows:*'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: '*在许多其他网站上发现了讨论与版权相关的法律要求的文章，如下：*'
- en: '**WIPO**, the World Intellectual Property Organisation, currently states (amongst
    many other statements and even more relevant questions!) that:'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: '**世界知识产权组织（WIPO**），目前（在许多其他声明和更多相关问题的背景下！）表示：'
- en: “*AI applications are increasingly capable of generating literary and artistic
    works. This capacity raises major policy questions for the copyright system, which
    has always been intimately associated with the **human creative spirit** and with
    respect and reward for, and the encouragement of, the expression of **human creativity**.
    The policy positions adopted in relation to the attribution of copyright to AI-generated
    works will go to the heart of the social purpose for which the copyright system
    exists. **If AI-generated works were excluded from eligibility for copyright protection,
    the copyright system would be seen as an instrument for encouraging and favoring
    the dignity of human creativity over machine creativity**. If copyright protection
    were accorded to AI-generated works, the copyright system would tend to be seen
    as an instrument favoring the availability for the consumer of the largest number
    of creative works and of placing an equal value on human and machine creativity*.”
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: “*人工智能应用越来越能够生成文学和艺术作品。这种能力为版权制度提出了重大的政策问题，版权制度始终与**人类的创造性精神**以及尊重和奖励人类创造性的表达密切相关。关于将版权归因于人工智能生成作品的立场将触及版权制度存在的社会目的的核心。**如果人工智能生成作品被排除在版权保护资格之外，版权制度将被视为鼓励和优先考虑人类创造力尊严而非机器创造力的工具。如果赋予人工智能生成作品版权保护，版权制度将倾向于被视为优先考虑消费者能够获得最大数量的创意作品，并将人类和机器创造力视为具有同等价值。*”
- en: 'The full paper is freely available for download from **WIPO** covering many
    aspects of the **AI** intellectual property rights, and asking many more additional,
    and very interesting questions. This can be downloaded as a pdf file (**wipo_ip_ai_2_ge_20_1_rev.pdf**)
    from:'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 完整论文可以从**世界知识产权组织（WIPO**）免费下载，涵盖了人工智能知识产权的许多方面，并提出了更多附加的、非常有趣的问题。该文件可以作为PDF文件（**wipo_ip_ai_2_ge_20_1_rev.pdf**）下载，下载地址如下：
- en: '**[https://www.wipo.int/edocs/mdocs/mdocs/en/wipo_ip_ai_2_ge_20/wipo_ip_ai_2_ge_20_1_rev.pdf](https://www.wipo.int/edocs/mdocs/mdocs/en/wipo_ip_ai_2_ge_20/wipo_ip_ai_2_ge_20_1_rev.pdf)**'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: '**[https://www.wipo.int/edocs/mdocs/mdocs/en/wipo_ip_ai_2_ge_20/wipo_ip_ai_2_ge_20_1_rev.pdf](https://www.wipo.int/edocs/mdocs/mdocs/en/wipo_ip_ai_2_ge_20/wipo_ip_ai_2_ge_20_1_rev.pdf)**'
- en: 'The following reference **[https://sprintlaw.com.au/articles/chatgpt-copyright-issues/](https://sprintlaw.com.au/articles/chatgpt-copyright-issues/)**
    has the following statement concerning the law on Copyright in **Australia** as
    far as **AI**-generated content is concerned:'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 以下参考资料 **[https://sprintlaw.com.au/articles/chatgpt-copyright-issues/](https://sprintlaw.com.au/articles/chatgpt-copyright-issues/)**
    中有关于澳大利亚版权法在**人工智能生成内容**方面的以下声明：
- en: '*"Australian case law has ruled that an AI system cannot own intellectual property
    (IP) as it is not a natural person. This was discussed extensively in the case
    of Thaler v Commissioner Of Patents [2021] – we’ve written more about the case
    here.*'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: '*"澳大利亚案例法已裁定，人工智能系统不能拥有知识产权（因为它不是自然人）。这一点在Thaler诉专利专员[2021]案中得到了广泛讨论——我们在这里对此案有更多介绍。*”'
- en: '*So, when it comes to copyright, the general rule is that AI-generated content
    is not protected by copyright laws."*'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: '*因此，当涉及到版权时，一般规则是AI生成的内容不受版权法保护。*'
- en: 'The Journal of Intellectual Property Law Practice has an article at the following
    link:'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 智力财产权法律实践杂志在以下链接中有一篇文章：
- en: 'See: (**Volume 17, Issue 3, March 2022, Pages 321–326, https://doi.org/10.1093/jiplp/jpac013**)'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 见：(**第17卷，第3期，2022年3月，第321-326页，https://doi.org/10.1093/jiplp/jpac013**)
- en: Also, at **https://academic.oup.com/jiplp/article/17/3/321/6550465**
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，请参阅以下链接：**https://academic.oup.com/jiplp/article/17/3/321/6550465**
- en: 'Has the following paragraph:'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 以下段落：
- en: “The European Patent Office (EPO), for example, has recently confirmed on appeal
    the rejection of the DABUS applications EP 18 275 163 and EP 18 275 174\. While
    the decision has yet to be made publicly available, **the EPO made it clear that
    ‘only a human inventor could be an inventor’ and ‘a machine could not transfer
    any rights to the applicant.**’^(23)Unless harmonization is sought—and hopefully
    achieved—via international law, interventions at the national level will only
    risk inconsistency. Rather, the current UK position, following the Court of Appeal’s
    judgement in *Thaler v Comptroller General of Patents*,^(24)is one of relative
    legal certainty—**we do know that AI *cannot* be named as inventor and, empirically,
    nothing suggests there is a pressing need for this to be changed**.”
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，欧洲专利局（EPO）最近在上诉中确认了DABUS申请EP 18 275 163和EP 18 275 174的拒绝。虽然该决定尚未公开，**但欧洲专利局明确表示“只有人类发明者才能成为发明者”以及“机器不能将任何权利转让给申请人。”**^(23)除非通过国际法寻求——并希望实现——协调，否则在国家层面的干预只会带来不一致的风险。相反，根据上诉法院在*Thaler
    v Comptroller General of Patents*^(24)案件中的判决，当前的英国立场是一种相对的法律确定性——**我们知道AI *不能*
    被列为发明者，并且从经验上看，没有任何迹象表明有迫切需要改变这一点**。”
- en: To get the **AI** view on the copyright issue, the following question of content
    ownership was asked to **Ask AI**, which uses **ChatGPT 3.5**, for its opinion
    on the use of **AI**-generated content for commercial purposes.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解AI对版权问题的看法，向使用**ChatGPT 3.5**的**Ask AI**提出了关于将**AI**生成内容用于商业目的的意见。
- en: '**Can I use output from ChatGPT for commercial uses?**'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: '**我可以使用ChatGPT的输出进行商业用途吗？**'
- en: 'The **Ask AI** mobile ‘phone app, using **ChatGPT 3.5,** gave the following
    response to this question:'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 使用**ChatGPT 3.5**的**Ask AI**移动应用程序给出了以下回应：
- en: '*“The use of output from OpenAI''s GPT models, such as ChatGPT, for commercial
    purposes may be subject to certain restrictions and require appropriate licensing
    or permission from OpenAI.*'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: '*“将OpenAI的GPT模型（如ChatGPT）的输出用于商业目的可能受到某些限制，并需要从OpenAI获得适当的许可或许可。*'
- en: '*OpenAI''s GPT models are covered by several licenses, including the Creative
    Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)
    license.*'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: '*OpenAI的GPT模型受多个许可的约束，包括Creative Commons Attribution-NonCommercial-ShareAlike
    4.0 International (CC BY-NC-SA 4.0)许可。*'
- en: '*This license allows for non-commercial use and distribution of the output
    generated by the models, as long as appropriate attribution is given and the resulting
    work is distributed under the same or a similar license.*'
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: '*本许可允许在适当归属的情况下，非商业用途和分发由模型生成的输出，只要结果作品是在相同或类似许可下分发。*'
- en: '*If you intend to use the output from ChatGPT for commercial purposes, you
    should consult with OpenAI or a legal professional to ensure that you have the
    appropriate licenses and permissions to do so. Additionally, you should be aware
    of any potential ethical or legal concerns surrounding the use of AI-generated
    content in commercial applications.”*'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果您打算将ChatGPT的输出用于商业目的，您应咨询OpenAI或法律专业人士，以确保您拥有适当的许可和权限。此外，您应了解与AI生成内容在商业应用中使用相关的任何潜在伦理或法律问题。*'
- en: The ***CC BY-NC-SA 4.0 Creative Commons,*** **Attribution-ShareAlike 4.0** license
    lets others modify and build upon the licensed material, even for commercial purposes,
    as long as the author is credited and the material is published under identical
    terms. This license is effectively “copyright” free and an open-source software
    license.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: '**CC BY-NC-SA 4.0 Creative Commons**，**Attribution-ShareAlike 4.0**许可允许他人修改和基于许可材料进行构建，甚至用于商业目的，只要作者得到认可，并且材料在相同条款下发布。这个许可实际上是“无版权”的，并且是一个开源软件许可。'
- en: '[Creating an account for the Free ChatGPT V. 3.5](toc.xhtml#s5a)'
  id: totrans-327
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '[为Free ChatGPT V. 3.5创建账户](toc.xhtml#s5a)'
- en: 'Having established that the Java code output from **ChatGPT** is free to use,
    as far as **UK** law and the **OpenAI** organization is concerned, we need to
    sign up for the free account access to **ChatGPT V3.5**, so the following steps
    were used:'
