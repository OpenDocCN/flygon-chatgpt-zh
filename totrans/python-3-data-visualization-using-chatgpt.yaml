    4.30](#list4-30) 中的下一代码片段显示了 Pandas DataFrame df 的内容。运行 [列表 4.30](#list4-30) 中的代码，你将看到以下输出：'
- en: '[PRE365]'
  id: totrans-1747
  prefs: []
  type: TYPE_PRE
  zh: '[PRE365]'
- en: Although you can perform SQL operations from the command line, just like you
    can with MySQL, it’s probably easier to work with SQLite in an IDE. In fact, a
    very robust IDE is SQLiteStudio, which is discussed in the next section.
  id: totrans-1748
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然你可以像使用 MySQL 一样从命令行执行 SQL 操作，但使用 IDE 与 SQLite 一起工作可能更容易。事实上，一个非常强大的 IDE 是
    SQLiteStudio，它将在下一节中讨论。
