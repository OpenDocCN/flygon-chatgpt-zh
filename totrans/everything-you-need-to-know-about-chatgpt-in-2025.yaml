  prefs: []
  type: TYPE_NORMAL
  zh: 在另一方面，在美国，尽管没有像GDPR那样全面的法律，但已经提出了几个与数据隐私和AI相关的法案。特别是，加利福尼亚消费者隐私法案（CCPA）已成为其他州效仿的范例。该法案赋予消费者了解其个人数据被收集的权利，访问该信息，并要求删除该信息。至于AI，一些州开始辩论制定具体法规，以确保在诸如合同、刑事司法和金融服务等领域的AI模型使用中的透明度和公平性。
