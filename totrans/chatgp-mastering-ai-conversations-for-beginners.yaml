  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: '**虚拟助手**已经在我们周围无处不在，无论我们是否使用它们。这些数字化的个人助理被编程来以各种方式简化我们的生活，并且旨在为技术用户提供一种简单而高效的方式“聊天”和与我们的设备和小工具互动。虚拟助手有大量的用途，从处理任务到我们的日历，检查航班预订，为我们撰写文本消息，甚至运行和控制智能家居设备，扮演着数字管家的作用。因此，如果这些数字化的个人助理已经存在了一段时间（对于Siri和Alexa来说，超过了一个十年），并且已经填补了广泛的行政、协助和自动化职位，那么ChatGPT的大语言模型有何不同？'
