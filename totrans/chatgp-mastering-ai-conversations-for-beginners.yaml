  zh: 在上一章中，我们回顾了创建我们称之为GP Ts的生成式预训练转换器的公司OpenAI的历史，以及他们深度学习项目的最初几次迭代，即GPT 1、2和3。让我们从ChatGPT的发布和GPT软件的第四次进化开始，继续我们的旅程。
