- en: LangChain Programming For Beginners
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A Step-By-Step Guide to AI Application Development With LangChain, Python, OpenAI/ChatGPT,
    Google/Gemini and Other LLMs
  prefs: []
  type: TYPE_NORMAL
- en: By Nathan Sebhastian
  prefs: []
  type: TYPE_NORMAL
- en: Preface
  prefs: []
  type: TYPE_NORMAL
- en: The goal of this book is to provide a gentle step-by-step instructions that
    help you learn LangChain gradually from basic to advanced.
  prefs: []
  type: TYPE_NORMAL
- en: You will see why LangChain is a great tool for building AI applications and
    how it simplifies the integration of language models into your projects.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll see how essential LangChain features such as prompt templates, chains,
    agents, document loaders, output parsers, and model classes are used to create
    a generative AI application that’s smart and flexible.
  prefs: []
  type: TYPE_NORMAL
- en: After finishing this book, you will know how to use LangChain and Python to
    create AI-powered applications.
  prefs: []
  type: TYPE_NORMAL
- en: Working Through This Book
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This book is broken down into 15 concise chapters, each focusing on a specific
    topic in LangChain programming.
  prefs: []
  type: TYPE_NORMAL
- en: I encourage you to write the code you see in this book and run them so that
    you have a sense of how LangChain development looks like. You learn best when
    you code along with examples in this book.
  prefs: []
  type: TYPE_NORMAL
- en: 'A tip to make the most of this book: Take at least a 10-minute break after
    finishing a chapter, so that you can regain your energy and focus.'
  prefs: []
  type: TYPE_NORMAL
- en: Also, don’t despair if some concept is hard to understand. Learning anything
    new is hard for the first time, especially something technical like programming.
    The most important thing is to keep going.
  prefs: []
  type: TYPE_NORMAL
- en: Requirements
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To experience the full benefit of this book, basic knowledge of Python is required.
  prefs: []
  type: TYPE_NORMAL
- en: If you need some help in learning Python, you can get my book at [https://g.codewithnathan.com/beginning-python](https://g.codewithnathan.com/beginning-python)
  prefs: []
  type: TYPE_NORMAL
