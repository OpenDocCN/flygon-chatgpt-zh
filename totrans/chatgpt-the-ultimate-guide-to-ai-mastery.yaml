  prefs: []
  type: TYPE_NORMAL
  zh: • 图像生成工具
- en: • AI-assisted code writing
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: • 人工智能辅助代码编写
- en: • AI for music composition
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: • 音乐作曲人工智能
