  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个曾经与人交谈过（包括我们所有人，我希望！）的人，人类互动可以非常复杂，并且通常涉及比我们使用的词语和句子多得多的内容。对话还涉及肢体语言、眼神接触、说话中的停顿、语调、我们声音中的情感，以及当然，语境。当我们把对话从口语形式转换为书面形式时，我们人类已经失去了很多这些因素，而我们的AI甚至完全没有这些“非言语”的线索来依赖，当我们解读我们发送给它的信息时。这就是为什么对话设计是LLMs和生成式AI研究的一个重要领域，也是为什么许多人在尝试导航公司的聊天机器人助手时感到如此沮丧，通常以愤怒地关闭网站并以“如果我能和一个人说话就好了！”的誓言结束。
