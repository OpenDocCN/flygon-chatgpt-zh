  zh: 在1972年，斯坦福大学的一名心理学家肯尼思·科尔比创造了一个新的挑战者来通过图灵测试：PA**RRY**。科尔比将他的聊天机器人描述为“带有态度的ELIZA”，并似乎是在直接竞争Weizenbaum的AI。虽然ELIZA旨在模仿人类心理学家，PA**RRY**则被设计来模仿偏执型精神分裂症患者的行为。在一组33名人类心理学家“训练”PA**RRY**之后，他们使用图灵测试的一种变体来检查科尔比的聊天机器人会如何表现。结果出人意料，PA**RRY**成功获得了及格分数，成功欺骗了52%的人认为它是一个真实的人类。
