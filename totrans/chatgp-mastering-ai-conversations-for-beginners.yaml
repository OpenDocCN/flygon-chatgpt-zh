  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 对于许多像《终结者》、《黑客帝国》和《异形》这样的科幻电影爱好者来说，人工智能的黎明标志着人类种族的末日。但事情不必如此。我们只需要改变我们对AI的看法，从将其视为问题的一部分转变为将其视为解决方案的一部分。例如，麻省理工学院（MIT）的技术研究员凯特·达尔林在她的书中，即《新物种：如何思考机器人》，对AI的看法非常有趣。她认为，我们不应将它们视为像霍莫-萨皮恩2.0这样的机器，而应将其视为一种新的动物物种。就像人类与马、狗和其他家养动物并肩工作了几百年而不用担心它们会取代我们一样，我们也不必感到有必要与AI竞争。在你还没来得及说“但是马并没有取代任何人类工作”之前，是的，它确实做到了。你认为是谁在开始使用马为我们耕地和拉犁之前就推动了手推车和犁？
