- en: 'Advantages of CCXT :'
  id: totrans-1483
  prefs: []
  type: TYPE_NORMAL
  zh: CCXT 的优点：
- en: 'Simplicity and flexibility: a unified interface for interacting with numerous
    exchanges.'
  id: totrans-1484
  prefs: []
  type: TYPE_NORMAL
  zh: 简单性和灵活性：与众多交易所交互的统一界面。
- en: 'Extensive support: CCXT supports over 100 cryptocurrency exchanges, offering
    great flexibility for developers.'
  id: totrans-1485
  prefs: []
  type: TYPE_NORMAL
  zh: 广泛支持：CCXT 支持超过 100 个加密货币交易所，为开发者提供极大的灵活性。
- en: 'Full documentation: Detailed documentation and code examples to facilitate
    integration.'
  id: totrans-1486
  prefs: []
  type: TYPE_NORMAL
  zh: 全文档：详细的文档和代码示例，便于集成。
- en: The choice of trading platform, whether traditional stock exchange or cryptocurrency,
    depends on your specific algorithmic trading needs. Stock brokers like Interactive
    Brokers, TD Ameritrade, and Alpaca offer robust APIs for securities trading. For
    cryptocurrency trading, exchanges like Binance, Coinbase Pro, and Kraken provide
    powerful and reliable APIs. Using a library like CCXT, you can easily integrate
    and automate your trading strategies across multiple cryptocurrency exchanges,
    simplifying the development and management of your trading algorithms.
  id: totrans-1487
  prefs: []
  type: TYPE_NORMAL
- en: Data sources and their practical use
  id: totrans-1488
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Introduction
  id: totrans-1489
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In algorithmic trading, access to accurate, up-to-date financial data is essential
    for developing and optimizing trading strategies. Data sources can be free or
    paid for, with each type having its advantages and disadvantages. Paid services
    often offer more detailed data and longer historical periods, which can be crucial
    for complex trading strategies. This chapter explores the different data sources
    available for stock market and cryptocurrency trading, and offers examples of
    free and paid APIs.
  id: totrans-1490
  prefs: []
  type: TYPE_NORMAL
- en: Free Data Sources
  id: totrans-1491
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Free data sources are ideal for novice traders or those wishing to experiment
    without incurring costs. However, they may have limitations in terms of data granularity
    and the historical period available.
  id: totrans-1492
  prefs: []
  type: TYPE_NORMAL
- en: 'Yahoo Finance (Yahoo Finance Python API) :'
  id: totrans-1493
  prefs: []
  type: TYPE_NORMAL
- en: 'Overview: Yahoo Finance offers free financial data for stocks, indices, currencies,
    and cryptocurrencies. Data includes historical prices, volumes, and other financial
    indicators.'
  id: totrans-1494
  prefs: []
  type: TYPE_NORMAL
- en: 'API: yfinance is a Python library that provides easy access to Yahoo Finance
    data.'
  id: totrans-1495
  prefs: []
  type: TYPE_NORMAL
- en: 'Example of use:'
  id: totrans-1496
  prefs: []
  type: TYPE_NORMAL
- en: import yfinance as yf
  id: totrans-1497
  prefs: []
  type: TYPE_NORMAL
- en: Recovering historical data for Apple shares
  id: totrans-1498
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: data = yf.download('AAPL', start='2022-01-01', end='2023-01-01')
  id: totrans-1499
  prefs: []
  type: TYPE_NORMAL
- en: print(data)
  id: totrans-1500
  prefs: []
  type: TYPE_NORMAL
- en: 'Binance (API Binance):'
  id: totrans-1501
  prefs: []
  type: TYPE_NORMAL
- en: 'Overview: Binance is one of the world''s largest cryptocurrency exchanges,
    offering a free API to access real-time and historical market data.'
  id: totrans-1502
  prefs: []
  type: TYPE_NORMAL
- en: 'API: Binance''s API allows you to retrieve prices, volumes, orders, and other
    market data for a wide range of cryptocurrencies.'
  id: totrans-1503
  prefs: []
  type: TYPE_NORMAL
- en: 'Example of use:'
  id: totrans-1504
  prefs: []
  type: TYPE_NORMAL
- en: import ccxt
  id: totrans-1505
  prefs: []
  type: TYPE_NORMAL
- en: binance = ccxt.binance()
  id: totrans-1506
  prefs: []
  type: TYPE_NORMAL
- en: ticker = binance.fetch_ticker('BTC/USDT')
  id: totrans-1507
  prefs: []
  type: TYPE_NORMAL
- en: print(ticker)
  id: totrans-1508
  prefs: []
  type: TYPE_NORMAL
- en: 'Alpha Vantage:'
  id: totrans-1509
  prefs: []
  type: TYPE_NORMAL
- en: 'Overview: Alpha Vantage offers free financial data for stocks, cryptocurrencies,
    and currencies. Data includes daily prices, technical indicators, and volume data.'
  id: totrans-1510
  prefs: []
  type: TYPE_NORMAL
- en: 'API: Alpha Vantage offers a well-documented API with limited free calls.'
  id: totrans-1511
  prefs: []
  type: TYPE_NORMAL
- en: 'Example of use:'
  id: totrans-1512
  prefs: []
  type: TYPE_NORMAL
- en: import requests
  id: totrans-1513
  prefs: []
  type: TYPE_NORMAL
- en: api_key = 'YOUR_API_KEY'
  id: totrans-1514
  prefs: []
  type: TYPE_NORMAL
- en: symbol = 'AAPL
  id: totrans-1515
  prefs: []
  type: TYPE_NORMAL
- en: url = f'https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol={symbol}&apikey={api_key}'
  id: totrans-1516
  prefs: []
  type: TYPE_NORMAL
- en: response = requests.get(url)
  id: totrans-1517
  prefs: []
  type: TYPE_NORMAL
- en: data = response.json()
  id: totrans-1518
  prefs: []
  type: TYPE_NORMAL
