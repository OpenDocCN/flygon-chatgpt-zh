  id: totrans-388
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在Microsoft Outlook中使用Copilot AI
- en: Example of using Copilot AI in writing emails
  id: totrans-389
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Copilot AI在撰写电子邮件的示例
- en: '![](image_rsrcGT.jpg)'
  id: totrans-390
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcGT.jpg)'
- en: What Copilot AI in Microsoft Outlook Can Do for Composing Emails
  id: totrans-391
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Copilot AI在Microsoft Outlook中能为撰写电子邮件做什么
- en: '● Help Create Emails: Copilot assists in crafting various types of emails,
    including reports, plans, and notification emails. It suggests appropriate vocabulary,
    sentences, and formats, ensuring clarity and engagement while incorporating relevant
    information and attachments.'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助创建电子邮件：Copilot帮助创建各种类型的电子邮件，包括报告、计划和通知电子邮件。它建议合适的词汇、句子和格式，确保清晰和参与度，同时结合相关信息和附件。
- en: '● Suggest Appropriate Words and Sentences: When writing emails, Copilot suggests
    words and sentences tailored to the content. For instance, if the email pertains
    to "Coding," Copilot may offer terms like "function," "variable," "loop," and
    "condition."'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: ● 建议合适的词语和句子：在撰写电子邮件时，Copilot会根据内容建议定制的词语和句子。例如，如果电子邮件涉及“编码”，Copilot可能会提供诸如“函数”、“变量”、“循环”和“条件”等术语。
- en: '● Offer a Clear and Engaging Email Format: Copilot considers both the email
    content and the user''s writing style to provide a clear and engaging format.
    This could involve subheadings, illustrations, and other elements enhancing the
    email''s visual appeal.'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提供清晰且引人入胜的电子邮件格式：Copilot考虑电子邮件内容和用户的写作风格，以提供清晰且引人入胜的格式。这可能包括子标题、插图和其他增强电子邮件视觉吸引力的元素。
- en: '● Suggest Appropriate Information and Attachments: When creating emails about
    specific topics like "Product Sales Trends," Copilot recommends relevant information
    and attachments, such as annual sales graphs.'
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: ● 建议合适的信息和附件：在创建关于特定主题（如“产品销售趋势”）的电子邮件时，Copilot推荐相关信息和附件，例如年度销售图表。
- en: '● Help Check the Correctness of Emails: Copilot aids in ensuring the correctness
    of emails by performing checks for spelling, grammar, and other potential errors.'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助检查电子邮件的正确性：Copilot通过执行拼写、语法和其他潜在错误的检查，帮助确保电子邮件的正确性。
- en: '● Help Create Email Variations: Copilot assists in crafting different versions
    of emails, allowing users to experiment with variations like background changes
    and color adjustments.'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助创建电子邮件变体：Copilot 协助制作不同版本的电子邮件，使用户能够尝试背景更改和颜色调整等变体。
- en: '● Translate Between Different Languages: Copilot facilitates language translation,
    assisting users in composing emails in various languages.'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: ● 在不同语言之间翻译：Copilot 促进语言翻译，帮助用户用各种语言撰写电子邮件。
- en: '● Help with Coding: For emails involving coding-related content, Copilot suggests
    words and phrases appropriate to the programming language being used.'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助处理编码相关内容：对于涉及编码内容的电子邮件，Copilot 会建议适合所使用编程语言的单词和短语。
- en: '● Help Write Other Content: Beyond emails, Copilot extends its assistance to
    writing various content types, including poetry, songs, plays, etc.'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助撰写其他内容：除了电子邮件，Copilot 还扩展其辅助功能，包括诗歌、歌曲、剧本等各种内容类型。
- en: For example, consider a case study illustrating how Copilot assists you in Microsoft
    Outlook when writing emails.
  id: totrans-401
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 例如，考虑一个案例研究，说明 Copilot 如何在 Microsoft Outlook 中帮助您撰写电子邮件。
- en: 1\. Creating an Email
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 创建电子邮件
- en: Let's say a user is composing an email about "Coding." Users can utilize Copilot
    to suggest a format for email writing. The user
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 假设用户正在撰写关于“编码”的电子邮件。用户可以利用 Copilot 建议电子邮件撰写的格式。用户
- en: 'can type the Prompt command as follows:'
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 可以按以下方式输入提示命令：
- en: Email aboutcoding
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 关于编码的电子邮件
- en: section
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: section
- en: content
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: content
- en: Writeaclearandengagingemailformat.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 编写清晰、引人入胜的电子邮件格式。
- en: Copilot offers a clear and engaging email format, including the use of subheadings,
    illustrations, etc.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot 提供清晰、引人入胜的电子邮件格式，包括使用副标题、插图等。
- en: 2\. Email Verification
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 电子邮件验证
- en: 'Suppose a user is composing an email about "Product Sales Trends." Users can
    utilize Copilot to check their spelling and grammar by typing the following Prompt
    command:'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 假设用户正在撰写关于“产品销售趋势”的电子邮件。用户可以利用 Copilot 通过输入以下提示命令来检查其拼写和语法：
- en: Validate emailsregardingproductsalestrends Spellcheck
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 验证关于产品销售趋势的电子邮件 Spellcheck
- en: grammarcheck
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: grammarcheck
- en: Copilot checks the spelling and grammar of emails.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot 会检查电子邮件的拼写和语法。
- en: 'In addition to the case study examples mentioned above, users can also use
    other prompt commands to get help from Copilot, such as:'
  id: totrans-415
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 除了上述案例研究示例，用户还可以使用其他提示命令来获取 Copilot 的帮助，例如：
- en: ● General Prompt commands
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: ● 通用提示命令
- en: '"Helpmewriteanemail"'
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: '"Helpmewriteanemail"'
- en: '"Helpmeverifytheauthenticityofmyemail"'
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: '"Helpmeverifytheauthenticityofmyemail"'
- en: ● Specific Prompt Commands
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: ● 特定提示命令
- en: '"Helpmewriteanemailaboutcoding."'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: '"Helpmewriteanemailaboutcoding."'
- en: '"Helpmecheckthespellingofanemailaboutproductsales trends."'
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: '"Helpmecheckthespellingofanemailaboutproductsales trends."'
- en: Copilot is a powerful and extremely useful tool for Microsoft Outlook users.
    Copilot can help users write emails more efficiently by offering various suggestions
    while the user is composing an email.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot 是微软 Outlook 用户的一个强大且极其有用的工具。Copilot 可以通过在用户撰写电子邮件时提供各种建议来帮助用户更有效地撰写电子邮件。
- en: Example of using Copilot AI to read emails
  id: totrans-423
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 Copilot AI 阅读电子邮件的示例
- en: '![](image_rsrcGU.jpg)'
  id: totrans-424
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcGU.jpg)'
- en: What can Copilot AI in Microsoft Outlook do to read email?
  id: totrans-425
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 微软 Outlook 中的 Copilot AI 可以做什么来阅读电子邮件？
- en: '● Help summarize key points: Copilot can help summarize key points in an email
    by taking into account the content of the email and the user''s writing style.
    For example, if the user is reading an email about "Product sales," Copilot might
    summarize important points such as "Sales increased from 100 million baht to 120
    million baht," "Customers are satisfied with the new marketing plan," etc.'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助总结要点：Copilot 可以通过考虑电子邮件内容和用户的写作风格来帮助总结电子邮件中的要点。例如，如果用户正在阅读关于“产品销售”的电子邮件，Copilot
    可能会总结出重要点，如“销售额从1亿泰铢增加到1.2亿泰铢”，“客户对新营销计划表示满意”等。
- en: '● Help track the progress of tasks: Copilot can help track the progress of
    tasks assigned in emails by considering the content of the email and the user''s
    writing style. For example, if the user is reading an email about "Marketing Plan,"
    Copilot may track the progress of the work, such as "Was it completed on schedule?"
    "Were there any problems encountered?" etc.'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助跟踪任务进度：Copilot 可以通过考虑电子邮件内容和用户的写作风格来帮助跟踪电子邮件中分配的任务进度。例如，如果用户正在阅读关于“营销计划”的电子邮件，Copilot
    可能会跟踪工作的进度，例如“是否按计划完成？”“是否遇到了任何问题？”等。
- en: '● Help answer questions about emails: Copilot can help answer questions about
    emails by considering the content of the email and the context of the conversation.
    For example, if a user is reading an email about "How to set up a meeting?" Copilot
    might answer questions like "Go to the Meetings tab and select an option ''Create
    meeting.''"'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助回答关于电子邮件的问题：Copilot可以通过考虑电子邮件内容和对话的上下文来帮助回答关于电子邮件的问题。例如，如果用户正在阅读一封关于“如何设置会议？”的电子邮件，Copilot可能会回答像“转到会议标签页并选择一个'创建会议'选项”的问题。
- en: '● Help translate between different languages: Copilot can help translate between
    different languages. For example, if a user is reading a Thai email, Copilot can
    translate the email into English.'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助在不同语言之间翻译：Copilot可以帮助在不同语言之间进行翻译。例如，如果用户正在阅读一封泰语电子邮件，Copilot可以将电子邮件翻译成英语。
- en: '● Help with coding: Copilot can help with coding by offering formulas, functions,
    and coding methods appropriate to the programming language they''re using. For
    example, if a user is reading an email about "Writing Python code," Copilot might
    suggest appropriate formulas and functions, such as "Sales = Product * Price."'
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助编程：Copilot可以通过提供适合他们使用的编程语言的公式、函数和编码方法来帮助编程。例如，如果用户正在阅读一封关于“编写Python代码”的电子邮件，Copilot可能会建议适当的公式和函数，例如“销售额
    = 产品 * 价格”。
- en: '● Help write other content: Copilot can help write other content such as poetry,
    songs, plays, etc.'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助撰写其他内容：Copilot可以帮助撰写其他内容，如诗歌、歌曲、剧本等。
- en: Example of a case study that Copilot helps you do in Microsoft Outlook in reading
    emails.
  id: totrans-432
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Copilot在Microsoft Outlook中阅读电子邮件时帮助您完成的案例研究示例。
- en: 1\. Summary of important points
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 重要要点总结
- en: 'Let''s say a user is reading an email about "Product Sales". Users can have
    Copilot help summarize key points. The user can type the Prompt command as follows:'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 假设用户正在阅读一封关于“产品销售”的电子邮件，用户可以让Copilot帮助他们总结关键点。用户可以输入以下提示命令：
- en: Summaryofkeypointsinemailsaboutproductsales
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 关于产品销售的电子邮件中的关键要点总结
- en: Copilot will summarize key points such as "Sales increased from 100 million
    baht to 120 million baht," "Customers are satisfied with the new marketing plan,"
    etc.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot会总结关键点，例如“销售额从1亿泰铢增加到1.2亿泰铢”，“客户对新营销计划感到满意”等。
- en: 2\. Tracking progress of work
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 跟踪工作进度
- en: 'Let''s say a user is reading an email about a "Marketing Plan." They can have
    Copilot help them track the progress of their work. The user can type the Prompt
    command as follows:'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 假设用户正在阅读一封关于“营销计划”的电子邮件，他们可以让Copilot帮助他们跟踪工作进度。用户可以输入以下提示命令：
- en: Followtheprogressoftheworkinemailsregardingthemarketing plan.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 跟踪关于营销计划的电子邮件中的工作进度。
- en: Copilot tracks the progress of the task, such as "completed on schedule," "were
    any issues encountered," etc.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot会跟踪任务的进度，例如“按计划完成”、“是否遇到任何问题”等。
- en: 3\. Answering Questions
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 回答问题
- en: 'Let''s say a user is reading an email about In the "How to Set Up a Meeting"
    section, users can have Copilot help answer questions. The user can type the Prompt
    command as follows:'
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 假设用户正在阅读一封关于“如何设置会议”部分的电子邮件，用户可以使用Copilot来帮助回答问题。用户可以输入以下提示命令：
- en: Answerquestionsabouthowtosetupameetinginanemail.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 回答关于在电子邮件中如何设置会议的问题。
- en: Copilot answers questions like “Go to the Meetings tab. and select the option
    'Create meeting'."
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot回答像“转到会议标签页，并选择'创建会议'”这样的问题。
- en: 'In addition to the case study examples mentioned above. Users can also use
    other prompt commands to get help from Copilot, such as:'
  id: totrans-445
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 除了上述案例研究示例之外，用户还可以使用其他提示命令来从Copilot那里获得帮助，例如：
- en: ● General Prompt commands
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: ● 通用提示命令
- en: '"Help mesummarizethemainpointsinmyemail." "Helpmetracktheprogressofmyworkinanemail"
    "Helpmeansweranemailquestion"'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: '"帮助我总结电子邮件中的主要观点。" "帮助我跟踪电子邮件中我的工作进度" "帮助我回答电子邮件问题"'
- en: ● Specific Prompt Commands
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: ● 具体的提示命令
- en: '"Help mesummarizethekeypointsinmyemailabout productsales."'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: '"帮助我总结关于产品销售的电子邮件中的关键要点。"'
- en: '"Helpmefollowtheprogressofmymarketingplanbyemail." "Helpmeanswerquestionsabouthowtosetupanemail
    meeting"'
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: '"通过电子邮件帮助我跟踪我的营销计划进度。" "帮助我回答关于如何设置电子邮件会议的问题"'
- en: Copilot is a very powerful and useful tool for Microsoft Outlook users. Copilot
    can help users read their emails more efficiently by offering various suggestions
    while the user is reading the email.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot是Microsoft Outlook用户的一个非常强大且有用的工具。当用户阅读电子邮件时，Copilot可以通过提供各种建议来帮助用户更有效地阅读电子邮件。
- en: Chapter
  id: totrans-452
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 章节
- en: '7'
  id: totrans-453
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '7'
- en: Using Copilot AI in Microsoft Visio
  id: totrans-454
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在Microsoft Visio中使用Copilot AI
- en: Example of using Copilot AI to create diagrams
  id: totrans-455
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Copilot AI创建图表的示例
- en: '![](image_rsrcGV.jpg)'
  id: totrans-456
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcGV.jpg)'
- en: What can Copilot AI in Microsoft Visio do to create diagrams?
  id: totrans-457
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 微软Visio中的Copilot AI可以如何创建图表？
- en: '● Helps create different types of diagrams: Copilot can help create different
    types of diagrams such as fishbone diagrams, organization charts, shoulder diagrams,
    etc. Copilot can suggest diagram formats that are appropriate for the content
    of the diagram.'
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助创建不同类型的图表：Copilot可以帮助创建不同类型的图表，如鱼骨图、组织结构图、鱼骨图等。Copilot可以建议适合图表内容的图表格式。
- en: '● Helps recommend appropriate shapes and sizes: Copilot can help recommend
    appropriate shapes and sizes for the content of the diagram. Copilot takes into
    account the content of the diagram and its context.'
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助推荐合适的形状和大小：Copilot可以帮助为图表内容推荐合适的形状和大小。Copilot会考虑图表的内容及其上下文。
- en: '● Helps connect shapes together: Copilot can help connect shapes together in
    the right way. Copilot looks at the relationships between shapes in the diagram.'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助连接形状：Copilot可以帮助以正确的方式连接形状。Copilot会查看图中形状之间的关系。
- en: '● Add text and symbols: Copilot can help you add text and symbols. into the
    diagram appropriately. Copilot will consider the content of the diagram and the
    context of the diagram.'
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: ● 添加文本和符号：Copilot可以帮助您适当地将文本和符号添加到图中。Copilot将考虑图的内容和图的上下文。
- en: '● Help check the accuracy of the diagram: Copilot can help check the accuracy
    of the diagram, such as checking the completeness of the data. Check the correctness
    of the relationship between shapes, etc.'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助检查图表的准确性：Copilot可以帮助检查图表的准确性，例如检查数据的完整性。检查形状之间关系的正确性等。
- en: '● Help create different layouts for your diagram: Copilot can help you create
    different layouts, such as changing the background. changing colors, etc.'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助创建图表的不同布局：Copilot可以帮助您创建不同的布局，例如更改背景、更改颜色等。
- en: '● Help translate between different languages: Copilot can help you translate
    between different languages.'
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助进行不同语言之间的翻译：Copilot可以帮助您进行不同语言之间的翻译。
- en: '● Help with coding: Copilot offers formulas, functions, and coding methods
    appropriate to the programming language being used.'
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助编码：Copilot提供适用于所使用编程语言的公式、函数和编码方法。
- en: '● Help write other content: Copilot can help write other content such as poetry,
    songs, plays, etc.'
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: ● 帮助撰写其他内容：Copilot可以帮助撰写其他内容，如诗歌、歌曲、剧本等。
- en: 'Example of a case study where Copilot assists in creating diagrams in Microsoft
    Visio:'
  id: totrans-467
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 案例研究示例，其中Copilot在微软Visio中协助创建图表：
- en: 1\. Creating a fishbone diagram
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 创建鱼骨图
- en: 'Suppose a user wishes to illustrate a workflow using a fishbone diagram. Users
    can leverage Copilot to recommend the appropriate shapes and sizes. The user can
    type the Prompt command as follows:'
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 假设用户希望使用鱼骨图来展示工作流程。用户可以利用Copilot推荐合适的形状和大小。用户可以输入以下提示命令：
- en: Create afishbonediagram. section
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 创建鱼骨图。部分
- en: Workprocess
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程
- en: Copilot will suggest suitable shapes and sizes, such as circle shapes for topics
    and square shapes for working steps.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot将建议合适的形状和大小，例如主题使用圆形形状，工作步骤使用方形形状。
- en: 2\. Connecting shapes together
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 连接形状
- en: 'If a user intends to create an organizational chart depicting relationships
    between departments, Copilot can assist in connecting shapes appropriately. The
    user can type the Prompt command as follows:'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 如果用户打算创建展示部门之间关系的组织结构图，Copilot可以帮助适当地连接形状。用户可以输入以下提示命令：
- en: Connect shapesintheorganizationchart DepartmentA
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 在组织结构图中连接形状：部门A
- en: DivisionB
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 分支B
- en: DepartmentC
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 部门C
- en: Copilot will connect shapes in a suitable manner, such as using left-to-right
    arrows to connect department A to department B.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot将以合适的方式连接形状，例如使用从左到右的箭头将部门A连接到部门B。
- en: 3\. Adding text and symbols
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 添加文本和符号
- en: 'In the case of creating a shoulder diagram to present various data, users can
    employ Copilot to add text and symbols appropriately. The user can type the Prompt
    command as follows:'
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建用于展示各种数据的鱼骨图时，用户可以使用Copilot适当地添加文本和符号。用户可以输入以下提示命令：
- en: Add textandsymbolstotheshoulderdiagram. Information1
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 将文本和符号添加到鱼骨图中。信息1
- en: Information2
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 信息2
- en: Information3
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 信息3
- en: Copilot will insert text and symbols into the diagram, such as adding the text
    "Data 1" in a text box and including a "down arrow" symbol below the text box.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot将在图中插入文本和符号，例如在文本框中添加“数据1”文本，并在文本框下方包含一个“向下箭头”符号。
- en: 'In addition to the aforementioned case study examples, users can leverage various
    other prompt commands to seek assistance from Copilot, including:'
  id: totrans-485
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 除了上述案例研究示例之外，用户可以利用各种其他提示命令来寻求Copilot的帮助，包括：
- en: ● General Prompt commands
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: ● 通用提示命令
- en: '"Helpmecreateadiagram."'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: '"帮助我创建一个图表。"'
- en: '"Helpmeconnecttheshapesinthediagram"'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: '"帮助我在图表中连接形状。"'
- en: '"Helpmeaddtextandsymbolstothediagram."'
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: '"帮助我在图表中添加文本和符号。"'
- en: ● Specific Prompt Commands
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: ● 特定提示命令
- en: '"Help mecreateafishbonediagram."'
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: '"帮助我创建一个鱼骨图。"'
- en: '"Helpmeconnecttheshapesintheorganizationchart" "Helpmeaddtextandsymbolstotheshoulderdiagram."'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: '"帮助我在组织结构图中连接形状" "帮助我在肩部图表中添加文本和符号。"'
- en: Copilot is a powerful and highly useful tool for Microsoft Visio users, aiding
    in the creation of diagrams with increased efficiency by providing various suggestions
    as the user works on the diagram.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot是Microsoft Visio用户的一个强大且非常有用的工具，通过在用户创建图表时提供各种建议，提高了图表创建的效率。
