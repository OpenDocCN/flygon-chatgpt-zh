- en: '**WORKING WITH BEAUTIFUL SOUP**'
  id: totrans-1800
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**使用美丽汤**'
- en: Beautiful Soup is a Python library that enables you to parse data from HTML
    Web pages and XML documents. If you are familiar with XPath, then you already
    understand what you can do with Beautiful Soup (which supports a subset of XPath
    functionality).
  id: totrans-1801
  prefs: []
  type: TYPE_NORMAL
  zh: Beautiful Soup 是一个 Python 库，它使您能够从 HTML 网页和 XML 文档中解析数据。如果您熟悉 XPath，那么您已经了解
    Beautiful Soup（它支持 XPath 功能子集）可以做什么。
- en: Beautiful Soup can traverse the tree-like structure of HTML Web pages and XML
    documents (which include SVG documents) in order to extract the desired data or
    text.
  id: totrans-1802
  prefs: []
  type: TYPE_NORMAL
  zh: Beautiful Soup 可以遍历 HTML 网页和 XML 文档（包括 SVG 文档）的树状结构，以提取所需的数据或文本。
- en: 'Moreover, Beautiful Soup works with documents on the file system of your laptop
    as well as data that has been “scraped” from a live HTML Web page. Just to give
    you an idea, Beautiful Soup can easily extract the data from each row in the following
    Web page:'
  id: totrans-1803
