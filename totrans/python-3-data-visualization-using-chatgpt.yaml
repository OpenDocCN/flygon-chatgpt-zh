- en: plt.savefig()
  id: totrans-2126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: plt.savefig()
- en: Seaborn supports various built-in datasets, just like NumPy and Pandas, including
    the Iris dataset and the Titanic dataset, both of which you will see in subsequent
