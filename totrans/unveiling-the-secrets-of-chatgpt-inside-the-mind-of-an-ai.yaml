  id: totrans-361
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: 'Chapter 7: Handling Errors and Ambiguities'
  id: totrans-362
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第七章：处理错误和歧义
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-363
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
