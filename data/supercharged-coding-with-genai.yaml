- en: Appendix
  id: totrans-2574
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录
- en: Set up an OpenAI Account
  id: totrans-2575
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 设置 OpenAI 账户
- en: 'Here are the steps to create an OpenAI account:'
  id: totrans-2576
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 OpenAI 账户的步骤如下：
- en: 'Navigate to [https://openai.com/](https://openai.com/). At the top left of
    the page, click on either ChatGPT or API Platform to start the account creation
    process, as shown in *Figure 1*:'
  id: totrans-2577
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航到 [https://openai.com/](https://openai.com/)。在页面左上角，点击 ChatGPT 或 API 平台以开始账户创建过程，如图
    *图 1* 所示：
- en: '![Figure 1: Access to ChatGPT and API Platform from OpenAI API](../Images/B31534_Appendix_1.png)'
  id: totrans-2578
  prefs: []
  type: TYPE_IMG
  zh: '![图 1：从 OpenAI API 访问 ChatGPT 和 API 平台](../Images/B31534_Appendix_1.png)'
- en: 'Figure 1: Access to ChatGPT and API Platform from OpenAI API'
  id: totrans-2579
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1：从 OpenAI API 访问 ChatGPT 和 API 平台
- en: 'Each of these links will take you to an account creation page, where you can
    sign up using popular platforms such as Google, Microsoft, or Apple, or register
    with an email address, as shown in *Figure 2*:'
  id: totrans-2580
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每个链接都会带您到一个账户创建页面，您可以使用 Google、Microsoft 或 Apple 等流行的平台进行注册，或使用电子邮件地址进行注册，如图
    *图 2* 所示：
- en: '![Figure 2: OpenAI platform sign-up page](../Images/B31534_Appendix_2.png)'
  id: totrans-2581
  prefs: []
  type: TYPE_IMG
  zh: '![图 2：OpenAI 平台注册页面](../Images/B31534_Appendix_2.png)'
- en: 'Figure 2: OpenAI platform sign-up page'
  id: totrans-2582
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2：OpenAI 平台注册页面
- en: To register with an email address, click on **Sign up**.
  id: totrans-2583
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要使用电子邮件地址注册，请点击 **注册**。
- en: Important Note
  id: totrans-2584
  prefs: []
  type: TYPE_NORMAL
  zh: 重要提示
- en: 'As of August 2025, you will need to create two separate accounts: one for ChatGPT
    and one for the OpenAI platform to access the API.'
  id: totrans-2585
  prefs: []
  type: TYPE_NORMAL
  zh: 截至 2025 年 8 月，你需要创建两个独立的账户：一个用于 ChatGPT，一个用于访问 API 的 OpenAI 平台。
- en: In the next section, we will go through the setup of a virtual environment.
  id: totrans-2586
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将介绍虚拟环境的设置。
- en: Creating a virtual environment
  id: totrans-2587
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创建虚拟环境
- en: A **virtual environment** in Python is an isolated setup that ensures the reproducibility
    of dependencies, which are external libraries our project depends on.
  id: totrans-2588
  prefs: []
  type: TYPE_NORMAL
  zh: Python 中的 **虚拟环境** 是一个隔离的设置，确保依赖项的可重复性，这些依赖项是我们项目所依赖的外部库。
- en: 'For example, consider the following code:'
  id: totrans-2589
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑以下代码：
- en: '[PRE337]'
  id: totrans-2590
  prefs: []
  type: TYPE_PRE
  zh: '[PRE337]'
- en: 'Here, we depend on Pandas, a third-party and open-source library available
    at: [https://github.com/pandas-dev/pandas](https://github.com/pandas-dev/pandas).
    Pandas provides the `read_csv` function, which returns a `DataFrame`. Since version
    1.0.0, which can only run on `Python 3.6.1` or higher, the `DataFrame` class also
    includes the `to_markdown` method. If we use earlier versions of Python or Pandas,
    this code may not run.'
  id: totrans-2591
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们依赖于 Pandas，这是一个可在 [https://github.com/pandas-dev/pandas](https://github.com/pandas-dev/pandas)
    找到的第三方和开源库。Pandas 提供了 `read_csv` 函数，它返回一个 `DataFrame`。从 1.0.0 版本开始，该版本只能在 `Python
    3.6.1` 或更高版本上运行，`DataFrame` 类还包括 `to_markdown` 方法。如果我们使用 Python 或 Pandas 的早期版本，此代码可能无法运行。
- en: 'Generally, developers specify their required dependencies in a file named `requirements.txt`.
    In this book’s repository, you will find a specification of the external libraries
    that we use in `requirements.txt`, as shown in *Figure 3*:'
  id: totrans-2592
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，开发者会在名为 `requirements.txt` 的文件中指定他们所需的依赖项。在这本书的仓库中，你可以找到我们在 `requirements.txt`
    中使用的外部库的规范，如图 *图 3* 所示：
- en: '![Figure 3: Requirements.txt file for this book](../Images/B31534_Appendix_3.png)'
  id: totrans-2593
  prefs: []
  type: TYPE_IMG
  zh: '![图 3：本书的 `requirements.txt` 文件](../Images/B31534_Appendix_3.png)'
- en: 'Figure 3: Requirements.txt file for this book'
  id: totrans-2594
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3：本书的 `requirements.txt` 文件
- en: 'In later chapters of the book, where we dive deeper into the **software development
    lifecycle (SDLC)** functions, the requirement files for these projects will include
    specific versions, as shown in *Figure 4*:'
  id: totrans-2595
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的后续章节中，当我们深入探讨 **软件开发生命周期 (SDLC)** 功能时，这些项目的需求文件将包括特定的版本，如图 *图 4* 所示：
- en: '![Figure 4: requirements.txt with versioning from Chapter 10](../Images/B31534_Appendix_4.png)'
  id: totrans-2596
  prefs: []
  type: TYPE_IMG
  zh: '![图 4：带有版本控制的 `requirements.txt`，来自第 10 章](../Images/B31534_Appendix_4.png)'
- en: 'Figure 4: requirements.txt with versioning from [*Chapter 10*](Chapter_10.xhtml#_idTextAnchor424)'
  id: totrans-2597
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4：带有版本控制的 `requirements.txt`，来自 [*第 10 章*](Chapter_10.xhtml#_idTextAnchor424)
- en: Just like in this figure, our production projects also include specific versioning.
    For the dependency versioning resolution, we leverage dependency and environment
    management tools such as *pipenv* that proposes dependency management for specific
    versioning resolution. Other developers may use *Conda*, *poetry*, or other tools.
    In this book, however, we will use Python’s built-in *venv* tool for our environment
    setup.
  id: totrans-2598
  prefs: []
  type: TYPE_NORMAL
  zh: 就像在这个图中一样，我们的生产项目也包括特定的版本控制。对于依赖项版本控制解析，我们利用依赖和环境管理工具，如 *pipenv*，它提出了针对特定版本控制的依赖管理。其他开发者可能使用
    *Conda*、*poetry* 或其他工具。然而，在这本书中，我们将使用 Python 内置的 *venv* 工具来设置我们的环境。
- en: Prompting virtual environment
  id: totrans-2599
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟环境提示
- en: In this book, we leveraged GenAI for every step of the SDLC, and installing
    a virtual environment is no exception. This task is a good candidate for using
    the **agent** mode within the GitHub Copilot chat window, with a prompt that follows
    the **Five S’s** discussed in detail in [*Chapter 4*](Chapter_4.xhtml#_idTextAnchor166)*.*
  id: totrans-2600
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书中，我们利用 GenAI 对 SDLC 的每个步骤进行了利用，安装虚拟环境也不例外。这项任务非常适合在 GitHub Copilot 聊天窗口中使用
    **代理** 模式，并使用遵循在 [*第 4 章*](Chapter_4.xhtml#_idTextAnchor166)** 中详细讨论的 **Five S’s**
    的提示。
- en: 'A prompt to install our dependencies should include the following components:'
  id: totrans-2601
  prefs: []
  type: TYPE_NORMAL
  zh: 安装我们的依赖项的提示应包括以下组件：
- en: '**Python version**: Which version of Python should be used to run this project,
    in our case, it is *Python 3.11*.'
  id: totrans-2602
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**Python 版本**：应使用哪个版本的 Python 运行此项目，在我们的例子中，是 *Python 3.11*。'
- en: '**Environment tool**: Either *venv* or its alternatives.'
  id: totrans-2603
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**环境工具**：可以是 *venv* 或其替代品。'
- en: '**Requirements file**: The default is requirements.txt placed in the root of
    the project.'
  id: totrans-2604
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**需求文件**：默认情况下是放置在项目根目录的 `requirements.txt`。'
- en: '**Environment name**: A common practice is to name the environment `.venv`.
    We can also customize it to suit the project name with a prefix of a period, such
    as `.supercharged`.'
  id: totrans-2605
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**环境名称**：常见的做法是将环境命名为 `.venv`。我们也可以通过在项目名称前加上点来定制它，例如 `.supercharged`。'
- en: '**Environment location**: The library code is typically installed at the project
    root.'
  id: totrans-2606
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**环境位置**：库代码通常安装在项目根目录。'
- en: 'Considering these, here is an example of a prompt we can use with GitHub Copilot,
    either in PyCharm or VS Code:'
  id: totrans-2607
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这些因素，以下是我们可以在 GitHub Copilot 中使用的示例提示，无论是在 PyCharm 还是 VS Code 中：
- en: '[PRE338]'
  id: totrans-2608
  prefs: []
  type: TYPE_PRE
  zh: '[PRE338]'
- en: 'For reference, the output of the setup using agent mode with GitHub Copilot
    and the underlying *Claude Sonnet 4.0* specifies the steps for setting up an environment,
    activating it, and installing its dependencies. *Figure 5* demonstrates creating
    the environment with our desired name and activating it:'
  id: totrans-2609
  prefs: []
  type: TYPE_NORMAL
  zh: 为了参考，使用 GitHub Copilot 和底层 *Claude Sonnet 4.0* 的代理模式设置环境、激活它以及安装其依赖项的步骤如下。*图
    5* 展示了创建具有我们所需名称的环境并激活它：
- en: '![Figure 5: Activating the virtual environment](../Images/B31534_Appendix_5.png)'
  id: totrans-2610
  prefs: []
  type: TYPE_IMG
  zh: '![图 5：激活虚拟环境](../Images/B31534_Appendix_5.png)'
- en: 'Figure 5: Activating the virtual environment'
  id: totrans-2611
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5：激活虚拟环境
- en: '*Figure 6* illustrates the installation of dependencies as specified in `requirements.txt`:'
  id: totrans-2612
  prefs: []
  type: TYPE_NORMAL
  zh: '*图 6* 展示了根据 `requirements.txt` 指定的依赖项安装过程：'
- en: '![Figure 6: Installation of the dependencies](../Images/B31534_Appendix_6.png)'
  id: totrans-2613
  prefs: []
  type: TYPE_IMG
  zh: '![图 6：依赖项安装](../Images/B31534_Appendix_6.png)'
- en: 'Figure 6: Installation of the dependencies'
  id: totrans-2614
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6：依赖项安装
- en: 'Once installation is complete, Copilot may propose some tests, such as validating
    the correct versioning of the packages, concluding with a success message as shown
    in *Figure 7*:'
  id: totrans-2615
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，Copilot 可能会提出一些测试，例如验证包的正确版本，并以如 *图 7* 所示的成功消息结束：
- en: '![Figure 7: Successful installation message](../Images/B31534_Appendix_7.png)'
  id: totrans-2616
  prefs: []
  type: TYPE_IMG
  zh: '![图 7：成功安装消息](../Images/B31534_Appendix_7.png)'
- en: 'Figure 7: Successful installation message'
  id: totrans-2617
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7：成功安装消息
- en: 'After the setup is complete, we can see that a `.supercharged` folder is added
    to the repository, as shown in *Figure 8*:'
  id: totrans-2618
  prefs: []
  type: TYPE_NORMAL
  zh: 设置完成后，我们可以看到在存储库中添加了 `.supercharged` 文件夹，如 *图 8* 所示：
- en: '![Figure 8: Added files to the repository](../Images/B31534_Appendix_8.png)'
  id: totrans-2619
  prefs: []
  type: TYPE_IMG
  zh: '![图 8：添加到存储库的文件](../Images/B31534_Appendix_8.png)'
- en: 'Figure 8: Added files to the repository'
  id: totrans-2620
  prefs: []
  type: TYPE_NORMAL
  zh: 图 8：添加到存储库的文件
- en: 'For reference, here are the typical three shell commands we can use to manually
    install the virtual environment:'
  id: totrans-2621
  prefs: []
  type: TYPE_NORMAL
  zh: 为了参考，以下是我们可以手动安装虚拟环境的典型三个 shell 命令：
- en: '[PRE339]'
  id: totrans-2622
  prefs: []
  type: TYPE_PRE
  zh: '[PRE339]'
- en: Next, we will see how to instruct git to ignore the dependencies files.
  id: totrans-2623
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将看到如何指导 git 忽略依赖项文件。
- en: Adding virtual environment to .gitignore
  id: totrans-2624
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将虚拟环境添加到 .gitignore
- en: 'Since `requirements.txt` is sufficient for replicating the dependencies on
    any machine, there is no need to include the actual environment code in the repository.
    For that reason, it is best practice to ignore the installed dependencies. We
    can do this by adding the path of the installed requirements to the `.gitignore`
    file. We can chain another prompt in agent mode:'
  id: totrans-2625
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 `requirements.txt` 已足够在任意机器上复制依赖项，因此无需在存储库中包含实际的环境代码。因此，最佳实践是忽略已安装的依赖项。我们可以通过将已安装的要求路径添加到
    `.gitignore` 文件中来实现这一点。我们可以在代理模式下链式添加另一个提示：
- en: '[PRE340]'
  id: totrans-2626
  prefs: []
