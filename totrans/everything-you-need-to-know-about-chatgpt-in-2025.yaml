  type: TYPE_NORMAL
  zh: '**多模态**模型是一种可以同时处理和生成不同类型数据的模型。例如，一个多模态模型可以在同一环境中与文本、图像和音频一起工作。ChatGPT正朝着更大的多模态能力进化，这将允许它生成更加无缝地整合不同内容格式的响应。'
