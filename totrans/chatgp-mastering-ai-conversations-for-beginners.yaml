  zh: 在使用ChatGPT为您编写代码的过程中，其**缺点**与我们在前几章中讨论的相同：它并非总是100%准确，并且可能缺乏上下文知识或人类程序员带来的创造性和经验。更糟糕的是，ChatGPT不会让您知道它不知道自己在做什么。就像自负的纳粹主义者一样，ChatGPT会固执地声称自己是正确的，即使它是错误的，当它最终承认可能犯了一个错误时，它也会如此粗鲁地承认，通常不会提供纠正错误的方法。这意味着您必须检查聊天机器人为您生成的代码，测试它，并在必要时进行调试，就像您会检查由人类编写的代码一样。此外，ChatGPT也难以看到代码在您的整体项目中的位置以及您想要使用这个特定代码片段做什么。它不知道最佳实践和公司惯例的清单，这些您可以轻松传达给人类程序员，也无法确定它生成的代码将如何与其他项目中的代码交互。最后，当事情出错时，ChatGPT不应该承担责任；当事情出错时，责任完全落在您身上，而不是某个逃避责任的自由职业程序员。
