  prefs: []
  type: TYPE_NORMAL
  zh: '**人工智能的世界，特别是生成语言模型如ChatGPT等领域，可能一开始看起来很复杂**。随着你对这些工具理解的深入，你很可能会遇到各种各样的技术术语，虽然这些术语对于理解人工智能是基础性的，但如果没有清晰的解释，可能会很难掌握。因此，这个词汇表解释了书中提到的关键术语，为你提供了一个快速参考，以便你更好地理解所呈现的观点和概念。'
