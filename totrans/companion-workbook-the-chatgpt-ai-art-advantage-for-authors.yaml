- en: THE CHATGPT AI ART ADVANTAGE FOR AUTHORS
  id: totrans-438
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**ChatGPT AI艺术优势为作者带来**'
- en: CREATE SCROLL-STOPPING BOOK MARKETING IMAGES IN MINUTES (EVEN IF YOU CAN’T DRAW)
  id: totrans-439
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**几秒钟内创建令人惊叹的书籍营销图像（即使你不会画画）**'
- en: Sample pages from the book.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍的样本页面。
- en: 1 WHY AI ART IS YOUR BOOK’S BEST FRIEND
  id: totrans-441
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1 为什么AI艺术是你书籍的最佳朋友
- en: Authors can write awesome books, but to actually sell them, authors need to
    be marketers and illustrators too, and that can be a problem because these are
    different skillsets.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 作者可以写出精彩的书，但要真正卖出它们，作者还需要成为营销人员和插画师，这可能会成为一个问题，因为这些是不同的技能集。
- en: That’s why so many new authors assume that they need a traditional publishing
    deal where the publisher takes care of all the marketing paraphernalia – sounds
    good – all I have to do is write and the publisher takes care of all the details
    of turning your words into a tangible product – a book that sells. Unfortunately,
    because getting a traditional publisher is difficult for new authors or not so
    famous experts, many of us have successfully tried and thrived with self-publishing.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，许多新作者认为他们需要一个传统的出版协议，其中出版商负责所有市场营销的杂事——听起来不错——我只需要写作，出版商就会负责将你的文字变成有形产品的所有细节——一本可以销售的书籍。不幸的是，由于对于新作者或不太出名的专家来说，获得传统出版商很困难，我们中的许多人已经成功尝试并从自出版中获益。
- en: However, while you can get your friends to help with editing, and feedback –
    you still need to get an expert who can create compelling graphic, and they are
    expensive because of the huge value graphics bring to turning you book into a
    product. Until now - graphically challenged authors like me were delighted with
    AI prompts made it possible to write an instruction and have an artist follow
    it. While human illustrators have always been the best option, they tend to be
    expensive and out of reach for most indie authors, especially as we need a lot
    of visuals for marketing our books. Without marketing our books will struggle
    to find the readers who will love the book.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，虽然你可以让朋友帮忙编辑和反馈，但你仍然需要一个能够创作出引人入胜的图形的专家，由于图形对将你的书籍变成产品带来的巨大价值，他们收费很高。直到现在，像我这样的图形挑战者对AI提示感到高兴，这使得编写指令并让艺术家遵循它成为可能。虽然人类插图画家一直是最佳选择，但他们往往很贵，对于大多数独立作者来说难以触及，尤其是当我们需要大量视觉元素来营销我们的书籍时。没有营销，我们的书籍将难以找到那些会喜欢这本书的读者。
- en: When ChatGPT introduced DALL-E, authors and others were excited until they ran
    into the many roadblocks that came with trying to produce images with this tool.
    I know I bought credits for it, that are still lying unused somewhere in the dark
    chasms of the internet, or my hard drive. It was very difficult to prompt DALL-E
    and get anything resembling what you were hoping to have. Not only could it not
    master any type of text addition to images, but more frustrating was that you
    couldn't iterate and tweak an image to make it better without it completely changing
    the image to something brand new.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 当ChatGPT引入DALL-E时，作者和其他人都很兴奋，直到他们遇到了使用这个工具生成图像时遇到的许多障碍。我知道我为此购买了信用额度，这些额度现在还躺在互联网的黑暗深渊中，或者我的硬盘里。提示DALL-E并得到你希望得到的东西非常困难。它不仅不能掌握任何类型的文本添加到图像中，而且更令人沮丧的是，你不能迭代和调整图像以使其更好，而不会将其完全改变成全新的图像。
- en: Now, instead of being a hit or miss feature, OpenAI has changed from DALL-E
    to native image generation with ChatGPT 4o. This means you can stop paying for
    additional AI image tools for your online marketing needs. While there is a limit
    of images a day that you can generate with a free account, you now have access
    to an image creator that is responsive and can engage in a conversation with you
    rather than forcing you to start over from scratch with every single alteration.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，OpenAI已经从DALL-E转变为ChatGPT 4o的本地图像生成，不再是碰运气式的功能。这意味着你可以停止为在线营销需求支付额外的AI图像工具费用。虽然免费账户每天可以生成的图像数量有限，但你现在可以访问一个响应式图像创建器，它可以与你进行对话，而不是强迫你每次都要从头开始进行每一个修改。
- en: This makes the image process much faster and targeted to the needs of your niche,
    regardless of what platform you plan to post the graphics on. We're going to dig
    into how you can use this new update to add to your collateral for your content.
    As this is a relatively new feature, so you may run into some quirks. But the
    good news is, it's much easier to refine and correct any type of small failure,
    just as you can in some of the other more advanced image generation AI tools.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得图像处理变得更快，并且更符合你细分市场的需求，无论你计划在哪个平台上发布图形。我们将深入探讨如何利用这个新更新来丰富你内容的相关资料。由于这是一个相对较新的功能，所以你可能会遇到一些小问题。但好消息是，它更容易修正和纠正任何类型的小错误，就像你在其他一些更高级的图像生成AI工具中做的那样。
- en: In addition, think of the time you will save, instead of learning new graphics
    tools, testing, re-testing and regenerating, you can spend that time writing your
    next book.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，想想你可以节省的时间，而不是学习新的图形工具、测试、重新测试和重新生成，你可以用这些时间来写你的下一本书。
- en: It exponentially speeds up your time to market.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 它极大地缩短了你的上市时间。
- en: 2 GETTING STARTED WITH IMAGE GENERATION IN CHATGPT 4O
  id: totrans-450
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2 在ChatGPT 4o中开始图像生成
- en: Users on the free tier can generate three images a day, more if you are a Plus
    version or a Team subscriber. You also have to have a browser that's compatible
    with ChatGPT - or use the ChatGPT mobile app.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 免费层级的用户每天可以生成三张图像，如果你是Plus版本或团队订阅者，则可以生成更多。你还需要有一个与ChatGPT兼容的浏览器——或者使用ChatGPT移动应用。
- en: 'SETTING UP FOR SUCCESS: IMAGE GENERATION BASICS'
  id: totrans-452
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置成功：图像生成基础
- en: Ideally, if you're trying to create images, use a bigger screen, so you need
    a desktop rather than trying to make them on your mobile device. As an author,
    when I’m at home, I always use the monitor, rather than the laptop screen. The
    latter I keep for travelling.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，如果你试图创建图像，使用更大的屏幕，因此你需要一台台式机而不是在移动设备上尝试制作。作为一名作者，我在家时总是使用显示器，而不是笔记本电脑屏幕。后者我保留用于旅行。
- en: To get started, open a new chat with ChatGPT and choose the 4o model.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用，请与ChatGPT开启一个新的聊天窗口并选择4o模型。
- en: Have a simple conversation about the image that you need.
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 就你需要图像进行简单的对话。
- en: 'For example, if you are an author who works with seniors who are writing a
    book, you might prompt something like this:'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你是一位与老年人合作撰写书籍的作者，你可能会有这样的提示：
- en: 'Prompt:'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '*“Create an image of a senior woman author happily typing on her laptop in
    a sunlit home office in the Himalayas Include cozy décor and a coffee mug on her
    <desk>.”*'
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: '*“创建一幅画面：一位年长的女性作者在喜马拉雅山脉阳光明媚的办公室里快乐地敲击着她的笔记本电脑。请包括舒适的装饰和放在她<桌子>上的咖啡杯。”*'
- en: 'When you do this, you might get a result like this to work with as a starting
    point:'
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 当你这样做时，你可能会得到以下这样的结果作为起点来工作：
- en: '![](Image00010.jpg)'
  id: totrans-460
  prefs: []
  type: TYPE_IMG
  zh: '![](Image00010.jpg)'
- en: Notice how it got things right, like the hands and specific requests for Himalayas
    and a coffee cup on the desk.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 注意它如何正确地处理了一些细节，比如手部和对于喜马拉雅山脉和桌子上咖啡杯的特定要求。
