- en: Furthermore, [Table 5.4](#ch13.xhtml#t13)’s results indicate that perceived
    enjoyment (b=0.106, p<0.05), perceived usefulness (b=0.110, p<0.05), PI (b=0.170,
    p<0.05), and self-motivation (b=0.155, p<0.05) fully mediate the link between
    user experience and social influence on intention to use ChatGPT continuously.
  id: totrans-1111
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，[表5.4](#ch13.xhtml#t13)的结果表明，感知乐趣（b=0.106，p<0.05）、感知有用性（b=0.110，p<0.05）、PI（b=0.170，p<0.05）和自我激励（b=0.155，p<0.05）完全中介了用户体验和社会影响对持续使用ChatGPT意图之间的联系。
