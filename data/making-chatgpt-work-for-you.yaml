  zh: OpenAI的ChatGPT注册页面。过程简单到不能再简单。如果您还没有账户，点击“注册”，您将被带到显示多个注册选项的屏幕，如图[1-2](#Fig2)所示。![创建账户页面的截图，顶部有标志。下方有一个标注为“电子邮件地址”的输入框，下面有一个绿色的“继续”按钮。文本为“已有账户？登录。”有继续使用Google、Microsoft或Apple账户的选项。底部有“使用条款”和“隐私政策”的链接。](../images/641691_1_En_1_Chapter/641691_1_En_1_Fig2_HTML.jpg)
- en: Figure 1-2
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-2
- en: You can sign up for ChatGPT by creating a new account with your email address
