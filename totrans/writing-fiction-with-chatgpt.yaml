- en: PRAISE FOR WRITING FICTION WITH CHATGPT
  prefs: []
  type: TYPE_NORMAL
- en: “ChatGPT is here to stay—or at least some iteration of it, anyway—and Lorraine
    is here to help writers make sense of it. I admire Lorraine’s fearlessness in
    the face of controversial technology as well as her impressive ability to simplify
    her process into something anyone can follow. Come for the experimentation with
    AI; stay for the thorough breakdown of what makes good fiction good, and how using
    ChatGPT can make great fiction writers even better.”
  prefs: []
  type: TYPE_NORMAL
- en: —Brannan Sirratt,
  prefs: []
  type: TYPE_NORMAL
- en: developmental editor and author of
  prefs: []
  type: TYPE_NORMAL
- en: You Don’t Get to the Ocean by Accident
  prefs: []
  type: TYPE_NORMAL
- en: “What better way for a writer to learn ChatGPT than from another writer. Lorraine
    breaks down the baffling and frightening AI machinery into two relatable characters,
    Polly the parrot, and Luna the librarian. Lorraine’s accessible style eases the
    novelist into an understanding of ChatGPT’s boundless tools, which are ready for
    fictional exploitation in the hands of any imaginative writer.”
  prefs: []
  type: TYPE_NORMAL
- en: —Sandy Day,
  prefs: []
  type: TYPE_NORMAL
- en: author of Odd Mom Out and Birds Don’t Cry
  prefs: []
  type: TYPE_NORMAL
- en: “By bridging the divide between bleeding-edge technology and the boundless realms
    of the human imagination, Lorraine demystifies the often-frightening nature of
    AI and reintroduces it to creative writers as an approachable and helpful tool
    in support of both creativity and good old-fashioned writer’s craft fundamentals.”
  prefs: []
  type: TYPE_NORMAL
- en: —Kevin Johns,
  prefs: []
  type: TYPE_NORMAL
- en: coach and author of The Page Turners Trilogy
  prefs: []
  type: TYPE_NORMAL
- en: and Novel Writer’s Blueprint
  prefs: []
  type: TYPE_NORMAL
- en: “Lorraine has successfully made a complex subject both comprehensible and interesting.
    She also establishes why ChatGPT should not be feared by writers but, instead,
    a tool to be used.”
  prefs: []
  type: TYPE_NORMAL
- en: —Philip L. Wray,
  prefs: []
  type: TYPE_NORMAL
- en: author of the Charles de la Forêt Mystery series
  prefs: []
  type: TYPE_NORMAL
