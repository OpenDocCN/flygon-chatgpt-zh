- en: Quick-Start Guide for Teachers in a Hurry
  id: totrans-708
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 紧急教师快速入门指南
- en: 'Sign Up: Go to OpenAI’s website (openai.com) and create an account if you haven’t
    already.'
  id: totrans-709
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注册：如果您还没有，请访问 OpenAI 的网站（openai.com）并创建一个账户。
- en: 'Explore Features: Start by familiarizing yourself with ChatGPT’s core functionalities—writing
    assistance, lesson planning, feedback generation, and content creation.'
  id: totrans-710
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索功能：首先熟悉 ChatGPT 的核心功能——写作辅助、课程规划、反馈生成和内容创作。
- en: 'Set Preferences: Customize ChatGPT’s responses according to your teaching style,
    curriculum standards, and classroom needs.'
  id: totrans-711
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置偏好：根据您的教学风格、课程标准和课堂需求定制ChatGPT的响应。
- en: 'Start Using Templates: Leverage existing templates for lesson planning, quizzes,
    and creative writing to save time.'
  id: totrans-712
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开始使用模板：利用现有的教学计划、测验和创意写作模板来节省时间。
- en: 'Engage Students: Use ChatGPT to foster interactive classroom discussions and
    personalized learning experiences.'
  id: totrans-713
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 吸引学生：使用ChatGPT促进课堂互动讨论和个性化学习体验。
- en: 'Practice Ethics: Keep AI usage ethical by monitoring the accuracy of generated
    content and ensuring student privacy.'
  id: totrans-714
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实践伦理：通过监控生成内容的准确性并确保学生隐私来保持AI使用的道德性。
- en: With this quick-start guide, you’ll be on your way to integrating ChatGPT effectively
    into your teaching practices, enhancing your efficiency and classroom engagement.
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这个快速入门指南，您将能够有效地将ChatGPT整合到您的教学实践中，提高您的效率和课堂参与度。
- en: 1000 Prompts That Teachers Can Use
  id: totrans-716
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1000个教师可以使用提示
- en: Lesson Planning Prompts
  id: totrans-717
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 教学计划提示
- en: “Create a lesson plan for teaching [topic] to high school students.”
  id: totrans-718
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “为高中生制定一个教授[主题]的教学计划。”
- en: “Design a weekly lesson plan for 6th-grade science class.”
  id: totrans-719
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “为六年级科学课设计一个每周教学计划。”
- en: “Develop a lesson plan to introduce [concept] to middle school students.”
  id: totrans-720
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “制定一个向中学生介绍[概念]的教学计划。”
- en: “Plan a lesson on [historical event] for 10th graders.”
  id: totrans-721
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “为10年级学生制定一个关于[历史事件]的教学计划。”
- en: “Write a lesson plan on [cultural topic] for elementary students.”
  id: totrans-722
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “为小学生编写一个关于[cultural topic]的教学计划。”
- en: “Craft a lesson plan using project-based learning for [subject].”
  id: totrans-723
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “使用基于项目的学习为[科目]制定一个教学计划。”
- en: “Create a lesson plan that integrates technology into teaching [topic].”
  id: totrans-724
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “创建一个将技术融入[主题]教学的教学计划。”
- en: “Design a cross-curricular lesson plan for [subject and topic].”
  id: totrans-725
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “为[科目和主题]设计一个跨学科的教学计划。”
- en: “Draft a lesson plan to teach scientific inquiry to 7th-grade students.”
  id: totrans-726
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “起草一个针对七年级学生的科学探究教学计划。”
- en: “Plan a lesson to teach students about global sustainability.”
  id: totrans-727
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “制定一个教授学生关于全球可持续性的教学计划。”
- en: '* * *'
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Activity and Exercise Prompts
  id: totrans-729
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 活动和练习提示
- en: “Develop a hands-on science experiment for 8th-grade students.”
  id: totrans-730
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “为八年级学生开发一个动手科学实验。”
- en: “Design an engaging group activity for teaching teamwork.”
  id: totrans-731
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “设计一个吸引人的小组活动，以教授团队合作。”
- en: “Create a set of quick comprehension activities for students.”
  id: totrans-732
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “为学生创建一套快速理解活动。”
- en: “Generate 5 math puzzles to reinforce fractions for 4th graders.”
  id: totrans-733
  prefs:
