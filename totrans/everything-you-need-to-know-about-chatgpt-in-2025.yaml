    ****lea**d**i**ng** ****t****o**** ****diff**i**cu**lt** ****deci**s**io**ns**,
    ****su****c**h** ****a****s**** ****lim**i**ti**ng** ****t****h**e** ****fu****l**l**
    ****rel**e**a**se** ****o****f**** ****so****m**e** ****mo**d**e**ls**.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**自** **其** **创** **立** **以** **来** **，** **OpenAI** **一直** **致力于** **以** **安全**
    **、** **负** **责** **和** **可** **及** **的** **方式** **推进** **AI** **的** **发展** **。**
    **该** **组织** **采** **取** **了** **开** **放** **源** **码** **的** **方法** **，** **坚定**
    **地** **相信** **分享** **知识** **对于** **民主化** **技术** **和** **促进** **一个** **协作** **的**
    **全球** **社区** **的重要性** **。** **然而** **，** **这种** **初始** **方法** **随着时间的** **推移**
    **而** **发展** **。** **随着** **OpenAI** **开发** **出** **越来越** **强大** **的** **模型**
    **，** **人们对** **这项** **技术** **潜在** **误用** **的** **担忧** **也** **日益** **加剧** **，**
    **导致** **了** **一些** **难以** **做出的** **决定** **，** **例如** **限制** **某些** **模型** **的**
    **完全** **发布** **。'
- en: '****A****t**** ****t****h**e** ****he**a**r**t** ****o****f**** ****Op**e**n**AI**''****s****
    ****mis**s**i**on** ****i****s**** ****t****h**e** ****no**t**i**on** ****o****f****
