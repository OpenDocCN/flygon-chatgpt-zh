- en: 4.3.1.4 Authors
  id: totrans-902
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.3.1.4 作者
- en: The results of the author analysis indicated that 398 unique authors contributed
    to the 136 articles included in the sample. Further analysis was conducted to
    identify the most productive authors, with the top five being Paul Denny (University
    of Auckland, Auckland, New Zealand), Juho Leinonen (University of Auckland, Auckland,
    New Zealand), Ken Masters (Sultan Qaboos University, Sultanate of Oman), Mike
    Perkins (British University Vietnam, Hung Yen, Vietnam), and Joseph Crawford (University
    of Tasmania, Australia) (see [Figure 4.3](#ch12.xhtml#f9)).
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 作者分析的结果表明，共有398位独特的作者为样本中包含的136篇文章做出了贡献。进一步的分析旨在确定最富有成效的作者，其中前五名分别是保罗·邓尼（新西兰奥克兰大学，新西兰奥克兰），尤霍·莱伊诺宁（新西兰奥克兰大学，新西兰奥克兰），肯·马斯特斯（阿曼苏丹国苏丹卡布斯大学），迈克·珀金斯（越南英国大学，越南河静省），以及约瑟夫·克劳福德（澳大利亚塔斯马尼亚大学）（见[图4.3](#ch12.xhtml#f9)）。
- en: '![A network diagram depicts clusters of colored nodes. Each node is labeled
    with two author names. Notable large nodes include Chartash and David, Perkins
    and Mike, Chan and Cecilia Ka Yuk, Henriksen and Danah, Emenike and Bright U,
