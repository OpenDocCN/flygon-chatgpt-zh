- en: 'if "actions" in response:'
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: 'if "actions" in response:'
- en: 'for action in response["actions"]:'
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 'for action in response["actions"]:'
- en: 'st.write(f"Calling Tool: `{action.tool}` with input `{action.tool_input}`")'
  id: totrans-1012
  prefs: []
  type: TYPE_NORMAL
  zh: 'st.write(f"调用工具: `{action.tool}`，输入 `{action.tool_input}`")'
- en: '# Observation'
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: '# 观察结果'
- en: 'elif "steps" in response:'
  id: totrans-1014
  prefs: []
  type: TYPE_NORMAL
  zh: 'elif "steps" in response:'
- en: 'for step in response["steps"]:'
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: 'for step in response["steps"]:'
- en: 'st.write(f"Tool Result: `{step.observation}`")'
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: 'st.write(f"工具结果: `{step.observation}`")'
- en: '# Final result'
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: '# 最终结果'
- en: 'elif "output" in response:'
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 'elif "output" in response:'
- en: 'st.write(f''Final Output: {response["output"]}'')'
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: 'st.write(f''最终输出: {response["output"]}'')'
- en: 'else:'
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: 'else:'
- en: raise ValueError()
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: raise ValueError()
- en: st.write("---")
  id: totrans-1022
  prefs: []
  type: TYPE_NORMAL
  zh: st.write("---")
- en: Because the output is written on the Streamlit UI, it’s fine to turn on the
    verbose parameter in the AgentExecutor for development.
  id: totrans-1023
  prefs: []
  type: TYPE_NORMAL
  zh: 因为输出是在 Streamlit UI 上写的，所以在开发时可以打开 AgentExecutor 的 verbose 参数。
- en: 'Run the application using Streamlit:'
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Streamlit 运行应用程序：
- en: streamlit run app.py
  id: totrans-1025
  prefs: []
  type: TYPE_NORMAL
  zh: streamlit run app.py
- en: You can now ask different kinds of questions to see if the LLM can use the available
    tools.
