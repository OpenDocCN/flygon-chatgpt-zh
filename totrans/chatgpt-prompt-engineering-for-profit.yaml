    ****gu**ide**d ****t**o** ****pro**vid**e ****a**n** ****ini**tia**l ****res**pons**e
    ****a**nd** ****th**en** ****as**ked** ****t**o** ****eva**luat**e ****t**he**
    ****qua**lit**y ****o**f** ****h**is** ****o**r** ****h**er** ****o**wn** ****res**pons**e,
    ****ma**kin**g ****adju**stment**s ****o**r** ****impr**ovemen**ts. ****Th**is**
    ****cre**ate**s ****a**** ****cy**cle** ****wh**ere** ****t**he** ****res**pons**e
    ****evo**lve**s ****un**til** ****i**t** ****rea**che**s ****a**** ****mo**re**
    ****sati**sfacto**ry ****le**vel**.'
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种技术中，LLM被指导提供初始响应，然后被要求评估其或自己响应的质量，进行调整或改进。这创造了一个循环，其中响应会不断进化，直到达到更令人满意的水平。
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****go**al** ?]'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: '[****What** ****is** ****your** ****main** ****goal** **?**]'
- en: '****T**he** ****ma**in** ****go**al** ****o**f** ****Fee**dbac**k ****Lo**op**
    ****Prom**ptin**g ****i**s** ****t**o** ****imp**rov**e ****t**he** ****qua**lit**y
    ****o**f** ****t**he** ****res**pons**e ****thr**oug**h ****iter**ativ**e ****rev**isio**n.
    ****Of**ten**, ****t**he** ****mo**del**''****s**** ****fi**rst** ****att**emp**t
    ****m**ay** ****con**tai**n ****inac**curaci**es ****o**r** ****b**e** ****insu**fficie**nt.
    ****B**y** ****cons**tantl**y ****rev**isin**g ****t**he** ****res**pons**e ****a**nd**
    ****see**kin**g ****impr**ovemen**ts, ****th**is** ****tech**niqu**e ****ai**ms**
    ****t**o** ****en**sur**e ****th**at** ****t**he** ****fi**nal** ****re**sul**t
    ****i**s** ****a**s** ****acc**urat**e, ****det**aile**d, ****a**nd** ****us**efu**l
    ****a**s** ****pos**sibl**e.'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: '[****The** ****main** ****goal** ****of** ****Feedback ****Loop ****Prompting**
    ****is** ****to** ****improve** ****the** ****quality** ****of** ****the** ****response**
    ****through** ****iterative**** **review**.**** Often**, ****the** ****model’s**
    ****first** ****attempt**** **may** ****contain** ****inaccuracies** ****or**
    ****be** ****insufficient.**** By** ****constantly**** **reviewing** ****the**
    ****response**** **and** ****seeking**** **improvements**, ****this**** **technique****
    **aims** ****to**** **ensure** ****that**** **the** ****final**** **result****
    **is** ****as**** **accurate**, ****detailed**, ****and**** **useful** ****as****
    **possible**.'
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****pro**mot**e ****t**he**
    ****deve**lopmen**t ****o**f** ****a**** ****res**pons**e ****th**at** ****i**s**
    ****mo**re** ****ali**gne**d ****wi**th** ****t**he** ****us**er**’****s**** ****expe**ctatio**ns.
    ****A**s** ****t**he** ****L**LM** ****rev**iew**s ****h**is** ****o**r** ****h**er**
    ****o**wn** ****res**pons**e, ****h**e** ****o**r** ****s**he** ****m**ay** ****b**e**
    ****dir**ecte**d ****t**o** ****fo**cus** ****o**n** ****spe**cifi**c ****asp**ect**s,
    ****a**dd** ****det**ail**s ****th**at** ****m**ay** ****ha**ve** ****be**en**
    ****omi**tte**d, ****o**r** ****sim**plif**y ****pa**rts** ****th**at** ****a**re**
    ****t**oo** ****comp**licate**d.'
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个目标是促进发展一个与用户期望更一致的响应。当LLM审查其或他人的响应时，它或她可能会被指导关注特定方面，补充可能被遗漏的细节，或简化过于复杂的部分。
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: '[****How** ****it** ****works** ]'
- en: '****Fee**dbac**k ****Lo**op** ****Prom**ptin**g ****wo**rks** ****b**y** ****bre**akin**g
    ****t**he** ****res**pons**e ****pro**ces**s ****in**to** ****mul**tipl**e ****gene**ratio**n
    ****a**nd** ****re**vie**w ****st**eps**. ****Init**iall**y, ****t**he** ****L**LM**
    ****pro**vide**s ****a**n** ****an**swe**r ****t**o** ****t**he** ****pr**omp**t.
    ****Th**en**, ****t**he** ****us**er** ****o**r** ****t**he** ****mo**del** ****it**sel**f
    ****as**ks** ****ques**tion**s ****t**o** ****re**vie**w ****a**nd** ****imp**rov**e
    ****th**at** ****an**swe**r, ****ba**sed** ****o**n** ****cer**tai**n ****cri**teri**a,
    ****su**ch** ****a**s** "****I**s** ****t**he** ****an**swe**r ****com**plet**e?"
    ****o**r** "****I**s** ****th**ere** ****any**thin**g ****th**at** ****co**uld**
    ****b**e** ****be**tte**r ****expl**aine**d?". ****Wi**th** ****ea**ch** ****cy**cle**,
    ****t**he** ****an**swe**r ****i**s** ****adj**uste**d ****a**nd** ****imp**rove**d
    ****un**til** ****i**t** ****bec**ome**s ****sati**sfacto**ry.'
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: '**反馈循环提示**通过将响应过程分解成多个生成和审查步骤来工作。最初，LLM 提供一个对提示的答案。然后，用户或模型本身会根据某些标准，例如“**这个答案完整吗？**”或“**有没有什么可以更好地解释的地方？”，提出问题以审查和改进那个答案。在每个循环中，答案都会进行调整和改进，直到它变得令人满意。'
- en: '****F**or** ****exa**mpl**e, ****i**f** ****t**he** ****mo**del** ****i**s**
    ****as**ked** ****t**o** ****exp**lai**n ****a**** ****scie**ntifi**c ****con**cep**t,
    ****i**t** ****mi**ght** ****gi**ve** ****a**n** ****ini**tia**l ****an**swe**r
    ****a**nd** ****th**en** ****b**e** ****as**ked** ****t**o** ****re**vis**e ****i**t**:
    “****N**ow**, ****re**vie**w ****yo**ur** ****an**swe**r ****a**nd** ****s**ee**
    ****i**f** ****th**ere** ****a**re** ****a**ny** ****impo**rtan**t ****det**ail**s
    ****th**at** ****m**ay** ****ha**ve** ****be**en** ****omi**tte**d.” ****Th**is**
    ****fee**dbac**k ****lo**op** ****i**s** ****rep**eate**d ****un**til** ****t**he**
    ****an**swe**r ****i**s** ****cl**ear** ****a**nd** ****cor**rec**t.'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: '**例如**，如果模型被要求解释一个科学概念，它可能会先给出一个初始答案，然后被要求对其进行修订：“**现在**，回顾你的答案并看看是否有任何重要的细节可能被遗漏。”
    这个反馈循环会重复进行，直到答案清晰且正确。'
- en: '****T**he** ****re**vie**w ****pro**ces**s ****m**ay** ****inc**lud**e ****spe**cifi**c
    ****ques**tion**s ****ab**out** ****diff**eren**t ****asp**ect**s ****o**f** ****t**he**
    ****res**pons**e, ****su**ch** ****a**s** ****acc**urac**y, ****st**yle**, ****o**r**
    ****comp**letene**ss. ****Th**is** ****tech**niqu**e ****enco**urage**s ****t**he**
    ****mo**del** ****t**o** ****ide**ntif**y ****weak**nesse**s ****i**n** ****t**he**
    ****res**pons**e ****it**sel**f ****a**nd** ****ma**ke** ****appr**opriat**e ****impr**ovemen**ts.'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: '**审查过程**可能包括关于响应不同方面的具体问题，例如准确性、风格或完整性。这种技术鼓励模型识别自身响应中的弱点，并做出适当的改进。'
- en: '[****Wh**en** ****t**o** ****u**se** ]'
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: '[**何时使用**]'
- en: '****Fee**dbac**k ****Lo**op** ****Prom**ptin**g ****sh**oul**d ****b**e** ****us**ed**
    ****wh**en** ****t**he** ****qua**lit**y ****o**f** ****t**he** ****res**pons**e
    ****i**s** ****espe**ciall**y ****impo**rtan**t, ****su**ch** ****a**s** ****i**n**
    ****situ**ation**s ****wh**ere** ****prec**isio**n ****a**nd** ****de**tai**l
    ****a**re** ****req**uire**d. ****I**t** ****i**s** ****id**eal** ****f**or**
    ****sol**vin**g ****com**ple**x ****pro**blem**s, ****answ**erin**g ****tech**nica**l
    ****ques**tion**s, ****o**r** ****dea**lin**g ****wi**th** ****to**pic**s ****wh**ere**
    ****det**ail**s ****a**re** ****cru**cia**l.'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: '**反馈循环提示**应该在响应质量特别重要的情况下使用，例如在需要精确和详细的情况下。它非常适合解决复杂问题、回答技术问题或处理需要细节的关键主题。'
- en: '****Th**is** ****tech**niqu**e ****i**s** ****al**so** ****reco**mmende**d
    ****wh**en** ****cre**atin**g ****con**ten**t ****th**at** ****req**uire**s ****con**stan**t
    ****refi**nemen**t, ****su**ch** ****a**s** ****educ**ationa**l ****te**xts**
    ****o**r** ****rep**ort**s, ****wh**ere** ****i**t** ****i**s** ****impo**rtan**t
    ****t**o** ****en**sur**e ****th**at** ****ev**ery** ****de**tai**l ****i**s**
    ****cl**ear** ****a**nd** ****under**standab**le. ****T**he** ****Fee**dbac**k
    ****Lo**op** ****c**an** ****b**e** ****us**ed** ****t**o** ****ad**jus**t ****t**he**
    ****le**vel** ****o**f** ****de**pth** ****o**f** ****t**he** ****res**pons**e
    ****acco**rdin**g ****t**o** ****t**he** ****ta**rge**t ****aud**ienc**e.'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术在创建需要持续改进的内容时也很有用，例如教育文本或报告，在这些内容中，确保每个细节都清晰易懂非常重要。反馈循环可用于根据目标受众调整回答的深度。
- en: '****Addi**tional**ly, ****Fee**dbac**k ****Lo**op** ****Prom**ptin**g ****i**s**
    ****us**efu**l ****wh**en** ****y**ou** ****wa**nt** ****t**o** ****inv**olv**e
    ****t**he** ****L**LM** ****i**n** ****t**he** ****pro**ces**s ****o**f** ****impr**ovin**g
    ****th**eir** ****o**wn** ****resp**onse**s, ****enco**uragin**g ****se**lf**-****refl**ectio**n
    ****a**nd** ****prov**idin**g ****a**** ****res**pons**e ****th**at** ****i**s**
    ****cl**ose**r ****t**o** ****wh**at** ****t**he** ****us**er** ****exp**ect**s.'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，当你想在改进自身回答的过程中涉及LLM时，反馈循环提示非常有用，鼓励自我反思并提供一个更接近用户预期的回答。
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: '[****使用提示****]'
- en: ● ****U**se** ****spe**cifi**c ****ques**tion**s ****t**o** ****gu**ide** ****yo**ur**
    ****re**vie**w ****o**f** ****t**he** ****mo**del**. ****F**or** ****exa**mpl**e,
    “****Re**vie**w ****t**he** ****an**swe**r ****a**nd** ****s**ee** ****i**f**
    ****a**ny** ****rel**evan**t ****info**rmatio**n ****i**s** ****mis**sin**g” ****o**r**
    “****Sim**plif**y ****t**he** ****expl**anatio**n ****t**o** ****ma**ke** ****i**t**
    ****mo**re** ****acce**ssibl**e ****t**o** ****begi**nner**s.”
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: ● 使用具体问题来指导你对模型的回顾。例如，“回顾答案并查看是否有任何相关信息缺失”或“简化解释以便初学者更容易理解”。
- en: ● ****Re**pea**t ****t**he** ****cy**cle** ****un**til** ****y**ou** ****a**re**
    ****sati**sfie**d ****wi**th** ****t**he** ****an**swe**r. ****Ea**ch** ****iter**atio**n
    ****sh**oul**d ****imp**rov**e ****t**he** ****an**swe**r, ****s**o** ****i**t**
    ****i**s** ****impo**rtan**t ****t**o** ****gi**ve** ****cl**ear** ****gui**danc**e
    ****wi**th** ****ea**ch** ****cy**cle**.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: ● 重复循环直到你对答案满意。每次迭代都应该改进答案，因此为每次循环提供清晰的指导很重要。
- en: '[****T**he** ****diff**erenc**e ****o**f** ****tech**niqu**e ]'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: '[****技术差异****]'
- en: '****Fee**dbac**k ****Lo**op** ****Prom**ptin**g ****i**s** ****diff**eren**t
    ****fr**om** ****Se**lf**- ****Refl**ectiv**e ****Prom**ptin**g , ****ther**efor**e,
    ****wh**ile** ****t**he** ****Se**lf**- ****Refl**ectiv**e ****Prom**ptin**g ****inv**olve**s
    ****t**he** ****mo**del** ****eval**uatin**g ****i**ts** ****res**pons**e ****on**ce**
    ****t**o** ****ide**ntif**y ****a**nd** ****cor**rec**t ****er**ror**s, ****t**he**
    ****Fee**dbac**k ****Lo**op** ****inv**olve**s ****mul**tipl**e ****revi**sion**s
    ****a**nd** ****impr**ovemen**ts, ****cre**atin**g ****a**n** ****iter**ativ**e
    ****pro**ces**s ****un**til** ****t**he** ****res**pons**e ****i**s** ****ade**quat**e.'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈循环提示与自我反思提示不同，因此，虽然自我反思提示涉及模型评估其回答以识别和纠正错误，反馈循环则涉及多次修订和改进，创建一个迭代过程，直到回答足够充分。
- en: '****Com**pare**d ****t**o** ****F**ew**-****sh**ot** ****Un**lik**e ****prom**ptin**g
    , ****wh**ich** ****se**eks** ****t**o** ****sh**ape** ****t**he** ****res**pons**e
    ****ba**sed** ****o**n** ****exa**mple**s, ****Fee**dbac**k ****Lo**op** ****Prom**ptin**g
    ****i**s** ****mo**re** ****dyn**ami**c ****a**nd** ****ada**ptiv**e. ****Ins**tea**d
    ****o**f** ****set**tin**g ****a**** ****sta**ndar**d ****i**n** ****adv**anc**e
    ****wi**th** ****exa**mple**s, ****i**t** ****ref**ine**s ****t**he** ****res**pons**e
    ****i**n** ****re**al** ****ti**me**, ****ba**sed** ****o**n** ****cont**inuou**s
    ****qua**lit**y ****cri**teri**a.'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 与**少量示例提示**相比，后者试图根据示例塑造答案，**反馈循环提示**更加动态和适应性强。它不是在提前设置一个基于示例的标准，而是在实时中根据持续的质量标准来细化答案。
- en: '****Rega**rdin**g ****St**ep**-****b**y**-****St**ep** ****Deta**ilin**g ,
    ****wh**ere** ****t**he** ****fo**cus** ****i**s** ****o**n** ****prov**idin**g
    ****a**** ****st**ep**-****b**y**-****st**ep** ****expl**anatio**n, ****Fee**dbac**k
    ****Lo**op** ****Prom**ptin**g ****foc**use**s ****o**n** ****cont**inuous**ly
    ****impr**ovin**g ****a**n** ****alr**ead**y ****gi**ven** ****an**swe**r. ****T**he**
    ****go**al** ****i**s** ****t**o** ****ma**ke** ****t**he** ****an**swe**r ****mo**re**
    ****pre**cis**e ****a**nd** ****det**aile**d, ****wh**ile** ****St**ep**-****b**y**-****St**ep**
    ****Deta**ilin**g ****ai**ms** ****t**o** ****gu**ide** ****t**he** ****re**ade**r
    ****thr**oug**h ****a**** ****pro**ces**s.'
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于逐步细化**，这里的重点是提供逐步解释，**反馈循环提示**专注于不断改进一个已经给出的答案。目标是使答案更加精确和详细，而**逐步细化**旨在引导读者通过一个过程。'
- en: '[****Exa**mple**s]'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: '[**示例**]'
- en: '●        ****Ba**sic** :'
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: ●        **基础**：
- en: '○        ****Que**stio**n : "****Wh**at** ****i**s** ****a**** ****so**lar**
    ****ecl**ips**e? "'
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: ○        **问题**："什么是日食？"
- en: '○ ****Ini**tia**l ****An**swe**r : "****A**** ****so**lar** ****ecl**ips**e
    ****i**s** ****wh**en** ****t**he** ****Mo**on** ****pa**sse**s ****bet**wee**n
    ****t**he** ****Ea**rth** ****a**nd** ****t**he** ****S**un**. "'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: ○        **初始答案**："日食是当月亮在地球和太阳之间经过时。"
- en: '○        ****Re**vie**w ( ****Fee**dbac**k ****Lo**op**) : "****Pl**eas**e
    ****re**vie**w ****th**is** ****expl**anatio**n ****f**or** ****comp**letene**ss.
    ****Pl**eas**e ****res**pon**d ****ag**ain**."'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: ○        **回顾（反馈循环）**："请回顾这个解释的完整性。请再次回答。"
- en: '○ ****Imp**rove**d ****An**swe**r : "****A**** ****so**lar** ****ecl**ips**e
    ****oc**cur**s ****wh**en** ****t**he** ****Mo**on** ****posi**tion**s ****it**sel**f
    ****dir**ectl**y ****bet**wee**n ****t**he** ****Ea**rth** ****a**nd** ****t**he**
    ****S**un**, ****comp**letel**y ****o**r** ****part**iall**y ****blo**ckin**g
    ****t**he** ****S**un**''****s**** ****li**ght**. ****I**t** ****c**an** ****b**e**
    ****se**en** ****on**ly** ****fr**om** ****so**me** ****pa**rts** ****o**f** ****t**he**
    ****Ea**rth** ****f**or** ****a**** ****sh**ort** ****pe**rio**d. "'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: ○        **改进后的答案**："日食发生在月亮直接位于地球和太阳之间，完全或部分遮挡太阳的光。它只能从地球的一些部分在短时间内看到。"
- en: '●        ****Inte**rmedia**ry :'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: ●        **中间步骤**：
- en: '○        ****Que**stio**n : "****Wh**at** ****a**re** ****t**he** ****ma**in**
    ****ben**efit**s ****o**f** ****rene**wabl**e ****en**erg**y? "'
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: ○        **问题**："可再生能源的主要好处是什么？"
- en: '○        ****Ini**tia**l ****An**swe**r : "****Rene**wabl**e ****en**erg**y
    ****i**s** ****cl**ean** ****a**nd** ****do**es** ****n**ot** ****pol**lut**e.
    "'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: ○        **初始答案**："可再生能源是清洁的，并且不会污染。"
- en: '○        ****Re**vie**w ( ****Fee**dbac**k ****Lo**op**) : "****Re**vis**e
    ****a**nd** ****ex**pan**d ****t**he** ****an**swe**r, ****incl**udin**g ****ot**her**
    ****rel**evan**t ****ben**efit**s."'
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: '○        ****Review ( ****Feedback ****Loop**) : "****Revise ****and ****expand
    ****the ****answer, ****including ****other ****relevant ****benefits."'
- en: '○ ****Imp**rove**d ****An**swe**r : "****Rene**wabl**e ****en**erg**y ****i**s**
    ****cl**ean** ****a**nd** ****n**on**-****poll**utin**g. ****I**t** ****al**so**
    ****red**uce**s ****depe**ndenc**e ****o**n** ****fo**ssi**l ****fu**els**, ****pro**mote**s
    ****lo**ng**-****te**rm** ****susta**inabili**ty , ****a**nd** ****c**an** ****cont**ribut**e
    ****t**o** ****t**he** ****lo**cal** ****eco**nom**y ****b**y** ****cre**atin**g
    ****jo**bs** ****i**n** ****sec**tor**s ****su**ch** ****a**s** ****so**lar**
    ****a**nd** ****wi**nd** ****po**wer**."'
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: '○ ****Improved ****Answer : "****Renewable ****energy ****is ****clean ****and
    ****non-polluting. ****It ****also ****reduces ****dependence ****on ****fossil
    ****fuels, ****promotes ****long-term ****sustainability, ****and ****can ****contribute
    ****to ****the ****local ****economy ****by ****creating ****jobs ****in ****sectors
    ****such ****as ****solar ****and ****wind ****power."'
