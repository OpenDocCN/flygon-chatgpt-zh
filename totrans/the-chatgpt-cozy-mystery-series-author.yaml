  type: TYPE_NORMAL
- en: 'Series Arc Milestone: Discovery of the first mystical artifact, hinting at
    the larger secret of Polperran.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Subplot: Laura''s struggle with her new abilities and the initial conflict
    with her mother over her newfound path.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Character Relationships: Introduction of Laura''s aunt and her team of paranormal
    investigators. Building trust and camaraderie with them and beginning to form
