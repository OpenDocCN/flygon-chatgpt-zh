  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我计划去[目的地]旅行[天数]天。我想有一个包括必看的景点、当地餐饮推荐和高效旅行路线的行程。请根据[轻松/冒险/文化]旅行风格进行定制。"'
- en: Exercise and Fitness Plan
  id: totrans-909
