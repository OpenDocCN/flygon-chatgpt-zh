- en: 50.Basic Prompts For Set Up a New Business
  id: totrans-3650
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 50.为新业务设立的基本提示
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-3651
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: What are the complete steps to step up a new (Your Business) .
  id: totrans-3652
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提升新（您的业务）的完整步骤是什么？
- en: I plan to open an (Your Business) in the town. How can I identify the target
    audience for the (Your Business).
  id: totrans-3653
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我计划在镇上开设一个（您的业务）。我如何确定（您的业务）的目标受众。
- en: What should be the best location of the (Your Business) in the town.
  id: totrans-3654
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: （您的业务）在镇上的最佳位置在哪里。
- en: How can I beat the competition and gain a competitive advantage for the (Your
    Business).
  id: totrans-3655
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何击败竞争对手并为（您的业务）赢得竞争优势？
- en: All these above points are already covered by the competitor. Can you suggest
    something unique for my (Your Business)?
  id: totrans-3656
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以上所有点竞争对手都已经涵盖了。您能为我（您的业务）提出一些独特的建议吗？
- en: Suggest a few names for my (Your Business) to grab the attention of the customers.
  id: totrans-3657
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为吸引客户，请为我（您的业务）提供一些名称建议。
- en: suggest me names for my (Your Business) that starts with letter M ?
  id: totrans-3658
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请为我（您的业务）提供一些以字母M开头的名称？
- en: Please make this names more engaging and personalized for my customers.
  id: totrans-3659
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请将这些名称制作得更具吸引力和个性化，以吸引我的客户。
- en: Create a marketing plan before the launch of my (Your Business) in the town.
  id: totrans-3660
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在（您的业务）在镇上开业之前制定一个营销计划。
- en: Please suggest a few catchy marketing copies for advertising the (Your Business)
    on hoardings and billboards.
  id: totrans-3661
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请为我提供一些吸引人的营销文案，用于在户外广告牌和横幅上宣传（您的业务）。
- en: Please make these marketing copies more engaging and personalized.
  id: totrans-3662
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请将这些营销文案制作得更具吸引力和个性化。
- en: Please highlight the 25% discount in these marketing copies.
  id: totrans-3663
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请在这些营销文案中突出显示25%的折扣。
- en: Please include a call to action in these marketing copies.
  id: totrans-3664
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请在这些营销文案中包含一个行动号召。
- en: Please suggest me a verbal sales pitch that can be used by the customer representative
    to invite people to the (Your Business). Please make this verbal sales pitch personalized
    for the customer.
  id: totrans-3665
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请为我提供一个口头销售方案，供客户代表邀请人们参加（您的业务）。请为顾客个性化这个口头销售方案。
- en: Please suggest a few questions that the customer might ask the representative
    about (your business/product)?
  id: totrans-3666
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请为我提供一些可能由客户向代表询问有关（您的业务/产品）的问题？
- en: Please suggest a verbal sales pitch that can be used by the customer representative
    to invite people to the (Your Business).
  id: totrans-3667
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请建议一个口头销售方案，供客户代表邀请人们到（您的业务）。
- en: Please Suggest me some pop (point of purchase) tactics for the (Your Business).
  id: totrans-3668
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请建议一些弹出（购买点）策略，用于（您的业务）。
- en: How can I use cross selling and up selling strategies for more revenue generation
    at the (Your Business)?
  id: totrans-3669
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我如何使用交叉销售和升级销售策略在（您的业务）中创造更多收入？
- en: Please suggest a pitch for the customer representative for cross selling at
    (Your Business).
  id: totrans-3670
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请为（您的业务）的客户代表建议一个交叉销售方案。
- en: Create a handout that I can give the customers at the end when they are leaving
    the (Your Business).
  id: totrans-3671
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当客户离开（您的业务）时，创建一份我可以提供给他们的手册。
- en: What are some other products that I can sell at (Your Business) for extra revenue?
  id: totrans-3672
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我可以在（您的业务）销售哪些其他产品以获得额外收入？
- en: Suggest some eye catching phrases that can be printed on the t-shirts to promote
    my (Your Business)?
  id: totrans-3673
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建议一些可以印在T恤上以推广我的（您的业务）的引人注目的短语。
- en: What are the different ways to take customer feedback at (Your Business)?
  id: totrans-3674
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在（您的业务）中，有哪些不同的方式来收集客户反馈？
- en: Can you suggest me a few comment cards that can be used at the (Your Business)
    to collect feedback from the customers?
  id: totrans-3675
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您能建议一些可以在（您的业务）使用以收集客户反馈的评论卡吗？
- en: Create a customer feedback form for the customers who bought (Your Prodcust)
    from (Your Business).
  id: totrans-3676
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为购买（您的产品）的客户创建一个客户反馈表。
- en: Can you add some quantitative questions to this particular feedback form?
  id: totrans-3677
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您能在这个特定的反馈表单中添加一些定量问题吗？
- en: Please add question only related to the customer service at the (Your Business).
  id: totrans-3678
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请仅添加与（您的业务）客户服务相关的问题。
- en: Create a marketing plan for my (Your Business) for the upcoming new year/deepawali/holi/makar
    sankranti/ independence day/woman's day/...
  id: totrans-3679
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为我的（您的业务）创建一个针对即将到来的新年/排灯节/洒红节/玛卡·桑克拉蒂/独立日/妇女节等的营销计划。
- en: Create one-liners for the (Your Business) to target the elderly people/women/children
    in the town on woman's day/ children's day / father's day/ mother's day.
  id: totrans-3680
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为（您的业务）创建一些针对镇上的老年人/妇女/儿童的标语，用于妇女节/儿童节/父亲节/母亲节。
- en: List down some catchy taglines for the (Your Business).
  id: totrans-3681
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 列出一些吸引人的标语，用于（您的业务）。
- en: What would be the target audience online considering the (Your Business) sales
    only through online websites to the indian market ?
  id: totrans-3682
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑到（您的业务）仅通过在线网站向印度市场销售，在线的目标受众群体是什么？
- en: What are ways to generate the most leads and impressions on facebook social
    media platform for (Your Business)?
  id: totrans-3683
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有哪些方法可以在Facebook社交媒体平台上为（您的业务）生成最多的潜在客户和印象？
- en: List out the ways to optimize a (Your Business) facebook page.
  id: totrans-3684
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 列出优化（您的业务）Facebook页面的方法。
- en: What are the most effective ways to run targeted facebook ads for the marketing
    of the (Your Business)?
  id: totrans-3685
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运营针对（您的业务）营销的定向Facebook广告的最有效方式是什么？
- en: Please list out some high search volume hashtags for a (Your Business) to inhence
    outreach on Instagram.
  id: totrans-3686
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请列出一些高搜索量的标签，以增强（您的业务）在Instagram上的影响力。
- en: Please suggest some mind blowing captions for creating posts on Instagram regarding
    (Your Business).
  id: totrans-3687
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请提出一些令人惊叹的标题，用于在Instagram上创建关于（您的业务）的帖子。
- en: Create a digital marketing brand for my (Your Business) for upcoming new year
    .
  id: totrans-3688
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为我的（您的业务）创建一个针对即将到来的新年的数字营销品牌。
- en: Create a gratitude letter to be sent to the regular customer on dewali for the
    (Your Business).
  id: totrans-3689
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为（您的业务）在排灯节期间发送给常客的感谢信。
- en: Suggest me ways to create an e-mail marketing campaign for my (Your Business).
  id: totrans-3690
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建议我创建电子邮件营销活动的方法，用于我的（您的业务）。
- en: List out some eye catchy e -mail subject lines to grab customer's attention
    for (Your Business).
  id: totrans-3691
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 列出一些吸引眼球的电子邮件主题行，以吸引（您的业务）客户的注意。
- en: Could you write a cold e -mail to persuade to a potential customer who is interested
    in buying (Your Product) ?
  id: totrans-3692
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您能写一封冷邮件来劝说一位对购买（您的产品）感兴趣的潜在客户吗？
- en: Could you write a cold email for my (Your Business) targeting elderly people?
  id: totrans-3693
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您能为我（您的业务）写一封针对老年人的冷邮件吗？
- en: Suggest me short tail keywords for optimizing seo for a (Your Business) website.
  id: totrans-3694
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建议一些短尾关键词，以优化（您的业务）网站的SEO。
- en: Please suggest long tail keywords for (Your Business) well.
  id: totrans-3695
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请为（您的业务）建议一些长尾关键词。
- en: What are the types for backings I should focus on for (Your Business). Please
    suggest a few?
  id: totrans-3696
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于（您的业务），我应该关注哪些类型的支持。请建议几个？
- en: What are the different ways to take customer feedback on the (Your product)
    they bought from our website ?
  id: totrans-3697
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于客户从我们的网站购买的产品，有哪些不同的方式来收集客户反馈？
