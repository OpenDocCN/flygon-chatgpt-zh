  zh: 这本入门指南为您提供了可以立即使用的实用知识和技能。AI 领域始终在发展，因此跟上最新新闻对于稳步进步至关重要。在这个领域的学习是一个不断迭代的过程，永远不会结束，所以保持实验态度，保持兴趣，并开放接受新经验。
- en: Not only does this course teach you the ropes, but it also gives you the tools
