  prefs: []
  type: TYPE_NORMAL
  zh: 前一个命令的输出如下：
- en: '[PRE36]'
  id: totrans-536
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Check the online documentation and also experiment with help() and dir() when
    you need additional information about a particular function or module.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 检查在线文档，并在需要有关特定函数或模块的附加信息时，尝试使用 help() 和 dir()。
- en: '**COMPILE TIME AND RUNTIME CODE CHECKING**'
  id: totrans-538
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**编译时和运行时代码检查**'
- en: Python performs some compile-time checking, but most checks (including type,
    name, and so forth) are *deferred* until code execution. Consequently, if your
    Python code references a user-defined function that does not exist, the code will
    compile successfully. In fact, the code will fail with an exception *only* when
    the code execution path references the non-existent function.
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: Python 执行一些编译时检查，但大多数检查（包括类型、名称等）都推迟到代码执行。因此，如果你的 Python 代码引用了一个不存在的用户定义函数，代码将成功编译。实际上，代码只有在代码执行路径引用了该不存在的函数时才会失败，并抛出异常。
- en: 'As a simple example, consider the following function myFunc that references
    the non-existent function called DoesNotExist:'
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 作为简单的示例，考虑以下函数 myFunc，它引用了一个不存在的名为 DoesNotExist 的函数：
- en: '[PRE37]'
  id: totrans-541
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: The preceding code will only fail when the myFunc function has passed the value
    3, after which Python raises an error.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 myFunc 函数传递了值 3，则前面的代码将失败，之后 Python 会引发错误。
- en: In [Chapter 2](ch02.xhtml), you will learn how to define and invoke user-defined
    functions, along with an explanation of the difference between local versus global
    variables in Python.
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [第 2 章](ch02.xhtml) 中，你将学习如何定义和调用用户自定义函数，以及解释 Python 中局部变量和全局变量的区别。
- en: Now that you understand some basic concepts (such as how to use the Python interpreter)
    and how to launch your custom modules, the next section discusses primitive data
    types.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经理解了一些基本概念（例如如何使用 Python 解释器）以及如何启动自定义模块，下一节将讨论原始数据类型。
- en: '**SIMPLE DATA TYPES**'
  id: totrans-545
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**简单数据类型**'
- en: Python supports primitive data types, such as numbers (integers, floating point
    numbers, and exponential numbers), strings, and dates. Python also supports more
    complex data types, such as lists (or arrays), tuples, and dictionaries, all of
    which are discussed in [Chapter 3](ch03.xhtml). The next several sections discuss
    some of the Python primitive data types, along with code snippets that show you
    how to perform various operations on those data types.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: Python 支持原始数据类型，例如数字（整数、浮点数和指数数）、字符串和日期。Python 还支持更复杂的数据类型，如列表（或数组）、元组和字典，这些内容将在
    [第 3 章](ch03.xhtml) 中讨论。接下来的几节将讨论一些 Python 原始数据类型，以及一些代码片段，展示如何对这些数据类型执行各种操作。
