  zh: 15.越南：3500万用户（累计68.66%）
- en: These 15 countries together accounted for approximately 68.66% of the world’s
    Internet users in 2012.
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: 这15个国家共同占2012年全球互联网用户的约68.66%。
- en: 'Analysis Case 7.2: Analysis Case Using MOVIES Data'
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例7.2：使用MOVIES数据进行分析
- en: Analysis with Excel
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel进行分析
- en: Let’s do an additional exercise to investigate another way to interpret a Pareto
    chart. Using the Case Dataset files, find the file Movies.xlsx. Open Movies.xlsx
    using Excel. Following our practice of not changing the raw data, select all rows
    and columns and copy them into the buffer. Paste the data into a new spreadsheet
    and label the tab “Working Data.”
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进行一个额外的练习，以研究解释帕累托图的一种另一种方式。使用案例数据集文件，找到Movies.xlsx文件。使用Excel打开Movies.xlsx。遵循我们不更改原始数据的惯例，选择所有行和列并将它们复制到缓冲区。将数据粘贴到新的工作表中，并将标签命名为“工作数据”。
- en: 'We are going to answer this question:'
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将回答这个问题：
- en: Which movies contributed the most revenue to the industry?
  id: totrans-1032
  prefs: []
  type: TYPE_NORMAL
  zh: 哪些电影对行业收入贡献最大？
- en: Let’s use total revenue as our criteria. Sort the data file by total revenue.
    Create total revenue at the bottom of the column. Create a variable on an empty
    column on the right and enter a computed variable of the percent revenue of each
    movie with respect to the total of all movies. Make the variable a percentage
    with no decimals so it can be read easily. On another empty column to the right,
    create a computed variable where you enter the cumulative distribution results.
    Highlight the top rows up to the 80% cumulative result. Plot the CDF ([Figure
    7.8](#fig7-8)). What do you notice? What does it tell you?
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以总收入作为我们的标准。按总收入对数据文件进行排序。在列的底部创建总收入。在右侧的空列中创建一个变量，并输入每个电影相对于所有电影总收入的百分比计算变量。将该变量设置为没有小数的百分比，以便易于阅读。在右侧的另一空列中创建一个计算变量，在其中输入累积分布结果。高亮显示累积结果达到80%的前几行。绘制累积分布函数(CDF)[图7.8](#fig7-8)。你注意到了什么？这告诉了你什么？
- en: '![image](images/pg147.jpg)'
  id: totrans-1034
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg147.jpg)'
- en: FIGURE 7.8 Illustration of a situation where the Pareto analysis leads to the
    conclusion that there no significant few
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.8 帕累托分析导致得出没有显著少数情况的说明
- en: Analysis with R
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: 使用R的分析
- en: Using the Case Dataset files provided, find the file Movies.xlsx. Open it with
    Jamovi. Make sure the program identifies the “Movie” variable as a categorical
    variable. Also, make sure the “Domestic Revenue” variable is identified as a numeric
    variable. The parameters for a Jamovi Pareto analysis are shown in [Figure 7.9](#fig7-9).
    Since there are over 200 movies on the list, the Pareto chart will be very wide.
    To get a reasonable diagram, delete all but the top 25 movies (the list is sorted
    by the biggest earners). The resulting diagram is something like that shown in
    [Figure 7.10](#fig7-10). The diagram is challenging to work with since the axis
    is difficult to read, and there are no parameters to make the chart more legible
    in Jamovi.
  id: totrans-1037
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，找到Movies.xlsx文件。用Jamovi打开它。确保程序将“电影”变量识别为分类变量。同时，确保“国内收入”变量被识别为数值变量。Jamovi帕累托分析的相关参数显示在[图7.9](#fig7-9)中。由于列表上有超过200部电影，帕累托图将会非常宽。为了得到一个合理的图表，删除除了前25部电影（按收入最高排序）之外的所有电影。得到的图表类似于[图7.10](#fig7-10)中所示。由于坐标轴难以阅读，且Jamovi中没有参数可以使图表更易于阅读，因此这个图表处理起来比较困难。
- en: '![image](images/pg148_1.jpg)'
  id: totrans-1038
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg148_1.jpg)'
- en: FIGURE 7.9 Setting up the Pareto chart in Jamovi
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.9 在Jamovi中设置帕累托图
- en: '![image](images/pg148_2.jpg)'
  id: totrans-1040
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg148_2.jpg)'
- en: FIGURE 7.10 Pareto chart of the biggest movie earners, showing the crowded x-axis
  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.10 最大收入电影帕累托图，显示拥挤的x轴
- en: Analysis with Generative AI
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: 使用生成式AI的分析
- en: 'The following prompt was given to ChatGPT: “Create a Pareto chart for the movies
    by domestic revenue from the dataset uploaded. Only show to top 20 movies.”'
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: 给ChatGPT的以下提示：“从上传的数据集中创建按国内收入的帕累托图，只显示前20部电影。”
- en: 'Response from ChatGPT ([Figure 7.11](#fig7-11)):'
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复([图7.11](#fig7-11))：
- en: '![image](images/pg149.jpg)'
  id: totrans-1045
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg149.jpg)'
- en: FIGURE 7.11 Pareto chart of the top 20 movie earners
  id: totrans-1046
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.11 顶级20部电影收入帕累托图
- en: ChatGPT Answers to the Framed Analytical Questions
  id: totrans-1047
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT对框架分析问题的回答
- en: We now use ChatGPT to obtain more detailed answers to the framed questions provided
    by the generative AI tool. Remember that the relevant data file has already been
    loaded into ChatGPT for the previous computation. This is a continuation of the
    analysis, and the prompt obtained the results that follow.
  id: totrans-1048
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在使用ChatGPT来获取生成式AI工具提供的框架问题的更详细答案。记住，相关数据文件已经为之前的计算加载到ChatGPT中。这是分析的延续，并且获得的提示得到了以下结果。
- en: 'Prompt: “The Pareto chart does not show a knee, and it is hard to determine
    the ‘top’ few that contain ‘the most’ to revenue. Why is that? How many movies
    does it take to accumulate 80% of the total revenue?”'
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“帕累托图没有显示拐点，很难确定包含‘最多’收入的‘顶尖’几部电影。为什么？需要多少部电影才能积累到总收入的80%？”
- en: 'Response from ChatGPT:'
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: It takes 195 movies to accumulate 80% of the total domestic revenue. This indicates
    that the distribution of revenue is quite spread out among a large number of movies,
    which is why the Pareto chart does not show a clear “knee” or “inflection point.”
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: 需要195部电影才能积累到总国内收入的80%。这表明收入分布在大约众多电影中相当分散，这也是为什么帕累托图没有显示出明显的“拐点”或“拐点”。
- en: 'Analysis Case 7.3: Analysis Case Using ORDERS Data'
  id: totrans-1052
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例7.3：使用ORDERS数据集的分析案例
- en: Analysis with Excel
  id: totrans-1053
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel的分析
- en: Using the Case Dataset files, find the file ORDERS.xlsx. Open ORDERS.xlsx using
    Excel.
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: 使用案例数据集文件，找到名为 ORDERS.xlsx 的文件。使用 Excel 打开 ORDERS.xlsx。
- en: 'We are going to answer this question:'
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将回答以下问题：
- en: Which provinces generated the most orders?
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: 哪些省份产生了最多的订单？
- en: Create a pivot table of orders by province to tabulate the amount for each.
    Sort the pivot table provinces by the greatest number of orders first ([Figure
    7.12](#fig7-12)). Note the computed total of all orders.
  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: 按省份创建订单的交叉表，以列出每个省份的金额。首先按订单数量最多的省份对交叉表省份进行排序（[图7.12](#fig7-12)）。注意所有订单的总计。
- en: '![image](images/pg150.jpg)'
  id: totrans-1058
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg150.jpg)'
- en: FIGURE 7.12 How to set up the pivot table to tabulate orders by province
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.12 如何设置交叉表以按省份列出订单
- en: Let’s create a Pareto chart using the count of orders by province. Create a
    new variable next to the pivot table and enter the percentage of each province’s
    orders into it. Then, compute a second new variable as the cumulative distribution
    function. Select the provinces that account for 80% of all orders. Is that 20%
    of all provinces? Do you see a “knee” in the curve? Can you identify the provinces
    with the “most” orders ([Figure 7.13](#fig7-13))?
  id: totrans-1060
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用省份订单计数创建一个帕累托图。在交叉表旁边创建一个新变量，并将每个省份订单的百分比输入其中。然后，计算第二个新变量作为累积分布函数。选择占所有订单80%的省份。这是所有省份的20%吗？你能在曲线上看到“拐点”吗？你能识别出订单“最多”的省份（[图7.13](#fig7-13)）？
- en: '![image](images/pg151.jpg)'
  id: totrans-1061
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg151.jpg)'
- en: FIGURE 7.13 A Pareto analysis showing which provinces contribute the most orders
    to the total
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.13 展示哪些省份对总订单数量贡献最大的帕累托分析
- en: Analysis with R
  id: totrans-1063
  prefs: []
  type: TYPE_NORMAL
  zh: 使用R进行分析
- en: Using the provided Case Dataset files, locate the file named Orders by Province.xlsx.
    Open this file using Jamovi. Ensure that the program identifies the “Province”
    variable as a categorical variable. To make the provinces clear on the x-axis
    of the Pareto chart, assign each province a code, such as a number or letter (e.g.,
    A, B, or C). Use these province codes in place of the province names for the chart.
    Ensure that the “Sum of Sales” variable is identified as a numeric variable.
  id: totrans-1064
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，找到名为“按省份订单.xlsx”的文件。使用Jamovi打开此文件。确保程序将“省份”变量识别为分类变量。为了在帕累托图的x轴上使省份清晰，为每个省份分配一个代码，例如数字或字母（例如，A、B或C）。在图表中使用这些省份代码代替省份名称。确保将“销售总额”变量识别为数值变量。
- en: For the Pareto analysis in Jamovi, refer to the parameters shown in [Figure
    7.14](#fig7-14). The resulting diagram should be similar to the one shown in [Figure
    7.15](#fig7-15).
  id: totrans-1065
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Jamovi中的帕累托分析，参考[图7.14](#fig7-14)中显示的参数。生成的图表应类似于[图7.15](#fig7-15)中显示的图表。
- en: '![image](images/pg152.jpg)'
  id: totrans-1066
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg152.jpg)'
- en: FIGURE 7.14 Setting up the Pareto chart in Jamovi
  id: totrans-1067
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.14 在Jamovi中设置帕累托图
- en: '![image](images/pg153.jpg)'
  id: totrans-1068
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg153.jpg)'
- en: FIGURE 7.15 Pareto chart of provinces that contribute the most to total sales
    revenue
  id: totrans-1069
  prefs: []
  type: TYPE_NORMAL
