- en: Now that you have seen some basic examples of lines in the Euclidean plane,
    let’s look at some code samples that use NumPy and Matplotlib to display scatterplots
    of points in the plane.
  id: totrans-954
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经看到了欧几里得平面中一些基本线条的例子，让我们看看一些使用 NumPy 和 Matplotlib 显示平面中点散点图的代码示例。
- en: '**PLOTTING RANDOMIZED POINTS WITH NUMPY AND MATPLOTLIB**'
  id: totrans-955
  prefs:
  - PREF_H3
