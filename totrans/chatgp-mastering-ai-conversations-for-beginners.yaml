  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 当你**可以**使用ChatGPT为你**编写**代码时，**是否**让你**接管**你的编码工作流**仍然**是一个**悬而未决**的问题。**正如**任何事物一样，使用ChatGPT作为你的**一站式**编码商店**既有**优点**也有**缺点**。其中**主要**优点之一是ChatGPT可以**以极快的速度**为你生成代码片段。它**还**能够**更频繁地**得到代码的**语法（“句子”结构），这**使得**它**比**通常**雇佣**来**为你**完成**这项工作的**跑龙套**程序员**更好**。这**可以**在**运行时**避免**人类**在**从零开始**编写**代码**时**犯下的**许多**头痛的**错误**。**此外**，ChatGPT拥有**广泛**的编码**专业知识**数据库，来自**广泛的**编程背景。这意味着它**可以**为**编码**问题**提供**更多**创新**的**解决方案，这些问题**即使是**单**脑**的、**单****视角**的**人类**可能**都没有**想过，甚至**不知道**。
