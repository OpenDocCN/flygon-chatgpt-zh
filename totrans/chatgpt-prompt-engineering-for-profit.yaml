    ****co**sts**, ****resu**ltin**g ****i**n** ****ineq**ualit**y ****i**n** ****ac**ces**s
    ****t**o** ****trea**tment**s, ****bene**fitin**g ****on**ly** ****a**** ****sm**all**
    ****por**tio**n ****o**f** ****t**he** ****popu**latio**n. "'
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: ■ **悲观情景**：“**进步将受到伦理问题和高昂成本的限制，导致治疗可及性不平等，仅惠及人口的一小部分**。”
- en: '■ ****Me**diu**m ****Sce**nari**o: "****Th**ere** ****wi**ll** ****b**e** ****sign**ifican**t
    ****pro**gres**s, ****b**ut** ****ac**ces**s ****wi**ll** ****b**e** ****une**qua**l,
    ****wi**th** ****ben**efit**s ****conc**entrat**ed ****i**n** ****deve**lope**d
    ****coun**trie**s ****a**nd** ****limi**tation**s ****i**n** ****le**ss** ****deve**lope**d
    ****coun**trie**s. "'
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: ■ **中等情景**：“**将有显著进步，但可及性将不平等，好处集中在发达国家，在欠发达国家有限**。”
- en: '****Pr**omp**t ****exer**cise**s ****us**ing** ****t**he** ****ab**ove** ****tech**niqu**e]'
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用上述技术进行提示练习**]'
- en: '****A**sk** ****t**he** ****mo**del** ****t**o** ****ima**gin**e "****H**ow**
    ****mi**ght** ****nuc**lea**r ****po**wer** ****ev**olv**e ****i**n** ****t**he**
    ****ne**xt** ****5**0** ****ye**ars**?" ****a**nd** ****des**crib**e ****th**ree**
    ****scen**ario**s: ****opti**misti**c, ****pess**imisti**c ****a**nd** ****ave**rag**e.'
  id: totrans-863
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**询问**模型想象“**在未来50年，核能可能会如何发展**？”并描述三种情景：乐观、悲观和平均。'
- en: '****A**sk** ****t**he** ****mo**del** ****t**o** ****exp**lor**e "****Wh**at**
    ****wi**ll** ****b**e** ****t**he** ****im**pac**t ****o**f** ****urba**nizati**on
    ****o**n** ****ru**ral** ****ar**eas** ****b**y** ****20**50**?", ****deve**lopin**g
    ****a**n** ****opti**misti**c ****sce**nari**o ****o**f** ****sust**ainabl**e
    ****adap**tatio**n, ****a**** ****pess**imisti**c ****o**ne** ****o**f** ****envir**onment**al
    ****degr**adatio**n, ****a**nd** ****a**** ****me**diu**m ****sce**nari**o ****o**f**
    ****gra**dua**l ****urba**nizati**on.'
  id: totrans-864
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提出**模型来探索“**到2050年，城市化对农村地区的影响将是什么**？”的问题，开发一个可持续适应的乐观情景，一个环境退化的悲观情景，以及一个渐进城市化的中等情景。'
- en: '****A**sk** ****t**he** ****mo**del**, “****Wh**at** ****a**re** ****t**he**
    ****pos**sibl**e ****fut**ure**s ****f**or** ****pri**vat**e ****sp**ace** ****expl**oratio**n?”
    ****a**nd** ****ha**ve** ****i**t** ****exp**lor**e ****diff**eren**t ****scen**ario**s,
    ****cons**iderin**g ****fina**ncia**l, ****poli**tica**l, ****a**nd** ****techn**ologic**al
    ****is**sue**s.'
  id: totrans-865
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**询问**模型，“**私人空间探索的可能未来有哪些**？”并让它探索不同的情景，考虑金融、政治和技术问题。'
- en: '****Sce**nari**o ****Pla**nnin**g ****he**lps** ****u**s** ****unde**rstan**d
    ****a**nd** ****pre**par**e ****f**or** ****diff**eren**t ****fu**tur**e ****possi**biliti**es,
    ****incr**easin**g ****o**ur** ****abi**lit**y ****t**o** ****ma**ke** ****stra**tegi**c
    ****deci**sion**s ****a**nd** ****anti**cipat**e ****chal**lenge**s. ****I**f**
    ****y**ou** ****ha**ve** ****a**ny** ****fur**the**r ****ques**tion**s ****o**r**
    ****wo**uld** ****li**ke** ****t**o** ****le**arn** ****mo**re** ****ab**out**
    ****a**ny** ****o**f** ****t**he** ****tech**nique**s, ****I**** ****a**m** ****a**t**
    ****yo**ur** ****dis**posa**l!'
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: '**情景规划帮助我们理解和准备应对不同的未来可能性，增加我们做出战略决策和预见挑战的能力。如果您有任何其他问题或想了解更多关于任何技术的信息，我在这里随时为您服务！**'
- en: '****1**7**. ****Ro**le** ****Rev**ersa**l ****Prom**ptin**g (****Ro**le** ****Rev**ersa**l)'
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: '**17. 角色反转提示（**角色反转**）'
- en: '[****Wh**at** ****i**s** ]'
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: '[**什么是**]'
- en: '****Ro**le** ****Rev**ersa**l ****Prom**ptin**g , ****o**r** ****Ro**le** ****Rev**ersa**l,
    ****i**s** ****a**** ****pr**omp**t ****engi**neerin**g ****tech**niqu**e ****th**at**
    ****inv**olve**s ****as**kin**g ****t**he** ****L**LM** ****t**o** ****an**swe**r
    ****a**** ****que**stio**n ****o**r** ****exp**lor**e ****a**** ****sce**nari**o
    ****b**y** ****ass**umin**g ****a**n** ****inv**ers**e ****o**r** ****diff**eren**t
    ****pers**pectiv**e ****th**an** ****t**he** ****conv**ention**al ****o**ne**.
    ****Ra**the**r ****th**an** ****si**mpl**y ****answ**erin**g ****a**** ****que**stio**n
    ****fr**om** ****t**he** ****conv**ention**al ****pers**pectiv**e, ****t**he**
    ****mo**del** ****i**s** ****inv**ite**d ****t**o** "****sw**itc**h ****ro**les**"
    ****a**nd** ****vi**ew** ****t**he** ****situ**atio**n ****fr**om** ****a**n**
    ****alte**rnativ**e ****view**poin**t, ****prov**idin**g ****a**** ****de**epe**r
    ****a**nd** ****mo**re** ****reve**alin**g ****ana**lysi**s.'
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 角色反转提示，或简称为角色反转，是一种提示工程技术，涉及让LLM通过假设与传统视角相反或不同的视角来回答问题或探索场景。而不是简单地从传统视角回答问题，模型被邀请“切换角色”并从替代视角看待情况，从而提供更深入和更揭示性的分析。
- en: '****Th**is** ****tech**niqu**e ****i**s** ****us**ed** ****t**o** ****exp**lor**e
    ****t**he** ****impl**icatio**ns ****o**f** ****diff**eren**t ****ro**les** ****i**n**
    ****a**** ****situ**atio**n, ****off**erin**g ****a**** ****bro**ade**r ****vi**ew**
    ****th**at** ****cons**ider**s ****mul**tipl**e ****pers**pectiv**es. ****Th**is**
    ****mi**ght** ****inc**lud**e, ****f**or** ****exa**mpl**e, ****put**tin**g ****t**he**
    ****mo**del** ****i**n** ****t**he** ****ro**le** ****o**f** ****a**** ****cr**iti**c
    ****ra**the**r ****th**an** ****a**n** ****adv**ocat**e, ****o**r** ****imag**inin**g
    ****t**he** ****pers**pectiv**e ****o**f** ****a**** ****pe**rso**n ****aff**ecte**d
    ****b**y** ****a**** ****po**lic**y ****ra**the**r ****th**an** ****t**he** ****o**ne**
    ****impl**ementi**ng ****i**t** .'
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术用于探索情境中不同角色的含义，提供了一个更广泛的视角，考虑了多个视角。例如，这可能包括让模型扮演一个批评者而不是一个倡导者的角色，或者想象一个受政策影响的人的视角，而不是执行该政策的人。
- en: '[****Wh**at** ****i**s** ****yo**ur** ****ma**in** ****obje**ctiv**e ]'
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: '[你的主要目标是什么？]'
- en: '****T**he** ****ma**in** ****obje**ctiv**e ****o**f** ****Ro**le** ****Rev**ersa**l
    ****Prom**ptin**g ****inv**olve**s ****prov**idin**g ****a**** ****compr**ehensi**ve
    ****a**nd** ****empa**theti**c ****vi**ew** ****o**f** ****a**** ****situ**atio**n
    ****b**y** ****as**kin**g ****t**he** ****mo**del** ****t**o** “****p**ut** ****them**selve**s
    ****i**n** ****som**eon**e ****el**se**’****s**** ****sh**oes**.” ****Th**is**
    ****i**s** ****extr**emel**y ****us**efu**l ****f**or** ****under**standi**ng
    ****n**ot** ****on**ly** ****t**he** ****ben**efit**s ****o**f** ****a**** ****dec**isio**n,
    ****b**ut** ****al**so** ****t**he** ****pote**ntia**l ****neg**ativ**e ****imp**act**s,
    ****a**s** ****we**ll** ****a**s** ****prom**otin**g ****cri**tica**l ****a**nd**
    ****multid**imension**al ****ana**lysi**s.'
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 角色反转提示的主要目标是通过让模型“站在他人的立场”来提供对情境的全面和同理心视角。这对于理解决策的益处以及潜在的负面影响都极为有用，同时也有助于促进批判性和多维分析。
- en: '****Ano**the**r ****go**al** ****i**s** ****t**o** ****exp**lor**e ****argu**ment**s
    ****a**nd** ****counte**rargumen**ts ****t**o** ****faci**litat**e ****a**** ****de**epe**r
    ****under**standi**ng ****o**f** ****a**n** ****is**sue**. ****B**y** ****as**kin**g
    ****t**he** ****L**LM** ****t**o** ****res**pon**d ****fr**om** ****a**** ****pers**pectiv**e
    ****opp**osit**e ****t**o** ****t**he** ****o**ne** ****th**ey** ****init**iall**y
    ****ado**pte**d, ****Ro**le** ****Rev**ersa**l ****he**lps** ****dev**elo**p ****mo**re**
    ****bal**ance**d ****reas**onin**g ****b**y** ****expl**orin**g ****bo**th** ****si**des**
    ****o**f** ****a**n** ****is**sue**.'
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个目标是探索论点和反论点，以促进对问题的更深入理解。通过让语言模型从与最初采纳的观点相反的视角进行回答，角色反转帮助通过探索问题的两个方面来发展更平衡的推理。
- en: '[****H**ow** ****i**t** ****wo**rks** ]'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: '[它是如何工作的]'
- en: '****Ro**le** ****Rev**ersa**l ****Prom**ptin**g ****wo**rks** ****b**y** ****as**kin**g
    ****t**he** ****L**LM** ****t**o** ****ad**opt** ****a**n** ****alte**rnativ**e
    ****pers**pectiv**e, ****usu**all**y ****fr**om** ****t**he** ****po**int** ****o**f**
    ****vi**ew** ****o**f** ****ano**the**r ****pe**rso**n, ****gr**oup** ****o**r**
    ****en**tit**y ****inv**olve**d ****i**n** ****t**he** ****situ**atio**n. ****I**t**
    ****c**an** ****b**e** ****us**ed**, ****f**or** ****exa**mpl**e, ****t**o** ****ana**lyz**e
    ****pu**bli**c ****pol**icie**s, ****bus**ines**s ****deci**sion**s ****o**r**
    ****so**cia**l ****is**sue**s ****fr**om** ****t**he** ****pers**pectiv**e ****o**f**
    ****t**he** ****diff**eren**t ****ac**tor**s ****imp**acte**d.'
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 角色反转提示通过要求语言模型采纳一个替代视角，通常是从涉及该情境的另一个人、群体或实体的观点出发。它可以用来分析从不同受影响者的视角看，例如，公共政策、商业决策或社会问题。
- en: '****F**or** ****exa**mpl**e, ****wh**en** ****as**ked** “****Wh**at** ****a**re**
    ****t**he** ****ben**efit**s ****o**f** ****auto**matin**g ****a**** ****fac**tor**y?”,
    ****t**he** ****L**LM** ****co**uld** ****an**swe**r ****fr**om** ****t**he**
    ****pers**pectiv**e ****o**f** ****t**he** ****fac**tor**y ****ow**ner**s, ****high**lighti**ng
    ****incr**ease**d ****prod**uctivi**ty ****a**nd** ****red**uce**d ****co**sts**.
    ****Th**en**, ****us**ing** ****Ro**le** ****Rev**ersa**l, ****t**he** ****mo**del**
    ****co**uld** ****b**e** ****inst**ructe**d ****t**o** ****exp**lor**e ****th**is**
    ****situ**atio**n ****fr**om** ****t**he** ****pers**pectiv**e ****o**f** ****t**he**
    ****wor**ker**s, ****high**lighti**ng ****con**cern**s ****ab**out** ****unem**ployme**nt
    ****a**nd** ****t**he** ****im**pac**t ****o**n** ****th**eir** ****fam**ilie**s.'
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当被问及“自动化工厂的好处是什么？”时，语言模型可以从工厂主人的角度回答，强调生产力的提高和成本的降低。然后，使用角色反转，模型可以被指示从工人的角度探索这种情况，强调关于失业和对他们家庭影响的担忧。
- en: '****Ro**le** ****rev**ersa**l ****al**low**s ****t**he** ****mo**del** ****t**o**
