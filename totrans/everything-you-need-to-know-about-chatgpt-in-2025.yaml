  prefs: []
  type: TYPE_NORMAL
  zh: '**API**是一个工具和协议集合，允许开发者与一个应用程序或系统（例如ChatGPT）进行交互。通过API，开发者可以将ChatGPT的能力集成到他们自己的应用程序、网站或系统中，从而实现与语言模型的自动化交互。'
