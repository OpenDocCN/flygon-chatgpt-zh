  zh: 响应。调用 ChatGPTClient.java 的结果
- en: Did you notice in the preceding listing that the answer to my prompt was truncated?
    “Additionally, Java has a" is not a full sentence, but since I requested that
    no more than 256 tokens should be used in the response, it didn’t go beyond that
    limitation.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 你注意到在前面的列表中，我对提示的回答被截断了吗？“此外，Java有一个”不是一个完整的句子，但由于我要求响应中不超过256个标记，它没有超过这个限制。
- en: Conclusion
  id: totrans-298
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Contrary to popular belief, ChatGPT is not a mind-reader! It doesn’t have the
    ability to replace developers and architects because it’s (gasp!) artificially
    intelligent. It’s very useful to ask a single question and receive an immediate,
    straightforward response. It definitely can be used to convert a natural language
    prompt (or request) into code, but you definitely need a developer to make the
    judgment call if the resulting code should be used, refined, or completely disregarded.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 与流行观点相反，ChatGPT不是读心者！它没有能力取代开发者和架构师，因为它（惊讶！）是人工智能。它非常有用，可以提出一个问题并立即得到直接回答。它确实可以用来将自然语言提示（或请求）转换为代码，但你绝对需要一个开发者来判断生成的代码是否应该被使用、改进或完全忽略。
