- en: The neon lights of Neo-Tokyo flickered overhead as Kai ducked behind a rusted
    air vent. The bounty hunter was close—he could hear the sharp click of boots on
    the wet pavement.
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
