- en: Front-End Development
  id: totrans-548
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前端开发
- en: The front end is where creativity meets functionality. This chapter dives into
    prompts that help you craft beautiful, responsive, and user-friendly interfaces.
    Whether using HTML, CSS, or JavaScript frameworks, these prompts will make your
    designs come alive.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 前端是创意与功能交汇的地方。本章深入探讨有助于您制作美观、响应式和用户友好的界面的提示。无论使用 HTML、CSS 还是 JavaScript 框架，这些提示都将使您的设计栩栩如生。
