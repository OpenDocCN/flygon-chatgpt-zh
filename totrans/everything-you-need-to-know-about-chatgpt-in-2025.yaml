  prefs: []
  type: TYPE_NORMAL
  zh: '**他们**是**AI**模型，旨在从先前示例中生成新内容，例如**文本**、**图像**或**音乐**。在ChatGPT的上下文中，**生成模型**是一个系统，经过训练以创建对给定输入（如提示）连贯且相关的文本。更先进的生成模型，如GPT，能够生成模仿人类创造性的响应。'
