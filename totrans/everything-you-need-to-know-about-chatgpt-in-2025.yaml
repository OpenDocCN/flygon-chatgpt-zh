  zh: '**聊天机器人**是一种软件程序，旨在模拟与人类用户的对话。ChatGPT可以用作聊天机器人，实时响应用户查询。聊天机器人可用于客户服务、虚拟助手、以及许多其他领域，自动化通信任务。'
- en: '****1****2****. ****Custo**mi**za**tio**n:'
