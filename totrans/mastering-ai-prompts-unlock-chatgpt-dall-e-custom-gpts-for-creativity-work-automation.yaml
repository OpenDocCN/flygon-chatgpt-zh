  type: TYPE_NORMAL
  zh: 使用数字技术的文化风格
- en: Abstract textures with realistic forms
  id: totrans-1331
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 抽象纹理与写实形态的结合
- en: How to Prompt for Art Style
  id: totrans-1332
  prefs: []
  type: TYPE_NORMAL
  zh: 如何提示艺术风格
- en: 'Use clear phrases in your prompts, such as:'
  id: totrans-1333
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的提示中使用清晰的短语，例如：
- en: “In the style of…”
  id: totrans-1334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “以……的风格”
- en: “Rendered as a…”
  id: totrans-1335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “以……呈现”
- en: “Inspired by [artist/style]”
  id: totrans-1336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “受[艺术家/风格]启发”
- en: “With [medium] texture”
  id: totrans-1337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “带有[介质]纹理”
- en: 'Examples:'
  id: totrans-1338
  prefs: []
  type: TYPE_NORMAL
  zh: 例子：
- en: “A calm mountain lake at dawn, watercolor style with soft pastels.”
  id: totrans-1339
  prefs: []
  type: TYPE_NORMAL
  zh: “黎明时分宁静的山湖，水彩风格，柔和的粉彩。”
- en: “A futuristic robot dog, hyper-detailed 3D model with cyberpunk lighting.”
  id: totrans-1340
  prefs: []
  type: TYPE_NORMAL
  zh: “一个未来派的机器人狗，超详细的 3D 模型，带有赛博朋克风格的光线。”
- en: “A surreal dreamscape, Salvador Dalí-inspired, with melting clocks and impossible
    architecture.”
  id: totrans-1341
  prefs: []
  type: TYPE_NORMAL
  zh: “一个超现实的梦境，受萨尔瓦多·达利启发的，有融化的时钟和不可能的建筑。”
- en: Discovering New Styles
  id: totrans-1342
  prefs: []
  type: TYPE_NORMAL
  zh: 发现新的风格
- en: 'If you’re not sure what style you want:'
  id: totrans-1343
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不确定你想要什么风格：
- en: Use ChatGPT as a style consultant. Ask it to suggest styles based on mood or
    theme.
  id: totrans-1344
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 作为风格顾问。请它根据氛围或主题提出建议。
- en: 'Describe the feeling: “I want something whimsical and nostalgic.”'
  id: totrans-1345
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述这种感觉：“我想找一些古怪而怀旧的。”
- en: 'Experiment: Generate multiple versions of the same prompt with different styles.'
  id: totrans-1346
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实验：用不同的风格生成相同提示的多个版本。
- en: The AI becomes your sketchbook—fast, infinite, and fearless.
  id: totrans-1347
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能成为你的速写本——快速、无限且无所畏惧。
- en: 'Conclusion: Style Is Voice'
  id: totrans-1348
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：风格是声音
- en: In the world of visual AI, style is your signature. It defines tone, emotion,
    and identity. Whether you're creating for storytelling, branding, education, or
    fun, learning to prompt for style gives you control over the feel of the final
    image—not just its content.
  id: totrans-1349
  prefs: []
  type: TYPE_NORMAL
  zh: 在视觉人工智能的世界里，风格是你的签名。它定义了基调、情感和身份。无论你是为了叙事、品牌、教育还是娱乐而创作，学习如何提示风格让你能够控制最终图像的感觉——而不仅仅是其内容。
- en: So don’t just think “what should I create?”—ask, “how should it look and feel?”
  id: totrans-1350
  prefs: []
  type: TYPE_NORMAL
  zh: 所以不要只是想“我要创造什么？”——要问，“它应该看起来和感觉如何？”
- en: Style isn't just decoration; it's meaning.
  id: totrans-1351
  prefs: []
  type: TYPE_NORMAL
  zh: 风格不仅仅是装饰；它是意义。
- en: 'Chapter 24: Visual Storytelling Techniques'
  id: totrans-1352
  prefs: []
  type: TYPE_NORMAL
  zh: 第 24 章：视觉叙事技巧
- en: Visual storytelling is more than creating beautiful images—it’s about evoking
    emotion, guiding the viewer’s attention, and conveying a narrative without words.
    With DALL·E 3, you have a powerful ally in this process, one that can visualize
    your imagination with remarkable depth. This chapter shows you how to use AI to
    craft visual stories that speak volumes.
  id: totrans-1353
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉叙事不仅仅是创造美丽的图像——它关乎唤起情感、引导观众的注意力，以及无需言语传达叙事。使用 DALL·E 3，你在这个过程中有一个强大的盟友，它可以以非凡的深度视觉化你的想象力。这一章将向你展示如何使用人工智能来制作能够言简意赅的视觉故事。
- en: What Is Visual Storytelling?
  id: totrans-1354
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是视觉叙事？
- en: 'At its core, visual storytelling is the art of conveying a sequence, mood,
    or message through images. It involves:'
  id: totrans-1355
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，视觉叙事是通过图像传达序列、氛围或信息的一种艺术。它包括：
- en: 'Characters: Who is in the scene?'
  id: totrans-1356
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 角色：场景中有谁？
- en: 'Setting: Where is it happening?'
  id: totrans-1357
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 背景：在哪里发生？
- en: 'Conflict or Theme: What’s at stake?'
  id: totrans-1358
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 冲突或主题：有什么风险？
- en: 'Mood: What emotional tone should the viewer feel?'
  id: totrans-1359
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 氛围：观众应该感受到什么样的情感基调？
- en: With DALL·E, these elements are shaped through intentional prompts, visual sequences,
    and creative framing.
  id: totrans-1360
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 DALL·E，这些元素通过有意的提示、视觉序列和创意构图来塑造。
- en: Key Techniques for AI-Based Visual Narratives
  id: totrans-1361
  prefs: []
  type: TYPE_NORMAL
  zh: 基于人工智能的视觉叙事的关键技巧
- en: 1\. Scene Sequencing
  id: totrans-1362
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 场景顺序
- en: Instead of creating one image, craft a series that tells a story.
  id: totrans-1363
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是创造一个图像，制作一系列讲述故事。
- en: 'Prompt Strategy:'
  id: totrans-1364
  prefs: []
  type: TYPE_NORMAL
  zh: 提示策略：
- en: '“Frame 1: A lone astronaut lands on an alien planet. Frame 2: He discovers
    glowing ruins. Frame 3: He activates a mysterious artifact.”'
  id: totrans-1365
  prefs: []
  type: TYPE_NORMAL
  zh: “框架 1：一个孤独的宇航员降落在外星行星上。框架 2：他发现了发光的遗迹。框架 3：他激活了一个神秘的文物。”
- en: 2\. Character Consistency
  id: totrans-1366
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 角色一致性
- en: 'Keep the appearance of characters similar across multiple prompts using anchor
    phrases like:'
  id: totrans-1367
  prefs: []
  type: TYPE_NORMAL
  zh: 使用像“锚定短语”这样的短语在多个提示中保持角色的外观相似：
- en: “A young woman with silver hair and a green cloak...”
  id: totrans-1368
  prefs: []
  type: TYPE_NORMAL
  zh: “一位银发绿斗篷的年轻女子……”
- en: Use this phrase in each image generation.
  id: totrans-1369
  prefs: []
  type: TYPE_NORMAL
  zh: 在每次图像生成中使用这个短语。
- en: 3\. Lighting for Mood
  id: totrans-1370
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 营造氛围的光线
- en: The right lighting conveys atmosphere.
  id: totrans-1371
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正确的光线传达氛围。
- en: Harsh shadows = tension or fear
  id: totrans-1372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 狂野的阴影 = 紧张或恐惧
- en: Soft light = peace or nostalgia
  id: totrans-1373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 柔光 = 和平或怀旧
- en: Backlighting = mystery or drama
  id: totrans-1374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 逆光 = 神秘或戏剧
- en: 4\. Color Symbolism
  id: totrans-1375
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 色彩象征
- en: Use colors to communicate subtext.
  id: totrans-1376
  prefs: []
  type: TYPE_NORMAL
  zh: 用颜色传达潜台词。
- en: Red = danger, passion
  id: totrans-1377
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 红色 = 危险，激情
- en: Blue = calm, isolation
  id: totrans-1378
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 蓝色 = 平静，隔离
- en: Yellow = hope, curiosity
  id: totrans-1379
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 黄色 = 希望，好奇心
- en: 5\. Framing & Perspective
  id: totrans-1380
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 构图 & 视角
- en: 'Describe camera angles to change the viewer’s experience:'
  id: totrans-1381
  prefs: []
  type: TYPE_NORMAL
  zh: 描述摄像机角度以改变观众的体验：
- en: “Bird’s-eye view”
  id: totrans-1382
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “鸟瞰视图”
- en: “Over-the-shoulder shot”
  id: totrans-1383
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “肩上镜头”
- en: “Close-up of expression”
  id: totrans-1384
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “表情特写”
- en: Building a Visual Story Arc with DALL·E
  id: totrans-1385
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 DALL·E 构建视觉故事弧
- en: 'Structure your storytelling with a three-act format:'
  id: totrans-1386
  prefs: []
  type: TYPE_NORMAL
  zh: 用三幕格式结构你的叙事：
- en: '1\. Beginning: Introduce characters and setting.'
  id: totrans-1387
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 开始：介绍角色和场景。
- en: '2\. Middle: Present conflict or a dramatic turn.'
  id: totrans-1388
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 中间：呈现冲突或戏剧性的转折。
- en: '3\. End: Resolve or leave open-ended for interpretation.'
  id: totrans-1389
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 结尾：解决或留下开放式的解释。
- en: Prompt each image as a frame in this arc.
  id: totrans-1390
  prefs: []
  type: TYPE_NORMAL
  zh: 将每个图像作为这个弧线中的一个框架来提示。
- en: Combining Text + Visuals
  id: totrans-1391
  prefs: []
  type: TYPE_NORMAL
  zh: 结合文本 + 视觉
- en: You can pair DALL·E images with short captions, dialogue, or narration to enhance
    your storytelling. Tools like ChatGPT can help you script these in parallel.
  id: totrans-1392
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将DALL·E图像与简短的标题、对话或旁白配对，以增强你的叙事。像ChatGPT这样的工具可以帮助你并行编写这些内容。
- en: 'Conclusion: Direct Your AI Like a Storyteller'
  id: totrans-1393
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：像讲故事的人一样指导你的AI
- en: You are the director. The prompt is your script. DALL·E is the visual effects
    team. When these elements align, you can create compelling, memorable visuals
    that do more than look good—they make people feel something.
  id: totrans-1394
  prefs: []
  type: TYPE_NORMAL
  zh: 你是导演。提示是你的剧本。DALL·E是视觉效果团队。当这些元素对齐时，你可以创造出引人入胜、令人难忘的视觉效果，它们不仅仅是看起来好，还能触动人们的情感。
- en: 'Chapter 25: Projects to Practice with DALL·E'
  id: totrans-1395
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十五章：与DALL·E练习的项目
- en: Theory is only the beginning—practice turns knowledge into mastery. In this
    final chapter of Part 5, you’ll find a variety of project ideas designed to stretch
    your creativity, sharpen your prompting skills, and build a portfolio of AI-generated
    art.
  id: totrans-1396
  prefs: []
  type: TYPE_NORMAL
  zh: 理论只是开始——实践将知识转化为精通。在本部分5的最后一章中，你将找到各种项目想法，旨在拓展你的创造力，磨练你的提示技巧，并建立一个由AI生成的艺术作品集。
- en: 'Project 1: Reimagine a Classic Story'
  id: totrans-1397
  prefs: []
  type: TYPE_NORMAL
  zh: 项目1：重新构想一个经典故事
- en: Choose a famous tale (e.g., “Little Red Riding Hood,” “The Odyssey”) and reimagine
    it in a new style or setting.
  id: totrans-1398
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个著名的故事（例如，“小红帽”，“奥德赛”），并以新的风格或背景重新想象它。
- en: 'Prompt Example:'
  id: totrans-1399
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “Little Red Riding Hood as a sci-fi explorer on a neon-lit planet.”
  id: totrans-1400
  prefs: []
  type: TYPE_NORMAL
  zh: “小红帽作为一个在霓虹星球上的科幻探险家。”
- en: 'Challenge: Create 4–6 scenes that retell the story visually.'
  id: totrans-1401
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战：创建4-6个场景，以视觉方式重新讲述故事。
- en: 'Project 2: Design a Fantasy World'
  id: totrans-1402
  prefs: []
  type: TYPE_NORMAL
  zh: 项目2：设计一个幻想世界
- en: Build a fictional world with its own geography, cultures, and architecture.
  id: totrans-1403
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个拥有自己地理、文化和建筑的世界。
- en: 'Prompt Flow:'
  id: totrans-1404
  prefs: []
  type: TYPE_NORMAL
  zh: 提示流程：
- en: “A floating island city built from crystal and vines.”
  id: totrans-1405
  prefs: []
  type: TYPE_NORMAL
  zh: “由水晶和藤蔓建造的漂浮岛屿城市。”
- en: “A desert tribe with armor made from animal bones.”
  id: totrans-1406
  prefs: []
  type: TYPE_NORMAL
  zh: “一个用动物骨头制成的盔甲的沙漠部落。”
- en: “A nighttime festival under two moons.”
  id: totrans-1407
  prefs: []
  type: TYPE_NORMAL
  zh: “在两个月亮下的夜晚节日。”
- en: 'Project 3: Character Evolution Series'
  id: totrans-1408
  prefs: []
  type: TYPE_NORMAL
  zh: 项目3：角色演变系列
- en: Create a character and show them at three different life stages.
  id: totrans-1409
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个角色，并展示他们在三个不同的生活阶段。
- en: 'Prompt Flow:'
  id: totrans-1410
  prefs: []
  type: TYPE_NORMAL
  zh: 提示流程：
- en: “A young inventor as a child in a cluttered workshop.”
  id: totrans-1411
  prefs: []
  type: TYPE_NORMAL
  zh: “一个孩子在一个杂乱的工作室里。”
- en: “As an adult unveiling a machine to a crowd.”
  id: totrans-1412
  prefs: []
  type: TYPE_NORMAL
  zh: “作为一个向人群展示机器的成年人。”
- en: “As an elder watching the stars, wearing goggles worn with age.”
  id: totrans-1413
  prefs: []
  type: TYPE_NORMAL
  zh: “作为一个戴着岁月眼镜的老人，仰望星空。”
- en: 'Project 4: Moodboards for Emotion'
  id: totrans-1414
  prefs: []
  type: TYPE_NORMAL
  zh: 项目4：情感氛围板
- en: Visualize emotions like joy, grief, or wonder through abstract art or metaphorical
    scenes.
  id: totrans-1415
  prefs: []
  type: TYPE_NORMAL
  zh: 通过抽象艺术或隐喻场景来可视化快乐、悲伤或惊奇等情感。
- en: 'Prompt:'
  id: totrans-1416
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “An abstract representation of hope, using sunrise and blooming flowers in minimalist
    style.”
  id: totrans-1417
  prefs: []
  type: TYPE_NORMAL
  zh: “用简约风格展示日出和盛开的花朵的抽象希望象征。”
- en: 'Project 5: AI Illustrated Poem or Quote'
  id: totrans-1418
  prefs: []
  type: TYPE_NORMAL
  zh: 项目5：AI插图诗或引言
- en: Take a favorite quote or short poem and create an image that visually represents
    its message.
  id: totrans-1419
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个喜欢的引言或短诗，并创建一个视觉上代表其信息的图像。
- en: 'Example Quote:'
  id: totrans-1420
  prefs: []
  type: TYPE_NORMAL
  zh: 示例引言：
- en: “Not all those who wander are lost.”
  id: totrans-1421
  prefs: []
  type: TYPE_NORMAL
  zh: “不是所有徘徊的人都是迷失的。”
- en: 'Prompt: “A lone traveler walking across a glowing desert under stars, fantasy
    art style.”'
  id: totrans-1422
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“一个孤独的旅行者在星光下穿越发光的沙漠，幻想艺术风格。”
- en: 'Project 6: Album or Book Cover Design'
  id: totrans-1423
  prefs: []
  type: TYPE_NORMAL
  zh: 项目6：专辑或书籍封面设计
- en: Simulate real-world design needs by generating covers based on genre, tone,
    and target audience.
  id: totrans-1424
  prefs: []
  type: TYPE_NORMAL
  zh: 通过根据类型、语气和目标受众生成封面来模拟现实世界的需求。
- en: 'Prompt:'
  id: totrans-1425
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: “A horror novel cover featuring a broken clock in a dark forest, gothic art
    style.”
  id: totrans-1426
  prefs: []
  type: TYPE_NORMAL
  zh: “以黑暗森林中破碎的时钟为特色的恐怖小说封面，哥特式艺术风格。”
- en: 'Bonus Challenge: Create Your Own Prompt Pack'
  id: totrans-1427
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励挑战：创建你自己的提示包
- en: Compile 10 of your favorite or most effective prompts into a themed collection—like
    “Surreal Cities” or “Emotions in Watercolor.” This is perfect for sharing or building
    a brand around your visual style.
  id: totrans-1428
  prefs: []
  type: TYPE_NORMAL
  zh: 将你最喜欢的或最有效的10个提示编译成一个主题收藏——比如“超现实城市”或“水彩中的情感”。这对于分享或围绕你的视觉风格建立品牌是完美的。
- en: 'Conclusion: Make Creation a Habit'
  id: totrans-1429
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：让创作成为一种习惯
- en: The more you practice, the more natural visual prompting becomes. Think of these
    projects not just as exercises—but as stepping stones to your own AI-powered creative
    identity.
  id: totrans-1430
  prefs: []
  type: TYPE_NORMAL
  zh: 你练习得越多，视觉提示就越自然。将这些项目不仅视为练习，而且视为通往你自己的AI驱动创意身份的垫脚石。
- en: PART VI  CUSTOM GPTs AND AUTOMATION
  id: totrans-1431
  prefs: []
  type: TYPE_NORMAL
  zh: 第六部分  定制GPTs和自动化
- en: 'Chapter 26: What Makes GPTs Special?'
  id: totrans-1432
  prefs: []
  type: TYPE_NORMAL
  zh: 第二十六章：是什么让GPTs特别？
- en: In a world filled with digital assistants and automation tools, what sets GPTs
    apart? Why are developers, educators, creatives, and entrepreneurs all gravitating
    toward them as essential tools of the modern age?
  id: totrans-1433
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个充满数字助手和自动化工具的世界里，是什么让GPTs与众不同？为什么开发者、教育工作者、创意人士和企业家都倾向于将它们视为现代时代不可或缺的工具？
- en: This chapter unpacks the unique qualities that make GPTs not only useful—but
    transformative.
  id: totrans-1434
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了使GPTs不仅有用，而且具有变革性的独特品质。
- en: 1\. General Intelligence, Not Narrow Scripts
  id: totrans-1435
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 通用智能，而非狭窄脚本
- en: Traditional bots and automation tools are built on rigid, rule-based systems.
    They operate in silos and require precise commands to function. GPTs (Generative
    Pre-trained Transformers), in contrast, are trained on vast datasets that give
    them the ability to understand and respond to an incredible range of topics and
    intents—even those they haven’t seen before.
  id: totrans-1436
  prefs: []
  type: TYPE_NORMAL
  zh: 传统机器人和自动化工具建立在僵化的基于规则的系统之上。它们在孤岛中运行，需要精确的命令才能运作。相比之下，GPTs（生成式预训练变换器）是在庞大的数据集上训练的，这使得它们能够理解和回应令人难以置信的范围和意图——甚至包括那些它们之前未曾见过的主题。
- en: 'What this means:'
  id: totrans-1437
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着：
- en: You can talk to a GPT like a person. It interprets context, adapts to nuance,
    and generates responses that feel natural, not robotic.
  id: totrans-1438
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以像与人交谈一样与GPT交谈。它理解上下文，适应细微差别，生成自然而非机械的回应。
- en: 2\. Conversational Flexibility
  id: totrans-1439
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 对话灵活性
- en: Unlike static software, GPTs don’t follow a single flowchart. They can switch
    topics mid-conversation, reframe their tone, adjust for audience, or even roleplay—all
    without breaking stride.
  id: totrans-1440
  prefs: []
  type: TYPE_NORMAL
  zh: 与静态软件不同，GPTs不遵循单一的流程图。它们可以在对话中切换话题，调整语气，适应听众，甚至进行角色扮演——而不会中断步伐。
- en: 'Example:'
  id: totrans-1441
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: You can ask a GPT to explain quantum physics, then pivot and ask it to write
    a bedtime story, and it will handle both requests gracefully.
  id: totrans-1442
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以要求一个GPT解释量子物理学，然后转换话题，要求它写一个睡前故事，它将优雅地处理这两个请求。
- en: 3\. Learnable Personalization
  id: totrans-1443
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 可学习的个性化
- en: 'Custom GPTs (created via the ChatGPT platform or API) can be trained with instructions,
    tone guidelines, memory, and tools to tailor their behavior for specific purposes
    :'
  id: totrans-1444
  prefs: []
  type: TYPE_NORMAL
  zh: 定制的GPTs（通过ChatGPT平台或API创建）可以通过指令、语气指南、记忆和工具来训练，以针对特定目的调整其行为：
- en: A GPT that acts as a friendly financial advisor
  id: totrans-1445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个充当友好金融顾问的GPT
- en: One that mimics a historical figure
  id: totrans-1446
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个模仿历史人物的角色
- en: A productivity-focused assistant with built-in app commands
  id: totrans-1447
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个以生产力为导向的内置应用命令的助手
- en: A creative writing coach that critiques your work
  id: totrans-1448
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一位批评你作品的创意写作教练
- en: This level of customization turns GPTs into digital extensions of your workflow,
    brand, or personality.
  id: totrans-1449
  prefs: []
  type: TYPE_NORMAL
  zh: 这种程度的定制将GPT转变为你的工作流程、品牌或个性的数字延伸。
- en: 4\. Tool Integration & Automation
  id: totrans-1450
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 工具集成与自动化
- en: 'GPTs aren’t just chatbots—they can act as intelligent hubs when connected with
    external tools and APIs. This unlocks automation superpowers:'
  id: totrans-1451
  prefs: []
  type: TYPE_NORMAL
  zh: GPTs不仅仅是聊天机器人——当与外部工具和API连接时，它们可以充当智能中心。这解锁了自动化超级能力：
- en: Scheduling meetings
  id: totrans-1452
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安排会议
- en: Sending emails
  id: totrans-1453
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发送电子邮件
- en: Generating reports
  id: totrans-1454
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成报告
- en: Pulling data from CRMs or spreadsheets
  id: totrans-1455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从CRM或电子表格中提取数据
- en: Interacting with websites and databases
  id: totrans-1456
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与网站和数据库交互
- en: With GPTs embedded in business processes, automation becomes smarter and more
    adaptable than ever.
  id: totrans-1457
  prefs: []
  type: TYPE_NORMAL
  zh: 将GPT嵌入到业务流程中，自动化变得比以往任何时候都更智能和更适应性强。
- en: 5\. Memory That Evolves
  id: totrans-1458
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 发展中的记忆
- en: Some GPTs (like those in ChatGPT Plus) have memory, meaning they remember facts
    you’ve shared, your preferences, and even your past projects. Over time, this
    allows the GPT to feel more like a collaborator than a search engine.
  id: totrans-1459
  prefs: []
  type: TYPE_NORMAL
  zh: 一些GPTs（如ChatGPT Plus中的那些）具有记忆功能，意味着它们能记住你分享的事实、你的偏好，甚至你过去的项目。随着时间的推移，这使GPT更像是一个合作伙伴，而不是一个搜索引擎。
- en: 'Example:'
  id: totrans-1460
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: If you tell a GPT your preferred writing style and it has memory enabled, it
    can use that in future sessions without needing to be reminded.
  id: totrans-1461
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你告诉GPT你喜欢的写作风格并且启用了记忆功能，它可以在未来的会话中使用它，而无需提醒。
- en: 6\. They Generate, Not Just Retrieve
  id: totrans-1462
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 它们生成，而不仅仅是检索
- en: Perhaps the most magical quality of GPTs is that they can create—not just answer.
  id: totrans-1463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPTs最神奇的品质可能是它们能够创造——而不仅仅是回答。
- en: Write code from scratch
  id: totrans-1464
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从头编写代码
- en: Draft business plans
  id: totrans-1465
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 起草商业计划
- en: Design educational games
  id: totrans-1466
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计教育游戏
- en: Imagine new product ideas
  id: totrans-1467
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想象新的产品想法
- en: Generate fictional worlds, characters, and scenes
  id: totrans-1468
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成虚构的世界、角色和场景
- en: They don’t just find information; they synthesize and invent—making them a natural
    fit for creative problem-solving and ideation.
  id: totrans-1469
  prefs: []
  type: TYPE_NORMAL
  zh: 它们不仅找到信息；它们综合和创造——使它们成为创造性问题解决和创意设计的自然选择。
- en: 7\. Scalability Without Burnout
  id: totrans-1470
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 无燃尽的可扩展性
- en: A single GPT can handle thousands of interactions per hour, 24/7, without fatigue
    or emotional variance. This makes them ideal for scaling support, education, and
    engagement across time zones or audiences.
  id: totrans-1471
  prefs: []
  type: TYPE_NORMAL
  zh: 单个GPT每小时可以处理数千次交互，24/7不间断，不会感到疲劳或情绪波动。这使得它们非常适合跨时区或受众扩展支持、教育和参与。
- en: Whether you're deploying a GPT on your website or integrating it into customer
    service, its ability to scale makes it uniquely efficient.
  id: totrans-1472
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是在你的网站上部署GPT还是将其集成到客户服务中，其扩展能力使其独具效率。
- en: 'Conclusion: Why GPTs Are Game-Changers'
  id: totrans-1473
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：为什么GPT是变革者
- en: GPTs combine natural conversation, creative generation, tool integration, and
    personalization into one fluid experience. They aren’t just smart—they’re adaptable,
    scalable, and continuously evolving.
  id: totrans-1474
  prefs: []
  type: TYPE_NORMAL
  zh: GPT将自然对话、创意生成、工具集成和个人化结合成一个流畅的体验。它们不仅聪明，而且适应性强、可扩展，并且持续进化。
- en: That’s what makes them special.
  id: totrans-1475
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是它们的特别之处。
- en: In the chapters ahead, you’ll learn how to customize, deploy, and automate GPTs
    for real-world use, whether you're a solo creator or building enterprise-level
    solutions.
  id: totrans-1476
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，你将学习如何为现实世界的应用定制、部署和自动化GPT，无论你是独立创作者还是构建企业级解决方案。
- en: 'Chapter 27: Building Your First GPT'
  id: totrans-1477
  prefs: []
  type: TYPE_NORMAL
  zh: 第27章：构建你的第一个GPT
- en: Creating a custom GPT isn’t just for coders or tech professionals. Thanks to
    user-friendly tools like OpenAI’s GPT Builder, anyone—from educators to entrepreneurs—can
    design a tailored AI that speaks their language, follows specific instructions,
    and supports unique goals.
  id: totrans-1478
  prefs: []
  type: TYPE_NORMAL
  zh: 创建自定义GPT不仅限于程序员或技术专业人士。多亏了像OpenAI的GPT构建器这样的用户友好型工具，任何人——从教育工作者到企业家——都可以设计一个量身定制的AI，它使用他们的语言，遵循特定的指令，并支持独特的目标。
- en: In this chapter, you’ll walk through the step-by-step process of building your
    first GPT—without writing a single line of code.
  id: totrans-1479
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你将逐步了解构建第一个GPT的过程——无需编写任何代码。
- en: 'Step 1: Define the Purpose'
  id: totrans-1480
  prefs: []
  type: TYPE_NORMAL
  zh: 第1步：定义目的
- en: 'Before you build anything, clarify what your GPT will do. Ask yourself:'
  id: totrans-1481
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建任何东西之前，明确你的GPT将做什么。问问自己：
- en: Who will use it?
  id: totrans-1482
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 谁会使用它？
- en: What task or challenge will it solve?
  id: totrans-1483
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它将解决什么任务或挑战？
- en: What tone and personality should it have?
  id: totrans-1484
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它应该有什么语气和性格？
- en: 'Examples:'
  id: totrans-1485
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “An empathetic mental health coach for students”
  id: totrans-1486
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “一个对学生有同理心的心理健康教练”
- en: “A snarky writing partner who critiques in the style of Hemingway”
  id: totrans-1487
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “一个以海明威风格进行评论的讽刺性写作伙伴”
- en: “A customer support assistant trained on my brand’s FAQs”
  id: totrans-1488
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “一个经过我品牌常见问题解答训练的客户支持助手”
- en: The clearer your purpose, the better your GPT will perform.
  id: totrans-1489
  prefs: []
  type: TYPE_NORMAL
  zh: 你的目的越清晰，你的GPT表现越好。
- en: 'Step 2: Access the GPT Builder'
  id: totrans-1490
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：访问GPT构建器
- en: 'To begin:'
  id: totrans-1491
  prefs: []
  type: TYPE_NORMAL
  zh: 开始吧：
- en: 1\. Visit https://chat.openai.com
  id: totrans-1492
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 访问https://chat.openai.com
- en: 2\. Log in with your OpenAI account (ChatGPT Plus required)
  id: totrans-1493
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 使用你的OpenAI账户登录（ChatGPT Plus必需）
- en: 3\. Click on Explore GPTs
  id: totrans-1494
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 点击探索GPTs
- en: 4\. Choose Create a GPT
  id: totrans-1495
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 选择创建一个GPT
- en: You’ll now enter the GPT Builder interface, which uses natural language setup—you
    simply describe what you want, and the builder does the rest.
  id: totrans-1496
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在将进入GPT构建器界面，它使用自然语言设置——你只需描述你想要的内容，构建器就会完成剩下的工作。
- en: 'Step 3: Configure Instructions'
  id: totrans-1497
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：配置指令
- en: 'The GPT Builder will prompt you to customize:'
  id: totrans-1498
  prefs: []
  type: TYPE_NORMAL
  zh: GPT构建器将提示你进行以下定制：
- en: 'Name & Description: What users see when browsing'
  id: totrans-1499
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 名称 & 描述：用户在浏览时看到的内容
- en: 'Personality/Tone: Serious, playful, formal, motivational, etc.'
  id: totrans-1500
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性格/语气：严肃、活泼、正式、激励等。
- en: 'Special Instructions: What the GPT should always do (or avoid)'
  id: totrans-1501
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特别说明：GPT应该始终做什么（或避免做什么）
- en: 'Response Style: Concise, detailed, structured, visual, etc.'
  id: totrans-1502
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应风格：简洁、详细、结构化、视觉等。
- en: 'Pro Tip:'
  id: totrans-1503
  prefs: []
  type: TYPE_NORMAL
  zh: 专业提示：
- en: 'Write instructions as if you''re training a real assistant. Be direct and specific:'
  id: totrans-1504
  prefs: []
  type: TYPE_NORMAL
  zh: 写指令时，就像在训练一个真正的助手一样。要直接和具体：
- en: “You are an encouraging productivity coach. You speak in short, motivating phrases.
    Always suggest 3 action steps. Avoid complex jargon.”
  id: totrans-1505
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一位鼓舞人心的生产力教练。你用简短、激励的话语说话。始终建议3个行动步骤。避免使用复杂的术语。”
- en: 'Step 4: Add Knowledge Files (Optional)'
  id: totrans-1506
  prefs: []
  type: TYPE_NORMAL
  zh: 第4步：添加知识文件（可选）
- en: Want your GPT to reference specific info—like a product catalog, manual, or
    course material? You can upload files during setup.
  id: totrans-1507
  prefs: []
  type: TYPE_NORMAL
  zh: 想让你的GPT引用特定的信息——比如产品目录、手册或课程材料？你可以在设置过程中上传文件。
- en: 'Supported formats include:'
  id: totrans-1508
  prefs: []
  type: TYPE_NORMAL
  zh: 支持的格式包括：
- en: PDFs
  id: totrans-1509
  prefs: []
  type: TYPE_NORMAL
  zh: PDFs
- en: DOCX
  id: totrans-1510
  prefs: []
  type: TYPE_NORMAL
  zh: DOCX
- en: TXT
  id: totrans-1511
  prefs: []
  type: TYPE_NORMAL
  zh: TXT
- en: CSV
  id: totrans-1512
  prefs: []
  type: TYPE_NORMAL
  zh: CSV
- en: This gives your GPT proprietary knowledge others don’t have access to, making
    it uniquely yours.
  id: totrans-1513
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得你的GPT拥有其他人无法获取的专有知识，使其独一无二。
- en: 'Step 5: Add Tools (Optional)'
  id: totrans-1514
  prefs: []
  type: TYPE_NORMAL
  zh: 第5步：添加工具（可选）
- en: 'Advanced GPTs can use plugins and tools like:'
  id: totrans-1515
  prefs: []
  type: TYPE_NORMAL
  zh: 高级GPT可以使用插件和工具，如：
- en: Browser access (to look up live data)
  id: totrans-1516
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 浏览器访问（查找实时数据）
- en: Code interpreter (to run calculations or scripts)
  id: totrans-1517
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码解释器（用于运行计算或脚本）
- en: Image generator (DALL·E)
  id: totrans-1518
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图片生成器（DALL·E）
- en: File analysis tools (for spreadsheets or documents)
  id: totrans-1519
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件分析工具（用于电子表格或文档）
- en: Select which tools your GPT should have access to, based on your use case.
  id: totrans-1520
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你的用例选择你的 GPT 应该访问哪些工具。
- en: 'Step 6: Test and Refine'
  id: totrans-1521
  prefs: []
  type: TYPE_NORMAL
  zh: 第 6 步：测试和改进
- en: Once your GPT is built, test it like a user would. Ask a variety of questions.
    Try edge cases. Evaluate how well it sticks to your instructions.
  id: totrans-1522
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你的 GPT 构建完成，就像用户一样测试它。提出各种问题。尝试边缘案例。评估它遵守你的指令的程度。
- en: 'If something’s off:'
  id: totrans-1523
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有问题：
- en: Edit instructions in the GPT Builder
  id: totrans-1524
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 GPT 构建器中编辑指令
- en: Refine tone or response format
  id: totrans-1525
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精炼语气或回应格式
- en: Add or remove files/tools as needed
  id: totrans-1526
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据需要添加或删除文件/工具
- en: 'Tip: Keep iterations small. Test frequently.'
  id: totrans-1527
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士：保持迭代小。经常测试。
- en: 'Step 7: Publish or Keep Private'
  id: totrans-1528
  prefs: []
  type: TYPE_NORMAL
  zh: 第 7 步：发布或保持私密
- en: 'When you''re happy with your GPT, choose its visibility:'
  id: totrans-1529
  prefs: []
  type: TYPE_NORMAL
  zh: 当你对你的 GPT 满意时，选择其可见性：
- en: 'Private: Only you can use it'
  id: totrans-1530
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 私密：只有你可以使用
- en: 'Public (Unlisted): Shareable via link'
  id: totrans-1531
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公开（未列出）：可通过链接分享
- en: 'Public (Discoverable): Listed in the GPTs library for others to find'
  id: totrans-1532
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公开（可被发现）：列在 GPT 库中供他人查找
- en: You can update or unpublish your GPT anytime.
  id: totrans-1533
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以随时更新或取消发布你的 GPT。
- en: 'Success Checklist: Your First GPT Should...'
  id: totrans-1534
  prefs: []
  type: TYPE_NORMAL
  zh: 成功清单：你的第一个 GPT 应该...
- en: Follow your voice and tone
  id: totrans-1535
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遵循你的声音和语气
- en: Understand your users’ needs
  id: totrans-1536
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解用户需求
- en: Provide clear, accurate, useful responses
  id: totrans-1537
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供清晰、准确、有用的回应
- en: Stay aligned with your goals or brand
  id: totrans-1538
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持与你的目标或品牌一致
- en: If it meets those marks—you’re ready to use it in real-world scenarios.
  id: totrans-1539
  prefs: []
  type: TYPE_NORMAL
  zh: 如果它符合这些标准——你就可以在现实世界场景中使用它了。
- en: 'Conclusion: You’re Now an AI Creator'
  id: totrans-1540
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：你现在是一名 AI 创作者
- en: Building your own GPT is an empowering step into the future of AI customization.
    You’ve gone from using AI to designing it—turning your ideas, personality, and
    goals into a responsive digital entity.
  id: totrans-1541
  prefs: []
  type: TYPE_NORMAL
  zh: 构建自己的 GPT 是迈向 AI 定制化未来的赋权步骤。你已经从使用 AI 转变为设计它——将你的想法、个性和目标转化为一个响应式的数字实体。
- en: 'Chapter 28: Tuning GPT Behavior'
  id: totrans-1542
  prefs: []
  type: TYPE_NORMAL
  zh: 第 28 章：调整 GPT 行为
- en: Custom GPTs are powerful—but what makes them truly effective is how precisely
    you tune their behavior. Just like shaping the personality of a character or training
    an employee, you can shape how your GPT thinks, speaks, and responds. This chapter
    will guide you through practical methods to fine-tune your GPT's behavior for
    accuracy, tone, consistency, and usefulness.
  id: totrans-1543
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义 GPT 强大，但真正使其有效的是你如何精确调整其行为。就像塑造角色的个性或培训员工一样，你可以塑造你的 GPT 思考、说话和回应的方式。本章将指导你通过实际方法来微调
    GPT 的行为，以实现准确性、语气、一致性和实用性。
- en: 1\. Understand the Levers of Behavior
  id: totrans-1544
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 理解行为杠杆
- en: 'Before tuning, it’s important to understand the key factors that influence
    GPT behavior:'
  id: totrans-1545
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在调整之前，了解影响 GPT 行为的关键因素很重要：
- en: System Instructions – Core guidelines that control tone, voice, and goals.
  id: totrans-1546
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统指令 – 控制语气、声音和目标的核心理念。
- en: User Prompts – How users interact and what they ask.
  id: totrans-1547
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户提示 – 用户如何互动以及他们提出的问题。
- en: Memory – What the GPT remembers about users over time (if enabled).
  id: totrans-1548
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内存 – GPT 随时间记住的用户信息（如果启用）。
- en: Custom Files & Data – Context that enhances its relevance and specialization.
  id: totrans-1549
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自定义文件和数据 – 增强其相关性和专业化的背景。
- en: Tool Access – What it’s allowed to do (e.g., browse, calculate, analyze).
  id: totrans-1550
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具访问权限 – 它被允许执行的操作（例如，浏览、计算、分析）。
- en: Behavior tuning is all about calibrating these elements to your use case.
  id: totrans-1551
  prefs: []
  type: TYPE_NORMAL
  zh: 行为调整就是将这些元素校准到你的用例中。
- en: 2\. Write Strong System Instructions
  id: totrans-1552
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 编写强大的系统指令
- en: Think of system instructions as the “personality blueprint.” This section sets
    the expectations for how the GPT behaves in every interaction.
  id: totrans-1553
  prefs: []
  type: TYPE_NORMAL
  zh: 将系统指令视为“个性蓝图”。本节设定了 GPT 在每次互动中的行为预期。
- en: 'Examples:'
  id: totrans-1554
  prefs: []
  type: TYPE_NORMAL
  zh: 例子：
- en: 'Formal Tutor:'
  id: totrans-1555
  prefs: []
  type: TYPE_NORMAL
  zh: 正式导师：
- en: “You are a calm and knowledgeable physics professor. Always explain using clear
    analogies and reference real-world applications.”
  id: totrans-1556
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一位冷静且知识渊博的物理教授。始终使用清晰的类比并参考现实世界的应用来解释。”
- en: 'Customer Support Agent:'
  id: totrans-1557
  prefs: []
  type: TYPE_NORMAL
  zh: 客户支持代表：
- en: “You respond with empathy and professionalism. Always acknowledge user frustration
    before offering a solution. Keep responses concise.”
  id: totrans-1558
  prefs: []
  type: TYPE_NORMAL
  zh: “你以同理心和专业性回应。在提供解决方案之前，始终承认用户的挫败感。保持回应简洁。”
- en: 'Creative Brainstorm Partner:'
  id: totrans-1559
  prefs: []
  type: TYPE_NORMAL
  zh: 创意头脑风暴伙伴：
- en: “You are playful, curious, and idea-driven. Offer at least 3 fresh ideas per
    prompt, and use questions to deepen the conversation.”
  id: totrans-1560
  prefs: []
  type: TYPE_NORMAL
  zh: “你充满活力、好奇且以想法驱动。每个提示至少提供 3 个新想法，并使用问题深化对话。”
- en: Spend time crafting these carefully—they shape every response.
  id: totrans-1561
  prefs: []
  type: TYPE_NORMAL
  zh: 投入时间精心打造这些内容——它们塑造了每一个回应。
- en: 3\. Control Tone and Style
  id: totrans-1562
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 控制语气和风格
- en: If your GPT needs a consistent voice, specify tone explicitly in your instructions
    and test for consistency.
  id: totrans-1563
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你的 GPT 需要一个一致的语气，请在你的指令中明确指定语调并测试其一致性。
- en: Want a fun and quirky tone? Include terms like “use humor,” “speak with personality,”
    or “use casual metaphors.”
  id: totrans-1564
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想要一个有趣且古怪的风格？包括诸如“使用幽默”，“用个性说话”或“使用非正式隐喻”等术语。
- en: Want corporate professionalism? Use guidance like “keep responses formal,” “avoid
    contractions,” or “use industry terminology.”
  id: totrans-1565
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想要企业专业风格？使用如下指导：“保持回答正式”，“避免缩写”，“使用行业术语”。
- en: 'Tuning Tip: Add “never do this” clauses to reinforce boundaries (e.g., “never
    use slang,” “avoid emojis,” etc.).'
  id: totrans-1566
  prefs: []
  type: TYPE_NORMAL
  zh: 调优技巧：添加“决不这样做”的条款来强化边界（例如，“决不使用俚语”，“避免表情符号”等）。
- en: 4\. Balance Creativity and Accuracy
  id: totrans-1567
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 平衡创造力和准确性
- en: 'Different use cases demand different levels of creativity. You can tune this
    by adjusting the GPT’s freedom in generating answers:'
  id: totrans-1568
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的用例需要不同水平的创造力。你可以通过调整 GPT 生成答案的自由度来进行调优：
- en: 'For factual tasks, set constraints:'
  id: totrans-1569
  prefs: []
  type: TYPE_NORMAL
  zh: 对于事实性任务，设定约束：
- en: “Only cite verified sources. If unsure, say you don’t know.”
  id: totrans-1570
  prefs: []
  type: TYPE_NORMAL
  zh: “仅引用已验证的来源。如果不确定，可以说不知道。”
- en: 'For creative tasks, loosen boundaries:'
  id: totrans-1571
  prefs: []
  type: TYPE_NORMAL
  zh: 对于创造性任务，放宽边界：
- en: “Feel free to invent characters, worlds, and plot twists. Think like a novelist.”
  id: totrans-1572
  prefs: []
  type: TYPE_NORMAL
  zh: “自由创造角色、世界和情节转折。像小说家一样思考。”
- en: This ensures the GPT stays within its lane—whether it’s a fact-checker or a
    fiction writer.
  id: totrans-1573
  prefs: []
  type: TYPE_NORMAL
  zh: 这确保了 GPT 保持在其轨道上——无论是事实核查者还是虚构作家。
- en: 5\. Test Edge Cases
  id: totrans-1574
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 测试边缘情况
- en: 'Tuning isn''t complete without pressure-testing your GPT. Try inputs that challenge
    its instructions:'
  id: totrans-1575
  prefs: []
  type: TYPE_NORMAL
  zh: 不经过对 GPT 的压力测试，调优就不会完成。尝试一些挑战其指令的输入：
- en: Ask ambiguous or conflicting questions
  id: totrans-1576
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提出模糊或冲突的问题
- en: Use incorrect assumptions or tone-shifting prompts
  id: totrans-1577
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用错误的假设或语气转换提示
- en: Push the GPT beyond its expected boundaries
  id: totrans-1578
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 GPT 推向其预期的边界之外
- en: Then refine your system instructions accordingly.
  id: totrans-1579
  prefs: []
  type: TYPE_NORMAL
  zh: 然后相应地细化你的系统指令。
- en: 'Example Fix:'
  id: totrans-1580
  prefs: []
  type: TYPE_NORMAL
  zh: 示例修正：
- en: 'If a productivity coach GPT becomes too chatty, revise with:'
  id: totrans-1581
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个生产力教练 GPT 变得过于健谈，请进行以下修订：
- en: “Limit responses to under 100 words. Use action verbs. Do not repeat motivational
    clichés.”
  id: totrans-1582
  prefs: []
  type: TYPE_NORMAL
  zh: “将回答限制在 100 字以内。使用行动动词。不要重复励志陈词。”
- en: 6\. Leverage Few-Shot Prompting
  id: totrans-1583
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 利用少量样本提示
- en: You can include a few examples in your instructions to demonstrate ideal responses.
  id: totrans-1584
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在你的指令中包含一些示例来展示理想的回答。
- en: 'Example:'
  id: totrans-1585
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'User: “I’m feeling stuck.”'
  id: totrans-1586
  prefs: []
  type: TYPE_NORMAL
  zh: 用户：“我感觉卡住了。”
- en: 'GPT: “Totally understandable. Let’s tackle it step by step. First, what’s one
    small win you can get today?”'
  id: totrans-1587
  prefs: []
  type: TYPE_NORMAL
  zh: GPT：“完全理解。让我们一步步解决。首先，你今天能取得的一个小胜利是什么？”
- en: These examples help the GPT pattern its behavior even more accurately.
  id: totrans-1588
  prefs: []
  type: TYPE_NORMAL
  zh: 这些示例帮助 GPT 更准确地模式化其行为。
- en: 7\. Maintain and Iterate
  id: totrans-1589
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 维护和迭代
- en: 'GPT behavior tuning is not a one-time task. As users interact and your goals
    evolve, update the following regularly:'
  id: totrans-1590
  prefs: []
  type: TYPE_NORMAL
  zh: GPT 行为调优不是一个一次性任务。随着用户互动和目标的发展，定期更新以下内容：
- en: System instructions
  id: totrans-1591
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统指令
- en: Uploaded knowledge
  id: totrans-1592
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上传的知识
- en: Tools and integrations
  id: totrans-1593
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具和集成
- en: Edge-case handling
  id: totrans-1594
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 边缘情况处理
- en: Consider user feedback your data for behavioral refinement.
  id: totrans-1595
  prefs: []
  type: TYPE_NORMAL
  zh: 将用户反馈视为你行为优化的数据。
- en: 'Conclusion: Behavior as a Superpower'
  id: totrans-1596
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：行为作为超能力
- en: Tuning GPT behavior is how you turn a generic model into a specialized, trustworthy
    assistant. Whether your goal is clarity, creativity, compassion, or consistency—you’re
    now equipped to sculpt the perfect AI personality for your purpose.
  id: totrans-1597
  prefs: []
  type: TYPE_NORMAL
  zh: 调优 GPT 行为是将通用模型转变为专业、值得信赖的助手的方法。无论你的目标是清晰、创意、同情还是一致性——你现在已准备好为你自己的目的塑造完美的 AI
    性格。
- en: 'Chapter 29: Knowledge Embedding Made Easy'
  id: totrans-1598
  prefs: []
  type: TYPE_NORMAL
  zh: 第 29 章：知识嵌入变得简单
- en: One of the most powerful ways to level up your custom GPT is by embedding domain-specific
    knowledge directly into it. This allows your AI to speak with authority, answer
    with context, and act like it’s been trained on your private library of information—even
    though it hasn’t been fine-tuned with code.
  id: totrans-1599
  prefs: []
  type: TYPE_NORMAL
  zh: 提升定制 GPT 的最有效方法之一是将特定领域的知识直接嵌入其中。这允许你的 AI 以权威的口吻说话，以语境回答，并表现得像它已经在你私人信息库上进行了训练——即使它并没有通过代码进行微调。
- en: This chapter will show you how to easily embed knowledge into your GPT using
    tools provided by OpenAI and other platforms, without needing any programming
    skills.
  id: totrans-1600
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将向您展示如何使用 OpenAI 和其他平台提供的工具轻松地将知识嵌入到您的 GPT 中，而无需任何编程技能。
- en: 1\. What Is Knowledge Embedding?
  id: totrans-1601
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 知识嵌入是什么？
- en: In the context of custom GPTs, “knowledge embedding” means providing your AI
    access to documents or datasets so it can generate more accurate, relevant responses.
  id: totrans-1602
  prefs: []
  type: TYPE_NORMAL
  zh: 在定制 GPT 的背景下，“知识嵌入”意味着为你的 AI 提供访问文档或数据集的权限，以便它可以生成更准确、更相关的响应。
- en: Instead of pulling information from the open internet (which it can’t always
    do), it refers to what you give it—your PDFs, notes, spreadsheets, transcripts,
    manuals, reports, etc.
  id: totrans-1603
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是从公开互联网获取信息（它并不总是能做到），它参考你提供的内容——你的 PDF 文件、笔记、电子表格、转录、手册、报告等。
- en: 2\. Why Embed Knowledge?
  id: totrans-1604
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 为什么嵌入知识？
- en: 'Embedded knowledge allows your GPT to:'
  id: totrans-1605
  prefs: []
  type: TYPE_NORMAL
  zh: 嵌入的知识允许你的 GPT：
- en: Reference internal materials (e.g., business SOPs, lesson plans, product catalogs)
  id: totrans-1606
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参考内部材料（例如，业务标准操作程序、教学计划、产品目录）
- en: Support niche expertise (e.g., legal advice, medical protocols, scientific research)
  id: totrans-1607
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支持专业领域（例如，法律建议、医疗协议、科学研究）
- en: Maintain brand voice and consistency
  id: totrans-1608
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持品牌声音和一致性
- en: Answer with precision and depth
  id: totrans-1609
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精确且深入地回答
- en: This turns a general-purpose model into a specialist in your field or business.
  id: totrans-1610
  prefs: []
  type: TYPE_NORMAL
  zh: 这将通用模型转变为你领域或业务的专业人士。
- en: 3\. Accepted File Types
  id: totrans-1611
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 接受的文件类型
- en: 'When creating or editing a GPT, you can upload:'
  id: totrans-1612
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建或编辑 GPT 时，你可以上传：
- en: PDFs – Whitepapers, guides, eBooks, etc.
  id: totrans-1613
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PDFs – 白皮书、指南、电子书等。
- en: DOCX or TXT – Memos, drafts, policies
  id: totrans-1614
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DOCX 或 TXT – 备忘录、草案、政策
- en: CSV – Structured data like inventories, pricing sheets, client lists
  id: totrans-1615
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CSV – 如库存、定价表、客户名单等结构化数据
- en: Markdown – For organized text and formatting
  id: totrans-1616
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Markdown – 用于组织文本和格式化
- en: Each file becomes part of the GPT’s context memory—available for reference during
    conversations.
  id: totrans-1617
  prefs: []
  type: TYPE_NORMAL
  zh: 每个文件都成为 GPT 的上下文记忆的一部分—在对话中可供参考。
- en: 4\. Embedding Files in the GPT Builder
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 在 GPT 构建器中嵌入文件
- en: 'To add knowledge files:'
  id: totrans-1619
  prefs: []
  type: TYPE_NORMAL
  zh: 要添加知识文件：
- en: 1\. Go to chat.openai.com and open Create a GPT.
  id: totrans-1620
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 前往 chat.openai.com 并打开创建 GPT。
- en: 2\. In the GPT Builder interface, click Configure.
  id: totrans-1621
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在 GPT 构建器界面中，点击配置。
- en: 3\. Under "Add files", upload your documents.
  id: totrans-1622
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在“添加文件”下上传你的文档。
- en: 4\. The GPT now has instant access to that content during chats.
  id: totrans-1623
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 现在 GPT 在聊天中可以即时访问该内容。
- en: You can upload multiple files, and even update or remove them later.
  id: totrans-1624
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以上传多个文件，甚至稍后更新或删除它们。
- en: 5\. Writing Instructions for File Usage
  id: totrans-1625
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 为文件使用编写说明
- en: 'To ensure your GPT uses the embedded files properly, include guidance in your
    system instructions:'
  id: totrans-1626
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保你的 GPT 正确使用嵌入的文件，在你的系统说明中包含指导：
- en: “Use the attached training manual to answer all onboarding questions. If the
    answer is not in the manual, say you don’t know.”
  id: totrans-1627
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “使用附带的培训手册来回答所有入职问题。如果手册中没有答案，就说你不知道。”
- en: “Reference the CSV data for pricing. Do not estimate or guess.”
  id: totrans-1628
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “参考 CSV 数据进行定价。不要估计或猜测。”
- en: “Respond using examples only from the uploaded PDF case studies.”
  id: totrans-1629
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “仅使用上传的 PDF 案例研究中的例子来回答。”
- en: This tells your GPT when and how to use the files for accuracy and trustworthiness.
  id: totrans-1630
  prefs: []
  type: TYPE_NORMAL
  zh: 这告诉你的 GPT 何时以及如何使用文件以确保准确性和可信度。
- en: 6\. Use Cases by Role
  id: totrans-1631
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 按角色使用案例
- en: 'Educators:'
  id: totrans-1632
  prefs: []
  type: TYPE_NORMAL
  zh: 教育工作者：
- en: Upload curriculum, worksheets, or student feedback rubrics to create a personalized
    teaching assistant.
  id: totrans-1633
  prefs: []
  type: TYPE_NORMAL
  zh: 上传课程、工作表或学生反馈评分标准以创建个性化的教学助手。
- en: 'Entrepreneurs:'
  id: totrans-1634
  prefs: []
  type: TYPE_NORMAL
  zh: 创业者：
- en: Embed your pitch deck, customer personas, and marketing strategy to get brand-aligned
    content ideas.
  id: totrans-1635
  prefs: []
  type: TYPE_NORMAL
  zh: 嵌入你的提案演示文稿、客户角色和营销策略以获得品牌一致的内容想法。
- en: 'Writers:'
  id: totrans-1636
  prefs: []
  type: TYPE_NORMAL
  zh: 作家：
- en: Include your character profiles, worldbuilding notes, and draft chapters to
    co-write with consistency.
  id: totrans-1637
  prefs: []
  type: TYPE_NORMAL
  zh: 包括你的角色档案、世界观构建笔记和草案章节，以保持一致性合作写作。
- en: 'Consultants:'
  id: totrans-1638
  prefs: []
  type: TYPE_NORMAL
  zh: 咨询师：
- en: Use client documentation and industry whitepapers to offer tailored AI-powered
    advice.
  id: totrans-1639
  prefs: []
  type: TYPE_NORMAL
  zh: 使用客户文档和行业白皮书提供定制化的 AI 建议。
- en: 'Support Agents:'
  id: totrans-1640
  prefs: []
  type: TYPE_NORMAL
  zh: 支持代理：
- en: Add FAQ documents, refund policies, and troubleshooting guides to streamline
    customer service.
  id: totrans-1641
  prefs: []
  type: TYPE_NORMAL
  zh: 添加常见问题解答文档、退款政策和故障排除指南以简化客户服务。
- en: 7\. Keeping It Clean and Useful
  id: totrans-1642
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 保持整洁和实用
- en: 'When embedding knowledge:'
  id: totrans-1643
  prefs: []
  type: TYPE_NORMAL
  zh: 当嵌入知识时：
- en: Organize content clearly – Avoid cluttered documents.
  id: totrans-1644
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确组织内容 – 避免杂乱无章的文档。
- en: Keep file sizes manageable – Large files may slow performance.
  id: totrans-1645
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持文件大小可控 – 大文件可能会减慢性能。
- en: Update regularly – Make sure your GPT reflects the most current information.
  id: totrans-1646
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期更新 – 确保你的 GPT 反映最新的信息。
- en: Think of your embedded files as your AI’s “textbook”—make sure it’s readable,
    structured, and relevant.
  id: totrans-1647
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的嵌入文件视为你 AI 的“教科书”——确保它可读、结构化且相关。
- en: 8\. Troubleshooting Behavior
  id: totrans-1648
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 故障排除行为
- en: 'If your GPT ignores or misuses your embedded knowledge:'
  id: totrans-1649
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的 GPT 忽略或误用你嵌入的知识：
- en: Check if instructions explicitly mention the files.
  id: totrans-1650
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查说明是否明确提到文件。
- en: Make sure content is searchable (not images of text).
  id: totrans-1651
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保内容可搜索（不是文本的图像）。
- en: Try condensing large documents into simpler formats.
  id: totrans-1652
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试将大型文档压缩成更简单的格式。
- en: Use short summaries at the top of key documents to help guide answers.
  id: totrans-1653
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在关键文档的顶部使用简短摘要以帮助指导答案。
- en: 'Conclusion: Turn Your GPT Into a Domain Expert'
  id: totrans-1654
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：将你的 GPT 转变为领域专家
- en: With knowledge embedding, your GPT becomes more than just an assistant—it becomes
    a specialist. Whether you want to simulate an in-house expert, replicate your
    brain for business, or create a learning tool that knows your content inside and
    out, embedding knowledge is the shortcut to smart, tailored AI.
  id: totrans-1655
  prefs: []
  type: TYPE_NORMAL
  zh: 通过知识嵌入，你的 GPT 不再只是一个助手——它变成了一个专家。无论你想模拟内部专家、复制你的商业思维，还是创建一个对内容了如指掌的学习工具，嵌入知识是通往智能、定制
    AI 的捷径。
- en: 'Chapter 30: Creating Instruction-Driven Tools'
  id: totrans-1656
  prefs: []
  type: TYPE_NORMAL
  zh: 第30章：创建指令驱动工具
- en: Instruction-driven tools are one of the most underrated superpowers of custom
    GPTs. By simply writing clear, detailed instructions, you can design GPTs that
    behave like apps—smart, responsive, and tailored to specific tasks. No code required.
    Just your words and your imagination.
  id: totrans-1657
  prefs: []
  type: TYPE_NORMAL
  zh: 指令驱动工具是定制 GPT 最被低估的超级力量之一。通过简单地编写清晰、详细的指令，你可以设计出像应用程序一样行为的 GPT——智能、响应迅速，并针对特定任务定制。无需代码。只需你的话语和想象力。
- en: This chapter will teach you how to create these powerful, instruction-driven
    tools that act with precision and serve focused roles—from checklists to calculators,
    planners to writing assistants.
  id: totrans-1658
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将教你如何创建这些强大、指令驱动的工具，它们以精确的方式行动并承担专注的角色——从清单到计算器，从规划者到写作助手。
- en: 1\. What Are Instruction-Driven Tools?
  id: totrans-1659
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 指令驱动工具是什么？
- en: These are GPTs configured primarily through well-crafted system instructions,
    allowing them to perform a specific function or task consistently.
  id: totrans-1660
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是通过精心设计的系统指令配置的 GPT，使它们能够持续执行特定功能或任务。
- en: 'Think of them like:'
  id: totrans-1661
  prefs: []
  type: TYPE_NORMAL
  zh: 想象它们就像：
- en: A script doctor that polishes dialogue and ensures pacing
  id: totrans-1662
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个润色对话并确保节奏的剧本医生
- en: A startup pitch reviewer trained on investor psychology
  id: totrans-1663
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个经过投资者心理学训练的初创企业提案审查员
- en: A daily planner that maps out goals, time blocks, and reflections
  id: totrans-1664
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个规划日常目标、时间块和反思的每日规划器
- en: A sales script generator with brand tone and objection handling pre-baked in
  id: totrans-1665
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个带有品牌语气和预先设定的异议处理的销售脚本生成器
- en: They're smart utilities, powered by prompts—not code.
  id: totrans-1666
  prefs: []
  type: TYPE_NORMAL
  zh: 它们是智能工具，由提示而非代码驱动。
- en: 2\. The Anatomy of an Instruction-Driven Tool
  id: totrans-1667
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 指令驱动工具的解剖结构
- en: 'A high-performing instruction-driven GPT includes:'
  id: totrans-1668
  prefs: []
  type: TYPE_NORMAL
  zh: 一个高性能的指令驱动 GPT 包括：
- en: 'Role Definition: Who the GPT is and what it’s meant to do'
  id: totrans-1669
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 角色定义：GPT 是谁以及它的预期任务
- en: 'Behavior Rules: How it responds, formats, and handles edge cases'
  id: totrans-1670
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行为规则：它的响应、格式处理和边缘情况处理
- en: 'Task Flow: A sequence or pattern the GPT should follow'
  id: totrans-1671
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务流程：GPT 应遵循的顺序或模式
- en: 'Input Expectations: How the user should interact with it'
  id: totrans-1672
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入预期：用户如何与之互动
- en: 'Limitations: What it should avoid or disclaim'
  id: totrans-1673
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 局限性：它应该避免或声明的内容
- en: 'Example:'
  id: totrans-1674
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “You are a resume optimization tool for tech roles. You analyze resumes for
    clarity, skill alignment, and keyword targeting. Always suggest actionable edits
    in bullet points. Never rewrite the resume directly—only critique and guide.”
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一个针对技术职位的简历优化工具。你分析简历的清晰度、技能匹配和关键词定位。始终以项目符号形式提出可操作的编辑建议。直接重写简历——只进行评论和指导。”
- en: 3\. Use Instruction Templates to Speed Creation
  id: totrans-1676
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 使用指令模板加速创建
- en: 'Here are a few ready-to-adapt templates for various use cases:'
  id: totrans-1677
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些适用于各种用例的现成模板：
- en: 'Writing Assistant:'
  id: totrans-1678
  prefs: []
  type: TYPE_NORMAL
  zh: 写作助手：
- en: “You are a writing assistant that improves clarity and style in blog posts.
    Always begin by summarizing the main idea. Then, suggest sentence-level improvements.
    Use examples to show edits.”
  id: totrans-1679
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一个提高博客文章清晰度和风格的写作助手。始终从总结主要想法开始。然后，提出句子级别的改进建议。使用示例来展示编辑。”
- en: 'Event Planner:'
  id: totrans-1680
  prefs: []
  type: TYPE_NORMAL
  zh: 活动策划者：
- en: “You are a creative event planner. Ask the user about the event type, audience,
    budget, and mood. Then generate a full event concept, including venue ideas, theme,
    and timeline.”
  id: totrans-1681
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一个创意活动策划者。询问用户关于活动类型、受众、预算和氛围。然后生成完整的活动概念，包括场地想法、主题和时间表。”
- en: 'Idea Generator:'
  id: totrans-1682
  prefs: []
  type: TYPE_NORMAL
  zh: 灵感生成器：
- en: “You are a rapid idea generator. Always return exactly 5 ideas, ordered from
    most conventional to most original. Use casual, energetic tone.”
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: “你是一个快速灵感生成器。始终准确返回5个想法，从最传统到最原创排序。使用轻松、充满活力的语气。”
- en: These templates act like mental blueprints, helping the GPT focus tightly on
    its task.
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模板像心理蓝图一样，帮助 GPT 专注于其任务。
- en: 4\. Enforce Consistency with Instructions
  id: totrans-1685
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 使用指令确保一致性
- en: 'If your GPT ever “wanders,” reinforce consistency by adding strict phrasing
    like:'
  id: totrans-1686
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的 GPT 任何时候“迷失方向”，通过添加严格的措辞来强化一致性，例如：
- en: “Always begin your answer with...”
  id: totrans-1687
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “始终以……开始你的回答。”
- en: “Never suggest solutions without...”
  id: totrans-1688
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “在没有……的情况下永远不要建议解决方案。”
- en: “Do not answer outside your assigned role.”
  id: totrans-1689
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “不要超出你分配的角色回答。”
- en: “If the user gives an unclear prompt, ask clarifying questions first.”
  id: totrans-1690
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “如果用户给出不明确的提示，首先提出澄清问题。”
- en: This sets clear behavioral expectations—even for a model with open-ended flexibility.
  id: totrans-1691
  prefs: []
  type: TYPE_NORMAL
  zh: 这设定了明确的行为期望——即使是具有开放式灵活性的模型也是如此。
- en: 5\. Layer Functionality with Prompt Patterns
  id: totrans-1692
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 使用提示模式分层功能。
- en: 'Some GPT tools can offer step-by-step flows using instruction patterns. For
    example:'
  id: totrans-1693
  prefs: []
  type: TYPE_NORMAL
  zh: 一些 GPT 工具可以使用指令模式提供逐步流程。例如：
- en: 'AI Content Strategy Tool:'
  id: totrans-1694
  prefs: []
  type: TYPE_NORMAL
  zh: AI 内容策略工具：
- en: 1\. Ask for topic or audience.
  id: totrans-1695
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 询问主题或受众。
- en: 2\. Generate 3 blog angles with titles.
  id: totrans-1696
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 生成带有标题的 3 个博客角度。
- en: 3\. Suggest a CTA for each post.
  id: totrans-1697
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 为每篇帖子建议一个行动号召。
- en: 4\. Offer a publishing schedule.
  id: totrans-1698
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 提供发布时间表。
- en: By describing these steps in the GPT’s instructions, you turn it into a mini-app
    with predictable flow.
  id: totrans-1699
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在 GPT 的指令中描述这些步骤，你将其转变为具有可预测流程的迷你应用程序。
- en: 6\. Combine with Embedded Files
  id: totrans-1700
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 与嵌入式文件结合使用。
- en: 'Instruction-driven tools become even more potent when paired with your uploaded
    data. Example:'
  id: totrans-1701
  prefs: []
  type: TYPE_NORMAL
  zh: 当与上传的数据结合使用时，指令驱动的工具变得更加有效。例如：
- en: A contract review tool trained on legal templates
  id: totrans-1702
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个在法律模板上训练的合同审查工具。
- en: A nutrition planner using your food guidelines
  id: totrans-1703
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个使用你的食品指南的营养规划师。
- en: A coaching tool referencing your workbook or framework
  id: totrans-1704
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个参考你的工作簿或框架的辅导工具。
- en: 'Add this to your system instructions:'
  id: totrans-1705
  prefs: []
  type: TYPE_NORMAL
  zh: 将此添加到你的系统指令中：
- en: “Refer to the uploaded PDF ‘Client Coaching Method’ for all advice formats.
    Never go off-script.”
  id: totrans-1706
  prefs: []
  type: TYPE_NORMAL
  zh: “请参考上传的 PDF ‘客户辅导方法’中的所有建议格式。永远不要偏离脚本。”
- en: This ensures it stays on-brand and on-task.
  id: totrans-1707
  prefs: []
  type: TYPE_NORMAL
  zh: 这确保了它保持品牌一致性和任务导向。
- en: 7\. Real Examples of Instruction-Driven GPTs
  id: totrans-1708
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 指令驱动的 GPT 的真实示例。
- en: Book Outline Generator – Breaks down ideas into structured chapters
  id: totrans-1709
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 书籍提纲生成器 – 将想法分解为结构化的章节。
- en: Startup Idea Validator – Assesses ideas across problem, market, moat
  id: totrans-1710
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创业想法验证器 – 评估跨问题、市场、护城河的想法。
- en: Therapeutic Journal Coach – Asks reflection prompts, then responds with insights
  id: totrans-1711
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 治疗性日记辅导师 – 提出反思提示，然后提供洞见。
- en: UX Copy Tester – Reviews button text and landing pages for clarity and motivation
  id: totrans-1712
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: UX 文本测试器 – 审查按钮文本和着陆页的清晰度和激励性。
- en: If you can describe a process, you can build a GPT that follows it—every time.
  id: totrans-1713
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够描述一个过程，你就可以构建一个每次都能遵循该过程的 GPT。
- en: 'Conclusion: The Power of Prompt as Product'
  id: totrans-1714
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：提示作为产品的力量。
- en: Instruction-driven tools prove that your words are your code. With clear instructions
    and intentional design, your GPT can be as useful as a custom-built app—without
    ever touching a line of JavaScript.
  id: totrans-1715
  prefs: []
  type: TYPE_NORMAL
  zh: 指令驱动的工具证明你的话是你的代码。通过清晰的指令和有意的设计，你的 GPT 可以像定制应用程序一样有用——而不必触及任何一行 JavaScript。
- en: PART VII  REAL-WORLD USE CASES
  id: totrans-1716
  prefs: []
  type: TYPE_NORMAL
  zh: 第七部分  真实世界的用例。
- en: 'Chapter 31: Generating New Ideas'
  id: totrans-1717
  prefs: []
  type: TYPE_NORMAL
  zh: 第 31 章：生成新想法。
- en: The ability to generate fresh, creative, and actionable ideas is one of the
    most valuable ways to use AI in real life. Whether you're an entrepreneur brainstorming
    a product, a teacher designing lesson plans, or a content creator developing new
    formats, AI can act as a rapid ideation partner—one that never runs out of steam.
  id: totrans-1718
  prefs: []
  type: TYPE_NORMAL
  zh: 生成新颖、创造性和可操作的想法是使用 AI 的最宝贵方式之一。无论你是企业家头脑风暴产品，教师设计课程计划，还是内容创作者开发新格式，AI 都可以作为一个快速头脑风暴伙伴——永远不会耗尽灵感。
- en: In this chapter, we'll explore how to use AI, particularly tools like ChatGPT,
    to consistently spark new ideas, filter the best ones, and iterate on them to
    unlock innovation.
  id: totrans-1719
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨如何使用 AI，特别是像 ChatGPT 这样的工具，来持续激发新想法，筛选最佳想法，并迭代它们以解锁创新。
- en: 1\. Why Idea Generation with AI Works So Well
  id: totrans-1720
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 为什么使用 AI 进行创意生成效果如此之好。
- en: AI models like GPT-4 are trained on a wide range of data—books, websites, technical
    manuals, fiction, social commentary, and more. That diverse background makes them
    ideal brainstorming partners.
  id: totrans-1721
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于 GPT-4 的 AI 模型在广泛的数据上进行了训练——书籍、网站、技术手册、小说、社会评论等等。这种多样化的背景使它们成为理想的头脑风暴伙伴。
- en: 'They don’t suffer from:'
  id: totrans-1722
  prefs: []
  type: TYPE_NORMAL
  zh: 他们不受：
- en: Creative fatigue
  id: totrans-1723
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创造性疲劳。
- en: Bias toward “safe” ideas
  id: totrans-1724
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 倾向于“安全”的想法。
- en: Fear of failure or embarrassment
  id: totrans-1725
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 失败或尴尬的恐惧。
- en: 'And they do excel at:'
  id: totrans-1726
  prefs: []
  type: TYPE_NORMAL
  zh: 他们确实擅长：
- en: Connecting disparate concepts
  id: totrans-1727
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 连接不同的概念。
- en: Generating lists with variations
  id: totrans-1728
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成具有变化的列表。
- en: Applying known frameworks creatively
  id: totrans-1729
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创造性地应用已知框架。
- en: 2\. Crafting Your Prompt for Idea Generation
  id: totrans-1730
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 为创意生成制作提示。
- en: 'The quality of your prompt shapes the range and relevance of ideas. Here are
    some effective formats:'
  id: totrans-1731
  prefs: []
  type: TYPE_NORMAL
  zh: 你的提示的质量决定了想法的范围和相关性。以下是一些有效的格式：
- en: 'Basic:'
  id: totrans-1732
  prefs: []
  type: TYPE_NORMAL
  zh: 基本框架：
- en: “Give me 10 new business ideas for remote workers.”
  id: totrans-1733
  prefs: []
  type: TYPE_NORMAL
  zh: “给我10个针对远程工作者的新商业想法。”
- en: 'Framed:'
  id: totrans-1734
  prefs: []
  type: TYPE_NORMAL
  zh: 框架：
- en: “Act like a marketing strategist. What are 5 out-of-the-box campaign ideas for
    a new vegan snack brand?”
  id: totrans-1735
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演一名市场营销策略家。为一个新的素食零食品牌提供5个突破性的营销活动想法。”
- en: 'Constrained:'
  id: totrans-1736
  prefs: []
  type: TYPE_NORMAL
  zh: 受限的：
- en: “Generate 5 app ideas for students that require no internet connection and solve
    academic challenges.”
  id: totrans-1737
  prefs: []
  type: TYPE_NORMAL
  zh: “为需要无互联网连接并解决学术挑战的学生生成5个应用程序想法。”
- en: 'Iterative:'
  id: totrans-1738
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代的：
- en: “Give me 3 ideas for a YouTube series. Then choose one and expand it into a
    5-episode outline.”
  id: totrans-1739
  prefs: []
  type: TYPE_NORMAL
  zh: “给我3个YouTube系列的创意。然后选择一个并扩展成5集大纲。”
- en: You can use roles, constraints, and scaffolds to tailor the creativity to your
    niche or domain.
  id: totrans-1740
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用角色、约束和支架来定制创意以适应你的利基或领域。
- en: 3\. Use Cases Across Industries
  id: totrans-1741
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 行业内的用例
- en: Entrepreneurs
  id: totrans-1742
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创业者
- en: Product concepts, pricing models, startup names
  id: totrans-1743
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 产品概念、定价模型、初创公司名称
- en: Unique selling propositions (USPs) and brand angles
  id: totrans-1744
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 独特的销售主张（USPs）和品牌角度
- en: Writers & Creators
  id: totrans-1745
  prefs: []
  type: TYPE_NORMAL
  zh: 作家与创作者
- en: Story hooks, plot twists, character traits
  id: totrans-1746
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 故事钩子、情节转折、人物特质
- en: Video titles, podcast formats, content calendars
  id: totrans-1747
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频标题、播客格式、内容日历
- en: Educators
  id: totrans-1748
  prefs: []
  type: TYPE_NORMAL
  zh: 教育工作者
- en: Interactive lesson ideas, student project topics
  id: totrans-1749
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 互动式课程想法、学生项目主题
- en: Creative ways to teach difficult concepts
  id: totrans-1750
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创造性地教授困难概念的方法
- en: Marketers
  id: totrans-1751
  prefs: []
  type: TYPE_NORMAL
  zh: 市场营销人员
- en: Ad concepts, campaign slogans, social media angles
  id: totrans-1752
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 广告概念、活动口号、社交媒体角度
- en: Email subject line variations
  id: totrans-1753
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 邮件主题行变化
- en: Researchers
  id: totrans-1754
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人员
- en: Experiment frameworks, study titles, interdisciplinary topic mashups
  id: totrans-1755
  prefs: []
  type: TYPE_NORMAL
  zh: 实验框架、研究标题、跨学科主题混合
- en: 4\. Turning Ideas into Actionable Plans
  id: totrans-1756
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 将想法转化为可执行的计划
- en: 'An idea is just the beginning. AI can help flesh out:'
  id: totrans-1757
  prefs: []
  type: TYPE_NORMAL
  zh: 一个想法只是开始。AI可以帮助完善：
- en: 'Next steps: “Turn this idea into a 3-phase project plan.”'
  id: totrans-1758
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下一步：“将这个想法转化为3阶段的项目计划。”
- en: 'Evaluation: “Rank these 5 ideas by potential ROI.”'
  id: totrans-1759
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估：“按潜在投资回报率对这些5个想法进行排名。”
- en: 'Pitching: “Write a one-sentence pitch for each idea.”'
  id: totrans-1760
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 投资提案：“为每个想法写一个一句话的提案。”
- en: 'Refinement: “Make this idea more viable for a Gen Z audience.”'
  id: totrans-1761
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精炼：“使这个想法更适合Z世代受众。”
- en: Each interaction builds upon the last. This iterative loop makes AI an excellent
    co-creator, not just a list-maker.
  id: totrans-1762
  prefs: []
  type: TYPE_NORMAL
  zh: 每次互动都是基于上一次的。这种迭代循环使AI成为一个出色的共同创作者，而不仅仅是列表制作者。
- en: 5\. Tips to Avoid Recycled or Generic Ideas
  id: totrans-1763
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 避免重复或通用想法的技巧
- en: 'To generate fresh content:'
  id: totrans-1764
  prefs: []
  type: TYPE_NORMAL
  zh: 生成新内容：
- en: Ask for contradictory or counterintuitive ideas
  id: totrans-1765
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请求矛盾或反直觉的想法
- en: 'Add unusual constraints: “Give ideas that only use sound and no visuals”'
  id: totrans-1766
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加不寻常的约束：“只使用声音而不使用视觉的想法。”
- en: 'Request analogies or blends: “Combine AI with farming to generate business
    ideas”'
  id: totrans-1767
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请求类比或混合：“将AI与农业结合以生成商业想法”
- en: Ask for provocative or “bad” ideas—then reverse-engineer what works
  id: totrans-1768
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请求具有挑衅性或“不好”的想法——然后逆向工程哪些是有效的
- en: Creativity often comes from friction and limits, not freedom.
  id: totrans-1769
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力通常来自摩擦和限制，而不是自由。
- en: 6\. From Ideas to Innovation
  id: totrans-1770
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 从想法到创新
- en: 'Here’s a flow you can use:'
  id: totrans-1771
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个你可以使用的流程：
- en: 1\. Generate – Ask for 10–20 raw ideas
  id: totrans-1772
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 生成——请求10-20个原始想法
- en: 2\. Shortlist – Choose the 2–3 most promising
  id: totrans-1773
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 短名单——选择2-3个最有前途的
- en: 3\. Refine – Expand them into outlines or user journeys
  id: totrans-1774
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 精炼——将它们扩展成大纲或用户旅程
- en: 4\. Test – Use follow-up prompts to simulate user feedback
  id: totrans-1775
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 测试——使用后续提示来模拟用户反馈
- en: 5\. Launch – Use the final ideas in real-world projects or GPT-driven tools
  id: totrans-1776
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 发布——在实际项目或GPT驱动的工具中使用最终想法
- en: This AI-assisted workflow saves time and often surfaces ideas you wouldn’t have
    thought of alone.
  id: totrans-1777
  prefs: []
  type: TYPE_NORMAL
  zh: 这种AI辅助的工作流程节省时间，并经常提出你独自无法想到的想法。
- en: 'Conclusion: Unlimited Spark, On Demand'
  id: totrans-1778
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：无限火花，按需提供
- en: In a world where innovation is currency, having an AI that can deliver a steady
    stream of relevant, creative, and unexpected ideas is like owning a brainstorming
    machine that never sleeps. With the right prompts and some intentional iteration,
    you’ll never run out of fuel for your next big thing.
  id: totrans-1779
  prefs: []
  type: TYPE_NORMAL
  zh: 在创新是货币的世界里，拥有一个能够提供稳定流的相关、创新和意外想法的AI，就像拥有一个永不休息的头脑风暴机器。有了正确的提示和一些有意的迭代，你永远不会耗尽你下一个大项目的燃料。
- en: 'Chapter 32: Multilingual Messaging'
  id: totrans-1780
  prefs: []
  type: TYPE_NORMAL
  zh: 第32章：多语言信息传递
- en: In an increasingly global world, the ability to communicate across languages
    is no longer a luxury—it's a necessity. Whether you're running an international
    business, creating content for diverse audiences, or connecting with people in
    different regions, multilingual messaging unlocks new levels of reach and relevance.
  id: totrans-1781
  prefs: []
  type: TYPE_NORMAL
  zh: 在日益全球化的世界中，跨语言沟通的能力不再是奢侈品，而是一种必需品。无论您是经营国际业务、为多元化的受众创建内容，还是与不同地区的人建立联系，多语言信息解锁了新的接触和相关性水平。
- en: This chapter explores how AI can help you craft, translate, and adapt messages
    across multiple languages—while preserving intent, tone, and cultural sensitivity.
  id: totrans-1782
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了AI如何帮助您在多种语言中构思、翻译和调整信息——同时保持意图、语调和文化敏感性。
- en: '1\. Beyond Translation: Messaging with Meaning'
  id: totrans-1783
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 译意之外：有意义的沟通
- en: 'While AI can provide literal translations, effective multilingual messaging
    goes deeper than word-for-word conversion. It involves:'
  id: totrans-1784
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然AI可以提供字面翻译，但有效的多语言信息比逐字转换更深入。它包括：
- en: Cultural context
  id: totrans-1785
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文化背景
- en: Tone and formality
  id: totrans-1786
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语调和正式程度
- en: Regional nuances
  id: totrans-1787
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 地区差异
- en: Intent and emotion
  id: totrans-1788
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意图和情感
- en: For example, a playful ad slogan in English may need a completely different
    tone in Japanese to convey the same feeling.
  id: totrans-1789
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个英语中的俏皮广告标语可能需要在日语中完全不同的语调才能传达同样的感觉。
- en: With the right prompting, AI can adapt messaging across cultures while keeping
    the core message intact.
  id: totrans-1790
  prefs: []
  type: TYPE_NORMAL
  zh: 通过适当的提示，AI可以在保持核心信息完整的同时，适应跨文化信息。
- en: 2\. Prompting for Multilingual Messaging
  id: totrans-1791
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 多语言信息提示
- en: 'You can instruct AI to:'
  id: totrans-1792
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以指示AI：
- en: Basic Translation
  id: totrans-1793
  prefs: []
  type: TYPE_NORMAL
  zh: 基本翻译
- en: “Translate this sentence into French and Spanish.”
  id: totrans-1794
  prefs: []
  type: TYPE_NORMAL
  zh: “将此句子翻译成法语和西班牙语。”
- en: Contextual Messaging
  id: totrans-1795
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文信息
- en: “Rewrite this promotional message in German, keeping it friendly and persuasive
    for a young audience.”
  id: totrans-1796
  prefs: []
  type: TYPE_NORMAL
  zh: “将此促销信息重写为德语，保持对年轻受众友好和有说服力。”
- en: Tone Matching
  id: totrans-1797
  prefs: []
  type: TYPE_NORMAL
  zh: 语调匹配
- en: “Translate this email into Japanese with a formal, respectful tone suitable
    for a business context.”
  id: totrans-1798
  prefs: []
  type: TYPE_NORMAL
  zh: “将此电子邮件翻译成日语，使用正式、尊重的语调，适合商业环境。”
- en: Audience Adaptation
  id: totrans-1799
  prefs: []
  type: TYPE_NORMAL
  zh: 适应听众
- en: “How would you write this announcement for an audience in Mexico vs. Spain?”
  id: totrans-1800
  prefs: []
  type: TYPE_NORMAL
  zh: “您会如何为墨西哥和西班牙的受众撰写此公告？”
- en: The more specific your instructions, the more culturally appropriate the response.
  id: totrans-1801
  prefs: []
  type: TYPE_NORMAL
  zh: 您的指示越具体，响应的文化适宜性就越高。
- en: 3\. Use Cases Across Industries
  id: totrans-1802
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 行业内的应用案例
- en: Business & Marketing
  id: totrans-1803
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 商业与营销
- en: Product descriptions and ads localized for target markets
  id: totrans-1804
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
