- en: Note
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: Since JSON objects can contain arrays (which can be hard to represent in a table),
    we’re using the notation “ ↳ ” to indicate the elements of an array. As you can
    see from the previous table, “id,” “object,” “created,” and “owned_by” are all
    elements of the “data” array in the JSON response.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 JSON 对象可以包含数组（在表格中难以表示），我们使用“ ↳ ”符号来表示数组的元素。如前表所示，“id”、“object”、“created”和“owned_by”都是
    JSON 响应中“data”数组的元素。
- en: 'Now that we have the details of the HTTP request and response, we can now create
    the ListModel.java app using the prompt shown in Listing [2-1](#PC1).**System**:
    You are a Java developer**User**: Take the following cURL command and convert
    it to Java. Name the file, "ListModels.java"**User**: curl https://api.openai.com/v1/models
    \  -H "Authorization: Bearer $OPENAI_API_KEY"Listing 2-1'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: '现在我们已经了解了 HTTP 请求和响应的详细信息，我们可以使用如清单 [2-1](#PC1) 所示的提示来创建 ListModel.java 应用程序。**系统**:
    你是一位 Java 开发者**用户**: 将以下 cURL 命令转换为 Java。文件名为 "ListModels.java"**用户**: curl https://api.openai.com/v1/models
    \  -H "Authorization: Bearer $OPENAI_API_KEY"清单 2-1'
- en: PROMPT. Using ChatGPT to Create the ListModels.java App
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: PROMPT. 使用 ChatGPT 创建 ListModels.java 应用程序
- en: 'So, after sending the prompt, ChatGPT will provide you an answer as shown in
    Listing [2-2](#PC2).![](../images/607613_1_En_2_Chapter/607613_1_En_2_Figa_HTML.gif)A
    logo of open A I.import java.io.BufferedReader;import java.io.InputStreamReader;import
    java.net.HttpURLConnection;import java.net.URL;public class ListModels {        public
    static void main(String[] args) {        try {            // Create URL object
    for the API endpoint            URL url = new URL("https://api.openai.com/v1/models");            //
    Create HttpURLConnection object            HttpURLConnection conn = (HttpURLConnection)
    url.openConnection();            // Set request method            conn.setRequestMethod("GET");            //
    Set Authorization header            conn.setRequestProperty("Authorization", "Bearer
    $OPENAI_API_KEY");            // Get response code            int responseCode
    = conn.getResponseCode();            // If the request was successful (status
    code 200)            if (responseCode == HttpURLConnection.HTTP_OK) {                //
    Read the response from the API                BufferedReader in = new BufferedReader(new
    InputStreamReader(conn.getInputStream()));                String inputLine;                StringBuilder
    response = new StringBuilder();                while ((inputLine = in.readLine())
    != null) {                response.append(inputLine);                }                in.close();                //
    Print the response                System.out.println(response.toString());            }
    else {                System.out.println("Request failed. Response Code: " + responseCode);            }            //
    Close the connection            conn.disconnect();        } catch (Exception e)
    {            e.printStackTrace();        }        }}Listing 2-2'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: '因此，在发送提示后，ChatGPT将提供如列表[2-2](#PC2)所示的答案。![open A I的标志](../images/607613_1_En_2_Chapter/607613_1_En_2_Figa_HTML.gif)open
    A I的标志导入java.io.BufferedReader;导入java.io.InputStreamReader;导入java.net.HttpURLConnection;导入java.net.URL;public
    class ListModels {        public static void main(String[] args) {        try
    {            // 为API端点创建URL对象            URL url = new URL("https://api.openai.com/v1/models");            //
    创建HttpURLConnection对象            HttpURLConnection conn = (HttpURLConnection)
    url.openConnection();            // 设置请求方法            conn.setRequestMethod("GET");            //
    设置Authorization头            conn.setRequestProperty("Authorization", "Bearer $OPENAI_API_KEY");            //
    获取响应代码            int responseCode = conn.getResponseCode();            // 如果请求成功（状态码200）            if
    (responseCode == HttpURLConnection.HTTP_OK) {                // 从API读取响应                BufferedReader
    in = new BufferedReader(new InputStreamReader(conn.getInputStream()));                String
    inputLine;                StringBuilder response = new StringBuilder();                while
    ((inputLine = in.readLine()) != null) {                response.append(inputLine);                }                in.close();                //
    打印响应                System.out.println(response.toString());            } else
    {                System.out.println("请求失败。响应代码: " + responseCode);            }            //
    关闭连接            conn.disconnect();        } catch (Exception e) {            e.printStackTrace();        }        }}列表2-2'
- en: RESPONSE. ListModels.java
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: RESPONSE. ListModels.java
- en: Fantastic! Now all you have to do is to replace “$OPENAI_API_KEY” with the value
    of your actual API key.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 太棒了！现在你只需要将“$OPENAI_API_KEY”替换为你的实际API密钥的值。
