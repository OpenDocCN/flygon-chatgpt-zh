  zh: 到目前为止，你可以继续尝试更多内容的想法，或者你可以保存从 ChatGPT 获得的所有内容并开始行动。正如游戏玩家所说，让我们开始吧。
- en: So that we have ideas and a plan for our online gaming channel, let’s change
    gears slightly and see what else ChatGPT can do for content creators.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 为了我们有想法和计划我们的在线游戏频道，让我们稍微改变一下方向，看看 ChatGPT 还能为内容创作者做些什么。
- en: Asking ChatGPT How You Can Glow Up and Approach Sponsors to Monetize a Beauty
    Vlogger’s Viewership
  id: totrans-352
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向 ChatGPT 询问如何提升自己并接近赞助商以货币化美妆博主的观众群
- en: Starting and maintaining a YouTube channel can be a fun hobby. Beauty vlogging
    is a popular venture that individuals begin simply because they enjoy showing
    off various creative ensembles, make up tutorials, or favorite products and brands.
    But for those that want to monetize their hobby, what was once fun becomes complex.
    One of the most reliable ways of monetizing their content is to make deals with
    sponsors, especially in the realm of beauty, where there are any number of products
    on the market with brands willing to make deals with beauty vloggers that stand
    out.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 开始和维护 YouTube 频道可以是一个有趣的爱好。美妆博主是一个受欢迎的创业项目，个人开始这个项目仅仅是因为他们喜欢展示各种创意装束、化妆教程或最喜欢的产品品牌。但对于那些想要将他们的爱好货币化的人来说，曾经有趣的事情变得复杂。将内容货币化的最可靠方式之一是与赞助商达成协议，尤其是在美妆领域，那里有无数的产品和品牌愿意与突出的美妆博主达成交易。
- en: For any number of beauty bloggers, getting a good viewership and having a healthy
    relationship with potential brands for future sponsorship deals is the first step
    toward being able to monetize a beauty vlogging hobby. But first… how do you even
    get a sponsor in the first place? Well, let’s ask ChatGPT.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 对于任何数量的美妆博主来说，获得良好的观众群，并与潜在品牌建立健康的关系，以便未来进行赞助交易，是能够将美妆博主爱好货币化的第一步。但首先……你如何首先获得赞助商呢？好吧，让我们问问
    ChatGPT。
- en: Learning About Sponsorships on YouTube with ChatGPT
  id: totrans-355
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 了解 YouTube 赞助情况
- en: The prompt below is our first attempt to get ideas from ChatGPT on getting sponsors
    for a relatively new beauty vlogger on YouTube.You are a PR manager for a beauty
    vlogger just getting started on YouTube. How do you get started looking for sponsors?Prompt
    3-3
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的提示是我们第一次尝试从 ChatGPT 获得关于如何为相对较新的 YouTube 美妆博主获取赞助商的想法。你是一名美妆博主 YouTube 刚起步的公关经理。你如何开始寻找赞助商？提示
    3-3
- en: A simple prompt for getting sponsors for a YouTube channel
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 为 YouTube 频道获取赞助商的简单提示
- en: 'Notice how we gave ChatGPT a role, yet again, in order to curate a response
    that will give us actionable advice, not just tips and suggestions that don’t
    actually create a plan. Now let’s look at the response, as is shown in Response
    [3-3](#PC6).Getting started with finding sponsors for a new beauty vlogger on
    YouTube involves several strategic steps. Here''s a detailed plan to help you
    get started:**1\. Build a Solid Foundation***a. Professional Branding:*   - Create
    a professional media kit: Include the vlogger''s bio, audience demographics, social
    media statistics, and engagement rates.   - Optimize social media profiles: Ensure
    all social media platforms are consistent and professional.   - Quality Content:
    Ensure the videos are high quality, engaging, and consistent in terms of style
    and posting schedule.*b. Audience Analysis:*   - Know Your Audience: Collect data
    on your audience demographics, interests, and behavior. Tools like YouTube Analytics,
    Google Analytics, and social media insights are helpful.**2\. Research Potential
    Sponsors***a. Identify Relevant Brands:*   - Niche Alignment: Look for brands
    that align with the vlogger’s niche, values, and audience.   - Competitive Analysis:
    Observe which brands are sponsoring similar vloggers.*b. Create a Target List:*   -
    Compile a list of potential brands and companies that are a good fit.**3\. Craft
    a Compelling Pitch***a. Personalized Outreach:*   - Customize each pitch: Tailor
    the message to highlight how the vlogger’s content aligns with the brand’s goals.   -
    **Highlight Audience Engagement**: Emphasize high engagement rates, audience loyalty,
    and any unique value the vlogger brings.*b. Offer Value Propositions:*   - Unique
    Selling Points: What sets the vlogger apart from others?   - Collaboration Ideas:
    Propose creative and engaging content ideas for collaborations.**4\. Utilize Networking
    and Platforms***a. Leverage Existing Networks:*   - Reach out to industry contacts:
    Use any existing relationships within the beauty and influencer industry.*b. Use
    Sponsorship Platforms:*   - Influencer Marketing Platforms: Sign up on platforms
    like FameBit, AspireIQ, or Grapevine Logic where brands look for influencers.   -
    Marketplaces and Agencies: Consider joining influencer marketing agencies or marketplaces.**5\.
    Consistent Follow-Up and Relationship Building***a. Follow Up:*   - Polite and
    Professional: Follow up on pitches respectfully and professionally if you don’t
    receive a response initially.*b. Build Long-Term Relationships:*   - Deliver on
    Promises: Ensure that any sponsorship deals are executed flawlessly.   - Feedback
    and Reporting: Provide brands with detailed reports on the performance of sponsored
    content.**6\. Continual Improvement***a. Gather Feedback:*   - From Brands: Ask
    for feedback to improve future collaborations.   - From Audience: Monitor audience
    reactions and engagement to sponsored content.*b. Adapt Strategies:*   - Stay
    Updated: Keep up with industry trends and adjust your strategies accordingly.   -
    Experiment: Try different types of content and sponsorship models to see what
    works best.**Example Email Template for Pitching**Subject: Collaboration Opportunity
    with [Your Vlogger Name]Hi [Brand Representative’s Name],I hope this email finds
    you well. My name is [Your Name], and I manage [Vlog Channel Name], a rising beauty
    vlogger on YouTube who is passionate about [specific niche, e.g., cruelty-free
    beauty, skincare routines, etc.].With a rapidly growing audience of [number] subscribers
    and an engagement rate of [percentage], [Your Name’s] content resonates with [brief
    description of the audience demographics]. We are impressed by [Brand’s Name]’s
    commitment to [specific brand values or products] and believe there is a fantastic
    opportunity for a collaboration that could be mutually beneficial.We would love
    to discuss how we can work together to create engaging and authentic content that
    highlights [Brand’s Name] products to an enthusiastic and loyal audience. Attached
    is our media kit for your review.Looking forward to the possibility of collaborating
    with you.Best regards,[Your Name][Your Contact Information]By following these
    steps and continually refining your approach, you can effectively start securing
    sponsorships for the new beauty vlogger.Response 3-3'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 注意我们是如何再次为ChatGPT分配了一个角色，以便编制一个既能提供可操作建议，又不仅仅只是提供没有实际计划的小贴士和建议的响应。现在让我们来看看响应，正如在响应[3-3](#PC6)中所示。在YouTube上为新的美妆博主寻找赞助商需要几个战略步骤。以下是一个详细的计划，以帮助您开始：**1.
    建立坚实的基础***a. 专业品牌建设：*   - 创建专业的媒体资料包：包括博主的简介、受众人口统计、社交媒体统计数据和参与率。   - 优化社交媒体资料：确保所有社交媒体平台保持一致且专业。   -
    高质量内容：确保视频质量高、引人入胜，并在风格和发布时间上保持一致。*b. 受众分析：*   - 了解您的受众：收集有关受众人口统计、兴趣和行为的数据。YouTube分析、Google分析和社会媒体洞察等工具很有帮助。**2.
    研究潜在赞助商***a. 确定相关品牌：*   - 利基一致性：寻找与博主利基、价值观和受众相一致的品牌。   - 竞争分析：观察哪些品牌正在赞助类似的博主。*b.
    创建目标清单：*   - 汇编一份潜在品牌和公司的清单，这些公司适合您的需求。**3. 制定吸引人的提案***a. 定制化接触：*   - 定制每个提案：调整信息以突出博主的内容如何与品牌目标相一致。   -
    **突出受众参与度**：强调高参与率、受众忠诚度以及博主带来的任何独特价值。*b. 提供价值主张：*   - 独特卖点：博主与他人的区别在哪里？   - 协作想法：提出创意和引人入胜的内容创意，用于合作。**4.
    利用网络和平台***a. 利用现有网络：*   - 联系行业联系人：利用美妆和影响者行业中的任何现有关系。*b. 使用赞助平台：*   - 影响者营销平台：在FameBit、AspireIQ或Grapevine
    Logic等平台上注册，这些平台上有品牌寻找影响者。   - 市场和代理机构：考虑加入影响者营销代理机构或市场。**5. 持续跟进和关系建立***a. 跟进：*   -
    礼貌且专业：如果您最初没有收到回复，请礼貌且专业地跟进提案。*b. 建立长期关系：*   - 履行承诺：确保任何赞助协议都执行得完美无缺。   - 反馈和报告：向品牌提供有关赞助内容表现的详细报告。**6.
    持续改进***a. 收集反馈：*   - 来自品牌：要求反馈以改进未来的合作。   - 来自受众：监控受众对赞助内容的反应和参与度。*b. 适应策略：*   -
    保持更新：跟上行业趋势并根据需要调整您的策略。   - 实验：尝试不同类型的内容和赞助模式，看看哪种效果最好。**提案提案的示例电子邮件模板**主题：与[您的博主姓名]合作的合作机会亲爱的[品牌代表姓名]，希望这封邮件找到您一切安好。我叫[您的姓名]，我管理[博客频道名称]，一个对[特定利基，例如，无动物实验的美妆，护肤程序等]充满热情的YouTube新兴美妆博主。拥有[订阅者数量]的快速增长受众和[百分比]的参与率，[您的姓名]的内容与[受众人口统计的简要描述]产生共鸣。我们对[品牌名称]对[特定品牌价值观或产品]的承诺印象深刻，并相信有一个互利共赢的合作机会。我们非常愿意讨论如何一起创造引人入胜且真实的内容，以向热情且忠诚的受众展示[品牌名称]的产品。附件是我们的媒体资料包供您审阅。期待与您合作的可能性。最好的祝愿，[您的姓名][您的联系方式]通过遵循这些步骤并不断改进您的做法，您可以有效地开始为新美妆博主争取赞助。响应
    3-3
- en: ChatGPT gives advice on securing brand deals for YouTube channels
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 为 YouTube 频道提供品牌合作建议
- en: Well, this response not only gave us an explanation on how to approach sponsors
    but also how to do the appropriate research, find the right contacts, and initiate
    a conversation in a professional way.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，这个回复不仅为我们解释了如何接近赞助商，还介绍了如何进行适当的研究，找到合适的联系人，并以专业的方式开始对话。
- en: As previously mentioned, this advice is very actionable. You can save this conversation
    and use it as a guide right away. But let’s think ahead for a second. What if
    we get a response? What can we expect? Let’s get a little more information before
    we dive right in.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，这些建议非常实用。您可以保存这次对话，立即将其作为指南使用。但让我们提前思考一下。如果我们收到回复怎么办？我们可以期待什么？在我们深入之前，让我们获取更多一点的信息。
- en: Preparing to Maintain Professional Relationships with Advice from ChatGPT
  id: totrans-362
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 根据 ChatGPT 的建议准备维护专业关系
- en: In Prompt [3-4](#PC7), we’re asking for the next steps in a hypothetical where
    we obtain a brand deal from acting upon the advice from the previous step. This
    is helpful for planning ahead and having a strategy already in place for conducting
    business for your channel so you can maintain a professional relationship with
    your brands.What can I, as a beauty vlogger, expect in a positive response from
    a brand I've contacted? How do I negotiate a proper deal?Prompt 3-4
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示 [3-4](#PC7) 中，我们正在询问在根据上一步的建议采取行动后，如何获得品牌合作下一步的操作。这对提前规划并已有策略进行频道商业活动以维护与品牌的职业关系非常有帮助。作为一名美妆博主，我如何期待从我所联系的品牌那里得到积极的回复？我如何谈判一个合适的交易？提示
    3-4
- en: Make a plan for successful correspondences
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 制定成功沟通的计划
- en: 'So, let’s look at what ChatGPT has to say, as you’ll see in Response [3-4](#PC8).As
    a beauty vlogger, receiving a positive response from a brand you''ve contacted
    is an exciting step. Here’s what you can expect in a positive response and how
    to negotiate a proper deal:**Positive Response Indicators***1\. Interest in Collaboration:*   -
    The brand expresses enthusiasm about your content and audience.   - They mention
    specific aspects of your channel that align with their brand values and products.*2\.
    Proposal for Next Steps:*   - They might suggest a meeting or a call to discuss
    potential collaboration ideas in detail.   - They could outline initial thoughts
    on how they envision the partnership.*3\. Request for Additional Information:*   -
    They may ask for more detailed Analytics about your audience.   - They might request
    to see examples of past sponsored content or your media kit.**Negotiating a Proper
    Deal***1\. Understand Your Worth:*   - Know Your Metrics: Be clear about your
    reach (subscribers, followers), engagement rates (likes, comments, shares), and
    viewer demographics.   - Industry Rates: Research standard rates for influencers
    at your level. Tools like Social Bluebook or Influencer Marketing Hub can help.*2\.
    Define the Scope of Work:*   - Content Type: Specify the type of content you will
    create (e.g., dedicated video, mention, Instagram post, story).   - Deliverables:
    Outline the exact deliverables, including the number of posts, platforms, and
    any other requirements (hashtags, mentions, links).*3\. Compensation:*   - Monetary
    Payment: Clearly state your rates for the proposed work.   - Product Compensation:
    If the brand offers products, consider if they complement monetary compensation
    or if they suffice for smaller collaborations.   - Hybrid Deals: Sometimes a mix
    of monetary payment and products can be negotiated.*4\. Usage Rights and Exclusivity:*   -
    Content Usage: Specify if the brand can use the content on their own channels
    and for how long.   - Exclusivity: Discuss if there will be any exclusivity clause
    preventing you from working with competitor brands for a certain period.*5\. Timeline
    and Deadlines:*   - Content Schedule: Agree on a timeline for content creation
    and posting.   - Approval Process: Clarify how the approval process will work
    and how many rounds of revisions are included.*6\. Performance Metrics and Reporting:*   -
    Tracking Performance: Determine how the performance of the sponsored content will
    be tracked and reported back to the brand.   - Delivering Results: Agree on a
    method for delivering these results, such as screenshots of Analytics or access
    to performance data.**Example Response to a Positive Brand Inquiry**Hi [Brand
    Representative’s Name],Thank you for your positive response and the opportunity
    to potentially collaborate with [Brand’s Name]. I’m excited about the possibility
    of working together and believe our audiences would be highly interested in [Brand’s
    Name] products.To better understand how we can create the most effective and engaging
    content, could we schedule a call to discuss the details? I’d love to share some
    ideas on how we can highlight [Brand’s Name] in a way that resonates with my audience.In
    preparation for our discussion, here are some initial thoughts on the collaboration:-
    Type of Content: [e.g., YouTube tutorial featuring [Product], Instagram stories,
    etc.]- Deliverables: [e.g., One dedicated YouTube video, three Instagram posts,
    etc.]- Compensation: [e.g., My rate for this scope of work is $X, and I am open
    to discussing product compensation as well.]- Timeline: [e.g., Proposed timeline
    for content creation and posting.]- Additional Information: [e.g., I have attached
    my media kit for your review.]Looking forward to hearing from you and discussing
    this exciting opportunity further.Best regards,[Your Name][Your Contact Information]**During
    Negotiation**1\. Be Clear and Professional: Maintain professionalism in all communications.
    Be clear and concise about your needs and expectations.2\. Be Open to Compromise:
    Be willing to negotiate terms that work for both parties. Flexibility can often
    lead to a more fruitful collaboration.3\. Get Everything in Writing: Ensure all
    agreed terms are documented in a contract to protect both parties and outline
    responsibilities clearly.By following these steps, you can effectively negotiate
    a fair and beneficial deal with brands interested in collaborating with you.Response
    3-4'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们来看看ChatGPT有什么要说的，正如你在响应[3-4](#PC8)中看到的。作为一名美妆博主，收到你联系的品牌给出的积极回应是一个令人兴奋的步骤。以下是你可以期待在积极回应中看到的内容以及如何谈判一个合适的交易：**积极回应指标**1.
    对合作的兴趣：   - 品牌对你内容和受众表现出热情。   - 他们提到你频道中与品牌价值观和产品相符合的具体方面。2. 下一步提案：   - 他们可能会建议一个会议或电话，以详细讨论潜在的协作想法。   -
    他们可能会概述他们对合作关系的初步设想。3. 请求更多信息：   - 他们可能会要求更多关于你受众的详细分析。   - 他们可能会要求查看你过去赞助内容的示例或你的媒体包。**谈判合适的交易**1.
    了解你的价值：   - 了解你的指标：清楚你的覆盖范围（订阅者、关注者）、参与率（点赞、评论、分享）和观众人口统计。   - 行业标准：研究你级别影响者的标准费用。Social
    Bluebook或Influencer Marketing Hub等工具可以帮助。2. 定义工作范围：   - 内容类型：具体说明你将创建的内容类型（例如，专用视频、提及、Instagram帖子、故事）。   -
    可交付成果：概述确切的交付成果，包括帖子数量、平台以及任何其他要求（标签、提及、链接）。3. 资金：   - 货币支付：清楚地说明你为提议的工作的费率。   -
    产品补偿：如果品牌提供产品，考虑这些产品是否与货币补偿相辅相成，或者是否足以用于较小的合作。   - 混合交易：有时可以协商货币支付和产品的组合。4. 使用权和独家性：   -
    内容使用：指定品牌是否可以在自己的渠道上使用内容以及使用多长时间。   - 独家性：讨论是否会有任何独家条款，防止你在一定时期内与竞争对手品牌合作。5. 时间表和截止日期：   -
    内容时间表：就内容创建和发布的时间表达成一致。   - 审批流程：明确审批流程将如何进行，以及包含多少轮修订。6. 绩效指标和报告：   - 跟踪绩效：确定赞助内容的绩效将如何跟踪和向品牌报告。   -
    交付结果：就交付这些结果的方法达成一致，例如分析截图或访问绩效数据。**对积极品牌调查的示例回应**嗨 [品牌代表姓名]，感谢您的积极回应和与我们品牌[品牌名称]潜在合作的机会。我对合作的可能性感到兴奋，并相信我们的受众会对[品牌名称]的产品非常感兴趣。为了更好地了解我们如何创建最有效和吸引人的内容，我们可以安排一个电话讨论细节吗？我很乐意分享一些关于如何以与我受众产生共鸣的方式突出[品牌名称]的想法。在讨论之前，以下是我对合作的初步想法：-
    内容类型：[例如，展示[产品]的YouTube教程、Instagram故事等]- 可交付成果：[例如，一个专门的YouTube视频、三个Instagram帖子等]-
    资金：[例如，我为此工作范围的费率是X美元，我愿意讨论产品补偿。]- 时间表：[例如，内容创建和发布的建议时间表。]- 其他信息：[例如，我已经附上了我的媒体包供您审阅。]期待您的回复，进一步讨论这个激动人心的机会。最好的祝愿，[你的名字][你的联系方式]**谈判期间**1.
    保持清晰和专业：在所有通讯中保持专业。清楚地、简洁地说明你的需求和期望。2. 保持开放态度：愿意协商对双方都有利的条款。灵活性往往会导致更富有成效的合作。3.
    将所有协议写成书面文件：确保所有协议都记录在合同中，以保护双方并清楚地概述责任。通过遵循这些步骤，你可以有效地与有兴趣与你合作的品牌谈判公平且有利可图的交易。响应3-4
- en: Getting next step ideas for obtaining a business deal
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 获取获得商业交易下一步想法
- en: This is excellent advice and a very helpful conversation overall, especially
    coming from having known nothing at all about making brand deals or seeking out
    sponsorships. Still, ChatGPT can make mistakes, and it’s important to conduct
    your own research, as ChatGPT can never replace professional advice.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一条极好的建议，整体上是一次非常有帮助的对话，尤其是考虑到我对品牌交易或寻找赞助一无所知。尽管如此，ChatGPT 可能会犯错误，因此进行自己的研究非常重要，因为
    ChatGPT 永远不能取代专业建议。
- en: However, ChatGPT can make your research tasks easier. With models like ChatGPT
    4o, you can now ask ChatGPT to search the web for results, and it will cite its
    sources in its response. This allows you to find out for yourself where ChatGPT
    is getting information and double-check that you’re reading from reputable sources.
    Let’s see this in action by asking ChatGPT what we should know about making deals
    with trustworthy brands.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，ChatGPT 可以使你的研究任务变得更简单。使用 ChatGPT 4o 等模型，你现在可以要求 ChatGPT 在网络上搜索结果，并且它会在其回答中引用来源。这让你可以自己找出
    ChatGPT 从哪里获取信息，并双重检查你阅读的是否为可靠的来源。让我们通过询问 ChatGPT 我们应该了解与诚信品牌达成交易的内容来观察这一功能在实际中的应用。
- en: Asking ChatGPT to Cite Sources and Help Us Find Reputable Brands for Sponsorships
  id: totrans-369
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 要求 ChatGPT 引用来源并帮助我们找到值得信赖的品牌进行赞助
- en: Prompt [3-5](#PC9) is short, sweet, and to the point. We’re asking ChatGPT to
    search for the information and give us links that allows us to check its work,
    so to speak, so we can evaluate the information for ourselves straight from the
    source. ChatGPT’s answer is in Response [3-5](#PC10).What beauty brands are known
    for being trustworthy and fair with influencers? Cite your sources in your response.Prompt
    3-5
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 [3-5](#PC9) 简洁明了。我们要求 ChatGPT 搜索信息，并给出链接，以便我们检查其工作，换句话说，我们可以直接从源头评估信息。ChatGPT
    的回答在响应 [3-5](#PC10) 中。哪些美妆品牌因其对网红的诚信和公平而闻名？请在你的回答中引用你的来源。提示 3-5
- en: Getting ChatGPT to cite sources for accurate responses
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 让 ChatGPT 引用来源以获得准确回答
- en: As a beauty vlogger looking to partner with trustworthy and fair brands, there
    are several companies known for their positive and supportive relationships with
    influencers. Here are some of the top brands you can consider:**1\. Sephora:**
    Sephora is renowned for its comprehensive influencer programs, particularly the
    Sephora Squad. This initiative offers influencers the chance to collaborate with
    a wide array of brands and participate in exclusive events. Sephora is known for
    its professionalism and fair compensation practices.**2\. Fenty Beauty:** Founded
    by Rihanna, Fenty Beauty has revolutionized the beauty industry with its emphasis
    on inclusivity and diversity. The brand is highly praised for its fair treatment
    of influencers, providing ample opportunities for collaboration and ensuring that
    influencer content aligns with their message of empowerment and authenticity.**3\.
    Rare Beauty:** Created by Selena Gomez, Rare Beauty focuses on promoting self-expression
    and mental health. The brand is known for its supportive and fair collaborations
    with influencers, emphasizing authenticity and inclusivity in their partnerships.**4\.
    L’Oréal:** As one of the largest beauty companies globally, L’Oréal collaborates
    with a diverse range of influencers across its many brands, including Maybelline
    and NYX Professional Makeup. They are known for their structured and professional
    approach to influencer marketing, ensuring fair compensation and clear expectations.**5\.
    MAC Cosmetics:** MAC is a favorite among professional makeup artists and beauty
    enthusiasts. They have a long history of working with influencers and are known
    for their creative collaborations and fair treatment of partners.**6\. La Roche-Posay:**
    This skincare brand is respected for its dermatologist-recommended products and
    ethical approach to influencer marketing. They frequently collaborate with influencers
    to promote products designed for sensitive skin and other specific skin concerns.**7\.
    The Ordinary:** Part of Deciem, The Ordinary is highly regarded for its transparency
    and ethical marketing practices. They offer straightforward, science-backed skincare
    products and are known for fair and honest collaborations with influencers.**8\.
    CeraVe:** Known for its dermatologist-developed skincare products, CeraVe has
    a strong reputation for treating influencers fairly. They focus on educational
    content and often collaborate with skincare professionals and enthusiasts.**9\.
    ColourPop:** ColourPop is celebrated for its vibrant and affordable products.
    The brand frequently collaborates with influencers and celebrities, providing
    ample opportunities for creative and engaging partnerships.When negotiating deals
    with these brands, ensure that you discuss key elements such as compensation,
    deliverables, usage rights, and timelines to establish a clear and fair agreement.
    Document all terms in a contract to protect both parties and maintain a professional
    relationship.Sources:https://www.gcimagazine.com/consumers-markets/news/22885121/20232024-top-beauty-influencers-brandshttps://hypeauditor.com/blog/top-15-beauty-brands-that-work-with-influencers/Response
    3-5
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 作为寻求与值得信赖和公平的品牌合作的美妆博主，有几家公司因其与影响者之间的积极和支持性关系而闻名。以下是一些你可以考虑的顶级品牌：**1. Sephora（丝芙兰）：**丝芙兰以其全面的网红项目而闻名，特别是Sephora
    Squad。这个项目为网红提供了与众多品牌合作以及参加独家活动的机会。丝芙兰以其专业性和公平的报酬实践而著称。**2. Fenty Beauty（菲尼蒂美妆）：**由Rihanna创立的Fenty
    Beauty以其对包容性和多样性的强调而彻底改变了美妆行业。该品牌因其对网红的公平待遇而受到高度赞扬，提供了丰富的合作机会，并确保网红内容与其赋权与真实性的信息保持一致。**3.
    Rare Beauty（稀有美妆）：**由Selena Gomez创建的Rare Beauty专注于推广自我表达和心理健康。该品牌以其对网红的支持性和公平的合作而闻名，强调在合作伙伴关系中保持真实性和包容性。**4.
    L’Oréal（欧莱雅）：**作为全球最大的美妆公司之一，欧莱雅与多个品牌下的众多影响者合作，包括Maybelline（美宝莲）和NYX Professional
    Makeup（纽约彩妆）。他们以其结构化和专业的方法进行网红营销而闻名，确保公平的报酬和明确的要求。**5. MAC Cosmetics（魅可）：**MAC是专业化妆师和美妆爱好者的最爱。他们与网红有着长期的合作历史，以其创造性的合作和公平对待合作伙伴而闻名。**6.
    La Roche-Posay（理肤泉）：**这个护肤品牌因其皮肤科医生推荐的产品和道德的网红营销方法而受到尊重。他们经常与网红合作推广专为敏感肌肤和其他特定皮肤问题设计的产品的。**7.
    The Ordinary（普通药妆）：**作为Deciem的一部分，The Ordinary因其透明和道德的营销实践而备受推崇。他们提供简单、科学支持的护肤产品，并以其公平和诚实的网红合作而闻名。**8.
    CeraVe（珂润）：**以其皮肤科医生研发的护肤产品而闻名，CeraVe因公平对待网红而享有良好的声誉。他们专注于教育内容，并经常与护肤专业人士和爱好者合作。**9.
    ColourPop（彩妆泡泡）：**ColourPop因其鲜艳且价格实惠的产品而受到赞誉。该品牌经常与网红和名人合作，提供丰富的创意和互动合作机会。在与这些品牌谈判交易时，确保讨论关键要素，如报酬、交付成果、使用权和时间表，以建立明确和公平的协议。将所有条款记录在合同中以保护双方并维持专业关系。
- en: ChatGPT provides up-to-date information by searching the web
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT通过搜索网络提供最新信息
- en: Here, ChatGPT has provided us with links we can check ourselves to see where
    the information came from, and from there, we can check the sources of *those*
    links to ensure the information we’re working with is reputable.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，ChatGPT为我们提供了可以自行检查的链接，以查看信息的来源，然后我们可以检查那些链接的来源，以确保我们处理的信息是可靠的。
- en: But enough about business. Sometimes our needs are a lot simpler than trying
    to create a steady side hustle. Some of us have enough on our plates, literally,
    just trying to come up with ideas for dinner.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 但关于业务就说到这里。有时候我们的需求比尝试创造一个稳定的副业要简单得多。我们中的一些人，实际上只是试图想出晚餐的主意就已经够忙了。
- en: Plan Meals and Stop Stressing About Dinner Ideas with ChatGPT
  id: totrans-376
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ChatGPT计划餐食，不再为晚餐想法而烦恼
- en: Everyone is busy nowadays. Every day we have bills to pay, elections to worry
    about, a planet to save, and all that’s before we’ve even had dinner yet. Coming
    up with dinner ideas is hard when you’re always thinking about a thousand other
    things.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 现在每个人都很忙。每天我们都有账单要付，有选举要担心，有地球要拯救，这一切在我们还没吃上晚饭之前就已经开始了。当你总是想着一千件事的时候，想出晚餐的主意就变得很困难。
- en: It’s even harder when you have dietary needs. Some people can’t eat gluten;
    other people can’t have sugar. Vegans can’t eat meat, and pescatarians need to
    eat, too. Maybe you’re trying to lose weight and need lower calorie meals, or
    you’re trying to keep up your protein and need help making meal plans that cover
    all of your macros.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 当你有饮食需求时，这甚至更难。有些人不能吃麸质；有些人不能吃糖。素食主义者不能吃肉，而食鱼素食者也需要吃东西。也许你正在尝试减肥，需要低卡路里的餐食，或者你正在努力保持蛋白质摄入，需要帮助制定涵盖所有宏量营养素的餐单。
- en: Instead of adding basic meals to your list of problems, use ChatGPT so that
    making dinner isn’t the cause of yet another existential crisis.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 不要把基本的餐食添加到你的问题清单中，使用ChatGPT，这样晚餐就不会成为另一个存在主义危机的原因。
- en: Preparing a Meal Plan for the Week Ahead When You Have Dietary Restrictions
  id: totrans-380
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当你有饮食限制时，提前准备一周的餐单
- en: Let’s challenge ChatGPT with a hard one (Prompt [3-6](#PC11)). Meet the Johnsons,
    a family of impossibly picky eaters:Create a meal plan for the Johnsons, a family
    of five. However, Paula is lactose intolerant, Michael is vegan, and Liam is on
    a keto diet. Anna and John don't care either way, but none of the family members
    like chicken. Plan a week of dinners that accommodates the whole family.Prompt
    3-6
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个难题来挑战ChatGPT（提示[3-6](#PC11)）。认识一下约翰逊一家，一个不可能挑剔的食客的家庭：为约翰逊一家，一个五口之家，制定一个餐单。然而，宝拉对乳糖不耐受，迈克尔是素食主义者，利亚姆在吃生酮饮食。安娜和约翰对此无所谓，但家庭中的任何成员都不喜欢鸡肉。计划一周的晚餐，让全家人都能接受。提示3-6
- en: Giving ChatGPT the impossible task of pleasing picky eaters
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 给ChatGPT一个不可能的任务来取悦挑剔的食客
- en: 'No wonder the Johnsons need help with dinner ideas. It’s hard to imagine how
    they pick out restaurants! Let’s see if ChatGPT is up for the challenge, as you
    can see in Response [3-6](#PC12).Creating a meal plan for the Johnson''s family
    requires some careful planning to accommodate Paula''s lactose intolerance, Michael''s
    vegan diet, and Liam''s keto diet, while ensuring Anna and John have meals they
    enjoy too. Here''s a week of dinners that fit these requirements:**Monday***Stuffed
    Bell Peppers*- Paula & Liam: Bell peppers stuffed with cauliflower rice, ground
    beef, and vegetables, topped with dairy-free cheese.- Michael: Bell peppers stuffed
    with quinoa, black beans, corn, tomatoes, and avocado.**Tuesday***Zucchini Noodles
    with Pesto*- Paula & Liam: Zucchini noodles with avocado pesto, cherry tomatoes,
    and grilled shrimp.- Michael: Zucchini noodles with avocado pesto, cherry tomatoes,
    and sautéed tofu.**Wednesday***Baked Tofu & Vegetable Stir-Fry*- Paula & Liam:
    Stir-fry with tofu, broccoli, bell peppers, snap peas, and a soy-ginger sauce,
    served over cauliflower rice.- Michael: Same stir-fry with tofu.**Thursday***Cauliflower
    Crust Pizza*- Paula & Liam: Cauliflower crust pizza with tomato sauce, dairy-free
    cheese, pepperoni, and vegetables.- Michael: Cauliflower crust pizza with tomato
    sauce, vegan cheese, and a variety of vegetables.**Friday***Lentil and Vegetable
    Stew*- Paula & Liam: Stew made with lentils, carrots, celery, tomatoes, and kale,
    seasoned with herbs and spices.- Michael: Same lentil and vegetable stew.**Saturday***Eggplant
    Lasagna*- Paula & Liam: Eggplant slices layered with ground beef, dairy-free ricotta,
    and marinara sauce.- Michael: Eggplant slices layered with spinach, mushrooms,
    vegan ricotta, and marinara sauce.**Sunday***Tacos*- Paula & Liam: Lettuce wrap
    tacos with ground beef, avocado, salsa, and dairy-free cheese.- Michael: Lettuce
    wrap tacos with black beans, corn, avocado, salsa, and vegan cheese.**Notes**-
    For Anna and John, each meal can be adapted easily by adding regular cheese or
    other toppings they enjoy.- Ensure that all sauces, especially pesto and marinara,
    are dairy-free for Paula and vegan for Michael.- Liam''s keto diet can be managed
    by ensuring his portions are high in healthy fats and low in carbs, such as using
    cauliflower rice or zucchini noodles instead of grains.This meal plan should provide
    a balanced and enjoyable week of dinners for the entire Johnson''s family, accommodating
    all their dietary needs and preferences.Response 3-6'
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 没错，约翰逊家需要帮助想晚餐主意。很难想象他们是怎样挑选餐厅的！让我们看看ChatGPT是否能够接受这个挑战，正如您在回复[3-6](#PC12)中看到的。为约翰逊家的家庭制定餐单需要一些周密的计划，以适应保拉的乳糖不耐症、迈克尔的全素饮食和利亚姆的生酮饮食，同时确保安娜和约翰也能享受到他们喜欢的餐点。以下是符合这些要求的每周晚餐菜单：**周一***填充甜椒*-
    保拉和利亚姆：填充有花椰菜米、牛肉和蔬菜的甜椒，上面撒上无乳制品奶酪。- 迈克尔：填充有藜麦、黑豆、玉米、番茄和鳄梨的甜椒。**周二***意式青豆面配香蒜酱*-
    保拉和利亚姆：青豆面配鳄梨香蒜酱、樱桃番茄和烤虾。- 迈克尔：青豆面配鳄梨香蒜酱、樱桃番茄和炒豆腐。**周三***烤豆腐和蔬菜炒饭*- 保拉和利亚姆：豆腐、西兰花、甜椒、荷兰豆和酱油炒饭，配以花椰菜米。-
    迈克尔：同样的豆腐炒饭。**周四***花椰菜饼披萨*- 保拉和利亚姆：花椰菜饼披萨配番茄酱、无乳制品奶酪、意大利辣香肠和蔬菜。- 迈克尔：花椰菜饼披萨配番茄酱、素食奶酪和多种蔬菜。**周五***扁豆蔬菜炖菜*-
    保拉和利亚姆：用扁豆、胡萝卜、芹菜、番茄和羽衣甘蓝炖成的炖菜，用草药和香料调味。- 迈克尔：同样的扁豆蔬菜炖菜。**周六***茄子千层面*- 保拉和利亚姆：茄子片层层铺上牛肉、无乳制品意大利奶酪和番茄酱。-
    迈克尔：茄子片层层铺上菠菜、蘑菇、素食意大利奶酪和番茄酱。**周日***玉米卷*- 保拉和利亚姆：生菜包裹的牛肉玉米卷、鳄梨、莎莎酱和无乳制品奶酪。- 迈克尔：生菜包裹的黑豆、玉米、鳄梨、莎莎酱和素食奶酪。**注意事项**-
    对于安娜和约翰来说，每餐都可以通过添加他们喜欢的普通奶酪或其他配料来轻松调整。- 确保所有酱料，尤其是香蒜酱和番茄酱，对保拉来说是无乳制品的，对迈克尔来说是无肉的。-
    为了适应利亚姆的生酮饮食，可以通过确保他的份量富含健康脂肪和低碳水化合物来管理，例如使用花椰菜米或青豆面代替谷物。这个餐单应该为约翰逊家的全体成员提供平衡且愉快的每周晚餐，满足他们所有的饮食需求和偏好。回复3-6
- en: A meal plan for the Johnsons, against all odds
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 约翰逊家的餐单计划，克服所有困难
- en: As you can see, ChatGPT has accommodated every family member in its response.
    Let’s take a look at what the grocery list for the week would look like. After
    all, who wants to make multiple trips to the grocery store when we can get everything
    at once and go back to watching anime on Netflix?
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，ChatGPT在其回复中已经考虑到了每一位家庭成员。让我们来看看一周的购物清单会是什么样子。毕竟，谁愿意在可以一次性买齐所有东西并回到Netflix上看动画片的时候，还要多次去杂货店呢？
- en: Making a Quick Grocery List so You Have Everything on Hand
  id: totrans-386
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 快速制作购物清单，以便您手头上有所有东西
- en: Obviously, ChatGPT knows what should go in the meals it’s suggested, so let’s
    avoid going through the trouble of coming up with the grocery list. Below is a
    short prompt in the same conversation that will allow us to create a grocery list
    based upon the meals we’ve decided on.Create a grocery list for the week based
    upon the meals you've suggested.Prompt 3-7
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，ChatGPT 知道它建议的餐点中应该放什么，所以我们不必费心去想购物清单。以下是在同一对话中一个简短的提示，它将允许我们根据我们已决定的餐点创建购物清单。创建一个基于你建议的餐点的购物清单。提示
    3-7
- en: 'Make an easy grocery list Response [3-7](#PC14) is the answer we got back from
    ChatGPT.Sure, here''s the grocery list for the week based on the suggested meals:**Produce**-
    Bell peppers (8)- Cauliflower heads (3)- Zucchini (8)- Avocados (6)- Cherry tomatoes
    (3 pints)- Broccoli (2 heads)- Snap peas (1 bag)- Carrots (6)- Celery (1 bunch)-
    Kale (1 bunch)- Eggplant (4)- Lettuce (2 heads or 1 bag of large leaves for wraps)-
    Mushrooms (2 cups)- Spinach (1 bag)- Garlic (1 bulb)- Ginger (1 piece)- Fresh
    herbs (basil, parsley, cilantro)- Onions (6)- Limes (4)**Proteins**- Ground beef
    (3 pounds)- Tofu (3 blocks)- Shrimp (2 pounds)- Black beans (4 cans)- Lentils
    (2 bags)- Pepperoni (1 package)- Vegan ricotta (1 container)- Dairy-free cheese
    (3 packages)- Vegan cheese (3 packages)**Grains and Legumes**- Quinoa (1 bag)-
    Cauliflower rice (frozen or fresh, 3 bags)- Corn (frozen or canned, 2 cans)**Sauces
    and Condiments**- Tomato sauce (2 jars)- Marinara sauce (2 jars)- Soy sauce (1
    bottle)- Ginger sauce (1 bottle)- Salsa (1 jar)- Vegan pesto (or ingredients to
    make: basil, pine nuts, olive oil)**Spices and Seasonings**- Salt- Pepper- Italian
    seasoning- Cumin- Chili powder- Garlic powder- Onion powder**Baking and Cooking
    Essentials**- Olive oil- Coconut oil- Vinegar (apple cider or balsamic)- Nutritional
    yeast**Miscellaneous**- Cauliflower pizza crusts (frozen, 4)- Almond milk or other
    dairy-free milk (for cooking)This list should cover all the ingredients needed
    for the dinners throughout the week. Be sure to check your pantry for any items
    you might already have to avoid duplicates.Response 3-7'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 制作一份简单的购物清单 响应 [3-7](#PC14) 是我们从 ChatGPT 收到的答案。当然，以下是基于建议餐点的购物清单：**蔬菜**- 青椒（8个）-
    花菜头（3个）- 黄瓜（8个）- 鳄梨（6个）- 樱桃番茄（3品脱）- 芥蓝（2个头）- 青豆（1袋）- 胡萝卜（6个）- 芹菜（1束）- 甘蓝（1束）-
    紫茄子（4个）- 生菜（2个头或1袋大叶子用于卷饼）- 蘑菇（2杯）- 菠菜（1袋）- 大蒜（1头）- 姜（1块）- 新鲜香草（罗勒、香菜、香菜）- 洋葱（6个）-
    青柠（4个）**蛋白质**- 碾碎牛肉（3磅）- 豆腐（3块）- 龙虾（2磅）- 黑豆（4罐）- 豌豆（2袋）- 烟熏肉肠（1包）- 素奶酪（1罐）- 无乳制品奶酪（3包）-
    素奶酪（3包）**谷物和豆类**- 糙米（1袋）- 花菜米（冷冻或新鲜，3袋）- 玉米（冷冻或罐装，2罐）**酱料和调味品**- 番茄酱（2罐）- 马里纳拉酱（2罐）-
    酱油（1瓶）- 姜酱（1瓶）- 沙拉酱（1罐）- 素意面酱（或制作所需的原料：罗勒、松子、橄榄油）**香料和调味料**- 盐- 黑胡椒- 意大利调味料- 肉桂-
    辣椒粉- 大蒜粉- 洋葱粉**烘焙和烹饪必备品**- 橄榄油- 椰子油- 醋（苹果醋或香醋）- 营养酵母**杂项**- 花菜披萨饼皮（冷冻，4个）- 杏仁奶或其他无乳制品奶（用于烹饪）这份清单应该涵盖了整个星期晚餐所需的全部食材。务必检查您的储藏室，看看是否有任何你已经拥有的物品，以避免重复。响应
    3-7
- en: A grocery list you didn’t have to write yourself
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 一份你不必自己写的购物清单
- en: Obviously, the Johnsons might have a couple of these ingredients on hand already,
    so they can take out anything they already have, as ChatGPT suggests. However,
    this is an incredibly handy tool that takes the mental effort off of anyone stressed
    about making plans for the week.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，约翰逊一家可能已经有一些这些食材在手上了，所以他们可以按照 ChatGPT 的建议去除他们已经拥有的任何物品。
- en: But what happens when you’re caught off guard? Sometimes you forget to make
    plans until it’s already too late, your cabinets are empty, and you want something
    quick. Let’s see if ChatGPT can help out.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 但当你突然遇到意外情况时会发生什么呢？有时你直到太晚才想起做计划，你的橱柜空了，你想要一些快速的食物。让我们看看 ChatGPT 能否提供帮助。
- en: Asking ChatGPT for a Dinner Idea When You’re Low on Ingredients
  id: totrans-392
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当你食材短缺时向 ChatGPT 寻求晚餐建议
- en: We’ve all been there before. It’s 8pm, it’s a holiday, everything’s closed,
    the fridge is empty, and you’re hungry. You realize there are a few corner stores
    open, but you have no idea what to grab that would come together into a decent
    meal. You can do what you normally do and try to piece together a meal from random
    ingredients. But if you’re just tired of eating the same three recipes on rotation
    and want to try something new, then toss the problem to ChatGPT. In Prompt [3-8](#PC15),
    we ask ChatGPT to help us with our problem.Most of the stores are closed except
    for some corner stores with basic ingredients. I'm too tired to make anything
    too complicated for dinner. I'm willing to pick up or order a few ingredients
    from Uber.Prompt 3-8
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都经历过这种情况。现在是晚上8点，节假日，所有商店都关门了，冰箱里空空如也，而你却饿了。你意识到有几家便利店还开着，但你不知道要买些什么才能凑成一顿像样的饭。你可以像平时一样，尝试用随机购买的食材拼凑一顿饭。但如果你已经厌倦了反复吃那三种食谱，想要尝试一些新的东西，那么就把这个问题抛给ChatGPT。在提示[3-8](#PC15)中，我们要求ChatGPT帮助我们解决问题。大多数商店都关门了，只有几家便利店有基本的食材。我太累了，不想为晚餐做太复杂的菜。我愿意从Uber上挑选或订购一些食材。
- en: Laying out the issue for ChatGPT What we’ve done is lay out the issue in simple
    terms and expressed what we are and aren’t willing to do. For example, we don’t
    want to spend too much time in the kitchen. Let’s see if ChatGPT can come to the
    rescue (Response [3-8](#PC16)).Here are a few easy dinner ideas using basic ingredients
    you might find in corner stores:**1\. Quick Pasta***Ingredients:*- Pasta- Canned
    tomatoes or tomato sauce- Garlic- Olive oil- Salt and pepper*Instructions:*1\.
    Cook the pasta according to package instructions.2\. While the pasta is cooking,
    heat some olive oil in a pan and sauté minced garlic until fragrant.3\. Add the
    canned tomatoes or tomato sauce to the pan and simmer for 10 minutes. Season with
    salt and pepper.4\. Toss the cooked pasta in the sauce and serve.**3\. Egg Fried
    Rice***Ingredients:*- Cooked rice- Eggs- Soy sauce- Frozen or canned vegetables
    (peas, carrots, corn, etc.)- Oil*Instructions:*1\. Heat some oil in a pan or wok.2\.
    Scramble the eggs and set them aside.3\. Add more oil to the pan and stir-fry
    the vegetables until tender.4\. Add the cooked rice and stir-fry for a few minutes.5\.
    Mix in the scrambled eggs and soy sauce. Stir well and serve.**4\. Tuna Salad
    Sandwich***Ingredients:*- Canned tuna- Mayonnaise- Bread- Lettuce (optional)-
    Salt and pepper*Instructions:*1\. Drain the canned tuna and mix it with mayonnaise.
    Season with salt and pepper.2\. Spread the tuna mixture on a slice of bread. Add
    lettuce if you have it.3\. Top with another slice of bread and serve.**5\. Veggie
    Stir-Fry***Ingredients:*- Mixed vegetables (fresh, frozen, or canned)- Soy sauce-
    Garlic- Oil- Rice or noodles (optional)*Instructions:*1\. Heat oil in a pan or
    wok.2\. Sauté minced garlic until fragrant.3\. Add the mixed vegetables and stir-fry
    until cooked through.4\. Season with soy sauce.5\. Serve as is or over rice/noodles.These
    recipes are simple, quick, and require minimal ingredients and effort. Enjoy your
    meal!Response 3-8
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 向ChatGPT阐述问题 我们所做的是用简单的话描述问题，并表达我们愿意和不愿意做的事情。例如，我们不想在厨房里花太多时间。让我们看看ChatGPT能否来救场（回应[3-8](#PC16)）。以下是一些使用便利店可能找到的基本食材的简单晚餐想法：**1.
    快速意面****食材**：- 意面- 罐装番茄或番茄酱- 大蒜- 橄榄油- 盐和胡椒**步骤**：1. 根据包装说明煮意面。2. 在煮意面的同时，在锅中加热一些橄榄油，将切碎的大蒜炒至香味散发。3.
    将罐装番茄或番茄酱加入锅中，煮沸10分钟。用盐和胡椒调味。4. 将煮熟的意面与酱汁混合，上桌即可。**3. 蛋炒饭****食材**：- 煮熟的米饭- 鸡蛋-
    酱油- 冻结或罐装蔬菜（豌豆、胡萝卜、玉米等）- 油**步骤**：1. 在锅中或炒锅中加热一些油。2. 炒鸡蛋，然后放在一边。3. 在锅中加入更多的油，炒蔬菜至变软。4.
    加入煮熟的米饭，炒几分钟。5. 加入炒好的鸡蛋和酱油。搅拌均匀，上桌即可。**4. 金枪鱼沙拉三明治****食材**：- 罐装金枪鱼- 鸡蛋黄酱- 面包-
    生菜（可选）- 盐和胡椒**步骤**：1. 倒掉罐装金枪鱼中的水分，与蛋黄酱混合。用盐和胡椒调味。2. 在一片面包上涂抹金枪鱼混合物。如果有生菜，可以加一些。3.
    在上面再放一片面包，上桌即可。**5. 蔬菜炒饭****食材**：- 混合蔬菜（新鲜、冷冻或罐装）- 酱油- 大蒜- 油- 米或面（可选）**步骤**：1.
    在锅中或炒锅中加热油。2. 将切碎的大蒜炒至香味散发。3. 加入混合蔬菜，炒至熟透。4. 用酱油调味。5. 直接上桌或与米饭/面一起食用。这些食谱简单、快捷，所需食材和努力最少。享受你的餐点！回应3-8
- en: Super simple meals with minimum ingredients
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 最简单的饭菜，最少食材
- en: As you can see, ChatGPT managed to provide some very simple options for low-effort
    dishes that seem easy to accomplish and don’t require too many ingredients. On
    an already tough day, this can be a lifesaver. A simple prompt like this could
    definitely help someone end up with a more complete meal for dinner than, say,
    a jelly sandwich and some crackers.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，ChatGPT成功地提供了一些简单易行的菜肴选项，这些菜肴看起来容易完成，且不需要太多食材。在已经艰难的一天中，这可以成为救命稻草。这样的简单提示确实可以帮助某人晚餐时比，比如说，果冻三明治和一些饼干，得到更加完整的餐点。
- en: Conclusion
  id: totrans-397
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, we’ve looked at how we can use ChatGPT to streamline content
    creation, from coming up with marketing plans for a Twitch streamer to creating
    a strategy to contact sponsors to planning for dinner for truly any need.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了如何利用ChatGPT简化内容创作，从为Twitch流媒体主播制定营销计划到制定联系赞助商的策略，再到为任何需求规划晚餐。
- en: In the next chapter, we’re going to look at how we can teach ChatGPT with large
    amounts of data, or context, to condense information into something easier to
    understand and overall streamline productivity at work.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨如何使用大量数据或上下文来教会ChatGPT，使其能够将信息浓缩成更容易理解的形式，并在工作中整体提高工作效率。
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
    Nature 2025L. EvelynMaking ChatGPT Work for You[https://doi.org/10.1007/979-8-8688-1445-7_4](https://doi.org/10.1007/979-8-8688-1445-7_4)
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者（们），独家授权给APress Media, LLC，Springer Nature的一部分，2025L. Evelyn《让ChatGPT为你工作》[https://doi.org/10.1007/979-8-8688-1445-7_4](https://doi.org/10.1007/979-8-8688-1445-7_4)
- en: 4. Teaching ChatGPT to Create Content in Different Styles
  id: totrans-401
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 教会ChatGPT以不同风格创作内容
- en: Lydia Evelyn^([1](#Aff2)  )(1)Catalonia, Spain
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: Lydia Evelyn^([1](#Aff2)  )(1)加泰罗尼亚，西班牙
- en: With more and more people incorporating ChatGPT into their workflow in the office,
    many get frustrated with responses that sound inauthentic. This is especially
    true when we’re talking about trying to recreate a writing style—something that’s
    distinct among writers of all kinds. A writing style is difficult to replicate,
    and a chatbot’s attempt typically sounds like a cheap imitation. Without a doubt,
    if you just ask ChatGPT to write about any subject without any other context,
    the answer you get will be very dry and uninspired.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 随着越来越多的人将ChatGPT融入办公室的工作流程中，许多人对于听起来不真诚的响应感到沮丧。当我们谈论尝试重现一种写作风格时——这在各种类型的作家中都是独特的——这一点尤其正确。写作风格很难复制，聊天机器人的尝试通常听起来像是一种廉价的模仿。毫无疑问，如果你只是要求ChatGPT就任何主题进行写作而不提供其他背景，你得到的答案将会非常枯燥且缺乏灵感。
- en: The truth is, ChatGPT can take on a more natural-sounding writing style if it’s
    *taught* to do so. In this chapter, we’re going to learn how to teach ChatGPT
    to write in any style for writing social media content, writing emails, help with
    time management, and help write blog posts. We’re also going to be looking at
    how to use the web search feature in ChatGPT to provide more background and context
    to its responses.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 事实是，如果ChatGPT被**教会**这样做，它可以拥有更加自然流畅的写作风格。在本章中，我们将学习如何教会ChatGPT以任何风格进行写作，无论是撰写社交媒体内容、撰写电子邮件、帮助管理时间，还是帮助撰写博客文章。我们还将探讨如何使用ChatGPT的网页搜索功能，为其响应提供更多背景和上下文。
- en: 'Here’s what we’re going to cover in this chapter:'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 本章我们将涵盖以下内容：
- en: Teaching ChatGPT to be your social media manager, so that you can create eye-catching
    social media posts and keep up with trends to stay relevant as a small business
    owner
  id: totrans-406
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教会ChatGPT成为你的社交媒体经理，这样你就可以创建引人注目的社交媒体帖子，并跟上趋势，作为小企业主保持相关性
- en: Instructing ChatGPT on how to write emails in the voice of someone else, for
    example, for an administrative assistant writing emails for a boss that doesn’t
    have time to write them themselves
  id: totrans-407
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指导ChatGPT如何以他人的声音撰写电子邮件，例如，一个行政助理为没有时间自己撰写电子邮件的老板撰写电子邮件
- en: Using ChatGPT for time management by training it on your schedule
  id: totrans-408
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过训练ChatGPT以你的日程来管理时间
- en: Asking ChatGPT to use web search to find information for a blog post and training
    it to write in the style of the blog’s author
  id: totrans-409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要求ChatGPT使用网页搜索为博客文章查找信息，并训练它以博客作者的写作风格进行写作
- en: Teaching ChatGPT to Be Your Social Media Manager
  id: totrans-410
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 教会ChatGPT成为你的社交媒体经理
- en: In this day and age, it’s critical to understand how to engage an audience on
    social media, as well as keep up with trends that the algorithms favor based on
    the success of similar advertising campaigns in your field. Although this is particularly
    a problem for social media managers, this is especially crucial for small business
    owners that may depend on having a social media following engaged for sales and
    business interest.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个时代，了解如何在社交媒体上吸引受众以及跟上算法基于你领域内类似广告活动成功而偏好的趋势至关重要。尽管这对社交媒体经理来说是一个特别的问题，但对于可能依赖社交媒体关注者参与销售和商业兴趣的小企业主来说，这尤其重要。
- en: When used correctly, ChatGPT can be used to make social media management easier
    and even more efficient than if you did it on your own. Not only can you provide
    ChatGPT with content from other social media influencers with similar products
    or business models as your own, but you can also include **images** in your prompt.
    This allows you to better understand, for example, how certain shots and compositional
    elements in product photos perform better than others. Not only that, but you
    can ask ChatGPT for advice on how to display your own products to solicit a positive
    response from your followers and encourage more engagement.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 当正确使用时，ChatGPT 可以使社交媒体管理变得更加容易，甚至比你自己操作还要高效。你不仅可以向 ChatGPT 提供与你的产品或商业模式相似的其他社交媒体影响者的内容，还可以在你的提示中包含
    **图片**。这让你能更好地理解，例如，某些产品照片中的特定镜头和构图元素为何比其他元素表现更好。不仅如此，你还可以向 ChatGPT 咨询如何展示你自己的产品，以吸引关注者的积极反馈并鼓励更多互动。
- en: Creating a Better Following on Instagram
  id: totrans-413
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在 Instagram 上创建更好的关注者群体
- en: For restaurant owners, a strong online presence makes it easier for customers
    to find them. Having a presence on Google Maps makes it easy for customers to
    find the restaurant before they leave the house. On the website, customers can
    read the menu before they’ve even stepped into the establishment. And with Instagram,
    customers can see how good the food looks and arrive already excited to eat.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 对于餐厅老板来说，强大的在线存在感使得顾客更容易找到他们。在 Google Maps 上有存在感，顾客在出门前就能轻松找到餐厅。在网站上，顾客可以在进入餐厅之前先阅读菜单。而通过
    Instagram，顾客可以看到食物看起来有多美味，并带着期待进餐的兴奋感到达。
- en: Taking a picture of good food may sound simple, but there’s an art to it. We’re
    going to have ChatGPT explain to us how that works by giving it an example of
    a post that found great success and asking how we can reproduce the results.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 拍摄美食照片可能听起来很简单，但其中也有一定的艺术性。我们将通过提供一个取得巨大成功的帖子示例，并询问我们如何复制这些结果，让 ChatGPT 来解释这是如何工作的。
- en: For reference, we’re uploading the image shown in Figure [4-1](#Fig1) to ChatGPT
    in our next prompt.![A stack of crepes on a wooden board, garnished with blueberries
    and a sprig of mint. The crepes are dusted with powdered sugar and accompanied
    by a small bowl of orange jam. A jar of jam and a sifter with powdered sugar are
    in the background. A fork and spoon are placed beside the board.](../images/641691_1_En_4_Chapter/641691_1_En_4_Fig1_HTML.jpg)
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 作为参考，我们在下一个提示中上传了图 [4-1](#Fig1) 中所示的图片到 ChatGPT。![一张木板上堆叠的薄饼，上面撒有蓝莓和薄荷叶。薄饼上撒有糖粉，并配有一小碗橙酱。背景中有一罐酱和一袋糖粉。旁边放着一把叉子和一把勺子。](../images/641691_1_En_4_Chapter/641691_1_En_4_Fig1_HTML.jpg)
- en: Figure 4-1
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-1
- en: 'A beautiful photo of a restaurant breakfast mealPhoto credit: RitaE on Pixabay'
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 一张餐厅早餐美照，图片版权：RitaE 在 Pixabay
- en: You can send photos to ChatGPT that can be analyzed and used as reference for
    a number of purposes. In this case, we’re uploading an image like one you might
    find on Instagram. Imagining this is a successful Instagram from a restaurant
    promoting items on their menu, we’re going to ask ChatGPT to help us garner similar
    results for our own posts.I own a restaurant and I'm trying to grow an audience
    on Instagram to bring more attention to my business. I'm seeing posts that are
    getting attention in the same field, and I'm trying to figure out how to make
    these strategies work for me. What equipment do I need to take photos like the
    one I've uploaded? What should I post? How should I prepare the photo? What should
    I use in the caption? Give me some advice.This is the caption for the photo I've
    just uploaded:###Amidst the quiet hush of a morning well-spent, delicate crepes
    arrive like soft whispers—lightly dusted with powdered sugar, scattered with plump
    blueberries, and served alongside the golden glow of apricot jam. A gentle beginning
    to the day, as sweet as it is serene.Prompt 4-1
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以向ChatGPT发送照片，这些照片可以被分析和用作多种目的的参考。在这种情况下，我们上传了一张类似于你在Instagram上可能会看到的图片。想象这是一张成功的Instagram餐厅菜单推广图片，我们将要求ChatGPT帮助我们为我们的帖子获得类似的结果。我经营一家餐厅，并试图在Instagram上扩大我的受众群体，以吸引更多关注我的业务。我看到一些在同一领域受到关注的帖子，并试图弄清楚如何让这些策略对我有效。我需要什么设备来拍摄我上传的图片？我应该发布什么内容？我应该如何准备这张照片？我应该使用什么样的标题？给我一些建议。这是我刚刚上传的图片的标题：###在一个宁静的早晨，精致的薄饼如轻柔的低语般到来——轻轻撒上糖粉，撒上丰满的蓝莓，并搭配着杏酱的金色光泽。这是一个温柔的开始，既甜蜜又宁静。提示4-1
- en: 'Asking ChatGPT for advice on making a post for a restaurant on Instagram by
    giving it a viral post as an example As you can see, we’ve separated the information
    from our request with “###” and included the caption so that ChatGPT can give
    us detailed advice. Let’s look at Response [4-1](#PC2).To achieve a polished,
    engaging Instagram presence for your restaurant, you''ll need to focus on high-quality
    photos, thoughtful presentation, and compelling captions. Here''s a breakdown
    of strategies, equipment, and best practices to elevate your posts:**Equipment
    Needed:**1\. Camera: While modern smartphones (like iPhones or high-end Android
    phones) work well, consider a DSLR or mirrorless camera (like the Canon EOS M50
    or Sony Alpha a6400) for even more professional shots.2\. Lighting: Good lighting
    makes a massive difference. Invest in a ring light or a softbox setup to achieve
    a natural and balanced light. Try shooting in soft natural light if available.3\.
    Tripod: Ensures stability and helps avoid blur, especially useful for shots that
    require precision or a consistent angle.4\. Backdrop: Consider having clean, stylish
    backdrops (wooden boards, stone slabs, or textured fabric) to create a more attractive
    setting for your dishes.5\. Editing Software: Tools like Adobe Lightroom, VSCO,
    or Snapseed are excellent for editing photos to adjust lighting, sharpness, saturation,
    etc., enhancing the final look.**Tips for Preparing and Taking Photos:**1\. Presentation
    Matters: Ensure your plating is artistic and appetizing, focusing on colors and
    textures. Highlight the star of the dish clearly.2\. Composition: Consider the
    rule of thirds, negative space, and angles. Overhead shots, close-ups, and angled
    side shots often work well for food.3\. Props and Context: Surround your dish
    with relevant props (e.g., wine glasses, cutlery, spices). Be careful not to clutter
    the shot.4\. Lighting: Use soft, diffused light to reduce harsh shadows. Side
    or natural light often enhances food''s appearance.5\. Details: Show texture (crispy
    edges, glistening sauce). Use a macro lens if focusing on intricate details.**Caption
    Strategies:**1\. Tell a Story: Connect your dish to a season, cultural experience,
    or history (as you did in your uploaded caption).2\. Descriptive Words: Use sensory
    language (e.g., "crisp," "rich," "aromatic") that lets readers almost taste the
    food.3\. Call-to-Action (CTA): Encourage engagement, such as "Have you tried this?"
    or "Tag someone who would love this!"4\. Hashtags: Use relevant ones (e.g., #GameSeasonEats,
    #FoodieFavorites, #SeasonalSpecials) to extend reach.**Caption Improvement for
    Your Uploaded Photo:**Your caption already creates a vivid atmosphere. Here''s
    a suggestion to enhance engagement further:• Add a Question: "What''s your favorite
    accompaniment to game dishes?"• Shorten/Refine for Impact: "Game season brings
    bold flavors! Our plump partridge with warm, clove-infused bread sauce and aromatic
    quince jelly is a comforting classic. Would you pair it with a crisp wine or ale?
    Let us know!"**Post Ideas:**1\. Behind-the-Scenes: Show prep, plating, or sourcing
    fresh ingredients.2\. Chef Insights: Have your chef discuss cooking techniques
    or unique ingredient stories.3\. Seasonal Specials: Showcase new or limited-time
    dishes.4\. Customer Spotlights: Share customer photos and testimonials.5\. Interactive
    Content: Polls, quizzes, and story takeovers to encourage interaction.Combining
    these strategies should help grow and engage your Instagram audience, drawing
    attention to your restaurant.Response 4-1'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 向ChatGPT寻求建议，如何在Instagram上为餐厅发布帖子，并提供一个病毒式帖子作为例子。正如您所看到的，我们用“###”将信息与我们的请求分开，并包含了文字说明，以便ChatGPT能给我们提供详细的建议。让我们看看回复[4-1](#PC2)。为了使您的餐厅在Instagram上拥有一个精致、吸引人的形象，您需要关注高质量的照片、精心设计的展示和引人入胜的文字说明。以下是提升您帖子的一些策略、设备和最佳实践：**所需设备：**1.
    相机：虽然现代智能手机（如iPhone或高端安卓手机）效果不错，但考虑使用单反相机或无反相机（如佳能EOS M50或索尼Alpha a6400）以获得更专业的照片。2.
    灯光：良好的光线可以产生巨大差异。投资一个环形灯或柔光箱装置以获得自然平衡的光线。如果可能的话，尝试在柔和的自然光下拍摄。3. 三脚架：确保稳定性并帮助避免模糊，特别适用于需要精确或一致角度的拍摄。4.
    背景布：考虑使用干净、时尚的背景布（如木板、石板或纹理布）来为您的菜肴创造一个更具吸引力的环境。5. 编辑软件：Adobe Lightroom、VSCO或Snapseed等工具非常适合编辑照片，以调整光线、锐度、饱和度等，从而增强最终外观。**准备和拍摄照片的技巧：**1.
    展示很重要：确保您的摆盘具有艺术性和吸引力，关注颜色和质地。清楚地突出菜肴的明星。2. 构图：考虑三分法、负空间和角度。俯视、特写和斜角侧拍通常适用于食物。3.
    配件和背景：用相关的配件（例如，酒杯、餐具、香料）围绕您的菜肴。小心不要让画面杂乱。4. 灯光：使用柔和、扩散的光线以减少阴影。侧面或自然光通常可以增强食物的外观。5.
    细节：展示质地（酥脆的边缘、闪亮的酱汁）。如果专注于复杂细节，请使用微距镜头。**文字说明策略：**1. 讲述故事：将您的菜肴与季节、文化体验或历史联系起来（就像您在上传的文字说明中做的那样）。2.
    描述性词汇：使用感官语言（例如，“酥脆”、“丰富”、“芳香”），让读者几乎能尝到食物。3. 呼吁行动（CTA）：鼓励互动，例如“你尝试过这个吗？”或“标记一个会喜欢这个的人！”4.
    标签：使用相关的标签（例如，#GameSeasonEats、#FoodieFavorites、#SeasonalSpecials）以扩展覆盖范围。**对您上传照片的文字说明进行改进：**您的文字说明已经创造了一个生动的氛围。以下是一些建议，以进一步增强互动：•
    提出一个问题：“你最喜欢的游戏菜肴配什么？”• 缩短/精炼以产生影响：“游戏季节带来大胆的风味！我们丰满的鹌鹑搭配温暖的丁香酱汁和芳香的梨酱，是一道温馨的经典。你会搭配一杯清爽的葡萄酒或啤酒吗？告诉我们吧！”**帖子想法：**1.
    背后故事：展示准备、摆盘或采购新鲜食材。2. 厨师见解：让您的厨师讨论烹饪技巧或独特的食材故事。3. 季节特色：展示新或限时菜肴。4. 客户聚焦：分享客户照片和评价。5.
    互动内容：调查、测验和故事接管以鼓励互动。结合这些策略应该有助于增长和吸引Instagram受众，吸引人们对您的餐厅的关注。回复4-1
- en: ChatGPT gives us very useful advice so we can learn how to make successful posts
    on Instagram
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT为我们提供了非常有用的建议，这样我们可以学习如何在Instagram上制作成功的帖子
- en: Using ChatGPT for Feedback to Critique an Instagram Post
  id: totrans-422
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用ChatGPT进行反馈以批评Instagram帖子
- en: ChatGPT has given us some really good advice. In fact, let’s try to implement
    it! In Figure [4-2](#Fig2), you’ll see that I’ve included what I believe to be
    an extremely professional post of an incredibly appetizing dish that I believe
    will easily earn thousands of likes and follows on Instagram.![A fried egg with
    a runny yolk is placed in the center of a light blue bowl on a wooden table. A
    fork is positioned to the right of the bowl. The scene suggests a simple breakfast
    setting.](../images/641691_1_En_4_Chapter/641691_1_En_4_Fig2_HTML.jpg)
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT给了我们一些非常好的建议。事实上，让我们尝试实施它！在图[4-2](#Fig2)中，你会看到我包含了我认为是一个非常专业且极具吸引力的菜肴帖子，我相信它会在Instagram上轻松获得数千个赞和关注。![一个带有流动蛋黄的煎蛋放在一个浅蓝色碗的中央，碗放在木桌上。一把叉子放在碗的右边。这个场景暗示了一个简单的早餐环境。](../images/641691_1_En_4_Chapter/641691_1_En_4_Fig2_HTML.jpg)
- en: Figure 4-2
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-2
- en: 'A delicious-looking post that will surely go viral on Instagram Likewise, I’ve
    also crafted what I believe to be a very relatable and engaging caption to go
    with the photo in Listing [4-1](#PC3).Um, here''s an egg. We have scrambled eggs,
    but I just took a picture of a sunny-side up one, I don''t know. Anyway, we have
    some other dishes at the restaurant. Come check them out if you have time. #idunno
    #please #eatListing 4-1'
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: '一个看起来美味的帖子，肯定会在Instagram上走红同样，我还制作了一个我认为非常亲切和吸引人的标题，与列表[4-1](#PC3)中的照片相匹配。嗯，这是一个鸡蛋。我们这里有炒鸡蛋，但我刚刚拍了一张煎蛋，我不知道。无论如何，我们餐厅还有一些其他的菜肴。如果你有时间，请过来看看。#idunno
    #please #eatListing 4-1'
- en: 'A caption to match a soon-to-be viral Instagram post Now, I’m pretty sure this
    post will be a hit, but just in case, lets ask ChatGPT to compare our post to
    the viral post we’re comparing ourselves to and see where there may be room for
    improvement. Please note that this prompt includes the image shown in Figure [4-2](#Fig2).
    That said, let’s check out Prompt [4-2](#PC4).Alright, I have a photo of a dish
    from my restaurant. Here is my idea for the caption:###Um, here''s an egg. We
    have scrambled eggs, but I just took a picture of a sunny-side up one, I don''t
    know. Anyway, we have some other dishes at the restaurant. Come check them out
    if you have time. #idunno #please #eat###Give me some feedback and let me know
    how well I''ve implemented the points we discussed to help me grow a following
    on InstagramPrompt 4-2'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: '一个与即将爆红的Instagram帖子相匹配的标题。现在，我非常确信这个帖子会大受欢迎，但以防万一，让我们让ChatGPT比较我们的帖子与我们要比较的爆红帖子，看看可能有哪些改进的空间。请注意，这个提示包括图[4-2](#Fig2)中显示的图片。话虽如此，让我们来看看提示[4-2](#PC4)。好吧，我有一张我餐厅的菜肴照片。这是我为标题的想法：###嗯，这是一个鸡蛋。我们这里有炒鸡蛋，但我刚刚拍了一张煎蛋，我不知道。无论如何，我们餐厅还有一些其他的菜肴。如果你有时间，请过来看看。#idunno
    #please #eat###给我一些反馈，并告诉我我如何实施我们讨论的点，以帮助我在Instagram上增加粉丝Prompt 4-2'
- en: Asking ChatGPT for feedback on a potential Instagram post for a restaurant
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 向ChatGPT请求对一家餐厅潜在的Instagram帖子的反馈
- en: 'So, what did ChatGPT think? Take a look at Response [4-2](#PC5).Your caption
    needs some adjustments to better align with the strategies we discussed for engaging
    your audience and promoting your restaurant effectively on Instagram. Here are
    some suggestions:**Caption Feedback and Revision***Original Caption:*Um, here''s
    an egg. We have scrambled eggs, but I just took a picture of a sunny-side up one,
    I don''t know. Anyway, we have some other dishes at the restaurant. Come check
    them out if you have time. #idunno #please #eat*Revised Caption:*"Start your day
    sunny-side up with our delicious egg dishes! ![Flow chart illustrating a process
    with interconnected nodes and arrows. The chart begins with a central node labeled
    "Start" and branches into multiple paths, each leading to different outcomes.
    Key terms include "Decision Point," "Process Step," and "End." Arrows indicate
    the flow direction, guiding through various decision-making stages. The layout
    emphasizes logical progression and decision pathways.](../images/641691_1_En_4_Chapter/641691_1_En_4_Figa_HTML.gif)
    ![A symmetrical symbol featuring two overlapping star-like shapes, one larger
    and one smaller, with rounded edges. The shapes are outlined in black and filled
    with a light gray color, creating a layered appearance. The design is abstract
    and geometric.](../images/641691_1_En_4_Chapter/641691_1_En_4_Figb_HTML.gif) Whether
    you prefer them scrambled, poached, or sunny-side up, we''ve got you covered.
    Come visit us and explore our full breakfast menu! ![A sun-like symbol with a
    smiling face in the center. The symbol has a circular shape with alternating dark
    and light gray triangular rays extending outward, resembling a stylized sun. The
    face includes simple features: two eyes, a nose, and a smiling mouth.](../images/641691_1_En_4_Chapter/641691_1_En_4_Figc_HTML.gif)
    ![Icon of a plate with a fork on the left and a knife on the right, symbolizing
    a dining or restaurant setting. The design is simple and monochromatic.](../images/641691_1_En_4_Chapter/641691_1_En_4_Figd_HTML.gif)
    #foodie #egglover #gastronomy #NameOfTheRestaurant"*Key Improvements:*1\. Engagement:
    The revised caption encourages followers to start their day with your egg dishes,
    creating a positive and inviting tone.2\. Clarity and Confidence: It clearly states
    what the post is about and does so confidently.3\. Emojis: Appropriate use of
    emojis adds a friendly and engaging touch.4\. Hashtags: Relevant hashtags help
    reach a broader audience and attract egg lovers and foodies.5\. Call to Action:
    Encourages followers to visit the restaurant and try the full breakfast menu.*Additional
    Tips for the Photo:*- Lighting: Ensure the dish is well-lit. Natural light from
    a window can enhance the appearance.- Plating: Consider adding garnishes like
    fresh herbs or a sprinkle of spices to make the dish more visually appealing.-
    Angle: Try different angles to find the most flattering perspective for the dish.
    Overhead shots often work well for food photography.*Next Steps:*1\. Edit the
    Photo: Use a photo editing app to adjust brightness, contrast, and saturation
    to make the colors pop.2\. Repost with Revised Caption: Update the caption with
    the revised version to better attract and engage your audience.By implementing
    these strategies, you can create more appealing and engaging Instagram posts to
    grow your restaurant''s following and attract more customers.Response 4-2'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: '那么，ChatGPT是怎么想的呢？看看回应[4-2](#PC5)。您的标题需要一些调整，以便更好地与我们在吸引观众和有效推广您的餐厅在Instagram上的策略相匹配。以下是一些建议：**标题反馈和修订***原文标题：*“嗯，这里有一个鸡蛋。我们有炒鸡蛋，但我只是拍了一张煎蛋的一面，我不知道。无论如何，我们餐厅还有一些其他菜肴。如果你有时间，来尝尝看吧。#idunno
    #please #eat"**修订标题：*"用我们美味的鸡蛋菜肴开始你的一天吧！![流程图，展示了相互连接的节点和箭头。图表从中央节点“开始”开始，分支成多个路径，每个路径都通向不同的结果。关键术语包括“决策点”、“过程步骤”和“结束”。箭头指示流向，引导通过各种决策阶段。布局强调逻辑进展和决策路径。](../images/641691_1_En_4_Chapter/641691_1_En_4_Figa_HTML.gif)
    ![对称符号，由两个重叠的星形形状组成，一个较大，一个较小，边缘圆润。形状用黑色勾勒，填充浅灰色，形成分层外观。设计是抽象和几何的。](../images/641691_1_En_4_Chapter/641691_1_En_4_Figb_HTML.gif)
    无论你喜欢它们是炒的、水煮的还是煎蛋的一面，我们都能满足你的需求。来参观我们，探索我们的完整早餐菜单！![太阳形状的符号，中心有一个笑脸。符号呈圆形，有交替的深灰和浅灰色三角形射线向外延伸，类似于风格化的太阳。脸部包括简单的特征：两只眼睛、一个鼻子和微笑的嘴巴。](../images/641691_1_En_4_Chapter/641691_1_En_4_Figc_HTML.gif)
    ![一个盘子图标，左边是一把叉子，右边是一把刀，象征着餐饮或餐厅环境。设计简单，单色。](../images/641691_1_En_4_Chapter/641691_1_En_4_Figd_HTML.gif)
    #foodie #egglover #gastronomy #餐厅名称"**主要改进：*1. 参与度：修订后的标题鼓励粉丝用你的鸡蛋菜肴开始他们的一天，营造出一个积极和邀请的语气。2.
    清晰度和自信：它清楚地说明了帖子是关于什么的，并且这样做很有信心。3. 表情符号：适当使用表情符号增加了友好和吸引人的触感。4. 标签：相关的标签有助于触及更广泛的受众，吸引鸡蛋爱好者和美食家。5.
    行动号召：鼓励粉丝参观餐厅并尝试完整的早餐菜单。**照片的额外提示：*- 光线：确保菜肴光线充足。窗户的自然光可以增强外观。- 装饰：考虑添加新鲜的香草或撒上一些香料等装饰，使菜肴更具视觉吸引力。-
    角度：尝试不同的角度，找到最吸引人的菜肴视角。俯视拍摄通常适用于食物摄影。- 下一步：1. 编辑照片：使用照片编辑应用程序调整亮度、对比度和饱和度，使颜色更加鲜艳。2.
    使用修订后的标题重新发布：更新标题，以更好地吸引和参与受众。通过实施这些策略，您可以创建更具吸引力和参与度的Instagram帖子，以扩大您的餐厅关注者群并吸引更多顾客。回应4-2'
- en: ChatGPT tells us how to improve our Instagram post
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT告诉我们如何改进我们的Instagram帖子
- en: This is great! Not only can we get advice from ChatGPT on how to make a good
    Instagram post, but we can also get feedback on our attempts to improve. That
    said, I’m not so sure my restaurant would survive on dishes like mine, and I should
    stick to writing books.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 这太棒了！我们不仅可以从ChatGPT那里获得如何制作好Instagram帖子的建议，还可以得到对我们改进尝试的反馈。话虽如此，我不太确定我的餐厅能否靠像我的这样的菜品生存，我应该坚持写书。
- en: Teaching ChatGPT to Help an Administrative Assistant
  id: totrans-431
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 教ChatGPT帮助行政助理
- en: In the workforce, an administrative assistant is often required to send emails
    on behalf of a manager that doesn’t have time to do so themselves. Let’s look
    at a scenario where an administrative assistant might need to send a company-wide
    message on behalf of their manager.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 在职场中，行政助理经常需要代表没有时间亲自处理的经理发送电子邮件。让我们看看行政助理可能需要代表他们的经理发送公司内部消息的场景。
- en: For example, a tech company manager might need to communicate to the rest of
    the company the launch of a new security measure requirement, like adding two-factor
    authentication to their emails, which is a common procedure nowadays. If you didn’t
    know, Outlook actually has a feature that makes this easier. It’s called the **Send
    as** feature, which can be set up by an IT manager for any company that utilizes
    Microsoft for their email systems.![Screenshot of an email composition window.
    The interface includes options to "Send," "Discard," "Attach File," and more.
    The "From" field is highlighted in red, showing a partially blurred email address
    ending with "onmicrosoft.com." The "To" and "Subject" fields are empty.](../images/641691_1_En_4_Chapter/641691_1_En_4_Fig3_HTML.jpg)
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一家科技公司经理可能需要向公司其他员工传达一项新的安全措施要求，比如在他们的电子邮件中添加双因素认证，这在当今是一种常见的程序。如果你不知道，Outlook实际上有一个使这更容易的功能。它被称为**发送为**功能，可以由IT经理为任何使用Microsoft电子邮件系统的公司设置。![电子邮件撰写窗口的截图。界面包括“发送”、“丢弃”、“附件文件”等选项。红色突出显示的“发件人”字段显示一个部分模糊的以“onmicrosoft.com”结尾的电子邮件地址。“收件人”和“主题”字段为空。](../images/641691_1_En_4_Chapter/641691_1_En_4_Fig3_HTML.jpg)
- en: Figure 4-3
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-3
- en: '*An example of what it looks like when someone is given permission to send
    an email as someone else*'
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: '*当某人被允许以他人的名义发送电子邮件时的示例*'
- en: What Happens When You Ask ChatGPT to Write the Email Without Any Additional
    Information?
  id: totrans-436
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当你要求ChatGPT在不提供任何额外信息的情况下撰写电子邮件时会发生什么？
- en: As stated before, a lot of people get frustrated when ChatGPT responds with
    content that sounds stiff or robotic. Let’s take a look at how that happens by
    asking ChatGPT to write an email on behalf of the manager with no other information
    than that—we just want it to write an email.Write an email from the perspective
    of a manager sending an email to their team stating that they need to change over
    to 2-factor authentication to sign in to their emails.Prompt 4-3
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，当ChatGPT以听起来生硬或机械的内容回应时，很多人都会感到沮丧。让我们通过要求ChatGPT代表经理撰写一封电子邮件，而除了这一点之外没有其他信息——我们只想让它写一封电子邮件。请从经理的角度撰写一封电子邮件，内容是告知团队需要更改到双因素认证以登录他们的电子邮件。提示4-3
- en: Asking ChatGPT to write an email
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 向ChatGPT请求撰写电子邮件
- en: 'In Response [4-3](#PC7), we can see how ChatGPT responds to this very simplistic
    prompt.Subject: Important Update: Transition to Two-Factor Authentication for
    Email AccessDear Team,I hope this email finds you well. To further enhance the
    security of our company''s communication systems and protect sensitive information,
    we are implementing two-factor authentication (2FA) for email access. This change
    is essential to ensure our accounts remain secure against potential cyber threats.What
    You Need to KnowStarting [insert effective date], all employees will need to use
    2FA to sign in to their work emails. This means that, in addition to your password,
    you will also be required to enter a verification code sent to your phone or email,
    or use an authenticator app.Next Steps1\. Set Up 2FA:    • Follow the instructions
    in the attached guide to set up 2FA for your account.    • If you encounter any
    issues during the setup, our IT team will be available to assist you.2\. Test
    Your Access:    • Once you''ve set up 2FA, test your access to ensure everything
    works smoothly.3\. Complete Setup by [insert deadline]:    • Please ensure 2FA
    is fully set up before the effective date.Why This Change?The increasing sophistication
    of cyberattacks makes it critical to adopt stronger security measures. 2FA significantly
    reduces the risk of unauthorized access and safeguards our company data and systems.Your
    cooperation in this transition is greatly appreciated. Please don''t hesitate
    to reach out to me or the IT team at [contact information] if you have any questions
    or concerns.Thank you for your attention to this important update and for helping
    us maintain a secure working environment.Best regards,[Your Name][Your Job Title][Your
    Contact Information]Response 4-3'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 在响应[4-3](#PC7)中，我们可以看到ChatGPT如何回应这个非常简单的提示。主题：重要更新：电子邮件访问的两种因素认证Dear Team，我希望这封电子邮件能找到你们都好。为了进一步加强对我们公司通信系统的安全性和保护敏感信息，我们正在实施电子邮件访问的两种因素认证（2FA）。这一变化对于确保我们的账户免受潜在的网络安全威胁至关重要。
- en: ChatGPT creates a very AI-sounding email
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT创建了一个听起来非常像AI的电子邮件
- en: Response [4-3](#PC7) shows the kind of response that makes a lot of people cringe
    when they think of using ChatGPT to write anything. And this is simply because
    no other information has been provided other than the task we wanted accomplished.
    This response essentially has no tone, style, or anything unique about it other
    than the fact that ChatGPT wrote it. And it shows. So let’s find out how we can
    avoid this kind of response and actually get something usable from ChatGPT.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 响应[4-3](#PC7)显示了当人们想到使用ChatGPT来写任何东西时，很多人都会感到不舒服的回应。这仅仅是因为除了我们想要完成的任务之外，没有提供其他任何信息。这个回应基本上没有任何语气、风格或独特之处，除了ChatGPT写了它之外。这很明显。所以，让我们找出如何避免这种回应，并真正从ChatGPT那里得到一些有用的东西。
- en: Let’s Gather Information to Give to ChatGPT
  id: totrans-442
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 让我们收集信息以供ChatGPT使用
- en: So the reason why our first attempt at writing an email was a bust was because
    we didn’t give ChatGPT any information about the boss themselves. If you’re an
    admin writing an email to the rest of the company, one of the most important things
    that needs to be done is to match the tone and style of the person that you are
    authorized to represent. This is where it’s helpful to teach ChatGPT what emails
    from management typically sound like in order to help the admin craft an email
    appropriately. So the first thing the admin should do is collect a few emails
    from the boss to give ChatGPT as reference.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们第一次尝试写电子邮件失败的原因是因为我们没有给ChatGPT提供任何关于老板本人的信息。如果你是管理员，要给公司其他人写电子邮件，最重要的事情之一就是要匹配你被授权代表的人的语气和风格。这就是教ChatGPT管理层的电子邮件通常听起来像什么，以便帮助管理员适当撰写电子邮件的地方。所以管理员首先应该做的事情就是收集一些老板的电子邮件，作为ChatGPT的参考。
- en: 'Therefore, the first step is to gather information that can be used to train
    ChatGPT to create the response we’re actually looking for. In order to do that,
    we’re going to give ChatGPT examples. We’re going to use some of the manager’s
    previous messages as training material for ChatGPT (Listing [4-2](#PC8)).Subject:
    Amazing Partnership Opportunity with InnovateTech Solutions!Dear Helen Miller
    at NexxGen Synergy,Hope you''re doing great! I''m Anthony Davis, Technical Manager
    at InnovateTech Solutions. We talked during our meeting with the marketing team,
    but I wanted to formally introduce myself! I''m extremely excited about our teams
    working together. I think this partnership is bound to be awesome. How about a
    meeting next week to chat about helping our teams collaborate smoothly?Catch you
    later,Anthony DavisTechnical Manager at InnovateTech Solutions—Subject: You Belong
    at Our InnovateTech Summit Conference this Year!Dear Mark Wilson,I''m Anthony
    Davis at Innovate Tech and guess what? I''ve got the best news. We want YOU to
    be a keynote speaker at our big InnovateTech Summit 2024: Shaping the Future of
    Technology. We think your knowledge on security is amazing, we''d love for you
    to present. Let''s make this happen.Let''s talk,Anthony DavisTechnical Manager
    at InnovateTech Solutions—Subject: Team Meeting: Don''t Be Late!Hey Team,Just
    a heads-up, we''ve got a team meeting today at 5pm. We''ll talk about all the
    cool stuff we''re doing. We''ll also be looking at a few of our Q3 plans for the
    Marketing, Development, and IT teams. Let''s go team!Cheers,Anthony DavisTechnical
    Manager at InnovateTech SolutionsListing 4-2'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，第一步是收集可用于训练ChatGPT以创建我们真正需要的响应的信息。为了做到这一点，我们将向ChatGPT提供示例。我们将使用经理的一些先前消息作为ChatGPT的训练材料（列表[4-2](#PC8)）。主题：与InnovateTech
    Solutions的惊人合作伙伴机会！亲爱的Helen Miller，NexxGen Synergy，希望您一切顺利！我是Anthony Davis，InnovateTech
    Solutions的技术经理。我们在与营销团队的会议中谈过了，但我想要正式自我介绍！我对我们团队的合作感到非常兴奋。我认为这个合作伙伴关系肯定会很棒。下周安排一次会议，讨论如何让我们的团队顺利合作怎么样？稍后见，Anthony
    Davis，InnovateTech Solutions的技术经理—主题：您今年应该参加我们的InnovateTech峰会会议！亲爱的Mark Wilson，我是Anthony
    Davis，来自Innovate Tech，猜猜看？我有最好的消息。我们希望您能成为我们大型InnovateTech Summit 2024：塑造技术未来的主题演讲者。我们认为您在安全方面的知识令人惊叹，我们希望您能进行演讲。让我们让这件事成真吧。让我们谈谈，Anthony
    Davis，InnovateTech Solutions的技术经理—主题：团队会议：不要迟到！嘿，团队，提前提醒一下，我们今天下午5点有一个团队会议。我们将讨论我们正在做的所有酷炫事情。我们还将查看我们为营销、开发和IT团队制定的Q3计划。让我们加油吧！干杯，Anthony
    Davis，InnovateTech Solutions的技术经理列表4-2
- en: Example emails from Anthony Davis, technical manager at InnovateTech Solutions
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 来自Anthony Davis，InnovateTech Solutions技术经理的示例电子邮件
- en: Giving ChatGPT Training Material on the Manager’s Writing Style so It Can Write
    an Email on Their Behalf to the Rest of the Company
  id: totrans-446
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提供ChatGPT培训材料，以经理的写作风格使其能代表他们向公司其他员工撰写电子邮件
- en: 'Now that we have some emails from our imaginary boss, let’s give ChatGPT these
    examples to help write an email to the rest of the company about a new security
    requirement. You can see our approach in Prompt [4-4](#PC9).You are an administrative
    assistant working under Anthony Davis at InnovateTech Solutions. You have to send
    an email to the team about switching to two-factor authentication for all sign
    in going forward. Here is an example of emails from Anthony:###Subject: Amazing
    Partnership Opportunity with InnovateTech Solutions!Dear Helen Miller at NexxGen
    Synergy,Hope you''re doing great! I''m Anthony Davis, Technical Manager at InnovateTech
    Solutions. We talked during our meeting with the marketing team, but I wanted
    to formally introduce myself! I''m extremely excited about our teams working together.
    I think this partnership is bound to be awesome. How about a meeting next week
    to chat about helping our teams collaborate smoothly?Catch you later,Anthony DavisTechnical
    Manager at InnovateTech Solutions—Subject: You Belong at Our InnovateTech Summit
    Conference this Year!Dear Mark Wilson,I''m Anthony Davis at Innovate Tech and
    guess what? I''ve got the best news. We want YOU to be a keynote speaker at our
    big InnovateTech Summit 2024: Shaping the Future of Technology. We think your
    knowledge on security is amazing, we''d love for you to present. Let''s make this
    happen.Let''s talk,Anthony DavisTechnical Manager at InnovateTech Solutions—Subject:
    Team Meeting: Don''t Be Late!Hey Team,Just a heads-up, we''ve got a team meeting
    today at 5pm. We''ll talk about all the cool stuff we''re doing. We''ll also be
    looking at a few of our Q3 plans for the Marketing, Development, and IT teams.
    Let''s go team!Cheers,Anthony DavisTechnical Manager at InnovateTech Solutions###Write
    the email in the style of Anthony for the team.Prompt 4-4'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经收到了一些来自我们想象中的老板的电子邮件，让我们把这些例子给ChatGPT，帮助它写一封给公司其他员工的关于新安全要求的电子邮件。您可以在提示[4-4](#PC9)中看到我们的方法。您是InnovateTech
    Solutions公司下Anthony Davis的行政助理。您需要给团队发送一封关于从现在开始所有登录都切换到双因素认证的电子邮件。以下是Anthony的电子邮件示例：###主题：与InnovateTech
    Solutions的惊人合作伙伴机会！亲爱的NexxGen Synergy的Helen Miller，希望您一切顺利！我是Anthony Davis，InnovateTech
    Solutions的技术经理。我们在与营销团队的会议中谈过了，但我想要正式自我介绍！我非常兴奋地看到我们的团队一起工作。我认为这个合作伙伴关系一定会很棒。我们下周安排一个会议，讨论如何让我们的团队顺利合作怎么样？稍后见，Anthony
    Davis，InnovateTech Solutions的技术经理—主题：您今年应该参加我们的InnovateTech峰会会议！亲爱的Mark Wilson，我是Innovate
    Tech的Anthony Davis，猜猜看？我有最好的消息。我们希望您能成为我们2024年InnovateTech峰会：塑造技术未来的主题演讲者。我们认为您在安全方面的知识非常出色，我们希望您能进行演讲。让我们让这件事成真吧。让我们谈谈，Anthony
    Davis，InnovateTech Solutions的技术经理—主题：团队会议：不要迟到！嘿，团队，提前通知一下，我们今天下午5点有一个团队会议。我们将讨论我们正在做的所有酷炫的事情。我们还将查看营销、开发和IT团队的一些第三季度计划。让我们加油吧！干杯，Anthony
    Davis，InnovateTech Solutions的技术经理###按照Anthony的风格为团队写电子邮件。提示4-4
- en: 'Asking ChatGPT to write emails in the voice of the technical manager of InnovateTech
    Solutions In Response [4-4](#PC10), we can see that when given training material,
    ChatGPT was able to represent the tone of management very well! Therefore, proper
    prompt engineering helps you avoid dry responses from ChatGPT when you’re writing
    content.Subject: Important Update: Two-Factor Authentication for All Sign-InsHey
    Team,Hope you''re all having a great day! I''ve got an important update for you.
    To enhance our security and keep our data safe, we''re rolling out two-factor
    authentication (2FA) for all sign-ins starting next week.Why are we doing this?
    Simple – we want to make sure that our accounts and sensitive information are
    protected. 2FA adds an extra layer of security, ensuring that even if someone
    gets hold of your password, they still can''t access your account without the
    second authentication factor.Here''s what you need to do:1\. Download the Authentication
    App: We recommend using Google Authenticator or Authy.2\. Set Up 2FA: Follow the
    instructions we''ll be sending out to link your account with the authentication
    app.3\. Test It Out: Make sure it''s working smoothly before the switch next week.Don''t
    worry, it''s a quick and easy process, and our IT team will be available to help
    if you run into any issues.Let''s make sure we''re all set and ready to go! This
    is a crucial step to keep our InnovateTech Solutions family secure.Thanks for
    your cooperation and let''s keep rocking!Cheers,Anthony DavisTechnical Manager
    at InnovateTech SolutionsResponse 4-4'
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 向ChatGPT请求以InnovateTech Solutions技术经理的语气撰写邮件，响应[4-4](#PC10)，我们可以看到，当提供训练材料时，ChatGPT能够很好地代表管理层的语气！因此，适当的提示工程可以帮助你在撰写内容时避免ChatGPT给出枯燥的回应。主题：重要更新：所有登录的二次验证Hey
    Team，希望你们今天都过得愉快！我有一个重要的更新要告诉你们。为了增强我们的安全性并保护我们的数据，我们下周开始将为所有登录实施二次验证（2FA）。我们为什么要这样做？很简单——我们想确保我们的账户和敏感信息得到保护。2FA增加了一个额外的安全层，确保即使有人得到了你的密码，他们仍然无法在没有第二个认证因素的情况下访问你的账户。以下是你需要做的：1.
    下载认证应用：我们推荐使用Google Authenticator或Authy。2. 设置2FA：请按照我们将发送的说明操作，将你的账户与认证应用链接。3.
    测试一下：在下周切换之前确保它运行顺畅。别担心，这是一个快速且简单的过程，如果遇到任何问题，我们的IT团队将随时提供帮助。让我们确保一切准备就绪，随时可以出发！这是确保InnovateTech
    Solutions大家庭安全的关键步骤。感谢你们的合作，让我们继续保持活力！Cheers，Anthony Davis，InnovateTech Solutions技术经理Response
    4-4
- en: ChatGPT creates an email in the voice of the technical manager of InnovateTech
    Solutions
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT以InnovateTech Solutions技术经理的语气创建了一封邮件
- en: Now that we’ve seen what happens when we train ChatGPT on messages with a certain
    tone and writing style, let’s see what happens when we tell ChatGPT a little bit
    about ourselves when we’re asking for more personal advice.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经看到了当我们在消息中训练ChatGPT时，它会对特定的语气和写作风格产生什么影响，那么当我们在请求更多个人建议时告诉ChatGPT一些关于我们自己的信息，会发生什么呢？
- en: Teaching ChatGPT to Make Task Management Easier
  id: totrans-451
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 教ChatGPT使任务管理变得更简单
- en: Let’s step away from workplace-focused tasks and change gears for a moment.
    On an average, daily basis, ChatGPT can be used to increase productivity for anyone
    looking to save some time in their personal lives.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们暂时放下以工作场所为中心的任务，转换一下节奏。在平均的日常基础上，ChatGPT可以帮助那些希望在个人生活中节省一些时间的人提高生产力。
- en: It can be hard for anyone to manage their time and calculate how long a task
    **actually** takes as opposed to how long they **think** it’s going to take. People
    also tend to overestimate what they can do in a day and overwhelm themselves with
    a surplus of tasks with too little time. Instead of agonizing over being unproductive,
    let’s teach ChatGPT what our plans for the day look like and ask it for help creating
    a manageable schedule. The prompt we used can be seen in Prompt [4-5](#PC11).I
    need help managing my time, and I can't tell how much I'll actually be able to
    get done today. I get to work at 10am and leave at 6pm. My commute is around half
    an hour. I'd prefer to be done with tasks for the day by 8pm. Setting a priority
    based on urgency and time needed to complete the task, make a schedule for me,
    starting from 10am until 8pm. What can I reasonably get done within that timeframe?
    Taking into consideration time constraints, travel time, and fatigue, what should
    I put off for tomorrow?###- Create a presentation on Pricing Strategies on Sales
    and Profit Margins- Attend the marketing meeting with the CEO at 2pm- Reply to
    an email from Maria- Meal prep dinners for the week ahead- Water the plants at
    home- Go to the grocery store and pick up chicken breast for dinner- Clean the
    oven- Vacuum the living room- Start a garden- Edit 10 chapters of my new romance
    novel- Finish reading the last 20 chapters of the meditation book I've been readingPrompt
    4-5
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 对任何人来说，管理时间和计算一项任务实际需要多长时间，而不是他们认为需要多长时间，都可能是一件困难的事情。人们也倾向于高估自己一天能完成的事情，并因为任务过多而时间不足而感到压力重重。与其为效率低下而痛苦，不如教ChatGPT我们一天的计划，并请它帮忙制定一个可管理的日程。我们使用的提示可以在提示[4-5](#PC11)中看到。我需要帮助管理我的时间，而且我无法确定我今天实际上能完成多少工作。我上午10点开始工作，下午6点离开。我的通勤时间大约半小时。我希望能到晚上8点完成当天的任务。根据紧急程度和完成任务所需的时间设置优先级，为我制定一个从上午10点到晚上8点的日程。在这个时间段内，我可以合理完成哪些工作？考虑到时间限制、通勤时间和疲劳，我应该把哪些事情推迟到明天？###-
    制作关于销售和利润率的定价策略演示文稿- 下午2点与CEO参加营销会议- 回复玛利亚的邮件- 准备下周的晚餐- 在家浇花- 去杂货店购买晚餐用的鸡胸肉- 清理烤箱-
    打扫客厅- 开始种菜- 编辑我新写的浪漫小说的10章- 完成阅读我一直在读的冥想书的最后20章提示4-5
- en: Giving ChatGPT our to-do list
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 将我们的待办事项列表交给ChatGPT
- en: 'In the example shown in Prompt [4-5](#PC11), we’ve presented a hefty list of
    tasks with varying levels of importance. Let’s see if ChatGPT can reasonably plot
    out a schedule that allows us to get the urgent tasks done and manage our time
    for the tasks that would reasonably take up a larger chunk of time than others.**Time
    Management Schedule for Today**Work Hours: 10am - 6pm (8 hours)Commute: 30 minutes
    each way (1 hour total)Preferred End Time for Tasks: 8pm**Prioritization of Tasks**1\.
    High Priority (Must be done today)   - Attend the marketing meeting with the CEO
    at 2pm   - Reply to an email from Maria   - Create a presentation on Pricing Strategies
    on Sales and Profit Margins2\. Medium Priority (Important but can be postponed
    if necessary)   - Meal prep dinners for the week ahead   - Water the plants at
    home   - Go to the grocery store and pick up chicken breast for dinner3\. Low
    Priority (Can be postponed to tomorrow or later)   - Clean the oven   - Vacuum
    the living room   - Start a garden   - Edit 10 chapters of my new romance novel   -
    Finish reading the last 20 chapters of the meditation book**Schedule***10:00am
    - 10:15am*- Settle in at work, check emails, and plan the day.*10:15am - 11:30am*-
    Reply to an email from Maria (15 minutes)- Work on the presentation on Pricing
    Strategies (60 minutes)*11:30am - 12:30pm*- Continue working on the presentation
    on Pricing Strategies (60 minutes)*12:30pm - 1:00pm*- Lunch break*1:00pm - 2:00pm*-
    Finalize the presentation on Pricing Strategies (60 minutes)*2:00pm - 3:00pm*-
    Attend the marketing meeting with the CEO*3:00pm - 4:00pm*- Review and refine
    the presentation, handle any immediate follow-ups from the meeting (60 minutes)*4:00pm
    - 5:30pm*- Start working on editing the romance novel (90 minutes)*5:30pm - 6:00pm*-
    Finalize work tasks, check and reply to any remaining emails, prepare for the
    next workday*6:00pm - 6:30pm*- Commute home*6:30pm - 6:45pm*- Water the plants
    at home (15 minutes)*6:45pm - 7:15pm*- Go to the grocery store and pick up chicken
    breast for dinner (30 minutes)*7:15pm - 8:00pm*- Meal prep dinners for the week
    ahead (45 minutes)**Tasks to Postpone for Tomorrow:**- Clean the oven- Vacuum
    the living room- Start a garden- Edit 10 chapters of my new romance novel (continue
    tomorrow)- Finish reading the last 20 chapters of the meditation bookThis schedule
    prioritizes high-importance tasks and ensures that essential work and personal
    tasks are completed. Tasks that are not urgent or crucial can be deferred to the
    following day to avoid overburdening yourself and to allow for a balanced workload.Response
    4-5'
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 在提示[4-5](#PC11)中展示的示例中，我们列出了一份包含不同重要级别的任务清单。让我们看看ChatGPT能否合理地规划出一个日程表，以便我们完成紧急任务，并管理那些相对于其他任务需要更多时间的工作。**今天的时间管理日程表**工作时间：上午10点
    - 下午6点（8小时）通勤时间：每程30分钟（总共1小时）任务完成推荐结束时间：晚上8点**任务的优先级**1. 高优先级（今天必须完成）   - 下午2点参加与CEO的营销会议   -
    回复玛利亚的邮件   - 创建关于销售和利润率的定价策略演示文稿2. 中等优先级（重要但必要时可以推迟）   - 准备下周的晚餐   - 在家中给植物浇水   -
    去杂货店购买晚餐的鸡胸肉3. 低优先级（可以推迟到明天或以后）   - 清理烤箱   - 打扫客厅   - 开始种植花园   - 编辑我新爱情小说的10章   -
    完成阅读冥想书的最后20章**日程安排**10:00am - 10:15am*- 到达工作地点，检查邮件并规划一天的工作。*10:15am - 11:30am*-
    回复玛利亚的邮件（15分钟）- 制作关于定价策略的演示文稿（60分钟)*11:30am - 12:30pm*- 继续制作关于定价策略的演示文稿（60分钟)*12:30pm
    - 1:00pm*- 午餐休息*1:00pm - 2:00pm*- 完成关于定价策略的演示文稿（60分钟)*2:00pm - 3:00pm*- 参加与CEO的营销会议*3:00pm
    - 4:00pm*- 审查和改进演示文稿，处理会议的任何即时后续事项（60分钟)*4:00pm - 5:30pm*- 开始编辑爱情小说（90分钟)*5:30pm
    - 6:00pm*- 完成工作任务，检查并回复任何剩余的邮件，为第二天的工作做准备*6:00pm - 6:30pm*- 通勤回家*6:30pm - 6:45pm*-
    在家中给植物浇水（15分钟)*6:45pm - 7:15pm*- 去杂货店购买晚餐的鸡胸肉（30分钟)*7:15pm - 8:00pm*- 准备下周的晚餐（45分钟）**明天推迟的任务：**-
    清理烤箱- 打扫客厅- 开始种植花园- 继续编辑我新爱情小说的10章（明天继续）- 完成阅读冥想书的最后20章这个日程表优先考虑高优先级任务，并确保基本工作和个人任务得到完成。非紧急或关键的任务可以推迟到第二天，以避免过度劳累，并保持工作负荷的平衡。Response
    4-5
- en: ChatGPT creates a timetable that prioritizes efficiency
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT创建了一个优先考虑效率的时间表
- en: Here, ChatGPT has planned out a timetable and to-do list that prioritizes important
    tasks and tasks that don’t require a lot of time to accomplish. It delegates time
    for breaks and suggests which tasks can be put off, encouraging a balanced schedule
    that doesn’t cause burnout.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，ChatGPT已经规划出了一个时间表和待办事项列表，优先考虑重要任务和不需要太多时间完成的任务。它为休息时间分配了时间，并建议哪些任务可以推迟，鼓励一个不会导致过度劳累的平衡日程。
- en: Now, up until now, we’ve been training ChatGPT on information we already have,
    like Instagram posts, emails, and a to-do list. Teaching ChatGPT this kind of
    information is good because it ensures that ChatGPT doesn’t *hallucinate* details,
    as we mentioned in Chapter [1](641691_1_En_1_Chapter.xhtml). In other words, we’re
    making sure ChatGPT doesn’t make up information that doesn’t exist, such as a
    nonexistent restaurant for an Instagram post, a false company name in an email,
    or a list of tasks you have no means to accomplish. However, because ChatGPT can
    be instructed to search the web for information, we can train ChatGPT based upon
    real findings—meaning it can’t possibly hallucinate because the facts are readily
    available **and** current.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，到目前为止，我们一直在用我们已有的信息训练ChatGPT，比如Instagram帖子、电子邮件和待办事项清单。教授ChatGPT这类信息是好的，因为它确保ChatGPT不会像我们在第[1](641691_1_En_1_Chapter.xhtml)章中提到的那样“产生幻觉”。换句话说，我们确保ChatGPT不会编造不存在的信息，比如Instagram帖子中不存在的一家餐厅，电子邮件中的虚假公司名称，或者你无法完成的任务清单。然而，由于ChatGPT可以被指示在网络上搜索信息，我们可以基于真实发现来训练ChatGPT——这意味着它不可能产生幻觉，因为事实是现成的**并且**是当前的。
- en: Teaching ChatGPT Up-to-Date Information and Training It to Create Blog Posts
  id: totrans-459
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 教授ChatGPT最新信息并训练它创作博文
- en: Using ChatGPT’s web search ability is a powerful capability and is essential
    to creating content that remains accurate and up to date. This is also important
    because ChatGPT cites its sources in its response, which allows you to fact-check
    where ChatGPT got its information. For example, you wouldn’t want ChatGPT writing
    an article on politics based upon information it found from a gossip column.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 利用ChatGPT的网页搜索能力是一种强大的功能，对于创建保持准确性和时效性的内容至关重要。这也非常重要，因为ChatGPT在其回答中会引用其来源，这允许你核实ChatGPT获取信息的地方。例如，你不会希望ChatGPT基于从八卦专栏找到的信息撰写一篇关于政治的文章。
- en: That said, we’re going to be putting the web search feature to use by asking
    ChatGPT to help us write a blog post for an environmentally conscious blog called
    The Happy Planet. First, we’re going to do what we did before with the example
    of teaching ChatGPT to write in the style of a tech manager. We’re going to offer
    ChatGPT examples of previous blog posts written by this fictional blogger.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，我们将通过让ChatGPT帮助我们为名为《快乐星球》的环保博客撰写博文来使用网络搜索功能。首先，我们将做之前做过的事情，即以教ChatGPT模仿技术经理风格写作为例。我们将向ChatGPT提供这位虚构博主之前撰写的博文示例。
- en: Writing in the Style of Emily Carlton, Owner of The Happy Planet Blog
  id: totrans-462
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 以《快乐星球》博客所有者艾米丽·卡尔顿的风格写作
- en: 'Let’s present ChatGPT with an example of how a blog post from the author of
    The Happy Planet typically looks like. Listing [4-3](#PC13) is an example of one
    of her posts on reducing the carbon footprint.Hey eco-friends!Welcome back to
    our deep dive on how to shrink that carbon footprint of ours. This time, we''re
    going even further into the details, sharing more tips, tricks, and the latest
    innovations in sustainability. Whether you''re a seasoned green warrior or just
    starting your journey, there''s something here for everyone. Let''s dive in!**What
    Exactly is a Carbon Footprint?**Before we jump into the tips, let''s revisit what
    a carbon footprint is. It''s the total amount of greenhouse gases, especially
    CO2, that we produce through our daily activities. This includes everything from
    the food we eat to how we travel and the energy we use at home.Globally, the average
    carbon footprint per person is about 4 tons of CO2 annually, but in the U.S.,
    it''s around 16 tons per person. To meet climate goals, we need to bring this
    down to under 2 tons by 2050\. So, how can we get there?**Actionable Tips for
    Everyday Life***1\. Transportation: Pedal and Public Power*One of the biggest
    contributors to our carbon footprints is how we get around. Cars, especially those
    running on fossil fuels, emit a ton of CO2\. Here are some alternatives:- Bike
    or Walk: Not only will you cut down on emissions, but you''ll also get a good
    workout in. It''s a win-win!- Public Transport: Buses, trains, and subways are
    more eco-friendly than individual car rides. Plus, they often save you money and
    reduce traffic congestion.- Carpool: If driving is a must, share the ride with
    friends or coworkers. It reduces the number of vehicles on the road and splits
    fuel costs.*2\. Eat More Plants*Food production, especially meat, is a massive
    source of greenhouse gases. By adopting a more plant-based diet, you can significantly
    reduce your carbon footprint:- Meatless Mondays: Start by cutting out meat one
    day a week. Gradually increase as you find more delicious plant-based recipes.-
    Local and Seasonal: Buy locally-produced and seasonal foods to cut down on the
    transportation emissions associated with your meals.*3\. Energy Efficiency at
    Home*Simple changes at home can lead to big savings in both energy and money:-
    LED Bulbs: These use a fraction of the energy compared to traditional incandescent
    bulbs and last much longer.- Smart Thermostats: These devices optimize heating
    and cooling, reducing unnecessary energy use.- Unplug Devices: Many electronics
    draw power even when they''re off. Unplugging devices when not in use can prevent
    this "phantom" energy loss.*4\. Reduce, Reuse, Recycle*Minimizing waste is crucial
    for cutting emissions:- Recycle Properly: Follow local recycling guidelines to
    ensure materials are processed correctly.- Upcycle: Get creative with old items
    instead of tossing them. Turn an old t-shirt into a shopping bag or use jars as
    storage containers.- Buy Less: Consider if you really need new items or if second-hand
    options could suffice. This is particularly important for clothing, where fast
    fashion is a significant environmental burden.*5\. Water Conservation*Using less
    water reduces the energy required to pump, heat, and treat it:- Shorter Showers:
    Aim for 5-minute showers.- Fix Leaks: A dripping tap can waste gallons of water
    a day.- Water-Efficient Fixtures: Install low-flow shower heads and toilets to
    save water without sacrificing performance.*6\. Support Green Businesses*Support
    companies that prioritize sustainability:- Eco-Friendly Products: Opt for products
    from brands that use sustainable practices, like biodegradable packaging and cruelty-free
    ingredients.- Carbon Offsets: Some businesses invest in projects that offset their
    carbon emissions, such as tree planting or renewable energy projects.**Latest
    Innovations in Sustainability***Paris 2024 Olympics: A Case Study in Sustainability*The
    upcoming Paris Olympics are setting new standards in sustainability. The event
    aims to halve the carbon footprint compared to previous games by using 100% renewable
    energy, minimizing new construction, and promoting plant-based diets for athletes
    and spectators.*Circular Economy*The circular economy is gaining traction, emphasizing
    the reuse and recycling of materials to minimize waste. This approach not only
    reduces emissions but also creates economic opportunities. Companies are redesigning
    products to be more durable and recyclable, supporting a more sustainable model
    of consumption.*Biodiversity and Nature-Positive Initiatives*Protecting biodiversity
    is now seen as crucial for combating climate change. Initiatives include establishing
    protected areas, restoring ecosystems, and promoting sustainable agriculture.
    The goal is to ensure there is more nature by 2030 than there is today.**Conclusion**Reducing
    your carbon footprint is all about making mindful, sustainable choices. Start
    small, be consistent, and remember that every little bit helps. Whether it''s
    biking to work, eating more plants, or supporting green businesses, your actions
    can make a huge difference.Let''s keep our adventures eco-friendly and our planet
    thriving. Together, we can create a healthier, greener world for ourselves and
    future generations. Stay green and keep shining! Feel free to reach out with your
    own tips and experiences. Let''s keep the conversation going and inspire each
    other to live more sustainably!**Sources:**1\. Our World in Data. CO₂ emissions.
    Retrieved from [Our World in Data](https://ourworldindata.org).2\. Nature.org.
    What is your carbon footprint? Retrieved from [Nature.org](https://www.nature.org).3\.
    World Economic Forum. How Paris Olympics 2024 could be the ''greenest-ever'' games
    — https://www.weforum.org4\. IBM Blog. Sustainability trends: 5 issues to watch
    in 2024 — https://www.ibm.com5\. Nature.com. Thousands of studies reveal the best
    ways to cut your carbon footprint — https://www.nature.com6\. GreenCitizen.com.
    21 Practical Ways on How to Reduce Your Carbon Footprint —https://www.greencitizen.comListing
    4-3'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: '让我们以《快乐星球》作者的一篇博客文章为例，展示ChatGPT的典型应用。列出[4-3](#PC13)是她关于减少碳足迹的一篇文章的例子。嘿，环保朋友们！欢迎回到我们深入探讨如何缩小我们碳足迹的旅程。这次，我们将更深入地探讨细节，分享更多技巧、窍门和可持续性的最新创新。无论你是经验丰富的绿色战士还是刚开始你的旅程，这里都有适合每个人的内容。让我们开始吧！**碳足迹究竟是什么？**在进入技巧之前，让我们回顾一下碳足迹是什么。它是我们通过日常活动产生的温室气体总量，特别是二氧化碳。这包括我们从食物到旅行方式以及在家使用的能源的方方面面。全球平均每人每年的碳足迹约为4吨二氧化碳，但在美国，这个数字约为每人16吨。为了实现气候目标，我们需要到2050年将其降至2吨以下。那么，我们如何实现这一目标呢？**日常生活中的实用技巧***1\.
    交通工具：骑自行车和公共交通*我们碳足迹的最大贡献者之一是我们如何出行。汽车，尤其是那些使用化石燃料的汽车，会排放大量二氧化碳。以下是一些替代方案：- 骑自行车或步行：这不仅会减少排放，还能让你得到良好的锻炼。这是一个双赢的局面！-
    公共交通：公交车、火车和地铁比个人驾车更环保。此外，它们通常能为你省钱并减少交通拥堵。- 拼车：如果开车是必须的，和朋友或同事拼车。这可以减少道路上的车辆数量并分摊燃料成本。*2\.
    多吃植物*食品生产，尤其是肉类，是温室气体的重要来源。通过采用更植物性的饮食，你可以显著减少你的碳足迹：- 无肉星期一：从每周减少一天肉类开始。随着你发现更多美味的植物性食谱，逐渐增加。-
    当地和季节性：购买当地生产和季节性食品，以减少与你的餐食相关的运输排放。*3\. 家庭能源效率*在家做一些简单的改变可以带来能源和金钱的大幅节省：- LED灯泡：这些灯泡与传统白炽灯泡相比，使用的能源少得多，而且寿命更长。-
    智能恒温器：这些设备优化供暖和冷却，减少不必要的能源使用。- 断开电源：许多电子产品即使在关闭时也会消耗电力。在不使用时断开电源可以防止这种“幽灵”能源损失。*4\.
    减少浪费、重复使用和回收*减少浪费对于减少排放至关重要：- 正确回收：遵循当地回收指南，确保材料得到正确处理。- 回收利用：用创意对待旧物品，而不是扔掉。将旧T恤变成购物袋或用罐子作为储物容器。-
    购买更少：考虑你是否真的需要新物品，或者二手选项是否足够。这对于服装尤为重要，因为快时尚对环境造成了巨大的负担。*5\. 节约用水*使用更少的水可以减少泵送、加热和处理水所需的能源：-
    短暂淋浴：目标为5分钟淋浴。- 修复漏水：滴水的龙头每天可能浪费数加仑水。- 节水设备：安装低流量淋浴头和马桶，在不牺牲性能的情况下节省水。*6\. 支持绿色企业*支持优先考虑可持续性的公司：-
    环保产品：选择使用可持续实践的品牌的产品，如可生物降解包装和无害成分。- 碳抵消：一些企业投资于抵消其碳排放的项目，如植树或可再生能源项目。**可持续性的最新创新***巴黎2024奥运会：可持续性的案例研究*即将到来的巴黎奥运会正在设定可持续性的新标准。该活动旨在通过使用100%可再生能源、最小化新建筑和推广运动员和观众植物性饮食，将碳足迹比以往的比赛减少一半。*循环经济*循环经济正在获得关注，强调材料的再利用和回收以最大限度地减少浪费。这种方法不仅减少排放，还创造了经济机会。公司正在重新设计产品，使其更耐用和可回收，支持更可持续的消费模式。*生物多样性和积极自然倡议*保护生物多样性现在被视为对抗气候变化的关键。这些举措包括建立保护区、恢复生态系统和推广可持续农业。目标是到2030年确保有比现在更多的自然。**结论**减少你的碳足迹就是做出明智的可持续选择。从小事做起，保持一致，记住，每一件小事都有帮助。无论是骑自行车上班、多吃植物还是支持绿色企业，你的行动都可以产生巨大的影响。让我们保持我们的冒险环保，让我们的星球繁荣。让我们共同努力，为我们自己和后代创造一个更健康、更绿色的世界。保持绿色，继续闪耀！欢迎分享你的技巧和经验。让我们继续进行对话，互相激励，过上更可持续的生活！**来源：**1.
    Our World in Data. CO₂ emissions. Retrieved from [Our World in Data](https://ourworldindata.org).2.
    Nature.org. What is your carbon footprint? Retrieved from [Nature.org](https://www.nature.org).3.
    World Economic Forum. How Paris Olympics 2024 could be the ''greenest-ever'' games
    — https://www.weforum.org4. IBM Blog. Sustainability trends: 5 issues to watch
    in 2024 — https://www.ibm.com5. Nature.com. Thousands of studies reveal the best
    ways to cut your carbon footprint — https://www.nature.com6. GreenCitizen.com.
    21 Practical Ways on How to Reduce Your Carbon Footprint —https://www.greencitizen.com列出4-3'
- en: An example post from the eco-conscious blog, The Happy Planet
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 来自环保意识博客《快乐星球》的一篇示例文章
- en: Asking ChatGPT to Write a Blog Post About Sustainable Living
  id: totrans-465
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 向ChatGPT请求撰写关于可持续生活的博客文章
- en: With the latest post from Emily Carlton as inspiration, we’re going to ask ChatGPT
    to write about a different subject. We want ChatGPT to write about sustainable
    fashion, a topic that has been talked about often in the environmentally aware
    community.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 以艾米丽·卡尔顿的最新文章为灵感，我们将要求ChatGPT撰写关于不同主题的文章。我们希望ChatGPT撰写关于可持续时尚，这是一个在环保意识社区中经常讨论的话题。
- en: Note
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: For the sake of brevity, we’re indicating where we have given ChatGPT the contents
    of the blog post shown in Listing [4-3](#PC13) with “[example goes here]” in Prompt
    [4-6](#PC14).
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简洁起见，我们在提示[4-6](#PC14)中用“[示例在此处]”表示，我们已向ChatGPT提供了博客文章的内容，该内容在列表[4-3](#PC13)中显示。
- en: 'You are a blogger for the site The Happy Planet, a blog dedicated to educating
    the people on the environment and contributing factors to the climate crisis,
    as well as providing tips on how to live more sustainably. You''re to write a
    blog post in the voice of the main author, Emily Carlton. Here''s an example of
    her latest post:###[example goes here]###In Emily''s voice and style, write a
    new blog post on the following subject and cover the following bullet points.
    Use web search to find the latest news and resources, and cite your sources. Write
    in prose:Blog post title: Sustainable Fashion: How to Build an Eco-Friendly Wardrobe-
    Research sustainable fashion brands and their practices.- Give examples of fast-fashion
    brands that would be best to avoid.- Provide tips on how to shop ethically and
    sustainably.###To help with the process of creating the post, indicate where it
    would be prudent to add photos to help break up text and maintain viewer interest.
    Also suggest what photos would be appropriate for these sections.Prompt 4-6'
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 你是《快乐星球》网站的博主，这个博客致力于教育人们关于环境和气候危机的成因，并提供如何更可持续生活的建议。你将用主要作者艾米丽·卡尔顿的语气撰写一篇博客文章。以下是她最新的文章示例：###[示例在此处]###用艾米丽的语气和风格，就以下主题撰写一篇新的博客文章，并涵盖以下要点。使用网络搜索查找最新的新闻和资源，并注明出处。用散文形式写作：博客文章标题：可持续时尚：如何打造环保衣橱-
    研究可持续时尚品牌及其实践。- 提供应避免的快时尚品牌的例子。- 提供如何进行道德和可持续购物的建议。###为了帮助创建文章的过程，指出在哪里添加图片以帮助分割文本并保持观众的兴趣。同时建议哪些图片适合这些部分。提示4-6
- en: 'Asking ChatGPT to write a blog post about fast fashion Now let’s see how ChatGPT
    handles the task, as you’ll see in Response [4-6](#PC15).**Sustainable Fashion:
    How to Build an Eco-Friendly Wardrobe**Hey eco-friends!Welcome back to The Happy
    Planet! Today, we''re diving into the world of sustainable fashion. Building an
    eco-friendly wardrobe can seem daunting, but with a bit of knowledge and some
    strategic choices, you can make a positive impact on the environment while looking
    fabulous. Let''s explore how to shop sustainably, which brands to support, and
    which fast-fashion giants to avoid.*Sustainable Fashion Brands and Their Practices*When
    it comes to sustainable fashion, transparency and ethical practices are key. Here
    are some top brands leading the charge:1\. Patagonia: Known for its commitment
    to the environment, Patagonia uses sustainable materials like organic cotton and
    recycled wool. They also offer a repair program and buy back their own products
    to reduce waste.2\. Everlane: This brand focuses on radical transparency, eco-friendly
    materials, and ethical manufacturing processes. Everlane''s commitment to sustainability
    includes eliminating virgin plastic from their supply chain and working towards
    net-zero emissions.3\. tentree: For every item purchased, tentree plants ten trees,
    aiming for a billion by 2030\. Their products are made from eco-conscious fabrics
    like Tencel, hemp, and organic cotton.4\. Girlfriend Collective: Specializing
    in activewear, this brand uses recycled materials like fishing nets and water
    bottles. They also offer a recycling program for their products.5\. Reformation:
    Reformation combines stylish designs with sustainable practices. They use recycled
    and upcycled materials, are 100% carbon neutral, and invest in charitable programs.**Fast-Fashion
    Brands to Avoid**Fast fashion is notorious for its negative impact on the environment
    due to unsustainable practices and poor labor conditions. Here are a few brands
    to be cautious of:1\. Shein: Known for its extremely low prices, Shein has faced
    criticism for its lack of transparency and questionable labor practices.2\. Zara:
    Despite some efforts towards sustainability, Zara''s business model of rapid production
    and frequent new collections contributes significantly to fashion waste.3\. H&M:
    Although H&M has a Conscious Collection, the brand''s overall business model still
    relies heavily on high turnover and mass production, leading to significant environmental
    impacts.**Tips for Shopping Ethically and Sustainably**1\. Buy Less, Choose Well:
    Invest in high-quality pieces that you truly love and will wear for years. This
    reduces the need for frequent purchases and helps you build a timeless wardrobe.2\.
    Second-Hand Shopping: Thrift stores, consignment shops, and online platforms like
    Poshmark and Depop offer great sustainable options. Buying second-hand extends
    the life of clothing and reduces waste.3\. Look for Certifications: Certifications
    like GOTS (Global Organic Textile Standard), Fair Trade, and B Corp indicate that
    a brand adheres to high environmental and ethical standards.4\. Support Local
    and Small Businesses: Many local and small brands focus on sustainable practices
    and craftsmanship. Supporting them can reduce the carbon footprint associated
    with shipping and promote ethical labor practices.5\. Care for Your Clothes: Proper
    care can extend the life of your clothes. Wash less frequently, use cold water,
    and avoid tumble drying to reduce energy use and fabric wear.**Visual Break: Add
    Photos**- Sustainable Fashion Brands: Display images of popular sustainable fashion
    items from brands like Patagonia, Everlane, and Girlfriend Collective.- Fast-Fashion
    Brands to Avoid: Use a simple graphic to highlight brands like Shein, Zara, and
    H&M.- Shopping Tips: Include photos of second-hand shops, clothing with certification
    labels, and local boutiques.**Conclusion**Transitioning to a sustainable wardrobe
    is a journey, but every step counts. By supporting ethical brands, making mindful
    purchases, and caring for your clothes, you can significantly reduce your environmental
    footprint. Let''s continue to inspire each other towards a greener, more sustainable
    future. Feel free to share your sustainable fashion tips and favorite brands in
    the comments below!Stay green and keep shining!**Sources:**1\. 99 Sustainable
    Clothing Brands By Budget — https://www.thegoodtrade.com2\. Affordable Ethical
    and Sustainable Fashion Brands — https://www.sustainably-chic.com3\. 31 Best Sustainable
    Clothing Brands — https://www.rd.com4\. 26 Sustainable Clothing Brands Making
    Garments for Good — https://www.shopify.comResponse 4-6'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 向ChatGPT请求撰写一篇关于快时尚的博客文章，现在让我们看看ChatGPT如何处理这个任务，正如你在响应[4-6](#PC15)中看到的。**可持续时尚：如何打造环保衣橱**嘿，环保朋友们！欢迎回到《快乐星球》！今天，我们将深入探讨可持续时尚的世界。打造一个环保衣橱可能看起来令人畏惧，但只要有一点知识和一些战略性的选择，你就可以在保持迷人的同时，对环境产生积极的影响。让我们来看看如何可持续购物，支持哪些品牌，以及哪些快时尚巨头应该避免。*可持续时尚品牌及其实践*在可持续时尚领域，透明度和道德实践是关键。以下是一些引领潮流的顶级品牌：1\.
    Patagonia：以其对环境的承诺而闻名，Patagonia使用可持续材料，如有机棉和回收羊毛。他们还提供维修计划，并回购自己的产品以减少浪费。2\. Everlane：这个品牌专注于极端透明度、环保材料和道德制造流程。Everlane对可持续发展的承诺包括从其供应链中消除原生塑料，并致力于实现净零排放。3\.
    tentree：每售出一件商品，tentree就会种植十棵树，目标是到2030年达到十亿棵。他们的产品由环保面料如Tencel、亚麻和有机棉制成。4\. Girlfriend
    Collective：专注于运动服，这个品牌使用回收材料，如渔网和水瓶。他们还提供产品的回收计划。5\. Reformation：Reformation将时尚设计和可持续实践相结合。他们使用回收和翻新材料，实现100%碳中和，并投资于慈善项目。**应避免的快时尚品牌**快时尚因其不可持续的实践和恶劣的劳动条件而臭名昭著。以下是一些应谨慎对待的品牌：1\.
    Shein：以其极低的价格而闻名，Shein因缺乏透明度和可疑的劳动实践而受到批评。2\. Zara：尽管Zara在可持续发展方面做了一些努力，但其快速生产和频繁推出新系列的商业模式对时尚浪费的贡献很大。3\.
    H&M：尽管H&M有一个意识系列，但该品牌的整体商业模式仍然严重依赖高周转和大规模生产，导致重大的环境影响。**购物道德和可持续性的技巧**1\. 少买，精挑细选：投资于你真正喜欢并会穿很多年的高质量单品。这减少了频繁购买的需求，并帮助你打造一个永恒的衣橱。2\.
    二手购物：旧货店、寄售店以及像Poshmark和Depop这样的在线平台提供了很好的可持续选择。购买二手服装可以延长服装的使用寿命，并减少浪费。3\. 寻找认证：GOTS（全球有机纺织品标准）、公平贸易和B
    Corp等认证表明，品牌遵守高环境标准。4\. 支持当地和小型企业：许多当地和小型品牌专注于可持续实践和工艺。支持他们可以减少与运输相关的碳足迹，并促进道德劳动实践。5\.
    照顾你的衣服：适当的护理可以延长衣服的使用寿命。少洗，使用冷水，避免烘干以减少能源使用和面料磨损。**视觉休息：添加图片**- 可持续时尚品牌：展示来自Patagonia、Everlane和Girlfriend
    Collective等品牌的流行可持续时尚产品的图片。- 应避免的快时尚品牌：使用简单的图形突出Shein、Zara和H&M等品牌。- 购物技巧：包括二手店、带有认证标签的服装和当地精品店的图片。**结论**转向可持续衣橱是一个旅程，但每一步都很重要。通过支持道德品牌、做出明智的购买和照顾你的衣服，你可以显著减少你的环境足迹。让我们继续互相激励，朝着更绿色、更可持续的未来前进。请在下面的评论中分享你的可持续时尚技巧和最喜欢的品牌！保持绿色，继续闪耀！**来源：**1\.
    99个可持续服装品牌按预算——https://www.thegoodtrade.com2\. 经济实惠的道德和可持续时尚品牌——https://www.sustainably-chic.com3\.
    31个最佳可持续服装品牌——https://www.rd.com4\. 26个制造善行的可持续服装品牌——https://www.shopify.com响应4-6
- en: ChatGPT creates a great post on environmentally conscious shopping habits
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT创建了一篇关于环保购物习惯的精彩帖子
- en: Response [4-6](#PC15) shows ChatGPT creating a very thorough post that not only
    suits the tone of the blog but also provides links that allow us to back-check
    its sources. ChatGPT even provides input on where images could be placed on the
    blog post to make it a more engaging read.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 响应[4-6](#PC15)显示ChatGPT创建了一个非常详尽的帖子，不仅符合博客的语气，还提供了允许我们核实其来源的链接。ChatGPT甚至提供了关于在博客帖子中放置图片的建议，使其更具吸引力。
- en: Conclusion
  id: totrans-473
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This chapter covered how ChatGPT can be taught to create more usable content
    for a variety of circumstances. We saw how prompting ChatGPT without additional
    information than the request itself results in very dry responses and that the
    simple way to solve the problem is to train ChatGPT on the kind of content we
    want it to produce. We also saw how ChatGPT can make Internet searches to ensure
    its information is factual and recent.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了如何教会ChatGPT在各种情况下创建更多可用的内容。我们看到了仅通过请求本身而不提供额外信息来提示ChatGPT会导致非常枯燥的回应，而解决问题的简单方法是将ChatGPT训练成我们希望其产生的内容类型。我们还看到了ChatGPT如何进行网络搜索以确保其信息是事实性和最新的。
- en: In the next chapter, we’re going to carry on with what we’ve learned about training
    ChatGPT for tone and style as we use the Canvas feature to write side by side
    with ChatGPT for a thesis.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将继续学习如何训练ChatGPT以适应语气和风格，同时使用Canvas功能与ChatGPT并肩撰写论文。
