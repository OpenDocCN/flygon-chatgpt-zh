    ****ta**ke** ****ov**er** ****t**he** ****ta**sks** ****o**f** ****t**he** ****ave**rag**e
    ****J**oe**, ****busi**nesse**s ****a**re** ****bu**yin**g ****in**to** ****t**he**
    ****A**I** ****auto**matio**n ****revo**lutio**n ****fu**ll** ****thr**ottl**e.
    ****Bus**ines**s-****wi**se**, ****i**t** ****ju**st** ****ma**kes** ****se**nse**.
    ****A**nd** ****a**s** ****w**e**’****l**l** ****s**ee** ****i**n** ****t**he**
    ****cha**pter**s ****t**o** ****co**me**, ****i**t**’****s**** ****n**ot** ****ne**arl**y
    ****a**s** ****sc**ary** ****o**r** ****doo**msda**y-****es**que** ****a**s**
    ****t**he** ****fe**ar**-****mon**ger**s ****am**ong** ****u**s** ****wo**uld**
    ****ha**ve** ****y**ou** ****bel**iev**e. ****A**ll** ****i**t** ****ta**kes**
    ****i**s** ****lea**rnin**g ****h**ow** ****t**o** ****u**se** ****i**t** ****corr**ectl**y.'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 当许多公众成员对我们将如何让AI接管普通乔的任务感到担忧时，企业正全速进入AI自动化革命。从商业角度来看，这仅仅是有意义的。正如我们将在接下来的章节中看到的那样，它并不像那些恐惧者所认为的那样可怕或末日般的。所有这一切都需要的是学习如何正确使用它。
- en: '****A**** ****Cr**ash** ****Co**urs**e ****In**to** ****Mac**hin**e ****Lea**rnin**g'
  id: totrans-320
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**《机器学习入门》**'
- en: '****T**he** ****be**st** ****w**ay** ****t**o** ****th**ink** ****ab**out**
    ****mac**hin**e ****lea**rnin**g ****i**s**: ****A**s** ****t**he** ****me**ans**
    ****b**y** ****wh**ich** ****arti**ficia**l ****inte**lligen**ce ****le**arn**s
    ****t**o** ****d**o** ****mo**re** ****comp**licate**d ****ta**sks**, ****bec**ome**s
    ****mo**re** ****acc**urat**e ****a**t** ****perf**ormin**g ****i**ts** ****prog**ramme**d
    ****func**tion**s, ****a**nd** ****so**lve**s ****pro**blem**s ****th**at** ****wi**ll**
    ****he**lp** ****ma**ke** ****hu**man** ****li**fe** ****sim**ple**r. ****A**ll**
    ****wit**hou**t ****i**ts** ****cre**ato**r (****a**ka** ****t**he** ****prog**ramme**r)
    ****ha**vin**g ****t**o** ****ove**rse**e ****ev**ery** ****as**pec**t ****o**f**
    ****i**ts** ****impr**ovemen**t ****li**ke** ****a**** ****heli**copte**r ****pa**ren**t.
    ****Spe**akin**g ****o**f** ****par**ent**s, ****t**he** ****pe**rso**n ****w**ho**
    ****fi**rst** ****co**ine**d ****t**he** ****te**rm** “****mac**hin**e ****lea**rnin**g”
    ****w**as** ****prof**esso**r ****Eme**ritu**s ****Ar**thu**r ****Sa**mue**l,
    ****t**he** ****arti**ficia**l ****inte**lligen**ce ****a**nd** ****com**pute**r
    ****ga**min**g ****pio**nee**r ****w**ho** ****pr**ove**d ****th**at** ****mac**hine**s
    ****c**an** ****le**arn** ****fr**om** ****t**he** ****pa**st**. ****T**he** ****w**ay**
    ****th**at** ****Sa**mue**l ****demo**nstrat**ed ****th**at** ****mac**hine**s
    ****c**an** ****le**arn** ****w**as** ****thr**oug**h ****t**he** ****ga**me**
    ****o**f** ****che**cker**s.'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: '**最佳思考机器学习的方式是**：随着人工智能通过学习执行更复杂的任务，其执行预编程功能的准确性越来越高，并解决有助于使人类生活更简单的问题，人工智能的学习方式也随之发展。所有这一切，都不需要其创造者（即程序员）像直升机父母一样监督其每一个改进的方面。说到父母，首先将“机器学习”这一术语结合在一起的人是荣誉退休教授阿瑟·萨缪尔，他是人工智能和计算机博弈的先驱，他证明了机器可以从过去学习。萨缪尔展示机器可以学习的方式是通过棋类游戏。'
- en: '****I**n** ****19**56**, ****h**e** ****cre**ate**d ****a**** ****com**pute**r
    ****pro**gra**m ****th**at** ****co**uld** ****pl**ay** ****che**cker**s ****t**o**
    ****r**un** ****o**n** ****t**he** ****I**BM** ****7**01**. ****H**e** ****w**as**
    ****un**der** ****t**he** ****impr**essio**n ****th**at** ****fe**llo**w ****com**pute**r
    ****scie**ntis**t ****a**nd** “****fa**the**r ****o**f** ****t**he** ****info**rmatio**n
    ****th**eor**y” ****Cl**aud**e ****Sha**nno**n, ****h**ad** ****bu**ilt** ****a****
    ****sim**ila**r ****st**yle** ****pro**gra**m, ****b**ut** ****f**or** ****ch**ess**.
    ****Wh**en** ****Sa**mue**l ****m**et** ****Sha**nno**n ****a**** ****f**ew**
    ****ye**ars** ****la**ter**, ****how**eve**r, ****h**e** ****disc**overe**d ****th**at**
    ****Sha**nno**n ****h**ad** ****on**ly** ****desc**ribe**d ****t**he** ****poss**ibilit**y
    ****o**f** ****ma**kin**g ****su**ch** ****a**** ****pro**gra**m ****f**or** ****ch**ess**
    ****i**n** ****a**n** ****art**icl**e ****publ**ishe**d ****i**n** ****Scie**ntifi**c
    ****Ame**rica**n. ****A**nd** ****s**o** ****i**t** ****w**as**, ****th**at**
    ****Ar**thu**r ****Sa**mue**l ****be**cam**e ****t**he** ****acci**dental**ly
    ****o**n**-****pur**pos**e ****inv**ento**r ****o**f** ****t**he** ****fi**eld**
    ****o**f** ****mac**hin**e ****lea**rnin**g, ****a**nd** ****che**cker**s ****t**he**
    ****ga**me**, ****n**ot** ****ch**ess** (****alt**houg**h ****t**he** ****ch**ess**
    ****ver**sio**n ****o**f** ****Sa**mue**l’****s**** ****Che**cker**s ****pro**gra**m
    ****w**as** ****so**on** ****i**n** ****t**he** ****ma**kin**g).'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 在1956年，他创建了一个能够运行在IBM 701计算机上的国际象棋程序。他当时有一种印象，认为 fellow computer scientist 和“信息论之父”Claude
    Shannon已经构建了一个类似风格的程序，但却是用于国际象棋。然而，当Samuel几年后遇到Shannon时，他发现Shannon仅仅在《科学美国人》杂志上发表的一篇文章中描述了制作这样一个国际象棋程序的可能性。因此，Arthur
    Samuel成为了机器学习领域的意外且无意中的发明者，以及国际象棋游戏，而不是国际象棋（尽管Samuel的Checkers程序的国际象棋版本很快就在制作中）。
- en: '****Th**en**, ****i**n** ****19**62**, ****t**he** ****se**lf**-****proc**laime**d
    ****che**cker**s ****cha**mpio**n ****Ro**ber**t ****Ne**ale**y ****s**at** ****do**wn**
    ****a**t** ****a**n** ****I**BM** ****70**94** ****com**pute**r ****a**nd** ****chal**lenge**d
    ****Ar**thu**r ****Sa**mue**l’****s**** ****Che**cker**s ****pro**gra**m ****t**o**
    ****a**** ****ma**tch**. ****T**he** ****com**pute**r ****w**on**. ****Wh**ile**
    ****Sa**mue**l’****s**** ****mac**hin**e ****lea**rnin**g ****A**I** ****di**dn**’****t****
    ****w**in** ****ev**ery** ****ga**me** ****th**at** ****i**t** ****pl**aye**d,
    ****espe**ciall**y ****n**ot** ****a**t** ****t**he** ****begi**nnin**g, ****i**t**
    ****d**id** ****le**arn** ****fr**om** ****ev**ery** ****ga**me**.'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在1962年，自称的国际象棋冠军Robert Nealey坐在一台IBM 704计算机前，挑战Arthur Samuel的Checkers程序进行对弈。计算机获胜。虽然Samuel的机器学习AI并没有赢得它所玩过的每一场比赛，尤其是在开始时，但它确实从每一场比赛中学习。
- en: '****T**he** ****B**ig** ****Sh**ift** ****i**n** ****Mac**hin**e ****Lea**rnin**g'
  id: totrans-324
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 机器学习的大转变
- en: '****Wi**th** ****t**he** ****Tu**rin**g ****Te**st** “****succ**esse**s” ****o**f**
    ****t**he** ****ea**rly** ****cha**tbot**s ****EL**IZA** ****a**nd** ****PA**RRY**,
    ****a**nd** ****t**he** ****vic**tor**y ****o**f** ****Ar**thu**r ****Sa**mue**l’****s****
    ****Che**cker**s ****pro**gra**m ****ov**er** ****a**** ****m**an** ****w**ho**
    ****ca**lle**d ****him**sel**f ****cha**mpio**n, ****arti**ficia**l ****inte**lligen**ce
    ****a**nd** ****i**ts** ****expo**nentia**l ****appl**icatio**ns ****be**gan**
    ****t**o** ****bu**zz** ****ar**oun**d ****t**he** ****wo**rld**. ****Th**ere**
    ****we**re** ****ma**ny** ****ot**her** ****A**I** ****suc**ces**s ****sto**rie**s
    ****i**n** ****t**he** ****19**70s** ****a**nd** ****19**80s**, ****b**ut** ****t**he**
    ****ne**xt** ****re**al** ****b**ig** ****pu**sh** ****i**n** ****t**he** ****wo**rld**
    ****o**f** ****arti**ficia**l ****inte**lligen**ce ****ca**me** ****i**n** ****t**he**
    ****19**90s**. ****A**nd** ****i**t** ****a**ll** ****h**ad** ****t**o** ****d**o**
    ****wi**th** ****t**he** ****adva**ncemen**t ****o**f** ****mac**hin**e ****lea**rnin**g.'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: '**随着** **图灵测试** **“成功”** **的早期聊天机器人** **ELIZA** **和** **PARRY** **，以及** **阿瑟·萨缪尔**
    **的** **Checker** **程序** **战胜** **一位自称为** **冠军** **的** **人类** **，人工智能** **及其**
    **指数级** **应用** **开始** **在世界范围内** **引起轰动**。 **当时** **有许多** **其他** **人工智能** **成功**
    **故事** **发生在** **1970年代** **和** **1980年代**，**但** **人工智能** **在** **1990年代** **对**
    **世界** **的人工智能** **领域** **产生的** **真正** **重大** **推动** **来自于** **机器学习** **的** **发展**。'
- en: '****I**n** ****19**89**, ****mac**hin**e ****lea**rnin**g ****le**ft** ****univ**ersit**y
    ****li**fe** ****a**nd** ****g**ot** ****it**sel**f ****a**** ****j**ob** ****a**s**
    ****i**t** ****be**cam**e ****o**ne** ****o**f** ****t**he** ****co**re** ****algo**rithm**s
    ****i**n** ****t**he** ****fi**rst** ****per**sona**l ****com**pute**r (****P**C**).
    ****T**he** ****commerc**ializati**on ****o**f** ****mac**hin**e ****lea**rnin**g
    ****w**as** ****do**ne** ****b**y** ****Axc**eli**s ****I**nc**. ****i**n** ****i**ts**
    ****Evo**lve**r  ****sof**twar**e ****pac**kag**e, ****wh**ich** ****p**ut** ****so**me**
    ****mo**ney** ****num**ber**s ****t**o** ****t**he** ****u**se** ****o**f** ****i**ts**
    ****gen**eti**c ****algo**rithm**s ****o**n** ****t**he** ****ne**wly** ****rel**ease**d
    ****per**sona**l ****comp**uter**s (****t**he** ****fi**rst** ****o**f** ****wh**ich**
    ****w**as** ****rel**ease**d ****i**n** ****19**71**).'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: '**在** **1989年**，**机器学习** **离开了** **学术界** **并** **找到了** **自己的** **工作** **，**
    **因为它** **成为了** **第一台** **个人** **计算机** **（** **PC** **）** **的核心算法** **之一**。 **机器学习**
    **的商业化** **是由** **Axelis** **Inc**。 **在其** **Evolver** **软件** **包** **中** **完成的**，**该**
    **软件** **将** **一些** **金钱** **数字** **与** **其** **遗传算法** **应用于** **新发布的** **个人**
    **计算机** **（** **其中** **第一台** **是在** **1971年** **发布的** **）。'
- en: '****Wi**th** ****t**he** ****mas**siv**e ****suc**ces**s ****o**f** ****t**he**
    ****P**C**, ****exci**temen**t ****ar**oun**d ****mac**hin**e ****lea**rnin**g
    ****a**nd** ****i**ts** ****capa**biliti**es ****gr**ew** ****fr**om** ****t**he**
    ****wo**rld** ****o**f** ****aca**demi**a ****t**o** ****t**he** ****wo**rld**
    ****o**f** ****bus**ines**s. ****I**t** ****di**dn**’****t**** ****le**ave** ****t**he**
    ****wo**rld** ****o**f** ****acad**emic**s, ****obvi**ousl**y, ****a**s** ****i**t**
    ****al**so** ****cont**inue**d ****t**o** ****flo**uris**h ****a**t** ****univ**ersiti**es;
    ****b**ut** ****mac**hin**e ****lea**rnin**g ****n**ow** ****h**ad** ****ext**erna**l
    ****fun**din**g, ****a**nd** ****t**he** ****poc**ket**s ****o**f** ****th**ose**
    ****ext**erna**l ****fun**der**s ****we**re** ****de**ep** ****a**nd** ****plen**tifu**l.
    ****I**n** ****19**97**, ****t**he** ****wo**rld** ****cha**mpio**n ****o**f**
    ****ch**ess** ****lo**st** ****n**ot** ****t**o** ****a**** ****spe**cifi**c ****com**pute**r
    ****scie**ntis**t’****s**** ****pro**gra**m, ****b**ut** ****t**o** ****I**BM**
    (****Inter**nation**al ****Bus**ines**s ****Mac**hin**e)’****s**** ****De**ep**
    ****Bl**ue**.'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: '**随着** **P**C**的** **巨大成功**，**对** **机器学习** **及其** **能力** **的** **兴奋** **情绪**
    **从** **学术界** **蔓延** **到** **商业界**。**它** **显然** **没有** **离开** **学术界**，**因为它**
    **也** **继续** **在** **大学** **中** **繁荣**；**但** **机器学习** **现在** **有了** **外部** **资金**，**而这些**
    **外部** **资助者** **的钱包** **既** **深** **又** **多**。**在** **1997** **年**，**国际象棋** **世界冠军**
    **并非** **输给了** **某个** **特定的** **计算机科学家** **的程序**，**而是** **输给了** **IBM** **（**
    **国际** **商业** **机器** **）**的** **深蓝**。'
- en: '****Ano**the**r ****b**ig** ****sh**ift** ****f**or** ****mac**hin**e ****lea**rnin**g
    ****ca**me** ****i**n** ****t**he** ‘****9**0s** ****a**s** ****mac**hin**e ****lea**rnin**g
    ****shi**fte**d ****fr**om** ****know**ledg**e ****t**o** ****da**ta** ****dr**ive**n.
    ****Th**is** ****w**as** ****ma**inl**y ****d**ue** ****t**o** ****t**he** ****ma**ss**
    ****vol**ume**s ****o**f** ****info**rmatio**n ****th**at** ****h**ad** ****be**en**
    ****coll**ecte**d ****b**y** ****th**is** ****st**age**. ****T**he** ****diff**erenc**e
    ****bet**wee**n ****a**** ****know**ledg**e-****ba**sed** ****sy**ste**m ****a**nd**
    ****a**** ****da**ta**-****ba**sed** ****sy**ste**m ****i**s** ****qu**ite** ****la**rge**.
    ****F**or** ****o**ne** ****th**ing**, ****wh**ere** ****know**ledg**e ****ba**ses**
    ****a**re** ****us**ed** ****t**o** ****ma**ke** ****ext**erna**l ****reso**urce**s,
    ****sh**are** ****info**rmatio**n, ****a**nd** ****sup**por**t ****t**he** ****dec**isio**n-****ma**kin**g
    ****pro**ces**s, ****data**base**s ****a**re** ****us**ed** ****t**o** ****st**ore**
    ****a**nd** ****org**aniz**e ****da**ta** ****inte**rnall**y ****s**o** ****th**at**
    ****i**t** ****c**an** ****b**e** ****retr**ieve**d ****wi**th** ****ea**se**,
    ****i**f** ****a**nd** ****wh**en** ****t**he** ****algo**rith**m (****n**ot**
    ****t**he** ****hu**man**) ****req**uire**s ****i**t** ****t**o** ****ma**ke**
    ****a**** ****mo**re** ****inf**orme**d ****dec**isio**n. ****I**n** ****ot**her**
    ****wo**rds**, ****th**is** ****b**ig** ****sh**ift** ****i**n** ****mac**hin**e
    ****lea**rnin**g ****ca**me** ****ab**out** ****a**s** ****w**e** ****tru**ste**d
    ****A**I** ****t**o** ****ta**ke** ****ca**re** ****o**f** ****mo**re** ****a**nd**
    ****mo**re** ****o**f** ****t**he** ****pro**ble**m-****sol**vin**g ****pro**ces**s.'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: '**机器学习** **的** **另一个** **重大** **转变** **发生在** **90年代**，**因为** **机器学习** **从**
    **知识** **驱动** **转向** **数据** **驱动**。**这** **主要** **是由于** **这一阶段** **收集** **了大量**
    **信息**。**基于** **知识** **的系统** **与** **基于** **数据** **的系统** **之间的** **差异** **相当**
    **大**。**首先**，**知识** **库** **用于** **创建** **外部** **资源**，**共享** **信息**，**并** **支持**
    **决策** **过程**，**而** **数据库** **用于** **内部** **存储** **和组织** **数据** **，** **以便** **可以**
    **轻松** **检索**，**如果** **算法** **（** **而不是** **人类** **）** **需要** **它** **来** **做出**
    **更** **明智** **的** **决策**。**换句话说**，**机器学习** **的** **这一重大** **转变** **发生在** **我们**
    **开始** **信任** **AI** **来** **处理** **更多** **和** **更多** **的** **问题** **解决** **过程**。'
- en: '****Mac**hin**e ****Lea**rnin**g ****i**n** ****t**he** ****Ea**rly** ****21**st**
    ****Cen**tur**y'
  id: totrans-329
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**21世纪初的机器学习**'
- en: '****Spe**edin**g ****u**p** ****o**ur** ****whir**lwin**d ****his**tor**y ****thr**oug**h
    ****t**he** ****evol**utio**n ****o**f** ****mac**hin**e ****lea**rnin**g ****a****
    ****de**cad**e ****o**r** ****s**o**, ****o**ur** ****ne**xt** ****b**ig** ****impr**ovemen**t
    ****co**mes** ****i**n** ****20**12** ****wi**th** ****t**he** ****cre**atio**n
    ****o**f** ****Go**ogl**e ****Br**ain**. ****A**** ****de**ep** ****ne**ura**l
    ****net**wor**k, ****Go**ogl**e ****Br**ain** ****gre**atl**y ****adv**ance**d
    ****A**I**’****s**** ****abi**lit**y ****t**o** ****reco**gniz**e ****pat**tern**s,
    ****all**owin**g ****i**t** ****t**o** ****inte**rpre**t ****mo**re** ****a**nd**
    ****mo**re** ****com**ple**x ****im**age**s ****a**nd** ****vi**deo**s. ****Th**is**
    ****algo**rith**m ****wo**uld** ****b**e** ****p**ut** ****t**o** ****wo**rk**
    ****i**n** ****dete**ctin**g ****obj**ect**s ****a**nd** ****reco**gnizin**g ****pat**tern**s
    ****i**n** ****You**Tub**e ****vi**deo**s, ****ens**urin**g ****a**s** ****li**ttl**e
    ****ill**ega**l ****o**r** ****ind**ecen**t ****mat**eria**l ****a**s** ****pos**sibl**e
    ****fo**und** ****i**ts** ****w**ay** ****on**to** ****t**he** ****pla**tfor**m.
    ****T**he** ****pat**ter**n ****reco**gnitio**n ****adva**ncemen**ts ****o**f**
    ****A**I** ****cont**inue**d ****a**s** ****Fac**eboo**k ****p**ut** ****i**ts**
    ****o**wn** ****mac**hin**e ****lea**rnin**g ****algo**rith**m, ****De**ep** ****Fa**ce**,
    ****t**o** ****wo**rk** ****o**n** ****reco**gnisin**g ****pe**opl**e’****s****
    ****fa**ces** ****i**n** ****pic**ture**s, ****all**owin**g ****f**or** ****ea**sy**
    ****tag**gin**g ****o**f** ****fri**end**s ****i**n** ****ph**oto**s. ****Rel**ease**d
    ****i**n** ****20**14**, ****De**ep** ****Fa**ce** ****w**as** ****ano**the**r
    ****groun**dbreaki**ng ****deve**lopmen**t ****i**n** ****mac**hin**e ****lea**rnin**g.
    ****B**y** ****th**is** ****st**age**, ****A**I** ****h**ad** ****lea**rne**d
    ****t**o** ****reco**gniz**e ****pe**opl**e ****ju**st** ****a**s** ****accu**ratel**y
    ****a**s** ****hu**man**s ****d**o**.'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: '**加速**我们的螺旋历史，通过机器学习的演变，一个或几个十年，我们的下一个重大改进在2012年随着**谷歌大脑**的创建而来。一个深度神经网络，谷歌大脑极大地提升了AI识别模式的能力，使其能够解释更多和更复杂的图像和视频。这个算法将被用于在YouTube视频中检测对象和识别模式，确保尽可能少的非法或不当材料能够进入平台。AI在模式识别方面的进步继续，随着Facebook推出了它自己的机器学习算法，**深度人脸**，用于在照片中识别人们的面孔，从而允许轻松地为照片中的朋友贴标签。2014年发布的**深度人脸**是机器学习领域的另一个突破性发展。到这一阶段，AI已经学会了像人类一样准确地识别人们。 '
- en: '****Al**so** ****rel**ease**d ****i**n** ****20**14** ****w**as** ****a****
    ****pro**gra**m ****ca**lle**d ****Alp**haG**o ****b**y** ****De**ep** ****Mi**nd**.
    ****Cre**ate**d ****t**o** ****pl**ay** ****G**o**, ****lar**gel**y ****cons**idere**d
    ****t**he** ****mo**st** ****comp**licate**d ****ga**me** ****w**e** ****hu**man**s
    ****ha**ve** ****man**age**d ****t**o** ****de**sig**n, ****Alp**haG**o ****man**age**d
    ****t**he** ****sa**me** ****re**sul**t ****a**s** ****i**ts** ****pred**ecesso**rs
    ****d**id** ****wi**th** ****ch**ess** ****a**nd** ****che**cker**s: ****I**t**
    ****def**eate**d ****a**** ****hu**man** ****w**ho** ****cons**idere**d ****them**selve**s
    ****a**** ****cha**mpio**n. ****Th**en**, ****i**n** ****20**15**, ****a**** ****com**pan**y
    ****ca**lle**d ****Op**enA**I ****ent**ere**d ****t**he** ****sc**ene** ****wh**ose**
    ****so**le** ****pur**pos**e ****w**as** ****t**o** ****cr**eat**e “****sa**fe**
    ****a**nd** ****fri**endl**y ****A**I** ****th**at** ****co**uld** ****ben**efi**t
    ****hum**anit**y.” ****Fr**om** ****th**is** ****d**ay** ****o**n**, ****arti**ficia**l
    ****inte**lligen**ce ****a**nd** ****mac**hin**e ****lea**rnin**g ****be**cam**e
    ****main**strea**m.'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: '**也**在2014年发布了一个名为AlphaGo的**程序**，由DeepMind创建。**旨在**玩围棋，通常认为围棋是**人类**设计出的最复杂的**游戏**，AlphaGo达到了与它的前辈相同的**结果**：它击败了一个自认为自己是**冠军**的人类。然后，在2015年，一家名为OpenAI的公司**进入**了**场景**，其**唯一**的**目的**是**创造**“**安全**和**友好**的人工智能”，**能够**为**人类**带来**益处”。**从**那天**起，**人工**智能和**机器**学习**成为**主流**。'
- en: '****Dec**odin**g ****t**he** ****Ja**rgo**n:'
  id: totrans-332
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**解码**术语：'
- en: '****A**I** ****Charac**teristi**cs'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: '**人工智能**特征'
- en: '****Wi**th** ****A**I** ****go**ing** ****main**strea**m, ****w**e** ****n**ow**
    ****re**ach** ****t**he** ****mo**der**n ****d**ay** ****o**f** ****inte**lligen**t
    ****mac**hine**s ****a**nd** ****sof**twar**e ****pro**gram**s ****th**at** ****ha**ve**
    ****n**o** ****is**sue** ****what**soeve**r ****i**n** ****pas**sin**g ****t**he**
    ****Tu**rin**g ****Te**st**. ****Thr**oug**h ****arti**ficia**l ****inte**lligen**ce
    ****a**nd** ****cha**tbot**s, ****w**e**’****r**e** ****cre**atin**g ****appl**icatio**ns
    ****th**at** ****c**an** ****accu**ratel**y ****repl**icat**e ****t**he** ****w**ay**
    ****t**he** ****hu**man** ****br**ain** ****wo**rks**. ****Th**is** ****me**ans**
    ****th**at** ****A**I** ****n**ow** ****h**as** ****t**he** ****sa**me** ****pro**ble**m-****sol**vin**g,
    ****ratio**nalizi**ng, ****reas**onin**g, ****pla**nnin**g, ****perc**eivin**g,
    ****a**nd** ****o**f** ****co**urs**e, ****dec**isio**n-****ma**kin**g ****capa**biliti**es
    ****o**f** ****t**he** ****ave**rag**e ****pe**rso**n. ****I**n** ****fa**ct**,
    ****I****’****d**** ****wa**ger** ****a**** ****l**ot** ****be**tte**r. ****T**he**
    ****abi**lit**y ****o**f** ****A**I** ****t**o** ****outp**erfor**m ****hu**man**s
    ****i**s** ****n**o** ****lo**nge**r ****ne**ws**; ****i**t**’****s**** ****his**tor**y.
    ****A**nd**, ****wi**th** ****t**he** ****gro**win**g ****am**oun**t ****o**f**
    ****pe**opl**e ****rese**archin**g ****wa**ys** ****t**o** ****ma**ke** ****A**I**
    ****sma**rte**r ****a**nd** ****mo**re** ****lif**elik**e, ****a**nd** ****mo**re**
    ****mo**ney** ****co**min**g ****i**n** ****fr**om** ****t**he** ****pri**vat**e
    ****se**cto**r, ****t**he** ****fi**eld** ****o**f** ****mac**hin**e ****lea**rnin**g
    ****h**as** ****skyr**ockete**d. ****T**he** ****ro**bot** ****bus**ines**s ****i**s**
    ****boo**min**g, ****s**o** ****ma**ke** ****su**re** ****y**ou** ****g**et**
    ****i**n** ****o**n** ****t**he** ****go**ld** ****ru**sh** ****a**nd** ****ar**en**’****t****
    ****le**ft** ****be**hin**d ****i**n** ****t**he** ****du**st**.'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: '**随着人工智能的普及，我们现在已经达到了智能机器和软件程序的时代，它们在通过图灵测试时没有任何问题。通过人工智能和聊天机器人，我们正在创造能够准确复制人类大脑工作方式的应用程序。这意味着人工智能现在具有与普通人相同的问题解决、理性化、推理、规划、感知和当然，决策能力。事实上，我甚至愿意打更大的赌。人工智能超越人类的能力不再是新闻；这是历史。而且，随着越来越多的人研究使人工智能更智能和更逼真的方法，以及来自私营部门的更多资金投入，机器学习领域已经飞速发展。机器人业务正在蓬勃发展，所以请确保你抓住这个黄金机遇，不要在尘埃中落后。**  '
- en: '****Wh**at** ****A**I** ****I**s**'
  id: totrans-335
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**人工智能是什么**'
- en: '****Wi**th** ****t**he** ****his**tor**y ****o**f** ****A**I** ****a**nd**
    ****mac**hin**e ****lea**rnin**g ****cov**ere**d ****fr**om** ****t**he** ****St**one**
    ****A**ge** ****t**o** ****t**he** ****mo**der**n ****d**ay**, ****i**t**’****s****
    ****n**ow** ****ti**me** ****t**o** ****co**ver** ****i**ts** ****ma**in** ****charac**teristi**cs.
    ****W**e** ****n**ow** ****kn**ow** ****h**ow** ****A**I** ****w**as** ****inv**ente**d,
    ****b**ut** ****wh**at** ****exa**ctl**y ****i**s** ****i**t** ****ma**de** ****u**p**
    ****o**f**? ****L**et**’****s**** ****g**et** ****un**der** ****t**he** ****ho**od**
    ****a**nd** ****le**arn** ****ab**out** ****t**he** ****ma**in** ****comp**onent**s
    ****o**f** ****arti**ficia**l ****inte**lligen**ce.'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: '**随着人工智能和机器学习的历史从石器时代到现代的覆盖，现在是时候来探讨它的主要特征了。我们现在知道人工智能是如何被发明的，但它究竟是由什么组成的？让我们揭开神秘的面纱，了解人工智能的主要组成部分。'
- en: '****Fea**tur**e ****Engi**neerin**g'
  id: totrans-337
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**特征工程**'
- en: '****T**he** ****fi**rst** ****chara**cterist**ic ****o**f** ****arti**ficia**l
    ****inte**lligen**ce ****i**s** ****fea**tur**e ****engi**neerin**g. ****Al**so**
    ****ca**lle**d ****fea**tur**e ****extr**actio**n, ****th**is** ****i**s** ****t**he**
    ****pro**ces**s ****b**y** ****wh**ich** ****A**I** ****si**fts** ****thr**oug**h
    ****la**rge** ****amo**unt**s ****o**f** ****da**ta** ****a**nd** ****ext**ract**s
    ****fea**ture**s (****co**mmo**n ****tr**end**s ****i**n** ****t**he** ****dat**ase**t).
    ****Fea**tur**e ****extr**actio**n ****al**low**s ****da**ta** ****t**o** ****b**e**
    ****clas**sifie**d ****a**nd** ****cate**gorize**d, ****bri**ngin**g ****or**der**
    ****t**o** ****t**he** ****dat**ase**t ****a**nd** ****all**owin**g ****ea**sy**
    ****ana**lysi**s. ****I**t** ****al**so** ****al**low**s ****y**ou** (****o**r**
    ****t**he** ****pro**gra**m ****it**sel**f) ****t**o** ****ea**sil**y ****iso**lat**e
    ****a**** ****part**icula**r ****tr**end** ****o**r** ****fea**tur**e. ****Th**is**
    ****w**as** ****piv**ota**l ****t**o** ****t**he** ****ma**ss** ****adva**ncemen**t
    ****o**f** ****mac**hin**e ****lea**rnin**g.'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的第一个特征是**特征工程**。也称为特征提取，这是人工智能通过大量数据和提取特征（数据集中的常见趋势）来区分的过程。特征提取允许数据被分类和归类，为数据集带来秩序，并允许轻松分析。它还允许你（或程序本身）轻松隔离特定的趋势或特征。这一点对于机器学习的重大进步至关重要。
- en: '****Arti**ficia**l ****Ne**ura**l ****Net**work**s'
  id: totrans-339
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**人工神经网络**'
- en: '****Arti**ficia**l ****ne**ura**l ****net**work**s (****AN**Ns**) ****mi**ght**
    ****so**und** ****li**ke** ****a**** ****mou**thfu**l ****o**f** ****a**** ****ph**ras**e,
    ****b**ut** ****th**ey**’****r**e** ****act**uall**y ****qu**ite** ****si**mpl**e.
    ****O**ur** ****br**ain**s, ****f**or** ****exa**mpl**e, ****a**re** ****ne**ura**l
    ****net**work**s. ****S**o**, ****ano**the**r ****w**ay** ****t**o** ****th**ink**
    ****o**f** ****arti**ficia**l ****ne**ura**l ****net**work**s ****i**s** ****a**s**
    ****a**** ****ro**bot** ****br**ain**. ****T**he** ****abi**lit**y ****t**o**
    ****cr**eat**e ****arti**ficia**l ****ne**ura**l ****net**work**s ****ar**ose**
    ****dir**ectl**y ****o**ut** ****o**f** ****adva**ncemen**ts ****i**n** ****mac**hin**e
    ****lea**rnin**g. ****I**n** ****fa**ct**, ****i**t**’****s**** ****cons**idere**d
    ****a**** ****br**anc**h ****o**f** ****mac**hin**e ****lea**rnin**g ****a**nd**
    ****i**s** ****a**t** ****t**he** ****co**re** ****o**f** ****t**he** ****de**ep**
    ****lea**rnin**g ****algo**rithm**s ****th**at** ****w**e**’****l**l** ****g**o**
    ****ov**er** ****ne**xt**. ****Ano**the**r ****na**me** ****f**or** ****AN**Ns**
    ****i**s** ****SN**Ns** (****simu**late**d ****ne**ura**l ****net**work**s), ****bec**aus**e
    ****t**he** ****insp**iratio**n ****f**or** ****stru**cturin**g ****a**nd** ****desi**gnin**g
    ****th**ese** ****arti**ficia**l ****net**work**s ****ca**me**, ****sur**pris**e
    ****sur**pris**e, ****fr**om** ****cop**yin**g ****t**he** ****w**ay** ****th**at**
    ****neu**ron**s ****se**nd** ****sig**nal**s ****t**o** ****o**ne** ****ano**the**r
    ****i**n** ****t**he** ****biol**ogica**l ****ne**ura**l ****net**wor**k: ****t**he**
    ****hu**man** ****br**ain**.'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: '**人工神经网络（ANNs**）可能听起来像是一个短语的大嘴巴，但实际上它们相当简单。例如，我们的大脑就是神经网络。因此，另一种思考人工神经网络的方式是将它们视为机器人大脑。创建人工神经网络的能力直接源于机器学习的进步。事实上，它被认为是机器学习的一个分支，并且是深度学习算法的核心，我们将在下一节中介绍。ANNs的另一个名称是**SNNs**（模拟神经网络），因为构建和设计这些人工神经网络的结构和设计灵感意外地来自于模仿生物神经网络中神经元发送信号的方式：人脑。'
- en: '****Th**ese** ****ne**ura**l ****net**work**s ****a**re** ****depe**nden**t
    ****o**n** ****t**he** ****qua**ntit**y ****a**nd** ****qua**lit**y ****o**f**
    ****t**he** ****tra**inin**g ****da**ta** ****y**ou** ****gi**ve** ****i**t**.
    ****Th**is** ****i**s** ****bec**aus**e ****th**ey** ****a**re** ****ba**sed**
    ****o**n** ****mac**hin**e ****lea**rnin**g ****algo**rithm**s ****a**nd** ****req**uir**e
    ****simu**lation**s (****fr**om** ****t**he** ****dat**ase**t ****a**nd** ****fr**om**
    ****expe**rienti**al ****tra**inin**g) ****t**o** ****imp**rov**e ****th**eir**
    ****acc**urac**y ****ov**er** ****ti**me**. ****On**ce** ****th**ese** ****algo**rithm**s
    ****ha**ve** ****a**ll** ****t**he** ****da**ta** ****th**ey** ****ne**ed** ****a**nd**
    ****ha**ve** ****fi**ne**-****tu**ned** ****th**eir** ****acc**urac**y, ****th**ey**
    ****dev**elo**p ****ju**st** ****li**ke** ****o**ur** ****o**wn** ****ne**ura**l
    ****pat**hway**s ****gr**ow** ****t**he** ****mo**re** ****w**e** ****d**o** ****some**thin**g.'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: '**这些神经网络依赖于你提供给它们的训练数据的数量和质量**。这是因为它们基于机器学习算法，并且需要从数据集和经验训练中进行模拟（以提高它们的准确性）。一旦这些算法拥有了它们所需的所有数据并且已经精细调整了它们的准确性，它们就会像我们自己的神经通路一样，随着我们做的越多而增长。'
- en: '****De**ep** ****Lea**rnin**g'
  id: totrans-342
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**深度学习**'
- en: '****A**s** ****arti**ficia**l ****ne**ura**l ****net**work**s ****deve**lope**d,
    ****th**ey** ****be**cam**e ****mo**re** ****a**nd** ****mo**re** ****comp**licate**d.
    ****Ve**ry** ****so**on**, ****th**ey** ****surp**asse**d ****t**he** ****capa**biliti**es
    ****o**f** ****wh**at** ****t**he** ****be**st** ****hu**man** ****i**s** ****cap**abl**e
    ****o**f**, ****a**nd** ****cont**inue**d ****o**n**. ****La**yer** ****af**ter**
    ****la**yer**, ****AN**Ns** ****cont**inue**d ****t**o** ****gr**ow** ****un**til**
    ****th**ey** ****fo**rme**d ****wh**at** ****w**e** ****ca**ll** ****a**** ****de**ep**
    ****lea**rnin**g ****net**wor**k. ****De**ep** ****lea**rnin**g ****i**s** ****t**he**
    ****la**tes**t ****buz**zwor**d ****i**n** ****A**I** ****cir**cle**s, ****a**nd**
    ****i**s** ****t**he** ****algo**rith**m ****be**hin**d ****t**he** ****driv**erles**s
    ****ca**rs** ****be**ing** ****deve**lope**d ****a**t** ****t**he** ****mo**men**t,
    ****a**s** ****we**ll** ****a**s** ****Cha**tGP**T. ****Wh**ile** ****mac**hin**e
    ****lea**rnin**g ****req**uire**s ****a**** ****hu**man** ****t**o** ****in**put**
    ****t**he** ****fea**ture**s ****a**nd** ****up**loa**d ****t**he** ****da**ta**
    ****f**or** ****t**he** ****algo**rith**m ****t**o** ****cla**ssif**y, ****de**ep**
    ****lea**rnin**g ****do**es** ****n**ot**.'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工神经网络的发展，它们变得越来越复杂。很快，它们就超越了人类所能达到的能力，并且还在继续。层叠一层又一层，ANNs持续增长，直到它们形成了我们称之为深度学习网络的形态。深度学习是人工智能领域最新的热门话题，也是目前开发自动驾驶汽车以及ChatGPT背后的算法。虽然机器学习需要人类输入特征和为算法分类上传数据，但深度学习则不需要。
- en: '****Nat**ura**l ****Lan**guag**e ****Proc**essin**g'
  id: totrans-344
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**自然语言处理**'
- en: '****I**n** ****or**der** ****f**or** ****mac**hine**s ****t**o** “****ch**at**”
    ****t**o** ****u**s**, ****th**ey** ****ne**ed** ****t**o** ****u**se** ****wo**rds**
    ****th**at** ****w**e** ****a**re** ****fam**ilia**r ****wi**th**. ****I**n**
    ****ot**her** ****wo**rds**, ****A**I** ****h**as** ****t**o** ****b**e** ****ab**le**
    ****t**o** ****pro**ces**s ****nat**ura**l, ****eve**ryda**y ****lan**guag**e
    ****n**ot** ****on**ly** ****o**n** ****t**he** ****in**put** (****comp**utin**g
    ****info**rmatio**n), ****b**ut** ****al**so** ****o**n** ****t**he** ****ou**tpu**t
    (****tel**lin**g ****u**s** ****ab**out** ****th**at** ****info**rmatio**n). ****Wh**en**
    ****A**I** ****to**ok** ****i**n** ****info**rmatio**n ****i**n** ****t**he**
    ****pa**st**, ****i**t** ****w**as** ****usu**all**y ****i**n** ****t**he** ****fo**rm**
    ****o**f** ****num**ber**s. ****A**s** ****w**e** ****s**aw** ****ear**lie**r
    ****o**n** ****i**n** ****th**is** ****cha**pte**r, ****a**ll** ****o**f** ****t**he**
    ****ea**rly** ****compu**tation**al ****dev**ice**s ****we**re** ****ma**de**
    ****t**o** ****he**lp** ****u**s** ****ke**ep** ****tr**ack** ****o**f** ****num**ber**s,
    ****so**lve** ****math**ematic**al ****equa**tion**s, ****a**nd** ****iso**lat**e
    ****tr**end**s ****i**n** ****dat**aset**s. ****Now**aday**s ****th**oug**h, ****comp**uter**s
    ****d**o** ****a**** ****wh**ole** ****l**ot** ****mo**re** ****th**an** ****ju**st**
    ****cr**unc**h ****num**ber**s. ****Thr**oug**h ****mac**hin**e ****lea**rnin**g,
