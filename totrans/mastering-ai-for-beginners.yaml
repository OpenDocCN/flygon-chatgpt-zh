- en: 'Pg 13: Can AI Be Trusted? Understanding Ethics & Safety in AI'
  id: totrans-250
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第13页：AI 能被信任吗？理解 AI 的伦理与安全
- en: Artificial Intelligence is powerful — but with great power comes great responsibility.
    Before you dive deeper into AI, it's important to understand AI ethics , bias
    , and safety .
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能很强大——但权力越大，责任越大。在深入探索 AI 之前，了解 AI 伦理、偏见和安全非常重要。
- en: ⚖ ️ What Is AI Ethics?
  id: totrans-252
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ⚖️ 什么是 AI 伦理？
- en: AI ethics is a set of rules or guidelines to make sure AI behaves in ways that
    are fair, safe, and beneficial to humans.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: AI 伦理是一套规则或指南，确保 AI 以公平、安全且对人类有益的方式行事。
- en: '? ? Risks You Should Know'
  id: totrans-254
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '? ? 你应该知道的风险'
- en: 'Bias : AI learns from data — and if the data has racism, sexism, or stereotypes,
    the AI might repeat them.'
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 偏见：AI 从数据中学习——如果数据中有种族主义、性别歧视或刻板印象，AI 可能会重复它们。
- en: 'Misinformation : AI can make things up (“AI hallucinations”). It may sound
    confident — but be wrong!'
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误信息：AI 可以编造东西（“AI 幻觉”）。它可能听起来很有信心——但可能是错的！
- en: 'Privacy : AI tools can remember what you type. Be careful with personal or
    sensitive information.'
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐私：AI 工具可以记住你输入的内容。小心处理个人信息或敏感信息。
- en: 'Dependency : Relying on AI for everything can make you lose critical thinking
    skills.'
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 依赖性：完全依赖 AI 可能会使你失去批判性思维能力。
- en: '? ? How to Use AI Safely'
  id: totrans-259
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '? ? 如何安全使用 AI'
- en: Always fact-check what AI says. Use trusted sources.
  id: totrans-260
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 总是核实 AI 说的内容。使用可信的来源。
- en: Don’t share your full name, address, passwords, or photos with AI.
  id: totrans-261
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不要与 AI 分享你的全名、地址、密码或照片。
- en: Use AI as a helper , not a decision-maker. You are still the boss.
  id: totrans-262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 AI 作为助手，而不是决策者。你仍然是老板。
- en: Respect others’ data, ideas, and content. Don’t steal or plagiarize with AI.
  id: totrans-263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尊重他人的数据、想法和内容。不要用 AI 盗窃或剽窃。
