- en: Preface
  id: totrans-178
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: Education, as a fundamental pillar of our society, has evolved fascinatingly
    throughout the centuries. From basic methods of the past to today’s immersive
    technologies, teaching has constantly adapted to meet the challenges of each era.
    In recent years, the rapid evolution of AI and the widespread adoption of digitalization
    techniques have revolutionized teaching methods. This transformation has brought
    forth a diverse array of online resources and educational platforms, granting
    students unprecedented access to a wealth of learning materials tailored to their
    individual needs and interests.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 教育，作为我们社会的基本支柱，在几个世纪中经历了迷人的演变。从过去的基本方法到今天的沉浸式技术，教学不断适应以应对每个时代的挑战。近年来，人工智能的快速发展和数字化技术的广泛应用已经彻底改变了教学方法。这种变革带来了各种在线资源和教育平台，使学生能够以前所未有的方式访问量身定制的学习材料，满足他们的个人需求和兴趣。
- en: As AI technologies continue to advance, the emergence of large language models
    (LLMs) like the ChatGPT tool is profoundly reshaping education. This tool provides
    personalized support, improves accessibility, and introduces innovative methods
    for students and educators to engage with information and learning materials.
    Furthermore, ChatGPT facilitates a wide range of language learning services, including
    language instruction, speech recognition, pronunciation feedback, and immersive
    virtual simulations for hands-on learning experiences.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能技术的持续进步，大型语言模型（LLMs）如ChatGPT工具的出现，正在深刻地重塑教育。这个工具提供了个性化的支持，提高了可访问性，并为学生和教育工作者提供了与信息和学习材料互动的创新方法。此外，ChatGPT还促进了各种语言学习服务，包括语言教学、语音识别、发音反馈以及沉浸式虚拟模拟，以提供动手学习体验。
- en: This book explores the transformative potential of the ChatGPT tool within education,
    shedding light on the opportunities that arise through the integration of the
    ChatGPT tool into various aspects of the learning process. It serves as a platform
    for the community to share cutting-edge research ideas concerning the use of the
    ChatGPT tool in digital education. Readers will discover how the ChatGPT tool
    can enhance student engagement, foster personalized learning experiences, facilitate
    intelligent tutoring systems, support virtual classroom interactions, and revolutionize
    assessment and feedback mechanisms.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 本书探讨了ChatGPT工具在教育中的变革潜力，揭示了将ChatGPT工具融入学习过程各个方面的机遇。它为社区提供了一个分享关于在数字教育中使用ChatGPT工具的尖端研究想法的平台。读者将发现ChatGPT工具如何增强学生参与度，培养个性化的学习体验，促进智能辅导系统，支持虚拟课堂互动，并革新评估和反馈机制。
- en: Furthermore, this book elucidates the systematic integration of ChatGPT and
    other generative AI techniques into educational practices, offering readers a
    clear understanding of how these technologies can be employed to address challenges
    and enhance learning outcomes in digital education, while also emphasizing the
    importance of ethical considerations in the use of generative AI in educational
    settings.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，本书阐述了将ChatGPT和其他生成式AI技术系统地整合到教育实践中的方法，为读者提供了对这些技术如何被用于解决数字教育中的挑战并提高学习成果的清晰理解，同时强调了在教育环境中使用生成式AI时伦理考量的重要性。
- en: This book comprises a total of 18 chapters organized into four main sections.
    The first section delves into the theoretical and applied aspects of utilizing
    ChatGPT and other generative AI techniques in education. The second section focuses
    on the application of generative AI for personalized learning and adaptive systems,
    showcasing research on its effectiveness in various educational contexts. The
    third section explores the role of ChatGPT as virtual teaching assistants, highlighting
    their potential to enhance academic guidance and foster active learning. Finally,
    the last section provides ethical considerations and presents case studies that
    examine the impact of generative AI in education.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 本书共包含18章，分为四个主要部分。第一部分深入探讨了在教育中利用ChatGPT和其他生成式AI技术的理论与应用方面。第二部分专注于生成式AI在个性化学习和自适应系统中的应用，展示了其在各种教育环境中的有效性研究。第三部分探讨了ChatGPT作为虚拟教学助手的作用，突出了它们在增强学术指导和促进主动学习方面的潜力。最后，最后一部分提供了伦理考量，并展示了研究生成式AI在教育中影响的案例研究。
- en: 1Navigating the Academic Landscape with ChatGPTA Comprehensive Exploration of
    Usage and Engagement among Undergraduates, Graduates, and Faculty Members at the
    University of Kansas
  id: totrans-184
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1使用ChatGPT导航学术领域——堪萨斯大学本科生、研究生和教师使用和参与情况的全面探索
- en: Luke Parker, Alice Karakas, Steven White, and Doug Ward
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: Luke Parker, Alice Karakas, Steven White, 和 Doug Ward
- en: 'DOI: [10.1201/9781032716350-1](http://doi.org/10.1201/9781032716350-1)'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 'DOI: [10.1201/9781032716350-1](http://doi.org/10.1201/9781032716350-1)'
- en: 1.1 Introduction
  id: totrans-187
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.1 引言
- en: In the rapidly evolving landscape of artificial intelligence (AI), language
    models like ChatGPT are becoming transformative educational tools ([Gill et al.,
    2024](#ch09.xhtml#r006)). As ChatGPT itself proclaims, “ChatGPT is a powerful
    language model that has the potential to revolutionize the way we interact with
    and utilize artificial intelligence in our daily lives” (ChatGPT, personal communication,
    October 5, 2023).
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能（AI）快速发展的领域中，像ChatGPT这样的语言模型正成为变革性的教育工具 ([Gill et al., 2024](#ch09.xhtml#r006))。正如ChatGPT本身所宣称的，“ChatGPT是一个强大的语言模型，它有可能彻底改变我们与人工智能互动以及在我们日常生活中利用人工智能的方式”（ChatGPT，个人交流，2023年10月5日）。
- en: This sentiment is further echoed by [Parker et al. (2024a)](#ch09.xhtml#r010)
    who note that since its public release in 2023, ChatGPT has sent ripples of excitement
    and fear throughout the internet and halls of higher education (p. 1). Professors
    and higher education students have questioned the use and engagement with ChatGPT.
    On one side, some students and faculty have embraced the technological future,
    using AI for various activities—from completing class assignments to planning
    spring break trips and even deciphering traffic signs ([Rahiman & Kodikal, 2024](#ch09.xhtml#r013)).
    For these users, it is hard to remember life just a year ago when AI was not a
    daily fixture. Conversely, some professors and students view AI with apprehension.
    For them, the rapid advancements in technology are a source of anxiety, evoking
    dystopian scenarios akin to the *Terminator* movies. As a memorable quote from
    the movie *Terminator Genisys* states, “Primates evolve over millions of years.
    I evolve in seconds. And I am here. In exactly four minutes, I will be everywhere”
    ([Taylor, 2015](#ch09.xhtml#r014)). This sentiment could easily apply to the rapid,
    almost overnight, advancements in publicly accessible large language models and
    AI.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 这种观点得到了[Parker等人（2024a）](#ch09.xhtml#r010)的进一步呼应，他们指出，自从2023年公开发布以来，ChatGPT在互联网和高等教育机构中引起了兴奋和恐惧的涟漪（第1页）。教授和高等教育学生开始质疑ChatGPT的使用和参与。一方面，一些学生和教师拥抱了技术未来，用AI完成各种活动——从完成课堂作业到规划春假旅行，甚至解读交通标志([Rahiman
    & Kodikal, 2024](#ch09.xhtml#r013))。对于这些用户来说，很难回忆起一年前AI还不是日常生活的一部分。相反，一些教授和学生带着担忧看待AI。对他们来说，技术的快速发展是焦虑的来源，唤起了类似于《终结者》电影的反乌托邦场景。正如电影《终结者2：审判日》中的一句著名台词所说，“灵长类动物经过数百万年的进化。我只需几秒钟就能进化。而且我就在这里。在四分钟内，我将无处不在”([Taylor,
    2015](#ch09.xhtml#r014))。这种情感很容易适用于公开可访问的大型语言模型和AI的快速、几乎一夜之间的进步。
- en: 'Despite the varying levels of enthusiasm and apprehension among students and
    faculty in higher education, there is a significant gap in our understanding of
    how ChatGPT is being adopted and utilized across different academic roles and
    disciplines. This chapter aims to address this gap by posing the following research
    questions:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管高等教育中的学生和教师对ChatGPT的接受程度和担忧程度各不相同，但我们对我们对ChatGPT在不同学术角色和学科中如何被采用和利用的理解存在重大差距。本章旨在通过提出以下研究问题来填补这一差距：
- en: How are ChatGPT and other AI technologies being integrated into the academic
    routines and responsibilities of undergraduate and graduate students and faculty
    at the University of Kansas?
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT和其他人工智能技术是如何被整合到堪萨斯大学本科生、研究生和教师的学术日常工作和责任中的？
- en: What are the perceived advantages and limitations of using ChatGPT for educational
    purposes among these different academic groups?
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这些不同的学术群体中，使用ChatGPT进行教育目的的感知优势和局限性是什么？
- en: How does ChatGPT and similar AI technologies are used vary between these groups,
    and what implications does this have for educational practices and policies?
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT和类似的人工智能技术在这些群体中的使用有何不同，这对教育实践和政策有何影响？
- en: 'This chapter embarks on an inquiry into integrating ChatGPT and other AI technologies
    within the daily routines and academic obligations of members at a midwestern
    university. Specifically, this investigation concentrates on the experiences of
    two undergraduate and two graduate students from the field of education alongside
    two faculty members of the same field. These individuals have been selected to
    represent a dual categorization: those who have engaged with ChatGPT following
    its widespread acceptance toward the end of 2022 and those who have recently begun
    to incorporate it into their routines amid its growing prevalence in educational
    contexts.'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 本章着手探讨将ChatGPT和其他人工智能技术整合到中西部一所大学成员的日常工作和学术义务中。具体来说，这项调查集中在教育领域的两名本科生和两名研究生以及该领域的两名教师身上。这些个人被选中代表双重分类：那些在2022年底ChatGPT被广泛接受后开始与之互动的人，以及那些在它在教育环境中日益普及的同时开始将其纳入日常习惯的人。
- en: The chapter is structured to examine the diverse manners in which these four
    students and two professors utilize ChatGPT and other AI tools. This exploration
    spans a broad spectrum of applications, from leveraging AI to enhance academic
    and everyday tasks to employing AI tools in research and work refinement, and
    further, to understanding AI’s role within the university’s broader academic and
    research ecosystem.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的结构旨在考察这四位学生和两位教授如何多样化地使用ChatGPT和其他人工智能工具。这一探索涵盖了广泛的应用范围，从利用人工智能来增强学术和日常任务到在研究和工作完善中应用人工智能工具，以及进一步理解人工智能在大学更广泛的学术和研究生态系统中的作用。
- en: Ultimately, the chapter seeks to construct a detailed portrayal of AI engagement
    across varying levels of the university’s community. By highlighting the experiences
    of undergraduate and graduate students with those of faculty members, it aims
    to illuminate the multifaceted nature of AI usage across different academic echelons
    and provide a nuanced perspective on the consequential implications of AI technology
    in higher education (see [Table 1.1](#ch09.xhtml#t1)).
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，本章旨在构建一个详细描绘大学社区不同层次中人工智能参与的图景。通过突出本科生和研究生与教师们的经历，它旨在阐明人工智能在不同学术层次上的多面性，并提供对高等教育中人工智能技术后果性影响的细致视角（见[表1.1](#ch09.xhtml#t1)）。
