  zh: '**ChatGPT** 的训练基于一个庞大的文本数据集，包括书籍、文章、网站和其他数字信息来源。在训练阶段，模型学习语言模式、语法结构、逻辑连贯性和广泛主题的一般知识。这个过程，被称为“无监督训练”，允许模型自动生成文本，无需直接的人类干预。信息通过数十亿个参数进行结构化，这些参数调整内部神经连接的权重，使模型能够学习单词或短语相对于先前内容的概率。'
