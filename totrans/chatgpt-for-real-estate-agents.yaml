- en: 'Chapter 1: ChatGPT 101: Not a Pokémon'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章：ChatGPT 101：不是宝可梦
- en: 'Let’s get this straight: ChatGPT isn’t a wizard, a robot, or your cousin’s
    weird crypto friend. It’s an AI language model created by OpenAI, which basically
    means it’s a digital word wizard trained on more text than your average bookworm
    has seen in ten lifetimes.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们明确一点：ChatGPT不是一个巫师、一个机器人，也不是你表哥那个奇怪的加密货币朋友。它是由OpenAI创建的人工智能语言模型，这意味着它是一个数字化的文字巫师，训练的文本比普通书虫在十生中看到的还要多。
- en: Think of ChatGPT as a super-smart parrot crossed with your favorite copywriter—except
    it never needs coffee breaks. It can write emails, ads, texts, blogs, scripts,
    social posts, jokes, and more. Just tell it what you want, and poof! Words appear.
    Like magic, but nerdier.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 把ChatGPT想象成一个超级聪明的鹦鹉和你的最喜欢的文案撰写者的结合——除了它不需要咖啡休息。它可以写电子邮件、广告、短信、博客、剧本、社交媒体帖子、笑话等等。你只需要告诉它你想要什么，然后嗖！文字就会出现。就像魔法一样，但更酷。
- en: “But isn’t AI going to take our jobs?” Nah. ChatGPT isn’t here to replace real
    estate agents—it’s here to replace the *busy work* that sucks the life out of
    real estate agents. You know, the parts that make you want to throw your phone
    into a lake.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: “但AI不是要抢我们的饭碗吗？”不。ChatGPT不是来取代房地产经纪人的——它是来取代那些让房地产经纪人感到疲惫的*忙碌工作*。你知道，那些让你想扔手机进湖里的部分。
- en: You’ll still do the networking, the handshakes, the showings, the contracts—but
    ChatGPT will handle the heavy lifting when it comes to communication. It’s like
    having a co-pilot who doesn’t talk over you.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 你仍然会做网络社交、握手、看房、签订合同——但ChatGPT会在沟通方面承担重担。它就像有一个不会打断你的副驾驶。
- en: 'And no, you don’t need to “code.” You just need to talk to it like you would
    an assistant. Start with: “Hey ChatGPT, write me a listing description for a three-bedroom
    bungalow that smells like fresh cookies.” Watch what happens.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 而且不，你不需要“编码”。你只需要像对待助理一样与之交谈。从：“嘿ChatGPT，给我写一份描述三卧室小屋的房源描述，它闻起来像新鲜饼干。”看看会发生什么。
- en: Let’s dive deeper, shall we?
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨，好吗？
- en: 'Chapter 2: Your New 24/7 Assistant (That Doesn’t Eat Lunch)'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 第二章：你的新全天候助理（不吃午餐）
- en: Imagine having a personal assistant who works 24/7, never asks for PTO, and
    doesn’t judge your caffeine addiction. That’s ChatGPT. It’s like Siri went to
    grad school and now wants to help you close deals.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下拥有一个全天候工作、从不要求请假、不评判你咖啡因上瘾的个人助理。那就是ChatGPT。它就像Siri去读了研究生，现在想要帮助你促成交易。
- en: Need to write a property description at 2 a.m. because your client “just remembered”
    they need it? Done. Forgot to respond to that buyer who ghosted you for a week
    and suddenly texted “still interested”? ChatGPT’s got your back with a friendly
    follow-up that doesn’t sound desperate.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 需要在凌晨2点写一份房产描述，因为你的客户“突然想起”他们需要它？完成。忘记回复那个一周前消失然后突然发短信“还感兴趣”的买家？ChatGPT会为你提供一个友好但不过分急切的跟进，不会让你听起来很绝望。
- en: 'You can use it for:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以用它来做：
- en: Drafting replies to emails while you’re stuck in traffic (voice-to-text is your
    friend).
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在堵车时起草电子邮件回复（语音转文本是你的朋友）。
- en: Creating polished listing presentations while you microwave leftovers.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在微波炉加热剩菜的同时制作精炼的房源展示。
- en: Writing blog posts that don’t make you want to cry.
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写博客文章，不会让你想哭。
- en: One agent told me they use ChatGPT to brainstorm gift ideas for closing day.
    Another uses it to write birthday messages that sound heartfelt, not Hallmark-y.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 一位经纪人告诉我，他们使用ChatGPT来为成交日构思礼物想法。另一位则用它来撰写听起来真诚而不是像Hallmark卡片一样的生日祝福。
- en: It’s your virtual Swiss Army knife—just without the corkscrew.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 它是你的虚拟瑞士军刀——只是没有开瓶器。
- en: '* * *'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 3: The Art of Asking: Prompts That Actually Work'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 第三章：提问的艺术：真正有效的提示
- en: 'Here’s the deal: ChatGPT is only as good as the question you ask. Garbage in,
    garbage out. Think of prompts like ordering at a restaurant—if you just say “food,”
    you might get cold oatmeal.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 事情是这样的：ChatGPT的效果取决于你提出的问题。垃圾输入，垃圾输出。把提示想象成在餐厅点菜——如果你只说“食物”，你可能会得到冷的燕麦粥。
- en: 'Instead, be specific: “Write a fun, engaging listing description for a 4-bed,
    2-bath modern farmhouse with a wraparound porch, targeting first-time buyers in
    their 30s.” Boom.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，要具体一点：“写一份有趣、吸引人的房源描述，针对30岁左右的首次购房者，描述一个有环绕阳台的4卧室2浴室的现代农舍。”砰！
- en: Want a Facebook post? Ask for it. Need it in a certain tone—witty, professional,
    casual-but-chic? Say so. Want bullet points? Emojis? Hashtags? Tell it. ChatGPT
    isn’t a mind reader (yet).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 想要一条Facebook帖子？请提出来。需要某种特定的语气——机智、专业、休闲但时尚？说出来。想要项目符号、表情符号、标签？告诉它。ChatGPT还不是一个读心者（至少还不是）。
- en: 'PRO TIP: Start your prompts with “Act as…” For example:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: PRO TIP：用“扮演……”开始你的提示。例如：
- en: “Act as a real estate copywriter and write a listing description…”
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “扮演一名房地产文案撰写者，写一份房源描述……”
- en: “Act as a social media strategist and create a week of Instagram captions…”
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “扮演社交媒体策略师，创建一周的Instagram文案……”
- en: Give it context. Give it personality. Give it a high five. The better your prompt,
    the better the magic.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 给它背景。给它个性。给它一个击掌。你的提示越好，魔法就越好。
- en: '* * *'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 4: Open Houses? More Like Open Dialogues'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 第四章：开放日？更像是开放对话
- en: Open houses are still a thing (thanks, HGTV), but let’s make them less awkward
    and more awesome—with ChatGPT.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 开放日仍然存在（感谢HGTV），但让我们让它们不那么尴尬，更加精彩——借助ChatGPT。
- en: 'Before the open house, use ChatGPT to:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在开放日之前，使用ChatGPT：
- en: Create an event invite email that doesn’t sound like a tax seminar.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一封听起来不像税务研讨会的活动邀请电子邮件。
- en: Write a punchy Facebook event description.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写一个有力的Facebook活动描述。
- en: Whip up a flyer in Canva using text it helped you write.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用它帮助你在Canva上制作传单。
- en: During the event? Ask it to help you script talking points or a mini-tour speech.
    You’ll sound polished without sounding robotic.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在活动期间？让它帮助你编写谈话要点或简短导览演讲。你听起来既专业又不会显得机械。
- en: 'After the event, don’t ghost your guests. ChatGPT can generate follow-up emails
    like:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 活动结束后，不要让你的客人感到被冷落。ChatGPT可以生成跟进电子邮件，例如：
- en: “Hey Sarah! Thanks for stopping by 123 Main St. yesterday—hope you enjoyed the
    fresh cookies and the view! Let me know if you have any questions, or if you want
    to see it again.”
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: “嗨，莎拉！感谢你昨天来到123 Main St.——希望你喜欢新鲜饼干和风景！如果你有任何问题，或者想要再次看它，请告诉我。”
- en: Less stress. More connection. More cookies.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 更少的压力。更多的联系。更多的饼干。
- en: '* * *'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 5: Write Listings That Sell Themselves (Almost)'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 第五章：写出能自我销售的房源（几乎）
- en: 'Writing listing descriptions shouldn’t feel like writing a college essay. Enter
    ChatGPT: your personal listing poet.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 编写房源描述不应该感觉像是在写大学论文。来吧，ChatGPT：你的个人房源诗人。
- en: Tell it what the house has, who it’s perfect for, and the vibe. That’s it.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 告诉它房子有什么，适合谁，以及氛围。就这样。
- en: 'Example: “Write a listing for a 3-bed, 2-bath ranch with a fenced yard and
    updated kitchen. Great for a young family. Make it warm and inviting.”'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“为带围栏院子和更新厨房的3卧室2浴室农舍写一个房源描述。非常适合年轻家庭。让它变得温暖和吸引人。”
- en: 'ChatGPT’s output:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的输出：
- en: “Welcome to your cozy new nest! This 3-bedroom, 2-bath ranch combines charm
    and function with a modern kitchen perfect for pancake Sundays. Enjoy a fully
    fenced backyard—ideal for kids, pups, or epic summer BBQs. Located in a friendly
    neighborhood with parks and coffee shops just around the corner. Your happy place
    awaits.”
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: “欢迎来到你舒适的新家！这个3卧室2浴室的农舍结合了魅力和功能，现代厨房适合星期天的煎饼日。享受一个完全围栏的后院——非常适合孩子、宠物或史诗般的夏日烧烤。位于一个友好的社区，公园和咖啡馆就在拐角处。你的快乐之地在等待。”
- en: Want something fancier? Ask it to be more luxurious. Need a version for the
    MLS and another for Instagram? Just ask.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 想要更奢华一些？让它变得更加豪华。需要为MLS和Instagram准备版本？只需提出要求。
- en: You don’t need to be Shakespeare. You just need to know what you want. ChatGPT
    will take it from there.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要是莎士比亚。你只需要知道你想要什么。ChatGPT会从那里开始。
- en: 'Chapter 6: Social Media Posts That Don’t Suck'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 第六章：不糟糕的社交媒体帖子
- en: Let’s face it—some real estate posts are as exciting as a soggy cracker. “New
    listing! Check it out!” isn’t exactly scroll-stopping content.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们面对现实——一些房地产帖子就像湿漉漉的饼干一样无聊。“新上市！来看看！”这并不是能阻止人们滚动的内容。
- en: Enter ChatGPT, your new social media wingman.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 进入ChatGPT，你的新社交媒体伙伴。
- en: Want clever Instagram captions? Snappy TikToks? Facebook posts that make people
    actually *engage* ? Ask ChatGPT to create posts that fit your brand voice. Need
    humor? Professional polish? Motivational Monday vibes? Just say so.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 想要巧妙的Instagram文案？简洁的TikTok？让人们真正*参与*的Facebook帖子？让ChatGPT创建符合你品牌声音的帖子。需要幽默？专业润色？激励性的周一氛围？只需说出来。
- en: 'Example:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Prompt: “Write a funny Instagram caption for a just-listed 2-bed condo downtown
    with a skyline view.” ChatGPT: “Your future dinner parties just got 100% more
    skyline. Bonus: you don’t have to mow anything. #CityVibes #JustListed”'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '提示：“为市中心新上市的2卧室公寓写一个有趣的Instagram文案。” ChatGPT：“你的未来晚宴将增加100%的城市天际线。额外奖励：你不需要修剪任何东西。#城市风情
    #新上市”'
- en: Batch a week’s worth of posts in one sitting, then schedule them. It’s like
    having a content creator on speed dial—minus the invoices.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 一次性批量制作一周的帖子，然后安排发布。这就像拥有一个内容创作者的电话簿——没有账单。
- en: '* * *'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 7: Emails That Get Opened (And Replied To!)'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 第七章：那些被打开并回复的电子邮件！
- en: If your emails sound like cardboard, they’re getting trashed faster than expired
    yogurt. ChatGPT can help you write emails people actually *want* to read.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的电子邮件听起来像纸板，它们被删除的速度比过期酸奶还快。ChatGPT可以帮助你写人们真正*想读*的电子邮件。
- en: 'Try prompts like:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试以下提示：
- en: “Write a friendly follow-up email for a buyer who toured a property last week.”
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为上周参观房产的买家写一封友好的跟进电子邮件。”
- en: “Write an intro email for new leads from an open house.”
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为看房后的新潜在客户写一封介绍邮件。”
- en: Want different tones? Ask for ‘friendly,’ ‘luxury,’ ‘no-nonsense,’ or even ‘punny’
    (yes, that’s a thing).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 想要不同的语气？请要求“友好”、“奢华”、“不啰嗦”或者甚至“俏皮”（是的，这确实是一件事）。
- en: 'Example:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “Hey Mike! Just wanted to check in after your tour of 456 Oak Lane. Did anything
    stand out—or are we still house hunting? I’ve got a few more options that might
    be your style. Let’s chat!”
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: “嘿，Mike！只是想在你参观456 Oak Lane后打个招呼。有什么突出的地方吗——我们还在寻找房子吗？我还有一些可能适合你的选项。让我们聊聊！”
- en: 'Pro Tip: Have ChatGPT write subject lines, too. Ask for 5 options and A/B test
    them. Boom. Inbox magic.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 高级技巧：让ChatGPT也写主题行。要求5个选项并A/B测试它们。砰！邮箱魔法。
- en: '* * *'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 8: Text Messages That Convert (Without Being Creepy)'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 第8章：转化短信（而不显得令人讨厌）
- en: Texting leads can be awkward. Too short, and you sound like a bot. Too long,
    and you’re that person with the green bubble novella.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 短信潜在客户可能会显得尴尬。太短，你会听起来像机器人。太长，你就是那个写绿色泡泡小说的人。
- en: ChatGPT finds the Goldilocks zone.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT找到金发碧眼区。
- en: 'Prompt: “Write a friendly, casual text to a lead who inquired last week but
    hasn’t responded.” Output:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：为上周询问但未回复的潜在客户写一条友好、随意的短信。输出：
- en: “Hey Jordan! Just checking in—still house hunting or did you already find ‘the
    one’? Let me know if you want to see anything new this weekend!”
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: “嘿，Jordan！只是打个招呼——你还在寻找房子吗？或者你已经找到了‘那个’？如果你这周末想看任何新的房子，请告诉我！”
- en: 'Need texts for confirmations, reminders, or birthday wishes? Covered. Want
    to sound high-end? Try: “Craft a luxury tone message for a high-net-worth buyer
    inquiring about waterfront listings.”'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 需要用于确认、提醒或生日祝福的短信？当然。想要听起来高端？试试：“为询问海滨房源的高净值买家制作一个奢华语气的信息。”
- en: Short. Sweet. Not sweaty.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 简短。甜蜜。不汗湿。
- en: '* * *'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 9: Scripts for Cold Calls That Don’t Feel Like Ice Baths'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 第9章：感觉不像冰浴的冷电话脚本
- en: Cold calls. *Shudder.*
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 冷电话。*颤抖*。
- en: But what if you had a script that felt like a warm handshake instead of a telemarketing
    ambush?
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你有一个感觉像温暖握手而不是电话营销突袭的脚本呢？
- en: 'ChatGPT can help you craft:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助你制作：
- en: Cold openers that don’t feel… cold.
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不感觉冷的开场白。
- en: Friendly questions that build rapport.
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立关系的友好问题。
- en: Objection-handling lines that don’t make you sweat.
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理反对意见的台词，不会让你出汗。
- en: 'Example:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “Hey, this is Alex with DreamKey Realty—I saw you were checking out homes in
    Brookside. Just wanted to say hi and see if you had any questions or wanted a
    local’s take. No pressure!”
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: “嘿，我是Alex，来自DreamKey房地产公司——我看到你在Brookside查看房子。只是想打个招呼，看看你有什么问题或者想听听当地人的看法。没有压力！”
- en: 'You can even say: “Write me 3 variations of a cold call script for FSBO owners,
    casual tone.” Done. No scripts from 1998\. Just modern, human-sounding convos.'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 你甚至可以说：“为我写3个针对FSBO业主的冷电话脚本，语气轻松。” 完成。没有1998年的脚本。只有现代、听起来像人的对话。
- en: '* * *'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 10: Follow-Ups That Don’t Feel Like Nagging'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 第10章：感觉不像纠缠的跟进
- en: You know that awkward in-between stage where a lead hasn’t ghosted you, but
    also hasn’t replied in 6 days? ChatGPT to the rescue.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道那种尴尬的阶段吗？潜在客户没有消失，但也没有在6天内回复？ChatGPT来救命。
- en: Prompt it to write a follow-up that’s warm, helpful, and chill.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 提示它写一封温暖、有帮助、轻松的跟进邮件。
- en: 'Example:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “Hey Taylor! Just circling back on the condo we talked about last week—any thoughts?
    Still in the game or hitting pause for now? Either way, I’m here!”
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: “嘿，Taylor！只是想回顾一下我们上周讨论的公寓——有什么想法吗？还在游戏中，还是现在暂停？无论如何，我在这里！”
- en: 'Want a follow-up with a touch of humor? Add: “Make it light-hearted.” Want
    to nudge a hot lead? Add: “Include urgency but no pressure.”'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 想要带有幽默感的跟进？加上：“让它轻松愉快。”想要推动一个热门潜在客户？加上：“包含紧迫感但不要有压力。”
- en: 'Also amazing for:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 同样适用于：
- en: Post-tour follow-ups.
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 游览后跟进。
- en: After open house recaps.
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在看房回顾之后。
- en: Checking in after submitting offers.
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在提交报价后进行跟进。
- en: Follow-ups shouldn’t feel like pestering. With ChatGPT, they feel like good
    timing and good service.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 跟进不应该感觉像骚扰。有了ChatGPT，它们感觉像是恰到好处的时机和优质的服务。
- en: 'Chapter 11: CRM Magic: Making Data Work For You'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 第11章：CRM魔法：让数据为你工作
- en: 'CRMs are supposed to be helpful—but sometimes they feel like digital junk drawers.
    Good news: ChatGPT can turn CRM chaos into organized brilliance 💡.'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: CRM系统本应是有帮助的——但有时它们感觉像数字杂货箱。好消息：ChatGPT可以将CRM混乱转变为有组织的卓越 💡。
- en: Want to follow up with old leads? Have ChatGPT write personalized re-engagement
    messages. Need to tag contacts by interest or urgency? Ask it to help you create
    labels or templates.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 想要跟进老客户？让ChatGPT帮你写个性化的重新参与信息。需要根据兴趣或紧急程度标记联系人？请它帮你创建标签或模板。
- en: 'Example:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “Write a reactivation email for someone I haven’t talked to in 8 months who
    was previously interested in downsizing.”
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: “为我写一封给8个月前曾对缩小规模感兴趣的未联系过的人的重新激活邮件。”
- en: 'Boom:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 嘣：
- en: “Hey Sam! Hope you’re doing well. I was just thinking about our convo from last
    year—are you still considering a move to something smaller? I’ve seen a few new
    options that might be worth a peek 👀. Let me know if you're curious!”
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: “嘿，山姆！希望你一切都好。我刚刚在想我们去年那次谈话——你还在考虑搬到更小的房子吗？我看到了一些新的选择，可能值得一看 👀。如果你感兴趣，请告诉我！”
- en: No more staring at names in your CRM wondering what to say. ChatGPT gives you
    the words—and the confidence—to actually hit send.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 不要再盯着CRM中的名字发呆了，不知道该说什么。ChatGPT给你提供词汇——以及信心——让你真正发送邮件。
- en: '* * *'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 12: Market Reports That Make You Look Like a Genius'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 第12章：让你看起来像天才的市场报告
- en: You know those dry, stat-heavy market reports that make people’s eyes glaze
    over? Yeah. Let’s not do that anymore.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道那些干巴巴、数据繁多的市场报告，让人眼睛发花吗？是的。我们不要再那样做了。
- en: 'ChatGPT can translate “inventory is down 11% year-over-year” into:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以将“库存同比下降11%”翻译为：
- en: “Fewer homes on the market means more competition—and possibly higher prices.
    It’s a great time to sell if you’ve been on the fence. 🏡”
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: “市场上房屋数量减少意味着竞争加剧——并且可能价格更高。如果你一直在犹豫是否出售，现在是绝佳时机。🏡”
- en: 'Use prompts like:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下提示：
- en: “Summarize the latest market stats for [city] in a friendly tone.”
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “用友好的语调总结[城市]最新的市场统计数据。”
- en: “Write a short paragraph about low inventory and rising prices for a newsletter.”
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为时事通讯写一段关于低库存和价格上涨的短文。”
- en: 'Your clients will actually *read* your updates. And maybe even forward them
    to friends. Now who looks like the market expert? (Hint: you do 🎓)'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 你的客户实际上会*阅读*你的更新。也许甚至会转发给朋友。现在谁看起来像是市场专家？（提示：就是你 🎓）
- en: '* * *'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 13: The MLS Translator: Turn Jargon into Jazz'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 第13章：MLS翻译器：将术语转化为爵士乐
- en: 'Let’s play a game. Here’s a sentence from a typical MLS description:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们玩个游戏。这里是一个典型的MLS描述中的句子：
- en: “Spacious colonial w/ 2-car attached, EIK, HWFs, LL rec room, updates T/O.”
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: “宽敞的殖民地风格房屋，附带2车位车库，EIK，HWFs，LL娱乐室，更新至T/O。”
- en: Ugh. What is this—Morse code?
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 哎。这是什么——摩尔斯电码？
- en: 'ChatGPT can decode this for regular humans:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以为普通人解码：
- en: “This roomy colonial-style home includes a two-car garage, updated eat-in kitchen,
    beautiful hardwood floors, and a finished lower-level rec room.”
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: “这个宽敞的殖民地风格住宅包括一个双车位车库、更新的餐厅厨房、美丽的硬木地板，以及一个完工的地下室娱乐室。”
- en: 'Use prompts like:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下提示：
- en: “Rewrite this MLS description in plain English for a Facebook post.”
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “将这个MLS描述重写为适合Facebook帖子的普通英语。”
- en: “Make this MLS listing sound warm and inviting for first-time buyers.”
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “让这个MLS列表看起来对首次购房者温暖而吸引人。”
- en: You’ll sound smart, clear, and not like a real estate cyborg 🤖.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 你会听起来聪明、清晰，而且不像房地产机器人 🤖。
- en: '* * *'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 14: Neighborhood Guides in 60 Seconds or Less'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 第14章：60秒内完成的社区指南
- en: Want to sound like a local expert without writing a 10-page thesis? ChatGPT
    can help you create bite-sized neighborhood overviews that actually sparkle ✨.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 想要听起来像当地专家，又不想写10页的论文？ChatGPT可以帮助你创建真正闪亮的简短社区概述 ✨。
- en: 'Prompt it with:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 使用以下提示：
- en: “Write a short guide for the Capitol Hill neighborhood in DC. Mention parks,
    coffee shops, and walkability.”
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为华盛顿特区的Capitol Hill社区写一个简短的指南。提及公园、咖啡馆和步行便利性。”
- en: 'Output:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: “Capitol Hill is a charming, walkable neighborhood full of tree-lined streets,
    historic townhomes, and cozy coffee shops ☕. Take a stroll to Eastern Market for
    local eats or relax in Lincoln Park. Perfect for buyers who want city vibes with
    community charm.”
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: “Capitol Hill是一个迷人的、适合步行的社区，街道两旁种满了树木，有历史悠久的联排别墅和舒适的咖啡馆 ☕。去Eastern Market享受当地美食或在Lincoln
    Park放松。非常适合想要城市氛围和社区魅力的买家。”
- en: 'Use it for:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 用它来做：
- en: Blog intros
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 博客简介
- en: Relocation guides
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 搬迁指南
- en: Buyer emails
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 买家邮件
- en: Save time and sound brilliant. It’s a win-win.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 节省时间，听起来很聪明。这是一个双赢的局面。
- en: '* * *'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 15: Real Estate Jargon Explained to a Labrador 🐶'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 第15章：向拉布拉多解释房地产术语 🐶
- en: You know those clients who nod at every acronym but clearly have no idea what
    you just said? Yeah. Let’s fix that.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道那些对每个缩写词都点头但显然不知道你刚刚说了什么的客户吗？是的。让我们解决这个问题。
- en: 'Use ChatGPT to simplify the stuff we throw around like confetti:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT简化我们像撒纸屑一样随意处理的事情：
- en: “Explain ‘escrow’ like I’m five.”
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “像对我五岁孩子解释‘保证金’一样解释。”
- en: “Make a funny analogy for what an appraisal is.”
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为评估做一个有趣的类比。”
- en: 'Examples:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Escrow: “It’s like a piggy bank both the buyer and seller agree to use, and
    no one gets the money until everything is official.”'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 保证金： “它就像一个买家和卖家都同意使用的存钱罐，直到一切正式完成，没有人能拿到钱。”
- en: 'Appraisal: “It’s like hiring a referee to tell everyone what the house is really
    worth—so no one overpays or undersells.”'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 评估：“它就像雇佣一个裁判来告诉每个人房子真正值多少钱——这样就没有人付高价或卖低价。”
- en: You’ll build trust, reduce confusion, and maybe even make your clients laugh.
    Education = empowerment. And empowered clients? They close with confidence.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 你将建立信任，减少困惑，甚至可能让你的客户笑出声。教育 = 权力。而获得权力的客户？他们会自信地成交。
- en: 'Chapter 16: Blog Posts That Bring You Leads'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 第16章：带来潜在客户的博客文章
- en: Blogs aren’t dead—they’re just often boring 😴. But yours won’t be, thanks to
    ChatGPT.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 博客并没有死去——它们只是通常很无聊 😴。但你的博客不会，多亏了ChatGPT。
- en: 'Use it to brainstorm blog ideas like:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 使用它来激发博客想法，例如：
- en: “Top 5 Mistakes First-Time Buyers Make”
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “首次购房者常犯的五大错误”
- en: “What $500K Gets You in [Your City]”
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “[你的城市]你能用50万美元买到什么？”
- en: “The Ultimate Guide to Selling Your Home with Pets” 🐾
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “《带宠物出售房屋的终极指南》🐾”
- en: Then let ChatGPT write the whole thing… or just the intro. Ask for “engaging,”
    “SEO-friendly,” or “funny but informative.”
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 然后让ChatGPT写整个内容……或者只是开头。要求“引人入胜”、“SEO友好”或“有趣但信息丰富”。
- en: 'Example prompt:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: “Write a blog post intro for ‘Why Winter Is a Great Time to Buy a Home’ with
    a cozy tone.”
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: “为‘为什么冬天是购买房屋的好时机’写一篇温馨风格的博客开头。”
- en: 'Result:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: “While everyone else is sipping cocoa and binging Netflix, smart buyers are
    snagging winter deals ❄️. Here's why house hunting in fuzzy socks might just be
    your smartest move.”
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: “当其他人都在喝可可和狂热地看Netflix时，聪明的买家正在抓住冬天的交易 ❄️。这就是为什么穿毛茸茸的袜子寻找房子可能是你最明智的选择。”
- en: Boom. Instant content. No writer’s block required.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 嘭！即时内容。无需作家阻塞。
- en: '* * *'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 17: YouTube Scripts with Personality'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 第17章：具有个性的YouTube剧本
- en: Not sure what to say on camera? Let ChatGPT script it for you 🎥.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 拍摄视频时不知道该说什么？让ChatGPT为你编写剧本吧 🎥。
- en: Whether you’re doing home tours, Q&As, or “5 Tips for Buying a Fixer Upper,”
    just give ChatGPT a topic, desired tone, and audience.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是在做房屋游览、问答或“购买翻修房屋的5个技巧”，只需给ChatGPT一个主题、期望的语气和受众。
- en: 'Prompt example:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “Write a YouTube script for a 2-minute video on staging tips for sellers. Keep
    it light and energetic.”
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: “为2分钟的卖家布置技巧视频写一个YouTube剧本。让它轻松活泼。”
- en: 'Output:'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: “Hey friends! Today we’re diving into 5 super-simple staging tips that make
    your home Insta-ready 📸. From ditching the giant recliner to adding fresh flowers,
    these tricks can help buyers fall in love at first sight.”
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: “嘿，朋友们！今天我们要深入探讨5个超级简单的布置技巧，让你的房子瞬间准备好Instagram 📸。从丢弃大号摇椅到添加新鲜的花朵，这些技巧可以帮助买家一见钟情。”
- en: Add a quick ask to “like and subscribe,” and boom—video content done.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 快速要求“点赞和订阅”，然后嘭——视频内容完成。
- en: P.S. You can also ask for video descriptions and hashtag suggestions. Because
    SEO matters.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: P.S. 你也可以要求视频描述和标签建议。因为SEO很重要。
- en: '* * *'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 18: TikTok Scripts That Don’t Make You Cringe'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 第18章：不会让你感到尴尬的TikTok剧本
- en: You don’t have to dance (unless you want to 🕺). But TikTok *is* a great way
    to reach buyers and sellers, especially millennials and Gen Z.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必跳舞（除非你想 🕺）。但TikTok *确实是*接触买家和卖家的好方法，尤其是千禧一代和Z世代。
- en: Use ChatGPT to write short, punchy scripts that actually work.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT编写简短、有力的剧本，这些剧本实际上很有效。
- en: 'Prompt example:'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “Write a 15-second TikTok script explaining what an earnest money deposit is.
    Keep it fast, funny, and casual.”
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: “写一个15秒的TikTok剧本，解释诚意金存款是什么。让它快速、有趣、休闲。”
- en: 'Output:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: “Earnest money = the ‘I’m serious’ cash you put down when you make an offer
    💸. It’s not a tip. It’s your way of saying, ‘I’m not ghosting this house!’”
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: “诚意金 = 你在出价时支付的‘我是认真的’现金 💸。这不是小费。这是你表示‘我不会放弃这所房子’的方式！”
- en: Add a trending sound and a dash of charisma, and you’ve got a viral moment in
    the making.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 添加一个流行的声音和一点魅力，你就有了正在形成的病毒时刻。
- en: '* * *'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 19: Instagram Captions Worth Double-Tapping'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 第19章：值得双击的Instagram标题
- en: You know what makes your property posts stand out? Captions with *personality*
    💁‍♀️.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道什么让你的房产帖子脱颖而出吗？带有*个性* 💁‍♀️的标题。
- en: 'Instead of “New listing—great location!” (yawn), try:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 不要只是“新上市——好位置！”（无聊），试试：
- en: “Raise your hand if you love clawfoot tubs, exposed brick, and wine on the balcony
    🙋‍♀️🍷. This dreamy loft just hit the market!”
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: “举手如果你喜欢浴缸、裸露的砖墙和阳台上的酒 🙋‍♀️🍷。这个梦幻的阁楼刚刚上市！”
- en: 'ChatGPT can write captions that:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以写出以下这样的标题：
- en: Match your brand voice
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与你的品牌声音保持一致
- en: Use emojis and hashtags
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用表情符号和标签
- en: Include calls-to-action (“Tag someone who needs this kitchen!”)
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包含行动号召（“标记需要这个厨房的人！”）
- en: 'Prompt example:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “Write a playful IG caption for a mid-century modern listing with big windows
    and a pool.”
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: “为一个大窗户和游泳池的中世纪现代房产写一个有趣的Instagram标题。”
- en: 'Output:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: “Sunlight, style, and splash vibes only ☀️🪟🏊‍♂️. This mid-mod beauty is ready
    for poolside parties and morning coffee in the atrium. Who’s in?”
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: “阳光、风格和活力氛围 ☀️🪟🏊‍♂️。这个中世纪的美女准备好在泳池边派对和晨曦中的中庭喝咖啡了。谁在？”
- en: Scroll-stopping + swipe-worthy = 💥
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 滚动停止 + 可滑动 = 💥
- en: '* * *'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 20: Client Objections: The AI Comeback Tour'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 第20章：客户异议：人工智能回归之旅
- en: “What if the market crashes?” “I want to wait for rates to drop.” “My cousin
    said I should sell FSBO.” 😩
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: “如果市场崩溃了怎么办？”“我想等待利率下降。”“我表弟说我应该自己卖房。” 😩
- en: Instead of panicking, let ChatGPT help you craft calm, clear, confidence-boosting
    replies.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 不要惊慌，让ChatGPT帮助你制作出冷静、清晰、增强信心的回复。
- en: 'Prompt example:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “Write a reassuring but honest response to a buyer worried about buying during
    high interest rates.”
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: “写一个安慰但诚实的回复，针对担心在高利率期间购买房产的买家。”
- en: 'Output:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: “Totally fair concern—and you’re not alone. The truth is, rates might go up…
    or down. What matters most is finding the right home at the right time for *you*
    . And remember, refinancing later is always an option.”
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: “完全公平的担忧——你并不孤单。事实是，利率可能会上升……或者下降。最重要的是找到适合你的正确房子和正确时间。记住，稍后重新融资总是个选择。”
- en: Whether it’s buyers hesitating or sellers dragging their feet, ChatGPT helps
    you stay cool, collected, and compelling 😎.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 无论是对买家犹豫不决还是卖家拖延，ChatGPT都能帮助你保持冷静、沉着和吸引人 😎。
- en: 'Chapter 21: Listing Presentations That Pop'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 第21章：令人眼前一亮的列表展示
- en: Boring listing presentations are the beige carpet of real estate—nobody remembers
    them. But what if yours had sizzle, sparkle, and a sprinkle of ChatGPT magic?
    ✨
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 单调的列表展示就像房地产中的米色地毯——没有人会记得它们。但要是你的列表有了魅力、光芒和ChatGPT的魔法呢？✨
- en: 'Use ChatGPT to:'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT：
- en: Generate attention-grabbing headlines 📢
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成吸引注意力的标题 📢
- en: Write concise bios that make you sound like Beyoncé’s agent
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写出让你听起来像碧昂丝经纪人的简洁个人简介
- en: Craft benefit-driven bullet points (“Here’s how I sell homes faster & for more
    💰”)
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 撰写以利益为导向的要点（“这是如何更快、以更多💰卖掉房子的。”）
- en: 'Prompt example:'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “Write an intro paragraph for my listing presentation, explaining why I’m the
    best agent to sell a luxury condo downtown.”
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: “为我写一个列表展示的介绍段落，解释为什么我是卖市中心豪华公寓的最佳经纪人。”
- en: 'ChatGPT output:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT输出：
- en: “When it comes to selling luxury properties, every detail matters—from the first
    showing to the final signature. With a proven strategy, high-end marketing, and
    a passion for the downtown market, I turn listings into closings.”
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: “在销售豪华房产时，每个细节都很重要——从首次展示到最终签字。凭借经过验证的策略、高端营销和对市中心市场的热情，我把列表变成了成交。”
- en: Professional. Punchy. Persuasive. Now go win that listing! 🏆
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 专业。简洁。有说服力。现在去赢得那笔交易吧！🏆
- en: '* * *'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 22: Buyer Questionnaires—But Make Them Fun'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 第22章：买家问卷——但让它们变得有趣
- en: Most buyer questionnaires feel like the DMV version of house hunting. Let’s
    change that.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数买家问卷都感觉像是房屋寻找的DMV版本。让我们改变一下。
- en: 'Use ChatGPT to rewrite your intake forms with personality:'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT以个性重写你的登记表：
- en: “What’s your dream kitchen vibe? 🔲 Chef’s paradise 🔲 Cozy and cute 🔲 ‘Doordash
    again?’”
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: “你的梦想厨房风格是什么？ 🔲 大厨的天堂 🔲 舒适可爱 🔲 ‘又是DoorDash吗？’”
- en: 'Ask it to create:'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 请让它创建：
- en: Ice-breaker questions
  id: totrans-271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打破僵局的提问
- en: Multiple-choice options with emojis
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 带有表情符号的复选选项
- en: Fun intros like “Let’s find your dream digs!” 🛋️
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有趣的介绍，比如“让我们找到你的梦想住所！” 🛋️
- en: 'Prompt example:'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “Write a playful buyer questionnaire for a young couple moving to the suburbs.”
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: “为即将搬到郊区的年轻夫妇写一个有趣的买家问卷。”
- en: 'ChatGPT might deliver:'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可能会提供：
- en: “We’re here to help you find ‘The One’ (no, not a dating app). Tell us what
    makes your dream home swipe-right material!”
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: “我们在这里帮助你找到‘那一个’（不，不是约会应用）。告诉我们什么让你梦想中的房子成为滑动右键的材料！”
- en: Suddenly, clients are filling out your forms *with smiles* . What a concept.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 突然，客户填写你的表格时都带着微笑。多么有创意的想法。
- en: '* * *'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 23: Seller Updates Without the Stress'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 第23章：无需压力的卖家更新
- en: Sellers want to feel in the loop—but you don’t want to rewrite War and Peace
    every week.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 卖家希望感到自己是信息链的一部分——但你又不希望每周都重写《战争与和平》。
- en: 'Use ChatGPT to:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT来：
- en: Create quick, clear weekly update templates 📈
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建快速、清晰的每周更新模板 📈
- en: Summarize feedback from showings
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总结展示反馈
- en: Write positive spins on “no offers yet”
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对“目前还没有报价”进行积极的解读
- en: 'Example prompt:'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: “Write a weekly update email to a seller whose home had 3 showings and no offers.
    Keep it optimistic.”
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: “给一位已经展示了3次但还没有收到任何报价的卖家写一封每周更新邮件。保持乐观。”
- en: 'Output:'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: “Hi Mark! We had 3 showings this week—lots of positive comments on the layout
    and backyard 🌿. While no offers yet, interest remains strong and we’re continuing
    to get great traffic. I’ll keep you posted as we move forward!”
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: “嗨马克！这周我们有3次展示——对布局和后院有很多积极的评论 🌿。虽然目前还没有报价，但兴趣依然浓厚，我们还在继续获得大量流量。随着我们继续前进，我会随时向您汇报！”
- en: No stress. No overthinking. Just clean, consistent communication that builds
    trust.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 没有压力。没有过度思考。只有干净、一致的信息，这可以建立信任。
- en: '* * *'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 24: Win the Listing with Words'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 第24章：用言语赢得房源
- en: That pre-listing email? That little follow-up text? That intro message before
    the presentation? They matter more than you think. 💬
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 那封预售邮件？那个小小的跟进短信？那个在展示前的介绍信息？它们比你想象的更重要。💬
- en: 'Let ChatGPT help you:'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 让ChatGPT帮助你：
- en: Craft a “why me” email that doesn’t feel braggy
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制作一封不显得自大的“为什么选择我”邮件
- en: Write killer one-liners about your strategy
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写出关于你的策略的杀手级单行句
- en: Create a leave-behind handout that actually gets read
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一份真正会被阅读的离场手册
- en: 'Prompt example:'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “Write a confident but friendly email to a seller I just met with, thanking
    them and reinforcing why I’m the right agent.”
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: “给我刚见面的卖家写一封自信而友好的邮件，感谢他们，并强调为什么我是合适的经纪人。”
- en: 'Output:'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: “Thanks again for the chance to chat about your home! I truly believe we can
    make this a smooth, successful sale—and I’d love to be part of your next chapter.
    Let me know if you have any questions, big or small.”
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: “再次感谢有机会讨论您的房子！我真心相信我们可以使这次销售顺利、成功——并且我很乐意成为您下一章的一部分。如果您有任何问题，无论大小，请告诉我。”
- en: Subtle confidence. Zero ego. Maximum impact.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 微妙的自信。零自我。最大影响。
- en: '* * *'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 25: The “I''m Thinking About Buying” Nudge'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 第25章：对“我在考虑购买”的推动
- en: You know those leads who casually mention “thinking about buying” and then vanish
    like socks in a dryer? 🧦 Let’s gently pull them back in.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道那些随口提到“考虑购买”然后就像袜子在烘干机里消失的潜在客户吗？🧦 让我们温和地将他们拉回来。
- en: 'ChatGPT can help with:'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以帮助你：
- en: Soft-touch texts
  id: totrans-307
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 轻柔触摸的短信
- en: Value-packed emails
  id: totrans-308
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 价值丰富的邮件
- en: “No pressure” check-ins
  id: totrans-309
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “无压力”的跟进
- en: 'Prompt example:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “Write a friendly email for a past client who mentioned buying in the next 6
    months, just to check in.”
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: “为提到在接下来6个月内购买的前客户写一封友好的邮件，只是为了了解一下。”
- en: 'Output:'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: “Hey Jamie! Just checking in—still thinking about making a move later this year?
    No rush, but I’d love to help when the time feels right. In the meantime, I’m
    happy to send you a few listings to browse.”
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: “嗨杰米！只是想了解一下——你还在考虑今年晚些时候搬家吗？不着急，但当我感觉时机合适时，我很乐意帮忙。同时，我很乐意给你发一些房源供你浏览。”
- en: You're not chasing. You're supporting. And that’s how you build long-game loyalty
    🤝.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 你不是在追逐。你在支持。这就是你建立长期忠诚度的方法 🤝。
- en: 'Chapter 26: Automate Without Sounding Like a Robot'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 第26章：自动化而不像机器人
- en: 'Automation is 🔥—but not when it feels like a robo-blast from 2007\. Good news:
    ChatGPT helps you sound human while still saving time.'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化很火 🔥——但不是当它感觉像是2007年的机器人轰炸时。好消息是：ChatGPT可以帮助你听起来像人，同时还能节省时间。
- en: 'Use it to write:'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 使用它来写：
- en: Email drip sequences that feel personal 📧
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 感觉像个人一样发送的邮件漏斗序列 📧
- en: Auto-replies that sound warm and friendly
  id: totrans-319
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 听起来温暖友好的自动回复
- en: Scheduling messages that don’t scream “bot”
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安排不会让人感觉像是机器人的信息
- en: 'Example prompt:'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: “Write a friendly automated email for a new lead who just downloaded my homebuyer
    guide.”
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: “为刚刚下载了我的购房者指南的新潜在客户写一封友好的自动化邮件。”
- en: 'Output:'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: “Hi Sarah! Thanks for grabbing the Homebuyer Guide—I hope it gives you a great
    head start 🏡. I’ll check in soon to see if you have any questions, but in the
    meantime, feel free to reply anytime!”
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: “嗨莎拉！感谢你拿起购房者指南——我希望它能给你一个很好的起点 🏡。我很快会联系你，看看你是否有任何问题，但在此之前，请随时回复！”
- en: You’re still YOU—just with a little AI assist.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 你仍然是原来的你——只是多了一点AI的帮助。
- en: '* * *'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Chapter 27: Generate Reviews Without Begging'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 第27章：无需乞求生成评论
- en: We all want glowing reviews, but asking for them can feel like begging for compliments
    😬. Enter ChatGPT, the polite-but-effective review whisperer.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 我们都希望得到好评，但请求它们可能会感觉像是在乞求赞美 😬。这时就请ChatGPT，这位礼貌而有效的评论小能手出场。
- en: 'Prompt it to write:'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 提示它来写：
- en: Follow-up messages requesting reviews
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请求评论的后续信息
- en: Scripts to guide happy clients on what to say
  id: totrans-331
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指导快乐的客户说什么的脚本
- en: Google or Zillow review templates
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Google或Zillow评论模板
- en: 'Example prompt:'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 示例提示：
- en: “Write a friendly text asking a happy buyer to leave a review.”
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: “写一封友好的短信，请快乐的买家留下评论。”
- en: 'Output:'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: “Hey Emma! I loved working with you—thanks again for trusting me with your new
    home 🏠. If you have a moment, I’d be super grateful for a quick review on Google.
    It really helps me grow!”
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: “嘿，艾玛！我很喜欢和你一起工作——再次感谢你对我的新家🏠的信任。如果你有时间，我非常感激你能在Google上给我一个快速评论。这真的对我有所帮助！”
- en: Professional, polite, and pressure-free. ⭐⭐⭐⭐⭐
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 专业、礼貌、无压力。 ⭐⭐⭐⭐⭐
- en: '* * *'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 28: ChatGPT as Your Brainstorm Buddy'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 第28章：ChatGPT作为你的头脑风暴伙伴
- en: Stuck? Overthinking? Out of ideas? ChatGPT is like your brainstorming buddy
    who’s always awake (and doesn’t judge your caffeine intake ☕).
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 卡住了？过度思考？没有想法？ChatGPT就像你的头脑风暴伙伴，他总是醒着（而且不会评判你的咖啡因摄入量 ☕）。
- en: 'Use it to:'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 用它来做：
- en: Brainstorm content themes for the month
  id: totrans-342
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发起内容主题的头脑风暴
- en: Come up with webinar or event titles
  id: totrans-343
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想出网络研讨会或活动的标题
- en: Think up clever slogans or hashtags
  id: totrans-344
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想出巧妙的标语或标签
- en: 'Prompt example:'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例：
- en: “Give me 10 blog post ideas for a real estate agent who works with first-time
    buyers.”
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: “给我10个针对与首次购房者合作的房地产经纪人的博客文章想法。”
- en: 'ChatGPT might suggest:'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可能会建议：
- en: '“Renting vs. Buying: What Every 20-Something Should Know” “Avoid These 5 Mistakes
    When Buying Your First Home” “How to Decode a Mortgage Rate Without Crying”'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: “租房与购房：20多岁的人应该知道的一切” “购买你的第一套房子时避免这5个错误” “如何解码抵押贷款利率而不哭泣”
- en: It’s like having a content strategist in your back pocket. 💡
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像在你的口袋里有一个内容策略师。 💡
- en: '* * *'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 29: Create a Lead Magnet in 15 Minutes'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 第29章：15分钟内创建一个潜在客户吸引物
- en: You don’t need to spend days making a fancy ebook. With ChatGPT, you can whip
    up a juicy lead magnet over lunch 🥪.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要花几天时间制作一本花哨的电子书。有了ChatGPT，你可以在午餐时迅速制作出一份美味的潜在客户吸引物 🥪。
- en: 'Prompt idea:'
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 提示想法：
- en: “Write a 1-page guide called ‘7 Questions Every First-Time Buyer Should Ask
    Before House Hunting.’ Make it helpful and easy to read.”
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: “写一份名为‘7个首次购房者寻找房屋前应该问的问题’的1页指南。让它既有帮助又易于阅读。”
- en: 'Use it to:'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 用它来做：
- en: Capture emails from your website
  id: totrans-356
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从你的网站上捕获电子邮件
- en: Offer bonuses in your Instagram bio link
  id: totrans-357
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在你的Instagram个人资料链接中提供奖金
- en: Send follow-ups after open houses
  id: totrans-358
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在开放日之后发送后续信息
- en: You can even ask for a Canva layout suggestion. Now you’re a lead-gen machine
    🔥.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 你甚至可以要求一份Canva布局建议。现在你就是一个生成潜在客户的机器 🔥。
- en: '* * *'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Chapter 30: The Virtual Assistant Nobody Has to Train'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 第30章：无需培训的虚拟助手
- en: Hiring an assistant is awesome—but also work. Training, onboarding, explaining
    how you like your emails? Ugh.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 招聘助理很棒——但也很累。培训、入职、解释你如何喜欢你的电子邮件？呃。
- en: But ChatGPT? Already trained. Already eager. Already ready to roll 👨‍💻.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 但ChatGPT？已经训练好。已经迫不及待。已经准备好行动 👨‍💻。
- en: 'You can say:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以说：
- en: '“Write a reminder email for my 2 p.m. showing tomorrow at 123 Elm St.” Or:
    “Draft a response to a buyer asking if the HOA covers landscaping.”'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: “为明天下午2点在123 Elm St.的展示写一封提醒邮件。” 或者：“为询问HOA是否负责景观的买家草拟一份回复。”
- en: No eye rolls. No PTO requests. No ‘accidentally’ deleting your calendar.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 没有翻白眼。没有请假请求。没有“意外”删除你的日历。
- en: Just fast, reliable help whenever you need it. Welcome to the AI dream team
    💼🤖.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 只需快速、可靠的援助，无论何时你需要。欢迎加入AI梦幻团队 💼🤖。
- en: 'Chapter 31: Prospect Like a Pro (Even When You’re Tired)'
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 第31章：像专业人士一样寻找（即使你很累）
- en: Prospecting can feel like dragging a wagon uphill in flip-flops. But with ChatGPT,
    you can make it faster—and way less painful.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找潜在客户可能感觉像是在人字拖里拖着一辆马车上山。但有了ChatGPT，你可以让它更快——而且痛苦少得多。
- en: 'Let it help you:'
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 让它帮助你：
- en: Write compelling intro messages for cold outreach 💌
  id: totrans-371
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为冷接触写吸引人的开场白 💌
- en: Personalize follow-ups
  id: totrans-372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个性化跟进
- en: Come up with icebreakers for new leads
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
