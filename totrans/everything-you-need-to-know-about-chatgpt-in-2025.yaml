  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的真正范式转变随着机器学习的发展而来，这是人工智能的一个子领域，它允许机器从数据中学习，而不是仅仅依赖于严格的规则。与编程每个决策不同，开发者开始使用大型数据集来训练系统，以便机器能够识别模式和做出预测。这种方法，基于统计算法，彻底改变了该领域，并为重大突破铺平了道路。
