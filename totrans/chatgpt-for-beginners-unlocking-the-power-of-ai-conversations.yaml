    ****coh**eren**t ****a**nd** ****cont**extual**ly ****appr**opriat**e ****te**xt**,
    ****i**t**’****s**** ****n**ot** ****infa**llibl**e. ****I**t** ****m**ay** ****occa**sional**ly
