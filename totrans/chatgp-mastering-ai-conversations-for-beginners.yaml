  zh: '**如果**你拥有**卓越的客户服务**，那么机会是**其他公司文化**可能也是**相当突出**的。这是因为通过优先考虑你的客户服务，你是在**正确地思考业务**。在一家企业中，**没有任何事情是孤立**的；每一个角落和缝隙都构成了被称为**组织**的**身体**的一部分。'
