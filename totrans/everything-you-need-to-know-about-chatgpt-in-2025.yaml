  zh: '**ChatGPT**等生成式语言模型背后的**基本原理**是它们预测序列中下一个单词的能力，给定一组先前单词。这个过程，被称为**语言建模**，依赖于庞大的文本语料库和复杂的数学函数，这些函数计算每个单词或短语跟随给定输入的概率。正是由于这种预测能力，该模型可以生成问题的答案，撰写完整的段落，甚至模拟复杂的对话，所有这些都能达到令人惊讶的流畅度和自然度。'
