- en: '**SEABORN’S RIDGE PLOTS**'
  id: totrans-3243
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**SEABORN 的 RIDGE 图**'
- en: Ridge plots are essentially a series of KDE plots displayed on top of one another,
    allowing for the comparison of distributions across categories. They allow for
    the display of overlaid distribution plots, which is useful for visualizing distribution
    changes across categories.
  id: totrans-3244
  prefs: []
  type: TYPE_NORMAL
  zh: Ridge 图本质上是一系列重叠的 KDE 图，允许比较不同类别之间的分布。它们允许显示重叠的分布图，这对于可视化类别间的分布变化非常有用。
