  id: totrans-3517
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"提供优化网站图片的技巧，包括使用描述性文件名、alt文本和标题，以提升[您的行业]的可访问性和SEO性能。"'
