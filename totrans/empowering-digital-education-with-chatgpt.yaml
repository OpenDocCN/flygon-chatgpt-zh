- en: 3Students’ Perceptions and Use of ChatGPT in Scientific Writing
  id: totrans-641
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3学生对于ChatGPT在科学写作中的看法和使用
- en: Joris van Bohemen and Steffi Haag
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: Joris van Bohemen 和 Steffi Haag
- en: 'DOI: [10.1201/9781032716350-3](http://doi.org/10.1201/9781032716350-3)'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 'DOI: [10.1201/9781032716350-3](http://doi.org/10.1201/9781032716350-3)'
- en: 3.1 Introduction
  id: totrans-644
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.1 引言
- en: With the emergence of artificial intelligence (AI), especially large language
    models (LLMs), academic education is experiencing a transformative shift ([Farrokhnia
    et al., 2023](#ch11.xhtml#r107)). This chapter presents an in-depth exploration
    of the integration of the LLM ChatGPT,[¹](#fn1) a conversational AI model developed
    by OpenAI and currently one of the most widely used LLMs, into an academic curriculum.
    Focusing on its application in assisting undergraduate students in a research
    seminar on digital innovation, this chapter comprehensively analyzes the methodology,
    implementation, and outcomes of using ChatGPT to write seminar theses, thereby
    shedding light on its impact on students’ learning experiences.
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能（AI）的出现，尤其是大型语言模型（LLMs）的兴起，学术教育正经历着一场变革性的转变 ([Farrokhnia等人，2023](#ch11.xhtml#r107)).
    本章深入探讨了将OpenAI开发的对话式AI模型ChatGPT[¹](#fn1)，目前最广泛使用的LLMs之一，整合到学术课程中的情况。本章重点关注其在协助本科生进行数字创新研究研讨会中的应用，全面分析了使用ChatGPT撰写研讨会论文的方法、实施和结果，从而揭示了它对学生学习体验的影响。
- en: LLMs, such as ChatGPT, are marking significant advancements in natural language
    processing and machine learning ([Rahman & Watanobe, 2023](#ch11.xhtml#r109)).
    Their proficiency in understanding, responding, and generating human-like text
    has created new pathways in various domains, education being a notable one. In
    the educational context, LLMs have the potential to revolutionize traditional
    teaching methodologies ([Farrokhnia et al., 2023](#ch11.xhtml#r107)). They create
    personalized learning experiences, assist in research and writing, and foster
    a more interactive and engaging learning environment. However, integrating these
    tools is not without its challenges. For instance, using ChatGPT in academic education
    raises ethical concerns, such as the potential for encouraging plagiarism, necessitating
    a balanced and critical approach to its application ([Farrokhnia et al., 2023](#ch11.xhtml#r107);
    [Tlili et al., 2023](#ch11.xhtml#r113)).
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于ChatGPT的LLMs在自然语言处理和机器学习领域正取得显著的进步（Rahman 和 Watanobe，2023年）。它们在理解、回应和生成类似人类文本方面的熟练程度在各个领域开辟了新的途径，教育领域尤为突出。在教育环境中，LLMs有潜力彻底改变传统的教学方法（Farrokhnia
    等人，2023年）。它们创造了个性化的学习体验，协助研究和写作，并促进更互动和吸引人的学习环境。然而，整合这些工具并非没有挑战。例如，在学术教育中使用ChatGPT引发了伦理问题，如可能鼓励剽窃，需要对其应用采取平衡和批判性的方法（Farrokhnia
    等人，2023年；Tlili 等人，2023年）。
- en: An essential aspect of integrating LLMs into the educational process is teaching
    students how to use them while understanding their (current) limitations. In approaching
    this integration, it is essential to consider the teachers’ and the students’
    viewpoints and experiences ([Farrokhnia et al., 2023](#ch11.xhtml#r107); [Rahman
    & Watanobe, 2023](#ch11.xhtml#r109); [Tlili et al., 2023](#ch11.xhtml#r113)).
    This dual approach ensures a more holistic understanding of the tool’s impact
    and effectiveness. We incorporated ChatGPT in an undergraduate research seminar,
    providing students with guidance on its efficient use, including techniques in
    prompt engineering, for researching and writing a seminar paper.
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 将大型语言模型（LLMs）整合到教育过程中的一个关键方面是教授学生如何使用它们，同时理解它们（当前）的限制。在处理这种整合时，考虑教师和学生的观点和经验是至关重要的（Farrokhnia
    等人，2023年；Rahman 和 Watanobe，2023年；Tlili 等人，2023年）。这种双重方法确保了对工具影响和有效性的更全面理解。我们在本科研究研讨会上引入了ChatGPT，为学生提供了关于其高效使用的指导，包括提示工程技巧，用于研究和撰写研讨论文。
- en: ChatGPT contributed to students’ process of scientific writing in several meaningful
    ways. First, it helped students develop their research skills by formulating relevant
    research questions and structuring their seminar papers. Second, ChatGPT acted
    as a novel tool for drafting seminar papers, improving students’ writing skills
    and efficiency. Third, it facilitated access to a range of academic references,
    streamlining the research process. Finally, ChatGPT provided an opportunity to
    evaluate its effectiveness in improving educational outcomes and student engagement.
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT以几种有意义的方面促进了学生的科学写作过程。首先，它通过制定相关的研究问题和构建研讨论文的结构帮助学生发展研究技能。其次，ChatGPT作为起草研讨论文的新颖工具，提高了学生的写作技能和效率。第三，它促进了获取各种学术参考文献，简化了研究过程。最后，ChatGPT提供了一个评估其提高教育成果和学生参与度的有效性的机会。
- en: This chapter presents a detailed account of how ChatGPT can be integrated into
    the scientific writing process and help to structure, draft, and proofread a seminar
    paper. How students interacted with ChatGPT and how it influenced their learning
    experience were also examined. To measure how students perceived the tool’s effectiveness,
    we used questions inspired by the unified theory of acceptance and use of technology
    (UTAUT; [Venkatesh et al., 2003](#ch11.xhtml#r114)), one of the most influential
    technology adoption theories, and open-ended questions in surveys that students
    responded to before and after using ChatGPT. This approach allowed for a comprehensive
    view of the students’ perspectives, capturing quantitative and qualitative data.
    The pre- and post-survey design was instrumental in observing how students’ opinions
    and experiences changed by using ChatGPT in their seminar work.
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 本章详细介绍了如何将ChatGPT整合到科学写作过程中，并帮助结构化、起草和校对研讨会论文。还考察了学生如何与ChatGPT互动以及它如何影响他们的学习体验。为了衡量学生对工具有效性的看法，我们使用了受统一技术接受和使用理论（UTAUT；[Venkatesh等，2003](#ch11.xhtml#r114)）启发的问卷问题，这是最有影响力的技术采用理论之一，以及学生在使用ChatGPT前后回答的开放式问题。这种方法允许全面了解学生的观点，捕捉定量和定性数据。使用ChatGPT进行研讨会工作的前后调查设计对于观察学生观点和体验的变化至关重要。
- en: The study analyzed LLMs’ pedagogical use in teaching scientific writing. It
    delivers relevant insights into the emerging role of LLMs in educational contexts
    and provides implications for future pedagogical strategies. The findings contribute
    to the academic discourse on AI in education and offer practical insights for
    educators and institutions looking to integrate LLMs into their teaching and learning
    processes.
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 研究分析了LLMs在教授科学写作中的教学用途。它提供了关于LLMs在教育环境中新兴角色的相关见解，并为未来的教学策略提供了启示。研究结果为关于教育中AI的学术讨论做出了贡献，并为希望将LLMs整合到其教学和学习过程中的教育者和机构提供了实用见解。
- en: The following sections of the chapter outline the theoretical foundation, explain
    the research method employed, and present an analysis of qualitative and quantitative
    survey data pre- and post-use of ChatGPT. This is followed by a discussion of
    the findings, future research directions, and the study’s limitations.
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的以下部分概述了理论基础，解释了采用的研究方法，并展示了在ChatGPT使用前后的定性和定量调查数据分析。随后是对发现、未来研究方向和研究的局限性的讨论。
- en: 3.2 Background
  id: totrans-652
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.2 背景
- en: 3.2.1 LLMs
  id: totrans-653
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.1 LLMs
- en: LLMs are advanced conversational AI models. They are based on the generative
    pre-trained transformer (GPT) architecture, which utilizes deep learning techniques
    to generate human-like text ([Susnjak & McIntosh, 2022](#ch11.xhtml#r111)). ChatGPT
    is an LLM developed by OpenAI. It is trained on different internet texts and can
    respond to user queries coherently and accurately ([Teubner et al., 2023](#ch11.xhtml#r112)).
    Its capabilities include answering questions, providing explanations, and assisting
    in content creation, making it a versatile tool in various applications, including
    education ([Teubner et al., 2023](#ch11.xhtml#r112)).
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLMs）是高级对话式人工智能模型。它们基于生成式预训练的Transformer（GPT）架构，该架构利用深度学习技术生成类似人类的文本（[Susnjak
    & McIntosh，2022](#ch11.xhtml#r111)）。ChatGPT是由OpenAI开发的LLM。它在不同的互联网文本上进行训练，并能对用户查询做出连贯和准确的响应（[Teubner等，2023](#ch11.xhtml#r112)）。其功能包括回答问题、提供解释和协助内容创作，使其成为各种应用中的多功能工具，包括教育（[Teubner等，2023](#ch11.xhtml#r112)）。
- en: Prompt engineering has emerged as a critical aspect in maximizing the effectiveness
    of LLMs like ChatGPT ([White et al., 2023](#ch11.xhtml#r115)). It involves strategically
    formulating input prompts to elicit the most accurate and relevant responses ([White
    et al., 2023](#ch11.xhtml#r115)). This practice is essential in guiding the LLM
    to understand the context and intent of the query more effectively, thereby producing
    more precise and useful outputs. [White et al. (2023)](#ch11.xhtml#r115) explore
    various strategies and techniques in prompt engineering, offering insights into
    how users can better interact with LLMs. This includes understanding the model’s
    limitations, using specific language to guide the LLM’s response, and experimenting
    with different prompt styles to achieve the desired outcome. The study’s implications
    are profound for educational settings, as prompt engineering can enhance the learning
    experience, aid in research, and facilitate the creation of academic content ([White
    et al., 2023](#ch11.xhtml#r115)). In summary, integrating LLMs in educational
    contexts, supported by the art of prompt engineering, presents a transformative
    opportunity. It enhances the interaction with AI and opens new avenues for personalized
    and efficient learning experiences ([Baidoo-Anu & Owusu Ansah, 2023](#ch11.xhtml#r105);
    [Shoufan, 2023](#ch11.xhtml#r110); [White et al., 2023](#ch11.xhtml#r115)).
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程已成为最大化ChatGPT等LLMs有效性的关键方面([White等人，2023](#ch11.xhtml#r115))。它涉及战略性地制定输入提示以获取最准确和相关的响应([White等人，2023](#ch11.xhtml#r115))。这种做法对于指导LLM更有效地理解查询的上下文和意图至关重要，从而产生更精确和有用的输出。[White等人（2023）](#ch11.xhtml#r115)探讨了提示工程中的各种策略和技术，为用户如何更好地与LLMs互动提供了见解。这包括理解模型局限性、使用特定语言来引导LLM的响应，以及尝试不同的提示风格以达到预期结果。该研究对教育环境的影响深远，因为提示工程可以提升学习体验、辅助研究并促进学术内容的创作([White等人，2023](#ch11.xhtml#r115))。总之，在教育环境中整合LLMs，并辅以提示工程的艺术，提供了一个变革性的机会。它增强了与AI的互动，并为个性化、高效的学习体验开辟了新的途径([Baidoo-Anu
    & Owusu Ansah，2023](#ch11.xhtml#r105); [Shoufan，2023](#ch11.xhtml#r110); [White等人，2023](#ch11.xhtml#r115))。
- en: 3.2.2 Related Work on LLMs in Education
  id: totrans-656
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2.2 教育领域关于大型语言模型（LLMs）的相关研究
- en: '[Farrokhnia et al. (2023)](#ch11.xhtml#r107) employ a SWOT (strengths, weaknesses,
    opportunities, and threats) analysis framework to assess the impact of ChatGPT
    in educational settings. The study highlights ChatGPT’s strengths, such as its
    sophisticated natural language processing capabilities, self-improvement features,
    and ability to provide personalized, real-time responses. These attributes are
    beneficial for enhancing information accessibility, personalizing learning experiences,
    and reducing educators’ workloads. However, the study also highlights significant
    weaknesses, including ChatGPT’s lack of deep content understanding, challenges
    in assessing response quality, potential biases, and lack of higher-order thinking
    skills. The opportunities presented by ChatGPT in education, such as enhancing
    information access and personalizing learning experience, are counterbalanced
    by threats like limited context understanding, risks to academic integrity, perpetuation
    of discrimination, normalization of plagiarism, and potential decline in high-order
    cognitive skills among learners ([Farrokhnia et al., 2023](#ch11.xhtml#r107)).
    The study concludes with a call for a comprehensive agenda in educational practice
    and research to effectively navigate the era of ChatGPT, addressing these SWOT.'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: '[Farrokhnia等人（2023）](#ch11.xhtml#r107) 采用SWOT（优势、劣势、机会和威胁）分析框架来评估ChatGPT在教育环境中的影响。该研究突出了ChatGPT的优势，例如其复杂的自然语言处理能力、自我改进功能和提供个性化、实时响应的能力。这些特性有助于提高信息可访问性、个性化学习体验和减轻教育者的工作负担。然而，该研究也指出了ChatGPT的显著劣势，包括缺乏深入的内容理解、评估响应质量方面的挑战、潜在的偏见以及缺乏高级思维能力。ChatGPT在教育中提供的机遇，如增强信息获取和个性化学习体验，被诸如有限的上下文理解、学术诚信风险、歧视的延续、剽窃的常态化以及学习者高级认知技能可能下降等威胁所抵消([Farrokhnia等人，2023](#ch11.xhtml#r107))。该研究以呼吁在教育和研究实践中制定全面议程来有效应对ChatGPT时代，解决这些SWOT问题而结束。'
- en: '[Shoufan (2023)](#ch11.xhtml#r110) investigated senior computer engineering
    students’ perceptions of ChatGPT through a two-step process. First, students engaged
    with ChatGPT in a learning activity and then provided evaluations of their experience.
    This qualitative feedback, comprising over 3,000 words, was accurately analyzed,
    identifying 36 distinct codes and 15 thematic categories, such as “helpful for
    learning” or “enthusiasm and appreciation.” Following this initial analysis, a
    comprehensive 27-item questionnaire was developed based on the previously identified
    themes and codes. Students were asked to complete this survey after three weeks,
    during which time they continued interacting with ChatGPT. This study’s results
    revealed a mixed perception of ChatGPT among the students. On the positive side,
    students admired ChatGPT’s capabilities, noting its engaging, motivating nature
    and usefulness in academic and professional contexts. They appreciated the ease
    of use and the human-like quality of the interface, which provided well-structured
    and clear explanations. However, the study also revealed concerns about the accuracy
    of ChatGPT’s responses. Students felt that effective use of ChatGPT required solid
    background knowledge, as the tool was not a substitute for human intelligence
    ([Shoufan, 2023](#ch11.xhtml#r110)). This highlighted the need for improvements
    in the accuracy of ChatGPT’s outputs and thorough training of students for prompt
    engineering.'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: '[Shoufan（2023）](#ch11.xhtml#r110)通过两步过程调查了高级计算机工程学生对ChatGPT的看法。首先，学生在学习活动中与ChatGPT互动，然后提供了他们对经验的评估。这份包含超过3,000字的定性反馈被准确分析，识别出36个不同的代码和15个主题类别，例如“有助于学习”或“热情和欣赏”。在初步分析之后，基于先前识别的主题和代码，开发了一份包含27个问题的综合问卷。学生在三周后完成这份调查，在这段时间里，他们继续与ChatGPT互动。这项研究的结果显示，学生对ChatGPT的看法是混合的。在积极方面，学生钦佩ChatGPT的能力，指出其在学术和职业环境中的吸引力和激励作用，以及其在学术和职业环境中的实用性。他们欣赏其易用性和界面的人性化质量，提供了结构良好和清晰的解释。然而，这项研究也揭示了学生对ChatGPT回答准确性的担忧。学生认为，有效使用ChatGPT需要扎实的背景知识，因为这个工具不能替代人类智慧([Shoufan，2023](#ch11.xhtml#r110))。这突显了提高ChatGPT输出准确性和对学生进行提示工程培训的必要性。'
- en: Our exploration into the acceptance and usability of ChatGPT in educational
    settings also answers the call of [Tlili et al. (2023)](#ch11.xhtml#r113), who
    articulate the complex dynamics of employing AI in learning environments. They
    advocate for carefully evaluating the transformative potential against the backdrop
    of ethical considerations, quality of interactions, and the importance of fostering
    critical thinking skills.
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对ChatGPT在教育环境中的接受度和可用性的探索，也回应了[Tlili等人（2023）](#ch11.xhtml#r113)的呼吁，他们阐述了在学习教育环境中使用AI的复杂动态。他们主张在道德考量、互动质量以及培养批判性思维技能的重要性背景下，仔细评估变革潜力。
- en: 'Our study builds upon the critical insights of [Farrokhnia et al. (2023)](#ch11.xhtml#r107),
    [Shoufan (2023)](#ch11.xhtml#r110), and [Tlili et al. (2023)](#ch11.xhtml#r113),
    which collectively articulate the diverse strengths, weaknesses, and ethical challenges
    associated with integrating ChatGPT into educational settings; it is further inspired
    by the UTAUT ([Venkatesh et al. 2003](#ch11.xhtml#r114)). The UTAUT represents
    a robust, empirically validated model to understand people’s technology acceptance
    and usage. It synthesizes elements from eight different user acceptance theories,
    creating a comprehensive framework that has been empirically validated to outperform
    its constituent models. The UTAUT model identifies eight key constructs that are
    central to predicting and explaining user behavior toward technology adoption:
    performance expectancy, effort expectancy, social influence and facilitating conditions,
    attitude toward using technology, self-efficacy, anxiety, and behavioral intention
    to use ChatGPT. These constructs are moderated by individual characteristics,
    such as gender, age, experience, and voluntariness of use.'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的研究建立在[Farrokhnia等人（2023）](#ch11.xhtml#r107)、[Shoufan（2023）](#ch11.xhtml#r110)和[Tlili等人（2023）](#ch11.xhtml#r113)的关键洞见之上，他们共同阐述了将ChatGPT整合到教育环境中所涉及的多样优势、劣势和伦理挑战；它还受到UTAUT([Venkatesh等人
    2003](#ch11.xhtml#r114))的启发。UTAUT代表了一个稳健、经验验证的模型，用于理解人们对技术接受和使用的态度。它综合了来自八个不同用户接受理论的元素，创建了一个经过经验验证的、超越其组成模型的综合框架。UTAUT模型确定了八个关键结构，这些结构对于预测和解释用户对技术采纳的行为至关重要：绩效预期、努力预期、社会影响和促进条件、对使用技术的态度、自我效能感、焦虑以及使用ChatGPT的行为意图。这些结构受到个人特征，如性别、年龄、经验和使用意愿的调节。
- en: While the limited sample of our seminar participants does not allow us to assess
    how the UTAUT explains students’ opinions and acceptance of LLMs in educational
    settings, we use its constructs to gain first insights into the extent to which
    students perceive ChatGPT as useful (performance expectancy) and easy to use (effort
    expectancy) and how their use of ChatGPT is influenced by the opinions of others
    (social influence) and the provision of necessary resources and infrastructure
    (facilitating conditions). Our approach thus helps identify the first determinants
    of students’ acceptance and usage of LLMs like ChatGPT, thereby providing valuable
    insights for its effective integration into educational practices.
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们研讨会参与者的样本有限，使我们无法评估UTAUT如何解释学生在教育环境中对LLMs（大型语言模型）的意见和接受度，但我们使用其结构来获得初步见解，了解学生认为ChatGPT有多有用（绩效预期）以及使用起来有多容易（努力预期），以及他们的ChatGPT使用受到他人意见（社会影响）和必要资源及基础设施提供（促进条件）的影响。因此，我们的方法有助于确定学生接受和使用LLMs如ChatGPT的第一决定因素，从而为将其有效整合到教育实践中提供宝贵的见解。
- en: In addition, our study also incorporated open-ended survey questions to explore
    students’ perspectives in greater detail and to capture a comprehensive and explorative
    view of their experiences and opinions regarding ChatGPT’s acceptance and usability.
    These open-ended responses enriched our understanding by revealing insights that
    structured surveys might not capture, such as unique use cases, personal anecdotes,
    and specific concerns or pros that students had regarding ChatGPT. By combining
    insights from quantitative and qualitative questions, our study strives to provide
    a comprehensive view of how students perceive and interact with ChatGPT in an
    academic setting.
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们的研究还纳入了开放式调查问题，以更详细地探索学生的观点，并捕捉他们对ChatGPT接受度和可用性的全面和探索性看法。这些开放式回答通过揭示结构化调查可能无法捕捉的见解而丰富了我们的理解，例如独特的用例、个人轶事以及学生对ChatGPT的具体关注或优点。通过结合定量和定性问题的见解，我们的研究力求提供一个全面的视角，了解学生在学术环境中如何感知和与ChatGPT互动。
- en: 3.3 Research Method
  id: totrans-663
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.3 研究方法
- en: 3.3.1 Data Collection
  id: totrans-664
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3.1 数据收集
- en: 'For the study, we selected ChatGPT, currently one of the most widely used LLMs,
    to explore students’ perceptions and use of LLMs for scientific writing. The study
    was conducted with undergraduate computer science students of a German university
    who participated in a seminar on digital innovations. Digital innovations refer
    to those based on digital technologies ([Hund et al., 2021](#ch11.xhtml#r108)),
    such as virtual reality, generative AI, and non-fungible tokens (NFTs). In their
    seminar theses, students explored, for instance, the following respective research
    questions:'
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这项研究，我们选择了ChatGPT，目前它是最广泛使用的LLM之一，以探索学生对科学写作中LLM的看法和使用。这项研究是在德国一所大学的计算机科学本科生中进行的，他们参加了一个关于数字创新的研讨会。数字创新是指基于数字技术的内容（[Hund
    et al., 2021](#ch11.xhtml#r108)），例如虚拟现实、生成式AI和非同质化代币（NFTs）。在他们的研讨会论文中，学生探讨了以下各自的研究问题：
- en: How can NFTs be utilized to ensure fair remuneration and protection for artists
    and authors in the digital world?
  id: totrans-666
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何利用NFTs确保在数字世界中为艺术家和作者提供公平的报酬和保护？
- en: What methodologies can be employed effectively to measure and quantify biases
    in ChatGPT, and what technical approaches can be implemented to mitigate these
    biases?
  id: totrans-667
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以采用哪些有效的方法来衡量和量化ChatGPT中的偏见，以及可以实施哪些技术方法来减轻这些偏见？
- en: What are the potential applications of virtual reality in the workplace, and
    to what extent can this technology be effectively integrated into daily work routines?
  id: totrans-668
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工作场所中虚拟现实技术的潜在应用是什么，这种技术能在多大程度上有效地融入日常工作中？
- en: The seminar included the use of ChatGPT to write a 2,250-word seminar paper.
    ChatGPT assisted students in generating research questions, finding references,
    drafting seminar papers, and enhancing the language and clarity of their work.
    The diverse applications of ChatGPT in the course provided a rich context for
    examining its impact on students’ scientific writing experiences and perceptions.
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 研讨会包括使用ChatGPT撰写一篇2,250字的研讨会论文。ChatGPT帮助学生生成研究问题、查找参考文献、起草研讨会论文，并提高他们工作的语言和清晰度。ChatGPT在课程中的多样化应用为考察其对学生的科学写作体验和看法的影响提供了丰富的背景。
- en: The seminar occurred twice, in the summer and winter term of 2023/2024\. In
    the summer term, 19 students participated and completed both the pre- and post-ChatGPT-use
    surveys. In the winter term, 8 students completed the pre-ChatGPT-use survey,
    and 9 completed the post-ChatGPT-use survey. We taught students how to use ChatGPT
    and the importance of prompt engineering.
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 研讨会分别在2023/2024年的夏季学期和冬季学期举行。在夏季学期，有19名学生参加并完成了ChatGPT使用前后的调查。在冬季学期，有8名学生完成了ChatGPT使用前的调查，9名学生完成了ChatGPT使用后的调查。我们向学生教授了如何使用ChatGPT以及提示工程的重要性。
- en: In addition to demographics, the study asked for students’ technical knowledge
    about GPT models and their ChatGPT usage behavior. Qualitative data were gathered
    in open-ended survey questions focusing on ChatGPT’s strengths and weaknesses
    to get detailed responses about students’ expectations and experiences with ChatGPT,
    for example, “What advantages does the use of ChatGPT have for seminar papers?”
    or “For which tasks and areas of writing a seminar paper do you currently consider
    ChatGPT to be unsuitable?” A complete list of survey questions can be found in
    the Appendix.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 除了人口统计信息外，该研究还询问了学生对GPT模型的技术知识以及他们的ChatGPT使用行为。通过开放式调查问题收集定性数据，这些问题集中在ChatGPT的优势和劣势上，以获取学生对ChatGPT的期望和体验的详细回答，例如，“使用ChatGPT对研讨会论文有什么优势？”或者“在撰写研讨会论文的任务和领域方面，你认为目前ChatGPT不适用的是哪些？”完整的调查问题列表可以在附录中找到。
- en: For the quantitative data collection, we used established items of the UTAUT
    constructs ([Venkatesh et al., 2003](#ch11.xhtml#r114)), adapted to our ChatGPT
    context, and measured those on a 7-point Likert scale. Examples of survey questions
    for performance expectancy were “I would find it useful to use ChatGPT for my
    seminar paper in the DI seminar” and for ease of use, “Learning to operate ChatGPT
    is easy for me” ([Venkatesh et al., 2003](#ch11.xhtml#r114)). A complete list
    of the survey questions can be found in the Appendix. To enhance clarity, we conducted
    the surveys in German and translated the questions for this purpose.
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 在定量数据收集方面，我们使用了UTAUT结构中已建立的条目([Venkatesh et al., 2003](#ch11.xhtml#r114))，适应我们的ChatGPT环境，并在7点李克特量表上进行了测量。例如，关于绩效期望的调查问题为“我认为在DI研讨会的论文中使用ChatGPT将是有用的”，而对于易用性，“对我来说学习操作ChatGPT很容易”([Venkatesh
    et al., 2003](#ch11.xhtml#r114))。完整的调查问题列表可以在附录中找到。为了提高清晰度，我们用德语进行了调查，并将问题翻译成德语。
- en: The study began with a pre-ChatGPT-use survey before the actual use of ChatGPT
    to assess students’ initial expectations of ChatGPT. During the seminar, students
    then used ChatGPT for several tasks, for example,
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 研究始于ChatGPT实际使用前的预调查，以评估学生对ChatGPT的初始期望。在研讨会期间，学生们使用ChatGPT完成了几个任务，例如，
- en: 'Generating research questions: Students interacted with ChatGPT to formulate
    research questions on topics like virtual reality, generative AI, and NFTs.'
  id: totrans-674
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建研究问题：学生们与ChatGPT互动，就虚拟现实、生成式AI和NFTs等主题构建研究问题。
- en: 'Finding references and drafting papers: ChatGPT assisted in locating relevant
    references and drafting initial versions of their 2,250-word seminar papers.'
  id: totrans-675
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻找参考资料和撰写论文：ChatGPT协助定位相关参考资料并起草了他们的2,250字研讨会论文的初始版本。
- en: 'Peer review process: After creating the first draft, students engaged in a
    peer review process, providing feedback to each other. ChatGPT was also utilized
    to enhance the language and clarity of the papers.'
  id: totrans-676
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 同行评审过程：在创建第一稿后，学生们进行了同行评审过程，相互提供反馈。ChatGPT也被用来提高论文的语言和清晰度。
- en: The post-ChatGPT-use survey was then conducted to capture changes in students’
    perceptions and experiences with ChatGPT for the summer-term cohort of the seminar.
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 然后进行了ChatGPT使用后的调查，以捕捉研讨会夏季学期学生群体对ChatGPT的看法和体验的变化。
- en: 3.3.2 Quantitative Data Analysis
  id: totrans-678
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3.2 定量数据分析
- en: We used R (RStudio 2023.09.1[²](#fn2)) to analyze the quantitative data about
    the UTAUT-based factors influencing students’ acceptance and use of ChatGPT. After
    preprocessing the data, we calculated each variable’s mean and standard error,
    providing a descriptive overview of the participants’ responses. Additionally,
    confidence intervals were calculated to offer a more precise understanding of
    the data.
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用R（RStudio 2023.09.1[²](#fn2)）分析了基于UTAUT模型影响学生对ChatGPT接受和使用量的定量数据。在数据预处理后，我们计算了每个变量的平均值和标准误差，为参与者的回答提供了一个描述性的概述。此外，还计算了置信区间，以提供对数据的更精确理解。
- en: In addition, a correlation analysis was conducted to explore the interrelationships
    among the different variables. This analysis helped us understand how the various
    factors of technology acceptance and usage influence each other. The results of
    this correlation analysis are presented in a correlation heat map, which visually
    represents the strength and direction of the relationships between variables.
    It offers insights into the dynamics of ChatGPT acceptance among the participants.
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还进行了相关性分析，以探索不同变量之间的相互关系。这项分析帮助我们理解技术接受和使用中的各种因素是如何相互影响的。相关性分析的结果以相关性热图的形式呈现，直观地表示了变量之间关系的强度和方向。它为参与者对ChatGPT接受度的动态变化提供了见解。
- en: The descriptive and correlation analyzes were conducted for both pre- and post-ChatGPT-use
    surveys, and a dot plot was created to compare the means and confidence intervals
    of the pre- and post-measurement.
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 对ChatGPT使用前后的调查都进行了描述性和相关性分析，并创建了一个点图来比较前后测量的平均值和置信区间。
- en: 3.3.3 Qualitative Data Analysis
  id: totrans-682
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3.3 定性数据分析
- en: Thematic content analysis was employed to analyze the open-ended survey responses
    ([Braun & Clarke, 2006](#ch11.xhtml#r106)). The objective was to identify common
    themes and patterns in students’ perceptions of ChatGPT, especially regarding
    strengths and weaknesses and their experiences and expectations using ChatGPT
    for their academic work.
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 主题内容分析被用于分析开放式调查回应（[Braun & Clarke, 2006](#ch11.xhtml#r106)）。目标是识别学生在对ChatGPT的看法中存在的共同主题和模式，特别是关于其优势和劣势以及他们使用ChatGPT进行学术工作的经验和预期。
- en: 3.4 Pre-ChatGPT-Use Survey Analysis
  id: totrans-684
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.4 ChatGPT使用前调查分析
- en: Among the overall 27 pre-ChatGPT-use participants, the average age was 22.07
    years. Only one student was female. The median semester of study was the fourth,
    suggesting that most participants were in the middle stages of their undergraduate
    computer science study. All participants had completed their high school education.
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 在总共27名ChatGPT使用前参与者中，平均年龄为22.07岁。只有一名学生是女性。学习的中位数学期是第四学期，这表明大多数参与者处于本科计算机科学学习的中间阶段。所有参与者都已完成高中教育。
- en: In terms of usage frequency, most participants reported using ChatGPT every
    week, with only one student never having used ChatGPT before. When asked about
    their usage in the last week, most participants indicated that they had used ChatGPT
    between two and five times, underscoring ChatGPT’s popularity. Participants described
    varying degrees of familiarity with LLMs. While most had only basic knowledge,
    some lacked any prior understanding.
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用频率方面，大多数参与者表示每周都会使用ChatGPT，只有一名学生之前从未使用过ChatGPT。当被问及上周的使用情况时，大多数参与者表示他们上周使用了ChatGPT两次到五次，这突显了ChatGPT的流行度。参与者描述了他们对LLMs熟悉程度的差异。虽然大多数人只有基本知识，但有些人缺乏任何先前的理解。
- en: 3.4.1 Qualitative Data Analysis
  id: totrans-687
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.4.1 定性数据分析
- en: The qualitative data analysis, encompassing 1,914 words, provided insights into
    the participants’ technical knowledge, usage behavior, perceived strengths and
    weaknesses of ChatGPT, and its limitations in various contexts.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 定性数据分析，包括1,914个单词，提供了关于参与者技术知识、使用行为、对ChatGPT感知优势和劣势以及其在不同情境下的局限性的见解。
- en: Participants recognized ChatGPT as useful for simple queries but noted its limitations
    in handling complex ones, often resulting in conflicting outputs. Participants
    said that ChatGPT is based on a vast database of training data and improves over
    time.
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 参与者认为ChatGPT对于简单查询很有用，但指出它在处理复杂查询时的局限性，通常会导致冲突的输出。参与者表示，ChatGPT基于庞大的训练数据集，并且随着时间的推移而改进。
- en: '**Areas of Application**: Participants reported using ChatGPT for a range of
    activities, including coding, literature review, brainstorming, general work tasks,
    posing questions, idea generation, explanations, text generation, creating summaries,
    and creative work.'
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: '**应用领域**：参与者报告说他们使用ChatGPT进行各种活动，包括编码、文献综述、头脑风暴、一般工作任务、提问、创意生成、解释、文本生成、创建摘要和创造性工作。'
- en: '**Perceived Weaknesses of ChatGPT**: The qualitative data highlighted several
    weaknesses of ChatGPT. Participants pointed out instances of incorrect references
    and information, hallucinations (generation of factually incorrect or nonsensical
    content), reliance on outdated information (up to 2021), and challenges in controlling
    plagiarism.'
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT的感知弱点**：定性数据突出了ChatGPT的几个弱点。参与者指出了一些不正确引用和信息、幻觉（生成事实错误或无意义的内容）、依赖过时信息（截至2021年）以及在控制剽窃方面的挑战。'
- en: '**Perceived Strengths of ChatGPT**: Conversely, ChatGPT was praised for its
    ability to provide new information quickly, facilitate various processes, and
    offer ease of use. It was also valued for its assistance in answering questions,
    aiding in formulation, enhancing efficiency, and generating ideas.'
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT的感知优势**：相反，ChatGPT因其能够快速提供新信息、促进各种流程和提供易用性而受到赞扬。它还因其帮助回答问题、协助制定、提高效率和生成想法而受到重视。'
- en: '**Limitations of ChatGPT**: Participants noted several general limitations
    of ChatGPT, including the lack of recent information, difficulty verifying the
    sources of references, the risk of presenting incorrect information as accurate,
    limited creativity, and the challenge of ensuring the correctness of academic
    references. Specifically, in academic writing, concerns were raised about hallucinations
    of references and the difficulty of checking the accuracy of such references.
    Additionally, the lack of access to all research papers and reliance on outdated
    information was noted.'
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT的局限性**：参与者指出了ChatGPT的几个一般性局限性，包括缺乏最新信息、难以验证参考文献的来源、将错误信息作为准确信息呈现的风险、创造力有限以及确保学术参考文献正确性的挑战。具体来说，在学术写作中，人们提出了关于参考文献幻觉和检查此类参考文献准确性的困难。此外，无法访问所有研究论文和依赖过时信息的问题也被指出。'
- en: '**Feasibility of ChatGPT Usage**: Students viewed ChatGPT as feasible for tasks
    such as coding, writing, learning, assistance, creativity, literature review,
    information retrieval, formulation, grammar checks, and brainstorming. However,
    it was deemed not yet feasible for tasks involving mathematics, moral and ethical
    matters, conventional search engine functions, science, reference checking, and
    medical diagnostics.'
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT的使用可行性**：学生们认为ChatGPT在编码、写作、学习、辅助、创造力、文献综述、信息检索、公式制定、语法检查和头脑风暴等任务上是可行的。然而，它被认为在涉及数学、道德和伦理问题、传统搜索引擎功能、科学、参考文献检查和医学诊断的任务上还不可行。'
- en: '**Future Feasibility**: Opinions were divided on the future feasibility of
    ChatGPT. Some participants believed it would never be suitable for inter-human
    interaction, ethical matters, medical tasks, and aspects of creativity. Others
    were more optimistic, suggesting that ChatGPT might become feasible for virtually
    everything.'
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: '**未来可行性**：对于ChatGPT未来可行性的意见存在分歧。一些参与者认为它永远不会适合人际互动、伦理问题、医学任务和创造力的某些方面。其他人则更为乐观，认为ChatGPT可能几乎适用于所有事情。'
- en: 3.4.2 Quantitative Data Analysis
  id: totrans-696
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.4.2 定量数据分析
- en: The quantitative analysis was employed to better understand participants’ acceptance
    and usage of ChatGPT. [Table 3.1](#ch11.xhtml#t4) shows the summary for all UTAUT
    variables. The highest score, on average, was effort expectancy (*M* = 5.76 [5.35;
    6.17]) and behavioral intention to use ChatGPT (*M* = 5.64 [5.07; 6.21]), while
    anxiety had the lowest overall score (*M* = 3.05 [2.41; 3.69]).
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 定量分析被用于更好地理解参与者对ChatGPT的接受和使用情况。[表3.1](#ch11.xhtml#t4)显示了所有UTAUT变量的总结。平均最高分是努力期望（M
    = 5.76 [5.35; 6.17]）和使用ChatGPT的行为意图（M = 5.64 [5.07; 6.21]），而焦虑的整体得分最低（M = 3.05
    [2.41; 3.69])。
- en: '[Table 3.1](#ch11.xhtml#t4b) Means, standard error, and confidence intervals
    of UTAUT variables of the pre-measurement'
  id: totrans-698
