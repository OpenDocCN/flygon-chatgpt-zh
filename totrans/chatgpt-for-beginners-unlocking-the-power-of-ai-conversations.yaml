    ****ong**oin**g ****pro**ject**s ****th**at** ****sp**an** ****mul**tipl**e ****ses**sion**s,
    ****th**is** ****la**ck** ****o**f** ****me**mor**y ****c**an** ****b**e** ****inco**nvenie**nt
    ****a**nd** ****ti**me**-****cons**umin**g.'
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
  zh: '**长期项目中的挑战**：对于跨越多个会话的联合项目，这种记忆缺失可能既不方便又耗时。'
- en: '****Work**around**s ****f**or** ****Con**tex**t ****Rete**ntio**n:'
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文保持的解决方案**：'
- en: '****Ke**ep** ****No**tes**:  ****Mai**ntai**n ****a**** ****re**cor**d ****o**f**
    ****impo**rtan**t ****det**ail**s ****o**r** ****inst**ructio**ns ****t**o** ****rein**troduc**e
    ****wh**en** ****res**umin**g ****wo**rk** ****wi**th** ****Cha**tGP**T.'
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: '**保持笔记**：保持重要细节或指令的记录，以便在重新使用ChatGPT时重新引入。'
