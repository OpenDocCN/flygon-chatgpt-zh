- en: Now let’s run our new and improved Content Moderator Java Discord bot, ContentModeratorBot.java.
    After executing the app, be sure to return back to your Discord server, and start
    asking questions. Figure [7-1](#Fig1) shows the bot in action.![](../images/607613_1_En_7_Chapter/607613_1_En_7_Fig1_HTML.png)
  id: totrans-1136
  prefs: []
  type: TYPE_NORMAL
