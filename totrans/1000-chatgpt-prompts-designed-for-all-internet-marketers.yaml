- en: FILL-IN-THE-BLANK PROMPTS**:**
  prefs: []
  type: TYPE_NORMAL
- en: • Process shared by Stefan Georgi
  prefs: []
  type: TYPE_NORMAL
- en: '• First prompt: Write an Emotional 500 Word Journal Entry'
  prefs: []
  type: TYPE_NORMAL
- en: from the perspective of **[ideal client]** who is struggling with **[pain points]**.
    He feels **[emotions]** and wants to **[dream outcomes]**.
  prefs: []
  type: TYPE_NORMAL
- en: '• Second prompt: Rewrite the above but replace "I" with "you"'
  prefs: []
  type: TYPE_NORMAL
- en: '• Third prompt: Use the above to write a **[word count]** words Sales Letter
    targeting **[ideal client]** who are struggling with **[pain points]**. Promise
    that if they keep reading they’ll see why the REAL reason they haven’t been able
    to **[dream outcome]** is something called **[unique mechanism]**. Offer a product
    named **[name of the product]** which has the main benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: • -**[Benefit 1]**
  prefs: []
  type: TYPE_NORMAL
- en: • -**[Benefit 2]**
  prefs: []
  type: TYPE_NORMAL
- en: • -**[Benefit 3]**
  prefs: []
  type: TYPE_NORMAL
- en: • Give this guarantee **[include guarantee]**, and include these credentials
    **[include credentials]**
  prefs: []
  type: TYPE_NORMAL
- en: '• Fourth prompt: Include follow up instructions like:'
  prefs: []
  type: TYPE_NORMAL
- en: • -Include the fact that we have helped **[number of people]** achieve **[dream
    outcome]**
  prefs: []
  type: TYPE_NORMAL
- en: • -Be more emotional in the intro
  prefs: []
  type: TYPE_NORMAL
- en: • -Include these testimonials across the page **[paste testimonials]**
  prefs: []
  type: TYPE_NORMAL
- en: • -Use storytelling before mentioning the price
  prefs: []
  type: TYPE_NORMAL
- en: • -Include a headline that mentions these **[pain points]** and **[desires]**
  prefs: []
  type: TYPE_NORMAL
- en: 'EXAMPLE:'
  prefs: []
  type: TYPE_NORMAL
- en: • Write an Emotional 500 Word Journal Entry from the perspective of a salon
    owner who is struggling with burnout and working far too many hours. She feels
    exhausted and wants to scale her business while delegating work to a team.
  prefs: []
  type: TYPE_NORMAL
- en: • Rewrite the above but replace "I" with "you".
  prefs: []
  type: TYPE_NORMAL
- en: '• Use the above to write a 1000 words Sales Letter targeting salon owners who
    are struggling with burnout after working far too many hours. Promise that if
    they keep reading they’ll see why the REAL reason they haven’t been able to increase
    profits and build a team is something called “Poverty Pricing”. Offer a product
    named “Scale Behind the Chair” which has the main benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: • -Price as a luxury salon
  prefs: []
  type: TYPE_NORMAL
- en: • -Attract premium clients
  prefs: []
  type: TYPE_NORMAL
- en: • Work 4 hours a week
  prefs: []
  type: TYPE_NORMAL
- en: • Guarantee that if they don’t make $20000 dollars in their 6 months you will
    give them 3 months of free coaching for free, and mention that the instructor
    has helped 200 salon owners reach 7 figures while working 4 hours per week.
  prefs: []
  type: TYPE_NORMAL
- en: •
  prefs: []
  type: TYPE_NORMAL
- en: '• Result (without including testimonials, buttons, a bio, or a value stack):'
  prefs: []
  type: TYPE_NORMAL
- en: '• Scale Behind the Chair: The 6-Month Accelerator to Create a 7-Figure Salon
    While Working 4 Hours Per Week'
  prefs: []
  type: TYPE_NORMAL
- en: • Dear Salon Owner,
  prefs: []
  type: TYPE_NORMAL
- en: • Imagine waking up feeling completely burned out after working countless hours
    and sacrificing time with your loved ones just to keep your business running.
    You're exhausted, but you know you need to do something to increase your profits
    and build a team to take some weight off your shoulders.
  prefs: []
  type: TYPE_NORMAL
- en: • But, no matter how hard you try, it seems like you just can't seem to get
    ahead. You're stuck in a cycle of long hours and overwhelming stress, unable to
    see a way out.
  prefs: []
  type: TYPE_NORMAL
- en: • It's a story all too familiar to many salon owners, and it was once my story
    too.
  prefs: []
  type: TYPE_NORMAL
- en: • But, what if I told you that the real reason you haven't been able to increase
    profits and build a team is something called "Poverty Pricing"?
  prefs: []
  type: TYPE_NORMAL
- en: • As a former salon owner who struggled with burnout just like you, I know how
    frustrating it can be to feel like you're stuck in a never-ending cycle of hard
    work with no results. But, what I discovered after years of struggling was that
    the key to success in the salon industry was pricing my services as a luxury salon.
  prefs: []
  type: TYPE_NORMAL
- en: • This is why I created "Scale Behind the Chair," a program specifically designed
    to help salon owners like you price their services as a luxury salon, attract
    premium clients, and work only 4 hours a week.
  prefs: []
  type: TYPE_NORMAL
- en: • Not only have I used these principles to grow my own successful salon, but
    I have also helped over 200 other salon owners reach 7 figures while working only
    4 hours per week. And, I'm confident that I can do the same for you.
  prefs: []
  type: TYPE_NORMAL
- en: • That's why I'm offering a guarantee. If after 6 months of using the strategies
    and techniques in "Scale Behind the Chair," you don't make $20,000, I'll give
    you 3 months of free coaching for free.
  prefs: []
  type: TYPE_NORMAL
- en: • It's time to say goodbye to burnout and hello to a profitable, successful
    salon. Keep reading to learn more about "Scale Behind the Chair" and take the
    first step towards a better future for your business and your life.
  prefs: []
  type: TYPE_NORMAL
- en: • Sincerely,
  prefs: []
  type: TYPE_NORMAL
- en: • [Your Name]
  prefs: []
  type: TYPE_NORMAL
