- en: 10 Prompts for Using Images with GPT-4o
  id: totrans-1901
  prefs: []
  type: TYPE_NORMAL
  zh: 10个使用GPT-4o与图片结合的提示
- en: 1\. Creating a Recipe from Ingredients
  id: totrans-1902
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 从食材创建食谱
- en: 'Prompt: “I’ve taken a picture of the inside of my fridge. Can you create a
    healthy recipe using these ingredients?”'
  id: totrans-1903
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我拍了冰箱内部的照片。你能用这些食材制作一个健康食谱吗？”
- en: 'Example: Take a photo of your fridge’s contents, upload it, and ask for a recipe.'
  id: totrans-1904
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：拍下冰箱里的内容，上传，并请求食谱。
- en: 2\. Identifying Landmarks
  id: totrans-1905
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 识别地标
- en: 'Prompt: “Here’s a photo I took while traveling. Can you identify this landmark
    and tell me more about its history?”'
  id: totrans-1906
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “这是我旅行时拍的照片。你能识别这个地标并告诉我更多关于它的历史吗？”
- en: 'Example: Upload a photo of a famous building and ask for information about
    it.'
  id: totrans-1907
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：上传一幅著名建筑的图片，并请求关于它的信息。
- en: 3\. Diagnosing Plant Issues
  id: totrans-1908
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 诊断植物问题
- en: 'Prompt: “This is a picture of my houseplant. Can you tell me what might be
    wrong with it and how to fix it?”'
  id: totrans-1909
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “这是我盆栽的照片。你能告诉我它可能出了什么问题以及如何修复吗？”
- en: 'Example: Take a photo of a plant with yellow leaves and ask for advice on plant
    care.'
  id: totrans-1910
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：拍下叶子发黄的植物照片，并请求关于植物护理的建议。
- en: 4\. Translating Menus
  id: totrans-1911
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 翻译菜单
- en: 'Prompt: “I took a picture of a menu in a foreign language. Can you translate
    it and suggest some popular dishes?”'
  id: totrans-1912
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我拍了一张外文菜单的照片。你能翻译它并推荐一些受欢迎的菜肴吗？”
- en: 'Example: Upload a photo of a restaurant menu in another language and get translations
    and dish recommendations.'
  id: totrans-1913
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：上传另一语言的餐厅菜单照片，并获得翻译和菜式推荐。
- en: 5\. Exploring Artwork
  id: totrans-1914
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 探索艺术品
- en: 'Prompt: “Here’s a picture of a painting I like. Can you tell me about the artist
    and the style of this artwork?”'
  id: totrans-1915
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “这是我喜欢的画作的照片。你能告诉我关于这位艺术家和这幅艺术作品风格的信息吗？”
- en: 'Example: Upload an image of a painting and learn about its background and artistic
    style.'
  id: totrans-1916
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：上传一幅绘画的图片，了解其背景和艺术风格。
- en: 6\. Creating Exercise Plans
  id: totrans-1917
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 创建锻炼计划
- en: 'Prompt: “I took a photo of my home gym equipment. Can you create a workout
    plan using these items?”'
  id: totrans-1918
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我拍了我家健身房设备的照片。你能用这些物品制定一个锻炼计划吗？”
- en: 'Example: Upload a picture of your gym setup and receive a tailored exercise
    routine.'
  id: totrans-1919
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：上传你的健身器材照片，并接收定制的锻炼计划。
- en: 7\. Shopping for Groceries
  id: totrans-1920
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 购物
- en: 'Prompt: “Here’s a photo of my grocery list. Can you suggest a few meals I can
    make with these items?”'
  id: totrans-1921
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “这是我购物清单的照片。你能建议一些我能用这些物品做的菜吗？”
- en: 'Example: Upload an image of your grocery list and get meal suggestions based
    on the items listed.'
  id: totrans-1922
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：上传你的购物清单照片，根据列出的物品获得餐点建议。
- en: 8\. Fashion Advice
  id: totrans-1923
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 时尚建议
- en: 'Prompt: “I took a picture of my wardrobe. Can you help me put together an outfit
    for a job interview?”'
  id: totrans-1924
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我拍了我衣橱的照片。你能帮我为面试搭配一套服装吗？”
- en: 'Example: Upload a photo of your clothes and get outfit recommendations for
    different occasions.'
  id: totrans-1925
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：上传你的衣服照片，获取不同场合的着装推荐。
- en: 9\. Home Improvement Ideas
  id: totrans-1926
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 家居改善想法
- en: 'Prompt: “Here’s a picture of my living room. Can you suggest some decoration
    or layout changes to improve it?”'
  id: totrans-1927
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “这是我客厅的图片。你能给我一些建议来改善装饰或布局吗？”
- en: 'Example: Upload an image of your living room and get tips on how to rearrange
    or decorate it.'
  id: totrans-1928
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：上传你客厅的图片，获取如何重新布置或装饰的建议。
- en: 10\. Documenting and Summarizing Notes
  id: totrans-1929
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 记录和总结笔记
- en: 'Prompt: “I took a picture of my handwritten notes from a meeting. Can you summarize
    the key points for me?”'
  id: totrans-1930
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我拍下了会议的手写笔记。你能为我总结关键点吗？”
- en: 'Example: Upload a photo of your notes and receive a concise summary of the
    main points discussed.'
  id: totrans-1931
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：上传你的笔记照片，并接收讨论主要观点的简洁摘要。
- en: 10 Prompts for Using Audio with GPT-4o
  id: totrans-1932
  prefs: []
  type: TYPE_NORMAL
  zh: 10个使用GPT-4o音频的提示
- en: 1\. Transcribing Voice Memos
  id: totrans-1933
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 转录语音备忘录
- en: 'Prompt: “I’m going to record a voice memo. Can you transcribe it for me?”'
  id: totrans-1934
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我将录制一个语音备忘录。你能帮我转录吗？”
- en: 'Example: Speak directly to ChatGPT and ask it to convert your spoken words
    to text.'
  id: totrans-1935
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：直接对ChatGPT说话，并让它将你的口语转换为文本。
- en: 2\. Language Translation
  id: totrans-1936
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 语言翻译
- en: 'Prompt: “I’ll say a sentence in Spanish. Can you translate it to English for
    me?”'
  id: totrans-1937
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我用西班牙语说一句话。你能帮我翻译成英语吗？”
- en: 'Example: Speak the sentence in Spanish to ChatGPT and get an English translation.'
  id: totrans-1938
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：用西班牙语说出句子给ChatGPT听，获取英文翻译。
- en: 3\. Learning Pronunciation
  id: totrans-1939
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 学习发音
- en: 'Prompt: “Listen to my pronunciation of this French phrase and tell me how to
    improve.”'
  id: totrans-1940
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “听我读这个法语短语的发音，并告诉我如何改进。”
- en: 'Example: Say the French phrase aloud and get immediate feedback on your pronunciation.'
  id: totrans-1941
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：大声说出法语短语，并立即获得关于发音的反馈。
- en: 4\. Creating Shopping Lists
  id: totrans-1942
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 创建购物清单
- en: 'Prompt: “I’m going to list my groceries. Can you write them down for me?”'
  id: totrans-1943
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我将列出我的购物清单。你能帮我写下来吗？”
- en: 'Example: Speak your grocery list to ChatGPT and have it create a text list.'
  id: totrans-1944
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：对ChatGPT说出你的购物清单，并让它创建一个文本列表。
- en: 5\. Meeting Summaries
  id: totrans-1945
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 会议摘要
- en: 'Prompt: “I’ll describe what happened in the meeting. Can you summarize the
    key points?”'
  id: totrans-1946
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我将描述会议中发生的事情。你能总结关键点吗？”
- en: 'Example: Describe the meeting verbally to ChatGPT and receive a summary of
    the main points.'
  id: totrans-1947
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：用言语描述会议内容给ChatGPT听，并接收主要观点的摘要。
- en: 6\. Learning New Vocabulary
  id: totrans-1948
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 学习新词汇
- en: 'Prompt: “Listen to me reading new vocabulary words and provide definitions
    and example sentences.”'
  id: totrans-1949
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “听我朗读新词汇，并提供定义和例句。”
- en: 'Example: Read vocabulary words aloud and ask ChatGPT for definitions and example
    sentences.'
  id: totrans-1950
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：大声朗读词汇，并让ChatGPT提供定义和例句。
- en: 7\. Writing Emails
  id: totrans-1951
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 写电子邮件
- en: 'Prompt: “I’m going to describe what I want to say in an email. Can you write
    it for me?”'
  id: totrans-1952
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我将描述我想在电子邮件中说的内容。你能帮我写吗？”
- en: 'Example: Speak your email content to ChatGPT and have it compose the email
    text.'
  id: totrans-1953
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：将你的电子邮件内容说给ChatGPT听，让它帮你撰写电子邮件文本。
- en: 8\. Storytelling
  id: totrans-1954
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 讲故事
- en: 'Prompt: “I’ll tell you a story. Can you write it out for me?”'
  id: totrans-1955
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我要给你讲一个故事。你能把它写出来给我吗？”
- en: 'Example: Narrate your story to ChatGPT and ask it to write it down.'
  id: totrans-1956
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：向ChatGPT讲述你的故事，并让它帮你记录下来。
- en: 9\. Interview Preparation
  id: totrans-1957
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 面试准备
- en: 'Prompt: “I’m going to practice my answers for a job interview. Can you give
    me feedback?”'
  id: totrans-1958
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我将练习我的工作面试回答。你能给我反馈吗？”
- en: 'Example: Speak your interview answers aloud and get feedback on how to improve
    them.'
  id: totrans-1959
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：大声说出你的面试回答，并获得如何改进的反馈。
- en: 10\. Creating Workout Routines
  id: totrans-1960
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 创建锻炼计划
- en: 'Prompt: “I’ll describe my workout preferences. Can you create a workout plan
    based on it?”'
  id: totrans-1961
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “我将描述我的锻炼偏好。你能根据它为我制定一个锻炼计划吗？”
- en: 'Example: Describe your workout preferences and goals to ChatGPT and receive
    a tailored workout plan.'
  id: totrans-1962
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：向ChatGPT描述你的锻炼偏好和目标，并接收一个定制的锻炼计划。
- en: Wrapping up
  id: totrans-1963
  prefs: []
  type: TYPE_NORMAL
  zh: 总结
