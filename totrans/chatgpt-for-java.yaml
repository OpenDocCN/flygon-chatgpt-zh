- en: So, What Exactly Is ChatGPT and Why Do I Need to Use the OpenAI APIs?
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，ChatGPT究竟是什么，为什么我需要使用OpenAI API？
- en: Simply stated, ChatGPT is a group of **language models** (which are the result
    of training deep learning algorithms) developed by OpenAI that is capable of generating
    human-like text responses based on given **prompts**. So what’s a prompt? A prompt
    is simply the input text that you give to ChatGPT. So let’s kick things off by
    giving ChatGPT a prompt to ask how well it’s familiar with Java design patterns
    (Listing [1-1](#PC1)).Describe 3 commonly used design patterns used by Java developers
    and why those patterns are importantListing 1-1
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，ChatGPT 是由 OpenAI 开发的一组 **语言模型**（这些模型是深度学习算法训练的结果），能够根据给定的 **提示**生成类似人类的文本回复。那么什么是提示呢？提示就是您提供给
    ChatGPT 的输入文本。那么让我们先通过给 ChatGPT 提供一个提示来询问它对 Java 设计模式的熟悉程度（见列表 [1-1](#PC1)）。描述
    3 种 Java 开发者常用的设计模式及其为什么这些模式很重要
- en: PROMPT. A Simple Prompt with ChatGPT About Java Design Patterns
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: PROMPT. 关于 Java 设计模式的简单提示与 ChatGPT
- en: 'If you’ve had the opportunity to work at a company using Java professionally,
    then you’ve probably received a question very similar to the prompt above in an
    interview. Listing [1-2](#PC2) is ChatGPT’s response.![](../images/607613_1_En_1_Chapter/607613_1_En_1_Figb_HTML.gif)The
    chat G P T logo.Certainly! Design patterns are reusable solutions to common problems
    that arise in software design. They are best practices that experienced developers
    have discovered and refined over time. Java developers frequently utilize design
    patterns due to the language''s object-oriented nature. Here are three commonly
    used design patterns in Java:1\. Singleton Pattern:   - Purpose: This pattern
    ensures that a class has only one instance and provides a global point of access
    to that instance. It''s particularly useful when you want to control access to
    shared resources, such as configuration managers or connection pools.   - Importance:
    The Singleton pattern is important because it provides a controlled mechanism
    to prevent creating multiple instances of a class, which can save memory and synchronize
    access to resources. Moreover, it ensures that operations using the singleton
    are using the same instance and data, which is critical in scenarios where consistent
    state or coordinated actions are required.2\. Observer Pattern:   - Purpose: This
    pattern defines a one-to-many dependency between objects. When one object (known
    as the subject or observable) changes its state, all of its dependents (observers)
    are notified and updated automatically. It''s the underlying principle behind
    the Model-View-Controller (MVC) architecture, where the model is the subject and
    the views are observers.   - Importance: The Observer pattern is vital for building
    systems that are modular and decoupled. Changes in one part of the system don''t
    directly affect others, allowing for easier maintenance and scalability. This
    pattern also makes it easier to add new observers without modifying existing code,
    enhancing the system''s extensibility.3\. Factory Pattern:   - Purpose: The Factory
    pattern provides an interface for creating instances of a class, but it''s up
    to the derived subclasses to implement the method and determine which class to
    instantiate. It promotes the loose coupling by eliminating the need to bind application-specific
    classes into the code. Instead, the code interacts only with the resulting interface
    or abstract class, so the system can evolve without altering the calling code.   -
    Importance: Using the Factory pattern, a system can be more flexible and scalable.
    If there''s a need to introduce a new product or modify an existing one, it can
    be done without disturbing the existing code. It encapsulates the object creation
    process and separates it from the main logic of the program, promoting the Single
    Responsibility Principle. This ensures that a class is only responsible for one
    reason to change.All these patterns, and many more, provide a vocabulary for developers,
    making it easier to communicate complex software designs and concepts. They embody
    solutions to recurring problems and can significantly speed up the development
    process, reduce errors, and improve code quality.Listing 1-2'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾经有机会在一家使用Java作为专业语言的公司工作，那么你可能在面试中遇到过与上面提示非常相似的问题。列出[1-2](#PC2)是ChatGPT的回答。![聊天GPT标志](../images/607613_1_En_1_Chapter/607613_1_En_1_Figb_HTML.gif)当然！设计模式是针对在软件设计中出现的常见问题的可重用解决方案。它们是经验丰富的开发者经过时间发现和完善的最佳实践。Java开发者经常利用设计模式，因为这种语言具有面向对象的特点。以下是Java中常用的三种设计模式：1.
    单例模式：   - 目的：此模式确保一个类只有一个实例，并提供一个全局访问该实例的点。当需要控制对共享资源（如配置管理器或连接池）的访问时，特别有用。   -
    重要性：单例模式很重要，因为它提供了一个受控的机制来防止创建类的多个实例，这可以节省内存并同步对资源的访问。此外，它确保使用单例的操作使用的是相同的实例和数据，这在需要一致状态或协调动作的场景中至关重要。2.
    观察者模式：   - 目的：此模式定义了对象之间的一对多依赖关系。当一个对象（称为主题或可观察对象）改变其状态时，所有依赖的对象（观察者）都会被通知并自动更新。这是模型-视图-控制器（MVC）架构背后的基本原理，其中模型是主题，视图是观察者。   -
    重要性：观察者模式对于构建模块化和解耦的系统至关重要。系统某一部分的更改不会直接影响到其他部分，这使得维护和扩展更容易。此模式还使得在不修改现有代码的情况下添加新的观察者变得更容易，增强了系统的可扩展性。3.
    工厂模式：   - 目的：工厂模式提供了一个创建类实例的接口，但具体实现方法和确定要实例化的类由派生子类来完成。它通过消除将应用程序特定的类绑定到代码中的需求来促进松散耦合。代码仅与结果接口或抽象类交互，因此系统可以在不更改调用代码的情况下进化。   -
    重要性：使用工厂模式，系统可以更加灵活和可扩展。如果需要引入新产品或修改现有产品，可以做到而不影响现有代码。它封装了对象创建过程，并将其与程序的主要逻辑分离，促进了单一职责原则。这确保了一个类只负责一个原因而改变。所有这些模式，以及许多其他模式，为开发者提供了一种词汇，使得沟通复杂的软件设计和概念更容易。它们体现了对重复问题的解决方案，可以显著加快开发过程，减少错误，并提高代码质量。列出1-2
- en: RESPONSE. ChatGPT’s Response to the Prompt in Listing [1-1](#PC1)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**回应**. ChatGPT对列表 [1-1](#PC1) 中提示的回应'
- en: Not bad, huh? ChatGPT was not only able to provide a list of common design patterns
    used by Java developers, but also explain valid reasons on why they are important
    – all done in Natural Language.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 不坏，对吧？ChatGPT不仅能够提供Java开发者常用的设计模式列表，还能用自然语言解释为什么它们很重要。
- en: So, at the end of the day, what does this mean for Java developers? Well, it’s
    actually a big deal. That’s because developers are now able to create applications
    that can have some type of “understanding” of text in Natural Language. Before
    the advent of AI tools like ChatGPT, developers typically had to create regular
    expressions (also called “regex”) in order to perform rudimentary character and
    String pattern matching within a body of text. However, pattern matching and Natural
    Language Understanding are two totally different things.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，最终，这对Java开发者意味着什么呢？实际上，这是一个很大的事情。这是因为开发者现在能够创建能够对自然语言文本进行某种“理解”的应用程序。在ChatGPT等AI工具出现之前，开发者通常必须创建正则表达式（也称为“regex”），以便在文本中进行基本的字符和字符串模式匹配。然而，模式匹配和自然语言理解是两件完全不同的事情。
- en: 'Regex vs. ChatGPT: Fight!'
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 正则表达式与ChatGPT：对决！
- en: '**Note**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**'
- en: If you already know that a regular expression can’t perform Natural Language
    Understanding or sentiment analysis, then feel free to skip this section.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经知道正则表达式无法执行自然语言理解或情感分析，那么你可以自由地跳过这一部分。
- en: I’m thoroughly convinced that every programmer somewhere in their lifetime has
    met *some guy* who happens to be an expert in writing regular expressions. Regular
    expressions are great because they serve the purpose of being able to parse large
    amounts of text in order to find patterns within the text programmatically.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我坚信，每个程序员在其一生中都会遇到某个擅长编写正则表达式的“家伙”。正则表达式很棒，因为它们能够解析大量文本，以编程方式在文本中查找模式。
- en: However, one of the biggest downsides to regular expressions is that once they
    have been written, they are extremely difficult to read (in my opinion, even by
    the developer who originally wrote it).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，正则表达式的一个最大的缺点是，一旦编写完成，它们就极其难以阅读（在我看来，即使是最初编写它们的开发者也很难读懂）。
- en: So let’s see how regex holds up against ChatGPT, which has Natural Language
    Processing (NLP) and Natural Language Understanding (NLU) capabilities.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们看看正则表达式与具有自然语言处理（NLP）和自然语言理解（NLU）能力的ChatGPT相比表现如何。
- en: 'Listing [1-3](#PC3) is a story of an impractically sad situation. However,
    it drives home the point that although regular expressions can be used to find
    words and phrases within a body of text, it can’t be used to provide any type
    of NLU.In the city of Buttersville,USA on Milkmaid street, there’s a group of
    three friends: Marion Yogurt, Janelle de Queso, and Steve Cheeseworth III. On
    a hot summer’s day, they heard the music from an ice cream truck, and decided
    to buy something to eat.Marion likes strawberries, Janelle prefers chocolate,
    and Steve is lactose intolerant. That day, only two kids ate ice cream, and one
    of them bought a bottle of room-temperature water. The ice cream truck was fully
    stocked with the typical flavors of ice cream.Listing 1-3'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [1-3](#PC3) 讲述了一个不切实际的悲伤情况。然而，它强调了尽管正则表达式可以用来在文本中查找单词和短语，但它不能用来提供任何类型的自然语言理解（NLU）。在美国Buttersville市的Milkmaid街上，有三名朋友：Marion
    Yogurt、Janelle de Queso和Steve Cheeseworth III。在一个炎热的夏日，他们听到了冰淇淋车的音乐，决定买些东西吃。Marion喜欢草莓，Janelle喜欢巧克力，而Steve对乳糖不耐受。那天，只有两个孩子吃了冰淇淋，其中一个孩子买了一瓶室温的水。冰淇淋车装满了典型的冰淇淋口味。列表
    1-3
- en: Sadstory.txt - A Sad Story About a Kid Who Didn’t Eat Ice Cream
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: Sadstory.txt - 一个关于一个没吃冰淇淋的孩子的悲伤故事
- en: 'Analysis Question #1: Who Didn’t Get Any Ice Cream and Why?'
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '分析问题 #1：谁没有吃到冰淇淋，原因是什么？'
- en: Now let’s analyze this for a bit and ask some questions among ourselves. First
    of all, who didn’t get any ice cream and why? The obvious answer is that Steve
    did not get any ice cream because of his lactose intolerance. However, since the
    story did not directly say that Steve did not buy ice cream, there’s no way for
    a regular expression to match a text pattern in the story.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来分析一下这个问题，并互相提出一些问题。首先，谁没有吃到冰淇淋，原因是什么？显然的答案是史蒂夫因为乳糖不耐症而没有吃到冰淇淋。然而，由于故事中没有直接说明史蒂夫没有买冰淇淋，所以正则表达式无法匹配故事中的文本模式。
- en: The regular expression could look for keywords such as “didn’t have,” “no ice
    cream,” or the names of the kids. However, it would only be able to provide a
    response based on the presence of these patterns. For example, if the regular
    expression matches the pattern “didn’t have” or “no ice cream” with Steve’s name,
    it could show you the result of the text pattern. However, it certainly wouldn’t
    be able to explain **why** Steve was the one who didn’t have ice cream or provide
    any context-specific reasoning.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 正则表达式可以查找诸如“didn’t have”、“no ice cream”或孩子的名字等关键词。然而，它只能根据这些模式的存在提供响应。例如，如果正则表达式与“didn’t
    have”或“no ice cream”与Steve的名字匹配，它可以显示文本模式的结果。然而，它肯定无法解释**为什么**Steve没有得到冰淇淋，或提供任何特定于上下文的推理。
- en: 'Now, let’s provide the same story to ChatGPT and ask the question, “Who didn’t
    get any ice cream?” Listing [1-4](#PC4) takes our question and the preceding story
    and puts both together as a prompt.Using the information in the following story,
    who didn''t get any ice cream and why?###In the city of Buttersville,USA on Milkmaid
    street, there’s a group of three friends: Marion Yogurt, Janelle de Queso, and
    Steve Cheeseworth III. On a hot summer’s day, they heard the music from an ice
    cream truck, and decided to buy something to eat.Marion likes strawberries, Janelle
    prefers chocolate, and Steve is lactose intolerant. That day, only two kids ate
    ice cream, and one of them bought a bottle of room-temperature water. The ice
    cream truck was fully stocked with the typical flavors of ice cream.Listing 1-4'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将同样的故事提供给ChatGPT并提问，“谁没有得到冰淇淋？”列表[1-4](#PC4)将我们的问题和前面的故事结合起来作为一个提示。使用以下故事中的信息，谁没有得到冰淇淋以及为什么？###在美国的Buttersville市牛奶女仆街上，有三个朋友：Marion酸奶、Janelle
    de Queso和Steve Cheeseworth III。在一个炎热的夏日，他们听到了冰淇淋车的音乐，决定买些东西吃。Marion喜欢草莓，Janelle喜欢巧克力，而Steve对乳糖不耐受。那天，只有两个孩子吃了冰淇淋，其中一个买了一瓶室温的水。冰淇淋车装满了典型的冰淇淋口味。列表1-4
- en: PROMPT. The Sad Story Put into a Prompt
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 提示。将悲伤的故事放入提示中
- en: Notice how it is a best practice to provide some type of separation, in this
    case, “###”, when creating a prompt (like the one above) where you have both instructions
    and data together. Later on, when we start using either the Playground or Java
    to programmatically invoke the ChatGPT API, you’ll see that there’s a much better
    way to provide that separation.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在创建包含指令和数据（如上述示例）的提示时，提供某种类型的分隔是一种最佳实践，在这种情况下是“###”。稍后，当我们开始使用游乐场或Java以编程方式调用ChatGPT
    API时，你会看到有更好的方法来提供这种分隔。
- en: So, after sending the prompt, ChatGPT will provide you an answer as shown in
    Listing [1-5](#PC5).![](../images/607613_1_En_1_Chapter/607613_1_En_1_Figc_HTML.gif)The
    chat G P T logo.Based on the given information, Steve is lactose intolerant and
    therefore cannot eat ice cream. Therefore, Steve is the one who didn't get any
    ice cream.Listing 1-5
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在发送提示后，ChatGPT将提供如列表[1-5](#PC5)所示的答案。![](../images/607613_1_En_1_Chapter/607613_1_En_1_Figc_HTML.gif)Chat
    G P T标志。根据给定信息，Steve对乳糖不耐受，因此不能吃冰淇淋。因此，Steve是那个没有得到冰淇淋的人。列表1-5
- en: 'RESPONSE. ChatGPT’s Answer to Analysis Question #1'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '回复。ChatGPT对分析问题 #1 的回答'
- en: As you can see, ChatGPT can utilize NLP and NLU, and therefore it can *understand*
    (artificially intelligently, that is) the context of the scenario. It can interpret
    the relationships between the kids, their preferences, and Steve’s lactose intolerance.
    It is able to understand that the last names of the children, the street name,
    and the city name are the names of dairy products, but are obviously irrelevant
    to the question at hand.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，ChatGPT可以利用NLP和NLU，因此它能够*理解*（即通过人工智能）场景的上下文。它能够解释孩子们之间的关系、他们的喜好以及史蒂夫的乳糖不耐症。它能够理解孩子们的姓氏、街道名称和城市名称是乳制品的名称，但显然与当前的问题无关。
- en: 'Analysis Question #2: Which Kid Was Probably Left Sad?'
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '分析问题 #2：哪个孩子可能感到难过？'
- en: Now, to further prove the point that a regular expression is unable to provide
    any type of NLP or NLU, now let’s use a new term called **sentiment analysis**.
    Therefore, after the ice cream truck drove away, which kid was left sad?
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，为了进一步证明正则表达式无法提供任何类型的NLP或NLU，让我们使用一个新术语，称为**情感分析**。因此，在冰淇淋车开走之后，哪个孩子感到难过？
- en: Since the story had no mention of any of the children’s feelings or emotions,
    there is no text pattern that would allow any regular expression to return a match.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 由于故事中没有提及任何孩子的感受或情绪，没有文本模式能让任何正则表达式返回匹配结果。
- en: However, if you posed the same question to ChatGPT, it will return a response
    as shown in Listing [1-6](#PC6).![](../images/607613_1_En_1_Chapter/607613_1_En_1_Figd_HTML.gif)The
    chat G P T logo.Since Steve is lactose intolerant and cannot eat ice cream, he
    would be the kid left sad because he couldn't enjoy the ice cream like Marion
    and Janelle.Listing 1-6
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果你向ChatGPT提出相同的问题，它将返回如列表[1-6](#PC6)中所示的反应。![图d](../images/607613_1_En_1_Chapter/607613_1_En_1_Figd_HTML.gif)Chat
    G P T标志。由于Steve对乳糖不耐受，不能吃冰淇淋，所以他将是那个因为不能像Marion和Janelle一样享受冰淇淋而感到悲伤的孩子。列表1-6
- en: 'RESPONSE. ChatGPT’s Answer to Analysis Question #2'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 反应。ChatGPT对分析问题#2的回答
- en: Therefore, ChatGPT is able to comprehend the scenario, reason through the information,
    and provide a correct answer along with an *explanation* for that answer.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，ChatGPT能够理解场景，推理信息，并针对该答案提供*解释*。
- en: Let’s Unlearn Some Words in Order to Learn More About the ChatGPT API
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让我们忘掉一些词汇，以便更好地了解ChatGPT API。
- en: First of all, before you get started working with the ChatGPT and OpenAI APIs,
    there are few words and terms that you should be familiar with first; otherwise,
    things won’t exactly make sense. So let’s make sure that we’re all clear on the
    definition of Models, Prompts, Tokens, and Temperature when using ChatGPT programmatically.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，在你开始使用ChatGPT和OpenAI API之前，有一些单词和术语你应该先熟悉；否则，事情可能不会完全明了。所以让我们确保我们所有人都清楚在使用ChatGPT编程时对模型、提示、标记和温度的定义。
- en: Models. Models? Models!!!
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型。模型？模型！！！
- en: As a Java developer, when you hear the term “model,” you may immediately think
    of object-oriented programming and the representation of real-world entities in
    your Java class, right? For example, think of the term, “object model.” Additionally,
    if you’re ever worked with any type of database before, then the term “model”
    may ALSO conjure into your mind the idea of the representation of data and their
    relationships in your database. For example, think of the term, “data model.”
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名Java开发者，当你听到“模型”这个词时，你可能立刻会想到面向对象编程以及你在Java类中代表现实世界实体的方式，对吧？例如，想想“对象模型”这个术语。另外，如果你之前曾与任何类型的数据库合作过，那么“模型”这个术语也可能让你联想到数据及其在数据库中的关系。例如，想想“数据模型”这个术语。
- en: However, when working with the ChatGPT APIs (and artificial intelligence in
    general, for that matter), you need to forget both of those definitions, because
    they don’t apply. In the realm of artificial intelligence, a “model” is a pre-trained
    **neural network**.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当使用ChatGPT API（以及一般的人工智能）时，你需要忘记这两个定义，因为它们不适用。在人工智能领域，“模型”是一个预训练的**神经网络**。
- en: Remember, as I mentioned earlier, you won’t need a PhD in Machine Learning in
    order to read this book. So what’s a neural network? Simply stated, a neural network
    is a fundamental component of artificial intelligence systems, because they are
    designed to simulate the way the human brain works by using interconnected layers
    of artificial neurons to process and analyze data. These networks can be trained
    on vast amounts of data to learn patterns, relationships, and to make predictions.![](../images/607613_1_En_1_Chapter/607613_1_En_1_Fig1_HTML.png)
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，正如我之前提到的，你不需要机器学习博士学位就能阅读这本书。那么神经网络是什么呢？简单来说，神经网络是人工智能系统的一个基本组成部分，因为它们通过使用相互连接的人工神经元层来模拟人脑的工作方式，以处理和分析数据。这些网络可以在大量数据上训练，以学习模式、关系并做出预测。![图1-1](../images/607613_1_En_1_Chapter/607613_1_En_1_Fig1_HTML.png)
- en: A graphic illustrates how the various data sources are connected to a Chat G
    P T model employed with Chat G P T.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅图展示了各种数据源如何连接到Chat G P T模型。
- en: Figure 1-1
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-1
- en: An AI Model Is Trained on Vast Amounts of Data
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能模型是在大量数据上训练的。
- en: In the context of AI, a “pre-trained model” refers to a neural network that
    has been trained on a specific task or dataset before being made available for
    use by developers. This training process involves exposing the model to large
    amounts of labeled and categorized (also called, “annotated”) data and adjusting
    its internal parameters to optimize its performance on the given task.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能的背景下，“预训练模型”指的是在提供给开发者使用之前，已经在特定任务或数据集上训练过的神经网络。这个过程涉及将模型暴露于大量标记和分类（也称为“注释”）的数据中，并调整其内部参数以优化其在给定任务上的性能。
- en: Let’s look at some of the models provided by OpenAI for developers to use to
    AI-enable their applications.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看 OpenAI 为开发者提供的部分模型，以便他们可以使用这些模型将应用程序 AI 化。
- en: '| GPT-4 | GPT-4 is the latest generation of OpenAI’s GPT set of models. GPT
    stands for Generative Pre-trained Transformer, and these models have been trained
    to understand natural language as well as multiple programming languages. The
    GPT-4 models take text and images as inputs as the prompt and provide text as
    the output.Some of the GPT-4 models available are• gpt-4• gpt-4-32k• gpt-4-vision
    |'
  id: totrans-78
  prefs: []
  type: TYPE_TB
  zh: '| GPT-4 | GPT-4 是 OpenAI GPT 模型系列的最新一代。GPT 代表生成预训练转换器，这些模型经过训练，可以理解自然语言以及多种编程语言。GPT-4
    模型接受文本和图像作为提示输入，并以文本作为输出。一些可用的 GPT-4 模型有：• gpt-4• gpt-4-32k• gpt-4-vision |'
- en: '| GPT-3.5 | GPT-3.x is the previous generation of OpenAI’s GPT set of models.
    The original ChatGPT released to the public in November 2022 used GPT 3.Some of
    the GPT-3 models available are• gpt-3.5-turbo• gpt-3.5-turbo-16k |'
  id: totrans-79
  prefs: []
  type: TYPE_TB
  zh: '| GPT-3.5 | GPT-3.x 是 OpenAI GPT 模型系列的上一代。2022 年 11 月向公众发布的原始 ChatGPT 使用了 GPT
    3。一些可用的 GPT-3 模型有：• gpt-3.5-turbo• gpt-3.5-turbo-16k |'
- en: '| DALL·E | The DALL·E model can generate and edit images given a natural language
    prompt.Later in this book in Chapter [4](607613_1_En_4_Chapter.xhtml), we’re going
    to have some fun with the DALL·E model to visualize the conversation of what is
    being discussed in your favorite podcast episode.Some of the DALL·E models available
    are• dall-e-3• dall-e-2 |'
  id: totrans-80
  prefs: []
  type: TYPE_TB
  zh: '| DALL·E | DALL·E 模型可以根据自然语言提示生成和编辑图像。在这本书的第四章中，我们将使用 DALL·E 模型来可视化您最喜欢的播客节目中正在讨论的内容的对话。一些可用的
    DALL·E 模型有：• dall-e-3• dall-e-2 |'
- en: '| TTS | The TTS model takes text and converts it to audio with surprisingly
    good results. In most cases, the audio is almost indistinguishable from a human
    voice.Some of the TTS models available are• tts-1• tts-1-hd |'
  id: totrans-81
  prefs: []
  type: TYPE_TB
  zh: '| TTS | TTS 模型将文本转换为音频，效果出奇地好。在大多数情况下，音频几乎与人类声音无法区分。一些可用的 TTS 模型有：• tts-1•
    tts-1-hd |'
- en: '| Whisper | Simply stated, the Whisper model converts audio into text.In this
    book, we’re going to use the Whisper model to search for text in a podcast episode.
    |'
  id: totrans-82
  prefs: []
  type: TYPE_TB
  zh: '| Whisper | 简单来说，Whisper 模型将音频转换为文本。在这本书中，我们将使用 Whisper 模型在播客节目中搜索文本。 |'
- en: '| Embeddings | The Embeddings model can convert large amounts of text into
    a numerical representation of how the Strings in the text are related. So how
    is that useful? Embeddings allows developers to do specific tasks using custom
    datasets. Yes, this means that you can train the embeddings model on specific
    data that is relevant to your application. This allows you to do operations such
    as• Searching within your own body of text• Clustering data so that Strings of
    text are grouped by their similarity• Getting Recommendations (where items with
    related text strings are recommended)• Detecting Anomalies (where outliers with
    little relatedness are identified)• Measuring Diversity (where similarity distributions
    are analyzed)• Classifying Data (where text strings are classified by their most
    similar label) |'
  id: totrans-83
  prefs: []
  type: TYPE_TB
  zh: '| 嵌入模型 | 嵌入模型可以将大量文本转换为文本中字符串之间关系的数值表示。那么这有什么用呢？嵌入模型允许开发者使用自定义数据集执行特定任务。是的，这意味着您可以在与您的应用程序相关的特定数据上训练嵌入模型。这使您能够执行以下操作：•
    在您自己的文本体中进行搜索• 将数据聚类，以便文本字符串根据其相似性分组• 获取推荐（推荐具有相关文本字符串的项目）• 检测异常（识别出关系较少的异常值）•
    测量多样性（分析相似性分布）• 对数据进行分类（根据最相似的标签对文本字符串进行分类） |'
- en: '| Moderation | The moderation models are fine-tuned models that can detect
    whether text may be sensitive or unsafe. These models can analyze text content
    and classify it according to the following categories:• Hate• Hate/threatening• Harassment• Harassment/threatening• Self-harm• Self-harm/intent• Self-harm/instructions• Sexual• Sexual/minors• Violence• Violence/graphicThe
    moderation models available are• Text-moderation-latest• Text-moderation-stable
    |'
  id: totrans-84
  prefs: []
  type: TYPE_TB
  zh: '| 审查 | 审查模型是经过微调的模型，可以检测文本是否可能敏感或不安全。这些模型可以分析文本内容，并根据以下类别进行分类：• 恶意• 恶意/威胁•
    嘲讽• 嘲讽/威胁• 自伤• 自伤/意图• 自伤/指令• 性相关• 性相关/未成年人• 暴力• 暴力/血腥审查模型包括：• Text-moderation-latest•
    Text-moderation-stable |'
- en: '| Legacy and Deprecated | Since the debut of ChatGPT, OpenAI has continued
    to support their older AI models, but they have been labeled as “legacy”  or “deprecated”
    models. These models continue to exist; however they have released other models
    that are more accurate, faster, and cheaper to use. |'
  id: totrans-85
  prefs: []
  type: TYPE_TB
  zh: '| 过时和弃用 | 自ChatGPT推出以来，OpenAI一直支持他们的旧AI模型，但它们已被标记为“过时”或“弃用”模型。这些模型仍然存在；然而，他们发布了其他更准确、更快、更便宜的模型。
    |'
- en: Note
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: This is by no means an exhaustive list of models available for developers provided
    by OpenAI! As newer models are released, the older models will be marked as legacy
    or deprecated. Therefore, it’s important to stay up to date by checking the list
    of available models on the OpenAI documentation list of models:[https://platform.openai.com/docs/models](https://platform.openai.com/docs/models)
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这绝不是OpenAI为开发者提供的所有模型的详尽列表！随着新模型的发布，旧模型将被标记为过时或弃用。因此，通过检查OpenAI文档中可用的模型列表来保持最新是很重要的：[https://platform.openai.com/docs/models](https://platform.openai.com/docs/models)
- en: When We Talk About Tokens, Think About the StringTokenizer and Not Access Tokens
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当我们谈论标记时，要想到StringTokenizer而不是访问令牌
- en: When using a third-party API, you might think of a token in the same sense as
    an access token, which is typically a UUID that allows you to identify yourself
    and maintain a session with the service. Well, forget that definition for now.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用第三方API时，你可能会将标记视为与访问令牌相同的概念，通常是一个UUID，允许你识别自己并与服务保持会话。好吧，现在就忘记这个定义吧。
- en: Now, as a Java developer, you’ve probably had the opportunity to use the class,
    java.util.StringTokenizer, in order to take a String and split it up into an Array
    of smaller Strings so that you can iterate over it for whatever purpose you need.
    For example, if you had a paragraph of text, you could let your delimiter be “.”
    in order to get an Array of sentences in the paragraph.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，作为一名Java开发者，你可能已经有机会使用`java.util.StringTokenizer`类，将一个字符串分割成更小的字符串数组，以便你可以遍历它以实现所需的目的。例如，如果你有一段文本，你可以让分隔符为“.”，以便获取段落中的句子数组。
- en: The good news is that the OpenAI API concept of a **token** is very familiar
    to the Java concept in the sense that it is a fragment of text. For the OpenAI
    APIs, a token is a chunk of a text that is approximately 4 characters long. That’s
    it – nothing else special.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，OpenAI API中的**标记**概念与Java中的概念非常相似，因为它是一个文本片段。对于OpenAI API，一个标记是文本的一个片段，大约有4个字符长。仅此而已——没有其他特别之处。
- en: So if a token is approximately a 4-character chunk of text, then why do we care
    about it?
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 所以如果标记大约是一个4个字符的文本块，那么我们为什么关心它呢？
- en: When working with the OpenAI textual models, developers need to be aware of
    token limitations, because they impact the cost and performance of API calls.
    For example, the gpt-3.5-turbo model has a token limitation of 4096 tokens, while
    the gpt-4-vision model has a limitation of 128,000 tokens (which is approximately
    the size of a 300-page novel). Token limitations for models are called **context
    windows**.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 当与OpenAI文本模型一起工作时，开发者需要意识到标记限制，因为它们会影响API调用的成本和性能。例如，gpt-3.5-turbo模型的标记限制为4096个标记，而gpt-4-vision模型的限制为128,000个标记（大约相当于一本300页小说的大小）。模型的标记限制被称为**上下文窗口**。
- en: As a result, developers need to take into account the length of the prompts
    as inputs and outputs to the models, ensuring that they fit within the model’s
    token constraints.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，开发者需要考虑提示的长度作为模型输入和输出的因素，确保它们在模型的标记约束范围内。
- en: Table [1-1](#Tab1) provides a list of some of the most current models with the
    token limitations and their pricing.Table 1-1
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 表[1-1](#Tab1)提供了当前一些最常用模型的标记限制及其定价。表1-1
