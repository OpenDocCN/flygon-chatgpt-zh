  zh: '![](image_rsrcV1.jpg)'
- en: 3\. 📩 Email Marketing
  id: totrans-244
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 📩 邮件营销
- en: '📶 Generating Email Subject Lines :'
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📶 生成电子邮件主题行：
- en: 'FILL-IN-THE-BLANK PROMPTS:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 填空提示：
- en: • Here is a sales email I have written **[insert the email or describe the email]**.
    Come up with a subject line that's **[adjective]** and **[adjective]**.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: • 这是我写的一封销售邮件。[插入邮件或描述邮件]。想出一个**[形容词]**和**[形容词]**的主题行。
- en: • Our **[product or service]** is the perfect solution for [pain point] that
    many of our customers are facing. It offers **[benefit 1]**, **[benefit 2]**,
    and **[benefit 3]** that make it a must-have for **[target audience X]**. Write
    a sales email that highlights the product/service and encourages customers to
    take action.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: • 我们的**[产品或服务]**是我们许多客户面临[痛点]的完美解决方案。它提供了**[好处1]**、**[好处2]**和**[好处3]**，使其成为**[目标受众X]**的必备品。写一封突出产品/服务的销售邮件，鼓励客户采取行动。
- en: • We are launching **[product].** It is designed for **[audience]**. These are
    three main features/benefits **[Item],** **[Item]**, **[Item]**. Please write
    a sales email inviting the reader to buy a product at **[percentage]%** off.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: • 我们正在推出**[产品]**。它专为**[受众]**设计。以下是三个主要功能/好处**[项目]**，**[项目]**，**[项目]**。请写一封销售邮件，邀请读者以**[百分比]%**的折扣购买产品。
