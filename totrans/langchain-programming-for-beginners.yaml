  prefs: []
  type: TYPE_NORMAL
- en: 'Page: Harry Potter and the Half-Blood Prince'
  prefs: []
  type: TYPE_NORMAL
- en: 'Summary: ...'
  prefs: []
  type: TYPE_NORMAL
- en: '---'
  prefs: []
  type: TYPE_NORMAL
- en: 'Calling Tool: `Calculator` with input `1997 + 2`'
  prefs: []
  type: TYPE_NORMAL
- en: '---'
  prefs: []
  type: TYPE_NORMAL
- en: 'Tool Result: `Answer: 1999`'
  prefs: []
  type: TYPE_NORMAL
- en: '---'
  prefs: []
  type: TYPE_NORMAL
- en: 'Final Output: 1999.'
  prefs: []
  type: TYPE_NORMAL
- en: Here, the agent uses the Wikipedia and LLM-math tools to finish the job. Very
    nice!
  prefs: []
  type: TYPE_NORMAL
- en: List of Available AI Tools
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An AI agent can only use the tools you added when you create the agent.
  prefs: []
  type: TYPE_NORMAL
- en: The list of tools available in LangChain can be found on the load_tools module.
  prefs: []
  type: TYPE_NORMAL
- en: On the import load_tools line, press F12 while placing your cursor somewhere
    inside load_tools.
  prefs: []
  type: TYPE_NORMAL
- en: You can also use the mouse by right-clicking the load_tools name and select
    'Go To Definition' from the context menu
  prefs: []
  type: TYPE_NORMAL
- en: 'On the load_tools.py file, search for the get_all_tool_names() function as
    shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: 'def get_all_tool_names() -> List[str]:'
  prefs: []
  type: TYPE_NORMAL
- en: '"""Get a list of all possible tool names."""'
  prefs: []
  type: TYPE_NORMAL
- en: return (
  prefs: []
  type: TYPE_NORMAL
- en: list(_BASE_TOOLS)
  prefs: []
  type: TYPE_NORMAL
- en: + list(_EXTRA_OPTIONAL_TOOLS)
  prefs: []
  type: TYPE_NORMAL
- en: + list(_EXTRA_LLM_TOOLS)
  prefs: []
  type: TYPE_NORMAL
- en: + list(_LLM_TOOLS)
  prefs: []
  type: TYPE_NORMAL
- en: + list(DANGEROUS_TOOLS)
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: The *_TOOLS constants above contains the name of the tool you can use.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, the DuckDuckGo search is found at _EXTRA_OPTIONAL_TOOLS as shown
    below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![10 available tools](image_rsrc1ZM.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 44\. LLM Agent Available Tools
  prefs: []
  type: TYPE_NORMAL
- en: You can also see other tools like Google search and Bing search, but these tools
    require an API key to run.
  prefs: []
  type: TYPE_NORMAL
- en: Types of AI Agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are several types of AI agents identified today, and the one we created
    is called a ReAct (Reason + Act) agent.
  prefs: []
  type: TYPE_NORMAL
- en: The ReAct agent is a general-purpose agent, and there are more specialized agents
    such as the XML agent and JSON agent.
  prefs: []
  type: TYPE_NORMAL
- en: You can read more about the different agent types at [https://python.langchain.com/v0.1/docs/modules/agents/agent_types/](https://python.langchain.com/v0.1/docs/modules/agents/agent_types/)
  prefs: []
  type: TYPE_NORMAL
- en: As LLM and LangChain improve, new types of agents might be created, so the definitions
    above won’t always be relevant.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The code for this chapter is available in the folder 10_Agents_and_Tools from
    the book source code.
  prefs: []
  type: TYPE_NORMAL
- en: While we don’t have an autonomous robot helper (yet) in our world today, we
    can already see how the development of AI agents might one day be used as the
    brains of AI robots.
  prefs: []
  type: TYPE_NORMAL
- en: AI agents are an amazing innovation that shows how a machine can come up with
    a sequence of actions to take to accomplish a goal.
  prefs: []
  type: TYPE_NORMAL
- en: When you create an agent, the LLM is used as a reasoning engine that needs to
    come up with steps of logic to accomplish a task.
  prefs: []
  type: TYPE_NORMAL
- en: The agent can also use various tools to act, such as browsing the web or solving
    a math equation.
  prefs: []
  type: TYPE_NORMAL
- en: More complex tasks that use multiple tools can also be executed by these agents.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes, a well-trained LLM can answer directly from the training data, bypassing
    the need to use tools.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 11: Interacting With Documents in LangChain'
  prefs: []
  type: TYPE_NORMAL
- en: One of the most interesting AI use cases is the Chat With Document feature,
    which enables users to interact with a document using conversational queries.
  prefs: []
  type: TYPE_NORMAL
- en: By simply asking questions, users can quickly find relevant information, summarize
    content, and gain insights without having to read and sort through pages of text.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an illustration of the process required to create a Chat With Document
    application:'
  prefs: []
  type: TYPE_NORMAL
- en: '![11 chatdoc process](image_rsrc1ZN.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 45\. Chat With Document Application Process
  prefs: []
  type: TYPE_NORMAL
- en: You first need to split a single document into chunks so that the document can
    be processed and indexed effectively. The chunks are then converted into vector
    embeddings.
  prefs: []
  type: TYPE_NORMAL
- en: Vector embeddings are arrays of numbers that represent information of various
    types, including text, images, audio, and more, by capturing their features in
    a numerical format.
  prefs: []
  type: TYPE_NORMAL
- en: When you give a question, LangChain will convert the query into vectors, and
    then search the document vectors for the most relevant matches.
  prefs: []
  type: TYPE_NORMAL
- en: LangChain then sends the user query and relevant text chunks to LLM so that
    the LLM can generate a response based on the given input.
  prefs: []
  type: TYPE_NORMAL
- en: The process of finding relevant text information and sending it to the LLM is
    also known as Retrieval Augmented Generation, or RAG for short.
  prefs: []
  type: TYPE_NORMAL
- en: Using LangChain and Streamlit, you can create an application that allows you
    to upload a document and ask questions relevant to the content of that document.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s jump in.
  prefs: []
  type: TYPE_NORMAL
- en: Getting the Document
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You’re going to upload a document to the application and ask questions about
    it. You can get the text file named ai-discussion.txt from the 11_Chat_With_Document
    folder.
  prefs: []
  type: TYPE_NORMAL
- en: The text file contains a fictional story that discusses the impact of AI on
    humanity.
  prefs: []
  type: TYPE_NORMAL
- en: Because it’s fictional, you can be sure that the LLM obtains the answer from
    the document and not from its training data.
  prefs: []
  type: TYPE_NORMAL
- en: Installing ChromaDB
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To create a Chat With Document application, you need to install a package called
    ChromaDB:'
  prefs: []
  type: TYPE_NORMAL
- en: pip install chromadb == 0.4.18
  prefs: []
  type: TYPE_NORMAL
- en: ChromaDB is the vector database we’re going to use to store and query vector
    data.
  prefs: []
  type: TYPE_NORMAL
- en: Building the Chat With Document Application
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Create a new Python file named rag_prompt.py, then import the packages required
    for the Chat With Document application as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: from decouple import config
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_openai import ChatOpenAI, OpenAIEmbeddings
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_core.prompts import ChatPromptTemplate
  prefs: []
  type: TYPE_NORMAL
- en: 'New packages:'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: from langchain_community.document_loaders import TextLoader
  prefs: []
  type: TYPE_NORMAL
- en: from langchain.text_splitter import RecursiveCharacterTextSplitter
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_community.vectorstores import Chroma
  prefs: []
  type: TYPE_NORMAL
- en: from langchain.chains.combine_documents import create_stuff_documents_chain
  prefs: []
  type: TYPE_NORMAL
- en: from langchain.chains import create_retrieval_chain
  prefs: []
  type: TYPE_NORMAL
- en: The OpenAIEmbeddings class is used to access the OpenAI embedding model.
  prefs: []
  type: TYPE_NORMAL
- en: The TextLoader class is used to load a text file, while RecursiveCharacterTextSplitter
    is used to split a text into small chunks so that it can be processed more efficiently
    by LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: The Chroma class is used to create the vector database. The create_retrieval_chain
    retrieves a document and passes it to the create_stuff_documents_chain, which
    passes the document to the LLM.
  prefs: []
  type: TYPE_NORMAL
- en: 'With the packages imported, you can define the llm next as shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: OPENAI_KEY = config("OPENAI_KEY")
  prefs: []
  type: TYPE_NORMAL
- en: llm = ChatOpenAI(model="gpt-4o", api_key=OPENAI_KEY)
  prefs: []
  type: TYPE_NORMAL
- en: 'After the llm, load the text using TextLoader and pass the path to the document
    in TextLoader as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: loader = TextLoader("./ai-discussion.txt")
  prefs: []
  type: TYPE_NORMAL
- en: documents = loader.load()
  prefs: []
  type: TYPE_NORMAL
- en: 'With the list of documents loaded, you need to create the text splitter and
    split the document into chunks:'
  prefs: []
  type: TYPE_NORMAL
- en: text_splitter = RecursiveCharacterTextSplitter(chunk_size=1000, chunk_overlap=200)
  prefs: []
  type: TYPE_NORMAL
- en: chunks = text_splitter.split_documents(documents)
  prefs: []
  type: TYPE_NORMAL
- en: To convert the document chunks into vectors, you need to use an embedding model.
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI provides an API endpoint to turn documents into vectors, and LangChain
    provides the OpenAIEmbeddings class so that you can use this embedding easily.
  prefs: []
  type: TYPE_NORMAL
- en: 'Add the following code below the chunks variable:'
  prefs: []
  type: TYPE_NORMAL
- en: embeddings = OpenAIEmbeddings(openai_api_key=OPENAI_KEY)
  prefs: []
  type: TYPE_NORMAL
- en: vector_store = Chroma.from_documents(chunks, embeddings)
  prefs: []
  type: TYPE_NORMAL
- en: retriever = vector_store.as_retriever()
  prefs: []
  type: TYPE_NORMAL
- en: The Chroma.from_documents() method sends the chunks and embeddings data to the
    Chroma database.
  prefs: []
  type: TYPE_NORMAL
- en: Then, you need to call the as_retriever() method to create a retriever object,
    which accepts the user input and returns relevant chunks of the document.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, you need to create the prompt to send to the LLM:'
  prefs: []
  type: TYPE_NORMAL
- en: system_prompt = (
  prefs: []
  type: TYPE_NORMAL
- en: '"You are an assistant for question-answering tasks. "'
  prefs: []
  type: TYPE_NORMAL
- en: '"Use the following pieces of retrieved context to answer "'
  prefs: []
  type: TYPE_NORMAL
- en: '"the question. If you don''t know the answer, say that you "'
  prefs: []
  type: TYPE_NORMAL
- en: '"don''t know. Use three sentences maximum and keep the "'
  prefs: []
  type: TYPE_NORMAL
- en: '"answer concise."'
  prefs: []
  type: TYPE_NORMAL
- en: '"\n\n"'
  prefs: []
  type: TYPE_NORMAL
- en: '"{context}"'
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: prompt = ChatPromptTemplate.from_messages(
  prefs: []
  type: TYPE_NORMAL
- en: '['
  prefs: []
  type: TYPE_NORMAL
- en: ("system", system_prompt),
  prefs: []
  type: TYPE_NORMAL
- en: ("human", "{input}"),
  prefs: []
  type: TYPE_NORMAL
- en: ']'
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: 'With the prompt created, you need to create a chain by calling the create_stuff_documents_chain()
    function and pass llm and prompt like this:'
  prefs: []
  type: TYPE_NORMAL
- en: question_answer_chain = create_stuff_documents_chain(llm, prompt)
  prefs: []
  type: TYPE_NORMAL
- en: This question_answer_chain will handle filling the prompt template and sending
    the prompt to the LLM.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, pass the question_answer_chain to the create_retrieval_chain() function:'
  prefs: []
  type: TYPE_NORMAL
- en: rag_chain = create_retrieval_chain(retriever, question_answer_chain)
  prefs: []
  type: TYPE_NORMAL
- en: The rag_chain above will pass the input to the retriever, which returns a relevant
    part of the document to the chain.
  prefs: []
  type: TYPE_NORMAL
- en: The relevant part of the chain and the input are then passed to the question_answer_chain
    to get the result.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now you can ask for user input, then run the invoke() method with that input:'
  prefs: []
  type: TYPE_NORMAL
- en: 'question = input("Ask Your Question: ")'
  prefs: []
  type: TYPE_NORMAL
- en: 'if question:'
  prefs: []
  type: TYPE_NORMAL
- en: 'response = rag_chain.invoke({"input": question})'
  prefs: []
  type: TYPE_NORMAL
- en: print(response["answer"])
  prefs: []
  type: TYPE_NORMAL
- en: When the LLM returns the answer, you print the answer to the command line.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now the application is completed. You can run it using Python from the command
    line:'
  prefs: []
  type: TYPE_NORMAL
- en: python rag_prompt.py
  prefs: []
  type: TYPE_NORMAL
- en: 'And then ask a question relevant to the document context. Here’s an example:'
  prefs: []
  type: TYPE_NORMAL
- en: python3 rag_prompt.py
  prefs: []
  type: TYPE_NORMAL
- en: 'Ask Your Question: Where does Mr. Thompson work?'
  prefs: []
  type: TYPE_NORMAL
- en: Mr. Thompson works as the Chief AI Scientist at VegaTech Inc.
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, the LLM can answer the question by analyzing the prompt created
    by LangChain and our input.
  prefs: []
  type: TYPE_NORMAL
- en: Adding Streamlit Chat UI to the Application
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With the core functionality of the application finished, we can add a web UI
    and chat memory to improve the application.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s add the Web UI first. Import Streamlit into the application, then add
    the Streamlit UI below the rag_chain variable:'
  prefs: []
  type: TYPE_NORMAL
- en: import streamlit as st
  prefs: []
  type: TYPE_NORMAL
- en: '... other code'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: rag_chain = create_retrieval_chain(retriever, question_answer_chain)
  prefs: []
  type: TYPE_NORMAL
- en: st.title("Chat With Document")
  prefs: []
  type: TYPE_NORMAL
- en: 'question = st.chat_input("Your Question: ")'
  prefs: []
  type: TYPE_NORMAL
- en: 'if question:'
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.chat_message("user"):'
  prefs: []
  type: TYPE_NORMAL
- en: st.markdown(question)
  prefs: []
  type: TYPE_NORMAL
- en: 'response = rag_chain.invoke({"input": question})'
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.chat_message("assistant"):'
  prefs: []
  type: TYPE_NORMAL
- en: st.write(response["answer"])
  prefs: []
  type: TYPE_NORMAL
- en: Now you can run the application using the streamlit run command.
  prefs: []
  type: TYPE_NORMAL
- en: The next step is to add the memory part to the application.
  prefs: []
  type: TYPE_NORMAL
- en: Adding Chat Memory for Context
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When adding a chat memory to a RAG chain, you also need to upgrade the retriever
    object by creating a history-aware retriever.
  prefs: []
  type: TYPE_NORMAL
- en: This history-aware retriever is then used to contextualize your latest question
    by analyzing the chat history.
  prefs: []
  type: TYPE_NORMAL
- en: 'You need to import the create_history_aware_retriever chain, then create a
    history_aware_retriever object as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: from langchain.chains import create_history_aware_retriever
  prefs: []
  type: TYPE_NORMAL
- en: '... other code'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: retriever = vector_store.as_retriever()
  prefs: []
  type: TYPE_NORMAL
- en: contextualize_system_prompt = """Given a chat history and the latest user question
    \
  prefs: []
  type: TYPE_NORMAL
- en: which might reference context in the chat history, formulate a standalone question
    \
  prefs: []
  type: TYPE_NORMAL
- en: which can be understood without the chat history. Do NOT answer the question,
    \
  prefs: []
  type: TYPE_NORMAL
- en: just reformulate it if needed and otherwise return it as is."""
  prefs: []
  type: TYPE_NORMAL
- en: contextualize_prompt = ChatPromptTemplate.from_messages(
  prefs: []
  type: TYPE_NORMAL
- en: '['
  prefs: []
  type: TYPE_NORMAL
- en: ("system", contextualize_system_prompt),
  prefs: []
  type: TYPE_NORMAL
- en: MessagesPlaceholder("chat_history"),
  prefs: []
  type: TYPE_NORMAL
- en: ("human", "{input}"),
  prefs: []
  type: TYPE_NORMAL
- en: ']'
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: history_aware_retriever = create_history_aware_retriever(
  prefs: []
  type: TYPE_NORMAL
- en: llm, retriever, contextualize_prompt
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: 'After creating the history_aware_retriever object, you need to update the rag_chain
    to use the retriever as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: rag_chain = create_retrieval_chain(history_aware_retriever, question_answer_chain)
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that you have an updated RAG chain, pass the chain to the RunnableWithMessageHistory()
    class like we did in Chapter 9:'
  prefs: []
  type: TYPE_NORMAL
- en: Add the imports
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: from langchain_community.chat_message_histories import StreamlitChatMessageHistory
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_core.runnables.history import RunnableWithMessageHistory
  prefs: []
  type: TYPE_NORMAL
- en: '... other code'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: rag_chain = create_retrieval_chain(history_aware_retriever, question_answer_chain)
  prefs: []
  type: TYPE_NORMAL
- en: history = StreamlitChatMessageHistory()
  prefs: []
  type: TYPE_NORMAL
- en: conversational_rag_chain = RunnableWithMessageHistory(
  prefs: []
  type: TYPE_NORMAL
- en: rag_chain,
  prefs: []
  type: TYPE_NORMAL
- en: 'lambda session_id: history,'
  prefs: []
  type: TYPE_NORMAL
- en: input_messages_key="input",
  prefs: []
  type: TYPE_NORMAL
- en: history_messages_key="chat_history",
  prefs: []
  type: TYPE_NORMAL
- en: output_messages_key="answer",
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: 'To show the chat history to users, look for the message object in st.session_state
    like before:'
  prefs: []
  type: TYPE_NORMAL
- en: st.title("Chat With Document")
  prefs: []
  type: TYPE_NORMAL
- en: 'for message in st.session_state["langchain_messages"]:'
  prefs: []
  type: TYPE_NORMAL
- en: role = "user" if message.type == "human" else "assistant"
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.chat_message(role):'
  prefs: []
  type: TYPE_NORMAL
- en: st.markdown(message.content)
  prefs: []
  type: TYPE_NORMAL
- en: 'As the last step, change the chain invoked when the application receives a
    question, and add the config parameter for the "session_id":'
  prefs: []
  type: TYPE_NORMAL
- en: 'if question:'
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.chat_message("user"):'
  prefs: []
  type: TYPE_NORMAL
- en: st.markdown(question)
  prefs: []
  type: TYPE_NORMAL
- en: response = conversational_rag_chain.stream(
  prefs: []
  type: TYPE_NORMAL
- en: '{"input": question}, config={"configurable": {"session_id": "any"}}'
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.chat_message("assistant"):'
  prefs: []
  type: TYPE_NORMAL
- en: st.write(response["answer"])
  prefs: []
  type: TYPE_NORMAL
- en: Okay. Now we have a nice interface for interacting with the document, and the
    AI is aware of the chat history.
  prefs: []
  type: TYPE_NORMAL
- en: Streaming the Answer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'So far, we still use the invoke() method to run the chain. Let’s try to stream
    the AI answer instead:'
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.chat_message("user"):'
  prefs: []
  type: TYPE_NORMAL
- en: st.markdown(question)
  prefs: []
  type: TYPE_NORMAL
- en: response = conversational_rag_chain.stream(
  prefs: []
  type: TYPE_NORMAL
- en: '{"input": question}, config={"configurable": {"session_id": "any"}}'
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.chat_message("assistant"):'
  prefs: []
  type: TYPE_NORMAL
- en: st.write_stream(response)
  prefs: []
  type: TYPE_NORMAL
- en: 'If you run the application and pass a question to the LLM, you’ll notice that
    the response is a dictionary with four keys: "input", "chat_history", "context",
    and "answer".'
  prefs: []
  type: TYPE_NORMAL
- en: '![11 stream response](image_rsrc1ZP.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 46\. Stream Response From RAG Chain
  prefs: []
  type: TYPE_NORMAL
- en: 'If you decide to write_stream() only the "answer" key, you’ll get a ''generator''
    object is not subscriptable TypeError from Python:'
  prefs: []
  type: TYPE_NORMAL
- en: 'st.write_stream(response["answer"]) # TypeError'
  prefs: []
  type: TYPE_NORMAL
- en: 'To stream only the answer to the user, you need to call the pick() method and
    pass the "answer" key as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: answer_chain = conversational_rag_chain.pick("answer")
  prefs: []
  type: TYPE_NORMAL
- en: response = answer_chain.stream(
  prefs: []
  type: TYPE_NORMAL
- en: '{"input": question}, config={"configurable": {"session_id": "any"}}'
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: The pick() method filters the returned output and only returns the content of
    the key you passed as its argument.
  prefs: []
  type: TYPE_NORMAL
- en: 'This way, the response object is now a stream that returns only the answer:'
  prefs: []
  type: TYPE_NORMAL
- en: '![11 chat output](image_rsrc1ZR.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 47\. Controlling RAG Chain Response With pick()
  prefs: []
  type: TYPE_NORMAL
- en: Switching the LLM
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you want to change the LLM used for this application, you need to also change
    the embedding model used for the vector generation.
  prefs: []
  type: TYPE_NORMAL
- en: 'For Google Gemini, you can import the GoogleGenerativeAIEmbeddings model as
    follows:'
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_google_genai import ChatGoogleGenerativeAI, GoogleGenerativeAIEmbeddings
  prefs: []
  type: TYPE_NORMAL
- en: llm GOOGLE_GEMINI_KEY = config("GOOGLE_GEMINI_KEY")
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: llm = ChatGoogleGenerativeAI(
  prefs: []
  type: TYPE_NORMAL
- en: model="gemini-1.5-pro-latest", google_api_key=GOOGLE_GEMINI_KEY
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: embeddings embeddings = GoogleGenerativeAIEmbeddings(
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: google_api_key=GOOGLE_GEMINI_KEY, model="models/embedding-001"
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
