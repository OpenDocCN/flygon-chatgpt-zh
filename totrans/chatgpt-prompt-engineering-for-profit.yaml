- en: '****F**ew**-****sh**ot** ****Prom**ptin**g ****i**s** ****id**eal** ****wh**en**
    ****t**he** ****ta**sk** ****i**s** ****com**ple**x ****en**oug**h ****t**o**
    ****req**uir**e ****addi**tiona**l ****gui**danc**e, ****b**ut** ****n**ot** ****s**o**
    ****com**ple**x ****th**at** ****i**t** ****req**uire**s ****exte**nsiv**e ****tra**inin**g
    ****o**r** ****exha**ustiv**e ****exa**mple**s. ****I**t** ****i**s** ****sui**tabl**e
    ****f**or** ****situ**ation**s ****wh**ere** ****t**he** ****mo**del** ****ne**eds**
    ****t**o** ****unde**rstan**d ****spe**cifi**c ****nua**nce**s, ****to**nes**,
    ****o**r** ****sh**ape**s, ****a**nd** ****wh**en** ****th**ere** ****a**re**
    ****con**cret**e ****exa**mple**s ****th**at** ****c**an** ****b**e** ****us**ed**
    ****a**s** ****refe**renc**e.'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 当任务足够复杂，需要额外的指导，但又不是如此复杂以至于需要大量训练或详尽的示例时，几次提示是理想的。它适用于模型需要理解特定语境、语气或形状的情况，以及当有具体示例可以作为参考时。
- en: '****Y**ou** ****sh**oul**d ****u**se** ****th**is** ****tech**niqu**e ****wh**en**
    ****y**ou** ****ne**ed** ****resp**onse**s ****th**at** ****fo**llo**w ****a****
    ****pat**ter**n, ****su**ch** ****a**s** ****resp**onse**s ****th**at** ****a**re**
    ****cons**isten**t ****i**n** ****fo**rma**t ****o**r** ****st**yle**, ****o**r**
    ****wh**en** ****th**ere** ****i**s** ****a**n** ****ambi**guit**y ****th**at**
    ****ne**eds** ****t**o** ****b**e** ****res**olve**d ****ea**rly** ****o**n**.
    ****I**t** ****i**s** ****espe**ciall**y ****us**efu**l ****wh**en** ****y**ou**
    ****wa**nt** ****t**he** ****tem**plat**e ****t**o** ****ad**apt** ****t**o**
    ****t**he** ****st**yle** ****o**f** ****commu**nicati**on ****y**ou** ****ha**ve**
    ****i**n** ****mi**nd**—****f**or** ****exa**mpl**e, ****sho**ppin**g ****li**sts**,
    ****pro**ces**s ****desc**riptio**ns, ****o**r** ****ev**en** ****dial**ogue**s.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该使用这种技术，当你需要响应遵循某种模式的答案时，例如格式或风格一致的答案，或者当存在需要尽早解决的歧义时。它特别有用，当你希望模板能够适应你心中的沟通风格时——例如，购物清单、流程描述，甚至是对话。
- en: '****Addi**tional**ly, ****th**is** ****tech**niqu**e ****c**an** ****b**e**
    ****us**ed** ****t**o** ****ta**ilo**r ****L**LM** ****resp**onse**s ****t**o**
    ****t**he** ****ta**rge**t ****aud**ienc**e. ****F**or** ****exa**mpl**e, ****prov**idin**g
    ****exa**mple**s ****th**at** ****u**se** ****sim**ple**r ****o**r** ****mo**re**
    ****tech**nica**l ****lan**guag**e ****depe**ndin**g ****o**n** ****t**he** ****int**ende**d
    ****aud**ienc**e ****i**s** ****a**** ****gr**eat** ****w**ay** ****t**o** ****di**rec**t
    ****t**he** ****to**ne** ****o**f** ****t**he** ****res**pons**e.'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这种技术可以用来调整 LLM 的响应以适应目标受众。例如，根据预期的受众提供使用更简单或更技术性语言示例，是指导响应语调的一个很好的方法。
- en: '[****Ti**ps** ****f**or** ****u**se**]'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: '[**使用技巧**]'
- en: ● ****Ch**oos**e ****exa**mple**s ****th**at** ****a**re** ****repre**sentati**ve
    ****a**nd** ****th**at** ****act**uall**y ****demo**nstrat**e ****t**he** ****ty**pe**
    ****o**f** ****res**pons**e ****y**ou** ****wa**nt**. ****T**he** ****cl**ose**r
    ****t**he** ****exa**mpl**e ****i**s** ****t**o** ****t**he** ****des**ire**d
    ****ta**sk**, ****t**he** ****be**tte**r ****t**he** ****L**LM** ****adap**tatio**n
    ****wi**ll** ****b**e**.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: ● 选择具有代表性的示例，并实际展示你想要的响应类型。示例越接近期望的任务，LLM 的适应性就会越好。
- en: ● ****Li**mit** ****t**he** ****nu**mbe**r ****o**f** ****exa**mple**s ****t**o**
    ****a**** ****f**ew** ****a**nd** ****ke**ep** ****th**em** ****con**cis**e. ****Y**ou**
    ****d**on**'****t**** ****ne**ed** ****a**** ****la**rge** ****nu**mbe**r ****o**f**
    ****exa**mple**s — ****wh**at** ****mat**ter**s ****i**s** ****t**he** ****qua**lit**y
    ****a**nd** ****cla**rit**y ****o**f** ****t**he** ****exa**mple**s ****y**ou**
    ****pro**vid**e.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: ● **限**制示例的数量，使其保持简洁。你不需要大量的示例——重要的是你提供的示例的质量和清晰度。
- en: '[****T**he** ****diff**erenc**e ****i**n** ****tech**niqu**e ]'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: '[**技术差异**]'
- en: '****F**ew**-****sh**ot** ****Prom**ptin**g ****dif**fer**s ****fr**om** ****Ze**ro**-
    ****sh**ot** ****Prom**ptin**g ****bec**aus**e, ****ins**tea**d ****o**f** ****si**mpl**y
    ****as**kin**g ****t**he** ****mo**del** ****a**** ****di**rec**t ****que**stio**n,
    ****i**t** ****pro**vide**s ****exa**mple**s ****t**o** ****esta**blis**h ****a****
    ****cl**ear** ****pat**ter**n. ****Th**is** ****he**lps** ****t**he** ****L**LM**
    ****gen**erat**e ****mo**re** ****acc**urat**e ****a**nd** ****exp**ecte**d ****resp**onse**s,
    ****espe**ciall**y ****i**n** ****ca**ses** ****wh**ere** ****a**** ****di**rec**t
    ****an**swe**r ****mi**ght** ****n**ot** ****b**e** ****spe**cifi**c ****en**oug**h.'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '**F**ew-**sh**ot** **Prom**ptin**g** 与 **Zero-**sh**ot** **Prom**ptin**g**
    的区别在于，它不是简单地询问模型一个直接的问题，而是提供示例来建立清晰的模式。这有助于 LLM 生成更准确和预期的响应，尤其是在直接回答可能不够具体的情况下。'
- en: '****Com**pare**d ****t**o** ****Ch**ain** ****o**f** ****Tho**ugh**t , ****F**ew**-****sh**ot**
    ****Prom**ptin**g ****do**es** ****n**ot** ****nece**ssaril**y ****inv**olv**e
    ****a**** ****ch**ain** ****o**f** ****reas**onin**g, ****b**ut** ****ra**the**r
    ****t**he** ****defi**nitio**n ****o**f** ****a**** ****pat**ter**n ****thr**oug**h
    ****exa**mple**s. ****Wh**ile** ****Ch**ain** ****o**f** ****Tho**ugh**t ****det**ail**s
    ****t**he** ****st**ep**-****b**y**-****st**ep** ****reas**onin**g ****t**o**
    ****en**sur**e ****a**** ****log**ica**l ****an**swe**r, ****t**he** ****F**ew**-****sh**ot**
    ****Prom**ptin**g ****foc**use**s ****mo**re** ****o**n** ****t**he** ****form**attin**g
    ****a**nd** ****st**yle** ****o**f** ****t**he** ****an**swe**r, ****ba**sed**
    ****o**n** ****spe**cifi**c ****exa**mple**s.'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '**与思维链相比，少样本提示不一定涉及推理链，而是通过例子定义一个模式。虽然思维链通过逐步推理确保逻辑答案，但少样本提示更关注基于具体例子的答案格式和风格。"'
- en: '****F**ew**-****sh**ot** ****al**so** ****dif**fer**s ****fr**om** ****Ro**le**
    ****Pl**ay** ****i**n** ****th**at** ****i**t** ****do**es** ****n**ot** ****ins**truc**t
    ****t**he** ****mo**del** ****t**o** ****as**sum**e ****a**** ****spe**cifi**c
    ****per**son**a, ****b**ut** ****ra**the**r ****t**o** ****fo**llo**w ****a****
    ****spe**cifi**c ****pat**ter**n ****o**f** ****ques**tion**s ****a**nd** ****ans**wer**s.
    ****Th**us**, ****wh**ile** ****Ro**le** ****Pl**ay** ****he**lps** ****sh**ape**
    ****t**he** ****L**LM**’****s**** ****pers**onalit**y, ****F**ew**-****sh**ot**
    ****he**lps** ****sh**ape** ****t**he** ****fo**rma**t ****o**f** ****t**he**
    ****an**swe**r.'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '**少样本提示也与角色扮演不同，因为它不指导模型假设一个特定的人物，而是遵循一个特定的问题和答案模式。因此，虽然角色扮演有助于塑造LLM的个性，但少样本提示有助于塑造答案的格式。"'
