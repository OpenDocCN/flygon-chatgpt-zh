- en: 'Analysis Case 7.4: Analysis Case Using SFO Airport Survey Data'
  id: totrans-1088
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例7.4：使用SFO机场调查数据进行分析
- en: Analysis with Excel
  id: totrans-1089
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Excel进行分析
- en: Using the Case Dataset files, find the file 2016_SFO_Customer_Survey_Data.xls.
    Open the data dictionary file and have it available to consult as you work with
    the data. Open the data file using Excel.
  id: totrans-1090
  prefs: []
  type: TYPE_NORMAL
  zh: 使用案例数据集文件，找到文件2016_SFO_Customer_Survey_Data.xls。打开数据字典文件，并在处理数据时随时查阅。使用Excel打开数据文件。
- en: 'We are going to answer the following questions:'
  id: totrans-1091
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将回答以下问题：
- en: What are the most frequent destinations of travelers using SFO?
  id: totrans-1092
  prefs: []
  type: TYPE_NORMAL
  zh: 使用SFO的旅客最常去的目的地是什么？
- en: What are the most frequent reasons passengers are traveling?
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: 乘客最常旅行的原因是什么？
- en: What are passengers’ most frequent complaints about airport cleanliness?
  id: totrans-1094
  prefs: []
  type: TYPE_NORMAL
  zh: 乘客对机场清洁度最常抱怨的是什么？
- en: For the first question, create a pivot table by DESTGEO and tabulate the number
    of comments by comment code, filter out the no comment (code = 0) rows, and sort
    rows by most frequent count. Then, a Pareto analysis can be performed to discover
    the most frequent destination ([Figure 7.17](#fig7-17)).
  id: totrans-1095
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第一个问题，通过DESTGEO创建一个数据透视表，按评论代码统计评论数量，过滤掉无评论（代码=0）的行，并按最频繁的计数排序。然后，可以进行帕累托分析以发现最频繁的目的地（[图7.17](#fig7-17)）。
- en: '![image](images/pg156_1.jpg)'
  id: totrans-1096
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg156_1.jpg)'
- en: FIGURE 7.17 Using a pivot table to tabulate count of passengers by DESTGEO and
    the resulting Pareto analysis to determine the most frequent destinations
  id: totrans-1097
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.17 使用数据透视表统计按DESTGEO划分的乘客数量，并使用帕累托分析确定最频繁的目的地
- en: For the next question, create a pivot table by Q2 comments, Q2COMM, and tabulate
    the number of comments by comment code; filter out the no comment (code = 0) rows;
    and sort rows by most frequent count. Then, perform a Pareto analysis to discover
    the most frequent reasons for their trips.
  id: totrans-1098
  prefs: []
  type: TYPE_NORMAL
  zh: 对于下一个问题，通过Q2评论、Q2COMM创建一个数据透视表，按评论代码统计评论数量；过滤掉无评论（代码=0）的行；并按最频繁的计数排序。然后，进行帕累托分析以发现他们旅行最频繁的原因。
- en: For the last question, create a pivot table by Q9 comments, Q9COM1, and tabulate
    the number of comments by comment code; filter out the no comment (code = 0) rows;
    and sort rows by most frequent count. Then, perform a Pareto analysis to discover
    the most frequent complaints about cleanliness ([Figure 7.18](#fig7-18)).
  id: totrans-1099
  prefs: []
  type: TYPE_NORMAL
  zh: 对于最后一个问题，通过Q9评论、Q9COM1创建一个数据透视表，按评论代码统计评论数量；过滤掉无评论（代码=0）的行；并按最频繁的计数排序。然后，进行帕累托分析以发现关于清洁度的最频繁投诉（[图7.18](#fig7-18)）。
- en: '![image](images/pg156_2.jpg)'
  id: totrans-1100
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg156_2.jpg)'
- en: FIGURE 7.18 Pivot table and Pareto analysis to discover the most frequent type
    of airport visitor
  id: totrans-1101
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.18 数据透视表和帕累托分析以发现最常访问机场的旅客类型
- en: '![image](images/pg157.jpg)'
  id: totrans-1102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg157.jpg)'
- en: FIGURE 7.19 Pareto analysis to discover the most frequent complaints about cleanliness
  id: totrans-1103
  prefs: []
  type: TYPE_NORMAL
  zh: 图7.19 对清洁度最频繁投诉的帕累托分析
- en: Make sure to refer to the data dictionary (you may need to use the Word version)
    to capture the meanings of the codes to annotate your results ([Figure 7.19](#fig7-19)).
  id: totrans-1104
  prefs: []
  type: TYPE_NORMAL
  zh: 确保参考数据字典（可能需要使用Word版本）以捕捉代码的含义来注释你的结果（[图7.19](#fig7-19)）。
- en: Analysis with R
  id: totrans-1105
  prefs: []
  type: TYPE_NORMAL
  zh: 使用R进行分析
- en: To conduct this analysis using Jamovi, we need to extract summary tables by
    the codes for each question. We can then copy the simple table directly from the
    pivot table in Excel into a new Jamovi worksheet. After ensuring that the variables
    are properly declared with the correct types, it is easy to perform a Pareto analysis
    for each one.
  id: totrans-1106
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用Jamovi进行此分析，我们需要按每个问题的代码提取汇总表。然后，我们可以直接从Excel中的数据透视表复制简单表格到一个新的Jamovi工作表中。在确保变量已正确声明并具有正确的类型后，对每个变量进行帕累托分析变得容易。
- en: For the first question, “What are the most frequent destinations of travelers
    using SFO?,” we set up the variable GEODEST (in code). The setup screen is shown
    in [Figure 7.20](#fig7-20), and the resulting Pareto analysis is in [Figure 7.21](#fig7-21).
  id: totrans-1107
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第一个问题，“使用SFO的旅客最常去的目的地是什么？”，我们设置了变量GEODEST（在代码中）。设置屏幕显示在[图7.20](#fig7-20)，结果帕累托分析在[图7.21](#fig7-21)中。
