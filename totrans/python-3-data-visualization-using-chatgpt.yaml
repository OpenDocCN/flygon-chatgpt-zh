    are not shown because they are not important for this example. The code shown
    in bold is the Colaboratory-specific code that is required to upload the CSV file.
    When you launch this code, you will see a small button labeled “Browse,” which
    you must click and then select the CSV file that is listed in the code snippet.
    After doing so, the rest of the code is executed and you will see the contents
    of the CSV file displayed in your browser session.'
  id: totrans-1084
  prefs: []
  type: TYPE_NORMAL
  zh: '[列表 2.25](#list2-25) 上传了 CSV 文件 weather_data.csv，其内容未显示，因为它们对于本例不重要。粗体显示的代码是
    Colaboratory 特定的代码，用于上传 CSV 文件。当你运行此代码时，你会看到一个标有“浏览”的小按钮，你必须点击并选择代码片段中列出的 CSV
    文件。完成此操作后，其余的代码将被执行，你将在浏览器会话中看到 CSV 文件的内容。'
- en: '**NOTE** *You must supply the CSV file* weather_data.csv *if you want to launch
    this Jupyter notebook successfully in Google Colaboratory.*'
