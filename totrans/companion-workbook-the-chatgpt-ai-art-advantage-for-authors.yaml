  id: totrans-314
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6 生成广告和促销图形
- en: In this module you will focus on creating visuals specifically for marketing
    campaigns and advertisements, building on the examples in Chapter 3 of "The ChatGPT
    AI Art Advantage for Authors."
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 在本模块中，您将专注于创建专门用于营销活动和广告的视觉内容，基于《ChatGPT AI 艺术优势作者指南》第 3 章的示例。
- en: 'EXERCISE 6.1: GENERATING A FACEBOOK AD GRAPHIC FOR YOUR BOOK'
  id: totrans-316
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习 6.1：为您的书籍制作 Facebook 广告图形
- en: '**Objective:** To create an effective ad graphic suitable for platforms like
    Facebook to promote your book.'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: '**目标：**创建适合 Facebook 等平台的有效广告图形，以推广您的书籍。'
- en: '**Reference:** Recall the Facebook-style ad example from Chapter 3.'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: '**参考：**回忆第 3 章的 Facebook 风格广告示例。'
- en: '**Instructions:**'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: '**说明：**'
- en: '**Define Ad Goal:** What is the primary goal of this ad? (e.g., drive book
    sales, generate leads via free chapter, raise awareness) *Your Goal:*'
  id: totrans-320
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**定义广告目标：**此广告的主要目标是什么？（例如，推动书籍销售、通过免费章节生成潜在客户、提高知名度）*您的目标：*'
- en: '**Identify Key Message/Hook:** What is the single most compelling message or
    hook for your target audience? *Your Hook:*'
  id: totrans-321
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**确定关键信息/钩子：**对您的目标受众来说，最吸引人的单一信息或钩子是什么？*您的钩子：*'
- en: '**Draft Ad Graphic Prompt:** Create a detailed prompt for a Facebook ad graphic
    (typically 1.91:1 or 1:1 ratio). Include:'
  id: totrans-322
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**草稿广告图形提示：**创建一个详细的 Facebook 广告图形提示（通常为 1.91:1 或 1:1 比率）。包括：'
- en: Visual elements representing the hook or book's benefit
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代表钩子或书籍益处的视觉元素
- en: Emotional tone (e.g., urgent, inspiring, relatable)
  id: totrans-324
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情感基调（例如，紧迫的、鼓舞人心的、相关的）
- en: Key text to overlay (Keep it brief and impactful! e.g., Book Title, Hook, Call
    to Action like "Learn More" or "Buy Now")
  id: totrans-325
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要叠加的关键文本（保持简短且具有影响力！例如，书名、钩子、行动号召如“了解更多”或“现在购买”）
- en: Style consistent with your brand
  id: totrans-326
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与您的品牌风格一致
- en: Target audience representation (if applicable)
  id: totrans-327
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标受众代表（如适用）
