  zh: 11. 制定一个规划社区外展计划的模板。
- en: 12\. Write a guide for organizing staff volunteer days.
  id: totrans-1024
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 编写一份组织员工志愿服务日的指南。
- en: 13\. Develop a plan for implementing the organization's diversity and inclusion
