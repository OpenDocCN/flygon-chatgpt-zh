  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您有了引言，选择几个开始。
- en: '*Prompt Example - create a modern calligraphy style logo for the quote Mountains
    Move Minds. Make it Black and white, look hand drawn, include some swirls*'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: '*提示示例 - 为“山移心志”这句话创建一个现代书法风格的标志。使其为黑白，看起来像是手绘的，包括一些螺旋图案*'
