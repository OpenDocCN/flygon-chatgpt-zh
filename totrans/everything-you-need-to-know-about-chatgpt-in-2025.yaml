  prefs: []
  type: TYPE_NORMAL
  zh: 在技术术语中，**多模态模型**通过深度神经网络操作，这些神经网络有专门针对不同类型数据的层。对于文本，如**Transformer**处理语言，而对于图像，**卷积神经网络**（**CNNs**）可以检测视觉模式。**多模态模型**将这些网络结合起来，允许对数据进行联合解释。多模态模型集成的进步已经显示出**承诺**，因为它们在复杂任务中取得了令人惊讶的结果，例如图像的描述、基于文本描述的视觉内容生成或视频中元素的分类。
