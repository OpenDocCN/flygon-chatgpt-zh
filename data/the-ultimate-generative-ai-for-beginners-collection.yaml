  type: TYPE_NORMAL
  zh: AI驱动的情感分析：
- en: '○ Prompt: "Develop a sentiment analysis tool that categorizes user emotions
    from text inputs. Test its accuracy across diverse datasets."'
  id: totrans-993
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 提示：开发一个从文本输入中分类用户情绪的情感分析工具。测试其在不同数据集上的准确性。
- en: '○ Goal: Explore applications of emotion recognition in improving user experiences.'
  id: totrans-994
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 目标：探索情感识别在改善用户体验中的应用。
- en: 'Human-AI interaction design:'
  id: totrans-995
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人机交互设计：
- en: '○ Prompt: "Create a chatbot that adapts its responses based on user emotions.
    Focus on empathy and personalization."'
  id: totrans-996
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 提示：创建一个根据用户情绪调整其响应的聊天机器人。重点关注同理心和个性化。
- en: '○ Goal: Enhance the chatbot’s engagement through emotional intelligence.'
  id: totrans-997
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 目标：通过情感智能增强聊天机器人的参与度。
- en: Advanced Exercises
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: 高级练习
- en: 'AI in space exploration:'
  id: totrans-999
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 太空探索中的AI：
- en: '○ Prompt: "Design a decision-making algorithm for a Mars rover, enabling it
    to autonomously prioritize scientific objectives."'
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 提示：为火星车设计一个决策算法，使其能够自主优先考虑科学目标。
- en: '○ Goal: Apply advanced AI capabilities to autonomous exploration.'
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 目标：将先进的AI能力应用于自主探索。
- en: 'Predictive healthcare AI:'
  id: totrans-1002
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预测性医疗保健AI：
- en: '○ Prompt: "Develop an AI prototype that predicts potential health risks based
    on wearable device data."'
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 提示：开发一个基于可穿戴设备数据的潜在健康风险预测的AI原型。
- en: '○    Goal: Innovate in proactive healthcare solutions.'
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 目标：在主动医疗保健解决方案中进行创新。
- en: Feedback and Iteration
  id: totrans-1005
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈与迭代
- en: 'Collaborative review:'
  id: totrans-1006
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 协作审查：
- en: ○ Present your AI innovations to a community of enthusiasts or professionals
    for constructive feedback.
  id: totrans-1007
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 向一群爱好者或专业人士展示你的AI创新，以获得建设性的反馈。
- en: '○ Example: "Does my edge AI application address real-world constraints effectively?"'
  id: totrans-1008
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 示例：我的边缘AI应用是否有效地解决了现实世界的约束？
- en: 'Iterative refinement:'
  id: totrans-1009
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 逐步改进：
- en: ○ Use feedback to improve performance and adapt solutions to diverse scenarios.
  id: totrans-1010
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 使用反馈来提高性能并适应不同的场景。
- en: By engaging with these exercises, you’ll develop hands-on expertise in emerging
    AI trends. Whether you’re experimenting with quantum computing or designing empathetic
    AI systems, these activities ensure you stay at the forefront of innovation. Dive
    in and shape the future of AI today!
  id: totrans-1011
  prefs: []
  type: TYPE_NORMAL
  zh: 通过参与这些练习，您将培养在新兴AI趋势中的实际操作技能。无论您是在尝试量子计算还是设计同理心AI系统，这些活动都能确保您站在创新的前沿。现在就加入进来，塑造AI的未来吧！
- en: The Beginner Generative AI – Conclusion
  id: totrans-1012
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 初学者生成式AI – 结论
- en: Congratulations, AI enthusiast! You've navigated the thrilling and sometimes
    perplexing waters of generative AI, and you've come out the other side empowered
    with knowledge. We started with the basics of artificial intelligence—where we
    demystified those perplexing algorithms that once seemed like magic but are just
    really complex math—and continued exploring the avant-garde realms of generative
    tools, ethical considerations, and AI's potential to transform your creativity
    and career.
  id: totrans-1013
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜，AI爱好者！您已经穿越了生成式AI激动人心且有时令人困惑的海洋，并带着知识的力量走了出来。我们从人工智能的基础开始——我们揭开了那些曾经看似魔法但其实是复杂数学的困惑算法——并继续探索生成工具的前卫领域、道德考量以及AI改变您创造力和职业的潜力。
- en: '![](image_rsrc44M.jpg)'
  id: totrans-1014
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc44M.jpg)'
- en: We uncovered the relatable mystery of smartphones that seem to know you better
    than your best friend and dove into the nitty-gritty of AI's historical context.
    You learned about Alan Turing’s famous question, "Can machines think?" and navigated
    the labyrinth of machine learning, with data as the breadcrumbs leading our way.
    From there, we transformed your laptop from a typewriter into a creative partner,
    opening up the astonishing world of generative AI, which conjures everything from
    music to art with just a few lines of code.
  id: totrans-1015
  prefs: []
  type: TYPE_NORMAL
  zh: 我们揭开了智能手机的亲切神秘面纱，它们似乎比您最好的朋友更了解您，并深入探讨了AI的历史背景。您了解了艾伦·图灵著名的提问：“机器能思考吗？”并穿越了机器学习的迷宫，数据就像面包屑一样引领我们前行。从那里，我们将您的笔记本电脑从打字机转变为创意伙伴，开启了令人惊叹的生成式AI世界，只需几行代码就能创造出从音乐到艺术的一切。
- en: This book aimed to empower you, dear reader, to unlock the creative potential
    of generative AI. We’ve strived to make it stress-free and hands-on, with a guide
    that ensures you’re not just a spectator in the AI revolution but a full-fledged
    participant. These chapters have focused on demystifying AI, breaking it down
    into bite-sized pieces that anyone can chew on without choking.
  id: totrans-1016
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书旨在赋予您，亲爱的读者，开启生成式AI创造潜能的力量。我们努力使其轻松上手，并确保您不仅成为AI革命的旁观者，而是成为一位全面参与的参与者。这些章节专注于揭开AI的神秘面纱，将其分解成任何人都能轻松消化的小块。
- en: Now, let’s take a moment to highlight some key learnings. You’ve discovered
    the intricate dance of GANs and VAEs, witnessed AI’s transformative power in industries
    from healthcare to media, and navigated the nuanced yet crucial world of AI ethics.
    You’ve even taken a peek into the future with AI's role in creative industries
    and its potential to revolutionize business strategies and operations.
  id: totrans-1017
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们花点时间强调一些关键的学习成果。您已经发现了GANs和VAEs错综复杂的舞蹈，见证了AI在从医疗保健到媒体等行业的变革力量，并了解了AI伦理的微妙而关键的世界。您甚至窥见了AI在创意产业中的作用以及其可能颠覆商业策略和运营的潜力。
- en: What are the takeaways, you ask? Firstly, AI isn’t a distant, complex technology;
    it’s a tool at your fingertips, ready to assist in whatever creative or professional
    venture you choose to pursue. Secondly, AI can be your creative partner, helping
    to innovate and inspire new possibilities. Thirdly, the ethical use of AI is both
    a responsibility and a necessity. Together, we must ensure this powerful tool
    does more good than harm.
  id: totrans-1018
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，您能从中获得哪些收获呢？首先，AI并非遥不可及、复杂的科技；它就在您的指尖，随时准备协助您追求任何创意或职业目标。其次，AI可以成为您的创意伙伴，帮助创新并激发新的可能性。第三，AI的道德使用既是责任也是必要性。我们必须共同努力，确保这个强大的工具带来的益处大于弊端。
- en: As you close this chapter, remember that the end of this book is just the beginning
    of your AI exploration. I encourage you to dive deeper into AI communities, participate
    in workshops, and perhaps start that AI project you've been dreaming about. Share
    your journey with others; your story could be the spark that ignites someone else’s
    passion for AI.
  id: totrans-1019
  prefs: []
  type: TYPE_NORMAL
  zh: 当您结束这一章节时，请记住，这本书的结尾只是您AI探索的开始。我鼓励您深入AI社区，参加研讨会，也许开始那个您一直梦想中的AI项目。与他人分享您的旅程；您的故事可能是点燃他人对AI热情的火花。
- en: Reflect on how your perception of AI has changed. Consider how you can integrate
    AI into your life to achieve your goals, whether that’s automating mundane tasks
    or crafting the next big thing in AI-driven creativity.
  id: totrans-1020
  prefs: []
  type: TYPE_NORMAL
  zh: 反思你对AI的认识如何改变。考虑如何将AI融入你的生活以实现你的目标，无论是自动化日常任务还是创造AI驱动下的下一个大创意。
- en: Before we part ways, a heartfelt thank you from me, Jordan Blake, the founder
    of NextGen AI Publications. Your commitment to learning and exploring AI through
    this book means the world to me. I appreciate your dedication and am thrilled
    to have been your guide on this journey.
  id: totrans-1021
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们分别之前，我，乔丹·布莱克，NextGen AI Publications的创始人，衷心感谢你。你通过这本书学习并探索AI的承诺对我来说意义重大。我赞赏你的奉献精神，并很高兴能成为你这段旅程的向导。
- en: Remember, the future is AI-driven, and you hold the power to drive its innovation.
    Keep exploring, keep questioning, and most importantly, keep creating. The world
    is waiting to see what you will accomplish.
  id: totrans-1022
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，未来是AI驱动的，而你拥有推动其创新的力量。继续探索，继续质疑，最重要的是，继续创造。世界正等着看你将取得什么成就。
- en: '![](image_rsrc44N.jpg)'
  id: totrans-1023
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc44N.jpg)'
- en: Glossary of Key Terms in Generative AI
  id: totrans-1024
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成式AI关键术语词汇表
- en: 'Chapter 1: Laying the Foundation'
  id: totrans-1025
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1章：奠定基础
- en: '● Algorithm: A step-by-step procedure or formula for solving a problem. In
    AI, algorithms process data to make decisions or predictions.'
  id: totrans-1026
  prefs: []
  type: TYPE_NORMAL
  zh: ● 算法：解决问题的一步一步的程序或公式。在AI中，算法处理数据以做出决策或预测。
- en: '● Artificial intelligence (AI): The creation of machines or systems that simulate
    human intelligence, performing tasks such as problem-solving, learning, and adapting.'
  id: totrans-1027
  prefs: []
  type: TYPE_NORMAL
  zh: ● 人工智能（AI）：创建模拟人类智能的机器或系统，执行诸如问题解决、学习和适应等任务。
- en: '● Autoregressive model: A type of AI model that predicts the next value in
    a sequence based on previous values. It is widely used in natural language processing
    (NLP) and systems like OpenAI''s GPT.'
  id: totrans-1028
  prefs: []
  type: TYPE_NORMAL
  zh: ● 自回归模型：一种基于先前值预测序列中下一个值的AI模型。它在自然语言处理（NLP）和OpenAI的GPT等系统中得到广泛应用。
- en: '● Dataset: A collection of structured or unstructured data used for training,
    validating, and testing models.'
  id: totrans-1029
  prefs: []
  type: TYPE_NORMAL
  zh: ● 数据集：用于训练、验证和测试模型的有序或无序数据集合。
- en: '● Data preprocessing: The process of cleaning, transforming, and preparing
    raw data for use in AI models, ensuring accuracy and reliability of results.'
  id: totrans-1030
  prefs: []
  type: TYPE_NORMAL
  zh: ● 数据预处理：清洗、转换和准备原始数据以供AI模型使用的过程，确保结果的准确性和可靠性。
- en: '● Deep learning: An AI method that mimics the structure and function of the
    human brain. These artificial neural networks can perform image recognition, natural
    language processing, and speech recognition.'
  id: totrans-1031
  prefs: []
  type: TYPE_NORMAL
  zh: ● 深度学习：一种模仿人脑结构和功能的AI方法。这些人工神经网络可以执行图像识别、自然语言处理和语音识别。
- en: 'Chapter 2: Tools of the Trade'
  id: totrans-1032
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2章：行业工具
- en: '● ChatGPT: An advanced language model by OpenAI designed for conversational
    AI, enabling dynamic and context-aware text interactions.'
  id: totrans-1033
  prefs: []
  type: TYPE_NORMAL
  zh: ● ChatGPT：由OpenAI开发的高级语言模型，旨在用于对话式AI，能够实现动态和上下文感知的文本交互。
- en: '● Integrated development environment (IDE): A software application that provides
    comprehensive tools and features to help developers write, test, manage, and debug
    code.'
  id: totrans-1034
  prefs: []
  type: TYPE_NORMAL
  zh: ● 集成开发环境（IDE）：一种提供全面工具和功能的软件应用，帮助开发者编写、测试、管理和调试代码。
- en: '● Low-code AI platforms: Tools that allow users to build AI applications with
    minimal coding, democratizing AI development.'
  id: totrans-1035
  prefs: []
  type: TYPE_NORMAL
  zh: ● 低代码AI平台：允许用户用最少的编码构建AI应用的工具，使AI开发民主化。
- en: '● AI debugging tools: Software designed to test, troubleshoot, and optimize
    AI models, ensuring accuracy and reliability in real-world applications.'
  id: totrans-1036
  prefs: []
  type: TYPE_NORMAL
  zh: ● AI调试工具：专为测试、故障排除和优化AI模型设计的软件，确保在现实世界应用中的准确性和可靠性。
- en: 'Chapter 3: Creative Ventures'
  id: totrans-1037
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3章：创新事业
- en: '● Neural style transfer (NST): A deep learning technique that applies the artistic
    style of one image to the content of another image.'
  id: totrans-1038
  prefs: []
  type: TYPE_NORMAL
  zh: ● 神经风格迁移（NST）：一种深度学习技术，将一个图像的艺术风格应用于另一个图像的内容。
- en: '● Generative adversarial network (GAN): An AI model that consists of two neural
    networks—a generator and a discriminator—that work in opposition to create realistic
    outputs.'
  id: totrans-1039
  prefs: []
  type: TYPE_NORMAL
  zh: ● 生成对抗网络（GAN）：一种由两个神经网络——生成器和判别器——组成的AI模型，它们相互对立以创建逼真的输出。
- en: '● Interactive design tools: AI tools like Adobe Sensei and RunwayML that enhance
    creative workflows by automating repetitive tasks and suggesting design innovations.'
  id: totrans-1040
  prefs: []
  type: TYPE_NORMAL
  zh: ● 交互式设计工具：如Adobe Sensei和RunwayML等AI工具，通过自动化重复性任务和提出设计创新来增强创意工作流程。
- en: 'Chapter 4: Business Innovations'
  id: totrans-1041
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4章：商业创新
- en: '● Predictive analytics: A data-driven approach using AI to forecast future
    trends or behaviors based on historical data, widely used in business.'
  id: totrans-1042
  prefs: []
  type: TYPE_NORMAL
  zh: ● 预测分析：一种数据驱动的方法，使用人工智能根据历史数据预测未来的趋势或行为，在商业领域广泛应用。
- en: '● Customer sentiment analysis: An AI-powered method to analyze customer feedback
    and determine emotional tone, helping businesses improve customer experiences.'
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: ● 客户情感分析：一种由人工智能驱动的分析方法，用于分析客户反馈并确定情感基调，帮助业务改善客户体验。
- en: '● AI in workforce management: AI systems for scheduling, workload distribution,
    and talent acquisition that enhance efficiency and productivity.'
  id: totrans-1044
  prefs: []
  type: TYPE_NORMAL
  zh: ● 人工智能在人力资源管理中的应用：用于调度、工作负载分配和人才招聘的人工智能系统，提高效率和生产力。
- en: '● Scaling with AI: The process of expanding operations efficiently using AI-driven
    solutions for automation, optimization, and decision-making.'
  id: totrans-1045
  prefs: []
  type: TYPE_NORMAL
  zh: ● 与AI一起扩展：使用AI驱动的自动化、优化和决策解决方案高效扩展运营的过程。
- en: '● Digital twins: Virtual replicas of physical systems or processes, used to
    simulate, predict, and optimize real-world performance with AI.'
  id: totrans-1046
  prefs: []
  type: TYPE_NORMAL
  zh: ● 数字孪生：物理系统或过程的虚拟副本，用于通过人工智能模拟、预测和优化现实世界的性能。
- en: '● Data silo: A collection of data controlled by one department or system within
    an organization and isolated from the rest of the organization.'
  id: totrans-1047
  prefs: []
  type: TYPE_NORMAL
  zh: ● 数据孤岛：一个由组织内部的一个部门或系统控制的数据集合，与其他组织部分隔离。
- en: 'Chapter 5: Navigating the Job Market'
  id: totrans-1048
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5章：应对就业市场
- en: '● Upskilling: The process of learning new AI-related skills to stay relevant
    in the evolving job market. Examples include courses on Python and machine learning.'
  id: totrans-1049
  prefs: []
  type: TYPE_NORMAL
  zh: ● 技能提升：学习新的AI相关技能的过程，以保持在不断变化的就业市场中的相关性。例如，包括Python和机器学习课程。
- en: '● Adaptive learning: AI-powered platforms that customize educational content
    to individual learners'' needs, improving learning outcomes.'
  id: totrans-1050
  prefs: []
  type: TYPE_NORMAL
  zh: ● 自适应学习：由人工智能驱动的平台，根据个别学习者的需求定制教育内容，提高学习成果。
- en: '● AI career portfolios: A collection of AI projects and practical applications
    showcasing technical skills, creativity, and problem-solving abilities.'
  id: totrans-1051
  prefs: []
  type: TYPE_NORMAL
  zh: ● 人工智能职业组合：展示技术技能、创造力和问题解决能力的AI项目和实际应用的集合。
- en: '● AI bootcamps: Intensive training programs focused on hands-on experience
    in AI concepts and applications, often targeted at career changers.'
  id: totrans-1052
  prefs: []
  type: TYPE_NORMAL
  zh: ● 人工智能训练营：专注于AI概念和应用的实际操作经验的密集培训项目，通常针对职业转换者。
- en: 'Chapter 6: Ethical Considerations'
  id: totrans-1053
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第6章：道德考量
- en: '● Ethical AI: The development and deployment of AI systems that prioritize
    fairness, accountability, and transparency, while minimizing harm.'
  id: totrans-1054
  prefs: []
  type: TYPE_NORMAL
  zh: ● 道德人工智能：开发和部署优先考虑公平性、问责制和透明度的AI系统，同时最大限度地减少伤害。
- en: '● Bias mitigation: Strategies to reduce biases in AI systems, such as using
    diverse datasets and regularly auditing algorithms.'
  id: totrans-1055
  prefs: []
  type: TYPE_NORMAL
  zh: ● 偏差缓解：减少AI系统中偏差的策略，例如使用多样化的数据集和定期审计算法。
- en: '● Privacy-preserving AI: Techniques like anonymization and encryption that
    protect individual privacy while enabling AI to process sensitive data.'
  id: totrans-1056
  prefs: []
  type: TYPE_NORMAL
  zh: ● 保护隐私的人工智能：如匿名化和加密等技术，在保护个人隐私的同时，使人工智能能够处理敏感数据。
- en: '● Fairness-aware algorithms: AI models designed to ensure equitable decision-making,
    addressing disparities in outcomes across different groups.'
  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: ● 公平感知算法：设计用于确保公平决策的人工智能模型，解决不同群体之间结果差异的问题。
- en: '● Explainable AI (XAI): A field focused on making AI systems transparent and
    interpretable, allowing users to understand the reasoning behind AI decisions.'
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: ● 可解释人工智能（XAI）：一个专注于使AI系统透明和可解释的领域，使用户能够理解AI决策背后的推理。
- en: '● AI accountability frameworks: Structures ensuring that developers, organizations,
    and systems are held accountable for AI decisions and outcomes.'
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: ● 人工智能问责框架：确保开发者、组织和系统对AI决策和结果负责的结构。
- en: 'Chapter 7: Breaking Barriers'
  id: totrans-1060
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第7章：打破壁垒
- en: '● Inclusive design: A design approach ensuring that AI systems are accessible
    and usable by people of all abilities and backgrounds.'
  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: ● 包容性设计：确保AI系统对所有能力和背景的人都是可访问和可用的设计方法。
- en: '● Cultural diversity in AI: Incorporating perspectives from various cultural
    backgrounds into AI development, ensuring global applicability and fairness.'
  id: totrans-1062
  prefs: []
  type: TYPE_NORMAL
  zh: ● 人工智能中的文化多样性：将来自各种文化背景的视角纳入AI开发，确保全球适用性和公平性。
- en: '● AI for accessibility: Tools designed to assist individuals with disabilities,
    such as voice-activated systems and AI-driven screen readers.'
  id: totrans-1063
  prefs: []
  type: TYPE_NORMAL
  zh: ● 人工智能助力无障碍：设计用于帮助残疾人士的工具，如语音激活系统和由人工智能驱动的屏幕阅读器。
- en: '● Mentorship in AI: Programs connecting seasoned AI professionals with underrepresented
    groups to foster diversity and provide guidance.'
  id: totrans-1064
  prefs: []
  type: TYPE_NORMAL
  zh: ● AI导师计划：将经验丰富的AI专业人士与代表性不足的群体联系起来，以促进多样性和提供指导。
- en: '● Intersectionality in AI: Considering overlapping social identities (e.g.,
    race, gender) to design AI systems that address complex inequalities.'
  id: totrans-1065
  prefs: []
  type: TYPE_NORMAL
  zh: ● AI中的交叉性：考虑重叠的社会身份（例如，种族、性别）来设计解决复杂不平等的AI系统。
- en: '● Diversity-driven data curation: Collecting datasets that reflect a wide range
    of perspectives, demographics, and cultures to improve AI inclusivity.'
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: ● 驱动多样性的数据整理：收集反映广泛观点、人口统计和文化数据的数据集，以改善AI包容性。
- en: 'Chapter 8: The Future of AI'
  id: totrans-1067
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第8章：AI的未来
- en: '● Edge AI: AI processing that occurs locally on devices (like smartphones or
    IoT systems) rather than in a centralized cloud, enabling faster responses.'
  id: totrans-1068
  prefs: []
  type: TYPE_NORMAL
  zh: ● 边缘AI：在本地设备（如智能手机或物联网系统）上进行的AI处理，而不是在集中式云中，从而实现更快的响应。
- en: '● Quantum computing: A transformative technology combining quantum mechanics
    with AI to solve complex problems exponentially faster than traditional computing.'
  id: totrans-1069
  prefs: []
  type: TYPE_NORMAL
  zh: ● 量子计算：一种结合量子力学与AI以比传统计算更快地解决复杂问题的变革性技术。
- en: '● Smart cities: Urban environments leveraging AI for optimized traffic management,
    energy efficiency, and citizen services.'
  id: totrans-1070
  prefs: []
  type: TYPE_NORMAL
  zh: ● 智慧城市：利用AI优化交通管理、能源效率和公民服务。
- en: '● Synthetic data: Artificially generated data used to train AI models, especially
    in scenarios where real-world data is scarce or sensitive.'
  id: totrans-1071
  prefs: []
  type: TYPE_NORMAL
  zh: ● 合成数据：用于训练AI模型的人工生成数据，特别是在现实世界数据稀缺或敏感的情况下。
