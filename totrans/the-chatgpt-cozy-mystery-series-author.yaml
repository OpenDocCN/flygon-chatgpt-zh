- en: 6\. Start Using OpenAI Tools
  prefs: []
  type: TYPE_NORMAL
- en: Once your account is activated, you can start using OpenAI's tools, including
    ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Free Version of ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT is free, but your request will be in the queue with the millions of
    other users online at that precise moment worldwide. Plus, it can only manage
    a certain amount of text in one conversation.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc462.jpg)'
  prefs: []
  type: TYPE_IMG
- en: This is more than enough capacity for most of the questions you can create during
    the writing process when your question is short and the answer is rarely more
    than a thousand words long.
  prefs: []
  type: TYPE_NORMAL
- en: For example, it won’t be able to create a synopsis for your entire 50,000-word
    novel.  You will have to break the text into smaller chunks, and the size of the
    chunk it can handle will depend on what mode of ChatGPT you are using.
  prefs: []
  type: TYPE_NORMAL
- en: 'Ask GPT to “continue”: Request that the AI continue its response from where
    it left off – allowing you to generate more content in a follow-up query.'
  prefs: []
  type: TYPE_NORMAL
- en: Paid Version of ChatGPT Plus
  prefs: []
  type: TYPE_NORMAL
- en: GPT-4 is OpenAI’s most advanced system, producing safer and more valuable responses.
    Thanks to its broader general knowledge and problem-solving abilities, GPT-4 can
    solve complex problems with greater accuracy. It is available in ChatGPT Plus.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-4 is more creative and can generate, edit, and iterate with users on creative
    and technical writing tasks, such as composing songs, writing screenplays, or
    learning a user’s writing style.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-4 is capable of handling over 25,000 words of text, allowing for long-form
    content creation, extended conversations, and document search and analysis. The
    total combined word count for the question input and output response for any query
    is estimated to be about 20,000 to 25,000 English words. These limits are likely
    to be extended as the AI is updated.
  prefs: []
  type: TYPE_NORMAL
- en: How to get the most out of ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: Leveraging the power of ChatGPT for your writing projects can be transformative,
    but here are a few key guidelines to get the most out of the tool.
  prefs: []
  type: TYPE_NORMAL
- en: An Introduction to Writing with AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In AI-assisted writing, the author and the AI tool work together to generate
    an output that meets the author’s needs for that part of the creative writing
    process.
  prefs: []
  type: TYPE_NORMAL
- en: For example, ChatGPT can generate a character profile for your cozy mystery
    detective, but it's the human author who provides the criteria, writes the prompts,
    and then critically evaluates and refines the character profile the tool generates.
    It's a collaborative process where the AI and the author work with their unique
    strengths.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT allows you to focus on those areas of the writing process that
    are your strengths, while the AI tool works on the other aspects.
  prefs: []
  type: TYPE_NORMAL
- en: This is a very different approach and will need a mindset shift.
  prefs: []
  type: TYPE_NORMAL
- en: As authors, we are accustomed to the solitary nature of writing, including staring
    at a blank page, crafting text from scratch, and then endlessly revising and editing
    the manuscript until we're happy with it.
  prefs: []
  type: TYPE_NORMAL
- en: With AI, the solitary nature of writing shifts to a more collaborative one when
    the "co-writer" is an artificial intelligence. In any form of collaboration, the
    way we communicate with our colleagues will determine the quality of the response
    we receive.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Understand How Prompts Work
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Prompt engineering is the skillful crafting of instructions that guide the AI's
    outputs. Prompts are crucial in guiding ChatGPT. The more specific and clear your
    prompts are, the more relevant the output will be.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT's interaction model is based on a prompt-and-response system. You, the
    user, provide a prompt, like the starting sentence of a story or a question, and
    the model generates a response based on what it has learned during its training.
    You can then ask for more information.
  prefs: []
  type: TYPE_NORMAL
- en: The way you structure your prompts can significantly influence the type of response
    you get.
  prefs: []
  type: TYPE_NORMAL
- en: Worked Example of Prompt Structure
  prefs: []
  type: TYPE_NORMAL
- en: 'What to do: Give me ten story ideas for'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Subject: a fantasy historical cozy mystery story featuring a brilliant
    amateur detective and an elusive thief who is an elf.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Context: The story is set in Victorian London.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Style: Each story idea should be engaging, have a murder to investigate
    and be attractive to readers of historical fantasy mystery fiction.'
  prefs: []
  type: TYPE_NORMAL
- en: If you're plotting a cozy mystery novel, you might begin with a detailed prompt
    that outlines the main characters, the setting, and the general direction of the
    plot.
  prefs: []
  type: TYPE_NORMAL
- en: 'New Ideas: At the initial brainstorming stage, prompts can be questions or
    open-ended scenarios.'
  prefs: []
  type: TYPE_NORMAL
- en: For example, an author might use the prompt, "What could be some unique complications
    in a love story between a Victorian private detective and an elf living in the
    London underworld?"
  prefs: []
  type: TYPE_NORMAL
- en: 'Drafting: Once the basic story framework is in place, prompts can be more directive,
    outlining a scenario or event in the story. A prompt like, "Describe the first
    time the detective meets the elf that he has been following through the dark London
    streets into the forbidden zones," gives the AI clear guidance. Including character
    names, descriptions, and emotional cues can help produce more nuanced responses.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Revising: In the revision stage, prompts can be used to rework existing content.
    If a specific dialogue feels stilted, authors can prompt the AI with, "Rewrite
    the following dialogue in a more casual, playful tone..." Similarly, for improving
    narrative descriptions, prompts like "Describe the same event from a different
    character''s perspective..." can provide fresh insights.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Polishing: Finally, during the polishing stage, authors can use prompts to
    refine the language, ensuring the text is engaging and grammatically correct.
    A prompt could be, "Proofread the following paragraph for grammar and style,"
    or "Rewrite this passage using more vivid, sensory language..."'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Try Role-Playing for Dialogue
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A role-playing approach can be effective in creating dialogue. Define the role
    of the AI, for instance, as a character in your novel, and engage in a conversation
    as if you were another character.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say that you are creating a dialogue between your Victorian amateur detective
    and a police officer who is investigating a murder at a grand ball. You could
    assign roles like this: "You are a brilliant Victorian aristocratic amateur sleuth
    trying to calm down a demanding police officer sent to investigate a murder and
    the theft of a very special moonstone.”'
  prefs: []
  type: TYPE_NORMAL
- en: You can also ask the AI to interview one or more characters as though they were
    living people, asking about their lives and personality.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Review and Iterate
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ChatGPT’s responses are not always perfect. If the output isn't what you expected,
    you may need to rephrase your prompt or request a regeneration. Experimenting
    with different prompts and learning from these trials can lead to better results.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, if a prompt "Describe a small coastal town" generates a response
    that's too generic, you might adjust it to "Describe a small coastal town on an
    evening in summer when the tourists have left the harbor for the residents to
    enjoy. Provide sensory details of the scene from the viewpoint of a barista who
    enjoys walking along the harbor in the evening with her rescue dog and watching
    the fishing boats."
  prefs: []
  type: TYPE_NORMAL
- en: By incorporating these strategies and approaches into your use of ChatGPT, you'll
    be better equipped to create engaging and compelling content. The more you use
    and experiment with this technology, the more effective you'll become.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT in Creative Writing: Strengths and Limitations'
  prefs: []
  type: TYPE_NORMAL
- en: The strengths of ChatGPT in creative writing lie in its ability to generate
    diverse and creative narratives, produce large amounts of text quickly, and provide
    unique perspectives that inspire new ideas. It can help overcome writer's block,
    increase productivity, and be a valuable tool for brainstorming and drafting.
  prefs: []
  type: TYPE_NORMAL
- en: However, these strengths come with limitations.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT's text generation is based on patterns it learned during training, which
    means it can occasionally produce inappropriate or nonsensical outputs.
  prefs: []
  type: TYPE_NORMAL
- en: It can sometimes be overly verbose and may not always maintain perfect consistency,
    especially in longer narratives. Furthermore, while it can follow the instructions
    in a prompt, it doesn't understand the story like a human would.
  prefs: []
  type: TYPE_NORMAL
- en: As we navigate this brave new world of AI-assisted writing, remember that tools
    like ChatGPT are just that. Tools.
  prefs: []
  type: TYPE_NORMAL
- en: This is a tool to help you brainstorm ideas, spark new ones, and then shape
    YOUR version of those ideas, tropes, themes, characters, and settings into a working
    outline of your cozy mystery faster than you thought possible.
  prefs: []
  type: TYPE_NORMAL
- en: Challenges using ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, I want to discuss some ethical and legal aspects of using ChatGPT,
    or any other form of AI, to support your creative writing.
  prefs: []
  type: TYPE_NORMAL
- en: OWNERSHIP AND Copyright challenges
  prefs: []
  type: TYPE_NORMAL
- en: You have just seen, and I hope you tested out for yourself, how ChatGPT can
    write the text of a working draft of your cozy mystery novel using the prompts
    you provided.
  prefs: []
  type: TYPE_NORMAL
- en: 'The challenge is this: You may have provided unique prompts based on your ideas
    and the ideas generated by ChatGPT, but the AI has written the text for that scene
    or chapter.'
  prefs: []
  type: TYPE_NORMAL
- en: Who owns that piece of writing?
  prefs: []
  type: TYPE_NORMAL
- en: As you can imagine, this is a complex and rapidly evolving area of intellectual
    property law. You should understand the current situation but be aware that these
    issues are being examined globally.
  prefs: []
  type: TYPE_NORMAL
- en: Please note that I am not a lawyer, and this section should not be considered
    legal advice for your country and situation, but I have researched this topic
    for my work.
  prefs: []
  type: TYPE_NORMAL
- en: My understanding at this time is that the copyright laws in place are designed
    to protect any work that human authors have created.
  prefs: []
  type: TYPE_NORMAL
- en: Due to their creative involvement, the author who created the prompts and then
    revised, edited, and shaped the output generated by ChatGPT holds the copyright
    for the final text.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, they took the AI's ideas and used them as inspiration to create
    a final original work that is substantially different from the response ChatGPT
    generated.
  prefs: []
  type: TYPE_NORMAL
- en: AI did not write the text. The author used AI as a writing assistant.
  prefs: []
  type: TYPE_NORMAL
- en: 'This means that:'
  prefs: []
  type: TYPE_NORMAL
- en: '#1\. The prompts you input into ChatGPT to generate prose must be your specific
    and original ideas, even if they were inspired by ideas suggested by ChatGPT,
    and don’t infringe on the intellectual property of other authors.'
  prefs: []
  type: TYPE_NORMAL
- en: I have seen videos on YouTube that suggest that you prompt ChatGPT to rewrite
    the text of your scenes in the style of the bestselling authors in your niche,
    so your book is as good as the competition.
  prefs: []
  type: TYPE_NORMAL
- en: Please do not do that. Plagiarism is real. Although some writers do this as
    a writing exercise to improve their skills and learn their craft, I still would
    not do it.
  prefs: []
  type: TYPE_NORMAL
- en: Intellectual Property lawyers will make a lot of money in AI in the coming years
    because authors' copyrighted works have been used to train large language models.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT has been trained using an enormous range of online material and may
    have “learned” the style of popular books in your niche as part of learning how
    language patterns are constructed. It does not hold or recall specific sources
    or documents. It generates responses based on predicting what should come next
    in a piece of text based on the patterns and structures it has learned during
    training.
  prefs: []
  type: TYPE_NORMAL
- en: The chance of an exact sentence or turn of phrase being precisely the same as
    the text in an existing work of fiction is very remote, but the last thing you
    want is to be accused of plagiarism of another author’s work.
  prefs: []
  type: TYPE_NORMAL
- en: '#2\. Do not use copyrighted characters, settings, or plot elements.'
  prefs: []
  type: TYPE_NORMAL
- en: I recommend that you don’t use copyrighted characters, trade names, settings,
    or plot elements in any of your prompts. It is easy to ask ChatGPT to create a
    plot outline for a seven-book YA Fantasy series set in a fantasy school for witchcraft
    and wizardry, featuring a young orphan hero like the one created by J.K. Rowling.
  prefs: []
  type: TYPE_NORMAL
- en: Please do not do that. You have plenty of ideas of your own.
  prefs: []
  type: TYPE_NORMAL
- en: If you are concerned about plagiarism, use a plagiarism detection tool before
    publishing. A quick internet search will show you what is available in both free
    and paid options.
  prefs: []
  type: TYPE_NORMAL
- en: The more specific and unique your prompts, the less likely the output will be
    similar to published books.
  prefs: []
  type: TYPE_NORMAL
- en: Review what has been generated, then change the prompts to include your ideas
    for characters, settings, and hooks, for example, and then regenerate responses
    until you get a unique result.
  prefs: []
  type: TYPE_NORMAL
- en: '#3\. Do not simply copy and paste the prose generated by ChatGPT and use this
    directly in your manuscript. AI Detection is rapidly evolving.'
  prefs: []
  type: TYPE_NORMAL
- en: There may be “writers” who would rather not take the time to study story craft
    and are more interested in creating a 50,000-word cozy mystery novel in a day
    without any creative or human input whatsoever. Yes, I have shown you how you
    can do that. But that is their choice.
  prefs: []
  type: TYPE_NORMAL
- en: Please don’t do that.
  prefs: []
  type: TYPE_NORMAL
- en: Not only will the quality be questionable, but many publishers are checking
    manuscripts with AI detection systems and may reject books that they consider
    are not the result of a substantive amount of human creativity.
  prefs: []
  type: TYPE_NORMAL
- en: If you are concerned, a range of free and paid AI detection software is available,
    and the list is growing rapidly. I would encourage you to research and evaluate
    the free options.
  prefs: []
  type: TYPE_NORMAL
- en: '#4\. Value your creative talent.'
  prefs: []
  type: TYPE_NORMAL
- en: Currently, ChatGPT generates creative writing ideas faster than I can type,
    and ChatGPT-Plus can manage entire chapters of text.
  prefs: []
  type: TYPE_NORMAL
- en: Use the tool the way it was intended to be used.
  prefs: []
  type: TYPE_NORMAL
- en: To rapidly triage a range of ideas for plot threads and characters, for example,
    and generate a draft outline of your cozy mystery manuscript faster than you thought
    possible.
  prefs: []
  type: TYPE_NORMAL
- en: Then, you can put on your “cozy mystery writer hat” and deepen the character
    arc, building layers of conflict into the plot, and having fun with dialogue and
    luscious settings.
  prefs: []
  type: TYPE_NORMAL
- en: Creative writing and storytelling are very human activities.
  prefs: []
  type: TYPE_NORMAL
- en: No AI system, no matter how sophisticated and trained, will understand the complexity
    and subtle nuances of the authentic human emotional conflict implicit in a romance
    or mystery novel.
  prefs: []
  type: TYPE_NORMAL
- en: Just like any scrappy first draft, you should expect to take the ideas that
    emerge and rework them, rewrite and reshape them, and then revise the text to
    add your personal style, creative flair, and original voice.
  prefs: []
  type: TYPE_NORMAL
- en: This is when your unique talent can shine!
  prefs: []
  type: TYPE_NORMAL
- en: SUMMARY AND CONCLUSIONS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Artificial intelligence is with us, and it is here to stay.
  prefs: []
  type: TYPE_NORMAL
- en: Whether we like it or not, AI is already integrated into our daily lives, including
    the spelling and grammar check features in our word processing software packages,
    online bookstore algorithms, and predictive text generators worldwide.
  prefs: []
  type: TYPE_NORMAL
- en: The creative writing world is at the forefront of a revolutionary innovative
    approach to AI-assisted co-writing, spearheaded by innovative AI tools like ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Fiction writers are in a unique place where they can use tools like ChatGPT
    to explore and expand their creativity like never before.
  prefs: []
  type: TYPE_NORMAL
- en: It is like having a friendly co-author who is always available to help you with
    those areas of the creative writing process that are not your strengths.
  prefs: []
  type: TYPE_NORMAL
- en: Like any other tool, the value of ChatGPT lies in the hands of the user. I hope
    I have demonstrated that ChatGPT can generate human-like text to help you brainstorm
    new story ideas, develop character profiles, build effective and engaging plot
    outlines, and then help draft the text of the scenes – without losing your authentic,
    unique creativity and talent.
  prefs: []
  type: TYPE_NORMAL
- en: AI will continue to evolve and become an even more powerful tool to support
    your creative work.
  prefs: []
  type: TYPE_NORMAL
- en: As I said at the beginning of this book, there is no one-size-fits-all approach
    to writing fiction. What works for me may not work for you.
  prefs: []
  type: TYPE_NORMAL
- en: Every writer is unique and has to discover a technique and process that works
    for them!
  prefs: []
  type: TYPE_NORMAL
- en: If you are a planner, my structured approach using a 24-chapter plot outline
    will immediately appeal to how you approach your writing. It also works very well
    with AI-assisted writing, which has been trained on predictive story structures
    and story patterns.
  prefs: []
  type: TYPE_NORMAL
- en: From personal experience, story craft can also be a great resource if you write
    intuitively, and then come back to revise and rewrite the early drafts of your
    manuscript to create a solid second draft.
  prefs: []
  type: TYPE_NORMAL
- en: Many authors use a combination of techniques and create a simple outline or
    rough first draft, as I have suggested, but then dive in and work on the individual
    scenes, which could be anywhere in the story, slowly building rising action as
    they write from turning point to turning point.
  prefs: []
  type: TYPE_NORMAL
- en: No matter how you write, my sincere wish is that this book will be a valuable
    guide to planning a cozy mystery series using ChatGPT, and I would be delighted
    if you explored these techniques and tried them out with your next project.
  prefs: []
  type: TYPE_NORMAL
- en: Happy writing! Nina.
  prefs: []
  type: TYPE_NORMAL
