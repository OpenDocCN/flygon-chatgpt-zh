    ChatGPT Plugin for Adobe Creative Cloud can help with graphic design, video editing,
    and composing music, or ChatGPT Plug. -in for Canva can help design various graphics
    easily.'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: ● 图形工作：此类 ChatGPT 插件可以帮助处理各种图形工作，如图形设计、视频编辑、音乐创作等。例如，适用于 Adobe Creative Cloud
    的 ChatGPT 插件可以帮助图形设计、视频编辑和音乐创作，或者适用于 Canva 的 ChatGPT 插件可以帮助轻松设计各种图形。
- en: '● Marketing work : This type of ChatGPT Plugin can help with various marketing
    tasks such as writing advertising content. analyze marketing data, etc. For example,
    the ChatGPT Plugin for WordPress can help you write content for a website, or
    the ChatGPT Plugin for Shopify can help you write content for an online store.'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: ● 营销工作：此类 ChatGPT 插件可以帮助处理各种营销任务，如撰写广告内容、分析营销数据等。例如，适用于 WordPress 的 ChatGPT
    插件可以帮助您撰写网站内容，或者适用于 Shopify 的 ChatGPT 插件可以帮助您撰写在线商店内容。
- en: '● Sales work : This type of ChatGPT Plugin can help with various sales tasks
    such as creating sales campaigns. For example, the ChatGPT Plugin for LinkedIn
    can help you write content for your LinkedIn profile, or the ChatGPT Plugin for
    Twitter can help you write tweets.'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: ● 销售工作：此类 ChatGPT 插件可以帮助处理各种销售任务，如创建销售活动。例如，适用于 LinkedIn 的 ChatGPT 插件可以帮助您撰写
    LinkedIn 个人资料内容，或者适用于 Twitter 的 ChatGPT 插件可以帮助您撰写推文。
- en: '● Customer service work : This type of ChatGPT Plugin can help with various
    customer service tasks, such as answering customer questions. Solve customer issues,
    etc. For example, the ChatGPT Plugin for Slack can send automated messages, or
    the ChatGPT Plugin for Microsoft Outlook can send automatic emails.'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: ● 客户服务工作：此类 ChatGPT 插件可以帮助处理各种客户服务任务，如回答客户问题、解决客户问题等。例如，适用于 Slack 的 ChatGPT
    插件可以发送自动消息，或者适用于 Microsoft Outlook 的 ChatGPT 插件可以发送自动电子邮件。
- en: '● Production work : This type of ChatGPT Plugin can help with various production
    tasks such as production planning, quality control, etc. For example, ChatGPT
    Plugin for ERP can help with production planning, or ChatGPT Plugin for MES can
    help with quality control.'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: ● 生产工作：此类 ChatGPT 插件可以帮助处理各种生产任务，如生产计划、质量控制等。例如，适用于 ERP 的 ChatGPT 插件可以帮助生产计划，或者适用于
    MES 的 ChatGPT 插件可以帮助质量控制。
- en: '● Design work : This type of ChatGPT Plugin can help with various design tasks
    such as designing new products, designing graphics, etc. For example, ChatGPT
    Plugin for CAD can help design new products or ChatGPT Plugin for SolidWorks can
    help design work. engineering'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: ● 设计工作：此类 ChatGPT 插件可以帮助处理各种设计任务，如设计新产品、设计图形等。例如，适用于 CAD 的 ChatGPT 插件可以帮助设计新产品，或者适用于
    SolidWorks 的 ChatGPT 插件可以帮助设计工程工作。
- en: '● Game work : This type of ChatGPT Plugin can help with various game tasks
    such as story writing, dialogue writing, character design, etc. For example, ChatGPT
    Plugin for Unity can help with story writing, dialogue writing, or ChatGPT Plugin
    for Unreal Engine can help with character design. drama'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: ● 游戏工作：此类 ChatGPT 插件可以帮助处理各种游戏任务，如故事编写、对话编写、角色设计等。例如，适用于 Unity 的 ChatGPT 插件可以帮助故事编写、对话编写，或者适用于
    Unreal Engine 的 ChatGPT 插件可以帮助角色设计。
- en: 2\. Divided according to usage
  id: totrans-146
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. 根据用途分类
- en: 'ChatGPT Plugin can be divided into categories according to usage characteristics
    as follows:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 插件可以根据使用特性分为以下类别：
- en: '● general type : This type of ChatGPT Plugin can be used for a variety of different
    tasks. For example, ChatGPT Plugin for Microsoft Office can help with documents,
    presentations, and collaborating with others. Or ChatGPT Plugin for Google Workspace
    can help. Document work, presenting work, and working with others.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: ● 通用类型：此类 ChatGPT 插件可用于各种不同的任务。例如，适用于 Microsoft Office 的 ChatGPT 插件可以帮助处理文档、演示文稿以及与他人协作。或者适用于
    Google Workspace 的 ChatGPT 插件可以帮助处理文档工作、演示文稿工作以及与他人协作。
- en: '● specialized type : This type of ChatGPT Plugin can only be used for specific
    tasks. For example, the ChatGPT Plugin for WordPress can help you write content
    for a website, or the ChatGPT Plugin for Shopify can help you write content for
    an online store.'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: ● 专用类型：此类 ChatGPT 插件只能用于特定任务。例如，WordPress 的 ChatGPT 插件可以帮助您撰写网站内容，或者 Shopify
    的 ChatGPT 插件可以帮助您撰写在线商店的内容。
- en: '● Customizable : This type of ChatGPT Plugin can be customized to suit the
    user''s needs. For example, the user can specify the format of the document that
    ChatGPT creates or the style of graphics that ChatGPT designs, etc.'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: ● 可定制性：此类 ChatGPT 插件可以根据用户需求进行定制。例如，用户可以指定 ChatGPT 创建的文档格式或 ChatGPT 设计的图形风格等。
- en: 3\. Divided by development
  id: totrans-151
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3. 按发展分类
- en: 'ChatGPT Plugin can be divided into categories according to development as follows:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 根据发展情况，ChatGPT 插件可以分为以下类别：
- en: '● open type : These types of ChatGPT Plugins are free to download and install.
    For example, ChatGPT Plugin for Microsoft Office is free to download and install,
    or ChatGPT Plugin for Google Workspace is free to download and install.'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: ● 开放类型：这些类型的 ChatGPT 插件可以免费下载和安装。例如，Microsoft Office 的 ChatGPT 插件可以免费下载和安装，或者
    Google Workspace 的 ChatGPT 插件可以免费下载和安装。
- en: '● closed type : This type of ChatGPT Plugin must be purchased or rented. For
    example, ChatGPT Plugin for WordPress can be purchased or rented, or ChatGPT Plugin
    for Shopify can be purchased or rented.'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: ● 封闭类型：此类 ChatGPT 插件必须购买或租赁。例如，WordPress 的 ChatGPT 插件可以购买或租赁，或者 Shopify 的 ChatGPT
    插件可以购买或租赁。
- en: In summary, ChatGPT Plugins can be divided into several categories based on
    their functionality. Allows users to choose the ChatGPT Plugin that best suits
    their needs and usage.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，ChatGPT 插件可以根据其功能分为几个类别。允许用户选择最适合他们需求和使用的 ChatGPT 插件。
- en: Features of ChatGPT Plugin
  id: totrans-156
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT 插件的特点
- en: 'ChatGPT Plugin Has a variety of features It allows users to work more efficiently
    and effectively. Features of ChatGPT Plugin are as follows:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 插件具有多种功能，它允许用户更高效和有效地工作。ChatGPT 插件的特点如下：
- en: ● Ability to access information
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: ● 访问信息的能力
- en: The ChatGPT Plugin can freely access data from various sources, allowing ChatGPT
    to work more efficiently. For example, the ChatGPT Plugin can access data from
    various application databases or access data from the Internet.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 插件可以自由访问来自各种来源的数据，使 ChatGPT 的工作更加高效。例如，ChatGPT 插件可以访问各种应用程序数据库中的数据，或从互联网上获取数据。
- en: ● Ability to work with other applications
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: ● 与其他应用程序协同工作的能力
- en: ChatGPT Plugin integrates seamlessly with other applications. It allows users
    to work quickly and easily. For example, the ChatGPT Plugin is compatible with
    Microsoft Office, allowing users to quickly write documents, present work, and
    collaborate with others.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 插件与其他应用程序无缝集成。它允许用户快速轻松地工作。例如，ChatGPT 插件与 Microsoft Office 兼容，使用户能够快速撰写文档、展示工作并与他人协作。
- en: ● Ability to process information
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: ● 处理信息的能力
- en: ChatGPT Plugin is able to process data efficiently, helping ChatGPT to work
    with accuracy and precision. For example, ChatGPT Plugin can translate languages
    accurately and accurately.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 插件能够高效地处理数据，帮助 ChatGPT 准确且精确地工作。例如，ChatGPT 插件可以准确翻译语言。
- en: ● Ability to create content
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: ● 创建内容的能力
- en: ChatGPT Plugin can create content in a variety of formats. Helps users work
    more efficiently. For example, ChatGPT Plugin can help with writing documents,
    summarizing information, translating languages, designing graphics, editing videos,
    composing music, etc.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 插件可以在多种格式中创建内容，帮助用户更高效地工作。例如，ChatGPT 插件可以帮助撰写文档、总结信息、翻译语言、设计图形、编辑视频、创作音乐等。
- en: ● Ability to learn and improve
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: ● 学习和改进的能力
- en: The ChatGPT Plugin is able to continuously learn and improve, helping ChatGPT
    to work more efficiently in the future. For example, the ChatGPT Plugin can learn
    from new data as it comes in, which helps ChatGPT to function. more accurately
    and accurately
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 插件能够持续学习和改进，帮助 ChatGPT 在未来工作得更加高效。例如，当新数据到来时，ChatGPT 插件可以从中学到东西，这有助于
    ChatGPT 更准确和精确地工作。
- en: The ChatGPT Plugin can also be customized to suit the user's needs. For example,
    users can specify the style of documents they want ChatGPT to create or the style
    of graphics they want ChatGPT to design. etc.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 插件可以根据用户需求进行定制。例如，用户可以指定他们希望 ChatGPT 创建的文档风格或希望 ChatGPT 设计的图形风格等。
- en: In summary, ChatGPT Plugin has a wide range of features. Helps users to work
    efficiently and effectively.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，ChatGPT 插件具有广泛的功能。帮助用户高效有效地工作。
- en: Chapter
  id: totrans-170
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 章节
- en: '3'
  id: totrans-171
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '3'
- en: Using the ChatGPT Plugin Prepare Before registering to use ChatGPT Plugin
  id: totrans-172
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在注册使用 ChatGPT 插件之前，请准备使用 ChatGPT 插件。
- en: '![](image_rsrcXH.jpg)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcXH.jpg)'
- en: Preparation for using ChatGPT Plugin is as follows.
  id: totrans-174
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 插件前的准备工作如下。
- en: ● Basic knowledge about ChatGPT
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: ● 基本了解 ChatGPT
- en: Before using the ChatGPT Plugin, users should have basic knowledge about ChatGPT.
    At least they should understand the working principles of ChatGPT and basic methods
    of using ChatGPT.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用 ChatGPT 插件之前，用户应该对 ChatGPT 有基本了解。至少他们应该理解 ChatGPT 的工作原理和基本使用方法。
- en: ● ChatGPT account
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: ● ChatGPT 账户
- en: Users need a ChatGPT account to use the ChatGPT Plugin. A ChatGPT account is
    free to sign up on the OpenAI website.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 用户需要 ChatGPT 账户才能使用 ChatGPT 插件。ChatGPT 账户可以在 OpenAI 网站上免费注册。
- en: ● Applications you want to use
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: ● 您想要使用的应用程序
- en: Users need to have the application they want to use ChatGPT Plugin for example
    Microsoft Office, Google Workspace, Adobe Creative Cloud, etc.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 用户需要拥有他们想要使用 ChatGPT 插件的软件，例如 Microsoft Office、Google Workspace、Adobe Creative
    Cloud 等。
- en: ● internet connection
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: ● 互联网连接
- en: ChatGPT Plugin requires an internet connection to work. Users therefore need
    to have a stable internet connection.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 插件需要互联网连接才能工作。因此，用户需要有稳定的互联网连接。
- en: Additionally, users should study additional details about the ChatGPT Plugin
    for the application they want to use. To learn how to use the ChatGPT Plugin effectively.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，用户还应研究他们想要使用的应用程序的 ChatGPT 插件的相关详细信息。以学习如何有效地使用 ChatGPT 插件。
- en: In summary, preparation for using ChatGPT Plugin is as follows.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，使用 ChatGPT 插件前的准备工作如下。
- en: ● Basic knowledge about ChatGPT ● ChatGPT account
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: ● 基本了解 ChatGPT ● ChatGPT 账户
- en: ● Applications you want to use ● internet connection
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: ● 您想要使用的应用程序 ● 互联网连接
- en: When the user is fully prepared So you can use ChatGPT Plugin effectively.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 当用户完全准备好后，您就可以有效地使用 ChatGPT 插件了。
- en: To apply for ChatGPT to use the ChatGPT Plugin, you need to apply for ChatGPT
    with ChatGPT Plus only.
  id: totrans-188
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 要申请使用 ChatGPT 插件，您需要仅使用 ChatGPT Plus 申请 ChatGPT。
- en: 'ChatGPT has 2 application forms:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 有两种应用形式：
- en: '1. ChatGPT Free : Apply for free, can use basic ChatGPT, cannot use ChatGPT
    Plugin.'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 1. ChatGPT Free：免费申请，可以使用基本 ChatGPT，但不能使用 ChatGPT 插件。
- en: '2\. ChatGPT Plus : Apply for payment Starting at $10 per month, ChatGPT features
    include advanced features and the ChatGPT Plugin.'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 2. ChatGPT Plus：申请付费，起价为每月 10 美元，ChatGPT 功能包括高级功能和 ChatGPT 插件。
- en: 'Advantages of ChatGPT Plus include:'
  id: totrans-192
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT Plus 的优势包括：
- en: ● Able to use advanced ChatGPT
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: ● 能够使用高级 ChatGPT
- en: ● Able to use ChatGPT Plugin
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: ● 能够使用 ChatGPT 插件
- en: ● Has a higher daily word limit than ChatGPT Free. ● Has faster processing speed
    than ChatGPT Free
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: ● 比ChatGPT Free有更高的每日字数限制 ● 比ChatGPT Free有更快的处理速度
- en: Steps to activate ChatGPT Plugin
  id: totrans-196
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 激活 ChatGPT 插件的步骤
- en: 1\. Log in to ChatGPT by going to https://chat.openai.com. Enter your username
    and password and click the "Log in" button.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 通过访问 https://chat.openai.com 登录 ChatGPT。输入您的用户名和密码，然后点击“登录”按钮。
- en: '![](image_rsrcXJ.jpg)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcXJ.jpg)'
- en: 2\. Enter your email address in the Email field, then click the Continue button.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 在电子邮件字段中输入您的电子邮件地址，然后点击继续按钮。
- en: '![](image_rsrcXK.jpg)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcXK.jpg)'
- en: 3\. Enter your password in the Password field, then click the Continue button.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 在密码字段中输入您的密码，然后点击继续按钮。
- en: '![](image_rsrcXM.jpg)'
  id: totrans-202
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcXM.jpg)'
- en: 4\. Once you are logged into ChatGPT, click on GPT-4.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 一旦您登录到 ChatGPT，点击 GPT-4。
- en: '![](image_rsrcXN.jpg)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcXN.jpg)'
- en: 5\. If you haven't applied for ChatGPT Plus yet, you must apply for the service
    first. The price is 20 USD or approximately 712 baht.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 如果您尚未申请 ChatGPT Plus，您必须首先申请该服务。价格为 20 美元或约 712 泰铢。
- en: '![](image_rsrcXP.jpg)'
  id: totrans-206
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcXP.jpg)'
- en: 6\. If you have already applied for ChatGPT Plus but do not have the plugin,
    the Plugin Store will appear. Click the Plugin Store button.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 如果您已经申请了 ChatGPT Plus 但没有插件，插件商店将出现。点击插件商店按钮。
- en: '![](image_rsrcXR.jpg)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcXR.jpg)'
- en: Steps to install required Plugin from ChatGPT Plugin Store
  id: totrans-209
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从 ChatGPT 插件商店安装所需插件的步骤
- en: 1\. Click on Plugin store as shown in the picture below.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 点击如图所示的插件商店。
- en: '![](image_rsrcXS.jpg)'
  id: totrans-211
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcXS.jpg)'
- en: 2\. The Plugin Store screen will appear as shown below.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 插件商店界面将显示如下。
- en: '![](image_rsrcXT.jpg)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcXT.jpg)'
- en: 3\. Search Find the desired Plugin and click the Install button. As in the example,
    the Canva Plugin is installed.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 搜索 查找所需的插件并点击安装按钮。例如，在示例中安装了 Canva 插件。
- en: '![](image_rsrcXU.jpg)4\. After installing the desired Plugin You can send a
    command prompt to let the Plugin work immediately.'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: '![](image_rsrcXU.jpg)4\. 安装所需的插件后，你可以发送一个命令提示符让插件立即工作。'
- en: We can install as many Plugins as we want and we can enable more than 1 Plugin
    to work simultaneously.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以安装我们想要的任何插件，并且我们可以启用超过1个插件同时工作。
- en: Example of using ChatGPT Plugin
  id: totrans-217
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT插件的示例
- en: In this topic, we will give an example of installing and using the Canva Plugin
    to help create a Youtube video as shown in the picture below.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个主题中，我们将给出安装和使用Canva插件的示例，以帮助创建如图所示的YouTube视频。
- en: Plugin Canva is a Plugin for using Canva to create graphics, presentations,
    and various documents.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 插件Canva是一个用于使用Canva创建图形、演示文稿和各种文档的插件。
- en: 1\. Install the Canva Plugin
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. 安装Canva插件
- en: Search for Plugin Canva in the Plugin Store and click the Install button as
    shown below.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 在插件商店中搜索Canva插件，并点击下面的安装按钮。
- en: '![](image_rsrcXU.jpg)'
  id: totrans-222
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcXU.jpg)'
- en: 2\. When the Plugin is finished installing, try sending the command prompt as
    shown below to make Canva work as we want.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 当插件安装完成后，尝试发送以下命令提示符，使Canva按我们的意愿工作。
- en: Prompt > Pleasecreateyoutubevideoforrealestatecompany
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 提示 > 请为房地产公司创建YouTube视频
- en: '![](image_rsrcXV.jpg)'
  id: totrans-225
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcXV.jpg)'
- en: 3\. ChatGPT will create a Youtube video through Canva. Wait a moment and you
    will get the video template that Canva created from the ChatGPT command prompt
    and you can click on the template that ChatGPT shows. to continue accessing the
    Canva program
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. ChatGPT将通过Canva创建一个YouTube视频。稍等片刻，你将获得Canva根据ChatGPT命令提示符创建的视频模板，你可以点击ChatGPT显示的模板以继续访问Canva程序
- en: '![](image_rsrcXW.jpg)4\. You can then edit the template further in Canva as
    you want.'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: '![](image_rsrcXW.jpg)4\. 你可以在Canva中进一步编辑模板，按你的需求进行。'
- en: '![](image_rsrcXX.jpg)'
  id: totrans-228
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcXX.jpg)'
- en: Therefore, the principle of using other ChatGPT Plugins is the same as the Canva
    Plugin working example. If we want to use any Plugin, there will be steps as follows.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，使用其他ChatGPT插件的原则与Canva插件的工作示例相同。如果我们想使用任何插件，都会有以下步骤。
- en: 1\. Go to Plugin Store
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. 前往插件商店
- en: 2\. Search Search for the desired plugin.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 搜索 搜索你想要的插件。
- en: 3\. Install the required Plugin
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 安装所需的插件
- en: 4\. Send a command prompt to the Plugin you want to run.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 4\. 向你想要运行的插件发送命令提示符。
- en: 5\. Wait for the results that ChatGPT and the respective Plugins produce.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 5\. 等待ChatGPT和相应插件产生的结果。
- en: 6\. If you are not satisfied with the results, you can send it to ChatGPT to
    regenerate until you get what you want.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 6\. 如果你对结果不满意，你可以将其发送到ChatGPT重新生成，直到你得到你想要的结果。
- en: Chapter
  id: totrans-236
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 章节内容
- en: '4'
  id: totrans-237
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '4'
- en: Example 15 Platform that can use ChatGPT Plugin Microsoft Office
  id: totrans-238
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 示例15 可使用ChatGPT插件的平台 Microsoft Office
- en: ChatGPT plugin for Microsoft Office is called ChatGPT for Office Can be used
    with Microsoft Office programs such as Word, Excel, PowerPoint, OneNote, Outlook,
    and Teams.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的Microsoft Office插件称为ChatGPT for Office，可与Word、Excel、PowerPoint、OneNote、Outlook和Teams等Microsoft
    Office程序一起使用。
- en: ChatGPT for Office Helps you work with Microsoft Office documents more efficiently.
    What can be done as follows?
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT for Office帮助你更高效地处理Microsoft Office文档。以下是可以做到的事情：
- en: ● It allows you to write documents faster and more efficiently. It can help
    you create new content, summarize documents, translate languages, etc.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: ● 它允许你更快、更高效地撰写文档。它可以帮你创建新内容、总结文档、翻译语言等。
- en: ● It allows you to edit documents with more precision. It can help you check
    your grammar, spelling, etc.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: ● 它允许你更精确地编辑文档。它可以帮你检查语法、拼写等。
- en: ● It allows you to present your information more effectively. It can help you
    create presentation slides. Infographic design, etc.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: ● 它允许你更有效地展示你的信息。它可以帮你创建演示文稿幻灯片、信息图表设计等。
- en: 'How to install ChatGPT for Office from the ChatGPT plugin store:'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 如何从ChatGPT插件商店安装ChatGPT for Office：
- en: 1\. Go to ChatGPT's website.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. 前往ChatGPT的网站。
- en: 2\. Click on the "Plugin Store" button.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 点击“插件商店”按钮。
- en: 3\. Search for the "ChatGPT for Office" plugin.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. 搜索“ChatGPT for Office”插件。
- en: 4\. Click on the "Install" button.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 4\. 点击“安装”按钮。
- en: Once the plugin is installed You will now be able to activate this plugin. You
    can send the command prompt that you want this Plugin to work on.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦插件安装完成，你现在将能够激活此插件。你可以发送你想要此插件工作的命令提示符。
- en: 'Examples of using ChatGPT for Office are as follows:'
  id: totrans-250
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT for Office的示例如下：
- en: '● writing documents: You can use ChatGPT to help you write new content, summarize
    documents, translate languages, etc. For example, if you want to write an article
    about a topic you want, you can use ChatGPT to help you create subtopics. Write
    the first paragraph and summarize the article'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: ● 编写文档：你可以使用ChatGPT帮助你编写新内容、总结文档、翻译语言等。例如，如果你想写一篇关于你感兴趣主题的文章，你可以使用ChatGPT帮助你创建子主题。写第一段并总结文章
- en: '● Editing documents: You can use ChatGPT to help you check your grammar, spelling,
    etc. For example, if you are editing a document that has grammatical errors, you
    can use ChatGPT to help you identify and fix those errors.'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
