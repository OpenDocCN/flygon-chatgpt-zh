  zh: '[1](#footnote-10462-1-backlink)。麦肯锡公司，“生成式人工智能的未来是什么？15张图表中的早期观点”（2023年10月访问；[https://www.mckinsey.com/featured-insights/mckinsey-explainers/whats-the-future-of-generative-ai-an-early-view-in-15-charts](https://www.mckinsey.com/featured-insights/mckinsey-explainers/whats-the-future-of-generative-ai-an-early-view-in-15-charts))。'
