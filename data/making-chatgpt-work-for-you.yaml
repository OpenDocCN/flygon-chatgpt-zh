- en: This is your profile icon, and clicking it allows you to manage your settings,
    such as the theme color, the default language, and more.
  id: totrans-249
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这是您的个人图标，点击它允许您管理设置，如主题颜色、默认语言等。
- en: Because of the fact that we’re using the latest and most powerful features ChatGPT
    has to offer, we’re going to upgrade to ChatGPT Plus. It’s a simple process, but
    the next step will illustrate exactly what you need to do.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们正在使用ChatGPT提供的最新和最强大的功能，我们将升级到ChatGPT Plus。这是一个简单的过程，但下一步将具体说明您需要做什么。
- en: Upgrading to ChatGPT Plus to Get All the Latest Features
  id: totrans-251
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 升级到ChatGPT Plus以获取所有最新功能
- en: If you’re on the chat window on the ChatGPT site, you can click the **Upgrade
    Plan** button in the lower-left part of the screen. Afterward, you just select
    the plan you prefer and sign up. Figure [1-4](#Fig4) shows what that looks like.![Screenshot
    of a plan upgrade page comparing "Free" and "Plus" options. The Free plan, marked
    as "Your current plan," costs $0 per month and includes assistance with writing,
    access to GPT-4o mini, limited access to GPT-4o, and limited data analysis capabilities.
    The Plus plan costs $20 per month and offers everything in Free, early access
    to new features, access to OpenAI o1-preview, OpenAI o1-mini, GPT-4o, GPT-4o mini,
    GPT-4, up to 5x more messages for GPT-4o, and access to Advanced Voice Mode. Options
    to upgrade and links for billing help and ChatGPT Enterprise are visible.](../images/641691_1_En_1_Chapter/641691_1_En_1_Fig4_HTML.jpg)
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在ChatGPT网站的聊天窗口中，可以点击屏幕左下角的**升级计划**按钮。之后，您只需选择您喜欢的计划并注册。图[1-4](#Fig4)展示了升级计划的样子。![计划升级页面截图，比较“免费”和“Plus”选项。免费计划，标记为“您的当前计划”，每月费用为0美元，包括写作辅助、访问GPT-4o
    mini、有限访问GPT-4o和有限的数据分析能力。Plus计划每月费用为20美元，提供免费计划中的所有功能，以及新功能的早期访问、访问OpenAI o1-preview、OpenAI
    o1-mini、GPT-4o、GPT-4o mini、GPT-4，GPT-4o最多5倍的消息量，以及访问高级语音模式。升级选项和账单帮助以及ChatGPT
    Enterprise的链接可见。](../images/641691_1_En_1_Chapter/641691_1_En_1_Fig4_HTML.jpg)
- en: Figure 1-4
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-4
- en: The upgrade page shows all the benefits available with ChatGPT Plus
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 升级页面显示了ChatGPT Plus可用的所有好处
- en: Conclusion
  id: totrans-255
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, you learned what ChatGPT is and why it’s nondeterministic.
    You also learned how to create an account with ChatGPT and upgrade to ChatGPT
    Plus. In the next chapter, we’ll look more closely at prompts and see how to illicit
    the best responses.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您学习了ChatGPT是什么以及为什么它是非确定性的。您还学习了如何使用ChatGPT创建账户并升级到ChatGPT Plus。在下一章中，我们将更详细地探讨提示，并了解如何获得最佳响应。
