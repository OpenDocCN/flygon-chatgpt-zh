  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: Sub ExampleUsage()
- en: ''' Create a new instance of the Conversation class'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 创建Conversation类的新实例'
- en: Dim chat As Conversation
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: Dim chat As Conversation
- en: Set chat = New Conversation
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: Set chat = New Conversation
- en: ''' Add system and user messages'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: ''' 添加系统和用户消息'
- en: chat.AddMessage "system", "You are a helpful assistant."
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: chat.AddMessage "system", "您是一个有用的助手。"
- en: chat.AddMessage "user", "Write a haiku about frogs."
  id: totrans-284
