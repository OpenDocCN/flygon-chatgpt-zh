- en: 'Personalisation: Your Images, Your Brand'
  id: totrans-295
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 定制：你的图片，你的品牌
- en: This is where you and your genius work with AI, giving Chat a Starter Image
    to Use. Sometimes, you might find a stock image that you really like, but you
    need to tweak it.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你和你的天才与AI一起工作的地方，为Chat提供一个起始图像来使用。有时，你可能会找到一个你真的很喜欢的库存图片，但你需要对其进行调整。
- en: You can then use ChatGPT 4o to edit that stock photo and use it as a foundation
    to build on for your own graphics.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你可以使用ChatGPT 4o编辑那张库存照片，并将其作为你自己的图形的基础。
- en: Personalising Stock Images
  id: totrans-298
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定制库存图片
- en: It helps you personalise images for your own brand. For example, you might find
    a stock picture of a woman holding a plain blue book. Upload it to ChatGPT, using
    the + button.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 它帮助你为你的品牌个性化图片。例如，你可能会找到一个女人拿着一本普通蓝色书的库存图片。使用+按钮将其上传到ChatGPT。
- en: '![picture of a woman holding a plain blue book.](Image00021.jpg)'
  id: totrans-300
  prefs: []
  type: TYPE_IMG
  zh: '![一位女士拿着一本普通蓝色书的图片。](Image00021.jpg)'
- en: This is a great stock image with natural lighting and it has a blurred background.
    But maybe you want her to be holding your book instead?
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一张带有自然光和模糊背景的出色库存图片。但也许你希望她拿着你的书？
- en: 'Instead of having to go to Photoshop or hire a freelance graphic designer,
    you can upload both of these images - the stock photo and your book cover graphic
    – and prompt AI like this:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 而不必去Photoshop或雇佣自由图形设计师，你可以上传这两张图片——库存照片和你的书封面图形——并像这样提示AI：
- en: 'Upload your book cover, for example:'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 上传你的书封面，例如：
- en: '![Uploaded image of book cover](Image00022.jpg)'
  id: totrans-304
  prefs: []
  type: TYPE_IMG
  zh: '![上传的书封面图片](Image00022.jpg)'
- en: 'Prompt :'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '*Using the same image of the woman holding a book, replace my book cover (also
    attached) so that she''s holding it instead.*'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用同一张女人拿着书的图片，替换我的书封面（也附上了）让她拿着书而不是其他东西。*'
- en: '![Using the same image of the woman holding a book, replace my book cover (also
    attached) so that she''s holding it instead.](Image00023.jpg)'
  id: totrans-307
  prefs: []
  type: TYPE_IMG
  zh: '![使用同一张女人拿着书的图片，替换我的书封面（也附上了），让她拿着书而不是其他东西。](Image00023.jpg)'
- en: From that point, you can tweak anything you prefer, and you'll notice it altered
    it very slightly, including hiding a little more of her face and changing her
    fingernails.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 从那个点开始，你可以调整任何你喜欢的，你会注意到它非常轻微地改变了，包括隐藏她脸部的一小部分和改变她的指甲。
- en: 'To change her hair colour, I gave this prompt:'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 要改变她的发色，我给出了以下提示：
- en: Prompt
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 提示
- en: '*Make her hair brown*'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: '*让她头发变棕色*'
- en: If you need something with a square rather than vertical ratio, you can revise
    the prompt and have it corrected what it did rather than starting from scratch.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要的是方形而不是垂直比例的图片，你可以修改提示，让它修正它所做的，而不是从头开始。
- en: '![Make her hair brown](Image00024.jpg)'
  id: totrans-313
  prefs: []
  type: TYPE_IMG
  zh: '![让她头发变棕色](Image00024.jpg)'
- en: You can do this for a variety of things.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以用这个做很多事。
- en: If you have an affiliate marketing business and you want to use stock photos
    with product placement for different items you want to promote, you can use this
    type of hybrid prompt effectively.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有一个联盟营销业务，并且你想使用带有产品放置的库存照片来推广不同的商品，你可以有效地使用这种混合提示。
- en: Generating Personalised YouTube Images
  id: totrans-316
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成个性化的YouTube图片
- en: 'As an author, you want to connect with your readers. So apart from cool images,
    what’s even better is to personalise your marketing images. Upload a photo of
    yourself—or a product shot—and ask AI to enhance it: change the background, add
    a visual theme, or spotlight a certain object. You stay in control while the tool
    does the heavy lifting.'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名作者，你希望与你的读者建立联系。所以除了酷炫的图片，更好的是个性化你的营销图片。上传一张你自己的照片——或者一个产品照片——并让AI增强它：改变背景，添加视觉主题，或突出某个物体。你在工具做重活的同时保持控制。
- en: 'Upload a picture of a rough layout and yourself like this:'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 上传一张这样的草图和你的照片：
- en: '**Here’s the Layout**'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: '**这是布局**'
- en: '![Uploaded image file of rough layout](Image00025.jpg)'
  id: totrans-320
  prefs: []
  type: TYPE_IMG
  zh: '![上传的草图图片文件](Image00025.jpg)'
- en: I just drew this and hand wrote the text, and took a picture of it with my phone
    and uploaded it using the + button. Maybe that’s why Chat got some spellings wrong.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是画了这张，手写了文字，然后用手机拍照并使用+按钮上传。也许这就是Chat出现一些拼写错误的原因。
- en: Now for the photo - I took the really easy way out. Don’t judge me!
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是照片环节——我选择了最简单的方法。不要评判我！
- en: '**Photo**'
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: '**照片**'
- en: I stepped outside for some good lighting and took a selfie and uploaded it to
    Chat. (Use the + button).
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 我走到外面寻找好的光线，拍了一张自拍并上传到Chat。 (使用+按钮)。
- en: '![Uploaded image](Image00026.jpg)'
  id: totrans-325
  prefs: []
  type: TYPE_IMG
  zh: '![上传的图片](Image00026.jpg)'
- en: 'Prompt:'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '*Use the input images I gave you for direction and layout to create a YouTube
    thumbnail for a video entitled Trad vs Indie Publishing: The $200 secret no one
    told you about. Use a suitable background*'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用我提供的输入图像的方向和布局，为名为“传统出版与独立出版：没有人告诉你的200美元秘密”的视频创建一个YouTube缩略图。使用合适的背景*'
- en: '![Use the input images I gave you for direction and layout to create a YouTube
    thumbnail for a video entitled Trad vs Indie Publishing: The $200 secret no one
    told you about. Use a suitable background](Image00027.jpg)'
  id: totrans-328
  prefs: []
  type: TYPE_IMG
  zh: '![使用我提供的输入图像的方向和布局，为名为“传统出版与独立出版：没有人告诉你的200美元秘密”的视频创建一个YouTube缩略图。使用合适的背景](Image00027.jpg)'
- en: 'And if you wish to change the style:'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你希望改变风格：
- en: 'Prompt:'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '*In Grimoire style please*'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: '*请以魔法书风格*'
- en: '![In Grimoire style please](Image00028.jpg)'
  id: totrans-332
  prefs: []
  type: TYPE_IMG
  zh: '![请以魔法书风格呈现](Image00028.jpg)'
- en: Yes, it’s good to stay polite.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，保持礼貌是好的。
- en: You can now use these image prompts to generate a multitude of images for your
