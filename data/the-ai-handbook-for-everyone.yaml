- en: Gift-Wrapping and Presentation Ideas
  id: totrans-919
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 礼品包装和展示创意
- en: '"I am giving a gift to [recipient] for [occasion], and I want the presentation
    to be unique and memorable. Please suggest creative gift-wrapping ideas and personal
    touches that will make it special."'
  id: totrans-920
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我将为[收件人]在[场合]送上一份礼物，并希望展示是独特且难忘的。请提出创意礼品包装和个人触感，使其变得特别。"'
- en: Social Interaction
  id: totrans-921
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 社交互动
- en: Starting a Conversation with a New Acquaintance
  id: totrans-922
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与新认识的人开始对话
- en: '"I’m meeting someone new in a [social/professional] setting, and I want to
    start a natural and engaging conversation. Please provide a few conversation starters
    and follow-up questions that help build rapport."'
  id: totrans-923
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我在一个[社交/职业]场合遇到一个新人，我想开始一段自然而吸引人的对话。请提供一些开场白和后续问题，帮助建立联系。"'
- en: Apologizing and Repairing a Relationship
  id: totrans-924
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 道歉和修复关系
- en: '"I need to apologize to [person] for [situation]. The apology should be sincere,
    acknowledge my mistake, and express my willingness to make amends. Please write
    a message that conveys my sincerity while maintaining a positive tone."'
  id: totrans-925
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要就[情况]向[人]道歉。道歉应该是真诚的，承认我的错误，并表达我愿意改正的意愿。请写一条传达我的真诚同时保持积极语调的信息。"'
- en: Expressing Gratitude in a Meaningful Way
  id: totrans-926
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以有意义的方式表达感激
- en: '"I want to send a heartfelt message to [friend, family member, coworker] expressing
    my gratitude for [reason]. Please craft a warm and genuine thank-you note that
    highlights my appreciation."'
  id: totrans-927
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我想向[朋友、家人、同事]发送一条充满深情的信息，表达我对[原因]的感激。请撰写一条温馨、真诚的感谢信，突出我的感激之情。"'
- en: Navigating a Difficult Conversation
  id: totrans-928
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 应对困难对话
- en: '"I need to have a difficult conversation with [person] about [topic]. The message
    should be respectful, clear, and empathetic while addressing my concerns. Please
    help me phrase it in a way that encourages open communication."'
  id: totrans-929
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要与[人]就[话题]进行一次艰难的对话。信息应该是尊重的、清晰的、富有同理心的，同时表达我的担忧。请帮助我以鼓励开放沟通的方式措辞。"'
- en: Reaching Out to an Old Friend
  id: totrans-930
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重新联系老朋友
- en: '"I haven’t spoken to [friend’s name] in a long time, and I want to reconnect.
    Please draft a friendly message that feels natural and warm, without making it
    awkward."'
