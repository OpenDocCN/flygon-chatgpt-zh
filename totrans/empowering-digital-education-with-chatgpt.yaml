- en: 10Using ChatGPT to Prepare for Your Dream Job?Unlocking the Potential of AI
    for Personalized Curriculum Planning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Leonie Rebecca Freise and Eva Ritz
  prefs: []
  type: TYPE_NORMAL
- en: 'DOI: [10.1201/9781032716350-10](http://doi.org/10.1201/9781032716350-10)'
  prefs: []
  type: TYPE_NORMAL
- en: 10.1 Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Artificial intelligence (AI) has become a transformative force in today’s world,
    permeating various facets of our daily lives. The automation and augmentation
    of work with AI are transforming industries, changing the way how humans acquire
    knowledge and are educated. The latest COVID-19 pandemic and the shifts to educational
    delivery have emerged as the new standard, consequently amplifying the application
    and relevance of technology-mediated learning (TML) ([Ritz et al. 2023](#ch18.xhtml#r440)).
    TML platforms have become instrumental in addressing cross-sectional re-& upskilling
    efforts in organizations. Such platforms are capable of collecting a vast range
    of data during the re-& upskilling courses, which can then be analyzed to provide
    employees with data-driven feedback and personalized learning journeys ([Gibson
    2017](#ch18.xhtml#r413)). By integrating AI into learning platforms, with its
    distinct underlying facets of acting autonomously, learning from data, and being
    inscrutable to multiple audiences ([Berente et al. 2021](#ch18.xhtml#r399)), novel
    possibilities for the design of learning experiences arise. There is a large variety
    of use cases for AI in education, including the personal recommendation of learning
    paths, nudging for self-regulated learning, tracking and analyzing student performance,
    and providing smart and interactive learning content (e.g., [Bhutoria 2022](#ch18.xhtml#r400);
    [Chen et al. 2020](#ch18.xhtml#r406); [Nabizadeh et al. 2020](#ch18.xhtml#r431)).
    TML platforms have become instrumental in addressing these efforts, as they can
    analyze platform data to provide personalized learning journeys. Thus, AI and
    machine learning have ushered in a profound transformation, offering innovative
    approaches to learning and knowledge dissemination ([Grassini 2023](#ch18.xhtml#r415)).
    Since the launch of ChatGPT, the application of generative AI (GenAI) rose in
    education. GenAI can be defined as technology that (1) uses deep learning models
    to (2) generate human-like content (e.g., images, words) in response to (3) complex
    and variable prompts (i.e., instructions, questions) ([Lim et al. 2023](#ch18.xhtml#r425)).
    Generative pre-trained transformers (GPTs), like OpenAI’s multimodal ChatGPT,
    represent a significant advancement in adapting learning experiences. ChatGPT,
    for instance, can give formative feedback to learners based on individual preferences
    ([Baidoo-Anu and Owusu Ansah 2023](#ch18.xhtml#r396)) and adapt the assessment’s
    communication to the user’s cognitive style. This means, for instance, that by
    discerning individual cognitive preferences, such as visual, auditory, or kinesthetic
    learning modalities, ChatGPT can customize its communication approach to resonate
    with the user’s preferred style and thereby enhancing the effectiveness of the
    learning process.
  prefs: []
  type: TYPE_NORMAL
- en: GenAI applications are expected to present a potential solution to tackle issues
    of the traditional educational classroom approaches, namely organizational and
    financial constraints, to meet the diverse needs of individual learners. GenAI
    paves the way to leaving behind the one-size-fits-all mentality and supporting
    students in learning and curriculum planning. This fusion of generative AI and
    personalized learning promises a paradigm shift in education and offers a way
    to overcome the limitations of conventional methods.
  prefs: []
  type: TYPE_NORMAL
- en: This book chapter focuses on the concept of personalized curriculum design,
    a dynamic approach that aims to tailor education to individual learners and, thus,
    increase their employability after graduating. While the role of curriculum planning
    was previously the responsibility of the students and the managers of higher education
    programs, GenAI can now support students in finding suitable courses that match
    future career expectations. As postulated by constructivist learning theories,
    effective learning outcomes require personalized instruction that is tailored
    to individual experiences ([Vygotsky 1980](#ch18.xhtml#r445)). This prompts a
    critical examination of current approaches to personalized learning pathways ([Raj
    and Renumol 2022](#ch18.xhtml#r436)). As technology continues to reshape the educational
    landscape, personalized curriculum planning becomes central to realizing the full
    potential of AI to promote effective and meaningful learning experiences ([Escotet
    2023](#ch18.xhtml#r409)).
  prefs: []
  type: TYPE_NORMAL
- en: 'With these considerations in mind, we aim to explore the role of GenAI, particularly
    ChatGPT, in the development of learning curricula. The overarching research question
    is: *How can GenAI, focusing on personalized curriculum design, provide curriculum
    advice for students and address the shortcomings of existing approaches*? To address
    this complex question, the following chapter provides the current state of AI
    in education, the role of GenAI in personalized curriculum, and a detailed examination
    of personalized curriculum planning underpinned with concrete examples.'
  prefs: []
  type: TYPE_NORMAL
- en: By navigating through this chapter, readers will embark on a journey to unravel
    the intricate relationship between AI and education and the transformative potential
    of GenAI in revolutionizing our approach to personalized curriculum planning in
    the 21st century. This chapter starts by presenting a theoretical introduction
    and a review of AI systems in education. Next, we present an outline of the potential
    of GenAI tools for personalized curriculum planning, followed by research-based
    insights on how to design these approaches. We describe examples of the use for
    personalized curriculum planning. We conclude this chapter with an outlook on
    challenges and future research. We aim to provide educators and researchers with
    a comprehensive understanding of AI’s impact on education, with a specific focus
    on leveraging models such as ChatGPT for personalized curriculum planning. By
    offering guidance and insights, this chapter serves as a valuable resource for
    developing new educational models, fostering innovation, and contributing to the
    ongoing discourse on the intersection of AI in education.
  prefs: []
  type: TYPE_NORMAL
- en: 10.2 Theoretical Background
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 10.2.1 Generative AI in Education
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The following sections of this chapter explain GenAI model like ChatGPT and
    their potential to improve teaching and student learning in higher education.
    The discussion also includes an exploration of the limitations and suggestions
    for educators to use ChatGPT to support and enhance student learning via personalized
    learning paths.
  prefs: []
  type: TYPE_NORMAL
- en: 'Research on the integration of AI in these educational systems can be traced
    back to a study by [Beck et al. (1996)](#ch18.xhtml#r398), which was among the
    first to apply AI in the educational domain. Nowadays, GenAI is a form of unsupervised
    or partially supervised machine learning in which artificial artifacts are generated
    using statistical and probabilistic methods ([Jovanovic and Campbell 2022](#ch18.xhtml#r419)).
    By leveraging advances in deep learning, generative AI can generate artificial
    content such as videos, images or graphics, text, and audio by analyzing and learning
    patterns and distributions from existing digital content in training examples
    ([Abukmeil et al. 2022](#ch18.xhtml#r393); [Gui et al. 2023](#ch18.xhtml#r416);
    [Jovanovic and Campbell 2022](#ch18.xhtml#r419)). Two prominent categories within
    generative AI are highlighted in the existing literature: generative adversarial
    network and GPT ([Abukmeil et al. 2022](#ch18.xhtml#r393); [Brown et al. 2020](#ch18.xhtml#r402)).
    GPT models use extensive publicly available data on digital content, especially
    in the field of natural language processing (NLP), to understand and generate
    texts in multiple languages. These models, such as GPT-3.5, can demonstrate their
    creativity by convincingly producing texts ranging from paragraphs to full research
    articles on various topics ([OpenAI 2022](#ch18.xhtml#r432)). GPT-3.5 is ten times
    larger than all previous non-parsed language models, making it a fundamental NLP
    engine. It serves as the underlying technology for ChatGPT, a large language model
    that has attracted attention in various fields such as education, engineering,
    healthcare, and business (e.g., [Banitaan et al. 2023](#ch18.xhtml#r397); [Grassini
    2023](#ch18.xhtml#r415); [Kolluri et al. 2022](#ch18.xhtml#r424); [Qadir 2023](#ch18.xhtml#r435)).
    On March 14, 2023, an advanced model, GPT-4, was released, showing a significant
    increase in computational capacity ([Hassani and Silva 2023](#ch18.xhtml#r417)).
    OpenAI highlighted its language capabilities by claiming that GPT-4 can achieve
    scores in the 90th percentile on the US bar exam for lawyers ([Katz et al. 2023](#ch18.xhtml#r420)).'
  prefs: []
  type: TYPE_NORMAL
- en: '[González-Calatayud et al. (2021)](#ch18.xhtml#r414) endorse that the potential
    of AI in education is vast, particularly in areas such as tutoring, assessment,
    and personalized learning. The implications of these AI models, particularly the
    potential applications of ChatGPT in education, have elicited mixed feelings among
    educators ([Lo 2023](#ch18.xhtml#r426)). This AI breakthrough appears to be changing
    current educational norms and has sparked debate. Some educators view ChatGPT
    and similar AI as a progressive step toward the future of education and research.
    Others, however, harbor doubts and see it as a potential threat that could lead
    to a decline in educational activities and promote laziness among teachers and
    students as analytical skills may decline ([Skavronskaya et al. 2023](#ch18.xhtml#r441)).
    Recently, academic authors have attempted to assess the opportunities and problems
    associated with the use of AI technologies in education ([Baidoo-Anu and Owusu
    Ansah 2023](#ch18.xhtml#r397); [Lo 2023](#ch18.xhtml#r426)).'
  prefs: []
  type: TYPE_NORMAL
- en: 10.2.2 Generative AI for Personalized Curriculum Planning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Curriculum planning is vital for universities to provide high quality educational
    programs and courses ([Khan and Law 2015](#ch18.xhtml#r422)). With the rise of
    educational technology, it becomes possible to create a personalized curriculum
    plan based on student characteristics. This plan then aims to illustrate students’
    current goals and skills along with the available educational resources.
  prefs: []
  type: TYPE_NORMAL
- en: Building such a personalized learning pathway involves formulating learning
    sequences tailored to the individual student, and various algorithmic methods
    have been proposed for this purpose ([Meng et al. 2021](#ch18.xhtml#r429)). A
    learning path comprises various courses featuring learning objects strategically
    sequenced to facilitate learners in attaining specific objectives, such as acquiring
    a new skill ([Nabizadeh et al. 2020](#ch18.xhtml#r431)). Curriculum planning,
    which encompasses educational experiences and outcomes, underpins the structure
    of learning paths by providing a comprehensive framework for sequencing learning
    objects and courses ([Cambridge Dictionary 2023](#ch18.xhtml#r403)). The pedagogical
    configuration of personalized course sequences directs learners throughout their
    educational journey toward accomplishing their learning objectives ([Vanitha et
    al. 2019](#ch18.xhtml#r444)). The relevance of curriculum planning for higher
    education students is particularly important, as it aims to increase employability
    in the hiring process.
  prefs: []
  type: TYPE_NORMAL
- en: 'The major prerequisite for all personalization algorithms is the availability
    of relevant information to characterize and assess students. Students’ learning
    information includes two dimensions: (1) students’ learning and/or goals and objectives
    and (2) the students’ current knowledge level. Based on this knowledge, algorithms
    can identify existing skills gaps ([Morandini et al. 2023](#ch18.xhtml#r430))
    and then identify appropriate university courses tailored to students’ achievement
    levels and preferred learning modalities ([Pontes et al. 2021](#ch18.xhtml#r434)).
    The concept of personalized education is rooted in the constructivist perspective
    by [Vygotsky (1980)](#ch18.xhtml#r445), which holds that learners benefit most
    from individualized instruction based on their unique experiences. In the past,
    course design was the students’ responsibility or was done by the program management
    according to a predetermined schedule. Today, technology-enhanced learning systems
    are ushering in a new era of personalized education courses. According to [Ritz
    et al. (2024)](#ch18.xhtml#r439), who provided a taxonomy for personalized learning
    paths, ChatGPT for personalized curriculum planning can be classified as illustrated
    in [Table 10.1](#ch18.xhtml#t21). On the level of learning context, it serves
    the purpose of knowledge transfer because ChatGPT guides the learner in applying
    his or her interests, goals, skills, or other objectives to the planning. It is
    a learner-managed system, as ChatGPT only reacts to the learners’ provided prompts
    and information. The knowledge outcome is factual, and the learning objects are
    text-based, because ChatGPT answers in texts and generates or reproduces factual
    knowledge. ChatGPT serves a broad context on the data input level and can incorporate
    curriculum vitae (CV) data, skill data, and interest data inserted by the learner
    in the interface. However, they must be in a language format. The interface is
    mixed because it is available both, on the web and in the app. Further, it enables
    a high self-regulatory influence for the learner, as the parameters for curriculum
    planning can be changed by themselves anytime. In terms of the level of adaption,
    the method consists of a large language model that is trained by OpenAI. ChatGPT
    focuses on course generation, and the personalized learning path is recommended
    with courses as the outcome variable.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Table 10.1](#ch18.xhtml#t21b) ChatGPT as personalization approach as categorized
    based on [Ritz et al. (2024)](#ch18.xhtml#r439)'
  prefs: []
  type: TYPE_NORMAL
- en: '| Dimensions | Characteristics |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '|  **Learning context** | Purpose | Knowledge creation | Knowledge retention
    | Knowledge transfer |'
  prefs: []
  type: TYPE_TB
- en: '| Teachers’ influence | Teacher-managed | Hybrid | Learner-managed |'
  prefs: []
  type: TYPE_TB
- en: '| Knowledge Outcome | Factual | Conceptual | Procedural | Metacognitive |'
  prefs: []
  type: TYPE_TB
- en: '| Learning object | Video | Text | Grafics | Reference Links | Exercises |'
  prefs: []
  type: TYPE_TB
- en: '| **Interface** **Data** | Input data | CV/job occupations data | Skills |
    Assessment data | Learner interests | Behavior data |'
  prefs: []
  type: TYPE_TB
- en: '| Interface Type | Web-based | Mobile-based | Mixed |'
  prefs: []
  type: TYPE_TB
- en: '| Control of Adaptation | Self-regulated Influencer | No Influence |'
  prefs: []
  type: TYPE_TB
- en: '| Adaptation Method | Evolutionary algorithms | Reinforcement learning | Large
    language models | Mixed |'
  prefs: []
  type: TYPE_TB
- en: '|  **Adaptation** | Recommendation Method | Course generation | Course sequencing
    |'
  prefs: []
  type: TYPE_TB
- en: '| Level of personalized learning path | Learning Process | Course | Learning
    object |'
  prefs: []
  type: TYPE_TB
- en: One case where personalized curriculum planning can hold potential is for learners
    with low self-regulatory skills. For these students, structuring their learning
    content and their studies is a challenge compared to individuals with robust self-regulatory
    skills, who can manage their learning process by setting personal goals and structuring
    their learning activities ([Zimmerman 2002](#ch18.xhtml#r447)). Accordingly, it
    is crucial to offer support before the learning process begins in the form of
    personalized recommendations of university courses that are tailored to the individual’s
    educational background, skills, and personal interests. This proactive approach
    aims to prevent students from being overwhelmed when choosing a course ([Pontes
    et al. 2021](#ch18.xhtml#r434)). This process can have several positive outcomes
    for students. To increase student empowerment, ChatGPT can offer comprehensive,
    sustainable, inclusive, and adaptable learning pathways tailored to the specific
    needs of each learner, thus promoting empowerment ([CEDEFOP 2021](#ch18.xhtml#r405)).
    Personalized curriculum planning allows learners to exercise control over the
    content, timing, and thematic aspects of their learning experiences, which helps
    promote self-determination. [Alamri et al. (2020)](#ch18.xhtml#r394) found that
    tailoring courses to learners’ needs and interests can significantly promote learner
    autonomy. Therefore, students not only rely on receiving course recommendations
    from colleagues, lecturers, or program managers, but they can also rely on recommendations
    for more suitable courses.
  prefs: []
  type: TYPE_NORMAL
- en: 10.3 Exemplary Case for Applying GenAI for Personalized Curriculum Planning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this exemplary case, we focus on Alex, a high school graduate with a strong
    interest in environmental science and a desire to pursue a career in sustainable
    energy. The goal is to use GenAI for personalized curriculum planning tailored
    to Alex’s specific academic background, current skills, and career goals.
  prefs: []
  type: TYPE_NORMAL
- en: '10.3.1 Data Input: Educational Background, Academic Discipline, and Career
    Goals'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The basis for this is Alex’s comprehensive skill profile as illustrated in [Figure
    10.1](#ch18.xhtml#f29). A skill profile thereby encompasses an individual’s skills
    and educational background ([Freise and Hupe 2023](#ch18.xhtml#r411)). This typically
    includes a person’s different skills and competencies, supplemented by details
    regarding their educational background, experiences, and training. In the case
    of Alex, this could consist of a transcript of records or his high school diploma
    or even voluntary activities that are relevant to environmental sciences.
  prefs: []
  type: TYPE_NORMAL
- en: '![An infographic depicts a rectangular box with a drawing of a man. The text
    above the drawing reads, Alex. Below, four smaller boxes are labeled as follows.
    Discipline, environmental science. Specialization, sustainable energy. Career
    goal, researcher. Past courses, foundations of environmental science.](html/images/9781032716084_C010_001.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 10.1](#ch18.xhtml#f29b) Alex’s student skill profile. (Based on own
    illustration.)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Student: Alex is a high school graduate with a deep interest in environmental
    science and a clear goal to pursue a career in sustainable energy research.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Academic Discipline: Environmental science with a specialization in sustainable
    energy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Career Goals: To become a researcher in sustainable energy solutions, contributing
    to advancements in renewable energy technologies.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 10.3.2 Identification of Skill Gaps
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Based on the current skill profile, it is possible to identify Alex’s skill
    gaps and areas for learning ([Cappelli 2015](#ch18.xhtml#r404)). At the beginning
    of his university studies, this profile was mainly based on input from school.
    Still, later, the skills could be assessed by a combination of self-assessment
    quizzes, feedback from educators, and an analysis of coursework performance. By
    comparing this to the study program or the requirements for a job in environmental
    sciences, skill gaps can be derived by the GenAI tool ([Islam and Islam 2023](#ch18.xhtml#r418)).
  prefs: []
  type: TYPE_NORMAL
- en: In this case, we propose that Alex possesses a foundational understanding of
    environmental science concepts and basic research skills stemming from his educational
    background at a local high school. However, there are identified gaps, including
    a lack of in-depth knowledge of advanced renewable energy technologies, data analysis
    techniques specific to environmental research, and practical experience with relevant
    laboratory equipment.
  prefs: []
  type: TYPE_NORMAL
- en: 10.3.3 Personalized Curriculum Recommendations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Based on the previously indicated information, a GenAI tool such as ChatGPT
    can be used to identify critical areas where Alex needs further skill and professional
    development to get closer to his career goal. When Alex provides the course plan
    on environmental sciences from this current university to the tool, the model
    is able to retrieve keywords and match these with Alex’s information. Curriculum
    components can include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Advanced Renewable Energy Technologies: Specialized courses covering cutting-edge
    advancements in solar, wind, and bioenergy technologies.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Data Analysis for Environmental Research: Modules focusing on statistical methods
    and data analysis techniques specific to environmental science research.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 10.3.4 Hands-On Laboratory Experience
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Practical sessions with state-of-the-art laboratory equipment provide hands-on
    experience in sustainable energy experiments.
  prefs: []
  type: TYPE_NORMAL
- en: 'Interdisciplinary Electives: Courses from related disciplines, such as economics
    and policy, to foster a holistic understanding of sustainable energy solutions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Internship Opportunities: Recommendations for internships in research institutions
    or companies specializing in sustainable energy, providing real-world exposure.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Implementation Steps:**'
  prefs: []
  type: TYPE_NORMAL
- en: '*GenAI Interaction:* In this step, the goal is to engage Alex in a conversation
    with the GenAI tool to understand his academic background, preferences, and career
    aspirations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: “Hi Alex! Can you tell me more about your favorite courses in environmental
    science so far and what aspects of sustainable energy research intrigue you the
    most?”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Algorithmic Analysis:* The previously gathered information is now used by
    the GenAI tool to perform advanced algorithms to process the conversation data,
    extracting key insights regarding Alex’s strengths, weaknesses, and specific areas
    of interest.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: “Analyzing responses to identify keywords and sentiments related to
    advanced renewable energy technologies, data analysis, and laboratory experience.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Curriculum Generation:* Here, the NLP capabilities and algorithms generate
    a personalized curriculum plan that aligns with Alex’s interests and addresses
    identified skill gaps.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: “Based on our discussion, it seems you have a strong interest in solar
    energy. I recommend a course on ‘Advanced Solar Technologies’ to deepen your knowledge
    in this area and address the identified gap.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Feedback Loop:* In this step, we propose to establish a feedback loop in the
    conversation with Alex about the proposed curriculum, allowing him to provide
    additional input, express preferences, adjust the questions, and ask for more
    information on recommended courses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: “Alex, what are your thoughts on the suggested courses? Do you feel
    they align with your goals? Any specific areas you’d like to explore further?”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Real-Time Adjustments:* Adjustments can be made continuously within the process.
    The GenAI tools are dynamic system that allow for real-time adjustments to the
    curriculum based on Alex’s feedback, changing career goals, or evolving interests.
    Feedback loops and considerations of Alex’s input during the conversation with
    the tool are always possible.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: “I noticed you expressed interest in data analytics. How about incorporating
    a ‘Data Analysis for Environmental Scientists’ elective? We can adjust the plan
    accordingly.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Expected Outcomes for Students:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Skill Advancement: Alex gains a comprehensive understanding of advanced renewable
    energy technologies and hones his data analysis skills.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Increased autonomy: In line with the self-determination theory, which refers
    to an individual’s subjective experience of autonomy or control regarding their
    actions ([Deci et al. 1989](#ch18.xhtml#r407)), it can be argued that a self-regulated
    curriculum plan approach can enhance students’ feelings of autonomy and thereby
    contribute to more motivation for learning. Here, Alex gains more confidence in
    his decisions and feels motivated to participate in his chosen courses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enhanced Empowerment consists of structural and psychological components ([Maynard
    et al. 2012](#ch18.xhtml#r428)). Structural empowerment means establishing professional
    structures and processes that aim to delegate formal responsibility and authority
    ([Kim and Lee 2020](#ch18.xhtml#r423)). This can also include providing tools
    for personalized curriculum planning ([Amor et al. 2020](#ch18.xhtml#r395)). The
    psychological empowerment perspective focuses on perceptions of empowerment ([Kim
    and Lee 2020](#ch18.xhtml#r423)). Specifically, psychological empowerment is described
    as a process in which a person’s belief in their self-efficacy is strengthened.
    Psychologists specifically define this as a form of intrinsic motivation that
    reflects a sense of self-control. This feeling can also be transferred to active
    participation in learning processes ([Duckworth et al. 2019](#ch18.xhtml#r408)).
    GenAI support serves as a structural empowerment factor for Alex, which also increases
    his psychological empowerment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Career Readiness and Employability: The personalized curriculum ensures Alex
    is well-prepared for a career in sustainable energy research, aligning with his
    specific goals.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Expected Outcomes for Higher Education Institutions:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Less administrative workload for program management of universities: With personalized
    curriculum plan, students like Alex are less likely to contact the program management
    for course advice, which reduces administrative workload and cost of staff.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Decrease course dropout rates: With a personalized curriculum plan, students
    are less likely to select courses that do not match their knowledge level and
    difficulty degree and, thus, are less likely to drop courses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This exemplifies the application of GenAI for personalized curriculum planning,
    showcasing how conversational AI can play a pivotal role in tailoring educational
    pathways to meet individual aspirations and career goals. [Figure 10.2](#ch18.xhtml#f30)
    summarizes the process described in this chapter and outlines the prerequisites,
    the processes, and the benefits.
  prefs: []
  type: TYPE_NORMAL
- en: '![An infographic depicts four labeled boxes with mathematical expressions.
    Data Sources plus Prompting minus generative A I = Benefits. Data Sources and
    Prompting list examples and prompts by students. Generative A I provides skill
    gap identification and curriculum recommendations. Benefits lists benefits for
    students and institutions.](html/images/9781032716084_C010_002.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 10.2](#ch18.xhtml#f30b) Summary of a personalized curriculum planning
    process with generative AI support. (Based on own illustration.)'
  prefs: []
  type: TYPE_NORMAL
- en: '**GenAI in Action:**'
  prefs: []
  type: TYPE_NORMAL
- en: In this scenario, a GPT model engages in conversation with Alex to identify
    his interest in sustainable energy research. Utilizing NLP, the model recommends
    tailored courses covering topics such as advanced solar technologies. It adapts
    the curriculum in real time based on Alex’s feedback and progress, suggesting
    modules with laboratory experience. By dynamically adjusting the learning pathway,
    the model ensures maximum engagement and relevance, leveraging adaptive techniques
    and personalized assessments. [Figure 10.3](#ch18.xhtml#f31) outlines the conversation
    in detail.
  prefs: []
  type: TYPE_NORMAL
- en: '![A screenshot of a conversation between Alex and Gen A I. Alex expresses interest
    in climate change and environmental policies, while Gen A I suggests courses like
    policy implications of sustainable energy, advanced solar technologies, and laboratory
    techniques in sustainable energy research. Alex agrees with the suggestions.](html/images/9781032716084_C010_003.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '[Figure 10.3](#ch18.xhtml#f31b) Example of a course recommendation process
    with a generative AI tool. (Own illustration based on an interaction with ChatGPT
    4.0 by OpenAI 2024.)'
  prefs: []
  type: TYPE_NORMAL
- en: 10.4 Considerations for Implementation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As the integration of technology into educational systems becomes increasingly
    prevalent, the successful implementation and future development of such systems
    necessitate a careful examination of institutional readiness, continuous improvement
    strategies, and ethical considerations. All of which should be considered by higher
    education institutions and students.
  prefs: []
  type: TYPE_NORMAL
- en: '10.4.1 Institutional Readiness: Technological Infrastructure and Training Needs'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In adopting advanced technologies for personalized curriculum planning, institutions
    must assess their readiness on two critical fronts: technological infrastructure
    and training needs. The technological infrastructure must be robust enough to
    support the deployment of AI-driven systems ([Giang et al. 2021](#ch18.xhtml#r412)).
    This includes considerations for data storage, processing capabilities, and network
    reliability. Concurrently, a comprehensive training program must be instituted
    to equip educators and administrators with the requisite skills to effectively
    navigate and leverage these technologies ([Luckin et al. 2022](#ch18.xhtml#r427)).
    Further, it needs to be taken into account that access to this technology is limited
    as users must pay a subscription fee and adhere to quantitative usage restrictions.
    As [Grassini (2023)](#ch18.xhtml#r415) argues, the scientific community still
    discusses OpenAI’s lack of transparency, especially regarding GPT-4’s training
    data as well as sources. Institutional readiness, therefore, involves aligning
    both technological capabilities and human expertise for seamless integration.'
  prefs: []
  type: TYPE_NORMAL
- en: '10.4.2 Technical Implementation: Build your own AI Model'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are several opportunities for implementing such a personalized curriculum
    planning regarding the technical implementation. With the advantages of GPT Builder,
    institutions and students are able to build a custom GPT with instructions based
    on provided data (for instance, the program curriculum and selectable courses)
    to tailor the output to specific students. In addition, the integration of GenAI
    is possible in the university’s IT architecture via the application programming
    interfaces (API). For instance, OpenAI’s API allows fine-tuning to create a custom-trained
    model, which can respond to students more accurately and with a previously aligned
    tone.
  prefs: []
  type: TYPE_NORMAL
- en: '10.4.3 Continuous Improvement: Feedback Loops and Adaptation to University
    Courses'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ensuring the long-term success of personalized curriculum planning requires
    the establishment of continuous improvement mechanisms. Feedback loops play a
    pivotal role in refining recommendations by collecting user input, evaluating
    the effectiveness of implemented strategies, and adapting to evolving educational
    needs ([Grassini 2023](#ch18.xhtml#r415)). Moreover, as the job market undergoes
    dynamic changes, the personalized curriculum must be adaptive to emerging trends
    ([World Economic Forum 2023](#ch18.xhtml#r446)). Continuous improvement strategies
    involve a commitment to staying abreast of industry developments, updating content
    accordingly, and aligning educational programs with the evolving demands of the
    job market.
  prefs: []
  type: TYPE_NORMAL
- en: '10.4.4 Ethical Considerations: Addressing Privacy Concerns and Ensuring Fairness'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The ethical implications of personalized curriculum planning extend to privacy
    concerns and fairness in educational access ([Borenstein and Howard 2021](#ch18.xhtml#r401)).
    Institutions must prioritize the protection of individual privacy by implementing
    robust data security measures, ensuring that sensitive information is handled
    responsibly and transparently ([Kerr 2020](#ch18.xhtml#r421)). Moreover, the system’s
    algorithms must be designed and continuously monitored to avoid biases and ensure
    fairness in recommendations. The ethical underpinning of personalized curriculum
    planning necessitates a commitment to equity, transparency, and accountability
    to foster a learning environment that respects the rights and dignity of all learners
    ([Reiss 2021](#ch18.xhtml#r438)). The most relevant ethical aspects are summarized
    in a framework by [Regan and Jesse (2019)](#ch18.xhtml#r437) and consist of (1)
    information privacy, (2) anonymity, (3) surveillance, (4) autonomy, (5) non-discrimination,
    and (6) ownership of information.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, the successful implementation and future development of personalized
    curriculum planning systems demand a holistic approach. Institutional readiness,
    encompassing technological infrastructure, and training, forms the foundation.
    Continuous improvement strategies, incorporating feedback loops and adaptability
    to job market trends, ensure the relevance and effectiveness of the educational
    system. Ethical considerations, focusing on privacy and fairness, underscore the
    importance of responsible technological integration. By addressing these pillars,
    institutions can pave the way for a transformative educational landscape that
    leverages technology to enhance learning experiences while upholding ethical standards
    and ensuring equity.
  prefs: []
  type: TYPE_NORMAL
- en: 10.5 Future Research Directions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GenAI offers tremendous potential for shaping personalized learning paths. As
    much research in this field is yet to come, we want to outline future research
    avenues that arise from this transformative technology. Therefore, we address
    crucial questions surrounding the accuracy, long-term effects, adaptability, ethical
    considerations, educator perspectives, and the role of GenAI in supporting lifelong
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: The perceived accuracy of curriculum recommendations lies at the core of effective
    personalized learning paths. GenAI models hold the potential to analyze vast datasets,
    identifying nuanced patterns in individual learning styles and preferences. By
    optimizing recommendations based on these insights, GenAI can significantly enhance
    the precision of tailored learning experiences. Therefore, we want to strengthen
    research approaches focusing on how GenAI models can enhance the accuracy and
    personalization of curriculum recommendations, considering individual learning
    styles and preferences to optimize learning outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, as the outcomes of GenAI recommendations largely depend on the provided
    data sources, for instance, the granularity of skill data, it is vital to explore
    data sources provided by students and external data sources like job descriptions
    and roles. Also, it can be helpful to gain a more holistic and reliable picture
    of a student’s skills when considering that self-assessment data, as well as supervisor
    data, can be biased. A triangulation of different sources can serve clarity ([Freise
    and Hupe 2023](#ch18.xhtml#r411)). Accordingly, we ask, “What data sources regarding
    the academic education and skill gaps are needed for GenAI to provide accurate
    and tailored curriculum recommendations?”
  prefs: []
  type: TYPE_NORMAL
- en: Investigating the lasting impact of GenAI-powered personalized curriculum planning
    is crucial. Understanding its effects on academic performance, student engagement,
    and retention compared to traditional approaches will shed light on the potential
    benefits and challenges, particularly in diverse student populations. This is
    relevant in two ways. Firstly, examining the growing need for lifelong learning,
    examining whether a personalized curriculum can be leveraged in organizational
    re-& upskilling contexts ([Urdaneta-Ponte et al. 2021](#ch18.xhtml#r443)). Secondly,
    as education is at the heart of governmental strategies, it will be necessary
    to tailor these approaches so that they serve Sustainable Development Goal four
    and provide inclusive and equitable quality education and promote lifelong learning
    opportunities ([United Nations 2023](#ch18.xhtml#r442)), especially for students
    of different backgrounds and abilities.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, as described before, GenAI possesses ethical considerations that cannot
    be ignored. Therefore, we suggest further investigating the dimensions of privacy,
    transparency, and fairness along with practical guidelines on ensuring responsible
    implementation in educational settings. With the continuous development of GenAI
    models like ChatGPT, new opportunities and challenges arise for education. While
    using and adapting to technological advancements, it is still necessary to remember
    that these models are also not perfect.
  prefs: []
  type: TYPE_NORMAL
- en: 10.6 Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This book chapter aimed to explore the opportunities for GenAI in personalized
    curriculum planning for higher education institutions. We first elaborate on existing
    work on GenAI and personalized learning and then describe an in-depth use case
    for implementing GenAI for curriculum planning. We discuss the data input and
    prompts needed, the functions of GenAI in detecting skill gaps and recommending
    suitable courses, and then explore expected outcomes for students and institutions.
    Further, we provide hands-on action practice and then give implementation advice
    for institutions. Our chapter helps students to apply the advantages of GenAI
    for personalized curriculum planning and, in turn, helps to increase their empowerment
    and career readiness. For institutions, we offer advice for implementing such
    a tool in the program management to reduce administrative workload and decrease
    dropout rates. We further outline several critical areas for future research,
    like the accuracy of recommendation and the dependency on individual learning
    styles.
  prefs: []
  type: TYPE_NORMAL
- en: However, the content presented in this chapter is not without limitations. First,
    we build upon a limited scope of research; as the phenomenon of GenAI is rather
    new, the scientific community is just in the beginning of exploring the different
    applications and possibilities of this technology. Later work will bring about
    more insights of the benefits for personalized curriculum planning. Further, we
    built our case upon models like ChatGPT 4.0, which is on the one hand not the
    newest release from OpenAI, on the other hand we left other providers like Google’s
    Gemini unattended. Next, the case of the student named Alex, presented here, needs
    to be understood as an exemplary case which was not build upon a real person;
    therefore, the generalizability of this example may be limited. Last, we refer
    to previous research and cannot exclude possible biases in their research procedures.
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, this chapter aims to shed light on helping students to unlock
    their dream jobs through GenAI-based personalized curriculum planning. Moreover,
    the exploration of GenAI’s potential for personalized learning paths underscores
    its transformative capacity in education. While GenAI presents promising opportunities
    for educational advancement, continued research and mindful adaptation are imperative
    to address challenges and ensure its effective and ethical integration into learning
    environments.
  prefs: []
