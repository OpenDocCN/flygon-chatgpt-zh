- en: '**Introduction** **– Why This Book Exists**'
  id: totrans-10
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**引言** **– 这本书为何存在**'
- en: You’ve probably tried using ChatGPT before and felt like it just didn’t “get”
    what you were asking. Right? The answer came back — but it was vague, confusing,
    or just way off from what you had in mind. This isn’t the AI’s fault. And it’s
    not yours either. The truth is, very few people teach you how to actually ask
    the right way. Most folks think it’s enough to just type in a question... but
    the real magic is in the structure of the request — *the prompt.*
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能之前尝试过使用ChatGPT，感觉它似乎根本“不理解”你提出的问题。对吧？回答回来了——但它模糊、令人困惑，或者完全偏离了你心中的想法。这不是AI的错。也不是你的错。事实是，很少有人教你如何真正正确地提问。大多数人认为，只要输入一个问题就足够了...但真正的魔法在于请求的结构——*提示*。
- en: 'This book is a direct response to that problem. It was created to show that
    you don’t need to memorize dozens of magic formulas or learn how to code. You
    just need to understand one simple structure. One prompt that, when used correctly,
    can be adapted to nearly any goal: writing, planning, studying, organizing your
    life, selling more, creating content — and more. And the best part: quickly, clearly,
    and with full autonomy.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书是对那个问题的直接回应。它的目的是展示你不需要记住几十个魔法公式或学习如何编码。你只需要理解一个简单的结构。一个提示，当正确使用时，可以适应几乎任何目标：写作、规划、学习、组织生活、销售更多、创造内容——等等。而且最好的部分是：快速、清晰，并且完全自主。
- en: 'Since ChatGPT’s public release in November 2022, I’ve been using the tool almost
    daily. I ran many tests, explored different approaches, made mistakes, and hit
    the mark a few times. Along the way, I learned some valuable lessons — not just
    about what AI can do, but also about what it still can’t. One thing, though, has
    remained consistently true: the quality of the response is directly proportional
    to the quality of the question. The smarter, clearer, and more targeted the prompt,
    the better the result. I saw this play out repeatedly and confirmed it through
    research and conversations with other experienced users.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 自从ChatGPT在2022年11月公开发布以来，我几乎每天都在使用这个工具。我进行了许多测试，探索了不同的方法，犯过错误，也几次击中靶心。在这个过程中，我学到了一些宝贵的教训——不仅关于AI能做什么，还关于它还做不到什么。然而，有一件事始终如一：回答的质量与问题的质量成正比。提示越聪明、越清晰、越有针对性，结果就越好。我反复看到这一点，并通过研究和与其他经验丰富的用户交谈来证实了这一点。
- en: 'After months of study, reading articles and serious research on artificial
    intelligence, watching countless tutorials, and diving into hands-on practice
    with the tool, I arrived at what I believe is the core of effective ChatGPT use.
    A model that works like a wild card — flexible, repeatable, and capable of generating
    incredible results when used well. That’s what I call: ***the only prompt you’ll
    ever need to use ChatGPT.***'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 经过数月的研读，阅读关于人工智能的文章和深入研究，观看无数教程，并亲自实践使用这个工具，我找到了我认为是有效使用ChatGPT的核心。一个像万能牌一样的工作模式——灵活、可重复，并且在使用得当的情况下能够产生惊人的结果。这就是我所说的：***你将永远需要的ChatGPT唯一提示***。
- en: 'That said, although this book centers around a single prompt, it’s important
    to say this upfront: you shouldn’t limit yourself to just that one. In fact, once
    you begin using it and interacting with ChatGPT, you’ll quickly realize that you’ll
    need to adapt it, expand it, customize it, tweak it, restructure it — and even
    experiment with new variations. That’s because, while this prompt is incredibly
    useful for starting conversations and organizing your thoughts effectively, it’s
    not a final destination — it’s a powerful starting point. But don’t worry: in
    the next pages, I’ll show you exactly how to explore and expand its use in a practical
    and effective way.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，尽管这本书围绕一个单一的提示展开，但重要的是要提前说明：你不应该只局限于那一个。事实上，一旦你开始使用它并与ChatGPT互动，你很快就会意识到你需要适应它、扩展它、定制它、调整它、重构它——甚至尝试新的变体。这是因为，虽然这个提示对于开始对话和有效地组织你的思想非常有用，但它并不是终点——它是一个强大的起点。但不用担心：在接下来的几页中，我会向你展示如何以实用和有效的方式探索和扩展它的使用。
- en: You’re about to learn a skill that can radically change how you work with AI
    — and how you think. So let’s get straight to it. No fluff. No jargon. Just what
    works *.*
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 你即将学习一项可以彻底改变你与AI合作方式——以及你思维方式——的技能。所以，让我们直接进入正题。没有废话。没有术语。只有真正有效的方法 *.*
- en: '![](Image00000.jpg)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![](Image00000.jpg)'
- en: '**⚠️** **IMPORTANT NOTICE**'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**⚠️** **重要通知**'
- en: '*Although this book uses ChatGPT as its main example and reference, the concepts
    you’ll learn here apply to any conversational AI system (chat-based). What matters
    is the logic behind how you structure your requests, how you guide and direct
    the AI — not the tool itself. It could be ChatGPT, Claude, Gemini, Microsoft Copilot,
    or any current or future system. The goal is to help you understand the mindset
    and strategy behind intelligent use of these tools. In the end, the AI you choose
    to use is just a detail.*'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '*尽管这本书以ChatGPT作为主要示例和参考，但你在这里学到的概念适用于任何基于对话的AI系统（基于聊天的）。重要的是你构建请求背后的逻辑，你如何引导和指导AI——而不是工具本身。它可能是ChatGPT、Claude、Gemini、Microsoft
    Copilot，或任何当前或未来的系统。目标是帮助你理解智能使用这些工具的心态和策略。最终，你选择的AI只是一个细节。*'
- en: '**🎁** **Bonus**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**🎁** **额外奖励**'
- en: To support your learning journey, I’ve created a custom assistant called GPT
    Learner ( [*click here to access it*](https://chat.openai.com/g/g-9pabvHycT-gpt-learner)
    ).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为了支持你的学习之旅，我创建了一个名为GPT Learner的自定义助手（[点击此处访问它](https://chat.openai.com/g/g-9pabvHycT-gpt-learner)）。
- en: This assistant was trained by me to answer questions specifically related to
    the content of this book and to topics around learning and studying with AI *(see
    the end of the book for more details)* .
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这个助手是由我训练的，专门回答与本书内容以及围绕使用AI学习和研究相关的问题（更多详情请见书末）。
- en: 'However, if for any reason your questions aren’t fully answered by the assistant,
    I’m available in the Q&A section of the members area, or you can reach out directly
    via email:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果助手未能完全回答你的问题，我将在会员区域的问答部分提供帮助，或者你可以直接通过电子邮件联系：
- en: ✉️ contato@leitornautas.com
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: ✉️ contato@leitornautas.com
- en: May the pages of this book mark the beginning of a transformation in your learning
    process — and help you experience the powerful combination of human knowledge
    and artificial intelligence.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 让这本书的篇章标志着你学习过程的一个转变的开始——并帮助你体验人类知识与人工智能的强大结合。
- en: Enjoy your reading!
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 享受你的阅读！
