- en: But that’s not the only way we can alter media to suit our own purposes. Have
    you ever gifted a loved one with something personalized just for them? Things
    like mugs or throw pillows with a family member’s face on them are great presents
    because the personal touch makes them sentimental.
  id: totrans-979
  prefs: []
  type: TYPE_NORMAL
  zh: 但这并不是我们改变媒体以适应我们目的的唯一方式。你有没有送过一份只为你所爱的人定制的礼物？比如带有家庭成员面孔的杯子或抱枕都是很好的礼物，因为个性化的触摸使它们变得充满情感。
- en: So, let’s look at how we can change a story to personalize it for a young child
    that would love to see a story tailored just for them.
  id: totrans-980
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们看看我们如何将一个故事进行改编，使其个性化，适合一个渴望看到专为他们量身定制故事的小孩子。
- en: Making the Tale of Goldilocks and the Three Bears More Personal
  id: totrans-981
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让《金发姑娘和三只熊》的故事更加个性化
- en: Telling children stories before bed is a beautiful way to bond, and there’s
    nothing that excites them more than seeing themselves in the protagonist of the
    story. With ChatGPT, we can take these stories and make them catered to your own
    close loved ones. Try this out with your favorite bedtime story to tell your kids!
  id: totrans-982
  prefs: []
  type: TYPE_NORMAL
  zh: 在睡前给孩子讲故事是一种美好的增进感情的方式，没有什么比看到自己在故事中的主角位置更能让他们兴奋的了。借助ChatGPT，我们可以将这些故事改编成适合你亲近的亲人。试着用你最喜欢的睡前故事来给你的孩子讲故事吧！
- en: For this example, we’re going to ask ChatGPT to tell us the story of Goldilocks
    and the Three Bears (Prompt [11-5](#PC9)).Tell me the story of Goldilocks and
    the Three BearsPrompt 11-5
  id: totrans-983
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将要求ChatGPT告诉我们《金发姑娘和三只熊》的故事（提示[11-5](#PC9))。告诉我《金发姑娘和三只熊》的故事提示11-5
- en: 'Getting ChatGPT to tell us a story In Response [11-5](#PC10), you’ll see how
    ChatGPT recounts the story for us.The story of **Goldilocks and the Three Bears**
    is a classic fairy tale with many versions, but here''s a popular retelling:---**Goldilocks
    and the Three Bears**Once upon a time, in a cozy little cottage in the forest,
    there lived three bears: a big Papa Bear, a medium-sized Mama Bear, and a tiny
    Baby Bear. Each bear had their own bowl for porridge, their own chair, and their
    own bed.One morning, the bears made porridge for breakfast, but it was too hot
    to eat. They decided to go for a walk in the forest while it cooled.Nearby, a
    curious little girl named Goldilocks was wandering through the woods. She stumbled
    upon the bears'' cottage and, finding the door open, decided to go inside.---**The
    Porridge**In the kitchen, Goldilocks saw three bowls of porridge. She tasted the
    first bowl."Too hot!" she exclaimed.She tried the second bowl."Too cold!"Finally,
    she tasted the porridge in the smallest bowl."Just right!" she said happily, and
    she ate it all up.---**The Chairs**Feeling full, Goldilocks went into the living
    room and saw three chairs. She sat in the first chair."Too hard!" she said.She
    tried the second chair."Too soft!"Then she sat in the smallest chair."Just right!"
    she said. But as she sat back to relax, the little chair broke into pieces.---**The
    Beds**Now feeling sleepy, Goldilocks went upstairs to the bedroom. She lay down
    on the first bed."Too hard!"She tried the second bed."Too soft!"Then she lay down
    on the smallest bed."Just right!" she sighed and fell fast asleep.---**The Bears
    Return**Soon, the three bears came home from their walk. They noticed someone
    had been in their house."Someone''s been eating my porridge!" growled Papa Bear."Someone''s
    been eating my porridge!" said Mama Bear."Someone''s been eating my porridge,
    and they ate it all up!" cried Baby Bear.In the living room, they found the chairs."Someone''s
    been sitting in my chair!" growled Papa Bear."Someone''s been sitting in my chair!"
    said Mama Bear."Someone''s been sitting in my chair, and they broke it!" cried
    Baby Bear.When they went upstairs, they saw the beds."Someone''s been sleeping
    in my bed!" growled Papa Bear."Someone''s been sleeping in my bed!" said Mama
    Bear."Someone''s been sleeping in my bed, and she''s still there!" cried Baby
    Bear.---**Goldilocks Wakes Up**Goldilocks woke up and saw the three bears staring
    at her. She screamed, jumped out of bed, and ran as fast as she could out of the
    house and into the forest. She never returned to the bears'' cottage again.---And
    from that day on, Goldilocks learned to be more careful about wandering into houses
    that weren''t hers.**The End.**Response 11-5'
  id: totrans-984
  prefs: []
  type: TYPE_NORMAL
  zh: 在响应[11-5](#PC10)中，您将看到ChatGPT是如何为我们讲述这个故事的。《金发姑娘和三只熊》是一个有许多版本的经典童话，但这里有一个流行的版本：---**金发姑娘和三只熊**从前，在一个森林里一个温馨的小屋子里，住着三只熊：一个大熊爸爸，一个中等大小的熊妈妈，和一个微小的熊宝宝。每只熊都有自己的粥碗、自己的椅子和自己的床。一天早上，熊们为早餐煮了粥，但粥太烫了，无法食用。他们决定在粥冷却的时候去森林散步。附近，一个好奇的小女孩名叫金发姑娘在树林里漫步。她偶然发现了熊的小屋，发现门开着，就决定进去看看。---**粥**在厨房里，金发姑娘看到了三碗粥。她尝了第一碗。“太烫了！”她惊叫道。她尝了第二碗。“太冷了！”最后，她尝了最小一碗的粥。“正好！”她高兴地说，然后把它全部吃光了。---**椅子**吃饱后，金发姑娘走进客厅，看到了三把椅子。她坐在第一把椅子上。“太硬了！”她说。她试了第二把椅子。“太软了！”然后她坐在最小的椅子上。“正好！”她说。但当她坐下来放松时，小椅子突然散了架。---**床**现在感到困倦，金发姑娘上楼到了卧室。她躺在第一张床上。“太硬了！”她试了第二张床。“太软了！”然后她躺在最小的床上。“正好！”她叹了口气，很快就睡着了。---**熊们回来了**不久，三只熊从散步回来了。他们注意到有人进过他们的房子。“有人吃了我的粥！”爸爸熊咆哮道。“有人吃了我的粥！”妈妈熊说。“有人吃了我的粥，而且把它们都吃光了！”宝宝熊哭喊道。在客厅里，他们发现了椅子。“有人坐过我的椅子！”爸爸熊咆哮道。“有人坐过我的椅子！”妈妈熊说。“有人坐过我的椅子，而且把它弄坏了！”宝宝熊哭喊道。当他们上楼时，他们看到了床。“有人睡过我的床！”爸爸熊咆哮道。“有人睡过我的床！”妈妈熊说。“有人睡过我的床，而且她还躺在那里！”宝宝熊哭喊道。---**金发姑娘醒了**金发姑娘醒了，看到三只熊盯着她看。她尖叫起来，从床上跳起来，尽可能快地跑出房子，跑进了森林。她再也没有回到熊的小屋。---从那天起，金发姑娘学会了更加小心地不要走进不属于她的房子。**结束。**响应
    11-5
- en: ChatGPT tells the story of Goldilocks and the Three Bears
  id: totrans-985
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT讲述了《金发姑娘和三只熊》的故事
- en: Now let’s ask ChatGPT to customize the story for us. I encourage you to try
    this for yourself by changing the protagonist, the bears, the setting, or anything
    else to make it more personal. In the meantime, check out how we did it in Prompt
