- en: '**MYSQL, SQLALCHEMY, AND PANDAS**'
  id: totrans-1527
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**MYSQL、SQLALCHEMY 和 PANDAS**'
- en: There are several ways to interact with a MySQL database, one of which is via
    SQLAlchemy. The Python code samples in subsequent sections rely on SQLAlchemy
    (which is briefly described in the next section) and Pandas.
  id: totrans-1528
  prefs: []
  type: TYPE_NORMAL
  zh: 与 MySQL 数据库交互有几种方式，其中之一是通过 SQLAlchemy。接下来的部分中的 Python 代码示例依赖于 SQLAlchemy（在下一节中简要介绍）和
    Pandas。
- en: '**What Is SQLAlchemy?**'
  id: totrans-1529
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**什么是 SQLAlchemy？**'
- en: 'SQLAlchemy is an ORM (Object Relational Mapping), which serves as a “bridge”
    between Python code and a database. Install SQLAlchemy with this command:'
  id: totrans-1530
  prefs: []
  type: TYPE_NORMAL
  zh: SQLAlchemy 是一个 ORM（对象关系映射），它作为 Python 代码和数据库之间的“桥梁”。使用以下命令安装 SQLAlchemy：
- en: '[PRE301]'
  id: totrans-1531
  prefs: []
  type: TYPE_PRE
  zh: '[PRE301]'
- en: SQLAlchemy handles the task of converting Python function invocations into the
    appropriate SQL statements, as well as providing support for custom SQL statements.
    In addition, SQLAlchemy supports multiple databases, including MySQL, Oracle,
    PostgreSQL, and SQLite.
  id: totrans-1532
  prefs: []
  type: TYPE_NORMAL
  zh: SQLAlchemy 负责将 Python 函数调用转换为适当的 SQL 语句，并提供对自定义 SQL 语句的支持。此外，SQLAlchemy 支持多个数据库，包括
    MySQL、Oracle、PostgreSQL 和 SQLite。
- en: '**Read MySQL Data via SQLAlchemy**'
  id: totrans-1533
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**通过 SQLAlchemy 读取 MySQL 数据**'
- en: 'The previous section showed you how to install SQLAlchemy, and install Pandas
    (if you haven’t done so already) with this command:'
  id: totrans-1534
  prefs: []
  type: TYPE_NORMAL
  zh: 前一节展示了如何安装 SQLAlchemy，以及安装 Pandas（如果你还没有安装的话）的命令：
- en: '[PRE302]'
  id: totrans-1535
  prefs: []
  type: TYPE_PRE
  zh: '[PRE302]'
- en: The Pandas functionality in the code samples involves the intuitively named
    read_sql() method and the related read_sql_query() method, both of which read
    the contents of a MySQL table.
  id: totrans-1536
  prefs: []
  type: TYPE_NORMAL
  zh: 代码示例中的 Pandas 功能涉及直观命名的 read_sql() 方法和相关 read_sql_query() 方法，这两个方法都用于读取 MySQL
    表的内容。
