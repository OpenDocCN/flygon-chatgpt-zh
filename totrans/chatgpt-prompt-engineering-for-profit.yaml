- en: '○ ****Que**stio**n : "****Com**par**e ****Ein**stei**n''****s**** ****the**orie**s
    ****o**f** ****gen**era**l ****rela**tivit**y ****a**nd** ****qua**ntu**m ****mech**anic**s
