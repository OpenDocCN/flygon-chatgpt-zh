  id: totrans-1302
  prefs: []
  type: TYPE_NORMAL
  zh: '安装 Git :'
- en: sudo apt install git
  id: totrans-1303
  prefs: []
  type: TYPE_NORMAL
  zh: sudo apt install git
- en: '3\. Code development and deployment :'
  id: totrans-1304
  prefs: []
  type: TYPE_NORMAL
  zh: '3. 代码开发和部署 :'
- en: 'Local development :'
  id: totrans-1305
  prefs: []
  type: TYPE_NORMAL
  zh: 本地开发：
- en: Develop the code on your PC or Mac using your preferred development environment
    (e.g. Visual Studio Code).
  id: totrans-1306
  prefs: []
  type: TYPE_NORMAL
  zh: 使用您首选的开发环境（例如 Visual Studio Code）在您的 PC 或 Mac 上开发代码。
- en: Test the code locally to make sure it works properly before deploying it on
    the server.
  id: totrans-1307
  prefs: []
  type: TYPE_NORMAL
  zh: 在将代码部署到服务器之前，在本地测试代码以确保其正常工作。
- en: 'Sending the Code to the Server :'
  id: totrans-1308
  prefs: []
  type: TYPE_NORMAL
  zh: 将代码发送到服务器：
- en: 'Use Git to version your code and deploy it on the server. For example :'
  id: totrans-1309
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Git 对代码进行版本控制和在服务器上部署。例如：
- en: git init
  id: totrans-1310
  prefs: []
  type: TYPE_NORMAL
  zh: git init
- en: git add .
  id: totrans-1311
  prefs: []
  type: TYPE_NORMAL
  zh: git add .
- en: git commit -m "Initial commit
  id: totrans-1312
  prefs: []
  type: TYPE_NORMAL
  zh: git commit -m "Initial commit"
- en: git remote add origin your_server_repository_url
  id: totrans-1313
  prefs: []
  type: TYPE_NORMAL
  zh: git remote add origin your_server_repository_url
- en: git push -u origin master
  id: totrans-1314
  prefs: []
  type: TYPE_NORMAL
  zh: git push -u origin master
- en: 'On the server, clone the Git repository to retrieve the :'
  id: totrans-1315
  prefs: []
  type: TYPE_NORMAL
  zh: 在服务器上，克隆 Git 仓库以检索：
- en: git clone your_repository_url
  id: totrans-1316
  prefs: []
  type: TYPE_NORMAL
  zh: git clone your_repository_url
- en: cd repository_directory
  id: totrans-1317
  prefs: []
  type: TYPE_NORMAL
  zh: cd repository_directory
- en: 'Code execution on the Server :'
  id: totrans-1318
  prefs: []
  type: TYPE_NORMAL
  zh: '服务器上的代码执行 :'
- en: 'Configuring virtual environments to isolate dependencies :'
  id: totrans-1319
  prefs: []
  type: TYPE_NORMAL
  zh: 配置虚拟环境以隔离依赖项：
- en: python3.10 -m venv myenv
  id: totrans-1320
  prefs: []
  type: TYPE_NORMAL
  zh: python3.10 -m venv myenv
- en: source myenv/bin/activate
  id: totrans-1321
  prefs: []
  type: TYPE_NORMAL
  zh: source myenv/bin/activate
- en: pip install -r requirements.txt
  id: totrans-1322
  prefs: []
  type: TYPE_NORMAL
  zh: pip install -r requirements.txt
- en: 'Run your trading scripts :'
  id: totrans-1323
  prefs: []
  type: TYPE_NORMAL
  zh: 运行您的交易脚本：
- en: python3 your_trading_script.py
  id: totrans-1324
  prefs: []
  type: TYPE_NORMAL
  zh: python3 your_trading_script.py
- en: '4\. Securing Server Access :'
  id: totrans-1325
  prefs: []
  type: TYPE_NORMAL
  zh: '4. 服务器访问安全 :'
- en: 'Firewall configuration (UFW) :'
  id: totrans-1326
  prefs: []
  type: TYPE_NORMAL
  zh: 防火墙配置（UFW）：
- en: 'Enable and configure UFW to allow only necessary connections:'
  id: totrans-1327
  prefs: []
  type: TYPE_NORMAL
  zh: 启用并配置 UFW 以仅允许必要的连接：
- en: sudo apt install ufw
  id: totrans-1328
  prefs: []
  type: TYPE_NORMAL
  zh: sudo apt install ufw
- en: sudo ufw allow OpenSSH
  id: totrans-1329
  prefs: []
  type: TYPE_NORMAL
  zh: sudo ufw allow OpenSSH
- en: sudo ufw enable
  id: totrans-1330
  prefs: []
  type: TYPE_NORMAL
  zh: sudo ufw enable
- en: 'Using SSH keys :'
  id: totrans-1331
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 SSH 密钥：
- en: Generate an SSH key on your local machine and add the public key to the server
    for a secure connection.
  id: totrans-1332
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的本地机器上生成 SSH 密钥并将其公钥添加到服务器以实现安全连接。
- en: ssh-keygen -t rsa -b 4096
  id: totrans-1333
  prefs: []
  type: TYPE_NORMAL
  zh: ssh-keygen -t rsa -b 4096
- en: ssh-copy-id root@your_vps_ip
  id: totrans-1334
  prefs: []
  type: TYPE_NORMAL
  zh: ssh-copy-id root@your_vps_ip
- en: 'Configuring two-factor authentication :'
  id: totrans-1335
  prefs: []
  type: TYPE_NORMAL
  zh: 配置双重身份验证：
- en: Use tools like Google Authenticator to add an extra layer of security.
  id: totrans-1336
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Google Authenticator 等工具添加额外的安全层。
- en: By following these recommendations, you can set up a server in a datacenter
    for algorithmic trading, offering optimal stability and performance for running
    your algorithms continuously. This configuration allows you to develop your code
    locally on your PC or Mac, then deploy it on the server for reliable, secure execution.
  id: totrans-1337
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这些建议，您可以在数据中心设置一个用于算法交易的服务器，为持续运行您的算法提供最佳稳定性和性能。此配置允许您在您的 PC 或 Mac 上本地开发代码，然后将其部署到服务器上进行可靠、安全的执行。
- en: Python 3.1x
  id: totrans-1338
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Python 3.1x
- en: Introduction to Python
  id: totrans-1339
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Python 简介
- en: '![](images/image-II8L9DEW.jpg)'
  id: totrans-1340
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-II8L9DEW.jpg)'
- en: Python is a versatile, object-oriented interpreted programming language known
    for its simplicity and readability. Created by Guido van Rossum and first published
    in 1991, Python has gained in popularity thanks to its clear, concise syntax,
    which allows developers to focus on problem solving rather than code complexity.
  id: totrans-1341
  prefs: []
  type: TYPE_NORMAL
  zh: Python 是一种多用途的、面向对象的解释型编程语言，以其简洁和可读性著称。由吉多·范罗苏姆创建并于 1991 年首次发布，Python 由于其清晰、简洁的语法而受到欢迎，这使得开发者能够专注于问题解决而不是代码复杂性。
- en: Python 3.1x represents a series of versions that offer improvements and advanced
    features over earlier versions. Adoption of Python 3.10 or higher is strongly
    recommended to take advantage of the latest advances in performance and functionality.
  id: totrans-1342
  prefs: []
  type: TYPE_NORMAL
  zh: Python 3.1x 代表了一系列版本，这些版本在早期版本的基础上提供了改进和高级功能。强烈建议采用 Python 3.10 或更高版本，以利用性能和功能方面的最新进展。
- en: The benefits of Python for trading
  id: totrans-1343
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Python 在交易中的优势
- en: 'Python has become the language of choice for algorithmic trading and financial
    investing for several reasons:'
  id: totrans-1344
  prefs: []
  type: TYPE_NORMAL
  zh: Python 成为算法交易和金融投资的首选语言，原因有以下几点：
- en: 'Simplicity and legibility:'
  id: totrans-1345
  prefs: []
  type: TYPE_NORMAL
  zh: 简洁性和可读性：
- en: Python's simple syntax enables developers to write clear, maintainable code.
    This is particularly useful in trading, where complex algorithms need to be implemented
    and tested quickly.
  id: totrans-1346
  prefs: []
  type: TYPE_NORMAL
  zh: Python 的简单语法使开发者能够编写清晰、易于维护的代码。这在交易中尤其有用，因为需要快速实现和测试复杂的算法。
- en: 'Community and Support :'
  id: totrans-1347
  prefs: []
  type: TYPE_NORMAL
  zh: 社区和支持：
- en: Python benefits from a vast community of developers and numerous discussion
    forums, making it easy to learn and solve problems. In addition, there is an abundance
    of educational resources, tutorials and documentation.
  id: totrans-1348
  prefs: []
  type: TYPE_NORMAL
  zh: Python 享有庞大的开发者社区和众多的讨论论坛，这使得学习和解决问题变得容易。此外，还有大量的教育资源、教程和文档。
- en: 'Portability :'
  id: totrans-1349
  prefs: []
  type: TYPE_NORMAL
  zh: '可移植性 :'
- en: Python is cross-platform, which means that scripts can be run on different machines
    (Windows, macOS, Linux) without significant modifications to the code.
  id: totrans-1350
  prefs: []
  type: TYPE_NORMAL
  zh: Python 是跨平台的，这意味着脚本可以在不同的机器（Windows、macOS、Linux）上运行，而无需对代码进行重大修改。
- en: Multiple libraries for trading
  id: totrans-1351
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多个交易库
- en: 'One of the main advantages of Python is its rich ecosystem of libraries. Here
    are some of the most popular and useful Python libraries for algorithmic trading:'
  id: totrans-1352
  prefs: []
  type: TYPE_NORMAL
  zh: Python 的主要优势之一是其丰富的库生态系统。以下是一些最流行和最有用的Python库，适用于算法交易：
- en: 'Pandas :'
  id: totrans-1353
  prefs: []
  type: TYPE_NORMAL
  zh: 'Pandas :'
- en: Pandas is a powerful library for data manipulation and analysis. It offers flexible,
    high-performance data structures such as DataFrames, which facilitate the management
    of historical and real-time market data.
  id: totrans-1354
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 是一个强大的数据处理和分析库。它提供了灵活、高性能的数据结构，如DataFrame，这些结构有助于管理历史和实时市场数据。
- en: 'NumPy :'
  id: totrans-1355
  prefs: []
  type: TYPE_NORMAL
  zh: 'NumPy :'
- en: NumPy provides high-performance data structures and tools for advanced numerical
    calculations. It is often used for mathematical and statistical operations on
    market data.
  id: totrans-1356
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 提供了高性能的数据结构和用于高级数值计算的工具。它通常用于对市场数据进行数学和统计操作。
- en: 'Matplotlib :'
  id: totrans-1357
  prefs: []
  type: TYPE_NORMAL
  zh: 'Matplotlib :'
- en: Matplotlib is a visualization library for creating charts and data visualizations.
    It is essential for visually analyzing market trends and the performance of trading
    algorithms.
  id: totrans-1358
  prefs: []
  type: TYPE_NORMAL
  zh: Matplotlib 是一个用于创建图表和数据可视化的可视化库。它是分析市场趋势和交易算法性能的必备工具。
- en: 'TA-Lib:'
  id: totrans-1359
  prefs: []
  type: TYPE_NORMAL
  zh: 'TA-Lib:'
- en: TA-Lib is a library used for technical analysis. It provides functions for calculating
    technical indicators such as moving averages, RSI (Relative Strength Index), and
    Bollinger Bands.
  id: totrans-1360
  prefs: []
  type: TYPE_NORMAL
  zh: TA-Lib 是一个用于技术分析的库。它提供了计算移动平均线、RSI（相对强弱指数）和Bollinger Bands等技术指标的功能。
- en: 'ccxt :'
  id: totrans-1361
  prefs: []
  type: TYPE_NORMAL
  zh: 'ccxt :'
- en: ccxt (CryptoCurrency eXchange Trading Library) is a library for interacting
    with the APIs of numerous cryptocurrency exchanges. It enables real-time market
    data to be retrieved, orders to be placed and accounts to be managed programmatically.
  id: totrans-1362
  prefs: []
  type: TYPE_NORMAL
  zh: ccxt（加密货币交易所交易库）是一个用于与众多加密货币交易所API交互的库。它允许以编程方式检索实时市场数据、下订单和管理账户。
- en: 'scikit-learn :'
  id: totrans-1363
  prefs: []
  type: TYPE_NORMAL
  zh: 'scikit-learn :'
- en: Scikit-learn is a library for machine learning. It offers tools for classification,
    regression, clustering and other machine learning tasks, which are useful for
    developing predictive trading models.
  id: totrans-1364
  prefs: []
  type: TYPE_NORMAL
  zh: Scikit-learn 是一个机器学习库。它提供了分类、回归、聚类和其他机器学习任务的工具，这些工具对于开发预测交易模型非常有用。
- en: Python 3.1x is a powerful and flexible tool for algorithmic trading, thanks
    to its simplicity, portability and library-rich ecosystem. The multiple libraries
    available enable efficient management of market data, development of technical
    analysis and machine learning models, and interaction with trading platform APIs.
    By adopting Python, traders can quickly develop, test and deploy robust, high-performance
    trading algorithms. The following sections detail the installation of Python and
    the tools needed to start using these libraries in your trading projects.
  id: totrans-1365
  prefs: []
  type: TYPE_NORMAL
  zh: Python 3.1x 是一种强大且灵活的工具，适用于算法交易，这得益于其简洁性、可移植性和丰富的库生态系统。可用的多个库能够实现市场数据的有效管理、技术分析和机器学习模型的开发，以及与交易平台API的交互。通过采用Python，交易者可以快速开发、测试和部署稳健、高性能的交易算法。以下章节详细介绍了Python的安装以及开始使用这些库进行交易项目所需的工具。
- en: Programming tools
  id: totrans-1366
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编程工具
- en: Visual Studio Code
  id: totrans-1367
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Visual Studio Code
- en: Visual Studio Code (VS Code) is a free, open-source source code editor developed
    by Microsoft. It is designed to be lightweight and powerful, offering robust features
    for programming, including syntax highlighting, autocompletion, integrated debugging,
    version control with Git, and a wide range of extensions for different programming
    languages.
  id: totrans-1368
  prefs: []
  type: TYPE_NORMAL
  zh: Visual Studio Code (VS Code) 是由微软开发的一个免费、开源的源代码编辑器。它设计得轻巧且功能强大，提供了包括语法高亮、自动完成、集成调试、使用Git进行版本控制以及针对不同编程语言的广泛扩展在内的编程功能。
- en: Why use Visual Studio Code?
  id: totrans-1369
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么使用 Visual Studio Code？
- en: 'Free and Open-Source :'
  id: totrans-1370
  prefs: []
  type: TYPE_NORMAL
  zh: '免费和开源 :'
- en: VS Code is totally free and benefits from open-source development, with a large
    community of contributors and users.
  id: totrans-1371
  prefs: []
  type: TYPE_NORMAL
  zh: VS Code 完全免费，并受益于开源开发，拥有庞大的贡献者和用户社区。
- en: 'Multiplatform :'
  id: totrans-1372
  prefs: []
  type: TYPE_NORMAL
  zh: '多平台 :'
- en: Available on Windows, macOS and Linux, VS Code lets developers work in a familiar
    environment, whatever their platform.
  id: totrans-1373
  prefs: []
  type: TYPE_NORMAL
  zh: 可在 Windows、macOS 和 Linux 上使用，VS Code 允许开发者在熟悉的环境中工作，无论他们的平台是什么。
- en: 'Expandable :'
  id: totrans-1374
  prefs: []
  type: TYPE_NORMAL
  zh: 可扩展：
- en: With an extensive library of extensions, VS Code can be customized to meet the
    specific needs of developers in various programming languages, including Python.
  id: totrans-1375
  prefs: []
  type: TYPE_NORMAL
  zh: VS Code 拥有丰富的扩展库，可以定制以满足各种编程语言（包括 Python）的开发者特定需求。
- en: 'Git integration :'
  id: totrans-1376
  prefs: []
  type: TYPE_NORMAL
  zh: Git 集成：
- en: VS Code integrates Git, enabling developers to easily manage version control
    and collaborate with other developers.
  id: totrans-1377
  prefs: []
  type: TYPE_NORMAL
  zh: VS Code 集成了 Git，使开发者能够轻松管理版本控制和与其他开发者协作。
- en: Installing Visual Studio Code
  id: totrans-1378
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装 Visual Studio Code
- en: 'Download :'
  id: totrans-1379
  prefs: []
  type: TYPE_NORMAL
  zh: 下载：
- en: 'Visit the official Visual Studio Code website: code.visualstudio.com.'
  id: totrans-1380
  prefs: []
  type: TYPE_NORMAL
  zh: 访问官方 Visual Studio Code 网站：code.visualstudio.com。
- en: Download the appropriate version for your operating system (Windows, macOS,
    Linux).
  id: totrans-1381
  prefs: []
  type: TYPE_NORMAL
  zh: 下载适用于您操作系统的相应版本（Windows、macOS、Linux）。
- en: 'Installation:'
  id: totrans-1382
  prefs: []
  type: TYPE_NORMAL
  zh: 安装：
- en: 'Windows: Run the downloaded .exe file and follow the installer instructions.'
  id: totrans-1383
  prefs: []
  type: TYPE_NORMAL
  zh: Windows：运行下载的 .exe 文件并遵循安装说明。
- en: 'macOS: Open the downloaded .dmg file and drag Visual Studio Code into the Applications
    folder.'
  id: totrans-1384
  prefs: []
  type: TYPE_NORMAL
  zh: macOS：打开下载的 .dmg 文件并将 Visual Studio Code 拖入应用程序文件夹。
- en: 'Linux: Use your distribution''s package manager to install VS Code. For example,
    on Ubuntu :'
  id: totrans-1385
  prefs: []
  type: TYPE_NORMAL
  zh: Linux：使用您发行版的包管理器安装 VS Code。例如，在 Ubuntu 上：
- en: sudo snap install—classic code
  id: totrans-1386
  prefs: []
  type: TYPE_NORMAL
  zh: sudo snap install—classic code
- en: Loading the Python Programming Module
  id: totrans-1387
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载 Python 编程模块
- en: 'Opening VS Code :'
  id: totrans-1388
  prefs: []
  type: TYPE_NORMAL
  zh: 打开 VS Code：
- en: Launch Visual Studio Code from the Start menu (Windows), Applications folder
    (macOS) or Terminal (Linux) by typing code.
  id: totrans-1389
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在启动菜单（Windows）、应用程序文件夹（macOS）或终端（Linux）中键入 code 来从启动菜单启动 Visual Studio Code。
- en: 'Installing the Python Extension :'
  id: totrans-1390
  prefs: []
  type: TYPE_NORMAL
  zh: 安装 Python 扩展：
- en: Go to the Extensions tab by clicking on the Extensions icon in the left-hand
    sidebar (or by pressing Ctrl+Shift+X).
  id: totrans-1391
  prefs: []
  type: TYPE_NORMAL
  zh: 通过点击左侧侧边栏中的扩展图标（或按 Ctrl+Shift+X）转到扩展选项卡。
- en: Search for "Python" in the search bar.
  id: totrans-1392
  prefs: []
  type: TYPE_NORMAL
  zh: 在搜索栏中搜索“Python”。
- en: Select the official Microsoft extension and click "Install".
  id: totrans-1393
  prefs: []
  type: TYPE_NORMAL
  zh: 选择官方的 Microsoft 扩展并点击“安装”。
- en: Once installation is complete, VS Code will ask you to select a Python interpreter.
    Click on "Select a Python interpreter" and choose the version of Python 3.1x installed
    on your machine.
  id: totrans-1394
  prefs: []
  type: TYPE_NORMAL
  zh: 安装完成后，VS Code 将要求您选择 Python 解释器。点击“选择 Python 解释器”并选择您机器上安装的 Python 3.1x 版本。
- en: Editing and running a Python program
  id: totrans-1395
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编辑和运行 Python 程序
- en: 'Creating or opening a Python file :'
  id: totrans-1396
  prefs: []
  type: TYPE_NORMAL
  zh: 创建或打开 Python 文件：
- en: To create a new file, go to File > New File. Save it with the .py extension,
    e.g. my_program.py.
  id: totrans-1397
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建新文件，请转到文件 > 新建文件。保存为 .py 扩展名，例如 my_program.py。
- en: To open an existing file, go to File > Open and select the desired Python file.
  id: totrans-1398
  prefs: []
  type: TYPE_NORMAL
  zh: 要打开现有文件，请转到文件 > 打开并选择所需的 Python 文件。
- en: 'Program editing :'
  id: totrans-1399
  prefs: []
  type: TYPE_NORMAL
  zh: 程序编辑：
- en: 'You can now write or copy and paste your Python code into the editor. For example
    :'
  id: totrans-1400
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在可以在编辑器中编写或复制粘贴您的 Python 代码。例如：
- en: print("Hello, World!")
  id: totrans-1401
  prefs: []
  type: TYPE_NORMAL
  zh: print("Hello, World!")
- en: 'Program execution :'
  id: totrans-1402
  prefs: []
  type: TYPE_NORMAL
  zh: 程序执行：
- en: To run the program, click on the "Run" button at the top right of the editor
    window (triangle icon), or press Ctrl+F5.
  id: totrans-1403
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行程序，请点击编辑器窗口右上角的“运行”按钮（三角形图标），或按 Ctrl+F5。
- en: The built-in terminal will open at the bottom of the VS Code window and display
    the program output.
  id: totrans-1404
  prefs: []
  type: TYPE_NORMAL
  zh: 内置终端将在 VS Code 窗口的底部打开并显示程序输出。
- en: Using the Integrated Terminal to install libraries
  id: totrans-1405
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用集成终端安装库
- en: 'Access to the Integrated Terminal :'
  id: totrans-1406
  prefs: []
  type: TYPE_NORMAL
  zh: 访问集成终端：
- en: You can open the integrated terminal by going to View > Terminal or pressing
    Ctrl+ (backtick).
  id: totrans-1407
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过转到视图 > 终端或按 Ctrl+（反引号）打开集成终端。
- en: The integrated terminal will appear at the bottom of the VS Code window.
  id: totrans-1408
  prefs: []
  type: TYPE_NORMAL
  zh: 集成终端将出现在 VS Code 窗口的底部。
- en: 'Installing Python libraries :'
  id: totrans-1409
  prefs: []
  type: TYPE_NORMAL
  zh: 安装 Python 库：
- en: 'Use pip, the Python package manager, to install additional libraries. For example,
    to install the numpy library, type the following command in the terminal:'
  id: totrans-1410
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 pip，Python 软件包管理器，安装额外的库。例如，要安装 numpy 库，请在终端中键入以下命令：
- en: pip install numpy
  id: totrans-1411
  prefs: []
  type: TYPE_NORMAL
  zh: pip install numpy
- en: 'You can install several libraries with a single command:'
  id: totrans-1412
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用单个命令安装多个库：
- en: pip install pandas matplotlib scikit-learn
  id: totrans-1413
  prefs: []
  type: TYPE_NORMAL
  zh: pip install pandas matplotlib scikit-learn
- en: 'Installation check :'
  id: totrans-1414
  prefs: []
  type: TYPE_NORMAL
  zh: 安装检查：
- en: 'Once you''ve installed the libraries, you can import them into your Python
    code to check that they''re working properly:'
  id: totrans-1415
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦安装了库，您可以将它们导入到您的 Python 代码中，以检查它们是否正常工作：
- en: import numpy as np
  id: totrans-1416
  prefs: []
  type: TYPE_NORMAL
  zh: import numpy as np
- en: import pandas as pd
  id: totrans-1417
  prefs: []
  type: TYPE_NORMAL
  zh: import pandas as pd
- en: import matplotlib.pyplot as plt
  id: totrans-1418
  prefs: []
  type: TYPE_NORMAL
  zh: import matplotlib.pyplot as plt
- en: print("Libraries successfully installed!")
  id: totrans-1419
  prefs: []
  type: TYPE_NORMAL
  zh: print("Libraries successfully installed!")
- en: Visual Studio Code is a powerful, free tool that facilitates the development
    of Python programs for algorithmic trading. It's easy to install, and offers easy
    integration with Python thanks to its dedicated extension. You can edit, run and
    debug your programs directly in the editor, and use the integrated terminal to
    install additional libraries. In the following chapters, we'll look at how you
    can use these tools to develop trading strategies and analyze the financial markets.
  id: totrans-1420
  prefs: []
  type: TYPE_NORMAL
  zh: Visual Studio Code是一个强大的、免费的工具，它简化了用于算法交易的Python程序的开发。它易于安装，并因其专用的扩展而易于与Python集成。您可以直接在编辑器中编辑、运行和调试您的程序，并使用集成终端安装额外的库。在接下来的章节中，我们将探讨如何使用这些工具开发交易策略和分析金融市场。
- en: Choice of Trading Platform (Crypto or Traditional Exchange)
  id: totrans-1421
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 交易平台的选择（加密货币或传统交易所）
- en: '![](images/image-LH2LKMSP.png)'
  id: totrans-1422
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-LH2LKMSP.png)'
- en: Introduction
  id: totrans-1423
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简介
- en: Choosing the right trading platform is a crucial step for anyone wishing to
    get into algorithmic trading, whether on traditional or cryptocurrency markets.
    It's essential to select a platform that offers a robust and reliable API to automate
    trading strategies, access real-time market data, and execute trades efficiently.
    In this chapter, we'll take a look at the main trading platforms for the traditional
    exchange and for cryptocurrencies, as well as the CCXT tool, which facilitates
    integration with many cryptocurrency exchanges.
  id: totrans-1424
  prefs: []
  type: TYPE_NORMAL
  zh: 选择正确的交易平台对于希望进入算法交易的人来说是一个关键步骤，无论是在传统市场还是加密货币市场。选择一个提供强大且可靠的API以自动化交易策略、访问实时市场数据和高效执行交易的平台至关重要。在本章中，我们将探讨传统交易所和加密货币交易所的主要交易平台，以及CCXT工具，它有助于与许多加密货币交易所的集成。
- en: Stockbroker platforms with API
  id: totrans-1425
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 具有API的股票经纪平台
