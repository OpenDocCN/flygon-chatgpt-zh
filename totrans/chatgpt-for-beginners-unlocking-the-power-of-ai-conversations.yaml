    ****a**nd** ****mit**igat**e ****t**he** ****disr**uptio**n ****ca**use**d ****b**y**
    ****t**he** ****la**ck** ****o**f** ****me**mor**y.'
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: '****通过理解这种限制，你可以更有效地规划交互，并减轻由于缺乏记忆而造成的破坏。'
