  zh: '**主要两位创始人**向公众**阐述**该项目以**安全**AI**开发为目标，他们是**Sam Altman**和**Elon Musk**。**Musk**在**该项目**初期**高度**参与（**2016年**向公司**捐赠**了**1000万美元**），但在**2018年**离开了**董事会**。**虽然**他**离开**的具体**原因**并不**完全**清楚，**Musk**已经**明确**表示，他不**认为**OpenAI**的**其余**团队**致力于**确保**他们**设计的**机器**是**“安全”**的。**另一个**官方**声明**为**Musk**所**提出**的原因**是**角色**重叠，**Musk**在**OpenAI**和**其**在**机器学习**领域的**主要**竞争对手**Tesla**中**扮演**的角色。**尽管**他们**失去了**Musk**，**以及**与他**一起**的**大部分**资金，**OpenAI**并没有**仅仅**存活下来，而是**开始**蓬勃发展。'
