  prefs: []
  type: TYPE_NORMAL
  zh: '**2023年**发布的**GPT-4**将**生成式人工智能**提升到了**新的高度**。**不仅**这个模型**更大**、**更强大**，**而且**它还整合了**改进**，增强了**推理**和**处理复杂语境**的能力。**GPT-4**引入了**多模态**功能，这意味着它不仅**理解和生成**文本，**还能**解释图像，**扩展**了其在**设计**、**医学**和**科学研究**等领域的**实用性**。**GPT-4**的发布，**OpenAI**还**提高了**模型**拒绝**不适当请求的能力，**展示了**在**处理道德和安全**问题方面的**进步**。'
