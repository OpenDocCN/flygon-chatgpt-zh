  id: totrans-1131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE173]'
- en: '**DESCRIBING A PANDAS DATAFRAME**'
  id: totrans-1132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**描述 Pandas DataFrame**'
