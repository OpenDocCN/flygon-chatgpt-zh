- en: Notice that the langchain_community and langchain_core packages are also included
    in the .txt file above.
  id: totrans-1613
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，langchain_community 和 langchain_core 包也包含在上面的 .txt 文件中。
- en: Streamlit Cloud uses uv instead of pip to install packages, and uv doesn’t automatically
    install the extra packages when you install langchain, so you need to specify
    them.
  id: totrans-1614
  prefs: []
  type: TYPE_NORMAL
  zh: Streamlit Cloud 使用 uv 而不是 pip 来安装包，uv 在你安装 langchain 时不会自动安装额外的包，因此你需要指定它们。
- en: Creating a GitHub Repository
  id: totrans-1615
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建 GitHub 仓库
- en: Deploying a Streamlit application requires you to upload your code to GitHub.
    GitHub is a platform that you can use to host and share your software project.
  id: totrans-1616
  prefs: []
  type: TYPE_NORMAL
  zh: 部署 Streamlit 应用程序需要你将代码上传到 GitHub。GitHub 是一个你可以用来托管和分享你的软件项目的平台。
- en: Head over to [https://github.com](https://github.com) and login or register
    for a new account if you don’t have one already.
  id: totrans-1617
  prefs: []
  type: TYPE_NORMAL
  zh: 前往 [https://github.com](https://github.com) 并登录或注册一个新账户（如果你还没有的话）。
- en: 'From the dashboard, create a new repository by clicking + New on the left sidebar,
    or the + sign on the right side of the navigation bar:'
  id: totrans-1618
  prefs: []
  type: TYPE_NORMAL
  zh: 从仪表板，通过点击左侧侧边栏的“+ 新建”或导航栏右侧的“+”号来创建一个新的仓库：
- en: '![15 github new repository](image_rsrc1ZX.jpg)'
  id: totrans-1619
  prefs: []
  type: TYPE_IMG
  zh: '![15 github new repository](image_rsrc1ZX.jpg)'
- en: Figure 53\. Two Ways To Create a Repository in GitHub
  id: totrans-1620
  prefs: []
  type: TYPE_NORMAL
  zh: 图 53\. 在 GitHub 中创建仓库的两种方式
- en: A repository (or repo) is a storage space used to store software project files.
  id: totrans-1621
  prefs: []
  type: TYPE_NORMAL
  zh: 仓库（或repo）是一个用于存储软件项目文件的存储空间。
- en: 'In the Create a Repository page, fill in the details of your project. The only
    required detail is the repository name:'
  id: totrans-1622
  prefs: []
  type: TYPE_NORMAL
  zh: 在“创建仓库”页面，填写你项目的详细信息。唯一必需的详细信息是仓库名称：
- en: '![15 lc yt repo](image_rsrc1ZY.jpg)'
  id: totrans-1623
  prefs: []
  type: TYPE_IMG
  zh: '![15 lc yt repo](image_rsrc1ZY.jpg)'
- en: Figure 54\. Create a GitHub Repository
  id: totrans-1624
  prefs: []
  type: TYPE_NORMAL
  zh: 图 54\. 创建 GitHub 仓库
- en: You can make the repository public if you want this project as a part of your
    portfolio, or you can make it private.
  id: totrans-1625
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你希望这个项目成为你作品集的一部分，你可以将其设为公开，或者你可以将其设为私有。
- en: Once a new repo is created, you will be given instructions on how to push your
    files into the repository.
  id: totrans-1626
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦创建了一个新的仓库，你将收到如何将文件推送到仓库中的说明。
- en: 'You need to follow the instructions for pushing an existing repo:'
  id: totrans-1627
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要遵循推送现有仓库的说明：
- en: '![15 git push instructions](image_rsrc1ZZ.jpg)'
  id: totrans-1628
  prefs: []
  type: TYPE_IMG
  zh: '![15 git push instructions](image_rsrc1ZZ.jpg)'
- en: Figure 55\. Git Push Instructions
  id: totrans-1629
  prefs: []
  type: TYPE_NORMAL
  zh: 图 55\. Git 推送说明
- en: 'Now you need to create a repository for your project. Open the command line
    on the project folder, then run the git init command:'
  id: totrans-1630
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你需要为你的项目创建一个仓库。在项目文件夹中打开命令行，然后运行 git init 命令：
- en: git init
  id: totrans-1631
  prefs: []
  type: TYPE_NORMAL
  zh: git init
- en: 'This will turn your project into a local repository. Add all project files
    into this local repo by running the git add . command:'
  id: totrans-1632
  prefs: []
  type: TYPE_NORMAL
  zh: 这将使你的项目成为一个本地仓库。通过运行 git add . 命令将所有项目文件添加到这个本地仓库中：
- en: git add .
  id: totrans-1633
  prefs: []
  type: TYPE_NORMAL
  zh: git add .
- en: 'Changes added to the repo aren’t permanent until you run the git commit command.
    Commit the changes as shown below:'
  id: totrans-1634
  prefs: []
  type: TYPE_NORMAL
  zh: 添加到仓库中的更改在你运行 git commit 命令之前不会是永久的。按照以下方式提交更改：
- en: git commit -m 'Ready for Deployment'
  id: totrans-1635
  prefs: []
  type: TYPE_NORMAL
  zh: git commit -m 'Ready for Deployment'
- en: The -m option is used to add a message for the commit. Usually, you summarize
    the changes committed to the repository as the message.
  id: totrans-1636
  prefs: []
  type: TYPE_NORMAL
  zh: -m 选项用于为提交添加消息。通常，你将提交到仓库中的更改总结为消息。
- en: 'Now you need to push this existing repository to GitHub. You can do so by following
    the GitHub instructions:'
  id: totrans-1637
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你需要将这个现有仓库推送到 GitHub。你可以通过遵循 GitHub 指示来完成此操作：
- en: git remote add origin <URL>
  id: totrans-1638
  prefs: []
  type: TYPE_NORMAL
  zh: git remote add origin <URL>
- en: git branch -M main
  id: totrans-1639
  prefs: []
  type: TYPE_NORMAL
  zh: git branch -M main
- en: git push -u origin main
  id: totrans-1640
  prefs: []
  type: TYPE_NORMAL
  zh: git push -u origin main
- en: You might be asked to enter your GitHub username and password when running the
    git push command.
  id: totrans-1641
  prefs: []
  type: TYPE_NORMAL
  zh: 当运行 git push 命令时，你可能需要输入你的 GitHub 用户名和密码。
- en: Once the push is complete, refresh the GitHub repo page on the browser, and
    you should see your project files and folders there.
  id: totrans-1642
  prefs: []
  type: TYPE_NORMAL
  zh: 推送完成后，在浏览器中刷新GitHub仓库页面，您应该在那里看到您的项目文件和文件夹。
- en: This means our application is already pushed (uploaded) to a remote repository
    hosted on GitHub.
  id: totrans-1643
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们的应用程序已经推送到GitHub上托管的远程仓库。
- en: The remote server where we’re going to deploy our application can fetch the
    code from this repository.
  id: totrans-1644
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要部署应用程序的远程服务器可以从这个仓库获取代码。
- en: You can check my GitHub repo at [https://github.com/nathansebhastian/langchain-ask-youtube](https://github.com/nathansebhastian/langchain-ask-youtube)
  id: totrans-1645
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在我的GitHub仓库[https://github.com/nathansebhastian/langchain-ask-youtube](https://github.com/nathansebhastian/langchain-ask-youtube)查看。
- en: Deploying to Streamlit
  id: totrans-1646
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 部署到Streamlit
- en: 'The application is now ready for deployment. There are two ways you can deploy
    to Streamlit:'
  id: totrans-1647
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序现在已准备好部署。有两种方法可以将应用程序部署到Streamlit：
- en: From Streamlit website at [https://share.streamlit.io](https://share.streamlit.io)
  id: totrans-1648
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从Streamlit网站[https://share.streamlit.io](https://share.streamlit.io)
- en: From the localhost with the streamlit run command
  id: totrans-1649
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用streamlit run命令从本地主机
- en: I’m going to show you the first way, then continue with the second way.
  id: totrans-1650
  prefs: []
  type: TYPE_NORMAL
  zh: 我将向您展示第一种方法，然后继续介绍第二种方法。
- en: 'You need to access Streamlit’s Community Cloud at [https://share.streamlit.io](https://share.streamlit.io)
    and register for an account:'
  id: totrans-1651
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要访问Streamlit的社区云[https://share.streamlit.io](https://share.streamlit.io)并注册一个账户：
- en: '![15 streamlit share page](image_rsrc200.jpg)'
  id: totrans-1652
  prefs: []
  type: TYPE_IMG
  zh: '![15 streamlit share page](image_rsrc200.jpg)'
- en: Figure 56\. Streamlit Share Homepage
  id: totrans-1653
  prefs: []
  type: TYPE_NORMAL
  zh: 图56. Streamlit 分享主页
- en: 'After you create an account, you will be directed to a workspace. Click the
    ''Create app'' link at the top-right corner:'
  id: totrans-1654
  prefs: []
  type: TYPE_NORMAL
  zh: 创建账户后，您将被引导到一个工作空间。点击右上角的“创建应用程序”链接：
- en: '![15 st create app](image_rsrc201.jpg)'
  id: totrans-1655
  prefs: []
  type: TYPE_IMG
  zh: '![15 st create app](image_rsrc201.jpg)'
- en: Figure 57\. Streamlit 'Create app' Link
  id: totrans-1656
  prefs: []
  type: TYPE_NORMAL
  zh: 图57. Streamlit “创建应用程序”链接
- en: 'Streamlit will then ask to connect to Github. Click the ''Connect to GitHub''
    button as shown below:'
  id: totrans-1657
  prefs: []
  type: TYPE_NORMAL
  zh: Streamlit将要求连接到GitHub。点击下面的“连接到GitHub”按钮：
- en: '![15 st connect gh](image_rsrc202.jpg)'
  id: totrans-1658
  prefs: []
  type: TYPE_IMG
  zh: '![15 st connect gh](image_rsrc202.jpg)'
- en: Figure 58\. Streamlit Connect to GitHub
  id: totrans-1659
  prefs: []
  type: TYPE_NORMAL
  zh: 图58. Streamlit 连接到GitHub
- en: Then authorize Streamlit to access your GitHub repository.
  id: totrans-1660
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，授权Streamlit访问您的GitHub仓库。
- en: 'On the next screen, select ''I have an app'' as shown below:'
  id: totrans-1661
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一屏幕上，选择“我有应用程序”如下所示：
- en: '![15 st gh](image_rsrc203.jpg)'
  id: totrans-1662
  prefs: []
  type: TYPE_IMG
  zh: '![15 st gh](image_rsrc203.jpg)'
- en: Figure 59\. Streamlit Deploy Existing Application
  id: totrans-1663
  prefs: []
  type: TYPE_NORMAL
  zh: 图59. Streamlit 部署现有应用程序
- en: Next, you need to fill in the details of your application on the Deploy page.
  id: totrans-1664
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您需要在部署页面填写您应用程序的详细信息。
- en: Add the code repository you’ve created in the previous section, then set the
    Branch, Main file path, and App URL.
  id: totrans-1665
  prefs: []
  type: TYPE_NORMAL
  zh: 添加您在上一节中创建的代码仓库，然后设置分支、主文件路径和应用程序URL。
- en: 'You can customize the App URL to make it shorter. Use my input below as a reference:'
  id: totrans-1666
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以自定义应用程序URL以使其更短。以下是我的输入作为参考：
- en: '![15 st deploy page](image_rsrc204.jpg)'
  id: totrans-1667
  prefs: []
  type: TYPE_IMG
  zh: '![15 st deploy page](image_rsrc204.jpg)'
- en: Figure 60\. Streamlit Deploy Page
  id: totrans-1668
  prefs: []
  type: TYPE_NORMAL
  zh: 图60. Streamlit 部署页面
- en: Once you’re finished, click 'Deploy' so that Streamlit will fetch the code from
    GitHub and deploy it to their community cloud server.
  id: totrans-1669
  prefs: []
  type: TYPE_NORMAL
  zh: 完成后，点击“部署”，以便Streamlit从GitHub获取代码并将其部署到他们的社区云服务器。
- en: Once done, you can access the application from a generated streamlit.app URL.
  id: totrans-1670
  prefs: []
  type: TYPE_NORMAL
  zh: 完成后，您可以通过生成的streamlit.app URL访问应用程序。
- en: You can check my deployment at [https://nsebhastian-lc-ask-youtube.streamlit.app](https://nsebhastian-lc-ask-youtube.streamlit.app)
  id: totrans-1671
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[https://nsebhastian-lc-ask-youtube.streamlit.app](https://nsebhastian-lc-ask-youtube.streamlit.app)查看我的部署。
- en: 'The second way you can deploy to the Streamlit Cloud is by running the streamlit
    run command to run your application on localhost, then click the ''Deploy'' link
    at the top-right corner:'
  id: totrans-1672
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过运行streamlit run命令在本地主机上运行应用程序，然后点击右上角的“部署”链接来将应用程序部署到Streamlit云：
- en: '![15 streamlit run deploy](image_rsrc205.jpg)'
  id: totrans-1673
  prefs: []
  type: TYPE_IMG
  zh: '![15 streamlit run deploy](image_rsrc205.jpg)'
- en: Figure 61\. Streamlit Deploy From Localhost
  id: totrans-1674
  prefs: []
  type: TYPE_NORMAL
  zh: 图61. Streamlit 从本地主机部署
- en: 'From there, select Streamlit Cloud Community to deploy for free:'
  id: totrans-1675
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，选择Streamlit Cloud Community以免费部署：
- en: '![15 streamlit cc](image_rsrc206.jpg)'
  id: totrans-1676
  prefs: []
  type: TYPE_IMG
  zh: '![15 streamlit cc](image_rsrc206.jpg)'
- en: Figure 62\. Streamlit Select Cloud Community
  id: totrans-1677
  prefs: []
  type: TYPE_NORMAL
  zh: 图62. Streamlit Select Cloud Community
- en: You will be taken to the same Deploy page, provided that you have uploaded the
    project to a GitHub repository. Click the 'Deploy' button once you’re done.
  id: totrans-1678
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您已将项目上传到GitHub仓库，您将被带到相同的部署页面。完成后，点击“部署”按钮。
- en: Summary
  id: totrans-1679
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code changes in this chapter can be found at [https://github.com/nathansebhastian/langchain-ask-youtube](https://github.com/nathansebhastian/langchain-ask-youtube)
    which I linked before.
  id: totrans-1680
  prefs: []
  type: TYPE_NORMAL
  zh: 本章中的代码更改可以在之前链接的[https://github.com/nathansebhastian/langchain-ask-youtube](https://github.com/nathansebhastian/langchain-ask-youtube)找到。
- en: You have successfully deployed a Streamlit application to the internet. Now
    you can share your hard work with everyone. Nice work!
  id: totrans-1681
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经成功将Streamlit应用程序部署到互联网上。现在你可以与大家分享你的辛勤工作了。做得好！
- en: As you can see, deploying an AI-powered application is not so different than
    deploying a regular web application.
  id: totrans-1682
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，部署一个AI应用程序与部署一个常规网络应用程序并没有太大的区别。
- en: Because AI models are accessible using HTTP protocol, you only need to ensure
    that an API key to access the models is added to the application.
  id: totrans-1683
  prefs: []
  type: TYPE_NORMAL
  zh: 由于AI模型可以通过HTTP协议访问，你只需要确保将访问模型的API密钥添加到应用程序中。
- en: Instead of providing your own key and incurring charges from running the model,
    you can ask the users to provide their own keys for their own use.
  id: totrans-1684
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是提供自己的密钥并承担运行模型产生的费用，你可以要求用户为自己提供密钥以供个人使用。
- en: Wrapping Up
  id: totrans-1685
  prefs: []
  type: TYPE_NORMAL
  zh: 总结
- en: Congratulations on finishing this book! We’ve gone through many concepts and
    topics together to help you learn how to develop an AI-powered application using
    LangChain, Streamlit, GPT, Gemini, and Ollama.
  id: totrans-1686
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜你完成这本书！我们一起探讨了众多概念和主题，帮助你学习如何使用LangChain、Streamlit、GPT、Gemini和Ollama开发AI应用程序。
- en: You’ve also learned how to deploy the application to Streamlit Cloud Community
    so that it can be accessed from the internet.
  id: totrans-1687
  prefs: []
  type: TYPE_NORMAL
  zh: 你也已经学会了如何将应用程序部署到Streamlit Cloud Community，以便可以从互联网上访问。
- en: I hope you enjoyed learning and exploring LangChain with this book as much as
    I enjoyed writing it.
  id: totrans-1688
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你喜欢用这本书学习并探索LangChain，就像我喜欢写这本书一样。
- en: I’d like to ask you for a small favor.
  id: totrans-1689
  prefs: []
  type: TYPE_NORMAL
  zh: 我想请你帮个小忙。
- en: If you enjoyed the book, I’d be very grateful if you would leave an honest review
    on Amazon (I read all reviews coming my way)
  id: totrans-1690
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢这本书，请在亚马逊上留下一个诚实的评价（我会阅读所有向我而来的评价）
- en: Every single review counts, and your support makes a big difference.
  id: totrans-1691
  prefs: []
  type: TYPE_NORMAL
  zh: 每一条评价都很重要，你的支持意义重大。
- en: Thanks again for your kind support!
  id: totrans-1692
  prefs: []
  type: TYPE_NORMAL
  zh: 再次感谢您的慷慨支持！
- en: Until next time,
  id: totrans-1693
  prefs: []
  type: TYPE_NORMAL
  zh: 待到下次再会，
- en: Nathan
  id: totrans-1694
  prefs: []
  type: TYPE_NORMAL
  zh: Nathan
- en: About the author
  id: totrans-1695
  prefs: []
  type: TYPE_NORMAL
  zh: 关于作者
- en: Nathan Sebhastian is a senior software developer with 8+ years of experience
    in developing web and mobile applications.
  id: totrans-1696
  prefs: []
  type: TYPE_NORMAL
  zh: Nathan Sebhastian是一位拥有8年以上经验的资深软件开发者，专注于开发和构建网络和移动应用程序。
- en: He is passionate about making technology education accessible for everyone and
    has taught online since 2018.
  id: totrans-1697
  prefs: []
  type: TYPE_NORMAL
  zh: 他热衷于让每个人都能获得技术教育，并且自2018年以来一直在网上授课。
