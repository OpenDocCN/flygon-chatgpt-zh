  zh: ChatGPT 能够浏览互联网以提供“当前和权威”的信息，而不是被限制在截止知识范围内。
- en: 'Personalized Output Prompt:'
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 个性化输出提示：
- en: 'Context:'
  id: totrans-470
  prefs: []
