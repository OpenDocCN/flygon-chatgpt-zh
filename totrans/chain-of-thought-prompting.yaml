  zh: '|  | 20 | 86 | 93 | 是 |  |'
- en: '|  |'
  id: totrans-349
  prefs: []
  type: TYPE_TB
  zh: '|  |'
- en: '| Steps for Analysis |'
  id: totrans-350
  prefs: []
  type: TYPE_TB
  zh: '| 分析步骤 |'
- en: '|'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: 'Calculate Average Improvement: For each group (Yes, No), calculate the average
    difference between pre- and post-program grades.'
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算平均提升：对于每个组（是，否），计算程前和程后成绩之间的平均差异。
- en: 'Compare Averages: Compare the average grade improvement between HSP participants
    and non-participants to assess the program''s effectiveness.'
  id: totrans-353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 比较平均分：比较HSP参与者和非参与者之间的平均成绩提升，以评估该项目的有效性。
- en: 'Evaluate Effectiveness: Determine if the average grade improvement for HSP
    participants is significantly greater than for non-participants, suggesting a
    positive impact of the program on students'' performance.'
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 评估有效性：确定HSP参与者的平均成绩提高是否显著高于非参与者，这表明该计划对学生成绩的积极影响。
- en: '|'
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: '|'
- en: 'Solving this problem proves relatively trivial for ChatGPT 4:'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这个问题对ChatGPT 4来说相对简单：
- en: 'Chat link: [https://t.ly/FR8cQ](https://t.ly/FR8cQ)'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天链接：[https://t.ly/FR8cQ](https://t.ly/FR8cQ)
- en: '| ChatGPTThe analysis of the Homework Support Program''s effect on student
    performance in mathematics yields the following results:'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: '| ChatGPT对家庭作业支持计划对学生数学成绩的影响分析得出以下结果：'
- en: The average improvement in grades for students who participated in the Homework
    Support Program (HSP) is approximately 7.45 points.
  id: totrans-359
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参与家庭作业支持计划（HSP）的学生平均成绩提高约为7.45分。
- en: The average improvement in grades for students who did not participate in the
    HSP is approximately 2.22 points.
  id: totrans-360
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 未参与HSP的学生平均成绩提高约为2.22分。
- en: These results suggest that participation in the Homework Support Program has
    a positive impact on students' mathematics grades, with participants experiencing
    a significantly greater improvement in their grades compared to non-participants.
    This indicates the effectiveness of the HSP in enhancing students' performance
    in mathematics. |
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 这些结果表明，参与家庭作业支持计划对学生数学成绩有积极影响，参与者的成绩显著提高，与非参与者相比。这表明HSP在提高学生数学成绩方面的有效性。|
- en: In this case, ChatGPT acts as a “thinking machine”, not just as a glorified
    search engine.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，ChatGPT充当“思考机器”，而不仅仅是被美化的搜索引擎。
- en: Generative AI’s Unique Capabilities
  id: totrans-363
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成式AI的独特能力
- en: The truth is however, that AI’s ability to solve maths problems is not really
    the groundbreaking aspect of current generative AI models.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，AI解决数学问题的能力并不是当前生成式AI模型的突破性方面。
- en: Solving numerical problems is stock-standard in the programming world, and so
    although AI does add another dimension with automatic code generation and automatic
    question-analysis using NLP (natural language processing), this is not an altogether
    unprecedented capability.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 在编程世界中，解决数值问题是标准操作，因此尽管AI通过自动代码生成和自然语言处理（NLP）的自动问题分析增加了另一个维度，但这并不是一个完全前所未有的能力。
- en: Where generative AI really shines is in the realm of qualitative thought, where
    its abilities to apply human-style logical thinking to analytical problems, causal
    reasoning problems and systems thinking problems are unprecedented in the world
    of IT.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI真正发光发热的领域是定性思维领域，在那里，它将人类风格的逻辑思维应用于分析问题、因果推理问题和系统思维问题的能力在世界IT领域是前所未有的。
- en: Investigating these unique capabilities is the subject of Section II of this
    book.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 探讨这些独特能力是本书第二章的主题。
- en: Chapter 6\. Types of Soft Problems
  id: totrans-368
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第六章\. 软问题的类型
- en: 'It is difficult to categorise soft problems according to their essential nature,
    since by definition soft problems are not well defined. However, we can categorise
    soft problems according to the way we deal with them:'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 根据其本质性质对软问题进行分类是困难的，因为根据定义，软问题并不明确。然而，我们可以根据我们处理它们的方式对软问题进行分类：
- en: 'Soft Problems that Require a Logical Approach:  Types of soft problems that
    require a logical approach include significant life decisions, goal setting, developing
    relationships and adapting to change. All these problems require a structured
    thinking approach to find the best approach and the best way to progress the situation.'
  id: totrans-370
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要逻辑方法的软问题：需要逻辑方法的软问题类型包括重大的生活决策、目标设定、关系发展和适应变化。所有这些问题都需要结构化思考方法来找到最佳途径和推进情况的最佳方式。
- en: 'Soft Problems that Require an Emotional Approach: Many of the situations and
    challenges we are faced with require an emotional approach, involving empathy,
    understanding, warmth and emotional intelligence.'
  id: totrans-371
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要情感方法的软问题：我们面临的大多数情况和挑战都需要情感方法，涉及同理心、理解、温暖和情商。
- en: For example,  an emotional approach is needed in developing relationships, achieving
    personal growth and attaining inner peace and harmony.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在建立关系、实现个人成长和达到内心平和与和谐时，需要情感方法。
- en: 'Soft Problems that Require a Control Approach:  This category includes scenarios
    where exerting direction, guidance, and management over one''s own behaviour or
    other people’s behaviour is the best way of dealing with the situation.'
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要控制方法的软问题：这一类别包括那些通过施加方向、指导和控制自己的行为或他人的行为来处理情况的最佳方式。
- en: This approach may be needed to achieve goals, maintain order, and ensuring personal
    and professional integrity.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法可能需要实现目标、维持秩序和确保个人和职业诚信。
- en: Identifying the type of soft problem we are faced with is crucial to crafting
    a suitable response. For example, adopting a “control” approach to a situation
    which requires an emotional response is a recipe for disaster, and vice-versa.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 确定我们面临的是哪种软问题对于制定合适的反应至关重要。例如，对需要情感反应的情况采取“控制”方法是一种灾难性的做法，反之亦然。
- en: Identifying and applying the correct way for an AI to solve soft problems is
    discussed in Section V, Section VI and Section VII of this book.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的第V、第VI和第VII节中讨论了如何为AI解决软问题找到正确的方法。
- en: Chapter 7\. Using AI to Identify Problem Types
  id: totrans-377
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第7章\. 使用AI识别问题类型
- en: The first step in using Chain of Thought Prompting for solving real-world problems
    is to identify the type of problem with which we are dealing. Once we have done
    this, we can guide the AI in selecting the right problem-solving approach.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 使用思维链提示解决现实世界问题的第一步是确定我们正在处理的问题类型。一旦我们做到了这一点，我们就可以引导AI选择正确的解决问题的方法。
- en: Humans tend to be better than AI at problem-type identification, due to their
    awareness of the contexts in which problems occur, and their understanding of
    subtle details which may not be easily explained to an AI in writing. Therefore
    it may be necessary for the user to guide the AI in understanding the problem
    type and subsequently the best type of thinking to apply in order for the AI to
    achieve the optimal outcome.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 由于人类对其发生问题的背景的了解以及他们对可能难以用文字向AI解释的微妙细节的理解，人类往往比AI在问题类型识别方面做得更好。因此，可能需要用户引导AI理解问题类型以及随后应用的最佳思维方式，以便AI实现最佳结果。
- en: However, advanced AI models, such as ChatGPT 4, do have the capacity to identify
    the correct problem-solving approach for specific problems, however.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，像ChatGPT 4这样的高级AI模型确实有能力为特定问题识别正确的解决问题的方法。
- en: A Day in the Life of a Robot
  id: totrans-381
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器人的一天
- en: Imagine a domestic help robot that is having a challenging day, in addition
    to its normal duties, it has to deal with the following issues.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，一个家庭服务机器人正经历着艰难的一天，除了它正常的职责外，它还必须处理以下问题。
- en: 'Unexpected Messes: The robot encounters spills and sudden messes that were
    not part of its initial cleaning schedule.'
  id: totrans-383
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 意外的混乱：机器人遇到了其初始清洁计划中未包含的溢出和突然的混乱。
- en: 'Dynamic Obstacles: The robot has to navigate around pets, children and temporary
    obstacles that are not usually present.'
  id: totrans-384
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 动态障碍：机器人必须绕过宠物、儿童和通常不存在的临时障碍物。
- en: 'Wear and Tear: The robot experiences mechanical issues or software glitches
    due to regular use, these require diagnostics and maintenance.'
  id: totrans-385
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 磨损：机器人由于常规使用而出现机械问题或软件故障，这些需要诊断和维护。
- en: 'Power Management: The robot has to manage its battery life to complete all
    tasks without running out of power at inconvenient times or locations.'
  id: totrans-386
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 功率管理：机器人必须管理其电池寿命，以完成所有任务，而不会在不方便的时间或地点耗尽电量。
- en: 'Adapting to Changes: The robot has to adjust to new furniture arrangements,
    renovations, or other changes to the physical layout of the home.'
  id: totrans-387
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 适应变化：机器人必须适应新的家具布局、翻新或其他对家庭物理布局的更改。
- en: 'Complex Instructions: The robot has to interpret and execute complex or vague
    instructions from humans, which might not always be straightforward or within
    its programmed capabilities.'
  id: totrans-388
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 复杂指令：机器人必须解释和执行来自人类的复杂或含糊不清的指令，这些指令可能并不总是直接或在其编程能力范围内。
- en: 'Safety Concerns: The robot has to ensure the safety of all household members,
    especially children and pets.'
  id: totrans-389
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安全问题：机器人必须确保所有家庭成员的安全，特别是儿童和宠物。
- en: 'Privacy Issues: The robot has to navigate the need for privacy with the requirement
    to perform its tasks, especially in areas like bathrooms or bedrooms.'
  id: totrans-390
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐私问题：机器人必须平衡执行任务的需求与对隐私的需求，尤其是在浴室或卧室等区域。
- en: 'Communication Challenges: The robot has to communicate with household members,
    understanding their needs, and conveying information or asking for clarification.'
  id: totrans-391
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 沟通挑战：机器人需要与家庭成员沟通，理解他们的需求，传达信息或请求澄清。
- en: 'Decision Making: The robot has to make judgment calls in unexpected situations,
    like whether to interrupt a sleeping household member for a critical task or how
    to prioritize conflicting commands from different family members.'
  id: totrans-392
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：机器人在意外情况下需要做出判断，例如是否打断正在睡觉的家庭成员执行紧急任务，或者如何优先处理来自不同家庭成员的冲突指令。
- en: A Problem Classification GPT
  id: totrans-393
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个问题分类GPT
- en: Using a custom GPT that is designed to classify problems according to their
    problem type (Problem Classifier GPT - [https://t.ly/GFfUg](https://t.ly/GFfUg)),
    let’s see how we can classify each of the above problems.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 使用一个专门设计的GPT，该GPT旨在根据问题类型对问题进行分类（问题分类GPT - [https://t.ly/GFfUg](https://t.ly/GFfUg)），让我们看看我们如何对上述每个问题进行分类。
- en: '| ![](image_rsrc6F9.jpg) | For further information on creating custom GPT’s,
    see Chapter 11\. The Power of Custom GPT’s. |'
  id: totrans-395
  prefs: []
  type: TYPE_TB
  zh: '| ![](image_rsrc6F9.jpg) | 有关创建自定义GPT的更多信息，请参阅第11章“自定义GPT的力量”。'
- en: 'Shared chat: [https://t.ly/dPWke](https://t.ly/dPWke)'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 共享聊天：[https://t.ly/dPWke](https://t.ly/dPWke)
- en: '| YouClassify the following problems: Imagine a domestic help robot that is
    having a difficult day.Problem ClassifierThe problems described for a domestic
    help robot involve a mix of technical (hard) and interpersonal/social (soft) challenges.
    Below is a classification of each problem along with a recommended approach for
    solving it:'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: '| 你可以将以下问题分类：想象一个家务机器人度过了一个艰难的一天。问题分类器：为家务机器人描述的问题涉及技术（难题）和人际/社会（软问题）挑战的混合。以下是每个问题的分类以及推荐的解决方案：'
- en: 'Unexpected Messes: This is a hard problem. It requires analytical methods and
    technical knowledge for the robot to dynamically adjust its cleaning schedule
    and methods. An effective approach would involve implementing machine learning
    algorithms that can adapt to unexpected changes in the environment.'
  id: totrans-398
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 意外的混乱：这是一个难题。它需要分析方法和技术知识，使机器人能够动态调整其清洁计划和方式。一种有效的方法是实施能够适应环境意外变化的机器学习算法。
- en: 'Dynamic Obstacles: This is a hard problem. Solving it involves systems thinking
    and technical enhancements to improve the robot''s navigation algorithms, enabling
    it to detect and respond to moving obstacles in real-time.'
  id: totrans-399
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 动态障碍：这是一个难题。解决它需要系统思维和技术增强，以改进机器人的导航算法，使其能够实时检测和响应移动障碍。
- en: 'Wear and Tear: This is a hard problem. It necessitates a combination of diagnostics
    for identifying issues and technical knowledge for maintenance and repairs. Predictive
    maintenance techniques could be useful here to anticipate failures before they
    occur.'
  id: totrans-400
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 磨损：这是一个难题。它需要结合诊断以识别问题和技术知识进行维护和修理。预测性维护技术在这里可能很有用，可以在故障发生之前预测它们。
- en: 'Power Management: This is a hard problem. It requires analytical methods to
    optimize task scheduling and energy consumption, ensuring the robot can complete
    its tasks efficiently without running out of power.'
  id: totrans-401
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 功率管理：这是一个难题。它需要分析方法来优化任务调度和能源消耗，确保机器人能够高效完成任务而不会耗尽电量。
- en: 'Adapting to Changes: This is a hard problem. It involves systems thinking to
    integrate sensors and machine learning algorithms capable of recognizing and adapting
    to changes in the environment, such as new furniture layouts.'
  id: totrans-402
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 适应变化：这是一个难题。它涉及系统思维，以集成能够识别和适应环境变化（如新家具布局）的传感器和机器学习算法。
- en: 'Complex Instructions: This is a soft problem with a technical aspect. It requires
    leveraging technical knowledge to improve natural language processing capabilities
    and emotional intelligence to better interpret human commands that may be vague
    or complex.'
  id: totrans-403
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 复杂指令：这是一个具有技术性的软问题。它需要利用技术知识来提高自然语言处理能力，以及情感智能来更好地解释可能模糊或复杂的指令。
- en: 'Safety Concerns: This is a soft problem. Ensuring safety involves understanding
    human behaviour and organizational understanding to prioritize tasks in a way
    that minimizes risks to household members, especially vulnerable ones.'
  id: totrans-404
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安全问题：这是一个软问题。确保安全涉及理解人类行为和组织理解，以便以最小化对家庭成员，尤其是易受伤害者的风险的方式来优先处理任务。
- en: 'Privacy Issues: This is a soft problem. It requires negotiation and emotional
    intelligence to balance the need for privacy with the requirement to perform tasks
    efficiently. Developing guidelines and settings that allow household members to
    customize the robot''s access to private areas can be a part of the solution.'
  id: totrans-405
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐私问题：这是一个软问题。它需要协商和情绪智力来平衡隐私的需求与高效完成任务的要求。制定允许家庭成员定制机器人对私人区域访问的指南和设置可能是解决方案的一部分。
- en: 'Communication Challenges: This is a soft problem. It involves emotional intelligence
    and organizational understanding to effectively communicate with household members,
    understand their needs, and seek clarification when necessary.'
  id: totrans-406
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 沟通挑战：这是一个软问题。它涉及到情绪智力和组织理解，以便有效地与家庭成员沟通，了解他们的需求，并在必要时寻求澄清。
- en: 'Decision Making: This is a soft problem with a technical aspect. While it involves
    judgment calls that require emotional intelligence to assess the impact of actions
    on household members, it also needs analytical methods to prioritize tasks based
    on an understanding of the household''s dynamics and preferences.'
  id: totrans-407
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 决策：这是一个具有技术方面的软问题。虽然它涉及到需要情绪智力来评估行动对家庭成员影响的判断，但它还需要基于对家庭动态和偏好的理解来优先处理任务的分析方法。
- en: For hard problems, focusing on enhancing the robot's technical capabilities
    through machine learning, predictive analytics, and advanced diagnostics is key.
    For soft problems, developing emotional intelligence, effective communication
    strategies, and an understanding of household dynamics are crucial. Implementing
    user-customizable settings and privacy controls can also help address soft problems
    related to privacy and personal preferences. |
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 对于硬问题，通过机器学习、预测分析和高级诊断来增强机器人的技术能力是关键。对于软问题，发展情绪智力、有效的沟通策略和对家庭动态的理解至关重要。实施用户可定制的设置和隐私控制也有助于解决与隐私和个人偏好相关的软问题。
- en: The custom GPT is able to accurately identify the type of problem faced by the
    robot in each situation. In practice this would mean that the robot’s processing
    centre would then be able to route the problem through the type of processing
    best suited for that problem type.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 定制的GPT能够准确识别机器人在每种情况下面临的问题类型。在实践中，这意味着机器人的处理中心将能够根据该问题类型最适合的处理方式来路由问题。
- en: The ability to initially identify what the actual problem type is, is a essential
    precursor for a general purpose AI, such as may be found in a domestic help robot,
    to accurately and efficiently address the problem at hand.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 能够最初识别实际问题的类型，对于通用人工智能，例如可能在家庭服务机器人中找到的人工智能，准确高效地解决手头的问题是一个必要的先决条件。
- en: '![](image_rsrc6FH.jpg)'
  id: totrans-411
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc6FH.jpg)'
- en: After breakfast, by ChatGPT
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 早餐后，通过ChatGPT
- en: Chapter 8\. Framing Problems
  id: totrans-413
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第8章。问题框架
- en: Real-World Problems
  id: totrans-414
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 现实世界问题
- en: In the previous chapter, we discussed classifying the type of a particular problem.
    However in reality, complex real-world hard problems can be viewed and assessed
    from different perspectives.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一章中，我们讨论了分类特定问题的类型。然而，在现实中，复杂的现实世界难题可以从不同的角度来观察和评估。
- en: Therefore, when we want to solve real-world problems, we first of all have to
    decide the type of problem we will consider the problem as, and then choose the
    right problem-solving method. We can describe this process as framing the problem
    as a particular problem type.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当我们想要解决现实世界的问题时，我们首先必须决定我们将如何将问题分类，然后选择正确的问题解决方法。我们可以将这个过程描述为将问题框架化为特定的问题类型。
- en: Reducing Energy Consumption
  id: totrans-417
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 减少能耗
- en: 'As an example of the above idea, we can view the problem of reducing energy
    consumption in a manufacturing plant in several ways:'
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 作为上述想法的一个例子，我们可以从几个方面来看待在制造工厂中减少能耗的问题：
- en: 'Analytical Problem: In this case the focus is on analysing energy usage by
    machinery, shifts, and processes, to identify patterns of high usage and target
    them for improvement.'
  id: totrans-419
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分析问题：在这种情况下，重点是分析机器、班次和流程的能源使用，以识别高使用模式的模式，并针对它们进行改进。
- en: 'Causal Reasoning: Assessing the problem with causal reasoning methods requires
    identifying the factors that lead to high energy consumption and how they are
    interlinked.'
  id: totrans-420
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 因果推理：评估因果推理方法的问题需要确定导致高能耗的因素以及它们是如何相互关联的。
- en: 'Quantitative Challenge: Framed as a quantitative challenge, reducing energy
    consumption in a manufacturing plant involves a statistical analysis of historical
    energy-consumption data, forecasting energy consumption trends, modelling the
    impact of potential interventions and quantifying the expected savings from suggested
    changes.'
  id: totrans-421
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定量挑战：将问题表述为定量挑战，在制造工厂中减少能源消耗涉及对历史能源消耗数据的统计分析，预测能源消耗趋势，模拟潜在干预措施的影响，并量化建议更改的预期节省。
- en: 'Systems Thinking: A systems thinking perspective requires considering how different
    elements of the manufacturing plant interact and influence each other, including
    human behaviour, operational processes and external factors like weather conditions.'
  id: totrans-422
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 系统思维：系统思维视角需要考虑制造工厂中不同元素如何相互作用和影响彼此，包括人类行为、运营流程以及像天气条件这样的外部因素。
- en: 'Technical Problem: Framing the issue as a technical problem focuses on the
    specific technological aspects that contribute to high energy consumption. This
    might involve identifying outdated or inefficient machinery that needs upgrading
    or replacement.'
  id: totrans-423
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 技术问题：将问题表述为技术问题，关注导致高能源消耗的具体技术方面。这可能涉及识别需要升级或更换的过时或低效的设备。
- en: Each of these ways of casting the original problem highlights different facets
    of the same underlying issue—reducing energy consumption—but guides the problem-solving
    process in a slightly different direction.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 这些将原始问题的方式都突出了同一根本问题的不同方面——减少能源消耗，但指导问题解决过程的方向略有不同。
- en: In reality, it would be possible to apply all these methods and combine their
    conclusions. This would guarantee addressing all aspects of the original problem
    and reaching the optimal conclusion.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，可以应用所有这些方法并将它们的结论结合起来。这将确保解决原始问题的所有方面并得出最佳结论。
- en: Framing Hard Problems using AI
  id: totrans-426
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用人工智能构建难题框架
- en: Because AI models such as ChatGPT 4 are trained on a wide range of problem-solving
    scenarios, they are capable of determining how to best consider a problem with
    a high degree of relevance.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 由于ChatGPT 4等人工智能模型在广泛的解决问题场景上进行训练，它们能够以高度的相关性确定如何最佳地考虑问题。
- en: The AI does this by recognising patterns in the question being asked, and then
    looking for analogous patterns in real-world problems that were successfully addressed
    using a particular problem solving approach.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能通过识别被提出的问题中的模式，然后在现实世界中寻找使用特定问题解决方法成功解决的类似模式来实现这一点。
- en: The following examples show how AI can categorise real-world problems as a particular
    problem-type. The examples use a GPT specifically designed for problem-type categorisation
    - Problem Solver Insight ([https://t.ly/5uwg2](https://t.ly/5uwg2)).
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例展示了人工智能如何将现实世界中的问题分类为特定的问题类型。这些示例使用的是专门为问题类型分类设计的GPT - 问题解决洞察([https://t.ly/5uwg2](https://t.ly/5uwg2))。
- en: '| ![](image_rsrc6FJ.jpg) The [Problem Classifier GPT](https://t.ly/GFfUg) used
    in the previous chapter classifies problems as a specific problem type. The [Problem
    Solver Insight GPT](https://t.ly/5uwg2), however, considers various ways in which
    a problem can be assessed and then decides on the optimal approach. |'
  id: totrans-430
  prefs: []
  type: TYPE_TB
  zh: '| ![图片](image_rsrc6FJ.jpg) 在上一章中使用的[问题分类器GPT](https://t.ly/GFfUg)将问题分类为特定的问题类型。然而，[问题解决洞察GPT](https://t.ly/5uwg2)考虑了评估问题的各种方式，然后决定最佳方法。|'
- en: A Call-centre Wait Time Problem
  id: totrans-431
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 呼叫中心等待时间问题
- en: 'As an example of using AI to frame a real-world problem in the optimal manner,
    let’s consider the following call-centre wait time problem:'
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 作为使用人工智能以最佳方式构建现实世界问题的示例，让我们考虑以下呼叫中心等待时间问题：
- en: Problem Statement
  id: totrans-433
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题陈述
- en: During both peak and off-peak periods, the typical wait time for callers to
    Acme Corporation's customer support exceeds five minutes. This situation stems
    from insufficient staffing levels, leading to customer service agents being overstretched.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 在高峰期和非高峰期，呼叫者等待Acme公司客户支持的平均等待时间超过五分钟。这种情况源于人员配备不足，导致客户服务代表过度劳累。
- en: Background
  id: totrans-435
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 背景
- en: Acme Corporation is grappling with prolonged customer support hold times, marking
    a departure from its historical reputation for prompt and efficient service. Factors
    like inadequate staffing and surging demand from customers have contributed to
    consistently long wait times, causing customer dissatisfaction and eroding loyalty,
    which in turn tarnishes Acme's brand reputation.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: Acme公司正面临客户支持长时间等待的问题，这与公司历史上以快速高效服务著称的形象相悖。人员不足和客户需求激增等因素导致持续的长等待时间，造成客户不满和忠诚度下降，进而损害Acme的品牌声誉。
- en: Relevance
  id: totrans-437
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 相关性
- en: It is imperative for Acme Corporation to tackle the issue of extended wait times
    for support calls. These delays negatively affect customer contentment and allegiance,
    risking increased customer turnover and revenue loss. Moreover, a declining service
    reputation could have enduring effects on Acme's market competitiveness. Promptly
    addressing this issue is crucial to enhance the customer experience and uphold
    a strong brand image.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Acme公司来说，解决客户支持电话长时间等待的问题至关重要。这些延误会负面影响客户满意度和忠诚度，增加客户流失和收入损失的风险。此外，服务声誉的下降可能会对Acme的市场竞争力产生长期影响。及时解决这个问题对于提升客户体验和保持强大的品牌形象至关重要。
- en: Objectives
  id: totrans-439
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 目标
- en: 'The main goal of this initiative is to shorten the wait times for Acme Corporation''s
    customer support callers. To achieve this, the project will:'
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 本项倡议的主要目标是缩短Acme公司客户支持电话的等待时间。为了实现这一目标，项目将：
- en: Examine the existing customer support operations to identify inefficiencies
    causing extended wait times.
  id: totrans-441
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检查现有的客户支持运营，以确定导致长时间等待的低效率。
- en: Evaluate staffing and resource distribution to quantify the impact of staffing
    shortages on service quality.
  id: totrans-442
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 评估人员配置和资源分配，以量化人员短缺对服务质量的影响。
- en: Implement strategies to refine the customer support process and decrease wait
    times.
  id: totrans-443
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实施策略以优化客户支持流程并减少等待时间。
- en: Utilize key performance indicators (KPIs) such as average wait time, customer
    satisfaction scores, and direct feedback to gauge the success of the improvements
    made.
  id: totrans-444
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利用关键绩效指标（KPIs）如平均等待时间、客户满意度评分和直接反馈来衡量所做改进的成功程度。
- en: Develop a long-term plan to ensure consistently short wait times, considering
    both high and low demand periods, through strategic staffing, ongoing training,
    and process optimization.
  id: totrans-445
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制定长期计划，通过战略人员配置、持续培训和流程优化，确保在高峰和低谷需求期间都能保持较短的等待时间。
- en: The Problem Solver Insight GPT recommended a systems analysis approach for this
    problem.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 问题解决洞察GPT推荐采用系统分析方法来解决这个问题。
- en: 'Shared chat: [https://t.ly/PXzQc](https://t.ly/PXzQc)'
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 共享聊天：[https://t.ly/PXzQc](https://t.ly/PXzQc)
- en: '| Problem Solver InsightTo effectively address the problem of extended wait
    times for callers to Acme Corporation''s customer support, the recommended approach
    is a systems analysis approach. Here’s why this approach is most suitable and
    how it aligns with the objectives you''ve outlined:Rationale for Systems Analysis
    Approach'
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: '| 问题解决洞察为了有效解决Acme公司客户支持电话长时间等待的问题，建议采用系统分析方法。以下是为什么这种方法最合适以及它如何与您概述的目标相一致的原因：系统分析方法的理由'
- en: 'Holistic Examination of Operations: Systems analysis allows for a comprehensive
    examination of the existing customer support operations. It goes beyond looking
    at surface-level symptoms (long wait times) to understand the underlying causes
    (staffing levels, process inefficiencies, demand surges). This aligns with your
    first objective of identifying inefficiencies within the support operations.'
  id: totrans-449
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对运营的全面审查：系统分析允许对现有的客户支持运营进行全面的审查。它不仅关注表面症状（长等待时间），还旨在了解潜在原因（人员配置水平、流程低效率、需求激增）。这与您第一个目标——识别支持运营中的低效率相一致。
- en: 'Quantitative and Qualitative Evaluation: This approach facilitates both quantitative
    (e.g., staffing levels, call volume) and qualitative (e.g., process flow, customer
    satisfaction) analyses. It matches your second objective, which involves evaluating
    staffing and resource distribution to understand their impact on service quality.'
  id: totrans-450
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定量与定性评估：这种方法既促进了定量分析（例如，人员配置水平、通话量），也促进了定性分析（例如，流程、客户满意度）。它符合您的第二个目标，即评估人员配置和资源分配，以了解其对服务质量的影响。
- en: 'Strategic Implementation of Solutions: Systems analysis supports the development
    of informed strategies by considering the interdependencies within the customer
    support system. This ensures that solutions are not only effective in reducing
    wait times but also sustainable, addressing your third objective of refining the
    customer support process.'
  id: totrans-451
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解决方案的战略实施：系统分析通过考虑客户支持系统内的相互依赖性来支持制定知情策略。这确保解决方案不仅有效于减少等待时间，而且具有可持续性，解决您的第三个目标——完善客户支持流程。
- en: 'Performance Measurement: This approach emphasizes the importance of setting
    and monitoring KPIs to evaluate the effectiveness of implemented solutions. It
    directly correlates with your fourth objective, using average wait time, customer
    satisfaction scores, and direct feedback as measures of success.'
  id: totrans-452
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 绩效衡量：这种方法强调设定和监控关键绩效指标（KPIs）以评估实施解决方案的有效性。它与您的第四个目标直接相关，即使用平均等待时间、客户满意度评分和直接反馈作为成功衡量标准。
- en: 'Future-proofing Customer Support: Finally, systems analysis promotes the development
    of adaptable and scalable solutions, ensuring that the customer support system
    can handle fluctuations in demand. This is essential for achieving your fifth
    objective of developing a long-term plan to maintain short wait times, considering
    both peak and off-peak periods.'
  id: totrans-453
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 防御未来客户支持：最后，系统分析促进了适应性和可扩展解决方案的开发，确保客户支持系统能够应对需求波动。这对于实现您的第五个目标——制定长期计划以保持短等待时间至关重要，这需要考虑高峰期和非高峰期。
- en: Implementation Insights
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 实施见解
- en: 'Process Optimization: Investigate current workflows for bottlenecks and implement
    process improvements, such as automated call routing and self-service options,
    to reduce demand on agents.'
  id: totrans-455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 流程优化：调查当前工作流程的瓶颈，并实施流程改进，如自动呼叫路由和自助选项，以减少对代理人的需求。
- en: 'Strategic Staffing: Utilize predictive analytics to forecast demand and adjust
    staffing levels accordingly. This includes not just hiring more staff but also
    reevaluating schedules, shift patterns, and the use of part-time or temporary
    workers during peak times.'
  id: totrans-456
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 战略性人员配置：利用预测分析来预测需求并相应调整人员配置水平。这不仅包括招聘更多员工，还包括重新评估日程安排、班次模式和高峰时段使用兼职或临时工。
- en: 'Training and Support: Enhance agent efficiency and job satisfaction through
    targeted training and support, improving their ability to resolve calls quickly
    and effectively.'
  id: totrans-457
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 培训和支持：通过有针对性的培训和支援提高代理人的效率和职业满意度，提高他们快速有效地解决电话的能力。
- en: 'Technology Utilization: Explore technology solutions like AI chatbots or enhanced
    IVR (Interactive Voice Response) systems to handle routine inquiries, thus freeing
    up human agents for more complex issues.'
  id: totrans-458
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术利用：探索类似人工智能聊天机器人或增强型IVR（交互式语音响应）系统等技术解决方案来处理常规查询，从而为处理更复杂问题的人类代理腾出空间。
- en: 'Continuous Improvement: Establish a culture of continuous improvement, where
    feedback from both customers and agents is regularly collected, analysed, and
    used to make further enhancements to the support process.'
  id: totrans-459
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 持续改进：建立一个持续改进的文化，定期收集客户和代理人的反馈，进行分析，并用于进一步改进支持流程。
- en: By adopting a systems analysis approach, Acme Corporation can ensure a comprehensive,
    strategic, and adaptable solution to the problem of extended wait times, leading
    to improved customer satisfaction and a stronger competitive position in the market.
    |
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 通过采用系统分析方法，Acme公司可以确保对延长等待时间问题的全面、战略性和适应性解决方案，从而提高客户满意度和在市场上的竞争优势。|
- en: A Manufacturing Plant Sustainability Problem
  id: totrans-461
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 制造厂可持续性问题
- en: 'Let’s try running a different type of problem through the Problem Solver Insight
    GPT:'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试通过问题解决洞察GPT运行不同类型的问题：
- en: Problem Statement
  id: totrans-463
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题陈述
- en: Sunrise Beverages is aiming to reduce its environmental footprint by 20% within
    the next three years, focusing on reducing water usage and packaging waste in
    its production processes. However, the company currently lacks a comprehensive
    sustainability strategy and faces challenges in inefficient resource use and waste
    management practices. For Sunrise Beverages to achieve its environmental objectives,
    it is imperative to adopt more sustainable production methods, enhance waste recycling
    programs, and engage in water conservation efforts.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: Sunrise Beverages的目标是在未来三年内将其环境足迹减少20%，重点关注其生产过程中的水使用和包装废物减少。然而，公司目前缺乏全面的可持续性战略，面临着资源使用低效和废物管理实践中的挑战。为了实现其环境目标，Sunrise
    Beverages必须采用更可持续的生产方法，增强废物回收计划，并参与水资源节约工作。
- en: Objective
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 目标
- en: Pinpoint specific practices and areas within Sunrise Beverages’ operations that
    significantly contribute to its environmental impact, then addressing these through
    targeted interventions.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 确定Sunrise Beverages运营中对其环境影响显著的具体做法和区域，然后通过有针对性的干预措施来解决这些问题。
- en: Approach
  id: totrans-467
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 方法
- en: 'Assessment of Production Processes: Conduct a detailed analysis of current
    production operations to identify inefficiencies in water use and waste generation.
    This step will prioritize areas where interventions could yield substantial environmental
    benefits.'
  id: totrans-468
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生产过程评估：对当前的生产操作进行详细分析，以识别水资源使用和废物产生的低效率。这一步骤将优先考虑干预措施可能带来重大环境效益的区域。
- en: 'Implementation of Sustainable Technologies: Explore and adopt cutting-edge
    technologies designed to minimize resource consumption and environmental impact.
    The effectiveness of these technologies will be measured by their ability to reduce
    water and waste footprints.'
  id: totrans-469
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可持续技术实施：探索和采用旨在最小化资源消耗和环境影响的尖端技术。这些技术的有效性将通过其减少水和废物足迹的能力来衡量。
- en: 'Expansion of Recycling Efforts: Enhance recycling programs by introducing more
    recyclable materials and forming partnerships that support waste diversion from
    landfills. The impact of these efforts will be evaluated by their contribution
    to the overall reduction in packaging waste.'
  id: totrans-470
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 增强回收努力：通过引入更多可回收材料和建立支持废物从垃圾填埋场转移的伙伴关系来增强回收计划。这些努力的成效将通过其对包装废物总体减少的贡献来评估。
- en: 'Water Conservation Initiatives: Implement measures aimed at reducing water
    consumption, including the installation of efficient water recycling systems.
    The success of these initiatives will be gauged by their contribution to the company’s
    water usage reduction targets.'
  id: totrans-471
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 水资源节约倡议：实施旨在减少水消耗的措施，包括安装高效的水回收系统。这些倡议的成功将根据其对公司水使用量减少目标的贡献来衡量。
- en: 'Sustainability Branding and Consumer Engagement: Develop a brand image that
    reflects the company''s commitment to sustainability, aiming to strengthen customer
    loyalty and attract environmentally conscious consumers. The effectiveness of
    this strategy will be assessed by changes in consumer perceptions and buying behaviours.'
  id: totrans-472
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可持续品牌建设和消费者参与：打造反映公司对可持续性承诺的品牌形象，旨在加强客户忠诚度并吸引关注环境的消费者。这一策略的有效性将通过消费者认知和购买行为的改变来评估。
- en: 'Resource Allocation for Sustainability Goals: Allocate financial, technological,
    and human resources to support the identified sustainability initiatives. The
    allocation strategy will be optimized based on the anticipated environmental return
    on investment.'
  id: totrans-473
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可持续目标资源分配：为支持确定的可持续性倡议分配财务、技术和人力资源。分配策略将根据预期的环境投资回报率进行优化。
- en: 'Performance Tracking and Strategy Adjustment: Monitor environmental performance
    indicators, such as reductions in water use, waste generation, and overall environmental
    footprint. This monitoring will inform ongoing adjustments to the sustainability
    strategy, ensuring continuous improvement.'
  id: totrans-474
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 性能跟踪和策略调整：监控环境绩效指标，如水使用量、废物产生量和整体环境足迹的减少。这种监控将指导对可持续性策略的持续调整，确保持续改进。
- en: 'Long-term Commitment to Environmental Performance: Develop a comprehensive
    environmental strategy that ensures the company''s operations are aligned with
    sustainability goals over the long term. This strategy will include mechanisms
    for adapting to new environmental challenges and regulations.'
  id: totrans-475
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对环境绩效的长期承诺：制定一个全面的环境战略，确保公司的运营长期与可持续性目标保持一致。该战略将包括适应新的环境挑战和法规的机制。
- en: Outcome
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 结果
- en: By following this structured approach, Sunrise Beverages aims to effectively
    address its environmental impact, achieving a 20% reduction in its footprint through
    focused improvements in water and waste management. This strategy not only positions
    the company as a leader in sustainability but also ensures its resilience and
    competitiveness in an increasingly eco-conscious market.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 通过遵循这种结构化的方法，Sunrise饮料公司旨在有效解决其环境影响，通过在水和废物管理方面的重点改进，实现其足迹的20%减少。这项战略不仅使公司成为可持续性领域的领导者，还确保其在日益注重生态意识的市场中保持韧性和竞争力。
- en: In this case, the Problem Solver Insight GPT recommended a combined systems
    analysis and sequential problem solving approach.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 在此情况下，问题解决洞察GPT建议采用结合系统分析和顺序问题解决方法。
- en: 'Shared chat: [https://t.ly/xq8yp](https://t.ly/xq8yp)'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 共享聊天：[https://t.ly/xq8yp](https://t.ly/xq8yp)
- en: '| Problem Solver InsightThe problem presented by Sunrise Beverages requires
    a multifaceted approach that combines both systems analysis and a sequential,
    temporal analysis of cause and effect. Here''s how each approach would contribute
    to solving the problem:Systems Analysis ApproachSystems analysis is essential
    for understanding and improving the complex interactions within Sunrise Beverages’
    production processes and environmental impact. This approach allows for:'
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: '| 问题解决洞察Sunrise饮料公司提出的问题需要一种多方面的方法，结合系统分析和因果关系的顺序、时间分析。以下是每种方法如何有助于解决问题的说明：系统分析方法系统分析对于理解和改进Sunrise饮料公司生产过程中的复杂相互作用及其环境影响至关重要。这种方法允许：'
- en: 'Holistic Understanding: By viewing the company’s operations as an interconnected
    system, you can identify how changes in one area (e.g., water usage) affect others
    (e.g., energy consumption and waste production).'
  id: totrans-481
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 全局理解：通过将公司的运营视为一个相互关联的系统，您可以识别出一个区域（例如，用水量）的变化如何影响其他区域（例如，能源消耗和废物生产）。
- en: 'Identification of Inefficiencies: A systems analysis will help pinpoint inefficiencies
    not just in resource use but also in the production processes, supply chain, and
    product lifecycle.'
  id: totrans-482
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别低效：系统分析将有助于确定资源使用、生产过程、供应链和产品生命周期中的低效。
- en: 'Integrated Solutions Development: Solutions that arise from systems thinking
    are inherently comprehensive, addressing multiple aspects of sustainability simultaneously.
    For example, adopting a technology that reduces water use might also decrease
    energy consumption and waste generation.'
  id: totrans-483
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 综合解决方案开发：源于系统思维解决方案本质上是全面的，同时解决可持续性的多个方面。例如，采用减少用水量的技术可能也会降低能源消耗和废物产生。
- en: 'Sequential Temporal AnalysisA sequential temporal analysis focuses on the cause-and-effect
    relationships over time, helping Sunrise Beverages to:'
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 顺序时间分析顺序时间分析专注于时间上的因果关系，帮助Sunrise饮料公司：
- en: 'Prioritize Interventions: Understand the temporal impact of different sustainability
    initiatives. For example, quick wins like improving recycling can have immediate
    effects, while technology upgrades may offer long-term benefits.'
  id: totrans-485
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 优先干预：了解不同可持续性倡议的时间影响。例如，像提高回收这样的快速胜利可以立即产生效果，而技术升级可能带来长期效益。
- en: 'Phased Implementation: Develop a timeline for the rollout of different initiatives,
    considering how early successes can fund and facilitate later, more ambitious
    projects.'
  id: totrans-486
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分阶段实施：制定不同倡议的推出时间表，考虑早期成功如何为后续更雄心勃勃的项目提供资金和便利。
- en: 'Monitor Progress and Adapt: By evaluating the effects of sustainability initiatives
    over time, the company can adjust its strategies based on what is most effective,
    ensuring continuous improvement towards its environmental goals.'
  id: totrans-487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 监控进度并调整：通过评估可持续性倡议随时间的效果，公司可以根据最有效的方法调整其战略，确保持续改善其环境目标。
- en: 'Recommended ApproachA combined approach leveraging both systems analysis and
    sequential temporal analysis is recommended for Sunrise Beverages. Initially,
    employ a systems analysis to gain a comprehensive understanding of the company’s
    current environmental impact and identify key areas for improvement. This should
    involve mapping out all processes, resources, and outputs to identify inefficiencies
    and interdependencies.Then, use sequential temporal analysis to plan and implement
    targeted interventions. This involves:'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐方法建议Sunrise Beverages采用结合系统分析和顺序时间分析的综合方法。最初，通过系统分析全面了解公司的当前环境影响并确定关键改进领域。这应该包括绘制所有流程、资源和输出，以识别低效和相互依赖性。然后，使用顺序时间分析来规划和实施有针对性的干预措施。这包括：
- en: Setting short-term, medium-term, and long-term goals based on the identified
    priorities.
  id: totrans-489
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据确定的优先事项设定短期、中期和长期目标。
- en: Phasing the rollout of initiatives to ensure early wins can support later projects.
  id: totrans-490
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分阶段推出举措，以确保早期成功可以支持后续项目。
- en: Continuously monitoring the impact of these initiatives over time to adapt the
    strategy as necessary.
  id: totrans-491
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 持续监控这些举措随时间的影响，以便根据需要调整策略。
- en: For example, start with an assessment of current processes to identify quick
    improvements in water and waste management. Then, gradually implement more significant
    changes, such as adopting new technologies and expanding recycling programs. Throughout
    this process, it’s crucial to monitor outcomes, learn from the results, and adjust
    the approach as needed to meet the environmental objectives.This combined approach
    ensures that Sunrise Beverages not only addresses its immediate inefficiencies
    but also develops a sustainable, long-term strategy that can adapt to new challenges
    and opportunities. |
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，从评估当前流程开始，以确定水和废物管理方面的快速改进。然后，逐步实施更重大的变化，如采用新技术和扩大回收计划。在整个过程中，至关重要的是监控结果，从结果中学习，并根据需要调整方法以满足环境目标。这种综合方法确保Sunrise
    Beverages不仅解决其当前的低效问题，而且制定了一个可持续的、长期的战略，可以适应新的挑战和机遇。|
- en: As illustrated, ChatGPT is capable of identifying the best way to frame a real-world
    hard problem, to reach an optimal solution. This means that we can continue by
    applying the most appropriate method to solve the problem, using Chain of Thought
    Prompting techniques.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，ChatGPT能够确定如何最好地构建一个现实世界的硬问题框架，以达到最佳解决方案。这意味着我们可以继续应用最合适的方法来解决问题，使用思维链提示技术。
- en: Significantly, this allows us to achieve adaptive thinking in the context of
    AI, for solving real-world hard problems.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是，这使我们能够在AI的背景下实现适应性思维，以解决现实世界的硬问题。
- en: Framing Soft Problems
  id: totrans-495
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 确定软问题框架
- en: Unlike hard problems, it is not possible to definitively determine the “type”
    of a soft problem. Instead it is more likely that any “soft” problem will have
    various elements interwoven in it, some of which require a logical approach, some
    of which require an emotional approach and some of which require a “control” approach.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 与硬问题不同，无法明确确定软问题的“类型”。相反，任何“软”问题都可能包含各种交织在一起的因素，其中一些需要逻辑方法，一些需要情感方法，还有一些需要“控制”方法。
- en: Using Chain of Thought Prompting to address soft problems is addressed in Section
    III and Section IV of this book.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 本书第三章和第四章讨论了使用思维链提示法来解决软问题。
- en: '![](image_rsrc6FK.jpg)'
  id: totrans-498
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc6FK.jpg)'
- en: Finding the right approach, by ChatGPT
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找正确的方法，由ChatGPT撰写
- en: Section II – Solving Hard Problems
  id: totrans-500
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章 – 解决硬问题
- en: This section goes into a detailed explanation of using Chain of Thought Prompting
    to solve real-world problems, by applying the problem solving methods best suited
    to the specific problem type.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 本节详细解释了如何通过应用最适合特定问题类型的问题解决方法，使用思维链提示技术来解决现实世界的问题。
- en: '![](image_rsrc6FM.jpg)'
  id: totrans-502
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc6FM.jpg)'
- en: Humans and Artificial Intelligence working together to tackle complex problems,
    by ChatGPT
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 人类与人工智能协作解决复杂问题，由ChatGPT撰写
- en: Chapter 9\. Problem Solving Methods
  id: totrans-504
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第九章. 解决问题的方法
- en: Solving Hard Problems
  id: totrans-505
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决硬问题
- en: 'As discussed in the previous section, generative AI models such as ChatGPT
    4, excel in addressing the following types of hard problems:'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，生成式AI模型如ChatGPT 4在解决以下类型的硬问题方面表现出色：
- en: 'Analytical Problems: Analytical problems involve dissecting complex issues
    into manageable parts to find a possible solution.'
  id: totrans-507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析问题：分析问题涉及将复杂问题分解成可管理的部分以找到可能的解决方案。
- en: 'Causal Reasoning Tasks: Problems that involve predicting outcomes, based on
    a series of interconnected events or actions.'
  id: totrans-508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 因果推理任务：涉及基于一系列相互关联的事件或行动预测结果的问题。
- en: 'System Thinking Problems: Problems that require understanding how different
    components interact within a system to produce a holistic result.'
  id: totrans-509
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统性思考问题：需要理解不同组件如何在系统中相互作用以产生整体结果的问题。
- en: Each of these problem types has specific problem-solving methods that have been
    designed specially for that sort of the problem. The following table lists problem
    solving methods that can be applied to each of these problem types by using CoT
    Prompting.
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 每种问题类型都有专门为该类型问题设计的问题解决方法。以下表格列出了通过使用CoT Prompting可以应用于这些问题类型的解决问题的方法。
- en: '| Problem type | Suitable Problem Solving Method |'
  id: totrans-511
  prefs: []
  type: TYPE_TB
  zh: '| 问题类型 | 适合的解决问题方法 |'
- en: '| --- | --- |'
  id: totrans-512
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Analytical Problems | Classical Analytical ThinkingTraditional, systematic
    approaches to problem-solving that rely on logical reasoning and analysis, such
    as deductive and inductive reasoning.Generative AI models like ChatGPT 4 add value
    to this process by recalling relevant data that adds insights to each stage of
    the “thinking process”. |'
  id: totrans-513
  prefs: []
  type: TYPE_TB
  zh: '| 分析性问题 | 经典分析性思考 |'
- en: '| Causal Reasoning Tasks | Business Process AnalysisThis problem-solving technique  is
    designed to tackle structured, sequential problems by mapping out processes and
    identifying potential improvements and likely outcomes. |'
  id: totrans-514
  prefs: []
  type: TYPE_TB
  zh: '| 因果推理任务 | 业务流程分析 |'
- en: '| Systemic Thinking Problems | Systems ThinkingThis approach  aims to understand
    the problem domain as a whole, its constituent elements, and how they interact
    with each other. |'
  id: totrans-515
  prefs: []
  type: TYPE_TB
  zh: '| 系统性思考问题 | 系统性思考 |'
- en: By applying these problem-solving methods using CoT Prompting we can get the
    AI to break down its thinking into discrete steps and apply relevant information
    to each stage of its “thinking process”.
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用CoT Prompting应用这些问题解决方法，我们可以让AI将其思考过程分解为离散的步骤，并将相关信息应用于其“思考过程”的每个阶段。
- en: Getting Lift in AI Responses
  id: totrans-517
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提高AI响应的质量
- en: An active area of current research in AI is the idea of getting lift, which
    refers to the process of elevating the performance of an AI model by using skilful
    prompt engineering techniques.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 当前AI研究的一个活跃领域是提升性能的想法，这指的是通过使用熟练的提示工程技巧来提高AI模型性能的过程。
- en: Getting lift is essential in the ongoing development of AI technologies. As
    LLM’s grow larger and larger, we encounter physical limits to how LLM models can
    become, dictated by factors such as available computational resources, energy
    consumption, and the efficiency of model architectures.
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 提高性能对于AI技术的持续发展至关重要。随着LLM的规模越来越大，我们遇到了LLM模型可以成为的物理限制，这些限制由可用的计算资源、能耗和模型架构的效率等因素决定。
- en: Getting lift through advanced prompt engineering, such as Chain of Thought (CoT)
    Prompting, is an innovative way to maximise the potential of existing LLM models
    without the need for scaling their size exponentially.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 通过高级提示工程，如思维链（CoT）提示，是最大化现有LLM模型潜力的一种创新方式，而无需指数级地扩展其规模。
- en: In the following chapters a focus is placed on demonstrably getting lift in
    AI responses.
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，重点放在明显提高AI响应的质量上。
- en: Chapter 10\. Analytical Thinking
  id: totrans-522
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第10章\. 分析性思考
- en: Thinking
  id: totrans-523
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 思考
- en: Generally speaking when we use the word “thinking”, we are referring to analytical
    thinking.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 一般而言，当我们使用“思考”这个词时，我们指的是分析性思考。
- en: Analytical thinking simplifies complex problems by breaking them down into more
    manageable parts. It involves pinpointing and dissecting the issue, collecting
    relevant information, and considering the problem and relevant data logically
    to come to a solution.
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 分析性思考通过将复杂问题分解为更易管理的部分来简化问题。它涉及精确地剖析问题，收集相关信息，并逻辑地考虑问题和相关数据，以得出解决方案。
- en: 'Specific types of analytical thinking include:'
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 特定的分析性思考类型包括：
- en: 'Deductive reasoning: Going from a general theory to specific cases.'
  id: totrans-527
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 演绎推理：从一般理论到具体案例。
- en: 'Inductive reasoning: Starting with specific observations, then leading to generalisations.'
  id: totrans-528
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 归纳推理：从具体观察开始，然后得出概括。
- en: Analytical thinking is vital for everyday decision-making and for the application
    of professional skills.
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 分析性思维对于日常决策和专业技能的应用至关重要。
- en: Further Reading
  id: totrans-530
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进一步阅读
- en: It would not be possible to explain the foundations of analytical thinking in
    one book, since a vast body of literature is dedicated to explaining these concepts.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 一本书无法解释分析性思维的基础，因为大量文献致力于解释这些概念。
- en: Some key works are as follows.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 一些关键作品如下。
- en: Classical Texts and Philosophical Works
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 《古典文本与哲学作品》
- en: 'Prior Analytics, by Aristotle: This is one of the earliest texts on logic and
    reasoning. Aristotle explores deductive reasoning and syllogism, which are foundational
    to analytical thought.'
  id: totrans-534
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《前分析论》，作者亚里士多德：这是关于逻辑和推理的最早文本之一。亚里士多德探讨了演绎推理和三段论，这些都是分析性思维的基础。
- en: '| ![](image_rsrc6FJ.jpg)A syllogism joins two or more premises to arrive at
    a conclusion. The structure of a syllogism ensures that if the premises are true
    and the argument is structured correctly, the conclusion must also be true.The
    classic example of a syllogism is:'
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: '| ![图片](image_rsrc6FJ.jpg)三段论将两个或多个前提结合在一起得出结论。三段论的结构确保了如果前提是真的，并且论证结构正确，那么结论也必须是真实的。三段论的典型例子是：'
- en: 'Major premise: All humans are mortal.'
  id: totrans-536
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主要前提：所有人都是会死的。
- en: 'Minor premise: Socrates is a human.'
  id: totrans-537
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 次要前提：苏格拉底是人。
- en: 'Conclusion: Therefore, Socrates is mortal.'
  id: totrans-538
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结论：因此，苏格拉底是会死的。
- en: Syllogisms have been key in philosophical, mathematical, and legal reasoning
    for many centuries. |
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 三段论在哲学、数学和法律推理中已经关键了许多世纪。
- en: 'Discourse on Method, by René Descartes: Descartes outlines his method for achieving
    clear and certain knowledge, emphasising doubt, analysis, and systematic reasoning
    as tools for intellectual inquiry.'
  id: totrans-540
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《方法论》，作者勒内·笛卡尔：笛卡尔概述了他获得清晰和确定知识的方法，强调怀疑、分析和系统推理作为智力探究的工具。
- en: 'Critique of Pure Reason, by Immanuel Kant: Kant examines how we understand
    the universe through our senses and reason.'
  id: totrans-541
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《纯粹理性批判》，作者伊曼努尔·康德：康德考察了我们如何通过感官和理性理解宇宙。
- en: Modern Books on Critical Thinking and Analysis
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 《现代批判性思维与分析书籍》
- en: 'Thinking, Fast and Slow, by Daniel Kahneman: Kahneman explores two modes of
    thought: fast, intuitive thinking, and slow, analytical reasoning.'
  id: totrans-543
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《思考，快与慢》，作者丹尼尔·卡尼曼：卡尼曼探讨了两种思维模式：快速直观思考和缓慢的分析推理。
- en: 'The Demon-Haunted World: Science as a Candle in the Dark, by Carl Sagan: Sagan
    promotes scientific scepticism and the use of analytical thinking to overcome
    vague understanding and pseudoscience.'
  id: totrans-544
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《鬼魂缠身的世界：科学在黑暗中的蜡烛》，作者卡尔·萨根：萨根提倡科学怀疑主义和运用分析性思维来克服模糊理解和伪科学。
- en: 'Critical Thinking: A Concise Guide, by Bowell and Kemp: This is a practical
    introduction to critical thinking, covering essential skills, arguments, fallacies,
    and the importance of reasoning in a clear and accessible way.'
  id: totrans-545
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《批判性思维：简明指南》，作者鲍威尔和肯普：这是一本实用的批判性思维入门书，涵盖了基本技能、论证、谬误以及清晰易懂地阐述推理的重要性。
- en: Texts on Logic and Scientific Method
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 《逻辑与科学方法文本》
- en: 'The Logic of Scientific Discovery, by Karl Popper: Popper discusses the philosophy
    of science and introduces falsifiability as a criterion for distinguishing scientific
    theories from non-scientific ones.'
  id: totrans-547
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《科学发现的逻辑》，作者卡尔·波普尔：波普尔讨论了科学哲学，并引入可证伪性作为区分科学理论与非科学理论的标准。
- en: 'An Introduction to Logic, by Copi, Cohen and McMahon: This textbook provides
    a comprehensive overview of logic, including syllogisms, fallacies, and the principles
    of sound reasoning.'
  id: totrans-548
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《逻辑学导论》，作者科皮、科恩和麦卡汉：这本教科书提供了对逻辑的全面概述，包括三段论、谬误和合理推理的原则。
- en: Mathematics and Problem Solving
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 《数学与问题解决》
- en: 'How to Solve It, by George Pólya: Pólya presents a systematic method for solving
    mathematical problems and also emphasises a general approach to problem-solving
    that applies beyond mathematics.'
  id: totrans-550
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 《怎样解题》，作者乔治·波利亚：波利亚提出了解决数学问题的系统方法，并强调了一种适用于数学以外的通用问题解决方法。
- en: Together, these classical texts offer a blend of theoretical frameworks, practical
    insights, and methods for gaining clear analytical thinking.
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 这些经典文本共同提供了理论框架、实用见解和获得清晰分析性思维的方法。
- en: '![](image_rsrc6FN.jpg)'
  id: totrans-552
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc6FN.jpg)'
- en: Kant observing the universe, by ChatGPT
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 康德观察宇宙，由ChatGPT撰写
- en: Chapter 11\. The Power of Custom GPT’s
  id: totrans-554
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第11章。定制GPT的力量
- en: '| ![](image_rsrc6FJ.jpg)This chapter digresses from the subject of CoT Prompting
    to discuss the potential of custom GPT’s in classical problem solving. |'
  id: totrans-555
  prefs: []
  type: TYPE_TB
  zh: '| ![image_rsrc6FJ.jpg](image_rsrc6FJ.jpg)本章偏离了CoT提示的主题，来讨论定制GPT在经典问题解决中的潜力。'
- en: ChatGPT 4 displays relatively good analytical thinking capabilities out-of-the
    box, let’s see if we can improve on its native capabilities, however.
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 4在开箱即用的分析思维能力方面表现相对较好，然而，让我们看看我们是否可以改进其原生能力。
- en: Custom GPT’s
  id: totrans-557
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定制GPT
- en: In November 2023, OpenAI released the capability for users to create their own
    custom GPT’s. Custom GPTs work better for specific applications than general ChatGPT
    models, for the following reasons.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年11月，OpenAI发布了用户创建自定义GPT的能力。与通用ChatGPT模型相比，自定义GPT在特定应用中表现更好，原因如下。
- en: 'Tailored Data and Specialised Knowledge: Custom GPT models can be fine-tuned
    on specific knowledge datasets. This means the model can be trained to understand
    and generate text that is highly relevant to a particular domain or industry.'
  id: totrans-559
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定制数据和专业知识：定制GPT模型可以在特定的知识数据集上进行微调。这意味着模型可以被训练来理解和生成与特定领域或行业高度相关的文本。
- en: For example, for industries or applications requiring specialised knowledge,
    such as legal, medical, or technical fields, a custom GPT model can be trained
    on technical and industry texts that cover the knowledge areas required by users.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，对于需要专业知识或技术的行业或应用，如法律、医疗或技术领域，可以训练一个定制GPT模型，使其在涵盖用户所需知识领域的专业和行业文本上运行。
- en: 'Enhanced Contextual Understanding:  Custom models can be fine-tuned to look
    out for specific conversational contexts or user needs, and so provide responses
    that are more relevant and useful in particular scenarios.'
  id: totrans-561
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 增强的上下文理解：定制模型可以被微调以关注特定的对话上下文或用户需求，从而在特定场景中提供更相关和有用的响应。
- en: For example, a model targeted at customer support can handle queries in a more
    professional and friendly way than the standard ChatGPT model.
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，针对客户支持的目标模型可以比标准的ChatGPT模型以更专业和友好的方式处理查询。
- en: In this way, custom GPT models allow for personalised and domain specific interaction
    and so bridge the gap between general AI capabilities and specialised industry-specific
    requirements.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，定制GPT模型允许个性化的特定领域交互，从而弥合了通用人工智能能力与特定行业特定需求之间的差距。
- en: Improved Reasoning Abilities
  id: totrans-564
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 改进的推理能力
- en: A not generally appreciated fact is that in addition to the above capabilities
    custom GPT models can also display superior reasoning abilities. This is because
    they can be trained on texts that contain the patterns of talking and thinking
    which are best suited for a particular type of question.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 一个不常被认可的事实是，除了上述能力之外，定制GPT模型还可以表现出卓越的推理能力。这是因为它们可以在包含最适合特定类型问题的谈话和思维模式的文本上进行训练。
- en: For example, a custom GPT model trained on legal documents, case studies, and
    legal theory will not only understand the terminology and concepts used in the
    legal domain but will also be able to apply legal-style reasoning to analyse situations,
    draw conclusions, and provide advice in a way that mirrors the reasoning of legal
    professionals.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个在法律文件、案例研究和法律理论上进行训练的定制GPT模型不仅会理解法律领域使用的术语和概念，而且还能以与法律专业人士推理方式相似的方式分析情况、得出结论并提供建议。
- en: This improved reasoning ability provides us with a powerful tool to gain enhanced
    logical processing power for specific question types.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 这种改进的推理能力为我们提供了强大的工具，以增强特定问题类型的逻辑处理能力。
- en: An Analytical GPT
  id: totrans-568
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析型GPT
- en: As an example of this enhanced reasoning ability, we’ll use a GPT called Analytical
    Thinker GPT ([https://t.ly/NJmwZ](https://t.ly/NJmwZ)).
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 作为这种增强推理能力的例子，我们将使用一个名为“分析思维GPT”的GPT（[https://t.ly/NJmwZ](https://t.ly/NJmwZ)）。
- en: Interestingly, this GPT was not provided with any extra texts when it was created.
    It is simply a GPT that was designed to apply the thinking methods described in
    the classical analytical thinking texts to the problems it is asked. Amazingly,
    it still outperforms standard ChatGPT 4.
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，这个GPT在创建时并没有提供任何额外的文本。它只是一个被设计用来将经典分析思维文本中描述的思维方法应用于它被询问的问题的GPT。令人惊讶的是，它仍然优于标准的ChatGPT
    4。
- en: Let’s use this GPT to solve a logic puzzle, and compare the custom GPT’s output
    to standard ChatGPT 4.
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用这个GPT来解决一个逻辑谜题，并将定制GPT的输出与标准ChatGPT 4进行比较。
- en: The Corporate Safe Challenge
  id: totrans-572
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 企业安全挑战
- en: 'Consider the following logic puzzle:'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下逻辑谜题：
- en: Background
  id: totrans-574
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 背景
- en: A multinational corporation has secured its most valuable contracts and patents
    in a state-of-the-art safe. This safe requires five unique codes to open, each
    held by a different executive (CEO, CFO, CTO, COO, and CMO). To ensure the security
    of these documents, the codes must be entered in a specific sequence based on
    a set of logical rules.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
- en: Logical Rules
  id: totrans-576
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The CEO's code must be entered either first or last.
  id: totrans-577
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The CTO's code cannot be entered directly after the CFO's or directly before
    the COO's.
  id: totrans-578
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The CFO's code must be entered immediately before the CMO's.
  id: totrans-579
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The COO's code is to be entered at some point before the CMO's code, not necessarily
    immediately.
  id: totrans-580
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: No executive's code can be entered twice.
  id: totrans-581
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Objective
  id: totrans-582
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Determine the sequence in which the codes should be entered to unlock the safe.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
- en: Solution Approach
  id: totrans-584
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To solve this logic puzzle, follow these steps:'
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
- en: 'List all executives: CEO, CFO, CTO, COO, CMO.'
  id: totrans-586
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Apply Rule 1: CEO''s code is first or last.'
  id: totrans-587
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Apply Rule 3 and 4 together: Since the CFO''s code comes immediately before
    the CMO''s, and the COO''s code comes before the CMO''s, it places the CFO and
    CMO towards the end but not necessarily at the very end, considering the CEO''s
    position and the COO''s position relative to the CMO.'
  id: totrans-588
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Apply Rule 2: The CTO''s placement is restricted by the CFO and COO''s codes.
    It cannot follow the CFO immediately or be immediately before the COO, helping
    narrow down its position.'
  id: totrans-589
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Logical Deduction: Using the above rules, deduce the only sequence that satisfies
    all conditions.'
  id: totrans-590
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Determining the Sequence
  id: totrans-591
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Start by placing the CEO, considering Rule 1\.
  id: totrans-592
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integrate the placement of CFO and CMO based on Rule 3\.
  id: totrans-593
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Consider where the COO can fit, which must be before the CMO but not necessarily
    right before, as per Rule 4\.
  id: totrans-594
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Find the suitable spot for the CTO, adhering to Rule 2's restrictions.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT 4 becomes confused if we ask it to solve this problem and does not come
    to a conclusion.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
- en: '| Yousolve: The Corporate Safe Challenge Background: A multinational corporation
    ...ChatGPTTo solve "The Corporate Safe Challenge" logically, let''s break down
    the requirements and constraints step by step and then deduce the sequence in
    which the codes should be entered.1\. List all executives: CEO, CFO, CTO, COO,
    CMO.2\. Apply Rule 1: The CEO''s code is either first or last. This gives us two
    major scenarios to consider.3\. Apply Rule 3 and 4: Since the CFO''s code must
    come immediately before the CMO''s, and the COO''s code must come before the CMO''s
    (but not necessarily immediately), we know the sequence involves CFO->CMO, with
    the COO placed somewhere before the CMO. This also implies the COO cannot be last.4\.
    Apply Rule 2: The CTO''s code cannot follow the CFO''s immediately or be placed
    right before the COO. This rule helps in placing the CTO with respect to the CFO
    and COO''s positioning.Determining the Sequence:'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
- en: 'Scenario 1 (CEO First): If the CEO''s code is first, the sequence starts with
    CEO. Given the CFO must precede the CMO and the COO must precede both but not
    necessarily directly, the CTO''s placement becomes crucial.'
  id: totrans-598
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 场景 1（CEO 第一个）：如果 CEO 的代码是第一个，序列以 CEO 开始。鉴于 CFO 必须在 CMO 之前，COO 必须在两者之前但不必直接，CTO
    的位置变得至关重要。
- en: 'Scenario 2 (CEO Last): If the CEO''s code is last, we must arrange the other
    four with the constraints in mind, ending with CEO.'
  id: totrans-599
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 场景 2（CEO 最后）：如果 CEO 的代码是最后一个，我们必须考虑约束条件来安排其他四个角色，以 CEO 结尾。
- en: 'Logical Deduction:'
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑推理：
- en: The COO cannot be last because the CMO must be preceded directly by the CFO,
    and the COO must come before the CMO.
  id: totrans-601
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: COO 不能是最后一个，因为 CMO 必须直接由 CFO 先于，而 COO 必须在 CMO 之前。
- en: The CTO cannot be placed directly after the CFO or right before the COO, limiting
    its position.
  id: totrans-602
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CTO 不能直接放在 CFO 之后或直接在 COO 之前，这限制了其位置。
- en: 'Given these rules, let''s construct the sequence with logical deductions:'
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这些规则，让我们通过逻辑推理来构建序列：
- en: 'CEO First Scenario: CEO, _, _, _, _.'
  id: totrans-604
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CEO 第一个场景：CEO, _, _, _, _。
- en: ➢ Since the CFO must come immediately before the CMO and the COO must come before
    the CMO, and considering the CEO is first, the latter part of the sequence might
    involve the COO before CFO and CMO. The CTO's restrictions with the CFO and COO
    mean it cannot be placed between CFO and COO or directly after the CFO.➢ The sequence
    could potentially be CEO, CTO, COO, CFO, CMO, but this violates the rule that
    the CEO should be first or last and does not fit all conditions perfectly, especially
    considering the placement of the CTO.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: ➢ 由于 CFO 必须紧跟在 CMO 之后，COO 必须在 CMO 之前，并且考虑到 CEO 是第一个，序列的后半部分可能涉及 COO 在 CFO 和
    CMO 之前。CTO 与 CFO 和 COO 的限制意味着它不能放在 CFO 和 COO 之间或 CFO 之后。➢ 序列可能潜在地是 CEO、CTO、COO、CFO、CMO，但这违反了
    CEO 应该是第一个或最后一个的规则，并且没有完美地满足所有条件，特别是考虑到 CTO 的位置。
- en: 'CEO Last Scenario: _, _, _, _, CEO.'
  id: totrans-606
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CEO 最后场景：_, _, _, _, CEO。
- en: '➢ This setup allows us to place the CFO and CMO towards the end of the sequence,
    preceded by the COO, and then fit the CTO where it doesn''t violate its restrictions.➢
    The logical sequence, considering all rules, would be: CTO, COO, CFO, CMO, CEO,
    which fits all the given conditions. However, this arrangement does not satisfy
    the CEO being either first or last with the correct placement of other executives
    based on the provided rules.Correct Sequence Deduction:Given the constraints and
    revising the approach:'
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: ➢ 这种设置使我们能够将 CFO 和 CMO 放在序列的末尾，由 COO 先于他们，然后在不违反其限制的情况下放置 CTO。➢ 考虑到所有规则，逻辑序列将是：CTO、COO、CFO、CMO、CEO，这符合所有给定条件。然而，这种安排并不满足
    CEO 既是第一个也是最后一个，并且根据提供的规则，其他高管的位置也不正确。正确序列推理：鉴于约束条件和修订的方法：
- en: CEO cannot be the second or fourth, as it restricts the placement of other roles
    too much.
  id: totrans-608
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CEO 不能是第二个或第四个，因为这会过多地限制其他角色的位置。
- en: The CTO’s placement is key, given its restrictions around the CFO and COO.
  id: totrans-609
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CTO 的位置至关重要，考虑到其围绕 CFO 和 COO 的限制。
- en: 'Given the misstep in the initial logical deduction, let''s correct the approach:'
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 由于初始逻辑推理中的错误，让我们纠正方法：
- en: 'CEO Placement: CEO must be first or last.'
  id: totrans-611
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: CEO 的位置：CEO 必须是第一个或最后一个。
- en: 'CFO and CMO Link: They must be consecutive.'
  id: totrans-612
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: CFO 和 CMO 的联系：它们必须是连续的。
- en: 'COO Before CMO: COO must precede CMO but isn''t directly linked to being right
    before CMO or CFO.'
  id: totrans-613
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: COO 在 CMO 之前：COO 必须在 CMO 之前，但并不直接与 CMO 或 CFO 直接相邻。
- en: 'CTO''s Restrictions: It cannot be immediately after CFO or right before COO,
    which is a critical point to place CTO correctly.'
  id: totrans-614
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: CTO 的限制：它不能紧跟在 CFO 之后或直接在 COO 之前，这是正确放置 CTO 的关键点。
- en: 'Revised Logical Placement:'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 修订后的逻辑位置：
- en: Considering the CEO's flexible placement and the direct link between CFO and
    CMO, along with COO's precedence over CMO but not directly, we focus on fitting
    the CTO without violating its restrictions.
  id: totrans-616
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 考虑到 CEO 的灵活位置以及 CFO 和 CMO 之间的直接联系，以及 COO 在 CMO 之前的优先级但不是直接，我们专注于在不违反其限制的情况下放置
    CTO。
- en: Given the CTO's placement is highly restrictive, it logically fits in positions
    not directly after CFO nor before COO in a sequence that doesn't violate the CEO's
    positioning rule.
  id: totrans-617
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于 CTO 的位置非常受限，它逻辑上适合放在不直接在 CFO 之后也不在 COO 之前的序列中，且不违反 CEO 的定位规则。
- en: 'To accurately solve this with a step-by-step logical deduction, let''s construct
    a sequence satisfying all rules:'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 为了通过逐步逻辑推理准确解决这个问题，让我们构建一个满足所有规则的序列：
- en: 'CEO Placement: Start with CEO at the beginning or end.'
  id: totrans-619
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: CEO 的位置：从开始或结束开始。
- en: 'Fitting CFO, CMO, and COO: CFO and CMO must be together; COO must precede CMO.'
  id: totrans-620
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 放置 CFO、CMO 和 COO：CFO 和 CMO 必须在一起；COO 必须在 CMO 之前。
- en: 'CTO Placement: Ensure it doesn''t follow CFO directly or precede COO directly.'
  id: totrans-621
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首席技术官的放置：确保它不直接跟随首席财务官或直接在首席运营官之前。
- en: 'Correct Solution:Given the complexity and the need to satisfy all conditions,
    let''s simulate the logical deduction process to find the exact sequence. I''ll
    now solve this logically through deduction based on the constraints provided:'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 正确解决方案：鉴于复杂性和满足所有条件的需求，让我们通过逻辑推理过程来模拟找到确切序列。我现在将根据提供的限制通过逻辑推理来解决这个问题：
- en: CEO's position is pivotal; it dictates the structure.
  id: totrans-623
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首席执行官的位置至关重要；它决定了结构。
- en: CFO directly before CMO places these two in a linked sequence.
  id: totrans-624
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首席财务官直接放在首席营销官之前，将这两个放在一个链接序列中。
- en: '>> Continue generating |'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: '>> 继续生成 |'
- en: Now let’s ask the Analytical Thinker GPT ([https://t.ly/NJmwZ](https://t.ly/NJmwZ))
    to solve the puzzle; it immediately arrives at the correct answer.
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们请分析型思考者GPT（[https://t.ly/NJmwZ](https://t.ly/NJmwZ)）来解决这个问题；它立即得到了正确答案。
- en: 'Shared chat: [https://t.ly/6I60X](https://t.ly/6I60X)'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 共享聊天：[https://t.ly/6I60X](https://t.ly/6I60X)
- en: '| Analytical ThinkerTo solve the Corporate Safe Challenge, let''s apply the
    given logical rules step by step to deduce the correct sequence of code entries:1\.
    List all Executives'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: '| 分析型思考者为了解决企业安全挑战，让我们逐步应用给定的逻辑规则来推理正确的代码输入序列：1. 列出所有高管'
- en: CEO, CFO, CTO, COO, CMO
  id: totrans-629
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CEO, CFO, CTO, COO, CMO
- en: '2\. Apply Rule 1: CEO''s Position'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 应用规则1：首席执行官的位置
- en: 'The CEO''s code must be entered either first or last. This means we have two
    scenarios to explore: CEO first or CEO last.'
  id: totrans-631
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首席执行官的代码必须首先或最后输入。这意味着我们有两种情况要探索：首席执行官首先或首席执行官最后。
- en: '3\. Apply Rule 3 and 4 Together: CFO, CMO, and COO''s Placement'
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 同时应用规则3和4：首席财务官、首席营销官和首席运营官的放置
- en: Since the CFO's code must come immediately before the CMO's, and the COO's code
    must be entered before the CMO's (but not immediately), it suggests a sequence
    where CFO and CMO are towards the end, but we also need to account for the COO
    being before CMO. This could initially suggest a sequence like COO, CFO, CMO if
    not considering the CEO's position or the CTO's restrictions.
  id: totrans-633
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于首席财务官的代码必须立即放在首席营销官之前，而首席运营官的代码必须在首席营销官之前输入（但不一定是立即），这表明CFO和CMO将靠近序列的末尾，但我们还需要考虑到首席运营官必须在首席营销官之前。如果不算上首席执行官的位置或首席技术官的限制，这可能最初会建议一个如COO,
    CFO, CMO的序列。
- en: '4\. Apply Rule 2: CTO''s Placement Restrictions'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 应用规则2：首席技术官的放置限制
- en: The CTO cannot follow the CFO directly or be placed directly before the COO.
    This rule significantly limits where the CTO can be placed, especially considering
    the CFO-CMO placement rule.
  id: totrans-635
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首席技术官不能直接跟随首席财务官或直接放在首席运营官之前。这条规则显著限制了首席技术官可以放置的位置，特别是考虑到首席财务官-首席营销官的放置规则。
- en: 'Determining the SequenceScenario 1: CEO First'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 确定序列场景1：首席执行官首先
- en: If the CEO is first, the last positions must accommodate the CFO-CMO sequence,
    considering the COO must be before CMO but not necessarily directly. The CTO cannot
    be directly after CFO or right before COO, further complicating its placement.
  id: totrans-637
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果首席执行官是第一个，最后一个位置必须容纳CFO-CMO序列，考虑到首席运营官必须在首席营销官之前，但不一定是直接。首席技术官不能直接跟在首席财务官后面或放在首席运营官之前，这进一步复杂化了其放置。
- en: Given these constraints, placing the CEO first means the sequence could potentially
    end with CFO-CMO, but the COO and CTO's placement needs careful consideration.
  id: totrans-638
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这些限制条件下，将首席执行官放在首位意味着序列可能以CFO-CMO结束，但首席运营官和首席技术官的放置需要仔细考虑。
- en: 'Scenario 2: CEO Last'
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 场景2：首席执行官最后
- en: If the CEO is last, we need to place the other executives in such a way that
    all rules are satisfied, with the CEO's placement now fixed at the end.
  id: totrans-640
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果首席执行官是最后一个，我们需要以这种方式放置其他高管，以满足所有规则，现在首席执行官的放置固定在最后。
- en: The sequence must have the CFO immediately before the CMO, and the COO somewhere
    before the CMO. Given the CTO's restrictions, it cannot be placed after CFO (due
    to Rule 2).
  id: totrans-641
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 序列必须让首席财务官紧接在首席营销官之前，首席运营官必须在首席营销官之前。考虑到首席技术官的限制，它不能放在首席财务官之后（由于规则2）。
- en: 'ConclusionLet''s construct the sequence based on Scenario 2 (CEO Last), as
    it provides a clearer path to satisfying all rules:'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 结论让我们根据场景2（首席执行官最后）构建序列，因为它提供了一个更清晰的路径来满足所有规则：
- en: 'CTO Placement: Considering the CEO is last, and to satisfy the CTO''s restrictions
    (Rule 2), the CTO cannot be directly before the COO (with the COO and CMO sequence
    needing to be uninterrupted by the CTO) and not directly after the CFO, placing
    the CTO first seems the most logical step.'
  id: totrans-643
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首席技术官的放置：考虑到首席执行官是最后一个，并且为了满足首席技术官的限制（规则2），首席技术官不能直接放在首席运营官之前（因为首席运营官和首席营销官的序列需要不被首席技术官中断）并且不能直接跟在首席财务官后面，将首席技术官放在第一个似乎是最合理的步骤。
- en: 'COO Placement: The COO must be before the CMO but is not restricted to being
    directly before the CMO, allowing for flexibility in placement. However, with
    the CEO last and the CTO likely placed first to avoid conflict with the CFO and
    COO, the COO can fit before the CFO-CMO sequence but after the CTO.'
  id: totrans-644
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: COO 位置：COO 必须在 CMO 之前，但不是限制在直接在 CMO 之前，允许在位置上有灵活性。然而，由于 CEO 最后，CTO 可能被放在第一位以避免与
    CFO 和 COO 冲突，COO 可以放在 CFO-CMO 序列之前，但在 CTO 之后。
- en: 'CFO-CMO Sequence: This pair is locked in sequence due to Rule 3, and with the
    CEO at the end, they would naturally fit towards the end but before the CEO.'
  id: totrans-645
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: CFO-CMO 序列：由于规则 3，这对组合被锁定在序列中，并且由于 CEO 在最后，它们自然会适合在 CEO 之前但不在 CEO 之后。
- en: 'CEO Last: Confirmed by the choice of scenario.'
  id: totrans-646
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: CEO 最后：由情景选择确认。
- en: 'Thus, the sequence that fits all criteria is:'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，符合所有标准的序列是：
- en: 'First: CTO'
  id: totrans-648
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一：CTO
- en: 'Second: COO (Rule 4 requires COO before CMO, and placing it here satisfies
    all conditions without breaking Rule 2''s restrictions on the CTO)'
  id: totrans-649
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二：COO（规则 4 要求 COO 在 CMO 之前，将其放在这里满足所有条件而不违反规则 2 对 CTO 的限制）
- en: 'Third: CFO (immediately before CMO as per Rule 3)'
  id: totrans-650
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三：CFO（根据规则 3，紧接在 CMO 之前）
- en: 'Fourth: CMO (immediately after CFO)'
  id: totrans-651
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第四：CMO（紧接在 CFO 之后）
- en: 'Fifth: CEO (as per Scenario 2, fulfilling Rule 1)'
  id: totrans-652
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第五：CEO（根据情景 2，满足规则 1）
- en: 'Final Sequence: CTO, COO, CFO, CMO, CEOThis sequence satisfies all the given
    logical rules:'
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 最终序列：CTO、COO、CFO、CMO、CEO 这个序列满足所有给定的逻辑规则：
- en: The CEO is last.
  id: totrans-654
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CEO 是最后一个。
- en: The CTO's placement avoids being directly after the CFO and directly before
    the COO.
  id: totrans-655
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CTO 的位置避免了直接在 CFO 之后和直接在 COO 之前。
- en: The CFO is immediately before the CMO.
  id: totrans-656
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CFO 紧接在 CMO 之前。
- en: The COO is placed before the CMO, not necessarily immediately.
  id: totrans-657
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: COO 放在 CMO 之前，不一定立即。
- en: Each executive's code is entered once, fulfilling the uniqueness criterion.
  id: totrans-658
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每位执行者的代码只输入一次，满足唯一性标准。
