- en: Preface
  id: totrans-34
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: Writing a book is not merely about putting words on a page; it’s about solving
    problems, sharing knowledge, and empowering others to achieve more. As an author
    and lifelong learner, my passion has always been to transform complex concepts
    into practical and actionable insights. With this book, ChatGPT Prompts for Coding,
    I aim to bridge the gap between coding challenges and creative solutions, helping
    developers, programmers, and IT professionals unlock their full potential.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 写一本书不仅仅是把字放在页面上；它是关于解决问题、分享知识和赋权他人以实现更多。作为一名作者和终身学习者，我的热情始终是将复杂的概念转化为实用和可操作的见解。在这本书《ChatGPT编程提示》中，我旨在弥合编码挑战和创造性解决方案之间的差距，帮助开发者、程序员和IT专业人士发挥他们的全部潜力。
- en: 'In my journey, from being a researcher to founding ReThynk AI Innovation and
    Research Pvt Ltd and investing in companies like Vista Liberata, one thing has
    remained constant: the relentless pursuit of innovation. Starting as a researcher
    in 2008, I have always believed in the power of technology to reshape industries
    and lives. My work in artificial intelligence, coupled with my passion for creating
    impactful solutions, has given me a unique perspective on how coding forms the
    backbone of today’s digital transformation.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的旅程中，从研究员到创立ReThynk AI创新和研究私人有限公司，再到投资Vista Liberata等公司，有一件事始终如一：对创新的持续追求。从2008年开始作为研究员，我一直相信技术重塑行业和生活的力量。我在人工智能方面的工作，加上我对创造有影响力的解决方案的热情，让我对编码如何成为当今数字化转型支柱的独特视角。
- en: Over the years, I’ve had the privilege of wearing many hats—entrepreneur, investor,
    keynote speaker, and author of several books that cater to a diverse audience,
    from professionals seeking career guidance to influencers and startups looking
    for a competitive edge. My book portfolio includes works like Master the Art of
    Successful Career, LinkedIn Power, Startup Untold Story, and various specialized
    guides on utilizing ChatGPT for productivity, business communication, and personal
    branding. Each of these books stems from a desire to simplify complexity and provide
    tools that drive meaningful outcomes.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这些年来，我有幸扮演了许多角色——企业家、投资者、主题演讲者和多本书的作者，这些书针对多样化的受众，从寻求职业指导的专业人士到寻求竞争优势的影响者和初创公司。我的书库包括《掌握成功职业生涯的艺术》、《LinkedIn力量》、《未述说的创业故事》以及各种利用ChatGPT提高生产力、商业沟通和个人品牌的专业指南。每一本书都源于简化复杂性和提供推动有意义成果的工具的愿望。
- en: As a post-graduate in technology and a certified strategist from the London
    School of Business Administration, my journey into coding was not just academic
    but deeply rooted in solving real-world problems. Whether it was during my tenure
    at a Public Sector Undertaking (PSU) or while crafting strategies for my ventures,
    coding has been integral to creating scalable solutions.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 作为伦敦商学院的科技研究生和认证策略师，我的编码之旅不仅限于学术，更深深植根于解决现实世界的问题。无论是我在公共部门企业（PSU）任职期间，还是在我为我的企业制定策略时，编码一直是创建可扩展解决方案的关键。
- en: This book, ChatGPT Prompts for Coding, is an extension of that philosophy. Coding
    today is not just about syntax and logic—it’s about adaptability, efficiency,
    and leveraging tools like ChatGPT to stay ahead. With this book, I aim to provide
    developers of all levels—whether they are freelancers, software engineers, or
    IT professionals—with practical prompts that address challenges in debugging,
    testing, integration, and beyond.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书，《ChatGPT编码提示》，是这一哲学的延伸。今天的编码不仅仅是关于语法和逻辑——它是关于适应性、效率和利用ChatGPT等工具保持领先。通过这本书，我旨在为所有层次的开发者——无论是自由职业者、软件工程师还是IT专业人士——提供实用的提示，以解决调试、测试、集成等方面的挑战。
- en: My inspiration to write this book comes not only from my professional journey
    but also from my personal dedication to lifelong learning. Having read over 1,000
    books in the past 15 years, I’ve realized that knowledge grows when shared. As
    someone who spends hours each day engaged in fitness, reading, and exploring documentaries
    on business, science, and human efficiency, I understand the importance of discipline
    and continuous growth. This book reflects the culmination of years of observation,
    research, and application.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 写这本书的灵感不仅来自我的职业旅程，还来自我对终身学习的个人承诺。在过去15年里，我阅读了超过1,000本书，我意识到知识在分享中增长。作为一名每天花数小时从事健身、阅读和探索商业、科学和人类效率纪录片的人，我理解纪律和持续成长的重要性。这本书反映了多年观察、研究和应用的结晶。
- en: 'To my readers, I say this: technology evolves at an unprecedented pace, and
    coding is no exception. Embrace the tools and methodologies that enhance your
    capabilities. Let this book be a catalyst for your growth, a companion in your
    journey of innovation, and a resource to fuel your aspirations.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 对我的读者们，我说：技术以史无前例的速度发展，编码也不例外。拥抱增强你能力的工具和方法。让这本书成为你成长的催化剂，成为你创新旅程的伴侣，成为激发你抱负的资源。
- en: Finally, I extend my heartfelt gratitude to my global community of followers
    and subscribers, whose feedback and engagement have been invaluable in shaping
    my work. Your trust drives me to push boundaries and deliver content that is impactful,
    practical, and transformative.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我要向我的全球粉丝和订阅者表达我最真挚的感激之情，他们的反馈和参与对我工作的塑造至关重要。你们的信任驱使我不断突破界限，提供有影响力、实用和变革性的内容。
- en: Here’s to writing the future of coding together!
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 一起书写编码未来的篇章吧！
- en: Warm regards,
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 热烈问候，
- en: Jaideep Parashar
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: Jaideep Parashar
- en: Founder & Director, ReThynk AI
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 创始人兼总监，ReThynk AI
- en: Keynote Speaker | Author | Lifelong Learner
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 主题演讲者 | 作者 | 终身学习者
- en: Introduction
  id: totrans-48
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 引言
- en: Why ChatGPT Prompts for Coding is the Only Coding Guide You’ll Ever Need
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么《ChatGPT编码提示》是你唯一需要的编码指南
- en: Coding is no longer just a technical skill; it’s the foundation of innovation
    in virtually every industry. Whether you’re a seasoned software developer, an
    IT professional, or a freelance coder, the challenges of coding—debugging, integration,
    testing, and staying updated with the latest trends—can often feel overwhelming.
    This book, ChatGPT Prompts for Coding, is designed to change that.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 编程不再仅仅是技术技能；它是几乎所有行业中创新的基石。无论你是经验丰富的软件开发人员、IT专业人士还是自由职业者，编码的挑战——调试、集成、测试以及跟上最新趋势——有时会感觉压倒性。本书《ChatGPT编码提示》，旨在改变这一点。
- en: In an era where tools like ChatGPT are revolutionizing the way we approach problem-solving,
    this book is your ultimate resource. It’s not just a guide to coding but a blueprint
    for leveraging artificial intelligence to simplify, enhance, and master your coding
    practices. With carefully crafted prompts tailored for real-world coding challenges,
    this book is your partner in achieving remarkable results with minimal frustration.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT等工具正在改变我们解决问题方式的这个时代，本书是你的终极资源。它不仅仅是一本编码指南，也是利用人工智能简化、增强和掌握你的编码实践的蓝图。本书提供了针对现实世界编码挑战精心设计的提示，帮助你以最小的挫败感取得显著成果。
- en: What Makes This Book Special?
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书的独特之处在哪里？
- en: 'Comprehensive and Practical:'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 全面且实用：
- en: This book provides 360-degree coverage of coding, spanning topics from coding
    fundamentals and debugging to advanced AI coding and deployment strategies. Each
    section is designed to address specific challenges coders face daily, offering
    actionable prompts to solve them.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 本书对编码提供了360度的覆盖，涵盖了从编码基础和调试到高级人工智能编码和部署策略的各个方面。每个部分都是为了解决程序员日常面临的特定挑战而设计的，提供了可操作的提示来解决这些问题。
- en: 'AI-Powered Solutions:'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人工智能解决方案：
- en: Unlike traditional coding guides, this book is designed for the AI era. Each
    prompt is crafted to harness the capabilities of ChatGPT, turning complex coding
    problems into manageable tasks. Whether you’re debugging errors or building scalable
    architectures, you’ll find prompts that provide clarity and efficiency.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 与传统的编码指南不同，本书是为人工智能时代设计的。每个提示都是精心设计的，以利用ChatGPT的能力，将复杂的编码问题转化为可管理的任务。无论你是调试错误还是构建可扩展的架构，你都会找到提供清晰和效率的提示。
- en: 'Applicable Across Skill Levels:'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 适用于所有技能水平：
- en: Whether you’re a beginner looking to strengthen your foundation or an expert
    aiming to optimize your workflows, this book has something for everyone. Each
    chapter is structured to cater to diverse skill levels, ensuring value at every
    step.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 不论你是寻求加强基础的初学者，还是旨在优化工作流程的专家，本书都有适合每个人的内容。每个章节的结构都是为了满足不同技能水平，确保每一步都有价值。
- en: 'Real-World Scenarios:'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现实世界场景：
- en: The prompts in this book aren’t just theoretical—they’re drawn from real-world
    scenarios faced by professionals. From optimizing APIs to deploying microservices,
    you’ll find prompts that address practical challenges you encounter in your coding
    journey.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 本书中的提示不仅仅是理论上的——它们源自专业人士面临的现实世界场景。从优化API到部署微服务，你将找到解决你在编码旅程中遇到的实际挑战的提示。
- en: How to Use This Book for Maximum Impact
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用本书以获得最大影响
- en: 'Navigate by Need:'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据需求导航：
- en: The book is organized into key coding domains, such as front-end and back-end
    development, integration, testing, and deployment. Identify the area where you
    need assistance and dive straight into the relevant section for targeted solutions.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 本书组织成关键编码领域，例如前端和后端开发、集成、测试和部署。确定你需要帮助的领域，然后直接进入相关部分以获取针对性的解决方案。
- en: 'Master One Domain at a Time:'
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一次掌握一个领域：
- en: While the book is comprehensive, you don’t need to read it cover-to-cover in
    one sitting. Focus on one topic, implement the prompts, and master that area before
    moving on to the next.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然本书内容全面，但你不需要一次性从头到尾阅读。专注于一个主题，实施提示，掌握该领域后再继续下一个。
- en: 'Adapt and Innovate:'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 适应和创新：
- en: Each prompt is designed to be flexible, allowing you to adapt it to your specific
    project needs. Use the examples provided as a foundation, and innovate further
    to suit your unique challenges.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 每个提示都设计得灵活，允许你根据特定项目需求进行调整。以提供的示例为基础，进一步创新以适应你独特的挑战。
- en: 'Integrate AI Into Your Workflow:'
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将人工智能集成到你的工作流程中：
- en: By consistently using the ChatGPT prompts in this book, you’ll develop a natural
    proficiency in integrating AI tools into your coding processes. This not only
    enhances your productivity but also keeps you ahead of the curve in the evolving
    tech landscape.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 通过持续使用本书中的ChatGPT提示，你将培养出将AI工具融入编码流程的自然熟练度。这不仅提高了你的生产力，还让你在不断发展的技术领域中保持领先。
- en: 'Leverage Prompts for Growth:'
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利用提示促进成长：
- en: Whether you’re looking to automate repetitive tasks, improve collaboration,
    or deliver faster results, this book helps you achieve it all. Use it as a reference
    for building skills that directly impact your career growth and project outcomes.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是想自动化重复性任务、提高协作效率，还是希望更快地交付结果，这本书都能帮助你实现所有这些。将其作为参考，构建直接影响你职业成长和项目成果的技能。
- en: Why You’ll Never Need Another Coding Guide
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 你为什么永远不需要另一本编码指南
- en: 'Time-Saving Resource:'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 节省时间的资源：
- en: This book eliminates the need to search for solutions online, read through lengthy
    documentation, or struggle with trial and error. The prompts provide quick, reliable,
    and effective solutions tailored to your needs.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书消除了在线搜索解决方案、阅读冗长的文档或与试错作斗争的需要。提示提供了快速、可靠且针对你需求的解决方案。
- en: 'A Tool for Every Challenge:'
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 应对每一个挑战的工具：
- en: From debugging complex algorithms to deploying applications seamlessly, this
    book covers every aspect of coding. It’s designed to grow with you, addressing
    both current and future challenges as your career evolves.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 从调试复杂的算法到无缝部署应用程序，这本书涵盖了编码的各个方面。它旨在与你共同成长，解决你职业发展过程中的当前和未来挑战。
- en: 'Empowerment Through AI:'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过AI赋能：
- en: As AI continues to redefine the tech industry, this book empowers you to be
    at the forefront. It’s not just a guide to coding—it’s a guide to coding in the
    age of AI, helping you harness the power of tools like ChatGPT to achieve exceptional
    results.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI不断重新定义技术行业，这本书赋予你站在前沿的能力。它不仅仅是一本编码指南——它是一本关于AI时代编码的指南，帮助你利用ChatGPT等工具的力量，实现卓越的结果。
- en: Final Thoughts
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的想法
- en: In ChatGPT Prompts for Coding, I’ve poured my years of experience as a researcher,
    entrepreneur, and AI innovator to create a resource that is both practical and
    transformative. This book isn’t just about solving coding problems—it’s about
    equipping you with the tools and mindset to excel in a fast-paced, technology-driven
    world.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在《ChatGPT 编码提示》中，我将作为一名研究人员、企业家和AI创新者的多年经验融入其中，创建了一个既实用又具有变革性的资源。这本书不仅仅关于解决编码问题——它旨在为你提供工具和心态，让你在快速发展的技术驱动世界中脱颖而出。
- en: Whether you’re debugging a program, designing software architecture, or learning
    a new programming language, this book is here to make the process smoother, faster,
    and more effective. Let this be the last coding guide you’ll ever need—a companion
    that grows with you and ensures your success in every coding challenge you face.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是调试程序、设计软件架构还是学习新的编程语言，这本书都能帮助你使过程更加顺畅、快速和有效。让它成为你永远需要的最后一本编码指南——一个与你共同成长、确保你在面对每一个编码挑战时都能成功的伴侣。
- en: Let’s unlock the future of coding together.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 一起开启编码的未来。
- en: Warm regards,
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 诚挚问候，
- en: Jaideep Parashar
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: Jaideep Parashar
- en: Founder & Director, ReThynk AI
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 创始人兼ReThynk AI总监
- en: Keynote Speaker | Author | Innovator
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 主题演讲者 | 作者 | 创新者
- en: Coding Fundamentals
  id: totrans-87
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 编码基础
- en: Mastering the basics is the first step toward coding excellence. In this chapter,
    I’ve distilled my years of experience and learnings into prompts that simplify
    the foundational concepts of coding. Whether you’re learning loops, conditions,
    or algorithms, this section provides you with actionable guidance to build a strong
    and enduring foundation for your coding journey.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握基础知识是迈向编码卓越的第一步。在本章中，我将多年的经验和学习成果提炼成提示，简化了编码的基础概念。无论你是学习循环、条件语句还是算法，这一部分都为你提供了可操作性的指导，帮助你构建一个强大而持久的编码旅程基础。
- en: '1: Understanding Conditional Statements'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 1：理解条件语句
- en: 'Prompt:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain conditional statements in [Python/JavaScript/etc.] with examples.
    Include examples of if, else, and elif/else-if blocks and discuss how nesting
    and logical operators like AND, OR, and NOT work. Provide scenarios where conditional
    statements are particularly useful."'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: “用[Python/JavaScript等]的例子解释条件语句。包括if、else和elif/else-if块，并讨论嵌套和逻辑运算符如AND、OR和NOT的工作方式。提供条件语句特别有用的场景。”
- en: '2: Writing a Loop for Iterative Tasks'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 2：编写循环以处理迭代任务
- en: 'Prompt:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a loop in [Python/JavaScript/etc.] to iterate through a list of numbers
    and calculate their sum. Include both for and while loop implementations, explain
    their differences, and suggest which one is more appropriate in this scenario."'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python/JavaScript等]编写一个循环来遍历数字列表并计算它们的总和。包括for循环和while循环的实现，解释它们之间的区别，并建议在哪种情况下更合适。"'
- en: '3: Understanding Functions and Parameters'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '3: 理解函数和参数'
- en: 'Prompt:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of functions in [Python/JavaScript/etc.]. Write a function
    that accepts multiple parameters (e.g., a list of numbers and an operation such
    as addition or multiplication) and returns the result. Include examples of default
    parameters and keyword arguments."'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释[Python/JavaScript等]中函数的概念。编写一个接受多个参数（例如，数字列表和操作，如加法或乘法）的函数，并返回结果。包括默认参数和关键字参数的示例。"'
- en: '4: Handling User Input'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '4: 处理用户输入'
- en: 'Prompt:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a script in [Python/JavaScript/etc.] that takes input from a user, validates
    it, and performs a specific operation (e.g., calculates the square of a number).
    Provide error-handling mechanisms to manage invalid inputs gracefully."'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python/JavaScript等]编写一个脚本，从用户那里获取输入，验证它，并执行特定操作（例如，计算一个数的平方）。提供错误处理机制来优雅地处理无效输入。"'
- en: '5: Basic File Handling'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '5: 基本文件处理'
- en: 'Prompt:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/JavaScript/etc.] that creates a text file, writes
    some content to it, and then reads the content back. Include examples of error
    handling to manage situations where the file might not exist or is inaccessible."'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python/JavaScript等]编写一个程序，创建一个文本文件，向其中写入一些内容，然后读取内容。包括错误处理的示例，以管理文件可能不存在或不被访问的情况。"'
- en: '6: Understanding Lists and Arrays'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '6: 理解列表和数组'
- en: 'Prompt:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of lists (or arrays) in [Python/JavaScript/etc.] with
    examples. Write a program that demonstrates how to add, remove, and search for
    elements in a list, as well as how to iterate over it using loops."'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python/JavaScript等]解释列表（或数组）的概念，并举例说明。编写一个程序来演示如何在列表中添加、删除和搜索元素，以及如何使用循环遍历它。"'
- en: '7: Creating and Using Dictionaries'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '7: 创建和使用字典'
- en: 'Prompt:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain how dictionaries (or objects in JavaScript) work in [Python/JavaScript/etc.].
    Write a program that stores user information (name, age, email) in a dictionary
    and demonstrates how to add, update, and retrieve data from it."'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释在[Python/JavaScript等]中字典（或JavaScript中的对象）是如何工作的。编写一个程序，将用户信息（姓名、年龄、电子邮件）存储在字典中，并演示如何添加、更新和从中检索数据。"'
- en: '8: Writing Recursive Functions'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '8: 编写递归函数'
- en: 'Prompt:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain recursion and its use cases. Write a recursive function in [Python/JavaScript/etc.]
    to calculate the factorial of a number. Include a detailed explanation of the
    base case and recursive case."'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释递归及其用例。使用[Python/JavaScript等]编写一个递归函数来计算一个数的阶乘。包括对基本情况和对递归情况的详细解释。"'
- en: '9: Sorting Algorithms'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '9: 排序算法'
- en: 'Prompt:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write code in [Python/JavaScript/etc.] to implement and explain the Bubble
    Sort algorithm. Provide a detailed step-by-step explanation of how the algorithm
    works, along with comments in the code for each step."'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python/JavaScript等]编写代码来实现并解释冒泡排序算法。提供算法如何工作的详细步骤解释，并在代码的每个步骤中添加注释。"'
- en: '10: Searching Algorithms'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '10: 搜索算法'
- en: 'Prompt:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write code in [Python/JavaScript/etc.] to implement and explain the Binary
    Search algorithm. Provide an example array and demonstrate how the algorithm searches
    for a target value. Include explanations of time complexity."'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python/JavaScript等]编写代码来实现并解释二分查找算法。提供一个示例数组，并演示算法如何搜索目标值。包括时间复杂度的解释。"'
- en: '11: String Manipulation'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '11: 字符串操作'
- en: 'Prompt:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a program in [Python/JavaScript/etc.] to perform various string operations,
    including reversing a string, converting it to uppercase/lowercase, and replacing
    certain characters. Explain the use cases for each operation."'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '"使用[Python/JavaScript等]编写一个程序来执行各种字符串操作，包括反转字符串、将其转换为大写/小写以及替换某些字符。解释每个操作的使用场景。" '
- en: '12: Error and Exception Handling'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '12: 错误和异常处理'
- en: 'Prompt:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the importance of error and exception handling. Write a program in
    [Python/JavaScript/etc.] that demonstrates a try-catch (or try-except) block to
    handle division by zero errors."'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释错误和异常处理的重要性。使用[Python/JavaScript等]编写一个程序，演示try-catch（或try-except）块来处理除以零错误。"'
- en: '13: Writing Modular Code'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '13: 编写模块化代码'
- en: 'Prompt:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of modularity in coding. Write a program in [Python/JavaScript/etc.]
    that is divided into multiple functions or modules, each responsible for a specific
    task. Provide an example of importing and using these modules."'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释编程中的模块化概念。编写一个[Python/JavaScript等]程序，将其划分为多个函数或模块，每个模块负责特定任务。提供一个导入和使用这些模块的示例。"'
- en: '14: Understanding Variables Scope'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '14: 理解变量作用域'
- en: 'Prompt:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the concept of scope in [Python/JavaScript/etc.]. Write a program
    that demonstrates the difference between global and local variables, and how they
