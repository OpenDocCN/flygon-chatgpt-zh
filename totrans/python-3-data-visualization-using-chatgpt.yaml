- en: '**EXCEPTION HANDLING IN PYTHON**'
  id: totrans-710
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**Python中的异常处理**'
- en: Unlike JavaScript, you cannot add a number and a string in Python. However,
    you can detect an illegal operation using the try/except construct in Python,
    which is similar to the try/catch construct in languages such as JavaScript and
    Java.
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 与JavaScript不同，在Python中你不能将数字和字符串相加。然而，你可以使用Python中的try/except结构检测非法操作，这与JavaScript和Java等语言中的try/catch结构类似。
- en: 'An example of a try/except block is here:'
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个try/except块的示例：
- en: '[PRE96]'
  id: totrans-713
  prefs: []
  type: TYPE_PRE
  zh: '[PRE96]'
- en: When you run the preceding code, the print() statement in the except code block
    is executed because the variables x and y have incompatible types.
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 当你运行前面的代码时，except代码块中的print()语句会被执行，因为变量x和y具有不兼容的类型。
- en: 'Earlier in the chapter, you also saw that subtracting two strings throws an
    exception:'
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的早期部分，你也看到了减去两个字符串会抛出异常：
- en: '[PRE97]'
  id: totrans-716
  prefs: []
  type: TYPE_PRE
  zh: '[PRE97]'
- en: 'A simple way to handle this situation is to use a try/except block:'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 处理这种情况的一个简单方法是使用try/except块：
- en: '[PRE98]'
  id: totrans-718
  prefs: []
  type: TYPE_PRE
  zh: '[PRE98]'
