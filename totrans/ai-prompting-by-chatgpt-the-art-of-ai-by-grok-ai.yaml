  - PREF_UL
  type: TYPE_NORMAL
- en: 'Case Study 5: Education and Learning'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Profile: An in-depth look at how an educational institution employed AI to
