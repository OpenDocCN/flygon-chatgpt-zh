    ****so**il** ****degr**adatio**n. ****Addi**tional**ly, ****so**me** ****reg**ion**s
    ****o**f** ****t**he** ****wo**rld** ****ha**ve** ****diff**icult**y ****gro**win**g
    ****a**** ****suff**icien**t ****var**iet**y ****o**f** ****nutr**itiou**s ****pl**ant**s
    ****d**ue** ****t**o** ****th**eir** ****cli**mat**e, ****a**nd** ****a**** ****wide**sprea**d
    ****sw**itc**h ****co**uld** ****nega**tivel**y ****im**pac**t ****fo**od** ****sec**urit**y
    ****i**n** ****th**ese** ****ar**eas**. "'
  id: totrans-1128
