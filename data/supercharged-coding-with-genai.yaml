- en: '15'
  id: totrans-2263
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '15'
- en: 'Going Live with GenAI: Logging, Monitoring, and Errors'
  id: totrans-2264
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用GenAI上线：日志记录、监控和错误处理
- en: '**Large Language Models** (**LLMs**) can supercharge our going-live processes,
    which refers to deploying code to production. But if prompted incorrectly, they
    can also degrade code quality. In this chapter, we will examine how, even when
    following the five S’s to prompt GenAI for logging, monitoring, and input validation,
    the resulting code can become cluttered, combining these elements with core functionality
    and violating the **single responsibility principle**. For instance, models sometimes
    suggest using `print` statements instead of proper logging, handling input validation
    within functions, or incrementing counters without reporting their values. This
    violates the single responsibility principle and reduces overall code quality.'
  id: totrans-2265
  prefs: []
  type: TYPE_NORMAL
  zh: '**大型语言模型（LLMs**）可以极大地加速我们的上线过程，即部署代码到生产环境。但如果提示不当，它们也可能降低代码质量。在本章中，我们将探讨即使遵循五个S原则来提示GenAI进行日志记录、监控和输入验证，生成的代码也可能变得杂乱，将这些元素与核心功能结合在一起，违反**单一职责原则**。例如，模型有时建议使用`print`语句而不是适当的日志记录，在函数内处理输入验证，或者在不报告其值的情况下递增计数器。这违反了单一职责原则，并降低了整体代码质量。'
- en: To address this, we will apply the **Chain-of-Thought** (**CoT**) prompt engineering
    technique to GitHub Copilot to generate well-monitored code without interfering
    with the function’s core functionality, leveraging **decorators** as a design
    pattern. We will also leverage **few-shot learning** to guide it toward following
    a coding style. While GitHub Copilot is well suited for these tasks, we will explore
    how similar results can be achieved using CoT with few-shot learning in ChatGPT
    and CoT with **fine-tuning** in OpenAI API.
  id: totrans-2266
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我们将应用**思维链**（**CoT**）提示工程技术到 GitHub Copilot，以生成良好监控的代码，同时不干扰函数的核心功能，利用**装饰器**作为设计模式。我们还将利用**少样本学习**来引导它遵循编码风格。虽然
    GitHub Copilot 适合这些任务，但我们将探讨如何使用 ChatGPT 中的 CoT 和 OpenAI API 中的**微调**实现类似的结果。
- en: 'The key topics covered in this chapter include the following:'
  id: totrans-2267
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖的关键主题包括以下内容：
- en: Introducing logging, monitoring, and raising errors
  id: totrans-2268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 介绍日志记录、监控和错误处理
- en: Leveraging GenAI for higher-level coding patterns
  id: totrans-2269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用 GenAI 进行高级编码模式
- en: Applying inverse CoT with ChatGPT and OpenAI
  id: totrans-2270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 ChatGPT 和 OpenAI 中应用逆 CoT
- en: Utilizing few-shot learning and fine-tuning as style guides
  id: totrans-2271
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将少样本学习和微调作为风格指南
- en: Technical requirements
  id: totrans-2272
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 技术要求
- en: 'To get the most out of this chapter, ensure you have the following:'
  id: totrans-2273
  prefs: []
  type: TYPE_NORMAL
  zh: 为了充分利用本章内容，请确保您具备以下条件：
