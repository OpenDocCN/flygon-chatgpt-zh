    not influenced by extreme values, the “Atlantic” region appears to have the highest
    median sales. However, the region with the highest average (mean) sales can be
    different, as the mean is affected by outliers and extreme values. The “Atlantic”
    region also shows the highest maximum sales value, indicating some very high-value
    orders.
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 根据中位数销售值，这是一个不受极端值影响的稳健的平均值度量，看起来“大西洋”地区的销售中位数最高。然而，平均（均值）销售最高的地区可能不同，因为均值受异常值和极端值的影响。“大西洋”地区也显示出最高的最大销售值，表明存在一些非常高价值的订单。
- en: 'Prompt: “What are the descriptive statistics for each sales region? Compare
    them.”'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“每个销售地区的描述性统计是什么？进行比较。”
- en: 'Response from ChatGPT:'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: The descriptive statistics for each region, as shown in the five-point summary
    and the box plot, provide a snapshot of the sales distribution. Regions like “Atlantic”
    and “Quebec” show higher maximum sales values, suggesting some very large orders.
    The interquartile range, which is the difference between the 75th percentile and
    the 25th percentile, can be used to gauge the variability in sales within a region.
    Regions with a larger interquartile range, such as “Atlantic” and “Yukon,” indicate
    a greater variability in sales. The median sales value is a useful statistic for
    comparing the central tendency of sales across regions, with “Atlantic” and “Yukon”
    showing higher medians compared to others. The minimum and maximum values indicate
    the range of sales, with “Atlantic” showing the widest range. These statistics
    are essential for understanding the sales performance and potential opportunities
    or risks associated with each region.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 每个地区的描述性统计，如图中五点总结和箱线图所示，提供了销售分布的快照。像“大西洋”和“魁北克”这样的地区显示出更高的最大销售值，表明存在一些非常大的订单。四分位数范围，即第
    75 个百分位数和第 25 个百分位数之间的差异，可以用来衡量一个地区内销售的变异性。具有较大四分位数范围的地区，如“大西洋”和“育空”，表明销售变异性更大。中值销售值是一个有用的统计数据，用于比较各地区销售的集中趋势，其中“大西洋”和“育空”的中位数高于其他地区。最小值和最大值表示销售范围，其中“大西洋”显示出最宽的范围。这些统计数据对于理解销售表现以及与每个地区相关的潜在机会或风险至关重要。
- en: Just as we did with the earlier exercises, you can prompt the LLM to provide
    exploratory data analysis in this case as well and see how insightful the responses
    are.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在前面的练习中所做的那样，你可以在本例中提示 LLM 提供探索性数据分析，并看看这些回应有多有洞察力。
- en: 'Analysis Case 5.4: Analysis Case Using Titanic Data'
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 5.4：使用泰坦尼克号数据进行分析
- en: Analysis with Excel
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Excel 进行分析
- en: 'Using the Case Dataset files, find the file Titanic.xlsx. Open Titanic.xlsx
    using Excel. We are going to answer these questions:'
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 使用案例数据集文件，找到文件 Titanic.xlsx。使用 Excel 打开 Titanic.xlsx。我们将回答以下问题：
- en: Were male passengers older or younger, on average, than female passengers?
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 男乘客的平均年龄是否比女乘客的平均年龄大或小？
- en: What are the descriptive statistics for each gender? Compare them.
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 每个性别的描述性统计是什么？进行比较。
- en: Repeat for each class of passenger and compare.
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 对每个乘客等级重复，并进行比较。
- en: Create a pivot table of the Titanic Passenger data ([Figure 5.18](#fig5-18)).
    Create a summary by age. Do a tabulation by age and enter the maximum age for
    males and females. Do a sub-summary under each gender of the passenger’s name.
    Now you have two lists, one above the other of passenger ages sorted by gender.
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个泰坦尼克号乘客数据的交叉表（[图 5.18](#fig5-18)）。按年龄进行总结。按年龄进行分类并输入男性和女性的最大年龄。在每位乘客的性别下进行子总结。现在你有两个列表，一个在上一个在下，按性别排序的乘客年龄。
- en: '![image](images/pg101.jpg)'
  id: totrans-748
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg101.jpg)'
- en: FIGURE 5.18 Pivot table configuration to summarize passengers by gender and
    subcategory of names to create two lists by gender
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.18 交叉表配置以按性别和姓名子类别总结乘客，创建两个性别列表
- en: Scrape each list and paste it into a new sheet under MALE and FEMALE columns.
    Obtain the descriptive statistics of age by gender (labeled sex in the file) and
    create a box plot diagram ([Figure 5.19](#fig5-19)).
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 将每个列表刮取并粘贴到新的工作表中的 MALE 和 FEMALE 列下。获取按性别（文件中标记为 sex）的年龄描述性统计，并创建一个箱线图（[图 5.19](#fig5-19)）。
- en: '![image](images/pg102.jpg)'
  id: totrans-751
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg102.jpg)'
- en: FIGURE 5.19 Final box plots summarizing the passengers’ ages, compared by gender
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.19 总结乘客年龄的最终箱线图，按性别比较
- en: Analysis with R
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 R 进行分析
- en: Using the Case Dataset files provided, find the file Titanic.csv. Create a box
    plot to see the distribution of females and males, as shown in [Figure 5.20](#fig5-20)
    and [Figure 5.21](#fig5-21).
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提供的案例数据集文件，找到文件 Titanic.csv。创建一个箱线图来查看女性和男性的分布情况，如图 [图 5.20](#fig5-20) 和 [图
    5.21](#fig5-21) 所示。
- en: '![image](images/pg103_1.jpg)'
  id: totrans-755
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg103_1.jpg)'
- en: FIGURE 5.20 Setting of the variables and group and the result of the descriptive
    result
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.20 变量设置、分组和描述性结果的输出
- en: '![image](images/pg103_2.jpg)'
  id: totrans-757
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg103_2.jpg)'
- en: FIGURE 5.21 Final box plots summarizing passengers’ ages, compared by gender
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5.21 总结乘客年龄的最终箱线图，按性别比较
- en: Analysis with Generative AI
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 使用生成式 AI 进行分析
- en: Upload Titanic.csv file into ChatGPT-4\. Then, use the following prompts. The
    results are shown graphically in [Figures 5.22](#fig5-22) and [5.23](#fig5-23).
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 将 Titanic.csv 文件上传到 ChatGPT-4。然后，使用以下提示。结果如图 [图 5.22](#fig5-22) 和 [图 5.23](#fig5-23)
    所示。
- en: 'Prompt: “Create a descriptive statistics summary by passenger’s age for each
    gender and save the table in an Excel file. Then create a box plot to show the
    passengers’ age distribution by sex (female and male).”'
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 提示： “按乘客年龄为每个性别创建描述性统计总结，并将表格保存到Excel文件中。然后创建一个箱线图来显示按性别（女性和男性）的乘客年龄分布。”
- en: 'Result:'
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: '![image](images/pg104_1.jpg)'
  id: totrans-763
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg104_1.jpg)'
- en: FIGURE 5.22 Descriptive statistics summary by passenger’s age for each gender
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.22 按乘客年龄描述性统计总结，每性别
