- en: AI TODAY
  prefs: []
  type: TYPE_NORMAL
- en: Why am I writing this book?
  prefs: []
  type: TYPE_NORMAL
- en: 'In late 2022, the world was shaken by groundbreaking news: ChatGPT reached
    one million users in just five days, demonstrating extraordinary and unprecedented
    growth in the history of technology.'
  prefs: []
  type: TYPE_NORMAL
- en: This remarkable milestone was widely reported by media outlets around the globe,
    from the United States to Europe and Asia. Prominent publications like The New
    York Times, BBC, and El País covered the event, making it resonate across various
    cultures. It significantly impacted technologists, artificial intelligence experts,
    and the general public. Many were amazed by the tool’s capability to hold coherent
    conversations and answer questions on a wide range of topics like never before.
  prefs: []
  type: TYPE_NORMAL
- en: Media coverage and word of mouth helped propel ChatGPT to millions of users
    within weeks, turning it into a viral phenomenon. Its popularity soared, particularly
    on social networks like Twitter and Facebook, where users shared their experiences
    and discussed the tool’s potential. By the end of January 2023, ChatGPT boasted
    tens of millions of monthly active users.
  prefs: []
  type: TYPE_NORMAL
- en: In light of this rapid expansion, I decided to write this book. After thorough
    research, I have compiled everything you need to know about ChatGPT and condensed
    it into a clear and accessible format. I aim to help you make the most of this
    tool and empower yourself, ensuring you keep up in a rapidly evolving world.
  prefs: []
  type: TYPE_NORMAL
- en: Note to Readers
  prefs: []
  type: TYPE_NORMAL
- en: This is not a traditional book but a flexible guide. I recommend you browse
    freely, selecting the chapters that best suit your current needs or interests.
  prefs: []
  type: TYPE_NORMAL
- en: In the following pages, you will find an index with the topics covered in each
    chapter. This index is intended to allow you to quickly locate any specific information
    you are looking for. So, you can read this book without following a sequential
    order.
  prefs: []
  type: TYPE_NORMAL
- en: Consider each chapter a stand-alone module  that provides information on different
    aspects of ChatGPT, from the first steps for someone who has never used this tool
    to advanced prompts engineering techniques with links to scientific research for
    those who wish to go deeper. You can start with the chapter of your choice and
    use the table of contents to take you directly to the topics you want to explore.
  prefs: []
  type: TYPE_NORMAL
