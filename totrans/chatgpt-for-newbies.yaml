  type: TYPE_NORMAL
  zh: 掌握提示如何改变你的生产力、创造力和解决问题的能力
- en: 'Learning to craft effective prompts is like unlocking a new superpower. Here’s
    how it can change the way you work and think:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 学习如何编写有效的提示就像解锁了一种新的超级力量。以下是它如何改变你的工作和思维方式：
- en: 'Productivity: Automate repetitive tasks, draft documents faster, and manage
    your time more efficiently. For example, with the right prompt, ChatGPT can generate
    meeting agendas, summarize lengthy reports, or even draft your emails. I also
    wrote an exciting book named “Agentic AI Mastery: How to Build Multi-AI Agent
    Systems, 100x Productivity & Transform Your Life Forever” that guides you step-by-step
    in building your own multi-AI agent system. If you give it a read and set up your
    own team of AI agents, I truly believe your productivity could skyrocket—10x,
    even 100x. It might just be the game-changer that transforms your entire life.'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '生产率：自动化重复性任务，更快地起草文件，更有效地管理时间。例如，使用正确的提示，ChatGPT可以生成会议议程，总结冗长的报告，甚至起草你的电子邮件。我还写了一本名为“Agentic
    AI Mastery: How to Build Multi-AI Agent Systems, 100x Productivity & Transform
    Your Life Forever”的激动人心的书，它将逐步指导你构建自己的多AI代理系统。如果你阅读它并组建自己的AI代理团队，我真心相信你的生产力可以大幅提升——10倍，甚至100倍。这可能是彻底改变你整个生活的游戏改变者。'
- en: 'Creativity: Break through creative blocks by brainstorming fresh ideas, writing
    compelling stories, or experimenting with innovative concepts. ChatGPT can act
    as a creative partner, sparking new perspectives and solutions.'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创意：通过头脑风暴新想法、撰写引人入胜的故事或尝试创新概念来突破创意瓶颈。ChatGPT可以作为创意伙伴，激发新的视角和解决方案。
- en: 'Problem-Solving: Tackle challenges by framing them clearly in your prompts.
    Whether it’s troubleshooting a technical issue, strategizing for a business, or
    planning a project, ChatGPT can offer valuable insights and options.'
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题解决：通过在提示中清晰地构建问题来应对挑战。无论是解决技术问题、制定商业策略还是规划项目，ChatGPT都可以提供有价值的见解和选项。
- en: By the end of this book, you’ll not only understand the mechanics of effective
    prompting but also feel empowered to use ChatGPT as a reliable tool to enhance
    your daily life and work. Let’s get started!
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书的结尾，你不仅会理解有效提示的机制，还会感到有力量将ChatGPT作为一个可靠的工具来增强你的日常生活和工作。让我们开始吧！
- en: 'Chapter 1: Understanding Prompts'
  id: totrans-168
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一章：理解提示
- en: How ChatGPT Works
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何使用ChatGPT
- en: ChatGPT is an advanced AI language model designed to understand and generate
    human-like text based on the instructions or questions it receives. When you provide
    a prompt, the AI processes the input and predicts the most relevant and logical
    response. It does this by analyzing vast amounts of data and leveraging patterns
    it has learned to provide coherent and contextually appropriate answers.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是一个高级AI语言模型，旨在根据它接收的指令或问题理解和生成类似人类的文本。当你提供一个提示时，AI会处理输入并预测最相关和逻辑的响应。它是通过分析大量数据并利用其学到的模式来提供连贯和上下文适当的答案。
- en: 'Key Features of ChatGPT:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的关键特性：
- en: 'Natural Language Understanding: ChatGPT can interpret and respond in natural,
    conversational language.'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自然语言理解：ChatGPT可以以自然、对话式的语言进行理解和响应。
- en: 'Versatility: It can perform tasks ranging from writing and brainstorming to
    problem-solving and learning.'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多功能性：它可以执行从写作和头脑风暴到问题解决和学习的各种任务。
- en: 'Adaptability: ChatGPT adjusts its tone, complexity, and output based on how
    you frame your prompt.'
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 适应性：ChatGPT根据你如何构建提示来调整其语气、复杂性和输出。
- en: Practical Applications of ChatGPT
  id: totrans-175
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT的实用应用
- en: 'ChatGPT’s capabilities are vast, and its practical applications extend into
    numerous fields:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的功能非常强大，其实际应用扩展到众多领域：
- en: 'Writing:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 写作：
- en: Drafting emails, articles, or social media posts.
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 起草电子邮件、文章或社交媒体帖子。
- en: Generating creative content such as stories or poetry.
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成创意内容，如故事或诗歌。
- en: Editing and refining existing text.
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编辑和精炼现有文本。
- en: 'Learning:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 学习：
- en: Explaining complex concepts in simpler terms.
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用更简单的术语解释复杂概念。
- en: Assisting with language learning or translations.
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助语言学习或翻译。
- en: Summarizing lengthy texts or articles.
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 概括长篇文本或文章。
- en: 'Programming:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 编程：
- en: Writing code snippets or debugging existing code.
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写代码片段或调试现有代码。
- en: Explaining programming concepts.
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释编程概念。
- en: Generating pseudocode or algorithm outlines.
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成伪代码或算法概要。
- en: 'And More:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 更多：
- en: Research assistance.
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究辅助。
- en: Brainstorming ideas for projects or businesses.
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为项目或企业构思想法。
- en: Planning and organizing events or tasks.
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 规划和组织活动或任务。
- en: First-time you use ChatGPT?
  id: totrans-193
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你是第一次使用ChatGPT吗？
- en: Creating an Account and Choosing the Right Version
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 创建账户和选择合适的版本
- en: 'To use ChatGPT, you first need to create an account on OpenAI’s platform. head
    over to chatgpt.com and give it a go. Just type in the following instruction and
    see the magic happen: “Suggest what I should do today”.'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用ChatGPT，你首先需要在OpenAI的平台上创建一个账户。访问chatgpt.com并尝试一下。只需输入以下指令，看看会发生什么魔法：“建议我今天应该做什么”。
- en: Depending on your needs, you can choose between the free version or premium
    versions like ChatGPT Plus, which provide access to more advanced models like
    GPT-4 for higher-quality results.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你的需求，你可以选择免费版本或像ChatGPT Plus这样的高级版本，这些高级版本提供了访问更高级模型如GPT-4的权限，以获得更高质量的结果。
- en: '![A screenshot of a website  Description automatically generated](image_rsrc2NK.jpg)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![网站截图  自动生成描述](image_rsrc2NK.jpg)'
- en: Basic Interface and Interaction Tips
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 基本界面和交互技巧
- en: 'Input Box: Type your prompt into the input box provided.'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入框：在提供的输入框中输入你的提示。
- en: 'Response Area: View ChatGPT’s generated answers in the response area.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应区域：在响应区域查看ChatGPT生成的答案。
- en: 'History Feature: Review previous conversations to maintain context.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 历史功能：回顾之前的对话以保持上下文。
- en: 'First-Time Usage Tips:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 首次使用技巧：
- en: 'Keep an Open Mind: ChatGPT might surprise you with its creativity and insights.'
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持开放心态：ChatGPT可能会以其创造力和洞察力让您感到惊讶。
- en: 'Focus on Practice: Experiment with different prompts to learn how ChatGPT responds
    and how to refine your queries.'
  id: totrans-204
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 专注于实践：尝试不同的提示以了解ChatGPT的响应以及如何完善您的查询。
- en: Is Prompting Only for ChatGPT?
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示只适用于ChatGPT吗？
- en: 'No, prompting is not exclusive to ChatGPT. It is a fundamental concept in the
    world of artificial intelligence and is used across a wide range of AI applications.
    Prompting refers to the practice of providing input or instructions that guide
    an AI system to generate a desired output. This concept extends beyond just language
    models like ChatGPT to other types of AI tools, such as those used for generating
    images, videos, music, or even data analysis. For instance, tools like DALL·E
    rely on carefully crafted text prompts to generate images based on user input,
    while audio generation models like Jukedeck or OpenAI''s MuseNet require specific
    prompts to produce music in different styles. I also authored a book titled “DeepSeek
    is Killing ChatGPT: Will AI Replace Humans?” which explores the immense power
    of DeepSeek. If you give DeepSeek a try, you''ll find that Prompt works seamlessly
    with it as well.'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 不，提示并不局限于ChatGPT。它是人工智能世界中的一个基本概念，并在广泛的AI应用中使用。提示是指提供输入或指令以引导AI系统生成所需输出的实践。这个概念不仅限于像ChatGPT这样的语言模型，还扩展到其他类型的AI工具，例如用于生成图像、视频、音乐或甚至数据分析的工具。例如，DALL·E这样的工具依赖于精心设计的文本提示来根据用户输入生成图像，而像Jukedeck或OpenAI的MuseNet这样的音频生成模型则需要特定的提示来以不同的风格生成音乐。我还撰写了一本名为《DeepSeek正在击败ChatGPT：AI会取代人类吗？》的书籍，探讨了DeepSeek的巨大力量。如果您尝试使用DeepSeek，您会发现提示与它无缝配合。
- en: Mastering the art of prompting can significantly enhance your ability to interact
    effectively with these diverse AI systems. By understanding how to frame your
    prompts, you can not only get better results from ChatGPT but also improve your
    experience with AI-driven design tools, creative applications, and even data science
    platforms. As AI continues to evolve, the power of prompting will remain a key
    skill, making it essential for anyone looking to leverage the potential of artificial
    intelligence.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握提示的艺术可以显著提高您与这些多样化的AI系统有效互动的能力。通过理解如何构建您的提示，您不仅可以从ChatGPT获得更好的结果，还可以改善您与AI驱动的设计工具、创意应用甚至数据科学平台的体验。随着AI的不断发展，提示的力量将始终是一个关键技能，对于希望利用人工智能潜力的人来说至关重要。
- en: 'If you''re interested in maximizing the power of AI across various aspects
    of life and knowing which tools to use when, you can check out my book titled
    "Become a Millionaire in 24 Hours: 100+ AI Tools to Make Money ...".'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您对在生活的各个方面最大化AI的潜力并了解何时使用哪些工具感兴趣，您可以查看我的书籍《24小时内成为百万富翁：100+赚钱AI工具》。
- en: How Prompts Influence the Quality of Results
  id: totrans-209
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示如何影响结果质量
- en: The quality of ChatGPT’s response is directly tied to the quality of your prompt.
    Clear, specific, and intentional prompts yield precise and valuable outputs, while
    vague or ambiguous prompts often lead to unsatisfactory results.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复质量直接关联到您提示的质量。清晰、具体且目的明确的提示将产生精确且有价值的结果，而模糊或含糊不清的提示往往会导致不满意的结果。
- en: What Makes a Great Prompt?
  id: totrans-211
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么使一个提示出色？
- en: The Role of Clarity, Specificity, and Intent
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰性、明确性和目的的作用
- en: 'Clarity: Use straightforward language to avoid confusion.'
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：使用直接的语言以避免混淆。
- en: 'Specificity: Define what you want, including details like format, tone, or
    length.'
  id: totrans-214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确性：定义您想要的内容，包括格式、语气或长度等细节。
- en: 'Intent: Clearly communicate the goal of your prompt to ensure alignment with
    your desired outcome.'
  id: totrans-215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 目的：明确传达您提示的目标，以确保与期望的结果保持一致。
- en: Breaking Down the Structure of an Effective Prompt
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 分析有效提示的结构
- en: 'Context: Provide background information or set the scene.'
  id: totrans-217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 背景：提供背景信息或设定场景。
- en: 'Example: “Imagine you are a travel agent.”'
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“想象你是一名旅行代理人。”
- en: 'Action: State what you want ChatGPT to do.'
  id: totrans-219
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 行动：说明您希望ChatGPT做什么。
- en: 'Example: “Recommend 3 unique travel destinations for adventure seekers.”'
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“为探险者推荐3个独特的旅行目的地。”
- en: 'Output: Specify the format or style of the response.'
  id: totrans-221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输出：指定响应的格式或风格。
- en: 'Example: “List them as bullet points with brief descriptions.”'
  id: totrans-222
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“用项目符号列出，并附上简要描述。”
- en: Examples of Good and Bad Prompts
  id: totrans-223
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优秀与不佳提示的示例
- en: 'Good Prompt:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 优秀的提示：
- en: “Write a 150-word email inviting attendees to a product launch event. Highlight
    the venue, date, and key features of the product.”
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “写一封150字的电子邮件，邀请参会者参加产品发布会。突出展示地点、日期和产品的关键特性。”
- en: 'Why it works: It’s clear, specific, and includes the desired format and details.'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么它有效：它清晰、具体，并包括所需的格式和细节。
- en: 'Bad Prompt:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 差劲的提示：
- en: “Write something about a product launch.”
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “写一些关于产品发布的内容。”
- en: 'Why it fails: It’s vague and lacks details, leading to generic results.'
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 失败的原因：它模糊且缺乏细节，导致结果泛泛而谈。
- en: Common Prompt Mistakes to Avoid
  id: totrans-230
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 避免常见的提示错误
- en: Being Vague or Overly Complex
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 表述模糊或过于复杂
- en: 'Problem: Using unclear or convoluted language.'
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题：使用不明确或复杂的语言。
- en: 'Example: “Tell me something about new ideas.”'
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“告诉我一些关于新想法的事情。”
- en: 'Solution: Simplify and clarify your request.'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决方案：简化并明确你的请求。
- en: 'Revised Example: “List 5 innovative ideas for a tech startup.”'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修订示例：“列出5个科技初创公司的创新想法。”
- en: Misalignment Between Prompt and Desired Outcome
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 提示与期望结果不匹配
- en: 'Problem: Not specifying what you need.'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题：没有指定你需要什么。
- en: 'Example: “Help me with my project.”'
  id: totrans-238
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“帮我完成我的项目。”
- en: 'Solution: Provide context and define your needs.'
  id: totrans-239
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决方案：提供背景并定义你的需求。
- en: 'Revised Example: “Provide 3 key points for a presentation about sustainable
    energy.”'
  id: totrans-240
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修订示例：“提供一个关于可持续能源演示的3个关键点。”
- en: By understanding and applying these principles, you’ll be well on your way to
    crafting effective prompts that unlock ChatGPT’s full potential.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 通过理解和应用这些原则，你将朝着制作有效提示、解锁ChatGPT全部潜力的方向迈进。
- en: 'Chapter 2: Techniques for Crafting Effective Prompts'
  id: totrans-242
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二章：制作有效提示的技术
- en: The 5W1H Strategy (What, Why, When, Where, Who, How)
  id: totrans-243
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5W1H策略（什么、为什么、何时、何地、谁、如何）
- en: 'The 5W1H strategy is a powerful framework for creating clear and focused prompts.
    It helps you define your query and ensures ChatGPT understands the specifics of
    what you’re asking for. Here’s how each component works:'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 5W1H策略是一个强大的框架，用于创建清晰和专注的提示。它帮助你定义查询，并确保ChatGPT理解你询问的具体内容。以下是每个组件如何工作的说明：
- en: 'What:'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 什么：
- en: Clearly state what you want ChatGPT to do.
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清楚地说明你希望ChatGPT做什么。
- en: 'Example: “What are the best marketing strategies for small businesses?”'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“小型企业的最佳营销策略是什么？”
- en: 'Why:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么：
- en: Provide reasoning or purpose to guide the response.
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供理由或目的以引导回答。
- en: 'Example: “Why are some marketing strategies more effective for startups?”'
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“为什么某些营销策略对初创公司更有效？”
- en: 'When:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 何时：
- en: Specify time frames or relevant periods.
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指定时间框架或相关时期。
- en: 'Example: “What are the top holiday marketing strategies for December?”'
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“12月份最佳的假日营销策略有哪些？”
- en: 'Where:'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 何处：
- en: Focus on location or context.
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关注地点或背景。
- en: 'Example: “What are the best practices for digital marketing in the US market?”'
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“美国市场数字营销的最佳实践是什么？”
- en: 'Who:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 谁：
- en: Identify the audience or stakeholders involved.
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定涉及的受众或利益相关者。
- en: 'Example: “What social media strategies work best for Gen Z?”'
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“哪些社交媒体策略最适合Z世代？”
- en: 'How:'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 如何：
- en: Ask for actionable steps or explanations.
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请求具体的步骤或解释。
- en: 'Example: “How can I optimize my website for better search rankings?”'
  id: totrans-262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“我如何优化我的网站以获得更好的搜索排名？”
- en: By combining these elements, you can craft prompts that are clear, purposeful,
    and aligned with your goals.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 通过结合这些元素，你可以制作出清晰、有目的且与你的目标一致的提示。
- en: Breaking Down Complex Problems into Smaller Steps
  id: totrans-264
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将复杂问题分解为更小的步骤
- en: When faced with a complex task, it’s often helpful to break it into manageable
    components. This not only makes your prompt more specific but also helps ChatGPT
    provide more accurate and actionable responses.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 面对复杂任务时，将其分解为可管理的组件通常很有帮助。这不仅使你的提示更加具体，还有助于ChatGPT提供更准确和可操作的反应。
- en: 'Example 1: Complex Problem'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 示例1：复杂问题
- en: “Help me create a business plan.”
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “帮我创建一个商业计划。”
- en: 'Breakdown:'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 分解：
- en: 'Mission Statement: “What should a mission statement for a tech startup look
    like?”'
  id: totrans-269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 宗旨声明：“科技初创公司的宗旨声明应该是什么样的？”
- en: 'Market Analysis: “How can I identify key competitors in the software industry?”'
  id: totrans-270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 市场分析：“我如何识别软件行业的关键竞争对手？”
- en: 'Financial Plan: “What are the basic components of a financial plan for a small
    business?”'
  id: totrans-271
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 财务计划：“小型企业的财务计划基本组成部分有哪些？”
- en: 'Example 2: Academic Research'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 示例2：学术研究
- en: “Explain climate change.”
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “解释气候变化。”
- en: 'Breakdown:'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 分解：
- en: “What are the primary causes of climate change?”
  id: totrans-275
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “气候变化的主要原因是什么？”
- en: “How does climate change impact agriculture?”
  id: totrans-276
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “气候变化如何影响农业？”
- en: “What are the current global strategies to mitigate climate change?”
  id: totrans-277
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “当前全球缓解气候变化的策略有哪些？”
- en: Breaking down the problem makes it easier to focus on specific aspects and get
    more detailed, useful responses.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 分解问题使其更容易专注于特定方面，并获得更详细、有用的回应。
- en: Incorporating Context and Objectives
  id: totrans-279
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结合上下文和目标
- en: Context and objectives are essential to ensure ChatGPT provides relevant and
    targeted responses. Without them, the AI may generate answers that are too generic
    or miss the point entirely.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文和目标是确保ChatGPT提供相关和针对性回应的关键。没有它们，AI可能会生成过于泛泛或完全偏离主题的答案。
- en: 'Providing Context:'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 提供上下文：
- en: Share background information or explain the situation.
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分享背景信息或解释情况。
- en: 'Example: “I’m planning a workshop for small business owners. What topics should
    I cover?”'
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“我计划为小企业主举办一个研讨会。我应该涵盖哪些主题？”
- en: 'Defining Objectives:'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 定义目标：
- en: Clearly state your goals or desired outcomes.
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清楚地说明你的目标或期望的结果。
- en: 'Example: “I need an outline for a blog post that encourages readers to adopt
    eco-friendly habits.”'
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“我需要一个鼓励读者采取环保习惯的博客文章提纲。”
- en: Combining context and objectives helps ChatGPT tailor its response to meet your
    needs.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 结合上下文和目标有助于ChatGPT调整其回应以满足你的需求。
- en: How to Ask ChatGPT to Improve Its Response
  id: totrans-288
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何请求ChatGPT改进其回应
- en: 'Even with well-crafted prompts, there may be times when ChatGPT’s initial response
    isn’t exactly what you need. Here’s how you can refine the interaction:'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是精心制作的提示，有时ChatGPT的初始回应也可能不是你需要的。以下是如何改进互动的方法：
- en: 'Request Specific Improvements:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 请求具体改进：
- en: Ask for enhancements or clarifications directly.
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直接请求增强或澄清。
- en: 'Example: “Can you make this response more concise?”'
  id: totrans-292
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“你能使这个回应更简洁吗？”
- en: 'Provide Feedback:'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 提供反馈：
- en: Point out what’s missing or needs adjustment.
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指出缺失的内容或需要调整的地方。
- en: 'Example: “This list is great, but can you include examples for each point?”'
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“这个列表很好，但你能为每个要点提供例子吗？”
- en: 'Reframe the Prompt:'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 重新构建提示：
- en: Restate your query with additional details or constraints.
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用额外的细节或限制重新表述你的查询。
- en: 'Example: “Rewrite this paragraph in a more formal tone.”'
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“将这个段落重写得更正式一些。”
- en: 'Experiment with Variations:'
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的变体：
- en: Use iterative prompts to explore different angles.
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用迭代提示探索不同的角度。
- en: 'Example: “Can you provide three alternative introductions for this email?”'
  id: totrans-301
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“你能为这封电子邮件提供三种不同的开场白吗？”
- en: By iterating and refining your prompts, you can guide ChatGPT to produce the
    exact results you’re looking for.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 通过迭代和改进你的提示，你可以引导ChatGPT产生你想要的精确结果。
- en: 'Chapter 3: Types of Prompts and When to Use Them'
  id: totrans-303
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第3章：提示类型及其使用时机
- en: Understanding the different types of prompts is essential for maximizing ChatGPT’s
    potential. Each type serves a unique purpose, enabling you to tailor your approach
    to suit various tasks. Let’s dive into the main categories of prompts and explore
    when to use them effectively.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 理解不同类型的提示对于最大化ChatGPT的潜力至关重要。每种类型都有其独特的作用，使您能够根据不同的任务调整您的策略。让我们深入了解主要提示类别，并探讨何时有效地使用它们。
- en: Exploratory Prompts
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 探索性提示
- en: Exploratory prompts are ideal for brainstorming, generating ideas, or exploring
    new concepts. They encourage ChatGPT to provide creative, open-ended responses
    that can spark innovation or fresh perspectives.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 探索性提示非常适合头脑风暴、生成想法或探索新概念。它们鼓励ChatGPT提供富有创意、开放式回应，从而激发创新或新的视角。
- en: 'When to Use:'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 何时使用：
- en: 'Idea Generation: Developing concepts for projects, articles, or campaigns.'
  id: totrans-308
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 想象力生成：为项目、文章或活动开发概念。
- en: 'Brainstorming Solutions: Tackling challenges or finding alternatives.'
  id: totrans-309
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发起头脑风暴：应对挑战或寻找替代方案。
- en: 'Discovering Trends: Learning about emerging topics or technologies.'
  id: totrans-310
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发现趋势：了解新兴话题或技术。
- en: 'Examples:'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “What are some unique marketing strategies for a small business?”
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “有哪些针对小企业的独特营销策略？”
- en: “Can you brainstorm innovative ways to reduce plastic waste?”
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “你能想出减少塑料垃圾的创新方法吗？”
- en: “What are current trends in the tech industry?”
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “科技行业当前的趋势是什么？”
- en: Instructional Prompts
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 指导性提示
- en: Instructional prompts guide ChatGPT to follow a specific process or deliver
    step-by-step instructions. These prompts are particularly useful for tasks that
    require structured and detailed output.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 指导性提示：引导ChatGPT遵循特定的流程或提供逐步指令。这些提示对于需要结构化和详细输出的任务特别有用。
- en: 'When to Use:'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 何时使用：
- en: 'Teaching or Learning: Explaining concepts or processes.'
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教学或学习：解释概念或流程。
- en: 'Task Automation: Breaking down complex workflows.'
  id: totrans-319
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务自动化：分解复杂的工作流程。
- en: 'DIY and How-To Guides: Providing step-by-step instructions for projects.'
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DIY和教程指南：提供项目步骤指南。
- en: 'Examples:'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “Explain how to bake a chocolate cake step by step.”
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “逐步解释如何制作巧克力蛋糕。”
- en: “Provide a guide on setting up a new email account.”
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “提供设置新电子邮件账户的指南。”
- en: “How can I write a professional resignation letter?”
  id: totrans-324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “我该如何写一封专业的辞职信？”
- en: Creative Prompts
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 创意提示
- en: Creative prompts are designed to inspire originality, whether for writing stories,
    crafting poetry, or generating imaginative content. They leverage ChatGPT’s ability
    to think outside the box and produce artistic outputs.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 创意提示旨在激发原创性，无论是撰写故事、创作诗歌还是生成富有想象力的内容。它们利用ChatGPT跳出思维定势的能力，产生艺术输出。
- en: 'When to Use:'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 何时使用：
- en: 'Storytelling: Writing narratives, scripts, or dialogues.'
  id: totrans-328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 叙事：撰写叙述、剧本或对话。
- en: 'Artistic Projects: Generating poetry, lyrics, or creative prose.'
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 艺术项目：生成诗歌、歌词或创意散文。
- en: 'Unleashing Imagination: Coming up with fictional scenarios or hypothetical
    ideas.'
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 激发想象力：提出虚构场景或假设想法。
- en: 'Examples:'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “Write a short story about a time-traveling cat.”
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “写一个关于时空旅行的猫的短篇小说。”
- en: “Create a poem about the beauty of autumn.”
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “创作一首关于秋天美丽的诗歌。”
- en: “Imagine a futuristic city and describe its culture.”
  id: totrans-334
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “想象一个未来城市并描述其文化。”
- en: Analytical Prompts
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 分析性提示
- en: Analytical prompts focus on summarizing, comparing, and making decisions. These
    prompts enable ChatGPT to process and synthesize information, helping you evaluate
    data or form conclusions.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 分析性提示关注总结、比较和做出决策。这些提示使ChatGPT能够处理和综合信息，帮助您评估数据或形成结论。
- en: 'When to Use:'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 何时使用：
- en: 'Summarization: Condensing long documents or articles.'
  id: totrans-338
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摘要：压缩长文档或文章。
- en: 'Comparison: Evaluating options or analyzing differences.'
  id: totrans-339
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较：评估选项或分析差异。
- en: 'Decision-Making: Supporting choices with pros and cons.'
  id: totrans-340
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 决策：支持选择并提供利弊。
- en: 'Examples:'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “Summarize the key points of this article on renewable energy.”
  id: totrans-342
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “总结关于可再生能源文章的关键点。”
- en: '“Compare the features of two smartphones: iPhone and Android.”'
  id: totrans-343
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “比较iPhone和Android智能手机的功能。”
- en: “List the advantages and disadvantages of remote work.”
  id: totrans-344
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “列出远程工作的优缺点。”
- en: Iterative Prompts
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代提示
- en: Iterative prompts are used to refine and improve responses over multiple rounds.
    They involve providing feedback to ChatGPT and asking for adjustments until the
    desired result is achieved.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代提示用于在多轮中改进和优化响应。这涉及到向ChatGPT提供反馈并要求调整，直到达到期望的结果。
- en: 'When to Use:'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 何时使用：
- en: 'Refining Outputs: Improving drafts, lists, or summaries.'
  id: totrans-348
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精炼输出：改进草稿、列表或摘要。
- en: 'Collaboration: Working through multiple iterations to perfect a response.'
  id: totrans-349
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 协作：通过多轮迭代来完善响应。
- en: 'Problem-Solving: Fine-tuning solutions to meet specific needs.'
  id: totrans-350
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题解决：调整解决方案以满足特定需求。
- en: 'Examples:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: “Rewrite this paragraph to make it more engaging.”
  id: totrans-352
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “重写这个段落，使其更具吸引力。”
- en: “Can you simplify this explanation for a 10-year-old audience?”
  id: totrans-353
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “你能为10岁的小朋友简化这个解释吗？”
- en: “Add more details to this outline and include examples.”
  id: totrans-354
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为这个大纲添加更多细节并包括例子。”
- en: In conclusion, by recognizing the distinct strengths of each prompt type, you
    can select the most appropriate approach for your needs, ensuring you achieve
    the best possible results.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 总结：通过识别每种提示类型的独特优势，您可以选择最适合您需求的方法，确保您获得最佳结果。
- en: 'Chapter 4: The Anatomy of a Perfect Prompt'
  id: totrans-356
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四章：完美提示的结构
- en: Steve Jobs once said, “Simplicity is the ultimate sophistication.” The same
    philosophy applies to crafting prompts. A perfect prompt is simple yet powerful,
    capable of guiding AI to deliver responses that are accurate, insightful, and
    tailored to your needs. Let’s break down the anatomy of an ideal prompt and see
    how clarity and intent can lead to extraordinary outcomes.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 史蒂夫·乔布斯曾经说过，“简洁是最高级的复杂。”同样的理念也适用于构建提示。一个完美的提示简单而强大，能够引导AI提供准确、有洞察力且符合您需求的响应。让我们分析理想提示的结构，看看清晰度和意图如何导致非凡的结果。
- en: 'Context: Providing Background for Better Understanding'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：提供更好的理解背景
- en: Imagine asking someone for advice without telling them the full story. The advice
    may miss the mark simply because they lack context. Similarly, ChatGPT thrives
    on relevant background information.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下在不知道全部故事的情况下向某人寻求建议。由于缺乏背景信息，建议可能偏离目标。同样，ChatGPT在相关背景信息方面茁壮成长。
- en: 'Why It Matters: Context sets the stage for the AI’s response, ensuring it understands
    the situation and delivers results that fit your needs.'
  id: totrans-360
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么这很重要：背景为AI的响应设定舞台，确保它理解情况并交付符合您需求的结果。
- en: 'Example:'
  id: totrans-361
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Without context: “Explain renewable energy.”'
  id: totrans-362
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有上下文： “解释可再生能源。”
- en: 'With context: “Explain renewable energy in a way that a 12-year-old can understand,
    focusing on solar and wind power.”'
  id: totrans-363
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有上下文： “用12岁孩子能理解的方式解释可再生能源，重点关注太阳能和风能。”
- en: 'Action: Clear Instructions for What You Want'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 行动：清晰指令
- en: A great prompt tells ChatGPT exactly what action to take. Ambiguity leads to
    uncertainty, while precision leads to results.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好的提示告诉ChatGPT确切要采取的行动。含糊不清会导致不确定性，而精确则导致结果。
- en: 'Why It Matters: Actionable instructions eliminate guesswork and focus the AI’s
    capabilities.'
  id: totrans-366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么这很重要：可操作的指令消除了猜测，并聚焦AI的能力。
- en: 'Example:'
  id: totrans-367
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Vague: “Tell me about marketing.”'
  id: totrans-368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模糊： “告诉我关于市场营销的事情。”
- en: 'Clear: “List five innovative social media marketing strategies for small businesses
    in 2025.”'
  id: totrans-369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰： “列出2025年为小型企业制定的五个创新社交媒体营销策略。”
- en: 'Output: Defining the Format and Tone of the Response'
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 输出： 定义响应的格式和语气
- en: The more you define the desired output, the closer the response will align with
    your expectations.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 你定义的期望输出越明确，响应就越接近你的期望。
- en: 'Why It Matters: Specifying format, length, and tone ensures the output matches
    your use case.'
  id: totrans-372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么这很重要：指定格式、长度和语气确保输出符合你的使用案例。
- en: 'Example:'
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Without format: “Summarize this article.”'
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有格式： “总结这篇文章。”
- en: 'With format: “Summarize this article in 3 bullet points using a professional
    tone.”'
  id: totrans-375
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有格式： “用专业语气用3个要点总结这篇文章。”
- en: Examples of Well-Structured Prompts
  id: totrans-376
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结构良好的提示示例
- en: 'Simple Prompts:'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 简单提示：
- en: “What are the key benefits of remote work?”
  id: totrans-378
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “远程工作的关键好处是什么？”
- en: “Define quantum computing in simple terms.”
  id: totrans-379
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “用简单的话定义量子计算。”
- en: 'Advanced Prompts:'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 高级提示：
- en: “Create a 300-word blog post introducing the concept of blockchain technology
    for non-technical readers.”
  id: totrans-381
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为非技术读者撰写一篇300字的博客文章，介绍区块链技术的概念。”
- en: “Draft a professional email inviting participants to a virtual workshop on digital
    marketing trends.”
  id: totrans-382
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “草拟一封专业电子邮件，邀请参与者参加关于数字营销趋势的虚拟研讨会。”
- en: The difference lies in the details. A perfect prompt combines context, action,
    and output to maximize clarity and relevance.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 差别在于细节。一个完美的提示结合了上下文、行动和输出，以最大化清晰度和相关性。
- en: Prompt Formulas for success
  id: totrans-384
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 成功的提示公式
- en: 'Let’s begin with these straightforward and effective prompt structures:'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从这些简单而有效的提示结构开始：
- en: 'Prompt Structure 1: The Roleplay Structure'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 提示结构 1：角色扮演结构
- en: A great way to get specific and detailed responses is by asking ChatGPT to assume
    a particular role.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 通过让ChatGPT扮演特定角色，获取具体和详细响应的好方法是。
- en: 'Example: "You are a career coach. How would you guide someone making a career
    change at 40?"'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 示例： "你是一位职业教练。你将如何指导一个40岁正在转行的人？"
- en: 'Why It Works: By providing clear context, this approach helps the AI offer
    responses that are more focused and relevant.'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这有效：通过提供清晰的上下文，这种方法帮助AI提供更专注和相关的响应。
- en: 'Prompt Structure 2: The Step-by-Step Structure'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 提示结构 2：逐步结构
- en: If you need a detailed explanation, request that ChatGPT break down the process
    into individual steps.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要详细的解释，请要求ChatGPT将过程分解成单个步骤。
- en: 'Example: "Outline the steps to start a blog in 5 simple stages."'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 示例： "概述以5个简单阶段开始博客的步骤。"
- en: 'Why It Works: Dividing tasks into manageable steps makes it easier to understand
    and follow more complex subjects.'
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这有效：将任务分解成可管理的步骤，使理解更复杂主题更容易。
- en: 'Prompt Structure 3: The Comparison Structure'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 提示结构 3：比较结构
- en: For comparing different things, this formula is very effective.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 对于比较不同事物，这个公式非常有效。
- en: 'Example: "What are the differences between freelancing and full-time employment?"'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 示例： "自由职业和全职工作的区别是什么？"
- en: 'Why It Works: This method allows you to clearly see the advantages and disadvantages
    of each option, helping you make more informed decisions.'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这有效：这种方法让你清楚地看到每个选项的优点和缺点，帮助你做出更明智的决定。
- en: 'Prompt Structure 4: The Creative Twist Structure'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 提示结构 4：创意转折结构
- en: For creative endeavors, try adding an imaginative spin to make the output more
    distinctive.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 对于创意工作，尝试添加一些富有想象力的元素，使输出更加独特。
- en: 'Example: "Write an inspirational quote as if a pirate were saying it."'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 示例： "像海盗说的一样写一句励志名言。"
- en: 'Why It Works: Injecting creativity into your prompts can produce responses
    that are more entertaining and engaging.'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这有效：在提示中注入创意可以产生更娱乐和吸引人的响应。
- en: 'Prompt Structure 5: The Simplification Structure'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 提示结构 5：简化结构
- en: If the response is too complicated, ask the AI to simplify or clarify it.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 如果响应过于复杂，请要求AI简化或澄清。
- en: 'Example: "Explain blockchain technology in a way that a 10-year-old could grasp."'
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：“用10岁孩子能理解的方式解释区块链技术。”
- en: 'Why It Works: Simplifying complex topics makes them more accessible, especially
    for beginners.'
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么它有效：简化复杂主题使其更易于理解，特别是对于初学者。
- en: 'Chapter 5: Techniques to Craft Expert-Level Prompts'
  id: totrans-406
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第五章：构建专家级别提示的技术
- en: The secret is in the relentless pursuit of excellence. To craft expert-level
    prompts, you need to go beyond the basics. This chapter unveils advanced techniques
    to elevate your interactions with ChatGPT.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 秘诀在于对卓越的持续追求。要构建专家级别的提示，您需要超越基础。本章揭示了提升与ChatGPT互动的先进技术。
- en: The Power of Contextual Prompts
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文提示的力量
- en: Providing the right amount of information is an art. Too little context, and
    the response may feel generic. Too much, and the AI might miss the core intent.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 提供适当的信息量是一种艺术。信息过少，响应可能显得泛泛；信息过多，AI可能会错过核心意图。
- en: 'Technique: Include essential details while keeping the prompt concise.'
  id: totrans-410
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术：在保持提示简洁的同时包含必要细节。
- en: 'Example:'
  id: totrans-411
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Overloaded: “Tell me about digital marketing trends for e-commerce businesses,
    especially small and medium enterprises, focusing on social media, email campaigns,
    and influencer marketing.”'
  id: totrans-412
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过载：“告诉我电子商务企业的数字营销趋势，特别是针对小型和中等企业的，重点关注社交媒体、电子邮件营销和网红营销。”
- en: 'Refined: “What are the top three digital marketing trends for small e-commerce
    businesses in 2025?”'
  id: totrans-413
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化后：“2025年，小型电子商务企业的三大数字营销趋势是什么？”
- en: Using Constraints to Sharpen Output
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 使用限制来提高输出质量
- en: Constraints act as guardrails, helping ChatGPT produce focused and actionable
    responses.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 限制作为护栏，帮助ChatGPT产生专注且可操作的响应。
- en: 'Technique: Set limits on word count, style, or specific formats.'
  id: totrans-416
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术：对字数、风格或特定格式设置限制。
- en: 'Example:'
  id: totrans-417
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Without constraints: “Write a summary of this article.”'
  id: totrans-418
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无限制：“写这篇文章的摘要。”
- en: 'With constraints: “Write a 150-word summary of this article in a conversational
    tone.”'
  id: totrans-419
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在限制条件下：“用对话的语气撰写这篇文章的150字摘要。”
- en: Iterative Refinement
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 迭代优化
- en: Great results often require iteration. ChatGPT can refine its output based on
    your feedback.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 优秀的成果往往需要迭代。ChatGPT可以根据您的反馈来优化其输出。
- en: 'Technique: Request adjustments and provide specific guidance.'
  id: totrans-422
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术：要求调整并提供具体指导。
- en: 'Example:'
  id: totrans-423
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: 'First prompt: “Explain the benefits of AI in healthcare.”'
  id: totrans-424
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一个提示：“解释AI在医疗保健中的好处。”
- en: 'Refinement: “Focus on patient outcomes and cost efficiency in your explanation.”'
  id: totrans-425
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精炼：“在解释时，请专注于患者的结果和成本效率。”
- en: Leveraging Complementary Tools
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 利用互补工具
- en: Integrating ChatGPT with APIs, plugins, or other technologies can supercharge
    its capabilities.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 将ChatGPT与API、插件或其他技术集成可以增强其功能。
- en: 'Technique: Use ChatGPT alongside tools like data analysis platforms or automation
    software for complex workflows.'
  id: totrans-428
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术：将ChatGPT与数据分析平台或自动化软件等工具结合使用，以处理复杂的工作流程。
- en: 'Example:'
  id: totrans-429
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: “Analyze this dataset using Python and explain the trends.”
  id: totrans-430
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “使用Python分析这个数据集，并解释趋势。”
- en: Multi-Step Prompts for Complex Tasks
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂任务的分步提示
- en: Guide ChatGPT through a sequence of steps to tackle intricate challenges.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 引导ChatGPT通过一系列步骤来应对复杂挑战。
- en: 'Example:'
  id: totrans-433
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Step 1: “Draft a business pitch for a sustainable fashion startup.”'
  id: totrans-434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一步：“为可持续时尚初创公司撰写商业提案。”
- en: 'Step 2: “Refine this pitch to emphasize environmental impact and cost efficiency.”'
  id: totrans-435
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二步：“优化这个提案，强调环境影响和成本效率。”
- en: Role-Playing and Scenario-Based Prompts
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 角色扮演和基于场景的提示
- en: Create immersive scenarios to explore ideas or practice skills.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 创建沉浸式场景以探索想法或练习技能。
- en: 'Example:'
  id: totrans-438
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：
- en: “Act as a hiring manager and conduct a mock interview for a software engineer.”
  id: totrans-439
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “扮演招聘经理的角色，为软件工程师进行模拟面试。”
- en: In conclusion, mastering these techniques will empower you to craft prompts
    that push the boundaries of what’s possible with AI, achieving results that are
    not just good—but extraordinary.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，掌握这些技术将使您能够构建推动AI可能性的提示，实现不仅良好——而且是卓越的结果。
- en: 'Chapter 6: Applying Prompts in Everyday Life'
  id: totrans-441
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第六章：在日常生活中应用提示
- en: President Barack Obama once reminded us, “The best way to not feel hopeless
    is to get up and do something.” Prompts are a powerful way to "do something"—whether
    it's enhancing your learning, boosting productivity, or tackling complex problems.
    This chapter explores how prompts can be seamlessly integrated into your daily
    life.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 前总统巴拉克·奥巴马曾提醒我们，“不感到绝望的最好办法是站起来做点什么。”提示是一种强大的“做点什么”的方式——无论是增强你的学习、提高生产力还是解决复杂问题。本章探讨了如何无缝地将提示融入你的日常生活。
- en: Learning and Personal Growth
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 学习和个人成长
- en: Prompts can be a trusted companion on your journey of self-improvement.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 提示可以作为你自我提升旅程中的可靠伴侣。
- en: 'Study Aids: Ask ChatGPT to summarize complex topics or explain concepts in
    a way that resonates with your learning style.'
  id: totrans-445
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习辅助工具：让ChatGPT总结复杂主题或以符合你学习风格的方式解释概念。
- en: 'Example: “Explain Einstein’s theory of relativity as if I were a high school
    student.”'
  id: totrans-446
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“以高中生的角度解释爱因斯坦的相对论。”
- en: 'Skill Acquisition: Use prompts to generate practice exercises or step-by-step
    guides for mastering a new skill.'
  id: totrans-447
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技能获取：使用提示生成练习或逐步指南来掌握新技能。
- en: 'Example: “Create a 30-day learning plan to start coding in Python.”'
  id: totrans-448
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“创建一个30天学习计划，开始学习Python编程。”
- en: 'Habit Building: Craft prompts that help you design and stick to new routines.'
  id: totrans-449
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 建立习惯：设计帮助你设计和坚持新习惯的提示。
- en: 'Example: “Suggest a morning routine for better productivity, with steps I can
    start tomorrow.”'
  id: totrans-450
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“建议一个提高生产力的早晨例行程序，包括我可以从明天开始执行的步骤。”
- en: Professional Use Cases
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 专业应用案例
- en: Prompts can streamline your workflow and make your workday more efficient.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 提示可以简化你的工作流程，让你的工作日更加高效。
- en: 'Writing Emails and Reports: Save time by letting ChatGPT draft professional
    communications.'
  id: totrans-453
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写电子邮件和报告：让ChatGPT起草专业通讯以节省时间。
- en: 'Example: “Draft an email to a client, apologizing for a delayed delivery and
    offering a solution.”'
  id: totrans-454
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“草拟一封致客户的电子邮件，为延迟交付道歉并提出解决方案。”
- en: 'Creating Presentations: Generate outlines, talking points, or even slide content.'
  id: totrans-455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建演示文稿：生成大纲、要点或甚至幻灯片内容。
- en: 'Example: “Outline a presentation on the benefits of cloud computing for small
    businesses.”'
  id: totrans-456
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“概述一个关于云计算对小型企业益处的演示。”
- en: Creative Projects
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 创意项目
- en: Unlock your inner creativity with prompts that inspire and guide your imagination.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 使用启发和引导你想象力的提示来解锁你内心的创造力。
- en: 'Storytelling: Generate story ideas, character sketches, or plot twists.'
  id: totrans-459
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讲故事：生成故事想法、人物草图或情节转折。
- en: 'Example: “Write a short story about a time traveler who accidentally changes
    history.”'
  id: totrans-460
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“写一个关于时间旅行者意外改变历史的故事。”
- en: 'Artwork Ideas: Use ChatGPT to brainstorm concepts for visual art projects.'
  id: totrans-461
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 艺术创意：使用ChatGPT为视觉艺术项目头脑风暴概念。
- en: 'Example: “Suggest themes for a painting series inspired by the four seasons.”'
  id: totrans-462
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“为受四季启发的绘画系列提出主题。”
- en: 'Brainstorming: Collaborate with AI to explore fresh perspectives.'
  id: totrans-463
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 头脑风暴：与AI协作探索新的视角。
- en: 'Example: “Give me 10 innovative ideas for a podcast about sustainability.”'
  id: totrans-464
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“给我10个关于可持续性的播客的创新想法。”
- en: Problem-Solving and Decision-Making
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 问题解决和决策
- en: Prompts can help you think through challenges and arrive at well-informed decisions.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 提示可以帮助你思考挑战并做出明智的决定。
- en: 'Analyzing Data: Summarize findings or identify trends in complex datasets.'
  id: totrans-467
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析数据：总结发现或识别复杂数据集中的趋势。
- en: 'Example: “Explain the key trends in this sales data, focusing on seasonal changes.”'
  id: totrans-468
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“解释这些销售数据中的关键趋势，重点关注季节性变化。”
- en: 'Comparing Options: Weigh pros and cons to make better choices.'
  id: totrans-469
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较选项：权衡利弊以做出更好的选择。
- en: 'Example: “Compare the benefits of remote work versus hybrid work for a marketing
    team.”'
  id: totrans-470
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“比较远程工作和混合工作对营销团队的益处。”
- en: 'Planning: Use prompts to draft project plans or timelines.'
  id: totrans-471
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 规划：使用提示来起草项目计划或时间表。
- en: 'Example: “Create a step-by-step plan for organizing a community fundraiser.”'
  id: totrans-472
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“创建一个组织社区筹款活动的逐步计划。”
- en: Business Applications
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 商业应用
- en: For entrepreneurs and enterprises, prompts can be a game-changer in strategy
    and operations.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 对于企业家和企业来说，提示可以在战略和运营中带来变革。
- en: 'Generating Business Ideas: Brainstorm new ventures tailored to market trends.'
  id: totrans-475
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成商业想法：针对市场趋势头脑风暴新的企业。
- en: 'Example: “Suggest five innovative startup ideas in the field of renewable energy.”'
  id: totrans-476
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“在可再生能源领域提出五个创新初创企业想法。”
- en: 'Optimizing Processes: Use prompts to identify inefficiencies and propose solutions.'
  id: totrans-477
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化流程：使用提示来识别低效并提出解决方案。
- en: 'Example: “Suggest ways to streamline the hiring process for a tech company.”'
  id: totrans-478
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“为科技公司提出简化招聘流程的方法。”
- en: By weaving prompts into your everyday life, you can transform ordinary tasks
    into opportunities for growth, creativity, and success. Like Obama’s call to action,
    prompts empower you to take control and achieve meaningful outcomes.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将提示融入你的日常生活，你可以将普通任务转化为成长、创造力和成功的机会。就像奥巴马的行动号召一样，提示赋予你掌控权，实现有意义的成果。
- en: 'Chapter 7: Exercises to Level Up Your Prompting Skills'
  id: totrans-480
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第七章：提升你的提示技能练习
- en: As Albert Einstein once said, "The only source of knowledge is experience."
    In this chapter, we embrace the wisdom of hands-on learning. These exercises are
    crafted to challenge your creativity, enhance your problem-solving, and refine
    your prompting skills. Each activity is an opportunity to unlock the full potential
    of ChatGPT—whether you’re addressing simple tasks or tackling complex scenarios.
    Let’s dive in and level up your expertise.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 如爱因斯坦曾说过，“知识的唯一来源是经验。”在本章中，我们拥抱实践学习的智慧。这些练习旨在挑战你的创造力，增强你的问题解决能力，并精炼你的提示技能。每个活动都是解锁ChatGPT全部潜能的机会——无论你是处理简单任务还是应对复杂场景。让我们深入其中，提升你的专业知识。
- en: 'Prompt Labs: Start Simple'
  id: totrans-482
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示实验室：从简单开始
- en: Practice Crafting Prompts for Basic Tasks
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 练习为基本任务制作提示
- en: 'Think of these exercises as your warm-up routine before the main event. The
    goal is to master the fundamentals of clarity and intent. Try these:'
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 将这些练习视为你主要活动前的热身。目标是掌握清晰和意图的基本要素。尝试以下练习：
- en: 'Writing Assistance: Ask ChatGPT to draft a professional email inviting someone
    to a meeting.'
  id: totrans-485
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写作辅助：请求ChatGPT草拟一封邀请某人参加会议的专业电子邮件。
- en: 'Example Prompt: "Write a formal email inviting a colleague to a meeting about
    Q1 sales strategies on Tuesday at 10 AM."'
  id: totrans-486
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例提示：“写一封正式电子邮件，邀请同事于周二上午10点参加关于Q1销售策略的会议。”
- en: 'Learning Aid: Request a simple explanation of a complex concept, like quantum
    physics or blockchain.'
  id: totrans-487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 学习辅助：请求对复杂概念（如量子物理或区块链）进行简单解释。
- en: 'Example Prompt: "Explain blockchain technology in simple terms for a beginner."'
  id: totrans-488
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例提示：“用简单的话向初学者解释区块链技术。”
- en: 'Challenge Yourself: Complex Scenarios'
  id: totrans-489
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 挑战自我：复杂场景
- en: Solve Real-World Problems Using Structured Prompts
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 使用结构化提示解决现实世界问题
- en: 'Now that you’ve mastered the basics, it’s time to tackle more intricate challenges.
    Use these exercises to hone your ability to break down big problems into manageable
    parts:'
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经掌握了基础知识，是时候应对更复杂的挑战了。使用这些练习来磨练你将大问题分解为可管理部分的能力：
- en: 'Problem-Solving Task: Develop a plan for reducing office waste by 30% within
    six months.'
  id: totrans-492
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决任务：制定在六个月内将办公室浪费减少30%的计划。
- en: 'Example Prompt: "Help me create a six-month plan to reduce office waste by
    30%. Include strategies for recycling, reducing paper use, and engaging employees."'
  id: totrans-493
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例提示：“帮我制定一个六个月内将办公室浪费减少30%的计划。包括回收、减少纸张使用和激励员工的战略。”
- en: 'Business Planning: Outline a business plan for a sustainable coffee shop.'
  id: totrans-494
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 商业规划：概述一个可持续咖啡店的商业计划。
- en: 'Example Prompt: "Draft a business plan for a sustainable coffee shop. Include
    target audience, location considerations, menu ideas, and marketing strategies."'
  id: totrans-495
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例提示：“草拟一个可持续咖啡店的商业计划。包括目标受众、地点考虑、菜单想法和营销策略。”
- en: 'Advanced Exercises: Business Planning'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 高级练习：商业规划
- en: 'Take it further by tackling high-level scenarios:'
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 通过应对高级场景来更进一步：
- en: 'Prompt: "Imagine I’m launching a tech startup focused on AI-driven education.
    What should my business model and initial product roadmap look like?"'
  id: totrans-498
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示：“想象我正在推出一个专注于AI驱动教育的科技初创公司。我的商业模式和初始产品路线图应该是什么样的？”
- en: Creativity Boosters
  id: totrans-499
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创意激发器
- en: Generate Unexpected and Innovative Results with Creative Prompts
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 通过创意提示产生意外和创新的结果
- en: 'Creativity isn’t a skill; it’s a muscle. Strengthen yours with these exercises:'
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 创造力不是一种技能；它是一块肌肉。通过这些练习来加强你的创造力：
- en: 'Storytelling Challenge: Write a short story inspired by the prompt: "A world
    where humans communicate telepathically."'
  id: totrans-502
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 叙事挑战：根据提示写一个短故事：“一个人类通过心灵感应交流的世界。”
- en: 'Example Prompt: "Create a short story set in a world where telepathic communication
    is the norm. Focus on the societal impact of this ability."'
  id: totrans-503
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例提示：“在一个心灵感应交流是常态的世界中创作一个短故事。关注这种能力对社会的影响。”
- en: 'Artistic Brainstorming: Develop ideas for an abstract painting series based
    on emotions.'
  id: totrans-504
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 艺术性头脑风暴：基于情感开发抽象绘画系列的想法。
- en: 'Example Prompt: "Describe a series of abstract paintings, each representing
    an emotion like joy, fear, or nostalgia."'
  id: totrans-505
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例提示：描述一系列抽象画作，每幅画作代表一种情感，如快乐、恐惧或怀旧。
- en: 'Creativity Challenge: Write a Fascinating Story'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 创意挑战：写一个引人入胜的故事
- en: 'Take your storytelling up a notch:'
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 提升你的故事叙述水平：
- en: 'Prompt: "Write a 500-word story about a character who discovers a portal to
    a parallel universe hidden in their attic."'
  id: totrans-508
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过于复杂的提示：在一个提示中包含太多细节可能会使系统不知所措。
- en: What do you get?
  id: totrans-509
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你能得到什么？
- en: Remember, practice makes perfect. The more you engage with these exercises,
    the sharper your prompting skills will become. Whether you’re tackling professional
    challenges or exploring your creativity, each prompt you craft is a step toward
    mastery.
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，熟能生巧。你参与这些练习越多，你的提示技巧就会越敏锐。无论你是应对职业挑战还是探索你的创造力，你制作的每一个提示都是向精通迈进的一步。
- en: 'Chapter 8: Prompting Pitfalls & How to Overcome Them'
  id: totrans-511
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第8章：提示陷阱及如何克服
- en: '"Success is stumbling from failure to failure with no loss of enthusiasm,"
    Winston Churchill once said. As you navigate your journey toward mastering prompts,
    you’ll encounter roadblocks and missteps. That’s not just part of the process—it’s
    the essence of learning. This chapter explores the common pitfalls in prompting
    and equips you with strategies to overcome them, ensuring that each setback becomes
    a steppingstone.'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: “成功就是从失败到失败，但热情不减，”温斯顿·丘吉尔曾经说过。在你向掌握提示的旅程中，你会遇到障碍和失误。这不仅只是过程的一部分——这是学习的本质。本章探讨了提示中的常见陷阱，并为你提供了克服它们的策略，确保每一次挫折都成为垫脚石。
- en: Common Errors Beginners Make
  id: totrans-513
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 初学者常见的错误
- en: Miscommunication and Over-Complication
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 沟通不畅和过度复杂化
- en: 'New users often fall into the trap of crafting prompts that are either too
    vague or overly complicated. These mistakes can lead to confusion and subpar results.
    Let’s break it down:'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 新用户往往陷入制作过于模糊或过于复杂的提示的陷阱。这些错误可能导致困惑和结果不佳。让我们来分析一下：
- en: 'Vague Prompts: A lack of clarity can result in ChatGPT delivering irrelevant
    or generic responses.'
  id: totrans-516
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模糊提示：缺乏清晰性可能导致ChatGPT提供不相关或通用的响应。
- en: 'Example of a Vague Prompt: "Tell me about history."'
  id: totrans-517
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模糊提示的例子：“告诉我关于历史的事情。”
- en: 'Improved Prompt: "Provide a summary of the causes and outcomes of the American
    Civil War."'
  id: totrans-518
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改进提示：“提供美国内战原因和结果的总结。”
- en: 'Overly Complex Prompts: Packing too many details into a single prompt can overwhelm
    the system.'
  id: totrans-519
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示：“写一篇500字的故事，讲述一个角色在他们阁楼上发现通往平行宇宙的门户。”
- en: 'Example of a Complex Prompt: "Write a detailed essay on the impact of climate
    change on global agriculture, including case studies from at least three continents
    and projections for the next 50 years."'
  id: totrans-520
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复杂提示的例子：“撰写一篇关于气候变化对全球农业影响的详细论文，包括至少三个大陆的案例研究和对未来50年的预测。”
- en: 'Improved Approach: Break it into parts:'
  id: totrans-521
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改进方法：将其分解成部分：
- en: '"Summarize the impact of climate change on global agriculture."'
  id: totrans-522
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “总结气候变化对全球农业的影响。”
- en: '"Provide case studies from Africa, Asia, and Europe."'
  id: totrans-523
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “提供来自非洲、亚洲和欧洲的案例研究。”
- en: '"Share projections for agriculture in the next 50 years."'
  id: totrans-524
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “分享对未来50年农业的预测。”
- en: Overcoming These Errors
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 克服这些错误
- en: Focus on clarity and specificity. Clearly define your intent and break complex
    queries into smaller, manageable tasks.
  id: totrans-526
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专注于清晰性和具体性。明确定义你的意图，并将复杂的查询分解成更小、更易管理的任务。
- en: Practice crafting prompts for different scenarios to understand how ChatGPT
    interprets them.
  id: totrans-527
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 练习为不同场景制作提示，以了解ChatGPT如何解释它们。
- en: When ChatGPT “Doesn’t Get It”
  id: totrans-528
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当ChatGPT“不理解”时
- en: 'Even with a well-crafted prompt, there are times when ChatGPT doesn’t quite
    hit the mark. This doesn’t mean you’ve failed; it means you’re refining your approach.
    Here’s how to troubleshoot and adjust:'
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是精心设计的提示，有时ChatGPT也无法完全击中要点。这并不意味着你失败了；这意味着你正在改进你的方法。以下是如何进行故障排除和调整：
- en: 'Analyze the Response: Review the output critically. Ask yourself:'
  id: totrans-530
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分析响应：批判性地审查输出。问问自己：
- en: Is it missing context?
  id: totrans-531
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是否缺少上下文？
- en: Is it too generic or too specific?
  id: totrans-532
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是否过于通用或过于具体？
- en: 'Refine Your Prompt: Adjust your wording to guide ChatGPT more effectively.'
  id: totrans-533
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精炼你的提示：调整措辞以更有效地引导ChatGPT。
- en: 'Original Prompt: "Explain the universe."'
  id: totrans-534
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 原始提示：解释宇宙。
- en: 'Refined Prompt: "Explain the Big Bang Theory in simple terms for a high school
    student."'
  id: totrans-535
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精炼提示：用简单的话向高中生解释大爆炸理论。
- en: 'Ask for Clarification or Reiteration: Use ChatGPT’s iterative capabilities.'
  id: totrans-536
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求澄清或重述：使用ChatGPT的迭代功能。
- en: 'Example: "Can you elaborate on the point about gravitational waves?"'
  id: totrans-537
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例："你能详细说明关于引力波的观点吗？"
- en: 'Provide Additional Context: Supply more details to narrow down the scope.'
  id: totrans-538
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供额外的上下文：提供更多细节以缩小范围。
- en: 'Example: "Focus on how gravitational waves are detected using LIGO."'
  id: totrans-539
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例："关注如何使用LIGO检测引力波。"
- en: Balancing Precision and Flexibility
  id: totrans-540
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 平衡精确性和灵活性
- en: Knowing When to Be Specific
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: 知道何时具体化
- en: Precision is key when you have a clear outcome in mind. Specific prompts minimize
    ambiguity and yield focused results.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 当你心中有一个清晰的成果时，精确性至关重要。具体的提示可以减少歧义，并产生专注的结果。
- en: 'Example of Precision: "Write a 500-word blog post on how startups can use AI
    for customer engagement."'
  id: totrans-543
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精确性示例："撰写一篇500字的博客文章，探讨初创公司如何利用AI进行客户互动。"
- en: When to Allow Creativity
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 何时允许创造性
- en: Flexibility can lead to unexpected and innovative results. If you’re brainstorming
    or exploring ideas, leave room for ChatGPT’s creative input.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 灵活性可能导致意想不到的创新结果。如果你在进行头脑风暴或探索想法，请为ChatGPT的创造性输入留出空间。
- en: 'Example of Flexibility: "Suggest three innovative ways AI could improve urban
    living."'
  id: totrans-546
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 灵活性示例："建议三种AI可以改善城市生活的创新方式。"
- en: Finding the Balance
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找平衡
- en: A great prompt often blends precision with flexibility. Provide enough structure
    to guide the response, but allow room for creative interpretation.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 一个优秀的提示通常将精确性与灵活性相结合。提供足够的结构来引导回答，但也要留出空间供创造性解释。
- en: 'Balanced Prompt: "Imagine you’re a futurist. Describe how AI might transform
    education in the next 20 years, focusing on both challenges and opportunities."'
  id: totrans-549
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平衡提示："想象你是一位未来学家。描述AI在未来20年内如何改变教育，关注挑战和机遇。"
- en: In the words of Churchill, "To each, there comes in their lifetime a special
    moment when they are figuratively tapped on the shoulder and offered the chance
    to do a very special thing." Mastering the art of prompting is your moment. Embrace
    the learning curve, refine your approach, and remember that every misstep brings
    you closer to mastery.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 用丘吉尔的话说，“在每个人的生命中，都有一个特殊的时刻，他们被象征性地拍在肩膀上，并有机会做一件非常特别的事情。”掌握提示的艺术就是你的时刻。拥抱学习曲线，完善你的方法，并记住每一次失误都让你更接近精通。
- en: 'Chapter 9: Advanced Prompting Strategies'
  id: totrans-551
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第9章：高级提示策略
- en: '"Innovation distinguishes between a leader and a follower," said Steve Jobs.
    In this chapter, we delve into the realm of advanced prompting strategies, where
    creativity meets technical mastery. Whether you’re a seasoned user or an aspiring
    expert, these techniques will empower you to push the boundaries of what’s possible
    with ChatGPT.'
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: '"创新区分了领导者和追随者"，史蒂夫·乔布斯曾这样说过。在本章中，我们深入探讨高级提示策略的领域，在这里创造性与技术精通相遇。无论你是经验丰富的用户还是渴望成为专家的人，这些技巧都将赋予你推动ChatGPT可能性的边界。'
- en: Prompt Engineering Basics
  id: totrans-553
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示工程基础
- en: Techniques for Technical and Power Users
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 技术和高级用户的技术
- en: 'Advanced prompting is both an art and a science. To harness ChatGPT’s full
    potential, precision and intention are key. Here are foundational techniques:'
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 高级提示既是一门艺术也是一门科学。为了充分发挥ChatGPT的潜力，精确性和意图是关键。以下是一些基础技巧：
- en: 'Define the Goal First: Know what you want before you ask. Clear intent leads
    to clear results.'
  id: totrans-556
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首先定义目标：在提问之前知道你想要什么。清晰的意图导致清晰的结果。
- en: 'Example: Instead of "Explain technology," use "Describe the impact of blockchain
    technology on supply chains in 300 words."'
  id: totrans-557
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：与其说"解释技术"，不如说"用300字描述区块链技术对供应链的影响。"
- en: 'Utilize Multi-Step Prompts: Break down complex tasks into logical steps.'
  id: totrans-558
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利用多步提示：将复杂任务分解为逻辑步骤。
- en: 'Step 1: "List the main features of blockchain technology."'
  id: totrans-559
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第1步："列出区块链技术的主要功能。"
- en: 'Step 2: "Explain how these features improve supply chain efficiency."'
  id: totrans-560
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第2步："解释这些功能如何提高供应链效率。"
- en: 'Layer Prompts for Precision: Build on previous outputs by refining or redirecting.'
  id: totrans-561
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 层次化提示以实现精确性：通过细化或重新引导来构建在先前的输出之上。
- en: 'Example: "Summarize this report in bullet points," followed by, "Expand on
    the second bullet with examples."'
  id: totrans-562
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例："用项目符号总结这份报告"，然后，“用例子扩展第二个项目符号。”
- en: 'Experiment with Formatting: Use structure to guide responses.'
  id: totrans-563
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尝试格式化：使用结构来引导回答。
- en: 'Example: "Provide a SWOT analysis of AI adoption in healthcare."'
  id: totrans-564
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例："提供一份关于医疗保健中AI应用的SWOT分析。"
- en: Leveraging ChatGPT’s Memory
  id: totrans-565
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用ChatGPT的记忆功能
- en: Using Conversation History to Build on Context
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 使用对话历史构建上下文
- en: 'ChatGPT’s conversational memory allows for dynamic and nuanced interactions.
    Here’s how to maximize it:'
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的对话记忆功能允许动态和细微的交互。以下是如何最大化它的方法：
- en: 'Maintain Continuity: Reference earlier parts of the conversation to build depth.'
  id: totrans-568
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持连贯：引用对话的早期部分以增加深度。
- en: 'Example: "Based on the marketing strategies we discussed earlier, suggest a
    campaign idea."'
  id: totrans-569
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例："基于我们之前讨论的市场策略，提出一个活动想法。"
- en: 'Clarify Context: If ChatGPT’s response seems off, realign it with a prompt
    like:'
  id: totrans-570
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确上下文：如果ChatGPT的回复看起来不合适，可以使用以下提示重新调整：
- en: '"Remember, we’re focusing on small businesses with limited budgets."'
  id: totrans-571
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '"记住，我们专注于预算有限的中小企业。"'
- en: 'Reuse and Refine: Use prior outputs as the basis for further development.'
  id: totrans-572
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复利用和精炼：将先前输出作为进一步发展的基础。
- en: 'Example: "Expand on this outline to create a full blog post."'
  id: totrans-573
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例："在此基础上扩展大纲以创建完整的博客文章。"
- en: 'Set Boundaries: Explicitly state when to ignore prior context for a fresh start.'
  id: totrans-574
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设定边界：明确指出何时忽略先前上下文以从头开始。
- en: 'Example: "Ignore our previous discussion and focus on technical applications
    of AI."'
  id: totrans-575
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例："忽略我们之前的讨论，专注于AI的技术应用。"
- en: Integrating APIs and Automation
  id: totrans-576
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集成API和自动化
- en: Expanding ChatGPT’s Capabilities with External Tools
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 使用外部工具扩展ChatGPT的功能
- en: To truly unlock the potential of ChatGPT, integrate it with APIs and automation
    platforms like Zapier or custom scripts. This approach allows you to scale and
    streamline tasks.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 要真正释放ChatGPT的潜力，请将其与Zapier或自定义脚本等API和自动化平台集成。这种方法允许你扩展和简化任务。
- en: 'I also wrote an exciting book named “Agentic AI Mastery: How to Build Multi-AI
    Agent Systems, 100x Productivity & Transform Your Life Forever” that guides you
    step-by-step in building your own multi-AI agent system. If you give it a read
    and set up your own team of AI agents, I truly believe your productivity could
    skyrocket—10x, even 100x. It might just be the game-changer that transforms your
    entire life.'
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 我还写了一本名为《代理式AI精通：如何构建多AI代理系统，100倍生产力并永远改变你的生活》的激动人心的书籍，它将指导你一步步构建自己的多AI代理系统。如果你阅读它并建立自己的AI代理团队，我真心相信你的生产力可能会飙升——10倍，甚至100倍。它可能正是改变你整个生活的游戏改变者。
- en: '![A poster with a picture of a robot  AI-generated content may be incorrect.](image_rsrc2NM.jpg)'
  id: totrans-580
  prefs: []
  type: TYPE_IMG
  zh: '![一张带有机器人图片的海报 AI生成的内容可能是不正确的。](image_rsrc2NM.jpg)'
- en: 'What you can/should do:'
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以/应该做什么：
- en: 'Automate Repetitive Tasks: Use ChatGPT to generate content or perform analyses
    programmatically.'
  id: totrans-582
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动化重复性任务：使用ChatGPT生成内容或进行程序化分析。
- en: 'Example: Automate customer support replies using a ChatGPT-powered API.'
  id: totrans-583
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：使用由ChatGPT驱动的API自动化客户支持回复。
- en: 'Combine with Data Sources: Feed external data to enhance context and relevance.'
  id: totrans-584
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结合数据源：将外部数据输入以增强上下文和相关性。
- en: 'Example: "Analyze this CSV file of customer reviews and summarize key trends."'
  id: totrans-585
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例："分析这份客户评价的CSV文件并总结关键趋势。"
- en: 'Create Multi-System Workflows: Connect ChatGPT with other software for seamless
    operations.'
  id: totrans-586
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建多系统工作流程：将ChatGPT与其他软件连接以实现无缝操作。
- en: 'Example: Use ChatGPT to draft emails, then integrate with an email marketing
    platform for distribution.'
  id: totrans-587
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：使用ChatGPT起草电子邮件，然后与电子邮件营销平台集成进行分发。
- en: 'Custom Fine-Tuning: Adjust ChatGPT’s behavior for domain-specific needs through
    API settings or custom-trained models.'
  id: totrans-588
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定制微调：通过API设置或自定义训练模型调整ChatGPT的行为以满足特定领域的需求。
- en: As Steve Jobs believed, "The people who are crazy enough to think they can change
    the world are the ones who do." By mastering these advanced prompting strategies,
    you’re not just using ChatGPT—you’re shaping how it impacts your world. Embrace
    the challenge, experiment boldly, and remember that innovation lies at the intersection
    of curiosity and perseverance.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 如史蒂夫·乔布斯所信，"那些疯狂到认为自己可以改变世界的人，才是真正改变世界的人。" 通过掌握这些高级提示策略，你不仅在使用ChatGPT，你还在塑造它对你世界的影响。接受挑战，大胆实验，并记住创新源于好奇心和毅力。
- en: 'Chapter 10: Crafting Business-Driven Prompts'
  id: totrans-590
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第10章：构建以业务为导向的提示
- en: As Elon Musk once said, "The first step is to establish that something is possible;
    then probability will occur," and Bill Gates wisely noted, "Your most unhappy
    customers are your greatest source of learning”. In this chapter, we delve into
    how businesses—whether startups or multinational giants—can leverage the potential
    of strategically crafted prompts to drive growth, enhance efficiency, and foster
    innovation. From startups to global corporations, prompts are the key to thriving
    in the AI era, so make AI a business partner of yours.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 就像埃隆·马斯克曾经说的，“第一步是确立某事是可能的；然后概率就会发生，”以及比尔·盖茨明智地指出，“你最不快乐的客户是你最大的学习来源。”在本章中，我们深入探讨企业——无论是初创企业还是跨国巨头——如何利用精心设计的提示潜力来推动增长、提高效率和促进创新。从初创企业到全球公司，提示是繁荣于人工智能时代的钥匙，所以让AI成为你的商业伙伴。
- en: '![A poster of a robot holding a person''s money bag  Description automatically
    generated](image_rsrc2NN.jpg)'
  id: totrans-592
  prefs: []
  type: TYPE_IMG
  zh: '![一个机器人拿着一个人的钱袋的海报，描述自动生成](image_rsrc2NN.jpg)'
- en: 1\. The Role of Prompts in Modern Business
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 提示在现代商业中的作用
- en: Why Prompts Are the Secret Weapon for Businesses in the AI Era
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么提示是人工智能时代企业秘密武器的关键
- en: Prompts allow businesses to extract precise, actionable insights from AI tools
    like ChatGPT. They bridge the gap between complex challenges and elegant solutions,
    streamlining operations and amplifying creativity.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 提示使企业能够从ChatGPT等AI工具中提取精确、可操作的观点。它们在复杂挑战和优雅解决方案之间架起桥梁，简化运营并增强创造力。
- en: 'Case Studies: How Startups and Corporations Leverage ChatGPT to Scale Faster'
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究：初创企业和企业如何利用ChatGPT更快地扩展规模
- en: A marketing agency reduced content creation time by 50% using targeted prompts.
  id: totrans-597
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一家营销机构通过使用有针对性的提示将内容创作时间减少了50%。
- en: A tech startup developed three product prototypes in one week by brainstorming
    with ChatGPT.
  id: totrans-598
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一家科技初创公司通过与ChatGPT头脑风暴，在一周内开发了三个产品原型。
- en: The Art of Asking the Right Questions to Drive Growth and Innovation
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 提问的艺术，以驱动增长和创新
- en: Effective business prompts focus on clarity and intent, unlocking AI’s potential
    to address specific pain points and generate transformative ideas.
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的商业提示专注于清晰性和意图，解锁AI解决特定痛点并产生变革性想法的潜力。
- en: 2\. Generating Business Ideas and Strategies
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 生成商业想法和策略
- en: Prompts for Brainstorming Innovative Products or Services
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 用于头脑风暴创新产品或服务的提示
- en: 'Example: “Suggest 5 unique business ideas in the eco-friendly fashion industry.”'
  id: totrans-603
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“为环保时尚行业提出5个独特的商业想法。”
- en: Crafting a Winning Value Proposition with Prompts
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示制定获胜的价值主张
- en: 'Example: “Help me define a unique selling proposition for a vegan restaurant
    targeting young professionals.”'
  id: totrans-605
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“帮助我为针对年轻专业人士的纯素餐厅定义一个独特的卖点。”
- en: Writing Prompts for Competitive Analysis and Market Research
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 竞争分析和市场研究提示写作
- en: 'Example: “What are the strengths and weaknesses of starting an online bookstore
    in 2025?”'
  id: totrans-607
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“在2025年开设在线书店的优势和劣势是什么？”
- en: 3\. Optimizing Daily Operations with Prompts
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 使用提示优化日常运营
- en: Prompts for Creating Efficient Workflows
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 用于创建高效工作流程的提示
- en: 'Example: “Draft a weekly task schedule for a marketing team with 3 members.”'
  id: totrans-610
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“为拥有3名成员的营销团队制定一份每周任务日程。”
- en: Streamlining Team Communication and Decision-Making
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 简化团队沟通和决策
- en: 'Example: “Suggest a format for a weekly team meeting to review progress and
    set new goals.”'
  id: totrans-612
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“建议一种每周团队会议的格式，以审查进度并设定新目标。”
- en: Delegating Tasks to ChatGPT for Faster Execution
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 将任务委托给ChatGPT以加快执行
- en: 'Example: “Summarize this 10-page business proposal into 5 bullet points for
    an investor pitch.”'
  id: totrans-614
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“将这份10页的商业提案总结成5个要点，用于投资者演示。”
- en: 4\. Enhancing Marketing and Customer Engagement
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 提升营销和客户参与度
- en: Prompts for Crafting High-Converting Ads and Email Campaigns
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 用于制作高转化率广告和电子邮件营销活动的提示
- en: 'Example: “Write a persuasive email promoting a 50% discount on our new fitness
    program.”'
  id: totrans-617
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“撰写一封有说服力的电子邮件，推广我们新健身计划的50%折扣。”
- en: Social Media Strategies Powered by Prompts
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 由提示驱动的社交媒体策略
- en: 'Example: “Suggest 3 Instagram captions for a luxury skincare product launch.”'
  id: totrans-619
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“为奢华护肤产品发布提出3个Instagram标题。”
- en: Using Prompts for Personalized Customer Support
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示进行个性化客户支持
- en: 'Example: “Draft a polite response to a customer complaining about late delivery.”'
  id: totrans-621
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“起草一份礼貌的回复，回应客户对延迟交付的投诉。”
- en: 5\. Financial Planning and Analysis with Prompts
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 使用提示进行财务规划和分析
- en: Writing Prompts for Budget Creation and Expense Tracking
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 为预算编制和费用跟踪编写提示
- en: 'Example: “Help me create a monthly budget for a startup with $10,000 initial
    funding.”'
  id: totrans-624
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“帮助我为初始资金为 10,000 美元的初创企业创建月度预算。”
- en: Forecasting and Profitability Analysis
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 预测和盈利能力分析
- en: 'Example: “Provide a simple 12-month revenue projection for a subscription box
    service.”'
  id: totrans-626
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“为订阅盒服务提供一个简单的 12 个月收入预测。”
- en: Investment Prompts for Startups
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 为初创企业提供投资提示
- en: 'Example: “What are the risks and benefits of investing in AI-driven solutions
    in 2025?”'
  id: totrans-628
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“在 2025 年投资人工智能驱动的解决方案的风险和好处是什么？”
- en: 6\. Scaling Your Business with Advanced Prompts
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 使用高级提示扩展您的业务
- en: Prompts for Growth Hacking and Scaling Strategies
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 用于增长黑客和扩展策略的提示
- en: 'Example: “Suggest 3 scalable growth strategies for an e-commerce business selling
    handmade products.”'
  id: totrans-631
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“为销售手工产品的电子商务业务提出 3 个可扩展的增长策略。”
- en: Using Prompts to Navigate International Expansion
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 使用提示来导航国际扩张
- en: 'Example: “What are the key factors to consider when launching a business in
    Europe?”'
  id: totrans-633
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“在欧洲开设企业时，需要考虑哪些关键因素？”
- en: Integrating Prompts with Automation Tools to Save Time and Resources
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 将提示与自动化工具集成以节省时间和资源
- en: Prompts combined with platforms like Zapier or custom APIs enable seamless workflows,
    reducing manual effort and enhancing scalability.
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 将提示与 Zapier 或自定义 API 等平台结合使用，可实现无缝工作流程，减少人工努力并提高可扩展性。
- en: 7\. Common Mistakes in Business Prompting and How to Avoid Them
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 商业提示中的常见错误及其避免方法
- en: Failing to Provide Enough Context or Details
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 未提供足够的前置信息或细节
- en: 'Example: “What’s a good marketing strategy?” → Too vague.'
  id: totrans-638
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：“一个好的营销策略是什么？”→ 太模糊。
- en: Overloading the Prompt with Unnecessary Information
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 提示中包含不必要的信息过多
- en: Long, convoluted prompts can confuse the AI and dilute results. Focus on clarity.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 长而复杂的提示可能会使人工智能困惑并稀释结果。专注于清晰度。
- en: Misaligning the Prompt with Business Goals
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: 提示与商业目标不一致
- en: Ensure prompts directly address the objectives and challenges at hand.
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 确保提示直接针对手头的目标和挑战。
- en: '8\. Practice: Business Prompt Challenges'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 练习：商业提示挑战
- en: 'Challenge 1: Crafting Prompts to Build a Business Plan for a Fictional Startup'
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战 1：为虚构初创企业制定商业计划的提示
- en: 'Task: Use prompts to create a mission statement, SWOT analysis, and financial
    projection for an AI-driven fitness app.'
  id: totrans-645
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务：使用提示创建一个由人工智能驱动的健身应用的使命宣言、SWOT 分析和财务预测。
- en: 'Challenge 2: Writing an Investor Pitch Prompt to Summarize Your Company’s Vision'
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战 2：编写投资者演讲提示以总结您的公司愿景
- en: 'Task: “Summarize our mission, market opportunity, and unique value proposition
    in a persuasive 2-minute pitch.”'
  id: totrans-647
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务：“用有说服力的 2 分钟演讲总结我们的使命、市场机会和独特的价值主张。”
- en: 'Challenge 3: Using Prompts to Solve a Common Business Problem, Like Customer
    Retention'
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战 3：使用提示来解决常见商业问题，例如客户保留
- en: 'Task: “What are 3 customer retention strategies for a subscription box business?”'
  id: totrans-649
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务：“为订阅盒业务提出 3 个客户保留策略。”
- en: 9\. Prompt Templates for Entrepreneurs and Businesses
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 为企业家和企业提供的提示模板
- en: A Collection of Ready-to-Use Prompts Tailored for Various Business Needs
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 针对不同商业需求量身定制的现成提示集合
- en: 'Marketing Campaigns: “Draft a social media post promoting our latest product
    launch.”'
  id: totrans-652
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 营销活动：“起草一篇宣传我们最新产品发布的社交媒体帖子。”
- en: 'Customer Support Scripts: “Write a polite apology email for a delayed order.”'
  id: totrans-653
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户支持脚本：“为延迟订单写一封礼貌的道歉电子邮件。”
- en: 'Financial Planning Guides: “Help me outline a cost-cutting plan for a restaurant
    during a slow season.”'
  id: totrans-654
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 财务规划指南：“帮助我概述在淡季期间为餐厅制定的削减成本计划。”
- en: 'Team Management Tools: “Suggest a framework for tracking team productivity.”'
  id: totrans-655
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 团队管理工具：“建议一个跟踪团队生产力的框架。”
- en: In conclusion, mastering business-driven prompts transforms ChatGPT from a mere
    tool into a strategic partner. By continually refining your skills, you’ll unlock
    the ability to innovate, adapt, and thrive in an AI-powered world—proving that
    the future belongs to those who ask the right questions.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，掌握以业务为导向的提示将使 ChatGPT 从一个普通工具转变为战略合作伙伴。通过不断磨练您的技能，您将解锁在人工智能驱动的世界中创新、适应和繁荣的能力——证明未来属于那些提出正确问题的人。
- en: 'Chapter 11: The Future of Prompts and AI Interaction'
  id: totrans-657
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第 11 章：提示和人工智能交互的未来
- en: How AI is Evolving
  id: totrans-658
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能是如何发展的
- en: Artificial Intelligence continues to grow at an unprecedented pace, revolutionizing
    industries, reshaping workflows, and redefining human potential. As AI evolves,
    the interaction between humans and machines is becoming increasingly seamless
    and intuitive. At the heart of this evolution lies the prompt—a bridge connecting
    human intent with AI capability.
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正以前所未有的速度增长，变革着行业，重塑着工作流程，重新定义着人类的潜能。随着人工智能的发展，人类与机器之间的交互正变得越来越无缝和直观。这种演变的中心是提示——一座连接人类意图与人工智能能力的桥梁。
- en: '![A person with a brain inside  Description automatically generated](image_rsrc2NP.jpg)'
  id: totrans-660
  prefs: []
  type: TYPE_IMG
  zh: '![一个大脑内部的图像  描述自动生成](image_rsrc2NP.jpg)'
- en: The role of prompts is pivotal in this transformation. As AI systems become
    more sophisticated, their ability to generate nuanced, contextually rich responses
    hinges on the quality of the instructions they receive. Prompts are no longer
    simple questions; they are strategic inputs that shape the trajectory of AI’s
    output. In the future, we can expect prompts to adapt dynamically, leveraging
    advanced natural language processing to anticipate user needs and preemptively
    deliver solutions.
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 提示在这个转型中扮演着至关重要的角色。随着人工智能系统变得更加复杂，它们生成细微、语境丰富的响应的能力取决于它们所接收的指令质量。提示不再仅仅是简单的问题；它们是战略性的输入，塑造了人工智能输出的轨迹。在未来，我们可以期待提示能够动态适应，利用高级自然语言处理来预测用户需求并主动提供解决方案。
- en: 'Beyond current applications, prompts are likely to play a central role in emerging
    AI trends, including:'
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 除了当前的应用，提示很可能会在新兴的人工智能趋势中扮演核心角色，包括：
- en: Conversational agents that rival human-like interactions.
  id: totrans-663
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与人类交互相媲美的对话代理。
- en: Multimodal AI systems capable of integrating text, visuals, and audio seamlessly.
  id: totrans-664
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够无缝整合文本、视觉和音频的多模态人工智能系统。
- en: Real-time AI assistants that provide actionable insights during live scenarios.
  id: totrans-665
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实时场景中提供可操作见解的实时人工智能助手。
- en: Why Prompting Will Always Be a Core Skill
  id: totrans-666
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么提示将始终是一项核心技能
- en: 'In an AI-driven world, the ability to craft effective prompts will be as critical
    as literacy in previous centuries. Here’s why:'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个由人工智能驱动的世界中，构建有效提示的能力将和前几个世纪中的读写能力一样关键。原因如下：
- en: 'Empowering Creativity and Problem-Solving: Prompts unlock the full potential
    of AI, enabling users to tackle challenges and explore creative solutions that
    were once beyond their reach. Whether you’re an artist seeking inspiration or
    a business professional optimizing strategies, mastering prompts will empower
    you to harness AI effectively.'
  id: totrans-668
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 激发创造力和解决问题的能力：提示释放了人工智能的全部潜力，使用户能够应对挑战和探索曾经遥不可及的创造性解决方案。无论是寻求灵感的艺术家还是优化策略的商业专业人士，掌握提示将使您能够有效地利用人工智能。
- en: 'Navigating a Rapidly Changing Landscape: AI technology is advancing at breakneck
    speed. By understanding the art of prompting, individuals and organizations can
    stay ahead of the curve, ensuring they remain competitive and relevant in their
    fields.'
  id: totrans-669
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在快速变化的领域中导航：人工智能技术正以惊人的速度发展。通过理解提示的艺术，个人和组织可以保持领先，确保他们在各自的领域保持竞争力和相关性。
- en: 'Fostering Collaboration Between Humans and Machines: Effective prompts create
    a symbiotic relationship between users and AI, where both parties contribute to
    achieving desired outcomes. This collaboration will be essential as AI systems
    become integral to everyday life.'
  id: totrans-670
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 促进人类与机器之间的协作：有效的提示在用户和人工智能之间建立了共生关系，双方共同为达成预期目标做出贡献。随着人工智能系统成为日常生活的一部分，这种协作将变得至关重要。
- en: 'Building Ethical and Responsible AI Applications: Prompts shape the behavior
    of AI systems. By crafting thoughtful, precise, and ethical prompts, users can
    guide AI toward generating responsible and impactful outcomes.'
  id: totrans-671
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 构建道德和负责任的人工智能应用：提示塑造了人工智能系统的行为。通过精心设计、精确且道德的提示，用户可以引导人工智能产生负责任和有影响力的结果。
- en: A Glimpse Into the Future
  id: totrans-672
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对未来的展望
- en: Imagine a world where prompts are no longer typed but spoken, gestured, or even
    inferred through neural interfaces. As AI becomes embedded in every facet of life,
    prompting will evolve into a universal language—a skill that transcends professions,
    industries, and cultures.
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个这样的世界，提示不再是键盘输入，而是通过语音、手势，甚至通过神经接口推断出来。随着人工智能嵌入生活的每一个角落，提示将演变成一种通用语言——一种超越职业、行业和文化的技能。
- en: 'If you''re eager to unlock the full potential of AI across different aspects
    of life and learn how to choose the right tools at the right moment, another book
    of mine, “Become a Millionaire in 24 Hours: 100+ AI Tools to Make Money ...”,
    is the ultimate guide you''ve been searching for.'
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你渴望解锁生活中不同方面的AI的全部潜力，并学习如何在正确的时间选择正确的工具，我另一本书《24小时内成为百万富翁：100+赚钱AI工具》将是你在寻找的终极指南。
- en: The future of prompts and AI interaction holds limitless possibilities, where
    human creativity and technological innovation merge to reshape what’s achievable.
    By mastering prompts today, you’re not only preparing for the AI revolution—you’re
    becoming a pioneer in shaping the world of tomorrow.
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 提示和AI交互的未来拥有无限可能，在这里人类创造力和技术创新融合，重塑了可实现性。通过今天掌握提示，你不仅为AI革命做准备，而且成为塑造明天世界的一名先驱。
- en: 'Conclusion: From Beginner to Expert'
  id: totrans-676
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 结论：从初学者到专家
- en: 'Recap: The Journey to Mastering Prompts'
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾：掌握提示的旅程
- en: 'As we come to the end of this journey, it’s worth reflecting on the incredible
    progress you’ve made. From understanding the foundational concepts of prompts
    to mastering advanced strategies, you’ve unlocked the true potential of interacting
    with AI. Along the way, you’ve learned how to:'
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们结束这段旅程之际，值得反思你所取得的惊人进步。从理解提示的基础概念到掌握高级策略，你已经释放了与AI交互的真正潜力。在这个过程中，你学习了如何：
- en: Craft clear, specific, and goal-oriented prompts that drive meaningful outcomes.
  id: totrans-679
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 制定清晰、具体和目标导向的提示，以产生有意义的成果。
- en: Apply prompting techniques across various domains, from personal growth and
    creativity to business and professional applications.
  id: totrans-680
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在各个领域应用提示技巧，从个人成长和创造力到商业和专业应用。
- en: Avoid common pitfalls and continuously refine your approach for better results.
  id: totrans-681
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免常见的陷阱，并不断改进你的方法以获得更好的结果。
- en: Leverage advanced tools and integrations to supercharge your AI interactions.
  id: totrans-682
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用高级工具和集成来增强你的AI交互。
- en: This transformation, from a curious beginner to a confident expert, is not just
    about using ChatGPT more effectively. It’s about embracing a new way of thinking—one
    where curiosity, precision, and adaptability open doors to endless possibilities.
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 这种从好奇的初学者到自信的专家的转变，不仅仅是更有效地使用ChatGPT。这是接受一种新的思维方式——好奇心、精确性和适应性打开了通往无限可能的大门。
- en: Final Tips to Continue Improving Your Skills
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 继续提高技能的最终提示
- en: 'Mastery of prompts, like any skill, is a continuous journey. Here are some
    parting tips to help you keep growing:'
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 提示的掌握，就像任何技能一样，是一个持续的过程。以下是一些临别建议，帮助你继续成长：
- en: 'Stay Curious: Never stop exploring new use cases for prompts. Experiment with
    different approaches and push the boundaries of what AI can do for you.'
  id: totrans-686
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持好奇心：永远不要停止探索提示的新用例。尝试不同的方法，并推动AI为你所能做到的极限。
- en: 'Learn from Others: Engage with the AI and tech communities to exchange ideas
    and discover new techniques. Platforms like forums, blogs, and workshops can be
    invaluable resources.'
  id: totrans-687
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向他人学习：与AI和科技社区互动，交流想法并发现新技术。论坛、博客和工作坊等平台可以是非常宝贵的资源。
- en: 'Practice Makes Perfect: Regularly practice crafting prompts for various scenarios.
    Treat each interaction as an opportunity to refine your skills and learn from
    the responses.'
  id: totrans-688
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 熟能生巧：定期练习为各种场景制作提示。将每次互动视为磨练技能和从回复中学习的机会。
- en: 'Document Your Discoveries: Keep a personal library of effective prompts and
    lessons learned. This will serve as a valuable reference and inspiration for future
    interactions.'
  id: totrans-689
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 记录你的发现：保持一个个人库，收集有效的提示和学到的经验。这将作为未来互动的有价值参考和灵感来源。
- en: 'Embrace Feedback: Don’t hesitate to ask ChatGPT for feedback on its responses.
    Use its insights to improve your prompts and deepen your understanding.'
  id: totrans-690
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 求反馈：不要犹豫向ChatGPT请求对其回复的反馈。利用其洞察力来改进你的提示并深化你的理解。
- en: 'Stay Updated: AI is an ever-evolving field. Keep up with the latest developments
    in AI technology and adapt your prompting techniques to leverage new features
    and capabilities.'
  id: totrans-691
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持更新：人工智能是一个不断发展的领域。关注人工智能技术的最新进展，并调整你的提示技巧以利用新功能和能力。
- en: A Final Word
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的话
- en: Mastering prompts is more than just a skill—it’s a mindset. It empowers you
    to collaborate with AI, solve problems creatively, and unlock new opportunities.
    Whether you’re crafting prompts to achieve personal goals or driving innovation
    in your business, the possibilities are boundless.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 掌握提示不仅仅是技能，更是一种心态。它使您能够与AI协作，创造性地解决问题，并开启新的机会。无论您是在制定提示以实现个人目标，还是在您的业务中推动创新，可能性都是无限的。
- en: The journey doesn’t end here. Take what you’ve learned, build on it, and continue
    to explore the limitless potential of prompting. Remember, the power to shape
    the future of AI interactions lies in your hands. Keep questioning, keep learning,
    and keep creating—the best is yet to come.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 旅程并未结束。将您所学到的知识运用到实践中，继续探索提示的无限潜力。记住，塑造AI交互未来的力量掌握在您的手中。继续质疑，继续学习，继续创造——最好的还在后面。
- en: If this book has inspired new insights for you and you purchased it on Amazon,
    I would be incredibly grateful if you could take a moment to leave a review. Your
    feedback not only motivates me, but also helps others discover the value within
    these pages, making it easier for them to make informed decisions. A review can
    have a significant impact, supporting the book and encouraging more readers to
    embark on this journey. Thank you for your support, and I wish you all the best
    as you continue your journey ahead!
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这本书为您带来了新的见解，并且您在亚马逊上购买了它，如果您能抽出一点时间留下评论，我将不胜感激。您的反馈不仅激励了我，还帮助他人发现这些页面中的价值，使他们更容易做出明智的决定。评论可以产生重大影响，支持这本书，并鼓励更多读者踏上这段旅程。感谢您的支持，并祝您在未来的旅程中一切顺利！
- en: 'Appendix A: Advanced Prompt Formulas - Your Shortcut to AI Mastery'
  id: totrans-696
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录A：高级提示公式 - 您通往AI精通的捷径
- en: Prompts are not just for ChatGPT. AI tools like Copilot, Gemini, and Claude
    AI have become integral parts of our work and daily routines, and if you’re using
    them, prompts function in a similar way. To maximize the benefits of these tools,
    mastering the art of prompt engineering is essential. By crafting precise, targeted
    prompts, you can receive more accurate, clear, and tailored responses, saving
    you time and providing deeper insights. This, in turn, fosters creativity and
    broadens your knowledge, allowing you to tap into the full potential of AI.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 提示不仅适用于ChatGPT。Copilot、Gemini和Claude AI等AI工具已成为我们工作和日常生活中的重要组成部分，如果您在使用它们，提示的功能方式类似。为了最大限度地发挥这些工具的益处，掌握提示工程的艺术是至关重要的。通过制定精确、有针对性的提示，您可以获得更准确、清晰和定制的响应，节省时间并提供更深入的见解。这反过来又促进了创造力并拓宽了您的知识，使您能够充分利用AI的潜力。
- en: 'Here are 5 key formulas to optimize your use of prompts and boost your work
    efficiency:'
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是5个关键公式，以优化您对提示的使用并提高工作效率：
- en: T-A-G Formula
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: T-A-G 公式
- en: 'The T-A-G (Task-Action-Goal) formula is a highly effective method for creating
    prompts when using AI tools like ChatGPT. Here''s how to apply it:'
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: T-A-G（任务-行动-目标）公式是使用 ChatGPT 等AI工具时创建提示的一个非常有效的方法。以下是应用它的方法：
- en: '• Task: Clearly define the task you want the AI to perform. Be specific, such
    as “write a poem”, “summarize an article”, or “solve a math problem”.'
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: • 任务：明确定义您希望AI执行的任务。要具体，例如“写一首诗”、“总结一篇文章”或“解决一个数学问题”。
- en: '• Action: Describe the actions you want the AI to take to complete the task,
    including the method, format, or any specific elements to incorporate.'
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: • 行动：描述您希望AI采取的行动以完成任务，包括方法、格式或任何要包含的特定元素。
- en: '• Goal: State the ultimate purpose of the task, whether it''s to gather information,
    learn something new, or entertain.'
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: • 目标：陈述任务的最终目的，无论是收集信息、学习新事物还是娱乐。
- en: 'Example using the T-A-G formula:'
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 T-A-G 公式的示例：
- en: '• Task: I need a poem about spring.'
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: • 任务：我需要一首关于春天的诗。
- en: '• Action: The poem should be concise, rich in imagery, and use metaphors.'
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: • 行动：这首诗应该简洁、富有意象，并使用隐喻。
- en: '• Goal: The poem will be used in a presentation about spring''s renewal and
    vitality.'
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: • 目标：这首诗将用于关于春天更新和活力的演示。
- en: By structuring your prompt with the T-A-G formula, you help the AI understand
    your request more clearly, leading to more accurate and relevant responses. This
    method is a strategic approach to using AI for information gathering and problem-solving.
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用T-A-G公式来构建您的提示，您帮助AI更清楚地理解您的请求，从而得到更准确和相关的响应。这种方法是使用AI进行信息收集和问题解决的战略方法。
- en: R-T-F Formula
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: R-T-F 公式
- en: 'The R-T-F (Role-Task-Format) formula enhances how you use AI for information
    gathering and problem-solving:'
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: R-T-F（角色-任务-格式）公式增强了您使用AI进行信息收集和问题解决的方式：
- en: '• Role: Identify the role you want the AI to assume, such as a writer, analyst,
    or teacher.'
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: • 角色：确定你希望 AI 扮演的角色，如作家、分析师或教师。
- en: '• Task: Describe the specific task you want the AI to perform, such as “analyze
    a paragraph”, “create a presentation”, or “give advice.”'
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: • 任务：描述你希望 AI 执行的具体任务，如“分析一段文字”、“创建演示文稿”或“提供建议”。
- en: '• Format: Specify the format you want the response to take, including length,
    style, or structure.'
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: • 格式：指定你希望响应采取的格式，包括长度、风格或结构。
- en: 'Example using the R-T-F formula:'
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 R-T-F 公式的示例：
- en: '• Role: I want you to act as an analyst.'
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: • 角色：我希望你扮演分析师的角色。
- en: '• Task: Analyze the impact of social media on youth.'
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: • 任务：分析社交媒体对青年产生的影响。
- en: '• Format: I want a 500-word article in formal language with at least 3 key
    points.'
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: • 格式：我希望一篇500字的正式语言文章，至少包含3个要点。
- en: B-A-B Formula
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: B-A-B 公式
- en: 'The B-A-B (Before-After-Bridge) formula is powerful for creating persuasive
    prompts, particularly when you want to show the transformation a product, service,
    or idea brings:'
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: B-A-B（之前-之后-桥梁）公式在创建有说服力的提示时非常强大，尤其是在你想展示产品、服务或理念带来的转变时：
- en: '• Before: Describe the current problem or situation. Outline the challenges
    or unmet needs.'
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: • 之前：描述当前的问题或情况。概述挑战或未满足的需求。
- en: '• After: Describe the desired outcome after applying the solution.'
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: • 之后：描述应用解决方案后的预期结果。
- en: '• Bridge: Introduce the solution or actions leading to the transformation,
    explaining how to achieve the desired result.'
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: • 桥梁：介绍解决方案或导致转变的行动，解释如何实现预期结果。
- en: 'Example using the B-A-B formula:'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 B-A-B 公式的示例：
- en: '• Before: I spend too much time organizing information and writing reports.'
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: • 之前：我在组织信息和撰写报告上花费了太多时间。
- en: '• After: I now complete reports quickly, with well-organized information that''s
    easy to understand.'
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: • 之后：我现在可以快速完成报告，信息组织良好，易于理解。
- en: '• Bridge: I started using a task management app that automates information
    organization and offers customizable report templates.'
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: • 桥梁：我开始使用一个自动化信息组织和提供可定制报告模板的任务管理应用程序。
- en: The B-A-B formula not only clarifies the problem and solution but also creates
    a compelling narrative that helps others understand the value of your proposed
    solution. This method is ideal for persuasive communication in writing or speeches.
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: B-A-B 公式不仅澄清了问题和解决方案，还创造了一个引人入胜的故事，帮助他人理解你提出的解决方案的价值。这种方法非常适合写作或演讲中的说服性沟通。
- en: R-I-S-E Formula
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: R-I-S-E 公式
- en: 'The R-I-S-E (Role-Input-Steps-Expectation) formula helps you structure prompts
    clearly and in detail when using AI tools:'
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: R-I-S-E（角色-输入-步骤-期望）公式帮助你在使用 AI 工具时清晰地详细地构建提示：
- en: '• Role: Identify the role the AI should take, such as a writer, researcher,
    or guide.'
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: • 角色：确定 AI 应扮演的角色，如作家、研究人员或指导者。
- en: '• Input: Provide the necessary data, background information, or specific elements
    to consider.'
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: • 输入：提供必要的数据、背景信息或需要考虑的具体元素。
- en: '• Steps: Outline the specific steps the AI should take to achieve the desired
    result.'
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: • 步骤：概述 AI 实现预期结果的具体步骤。
- en: '• Expectation: State the outcome you expect from the AI’s actions.'
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: • 期望：说明你期望从 AI 的行动中获得的成果。
- en: 'Example using the R-I-S-E formula:'
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 R-I-S-E 公式的示例：
- en: '• Role: I want you to act as an editor.'
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: • 角色：我希望你扮演编辑的角色。
- en: '• Input: Here’s a draft article on blockchain technology.'
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: • 输入：这是一篇关于区块链技术的草案文章。
- en: '• Steps: Please read and edit the article to improve accuracy, structure, and
    engagement.'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: • 步骤：请阅读并编辑文章以提高准确性、结构和参与度。
- en: '• Expectation: I expect an edited draft that is clear, coherent, and engaging,
    reflecting expert knowledge on the topic.'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: • 期望：我期望一个清晰、连贯、引人入胜的编辑草稿，反映该主题的专家知识。
- en: The R-I-S-E formula ensures the AI understands your requirements, leading to
    more accurate, relevant results that meet your expectations.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: R-I-S-E 公式确保 AI 理解你的要求，从而产生更准确、相关且符合你期望的结果。
- en: C-A-R-E Formula
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: C-A-R-E 公式
- en: 'The C-A-R-E (Context-Action-Result-Example) formula helps you structure prompts
    for clearer communication:'
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: C-A-R-E（背景-行动-结果-示例）公式帮助你在更清晰的沟通中构建提示：
- en: '• Context: Describe the situation or background information for the task.'
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: • 背景：描述任务的情况或背景信息。
- en: '• Action: Specify the exact action the AI should take.'
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: • 行动：指定 AI 应采取的确切行动。
- en: '• Result: State the desired outcome or benefit from the AI’s action.'
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: • 结果：说明 AI 行动预期的结果或好处。
- en: '• Example: Provide a concrete example of how this approach has been successfully
    applied.'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: • 示例：提供一个具体示例，说明这种方法如何成功应用。
- en: 'Example using the C-A-R-E formula:'
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 C-A-R-E 公式的示例：
- en: '• Context: I’m preparing for an important meeting with a client and need a
    presentation on a new product.'
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: • 背景：我正在准备与客户的重要会议，需要一份关于新产品的演示文稿。
- en: '• Action: I want you to create an engaging PowerPoint that highlights the features
    and benefits of the product.'
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: • 行动：我想让你创建一个突出产品功能和优势的引人入胜的PowerPoint演示文稿。
- en: '• Result: The presentation should help me convince the client of the product’s
    value and encourage them to make a purchasing decision.'
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: • 结果：演示文稿应帮助我说服客户产品的价值，并鼓励他们做出购买决定。
- en: '• Example: A similar presentation helped a colleague secure a major contract
    by clearly and persuasively conveying the product’s advantages.'
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: • 示例：一个类似的演示帮助一位同事通过清晰而有说服力地传达产品的优势，成功获得了一份重要合同。
- en: These formulas are designed to help you craft clear, structured, and effective
    prompts, optimizing the use of AI to accomplish tasks efficiently.
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 这些公式旨在帮助您制作清晰、结构化和有效的提示，优化AI的使用，以高效完成任务。
- en: 'Appendix B: Prompt Templates for Every Situation'
  id: totrans-752
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录B：适用于各种情况的提示模板
- en: 'To help you get started and inspire your own creativity, here’s a collection
    of prompt templates tailored for various needs. These templates are designed to
    be adaptable and customizable, ensuring they fit your unique requirements:'
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助您开始并激发您的创造力，这里有一系列针对各种需求的提示模板。这些模板设计为可适应和可定制，确保它们符合您的独特需求：
- en: Creative Writing Prompts
  id: totrans-754
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创意写作提示
- en: 'Character Development:'
  id: totrans-755
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 角色发展：
- en: '"Create a detailed character profile for a protagonist who is a [profession],
    struggles with [personal issue], and has a secret ability to [special skill].
    Include their backstory, motivations, and relationships."'
  id: totrans-756
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为一位[职业]主角创建一个详细的性格档案，他面临[个人问题]，并拥有[特殊技能]的秘密能力。包括他们的背景故事、动机和关系。”
- en: 'Story Framework:'
  id: totrans-757
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 故事框架：
- en: '"Draft a story outline for a mystery novel set in [location] where the main
    character discovers [unexpected event] that leads to [consequence]. Focus on building
    suspense in the first three chapters."'
  id: totrans-758
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为设定在[地点]的神秘小说草拟一个故事大纲，其中主要角色发现[意外事件]，这导致[后果]。重点在前三章建立悬念。”
- en: 'Unique Perspectives:'
  id: totrans-759
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 独特视角：
- en: '"Write a short story from the perspective of an inanimate object, like a [specific
    item], witnessing a pivotal historical event."'
  id: totrans-760
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “从非生命物体的视角写一个短篇故事，如[特定物品]，见证一个关键历史事件。”
- en: 'Poetry Challenges:'
  id: totrans-761
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 诗歌挑战：
- en: '"Compose a sonnet about the paradox of time, using metaphors involving [natural
    phenomena]."'
  id: totrans-762
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “关于时间的悖论，用涉及[自然现象]的隐喻创作一首十四行诗。”
- en: Learning and Research Prompts
  id: totrans-763
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学习和研究提示
- en: 'Complex Explanation:'
  id: totrans-764
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 复杂解释：
- en: '"Explain the relationship between [two concepts, e.g., quantum mechanics and
    classical physics] using a metaphor involving everyday objects."'
  id: totrans-765
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “用涉及日常物体的隐喻解释[两个概念，例如量子力学和经典物理学]之间的关系。”
- en: 'Thematic Analysis:'
  id: totrans-766
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 主题分析：
- en: '"Summarize the main themes of [literary work] and analyze how they reflect
    the social context of the time period."'
  id: totrans-767
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “总结[文学作品]的主要主题，并分析它们如何反映该时期的社交背景。”
- en: 'Step-by-Step Learning:'
  id: totrans-768
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 步骤化学习：
- en: '"Break down the process of solving a [specific type of mathematical equation]
    into 5 clear and easy-to-follow steps."'
  id: totrans-769
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “将解决[特定类型的数学方程]的过程分解为5个清晰且易于遵循的步骤。”
- en: Professional and Business Prompts
  id: totrans-770
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 专业和商业提示
- en: 'Strategic Planning:'
  id: totrans-771
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 战略规划：
- en: '"Create a 6-month strategic plan for a [specific type of business], focusing
    on marketing, operations, and financial goals."'
  id: totrans-772
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “为[特定类型的商业]制定一个为期6个月的战略计划，重点关注市场营销、运营和财务目标。”
- en: 'Leadership Advice:'
  id: totrans-773
