- en: Real-World Instances of AI-Related Privacy Issues
  id: totrans-953
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与AI相关的隐私问题的现实案例
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-954
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: 'CASE 1: Google Location Tracking Controversy'
  id: totrans-955
  prefs: []
  type: TYPE_NORMAL
  zh: 案例1：谷歌位置跟踪争议
- en: Google came under fire back in 2018 when an Associated Press investigation revealed
    they were tracking user locations even when said users did not give permission.
    This caused immense backlash from consumers and advocates who protested against
    Google’s lack of trustworthiness towards its customers’ private details – leading
    them to change their policies regarding location tracking since then. However,
    despite these modifications, doubts about how data is collected, used, or accessed
    remain. Leading to the realization of just how much power one tech giant holds
    over individuals’ security online today.
  id: totrans-956
  prefs: []
  type: TYPE_NORMAL
  zh: 早在2018年，谷歌就因美联社的调查而受到抨击，调查发现他们甚至在用户没有给予许可的情况下跟踪用户的位置。这引发了消费者和倡导者的强烈反对，他们抗议谷歌对其客户隐私细节缺乏信任——自那时起，谷歌已经改变了其关于位置跟踪的政策。然而，尽管这些修改，关于数据是如何收集、使用或访问的疑虑仍然存在。这导致了这样一个认识，即一个科技巨头今天对个人网络安全有多大的控制力。
- en: One of the biggest worries with Google’s tracking practices is how personal
    data can be misused. Location information carries huge risks if it falls into
    the wrong hands and could result in dire consequences like surveillance or criminal
    activity.
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 关于谷歌的跟踪实践，最大的担忧之一是个人数据可能被滥用。如果定位信息落入错误的手中，将带来巨大的风险，可能导致严重的后果，如监视或犯罪活动。
- en: To keep privacy concerns in mind, companies need to ensure their security protocols
    are up-to-date. But third parties access to user information adds another layer
    of danger - advertisers cash in on this information while other organizations
    might buy it for financial gain.
  id: totrans-958
  prefs: []
  type: TYPE_NORMAL
  zh: 为了考虑到隐私问题，公司需要确保他们的安全协议是最新的。但是第三方访问用户信息又增加了一层危险——广告商利用这些信息获利，而其他组织可能为了经济利益购买这些信息。
- en: 'CASE 2\. AI-Powered Recommendations: My Experience with Google’s Suggestion
    Engine'
  id: totrans-959
  prefs: []
  type: TYPE_NORMAL
  zh: 案例 2. AI推荐：我与谷歌建议引擎的经历
- en: As the world of Artificial Intelligence rapidly develops, privacy is becoming
    an increasing concern. Just recently, I was reminded of this in my own life. After
    streaming a show on Amazon Prime through Apple TV, two days later, Google’s app
    on my iPhone had suggestions related to it - even though I didn’t even watch it
    there! That highlights just how much tech giants know about their users.
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能世界的快速发展，隐私问题变得越来越重要。最近，我在自己的生活中对此有了深刻的体会。在通过苹果电视在亚马逊Prime上观看节目两天后，我iPhone上的谷歌应用就有了相关的建议——尽管我甚至没有在那里观看！这突显了科技巨头对用户了解的深度。
- en: Having worked with large amounts of information for years now, I’m aware that
    AI makes these kinds of insights possible - but they’re still unsettling if not
    properly regulated. Google’s recommendation algorithm brings up another important
    point; how crucial are privacy measures in a time where AI advancements are happening
    so quickly? And what happens when personalized advice appears without any input
    from other devices or conversations being monitored by microphones? This issue
    needs real attention before Big Tech gains too much access to our lives without
    us knowing about it.
  id: totrans-961
  prefs: []
  type: TYPE_NORMAL
  zh: 在与大量信息共事多年后，我意识到AI使这些类型的洞察成为可能——但如果没有适当的监管，它们仍然令人不安。谷歌的推荐算法提出了另一个重要观点；在AI进步如此迅速的时代，隐私措施有多么重要？当个性化建议在没有其他设备输入或麦克风监听到的对话中突然出现时，会发生什么？这个问题需要得到真正的关注，在大型科技公司在我们不知情的情况下获取我们生活中太多权限之前。
- en: These tactics should not be allowed as they violate basic human rights and values
    when it comes to protecting personal information. To ensure such practices aren’t
    taking place unchecked going forward, companies need to take steps now to create
    stricter guidelines regarding the use of AI, while policymakers must also create
    regulations designed to protect individuals’ right to keep their data private
    at all times.
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: 这些策略不应被允许，因为它们在保护个人信息方面违反了基本的人权和价值。为了确保此类做法今后不会不受检查地进行，公司现在需要采取措施制定更严格的关于AI使用的指南，同时政策制定者也必须制定旨在保护个人在任何时候都有权保持其数据隐私的法规。
