    as filter() or map() is not immediately apparent (unless you have used them in
    other programming languages). The preceding list provides a starting point for
    finding out more about various Python built-in functions that are not discussed
    in this chapter.
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 上述列表提供了一个内置函数的汇总“输出”（包括本章后面讨论的一些函数）。尽管 max() 函数显然返回其参数的最大值，但 filter() 或 map()
    等其他函数的目的并不立即明显（除非你在其他编程语言中使用过它们）。上述列表提供了了解本章未讨论的各种 Python 内置函数的起点。
