- en: 3\. Using a Database
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 使用数据库
- en: For large-scale applications, storing prompts in a database can be beneficial.
    This allows for easy querying and management.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大规模应用，将提示存储在数据库中可能有益。这允许轻松查询和管理。
- en: 'Example of a table structure:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 表结构示例：
- en: CREATE TABLE prompts (
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: CREATE TABLE prompts (
- en: id INT PRIMARY KEY,
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: id INT PRIMARY KEY,
- en: description VARCHAR(255),
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: description VARCHAR(255),
- en: prompt TEXT
  id: totrans-143
