  zh: 你可能会认为测试机器人智能的难度很大，但实际上它相当简单。其背后的关键特征是，如果一个机器能够与人类进行对话，而人类又无法察觉到它是机器人，那么它就显示出足够的智能以通过图灵测试。图灵开始研究他标志性的计算机科学品牌，当时他正在寻找破解第二次世界大战期间德国编码信息的途径。战后，图灵将他的发展理论应用于回答“机器能思考吗？”这个问题。
