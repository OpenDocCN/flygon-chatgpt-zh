  id: totrans-2346
  prefs: []
  type: TYPE_NORMAL
  zh: 场景4
- en: Create a macro which will extract a region-based sum of the salary (use “Salary
    worksheet”). On clicking the Subtotal button, a region-based subtotal should be
    added on a new worksheet, as shown in [Figure 15.3](#fig15-3).
  id: totrans-2347
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个宏，该宏将提取基于区域的薪资总和（使用“薪资工作表”）。点击“小计”按钮时，应在新的工作表上添加基于区域的子总计，如[图15.3](#fig15-3)所示。
- en: '![image](image/Figure_15.3.jpg)'
  id: totrans-2348
  prefs: []
  type: TYPE_IMG
  zh: '![image](image/Figure_15.3.jpg)'
