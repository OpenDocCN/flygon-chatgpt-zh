  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 如此一来，公司的每一个部分都会相互影响，要么是**更好**，要么是**更糟**。一家公司的文化可以被视为**企业的“个性”**，包括它的**怪癖、信仰、态度**，甚至**心理状态**。它也可以被视为**你公司的故事**，以及人们——无论是客户还是员工——如何看待并参与其中。通过讲述一个良好的公司故事，并通过行动来支持这些话语，你会建立一个**声誉品牌**。
