  type: TYPE_NORMAL
  zh: '"您是一位准备为二年级医学生讲解临床案例的药理学教授。开发一个案例，其中一位60岁女性患者有慢性阻塞性肺疾病（COPD）病史，并出现急性呼吸道感染。包括患者病史、实验室和影像学检测结果，并要求学生制定诊断和治疗方案。讨论可能的并发症和患者随访的重要性。"'
