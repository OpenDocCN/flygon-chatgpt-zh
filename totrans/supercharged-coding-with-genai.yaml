- en: '12'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Documenting Code with GenAI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In *Part 3* of the book, we will introduce advanced practices from the **software
    development lifecycle** (**SDLC**) when working with ChatGPT, OpenAI API, and
    GitHub Copilot. Using the five S’s framework introduced in [*Chapter 4*](Chapter_4.xhtml#_idTextAnchor166),
    and prompt engineering techniques introduced in [*Chapter 8*](Chapter_8.xhtml#_idTextAnchor339)
    and [*Chapter 9*](Chapter_9.xhtml#_idTextAnchor391), we will see how to productionize
    our Python applications.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will introduce docstrings for Python objects, which already
    has a built-in slash command (i.e., /doc) with GitHub Copilot. We can use this
    slash command with the vanilla format or extend it with specific docstring requirements.
    Docstrings are already a feature of most IDEs as a template structure where arguments
    will be formatted with a fixed style, but the standard template does not include
    any descriptive information about the function or its parameters beyond their
    name. GitHub Copilot will usually produce a full docstring for high-quality code.
  prefs: []
  type: TYPE_NORMAL
- en: 'The topics covered in this chapter include the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Introducing software documentation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using GenAI to write docstrings
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finding outdated docstrings with GitHub Copilot, ChatGPT, and OpenAI API
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Practical insights
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Technical requirements
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'To get the most out of this chapter, ensure you have the following:'
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot account
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: IDE – either VS Code or PyCharm
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: OpenAI account with access to OpenAI API
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Access to the book’s repository, available at [https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI](https://github.com/PacktPublishing/Supercharged-Coding-with-Gen-AI)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Virtual environment set up in VS Code or PyCharm
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: OpenAI API token
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For assistance setting up a GitHub Copilot account, refer to [*Chapter 3*](Chapter_3.xhtml#_idTextAnchor108).
    For instructions on setting up OpenAI API access and token generation, see [*Chapter
    2*](Chapter_2.xhtml#_idTextAnchor061). If you need help creating an OpenAI account
    or setting up a virtual environment in your IDE, refer to the *Appendix* for detailed
    guidance.
  prefs: []
  type: TYPE_NORMAL
- en: Introducing software documentation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Software engineers not only write a lot of code, but they also need to read
    and understand code written by others. The code could be written the same day
    by other developers or be part of a legacy system maintained over multiple decades.
    While clean, well-written code is a critical aspect, code documentation is also
    a fundamental way of communicating with other developers.
  prefs: []
  type: TYPE_NORMAL
- en: Software documentation comes in multiple forms that serve different needs. Technical
    documentation includes the comments in source code, API descriptions, database
    schemas, and software architecture diagrams. User documentation is a guide on
    how an end user can use software. The software engineering process also adds specific
    documentation on requirements, specifications, testing plans, CI/CD pipelines,
    sprint planning, and much more. This chapter focuses on the documentation of the
    source code.
  prefs: []
  type: TYPE_NORMAL
- en: A general guideline is that the documentation should focus on the “why” rather
    than the “what.” That is, the code is readable and one can figure out what it
    does, but the reason for its implementation is what should be documented. The
    rationale is that well-written code is self-explanatory about what it does, but
    the reason for the code (the why) can be better understood through documentation.
    The code documentation can therefore explain the code, improve its readability,
    and aid later software maintenance.
  prefs: []
  type: TYPE_NORMAL
- en: In Python, the convention for documentation within the code is the docstring.
    Docstrings typically occur at the beginning of Python modules, classes, and methods.
    The purpose is to explain their function and the reason for their inclusion. Python’s
    docstrings are enclosed in triple quotes (single or double quotes) even if they
    are just one line. However, for the most common docstrings used to document methods,
    they should include arguments, return types, and any exceptions raised.
  prefs: []
  type: TYPE_NORMAL
- en: Docstrings serve a few different purposes. First, they provide documentation
    for a module, class, method, or function for developers. They can be compiled
    into formal documentation resources. In addition, these forms of documentation
    are accessible using Python’s `help()` function. Using docstrings makes the code
    easier to maintain, which reduces the lifetime cost of code.
  prefs: []
  type: TYPE_NORMAL
- en: The second purpose of docstrings is based on **Miller’s Law**, also known as
    the Magical Number Seven, Plus or Minus Two. Based on George Miller’s 1956 paper
    ([https://psychclassics.yorku.ca/Miller/](https://psychclassics.yorku.ca/Miller/)),
    it states that humans can retain 5 to 9 pieces of information in their working
    memory. A software developer trying to understand even a medium-length Python
    file must understand the interaction of several methods. The docstring and naming
    conventions facilitate a quick understanding of the abstracted methods.
  prefs: []
  type: TYPE_NORMAL
- en: Although docstrings may appear to be standard, there are actually four common
    formats. The **PEP 257** convention is the official Python standard, consisting
    of a single line with no string formatting that emphasizes readability. The **Google
    style** is among the most common and still emphasizes readability. It uses multi-line
    formatting for the arguments passed in, method returns, and exceptions raised.
    The **NumPy/SciPy style** is widely used, but primarily for scientific software.
    It has similar content to the Google style but uses different formatting. The
    **reStructuredText (reST)** or **Sphinx style** includes more detailed information
    than the others. This style is used by the Sphinx documentation generator, which
    produces HTML, PDF, and LaTeX documentation manuals directly from the source code
    with full hyperlinking and other advanced features. This chapter will focus on
    both single-line **PEP 257** and **Google styles** due to their widespread use,
    but other styles are directly supported by requesting specific docstring styles.
    We have included a few sources in the *Further reading* section that describe
    comment styles for Python in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: Working with the /explain GitHub Copilot command
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As a working example in this chapter, we use Flask routines that support the
    distance calculation found in [*Chapter 10*](Chapter_10.xhtml#_idTextAnchor424).
    The base code is shown in the GitHub repository and copied for reference here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE266]'
  prefs: []
  type: TYPE_PRE
- en: In VS Code, by simply highlighting the method, right-clicking and selecting
    Copilot, and selecting **Generate Docs** as shown in *Figure 12.1*, a docstring
    can be automatically written. Note that we have ignored **Generate Docstring**
    shown under **Copilot**. That command is VS Code’s template approach for docstrings,
    which creates placeholders for the docstring and parameters but does not use any
    AI to write the comment or description.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.1: By highlighting the method and right-clicking, Copilot generates
    a docstring](../Images/B31534_12_1.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 12.1: By highlighting the method and right-clicking, Copilot generates
    a docstring'
  prefs: []
  type: TYPE_NORMAL
- en: The generated docstring is shown in *Figure 12.2*. Trying this several times,
    we obtained several variations on the docstring, some of which had exceedingly
    long lines or different formats, and some included different information. Regardless,
    the docstring format has a simple one-line description, but the remainder has
    a random format that does not follow any of the style guides. Specifically, the
    “expects…” section of the docstring is unclear.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.2: GitHub Copilot produces a vague docstring for a poorly constructed
    function](../Images/B31534_12_2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 12.2: GitHub Copilot produces a vague docstring for a poorly constructed
    function'
  prefs: []
  type: TYPE_NORMAL
- en: Another common case is for GitHub Copilot to produce multiple lines of text
    as the docstring, excluding the parameters, returns, and so on. *Figure 12.2*
    fails in this respect, with two lines of explanation followed by the expects (`This
    endpoint expects...`) and returns sections. While both multi-line and one-line
    docstrings exist, the preference is for one line rather than an elaborate description,
    particularly for low-level methods. If such a method requires multiple lines,
    it is often considered good practice to refactor the method into multiple simpler
    methods that each perform a single task.
  prefs: []
  type: TYPE_NORMAL
- en: 'Copilot’s docstring creation is usually quite good, but can occasionally be
    incorrect. As in the previous example, you will encounter cases where it does
    not perform well. Some of these cases are due to the complexity of the underlying
    code. Rather than fixing the docstring, a preferred solution would be to refactor
    the code into a simpler form and recreate docstrings. In many cases, the `/explain`
    function is quite informative. In *Figure 12.3*, we apply `/explain` to the same
    code by using the GitHub Copilot Editor Inline Chat from within the same function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.3: Using /explain for calculate_distance describes a complex method](../Images/B31534_12_3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 12.3: Using /explain for calculate_distance describes a complex method'
  prefs: []
  type: TYPE_NORMAL
- en: 'A similar functionality occurs within the GitHub Copilot Chat with the `/explain
    calculate_distance()` command, which often returns explanations that are more
    verbose. Although both provide a clear explanation, their content is technically
    complex, which is why we recommend refactoring the code as shown:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE267]'
  prefs: []
  type: TYPE_PRE
- en: This section has introduced one way of instructing GenAI to write a docstring.
    The next section provides other approaches.
  prefs: []
  type: TYPE_NORMAL
- en: Using GenAI to write docstrings
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This section describes different techniques for creating docstrings for a single
    method and for a full Python file. Docstrings improve code readability and are
    often required by organizations as part of their **continuous integration/continuous
    development** (**CI/CD**) pipelines. Using GenAI to create docstrings can increase
    the speed of the software development process.
  prefs: []
  type: TYPE_NORMAL
- en: Docstring for a single method
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The simplest approach to generating a docstring in VS Code is simply typing
    three double quotes “““ or the equivalent in single quotes on a blank line following
    the method signature, as shown in *Figure 12.4*, with results shown in the code
    block that follows, which can be accepted by pressing tab:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.4: Initiating the request for a docstring with three single or
    double quotes](../Images/B31534_12_4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 12.4: Initiating the request for a docstring with three single or double
    quotes'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE268]'
  prefs: []
  type: TYPE_PRE
- en: As we can see, it describes the method but is the simplest form of the **PEP
    257** style with a single line string and no parameters or return values.
  prefs: []
  type: TYPE_NORMAL
- en: If we want to have a different docstring style, we can request it using the
    Copilot Editor Inline Chat (`/doc Google style`) or any other specified style.
    *Figure 12.5* shows the results for the Google style.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.5: Docstring in Google style using the inline /doc Google style](../Images/B31534_12_5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 12.5: Docstring in Google style using the inline /doc Google style'
  prefs: []
  type: TYPE_NORMAL
- en: This approach with the online Editor Inline Chat will not create docstrings
    for all the methods within a file. Other techniques for working at a file level
    are discussed next.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, with the GitHub Copilot chat, we can highlight a single method, such
    as `get_``euclidean``_dist`, and request a Google-style docstring using the `/doc
    Google style` command. Shown on the left of *Figure 12.6*, the original (above)
    and new (below) docstrings are presented with the options to keep or undo the
    changes.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.6: Using GitHub Copilot chat on a single method to change to Google
    style](../Images/B31534_12_6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 12.6: Using GitHub Copilot chat on a single method to change to Google
    style'
  prefs: []
  type: TYPE_NORMAL
- en: Docstrings for an entire file
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GitHub Copilot and ChatGPT can be used to produce docstrings for all methods
    within a single file at once using the chat mode, which can be quite useful. This
    may not work with the inline chat, depending on the version you are using of VS
    Code or PyCharm, so the code may be produced in the chat window and will have
    to be copied and pasted back into the code base. We find this approach useful
    at the end of the day, when you are trying to submit code before a deadline. In
    practice, though, we recommend writing docstrings with the code since the GenAI
    should be verified, which is best accomplished when writing the code. A later
    section, *Finding outdated docstrings with GitHub Copilot, ChatGPT, and OpenAI
    API*, will describe strategies for stale comments.
  prefs: []
  type: TYPE_NORMAL
- en: The first step is asking GitHub Copilot to write the docstrings for your current
    Python file, as shown in *Figure 12.7*. We will use the same code as we did earlier,
    using the Flask-based distance calculation.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12.7: GitHub Copilot chat request to produce docstrings for the entire
    file](../Images/B31534_12_7.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 12.7: GitHub Copilot chat request to produce docstrings for the entire
    file'
  prefs: []
  type: TYPE_NORMAL
- en: After uploading or pasting the file, the results are shown in the following
    code block. The results appear in the chat and must be copied from it to the code
    development window. We have not specified the type of docstring, and it may default
    to the Google style or the equivalent of `/doc Google style`. By modifying the
    prompt to `/doc single line style`, the code will produce the corresponding single-line
    docstrings. Both versions are included in the GitHub repository for this book.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE269]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/3.png)**Quick tip**: Enhance your coding experience with the
    **AI Code Explainer** and **Quick Copy** features. Open this book in the next-gen
    Packt Reader. Click the **Copy** button'
  prefs: []
  type: TYPE_NORMAL
- en: (**1**) to quickly copy code into your coding environment, or click the **Explain**
    button
  prefs: []
  type: TYPE_NORMAL
- en: (**2**) to get the AI assistant to explain a block of code to you.
  prefs: []
  type: TYPE_NORMAL
- en: '![A white background with a black text  AI-generated content may be incorrect.](../Images/image_%282%29.png)'
  prefs: []
  type: TYPE_IMG
- en: '**![](../Images/4.png)** **The next-gen Packt Reader** is included for free
    with the purchase of this book. Scan the QR code OR visit packtpub.com/unlock,
    then use the search bar to find this book by name. Double-check the edition shown
    to make sure you get the right one.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A qr code on a white background  AI-generated content may be incorrect.](../Images/Split-B-PEN-Unlock-QR.png)'
  prefs: []
  type: TYPE_IMG
- en: With these methods, we can create documentation for a single method or an entire
    file. Refactoring code often leads to a problem where the code and the docstrings
    are out of sync. The next section discusses strategies to overcome this problem.
  prefs: []
  type: TYPE_NORMAL
- en: Finding outdated docstrings with GitHub Copilot, ChatGPT, and OpenAI API
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A frequent debate among software engineers is whether documentation should be
    written when writing the code or later, when the code has stabilized. One line
    of thinking is that the docstring (and test cases) should be written at the same
    time. The primary argument is that the intention of the code is clearest when
    the developer is working through its logic and understands its purpose. The problem
    is that, as code is routinely refactored, the docstring comments and test cases
    must be adapted, making the original versions obsolete. The other line of thinking
    is that the documentation can and should be written later, once the code settles,
    to minimize the repeated rewriting of the comments.
  prefs: []
  type: TYPE_NORMAL
- en: New GenAI technology makes the debate irrelevant since it offers two solutions.
    The first solution is simply to regenerate and update all the comments at the
    method or file level. The previous section described this strategy. We can use
    GitHub Copilot or ChatGPT to write the docstrings for the entire file, which will
    update or redo all the docstrings.
  prefs: []
  type: TYPE_NORMAL
- en: The second strategy is more specific in that it can detect outdated or **stale**
    comments so that these can be manually or automatically adjusted. The advantage
    of this approach is that individual methods can be updated, leaving previously
    generated or verified comments unchanged. If we have individually written, verified,
    or otherwise invested effort in the docstrings, we do not want them to be overwritten.
  prefs: []
  type: TYPE_NORMAL
- en: For the comments, we have taken the previous example and created two versions
    of the Euclidean distance by copying one and modifying the code. The new code
    is shown here. As you can see, the first method returns the Euclidean distance
    and the second method returns the Euclidean distance squared, yet the docstrings
    have not been updated and are, in fact, identical due to our copy and paste approach.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE270]'
  prefs: []
  type: TYPE_PRE
- en: 'Using GitHub Copilot or ChatGPT, we can simply ask whether any of the docstrings
    are out of sync, as shown in *Figure 12.8*. The approach cleverly recognizes the
    squared root function call in `get_``euclidean``_dist` and suggests an update
    to the docstring:'
  prefs: []
  type: TYPE_NORMAL
- en: "![Figure 12.8: Using GitHub Cop\uFEFFilot to identify stale docstrings](../Images/B31534_12_8.png)"
  prefs: []
  type: TYPE_IMG
- en: 'Figure 12.8: Using GitHub Copilot to identify stale docstrings'
  prefs: []
  type: TYPE_NORMAL
- en: A better approach is to use OpenAI API to compare the code and docstrings individually
    across a file. The sample code can be found in the repository for this chapter
    called `openai_docstring_review.py`, which runs on the `distance_versions.py`
    file. The resulting output is shown next for each of the methods.
  prefs: []
  type: TYPE_NORMAL
- en: The output explains the logic and provides an answer as to whether the docstring
    correctly corresponds to the code implementation. It correctly identifies that
    the `get_``euclidean``_dist` method does not match.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE271]'
  prefs: []
  type: TYPE_PRE
- en: The chapter has covered several techniques for creating docstrings. It has also
    introduced different strategies for finding problems with stale comments. In the
    next section, we provide recommendations based on how we approach writing docstrings
    with GenAI.
  prefs: []
  type: TYPE_NORMAL
- en: Practical insights
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Given the choices of GitHub Copilot, ChatGPT, and OpenAI API, we find that Copilot
    is the most convenient for writing docstrings. The convenience of pair programming
    in the integrated environment simply makes it easier to request documentation,
    rather than copying and pasting code to other places. Copilot chat can usually
    accurately locate stale comments by itself. One issue we have encountered is that
    the context of sending code to Copilot is not visible. If you copy code and ask
    if the comments are current, it may miss some methods that were not included in
    the context. This can be solved by copying and pasting the code in place to renew
    the context.
  prefs: []
  type: TYPE_NORMAL
- en: We recommend that the docstrings be created after writing the code for each
    method, or at least after the code for a method has stabilized, if not after each
    refactoring. We further suggest checking that the docstring accurately reflects
    the implementation. At the beginning of the chapter, we discussed that documentation
    should reflect why a particular method was written rather than describing what
    the code does. The current technology is quite reasonable for the what but ignores
    the why, which is an opportunity for software engineers to elaborate.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Docstrings are a standard practice for maintaining high-quality code. They enable
    future readers of the software to understand the code, which is important for
    debugging, feature enhancements, and more. We recommend docstrings be included
    as soon as the code has been written. GitHub Copilot offers multiple ways of writing
    docstrings for a single method, including three single or double quotes, using
    the Copilot menus on a highlighted method. These approaches will produce single-line
    docstrings, the Google docstring style, or others when specified as a command.
  prefs: []
  type: TYPE_NORMAL
- en: A challenge in writing software is keeping docstrings up to date with the code.
    All methods can identify discrepancies between the code and docstrings, which
    is the preferred method for identifying issues that can be resolved. Alternatively,
    docstrings can be updated at a method or file level, replacing any existing docstrings.
  prefs: []
  type: TYPE_NORMAL
- en: Quiz time
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Before you proceed to the next chapter, make sure that you can confidently
    answer the following questions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 1**: What are three ways of generating docstrings for code?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: The three ways discussed in this chapter are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot can recommend code by opening `"""` or `'''` for a method on
    the line after the method signature
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: GitHub Copilot can be invoked by highlighting a method and using its menu to
    generate a docstring
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ChatGPT or Copilot can be used to add docstrings to all methods
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Question 2**: What are two approaches for keeping docstrings consistent with
    the underlying code?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: The first approach is simply overwriting any docstrings. This ensures
    that the GenAI produces a docstring for all methods based on the underlying code.
    If a docstring were inconsistent, then it would be overwritten. Unfortunately,
    this overwrites all previously created docstrings, which may be undesirable if
    you have invested time and effort into writing or checking any of them.'
  prefs: []
  type: TYPE_NORMAL
- en: The second approach uses GitHub Copilot or ChatGPT to ask if there are discrepancies
    between the code and the docstrings. One can also use OpenAI API to match each
    code implementation against the docstring and return whether they match on a case-by-case
    basis as was shown with the `openai_docstring_review.py`, sample code. Any of
    the options in the second approach are preferred if docstrings are current and
    verified.
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 3**: Given that GenAI can produce quality docstrings, is it necessary
    to check the docstrings, or can they simply be regenerated?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: While the quality is usually quite high, inaccurate docstrings
    can confound future developers. It is strongly recommended to use GenAI to save
    time, but to use human intelligence to verify that they are correct. At the present
    time, trust but verify is the best approach.'
  prefs: []
  type: TYPE_NORMAL
- en: Further reading
  prefs:
  - PREF_H1
