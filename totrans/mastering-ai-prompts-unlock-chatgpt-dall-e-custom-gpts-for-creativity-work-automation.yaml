- en: Formatting Styles by Use Case
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 根据用例的格式化样式
- en: 1\. Blog Post
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 博客文章
- en: Use clear headings and subheadings to break content into sections. Employ numbered
    lists or bullet points to highlight key ideas. Keep paragraphs short and insert
    pull quotes or bolded phrases to maintain attention.
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 使用清晰的标题和副标题将内容分成部分。使用编号列表或项目符号来突出关键思想。保持段落简短，并插入引用引语或加粗短语以保持注意力。
- en: 2\. Newsletter
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 新闻通讯
- en: Structure the content into distinct sections like "Intro," "Main Tip," and "Action
    Item." Use line breaks for readability, emojis for visual appeal, and bolded call-to-actions
    to drive clicks or responses.
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 将内容结构化为“引言”、“主要技巧”和“行动项”等不同的部分。使用换行符提高可读性，使用表情符号增加视觉吸引力，并用加粗的CTAs来驱动点击或回复。
- en: 3\. E-Book Chapter
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 电子书章节
- en: Maintain consistent heading levels throughout. Begin with an engaging introduction,
    followed by clearly labeled sections or steps. Use styled quotes, side notes,
    or summary blocks at the end of sections.
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 在整个文档中保持一致的标题级别。从一个引人入胜的引言开始，接着是清晰标记的部分或步骤。在部分结束时使用样式化的引语、旁注或总结块。
- en: 4\. Social Media Post
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 社交媒体帖子
- en: Prioritize short paragraphs and clean spacing. Use bold phrases to emphasize
    strong points, emojis (when appropriate) to add emotion, and include a call-to-action.
    Use hashtags or spacing to enhance skimmability.
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 优先考虑简短的段落和干净的间距。使用加粗短语强调重点，适当使用表情符号增加情感，并包含一个CTA。使用哈希标签或间距来增强可扫描性。
- en: 5\. Academic Summary
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 学术总结
- en: Present content in a structured, hierarchical format with numbered sections.
    Bullet points help summarize dense information. Keep a formal tone and, when needed,
    include inline citations or references.
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 以结构化、分层格式呈现内容，包含编号部分。项目符号有助于总结密集信息。保持正式的语气，并在需要时包括内联引用或参考文献。
- en: 6\. Marketing Copy
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 营销文案
- en: Use a bold, attention-grabbing headline followed by short, impactful lines.
    Emphasize benefits with bold or capitalized words. Break content into digestible
    chunks and highlight CTAs with formatting or line spacing.
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 使用一个加粗、引人注目的标题，然后是简短、有影响力的行文。用加粗或大写的词语强调好处。将内容分成可消化的块，并用格式或行间距突出CTAs。
- en: Templates for High-Impact Prompts
