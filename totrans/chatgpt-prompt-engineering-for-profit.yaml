    ****t**h**e**-**p**o**i**n**t**. ****T**h**e** ****L**L**M** ****u**s**e**s **t**h**e**se
    **e**x**a**m**p**l**e**s **t**o **e**s**t**a**b**l**i**s**h **a** ****p**a**t**t**e**r**n
    **a**n**d **t**h**e**n **g**e**n**e**r**a**t**e **a** ****r**e**s**p**o**n**s**e
    **t**h**a**t **f**o**l**l**o**w**s **t**h**e** **s**a**m**e **f**o**r**m**a**t
    **a**n**d **s**t**y**l**e**.'
- en: '****A**n** ****impo**rtan**t ****fea**tur**e ****o**f** ****F**ew**-****sh**ot**
    ****Prom**ptin**g ****i**s** ****th**at** ****t**he** ****nu**mbe**r ****o**f**
    ****exa**mple**s ****do**es** ****n**ot** ****ne**ed** ****t**o** ****b**e** ****la**rge**
    — ****ju**st** ****a**** ****f**ew** ****we**ll**-****ch**ose**n ****exa**mple**s
    ****a**re** ****en**oug**h ****t**o** ****gu**ide** ****t**he** ****mo**del**.
    ****Th**is** ****i**s** ****w**hy** ****i**t** ****i**s** ****ca**lle**d " ****f**ew**-****sh**ot**
    ". ****T**he** ****go**al** ****i**s** ****n**ot** ****t**o** ****ret**rai**n
    ****t**he** ****mo**del**, ****b**ut** ****t**o** ****gu**ide** ****i**t** ****o**n**
    ****t**he** ****spe**cifi**c ****ta**sk**.'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 几次提示的一个重要特征是，示例的数量不需要很大——只需几个精心挑选的示例就足以指导模型。这就是为什么它被称为“几次提示”。目标不是让模型记住，而是指导它在特定任务上。
