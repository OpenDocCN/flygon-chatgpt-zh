- en: Basics about AI and writing prompts Learn About Artificial Intelligence (AI)
  id: totrans-37
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 关于人工智能和写作提示的基础知识 了解人工智能（AI）
- en: '![](image_rsrcG4.jpg)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcG4.jpg)'
- en: Artificial Intelligence , commonly known as AI, refers to the development of
    computers or computer systems capable of intelligent functioning, akin to humans.
    It involves creating machines with the ability to analyze information and make
    decisions, automating the execution of complex tasks.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能，通常简称为AI，指的是开发能够进行智能功能、类似于人类的计算机或计算机系统。它涉及创建能够分析信息和做出决策的机器，自动化执行复杂任务。
- en: The development of AI revolves around crafting programs or algorithms that emulate
    human capabilities, emphasizing learning and adaptability. These machines possess
    the capacity to process information and execute various tasks more efficiently
    over time.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的发展围绕着创建模拟人类能力的程序或算法，强调学习和适应性。这些机器具有随着时间的推移更有效地处理信息和执行各种任务的能力。
- en: Moreover, AI exhibits the capability to operate autonomously and learn from
    data and experiences through a process known as Machine Learning. Additionally,
    it can adapt to changing conditions and situations, showcasing a remarkable level
    of adaptability for enhanced work efficiency.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，人工智能展现出通过称为机器学习的过程自主操作和从数据及经验中学习的能力。此外，它能够适应不断变化的情况和条件，展示了令人瞩目的适应性，以提升工作效率。
- en: 'AI: Transforming Every Aspect of the World AI possesses the potential to revolutionize
    the world across economic, social, and environmental domains. Presently, numerous
    businesses and organizations are integrating AI into their operations, opening
    new avenues for business opportunities and elevating work efficiency. Consequently,
    the demand for individuals skilled in AI continues to surge.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能：改变世界的每一个方面 人工智能具有在经济、社会和环境领域彻底改变世界的潜力。目前，许多企业和组织正在将人工智能整合到他们的运营中，开辟新的商业机会，提高工作效率。因此，对具备人工智能技能的个人需求持续增长。
- en: 'Current applications of AI include:'
  id: totrans-43
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能的当前应用包括：
- en: ● Product recommendation systems on online shopping websites
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: ● 在线购物网站上的产品推荐系统
- en: ● Automatic translation systems
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: ● 自动翻译系统
- en: ● Face recognition systems
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: ● 面部识别系统
- en: ● Automatic driving systems
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: ● 自动驾驶系统
- en: ● Precision medical systems
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: ● 精准医疗系统
- en: Undoubtedly, AI stands as a transformative technology with far-reaching implications.
    Individuals equipped with knowledge and skills in AI are poised for greater success
    in their businesses and careers, considering the pivotal role AI is destined to
    play in the future.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 毫无疑问，人工智能作为一种具有深远影响的技术，正站在变革的前沿。具备人工智能知识和技能的个人，在他们的商业和职业生涯中，有望取得更大的成功，考虑到人工智能在未来注定要扮演的关键角色。
- en: Types of AI
  id: totrans-50
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能的类型
- en: 'AI technology can be categorized into the following types:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能技术可以分为以下类型：
- en: '● Machine Learning (ML): This AI technology enables machines to learn autonomously
    based on sample data.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: ● 机器学习（ML）：这项人工智能技术使机器能够根据样本数据自主学习。
- en: '● Artificial Neural Networks: Simulating the human brain''s functioning, this
    AI technology utilizes a network of artificial nerve cells.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: ● 人工神经网络：模拟人脑功能，这项人工智能技术利用人工神经细胞网络。
- en: '● Robots (Robotics): This AI technology facilitates the automation of tasks
    through machines.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: ● 机器人（机器人技术）：这项人工智能技术通过机器促进任务的自动化。
- en: '● Natural Language Processing: Enabling machines to understand and process
    human language, this AI technology enhances interaction.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: ● 自然语言处理：使机器能够理解和处理人类语言，这项人工智能技术增强了交互。
- en: '● Computer Vision: This AI technology empowers machines to perceive and comprehend
    their surroundings visually.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: ● 计算机视觉：这项人工智能技术使机器能够通过视觉感知和理解其周围环境。
- en: What are the main types of AI that people commonly use?
  id: totrans-57
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人们通常使用的主要人工智能类型有哪些？
- en: 1\. Google Bard
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 1. Google Bard
- en: '![](image_rsrcG5.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcG5.jpg)'
- en: Google Bard is a powerful Large Language Model (LLM) developed by Google AI.
    Trained extensively on large datasets containing text and code, Google Bard possesses
    the capability to learn and comprehend human language deeply. This versatility
    allows its application in various contexts and for numerous purposes.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: Google Bard是由Google AI开发的一个强大的大型语言模型（LLM）。它在包含文本和代码的大量数据集上进行了广泛训练，能够深入学习和理解人类语言。这种多功能性使其适用于各种情境和多种目的。
- en: Google Bard functions by establishing connections between words and sentences
    within a dataset. This approach enables it to grasp the meaning of the text and
    generate context-sensitive messages. For instance, if presented with the message
    "Dogs are pets," Google Bard comprehends that "dogs" are "pets" and "pets" are
    "creatures kept as companions." Leveraging this understanding, Google Bard can
    create new phrases like "Dogs are cute pets" or "I have a pet dog."
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: Google Bard通过在数据集内的单词和句子之间建立联系来工作。这种方法使它能够理解文本的含义并生成上下文相关的消息。例如，如果呈现的消息是“狗是宠物”，Google
    Bard理解“狗”是“宠物”，“宠物”是“被当作伴侣饲养的动物”。利用这种理解，Google Bard可以创造新的短语，如“狗是可爱的宠物”或“我有一只宠物狗。”
- en: Furthermore, Google Bard excels in language translation, creative content generation,
    and answering questions. For instance, when asked, "What are you doing?" or "Paris
    is the capital of which country?" Google Bard adeptly responds with, "Paris is
    the capital of France."
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，Google Bard在语言翻译、创意内容生成和回答问题方面表现出色。例如，当被问及“你在做什么？”或“巴黎是哪个国家的首都？”时，Google
    Bard能够熟练地回答：“巴黎是法国的首都。”
- en: Recommended Basic Books on Google Bard
  id: totrans-63
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 推荐的Google Bard基础书籍
- en: 'Book Title: Get to Know and Use Google Bard, an AI Competing with ChatGPT.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 书名：了解并使用与ChatGPT竞争的AI——Google Bard。
- en: '![](image_rsrcG6.jpg)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrcG6.jpg)'
- en: 2\. ChatGPT
  id: totrans-66
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. ChatGPT
- en: ChatGPT is a large-scale language model (LLM) developed by OpenAI, which falls
    under the category of artificial intelligence (AI) capable of generating and understanding
    text. Trained on extensive datasets of text and code, ChatGPT excels in creating
    text, translating languages, generating creative content, and answering questions
    remarkably.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是由OpenAI开发的大型语言模型（LLM），属于人工智能（AI）类别，能够生成和理解文本。它在大量文本和代码数据集上进行了训练，擅长创建文本、翻译语言、生成创意内容和回答问题。
- en: '![](image_rsrcG7.jpg)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrcG7.jpg)'
- en: 'Examples of ChatGPT''s Capabilities:'
  id: totrans-69
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT功能示例：
- en: '● Creating Various Text Types: ChatGPT can generate different types of text,
    including poems, code snippets, conversations, and articles.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: ● 创建各种文本类型：ChatGPT可以生成不同类型的文本，包括诗歌、代码片段、对话和文章。
- en: '● Language Understanding: It excels in understanding language, encompassing
    word meanings, relationships between words, and sentence structures.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: ● 语言理解：它在理解语言方面表现出色，包括词义、词语之间的关系和句子结构。
- en: '● Language Translation: ChatGPT is capable of translating languages.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: ● 语言翻译：ChatGPT能够翻译语言。
- en: '● Generating Creative Content: It can write creative pieces such as novels,
    screenplays, and plays.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: ● 创造创意内容：它可以撰写创意作品，如小说、剧本和戏剧。
- en: '● Research Applications: ChatGPT is utilized in research for tasks like data
    mining, natural language understanding, and language modeling.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: ● 研究应用：ChatGPT在数据挖掘、自然语言理解和语言建模等研究任务中得到应用。
- en: Recommended Basic Books about ChatGPT
  id: totrans-75
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 推荐的ChatGPT基础书籍
- en: 'Book Title: ChatGPT Basics for Beginners: A Popular AI.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 书名：ChatGPT入门基础：一种流行的AI。
- en: What is Prompt?
  id: totrans-77
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 什么是提示？
- en: '![](image_rsrcG8.jpg)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrcG8.jpg)'
- en: Prompts are messages written to guide AI in creating content or providing specific
    answers. They play a crucial role in AI's work as they define the direction and
    scope of the tasks it performs.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是为引导AI创建内容或提供特定答案而编写的消息。它们在AI的工作中扮演着至关重要的角色，因为它们定义了AI执行任务的方向和范围。
- en: What qualities should a good prompt have?
  id: totrans-80
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 一个好的提示应该具备哪些品质？
- en: 'A good prompt should possess the following qualities:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好的提示应该具备以下品质：
- en: '● Clear and Concise: It should be clear and concise, facilitating easy understanding
    for the AI to work efficiently.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: ● 清晰简洁：它应该是清晰简洁的，以便AI能够高效地工作。
- en: '● Coverage of Desired Issues: It must cover the desired issues comprehensively,
    enabling the AI to generate content or answers that are complete and to the point.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: ● 涵盖所需问题：它必须全面涵盖所需问题，使AI能够生成完整且简洁的内容或答案。
- en: '● Creativity: The inclusion of creative elements helps the AI in producing
    new and interesting content or answers.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: ● 创意：包含创意元素有助于AI产生新颖有趣的内容或答案。
- en: 'Prompts find application in various contexts, including: ● Writing Work: Such
    as crafting articles, poetry, or code. ● Translation Work: Including language
    and document'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 提示在各种场景中都有应用，包括：● 写作工作：如撰写文章、诗歌或代码。● 翻译工作：包括语言和文档翻译。
- en: translation.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: translation.
- en: '● Research: In tasks like summarizing data and data synthesis. ● Customer Service:
    For answering questions and solving'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: ● 研究：在总结数据和数据合成等任务中。● 客户服务：用于回答问题和解决问题。
- en: problems.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: problems.
- en: Writing a good prompt is crucial as it aids the AI in working efficiently and
    meeting the user's needs.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个好的提示至关重要，因为它有助于AI高效工作并满足用户的需求。
- en: Prompt Types
  id: totrans-90
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 提示类型
- en: 'Prompts are categorized into four main types:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 提示分为四大主要类型：
- en: 1\. Objective Specification Prompt
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 目标规范提示
- en: This type of prompt is employed to outline the task's purpose for the AI, examples
    include "write articles about technology," "translate from Thai to English," and
    "write Python program code." It is essential for this prompt to clearly and concisely
    state its purpose, aiding the AI in understanding the intended task.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 此类提示用于概述AI任务的目的，例如“撰写关于技术的文章”、“从泰语翻译成英语”和“编写Python程序代码”。此类提示必须清晰简洁地陈述其目的，以帮助AI理解预期的任务。
- en: 2\. Information Specification Prompt
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 信息规范提示
- en: Used to communicate necessary information required by the AI, examples include
    "information about technology," "Thai sentences," and "Python program code." This
    prompt should articulate complete and accurate information, ensuring the AI operates
    efficiently.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 用于传达AI所需的信息，例如“关于技术的信息”、“泰语句子”和“Python程序代码”。此类提示应明确完整且准确的信息，确保AI高效运行。
- en: 3\. Format Specification Prompt
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 格式规范提示
- en: This type of prompt is utilized to define the desired result's format, such
    as "Write an article in the form of news," "Translate language in the form of
    a conversation," and "Write program code in the form of a function." It is crucial
    for this prompt to clearly specify the format, guiding the AI in producing the
    intended outcome.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 此类提示用于定义所需结果的格式，例如“以新闻形式撰写文章”、“以对话形式翻译语言”和“以函数形式编写程序代码”。此类提示必须明确指定格式，以指导AI产生预期的结果。
- en: 4\. Limitations Specification Prompt
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 限制规范提示
- en: Employed to highlight various limitations in the task, examples include "Write
    an article no longer than 1000 words," "Translate no more than 200 words," and
    "Write code, and the program must run within 1 second." This prompt should explicitly
    state the constraints, enabling the AI to operate within the specified limitations.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 用于突出任务中的各种限制，例如“撰写不超过1000字的文章”、“翻译不超过200字的文本”和“编写程序代码，且程序必须在1秒内运行”。此类提示应明确声明限制，使AI在指定的限制内操作。
- en: 'Additional Prompt Categories Prompts can also be categorized based on the nature
    of the work:'
  id: totrans-100
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 其他提示分类提示还可以根据工作的性质进行分类：
- en: ● Work Type Specification Prompt
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: ● 工作类型规范提示
- en: This type of prompt is utilized to specify the nature of the task, including
    "writing articles," "translating languages," "coding," etc.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 此类提示用于指定任务的性质，包括“撰写文章”、“翻译语言”、“编码”等。
- en: ● Difficulty Level Specification Prompt
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: ● 难度级别规范提示
- en: Used to indicate the difficulty level of the task, examples include "write an
    easy article," "translate a difficult language," "write a high-level code," etc.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 用于指示任务的难度级别，例如“撰写一篇简单文章”、“翻译一种困难的语言”、“编写高级代码”等。
- en: ● Result Type Specification Prompt
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: ● 结果类型规范提示
- en: This type of prompt is employed to specify the desired result type, such as
    "text result," "visual result," "audio result," etc.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 此类提示用于指定所需的结果类型，如“文本结果”、“视觉结果”、“音频结果”等。
- en: Selecting the appropriate prompt type for the intended task enhances the efficiency
    of AI operations, ensuring that it meets the user's needs effectively.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 选择适当的提示类型以提高AI操作的效率，确保它能够有效满足用户的需求。
- en: Recommended Books for Laying the Foundations for Writing Prompts
  id: totrans-108
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 编写提示的基础书籍推荐
- en: 'Book Title: "How to Write a Prompt for ChatGPT, Bard, and Other AI to Achieve
    Desired Results."'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 书名：《如何为ChatGPT、Bard和其他AI编写提示以实现预期结果》
- en: Recommended Books for Writing Advanced Prompts
  id: totrans-110
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 编写高级提示的推荐书籍
- en: 'Book Title: "Advanced Prompt Writing Techniques," which includes 500 prompt
    commands that are actively utilized. It covers all types of work for ChatGPT,
    Bard, Bing, and other AI.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 书名：《高级提示写作技巧》，包含 500 个正在积极使用的提示命令。它涵盖了 ChatGPT、Bard、Bing 和其他 AI 的所有类型的工作。
- en: Chapter
  id: totrans-112
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 章节
- en: '2'
  id: totrans-113
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '2'
- en: Getting to know Copilot AI What is Copilot AI?
  id: totrans-114
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 了解 Copilot AI 什么是 Copilot AI？
- en: '![](image_rsrcG9.jpg)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcG9.jpg)'
- en: Copilot AI is an artificial intelligence (AI) tool that enables users to write
    text, code, and perform various tasks. Leveraging machine learning technology,
    Copilot learns from extensive text and code datasets, allowing it to suggest potential
    words, phrases, and sentences. It also possesses the capability to identify and
    rectify errors in both text and code. Its functionality is akin to that of ChatGPT
    and Google Bard.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot AI 是一种人工智能（AI）工具，它使用户能够撰写文本、编写代码并执行各种任务。借助机器学习技术，Copilot 从大量的文本和代码数据集中学习，从而能够建议可能的单词、短语和句子。它还具有识别和纠正文本和代码中错误的能力。其功能类似于
    ChatGPT 和 Google Bard。
- en: What are the Benefits of Copilot AI?
  id: totrans-117
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Copilot AI 的好处是什么？
- en: 'Microsoft Copilot offers numerous benefits for users:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: Microsoft Copilot 为用户提供了许多好处：
- en: '● Time and Labor Savings: Copilot facilitates quick and easy text and code
    writing, saving users time and effort.'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: ● 节省时间和劳动：Copilot 使文本和代码的编写变得快速且容易，从而节省用户的时间和精力。
- en: '● Enhanced Work Quality: Copilot assists users in crafting more accurate, clear,
    and creative messages, thereby improving overall work quality.'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: ● 提升工作质量：Copilot 帮助用户创作更准确、清晰和富有创意的信息，从而提高整体工作质量。
- en: '● Opening New Opportunities: Copilot creates opportunities for users to explore
    and create new works.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: ● 开辟新机遇：Copilot 为用户探索和创作新作品创造了机会。
- en: '● Improved Communication: By aiding in message and code correctness verification,
    Copilot helps users communicate more effectively.'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: ● 改善沟通：通过帮助验证信息和代码的正确性，Copilot 帮助用户更有效地沟通。
- en: Main Features of Copilot AI
  id: totrans-123
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Copilot AI 的主要功能
- en: 'Copilot AI boasts numerous key features, outlined as follows:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot AI 拥有许多关键特性，如下所述：
- en: 1\. Real-time Suggestions (Quick Suggest)
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 实时建议（快速建议）
- en: Copilot AI provides real-time suggestions while users are typing, enabling faster
    and more efficient work. There's no need to pause typing to consider what to write
    next.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot AI 在用户键入时提供实时建议，使工作更加快速和高效。无需暂停键入来考虑接下来要写什么。
- en: 2\. Editing and Improvement Assistance
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 编辑和改进协助
- en: Copilot AI aids in correcting and enhancing users' work by suggesting appropriate
    vocabulary, sentences, and writing styles.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot AI 通过建议适当的词汇、句子和写作风格，帮助用户纠正和提升他们的工作。
- en: 3\. Facilitating the Creation of New Content
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 促进新内容的创作
- en: Copilot AI plays a role in generating new content ideas for users, assisting
    in tasks such as creating documents, composing emails, and presenting information.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot AI 在为用户提供新的内容想法方面发挥作用，协助创建文档、撰写电子邮件和展示信息等任务。
- en: 4\. Collaboration Support
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 协作支持
- en: Copilot AI enhances collaboration efforts by offering effective communication
    and collaboration methods.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot AI 通过提供有效的沟通和协作方法，增强了协作努力。
- en: Copilot AI seamlessly integrates with Microsoft 365 applications, including
    Word, Excel, PowerPoint, Teams, and Outlook. It collaborates with these applications
    to provide suggestions and assistance with tasks.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot AI 无缝集成到 Microsoft 365 应用程序中，包括 Word、Excel、PowerPoint、Teams 和 Outlook。它与这些应用程序协作，提供任务建议和协助。
- en: 'Examples of How Copilot AI Can Help:'
  id: totrans-134
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Copilot AI 如何帮助的示例：
- en: '● Document Creation: Copilot assists in creating various types of documents,
    such as reports, letters, and articles. It suggests appropriate vocabulary, sentences,
    and writing styles tailored to the document''s content.'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: ● 文档创建：Copilot 帮助创建各种类型的文档，如报告、信件和文章。它根据文档内容建议适当的词汇、句子和写作风格。
- en: '● Email Writing: Copilot aids in crafting clear, concise, and focused emails.
    It offers a clear and polite writing style, including words and sentences suitable
    for the email''s content.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: ● 邮件写作：Copilot 帮助撰写清晰、简洁、专注的电子邮件。它提供清晰、礼貌的写作风格，包括适合电子邮件内容的单词和句子。
- en: '● Information Presentation: Copilot contributes to the creation of effective
    presentations, suggesting clear and interesting formats, along with appropriate
    information and graphics.'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: ● 信息展示：Copilot 有助于创建有效的演示文稿，建议清晰、有趣的格式，以及适当的信息和图形。
- en: '● Team Collaboration: Copilot supports coordination in team collaboration,
    offering an effective means of communication and collaboration.'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: ● 团队协作：Copilot 支持团队协作中的协调，提供了一种有效的沟通和协作方式。
- en: Copilot AI is an incredibly powerful and useful tool for all Microsoft 365 users,
    significantly boosting productivity.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot AI 是所有 Microsoft 365 用户的一个极其强大且有用的工具，显著提高了生产力。
- en: Other features of Copilot AI
  id: totrans-140
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Copilot AI 的其他功能
- en: '● Copilot AI: Copilot AI incorporates GPT-4, OpenAI''s latest model, which
    users can access for free without any payment.'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: ● Copilot AI：Copilot AI 集成了 OpenAI 的最新模型 GPT-4，用户可以免费访问，无需支付任何费用。
- en: '● Copilot AI: Copilot AI leverages the new and improved DALL-E 3 model for
    creating higher-quality images.'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: ● Copilot AI：Copilot AI 利用新的和改进的 DALL-E 3 模型创建更高品质的图像。
- en: '● Copilot AI: Copilot AI assists in editing text within Microsoft Edge.'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: ● Copilot AI：Copilot AI 帮助在 Microsoft Edge 中编辑文本。
- en: '● Copilot AI: Copilot AI''s Multi-Modal Search feature enables simultaneous
    searching with multiple input formats.'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: ● Copilot AI：Copilot AI 的多模态搜索功能允许使用多种输入格式同时搜索。
- en: '● Copilot AI: Copilot AI aids in calculating and analyzing data and can assist
    in writing code.'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: ● Copilot AI：Copilot AI 帮助计算和分析数据，并可在编写代码时提供协助。
- en: '● Copilot AI: Copilot AI provides deep search capabilities for Bing users,
    enhancing search results for highly specific information and ensuring precise
    answers.'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: ● Copilot AI：Copilot AI 为 Bing 用户提供了深度搜索功能，增强了高度特定信息的搜索结果，并确保精确的答案。
- en: 'Copilot AI is available in the following Microsoft products:'
  id: totrans-147
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Copilot AI 可在以下 Microsoft 产品中使用：
- en: ● Microsoft Office ● Microsoft Teams ● Microsoft Edge ● Microsoft Outlook ●
    Microsoft OneNote ● Microsoft Visio ● Microsoft Project ● Microsoft Power BI ●
    Microsoft Azure
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: ● Microsoft Office ● Microsoft Teams ● Microsoft Edge ● Microsoft Outlook ●
    Microsoft OneNote ● Microsoft Visio ● Microsoft Project ● Microsoft Power BI ●
    Microsoft Azure
- en: Users can utilize Copilot AI by enabling it in their preferred Microsoft product.
    They can then commence writing text, coding, or performing other tasks as usual.
    Copilot will offer suggestions and feedback. Users have the option to either incorporate
    Copilot's suggestions or decide to write messages or perform other tasks independently,
    as desired.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 用户可以通过在首选的 Microsoft 产品中启用 Copilot AI 来使用它。然后，他们可以像往常一样开始编写文本、编码或执行其他任务。Copilot
    将提供建议和反馈。用户可以选择接受 Copilot 的建议或决定独立编写消息或执行其他任务。
- en: Chapter
  id: totrans-150
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 章节
- en: '3'
  id: totrans-151
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '3'
- en: Using Copilot AI in a way similar to ChatGPT or Google Bard. Register to use
    Copilot AI
  id: totrans-152
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 以类似 ChatGPT 或 Google Bard 的方式使用 Copilot AI。注册使用 Copilot AI
- en: 1\. Go to web https://copilot.microsoft.com/
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 访问网页 https://copilot.microsoft.com/
- en: 2\. Click the Sign-in button to enter the system.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 点击“登录”按钮进入系统。
- en: '![](image_rsrcGA.jpg)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcGA.jpg)'
- en: 3\. Sign in with an email from Microsoft such as hotmail or outlook. If you
    don't have one, create a new email by clicking Create One.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 使用 Microsoft 的电子邮件（如 hotmail 或 outlook）登录。如果没有，请点击“创建一个”创建新电子邮件。
- en: '![](image_rsrcGB.jpg)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcGB.jpg)'
- en: 4\. Enter your password and click the Sign-in button to enter Copilot under
    your account.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 输入您的密码并点击“登录”按钮，使用您的账户进入 Copilot。
- en: '![](image_rsrcGC.jpg)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcGC.jpg)'
- en: 5\. Once signed in, you will be directed to the Copilot screen, as depicted
    in the picture below. Following this, you can enter the Prompt command, as illustrated
    in the red box, allowing Copilot AI to work according to your preferences. The
    functionality is akin to Google Bard and ChatGPT.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 登录后，您将被引导到 Copilot 屏幕，如图下所示。随后，您可以输入提示命令，如图中红色框所示，允许 Copilot AI 根据您的偏好工作。其功能类似于
    Google Bard 和 ChatGPT。
- en: '![](image_rsrcGD.jpg)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrcGD.jpg)'
- en: 'Example of Copilot AI Language Translation:'
  id: totrans-162
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Copilot AI 语言翻译示例：
- en: Prompt Command >
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 提示命令 >
