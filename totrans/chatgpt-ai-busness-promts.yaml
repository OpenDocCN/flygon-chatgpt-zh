- en: 'Chapter 3:'
  id: totrans-132
  prefs:
  - PREF_H1
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第3章：
- en: Prompts for Sales and ConversionIt's
  id: totrans-133
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 销售和转化提示
- en: It's critical to stay ahead of the competition in the fast-paced world of sales.
    As AI continues to transform numerous industries, astute salespeople are utilizing
    its potential to optimize their processes, enhance their approaches, and eventually
    increase sales.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在销售竞争激烈的快节奏世界中，保持领先至关重要。随着AI继续改变多个行业，精明的销售人员正在利用其潜力来优化他们的流程，改进他们的方法，并最终增加销售额。
- en: To help you begin utilizing AI in your daily sales role, I'll go over the potential
    of several Large Language Models (LLMs) in this chapter, including ChatGPT, Claude,
    and Gemini, along with sample prompts and use cases.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助您开始在日常销售角色中使用AI，我将在本章中介绍几个大型语言模型（LLM）的潜力，包括ChatGPT、Claude和Gemini，以及示例提示和用例。
- en: These prompts will assist you in utilizing AI's potential to surpass sales goals
    and boost commissions, from creating captivating email templates to evaluating
    client information and getting ready for important meetings.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这些提示将帮助您利用AI的潜力超越销售目标并提高佣金，从创建吸引人的电子邮件模板到评估客户信息和准备重要会议。
- en: Is it better to use Gemini, Claude, ChatGPT, or another program?
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Gemini、Claude、ChatGPT或其他程序更好吗？
- en: Several chat AI applications are currently available, even though ChatGPT is
    one of the most widely used AI assistants. Each has distinct advantages and disadvantages
    and is powered by a different LLM.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管ChatGPT是最广泛使用的AI助手之一，但目前有几种聊天AI应用程序可用。每个都有其独特的优缺点，并由不同的LLM提供支持。
- en: Researching prospects and accounts using ChatGPT prompts
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT提示进行潜在客户和账户研究
- en: Examples of prompts
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例
- en: Describe {{company name}} in brief, mentioning their size, industry, important
    decision-makers, and most recent news.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 简要描述{{公司名称}}，提及其规模、行业、重要决策者以及最新的新闻。
- en: Determine the top {{number}} rivals of {{business name}} and list their advantages
    and disadvantages in comparison to our {{product/service}}.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 确定{{公司名称}}的前{{数字}}个竞争对手，并列出它们与我们{{产品/服务}}相比的优缺点。
- en: Examine the most prevalent issues and problems {{industry}} businesses encounter
    in relation to {{topic}}.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 检查{{行业}}企业在{{主题}}方面遇到的最常见问题和问题。
- en: Give information about the background and priorities of the important decision-makers
    at {{company name}} who make decisions about the purchase of {{product/service}}.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 提供关于{{公司名称}}中做出{{产品/服务}}购买决策的重要决策者的背景和优先级信息。
- en: Please provide an overview of the most recent rules and trends in {{industry}}
    that could affect the uptake of our {{product/service}}.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 请概述最近影响我们{{产品/服务}}采用率的{{行业}}规则和趋势。
- en: Determine which technology stack or solutions {{company name}} currently uses
    for {{business function}} and evaluate how well they work with our {{product/service}}.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 确定{{公司名称}}目前用于{{业务功能}}的技术栈或解决方案，并评估它们与我们的{{产品/服务}}的兼容性。
- en: Based on their most recent annual report, give a summary of {{company name}}'s
    financial performance and growth forecasts.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 根据其最新的年度报告，总结{{公司名称}}的财务表现和增长预测。
- en: Determine possible applications or use cases for our {{product/service}} in
    the particular business processes of {{company name}}.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 确定我们的{{产品/服务}}在{{公司名称}}特定业务流程中的可能应用或用例。
- en: Based on their procurement policies and previous purchases, investigate the
    criteria and purchasing procedure for {{product/service}} at {{company name}}.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 根据他们的采购政策和之前的购买情况，调查{{公司名称}}中{{产品/服务}}的采购标准和采购流程。
- en: Determine the most important metrics and KPIs that a business in {{industry}}
    could use to assess {{business function}}'s success and connect them to the advantages
    of our {{product/service}}.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 确定一个{{行业}}企业可以用来评估{{业务功能}}成功的重要指标和KPI，并将它们与我们{{产品/服务}}的优势联系起来。
- en: Writing sales emails using ChatGPT prompts
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT提示编写销售邮件
- en: Examples of prompts
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例
- en: Send a customized cold email outlining our {{product/service}} and its advantages
    to {{prospect name}} at {{company name}} in the {{industry}} sector.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 向{{潜在客户姓名}}在{{公司名称}}的{{行业}}领域发送一封定制的冷邮件，概述我们的{{产品/服务}}及其优势。
- en: After our first call, write a follow-up email to {{prospect name}} outlining
    the main ideas we covered and suggesting the next steps.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的第一次电话之后，为{{潜在客户姓名}}撰写一封后续邮件，概述我们讨论的主要观点，并提出下一步行动建议。
- en: Write a draft email to {{customer name}} addressing their concerns regarding
    {{issue}} and providing our {{product/service}} as a solution.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{客户姓名}}撰写一封草稿邮件，针对他们关于{{问题}}的担忧，并提供我们的{{产品/服务}}作为解决方案。
- en: Send {{customer name}} an email explaining our new {{product/service}} and how
    it will help their company.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 向{{客户姓名}}发送一封邮件，解释我们的新{{产品/服务}}及其如何帮助他们的公司。
- en: Send {{prospect name}} an email asking to meet so that you can talk about how
    our {{product/service}} can help them reach their {{specific goal}}.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 向{{潜在客户姓名}}发送一封邮件，邀请他们参加即将举行的网络研讨会，展示我们的{{产品/服务}}及其在{{行业}}领域的应用。
- en: Send {{customer name}} an email with a case study of how our {{product/service}}
    was successfully utilized by a comparable business in the {{industry}} sector.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 向{{客户姓名}}发送一封邮件，附上案例研究，说明我们的{{产品/服务}}如何在{{行业}}领域内的类似企业中成功应用。
- en: Write a brief email to {{prospect name}} introducing our {{product/service}}
    with a special, time-limited discount.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{潜在客户姓名}}撰写一封简短的邮件，介绍我们的{{产品/服务}}，并附上特别且限时折扣。
- en: Send {{customer name}} an email expressing gratitude for their recent purchase
    and offering more information or advice about their {{product/service}}.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 向{{客户姓名}}发送一封邮件，表达对他们最近购买的感激之情，并提供更多关于他们的{{产品/服务}}的信息或建议。
- en: Send {{prospect name}} an email inviting them to a webinar that will be held
    soon to showcase our {{product/service}} and its uses in the {{industry}} sector.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 向{{潜在客户姓名}}发送一封邮件，邀请他们参加即将举行的网络研讨会，展示我们的{{产品/服务}}及其在{{行业}}领域的应用。
- en: Write a customized email to {{customer name}} on their birthday, expressing
    gratitude with a unique discount or present.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{客户姓名}}在他们的生日时撰写一封定制的邮件，通过独特的折扣或礼物表达感激之情。
- en: Sales script creation prompts in ChatGPT.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT中的销售脚本创建提示。
- en: Examples of prompts
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例
- en: Write a cold call sales script that introduces our {{product/service}} and its
    value to {{prospect name}} at {{company name}} in the {{industry}} sector.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{公司名称}}在{{行业}}领域的{{潜在客户姓名}}编写一封介绍我们的{{产品/服务}}及其价值的冷电话销售脚本。
- en: Write a script outlining the salient characteristics and advantages of our {{product/service}}
    for a product demo to {{prospect name}}.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{潜在客户姓名}}编写一个脚本，概述我们的{{产品/服务}}在产品演示中的显著特性和优势。
- en: After sending a proposal to {{prospect name}}, create a script for a follow-up
    call that highlights the benefits of our {{product/service}} and addresses any
    possible objections.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在向{{潜在客户姓名}}发送提案后，创建一个后续电话脚本，突出我们的{{产品/服务}}的好处，并解决任何可能的异议。
- en: To upsell our {{complementary product/service}} to {{customer name}} based on
    their most recent purchase, write a script for a call.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 根据{{客户姓名}}最近的一次购买，编写一个电话脚本，以推销我们的{{互补产品/服务}}。
- en: To invite {{prospect name}} to an exclusive event that will highlight our {{product/service}}
    and its uses in the {{industry}} sector, write a script for a call.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 为邀请{{潜在客户姓名}}参加一个将突出我们的{{产品/服务}}及其在{{行业}}领域的应用的独家活动，编写一个电话脚本。
- en: Create a script for a call to {{customer name}} to find out how they felt about
    our {{product/service}} and to pinpoint any areas that need work.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{客户姓名}}编写一个电话脚本，以了解他们对我们的{{产品/服务}}的看法，并确定需要改进的任何领域。
- en: Write a call script to {{prospect name}} offering a complimentary trial of our
    {{product/service}} and assisting them with the registration process.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{潜在客户姓名}}编写一个电话脚本，提供我们{{产品/服务}}的免费试用，并协助他们完成注册流程。
- en: Create a script for a phone call to {{customer name}} to let them know that
    their {{product/service}} subscription is about to renew and to go over any possible
    updates or modifications.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{customer name}}创建一份电话脚本，告知他们的{{product/service}}订阅即将续订，并概述任何可能的更新或修改。
- en: Write a script for a phone conversation with {{prospect name}} to go over a
    new industry report and how our {{product/service}} can help them remain competitive.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{prospect name}}撰写一份电话对话脚本，概述一份新的行业报告以及我们的{{product/service}}如何帮助他们保持竞争力。
- en: Write a script for a phone call to {{customer name}} to express gratitude for
    their support and provide a special discount on their subsequent purchases.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{customer name}}撰写一份电话脚本，表达对其支持的感激之情，并提供后续购买的特别折扣。
- en: Prompts for sales meetings in ChatGPT
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT销售会议提示
- en: Examples of prompts
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例
- en: Give an overview of {{prospect name}}'s business, including its history, important
    decision-makers, and any recent occurrences or news that might be pertinent to
    our {{product/service}} offering.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 概述{{prospect name}}的业务，包括其历史、重要决策者以及可能与我们{{product/service}}提供相关的任何最近发生的事件或新闻。
- en: To improve the sales process, use {{prospect name}} to summarize the key points
    of the last meeting and recommend subjects for the next one.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 为了改善销售流程，使用{{prospect name}}总结上次会议的关键点，并推荐下次会议的主题。
- en: Make a list of possible inquiries {{prospect name}} might have regarding our
    {{product/service}} throughout the meeting and offer suitable answers.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 列出{{prospect name}}在会议中可能对我们{{product/service}}提出的可能疑问，并提供合适的答案。
- en: Based on their most recent {{industry}} report, determine the main problems
    and difficulties that {{prospect name}}'s business is facing, and suggest how
    our {{product/service}} can help.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 根据他们最新的{{industry}}报告，确定{{prospect name}}业务面临的主要问题和困难，并提出我们的{{product/service}}如何帮助的建议。
- en: Make a meeting agenda with {{prospect name}}, allowing time for Q&A, {{product/service}}
    presentation, introductions, and next steps.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 与{{prospect name}}制定会议议程，包括问答时间、{{product/service}}展示、介绍和下一步行动。
- en: Create a competitive analysis that highlights our advantages and distinctive
    value proposition by contrasting our {{product/service}} with the solutions that
    {{prospect name}}'s business is currently using.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一份突出我们优势及独特价值主张的竞争分析，通过将我们的{{product/service}}与{{prospect name}}业务目前使用的解决方案进行对比。
- en: Provide {{prospect name}} with a list of case studies or customer success stories
    to discuss during the meeting, emphasizing businesses comparable to theirs in
    terms of size, sector, or difficulties encountered.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 向{{prospect name}}提供一份案例研究或客户成功故事清单，在会议中讨论，强调与他们在规模、行业或遇到的困难方面可比的业务。
- en: To learn more about {{prospect name}}'s needs, priorities, and decision-making
    process, prepare a list of discovery questions to ask them during the meeting.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更了解{{prospect name}}的需求、优先事项和决策过程，准备一份在会议中向他们提问的发现性问题清单。
- en: In order to be ready for any legal or procurement-related inquiries from {{prospect
    name}}, provide a synopsis of the main terms and conditions of our standard {{product/service}}
    contract.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 为了应对{{prospect name}}可能提出的任何法律或采购相关询问，提供我们标准{{product/service}}合同的主要条款和条件的概述。
- en: Generate a list of potential objections {{prospect name}} may raise during the
    meeting and suggest strategies for addressing each one effectively.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 列出{{prospect name}}在会议中可能提出的潜在反对意见，并建议针对每个意见的有效应对策略。
- en: ChatGPT prompts for creating sales proposals.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT创建销售提案的提示
- en: Examples of prompts
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例
- en: Create a personalized sales proposal for {{prospect name}} at {{company name}},
    outlining how our {{product/service}} can solve their {{specific challenge}} and
    deliver measurable results.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{company name}}的{{prospect name}}创建一份个性化的销售提案，概述我们的{{product/service}}如何解决他们的{{specific
    challenge}}并实现可衡量的成果。
- en: Write a proposal for {{prospect name}} comparing our {{product/service}} to
    competitors’ offerings and highlighting our unique selling points.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{prospect name}}撰写一份提案，将我们的{{product/service}}与竞争对手的产品进行比较，并突出我们的独特卖点。
- en: Draft a proposal for {{prospect name}} that includes a detailed implementation
    plan for our {{product/service}} and a timeline for achieving their {{specific
    goal}}.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{prospect name}}起草一份提案，包括我们{{product/service}}的详细实施计划和实现他们{{specific goal}}的时间表。
- en: Generate a proposal for {{prospect name}} that includes case studies of successful
    implementations of our {{product/service}} in the {{industry}} industry.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{prospect name}}生成一份提案，包括我们在{{industry}}行业成功实施{{product/service}}的案例研究。
- en: Create a proposal for {{prospect name}} that offers a custom package of our
    {{product/service}} tailored to their specific needs and budget.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{prospect name}}创建一个提案，提供定制化的我们的{{product/service}}套餐，以满足他们的特定需求和预算。
- en: Compose a proposal for {{prospect name}} that includes a cost-benefit analysis
    of implementing our {{product/service}} compared to maintaining their current
    solution.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{prospect name}}撰写一个包含实施我们的{{product/service}}与维持他们当前解决方案相比的成本效益分析的提案。
- en: Write a proposal for {{prospect name}} that highlights the potential ROI of
    investing in our {{product/service}} based on their specific business metrics.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 根据他们的具体业务指标，为{{prospect name}}撰写一份突出投资我们的{{product/service}}潜在投资回报率的提案。
- en: Draft a proposal for {{prospect name}} that includes a section on our company’s
    expertise and track record in the {{industry}} industry.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{prospect name}}草拟一份包含我们公司在{{industry}}行业专业知识和业绩记录的章节的提案。
- en: Generate a proposal for {{prospect name}} that offers a phased approach to implementing
    our {{product/service}}, allowing them to see value at each stage.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{prospect name}}生成一份提供分阶段实施我们的{{product/service}}的提案，使他们能够在每个阶段看到价值。
- en: Create a proposal for {{prospect name}} that includes a risk assessment and
    mitigation plan for adopting our {{product/service}} in their organization.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{prospect name}}创建一个包含采用我们的{{product/service}}在他们的组织中的风险评估和缓解计划的提案。
- en: ChatGPT prompts for negotiating
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT用于谈判的提示。
- en: Examples of prompts
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例
- en: Provide a list of potential concessions or value-adds we can offer to {{prospect
    name}} to close the deal on our {{product/service}}.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 提供一份我们可以提供给{{prospect name}}的潜在让步或增值服务的清单，以促成我们{{product/service}}的交易。
- en: Suggest alternative pricing structures or payment terms for {{product/service}}
    that may better align with {{prospect name}}’s budget and cash flow.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 建议适用于{{product/service}}的替代定价结构或支付条款，可能更好地与{{prospect name}}的预算和现金流对齐。
- en: Identify the key stakeholders and decision-makers at {{company name}} who need
    to be involved in the negotiation process for {{product/service}}.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 识别在{{company name}}中需要参与{{product/service}}谈判过程的关键利益相关者和决策者。
- en: Please provide a list of questions to ask {{prospect name}} to uncover their
    underlying interests and motivations in the negotiation.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 请提供一份问题清单，以向{{prospect name}}揭示他们在谈判中的潜在兴趣和动机。
- en: Suggest strategies for framing the value of our {{product/service}} in terms
    of {{prospect name}}’s specific business objectives and ROI.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 建议将我们的{{product/service}}的价值框架化，以符合{{prospect name}}的具体商业目标和投资回报率。
- en: Identify potential trade-offs or compromises that can be made on {{feature/term/condition}}
    to reach an agreement with {{prospect name}}.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 识别在{{feature/term/condition}}上可以做出的潜在权衡或妥协，以与{{prospect name}}达成协议。
- en: Provide a list of common objections or counterarguments that {{prospect name}}
    may raise during the negotiation and suggest ways to address them.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 提供一份{{prospect name}}在谈判过程中可能提出的常见反对意见或反论点的清单，并提出解决它们的方法。
- en: Suggest a range of acceptable discount levels or promotional offers for {{product/service}}
    based on the deal size and strategic value of {{prospect name}}.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 根据交易规模和{{prospect name}}的战略价值，建议{{product/service}}可接受的折扣水平或促销优惠范围。
- en: Identify the key contractual terms and conditions for {{product/service}} that
    are most important to {{our company}} and {{prospect name}} in the negotiation.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 识别在谈判中对于{{our company}}和{{prospect name}}最重要的{{product/service}}的关键合同条款和条件。
- en: Provide a list of best practices and tactics for building trust and rapport
    with {{prospect name}} during the negotiation process.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 提供一份在谈判过程中建立与{{prospect name}}信任和融洽关系的最佳实践和策略清单。
- en: ChatGPT prompts for analyzing sales data.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT用于分析销售数据的提示。
- en: Examples of prompts
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例
- en: Analyze the sales data for {{product/service}} over the past {{time period}}
    and provide insights on trends, top performers, and areas for improvement.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 分析过去{{time period}}内{{product/service}}的销售数据，并提供关于趋势、顶尖表现者和改进领域的见解。
- en: Compare the sales figures of {{sales rep 1}} and {{sales rep 2}} for {{product/service}}
    and identify the key factors contributing to their performance.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 比较销售代表{{sales rep 1}}和{{sales rep 2}}的{{product/service}}销售数据，并确定导致他们业绩的关键因素。
- en: Identify the top {{number}} customers by revenue for {{product/service}} and
    provide recommendations on how to further grow their accounts.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 根据收入识别{{product/service}}的前{{number}}名客户，并提供如何进一步增长他们账户的建议。
- en: Analyze the sales pipeline for {{product/service}} and predict the likelihood
    of closing each deal based on historical data and the current stage.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 分析{{产品/服务}}的销售流程，并根据历史数据和当前阶段预测每个交易的成交可能性。
- en: Identify the most common reasons for lost deals for {{product/service}} and
    suggest strategies to address these issues.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 确定导致{{产品/服务}}丢失交易的最常见原因，并提出解决这些问题的策略。
- en: Compare the sales performance of {{region 1}} and {{region 2}} for {{product/service}}
    and provide insights on the factors driving the difference.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 比较{{地区1}}和{{地区2}}的{{产品/服务}}销售业绩，并分析导致差异的因素。
- en: Analyze the impact of {{marketing campaign}} on the sales of {{product/service}}
    and calculate the ROI.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 分析{{营销活动}}对{{产品/服务}}销售的影响，并计算投资回报率（ROI）。
- en: Identify the most effective lead sources for {{product/service}} based on conversion
    rates and revenue generated.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 根据转化率和产生的收入确定{{产品/服务}}最有效的潜在客户来源。
- en: Analyze the sales cycle length for {{product/service}} and identify opportunities
    to shorten it without compromising quality.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 分析{{产品/服务}}的销售周期长度，并确定在不影响质量的情况下缩短它的机会。
- en: Compare the sales performance of {{current year}} with {{previous year}} for
    {{product/service}} and identify the key drivers of growth or decline.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 比较{{当前年份}}与{{上一年份}}的{{产品/服务}}销售业绩，并确定增长或下降的关键驱动因素。
- en: ChatGPT prompts for identifying upsell opportunities.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提示用于识别升级机会。
- en: Examples of prompts
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例
- en: Analyze {{existing client name}}’s purchase history and usage patterns to identify
    potential upsell opportunities for {{product/service}}.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 分析{{现有客户名称}}的购买历史和使用模式，以确定{{产品/服务}}的潜在升级机会。
- en: Identify complementary products or services to {{existing client name}}’s current
    {{product/service}} that can enhance their experience or solve additional challenges.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 确定可以增强{{现有客户名称}}当前{{产品/服务}}体验或解决额外挑战的互补产品或服务。
- en: Review {{existing client name}}’s customer support inquiries and feedback to
    uncover unmet needs or pain points that can be addressed by {{upsell/cross-sell
    product/service}}.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 审查{{现有客户名称}}的客户支持询问和反馈，以揭示可以通过{{升级/交叉销售产品/服务}}解决的问题或痛点。
- en: Analyze {{existing client name}}’s industry and company size to determine the
    most relevant {{upsell/cross-sell product/service}} based on typical needs and
    use cases.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 分析{{现有客户名称}}的行业和公司规模，以确定基于典型需求和用例的最相关{{升级/交叉销售产品/服务}}。
- en: Identify the key decision-makers or influencers at {{existing client name}}
    who need to be engaged for {{upsell/cross-sell product/service}} opportunities.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 确定需要参与{{升级/交叉销售产品/服务}}机会的{{现有客户名称}}的关键决策者或影响者。
- en: Provide a list of questions to ask {{existing client name}} to uncover their
    goals, challenges, and priorities related to {{upsell/cross-sell topic}}.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 提供一系列问题，以询问{{现有客户名称}}，以揭示他们与{{升级/交叉销售主题}}相关的目标、挑战和优先事项。
- en: Suggest a range of pricing or packaging options for {{upsell/cross-sell product/service}}
    that align with {{existing client name}}’s budget and needs.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 建议一系列与{{现有客户名称}}的预算和需求相一致的价格或包装选项，用于{{升级/交叉销售产品/服务}}。
- en: Identify case studies or success stories of similar companies to {{existing
    client name}} who have benefited from {{upsell/cross-sell product/service}}.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 确定从{{升级/交叉销售产品/服务}}中受益的与{{现有客户名称}}类似的公司的案例研究或成功故事。
- en: Provide a list of potential objections or barriers to {{upsell/cross-sell product/service}}
    adoption at {{existing client name}} and suggest strategies to overcome them.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 提供一份潜在反对意见或障碍的清单，这些障碍可能阻碍{{现有客户名称}}采用{{升级/交叉销售产品/服务}}，并提出克服它们的策略。
- en: Analyze {{existing client name}}’s current stage in the customer lifecycle and
    suggest the most appropriate timing and approach for {{upsell/cross-sell product/service}}
    outreach.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 分析{{现有客户名称}}在客户生命周期中的当前阶段，并提出最合适的时机和方式来进行{{升级/交叉销售产品/服务}}的推广。
- en: Identify the most common triggers or events that indicate an opportunity for
    {{upsell/cross-sell product/service}} at {{existing client name}}, such as contract
    renewals, business growth, or new projects.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 确定在{{现有客户名称}}中表明{{升级/交叉销售产品/服务}}机会的最常见触发器或事件，例如合同续签、业务增长或新项目。
- en: Suggest a personalized offer or promotion for {{upsell/cross-sell product/service}}
    based on {{existing client name}}’s specific needs, budget, and relationship with
    {{our company}}.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 根据{{现有客户名称}}的具体需求、预算和与我们公司的关系，为{{升级/交叉销售产品/服务}}提出个性化的优惠或促销。
- en: Provide a list of the key benefits and value propositions of {{upsell/cross-sell
    product/service}} that are most relevant to {{existing client name}}’s industry
    and business goals.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 提供一份关于{{升级/交叉销售产品/服务}}的关键利益和最有相关性的价值主张列表，这些与{{现有客户名称}}的行业和商业目标最为相关。
- en: Identify opportunities to bundle or package {{upsell/cross-sell product/service}}
    with {{existing client name}}’s current {{product/service}} for added value and
    convenience.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 识别将{{升级/交叉销售产品/服务}}与{{现有客户名称}}当前{{产品/服务}}捆绑或打包的机会，以增加价值并提高便利性。
- en: Analyze {{existing client name}}’s competitors and suggest how {{upsell/cross-sell
    product/service}} can give them a competitive advantage in their market.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 分析{{现有客户名称}}的竞争对手，并提出如何通过{{升级/交叉销售产品/服务}}在他们的市场中获得竞争优势的建议。
- en: ChatGPT prompts for creating sales reports.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT用于创建销售报告的提示。
- en: Examples of prompts
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 提示示例
- en: Generate a weekly sales report summarizing the key metrics, including revenue,
    number of deals closed, and pipeline status for the {{product/service}} line.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 生成一份周度销售报告，总结关键指标，包括收入、成交交易数量和产品/服务线的管道状态。
- en: Create a monthly sales report comparing the performance of the {{region/team}}
    against their targets and the previous year’s results.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一份月度销售报告，比较{{地区/团队}}的业绩与目标以及上一年度的结果。
- en: Write a quarterly sales report analyzing the effectiveness of our current sales
    strategies for the {{product/service}} and proposing optimizations.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 撰写一份季度销售报告，分析我们当前针对{{产品/服务}}的销售策略的有效性，并提出优化建议。
- en: Identify growth opportunities for the upcoming year and highlight the best-performing
    {{products/services}}, {{regions/teams}}, in your annual sales report.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 识别来年的增长机会，并在你的年度销售报告中突出表现最佳的{{产品/服务}}、{{地区/团队}}。
- en: Write a sales report for the launch of the {{product/service}} that includes
    customer feedback, early adoption rates, and improvement suggestions.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{产品/服务}}的发布撰写一份销售报告，其中包含客户反馈、早期采用率和改进建议。
- en: Create a sales report that examines our market share, major rivals, and possible
    alliances or acquisitions for the {{industry}} vertical.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一份销售报告，检查我们的市场份额、主要竞争对手以及{{行业}}垂直方向上的可能联盟或收购。
- en: Make a sales report for the {{customer segment}} that assesses their lifetime
    value, preferences, and purchasing patterns.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{客户细分市场}}制作一份销售报告，评估他们的终身价值、偏好和购买模式。
- en: Compose a sales report that compares the effectiveness of our {{sales channels}},
    including e-commerce, resellers, and direct sales, and suggests ways to improve
    each of them.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 撰写一份销售报告，比较我们的{{销售渠道}}（包括电子商务、分销商和直销）的有效性，并提出改进每个渠道的方法。
- en: Write a sales report that examines how our most recent {{marketing campaign}}
    affected the {{product/service}}'s lead generation and conversion rates.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 撰写一份销售报告，检查我们最近的市场营销活动如何影响{{产品/服务}}的潜在客户生成和转化率。
- en: Provide a sales report for the {{new market/geography}} that includes an evaluation
    of the market's potential, the legal environment, and the needs for localizing
    our {{product/service}}.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 为{{新市场/地理区域}}提供一份销售报告，包括对市场潜力的评估、法律环境和本地化我们{{产品/服务}}的需求。
- en: How to incorporate AI into your workflow for marketing
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 如何将人工智能融入你的营销工作流程中
- en: Prompts are only one aspect of AI use. To maximize the responses, you should
    also think about how you can incorporate AI into your current workflow.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 提示只是人工智能使用的一个方面。为了最大化响应，你还应该考虑如何将人工智能融入你当前的工作流程中。
- en: Use the ChatGPT, Claude, or Gemini website.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT、Claude或Gemini网站。
- en: Via their websites, you can use ChatGPT, Claude, or Gemini directly. A free
    version of one of
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 通过他们的网站，你可以直接使用ChatGPT、Claude或Gemini。其中一个是免费的版本。
- en: their LLMs will normally be available to you as soon as you create an account;
    however, if you want a more sophisticated LLM, you will need to pay. For instance,
    OpenAI currently provides GPT3.5 for free, but GPT4 can be upgraded for a fee.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的LLM（大型语言模型）通常在你创建账户后即可使用；然而，如果你想要一个更复杂的LLM，你需要付费。例如，OpenAI目前免费提供GPT3.5，但GPT4可以通过付费升级。
- en: The next chapter will feature customer service excellence suggestions to help
    you keep good relationships with your clients.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 下一章将介绍客户服务卓越建议，帮助你与客户保持良好关系。
- en: 'Chapter 4:'
  id: totrans-258
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四章：
- en: Customer Service Excellence
  id: totrans-259
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 客户服务卓越
- en: Customer service relies heavily on answering questions and providing accurate
    information. ChatGPT can assist you in providing clear, concise, and helpful responses
    to common customer inquiries.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 客户服务在很大程度上依赖于回答问题和提供准确信息。ChatGPT可以帮助您提供清晰、简洁和有用的回复，以应对常见的客户咨询。
- en: 'Sample Prompts:'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 样本提示：
- en: Provide a response to a customer who inquires about your return policy for electronic
    devices purchased within the last 30 days.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 向询问过去30天内购买的电子设备退货政策的客户提供回复。
- en: Provide a detailed response to a customer who wants to know the difference between
    your basic and premium subscription plans.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 向一位想知道您的基本和高级订阅计划之间区别的客户提供详细回复。
- en: Create a friendly response for a customer who inquires about your store's holiday
    hours and any special promotions or events.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 为一位询问您店铺的节假日营业时间和任何特别促销或活动的客户创建一条友好回复。
- en: Create a script for a customer service call to resolve technical issues with
    our {{product/service}}.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 为解决我们{{产品/服务}}的技术问题编写一个客户服务电话脚本。
- en: ChatGPT prompts for resolving problems and issues.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的解决问题和问题的提示。
- en: Identifying and resolving customer issues is critical to ensuring customer satisfaction
    and loyalty. ChatGPT can help you troubleshoot problems and create effective solutions.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 识别和解决客户问题是确保客户满意度和忠诚度的关键。ChatGPT可以帮助您排查问题并创建有效的解决方案。
- en: 'Sample Prompts:'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 样本提示：
- en: Create a step-by-step troubleshooting guide for a customer who is having problems
    with their newly purchased smart home device.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 为一位在使用新购买的智能家居设备时遇到问题的客户创建一个逐步故障排除指南。
- en: Provide a solution to a customer who claims their online order was incomplete
    and missing several items.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 为一位声称其在线订单不完整且缺少几件商品的客户提供一个解决方案。
- en: Create an empathetic response to a customer who is dissatisfied with a delayed
    shipment and wants a resolution.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 对一位因延迟发货而不满并希望得到解决方案的客户表示同情。
- en: A customer is angry due to {{problem}}. Please respond calmly and explain that
    we are working to solve the problem and make things right.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 由于{{问题}}，一位客户感到愤怒。请冷静回应并解释我们正在努力解决问题，使事情恢复正常。
- en: ChatGPT provides prompts for order processing and fulfillment.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提供订单处理和履行的提示。
- en: Helping customers place orders, process payments, and ensure timely delivery
    is an important aspect of customer service. Use ChatGPT to automate these tasks
    with prompts like.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 帮助客户下单、处理支付并确保及时交付是客户服务的重要方面。使用ChatGPT通过提示自动化这些任务。
- en: 'Sample Prompts:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 样本提示：
- en: Respond to a customer who wants to change their existing order to include an
    additional item.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 回应一位希望更改现有订单以包含额外商品的客户。
- en: Provide instructions to a customer who is having difficulty completing an online
    payment due to a technical error.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 向因技术错误而难以完成在线支付的客户提供操作说明。
- en: Create a message for a customer confirming their order details, estimated delivery
    date, and tracking information.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 为确认订单详情、预计交货日期和跟踪信息的客户创建一条信息。
- en: A customer ordered from us but claims they did not receive their order. We have
    tracking information that proves the order was delivered. Write a response to
    resolve this issue.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 一位客户从我们这里订购了商品，但声称他们没有收到订单。我们有跟踪信息证明订单已被投递。写一条回复以解决此问题。
- en: ChatGPT prompts to manage customer accounts.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的客户账户管理提示。
- en: Customer service involves managing customer accounts, updating information,
    and responding to account-related inquiries. ChatGPT can help you easily navigate
    these tasks.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 客户服务涉及管理客户账户、更新信息以及回应与账户相关的查询。ChatGPT可以帮助您轻松完成这些任务。
- en: 'Sample Prompts:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 样本提示：
- en: Respond to a customer who wishes to update their billing address and payment
    method on file.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 回应一位希望更新其账单地址和文件中支付方式的客户。
- en: Give instructions to a customer who wants to reset their account password and
    regain access to their profile.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 向希望重置账户密码并恢复其个人资料访问权限的客户提供操作说明。
- en: Create a message to notify a customer of important changes to their account
    or subscription plan.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一条信息，通知客户其账户或订阅计划的重要变更。
- en: We want to reach out to VIP customers who have purchased from us more than three
    times in the last month. Please write a thank-you script that includes an exclusive
    discount code for their next order.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望联系在过去一个月内购买超过三次的VIP客户。请写一个包括下次订单独家折扣代码的感谢脚本。
- en: Create a loyalty program proposal for our repeat customers.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 为我们的回头客创建一个忠诚度计划提案。
- en: ChatGPT prompts the extraction of relevant product and service information.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提示提取相关产品和服务的相关信息。
- en: Having a thorough understanding of your company's products and services is critical
    for providing accurate and useful information to customers.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 对您公司的产品和服务有深入的了解对于向客户提供准确和有用的信息至关重要。
- en: 'Sample Prompts:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 样本提示：
- en: Create a detailed description of the key features and benefits of your new product
    line.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个详细描述您新产品线关键功能和优势的描述。
- en: Provide a comparison of two similar products in your catalog, emphasizing their
    differences and unique selling points.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 提供您目录中两种类似产品的比较，强调它们的不同和独特卖点。
- en: Write a response to a customer who wants recommendations for products that meet
    their specific needs and preferences.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 为希望获得满足其特定需求和偏好的产品推荐的客户撰写回复。
- en: ChatGPT provides prompts for handling complaints.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提供处理投诉的提示。
- en: Responding to customer complaints with empathy and professionalism is an essential
    skill in customer service. ChatGPT can help you navigate difficult situations
    and find mutually beneficial solutions.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 以同理心和专业精神回应客户投诉是客户服务中的一项基本技能。ChatGPT可以帮助您应对困难情况并找到互利共赢的解决方案。
- en: 'Sample Prompts:'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 样本提示：
- en: Provide an empathetic response to a customer who is upset about a billing error
    and wants a refund.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 向因账单错误而感到不满并希望退款客户提供一个同理心的回应。
- en: Offer a solution to a customer who has received a defective product and requires
    a replacement or repair.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 为收到有缺陷产品并需要更换或维修的客户提供一个解决方案。
- en: Create a message to a customer that acknowledges their frustration with a service
    outage and outlines the steps being taken to resolve the problem.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一条信息，向客户承认他们对服务中断的挫败感，并概述解决问题的步骤。
- en: ChatGPT provides prompts for collecting and analyzing customer feedback.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提供用于收集和分析客户反馈的提示。
- en: Gathering and analyzing customer feedback is critical to improving products,
    services, and the overall customer experience. With prompts like, ChatGPT can
    help you make the most of your customer insights.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 收集和分析客户反馈对于改进产品、服务和整体客户体验至关重要。使用ChatGPT这样的提示，可以帮助您充分利用客户洞察。
- en: 'Sample Prompts:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 样本提示：
- en: Create a survey template to collect feedback on a recently launched product
    or service.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个调查模板，以收集对最近推出的产品或服务的反馈。
- en: Respond to a customer who has left a glowing review, thanking them for their
    support and loyalty.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 回复一位留下好评的客户，感谢他们的支持和忠诚。
- en: Create a message to a customer who has provided constructive criticism, acknowledging
    their feedback and outlining the actions being taken to address their concerns.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 向提供建设性批评的客户发送一条信息，承认他们的反馈并概述解决他们关注的问题所采取的措施。
- en: I'd like you to create a customer feedback survey, which will be sent to customers
    after they contact our support team.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 我想让您创建一个客户反馈调查，该调查将在客户联系我们的支持团队后发送给他们。
- en: 'What patterns or trends emerge from these customer comments: {{insert customer
    comments here}}?'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 从这些客户评论中出现了哪些模式或趋势：{{插入客户评论}}？
- en: 'Determine the sentiment (positive, neutral, or negative) in the following customer
    comments: {{Comment 1}}, {{Comment 2}}, and {{Comment 3}}.'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 确定以下客户评论中的情感（正面、中性或负面）：{{评论 1}}、{{评论 2}}和{{评论 3}}。
- en: 'What are the main issues customers highlight in these negative reviews: {{Review
    1}}, {{Review 2}}, and {{Review 3}}?'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下负面评论中，客户主要提出了哪些问题：{{评论 1}}、{{评论 2}}和{{评论 3}}？
- en: 'Summarize the main sentiments expressed in the following customer comments:
    {{comment 1}}, {{comment 2}}, {{comment 3}}, etc.'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 总结以下客户评论中表达的主要情感：{{评论 1}}、{{评论 2}}、{{评论 3}}等。
- en: ChatGPT provides prompts for documenting interactions.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT提供记录互动的提示。
- en: Maintaining accurate records of customer interactions and following data privacy
    protocols are critical components of customer service. ChatGPT can help you document
    customer interactions effectively.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 维护准确的客户互动记录和遵循数据隐私协议是客户服务的关键组成部分。ChatGPT可以帮助您有效地记录客户互动。
- en: 'Sample Prompts:'
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 样本提示：
- en: Create a template to record customer inquiries, issues, and resolutions in your
    CRM system.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个模板，以记录您的CRM系统中的客户咨询、问题和解决方案。
- en: Send a sample email to a customer, confirming the details of a recently resolved
    issue and the steps taken to prevent future occurrences.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 向客户发送一封样本电子邮件，确认最近解决的问题的细节以及为防止未来发生而采取的步骤。
- en: Write a message to a colleague summarizing a complex customer interaction and
    key takeaways for future reference.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 给同事写一条消息，总结复杂的客户互动和未来参考的关键要点。
- en: 'You are now the head of customer support at {{company}}. We sell {{product}}
    to the {{audience}}. I''d like you to create content for an internal FAQ page
    for our team using the chat transcripts: {{chat transcripts}}'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在是{{company}}的客户支持部门负责人。我们向{{audience}}销售{{product}}。我希望您能使用以下聊天记录创建我们团队的内部FAQ页面：{{chat
    transcripts}}
- en: ChatGPT prompts collaboration with others.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT与他人的协作。
- en: Collaboration with other departments and participation in initiatives to improve
    the customer experience are critical components of customer service. With prompts
    like these, ChatGPT can help you communicate and collaborate more effectively.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他部门的协作和参与改善客户体验的倡议是客户服务的关键组成部分。有了这样的提示，ChatGPT可以帮助您更有效地沟通和协作。
- en: 'Sample Prompts:'
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 样本提示：
- en: Send a message to your sales team with insights from a customer interaction
    that will help them better understand customer needs and preferences.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 向您的销售团队发送一条包含客户互动洞察的消息，这将帮助他们更好地理解客户需求和偏好。
- en: Provide a summary of common customer complaints and feedback to your product
    development team to help guide future improvements.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 向您的产品开发团队提供常见客户投诉和反馈的总结，以帮助指导未来的改进。
- en: Create a proposal for a cross-functional project to improve the onboarding experience
    for new customers.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 制定一个跨职能项目提案，以改善新客户的入职体验。
- en: ChatGPT encourages skill development and staying current with trends.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT鼓励技能发展和跟上趋势。
- en: Keeping up with industry trends, learning new skills, and adapting to new technologies
    are all necessary for providing excellent customer service. Use ChatGPT to support
    your professional development with prompts like.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 跟上行业趋势、学习新技能和适应新技术都是提供优质客户服务的必要条件。使用ChatGPT，通过以下提示支持您的职业发展。
- en: 'Sample Prompts:'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 样本提示：
- en: Create a list of the best customer service blogs, podcasts, and resources to
    read for industry insights and best practices.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一份最佳客户服务博客、播客和资源的清单，以阅读行业见解和最佳实践。
- en: Provide a summary of the main takeaways from a recent customer service training
    session or workshop.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 总结最近一次客户服务培训会议或研讨会的主要收获。
- en: Create a personal development plan that outlines the skills and competencies
    you want to work on in the coming quarter.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 制定一个个人发展计划，概述您希望在接下来的季度中努力提升的技能和能力。
- en: chapter 5
  id: totrans-330
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第5章
- en: Social Media & Engagement
  id: totrans-331
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 社交媒体与参与
- en: Are you having trouble coming up with ideas for your next social media posts?
    Well, you might discover that AI prompts for social media are exactly what you
    need to fill that blank page with a slew of new ideas.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 您是否在为下一篇社交媒体帖子想不出创意？嗯，您可能会发现社交媒体的AI提示正是您需要的内容，以填满空白页面并带来一系列新想法。
- en: Artificial intelligence tools have taken the world by storm in recent months.
    And with good reason. Hours-long tasks are now completed in a matter of minutes.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 在最近几个月里，人工智能工具席卷了全球。这是有充分理由的。几个小时的任务现在只需几分钟就能完成。
- en: You've probably seen the hype on social media. People are amazed by the results
    that AI tools can produce. However, there are numerous examples of AI completely
    missing the mark.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能已经在社交媒体上看到了炒作。人们对AI工具能产生的结果感到惊讶。然而，有许多AI完全偏离目标的例子。
- en: The distinction between "omg, that's amazing" and "omg, that's not right."
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: “哇，太棒了”和“哇，这不对”之间的区别。
- en: is typically a well-written prompt.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 通常是一个写得很好的提示。
- en: This chapter will teach you how to create AI prompts to fill your social media
    calendar with great ideas.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将教您如何创建AI提示，以用精彩的想法填满您的社交媒体日历。
- en: I'll provide you with 50 brand-specific prompts to get you started.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 我将为您提供50个品牌特定的提示，以帮助您开始。
- en: Let's get into it.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧。
- en: 50 useful AI prompts for social media teams to train
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 50个有用的AI提示，供社交媒体团队训练使用
- en: What are the AI prompts for social media?
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体的AI提示是什么？
- en: An AI prompt for social media instructs a tool to generate social media content.
    AI prompts help social media marketers brainstorm new post ideas, see alternative
    drafts, or even create entire posts.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 一个社交媒体的AI提示指示工具生成社交媒体内容。AI提示帮助社交媒体营销人员构思新的帖子想法，查看替代草稿，甚至创建整个帖子。
- en: 'For example, Plantable''s new AI feature offers four preset prompts for rewriting
    posts:'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，Plantable的新AI功能提供了四个预设的提示，用于重写帖子：
- en: Shorten for clarity and conciseness.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 简化以清晰和简洁。
- en: Make your text more concise and attention-grabbing.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 使你的文本更加简洁和引人注目。
- en: Expanding on a concept allows for deeper exploration and additional information.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 对一个概念进行扩展可以允许更深入的探索和额外的信息。
- en: Surprise me to get a completely new perspective on your post.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 给我惊喜，让你对帖子有一个全新的视角。
- en: All four of these are AI prompts because you are (literally) prompting the tool
    to follow the instructions.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 这四个都是AI提示，因为你实际上是在提示工具遵循指令。
- en: How can social media teams use AI prompts?
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体团队如何使用AI提示？
- en: Are you even a social media marketer if you don't run out of creative ideas
    while brainstorming? Have you ever felt frustrated when attempting to fit a tweet
    into a limited character count?
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在大脑风暴创意想法时没有用完创意，你还能称得上是社交媒体营销人员吗？你有没有在尝试将推文压缩到有限字符数时感到沮丧？
- en: At times like these, a new perspective can be lifesaving. Instead of bouncing
    your head off the wall, use something to bounce ideas off of.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 在这样的时刻，一个新的视角可能就是救命稻草。与其让你的头撞墙，不如用些东西来激发你的想法。
- en: AI tools can help you overcome these obstacles in seconds. With a simple prompt,
    you can create high-quality content to maintain a strong social media presence.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: AI工具可以在几秒钟内帮助你克服这些障碍。通过一个简单的提示，你可以创建高质量的内容，以保持强大的社交媒体存在感。
- en: Here are some examples of how AI tools can help.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些AI工具如何帮助的例子。
- en: Generate new content ideas.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 生成新的内容想法。
- en: An AI prompt can save time and reduce stress when brainstorming new social media
    post ideas.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: AI提示可以在构思新的社交媒体帖子想法时节省时间并减少压力。
- en: Let's say you're working for a new client. Jake's Cakes is a local bakery.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在为一个新客户工作。Jake's Cakes是一家当地的面包店。
- en: (Yes, I did want the name to rhyme.)
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: （是的，我确实希望名字押韵。）
- en: It is late November, so you know what that means. Holiday season. It has arrived
    and is operating at full capacity.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 现在已经是晚十一月了，你知道这意味着什么。假日季节。它已经到来，并且正在全速运转。
- en: You need to develop some awesome tweets, but all you can think of right now
    are terrible puns.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要开发一些出色的推文，但现在你只能想到糟糕的双关语。
- en: Merry Cakemas? Seriously? What were your thoughts?
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 圣诞蛋糕？真的吗？你有什么想法？
- en: You only need a small spark to nudge your brain in the right direction.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需要一点火花就能推动你的大脑走向正确的方向。
- en: Well, the right prompt can help you generate ideas and jumpstart your content
    creation process.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，正确的提示可以帮助你产生想法并启动你的内容创作过程。
- en: Here's how it appears in Planable.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 这是它在Planable中的样子。
- en: Find the right phrase.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 找到合适的短语。
- en: When it comes to creating content, every word matters. Sometimes we can spend
    hours agonizing over how to phrase something, which is understandable.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到创建内容时，每个词都很重要。有时我们可能会花几个小时纠结于如何措辞，这是可以理解的。
- en: Perhaps you already have an idea for a social media post. You are confident
    in the overall message, but something feels off. Or you just can't seem to find
    the right way to finish it off.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 也许你已经有了一个社交媒体帖子的想法。你对整体信息很有信心，但感觉有些不对劲。或者你似乎找不到合适的结尾方式。
- en: AI copywriting tools can help in this situation. Turn to AI to help you get
    over the final hurdle. You can show the tool what you have so far and ask for
    suggestions. It's an excellent way to incorporate some unconventional thinking
    into your social media posts.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: AI文案工具在这种情况下能有所帮助。转向AI以帮助你克服最后的障碍。你可以向工具展示你目前所拥有的内容，并请求建议。这是将一些非常规思维融入社交媒体帖子中的绝佳方式。
- en: Remember, if you're not satisfied with the proposals, the retry button is your
    friend. You can also make a few minor changes to your prompt to generate slightly
    different results.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，如果你对提案不满意，重试按钮是你的朋友。你还可以对你的提示进行一些小的修改，以生成略微不同的结果。
- en: Rewrite drafts and repurpose old posts.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 重写草稿和重新利用旧帖子。
- en: When you finish a draft of a social media post, it doesn't mean it's ready to
    go live. A feedback and approval process is necessary to ensure alignment with
    your brand's social media strategy.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 当你完成社交媒体帖子的草稿时，并不意味着它就可以上线。一个反馈和批准的过程是必要的，以确保与品牌社交媒体策略保持一致。
- en: Occasionally, feedback may necessitate a rewrite.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，反馈可能需要重写。
- en: When this happens, AI prompts can help you make the necessary changes quickly.
    For example, you may receive feedback on a post stating that while the message
    is good, the tone of voice should be more professional.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 当这种情况发生时，AI提示可以帮助你快速做出必要的更改。例如，你可能收到关于帖子的反馈，表示虽然信息很好，但语气应该更加专业。
- en: In this case, you can send the original draft to the AI tool and instruct it
    to rewrite the post in the appropriate tone. You can even request multiple versions
    so you have more options.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，你可以将原始草稿发送给AI工具，并指示它以适当的语气重写帖子。你甚至可以要求多个版本，以便有更多选择。
- en: This is also useful when looking for ways to repurpose an existing post on other
    social media platforms. To create a Twitter thread from a YouTube video script,
    follow these tips.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 这在寻找在其他社交媒体平台上重新使用现有帖子的方式时也非常有用。要从YouTube视频脚本创建Twitter讨论串，请遵循以下提示。
- en: 'Bonus tip 1: You can use an AI prompt to paraphrase engaging content from another
    brand or to suggest a social media post based on a snippet of a blog post.'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 加分技巧1：你可以使用AI提示来改写来自另一个品牌的引人入胜的内容，或者根据博客文章的片段提出社交媒体帖子的建议。
- en: 'Bonus tip 2: A paraphrase prompt is useful for creating variations of the same
    post for different team members to use when sharing new content.'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 加分技巧2：改写提示对于创建不同团队成员在分享新内容时使用的同一帖子的变体非常有用。
- en: How to structure an AI prompt for optimal results
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 如何构建AI提示以获得最佳结果
- en: It's difficult to consistently create content that truly resonates with your
    target audience. AI tools are extremely useful, but there are still things to
    consider when creating prompts. After all, you want to get the best results that
    will enhance your social media marketing efforts.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 一致地创建真正与目标受众产生共鸣的内容是有难度的。AI工具非常有用，但在创建提示时仍需考虑一些因素。毕竟，你希望获得最佳结果，以增强你的社交媒体营销工作。
- en: With that in mind, here are some tips for structuring your prompts to achieve
    the best results.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，以下是一些关于如何构建提示以获得最佳结果的技巧。
- en: Provide context.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 提供上下文。
- en: As a content marketer, I've lost count of how many articles have told me that
    'content is king.'. In the age of artificial intelligence, that phrase may well
    become 'context is king.'.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 作为内容营销人员，我已经数不清有多少篇文章告诉我“内容为王”。在人工智能时代，这句话可能真的会变成“上下文为王”。
- en: Why?
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: It's simple. When you give an AI tool more information about what you want,
    it will be able to generate content that is more likely to match your expectations.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 这很简单。当你向AI工具提供更多关于你想要的内容的信息时，它将能够生成更符合你期望的内容。
- en: Say you want a pepperoni pizza with extra cheese and a thick crust. You wouldn't
    just call your local pizza parlor and say, "Yo, gimme one of those pizzas."
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你想要一个加了大量奶酪和厚底饼的披萨。你不会只是打电话给当地的比萨店说，“Yo，给我来一个那样的披萨。”
- en: I mean, you could, but your chances of getting what you want are slim. You'd
    need to be specific to get the right pizza.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 我的意思是，你可以这样做，但你得到你想要的东西的机会很小。你需要具体说明才能得到正确的披萨。
- en: AI prompts function in much the same way. If you provide more context to help
    the tool understand your goals and preferences, you will be much more likely to
    receive a satisfactory response.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: AI提示的工作方式与这非常相似。如果你提供更多上下文来帮助工具理解你的目标和偏好，你将更有可能收到令人满意的回复。
- en: Keep the following points in mind when writing your prompts, and you will see
    significantly better results.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写提示时，请牢记以下要点，你将看到显著更好的结果。
- en: 1\. Be specific.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 要具体。
- en: When you ask an AI tool to assist you with a social media post, make sure to
    provide some specifics. For example, should it include hashtags or emojis? Do
    you want it to generate a list? Make it clear in your prompt.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 当你要求AI工具帮助你撰写社交媒体帖子时，请确保提供一些具体信息。例如，是否应该包含标签或表情符号？你希望它生成列表吗？在提示中明确说明。
- en: You should also be specific about the length of a post. The request for "a fairly
    short promotional LinkedIn post" leaves too much room for interpretation of what
    fairly short means. Instead, you can request "a promotional LinkedIn post that
    is 2-3 sentences long.".
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 你还应该具体说明帖子的长度。对于“一篇相当短的LinkedIn推广帖”这样的要求，留给解释“相当短”的空间太多了。相反，你可以要求“一篇2-3句话长的LinkedIn推广帖”。
- en: 2\. Establish the format.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 确立格式。
- en: Each social media platform has specific formats that work well. A funny tweet
    follows a completely different format than an inspirational LinkedIn post. When
    using an AI tool, specify both the desired writing style and content.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 每个社交媒体平台都有特定的格式，效果很好。一条有趣的推文与一篇鼓舞人心的LinkedIn帖子的格式完全不同。在使用AI工具时，请指定所需的写作风格和内容。
- en: 3\. Be as specific and descriptive as possible.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 尽可能具体和详细。
- en: Give the tool as much key information as possible. There is a significant difference
    between the output you will receive when you provide a basic prompt and one with
    additional details.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 尽可能多地提供关键信息。当您提供基本提示和附加细节时，您将收到的输出之间有显著差异。
- en: 'A basic prompt could be something like:'
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 一个基本的提示可能是这样的：
- en: Create a social media post promoting Jake's Cakes.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个推广Jake's Cakes的社交媒体帖子。
- en: 'A prompt that provides more information could be:'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 一个提供更多信息的提示可能是：
- en: '"Act as a social media marketing expert and create an engaging Facebook post
    to promote Jake''s Cakes'' upcoming community event. The event is called Jake''s
    Big Bake Off and will take place on December 5th. It includes a guest celebrity
    appearance by Gordon Ramsay. Use the hashtag #JakesBigBakeOff.'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演社交媒体营销专家，创建一个吸引人的Facebook帖子来推广Jake's Cakes即将举行的社区活动。活动名为Jake's Big Bake Off，将于12月5日举行。活动包括戈登·拉姆齐的嘉宾明星亮相。使用话题标签#JakesBigBakeOff。
- en: However, it is also important to avoid unnecessary information, so do not include
    extra detail just for the sake of it.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，避免不必要的信息也很重要，所以不要仅仅为了详细而包含额外的细节。
- en: Define the tone of voice.
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 定义语气。
- en: Each brand has a unique social media presence. It feels different.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 每个品牌都有独特的社交媒体存在感。感觉不同。
- en: You would never confuse a Chipotle tweet with a Visa tweet. Even if I hid the
    logos and only showed you the messages, you'd know which was which.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 您永远不会混淆Chipotle的推文和Visa的推文。即使我隐藏了标志，只向您展示消息，您也能知道哪个是哪个。
- en: That is largely due to the established tone of voice that each brand employs
    on the platform.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 这在很大程度上归因于每个品牌在平台上采用的既定语气。
- en: Maintain a consistent tone of voice when creating AI content prompts. Make it
    clear how you want the response to sound.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建AI内容提示时，保持一致的语气。清楚地说明您希望响应听起来如何。
- en: Looking for a more inspirational social media message? Great. Tell the AI tool
    to make it sound positive or to use a hopeful tone of voice. This ensures that
    the generated content matches your expectations.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 在寻找更有启发的社交媒体信息吗？太好了。告诉AI工具使其听起来积极或使用希望语气。这确保了生成的内容符合您的期望。
- en: Set limitations.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 设置限制。
- en: It is reasonable to expect that AI tools understand social media platforms to
    some extent. If you ask for a series of Twitter posts, all of the results will
    be within the standard 280-character limit, correct?
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 有理由期待AI工具在一定程度上理解社交媒体平台。如果您要求一系列推文，所有结果都将处于标准的280个字符限制内，对吗？
- en: No, actually. You will occasionally receive tweet recommendations that exceed
    500 characters.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 不，实际上。您偶尔会收到超过500个字符的推文推荐。
- en: Similarly, when requesting a LinkedIn post, an AI tool may fail to account for
    the platform's 140-character limit. That's when they see more' button appear.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，当请求LinkedIn帖子时，AI工具可能未能考虑到平台的140个字符限制。这时，他们会看到“更多”按钮出现。
- en: To ensure that platform-specific details like this are taken into account, include
    limitations in your prompt.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保考虑像这样的平台特定细节，请在提示中包含限制。
- en: For example, a prompt for a LinkedIn story could state, "Limit the opening line
    to 20 words and include a hook that makes me want to read on."
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，LinkedIn故事的提示可以是：“将开头限制在20个单词内，并包含一个让我想继续阅读的钩子。”
- en: You can also set a limitation by excluding a word or phrase. Sometimes brand
    guidelines prohibit you from using specific language because it is part of a competitor's
    core messaging.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 您也可以通过排除一个单词或短语来设置限制。有时品牌指南禁止您使用特定的语言，因为这可能是竞争对手核心信息的一部分。
- en: In any situation like this, make sure the AI tool understands not to use the
    term.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何类似的情况下，确保AI工具理解不要使用该术语。
- en: Ask for multiple versions.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 要求多个版本。
- en: To ensure success, it's crucial to request multiple variations. Whether you're
    brainstorming ideas for new social media posts in the early stages of content
    creation or putting the finishing touches on a draft, seeing multiple versions
    is always beneficial.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保成功，请求多个变体至关重要。无论是在内容创作的早期阶段构思新的社交媒体帖子，还是在草稿的修改阶段，看到多个版本总是有益的。
- en: This is also incredibly simple to do. When writing an AI prompt, instead of
    asking for a single output like "Write a catchy Facebook post," aim for multiple
    outputs like "Propose five versions of a catchy Facebook post."
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 这也非常简单。在编写AI提示时，不要只要求一个输出，如“写一个吸引人的Facebook帖子”，而是寻求多个输出，如“提出五个吸引人的Facebook帖子版本。”
- en: 50 useful AI prompts for social media teams to try.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 50个有用的AI提示，供社交媒体团队尝试。
- en: Here's a comprehensive list of 50 prompts for various types of social media
    posts. I tested each one with Planable's new AI feature, and 10 of them included
    a screenshot to show how the tool responded.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一份包含50个不同类型社交媒体帖子提示的全面列表。我用Planable的新AI功能测试了每一个，其中10个包含截图来展示工具的响应。
- en: You can use them as is, adding your own details where appropriate, or as a guide
    to help you create your own prompts from scratch.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以直接使用它们，在适当的地方添加自己的细节，或者作为从头开始创建你自己的提示的指南。
- en: AI prompts for inspirational Instagram posts.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 用于鼓舞人心的Instagram帖子的AI提示。
- en: 1\. Act as a social media marketing expert. Provide five motivational quotes
    to inspire your target audience to take the desired action. The quotes will be
    featured on Instagram stories. Write each quote with an upbeat tone. Each quote
    should be no more than 25 words.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 扮演社交媒体营销专家的角色。提供五个励志名言来激励目标受众采取期望的行动。这些名言将在Instagram故事中展示。每个名言都要用欢快的语气写，不超过25个字。
- en: ￼
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: ￼
- en: 2\. Offer five suggestions for inspiring Instagram reels with viral potential.
    Proposals should target the appropriate audience and promote the product/brand.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 提供五个具有病毒潜力的鼓舞人心的Instagram Reels建议。建议应针对适当的受众并推广产品/品牌。
- en: 3\. Create an inspiring Instagram caption about [insert topic] to engage your
    target audience [insert audience]. The first sentence should include a hook that
    encourages me to continue reading. Give me five options.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 为[插入主题]创建一个鼓舞人心的Instagram配文，以吸引目标受众[插入受众]。第一句话应包含一个钩子，鼓励我继续阅读。给我五个选项。
- en: 4\. Create three versions of an inspirational social media post. Create an Instagram
    caption for a picture of [insert product/topic] to engage your target audience.
    The caption should not be longer than one or two sentences. Include relevant hashtags
    to make your caption stand out.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 创建三个鼓舞人心的社交媒体帖子的版本。为[插入产品/主题]的照片创建一个Instagram配文，以吸引目标受众。配文不应超过一或两句话。包括相关的标签，使你的配文脱颖而出。
- en: 5\. Here is an idea for an Instagram caption. Give me three options with a more
    inspiring tone.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 这里有一个Instagram配文的创意。给我三个更具鼓舞人心的选项。
- en: '[Insert your proposal.]'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: '[插入你的提案。]'
- en: AI prompts for Twitter threads.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 用于Twitter线程的AI提示。
- en: 6\. Create five ideas for Twitter threads on your topic. Make sure the first
    tweet in the thread has a hook that will entice me to keep reading.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 为你的主题创建五个Twitter线程的创意。确保线程中的第一条推文有一个吸引我继续阅读的钩子。
- en: ￼
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: ￼
- en: 7\. Describe the advantages of [insert topic] for your target audience. Format
    the response as a Twitter thread, with each tweet addressing one benefit. Include
    a call to action in the final tweet, directing people to [insert your website].
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 描述[插入主题]对目标受众的优势。将回复格式化为一条Twitter线程，每条推文阐述一个好处。在最后一条推文中包含一个行动号召，引导人们访问[插入你的网站]。
- en: 8\. Create an engaging Twitter thread for your target audience by summarizing
    the following information.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 8. 通过总结以下信息为你的目标受众创建一个吸引人的Twitter线程。
- en: 9\. Translate the bullet points below into a Spanish Twitter thread. Make every
    tweet informative and engaging.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 9. 将以下要点翻译成西班牙语Twitter线程。确保每条推文都富有信息性和吸引力。
- en: 10\. Provide five different ways to phrase this opening hook for a Twitter thread.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 10. 提供五种不同的方式来表述Twitter线程的开头钩子。
- en: '[Insert your opening hook.]'
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: '[插入你的开头钩子。]'
- en: AI prompts for engaging Facebook posts.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 用于吸引人的Facebook帖子的AI提示。
- en: 11\. Create a Facebook post with a PAS addressing a pain point for your target
    audience. Recommend [your brand] as an alternative. Speak in a professional tone
    of voice.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 11. 创建一个Facebook帖子，使用PAS（痛点-解决方案-好处）来针对目标受众的痛点。推荐[你的品牌]作为替代方案。用专业的语气说话。
- en: ￼
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: ￼
- en: 12\. Create an engaging Facebook post asking the audience to share their favorite
    memories related to [insert your brand]. Write it in an enthusiastic tone of voice.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 12. 创建一个吸引人的Facebook帖子，要求观众分享与[插入你的品牌]相关的最喜欢的回忆。用热情的语气来写。
- en: 13\. Describe the impact of using [insert product/service] in your daily routine.
    Format it as a Facebook post. Include a hook in your first sentence. Maintain
    a positive tone of voice.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 13. 描述在日常使用[插入产品/服务]中的影响。格式化为Facebook帖子。在第一句话中加入一个钩子。保持积极的语气。
- en: 14\. Make a list of pros and cons for [insert your topic]. Write with a thoughtful
    tone of voice.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 14. 为[插入你的主题]列出利弊，用深思熟虑的语气来写。
- en: 15\. Create a Facebook post to engage your target audience by paraphrasing the
    LinkedIn story.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 15. 通过改写LinkedIn故事来创建一个吸引目标受众的Facebook帖子。
- en: AI prompts insightful LinkedIn posts.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 用于洞察力丰富的LinkedIn帖子的AI提示。
- en: 16\. Create an insightful LinkedIn story on [insert topic] in the style of [insert
    famous author]. The first sentence should be a hook that entices me to read on,
