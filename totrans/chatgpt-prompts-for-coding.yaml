  prefs: []
  type: TYPE_NORMAL
  zh: '12: 使用 Cypress 进行端到端测试'
- en: 'Prompt:'
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a Cypress script to automate end-to-end testing of an e-commerce checkout
    process. Include steps to select a product, add it to the cart, complete payment,
    and verify the order confirmation. Discuss how end-to-end testing ensures that
    the entire user journey works as expected."'
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写一个 Cypress 脚本来自动化电子商务结账过程的端到端测试。包括选择产品、将其添加到购物车、完成支付和验证订单确认的步骤。讨论端到端测试如何确保整个用户旅程按预期工作。"'
- en: '13: Writing Load Tests'
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: '13: 编写负载测试'
- en: 'Prompt:'
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a load test plan for an API that processes real-time stock trading data.
    Include steps to simulate concurrent user requests, measure system performance,
    and identify bottlenecks. Discuss the role of load testing in ensuring application
    scalability."'
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: '"为处理实时股票交易数据的API编写负载测试计划。包括模拟并发用户请求、测量系统性能和识别瓶颈的步骤。讨论负载测试在确保应用程序可扩展性方面的作用。"'
- en: '14: Black Box Testing'
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: '14: 黑盒测试'
- en: 'Prompt:'
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the principles of black box testing. Write test cases for a file upload
    feature, including scenarios for valid and invalid file types, size limits, and
    duplicate uploads. Discuss the benefits and limitations of black box testing."'
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释黑盒测试的原则。为文件上传功能编写测试用例，包括有效和无效文件类型、大小限制和重复上传的场景。讨论黑盒测试的优点和局限性。"'
- en: '15: Writing Acceptance Tests'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: '15: 编写验收测试'
- en: 'Prompt:'
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write acceptance test cases for a user registration process. Include steps
    for verifying form validation, email verification, and successful account creation.
    Discuss the role of acceptance testing in validating business requirements."'
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写用户注册流程的验收测试用例。包括验证表单验证、电子邮件验证和成功创建账户的步骤。讨论验收测试在验证业务需求中的作用。"'
- en: '16: Security Testing Basics'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: '16: 安全测试基础'
- en: 'Prompt:'
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a plan for testing the security of a user login feature. Include steps
    to test for vulnerabilities like SQL injection, XSS, and brute force attacks.
    Discuss the importance of security testing in protecting user data and maintaining
    trust."'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写测试用户登录功能安全性的计划。包括测试 SQL 注入、XSS 和暴力攻击等漏洞的步骤。讨论安全测试在保护用户数据和维持信任方面的重要性。"'
- en: '17: Writing API Tests with Postman'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: '17: 使用 Postman 编写 API 测试'
- en: 'Prompt:'
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write a step-by-step guide to testing an API endpoint with Postman. Include
    steps for sending a POST request with JSON payload, validating the response, and
    testing for edge cases like missing fields. Discuss how Postman simplifies API
    testing for developers and testers."'
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写使用 Postman 测试 API 端点的分步指南。包括发送带有 JSON 负载的 POST 请求、验证响应以及测试边缘情况如缺失字段。讨论 Postman
    如何简化开发人员和测试人员的 API 测试。"'
- en: '18: Behavior-Driven Development (BDD)'
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: '18: 行为驱动开发（BDD）'
- en: 'Prompt:'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Explain the principles of Behavior-Driven Development (BDD) and its benefits.
    Write a sample Gherkin test case for a flight booking system, including feature,
    scenario, and steps. Discuss how BDD improves collaboration between developers,
    testers, and stakeholders."'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: '"解释行为驱动开发（BDD）的原则及其益处。为航班预订系统编写一个示例 Gherkin 测试用例，包括功能、场景和步骤。讨论 BDD 如何提高开发人员、测试人员和利益相关者之间的协作。"'
- en: '19: Writing Test Cases for Mobile Apps'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: '19: 编写移动应用测试用例'
- en: 'Prompt:'
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"Write test cases for a mobile banking app’s fund transfer feature. Include
    scenarios for valid and invalid inputs, network disconnections, and UI responsiveness.
