- en: Introduction
  id: totrans-43
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 引言
- en: Welcome to the Future of Writing.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到写作的未来。
- en: Whether you’re a content creator, business owner, marketer, or someone who simply
    wants to get better at writing, this book was written for you. You’ve probably
    heard about ChatGPT—maybe you’ve even tried it out. But if you’ve ever stared
    at a blinking cursor wondering how to actually use AI to help you write better,
    faster, or with more confidence, you’re in the right place.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 不论你是内容创作者、企业主、市场营销人员，还是仅仅想提高写作技能的人，这本书都是为了你而写的。你可能听说过ChatGPT——也许你甚至尝试过它。但如果你曾经盯着闪烁的光标，想知道如何真正利用AI来帮助你写得更好、更快或更有信心，那么你就在正确的位置。
- en: This book is here to guide you through the process of working with ChatGPT as
    a writing partner. It's not about replacing your voice—it's about enhancing your
    process.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书旨在指导你通过ChatGPT作为写作伙伴的过程。它不是关于取代你的声音——而是关于增强你的写作过程。
- en: What Is ChatGPT, and Why Should Writers Care?
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是ChatGPT，为什么作家应该关心？
- en: ChatGPT is an advanced language model developed by OpenAI. Think of it as a
    digital assistant that can respond to your questions, generate content, help refine
    your writing, and offer fresh ideas—all in natural, conversational language. But
    this tool is more than just a fancy chatbot. For writers, it can be used to brainstorm
    content, write drafts, edit copy, and even suggest improvements to your tone and
    clarity.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是由OpenAI开发的高级语言模型。把它想象成一个可以回答你问题的、生成内容的、帮助你润色写作并提供新想法的数字助手——所有这些都在自然、对话式的语言中进行。但这个工具不仅仅是一个花哨的聊天机器人。对于作家来说，它可以用来构思内容、撰写草稿、编辑稿件，甚至建议改进你的语气和清晰度。
- en: In short, ChatGPT can help you become more productive and consistent—especially
    if you’re juggling multiple writing projects or running a business that relies
    on digital content.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，ChatGPT可以帮助你提高生产力和一致性——特别是如果你在处理多个写作项目或经营依赖数字内容的企业时。
- en: Who This Book Is For
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这本书面向谁
- en: This book is written for beginners—people who may be new to AI tools, content
    writing, or both. Maybe you run a small business and want to write better blog
    posts. Maybe you’re a freelancer trying to speed up your workflow. Or maybe you’re
    just curious about how AI can fit into your creative process. No technical background
    or writing degree required.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书是为初学者写的——可能对AI工具、内容写作或两者都感到陌生的人。也许你经营着一家小企业，想要写更好的博客文章。也许你是一名自由职业者，试图加快你的工作流程。或者也许你对AI如何融入你的创作过程感到好奇。不需要任何技术背景或写作学位。
- en: 'You’ll find this book especially helpful if:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你发现以下情况特别有帮助：
- en: ● You’ve used ChatGPT but don’t quite know how to guide it properly.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: ● 你已经使用过ChatGPT，但不知道如何正确引导它。
- en: ●     You struggle with starting from a blank page.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: ●     你发现从一张白纸开始写作很困难。
- en: ●     You want help brainstorming ideas or refining your writing.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: ●     你需要帮助构思想法或完善你的写作。
- en: ●     You want to write faster without sacrificing quality.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: ●     你希望在保证质量的前提下提高写作速度。
- en: What You’ll Learn in This Book
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这本书你将学到什么
- en: We’ll start with the basics—what ChatGPT is, how it works, and how to access
    it. Then we’ll walk through different ways you can use ChatGPT to support your
    writing, from brainstorming blog post ideas to writing product descriptions and
    polishing final drafts.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从基础知识开始——什么是ChatGPT，它是如何工作的，以及如何访问它。然后我们将介绍不同的方法，你可以使用ChatGPT来支持你的写作，从构思博客文章的想法到撰写产品描述，再到润色最终稿件。
- en: 'Here’s a quick look at what we’ll cover:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 快速浏览我们将要涵盖的内容：
- en: 'Part 1: Getting Started with ChatGPT'
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一部分：ChatGPT入门
- en: We’ll begin by exploring how ChatGPT works and how to interact with it effectively.
    You’ll learn how to craft better prompts, how to get more accurate results, and
    how to guide the conversation in the direction you want. You’ll also get tips
    for setting up your account, understanding the interface, and choosing between
    the free and paid versions of the tool.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先探讨ChatGPT的工作原理以及如何有效地与之互动。您将学习如何制定更好的提示，如何获得更准确的结果，以及如何引导对话朝着您想要的方向发展。您还将获得有关设置账户、理解界面以及选择工具的免费和付费版本的提示。
- en: 'Part 2: ChatGPT for Writing Tasks'
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第二部分：ChatGPT写作任务
- en: 'This is where we roll up our sleeves and use ChatGPT for real writing projects.
    You’ll see how to:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们卷起袖子，真正使用ChatGPT进行写作项目的地方。您将看到如何：
- en: ●     Brainstorm content ideas when you’re stuck
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: ●     在遇到瓶颈时头脑风暴内容想法
- en: ●     Draft blog posts, email newsletters, and web pages
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: ●     草拟博客文章、电子邮件通讯和网页
- en: ● Edit and rewrite existing content for clarity, tone, or flow
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: ● 编辑和改写现有内容以提高清晰度、语气或流畅性
- en: ● Use AI for SEO tasks like keyword research and article outlines
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: ● 使用AI进行SEO任务，如关键词研究和文章大纲
- en: Each section includes beginner-friendly tips, examples, and best practices.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 每个部分都包括适合初学者的提示、示例和最佳实践。
- en: 'Part 3: Tips, Tools, and Best Practices'
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第三部分：技巧、工具和最佳实践
- en: This section is all about working smarter. You’ll learn how to build a productive
    workflow with ChatGPT, how to refine and humanize AI-generated content, and how
    to avoid common mistakes like over-relying on AI or losing your unique voice.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这一部分完全是关于更聪明地工作。您将学习如何与ChatGPT建立高效的工作流程，如何精炼和人性化AI生成的内容，以及如何避免常见的错误，如过度依赖AI或失去您独特的声音。
- en: 'One chapter is dedicated to what many new users struggle with most: keeping
    the human element in AI-assisted writing. You’ll discover how to recognize when
    content feels “robotic” and how to inject your own creativity and emotion to make
    your writing shine.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 一章专门讨论许多新用户最头疼的问题：在AI辅助写作中保持人文元素。您将发现如何识别内容是否感觉“机械”，以及如何注入您自己的创造力和情感，使您的写作更加出色。
- en: We’ll also include a handy prompt library you can use as a starting point for
    various content types—from blog posts to social media captions—so you’re never
    starting from scratch.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将包括一个实用的提示库，您可以用作各种内容类型的起点——从博客文章到社交媒体标题——这样您就永远不会从头开始。
- en: A Note on Creativity and the Human Touch
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于创造力和人文关怀的说明
- en: 'Let’s be clear—ChatGPT can be an incredibly helpful tool, but it isn’t a replacement
    for your ideas, your experience, or your voice. Think of it like a smart co-writer:
    it can offer suggestions, generate drafts, and help you think outside the box.
    But the magic still comes from you.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们明确一点——ChatGPT可以是一个极其有用的工具，但它不能替代您的想法、经验或声音。把它想象成一个聪明的合著者：它可以提供建议、生成草稿，并帮助您跳出思维定式。但真正的魔法还是来自您自己。
- en: Your personality, insight, and emotion are what make content connect with readers.
    Throughout this book, we’ll talk about how to blend AI-generated ideas with your
    creativity so your writing doesn’t just sound good—it sounds like you.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 您的个性、洞察力和情感是使内容与读者产生共鸣的关键。在这本书中，我们将讨论如何将AI生成的想法与您的创造力相结合，使您的写作不仅听起来很好，而且听起来像您自己。
- en: How to Use This Book
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何使用这本书
- en: You don’t need to read this book cover to cover. Feel free to jump around to
    the chapters that feel most useful to you right now. Each chapter is self-contained
    and offers step-by-step examples that you can follow immediately.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 您不需要从头到尾阅读这本书。请随意跳转到您现在觉得最有用的章节。每个章节都是独立的，并提供了您可以立即遵循的逐步示例。
- en: But if you’re completely new to ChatGPT, starting from the beginning will give
    you a strong foundation.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果您对ChatGPT完全陌生，从开始学习将为您打下坚实的基础。
- en: Let’s Get Started
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 让我们开始吧
- en: The goal of this book is to help you feel confident using ChatGPT in your writing
    process, whether you're publishing blog posts, creating content for your business,
    or simply trying to write more efficiently. You’ll leave with a better understanding
    of how AI fits into the modern writing world—and how it can support you as a creator.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书的目标是帮助您在写作过程中自信地使用ChatGPT，无论您是发布博客文章、为您的业务创建内容，还是简单地尝试更高效地写作。您将带着对AI如何融入现代写作世界以及它如何作为创作者支持您的更好理解离开。
- en: So grab your laptop, open up ChatGPT, and let’s write something great—together.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 所以拿起您的笔记本电脑，打开ChatGPT，让我们一起写出一些精彩的内容吧。
- en: 'Part 1:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 第一部分：
- en: Getting Started with ChatGPT
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT入门
- en: '![](image_rsrc1FR.jpg)'
  id: totrans-84
  prefs:
  - PREF_H1
  type: TYPE_IMG
  zh: '![](image_rsrc1FR.jpg)'
- en: Photo by [](https://unsplash.com/@emilianovittoriosi?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    [Emiliano Vittoriosi](https://unsplash.com/@emilianovittoriosi?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [](https://unsplash.com/photos/a-computer-screen-with-a-bunch-of-words-on-it-vEN1bsdSjxM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    [Unsplash](https://unsplash.com/photos/a-computer-screen-with-a-bunch-of-words-on-it-vEN1bsdSjxM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Emiliano Vittoriosi](https://unsplash.com/@emilianovittoriosi?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/a-computer-screen-with-a-bunch-of-words-on-it-vEN1bsdSjxM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)上提供
- en: 'Chapter 1: What is ChatGPT, and How Does it Work?'
  id: totrans-86
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第一章：什么是ChatGPT，它是如何工作的？
- en: Meet Your New Writing Partner.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 拥抱你的新写作伙伴。
- en: Before we dive into how to use ChatGPT to make writing easier, faster, and more
    creative, it helps to understand what it actually is. You don’t need a tech background
    to get the most out of this tool—but having a general idea of how it works will
    help you use it more effectively.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨如何使用ChatGPT使写作更轻松、更快、更有创意之前，了解它实际上是什么很重要。你不需要技术背景就能充分利用这个工具——但有一个大致的了解将帮助你更有效地使用它。
- en: ChatGPT is an AI-powered language model developed by a company called OpenAI.
    It’s designed to generate human-like responses based on the prompts you give it.
    You can think of it as a very advanced writing assistant that can help you brainstorm
    ideas, write content, edit drafts, and even answer questions.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT是由一家名为OpenAI的公司开发的人工智能语言模型。它旨在根据你给出的提示生成类似人类的回应。你可以将其视为一个非常高级的写作助手，可以帮助你构思想法、撰写内容、编辑草稿，甚至回答问题。
- en: 'But here’s the key: ChatGPT doesn’t “think” like a human, and it doesn’t browse
    the internet for current information. Instead, it’s trained on a massive amount
    of text data and uses patterns in language to predict the next word in a sentence—very
    quickly and very accurately.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 但关键是：ChatGPT并不像人类那样“思考”，它也不会浏览互联网获取当前信息。相反，它是基于大量文本数据进行训练的，并使用语言中的模式来预测句子中的下一个单词——非常快速且非常准确。
- en: What Does “Language Model” Mean?
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: “语言模型”是什么意思？
- en: A language model is a computer program that’s trained to understand and generate
    human language. ChatGPT is one of the most advanced examples out there. It’s based
    on something called GPT (which stands for “Generative Pre-trained Transformer”).
    That’s just a fancy way of saying it’s been trained to predict words and phrases
    based on context.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型是一种经过训练以理解和生成人类语言的计算机程序。ChatGPT是其中最先进的例子之一。它基于一种称为GPT（代表“生成预训练转换器”）的技术。这仅仅是一种说法，意思是它已经被训练去根据上下文预测单词和短语。
- en: Imagine feeding a computer billions of books, websites, articles, and conversations—then
    asking it to generate new text that sounds just as natural. That’s what GPT models
    are built to do.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下向计算机输入数十亿本书籍、网站、文章和对话——然后要求它生成听起来同样自然的新的文本。这正是GPT模型被构建来做的。
- en: When you type a question or prompt into ChatGPT, it analyzes the language, predicts
    what kind of response makes sense, and writes it out for you in real time. The
    results can be surprisingly thoughtful, creative, or informative—but they’re still
    based on patterns in the data it was trained on, not new or real-time information.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将问题或提示输入到ChatGPT中时，它会分析语言，预测哪种回应是有意义的，并实时为你写出回应。结果可能会出人意料地富有思考性、创造性和信息性——但它们仍然基于训练数据中的模式，而不是新的或实时信息。
- en: What ChatGPT Can Do
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT能做什么
- en: 'ChatGPT can assist with a wide variety of tasks, especially when it comes to
    writing. Here are just a few things you can ask it to help with:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以协助完成各种任务，尤其是在写作方面。以下是一些你可以请求它帮助的事情：
- en: ●     Brainstorm blog post ideas or article titles
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: ●     构思博客文章想法或文章标题
- en: ●     Write outlines for long-form content
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: ●     为长篇内容撰写大纲
- en: ●     Draft emails, product descriptions, and website copy
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: ●     起草电子邮件、产品描述和网站文案
- en: ●     Suggest edits for grammar, tone, and clarity
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: ●     建议对语法、语气和清晰度的编辑
- en: ●     Rewrite text for a different audience or platform
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: ●     为不同的受众或平台重写文本
- en: ●     Explain complex topics in simple language
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: ●     用简单语言解释复杂主题
- en: ●     Generate social media captions and headlines
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: ●     生成社交媒体标题和简介
- en: ●     Help you break through writer’s block
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: ●     帮助你突破写作瓶颈
- en: It works best when you treat it like a collaborator. You’ll get stronger results
    if you guide the conversation, ask follow-up questions, and give feedback—just
    like you would with a human co-writer.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 当你把它当作一个合作伙伴来对待时，它效果最好。如果你引导对话、提出后续问题并给出反馈——就像与一个人类合著者一样——你会得到更强大的结果。
- en: What ChatGPT Doesn’t Do
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT 无法做到的事情
- en: 'While ChatGPT is a powerful tool, it does have limits. Here are a few important
    things to keep in mind:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 ChatGPT 是一个强大的工具，但它确实有限制。以下是一些需要记住的重要事项：
- en: ● It doesn’t know the current news. ChatGPT can’t browse the internet or access
    real-time data (unless you’re using a version that includes web browsing). Its
    knowledge is based on data up to a specific point in time.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: ● 它不知道当前新闻。ChatGPT 不能浏览互联网或访问实时数据（除非你使用的是包含网络浏览功能的版本）。它的知识基于特定时间点的数据。
- en: ● It doesn’t always get facts right. The model is very good at sounding confident—even
    when it’s wrong. It’s a good idea to fact-check anything you plan to publish.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: ● 它并不总是能准确获取事实。该模型非常擅长表现出自信——即使它错了。在计划发布任何内容之前进行事实核查是个好主意。
- en: ● It doesn’t have opinions or emotions. Any “opinion” it shares is generated
    based on common patterns in language, not personal beliefs or feelings.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: ● 它没有观点或情感。它所分享的任何“观点”都是基于语言中的常见模式生成的，而不是个人信念或感受。
- en: ● It can’t replace your voice. ChatGPT can write in many different tones, but
    it’s up to you to personalize, edit, and make the final product sound like you.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: ● 它不能取代你的声音。ChatGPT 可以用许多不同的语气写作，但个性化、编辑并使最终产品听起来像你，这取决于你。
- en: Understanding these boundaries will help you use ChatGPT more thoughtfully and
    avoid over-relying on its output without checking or refining it.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这些界限将帮助你更深思熟虑地使用 ChatGPT，并避免在未经检查或改进的情况下过度依赖其输出。
- en: Why This Matters for Writers
  id: totrans-113
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这对作家意味着什么
- en: If you’re creating content for your business, blog, or marketing strategy, ChatGPT
    can be a huge help. It can speed up the early stages of writing, help you test
    different tones or formats, and even offer new perspectives when you’re stuck.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在为你的业务、博客或营销策略创建内容，ChatGPT 可以提供巨大的帮助。它可以加快写作的早期阶段，帮助你测试不同的语气或格式，在你陷入困境时甚至提供新的视角。
- en: But the real benefit isn’t just speed—it’s flexibility. You can use it to generate
    a rough draft, rework a sentence you’re not happy with, or quickly explore ten
    different ways to say the same thing. You can use it for big-picture tasks like
    outlining or for small details like polishing headlines.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 但真正的益处不仅仅是速度——还有灵活性。你可以用它来生成草稿，修改你不满意的句子，或者快速探索表达相同意思的十种不同方式。你可以用它来完成大局任务，如概述，或者细节任务，如润色标题。
- en: The goal of this book is to show you how to use ChatGPT as a creative partner
    that supports your ideas, not replaces them.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书的目标是向你展示如何将 ChatGPT 作为一位支持你想法的创意伙伴来使用，而不是取代你。
- en: A Quick Look at How ChatGPT Is Trained
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简要了解 ChatGPT 的训练过程
- en: If you’re curious about the tech behind the tool, here’s a quick overview in
    plain English.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你好奇这个工具背后的技术，这里有一个用简单英语的快速概述。
- en: ChatGPT is trained using a method called machine learning. That means it was
    shown huge amounts of text—books, articles, websites, conversations—so it could
    “learn” how language works. During training, it was rewarded for making good predictions
    and corrected when it made mistakes. Over time, this process helped it improve
    at understanding and generating language.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 是通过一种称为机器学习的方法进行训练的。这意味着它被展示了大量的文本——书籍、文章、网站、对话——这样它就能“学习”语言是如何运作的。在训练过程中，它因做出好的预测而获得奖励，在出错时被纠正。随着时间的推移，这个过程帮助它提高理解和生成语言的能力。
- en: That’s why it can now hold conversations, write blog posts, and mimic different
    tones—because it’s been trained on how those things should sound based on patterns
    in real-world text.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，它现在可以举行对话、撰写博客文章，并模仿不同的语气——因为它已经被训练了，知道这些事情应该如何根据现实世界文本中的模式听起来。
- en: It’s important to remember that it doesn’t “understand” meaning in the way humans
    do. It’s not thinking about what you said—it’s recognizing patterns and responding
    based on those patterns. Still, the results are often surprisingly helpful, especially
    when you learn how to guide it with thoughtful prompts.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要记住，它并不像人类那样“理解”意义。它不是在思考你说了什么——它是在识别模式并根据这些模式做出回应。尽管如此，结果往往是出人意料地有帮助的，尤其是当你学会如何用深思熟虑的提示引导它时。
- en: The Bottom Line
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: ChatGPT is a tool. A powerful, adaptable, and sometimes surprisingly insightful
    one—but still a tool. The more you understand what it can and can’t do, the better
    you’ll be at using it to your advantage.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll walk you through how to get started—what tools you
    need, which version to choose, and how to set yourself up for success before you
    even type your first prompt.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc1FS.jpg)'
  id: totrans-125
  prefs:
  - PREF_H1
  type: TYPE_IMG
- en: Photo by [](https://unsplash.com/@andrewtneel?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    [Andrew Neel](https://unsplash.com/@andrewtneel?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [](https://unsplash.com/photos/a-computer-screen-with-a-purple-and-green-background-CVfAqFRYjb0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    [Unsplash](https://unsplash.com/photos/a-computer-screen-with-a-purple-and-green-background-CVfAqFRYjb0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 2: Setting Up for Success'
  id: totrans-127
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Start Simple, Stay Flexible.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: Now that you know what ChatGPT is and what it can do, it’s time to get set up.
    You don’t need any special software or technical skills to begin. All you need
    is internet access and a few minutes to get familiar with the platform.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: This chapter will walk you through how to access ChatGPT, the differences between
    the free and paid versions, and how to use the interface effectively. Once you’re
    set up, you’ll be ready to start writing, experimenting, and getting more done
    with less stress.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: How to Access ChatGPT
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To use ChatGPT, you’ll need to create a free account through OpenAI. Here’s
    how:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: Go to [](https://chat.openai.com) [chat.openai.com](https://chat.openai.com)
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click “Sign up” or “Log in” if you already have an account.
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use your email address or log in with a Google, Microsoft, or Apple account.
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You may be asked to verify your phone number.
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once you’re logged in, you’ll land in the main chat interface, and you’re ready
    to go.
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You can use ChatGPT on a desktop browser, tablet, or mobile phone. There are
    also mobile apps for iOS and Android that offer the same functionality in a mobile-friendly
    format.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: 'Choosing the Right Version: Free vs. Paid'
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: OpenAI offers multiple versions of ChatGPT. The free version gives you access
    to GPT-3.5, which is powerful and perfectly fine for many writing tasks. If you’re
    just getting started, this version is a great place to begin.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: The paid version (ChatGPT Plus) gives you access to GPT-4, which is more advanced
    and can provide more accurate, creative, and thoughtful responses. As of this
    writing, the cost is $20/month.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: Here’s a quick breakdown of what you get with each:* Features like web browsing
    and file uploads are sometimes only available in GPT-4 with “tools” turned on,
    depending on OpenAI’s current rollout and settings.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: If you plan to do more in-depth content work, use AI for research support, or
    want the best possible results, upgrading to GPT-4 is worth considering. But you
    can absolutely learn, write, and create high-quality content using GPT-3.5.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你计划进行更深入的内容工作，使用AI进行研究支持，或希望获得最佳结果，升级到GPT-4是值得考虑的。但你可以绝对地使用GPT-3.5来学习、写作和创建高质量的内容。
- en: A Quick Tour of the Interface
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接口快速浏览
- en: 'Once you’re logged in, you’ll see a simple chat interface. It’s designed to
    be as intuitive as possible. Here’s a look at what you’ll find:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 登录后，你会看到一个简单的聊天界面。它被设计得尽可能直观。以下是你将看到的内容：
- en: '● Chat window: This is where you’ll enter your questions or prompts and read
    ChatGPT’s responses.'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: ● 聊天窗口：这是你输入问题或提示并阅读ChatGPT回答的地方。
- en: '● New Chat button: Clicking this starts a fresh conversation. This is helpful
    when switching topics or writing tasks.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: ● 新聊天按钮：点击此按钮开始新的对话。这在切换主题或写作任务时很有帮助。
- en: '● Sidebar: On the left, you’ll see a history of your previous chats, which
    you can revisit any time. You can also rename chats to keep things organized.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: ● 侧边栏：在左侧，你可以看到你之前的聊天历史，你可以随时回顾。你也可以重命名聊天以保持整洁。
- en: '● Settings (gear icon): Use this to adjust preferences or switch models (if
    you have GPT-4 access).'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: ● 设置（齿轮图标）：使用此功能调整首选项或切换模型（如果你有GPT-4访问权限）。
- en: '● Copy, Regenerate, and Thumbs: After ChatGPT responds, you can copy the output,
    ask it to try again (regenerate), or give feedback with a thumbs up/down.'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: ● 复制、重新生成和点赞：ChatGPT回答后，你可以复制输出、要求它再次尝试（重新生成），或通过点赞/点踩提供反馈。
- en: If you’re using the mobile app, the layout is similar, but adapted for smaller
    screens.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你使用的是移动应用，布局类似，但适应了更小的屏幕。
- en: Starting Your First Conversation
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 开始你的第一次对话
- en: 'You don’t need to phrase your questions in a special format. You can simply
    type something like:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要用特殊格式表达你的问题。你可以简单地输入像以下这样的内容：
- en: ● “Help me write an outline for a blog post about morning routines.”
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: ● “帮我写一个关于晨间惯例的博客文章大纲。”
- en: ●     “Rewrite this paragraph to sound more conversational.”
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: ● “将这个段落重写得更像对话。”
- en: ● “Give me five ideas for email subject lines about spring promotions.”
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: ● “给我五个关于春季促销的电子邮件主题行想法。”
- en: 'ChatGPT responds best to clear, specific prompts—but don’t worry if you’re
    not sure how to ask. You’ll learn through practice. If the response isn’t quite
    right, you can follow up with messages like:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT对清晰、具体的提示反应最好——但如果你不确定如何提问，不要担心。你将通过实践来学习。如果回答不太准确，你可以通过以下信息进行跟进：
- en: ●     “Make it shorter.”
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: ● “让它更简短。”
- en: ●     “Use a more professional tone.”
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: ● “使用更专业的语气。”
- en: ●     “Give me more detail about point three.”
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: ● “给我更多关于第三点的细节。”
- en: Each conversation is interactive, so feel free to tweak and refine it as you
    go. We’ll talk more about how to craft strong prompts in the next chapter.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 每次对话都是互动的，所以请随意在过程中调整和改进。我们将在下一章中更多地讨论如何撰写强大的提示。
- en: Setting Yourself Up for a Smooth Workflow
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为流畅的工作流程做好准备
- en: 'While ChatGPT can be used on its own, you may want to build a more comfortable
    workflow around it as you get used to writing with AI. Here are a few things that
    can help:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然ChatGPT可以单独使用，但随着你对使用AI写作越来越熟悉，你可能想要围绕它建立一个更舒适的工作流程。以下是一些可以帮助你的事情：
- en: '● Text editor or document app: Have a tool like Google Docs, Microsoft Word,
    or Notion open so you can copy, edit, and save ChatGPT’s responses.'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: ● 文本编辑器或文档应用：打开像Google Docs、Microsoft Word或Notion这样的工具，以便你可以复制、编辑和保存ChatGPT的回答。
- en: '● A note-taking tool: Use something simple like Notepad or a notes app to keep
    track of good prompts you’ve used or ideas you want to revisit.'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: ● 记事工具：使用像记事本或笔记应用这样的简单工具来跟踪你使用过的良好提示或想要重访的想法。
- en: '● Clipboard manager: If you’re copying and pasting a lot, a clipboard tool
    can save time.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: ● 剪贴板管理器：如果你经常复制和粘贴，剪贴板工具可以节省时间。
- en: '● Keyboard shortcuts: Familiarize yourself with copy/paste and browser tab
    shortcuts to keep your workflow smooth.'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: ● 键盘快捷键：熟悉复制/粘贴和浏览器标签快捷键，以保持你的工作流程顺畅。
- en: As you grow more comfortable, you’ll find your own rhythm. Some users prefer
    to generate full drafts inside ChatGPT, while others like to use it only for outlines
    or quick edits.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你越来越舒适，你会发现自己的节奏。一些用户更喜欢在ChatGPT内生成完整的草稿，而另一些用户则更喜欢只用它来编写大纲或进行快速编辑。
- en: Ready to Write
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准备写作
- en: Now that you’re logged in, set up, and have a feel for the interface, you’re
    ready to start exploring how to actually write with ChatGPT. In the next chapter,
    we’ll talk about the art of giving good prompts—how to guide the tool, get better
    responses, and start collaborating with AI in a way that feels natural and helpful.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经登录、设置好，并对界面有了感觉，你就可以开始探索如何实际使用ChatGPT进行写作了。在下一章中，我们将讨论编写良好提示的艺术——如何引导工具、获得更好的回应，以及以自然和有帮助的方式与AI协作。
- en: Let’s go write something great.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们去写些精彩的东西。
- en: '![](image_rsrc1FT.jpg)'
  id: totrans-172
  prefs:
  - PREF_H1
  type: TYPE_IMG
  zh: '![](image_rsrc1FT.jpg)'
- en: Photo from Personal Coversation with ChatGPT
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 来自与ChatGPT个人对话的图片
- en: 'Chapter 3: How to Talk to ChatGPT'
  id: totrans-174
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三章：如何与ChatGPT交谈
- en: Writing a Prompt That Gets the Job Done.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 编写一个能完成任务的提示。
- en: If there’s one skill that will make your experience with ChatGPT easier, it’s
    learning how to give it the right kind of instructions—called prompts. A prompt
    is simply the message you type in to tell ChatGPT what you want it to do. This
    can be a short sentence, a full paragraph, or even a series of instructions.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有一种技能能让你的ChatGPT体验更轻松，那就是学习如何给出正确的指令——称为提示。提示只是你输入给ChatGPT的消息，告诉它你想让它做什么。这可以是一个简短的句子、一个完整的段落，甚至是一系列指令。
- en: In this chapter, we’ll explore what makes a good prompt, how to give ChatGPT
    the right amount of context, and how to guide it when you want different results.
    Think of this as learning how to speak the language of the tool—not with jargon
    or code, but with simple, specific directions.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨什么是一个好的提示，如何给ChatGPT提供正确数量的上下文，以及如何在想要不同结果时引导它。把这看作是学习如何用工具的语言——不是用术语或代码，而是用简单、具体的指示。
- en: What Is a Prompt, Really?
  id: totrans-178
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是提示，实际上？
- en: A prompt is your way of “talking” to ChatGPT. It can be a request, a question,
    or a description of a task. The clearer your prompt, the more helpful and accurate
    the response will be.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 提示是你与ChatGPT“交谈”的方式。它可能是一个请求、一个问题，或者是对一项任务的描述。你的提示越清晰，得到的回应就越有帮助和准确。
- en: 'Here are some examples of prompts:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些提示示例：
- en: ● “Write a blog post introduction about the benefits of early morning exercise.”
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: ● “写一篇关于早晨锻炼益处的博客文章引言。”
- en: ● “Give me five headline ideas for a dental clinic’s spring promotion.”
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: ● “给我提供五个春季促销活动的牙科诊所标题想法。”
- en: ●     “Rewrite this paragraph to sound more casual and friendly.”
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “将这段文字重写得更随意、更友好。”
- en: ●     “Summarize this text in three bullet points.”
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “用三个要点总结这段文字。”
- en: Each of these examples gives ChatGPT enough direction to know what kind of result
    you’re looking for—and that’s the key.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 每个这些例子都为ChatGPT提供了足够的方向，以便知道你想要什么样的结果——这才是关键。
- en: The Basics of a Strong Prompt
  id: totrans-186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 强大提示的基础
- en: 'When writing a prompt, there are a few things you can include to improve the
    output:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 当编写提示时，你可以包含一些内容来提高输出质量：
- en: 1\. Be Specific About the Task
  id: totrans-188
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 明确任务
- en: 'Instead of saying “Write something about marketing,” try:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 不要说“写一些关于营销的内容”，而是尝试：
- en: “Write a short email introducing a new social media marketing service to small
    business owners.”
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: “写一封简短的电子邮件，向中小企业主介绍一项新的社交媒体营销服务。”
- en: The more details you include about the purpose and format, the better the result.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 你提供关于目的和格式的细节越多，结果就越好。
- en: 2\. Mention the Audience
  id: totrans-192
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 提及受众
- en: 'Tell ChatGPT who the writing is for:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 告诉ChatGPT写作的对象是谁：
- en: “Write a blog post explaining SEO to small business owners who are not tech-savvy.”
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: “写一篇博客文章，向不熟悉技术的中小企业主解释SEO。”
- en: Knowing the audience helps ChatGPT choose the right tone and complexity level.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 了解受众有助于ChatGPT选择合适的语气和复杂程度。
- en: 3\. Set the Tone or Style
  id: totrans-196
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 设置语气或风格
- en: 'You can guide the style of the writing by including instructions like:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 通过包含类似指示的内容，你可以引导写作的风格：
- en: ●     “Make it sound professional and informative.”
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “让它听起来专业且信息丰富。”
- en: ●     “Use a casual, friendly tone like a conversation.”
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “使用像对话一样的随意、友好的语气。”
- en: ●     “Write in a persuasive tone, like a sales pitch.”
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “用说服性的语气写作，就像销售演讲。”
- en: Tone makes a big difference, especially if you’re using the content for your
    brand or business.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 语气有很大的影响，尤其是如果你使用内容来推广你的品牌或业务。
- en: 4\. Include Format or Length Instructions (Optional)
  id: totrans-202
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 包含格式或长度说明（可选）
- en: 'You can ask for a certain structure:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以要求特定的结构：
- en: ●     “Write this as a list of tips.”
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “将此内容写成提示列表。”
- en: ●     “Keep the response under 200 words.”
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “将回应控制在200字以内。”
- en: ●     “Use short paragraphs and clear headings.”
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “使用简短的段落和清晰的标题。”
- en: The more structure you provide, the closer the result will be to what you have
    in mind.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 你提供的结构越多，结果就越接近你的预期。
- en: Prompting Is a Conversation, Not a One-Time Command
  id: totrans-208
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提示词是一种对话，而不是一次性命令
- en: 'One of the best things about ChatGPT is that you can continue the conversation.
    If the response isn’t quite right, you don’t have to start over. You can follow
    up with instructions like:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 一件关于 ChatGPT 的最好事情是你可以继续对话。如果回复不太准确，你不必从头开始。你可以用以下指示跟进：
- en: ●     “Make it shorter.”
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “让它更简短。”
- en: ●     “Add more detail to point 2.”
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “为第2点添加更多细节。”
- en: ●     “Can you write that in a more persuasive tone?”
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “你能用更有说服力的语气写吗？”
- en: ●     “Try again, but use humor this time.”
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “再试一次，但这次用幽默的方式。”
- en: Each follow-up shapes the result a little more. This back-and-forth is where
    ChatGPT really shines because you’re refining the work together.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 每次跟进都会使结果更接近一些。这正是 ChatGPT 发挥真正作用的地方，因为你们一起在完善工作。
- en: Examples of Effective Prompts
  id: totrans-215
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 有效的提示词示例
- en: 'Let’s take a look at some sample prompts and how small changes can make a big
    difference:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些示例提示词以及微小的变化如何产生重大差异：
- en: 'Basic Prompt:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 基本提示词：
- en: “Write a blog post about healthy eating.”
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: “写一篇关于健康饮食的博客文章。”
- en: 'Improved Prompt:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 改进的提示词：
- en: “Write a 500-word blog post for busy professionals about how to build healthy
    eating habits during the workweek. Make the tone friendly and encouraging, and
    include a few practical tips.”
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: “为忙碌的专业人士写一篇500字的博客文章，关于如何在工作周建立健康的饮食习惯。语气要友好并鼓励人，并包含一些实用的建议。”
- en: 'Basic Prompt:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 基本提示词：
- en: “Write a product description.”
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: “写一个产品描述。”
- en: 'Improved Prompt:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 改进的提示词：
- en: “Write a short product description for a portable blender aimed at fitness enthusiasts.
    Emphasize convenience, power, and the ability to blend anywhere. Keep the tone
    energetic and upbeat.”
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: “为针对健身爱好者的便携式搅拌机写一篇简短的产品描述。强调便利性、功率和在任何地方搅拌的能力。保持语气充满活力和乐观。”
- en: As you can see, giving ChatGPT more context helps it produce better responses
    with less editing on your part.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，为 ChatGPT 提供更多上下文可以帮助它产生更好的回复，而你需要的编辑也更少。
- en: Adding Examples or Reference Text
  id: totrans-226
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 添加例子或参考文本
- en: 'You can also include your own content or examples in your prompt. For instance:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以在你的提示词中包含你自己的内容或例子。例如：
- en: “Here’s the original paragraph. Can you rewrite it to sound more professional?
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: “这是原文段。你能重写它使其听起来更专业吗？”
- en: ‘Our team is super passionate about helping businesses grow online, and we’ve
    got some awesome services you should totally check out.’”
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: “我们的团队对帮助业务在线增长充满热情，我们有一些很棒的服务你绝对应该看看。””
- en: 'Or:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 或者：
- en: '“Use this tone as a reference: ‘At BrightWeb Solutions, we bring clarity and
    strategy to every digital campaign.’ Now rewrite the following paragraph to match
    that tone.”'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: “以以下语气为参考：‘在 BrightWeb Solutions，我们为每个数字营销活动带来清晰度和策略。’现在重写以下段落以匹配那种语气。”
- en: By offering an example, you help the AI match the voice or direction you want.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 通过提供一个例子，你帮助 AI 匹配你想要的语气或方向。
- en: Prompts That Save Time
  id: totrans-233
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 节省时间的提示词
- en: 'You can even use ChatGPT to help you write better prompts. Try asking:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 你甚至可以使用 ChatGPT 来帮助你写出更好的提示词。试着问：
- en: ●     “What’s a good prompt to generate blog post outlines?”
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: ●     “有什么好的提示词可以生成博客文章的大纲？”
- en: ● “Can you give me a prompt to write a product description for a tech gadget?”
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: ● “你能给我一个为科技小玩意写产品描述的提示词吗？”
- en: You’ll be surprised at how well ChatGPT can assist in setting itself up—like
    a writing coach that’s always available.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 你会惊讶于 ChatGPT 在自我设置方面的协助能力有多强——就像一个随时可用的写作教练。
- en: Practice Makes Progress
  id: totrans-238
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习使进步
- en: Prompting is a skill. The more you use ChatGPT, the better you’ll get at shaping
    the results. Don’t be afraid to experiment, tweak your phrasing, or try different
    angles. Over time, you’ll develop your own prompt style that works best for your
    content and your goals.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 提示词是一种技能。你使用 ChatGPT 越多，你将越擅长塑造结果。不要害怕实验，调整你的措辞，或尝试不同的角度。随着时间的推移，你将发展出最适合你内容和目标的自定义提示词风格。
- en: In the next section of this book, we’ll put your prompting skills to work and
    show you exactly how ChatGPT can support real writing tasks—starting with brainstorming.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的下一节中，我们将运用你的提示词技巧，并展示 ChatGPT 如何支持实际的写作任务——从头脑风暴开始。
- en: 'Part 2:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部分：
- en: ChatGPT for Writing Tasks
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 用于写作任务
- en: '![](image_rsrc1FU.jpg)'
  id: totrans-243
  prefs:
  - PREF_H1
  type: TYPE_IMG
  zh: '![](image_rsrc1FU.jpg)'
