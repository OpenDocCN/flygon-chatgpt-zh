  id: totrans-3122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE290]'
- en: This tag tells the web browser where to find the JavaScript code, which I annotate
    in the next section.
  id: totrans-3123
  prefs: []
  type: TYPE_NORMAL
