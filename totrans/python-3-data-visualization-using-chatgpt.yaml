- en: '**WHAT IS TEXTHERO?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Texthero is a Python-based open source toolkit that functions as a layer of
    abstraction over Pandas, and its home page is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '*[https://github.com/jbesomi/texthero](https://github.com/jbesomi/texthero)*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Texthero leverages very useful Python libraries for NLP, such as Gensim, NLTK,
    SpaCy, and Sklearn. Moreover, Texthero supports the following functionality:'
  prefs: []
  type: TYPE_NORMAL
- en: NER and topic modeling (for NLP)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: TF-IDF, term frequency, and word-embeddings (for NLP)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DBSCAN, Hierarchical, k-Means, and Meanshift algorithms
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: various types of text visualization
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Open a command shell and install texthero with the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE285]'
  prefs: []
  type: TYPE_PRE
- en: 'Texthero supports various other algorithms, including dimensionality reduction
    algorithms for machine learning. Navigate to the following link for documentation
    and other information about Texthero:'
  prefs: []
  type: TYPE_NORMAL
- en: '*[https://texthero.org/docs/getting-started](https://texthero.org/docs/getting-started)*'
  prefs: []
  type: TYPE_NORMAL
