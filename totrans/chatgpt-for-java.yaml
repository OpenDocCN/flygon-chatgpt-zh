  - PREF_UL
  type: TYPE_NORMAL
- en: 'Aficionado (Spanish origin): Someone who is very passionate about a specific
    activity or subject'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Piñata (Spanish origin): A brightly colored box of candy for kids to beat relentlessly'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Speech recognition has problems with names**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Certain names of people, businesses, and websites can often be hard to spell
    and understand
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Speech recognition has problems with homophones**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do you remember those words that **sound the same** but have different spellings
    and meanings? The fantastic editor of this book knows all of them!
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Would / Wood
  prefs:
  - PREF_IND
