  type: TYPE_NORMAL
  zh: 考虑外部因素（例如，经济衰退，竞争）可能引起的潜在波动。
- en: 'Example Prompt for Cost Analysis:'
  id: totrans-891
  prefs: []
  type: TYPE_NORMAL
  zh: 成本分析示例提示：
- en: '| • | Objective: Conduct a cost analysis to identify opportunities for cost
    reduction without compromising quality. |'
  id: totrans-892
  prefs: []
  type: TYPE_TB
  zh: '| • | 目标：进行成本分析，以识别在不影响质量的前提下降低成本的机会。'
- en: '| • | Scope: Comprehensive cost breakdown, identifying fixed and variable costs,
    and their relationship with overall profitability. |'
  id: totrans-893
  prefs: []
  type: TYPE_TB
  zh: '| • | 范围：全面成本拆分，确定固定成本和变动成本，以及它们与整体盈利能力的关系。'
- en: '| • | Target Areas: |'
  id: totrans-894
  prefs: []
  type: TYPE_TB
  zh: '| • | 目标区域：'
- en: 'Cost Breakdown: Analyze fixed costs, including rent, utilities, and salaries,
    and variable costs such as raw materials, production, and marketing.'
  id: totrans-895
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成本拆分：分析固定成本，包括租金、公用事业和工资，以及变动成本，如原材料、生产和营销。
- en: '| • | Data Inputs: |'
  id: totrans-896
  prefs: []
  type: TYPE_TB
  zh: '| • | 数据输入：'
- en: Historical cost data for the past 3 years.
  id: totrans-897
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过去3年的历史成本数据。
- en: Forecasted production volume and associated variable costs.
  id: totrans-898
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测的生产量和相关的变动成本。
- en: Estimated costs associated with new supplier contracts.
  id: totrans-899
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与新供应商合同相关的估计成本。
- en: '| • | Key Assumptions: |'
  id: totrans-900
  prefs: []
  type: TYPE_TB
  zh: '| • | 关键假设：'
- en: Fixed costs will remain stable for the next 12 months.
  id: totrans-901
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 固定成本将在未来12个月内保持稳定。
- en: Variable costs will increase by 3% annually due to inflation.
  id: totrans-902
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于通货膨胀，变动成本将每年增加3%。
- en: '| • | Outputs/Deliverables: |'
  id: totrans-903
  prefs: []
  type: TYPE_TB
  zh: '| • | 输出/可交付成果：'
- en: Detailed cost breakdown for each department (e.g., operations, marketing, HR).
  id: totrans-904
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个部门（例如，运营、营销、人力资源）的详细成本拆分。
- en: Recommendations for reducing variable costs.
  id: totrans-905
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 降低变动成本的建议。
- en: Margin analysis and cost-saving targets.
  id: totrans-906
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利润率分析和成本节约目标。
- en: '| • | Constraints: |'
  id: totrans-907
  prefs: []
  type: TYPE_TB
  zh: '| • | 约束条件：'
- en: Limited ability to reduce fixed costs in the short term.
  id: totrans-908
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 短期内减少固定成本的能力有限。
- en: Cost-saving measures must not negatively impact product quality.
  id: totrans-909
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成本节约措施不得对产品质量产生负面影响。
- en: '| • | Additional Considerations: |'
  id: totrans-910
  prefs: []
  type: TYPE_TB
  zh: '| • | 其他考虑因素：'
- en: Potential cost increases from raw materials if global supply chain issues persist.
  id: totrans-911
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果全球供应链问题持续存在，原材料成本可能会增加。
