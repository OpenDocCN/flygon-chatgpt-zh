  id: totrans-1425
  prefs: []
  type: TYPE_NORMAL
  zh: '"编写Python代码以使用滑动窗口技术解决大小为k的最大子数组和问题。包括窗口维护的详细解释并讨论解决方案的时间复杂度。"'
- en: '17: Solving Backtracking Problems'
