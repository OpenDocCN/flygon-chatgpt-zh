  id: totrans-1436
  prefs: []
  type: TYPE_NORMAL
  zh: '*[https://github.com/jbesomi/texthero](https://github.com/jbesomi/texthero)*'
- en: 'Texthero leverages very useful Python libraries for NLP, such as Gensim, NLTK,
    SpaCy, and Sklearn. Moreover, Texthero supports the following functionality:'
  id: totrans-1437
  prefs: []
  type: TYPE_NORMAL
  zh: Texthero 利用非常实用的 Python NLP 库，如 Gensim、NLTK、SpaCy 和 Sklearn。此外，Texthero 支持以下功能：
- en: NER and topic modeling (for NLP)
  id: totrans-1438
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 命名实体识别 (NER) 和主题建模（用于 NLP）
- en: TF-IDF, term frequency, and word-embeddings (for NLP)
  id: totrans-1439
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TF-IDF、词频和词嵌入（用于 NLP）
- en: DBSCAN, Hierarchical, k-Means, and Meanshift algorithms
  id: totrans-1440
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DBSCAN、层次聚类、k-Means 和 Meanshift 算法
- en: various types of text visualization
  id: totrans-1441
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 各种类型的文本可视化
