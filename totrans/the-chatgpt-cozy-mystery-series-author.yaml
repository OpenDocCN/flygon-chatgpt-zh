- en: '#The means of death. Two antique knitting needles to the chest.'
  prefs: []
  type: TYPE_NORMAL
- en: '#Was the sleuth present when the murder took place? No. But Edward was still
    alive when she found him. Edward grabbed Laura’s arm and gifted her his psychic
    powers before he died.'
  prefs: []
  type: TYPE_NORMAL
- en: '#What did the killer leave at the murder scene or remove from the scene that
    provides a vital clue for our sleuth? The killer had searched Eddie’s clothing,
    and the contents of his bag were strewn all over the floor of the studio. They
    had brought the unusual antique knitting needles used as a murder weapon with
    them = a vital clue.'
  prefs: []
  type: TYPE_NORMAL
- en: '#Was the victim likable? How can you demonstrate this before the murder takes
    place so that the reader cares about this person before they are killed? In this
    case, Edward Montague was a celebrity psychic and a medium in Polperran for a
    psychic fair. Laura’s aunt Sera knew him and asked him to tell her if he had encountered
    anything linked to these artifacts.'
  prefs: []
  type: TYPE_NORMAL
- en: '#Why should anyone want to kill this person? The killer is searching for these
    artifacts, and Eddie has discovered a vital clue to the location. The killer wants
    to get there before anyone else.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A blue circle with white text  Description automatically generated](image_rsrc452.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The Suspects
  prefs: []
  type: TYPE_NORMAL
- en: One of the delights for any reader of cozy fiction has to be working out the
    identity of the real killer from the range of possible suspects identified by
    our sleuth.
  prefs: []
  type: TYPE_NORMAL
- en: It is a delicious puzzle whose reward is justice for the victim and a rebalancing
    of the world order when the real world seems to be in chaos.
  prefs: []
  type: TYPE_NORMAL
- en: Our job as the writer is, therefore, to present the readers with a range of
    suspects who have convincing and credible reasons why they want the victim dead/injured.
    So, lots of brainstorming is required.
  prefs: []
  type: TYPE_NORMAL
- en: Who has the most to gain from the victim’s death?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Give everyone a secret and a motive – from paying for a nursing home for a beloved
    relative to revenge to greed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Passion and money are classic motives, but what about the deep secrets they
    are hiding?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keep the motives different for each suspect but based on the relationships between
    people – envy, greed, revenge, resentment, fear of exposure, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Develop the list of suspects and their motives, means, and opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: Select one suspect who will be the main antagonist and an equal match for the
    sleuth. Build up their backstory.
  prefs: []
  type: TYPE_NORMAL
- en: Recreate how the first murder was committed and then create the clues that will
    lead the sleuth to the killer.
  prefs: []
  type: TYPE_NORMAL
- en: Who are the suspects, and how does the sleuth find the clues and revelations
    to their motive for killing the victim?
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are five ideas to help you brainstorm possible suspects:'
  prefs: []
  type: TYPE_NORMAL
- en: Suspect 1 – THE OBVIOUS KILLER.
  prefs: []
  type: TYPE_NORMAL
- en: Suspect 2 – THE FAMILY MEMBERS linked to the victim.
  prefs: []
  type: TYPE_NORMAL
- en: Suspect 3 – THE POSSIBLE KILLER IN THE COMMUNITY
  prefs: []
  type: TYPE_NORMAL
- en: Suspect 4 – THE OUTSIDER
  prefs: []
  type: TYPE_NORMAL
- en: Suspect 5 – THE HIDDEN SUSPECT
  prefs: []
  type: TYPE_NORMAL
- en: Of course, this list of possible suspects is only a suggestion, and every mystery
    is unique. Still, I have found it helpful to brainstorm these ideas for suspects
    as a guideline to quickly develop a story outline that is both well-motivated
    and will create an interesting puzzle for the sleuth and the reader to solve.
  prefs: []
  type: TYPE_NORMAL
- en: Using multiple suspects in this way helps build layers of conflict, moments
    of sudden exposition, character-driven emotional intensity, red herrings, and
    distractions as their connection to the victim is revealed.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes, the connection is unexpected and startling, revealing an entirely
    new aspect of the victim’s life that the sleuth knew nothing about.
  prefs: []
  type: TYPE_NORMAL
- en: Each suspect leads to or directly provides, an additional clue or “breadcrumb”
    for the sleuth to follow as they follow a broken path toward the real killer.
  prefs: []
  type: TYPE_NORMAL
- en: This is the start of the journey to discovering who your killer is and why the
    sleuth must work hard to match the killer’s intelligence and determination.
  prefs: []
  type: TYPE_NORMAL
- en: You are going to need three to five possible suspects for this murder, so the
    more creative the ideas you can come up with at this stage, the better.
  prefs: []
  type: TYPE_NORMAL
- en: I hope that you can see that by building up a character profile for the victim,
    you can create endless permutations when it comes to your suspects, who all have
    excellent reasons for wanting the victim dead.
  prefs: []
  type: TYPE_NORMAL
- en: In most mysteries, the greater the number of suspects, the more complex the
    puzzle, which rewards readers.
  prefs: []
  type: TYPE_NORMAL
- en: Now, all you have to do is create the sequence of clues, revelations, and tiny
    mistakes that will lead the sleuth to the possible suspects.
  prefs: []
  type: TYPE_NORMAL
- en: Expand on the Backstory of the Victim and the Motivation of the Killer
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: What aspects of their history and current behavior will be revealed by the sleuth,
    which leads them directly to multiple suspects?
  prefs: []
  type: TYPE_NORMAL
- en: Note at least five ideas about the murder victim's backstory and how they came
    to this point. Expand more as you write the story.
  prefs: []
  type: TYPE_NORMAL
- en: Focusing on the backstory of the murder victim, including their lifestyle, friends,
    and family, will deliver a logical and rational explanation that makes sense.
  prefs: []
  type: TYPE_NORMAL
- en: If you understand why someone would want to kill the victim, then you can create
    multiple suspects.
  prefs: []
  type: TYPE_NORMAL
- en: Then, use that background to come up with at least three ideas for why someone
    would want to murder the victim and how they did it.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s work through a few of the really interesting suggestions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc453.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Please tell me more about A Cursed Artifact: Eddie''s murder could be connected
    to a specific antique or artifact that he came into possession of or had recently
    appraised. Perhaps this object was believed to be cursed or held significant spiritual
    power. The previous owner, or someone with a vested interest in the artifact''s
    power or history, might have resorted to murder to reclaim it, believing the poisoned
    knitting needles—a blend of the mundane and the arcane—were the only way to sever
    Eddie''s connection to the artifact.'
  prefs: []
  type: TYPE_NORMAL
- en: Create a character profile explaining in detail why they were compelled to kill
    Eddie when he returned to Polperran.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc454.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Character Profile: Victor Holloway'
  prefs: []
  type: TYPE_NORMAL
- en: 'Full Name: Victor Alastair Holloway'
  prefs: []
  type: TYPE_NORMAL
- en: 'Physical Description: Victor is in his early fifties, with an imposing presence.
    He stands at 6 feet tall, with a lean, wiry frame that speaks to years of disciplined
    physical activity. His hair is peppered gray, cut short in a no-nonsense style,
    and his eyes are a piercing green that often unsettles those he fixes his gaze
    upon. Victor dresses in a manner that blends sophistication with practicality,
    favoring tailored suits that are dark and unassuming.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Background: Victor Holloway is a collector and dealer of rare antiquities,
    with a particular interest in items of a mystical or occult nature. His fascination
    with the arcane began in childhood, sparked by a family legacy that traces back
    to the ancient druids of Britain. Over the years, Victor amassed a significant
    collection, some pieces of which are rumored to possess real power.'
  prefs: []
  type: TYPE_NORMAL
- en: Victor's expertise and discreet manner have made him a sought-after figure in
    certain circles, including those dabbling in the supernatural. His dealings are
    shrouded in secrecy, and he is known to go to great lengths to acquire items that
    catch his interest.
  prefs: []
  type: TYPE_NORMAL
- en: 'Current Crisis: Victor''s obsession reached a peak with the pursuit of the
    "Lunar Locket," an artifact believed to hold the power to commune with the spirits
    of the dead during certain phases of the moon. According to legend, the locket
    was lost in Polperran centuries ago, cursed by its last owner to bring misfortune
    to anyone who misused its power.'
  prefs: []
  type: TYPE_NORMAL
- en: When Victor learned that Eddie Montague had come into possession of the locket
    and had identified its true nature, he saw his chance to claim the artifact. However,
    Eddie's refusal to sell the locket and his plans to reveal its secrets at the
    Polperran psychic fair threatened Victor's ambitions and the secrecy of the occult
    world.
  prefs: []
  type: TYPE_NORMAL
- en: 'Personality: Victor is intelligent, calculated, and deeply private. He possesses
    a charm that he employs selectively to advance his interests. However, beneath
    his polished exterior lies a cold determination and a belief in his right to wield
    the power of the artifacts he collects. Victor is not inherently cruel, but his
    obsession with the occult has skewed his moral compass, leading him to justify
    extreme actions in the name of his quest.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Murder Connection: Convinced that the Lunar Locket was destined to be his and
    fearing the exposure of its powers would attract unwanted attention or worse,
    unleash its curse, Victor saw Eddie''s refusal as a direct challenge. Believing
    he had no other choice, he decided to eliminate Eddie, reclaim the locket, and
    protect the secrecy of the artifact''s powers. The use of poisoned knitting needles
    was a calculated decision—Victor believed that blending the mundane with the arcane
    in the act of murder would sever Eddie''s spiritual connection to the locket,
    ensuring its safe retrieval.'
  prefs: []
  type: TYPE_NORMAL
- en: Victor's act was one born of desperation and a deep-seated belief in the importance
    of his mission to safeguard and control the powers of the mystical world. His
    actions set in motion a series of events that would unravel in Polperran, drawing
    Laura Marsh and her companions into a mystery that bridges the gap between the
    ordinary and the extraordinary.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc455.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Please tell me more about A Personal Vendetta: Eddie''s abilities might have
    directly affected someone''s personal life, leading to a vendetta against him.
    This could be the result of a private reading gone awry, where Eddie disclosed
    information that led to a divorce, a feud, or financial loss. The affected party,
    consumed by a desire for revenge, might have chosen the psychic fair in Polperran
    as the perfect setting for their retribution, using the poisoned knitting needles
    to ensure Eddie''s silence was permanent.'
  prefs: []
  type: TYPE_NORMAL
- en: Create a character profile explaining in detail why they were compelled to kill
    Eddie when he returned to Polperran.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc456.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Character Profile: Helena Barrett'
  prefs: []
  type: TYPE_NORMAL
- en: 'Full Name: Helena Margaret Barrett'
  prefs: []
  type: TYPE_NORMAL
- en: 'Physical Description: Helena is a woman in her late forties with an air of
    faded elegance about her. She has sharp, angular features, with deep-set hazel
    eyes that seem to carry a permanent shadow of grief and anger. Her hair is a rich
    auburn, usually pulled back in a tight bun, emphasizing her stern demeanor. Helena
    dresses in an understated, classic style, favoring dark colors that reflect her
    somber outlook on life.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Background: Helena was once a prominent figure in Polperran''s social circles,
    known for her charitable work and vibrant personality. Her life took a dark turn
    after a private consultation with Eddie Montague, who revealed secrets about her
    husband''s infidelity and dubious business practices.'
  prefs: []
  type: TYPE_NORMAL
- en: This revelation led to a bitter and public divorce, leaving Helena ostracized
    by many of her former friends who sided with her more financially influential
    husband.
  prefs: []
  type: TYPE_NORMAL
- en: The divorce was not just a social disaster for Helena; it resulted in significant
    financial hardship. She was forced to sell her home and move to a smaller, more
    modest house on the outskirts of Polperran. The loss of her social standing, coupled
    with the financial strain, transformed Helena from a lively socialite to a reclusive
    and bitter individual.
  prefs: []
  type: TYPE_NORMAL
- en: 'Current Crisis: When Helena learned that Eddie Montague was returning to Polperran
    to participate in a psychic fair, old wounds were reopened. She blamed Eddie not
    just for the downfall of her marriage but for the complete unraveling of the life
    she once cherished. Consumed by a desire for revenge and seeing an opportunity
    to reclaim some sense of control over her fate, Helena plotted to silence Eddie
    permanently.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Personality: Helena is intelligent, articulate, and deeply wounded. She harbors
    a potent mix of grief, bitterness, and anger. Once known for her warmth and generosity,
    her personality has been overshadowed by a desire for vengeance against those
    she holds responsible for her misfortunes. Despite her transformation, she retains
    a sharp wit and a keen sense of observation, skills she uses to meticulously plan
    her revenge.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Murder Connection: Viewing the psychic fair as the perfect venue for her retribution,
    Helena used her knowledge of Eddie''s schedule and habits to plan the murder.
    She chose poisoned knitting needles as the weapon, a nod to her own lost hobbies
    and interests that she gave up in the wake of her personal tragedies. The needles,
    coated with a rare and untraceable poison, were a symbolic choice meant to reflect
    the way Eddie''s revelations had pierced her life, leaving it in tatters.'
  prefs: []
  type: TYPE_NORMAL
- en: Helena's decision to kill Eddie was driven by a desperate need to erase the
    source of her pain and to exert some control over a life that she felt was stolen
    from her.
  prefs: []
  type: TYPE_NORMAL
- en: Her actions set off a chain of events that not only brings Laura Marsh and her
    team onto her path but also forces Helena to confront the deeper implications
    of her quest for vengeance and the possibility of redemption or further ruin.
  prefs: []
  type: TYPE_NORMAL
- en: Continue using this prompt to generate a list of possible suspects who would
    want to murder your first victim.
  prefs: []
  type: TYPE_NORMAL
- en: Do you need more suspects or want to be more creative? Reframe the prompt in
    a different way.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc457.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Can you give me a list of 5 suspects who could have killed Edward Montague?
    These should be the Obvious Killer, The Possible Killer linked to the victim,
    The Possible killer who lives in the community, the Outsider, and the Hidden Suspect
    who nobody would suspect who has a great alibi.
  prefs: []
  type: TYPE_NORMAL
- en: 'For each suspect: Provide the motive for the murder, the method, the secrets
    they have been keeping, their alibi at the time of the murder, the reason why
    they killed him now and how they had the opportunity to kill him.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc458.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Certainly! Here''s a list of five suspects:'
  prefs: []
  type: TYPE_NORMAL
- en: '1\. The Obvious Killer: Victor Holloway'
  prefs: []
  type: TYPE_NORMAL
- en: 'Motive: Victor desired the "Lunar Locket" that Eddie Montague had recently
    discovered. Believing it to hold significant occult power, Victor saw Eddie''s
    refusal to sell as a direct threat to his collection and reputation.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Method: Poisoned knitting needles, chosen for their symbolic significance to
    sever Eddie''s spiritual connection to the locket.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Secrets: Victor is deeply involved in the occult, a fact he keeps hidden under
    the guise of a respectable antiquities dealer.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Alibi: Victor was seen at a distant auction house at the time of the murder,
    providing him with a solid alibi.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Reason for Timing: Eddie planned to reveal the locket''s powers at the psychic
    fair, forcing Victor''s hand.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Opportunity: Victor used a trusted intermediary to deliver the poisoned needles
    to Eddie, knowing he would be at the studio.'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. The Possible Killer Linked to the Victim: Helena Barrett'
  prefs: []
  type: TYPE_NORMAL
- en: 'Motive: Helena sought revenge for the ruin of her life following Eddie''s revelations
    about her husband''s infidelity and criminal activities.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Method: Utilizing her newfound interest in herbalism to craft a rare, untraceable
    poison applied to knitting needles.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Secrets: Helena has been studying poisons and herbalism under the guise of
    starting a new hobby.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Alibi: At the time of the murder, Helena was hosting a small, well-documented
    book club meeting at her home.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Reason for Timing: Learning of Eddie''s return to Polperran, Helena saw a chance
    to exact her revenge before he could leave town again.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Opportunity: She mailed the poisoned knitting needles anonymously to the studio,
    knowing they would be used during the fair.'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. The Possible Killer Who Lives in the Community: Derek Sands'
  prefs: []
  type: TYPE_NORMAL
- en: 'Motive: Derek feared Eddie''s psychic abilities would expose his fraudulent
    psychic business, which heavily relies on deception and trickery.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Method: Derek, having access to various mystical and occult artifacts, could
    easily obtain and use poisoned knitting needles.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Secrets: His business is a front for more dubious activities, including the
    sale of stolen artifacts.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Alibi: Derek was performing a live psychic reading online, with viewers as
    his alibi.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Reason for Timing: Eddie had hinted at exposing Derek during the psychic fair.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Opportunity: Derek''s deep knowledge of the occult community allowed him to
    anonymously deliver the poisoned needles to the studio.'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. The Outsider: Simon Fairweather'
  prefs: []
  type: TYPE_NORMAL
- en: 'Motive: As the ambitious mayor, Simon feared Eddie''s psychic fair would overshadow
    his plans for a high-profile festival meant to attract tourism, potentially ruining
    his political career.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Method: Simon used his connections to quietly obtain the poisoned needles,
    knowing Eddie would be at the studio.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Secrets: Simon has been manipulating local events and people to further his
    own career, often unethically.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Alibi: Simon was at a televised town hall meeting, providing him with a public
    alibi.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Reason for Timing: Eddie''s fair coincided with Simon''s festival and eliminating
    him seemed a quick solution to ensure his event''s success.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Opportunity: Utilizing his mayoral resources, Simon had someone plant the needles
    at the studio before Eddie''s arrival.'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. The Hidden Suspect: Frances Wentworth'
  prefs: []
  type: TYPE_NORMAL
- en: 'Motive: Frances harbored resentment towards Eddie for discrediting her friend''s
    psychic abilities in the past, which led to her friend''s professional ruin.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Method: Being a telepathic quilter, Frances knew crafting and access to rare
    poisons through her connections in the crafting community.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Secrets: Frances''s telepathic abilities allow her to manipulate people without
    their knowledge, a secret she guards closely.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Alibi: Frances was at a quilting exhibition, surrounded by fellow quilters
    and fans, making her alibi seemingly unbreakable.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Reason for Timing: With Eddie''s return to Polperran, Frances saw an opportunity
    to avenge her friend under the guise of community activity.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Opportunity: Her involvement in the psychic fair and the craft studio gave
    her the perfect chance to plant the deadly needles without suspicion.'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, by framing the question differently, you can generate exciting
    options to add to your list of potential suspects.
  prefs: []
  type: TYPE_NORMAL
- en: To save space, I have only asked for five suspects, but you could easily ask
    for more and perhaps link them to the list of secondary characters you generated
    earlier, building connections to the local community as you do so.
  prefs: []
  type: TYPE_NORMAL
- en: Next Steps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Work through the options suggested and evaluate how they best fit into your
    vision for your story idea.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t hesitate to ask the AI to repeat the process with your unique slant or
    to change one or more characters until you have a list of potential suspects that
    are an excellent fit for this book.
  prefs: []
  type: TYPE_NORMAL
- en: Then, work on customizing and modifying these ideas to make them your own. Combine
    ideas, generate new ones, and brainstorm alternatives.
  prefs: []
  type: TYPE_NORMAL
- en: The goal is to create a list of suspects who all have compelling reasons for
    wanting to kill your murder victim but have great alibis and character profiles
    that will keep your readers guessing until the final reveal. And, of course, some
    will be red herrings designed to lead our sleuth in the wrong direction.
  prefs: []
  type: TYPE_NORMAL
- en: '![A blue circle with white text  Description automatically generated](image_rsrc452.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Which one of the Suspects killed Edward Montague?
  prefs: []
  type: TYPE_NORMAL
- en: You can only know the answer to that question by working through the in-depth
    motivation of at least five suspects, as above.
  prefs: []
  type: TYPE_NORMAL
- en: You can ask ChatGPT who the killer is, but it should be apparent from the response
    generated who the most likely killer is.
  prefs: []
  type: TYPE_NORMAL
- en: Worked Example.
  prefs: []
  type: TYPE_NORMAL
- en: Given the suspects and motives outlined previously, the suspect who killed Edward
    Montague is Helena Barrett.
  prefs: []
  type: TYPE_NORMAL
- en: Her motive for the murder stems from a deep-seated desire for revenge, driven
    by the ruin of her life following Eddie's psychic revelations about her husband's
    infidelity and criminal activities. Helena meticulously planned the murder, leveraging
    her knowledge of poisons to craft a rare, untraceable toxin applied to the knitting
    needles.
  prefs: []
  type: TYPE_NORMAL
- en: Now you must get to work and plan how the sleuth will discover the real killer
    for your plot!
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT and Subplots
  prefs: []
  type: TYPE_NORMAL
- en: Subplots, essentially mini-stories that run parallel to the main plot, add depth
    to your novel, enrich the main storyline, and further develop your characters.
  prefs: []
  type: TYPE_NORMAL
- en: They are particularly useful if you write a continuity series of books with
    the same sleuth and setting.
  prefs: []
  type: TYPE_NORMAL
- en: Building Layers of Conflict into Your Story.
  prefs: []
  type: TYPE_NORMAL
- en: In every cozy murder mystery, there are five main storylines you can use to
    generate conflict in every scene that will keep readers hooked and turn the page
    to find out what happens next.
  prefs: []
  type: TYPE_NORMAL
- en: The Main Murder Plot.
  prefs: []
  type: TYPE_NORMAL
- en: The Main A Plot. This is the murder investigation that is specific to this story.
    Each book in a series will have one or more murders that create a unique murder
    mystery plot.
  prefs: []
  type: TYPE_NORMAL
- en: In a murder mystery, the overall goal is to identify the killer and bring them
    to justice. This is the spine and desire line of the book, driving the action
    forward in every scene.
  prefs: []
  type: TYPE_NORMAL
- en: We know that the murder will be solved by the end of the book, but the goal
    is to create a clever puzzle and make the reader wonder how the sleuth will find
    the killer. What skills and techniques will the sleuth use?
  prefs: []
  type: TYPE_NORMAL
- en: What is the personal motivation that compels the sleuth to investigate this
    murder? The reader has to believe that someone the sleuth knows and cares about
    is in danger, and the stakes are high. There has to be a link to the “stakes character.”
  prefs: []
  type: TYPE_NORMAL
- en: Then, there are Four Continuity Subplots.
  prefs: []
  type: TYPE_NORMAL
- en: These subplots are all character-driven, which provides layers of emotional
    depth to your mystery.
  prefs: []
  type: TYPE_NORMAL
- en: In some cozy mysteries, one type may dominate, but if you intend to write a
    series of linked books with the same sleuth and story world, all four subplots
    should be built into your story planning.
  prefs: []
  type: TYPE_NORMAL
- en: Subplot One. The Secondary Character Plot
  prefs: []
  type: TYPE_NORMAL
- en: This is usually a character-based subplot about the victim, a close family member,
    a friend, a sidekick, or a romantic relationship that creates interest, conflict,
    and emotional depth for the sleuth.
  prefs: []
  type: TYPE_NORMAL
- en: The quirky sidekick, for example, can spark ideas for the sleuth. It could be
    a pet, ghost, senior relative, etc., who is a great fit for your niche.
  prefs: []
  type: TYPE_NORMAL
- en: They are often humorous and intriguing, and they have their backstory. Each
    secondary character can become the main character in another book in the series.
  prefs: []
  type: TYPE_NORMAL
- en: It is possible to have a multi-protagonist series where two or more investigators
    work together to solve crimes, which can work very well if there is one main character
    for the reader to connect with. Each of the investigators has their own backstory
    and subplot going on.
  prefs: []
  type: TYPE_NORMAL
- en: Subplot Two. The Community Conflict Plot
  prefs: []
  type: TYPE_NORMAL
- en: Can you think of one or more characters in the local community who conflict
    with the sleuth for some reason in that story world that could crop up in every
    book in the series?
  prefs: []
  type: TYPE_NORMAL
- en: This is your continuity subplot, which will run for the entire series of books
    you write in this story world.
  prefs: []
  type: TYPE_NORMAL
- en: For example, this could be a family member, local police chief, or a disapproving
    community member. In every book that generates conflict, they will come into contact
    with the sleuth somehow. You can then build a situation where this antagonistic
    character has to go to our sleuth for help.
  prefs: []
  type: TYPE_NORMAL
- en: Subplot Three. The Character Arc of the Sleuth
  prefs: []
  type: TYPE_NORMAL
- en: When you introduced your main sleuth in the first chapter of book one, they
    usually came on stage with a lot of emotional baggage and unfulfilled needs and
    wants. These are often linked to family, loss, and absent parents or spouses.
  prefs: []
  type: TYPE_NORMAL
- en: Throughout the series of books, you can work on this internal conflict and show
    how the sleuth grows and “arcs” from book one to the last book in the series.
  prefs: []
  type: TYPE_NORMAL
- en: This is often linked to a romance subplot, where each book in the series continues
    the “will they/won’t they” get-together story thread, automatically creating emotional
    tension. The sleuth and the romance interest will have limiting beliefs and internal
    conflicts that prevent them from being together.
  prefs: []
  type: TYPE_NORMAL
- en: The aim is to have your readers looking forward to the next book in the series
    so they can find out what happens next in this relationship.
  prefs: []
  type: TYPE_NORMAL
- en: Subplot Four. The Setting and Storyworld
  prefs: []
  type: TYPE_NORMAL
- en: As a reader, I feel as though I am returning to a series to revisit a familiar
    world. The challenge with mystery series is that new characters must be introduced
    into your small town or location to keep things fresh while still being grounded
    in the same location.
  prefs: []
  type: TYPE_NORMAL
- en: Tourists, business contacts, regional fairs, or some other public event or location
    are all ways for the sleuth to meet new characters, dead or alive.
  prefs: []
  type: TYPE_NORMAL
- en: This is one of the reasons why many cozy mystery sleuths are set in shops, libraries,
    wedding venues, or work situations where the investigator can come into contact
    with the general public. A secondary plot linked to your setting adds extra layers
    to the storyline.
  prefs: []
  type: TYPE_NORMAL
- en: Combining all Five Plotlines
  prefs: []
  type: TYPE_NORMAL
- en: The critical thing is to weave these four types of subplots into the main murder
    plot storyline, which is the spine of your book, in a way that feels organic and
    authentic.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, you probably think, hang on a moment, I have to handle five plotlines
    in a cozy mystery that might only be 50,000 words long.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, you do. But it’s okay.
  prefs: []
  type: TYPE_NORMAL
- en: The secret to building up to that powerful reversal at the end of Act Three
    and incorporating multiple storylines is to leverage the power of the story structure
    we have already been working on.
  prefs: []
  type: TYPE_NORMAL
- en: As long as the murder investigation remains the solid spine of each book in
    the series, you can weave in one of the other subplots, all set in the same storyworld
    and have the same main cast of characters.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT to generate Subplots.
  prefs: []
  type: TYPE_NORMAL
- en: 'Using ChatGPT to generate subplots can be a highly effective way to add richness
    to your novel. Here''s how:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Define the Role of Your Subplot
  prefs: []
  type: TYPE_NORMAL
- en: What kind of subplot do you want to add to your story? Secondary character,
    community, character arc, or storyworld? Should it complement the main plot, provide
    comic relief, or add tension?   A clear idea of the role will guide the AI in
    generating relevant subplot ideas.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Generate Subplot Ideas with ChatGPT
  prefs: []
  type: TYPE_NORMAL
- en: 'Here''s a Working Example for our Case Study: Let’s say we want to create a
    link between our sleuth, Laura Marsh, and one of the antagonistic continuity characters
    in Polperran, Derek Sands.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc459.jpg)'
  prefs: []
  type: TYPE_IMG
- en: In my cozy mystery plot, Derek Sands is the charismatic and slightly unscrupulous
    owner of the "Mystic Emporium," a shop that specializes in New Age and occult
    paraphernalia. Derek's connections to the psychic and antique dealing community
    make him both a suspect and a source of information.
  prefs: []
  type: TYPE_NORMAL
- en: Can you generate a subplot to flesh out this idea and create motivation to find
    out how Derek is linked to the murder victim, Edward Montague, and why he is in
    conflict with Laura and her aunt Sera for the entire series.
  prefs: []
  type: TYPE_NORMAL
- en: Create a five-book plot arc for Derek Sands, culminating in a plot idea in book
    five where Derek has to come to Laura to help him. Give specific details of the
    plot for each of the five books plus a plot series arc for the entire series.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc45A.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Derek Sands Series Arc Overview
  prefs: []
  type: TYPE_NORMAL
- en: Derek Sands, proprietor of Mystic Emporium, navigates the murky waters between
    ally and adversary within the small coastal town of Polperran. Known for his charm
    and dubious business practices, Derek's life becomes entwined with Laura Marsh,
    her aunt Sera, and their investigations into the supernatural and the criminal.
    Over a five-book series, Derek's complex relationship with the psychic and antique
    community, along with his conflicts and eventual cooperation with Laura and Sera,
    unfolds against a backdrop of mystery, murder, and mystic artifacts.
  prefs: []
  type: TYPE_NORMAL
- en: 'Book 1: "Shadows Over Polperran"'
  prefs: []
  type: TYPE_NORMAL
- en: 'Plot: When Edward Montague is murdered, Derek Sands emerges as a suspect due
    to his rivalry with the victim over a valuable occult artifact. Laura and Sera’s
    investigation leads them to Mystic Emporium, unveiling Derek''s shady dealings.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Conflict with Laura and Sera: Derek''s initial refusal to cooperate with their
    inquiries, coupled with his attempts to mislead them, sets the stage for their
    antagonistic relationship.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Series Arc Setup: Despite their suspicions, Laura and Sera uncover evidence
    pointing away from Derek, suggesting a deeper conspiracy within Polperran''s occult
    community.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Book 2: "The Curse of the Lunar Locket"'
  prefs: []
  type: TYPE_NORMAL
- en: 'Plot: A cursed artifact surfaces in Polperran, leading to a series of misfortunes.
    Derek, knowledgeable about the locket''s history, reluctantly becomes involved
    in Laura and Sera''s quest to neutralize its curse.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Conflict: Derek''s past connection to the locket and its previous owner complicates
    the investigation, as he struggles with revealing the full extent of his knowledge.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Series Arc Development: Through their reluctant collaboration, Derek starts
    to respect Laura and Sera''s determination, hinting at a possible alliance against
    a common enemy.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Book 3: "Echoes of the Ancient Druids"'
  prefs: []
  type: TYPE_NORMAL
- en: 'Plot: An ancient druidic artifact is discovered, threatening to unleash forgotten
    powers. Derek''s expertise becomes crucial to understanding the artifact''s significance
    and stopping the impending disaster.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Conflict: Derek''s secretive nature and his fear of the artifact''s power put
    him at odds with Laura and Sera, who advocate for transparency and caution.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Series Arc Growth: The trio''s successful thwarting of the crisis serves as
    a turning point, with Derek beginning to value the strengths Laura and Sera bring
    to their uneasy alliance.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Book 4: "The Phantom of Polperran"'
  prefs: []
  type: TYPE_NORMAL
- en: 'Plot: A spectral figure begins haunting Polperran, linked to an artifact sold
    by Derek. His refusal to reveal the buyer puts him back in conflict with Laura
    and Sera, as they seek to solve the mystery and calm the town''s fears.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Conflict: Derek''s pride and stubbornness lead him to initially handle the
    situation alone, worsening the haunting.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Series Arc Evolution: Derek''s eventual capitulation and request for help demonstrate
    his growing trust in Laura and Sera, cementing their status as allies.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Book 5: "The Mystic Emporium’s Secret"'
  prefs: []
  type: TYPE_NORMAL
- en: 'Plot: Derek discovers a hidden room in the Mystic Emporium, containing a powerful
    artifact that endangers him and the town. Faced with a threat beyond his control,
    Derek turns to Laura and Sera for help, revealing the depth of his transformation.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Conflict: The revelation of the Mystic Emporium''s secret tests Derek''s newfound
    alliance with Laura and Sera, as they navigate the dangers of the artifact.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Series Arc Conclusion: Their combined efforts to secure the artifact and protect
    Polperran highlight the strength of their bond. Derek, once a suspect and adversary,
    has become a true ally, showcasing the series'' theme of redemption and the power
    of collaboration.'
  prefs: []
  type: TYPE_NORMAL
- en: Series Arc Conclusion
  prefs: []
  type: TYPE_NORMAL
- en: Over the course of the series, Derek Sands transitions from a suspect hiding
    in the shadows of his Mystic Emporium to a key ally in the battle against supernatural
    threats.
  prefs: []
  type: TYPE_NORMAL
- en: His character arc of redemption and the deepening trust between him, Laura,
    and Sera enrich the overarching narrative of community, the blurred lines between
    good and evil, and the redemptive power of facing one's past.
  prefs: []
  type: TYPE_NORMAL
- en: The series concludes with the trio firmly united, ready to face whatever mysteries
    Polperran might hold next.
  prefs: []
  type: TYPE_NORMAL
- en: Some interesting ideas here, linked to the murder investigation in this book
    and the other four books in the series.
  prefs: []
  type: TYPE_NORMAL
- en: What if? Derek was the one who sold the antique knitting needles used as the
    murder weapon to an online bidder. He never met the buyer but is caught up in
    the investigation.
  prefs: []
  type: TYPE_NORMAL
- en: What if? Derek had no idea that there is a group of guardians keeping these
    artefacts safe and he accidentally exposed them and their mission.
  prefs: []
  type: TYPE_NORMAL
- en: I hope that you can see how ChatGPT can help you explore multiple story ideas
    very quickly and use them to build subplots based on the characters.
  prefs: []
  type: TYPE_NORMAL
- en: Using subplots like these adds additional layers to the main external and internal
    conflicts and helps to demonstrate the character arcs of the two main characters
    – the sleuth and the murderer.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Expand and Refine the Subplot Ideas
  prefs: []
  type: TYPE_NORMAL
- en: Copy the subplot or subplots generated by ChatGPT into a new text document.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Print out the text.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Step away from the computer.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Start working through each subplot, developing your ideas for the secondary
    characters and the impact on the main characters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have fun! If you don’t like one idea, change the prompt and ask ChatGPT for
    fresh suggestions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once you've chosen a subplot, ask ChatGPT to expand on it. This will help you
    understand the trajectory of the subplot and how it can integrate with your main
    plot.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Weave the Continuity Subplots into Your Main Plot
  prefs: []
  type: TYPE_NORMAL
- en: Ask ChatGPT for ideas on integrating the subplots into your main plot. This
    will ensure the subplots enhance your overall story and do not feel disconnected.
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT can be a valuable tool for brainstorming, developing, and integrating
    subplots into your novel, adding an extra layer of depth and complexity.
  prefs: []
  type: TYPE_NORMAL
- en: 'PART NINE: STORY STRUCTURE'
  prefs: []
  type: TYPE_NORMAL
- en: How to Use Murder Mystery Story Structure
  prefs: []
  type: TYPE_NORMAL
- en: How Are Stories Structured, And How Can You Build The Optimal Structure For
    Your Story?
  prefs: []
  type: TYPE_NORMAL
- en: In this part of the book, I will share some of the deep story structure craft
    I have learned as a full-time writer. More importantly, I will explain how you
    can use that structure to take your story from good to great.
  prefs: []
  type: TYPE_NORMAL
- en: The Power of Story Structure
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The process is the same whether you use story structure to create an outline
    for your mystery as part of your pre-writing process or come to it after making
    your first draft.
  prefs: []
  type: TYPE_NORMAL
- en: You are breaking your story into a pattern that readers of this genre will recognize.
  prefs: []
  type: TYPE_NORMAL
- en: What do I mean by that? Modern readers expect to be entertained.
  prefs: []
  type: TYPE_NORMAL
- en: In a cozy mystery, the author promises the reader that the sleuth will solve
    a crime by the end of the book.
  prefs: []
  type: TYPE_NORMAL
- en: In the process, you will take your readers on an emotional roller coaster of
    a journey with the sleuth – and the stages of that journey are very specific to
    cozy mystery fiction.
  prefs: []
  type: TYPE_NORMAL
- en: So, What Are These Story Structure Patterns?
  prefs: []
  type: TYPE_NORMAL
- en: My goal is to give you a solid framework for any cozy mystery you can adapt,
    use, take which parts make sense, and then apply it to your outline or draft.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine that you are building a house.
  prefs: []
  type: TYPE_NORMAL
- en: You start at the bottom with the foundations, the groundwork, the floor layout,
    and the underpinnings of the structure. Then, the building work begins for an
    office block, residential home, or retail store – whatever your plan dictates.
  prefs: []
  type: TYPE_NORMAL
- en: Story structure is the equivalent foundations that underpin all of your work.
  prefs: []
  type: TYPE_NORMAL
- en: On top of those foundations, you can build any fresh and new story you like,
    of any length and genre. The foundations of the story stay the same.
  prefs: []
  type: TYPE_NORMAL
- en: The story you build on those foundations is your creative genius - but you need
    that solid structural framework to support the weight of your story.
  prefs: []
  type: TYPE_NORMAL
- en: Does that make sense? I hope so.
  prefs: []
  type: TYPE_NORMAL
- en: Screenwriting Techniques and Fiction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The good news is that the same story structure techniques screenwriters use
    can be applied to fiction. And especially commercial genre fiction.
  prefs: []
  type: TYPE_NORMAL
- en: The best model for commercial genre fiction is the Four-Act story structure.
  prefs: []
  type: TYPE_NORMAL
- en: Why? Because the goal of a screenwriter is precisely the same as that of a novelist—to
    create a compelling emotional journey for the audience/readers, and there can
    be no better journey than the up-and-down rollercoaster ride of crime fiction.
  prefs: []
  type: TYPE_NORMAL
- en: Murder Mystery Story Structure
  prefs: []
  type: TYPE_NORMAL
- en: For me, the mystery story structure is made up of two layers.
  prefs: []
  type: TYPE_NORMAL
- en: '#1\. A classical Four Act story plan that provides the backbone to all fiction,
    irrespective of genre.'
  prefs: []
  type: TYPE_NORMAL
- en: '#2\. A top layer of compulsory scenes and plot events that are essential to
    every cozy murder mystery.'
  prefs: []
  type: TYPE_NORMAL
- en: Like any other fiction genre, cozy mysteries have obligatory scenes and a recognizable
    story structure. Readers expect to see a traditional pattern of events, clues
    and reveals, setbacks and dead ends, leading to a climax final confrontation between
    the sleuth and the real killer.
  prefs: []
  type: TYPE_NORMAL
- en: These chapters are added to the Four-Act framework like muscle and sinew on
    a skeleton, building up a murder mystery story with power, authenticity, and originality.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why every cozy murder mystery may have the same basic underlying structure,
    but the outcome is unique and different – because the content of your obligatory
    scenes is your own.
  prefs: []
  type: TYPE_NORMAL
- en: Classical Four-Act Story Structure
  prefs: []
  type: TYPE_NORMAL
- en: In a properly structured movie or novel, the story consists of Four Acts, defined
    by nine key plot points. This means that your first draft of the novel needs to
    have a number of key dramatic twists, sudden obstacles, or reveals, called “turning
    points.” When the story shifts in some remarkable way or something is revealed,
    action must be taken, and the stakes increase. Here is a conflict plan for these
    twists.
  prefs: []
  type: TYPE_NORMAL
- en: '![Chart, line chart  Description automatically generated](image_rsrc45B.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Scenes, Sequences, and Four Acts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In classical story structure, scenes are collected into Sequences of scenes
    with a start, middle, and end for each Sequence.
  prefs: []
  type: TYPE_NORMAL
- en: Every scene ends with a turning point that hooks the next scene.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Every Sequence ends with a more significant turning point that hooks onto the
    next Scene Sequence.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sequences of scenes are then collected together to form Acts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Every Act ends with a significant turning point that hooks onto the first scene
    of the following Sequence of the next Act.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![A diagram of a sequence  Description automatically generated](image_rsrc45C.jpg)'
  prefs: []
  type: TYPE_IMG
- en: In this way, the story moves on and builds, and instead of a sagging middle,
    the emotional and story tension builds at a controlled pace that will have the
    readers turning the page to find out what happens next.
  prefs: []
  type: TYPE_NORMAL
- en: In this way, the story moves on and builds, and each scene, Sequence of scenes,
    and Act pivots into the next unit of action, and there are no sagging middles.
  prefs: []
  type: TYPE_NORMAL
- en: What’s more, the twist at the end of every scene, scene Sequence, and then Act
    ensures that the tension and conflict are always building, keeping the story moving
    and the reader totally hooked on your story. You are totally in control over how
    you create a page-turning read!
  prefs: []
  type: TYPE_NORMAL
- en: Sequences and Chapters
  prefs: []
  type: TYPE_NORMAL
- en: A Sequence is a collection of scenes divided into chapters. Each sequence builds
    into an Act in the 4-act Structure. For most genre fiction novels, there could
    be two or three scenes in a Sequence, and each chapter is a Sequence.
  prefs: []
  type: TYPE_NORMAL
- en: A chapter in genre fiction can contain one scene or several scenes, depending
    on their length and the target word count of the complete book. Clearly, the number
    of scenes in each chapter will depend on the length of your work.
  prefs: []
  type: TYPE_NORMAL
- en: How to Use Story Structure
  prefs: []
  type: TYPE_NORMAL
- en: STEP ONE
  prefs: []
  type: TYPE_NORMAL
- en: I start by breaking the storyline down into four Acts. Each of the four Acts
    has six Sequences of scenes collected together into chapters, so I start with
    an outline of 24 chapters.
  prefs: []
  type: TYPE_NORMAL
- en: It is easier to call this a 24-chapter Plot Outline as opposed to a 24-Sequence
    Plot Outline.
  prefs: []
  type: TYPE_NORMAL
- en: You may not need 24 chapters, or you might need to add more steps, but it is
    somewhere to start.
  prefs: []
  type: TYPE_NORMAL
- en: For very fast-paced mystery novels, each chapter may only contain one long scene.
    It is entirely up to you!
  prefs: []
  type: TYPE_NORMAL
- en: I see this plot outline as signposts that take the reader from the start to
    the end of the murder mystery journey.
  prefs: []
  type: TYPE_NORMAL
- en: Important. My personal story structure map is not a formula or join-the-dots
    writing but rather a story pattern that I think cozy mystery readers (like me)
    will recognize and enjoy.
  prefs: []
  type: TYPE_NORMAL
- en: This works for me, but it may not fit your project or writing process well.
    Go with whatever works for you!
  prefs: []
  type: TYPE_NORMAL
- en: One thing is certain. The plot is built up by the actions that the characters
    take under pressure.
  prefs: []
  type: TYPE_NORMAL
- en: '#Character is revealed by their actions, reactions, and extraordinary decisions
    in response to challenges introduced by the murder and subsequent investigation.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram  Description automatically generated](image_rsrc45D.jpg)'
  prefs: []
  type: TYPE_IMG
- en: '#In turn, the plot is driven by those reactions and decisions in a series of
    Scenes and Sequels to those scenes where the decision taken at the end of one
    scene triggers the response to that action in the opening of the next scene.'
  prefs: []
  type: TYPE_NORMAL
- en: Start by building a solid sense of who your main characters are. Then, add a
    dilemma, challenge, or conflict. Their responses, actions, and decisions will
    automatically generate your plot. Then, you can start shaping those reactions
    into the best form possible for this story.
  prefs: []
  type: TYPE_NORMAL
- en: Build a Full Synopsis
  prefs: []
  type: TYPE_NORMAL
- en: At this point, you have completed a lot of pre-writing. Now it’s time to consolidate
    your story pitch and all your notes, draft text, and snatches of ideas into one
    place.
  prefs: []
  type: TYPE_NORMAL
- en: I have found that the best way to do this is to create an extended synopsis
    of a story that includes all of the elements that I have been working on, including
    the character profiles, subplots, and settings.
  prefs: []
  type: TYPE_NORMAL
- en: Once you have your full synopsis on paper, it is much easier to review the options
    you have developed at this point critically.
  prefs: []
  type: TYPE_NORMAL
- en: Note. Some discovery writers may prefer to go straight into working on the manuscript
    and combine all the pre-writing into the page's text. And that’s brilliant if
    it works for you.
  prefs: []
  type: TYPE_NORMAL
- en: Will the story change once you start writing? Of course. And that is how it
    should be. But at this stage, the better the synopsis and plot outline, the better
    the story.
  prefs: []
  type: TYPE_NORMAL
- en: You can start writing and be confident that you have a plot that is flexible
    enough to adapt to new ideas and characters but strong enough to carry the type
    of cozy mystery that you want to write.
  prefs: []
  type: TYPE_NORMAL
- en: The 24-Chapter Cozy Mystery Template
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, I want to introduce you to my favorite outlining method for
    writing commercial cozy mystery fiction: The 24-chapter Cozy Mystery Plot Template.'
  prefs: []
  type: TYPE_NORMAL
- en: This outline works well for the first draft of a cozy mystery novel of 50,000
    to 70,000 words, with about 2,000 to 3,000+ words per chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you can have as many or as few chapter breaks as you wish. This can
    vary with your sub-genre, and you may want shorter, faster-paced chapters, for
    example. It's no problem. The plotline and combined character arcs are the same.
  prefs: []
  type: TYPE_NORMAL
- en: It can easily be adapted for cozy mystery novellas by using the novel outline
    as fundamental story plot points to be included in any novel, but over a smaller
    word count.
  prefs: []
  type: TYPE_NORMAL
- en: Whether you start with an outline or allow it to emerge during the writing,
    the final novel, novella, or short story should meet and exceed the reader's expectations
    and stay true to your vision as a writer.
  prefs: []
  type: TYPE_NORMAL
- en: The best way to do this is to create a working initial outline of the plot before
    you start fleshing out chapters, dialogue, settings, and descriptions. No more
    “sagging middle” scenes where the emotional tension flags.
  prefs: []
  type: TYPE_NORMAL
- en: The good news is that this outlining method is a great way to brainstorm story
    ideas fast, and it works as a starting point for any cozy mystery fiction of any
    length.
  prefs: []
  type: TYPE_NORMAL
- en: Do you have to stick to the plot rigidly once the writing takes over? Not at
    all.
  prefs: []
  type: TYPE_NORMAL
- en: The whole purpose of outlining is to create an overall starting structure for
    your plot that you can use to entice you into this story world and meet the people
    who live there.
  prefs: []
  type: TYPE_NORMAL
- en: If you have an even stronger idea when your characters take over, that’s excellent!
    Go for it.
  prefs: []
  type: TYPE_NORMAL
- en: That’s how it should be. Your outline should always be a working tool. Not a
    fixed and inflexible constraint.
  prefs: []
  type: TYPE_NORMAL
- en: The 24-chapter outline builds on the 4-act Story Structure and helps to flesh
    out each step so that you can start writing a first draft that you know will build
    into an engaging, cozy mystery for your readers – and be fun to write.
  prefs: []
  type: TYPE_NORMAL
- en: Since this is the first draft of the outline for your cozy mystery, you should
    not worry about making each word perfect. On the contrary, at this point, you
    may be working with bullet points and fragments of dialogue or story ideas.
  prefs: []
  type: TYPE_NORMAL
- en: And that is fine. Your story. Your process.
  prefs: []
  type: TYPE_NORMAL
- en: Breaking the book into Acts and then chapters can help you avoid feeling overwhelmed
    by its size and the amount of work ahead.
  prefs: []
  type: TYPE_NORMAL
- en: A first draft of 72,000 words with 24 chapters is about 3,000 words a chapter.
    This could be one long chapter or two shorter chapters. Whatever works for you.
  prefs: []
  type: TYPE_NORMAL
- en: Because you have a plot outline for the entire story, you know what each chapter
    has to achieve – although you can change the outline at any time.
  prefs: []
  type: TYPE_NORMAL
- en: This is getting the story down and the characters onto the page, acting and
    reacting, and revealing more about themselves.
  prefs: []
  type: TYPE_NORMAL
- en: Using ChatGPT with Plot Outline Templates
  prefs: []
  type: TYPE_NORMAL
- en: This is when we take the working full synopsis we have created for our cozy
    mystery and flesh it out into a high-level plot outline for the entire novel.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT is familiar at a basic level with several different outlining templates,
    including:'
  prefs: []
  type: TYPE_NORMAL
- en: 4-Act Story Structure
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Save the Cat
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Hero’s Journey.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The choice of story plot template will depend on your niche.
  prefs: []
  type: TYPE_NORMAL
- en: For example, the Hero’s Journey template would be a good choice if you are writing
    a traditional or paranormal mystery. However, I recommend testing your outline
    against the 24-chapter plot outline to ensure that your cozy mystery will deliver
    the type of modern murder mystery plot readers expect.
  prefs: []
  type: TYPE_NORMAL
- en: General Plot Outline Prompt
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Prompt: Using the following synopsis, create a detailed summary of the story,
    fleshing out all additional details and breaking it into parts using the [Outline
    Template of Choice]: [text of the entire story synopsis]'
  prefs: []
  type: TYPE_NORMAL
- en: For the best results, we will train ChatGPT to use this 24-chapter cozy mystery
    plot template to create the plot outline for our cozy mystery novel.
  prefs: []
  type: TYPE_NORMAL
- en: 'ChatGPT does not know about this template and has not been trained on it, so
    this process needs two separate prompts:'
  prefs: []
  type: TYPE_NORMAL
- en: '#1\. Ask ChatGPT to learn and remember the 24-chapter Cozy Murder Mystery Plot
    Template.'
  prefs: []
  type: TYPE_NORMAL
- en: '#2\. Ask ChatGPT to apply the 24-chapter Cozy Murder Mystery Plot Template
    to our story synopsis to generate a chapter-by-chapter outline.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: For this demonstration, I am using ChatGPT-4.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc45E.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The following is a 24-chapter cozy mystery outline template that we will use
    today. Please process this. You can say it any number of ways and hold it in your
    memory for later use. Say, "Read," if you understand.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc45F.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Read.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc45G.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'ACT ONE: Setting up the Sleuth in their Ordinary World'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 1\. Introduce the sleuth in their ordinary world: hook the reader in
    the first paragraph by hinting at a turning point or crisis in the life of the
    sleuth main character. Quickly establish the setting, period, tone, style, and
    point of view of the story.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 2\. The sleuth faces challenges in the ordinary world and takes action:
    show how the sleuth is making decisions in the face of new challenges, forcing
    them to move to a different world or way of thinking.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 3\. The Inciting Incident: this is a  significant event that completely
    disrupts the life of the sleuth. In a cozy murder mystery it is most likely to
    be the discovery of the first murder victim.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 4\. Reaction to the Inciting Incident: establish what is at stake and
    make this crime personal to the sleuth.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 5\. Refusal of the call to action: show how the sleuth debates what
    to do with her sidekicks or family. Can they return to their ordinary world? Introduce
    a mentor or sidekick or friend for the sleuth. The mentor character encourages
    the sleuth and reassures them that they can cope and be strong.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 6\. The Sleuth commits to solving the murder: make the stakes real
    for the sleuth – what does she stand to lose if she does not find the killer?
    The sleuth must be strongly motivated and have personal stakes in the investigation.
    Make her DRIVE the action, not just respond to it. There is no going back now.'
  prefs: []
  type: TYPE_NORMAL
- en: 'ACT TWO: The Sleuth begins the Investigation'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 7\. Assembling the Team: introduce the sleuth to her new allies and
    sidekicks. Each of them has their own specific quirks and interests. Can also
    introduce a potential love interest and antagonists.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 8\. The investigation begins with the obvious suspects: introduce the
    key suspects who were closest to the victim and had established motives for killing
    them. Reveal how the sleuth questions them and starts to compile a picture of
    what really happened with the murder.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 9\. Balancing sub-plot: focus on a romance or secondary plot, linked
    to the main plot in some way. Show how this acts to add humor and a shift in tone
    to balance out the murder investigation. At the end of this chapter, reveal a
    ramp up in conflict where the killer shows the sleuth that they are very much
    still in charge.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 10\. Motives and secrets are revealed: The motives of more potential
    suspects are revealed. The suspects are as clever and devious as the sleuth and
    recognize that this sleuth is a threat.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 11.  Reaction to this new information: show how the sleuth often has
    a sidekick who has their own way of discovering buried details. Additional problems
    and information emerge that have to be dealt with.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 12\. Midpoint of No Return: introduce another murder or serious attack
    or other event.  This is a major new development, huge revelation, and a serious
    new threat from the killer and his or her accomplices if they have them. This
    drives the next section of the book and provides new clues. This event could be
    the disappearance of one or more suspects or some major new information. The sleuth
    has to fight back and is even more determined to find the killer.'
  prefs: []
  type: TYPE_NORMAL
- en: 'ACT THREE: Increased Danger and Pressure on the Sleuth'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 13\. Reaction to the Midpoint Event: reveal how this major event sends
    the sleuth off in a new direction. The sleuth was on the wrong track. They need
    to change the focus of the investigation after what has happened.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 14\. The Killer is Blocking the Investigation: Show how the sleuth
    and allies have to regroup and come up with a new plan in response to this new
    attack or new death.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 15\. Alibis and Clues: sees the sleuth following up on alibis and gathering
    information on the second event or murder where a trail of evidence leads to one
    or more suspects.  Suspects refute evidence pointing to them from the first murder.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 16\. Motives and Secrets: reveal hidden motives and secrets for the
    key suspects. This could be linked to previous clues and revelations. Secret relationships
    come to light, such as business arrangements, romantic involvement, scores to
    be settled or previously unknown connections between characters.'
  prefs: []
  type: TYPE_NORMAL
- en: SECTION BREAK. Pinch point marks a significant increase in danger to the sleuth
    and allies. Show that there is a ramp up in conflict where the real killer or
    their helpers shows the sleuth that they are very much still in charge.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 17\. More Complications: sees the sleuth blocked in their investigations:
    show how the sleuth has to reassess what they know so far with the sidekicks so
    that all the options are explored. Reveal how the suspects are being narrowed
    down and the sleuth discovers more about the real killer and their motivation.
    Show how the real chain of events starts to emerge, and more secrets are revealed.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 18\. Apparent Defeat: everything fails and blows up in their faces:
    sees the sleuth questioning whether they will ever be able to find the killer.
    Show how someone betrays the sleuth, the suspects have been framed, or the killer
    is threatening to hurt people the sleuth cares about. The solution to the crime
    appears to be impossible. The killer uses clever misdirection to put them on the
    wrong track. Misinterpretation of clues or mistaken conclusions have led the sleuth
    in the wrong direction.'
  prefs: []
  type: TYPE_NORMAL
- en: 'ACT FOUR: Confrontation and Resolution'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 19\. Regroup: show how the sleuth has to step back and regroup with
    their sidekicks and allies after their apparent defeat. These mentors and allies
    convince the sleuth not to give up.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 20\. Secrets and New Directions: reveal how the sleuth discovers a
    secret about one or more suspects, which sets them on a new path to the real killer.
    They have been going about this totally wrong. Show how this is often in the form
    of a history lesson linking the murder to the potential suspects. All the secrets
    are revealed. The killer’s motivation has to be powerful. This can be linked to
    the sub-plot.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 21\. The sleuth is back on track: sees the sleuth collecting together  the  final
    puzzle pieces based on the evidence. Most of the clues and revelations have been
    picked up already during the investigation. Now they make sense. Reveal how the
    sleuth finds the strength to unlock the killer’s secrets in a sudden twist and
    the killer is finally revealed.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 22\. A New Action plan: reveal how  the sleuth has a revelation about
    a clue and suspect and realizes that she been going about things in the wrong
    way. She needs a new action plan and has to work quickly. The friends, family
    and allies come together to create a plan. They agree to go forwards, even if
    there is only a small chance of success.'
  prefs: []
  type: TYPE_NORMAL
- en: 'SECTION BREAK. Direct confrontation with the killer: sees the sleuth engaged
    in a one-on-one confrontation with the killer where the sleuth demonstrates their
    determination to get to the truth and find justice for the murder victim. Make
    the pacing of this scene quick, but you should not cheat the reader out of emotional
    reactions, either during the scene or afterwards. Don’t rush the fight scene.
    Reveal every heartbeat, every pulse pounding moment of fear.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 23\. The Grand Finale: show how the killer tries to escape, but the
    sleuth and their sidekicks and allies work together to defeat them.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 24\. Resolution of the main plot and sub-plots: show that  after the
    killer has been found, the sleuth had a quiet moment with friends, sidekicks,
    love interests and family as they review events. Use this chapter to show the
    full character growth of the sleuth. The sleuth demonstrates the character growth
    and character arc which occurs because she steps outside her comfort zone to investigate
    this death. Show the sleuth back in the old world as a different person.  The
    mystery has to be completely solved – but maybe add a hint or a hook for the next
    story in the series.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc45H.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Understood, I have processed the 24-chapter cozy mystery outline template and
    will retain this information for later use.
  prefs: []
  type: TYPE_NORMAL
- en: '#2\. Ask ChatGPT to apply the 24-Chapter Cozy Mystery Plot Template to our
    story synopsis to generate a chapter-by-chapter outline.'
  prefs: []
  type: TYPE_NORMAL
- en: Great! Now that ChatGPT has learned the plot outline template, we can use it
    to create a 24-chapter outline for our contemporary cozy mystery using the synopsis
    you have generated.
  prefs: []
  type: TYPE_NORMAL
- en: General Plot Outline Prompt
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt: Using the following synopsis, create a summary of the story, fleshing
    out all additional details, and breaking it into parts using the 24-chapter cozy
    mystery outline template: [paste the text of the entire story synopsis].'
  prefs: []
  type: TYPE_NORMAL
- en: ChatGPT and the Story Synopsis
  prefs: []
  type: TYPE_NORMAL
- en: We have worked through the critical components of our cozy mystery plot and
    are ready to combine them into one synopsis.
  prefs: []
  type: TYPE_NORMAL
- en: Use the pitch you developed for the overall story idea during the plotting process.
    Then add in the characters of the sleuth or sleuths and any secondary characters
    and subplots that are key to the plot.
  prefs: []
  type: TYPE_NORMAL
- en: Combine them into one large prompt and ask ChatGPT to write the synopsis for
    you, using the persona role of an expert cozy mystery novelist.
  prefs: []
  type: TYPE_NORMAL
- en: Using the case study example for our contemporary psychic cozy mystery story,
    let’s ask ChatGPT to create a combined full Synopsis of this story.
  prefs: []
  type: TYPE_NORMAL
- en: The following prompt used the case study pitch and characters as a working example.
    You should customize and extend the prompt to include any elements that you feel
    would support your story's synopsis.
  prefs: []
  type: TYPE_NORMAL
- en: It is a long prompt because of all the information needed to support the story.
    By being specific in this synopsis, you give the AI the information it needs to
    create a more accurate response.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc45J.jpg)'
  prefs: []
  type: TYPE_IMG
- en: You are an expert and advanced cozy murder mystery fiction author who has published
    over 50 bestselling novels and has 30 years of experience. You write commercial
    and very successful cozy murder mystery fiction that readers love and auto-buy
    every book in your series. Your cozy mystery stories are known for escapist settings,
    twisty cozy mystery plots, and your cast of fun and witty characters that readers
    love. You have a deep knowledge of cozy murder mystery tropes and reader expectations
    that inform your writing.
  prefs: []
  type: TYPE_NORMAL
- en: 'Given the following premise and story information, give me a highly detailed
    synopsis for my paranormal cozy murder mystery story in the traditional four act
    structure. Each act should be clearly labelled and should build toward the ending
    I''ve described:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Premise: [ paste your story idea here, and include details of the sleuth and
    the main characters such as sidekicks]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Suspects: [ paste your list of five suspects here]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Setting: [ describe your setting here]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Subplot: [ paste your main subplot here for book one of the series]'
  prefs: []
  type: TYPE_NORMAL
- en: I want to use the classical four act and 24-chapter story structural model to
    create a fun and witty bestselling mystery that will appeal to cozy murder mystery
    readers. The plot outline should contain several creative plot points and escalating
    conflict, with a strong hook to get the reader interested.
  prefs: []
  type: TYPE_NORMAL
- en: I used this prompt to generate the synopsis for the worked example mystery.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc45K.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Paranormal Cozy Murder Mystery: "Secrets of Polperran"'
  prefs: []
  type: TYPE_NORMAL
- en: 'Act 1: The Disruption'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 1: Arrival in Polperran'
  prefs: []
  type: TYPE_NORMAL
- en: Laura Marsh arrives in the picturesque town of Polperran for a holiday, looking
    forward to a break from her hectic life as a chef. She's greeted by her eccentric
    Aunt Sera and introduced to the quaint, close-knit community.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 2: A Psychic Fair'
  prefs: []
  type: TYPE_NORMAL
- en: Laura and Aunt Sera visit the local psychic fair, where Laura learns about her
    aunt's secret life as a paranormal investigator along with her friends, Frances
    Wentworth, and Jasper Finchley.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 3: Murder at the Yarn Studio'
  prefs: []
  type: TYPE_NORMAL
- en: The fair ends in tragedy when famous psychic Edward Montague is found murdered
    at Sera’s yarn studio, stabbed with poisoned knitting needles. Laura, upon touching
    the body, inadvertently receives Edward's psychic abilities.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 4: The Passing of Powers'
  prefs: []
  type: TYPE_NORMAL
- en: Confused and overwhelmed by her sudden abilities, Laura struggles to come to
    terms with what has happened. Sera explains the significance of the psychic transfer
    and how it ties into their investigations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 5: Suspects and Secrets'
  prefs: []
  type: TYPE_NORMAL
- en: 'The investigation begins. Laura, Sera, Frances, and Jasper start sifting through
    the suspects: Victor Holloway, Helena Barrett, Derek Sands, Simon Fairweather,
    and even Frances Wentworth herself.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 6: The First Clue'
  prefs: []
  type: TYPE_NORMAL
- en: Laura’s new psychic abilities lead to the discovery of a crucial clue linked
    to the antique knitting needles, pointing towards Victor Holloway's involvement
    but also hinting at a deeper conspiracy within Polperran.
  prefs: []
  type: TYPE_NORMAL
- en: 'Act 2: The Response'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 7: Digging Deeper'
  prefs: []
  type: TYPE_NORMAL
- en: The team delves into the backgrounds of each suspect, uncovering hidden motives
    and secrets. Laura's abilities grow, allowing her to sense echoes of the past
    connected to the murder weapon.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 8: A Community Divided'
  prefs: []
  type: TYPE_NORMAL
- en: The murder stirs unrest in Polperran, with the town's residents taking sides.
    Laura and Sera face backlash from those who suspect Sera's involvement in the
    murder.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 9: The Mystic Emporium'
  prefs: []
  type: TYPE_NORMAL
- en: Investigating Derek Sands and his Mystic Emporium, Laura and Sera uncover illegal
    dealings in occult objects. Derek becomes both a suspect and an unlikely ally.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 10: A Break in the Case'
  prefs: []
  type: TYPE_NORMAL
- en: 'A second murder occurs, this time an antique dealer specializing in occult
    objects. The method is the same: poisoned knitting needles. The plot thickens,
    linking both murders to a rare artifact rumored to be cursed.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 11: Helena’s Revenge'
  prefs: []
  type: TYPE_NORMAL
- en: Laura's psychic insights reveal Helena Barrett's motive for revenge against
    Edward Montague, positioning her as a prime suspect despite her alibi.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 12: The Festival Sabotage'
  prefs: []
  type: TYPE_NORMAL
- en: An attempt to disrupt Simon Fairweather's festival points towards an outside
    influence in Polperran, suggesting Simon's involvement in the murder as an effort
    to eliminate competition.
  prefs: []
  type: TYPE_NORMAL
- en: 'Act 3: The Attack'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 13: The Lunar Locket'
  prefs: []
  type: TYPE_NORMAL
- en: The investigation reveals the existence of the Lunar Locket, an artifact Edward
    was rumored to possess. Its curse and power become central to understanding the
    murders.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 14: Frances’s Secret'
  prefs: []
  type: TYPE_NORMAL
- en: Frances Wentworth's past with Edward comes to light, revealing a complicated
    history and her potential motive for his murder, complicating the team's dynamics.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 15: Confronting Demons'
  prefs: []
  type: TYPE_NORMAL
- en: Laura confronts her own fears and doubts about her abilities and her uncle’s
    secretive past, finding strength in her newfound powers and her resolve to clear
    her aunt's name.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 16: Derek’s Dilemma'
  prefs: []
  type: TYPE_NORMAL
- en: Derek Sands is caught between aiding Laura's investigation and protecting his
    own secrets, leading to a tense alliance as they uncover the artifact's location.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 17: The Hidden Room'
  prefs: []
  type: TYPE_NORMAL
- en: A hidden room in the Mystic Emporium reveals secrets about the town's occult
    history and the true nature of the cursed artifact, bringing them closer to the
    killer.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 18: The Showdown at the Fair'
  prefs: []
  type: TYPE_NORMAL
- en: Using the psychic fair as a cover, Laura and her team set a trap for the killer,
    leading to a public confrontation and the revelation of unexpected alliances.
  prefs: []
  type: TYPE_NORMAL
- en: 'Act 4: The Resolution'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 19: Unraveling the Mystery'
  prefs: []
  type: TYPE_NORMAL
- en: The killer is revealed in a dramatic turn of events at the psychic fair. Helena
    Barrett's desire for revenge against Edward for ruining her life is confirmed,
    with the cursed artifact playing a key role in her motive.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 20: The Curse of the Locket'
  prefs: []
  type: TYPE_NORMAL
- en: The team discovers that the Lunar Locket’s curse was a fabrication, a story
    spun by Edward to protect its true powers, which Helena believed and sought to
    harness for her revenge.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 21: Healing Wounds'
  prefs: []
  type: TYPE_NORMAL
- en: With the murderer apprehended, Laura and her team work to heal the divisions
    in Polperran. Laura comes to terms with her new psychic abilities and her place
    in the town.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 22: A New Beginning'
  prefs: []
  type: TYPE_NORMAL
- en: Laura decides to extend her stay in Polperran, embracing her role in the paranormal
    investigation team and starting a new chapter in her life, free from her past
    constraints.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 23: Derek’s Redemption'
  prefs: []
  type: TYPE_NORMAL
- en: Derek Sands, having played a crucial role in solving the mystery, seeks to make
    amends for his past actions, offering his resources to Laura and her team for
    future investigations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 24: Setting the Stage for the Next Mystery'
  prefs: []
  type: TYPE_NORMAL
- en: As the town of Polperran returns to normal, a new mystery surfaces on the horizon,
    teasing the adventures to come for Laura, Sera, Frances, Jasper, and Derek.
  prefs: []
  type: TYPE_NORMAL
- en: This structure sets the stage for a series that blends cozy mystery tropes with
    paranormal elements, ensuring a twisty plot filled with engaging character dynamics,
    evolving mysteries, and a picturesque setting that readers will want to return
    to time and again.
  prefs: []
  type: TYPE_NORMAL
- en: That works! We now have a simple and very high-level 24-chapter outline of the
    plot of our cozy mystery.
  prefs: []
  type: TYPE_NORMAL
- en: Breaking the plot synopsis into the four-act structure in this way helps the
    plot come to life, making it easier to track the murder mystery investigation
    – without being overwhelmed with detail.
  prefs: []
  type: TYPE_NORMAL
- en: If something in this outline is not working, you can quickly ask ChatGPT to
    change it to the way you want and rewrite the plot outline for you.
  prefs: []
  type: TYPE_NORMAL
- en: NEXT STEP IN THE STORY DEVELOPMENT PROCESS
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Stand back and evaluate the story idea that ChatGPT has generated for you.
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t like this response, or want more ideas, copy the original response
    into a text document, then press the Regeneration button. You can see that the
    AI remembered the responses it generated earlier and incorporated these in the
    synopsis.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Change the synopsis prompt. Add in more specific details about your niche, your
    characters, and the setting, until you have several story ideas.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Manually work through the responses and the story ideas that you have recorded.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do any of them stand out?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How do these story ideas compare to other bestsellers in your niche at the moment?
    Could this story compete in your niche and grab the attention of the reader?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are there any additional tropes or themes or story hooks that readers in your
    niche would love to see? Bring them in now.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can you incorporate any ideas of your own to create a combined synopsis of your
    story idea?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The objective at the end of this stage of the plotting process is to have a
    working story idea that you love and cannot wait to start writing!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Top Tip. Don’t open a new conversation with ChatGPT. If you have worked on another
    project, click back to the conversation about this book before adding the new
    prompt so that ChatGPT understands who these characters are and what responses
    it has already generated – this helps to add context.
  prefs: []
  type: TYPE_NORMAL
- en: Brainstorm options. Repeat until you have a workable story idea.
  prefs: []
  type: TYPE_NORMAL
- en: Keep asking for more ideas on how to improve your synopsis.
  prefs: []
  type: TYPE_NORMAL
- en: This is the fun part of the writing process when you can go to town on cool
    and engaging ideas that perfectly fit your main character and your story situation.
  prefs: []
  type: TYPE_NORMAL
- en: If you need more information about a specific suggestion, ask the AI to give
    you some examples.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc45M.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Can you give me more information about Chapter 10: A Break in the Case? A second
    murder occurs, this time an antique dealer specializing in occult objects. The
    method is the same: poisoned knitting needles. The plot thickens, linking both
    murders to a rare artifact rumored to be cursed.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc45N.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 'Chapter 10: A Break in the Case'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the heart of Polperran, the quaint serenity is once again shattered by a
    chilling discovery. This time, the victim is Charles Pennington, a well-regarded
    antique dealer known for his extensive collection of occult objects. Found in
    his own shop, Pennington lies motionless, two antique knitting needles protruding
    from his chest, mirroring the brutal demise of Edward Montague. The town is abuzz
    with fear and speculation as the realization sets in: a murderer walks among them,
    wielding a most peculiar choice of weapon.'
  prefs: []
  type: TYPE_NORMAL
- en: Laura Marsh, still grappling with her newfound psychic abilities, senses an
    eerie connection between the needles used in both murders.
  prefs: []
  type: TYPE_NORMAL
- en: Her investigation, alongside Aunt Sera, Frances Wentworth, and Jasper Finchley,
    takes a new turn as they delve deeper into the world of cursed artifacts and occult
    relics, a domain where Pennington was a known authority.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Break in the Case:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Discovery: The chapter opens with Laura and her team arriving at Pennington''s
    shop in response to urgent news of his death. The scene is eerily similar to Montague''s
    murder, with the shop appearing undisturbed except for the grim centerpiece.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Link to the Cursed Artifact: Among Pennington''s possessions, they find a journal
    detailing his recent acquisition of the "Lunar Locket," an artifact Edward Montague
    had been rumored to seek. The journal entries speak of Pennington''s growing obsession
    with the locket''s supposed curse and its power.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Psychic Revelations: Touching the knitting needles, Laura experiences a vivid
    psychic flashback, witnessing a heated argument between Pennington and an unidentified
    figure about the locket. The vision suggests that Pennington may have known the
    identity of Montague''s killer and the motive behind both murders.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Community Reaction: News of the second murder with the same modus operandi
    sends shockwaves through Polperran. The community''s trust begins to fray, with
    suspicions cast wide, including at Laura and her investigative team. Their connection
    to both victims through the paranormal investigation draws unwanted attention
    and skepticism.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Investigative Challenges: As Laura and her team dig deeper, they encounter
    obstacles from both the local police, who are wary of their unconventional methods,
    and from within the occult community, which closes ranks in the wake of the murders.
    Their investigation reveals that the locket may have been more than a mere collector''s
    item—it was a coveted object of power that could inspire passion, obsession, and,
    ultimately, violence.'
  prefs: []
  type: TYPE_NORMAL
- en: 'A Key Suspect: Their inquiries lead them to Victor Holloway, known for his
    interest in acquiring the locket for his collection. However, his solid alibi
    and the revelation that Pennington refused to sell the locket to him complicate
    the suspicion.'
  prefs: []
  type: TYPE_NORMAL
- en: The chapter closes with the team grappling with the implications of their findings.
    The murders are not just isolated incidents but are deeply intertwined with the
    dark underbelly of Polperran's occult scene.
  prefs: []
  type: TYPE_NORMAL
- en: The cursed artifact at the center of it all, the Lunar Locket, holds the key
    to unraveling the mystery, but also poses a danger to anyone who comes too close.
  prefs: []
  type: TYPE_NORMAL
- en: Laura, now more than ever, feels the weight of her abilities and the responsibility
    to bring peace back to Polperran, even as the shadows of the past loom ever larger.
  prefs: []
  type: TYPE_NORMAL
- en: These ideas would certainly add to the plot, and you could work through each
    suggestion in the same way, building up an effective and detailed plot summary.
  prefs: []
  type: TYPE_NORMAL
- en: Ruthlessly remove ideas that don’t excite you.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluate and fine-tune every idea and character profile until it matches your
    vision for this story.
  prefs: []
  type: TYPE_NORMAL
- en: Does the story idea you have produced have enough emotional and external conflict
    to sustain a complete full-length novel, or is it better suited to a novella?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do you need to add subplots for a longer work? This will mean asking ChatGPT
    to create secondary characters with specific relationships to the two main characters
    and then weaving their storylines into the synopsis.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are your characters working?  Do they need different motivations and internal
    conflicts? Can you focus on the character arc for the sleuth or the murderer,
    for example?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Would a story idea you like work better in a different location? For example,
    you could easily move our case study story idea from a small coastal town to a
    yarn store in a major city—whatever works for you and your characters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Repeat until you have a story idea and a plot outline that you cannot wait to
    start writing.
  prefs: []
  type: TYPE_NORMAL
- en: Congratulations! We now have a very high-level 24-chapter plot outline for the
    entire cozy mystery novel, including all of the major turning points in the story.
  prefs: []
  type: TYPE_NORMAL
- en: Remember—you can always press the Regenerate response option if you need more
    ideas. However, this will delete the response you have already received, so you
    may want to copy it into your document first.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to completely change the prompt, it is probably best to open a new
    conversation since the AI will recall what it has already been told and the response
    it has already given.
  prefs: []
  type: TYPE_NORMAL
- en: What to Do Next?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Now is the time to start work on the outline.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, you are completely free to make any major changes or start again
    and redevelop the entire story idea, characters, and settings.
  prefs: []
  type: TYPE_NORMAL
- en: Throw out subplots, fill plot holes, create new ideas, and work on the overall
