  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**精心制作的提示的例子**'
- en: '****Fic**tio**n: “****Cr**eat**e ****a**** ****char**acte**r ****pro**fil**e
    ****f**or** ****a**** ****yo**ung**, ****ambi**tiou**s ****astr**onau**t ****prep**arin**g
    ****f**or** ****th**eir** ****fi**rst** ****mis**sio**n ****t**o** ****Ma**rs**.
    ****Inc**lud**e ****th**eir** ****pers**onalit**y ****tr**ait**s, ****back**groun**d,
    ****a**nd** ****moti**vation**s.”'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**小说：“为一位年轻、有抱负的宇航员创建一个人物档案，他正在为他们的第一次火星任务做准备。包括他们的个性特征、背景和动机。”**'
