  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我需要一个自我护理的常规，帮助我管理压力并改善我的福祉。我的日程是[忙碌/灵活]，我更喜欢[列出偏好的自我护理实践]等活动。请创建一个个性化的自我护理计划。"'
- en: Guided Reflection for Personal Growth
  id: totrans-917
