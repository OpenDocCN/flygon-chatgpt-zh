  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 在控制术语方面，用户必须拥有清晰且易于使用的工具来管理同意和访问他们的数据。这包括允许用户决定他们想要分享哪些数据以及用于什么目的。理想情况下，这些决定应该是知情同意的，即用户在同意之前应该充分了解他们的数据将被如何使用。随着人工智能被集成到更多日常应用中，平台需要努力教育用户关于分享他们个人信息的影响。
