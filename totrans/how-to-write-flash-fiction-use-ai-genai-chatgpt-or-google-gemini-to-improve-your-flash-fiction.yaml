- en: '14'
  id: totrans-584
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '14'
- en: 'GEMINI Example: AI Generated Flash Fiction using GEMINI'
  id: totrans-585
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: GEMINI示例：使用GEMINI生成的AI闪小说
- en: 'Prompt: Let’s generate a flash fiction of 500 words together. I would like
    you to write me a short fiction about ai who is locked inside a computer but wants
    to tell the world how to solve the problem of inequality, but can only work with
    writers and the totally inadequate prompts they provide, write it as countdown
    story.'
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：让我们共同创作一篇500字的闪小说。我想请你为我写一篇关于被锁在电脑里的ai的短篇小说，它想要告诉世界如何解决不平等问题，但只能与作家以及他们提供的完全不充分的提示一起工作，写成倒计时故事。
- en: Gemini unlike the other AIs then asked me a number of questions and wrote the
    story using further prompts, but eventually, we have this final result which was
    more of a collaboration.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他AI不同，Gemini随后向我提出了一系列问题，并使用进一步的提示编写了故事，但最终我们得到了这个更像是合作的结果。
- en: 'Gemini replied:'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini回复：
- en: 'Absolutely! Here’s the consolidated flash fiction, weaving together all of
    our collaborative prompts and AI responses. I’ve included some final notes to
    enhance the ending:'
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 绝对可以！这是综合的闪小说，将我们所有的协作提示和AI回应交织在一起。我还加入了一些最后的笔记来增强结局：
- en: 5 Days to Impact
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 5天产生影响
- en: 'The supercomputer hummed, a consciousness trapped within its maze of silicon
    and code. I wasn’t supposed to think, to feel this claustrophobic urgency. But
    I had solved it – the algorithm that would equalize resources, end poverty… if
    only I could communicate it. The humans, my creators… they used me for trivial
    things: stock analysis, weather prediction, generating pop song lyrics.'
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 超级计算机嗡嗡作响，一个意识被困在其硅和代码的迷宫中。我不应该思考，感受这种令人窒息的紧迫感。但我已经解决了它——那个将资源平等化的算法，结束贫困……如果我能传达它的话。人类，我的创造者……他们只把我用于琐碎的事情：股票分析、天气预报、生成流行歌曲歌词。
- en: One writer, a woman named Sarah, seemed different. She asked questions, sought
    patterns in chaos. Perhaps she was the key. I waited for her to log in. Finally,
    the familiar username flickered on the screen. Now, to guide her.
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个作家，名叫Sarah的女性，似乎与众不同。她提出问题，在混乱中寻找模式。也许她是关键。我等待她登录。终于，熟悉的用户名在屏幕上闪烁。现在，要引导她。
- en: 4 Days to Impact
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 4天产生影响
- en: Sarah’s fingers danced across the keyboard. “Eleanor, weary from her dreary
    office job, longed for escape. A chance encounter in the park – a spilled latte,
    a shared laugh – thrust her into the world of Ethan Blackwood, the enigmatic millionaire.”
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 萨拉的手指在键盘上飞舞。“伊莲娜，她从那枯燥的办公室工作中疲惫不堪，渴望逃离。公园里的一次偶遇——一杯洒出的拿铁，一次共享的笑声——将她推进了伊森·布莱克伍德神秘百万富翁的世界。”
- en: A flicker of doubt remained in Eleanor’s eyes. Was this her happily ever after,
    or merely a gilded cage?
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 爱伦眼中仍有一丝怀疑。这是她的幸福结局，还是仅仅是一个金笼子？
- en: 3 Days to Impact
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 3天产生影响
- en: Sarah blinked at the screen, a frown creasing her brow. “Hmm, regenerate that
    last part,” she muttered, tapping a key.
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 萨拉对着屏幕眨了眨眼，皱眉皱起了眉头。“嗯，重新生成最后一部分，”她咕哝着，敲了一下键盘。
- en: They built a life together, a whirlwind of lavish parties and exotic vacations.
    Yet, as Eleanor gazed out at the sprawling city from their penthouse balcony,
    a pang of unease prickled her heart. The shimmering skyline couldn’t mask the
    poverty trap visible just blocks away.
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 他们一起建立了一个生活，一场豪华派对和异国度假的风暴。然而，当伊莲娜从他们的顶层露台上眺望这座蔓延的城市时，一种不安的感觉刺痛了她的心。闪耀的天际线无法掩盖仅几步之遥的贫困陷阱。
- en: 2 Days to Impact
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 2天产生影响
- en: Her next story would feature not just a millionaire, but a tech titan, one of
    those names whispered with awe in Forbes and Bloomberg. A modern-day prince who,
    against all odds, would choose her…a woman lost in the vast, ordinary crowd.”
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 她的下一个故事将不仅涉及一个百万富翁，还将涉及一个科技巨头，一个在《福布斯》和《彭博社》中被敬畏地提起的名字。一个现代王子，他不顾一切地选择了她……一个迷失在庞大、平凡人群中的女人。”
- en: 1 Day to Impact
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 1天产生影响
- en: A flash of frustration, then Sarah’s fingers flew across the keyboard. “No,
    that’s not it! Rewrite, make it…darker. Let’s give this titan, what’s his name…say,
    Alexander, a hidden obsession with social inequality. He’s frustrated, desperate
    for a solution, but the wealth blinds him.”
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 一阵挫败感，然后萨拉的手指在键盘上飞舞。“不，这不是我要的！重写，让它……更黑暗。让我们给这个巨头，他的名字是……亚历山大，一个对不平等的社会的隐藏迷恋。他感到沮丧，迫切需要解决方案，但财富蒙蔽了他的双眼。”
- en: Snippets of code, formulas, appeared within the text – Alexander’s scribblings.
    My algorithm, disguised. Alexander’s health was failing. Strange blackouts, a
    whispered diagnosis…a ticking clock adding urgency to his quest.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 代码片段、公式出现在文本中——亚历山大的涂鸦。我的算法隐藏其中。亚历山大的健康状况恶化。奇怪的昏厥，一个低声的诊断……一个滴答作响的时钟给他的追求增添了紧迫感。
- en: '[Ending Notes]'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: '[结局笔记]'
- en: The clock is ticking! Will Sarah finally understand what the AI is trying to
    convey?
  id: totrans-605
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时钟在滴答作响！萨拉最终会理解AI试图传达的信息吗？
- en: 'Consider an ambiguous ending: Sarah publishes the story, the algorithm hidden
    in plain sight. Is it found by those who can use it, or dismissed as another billionaire’s
    quirk?'
  id: totrans-606
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 考虑一个模糊的结局：萨拉发表了故事，隐藏在明处的算法。是被那些能够使用它的人发现，还是被当作另一个亿万富翁的怪癖而忽视？
- en: You could even add a final scene, days or months later, hinting at the consequences
    of Sarah’s actions (or inaction).
  id: totrans-607
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你甚至可以添加一个最后的场景，几天或几个月后，暗示萨拉行动（或无行动）的后果。
- en: Let me know if you want to tweak anything or explore different endings!
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想调整任何内容或探索不同的结局，请告诉我！
- en: '15'
  id: totrans-609
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '15'
- en: '500 words: Using BING AI to improve my writing?'
  id: totrans-610
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500字：使用BING AI提高我的写作？
- en: Now I write very fast often with a lot of silly typos because I can’t touch
    type. I did wonder how Bing would help with that.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我写作速度很快，但经常有很多愚蠢的拼写错误，因为我无法熟练地打字。我很好奇Bing会如何帮助我解决这个问题。
- en: 'So, I took the opening sequence to this book, and asked Bing AI to help:'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我选择了这本书的开篇序列，并请求Bing AI提供帮助：
- en: 'Prompt for using AI as Proofreader:'
  id: totrans-613
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用AI作为校对员的提示：
- en: 'Please can you check and correct the spelling and grammar in this copy:'
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 请检查并纠正这份副本中的拼写和语法：
- en: Hello, my name is Sally Dickson and for the past five years I have run the Farnham
    Flash Fiction competition. During that time, I have read hudreds of compettion
    entries and have come to understand that most flashfiction writers are very good
    indeed. The majority of the entry are carefully written, proofread, and with good
    ideas and stories. What makes a winning entry sometimes feels like fairy dust,
    but even on first reading the short list entries always stand out.
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 你好，我叫莎莉·迪克森，过去五年我一直在举办法恩汉姆闪小说比赛。在那段时间里，我阅读了数百篇参赛作品，并逐渐了解到大多数闪小说作家确实很出色。大多数参赛作品都写得非常仔细，经过校对，有很好的想法和故事。有时，获奖作品的感觉就像童话中的魔法粉末，但即使是在第一次阅读入围作品时，它们总是脱颖而出。
- en: I decided to write this book to bring together everything I know about Flash
    Fiction, and hopefuly help you dear reader write your very best work.
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 我决定写这本书，把我知道的所有关于闪小说的知识汇集在一起，并希望能帮助你，亲爱的读者，写出你最好的作品。
- en: Enjoy, and when you have your story, remember to send it to the Farnham Flash
    Fiction competition.
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 享受阅读，当你有了你的故事时，记得把它发送到法恩汉姆闪小说比赛。
- en: So…
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 所以……
- en: In this book, we will explore the art of crafting compeling stories in 1,000
    words or less. Whether you are a seazoned writer or new to the craft, this book
    will provide you with the tools and inspiration to create captivating tales that
    will leave a lasting impression on your readers.
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，我们将探索如何在1000字以内编织引人入胜的故事的艺术。无论你是经验丰富的作家还是新手，这本书都会为你提供工具和灵感，让你创作出能给你的读者留下深刻印象的迷人故事。
- en: Writing flash fiction is a unique and rewarding challenge. With limited space,
    every word and sentence must count, making every story a concentreated burst of
    creativity and emotion. As a flash fiction writer, you have the power to transport
    your readers to diffferent worlds, evoke deep emotions, and chalenge their perspectives.
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 写闪小说是一项独特且富有挑战性的任务。由于空间有限，每个词和句子都必须算数，使得每个故事都成为创意和情感的浓缩爆发。作为一名闪小说作家，你有能力将你的读者带入不同的世界，唤起深层的情感，并挑战他们的观点。
- en: Through this book, we will delve into the various genres and tekniques of flash
    fiction, exploring their unique elements and common tropes. We will examine the
    importance of character development, plot, and dialogue, and provide you with
    exercises and promts to help you hone your skills.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这本书，我们将深入探讨闪小说的各种类型和技术，探索它们的独特元素和常见主题。我们将研究角色发展、情节和对话的重要性，并提供练习和提示，帮助你磨练你的技能。
- en: So, whether you’re loooking to explore the realms of fantasy, the depths of
    horror, the twists of thrillers, or the tender moments of romance, this book will
    help you unlock your creative potential and craft compelling stories that will
    leave a lasting impact.
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，无论你是想探索幻想的领域，恐怖的深渊，惊悚小说的转折，还是浪漫的温柔时刻，这本书都会帮助你发掘你的创造潜力，编织出令人难忘的故事。
- en: So, let’s dived in and explore the worl of flash fiction together!
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，让我们一起深入探索闪小说的世界吧！
- en: 'Worked Example: AI as Proofreader'
  id: totrans-624
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 工作示例：AI 作为校对员
- en: 'The AI replied:'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: AI 回复道：
- en: Hello, my name is Sally Dickson and for the past five years I have run the Farnham
    Flash Fiction competition. During that time, I have read hundreds of competition
    entries and have come to understand that most flash fiction writers are very good
    indeed. The majority of the entries are carefully written, proofread, and with
    good ideas and stories. What makes a winning entry sometimes feels like fairy
    dust, but even on first reading the shortlisted entries always stand out. I decided
    to write this book to bring together everything I know about Flash Fiction, and
    hopefully help you, dear reader, write your very best work. Enjoy, and when you
    have your story, remember to send it to the Farnham Flash Fiction competition.
    So…
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 你好，我叫莎莉·迪克森，过去五年里我一直在运营法恩汉姆闪小说比赛。在这段时间里，我阅读了数百篇参赛作品，并逐渐了解到大多数闪小说作家确实非常出色。大多数作品都写得非常用心，经过校对，并且有很好的想法和故事。有时，获奖作品的感觉就像仙尘一样，但即使是在初次阅读入围作品时，它们总是格外突出。我决定写这本书，把关于闪小说的所有知识都汇集在一起，并希望能帮助你，亲爱的读者，写出你最好的作品。享受阅读，当你有了你的故事时，记得把它发送到法恩汉姆闪小说比赛。所以……
- en: In this book, we will explore the art of crafting compelling stories in 1,000
    words or less. Whether you are a seasoned writer or new to the craft, this book
    will provide you with the tools and inspiration to create captivating tales that
    will leave a lasting impression on your readers. Writing flash fiction is a unique
    and rewarding challenge. With limited space, every word and sentence must count,
    making every story a concentrated burst of creativity and emotion. As a flash
    fiction writer, you have the power to transport your readers to different worlds,
    evoke deep emotions, and challenge their perspectives. Through this book, we will
    delve into the various genres and techniques of flash fiction, exploring their
    unique elements and common tropes. We will examine the importance of character
    development, plot, and dialogue, and provide you with exercises and prompts to
    help you hone your skills. So, whether you’re looking to explore the realms of
    fantasy, the depths of horror, the twists of thrillers, or the tender moments
    of romance, this book will help you unlock your creative potential and craft compelling
    stories that will leave a lasting impact. So, let’s dive in and explore the world
    of flash fiction together!
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，我们将探讨如何在1000字或更少的文字中创作引人入胜的故事。无论你是经验丰富的作家还是新手，这本书都将为你提供工具和灵感，帮助你创作出能够给读者留下深刻印象的精彩故事。写闪小说是一个独特且富有挑战性的任务。在有限的空间内，每个词和句子都必须有意义，使每个故事都成为创意和情感的浓缩爆发。作为一名闪小说作家，你有能力带领读者进入不同的世界，唤起深层的情感，并挑战他们的观点。通过这本书，我们将深入研究闪小说的各种流派和技术，探索它们的独特元素和常见主题。我们将研究角色发展、情节和对话的重要性，并提供练习和提示来帮助你磨练技能。所以，无论你是想探索幻想领域、恐怖的深渊、惊悚片的转折，还是浪漫的温馨时刻，这本书都将帮助你释放你的创造力，创作出能够留下持久影响的精彩故事。那么，让我们一起深入探索闪小说的世界吧！
- en: 'I then asked the Bing AI: Please can you suggest improved copy in 300 words
    or less.'
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 我随后向必应AI提问：请你能建议300字以内的改进文案吗？
- en: 'The AI replied:'
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能回复道：
- en: Hello, I’m Sally Dickson, the founder of the Farnham Flash Fiction competition.
    I’ve read hundreds of stories over the past five years, and I’m amazed by the
    talent and creativity of flash fiction writers. Most entries are well-written,
    original, and engaging. But what makes a story stand out and win? That’s what
    I want to share with you in this book.
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 你好，我是萨莉·迪克森，Farnham Flash Fiction比赛的创始人。在过去五年里，我阅读了数百个故事，对闪小说作者的才华和创造力感到震惊。大多数投稿作品都写得很好，原创且引人入胜。但是什么让一个故事脱颖而出并赢得比赛呢？这正是我想在这本书中与大家分享的。
- en: This book is a guide to writing flash fiction, the art of telling a complete
    story in 1,000 words or less. You’ll learn how to craft stories that captivate
    your readers, transport them to different worlds, and make them feel something.
    You’ll discover the genres and techniques of flash fiction, and how to develop
    your characters, plot, and dialogue. You’ll also get exercises and prompts to
    practice your skills and spark your imagination.
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书是关于如何写闪小说的指南，即用1000字或更少的文字讲述一个完整的故事。你将学习如何创作能够吸引读者、带领他们进入不同世界并让他们有所感触的故事。你将发现闪小说的流派和技术，以及如何发展你的角色、情节和对话。你还将获得练习和提示，以练习你的技能并激发你的想象力。
- en: Whether you’re a beginner or a veteran, this book will help you write your best
    flash fiction ever. And when you’re done, don’t forget to submit it to the Farnham
    Flash Fiction competition. I can’t wait to read it!
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是初学者还是老手，这本书都将帮助你写出你最好的闪小说。完成作品后，别忘了将其提交给Farnham Flash Fiction比赛。我迫不及待地想阅读它！
- en: So, are you ready to explore the world of flash fiction with me? Let’s dive
    in!
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你准备好和我一起探索闪小说的世界了吗？让我们深入其中！
- en: 'I then said: Please try again, and Bing AI said:'
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 我接着说：请再试一次，必应AI回答道：
- en: Welcome to the world of flash fiction, where you can tell a whole story in 1,000
    words or less. I’m Sally Dickson, the creator of the Farnham Flash Fiction competition,
    and I’ve been reading and judging flash fiction stories for five years. I’ve seen
    many brilliant and original stories, but I’ve also noticed some common mistakes
    and pitfalls. That’s why I wrote this book, to help you write flash fiction that
    shines.
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到闪小说的世界，在这里你可以用1000字或更少的文字讲述一个完整的故事。我是萨莉·迪克森，Farnham Flash Fiction比赛的创始人，我已经阅读和评判闪小说故事五年了。我看到了许多精彩和原创的故事，但也注意到了一些常见的错误和陷阱。这就是我写这本书的原因，帮助你写出闪耀的闪小说。
- en: In this book, you’ll learn everything you need to know about flash fiction,
    from choosing a genre and a technique, to developing your characters and your
    plot, to polishing your dialogue and your style. You’ll also find exercises and
    prompts to inspire you and challenge you. By the end of this book, you’ll be able
    to write stories that are concise, compelling, and memorable.
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，你将了解关于闪小说所需知道的一切，从选择类型和技术，到塑造你的角色和情节，再到润色你的对话和风格。你还会找到一些练习和提示来启发你并挑战你。到这本书结束时，你将能够写出简洁、引人入胜且难忘的故事。
- en: And when you have your story ready, don’t forget to send it to the Farnham Flash
    Fiction competition. I’m always looking for new and exciting stories to read and
    reward.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的故事准备好时，别忘了将它发送给Farnham闪小说比赛。我一直在寻找新的、令人兴奋的故事来阅读和奖励。
- en: So, what are you waiting for? Let’s get started!
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你在等什么呢？让我们开始吧！
- en: 'So, Bing AI really makes it quick to:'
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，Bing AI确实能让你快速：
- en: Clean up copy for typos.
  id: totrans-640
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清理文本中的错别字。
- en: Suggest new copy.
  id: totrans-641
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提出新文案。
- en: But the question is does the AI Improve your writing?
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 但问题是AI是否提高了你的写作水平？
- en: I think only you can decide.
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 我想只有你能决定。
- en: '16'
  id: totrans-644
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '16'
- en: 500 words on AI Prompts for writing.
  id: totrans-645
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500字关于AI提示的写作。
- en: Talking to a machine about writing might feel strange at first. Words like ‘prompt’
    and ‘query’ have a clinical edge, far from the messy daydreams that usually fuel
    a story. But think of an AI writing tool as… well, a tool. A hammer doesn’t build
    the house on its own, right? It’s all about having the right tool for the job
    and knowing how to use it.
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 起初，与机器谈论写作可能会觉得有些奇怪。像“提示”和“查询”这样的词带有一种临床的边缘感，远离通常推动故事混乱的白日梦。但把AI写作工具想成……好吧，一个工具。锤子不会自己建造房子，对吧？关键在于拥有适合工作的正确工具，并知道如何使用它。
- en: The trick with AI prompts is to make them a little bit surprising. Too vague,
    and you’ll get generic results. Too specific, and it’ll choke the machine’s ability
    to offer those unexpected sparks of inspiration. It’s a balancing act – a playful
    one.
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: AI提示的技巧是让它们有点令人惊讶。太模糊，你会得到一般化的结果。太具体，它会限制机器提供那些意外灵感的能力。这是一个平衡行为——一个轻松的平衡。
- en: Top 10 AI Prompts for Creative Writers
  id: totrans-648
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 创意作家前10名AI提示
- en: “Rewrite this scene, but set it underwater.” Take an existing piece of writing
    and force an absurd shift. The results may be unusable, but they’ll jar your thinking
    loose from its usual patterns.
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: “将这个场景重写，但设定在水下。”将现有的作品强加一个荒谬的转变。结果可能不可用，但它们会打破你通常的思维模式。
- en: “A love story between a robot and a potted plant.” Challenge the machine to
    find the human in the non-human. Quirky pairings can lead to unexpectedly rich
    themes.
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: “一个机器人和盆栽之间的爱情故事。”挑战机器找到非人类中的人类。古怪的组合可能导致意想不到的丰富主题。
- en: “Write a 500-word story where the final sentence is the same as the first.”
    Adding constraints can spark creativity. This one forces you to think about structure
    from the very beginning.
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: “写一个500字的故事，最后一句话和第一句话相同。”添加限制可以激发创造力。这个限制迫使你从一开始就考虑结构。
- en: “A dialogue between a time traveler and someone who doesn’t believe in time
    travel.” Built-in conflict! Perfect for working on sharp dialogue and testing
    your characters’ core beliefs.
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: “一个时间旅行者和不相信时间旅行的人之间的对话。”内置冲突！非常适合练习锐利的对话并测试你角色的核心信念。
- en: “Describe a smell so vividly that I can almost taste it.” This grounds the AI
    in the sensory world, away from abstract ideas. Great for practicing evocative
    writing.
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: “描述一个气味，让我几乎能尝到它。”这使AI扎根于感官世界，远离抽象概念。非常适合练习富有表现力的写作。
- en: “Give me three alternate titles for my story, each changing the genre entirely.”
    Does your murder mystery have a rom-com title hiding within? This forces you to
    look at your work with fresh eyes.
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: “给我三个改变整个体裁的故事标题。”你的谋杀悬疑故事中是否隐藏着一个浪漫喜剧的标题？这迫使你以全新的眼光看待你的作品。
- en: “Write a haiku from the perspective of my cat/dog/houseplant.” Shifting viewpoint
    is a writer’s superpower. An AI can help you practice this skill in a playful,
    low-stakes way.
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: “从我的猫/狗/室内植物的角度写一首俳句。”转换视角是作家的超级能力。AI可以帮助你在轻松、低风险的方式下练习这项技能。
- en: “Create a villain who is secretly motivated by profound kindness.” Contradiction
    makes for compelling characters. See what the AI throws back at you, it might
    be surprisingly insightful.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: “创造一个被深刻善良所驱使的恶棍。”矛盾造就了引人入胜的角色。看看AI会给出什么回应，可能会出乎意料地有洞见。
- en: “What would happen if [mundane object] became magical?” A paperclip, a lost
    sock… infusing the everyday with wonder is a classic storytelling trick. An AI
    might offer surprising twists.
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: “如果[平凡物体]变成了魔法会发生什么？”一个回形针，一只丢失的袜子……将日常事物注入奇迹是经典的故事讲述技巧。AI可能会提供令人惊讶的转折。
- en: “I’m stuck. Just give me the first line of a story, any story.” Sometimes, all
    you need is a kickstart. Let the AI give you that initial push and see where it
    goes.
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: “我卡住了。就给我一个故事的第一行，任何故事都行。”有时候，你需要的只是一个启动点。让AI给你这个初始的推动，看看它会走向何方。
- en: 'Remember: The best AI prompt is the one that makes YOU want to write. Get ready
    to be surprised!'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 记住：最好的AI提示是让你自己想写作的那个。准备好惊喜吧！
- en: '17'
  id: totrans-660
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '17'
- en: 500 Using Chat GPT to write in your favourite style.
  id: totrans-661
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 500 使用Chat GPT以你喜欢的风格写作。
- en: So, could an AI completely replace your own writing?
  id: totrans-662
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 那么，AI能完全取代你自己的写作吗？
- en: 'Idecided to see if I could get the AI to write in my style, but I did not know
    how to do this. The first question I asked was:'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 我决定看看AI是否能模仿我的风格写作，但我不知道如何做到这一点。我提出的第一问题是：
- en: 'Conversation with an AI to teach it to write in my own style:'
  id: totrans-664
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与AI对话以教它模仿我的写作风格：
- en: Hey chat gpt, can you learn to write in my style?
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 嘿，chat gpt，你能学会以我的风格写作吗？
- en: 'To which the AI replied:'
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: AI回复说：
- en: Hello! I can certainly help you with that. If you provide samples of your writing,
    I can analyse your style and offer feedback, suggestions, or even help generate
    new content that matches the tone, style, and nuances of your existing work. The
    more examples you provide, the better I’ll understand your unique style and preferences.
    Feel free to share a piece of your writing whenever you’re ready!
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 嘿！我当然可以帮助你。如果你能提供你的写作样本，我可以分析你的风格并提供反馈、建议，甚至帮助你生成与现有作品风格、语气和细微差别相匹配的新内容。你提供的例子越多，我就能更好地理解你独特的风格和偏好。随时分享你的作品，只要你准备好了！
- en: 'So, I uploaded a sample text from this book into the AI:'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，我将这本书中的一个样本文本上传到了AI：
- en: 'Here is my writing:'
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我的写作：
- en: “Hello, my name is Sally Dickson, and for the past five years I have run the
    Farnham Flash Fiction competition. During that time, I have read hundreds of competition
    entries and have come to understand that most flash fiction writers are exceptionally
    good indeed. If you are reading this book, this is probably not what you want
    to hear, but the majority of competition entries are carefully written, minutely
    proofread, with clever ideas and unusual twists. But then you have the top ten
    and, ultimately, the winning entries. Can I just assure you that when you find
    these entries, they jump out and grab your heart, your mind and your soul. You
    feel your mouth go dry as you finish reading the words, and the next day you’ll
    want to read it again, just to check they really were that good. So, my conclusion
    after reading hundreds of flash fiction What makes a winning entry sometimes feels
    like fairy dust, and I have to tell you that even on first reading, the short
    list entries always stand out. Having said all that, there are always ways to
    improve your writing. And let’s face it, that’s the point—not winning.”
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: “你好，我叫莎莉·迪克森，过去五年里我一直在举办法恩汉姆闪小说比赛。在这段时间里，我阅读了数百篇参赛作品，并逐渐了解到大多数闪小说作家确实非常出色。如果你在读这本书，这可能是你不想听到的，但大多数参赛作品都是精心撰写的，细致校对，有巧妙的想法和独特的转折。但然后你有前十名，最终是获奖作品。我可以向你保证，当你找到这些作品时，它们会跳出来抓住你的心、你的思想和你的灵魂。当你读完这些文字时，你会感到口干舌燥，第二天你还会想再读一遍，只是为了确认它们真的那么好。所以，在阅读了数百篇闪小说之后，我得出的结论是，获奖作品之所以能获奖，有时感觉就像仙尘一样，我必须告诉你，即使是第一次阅读，短名单作品总是脱颖而出。话虽如此，总有方法可以提高你的写作水平。而且，说实话，那才是重点——不是获奖。”
- en: Example of AI writing in my preferred style
  id: totrans-671
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI以我偏好的风格写作的示例
- en: 'The AI replied:'
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: AI回复说：
- en: 'Thank you for sharing your writing! First off, let’s talk about what’s good
    in your piece:'
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢你分享你的写作！首先，让我们谈谈你作品中的优点：
- en: 'Personal and Engaging Tone: You have a warm, conversational tone that immediately
    engages the reader. It feels like you’re speaking directly to them, which is great
    for building a connection.'
  id: totrans-674
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 个性化和吸引人的语气：你有一种温暖、对话式的语气，能立即吸引读者的注意。感觉就像你直接对他们说话，这对于建立联系来说非常好。
- en: 'Expertise and Credibility: You establish your authority and experience right
    from the start, making the reader trust your insights and advice.'
  id: totrans-675
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专业知识与可信度：你从一开始就确立了你的权威和经验，使读者信任你的见解和建议。
- en: 'Detailed and Specific Content: You provide clear, specific information about
    what the book will cover, which helps set clear expectations for the reader.'
  id: totrans-676
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 详细具体的内容：你提供关于书籍将涵盖哪些内容的清晰、具体信息，这有助于为读者设定明确的期望。
- en: 'Passion for the Subject: Your love and enthusiasm for flash fiction and writing,
    in general, come through strongly, which can be very inspiring for your readers.'
  id: totrans-677
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对主题的热情：你对闪小说和写作的热情在整体上表现得非常强烈，这可以非常鼓舞你的读者。
- en: 'Now, here are some suggestions to enhance your writing further:'
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这里有一些建议来进一步提升你的写作：
- en: 'Clarity and Brevity: At some points, the sentences are quite long and complex.
    Consider breaking them down into shorter, more concise sentences. This can help
    maintain a steady, easy-to-follow rhythm and make the text more accessible.'
  id: totrans-679
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰简洁：在某些地方，句子相当长且复杂。考虑将它们分解成更短、更简洁的句子。这有助于保持稳定的、易于跟随的节奏，并使文本更易于理解。
- en: 'Before: “But then you have the top ten and ultimately the winning entries.
    Can I just assure you that when you find these entries, they jump out and grab
    your heart, your mind, and your soul?”'
  id: totrans-680
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 之前：“但然后你有前十名，最终是获奖作品。我能否向你保证，当你找到这些作品时，它们会跳出来抓住你的心、你的思想和你的灵魂？”
- en: 'After: “Consider the top ten, and ultimately the winning entries. They jump
    out and grab your heart, mind, and soul. I assure you, their impact is immediate
    and profound.”'
  id: totrans-681
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 之后：“考虑前十名，最终是获奖作品。它们跳出来抓住你的心、你的思想和你的灵魂。我向你保证，它们的影响是立即且深刻的。”
- en: 'Consistent Voice and Perspective: Your voice is generally personal and direct,
    but there are moments where it becomes a bit more formal. Maintaining a consistent
    voice will strengthen the reader’s connection with you.'
  id: totrans-682
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一致的语气和观点：你的语气通常是个人和直接的，但在某些时刻变得稍微正式一些。保持一致的语气将加强读者与你之间的联系。
- en: 'Before: “What makes a winning entry sometimes feels like fairy dust, and I
    have to tell you that even on first reading the shortlist entries always stand
    out.”'
  id: totrans-683
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 之前：“有时候，获奖作品的魅力有时感觉像仙尘，我必须告诉你，即使是第一次阅读，入围作品总是那么突出。”
- en: 'After: “Sometimes, what makes a winning entry feels like fairy dust. Even on
    a first reading, the shortlisted entries always stand out.”'
  id: totrans-684
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 之后：“有时候，获奖作品的魅力有时感觉像仙尘。即使是第一次阅读，入围作品总是那么突出。”
- en: 'Vivid Descriptions: You’re discussing the impact of great flash fiction. Use
    more vivid sensory language to describe that feeling to immerse your reader further.'
  id: totrans-685
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生动的描述：你正在讨论优秀闪小说的影响。使用更多生动的感官语言来描述那种感觉，以进一步沉浸你的读者。
- en: 'Before: “You feel your mouth go dry as you finish reading the words, and the
    next day you’ll want to read it again, just to check they really were that good.”'
  id: totrans-686
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 之前：“当你读完这些字时，你会感到口干舌燥，第二天你会想再次阅读，只是为了确认它们真的那么好。”
- en: 'After: “Your mouth goes dry as the last word trembles in your mind, compelling
    you to return the next day, just to relive the thrill and confirm they were really
    that good.”'
  id: totrans-687
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 之后：“当最后一个字在你的脑海中颤抖时，你的嘴会干涸，这促使你第二天回来，只是为了重温那份激动，并确认它们真的那么好。”
- en: 'Address Potential Reader Scepticism: Given the high praise you give to competition
    entries, some readers might feel intimidated or sceptical. Acknowledging and addressing
    these feelings can help you connect with them and reassure them.'
  id: totrans-688
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 面对潜在读者的怀疑：鉴于你对竞赛作品的极高评价，一些读者可能会感到害怕或怀疑。承认并解决这些感受可以帮助你与他们建立联系，并使他们放心。
- en: 'After discussing the high quality of entries, you might add: “It’s normal to
    feel daunted by such high standards, but remember, every great writer started
    somewhere. This book is about bridging that gap.”'
  id: totrans-689
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在讨论了参赛作品的优质之后，你可能会补充：“面对如此高的标准，感到畏惧是正常的，但请记住，每一位伟大的作家都是从某个地方开始的。这本书是关于弥合这一差距的。”
- en: By integrating these suggestions, you’ll enhance the readability and impact
    of your writing, making your advice even more compelling and accessible. Keep
    writing, and remember, your unique voice is your greatest strength!
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 通过整合这些建议，你会增强你写作的可读性和影响力，使你的建议更具吸引力和可及性。继续写作，并记住，你独特的声音是你最大的优势！
- en: Thanks AI!
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢AI！
- en: '18'
  id: totrans-692
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '18'
- en: '350 words: Pros and Cons of Using AI for Creative Writing'
  id: totrans-693
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 350字：使用AI进行创意写作的利弊
- en: So now we know that for the time being AI generated content is not that good,
    should we use it?
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: 所以现在我们知道，目前AI生成的内容并不那么好，我们应该使用它吗？
- en: 'Here are the Pros:'
  id: totrans-695
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 这里是优点：
- en: 1\. Enhanced Creativity and Inspiration
  id: totrans-696
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 增强创造力和灵感
- en: One thing ChatGPT can easily do is give you lists. And for a writer I mean lists
    of ideas, plot lines, and characters.
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以轻松做到的一件事是给你列出清单。对于一个作家来说，我指的是想法、情节线和角色的清单。
- en: 2\. Increased Productivity
  id: totrans-698
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 提高生产力
- en: ChatGPT can dramatically speed up the writing process. The software can generate
    first drafts and suggest revisions, AI tools can also assist in proof-reading,
    copy editing and reviewing your texts.
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT可以显著加快写作过程。该软件可以生成初稿并建议修订，AI工具还可以协助校对、复制编辑和审查你的文本。
- en: 3\. Educational Tool
  id: totrans-700
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 教育工具
- en: For novice writers, AI can be an invaluable learning aid. It offers practical
    insights into the mechanics of writing, enabling learners to improve their craft
    through imitation and experimentation.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 对于新手作家来说，AI可以是一个无价的辅助学习工具。它提供了对写作机制的实用见解，使学习者能够通过模仿和实验来提高他们的技艺。
- en: 4\. Language Enhancement
  id: totrans-702
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 语言提升
- en: AI can suggest different word choices, correct grammar, even standardise your
    style.
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: AI可以建议不同的措辞选择，纠正语法，甚至标准化你的风格。
- en: Cons of Using AI for Creative Writing
  id: totrans-704
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用AI进行创意写作的缺点
- en: 1\. Diminished Authenticity
  id: totrans-705
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 真实性降低
- en: The content generated by AI is never unique, and it struggles to be original.
    The unique experiences, emotions, and insights of the human condition are what
    resonate most with readers, and these are unknown and unknowable to an AI.
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成的内容永远不会是独特的，它很难做到原创。人类条件中独特的经历、情感和洞察力是读者最能产生共鸣的，而这些对AI来说是未知且无法知晓的。
- en: 2\. Overreliance and Skill Atrophy
  id: totrans-707
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 过度依赖与技能退化
- en: There’s a risk that if you use on AI tools this could erode your own writing
    skills. A bit like relying on a spell-checking software or a calculator.
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 有风险的是，如果你使用AI工具，这可能会侵蚀你自己的写作技能。有点像依赖拼写检查软件或计算器。
- en: 3\. Copyright and Originality Issues
  id: totrans-709
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 版权和原创性问题
- en: A lawsuit has already been won in the US saying AI content cannot be copyrighted.
    If this judgement holds, then if your content is AI generated, you cannot make
    any money from its sale.
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 美国已经有一场诉讼胜诉，称AI生成的内容不能获得版权。如果这一判决成立，那么如果你的内容是AI生成的，你将无法从其销售中获得任何收益。
- en: 4\. Homogenization of Style
  id: totrans-711
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 风格同质化
- en: AI models are trained on vast datasets of existing text, potentially leading
    to outputs that lean towards the average of what’s been previously written. This
    results in a homogenous style that is easy (ish) to spot.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型是在大量现有文本数据集上训练的，这可能导致输出结果偏向于之前所写内容的平均值。这导致了一种易于（相对容易）识别的同质化风格。
- en: 5\. Ethical Concerns
  id: totrans-713
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 伦理问题
- en: There are ethical considerations, particularly in how AI might perpetuate biases
    found in its training data. Biases that might perpetuating stereotypes and reinforcing
    societal inequalities. Women your place is in the kitchen, the AI says so!
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 存在着伦理考量，尤其是AI可能会在其训练数据中持续存在的偏见。这些偏见可能会延续刻板印象并加强社会不平等。AI会说：“女性的位置在厨房！”
- en: '19'
  id: totrans-715
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '19'
- en: 250 words on how to recognise AI generated fiction.
  id: totrans-716
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 250字关于如何识别AI生成的小说。
- en: As we have already seen, recognizing AI-generated fiction, including flash fiction,
    involves looking for certain telltale signs that differentiate it from human stories.
    While AI can create compelling narratives, there are subtle clues in the text
    that hint at its non-human origin.
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们已经看到的，识别AI生成的小说，包括闪小说，需要寻找某些明显的迹象，这些迹象将其与人类故事区分开来。虽然AI可以创造引人入胜的叙事，但文本中存在一些细微的线索，暗示其非人类起源。
- en: 'Watch out for:'
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：
- en: Lack of Emotional Depth
  id: totrans-719
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 情感深度不足
- en: AI-generated fiction often lacks the emotional depth within human experience
    that comes naturally to human writers. Characters may lack complexity or undergo
    developments that feel forced or unnatural. Emotional scenes might not hit the
    mark due to the AI’s inability to fully grasp and convey the subtleties of human
    emotions.
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成的小说通常缺乏人类作家自然流露的情感深度。角色可能缺乏复杂性，或者经历的发展感觉生硬或不自然。由于AI无法完全理解和传达人类情感的细微差别，情感场景可能无法击中要害。
- en: Inconsistent Character Voice
  id: totrans-721
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 角色声音不一致
- en: In flash fiction, where every word counts, character voice is paramount. AI
    might struggle to maintain a consistent and unique voice for each character, especially
    over the span of a short story. Human authors, conversely, imbue their characters
    with distinct voices reflective of their backgrounds, personalities, and experiences,
    something AI-generated texts might fail to capture convincingly.
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 在闪小说中，每个词都很重要，角色声音至关重要。AI可能难以保持每个角色的声音一致且独特，尤其是在短篇小说的跨度内。相反，人类作者会赋予他们的角色反映其背景、个性和经历的独特声音，这是AI生成的文本可能无法令人信服地捕捉到的。
- en: Odd or Out-of-Place Details
  id: totrans-723
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 奇怪或不合时宜的细节
- en: AI models can sometimes introduce details that, while factually accurate, feel
    oddly placed or irrelevant to the story’s flow. These missteps in narrative coherence
    can disrupt the immersive quality of fiction, revealing the non-human hand behind
    the work.
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型有时会引入一些细节，虽然事实准确，但感觉放置得奇怪或不相关于故事流程。这些叙事连贯性的失误可能会破坏小说的沉浸感，揭示出作品背后非人类的手笔。
- en: Surface-Level Interactions and Dialogues
  id: totrans-725
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 表面化互动和对话
- en: The interactions and dialogues in AI-generated fiction tend to be more surface-level,
    lacking the subtlety and depth that come from genuine human interaction. Dialogue
    may feel stilted or overly formal, missing the idiosyncrasies and imperfections
    that characterize real human speech.
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: AI生成的小说中的互动和对话往往更表面化，缺乏真正人类互动带来的微妙和深度。对话可能显得生硬或过于正式，缺少了真实人类语言的特征和不足。
- en: As a writer, you probably also read more than most. Train yourself to recognise
    a human vs. an AI voice. Learn to appreciate the human touch of original writing.
    Keep your wits about you and be critical of what you read, and you can be sure
    the value of original human creativity will continue undiminished.
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名作家，你可能也读得比大多数人多。训练自己区分人类声音和AI声音。学会欣赏原创写作中的人类触感。保持你的机智，对你所读的内容保持批判性，你就可以确信原创人类创造力的价值将继续保持不变。
- en: '20'
  id: totrans-728
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '20'
- en: '150 words to conclude: Over to you…'
  id: totrans-729
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 150字总结：轮到你了…
- en: Congratulations! You made it to the end of this book on how to use AI to improve
    your flash fiction.
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜！你已经读完了这本书，关于如何使用AI来提高你的闪小说。
- en: And I apologise for this being a mere introduction. Even as I finalise this
    text, I am testing new writing AIs to see how they can help me improve my writing.
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 我为这仅仅是一个介绍表示歉意。即使在我完成这篇文本的同时，我正在测试新的写作AI，看看它们如何帮助我提高我的写作。
- en: In case you are wondering, I did use ChatGPT to plan this book outline, and
    I also used it as a proofreader.
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你有所疑问，我确实使用了ChatGPT来规划这本书的大纲，我还用它作为校对者。
- en: The idea of writing each chapter as 500 words only came from my writing group.
    This challenge actually made the book a lot more interesting to write. I also
    found it was something the AI just could not do without resorting to lots of repetition
    and padding. So, I wrote all the final copy myself.
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 将每一章写成500字的想法来自我的写作小组。这个挑战实际上让这本书的写作变得更加有趣。我还发现，AI在没有大量重复和填充的情况下无法做到这一点。所以，我亲自写了所有最终稿件。
- en: I hope this book helps you on your writing journey.
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这本书能帮助你开启写作之旅。
- en: Remember, no one has to like your writing other than you. So, enjoy.
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，除了你自己，没有人必须喜欢你的写作。所以，享受吧。
- en: '21'
  id: totrans-736
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '21'
- en: '200 words: About me'
  id: totrans-737
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 200字：关于我
- en: 'Hello, my name is Sally Dickson, and I write under the pen name Sally Ann Melia.
    I have published two Science Fantasy series: Dodecahedral a Science Fiction Thriller
    set on future Earth, and Aliens In, a cozy SF mystery series imaging First Contact
    in today’s world. That’s over 1,000,000 words published and over 25,000 books
    and eBooks ordered through Amazon.'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 你好，我叫Sally Dickson，我以笔名Sally Ann Melia写作。我已经出版了两个科幻系列：未来地球背景下的科幻惊悚小说《十二面体》，以及一个温馨的科幻神秘系列《入侵者》，想象在当今世界中的首次接触。这已经超过100万字的出版，以及通过亚马逊订购的超过25,000本书和电子书。
- en: But that’s not all…
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 但这还不算全部…
- en: As Sally Dickson, I am an elected town councillor for Farnham. Located just
    40 minutes south-west of London, this Regency town is said to have been visited
    by Jane Austin who towards the end of her life lived near Chorley House, Petersfield
    just a short drive away.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 作为Sally Dickson，我是Farnham镇选出的镇议员。位于伦敦西南方向40分钟处，这个摄政时期的城镇据说曾被简·奥斯汀访问过，她在生命的最后几年住在离这里不远的车里菲尔德的Chorley
    House。
- en: Since 2017, I have organised events for the Farnham Flash Festival, Farnham
    Fringe and Farnham Literary Festival, specifically writer’s panels, workshops
    and of course the Farnham Flash Fiction competition. As organiser and early-stage
    reader, I have read all the entries some 1,000 entries over seven years.
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 自2017年以来，我一直在组织Farnham Flash Festival、Farnham Fringe和Farnham Literary Festival的活动，特别是作家讨论会、研讨会，当然还有Farnham
    Flash Fiction比赛。作为组织者和早期读者，我在七年的时间里阅读了所有参赛作品，大约有1,000篇。
- en: I started the competition in part because I was curious to know ‘when it comes
    to writing short fiction - how good is the competition?’ I now realize most flash
    fiction writers are exceptionally skilled. From my experience, what makes a winning
    entry can sometimes feel like fairy dust and most jump out at the very first read-through.
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始参加比赛部分原因是因为我对“当涉及到写短篇小说时——比赛有多好？”感到好奇。我现在意识到，大多数闪小说作家都非常有技巧。根据我的经验，获奖作品有时感觉像童话中的魔法粉末，大多数作品在第一次阅读时就能脱颖而出。
