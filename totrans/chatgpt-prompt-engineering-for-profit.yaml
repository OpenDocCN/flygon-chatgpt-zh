  type: TYPE_NORMAL
  zh: '****与迭代改进相比，迭代改进是在迭代中逐步改进，而问题分解则更多地关于分析和分解问题，无需不断回顾每个组成部分。每个子问题都是单独解决的，然后它们被组合在一起。'
