- en: 14Hybrid Learning DynamicsA Comparative Study of Traditional, ChatGPT-Driven
    and Hybrid Educational Strategies
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Said Benlakhdar, Karim lkamel, Mohammed Rziza, and Rachid Oulad Haj Thami
  prefs: []
  type: TYPE_NORMAL
- en: 'DOI: [10.1201/9781032716350-14](http://doi.org/10.1201/9781032716350-14)'
  prefs: []
  type: TYPE_NORMAL
- en: 14.1 Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 14.1.1 Background
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In recent years, the emergence of information and communication technologies,
    in particular artificial intelligence (AI) and machine learning (ML), has brought
    about significant transformations in many sectors of society ([Chatterjee and
    Bhattacharjee 2020](#ch22.xhtml#r615); [Huang 2021](#ch22.xhtml#r626); [Ouyang
    et al. 2022](#ch22.xhtml#r648)). These advances have also had a profound impact
    on educational methodology ([Matovu et al. 2023](#ch22.xhtml#r638); [Won et al.
    2023](#ch22.xhtml#r659)). Among the various applications of generative AI, the
    Chat Generative Pre-trained Transformer (ChatGPT) tool has emerged as a powerful
    solution, reshaping the dissemination, acquisition and evaluation of knowledge
    ([Costello 2023](#ch22.xhtml#r616); [Dalalah and Dalalah 2023](#ch22.xhtml#r617);
    [Lim et al. 2023](#ch22.xhtml#r635); [Pavlik 2023](#ch22.xhtml#r650); [Ratten
    and Jones 2023](#ch22.xhtml#r652)).
  prefs: []
  type: TYPE_NORMAL
- en: Conditional Generative Pre-trained Transformer or ChatGPT ([OpenAI 2023](#ch22.xhtml#r647)),
    a publicly accessible AI model, has witnessed tremendous uptake since its launch
    in November 2022\. Due to its ability to synthesise large volumes of text and
    generate content, it has become a popular choice for teaching and learning ([Baidoo-Anu
    and Ansah 2023](#ch22.xhtml#r609)). Since then, ChatGPT has been tested for a
    wide range of tasks, the most important of which is writing. Other perhaps more
    innovative areas include writing essays and predicting historical events ([McGee
    2023](#ch22.xhtml#r639)), talking, drawing and editing with visual models ([Wu
    et al. 2023](#ch22.xhtml#r661)) and examining facts and myths in ChatGPT responses
    ([Alkaissi and McFarlane 2023](#ch22.xhtml#r607)).
  prefs: []
  type: TYPE_NORMAL
- en: The integration of AI chatbots in education, providing immediate responses to
    students’ enquiries and serving as easily accessible learning resources regardless
    of time and location, has been a notable development ([Hwang and Chang 2023](#ch22.xhtml#r628);
    [Kasthuri and Balaji 2021](#ch22.xhtml#r630)). Simultaneously, the application
    of advanced ML algorithms to analyse student data has empowered educators to pinpoint
    areas where individual students may need additional support, thus enhancing the
    efficacy of teaching strategies ([Zhang 2022](#ch22.xhtml#r663)). Additionally,
    the rise of AI-based learning systems has paved the way for adaptive learning.
    These systems, tailored to adjust to each student’s learning pace and style, deliver
    personalised educational content. This customisation has shown its potential in
    improving learning outcomes and increasing engagement levels ([Liu et al. 2020](#ch22.xhtml#r636);
    [Mogavi et al. 2021](#ch22.xhtml#r641); [Xia et al. 2023](#ch22.xhtml#r662)).
  prefs: []
  type: TYPE_NORMAL
- en: The evolution of learning, a pivotal facet of cognitive development, has witnessed
    a myriad of transformations across history. Modern approaches transcend conventional
    boundaries, encompassing a diverse array of innovative techniques. From traditional
    modes like visual and auditory learning to contemporary methods such as online
    courses, adaptive learning platforms and the integration of ChatGPT as a versatile
    educational tool, the landscape of education has evolved into a multifaceted tapestry
    designed to cater to diverse learning styles and meet the demands of today’s society
    ([Grájeda et al. 2024](#ch22.xhtml#r622); [Karam 2023](#ch22.xhtml#r629); [Archambault
    et al. 2023](#ch22.xhtml#r608)).
  prefs: []
  type: TYPE_NORMAL
- en: 14.1.2 Methodology
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This chapter proposes an in-depth comparative study examining traditional education,
    ChatGPT-guided methodologies, as well as a hybrid approach harmoniously integrating
    the two approaches ([Sabbagh and Resh 2016](#ch22.xhtml#r654)). The investigation
    takes place at the Mohammed V University, Faculty of Educational Sciences in Rabat,
    Morocco, with a particular focus on students enrolled in the Educational Technology
    and Pedagogical Innovation programme. The research focuses closely on participants
    actively involved in a workshop organised in July 2023.
  prefs: []
  type: TYPE_NORMAL
- en: 14.1.3 Chapter organisation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The rest of the chapter is structured as follows: [Section 14.2](#ch22.xhtml#h1-087)
    presents the different learning methods, including our new hybrid learning approach.
    [Section 14.3](#ch22.xhtml#h1-088) describes the research methodology, materials
    and methods used. Section 14.4 presents and discusses the results of our experiment,
    while [Section 14.5](#ch22.xhtml#h1-090) concludes the chapter.'
  prefs: []
  type: TYPE_NORMAL
- en: 14.2 Learning methods
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Learning, at the heart of cognitive evolution, has metamorphosed through a variety
    of methods over time. Today, contemporary approaches have transcended traditional
    boundaries to embrace a range of innovative techniques. These multifaceted learning
    methods include formal teaching, self-study, online learning environments, interactive
    simulations, learning by doing and emerging technologies such as AI. Each of these
    modalities offers unique perspectives, adapting to the varied needs of learners
    and reflecting the dynamic evolution of contemporary society. In this era of digital
    transformation, exploring these learning methods becomes essential to understanding
    how education adapts to modern challenges and promotes the acquisition of knowledge
    in innovative ways.
  prefs: []
  type: TYPE_NORMAL
- en: 14.2.1 The classical method of education
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The traditional expository method, which involves a unidirectional transmission
    of knowledge from teacher to learners, has been widely criticised in educational
    literature. This approach, characterised by lectures, presentations and demonstrations,
    positions students in a passive role ([Biggs et al. 2022](#ch22.xhtml#r613)),
    passively receiving information. This criticism is in line with the work which
    highlights the often limited and outdated nature of this method, underlining its
    inadequacy in promoting active learner participation.
  prefs: []
  type: TYPE_NORMAL
- en: The focus on memorising concepts and definitions through repeated exercises,
    without sufficient consideration of the relevance of this information in the context
    of students’ daily lives or social realities, has been identified as a major shortcoming
    of the traditional expositive method. These criticisms fuel the current debate
    on more innovative pedagogical approaches. Valério stresses the importance of
    a transition to more horizontal educational strategies, highlighting the need
    for active methodologies where teachers play the role of mediators, facilitating
    learning in a collaborative way ([Sharonova and Avdeeva 2021](#ch22.xhtml#r657)).
  prefs: []
  type: TYPE_NORMAL
- en: Thus, the growing rejection of the traditional expository method in favour of
    more dynamic and interactive pedagogical practices is in line with ideas put forward
    by researchers ([Gómez and Suárez 2023](#ch22.xhtml#r621)). These authors argue
    in favour of active methodologies that promote learning that is more engaged,
    dialogical and centred on interaction between teachers and learners. This reflects
    an evolving understanding of education, highlighting the need for approaches more
    aligned with learners’ needs and contexts. Embarking on an exploration of diverse
    learning styles is crucial for crafting an inclusive and effective educational
    setting. From visual and auditory learning to interactive methods, online courses
    and adaptive platforms, each approach offers unique insights.
  prefs: []
  type: TYPE_NORMAL
- en: 14.2.1.1 Visual learning
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Visual learning is characterised by a preference for the use of images, diagrams,
    charts and other visual aids to facilitate the understanding and retention of
    information ([Pasqualotto et al. 2024](#ch22.xhtml#r649); [Zhu et al. 2021](#ch22.xhtml#r664)).
    These learners get the most out of their educational experience when they are
    exposed to visual elements that enable them to visualise concepts and assimilate
    them more effectively. To optimise this learning, it is recommended to use various
    tools such as mind maps, diagrams, flashcards and videos, which offer dynamic
    and interactive visual representations. In addition, the use of colour-coded notes
    can also be particularly effective, associating specific hues with categories
    or concepts to enhance retention and understanding of information ([Hackl and
    Ermolina 2019](#ch22.xhtml#r623); [Moore and Dwyer, 1994](#ch22.xhtml#r642)).
  prefs: []
  type: TYPE_NORMAL
- en: By incorporating these tips into the teaching process, educators can create
    an environment conducive to visual learning, providing visual learners with a
    more enriching educational experience tailored to their predominant learning style
    ([ManfredoVieira et al. 2018](#ch22.xhtml#r637)).
  prefs: []
  type: TYPE_NORMAL
- en: 14.2.1.2 Auditory learning
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Auditory learning characterises a preference for receiving and understanding
    information through listening and speaking. Auditory learners are particularly
    receptive to verbal information and benefit from active listening to assimilate
    concepts ([Fitria 2023](#ch22.xhtml#r618); [Wright and Zhang 2009](#ch22.xhtml#r660)).
    To optimise their learning, activities such as attending lectures, taking part
    in group discussions and recording and listening to lectures are recommended.
    These methods enable auditory learners to take full advantage of their ability
    to absorb information auditorily, promoting better retention and understanding
    of the subjects studied ([Robinson and Summerfield 1996](#ch22.xhtml#r653)).
  prefs: []
  type: TYPE_NORMAL
- en: Practical tips can also be incorporated into their study methods, such as the
    use of mnemonics and the verbal explanation of concepts aloud. Mnemonic devices,
    such as creating rhymes or associating concepts with distinctive sounds, are effective
    mnemonic strategies for reinforcing memory. Similarly, explaining ideas or problems
    aloud not only helps to consolidate understanding but also creates an auditory
    resonance that makes it easier to retrieve information when revising later. By
    adopting these tips, auditory learners can make full use of their predominant
    learning style and optimise their learning experience ([Kayalar and Kayalar 2017](#ch22.xhtml#r631)).
  prefs: []
  type: TYPE_NORMAL
- en: 14.2.1.3 Learning to read and write
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Learning to read and write is an educational process that focuses on the acquisition
    of reading and writing skills. This teaching approach focuses on understanding
    the written language and the ability to communicate in writing. Learners engaged
    in this mode of learning are often encouraged to read actively, take notes and
    create written lists to organise and memorise information. Reading becomes an
    essential gateway to in-depth understanding of topics, while writing enables learners
    to express their ideas in a structured and coherent way ([Nation and Macalister
    2020](#ch22.xhtml#r644); [Cambourne and Crouch 2022](#ch22.xhtml#r614); [Liberg
    1990](#ch22.xhtml#r634)).
  prefs: []
  type: TYPE_NORMAL
- en: The process of learning to read and write encourages the development of crucial
    skills such as critical thinking, analysis and written communication. By encouraging
    the creation of notes and lists, this approach provides learners with an organised
    way of summarising and revisiting key information ([Hamid and Jahan 2023](#ch22.xhtml#r624)).
    In addition, the interactive aspect of writing, whether essays, reports or simply
    personal reflections, helps to reinforce conceptual understanding while improving
    written language skills. Learning to read and write thus plays a central role
    in the development of academic and intellectual skills, offering learners a powerful
    means of navigating the wealth of knowledge available through written language.
  prefs: []
  type: TYPE_NORMAL
- en: 14.2.1.4 Interactive learning
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Interactive learning characterises a learning style that thrives within educational
    environments that encourage active participation and constant interaction with
    learning materials. These learners get the most out of their learning experience
    when they are involved in engaging activities, such as group discussions, collaborative
    projects and interactive simulations. Interaction-based teaching approaches provide
    interactive learners with the opportunity to put their knowledge into practice
    in a concrete way, enhancing retention and understanding of concepts ([Saleem
    et al. 2022](#ch22.xhtml#r655); [Barker 1994](#ch22.xhtml#r611); [Baldwin and
    Sabry 2003](#ch22.xhtml#r610)).
  prefs: []
  type: TYPE_NORMAL
- en: Modern technologies have contributed greatly to the development of interactive
    learning, with tools such as e-learning platforms, virtual simulations and interactive
    educational applications ([Minka and Picard 1997](#ch22.xhtml#r640)). These resources
    offer learners the flexibility to explore, experiment and solve problems interactively,
    encouraging greater engagement in the learning process. By implementing teaching
    methods that encourage interaction, educators can create dynamic environments
    that stimulate the interest of interactive learners and help them develop practical
    skills while consolidating their theoretical knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: 14.2.1.5 Online courses and tutorials
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Online courses and tutorials represent a major transformation in the education
    landscape, offering learners around the world unprecedented access to structured
    courses, tutorials and educational videos. Leading platforms such as Coursera,
    Khan Academy and YouTube have emerged as pillars of this educational revolution,
    offering a diversity of content tailored to different levels of learning. These
    online resources enable learners to follow courses given by world experts in various
    fields, thus extending access to quality education beyond geographical borders
    ([Kimok and Heller-Ross 2008](#ch22.xhtml#r633)). The major advantage of online
    courses is their flexibility, allowing learners to follow their own pace and tailor
    their learning to their specific needs. Video tutorials, in particular, offer
    an immersive approach, allowing learners to visualise and understand concepts
    in a dynamic way ([Kem 2022](#ch22.xhtml#r632); [Hauger and Köck 2007](#ch22.xhtml#r625);
    [Batanero-Ochaíta et al. 2021](#ch22.xhtml#r612)). This increased accessibility
    to online education has a significant impact on the democratisation of knowledge,
    offering learning opportunities to those who might otherwise be constrained by
    time, resources or location. In this way, online courses and tutorials represent
    an educational revolution that transcends the traditional boundaries of learning,
    making education more accessible and adaptable to the diverse needs of today’s
    learners.
  prefs: []
  type: TYPE_NORMAL
- en: 14.2.1.6 Adaptive learning platforms
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Adaptive learning platforms are a major innovation in education, offering a
    personalised approach by adjusting the learning experience according to each learner’s
    individual progress and performance. This continuous adaptation is based on intelligent
    algorithms that analyse the individual’s responses and interactions, enabling
    the platform to deliver more targeted educational content. These platforms exploit
    AI technologies to create tailored learning paths, enabling learners to progress
    at their own pace while filling specific gaps in their knowledge ([Smyrnova-Trybulska
    et al. 2022](#ch22.xhtml#r658); [Gligorea et al. 2023](#ch22.xhtml#r620); [Muñoz
    et al. 2022](#ch22.xhtml#r643); [Kem 2022](#ch22.xhtml#r632); [Batanero-Ochaíta
    et al. 2021](#ch22.xhtml#r612)).
  prefs: []
  type: TYPE_NORMAL
- en: The key advantage of adaptive learning platforms lies in their ability to provide
    a more effective and efficient learning experience. By identifying the strengths
    and weaknesses of each learner, these platforms can deliver learning materials
    that are precisely matched to their needs, promoting better knowledge retention.
    This increased personalisation helps to create more inclusive educational environments,
    adapting to different learning styles and offering opportunities for continuous
    improvement. In this way, adaptive learning platforms play an essential role in
    transforming education into an individualised, dynamic and results-oriented process.
  prefs: []
  type: TYPE_NORMAL
- en: 14.2.2 ChatGPT as a learning tool
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Developed by OpenAI, ChatGPT has become a valuable asset in the field of education,
    presenting innovative opportunities and solutions for learners. Several key aspects
    highlight the versatility of integrating ChatGPT into educational practice ([Forman
    et al. 2023](#ch22.xhtml#r619)).
  prefs: []
  type: TYPE_NORMAL
- en: 'Algorithm 1 Algorithm: ChatGPT Operation'
  prefs: []
  type: TYPE_NORMAL
- en: '|  **1\. model ← loadPretrainedModel()** |'
  prefs: []
