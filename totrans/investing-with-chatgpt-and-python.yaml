- en: Introduction to the Stock Market and Cryptocurrency Platforms
  id: totrans-219
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 股票市场和加密货币平台简介
- en: Understanding the stock market
  id: totrans-220
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解股票市场
- en: The stock market is where the shares of listed companies are traded. Buying
    a share means owning a share in the company and being entitled to a fraction of
    its profits. Shares can be bought and sold on different stock exchanges, such
    as the New York Stock Exchange (NYSE) or Nasdaq.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 股票市场是上市公司股份进行交易的地方。购买股份意味着拥有公司的股份，并有权获得其利润的一部分。股份可以在不同的证券交易所买卖，如纽约证券交易所（NYSE）或纳斯达克。
- en: How does it work?
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 它是如何工作的？
- en: 'Listed companies: Companies sell shares to raise the funds they need to grow.
    When a company decides to sell shares for the first time, it is called an Initial
    Public Offering (IPO).'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 列表公司：公司通过出售股份来筹集他们成长所需的资金。当一家公司决定首次出售股份时，这被称为首次公开募股（IPO）。
- en: 'Investors: Any person or institution can buy shares. Investors hope that the
    value of the shares will rise over time, enabling them to sell at a higher price
    than the initial purchase price, thus generating a profit.'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 投资者：任何个人或机构都可以购买股份。投资者希望随着时间的推移，股份的价值会上升，使他们能够以高于初始购买价格的价格出售，从而产生利润。
- en: 'Brokers: To buy or sell shares, investors go through brokers who execute buy
    or sell orders on stock exchanges.'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 证券经纪商：投资者通过证券经纪商买卖股份，经纪商在证券交易所执行买卖订单。
- en: 'Stock market indices: Indices, such as the Dow Jones or S&P 500, group together
    a number of stocks and provide a general indication of market health.'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 股票市场指数：例如道琼斯指数或标普500指数，将许多股票组合在一起，并提供市场健康状况的一般指示。
- en: Understanding Cryptocurrencies
  id: totrans-227
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解加密货币
- en: Cryptocurrencies are digital currencies that use cryptography to secure transactions
    and control the creation of new units. Unlike traditional currencies, they are
    not issued by a central authority, such as a central bank.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币是使用密码学来保障交易和控制新单位创造的数字货币。与传统的货币不同，它们不是由中央机构，如中央银行发行的。
- en: The main cryptocurrencies
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 主要加密货币
- en: 'Bitcoin (BTC): Created in 2009, this is the first and best-known cryptocurrency.
    It serves as a store of value and a means of transaction.'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 比特币（BTC）：于2009年创建，这是第一种也是最为人熟知的加密货币。它作为价值储存手段和交易手段。
- en: 'Ethereum (ETH): Launched in 2015, it enables the creation of smart contracts
    and decentralized applications (dApps) on its blockchain.'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 以太坊（ETH）：于2015年推出，它在其区块链上允许创建智能合约和去中心化应用（dApps）。
- en: 'Solana (SOL): Solana is a blockchain founded in 2017 by Anatoly Yakovenko with
    a unique Proof of Stake consensus mechanism. The Solana network focuses on high
    transaction throughput and fast processing times. .'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: Solana (SOL)：Solana 是由 Anatoly Yakovenko 于 2017 年创立的一个区块链，它拥有独特的权益证明共识机制。Solana
    网络专注于高交易吞吐量和快速处理时间。
- en: How does it work?
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 它是如何工作的？
- en: 'Blockchain: The underlying technology of cryptocurrencies, blockchain is a
    decentralized, secure digital ledger. Each transaction is recorded in a block,
    linked to other blocks forming a chain.'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 区块链：加密货币的底层技术，区块链是一个去中心化、安全的数字账本。每一笔交易都记录在一个区块中，与其他区块相连形成链。
- en: 'Miners: In the case of Bitcoin and other cryptocurrencies, transactions are
    validated by miners who use the computing power of their computers to solve complex
    mathematical problems. As a reward, they receive new units of cryptocurrency.'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 矿工：在比特币和其他加密货币的情况下，交易由矿工验证，矿工使用他们的计算机的计算能力来解决复杂的数学问题。作为回报，他们获得新的加密货币单位。
- en: 'Wallets: To store and manage their cryptocurrencies, users use digital wallets,
    which can be software, mobile apps or secure hardware devices.'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 钱包：为了存储和管理他们的加密货币，用户使用数字钱包，这些钱包可以是软件、移动应用或安全的硬件设备。
- en: 'Cryptocurrency Exchanges: Platforms like Binance, Coinbase or Kraken allow
    users to buy, sell and exchange cryptocurrencies for other cryptocurrencies or
    traditional currencies.'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币交易所：像 Binance、Coinbase 或 Kraken 这样的平台允许用户购买、出售和交换加密货币，以及其他加密货币或传统货币。
- en: Investing in the stock market and cryptocurrencies
  id: totrans-238
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 投资股市和加密货币
- en: 'Advantages :'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 优势：
- en: 'Return potential: Equities can offer attractive returns over the long term
    thanks to dividends and capital appreciation. Cryptocurrencies, while volatile,
    have shown spectacular returns for some investors.'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 投资回报潜力：股票可以通过股息和资本增值在长期内提供有吸引力的回报。尽管波动，加密货币对于一些投资者来说已经显示出惊人的回报。
- en: 'Diversification: investing in equities and cryptocurrencies allows you to diversify
    your portfolio, reducing the risks associated with concentrated investments.'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 多样化：投资股票和加密货币可以使您多样化您的投资组合，降低集中投资相关的风险。
- en: 'Easy access: Thanks to the internet and modern technology, it''s now easier
    than ever to buy and sell stocks or cryptocurrencies via online platforms.'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 易于访问：得益于互联网和现代技术，现在通过在线平台买卖股票或加密货币比以往任何时候都更容易。
- en: 'Risks :'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 风险：
- en: 'Volatility: Stock and cryptocurrency markets can be highly volatile. Prices
    can fluctuate rapidly, resulting in significant gains or losses in a short space
    of time.'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 波动性：股市和加密货币市场可能非常波动。价格可以迅速波动，导致短时间内出现显著的盈亏。
- en: 'Regulation: Cryptocurrencies are still relatively new and subject to changing
    regulations, which can affect their value and acceptance.'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 监管：加密货币仍然相对较新，并受到不断变化的监管的影响，这可能会影响其价值和接受度。
- en: 'Security: Cryptocurrencies are the target of cyberattacks. It''s essential
    to secure your wallets and use reliable platforms.'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 安全性：加密货币是网络攻击的目标。保护您的钱包并使用可靠的平台至关重要。
- en: Investing in the stock market and cryptocurrencies may seem intimidating to
    novices, but with a basic understanding, it becomes more accessible. IT tools
    and modern technologies play a crucial role in this democratization of investment.
    Thanks to them, even non-expert investors can develop effective strategies to
    manage and optimize their investments.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 投资股市和加密货币对于新手来说可能显得令人生畏，但有了基本理解，它就变得更加容易接近。IT 工具和现代技术在这个投资民主化过程中发挥着关键作用。多亏了它们，即使是非专业投资者也能制定有效的策略来管理和优化他们的投资。
- en: What is a Cryptocurrency?
  id: totrans-248
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是加密货币？
- en: A cryptocurrency is a form of digital or virtual currency that relies on cryptography
    to secure transactions and control the creation of new units. Unlike traditional
    currencies, such as the euro or the dollar, cryptocurrencies are not issued by
    a central authority, such as a central bank or government. They operate on a decentralized
    basis, thanks to a technology called blockchain.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币是一种数字或虚拟货币，它依赖于密码学来保障交易和控制新单位的创造。与欧元或美元等传统货币不同，加密货币不是由中央机构，如中央银行或政府发行的。它们在区块链这种技术的去中心化基础上运行。
- en: '![](images/image-CP9EPGS1.jpg)'
  id: totrans-250
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-CP9EPGS1.jpg)'
- en: Blockchain technology
  id: totrans-251
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 区块链技术
- en: The blockchain is the foundation of cryptocurrencies. It is a distributed, immutable
    and transparent ledger that records all transactions made with a particular cryptocurrency.
    Each transaction is grouped with other transactions to form a block, which is
    then added to a chain of previously validated blocks, hence the name "blockchain".
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 区块链是加密货币的基础。它是一个分布式、不可变且透明的账本，记录了使用特定加密货币进行的所有交易。每笔交易与其他交易一起组成一个区块，然后被添加到先前验证的区块链中，因此得名“区块链”。
- en: The blockchain's decentralization means that there is no single point of control,
    making it extremely resistant to fraud and manipulation. All transactions are
    verified by a network of nodes (computers connected to the network), which use
    consensus algorithms to validate and record transactions.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 区块链的去中心化意味着没有单一的控制点，这使得它对欺诈和操纵具有极强的抵抗力。所有交易都由一个节点网络（连接到网络的计算机）验证，这些节点使用共识算法来验证和记录交易。
- en: Cryptocurrency characteristics
  id: totrans-254
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 加密货币特性
- en: 'Decentralization: Unlike fiat currencies, cryptocurrencies are not controlled
    by a government or central financial institution. They rely on a network of distributed
    nodes that work together to validate transactions and secure the network.'
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 去中心化：与法定货币不同，加密货币不由政府或中央金融机构控制。它们依赖于一个由分布式节点组成的网络，这些节点共同验证交易并保护网络。
- en: 'Anonymity and Pseudonymity: Cryptocurrency transactions are often more anonymous
    than those made with traditional currencies. However, this depends on the cryptocurrency
    used. For example, Bitcoin is not totally anonymous, but rather pseudonymous,
    meaning that users'' identities are not revealed, although their addresses are
    traceable.'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 匿名性和假名性：加密货币交易通常比使用传统货币的交易更具匿名性。然而，这取决于所使用的加密货币。例如，比特币并非完全匿名，而是假名，这意味着用户的身份不会被透露，尽管他们的地址是可以追踪的。
- en: 'Security: Transactions are secured by complex cryptographic techniques, making
    it extremely difficult to falsify or duplicate cryptocurrency units.'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 安全性：交易通过复杂的加密技术得到保障，使得伪造或复制加密货币单位变得极其困难。
- en: 'Transparency: Although user identities are protected, the blockchain itself
    is transparent, meaning that all transactions can be viewed by anyone. This makes
    it possible to verify the authenticity of transactions and prevent fraud.'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 透明度：尽管用户身份受到保护，但区块链本身是透明的，这意味着任何人都可以查看所有交易。这使得验证交易的真实性并防止欺诈成为可能。
- en: 'Irreversibility: Once a transaction has been confirmed and added to the blockchain,
    it cannot be reversed or modified. This ensures the integrity of transactions,
    but also means that errors or fraud cannot be easily corrected.'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 不可逆性：一旦交易被确认并添加到区块链中，它就不能被撤销或修改。这确保了交易的完整性，但也意味着错误或欺诈无法轻易纠正。
- en: The best-known cryptocurrencies
  id: totrans-260
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最知名的加密货币
- en: 'Bitcoin (BTC): Created in 2009 by a pseudonymous entity known as Satoshi Nakamoto,
    Bitcoin is the first and best-known cryptocurrency. It is often considered a store
    of value, similar to digital gold.'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 比特币 (BTC)：由化名为中本聪的匿名实体于2009年创建，比特币是第一种也是最为知名的加密货币。它通常被视为一种价值储存手段，类似于数字黄金。
- en: 'Ethereum (ETH): Ethereum introduced the concept of "smart contracts", which
    are autonomous programs that execute automatically when certain conditions are
    met. Ethereum is the second-largest cryptocurrency by market capitalization.'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 以太坊 (ETH)：以太坊引入了“智能合约”的概念，这些是当满足某些条件时自动执行的自主程序。以太坊是市值第二大的加密货币。
- en: 'Ripple (XRP): Designed primarily to facilitate international payments, Ripple
    is often used by financial institutions to transfer large sums of money quickly
    and cheaply.'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 瑞波币 (XRP)：主要设计用于促进国际支付，瑞波币常被金融机构用于快速且低成本地转移大量资金。
- en: 'Litecoin (LTC): Created by Charlie Lee in 2011, Litecoin is a simplified version
    of Bitcoin, with faster transaction times and a higher maximum bid.'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 莱特币 (LTC)：由查理·李于2011年创建，莱特币是比特币的简化版，具有更快的交易时间和更高的最大出价。
- en: Cryptocurrencies represent a revolution in the financial world, offering a decentralized,
    secure and transparent alternative to traditional monetary systems. They open
    the way to new investment and innovation opportunities, particularly in algorithmic
    trading, where volatility and speed of transactions are key factors in maximizing
    profits.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币代表了金融世界的一次革命，为传统货币系统提供了一个去中心化、安全和透明的替代方案。它们开辟了新的投资和创新机会，尤其是在算法交易领域，其中波动性和交易速度是最大化利润的关键因素。
- en: Definition of a Stablecoin
  id: totrans-266
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 稳定币的定义
- en: What is a Stablecoin?
  id: totrans-267
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是稳定币？
- en: A stablecoin is a form of cryptocurrency designed to maintain a stable value,
    unlike most other cryptocurrencies such as Bitcoin or Ethereum, which are known
    for their volatility. Stablecoins are generally backed by a reference asset, such
    as a fiat currency (like the US dollar), a commodity (like gold) or even a basket
    of assets. This backing enables stablecoins to maintain a relatively constant
    value.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 稳定币是一种旨在维持稳定价值的加密货币形式，与比特币或以太坊等其他大多数加密货币不同，后者以其波动性而闻名。稳定币通常由一种参考资产支持，如法定货币（如美元）、商品（如黄金）或甚至是一篮子资产。这种支持使稳定币能够维持相对稳定的价值。
- en: '![](images/image-1MZZ4BLH.png)'
  id: totrans-269
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-1MZZ4BLH.png)'
- en: Types of Stablecoins
  id: totrans-270
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 稳定币的类型
- en: 'Fiat-Collateralized Stablecoins:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 法定货币抵押稳定币：
- en: These stablecoins are backed by fiat currency reserves held by a central entity,
    usually a bank. For each unit of stablecoin in circulation, there is one unit
    of fiat currency (such as a US dollar) held in reserve.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 这些稳定币由中央实体（通常是银行）持有的法定货币储备金支持。对于流通中的每一单位稳定币，都有一单位法定货币（如美元）作为储备。
- en: 'Examples:'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Tether (USDT): Probably the best-known stablecoin, Tether is backed by a pool
    of US dollars.'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: Tether (USDT)：可能是最知名的稳定币，Tether 以美元储备池为后盾。
- en: 'USD Coin (USDC): Another popular stablecoin, also backed by US dollar reserves.'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: USD Coin (USDC)：另一种流行的稳定币，也由美元储备金支持。
- en: 'Crypto-Collateralized Stablecoins:'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币抵押稳定币：
- en: These stablecoins are backed by reserves of other cryptocurrencies. As the underlying
    cryptocurrencies can be volatile, these stablecoins are often over-guaranteed
    (i.e. a 150% cryptocurrency value can be maintained to guarantee a 100% stablecoin).
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 这些稳定币由其他加密货币的储备金支持。由于基础加密货币可能波动，这些稳定币通常过度担保（即维持150%的加密货币价值以担保100%的稳定币）。
- en: 'Example:'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'DAI: A decentralized stablecoin backed by cryptocurrencies like Ethereum, issued
    by the MakerDAO protocol.'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: DAI：由 MakerDAO 协议发行的、以加密货币（如以太坊）为支持的去中心化稳定币。
- en: 'Algorithmic Stablecoins :'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 算法稳定币：
- en: These stablecoins use algorithms and smart contracts to manage their supply
    and keep their price stable. Unlike asset-backed stablecoins, these have no real
    reserves, but use market mechanisms to stabilize their value.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 这些稳定币使用算法和智能合约来管理其供应并保持其价格稳定。与资产支持型稳定币不同，这些稳定币没有实际储备，而是使用市场机制来稳定其价值。
- en: 'Example:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'TerraUSD (UST): Before its failure, this stablecoin used an algorithmic mechanism
    to maintain its peg at 1 USD, by adjusting the supply of tokens in circulation.'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: TerraUSD (UST)：在其失败之前，这种稳定币使用算法机制来维持其与1美元的挂钩，通过调整流通中代币的供应量。
- en: Advantages of Stablecoins
  id: totrans-284
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 稳定币的优势
- en: 'Price stability: The main advantage of stablecoins is their ability to maintain
    a stable value, making them particularly useful for daily transactions, cross-border
    payments and as a store of value.'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 价格稳定性：稳定币的主要优势是它们维持稳定价值的能力，这使得它们在日常交易、跨境支付和作为价值储存手段方面特别有用。
- en: 'Transparency and security: stablecoins, especially those backed by assets,
    benefit from the transparency of the reserves behind them, often verified by regular
    audits. What''s more, they are secured by blockchain technology, offering enhanced
    security over traditional fiat currencies.'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 透明度和安全性：稳定币，尤其是那些由资产支持的稳定币，得益于其背后储备的透明度，通常通过定期审计进行验证。更重要的是，它们由区块链技术保障，提供比传统法定货币更高的安全性。
- en: 'Access and speed: Stablecoins provide instant access to global financial markets
    without the need for intermediaries such as banks. They can be transferred quickly
    and at low cost, making them an efficient alternative for international transactions.'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 访问和速度：稳定币提供了无需通过银行等中介机构的即时访问全球金融市场，它们可以快速且低成本地转账，这使得它们成为国际交易的高效替代方案。
- en: 'Use in Trading: Due to their stability, stablecoins are commonly used in cryptocurrency
    trading. They allow traders to "park" their gains in a stable asset without leaving
    the crypto ecosystem, making risk management easier.'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 交易中使用：由于它们的稳定性，稳定币在加密货币交易中通常被广泛使用。它们允许交易者将收益“停放”在一种稳定资产中，而无需离开加密货币生态系统，这使得风险管理更加容易。
- en: Stablecoin limits
  id: totrans-289
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 稳定币的限制
- en: 'Confidence in the Issuer: For asset-backed stablecoins, confidence in the issuer
    is crucial. If the issuer does not have sufficient reserves or is not transparent
    about its practices, the stability of the stablecoin may be compromised.'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 对发行者的信心：对于资产支持型稳定币，对发行者的信心至关重要。如果发行者没有足够的储备或对其做法不透明，稳定币的稳定性可能会受到损害。
- en: 'Regulation: Stablecoins are coming under increasing scrutiny from regulators,
    who are concerned about their potential impact on the global financial system.
    This could lead to restrictions or stricter regulatory requirements.'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 监管：稳定币正受到监管机构的日益关注，他们担心其可能对全球金融系统产生的影响。这可能导致限制或更严格的监管要求。
- en: 'Algorithmic Failure Risk: For algorithmic stablecoins, there is a risk that
    the stabilization mechanisms will fail, resulting in a loss of value anchoring,
    as has happened with some projects.'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 算法失败风险：对于算法稳定币，存在稳定机制可能失败的风险，导致价值锚定损失，就像一些项目所发生的那样。
- en: Stablecoins play an essential role in the cryptocurrency ecosystem, offering
    stability that allows users to protect themselves against the volatility of the
    crypto markets while remaining in the digital world. Whether for trading, payments
    or as a store of value, stablecoins have become an indispensable tool for investors
    and developers of decentralized applications.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 稳定币在加密货币生态系统中发挥着至关重要的作用，提供了稳定性，使用户能够在数字世界中保护自己免受加密市场波动的影响。无论是用于交易、支付还是作为价值储存，稳定币已成为投资者和去中心化应用程序开发者的不可或缺的工具。
- en: Explanation of the back-and-forth principle between Stablecoin and Cryptocurrencies
  id: totrans-294
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 稳定币与加密货币之间往复原则的解释
- en: Introduction to the back-and-forth between Stablecoin and Cryptocurrencies
  id: totrans-295
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 稳定币与加密货币之间往复的介绍
- en: The principle of moving back and forth between stablecoins and cryptocurrencies
    is a strategy commonly used by traders to manage the risks associated with cryptocurrency
    volatility. The idea is to switch from cryptocurrency to stablecoin when market
    conditions become uncertain or to secure gains, and conversely, to switch back
    to cryptocurrency when conditions are more favorable.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 在稳定币和加密货币之间移动的原则是交易者常用以管理与加密货币波动相关的风险的一种策略。想法是在市场条件变得不确定或为了锁定收益时从加密货币切换到稳定币，相反，当条件更加有利时，切换回加密货币。
- en: This mechanism offers traders considerable flexibility, enabling them to navigate
    in a volatile environment while maintaining a certain stability in the value of
    their assets.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 这种机制为交易者提供了相当大的灵活性，使他们能够在波动环境中导航，同时保持其资产价值的一定稳定性。
- en: Why use Stablecoins?
  id: totrans-298
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么使用稳定币？
- en: Cryptocurrencies like Bitcoin, Ethereum, and others are notorious for their
    volatility. One day, the value of a cryptocurrency can rise dramatically, and
    the next it can fall just as quickly. This volatility can be an advantage for
    experienced traders looking to capitalize on these price movements, but it also
    presents significant risks.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 比特币、以太坊和其他加密货币以其波动性而闻名。一天，加密货币的价值可能会大幅上升，而第二天它可能会同样迅速下跌。这种波动性对于希望利用这些价格变动的经验丰富的交易者来说可能是一个优势，但它也带来了重大风险。
- en: Stablecoins offer an alternative by providing a stable value that is less subject
    to market fluctuations. By using stablecoins, traders can avoid extreme volatility
    while remaining within the cryptocurrency ecosystem.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 稳定币通过提供更少受市场波动影响的价值提供了一个替代方案。通过使用稳定币，交易者可以在保持加密货币生态系统内的同时避免极端波动。
- en: How does it work?
  id: totrans-301
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 它是如何工作的？
- en: 'The to-and-fro between stablecoins and cryptocurrencies can be done manually
    by a trader or automatically by a trading algorithm. Here''s how it usually works:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 稳定币和加密货币之间的往复交易可以由交易者手动完成，或者由交易算法自动完成。以下是它通常是如何工作的：
- en: 'Transition to Stablecoin in Volatility :'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 在波动中过渡到稳定币：
- en: When market indicators show signs of high volatility, or when the price of a
    cryptocurrency appears to be peaking, the trader may decide to sell that cryptocurrency
    and buy a stablecoin. This locks in gains or limits potential losses by holding
    an asset whose value is stable.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 当市场指标显示出高波动性的迹象，或者当加密货币的价格似乎达到顶峰时，交易者可能会决定出售该加密货币并购买稳定币。通过持有价值稳定的资产，这可以锁定收益或限制潜在损失。
- en: 'Back to Cryptocurrency in Times of Growth:'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 回到增长时期的加密货币：
- en: When market conditions become more favorable, for example if the price of a
    cryptocurrency starts to show signs of recovery or growth, the trader can sell
    his stablecoins to buy cryptocurrency. This strategy makes it possible to profit
    from potential price rises.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 当市场条件变得更加有利时，例如，如果加密货币的价格开始显示出复苏或增长的迹象，交易者可以将他的稳定币出售以购买加密货币。这种策略使得从潜在的价格上涨中获利成为可能。
- en: Advantages of the Back-and-Forth Strategy
  id: totrans-307
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 往返策略的优势
- en: 'Risk management: One of the main advantages of this strategy is its ability
    to manage risk. By switching to stablecoin in times of uncertainty, a trader can
    avoid significant losses due to market volatility.'
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 风险管理：这种策略的主要优势之一是其管理风险的能力。在不确定时期转向稳定币，交易者可以避免由于市场波动而造成的重大损失。
- en: 'Flexibility: Stablecoins enable traders to react quickly to market changes
    without having to convert their funds into fiat currency, which can be slower
    and more costly.'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 灵活性：稳定币使交易者能够快速对市场变化做出反应，而无需将他们的资金转换为法定货币，这可能会更慢且成本更高。
- en: 'Optimizing earnings: By securing earnings in a stablecoin and waiting for more
    favorable market conditions to reinvest, a trader can optimize profits.'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 优化收益：通过在稳定币中锁定收益并等待更有利的市场条件进行再投资，交易者可以优化利润。
- en: 'Simplicity: For less experienced traders, this strategy can offer a simpler
    approach to navigating the crypto-currency market, reducing the need to constantly
    monitor market fluctuations.'
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 简单性：对于经验较少的交易者，这种策略可以提供一种更简单的方法来导航加密货币市场，减少对持续监控市场波动的需求。
- en: '![](images/image-0BEOTJGX.png)'
  id: totrans-312
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-0BEOTJGX.png)'
- en: 'Practical example: A back-and-forth scenario'
  id: totrans-313
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实际例子：来回场景
- en: Suppose a trader owns 1 Bitcoin (BTC) worth USD 50,000\. The market is showing
    signs of an imminent correction, and the trader decides to secure his gains. He
    sells his Bitcoin and buys 50,000 USD in Tether (USDT), a stablecoin backed by
    the US dollar.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 假设一个交易者拥有价值50,000美元的1比特币（BTC）。市场显示出即将修正的迹象，交易者决定锁定他的收益。他卖掉他的比特币，用50,000美元购买Tether（USDT），这是一种由美元支持的稳定币。
- en: A few days later, the price of Bitcoin drops to 40,000 USD. The trader, seeing
    a buying opportunity, decides to sell his USDT to buy Bitcoin. With his USD 50,000
    in USDT, he can now buy 1.25 Bitcoin. If the Bitcoin price rises back to USD50,000,
    the trader will now have USD62,500 in Bitcoin, making a profit of USD12,500 with
    this strategy.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 几天后，比特币的价格降至40,000美元。看到买入机会的交易者决定卖掉他的USDT来购买比特币。用他50,000美元的USDT，他现在可以购买1.25比特币。如果比特币价格回升至50,000美元，交易者现在将拥有价值62,500美元的比特币，通过这种策略赚取12,500美元的利润。
- en: Back and forth automation
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 来回自动化
- en: Traders can also automate this process by using trading algorithms. These algorithms
    can be programmed to monitor the market and execute trades according to predefined
    criteria, such as specific price levels, technical indicators, or volatility thresholds.
    Automation makes it possible to react more quickly to market conditions and remove
    emotion from decision-making.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 交易者也可以通过使用交易算法来自动化这一过程。这些算法可以被编程来监控市场并根据预定义的标准执行交易，例如特定的价格水平、技术指标或波动阈值。自动化使得能够更快地应对市场状况并从决策中去除情绪因素。
- en: ––––––––
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: ––––––––
- en: Going back and forth between stablecoins and cryptocurrencies is an essential
    strategy for navigating the cryptocurrency market, offering an effective way to
    manage risk while maximizing profit opportunities. Whether manual or automated,
    this mechanism enables traders to protect their assets while remaining flexible
    in the face of market volatility.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 在稳定币和加密货币之间来回移动是导航加密货币市场的一种基本策略，提供了一种有效的方法来管理风险同时最大化利润机会。无论是手动还是自动化，这种机制使交易者能够在面对市场波动时保护他们的资产，同时保持灵活性。
- en: Definition of a Cryptocurrency Exchange Platform
  id: totrans-320
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 加密货币交易平台定义
- en: What is a Cryptocurrency Exchange Platform?
  id: totrans-321
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是加密货币交易平台？
- en: A cryptocurrency exchange platform (also known as a "cryptocurrency exchange"
    or simply "exchange") is an online service that enables users to buy, sell, trade
    and often store cryptocurrencies. These platforms play a crucial role in the cryptocurrency
    ecosystem, providing an interface between buyers and sellers and facilitating
    transactions in the digital asset market.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币交易平台（也称为“加密货币交易所”或简称“交易所”）是一种在线服务，使用户能够购买、出售、交易并通常存储加密货币。这些平台在加密货币生态系统中发挥着关键作用，为买卖双方提供接口，并促进数字资产市场的交易。
- en: '![](images/image-0T0LOJM7.jpg)'
  id: totrans-323
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-0T0LOJM7.jpg)'
- en: Cryptocurrency exchanges can be centralized or decentralized, each offering
    distinct advantages and disadvantages.
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币交易所可以是集中的或去集中的，每种都提供独特的优势和劣势。
- en: Types of Exchange Platforms
  id: totrans-325
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交易所平台类型
- en: 'Centralized Exchanges (CEX) :'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 集中交易所（CEX）：
- en: 'Definition: A centralized exchange is managed by a company or organization
    that acts as an intermediary between buyers and sellers. This entity controls
    transactions, ensures liquidity, and generally holds users'' funds in digital
    wallets on the platform.'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 定义：中心化交易所由一家公司或组织管理，该组织作为买卖双方之间的中介。该实体控制交易，确保流动性，并在平台上通常持有用户的数字钱包中的资金。
- en: 'Examples:'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Binance: One of the world''s largest exchange platforms by transaction volume,
    Binance offers a wide range of cryptocurrencies and trading services.'
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: Binance：按交易量计算，是世界上最大的交易所平台之一，Binance提供广泛的加密货币和交易服务。
- en: 'Coinbase: Popular for its simplicity and accessibility to beginners, Coinbase
    enables the buying and selling of cryptocurrencies with fiat currencies.'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: Coinbase：因其简单性和对初学者的易用性而受欢迎，Coinbase允许使用法定货币买卖加密货币。
- en: 'Advantages :'
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 优点：
- en: 'Ease of use: centralized exchanges often offer intuitive user interfaces, making
    them accessible even to beginners.'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 易用性：中心化交易所通常提供直观的用户界面，使得即使是初学者也能使用。
- en: 'High liquidity: Due to their popularity, these platforms generally have high
    liquidity, enabling fast transactions at competitive prices.'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 高流动性：由于它们的受欢迎程度，这些平台通常具有高流动性，能够在具有竞争力的价格下快速交易。
- en: 'Additional services: In addition to trading, these platforms often offer features
    such as staking, loans and futures.'
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 额外服务：除了交易外，这些平台通常还提供诸如质押、贷款和期货等功能。
- en: 'Disadvantages :'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 缺点：
- en: 'Risk of piracy: Centralized exchanges are potential targets for hackers, as
    they hold large quantities of funds.'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 盗窃风险：中心化交易所是黑客的潜在目标，因为它们持有大量资金。
- en: 'Lack of control: Users do not directly hold the private keys to their wallets,
    which means that the exchange actually controls the funds.'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏控制：用户不直接持有其钱包的私钥，这意味着交易所实际上控制着资金。
- en: 'Decentralized Exchanges (DEX) :'
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 去中心化交易所（DEX）：
- en: 'Definition: A decentralized exchange operates without a centralized intermediary,
    using smart contracts to facilitate transactions directly between users (peer-to-peer).
    Users retain full control of their funds, and transactions are processed on the
    blockchain.'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 定义：去中心化交易所没有中央中介，使用智能合约直接在用户之间（点对点）促进交易。用户保留对其资金的完全控制权，并且交易在区块链上处理。
- en: 'Examples:'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: 'Uniswap: One of the most popular DEXs, Uniswap enables users to exchange ERC-20
    tokens on the Ethereum blockchain.'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: Uniswap：最受欢迎的去中心化交易所之一，Uniswap允许用户在以太坊区块链上交换ERC-20代币。
- en: 'PancakeSwap: Operating on the Binance Smart Chain, PancakeSwap offers similar
    features to Uniswap but with lower transaction fees.'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: PancakeSwap：在币安智能链上运行，PancakeSwap提供与Uniswap类似的功能，但交易费用更低。
- en: 'Advantages :'
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 优点：
- en: 'Enhanced security: Users retain full control of their funds, reducing the risk
    of centralized piracy.'
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 增强安全性：用户保留对其资金的完全控制权，降低了集中化盗窃的风险。
- en: 'Anonymity: DEX often requires fewer identity checks, offering greater confidentiality.'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 匿名性：DEX通常需要较少的身份验证，提供更高的隐私性。
- en: 'No censorship: Transactions cannot be blocked or censored by a central entity.'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 无审查：交易不能被中央实体阻止或审查。
- en: 'Disadvantages :'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 缺点：
- en: 'Complexity: DEX can be more difficult to use, requiring greater technical knowledge.'
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂性：DEX可能更难以使用，需要更多的技术知识。
- en: 'Lower liquidity: Compared with CEXs, DEXs can have lower liquidity, which can
    lead to slippage during large transactions.'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 流动性较低：与中心化交易所（CEXs）相比，去中心化交易所（DEXs）可能具有较低的流动性，这可能导致在大额交易中产生滑点。
- en: 'Transaction fees: On blockchain networks such as Ethereum, transaction fees
    can be high during periods of congestion.'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 交易费用：在以太坊等区块链网络中，在拥堵期间交易费用可能很高。
- en: Key features of an Exchange Platform
  id: totrans-351
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交易所平台的关键特性
- en: 'Spot trading :'
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 即时交易：
- en: Spot trading is the immediate purchase or sale of a cryptocurrency at the current
    market price. Most users start with spot trading, which is simple and straightforward.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 即时交易是在当前市场价格下立即购买或出售加密货币。大多数用户从即时交易开始，因为它简单直接。
- en: 'Margin Trading :'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 保证金交易：
- en: Some exchanges offer margin trading, where users can borrow funds to increase
    their trading position. Although potentially lucrative, margin trading is also
    risky, as it can lead to amplified losses.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 一些交易所提供保证金交易，用户可以借款以增加他们的交易头寸。尽管可能有利可图，但保证金交易也存在风险，因为它可能导致损失放大。
- en: 'Futures and Options :'
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 期货和期权：
- en: Derivatives such as futures and options allow users to speculate on the future
    price of a cryptocurrency. These tools are more complex and are generally aimed
    at experienced traders.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 期货和期权等衍生品允许用户对加密货币的未来价格进行投机。这些工具更为复杂，通常针对经验丰富的交易者。
- en: 'Staking and DeFi:'
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 存储和DeFi：
- en: Many centralized platforms offer staking services where users can lock their
    cryptocurrencies to earn interest. Some also integrate DeFi (Decentralized Finance)
    services such as loans and liquidity pools.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 许多中心化平台提供存储服务，用户可以将他们的加密货币锁定以赚取利息。一些平台还集成了DeFi（去中心化金融）服务，如贷款和流动性池。
- en: 'API for Algorithmic Trading :'
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 算法交易API：
- en: Exchanges often offer application programming interfaces (APIs) that algorithmic
    traders can use to automate their trading strategies.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 交易所通常提供算法交易者可以使用的应用程序编程接口（API），以自动化他们的交易策略。
- en: '![](images/image-WKSO44S2.jpg)'
  id: totrans-362
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-WKSO44S2.jpg)'
- en: Security on Exchanges
  id: totrans-363
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交易所的安全性
- en: 'Security is a major concern when using cryptocurrency exchanges. Users should
    be aware of security measures such as:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用加密货币交易所时，安全性是一个主要关注点。用户应了解以下安全措施：
- en: 'Two-factor authentication (2FA): An additional layer of security that requires
    confirmation via a separate device to log in or carry out transactions.'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 双因素认证（2FA）：登录或执行交易时需要通过单独设备进行确认的额外安全层。
- en: 'Cold storage: Some platforms store the majority of users'' funds offline, in
    so-called "cold storage" wallets, to protect them against piracy.'
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 冷存储：一些平台将大多数用户的资金离线存储，在所谓的“冷存储”钱包中，以保护其免受盗版。
- en: 'Security audits: reputable exchanges often call in external audits to verify
    the security of their systems.'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 安全审计：信誉良好的交易所通常会邀请外部审计以验证其系统的安全性。
- en: Exchange platforms are the cornerstone of the cryptocurrency ecosystem, facilitating
    market access for users around the world. Understanding the differences between
    centralized and decentralized exchanges, as well as the associated features and
    risks, is essential for any cryptocurrency trader, whether beginner or experienced.
    By choosing the right platform and adopting robust security practices, traders
    can maximize their chances of success in this dynamic market.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 交易所平台是加密货币生态系统的基石，为全球用户提供市场接入。了解中心化交易所和去中心化交易所之间的差异，以及相关的特性和风险，对于任何加密货币交易者，无论是新手还是经验丰富的交易者，都是至关重要的。通过选择正确的平台并采用稳健的安全实践，交易者可以最大限度地提高在动态市场中取得成功的可能性。
- en: Definition of Trading Tools (Spot) for Exchanges Enabling Trading
  id: totrans-369
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 交易所启用交易的交易工具（现货）定义
- en: Introduction to Spot Trading Tools
  id: totrans-370
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 现货交易工具简介
- en: Spot trading is the most basic type of trading on cryptocurrency exchange platforms.
    It involves the immediate purchase or sale of digital assets at the current market
    price. Transactions are settled instantly, and assets are transferred immediately
    from buyer to seller. To carry out these transactions, exchanges provide a range
    of trading tools that enable users to monitor the market, analyze data and execute
    their trades efficiently.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 指数交易是加密货币交易平台最基本的一种交易类型。它涉及以当前市场价格立即购买或出售数字资产。交易即时结算，资产立即从买家转移到卖家。为了执行这些交易，交易所提供一系列交易工具，使用户能够监控市场、分析数据并高效地执行交易。
- en: '![](images/image-MY77NC1C.jpg)'
  id: totrans-372
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-MY77NC1C.jpg)'
- en: Main Spot Trading Tools on Exchanges
  id: totrans-373
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交易所上的主要现货交易工具
- en: 'Livre d''Ordres (Order Book) :'
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 订单簿（Livre d'Ordres）：
- en: 'The order book is an electronic ledger where buy and sell orders for a specific
    cryptocurrency are listed. It is often divided into two sections:'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 订单簿是一个电子账本，其中列出了特定加密货币的买卖订单。它通常分为两个部分：
- en: 'Bid: Buy orders where traders wish to buy at a specific price.'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 出价：交易者希望以特定价格购买的买入订单。
- en: 'Ask (Sell Offers): Sell orders where traders wish to sell at a specific price.'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 询问（卖出报价）：交易者希望以特定价格卖出的卖出订单。
- en: The order book is dynamic, updating in real time to reflect current transactions.
    Traders use this information to understand the depth of the market, i.e. the liquidity
    available at different price levels.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 订单簿是动态的，实时更新以反映当前交易。交易者使用这些信息来了解市场深度，即不同价格水平上的流动性。
- en: 'Price Charts :'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 价格图表：
- en: Price charts are visual tools that show the evolution of a cryptocurrency's
    price over a given period. They can be configured to display different periods
    (e.g. minutes, hours, days) and chart types (e.g. candlesticks, lines, bars).
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 价格图表是显示特定时间段内加密货币价格演变的视觉工具。它们可以配置为显示不同的时间段（例如，分钟、小时、天）和图表类型（例如，蜡烛图、线条、条形图）。
- en: 'Candlestick charts: The most common in trading, candlestick charts show the
    opening, closing, high and low price for a given period. They offer an overview
    of price movements and are often used for technical analysis.'
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: K线图：在交易中最常见，K线图显示了特定时间段的开盘价、收盘价、最高价和最低价。它们提供了价格变动的概述，常用于技术分析。
- en: 'Order types :'
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 订单类型：
- en: 'Market Order: A market order is executed immediately at the best available
    price. It is used when the trader wants to buy or sell instantly, without worrying
    about obtaining a specific price.'
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 市场订单：市场订单立即以最佳可用价格执行。当交易者希望立即购买或出售，而不关心获得特定价格时使用。
- en: 'Limit Order: A limit order sets a specific price at which the trader wishes
    to buy or sell. The order will only be executed when the market reaches this price.'
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 限价订单：限价订单设定了交易者希望购买或出售的特定价格。只有当市场达到此价格时，订单才会被执行。
- en: 'Stop-Limit Order: This order combines a stop order (triggering an action when
    the price reaches a certain level) with a limit order. It allows you to buy or
    sell an asset only when specific conditions are met.'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 停止限价订单：此订单将停止订单（当价格达到一定水平时触发行动）与限价订单结合。它允许您仅在满足特定条件时购买或出售资产。
- en: 'Stop-Market order: Similar to the stop-limit order, but once the price level
    has been reached, it becomes a market order and is executed immediately at the
    best available price.'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 停止市场订单：与停止限价订单类似，但一旦达到价格水平，它就变成市场订单并立即以最佳可用价格执行。
- en: 'Technical indicators :'
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 技术指标：
- en: 'Technical indicators are analytical tools that help traders understand market
    trends and predict future price movements. Here are a few commonly used indicators:'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 技术指标是帮助交易者理解市场趋势和预测未来价格变动的分析工具。以下是一些常用指标：
- en: 'Moving Average: Used to smooth price fluctuations, it shows the general market
    trend over a given period.'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 移动平均线：用于平滑价格波动，它显示了特定时间段内的市场趋势。
- en: 'Relative Strength Index (RSI): Measures the speed and magnitude of recent price
    movements to determine whether an asset is overbought or oversold.'
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 相对强弱指数 (RSI)：衡量最近价格变动的速度和幅度，以确定资产是否被过度购买或过度卖出。
- en: 'Bollinger Bands: Used to measure market volatility, they consist of a central
    moving average surrounded by two bands representing volatility levels.'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 布林带：用于衡量市场波动性，由一个中心移动平均线及其周围代表波动水平的两个带组成。
- en: 'MACD (Moving Average Convergence Divergence): A momentum indicator that shows
    the relationship between two price moving averages and helps identify trend signals.'
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: MACD（移动平均线收敛发散）：一个动量指标，显示两个价格移动平均线之间的关系，并有助于识别趋势信号。
- en: These indicators are often integrated directly into exchange price charts, enabling
    traders to overlay and analyze them in real time.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标通常直接集成到交易所价格图表中，使交易者能够实时叠加和分析它们。
- en: 'Trade History :'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 交易历史：
- en: This tool enables traders to view a detailed record of recent transactions for
    a specific trading pair. The transaction history shows the prices at which trades
    have been executed, as well as the volumes traded, providing valuable information
    on recent market activity.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 此工具使交易者能够查看特定交易对最近交易的详细记录。交易历史显示了交易执行的价格，以及交易量，提供了关于最近市场活动的有价值信息。
- en: 'Market Depth :'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 市场深度：
- en: Market depth is a visual representation of supply and demand for a particular
    cryptocurrency. It shows the amount of assets available at different price levels
    in the order book. High market depth means that there is a large quantity of assets
    available, which can help minimize slippage when making large trades.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 市场深度是特定加密货币供需的视觉表示。它显示了订单簿中不同价格水平上的资产数量。高市场深度意味着有大量资产可用，这有助于在执行大额交易时最小化滑点。
- en: 'Trading Pair Converter :'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 交易对转换器：
- en: Most exchanges offer a conversion tool that allows traders to see the value
    of their assets in different cryptocurrencies or fiat currencies. This is particularly
    useful for traders who work with multiple trading pairs.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数交易所提供转换工具，允许交易者查看其资产在不同加密货币或法定货币中的价值。这对于处理多个交易对的交易者来说特别有用。
- en: 'Price Alerts :'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 价格警报：
- en: Price alerts allow traders to set notifications that alert them when the price
    of a cryptocurrency reaches a certain level. It's a valuable tool for monitoring
    the markets without having to be constantly in front of your screen.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 价格警报允许交易者设置通知，当加密货币的价格达到某个水平时提醒他们。这是一个在无需始终在屏幕前的情况下监控市场的宝贵工具。
- en: Strategic Use of Spot Trading Tools
  id: totrans-402
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 现货交易工具的战略使用
- en: The combination of these tools enables traders to develop effective trading
    strategies. For example, a trader can use the order book to assess buying and
    selling pressure in the market, while monitoring price charts and technical indicators
    for emerging trends. By setting up limit orders and price alerts, he can automate
    part of his strategy to react quickly to market movements.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具的结合使交易者能够开发有效的交易策略。例如，交易者可以使用订单簿来评估市场的买卖压力，同时监控价格图表和技术指标以发现趋势。通过设置限价订单和价格警报，他可以自动化其策略的一部分，以便快速对市场变动做出反应。
- en: The spot trading tools offered by exchanges are essential for navigating the
    cryptocurrency market effectively. Whether you're a beginner or an experienced
    trader, understanding and using these tools wisely enables you to make informed
    decisions and optimize your trading performance. As you progress in trading, learning
    how to integrate these tools into complex strategies becomes a key skill for success
    in this volatile market.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 交易所提供的现货交易工具对于有效地导航加密货币市场至关重要。无论你是初学者还是有经验的交易者，明智地理解和使用这些工具都能帮助你做出明智的决定并优化你的交易表现。随着你在交易中的进步，学习如何将这些工具整合到复杂策略中成为在这个波动市场中取得成功的关键技能。
- en: The advantages and disadvantages of using a centralized trading platform
  id: totrans-405
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用集中式交易平台的优缺点
- en: Advantages of trading with an Exchange
  id: totrans-406
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与交易所交易的优势
- en: 'Trading via a cryptocurrency exchange platform offers several advantages that
    greatly facilitate the experience of traders, especially those who focus on algorithmic
    trading. Here are some of the main advantages:'
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 通过加密货币交易所平台进行交易为交易者提供了几个优势，这些优势极大地简化了交易体验，尤其是那些专注于算法交易的人。以下是一些主要优势：
- en: 1\. Backtesting databases
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 回测数据库
- en: Cryptocurrency exchanges generally provide access to historical market data,
    which is essential for backtesting your trading strategies. This data includes
    opening and closing prices, highs, lows and volumes traded over specific periods.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币交易所通常提供访问历史市场数据，这对于回测你的交易策略至关重要。这些数据包括特定时间段的开盘价、收盘价、最高价、最低价和交易量。
- en: 'Direct Data Access: Traders can download historical data directly from exchange
    platforms or via APIs, enabling them to build and refine their strategies with
    precision.'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 直接数据访问：交易者可以直接从交易所平台或通过API下载历史数据，使他们能够精确地构建和改进他们的策略。
- en: 'Data quality: The data provided by exchanges is generally reliable and representative
    of real market conditions, making backtesting more relevant.'
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 数据质量：交易所提供的数据通常可靠且能代表真实市场状况，使回测更具相关性。
- en: 2\. High availability
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 高可用性
- en: Cryptocurrency exchanges typically operate 24 hours a day, 7 days a week, offering
    high availability for transactions and algorithmic trading.
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币交易所通常每天24小时，每周7天运营，为交易和算法交易提供高可用性。
- en: 'Continuous Access: Unlike traditional financial markets, which have opening
    and closing hours, cryptocurrency exchanges allow traders to execute strategies
    at any time, maximizing profit opportunities.'
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 持续访问：与传统金融市场不同，后者有开盘和收盘时间，加密货币交易所允许交易者在任何时间执行策略，最大化盈利机会。
- en: 'Robust infrastructure: Exchanges invest in robust technical infrastructures
    to ensure maximum uptime, minimizing the risk of service interruptions.'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 顽强的基础设施：交易所投资于强大的技术基础设施以确保最大化的正常运行时间，最小化服务中断的风险。
- en: 3\. Tools provided as APIs
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 提供的API工具
- en: Exchanges often offer application programming interfaces (APIs), which are powerful
    tools for algorithmic traders.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 交易所通常提供应用程序编程接口（API），这是算法交易者的强大工具。
- en: 'Simplified programming: APIs enable traders to develop automated scripts that
    can interact directly with the platform to place orders, check balances, retrieve
    real-time market data, and more.'
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 简化编程：API使交易者能够开发自动化脚本，这些脚本可以直接与平台交互以下订单、检查余额、检索实时市场数据等。
- en: 'Customization: Traders can customize their trading strategies using APIs to
    meet their specific needs, making the trading process more flexible and adaptable.'
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 定制化：交易者可以使用API定制他们的交易策略以满足特定需求，使交易过程更加灵活和适应性强。
- en: 'Access to advanced tools: APIs also provide access to advanced features, such
    as margin trading, conditional orders, and risk management functionalities, making
    it possible to build more sophisticated strategies.'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 访问高级工具：API还提供了访问高级功能，如保证金交易、条件订单和风险管理功能，使得构建更复杂的策略成为可能。
- en: Disadvantages of trading with an Exchange
  id: totrans-421
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与交易所交易的缺点
- en: While exchanges offer many advantages, they also entail significant risks that
    traders need to take into account to protect their assets.
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然交易所提供了许多优势，但它们也带来了重大的风险，交易者需要考虑这些风险以保护他们的资产。
- en: 1\. Ownership of Private Keys
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 私钥所有权
- en: When you deposit your cryptocurrencies on an exchange, it's the exchange that
    holds the private keys associated with your digital assets.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在交易所存入你的加密货币时，持有与你数字资产相关的私钥的是交易所。
- en: 'Loss of control: By depositing your funds on an exchange, you technically lose
    direct control of your cryptocurrencies. You depend on the exchange to secure
    your assets, which can be risky.'
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 控制权丧失：通过在交易所存入资金，你实际上失去了对加密货币的直接控制权。你依赖交易所来保护你的资产，这可能会带来风险。
- en: 'Not Your Keys, Not Your Coins: This popular saying in the cryptocurrency community
    emphasizes that if you don''t hold the private keys, you don''t really own the
    cryptocurrencies. This exposes traders to additional risks.'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 不是你的密钥，就不是你的币：这句在加密货币社区中流行的说法强调，如果你不持有私钥，你就真的不拥有加密货币。这使交易者面临额外的风险。
- en: 2\. Platform piracy risk
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 平台盗版风险
- en: Cryptocurrency exchanges are frequent targets for cyberattacks, due to the large
    amounts of digital assets they hold.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币交易所是网络攻击的常见目标，因为它们持有大量数字资产。
- en: 'Loss of assets: In the event of a successful hack, user funds can be stolen.
    Although some exchanges have compensation funds, not all are able to reimburse
    users in the event of loss.'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 资产损失：在成功的黑客攻击中，用户资金可能会被盗。尽管一些交易所设有补偿基金，但并非所有交易所都能在损失发生时向用户赔偿。
- en: 'Variable security: The security of exchanges varies considerably. Some invest
    heavily in advanced security protocols, while others may be more vulnerable to
    attack.'
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 安全性可变：交易所的安全性差异很大。一些在高级安全协议上投入大量资金，而其他可能更容易受到攻击。
- en: 3\. Risk of failure of the Platform
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 平台故障风险
- en: Exchanges are businesses, and like all businesses, they can go bankrupt.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 交易所是商业机构，就像所有商业机构一样，它们可能会破产。
- en: 'Total loss of assets: In the event of bankruptcy, users may not be able to
    recover their funds. Some exchanges have been known to freeze withdrawals during
    financial difficulties, leaving users without access to their assets.'
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 资产完全损失：在破产的情况下，用户可能无法收回他们的资金。一些交易所已知在财务困难期间冻结提款，使用户无法访问其资产。
- en: 'Creditor priority: In bankruptcy proceedings, the assets held by the exchange
    may be used to pay off creditors before users, increasing the risk of loss.'
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 债权人优先权：在破产程序中，交易所持有的资产可能会在用户之前用于偿还债权人，从而增加损失的风险。
- en: 4\. Regulatory risk
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 监管风险
- en: Regulations surrounding cryptocurrencies are still developing in many jurisdictions,
    and rules can change rapidly.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多司法管辖区，围绕加密货币的法规仍在发展中，规则可能会迅速变化。
- en: 'Prohibition of services: Some countries may prohibit or restrict services offered
    by exchanges, such as margin trading, derivatives, or even access to the exchanges
    themselves. This could result in the shutdown of your trading robots or the inability
    to withdraw your funds.'
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 服务禁令：一些国家可能会禁止或限制交易所提供的服务，例如保证金交易、衍生品，甚至是对交易所本身的访问。这可能导致你的交易机器人关闭或无法提取你的资金。
- en: 'Need for Regular Monitoring: Traders need to regularly monitor regulatory developments
    to ensure that their activities remain compliant, and to avoid potential disruptions
    to their trading strategies.'
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 需要定期监控：交易者需要定期监控监管发展，以确保他们的活动保持合规，并避免潜在的交易策略中断。
- en: 5\. Suspension of Services by the Exchange
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 交易所服务暂停
- en: Due to regulations, technical updates or internal decisions, an exchange may
    suspend certain services.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 由于法规、技术更新或内部决策，交易所可能会暂停某些服务。
- en: 'Interruption of Trading Robots: If a service that your trading strategy uses
    is suspended, this could cause your trading robots to stop working, potentially
    resulting in lost opportunities or even direct financial losses.'
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 交易机器人中断：如果你交易策略使用的服务被暂停，这可能导致你的交易机器人停止工作，可能造成失去机会甚至直接的经济损失。
- en: 'Delays and inconveniences: Unexpected suspensions can create major inconveniences,
    especially if they occur during periods of high volatility when automated strategies
    are crucial.'
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 延迟和不便：意外的暂停可能会造成重大不便，尤其是在自动化策略至关重要的波动性高的时期。
- en: Trading with an exchange offers many advantages, including access to databases
    for backtesting, high availability for transactions, and powerful API tools for
    programming. However, these advantages come with significant risks, such as loss
    of control over private keys, hacking risks, potential platform bankruptcy, and
    regulatory uncertainties. It is crucial for traders to understand these risks
    and take appropriate measures, such as using secure wallets to store funds not
    used for active trading, and keeping abreast of regulatory developments to protect
    their investments.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 通过交易所进行交易提供了许多优势，包括访问用于回测的数据库、高交易可用性以及强大的API工具用于编程。然而，这些优势伴随着重大的风险，例如对私钥的控制丧失、黑客风险、潜在的平台破产和监管不确定性。对于交易者来说，了解这些风险并采取适当的措施至关重要，例如使用安全的钱包存储未用于活跃交易的资金，并关注监管发展以保护他们的投资。
- en: Definition of Cryptocurrency Trading
  id: totrans-444
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 加密货币交易的定义
- en: What is Cryptocurrency Trading?
  id: totrans-445
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是加密货币交易？
- en: Cryptocurrency trading involves buying, selling or exchanging cryptocurrencies
    on exchange platforms with the aim of making a profit. Unlike long-term investing,
    where assets are held for an extended period, trading generally involves short-term
    transactions, aiming to take advantage of price fluctuations over short periods,
    ranging from seconds to days.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币交易涉及在交易所平台上购买、出售或交换加密货币，目的是获利。与长期投资不同，长期投资资产会持有较长时间，交易通常涉及短期交易，旨在利用短期内（从几秒到几天）的价格波动。
- en: '![](images/image-7QS7ZIC8.png)'
  id: totrans-447
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-7QS7ZIC8.png)'
- en: Different Types of Cryptocurrency Trading
  id: totrans-448
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不同类型的加密货币交易
- en: 'Day Trading:'
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 日内交易：
- en: Day trading is a short-term trading strategy in which positions are opened and
    closed on the same day. Day traders seek to profit from the small price variations
    that occur throughout the day. This requires constant monitoring of the market
    and a thorough understanding of technical analysis.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 日内交易是一种短期交易策略，头寸在同一天内开仓和平仓。日内交易者寻求从一天中发生的小幅价格变动中获利。这需要持续监控市场并对技术分析有深入理解。
- en: 'Features :'
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 特点：
- en: Fast, frequent operations.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 快速、频繁的操作。
- en: Intensive use of charts and technical indicators.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 大量使用图表和技术指标。
- en: Exposure to intraday volatility risks.
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 暴露于日内波动风险。
- en: 'Swing Trading:'
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 摆动交易：
- en: Swing trading involves capturing the price movements of a cryptocurrency over
    a period of days to weeks. Swing traders try to identify trends or patterns that
    suggest significant price movements, and hold their positions until the anticipated
    movement is realized.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 摆动交易涉及捕捉加密货币在几天到几周内的价格变动。摆动交易者试图识别趋势或模式，这些趋势或模式表明价格将发生重大变动，并持有他们的头寸，直到预期的变动实现。
- en: 'Features :'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: 特点：
- en: Fewer transactions than day trading.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 交易次数少于日内交易。
- en: Using a combination of technical and fundamental analysis.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 结合技术分析和基本面分析。
- en: This strategy is suitable for traders who cannot monitor the market continuously.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 这种策略适合无法持续监控市场的交易者。
- en: 'Scalping :'
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 短线交易：
- en: Scalping is a form of very short-term trading in which traders seek to make
    numerous small profits throughout the day. Scalpers exploit small price fluctuations
    and close their positions in seconds or minutes.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 短线交易是一种非常短期的交易形式，交易者寻求在一天内通过多次小额获利。短线交易者利用小的价格波动，并在几秒或几分钟内平仓。
- en: 'Features :'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 特点：
- en: High transaction volumes.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 高交易量。
- en: Profit-taking on very small price movements.
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 在非常小的价格变动中获利。
- en: Highly dependent on tight spreads and low transaction costs.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 极度依赖于紧密的价差和低交易成本。
- en: 'Long-term trading (Position Trading) :'
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 长期交易（持仓交易）：
- en: Unlike short-term strategies, long-term trading involves holding open positions
    for months or years. Long-term traders focus on macro trends and cryptocurrency
    fundamentals, such as adoption or technology upgrades.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 与短期策略不同，长期交易涉及持有开放头寸数月或数年。长期交易者关注宏观趋势和加密货币基本面，如采用或技术升级。
- en: 'Features :'
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 特点：
- en: Less stress from daily volatility.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 来自每日波动的压力较小。
- en: Based on fundamental rather than technical analysis.
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 基于基本面而非技术分析。
- en: Suitable for investors who believe in the long-term potential of cryptocurrencies.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 适合相信加密货币长期潜力的投资者。
- en: Trading strategies
  id: totrans-473
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交易策略
- en: 'Technical Analysis :'
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 技术分析：
- en: Technical analysis is a method of asset valuation that focuses on past price
    movements and trading volumes to predict future movements. It is based on the
    idea that markets follow trends, and that these trends can be identified using
    charts and technical indicators.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 技术分析是一种资产估值方法，它侧重于过去的价格变动和交易量来预测未来的变动。它基于市场遵循趋势，并且这些趋势可以通过图表和技术指标来识别的理念。
- en: 'Main tools :'
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 主要工具：
- en: 'Moving averages: a simple indicator that smoothes price data to identify directional
    trends.'
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 移动平均线：一个简单的指标，用于平滑价格数据以识别趋势方向。
- en: 'Bollinger Bands: Measure market volatility and help identify overbought or
    oversold conditions.'
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 布林带：衡量市场波动性并帮助识别超买或超卖条件。
- en: 'RSI (Relative Strength Index): Momentum indicator that measures the speed and
    change of price movements.'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: RSI（相对强弱指数）：衡量价格变动速度和变化的动量指标。
- en: 'Fundamental analysis :'
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 基本分析：
- en: Unlike technical analysis, fundamental analysis examines the underlying aspects
    of a cryptocurrency to determine its intrinsic value. This includes studying the
    development team, use cases, technology, partnerships, as well as economic and
    legal aspects.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 与技术分析不同，基本分析检查加密货币的潜在方面以确定其内在价值。这包括研究开发团队、用例、技术、合作伙伴关系，以及经济和法律方面。
- en: 'Main factors :'
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 主要因素：
- en: 'Adoption: The level of adoption by users, companies and governments.'
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 采用：用户、公司和政府采用的水平。
- en: 'Technology: The quality and innovation of blockchain and the network.'
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 技术：区块链和网络的质量和创新。
- en: 'Regulation: Impact of regulations and legislation on cryptocurrency.'
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 监管：法规和立法对加密货币的影响。
- en: 'Refereeing :'
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 裁判：
- en: Arbitrage involves taking advantage of price differences between different exchanges
    to buy a cryptocurrency at a lower price on one exchange and sell it at a higher
    price on another.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 套利涉及利用不同交易所之间的价格差异，在一个交易所以较低的价格购买加密货币，并在另一个交易所以较高的价格出售。
- en: 'Types of arbitration :'
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 仲裁类型：
- en: 'Inter-exchange arbitrage: Exploits price differences between different platforms.'
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 交易所间套利：利用不同平台之间的价格差异。
- en: 'Triangular Arbitrage: Involves three different cryptocurrencies and uses the
    disparities between their conversion rates.'
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 三角套利：涉及三种不同的加密货币，并利用它们之间的兑换率差异。
- en: 'News Trading :'
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 新闻交易：
- en: News trading is a strategy that involves reacting quickly to announcements or
    events likely to influence cryptocurrency prices. Traders using this strategy
    closely follow global news and events to capitalize on the resulting price movements.
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 新闻交易是一种涉及对可能影响加密货币价格的通知或事件做出快速反应的策略。使用此策略的交易者密切跟踪全球新闻和事件，以利用由此产生的价格变动。
- en: 'Examples of Events :'
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 事件示例：
- en: Major technological updates (such as forks or protocol improvements).
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 主要技术更新（如分叉或协议改进）。
- en: Government regulations or bans.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 政府监管或禁令。
- en: Partnerships or integration into major platforms.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 合作或整合到主要平台。
- en: Risks and Rewards of Cryptocurrency Trading
  id: totrans-497
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加密货币交易的风险与回报
- en: 'Cryptocurrency trading can be extremely lucrative, but it also involves significant
    risks:'
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币交易可能非常有利可图，但也涉及重大风险：
- en: 'Volatility: Cryptocurrencies are notoriously volatile, which can lead to quick
    gains but also to significant losses.'
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: 波动性：加密货币以其波动性著称，这可能导致快速获利，但也可能导致重大损失。
- en: 'Liquidity risk: On some exchanges or for some lesser-known cryptocurrencies,
    there may be a lack of liquidity, making it difficult to execute trades at the
    desired price.'
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 流动性风险：在某些交易所或对于一些不太知名的加密货币，可能存在流动性不足，这使得在期望的价格上执行交易变得困难。
- en: 'Regulation and Security: The cryptocurrency market is less regulated than traditional
    markets, and traders need to be aware of the risks associated with fraud, hacking,
    and other malicious activity.'
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 监管和安全：加密货币市场比传统市场监管较少，交易者需要意识到与欺诈、黑客攻击和其他恶意活动相关的风险。
- en: Cryptocurrency trading offers many opportunities for those willing to invest
    time in learning and implementing effective strategies. Whether you're a short-term
    trader looking to profit from day-to-day fluctuations or a long-term investor
    believing in the future potential of cryptocurrencies, it's essential to fully
    understand market mechanisms and manage risk carefully. The key to success lies
    in a disciplined approach, good risk management, and an ability to adapt to changing
    market conditions.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币交易为那些愿意投入时间学习和实施有效策略的人提供了许多机会。无论你是寻求从日常波动中获利的短期交易者，还是相信加密货币未来潜力的长期投资者，全面理解市场机制和谨慎管理风险都是至关重要的。成功的关键在于纪律性的方法、良好的风险管理以及适应不断变化的市场条件的能力。
- en: Defining stock market indicators
  id: totrans-503
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义股票市场指标
- en: What is a stock market indicator?
  id: totrans-504
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是股票市场指标？
- en: A stock market indicator is a tool used in technical analysis to evaluate past
    and present price movements in order to predict future price movements. Indicators
    are calculated from price, volume or futures data, and help traders make informed
    decisions about buying or selling assets.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 股票市场指标是技术分析中用来评估过去和当前价格变动以预测未来价格变动的工具。指标是从价格、成交量或期货数据计算得出的，并帮助交易者做出关于买卖资产的明智决策。
- en: Stock market indicators are particularly useful for cryptocurrency trading,
    where volatility is high, and reliable tools are needed to identify trends and
    trading opportunities.
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 股票市场指标在加密货币交易中特别有用，因为波动性高，需要可靠的工具来识别趋势和交易机会。
- en: Key stock market indicators
  id: totrans-507
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键股票市场指标
- en: 'Moving Averages (MA) :'
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 移动平均（MA）：
- en: 'Description: The moving average is an indicator that smoothes the price of
    an asset over a specific period of time, by calculating the average of the closing
    prices over that period. There are two main types:'
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：移动平均是一个指标，通过计算特定时间段内的收盘价平均值来平滑资产价格。主要有两种类型：
- en: 'Simple Moving Average (SMA): Calculates the average price over a given period.'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 简单移动平均（SMA）：计算给定期间的平均价格。
- en: 'Exponential Moving Average (EMA): Gives greater weight to recent prices, reacting
    more quickly to price changes than the SMA.'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 指数移动平均（EMA）：给予近期价格更大的权重，比简单移动平均（SMA）更快地对价格变化做出反应。
- en: 'Use: Traders use moving averages to identify trends. For example, when the
    price of an asset is above its moving average, this may indicate an uptrend, and
    vice versa.'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 使用：交易者使用移动平均来识别趋势。例如，当资产价格高于其移动平均线时，这可能表明上升趋势，反之亦然。
- en: 'Relative Strength Index (RSI) :'
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 相对强弱指数（RSI）：
- en: 'Description: The RSI is a momentum indicator that measures the speed and amplitude
    of recent price movements to determine whether an asset is overbought or oversold.
    It oscillates between 0 and 100.'
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：相对强弱指数（RSI）是一个动量指标，它通过衡量最近价格变动的速度和幅度来确定资产是否超买或超卖。它在0到100之间波动。
- en: 'How to use :'
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用：
- en: An RSI above 70 indicates that the asset is overbought, which could signal a
    reversal to the downside.
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: RSI值高于70表明资产超买，这可能预示着向下反转。
- en: An RSI below 30 indicates that the asset is oversold, which could signal a reversal
    to the upside.
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: RSI值低于30表明资产超卖，这可能预示着向上反转。
- en: 'Bollinger Bands :'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 布林带：
- en: 'Description: Bollinger Bands consist of a simple moving average and two standard
    deviation lines above and below this average. They measure market volatility.'
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：布林带由一个简单移动平均线和在此平均线上下两个标准差线组成。它们衡量市场波动性。
- en: 'How to use :'
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用：
- en: When the bands tighten, this indicates low volatility, often followed by an
    increase in volatility (and potentially a strong trend).
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 当布林带变窄时，这表明低波动性，通常随后是波动性的增加（以及潜在的强烈趋势）。
- en: When the price touches or exceeds the bands, this may signal overbought or oversold
    conditions.
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 当价格触及或超过布林带时，这可能会发出超买或超卖的条件信号。
- en: 'MACD (Moving Average Convergence Divergence) :'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: MACD（移动平均收敛发散）：
- en: 'Description: The MACD is a momentum indicator that shows the relationship between
    two moving averages (usually the 12- and 26-day). It is composed of the MACD line,
    the signal line (a 9-day EMA of the MACD line), and a histogram representing the
    difference between the MACD line and the signal line.'
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：MACD是一个动量指标，显示了两个移动平均线（通常是12天和26天）之间的关系。它由MACD线、信号线（MACD线的9天EMA）和一个表示MACD线和信号线之间差异的柱状图组成。
- en: 'How to use :'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用：
- en: When the MACD line crosses above the signal line, it's a potential buy signal.
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 当MACD线穿越信号线以上时，这是一个潜在的买入信号。
- en: When the MACD line crosses below the signal line, this is a potential sell signal.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 当MACD线穿越信号线以下时，这是一个潜在的卖出信号。
- en: 'Parabolic SAR (Stop and Reverse) :'
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 抛物线SAR（停止和反转）：
- en: 'Description: The Parabolic SAR is an indicator used to identify market turning
    points. It appears as dots above or below the asset price.'
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：抛物线SAR是一种用于识别市场转折点的指标。它以资产价格上方或下方的点出现。
- en: 'How to use :'
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 使用方法：
- en: When the dots are below the price, this indicates an upward trend.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 当点位于价格下方时，这表明趋势向上。
- en: When the dots are above the price, this indicates a downward trend.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 当点位于价格上方时，这表明趋势向下。
- en: 'Average Directional Index (ADX) :'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 平均方向性指数（ADX）：
- en: 'Description: ADX is used to measure the strength of a trend. It oscillates
    between 0 and 100, with high values indicating a strong trend.'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：ADX用于衡量趋势的强度。它在0到100之间波动，高值表示强劲趋势。
- en: 'How to use :'
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 使用方法：
- en: An ADX above 25 is often taken as an indication of a strong trend, while an
    ADX below 20 signals a weak or non-existent trend.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: ADX值高于25通常被视为强劲趋势的迹象，而ADX值低于20则表示趋势弱或不存在。
- en: 'Fibonacci levels :'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 斐波那契水平：
- en: 'Description: Fibonacci retracements are based on ratios derived from the Fibonacci
    sequence. They are used to identify potential support and resistance levels.'
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：斐波那契回撤是基于斐波那契数列推导出的比率。它们用于识别潜在的支持和阻力水平。
- en: 'How to use :'
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 使用方法：
- en: Current retracement levels are 23.6%, 38.2%, 50%, 61.8% and 78.6%. These levels
    are used to identify points where the price could reverse its direction after
    an initial move.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 当前回撤水平为23.6%、38.2%、50%、61.8%和78.6%。这些水平用于识别价格在初始移动后可能反转方向的点。
- en: 'Ichimoku Cloud:'
  id: totrans-541
  prefs: []
  type: TYPE_NORMAL
  zh: Ichimoku云：
- en: 'Description : The Ichimoku cloud is an indicator that defines support and resistance
    levels, identifies trend direction, measures momentum, and provides trading signals.
    It is composed of several lines, creating a "cloud" that helps identify trends.'
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：Ichimoku云是定义支撑和阻力水平、识别趋势方向、衡量动量并提供交易信号的指标。它由几条线组成，形成“云”，有助于识别趋势。
- en: 'How to use :'
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 使用方法：
- en: If the price is above the cloud, the trend is upwards.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 如果价格高于云层，则趋势向上。
- en: If the price is below the cloud, the trend is downward.
  id: totrans-545
  prefs: []
  type: TYPE_NORMAL
  zh: 如果价格低于云层，则趋势向下。
- en: The intersection of the Kijun-sen and Tenkan-sen lines can provide buy or sell
    signals.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: Kijun-sen线和Tenkan-sen线的交汇可以提供买入或卖出信号。
- en: Importance of Stock Market Indicators in Cryptocurrency Trading
  id: totrans-547
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 股票市场指标在加密货币交易中的重要性
- en: 'Stock market indicators are essential for cryptocurrency trading, as they enable
    traders to analyze the market objectively and make informed decisions. They help
    to:'
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 股票市场指标对于加密货币交易至关重要，因为它们使交易者能够客观地分析市场并做出明智的决策。它们有助于：
- en: 'Identify Trends: Understand whether the market is in a bullish, bearish or
    sideways phase.'
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 识别趋势：了解市场处于牛市、熊市还是横盘阶段。
- en: 'Detect Entry and Exit Points: Indicators can signal the best time to enter
    or exit a position.'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 检测入场和出场点：指标可以发出最佳入场或出场位置的信号。
- en: 'Managing Risk: Indicators help define stop-loss and take-profit levels, reducing
    the risks associated with trading.'
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 管理风险：指标有助于定义止损和止盈水平，降低与交易相关的风险。
- en: 'Avoiding Market Traps: By using several indicators together, traders can avoid
    false or misleading signals, improving their chances of success.'
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 避免市场陷阱：通过结合使用多个指标，交易者可以避免错误或误导性信号，提高成功的几率。
- en: ––––––––
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: ––––––––
- en: Stock market indicators play a crucial role in cryptocurrency trading, providing
    traders with the tools they need to analyze market movements and make informed
    decisions. Mastery of these indicators is essential for anyone wishing to succeed
    in trading, as they offer valuable insights into trends, dynamics, and potential
    price reversal points. By combining multiple indicators, traders can develop robust
    strategies tailored to the changing conditions of the cryptocurrency market.
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 股票市场指标在加密货币交易中扮演着至关重要的角色，为交易者提供分析市场运动和做出明智决策的工具。掌握这些指标对于希望成功交易的人来说是必不可少的，因为它们提供了对趋势、动态和潜在价格反转点的宝贵见解。通过结合多个指标，交易者可以制定适应加密货币市场变化条件的稳健策略。
- en: Definition of Algorithmic Trading
  id: totrans-555
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 算法交易的定义
- en: What is algorithmic trading?
  id: totrans-556
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是算法交易？
- en: Algorithmic trading is a trading method that uses computer programs to execute
    trades according to a predefined set of instructions or algorithms. These algorithms
    can include parameters such as price, trade timing, volume and other market factors.
    The main aim of algorithmic trading is to automate the trading process, making
    it faster, more precise and less subject to human emotion.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 算法交易是一种使用计算机程序根据预定义的指令或算法执行交易的交易方法。这些算法可以包括价格、交易时间、成交量和其他市场因素等参数。算法交易的主要目的是自动化交易过程，使其更快、更精确，并减少人为情绪的影响。
- en: In the cryptocurrency context, algorithmic trading is particularly useful due
    to the high volatility of the market and the need to react quickly to price changes.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 在加密货币的背景下，由于市场的高波动性和对快速反应价格变化的需求，算法交易特别有用。
- en: The characteristics of algorithmic trading
  id: totrans-559
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 算法交易的特点
- en: 'Automation :'
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化：
- en: Algorithmic trading relies on computer programs that automatically execute trades
    without human intervention. Once the algorithm is in place, it can run continuously,
    24 hours a day, 7 days a week, taking advantage of trading opportunities at any
    time.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 算法交易依赖于计算机程序，这些程序可以自动执行交易而无需人为干预。一旦算法部署到位，它可以连续运行，每天24小时，每周7天，利用任何时间点的交易机会。
- en: 'Speed and precision:'
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 速度和精度：
- en: Algorithms can analyze market data and execute orders in a fraction of a second,
    much faster than a human trader. This makes it possible to seize market opportunities
    before prices change significantly.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 算法可以在几分之一秒内分析市场数据并执行订单，这比人类交易者快得多。这使得在价格发生重大变化之前抓住市场机会成为可能。
- en: 'Backtesting :'
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 回测：
- en: Before deploying an algorithm live, traders can test it using historical data
    to see how it would have performed in the past. This allows them to check the
    robustness of the strategy and adjust parameters to optimize performance.
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 在将算法实际部署之前，交易者可以使用历史数据对其进行测试，以查看它在过去的表现。这允许他们检查策略的稳健性，并调整参数以优化性能。
- en: 'Risk Management :'
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 风险管理：
- en: Algorithms can be programmed to proactively manage risk. For example, they can
    include parameters to limit losses (stop-loss) or lock in gains (take-profit),
    depending on predefined market conditions.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 算法可以被编程为主动管理风险。例如，它们可以包括参数以限制损失（止损）或锁定收益（止盈），具体取决于预定义的市场条件。
- en: 'Multiple strategies :'
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 多重策略：
- en: An algorithm can be designed to execute several strategies simultaneously. For
    example, it can exploit arbitrage opportunities while following a market trend,
    thus diversifying sources of profit.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 可以设计算法同时执行几种策略。例如，它可以在跟踪市场趋势的同时利用套利机会，从而多样化利润来源。
- en: The different types of algorithmic trading
  id: totrans-570
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不同类型的算法交易
- en: 'Refereeing:'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 参考裁判：
- en: Arbitrage is a strategy that takes advantage of price differences between different
    markets or exchanges. For example, if a cryptocurrency is quoted at a lower price
    on one exchange than another, an algorithm can buy on the cheaper exchange and
    sell on the other, making a risk-free profit.
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 套利是一种利用不同市场或交易所之间价格差异的策略。例如，如果一种加密货币在一个交易所的报价低于另一个交易所，算法可以在价格较低的交易所买入，在另一个交易所卖出，从而获得无风险的利润。
- en: 'Market Making :'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 做市：
- en: Market making is a strategy where the algorithm simultaneously places buy and
    sell orders for a cryptocurrency at slightly different prices in order to capture
    the spread between supply and demand. This strategy helps to provide liquidity
    to the market.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 做市是一种策略，算法同时以略不同的价格在加密货币上放置买入和卖出订单，以捕捉供需之间的价差。这种策略有助于为市场提供流动性。
- en: 'Trend Following :'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 趋势跟踪：
- en: Trend-following algorithms seek to identify and follow market trends. For example,
    if a cryptocurrency shows an upward trend, the algorithm will continue to buy
    until the indicators show a trend reversal.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 趋势跟踪算法旨在识别和跟随市场趋势。例如，如果一种加密货币显示出上升趋势，算法将继续买入，直到指标显示趋势反转。
- en: 'Mean Reversion :'
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 均值回归：
- en: This strategy assumes that prices often revert to a historical average. The
    algorithm buys when a cryptocurrency is undervalued relative to its historical
    average, and sells when it is overvalued.
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 该策略假设价格通常会回归到历史平均水平。当加密货币相对于其历史平均水平被低估时，算法会买入，当它被高估时，算法会卖出。
- en: 'Scalping :'
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 短线交易：
- en: Scalping is a very short-term trading strategy in which the algorithm makes
    numerous small trades to take advantage of small price fluctuations. Scalpers
    aim for quick gains, often in seconds or minutes.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 炒 scalp 是一种非常短期的交易策略，其中算法进行多次小额交易以利用小的价格波动。Scalpers 旨在快速获利，通常在几秒或几分钟内。
- en: 'News-Based Trading:'
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 基于新闻的交易：
- en: News-based trading algorithms automatically analyze news feeds to detect events
    likely to influence cryptocurrency prices, such as regulatory announcements, partnerships
    or technology updates. They then react by executing orders based on the anticipated
    impact of this news on the market.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 基于新闻的交易算法自动分析新闻源，以检测可能影响加密货币价格的事件，如监管公告、合作或技术更新。然后，它们通过根据预期新闻对市场的影响执行订单来做出反应。
- en: The advantages of algorithmic trading
  id: totrans-583
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 算法交易的优势
- en: 'Elimination of Emotions :'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 情绪消除：
- en: Algorithmic trading eliminates emotional biases such as fear or greed, which
    can affect human trading decisions. The algorithm strictly follows defined rules,
    enabling a more disciplined and consistent approach.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 算法交易消除了如恐惧或贪婪等情绪偏见，这些偏见可能影响人类交易决策。算法严格遵循定义的规则，使交易方法更加自律和一致。
- en: 'Ability to manage large amounts of data:'
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 管理大量数据的能力：
- en: Algorithms can analyze a large number of variables and market data simultaneously,
    far beyond human capabilities. This enables them to make more informed, data-driven
    trading decisions.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 算法可以同时分析大量变量和市场数据，远超人类能力。这使得它们能够做出更明智、基于数据的交易决策。
- en: 'Execution optimization :'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 执行优化：
- en: Algorithms can optimize order execution by splitting up large transactions to
    minimize their impact on the market, or by finding the best routes to obtain the
    best prices.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 算法可以通过分割大交易以最小化对市场的影响，或者通过找到获取最佳价格的最佳路线来优化订单执行。
- en: 'Accessibility :'
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 可访问性：
- en: With the emergence of platforms and programming languages like Python, algorithmic
    trading has become accessible even to individual traders. Numerous tools and libraries
    are available to help traders develop and test their own algorithms.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 随着平台和编程语言如Python的出现，算法交易甚至对个人交易者来说也变得可行。众多工具和库可供交易者开发并测试他们自己的算法。
- en: The Risks and Limits of Algorithmic Trading
  id: totrans-592
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 算法交易的风险与限制
- en: 'Dependence on Technology :'
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 对技术的依赖：
- en: Algorithmic trading relies entirely on technology. Server failures, bugs in
    the code or connection errors can result in major financial losses.
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 算法交易完全依赖于技术。服务器故障、代码中的错误或连接错误可能导致重大经济损失。
- en: 'Market volatility :'
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 市场波动：
- en: Cryptocurrency markets are extremely volatile, and a poorly designed algorithm
    can overreact to price fluctuations, resulting in unexpected losses.
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币市场极其波动，设计不良的算法可能会对价格波动过度反应，导致意外损失。
- en: 'Risk of over-optimization :'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 过度优化的风险：
- en: Backtesting can sometimes lead to over-optimization, where the algorithm is
    over-adjusted to specific historical data and does not perform well in real-life
    conditions. It is essential to test the algorithm over different time periods
    and market conditions.
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 回测有时会导致过度优化，其中算法过度调整到特定的历史数据，在实际生活条件下表现不佳。测试算法在不同时间段和市场条件下至关重要。
- en: 'Competition:'
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 竞争：
- en: Algorithmic trading is a highly competitive field, with many players using sophisticated
    algorithms. Profits can be eroded by competition, especially in strategies such
    as arbitrage.
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 算法交易是一个竞争激烈的领域，许多参与者使用复杂的算法。利润可能被竞争侵蚀，尤其是在套利等策略中。
- en: Algorithmic trading represents a major advance in the trading world, offering
    traders powerful tools to automate their strategies, minimize human error, and
    optimize performance. However, it requires a thorough understanding of the markets,
    trading strategies, and the technical aspects of programming. To succeed in algorithmic
    cryptocurrency trading, it's crucial to combine solid market knowledge with skills
    in algorithm development and risk management. Used properly, algorithmic trading
    can turn the opportunities offered by the cryptocurrency market into tangible
    results.
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 算法交易在交易领域取得了重大进步，为交易者提供了强大的工具来自动化他们的策略，最小化人为错误，并优化性能。然而，它需要对市场、交易策略和编程的技术方面有深入的了解。在算法加密货币交易中取得成功，结合扎实的市场知识、算法开发技能和风险管理技能至关重要。如果使用得当，算法交易可以将加密货币市场提供的机会转化为实际成果。
- en: The Importance and Principle of Backtesting
  id: totrans-602
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 回测的重要性与原则
- en: Introduction to Backtesting
  id: totrans-603
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回测简介
- en: 'Backtesting is an essential process in algorithmic trading, enabling us to
    test the viability of a trading strategy using historical data. The idea is simple:
    if a strategy has worked well in the past, it has a good chance of working well
    in the future, provided market conditions are similar. Backtesting therefore enables
    traders to evaluate the potential performance of their strategies before putting
    them into practice on the real markets.'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 回测是算法交易中的一个关键过程，使我们能够使用历史数据测试交易策略的可行性。这个想法很简单：如果一个策略在过去表现良好，那么在市场条件相似的情况下，它有很好的机会在未来表现良好。因此，回测使交易者能够在实际市场实施策略之前评估其策略的潜在表现。
- en: Backtesting principles
  id: totrans-605
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回测原则
- en: 'Backtesting involves simulating trades by applying a trading strategy to historical
    market data. Here''s how the process generally works:'
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 回测涉及通过将交易策略应用于历史市场数据来模拟交易。这个过程通常如下进行：
- en: 'Historical Data Collection :'
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 历史数据收集：
- en: The first step is to obtain historical market data. This data generally includes
    opening and closing prices, highs, lows and volumes traded over a given period.
    Traders can also use more specific data, such as orders in the order book, spreads
    or technical indicators calculated over these periods.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是获取历史市场数据。这些数据通常包括特定时期内的开盘价、收盘价、最高价、最低价和成交量。交易者还可以使用更具体的数据，例如订单簿中的订单、价差或在这些时期内计算的技术指标。
- en: 'Building the strategy :'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 构建策略：
- en: The trading strategy must be clearly defined, with specific rules for entering
    and exiting positions, risk management and profit-taking parameters. These rules
    can be based on technical indicators, mathematical models, or specific market
    events.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 交易策略必须明确定义，包括进入和退出头寸的具体规则、风险管理参数和盈利参数。这些规则可以基于技术指标、数学模型或特定的市场事件。
- en: 'Application of the Historical Data Strategy :'
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 应用历史数据策略：
- en: Once the strategy has been defined, it is applied to historical data. Backtesting
    simulates every transaction that the strategy would have made in real time, following
    the predefined rules. This includes buying and selling assets, calculating gains
    or losses, and adjusting positions according to simulated market conditions.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦策略被定义，它就会被应用于历史数据。回测模拟策略在实时中会做出的每一笔交易，遵循预定义的规则。这包括买卖资产、计算盈亏以及根据模拟市场条件调整头寸。
- en: 'Results analysis :'
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 结果分析：
- en: The backtesting results are then analyzed to assess the strategy's performance.
    Commonly used metrics include rate of return, volatility, Sharpe ratio, maximum
    drawdown (the greatest loss in value over a given period), and other performance
    indicators. The aim is to determine whether the strategy is profitable and stable
    over the period tested.
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 然后分析回测结果以评估策略的表现。常用的指标包括回报率、波动性、夏普比率、最大回撤（在给定时期内的最大价值损失）以及其他性能指标。目标是确定策略在测试期间是否盈利且稳定。
- en: 'Optimization and Reiteration :'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 优化和迭代：
- en: Depending on the results obtained, the strategy can be optimized by adjusting
    parameters or modifying certain rules. Backtesting is an iterative process, where
    strategies are constantly improved to maximize returns while minimizing risk.
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 根据获得的结果，可以通过调整参数或修改某些规则来优化策略。回测是一个迭代过程，策略不断改进以最大化回报同时最小化风险。
- en: The importance of backtesting in algorithmic trading
  id: totrans-617
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回测在算法交易中的重要性
- en: 'Strategy validation :'
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 策略验证：
- en: Backtesting allows us to check whether a trading strategy is viable before deploying
    it on the markets in real time. This helps avoid potential losses due to an untested
    or ill-conceived strategy.
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 回测使我们能够在实时市场部署策略之前检查策略的可行性。这有助于避免由于未经测试或构思不良的策略而造成的潜在损失。
- en: 'Identifying weaknesses :'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 识别弱点：
- en: By testing a strategy on historical data, traders can identify its weak points,
    such as sensitivity to volatility or specific market conditions. This makes it
    possible to improve the strategy or take steps to manage these weaknesses.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在历史数据上测试策略，交易者可以识别其弱点，例如对波动性或特定市场条件的敏感性。这使得改进策略或采取措施管理这些弱点成为可能。
- en: 'Estimating Potential Yields :'
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 估算潜在收益：
- en: Backtesting gives an estimate of the returns the strategy could have generated
    in the past. While this does not guarantee similar future performance, it does
    provide a baseline for assessing the strategy's potential.
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 回测给出了策略在过去可能产生的回报的估计。虽然这并不保证未来会有相似的表现，但它为评估策略的潜力提供了一个基准。
- en: 'Risk Management :'
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 风险管理：
- en: Backtesting helps assess the risks associated with a strategy, including maximum
    drawdown and volatility of returns. This enables risk tolerance levels to be defined
    and protective measures, such as stop-loss or hedging orders, to be put in place.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 回测有助于评估与策略相关的风险，包括最大回撤和回报的波动性。这使能够定义风险承受能力水平，并实施保护措施，例如止损或对冲订单。
- en: 'Continuous improvement :'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 持续改进：
- en: Backtesting is a key tool for the continuous improvement of trading strategies.
    By regularly testing and adjusting strategies, traders can adapt to changing market
    conditions and improve their performance.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: 回测是持续改进交易策略的关键工具。通过定期测试和调整策略，交易者可以适应不断变化的市场条件并提高其表现。
- en: Access to Historical Data on Exchange Platforms
  id: totrans-628
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交易所平台上的历史数据访问
- en: Most major cryptocurrency exchange platforms understand the importance of backtesting
    for traders, especially those using algorithmic strategies. That's why they usually
    offer access to their historical quote data.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数主要的加密货币交易所平台都理解回测对交易者的重要性，尤其是那些使用算法策略的交易者。这就是为什么他们通常提供对其历史报价数据的访问。
- en: 'Downloading historical data :'
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 下载历史数据：
- en: Many exchange platforms allow users to download historical market data directly
    from their interfaces. This data can include opening and closing prices, highs,
    lows, traded volumes and other relevant information.
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 许多交易所平台允许用户直接从其界面下载历史市场数据。这些数据可以包括开盘价和收盘价、最高价、最低价、交易量和其他相关信息。
- en: Data is often available for different periods, ranging from a few minutes to
    several years, allowing traders to backtest their strategies over various time
    periods.
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 数据通常可用不同时间段，从几分钟到几年不等，允许交易者在不同时间段内回测其策略。
- en: 'Access via API :'
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 通过API访问：
- en: In addition to manual downloading, some platforms offer application programming
    interfaces (APIs) that enable traders to access historical data automatically.
    APIs are particularly useful for algorithmic traders who wish to integrate data
    directly into their backtesting scripts without manual intervention.
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 除了手动下载外，一些平台还提供应用程序编程接口（API），允许交易者自动访问历史数据。API对于希望将数据直接集成到回测脚本中而不进行手动干预的算法交易者特别有用。
- en: 'Available data types :'
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 可用数据类型：
- en: 'Price data: includes opening, closing, high and low prices over specific periods.'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 价格数据：包括特定时间段内的开盘价、收盘价、最高价和最低价。
- en: 'Volumes: Quantity of cryptocurrencies traded during a given period.'
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 交易量：在特定时间段内交易的加密货币数量。
- en: 'Order book: detailed data on pending buy and sell orders on the platform, which
    can be useful for testing market making or arbitrage strategies.'
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 订单簿：平台上待处理的买卖订单的详细数据，这可以用于测试做市或套利策略。
- en: 'Technical indicators: Some platforms provide calculated data for common technical
    indicators, such as moving averages or RSI.'
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 技术指标：一些平台提供常见技术指标的计算数据，如移动平均或RSI。
- en: 'Data accuracy and reliability :'
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 数据准确性和可靠性：
- en: It is essential to ensure that the historical data provided by exchange platforms
    is accurate and reliable, as erroneous data can distort backtesting results. Traders
    should therefore choose reputable platforms and check data quality before using
    them.
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: 确保交易所平台提供的历史数据准确可靠至关重要，因为错误的数据会扭曲回测结果。因此，交易者应选择信誉良好的平台，并在使用之前检查数据质量。
- en: Backtesting limits
  id: totrans-642
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回测限制
- en: 'Risks of over-optimization :'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 过度优化的风险：
- en: One of the risks of backtesting is over-optimization, where the strategy is
    over-adjusted to specific historical data, which can lead to poor performance
    in real-life conditions. Traders should avoid over-adjusting their strategies
    and ensure that they are robust under different market conditions.
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 回测的一个风险是过度优化，即策略过度调整到特定的历史数据，这可能导致在实际条件下表现不佳。交易者应避免过度调整其策略，并确保它们在不同市场条件下具有稳健性。
- en: 'Differences between Real and Historical Markets :'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 实际市场和历史市场之间的差异：
- en: Market conditions can change, and a strategy that has worked well in the past
    may not be as effective in the future. Backtesting must therefore be complemented
    by real-time monitoring and continuous adaptation of strategies.
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 市场条件可能会变化，过去表现良好的策略在未来可能不再那么有效。因此，回测必须辅以实时监控和策略的持续调整。
- en: 'Fresh and Slippery:'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 新鲜且滑溜：
- en: Backtesting results do not always take into account transaction costs and slippage
    (the difference between the expected price and the actual execution price), which
    can reduce returns in real-life conditions. It is important to include these elements
    in simulations to obtain a more realistic picture of performance.
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 回测结果并不总是考虑交易成本和滑点（预期价格与实际执行价格之间的差异），这在实际条件下可能会降低回报。在模拟中包括这些元素，以获得更真实的性能图景是很重要的。
- en: Backtesting is a crucial step for any algorithmic trader wishing to validate
    and refine their strategies before applying them to the real markets. Using reliable
    historical data, often provided by exchange platforms, traders can simulate the
    past performance of their algorithms, identify weak points, optimize parameters
    and manage risks. However, it is important to recognize the limitations of backtesting
    and to complement this process with continuous monitoring and adaptation of strategies
    to current market conditions. With judicious use, backtesting can be a powerful
    tool for maximizing the chances of success in cryptocurrency trading.
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 回测是任何希望在实际市场应用其策略之前验证和改进其策略的算法交易者的关键步骤。使用可靠的历史数据，通常由交易所平台提供，交易者可以模拟其算法的过去表现，识别弱点，优化参数并管理风险。然而，重要的是要认识到回测的限制，并辅以对策略的持续监控和适应当前市场条件。合理使用回测可以成为最大化加密货币交易成功机会的有力工具。
- en: Analyzing the Key Results of a Backtest Report
  id: totrans-650
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分析回测报告的关键结果
- en: Once backtesting of a trading strategy is complete, it is crucial to analyze
    the results to understand the strategy's actual performance, its strengths and
    weaknesses, and its potential risks. A typical backtest report includes several
    key metrics, such as yield, drawdown, number of trades, and other performance
    indicators. This chapter explores how to analyze these results to assess the effectiveness
    and viability of an algorithmic trading strategy.
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦完成交易策略的回测，分析结果以了解策略的实际表现、其优势和劣势以及其潜在风险至关重要。典型的回测报告包括几个关键指标，如收益率、回撤、交易次数和其他性能指标。本章探讨了如何分析这些结果以评估算法交易策略的有效性和可行性。
- en: '![](images/image-D5MYIUQM.jpg)'
  id: totrans-652
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-D5MYIUQM.jpg)'
- en: Rendement (Return)
  id: totrans-653
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 收益（回报）
- en: Definition
  id: totrans-654
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 定义
- en: Return represents the total gain or loss generated by the strategy over the
    backtesting period, expressed as a percentage of initial capital. It is a direct
    measure of the strategy's performance.
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 回报表示策略在回测期间产生的总收益或损失，以初始资本的百分比表示。它是策略表现的直接衡量标准。
- en: Analysis
  id: totrans-656
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分析
- en: 'Absolute Return: Indicates how much the strategy has gained or lost over the
    total period. For example, a return of 50% means that the strategy has increased
    the initial capital by 50% over the period tested.'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 绝对回报：表示策略在整个期间内获得的收益或损失。例如，50%的回报意味着策略在测试期间将初始资本增加了50%。
- en: 'Annualized return: If the backtest covers several years, it''s useful to calculate
    the annualized return, which shows average annual growth. This makes it possible
    to compare the performance of different strategies, or compare them to benchmarks
    such as the global cryptocurrency market.'
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 年化回报：如果回测覆盖了数年，计算年化回报是有用的，这显示了平均年度增长。这使得比较不同策略的表现，或将其与全球加密货币市场等基准进行比较成为可能。
- en: 'Benchmark comparison: Compare the strategy''s performance with that of a benchmark
    index or other strategies to assess its relative performance.'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 基准比较：将策略的表现与基准指数或其他策略进行比较，以评估其相对表现。
- en: Search for optimization
  id: totrans-660
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 寻找优化
- en: 'Stable returns: Look for consistent returns rather than large one-off gains.
    A strategy with stable returns is generally more reliable and less risky.'
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 稳定的回报：寻找持续的回报而不是一次性的大幅收益。具有稳定回报的策略通常更可靠且风险更低。
- en: 'Risk-adjusted return: Use metrics such as the Sharpe ratio to assess risk-adjusted
    profitability. A high Sharpe ratio indicates that the strategy generates a high
    return for the level of risk taken.'
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 风险调整回报：使用如夏普比率等指标来评估风险调整后的盈利能力。高夏普比率表明，策略在承担一定风险水平的情况下产生了高回报。
- en: Drawdown
  id: totrans-663
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回撤
- en: Definition
  id: totrans-664
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 定义
- en: Drawdown is a measure of a strategy's maximum loss relative to its historical
    peak (i.e. the highest value reached). It is generally expressed as a percentage.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 回撤是衡量策略相对于其历史峰值（即达到的最高价值）的最大损失的一个指标。它通常以百分比的形式表示。
- en: Analysis
  id: totrans-666
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分析
- en: 'Maximum Drawdown: The maximum drawdown (or MDD) represents the greatest capital
    loss incurred during the backtesting period. For example, if a strategy has a
    maximum drawdown of 20%, this means that capital has fallen by 20% from its historical
    high at a given time.'
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 最大回撤：最大回撤（或MDD）代表回测期间发生的最大资本损失。例如，如果一个策略的最大回撤为20%，这意味着资本在某一时刻从历史高点下跌了20%。
- en: 'Recovery Time: It''s also important to consider how long it took to recover
    the drawdown. A strategy with a low drawdown but slow recovery may be riskier
    than one with a higher drawdown but quick recovery.'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 恢复时间：同样重要的是考虑恢复回撤所需的时间。一个回撤低但恢复慢的策略可能比回撤高但恢复快的策略风险更大。
- en: Associated risks
  id: totrans-669
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 相关风险
- en: 'Psychological stress: A high drawdown can cause stress in traders, leading
    them to abandon the strategy before the market recovers. It''s crucial to test
    whether the strategy can withstand these difficult periods without intervention.'
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 心理压力：高回撤可能导致交易者压力增大，使他们在大市恢复之前放弃策略。测试策略是否能够在没有干预的情况下承受这些困难时期至关重要。
- en: 'Risk of ruin: If the drawdown is too high, it can lead to an irreversible loss
    of capital, especially if the market does not recover. A strategy with a drawdown
    close to the initial capital could lead to ruin.'
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 破产风险：如果回撤过高，可能会导致资本不可逆的损失，尤其是如果市场没有恢复。一个回撤接近初始资本的策略可能导致破产。
- en: Search for optimization
  id: totrans-672
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 寻求优化
- en: 'Drawdown reduction: Seek to optimize the strategy to minimize drawdown without
    sacrificing too much return. This can be done by adjusting strategy parameters,
    using tighter stop-losses or diversifying the assets traded.'
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 回撤减少：寻求优化策略以最小化回撤，同时不要牺牲过多的回报。这可以通过调整策略参数、使用更紧的止损或多元化交易资产来实现。
- en: 'Hedging strategies: Using hedging techniques to protect capital during periods
    of high drawdown can improve strategy stability.'
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 对冲策略：在回撤高的时期使用对冲技术保护资本可以提高策略的稳定性。
- en: Number of transactions
  id: totrans-675
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交易次数
- en: Definition
  id: totrans-676
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 定义
- en: The number of transactions represents the total number of buy and sell operations
    carried out by the strategy during the backtest. This includes all transactions,
    whether buying, selling or closing positions.
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 交易次数：交易次数代表策略在回测期间进行的总买卖操作次数。这包括所有交易，无论是买入、卖出还是平仓。
- en: Analysis
  id: totrans-678
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分析
- en: 'Trading frequency: A high number of transactions may indicate a high-frequency
    trading (HFT) strategy, while a low number of transactions may correspond to a
    long-term strategy. Transaction frequency should be consistent with the strategy''s
    objectives.'
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 交易频率：交易次数多可能表明是高频交易（HFT）策略，而交易次数少可能对应长期策略。交易频率应与策略的目标一致。
- en: 'Impact on Profitability: A high number of transactions can lead to high transaction
    costs, which can reduce the overall profitability of the strategy. It is crucial
    to factor these costs into the analysis.'
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 对盈利能力的影响：交易次数多可能导致高交易成本，这可能会降低策略的整体盈利能力。将这些成本纳入分析至关重要。
- en: Transaction fees
  id: totrans-681
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 交易费用
- en: Exchange platforms generally charge fees on each transaction, either as a percentage
    of the volume traded, or as a fixed fee. These fees can have a significant impact
    on a strategy's profitability, particularly for strategies requiring a large number
    of transactions.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 交易所平台通常对每笔交易收取费用，要么按交易量的一定比例，要么按固定费用。这些费用可能对策略的盈利能力产生重大影响，尤其是对于需要大量交易的策略。
- en: 'Calculate total fees: Calculate total transaction fees based on the number
    of transactions and the rates applied by the exchange. For example, if an exchange
    applies a fee of 0.1% per transaction and the strategy has completed 1,000 transactions,
    the total fee will be 1% of the capital traded.'
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 计算总费用：根据交易次数和交易所适用的费率计算总交易费用。例如，如果交易所对每笔交易收取0.1%的费用，而策略已完成1,000笔交易，则总费用将是交易资本量的1%。
- en: 'Impact on Net Return: Subtract transaction fees from gross return to obtain
    net return. A gross return of 10% can shrink considerably after fees, especially
    for high-frequency strategies.'
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 对净收益的影响：从毛收益中扣除交易费用以获得净收益。10%的毛收益在扣除费用后可能会大幅缩水，尤其是对于高频策略。
- en: Search for optimization
  id: totrans-685
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 寻求优化
- en: 'Reduce Unnecessary Transactions: Optimize the strategy to reduce unnecessary
    transactions that do not contribute significantly to performance. This can be
    done by adjusting parameters to avoid false signals, or by grouping transactions
    to reduce costs.'
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 减少不必要的交易：优化策略以减少对性能贡献不大的不必要的交易。这可以通过调整参数以避免错误信号，或者通过分组交易以降低成本来实现。
- en: 'Choice of exchange platform: Choose exchanges with competitive transaction
    fees, especially if you use a high-frequency strategy. Some exchanges offer reduced
    fees for users who hold specific quantities of their native tokens.'
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 交易所平台的选择：选择具有具有竞争力的交易费用的交易所，特别是如果您使用高频策略。一些交易所为持有特定数量原生代币的用户提供降低的费用。
- en: Other Performance Indicators
  id: totrans-688
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他性能指标
- en: 'In addition to the metrics mentioned above, other indicators can also be useful
    in assessing the performance of a strategy:'
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 除了上述指标外，其他指标在评估策略表现时也非常有用：
- en: 'Sharpe ratio: Measures the risk-adjusted performance of a strategy. A high
    Sharpe ratio indicates that the strategy generates high returns for the risk taken.'
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 夏普比率：衡量策略的风险调整后的表现。高夏普比率表明该策略在承担风险的情况下产生了高回报。
- en: 'Profit Factor: This is the ratio between the total profit made by winning trades
    and the total losses made by losing trades. A profit factor greater than 1 indicates
    that the strategy is profitable.'
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 收益因子：这是获胜交易的总利润与亏损交易的总损失之间的比率。大于1的收益因子表明该策略是盈利的。
- en: 'Win Rate: Represents the percentage of winning transactions in relation to
    the total number of transactions. A high win rate is a positive indicator, but
    must be analyzed in combination with other metrics to assess overall performance.'
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 胜率：表示在总交易次数中获胜交易的百分比。高胜率是一个积极的指标，但必须与其他指标结合分析，以评估整体表现。
- en: Analyzing the results of a backtest report is essential to understanding the
    viability and risks of an algorithmic trading strategy. Yield, drawdown, number
    of trades and associated fees are key indicators that need to be examined in detail.
    By optimizing these parameters, traders can improve the robustness of their strategy
    and minimize the risks associated with cryptocurrency trading. Backtesting, combined
    with rigorous analysis, enables the development of more robust strategies that
    are better adapted to real market conditions.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 分析回测报告的结果对于理解算法交易策略的可行性和风险至关重要。收益、回撤、交易次数和相关费用是关键指标，需要详细检查。通过优化这些参数，交易者可以提高策略的稳健性并最小化与加密货币交易相关的风险。回测与严格分析相结合，能够开发出更稳健的策略，这些策略更能适应真实市场条件。
- en: Understanding Cryptocurrency Volatility and its Role in Algorithmic Trading
  id: totrans-694
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解加密货币波动及其在算法交易中的作用
- en: Introduction to Volatility
  id: totrans-695
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 波动性简介
- en: Volatility is a central concept in finance, measuring the extent to which the
    price of a financial asset varies over a given period. In simple terms, it is
    an indication of the instability or fluctuation of an asset's price. The more
    volatile an asset, the more quickly and unpredictably its price can change. Volatility
    can be measured in different ways, the most common being the standard deviation
    of price variations. There is a volatility indicator for cryptos.
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 波动性是金融中的一个核心概念，衡量的是金融资产在一定时期内价格变动的程度。简单来说，它是资产价格不稳定或波动的指示。资产越波动，其价格变化就越快、越不可预测。波动性可以通过不同的方式来衡量，最常见的是价格变动的标准差。对于加密货币也有波动性指标。
- en: '![](images/image-XAX0ZONT.jpg)'
  id: totrans-697
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-XAX0ZONT.jpg)'
- en: In the cryptocurrency context, volatility is particularly high compared to other
    financial assets such as stocks or bonds. Crypto-currencies can experience significant
    price variations in the space of a few hours, or even minutes. For example, it's
    not uncommon to see a cryptocurrency like Bitcoin or Ethereum fluctuate by several
    percent in a single day.
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 在加密货币的背景下，与股票或债券等其他金融资产相比，波动性特别高。加密货币在几小时或几分钟内可能会经历显著的价格变动。例如，看到比特币或以太坊在一天内波动几个百分比并不罕见。
- en: Why are cryptocurrencies volatile?
  id: totrans-699
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么加密货币会波动？
- en: 'There are several reasons why cryptocurrencies are particularly volatile:'
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 比特币或以太坊等加密货币之所以特别波动，有几个原因：
- en: 'Lack of Regulation: Unlike traditional markets, cryptocurrencies are not strictly
    regulated by financial institutions or governments. This means there are fewer
    mechanisms to stabilize the market.'
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 缺乏监管：与传统市场不同，加密货币不受金融机构或政府的严格监管。这意味着市场稳定机制较少。
- en: 'Young market: Cryptocurrencies are still relatively new compared to stocks
    or bonds. This lack of maturity translates into greater sensitivity to news and
    events.'
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 年轻市场：与股票或债券相比，加密货币仍然相对较新。这种不成熟导致对新闻和事件的敏感性更高。
- en: 'Low liquidity: Although some cryptocurrencies like Bitcoin have a large market
    capitalization, overall liquidity remains low compared to traditional markets.
    This means that large buy or sell orders can have a disproportionate impact on
    prices.'
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 流动性低：尽管一些加密货币如比特币拥有庞大的市值，但整体流动性与传统市场相比仍然较低。这意味着大额买入或卖出订单可能对价格产生不成比例的影响。
- en: 'Speculation: Much of the cryptocurrency market is fueled by speculation. Investors
    often seek to profit from short-term price movements, which further accentuates
    volatility.'
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 投机：加密货币市场的大部分是由投机驱动的。投资者经常寻求从短期价格变动中获利，这进一步加剧了波动性。
- en: Volatility as an Asset in Algorithmic Trading
  id: totrans-705
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 波动性作为算法交易中的资产
- en: 'While volatility may be perceived as a risk for traditional investors, it represents
    a unique opportunity for algorithmic trading. Here''s why:'
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然波动性可能被视为传统投资者的风险，但它代表了算法交易的独特机会。以下是原因：
- en: 'Profit opportunities: Volatility means that there are many price movements
    into which an algorithm can insert itself for profit. Unlike a stable market where
    opportunities are limited, a volatile market offers multiple entry and exit points
    for maximizing gains.'
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 获利机会：波动性意味着有许多价格变动，算法可以从中获利。与机会有限的市场相比，波动性市场提供了多个入场和离场点，以最大化收益。
- en: 'Exploiting micro-movements: Algorithms can be programmed to detect and exploit
    market micro-movements, i.e. the small price fluctuations that occur throughout
    the day. These movements, although small, can add up to significant gains, especially
    when exploited on a large scale.'
  id: totrans-708
  prefs: []
  type: TYPE_NORMAL
  zh: 利用微小变动：算法可以被编程来检测和利用市场微小变动，即一天中发生的微小价格波动。虽然这些变动很小，但累积起来可以产生显著的收益，尤其是在大规模利用时。
- en: 'Speed of execution: Algorithms can react to market changes in milliseconds,
    much faster than a human trader. In a volatile market, where prices can change
    rapidly, this ability to react instantly is crucial to capitalizing on opportunities.'
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 执行速度：算法可以以毫秒级的速度对市场变化做出反应，这比人类交易者快得多。在价格可能迅速变化的市场中，这种即时反应的能力对于利用机会至关重要。
- en: 'Adaptive strategies: Algorithms can be designed to automatically adjust their
    strategies according to market volatility. For example, an algorithm might adopt
    a more aggressive approach during periods of high volatility, and a more conservative
    approach when the market is more stable.'
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 自适应策略：算法可以被设计成根据市场波动性自动调整其策略。例如，一个算法可能在波动性高的时期采取更激进的策略，而在市场更稳定时采取更保守的策略。
- en: 'Practical example: Volatility-based trading strategy'
  id: totrans-711
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实际例子：基于波动的交易策略
- en: 'Let''s say you''re developing a trading robot in Python to exploit cryptocurrency
    volatility. One common strategy is the use of Bollinger Bands, which are based
    on volatility. Bollinger bands consist of three lines: a moving average and two
    standard deviation lines located above and below this average.'
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在用Python开发一个交易机器人来利用加密货币的波动性。一种常见的策略是使用布林带，它基于波动性。布林带由三条线组成：一个移动平均线和位于平均线上下两边的两个标准差线。
- en: 'Here''s how an algorithmic trading strategy might work:'
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是算法交易策略可能的工作方式：
- en: 'Buy condition: If the cryptocurrency price falls below the lower band, the
    robot interprets this as a buy opportunity, anticipating a rebound towards the
    mean.'
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 买入条件：如果加密货币价格低于下轨，机器人将其解释为买入机会，预期价格将反弹至均值。
- en: 'Sell condition: If the price exceeds the upper band, the robot may sell, anticipating
    a correction towards the mean.'
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 卖出条件：如果价格超过上轨，机器人可能会卖出，预期价格将向均值修正。
- en: In this context, volatility creates gaps between prices and bands, generating
    trading opportunities.
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，波动性在价格和带之间产生差距，从而产生交易机会。
- en: The high volatility of cryptocurrencies, while it may seem intimidating to some
    investors, is actually a valuable asset for algorithmic trading. Rapid, unpredictable
    price movements offer multiple profit opportunities for those who know how to
    exploit them. By using volatility-based strategies, algorithms can take advantage
    of these fluctuations to generate consistent returns. However, it is crucial to
    design these algorithms carefully, taking into account the risks inherent in volatility
    to avoid potential losses.
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 虚拟货币的高波动性，虽然对一些投资者来说可能显得令人畏惧，但实际上是算法交易的有价值资产。快速、不可预测的价格变动为那些知道如何利用它们的人提供了多个盈利机会。通过使用基于波动的策略，算法可以利用这些波动产生稳定的回报。然而，精心设计这些算法至关重要，需要考虑到波动固有的风险，以避免潜在的损失。
- en: The benefits of stock market platforms with programming APIs
  id: totrans-718
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 股票市场平台编程API的好处
- en: Stock market platforms or brokers that offer their users a programming API (Application
    Programming Interface) bring considerable added value to investors, especially
    those with programming skills or who wish to automate their investment strategies.
    An API enables direct communication with the trading platform via scripts or software,
    offering greater flexibility and efficiency.
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 提供编程API（应用程序编程接口）的股票市场平台或经纪人给投资者带来了相当大的附加价值，尤其是那些具有编程技能或希望自动化其投资策略的投资者。API允许通过脚本或软件直接与交易平台进行通信，提供更大的灵活性和效率。
- en: '![](images/image-6QB5WZBU.jpg)'
  id: totrans-720
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-6QB5WZBU.jpg)'
- en: How an API works
  id: totrans-721
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: API的工作原理
- en: Customer block
  id: totrans-722
  prefs: []
  type: TYPE_NORMAL
  zh: 客户端块
- en: 'Description: The client (which can be an application, a web browser or software)
    sends an HTTP request to the API to request information or perform an action.'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：客户端（可以是应用程序、网页浏览器或软件）向API发送HTTP请求以请求信息或执行操作。
- en: 'Query example: "Get user X''s data" or "Add a new user".'
  id: totrans-724
  prefs: []
  type: TYPE_NORMAL
  zh: 查询示例：“获取用户X的数据”或“添加新用户”。
- en: API block
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: API块
- en: 'Description: The API (Application Programming Interface) receives the client''s
    request, analyzes it and determines the actions to be taken. It acts as a bridge
    between the client and the server database.'
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：API（应用程序编程接口）接收客户端的请求，分析它并确定要采取的行动。它充当客户端和服务器数据库之间的桥梁。
- en: 'How it works :'
  id: totrans-727
  prefs: []
  type: TYPE_NORMAL
  zh: 工作原理：
- en: Receives the customer's request.
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 接收客户的请求。
- en: Interacts with the database to retrieve or modify data as requested by the customer.
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: 与数据库交互，根据客户请求检索或修改数据。
- en: Returns the appropriate response to the client, usually in the form of structured
    data (such as JSON or XML).
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 向客户端返回适当的响应，通常是结构化数据的形式（如JSON或XML）。
- en: Server database block
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 服务器数据库块
- en: 'Description: The database stores information requested or updated by the API.
    It can contain user data, transactions, products, etc.'
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 描述：数据库存储API请求或更新的信息。它可以包含用户数据、交易、产品等。
- en: 'Example of Operation :'
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 操作示例：
- en: Retrieve the information requested by the customer via the API.
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 通过API检索客户请求的信息。
- en: Update existing data or add new data.
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 更新现有数据或添加新数据。
- en: 'Global process :'
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 全局流程：
- en: Customer → Sends a request to the API (for example, a request for information).
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 客户 → 向API发送请求（例如，信息请求）。
- en: API → Receives the request, processes it, interacts with the database to obtain
    or modify the necessary data.
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: API → 接收请求，处理它，与数据库交互以获取或修改必要的数据。
- en: Server Database → Provides the requested data or performs the requested modification,
    sends the information back to the API.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 服务器数据库 → 提供所需的数据或执行所需的修改，将信息发送回API。
- en: API → Transmits data or action confirmation to the customer.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: API → 向客户传输数据或操作确认。
- en: Benefits of Programming APIs
  id: totrans-741
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编程API的好处
- en: 'Transaction automation :'
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: 交易自动化：
- en: APIs can be used to automate buy and sell orders according to predefined conditions.
    This can include strategies based on technical indicators, market events, or more
    complex algorithms. Automation helps eliminate human error and enables instant
    reaction to market opportunities.
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用API自动化买卖订单，根据预定义的条件。这可以包括基于技术指标、市场事件或更复杂算法的策略。自动化有助于消除人为错误，并能够即时应对市场机会。
- en: 'Real-time data access :'
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 实时数据访问：
- en: APIs provide direct, real-time access to market data, including share prices,
    trading volumes, price histories and much more. This enables traders to develop
    and test trading strategies based on up-to-date, accurate data.
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: API提供对市场数据的直接、实时访问，包括股价、交易量、价格历史等。这使交易者能够基于最新、准确的数据开发和测试交易策略。
- en: 'Strategy customization :'
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 策略定制：
- en: Thanks to APIs, investors can create customized trading strategies that specifically
    meet their objectives and risk tolerance. They can also integrate machine learning
    algorithms to continuously refine and improve their strategies.
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了API，投资者可以创建符合其目标和风险承受能力的定制交易策略。他们还可以集成机器学习算法，以持续优化和改进他们的策略。
- en: 'Portfolio management :'
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 投资组合管理：
- en: An API makes it possible to efficiently manage an investment portfolio by monitoring
    asset performance in real time, rebalancing the portfolio according to predefined
    criteria, and analyzing performance to make informed decisions.
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 通过实时监控资产表现、根据预定义标准调整投资组合以及分析表现来做出明智决策，API使得高效管理投资组合成为可能。
- en: 'Integration with other tools :'
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他工具集成：
- en: APIs facilitate the integration of trading platforms with other software tools,
    such as portfolio management systems, technical analysis platforms, or mobile
    applications. This creates a coherent ecosystem that improves operational efficiency.
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: APIs简化了交易平台与其他软件工具（如投资组合管理系统、技术分析平台或移动应用程序）的集成。这创建了一个连贯的生态系统，提高了运营效率。
- en: Examples of brokers offering a programming API
  id: totrans-752
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提供编程API的经纪商示例
- en: 1\. Interactive Brokers
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 1. Interactive Brokers
- en: 'Interactive Brokers (IB) is one of the world''s most recognized brokers for
    its advanced technology and low transaction costs. They offer a robust API that
    enables users to :'
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: Interactive Brokers (IB) 是全球最知名的经纪商之一，以其先进的技术和低交易成本而闻名。他们提供强大的API，使用户能够：
- en: Access real-time and historical market data.
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 访问实时和历史市场数据。
- en: Place trading orders and manage positions.
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 下达交易订单和管理头寸。
- en: Monitor the status of orders and accounts.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 监控订单和账户状态。
- en: Integrate with third-party software for advanced analysis and automation.
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 与第三方软件集成以进行高级分析和自动化。
- en: The Interactive Brokers API supports several programming languages, including
    Python, Java and C++, offering great flexibility for developers.
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: Interactive Brokers API支持多种编程语言，包括Python、Java和C++，为开发者提供了极大的灵活性。
- en: 2\. Saxo Bank
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 2. Saxo Bank
- en: 'Saxo Bank is another leading broker offering an advanced trading API. Their
    platform, SaxoTraderGO, offers an API called OpenAPI that enables :'
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: Saxo Bank 是另一家领先的经纪商，提供先进的交易API。他们的平台SaxoTraderGO提供了一个名为OpenAPI的API，它使得：
- en: Real-time order execution on a wide range of financial products, including equities,
    currencies, commodities and bonds.
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: 在包括股票、货币、商品和债券在内的广泛金融产品上进行实时订单执行。
- en: Access to real-time market data and historical information for in-depth analysis.
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 访问实时市场数据和历史信息，以进行深入分析。
- en: Automated, personalized account and portfolio management.
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化、个性化的账户和投资组合管理。
- en: Saxo Bank's API is designed to be easily integrated with custom applications,
    enabling users to develop automated, personalized trading solutions.
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: Saxo Bank的API设计用于轻松集成到自定义应用程序中，使用户能够开发自动化、个性化的交易解决方案。
- en: The benefits of Crypto Exchange Platforms offering a Programming API
  id: totrans-766
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提供编程API的加密货币交易平台的好处
- en: Cryptocurrency exchange platforms offering programming APIs to their users play
    a crucial role for cryptocurrency investors and traders. These APIs make it possible
    to automate transactions, access real-time data, and customize trading strategies.
    They offer unrivalled flexibility and efficiency, particularly for users with
    programming skills.
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 为用户提供编程API的加密货币交易平台在加密货币投资者和交易者中发挥着至关重要的作用。这些API使得自动化交易、访问实时数据和定制交易策略成为可能。它们提供了无与伦比的灵活性和效率，尤其是对于具有编程技能的用户。
- en: Advantages of Programming APIs for Crypto Exchanges
  id: totrans-768
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编程API在加密货币交易所的优势
- en: 'Transaction automation :'
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: 交易自动化：
- en: APIs can be used to set up trading bots that automatically execute buy and sell
    orders according to predefined algorithms. This helps maximize profit opportunities
    by reacting instantly to market fluctuations, without human intervention.
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用API设置交易机器人，根据预定义的算法自动执行买卖订单。这有助于通过即时对市场波动做出反应，无需人工干预，从而最大化盈利机会。
- en: 'Real-time data access :'
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: 实时数据访问：
- en: APIs provide direct access to real-time market data, including prices, transaction
    volumes and price histories. This makes it possible to develop strategies based
    on current data, and to test these strategies on historical data.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: APIs提供直接访问实时市场数据，包括价格、交易量和价格历史。这使得基于当前数据开发策略，并在历史数据上测试这些策略成为可能。
- en: 'Customizing Trading Strategies :'
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义交易策略：
- en: With APIs, traders can develop trading strategies tailored to their specific
    needs, using technical indicators or machine learning algorithms to make more
    informed decisions.
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 通过 API，交易者可以开发针对其特定需求的交易策略，使用技术指标或机器学习算法做出更明智的决策。
- en: 'Efficient Portfolio Management :'
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 高效的资产组合管理：
- en: APIs facilitate the management of cryptocurrency portfolios by enabling real-time
    monitoring of asset performance, automatic rebalancing of portfolios, and the
    generation of detailed performance reports.
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: API 通过允许实时监控资产表现、自动平衡资产组合和生成详细的性能报告，促进了加密货币投资组合的管理。
- en: 'Integration with other tools :'
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他工具的集成：
- en: APIs enable seamless integration with other software tools such as portfolio
    management systems, technical analysis platforms and mobile applications, creating
    a coherent ecosystem for trading.
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: API 使得与其他软件工具（如资产组合管理系统、技术分析平台和移动应用程序）的无缝集成成为可能，从而创建了一个连贯的交易生态系统。
- en: Examples of Crypto Exchanges offering a Programming API
  id: totrans-779
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提供编程 API 的加密货币交易所示例
- en: 1\. Binance
  id: totrans-780
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1. Binance
- en: 'Binance is one of the world''s largest cryptocurrency exchanges, offering a
    powerful and flexible API. The Binance API enables :'
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: Binance 是世界上最大的加密货币交易所之一，提供强大且灵活的 API。Binance API 使得：
- en: Access market data in real time.
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 实时访问市场数据。
- en: Execute trading orders, manage accounts and track transaction history.
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 执行交易订单，管理账户并跟踪交易历史。
- en: Set up trading bots to automate trading strategies.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 设置交易机器人来自动化交易策略。
- en: The Binance API is compatible with several programming languages, including
    Python, making it easy to develop customized solutions.
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: Binance API 与多种编程语言兼容，包括 Python，这使得开发定制解决方案变得容易。
- en: 2\. KuCoin
  id: totrans-786
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2. KuCoin
- en: 'KuCoin is another popular cryptocurrency exchange offering an advanced trading
    API. KuCoin API features include:'
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: KuCoin 是另一个流行的加密货币交易所，提供高级交易 API。KuCoin API 的特点包括：
- en: Access to real-time prices and historical transaction data.
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 访问实时价格和历史交易数据。
- en: Automated execution of buy and sell orders.
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 自动执行买卖订单。
- en: Online account and portfolio management.
  id: totrans-790
  prefs: []
  type: TYPE_NORMAL
  zh: 在线账户和资产组合管理。
- en: KuCoin's API is designed to be flexible and easy to integrate with third-party
    applications.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: KuCoin 的 API 被设计成灵活且易于与第三方应用程序集成。
- en: 3\. Coinbase
  id: totrans-792
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3. Coinbase
- en: 'Coinbase, one of the most widely used exchanges, offers a robust and secure
    API that enables :'
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: Coinbase 是最广泛使用的交易所之一，它提供了一个强大且安全的 API，使得：
- en: Access real-time and historical market data.
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 访问实时和历史市场数据。
- en: Execute transactions and manage accounts.
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 执行交易和管理账户。
- en: Integrate automated trading and portfolio management solutions.
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 集成自动化交易和资产组合管理解决方案。
- en: Coinbase's API is very accessible and well documented, making it easy for developers
    to use.
  id: totrans-797
  prefs: []
  type: TYPE_NORMAL
  zh: Coinbase 的 API 非常易于访问且文档齐全，使得开发者使用起来非常方便。
- en: Using Python APIs like CCXT
  id: totrans-798
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 Python API 如 CCXT
- en: To simplify the development of automated trading tools, there are Python libraries
    like CCXT (CryptoCurrency eXchange Trading Library). CCXT is an open-source library
    that facilitates interaction with multiple cryptocurrency exchanges via a single,
    standardized API.
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化自动化交易工具的开发，存在像 CCXT（加密货币交易所交易库）这样的 Python 库。CCXT 是一个开源库，它通过一个单一、标准化的 API
    促进了与多个加密货币交易所的交互。
- en: '![](images/image-IUYB6MOG.png)'
  id: totrans-800
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-IUYB6MOG.png)'
- en: 'Advantages of CCXT :'
  id: totrans-801
  prefs: []
  type: TYPE_NORMAL
  zh: CCXT 的优势：
- en: 'Standardization :'
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 标准化：
- en: CCXT offers a unified interface for interacting with numerous exchanges, eliminating
    the need to adapt to the specifics of each individual API.
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: CCXT 为与众多交易所交互提供了一个统一的界面，消除了需要适应每个单独 API 特定的需求。
- en: 'Extended support :'
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展支持：
- en: The library supports a wide range of exchanges, including Binance, KuCoin, Coinbase,
    and many others, making it easy to manage transactions on multiple platforms simultaneously.
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 该库支持广泛的交易所，包括 Binance、KuCoin、Coinbase 以及许多其他交易所，这使得同时管理多个平台上的交易变得容易。
- en: 'Ease of use :'
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 易用性：
- en: CCXT is easy for developers to use, thanks to its detailed documentation and
    intuitive interface. Developers can quickly set up trading bots and portfolio
    management tools.
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 由于其详细的文档和直观的界面，CCXT 对开发者来说易于使用。开发者可以快速设置交易机器人和资产组合管理工具。
- en: 'Flexibility :'
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 灵活性：
- en: Using CCXT, traders can easily implement and test different trading strategies
    on multiple exchanges without having to rewrite code for each platform.
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 CCXT，交易者可以轻松地在多个交易所上实施和测试不同的交易策略，而无需为每个平台重写代码。
- en: 'Code example with CCXT :'
  id: totrans-810
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用 CCXT 的代码示例：
- en: '![](images/image-70SF2PIZ.jpg)'
  id: totrans-811
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-70SF2PIZ.jpg)'
- en: Cryptocurrency exchanges offering programming APIs, such as Binance, KuCoin,
    and Coinbase, offer investors and traders a powerful platform for automating and
    optimizing their trading strategies. The use of Python libraries like CCXT further
    simplifies the development of these tools, making cryptocurrency trading more
    accessible and efficient. Thanks to these technologies, even non-expert traders
    can take advantage of the opportunities offered by the cryptocurrency market.
  id: totrans-812
  prefs: []
  type: TYPE_NORMAL
  zh: 提供编程API的加密货币交易所，如Binance、KuCoin和Coinbase，为投资者和交易者提供了一个强大的平台，用于自动化和优化他们的交易策略。使用CCXT等Python库进一步简化了这些工具的开发，使加密货币交易更加易于访问和高效。得益于这些技术，即使是非专业交易者也能利用加密货币市场提供的机会。
- en: Programming Tools for Finance
  id: totrans-813
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 金融编程工具
- en: Programming plays a crucial role in modern finance, providing powerful tools
    for tracking markets, generating buy and sell signals, and placing orders automatically.
    The use of programming languages such as Python makes it possible to develop tailor-made
    solutions to meet the specific needs of traders and investors. Here's how these
    tools can transform your approach to the financial markets.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: '编程在现代金融中扮演着至关重要的角色，提供了跟踪市场、生成买卖信号和自动下单的强大工具。使用Python等编程语言使得开发满足交易者和投资者特定需求的定制解决方案成为可能。以下是这些工具如何改变你对金融市场的看法。 '
- en: 'Market monitoring :'
  id: totrans-815
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 市场监控：
- en: Programming makes it possible to create sophisticated tools for real-time monitoring
    of financial market fluctuations. For example, with Python libraries such as Pandas
    and Matplotlib, traders can efficiently extract, manipulate and visualize market
    data. A Python script can be written to retrieve historical data on share prices,
    trading volumes and other financial indicators from sources such as Yahoo Finance
    or Alpha Vantage. This data can then be analyzed to identify trends and patterns.
    For example, a trader could use a script to calculate moving averages over different
    periods and visualize the crossovers of these averages, which is a common method
    for predicting future price movements.
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 编程使得创建用于实时监控金融市场波动的复杂工具成为可能。例如，使用Pandas和Matplotlib等Python库，交易者可以高效地提取、操作和可视化市场数据。可以编写一个Python脚本来从Yahoo
    Finance或Alpha Vantage等来源检索股价、交易量和其他金融指标的历史数据。然后，这些数据可以进行分析，以识别趋势和模式。例如，交易者可以使用脚本计算不同时期的移动平均线，并可视化这些平均线的交叉，这是预测未来价格变动的一种常见方法。
- en: 'Generate buy and sell signals :'
  id: totrans-817
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成买卖信号：
- en: Programming tools can also be used to develop algorithms for generating buy
    and sell signals. For example, the use of technical indicators such as the RSI
    (Relative Strength Index) or Bollinger Bands can be automated using Python scripts.
    Suppose a trader wants to buy a stock when its RSI falls below 30 (indicating
    that it is oversold) and sell when the RSI rises above 70 (indicating that it
    is overbought). A Python script can be designed to continuously monitor this stock's
    RSI and send alerts or generate buy and sell signals based on these thresholds.
    This not only saves time, but also enables you to react quickly to market opportunities.
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 编程工具也可以用来开发生成买卖信号的算法。例如，使用像RSI（相对强弱指数）或布林带这样的技术指标可以通过Python脚本来自动化。假设一个交易者想在股票的RSI低于30（表示超卖）时买入，当RSI高于70（表示超买）时卖出。可以设计一个Python脚本来持续监控这只股票的RSI，并根据这些阈值发送警报或生成买卖信号。这不仅节省了时间，还能让你快速响应市场机会。
- en: 'Automatic order placement :'
  id: totrans-819
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动订单放置：
- en: 'One of the greatest advantages of programming in finance is the ability to
    automate trade execution. APIs provided by brokers like Interactive Brokers or
    cryptocurrency exchanges like Binance enable traders to place orders automatically
    based on signals generated by their algorithms. For example, a trader can write
    a trading bot that executes a buy order when the price of a stock crosses a certain
    resistance level, or sells automatically when the price falls below a support
    level. This not only improves reactivity but also reduces the risk of human error.
    Let''s take a practical example with the Interactive Brokers API: a Python script
    can be used to monitor share prices in real time and place buy or sell orders
    instantly when certain conditions are met, such as a rapid price change or the
    appearance of abnormally high trading volumes.'
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 金融中编程的最大优势之一是能够自动化交易执行。像 Interactive Brokers 这样的经纪商或像 Binance 这样的加密货币交易所提供的
    API 使得交易者可以根据他们的算法生成的信号自动下单。例如，交易者可以编写一个交易机器人，当股票价格穿过某个阻力位时执行买入订单，或者当价格低于支撑位时自动卖出。这不仅提高了反应速度，还减少了人为错误的风险。让我们用一个实际的例子来说明
    Interactive Brokers API：一个 Python 脚本可以用来实时监控股价，并在满足某些条件时立即下单，例如价格快速变化或出现异常高的交易量。
- en: 'Practical example:'
  id: totrans-821
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实际例子：
- en: Imagine a trader using Python to develop a complete trading tool. This trader
    could use the ccxt library to connect to several cryptocurrency exchanges, retrieve
    market data, and analyze this data to generate signals. Then, with TA-Lib, he
    could apply technical indicators to refine his strategies. Finally, he could automate
    order execution using the exchanges' APIs via ccxt. Such a tool could monitor
    multiple markets around the clock, identify trading opportunities in real time,
    and execute trades without human intervention, maximizing potential profits while
    minimizing risk.
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一位交易者使用 Python 开发一个完整的交易工具。这位交易者可以使用 ccxt 库连接到多个加密货币交易所，检索市场数据，并分析这些数据以生成信号。然后，使用
    TA-Lib，他可以应用技术指标来细化他的策略。最后，他可以通过 ccxt 使用交易所的 API 自动化订单执行。这样的工具可以全天候监控多个市场，实时识别交易机会，并在无需人工干预的情况下执行交易，最大化潜在利润同时最小化风险。
- en: Programming offers powerful, flexible tools that are revolutionizing the way
    traders and investors interact with the financial markets. Whether it's monitoring
    market trends, generating buy and sell signals, or placing orders automatically,
    programming skills enable the creation of tailor-made solutions that improve trading
    efficiency and profitability.
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 编程提供了强大的、灵活的工具，正在改变交易者和投资者与金融市场互动的方式。无论是监控市场趋势、生成买卖信号还是自动下单，编程技能使得创建定制解决方案成为可能，从而提高交易效率和盈利能力。
- en: The PANDAS bookshop
  id: totrans-824
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: PANDAS 书店
- en: '![](images/image-25NO49XD.jpg)'
  id: totrans-825
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-25NO49XD.jpg)'
- en: Programming plays a crucial role in modern finance, providing powerful tools
    for tracking markets, generating buy and sell signals, and placing orders automatically.
    The use of programming languages such as Python makes it possible to develop tailor-made
    solutions to meet the specific needs of traders and investors. Here's how these
    tools can transform your approach to the financial markets.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 编程在现代金融中扮演着至关重要的角色，它提供了强大的工具来跟踪市场、生成买卖信号以及自动下单。使用 Python 等编程语言使得开发满足交易者和投资者特定需求的定制解决方案成为可能。以下是这些工具如何改变你对金融市场的方法。
- en: 'Market monitoring :'
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 市场监控：
- en: Programming makes it possible to create sophisticated tools for real-time monitoring
    of financial market fluctuations. For example, with Python libraries such as Pandas
    and Matplotlib, traders can efficiently extract, manipulate and visualize market
    data.
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 编程使得创建用于实时监控金融市场波动的复杂工具成为可能。例如，使用 Pandas 和 Matplotlib 等Python库，交易者可以高效地提取、操作和可视化市场数据。
- en: 'Pandas: A Detailed Introduction'
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas：详细介绍
- en: Pandas is an open-source data manipulation and analysis library widely used
    in finance. It offers flexible, high-performance data structures, notably DataFrames,
    which facilitate the manipulation of large quantities of data.
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 是一个开源的数据操作和分析库，在金融领域被广泛使用。它提供了灵活、高性能的数据结构，特别是 DataFrame，这有助于处理大量数据的操作。
- en: 'Pandas Possibilities:'
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 可能性：
- en: 'Reading and writing data :'
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 数据读取和写入：
- en: 'Pandas can read data from a variety of sources, including CSV files, Excel,
    SQL and even web APIs. Here''s an example of how to read a CSV file containing
    historical stock price data:'
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 可以从各种来源读取数据，包括 CSV 文件、Excel、SQL 以及甚至 Web API。以下是如何读取包含历史股价数据的 CSV 文件的示例：
- en: import pandas as pd
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: import pandas as pd
- en: Read a CSV file
  id: totrans-835
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 读取 CSV 文件
- en: data = pd.read_csv('historical_stock_prices.csv')
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: data = pd.read_csv('historical_stock_prices.csv')
- en: print(data.head())
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: print(data.head())
- en: 'Cleaning and Data Preparation :'
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 清洗和数据处理：
- en: 'Pandas offers powerful tools for cleaning and preparing data, such as handling
    missing values, normalizing data and converting data types. For example, to fill
    in missing values with the column mean :'
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 提供了强大的数据清洗和准备工具，例如处理缺失值、归一化数据和转换数据类型。例如，用列平均值填充缺失值：
- en: Replace missing values with column average
  id: totrans-840
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 用列平均值替换缺失值
- en: data.fillna(data.mean(), inplace=True)
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: data.fillna(data.mean(), inplace=True)
- en: 'Data handling and transformation :'
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 数据处理和转换：
- en: 'Pandas DataFrames enable flexible data manipulation. For example, you can easily
    calculate moving averages, common technical indicators used in finance:'
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas DataFrame 允许灵活的数据操作。例如，你可以轻松计算移动平均线、在金融中常用的技术指标：
- en: Calculation of 20-day moving average
  id: totrans-844
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 计算 20 日移动平均线
- en: data['MA20'] = data['Close'].rolling(window=20).mean()
  id: totrans-845
  prefs: []
  type: TYPE_NORMAL
  zh: data['MA20'] = data['Close'].rolling(window=20).mean()
- en: 'Data Analysis and Visualization :'
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析和可视化：
- en: 'With Pandas and Matplotlib, data can be visualized intuitively. For example,
    to plot closing prices and the moving average :'
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Pandas 和 Matplotlib，数据可以直观地可视化。例如，要绘制收盘价和移动平均线：
- en: import matplotlib.pyplot as plt
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: import matplotlib.pyplot as plt
- en: plt.figure(figsize=(10,5))
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: plt.figure(figsize=(10,5))
- en: plt.plot(data['Date'], data['Close'], label='Close Price')
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: plt.plot(data['Date'], data['Close'], label='收盘价')
- en: plt.plot(data['Date'], data['MA20'], label='20-Day MA')
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: plt.plot(data['Date'], data['MA20'], label='20 日 MA')
- en: plt.xlabel('Date')
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: plt.xlabel('日期')
- en: plt.ylabel('Price')
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: plt.ylabel('价格')
- en: plt.title('Close Price and 20-Day Moving Average')
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: plt.title('收盘价和 20 日移动平均线')
- en: plt.legend()
  id: totrans-855
  prefs: []
  type: TYPE_NORMAL
  zh: plt.legend()
- en: plt.show()
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: plt.show()
- en: 'Grouping and aggregation :'
  id: totrans-857
  prefs: []
  type: TYPE_NORMAL
  zh: 分组聚合：
- en: 'Pandas can be used to group data for more advanced analyses, for example to
    calculate the average yield per month:'
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 可以用于对数据进行分组，以进行更高级的分析，例如计算每月的平均收益率：
- en: data['Date'] = pd.to_datetime(data['Date'])
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: data['Date'] = pd.to_datetime(data['Date'])
- en: data.set_index('Date', inplace=True)
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: data.set_index('Date', inplace=True)
- en: monthly_returns = data['Close'].resample('M').ffill().pct_change()
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: monthly_returns = data['Close'].resample('M').ffill().pct_change()
- en: print(monthly_returns)
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: print(monthly_returns)
- en: Python Matplotlib for Computerized Trading
  id: totrans-863
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Python Matplotlib 用于计算机化交易
- en: '![](images/image-KBLR9X2F.png)'
  id: totrans-864
  prefs: []
  type: TYPE_IMG
  zh: '![](images/image-KBLR9X2F.png)'
- en: Introducing Matplotlib
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 介绍 Matplotlib
- en: Matplotlib is a Python-based data visualization library that is widely used
    to create static, animated and interactive charts. In the context of computerized
    trading, Matplotlib enables traders and financial analysts to visualize market
    data and analysis results, facilitating informed decision-making. Charts can be
    used to quickly spot trends, patterns and anomalies that might be difficult to
    detect in raw data sets.
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: Matplotlib 是一个基于 Python 的数据可视化库，广泛用于创建静态、动画和交互式图表。在计算机化交易领域，Matplotlib 使交易员和金融分析师能够可视化市场数据和分析师结果，从而促进明智的决策。图表可以快速发现趋势、模式和异常，这些在原始数据集中可能难以检测。
- en: The benefits of Matplotlib for computerized trading
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: Matplotlib 对计算机化交易的益处
- en: 'Visualizing trends and patterns :'
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化趋势和模式：
- en: Charts allow you to see price movements over different periods, helping to identify
    short- and long-term trends. For example, candlestick charts are commonly used
    to analyze daily stock price movements.
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 图表允许你看到不同时间段的价格变动，有助于识别短期和长期趋势。例如，蜡烛图常用于分析每日股价变动。
- en: 'Technical Analysis :'
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 技术分析：
- en: Matplotlib can be used to plot various technical indicators such as moving averages,
    Bollinger bands and RSI. These indicators are essential for technical traders
    who base their decisions on historical price patterns.
  id: totrans-871
  prefs: []
  type: TYPE_NORMAL
  zh: Matplotlib 可以用于绘制各种技术指标，如移动平均线、布林带和 RSI。这些指标对于基于历史价格模式做出决策的技术交易员至关重要。
- en: 'Data Comparison :'
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 数据比较：
- en: Charts make it easy to compare the performance of different financial assets.
    For example, a trader can plot the price curves of several stocks to compare their
    respective returns.
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 图表使得比较不同金融资产的表现变得容易。例如，交易员可以绘制几只股票的价格曲线来比较它们的各自回报。
- en: 'Anomaly detection :'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 异常检测：
- en: Visualizations help to detect anomalies or breakpoints in market data, such
    as exceptionally high trading volumes or unexpected price variations.
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
- en: Matplotlib's main functions
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
- en: 'Plot (Tracer) :'
  id: totrans-877
  prefs: []
  type: TYPE_NORMAL
- en: The plot() function is used to plot lines or series of points. It is often used
    to plot price time series.
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
- en: '![](images/image-X8YGKKI0.jpg)'
  id: totrans-879
  prefs: []
  type: TYPE_IMG
- en: 'Bar :'
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
- en: The bar() function creates bar charts, useful for comparing trading volumes
    or returns over different periods.
  id: totrans-881
  prefs: []
  type: TYPE_NORMAL
- en: '![](images/image-RR78573L.jpg)'
  id: totrans-882
  prefs: []
  type: TYPE_IMG
- en: 'Candlestick :'
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
- en: Candlestick charts can be created with the mplfinance library (formerly mpl_finance),
    a Matplotlib extension for financial charts.
  id: totrans-884
  prefs: []
  type: TYPE_NORMAL
- en: '![](images/image-5CRYEEP6.jpg)'
  id: totrans-885
  prefs: []
  type: TYPE_IMG
- en: 'Subplots :'
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
- en: The subplots() function creates several graphs in a single figure, useful for
    comparing different metrics or time periods.
  id: totrans-887
  prefs: []
  type: TYPE_NORMAL
- en: '![](images/image-32TD2OJX.jpg)'
  id: totrans-888
  prefs: []
  type: TYPE_IMG
- en: 'Scatter :'
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
- en: The scatter() function is used to create scatter plots, ideal for visualizing
    correlations between two variables.
  id: totrans-890
  prefs: []
  type: TYPE_NORMAL
- en: '![](images/image-LZPDYXZE.jpg)'
  id: totrans-891
  prefs: []
  type: TYPE_IMG
- en: Complete example in Python
  id: totrans-892
  prefs: []
  type: TYPE_NORMAL
- en: Here's a complete example using Matplotlib to visualize a stock's closing price
    data and trading volumes, as well as to add technical indicators such as moving
    averages.
  id: totrans-893
  prefs: []
  type: TYPE_NORMAL
- en: '| import ccxt import pandas as pd import matplotlib.pyplot as plt import mplfinance
    as mpf from datetime import datetime # Initialize Binance API exchange = ccxt.binance()
    # Define trading pair and period symbol = ''BTC/USDT timeframe = ''1d'' start_date
    = ''2014-01-01T00:00:00Z'' end_date = ''2014-07-01T00:00:00Z'' # Converting dates
    to timestamps start_timestamp = exchange.parse8601(start_date) end_timestamp =
    exchange.parse8601(end_date) # Retrieve historical data via the Binance API ohlcv
    = exchange.fetch_ohlcv(symbol, timeframe, since=start_timestamp, limit=1000) #
    Convert to DataFrame Pandas data = pd.DataFrame(ohlcv, columns=[''Date'', ''Open'',
    ''High'', ''Low'', ''Close'', ''Volume'']) data[''Date''] = pd.to_datetime(data[''Date''],
    unit=''ms'') data.set_index(''Date'', inplace=True) # Calculating moving averages
    data[''MA20''] = data[''Close''].rolling(window=20).mean() data[''MA50''] = data[''Close''].rolling(window=50).mean()
    # Tracing closing prices and moving averages plt.figure(figsize=(14,7)) plt.plot(data.index,
    data[''Close''], label=''Close Price'') plt.plot(data.index, data[''MA20''], label=''20-Day
    MA'') plt.plot(data.index, data[''MA50''], label=''50-Day MA'') plt.xlabel(''Date'')
    plt.ylabel(''Price'') plt.title(''Closing Prices and Moving Averages'') plt.legend()
    plt.show() # Using mplfinance for a candlestick chart mpf.plot(data, type=''candle'',
    style=''charles'', title=''BTC/USDT Candlestick Chart'', ylabel=''Price'', mav=(20,50),
    volume=True) |'
  id: totrans-894
  prefs: []
  type: TYPE_TB
- en: 'Code explanations :'
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
- en: 'ccxt: Used to interact with the Binance API and retrieve historical trading
    data.'
  id: totrans-896
  prefs: []
  type: TYPE_NORMAL
- en: 'fetch_ohlcv: Retrieves price data (Open, High, Low, Close, Volume) for the
    BTC/USDT pair over the specified period.'
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
- en: 'Moving averages: Calculation of 20-day and 50-day moving averages for technical
    analysis.'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
- en: 'mplfinance: Used to display a candlestick chart of closing prices, with moving
    averages and volume.'
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: mplfinance：用于显示收盘价的蜡烛图，包括移动平均线和成交量。
- en: '![](images/image-FV2QTFSN.jpg)'
  id: totrans-900
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-FV2QTFSN.jpg)'
- en: Matplotlib is an indispensable tool for computerized trading, enabling traders
    to visualize market data, analyze trends and make informed decisions based on
    clear, detailed graphical representations.
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: Matplotlib 是计算机化交易中不可或缺的工具，它使交易者能够可视化市场数据，分析趋势，并基于清晰、详细的图形表示做出明智的决策。
- en: Principle of Stock Information Collection
  id: totrans-902
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 股票信息收集原则
- en: Gathering market information is a crucial step in any trading or investment
    strategy. It involves retrieving real-time or historical market data from a variety
    of sources, such as cryptocurrency trading platforms, traditional brokers, or
    financial information services like Yahoo Finance. Here's how you can connect
    to these data sources and retrieve the necessary information using specific Python
    libraries.
  id: totrans-903
  prefs: []
  type: TYPE_NORMAL
  zh: 收集市场信息是任何交易或投资策略的关键步骤。它涉及从各种来源检索实时或历史市场数据，如加密货币交易平台、传统经纪商或像 Yahoo Finance 这样的金融信息服务。以下是您如何连接到这些数据源并使用特定的
    Python 库检索必要信息的说明。
- en: Collecting Data from a Cryptocurrency Platform
  id: totrans-904
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从加密货币平台收集数据
- en: Cryptocurrency platforms such as Binance or KuCoin offer APIs for retrieving
    real-time market data. We'll be using the ccxt library to interact with these
    APIs.
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 加密货币平台，如 Binance 或 KuCoin，提供用于检索实时市场数据的 API。我们将使用 ccxt 库与这些 API 进行交互。
- en: 'Example with Binance :'
  id: totrans-906
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Binance 的示例：
- en: 'Installing ccxt :'
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: '安装 ccxt :'
- en: pip install ccxt
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: pip install ccxt
- en: 'Login and Data Recovery :'
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: '登录和数据恢复 :'
- en: '![](images/image-EUMWO10F.jpg)'
  id: totrans-910
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/image-EUMWO10F.jpg)'
- en: In this example, we connect to the Binance API and retrieve the current ticker
    for the BTC/USDT pair, as well as the historical OHLCV (Open, High, Low, Close,
    Volume) data for a one-day period.
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个示例中，我们连接到 Binance API，并检索 BTC/USDT 对的当前报价，以及过去一天的 OHLCV（开盘价、最高价、最低价、收盘价、成交量）数据。
- en: Collecting data from a stockbroker
  id: totrans-912
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从股票经纪商收集数据
- en: Traditional brokers like Interactive Brokers also offer APIs for accessing market
    data and placing orders. We'll be using the Interactive Brokers API via the ib_insync
    library.
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的经纪商，如 Interactive Brokers，也提供访问市场数据和下订单的 API。我们将通过 ib_insync 库使用 Interactive
    Brokers API。
- en: 'Example with Interactive Brokers:'
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Interactive Brokers 的示例：
- en: 'Installation of ib_insync :'
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 安装 ib_insync：
- en: pip install ib_insync
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: pip install ib_insync
- en: 'Login and Data Recovery :'
  id: totrans-917
