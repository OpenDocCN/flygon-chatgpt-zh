- en: 'The Whisper Model Performs Speech Recognition to Convert Audio Into Text If
    you’ve ever worked with a speech recognition system before (even with sophisticated
    technologies like Siri and Alexa), you will know that it has problems, for instance:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Speech recognition has problems with punctuation**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have you noticed that nobody speaks with punctuation? For the English language,
    we use changes in tone or volume to ask a question or give an exclamation. We
    also use short and long pauses for commas and periods.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Speech recognition** **has problems with foreign words and accents**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Depending on who you ask, there are at least 170k words in the English language.
    However, in conversational English, we are always using foreign words like
  prefs:
