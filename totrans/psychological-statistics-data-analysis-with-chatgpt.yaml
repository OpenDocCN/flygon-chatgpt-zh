- en: Notes
  id: totrans-1091
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 备注
- en: -       Handling missing and erroneous data is necessary before analysis.
  id: totrans-1092
  prefs: []
  type: TYPE_NORMAL
  zh: -       在分析之前处理缺失和错误数据是必要的。
- en: '- Effect size interpretation should be context-dependent. Ensuring that assumptions
    are met before analysis increases the reliability of the results.'
  id: totrans-1093
  prefs: []
  type: TYPE_NORMAL
  zh: 效应量解释应取决于上下文。在分析之前确保假设得到满足，可以提高结果的可靠性。
- en: 7.4 Example Output of Two-Way ANOVA
