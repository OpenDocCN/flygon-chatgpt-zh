    this example, the Worker interface violates the Interface Segregation Principle
    because it forces all implementing classes to provide implementations for methods
    like eat() and sleep(), even though those methods are not relevant for all types
    of workers (such as robots).    To adhere to the Interface Segregation Principle,
    you would need to break down the monolithic Worker interface into smaller, more
    focused interfaces based on the specific responsibilities of each type of worker,
    such as Workable, Eatable, and Sleepable. This way, each class would only need
    to implement the interfaces that are relevant to its behavior.    # [Dependency
    Inversion Principle (DIP)](toc.xhtml#s23a)    In the following question, we also
    used the **ChatGPT 3.5** available using the web-based link:    **[https://chat.openai.com/](https://chat.openai.com/)**
    :    **Do you have a Java Code example that illustrates the SOLID Dependency Inversion
    Principle?**    Certainly! The Dependency Inversion Principle (DIP) is one of
    the SOLID principles that states that high-level modules should not depend on
    low-level modules. Both should depend on abstractions. Additionally, abstractions
    should not depend on details; details should depend on abstractions. In simpler
    terms, this principle encourages the use of interfaces or abstract classes to
    define high-level structures and relationships between components, promoting loose
    coupling and flexibility.    Here''s a Java code example that illustrates the
    Dependency Inversion Principle:    In this example, the Dependency Inversion Principle
    is demonstrated by introducing the Switchable interface. Both the LightBulb and
    Fan classes implement the Switchable interface. The Switch class depends on the
    Switchable abstraction rather than concrete implementations. This allows you to
    easily switch between different types of devices (light bulbs, fans, and more)
    without modifying the Switch class.    `// Dependency Inversion Principle Example`    `//
    High-level module that depends on an abstraction.`    `class LightBulb {`    `void
    turnOn() {`    `System.out.println("LightBulb: Bulb turned on.");`    `}`   [PRE104]
    `void turnOff() {`    `System.out.println("LightBulb: Bulb turned off.");`    `}`    `}`   [PRE105][PRE106]``py[PRE107]``
    `void turnOn() {`    `System.out.println("Switch: Turning on…");`    `device.turnOn();`    `}`   [PRE108]``
    `void turnOff() {`    `System.out.println("Switch: Turning off…");`    `device.turnOff();`    `}`    `}`   [PRE109]`
    `// Abstraction (interface) that both high-level modules depend on.`    `interface
