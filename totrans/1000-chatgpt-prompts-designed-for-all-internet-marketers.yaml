- en: 'FILL-IN-THE-BLANK PROMPTS :'
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 'FILL-IN-THE-BLANK PROMPTS :'
- en: '• Write a **[word count]** word sales page that starts by saying "Wait! Your
    order is not complete." And then uses persuasive language to create a sense of
    urgency around buying a product named **[name of the product]**, which has the
    following benefits:'
  id: totrans-541
