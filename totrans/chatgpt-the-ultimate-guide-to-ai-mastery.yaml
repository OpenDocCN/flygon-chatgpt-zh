  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 第9节：构建生成式人工智能工具
- en: 9.1 Introduction to Generative AI
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 9.1 生成式人工智能简介
- en: Generative AI refers to artificial intelligence models that can create new content,
    including text, images, music, and even code. With the advancement of large language
    models (LLMs) and neural networks, building custom AI tools is now more accessible
    than ever.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式人工智能指的是能够创建新内容的人工智能模型，包括文本、图像、音乐，甚至代码。随着大型语言模型（LLMs）和神经网络的进步，构建定制人工智能工具现在比以往任何时候都更容易。
- en: 9.1.1 Understanding the Core Components of Generative AI
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 9.1.1 理解生成式人工智能的核心组件
- en: '• Data: High-quality datasets fuel AI training.'
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: • 数据：高质量数据集是AI训练的燃料。
- en: '• Algorithms: Deep learning models like Transformers, GANs, and VAEs.'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: • 算法：如Transformer、GAN和VAE等深度学习模型。
- en: '• Computing Power: GPUs and TPUs optimize AI performance.'
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: • 计算能力：GPU和TPU优化AI性能。
- en: '• Deployment: Cloud-based AI services for scaling applications.'
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: • 部署：基于云的人工智能服务以扩展应用程序。
- en: '9.2 Steps to Build a Generative AI Tool 9.2.1 Step 1: Define the Purpose of
    the AI Tool'
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 9.2 构建生成式人工智能工具的步骤 9.2.1 步骤 1：定义AI工具的目的
