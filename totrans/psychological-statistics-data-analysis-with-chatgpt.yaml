- en: Chapter 1
  prefs: []
  type: TYPE_NORMAL
- en: Before Conducting Analysis
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we introduce the analytical methods covered in this book, the
    custom GPT model "PsychStatsAI", how to obtain sample data, examples of prompts,
    the Python libraries used in analysis, and how to handle data files within the
    GPT environment.
  prefs: []
  type: TYPE_NORMAL
- en: 1.1 Analytical Methods Covered in This Book
  prefs: []
  type: TYPE_NORMAL
- en: 'This book explains the following six analytical methods:'
  prefs: []
  type: TYPE_NORMAL
- en: Initial Data Analysis (IDA)
  prefs: []
  type: TYPE_NORMAL
- en: ●      Examining data structure, missing values, and distributions before conducting
    statistical tests.
  prefs: []
  type: TYPE_NORMAL
- en: Cross-tabulation Analysis
  prefs: []
  type: TYPE_NORMAL
- en: ●      Analyzing categorical data using contingency tables and related statistical
    tests.
  prefs: []
  type: TYPE_NORMAL
- en: Correlation Analysis
  prefs: []
  type: TYPE_NORMAL
- en: '●      Basic correlation analysis: Assessing relationships between continuous
    variables.'
  prefs: []
  type: TYPE_NORMAL
- en: '●      Point-biserial correlation: Examining relationships between continuous
    and binary variables.'
  prefs: []
  type: TYPE_NORMAL
- en: '●      Stratified correlation: Analyzing correlation within specific subgroups.'
  prefs: []
  type: TYPE_NORMAL
- en: Regression Analysis
  prefs: []
  type: TYPE_NORMAL
- en: '● Simple regression: Examining relationships between one independent variable
    and one dependent variable.'
  prefs: []
  type: TYPE_NORMAL
- en: '●      Non-linear regression: Modeling relationships when linear assumptions
    do not hold.'
  prefs: []
  type: TYPE_NORMAL
- en: Mean Difference Tests
  prefs: []
  type: TYPE_NORMAL
- en: ● Comparing means between groups using statistical tests such as t-tests and
    ANOVA.
  prefs: []
  type: TYPE_NORMAL
- en: Analysis of Variance (ANOVA)
  prefs: []
  type: TYPE_NORMAL
- en: '●      One-way ANOVA: Comparing means across three or more groups.'
  prefs: []
  type: TYPE_NORMAL
- en: '●      Two-way ANOVA: Analyzing the effects of two independent variables.'
  prefs: []
  type: TYPE_NORMAL
- en: '●      Analysis of covariance (ANCOVA): Controlling for covariates in mean
    comparisons.'
  prefs: []
  type: TYPE_NORMAL
- en: More advanced methods, such as multivariate analysis and machine learning, will
    be introduced in the second volume of this series.
  prefs: []
  type: TYPE_NORMAL
- en: 1.2 About the "PsychStatsAI"
  prefs: []
  type: TYPE_NORMAL
- en: '"PsychStatsAI" is a custom GPT model designed to support advanced statistical
    analyses in psychological research.'
  prefs: []
  type: TYPE_NORMAL
- en: Unlike traditional statistical software, this AI allows users to issue direct
    instructions in natural language, making it accessible to both beginners and experienced
    researchers.
  prefs: []
  type: TYPE_NORMAL
- en: By uploading an Excel or CSV file containing data, users can conduct various
    statistical analyses such as analysis of variance (ANOVA), correlation analysis,
    multiple regression analysis, and machine learning models.
  prefs: []
  type: TYPE_NORMAL
- en: The AI also determines the appropriate statistical tests based on the distribution
    of data and suggests suitable methods accordingly.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, it includes a feature that automatically formats results in an
    academic style, making it easier for researchers to incorporate statistical outputs
    into their papers and reports.
  prefs: []
  type: TYPE_NORMAL
- en: We developed this GPT model with inspiration from the 1980s American television
    series Knight Rider, where the protagonist, Michael Knight, collaborates with
    an AI-powered car, KITT, to solve cases.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, our goal is to create an AI assistant that enables researchers to
    tackle complex statistical problems efficiently and effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Key Features of "PsychStatsAI"
  prefs: []
  type: TYPE_NORMAL
- en: 'The functionalities enabled in "PsychStatsAI" include:'
  prefs: []
  type: TYPE_NORMAL
- en: ●      Canvas Feature – Allows users to visualize and annotate statistical outputs.
  prefs: []
  type: TYPE_NORMAL
- en: ● Code Interpreter & Data Analysis – Executes Python-based computations and
    statistical analyses.
  prefs: []
  type: TYPE_NORMAL
- en: The "Code Interpreter & Data Analysis" function enables the execution of code
    using programming languages such as Python, facilitating advanced data analysis
    and computations.
  prefs: []
  type: TYPE_NORMAL
- en: 'This AI model provides the following capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: Numerical Calculations
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ●      Performs arithmetic operations, statistical computations, linear algebra,
    differentiation, and integration.
  prefs: []
  type: TYPE_NORMAL
- en: Data Visualization
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ● Generates graphs such as bar charts, scatter plots, histograms, and box plots
    to facilitate visual data analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Statistical Analysis
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ● Conducts common statistical tests used in psychology and statistics, including
    t-tests, ANOVA, regression analysis, factor analysis, and cluster analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Data Processing and Formatting
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ● Handles CSV and Excel files, performs data preprocessing such as handling
    missing values and normalization.
  prefs: []
  type: TYPE_NORMAL
- en: Machine Learning & AI Modeling
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ● Builds and evaluates basic machine learning models, including regression,
    clustering, and classification models.
  prefs: []
  type: TYPE_NORMAL
- en: Simulation and Optimization
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ●      Executes Monte Carlo simulations and optimization problem-solving.
  prefs: []
  type: TYPE_NORMAL
- en: For example, when a user requests a t-test, the AI examines the data distribution,
    selects an appropriate statistical method, performs the analysis, and interprets
    the results.
  prefs: []
  type: TYPE_NORMAL
- en: Through these features, "PsychStatsAI" is more than just a conversational AI—it
    functions as a powerful tool for data analysis and problem-solving.
  prefs: []
  type: TYPE_NORMAL
- en: Security Recommendations
  prefs: []
  type: TYPE_NORMAL
- en: 'To ensure user security and data privacy, we strongly recommend:'
  prefs: []
  type: TYPE_NORMAL
- en: Do not upload personally identifiable information.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Disable data learning in GPT
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To do this, go to the upper right corner of the ChatGPT interface, select Settings
    → Data Controls, and turn off "Improve the model for everyone."
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Additionally, "PsychStatsAI" has been set to not use conversation data to improve
    the model.
  prefs: []
  type: TYPE_NORMAL
- en: Through these features, "PsychStatsAI" is more than just a conversational AI—it
    functions as a powerful tool for data analysis and problem-solving.
  prefs: []
  type: TYPE_NORMAL
- en: 1.3 Example Datasets and Prompt Examples
  prefs: []
  type: TYPE_NORMAL
- en: To facilitate hands-on learning, this book provides example datasets for analysis.
  prefs: []
  type: TYPE_NORMAL
- en: Each dataset is available in CSV and Excel formats, allowing users to directly
    upload them into "PsychStatsAI" for analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 'The example datasets and prompts used in this book can be obtained from the
    "PsychStatsAI" portal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://sites.google.com/view/psychstatjp](https://sites.google.com/view/psychstatjp)'
  prefs: []
  type: TYPE_NORMAL
- en: '![グラフィカル ユーザー インターフェイス, アプリケーション  AI によって生成されたコンテンツは間違っている可能性があります。](image_rsrc233.jpg)![タイムライン  AI
    によって生成されたコンテンツは間違っている可能性があります。](image_rsrc234.jpg)![グラフィカル ユーザー インターフェイス, アプリケーション,
    テーブル  AI によって生成されたコンテンツは間違っている可能性があります。](image_rsrc235.jpg)'
  prefs: []
  type: TYPE_IMG
- en: These prompts have been generated using OpenAI’s official tool “Prompt Generator,”
    released in October 2024, with slight modifications for better applicability.
  prefs: []
  type: TYPE_NORMAL
- en: This tool helps generate high-quality prompts suited for AI interaction.
  prefs: []
  type: TYPE_NORMAL
- en: The prompts used in this book are available in the "PsychStatsAI" GPTs and portal
    site.
  prefs: []
  type: TYPE_NORMAL
- en: Since the content is somewhat general, feel free to modify and adapt them as
    needed.
  prefs: []
  type: TYPE_NORMAL
- en: '![グラフィカル ユーザー インターフェイス, アプリケーション, テーブル  AI によって生成されたコンテンツは間違っている可能性があります。](image_rsrc236.jpg)'
  prefs: []
  type: TYPE_IMG
- en: The example datasets are entirely virtual data.
  prefs: []
  type: TYPE_NORMAL
- en: While the numbers presented are not completely random, please note that all
    examples and discussions in this book are based on hypothetical data.
  prefs: []
  type: TYPE_NORMAL
- en: 1.4 Python Libraries Used in This Book
  prefs: []
  type: TYPE_NORMAL
- en: 'The following Python libraries were primarily used for data analysis in this
    book:'
  prefs: []
  type: TYPE_NORMAL
- en: Data Processing and Preprocessing
  prefs: []
  type: TYPE_NORMAL
- en: ●      Pandas – Creating and manipulating data frames.
  prefs: []
  type: TYPE_NORMAL
- en: ●      NumPy – Numerical computations and array operations.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Scikit-learn – Data splitting and standardization.
  prefs: []
  type: TYPE_NORMAL
- en: Statistical Analysis
  prefs: []
  type: TYPE_NORMAL
- en: ●      SciPy – Statistical tests and distribution analysis.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Pingouin – Statistical tests and distribution analysis.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Statsmodels – Regression analysis and time-series analysis.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Researchpy – Descriptive statistics and cross-tabulation.
  prefs: []
  type: TYPE_NORMAL
- en: Data Visualization
  prefs: []
  type: TYPE_NORMAL
- en: ●      Matplotlib – Plotting graphs and figures.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Seaborn – Statistical data visualization.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Plotly – Interactive graphs.
  prefs: []
  type: TYPE_NORMAL
- en: Data Cleanup and Formatting
  prefs: []
  type: TYPE_NORMAL
- en: ●      OpenPyXL – Handling Excel files.
  prefs: []
  type: TYPE_NORMAL
- en: ●      xlsxwriter – Writing Excel files.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Pyxlsb – Handling Excel binary files.
  prefs: []
  type: TYPE_NORMAL
- en: ●      PyPDF2 – PDF manipulation.
  prefs: []
  type: TYPE_NORMAL
- en: Libraries related to factor analysis, Bayesian statistics, and machine learning
    will be covered in the subsequent volumes of this book series.
  prefs: []
  type: TYPE_NORMAL
- en: Note that not all Python libraries are available within the GPT environment,
    as certain functionalities are restricted depending on the system setup.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, the R programming language cannot be executed directly within
    GPT.
  prefs: []
  type: TYPE_NORMAL
- en: Exporting Analysis Results to Microsoft Word and PowerPoint
  prefs: []
  type: TYPE_NORMAL
- en: It is also possible to export analysis results to Microsoft Word or PowerPoint.
  prefs: []
  type: TYPE_NORMAL
- en: 'For this purpose, the following Python libraries are used:'
  prefs: []
  type: TYPE_NORMAL
- en: ●      python-docx – For generating and editing Word documents.
  prefs: []
  type: TYPE_NORMAL
- en: ●      python-pptx – For generating and editing PowerPoint presentations.
  prefs: []
  type: TYPE_NORMAL
- en: 1.5 How You Can Display GPT-Generated Graph Labels in Your Language
  prefs: []
  type: TYPE_NORMAL
- en: For non-English users who want to ensure that GPT-generated graph labels appear
    correctly in their own language, the most reliable method is to download an open-source
    font, send it to GPT, and instruct it to use the font.
  prefs: []
  type: TYPE_NORMAL
- en: '![](image_rsrc237.jpg)![グラフ, ヒストグラム  AI によって生成されたコンテンツは間違っている可能性があります。](image_rsrc238.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Steps
  prefs: []
  type: TYPE_NORMAL
- en: Download an Open-Source Font
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Download a font that supports your language from sources such as Google Fonts
    ([https://fonts.google.com](https://fonts.google.com)).
  prefs: []
  type: TYPE_NORMAL
- en: Examples of suitable fonts include Noto Sans, DejaVu, and Source Sans.
  prefs: []
  type: TYPE_NORMAL
- en: Send the Font File to GPT
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Upload the font file to GPT so that it can use the appropriate font when performing
    data analysis and generating graphs.
  prefs: []
  type: TYPE_NORMAL
- en: Instruct GPT to Use the Font
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Example instruction: "Please use this font to display the labels in the graph."'
  prefs: []
  type: TYPE_NORMAL
- en: '![グラフィカル ユーザー インターフェイス, テキスト, アプリケーション, メール  AI によって生成されたコンテンツは間違っている可能性があります。](image_rsrc239.jpg)![グラフィカル
    ユーザー インターフェイス, テキスト, アプリケーション  AI によって生成されたコンテンツは間違っている可能性があります。](image_rsrc23A.jpg)'
  prefs: []
  type: TYPE_IMG
- en: 1.6 When the Analysis Requested in a Prompt is Not Executed
  prefs: []
  type: TYPE_NORMAL
- en: 'This issue is not limited to "PsychStatsAI", but applies to GPT models in general:
    sometimes the instructions provided in a prompt are not executed as expected.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In such cases, try adding additional instructions or requesting further processing,
    such as:'
  prefs: []
  type: TYPE_NORMAL
- en: ●      Verify the relationship between all explanatory variables and the dependent
    variable.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Perform multiple comparisons.
  prefs: []
  type: TYPE_NORMAL
- en: '●      Generate a graph. Specify the axis labels, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: -       "Set the x-axis label as ... and the y-axis label as ..."
  prefs: []
  type: TYPE_NORMAL
- en: ● Format the results and discussion in the style of a psychology research paper.
  prefs: []
  type: TYPE_NORMAL
- en: ●      Provide a more detailed discussion.
  prefs: []
  type: TYPE_NORMAL
- en: By issuing more specific or additional commands, you may improve the likelihood
    of obtaining the desired analysis results.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter 2
  prefs: []
  type: TYPE_NORMAL
- en: Initial Data Analysis (IDA)
  prefs: []
  type: TYPE_NORMAL
- en: Initial Data Analysis (IDA) is a crucial preparatory step conducted before performing
    statistical analysis.
  prefs: []
  type: TYPE_NORMAL
- en: It enhances the fundamental understanding of the collected dataset and clarifies
    the information and assumptions necessary for progressing with the analysis.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key tasks in IDA include:'
  prefs: []
  type: TYPE_NORMAL
- en: '● Understanding the Data: Identifying the types, structure, range, distribution,
    and missing values in the dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Assessing Data Quality: Detecting issues such as missing values, outliers,
    and input errors.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Verifying Assumptions: Checking whether the data meets assumptions such as
    normality and independence.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Initial Visualization: Exploring trends and patterns through visual representations
    (e.g., histograms, scatter plots).'
  prefs: []
  type: TYPE_NORMAL
- en: '● Computing Summary Statistics: Calculating basic statistical measures such
    as mean, median, and standard deviation.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Planning Data Preprocessing: Preparing the dataset for subsequent analysis
    by removing unnecessary data, transforming variables, and adjusting scales.'
  prefs: []
  type: TYPE_NORMAL
- en: '● Adjusting Analysis Plans: Selecting appropriate analytical methods based
    on data characteristics and refining the plan accordingly.'
  prefs: []
  type: TYPE_NORMAL
- en: Relationship Between Initial Data Analysis (IDA) and Exploratory Data Analysis
    (EDA)
  prefs: []
  type: TYPE_NORMAL
- en: While IDA is an essential step in verifying and improving data quality (e.g.,
    identifying missing values and outliers, confirming data types, and computing
    descriptive statistics), Exploratory Data Analysis (EDA) serves a different purpose.
  prefs: []
  type: TYPE_NORMAL
- en: EDA focuses on understanding data structures, discovering patterns and relationships,
    and generating hypotheses.
  prefs: []
  type: TYPE_NORMAL
- en: In recent years, the importance of EDA has grown in psychological research.
    During hypothesis generation and the development of new theories, EDA is particularly
    useful for uncovering unknown patterns.
  prefs: []
  type: TYPE_NORMAL
- en: For example, in modern psychological studies utilizing big data and multivariate
    analysis, EDA serves as a powerful tool for gaining new insights.
  prefs: []
  type: TYPE_NORMAL
- en: IDA prepares the data for analysis, ensuring that it is in an analyzable state,
    whereas EDA helps develop a deeper understanding of the data to formulate analytical
    strategies.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, IDA is regarded as the "preparation phase," while EDA represents the "exploration
    phase," with both processes complementing each other.
  prefs: []
  type: TYPE_NORMAL
- en: 2.1 Example Prompts for Initial Data Analysis (IDA)
