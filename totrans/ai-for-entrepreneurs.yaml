  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保您的数据来源可靠。
- en: Regularly audit your AI models for bias and inaccuracies.
  id: totrans-151
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期审计您的AI模型以识别偏差和不准确性。
- en: B. Over-Reliance on Automation
