    |'
  id: totrans-1370
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1371
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: AI in Transhumanism
  id: totrans-1372
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 超人类主义中的AI
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1373
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: 'The captivating narratives of HAL 9000, the Terminator, and Frankenstein have
    all held us in thrall, serving as cautionary tales about the perils of rapid technological
    advancement. But what does the future hold? As we approach 2045, Ray Kurzweil
    makes a daring prediction: computers will surpass human intelligence. While we
    muse on these AI representations in fiction, let''s delve into an even darker
    territory: transhumanism.'
  id: totrans-1374
  prefs: []
  type: TYPE_NORMAL
  zh: HAL 9000、终结者以及弗兰肯斯坦的引人入胜的故事都让我们着迷，它们作为快速技术进步危险的警示故事。但未来会怎样呢？随着我们接近2045年，雷·库兹韦尔做出了一个大胆的预测：计算机将超越人类智能。当我们在虚构作品中的AI形象上沉思时，让我们深入一个更加黑暗的领域：超人类主义。
- en: 'Rather than fretting over machines becoming excessively human, consider the
    inverse: humans becoming excessively machine-like. It''s crucial to find the right
    equilibrium between humanity and technology, so brace yourselves - we need to
    stay ahead of the curve!'
  id: totrans-1375
  prefs: []
  type: TYPE_NORMAL
  zh: 不要担心机器变得过于像人类，而是考虑相反的情况：人类变得过于像机器。找到人类与技术之间正确平衡至关重要，所以做好准备——我们需要保持领先于曲线！
- en: Transhumanists theorize the feasibility of transferring human consciousness
    into machines, promising a form of eternal life. Tech titan Elon Musk is even
    working on brain-computer interfaces to facilitate human-robot interaction. However,
    this trajectory could lead to a future where humans become redundant.
  id: totrans-1376
  prefs: []
  type: TYPE_NORMAL
  zh: 超人类主义者理论化了将人类意识转移到机器上的可行性，承诺了一种形式的不朽生命。科技巨头埃隆·马斯克甚至正在研究人脑计算机接口以促进人机交互。然而，这条轨迹可能导致一个人类变得多余的未来。
- en: We're at a juncture, with AI and transhumanism on one side and an uncertain
    future on the other. Giant corporations wield algorithms that predict our every
    move, but there's no need for despair - regaining your autonomy is still within
    reach.
  id: totrans-1377
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正处于一个十字路口，一边是人工智能和超人类主义，另一边是不确定的未来。大型企业掌握着预测我们每一个动作的算法，但无需绝望——恢复你的自主权仍然触手可及。
- en: To reclaim control, we must explore and understand new technologies while safeguarding
    our intrinsic human qualities, such as independent thought. Each day brings us
    deeper insights into technology's capabilities - but the choice of how it will
    be used rests with you. Will it be a force for good, or will it lead to our downfall?
    ChatGPT, with its human-like conversational abilities, is a prime example of such
    technology that can be used to benefit humanity, rather than threaten it.
  id: totrans-1378
  prefs: []
  type: TYPE_NORMAL
  zh: 为了夺回控制权，我们必须探索和理解新技术，同时保护我们固有的人类品质，如独立思考。每一天都让我们对技术的能力有更深的洞察——但如何使用它的选择权在你手中。它将成为一股善的力量，还是会导致我们的衰落？ChatGPT，凭借其类似人类的对话能力，是这种可以用来造福人类而不是威胁人类的技术的典型例子。
- en: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
  id: totrans-1379
  prefs: []
  type: TYPE_TB
  zh: '| ![image](d2d_images/chapter_title_corner_decoration_left.png) |  | ![image](d2d_images/chapter_title_corner_decoration_right.png)
    |'
- en: '![image](d2d_images/chapter_title_above.png)'
  id: totrans-1380
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_above.png)'
- en: Future of ChatGPT
  id: totrans-1381
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ChatGPT的未来
- en: '![image](d2d_images/chapter_title_below.png)'
  id: totrans-1382
  prefs: []
  type: TYPE_IMG
  zh: '![image](d2d_images/chapter_title_below.png)'
- en: More human-like conversation - ChatGPT will continue to become better at understanding
    context, nuance, and producing more human-sounding responses. The goal is to make
    communicating with AI indistinguishable from humans.
  id: totrans-1383
  prefs: []
  type: TYPE_NORMAL
  zh: 更像人类的对话——ChatGPT将继续变得更好，能够理解上下文、细微差别，并产生更多听起来像人类的声音。目标是使与AI的交流与人类交流无法区分。
- en: 'Integration into more applications: ChatGPT''s capabilities will be integrated
    into many different apps and interfaces. For example, AI writing assistants, code
    autocompletion tools, educational apps, etc.'
  id: totrans-1384
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 集成到更多应用中：ChatGPT的能力将被集成到许多不同的应用程序和界面中。例如，AI写作助手、代码自动完成工具、教育应用等。
- en: 'Generative creativity: ChatGPT shows potential for AI to be creative and generative
    beyond just mimicking human language. It may be able to generate music, images,
    and even new ideas in the future.'
  id: totrans-1385
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成性创造力：ChatGPT显示出AI在模仿人类语言之外具有创造性和生成性的潜力。它未来可能能够生成音乐、图像，甚至产生新的想法。
- en: 'Democratization of knowledge: ChatGPT makes vast amounts of information accessible
    to anyone for free. This could greatly expand opportunities for learning and problem-solving.'
  id: totrans-1386
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 知识民主化：ChatGPT使大量信息对任何人免费开放。这可能会极大地扩大学习和解决问题的机会。
- en: 'Impact on work: AI assistants like ChatGPT could take over many repetitive
    information-based jobs like customer service, report writing, etc. It may displace
    many white-collar workers.'
  id: totrans-1387
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对工作的影响：像ChatGPT这样的AI助手可能会接管许多重复的信息性工作，如客户服务、报告撰写等。它可能会取代许多白领工作者。
- en: 'Goal-aligned intelligence: Future AI systems need alignment to human values
    and goals. ChatGPT shows risks of AI not having a unified objective. Safeguards
    will need to be developed.'
  id: totrans-1388
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标一致的人工智能：未来的AI系统需要与人类价值观和目标保持一致。ChatGPT显示出AI没有统一目标的危险。需要开发安全措施。
- en: 'Regulation debates: As capabilities increase, there will be debates around
    regulation, like monitoring for misuse, limiting areas AI can operate, etc. Difficult
    tradeoffs will need to be made.'
  id: totrans-1389
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监管辩论：随着能力的增强，将围绕监管展开辩论，如监控滥用、限制AI可以操作的区域等。需要做出困难的权衡。
- en: 'Determining truth: ChatGPT sometimes generates plausible-sounding but false
    information. Future systems will need robust methods for distinguishing truth
    and falsehoods.'
  id: totrans-1390
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定真相：ChatGPT有时会生成听起来合理但实际上是错误的信息。未来的系统将需要强大的方法来区分真相和谎言。
