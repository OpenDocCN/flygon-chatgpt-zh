  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"我管理时间很困难，尤其是在平衡[工作、学习、个人生活]时。请建议一个结构化的时间管理计划，包括生产力技巧和日常惯例以保持进度。"'
