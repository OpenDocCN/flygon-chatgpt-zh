- en: '[9](15580-0013.xhtml#en137r). At each time step, each weight decreases a tiny
    amount in proportion to its value. A weight that is not strengthened by learning
    will wither away, reducing the number of parameters. This is a form of regularization.
    (See glossary.)'
  id: totrans-1903
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[9](15580-0013.xhtml#en137r). 在每个时间步，每个权重都会按其值成比例地减少一小部分。那些没有被学习强化的权重会枯萎，减少参数数量。这是一种正则化的形式。（参见术语表。）'
