  id: totrans-1041
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者保留，独家授权给 APress 媒体公司，Springer Nature 集团，2024B. HopkinsChatGPT for Java[https://doi.org/10.1007/979-8-8688-0116-7_7](https://doi.org/10.1007/979-8-8688-0116-7_7)
- en: '7. Adding Intelligence to Our Discord Bots, Part 2: Using the Chat and Moderation
    Endpoints for Moderation'
  id: totrans-1042
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 7. 为我们的 Discord 机器人添加智能，第二部分：使用 Chat 和 Moderation 端点进行审查
- en: 'Bruce Hopkins^([1](#Aff2)  )(1)Beaverton, OR, USAIn this chapter, we’re going
    to take the steps necessary in order to make our Content Moderator Discord bot
    artificially intelligent. Let’s overview the changes that we’re going to make:'
  id: totrans-1043
  prefs: []
  type: TYPE_NORMAL
  zh: '布鲁斯·霍普金斯^([1](#Aff2)  )(1)美国俄勒冈州比佛顿In this chapter, we’re going to take the
    steps necessary in order to make our Content Moderator Discord bot artificially
    intelligent. Let’s overview the changes that we’re going to make:'
- en: 'Create a new class, ModerationClient.java, to invoke the Moderations Endpoint.
    The Moderations Endpoint allows us to be aware when any textual content fits any
    of the following categories:'
  id: totrans-1044
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个新的类，ModerationClient.java，用于调用 Moderations 端点。Moderations 端点使我们能够知道任何文本内容是否属于以下任何一类：
- en: Hate
  id: totrans-1045
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 厌恶
- en: Hate/threatening
  id: totrans-1046
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 厌恶/威胁
- en: Harassment
  id: totrans-1047
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市扰
- en: Harassment/threatening
  id: totrans-1048
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市扰/威胁
- en: Self-harm
  id: totrans-1049
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自伤
- en: Self-harm/intent
  id: totrans-1050
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自伤/意图
- en: Self-harm/instructions
  id: totrans-1051
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自伤/指导
- en: Sexual
  id: totrans-1052
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性相关
- en: Sexual/minors
  id: totrans-1053
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性相关/未成年人
- en: Violence
  id: totrans-1054
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 暴力
- en: Violence/graphic
  id: totrans-1055
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 暴力/血腥
- en: Reuse our ChatGPTClientForQAandModeration.java from the previous chapter. In
    Chapter [6](607613_1_En_6_Chapter.xhtml), it was used to invoke the Chat Endpoint
    for Q&A purposes from our users. In this chapter, it will be used to invoke the
    Chat Endpoint again, but this time for moderation purposes. This is why the class
    is aptly named. “ChatGPTClientForQAandModeration,” because it’s used for Q&A in
    Chapter [6](607613_1_En_6_Chapter.xhtml), but also for moderation in this chapter.
  id: totrans-1056
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从上一章复用 ChatGPTClientForQAandModeration.java。在第 [6](607613_1_En_6_Chapter.xhtml)
    章，它被用来从我们的用户那里调用 Chat 端点以进行问答。在这一章中，它将被用来再次调用 Chat 端点，但这次是为了进行审查。这就是为什么这个类名字恰当的原因。“ChatGPTClientForQAandModeration”，因为它在第
    [6](607613_1_En_6_Chapter.xhtml) 章用于问答，但在这个章节也用于审查。
- en: Modify our ContentModeratorBot.java class (formerly named ContentModeratorBotDumb.java)
    so that it can invoke both the ModerationClient.java and ChatGPTClientForQAandModeration.java.
    If either classes indicate that the content typed in the Discord channel is objectionable,
    then delete the message from that Discord channel. Remember, this bot watches
    all content in all channels of the Discord server!
  id: totrans-1057
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修改我们的 ContentModeratorBot.java 类（之前命名为 ContentModeratorBotDumb.java），使其能够调用
    ModerationClient.java 和 ChatGPTClientForQAandModeration.java。如果任一类指示 Discord 通道中输入的内容令人反感，则从该
    Discord 通道中删除该消息。记住，这个机器人监视 Discord 服务器中所有通道的所有内容！
- en: Note
  id: totrans-1058
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Now, it this point, you may be asking yourself, if the Moderations Endpoint
    already knows how to flag any harmful content, then why do we need to use Chat
    Endpoint as well? Good question.
  id: totrans-1059
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在这个时候，你可能自己会问，如果 Moderations 端点已经知道如何标记任何有害内容，那么为什么我们还需要使用 Chat 端点呢？这是个好问题。
- en: Yes, the Moderations Endpoint will allow us to know about harmful content, but
    it **DOES NOT** inform us about any other types of unwanted content for our scenario,
    such as when unscrupulous individuals try to lure our users into a scam. Remember,
    this is a Discord server for a banking app, so scammers would definitely love
    to target all the members of this Discord server since it’s a central location
    full of bank users!
  id: totrans-1060
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，Moderations 端点将使我们了解有害内容，但它 **不会** 通知我们关于我们场景中其他类型不受欢迎的内容，例如当不诚实的人试图诱骗我们的用户参与诈骗时。记住，这是一个银行应用的
    Discord 服务器，因此骗子肯定会喜欢针对这个 Discord 服务器中的所有成员，因为这个服务器是一个充满银行用户的中心位置！
- en: Therefore, we’ll use the ModerationClient.java to invoke the Moderations Endpoint
    to know if any content in the Discord server is harmful, and we’ll reuse the ChatGPTClientForQAandModeration.java
    from the last chapter in order to invoke the Chat Endpoint in order to be made
    aware of any other undesirable content is posted in the Discord server, such as
    scam attempts.
  id: totrans-1061
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们将使用 ModerationClient.java 调用 Moderations 端点，以了解 Discord 服务器中的任何内容是否有害，并且我们将复用上一章中的
    ChatGPTClientForQAandModeration.java，以便调用 Chat 端点，以便了解 Discord 服务器中发布的任何其他不受欢迎的内容，例如诈骗尝试。
- en: Moderations Endpoint
  id: totrans-1062
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Moderations 端点
- en: The Moderations Endpoint allows developers to submit a String of text, and to
    subsequently know if it’s violent, hateful, threatening, or contains any form
    of harassment.
  id: totrans-1063
  prefs: []
  type: TYPE_NORMAL
  zh: 调解端点允许开发者提交一段文本，并随后了解该文本是否具有暴力、仇恨、威胁或包含任何形式的骚扰。
- en: Creating the Request
  id: totrans-1064
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建请求
- en: Table [7-1](#Tab1) lists all the HTTP parameters necessary to call the Moderations
    Endpoint.Table 7-1
  id: totrans-1065
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [7-1](#Tab1) 列出了调用调解端点所需的全部 HTTP 参数。表 7-1
- en: The HTTP Parameters for the Moderations Endpoint
  id: totrans-1066
  prefs: []
  type: TYPE_NORMAL
  zh: 调解端点的 HTTP 参数
- en: '| HTTP Param | Description |'
  id: totrans-1067
  prefs: []
  type: TYPE_TB
  zh: '| HTTP Param | 描述 |'
- en: '| --- | --- |'
  id: totrans-1068
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Endpoint URL | [https://api.openai.com/v1/moderations](https://api.openai.com/v1/moderations)
    |'
  id: totrans-1069
  prefs: []
  type: TYPE_TB
  zh: '| 端点 URL | [https://api.openai.com/v1/moderations](https://api.openai.com/v1/moderations)
    |'
- en: '| Method | POST |'
  id: totrans-1070
  prefs: []
  type: TYPE_TB
  zh: '| 方法 | POST |'
- en: '| Header | Authorization: Bearer **$OPENAI_API_KEY** |'
  id: totrans-1071
  prefs: []
  type: TYPE_TB
  zh: '| Header | Authorization: Bearer **$OPENAI_API_KEY** |'
- en: '| Content-Type | application/json |'
  id: totrans-1072
  prefs: []
  type: TYPE_TB
  zh: '| Content-Type | application/json |'
- en: Table [7-2](#Tab2) describes the format of the JSON object necessary for the
    request body for the Moderations Endpoint. The service is very simple to use,
    since only one parameter is required to properly invoke the service.
  id: totrans-1073
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [7-2](#Tab2) 描述了用于调解端点请求体的 JSON 对象的格式。服务非常简单易用，因为只需要一个参数就可以正确调用服务。
- en: Create Moderation (JSON)
  id: totrans-1074
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建调解（JSON）
- en: Table 7-2
  id: totrans-1075
  prefs: []
  type: TYPE_NORMAL
  zh: 表 7-2
- en: The Request Body for the Moderation Endpoint
  id: totrans-1076
  prefs: []
  type: TYPE_NORMAL
  zh: 调解端点的请求体
- en: '| Field | Type | Required? | Description |'
  id: totrans-1077
  prefs: []
  type: TYPE_TB
  zh: '| 字段 | 类型 | 必需？ | 描述 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-1078
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| Input | String or Array | Required | The text that needs to be classified.
    |'
  id: totrans-1079
  prefs: []
  type: TYPE_TB
  zh: '| Input | String or Array | 必需 | 需要分类的文本。 |'
- en: '| Model | Stringdefault: “text-moderation-latest” | Optional | There are actually
    two content moderation models available for use: “text-moderation-stable” and
    “text-moderation-latest.”By default, this is set to “text-moderation-latest.”
    It will be automatically upgraded over time, which ensures you’re always using
    the most accurate model.If you use “text-moderation-stable,” you will be given
    advance notice before the model is updated.The accuracy of “text-moderation-stable”
    tends to be slightly lower than for “text-moderation-latest.” |'
  id: totrans-1080
  prefs: []
  type: TYPE_TB
  zh: '| Model | Stringdefault: “text-moderation-latest” | 可选 | 实际上，有两种内容调解模型可供使用：“text-moderation-stable”和“text-moderation-latest”。默认设置为“text-moderation-latest”。它将随着时间的推移自动升级，这确保您始终使用最准确的模式。如果您使用“text-moderation-stable”，在模型更新之前您将收到提前通知。“text-moderation-stable”的准确性通常略低于“text-moderation-latest”。
    |'
- en: Handling the JSON Response
  id: totrans-1081
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 处理 JSON 响应
- en: After successfully invoking the Moderations Endpoint, the service will provide
    a JSON response with the structure shown in Table [7-3](#Tab3).
  id: totrans-1082
  prefs: []
  type: TYPE_NORMAL
  zh: 在成功调用调解端点后，服务将提供一个具有如表 [7-3](#Tab3) 所示结构的 JSON 响应。
- en: Moderation (JSON)
  id: totrans-1083
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调解（JSON）
- en: Table 7-3
  id: totrans-1084
  prefs: []
  type: TYPE_NORMAL
  zh: 表 7-3
- en: The Structure of the Moderation JSON Object
  id: totrans-1085
  prefs: []
  type: TYPE_NORMAL
  zh: 调解 JSON 对象的结构
- en: '| Field | Type | Description |'
  id: totrans-1086
  prefs: []
  type: TYPE_TB
  zh: '| 字段 | 类型 | 描述 |'
- en: '| --- | --- | --- |'
  id: totrans-1087
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Id | String | A unique identifier for the moderation request. |'
  id: totrans-1088
  prefs: []
  type: TYPE_TB
  zh: '| Id | String | 调解请求的唯一标识符。 |'
- en: '| Model | String | The model used to perform the moderation request. |'
  id: totrans-1089
  prefs: []
