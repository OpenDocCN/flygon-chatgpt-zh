  id: totrans-498
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否注意到受众经常讨论的某些问题或主题？
- en: Would you like to include open-ended questions or audience challenges?
  id: totrans-499
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否希望包含开放式问题或受众挑战？
- en: How will you encourage viewers to interact with your content (polls, contests,
