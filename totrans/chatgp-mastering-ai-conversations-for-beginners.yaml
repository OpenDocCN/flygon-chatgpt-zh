  id: totrans-1057
  prefs: []
  type: TYPE_NORMAL
  zh: '**对话设计**的最终原则是让你的聊天机器人对用户在聊天中可能犯的错误或失误保持宽容。在这个世界上，没有人是完美的，误解在我们交流的过程中时不时会出现。我们可以这样说，犯错是我们本质的一部分。虽然我们经常不能容忍AI犯下的任何小错误，但我们确实期望它能够容忍我们在使用或与之聊天时犯下的错误。使AI具有容错性是一个相当棘手的工作，考虑到它存在于一个由一和零组成的世界。但你可以实施一些措施来使它更好地装备起来。一种方法是在你的LLM数据集中包含常见的拼写错误。想想谷歌搜索，如果你拼写了一个单词，它仍然会给你正确的结果，即使是在提供正确的拼写下面。另一种方法是确保你不将“我不理解”作为预编程的响应。相反，包括一个像“你是说”这样的短语，然后提供包含相关搜索的按钮，这些搜索可以帮助你的用户通过他们的查询回到正轨。最后，作为一个安全措施，为用户提供一个选项，如果他们无法从你的机器人那里得到他们想要的东西，他们可以记录一个将由人类阅读的工单。'
