    ****as**kin**g ****t**he** ****L**LM** ****t**o** ****ta**ke** ****o**n** ****a****
    ****spe**cifi**c ****ro**le**, ****Refr**amin**g ****foc**use**s ****o**n** ****cha**ngin**g
    ****t**he** ****pers**pectiv**e ****o**n** ****t**he** ****is**sue** ****wit**hou**t
    ****nece**ssaril**y ****cha**ngin**g ****t**he** ****ro**le** ****o**f** ****t**he**
