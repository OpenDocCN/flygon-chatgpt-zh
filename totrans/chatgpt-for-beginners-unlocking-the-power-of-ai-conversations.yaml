  prefs: []
  type: TYPE_NORMAL
  zh: '**如何工作**：**APIs**（**应用程序编程接口）**充当**ChatGPT和其他软件应用之间的桥梁。开发者可以编程式地与ChatGPT交互，定制其行为并将其与其他工具集成。'
