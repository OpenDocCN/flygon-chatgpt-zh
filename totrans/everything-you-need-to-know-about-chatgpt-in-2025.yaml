  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第七章：使用API实现智能自动化**'
- en: '****H****o**w** ****t****o**** ****u****s**e** ****t****h**e** ****Cha**t**G**PT**
    ****A****P**I** ****t****o**** ****dev**e**l**op** ****ap****p**s**'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何使用ChatGPT API开发应用**'
- en: '****T****h**e** ****Cha**t**G**PT** ****A****P**I** ****repr**e**se**nts**
    ****a**** ****gat**e**w**ay** ****t****o**** ****inte**ll**ig**ent** ****auto**m**at**ion**,
    ****all**o**wi**ng** ****deve**l**op**ers** ****a****n**d** ****ente**rp**ri**ses**
    ****t****o**** ****inte**g**ra**te** ****nat**u**r**al** ****lan**g**ua**ge**
    ****proc**e**ss**ing** ****capa**bi**li**tie**s ****in****t**o** ****a**** ****var**i**e**ty**
    ****o****f**** ****appl**ic**at**ion**s. ****Un**l**i**ke** ****di**r**e**ct**
    ****inte**ra**ct**ion**s ****wi****t**h** ****Cha**t**G**PT** ****o****n**** ****prede**te**rm**ine**d
    ****plat**f**or**ms**, ****us**i**n**g** ****t****h**e** ****A****P**I** ****of**f**e**rs**
    ****flex**ib**il**ity** ****a****n**d** ****fu****l**l** ****con**t**r**ol** ****ov****e**r**
    ****t****h**e** ****inte**ra**ct**ion** ****bet**w**e**en** ****t****h**e** ****mo**d**e**l**
    ****a****n**d** ****exi**s**ti**ng** ****sys**t**e**ms**. ****Fr****o**m** ****pers**on**al**ize**d
    ****vir**t**u**al** ****assi**s**ta**nts** ****t****o**** ****da****t**a** ****ana**l**ys**is**
    ****to**o**l**s**, ****t****h**e** ****possi**bi**li**tie**s ****a****r**e** ****a****s****
    ****va****s**t** ****a****s**** ****t****h**e** ****imag**in**at**ion** ****o****f****
    ****i****t**s** ****us**e**r**s**.'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: '**ChatGPT API** 代表通往智能自动化的门户，允许开发者和企业将自然语言处理能力整合到各种应用中。与 ChatGPT 在预定义平台上直接交互不同，使用
    API 提供了灵活性和对模型与现有系统之间交互的完全控制。从个性化的虚拟助手到数据分析工具，可能性如同用户想象般广阔。'
- en: '****T****o**** ****g****e**t** ****sta**r**t**ed**, ****i****t****''****s****
    ****esse**n**ti**al** ****t****o**** ****unde**r**st**and** ****h****o**w** ****t****h**e**
    ****A****P**I** ****wo**r**k**s** ****a****n**d** ****wh****a**t** ****ele**m**en**ts**
    ****ma****k**e** ****u****p**** ****i****t**s** ****foun**da**ti**ons**. ****T****h**e**
    ****Cha**t**G**PT** ****A****P**I** ****i****s**** ****ba**s**e**d** ****o****n****
    ****a**** ****cl**i**e**nt**-****se**r**v**er** ****mo**d**e**l**, ****wh**e**r**e**
    ****t****h**e** ****cl**i**e**nt** (****usu**a**l**ly** ****a**** ****us****e**r**-****deve**l**op**ed**
    ****pro**g**r**am**) ****se**n**d**s** ****req**u**es**ts** ****t****o**** ****t****h**e**
    ****se**r**v**er** ****th****a**t** ****ho**s**t**s** ****Op**e**n**AI**''****s****
    ****mo**d**e**l**. ****Th**e**s**e** ****req**u**es**ts** ****con**t**a**in**
    ****pro**m**p**ts** ****des**i**gn**ed** ****t****o**** ****el**i**c**it** ****mo**d**e**l**-****spe**c**if**ic**
    ****resp**o**ns**es**. ****T****h**e** ****se**r**v**er** ****proc**e**ss**es**
    ****t****h**e** ****in**p**u**ts** ****a****n**d** ****ret**u**r**ns** ****a****n****
    ****ou**t**p**ut**, ****wh**i**c**h** ****t****h**e** ****cl**i**e**nt** ****c****a**n**
    ****mani**p**ul**ate** ****o****r**** ****pre**s**e**nt** ****depe**n**di**ng**
    ****o****n**** ****t****h**e** ****requ**ir**em**ent**s ****o****f**** ****t****h**e**
    ****appl**ic**at**ion**.'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用，了解 API 的工作原理以及其构成要素至关重要。ChatGPT API 基于客户端-服务器模式，客户端（通常是用户开发的程序）向服务器发送请求，该服务器托管
    OpenAI 的模型。这些请求包含旨在引发模型特定响应的提示。服务器处理输入并返回输出，客户端可以操纵或呈现输出，具体取决于应用的需求。
- en: '****T****h**e** ****inte**gr**at**ion** ****pro**c**e**ss** ****be**g**i**ns**
    ****wi****t**h** ****obta**i**ni**ng** ****ac**c**e**ss** ****cred**en**ti**als**
    ****thr**o**u**gh** ****regi**st**ra**tio**n ****wi****t**h** ****Op**e**n**AI**.
    ****On****c**e** ****authe**nt**ic**ate**d, ****t****h**e** ****us****e**r** ****rec**e**iv**es**
    ****a****n**** ****A****P**I** ****k****e**y**, ****wh**i**c**h** ****se**r**v**es**
    ****a****s**** ****ident**if**ica**tio**n ****f****o**r** ****ma**k**i**ng** ****req**u**es**ts**.
    ****Commu**ni**ca**tio**n ****wi****t**h** ****t****h**e** ****A****P**I** ****i****s****
    ****do****n**e** ****us**i**n**g** ****HT****T**P** ****req**u**es**ts**, ****usu**a**l**ly**
    ****us**i**n**g** ****sta**n**da**rd** ****for**m**a**ts** ****su****c**h** ****a****s****
    ****JS****O**N** ****t****o**** ****se****n**d** ****a****n**d** ****rec**e**i**ve**
    ****da****t**a**. ****Th****i**s** ****faci**li**ta**tes** ****intero**pe**rab**ilit**y
    ****wi****t**h** ****virt**u**al**ly** ****a****n**y** ****prog**ra**mm**ing**
    ****lan**g**ua**ge**, ****alt**h**ou**gh** ****pop**u**l**ar** ****to**o**l**s**
    ****su****c**h** ****a****s**** ****Py**t**h**on**, ****wi****t**h** ****libr**a**ri**es**
    ****su****c**h** ****a****s**** ****req**u**es**ts**, ****a****r**e** ****espe**c**ia**lly**
    ****us**e**f**ul** ****f****o**r** ****th****i**s** ****ta****s**k**.'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: '**集成过程**始于通过 OpenAI 注册获取访问凭证。一旦验证通过，用户将收到一个 API 密钥，该密钥用于制作请求的识别。与 API 的通信使用
    HTTP 请求完成，通常使用标准格式，如 JSON 来发送和接收数据。这促进了与几乎所有编程语言的互操作性，尽管 Python 等流行工具，以及 requests
    等库特别有用，对于这项任务尤其有用。'
- en: '****A**** ****ba**s**i**c** ****req**u**e**st** ****t****o**** ****t****h**e**
    ****Cha**t**G**PT** ****A****P**I** ****inc**l**ud**es** ****esse**n**ti**al**
    ****para**m**et**ers** ****su****c**h** ****a****s**** ****t****h**e** ****des**i**r**ed**
    ****mo**d**e**l** (****e****.****g****., ****g****p**t**-****4****), ****pr**o**m**pt**,
    ****a****n**d** ****opt**i**on**al** ****set**t**in**gs** ****su****c**h** ****a****s****
    ****temp**er**at**ure** ****a****n**d** ****t****h**e** ****nu**m**b**er** ****o****f****
    ****exp**e**ct**ed** ****resp**o**ns**es**.'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: '**向 ChatGPT API 发送的基本请求包括**必要参数，如所需的模型（例如，gpt-4）、提示和可选设置，如温度和预期响应的数量。'
- en: '****Con**t**r**ol** ****ov****e**r** ****para**m**et**ers** ****su****c**h**
    ****a****s**** ****temp**er**at**ure** ****al**l**o**ws** ****y****o**u** ****t****o****
    ****ad**j**u**st** ****t****h**e** ****le**v**e**l** ****o****f**** ****crea**t**iv**ity**
    ****o****f**** ****t****h**e** ****resp**o**ns**es**, ****wh**i**l**e** ****max_**t**ok**ens**
    ****def**i**n**es** ****t****h**e** ****max**i**m**um** ****le**n**g**th** ****o****f****
    ****t****h**e** ****gene**r**at**ed** ****te****x**t**. ****Th**e**s**e** ****set**t**in**gs**
    ****gi****v**e** ****t****h**e** ****deve**l**op**er** ****t****h**e** ****abi**l**i**ty**
    ****t****o**** ****cust**o**mi**ze** ****inte**ra**ct**ion**s ****t****o**** ****t****h**e**
    ****spe**c**if**ic** ****ne**e**d**s** ****o****f**** ****ea****c**h** ****appl**ic**at**ion**.'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: '**控制参数，如温度**允许您调整响应的创造力水平，而 max_tokens 定义了生成文本的最大长度。这些设置给开发者提供了能力，可以根据每个应用的特定需求定制交互。'
- en: '****U****s**e** ****ca**s**e**s** ****i****n**** ****comp**a**ni**es** ****a****n**d**
    ****per**s**on**al** ****pro**j**ec**ts**'
