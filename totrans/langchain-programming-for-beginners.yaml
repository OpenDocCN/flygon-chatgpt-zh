- en: Summary
  id: totrans-1283
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code for this chapter is available in the folder 11_Chat_With_Document from
    the book source code.
  id: totrans-1284
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在书籍源代码的 11_Chat_With_Document 文件夹中找到。
- en: In this chapter, you’ve learned how to create a Chat With Document application
    using LangChain.
  id: totrans-1285
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了如何使用 LangChain 创建一个与文档聊天的应用程序。
- en: Using the RAG technique, LangChain can be used to retrieve information from
    a document, and then pass the information to the LLM.
  id: totrans-1286
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 RAG 技术，LangChain 可以从文档中检索信息，然后将信息传递给 LLM。
- en: The first thing you need to do is to process the document and turn it into chunks,
    which can then be converted into vectors using an embedding model.
  id: totrans-1287
  prefs: []
  type: TYPE_NORMAL
  zh: 首先你需要做的是处理文档并将其转换为块，然后可以使用嵌入模型将这些块转换为向量。
- en: The vectors are stored in ChromaDB, and the retriever created from the database
    is used when the user sends a query or input.
  id: totrans-1288
  prefs: []
  type: TYPE_NORMAL
  zh: 这些向量存储在 ChromaDB 中，当用户发送查询或输入时，使用从数据库创建的检索器。
- en: Once the core functionality is finished, you can easily add a web interface
    and chat memory into the application using Streamlit.
  id: totrans-1289
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦核心功能完成，你可以轻松地使用 Streamlit 添加一个网络界面和聊天记忆到应用程序中。
- en: Next, let’s see how we can load documents in different formats, such as .docx
    and .pdf.
  id: totrans-1290
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们看看如何加载不同格式的文档，例如 .docx 和 .pdf。
- en: 'Chapter 12: Uploading Different Document Types'
  id: totrans-1291
  prefs: []
  type: TYPE_NORMAL
  zh: 第 12 章：上传不同类型的文档
- en: Now that we can load and interact with a .txt document in LangChain, let’s improve
    the application so we can also load other document types or formats, such as .docx
    and .pdf.
  id: totrans-1292
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以在 LangChain 中加载和交互 .txt 文档，让我们改进应用程序，以便我们还可以加载其他文档类型或格式，如 .docx 和 .pdf。
- en: To load different document types, you need to create a file uploader interface
    in Streamlit.
  id: totrans-1293
  prefs: []
  type: TYPE_NORMAL
  zh: 要加载不同类型的文档，您需要在 Streamlit 中创建一个文件上传界面。
- en: 'Just below the Streamlit title, add new code as follows:'
  id: totrans-1294
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Streamlit 标题下方，添加以下新代码：
- en: st.title("Ask the Document")
  id: totrans-1295
  prefs: []
  type: TYPE_NORMAL
  zh: st.title("询问文档")
- en: 'uploaded_file = st.file_uploader("Upload your document: ", type=["pdf", "docx",
    "txt"])'
  id: totrans-1296
  prefs: []
  type: TYPE_NORMAL
  zh: uploaded_file = st.file_uploader("上传您的文档：", type=["pdf", "docx", "txt"])
- en: add_file = st.button("Submit File", on_click=clear_history)
  id: totrans-1297
  prefs: []
  type: TYPE_NORMAL
  zh: add_file = st.button("提交文件", on_click=clear_history)
- en: 'if uploaded_file and add_file:'
  id: totrans-1298
  prefs: []
  type: TYPE_NORMAL
  zh: 'if uploaded_file and add_file:'
- en: process_file(uploaded_file)
  id: totrans-1299
  prefs: []
  type: TYPE_NORMAL
  zh: process_file(uploaded_file)
- en: The st.file_uploader() method creates a file uploader input, then we add a button
    to submit the file.
  id: totrans-1300
  prefs: []
  type: TYPE_NORMAL
  zh: st.file_uploader() 方法创建了一个文件上传输入，然后我们添加了一个按钮来提交文件。
- en: 'When the submit button is clicked, the clear_history() method will be executed,
    so you need to define the method next:'
  id: totrans-1301
  prefs: []
  type: TYPE_NORMAL
  zh: 当点击提交按钮时，将执行 clear_history() 方法，因此您需要定义该方法：
- en: 'def clear_history():'
  id: totrans-1302
  prefs: []
  type: TYPE_NORMAL
  zh: 'def clear_history():'
- en: 'if "langchain_messages" in st.session_state:'
  id: totrans-1303
  prefs: []
  type: TYPE_NORMAL
  zh: 'if "langchain_messages" in st.session_state:'
- en: del st.session_state["langchain_messages"]
  id: totrans-1304
  prefs: []
  type: TYPE_NORMAL
  zh: del st.session_state["langchain_messages"]
- en: Above the clear_history() function, create a new function named process_file()
    to process the uploaded file.
  id: totrans-1305
  prefs: []
  type: TYPE_NORMAL
  zh: 在 clear_history() 函数上方，创建一个名为 process_file() 的新函数来处理上传的文件。
- en: 'This function needs to check on the extension of the document to use the right
    loader:'
  id: totrans-1306
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数需要检查文档的扩展名以使用正确的加载器：
- en: 'def process_file(file):'
  id: totrans-1307
  prefs: []
  type: TYPE_NORMAL
  zh: 'def process_file(file):'
- en: 'with st.spinner("File is in process..."):'
  id: totrans-1308
  prefs: []
  type: TYPE_NORMAL
  zh: 'with st.spinner("文件正在处理中..."):'
- en: data = file.read()
  id: totrans-1309
  prefs: []
  type: TYPE_NORMAL
  zh: data = file.read()
- en: file_name = os.path.join("./", file.name)
  id: totrans-1310
  prefs: []
  type: TYPE_NORMAL
  zh: file_name = os.path.join("./", file.name)
- en: 'with open(file_name, "wb") as f:'
  id: totrans-1311
  prefs: []
  type: TYPE_NORMAL
  zh: 'with open(file_name, "wb") as f:'
- en: f.write(data)
  id: totrans-1312
  prefs: []
  type: TYPE_NORMAL
  zh: f.write(data)
- en: name, extension = os.path.splitext(file_name)
  id: totrans-1313
  prefs: []
  type: TYPE_NORMAL
  zh: name, extension = os.path.splitext(file_name)
- en: 'if extension == ".pdf":'
  id: totrans-1314
  prefs: []
  type: TYPE_NORMAL
  zh: 'if extension == ".pdf":'
- en: from langchain_community.document_loaders import PyPDFLoader
  id: totrans-1315
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_community.document_loaders import PyPDFLoader
- en: loader = PyPDFLoader(file_name)
  id: totrans-1316
  prefs: []
  type: TYPE_NORMAL
  zh: loader = PyPDFLoader(file_name)
- en: 'elif extension == ".docx":'
  id: totrans-1317
  prefs: []
  type: TYPE_NORMAL
  zh: 'elif extension == ".docx":'
- en: from langchain_community.document_loaders import Docx2txtLoader
  id: totrans-1318
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_community.document_loaders import Docx2txtLoader
- en: loader = Docx2txtLoader(file_name)
  id: totrans-1319
  prefs: []
  type: TYPE_NORMAL
  zh: loader = Docx2txtLoader(file_name)
- en: 'elif extension == ".txt":'
  id: totrans-1320
  prefs: []
  type: TYPE_NORMAL
  zh: 'elif extension == ".txt":'
- en: from langchain_community.document_loaders import TextLoader
  id: totrans-1321
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_community.document_loaders import TextLoader
- en: loader = TextLoader(file_name)
  id: totrans-1322
  prefs: []
  type: TYPE_NORMAL
  zh: loader = TextLoader(file_name)
- en: 'else:'
  id: totrans-1323
  prefs: []
  type: TYPE_NORMAL
  zh: 'else:'
- en: st.error("This format is not supported!")
  id: totrans-1324
  prefs: []
  type: TYPE_NORMAL
  zh: st.error("此格式不受支持！")
- en: The LangChain loaders simply load the respective document using Python packages.
  id: totrans-1325
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain 加载器简单地使用 Python 包加载相应的文档。
- en: 'You need to install the PyPDF and Docx2txt packages used by the loaders:'
  id: totrans-1326
  prefs: []
  type: TYPE_NORMAL
  zh: 您需要安装加载器使用的 PyPDF 和 Docx2txt 包：
- en: pip install pypdf == 4.2.0 docx2txt == 0.8
  id: totrans-1327
  prefs: []
  type: TYPE_NORMAL
  zh: pip install pypdf == 4.2.0 docx2txt == 0.8
- en: 'Once the loader is created, you can load and split the document into chunks,
    convert the chunks into vectors, and create the chains as before:'
  id: totrans-1328
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦创建加载器，您就可以加载并将文档分割成块，将块转换为向量，并像以前一样创建链：
- en: docs = loader.load()
  id: totrans-1329
  prefs: []
  type: TYPE_NORMAL
  zh: docs = loader.load()
- en: text_splitter = RecursiveCharacterTextSplitter(
  id: totrans-1330
  prefs: []
  type: TYPE_NORMAL
  zh: text_splitter = RecursiveCharacterTextSplitter(
- en: chunk_size=1000, chunk_overlap=200
  id: totrans-1331
  prefs: []
  type: TYPE_NORMAL
  zh: chunk_size=1000, chunk_overlap=200
- en: )
  id: totrans-1332
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: chunks = text_splitter.split_documents(docs)
  id: totrans-1333
  prefs: []
  type: TYPE_NORMAL
  zh: chunks = text_splitter.split_documents(docs)
- en: embeddings = OpenAIEmbeddings(openai_api_key=OPENAI_KEY)
  id: totrans-1334
  prefs: []
  type: TYPE_NORMAL
  zh: embeddings = OpenAIEmbeddings(openai_api_key=OPENAI_KEY)
- en: vector_store = Chroma.from_documents(chunks, embeddings)
  id: totrans-1335
  prefs: []
  type: TYPE_NORMAL
  zh: vector_store = Chroma.from_documents(chunks, embeddings)
- en: retriever = vector_store.as_retriever()
  id: totrans-1336
  prefs: []
  type: TYPE_NORMAL
  zh: retriever = vector_store.as_retriever()
- en: history_aware_retriever = create_history_aware_retriever(
  id: totrans-1337
  prefs: []
  type: TYPE_NORMAL
  zh: history_aware_retriever = create_history_aware_retriever(
- en: llm, retriever, contextualize_prompt
  id: totrans-1338
  prefs: []
  type: TYPE_NORMAL
  zh: llm, retriever, contextualize_prompt
- en: )
  id: totrans-1339
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: rag_chain = create_retrieval_chain(
  id: totrans-1340
  prefs: []
  type: TYPE_NORMAL
  zh: rag_chain = create_retrieval_chain(
- en: history_aware_retriever, question_answer_chain
  id: totrans-1341
  prefs: []
  type: TYPE_NORMAL
  zh: history_aware_retriever, question_answer_chain
- en: )
  id: totrans-1342
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: conversational_rag_chain = RunnableWithMessageHistory(
  id: totrans-1343
  prefs: []
  type: TYPE_NORMAL
  zh: conversational_rag_chain = RunnableWithMessageHistory(
- en: rag_chain,
  id: totrans-1344
  prefs: []
  type: TYPE_NORMAL
  zh: rag_chain,
- en: 'lambda session_id: history,'
  id: totrans-1345
  prefs: []
  type: TYPE_NORMAL
  zh: 'lambda session_id: history,'
- en: input_messages_key="input",
  id: totrans-1346
  prefs: []
  type: TYPE_NORMAL
  zh: input_messages_key="input",
- en: history_messages_key="chat_history",
  id: totrans-1347
  prefs: []
  type: TYPE_NORMAL
  zh: history_messages_key="chat_history",
- en: output_messages_key="answer",
  id: totrans-1348
  prefs: []
  type: TYPE_NORMAL
  zh: output_messages_key="answer",
- en: )
  id: totrans-1349
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: To make the conversational_rag_chain, available outside of the function, we
    need to persist the object by saving it in Streamlit session state.
  id: totrans-1350
  prefs: []
  type: TYPE_NORMAL
  zh: 要使 conversational_rag_chain 可在外部函数中使用，我们需要通过将其保存在 Streamlit 会话状态中来实现持久化。
- en: 'We also show a message saying the file is uploaded and embedded successfully:'
  id: totrans-1351
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还显示一条消息，说明文件已成功上传并嵌入：
- en: st.session_state.crc = conversational_rag_chain
  id: totrans-1352
  prefs: []
  type: TYPE_NORMAL
  zh: st.session_state.crc = conversational_rag_chain
- en: st.success("File uploaded and embedded successfully")
  id: totrans-1353
  prefs: []
  type: TYPE_NORMAL
  zh: st.success("文件上传并嵌入成功")
- en: When the user passes a question, you can check if crc is available in st.session_state
    and use it.
  id: totrans-1354
  prefs: []
  type: TYPE_NORMAL
  zh: 当用户提出问题，你可以检查crc是否在st.session_state中，并使用它。
- en: 'Also, don’t forget to call the pick() method from the crc chain to stream the
    answer:'
  id: totrans-1355
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，别忘了调用crc链的pick()方法来流式传输答案：
- en: 'if question:'
  id: totrans-1356
  prefs: []
  type: TYPE_NORMAL
  zh: 'if question:'
- en: 'with st.chat_message("user"):'
  id: totrans-1357
  prefs: []
  type: TYPE_NORMAL
  zh: 'with st.chat_message("user"):'
- en: st.markdown(question)
  id: totrans-1358
  prefs: []
  type: TYPE_NORMAL
  zh: st.markdown(question)
- en: 'if "crc" in st.session_state:'
  id: totrans-1359
  prefs: []
  type: TYPE_NORMAL
  zh: 'if "crc" in st.session_state:'
- en: crc = st.session_state["crc"]
  id: totrans-1360
  prefs: []
  type: TYPE_NORMAL
  zh: crc = st.session_state["crc"]
- en: answer_chain = crc.pick("answer")
  id: totrans-1361
  prefs: []
  type: TYPE_NORMAL
  zh: answer_chain = crc.pick("answer")
- en: response = answer_chain.stream(
  id: totrans-1362
  prefs: []
  type: TYPE_NORMAL
  zh: response = answer_chain.stream(
- en: '{"input": question}, config={"configurable": {"session_id": "any"}}'
  id: totrans-1363
  prefs: []
  type: TYPE_NORMAL
  zh: '{"input": question}, config={"configurable": {"session_id": "any"}}'
- en: )
  id: totrans-1364
  prefs: []
  type: TYPE_NORMAL
  zh: )
- en: 'with st.chat_message("assistant"):'
  id: totrans-1365
  prefs: []
  type: TYPE_NORMAL
  zh: 'with st.chat_message("assistant"):'
- en: st.write_stream(response)
  id: totrans-1366
  prefs: []
  type: TYPE_NORMAL
  zh: st.write_stream(response)
- en: 'else:'
  id: totrans-1367
  prefs: []
  type: TYPE_NORMAL
  zh: 'else:'
- en: st.error("No document is uploaded. Upload your document first")
  id: totrans-1368
  prefs: []
  type: TYPE_NORMAL
  zh: st.error("未上传文档。请先上传文档")
- en: Here, we also add an else statement to inform the user when no document has
    been uploaded yet.
  id: totrans-1369
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们还添加了一个else语句，以通知用户尚未上传文档。
- en: And that’s it. Now you can upload a .txt, .docx, or .pdf document and ask questions
    relevant to the content of the document.
  id: totrans-1370
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样。现在你可以上传一个.txt、.docx或.pdf文档，并就文档内容提出相关问题。
- en: If you upload a document of other types, Python will show 'The document format
    is not supported' error. Good job!
  id: totrans-1371
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你上传其他类型的文档，Python将显示“不支持的文档格式”错误。做得好！
- en: Summary
  id: totrans-1372
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: The code for this chapter is available in the folder 12_Uploading_Different_Document_Types
    from the book source code.
  id: totrans-1373
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的代码可在书籍源代码的12_Uploading_Different_Document_Types文件夹中找到。
- en: In this chapter, you have improved the Chat With Document application further
    by creating an interface for uploading a file, then load the document using different
    loaders, depending on the type of the document.
  id: totrans-1374
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你通过创建一个上传文件的界面进一步改进了Chat With Document应用程序，然后根据文档类型使用不同的加载器加载文档。
- en: In the next chapter, I’m going to show you how to chat with YouTube videos.
    See you there!
  id: totrans-1375
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我将向你展示如何与YouTube视频聊天。那里见！
- en: 'Chapter 13: Chat With YouTube Videos'
  id: totrans-1376
  prefs: []
  type: TYPE_NORMAL
  zh: 第13章：与YouTube视频聊天
- en: Now that you’ve learned how to make AI interact with documents, let’s continue
    with creating a Chat with YouTube application.
  id: totrans-1377
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经学会了如何让AI与文档交互，让我们继续创建一个Chat with YouTube应用程序。
- en: To create this application, you can copy the finished application from Chapter
    12 and make the changes shown in this chapter.
  id: totrans-1378
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建此应用程序，你可以从第12章复制完成的程序，并根据本章所示进行更改。
- en: Let’s get started!
  id: totrans-1379
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: Adding The YouTube Loader
  id: totrans-1380
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 添加YouTube加载器
- en: The Chat With YouTube application uses the RAG technique to augment the LLM
    with the video’s transcript data.
  id: totrans-1381
  prefs: []
  type: TYPE_NORMAL
  zh: Chat With YouTube应用程序使用RAG技术通过视频的文本数据增强LLM。
- en: 'To get a YouTube video’s transcript, you need to install the youtube-transcript-api
    package using pip as follows:'
  id: totrans-1382
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取YouTube视频的文本，你需要使用pip安装youtube-transcript-api包，如下所示：
- en: pip install youtube-transcript-api==0.6.2
  id: totrans-1383
  prefs: []
  type: TYPE_NORMAL
  zh: pip install youtube-transcript-api==0.6.2
- en: This API is used by LangChain’s YouTube loader to fetch the transcript of a
    video.
  id: totrans-1384
  prefs: []
  type: TYPE_NORMAL
  zh: 此API由LangChain的YouTube加载器用于获取视频的文本。
- en: 'At the top of the file, import the YoutubeLoader class from LangChain like
    this:'
  id: totrans-1385
  prefs: []
  type: TYPE_NORMAL
  zh: 在文件顶部，从LangChain导入YoutubeLoader类，如下所示：
- en: from langchain_community.document_loaders import YoutubeLoader
  id: totrans-1386
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_community.document_loaders import YoutubeLoader
- en: 'Just below the Streamlit title, create a Streamlit text input to replace the
    file uploader as follows:'
  id: totrans-1387
  prefs: []
  type: TYPE_NORMAL
  zh: 在Streamlit标题下方，创建一个Streamlit文本输入来替换文件上传器，如下所示：
