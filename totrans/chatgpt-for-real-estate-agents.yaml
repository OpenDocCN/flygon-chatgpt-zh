  id: totrans-455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建培训提示
- en: Draft team newsletters and updates
  id: totrans-456
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 起草团队通讯和更新
