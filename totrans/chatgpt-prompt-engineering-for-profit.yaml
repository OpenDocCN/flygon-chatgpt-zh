  prefs: []
  type: TYPE_NORMAL
  zh: '****此外，与基于指令的提示不同，后者提供关于如何响应的具体指令，目标分解指导模型创建一个结构化的计划来响应目标，按顺序处理不同的部分。它不像关注响应应该如何结构化那样关注响应的结构，而是关注问题应该如何分解。'
