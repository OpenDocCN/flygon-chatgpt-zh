    ****tru**ste**d ****refe**rence**s.'
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: '**验证信息：** 对任何关键细节进行交叉检查，以可靠来源为准。例如，如果 ChatGPT 提供统计数据或建议，通过可信的参考文献来确认其有效性。'
- en: '****U**se** ****A**I** ****a**s** ****a**** ****Sta**rtin**g ****Po**int**:
     ****Tr**eat** ****Cha**tGP**T ****a**s** ****a**** ****hel**pfu**l ****assi**stan**t
    ****ra**the**r ****th**an** ****a**n** ****autho**ritati**ve ****so**urc**e, ****espe**ciall**y
    ****f**or** ****com**ple**x ****o**r** ****sens**itiv**e ****to**pic**s.'
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: '**将 AI 作为起点使用：** 将 ChatGPT 视为一个有用的助手而不是权威来源，特别是在处理复杂或敏感话题时。'
- en: '****B**y** ****prio**ritizi**ng ****fa**ct**-****che**ckin**g, ****y**ou**
