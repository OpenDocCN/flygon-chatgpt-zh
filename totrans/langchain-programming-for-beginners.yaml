  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The code for this chapter is available in the folder 13_Chat_With_Youtube from
    the book source code.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, you’ve learned how to create a Chat With YouTube application
    that fetches a YouTube video transcript using the URL, and then converts the transcript
    into vectors, which can be used to augment the LLM knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: By using AI, you can ask for the key points or summary of a long video without
    having to watch the video yourself.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 14: Interacting With Images Using Multimodal Messages'
  prefs: []
  type: TYPE_NORMAL
- en: Now that we can load different types of documents, let’s continue with making
    AI understand images.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding Multimodal Messages
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A multimodal message is a message that uses more than one mode of communication
    to communicate.
  prefs: []
  type: TYPE_NORMAL
- en: 'The communication modes known to humans are:'
  prefs: []
  type: TYPE_NORMAL
- en: '| ​▪​ | Text |'
  prefs: []
  type: TYPE_TB
- en: '| ​▪​ | Video |'
  prefs: []
  type: TYPE_TB
- en: '| ​▪​ | Audio |'
  prefs: []
  type: TYPE_TB
- en: '| ​▪​ | Image |'
  prefs: []
  type: TYPE_TB
- en: Advanced models like GPT-4 and Gemini Pro already have vision capabilities,
    meaning the models can "see" images and answer questions about them.
  prefs: []
  type: TYPE_NORMAL
- en: By sending a multimodal message, we can use AI to interact with images, like
    asking how many persons are shown on an image or what color is dominant in the
    image.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s learn how to create such application using LangChain next.
  prefs: []
  type: TYPE_NORMAL
- en: Sending Multimodal Messages in LangChain
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To send a multimodal message in LangChain, you only need to adjust the prompt
    template and pass a list instead of a string for the human message.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, create a new file named handle_image.py, import the required packages,
    and define the LLM to use as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: from decouple import config
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_openai import ChatOpenAI
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_core.prompts import ChatPromptTemplate
  prefs: []
  type: TYPE_NORMAL
- en: import base64
  prefs: []
  type: TYPE_NORMAL
- en: OPENAI_KEY = config("OPENAI_KEY")
  prefs: []
  type: TYPE_NORMAL
- en: llm = ChatOpenAI(model="gpt-4o", api_key=OPENAI_KEY)
  prefs: []
  type: TYPE_NORMAL
- en: The base64 module will be used to encode images in base 64 format.
  prefs: []
  type: TYPE_NORMAL
- en: 'Write the function to encode images below the llm variable:'
  prefs: []
  type: TYPE_NORMAL
- en: 'def encode_image(image_path):'
  prefs: []
  type: TYPE_NORMAL
- en: 'with open(image_path, "rb") as image_file:'
  prefs: []
  type: TYPE_NORMAL
- en: return base64.b64encode(image_file.read()).decode("utf-8")
  prefs: []
  type: TYPE_NORMAL
- en: image = encode_image("./image-1.jpg")
  prefs: []
  type: TYPE_NORMAL
- en: You can pass any image you have on your computer to the encode_image() function.
    Just make sure it doesn’t contain any sensitive data.
  prefs: []
  type: TYPE_NORMAL
- en: 'The encoded image can then be passed into a chat prompt template as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: prompt = ChatPromptTemplate.from_messages(
  prefs: []
  type: TYPE_NORMAL
- en: '['
  prefs: []
  type: TYPE_NORMAL
- en: ("system", "You are a helpful assistant that can describe images in detail."),
  prefs: []
  type: TYPE_NORMAL
- en: (
  prefs: []
  type: TYPE_NORMAL
- en: '"human",'
  prefs: []
  type: TYPE_NORMAL
- en: '['
  prefs: []
  type: TYPE_NORMAL
- en: '{"type": "text", "text": "{input}"},'
  prefs: []
  type: TYPE_NORMAL
- en: '{'
  prefs: []
  type: TYPE_NORMAL
- en: '"type": "image_url",'
  prefs: []
  type: TYPE_NORMAL
- en: '"image_url": {'
  prefs: []
  type: TYPE_NORMAL
- en: '"url": f"data:image/jpeg;base64,{image}",'
  prefs: []
  type: TYPE_NORMAL
- en: '"detail": "low",'
  prefs: []
  type: TYPE_NORMAL
- en: '},'
  prefs: []
  type: TYPE_NORMAL
- en: '},'
  prefs: []
  type: TYPE_NORMAL
- en: '],'
  prefs: []
  type: TYPE_NORMAL
- en: ),
  prefs: []
  type: TYPE_NORMAL
- en: ']'
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: 'In the template above, you can see that there are two messages passed as the
    human message: the "text" for the question and the "image_url" for the image.'
  prefs: []
  type: TYPE_NORMAL
- en: We can pass a public image url such as 'https://', but here we use the data:image
    URI because we upload an image from our computer.
  prefs: []
  type: TYPE_NORMAL
- en: Behind the scenes, LangChain automatically converts the message into a multimodal
    message.
  prefs: []
  type: TYPE_NORMAL
- en: 'Create a chain from the prompt and the llm, and ask the user for an input:'
  prefs: []
  type: TYPE_NORMAL
- en: chain = prompt | llm
  prefs: []
  type: TYPE_NORMAL
- en: 'response = chain.invoke({"input": "What do you see on this image?"})'
  prefs: []
  type: TYPE_NORMAL
- en: print(response.content)
  prefs: []
  type: TYPE_NORMAL
- en: The LLM will process the image, and then give you the appropriate answer.
  prefs: []
  type: TYPE_NORMAL
- en: Adding UI and Chat History
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that you can ask questions about an image using a language model, let’s
    improve the application by adding a web interface and chat history.
  prefs: []
  type: TYPE_NORMAL
- en: 'As always, import the packages needed to add the web interface and history
    first:'
  prefs: []
  type: TYPE_NORMAL
- en: from decouple import config
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_openai import ChatOpenAI
  prefs: []
  type: TYPE_NORMAL
- en: import streamlit as st
  prefs: []
  type: TYPE_NORMAL
- en: Adding History from langchain_core.prompts import ChatPromptTemplate, MessagesPlaceholder
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: from langchain_community.chat_message_histories import StreamlitChatMessageHistory
  prefs: []
  type: TYPE_NORMAL
- en: from langchain_core.runnables.history import RunnableWithMessageHistory
  prefs: []
  type: TYPE_NORMAL
- en: import os, base64
  prefs: []
  type: TYPE_NORMAL
- en: Next, you need to instantiate Streamlit chat history and upgrade the chain to
    include chat history, similar to Chapter 9.
  prefs: []
  type: TYPE_NORMAL
- en: 'You also need to create a process_image() function, which will encode the image
    and store it in session state:'
  prefs: []
  type: TYPE_NORMAL
- en: history = StreamlitChatMessageHistory()
  prefs: []
  type: TYPE_NORMAL
- en: chain = prompt | llm
  prefs: []
  type: TYPE_NORMAL
- en: chain_with_history = RunnableWithMessageHistory(
  prefs: []
  type: TYPE_NORMAL
- en: chain,
  prefs: []
  type: TYPE_NORMAL
- en: 'lambda session_id: history,'
  prefs: []
  type: TYPE_NORMAL
- en: input_messages_key="input",
  prefs: []
  type: TYPE_NORMAL
- en: history_messages_key="chat_history",
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: 'def process_image(file):'
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.spinner("Processing image..."):'
  prefs: []
  type: TYPE_NORMAL
- en: data = file.read()
  prefs: []
  type: TYPE_NORMAL
- en: file_name = os.path.join("./", file.name)
  prefs: []
  type: TYPE_NORMAL
- en: 'with open(file_name, "wb") as f:'
  prefs: []
  type: TYPE_NORMAL
- en: f.write(data)
  prefs: []
  type: TYPE_NORMAL
- en: image = encode_image(file_name)
  prefs: []
  type: TYPE_NORMAL
- en: st.session_state.encoded_image = image
  prefs: []
  type: TYPE_NORMAL
- en: st.success("Image encoded. Ask your questions")
  prefs: []
  type: TYPE_NORMAL
- en: The next step is to create a function to clear chat history, then create a file
    uploader using Streamlit.
  prefs: []
  type: TYPE_NORMAL
- en: 'When an image is uploaded, process that image using the process_image() function:'
  prefs: []
  type: TYPE_NORMAL
- en: 'def clear_history():'
  prefs: []
  type: TYPE_NORMAL
- en: 'if "langchain_messages" in st.session_state:'
  prefs: []
  type: TYPE_NORMAL
- en: del st.session_state["langchain_messages"]
  prefs: []
  type: TYPE_NORMAL
- en: st.title("Chat With Image")
  prefs: []
  type: TYPE_NORMAL
- en: 'uploaded_file = st.file_uploader("Upload your image: ", type=["jpg", "png"])'
  prefs: []
  type: TYPE_NORMAL
- en: add_file = st.button("Submit Image", on_click=clear_history)
  prefs: []
  type: TYPE_NORMAL
- en: 'if uploaded_file and add_file:'
  prefs: []
  type: TYPE_NORMAL
- en: process_image(uploaded_file)
  prefs: []
  type: TYPE_NORMAL
- en: With the image encoded and saved in session state, you only need to display
    chat history, create a chat input, and run the chain_with_history.stream() method
    to stream the answer.
  prefs: []
  type: TYPE_NORMAL
- en: 'This part is similar to previous applications:'
  prefs: []
  type: TYPE_NORMAL
- en: 'for message in st.session_state["langchain_messages"]:'
  prefs: []
  type: TYPE_NORMAL
- en: role = "user" if message.type == "human" else "assistant"
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.chat_message(role):'
  prefs: []
  type: TYPE_NORMAL
- en: st.markdown(message.content)
  prefs: []
  type: TYPE_NORMAL
- en: question = st.chat_input("Your Question")
  prefs: []
  type: TYPE_NORMAL
- en: 'if question:'
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.chat_message("user"):'
  prefs: []
  type: TYPE_NORMAL
- en: st.markdown(question)
  prefs: []
  type: TYPE_NORMAL
- en: 'if "encoded_image" in st.session_state:'
  prefs: []
  type: TYPE_NORMAL
- en: image = st.session_state["encoded_image"]
  prefs: []
  type: TYPE_NORMAL
- en: response = chain_with_history.stream(
  prefs: []
  type: TYPE_NORMAL
- en: '{"input": question, "image": image},'
  prefs: []
  type: TYPE_NORMAL
- en: 'config={"configurable": {"session_id": "any"}},'
  prefs: []
  type: TYPE_NORMAL
- en: )
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.chat_message("assistant"):'
  prefs: []
  type: TYPE_NORMAL
- en: st.write_stream(response)
  prefs: []
  type: TYPE_NORMAL
- en: 'else:'
  prefs: []
  type: TYPE_NORMAL
- en: st.error("No image is uploaded. Upload your image first.")
  prefs: []
  type: TYPE_NORMAL
- en: When there’s no image, display an error message saying "No image is uploaded.
    Upload your image first."
  prefs: []
  type: TYPE_NORMAL
- en: Now run the application using the streamlit run command, and you can ask questions
    about the image you uploaded.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’m using an image from [https://g.codewithnathan.com/lc-image](https://g.codewithnathan.com/lc-image)
    for the example below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![14 chat image](image_rsrc1ZU.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 50\. Chat With Image Result
  prefs: []
  type: TYPE_NORMAL
- en: Try asking for a certain detail, such as how many people can you see on the
    image, or what color is dominant on the image.
  prefs: []
  type: TYPE_NORMAL
- en: Ollama Multimodal Message
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you want to send a multimodal message to Ollama, you need to download a model
    that supports the message format, such as bakllava and llava.
  prefs: []
  type: TYPE_NORMAL
- en: You can run the command ollama pull bakllava to download the model to your machine.
    Note that both models require 8GB of RAM to run without any issue.
  prefs: []
  type: TYPE_NORMAL
- en: 'To send a multimodal message to Ollama, you need to make sure that the image_url
    key holds a string value as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '{'
  prefs: []
  type: TYPE_NORMAL
- en: '"type": "image_url",'
  prefs: []
  type: TYPE_NORMAL
- en: '"image_url": f"data:image/jpeg;base64,""{image}",'
  prefs: []
  type: TYPE_NORMAL
- en: '},'
  prefs: []
  type: TYPE_NORMAL
- en: But then again, there’s a bug on LangChain side that converts the image_url
    key to a dictionary and add a url key in that dictionary.
  prefs: []
  type: TYPE_NORMAL
- en: I have reported this issue to LangChain maintainers at [https://github.com/langchain-ai/langchain/issues/22460](https://github.com/langchain-ai/langchain/issues/22460)
  prefs: []
  type: TYPE_NORMAL
- en: 'You need to open the ollama.py source code and change the code at line 123
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'if isinstance(content_part.get("image_url")["url"], str):'
  prefs: []
  type: TYPE_NORMAL
- en: image_url_components = content_part["image_url"]["url"].split(",")
  prefs: []
  type: TYPE_NORMAL
- en: I will update this section once the issue is resolved.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The code for this chapter is available in the folder 14_Handling_Images from
    the book source code.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, you’ve learned how to send a multimodal message to a language
    model using LangChain.
  prefs: []
  type: TYPE_NORMAL
- en: Note that not all models can understand a multimodal message. If you’re using
    Ollama, you need to use a model like bakllava and not mistral or gemma.
  prefs: []
  type: TYPE_NORMAL
- en: If the LLM doesn’t understand, it will usually tell you that it can’t understand
    the message you’re sending.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter 15: Deploying AI Application to Production'
  prefs: []
  type: TYPE_NORMAL
- en: Now that you’ve created various AI-powered applications, it’s time to learn
    how to deploy one to the internet so others can use it.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will learn how to deploy applications that use Google Gemini
    and OpenAI GPT.
  prefs: []
  type: TYPE_NORMAL
- en: Note that we won’t explore how to deploy an application that’s powered by Ollama
    because we need to self-host Ollama to run the application properly.
  prefs: []
  type: TYPE_NORMAL
- en: Because we created our applications using Streamlit, one way to deploy the application
    is to launch it on the Streamlit Cloud Community.
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind that because the Streamlit Cloud Community is free, your application
    might be put to sleep when inactive to save server resources.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Sidebar in Streamlit
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There’s a little change we need to make in our application before deploying
    it.
  prefs: []
  type: TYPE_NORMAL
- en: Notice that the applications you created are all using your own API key to access
    the LLM provider’s API.
  prefs: []
  type: TYPE_NORMAL
- en: This is not recommended for production because you will be charged every time
    a user uses your application.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of supplying your API key for use, you need to enable users to add their
    own API keys.
  prefs: []
  type: TYPE_NORMAL
- en: This is easy in Streamlit because you only need to create a text input in the
    sidebar for the API key.
  prefs: []
  type: TYPE_NORMAL
- en: 'In our application, create a sidebar before instantiating the llm object as
    follows:'
  prefs: []
  type: TYPE_NORMAL
- en: st.title("Ask YouTube Video")
  prefs: []
  type: TYPE_NORMAL
- en: 'with st.sidebar:'
  prefs: []
  type: TYPE_NORMAL
- en: st.title("Add Your API Key First")
  prefs: []
  type: TYPE_NORMAL
- en: openai_key = st.text_input("OpenAI API Key", type="password")
  prefs: []
  type: TYPE_NORMAL
- en: 'if not openai_key:'
  prefs: []
  type: TYPE_NORMAL
- en: st.info("Enter your OpenAI API Key to continue")
  prefs: []
  type: TYPE_NORMAL
- en: st.stop()
  prefs: []
  type: TYPE_NORMAL
- en: llm = ChatOpenAI(model="gpt-4o", api_key=openai_key)
  prefs: []
  type: TYPE_NORMAL
- en: In the code above, we created a sidebar using the with st.sidebar syntax, then
    added the title and text input elements to the sidebar.
  prefs: []
  type: TYPE_NORMAL
- en: When the openai_key variable is empty, we run the st.info() method to display
    an instruction to the user, then call the st.stop() method so that Streamlit stops
    further execution of your Python code.
  prefs: []
  type: TYPE_NORMAL
- en: 'This way, the rest of the interface won’t show until an API key is added:'
