- en: 5.5 Conclusions, Discussion, and Future Research
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 5.5.1 Conclusions and Discussion
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The study has addressed the research objectives on the factors affecting the
    continuous-using intention of ChatGPT at HEIs. The results explain the underlying
    relationship behind various factors, including experience, social influence, perceived
    usefulness, enjoyment, personal innovativeness, self-motivation, and their impact
    on ChatGPT retention.
  prefs: []
  type: TYPE_NORMAL
- en: 'To answer the first research question: “Can prior experience and social influence
    effectively generate ChatGPT continuous-use intention?”, the results show that
    experience and SI reveal insignificant direct effects on learners’ intention to
    keep using ChatGPT in studying. That means experience and SI are not crucially
    directly determining the decision to continue using AI-based tools to support
    learning objectives. One possible explanation for this unexpected result is the
    limited acquaintance of learners with ChatGPT, especially during their initial
    exposure. As such, their perception of the AI-based tool’s usefulness may not
    be fully formed, leading to a weaker intention to keep using it. Instead, many
    researchers and learners were previously more familiar and comfortable with other
    tools that allow the sharing and synthesis of their discussions. These existing
    preferences tend to lower the intention to adopt another technology ([Maheshwari,
    2023](#ch13.xhtml#r215)).'
  prefs: []
  type: TYPE_NORMAL
- en: Although the direct effects of experience and SI on ChatGPT retention were not
    successfully captured, the results found a significant indirect relationship between
    those factors under the fully mediating effect from PU, perceived enjoyment, personal
    innovativeness, and self-motivation. This offers obvious evidence to respond to
    the second research question, “What is the underlying relationship between experience,
    SI, and ChatGPT continuous-use intention?”.
  prefs: []
  type: TYPE_NORMAL
- en: Interestingly, experience is considered a critical factor leading to ChatGPT’s
    future usage, especially through the mediating effects of perceived enjoyment
    and usefulness. These findings emphasize the important role of cognitive state
    inside consumers’ minds. The decision on continuous using does not solely depend
    on immediate experience, but rather the experience needs to be long and valuable
    enough to recognize the enjoyment and usefulness of ChatGPT. This would be explained
    by different educational settings and objectives of using ChatGPT in learning
    support. If they intend to use ChatGPT as a human replacement, it would not be
    a perfect fit solution. If they rather use AI-based experience as a source of
    motivation to explore the diversity of human knowledge, these tools would help
    reflect diverse perspectives. Also, learners can enjoy the journey of knowledge
    exploration and sincerely acknowledge the usefulness of ChatGPT, which determines
    their usage retention.
  prefs: []
  type: TYPE_NORMAL
- en: The significance of PU and perceived enjoyment in impacting the ongoing use
    of AI-based learning tools is confirmed in the educational context by recent studies
    ([Al-Sharafi et al., 2023](#ch13.xhtml#r186); [Tiwari et al., 2023](#ch13.xhtml#r231);
    Strzelecki, 2023). [Tiwari et al. (2023)](#ch13.xhtml#r231), based on responses
    from 270 students, affirmed the contribution of usefulness, enjoyment, and motivation
    to favorable attitudes toward using ChatGPT in the learning environment. Despite
    employing a different research model and terms, Strzelecki (2023) highlighted
    consensus results on the positive connection between performance expectancy and
    hedonic motivation to users’ acceptance of ChatGPT in tertiary education. [Al-Sharafi
    et al. (2023)](#ch13.xhtml#r186) found supporting evidence for a considerable
    effect of usefulness on the sustainable use of AI-based chatbots for educational
    purposes. While previous studies emphasize the direct roles of PU and enjoyment
    to a continuous decision, this study adds empirical evidence on their mediating
    role to strengthen initial experience and connect it with continuing intention.
  prefs: []
  type: TYPE_NORMAL
- en: The study found that SI indicates an insignificant direct impact on the ITCU
    ChatGPT. The effect of SI on the acceptance of emerging technology is intricate
    and subject to diverse contingencies ([Venkatesh et al., 2003](#ch13.xhtml#r237)).
    [Varshneya et al. (2017)](#ch13.xhtml#r234) agreed that SI will likely show a
    limited effect on the acceptance and usage of early penetrated technology. [Foroughi
    et al. (2023)](#ch13.xhtml#r199) reported a consensus finding that insignificant
    correlations could exist between SI and students’ intention to use ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Interesting results illustrate significant indirect effects through the mediating
    role of personal innovativeness and self-motivation. This exciting result highlights
    the importance of individual and personal factors, intertwined with external pressure,
    to explain the continuance of ChatGPT usage. This is true as the learners and
    researchers are heterogeneous, particularly in novelty adaptation and intrinsic
    motivation. [Venkatesh et al. (2006)](#ch13.xhtml#r236) argued that intrinsic
    and extrinsic motivation would be generated from the early experience of using
    technologies, but it would change over time with greater understanding. [Ho (2012)](#ch13.xhtml#r205)
    found that external influences creating extrinsic motivation in the initial usage
    stage do not effectively predict behavior intention in subsequent use, whereas
    intrinsic motivation is rather reliable. This supports our study by emphasizing
    the importance of users’ characteristics and inherent incentives rather than social
    pressure in the decision-making process. Particularly, with AI-based technology
    adoption, personal innovativeness is among the vital drivers. Highly innovative
    people tend to be less influenced by other opinions ([Khazaei and Tareq, 2021](#ch13.xhtml#r212);
    [Foroughi et al., 2023](#ch13.xhtml#r199)); they wish to be among pioneering users
    of modern technology ([Cheng, 2014](#ch13.xhtml#r190)). [Kandoth and Shekhar (2022)](#ch13.xhtml#r211)
    reported a consensus finding that SI significantly impacts personal innovativeness,
    and personal innovativeness represents a positive effect on the intention to use
    AI-enabled applications. It can be seen that learners seem to be realistic and
    performance-oriented decision-makers with ChatGPT adoption.
  prefs: []
  type: TYPE_NORMAL
- en: 5.5.2 Contributions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 5.5.2.1 Theoretical contributions
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Three distinctive theoretical highlights can be generated from this study.
  prefs: []
  type: TYPE_NORMAL
- en: First, this research focuses on the impact of the ChatGPT experience and SI
    on students’ affective and cognitive responses toward continuous use of this platform.
    The literature on AI-based technologies and ChatGPT specifically has been addressed
    and enriched.
  prefs: []
  type: TYPE_NORMAL
- en: Second, this study developed a research model by integrating two theories, SOR
    and UTAUT. Prior studies of AI-based technologies and ChatGPT ([Duong et al.,
    2023](#ch13.xhtml#r197); [Venkatesh, 2022](#ch13.xhtml#r235)) solely adopted the
    UTAUT theory. Furthermore, in the UTAUT, experience moderates the relationships
    between behavioral intention and other determinants. Yet, this study provides
    evidence suggesting the indirect effect of experience to predict the likelihood
    of intention to continue using new technologies.
  prefs: []
  type: TYPE_NORMAL
- en: 'Third, this study examines four mediators between stimulus clusters and behavioral
    customers: personal innovation, motivation, PU, and enjoyment. There was no direct
    impact on the SI or the UE on the intention; however, if four mediators appear,
    the ChatGPT retention is formed. Thus, both theories are extended and generalized
    in this context.'
  prefs: []
  type: TYPE_NORMAL
- en: 5.5.2.2 Practical implications
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Driven by the research, three practical implications can be generated for different
    stakeholders.
  prefs: []
  type: TYPE_NORMAL
- en: First, the implication is suggested for HEIs. There has been a controversial
    opinion about plagiarism and dishonesty inclination since ChatGPT was introduced
    ([Cotton et al., 2023](#ch13.xhtml#r192)). Notably, the intensity level of controversy
    is more extreme in developing countries that advocate Confucian beliefs. Any technology
    has its own positive and negative impacts on users. For example, TikTok provides
    a creative and entertaining platform that attracts millions of users. However,
    it receives enormous criticism, such as data security or intention fragmentation
    effects on Generation Z. The same as ChatGPT, the benefits of this AI-based platform
    are undeniable apart from critics and worries. AI-based technology, specifically
    Chat GPT, is necessary for in-class and out-class education. Students need additional
    support, such as synthesizing knowledge or signpost for analysis, to develop their
    self-learning process and achieve lifelong learning objectives. Therefore, AI-based
    technologies are vital in digital transformation and must be taught in higher
    education institutions. Educating students on how to use ChatGPT correctly can
    generate huge benefits by leveraging learning performance.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, driven by this study, HEIs can focus on developing personal innovativeness
    for educators and students to prepare them for retention. For example, HEIs should
    collaborate with technology and AI research centers to provide training sessions
    and workshops to enhance knowledge and incline engagement with different platforms.
    Furthermore, joint research projects between these centers and HEIs should be
    promoted so that the willingness level of participants to engage with new technology
    experiments will significantly increase.
  prefs: []
  type: TYPE_NORMAL
- en: The second implication is set for educators. The educators at HEIs should encourage
    students to use ChatGPT as a learning support tool during their study. Lecturers
    should understand the application of AI-based technology in their module and suggest
    to students during the study period. These activities act as motivation and usefulness
    for students to experience and engage with new technologies to leverage their
    learning performance. At the same time, they should update the AI-detector tool
    and set an alarm for students beforehand so that they can understand the limits
    of their actions.
  prefs: []
  type: TYPE_NORMAL
- en: The third implication is essential for platform developers. Enjoyment emotion
    is a vital mediator toward the continuous-use intention. Hence, the developer
    should focus on and push the interactive and entertaining function, and customers
    might return and keep using the technology as part of their daily activities.
  prefs: []
  type: TYPE_NORMAL
- en: 5.5.3 Limitations and Future Research
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Despite several contributions to comprehending the ways HEIs, educators, and
    students engage with ChatGPT in the long term, this study has some limitations
    to shed light on for future studies. First, this empirical study was adopted solely
    at specific locations in Vietnam. It provides insights for AI developers who expand
    and penetrate their business in Vietnam and other analogous emerging Southeast
    Asian markets. Second, the target audience in this study is HEI students, mostly
    undergraduates. A future study might extend the target cohort to different educational
    levels at HEIs, such as the postgraduate level, to compare the discrepancy between
    examined respondents. Finally, other scholars can also investigate the barriers
    of non-ChatGPT users at HEIs to suggest alternative approaches for practitioners
    to raise the adoption level of all stakeholders.
  prefs: []
  type: TYPE_NORMAL
