  id: totrans-2456
  prefs: []
  type: TYPE_TB
  zh: '| cd | 1月 2月 | 100000 |'
- en: '|  | Mar | 7500012000 |'
  id: totrans-2457
  prefs: []
  type: TYPE_TB
  zh: '|  | 3月 | 7500012000 |'
- en: '| cd Total | 187000 |'
  id: totrans-2458
