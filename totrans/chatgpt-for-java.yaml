- en: 'DALL·E Golden Rule #2: Be Descriptive with What You Want in the Foreground
    and Background'
  id: totrans-748
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 'DALL·E 金规则 #2：详细描述前景和背景中的内容'
- en: I cannot emphasize enough that you need to be descriptive with DALL⋅E in order
    to get consistent, desirable results. It may sound weird, but the best way to
    describe your image to DALL⋅E is to act like you’re describing a dream to another
    person.
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 我无法强调得更多，你需要用 DALL⋅E 描述图像，以便获得一致、理想的结果。这可能听起来很奇怪，但向 DALL⋅E 描述图像的最佳方式就像向另一个人描述一个梦一样。
- en: So, as a mental exercise between you and me, try to describe your last dream.
    As you describe the people, places, and things in your dream, you have in your
    mind the most important things that you remember, as well as the experience that
    you felt. As you describe things to another person, tiny details start to emerge
    such as
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，作为你和我之间的一次心理练习，试着描述你的最后一个梦。当你描述梦中的人物、地点和事物时，你心中记得最重要的东西，以及你感受到的经历。当你向另一个人描述事物时，一些细节开始浮现，比如
- en: How many people were present (if any)?
  id: totrans-751
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有多少人（如果有）在场？
- en: What position were the people or animals in? Standing, sitting, or laying down?
  id: totrans-752
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们或动物处于什么位置？站立、坐着还是躺着？
- en: What things were in the scenery and the background?
  id: totrans-753
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 场景和背景中有哪些东西？
- en: What items stood out to you? Sounds? Smells? Colors?
  id: totrans-754
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有哪些物品引起了你的注意？声音？气味？颜色？
- en: How did you feel? Happy, eerie, excited?
  id: totrans-755
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你感觉如何？快乐、诡异、兴奋？
- en: What was the perceived time of day? Morning, midday, night?
  id: totrans-756
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你感觉一天中的什么时间？早上、中午还是晚上？
- en: If you can describe a dream to another person, then you should have no problem
    describing what you want to DALL⋅E.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够向另一个人描述一个梦，那么你应该没有问题描述你想要 DALL⋅E 的内容。
- en: Conclusion
  id: totrans-758
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter we accomplished a lot! With a few classes we created a Podcast
    Visualizer.
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一章中，我们取得了很大的成就！通过几个类，我们创建了一个播客可视化器。
- en: We created and used the AudioSplitter.java class which works as a utility for
    us. If you have an audio file that’s larger than the limitations of the Whisper
    model, this class will give you a folder of smaller audio files to send to Whisper.
  id: totrans-760
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们创建并使用了 AudioSplitter.java 类，它作为我们的实用工具。如果你有一个大于 Whisper 模型限制的音频文件，这个类将为你提供一个包含较小音频文件的文件夹，以便发送给
    Whisper。
- en: We created and used the WhisperClient.java class to get a transcription of a
    folder of audio files. The folder can contain a single audio file or several files.
    Your only limitation is the number of requests that you can send to the Transcription
    Endpoint and the Whisper model.
  id: totrans-761
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们创建并使用了 WhisperClient.java 类来获取一个音频文件夹的转录。该文件夹可以包含单个音频文件或多个文件。你唯一的限制是你可以发送到转录端点和
    Whisper 模型的请求数量。
- en: We did a little prompt engineering with GPT-4 in order to get a descriptive
    prompt of the imagery in a podcast based upon the transcript.
  id: totrans-762
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们用 GPT-4 做了一些提示工程，以便根据播客的文本获取对图像的描述性提示。
- en: Finally, we created and used the DALLEClient.java class to take the prompt generated
    from calling the GPT-4 model and getting an image that represents the podcast
    episode visually.
  id: totrans-763
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，我们创建并使用了 DALLEClient.java 类，从调用 GPT-4 模型获取提示并得到一个代表播客集的视觉图像。
- en: Exercises Left for the Reader
  id: totrans-764
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 留给读者的练习
- en: 'So, there are obviously a few additional things we can do here, and these steps
    will be left for you (the reader) to accomplish, for example:'
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，显然我们在这里还可以做几件额外的事情，这些步骤将留给你们（读者）去完成，例如：
- en: 'The AudioSplitter.java app is a Java interface to FFmpeg. FFmpeg can not only
    split audio files, but can also do a lot more with media files, such as format
    conversion and reencoding. Experiment to see which of the supported media formats
    by Whisper are the smallest audio files. Hint: It’s definitely not WAV format.'
  id: totrans-766
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AudioSplitter.java 应用是 FFmpeg 的 Java 接口。FFmpeg 不仅可以分割音频文件，还可以对媒体文件做更多的事情，例如格式转换和重新编码。尝试看看
    Whisper 支持的哪些媒体格式生成的音频文件最小。提示：绝对不是 WAV 格式。
- en: If you’re planning to create an app or a service that automatically generates
    images based upon a textual prompt from your end users, then you definitely would
    want to update the DALLEClient.java class in order to ensure that you’re tracking
    and providing in your request the user parameter in your HTTP request. This is
    due to the fact that your end user has the potential to generate harmful images
    through your API key. Remember, you have an API account with Open AI, and they
    don’t! As a result, you need to be aware if you need to terminate your business
    relationship with a user who is violating Open AI content rules through your service.
  id: totrans-767
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你计划创建一个基于你终端用户文本提示自动生成图像的应用或服务，那么你肯定希望更新 DALLEClient.java 类，以确保你在 HTTP 请求中跟踪并提供用户参数。这是因为你的终端用户有可能通过你的
    API 密钥生成有害的图像。记住，你有一个 Open AI 的 API 账户，而他们没有！因此，你需要意识到，如果你需要通过你的服务终止与违反 Open AI
    内容规则的用户的商业关系。
- en: © The Author(s), under exclusive license to APress Media, LLC, part of Springer
    Nature 2024B. HopkinsChatGPT for Java[https://doi.org/10.1007/979-8-8688-0116-7_5](https://doi.org/10.1007/979-8-8688-0116-7_5)
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: © 作者（们），独家授权给 APress 媒体公司，Springer Nature 部分版权所有 2024B. HopkinsChatGPT for Java[https://doi.org/10.1007/979-8-8688-0116-7_5](https://doi.org/10.1007/979-8-8688-0116-7_5)
- en: 5. Creating an Automated Community Manager Bot with Discord and Java
  id: totrans-769
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. 使用 Discord 和 Java 创建自动化的社区管理机器人
- en: 'Bruce Hopkins^([1](#Aff2)  )(1)Beaverton, OR, USAWhen you’re launching an app
    or a service, it’s important to build and maintain your own community. Below are
    the telltale signs of a healthy user community:'
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: '布鲁斯·霍普金斯^([1](#Aff2)  )(1)美国俄勒冈州比佛顿When you’re launching an app or a service,
    it’s important to build and maintain your own community. Below are the telltale
    signs of a healthy user community:'
- en: Members engage in meaningful discussions, sharing insights, feedback, and support.
  id: totrans-771
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 会员参与有意义的讨论，分享见解、反馈和支持。
- en: Disagreements or debates occur, but they are approached constructively without
    resorting to personal attacks or derogatory language.
  id: totrans-772
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 会有分歧或辩论发生，但它们是以建设性的方式进行的，不会诉诸人身攻击或侮辱性语言。
- en: There’s an atmosphere of respect, where members listen to each other and acknowledge
    differing opinions.
  id: totrans-773
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 存在一个尊重的氛围，成员们互相倾听并承认不同的观点。
- en: A mix of old and new members actively participate, ensuring the community remains
    vibrant and doesn’t stagnate.
  id: totrans-774
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 老成员和新成员的混合积极参与，确保社区保持活力，不会停滞不前。
- en: Users contribute diverse content, from answering questions to sharing resources,
    which enriches the community’s knowledge base.
  id: totrans-775
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户贡献了多样化的内容，从回答问题到分享资源，这丰富了社区的知识库。
- en: There’s a balance between giving and taking; members who seek help or information
    also offer it to others.
  id: totrans-776
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在给予和索取之间有一个平衡；寻求帮助或信息的人也会向他人提供帮助。
- en: New members frequently join, often referred by existing members, indicating
    that the community is seen positively and worth recommending.
  id: totrans-777
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 新成员经常加入，通常由现有成员推荐，这表明社区受到积极评价，值得推荐。
- en: Users often become advocates for the community or platform, promoting it outside
    of the direct community space, such as on social media or other forums.
  id: totrans-778
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户经常成为社区或平台的倡导者，在直接社区空间之外推广它，例如在社交媒体或其他论坛上。
- en: The community helps to shape the app or service by providing new ideas for features
    and functionality.
  id: totrans-779
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 社区通过提供新功能和新功能性的想法来帮助塑造应用程序或服务。
- en: No matter what type of app or service that I create, I would love for my user
    community to exemplify the items listed above!
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 无论我创建什么类型的应用程序或服务，我都希望我的用户社区能够体现上述各项内容！
- en: Choosing Discord as Your Community Platform
  id: totrans-781
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择Discord作为您的社区平台
- en: Over the past few years, Discord has surged in popularity as a useful tool for
    community management for people who are passionate about their communities. This
    is partially due to its cross-platform compatibility, allowing members to stay
    connected whether they’re on a desktop, mobile device, or web browser. However,
    one of its standout features is the invitation-based community system, which helps
    community managers to control growth and prevents spam. This model not only ensures
    a tailored experience for members but also enhances security, since community
    managers have the discretion to grant or deny access.
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的几年里，Discord因其作为社区管理的有用工具而迅速流行起来，这对于热衷于自己社区的人来说是一个很好的选择。这部分的功劳要归功于其跨平台兼容性，允许成员无论在桌面、移动设备还是网页浏览器上都能保持连接。然而，它最突出的功能是基于邀请的社区系统，这有助于社区管理者控制增长并防止垃圾邮件。这种模式不仅确保了为成员提供定制体验，还增强了安全性，因为社区管理者有权决定是否授予或拒绝访问。
- en: Discord not only supports text messaging, but also supports voice chats and
    streaming video. Very similar to Slack, Discord allows community managers to separate
    content into channels to organize discussions, streamline information flow, and
    to help users see the content that they’re interested in.
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: Discord不仅支持文本消息，还支持语音聊天和流式视频。与Slack非常相似，Discord允许社区管理者将内容分离到频道中，以组织讨论、简化信息流，并帮助用户看到他们感兴趣的内容。
- en: Creating a More Advanced Bot Than Our Slack Bot
  id: totrans-784
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建比我们的Slack机器人更高级的机器人
- en: Now, If you successfully went through the steps in Chapter [3](607613_1_En_3_Chapter.xhtml)
    where we worked with a Slack bot, then the steps in this chapter will feel familiar
    to you. In Chapter [3](607613_1_En_3_Chapter.xhtml), we created a Slack bot to
    read a single channel during a time period and get a summary of the content discussed.
    The Slack bot was not a community manager, but was more like a helpful assistant.
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果您成功完成了第[3](607613_1_En_3_Chapter.xhtml)章中的步骤，其中我们与Slack机器人合作，那么本章的步骤对您来说将感到熟悉。在第[3](607613_1_En_3_Chapter.xhtml)章中，我们创建了一个Slack机器人，在一段时间内读取单个频道并总结讨论的内容。这个Slack机器人不是一个社区管理者，而更像是一个有用的助手。
- en: For the remainder of this book, we’re going to perform all the steps necessary
    to make powerful bots for Discord that will use AI to help actually manage the
    community.
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书的剩余部分，我们将执行所有必要的步骤来创建强大的Discord机器人，这些机器人将使用AI来帮助实际管理社区。
- en: Creating a More Advanced Bot Than Any Typical Discord Bot
  id: totrans-787
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建比任何典型Discord机器人更高级的机器人
- en: 'If you’ve ever had any experience using a Discord bot, then you’re probably
    aware that the most common way in order to interact with them is with what’s called
    a “/command.” This enables typical bots (read: non-intelligent bots) to essentially
    work only when they have received a very specific operation or command. If the
    “/command” is not provided, then the bot will be silent and not do anything. Essentially,
    it exemplifies the phrase, “speak only when you are spoken to.”'
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您曾经使用过Discord机器人，那么您可能知道与它们交互的最常见方式是使用所谓的“/命令”。这使典型的机器人（即非智能机器人）仅在接收到非常具体的操作或命令时才能工作。如果没有提供“/命令”，则机器人将保持沉默，不会做任何事情。本质上，它体现了“言多必失”的谚语。
- en: However, we are creating a Discord bot that will be artificially intelligent,
    and therefore it will be much more advanced than any typical Discord bot. We’re
    going to create bots that will be able to read and see all messages in the Discord
    server, and be intelligent enough to respond correctly.
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们正在创建一个具有人工智能的Discord机器人，因此它将比任何典型的Discord机器人都要先进得多。我们将创建能够阅读和查看Discord服务器中所有消息的机器人，并且足够智能，能够正确地做出回应。
- en: Understanding the Roles for the Bots
  id: totrans-790
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解机器人的角色
- en: 'So let’s explore a scenario in order to make things real. We’re creating a
    public Discord server to interact with the users of a mobile banking app. Our
    end goal is to have bots written in Java to handle the following scenarios:'
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索一个场景，以便使事情变得具体。我们正在创建一个公共Discord服务器，以与移动银行应用程序的用户互动。我们的最终目标是拥有用Java编写的机器人来处理以下场景：
- en: 'Q&A: Monitor a specific channel and automatically answer questions from users
    about how to use the banking app. For this to work, the bot will need to be trained
    on how the app works'
  id: totrans-792
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Q&A：监控特定频道并自动回答用户关于如何使用银行应用程序的问题。为了实现这一点，机器人需要接受关于应用程序如何工作的训练
- en: 'No solicitations: For any business community, it’s important that the participants
    of the community are not being targeted by unscrupulous individuals. For example,
    if you’re creating a banking app, do you want your customers contacted by anyone
    whose username is “B4nk Admin”?'
  id: totrans-793
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无推销：对于任何商业社区来说，重要的是社区参与者不会受到不诚实个人的针对。例如，如果您正在创建银行应用程序，您希望您的客户被任何用户名为“B4nk Admin”的人联系吗？
- en: 'No harmful content: For any community, it’s important for the members to be
    protected from harmful content such as hate language.'
  id: totrans-794
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无有害内容：对于任何社区来说，保护成员免受有害内容（如仇恨言论）的影响都是非常重要的。
- en: 'Our Example Bank: Crook’s Bank'
  id: totrans-795
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们的示例银行：Crook’s Bank
- en: For the purposes of this example, I decided upon a fictional name of a fictional
    bank that would have an extremely low likelihood of coinciding with the name of
    a real bank. Therefore, for this example, “Crook’s Bank” is launching a new mobile
    app for customers of their bank. They want to have a channel that will be monitored
    by a bot to answer questions from users of the app, and they also want to ensure
    that no one is soliciting users of their app, or posting hurtful or harmful content
    in their Discord servers.
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 在本例中，我选择了一个虚构的银行名称，其与真实银行名称重合的可能性极低。因此，在本例中，“Crook’s Bank”将为他们的银行客户推出一款新的移动应用程序。他们希望有一个由机器人监控的渠道来回答应用程序用户的提问，并且他们还希望确保没有人向他们的应用程序用户进行推销，或在他们的Discord服务器上发布伤害性或有害的内容。
- en: '![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig1_HTML.png)'
  id: totrans-797
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig1_HTML.png)'
- en: A screenshot of the mobile interface has a fake bank application. It reads Welcome
    to Crooks Bank with an illustration of a robber.
  id: totrans-798
  prefs: []
  type: TYPE_NORMAL
  zh: 一张移动界面的截图显示了假银行应用程序。它写着“欢迎来到Crooks Bank”，并附有一个抢劫者的插图。
- en: Figure 5-1
  id: totrans-799
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-1
- en: This Fake App from a Fake Bank Has Real Problems
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 这个来自虚构银行的假应用程序存在真实问题
- en: 'First Things First: Create Your Own Discord Server'
  id: totrans-801
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 首要任务：创建您的Discord服务器
- en: Before we can make an AI Discord Bot, we’re obviously going to need a Discord
    server already in place for the bot to interact with. Use either the Discord App
    or go to the Discord website (login first of course), and start the process to
    Add/Create a new server.
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们能够创建一个AI Discord机器人之前，显然我们需要一个机器人可以与之交互的Discord服务器。使用Discord应用程序或访问Discord网站（当然，首先需要登录），然后开始添加/创建一个新的服务器的过程。
- en: After you have started the process, select the option labeled “**Create My Own**”
    as shown in Figure [5-2](#Fig2).![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig2_HTML.png)
  id: totrans-803
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始此过程后，选择如图 [5-2](#Fig2) 所示的标记为“**创建我的**”的选项！[](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig2_HTML.png)
- en: A screenshot of a page is overlayed by the Create Your First Discovered Server
    popup box. It displays the following options. Create my own, gaming, school club,
    and study group.
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 页面截图被创建您的第一个发现服务器弹出框覆盖。它显示了以下选项。创建我的，游戏，学校俱乐部和学习小组。
- en: Figure 5-2
  id: totrans-805
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-2
- en: Creating Your Own Discord Server
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 创建您的 Discord 服务器
- en: Next, you’ll be prompted to specify additional information about your server.
    Continue to proceed through the creation process until you are prompted to provide
    a name and icon for your server, as shown in Figure [5-3](#Fig3).![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig3_HTML.png)
  id: totrans-807
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，您将被提示提供有关您服务器的其他信息。继续进行创建过程，直到您被提示提供服务器名称和图标，如图 [5-3](#Fig3) 所示。![图 5-3](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig3_HTML.png)
- en: A screenshot of a page is overlaid by the Customize Your Server popup box. It
    has the fields to create a server name and the create button is selected.
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 页面截图被自定义您的服务器弹出框覆盖。它包含创建服务器名称的字段，创建按钮已被选中。
- en: Figure 5-3
  id: totrans-809
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-3
- en: Providing a Name for Your Own Discord Server
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 为您自己的 Discord 服务器提供名称
- en: Specify the name of your server and provide an optional server icon (if you
    have one).
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 指定您服务器的名称并提供可选的服务器图标（如果您有的话）。
- en: Create the Q&A Channel
  id: totrans-812
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建问答频道
- en: By default, every Discord server has a “general” channel, but we want a dedicated
    channel especially for questions and answers. Depending upon how you created your
    server, Figure [5-4](#Fig4) and [5-5](#Fig5) will be presented to you to create
    your new channel.![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig4_HTML.png)
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，每个 Discord 服务器都有一个“通用”频道，但我们要创建一个专门用于问答的频道。根据您创建服务器的方式，您将看到如图 [5-4](#Fig4)
    和 [5-5](#Fig5) 所示的选项来创建您的新频道。![图 5-4](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig4_HTML.png)
- en: A screenshot of a page is overlaid by the Crooks Bank, Start a conversation
    popup box. It has the field to create a topic and the done button.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 页面截图被 Crooks 银行、开始对话弹出框覆盖。它包含创建主题的字段和完成按钮。
- en: Figure 5-4
  id: totrans-815
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-4
- en: Creating a Channel Using the Web Interface
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Web 界面创建频道
- en: '![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig5_HTML.png)'
  id: totrans-817
  prefs: []
  type: TYPE_IMG
  zh: '![图 5-5](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig5_HTML.png)'
- en: A screenshot of the Create Channel popup box. It has the text radio button selected
    under the channel type along with the create channel button at the bottom.
  id: totrans-818
  prefs: []
  type: TYPE_NORMAL
  zh: 创建频道的弹出框截图。在频道类型下选中了文本单选按钮，底部有创建频道按钮。
- en: Figure 5-5
  id: totrans-819
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-5
- en: Creating a Channel Using the Discord App
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Discord 应用程序创建频道
- en: Registering a New Discord Bot App with Discord
  id: totrans-821
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Discord 注册新的 Discord 机器人应用程序
- en: Now that we have our Discord server with the appropriate channels created, it’s
    time to register the bot itself – or rather, in our case, the bots themselves.
    In order to keep the code clean and manageable, we’ll actually have multiple bots
    for our Discord server. The first bot will be used exclusively to answer questions
    in the “q-and-a” channel. The second bot will monitor all channels for unwanted
    content, such as harmful content or solicitations.
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经创建了具有适当频道的 Discord 服务器，是时候注册机器人本身了——或者更确切地说，在我们的情况下，是注册机器人。为了保持代码的整洁和管理，我们实际上将为我们的
    Discord 服务器拥有多个机器人。第一个机器人将专门用于“问答”频道中的问答。第二个机器人将监控所有频道，以防止不希望的内容，如有害内容或请求。
- en: 'In order to create our bot, head over to the Discord Developers website:'
  id: totrans-823
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建我们的机器人，请访问 Discord 开发者网站：
- en: '[**https://discord.com/developers**](https://discord.com/developers)'
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: '[**https://discord.com/developers**](https://discord.com/developers)'
- en: At the top-right of the page, click on the button “**New Application**,” as
    shown in Figure [5-6](#Fig6).![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig6_HTML.png)
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: 在页面右上角，单击如图 [5-6](#Fig6) 所示的“**新建应用程序**”按钮。![图 5-6](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig6_HTML.png)
- en: A screenshot of a developer portal page. It displays the details under the applications
    along with the new application button at the top right.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 开发者门户页面的截图。它显示了应用程序下的详细信息，以及右上角的新应用程序按钮。
- en: Figure 5-6
  id: totrans-827
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-6
- en: In Order to Create a Discord Bot, Go to the Discord Developer Website
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建 Discord 机器人，请访问 Discord 开发者网站
- en: In both Discord and Slack terminology, a “bot” is an “app,” and bots are not
    allowed to run on Discord servers unless they have been registered with Discord
    first.
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Discord 和 Slack 术语中，一个“机器人”是一个“应用程序”，并且除非它们已在 Discord 上注册，否则机器人不允许在 Discord
    服务器上运行。
- en: Specify a name for the bot, and click the “**Create**” button, as shown in Figure
    [5-7](#Fig7).![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig7_HTML.png)
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 指定机器人的名称，并单击如图 [5-7](#Fig7) 所示的“**创建**”按钮。![图 5-7](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig7_HTML.png)
- en: A screenshot of the applications page is overlayed by the create and application
    popup box. It displays the fields to create a name and the create button is selected.
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序页面的截图上叠加了创建和应用弹出框。它显示了创建名称的字段，并选择了创建按钮。
- en: Figure 5-7
  id: totrans-832
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-7
- en: Creating/Registering a Bot for Discord
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 为 Discord 创建/注册机器人
- en: Specifying General Info for the Bot
  id: totrans-834
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 指定机器人的通用信息
- en: Afterward, you will be taken to a page where you can specify general information
    about your bot, as shown in Figure [5-8](#Fig8).
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，你将被带到可以指定关于你的机器人的通用信息的页面，如图 [5-8](#Fig8) 所示。
- en: Be sure to familiarize yourself with the navigation menu on the left side of
    the page. As you can see, we have several categories of settings to configure
    for our bot. By default, we have landed on the “**General Information**” page,
    where we specify basic info about our bot. If you have an icon ready for your
    bot, you can upload it here.![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig8_HTML.png)
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 一定要熟悉页面左侧的导航菜单。如你所见，我们有几个类别设置要为我们的机器人配置。默认情况下，我们已经 landed 在“**通用信息**”页面，在那里我们指定了关于我们机器人的基本信息。如果你为你的机器人准备好了图标，你可以在这里上传它！![图片](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig8_HTML.png)
- en: A screenshot of the developer page displays the settings. The general information
    is selected under the settings that display the field to add the app icon, name,
    description box, tags, and application I D, and the save changes button is selected.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 开发者页面的截图显示了设置。在显示添加应用图标、名称、描述框、标签和应用 ID 的字段以及保存更改按钮的设置下选择了通用信息。
- en: Figure 5-8
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-8
- en: I Decided to Give My Bot a Cute Little Robot Icon
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 我决定给我的机器人一个可爱的小机器人图标
- en: Specifying OAuth2 Parameters for the Bot
  id: totrans-840
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 指定机器人的 OAuth2 参数
- en: Now it’s time to specify the scopes and permissions for our bot. If you followed
    the steps in creating a Slack bot in Chapter [3](607613_1_En_3_Chapter.xhtml),
    then (as stated before) this procedure will feel familiar to you. Bots **can not**
    and **should not** have the ability do anything and everything – they should be
    only allowed to perform a list of operations that they were designed to perform.
  id: totrans-841
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候指定我们机器人的作用域和权限了。如果你遵循了第 [3](607613_1_En_3_Chapter.xhtml) 章创建 Slack 机器人的步骤，那么（如前所述）这个过程对你来说应该很熟悉。机器人**不能**也不应该拥有做任何事情的权限——它们应该只被允许执行它们被设计来执行的操作列表。
- en: On the settings navigation menu on the left, navigate to “**OAuth2 ➤ URL Generator**”
    to continue.
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 在左侧的设置导航菜单中，导航到“**OAuth2 ➤ URL 生成器**”以继续。
- en: 'Below are the scopes that we want:'
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们想要的作用域：
- en: Scopes
  id: totrans-844
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作用域
- en: Bot
  id: totrans-845
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器人
- en: This is reflected in Figure [5-9](#Fig9).![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig9_HTML.png)
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 这在图 [5-9](#Fig9) 中体现。![图片](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig9_HTML.png)
- en: A screenshot of the developer page displays the settings. The O Auth 2 is selected
    under the settings that display the O Auth 2 U R L generator details. The bot
    is selected under the scopes.
  id: totrans-847
  prefs: []
  type: TYPE_NORMAL
  zh: 开发者页面的截图显示了设置。在显示 OAuth2 URL 生成器详细信息的设置下选择了 OAuth 2。在作用域下选择了机器人。
- en: Figure 5-9
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-9
- en: Selecting the Scopes
  id: totrans-849
  prefs: []
  type: TYPE_NORMAL
  zh: 选择作用域
- en: 'After we select the bot’s scope, we get to see all the permissions that are
    only applicable to bots. Bot permissions fall into three categories: **general**,
    **text**, and **voice**.'
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们选择机器人的作用域后，我们可以看到所有仅适用于机器人的权限。机器人权限分为三类：**通用**、**文本**和**语音**。
- en: In case you’re curious about the categories, the general permissions allow the
    bot to act in the capacity of a normal human moderator, such as managing the server,
    roles, and channels. Bots with these permissions can also kick and ban members.
  id: totrans-851
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对此类别感兴趣，通用权限允许机器人在正常人类管理员的身份下行动，例如管理服务器、角色和频道。具有这些权限的机器人还可以踢出和禁止成员。
- en: Text permissions allow the bot to send and receive messages in text channels,
    and voice permissions allow the bot to participate in voice channels. Simple enough,
    right?
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 文本权限允许机器人在文本频道中发送和接收消息，而语音权限允许机器人在语音频道中参与。很简单，对吧？
- en: 'Select the following permission for the bot:'
  id: totrans-853
  prefs: []
  type: TYPE_NORMAL
  zh: 选择以下权限供机器人使用：
- en: Bot Permissions
  id: totrans-854
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器人权限
- en: Text Permissions
  id: totrans-855
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本权限
- en: Send Messages
  id: totrans-856
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发送消息
- en: Read Message History
  id: totrans-857
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 读取消息历史
- en: The appropriate permissions are reflected in Figure [5-10](#Fig10).![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig10_HTML.png)
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 适当的权限在图 [5-10](#Fig10) 中体现。![图片](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig10_HTML.png)
- en: A screenshot of the developer page displays the settings. The O Auth 2 is selected
    under the settings that display the B O T permissions. The send messages and the
    read message history options are selected under the text permissions.
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 开发者页面的截图显示了设置。在显示机器人权限的设置下选择了 OAuth 2。在文本权限下选择了发送消息和读取消息历史选项。
- en: Figure 5-10
  id: totrans-860
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-10
- en: Selecting the Text Permissions
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 选择文本权限
- en: Although you haven’t written any Java code yet, now it’s time to invite your
    bot to your server.
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管你还没有编写任何 Java 代码，但现在是你邀请你的机器人到你的服务器的时候了。
- en: Invite Your Bot to Your Server
  id: totrans-863
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 邀请你的机器人到你的服务器
- en: As shown in Figure [5-10](#Fig10), after you have selected the appropriate permissions,
    Discord will give you a dynamically generated URL that will enable you to invite
    your bot to your server.
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [5-10](#Fig10) 所示，在你选择了适当的权限后，Discord 将为你提供一个动态生成的 URL，这将使你能够邀请你的机器人到你的服务器。
- en: Copy the URL and paste it into a web browser where you’re already authenticated
    into Discord. The result is shown in Figure [5-11](#Fig11).![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig11_HTML.png)
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 复制 URL 并将其粘贴到你已经认证到 Discord 的网页浏览器中。结果如图 [5-11](#Fig11) 所示。![图 5-11](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig11_HTML.png)
- en: A screenshot of the Disord page displays the interface with Q and A Bot. The
    Discord reads, Buy you a nice seafood dinner message along with the add a bot
    to a server and create commands message.
  id: totrans-866
  prefs: []
  type: TYPE_NORMAL
  zh: Discord 页面的截图显示了与 Q 和 A Bot 的界面。Discord 显示了“买你一顿美味的海鲜晚餐”的消息，以及添加机器人到服务器和创建命令的消息。
- en: Figure 5-11
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-11
- en: If You Read the Screen Carefully Here, You Can See That Discord Has a Sense
    of Humor
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仔细阅读屏幕上的内容，你会看到 Discord 有一种幽默感。
- en: Click on the “**Continue**” button to add the bot to your server.
  id: totrans-869
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“**继续**”按钮，将机器人添加到你的服务器。
- en: Next, you will see a page that looks quite similar to the previous one, but
    the main difference is that it will give you a summary of all the permissions
    and capabilities of the bot. Typically this is quite useful if you are adding
    a bot to a server that you DID NOT CREATE. However, since we created this bot
    ourselves, this is just a confirmation of the settings that we have already specified
    earlier.
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你将看到一个看起来与上一个页面非常相似的页面，但主要区别是它将为你提供机器人的所有权限和功能的摘要。通常，如果你要将机器人添加到你没有创建的服务器，这非常有用。然而，由于我们自己是创建了这个机器人，这只是为了确认我们之前已经指定的设置。
- en: '![](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig12_HTML.png)'
  id: totrans-871
  prefs: []
  type: TYPE_IMG
  zh: '![图 5-12](../images/607613_1_En_5_Chapter/607613_1_En_5_Fig12_HTML.png)'
- en: A screenshot of the Disord page displays the interface with Q and A Bot. The
    send messages and read message history checkboxes are selected under the capabilities.
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: Discord 页面的截图显示了与 Q 和 A Bot 的界面。在功能下选中了发送消息和读取消息历史复选框。
- en: Figure 5-12
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-12
- en: Confirming the capabilities of the bot
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 验证机器人的功能
- en: Click the “**Authorize**” button to give the bot the permission to run on your
    server.
  id: totrans-875
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“**授权**”按钮，以授予机器人在你服务器上运行权限。
- en: If everything went smoothly, then you should see an automated message in the
    General channel of your server that indicates that the process has been successful.
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一切顺利，那么你应该在你的服务器的通用频道中看到一个自动消息，表明过程已成功。
- en: Getting the Discord ID Token for Your Bot and Setting the Gateway Intents
  id: totrans-877
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 获取你的机器人的 Discord ID 令牌并设置网关意图
- en: Now it’s time to get the Discord ID token for your bot, which you’ll use in
    your code to authenticate your bot programmatically.
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候获取你的机器人的 Discord ID 令牌了，你将在代码中使用它来程序化地验证你的机器人。
- en: Note
  id: totrans-879
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: 'For obvious reasons, using the word “token” here makes me nervous because this
    word has two distinct meanings in this book due to the context, but here’s a quick
    refresher on the meanings:'
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 由于显而易见的原因，在这里使用“令牌”这个词让我感到紧张，因为这个词在这个书中由于上下文有两个不同的含义，但这里是一个关于这些含义的快速回顾：
- en: When using Discord and Slack APIs, a “token” is an authentication token.
  id: totrans-881
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当使用 Discord 和 Slack API 时，“令牌”是一个认证令牌。
- en: When using OpenAI APIs, a “token” as a part of a word.
  id: totrans-882
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当使用 OpenAI API 时，“令牌”是单词的一部分。
- en: Go back to the Discord developer’s website, and click the “**Bot**” category
    in the settings navigation menu to continue.
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: 返回 Discord 开发者网站，并点击设置导航菜单中的“**机器人**”类别以继续。
