- en: 'Prompt 10: “Design a recurrent neural network (RNN) for predicting stock prices.
    What key considerations are needed?”'
  id: totrans-2018
  prefs: []
  type: TYPE_NORMAL
  zh: 'Prompt 10: “设计一个用于预测股价的循环神经网络（RNN）。需要考虑哪些关键因素？”'
