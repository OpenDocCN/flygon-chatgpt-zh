- en: Furthermore, following guidelines from Hair et al. (2016), this study must examine
    whether the square roots of AVE are greater than the correlations between variables.
    As seen in [Table 5.2](#ch13.xhtml#t11), discriminant validity is validated. Additionally,
    Harman’s single-factor test verifies that common method bias is not a significant
    problem ([Henseler et al., 2015](#ch13.xhtml#r204)).
  id: totrans-1084
