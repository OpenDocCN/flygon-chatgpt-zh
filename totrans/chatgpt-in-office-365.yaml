- en: Preface
  id: totrans-51
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 前言
- en: 'Picture this: a world where Generative AI, particularly ChatGPT, seamlessly
    integrates into the fabric of our daily office routines, revolutionizing the way
    we interact with data, manage tasks, and unleash our creative potential. This
    isn''t just a futuristic scenario; it''s the reality we''re stepping into, a reality
    that this book vividly captures and explores.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下：一个世界，生成式AI，特别是ChatGPT，无缝地融入我们日常办公的纹理中，革命性地改变了我们与数据互动、管理任务和释放创造潜能的方式。这不仅仅是一个未来场景；这是我们正在步入的现实，这本书生动地捕捉并探讨了这一现实。
- en: Much like the Industrial Revolution, which reshaped society with its machines
    and innovations, ChatGPT stands at the forefront of a new digital revolution.
    Remember how the Industrial Revolution, despite initial disruptions and job losses,
    ultimately led to more efficient production, better working conditions, and widespread
    wealth creation? Similarly, ChatGPT, while potentially replacing certain roles,
    will accelerate other processes and give birth to new professions, fostering an
    ecosystem brimming with opportunities and wealth for all.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 就像工业革命通过其机器和创新重塑社会一样，ChatGPT站在新一轮数字革命的前沿。还记得工业革命尽管最初造成了破坏和失业，但最终导致了更高效的生产、更好的工作条件和广泛财富的创造吗？同样，ChatGPT虽然可能取代某些角色，但会加速其他过程，并催生新的职业，为所有人创造充满机会和财富的生态系统。
- en: Imagine an office where ChatGPT, integrated with Microsoft Office 365, automates
    mundane tasks like drafting emails or compiling reports, freeing us from the chains
    of repetitive work. This book dives deep into this integration, revealing how
    such technology not only boosts efficiency but also sparks a new wave of innovation.
    It's about transforming the ordinary into the extraordinary, where ChatGPT becomes
    a catalyst for creative thinking, novel problem-solving methods, and the generation
    of fresh project ideas.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个办公室，ChatGPT与Microsoft Office 365集成，自动化诸如撰写电子邮件或编制报告等日常任务，使我们摆脱重复工作的束缚。这本书深入探讨了这种集成，揭示了这种技术不仅提高了效率，还引发了一股新的创新浪潮。这是将平凡变为非凡的故事，在这里，ChatGPT成为创造性思维、新颖的解决问题的方法和生成新项目想法的催化剂。
- en: The impact of ChatGPT is tangible and vast. Let's look at the numbers that paint
    a picture of this transformation. ChatGPT, in its nascent stages, drew an impressive
    one million users within just a week of its launch, the fastest growth ever for
    an internet service. Today, its user base has expanded exponentially, with its
    website attracting an estimated 1.6 billion visitors every month and maintaining
    about 100 million active users. The tool has rapidly become a staple in over 92%
    of Fortune 500 companies, signifying its widespread acceptance and utility in
    the corporate world.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的影响是真实且巨大的。让我们看看描绘这一变革的数字。ChatGPT在其起步阶段，仅在其推出后的第一周就吸引了令人印象深刻的100万用户，这是互联网服务增长速度最快的一次。如今，其用户群已经呈指数级增长，其网站每月吸引约16亿访问者，并保持大约1亿活跃用户。该工具迅速成为超过92%的《财富》500强公司的必备工具，标志着其在企业界的广泛应用和实用性。
- en: Financially, ChatGPT's projections are nothing short of astounding. OpenAI revenues
    reached $200 million in 2023, with a remarkable projection of $1 billion by the
    year 2024\. Operating this tool on Microsoft’s Azure Cloud incurs a daily expense
    of around $100,000, translating to each word generated costing approximately $0.0003\.
    Intriguingly, studies have shown that about 53% of people are unable to differentiate
    between content created by ChatGPT and that authored by humans.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在财务方面，ChatGPT的预测可以说是令人震惊。OpenAI在2023年的收入达到了2亿美元，预计到2024年将达到10亿美元。在微软Azure云上运行此工具的每日费用约为10万美元，这意味着每生成一个单词的成本大约为0.0003美元。有趣的是，研究表明，大约有53%的人无法区分由ChatGPT创建的内容和由人类创作的内容。
- en: 'The impact of ChatGPT extends further with the introduction of Copilot for
    Microsoft Office 365\. Launched on November 1, 2023, it has already garnered the
    support of major corporations such as Visa, BP, Honda, Pfizer, and Chevron. Data
    from the New Work Trend Index highlight Copilot''s effectiveness: 77% of users
    express reluctance to work without it, 70% acknowledge its enhancement of their
    productivity, and 68% attest to improvements in the quality of their work. Users
    are 29% faster in completing tasks and can catch up on missed meetings nearly
    four times quicker with Copilot, ushering in the Copilot Pro era.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的影响随着Copilot for Microsoft Office 365的推出而进一步扩大。2023年11月1日推出后，它已经获得了visa、BP、本田、辉瑞和雪佛龙等大型企业的支持。来自新工作趋势指数的数据突出了Copilot的有效性：77%的用户表示没有它就不愿意工作，70%的人承认它提高了他们的生产力，68%的人证实了工作质量的提升。使用Copilot，用户完成任务的速度快了29%，几乎可以快四倍地赶上错过的会议，迎来了Copilot
    Pro时代。
- en: This book isn't just a guide; it's a manifesto for the future. It's for everyone
    - from seasoned professionals to newcomers - looking to navigate and master this
    new era of office productivity, powered by the wonders of Generative AI. It's
    about understanding and harnessing the potential of ChatGPT in our everyday office
    roles, setting the stage for a more efficient, creative, and prosperous world.
    Welcome to the dawn of the ChatGPT era, an era that redefines the very essence
    of work and creativity.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书不仅仅是一本指南；它是对未来的宣言。它面向所有人——从经验丰富的专业人士到新手——希望在这个由生成式AI的奇迹推动的新办公生产力时代中导航和掌握。它关乎理解和利用ChatGPT在我们日常办公角色中的潜力，为更高效、更有创造力和更繁荣的世界奠定基础。欢迎来到ChatGPT时代的曙光，这是一个重新定义工作和创造力的本质的时代。
- en: Overview of ChatGPT and its Role in Enhancing Microsoft 365
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT概述及其在增强Microsoft 365中的作用
- en: As we delve deeper into the realm of Generative AI, it is essential to understand
    the core component of this technological revolution - ChatGPT. Developed by OpenAI,
    ChatGPT represents a significant leap in AI language models, offering a nuanced
    and sophisticated understanding of natural language. Its integration into Microsoft
    365 marks a significant milestone in the journey towards a more intelligent, responsive,
    and intuitive Office suite.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们深入到生成式AI的领域，理解这一技术革命的核心组件——ChatGPT——是至关重要的。由OpenAI开发的ChatGPT代表了AI语言模型的一个重大飞跃，提供了对自然语言的细微和复杂的理解。它集成到Microsoft
    365标志着向更智能、更响应、更直观的办公套件迈出的一个重要里程碑。
- en: Microsoft 365, known for its robust suite of office applications, gains a new
    dimension with the integration of ChatGPT. This integration brings about a transformative
    user experience across applications like Word, Excel, PowerPoint, and Teams. ChatGPT's
    role is to act not just as a tool but as a smart assistant, enhancing the functionality
    and interactivity of these applications.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 以其强大的办公应用程序套件而闻名的 Microsoft 365，通过与 ChatGPT 的集成获得了新的维度。这种集成在 Word、Excel、PowerPoint
    和 Teams 等应用程序中带来了变革性的用户体验。ChatGPT 的角色不仅是作为一个工具，而是一个智能助手，增强了这些应用程序的功能性和交互性。
- en: 'In Word: Streamlining Document Creation'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Word 中：简化文档创建
- en: In Microsoft Word, ChatGPT can assist in drafting, editing, and formatting documents.
    It can suggest improvements, generate summaries, and even help with research,
    making document creation more efficient and less labor-intensive.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Microsoft Word 中，ChatGPT 可以协助起草、编辑和格式化文档。它可以提出改进建议，生成摘要，甚至帮助进行研究，使文档创建更加高效，减少劳动强度。
- en: 'In Excel: Smart Data Analysis'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Excel 中：智能数据分析
- en: Excel's complex data management capabilities are further enhanced with ChatGPT's
    ability to analyze data trends, generate reports, and even predict future patterns.
    This enables users to make more informed decisions based on data insights provided
    by the AI.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 的数据分析能力进一步增强了 Excel 的复杂数据管理功能，它可以分析数据趋势、生成报告，甚至预测未来模式。这使得用户能够根据 AI 提供的数据洞察做出更明智的决策。
- en: 'In PowerPoint: Crafting Engaging Presentations'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在 PowerPoint 中：制作引人入胜的演示文稿
- en: PowerPoint presentations become more engaging with ChatGPT's assistance in generating
    content, designing layouts, and suggesting visual enhancements. This helps in
    creating presentations that are not only informative but also visually appealing.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在 ChatGPT 的帮助下生成内容、设计布局和提出视觉改进建议，PowerPoint 演示文稿变得更加引人入胜。这有助于创建既信息丰富又视觉吸引人的演示文稿。
- en: 'In Teams: Enriching Collaboration'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Teams 中：丰富协作
- en: Teams become more interactive with ChatGPT's ability to summarize meetings,
    answer queries, and facilitate seamless information flow. This enriches the collaborative
    experience, making it more efficient and productive.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 通过 ChatGPT 的能力总结会议、回答问题和促进信息流畅流动，Teams 变得更加互动。这丰富了协作体验，使其更加高效和富有成效。
- en: The synergy between ChatGPT and Microsoft 365 is not just about adding AI capabilities
    to office applications; it's about redefining how we interact with them. This
    collaboration represents a shift towards more intuitive, responsive, and personalized
    user experiences. It signifies a move from merely using tools to engaging with
    an intelligent assistant capable of adapting to individual user needs and preferences.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 与 Microsoft 365 之间的协同作用不仅仅是将 AI 功能添加到办公应用程序中；它还重新定义了我们与它们互动的方式。这种合作代表了向更直观、响应迅速和个性化的用户体验转变。这标志着从仅仅使用工具到与一个能够适应个人用户需求和偏好的智能助手互动的转变。
- en: Generative AI in the Modern Workplace
  id: totrans-71
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 现代工作场所中的生成式人工智能
- en: 'Chapter 1.1: Understanding Generative AI'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章 1.1：理解生成式人工智能
- en: 'In this chapter, we''ll start to explore the world of Generative AI, focusing
    on its evolution and availability, particularly the differences between two key
    versions: GPT-3.5 and GPT-4\. Understanding these differences is crucial for leveraging
    the capabilities of ChatGPT in Office 365 effectively.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将开始探索生成式人工智能的世界，重点关注其演变和可用性，特别是两个关键版本之间的差异：GPT-3.5 和 GPT-4。理解这些差异对于有效地利用
    ChatGPT 在 Office 365 中的功能至关重要。
- en: How Artificial Intelligence Works
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能是如何工作的
- en: 'Artificial Intelligence (AI) can be understood through a simple analogy: imagine
    AI as a very advanced recipe book for a computer. This recipe book doesn''t just
    contain fixed recipes; it also teaches the computer how to create new recipes
    based on the ingredients (data) it gets.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能（AI）可以通过一个简单的类比来理解：想象一下 AI 就是一个为计算机设计的非常高级的食谱集。这个食谱集不仅包含固定的食谱，还教会计算机如何根据它获得的原料（数据）创造新的食谱。
- en: 'Learning from Data (Training): Just like you learn to cook better by trying
    different recipes, AI learns from data. We give lots of examples – these can be
    pictures, texts, numbers, etc. For instance, if we want the AI to recognize cats
    in photos, we show thousands or even millions of cat pictures. Each picture is
    a ''recipe'' that the AI studies.'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从数据中学习（训练）：就像你通过尝试不同的食谱来提高烹饪技巧一样，AI 也是从数据中学习的。我们提供了大量的例子——这些可以是图片、文本、数字等。例如，如果我们想让
    AI 在照片中识别猫，我们会展示数千甚至数百万张猫的照片。每一张照片都是 AI 研究的“食谱”。
- en: 'Making Connections (Algorithms): The AI uses special sets of rules called algorithms
    to find patterns in the data. Think of it like learning to recognize which ingredients
    work well together in cooking. For example, in our cat recognition AI, the algorithm
    learns to identify patterns like the shape of ears, the texture of fur, etc.'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建立联系（算法）：AI使用称为算法的特殊规则集来在数据中寻找模式。想象一下，就像学习在烹饪中识别哪些食材搭配得很好一样。例如，在我们的猫识别AI中，算法学习识别耳朵的形状、毛发的质地等模式。
- en: 'Predicting and Deciding (Inference): After learning from a lot of data, the
    AI can start making predictions or decisions based on new data it hasn''t seen
    before. Like when you can guess how a new recipe might taste just by knowing the
    ingredients. If you show the AI a new photo, it can now predict whether there''s
    a cat in it.'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预测与决策（推理）：在从大量数据中学习之后，AI可以开始根据它之前未见过的新数据做出预测或决策。就像你仅凭知道食材就能猜测一道新食谱的味道一样。如果你向AI展示一张新照片，它现在可以预测照片中是否有猫。
- en: 'Improving Over Time (Feedback): AI can also improve over time. Just as you
    become a better cook with feedback from people who taste your food, AI systems
    often get better with feedback. If the AI makes a mistake (like thinking a dog
    is a cat), it uses that error to improve its future predictions.'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 随时间改进（反馈）：AI也可以随着时间的推移而改进。就像你从品尝你食物的人那里得到反馈后成为更好的厨师一样，AI系统通常在得到反馈后变得更好。如果AI犯了一个错误（比如认为狗是猫），它会利用这个错误来改进其未来的预测。
- en: 'Specialization: There are different types of AI for different tasks, just like
    how cookbooks can specialize in desserts, vegan food, etc. Some AIs are good at
    recognizing images, others at understanding human language, and so on.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 专业化：针对不同的任务有不同的AI类型，就像食谱可以专门制作甜点、素食等。有些AI擅长识别图像，有些擅长理解人类语言，等等。
- en: 'It is for some aspects how a child learns to speak: after hearing thousands
    of conversations, he slowly becomes smarter. Just learning from experience and
    a huge quantity of different cases is a winning approach instead of teaching every
    rule directly, both for a human and for an artificial intelligence.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像孩子学习说话的一些方面：在听到数千次对话后，他逐渐变得更聪明。仅从经验和大量不同案例中学习，而不是直接教授每条规则，对于人类和人工智能来说，都是一种获胜的方法。
- en: Ok, but what is ChatGPT?
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，但ChatGPT是什么？
- en: Good question, let’s ask ChatGPT itself:​
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 好问题，让我们问问ChatGPT本身：
- en: 'ChatGPT’s answer: “ChatGPT is a chatbot, a sophisticated artificial intelligence
    program designed to interact with users in a conversational manner. Created by
    OpenAI, it uses advanced language processing techniques to understand and generate
    human-like text. GPT stands for Generative Pre-trained Transformer. This technology
    enables ChatGPT to answer questions, provide explanations, and even engage in
    casual chat, much like talking to a knowledgeable friend. It''s constantly learning
    from its interactions, which helps it to improve over time. ChatGPT is accessible
    through various platforms, making it a handy tool for a wide range of users seeking
    information or just a friendly chat. Its versatility allows it to be useful in
    educational, professional, and recreational contexts.”'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回答：“ChatGPT是一个聊天机器人，是一种复杂的人工智能程序，旨在以对话方式与用户互动。由OpenAI创建，它使用高级语言处理技术来理解和生成类似人类的文本。GPT代表生成预训练转换器。这项技术使ChatGPT能够回答问题、提供解释，甚至参与轻松的聊天，就像与一位知识渊博的朋友交谈一样。它不断从其互动中学习，这有助于它随着时间的推移而改进。ChatGPT可通过各种平台访问，使其成为寻求信息或只是友好聊天的广泛用户的便捷工具。其多功能性使其在教育、专业和娱乐环境中都非常有用。”
- en: The Evolution from GPT-3.5 to GPT-4
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 从GPT-3.5到GPT-4的演变
- en: ChatGPT has significantly progressed in the last year, with GPT-3.5 and GPT-4
    standing out as major milestones. These models represent cutting-edge advancements
    in natural language processing and generation.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在过去一年中取得了显著进步，GPT-3.5和GPT-4是其中的重要里程碑。这些模型代表了自然语言处理和生成的尖端进展。
- en: 'What Is GPT-4? GPT-4, the successor to GPT-3.5, represents a leap forward in
    AI capabilities. It''s designed to better understand context and nuances, providing
    more accurate and coherent responses. Before proceeding is important to understand
    the concept of context: this is the number of  words that the model, in our case
    ChatGPT, can handle: in particular, the most common parameter is the token. In
    most cases, it corresponds to one word, but it can also be an emoticon or a few
    letters. Context can be a great number, but it just refers to how many words the
    chatbot can read. It will never write more than 700/1000 words at one time.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-4是什么？GPT-4是GPT-3.5的后继者，代表了AI能力的飞跃。它旨在更好地理解上下文和细微差别，提供更准确和连贯的回复。在继续之前，理解上下文的概念很重要：这是模型，在我们的案例中是ChatGPT，可以处理的单词数量：特别是最常见的参数是token。在大多数情况下，它对应一个单词，但它也可以是一个表情符号或几个字母。上下文可以是一个很大的数字，但它仅仅指的是聊天机器人可以阅读的单词数量。它一次永远不会写超过700/1000个单词。
- en: 'Key Differences Between GPT-3.5 and GPT-4:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: GPT-3.5和GPT-4之间的关键差异：
- en: 'Context: GPT-4 can handle a maximum of 32,000 tokens, equivalent to about 25,000
    words, a significant increase from the 4,000 tokens (or about 3,125 words) limit
    of GPT-3.5\. In its last version, GPT-4 Turbo, they became 128k: an entire book,
    more than 300 pages of text.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文：GPT-4可以处理最多32,000个token，相当于大约25,000个单词，比GPT-3.5的4,000个token（或大约3,125个单词）的限制有显著提升。在其最新版本GPT-4
    Turbo中，这个数字增加到了128k：相当于一整本书，超过300页的文本。
- en: 'Linguistic Finesse: GPT-4 exhibits an advanced understanding of dialects and
    emotional tones, offering more personalized and sensitive interactions.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语言技巧：GPT-4展现出对方言和情感调的深入理解，提供更加个性化和敏感的交互。
- en: 'Information Synthesis: It can answer complex questions by synthesizing information
    from multiple sources, a step up from GPT-3.5\.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信息综合：它可以通过综合来自多个来源的信息来回答复杂问题，这是GPT-3.5的进步。
- en: 'Creativity and Coherence: GPT-4 excels in generating creative content like
    stories and essays with improved coherence.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创造力和连贯性：GPT-4在生成具有改进连贯性的创意内容，如故事和论文方面表现出色。
- en: 'Complex Problem-Solving: This version demonstrates a stronger ability to solve
    mathematical and scientific problems.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复杂问题解决：这个版本展示了更强的解决数学和科学问题的能力。
- en: 'Programming Power: GPT-4 shows remarkable capabilities in generating and debugging
    code, a boon for software developers.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编程能力：GPT-4在生成和调试代码方面显示出非凡的能力，这对软件开发者来说是一个福音。
- en: 'Image and Graphics Understanding: Unlike GPT-3.5, GPT-4 can analyze and comment
    on images and graphics.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像和图形理解：与GPT-3.5不同，GPT-4可以分析和评论图像和图形。
- en: 'Reduction of Inappropriate Responses: GPT-4 is designed to minimize biased
    or harmful content.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少不适当回复：GPT-4被设计用来最小化偏见或有害的内容。
- en: Where is ChatGPT Available?
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT在哪里可用？
- en: 'ChatGPT, based on these Generative AI models, is available in various forms
    and platforms:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这些生成式AI模型，ChatGPT以各种形式和平台提供：
- en: 'Chat.openai.com: This platform offers access to both GPT-3.5 and GPT-4 versions,
    allowing users to interact directly with the AI model. ChatGPT Plus, the premium
    subscription, allows access to GPT-4 with web browsing and data analysis, image
    generation and GPTs, customizable versions of the chatbot. It costs 20$/month.'
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Chat.openai.com：这个平台提供对GPT-3.5和GPT-4版本的访问，使用户能够直接与AI模型互动。ChatGPT Plus，高级订阅，允许访问GPT-4，包括网页浏览和数据分析、图像生成和GPTs，以及可定制的聊天机器人版本。它每月的费用为20美元。
- en: 'Microsoft Copilot: Integrating OpenAI technology, Microsoft Copilot uses both
    GPT-3.5 and GPT-4 but is somewhat limited compared to the standalone versions
    on OpenAI''s platform. The advantage is that it can browse the web and it is completely
    free. It also has access to many plug-ins, such as Suno, an AI that creates music
    from text.'
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 微软Copilot：整合了OpenAI技术，微软Copilot同时使用GPT-3.5和GPT-4，但与OpenAI平台上的独立版本相比，功能上有所限制。其优势在于可以浏览网页，并且完全免费。它还可以访问许多插件，例如Suno，一个可以从文本创建音乐的AI。
- en: 'Microsoft Copilot Pro: Formerly known as 365 Copilot, this integration brings
    the power of ChatGPT with GPT-4 into the familiar environment of Microsoft 365
    applications like Word, PowerPoint, Excel and more. Right now, it is the most
    powerful tool available. The monthly subscription is $20, but if you download
    the Copilot app on your smartphone and register from there, you can enjoy a one-month
    free trial.'
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 微软Copilot Pro：之前被称为365 Copilot，这种集成将ChatGPT与GPT-4的力量带入到熟悉的Microsoft 365应用程序环境，如Word、PowerPoint、Excel等。目前，这是最强大的工具。月订阅费为20美元，但如果你在智能手机上下载Copilot应用并从那里注册，你可以享受一个月的免费试用。
- en: 'Google Gemini: While not an OpenAI product, Gemini offers similar capabilities
    and is worth mentioning for those interested in the broader landscape of Generative
    AI. It has access to the internet through Google.'
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Google Gemini：虽然不是OpenAI的产品，但Gemini提供了类似的功能，对于那些对生成式人工智能更广泛领域感兴趣的人来说值得关注。它可以通过Google访问互联网。
- en: Specifically, starting February 21, 2024, Gemini Advanced is integrated into
    a new Google One plan (also $20/month) that unlocks AI in Gmail, Docs, Slides,
    Sheets, and more. In effect, it is Google's alternative to Copilot Pro.
  id: totrans-103
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 具体来说，从2024年2月21日起，Gemini Advanced被整合到一个新的Google One计划中（也是每月20美元），该计划解锁了Gmail、Docs、Slides、Sheets等应用中的AI功能。实际上，这是Google对Copilot
    Pro的替代方案。
- en: 'Chapter 1.2: History of Generative AI'
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一章1.2节：生成式人工智能的历史
- en: In this chapter, we delve deeper into the history of Generative AI, uncovering
    its rich tapestry of development and innovations. This journey through time highlights
    the remarkable advancements that have shaped Generative AI, leading to tools like
    ChatGPT and their integration into modern workplace solutions such as Microsoft
    365\. You can read this chapter and the next one if you want to know more about
    artificial intelligence, they are important and interesting if you want to know
    more about the context, but they are not fundamental to learning how to use ChatGPT
    in Office 365.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们更深入地探讨生成式人工智能的历史，揭示其丰富的发展和创新脉络。这一穿越时间的旅程突出了塑造生成式人工智能的显著进步，导致了像ChatGPT这样的工具的出现，以及它们与现代办公解决方案（如Microsoft
    365）的整合。如果你想了解更多关于人工智能的信息，这一章和下一章是重要的和有趣的，如果你想要了解背景，但它们对于学习如何在Office 365中使用ChatGPT不是基本的。
- en: The Pioneering Years and Evolution
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 开创时期和演变
- en: 'The first AI (1955): The Logic Theorist, developed by Herbert Simon and Allen
    Newell, marked a significant breakthrough in the nascent field of artificial intelligence.
    This program, which was able to prove 38 of the first 52 theorems in Whitehead
    and Russell''s "Principia Mathematica", played a pivotal role in the development
    of AI. Notably, the field of AI wasn''t formally recognized at the time; it was
    only coined by John McCarthy a year later, in 1956, during a conference at Dartmouth
    College.'
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第一个AI（1955年）：由赫伯特·西蒙和艾伦·纽厄尔开发的逻辑理论家标志着人工智能新兴领域的一个重大突破。这个程序能够证明怀特海德和罗素《数学原理》中前52个定理中的38个，在人工智能的发展中发挥了关键作用。值得注意的是，当时人工智能领域还没有得到正式认可；它是在1956年，即在达特茅斯学院的一次会议上，由约翰·麦卡锡提出的。
- en: 'First chatbot (1965): Joseph Weizenbaum''s creation of ELIZA represented a
    significant step in the evolution of AI, particularly in natural language processing.
    ELIZA was capable of engaging in dialogue in English on a variety of topics, simulating
    a conversation with a human. This development was foundational for the field of
    chatbots and conversational AI, influencing future advancements in machine-human
    interaction.'
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第一个聊天机器人（1965年）：约瑟夫·魏岑鲍姆创造的ELIZA标志着人工智能进化中的一个重要步骤，特别是在自然语言处理方面。ELIZA能够就各种主题用英语进行对话，模拟与人类的交谈。这一发展是聊天机器人和对话人工智能领域的基石，影响了未来人机交互的进步。
- en: 'The AI Winter (1980s): The 1980s also witnessed a period known as the AI Winter,
    characterized by a significant slowdown in AI research and development. This was
    due to a combination of high expectations and limited practical achievements,
    leading to reduced funding and interest in the field. However, this period also
    saw continued work on neural networks and the beginnings of machine learning​.
    In particular, an approach based on teaching the machine directly, for example
    how to translate a language through grammatical rules, was abandoned. Instead,
    it was better to provide thousands of examples of translations and let the machine
    instruct itself just with statistics, so that it could calculate which translation
    in a new text was more probable. It was the birth of machine learning.'
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 人工智能寒冬（1980年代）：20世纪80年代也见证了被称为人工智能寒冬的时期，其特点是人工智能研究和开发显著放缓。这是由于高期望和有限的实际成就相结合，导致对该领域的资金和兴趣减少。然而，这一时期也见证了神经网络工作的持续以及机器学习的开端。特别是，基于直接教机器的方法，例如如何通过语法规则翻译语言，被放弃了。相反，更好的做法是提供数千个翻译示例，让机器仅通过统计自己指导自己，这样它就可以计算出在新文本中哪种翻译更可能。这是机器学习的诞生。
- en: 'Early Speech Recognition (1970s - 1992): The seeds of Generative AI were planted
    with the development of speech recognition systems. One of the earliest milestones
    was the Sphinx-II project by Xuedong Huang at Carnegie Mellon University, a system
    that could understand speech with a larger vocabulary than the average human.'
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 早期语音识别（1970年代 - 1992年）：生成式AI的种子随着语音识别系统的开发而播下。其中一个早期里程碑是卡内基梅隆大学的黄学东（Xuedong
    Huang）领导的Sphinx-II项目，这是一个能够理解比普通人词汇量更大的语音的系统。
- en: 'IBM''s Deep Blue - AI Meets Chess (1997): The victory of IBM''s supercomputer
    Deep Blue over the chess grandmaster Garry Kasparov, the best chess player in
    the world, was more than a spectacle; it was a demonstration of AI''s potential
    in complex problem-solving and strategic planning. This landmark event helped
    to popularize the concept of AI in the public imagination.'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: IBM的Deep Blue - 人工智能与棋类游戏相遇（1997年）：IBM超级计算机Deep Blue战胜世界最佳棋手加里·卡斯帕罗夫（Garry Kasparov）不仅是一场壮观的比赛；它展示了AI在复杂问题解决和战略规划方面的潜力。这一里程碑事件帮助普及了公众对AI的概念。
- en: 'Instant Messaging Bots (2001): SmarterChild, developed by ActiveBuddy, Inc.,
    was a pioneering chatbot in the realm of instant messaging. Introduced in 2001
    on platforms like AOL Instant Messenger and MSN Messenger, it quickly gained popularity,
    amassing over 30 million users. SmarterChild was more than just an information
    source; it had a distinct personality and could engage in quirky, playful conversations
    with users. It provided a range of information from various domains, including
    news, weather, and sports, and could even play simple games with users. Its development
    and success demonstrated the potential of AI in everyday applications and set
    the stage for the emergence of more advanced virtual assistants. The technology
    behind SmarterChild was a precursor to modern AI assistants like Amazon’s Alexa
    and Samsung''s S Voice.'
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 即时通讯机器人（2001年）：由ActiveBuddy, Inc.开发的SmarterChild是一个即时通讯领域的先驱聊天机器人。2001年，它在AOL即时消息和MSN消息平台等上推出，迅速获得了人气，积累了超过3000万用户。SmarterChild不仅仅是一个信息来源；它拥有独特的个性，并能与用户进行古怪、有趣的对话。它提供了来自各个领域的信息，包括新闻、天气和体育，甚至可以与用户玩简单的游戏。其发展和成功展示了AI在日常应用中的潜力，并为更高级的虚拟助手的出现奠定了基础。SmarterChild背后的技术是现代AI助手如亚马逊的Alexa和三星的S
    Voice的先驱。
- en: 'Siri and the Rise of AI Assistants (2011): In 2011, Apple introduced Siri,
    a revolutionary voice-activated AI assistant, integrated into its iPhone devices.
    Siri marked a significant step in bringing AI into the hands of the general public,
    showcasing the practicality and convenience of voice-activated AI assistants in
    personal devices. With Siri, users could perform a variety of tasks using voice
    commands, from setting reminders to searching the internet, making it a hallmark
    in the evolution of user interface technology.'
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Siri和人工智能助手的崛起（2011年）：2011年，苹果公司推出了Siri，这是一款革命性的语音激活AI助手，集成在其iPhone设备中。Siri标志着将AI带给普通公众的重要一步，展示了语音激活AI助手在个人设备中的实用性和便利性。通过Siri，用户可以使用语音命令执行各种任务，从设置提醒到搜索互联网，成为用户界面技术演变中的一个里程碑。
- en: 'IBM Watson''s Public Debut (2013): IBM Watson''s appearance on the TV quiz
    show "Jeopardy!" in 2011 (with its public deployment following in 2013) was a
    major showcase of AI''s abilities in understanding natural language and processing
    large datasets. Watson''s performance against human champions highlighted its
    advanced capabilities in areas like language processing, data analysis, and decision-making.
    This event not only captured the public''s imagination but also foreshadowed the
    future role of AI in various fields, including healthcare, finance, and customer
    service. Watson''s success demonstrated the potential of AI to handle complex,
    real-world tasks in a way that was previously thought to be the exclusive domain
    of human intelligence.'
  id: totrans-114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: IBM Watson的公开亮相（2013年）：2011年，IBM Watson在电视智力竞赛节目《危险边缘》上的亮相（其公开部署随后在2013年进行）展示了AI在理解自然语言和处理大数据集方面的能力。Watson与人类冠军的对抗凸显了它在语言处理、数据分析、决策等领域的先进能力。这一事件不仅激发了公众的想象力，也预示了AI在医疗保健、金融和客户服务等各个领域的未来作用。Watson的成功展示了AI处理复杂、现实世界任务的潜力，这在以前被认为是人类智能的专属领域。
- en: 'The Emergence of Transformer Models (2018 - 2021): The development of transformer
    models, including GPT-2, GPT-3, and DALL·E, marked a significant advancement in
    Generative AI. These models demonstrated an unprecedented ability to generate
    human-like text and creative content like images, showcasing the potential of
    AI in creative and analytical fields.'
  id: totrans-115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 变换器模型的兴起（2018 - 2021年）：包括GPT-2、GPT-3和DALL·E在内的变换器模型的发展标志着生成式AI的重大进步。这些模型展示了前所未有的能力，能够生成类似人类的文本和创意内容，如图像，展示了AI在创意和分析领域的潜力。
- en: 'The Advent of ChatGPT (December 2022): ChatGPT''s introduction was a game-changer,
    providing a versatile and powerful tool for generating text. Its ability to create,
    answer, and interact in a human-like manner showcased the practical applications
    of Generative AI. It reached in only one week a million users: the fastest growth
    ever in the whole web.'
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ChatGPT的诞生（2022年12月）：ChatGPT的推出是一场变革，为生成文本提供了一个多才多艺且强大的工具。它以类似人类的方式创造、回答和互动的能力展示了生成式AI的实际应用。它仅在一周内就达到了一百万用户：整个网络历史上增长最快的速度。
- en: 'Microsoft 365 and Copilot (2023/2024): The integration of ChatGPT with Microsoft
    365 through Copilot marked a significant milestone in bringing Generative AI into
    the business world. It illustrated the practical use of AI in enhancing productivity
    and efficiency in various office applications, from drafting emails to data analysis.'
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 微软365和Copilot（2023/2024年）：通过Copilot将ChatGPT与微软365集成是一个重要的里程碑，标志着将生成式AI带入商业世界的重大进展。它展示了AI在提高各种办公应用（从撰写电子邮件到数据分析）的生产力和效率方面的实际用途。
- en: Reflecting on the Journey
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 反思旅程
- en: The history of Generative AI is a narrative of constant innovation and growth.
    From its early days in speech recognition to the creation of multifaceted AI models
    like GPT-4, this journey demonstrates a relentless pursuit of creating machines
    that can understand, interact, and assist in human language and tasks. The integration
    of such technology into tools like Microsoft 365 signifies a new era in the workplace,
    where AI is not just an assistant but an integral part of how we work, communicate,
    and innovate.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI的历史是一个不断创新和增长的故事。从语音识别的早期到创建像GPT-4这样的多面AI模型，这一旅程展示了不懈追求创造能够理解、交互和协助人类语言和任务的机器。这种技术集成到像微软365这样的工具中标志着工作场所的新时代，在这里，AI不仅仅是助手，而是我们工作、沟通和创新的一个不可或缺的部分。
- en: As we look to the future, the possibilities of Generative AI continue to expand,
    promising even more sophisticated applications in various fields. The ongoing
    development of this technology not only enhances our current capabilities but
    also opens doors to new ways of thinking, working, and creating in an increasingly
    digital world.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 展望未来，生成式AI的可能性持续扩大，承诺在各个领域带来更加复杂的应用。这一技术的持续发展不仅增强了我们的现有能力，而且为在日益数字化的世界中以新的方式思考、工作和创造打开了大门。
- en: 'Chapter 1.3: ChatGPT: How It Works'
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1.3章：ChatGPT：它是如何工作的
- en: Delving deeper into the technical intricacies of ChatGPT, we find a complex
    and sophisticated AI model that stands as a pinnacle of current AI research and
    development. In this chapter, we will explore ChatGPT's technical workings in
    greater detail, infusing our explanation with more specific data and examples
    to provide a comprehensive understanding. In addition, we will take a closer look
    at how to write the best prompt.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 深入探讨ChatGPT的技术复杂性，我们发现这是一个复杂且精密的AI模型，代表了当前AI研究和开发的巅峰。在本章中，我们将更详细地探讨ChatGPT的技术运作，通过提供更具体的数据和例子来增强我们的解释，以提供一个全面的理解。此外，我们还将更深入地研究如何编写最佳的提示。
- en: 1\. The Foundation of Large Language Models (LLMs)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 大型语言模型（LLM）的基础
- en: 'Concept: LLMs like ChatGPT are essentially vast databases of language patterns.
    They are designed to process and generate human language by recognizing and predicting
    textual sequences.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 概念：像ChatGPT这样的LLM本质上是大型的语言模式数据库。它们被设计用来通过识别和预测文本序列来处理和生成人类语言。
- en: 'Scale: The ''large'' in LLMs isn''t an understatement. These models process
    billions of words, phrases, and sentences, learning from a dataset that is vast
    both in size and variety.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 规模：LLM中的“大”并非夸张。这些模型处理数十亿个单词、短语和句子，从规模和多样性都非常庞大的数据集中学习。
- en: 2\. Comprehensive Training Data and Advanced Tokenization
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 全面训练数据和高级分词
- en: 'Volume of Data: ChatGPT''s training involved an unprecedented 45TB of text
    data, a staggering amount equivalent to billions of pages of text, or about ten
    million Bibles.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据量：ChatGPT的训练涉及前所未有的45TB文本数据，这是一个令人震惊的数字，相当于数十亿页的文本，或者大约一千万本圣经。
- en: 'Tokenization: ChatGPT breaks down text into around 50,000 possible tokens,
    covering a wide linguistic spectrum from individual characters to whole words.
    What the chatbot does is just calculate every time the most probable token that
    follows the previously generated tokens. For example, after the tokens “I’m” and
    “going”, it is very probable that the next word of the sentence will be “to”.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标记化：ChatGPT将文本分解成大约50,000个可能的标记，覆盖从单个字符到整个单词的广泛语言范围。聊天机器人所做的只是计算每次在先前生成的标记之后最可能的标记。例如，在“我正在”和“去”的标记之后，句子接下来的单词将是“去”的可能性非常高。
- en: '3\. The Neural Network Core: Transformer Model'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 神经网络核心：Transformer模型
- en: 'Structure: The transformer model, the bedrock of ChatGPT, consists of multiple
    layers (each with several ''neurons''), allowing for complex pattern recognition
    and generation.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结构：ChatGPT的基础是Transformer模型，由多层（每层有多个“神经元”）组成，允许进行复杂的模式识别和生成。
- en: 'Functionality: It uses ''attention mechanisms'' to weigh the importance of
    different parts of the input text, enabling it to grasp context and nuances more
    effectively.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 功能：它使用“注意力机制”来权衡输入文本不同部分的重要性，使其能够更有效地把握语境和细微差别。
- en: 4\. Rigorous Training Process
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 严格的训练过程
- en: 'Pre-Training Details: This stage involves processing vast amounts of text to
    learn general language patterns. OpenAI has disclosed that ChatGPT was trained
    using a diverse range of internet text.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预训练细节：这一阶段涉及处理大量文本以学习通用语言模式。OpenAI已披露ChatGPT是使用各种互联网文本进行训练的。
- en: 'Fine-Tuning: ChatGPT was fine-tuned on a curated dataset, including a mix of
    general and specific conversational texts, to enhance its dialogue capabilities.'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微调：ChatGPT在精心挑选的数据集上进行微调，包括一般和特定对话文本的混合，以增强其对话能力。
- en: 5\. Reinforcement Learning from Human Feedback (RLHF)
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 5. 从人类反馈中进行强化学习（RLHF）
- en: 'Process: Human trainers interacted with the model, providing ratings and feedback
    on its outputs. This feedback was used to adjust the model''s responses to be
    more aligned with human expectations.'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 流程：人类训练师与模型互动，对其输出提供评分和反馈。这些反馈被用来调整模型的响应，使其更符合人类的期望。
- en: 'Impact: This method significantly reduced inappropriate or irrelevant responses,
    making the model more reliable in real-world interactions.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 影响：这种方法显著减少了不适当或不相关的响应，使模型在现实世界的交互中更加可靠。
- en: 6\. Generative Capabilities and Contextual Mastery
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 6. 生成能力和上下文掌握
- en: 'Output Diversity: ChatGPT can generate a wide range of content, from technical
    explanations to creative writing, showcasing its flexibility.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出多样性：ChatGPT可以生成各种内容，从技术解释到创意写作，展示了其灵活性。
- en: 'Contextual Understanding: It can maintain context over extended conversations,
    a capability attributed to its ability to process, in the basic version, up to
    4,096 tokens in a single prompt.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文理解：它可以在长时间的对话中维持上下文，这一能力归因于其基本版本中能够在一个提示中处理多达4,096个标记的能力。
- en: 7\. Addressing Limitations and Ethical Use
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 7. 解决局限性和道德使用
- en: 'Bias in AI: Despite extensive training, ChatGPT can still exhibit biases present
    in its training data, a reflection of the broader internet corpus it was trained
    on.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能中的偏见：尽管经过广泛的训练，ChatGPT仍然可能表现出其训练数据中存在的偏见，这是其训练所基于的更广泛的互联网语料库的反映。
- en: 'Ethical Guardrails: OpenAI has implemented measures to minimize harmful outputs,
    including filters for sensitive topics and guidelines for responsible use.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 道德限制：OpenAI已实施措施以最大限度地减少有害输出，包括敏感主题的过滤器以及负责任使用的指南。
- en: 'Chapter 1.4: How To Write The Best Prompt'
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一章第4节：如何编写最佳提示
- en: Creating the best prompt for ChatGPT involves understanding how to communicate
    your needs clearly and effectively. A prompt is essentially a request or instruction
    you give to ChatGPT to generate a specific type of response. The quality and clarity
    of your prompt directly influence the relevance and usefulness of ChatGPT's responses.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 为ChatGPT创建最佳提示涉及理解如何清晰有效地传达你的需求。提示基本上是你给ChatGPT的请求或指令，以生成特定类型的响应。你提示的质量和清晰度直接影响ChatGPT响应的相关性和实用性。
- en: 'The so-called prompt engineering aims to craft the most optimized and effective
    requests: for this reason, a whole market has been developed to buy and sell packages
    of pre-built prompts to copy and paste. You find more than 150 of them in your
    free bonus, that you can download [here](https://2ly.link/1w41u) or from the QR
    code at the beginning of the book.'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 所说的提示工程旨在制定最优化和有效的请求：因此，一个整个市场已经发展起来，买卖预构建提示的包以复制粘贴。你可以在免费赠品中找到150多个，你可以从这里[下载](https://2ly.link/1w41u)或从书的开始部分的二维码中获取。
- en: Now we'll explore various strategies and tips to master the art of prompt generation.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将探讨各种策略和技巧来掌握提示生成艺术。
- en: Understanding ChatGPT's Capabilities
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 理解ChatGPT的能力
- en: Before diving into prompt crafting, it's important to recognize what ChatGPT
    is and its capabilities. As a sophisticated language model developed by OpenAI,
    ChatGPT is designed to understand and generate human-like text. It can perform
    a wide range of tasks, from answering questions and offering explanations to creating
    content and assisting with problem-solving.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入提示制作之前，重要的是要认识到ChatGPT是什么以及它的能力。作为一个由OpenAI开发的复杂语言模型，ChatGPT旨在理解和生成类似人类的文本。它可以执行广泛的任务，从回答问题和提供解释到创建内容和协助解决问题。
- en: The Essentials of a Good Prompt
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 好提示的基本要素
- en: 'Clarity: Your prompt should be direct and easy to understand. This means using
    straightforward language that clearly conveys what you want.'
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 清晰性：你的提示应该是直接且易于理解的。这意味着使用直接的语言，清楚地传达你想要什么。
- en: 'Example: Instead of saying, "I need something for tomorrow," specify, "I need
    a summary of the latest project report by 9 AM tomorrow."'
  id: totrans-152
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 示例：与其说“我需要明天的东西”，不如具体地说，“我需要在明天上午9点前提供最新项目报告的摘要。”
- en: 'Specificity: Detail exactly what you require. Vague instructions can lead to
    broad answers that might not meet your needs. Precise details result in responses
    that are more aligned with your expectations.'
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 明确性：详细说明你需要什么。含糊的指示可能导致广泛的答案，可能不符合你的需求。精确的细节会导致更符合你预期的回答。
- en: 'Example: Rather than asking, "Can you provide some information on marketing
    strategies?" ask, "Can you provide a detailed comparison of digital versus traditional
    marketing strategies for retail businesses?"'
  id: totrans-154
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 示例：与其问“你能提供一些关于营销策略的信息吗？”不如问“你能提供关于零售业务数字营销与传统营销策略的详细比较吗？”
- en: 'Context: Including background information or the scenario you are dealing with
    helps the AI to understand the setting and nuances of your request better.'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文：包括背景信息或你正在处理的场景可以帮助AI更好地理解你的请求的设置和细微差别。
- en: 'Example: If you''re asking for help with a presentation, instead of simply
    saying, "I need help with my presentation," add, "I need help with my presentation
    on renewable energy trends, focusing on solar power advancements over the last
    five years."'
  id: totrans-156
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 示例：如果你需要关于演示文稿的帮助，不要只是简单地说“我需要帮助我的演示文稿”，而是添加“我需要帮助我的关于可再生能源趋势的演示文稿，重点关注过去五年太阳能技术的进步。”
- en: 'Purpose: Make it clear why you are making the request. Understanding the intended
    use of the response allows the AI to tailor its output accordingly.'
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 目的：清楚地说明你为什么提出请求。了解响应的预期用途，使AI能够相应地调整其输出。
- en: 'Example: Instead of saying, "Write me a document," be specific with, "Write
    me an instructional document on how to use ChatGPT in Microsoft Excel for data
    analysis."'
  id: totrans-158
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 示例：与其说“给我写一份文档”，不如具体地说，“给我写一份关于如何在Microsoft Excel中使用ChatGPT进行数据分析的指导性文档。”
- en: Step-by-Step Guide to Crafting Prompts
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 提示制作步骤指南
- en: 'Identify Your Objective: Start by determining what you want to achieve with
    ChatGPT. Are you looking for information, creating content, or seeking help with
    a task?'
  id: totrans-160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定你的目标：首先确定你想要通过ChatGPT实现什么。你是想获取信息、创建内容还是寻求任务帮助？
- en: 'Formulate Your Request: Translate your objective into a clear and concise request.
    Use simple, direct language.'
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 构建你的请求：将你的目标翻译成一个清晰简洁的请求。使用简单直接的语言。
- en: 'Provide Necessary Details: Include any specific details that can help ChatGPT
    understand and respond accurately. This could be the topic, tone, format, or any
    other relevant information.'
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供必要细节：包括任何可以帮助ChatGPT理解和准确响应的具体细节。这可能包括主题、语气、格式或任何其他相关信息。
- en: 'Consider Adding Examples: If you have a specific style or format in mind, provide
    an example. This could be a sample sentence, a structure outline, or a reference
    link.'
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 考虑添加示例：如果你有特定的风格或格式在心中，提供示例。这可能是一个样本句子、结构大纲或参考链接。
- en: 'Review and Refine: Before submitting your prompt, review it to ensure it''s
    clear and contains all the necessary information. Make any necessary adjustments.'
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 审查和改进：在提交你的提示之前，审查它以确保它清晰并包含所有必要的信息。进行任何必要的调整。
- en: 'Experiment: if you don’t get the answer that you expected, try to add sentences
    to correct the mistake of ChatGPT, making some attempts.'
  id: totrans-165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实验：如果你没有得到预期的答案，尝试添加句子来纠正ChatGPT的错误，做一些尝试。
- en: Examples of Effective Prompts
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 有效的提示示例
- en: 'Informational Prompt: "Explain the process of photosynthesis in simple terms
    for a middle school science class."'
  id: totrans-167
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信息性提示：“用简单的话解释光合作用的过程，适用于中学科学课。”
- en: 'Content Creation Prompt: "Write a blog post about the benefits of meditation,
    targeting beginners. Please keep the tone friendly and encouraging."'
  id: totrans-168
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 内容创作提示：“写一篇关于冥想益处的博客文章，针对初学者。请保持语气友好和鼓励。”
- en: 'Problem-Solving Prompt: "I am trying to fix a bug in my Python code where the
    loop does not terminate. Here''s the code snippet. Can you suggest a fix?"'
  id: totrans-169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 问题解决提示：“我正在尝试修复我的Python代码中的一个bug，其中循环不会终止。这是代码片段。你能提出一个修复方案吗？”
- en: 'Creative Writing Prompt: "Create a short story about a time-traveling historian.
    The story should be humorous and set in ancient Rome."'
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创意写作提示：“写一个关于时间旅行历史学家的短篇故事。故事应该幽默，并设定在古罗马。”
- en: 'Act as…: “Act as a physics professor, you will generate a customized output
    based on my request. Think about the impact in a larger context and from different
    perspectives. My first request is to solve a physics problem about thermodynamics:
    ...”'
  id: totrans-171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 扮演…：“扮演一位物理教授，根据我的要求生成一个定制的输出。从更大的背景和不同的角度思考影响。我的第一个请求是解决一个关于热力学的物理问题：……”
- en: 'Avoiding Common Pitfalls: What Not to Do When Crafting Prompts'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 避免常见陷阱：在制作提示时不要做的事情
- en: 'While understanding what makes a good prompt is essential, it''s equally important
    to be aware of what to avoid. Here are some common pitfalls and what not to do
    when crafting prompts for ChatGPT:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然理解什么是一个好的提示很重要，但同样重要的是要意识到应该避免什么。以下是一些常见的陷阱以及制作ChatGPT提示时不要做的事情：
- en: 'Being Too Vague:'
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过于模糊：
- en: 'Poor Example: "Tell me about animals."'
  id: totrans-175
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 差劲的例子：“告诉我关于动物的事情。”
- en: 'Better: "Provide a detailed overview of the dietary habits of African elephants."'
  id: totrans-176
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好：“提供非洲象饮食习惯的详细概述。”
- en: 'Explanation: The poor example is too broad, leading to a generic response.
    The better example is specific, guiding ChatGPT to a focused answer.'
  id: totrans-177
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 说明：差劲的例子过于宽泛，导致泛泛的回答。更好的例子是具体的，引导ChatGPT给出专注的回答。
- en: 'Overloading with Information:'
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信息过载：
- en: 'Poor Example: "Write a story about a wizard, set in medieval Europe, involving
    a dragon, a lost princess, three villages, a magic spell, and a prophecy."'
  id: totrans-179
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 差劲的例子：“写一个关于巫师的故事，设定在中世纪欧洲，涉及龙、失踪的公主、三个村庄、一个魔法咒语和一个预言。”
- en: 'Better: "Write a short story about a wizard and a dragon in medieval Europe."'
  id: totrans-180
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好：“写一篇关于中世纪欧洲的巫师和龙的故事。”
- en: 'Explanation: The poor example is overloaded with elements, making it challenging
    to create a coherent story. The better example is detailed yet manageable.'
  id: totrans-181
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 说明：差劲的例子包含过多元素，难以构建连贯的故事。更好的例子详细但易于管理。
- en: 'Ignoring Context:'
  id: totrans-182
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略上下文：
- en: 'Poor Example: "How should we proceed with the project?"'
  id: totrans-183
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 差劲的例子：“我们如何进行这个项目？”
- en: 'Better: "Considering the delay in our last shipment, how should we adjust our
    project timeline?"'
  id: totrans-184
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好：“考虑到我们上次发货的延误，我们应该如何调整我们的项目时间表？”
- en: 'Explanation: The poor example lacks specific context. The better example provides
    a clear context related to a delay in shipment.'
  id: totrans-185
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 说明：差劲的例子缺乏具体上下文。更好的例子提供了与发货延误相关的清晰上下文。
- en: 'Inconsistent or Conflicting Instructions:'
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不一致或冲突的指令：
- en: 'Poor Example: "Create a vegetarian recipe that includes chicken."'
  id: totrans-187
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 差劲的例子：“创建一个包含鸡肉的素食食谱。”
- en: 'Better: "Create a vegetarian recipe that uses tofu as a protein source."'
  id: totrans-188
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好：“创建一个以豆腐作为蛋白质来源的素食食谱。”
- en: 'Explanation: The poor example contains a contradiction. The better example
    is consistent and clear.'
  id: totrans-189
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 说明：差劲的例子中存在矛盾。更好的例子是一致的且清晰的。
- en: 'Using Complex or Technical Jargon Unnecessarily:'
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不必要地使用复杂或技术性术语：
- en: 'Poor Example: "Explain the process of photolithographic etching in semiconductor
    fabrication."'
  id: totrans-191
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 差劲的例子：“解释半导体制造中光刻蚀的过程。”
- en: 'Better: "Explain how computer chips are made in simple terms."'
  id: totrans-192
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好：“用简单的话解释计算机芯片是如何制造的。”
- en: 'Explanation: The poor example uses technical terms that may not be necessary
    for a general audience. The better example simplifies the language.'
  id: totrans-193
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释：不良例子使用了可能对一般受众不必要的术语。更好的例子简化了语言。
- en: 'Setting Unrealistic Expectations:'
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设定不切实际的期望：
- en: 'Poor Example: "Predict the stock market prices for next week."'
  id: totrans-195
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子不佳："预测下周的股市价格。"
- en: 'Better: "Explain the factors that can affect stock market prices."'
  id: totrans-196
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好的例子："解释可能影响股市价格的因素。"
- en: 'Explanation: The poor example asks for an impossible task. The better example
    requests information within ChatGPT''s capabilities.'
  id: totrans-197
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释：不良例子要求一个不可能的任务。更好的例子请求的是ChatGPT能力范围内的信息。
- en: 'Neglecting to Specify the Desired Format or Style:'
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 漏掉指定所需的格式或风格：
- en: 'Poor Example: "Write about climate change."'
  id: totrans-199
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子不佳："写关于气候变化的文章。"
- en: 'Better: "Write a poem about the effects of climate change."'
  id: totrans-200
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好的例子："写一首关于气候变化影响的诗。"
- en: 'Explanation: The poor example is open-ended. The better example specifies the
    desired format, a poem.'
  id: totrans-201
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释：不良例子是开放式的。更好的例子指定了所需的格式，即诗歌。
- en: 'Ignoring the Follow-Up Process:'
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽略后续过程：
- en: 'Poor Example: "Why isn''t my response correct?"'
  id: totrans-203
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子不佳："我的回应为什么是错误的？"
- en: 'Better: "Based on your previous explanation of photosynthesis, can you clarify
    how sunlight affects the process?"'
  id: totrans-204
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好的例子："基于你之前对光合作用的解释，你能澄清阳光如何影响这个过程吗？"
- en: 'Explanation: The poor example is vague. The better example references a previous
    response for a specific clarification.'
  id: totrans-205
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释：不良例子是模糊的。更好的例子引用了之前的回应以进行具体的澄清。
- en: 'Assuming Prior Knowledge:'
  id: totrans-206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 假设先验知识：
- en: 'Poor Example: "Continue discussing the marketing strategies we talked about."'
  id: totrans-207
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子不佳："继续讨论我们之前讨论过的营销策略。"
- en: 'Better: "What are some effective marketing strategies for a new online business?"'
  id: totrans-208
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好的例子："有哪些有效的营销策略适用于新在线业务？"
- en: 'Explanation: The poor example wrongly assumes ChatGPT remembers past conversations.
    The better example is self-contained.'
  id: totrans-209
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释：不良例子错误地假设ChatGPT记得过去的对话。更好的例子是自包含的。
- en: 'Disregarding Ethical Boundaries:'
  id: totrans-210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 忽视道德界限：
- en: 'Poor Example: "Write a guide on hacking into secure networks."'
  id: totrans-211
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 例子不佳："编写关于黑客攻击安全网络的指南。"
- en: 'Better: "Discuss the importance of cybersecurity in protecting networks."'
  id: totrans-212
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好的例子："讨论网络安全在保护网络中的重要性。"
- en: 'Explanation: The poor example requests unethical content. The better example
    adheres to ethical guidelines while being informative.'
  id: totrans-213
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释：不良例子请求不道德的内容。更好的例子遵守了道德准则同时提供信息。
- en: Conclusion
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Crafting the best prompt for ChatGPT is an essential skill for maximizing the
    benefits of this powerful AI tool. By following the guidelines outlined in this
    chapter, users can effectively communicate their needs and receive responses that
    are more aligned with their expectations. Remember, practice and patience are
    key to mastering the art of prompt generation. As you become more familiar with
    ChatGPT's capabilities and nuances, you'll find it easier to create prompts that
    yield the most useful and relevant responses. Additionally, to further enhance
    your skills and provide you with more opportunities for practice, make sure to
    explore the 150 downloadable bonus prompts. They are designed to cover a wide
    range of scenarios and topics, offering you ample material to refine your prompt-crafting
    abilities and explore the vast possibilities of ChatGPT.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 为ChatGPT制作最佳提示是一个关键技能，对于最大化这个强大AI工具的益处至关重要。通过遵循本章中概述的指南，用户可以有效地传达他们的需求，并获得更符合他们期望的回应。记住，练习和耐心是掌握提示生成艺术的要点。随着你对ChatGPT的功能和细微差别越来越熟悉，你会发现创建能够产生最有用和最相关回应的提示变得更加容易。此外，为了进一步提高你的技能并为你提供更多练习的机会，请确保探索150个可下载的额外提示。它们设计用于涵盖广泛的情况和主题，为你提供了丰富的材料来磨练你的提示制作能力，并探索ChatGPT的无限可能性。
- en: 'Chapter 1.5: Where to Use ChatGPT and Where Not'
  id: totrans-216
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1.5章：ChatGPT的适用范围与不适用范围
- en: Introduction
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: ChatGPT, with its advanced AI capabilities, offers a wide range of applications
    in various fields and scenarios. However, understanding where it excels and where
    its use is inappropriate or less effective is crucial for users. This chapter
    aims to provide a comprehensive guide on the optimal use cases for ChatGPT and
    scenarios where it should not be used.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT凭借其先进的AI能力，在各个领域和场景中提供了广泛的应用。然而，了解它在哪些方面表现卓越，以及它在哪些情况下使用不适当或效果不佳，对于用户来说至关重要。本章旨在提供关于ChatGPT最佳用例和不应使用的场景的全面指南。
- en: Ideal Use Cases for ChatGPT
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的理想用例
- en: 'Content Creation: ChatGPT shines in generating creative and structured content.
    This includes writing articles, blogs, stories, poems, and even generating ideas
    for content.'
  id: totrans-220
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 内容创作：ChatGPT在生成创意和结构化内容方面表现出色。这包括撰写文章、博客、故事、诗歌，甚至生成内容创意。
- en: 'Educational Assistance: It serves as an excellent tool for learning and teaching,
    providing explanations, summaries, and answers to a wide range of topics.'
  id: totrans-221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 教育辅助：它是一个出色的学习和教学工具，提供解释、总结和广泛主题的答案。
- en: 'Programming Help: ChatGPT can assist in coding by offering bug fixes, code
    suggestions, explanations, and even writing small scripts. The GPT-4 version can
    also create small programs like Tetris, after a few attempts.'
  id: totrans-222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编程帮助：ChatGPT可以通过提供错误修复、代码建议、解释甚至编写小型脚本来协助编程。GPT-4版本还可以在几次尝试后创建像俄罗斯方块这样的小型程序。
- en: 'Data Analysis: For simple data analysis, ChatGPT can assist in interpreting
    data sets, explaining statistical concepts, and suggesting analysis techniques.'
  id: totrans-223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据分析：对于简单的数据分析，ChatGPT可以帮助解释数据集、解释统计概念和提出分析技术。
- en: 'Language Translation and Learning: It can be used for language translation
    and as a tool for learning new languages, providing practice conversations, and
    explaining grammar and vocabulary. It can almost substitute a teacher, being very
    effective in making you understand any aspect of the language, but also abbreviations
    and slang. Small tip: when translating, don’t ask to translate, but to rewrite.
    It will be less literal and follow more context, being as effective as Google
    Translate or DeepL.com.'
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 语言翻译与学习：它可以用于语言翻译，作为学习新语言的工具，提供练习对话，并解释语法和词汇。它几乎可以替代教师，在帮助你理解语言的任何方面都非常有效，包括缩写和俚语。小贴士：在翻译时，不要请求翻译，而是要求改写。这样会更少地直译，更多地遵循上下文，效果与Google
    Translate或DeepL.com相当。
- en: 'Customer Support: ChatGPT can function as a first-level customer support agent,
    providing answers to common queries and guiding users. It is being implemented
    in big companies to partially substitute call centers.'
  id: totrans-225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户服务：ChatGPT可以作为一级客户服务代表，提供常见问题的答案并指导用户。它正在大公司中得到应用，部分替代呼叫中心。
- en: 'Personal Assistant Tasks: Setting reminders, drafting emails, planning schedules,
    and other administrative tasks can be efficiently handled by ChatGPT.'
  id: totrans-226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 个人助理任务：设置提醒、起草电子邮件、规划日程和其他行政任务可以由ChatGPT高效处理。
- en: 'Brainstorming and Idea Generation: In creative processes, ChatGPT can be used
    for brainstorming sessions, generating ideas, and providing inspiration.'
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 思维风暴与创意生成：在创意过程中，ChatGPT可用于思维风暴会议、生成想法和提供灵感。
- en: 'Entertainment and Engagement: ChatGPT can be used to create interactive stories,
    games, quizzes, and other engaging activities.'
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 娱乐与互动：ChatGPT可用于创建互动故事、游戏、测验和其他吸引人的活动。
- en: Where Not to Use ChatGPT
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT不宜使用的场合
- en: 'Handling Sensitive Information: ChatGPT should not be used for processing or
    storing sensitive personal or financial information due to privacy concerns.'
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 处理敏感信息：由于隐私问题，ChatGPT不应用于处理或存储敏感的个人或财务信息。
- en: 'Look for factual information: Don’t use the chatbot to look for factual information,
    just search on Google. Unless it is connected to the internet (with Bing, Microsoft’s
    search engine) ChatGPT often invents what it does not know and has no knowledge
    after 2021.'
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 寻找事实信息：不要使用聊天机器人查找事实信息，只需在Google上搜索即可。除非它连接到互联网（通过Bing，微软的搜索引擎），否则ChatGPT经常编造它不知道的内容，并且在2021年之后就没有知识了。
- en: 'Making Legal or Medical Decisions: It''s not advisable to rely on ChatGPT for
    legal advice, medical diagnosis, or treatment recommendations due to its limitations
    in these specialized fields.'
  id: totrans-232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 制定法律或医疗决策：由于其在这些专业领域的局限性，不建议依赖ChatGPT提供法律建议、医疗诊断或治疗建议。
- en: 'Real-time Data and Updates: ChatGPT is not capable of providing real-time updates
    or accessing current data, so it''s not suitable for tasks that require up-to-the-minute
    information.'
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实时数据和更新：ChatGPT无法提供实时更新或访问当前数据，因此不适合需要最新信息的任务。
- en: 'Complex Business Decisions: High-level business analysis and decisions that
    require in-depth industry knowledge and current market data are beyond the scope
    of ChatGPT.'
  id: totrans-234
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 复杂商业决策：需要深入行业知识和当前市场数据的高级商业分析和决策超出了ChatGPT的范围。
- en: 'Technical Tasks Requiring Precision: Tasks that require high precision and
    technical expertise, such as advanced scientific research, engineering design,
    or complex financial modeling, should not be entrusted to ChatGPT.'
  id: totrans-235
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 需要精确性的技术任务：对于需要高精度和技术专长的任务，如高级科学研究、工程设计或复杂的金融建模，不应将它们委托给 ChatGPT。
- en: 'Counselling and Therapy: While ChatGPT can offer general advice, it''s not
    equipped to provide professional counseling, therapy, or mental health services.'
  id: totrans-236
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 咨询和治疗：虽然 ChatGPT 可以提供一般建议，但它没有提供专业咨询、治疗或心理健康服务的设备。
- en: 'Security and Surveillance: Using ChatGPT for security analysis, surveillance,
    or other tasks that require real-time threat assessment is not recommended.'
  id: totrans-237
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安全和监控：不建议使用 ChatGPT 进行安全分析、监控或其他需要实时威胁评估的任务。
- en: 'Critical Writing: For critical or highly technical writing, like legal documents,
    academic research papers, or detailed technical manuals, reliance on ChatGPT is
    not advisable.'
  id: totrans-238
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批判性写作：对于批判性或高度技术性的写作，如法律文件、学术研究论文或详细的技术手册，依赖 ChatGPT 并不适宜。
- en: 'Automated Decision-Making: Making automated decisions, especially in legal,
    financial, or safety-critical areas based on ChatGPT''s output, is risky and not
    recommended. It always needs a human check.'
  id: totrans-239
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动决策：基于 ChatGPT 的输出在法律、金融或安全关键领域做出自动决策是危险的，也不建议这样做。它始终需要人工检查。
- en: Conclusion
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: ChatGPT is a powerful tool with a broad range of applications, but it's important
    to recognize its limitations and areas where its use is inappropriate. By understanding
    where ChatGPT can be beneficial and where it should not be deployed, users can
    make the most of its capabilities while avoiding potential pitfalls and misapplications.
    As AI technology continues to evolve, the scope of ChatGPT's applications will
    likely expand, but a careful and informed approach to its use will always be essential.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 是一款功能强大的工具，应用范围广泛，但重要的是要认识到它的局限性以及其使用不当的领域。通过了解 ChatGPT 可以发挥作用的领域以及不应部署的领域，用户可以在充分利用其功能的同时，避免潜在的风险和误用。随着人工智能技术的不断发展，ChatGPT
    的应用范围可能会扩大，但对其使用的谨慎和明智的方法始终是必要的。
- en: 'Chapter 1.6: DALL-E: Generating Pictures from Text'
  id: totrans-242
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 1.6 章：DALL-E：从文本生成图片
- en: In this chapter, we delve into the fascinating world of DALL-E, an artificial
    intelligence system developed by OpenAI. This system represents a significant
    leap in AI capabilities, allowing it to generate realistic images based on textual
    descriptions. Whether it's something as whimsical as "a cat wearing a hat" or
    as artistic as "a painting of a landscape in the style of Van Gogh," DALL-E brings
    these descriptions to life in visual form.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们深入探讨由 OpenAI 开发的 DALL-E 的人工智能系统，这是一个迷人的世界。这个系统代表了人工智能能力的重大飞跃，它可以根据文本描述生成逼真的图像。无论是像“一只戴着帽子的猫”这样古怪的东西，还是像“梵高的风景画风格”这样艺术的东西，DALL-E
    都能将这些描述以视觉形式呈现出来。
- en: How DALL-E Works
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 的工作原理
- en: At the heart of DALL-E lies GPT-3, a large-scale neural network model trained
    on extensive text data from the internet. GPT-3 is adept at producing coherent
    and diverse texts and handling tasks from answering questions to composing emails.
    This ability forms the foundation for DALL-E's text-to-image synthesis.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 的核心是 GPT-3，这是一个在互联网上广泛使用的文本数据上训练的大型神经网络模型。GPT-3 擅长产生连贯和多样化的文本，并处理从回答问题到撰写电子邮件的各种任务。这种能力是
    DALL-E 文本到图像合成的基石。
- en: In text-to-image synthesis, DALL-E encodes text inputs into a latent space.
    This latent space is a complex, high-dimensional representation capturing the
    core features and semantics of the input. From here, DALL-E's decoder, a generative
    model, takes over, transforming this latent representation into detailed, realistic
    images.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 在文本到图像合成中，DALL-E 将文本输入编码到潜在空间中。这个潜在空间是一个复杂的高维表示，它捕捉了输入的核心特征和语义。从这里，DALL-E 的解码器，一个生成模型，接管了这一潜在表示，将其转化为详细、逼真的图像。
- en: DALL-E's capabilities extend to handling complex and imaginative prompts. It
    can merge various objects, attributes, and styles to create images that are both
    novel and surreal. For instance, it can generate images such as "an armchair in
    the shape of an avocado" or "a snail made of harp." What's more, DALL-E can produce
    multiple images for the same prompt, showcasing different interpretations and
    variations.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 的功能扩展到处理复杂和富有想象力的提示。它可以将各种物体、属性和风格合并，创造出既新颖又超现实的图像。例如，它可以生成像“一个形状像鳄梨的扶手椅”或“由竖琴制成的蜗牛”这样的图像。更重要的是，DALL-E
    可以针对同一提示生成多个图像，展示不同的解释和变体。
- en: The Evolution of DALL-E
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E的演变
- en: DALL-E's journey began with its first iteration, DALL-E 2, announced in January
    2021\. This version already displayed an impressive array of capabilities, as
    evidenced by a variety of creative images it produced. Named after the famous
    surrealist artist Salvador Dali and the beloved Pixar character WALL-E, DALL-E
    2 reflected a blend of creativity and whimsy.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E的旅程始于其第一个迭代版本DALL-E 2，该版本于2021年1月宣布。这个版本已经展示了令人印象深刻的功能，正如它产生的各种创意图像所证明的那样。以著名的超现实主义艺术家萨尔瓦多·达利和深受喜爱的皮克斯角色WALL-E的名字命名，DALL-E
    2反映了创造力和异想天开的结合。
- en: This iteration built upon previous works in text-to-image synthesis, such as
    AttnGAN, StackGAN, and Taming Transformers. These works laid the groundwork, exploring
    various architectures and datasets to generate images from texts. DALL-E 2 demonstrated
    that a robust language model like GPT-3 could be adapted not just for text but
    also for generating images from natural language inputs. This was a significant
    advancement in AI image generation, showing the adaptability and range of a single
    model without needing specific tuning or domain knowledge.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 本次迭代建立在之前的文本到图像合成工作之上，如AttnGAN、StackGAN和Taming Transformers。这些工作奠定了基础，探索了各种架构和数据集，以从文本生成图像。DALL-E
    2证明了像GPT-3这样的强大语言模型不仅可以用于文本，还可以从自然语言输入生成图像。这是AI图像生成的一项重大进步，展示了单个模型的可适应性和范围，而无需特定的调整或领域知识。
- en: As of October 2023, the newest version, DALL-E 3, became publicly available.
    This version further refines the technology, offering even more powerful and accurate
    text-to-image generation capabilities, accessible to everyone. Right now, DALL-E
    3 is the best one for generating images. Also worth mentioning is Sora, a very
    advanced AI model presented by OpenAI on February 15th and soon to be released
    to the public. It is able to generate surprisingly complex videos, but there is
    still a lot to improve.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 截至2023年10月，最新版本DALL-E 3已公开发布。这一版本进一步提升了技术，提供了更加强大和精确的文本到图像生成能力，让每个人都能使用。目前，DALL-E
    3是生成图像的最佳选择。值得一提的是，OpenAI于2月15日推出的一个非常先进的AI模型Sora，也即将向公众发布。它能够生成令人惊讶的复杂视频，但仍有许多需要改进的地方。
- en: Comparing DALL-E with Other AI Image Generators
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 比较DALL-E与其他AI图像生成器
- en: The emergence of DALL-E sparked a wave of innovation in AI image generation.
    Various alternatives have since surfaced, each offering unique features and user
    experiences. Some of these, like Bing Image Creator and Craiyon, are powered by
    DALL-E's technology. Others, such as Midjourney, Wombo Dream, and Adobe Firefly,
    use different models or techniques. While these alternatives provide their own
    sets of advantages like the possibility to fill or expand the picture, they are
    generally not free and often don't match the capabilities of DALL-E 3.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E的出现引发了AI图像生成领域的一股创新浪潮。此后，出现了各种替代方案，每个都提供了独特的功能和用户体验。其中一些，如Bing Image Creator和Craiyon，由DALL-E的技术驱动。其他，如Midjourney、Wombo
    Dream和Adobe Firefly，使用不同的模型或技术。虽然这些替代方案提供了自己的优势，如填充或扩展图片的可能性，但它们通常不是免费的，并且通常无法与DALL-E
    3的能力相匹配。
- en: Availability of DALL-E
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E的可用性
- en: DALL-E 3 is currently available for free through Bing Image Creator (Also called
    “Microsoft Designer”) and in ChatGPT Plus. In the last version, ChatGPT itself
    crafts the prompts, leading to richer and more nuanced images (see pictures below).
    In addition, it can also choose horizontal and vertical aspect ratio. Meanwhile,
    DALL-E 2 remains accessible under labs.openai.com, though it is not free. This
    earlier version is less powerful but offers unique features like the ability to
    expand images (typically generated in a 1024x1024 format) and to fill erased parts
    of images.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: DALL-E 3目前可以通过Bing Image Creator（也称为“Microsoft Designer”）和ChatGPT Plus免费使用。在上一个版本中，ChatGPT本身制作了提示，从而产生了更加丰富和细腻的图像（见下文图片）。此外，它还可以选择横竖画幅比例。同时，DALL-E
    2仍然可以在labs.openai.com上使用，尽管它不是免费的。这个早期版本功能较弱，但提供了独特的功能，例如扩展图像（通常以1024x1024的格式生成）和填充图像中被擦除的部分。
- en: In conclusion, DALL-E represents a groundbreaking advancement in the realm of
    AI, bridging the gap between textual imagination and visual representation. Its
    evolving capabilities continue to push the boundaries of what artificial intelligence
    can achieve in the creative domain.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，DALL-E代表了AI领域的一项突破性进展，弥合了文本想象与视觉表现之间的差距。其不断发展的能力继续推动人工智能在创意领域的边界。
- en: '![](image_rsrc1N2.jpg)![](image_rsrc1N3.jpg)'
  id: totrans-257
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc1N2.jpg)![](image_rsrc1N3.jpg)'
- en: 'In the example above, I asked both Bing Image Creator (n.1) and GPT-4 in ChatGPT
    Plus (n.2) to generate “Early sketches of a Ferrari by Leonardo Da Vinci”. The
    result is in both cases remarkable, but the second one is far more accurate, although
    the model is always DALL-E 3: ChatGPT wrote a more specific and detailed prompt
    before asking DALL-E to generate the picture, specifying the style, accurately
    describing the drawn objects, and reporting all the features.'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述示例中，我要求Bing Image Creator（n.1）和ChatGPT Plus中的GPT-4（n.2）生成“莱昂纳多·达·芬奇早期的法拉利草图”。两种情况下结果都令人瞩目，但第二种更为准确，尽管模型始终是DALL-E
    3：ChatGPT在要求DALL-E生成图片之前，写了一个更具体、更详细的提示，指定了风格，准确描述了绘制的物体，并报告了所有特征。
- en: Microsoft Word and ChatGPT Integration
  id: totrans-259
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 微软Word与ChatGPT集成
- en: In today's fast-paced digital environment, the integration of artificial intelligence
    (AI) into everyday office applications is not just a luxury, but a necessity for
    enhancing productivity and creativity. With 750 million monthly active users,
    Microsoft Word, a cornerstone in the Microsoft Office suite, is the go-to software
    for document creation and editing. With the integration of ChatGPT, Microsoft
    Word transcends its traditional boundaries, offering unprecedented capabilities
    in content creation, editing, and management.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今快节奏的数字环境中，人工智能（AI）在日常办公应用中的集成不仅仅是一种奢侈，更是提高生产力和创造力的必要手段。拥有7.5亿月活跃用户，微软Word作为微软Office套件的核心组成部分，是文档创建和编辑的首选软件。随着ChatGPT的集成，微软Word超越了其传统边界，在内容创作、编辑和管理方面提供了前所未有的能力。
- en: ChatGPT, with its advanced natural language understanding and generation abilities,
    brings a new level of efficiency and innovation to Microsoft Word. This integration
    is a game-changer for users ranging from professionals drafting reports to students
    preparing research papers. ChatGPT in Microsoft Word helps in crafting detailed
    documents, refining existing content, and even summarizing complex material, hundreds
    of pages, all with a simplicity that belies the sophisticated technology under
    the hood.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT凭借其先进的自然语言理解和生成能力，为微软Word带来了新的效率和创新能力。这种集成对于从撰写报告的专业人士到准备研究论文的学生等各个用户群体来说都是一场变革。在微软Word中，ChatGPT有助于制作详细的文档、完善现有内容，甚至总结数百页的复杂材料，其简单性掩盖了背后复杂的科技。
- en: Between ChatGPT Plus and Copilot Pro, the pricing and functionality are tailored
    to ensure there's an option that closely aligns with the needs and budgets of
    different users, without a clear winner in all aspects. ChatGPT Plus distinguishes
    itself by offering smarter AI capabilities, making it an ideal choice for those
    prioritizing intelligence and advanced language understanding in their Word tasks.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 在ChatGPT Plus和Copilot Pro之间，定价和功能都经过精心设计，以确保有符合不同用户需求和预算的选项，而在所有方面都没有明显的胜者。ChatGPT
    Plus通过提供更智能的AI能力脱颖而出，使其成为那些在Word任务中优先考虑智能和高级语言理解的用户理想选择。
- en: On the other hand, Copilot Pro stands out for its superior integration within
    Word, catering to users who value a seamless and cohesive workflow with their
    existing document management processes. This nuanced approach ensures that whether
    the emphasis is on smart assistance or integration excellence, users have access
    to a product that meets their specific requirements.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，Copilot Pro在Word中的集成表现出色，迎合了那些重视与现有文档管理流程无缝且连贯的用户。这种细致入微的方法确保了，无论用户更重视智能辅助还是集成卓越，都能找到满足其特定需求的产品。
- en: For users with simpler needs or limited budgets, there are free but less powerful
    Word Plugins. These plugins offer a taste of AI's capabilities in document management
    and are perfect for beginners or casual users.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 对于需求简单或预算有限的用户，有免费但功能较弱的Word插件。这些插件提供了AI在文档管理方面的能力体验，非常适合初学者或普通用户。
- en: Overall, the range of ChatGPT integrations in Microsoft Word caters to a diverse
    user base, ensuring that everyone, from students to professionals, can find a
    solution that fits their needs and budget.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，ChatGPT在微软Word中的集成满足了多样化的用户群体，确保了从学生到专业人士的每个人都能找到符合其需求和预算的解决方案。
- en: 'Chapter 2.1: Using Copilot for Content Creation in Microsoft Word'
  id: totrans-266
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二章1.1：在微软Word中使用Copilot进行内容创作
- en: 'Initiating the Prompt: The process begins by opening Microsoft Word and allowing
    Copilot Pro interface to appear. Start by clearly stating your role and the document''s
    purpose. For example, as a human resources specialist, you might want to create
    a guidance document for managers on conducting effective annual employee reviews.'
  id: totrans-267
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启动提示：这个过程从打开Microsoft Word并允许Copilot Pro界面出现开始。首先清楚地说明您的角色和文档的目的。例如，作为人力资源专家，您可能希望为经理创建一份关于进行有效年度员工审查的指导文件。
- en: 'Adding Specific Instructions: Enhance the prompt with specific guidelines.
    This could include details like focusing on past performance and future goals
    and developing a checklist for managers. The more specific your instructions,
    the more targeted the output from Copilot will be.'
  id: totrans-268
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加具体指令：通过具体指南增强提示。这可能包括诸如关注过去的表现和未来的目标以及为经理制定清单等细节。您的指令越具体，Copilot的输出就越有针对性。
- en: 'Prompt Submission and Processing: After completing your prompt, submit it to
    Copilot. The AI will process your input and start generating content, which may
    take a few moments.'
  id: totrans-269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提交提示并处理：完成您的提示后，将其提交给Copilot。AI将处理您的输入并开始生成内容，这可能需要几分钟。
- en: 'Reviewing and Refining the Output: Once Copilot generates the document, review
    it for accuracy and completeness. If necessary, make refinements to ensure the
    content aligns with your initial instructions.'
  id: totrans-270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 审查和精炼输出：一旦Copilot生成文档，请检查其准确性和完整性。如有必要，进行修改以确保内容与您的初始指令一致。
- en: Tips for Constructing Effective Prompts
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 构建有效提示的技巧
- en: 'Be Specific:'
  id: totrans-272
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要具体：
- en: 'What to Do: Clearly outline your goal in the prompt.'
  id: totrans-273
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要做什么：在提示中清楚地概述您的目标。
- en: 'Example: Instead of "Write about health tips," use "Create a one-page article
    on five essential health tips for office workers."'
  id: totrans-274
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：与其说“写关于健康小贴士的文章”，不如说“创建一篇关于办公室工作人员五个基本健康小贴士的一页文章。”
- en: 'Provide Context:'
  id: totrans-275
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供上下文：
- en: 'What to Do: Add background information to guide the response, even entire documents'
  id: totrans-276
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要做什么：添加背景信息以引导响应，甚至整个文档
- en: 'Example: Rather than "Write a report," specify "Write a report on the recent
    trends in renewable energy for college students."'
  id: totrans-277
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：与其说“写一份报告”，不如指定“为大学生写一份关于可再生能源最新趋势的报告。”
- en: 'Set Expectations:'
  id: totrans-278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设定期望：
- en: 'What to Do: Clearly state any requirements like tone, format, or key points.'
  id: totrans-279
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要做什么：清楚地说明任何要求，如语气、格式或要点。
- en: 'Example: Instead of "Draft an email," use "Draft a formal email to clients
    introducing our new product line, focusing on eco-friendliness."'
  id: totrans-280
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：与其说“起草一封电子邮件”，不如说“起草一封正式的电子邮件，向客户介绍我们的新产品线，重点关注环保。”
- en: 'Iterative Refinement:'
  id: totrans-281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 迭代精炼：
- en: 'What to Do: Adjust your prompt based on initial outputs for more targeted results.'
  id: totrans-282
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要做什么：根据初始输出调整您的提示以获得更精确的结果。
- en: 'Example: If the first draft is too general, refine it with "Focus on outlining
    specific benefits and include a FAQ section."'
  id: totrans-283
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：如果第一稿过于笼统，可以通过“专注于具体的好处并包括一个常见问题解答部分”来精炼它。
- en: 'Use Copilot Lab: from the link below you have access to a bunch of useful copy
    & paste prompts created by Microsoft for Copilot Pro in Word:'
  id: totrans-284
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用Copilot Lab：从以下链接，您有权访问由Microsoft为Copilot Pro在Word中创建的一组有用的复制粘贴提示：
- en: https://copilot.cloud.microsoft/en-US/prompts/all
  id: totrans-285
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: https://copilot.cloud.microsoft/en-US/prompts/all
- en: Editing and Improving Existing Content with Copilot
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Copilot编辑和改进现有内容
- en: 'Highlighting Text for Revision: In your document, highlight the text you wish
    to improve.'
  id: totrans-287
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 突出显示需要修改的文本：在您的文档中，突出显示您希望改进的文本。
- en: 'Activating Copilot''s Rewrite Feature: Click on Copilot Pro icon near the highlighted
    text to get alternatives or improvements.'
  id: totrans-288
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 激活Copilot的改写功能：点击突出显示文本附近的Copilot Pro图标以获取替代方案或改进。
- en: 'Reviewing the Suggestions: Copilot will present several rewritten versions
    of the text. Choose the one that best suits your needs.'
  id: totrans-289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 审查建议：Copilot将展示几个重写的文本版本。选择最适合您需求的版本。
- en: 'Change the tone: With the last button on the right you are able to ask for
    a different writing style, like informal or professional.'
  id: totrans-290
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 改变语气：使用右侧最后一个按钮，您可以请求不同的写作风格，例如非正式或正式。
- en: 'Incorporating Edits: Replace the original text with Copilot Pro-generated content.'
  id: totrans-291
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 整合编辑：用Copilot Pro生成的内容替换原始文本。
- en: Summarizing and Catching Up on Complex Documents Using Copilot
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Copilot总结和跟进复杂文档
- en: 'Opening the Document: Start by opening the document you want to summarize.'
  id: totrans-293
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开文档：首先打开您想要总结的文档。
- en: 'Activating Copilot: Ensure Copilot is enabled in Word.'
  id: totrans-294
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 激活Copilot：确保在Word中启用了Copilot。
- en: 'Crafting a Summarization Prompt: Create a clear prompt for Copilot, like summarizing
    a 100-page report in concise paragraphs.'
  id: totrans-295
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 构建总结提示：为 Copilot 创建一个清晰的提示，例如将 100 页的报告总结为简洁的段落。
- en: 'Analyzing Copilot’s Output: Review the generated summary for key points and
    accuracy.'
  id: totrans-296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分析 Copilot 的输出：审查生成的总结，关注关键点和准确性。
- en: 'Review and Refine: Refine your prompt if needed to focus on specific aspects.'
  id: totrans-297
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 审查和精炼：如有需要，精炼你的提示以关注特定方面。
- en: Generating Creative Content with Copilot
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Copilot 生成创意内容
- en: 'Defining the Creative Task: Start by defining the task for Copilot, like creating
    taglines for a product. You can also provide reference files.'
  id: totrans-299
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义创意任务：首先为 Copilot 定义任务，例如为产品创建标语。你也可以提供参考文件。
- en: 'Evaluating Copilot’s Creative Suggestions: Copilot will produce a variety of
    creative options.'
  id: totrans-300
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 评估 Copilot 的创意建议：Copilot 将产生各种创意选项。
- en: 'Refining Creative Outputs: Review the suggestions and select the ones that
    align with your strategy.'
  id: totrans-301
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 精炼创意输出：审查建议，选择与你的策略相符的选项。
- en: '![Immagine che contiene testo, schermata, software, Icona del computer  Descrizione
    generata automaticamente](image_rsrc1N4.jpg)'
  id: totrans-302
  prefs: []
  type: TYPE_IMG
  zh: '![包含文本、屏幕截图、软件、电脑图标的自描述图片](image_rsrc1N4.jpg)'
- en: 'In the picture: Home of Microsoft Word with Copilot Pro.'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 图片：带有 Copilot Pro 的 Microsoft Word 主页。
- en: By understanding and utilizing these steps and strategies, you can significantly
    enhance your efficiency and creativity in Microsoft Word. Copilot serves not just
    as a tool for simplifying document creation but as a dynamic assistant capable
    of handling both complex analytical tasks and creative challenges. Embracing its
    full potential involves clear communication of goals and context, as well as a
    willingness to iteratively refine prompts to achieve the desired outcome. This
    approach transforms the user experience with Microsoft Word, leveraging AI to
    improve both productivity and creativity in the modern workplace.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 通过理解和利用这些步骤和策略，你可以显著提高在 Microsoft Word 中的效率和创造力。Copilot 不仅是一个简化文档创建的工具，还是一个能够处理复杂分析任务和创意挑战的动态助手。充分发挥其潜力需要明确沟通目标和上下文，以及愿意迭代地改进提示以实现预期结果。这种方法改变了用户使用
    Microsoft Word 的体验，利用 AI 提高现代工作场所的生产力和创造力。
- en: 'Chapter 2.2: ChatGPT with Word Plug-ins'
  id: totrans-305
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二章第 2.2 节：ChatGPT 与 Word 插件
- en: Introduction
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In the ever-evolving landscape of technology and productivity, the integration
    of artificial intelligence into everyday tools has become increasingly significant.
    Specifically, the incorporation of ChatGPT into Microsoft Word through plug-ins
    represents a great time-saving. These plug-ins have transformed how individuals
    and professionals engage with Word, enhancing their productivity and creativity.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 在技术生产力不断演变的领域中，人工智能在日常工具中的集成变得越来越重要。特别是，通过插件将 ChatGPT 集成到 Microsoft Word 中，代表了一种巨大的时间节省。这些插件改变了个人和专业人士与
    Word 的互动方式，提高了他们的生产力和创造力。
- en: Accessing ChatGPT Plug-ins in Word
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 访问 Word 中的 ChatGPT 插件
- en: To begin utilizing ChatGPT with Word plug-ins, users need to navigate through
    the Microsoft Word interface. This journey starts at the 'Home' tab, where you'll
    find the option for 'Add-Ins'. Within this section, under 'Other Add-Ins', lies
    the gateway to a plethora of plug-ins, including those powered by ChatGPT. Here,
    users can search for “ChatGPT” to discover a range of tools tailored to augment
    their Word experience. They integrate less functionality than Copilot Pro but
    they are free, or they cost less.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用带有 Word 插件的 ChatGPT，用户需要在 Microsoft Word 界面中进行导航。这次旅程从“主页”标签开始，在这里你可以找到“插件”选项。在这个部分，在“其他插件”下，是通往众多插件的大门，包括那些由
    ChatGPT 驱动的插件。在这里，用户可以搜索“ChatGPT”以发现一系列旨在增强 Word 体验的工具。它们的功能性不如 Copilot Pro 强，但它们是免费的，或者成本较低。
- en: 'AI Perfect Assistant: A Comprehensive Tool'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: AI 完美助手：一款综合工具
- en: Among the various plug-ins available, AI Perfect Assistant stands out as a particularly
    versatile and easy-to-implement tool. Designed to assist users in a wide array
    of tasks within Office 365 applications, this plug-in leverages the capabilities
    of AI to transform the way we interact with Word.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 在各种插件中，AI 完美助手因其特别灵活且易于实施而脱颖而出。该插件旨在帮助用户在 Office 365 应用程序中完成各种任务，利用 AI 的能力改变我们与
    Word 的互动方式。
- en: Features of AI Perfect Assistant
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: AI 完美助手的特性
- en: 'Content Generation: AI Perfect Assistant excels in crafting well-structured
    paragraphs, making content creation effortless and efficient.'
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容生成：AI 完美助手擅长构建结构良好的段落，使内容创作变得轻松高效。
- en: 'Draft Improvement: This tool takes existing drafts and enhances them, focusing
    on clarity, coherence, and overall quality.'
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 草稿改进：此工具通过提高清晰度、连贯性和整体质量来改进现有草稿。
- en: 'Grammar Checking: It provides robust grammar-checking capabilities, ensuring
    that documents are not only well-written but also grammatically sound.'
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语法检查：它提供了强大的语法检查功能，确保文档不仅写得很好，而且语法正确。
- en: 'Text Translation: The plug-in offers translation services, breaking language
    barriers in global communications.'
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本翻译：该插件提供翻译服务，打破全球通信的语言障碍。
- en: 'Presentation Outlining: Users can leverage AI Perfect Assistant to outline
    presentations, making the task of preparing for meetings or pitches simpler.'
  id: totrans-317
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 演示大纲：用户可以利用 AI Perfect Assistant 来制定演示大纲，使准备会议或提案的任务变得简单。
- en: 'Summarization: This feature is particularly useful for condensing lengthy documents
    into concise summaries, saving valuable time.'
  id: totrans-318
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摘要：此功能特别适用于将冗长的文档压缩成简洁的摘要，节省宝贵的时间。
- en: Benefits of Using AI Perfect Assistant
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 AI Perfect Assistant 的好处
- en: 'Time Efficiency: By automating routine tasks, AI Perfect Assistant saves users
    a significant amount of time.'
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间效率：通过自动化常规任务，AI Perfect Assistant 为用户节省了大量的时间。
- en: 'Quality Improvement: It enhances the quality of documents, whether it''s through
    better writing or clearer communication.'
  id: totrans-321
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 质量提升：它提高了文档的质量，无论是通过更好的写作还是更清晰的沟通。
- en: 'Clarity Enhancement: The tool ensures that the intended message is conveyed
    clearly and effectively.'
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 清晰度提升：该工具确保传达的信息清晰且有效。
- en: 'Task Automation: Mundane tasks like grammar checking or draft improvement are
    automated, allowing users to focus on more creative or critical aspects of their
    work.'
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务自动化：像语法检查或草稿改进这样的日常任务被自动化，使用户能够专注于工作中更具创造性和关键性的方面。
- en: '![](image_rsrc1N5.jpg)'
  id: totrans-324
  prefs: []
  type: TYPE_IMG
  zh: '![](image_rsrc1N5.jpg)'
- en: 'In the picture: home of AI Perfect Assistant in Word.'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 图片中：AI Perfect Assistant 在 Word 中的家。
- en: Pricing and Accessibility
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 定价和可及性
- en: AI Perfect Assistant offers a free plan, making it accessible to a broad audience.
    For those seeking more advanced features, there is a subscription plan available.
    Users can easily sign in with their Microsoft work or school account to start
    experiencing the benefits of this innovative tool.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: AI Perfect Assistant 提供免费计划，使其对广大用户可及。对于那些寻求更高级功能的人来说，有一个订阅计划可供选择。用户可以轻松使用他们的
    Microsoft 工作或学校账户登录，开始体验这款创新工具的好处。
- en: Conclusion
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: The integration of ChatGPT with Word plug-ins, especially through tools like
    AI Perfect Assistant, marks a significant leap forward in the realm of document
    creation and editing. These advancements not only make tasks more efficient but
    also open up new possibilities for creativity and productivity. As AI continues
    to evolve, its role in transforming everyday applications like Microsoft Word
    is undeniable, promising an even more streamlined and enhanced user experience
    in the future.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT 与 Word 插件的集成，尤其是通过 AI Perfect Assistant 等工具，在文档创建和编辑领域迈出了重要的一步。这些进步不仅使任务更高效，而且为创造力和生产力开辟了新的可能性。随着
    AI 的不断发展，它在转变 Microsoft Word 等日常应用中的作用是不可否认的，预示着未来将提供更加流畅和增强的用户体验。
- en: 'Chapter 2.3: Integration of Word in ChatGPT Plus'
  id: totrans-330
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二章第2.3节：ChatGPT Plus 中的 Word 集成
- en: This chapter is for ChatGPT Plus users, who have access to this advanced subscription
    service offered by OpenAI, which provides extended capabilities over the standard
    version. This includes plugins and GPTs, customized versions of the chatbot. Plugins
    are being in some cases dismissed, but in other circumstances, they still have
    more functionalities than GPTs. Both are integrated with the interface of ChatGPT
    4 on the official site, chat.openai.com.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 本章是为 ChatGPT Plus 用户而写，他们可以访问 OpenAI 提供的这项高级订阅服务，该服务提供了比标准版本更广泛的扩展功能。这包括插件和
    GPTs，即聊天机器人的定制版本。在某些情况下，插件被忽视，但在其他情况下，它们仍然比 GPTs 具有更多功能。两者都集成在 ChatGPT 4 的官方网站
    chat.openai.com 的界面中。
- en: Uploading Word Documents to ChatGPT Plus
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 将 Word 文档上传到 ChatGPT Plus
- en: 'Uploading Word Documents: One of the remarkable features of ChatGPT Plus is
    the ability to upload .docx files directly into the chat interface of ChatGPT.
    This functionality is crucial for users who work extensively with Word documents,
    as it allows them to directly interact with their files using ChatGPT''s AI capabilities.'
  id: totrans-333
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上传 Word 文档：ChatGPT Plus 的一个显著特点是能够直接将 .docx 文件上传到 ChatGPT 的聊天界面。这一功能对于大量使用 Word
    文档的用户至关重要，因为它允许他们直接使用 ChatGPT 的 AI 功能与文件进行交互。
- en: 'Enabling GPT-4 for Enhanced Interaction: To maximize the benefits of this feature,
    users need to enable the chat with GPT-4, the latest iteration of the Generative
    Pre-trained Transformer models. GPT-4 offers more advanced understanding and processing
    abilities and, unlike GPT-3.5, the possibility to read a wide range of files.'
  id: totrans-334
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 启用GPT-4以增强交互：为了最大化这一功能的益处，用户需要启用与GPT-4的聊天，这是生成预训练Transformer模型的最新迭代。GPT-4提供了更高级的理解和处理能力，并且与GPT-3.5不同，它能够读取广泛的文件。
- en: '![](image_rsrc1N6.jpg)![](image_rsrc1N7.jpg)'
  id: totrans-335
  prefs: []
  type: TYPE_IMG
  zh: '![图片](image_rsrc1N6.jpg)![图片](image_rsrc1N7.jpg)'
- en: 'In the pictures: ChatGPT 4 chat with uploaded files (1), ChatGPT reading the
    document (2).'
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 图片中：ChatGPT 4与上传的文件聊天（1），ChatGPT阅读文档（2）。
- en: The World of Plugins
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 插件的世界
- en: 'Accessing the Plugin Store: ChatGPT Plus users can access a vast repository
    of over 1,000 plugins by enabling ChatGPT with Plugins in the beta settings, which
    are accessible through the user''s profile. This store is a treasure trove of
    tools that extend the functionality of ChatGPT in various ways.'
  id: totrans-338
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 访问插件商店：ChatGPT Plus用户可以通过在测试设置中启用带有插件的ChatGPT来访问超过1,000个插件的庞大仓库，这些设置可通过用户的个人资料访问。这个商店是一个充满工具的宝库，以各种方式扩展了ChatGPT的功能。
- en: 'Creating and Managing Documents: Among these plugins, many are designed to
    aid in creating and managing Word documents and PDFs. These plugins can range
    from simple text generation tools to more complex applications that aid in formatting,
    editing, and even translating documents.'
  id: totrans-339
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建和管理文档：在这些插件中，许多旨在帮助创建和管理Word文档和PDF。这些插件的范围从简单的文本生成工具到更复杂的应用程序，这些应用程序有助于格式化、编辑甚至翻译文档。
- en: Customized GPTs and Their Role
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 定制GPT及其作用
- en: 'Customized GPTs for Specific Tasks: The Plus subscription also introduces the
    concept of customized GPTs. These are versions of ChatGPT that have been tailored
    for specific tasks or knowledge areas. Powered by GPT-4 Turbo, which means a context
    of 128k tokens (a medium-size book), these specialized GPTs can interact with
    online services, providing a seamless integration between AI capabilities and
    web-based functionalities. You can create your own GPT, providing documentation
    about which the chatbot will answer, or add other GPTs from the OpenAI dedicated
    store.'
  id: totrans-341
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用于特定任务的定制GPT：Plus订阅还引入了定制GPT的概念。这些是针对特定任务或知识领域定制的ChatGPT版本。由GPT-4 Turbo提供支持，这意味着128k个token的上下文（一本中等大小的书），这些专业化的GPT可以与在线服务交互，实现AI能力和基于Web的功能之间的无缝集成。您可以创建自己的GPT，提供关于哪些问题聊天机器人将回答的文档，或者从OpenAI专用商店添加其他GPT。
- en: '![](image_rsrc1N8.jpg)Doc Maker: A helpful tool: A prominent example is “Doc
    Maker”, a GPT specifically designed for handling Word documents. Doc Maker exemplifies
    how a specialized GPT can enhance the experience of working with Word files. It
    offers functionalities like generating well-structured documents, aiding in the
    composition of complex reports, and more. You can use the QR code on the right
    to use the GPT.'
  id: totrans-342
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '![图片](image_rsrc1N8.jpg)Doc Maker：一个有用的工具：一个突出的例子是“Doc Maker”，这是一个专门用于处理Word文档的GPT。Doc
    Maker展示了专业GPT如何增强与Word文件工作的体验。它提供了生成结构良好的文档、帮助撰写复杂报告等功能。您可以使用右侧的二维码使用此GPT。'
- en: 'Subscription Models for Custom GPTs: These customized GPTs, including Doc Maker,
    often come with different subscription plans. These range from free versions,
    which provide basic functionalities, to paid subscriptions that unlock a wider
    array of features and capabilities, catering to more advanced needs.'
  id: totrans-343
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定制GPT的订阅模式：这些定制化的GPT，包括Doc Maker，通常提供不同的订阅计划。这些计划从提供基本功能的免费版本到解锁更广泛功能和能力的付费订阅，以满足更高级的需求。
- en: Practical Implications and Use Cases
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 实际应用和用例
- en: 'Enhanced Document Creation and Editing: The integration of Word in ChatGPT
    Plus facilitates effortless creation and refinement of Word documents. Whether
    it''s drafting a report, composing a letter, or creating marketing material, the
    AI''s ability to understand and process natural language makes these tasks simpler
    and more efficient.'
  id: totrans-345
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 增强文档创建和编辑：Word在ChatGPT Plus中的集成简化了Word文档的创建和改进。无论是起草报告、撰写信件还是创建营销材料，AI理解和处理自然语言的能力使这些任务变得更加简单和高效。
- en: 'Tailored Solutions for Diverse Needs: Customized GPTs like Doc Maker offer
    tailored solutions for various professional requirements. From generating creative
    content to summarizing lengthy documents, these tools adapt to the specific needs
    of the user, enhancing productivity and creativity.'
  id: totrans-346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 针对不同需求的定制解决方案：像Doc Maker这样的定制GPT为各种专业需求提供定制解决方案。从生成创意内容到总结长篇文档，这些工具适应用户的具体需求，提高生产力和创造力。
- en: 'Seamless Integration in Professional Workflows: For professionals who rely
    heavily on Word for their daily tasks, this integration means a significant reduction
    in the time and effort spent on document-related tasks. It opens up new possibilities
    for automating routine tasks, improving document quality, and facilitating better
    collaboration.'
  id: totrans-347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在专业工作流程中的无缝集成：对于依赖Word处理日常任务的专业人士来说，这种集成意味着在文档相关任务上花费的时间和精力显著减少。它为自动化常规任务、提高文档质量和促进更好的协作开辟了新的可能性。
- en: Conclusion
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: The integration of Word in ChatGPT Plus marks a significant milestone in the
    journey towards a more AI-integrated workspace. It not only enhances the capabilities
    of Microsoft Word but also introduces a new paradigm in how we interact with text-based
    information. By harnessing the power of ChatGPT Plus and its array of plugins
    and customized GPTs, professionals can elevate their document creation and management
    processes, leading to greater efficiency and effectiveness in their daily tasks.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: Word在ChatGPT Plus中的集成标志着向更加AI集成的工作空间迈进的重要里程碑。它不仅增强了Microsoft Word的功能，还引入了新的范式，改变了我们与基于文本的信息互动的方式。通过利用ChatGPT
    Plus及其插件和定制GPT的力量，专业人士可以提高他们的文档创建和管理流程，从而在日常任务中实现更高的效率和效果。
- en: 'Chapter 2.4: Practical Examples and Use Cases'
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 第2.4章：实际示例和用例
- en: Content Creation in Professional Settings
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 专业环境中的内容创作
- en: 'Drafting Business Reports: Imagine a financial analyst tasked with creating
    a comprehensive report on market trends. By using ChatGPT in Word, the analyst
    can quickly generate sections of the report, such as market analysis, trend predictions,
    and risk assessments. ChatGPT, with its AI capabilities, can assist in providing
    structured content that aligns with industry standards.'
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 撰写商业报告：想象一下一位负责撰写关于市场趋势的全面报告的金融分析师。通过在Word中使用ChatGPT，分析师可以快速生成报告的部分，如市场分析、趋势预测和风险评估。ChatGPT凭借其AI能力，可以帮助提供符合行业标准的有结构内容。
- en: 'Writing Proposals and Plans: For professionals involved in project management
    or consultancy, drafting proposals and project plans is a regular task. ChatGPT’s
    integration with Word allows them to outline key components of a proposal, such
    as objectives, methodologies, timelines, and budgets, thereby streamlining the
    drafting process.'
  id: totrans-353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 撰写提案和计划：对于参与项目管理或咨询的专业人士来说，撰写提案和项目计划是一项常规任务。ChatGPT与Word的集成使他们能够概述提案的关键组成部分，如目标、方法、时间表和预算，从而简化了起草过程。
- en: Academic and Research Applications
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 学术和研究应用
- en: 'Thesis Writing and Research Papers: Students and researchers can leverage ChatGPT
    to draft sections of their thesis or research papers. It helps in formulating
    literature reviews, hypothesis development, and even in summarizing research findings,
    ensuring that the academic tone and format are maintained.'
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 撰写论文和研究论文：学生和研究人员可以利用ChatGPT来起草他们的论文或研究论文的部分。它有助于制定文献综述、假设发展和甚至总结研究结果，确保保持学术语气和格式。
- en: 'Creating Bibliographies and Citations: Compiling bibliographies can be time-consuming.
    ChatGPT in Word can assist in formatting citations and references according to
    various academic styles, thus simplifying this aspect of academic writing.'
  id: totrans-356
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建参考书目和引文：编制参考书目可能耗时。Word中的ChatGPT可以帮助根据各种学术风格格式化引文和参考文献，从而简化学术写作的这一方面。
- en: Creative Writing and Personal Use
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 创意写作和个人用途
- en: 'Story Writing and Novels: Aspiring authors can use ChatGPT to brainstorm plot
    ideas, develop characters, and even write dialogues. It can provide suggestions
    for story progression, ensuring creative inspiration is always at hand.'
  id: totrans-358
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 故事写作和小说：有抱负的作家可以使用ChatGPT来构思情节想法、发展角色，甚至撰写对话。它可以为故事发展提供建议，确保创意灵感随时可用。
- en: 'Personal Documentation: From writing personal journals to creating event itineraries,
    ChatGPT in Word can assist users in crafting well-structured and articulate documents
    for personal use.'
  id: totrans-359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 个人文档：从撰写个人日记到创建活动行程，Word中的ChatGPT可以帮助用户为个人用途制作结构良好、表达清晰的文档。
- en: Professional Communication and Documentation
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 专业沟通和文档
- en: 'Email Drafting and Correspondence: Professionals often spend significant time
    drafting emails and official correspondence. ChatGPT can help in formulating clear,
    concise, and professional emails, saving valuable time.'
  id: totrans-361
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 邮件草稿和通信：专业人士通常花费大量时间起草邮件和官方通信。ChatGPT可以帮助制定清晰、简洁和专业的邮件，节省宝贵的时间。
- en: 'Policy and Procedure Manuals: Human resource professionals can use ChatGPT
    to draft or revise company policies and procedure manuals, ensuring clarity and
    comprehensiveness.'
  id: totrans-362
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 政策和程序手册：人力资源专业人士可以使用ChatGPT起草或修订公司政策和程序手册，确保其清晰性和全面性。
- en: Enhancing Existing Content
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 增强现有内容
- en: 'Editing and Proofreading: ChatGPT can be employed to revise and enhance existing
    documents. It can suggest improvements in language, tone, and structure, making
    documents more effective and readable.'
  id: totrans-364
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编辑和校对：ChatGPT可用于修订和改进现有文档。它可以建议在语言、语气和结构方面的改进，使文档更有效和易读。
- en: 'Simplifying Complex Text: In technical fields, simplifying complex jargon for
    broader audiences is often required. ChatGPT can assist in rephrasing technical
    content into simpler language.'
  id: totrans-365
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简化复杂文本：在技术领域，简化复杂术语以适应更广泛的受众是经常需要的。ChatGPT可以帮助将技术内容重新表述为更简单的语言。
- en: Educational and Training Material
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 教育和培训材料
- en: 'Developing Course Content: Educators can use ChatGPT to create course materials,
    such as lecture notes, quizzes, and educational guides, tailored to the curriculum
    and student needs.'
  id: totrans-367
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开发课程内容：教育工作者可以使用ChatGPT创建课程材料，如讲义、测验和教育指南，这些材料针对课程和学生需求量身定制。
- en: 'Training Manuals and Guides: For corporate training purposes, ChatGPT can help
    in the creation of comprehensive training manuals and instructional guides.'
  id: totrans-368
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 培训手册和指南：为了企业培训目的，ChatGPT可以帮助创建全面培训手册和指导性指南。
- en: Specialized Applications
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 专用应用
- en: 'Legal Documentation: Lawyers and legal professionals can use ChatGPT for drafting
    legal briefs, contracts, and other legal documents, ensuring that the necessary
    legal jargon and format are adhered to.'
  id: totrans-370
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 法律文件：律师和法律专业人士可以使用ChatGPT起草法律简报、合同和其他法律文件，确保遵守必要的法律术语和格式。
- en: 'Medical Reports and Summaries: Medical professionals can employ ChatGPT to
    draft patient reports, case summaries, and research notes, aiding in maintaining
    accurate and clear medical documentation.'
  id: totrans-371
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 医疗报告和摘要：医疗专业人士可以使用ChatGPT起草患者报告、病例摘要和研究笔记，有助于保持准确和清晰的医疗记录。
- en: In summary, these practical examples and use cases of Word integrated with ChatGPT
    showcase the diverse applications of this AI tool across various fields. From
    enhancing professional workflows and academic endeavors to aiding in creative
    writing and personal documentation, the integration of ChatGPT in Microsoft Word
    opens up a plethora of possibilities for users, allowing them to work more efficiently,
    creatively, and effectively.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，这些Word与ChatGPT集成的实用示例和用例展示了该AI工具在各个领域的多样化应用。从增强专业工作流程和学术研究到辅助创意写作和个人文档，ChatGPT在Microsoft
    Word中的集成为用户打开了众多可能性，使他们能够更高效、更有创意和更有效地工作。
- en: Powering Presentations with ChatGPT in PowerPoint
  id: totrans-373
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用ChatGPT在PowerPoint中增强演示文稿
- en: In "Powering Presentations with ChatGPT in PowerPoint," we embark on a detailed
    exploration of the varying degrees of AI integration available for enhancing PowerPoint
    presentations. This panoramic overview, like in Word, ranges from the most sophisticated
    and exclusive options, Microsoft Copilot Pro and ChatGPT Plus, to the more accessible
    and free PowerPoint Plugins.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 在“使用ChatGPT在PowerPoint中增强演示文稿”中，我们详细探讨了可用于增强PowerPoint演示文稿的AI集成程度的不同层次。这个全景概述，就像在Word中一样，从最复杂和专属的选项，即Microsoft
    Copilot Pro和ChatGPT Plus，到更易于访问和免费的PowerPoint插件。
- en: At the higher end of the spectrum, both Microsoft Copilot Pro and ChatGPT Plus
    offer unique advantages for AI-driven presentation enhancements. Microsoft Copilot
    Pro, integrated seamlessly with PowerPoint, excels in providing a deeply integrated
    experience for users prioritizing efficiency within Microsoft's ecosystem.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 在高端市场，Microsoft Copilot Pro和ChatGPT Plus都为AI驱动的演示文稿增强提供了独特的优势。Microsoft Copilot
    Pro与PowerPoint无缝集成，为优先考虑在Microsoft生态系统内提高效率的用户提供深度集成体验。
- en: Conversely, ChatGPT Plus, while not as tightly integrated with PowerPoint, compensates
    with its more powerful AI capabilities, making it a formidable tool for those
    seeking an edge in AI-driven functionalities. Pricing between these services is
    closely matched, ensuring that the choice between them hinges more on specific
    needs —integration versus power— rather than cost.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，ChatGPT Plus虽然与PowerPoint的集成没有那么紧密，但凭借其更强大的AI能力，成为那些寻求AI驱动功能优势的人的有力工具。这些服务的定价非常接近，确保选择它们更多地取决于具体需求——集成与功能之间的权衡——而不是成本。
- en: On the other end, free PowerPoint Plugins offer a gateway to AI-enhanced presentations
    without any financial commitment. While these plugins may not offer the breadth
    and depth of features found in Copilot or ChatGPT Plus, they are a great starting
    point for those new to AI in presentations or operating within budget constraints.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一端，免费的PowerPoint插件提供了一个无需任何财务承诺的通往AI增强演示文稿的大门。虽然这些插件可能不具备Copilot或ChatGPT Plus中找到的广泛和深入的功能，但它们对于那些对演示文稿中的AI新接触或受预算限制的人来说是一个很好的起点。
- en: 'Chapter 3.1: Copilot Pro in PowerPoint'
  id: totrans-378
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3.1章：PowerPoint中的Copilot Pro
- en: Introduction
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In this chapter, we embark on a detailed journey to explore how Microsoft Copilot
    Pro, integrated with PowerPoint, can significantly enhance your presentation experience.
    PowerPoint, a staple in professional and educational settings for creating engaging
    presentations, is now supercharged with the power of AI through Copilot. We will
    delve into the various aspects of this integration, understanding how it transforms
    the process of creating, summarizing, and enhancing presentations.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将开始一段详细的旅程，探索如何将Microsoft Copilot Pro与PowerPoint集成，从而显著提升你的演示文稿体验。PowerPoint，在专业和教育环境中创建引人入胜演示文稿的必备工具，现在通过Copilot的力量得到了增强。我们将深入探讨这一集成的各个方面，了解它是如何改变创建、总结和提升演示文稿的过程的。
- en: '![A screenshot of a computer](image_rsrc1N9.jpg)'
  id: totrans-381
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图](image_rsrc1N9.jpg)'
- en: 'In the picture: home of Microsoft PowerPoint with Copilot Pro.'
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 图片：带有Copilot Pro的Microsoft PowerPoint之家。
- en: The Transformative Experience of Copilot in PowerPoint
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: PowerPoint中Copilot的变革性体验
- en: Imagine you are about to begin working on a PowerPoint presentation. With Microsoft
    Copilot Pro, this experience is no longer about starting from a blank slide but
    about harnessing the power of AI to assist you in every step of your creative
    process.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你即将开始制作一个PowerPoint演示文稿。使用Microsoft Copilot Pro，这个过程不再是关于从空白幻灯片开始，而是利用AI的力量协助你在创意过程的每一步。
- en: 'Summarizing Presentations: One of the most striking features of Copilot in
    PowerPoint is its ability to summarize complex presentations. Picture yourself
    faced with a densely-packed slide deck, filled with technical details and data.
    Copilot, through a simple click on its icon, offers the ''Summarize this Presentation''
    feature. It meticulously analyzes each slide, providing a distilled summary of
    key topics. This function is invaluable for understanding and communicating the
    essence of detailed presentations quickly and efficiently.'
  id: totrans-385
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 概述演示文稿：Copilot在PowerPoint中最引人注目的功能之一是其概述复杂演示文稿的能力。想象一下，你面对的是一个充满技术细节和数据的密集幻灯片。通过简单地点击Copilot的图标，它就提供了'概述这个演示文稿'的功能。它细致地分析每一张幻灯片，提供关键主题的浓缩总结。这个功能对于快速有效地理解和传达详细演示文稿的精髓非常有价值。
- en: 'Transparency and Specific Queries: Copilot in PowerPoint isn''t just about
    summarization; it''s about clarity and accuracy. When you ask specific questions,
    like about ''large language models'', Copilot doesn’t just give you an answer;
    it shows you exactly where in your slide deck the information comes from. This
    feature enhances trust and reliability in the information provided.'
  id: totrans-386
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 透明度和特定查询：PowerPoint中的Copilot不仅仅是关于总结；它关乎清晰度和准确性。当你提出特定问题，比如关于'大型语言模型'时，Copilot不仅给你一个答案；它还会显示你幻灯片中的确切位置信息来源。这一功能增强了提供信息的信任度和可靠性。
- en: Crafting and Analyzing PowerPoint Decks
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 制作和分析PowerPoint演示文稿
- en: 'Now, let''s move to the creation phase:'
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们进入创作阶段：
- en: 'Starting from Scratch: With Copilot, creating a presentation is like having
    a conversation with a knowledgeable assistant. You can start by giving a command
    like ''create a presentation about the benefits of Microsoft Teams for collaboration,
    using the report of yesterday''. Copilot then uses its vast knowledge and your
    document to begin populating your slides with relevant information, ranging from
    the advantages of real-time collaboration to efficient file sharing. To create
    a presentation from a file, type “Create a presentation from the file /” in the
    chat on the right. You will see a list of documents to choose from after the “/”.
    This feature is only available for school and business accounts at the moment.'
  id: totrans-389
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从零开始：使用Copilot创建演示文稿就像与一位知识渊博的助手交谈。您可以开始给出一个命令，例如“创建一个关于Microsoft Teams协作优势的演示文稿，使用昨天的报告”。然后Copilot利用其丰富的知识和您的文档开始填充您的幻灯片，包含从实时协作的优势到高效文件共享的相关信息。要从文件创建演示文稿，在右侧的聊天中输入“从文件创建演示文稿/”。在“/”之后，您将看到可以选择的文档列表。目前此功能仅适用于学校和商业账户。
- en: 'Autogenerated Speaker Notes: Copilot also automatically generates speaker notes,
    transforming the daunting task of presentation creation into a more manageable
    process. These notes are detailed, providing valuable guidance for each slide,
    and ensuring that you''re not just presenting information but telling an engaging
    story.'
  id: totrans-390
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动生成演讲者笔记：Copilot还自动生成演讲者笔记，将创建演示文稿的艰巨任务转变为更易于管理的流程。这些笔记详细，为每个幻灯片提供宝贵的指导，确保您不仅是在展示信息，而是在讲述一个引人入胜的故事。
- en: Enhancing Presentations with Copilot
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Copilot增强演示文稿
- en: 'Editing and Refining Slides: Consider a slide in your presentation that feels
    incomplete. With Copilot, enhancing your slides is as easy as typing a command
    like “Add two more bullet points on team collaboration benefits”. Copilot comprehends
    and executes your request, adding insightful, relevant points.'
  id: totrans-392
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编辑和精炼幻灯片：考虑一下您演示文稿中感觉不完整的幻灯片。使用Copilot，增强您的幻灯片就像输入一个命令，例如“在团队协作优势上添加两个更多项目符号”。Copilot理解并执行您的请求，添加有洞察力的、相关的要点。
- en: 'Integrating Corporate Templates: Copilot integrates seamlessly with Microsoft’s
    repository of corporate templates. This means you can not only choose a professional
    design for your presentation but also ensure it aligns with your company’s branding
    guidelines, from color schemes to font styles.'
  id: totrans-393
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 集成企业模板：Copilot与Microsoft的企业模板库无缝集成。这意味着您不仅可以为您的演示文稿选择专业的设计，还可以确保它与公司的品牌指南保持一致，从配色方案到字体样式。
- en: 'Creating Presentations from Documents: Copilot can transform text-heavy documents,
    like reports or project plans, into visually appealing PowerPoint presentations.
    It organizes key points into slides, complete with imagery and infographics, capturing
    the essence of the original document effectively.'
  id: totrans-394
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从文档创建演示文稿：Copilot可以将文本密集型文档，如报告或项目计划，转换成视觉上吸引人的PowerPoint演示文稿。它将关键点组织到幻灯片中，包括图像和信息图表，有效地捕捉了原始文档的精髓。
- en: 'Generating AI Pictures: Copilot can ask DALL-E 3, the most advanced text-to-image
    model of OpenAI, to generate pertinent, detailed and free-to-use pictures to add
    to the presentation, just from a text prompt, just in a few moments.'
  id: totrans-395
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成AI图片：Copilot可以请求DALL-E 3，OpenAI最先进的文本到图像模型，生成相关、详细且免费使用的图片，仅通过文本提示，只需几分钟。
- en: 'Using Copilot Lab: as in Word, from the link below you have access to a bunch
    of useful copy & paste prompts created by Microsoft for Copilot Pro in PowerPoint:'
  id: totrans-396
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用Copilot Lab：就像在Word中一样，您可以通过以下链接访问Microsoft为PowerPoint中的Copilot Pro创建的一组有用的复制粘贴提示：
- en: https://copilot.cloud.microsoft/en-US/prompts/all
  id: totrans-397
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: https://copilot.cloud.microsoft/en-US/prompts/all
- en: Conclusion
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: The integration of Copilot Pro in PowerPoint marks a significant advancement
    in how presentations are created, analyzed, and enhanced. This chapter has provided
    a comprehensive understanding of its capabilities, from summarizing complex decks
    to crafting engaging narratives, all empowered by the intelligence and versatility
    of AI. Additionally, in the downloadable bonus file accompanying this book, you
    will find an array of prompts specifically designed for PowerPoint. These prompts
    are tailored to further leverage Copilot Pro's features, enabling you to explore
    a broader spectrum of presentation enhancements and capabilities, ensuring that
    every presentation not only meets but exceeds expectations.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: PowerPoint中Copilot Pro的集成标志着在创建、分析和增强演示文稿方面的重大进步。本章全面介绍了其功能，从总结复杂的幻灯片到构建引人入胜的叙述，这一切都得益于人工智能的智能和多功能性。此外，在本书的可下载附加文件中，您将找到一系列专为PowerPoint设计的提示。这些提示旨在进一步利用Copilot
    Pro的功能，让您能够探索更广泛的演示文稿增强和功能，确保每一次演示不仅满足而且超越期望。
- en: 'Chapter 3.2: PowerPoint Plug-ins Powered by ChatGPT'
  id: totrans-400
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3.2章：由ChatGPT驱动的PowerPoint插件
- en: Introduction
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: In the realm of modern presentations, PowerPoint remains a quintessential tool
    for professionals across various industries. The integration of plug-ins powered
    by ChatGPT has revolutionized the way presentations are created, edited, and delivered.
    This chapter focuses on these innovative plug-ins, specifically tailored for PowerPoint,
    enhancing the user experience and productivity.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代演示文稿领域，PowerPoint仍然是各行各业专业人士的必备工具。由ChatGPT驱动的插件集成彻底改变了演示文稿的创建、编辑和交付方式。本章重点介绍这些创新插件，特别是针对PowerPoint的插件，增强了用户体验和生产力。
- en: Finding and Installing Plug-ins
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 查找和安装插件
- en: 'To embark on this journey of enhanced productivity, locating and installing
    these plug-ins is the first step. This process is straightforward:'
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始这段提高生产力的旅程，找到并安装这些插件是第一步。这个过程很简单：
- en: 'Accessing Plug-ins in PowerPoint:'
  id: totrans-405
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在PowerPoint中访问插件：
- en: Begin by opening PowerPoint on your device.
  id: totrans-406
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，在您的设备上打开PowerPoint。
- en: Navigate to the 'Home' tab on the ribbon at the top.
  id: totrans-407
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在顶部的功能区上导航到“主页”标签。
- en: Look for the 'Add-Ins' section.
  id: totrans-408
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 查找“插件”部分。
- en: Within this section, select 'Other Add-Ins'.
  id: totrans-409
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在本节中，选择“其他插件”。
- en: 'Searching for ChatGPT Plug-ins:'
  id: totrans-410
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 搜索ChatGPT插件：
- en: In the 'Add-Ins' menu, use the search bar.
  id: totrans-411
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在“插件”菜单中，使用搜索栏。
- en: Type “ChatGPT” and press enter.
  id: totrans-412
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入“ChatGPT”并按回车键。
- en: This action will bring up a list of available plug-ins related to ChatGPT.
  id: totrans-413
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此操作将显示与ChatGPT相关的可用插件列表。
- en: ChatGPT for PowerPoint
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT for PowerPoint
- en: 'One of the most recommended plug-ins is "ChatGPT for PowerPoint". This plug-in,
    known for its user-friendly interface and robust capabilities, offers several
    key features:'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 最推荐的插件之一是“ChatGPT for PowerPoint”。这款插件以其用户友好的界面和强大的功能而闻名，提供了几个关键特性：
- en: 'Cost-Effectiveness:'
  id: totrans-416
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成本效益：
- en: It is entirely free, making it accessible to a wide range of users, from students
    to professionals.
  id: totrans-417
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它完全是免费的，这使得它对从学生到专业人士的广泛用户群体都易于访问。
- en: 'AI-Generated Slides:'
  id: totrans-418
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: AI生成幻灯片：
- en: The plug-in employs AI to generate engaging slides.
  id: totrans-419
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 插件使用AI生成引人入胜的幻灯片。
- en: This feature is particularly beneficial for crafting compelling presentations
    that hold the audience's attention.
  id: totrans-420
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此功能特别有利于制作吸引观众注意力的演示文稿。
- en: 'Automatic Image Addition:'
  id: totrans-421
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动添加图片：
- en: ChatGPT for PowerPoint can automatically add free-to-use stock images to your
    slides.
  id: totrans-422
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT for PowerPoint可以自动将免费使用的库存图片添加到您的幻灯片中。
- en: This functionality not only saves time but also enhances the visual appeal of
    your presentations.
  id: totrans-423
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此功能不仅节省了时间，，还增强了演示文稿的视觉吸引力。
- en: 'Faster Formatting:'
  id: totrans-424
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更快的格式化：
- en: The plug-in streamlines the formatting process, enabling quicker preparation
    of presentations.
  id: totrans-425
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 插件简化了格式化过程，使演示文稿的准备更快。
- en: This feature is particularly useful for those under tight deadlines or needing
    to make last-minute changes.
  id: totrans-426
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此功能特别适用于那些时间紧迫或需要最后时刻做出更改的人。
- en: '![A hand holding a pen](image_rsrc1NA.jpg)'
  id: totrans-427
  prefs: []
  type: TYPE_IMG
  zh: '![手持钢笔的手](image_rsrc1NA.jpg)'
- en: 'In the picture: ChatGPT for PowerPoint, the plugin, at work.'
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 在图片中：正在工作的ChatGPT for PowerPoint插件。
- en: 'Deckrobot: An Alternative Option'
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: Deckrobot：替代选项
- en: For users seeking more features, Deckrobot serves as an alternative. It is also
    free but currently in a developmental phase, offering a glimpse into future enhancements
    in PowerPoint presentation creation.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 对于寻求更多功能的用户，Deckrobot是一个替代选项。它也是免费的，但目前处于开发阶段，为PowerPoint演示文稿创建的未来增强提供了预览。
- en: 'Advanced Features:'
  id: totrans-431
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 高级功能：
- en: Deckrobot is designed with a range of additional features, though some may still
    be under development.
  id: totrans-432
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Deckrobot 设计了多种附加功能，尽管其中一些可能仍在开发中。
- en: 'User Experience:'
  id: totrans-433
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户体验：
- en: As it is in a developmental phase, users have the opportunity to experience
    and contribute to the evolution of this plug-in.
  id: totrans-434
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于它处于开发阶段，用户有机会体验并参与到这个插件的演变过程中。
- en: 'Accessibility:'
  id: totrans-435
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可访问性：
- en: Like ChatGPT for PowerPoint, Deckrobot is free, making it easily accessible.
  id: totrans-436
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与 PowerPoint 的 ChatGPT 一样，Deckrobot 是免费的，这使得它易于访问。
- en: Conclusion
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: The integration of ChatGPT-powered plug-ins in PowerPoint marks a significant
    advancement in presentation technology. These plug-ins, particularly ChatGPT for
    PowerPoint and Deckrobot, provide users with powerful tools to enhance their productivity
    and creativity. By leveraging AI, these plug-ins not only facilitate the creation
    of visually appealing and engaging presentations but also simplify and expedite
    the process of presentation preparation. As we continue to witness the evolution
    of AI in various applications, the potential for further advancements in PowerPoint
    plug-ins remains vast, promising even more innovative features and capabilities
    in the future.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 在 PowerPoint 中集成 ChatGPT 驱动的插件标志着演示技术的一个重大进步。这些插件，特别是 PowerPoint 的 ChatGPT 和
    Deckrobot，为用户提供强大的工具来提高他们的生产力和创造力。通过利用人工智能，这些插件不仅促进了制作视觉上吸引人且引人入胜的演示文稿，还简化并加快了演示文稿准备过程。随着我们继续见证人工智能在各种应用中的演变，PowerPoint
    插件进一步发展的潜力仍然巨大，未来有望带来更多创新的功能和能力。
- en: 'Chapter 3.3: Manage PowerPoints in ChatGPT Plus'
  id: totrans-439
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 3.3 章：在 ChatGPT Plus 中管理 PowerPoint
- en: Introduction to ChatGPT Plus for PowerPoint Management
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: PowerPoint 管理的 ChatGPT Plus 简介
- en: ChatGPT Plus, the subscription-based offering from OpenAI, has significantly
    expanded the capabilities of using ChatGPT for managing PowerPoint presentations.
    This enhancement is not only a leap in functionality but also a gateway to a broader
    spectrum of tools and features specifically tailored for PowerPoint. Plugins are
    being in some cases dismissed, but in other circumstances, they still have more
    functionalities than GPTs. Both are integrated with the interface of ChatGPT 4
    on the official site, chat.openai.com.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI 提供的基于订阅的 ChatGPT Plus 显著扩展了使用 ChatGPT 管理PowerPoint 演示文稿的能力。这一增强不仅在功能上是一个飞跃，而且也是通往更广泛工具和特性的门户，这些工具和特性专门针对
    PowerPoint 设计。在某些情况下，插件可能被忽视，但在其他情况下，它们仍然比 GPTs 具有更多功能。两者都集成在 chat.openai.com
    官方网站上 ChatGPT 4 的界面中。
- en: Uploading and Analyzing PowerPoint Files
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 上传和分析 PowerPoint 文件
- en: One of the fundamental features of ChatGPT Plus is the ability to upload PowerPoint
    (.pptx) files directly into the chat interface at chat.openai.com. This feature
    is particularly useful for users who work extensively with PowerPoint presentations.
    Once the GPT-4 chat is enabled, ChatGPT can read and interact with the content
    of these files, offering insights, suggestions, and modifications.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus 的一个基本功能是能够直接在 chat.openai.com 的聊天界面中上传 PowerPoint (.pptx) 文件。这个功能对于大量使用
    PowerPoint 演示文稿的用户尤其有用。一旦启用 GPT-4 聊天，ChatGPT 就可以读取和与这些文件的内容进行交互，提供见解、建议和修改。
- en: 'ChatGPT Plus Plugins: A World of Possibilities'
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus 插件：一个充满可能性的世界
- en: Enabling ChatGPT with Plugins in the beta settings, which you can access by
    clicking on your profile, opens up a vast store of more than 1000 plugins. These
    plugins significantly enhance the functionality of ChatGPT, particularly with
    PowerPoint presentations.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 在测试设置中启用 ChatGPT 插件，您可以通过点击您的个人资料来访问，这将打开一个包含超过 1000 个插件的庞大库。这些插件显著增强了 ChatGPT
    的功能，尤其是在 PowerPoint 演示文稿方面。
- en: 'Example Plugins:'
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 示例插件：
- en: 'SmartSlides: This plugin is designed to assist in the creation of new PowerPoint
    presentations. It requires an account and offers a free trial. SmartSlides is
    adept at generating engaging slides that captivate the audience, adding images
    automatically to make presentations more appealing, and facilitating faster formatting.'
  id: totrans-447
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: SmartSlides：这个插件旨在帮助创建新的 PowerPoint 演示文稿。它需要一个账户并提供免费试用。SmartSlides 擅长生成吸引观众的引人入胜的幻灯片，自动添加图片使演示文稿更具吸引力，并简化格式化过程。
- en: 'AI Diagrams for Mind Maps: For those who need to represent complex concepts
    or brainstorming sessions, AI Diagrams is a plugin that specializes in creating
    mind maps, an invaluable tool for visual thinkers.'
  id: totrans-448
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: AI 思维导图：对于那些需要表示复杂概念或头脑风暴会议的人来说，AI Diagrams 是一个专门创建思维导图的插件，对于视觉思考者来说是一个无价之宝。
- en: Customized GPTs for Enhanced PowerPoint Creation
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 用于增强PowerPoint创建的定制GPT
- en: With the Plus subscription, OpenAI provides access to thousands of customized
    versions of ChatGPT, powered by GPT-4 Turbo. These specialized GPTs have distinct
    knowledge bases and can be configured to access various online services. Thousands
    are already available in the GPTs store of OpenAI.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 通过Plus订阅，OpenAI提供了数千种由GPT-4 Turbo驱动的定制版ChatGPT的访问权限。这些专业的GPT具有不同的知识库，并且可以配置以访问各种在线服务。数千种版本已在OpenAI的GPT商店中可用。
- en: 'Slide Maker: A Notable Example'
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 幻灯片制作器：一个显著的例子
- en: '![A qr code on a white background  Description automatically generated](image_rsrc1NB.jpg)"Slide
    Maker" stands out among these GPTs, particularly for those focused on presentations.
    Powered by aidocmaker.com, which offers both free and paid subscriptions, Slide
    Maker takes PowerPoint management to the next level. Users can input Word documents,
    PDFs, and PowerPoint files of any size. Moreover, Slide Maker can even browse
    the web upon request. The result is a rapid transformation of these inputs into
    high-quality PowerPoint presentations, showcasing the tool''s versatility and
    efficiency.  You can scan the QR code on the right to use it.'
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: '![白色背景上的二维码  自动生成的描述](image_rsrc1NB.jpg)"幻灯片制作器"在这些GPT中脱颖而出，尤其是对于那些专注于演示文稿的用户。由aidocmaker.com提供支持，提供免费和付费订阅，幻灯片制作器将PowerPoint管理提升到新的水平。用户可以输入任何大小的Word文档、PDF和PowerPoint文件。此外，幻灯片制作器还可以根据请求浏览网页。结果是快速将这些输入转换为高质量的PowerPoint演示文稿，展示了工具的多功能和效率。您可以通过扫描右侧的二维码来使用它。'
- en: '![A screenshot of a web page  Description automatically generated](image_rsrc1NC.jpg)'
  id: totrans-453
  prefs: []
  type: TYPE_IMG
  zh: '![网页截图  自动生成的描述](image_rsrc1NC.jpg)'
- en: 'In the picture: home of Slide Maker, the GPT.'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 图片中：幻灯片制作器，即GPT的家园。
- en: Conclusion
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In summary, the chapter delves into the advanced capabilities of managing PowerPoint
    presentations through ChatGPT Plus. This service not only simplifies the process
    of creating and editing presentations but also introduces an array of tools and
    plugins that cater to a wide range of needs, from basic slide creation to complex,
    data-intensive presentations. The result is a more efficient, creative, and engaging
    way to handle PowerPoint presentations in the modern workspace.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，本章深入探讨了通过ChatGPT Plus管理PowerPoint演示文稿的高级功能。这项服务不仅简化了创建和编辑演示文稿的过程，还引入了一系列工具和插件，以满足从基本幻灯片创建到复杂、数据密集型演示文稿的广泛需求。结果是更高效、更有创意和更具吸引力的方式来处理现代工作空间中的PowerPoint演示文稿。
- en: 'Chapter 3.4: Real-World Applications and Creative Use'
  id: totrans-457
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3.4章：现实世界应用和创意使用
- en: Introduction
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: In this chapter, we explore the vast array of real-world applications and creative
    uses of ChatGPT within PowerPoint. This journey will uncover how this cutting-edge
    technology transforms ordinary presentations into compelling, insightful, and
    visually stunning narratives. Whether in business, education, or personal projects,
    ChatGPT’s integration with PowerPoint opens a new realm of possibilities, making
    it an indispensable tool for anyone looking to elevate their presentation skills.
  id: totrans-459
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了ChatGPT在PowerPoint中的各种现实世界应用和创意使用。这次旅程将揭示这项尖端技术如何将普通的演示文稿转变为引人入胜、富有洞察力和视觉震撼的叙述。无论是在商业、教育还是个人项目中，ChatGPT与PowerPoint的集成开辟了一个新的可能性领域，使其成为任何希望提升演示技能的人不可或缺的工具。
- en: Enhancing Business Presentations
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 提升商业演示
- en: 'Data-Driven Insights: In the realm of business, presentations are a cornerstone.
    ChatGPT''s ability to analyze and summarize complex data transforms how we present
    market research, financial reports, and strategic plans. For instance, a financial
    analyst can leverage ChatGPT to create slides that not only present the numbers
    but also provide AI-generated insights and forecasts, making the data more accessible
    and actionable.'
  id: totrans-461
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据驱动洞察：在商业领域，演示文稿是基石。ChatGPT分析和总结复杂数据的能力改变了我们展示市场研究、财务报告和战略计划的方式。例如，财务分析师可以利用ChatGPT创建幻灯片，不仅展示数字，还提供AI生成的洞察和预测，使数据更易于访问和操作。
- en: 'Interactive Sales Pitches: Imagine a sales team crafting a pitch for potential
    clients. With ChatGPT, they can create a presentation that not only showcases
    their product but also includes interactive elements like Q&A sections, where
    potential questions from clients are anticipated and answered through insightful
    slides.'
  id: totrans-462
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 互动销售提案：想象一下销售团队为潜在客户制作提案。使用ChatGPT，他们可以创建一个不仅展示产品，还包含互动元素（如问答部分）的演示文稿，其中预见到并回答了客户的潜在问题。
- en: Revolutionizing Education and Training
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 革命性教育及培训
- en: 'Interactive Learning Modules: Educators can use ChatGPT to craft engaging and
    interactive learning modules. For a history teacher, this might mean a presentation
    that not only covers historical facts but also includes AI-generated images and
    timelines, making the learning experience more immersive and memorable.'
  id: totrans-464
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 互动式学习模块：教育工作者可以使用ChatGPT来制作引人入胜且互动性强的学习模块。对于历史老师来说，这可能意味着一个不仅涵盖历史事实，还包含AI生成的图像和时序图的演示文稿，使学习体验更加沉浸和难忘。
- en: 'Training Workshops: In corporate training, ChatGPT can be used to develop comprehensive
    workshops. A training coordinator could design a session on new software, with
    slides that not only explain the software’s features but also provide use cases
    and troubleshooting tips, all enriched with AI-generated visuals.'
  id: totrans-465
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 培训研讨会：在企业培训中，ChatGPT可用于开发全面的研讨会。培训协调员可以设计一个关于新软件的研讨会，幻灯片不仅解释软件的功能，还提供用例和故障排除技巧，所有这些都通过AI生成的视觉元素来丰富。
- en: Personal Projects and Community Initiatives
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 个人项目和社区倡议
- en: 'Event Planning Presentations: For personal projects like event planning, ChatGPT
    can assist in creating detailed presentations. This might involve a slide deck
    for a wedding plan, including timelines, seating arrangements, and menu options,
    all laid out in an aesthetically pleasing manner.'
  id: totrans-467
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 活动策划演示文稿：对于个人项目如活动策划，ChatGPT可以帮助创建详细的演示文稿。这可能包括婚礼计划的幻灯片，包括时间表、座位安排和菜单选项，所有这些都以美观的方式呈现。
- en: 'Community Outreach Programs: Non-profit organizations can utilize ChatGPT to
    create presentations for community outreach. This could involve a presentation
    on a new community health initiative, including statistics on community health,
    program details, and anticipated outcomes, all presented in a clear, engaging
    format.'
  id: totrans-468
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 社区外展项目：非营利组织可以利用ChatGPT创建社区外展的演示文稿。这可能包括关于新社区健康倡议的演示文稿，包括社区健康统计数据、项目细节和预期成果，所有这些都以清晰、吸引人的格式呈现。
- en: Creative Storytelling and Artistic Projects
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 创意叙事和艺术项目
- en: 'Digital Storytelling: For creative minds, ChatGPT can be a tool for digital
    storytelling. An aspiring novelist might create a presentation to outline their
    story plot, character arcs, and settings, with AI-generated images to visualize
    their narrative.'
  id: totrans-470
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数字叙事：对于有创意的人来说，ChatGPT可以是数字叙事的工具。一个有抱负的小说家可能会创建一个演示文稿来概述他们的故事情节、人物弧线和场景，并使用AI生成的图像来可视化他们的叙事。
- en: 'Art and Design Portfolios: Artists and designers can use ChatGPT to create
    dynamic portfolios. This involves a presentation showcasing their work, with each
    slide carefully crafted to reflect their artistic style and narrate the story
    behind each piece.'
  id: totrans-471
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 艺术和设计作品集：艺术家和设计师可以使用ChatGPT创建动态的作品集。这涉及一个展示他们作品的演示文稿，每个幻灯片都精心制作，以反映他们的艺术风格并讲述每件作品的背后故事。
- en: Customizing Presentations with AI
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 使用AI定制演示文稿
- en: 'Brand-Specific Customizations: ChatGPT allows users to customize presentations
    to adhere to specific brand guidelines. This means creating slides that align
    with a company’s color scheme, font, and overall aesthetic, ensuring that the
    presentation is not only informative but also a reflection of the brand’s identity,
    in the case of Copilot Pro.'
  id: totrans-473
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 品牌特定定制：ChatGPT允许用户根据特定的品牌指南定制演示文稿。这意味着创建与公司色彩方案、字体和整体美学相一致的幻灯片，确保演示文稿不仅信息丰富，而且反映了品牌的身份，例如在Copilot
    Pro的情况下。
- en: 'Adapting to Various Formats: With ChatGPT, presentations can be adapted for
    different formats – be it a brief pitch deck, a detailed report, or an interactive
    webinar. This flexibility ensures that the content is not just presented but is
    done so in a way that best suits the intended audience.'
  id: totrans-474
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 适应各种格式：使用ChatGPT，演示文稿可以适应不同的格式——无论是简短的提案演示文稿、详细的报告还是互动网络研讨会。这种灵活性确保了内容不仅被展示，而且是以最适合目标受众的方式展示。
- en: 'Conclusion: The Future of Presentations with ChatGPT'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：ChatGPT引领的演示文稿未来
- en: As we conclude this chapter, it is evident that the integration of ChatGPT in
    PowerPoint is not just a technological advancement; it is a transformative tool
    that redefines the art of presentation. From business to education, personal projects
    to creative endeavors, ChatGPT offers a plethora of applications, each promising
    to enhance the way we communicate, educate, and express. The future of presentations
    is bright with the power of AI, and ChatGPT is at the forefront, leading the charge
    in this exciting new era of digital storytelling and data-driven insights.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的结尾，很明显，ChatGPT在PowerPoint中的集成不仅仅是一个技术进步；它是一个变革性的工具，重新定义了演示的艺术。从商业到教育，个人项目到创意活动，ChatGPT提供了大量的应用，每一项都承诺改善我们沟通、教育和表达的方式。有了AI的力量，演示的未来光明，ChatGPT处于最前沿，引领着这个激动人心的数字故事讲述和数据驱动洞察的新时代。
- en: Your feedback is invaluable to the future readers! Kindly take a moment to share
    your thoughts through a brief review [here](https://2ly.link/1vk6A) – you can
    also change it later.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 您的反馈对未来读者来说是无价的！请花点时间在这里[这里](https://2ly.link/1vk6A)分享您的想法——您也可以稍后更改它。
- en: Excel - Data Management with ChatGPT
  id: totrans-478
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Excel - 使用ChatGPT进行数据管理
- en: Introduction
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: In the evolving landscape of data management, Excel remains a fundamental tool
    for professionals across various sectors. Its robust functionality and user-friendly
    nature have long established it as a key player in data analysis and management.
    The advent of artificial intelligence, specifically the integration of ChatGPT,
    marks a significant leap forward in how we interact with Excel. This integration
    not only simplifies complex tasks but also democratizes advanced data analysis,
    making it accessible to a wider range of users.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据管理不断发展的领域中，Excel一直是各个行业专业人士的基本工具。其强大的功能性和用户友好性长期以来已经确立了它在数据分析和管理中的关键地位。人工智能的出现，特别是ChatGPT的集成，标志着我们在与Excel互动方面迈出了重大步伐。这种集成不仅简化了复杂任务，还使高级数据分析民主化，使其对更广泛的用户变得可访问。
- en: ChatGPT, harnessing the power of generative AI, introduces an innovative approach
    to working with Excel. It aids users in streamlining intricate tasks, automating
    routine processes, and deriving intelligent insights. With AI-driven features
    such as formula generation, in-depth data analysis, and intuitive problem-solving,
    Excel transforms into a dynamic assistant, adept at tackling diverse data challenges.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT利用生成式AI的力量，引入了一种创新的方法来处理Excel。它帮助用户简化复杂任务，自动化常规流程，并得出智能见解。凭借如公式生成、深入数据分析以及直观问题解决等AI驱动功能，Excel变成了一个动态助手，擅长应对各种数据挑战。
- en: 'This chapter provides a comprehensive panorama of the various levels of ChatGPT
    integration available in Excel. Like in Word and PowerPoint, we start with the
    most exclusive and sophisticated option: Copilot Pro. This premium feature offers
    the highest level of functionality and AI integration, designed for those who
    seek the most advanced tools in data management and analysis.'
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供了ChatGPT在Excel中可用的各种集成级别的全面概览。就像在Word和PowerPoint中一样，我们首先从最独家和最复杂的选择开始：Copilot
    Pro。这个高级功能提供了最高级别的功能性和AI集成，专为那些寻求数据管理和分析中最先进工具的人设计。
- en: In the middle of the spectrum, we find ChatGPT Plus, a balanced blend of advanced
    features and accessibility. It caters to users who require more than the basic
    functionalities but do not necessarily need the full suite of tools offered by
    Copilot Pro.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 在光谱的中间，我们发现了ChatGPT Plus，它是高级功能和易用性之间平衡的混合体。它面向那些需要比基本功能更多，但又不一定需要Copilot Pro提供的完整工具套件的用户。
- en: At the more accessible end, we explore the mostly free but less powerful Excel
    plugins. These plugins are ideal for beginners or those with basic data management
    needs, providing a taste of AI’s capabilities without the investment required
    for more advanced features.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 在更易用的端，我们探索了大多数免费但功能较弱的Excel插件。这些插件非常适合初学者或那些只有基本数据管理需求的人，它们提供了AI能力的尝鲜，而不需要为更高级的功能进行投资。
- en: Through this chapter, we will delve into each of these options, from the high-end
    Copilot to the free plugins, illustrating how ChatGPT can be tailored to suit
    different needs and budgets. Whether you are a novice eager to learn the fundamentals
    of Excel, or a seasoned expert aiming to harness the full potential of AI in data
    analysis, this chapter will guide you through the practical applications and advantages
    of integrating ChatGPT into your Excel experience. Join us as we explore the world
    of Excel, enhanced and revolutionized by AI, where data management is not just
    about efficiency but also about innovation and accessibility for all.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 通过本章，我们将深入探讨这些选项，从高端Copilot到免费插件，展示ChatGPT如何根据不同的需求和预算进行定制。无论你是渴望学习Excel基础知识的初学者，还是希望充分利用AI在数据分析中潜力的资深专家，本章将指导你了解将ChatGPT集成到Excel体验中的实际应用和优势。加入我们，一起探索由AI增强和变革的Excel世界，在这里，数据管理不仅关乎效率，还关乎创新和所有人都能访问。
- en: The bonus material available for download at the beginning of the book also
    features a wide array of prompts specifically optimized for Excel.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 书籍开头可下载的附加材料还包括一系列针对Excel优化的提示。
- en: 'Chapter 4.1: Copilot Pro Features in Excel'
  id: totrans-487
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4.1章：Excel中的Copilot Pro功能
- en: Revolutionizing Data Analysis and Visualization with Copilot Pro in Excel
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 利用Excel中的Copilot Pro革命性地改变数据分析与可视化
- en: Copilot Pro in Excel represents a major advancement in the field of data analysis
    and visualization. As an integrated feature within Microsoft Excel, it offers
    a novel approach to data handling and interpretation, making it a pivotal tool
    for both occasional and expert users.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的Copilot Pro代表了数据分析与可视化领域的一项重大进步。作为Microsoft Excel内部集成的功能，它提供了一种新颖的数据处理和解释方法，使其成为偶尔使用和专家用户的关键工具。
- en: Enhanced Table-Based Data Interaction
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 增强基于表格的数据交互
- en: Central to Copilot's functionality is its ability to efficiently work with table-formatted
    data. This mirrors the functionality seen in Microsoft Word, where Copilot features
    an interactive side panel for easy data manipulation in Excel. This panel facilitates
    an interactive environment for users to work with their data.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot功能的核心是其高效处理表格格式数据的能 力。这反映了在Microsoft Word中看到的类似功能，其中Copilot在Excel中提供了一个交互式侧面板，便于数据操作。此面板为用户提供了一个交互式环境来处理他们的数据。
- en: Identifying Insights and Trends
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 识别洞察力和趋势
- en: Copilot excels at uncovering hidden insights and trends within data. It analyzes
    table data to identify patterns and correlations, transforming raw numbers into
    actionable intelligence. This capability is crucial for revealing insights that
    might otherwise go unnoticed.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot擅长在数据中揭示隐藏的洞察力和趋势。它分析表格数据以识别模式和相关性，将原始数字转化为可操作的情报。这种能力对于揭示可能被忽视的洞察至关重要。
- en: Timeframe Adjustments and Data Visualization
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 时间框架调整和数据可视化
- en: A standout feature of Copilot is its adeptness at managing data across various
    timeframes, such as transitioning from quarterly to monthly data. Additionally,
    Copilot excels in creating diverse visualizations and charts, significantly enhancing
    data interpretation.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot的一个突出特点是它擅长管理不同时间框架下的数据，例如从季度数据过渡到月度数据。此外，Copilot在创建各种可视化图表方面表现出色，显著增强了数据解释。
- en: Leveraging Machine Learning for Data Presentation
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 利用机器学习进行数据展示
- en: Powered by advanced machine learning, Copilot intelligently determines the most
    suitable formats for data visualization, including conditional formatting. This
    leverages Microsoft's vast experience in data presentation, simplifying complex
    visualization tasks.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 由先进的机器学习驱动，Copilot智能地确定数据可视化的最合适格式，包括条件格式。这利用了Microsoft在数据展示方面的丰富经验，简化了复杂的可视化任务。
- en: Simplifying Excel for Casual Users
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 简化Excel操作，方便普通用户使用
- en: Copilot democratizes data analysis by simplifying complex tasks like creating
    pivot tables and visualizations, making it a boon for casual users. It reduces
    the time and effort required to learn and execute advanced Excel functions.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot通过简化创建数据透视表和可视化等复杂任务，使数据分析民主化，对普通用户来说是一大福音。它减少了学习和执行高级Excel函数所需的时间和精力。
- en: Forecasting and Modeling
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 预测和建模
- en: Copilot's capabilities extend to creating models for forecasting and scenario
    analysis, enabling users to explore various strategies and their potential impacts.
    It won’t predict the stock market, but it is an excellent tool for strategic planning
    and decision-making.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot的功能扩展到创建预测和情景分析的模型，使用户能够探索各种策略及其潜在影响。它不会预测股市，但它是战略规划和决策制定的优秀工具。
- en: Formula and Expression Assistance
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 公式和表达式辅助
- en: Copilot also assists in managing complex formulas and expressions, particularly
    useful in scenarios involving nested formulas or specific data categorization.
    You can just describe what you want in natural language, and it will write the
    formula for you.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot 还协助管理复杂的公式和表达式，尤其在涉及嵌套公式或特定数据分类的场景中特别有用。你只需用自然语言描述你想要的内容，它就会为你编写公式。
- en: Natural Language Query and Visualization Recommendations
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言查询和可视化推荐
- en: The tool allows users to query their data using natural language, making it
    accessible and user-friendly. Copilot also suggests optimal ways to visualize
    data, for example in a chart or graph, which can be challenging even for experienced
    users.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 工具允许用户使用自然语言查询数据，使其易于访问且用户友好。Copilot 还建议最佳的数据可视化方式，例如图表或图形，即使对于经验丰富的用户来说也可能具有挑战性。
- en: Augmentation, Not Replacement
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 增强而非替代
- en: It’s crucial to note that Copilot enhances, rather than replaces, Excel's existing
    functionalities. It introduces a new, intuitive way to interact with Excel's features
    through AI-driven insights and natural language processing.
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，Copilot增强而不是取代Excel现有的功能。它通过AI驱动的洞察和自然语言处理引入了一种新的、直观的方式来与Excel的功能交互。
- en: The Need for Human Oversight
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 需要人类监督
- en: Despite its advanced capabilities, Copilot is not a substitute for human expertise.
    Users must possess the necessary skills to validate and interpret Copilot's results,
    as it augments human intelligence rather than replacing it. In addition, like
    every AI it can have hallucinations.
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管Copilot功能先进，但它不能替代人类的专业知识。用户必须具备验证和解释Copilot结果的必要技能，因为它增强的是人类智能，而不是取代它。此外，像所有AI一样，它也可能出现幻觉。
- en: '![A screenshot of a computer  Description automatically generated](image_rsrc1ND.jpg)'
  id: totrans-510
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图  描述自动生成](image_rsrc1ND.jpg)'
- en: 'In the picture: an example of the use of Copilot Pro to analyze and visualize
    data. On the right, there is the chat, and Copilot is answering there.'
  id: totrans-511
  prefs: []
  type: TYPE_NORMAL
  zh: 图片中：Copilot Pro用于分析和可视化的一个示例。在右侧，是聊天窗口，Copilot在那里回答。
- en: Suggestions for Utilizing Copilot Pro in Excel
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中利用Copilot Pro的建议
- en: 'Working with Table-Formatted Data: Input or convert your data into a table
    format for optimal Copilot functionality.'
  id: totrans-513
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与表格格式数据一起工作：将你的数据输入或转换为表格格式以实现Copilot的最佳功能。
- en: 'Utilizing the Copilot Panel: Access the panel and enter natural language commands
    for data analysis.'
  id: totrans-514
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用Copilot面板：访问面板并输入自然语言命令进行数据分析。
- en: 'Identifying Insights and Trends: Ask Copilot to analyze data sets for hidden
    trends and anomalies.'
  id: totrans-515
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 识别洞察和趋势：请Copilot分析数据集以发现隐藏的趋势和异常。
- en: 'Managing Timeframes: Use Copilot for quick adjustments in data timeframes.'
  id: totrans-516
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 管理时间范围：使用Copilot进行数据时间范围的快速调整。
- en: 'Creating and Customizing Visualizations: Request specific types of charts and
    further customize them as needed.'
  id: totrans-517
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建和自定义可视化：请求特定类型的图表并根据需要进一步自定义。
- en: 'Leveraging Machine Learning for Formatting: Apply conditional formatting and
    receive smart suggestions for data presentation.'
  id: totrans-518
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 利用机器学习进行格式化：应用条件格式并接收数据展示的智能建议。
- en: 'Simplifying Complex Excel Functions: Use Copilot for creating pivot tables
    and generating complex formulas.'
  id: totrans-519
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 简化复杂的Excel函数：使用Copilot创建数据透视表和生成复杂的公式。
- en: 'Forecasting and What-if Analysis: Experiment with different scenarios and predictive
    analysis.'
  id: totrans-520
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预测和假设分析：尝试不同的场景和预测分析。
- en: 'Using Natural Language for Data Queries: Interact with Copilot using conversational
    language for data queries.'
  id: totrans-521
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用自然语言进行数据查询：使用对话语言与Copilot进行数据查询。
- en: 'Receiving Visualization Recommendations: Get advice on the most suitable visualizations
    for your data.'
  id: totrans-522
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接收可视化推荐：获取最适合你数据的可视化建议。
- en: 'Augmenting Existing Excel Features: Enhance your Excel experience by combining
    Copilot with traditional functions.'
  id: totrans-523
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 增强现有Excel功能：通过将Copilot与传统功能相结合来增强你的Excel体验。
- en: 'Validating Copilot Outputs: Always review and validate Copilot’s outputs, ensuring
    they align with your data understanding.'
  id: totrans-524
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 验证Copilot输出：始终审查和验证Copilot的输出，确保它们与你的数据理解一致。
- en: Conclusion
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Copilot Pro in Excel is a transformative tool that simplifies and enhances data
    analysis and visualization, catering to both casual and expert users. By leveraging
    its features effectively, users can improve productivity, gain deeper insights,
    and make more informed decisions, truly capitalizing on the vast capabilities
    of Excel.
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的Copilot Pro是一个变革性的工具，它简化并增强了数据分析与可视化，适用于普通用户和专家用户。通过有效利用其功能，用户可以提高生产力，获得更深入的洞察，并做出更明智的决策，真正发挥Excel的强大功能。
- en: 'Chapter 4.2: Plug-ins of Excel based on ChatGPT'
  id: totrans-527
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4.2章：基于ChatGPT的Excel插件
- en: One plugin is the AI-aided Formula Editor, a groundbreaking tool designed to
    simplify and enhance the formula creation and understanding process in Excel.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一个插件是AI辅助公式编辑器，这是一个旨在简化并增强Excel中公式创建和理解过程的突破性工具。
- en: 'AI-aided Formula Editor: An Overview'
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: AI辅助公式编辑器：概述
- en: '1\. Accessibility and Installation:'
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 可访问性和安装：
- en: The AI-aided Formula Editor is readily accessible and free to download from
    the add-ins store, found under the “Home” tab in Excel > add-ins > more add-ins.
  id: totrans-531
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI辅助公式编辑器可以从插件商店轻松访问并免费下载，位于Excel的“主页”选项卡下 > 插件 > 更多插件。
- en: Users can easily locate the add-in by searching for the “AI formula editor”.
  id: totrans-532
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户可以通过搜索“AI公式编辑器”轻松找到该插件。
- en: '2\. Interface Integration:'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 界面集成：
- en: Once installed, the editor integrates seamlessly into Excel, adding a dedicated
    tab to the Excel ribbon. This tab serves as the launchpad for the formula editor.
  id: totrans-534
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装后，编辑器无缝集成到Excel中，在Excel界面上添加了一个专用选项卡。此选项卡作为公式编辑器的启动平台。
- en: The editor itself manifests as a pane on the right-hand side of the Excel window.
    This pane can be adjusted for size or even detached from the main window for convenience.
  id: totrans-535
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编辑器本身表现为Excel窗口右侧的一个面板。此面板可以调整大小，甚至可以为了方便从主窗口中分离出来。
- en: Utilizing the AI-aided Formula Generator
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 利用AI辅助公式生成器
- en: '1\. Creating Formulas:'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 创建公式：
- en: The core functionality of this tool is its ability to generate formulas based
    on plain English descriptions. For instance, if a user has sales data and needs
    to count sales over $3000 in the 'Components' category, they can simply describe
    this requirement in the editor.
  id: totrans-538
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该工具的核心功能是其根据普通英语描述生成公式的能力。例如，如果一个用户有销售数据并且需要计算“组件”类别中超过$3000的销售，他们可以在编辑器中简单地描述这一需求。
- en: Upon submitting the description, the AI processes the request and returns an
    appropriate Excel formula. The process is initiated either by clicking the 'Submit'
    button or using a keyboard shortcut like CTRL+ENTER.
  id: totrans-539
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在提交描述后，AI处理请求并返回适当的Excel公式。此过程可以通过点击“提交”按钮或使用如CTRL+ENTER之类的键盘快捷键来启动。
- en: '2\. Understanding Formulas:'
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 理解公式：
- en: Beyond formula generation, the AI editor also excels in explaining existing
    formulas. By selecting a formula and using the comment icon, users can access
    detailed explanations for the selected formulas.
  id: totrans-541
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 除了公式生成之外，AI编辑器在解释现有公式方面也表现出色。通过选择一个公式并使用评论图标，用户可以访问所选公式的详细解释。
- en: This feature is particularly beneficial for understanding and troubleshooting
    complex formulas.
  id: totrans-542
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此功能特别有利于理解和调试复杂公式。
- en: Advanced Features and Functionalities
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 高级功能和功能
- en: '1\. Formula Formatting and Optimization:'
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 公式格式化和优化：
- en: The editor not only generates but also formats formulas for better readability.
    It neatly organizes long and complex formulas into multiple lines with appropriate
    indentation.
  id: totrans-545
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编辑器不仅生成公式，还格式化公式以提高可读性。它将长而复杂的公式整齐地组织成多行，并使用适当的缩进来排列。
- en: If a formula can be optimized or simplified, the editor highlights this with
    a visual cue (a yellow wavy line) and suggests alternatives. It even provides
    links to tutorials for further learning.
  id: totrans-546
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果一个公式可以被优化或简化，编辑器会通过视觉提示（一条黄色波浪线）来突出显示，并建议替代方案。它甚至提供链接到教程以供进一步学习。
- en: '2\. Error Identification and Correction:'
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 错误识别和纠正：
- en: A proactive feature of the tool is its ability to identify errors in real-time,
    explaining the nature of the error and suggesting corrections.
  id: totrans-548
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具的一个主动功能是其实时识别错误的能力，解释错误的性质并建议纠正措施。
- en: Limitations and Considerations
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 局限性和注意事项
- en: '1\. AI Tool Limitations:'
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 1. AI工具限制：
- en: The AI behind the formula editor, based on OpenAI Codex (a version of ChatGPT
    for writing codes), may not be familiar with certain new Excel functions introduced
    post-2021, such as TEXTSPLIT.
  id: totrans-551
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公式编辑器背后的AI，基于OpenAI Codex（ChatGPT编写代码的版本），可能不熟悉2021年之后引入的某些新Excel函数，例如TEXTSPLIT。
- en: While it can handle requests involving these newer functions if explicitly asked,
    it may not suggest them proactively.
  id: totrans-552
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然它可以在明确要求的情况下处理涉及这些新功能的需求，但它可能不会主动建议这些功能。
- en: '2\. Excel Version Requirements:'
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 2. Excel 版本要求：
- en: The add-in is built with specific technical requirements, meaning some functionalities
    may be limited or unavailable in older Excel versions or certain operating systems.
  id: totrans-554
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 该插件是根据特定的技术要求构建的，这意味着某些功能可能在较旧的 Excel 版本或某些操作系统上受到限制或不可用。
- en: Subscription Plans
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 订阅计划
- en: The AI-aided Formula Editor offers a Default Basic Plan, which is free but offers
    limited AI features. For full access to all AI capabilities, users can opt for
    the Pro Plan, a paid subscription offering unlimited use of all AI features and
    other benefits.
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: AI 辅助公式编辑器提供默认的基本计划，该计划免费但提供有限的 AI 功能。要完全访问所有 AI 功能，用户可以选择专业计划，这是一个付费订阅，提供无限使用所有
    AI 功能和其他好处。
- en: '![A screenshot of a computer  Description automatically generated](image_rsrc1NE.jpg)'
  id: totrans-557
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图 自动生成描述](image_rsrc1NE.jpg)'
- en: 'In the picture: a simple example of the use of Formula Editor, the AI provided
    a formula from the request in natural language.'
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 图片中：公式编辑器使用的一个简单示例，AI 从自然语言请求中提供了一个公式。
- en: Conclusion
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: The AI-aided Formula Editor in Excel represents a significant leap in spreadsheet
    management, offering intuitive, user-friendly tools to generate, understand, and
    optimize Excel formulas. While it comes with certain limitations, its ability
    to interpret natural language and provide clear explanations of complex formulas
    makes it an invaluable asset for both novice and experienced Excel users. This
    plugin, powered by advanced AI technology like GPT-4, is a testament to the evolving
    landscape of office productivity tools, where AI is increasingly playing a pivotal
    role.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的 AI 辅助公式编辑器在电子表格管理方面实现了重大飞跃，提供了直观、用户友好的工具来生成、理解和优化 Excel 公式。虽然它有一些限制，但其解释自然语言并提供复杂公式的清晰解释的能力，使其对新手和经验丰富的
    Excel 用户都非常有价值。这个由 GPT-4 等先进 AI 技术驱动的插件，是办公生产力工具不断发展的证明，其中 AI 正在日益扮演关键角色。
- en: 'Chapter 4.3: Excel files in ChatGPT Plus'
  id: totrans-561
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 4.3 章：ChatGPT Plus 中的 Excel 文件
- en: In this chapter, we'll delve into the expansive possibilities that arise when
    combining the capabilities of ChatGPT Plus with Excel files. This integration
    marks a significant step forward in the realm of AI-enhanced productivity and
    data analysis. Let's explore these features in a detailed, yet simple and comprehensive
    manner.
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将深入探讨当将 ChatGPT Plus 的功能与 Excel 文件结合时出现的广泛可能性。这种集成标志着 AI 增强生产力与数据分析领域向前迈出的重要一步。让我们以详细、简单且全面的方式探索这些功能。
- en: Uploading and Reading Excel Files in ChatGPT Plus
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 在 ChatGPT Plus 中上传和读取 Excel 文件
- en: 'ChatGPT Plus Subscription: To start, it''s essential to understand that ChatGPT
    Plus, a premium subscription of ChatGPT, offers enhanced functionalities over
    the standard version. This includes the ability to read and interpret Excel files
    directly within the chat interface at chat.openai.com.'
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus 订阅：首先，重要的是要理解 ChatGPT Plus 是 ChatGPT 的一个高级订阅，它提供了比标准版本增强的功能。这包括在
    chat.openai.com 的聊天界面中直接读取和解释 Excel 文件的能力。
- en: 'How It Works: As a ChatGPT Plus subscriber, you can upload Excel files directly
    into the chat. This feature is enabled once you have activated your chat with
    GPT-4\. The AI can then read the contents of these files, providing a new level
    of interaction and data manipulation. This capability is particularly useful for
    those who work with complex datasets and require quick insights or assistance
    in data processing.'
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 工作原理：作为 ChatGPT Plus 订阅者，您可以直接将 Excel 文件上传到聊天中。一旦您激活了与 GPT-4 的聊天，此功能即被启用。AI
    可以读取这些文件的内容，提供新的交互和数据操作级别。这种能力对于处理复杂数据集并需要快速洞察或数据处理帮助的人来说特别有用。
- en: Enabling ChatGPT with Plugins
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 启用 ChatGPT 插件
- en: 'Access to Plugins: ChatGPT Plus goes beyond simple text interactions. By enabling
    ChatGPT with Plugins in the beta settings (accessible through your profile), you
    unlock access to a vast array of over 1000 plugins. These plugins significantly
    enhance the AI''s capabilities, especially in terms of creating and manipulating
    Excel files. However, they are being in some cases dismissed, but in other circumstances,
    they still have more functionalities than GPTs. Anyway, both are integrated with
    the interface of ChatGPT 4 on the official site, chat.openai.com.'
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 插件访问权限：ChatGPT Plus 不仅仅局限于简单的文本交互。通过在测试设置中启用 ChatGPT 的插件（通过您的个人资料访问），您可以解锁超过
    1000 个插件的访问权限。这些插件显著增强了 AI 的能力，尤其是在创建和操作 Excel 文件方面。然而，在某些情况下，它们被忽视，但在其他情况下，它们仍然比
    GPT 具有更多功能。无论如何，它们都与 ChatGPT 4 在官方网站 chat.openai.com 的界面集成。
- en: 'How Plugins Enhance Excel File Handling: With the right plugins, ChatGPT can
    assist in generating new Excel files, crafting intricate graphs, and creating
    detailed sheets. This ability transforms the AI into a powerful tool for data
    analysis and visualization.'
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 插件如何增强 Excel 文件处理：有了合适的插件，ChatGPT 可以帮助生成新的 Excel 文件，制作复杂的图表，并创建详细的表格。这种能力将 AI
    转变为数据分析可视化的强大工具。
- en: 'Example Plugin: Access Google Sheets'
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 示例插件：访问 Google Sheets
- en: 'Functionality: One standout example of these plugins is the “Access Google
    Sheets” plugin. To use this, you first need to upload your Excel file to Google
    Sheets and set it to be accessible to everyone under the “Share” option. Then,
    paste the URL of the  Google Sheet in ChatGPT with the enabled plugin.'
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 功能性：这些插件中一个突出的例子是“访问 Google Sheets”插件。要使用它，你首先需要将你的 Excel 文件上传到 Google Sheets，并在“共享”选项下将其设置为对所有人可访问。然后，使用已启用的插件，将
    Google Sheets 的 URL 粘贴到 ChatGPT 中。
- en: 'Natural Language Processing: Once set up, you can converse with ChatGPT about
    your spreadsheet in natural language. This feature allows for advanced insights
    and data manipulations without the need for complex formulas or manual data analysis.'
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理：一旦设置好，您就可以用自然语言与 ChatGPT 讨论您的电子表格。此功能允许进行高级见解和数据操作，无需复杂的公式或手动数据分析。
- en: Customized GPTs for Excel
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 定制 GPT 用于 Excel
- en: 'Thousands of Customized GPTs: ChatGPT Plus also provides access to thousands
    of GPTs through the dedicated store, each customized for specific tasks and powered
    by GPT-4 Turbo. These specialized GPTs have targeted knowledge and functionalities,
    making them extremely versatile for various applications, including Excel file
    handling.'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 数千种定制 GPT：ChatGPT Plus 还通过专用商店提供数千种 GPT 的访问权限，每个 GPT 都针对特定任务定制，并由 GPT-4 Turbo
    驱动。这些专业 GPT 具有针对性的知识和功能，使它们在包括 Excel 文件处理在内的各种应用中极为灵活。
- en: '![A qr code on a white background  Description automatically generated](image_rsrc1NF.jpg)Sheet
    Maker - A Notable GPT for Excel: An exemplary GPT in this regard is “Sheet Maker,”
    available through aidocmaker.com. This platform offers both free and paid subscriptions
    and is specifically designed for handling Excel files and other documents. You
    can add it with the QR code on the right.'
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: '![白色背景上的二维码  描述自动生成](image_rsrc1NF.jpg)电子表格制作器 - 一个值得注意的 Excel GPT：在这方面的一个典型例子是“电子表格制作器”，可通过
    aidocmaker.com 获取。该平台提供免费和付费订阅，专门设计用于处理 Excel 文件和其他文档。您可以通过右侧的二维码添加它。'
- en: 'Web Search Capabilities: What sets Sheet Maker apart is its ability to not
    only process documents but also search the web for relevant information. This
    feature is invaluable for enriching Excel files with the most current data and
    insights.'
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 网络搜索功能：使电子表格制作器与众不同的能力是它不仅能够处理文档，还能在网络上搜索相关信息。此功能对于用最新数据和见解丰富 Excel 文件来说是无价的。
- en: Conclusion
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: The integration of ChatGPT Plus with Excel files represents a leap forward in
    the way we handle and analyze data. The ability to upload and read Excel files,
    use specialized plugins, and access customized GPTs like Sheet Maker, opens up
    a world of possibilities for simplifying complex data tasks, enhancing productivity,
    and making informed decisions based on advanced AI-driven insights. Whether for
    business analytics, research, or personal data management, the combination of
    ChatGPT Plus and Excel is a powerful tool that brings the future of data analysis
    and AI assistance into the present.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT Plus与Excel文件的集成代表着我们在处理和分析数据方式上的重大进步。能够上传和读取Excel文件、使用专用插件以及访问定制化的GPT，如Sheet
    Maker，为简化复杂的数据任务、提高生产力和基于先进的AI驱动的洞察力做出明智决策开辟了无限可能。无论用于商业分析、研究还是个人数据管理，ChatGPT
    Plus与Excel的结合都是一款强大的工具，将数据分析与AI辅助的未来带入现实。
- en: 'Chapter 4.4: Case Studies: Enhancing Business Analytics with AI'
  id: totrans-578
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第四章第4.4节：案例研究：利用AI增强商业分析
- en: Introduction to Business Analytics and AI
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 商业分析与AI简介
- en: In the realm of business, analytics plays a crucial role in decision-making,
    strategy development, and overall performance improvement. The integration of
    Artificial Intelligence (AI) into this domain has revolutionized the way businesses
    approach data analysis. AI, particularly tools like ChatGPT, can process vast
    amounts of data, uncover patterns, and provide insights that are often beyond
    the capability of traditional analysis methods. This chapter delves into real-world
    case studies to illustrate how AI, in conjunction with Microsoft Excel, is transforming
    business analytics.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 在商业领域，数据分析在决策制定、战略发展和整体性能改进中发挥着至关重要的作用。人工智能（AI）的集成改变了企业处理数据分析的方式。AI，尤其是像ChatGPT这样的工具，可以处理大量数据，发现模式，并提供传统分析方法往往无法达到的见解。本章深入探讨现实世界的案例研究，以展示AI与Microsoft
    Excel的结合如何改变商业分析。
- en: 'Case Study 1: Retail Sales Analysis'
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究1：零售销售分析
- en: In our first case study, we explore a retail company that utilized ChatGPT integrated
    with Excel to analyze its sales data. The company had a comprehensive dataset
    including fields like region, product, sales date, customer demographics, quantity
    sold, revenue, and cost of goods sold.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的第一个案例研究中，我们探讨了一家利用ChatGPT与Excel集成来分析其销售数据的零售公司。该公司拥有包括地区、产品、销售日期、客户人口统计、销售数量、收入和商品销售成本在内的综合数据集。
- en: 'Data Structuring: The initial step involved organizing the data into a table
    format in Excel. This structure is crucial for ChatGPT to effectively analyze
    the data.'
  id: totrans-583
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据结构化：初始步骤涉及将数据组织成Excel中的表格格式。这种结构对于ChatGPT有效分析数据至关重要。
- en: 'Formula Generation: The retail company wanted to calculate the gross profit
    percentage for each sale. Using ChatGPT in Excel, they simply described this requirement
    in natural language. The AI then suggested the appropriate formula, which was
    added to the dataset.'
  id: totrans-584
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 公式生成：零售公司希望计算每笔销售的毛利润百分比。他们使用ChatGPT在Excel中，只需用自然语言描述这一需求。然后AI建议了适当的公式，并将其添加到数据集中。
- en: 'Advanced Analysis: Next, the company explored more complex analyzes, like identifying
    trends in customer purchasing behavior over time. ChatGPT assisted in generating
    relevant analyzes and charts by interpreting natural language queries.'
  id: totrans-585
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 高级分析：接下来，公司探索了更复杂的分析，例如识别客户购买行为随时间的变化趋势。ChatGPT通过解释自然语言查询来协助生成相关的分析和图表。
- en: 'Outcome: This approach enabled the company to gain deeper insights into their
    sales performance, identify profitable products, and adjust their strategies accordingly.'
  id: totrans-586
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结果：这种方法使公司能够更深入地了解其销售表现，识别盈利产品，并相应地调整其策略。
- en: 'Case Study 2: Financial Services Firm'
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究2：金融服务公司
- en: A financial services firm employed ChatGPT in Excel to manage and analyze investment
    portfolios. Their dataset included various financial metrics, stock performance
    data, and investment categories.
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 一家金融服务公司利用ChatGPT在Excel中管理和分析投资组合。他们的数据集包括各种财务指标、股票表现数据和投资类别。
- en: 'Portfolio Analysis: The firm used ChatGPT to calculate complex financial metrics
    through the sheet, such as rate of return and risk assessment, by simply typing
    their requirements.'
  id: totrans-589
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 投资组合分析：该公司使用ChatGPT通过表格计算复杂的财务指标，如回报率和风险评估，只需简单地输入他们的需求。
- en: 'Predictive Insights: Utilizing the AI''s capability, the firm was able to model
    different investment scenarios and predict future performance.'
  id: totrans-590
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预测洞察：利用人工智能的能力，该公司能够模拟不同的投资场景并预测未来的表现。
- en: 'Outcome: This led to more informed decision-making and a better understanding
    of the risk-return profile of their investment portfolios.'
  id: totrans-591
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结果：这导致了更明智的决策和对其投资组合风险回报特征的更好理解。
- en: 'Case Study 3: Manufacturing Sector Efficiency'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 案例研究3：制造业效率
- en: In the manufacturing sector, a company used ChatGPT in Excel to optimize their
    production process. Their dataset included machine efficiency rates, production
    volumes, maintenance schedules, and labor costs.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 在制造业，一家公司使用ChatGPT在Excel中优化其生产流程。他们的数据集包括机器效率率、生产量、维护计划和劳动力成本。
- en: 'Process Optimization: The company used ChatGPT to analyze machine efficiency
    and identify bottlenecks in its production process.'
  id: totrans-594
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 流程优化：该公司使用ChatGPT分析机器效率并确定其生产过程中的瓶颈。
- en: 'Cost Analysis: The AI helped calculate the cost implications of different production
    scenarios, aiding in budgeting and financial planning.'
  id: totrans-595
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成本分析：人工智能帮助计算不同生产场景的成本影响，有助于预算和财务规划。
- en: 'Outcome: As a result, the company was able to streamline its production process,
    reduce costs, and improve overall efficiency.'
  id: totrans-596
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结果：因此，公司能够优化其生产流程，降低成本，并提高整体效率。
- en: 'Conclusion: The Transformative Impact of AI on Business Analytics'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：人工智能对商业分析的变革性影响
- en: These case studies demonstrate the transformative impact of AI on business analytics.
    By integrating ChatGPT with Excel, businesses across various sectors can conduct
    more sophisticated analyzes, gain valuable insights, and make more data-driven
    decisions. As AI technology continues to evolve, its potential to further enhance
    business analytics is vast and promising.
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 这些案例研究展示了人工智能对商业分析的变革性影响。通过将ChatGPT与Excel集成，各行业的公司可以进行更复杂的数据分析，获得宝贵的见解，并做出更基于数据的决策。随着人工智能技术的持续发展，其在进一步提升商业分析方面的潜力巨大且充满希望。
- en: Looking Ahead
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 展望未来
- en: As we look to the future, the integration of AI in business analytics is expected
    to become more seamless and powerful. With advancements in AI capabilities and
    user-friendly interfaces, even those with limited technical expertise will be
    able to leverage these tools for sophisticated data analysis, enhancing productivity
    and strategic decision-making in the business world.
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们展望未来，人工智能在商业分析中的集成预计将变得更加无缝和强大。随着人工智能能力的提升和用户友好的界面，即使是技术知识有限的人也能利用这些工具进行复杂的数据分析，从而提高商业世界的生产力和战略决策。
- en: Microsoft Teams and Outlook Enhanced with ChatGPT
  id: totrans-601
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 带ChatGPT增强的Microsoft Teams和Outlook
- en: In today's digitally-driven workplace, effective communication and efficient
    meeting management are more crucial than ever. With the integration of ChatGPT
    into Microsoft Teams and Outlook, the landscape of workplace collaboration and
    email communication is undergoing a transformative shift. This chapter delves
    into the innovative enhancements that ChatGPT brings to Microsoft Teams and Outlook,
    two of the most widely used tools in the Office 365 suite. Unlike other tools,
    these two don’t have plugins or integration with ChatGPT Plus, but they are only
    accessible with Microsoft Copilot Pro with school and business accounts. Furthermore,
    as of the time of writing Outlook only works with emails provided by Microsoft
    itself like @outlook.com.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今以数字驱动的办公环境中，有效的沟通和高效的会议管理比以往任何时候都更加重要。随着ChatGPT集成到Microsoft Teams和Outlook中，工作场所协作和电子邮件通信的格局正在经历一场变革性的转变。本章深入探讨了ChatGPT为Microsoft
    Teams和Outlook带来的创新增强功能，这两者都是Office 365套件中最广泛使用的工具之一。与其他工具不同，这两个工具没有插件或与ChatGPT
    Plus的集成，但它们仅可通过带有学校和企业账户的Microsoft Copilot Pro访问。此外，截至写作时，Outlook仅能与Microsoft本身提供的电子邮件（如@outlook.com）一起使用。
- en: In this chapter, you will find detailed insights into how this tool, powered
    by ChatGPT, is redefining collaboration and communication in the modern workplace.
    We will cover practical examples, user experiences, and tips to maximize the benefits
    of these AI-enhanced features. Whether you're a seasoned professional or new to
    Office 365, this chapter will equip you with knowledge and skills to leverage
    the full potential of Microsoft Teams and Outlook, enhanced by the power of ChatGPT.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，您将找到关于这个由ChatGPT驱动的工具如何重新定义现代工作场所中的协作和沟通的详细见解。我们将涵盖实际案例、用户体验和技巧，以最大化这些AI增强功能的益处。无论您是经验丰富的专业人士还是Office
    365的新用户，本章都将为您提供利用Microsoft Teams和Outlook全部潜力的知识和技能，这些应用都得到了ChatGPT的增强。
- en: 'Chapter 5.1: Integrating ChatGPT in Teams for Improved Collaboration'
  id: totrans-604
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5.1章：将ChatGPT集成到团队中以提高协作
- en: Microsoft Teams, a cornerstone of corporate communication and collaboration,
    has witnessed a significant enhancement with the incorporation of Microsoft Copilot
    Pro. This chapter delves into how Copilot can be integrated into Microsoft Teams
    to improve collaboration, streamline communication, and enhance overall team productivity.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 微软Teams作为企业沟通和协作的基石，随着微软Copilot Pro的整合而得到了显著提升。本章深入探讨了如何将Copilot集成到Microsoft
    Teams中，以改善协作、简化沟通并提高整体团队的生产力。
- en: 1\. Enhanced Communication
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 提高沟通效率
- en: With Copilot Pro integrated, Teams users can experience more efficient communication.
    The AI can assist in drafting messages, responding to queries, and even summarizing
    conversations. This is particularly useful in channels with high volumes of messages
    where key information might be lost.
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 集成了Copilot Pro后，Teams用户可以体验到更高效的沟通。AI可以帮助撰写信息、回复查询，甚至总结对话。这在消息量大的频道中尤其有用，因为关键信息可能会丢失。
- en: 2\. Meeting Summaries and Analysis
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 会议总结和分析
- en: One of the standout features of Copilot's integration is its ability to provide
    summaries and analyzes of meetings. The AI can process the transcript of a Teams
    meeting, extract key points, decisions made, and action items. This is especially
    beneficial for those who missed the meeting or need to revisit specific discussions.
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot集成的一个突出特点是它能够提供会议的总结和分析。AI可以处理Teams会议的记录，提取关键点、做出的决策和行动项。这对那些错过了会议或需要回顾特定讨论的人来说特别有益。
- en: 3\. Q&A Assistance
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 问答协助
- en: During live meetings, Copilot Pro can function as an interactive assistant.
    Participants can ask questions directly to the AI, which can provide instant responses
    based on the meeting's content, historical data, or general knowledge. This feature
    enhances the meeting's interactivity and ensures that information retrieval is
    seamless and efficient.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 在现场会议期间，Copilot Pro可以作为互动助手。参与者可以直接向AI提问，AI可以根据会议内容、历史数据或一般知识提供即时响应。这一功能增强了会议的互动性，并确保信息检索无缝且高效。
- en: 4\. Task Management
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 4. 任务管理
- en: Copilot can help in managing tasks that emerge from Teams conversations. Understanding
    the context and content of discussions, it can suggest and even help create tasks
    in Microsoft Planner or To-Do, directly linking action items to the respective
    discussions.
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot可以帮助管理从Teams对话中产生的任务。通过理解讨论的上下文和内容，它可以建议甚至帮助在Microsoft Planner或To-Do中创建任务，直接将行动项链接到相应的讨论。
- en: Benefits and Challenges
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 益处和挑战
- en: Benefits
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 益处
- en: 'Increased Efficiency: Automating responses and summarizing information saves
    time and effort.'
  id: totrans-616
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高效率：自动化响应和总结信息节省时间和精力。
- en: 'Improved Accessibility of Information: Key information from meetings and conversations
    is easily retrievable.'
  id: totrans-617
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高信息获取的便捷性：会议和对话中的关键信息易于检索。
- en: 'Enhanced Collaboration: Teams can collaborate more effectively with real-time
    assistance and information retrieval.'
  id: totrans-618
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高协作：团队可以借助实时协助和信息检索更有效地协作。
- en: Challenges
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战
- en: 'Learning Curve: Some users might find it challenging to adapt to interacting
    with an AI in their daily workflows.'
  id: totrans-620
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习曲线：一些用户可能会发现适应在日常工作中与AI交互具有挑战性。
- en: 'Accuracy Concerns: AI responses might not always be accurate, so it''s important
    to use them as a guide rather than a definitive source.'
  id: totrans-621
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 准确性担忧：AI的回应可能并不总是准确的，因此将其用作指南而不是最终来源是很重要的。
- en: '![A screenshot of a video call  Description automatically generated](image_rsrc1NG.jpg)'
  id: totrans-622
  prefs: []
  type: TYPE_IMG
  zh: '![视频通话截图，描述自动生成](image_rsrc1NG.jpg)'
- en: 'In the picture: Copilot chat interface during a meeting in Teams.'
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 图片中：在Teams会议中的Copilot聊天界面。
- en: 'Source: Microsoft website'
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Microsoft 网站
- en: 'Chapter 5.2: Fireflies.AI in Microsoft Teams'
  id: totrans-625
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 5.2 章：Fireflies.AI 在 Microsoft Teams 中的应用
- en: Introduction
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 简介
- en: Fireflies.ai is a renowned tool for recording and transcribing meetings. Its
    capability to function across multiple web-conferencing platforms, including Microsoft
    Teams, makes it a versatile choice for many users. Particularly appealing is its
    mobile app for Android users, allowing recordings and interviews on the go.
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: Fireflies.ai 是一款知名的会议录制和转录工具。它能够在多个网络会议平台（包括 Microsoft Teams）上运行，使其成为许多用户的灵活选择。特别是其针对
    Android 用户的应用程序，允许用户在移动中录制和进行访谈。
- en: Integration with Microsoft Teams
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 与 Microsoft Teams 的集成
- en: Integrating Fireflies.ai with Microsoft Teams enhances meeting productivity.
    Users can invite Fireflies Bot to meetings, enabling real-time recording and transcription.
    This feature is crucial for capturing insights, which can be reviewed later or
    shared with team members. The sentiment analysis feature of Fireflies.ai stands
    out, allowing users to identify positive, negative, and neutral tones in meetings
    effortlessly.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 将 Fireflies.ai 与 Microsoft Teams 集成可提升会议生产力。用户可以邀请 Fireflies Bot 参与会议，实现实时录制和转录。此功能对于捕捉洞察力至关重要，这些洞察力可以稍后回顾或与团队成员分享。Fireflies.ai
    的情感分析功能尤为突出，使用户能够轻松识别会议中的积极、消极和中性语气。
- en: Pricing and Plans
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 定价和计划
- en: Fireflies.ai offers a range of plans, from a free forever option to more advanced
    subscriptions. Each plan caters to different user needs, from individual users
    to large enterprises. While the pricing is competitive, it's worth noting that
    even basic transcription needs might require the Pro plan, which could be a consideration
    for individuals or smaller teams.
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: Fireflies.ai 提供了一系列计划，从永久免费的选项到更高级的订阅。每个计划都针对不同的用户需求，从个人用户到大型企业。虽然定价具有竞争力，但值得注意的是，即使是基本的转录需求可能也需要
    Pro 计划，这可能对个人或小型团队来说是一个考虑因素。
- en: Technical Details and Deployment
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 技术细节和部署
- en: Fireflies.ai supports various platforms like Windows, Ubuntu, Linux, macOS,
    and is accessible through compatible browsers. Its cloud-based nature means no
    hardware setup is needed, making it accessible anywhere with an internet connection.
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: Fireflies.ai 支持多种平台，如 Windows、Ubuntu、Linux、macOS，并通过兼容的浏览器访问。其基于云的特性意味着无需硬件设置，只要有互联网连接即可在任何地方访问。
- en: User Interface and Experience
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 用户界面和体验
- en: While Fireflies.ai offers a plethora of features, its user interface might seem
    overwhelming at first, especially for beginners. The initial learning curve involves
    understanding various features and how they interplay for maximum productivity.
    Users might find the interface cluttered, but with familiarity, it becomes more
    manageable.
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Fireflies.ai 提供了众多功能，但其用户界面可能一开始会显得令人眼花缭乱，尤其是对于初学者。初始的学习曲线包括理解各种功能及其如何相互作用以实现最大生产力。用户可能会觉得界面杂乱，但随着熟悉度的提高，它变得更加易于管理。
- en: Accuracy and Functionality
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 准确性和功能
- en: The accuracy of Fireflies.AI's transcription is commendable, around 90%, but
    it's not without errors. It effectively transcribes spoken words into text across
    30+ languages, but users may need to do some proofreading.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: Fireflies.AI 的转录准确度值得称赞，约为 90%，但并非没有错误。它能够有效地将 30 多种语言的口语转录成文本，但用户可能需要进行一些校对。
- en: Collaboration and AI Super Summaries
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 协作和 AI 超级摘要
- en: Collaboration is a strong suit of Fireflies.ai, allowing team members to share
    and comment on transcribed meetings. The AI Super Summary feature, although an
    added cost, provides personalized meeting summaries and action items, enhancing
    the utility of transcribed meetings. It is in some cases a valid substitute for
    Microsoft Copilot Pro.
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 协作是 Fireflies.ai 的强项，允许团队成员共享和评论转录的会议。尽管 AI 超级摘要功能需要额外付费，但它提供了个性化的会议摘要和行动项目，增强了转录会议的实用性。在某些情况下，它甚至可以成为
    Microsoft Copilot Pro 的有效替代品。
- en: Support
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 支持
- en: The customer support of Fireflies.AI, including a live chat feature and email
    support, is responsive, although it lacks phone support. Users can expect quick
    answers via live chat.
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: Fireflies.AI 的客户支持包括实时聊天功能和电子邮件支持，响应迅速，尽管缺乏电话支持。用户可以通过实时聊天期待快速回复。
- en: '![A screenshot of a computer  Description automatically generated](image_rsrc1NH.jpg)'
  id: totrans-642
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图，自动生成描述](image_rsrc1NH.jpg)'
- en: 'In the picture: Fireflies.AI at work.'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 图片：Fireflies.AI 在工作中。
- en: 'Source: Fireflies.AI website'
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Fireflies.AI 网站
- en: Conclusion
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: Fireflies.ai in Microsoft Teams is a potent tool for enhancing meeting productivity
    through effective transcription and collaboration. While it has a learning curve
    and some limitations in pricing and user interface, its comprehensive features,
    accuracy, and security make it a valuable addition for users seeking to enhance
    their meeting experience in Teams.
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: Fireflies.ai在Microsoft Teams中是一个强大的工具，通过有效的转录和协作来提高会议生产力。尽管它有一个学习曲线，并且在定价和用户界面方面存在一些限制，但其全面的功能、准确性和安全性使其成为寻求在Teams中提升会议体验的用户的有价值补充。
- en: 'Chapter 5.3: Copilot in Outlook: Revolutionizing Email Management'
  id: totrans-647
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5.3章：Outlook中的Copilot：改变电子邮件管理
- en: Introduction to Copilot in Outlook
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: Outlook中Copilot的介绍
- en: In the realm of email management, Microsoft's introduction of Copilot in Outlook
    marks a groundbreaking development, especially for those who are new to or are
    not deeply versed in the complexities of modern email systems. This advanced feature,
    which is part of the Office 365 suite, is designed to significantly enhance the
    way individuals interact with and manage their emails. To understand how Copilot
    in Outlook is revolutionizing email management, it's essential to delve into its
    core functionalities and the impact it has on everyday email tasks.
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 在电子邮件管理领域，微软在Outlook中引入Copilot标志着具有里程碑意义的发展，尤其是对于那些对现代电子邮件系统的复杂性不太熟悉或不太精通的人来说。这个作为Office
    365套件一部分的高级功能旨在显著提高个人与电子邮件互动和管理的方式。要了解Outlook中的Copilot如何改变电子邮件管理，深入了解其核心功能及其对日常电子邮件任务的影响是至关重要的。
- en: Key Functionalities of Copilot in Outlook
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: Outlook中Copilot的关键功能
- en: 'Preparation for Meetings: Copilot in Outlook is a smart tool that aids in preparing
    for upcoming meetings. It accomplishes this by sifting through relevant emails,
    invitation details, and related documents to create a synthesized summary. This
    summary is highly beneficial for users, especially beginners, as it allows them
    to quickly review the most pertinent information and attend meetings well-prepared.'
  id: totrans-651
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 会议准备：Outlook中的Copilot是一个智能工具，有助于为即将到来的会议做准备。它通过筛选相关电子邮件、邀请详情和相关文档来创建综合摘要。这个摘要对用户特别有益，尤其是对初学者来说，因为它允许他们快速查看最相关的信息，并做好充分准备参加会议。
- en: 'Navigating Email Threads: Email threads, particularly lengthy ones, can be
    challenging to manage. Copilot in Outlook eases this burden by providing summaries
    of these threads. It extracts crucial information and suggests actionable steps,
    such as setting up follow-up meetings. This feature is particularly useful for
    those who may feel overwhelmed by bulky email conversations, as it offers a streamlined
    view of the most important points.'
  id: totrans-652
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 导航电子邮件线程：电子邮件线程，尤其是较长的线程，可能难以管理。Outlook中的Copilot通过提供这些线程的摘要来减轻这一负担。它提取关键信息并建议可执行步骤，例如安排后续会议。这个功能对那些可能觉得大量电子邮件对话令人不知所措的人来说特别有用，因为它提供了一个对最重要点的简化视图。
- en: 'Drafting Emails with Guidance: Copilot in Outlook also assists in creating
    impactful emails. When drafting a message, it offers suggestions on clarity and
    tone, ensuring that the email is effective and appropriate for its intended audience.
    This is particularly helpful for beginners or those not confident in their email
    writing skills.'
  id: totrans-653
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在指导下撰写电子邮件：Outlook中的Copilot还帮助创建有影响力的电子邮件。在撰写信息时，它提供关于清晰度和语调的建议，确保电子邮件对目标受众有效且适当。这对初学者或那些对自己电子邮件写作技能不自信的人来说特别有帮助。
- en: 'Sensitive Topics: When dealing with sensitive subjects, Copilot can guide users
    in conveying the information effectively, ensuring that the message is clear yet
    considerate.'
  id: totrans-654
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 敏感话题：在处理敏感话题时，Copilot可以指导用户有效地传达信息，确保信息清晰且考虑周到。
- en: 'Time-Sensitive Communications: In situations where a quick response is necessary,
    Copilot helps in composing clear and concise emails under tight deadlines.'
  id: totrans-655
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间敏感的通讯：在需要快速响应的情况下，Copilot帮助在紧张的截止日期内撰写清晰简洁的电子邮件。
- en: Technical Aspects and User Privacy
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 技术方面和用户隐私
- en: 'A significant concern for users, especially those new to AI tools, is privacy
    and data security. Copilot in Outlook addresses these concerns in several ways:'
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 对于用户来说，尤其是那些刚开始使用AI工具的用户，一个重要的关注点是隐私和数据安全。Outlook中的Copilot通过几种方式来解决这个问题：
- en: 'No Learning from User Data: The tool does not learn or retain user data for
    its functioning, which means personal data remains private.'
  id: totrans-658
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不从用户数据中学习：该工具在运行过程中不会学习或保留用户数据，这意味着个人数据保持私密。
- en: 'Microsoft''s Graph Technology: It leverages advanced technology to understand
    user preferences without compromising privacy.'
  id: totrans-659
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微软的Graph技术：它利用先进技术来理解用户偏好，同时不损害隐私。
- en: Experience Across Various Outlook Clients
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 在各种Outlook客户端中的体验
- en: The integration and experience of Copilot in Outlook vary depending on the version
    of the client used. Users of the modern Outlook web version will find it more
    deeply integrated compared to those using the classic desktop version. This variation
    is important for beginners to understand, as it affects the tool's availability
    and functionality.
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot在Outlook中的集成和体验因所使用的客户端版本而异。使用现代Outlook网页版的用户会发现它比使用经典桌面版的用户集成得更深。这种差异对于初学者来说很重要，因为它影响工具的可用性和功能。
- en: Limitations and Considerations
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 局限性和注意事项
- en: 'While Copilot in Outlook is a powerful tool, there are limitations and considerations
    to keep in mind:'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Outlook中的Copilot是一个强大的工具，但有一些限制和注意事项需要牢记：
- en: 'Summarization Limits: The tool has limitations on the extent to which it can
    summarize email threads.'
  id: totrans-664
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摘要限制：该工具在总结电子邮件线程的程度上存在限制。
- en: 'Judicious Use in Professional Settings: AI-generated responses should be used
    thoughtfully, particularly in a professional context.'
  id: totrans-665
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在专业设置中的谨慎使用：在专业环境中，AI生成的响应应谨慎使用。
- en: 'Authenticity Concerns with ''Sound Like Me'' Feature: An upcoming feature,
    ''Sound Like Me'', raises questions about authenticity, especially in light of
    potential phishing threats.'
  id: totrans-666
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “像我一样说话”功能的真实性担忧：即将推出的“像我一样说话”功能引发了关于真实性的问题，尤其是在潜在的钓鱼威胁的背景下。
- en: User Experiences and Practical Usage
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 用户体验和实际使用
- en: Users have reported finding the email thread summarization feature especially
    useful. However, opinions on the email draft generation feature vary, with some
    preferring to maintain a personal touch in their communications. For beginners,
    exploring these features and understanding their strengths and limitations is
    crucial for effective use.
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 用户报告称，电子邮件线程摘要功能特别有用。然而，对于电子邮件草稿生成功能的看法不一，有些人更喜欢在他们的通信中保持个人风格。对于初学者来说，探索这些功能并了解它们的优缺点对于有效使用至关重要。
- en: '![A screenshot of a computer  Description automatically generated](image_rsrc1NJ.jpg)'
  id: totrans-669
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图 描述自动生成](image_rsrc1NJ.jpg)'
- en: 'In the picture: Copilot in Outlook. Source: Microsoft website.'
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 图片：Outlook中的Copilot。来源：微软网站。
- en: Conclusion
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, Copilot in Outlook is a transformative addition to email management
    within the Office 365 suite. It brings efficiency, personalization, and a new
    level of intelligence to handling email correspondence. For beginners and seasoned
    users alike, it offers a range of functionalities from summarizing conversations
    to customizing email tone and style. However, it is essential to approach this
    tool with an understanding of its capabilities and limitations, balancing its
    advantages with a critical awareness of its potential impacts in professional
    settings.
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，Outlook中的Copilot是Office 365套件中电子邮件管理的变革性补充。它为处理电子邮件通信带来了效率、个性化和新的智能水平。对于初学者和资深用户来说，它提供了一系列功能，从总结对话到定制电子邮件语气和风格。然而，了解该工具的能力和限制，平衡其优势与对其在专业环境中潜在影响的批判性认识是至关重要的。
- en: 'Chapter 5.4: Real-World Applications of Teams and Outlook with Copilot'
  id: totrans-673
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5.4章：带有Copilot的Teams和Outlook的现实世界应用
- en: In this chapter, we explore the real-world applications of Microsoft Teams and
    Outlook when enhanced with the Copilot feature. By integrating Copilot, these
    tools become more efficient and user-friendly, transforming the professional workplace.
    We will provide concrete examples to illustrate the practical benefits of using
    Copilot in everyday office scenarios.
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了当与Copilot功能结合使用时，Microsoft Teams和Outlook在现实世界中的应用。通过集成Copilot，这些工具变得更加高效和用户友好，从而改变了专业工作场所。我们将提供具体示例来说明在日常办公场景中使用Copilot的实际好处。
- en: Microsoft Teams Enhanced with Copilot
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 增强了Copilot的Microsoft Teams
- en: Enhanced Meeting Management
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 增强会议管理
- en: Copilot in Microsoft Teams revolutionizes meeting management.
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: Microsoft Teams中的Copilot彻底改变了会议管理。
- en: 'Automated Meeting Summaries: Imagine a scenario where a team discusses a new
    marketing strategy. After the meeting, instead of spending hours compiling notes,
    the team leader uses Copilot to generate a concise summary, which includes key
    decisions, such as budget allocations and timelines, and action items like market
    research assignments.'
  id: totrans-678
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动会议摘要：想象一下这样的场景，一个团队正在讨论新的营销策略。会议结束后，而不是花费数小时整理笔记，团队领导使用Copilot生成一个简洁的摘要，其中包括关键决策，如预算分配和时间表，以及行动项目，如市场调研任务。
- en: 'Participant Engagement Analysis: In a project kick-off meeting, Copilot tracks
    and reports the speaking time of each participant. This data reveals that some
    team members were less active, prompting the leader to encourage more balanced
    participation in future meetings.'
  id: totrans-679
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 参与者参与度分析：在一个项目启动会议上，Copilot跟踪并报告每位参与者的发言时间。这些数据揭示了一些团队成员参与度较低，促使领导鼓励未来会议中更加平衡的参与。
- en: 'Decision Tracking and Task Assignment: During a brainstorming session, Copilot
    identifies and lists critical decisions, such as choosing a project name, and
    assigns related tasks to team members automatically, integrating these into Microsoft
    Planner for easy tracking.'
  id: totrans-680
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 决策跟踪和任务分配：在头脑风暴会议期间，Copilot识别并列出关键决策，如选择项目名称，并自动将相关任务分配给团队成员，并将其集成到Microsoft
    Planner中以便跟踪。
- en: Interactive Features for Enhanced Collaboration
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 提升协作的交互式功能
- en: Copilot elevates collaboration in Microsoft Teams.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: Copilot提升了Microsoft Teams中的协作。
- en: 'Real-Time Question and Answering: A team member asks Copilot, "What were the
    key points from last week''s client feedback meeting?" Copilot instantly provides
    a summarized response, helping the team member catch up quickly.'
  id: totrans-683
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实时问答：一位团队成员问Copilot，“上周客户反馈会议的关键点是什么？”Copilot立即提供总结性回复，帮助团队成员快速了解情况。
- en: 'Task Management Integration: Action items from a team meeting are directly
    linked to task management tools. For example, a task assigned to develop a client
    presentation is automatically added to the responsible person''s Microsoft Planner.'
  id: totrans-684
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任务管理集成：团队会议中的行动项目直接链接到任务管理工具。例如，分配给开发客户演示的任务会自动添加到负责人的Microsoft Planner中。
- en: Outlook Revolutionized with Copilot
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: Outlook因Copilot而革新
- en: Outlook becomes more efficient with Copilot's integration.
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: Outlook与Copilot集成后变得更加高效。
- en: Efficient Email Management
  id: totrans-687
  prefs: []
  type: TYPE_NORMAL
  zh: 高效的电子邮件管理
- en: 'Summarizing Email Threads: Consider an employee returning from vacation. Instead
    of sifting through hundreds of emails, they use Copilot to summarize the threads,
    quickly catching up on important communications and actions needed.'
  id: totrans-688
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摘要电子邮件线程：考虑一位员工休假回来。他们不是浏览数百封电子邮件，而是使用Copilot来总结线程，快速了解重要的沟通和需要采取的行动。
- en: 'Drafting Responses: An employee receives an email about a sensitive client
    issue. Copilot assists in drafting a tactful and clear response, reflecting the
    company’s tone and the employee’s personal style.'
  id: totrans-689
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 撰写回复：一位员工收到关于敏感客户问题的电子邮件。Copilot协助撰写一个得体且清晰的回复，反映公司的语气和员工的个人风格。
- en: Email Composition and Communication Enhancement
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 电子邮件撰写和沟通增强
- en: 'Sensitive Topic Guidance: When composing an email about a delicate internal
    matter, Copilot guides the user in choosing the right words and tone to ensure
    the message is conveyed respectfully and clearly.'
  id: totrans-691
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 敏感话题指导：在撰写关于微妙内部事项的电子邮件时，Copilot指导用户选择合适的词语和语气，确保信息得到尊重和清晰传达。
- en: 'Time-Sensitive Email Composition: In urgent situations, like an unexpected
    project delay, Copilot helps draft a clear, concise message to inform all stakeholders
    promptly and effectively.'
  id: totrans-692
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 紧急电子邮件撰写：在紧急情况下，如意外项目延误，Copilot帮助撰写一个清晰、简洁的消息，及时有效地通知所有利益相关者。
- en: Customizable Responses and Personal Touch
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 可定制的回复和个人风格
- en: '"Sound Like Me" Feature: A manager, known for their unique writing style, uses
    the ''Sound Like Me'' feature to draft emails. Copilot adapts to their style,
    ensuring consistency in communication even when using AI assistance.'
  id: totrans-694
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “像我一样说话”功能：一位以其独特的写作风格著称的经理使用“像我一样说话”功能来撰写电子邮件。Copilot适应他们的风格，确保即使在使用AI辅助的情况下，沟通的一致性。
- en: 'Conclusion: Copilot as a Game-Changer in Office Productivity'
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：Copilot作为办公生产力的变革者
- en: To conclude, Copilot in Microsoft Teams and Outlook significantly enhances workplace
    productivity. Through concrete examples like automated meeting summaries, efficient
    email management, and personalized communication, we see how Copilot streamlines
    daily tasks. This technology not only saves time but also ensures a high level
    of accuracy and personalization in professional communications. However, users
    should be aware of its limitations and use it thoughtfully, especially in sensitive
    situations. With ongoing enhancements, Copilot is set to become an indispensable
    tool in the modern digital workspace.
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，Microsoft Teams和Outlook中的Copilot显著提升了办公生产力。通过自动化会议摘要、高效电子邮件管理和个性化沟通等具体实例，我们看到Copilot如何简化日常任务。这项技术不仅节省了时间，还确保了专业通信中的高度准确性和个性化。然而，用户应意识到其局限性，并谨慎使用，尤其是在敏感情况下。随着持续改进，Copilot注定将成为现代数字工作空间中不可或缺的工具。
- en: 'Exploring New Frontiers: AI-Powered Microsoft Applications'
  id: totrans-697
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索新领域：人工智能驱动的Microsoft应用程序
- en: In an era where technology continuously reshapes the way we work and interact
    with digital environments, the integration of Artificial Intelligence into Microsoft's
    suite of applications represents a transformative leap. This segment introduces
    the new AI-driven programs developed by Microsoft and accessible through a Copilot
    Pro subscription, designed to seamlessly blend with the Office 365 ecosystem,
    enhancing productivity, creativity, and user engagement. These programs symbolize
    a significant advance in how AI is used in office settings, offering intuitive,
    user-friendly interfaces and capabilities that were once the realm of science
    fiction.
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 在技术不断重塑我们工作和与数字环境互动方式的这个时代，人工智能融入微软应用程序套件代表了变革性的飞跃。本部分介绍了微软开发的新人工智能驱动程序，通过Copilot
    Pro订阅可访问，旨在与Office 365生态系统无缝融合，提升生产力、创造力和用户参与度。这些程序象征着在办公环境中使用人工智能的重大进步，提供了曾经属于科幻领域的直观、用户友好的界面和能力。
- en: The introduction of these programs marks a pivotal moment in the evolution of
    office productivity tools. AI is no longer just a buzzword or a backend technology;
    it's at the forefront, revolutionizing how we approach tasks, solve problems,
    and generate creative content. From drafting documents in Word to creating compelling
    presentations in PowerPoint, these new AI-driven programs by Microsoft are setting
    new standards for efficiency and innovation.
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 这些程序的出现标志着办公生产力工具演变中的一个关键时刻。人工智能不再只是一个流行词汇或后台技术；它处于前沿，正在改变我们处理任务、解决问题和创造内容的方式。从Word中起草文档到PowerPoint中创建引人入胜的演示文稿，微软这些新的由人工智能驱动的程序正在为效率和革新设定新的标准。
- en: In the following chapters, we will delve deeper into specific AI-driven Microsoft
    applications, such as Microsoft Designer and Copilot in OneNote. These applications
    harness the power of AI to transform how users interact with digital content,
    offering tools and features that simplify complex tasks, spark creativity, and
    enhance overall productivity.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将深入探讨具体的由人工智能驱动的Microsoft应用程序，例如Microsoft Designer和OneNote中的Copilot。这些应用程序利用人工智能的力量改变用户与数字内容的互动方式，提供简化复杂任务、激发创造力和提升整体生产力的工具和功能。
- en: 'Chapter 6.1: Microsoft 365 Chat and Copilot Studio'
  id: totrans-701
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第6.1章：Microsoft 365 Chat和Copilot Studio
- en: Introduction
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: 'Welcome to Chapter 6.1, where we explore two significant advancements in Microsoft
    365''s suite of tools: Microsoft 365 Chat and Copilot Studio. These tools represent
    a leap forward in integrating artificial intelligence into everyday office tasks,
    simplifying complex processes, and enhancing productivity.'
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到第6.1章，我们将探讨Microsoft 365工具套件中的两项重大进步：Microsoft 365 Chat和Copilot Studio。这些工具代表了将人工智能融入日常办公任务、简化复杂流程和提升生产力的重大飞跃。
- en: Understanding Microsoft 365 Chat
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 理解Microsoft 365 Chat
- en: 'Origins and Evolution: Microsoft 365 Chat (or M365 Chat), formerly known as
    Copilot Pro Preview or Business Chat, is a culmination of various iterations and
    enhancements in Microsoft''s virtual assistant technology, and it is thought to
    be the core of Microsoft Copilot Pro experience. It''s designed to integrate seamlessly
    within Microsoft Teams, a platform you might already be familiar with if you are
    reading this book.'
  id: totrans-705
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 源起与演变：Microsoft 365 Chat（或M365 Chat），之前被称为Copilot Pro预览或Business Chat，是微软虚拟助手技术多次迭代和改进的集大成之作，并被认为微软Copilot
    Pro体验的核心。它旨在无缝集成到您可能已经熟悉的Microsoft Teams平台中。
- en: 'Core Features: This innovative tool offers a range of capabilities:'
  id: totrans-706
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 核心功能：这款创新工具提供了一系列功能：
- en: 'Summarization: It can condense information from your conversations, emails,
    and documents.'
  id: totrans-707
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摘要：它可以总结您的对话、电子邮件和文档中的信息。
- en: 'Meeting Preparation: It assists in getting ready for meetings by providing
    relevant summaries and insights.'
  id: totrans-708
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 会议准备：它通过提供相关摘要和见解来帮助准备会议。
- en: 'Recap: It offers recaps of previous discussions, ensuring you''re always up-to-date.'
  id: totrans-709
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摘要：它提供了之前讨论的摘要，确保您始终了解最新情况。
- en: 'Content Management: It can pull in and summarize content from various Microsoft
    cloud sources like OneDrive, Teams, SharePoint, and Outlook.'
  id: totrans-710
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内容管理：它可以从各种 Microsoft 云源，如 OneDrive、Teams、SharePoint 和 Outlook 中提取和总结内容。
- en: 'User Experience and Accessibility: Microsoft 365 Chat is accessible through
    the chat option in Microsoft Teams and is available across platforms – desktop,
    web, and mobile. This ensures that regardless of your device or location, if you
    have internet, you can access its functionalities.'
  id: totrans-711
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户体验与可访问性：Microsoft 365 Chat 通过 Microsoft Teams 中的聊天选项提供访问，可在多个平台上使用 – 桌面、网页和移动设备。这确保了无论您的设备或位置如何，只要有互联网，您就可以访问其功能。
- en: 'Comprehensive Data Integration: One of its standout features is its integration
    with the Microsoft Graph. This allows the tool to analyze emails, chats, meetings,
    and files to provide a rich and nuanced understanding of various subjects, ranging
    from client updates to project statuses.'
  id: totrans-712
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 综合数据集成：其最突出的功能之一是与 Microsoft Graph 的集成。这使得工具能够分析电子邮件、聊天、会议和文件，从而提供对各种主题的丰富和细微的理解，从客户更新到项目状态。
- en: 'Intelligent Response System: When you interact with Microsoft 365 Chat, it
    not only provides responses but also includes references like emails, files, or
    SharePoint pages. These are presented with icons and snippets, offering context
    and direct access to source material within the Microsoft ecosystem.'
  id: totrans-713
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 智能响应系统：当您与 Microsoft 365 Chat 互动时，它不仅提供响应，还包括电子邮件、文件或 SharePoint 页面等引用。这些内容以图标和片段的形式呈现，提供上下文并直接访问
    Microsoft 生态系统中的源材料。
- en: 'Advanced Features: Beyond basic information retrieval, Microsoft 365 Chat aids
    in content drafting, SWOT analysis, and generating strategic insights.'
  id: totrans-714
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 高级功能：除了基本的信息检索外，Microsoft 365 Chat 还有助于内容起草、SWOT 分析和生成战略见解。
- en: 'Feedback and Improvement: Users can provide feedback directly within the chat
    interface, contributing to the AI''s continuous improvement.'
  id: totrans-715
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 反馈与改进：用户可以直接在聊天界面中提供反馈，有助于人工智能的持续改进。
- en: 'Future Developments: Expectations are high for new features like action buttons
    and further integrations across Microsoft 365 services, aiming to streamline user
    experience and reduce context switching.'
  id: totrans-716
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 未来发展：对于新功能，如操作按钮和跨 Microsoft 365 服务的进一步集成，期望很高，旨在简化用户体验并减少上下文切换。
- en: 'Compliance and Security: Importantly, Microsoft 365 Chat adheres to organizational
    compliance and security policies, balancing advanced AI capabilities with stringent
    security measures.'
  id: totrans-717
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 合规性与安全性：重要的是，Microsoft 365 Chat 遵守组织合规性和安全策略，在先进的人工智能能力与严格的安全措施之间取得平衡。
- en: '![A screenshot of a computer  Description automatically generated](image_rsrc1NK.jpg)'
  id: totrans-718
  prefs: []
  type: TYPE_IMG
  zh: '![计算机截图  自动生成的描述](image_rsrc1NK.jpg)'
- en: 'In the picture: Home of Microsoft 365 Chat.'
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: 图片中：Microsoft 365 Chat 的主页。
- en: 'Source: Microsoft website.'
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Microsoft 网站。
- en: Exploring Copilot Studio
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 探索 Copilot Studio
- en: 'Introduction to Copilot Studio: Copilot Studio is a low-code tool, which means
    that you don’t have to be a developer to program it, and it allows customization
    of Copilot for Microsoft 365\. It brings together conversational capabilities,
    custom GPTs (Generative Pre-trained Transformers), generative AI plugins, and
    manual topics.'
  id: totrans-722
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Copilot Studio 简介：Copilot Studio 是一款低代码工具，这意味着您不需要是开发者就能编程它，并且它允许对 Copilot 进行
    Microsoft 365 的定制。它汇集了对话能力、自定义 GPT（生成式预训练变换器）、生成式 AI 插件和手动主题。
- en: 'Customization Capabilities: With Copilot Studio, you can tailor Copilot for
    Microsoft 365 to fit specific enterprise scenarios. It enables the building, testing,
    and publishing of standalone copilots and custom GPTs, like in ChatGPT Plus.'
  id: totrans-723
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定制化能力：使用 Copilot Studio，您可以定制 Copilot 以适应特定的企业场景。它允许构建、测试和发布独立的 copilots 和自定义
    GPT，就像在 ChatGPT Plus 中一样。
- en: 'Lifecycle Management: It offers an end-to-end lifecycle management for customizations
    and standalone copilots, including building, deploying, analyzing, and managing
    – all within a single web experience.'
  id: totrans-724
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生命周期管理：它为自定义和独立 Copilot 提供端到端的生命周期管理，包括构建、部署、分析和管理——所有这些都在单一的网络体验中完成。
- en: 'Integration with Data Sources: Copilot Studio can connect to various data sources,
    including SAP, Workday, ServiceNow, and even proprietary business solutions through
    API, for developers.'
  id: totrans-725
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与数据源的集成：Copilot Studio 可以连接到各种数据源，包括 SAP、Workday、ServiceNow，甚至可以通过 API 连接到专有商业解决方案，供开发者使用。
- en: 'Security and Management: Copilot Studio also ensures that your customizations
    and standalone copilots are secure and managed properly, with the right access,
    data controls, user controls, and analytics.'
  id: totrans-726
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安全性和管理：Copilot Studio 还确保您的自定义和独立 Copilot 安全且得到适当管理，包括适当的访问权限、数据控制、用户控制和数据分析。
- en: 'Current Availability: As of the latest update, Copilot Studio is available
    for 200$ /month for enterprises, but Microsoft offers a free demo. Anyway, it
    will be soon included with Copilot Pro. For home users, right now, I suggest creating
    custom GPTs with a ChatGPT Plus subscription.'
  id: totrans-727
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当前可用性：根据最新的更新，Copilot Studio 对企业来说每月收费 200 美元，但 Microsoft 提供免费演示。无论如何，它很快就会包含在
    Copilot Pro 中。对于家庭用户来说，目前我建议使用 ChatGPT Plus 订阅创建自定义 GPT。
- en: 'Conclusion: The Impact of Microsoft 365 Chat and Copilot Studio'
  id: totrans-728
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：Microsoft 365 Chat 和 Copilot Studio 的影响
- en: Microsoft 365 Chat and Copilot Studio represent significant advancements in
    AI-assisted work environments. Their integration with various Microsoft services,
    ability to provide comprehensive data insights, and adaptability to user feedback
    make them powerful tools in the Microsoft 365 suite. As these technologies evolve,
    they are poised to transform how professionals interact with information and manage
    their workflows, paving the way for a more efficient, AI-enhanced office environment.
  id: totrans-729
  prefs: []
  type: TYPE_NORMAL
  zh: Microsoft 365 Chat 和 Copilot Studio 代表了在人工智能辅助工作环境中的重大进步。它们与各种 Microsoft 服务的集成、提供全面的数据洞察力以及适应用户反馈的能力，使它们成为
    Microsoft 365 套件中的强大工具。随着这些技术的不断发展，它们有望改变专业人士与信息互动和管理工作流程的方式，为更高效、人工智能增强的办公环境铺平道路。
- en: 'Chapter 6.2: In-Depth Look at Microsoft Designer and its AI Capabilities'
  id: totrans-730
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 6.2 章：深入探讨 Microsoft Designer 及其人工智能功能
- en: Introduction to Microsoft Designer
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: Microsoft Designer 简介
- en: In this chapter, we will explore Microsoft Designer, a graphic design web application
    that marks a significant advancement in integrating AI into everyday creative
    processes. Microsoft Designer is an innovative tool that simplifies the creation
    of various graphics, including social media posts, postcards, invitations, and
    more. It is particularly user-friendly and accessible, making it an ideal choice
    for beginners and professionals alike.
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨 Microsoft Designer，这是一个图形设计网页应用程序，标志着将人工智能集成到日常创意过程中的重大进步。Microsoft
    Designer 是一个创新工具，简化了各种图形的创建，包括社交媒体帖子、明信片、邀请函等。它特别易于使用和访问，使其成为初学者和专业人士的理想选择。
- en: Core Concept of Microsoft Designer
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: Microsoft Designer 的核心概念
- en: The core of Microsoft Designer lies in its use of AI to facilitate graphic design.
    This application harnesses the power of DALL-E 3, to convert text descriptions
    into stunning images. This feature stands out as a remarkable example of how AI
    can assist in creative endeavors, allowing users to bring their ideas to life
    with minimal effort.
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: Microsoft Designer 的核心在于其使用人工智能来促进图形设计。此应用程序利用 DALL-E 3 的力量，将文本描述转换为令人惊叹的图像。这一功能作为一个显著的例子，展示了人工智能如何帮助创意工作，使用户能够以最小的努力将他们的想法变为现实。
- en: Getting Started with Microsoft Designer
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 开始使用 Microsoft Designer
- en: To begin using Microsoft Designer, you'll need to access it online with a Microsoft
    account. Interestingly, as of the time of this writing, it does not have a dedicated
    application for Windows 11 ![A qr code on a white background  Description automatically
    generated](image_rsrc1NM.jpg)but is available as a web app. This accessibility
    means that you can use Microsoft Designer from any computing platform that supports
    a web browser. In addition, it is only a preview, so you will need an invite link
    to use it. You can use the one in the QR code on the right.
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用 Microsoft Designer，您需要使用 Microsoft 账户在线访问它。有趣的是，截至本文撰写之时，它还没有为 Windows
    11 专门的应用程序 ![白色背景上的二维码  自动生成的描述](image_rsrc1NM.jpg)，但作为网页应用程序提供。这种可访问性意味着您可以使用支持网页浏览器的任何计算平台上的
    Microsoft Designer。此外，它目前仅提供预览版，因此您需要邀请链接才能使用它。您可以使用右侧二维码中的链接。
- en: Creating a Design with AI
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 使用人工智能创建设计
- en: Once you sign in, Microsoft Designer presents you with a prompt box and a selection
    of graphic samples. Here, you can input a descriptive text for your desired image
    design. Additionally, you can upload images to generate graphics based on those
    images. The application offers suggestions for prompts, or you can choose a sample
    design to modify.
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 登录后，微软设计师会向你展示一个提示框和一系列图形样本。在这里，你可以为你的期望图像设计输入描述性文本。此外，你可以上传图片以根据这些图片生成图形。应用程序提供提示建议，或者你可以选择一个样本设计进行修改。
- en: After selecting a design, you can customize it using the Microsoft Designer
    editor. This editor features a toolbar with various settings, including the ability
    to start new designs or browse previous ones. You can also resize, rename, and
    duplicate designs.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 选择一个设计后，你可以使用微软设计师编辑器进行定制。这个编辑器有一个工具栏，包含各种设置，包括开始新设计或浏览以前的设计的能力。你还可以调整大小、重命名和复制设计。
- en: 'The canvas provides various tools for editing, including:'
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 画布提供了各种编辑工具，包括：
- en: 'Templates: Change the entire design of the graphics.'
  id: totrans-741
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模板：更改图形的整体设计。
- en: 'My Media: Upload images from different sources.'
  id: totrans-742
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的媒体：从不同来源上传图片。
- en: 'Visuals: Access recommendations, shapes, icons, videos, and more.'
  id: totrans-743
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视觉元素：访问推荐、形状、图标、视频等。
- en: 'Text: Insert messages with different fonts and sizes.'
  id: totrans-744
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本：插入不同字体和大小的消息。
- en: 'Brand Kit: Use different color patterns and fonts to quickly alter your design.'
  id: totrans-745
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 品牌工具包：使用不同的颜色模式和字体来快速更改你的设计。
- en: 'AI tools: Generate pictures, remove backgrounds, remove elements from the photo.'
  id: totrans-746
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI工具：生成图片、移除背景、从照片中移除元素。
- en: Creating a Design from Scratch
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 从零开始创建设计
- en: If you prefer starting with a blank slate, Microsoft Designer allows you to
    create designs from scratch. You can choose the canvas size and use the same tools
    available for AI-generated designs. This approach offers more control and creative
    freedom, though it might require more input from the user.
  id: totrans-748
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你更喜欢从一张白纸开始，微软设计师允许你从头开始创建设计。你可以选择画布大小并使用与AI生成设计相同的工具。这种方法提供了更多的控制和创意自由，尽管可能需要用户更多的输入。
- en: Editing and Customizing Designs
  id: totrans-749
  prefs: []
  type: TYPE_NORMAL
  zh: 编辑和定制设计
- en: Regardless of whether you start with an AI-generated template or a blank canvas,
    Microsoft Designer offers extensive tools for customization. You can edit text,
    replace images, and even use AI tools to remove objects from images or blur backgrounds.
    These features are designed to be intuitive, even for users with limited graphic
    design experience.
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是从AI生成的模板开始还是从空白画布开始，微软设计师都提供了丰富的定制工具。你可以编辑文本、替换图片，甚至使用AI工具从图片中移除对象或模糊背景。这些功能旨在直观易用，即使对于图形设计经验有限的用户也是如此。
- en: '![A screenshot of a computer  Description automatically generated](image_rsrc1NN.jpg)'
  id: totrans-751
  prefs: []
  type: TYPE_IMG
  zh: '![计算机屏幕截图 自动生成的描述](image_rsrc1NN.jpg)'
- en: 'In the picture: an example of a use of Microsoft Designer. First, I created
    an image with the button, then I asked to generate “A promotion Instagram post
    of a book about ChatGPT. The results are on the right.'
  id: totrans-752
  prefs: []
  type: TYPE_NORMAL
  zh: 图片中的示例：微软设计师的一个应用示例。首先，我创建了一个带有按钮的图片，然后我要求生成“关于ChatGPT的推广Instagram帖子”。结果在右边。
- en: Saving and Sharing Your Design
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 保存和分享你的设计
- en: Once your design is complete, you can download it in various formats such as
    PNG, JPG, or PDF. Microsoft Designer also allows for easy sharing on social media
    platforms. Plus, it saves your designs in the cloud, providing you with easy access
    to past projects.
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你的设计完成，你可以以各种格式如PNG、JPG或PDF下载它。微软设计师还允许你轻松地在社交媒体平台上分享，并且它将你的设计保存在云端，让你可以轻松访问过去的项目。
- en: 'Conclusion: The Potential of Microsoft Designer'
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：微软设计师的潜力
- en: Microsoft Designer exemplifies the potential of AI in graphic design. It streamlines
    the design process, making it more accessible to a broader audience. By integrating
    AI capabilities, Microsoft Designer opens up new possibilities for creativity
    and productivity, making it a valuable tool in the Microsoft 365 suite.
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 微软设计师展示了AI在图形设计中的潜力。它简化了设计过程，使其对更广泛的受众更加易于访问。通过集成AI功能，微软设计师为创造力和生产力开辟了新的可能性，使其成为微软365套件中的宝贵工具。
- en: In summary, Microsoft Designer stands as a testament to the evolving role of
    AI in creative fields. Its easy-to-use interface, combined with powerful AI-driven
    features, makes it a game-changer for anyone looking to create professional-quality
    graphics with minimal effort. As we continue to see advancements in AI technology,
    tools like Microsoft Designer will likely become even more integral to our digital
    creative processes.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，Microsoft Designer是AI在创意领域不断演变角色的见证。其易于使用的界面，结合强大的AI驱动功能，使得任何希望以最少努力创建专业质量图形的人都能成为变革者。随着我们继续看到AI技术的进步，像Microsoft
    Designer这样的工具可能会成为我们数字创意过程中的更加核心部分。
- en: 'Chapter 6.3: Copilot in OneNote: Enhancing Productivity'
  id: totrans-758
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第6.3章：OneNote中的Copilot：提高生产力
- en: In this chapter, we delve into a fascinating aspect of integrating generative
    AI with Microsoft 365, particularly focusing on Copilot Pro in Microsoft OneNote
    and how it significantly enhances productivity. OneNote, known for its flexibility
    and convenience as a digital notebook, becomes an even more powerful tool when
    combined with the capabilities of generative AI. Let's explore this integration
    in detail.
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们深入探讨将生成式AI与Microsoft 365集成的迷人方面，特别是关注Microsoft OneNote中的Copilot Pro以及它如何显著提高生产力。作为一款数字笔记本，OneNote以其灵活性和便利性而闻名，当与生成式AI的能力结合时，它变得更加强大。让我们详细探索这一集成。
- en: Understanding OneNote and Its Uses
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 理解OneNote及其用途
- en: Before we dive into the integration of Copilot in OneNote, let's first understand
    what OneNote is and its primary uses. OneNote is a digital notebook application
    that allows users to create, store, and manage notes. It's part of the Microsoft
    365 suite and is known for its user-friendly interface and versatile note-taking
    capabilities. Users can type notes, insert images, create tables, and even draw
    in their notebooks. OneNote is widely used for various purposes like keeping personal
    diaries, managing work projects, storing research notes, and more.
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨Copilot在OneNote中的集成之前，让我们首先了解OneNote是什么以及它的主要用途。OneNote是一款数字笔记本应用程序，允许用户创建、存储和管理笔记。它是Microsoft
    365套件的一部分，以其用户友好的界面和多功能笔记功能而闻名。用户可以在笔记本中输入笔记、插入图片、创建表格，甚至绘制草图。OneNote被广泛用于各种目的，如记录个人日记、管理工作项目、存储研究笔记等。
- en: Introduction to Copilot in OneNote
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: OneNote中Copilot的介绍
- en: With the introduction of Copilot Pro in OneNote, the functionality of this digital
    notebook has been significantly expanded. Copilot in OneNote utilizes AI technology
    to assist users in various tasks, from drafting plans and generating ideas to
    organizing information in engaging formats. It represents a step forward in how
    we interact with digital note-taking, making it more intuitive and efficient.
  id: totrans-763
  prefs: []
  type: TYPE_NORMAL
  zh: 随着Copilot Pro在OneNote中的引入，这款数字笔记本的功能得到了显著扩展。OneNote中的Copilot利用AI技术协助用户完成各种任务，从起草计划、生成想法到以引人入胜的格式组织信息。这代表了我们与数字笔记交互方式的一次进步，使其更加直观和高效。
- en: Enhancing Note Organization and Presentation
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 提高笔记组织和展示
- en: One of the key benefits of using Copilot in OneNote is the enhanced organization
    and presentation of notes. The AI can help reorganize content, adjust formatting,
    and highlight important points, making your notes more accessible and easier to
    understand. This feature is particularly useful for people who handle a large
    volume of information and need to keep their notes well-structured and clear.
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 使用OneNote中的Copilot的一个关键好处是增强了笔记的组织和展示。AI可以帮助重新组织内容、调整格式并突出重要点，使您的笔记更易于访问和理解。这一功能对于处理大量信息并需要保持笔记结构良好、清晰的人来说尤其有用。
- en: Automated Summarization and Idea Generation
  id: totrans-766
  prefs: []
  type: TYPE_NORMAL
  zh: 自动总结和想法生成
- en: Another significant feature of Copilot in OneNote is its ability to summarize
    notes into concise bullet points or to generate ideas based on existing content.
    This is particularly helpful for quickly grasping the essence of detailed notes
    or for brainstorming sessions where you need to develop new concepts or plans
    based on your existing notes.
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: OneNote中的Copilot的另一个显著功能是能够将笔记总结成简洁的要点或基于现有内容生成想法。这对于快速抓住详细笔记的精髓或在进行头脑风暴会议时，需要根据现有笔记开发新概念或计划来说尤其有帮助。
- en: Creating Centralized Repositories for Unanswered Questions
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: 创建未解答问题的集中存储库
- en: One unique feature of Copilot in OneNote is its ability to identify unanswered
    questions from your notes and group them in one location. This helps in ensuring
    that no critical queries are overlooked and can aid in focused research or problem-solving
    sessions.
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: OneNote中Copilot的一个独特功能是它能够从你的笔记中识别未回答的问题，并将它们分组在一个地方。这有助于确保不会忽略任何关键查询，并有助于专注的研究或问题解决会议。
- en: Security and Privacy Commitments
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: 安全和隐私承诺
- en: OneNote, especially when integrated with Copilot, adheres to Microsoft's commitments
    to data security and privacy in the enterprise environment. This is crucial for
    users who are concerned about the confidentiality and integrity of their data.
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: OneNote，尤其是当与Copilot集成时，遵守微软在企业环境中对数据安全和隐私的承诺。这对于担心其数据机密性和完整性的用户来说至关重要。
- en: Real-World Applications and Scenarios
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 现实世界的应用和场景
- en: Copilot in OneNote can be applied in various real-world scenarios, from academic
    research, where it can help in organizing and summarizing extensive notes, to
    project management in a corporate setting, where it can assist in plan creation
    and data organization.
  id: totrans-773
  prefs: []
  type: TYPE_NORMAL
  zh: OneNote中的Copilot可以应用于各种现实世界的场景，从学术研究，它可以帮助组织和总结大量笔记，到企业环境中的项目管理，它可以帮助制定计划和数据组织。
- en: 'Conclusion: Transforming Digital Note-Taking'
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 结论：数字化笔记的转变
- en: In conclusion, Copilot in OneNote represents a significant leap in the capabilities
    of digital note-taking. By combining the flexibility of OneNote with the power
    of AI, it opens up new possibilities for enhancing productivity, organizing information,
    and generating insights. Whether for personal use or professional settings, Copilot
    in OneNote stands as a testament to the potential of integrating AI with traditional
    software tools. As we continue to embrace these technologies, the way we interact
    with information and manage our workflows is poised to transform dramatically.
  id: totrans-775
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，OneNote中的Copilot代表了数字笔记能力的重大飞跃。通过结合OneNote的灵活性和AI的力量，它为提高生产力、组织信息和生成见解开辟了新的可能性。无论是在个人使用还是专业环境中，OneNote中的Copilot都证明了将AI与传统软件工具集成的潜力。随着我们继续拥抱这些技术，我们与信息互动和管理工作流程的方式预计将发生戏剧性的转变。
- en: 'Chapter 6.4: The Future of AI'
  id: totrans-776
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第6.4章：AI的未来
- en: No, I am not going to talk about Matrix. ​
  id: totrans-777
  prefs: []
  type: TYPE_NORMAL
  zh: 不，我不会谈论矩阵。
- en: I believe that ​ChatGPT will become smarter and faster than humans in some activities.
    -It is already so-, but it remains a tool, nothing more than an advanced software
    that just calculates the most probable token, word after word, sentence after
    sentence. It will improve, but it will never develop self-consciousness. This
    happens only in sci-fi movies.
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为ChatGPT在某些活动中将比人类更聪明、更快。 -它已经这样了-，但它仍然是一个工具，不过是一个计算最可能的标记、一个词接一个词、一句话接一句话的高级软件。它会改进，但它永远不会发展出自我意识。这种情况只发生在科幻电影中。
- en: 'We can draw a more realistic scenario: imagine a world where your creativity
    knows no bounds, where the barrier between thought and creation is effortlessly
    bridged. This is the world AI is building within Microsoft''s suite of tools.
    We''ve seen the beginnings of this journey with tools like ChatGPT, enhancing
    applications such as Word, Excel, and PowerPoint. But what does the future hold?'
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以描绘一个更加现实的场景：想象一个你的创造力没有界限的世界，在这个世界里，思想和创造之间的障碍可以轻松跨越。这就是AI在微软工具套件中构建的世界。我们已经通过像ChatGPT这样的工具看到了这一旅程的开始，这些工具增强了Word、Excel和PowerPoint等应用程序。但未来会怎样呢？
- en: Let's start with the concept of personalized AI assistants. We are moving towards
    a future where AI assistants in applications like Microsoft Teams and Outlook
    will not just respond to our commands but anticipate our needs. They will manage
    our schedules, draft our emails, and even suggest content for our presentations
    based on our unique work patterns and preferences.
  id: totrans-780
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从个性化AI助手的理念开始。我们正朝着这样一个未来迈进，即Microsoft Teams和Outlook等应用程序中的AI助手不仅会响应我们的命令，还会预测我们的需求。它们将管理我们的日程，起草我们的电子邮件，甚至根据我们独特的工怍模式和偏好为我们建议演示文稿内容。
- en: But it's not just about making tasks easier; it's about making them more meaningful.
    In the world of Excel, AI will evolve from being a tool that simply analyzes data
    to one that provides strategic insights, suggesting business moves and identifying
    trends that the human eye might miss. It's like having a data scientist embedded
    in every spreadsheet.
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 但这不仅仅是让任务变得更容易；这是让它们更有意义。在Excel的世界里，AI将从仅仅分析数据的工具，发展到提供战略洞察力，建议商业行动并识别人类眼睛可能错过的趋势。这就像在每个电子表格中嵌入了一位数据科学家。
- en: In the creative landscape, Microsoft Designer and technologies like DALL-E 3
    are already notable for their innovative capabilities. They not only execute our
    design requests but also actively inspire us with fresh ideas and concepts. Designer
    has the ability to recommend design themes, color schemes, and even the brand
    identity, tailored to align with your unique brand identity and previous preferences.
    However, there's potential for significant enhancement in these areas. As these
    technologies evolve, we can anticipate even more nuanced and sophisticated suggestions,
    further refining their alignment with individual creative visions and historical
    data patterns, thereby elevating the design process to unprecedented levels of
    personalization and efficiency.
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 在创意领域，微软设计师和像DALL-E 3这样的技术已经因其创新能力而备受瞩目。它们不仅执行我们的设计请求，还主动以新颖的想法和概念启发我们。设计师能够推荐设计主题、配色方案，甚至品牌识别，以适应您独特的品牌身份和之前的偏好。然而，这些领域有巨大的提升潜力。随着这些技术的发展，我们可以期待更加细腻和复杂化的建议，进一步优化它们与个人创意愿景和历史数据模式的匹配，从而将设计过程提升到前所未有的个性化水平和效率。
- en: And let's not forget the potential in education and training. AI in Microsoft's
    ecosystem could revolutionize how we learn and teach, adapting materials to suit
    individual learning styles and speeds, making education a truly personalized experience.
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 我们绝不能忘记教育和培训中的潜力。微软生态系统的AI可能会彻底改变我们学习和教学的方式，根据个人的学习风格和速度调整材料，使教育成为一种真正个性化的体验。
- en: However, with great power comes great responsibility. As we embrace these advancements,
    we must also consider the ethical implications. Privacy, security, data integrity
    – these are not just checkboxes but foundational pillars that must be strengthened
    alongside technological growth.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，权力越大，责任越大。随着我们拥抱这些进步，我们也必须考虑其伦理影响。隐私、安全、数据完整性——这些不仅仅是复选框，而是必须与技术增长同步加强的基石。
- en: Now, let's dream a little. Imagine a future where AI in Microsoft 365 not only
    understands text and data but emotions and context. A future where AI helps bridge
    cultural and language barriers in real-time, making global collaboration not just
    possible but effortless.
  id: totrans-785
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们稍微幻想一下。想象一个未来，在微软365中，AI不仅理解文本和数据，还能理解情感和上下文。一个AI能够实时帮助弥合文化和语言障碍的未来，使全球协作不仅成为可能，而且变得轻松自如。
- en: As we stand at the cusp of this incredible technological revolution, it's clear
    that AI is not just a tool; it's a partner. A partner that empowers us to reach
    new heights of efficiency, creativity, and innovation.
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们站在这个令人难以置信的技术革命的前沿时，很明显，AI不仅仅是一个工具；它是一个伙伴。一个能够让我们达到新的效率、创造力和创新高度的伙伴。
- en: In conclusion, the future of AI in the Microsoft ecosystem is not just bright;
    it's dazzling. It promises a world where our digital experience is more intuitive,
    more creative, and more connected than ever before. And as we step into this brave
    new world, let's embrace these changes with an open mind and a commitment to shaping
    a future where technology amplifies our human potential.
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，微软生态系统中AI的未来不仅光明，而且耀眼。它承诺的是一个我们的数字体验比以往任何时候都更加直观、更有创意、更加互联的世界。当我们步入这个充满勇气的新世界时，让我们以开放的心态和塑造一个未来的承诺来拥抱这些变化，在这个未来中，技术放大了我们的潜能。
- en: '![A group of people looking at a large glass cylinder with a glowing human
    body](image_rsrc1NP.jpg)'
  id: totrans-788
  prefs: []
  type: TYPE_IMG
  zh: '![一群人看着一个发光的人体的大型玻璃圆柱体](image_rsrc1NP.jpg)'
- en: 'In the picture: “The future of AI” according to DALL-E 3.'
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 图片中：“根据DALL-E 3的预测，AI的未来”。
- en: Conclusion
  id: totrans-790
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 结论
- en: As we reach the conclusion of our journey through the dynamic integration of
    ChatGPT within Office 365, it is crucial to pause and reflect on the expansive
    capabilities and the prudent considerations that come with harnessing the power
    of this revolutionary AI tool. ChatGPT, with its advanced AI capabilities, has
    opened up a new realm of possibilities, making it an invaluable asset in various
    fields and scenarios.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们通过Office 365动态整合ChatGPT的旅程接近尾声，停下来反思利用这一革命性AI工具所带来的广泛能力和谨慎考虑是至关重要的。ChatGPT凭借其先进的AI能力，开辟了一个新的可能性领域，使其成为各个领域和场景中的无价资产。
- en: Let's revisit the highlights of ChatGPT's applications to fully appreciate its
    versatility. In the realm of content creation, ChatGPT has shown exceptional skill
    in crafting articles, blogs, stories, and poems, displaying a remarkable flair
    for creativity and structure. Its role in educational assistance cannot be overstated,
    as it serves as an excellent tool for learning and teaching, providing detailed
    explanations, summaries, and answers to a broad spectrum of topics. For those
    dabbling in programming, ChatGPT stands as a reliable ally, offering bug fixes,
    code suggestions, and even writing small scripts, showcasing the advancements
    brought by the GPT-4 model.
  id: totrans-792
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾ChatGPT应用的亮点，以充分欣赏其多功能性。在内容创作的领域，ChatGPT在撰写文章、博客、故事和诗歌方面表现出卓越的技能，展示了非凡的创造力和结构感。它在教育辅助方面的作用不容小觑，作为学习和教学的好工具，它提供了关于广泛主题的详细解释、摘要和答案。对于那些涉足编程的人来说，ChatGPT是一个可靠的盟友，提供错误修复、代码建议，甚至编写小脚本，展示了GPT-4模型带来的进步。
- en: In the world of data analysis, ChatGPT simplifies complex concepts, helping
    users interpret data sets and suggesting analysis techniques. Its prowess in language
    translation and learning is akin to that of a skilled teacher, making learning
    new languages more accessible and engaging. As a first-level customer support
    agent, ChatGPT has been instrumental in resolving common queries and guiding users,
    marking its entry into the corporate world. Moreover, its efficiency in handling
    personal assistant tasks, such as setting reminders, drafting emails, and planning
    schedules, has made it an indispensable part of our daily lives.
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据分析的世界里，ChatGPT简化了复杂的概念，帮助用户解读数据集，并提出分析技术。它在语言翻译和学习方面的能力类似于一位熟练的教师，使学习新语言更加容易和有趣。作为一级客户支持代理，ChatGPT在解决常见查询和指导用户方面发挥了重要作用，标志着它进入企业界。此外，它在处理个人助理任务，如设置提醒、撰写电子邮件和规划日程方面的效率，使它成为我们日常生活中的不可或缺的一部分。
- en: In creative processes, ChatGPT acts as a fountain of inspiration, aiding in
    brainstorming sessions and idea generation. Its ability to create interactive
    stories, games, quizzes, and other engaging activities has also added a new dimension
    to entertainment and engagement.
  id: totrans-794
  prefs: []
  type: TYPE_NORMAL
  zh: 在创意过程中，ChatGPT充当着灵感的源泉，帮助进行头脑风暴和创意生成。它创造互动故事、游戏、测验和其他吸引人的活动的能力也为娱乐和参与度增添了新的维度。
- en: However, it's equally important to acknowledge the limitations of ChatGPT. It
    is advisable not to use ChatGPT for processing sensitive personal or financial
    information, as privacy concerns are paramount. When it comes to making legal
    or medical decisions, relying on ChatGPT is not advisable due to its limitations
    in these specialized fields. Tasks that require real-time data, high-level business
    analysis, or high precision, such as advanced scientific research, are beyond
    the scope of ChatGPT's capabilities.
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，承认ChatGPT的局限性同样重要。建议不要使用ChatGPT处理敏感的个人或财务信息，因为隐私问题至关重要。在涉及法律或医疗决策时，由于ChatGPT在这些专业领域的局限性，依赖它是不明智的。需要实时数据、高级商业分析或高精度任务，如高级科学研究，超出了ChatGPT的能力范围。
- en: In sum, ChatGPT is a powerful tool with a broad spectrum of applications, but
    understanding its limitations and areas where its use is inappropriate is crucial.
    By recognizing where ChatGPT can be beneficial and where caution should be exercised,
    users can maximize its capabilities while avoiding potential pitfalls. As AI technology
    continues to advance, we can expect the applications of ChatGPT to broaden further.
    However, a careful, informed, and responsible approach to its use will always
    be paramount.
  id: totrans-796
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，ChatGPT是一个功能强大的工具，具有广泛的应用范围，但理解其局限性以及其使用不恰当的领域是至关重要的。通过认识到ChatGPT可以带来益处的地方以及需要谨慎使用的地方，用户可以在避免潜在陷阱的同时最大化其功能。随着人工智能技术的持续进步，我们可以期待ChatGPT的应用范围将进一步扩大。然而，对其使用的谨慎、知情和负责任的态度始终是至关重要的。
