- en: '**Prompt Power: 100 High-Impact**'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示词力量：100个高影响力**'
- en: '**Prompts to Unlock the Full Potential**'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**解锁全部潜力的提示词**'
- en: '**of AI**'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**的AI**'
- en: '**Chapter 1: Why Prompts Are the New Digital Currency**'
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第一章：为什么提示词是新的数字货币**'
- en: There’s a quiet revolution happening — and it doesn’t require coding, capital,
    or connections.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 正在进行一场安静的革命——而且它不需要编码、资本或人脉。
- en: 'All it takes is one thing:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 只需要一件事情：
- en: A well-crafted prompt.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 一个精心制作的提示词。
- en: In the age of AI, the power has shifted. It no longer belongs only to those
    who can build software or run ads.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在AI时代，权力已经转移。它不再只属于那些能构建软件或运行广告的人。
- en: Now, it belongs to those who know how to ask the right questions.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，它属于那些知道如何提出正确问题的人。
- en: '**AI Is Only As Smart As Your Input**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI的智能取决于你的输入**'
- en: You’ve probably heard of ChatGPT, Midjourney, DALL·E, Claude, Gemini — or maybe
    even used them.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经听说过ChatGPT、Midjourney、DALL·E、Claude、Gemini——或者甚至使用过它们。
- en: 'But here’s what most people don’t realize:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 但这里大多数人还没有意识到的是：
- en: AI doesn’t create magic. It amplifies your intention.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: AI不会创造魔法。它放大了你的意图。
- en: It’s like a superpowered intern that works 24/7 — but only if you give it precise,
    high-leverage instructions.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 它就像一个全天候工作的超级实习生——但前提是你给出精确、高杠杆的指令。
- en: The better your prompt, the more impressive your result.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 你的提示词越好，你的结果就越令人印象深刻。
- en: '**Prompts = Leverage**'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示词 = 杠杆**'
- en: 'With the right prompts, you can:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 使用正确的提示词，你可以：
- en: Build an entire content calendar in 5 minutes
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 5分钟内构建整个内容日历
- en: Write landing pages that convert
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 编写能转化的落地页面
- en: Brainstorm business ideas
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 策划商业想法
- en: Design brand identities
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 设计品牌标识
- en: Generate marketing strategies
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 生成营销策略
- en: Create courses, books, or products
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 创建课程、书籍或产品
- en: Even launch viral visuals using AI art
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 甚至可以使用AI艺术推出病毒性视觉内容
- en: And it’s not just about saving time.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 而且这不仅仅关于节省时间。
- en: It’s about creating results you never thought possible — with zero burnout.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这关乎创造你从未想过可能的结果——而且零燃尽。
- en: '**What Makes a Prompt Powerful?**'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**什么使提示词强大？**'
- en: 'A great prompt is:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 一个优秀的提示词是：
- en: Clear (No vagueness)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 清晰（无模糊性）
- en: Contextual (Defines the role, tone, purpose)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文（定义角色、语气、目的）
- en: 'Command-driven (Uses strong verbs) Expandable (Allows follow-up, iteration,
    and refinement) Bad prompt:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 命令驱动（使用强动词）可扩展（允许后续、迭代和改进）差的提示词：
- en: “Write me something about digital marketing.”
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: “为我写一些关于数字营销的内容。”
- en: 'Power prompt:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 强提示词：
- en: “Act as a digital marketing expert. Write me a 5-day email sequence for a new
    online course targeting busy moms who want to start side hustles. Include emotional
    storytelling and soft CTAs.”
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演一个数字营销专家。为我写一个针对想要开始副业的忙碌妈妈的5天电子邮件序列。包括情感故事讲述和软CTA。”
- en: See the di erence?
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 看到区别了吗？
- en: '**The Prompt Economy Is Real**'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示词经济是真实的**'
- en: 'People are already:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 人们已经在：
- en: Selling prompt bundles on Gumroad, Etsy, Hotmart Creating prompt-based YouTube
    channels and TikToks Launching AI agencies powered by custom workflows Building
    entire businesses from prompt mastery Your prompts are no longer just ideas —
    they’re tools of influence, income, and innovation.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在Gumroad、Etsy、Hotmart上销售提示词捆绑包 创建基于提示词的YouTube频道和TikToks 启动由自定义工作流程驱动的AI机构 从提示词掌握构建整个业务
    你的提示词不再只是想法——它们是影响力、收入和创新的工具。
- en: '**What You’ll Get in This Book**'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**本书你将获得什么**'
- en: 'This book contains 100 elite prompts — tested, refined, and categorized for
    real-world use. Whether you’re a content creator, entrepreneur, freelancer, student,
    or just curious — you’ll find prompts to: Save you hours'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 本书包含100个精英提示词——经过测试、精炼和分类，适用于现实世界的使用。无论你是内容创作者、企业家、自由职业者、学生，还是只是好奇——你都会找到提示词来：节省你数小时
- en: Spark profitable ideas
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 激发盈利性想法
- en: Multiply your output
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 乘数级提高你的产出
- en: And 10x your creative power
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 并将你的创造力提升10倍
- en: Use them. Tweak them. Stack them. Build on them.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 使用它们。调整它们。堆叠它们。在此基础上构建。
- en: Because the better your prompts, the bigger your potential.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你的提示词越好，你的潜力就越大。
- en: Let’s unlock it — one line at a time.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一点一点地解锁它。
- en: '**Chapter 2: How to Use This eBook (With Any AI Platform)**'
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第二章：如何使用此电子书（与任何AI平台）**'
- en: Whether you’re new to AI or already experimenting with ChatGPT, Midjourney,
    or Claude — this chapter ensures you use these prompts like a pro, no matter the
    platform.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是AI的新手还是已经在ChatGPT、Midjourney或Claude上进行了实验——这一章节确保你无论在哪个平台上都能像专业人士一样使用这些提示词。
- en: Because powerful prompts don’t just generate responses — they unlock possibilities.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 因为强大的提示词不仅会产生响应——它们会解锁可能性。
- en: '**What You’ll Need**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**你需要什么**'
- en: 'To get the most out of this book, you’ll need access to one or more AI platforms.
    Here are some of the most popular (and free or freemium):'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 要充分利用这本书，你需要访问一个或多个AI平台。以下是一些最受欢迎的（且免费或免费增值）平台：
- en: '**Text-Based AI:**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**基于文本的AI：**'
- en: ChatGPT (chat.openai.com)
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT（chat.openai.com）
- en: Claude (claude.ai)
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: Claude（claude.ai）
- en: Google Gemini (gemini.google.com)
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: Google Gemini（gemini.google.com）
- en: Microsoft Copilot (via Bing or Edge)
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 微软Copilot（通过Bing或Edge）
- en: '**Image-Based AI:**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**基于图像的AI：**'
- en: Midjourney (via Discord)
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: Midjourney（通过Discord）
- en: DALL·E (built into ChatGPT Plus)
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: DALL·E（集成于ChatGPT Plus）
- en: Leonardo AI / Playground AI / Canva Magic Design Most prompts in this book are
    written for text generation, but many can be adapted for image creation or even
    voice assistants.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: Leonardo AI / Playground AI / Canva Magic Design 这本书中的大多数提示是为文本生成编写的，但许多可以适应图像创建，甚至语音助手。
- en: '**How to Use the Prompts (Step-by-Step)**'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**如何使用提示（分步指南）**'
- en: '**1.**'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.**'
- en: '**Copy and Paste the Prompt**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**复制并粘贴提示**'
- en: Each prompt in this book is plug-and-play. Simply copy the text and paste it
    into your AI chat box.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书中的每个提示都是即插即用的。只需复制文本并将其粘贴到你的AI聊天框中。
- en: '**2.**'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.**'
- en: '**Edit the [Variables]**'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**编辑[变量]**'
- en: 'Many prompts contain brackets like:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 许多提示包含括号，如：
- en: '[your niche] — [target audience] — [product name]'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '[你的领域] — [目标受众] — [产品名称]'
- en: Replace those parts with your specific details.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 用你具体的细节替换这些部分。
- en: This makes the AI generate results customized to you.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得AI生成的结果更符合你的需求。
- en: '**3.**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.**'
- en: '**Ask Follow-Up Questions**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**提出后续问题**'
- en: 'AI loves context. If the first result isn’t perfect, reply with:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: AI喜欢上下文。如果第一个结果不完美，请回复：
- en: “Make it shorter”
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: “让它更简短”
- en: “Rewrite in a fun tone”
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: “用有趣的方式重写”
- en: “Add bullet points”
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: “添加项目符号”
- en: “Now translate to Portuguese”
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: “现在将其翻译成葡萄牙语”
- en: “Turn this into a tweet”
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: “将其转化为推文”
- en: Think of it as a conversation, not a one-time command.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 将其视为一场对话，而不是一次性的命令。
- en: '**4.**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.**'
- en: '**Save and Organize**'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '**保存和组织**'
- en: When you find a prompt that works, save it! Create folders or Notion boards
    to store your best AI workflows and responses.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 当你找到一个有效的提示时，请保存它！创建文件夹或Notion板来存储你最好的AI工作流程和回复。
- en: You’re not just using prompts — you’re building personalized AI systems.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 你不仅在使用提示，你正在构建个性化的AI系统。
- en: '**Pro Tips for Maximum Results**'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**获得最佳效果的专业技巧**'
- en: 'Start with a role:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 从一个角色开始：
- en: “Act as a lawyer…” / “You are now a marketing strategist…” This sets the frame
    for better answers.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: “扮演律师…” / “你现在是一位营销策略师…”这为更好的答案设定了框架。
- en: 'Set the output style:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 设置输出风格：
- en: “…write in a persuasive tone, under 300 words, using storytelling.”
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: “…用说服性的语气，不超过300字，使用讲故事的方式。”
- en: 'Stack prompts:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 堆叠提示：
- en: 'You can run one prompt, get a response, and build on it with new prompts. Example:
    Step 1: “Brainstorm 5 content ideas”'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以运行一个提示，得到一个回复，然后用新的提示在此基础上进行扩展。例如：步骤1：“头脑风暴5个内容想法”
- en: 'Step 2: “Turn idea #2 into a blog outline”'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 第2步：“将想法#2转化为博客大纲”
- en: 'Step 3: “Now write the introduction for that blog”'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 第3步：“现在为那篇博客写一个引言”
- en: '**You Don’t Need to Be a Tech Expert**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**你不需要成为技术专家**'
- en: You don’t need to know how AI works internally. You just need to communicate
    clearly, with intention.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你不需要了解AI内部是如何工作的。你只需要清晰、有目的地进行沟通。
- en: Think of this book as your library of creative weapons.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 将这本书视为你的创意武器库。
- en: Use it to build content, ideas, o ers, brands, strategies — fast and fearlessly.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 使用它快速、无畏地构建内容、想法、提议、品牌和策略。
- en: Now that you know how to use the prompts…
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经知道了如何使用提示……
- en: Let’s dive into the first batch and start creating real results.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入第一批，开始创造实际的结果。
- en: '**Chapter 3: Content Creation Prompts (20 Prompts)**'
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**第3章：内容创作提示（20个提示）**'
- en: Use these prompts to instantly generate blogs, videos, carousels, captions,
    ideas, and entire content calendars using AI tools like ChatGPT or Claude. Each
    one is crafted to help you unlock speed, creativity, and authority in your niche.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些提示，通过AI工具（如ChatGPT或Claude）立即生成博客、视频、轮播图、字幕、想法和完整的内容日历。每个提示都是为了帮助你解锁你在特定领域的速度、创造力和权威。
- en: '**Prompt 1 — 30-Day Content Calendar**'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示1 — 30天内容日历**'
- en: Create a 30-day content calendar for [your niche] on Instagram. Include daily
    topics with themes, CTA suggestions, and engaging post ideas.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 为Instagram上的[你的领域]创建一个30天的内容日历。包括每日主题、CTA建议和吸引人的帖子想法。
- en: '**Prompt 2 — Viral Hook Generator**'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示2 — 病毒性钩子生成器**'
- en: Generate 10 viral hooks for a YouTube Shorts video about [insert topic]. Use
    curiosity, emotion, or shock value.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 为关于[插入主题]的YouTube短视频生成10个病毒性钩子。使用好奇心、情感或震惊值。
- en: '**Prompt 3 — TikTok Script in 3 Acts**'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示3 — 三幕式TikTok剧本**'
- en: Write a 45-second TikTok script with a 3-act structure (Hook, Value, Call to
    Action) for [target audience] about [problem or solution].
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 为[目标受众]关于[问题或解决方案]撰写一个3幕结构的45秒TikTok脚本（钩子、价值、号召性用语）。
- en: '**Prompt 4 — Educational Twitter Thread**'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示4 — 教育型Twitter帖子**'
- en: Create a 7-tweet thread that teaches [topic] step by step, with a clear title
    tweet and value-packed insights.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个7条推文的帖子，逐步教授[主题]，有一个清晰的标题推文和充满价值的见解。
- en: '**Prompt 5 — Repurpose This Video**'
  id: totrans-109
