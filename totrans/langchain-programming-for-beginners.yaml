  id: totrans-1244
  prefs: []
  type: TYPE_NORMAL
  zh: st.markdown(question)
- en: response = conversational_rag_chain.stream(
  id: totrans-1245
  prefs: []
  type: TYPE_NORMAL
  zh: response = conversational_rag_chain.stream(
