  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●      ChatGPT asks:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: ●     ChatGPT询问：
- en: What’s the most inspiring success story from your customers?
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的客户中最鼓舞人心的成功故事是什么？
- en: What product or service helped them achieve their result?
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 哪种产品或服务帮助他们实现结果？
- en: What problem were they facing before?
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们之前面临什么问题？
- en: What’s the specific result they achieved?
  id: totrans-98
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们实现了什么具体结果？
- en: What feedback did they share about their experience?
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们分享了哪些关于他们体验的反馈？
- en: Do you have visuals or testimonials to include?
  id: totrans-100
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您是否有要包含的视觉或推荐信？
- en: Can you compare their “before” and “after” situation?
  id: totrans-101
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您能比较他们的“之前”和“之后”情况吗？
- en: What hashtags align with the story?
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与故事相关的标签是什么？
- en: What’s the call-to-action for others who want similar results?
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 想要类似结果的人的号召性用语是什么？
- en: Do you have permission to share their story publicly?
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您有权限公开分享他们的故事吗？
- en: 'Facebook Prompts for Content Creation:'
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Facebook内容创作提示：
- en: '1\. Facebook Prompt: Customer-Focused Post Ideas'
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. Facebook提示：以客户为中心的帖子想法
- en: 'Prompt:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions about my target audience and their pain points.
    Based on my answers, create 5 Facebook post ideas that address these challenges
    and position my product or service as the solution."'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我10个关于我的目标受众及其痛点的问题。根据我的回答，创建5个Facebook帖子想法，解决这些挑战，并将我的产品或服务定位为解决方案。"'
- en: 'Example Interaction:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●      ChatGPT asks:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: ●     ChatGPT询问：
- en: Who is your target audience (age, location, interests)?
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的目标受众是谁（年龄，地点，兴趣）？
- en: What specific problem does your audience struggle with most?
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的受众最常遇到的具体问题是什么？
- en: How does your product or service solve that problem?
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的产品或服务是如何解决这个问题的？
- en: What benefits or results do customers experience after using your solution?
  id: totrans-114
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 客户在使用你的解决方案后体验到哪些好处或结果？
- en: Do you have testimonials or success stories to share?
  id: totrans-115
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否有可以分享的证词或成功故事？
- en: What tone resonates with your audience (informative, casual, professional)?
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么语气与你的受众产生共鸣（信息性的、随意的、专业的）？
- en: Are there any common objections or misconceptions you need to address?
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你需要解决哪些常见的反对意见或误解？
- en: What type of visuals (images, videos) best support your content?
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么类型的视觉元素（图片、视频）最能支持你的内容？
- en: What is your desired call-to-action (CTA) for these posts?
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你希望这些帖子达到的号召性用语（CTA）是什么？
- en: Do you have a specific campaign goal, such as driving traffic or generating
    leads?
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否有特定的活动目标，例如吸引流量或生成潜在客户？
- en: '2\. Facebook Prompt: Educational Content for Audience Engagement'
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. Facebook 提示：吸引受众的教育内容
- en: 'Prompt:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions about my industry or niche. Then, create 5 Facebook
    post ideas that provide valuable educational content to engage my audience and
    establish my authority."'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我行业或细分市场中的10个问题。然后，创建5个Facebook帖子想法，提供有价值的教育资源以吸引我的受众并建立我的权威。"'
- en: 'Example Interaction:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●      ChatGPT asks:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: ● ChatGPT提问：
- en: What is your industry or niche?
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的行业或细分市场是什么？
- en: What common questions or misconceptions exist in this space?
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这个领域存在哪些常见问题或误解？
- en: What unique expertise do you bring to the table?
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你带来了哪些独特的专业知识？
- en: What trends or updates in your field are relevant to your audience?
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你领域中的哪些趋势或更新与你的受众相关？
- en: Are there specific tools, tips, or resources you recommend?
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你推荐哪些特定的工具、技巧或资源？
- en: What tone should the educational content take (formal, casual, etc.)?
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 教育内容应该采用什么语气（正式的、随意的等）？
- en: Are there any current events or news topics you can tie to your content?
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你能否将任何当前事件或新闻主题与你内容联系起来？
- en: How do you want your audience to engage (comments, shares, clicks)?
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你希望你的受众如何参与（评论、分享、点击）？
- en: What visuals (infographics, videos) can enhance the content?
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么视觉元素（信息图表、视频）可以增强内容？
- en: Do you want to include any lead magnets (e.g., free guides, downloads)?
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你想包含任何吸引潜在客户的诱饵（例如，免费指南、下载）吗？
- en: '3\. Facebook Prompt: Community-Building Posts'
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. Facebook 提示：社区建设帖子
- en: 'Prompt:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions about my brand’s mission and values. Then, generate
    5 Facebook post ideas to build a sense of community and inspire audience participation."'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我品牌使命和价值观的10个问题。然后，生成5个Facebook帖子想法，以建立社区感和激发受众参与。"'
- en: 'Example Interaction:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●      ChatGPT asks:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: ● ChatGPT提问：
- en: What is your brand’s mission or purpose?
  id: totrans-141
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的品牌使命或目的是什么？
- en: What values or principles guide your business?
  id: totrans-142
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指导你业务的是哪些价值观或原则？
- en: How does your brand give back to its community?
  id: totrans-143
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的品牌是如何回馈其社区的？
- en: What topics or causes do you want to align with?
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你想与哪些主题或原因保持一致？
- en: What type of conversations do you want to encourage on Facebook?
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你想在Facebook上鼓励哪种类型的对话？
- en: How does your audience currently engage with your posts?
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的受众目前是如何参与你的帖子的？
- en: Do you have any upcoming events, initiatives, or launches to share?
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否有即将到来的活动、倡议或发布要分享？
- en: Are there any user-generated content (UGC) campaigns you’d like to promote?
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你是否想推广任何用户生成内容（UGC）活动？
- en: What tone or style works best for community-building posts?
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么语气或风格最适合社区建设帖子？
- en: Do you want to include polls, open-ended questions, or challenges?
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你想包含民意调查、开放式问题或挑战吗？
- en: '4\. Facebook Prompt: Event Promotion Posts'
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. Facebook 提示：活动推广帖子
- en: 'Prompt:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions about an upcoming event I’m hosting or participating
    in. Based on my answers, create 5 Facebook post ideas to promote the event and
    drive attendance."'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我即将举办或参与的活动的10个问题。根据我的回答，创建5个Facebook帖子想法以推广活动并吸引参加。"'
- en: 'Example Interaction:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●      ChatGPT asks:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: ● ChatGPT提问：
- en: What type of event are you hosting (webinar, workshop, launch, etc.)?
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你正在举办什么类型的活动（网络研讨会、研讨会、发布会等）？
- en: What is the date, time, and location (if applicable) of the event?
  id: totrans-157
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 活动的日期、时间和地点（如果适用）是什么？
- en: Who is the target audience for this event?
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这个活动的目标受众是谁？
- en: What is the key benefit or takeaway for attendees?
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参加者可以获得哪些关键好处或收获？
- en: Are there any guest speakers, partners, or collaborators involved?
  id: totrans-160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是否有嘉宾演讲者、合作伙伴或合作者参与？
- en: What is the registration process or link?
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 注册流程或链接是什么？
- en: Is there any early bird pricing or urgency to promote?
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是否有早鸟优惠或紧迫性需要推广？
- en: What type of visuals (event graphics, teaser videos) do you have or need?
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你有什么或需要什么类型的视觉元素（活动图形、预告视频）？
- en: Do you have testimonials from previous events to share?
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您是否有从前的事件中分享的推荐信？
- en: What is your desired CTA (sign up, reserve a spot, etc.)?
  id: totrans-165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您期望的CTA（注册、预留位置等）是什么？
- en: '5\. Facebook Prompt: Storytelling for Brand Awareness'
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. Facebook提示：品牌知名度故事叙述
- en: 'Prompt:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions about my brand’s origin story, unique journey,
    or key milestones. Then, create 5 Facebook post ideas that use storytelling to
    connect emotionally with my audience and build brand awareness."'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: '"ChatGPT，请问我关于品牌起源故事、独特旅程或关键里程碑的10个问题。然后，创建5个Facebook帖子想法，使用故事叙述与我的受众建立情感联系并提升品牌知名度。"'
- en: 'Example Interaction:'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 示例互动：
- en: '●      ChatGPT asks:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: ●      ChatGPT提问：
- en: How and when was your business founded?
  id: totrans-171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的业务是如何和何时成立的？
- en: What inspired you to start this business?
  id: totrans-172
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么启发了您开始这项业务？
- en: What challenges did you face in the early stages?
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您在早期阶段遇到了哪些挑战？
- en: What key milestones or successes have you achieved?
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您取得了哪些关键里程碑或成功？
- en: How has your brand evolved over time?
  id: totrans-175
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的品牌是如何随时间演变的？
- en: What makes your brand unique in your industry?
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您的品牌在您的行业中有什么独特之处？
- en: Are there specific people (team, customers, mentors) who contributed to your
    success?
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有没有具体的人（团队、客户、导师）对您的成功做出了贡献？
- en: Do you have photos, videos, or other visuals to accompany your story?
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 您是否有照片、视频或其他视觉内容来配合您的故事？
- en: What tone should the story take (inspirational, reflective, humorous, etc.)?
  id: totrans-179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 故事应该采取什么语气（鼓舞人心的、反思的、幽默的等）？
- en: What is the goal of sharing this story (engagement, sales, awareness)?
  id: totrans-180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分享这个故事的目标是什么（参与度、销售、知名度）？
- en: 'TikTok Prompts for Content Creation:'
  id: totrans-181
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TikTok内容创作提示：
- en: '1\. TikTok Prompt: Trend-Based Content Strategy'
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. TikTok提示：基于趋势的内容策略
- en: 'Prompt:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：
- en: '"ChatGPT, ask me 10 questions about my niche and target audience. Based on
    my answers, suggest 5 TikTok video ideas that incorporate trending sounds, challenges,
    or formats. Ensure the ideas are engaging, relevant, and optimized for maximum
    reach."'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
