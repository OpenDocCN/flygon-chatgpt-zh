  type: TYPE_NORMAL
  zh: 在行为核心中，提示是一种结构化对话的形式。它们是一种工具，用于导航模型的广泛知识和能力，允许我们有效地提取价值。一个好的提示可以将一个看似通用的聊天机器人转变为一个出色的导师、创意助手、多才多艺的作家，甚至是一个有能力的程序员。另一方面，一个措辞不当的提示可能会产生模糊、不准确或甚至无关的答案。因此，掌握提示是掌握ChatGPT的第一步。
