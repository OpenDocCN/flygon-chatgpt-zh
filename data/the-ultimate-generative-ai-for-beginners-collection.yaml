  id: totrans-987
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 目标：构建和评估边缘AI在物联网中的实际应用。
- en: 'Latency reduction analysis:'
  id: totrans-988
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 延迟减少分析：
- en: '○ Prompt: "Compare response times between edge AI and cloud-based AI for a
    real-time traffic management system."'
  id: totrans-989
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 提示：比较边缘AI和基于云的AI在实时交通管理系统中的响应时间。
- en: '○ Goal: Investigate the benefits of edge AI in latency-sensitive environments.'
  id: totrans-990
  prefs: []
  type: TYPE_NORMAL
  zh: ○ 目标：调查边缘AI在延迟敏感环境中的益处。
- en: Emotion Recognition Technologies
  id: totrans-991
  prefs: []
  type: TYPE_NORMAL
