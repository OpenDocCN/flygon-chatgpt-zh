- en: A blank line in Python is a line containing only whitespace, a comment, or both.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: Python 中的一个空白行是只包含空白、注释或两者的行。
- en: '**SAVING YOUR CODE IN A MODULE**'
  id: totrans-502
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**在模块中保存你的代码**'
- en: 'Earlier you saw how to launch the Python interpreter from the command line
    and then enter commands. However, everything you type in the Python interpreter
    is only valid for the current session: if you exit the interpreter and then launch
    the interpreter again, your previous definitions are no longer valid. Fortunately,
    Python enables you to store code in a text file, as discussed in the next section.'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 之前你看到了如何从命令行启动 Python 解释器，然后输入命令。然而，你在 Python 解释器中输入的每一行代码只对当前会话有效：如果你退出解释器然后再次启动解释器，你之前的定义就不再有效。幸运的是，Python
    允许你将代码存储在文本文件中，如下一节所述。
- en: A *module* in Python is a text file that contains Python statements. In the
    previous section, you saw how the interpreter enables you to test code snippets
    whose definitions are valid for the current session. If you want to retain the
    code snippets and other definitions, place them in a text file so that you can
    execute that code outside of the interpreter.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: Python 中的 *模块* 是一个包含 Python 语句的文本文件。在前一节中，你看到了解释器如何使你能够测试当前会话中定义有效的代码片段。如果你想保留代码片段和其他定义，将它们放置在一个文本文件中，这样你就可以在解释器外执行该代码。
- en: The outermost statements in a Python program are executed from top to bottom
    when the module is imported for the first time, which will then set up its variables
    and functions.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 当模块首次导入时，Python 程序的外部语句会从上到下执行，这将设置其变量和函数。
- en: 'A Python module can be run directly from the command line, as shown here:'
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: Python 模块可以直接从命令行运行，如下所示：
