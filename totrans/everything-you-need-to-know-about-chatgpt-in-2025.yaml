  prefs: []
  type: TYPE_NORMAL
  zh: 尽管 GPT 模型已经取得了相当大的进步，但通往未来的道路被标记为在架构和加工能力上持续改进。今天，新的版本，如 GPT-4，能够生成连贯、相关且出人意料自然的文本，但随着新版本的开发，它们很可能会克服许多当前的局限性。
