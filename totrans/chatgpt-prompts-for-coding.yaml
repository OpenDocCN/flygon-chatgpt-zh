- en: Plugin and Tool Development
  id: totrans-1100
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 插件和工具开发
- en: Great developers don’t just use tools—they build them. I have been preparing
    multiple resources for entrepreneurs and businesses to use my research as a foundation
    for everyone. So far, I have penned 38 books with 22000 prompts on various topics.
    So, this chapter introduces prompts for developing plugins, extensions, and custom
    tools. You’ll learn to create solutions that enhance productivity and add value
    to your workflows. You also can create your plugin and tools for others to follow
    and integrate.
  id: totrans-1101
  prefs: []
  type: TYPE_NORMAL
  zh: 优秀的开发者不仅使用工具，他们还构建工具。我一直在为企业家和商业人士准备多种资源，以便他们可以将我的研究作为基础。到目前为止，我已经撰写了38本书，包含22000个关于各种主题的提示。因此，本章介绍了用于开发插件、扩展和自定义工具的提示。你将学会创建增强生产力和提升工作流程价值的解决方案。你也可以为他人创建插件和工具，供他们参考和集成。
- en: '1: Understanding Plugin Development Basics'
  id: totrans-1102
  prefs: []
  type: TYPE_NORMAL
  zh: '1: 理解插件开发基础'
- en: 'Prompt:'
  id: totrans-1103
  prefs: []
  type: TYPE_NORMAL
