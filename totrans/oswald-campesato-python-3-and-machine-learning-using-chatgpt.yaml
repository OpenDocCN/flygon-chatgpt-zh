- en: Specifying a Separator and Column Sets in Text Files
  prefs: []
  type: TYPE_NORMAL
- en: 'The previous section showed you how to use the delimiter attribute to specify
    the delimiter in a text file. You can also use the sep parameter specifies a different
    separator. In addition, you can assign the names parameter the column names in
    the data that you want to read. An example of using delimiter and sep is here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![image](images/img_12a.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Pandas also provides the read_table() method for reading the contents of CSV
    files, which uses the same syntax as the read_csv() method.
  prefs: []
  type: TYPE_NORMAL
- en: Specifying an Index in Text Files
  prefs: []
  type: TYPE_NORMAL
- en: Suppose that you know that a particular column in a text file contains the index
    value for the rows in the text file. For example, a text file that contains the
    data in a relational table would typically contain an index column.
  prefs: []
  type: TYPE_NORMAL
- en: 'Fortunately, Pandas allows you to specify the kth column as the index in a
    text file, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: df = pd.read_csv('myfile.csv', index_col=k)
  prefs: []
  type: TYPE_NORMAL
- en: THE LOC() AND ILOC() METHODS IN PANDAS
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to display the contents of a record in a Pandas data frame, specify
    the index of the row in the loc() method. For example, the following code snippet
    displays the data by feature name in a data frame df:'
  prefs: []
  type: TYPE_NORMAL
- en: df.loc[feature_name]
  prefs: []
  type: TYPE_NORMAL
- en: 'Select the first row of the "height" column in the data frame:'
  prefs: []
  type: TYPE_NORMAL
- en: df.loc([0], ['height'])
