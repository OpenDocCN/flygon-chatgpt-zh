- en: ChatGPT Answers to the Framed Analytical Questions
  id: totrans-1292
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT对框架分析问题的回答
- en: We now use ChatGPT to obtain more detailed answers to the framed questions provided
    by the generative AI tool. Remember that the relevant data file has already been
    loaded into ChatGPT for the previous computation. This is a continuation of the
    analysis, and the prompt given below obtained the following response.
  id: totrans-1293
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在使用ChatGPT来获取由生成式AI工具提供的框架问题的更详细答案。请记住，相关数据文件已经在前一次计算中加载到ChatGPT中。这是分析的延续，下面给出的提示获得了以下回复。
- en: 'Prompt: “Is there a relationship between how long a passenger waited between
    flights and his/her overall satisfaction score?”'
  id: totrans-1294
  prefs: []
  type: TYPE_NORMAL
  zh: 提示：“乘客在航班之间等待的时间与其整体满意度得分之间是否存在关系？”
- en: 'Response from ChatGPT:'
  id: totrans-1295
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的回复：
- en: The data suggests a nuanced relationship between wait hours and passenger satisfaction.
    While shorter wait times generally correlate with higher satisfaction, there are
    instances where longer wait times have not severely affected the satisfaction
    scores, indicated by some high satisfaction scores at wait times of five hours
    or more. However, an outlier at 13 hours shows a marked decrease in satisfaction.
    The variability in satisfaction scores at higher wait hours may be influenced
    by various factors such as the quality of airport amenities, passenger expectations,
    and the context of the wait (e.g., voluntary layover vs. delayed flight). It is
    also worth noting that the sample sizes for longer wait times are smaller, which
    could affect the reliability of the mean satisfaction scores in these categories.
    Overall, while there appears to be a general trend that shorter waits are associated
    with higher satisfaction, the relationship is not strictly linear, and other factors
    are likely at play that influence a passenger’s overall satisfaction with their
    waiting experience.
  id: totrans-1296
  prefs: []
  type: TYPE_NORMAL
  zh: 数据表明，等待时间和乘客满意度之间存在微妙的关系。虽然较短的等待时间通常与较高的满意度相关，但也有情况是较长的等待时间并没有严重影响满意度得分，这可以从五小时或更长时间的等待时间中的一些高满意度得分中看出。然而，13小时的异常值显示出满意度的显著下降。较高等待时间满意度得分的波动可能受多种因素影响，如机场设施的质量、乘客的期望以及等待的背景（例如，自愿滞留与延误航班）。还值得注意的是，较长等待时间的样本量较小，这可能会影响这些类别中平均满意度得分的可靠性。总的来说，虽然似乎存在一个普遍趋势，即较短的等待时间与较高的满意度相关，但这种关系并非严格线性，其他可能影响乘客对等待体验整体满意度的因素也可能在起作用。
- en: CHAPTER 9
  id: totrans-1297
  prefs: []
  type: TYPE_NORMAL
  zh: 第九章
- en: CORRELATION AND LINEAR REGRESSION
  id: totrans-1298
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性与线性回归
- en: '![image](images/pg189.jpg)'
  id: totrans-1299
  prefs: []
  type: TYPE_IMG
  zh: '![图片](images/pg189.jpg)'
- en: 'This chapter introduces two fundamental concepts in data analysis: correlation
    and linear regression. These techniques are essential tools for understanding
    relationships between variables and making predictions based on data. As we examine
    predictive analytics, we will explore how to use these methods to answer important
    business questions and gain insights from numerical data.'
  id: totrans-1300
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了数据分析中的两个基本概念：相关性和线性回归。这些技术是理解变量之间关系和基于数据进行预测的必要工具。当我们研究预测分析时，我们将探讨如何使用这些方法来回答重要的业务问题并从数值数据中获得见解。
- en: Correlation is a measure of the strength and direction of the relationship between
    two variables. It helps us understand how changes in one variable might be associated
    with changes in another. The correlation coefficient, a value between -1 and 1,
    quantifies this relationship. A positive correlation indicates that as one variable
    increases, the other tends to increase as well. Conversely, a negative correlation
    suggests that as one variable increases, the other tends to decrease. A correlation
    near zero implies little to no linear relationship between the variables.
  id: totrans-1301
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性是衡量两个变量之间关系强度和方向的指标。它帮助我们理解一个变量的变化可能如何与另一个变量的变化相关联。相关系数，一个介于-1和1之间的值，量化了这种关系。正相关表明，当一个变量增加时，另一个变量也倾向于增加。相反，负相关表明，当一个变量增加时，另一个变量倾向于减少。接近零的相关性意味着变量之间几乎没有线性关系。
- en: Linear regression takes this analysis a step further by modeling the relationship
    between variables. It allows us to predict the value of one variable (the dependent
    variable) based on another (the independent variable). The simple linear regression
    model we explore in this chapter involves just two variables, but the principles
    lay the groundwork for more complex analyses in later chapters.
  id: totrans-1302
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归通过建立变量之间的关系模型将这种分析推进了一步。它允许我们根据另一个变量（自变量）预测一个变量的值（因变量）。本章我们探讨的简单线性回归模型只涉及两个变量，但这些原则为后续章节中更复杂的分析奠定了基础。
- en: The chapter begins with an overview of these concepts and their applications
    in business contexts. We calculate correlation coefficients and interpret their
    meanings. We also explore how to construct and interpret simple linear regression
    models, understanding key components such as the slope, y-intercept, and the line
    of best fit.
  id: totrans-1303
  prefs: []
  type: TYPE_NORMAL
  zh: 本章首先概述了这些概念及其在商业环境中的应用。我们计算相关系数并解释其含义。我们还探讨了如何构建和解释简单的线性回归模型，理解关键组成部分，如斜率、y轴截距和最佳拟合线。
- en: Throughout the chapter, we use practical examples to illustrate these concepts.
    For instance, we might examine the relationship between a company’s advertising
    expenditure and its sales, or between an employee’s years of experience and their
    salary. These real-world applications help demonstrate how correlation and regression
    can inform business decisions and strategy.
  id: totrans-1304
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们通过实际例子来阐述这些概念。例如，我们可能会研究一家公司的广告支出与其销售额之间的关系，或者一名员工的工龄与其薪水之间的关系。这些现实世界的应用有助于展示相关性和回归如何为商业决策和战略提供信息。
- en: We discuss the limitations and assumptions of these techniques. It is crucial
    to understand that correlation does not imply causation, and that linear regression
    assumes a linear relationship between variables. We also identify when these methods
    are appropriate and when they might lead to misleading conclusions.
  id: totrans-1305
  prefs: []
  type: TYPE_NORMAL
  zh: 我们讨论了这些技术的局限性和假设。理解这一点至关重要：相关性并不等同于因果关系，线性回归假设变量之间存在线性关系。我们还确定了这些方法何时适用，以及它们可能如何导致误导性的结论。
- en: The chapter guides you through the process of performing correlation and regression
    analyses using various tools. We explore how to use Excel’s Analysis ToolPak for
    these calculations, as well as how to create and interpret scatterplots and other
    visualizations that help us understand relationships in our data.
  id: totrans-1306
  prefs: []
  type: TYPE_NORMAL
  zh: 本章指导您使用各种工具进行相关性和回归分析的过程。我们探讨了如何使用Excel的分析工具包进行这些计算，以及如何创建和解释散点图和其他可视化，帮助我们理解数据中的关系。
- en: As we progress, we use increasingly complex scenarios and datasets. We handle
    outliers, interpret the strength of relationships, and make predictions using
    our regression models. We also consider how these techniques form the foundation
    for more advanced statistical methods you will encounter in later chapters.
  id: totrans-1307
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们不断前进，我们将使用越来越复杂的场景和数据集。我们处理异常值，解释关系的强度，并使用回归模型进行预测。我们还考虑了这些技术如何成为您在后续章节中遇到的更高级统计方法的基础。
- en: By the end of this chapter, you will have a solid understanding of correlation
    and simple linear regression. You will be able to analyze relationships between
    variables, construct basic predictive models, and interpret the results in a business
    context. These skills will prove valuable in various fields, from finance and
    marketing to operations and human resources, enabling you to make more informed,
    data-driven decisions.
  id: totrans-1308
  prefs: []
  type: TYPE_NORMAL
  zh: 到本章结束时，您将深刻理解相关性和简单线性回归。您将能够分析变量之间的关系，构建基本的预测模型，并在商业环境中解释结果。这些技能将在金融、营销、运营和人力资源等多个领域证明其价值，使您能够做出更明智、基于数据的决策。
- en: As we explore these concepts, remember that they are powerful tools in the data
    analyst’s toolkit, but they are just the beginning. The insights gained from correlation
    and regression often lead to deeper questions and more sophisticated analyses.
  id: totrans-1309
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们探索这些概念时，请记住，它们是数据分析师工具箱中的强大工具，但只是开始。从相关性和回归中获得的认识往往会导致更深层次的问题和更复杂的分析。
- en: 'These techniques address the following business questions: “How are two numerical
    variables related?” and “Can we use one variable to predict another?”'
  id: totrans-1310
  prefs: []
  type: TYPE_NORMAL
  zh: 这些技术旨在解决以下商业问题：“两个数值变量之间有何关系？”以及“我们能否使用一个变量来预测另一个变量？”
- en: Correlation and Linear Regression
  id: totrans-1311
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性与线性回归
- en: What are Correlation and Linear Regression?
  id: totrans-1312
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是相关性与线性回归？
- en: Correlation and linear regression are two fundamental concepts in statistics
    used to analyze the relationship between variables. Correlation measures the strength
    and direction of the linear relationship between two variables. It is quantified
    by the correlation coefficient, which ranges from -1 to 1\. A value close to 1
    indicates a strong positive correlation, where the variables move in the same
    direction, while a value close to -1 indicates a strong negative correlation,
    where they move in opposite directions. A correlation of 0 suggests no linear
    relationship between the variables.
  id: totrans-1313
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性和线性回归是统计学中用于分析变量之间关系的两个基本概念。相关性衡量两个变量之间线性关系的强度和方向。它通过相关系数来量化，其范围从 -1 到 1。接近
    1 的值表示强烈的正相关，其中变量朝同一方向移动，而接近 -1 的值表示强烈的负相关，其中它们朝相反方向移动。相关性为 0 表示变量之间没有线性关系。
- en: In contrast, linear regression goes further by establishing a model to represent
    the connection between a dependent variable and one or more independent variables.
    It forecasts the value of the dependent variable based on the values of the independent
    variables. This is accomplished by fitting a linear equation to the observed data.
    The most common form of linear regression is simple linear regression, which involves
    just one independent variable. In this case, the linear equation would be Y =
    a + b X, where Y is the dependent variable, X is the independent variable, “a”
    is the y-intercept, and “b” is the slope.
  id: totrans-1314
  prefs: []
  type: TYPE_NORMAL
  zh: 与此相反，线性回归通过建立一个模型来表示因变量与一个或多个自变量之间的联系而更进一步。它根据自变量的值预测因变量的值。这是通过将线性方程拟合到观察到的数据来实现的。最常见形式的线性回归是简单线性回归，它只涉及一个自变量。在这种情况下，线性方程将是
    Y = a + b X，其中 Y 是因变量，X 是自变量，“a”是y轴截距，而“b”是斜率。
- en: The slope in a linear regression model represents the change in the dependent
    variable for a one-unit change in the independent variable. This model helps us
    understand how changes in the independent variable affect the dependent variable.
    It is important to note that correlation and linear regression only capture linear
    relationships and may not be suitable for non-linear relationships. Linear regression
    is valuable for forecasting, reducing errors, and conducting inferential statistics,
    making it a versatile tool in fields such as economics, biology, and engineering.
    However, it is crucial to consider the assumptions underlying linear regression,
    such as linearity, independence, and homoscedasticity, for the model to be valid.
  id: totrans-1315
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归模型中的斜率表示自变量每增加一个单位时因变量的变化。此模型帮助我们理解自变量的变化如何影响因变量。需要注意的是，相关性和线性回归仅捕捉线性关系，可能不适用于非线性关系。线性回归在预测、减少误差和进行推断统计方面非常有价值，使其成为经济学、生物学和工程等领域的一种多用途工具。然而，为了使模型有效，必须考虑线性回归的潜在假设，例如线性、独立性和同方差性。
- en: What are the Elements of Correlation and Linear Regression?
  id: totrans-1316
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性和线性回归的要素是什么？
- en: 'Correlation and linear regression, two pivotal concepts in statistical analysis,
    comprise several key elements:'
  id: totrans-1317
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性和线性回归是统计分析中的两个关键概念，包括几个关键要素：
- en: '**1.**Correlation coefficient: In correlation analysis, the correlation coefficient
    is a numerical measure that quantifies the strength and direction of a linear
    relationship between two variables. It ranges from -1 to 1, where values close
    to 1 or -1 indicate strong positive or negative correlations, respectively, and
    a value of 0 implies no linear correlation.'
  id: totrans-1318
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.** 相关系数：在相关性分析中，相关系数是一个数值度量，它量化了两个变量之间线性关系的强度和方向。它的范围从 -1 到 1，其中接近 1 或
    -1 的值分别表示强烈的正相关或负相关，而 0 的值表示没有线性相关性。'
- en: '**2.**Scatterplot: A scatterplot is often used in both correlation and linear
    regression analyses to visualize the relationship between two variables. It helps
    in identifying the nature of the relationship, whether linear or non-linear, and
    in finding any outliers or anomalies in the data.'
  id: totrans-1319
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.** 散点图：散点图在相关性和线性回归分析中经常被用来可视化两个变量之间的关系。它有助于识别关系的性质，无论是线性还是非线性，以及发现数据中的任何异常值或异常情况。'
- en: '**3.**Regression line (line of best fit): In linear regression, the regression
    line represents the best linear approximation of the data. It is determined using
    the least squares method, which minimizes the sum of the squares of the residuals
    (differences between the observed and predicted values).'
  id: totrans-1320
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.** 回归线（最佳拟合线）：在线性回归中，回归线代表数据的最佳线性近似。它通过最小二乘法确定，该方法最小化了残差平方和（观测值与预测值之间的差异）。'
- en: '**4.**Slope and intercept: The linear regression equation is typically written
    as y = a + bx, where “y” is the dependent variable, “x” is the independent variable,
    “a” is the y-intercept (the value of “y” when “x” is 0), and “b” is the slope
    of the line. The slope indicates how much “y” is expected to change when “x” increases
    by one unit.'
  id: totrans-1321
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.** 斜率和截距：线性回归方程通常写作 y = a + bx，其中“y”是因变量，“x”是自变量，“a”是 y 截距（当“x”为 0 时“y”的值），而“b”是线的斜率。斜率表示当“x”增加一个单位时，“y”预期会变化多少。'
- en: '**5.**Residuals: Residuals are the differences between the observed values
    and the values predicted by the regression model. Analyzing the residuals helps
    in understanding the accuracy of the model and in checking for any patterns that
    might suggest a violation of the assumptions underlying linear regression.'
  id: totrans-1322
  prefs: []
  type: TYPE_NORMAL
  zh: '**5.** 残差：残差是观测值与回归模型预测值之间的差异。分析残差有助于理解模型的准确性，并检查是否存在可能表明违反线性回归基本假设的模式。'
- en: '**6.**Assumptions: Both correlation and linear regression are based on several
    assumptions. For linear regression, these include linearity (the relationship
    between the variables is linear), independence (observations are independent of
    each other), homoscedasticity (the residuals have constant variance), and normality
    of residuals.'
  id: totrans-1323
  prefs: []
  type: TYPE_NORMAL
  zh: '**6.** 假设：相关性和线性回归都基于几个假设。对于线性回归，这些包括线性（变量之间的关系是线性的）、独立性（观测值相互独立）、同方差性（残差具有恒定的方差）和残差的正态性。'
- en: An Example of Creating Correlation and Linear Regression for a Dataset
  id: totrans-1324
  prefs: []
  type: TYPE_NORMAL
  zh: 创建数据集的相关性和线性回归示例
- en: 'Here is an example of creating correlation and linear regression for Companies.xlsx
    dataset in the Case Data folder:'
  id: totrans-1325
  prefs: []
  type: TYPE_NORMAL
  zh: 在案例数据文件夹中的 Companies.xlsx 数据集上创建相关性和线性回归的示例：
- en: '![image](images/pg194.jpg)'
  id: totrans-1326
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg194.jpg)'
- en: FIGURE 9.1 Example of a correlation matrix between all variables
  id: totrans-1327
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.1 所有变量之间的相关矩阵示例
- en: '![image](images/pg194_1.jpg)'
  id: totrans-1328
  prefs: []
  type: TYPE_IMG
  zh: '![image](images/pg194_1.jpg)'
- en: FIGURE 9.2 Example of linear regression between sales and profits
  id: totrans-1329
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9.2 销售额与利润之间的线性回归示例
- en: In our dataset, we can analyze the correlation between sales and profits. This
    correlation coefficient helps us understand how closely these two factors are
    linked. A high correlation coefficient, close to 1, suggests that as sales increase,
    profits typically increase as well, and vice versa. However, it is important to
    note that correlation does not imply causation ([Figure 9.1](#fig9-1)).
  id: totrans-1330
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的数据集中，我们可以分析销售额与利润之间的相关性。这个相关系数帮助我们了解这两个因素之间联系有多紧密。高相关系数，接近 1，表明随着销售额的增加，利润通常也会增加，反之亦然。然而，重要的是要注意，相关性并不等同于因果关系([图
    9.1](#fig9-1))。
- en: Linear regression goes beyond simply showing the relationship between variables;
    it models the relationship. In our dataset, when using linear regression to predict
    profits based on sales, we create a model that best fits the data points (refer
    to [Figure 9.2](#fig9-2)). The resulting line of best fit, represented by the
    regression equation, serves as our prediction tool. For instance, our analysis
    indicates that for every million-dollar increase in sales, profits increase by
    approximately $61,300\. This model is valuable for forecasting and decision-making
    as it offers a precise prediction of profits based on sales.
  id: totrans-1331
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归不仅展示了变量之间的关系，还建模了这种关系。在我们的数据集中，当使用线性回归根据销售额预测利润时，我们创建了一个最佳拟合数据点的模型（参见图 9.2）。由回归方程表示的最佳拟合线作为我们的预测工具。例如，我们的分析表明，每增加一百万美元的销售额，利润大约增加
    61,300 美元。这个模型对于预测和决策非常有价值，因为它基于销售额提供了精确的利润预测。
- en: 'Analysis Case 9.1: Correlation and Linear Regression'
  id: totrans-1332
  prefs: []
  type: TYPE_NORMAL
  zh: 分析案例 9.1：相关性和线性回归
