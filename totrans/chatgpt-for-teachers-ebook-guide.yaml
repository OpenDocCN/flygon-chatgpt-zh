  type: TYPE_NORMAL
  zh: 根据新课程制定第一学期的详细教学计划，包括可衡量的成果和吸引人的学习活动。
- en: Review the attached model lesson plan and reimagine it for the topic of [x],
    maintaining the structure but introducing creative engagement strategies.
  id: totrans-898
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 审查所附的模型教学计划，并针对[主题x]进行重新构思，保持结构不变，但引入创造性的参与策略。
- en: 'Mock exam questions:'
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟考试问题：
- en: You are an exam writer for [x] subject at GCSE level in the UK. Write an essay
    for the English language paper giving an article to analyse alongside 5-10 questions
    about the article.
  id: totrans-900
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你是英国GCSE水平的[x]科目考试编写者。为英语试卷写一篇文章，并附上5-10个关于文章的问题。
- en: Generate a mock exam question for [subject] that requires students to analyse
    and interpret data or a graph related to [specific topic, e.g., "climate change
    impacts in Geography"]. Provide an answer key with a detailed explanation.
  id: totrans-901
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为[科目]生成一个模拟考试问题，要求学生分析并解释与[特定主题，例如：“地理中的气候变化影响”]相关的数据或图表。提供包含详细解释的答案键。
- en: Create a scenario-based question for [subject and topic, e.g., "algebra in Year
    9 Maths"], where students must apply their knowledge to solve a real-world problem.
    Include a step-by-step solution.
  id: totrans-902
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为[科目和主题，例如：“9年级数学中的代数”]创建一个基于情景的问题，学生必须应用他们的知识来解决现实世界的问题。包括逐步解决方案。
- en: Write a high-level essay question for [subject and topic, e.g., "the causes
    of World War I for History GCSE"], including key points that students should address
    in their answer.
  id: totrans-903
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为[科目和主题，例如：“历史GCSE中的第一次世界大战的原因”]撰写一个高级论文问题，包括学生在答案中应涉及的关键点。
- en: 'Design a 3-part mock exam question for [subject], including: a multiple-choice
    question, a short-answer question, and a long-answer question. Ensure the questions
    progressively challenge students'' understanding of [specific topic, e.g., "the
    water cycle in Year 8 Geography"].'
  id: totrans-904
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为[科目]设计一个3部分模拟考试问题，包括：多项选择题、简答题和长答题。确保问题逐步挑战学生对[特定主题，例如：“8年级地理中的水循环”]的理解。
- en: 'Testing student understanding:'
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 测试学生对知识的理解：
- en: Create a question where students must evaluate a flawed explanation or calculation
    about [specific topic, e.g., "electric circuits in Science"]. Ask them to identify
    the error and provide the correct explanation.
  id: totrans-906
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个问题，要求学生评估关于[特定主题，例如：“科学中的电路”]的错误解释或计算。要求他们识别错误并提供正确的解释。
- en: Write 5 true-or-false statements about [specific topic, e.g., "fractions in
    Maths"]. Require students to explain their reasoning for each answer to ensure
    they understand the concepts behind the statements.
  id: totrans-907
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于[特定主题，例如：“数学中的分数”]，撰写5个是非题。要求学生解释每个答案的理由，以确保他们理解陈述背后的概念。
- en: Develop a question asking students to compare two similar concepts from [specific
    topic, e.g., "weathering and erosion in Geography"], highlighting their differences
    and why they are often confused.
  id: totrans-908
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计一个问题，要求学生比较[特定主题，例如：“地理中的风化与侵蚀”]中的两个相似概念，突出它们之间的差异以及它们为何经常被混淆。
- en: Ask students to apply their knowledge of [specific topic, e.g., "the structure
    of an atom in Science"] to a novel situation or problem. Include elements that
    test whether they understand the concept deeply rather than relying on memorisation.
  id: totrans-909
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要求学生将他们对[特定主题，例如：“科学中的原子结构”]的知识应用于新的情境或问题。包括测试他们是否真正理解概念而不是依赖记忆的元素。
- en: Design 5 multiple-choice questions where one option reflects a common misconception
    about [specific topic, e.g., "causes of historical events"]. Include explanations
    in the answer key to clarify why the misconception is incorrect.
  id: totrans-910
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计5个多项选择题，其中一个选项反映了关于[特定主题，例如：“历史事件的原因”]的常见误解。在答案键中包含解释，以阐明为什么误解是不正确的。
- en: 'Admin tasks:'
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 行政任务：
- en: Compare the curriculum named [x] with the new curriculum named [y], highlighting
    key changes in objectives, methods, and content areas.
  id: totrans-912
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较名为[x]的课程与名为[y]的新课程，突出目标和内容领域中的关键变化。
- en: Write a personalised performance report for a student, reflecting their progress,
    strengths, and areas for improvement, while suggesting actionable next steps.
  id: totrans-913
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为学生撰写一份个性化的表现报告，反映他们的进步、优势和需要改进的领域，同时提出可操作的下步行动建议。
- en: Draft a parent communication template that explains how [x] topic is being taught
    in class and suggests at-home activities to support learning.
  id: totrans-914
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 起草一个家长沟通模板，解释如何在课堂上教授[x]主题，并建议家庭作业以支持学习。
- en: '** It is always important to fact check the output of ChatGPT prompts and to
    not take them as verbatim. You should use it as a start to your planning and to
    get ideas, then adjust and amend to suit your style.**'
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: '**始终重要的是要核实ChatGPT提示的输出，不要直接照搬。你应该将其作为你计划的起点，以获取灵感，然后调整和修改以适应你的风格。**'
- en: '15.'
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: '15.'
