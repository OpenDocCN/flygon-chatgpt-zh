- en: 4.3.2 Co-citation analysis
  id: totrans-921
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.2 共引分析
- en: 4.3.2.1 Publication
  id: totrans-922
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.3.2.1 出版物
- en: 'The authors conducted a comprehensive analysis of 4,275 citations generated
    from 136 publications. In order to refine the sample, a cut-off point was established,
    and a threshold of ten citations was established as the minimum number of citations
    ([McCain 1990](#ch12.xhtml#r160)). As a result, 19 publications were selected
    as the most influential. The five studies with the highest co-citation indices
    are as follows:'
  id: totrans-923
  prefs: []
  type: TYPE_NORMAL
  zh: 作者对136篇出版物产生的4,275条引用进行了全面分析。为了精炼样本，设定了一个截止点，并将10条引用作为最低引用阈值([McCain 1990](#ch12.xhtml#r160))。因此，选出了19篇最具影响力的出版物。以下是最高的共引指数的5项研究：
- en: 'Rudolph, J., Tan, S., & Tan, S. (2023). ChatGPT: Bullshit spewer or the end
    of traditional assessments in higher education?. *Journal of Applied Learning
    and Teachin*g, 6(1), 1–22.'
  id: totrans-924
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Rudolph, J., Tan, S., & Tan, S. (2023). ChatGPT：胡言乱语者还是高等教育传统评估的终结？*应用学习与教学杂志*，6(1)，1–22。
- en: Kasneci, E., Seßler, K., Küchemann, S., Bannert, M., Dementieva, D., Fischer,
    F., … & Kasneci, G. (2023). ChatGPT for good? On opportunities and challenges
    of large language models for education. *Learning and individual differences*,
    103(1), 1–9.
  id: totrans-925
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Kasneci, E., Seßler, K., Küchemann, S., Bannert, M., Dementieva, D., Fischer,
    F., … & Kasneci, G. (2023). ChatGPT有益吗？关于大型语言模型在教育中的机遇与挑战。*学习与个体差异*，103(1)，1–9。
- en: 'Tlili, A., Shehata, B., Adarkwah, M. A., Bozkurt, A., Hickey, D. T., Huang,
    R., & Agyemang, B. (2023). What if the devil is my guardian angel: ChatGPT as
    a case study of using chatbots in education. *Smart Learning Environments*, 10(1),
    1–24.'
  id: totrans-926
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Tlili, A., Shehata, B., Adarkwah, M. A., Bozkurt, A., Hickey, D. T., Huang,
    R., & Agyemang, B. (2023). 如果恶魔是我的守护天使：ChatGPT作为教育中应用聊天机器人的案例研究。*智能学习环境*，10(1)，1–24。
- en: 'Cotton, D. R., Cotton, P. A., & Shipway, J. R. (2023). Chatting and cheating:
    Ensuring academic integrity in the era of ChatGPT. *Innovations in Education and
    Teaching International*, 1(1), 1–12.'
  id: totrans-927
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Cotton, D. R., Cotton, P. A., & Shipway, J. R. (2023). 聊天与作弊：确保ChatGPT时代的学术诚信。*教育与国际创新*，1(1)，1–12。
- en: 'Pavlik, J. V. (2023). Collaborating with ChatGPT: Considering the implications
    of generative artificial intelligence for journalism and media education. *Journalism
    & Mass Communication Educator*, 78(1), 84–93.'
  id: totrans-928
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Pavlik, J. V. (2023). 与ChatGPT合作：考虑生成式人工智能对新闻与媒体教育的影响。*新闻与大众传播教育家*，78(1)，84–93。
- en: The authors present a co-citation network in [Figure 4.4](#ch12.xhtml#f10),
    which showcases the relationship between the selected articles based on their
    shared citations. This network is divided into three distinct clusters, each containing
    a group of publications centred around specific themes (see [Table 4.4](#ch12.xhtml#t9)).
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: 作者在[图4.4](#ch12.xhtml#f10)中展示了一个共引网络，该网络展示了基于共享引用所选文章之间的关系。这个网络分为三个不同的簇，每个簇都包含围绕特定主题的一组出版物（参见[表4.4](#ch12.xhtml#t9))。
